widgetData:
- source_sentence: El agua se volvió turbia desde que uso el ozono. ¿A qué se debe?
  sentences:
  - '27 de septiembre de 2009 27 de septiembre de 2009Tegucigalpa, Honduras — En un comunicado del gobierno de facto hondureño,
    encabezado por Roberto Micheletti, se ha decretado un ultimatum de 10 días para que la embajada de Brasil defina el estatus
    del depuesto presidente Manuel Zelaya, quien permanece en la sede diplomática desde el lunes pasado. En el texto del comunicado
    se afirma: "ningún país puede tolerar que una embajada extranjera sea utilizada como base de mando para generar violencia
    y romper la tranquilidad, como el señor Zelaya lo ha estado haciendo desde su ingreso al territorio nacional", agregando:
    "nos veremos obligados a tomar medidas adicionales conforme al derecho internacional".'
  - La nubosidad es una señal de que el ozono está haciendo su trabajo. Continúe ejecutando el filtro y desaparecerá en un
    par de días. La nubosidad también puede indicar un problema en el filtro. Verifique el filtro por daños y operación apropiada.
    Retrolavado si es necesario.
  - El filòsof i periodista Jordi Graupera ha guanyat la votació de Primàries Catalunya a Barcelona, amb 7.715 vots. El segon
    candidat més votat ha estat Adrià Alsina, ex-membre del secretariat de l'ANC, amb 1.933 vots. La votació va començar divendres
    a les 20.00 i s'ha acabat avui a les 20.00.
- source_sentence: What is a term being used for organizations that are for the citizens, by the citizens?
  sentences:
  - 'The term "civil society organization" (CSO) has been used by a growing number of organizations, such as the Center for
    the Study of Global Governance. The term "citizen sector organization" (CSO) has also been advocated to describe the sector
    – as one of citizens, for citizens – by organizations such as Ashoka: Innovators for the Public. A more broadly applicable
    term, "Social Benefit Organization" (SBO) has been advocated for by organizations such as MiniDonations.'
  - The number e is a famous irrational number and is one of the most important numbers in mathematics. e is the base of the
    Natural Logarithms.
  - In 1885, British claims to a West African sphere of influence received recognition from other European nations at the
    Berlin Conference. The following year, it chartered the Royal Niger Company under the leadership of Sir George Taubman
    Goldie.
- source_sentence: ¿Cuándo se llevó a cabo la adquisición?
  sentences:
  - La operadora de telefonía móvil de Sao Paulo, Telesp Celular, controlada por Portugal Telecom, adquirió el control de
    la empresa brasileña Ceterp Celular, perteneciente al grupo español Telefónica, se informó hoy. En un aviso publicitario
    publicado hoy en la prensa local, Telefónica indica que la operación se hizo efectiva ayer, Martes, por un valor de 148,5
    millones de reales (75,5 millones de dólares). La empresa vendida formaba parte de las Centrales Telefónicas de Ribeirao
    Preto (Ceterp), una pequeña compañía comprada en diciembre del año pasado por Telefónica en subasta pública.
  - Los ecologistas denuncian ante el TSJC la concesión por la Agència Catalana del' Aigua de caudales de la depuradora de
    Les Fonts para el futuro campo de Torrebonica. Adenc, que ya denunció el uso del agua, cree que han existido irregularidades
    en la concesión.
  - The word Anglican originates in ecclesia anglicana, a medieval Latin phrase dating to at least 1246 that means the English
    Church. There is no single "Anglican Church" with universal juridical authority, since each national or regional church
    has full autonomy. As the name suggests, the communion is an association of churches in full communion with the Archbishop
    of Canterbury.
- source_sentence: What was introduced that made using Mac OS alternative operating systems easier?
  sentences:
  - and then to hand over control to a Mac OS-based bootloader application. Used even by Apple for A/UX and MkLinux, this
    technique is no longer necessary since the introduction of Open Firmware-based PCI Macs, though it was formerly used for
    convenience on many Old World ROM systems due to bugs in the firmware implementation.[citation needed] Now, Mac hardware
    boots directly from Open Firmware in most PowerPC-based Macs or EFI in all Intel-based Macs.
  - During the Napoleonic Wars in the late 18th century and early 19th century, Napoleon annexed territory formerly controlled
    by the Habsburgs and Savoys. In 1798 he established the Helvetic Republic in Switzerland; two years later he led an army
    across the St. Bernard pass and conquered almost all of the Alpine regions.
  - La visita coincideix amb un període de vaga a França per la reforma de les pensions que també afecta el col·lectiu que
    exerceix al Principat. La visita de Jean–Michel Blanquer a Andorra ha arrencat a primera hora amb una reunió amb el cap
    de govern, Xavier Espot. No se'n sap el contingut, però de segur que han parlat del reforç de la presència francesa a
    Andorra mitjançant el sistema educatiu.
- source_sentence: Of pregnant women, how many are believed to be infected with HIV?
  sentences:
  - In 2004, the Swaziland government acknowledged for the first time that it suffered an AIDS crisis, with 38.8% of tested
    pregnant women infected with HIV (see AIDS in Africa). The then Prime Minister Themba Dlamini declared a humanitarian
    crisis due to the combined effect of drought, land degradation, increased poverty, and HIV/AIDS.
  - James Liebman, a professor of law at Columbia Law School, stated in 1996 that his study found that when habeas corpus
    petitions in death penalty cases were traced from conviction to completion of the case that there was "a 40 percent success
    rate in all capital cases from 1978 to 1995." Similarly, a study by Ronald Tabak in a law review article puts the success
    rate in habeas corpus cases involving death row inmates even higher, finding that between "1976 and 1991, approximately
    47 percent of the habeas petitions filed by death row inmates were granted."
  - Si t'allotges a Casa da Pendôa tens aquestes possibilitats d'aparcament (sota disponibilitat):Pàrquing interior de pagament,Pàrquing
    exterior de pagament
