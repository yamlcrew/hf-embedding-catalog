- source_sentence: 'For distributed systems engineers, Ray automatically handles key processes:


    Orchestration–Managing the various components of a distributed system.

    Scheduling–Coordinating when and where tasks are executed.

    Fault tolerance–Ensuring tasks complete regardless of inevitable points of failure.

    Auto-scaling–Adjusting the number of resources allocated to dynamic demand.



    What you can do with Ray#

    These are some common ML workloads that individuals, organizations, and companies leverage Ray to build their AI applications:


    Batch inference on CPUs and GPUs

    Model serving

    Distributed training of large models

    Parallel hyperparameter tuning experiments

    Reinforcement learning

    ML platform




    Ray framework#







    Stack of Ray libraries - unified toolkit for ML workloads.




    Ray’s unified compute framework consists of three layers:'
  sentences:
  - What does remote_worker_envs control when num_envs_per_env_runner > 1?
  - How is the learning rate set in the config?
  - According to the excerpt, what does Ray automatically handle for distributed systems engineers?
- source_sentence: 'RLlib component tree#

    The following is the structure of the RLlib component tree, showing under which name you can

    access a subcomponent’s own checkpoint within the higher-level checkpoint. At the highest level

    is the Algorithm class:

    algorithm/

    learner_group/

    learner/

    rl_module/

    default_policy/ # <- single-agent case

    [module ID 1]/ # <- multi-agent case

    [module ID 2]/ # ...

    env_runner/

    env_to_module_connector/

    module_to_env_connector/


    Note

    The env_runner/ subcomponent currently doesn’t hold a copy of the RLModule

    checkpoint because it’s already saved under learner/. The Ray team is working on resolving

    this issue, probably through soft-linking to avoid duplicate files and unnecessary disk usage.


    Creating instances from a checkpoint with from_checkpoint#

    Once you have a checkpoint of either a trained Algorithm or

    any of its subcomponents, you can recreate new objects directly

    from this checkpoint.

    The following are two examples:'
  sentences:
  - Why does RLlib convert each row into a single-step episode by default?
  - What is at the highest level of the RLlib component tree?
  - What is recommended regarding AOF when using storage options that do not support append operations?
- source_sentence: 'Option 2: Manually Create URL (slower to implement, but recommended for production environments)#

    The second option is to manually create this URL by pattern-matching your specific use case with one of the following
    examples.

    This is recommended because it provides finer-grained control over which repository branch and commit to use when generating
    your dependency zip file.

    These options prevent consistency issues on Ray Clusters (see the warning above for more info).

    To create the URL, pick a URL template below that fits your use case, and fill in all parameters in brackets (e.g. [username],
    [repository], etc.) with the specific values from your repository.

    For instance, suppose your GitHub username is example_user, the repository’s name is example_repository, and the desired
    commit hash is abcdefg.

    If example_repository is public and you want to retrieve the abcdefg commit (which matches the first example use case),
    the URL would be:'
  sentences:
  - What can Ray Train and Ray Tune be used together for?
  - How do you create the URL for Option 2?
  - Which function can you use to read a CSV file for batch processing in Ray?
