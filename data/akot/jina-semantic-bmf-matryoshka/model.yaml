widgetData:
- source_sentence: 312 Aus steuerlicher Sicht ist es möglich, mehrere Versorgungszusagen nebeneinander, also neben einer Altzusage
    auch eine Neuzusage zu erteilen (z. B. „alte“ Direktversicherung und „neuer“ Pensionsfonds).
  sentences:
  - Wann liegt bei der betrieblichen Altersversorgung eine schädliche Verwendung vor?
  - Welche steuerliche Behandlung erfahren Auszahlungen aus Altersvorsorgeverträgen nach § 22 Nr. 5 EStG?
  - Können verschiedene Versorgungszusagen wie Direktversicherung und Pensionsfonds gleichzeitig bestehen?
- source_sentence: 5 Pflichtversicherte nach dem Gesetz über die Alterssicherung der Landwirte gehören, soweit sie nicht als
    Pflichtversicherte der gesetzlichen Rentenversicherung ohnehin bereits anspruchsberechtigt sind, in dieser Eigenschaft
    ebenfalls zum begünstigten Personenkreis. Darunter fallen insbesondere die in Anlage 1 Abschnitt B aufgeführten Personen.
  sentences:
  - Wann wird das Anrecht der ausgleichsberechtigten Person bei intern geteilter Altersvorsorge als abgeschlossen betrachtet?
  - Welche Personen sind in der Anlage 1 Abschnitt B bezüglich der Alterssicherung der Landwirte aufgeführt?
  - In welchen Fällen führt die Möglichkeit einer Beitragserstattung nicht zur Versagung der Anerkennung als betriebliche
    Altersversorgung?
- source_sentence: 233 Voraussetzung für die Förderung durch Sonderausgabenabzug nach § 10a EStG und Zulage nach Abschnitt
    XI EStG ist in den Fällen der Rz. 231 f., dass der Steuerpflichtige zum begünstigten Personenkreis gehört. Die zeitliche
    Zuordnung dieser Altersvorsorgebeiträge richtet sich grundsätzlich nach § 11 Abs. 2 EStG.
  sentences:
  - Wer gehört zum begünstigten Personenkreis für die Altersvorsorgeförderung?
  - Wie werden erstattete Kosten eines Altersvorsorgevertrags besteuert, wenn sie dem Steuerpflichtigen ausgezahlt werden?
  - Ist der Übertragungswert einer betrieblichen Altersversorgung bei einem Arbeitgeberwechsel steuerfrei?
- source_sentence: 127 Die Entnahme des Teilkapitalbetrags von bis zu 30 % des zur Verfügung stehenden Kapitals aus dem Vertrag
    hat zu Beginn der Auszahlungsphase zu erfolgen. Eine Verteilung über mehrere Auszahlungszeitpunkte ist nicht möglich.
  sentences:
  - Kann ich den Teilkapitalbetrag aus meiner Altersvorsorge zu verschiedenen Zeitpunkten entnehmen?
  - Welche Einkunftsarten können Leistungen aus einer Versorgungszusage des Arbeitgebers sein?
  - Was ist im Todesfall des Zulageberechtigten bezüglich der Förderbeiträge zu tun?
- source_sentence: '67 Abwandlung des Beispiels 1 in Rn. 66: A erhält zudem zwei Kinderzulagen für seine in den Jahren 2004
    und 2005 geborenen Kinder. Beitragspflichtige Einnahmen 53.000 € 4 % 2.120 € höchstens 2.100 € anzusetzen 2.100 € abzüglich
    Zulage 175 € Mindesteigenbeitrag (§ 86 Abs. 1 Satz 2 EStG) 1.925 € Sockelbetrag (§ 86 Abs. 1 Satz 4 EStG) 60 € maßgebend
    (§ 86 Abs. 1 Satz 5 EStG) 1.925 € Die von A geleisteten Beiträge übersteigen den Mindesteigenbeitrag. Die Zulage wird
    nicht gekürzt.'
  sentences:
  - Wird die Zulage für A gekürzt, wenn die Beiträge den Mindesteigenbeitrag übersteigen?
  - Was versteht man unter Sonderzahlungen des Arbeitgebers?
  - Wie erfolgt die Besteuerung bei der ausgleichsberechtigten Person nach einer externen Teilung?
