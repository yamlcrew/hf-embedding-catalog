- source_sentence: من هو يهوذا ؟
  sentences:
  - 'يهوذا بن يعقوب (بالعبرية: יהודה): هو أحد أبناء النبي يعقوب (إسرائيل) الاثنا عشر، واسم والدته هو: ليا بنت لابان. ومعناه
    حسب قاموس سترونج العبري: المشهور أو المفروح به، وهو من المعاني المتعلقة بالحمد والشكر.'
  - نشأت المفوضية السامية للأمم المتحدة لشؤون للاجئين في أعقاب الحرب العالمية الثانية بهدف مساعدة الأوروبيين النازحين نتيجة
    لذلك الصراع. وبروح من التفاؤل، فقد تم تأسيس مكتب مفوض الأمم المتحدة لشؤون اللاجئين في 14 ديسمبر/كانون الأول 1950 من قبل
    الجمعية العامة للأمم المتحدة لولاية مدتها ثلاث سنوات لاستكمال عمله ومن ثم حله. وفي في 28 يوليو/تموز من العام التالي، تم
    اعتماد اتفاقية الأمم المتحدة المتعلقة بوضع اللاجئين - وهي الأساس القانوني لمساعدة اللاجئين والنظام الأساسي الذي يوجه عمل
    المفوضية.
  - حاشد (خط المسند:13px13px13px13px) قبيلة يمنية قديمة من قبائل همدان وأقدم ذكر يشير إليها يعود للقرن الرابع قبل الميلاد.[1]
    هي أكثر القبائل نفوذاً سياسيا في الجمهورية اليمنية منذ سقوط الملكية عام 1962 وبعد الوحدة اليمنية[2] تشكل هي وقبائل بكيل
    قسمي قبائل همدان اليمنية من عصور قديمة.
- source_sentence: ماهو عقار الفياغرا ؟
  sentences:
  - التهاب المفصل التنكسي أو الداء المفصلي التنكسي أو الفُصال  أو الفصال العظمي  يعتبر من أكثر أمراض العظام انتشاراً، وهو
    عبارة عن تلف غير قابل للتجدد يصيب الأنسجة الغضروفية المفصلية التي تعمل على تقليل الاحتكاك الناتج من حركة المفاصل الدائمة،
    وتعمل كوسادة لحماية العظام. تآكل هذه الطبقة الواقية بسبب المرض يؤدي إلى احتكاك الأنسجة العظمية، ويصحب الاحتكاك إلتهابات
    تصيب جوف المفصل وتتسبب في الآلام. بشكل عام فإن جميع المفاصل في الجسم معرضة لتغيرات وتلف في النسيج الغضروفي، ولكن أكثر
    المفاصل شيوعاً بالإصابة بهذا المرض مفاصل الركبة والورك  لكونهما أكثر المفاصل تحملاً لوزن الإنسان.
  - 'تعدّ إمارة أبوظبي العاصمة الاتحادية لدولة الإمارات العربية المتحدة. وتقع الإمارة على الحدود مع المملكة العربية السعودية
    وسلطنة عمان والخليج العربي بين خطي عرض 22.5 و25 درجة شمالا وخطي طول 51 و55 درجة شرقا. وهي تعدّ أكبر الإمارات السبع مع
    مساحة تصل إلى 67,340 كيلو متر مربع بنسبة تصل إلى 86.7% دون احتساب الجزر. يصل عدد سكان إمارة أبوظبي إلى 1,967,659 نسمة
    (تقديرات منتصف 2010) مع معدل نمو السكان%7.7 (2005-2010) وتصل المساحة المزروعة بالدونم فيها 556,109 في عام (2010) وعدد
    الأشجار المثمرة 283,976. وتشتهر فيها زراعة التمور، الخضروات، تربية الدواجن، إنتاج مشتقات الحليب والأسماك.[74] تضم إمارة
    أبوظبي ثلاث مناطق رئيسية هي مدينة أبوظبي، المنطقة الشرقية والمنطقة الغربية. ومدينة أبوظبي هي عاصمة الدولة، وهي مقر رئيس
    الدولة ومجلس الوزراء وأغلب الوزارات والمؤسسات الاتحادية وكذلك السفارات الأجنبية، وفيها ميناء زايد ومطار أبوظبي الدولي،
    وكذلك تقع فيها معظم شركات البترول والمنشآت والأسواق التجارية. ويعد كورنيش أبوظبي وما فيه من حدائق ونافورات من المعالم
    الجمالية للمدينة. أما المنطقة الشرقية وعاصمتها مدينة العين منطقة شديدة الخصوبة وتكثر فيها الخضرة والمزارع والحدائق، وتتوفر
    فيها المياه الطبيعية التي تتدفق عن طريق قنوات تحت الأرض وعن طريق الآبار. ومن أهم معالمها: حدائق العين الفايضة وجبل حفيت
    وحديقة ألعاب الهيلي وحديقة الحيوانات ومتحف العين للآثار.'
  - سيلدينافيل والذي يعرف بالاسم التجاري فياغرا (أو فياجرا) هو مستحضر طبي أنتجته شركة العقاقير العالمية فيزر. يُؤخد علاج الفياغرا
    لعلاج حالات الضعف أو العجز الجنسي لدى الرجال.
- source_sentence: كم عدد ألوان علم المثلية ؟
  sentences:
  - 'أعلنت تويتر في 12 أيلول/سبتمبر 2013 عن تقديمها لبعض الأوراق الخاصّة بالشركة لِصالح هيئة الأوراق المالية والبورصات الأمريكية
    وذلك من أجل إطلاق سوق الأوراق المالية.[77] تبيّن في وقت لاحق -حسب تسريبات وسائل الإعلام- أنّ الشركة قد قدّمت 800 صفحة
    لدخول البورصة.[78] في حقيقة الأمر كانت شركة تويتر تعتزمُ رفع واحد مليون دولار أمريكي كأساس سوق الأسهم لأول مرة.[79] نصَّ
    الاكتتاب الأولي على ضرورة نشاط 200.000.000+ مستخدم شهريا هذا فضلا عن نشر نصف مليار تغريدة في اليوم الواحد.[80] في 15 تشرين
    الأول/أكتوبر 2013 تم تعديل بنود الإيداع، [81] خاصّة بعدما لم تُحق الشركة ما كان متوقعًا بالنسبة لبورصة نيويورك لكنها سحقت
    التكهنات بخصوص أسهم التداول في بورصة ناسداك.[82] في السادس من تشرين الثاني/نوفمبر 2013؛ كانَ هناك حوالي 70 مليون سهم للتداول[83]
    بسعر 26 دولارا أمريكيا للسهم الواحد حسب ما جاء في وثائق جولدمان ساكس.[84] قامت الشركة في السابع من نوفمبر 2013 بتداول
    أسهمها في بورصة نيويورك حيث افتُتحت بـ 26 دولارا أمريكيا للسهم الواحد ثم وصلت إلى 44.90 دولارا أمريكيا عند نهاية التداول
    لتُقدَّر بذلك قيمة الشركة بحوالي 31 مليار دولار أمريكي.[85] تمّ تداول بعض الأسهم في اليوم نفسه فحصلَ ويليامز على مبلغ
    قدره 2.56 مليار دولار فيما نالَ دورسي مبلغ 1.05 مليار دولار في حين تلقّى كوستولو (مستثمر جديد في الشركة) مبلغ 345 مليون
    دولار.[86] بحلول الخامس من شباط/فبراير 2014؛ نشرت الشركة نتائجها الأولية كشركة مساهمة عامة وقد بلغت نسبة خسائرها الصافية
    مبلغَ 511 مليون دولار في الربع الرابع من عام 2013.[87] في 5 يناير/كانون الثانس من عام 2016؛ علّق الرئيس التنفيذي للشركة
    جاك دورسي على التقرير ثم أكّد عزمهُ على توسيع عدد الحروف المسموح بها إلى 10,000 حرف وإضافة أيقونة  -كما هو الحال في فيسبوك-
    عندَ تجاوز الـ 140 حرفا ثم قال:  ارتفعت أسهم تويتر في سبتمبر 2016 بنسبة 20% وذلك بعد دخول مشترين مُحتملين كبار مثلَ جوجل،[88]
    مايكروسوفت،[89][90][91] ساليسفورس،[92] فيريزون وشركة والت ديزني.[93][94] في السياق ذاته ذكر مجلس إدارة تويتر أنّ الصفقة
    قد تتمُ بحلول نهاية عام 2016.[95] ومع ذلك؛ لم تجرِ أيّ صفقة حيث انتشرت الكثير من الشائعات التي تُفيد بأنّ جميع المشترين
    المحتملين قد تراجعوا بسببِ المخاوف بشأن اختراق الخدمة أو شيء من هذا القبيل.[96][97][98][99][100]'
  - جامعة ميشيغان (بالإنجليزية:University of Michigan) هي جامعة بحثية أمريكية تأسست عام 1817 في ديترويت ثم حولت إلى آن آربر،
    ميشيغان وهي أقدم جامعة في الولاية، يدرس فيها الآن حوالي 43.000 طالب وطالبة.
  - جبران خليل جبران شاعر وكاتب ورسام عربي لبناني من أدباء وشعراء المهجر، هاجر صبيًا مع عائلته إلى الولايات المتحدة الأمريكية،
    وحصل على جنسيتها، ولد في 6 يناير 1883 في بلدة بشري ونشأ فقيرًا،[1] في شمال لبنان حين كانت تابعة لمتصرفية جبل لبنان العثمانية.
    توفي في نيويورك 10 ابريل 1931 بداء السل. ويعرف أيضاً بخليل جبران، وهو من أحفاد يوسف جبران الماروني البشعلاني. هاجر وهو
    صغير مع أمه إلى أمريكا عام 1895 حيث درس الفن وبدأ مشواره الأدبي. اشتهر عند العالم الغربي بكتابه الذي تم نشره سنة 1923
    وهو كتاب النبي (كتاب). أيضاً عرف جبران بالشاعر الأكثر مبيعًا بعد شكسبير ولاوزي.
- source_sentence: متى تاسس المنتخب الارجنتيني لكرة القدم؟
  sentences:
  - أنغريت كرامب كارينباور ؛ (مواليد 9 آب 1962)، يشار إليها في بعض الأحيان بالأحرف الأولى من اسمها واسم عائلتها AKK، [1] سياسية
    ألمانية تشغل منصب زعيمة الاتحاد الديمقراطي المسيحي (CDU) منذ انتخابها في مؤتمر الحزب في ديسمبر 2018، حيث خلفت أنغيلا ميركل
    في هذا المنصب. شغلت سابقاً منصب الأمينة العامة للحزب ورئيسة وزراء ولاية سارلاند من عام 2011 إلى عام 2018،[2] وهي أول امرأة
    ترأس حكومة سارلاند ورابع امرأة ترأس حكومة ولاية في ألمانيا.
  - 'ولد ميكيلانجيلو في قرية كابريزي قرب أريتسو بتوسكانا وترعرع في فلورنسا،[10] التي كانت مركز النهضة الأوروبية آنذاك، ومن
    محيطها المليء بمنجزات فناني النهضة السابقين إلى تحف الإغريق المذهلة، استطاع أن يتعلم ويستقي منها الكثير عن فن النحت والرسم.
    كانت أسرة ميكيلانجيلو من أبرز المصرفيين الصغار في فلورنسا، لكن والده، "لودفيكو دي ليوناردو دي بوناروتي دي سيموني"، شذ
    عن باقي أفراد العائلة، وشغل عدّة مناصب حكومية خلال حياته،[11] أما والدته فهي "فرانشيسكا دي نيري دل مينياتو دي سيينا".[12]
    زعمت أسرة بوناروتي أن أبنائها يتحدرون من "ماتيلدي التوسكانية" وهي إحدى نبيلات إيطاليا القديمات، وعلى الرغم من أن هذا الزعم
    ما زال غير مؤكد، إلا أن ميكيلانجيلو نفسه كان مؤمنًا به.[13] بعد بضعة أشهر من ولادة ميكيلانجيلو، عادت أسرته إلى فلورنسا،
    حيث قضى سنوات صباه، وفي سنة 1481، أي عندما كان يبلغ من العمر ست سنوات فحسب، توفيت والدته بعد صراع طويل مع المرض، فانتقل
    ميكيلانجيلو ليعيش مع أسرة رجل يعمل في قلع الحجارة ببلدة "سيتيغنانو"، حيث كان ولده يملك مقلعًا للرخام ومزرعة صغيرة.[12]
    أفاد جورجو فازاري أن ميكيلانجيلو قال: .[10]  أقدم والد ميكيلانجيلو، الذي كان قاضياً على بلدة كابريزي في ذلك الوقت،[14]
    على إرسال ولده إلى المعلّم "فرانشيسكو دا أوربينو" في فلورنسا، حتى يتعلّم قواعد اللغة،[10][15] لكن الفتى لم يُظهر ميلاً
    نحو العلم، بل كثيرًا ما كان يُفضل نسخ اللوحات في الكنائس، ويميل إلى صحبة الفنانين والرسامين.[15] في النهاية وافق الأب
    على رغبة ولده وسمح لهذا الصبي ذو ثلاثة عشر ربيعاً بأن يعمل لدى رسام جص يدعى دومينيكو غرلاندايو،[16][17] وعندما بلغ ميكيلانجيلو
    عامه الرابع عشر، كان والده قد أقنع دومنيكو بأن يُعلن تلميذه رسامًا.[18] يُعرف أن ميكيلانجيلو لم يستطع التوافق مع معلمه
    وكثيرًا ما كان يصطدم معه مما حذا به لينهي عمله لديه بعد أقل من سنة.[19] في عام 1489، طلب لورينزو دي ميديشي، حاكم فلورنسا
    بحكم الأمر الواقع، طلب من دومينيكو غرلاندايو أن يُرسل إليه أفضل طالبين في عهدته، فأرسل إليه الأخير كلاً من ميكيلانجيلو
    وفرانشيسكو غراناسي.[20] خلال الفترة الممتدة من عام 1490 حتى عام 1492، التحق ميكيلانجيلو بالمدرسة الإنسانية التي أسستها
    أسرة ميديشي لتدريس الفلسفة الإفلاطونية المحدثة، حيث تعلّم النحت على يد "بيرتولدو دي جيوفاني"، وتأثرت نظرته إلى الحياة
    وأنماط فنّه بآراء ونظريات الكثير من الفلاسفة والكتّأب المعروفين في ذلك الزمن، مثل: مارسيليو فيسينو، بيكو ديلا ميراندولا،
    وأنجلو بوليزيانو.[21] خلال هذه الفترة، أتمّ ميكيلانجيلو العمل على نقش "سيدة الأدراج" (1490–1492) ومعركة القناطرة (1491–1492)،
    وقد كانت الأخيرة مبنية على فكرة اقترحها أنجلو بوليزيانو، وكلّفه بها لورينزو دي ميديشي.[22] أدّى إعجاب بيرتولدو دي جيوفاني
    بعمل تلميذه أشد الإعجاب، إلى تولّد شعور بالغيرة عند زميل ميكيلانجيلو المدعو "بيترو توريغيانو"، فضربه على أنفه ضربةً قوية
    شوهت شكله، ويظهر هذا التشوه بشكل واضح في كل الرسومات الشخصية لوجه ميكيلانجيلو.[23]  على الرغم من إنكار ميكيلانجيلو لفضل
    غيرلاندايو في تعليمه أي شيء إلا أنه من الواضح أنه تعلم منه فن الرسم الجداري حيث أن رسومه الأولية كانت قد أظهرت طرق ومناهج
    اتبعها غيرلاندايو. في الفترة الممتدة بين عاميّ 1490 و1492 أمضى وقته في منزل لورينزو دي ميديشي المعروف بلورينزو العظيم
    الراعي الأهم للفنون في فلورنسا وحاكمها. حيث كان المنزل مكان دائم لاجتماع الفنانين الفلاسفة والشعراء. ومن المفترض أن ميكيلانجيلو
    قابل وتعلم من المعلم الكهل بيرتولدو الذي كان قد تدرب مع دوناتلو فنان القرن الخامس عشر في فلورنسا.[24]'
  - 'هيرمان هسه (بالألمانية: Hermann Hesse) ولد في كالف في ألمانيا في 2 يوليو 1877 وتوفي في مونتانيولا تيسن عام 9 أغسطس 1962؛
    وهو كاتب سويسري من أصل ألماني، عاش بداية شبابه مع عائلته المحافظة وجوها المدافع عن البروتستانتية بشكل مفرط؛ وكان هذا السبب
    الذي دفعه للهرب والاستقلال عن السلطة العائلية والاعتماد على نفسه والانخراط في مجال العمل وبشكل قاسي، حيث بدأ عمله ساعاتيا
    ثم بائع كتب في مكتبة، بعدها اتخذ التأليف والكتابة منهجا في حياته وعمله، وتزوج ثلاث مرات.'
- source_sentence: ما هي تقنية التصوير التجسيمي (الهولوجرام) ؟
  sentences:
  - جبهة التحرير الوطني (ج ت و) (وتـُعرف بالاختصار FLN لاسمها  ) وامينها العام الحالي جمال ولد عباس خلفا لعمار سعيداني. هو
    حزب سياسي اشتراكي في الجزائر و كان يمثل الجناح السياسي لجيش التحرير الوطني قبل الاستقلال. بدأ نشاطه بشكل سري قبل 1 نوفمبر
    1954 حيث كان هذا تاريخ اندلاع الثورة التحريرية المجيدة التي استشهد فيها أكثر من مليون ونصف مليون شهيد، فيه اتحد الشّعب
    الجزائري واحدا موحّدا، للحصول على استقلال الجزائر من الاستعمار الفرنسي.
  - 350px|تصغير أرمينيوس (Arminius)  (ولد 18 قبل الميلاد - توفى 21)، زعيم قبيلة الشيروسكيين الذي هزم الجيش الروماني في معركة
    فاروس أو المعروفة بـ معركة غابة تويتوبورغ.[1][2][3] نجح تحالف القبائل الجرمانية ضد الإمبراطورية الرومانية  في قطع الطريق
    على الجهود التي بذلها جرمانيكوس، ابن شقيق الإمبراطور تيبيريوس للسيطرة الأراضي الجرمانية شرقي نهر الراين ، حيث إنهزم جيش
    الرومان هزيمة كبيرة.  ورغم الجدل بين المؤرخين حول نتائج عدة معارك حاسمة تلت تلك المعركة لاستعادة هيبة الجيش الروماني (تاسيتوس،
    أنالس 2،22، سويتونيوس، كاليغولا 1.4). ولكن هزيمة الرومان كانت أكيدة وعملوا على ترك تلك المناطق . وعلى الرغم من أن أرمينيوس
    في نهاية المطاف لم ينجح في إقامة الوحدة بين القبائل الجرمانية، كان لنصره الكبير أثرا بعيد المدى على تاريخ اللاحق لكل من
    القبائل الجرمانية القديمة والإمبراطورية الرومانية، وأخيرا على أوروبا بأسرها. ويعتبر الأمان أن أرمينيوس هو أول بطل حربي
    في تاريخ ألمانيا.
