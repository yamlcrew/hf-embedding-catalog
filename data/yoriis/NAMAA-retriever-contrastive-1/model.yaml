  - source_sentence: ماهو عقار الفياغرا ؟
    sentences:
    - التهاب المفصل التنكسي أو الداء المفصلي التنكسي أو الفُصال  أو الفصال العظمي  يعتبر من أكثر أمراض العظام انتشاراً، وهو
      عبارة عن تلف غير قابل للتجدد يصيب الأنسجة الغضروفية المفصلية التي تعمل على تقليل الاحتكاك الناتج من حركة المفاصل الدائمة،
      وتعمل كوسادة لحماية العظام. تآكل هذه الطبقة الواقية بسبب المرض يؤدي إلى احتكاك الأنسجة العظمية، ويصحب الاحتكاك إلتهابات
      تصيب جوف المفصل وتتسبب في الآلام. بشكل عام فإن جميع المفاصل في الجسم معرضة لتغيرات وتلف في النسيج الغضروفي، ولكن أكثر
      المفاصل شيوعاً بالإصابة بهذا المرض مفاصل الركبة والورك  لكونهما أكثر المفاصل تحملاً لوزن الإنسان.
    - 'تعدّ إمارة أبوظبي العاصمة الاتحادية لدولة الإمارات العربية المتحدة. وتقع الإمارة على الحدود مع المملكة العربية السعودية
      وسلطنة عمان والخليج العربي بين خطي عرض 22.5 و25 درجة شمالا وخطي طول 51 و55 درجة شرقا. وهي تعدّ أكبر الإمارات السبع مع
      مساحة تصل إلى 67,340 كيلو متر مربع بنسبة تصل إلى 86.7% دون احتساب الجزر. يصل عدد سكان إمارة أبوظبي إلى 1,967,659 نسمة
      (تقديرات منتصف 2010) مع معدل نمو السكان%7.7 (2005-2010) وتصل المساحة المزروعة بالدونم فيها 556,109 في عام (2010) وعدد
      الأشجار المثمرة 283,976. وتشتهر فيها زراعة التمور، الخضروات، تربية الدواجن، إنتاج مشتقات الحليب والأسماك.[74] تضم إمارة
      أبوظبي ثلاث مناطق رئيسية هي مدينة أبوظبي، المنطقة الشرقية والمنطقة الغربية. ومدينة أبوظبي هي عاصمة الدولة، وهي مقر رئيس
      الدولة ومجلس الوزراء وأغلب الوزارات والمؤسسات الاتحادية وكذلك السفارات الأجنبية، وفيها ميناء زايد ومطار أبوظبي الدولي،
      وكذلك تقع فيها معظم شركات البترول والمنشآت والأسواق التجارية. ويعد كورنيش أبوظبي وما فيه من حدائق ونافورات من المعالم
      الجمالية للمدينة. أما المنطقة الشرقية وعاصمتها مدينة العين منطقة شديدة الخصوبة وتكثر فيها الخضرة والمزارع والحدائق،
      وتتوفر فيها المياه الطبيعية التي تتدفق عن طريق قنوات تحت الأرض وعن طريق الآبار. ومن أهم معالمها: حدائق العين الفايضة
      وجبل حفيت وحديقة ألعاب الهيلي وحديقة الحيوانات ومتحف العين للآثار.'
