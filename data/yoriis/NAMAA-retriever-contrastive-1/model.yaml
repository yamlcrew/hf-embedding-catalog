      لذلك الصراع. وبروح من التفاؤل، فقد تم تأسيس مكتب مفوض الأمم المتحدة لشؤون اللاجئين في 14 ديسمبر/كانون الأول 1950 من
      قبل الجمعية العامة للأمم المتحدة لولاية مدتها ثلاث سنوات لاستكمال عمله ومن ثم حله. وفي في 28 يوليو/تموز من العام التالي،
