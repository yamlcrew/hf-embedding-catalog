    - جبهة التحرير الوطني (ج ت و) (وتـُعرف بالاختصار FLN لاسمها  ) وامينها العام الحالي جمال ولد عباس خلفا لعمار سعيداني.
      هو حزب سياسي اشتراكي في الجزائر و كان يمثل الجناح السياسي لجيش التحرير الوطني قبل الاستقلال. بدأ نشاطه بشكل سري قبل
      1 نوفمبر 1954 حيث كان هذا تاريخ اندلاع الثورة التحريرية المجيدة التي استشهد فيها أكثر من مليون ونصف مليون شهيد، فيه
      اتحد الشّعب الجزائري واحدا موحّدا، للحصول على استقلال الجزائر من الاستعمار الفرنسي.
    - 350px|تصغير أرمينيوس (Arminius)  (ولد 18 قبل الميلاد - توفى 21)، زعيم قبيلة الشيروسكيين الذي هزم الجيش الروماني في معركة
      فاروس أو المعروفة بـ معركة غابة تويتوبورغ.[1][2][3] نجح تحالف القبائل الجرمانية ضد الإمبراطورية الرومانية  في قطع الطريق
      على الجهود التي بذلها جرمانيكوس، ابن شقيق الإمبراطور تيبيريوس للسيطرة الأراضي الجرمانية شرقي نهر الراين ، حيث إنهزم
      جيش الرومان هزيمة كبيرة.  ورغم الجدل بين المؤرخين حول نتائج عدة معارك حاسمة تلت تلك المعركة لاستعادة هيبة الجيش الروماني
      (تاسيتوس، أنالس 2،22، سويتونيوس، كاليغولا 1.4). ولكن هزيمة الرومان كانت أكيدة وعملوا على ترك تلك المناطق . وعلى الرغم
      من أن أرمينيوس في نهاية المطاف لم ينجح في إقامة الوحدة بين القبائل الجرمانية، كان لنصره الكبير أثرا بعيد المدى على تاريخ
      اللاحق لكل من القبائل الجرمانية القديمة والإمبراطورية الرومانية، وأخيرا على أوروبا بأسرها. ويعتبر الأمان أن أرمينيوس
      هو أول بطل حربي في تاريخ ألمانيا.
    - الصور التجسيمية أو الذواكر الهولوغرافية  تمتلك خاصية فريدة تمكنها من إعادة تكوين صورة الأجسام بأبعادها الثلاثة في الفضاء
      . تتم تلك العملية بإستخدام أشعة الليزر.
