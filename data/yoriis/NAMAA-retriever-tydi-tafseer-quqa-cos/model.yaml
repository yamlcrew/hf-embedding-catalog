- source_sentence: أين يقع مقر الاتحاد الدولي للاسكواش؟
  sentences:
  - و يقع مقره قي سانت ليوناردز-أون-سي قي إنجلترا. اعتبارا من عام 2009 فقد ضم الاتحاد الدولي 147 عضوا من الاتحادات الوطنية.
    وقد قام الاتحاد الدولي للاسكواش بتقديم طلب لأضافة لعبة الاسكواش إلى الألعاب الأولمبية قي الألعاب الأولمبية الصيفية المقرر
    أقامتها قي ريو دي جانيرو عام 2016. ورئيس الاتحاد الدولي للإسكواش هو السعودي زياد التركي
  - 'الأم الجافية  تتكون من طبقتين: طبقة خارجية ليفية تلتصق بالعظام fibrous layer، وطبقة داخلية ناعمة serous layer.[1][2][3]
    والطبقة الناعمة تمشي معا مع الطبقة الليفية لكنها تنفصل عنها في الأماكن التي يجب أن تكون فيها الأوردة والحواجز. يأتي تجهيز
    الدم لهذه الطبقة من شرايين كثيرة صغيرة ومن شريان كبير واحد هو الشريان الغلافي الوسطي middle meningeal artery، وهو فرع
    من شريان الفك العلوي maxillary artery ويدخل الجمجمة من الثقب الشائك foramen spinosum. عندها يكون قد أصبح في الحفرة القحفية
    الوسطية يجري إلى الأمام والخارج ثم يصعد وينقسم إلى قسم أمامي وقسم خلفي.'
  - إنَّ دراسة السنوات الأولى من عُمر الدولة العُثمانيَّة والرجوع إلى أصلها الأوَّل هو من الأمور الجدليَّة التي يخوض فيها
    الباحثون والمؤرخون، وذلك بسبب اختلاط الأحداث الواقعيَّة بالأساطير والروايات المنقولة عبر الأجيال؛ لكن عمومًا، يتَّفق أغلب
    الباحثين أنَّ الدولة العُثمانيَّة ظهرت ككيان سياسي فعليّ قُرابة عام 1299م، وأنَّها كانت في بداية عهدها إمارة تابعة للسلطنة
    السلجوقيَّة الروميَّة ثُمَّ استقلَّت عنها بعد انهيار تلك الأخيرة وتفتتها، وأنَّ أوَّل زُعمائها كان عُثمان بن أرطغرل من
    قبيلة قايي التُركيَّة الغُزيَّة.[2] وبهذا فهو يُعتبر مؤسس هذه السُلالة الملكيَّة، وهي تُنسب إليه.
- source_sentence: متى حصلت المرأة على حق التصويت في امريكا ؟
  sentences:
  - إلا أن الغالبية العظمى من السكان تفضل استخدام اللغة العربية؛ لارتباطها بالدين والتراث الإسلامي؛ حيث أن أغلب سكان إرتريا
    مسلمون، كما أنها لا تزال اللغة الرسمية في دواوين الدولة والإذاعة والتلفزيون والصحيفة الرسمية الناطقة باسم الدولة، وهي
    صحيفة إرتريا الحديثة.
  - تورينو (Torino Football Club SpA) هو نادي كرة قدم معروف من تورينو، إيطاليا. يلقب الفريق "غراناتا" (الكستنائيون، إشارة
    إلى لون زي الفريق) و"تورو" (الثور، إشارة لشعار مدينة تورينو). كان الفريق منذ تأسيسه حتى عام 1970 يعرف باسم "A.C. Torino"،
    وبعد ذلك "Torino Calcio" حتى عام 2005، حينما أخذ مسماه الحالي. صعد الفريق للدوري الإيطالي الدرجة الأولى (سيري آ) بعدما
    احتل المركز الثالث الموسم الماضي في الدرجة الثانية. في عام 1992 وصل إلى المباراة النهائية من كأس الاتحاد الأوروبي التي
    خسرها أمام نادي أياكس أمستردام الهولندي.
  - في يناير من عام 1996، كانت بداية شركة جوجل في صورة مشروع بحثي بدأه لاري بيج وسرعان ما شارك فيه سيرجي برن، وذلك حينما كانا
    طالبين يقومان بتحضير رسالة الدكتوراه في جامعة ستانفورد بولاية كاليفورنيا.[8] وقد افترضا أن محرك البحث الذي يقوم بتحليل
    العلاقات بين مواقع الشبكة من شأنه أن يوفر ترتيبًا لنتائج البحث أفضل من ذلك الذي توفره أي أساليب متبعة بالفعل والتي تقوم
    بترتيب النتائج حسب عدد مرات ظهور المصطلح الذي يتم البحث عنه داخل الصفحة.[9] وكان قد أطلق على محرك البحث الذي قاما بإنشائه
    اسم باك رب  لأن النظام الخاص به كان يفحص روابط العودة الموجودة بالموقع من أجل تقييم درجة أهمية الموقع[10][11]، وكان هناك
    محرك بحث صغير اسمه "Rankdex" يحاول بالفعل البحث عن تقنية مماثلة.[12] ومن منطلق اقتناع "بيدج" و"برن" بأن الصفحات التي تتضمن
    روابط تشير لصفحات أخرى ذات صلة هي الصفحات الأكثر ارتباطًا بعملية البحث. قام كلاهما باختبار فرضيتهما كجزء من الدراسة التي
    يقومان بها، ومن ثم وضعا أساس محرك البحث الخاص بهما. ولقد استخدم محرك البحث آنذاك موقع الويب الخاص في جامعة "ستانفورد"
    مستخدمين النطاق google.stanford.edu.[13] وفي 15 سبتمبر 1997 تم تسجيل ملكية جوجل دوت كوم، وفي 4 سبتمبر عام 1998 تم تسجيل
    الشركة بإسم جوجل. وكان مقرها مرآب سيارات بمنزل أحد أصدقاء "برن" و"بيدج" في مدينة "مينلو بارك بولاية كاليفورنيا. وقد بلغ
    إجمالي المبالغ المبدئية التي تم جمعها لتأسيس الشركة الجديدة 1.1 مليون دولار أمريكي تقريبًا، ويشمل هذا المبلغ الإجمالي
    شيكًا مصرفيًا قيمته 100,000 دولار أمريكي حرره آندي بيكتولشيم أحد مؤسسي شركة صن ميكروسيستمز.[14].  وفي مارس عام 1999، نقلت
    الشركة مقرها إلى مدينة بالو ألتو وهي المدينة التي شهدت بداية العديد من التقنيات الأخرى البارزة التي ظهرت في منطقة وادي
    السيليكون.[15].[15] وبعد أن اتسعت الشركة بسرعة بحيث لم يكفها امتلاكها لمقرين، قامت في عام 2003 بتأجير مجموعة من المباني
    من شركة سيليكون غرافيكس في مدينة ماونتن فيو.[16].[16] ومنذ ذلك الوقت تسكن الشركة في هذا المكان وعُرف المقر باسم جوجل بليكس
    المستمد من المصطلح الرياضي "جوجل بلكس" وهو الرقم واحد متبوع بعدد غوغول من الأصفار. وفي عام 2006، اشترت شركة جوجل مجموعة
    المباني من شركة سيليكون غرافيكس مقابل 319 مليون دولار أمريكي.[17].  وقد لاقى محرك البحث جوجل إقبالًا هائلًا من مستخدمي
    شبكة الإنترنت الذين أعجبهم تصميمه البسيط ونتائجه المفيدة.[18].[18] وفي عام 2000، بدأت شركة جوجل تبيع الإعلانات ومعها الكلمات
    المفتاحية للبحث[8] وكانت الإعلانات تعتمد على النصوص لكي لا تكون الصفحات مكدسة ويتم تحميلها بأقصى سرعة.[8] وكانت الكلمات
    المفتاحية يتم بيعها اعتمادًا على كل من عروض الأسعار وتقدير مدى فاعلية الإعلانات، وبدأت عروض الأسعار بسعر 0.05 دولار أمريكي
    لكل مرة نقر يقوم بها المستخدم على الإعلان.[8] ولقد كانت شركة ياهو! للتسويق المستحوذة على الشركة المعروفة سابقا باسم "جو
    تو" الشركة الرائدة في هذا الأمر وقد أعيد تسميتها مؤخرًا باسم شركة "أوفرتشر للخدمات" قبل أن تستحوذ عليها شركة ياهو! وتعيد
    تسميتها باسم "بحث ياهو! للتسويق".[19].[20].[21][22] أما شركة جو تو عبارة هي عن شركة إعلانات تابعة أنشأها "بيل جروس" وكانت
    أولى الشركات التي نجحت في تقديم خدمة البحث المعتمدة على سداد مبلغ مالي مقابل تحديد ما يتم البحث عنه. وكانت شركة "أوفرتشر
    للخدمات" قد قامت في وقت لاحق بمقاضاة شركة جوجل بسبب قيامها من خلال خدمة جوجل أدووردز بانتهاك براءة اختراعها لخاصيتي المزايدة
    وسداد مبلغ مالي معين مقابل كل مرة نقر على الإعلانات. وقد تم تسوية القضية خارج ساحة القضاء، حيث اتفقت شركة جوجل على أن
    تخصص لشركة ياهو أسهم عادية بها مقابل الحصول على ترخيص استخدام دائم للخصائص السابقة[23]. وبالتالي ازدهرت شركة جوجل في استقرار
    محققة الأرباح والإيرادات في الوقت الذي فشل فيه منافسوها في سوق الإنترنت الجديد[8].
- source_sentence: متى عاش مروان حديد؟
  sentences:
  - هاري ترومان ؛ (8 مايو 1884 - 26 ديسمبر 1972)، هو الرئيس الثالث والثلاثون للولايات المتحدة الأمريكية، تولى المنصب من 12
    أبريل 1945 حتى 20 يناير 1953، كان ترومان يشغل منصب نائب الرئيس الأمريكي لمدة 82 يومًا ثم تولى الرئاسة خلفاً للرئيس فرانكلين
    روزفلت الذي توفي في المنصب، وكان عضواً في مجلس الشيوخ الأمريكي عن ولاية ميسوري (1935-1945)، أشرف ترومان على إنهاء الحرب
    العالمية الثانية واستسلام كلٍ من ألمانيا النازية واليابان، كما أمر بإطلاق قنبلتي هيروشيما وناجازاكي في أغسطس 1945، وعمل
    على إنشاء منظمة حلف شمال الأطلسي في عام 1949، كذلك بدأت في عهده الحرب الباردة بين الولايات المتحدة والاتحاد السوفيتي،
    كما ساهم في التدخل العسكري في الحرب الكورية عام 1950.
  - اللغات الكنعانية، هي عبارة عن مجموعة من اللغات السامية التي تنتمي إلى اللغات السامية الشمالية الغربية - الفرع الكنعاني.
    وقد انتشرت اللغات الكنعانية في أرض كنعان التي تشمل أساساً فلسطين والساحل الغربي للبنان والجنوب الغربي من سوريا على لسان
    الكنعانيين بعد هجرتهم إليها، وكانت هذه اللغات عبارة عن مجموعة من اللهجات المتقاربة من بعضها البعض في الصفات اللغوية.
  - تقع أردبيل على بعد حوالي 70 كم من بحر قزوين، 210 كم عن مدينة تبريز. وعلى متوسط إرتفاع 1263 متر وتصل مساحتها إلى 18.011
    كم².
- source_sentence: ما هي نسبة السكر في الدم عند الإنسان السليم؟
  sentences:
  - الذبحة الصدرية (خُناق الصدر)  هي الإحساس بالألم  أو الضغط في الصدر، الناتج عن إقفار (نقص في الإمداد الدموي وبالتالي في
    الأكسجين الوارد) في عضل القلب، عادة نتيجة انسداد أو تشنج في الشرايين التاجية (الأوعية المغذية لعضلة القلب).[1] في حين
    أن الذبحة الصدرية قد تنبع من فقر الدم، اضطراب النظم القلبي أو قصور القلب إلا أن السبب الرئيسي للذبحة هو الداء القلبي الإكليلي
    وينتج عن تصلب عصيدي في الشرايين القلبية.
  - البروستاغلاندين هي عبارة عن مستقلبات حمض الأراكيدونيك، تنتج من فعل الفوسفوليباز (توجد عدة أنواع من هذا الأنزيم) على الدهن
    الفسفوري الغشائي، وتلعب دورا هاما في الكائنات الحية.
  - زامبيا أو رسميا جمهورية زامبيا هي بلد غير ساحلي في جنوب القارة الأفريقية،[1] المجاورة جمهورية الكونغو الديمقراطية في الشمال،
    وتنزانيا من الشمال الشرقي، ملاوي من الشرق وموزمبيق وزيمبابوي وبوتسوانا وناميبيا إلى الجنوب، وأنغولا إلى الغرب . العاصمة
    هي لوساكا، في الجزء الجنوبي الأوسط من زامبيا. ويتركز السكان أساسا حول لوساكا في الجنوب ومقاطعة حزام النحاس في الشمال الغربي،
    والمحاور الاقتصادية الأساسية للبلد.
- source_sentence: متى بدأت حروب الهند الصينية؟
  sentences:
  - 'لم يكن لينين يهتم كثيرا بالشؤون الدينية ونادرا ماكان يتحدث عن الأديان لكنه أعطى حرية العبادة للمتدينين وقد تبين ذلك في
    نص ورسالة وجهها إلى المسلمين في 24 نوفمبر 1917 جاء فيها: يا أيها المسلمون بروسيا وسيبيريا وتركستان والقوقاز … يا أيها
    الذين هدم القياصرة مساجدهم وعبث الطغاة بمعتقداتهم وعاداتهم أن معتقداتكم وعاداتكم ومؤسساتكم القومية والثقافية أصبحت اليوم
    حرة مقدسة، نظموا حياتكم القومية بكامل الحرية وبدون قيد فهي حق لكم. وأعلموا أن الثورة العظيمة وسوفياتات النواب والعمال
    والجنود والفلاحيين تحمي حقوقكم وحقوق جميع شعوب روسيا. وقد تم وضع برنامج ضخم لما يمكن أن يطلق عليه اليوم “التمييز المضـــاد”،
    سُمي بالكورنيزاتسيا، أي إحلال السكان المحليين محل المستوطنين الروس. وقد بدأ بطرد المستعمرين الروس والقوزاق والمتحدثين
    باسمهم من الكنيسة الأرثوذكسية الروسية في تلك المناطق. وتوقفت اللغة الروسية عن الهيمنة، وعادت اللغات المحلية إلى المدارس
    وإلى الحكومة وإلى المطبوعات. وقد تمت ترقية السكان المحليين ليشغلوا مناصب في الدولة وفي الأحزاب الشيوعية المحلية وأعطوا
    أولوية حتى عن الروس في التعيينات. وقد أُنشئت جامعات لتدريب جيل جديد من القادة غير الروس.'
  - تصغير|يسار|لوحة فسيفساء أثرية في مدينة زليتن مدينة زليتن تقع على الساحل الغربي لليبيا، على مسافة 150 كم تقريبًا شرق العاصمة
    طرابلس، تحدها من الغرب مدينة الخمس، مصراتة شرقاَ، بني وليد جنوبًا، والبحر المتوسط شمالاً. بلغ عدد سكانها حسب إحصاء 2006
    حوالي "184 ألف" نسمة، ووفقا لأخر إحصاء(2012م)طبقا للسجل المدني فإن عدد سكان زليتن هو "231 ألف" نسمة واشتهرت المدينة بكونها
    المركز الأبرز في البلاد لتعليم الفقه المالكي وتحفيظ القرآن في واحدة من أهم المؤسسات التعليمية في البلاد على مر 500 عام،
    وهي زاوية سيدي عبد السلام.
  - 'على الرغم من التعاون التكتيكي بين الفرنسيين وفيت مين، إلا أن سياساتهم كانت متناقضة: فيهدّف الفرنسيين إلى إعادة تأسيس
    قاعدة استعمارية، بينما أرادت هانوي استقلالا كليّا. كشفت النوايا الفرنسية في قرار جورج تييري داجينلي، المندوب الأعلى للهند
    الصينية، بإعلان كوتشينصين كجمهورية مستقلة ذاتيا في يونيو/حزيران عام 1946. المفاوضات الأخرى لم تحل الخلافات الأساسية بين
    الفرنسيين وفيت مين. في أواخر نوفمبر/تشرين الثّاني عام 1946، قصفت سفينة بحرية فرنسية هيفونج، أصيب فيها عدّة آلاف من المدنيين؛
    ردت فيت مين بمحاولة غمر القوّات الفرنسية في هانوي في ديسمبر/كانون الأول لتبدأ الحرب الهندوصينية الأولى.'
