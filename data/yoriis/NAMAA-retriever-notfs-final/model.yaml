widgetData:
- source_sentence: جزء من آیة دل على أن التحية بغير السلام ليست من سمات المؤمنين فكيف إذا كانت بلفظ غير مشروع، أذكره؟.
  sentences:
  - ومن الليل فسبحه وأدبار السجود{40} ق
  - ولو شئنا لآتينا كل نفس هداها ولكن حق القول مني لأملأن جهنم من الجنة والناس أجمعين{13}السجدة.
  - واصبر نفسك مع الذين يدعون ربهم بالغداة والعشي يريدون وجهه ولا تعد عيناك عنهم تريد زينة الحياة الدنيا ولا تطع من أغفلنا
    قلبه عن ذكرنا واتبع هواه وكان أمره فرطا{28} الكهف
- source_sentence: ماذا كان دعاء نوح عليه السلام على قومه الكافرين ولأهله المؤمنين ؟
  sentences:
  - ولو أن قرآنا سيرت به الجبال أو قطعت به الأرض أو كلم به الموتى بل لله الأمر جميعا أفلم ييأس الذين آمنوا أن لو يشاء الله
    لهدى الناس جميعا ولا يزال الذين كفروا تصيبهم بما صنعوا قارعة أو تحل قريبا من دارهم حتى يأتي وعد الله إن الله لا يخلف الميعاد{31}
    الرعد
  - قال الملأ الذين كفروا من قومه ما نراك إلا بشرا مثلنا وما نراك اتبعك إلا الذين هم أراذلنا بادي الرأي وما نرى لكم علينا
    من فضل بل نظنكم كاذبين{27}هود
  - إن الشيطان لكم عدو فاتخذوه عدوا إنما يدعو حزبه ليكونوا من أصحاب السعير{6} فاطر
- source_sentence: ما عدد الملائكة التي تحمل عرش الله تعالى ؟
  sentences:
  - الذين يأكلون الربا لا يقومون إلا كما يقوم الذي يتخبطه الشيطان من المس ذلك بأنهم قالوا إنما البيع مثل الربا وأحل الله البيع
    وحرم الربا فمن جاءه موعظة من ربه فانتهى فله ما سلف وأمره إلى الله ومن عاد فأولئك أصحاب النار هم فيها خالدون{275} البقرة
  - انفروا خفافا وثقالا وجاهدوا بأموالكم وأنفسكم في سبيل الله ذلكم خير لكم إن كنتم تعلمون{41} التوبة
  - والذين إذا فعلوا فاحشة أو ظلموا أنفسهم ذكروا الله فاستغفروا لذنوبهم ومن يغفر الذنوب إلا الله ولم يصروا على ما فعلوا وهم
    يعلمون{135} آل عمران
- source_sentence: من هم الذين عقروا الناقة؟
  sentences:
  - الذين استجابوا لله والرسول من بعد ما أصابهم القرح للذين أحسنوا منهم واتقوا أجر عظيم {172}آل عمران
  - ولا يأتل أولو الفضل منكم والسعة أن يؤتوا أولي القربى والمساكين والمهاجرين في سبيل الله وليعفوا وليصفحوا ألا تحبون أن يغفر
    الله لكم والله غفور رحيم {22}النور
  - فإذا نفخ في الصور نفخة واحدة{13} وحملت الأرض والجبال فدكتا دكة واحدة{14} فيومئذ وقعت الواقعة{15} وانشقت السماء فهي يومئذ
    واهية{16}الحاقة.
- source_sentence: هل الإيمان يزيد وينقص ؟
  sentences:
  - وأزلفت الجنة للمتقين غير بعيد{31} هذا ما توعدون لكل أواب حفيظ{32} من خشي الرحمن بالغيب وجاء بقلب منيب{33} ادخلوها بسلام
    ذلك يوم الخلود{34} ق.
  - هذان خصمان اختصموا في ربهم فالذين كفروا قطعت لهم ثياب من نار يصب من فوق رؤوسهم الحميم{19} يصهر به ما في بطونهم والجلود{20}
    ولهم مقامع من حديد{21} كلما أرادوا أن يخرجوا منها من غم أعيدوا فيها وذوقوا عذاب الحريق{22} إن الله يدخل الذين آمنوا وعملوا
    الصالحات جنات تجري من تحتها الأنهار يحلون فيها من أساور من ذهب ولؤلؤا ولباسهم فيها حرير{23} وهدوا إلى الطيب من القول وهدوا
    إلى صراط الحميد{24}الحج
  - فإذا قرأت القرآن فاستعذ بالله من الشيطان الرجيم{98} النحل
