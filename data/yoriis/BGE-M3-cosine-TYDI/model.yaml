      بهذا الاسم تيمنا بإمبراطورية "آشانتي" في التي وجدت يوما في "غانا". في تلك الإمبراطورية تمتعت النساء بالقوة والنفوذ،
      وذلك ما تمنته الأم لابنتها.جدها، جيمس، كان ناشطا في مجال الحقوق المدنية، وساعد السيد مارتن لوثر كينج خلال فترة الستينيات.
      وعندما كبرت آشانتي، بدأت في تلقى دروس الرقص كما انضمت لجوقة الكنيسة. ذهبت آشانتي لمركز بيرنيس جونسون للفنون الثقافية،
      حيث درست أنماط الرقص المختلفة، بما في ذلك النقر، الجاز، الباليه، الرقص الأفريقي، الرقص الحديث والهيب هوب. رقصت مع فرقة
      برو (للكبار) بأماكن مختلفة مثل قاعة كارنيجي، مسرح أبولو، أكاديمية بروكلين للموسيقى، قاعة آفري فيشر ومسرح الطيف الأسود.
      كما قامت بالأداء أيضا في حفل الجوائز الكاريبية، ورقصت مع جوديث جاميسون من شركة آلفين آيلي للرقص. وبقيادة الممثلة ومصممة
      الرقصات ديبي آلين، قامت آشانتي بالآداء في فيلم ديزني التلفزيوني "بولي" Polly, بجانب نجوم كبار مثل كيشيا نايت بوليام
      وفيليشيا رشاد.
  - source_sentence: ما هي الحركة الصهيونية؟
    sentences:
    - كانت هذه الحروب الأهلية قد أنهكت اليثربيين أوسهم وخزرجهم , وبعد يوم بعاث قرر عقلاء الطرفين وضع حد لهذه الحال فاتفقوا
      على تنصيب رجل واحد منهم يقبله الطرفان فوقع الاختيار على عبد الله بن أبي بن سلول , وفيما كانا يُجهزان له ملكه حدثت بيعة
      العقبة الأولى والثانية ودخل الإسلام يثرب ثم هاجر إليها النبي , فزال مُلك ابن أبي قبل أن يهنأ به ولو ليوم واحد فعاش عبدالله
      بن أُبي تحت سيادة النبي كأكبر منافق ومعادٍ للنبي عرفه التاريخ الإسلامي , والسبب في هذا واضحٌ فهو كان يرى أن النبي قد
      انتزعه ملكه الذي كان يُجهز له . وكان يوم بعاث نهاية لحروب يثرب بين الأوس والخزرج حيث أنهم اصطلحوا على ايقاف الحرب ثم
      دخلوا في الإسلام جميعاً وأصبحت سيوفهم تُسل على عدو واحد دفاعاً عن عقيدتهم .
    - شريف كواشي (1982-2015) وهو أحد المنفذين لحادثة الهجوم على صحيفة شارلي إبدو في 7 يناير 2015 رفقة شقيقه الأكبر سعيد كواشي.
    - أهم الأنهار التي تصب في البحر الأسود هو نهر الدانوب في الشمال الغربي و نهر الدنيستر و الدنييبر في الشمال و نهر الكوبان
      في الشرق و نهر سقاريا في الجنوب و لا يوجد فيه سوى ثلاث جزر صغيرة مهمة مميزة و هي زميني و بيرتيران و كفكن . مساحة المسطح
      المائي للبحر الأسود تزيد عن 420 ألف كم مربع وأقصى عمق له 2210 م و أقصر عرض له يقع فيما بين رأس سارتيش في شبه جزيرة القرم
      شمالا و رأس سارتيش جنوبا و لا يزيد على 263 كم .
  - source_sentence: ما هي كونشيرتو دي آرانخويث؟
    sentences:
    - زلزال سيتشوان 2008 هو زلزال حدث في مقاطعة سيشوان جنوب غرب جمهورية الصين الشعبية في 12 مايو 2008 بالتوقيت المحلي 14:28:04،
      06:28:04 غرينيتش. حسب نشرة للمسح الجيولوجي الأمريكي أن شدة الزلزال بلغت 7.8 حسب مقياس ريختر.[1]. شعر بالزلزال سكان بكين،
      شانغهاي، بانكوك، هونغ كونغ، هانوي، وتايبيه.[2]
    - 'البصمة الوراثية أو الطبعة الوراثية أو بصمة الحمض النووي هي أحد وسائل التعرف على الشخص عن طريق مقارنة مقاطع من الحمض
      النووي الريبوزي منقوص الأكسجين.[1][2][3] وتعتبر البصمة الوراثية أهم تقدم للبشرية ضمن مجال البحث الجنائي من أجل محاربة
      الجريمة. إن كل ما يحتاج إليه المحققون لتحديد البصمة الوراثية هو العثور على دليل بشري في مكان الجريمة، مثل: قطرات العرق،
      السائل المنوي، الشعر، واللعاب. فكل ما يلمس المرء، ومهما بلغت بساطة اللمسة، سيترك أثراً لبصمة وراثية فريدة.'
    - حَقلُ الغَوَّار هو حقل نفط يقع بمحافظة الأحساء، بالمنطقة الشرقية، في السعودية[1]. يبلغ اتساعه 280 في 30 كلم، وهو أكبر
      حقل نفط معروف في العالم[1]، وهو السبب في أكثر من نصف إنتاج نصف كمية البترول التراكمية في السعودية. تمتلك أرامكو السعودية
      حقل الغوّار وتديره بالكامل، هناك معلومات قليلة نسبياً عن الحقل، بسبب تحفظ الحكومة السعودية على بيانات الأداء والإنتاج،
      ولكن تتوفر عنه بعض المعلومات السابقة أثناء الدولة السعودية الثالثة من المنشورات الطارئة أو القولية[1].
  - source_sentence: متى ولد زين الدين زيدان ؟
    sentences:
    - الدرفلة هي عملية صناعية تعتبر إحدى طرق تشكيل المعادن. وتعتمد فكرتها على تمرير المعدن على البارد أو الساخن عبر أجسام
      أسطوانية ثقيلة وذات صلادة عالية (تسمى الدرافيل) وذلك بهدف تقليل سمك الصفائح أو قطر القضبان.[1][2]
    - والرئيس الحالي للبرتغال هو مارسيلو ريبيلو دي سوزا، الذي تولى منصبه في 9 مارس 2016.
    - هو أبو عبد الله حمود عقلا الشعيبي (ولد عام 1346هـ - توفي عام 1422 هـ) اسمه بالكامل حمود بن عبد الله بن عقلاء بن محمد
      بن علي بن عقلاء الشعيبي الخالدي من آل جناح من بني خالد ولد في بلدة الشقة من أعمال القصيم، نشأ في بيت دين وكرم فلما كان
      عمره ست سنوات التحق بالكتّاب فتعلم القراءة والكتابة والحساب، وفي عام 1352 هـ أصيب الشعيبي بمرض الجدري مما أدى إلى فقده
      بصره، وقد حرص عليه والده منذ نعومة أظفاره وكان والده عبد الله صاحب زراعة وفلاحة فتعلم الشعيبي منه مع فقده لبصره الزراعة
      والسقي وغيرها.
