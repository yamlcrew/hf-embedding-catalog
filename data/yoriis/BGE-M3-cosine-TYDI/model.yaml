- source_sentence: متى تم اغتيال شكري بالعيد؟
  sentences:
  - كان إنريكو فيرمي أول من قام بتصويب النيوترونات على اليورانيوم عام 1934 ولكنه لم ينجح في تفسير النتائج. وقام العالم الكيميائي
    الألماني أوتو هان وزميلته ليز مايتنر وزميلهما فريتز شتراسمان بتلك الأبحاث وقاموا بتحليل المواد الناتجة عن التفاعل. وكانت
    مفاجأة لم يستطيعوا تفسيرها أولاً، إذ أنهم وجدوا عناصر جديدة تكونت من خلال التفاعل. وكان أن أعادوا التجربة باستخدام يورانيوم
    عالي النقاء، فكانت النتيجة هي ما وجدوه من قبل وتكوّن عنصر الباريوم. والعدد الذري للباريوم نصف العدد الذري لليورانيوم تقريباً.
    كان ذلك عام 1938 وبعدها بدأت الحرب العالمية الثانية واضطرت ليزا مايتنر إلى مغادرة ألمانيا نظراً لاضطهاد النازية لليهود.
    وسافرت ليزا إلى السويد حيث كان أحد أقربائها يعمل هناك وهو روبرت فريتش. وقصت عليه نتائج تجربة اليورانيوم.
  - ولاية سيدي بوزيد هي إحدى ولايات الجمهورية التونسية الـ24 من سنة1973, مساحتها 6994 كم مربع. وبلغ عدد سكان الولاية 912 429
    ساكن حسب إحصائيات رسمية لسنة 2014[1], بها 12 معتمدية أكبرها سيدي بوزيد الغربية وسيدي بوزيد الشرقية والمكناسي والرقاب وجلمة
    والمزونة، هي ولاية فلاحية من أهم إنتاجها الخضر وزيت الزيتون. مركز الولاية مدينة سيدي بوزيد.
  - في ديسمبر 1800 أعلن جورج أوستن على غير توقع قرار تقاعده من عمله ككاهن، وغادر ستيفنتون وانتقل بالعائلة إلى باث. على الرغم
    من أن قرار التقاعد والسفر جيدًا للأشقاء الكبار، صدمت جين لمعرفتها أنها ستغادر المنزل الوحيد الذي طالما عرفته.[53] عدم
    قدرتها على الإنتاج كان دلالة على ارتباك عقلها عندما عاشت في باث. قامت ببعض المراجعات لرواية "سوزان"، وبدأت ثم ترطت رواية
    جديدة تدعى "آل واتسون" ، لكن لم يكن هناك ما يضاهي الإنتاج المثمر ما بين 1795 و1799.[54] اقترحت تومالين أن ذلك يعكس اكتئابًا
    عميقًا يعجزها ككاتبة. عارضها هونان وقال أن أوستن كتبت أو راجعت كتاباتها الخام طوال حياتها ماعدا بضعة أشهر عقب وفاة والدها.[55]
- source_sentence: ما هو عدد ممالك إسكندنافيا؟
  sentences:
  - يهتم هذا العلم فعليا بدراسة الشروط الضرورية لنشأة الحياة، والآليات التي يمكن بها تحول ما ليس بحي إلى حي لكن هذه الاليات
    لا تزال غير مؤكدة حتى الآن. ومع ذلك، توجد العديد من النظريات العلمية لتفسير ظهور الحياة كما نعرفها اليوم، الذي يعتقد أنه
    يعود تاريخها إلى حوالي 3،5 إلى 3،8 مليارات سنة.
  - تم اغتيال الرئيس ماكينلي في سبتمبر 1901، وخلفه روزفلت إلى المنصب وهو بعمر 42 عاما، ليصبح أصغر رئيس للبلاد في تاريخها.
    وقاد الحزب والبلاد في الحقبة التقدمية، ودافع عن سياسته المحلية التي سميت "الاتفاق العادل"، واعدا بإنصاف المواطن العادي،
    وسحب الديون، وتنظيم سكك الحديد والغذاء النقي والعقاقير. كما جعل الحفاظ على الطبيعة من رأس أولوياته، وأنشأ عددا كبيرا من
    الحدائق الوطنية الجديدة والغابات والآثار بهدف الحفاظ على الموارد الطبيعية للبلاد. ركز روزفلت في سياسته الخارجية على أمريكا
    الوسطى، حيث بدأ بناء قناة بنما. وقام بتوسعة القوات البحرية للولايات المتحدة، وأرسل الأسطول الأبيض العظيم في جولة حول العالم
    لإبراز القوة البحرية للولايات المتحدة في جميع أنحاء العالم. كما نجح في إنهاء الحرب الروسية اليابانية، فأكسبته جهوده جائزة
    نوبل للسلام عام 1906.
  - ولدت آشانتي في حي جلين-كوف بولاية نيويورك بالولايات المتحدة الأمريكية، وهي أمريكية من أصل أفريقي. وقد ورثت آشانتي شغفها
    للموسيقى من والدتها تينا دوجلاس والتي عملت سابقا كمدرسة للرقص، كذلك من أبيها كين-كيد توماس دوجلاس والذي عمل سابقا كمغني.
    ولها اخت صغرى تسمى كيناشيا.عمها، فوفو لاندفور، شغل منصب عمدة آتلانتيك سيتي بولاية نيو جيرزي. وقد قامت والدة آشانتي بتسميتها
    بهذا الاسم تيمنا بإمبراطورية "آشانتي" في التي وجدت يوما في "غانا". في تلك الإمبراطورية تمتعت النساء بالقوة والنفوذ، وذلك
    ما تمنته الأم لابنتها.جدها، جيمس، كان ناشطا في مجال الحقوق المدنية، وساعد السيد مارتن لوثر كينج خلال فترة الستينيات. وعندما
    كبرت آشانتي، بدأت في تلقى دروس الرقص كما انضمت لجوقة الكنيسة. ذهبت آشانتي لمركز بيرنيس جونسون للفنون الثقافية، حيث درست
    أنماط الرقص المختلفة، بما في ذلك النقر، الجاز، الباليه، الرقص الأفريقي، الرقص الحديث والهيب هوب. رقصت مع فرقة برو (للكبار)
    بأماكن مختلفة مثل قاعة كارنيجي، مسرح أبولو، أكاديمية بروكلين للموسيقى، قاعة آفري فيشر ومسرح الطيف الأسود. كما قامت بالأداء
    أيضا في حفل الجوائز الكاريبية، ورقصت مع جوديث جاميسون من شركة آلفين آيلي للرقص. وبقيادة الممثلة ومصممة الرقصات ديبي آلين،
    قامت آشانتي بالآداء في فيلم ديزني التلفزيوني "بولي" Polly, بجانب نجوم كبار مثل كيشيا نايت بوليام وفيليشيا رشاد.
- source_sentence: ما هي الحركة الصهيونية؟
  sentences:
  - كانت هذه الحروب الأهلية قد أنهكت اليثربيين أوسهم وخزرجهم , وبعد يوم بعاث قرر عقلاء الطرفين وضع حد لهذه الحال فاتفقوا على
    تنصيب رجل واحد منهم يقبله الطرفان فوقع الاختيار على عبد الله بن أبي بن سلول , وفيما كانا يُجهزان له ملكه حدثت بيعة العقبة
    الأولى والثانية ودخل الإسلام يثرب ثم هاجر إليها النبي , فزال مُلك ابن أبي قبل أن يهنأ به ولو ليوم واحد فعاش عبدالله بن
    أُبي تحت سيادة النبي كأكبر منافق ومعادٍ للنبي عرفه التاريخ الإسلامي , والسبب في هذا واضحٌ فهو كان يرى أن النبي قد انتزعه
    ملكه الذي كان يُجهز له . وكان يوم بعاث نهاية لحروب يثرب بين الأوس والخزرج حيث أنهم اصطلحوا على ايقاف الحرب ثم دخلوا في
    الإسلام جميعاً وأصبحت سيوفهم تُسل على عدو واحد دفاعاً عن عقيدتهم .
  - شريف كواشي (1982-2015) وهو أحد المنفذين لحادثة الهجوم على صحيفة شارلي إبدو في 7 يناير 2015 رفقة شقيقه الأكبر سعيد كواشي.
  - أهم الأنهار التي تصب في البحر الأسود هو نهر الدانوب في الشمال الغربي و نهر الدنيستر و الدنييبر في الشمال و نهر الكوبان
    في الشرق و نهر سقاريا في الجنوب و لا يوجد فيه سوى ثلاث جزر صغيرة مهمة مميزة و هي زميني و بيرتيران و كفكن . مساحة المسطح
    المائي للبحر الأسود تزيد عن 420 ألف كم مربع وأقصى عمق له 2210 م و أقصر عرض له يقع فيما بين رأس سارتيش في شبه جزيرة القرم
    شمالا و رأس سارتيش جنوبا و لا يزيد على 263 كم .
- source_sentence: ما هي كونشيرتو دي آرانخويث؟
  sentences:
  - زلزال سيتشوان 2008 هو زلزال حدث في مقاطعة سيشوان جنوب غرب جمهورية الصين الشعبية في 12 مايو 2008 بالتوقيت المحلي 14:28:04،
    06:28:04 غرينيتش. حسب نشرة للمسح الجيولوجي الأمريكي أن شدة الزلزال بلغت 7.8 حسب مقياس ريختر.[1]. شعر بالزلزال سكان بكين،
    شانغهاي، بانكوك، هونغ كونغ، هانوي، وتايبيه.[2]
  - 'البصمة الوراثية أو الطبعة الوراثية أو بصمة الحمض النووي هي أحد وسائل التعرف على الشخص عن طريق مقارنة مقاطع من الحمض النووي
    الريبوزي منقوص الأكسجين.[1][2][3] وتعتبر البصمة الوراثية أهم تقدم للبشرية ضمن مجال البحث الجنائي من أجل محاربة الجريمة.
    إن كل ما يحتاج إليه المحققون لتحديد البصمة الوراثية هو العثور على دليل بشري في مكان الجريمة، مثل: قطرات العرق، السائل
    المنوي، الشعر، واللعاب. فكل ما يلمس المرء، ومهما بلغت بساطة اللمسة، سيترك أثراً لبصمة وراثية فريدة.'
  - حَقلُ الغَوَّار هو حقل نفط يقع بمحافظة الأحساء، بالمنطقة الشرقية، في السعودية[1]. يبلغ اتساعه 280 في 30 كلم، وهو أكبر
    حقل نفط معروف في العالم[1]، وهو السبب في أكثر من نصف إنتاج نصف كمية البترول التراكمية في السعودية. تمتلك أرامكو السعودية
    حقل الغوّار وتديره بالكامل، هناك معلومات قليلة نسبياً عن الحقل، بسبب تحفظ الحكومة السعودية على بيانات الأداء والإنتاج،
    ولكن تتوفر عنه بعض المعلومات السابقة أثناء الدولة السعودية الثالثة من المنشورات الطارئة أو القولية[1].
- source_sentence: متى ولد زين الدين زيدان ؟
  sentences:
  - الدرفلة هي عملية صناعية تعتبر إحدى طرق تشكيل المعادن. وتعتمد فكرتها على تمرير المعدن على البارد أو الساخن عبر أجسام أسطوانية
    ثقيلة وذات صلادة عالية (تسمى الدرافيل) وذلك بهدف تقليل سمك الصفائح أو قطر القضبان.[1][2]
  - والرئيس الحالي للبرتغال هو مارسيلو ريبيلو دي سوزا، الذي تولى منصبه في 9 مارس 2016.
  - هو أبو عبد الله حمود عقلا الشعيبي (ولد عام 1346هـ - توفي عام 1422 هـ) اسمه بالكامل حمود بن عبد الله بن عقلاء بن محمد بن
    علي بن عقلاء الشعيبي الخالدي من آل جناح من بني خالد ولد في بلدة الشقة من أعمال القصيم، نشأ في بيت دين وكرم فلما كان عمره
    ست سنوات التحق بالكتّاب فتعلم القراءة والكتابة والحساب، وفي عام 1352 هـ أصيب الشعيبي بمرض الجدري مما أدى إلى فقده بصره،
    وقد حرص عليه والده منذ نعومة أظفاره وكان والده عبد الله صاحب زراعة وفلاحة فتعلم الشعيبي منه مع فقده لبصره الزراعة والسقي
    وغيرها.
