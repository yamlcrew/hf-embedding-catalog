widgetData:
- source_sentence: واتبعوا عطف على نبذ ما تتلوا أي تلت الشياطين على عهد ملك سليمان من السحر وكانت دفنته تحت كرسيه لما نزع
    ملكه أو كانت تسترق السمع وتضم إليه أكاذيب وتلقيه إلى الكهنة فيدونونه وفشا ذلك وشاع أن الجن تعلم الغيب فجمع سليمان الكتب
    ودفنها فلما مات دلت الشياطين عليها الناس فاستخرجوها فوجدوا فيها السحر فقالوا إنما ملككم بهذا فتعلموه فرفضوا كتب أنبيائهم
    قال تعالى تبرئه لسليمان وردا على اليهود في قولهم انظروا إلى محمد يذكر سليمان في الأنبياء وما كان إلا ساحرا وما كفر سليمان
    أي لم يعمل السحر لأنه كفر ولكن بالتشديد والتخفيف الشياطين كفروا يعلمون الناس السحر الجملة حال من ضمير كفروا و يعلمونهم
    ما أنزل على الملكين أي ألهماه من السحر وقرئ بكسر اللام الكائنين ببابل بلد في سواد العراق هاروت وماروت بدل أو عطف بيان
    للملكين قال ابن عباس هما ساحران كانا يعلمان السحر وقيل ملكان أنزلا لتعليمه ابتلاء من الله للناس وما يعلمان من زائدة أحد
    حتى يقولا له نصحا إنما نحن فتنة بلية من الله إلى الناس ليمتحنهم بتعليمه فمن تعلمه كفر ومن تركه فهو مؤمن فلا تكفر بتعلمه
    فإن أبى إلا التعليم علماه فيتعلمون منهما ما يفرقون به بين المرء وزوجه بأن يبغض كلا إلى الآخر وما هم أي السحرة بضارين به
    بالسحر من زائدة أحد إلا بإذن الله بإرادته ويتعلمون ما يضرهم في الآخرة ولا ينفعهم وهو السحر ولقد لام قسم علموا أي اليهود
    لمن لام ابتداء معلقة لما قبلها ومن موصلة اشتراه اختاره أو استبدله بكتاب الله ماله في الآخرة من خلاق نصيب في الجنة ولبئس
    ما شيئا شروا باعوا به أنفسهم أي الشارين أي حظها من الآخرة إن تعلموه حيث أوجب لهم النار لو كانوا يعلمون حقيقة ما يصيرون
    إليه من العذاب ما تعلموه
  sentences:
  - ولا يحسبن الذين كفروا أنما نملي لهم خير لأنفسهم ۚ إنما نملي لهم ليزدادوا إثما ۚ ولهم عذاب مهين
  - فمن أظلم ممن افترىٰ على الله كذبا أو كذب بآياته ۚ أولٰئك ينالهم نصيبهم من الكتاب ۖ حتىٰ إذا جاءتهم رسلنا يتوفونهم قالوا
    أين ما كنتم تدعون من دون الله ۖ قالوا ضلوا عنا وشهدوا علىٰ أنفسهم أنهم كانوا كافرين
  - الله الذي له ما في السماوات وما في الأرض ۗ وويل للكافرين من عذاب شديد
- source_sentence: من جاء بالحسنة فله خير منها ثواب بسببها وهو عشر أمثالها ومن جاء بالسيئة فلا يجزى الذين عملوا السيئات إلا
    جزاء ما كانوا يعملون أي مثله
  sentences:
  - وإذا صرفت أبصارهم تلقاء أصحاب النار قالوا ربنا لا تجعلنا مع القوم الظالمين
  - وتمت كلمت ربك صدقا وعدلا ۚ لا مبدل لكلماته ۚ وهو السميع العليم
  - فتلقىٰ آدم من ربه كلمات فتاب عليه ۚ إنه هو التواب الرحيم
- source_sentence: أو لم يروا أنا نسوق الماء إلى الأرض الجرز اليابسة التي لا نبات فيها فنخرج به زرعا تأكل منه أنعامهم وأنفسهم
    أفلا يبصرون هذا فيعلمون أنا نقدر على إعادتهم
  sentences:
  - ولسليمان الريح عاصفة تجري بأمره إلى الأرض التي باركنا فيها ۚ وكنا بكل شيء عالمين
  - والله جعل لكم مما خلق ظلالا وجعل لكم من الجبال أكنانا وجعل لكم سرابيل تقيكم الحر وسرابيل تقيكم بأسكم ۚ كذٰلك يتم نعمته
    عليكم لعلكم تسلمون
  - الله الذي خلق السماوات والأرض وأنزل من السماء ماء فأخرج به من الثمرات رزقا لكم ۖ وسخر لكم الفلك لتجري في البحر بأمره ۖ
    وسخر لكم الأنهار
- source_sentence: ولقد أرسلنا فيهم منذرين من الرسل مخوفين
  sentences:
  - وجعلوا بينه وبين الجنة نسبا ۚ ولقد علمت الجنة إنهم لمحضرون
  - وإن ربك لهو العزيز الرحيم
  - قال سآوي إلىٰ جبل يعصمني من الماء ۚ قال لا عاصم اليوم من أمر الله إلا من رحم ۚ وحال بينهما الموج فكان من المغرقين
- source_sentence: انظر كيف ضربوا لك الأمثال بالمسحور والكاهن والشاعر فضلوا بذلك عن الهدى فلا يستطيعون سبيلا طريقا إليه وقالوا
    منكرين للبعث
  sentences:
  - ألم نجعل الأرض كفاتا
  - وقد كفروا به من قبل ۖ ويقذفون بالغيب من مكان بعيد
  - فاصبر علىٰ ما يقولون وسبح بحمد ربك قبل طلوع الشمس وقبل الغروب
