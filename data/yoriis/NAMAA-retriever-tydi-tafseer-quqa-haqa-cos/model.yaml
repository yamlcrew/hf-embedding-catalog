  sentences:
  - 'عن أنس رضي الله عنه عن النبي ﷺ قال: (أقيموا صفوفكم فإني أراكم من وراء ظهري)، وكان أحدنا يلزق منكبه بمنكب صاحبه، وقدمه
    بقدمه. رواه البخاري'
  - 'عن عائشة رضي الله عنها أن النبي ﷺ قال: (صلّوا فيما بين أن يغيب الشفق إلى ثلث الليل). متفق عليه'
  - 'حُذيْفَةَ رضي الله عنه، قَالَ: سَمِعْتُ رَسُولَ الله ﷺ يَقُولُ: «لَا يَدْخُلُ الجَنَّةَ  قَتَّاتٌ». رواه البخاري (6056)،
    ومسلم (105).'
- source_sentence: كيف نصلي في السفر؟
  sentences:
  - 'حديث  عمر بن الخطاب رضي الله عنه، قَالَ: بَيْنَمَا نَحْنُ عِنْدَ رَسُولِ الله ﷺ ذَاتَ يَوْمٍ، إِذْ طَلَعَ عَلَيْنَا رَجُلٌ
    شَدِيدُ بَيَاضِ الثِّيَابِ، شَدِيدُ سَوَادِ الشَّعَرِ، لَا يُرَى عَلَيْهِ أَثَرُ السَّفَرِ، وَلَا يَعْرِفُهُ مِنَّا أَحَدٌ،
    حَتَّى جَلَسَ إِلَى النَّبِيِّ ﷺ، فَأَسْنَدَ رُكْبَتَيْهِ إِلَى رُكْبَتَيْهِ، وَوَضَعَ كَفَّيْهِ عَلَى فَخِذَيْهِ، وَقَالَ:
    يَا مُحَمَّدُ أَخْبِرْنِي عَنِ الإِسْلَامِ، فَقَالَ رَسُولُ الله ﷺ: «الإِسْلَامُ أَنْ تَشْهَدَ أَنْ لَا إِلَهَ إِلَّا
    الله وَأَنَّ مُحَمَّدًا رَسُولُ الله ﷺ، وَتُقِيمَ الصَّلَاةَ، وَتُؤْتِيَ الزَّكَاةَ، وَتَصُومَ رَمَضَانَ، وَتَحُجَّ البَيْتَ
    إِنِ اسْتَطَعْتَ إِلَيْهِ سَبِيلًا»، قَالَ: صَدَقْتَ، قَالَ: فَعَجِبْنَا لَهُ يَسْأَلُهُ، وَيُصَدِّقُهُ، قَالَ: فَأَخْبِرْنِي
    عَنِ الإِيمَانِ، قَالَ: «أَنْ تُؤْمِنَ بِالله، وَمَلَائِكَتِهِ، وَكُتُبِهِ، وَرُسُلِهِ، وَاليَوْمِ الآخِرِ، وَتُؤْمِنَ
    بِالقَدَرِ خَيْرِهِ وَشَرِّهِ»، قَالَ: صَدَقْتَ، قَالَ: فَأَخْبِرْنِي عَنِ الإِحْسَانِ، قَالَ: «أَنْ تَعْبُدَ الله كَأَنَّكَ
    تَرَاهُ، فَإِنْ لَمْ تَكُنْ تَرَاهُ فَإِنَّهُ يَرَاكَ»، قَالَ: فَأَخْبِرْنِي عَنِ السَّاعَةِ، قَالَ: «مَا المَسْئُولُ
    عَنْهَا بِأَعْلَمَ مِنَ السَّائِلِ» قَالَ: فَأَخْبِرْنِي عَنْ أَمَارَتِهَا، قَالَ: «أَنْ تَلِدَ الأَمَةُ رَبَّتَهَا، وَأَنْ
    تَرَى الـحُفَاةَ العُرَاةَ العَالَةَ رِعَاءَ الشَّاءِ يَتَطَاوَلُونَ فِي البُنْيَانِ»، قَالَ: ثُمَّ انْطَلَقَ فَلَبِثْتُ
    مَلِيًّا، ثُمَّ قَالَ لِي: «يَا عُمَرُ أَتَدْرِي مَنِ السَّائِلُ؟» قُلتُ: الله وَرَسُولُهُ أَعْلَمُ، قَالَ: «فَإِنَّهُ
    جِبْرِيلُ أَتَاكُمْ يُعَلِّمُكُمْ دِينَكُمْ» رواه مسلم (8).'
  - 'عن مالك بن الحويرث رضي الله عنه قال: أتيت النبي ﷺ في نفر من قومي، فأقمنا عنده عشرين ليلة - وكان رحيماً رفيقاً- فلما رأى
    شوقنا إلى أهالينا قال ﷺ: (ارجعوا فكونوا فيهم، وعلّموهم، وصلُّوا، فإذا حضرت الصلاة فليؤذن لكم أحدكم، وليؤمكم أكبركم). متفق
    عليه'
  - 'أَبِي سَعِيدٍ الخُدْرِيِّ رضي الله عنه، قَالَ: سَمِعْتُ النَّبِيَّ ﷺ يَقُولُ: «مَنْ صَامَ يَوْمًا فِي سَبِيلِ الله، بَعَّدَ
    الله وَجْهَهُ عَنِ النَّارِ سَبْعِينَ خَرِيفًا». رواه البخاري (2840)، ومسلم (1153).'
- source_sentence: كم شعب الإيمان ؟
  sentences:
  - 'حديث  البَرَاءِ بْنِ عَازِبٍ رضي الله عنه، عَنِ النَّبِيِّ ﷺ قَالَ: «الخَالَةُ بِمَنْزِلَةِ الأُمِّ». رواه البخاري (2699).'
