      رأى شوقنا إلى أهالينا قال ﷺ: (ارجعوا فكونوا فيهم، وعلّموهم، وصلُّوا، فإذا حضرت الصلاة فليؤذن لكم أحدكم، وليؤمكم أكبركم).
      متفق عليه'
    - 'أَبِي سَعِيدٍ الخُدْرِيِّ رضي الله عنه، قَالَ: سَمِعْتُ النَّبِيَّ ﷺ يَقُولُ: «مَنْ صَامَ يَوْمًا فِي سَبِيلِ الله،
      بَعَّدَ الله وَجْهَهُ عَنِ النَّارِ سَبْعِينَ خَرِيفًا». رواه البخاري (2840)، ومسلم (1153).'
  - source_sentence: كم شعب الإيمان ؟
    sentences:
    - 'حديث  البَرَاءِ بْنِ عَازِبٍ رضي الله عنه، عَنِ النَّبِيِّ ﷺ قَالَ: «الخَالَةُ بِمَنْزِلَةِ الأُمِّ». رواه البخاري
      (2699).'
    - 'حديث  عمر بن الخطاب رضي الله عنه، قَالَ: بَيْنَمَا نَحْنُ عِنْدَ رَسُولِ الله ﷺ ذَاتَ يَوْمٍ، إِذْ طَلَعَ عَلَيْنَا
      رَجُلٌ شَدِيدُ بَيَاضِ الثِّيَابِ، شَدِيدُ سَوَادِ الشَّعَرِ، لَا يُرَى عَلَيْهِ أَثَرُ السَّفَرِ، وَلَا يَعْرِفُهُ
      مِنَّا أَحَدٌ، حَتَّى جَلَسَ إِلَى النَّبِيِّ ﷺ، فَأَسْنَدَ رُكْبَتَيْهِ إِلَى رُكْبَتَيْهِ، وَوَضَعَ كَفَّيْهِ عَلَى
      فَخِذَيْهِ، وَقَالَ: يَا مُحَمَّدُ أَخْبِرْنِي عَنِ الإِسْلَامِ، فَقَالَ رَسُولُ الله ﷺ: «الإِسْلَامُ أَنْ تَشْهَدَ
      أَنْ لَا إِلَهَ إِلَّا الله وَأَنَّ مُحَمَّدًا رَسُولُ الله ﷺ، وَتُقِيمَ الصَّلَاةَ، وَتُؤْتِيَ الزَّكَاةَ، وَتَصُومَ
      رَمَضَانَ، وَتَحُجَّ البَيْتَ إِنِ اسْتَطَعْتَ إِلَيْهِ سَبِيلًا»، قَالَ: صَدَقْتَ، قَالَ: فَعَجِبْنَا لَهُ يَسْأَلُهُ،
      وَيُصَدِّقُهُ، قَالَ: فَأَخْبِرْنِي عَنِ الإِيمَانِ، قَالَ: «أَنْ تُؤْمِنَ بِالله، وَمَلَائِكَتِهِ، وَكُتُبِهِ، وَرُسُلِهِ،
      وَاليَوْمِ الآخِرِ، وَتُؤْمِنَ بِالقَدَرِ خَيْرِهِ وَشَرِّهِ»، قَالَ: صَدَقْتَ، قَالَ: فَأَخْبِرْنِي عَنِ الإِحْسَانِ،
      قَالَ: «أَنْ تَعْبُدَ الله كَأَنَّكَ تَرَاهُ، فَإِنْ لَمْ تَكُنْ تَرَاهُ فَإِنَّهُ يَرَاكَ»، قَالَ: فَأَخْبِرْنِي عَنِ
      السَّاعَةِ، قَالَ: «مَا المَسْئُولُ عَنْهَا بِأَعْلَمَ مِنَ السَّائِلِ» قَالَ: فَأَخْبِرْنِي عَنْ أَمَارَتِهَا، قَالَ:
      «أَنْ تَلِدَ الأَمَةُ رَبَّتَهَا، وَأَنْ تَرَى الـحُفَاةَ العُرَاةَ العَالَةَ رِعَاءَ الشَّاءِ يَتَطَاوَلُونَ فِي البُنْيَانِ»،
      قَالَ: ثُمَّ انْطَلَقَ فَلَبِثْتُ مَلِيًّا، ثُمَّ قَالَ لِي: «يَا عُمَرُ أَتَدْرِي مَنِ السَّائِلُ؟» قُلتُ: الله وَرَسُولُهُ
      أَعْلَمُ، قَالَ: «فَإِنَّهُ جِبْرِيلُ أَتَاكُمْ يُعَلِّمُكُمْ دِينَكُمْ» رواه مسلم (8).'
    - 'حديث أَبِي هُرَيْرَةَ رضي الله عنه، قَالَ: قَالَ رَسُولُ الله ﷺ: «الإِيمَانُ بِضْعٌ وَسَبْعُونَ أَوْ بِضْعٌ وَسِتُّونَ
      شُعْبَةً، فَأَفْضَلُهَا قَوْلُ لَا إِلَهَ إِلَّا الله، وَأَدْنَاهَا إِمَاطَةُ الأَذَى عَنِ الطَّرِيقِ، وَالحَيَاءُ شُعْبَةٌ
      مِنَ الإِيمَانِ». رواه البخاري (9)، ومسلم (35).'
  - source_sentence: ما دليل على أن الحاج يقصر الصلاة في مكة؟
    sentences:
    - 'أَبِي هُرَيْرَةَ رضي الله عنه، قَالَ: قَالَ رَسُولُ الله ﷺ: «إِذَا دُعِيَ أَحَدُكُمْ، فَليُجِبْ، فَإِنْ كَانَ صَائِمًا،
      فَليُصَلِّ، وَإِنْ كَانَ مُفْطِرًا، فَليَطْعَمْ». رواه مسلم (1431).'
    - «اللهم اجعل في قلبي نوراً، وفي لساني نوراً، واجعل في سمعي نوراً، واجعل في بصري نوراً، واجعل من خلفي نورًا ومن أمامي
      نورا، واجعل من فوقي نوراً، ومن تحتي نوراً، اللهم أعطني نورًا». رواه مسلم
    - 'علّمنا الرسول صلى الله عليه وسلم أن نرد كيد الشيطان ونقول : (أمنت بالله ورسله، الله أحد الله الصمد، لم يلد ولم يُولّد،  ولم
      يكن له كفوًا أحد، ثم يَتفل عن يساره ثلاثا ولْيُستعذ من الشيطان ولينته فإن ذلك يذهب عنه) هذه خلاصة الأحادىيث الصحيحة
      الواردة في البخاري ومسلم و أحمد و أبي داود.'
