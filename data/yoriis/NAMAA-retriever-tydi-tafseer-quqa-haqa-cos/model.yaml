  - 'حديث أَبِي هُرَيْرَةَ رضي الله عنه، قَالَ: قَالَ رَسُولُ الله ﷺ: «الإِيمَانُ بِضْعٌ وَسَبْعُونَ أَوْ بِضْعٌ وَسِتُّونَ
    شُعْبَةً، فَأَفْضَلُهَا قَوْلُ لَا إِلَهَ إِلَّا الله، وَأَدْنَاهَا إِمَاطَةُ الأَذَى عَنِ الطَّرِيقِ، وَالحَيَاءُ شُعْبَةٌ
    مِنَ الإِيمَانِ». رواه البخاري (9)، ومسلم (35).'
- source_sentence: ما دليل على أن الحاج يقصر الصلاة في مكة؟
  sentences:
  - 'أَبِي هُرَيْرَةَ رضي الله عنه، قَالَ: قَالَ رَسُولُ الله ﷺ: «إِذَا دُعِيَ أَحَدُكُمْ، فَليُجِبْ، فَإِنْ كَانَ صَائِمًا،
    فَليُصَلِّ، وَإِنْ كَانَ مُفْطِرًا، فَليَطْعَمْ». رواه مسلم (1431).'
  - «اللهم اجعل في قلبي نوراً، وفي لساني نوراً، واجعل في سمعي نوراً، واجعل في بصري نوراً، واجعل من خلفي نورًا ومن أمامي نورا،
    واجعل من فوقي نوراً، ومن تحتي نوراً، اللهم أعطني نورًا». رواه مسلم
  - 'علّمنا الرسول صلى الله عليه وسلم أن نرد كيد الشيطان ونقول : (أمنت بالله ورسله، الله أحد الله الصمد، لم يلد ولم يُولّد،  ولم
    يكن له كفوًا أحد، ثم يَتفل عن يساره ثلاثا ولْيُستعذ من الشيطان ولينته فإن ذلك يذهب عنه) هذه خلاصة الأحادىيث الصحيحة الواردة
    في البخاري ومسلم و أحمد و أبي داود.'
- source_sentence: ما عقوبة من اقتنى كلبا غير كلب الصيد والماشية ؟
  sentences:
  - ( اِقرأوا القرآن واعملوا بِهِ وَلاَ تأكلوا بِهِ وَلاَ تستكثِروا به) (رواه أحمد)
  - 'حديث ابْنِ عُمَرَ رضي الله عنه، قَالَ: قَالَ رَسُولُ الله ﷺ: «مَنِ اقْتَنَى كَلبًا إِلَّا كَلبَ مَاشِيَةٍ، أَوْ ضَارٍ،
    نَقَصَ مِنْ عَمَلِهِ كُلَّ يَوْمٍ قِيرَاطَانِ». رواه مسلم (1574).'
  - 'حديث زَيْدِ بْنِ ثَابِتٍ رضي الله عنه، أَنَّ النَّبِيَّ ﷺ قَالَ: «أَفْضَلُ صَلاَةِ المَرْءِ فِي بَيْتِهِ إِلَّا الصَّلاَةَ
    المَكْتُوبَةَ». رواه البخاري (6113)، ومسلم (781).'
