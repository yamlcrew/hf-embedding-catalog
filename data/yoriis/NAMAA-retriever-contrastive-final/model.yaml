widgetData:
- source_sentence: ما عدد شهور السنة ؟
  sentences:
  - ولئن أخرنا عنهم العذاب إلى أمة معدودة ليقولن ما يحبسه ألا يوم يأتيهم ليس مصروفا عنهم وحاق بهم ما كانوا به يستهزئون{8}
    هود
  - يا أيها الناس ضرب مثل فاستمعوا له إن الذين تدعون من دون الله لن يخلقوا ذبابا ولو اجتمعوا له وإن يسلبهم الذباب شيئا لا
    يستنقذوه منه ضعف الطالب والمطلوب {73}الحج
  - أكان للناس عجبا أن أوحينا إلى رجل منهم أن أنذر الناس وبشر الذين آمنوا أن لهم قدم صدق عند ربهم قال الكافرون إن هذا لساحر
    مبين{2} يونس
- source_sentence: من هو المسيح؟
  sentences:
  - اذهب أنت وأخوك بآياتي ولا تنيا في ذكري {42} اذهبا إلى فرعون إنه طغى {43}طه
  - ودوا لو تكفرون كما كفروا فتكونون سواء فلا تتخذوا منهم أولياء حتى يهاجروا في سبيل الله فإن تولوا فخذوهم واقتلوهم حيث وجدتموهم
    ولا تتخذوا منهم وليا ولا نصيرا {89}النساء
  - هل ينظرون إلا أن تأتيهم الملآئكة أو يأتي ربك أو يأتي بعض آيات ربك يوم يأتي بعض آيات ربك لا ينفع نفسا إيمانها لم تكن آمنت
    من قبل أو كسبت في إيمانها خيرا قل انتظروا إنا منتظرون{158}الأنعام .
- source_sentence: هل الجنة والنار موجودتان الآن ؟
  sentences:
  - بل الإنسان على نفسه بصيرة{14} القيامة
  - إنك لا تسمع الموتى ولا تسمع الصم الدعاء إذا ولوا مدبرين {80} النمل
  - إنما يؤمن بآياتنا الذين إذا ذكروا بها خروا سجدا وسبحوا بحمد ربهم وهم لا يستكبرون {15}السجدة
- source_sentence: اجتهدوا في الصالحات، فثمة نعيم لا يبلى، وخیر لا ینقطع وجنة لا تفنی، هذا الجزاء الطبيعي للمتقين؛ ربي لا
    تحرمنا فضلك، أذكر الآية التي دلت على هذا المعنى؟.
  sentences:
  - إن الذين آمنوا وعملوا الصالحات سيجعل لهم الرحمن ودا{96} مريم
  - وقالوا الحمد لله الذي صدقنا وعده وأورثنا الأرض نتبوأ من الجنة حيث نشاء فنعم أجر العاملين{74} الزمر
  - فعقروا الناقة وعتوا عن أمر ربهم وقالوا يا صالح ائتنا بما تعدنا إن كنت من المرسلين{77} فأخذتهم الرجفة فأصبحوا في دارهم
    جاثمين{78}الأعراف.
- source_sentence: ما الأحوال التي يسقط فيها استقبال القبلة؟
  sentences:
  - الأخلاء يومئذ بعضهم لبعض عدو إلا المتقين{67} الزخرف
  - وقفينا على آثارهم بعيسى ابن مريم مصدقا لما بين يديه من التوراة وآتيناه الإنجيل فيه هدى ونور ومصدقا لما بين يديه من التوراة
    وهدى وموعظة للمتقين {46}المائدة
  - أحسب الناس أن يتركوا أن يقولوا آمنا وهم لا يفتنون{2} ولقد فتنا الذين من قبلهم فليعلمن الله الذين صدقوا وليعلمن الكاذبين{3}
    العنكبوت
