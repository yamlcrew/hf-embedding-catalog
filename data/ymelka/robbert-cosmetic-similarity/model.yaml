widgetData:
- source_sentence: Een milde reiniger speciaal ontwikkeld voor de gevoelige huid van mannen van 37 jaar. Deze reiniger helpt
    roodheid en onzuiverheden te verminderen, terwijl het de huid zacht en gehydrateerd achterlaat.
  sentences:
  - De Shiseido Waso Koshirice Tinted Spot Treatment SOS Imperfections Subtle Peach is een hybride behandeling en concealer
    die puistjes vervaagt en verzorgt. Met het antioxiderende Koshihikari-rijst extract en salicylzuur vermindert het direct
    oneffenheden en roodheid, terwijl het de huid voedt en beschermt. De formule bevat ook Japanse Shikuwasa-extract en glycyrrhizinaat
    voor een verbeterde huidbarrière en egale teint. Breng een kleine hoeveelheid aan op probleemzones 2-3 keer per dag voor
    een langdurig effect. Geschikt voor alle huidtypes.
  - Neutrogena Retinol Boost Intense Nacht Serum is een krachtig serum dat de huid 's nachts intensief verzorgt en herstelt.
    Dit serum bevat retinol, een krachtig ingrediënt dat de huidtextuur verbetert, fijne lijntjes en rimpels vermindert en
    de huidteint egaliseert. Daarnaast bevat het serum hyaluronzuur en vitamine C, die de huid hydrateren en beschermen tegen
    schadelijke invloeden van buitenaf. Breng elke avond een paar druppels aan op een gereinigde huid en masseer zachtjes
    in. Gebruik het serum in combinatie met een SPF overdag, aangezien retinol de huid gevoeliger kan maken voor de zon. Dit
    serum is geschikt voor alle huidtypes, maar kan irritatie veroorzaken bij een gevoelige huid.
  - 'Nivea Labello Protect+ Lippenbalsem SPF 15 Duo 2x4,8g verzorgt droge en gebarsten lippen, kalmeert direct en houdt je
    lippen 24u lang gehydrateerd. De formule trekt snel in en helpt gebarsten lippen te herstellen, terwijl de SPF 15 beschermt
    tegen schadelijke zonnestralen. Met actieve ingrediënten zoals sheaboter, jojoba-olie en vitamine E. Gebruik de lippenbalsem
    regelmatig voor zachte en soepele lippen. Let op: niet gebruiken bij allergie voor een van de ingrediënten.'
- source_sentence: Een voedingssupplement met essentiële voedingsstoffen en antioxidanten om de huid van binnenuit te voeden
    en te beschermen. Ideaal voor vrouwen van 29 jaar die streven naar een gezonde en stralende huid.
  sentences:
  - De Babor Shaping Vitamine ACE Lichaamscrème is een luxe crème die de huid intensief voedt en hydrateert. Dankzij de krachtige
    combinatie van vitamine A, C en E wordt de huid verstevigd, verhelderd en beschermd tegen vrije radicalen. Deze crème
    is ideaal voor het verbeteren van de elasticiteit en stevigheid van de huid, waardoor het uiterlijk van cellulitis en
    striae wordt verminderd. De actieve ingrediënten dringen diep door in de huid om langdurige resultaten te bieden. Breng
    de crème dagelijks aan op een gereinigde huid en masseer zachtjes in tot het volledig is opgenomen. Vermijd contact met
    de ogen en gebruik niet op een beschadigde huid.
  - 'Ma Provence Shampoo Anti-Roos met Natuurlijke Witte Klei is een handig en milieuvriendelijk product dat perfect is voor
    op reis. Met een handige maat van 85 g en een centraal gat voor een gemakkelijke grip, komt deze shampoo overeen met 40-50
    shampoos, wat gelijk staat aan 2 flessen van 250 ml. Deze shampoo heeft geen conditioner nodig, wat resulteert in minder
    verpakkingsafval. De formule is 100% natuurlijk en bevat 20% biologische ingrediënten, waardoor het ideaal is voor mensen
    die op zoek zijn naar natuurlijke producten. Ma Provence Shampoo Anti-Roos is speciaal ontwikkeld om roos te bestrijden
    en is gecertificeerd als 100% natuurlijk en biologisch. Gebruiksaanwijzing: Breng een kleine hoeveelheid shampoo aan op
    nat haar, masseer zachtjes in en spoel grondig uit. Gebruik indien nodig. Voorzorgsmaatregelen: Vermijd contact met de
    ogen en bij eventuele irritatie stop het gebruik.'
  - Avène Men Hydraterende Anti-Agingverzorging is speciaal ontwikkeld voor mannen om de huid te hydrateren, revitaliseren
    en strakker te maken. Deze verzorging werkt op de tekenen van huidveroudering, zoals de structuur van de dermis en elasticiteit,
    dankzij actieve ingrediënten zoals hyaluronzuur en antioxidanten. De niet-plakkerige textuur zorgt voor een comfortabel
    gevoel en is geschikt voor alle gevoelige huidtypes, zelfs na het scheren. Breng de verzorging aan op het gelaat en de
    hals voor een stevigere en compacter uitziende huid. Gebruik de pompfles van 50 ml volgens de aanbevolen instructies voor
    optimale resultaten.
- source_sentence: Een milde reiniger speciaal ontwikkeld voor de rijpere huid van vrouwen boven de 60. Verrijkt met antioxidanten
    en hydraterende ingrediënten om de doffe huid te revitaliseren en onzuiverheden te verwijderen.
  sentences:
  - De Cattier Zuiverende Reinigingsgel is speciaal ontwikkeld voor de vette huid met onzuiverheden en puistjes. Met biologische
    essentiële oliën van tea tree, rozemarijn en pepermunt reinigt deze gel zacht de huid en verwijdert effectief onzuiverheden
    en overtollig talg. Verrijkt met aloë vera, biedt het een aangename sensatie van frisheid en laat de huid helder en gezond
    achter. De actieve ingrediënten, waaronder biologische tea tree olie en aloë vera, helpen de huid te zuiveren, hydrateren
    en beschermen. Breng de gel aan op een vochtig gezicht, vermijd de oogcontour, masseer in en spoel af met lauw water.
    Gebruik de gel regelmatig voor een zuivere en gezonde huid.
  - 'De Clarins Extra-Firming Anti-Rimpel Rijke Verstevigende Dagcrème is een ideale anti-ageing dagverzorging voor de droge
    huid, speciaal ontworpen voor vrouwen vanaf 40 jaar. Deze crème zorgt voor een zichtbaar stevigere en energieke huid,
    vermindert rimpels en herdefinieert het ovaal van het gezicht. De formule bevat actieve ingrediënten zoals shea butter,
    haverextract en vitamine E die de huid hydrateren, beschermen en verstevigen. Breng ''s ochtends aan op een schone huid
    voor een egale teint en stralende huid. Let op: vermijd contact met de ogen en bij eventuele irritatie stop het gebruik.
    Pot 50 ml.'
  - La Roche-Posay Effaclar Zuiverende Schuimende Reiningsgel is speciaal ontwikkeld voor de vette huid met neiging tot acne.
    Deze reinigingsgel reinigt en zuivert het gezicht zachtjes, verwijdert onzuiverheden en overmatig sebum, en houdt de huid
    schoon en fris. De formule bevat thermaal water van La Roche-Posay voor een kalmerende werking. Geschikt voor volwassenen
    en adolescenten met een vette huid, oneffenheden of acne. Gebruik 1 à 2 keer per dag, masseer zachtjes in op een vochtig
    gezicht en spoel grondig af met water. Niet gebruiken bij overgevoeligheid voor een van de ingrediënten.
- source_sentence: Een voedende gezichtsverzorging die diep in de huid doordringt om droogheid te behandelen. Speciaal samengesteld
    voor vrouwen van 24 jaar, deze crème helpt de huid te hydrateren en te herstellen, waardoor een gezonde gloed wordt bevorderd.
  sentences:
  - Waam Damast Bloemenwater Bio Spray 200ml is een kalmerende en verfrissende spray met de heerlijke geur van Damastroos.
    Dit bloemenwater hydrateert intensief, verstevigt en zuivert de huid op milde wijze, ideaal voor gecombineerde tot vette
    huidtypes. Het staat bekend om zijn antiverouderingseigenschappen en helpt bij het voorkomen van huidveroudering. De spray
    kan gebruikt worden voor het gezicht, lichaam en haar, en is geschikt voor alle huidtypes, vooral rijpere of reactieve
    huid. De belangrijkste actieve ingrediënten zijn biologisch aloë vera water en Damastroosbloesemwater. Gebruik de spray
    om make-up te verwijderen, huidirritatie te kalmeren of je huis subtiel te parfumeren. Niet doorslikken en bewaren op
    kamertemperatuur.
  - Benecos Natural Care Lippenbalsem Sinaas is een fruitige lipverzorging met een heerlijke zoete sinaasappelgeur, verrijkt
    met hoogwaardige biologische sinaasappelolie om de lippen zacht en gehydrateerd te houden. Deze lippenbalsem is ideaal
    voor dagelijks gebruik en biedt bescherming tegen uitdroging en schrale lippen. De natuurlijke ingrediënten zorgen voor
    een milde verzorging en een aangename geur. Breng de lippenbalsem eenvoudig aan op de lippen voor een langdurige hydratatie.
    Deze lippenbalsem is geschikt voor alle huidtypes en bevat 4,8 g product. Gebruik het product naar behoefte en geniet
    van zachte en verzorgde lippen.
  - De Fleurance Nature Hydraterende Gezichtscreme Met Aloë Vera is speciaal ontwikkeld om de natuurlijke hydratatie van de
    huid te behouden en te beschermen tegen agressieve invloeden van buitenaf. Deze lichte crème bevat aloë vera, sheaboter
    en jojobaolie die de huid verzachten, hydrateren en voeden. Geschikt voor alle huidtypes, deze bio gecertificeerde crème
    trekt snel in en laat de huid soepel en gezond aanvoelen. Breng de crème aan op gezicht en hals met lichte masserende
    bewegingen voor een gezonde en goed gehydrateerde huid. Bevat 50 ml.
- source_sentence: Een hydraterende gezichtsverzorging die de doffe huid van een 18-jarige vrouw weer laat stralen. Bevat
    antioxidanten die de huid beschermen tegen schadelijke invloeden van buitenaf. Vermindert wallen en onzuiverheden voor
    een egale en gezonde teint.
  sentences:
  - Alpecin Hypo-Sensitive Shampoo is speciaal ontwikkeld voor mensen met een gevoelige hoofdhuid en biedt een zachte reiniging
    en hydratatie. De hypoallergene formule bevat geen parfum, kleurstoffen of conserveermiddelen en is zelfs geschikt voor
    mensen met atopisch eczeem. Met actieve ingrediënten zoals salie-extract en bisabolol kalmeert en voorkomt het irritaties,
    terwijl het de huidbarrière versterkt voor een gezonde balans. Gebruik de shampoo dagelijks door het zachtjes in te masseren
    op nat haar en grondig uit te spoelen. De fles bevat 250 ml en is ideaal voor mensen met een droge en gevoelige hoofdhuid.
  - Phyto Phytocolor Permanente Kleuring 3 Donkerbruin 1 Kit is een haarverf verrijkt met plantaardige pigmenten voor een
    rijke kleur die niet vervaagt en 100% grijze haren dekt. De formule bevat monoï en jojoba oliën voor een mooie glans en
    verzorging, terwijl kalmerende ingrediënten irritatie tegengaan. De kleurcrème bevat geen PPD of resorcine en is geschikt
    voor haar. Breng het mengsel aan op droog, ongewassen haar en laat het inwerken volgens de instructies. Voer altijd een
    allergietest uit voor gebruik. Met Phyto Phytocolor geniet je van een intense kleur met natuurlijke schakeringen en verzorg
    je je haar op een zachte manier.
  - De T.LeClerc Geheime Droge Olie is een voedende olie met een poederige geur van witte iris die de huid hydrateert en een
    langdurige geur achterlaat. Geschikt voor de gevoelige huid, bevat deze olie 5 plantaardige oliën zoals rijstzemelolie,
    zoete amandelolie en sesamzaadolie die de huid kalmeren, beschermen en revitaliseren. Ideaal voor het lichaam en haar,
    kan de olie het hele jaar door worden gebruikt door een paar druppels in de handpalmen te verwarmen en in te masseren.
    Voor een effectieve werking kan de olie ook als masker op de hoofdhuid en lengten worden aangebracht en na 30 minuten
    worden uitgespoeld. Gebruik met voorzichtigheid bij allergieën voor een van de ingrediënten.
