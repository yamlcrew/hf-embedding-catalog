- source_sentence: Apakah ada ceramah khusus saat Maulid Nabi?
  sentences:
  - Belum diadakan ceramah tentang keteladanan Nabi Muhammad SAW.
  - Biasanya dana disalurkan melalui potongan langsung biaya bulanan.
  - Ya, santri membaca dan mendiskusikan kisah akhlak dari para ulama.
- source_sentence: Apakah kegiatan ekskul diawasi oleh pihak pesantren?
  sentences:
  - Tahajud dilakukan bersama minimal dua kali seminggu.
  - Akhlak ditanamkan lewat kegiatan bersama seperti piket, gotong royong, dan ta'awun.
  - Ya, semua kegiatan ekskul diawasi dan dipantau oleh pihak pesantren.
- source_sentence: Bagaimana cara pondok membangun budaya mutu?
  sentences:
  - Dekorasi sederhana dilakukan oleh santri sebagai bentuk syiar.
  - Melalui pelatihan guru, evaluasi rutin, dan pembinaan berkelanjutan.
  - Ya, wali diundang untuk menyaksikan ujian terbuka seperti ujian tahfidz atau pidato.
- source_sentence: Apakah wali harus ikut rapat pondok?
  sentences:
  - Beberapa guru telah memiliki sertifikasi nasional maupun sertifikasi pesantren.
  - Wali diwajibkan hadir pada rapat tahunan atau panggilan resmi.
  - Internet tersedia secara terbatas dan diawasi untuk kebutuhan pembelajaran.
- source_sentence: Apakah santri boleh membawa HP?
  sentences:
  - Beberapa guru ditugaskan sebagai wali asrama santri.
  - Ya, santri mendapatkan penyuluhan kesehatan secara rutin.
  - HP tidak diperbolehkan dibawa ke lingkungan pesantren.
