widgetData:
- source_sentence: In the fiscal year 2022, the emissions were categorized into different scopes, with each scope representing
    a specific source of emissions
  sentences:
  - 'Question: What is NetLink proactive in identifying to be more efficient in? '
  - What standard is the Environment, Health, and Safety Management System (EHSMS) audited to by a third-party accredited
    certification body at the operational assets level of CLI?
  - What do the different scopes represent in terms of emissions in the fiscal year 2022?
- source_sentence: NetLink is committed to protecting the security of all information and information systems, including both
    end-user data and corporate data. To this end, management ensures that the appropriate IT policies, personal data protection
    policy, risk mitigation strategies, cyber security programmes, systems, processes, and controls are in place to protect
    our IT systems and confidential data
  sentences:
  - '"What recognition did NetLink receive in FY22?"'
  - What measures does NetLink have in place to protect the security of all information and information systems, including
    end-user data and corporate data?
  - 'Question: What does Disclosure 102-10 discuss regarding the organization and its supply chain?'
- source_sentence: In the domain of economic performance, the focus is on the financial health and growth of the organization,
    ensuring sustainable profitability and value creation for stakeholders
  sentences:
  - What does NetLink prioritize by investing in its network to ensure reliability and quality of infrastructure?
  - What percentage of the total energy was accounted for by heat, steam, and chilled water in 2021 according to the given
    information?
  - What is the focus in the domain of economic performance, ensuring sustainable profitability and value creation for stakeholders?
- source_sentence: Disclosure 102-41 discusses collective bargaining agreements and is found on page 98
  sentences:
  - What topic is discussed in Disclosure 102-41 on page 98 of the document?
  - What was the number of cases in 2021, following a decrease from 42 cases in 2020?
  - What type of data does GRI 101 provide in relation to connecting the nation?
- source_sentence: Employee health and well-being has never been more topical than it was in the past year. We understand
    that people around the world, including our employees, have been increasingly exposed to factors affecting their physical
    and mental wellbeing. We are committed to creating an environment that supports our employees and ensures they feel valued
    and have a sense of belonging. We utilised
  sentences:
  - What aspect of the standard covers the evaluation of the management approach?
  - 'Question: What is the company''s commitment towards its employees'' health and well-being based on the provided context
    information?'
  - What types of skills does NetLink focus on developing through their training and development opportunities for employees?
