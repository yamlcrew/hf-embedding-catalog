  - What was the net interest income for the first quarter of 2023?
  - What are the expected consequences of the EMIR 3.0 proposals for ICE Futures Europe and ICE Clear Europe?
- source_sentence: The consolidated financial statements and accompanying notes are listed in Part IV, Item 15(a)(1) of the
    Annual Report on Form 10-K
  sentences:
  - What was the total amount invested in purchases from Vebu during the year ended December 31, 2023?
  - What section of the Annual Report on Form 10-K includes the consolidated financial statements and accompanying notes?
  - What is the purpose of using constant currency to measure financial performance?
- source_sentence: Cash provided by operating activities was impacted by the provision from the Tax Cuts and Jobs Act of 2017
    which became effective in fiscal 2023 and requires the capitalization and amortization of research and development costs.
    The change increased our cash taxes paid in fiscal 2023.
  sentences:
  - How much did the provision from the Tax Cuts and Jobs Act increase the cash taxes paid in fiscal 2023?
  - What is the principal amount of debt maturing in fiscal year 2023?
  - What is the projected increase in effective tax rate starting from fiscal 2024?
- source_sentence: Item 8. Financial Statements and Supplementary Data.
  sentences:
  - How does FedEx Express primarily fulfill its jet fuel needs?
  - What legislative act in the United States established a new corporate alternative minimum tax of 15% on large corporations?
  - What is the title of Item 8 that covers financial data in the report?
