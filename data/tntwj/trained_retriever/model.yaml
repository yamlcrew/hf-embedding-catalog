  sentences:
  - "Art. 1\n Art. 1\n Definanziamento delle leggi di spesa totalmente non utilizzate negli ultimi tre anni\n 1. Le autorizzazioni\
    \ di spesa i cui stanziamenti annuali non risultano impegnati sulla base delle risultanze del Rendiconto generale dello\
    \ Stato relativo agli anni 2007, 2008 e 2009 sono definanziate. Con decreto del Presidente del Consiglio dei Ministri\
    \ su proposta del Ministro dell'economia e delle finanze da adottare entro il 30 settembre 2010 sono individuate per ciascun\
    \ Ministero le autorizzazioni di spesa da definanziare e le relative disponibilità esistenti alla data di entrata in vigore\
    \ del presente decreto-legge.\n Le disponibilità individuate sono versate all'entrata del bilancio dello Stato per essere\
    \ riassegnate al fondo ammortamento dei titoli Stato.\n\n Art. 2\n Art. 2\n Riduzione e flessibilità negli stanziamenti\
    \ di bilancio\n 1. Al fine di consentire alle Amministrazioni centrali di pervenire ad un consolidamento delle risorse\
    \ stanziate sulle missioni di ciascun stato di previsione, in deroga alle norme in materia di flessibilità di cui all'articolo\
    \ 23 della legge 31 dicembre 2009, n. 196, ((limitatamente al periodo 2011-2017)) e relativo bilancio pluriennale, nel\
    \ rispetto dell'invarianza degli effetti sui saldi di finanza pubblica con il disegno di legge di bilancio, per motivate\
    \ esigenze, possono essere rimodulate le dotazioni finanziarie tra le missioni di ciascuno stato di previsione, con riferimento\
    \ alle spese di cui all'articolo 21, comma 7, della medesima legge n. 196 del 2009. In appositi allegati agli stati di\
    \ previsione della spesa sono indicate le autorizzazioni legislative di cui si propongono le modifiche ed i corrispondenti\
    \ importi. Resta precluso l'utilizzo degli stanziamenti di conto capitale per finanziare spese correnti. A decorrere dall'anno\
