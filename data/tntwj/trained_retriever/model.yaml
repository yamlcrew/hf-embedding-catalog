- source_sentence: Un lavoratore agricoltore che opera nel trattamento di tubi saldati e prodotti fucinati è esposto a rischi
    specifici legati alla manipolazione di materiali ad alta temperatura e pressione. In relazione alla normativa vigente,
    quale delle seguenti affermazioni riguarda correttamente le obbligazioni di sicurezza e la procedura di monitoraggio da
    parte del datore di lavoro, in conformità con le disposizioni del D.Lgs. n. 81/2008 e del regolamento INAIL sui materiali
    di lavorazione?
