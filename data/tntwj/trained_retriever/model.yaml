      \ sportivo avente lo spazio di attività scoperto.\n\n Questa categoria comprende anche gli impianti con spazio riservato\
      \ agli spettatori coperto.\n\n **Impianto sportivo al chiuso**\n\n Tutti gli altri impianti non ricadenti nella tipologia\
      \ degli impianti all'aperto.\n\n **Complesso sportivo**\n\n Uno o più impianti sportivi contigui aventi in comune infrastrutture\
      \ e servizi; il complesso sportivo è costituito da uno o più impianti sportivi e dalle rispettive aree di servizio annesse.\n\
      \n **Complesso sportivo multifunzionale**\n\n Complesso sportivo comprendente spazi destinati ad altre attività, diverse\
      \ da quella sportiva, caratterizzato da organicità funzionale, strutturale ed impiantistica.\n\n **Area di servizio\
      \ annessa**\n\n Area di pertinenza dell'impianto o complesso sportivo recintata per controllarne gli accessi.\n\n **Area\
      \ di servizio esterna**\n\n Area pubblica o aperta al pubblico, che può essere annessa, anche temporaneamente, all'impianto\
      \ o complesso sportivo mediante recinzione fissa o mobile.\n\n **Zona esterna**\n\n Area pubblica circostante o prossima\
      \ all'impianto o complesso sportivo che consente l'avvicinamento allo stesso, e lo stanziamento di servizi pubblici\
      \ o privati.\n\n **Spazi di soccorso**\n\n Spazi raggiungibili dai mezzi di soccorso e riservati alla loro sosta e manovra.\n\
      \n **Via d'uscita**\n\n Percorso senza ostacoli al deflusso che conduce dall'uscita dello spazio riservato agli spettatori\
      \ e dallo spazio di attività sportiva all'area di servizio annessa o all'area di servizio esterna.\n\n **Spazio calmo**\n\
      \n Luogo sicuro statico contiguo e comunicante con una via di esodo verticale od in essa inserito. Tale spazio non deve\
      \ costituire intralcio alla fruibilità delle vie di esodo ed avere caratteristiche tali da garantire la permanenza di\
      \ persone con ridotte o impedite capacità motorie in attesa dei soccorsi.\n\n **Percorso di smistamento**\n\n Percorso\
      \ che permette la mobilità degli spettatori all'interno dello spazio loro riservato."
