  - ":\n a) i soggetti che siano proprietari di un'abitazione o porzione di abitazione, in qualsiasi località del territorio\
    \ nazionale, il cui valore, dichiarato ai fini dell'imposta comunale sugli immobili (ICI), sia superiore a euro 30.000,00;\n\
    \ b) i soggetti che abbiano nel proprio nucleo familiare il coniuge convivente o un parente convivente proprietario, in\
    \ qualsiasi località del territorio nazionale, di un'abitazione o porzione di abitazione con un valore superiore a quello\
    \ di cui alla lettera a), determinato con identico parametro;\n c) previa valutazione dell'amministrazione, il personale\
    \ che si trovi in aspettativa per motivi privati o che sia sottoposto a provvedimento di sospensione cautelare dal servizio;\n\
    \ d) i soggetti ai quali sono alienati gli alloggi di servizio del Ministero della difesa in virtù delle vigenti procedure\
    \ di dismissione.\n\n Art. 400\n Art. 394\n Obblighi dei mutuatari\n 1. Non è consentita la costituzione, da parte dei\
    \ mutuatari, di diritti reali di usufrutto, uso o abitazione in favore di terzi sull'immobile per il quale è stato concesso\
    \ il mutuo, fino al totale ammortamento dello stesso.\n 2. La violazione di tale divieto costituisce causa di risoluzione\
    \ espressa del contratto di mutuo agevolato, fatto salvo il recupero del capitale residuo.\n\n Art. 401\n Art. 395\n Ammortamento\
    \ dei mutui\n 1. Le rate di ammortamento dei mutui hanno cadenza mensile e il loro valore è costante. Dette rate sono\
    \ corrisposte dai mutuatari all'istituto di credito di cui all'articolo 389.\n 2. La rata mensile di ammortamento da porre\
    \ a carico dei mutuatari è determinata sulla base del tasso fisso d'interesse annuo a scalare di tipo agevolato. Il tasso\
    \ d'interesse è fissato con provvedimento del Segretariato ed è variato in relazione all'andamento del tasso di inflazione,\
    \ secondo i dati rilevati dall'Istituto nazionale di statistica.\n 3. Il mutuo può essere estinto anticipatamente ed è\
    \ esclusa l'applicazione di penalità a carico del mutuatario.\n\n Art. 402\n Art. 396\n Allegato A\n\n Modalità per l'assegnazione\
    \ dei mutui\n 1. Gli Stati maggiori di Forza armata, al fine di"
  - "servizi accessori;\n\n d) eventuali spazi e servizi di supporto.\n\n **Impianto sportivo all'aperto**\n\n Impianto sportivo\
    \ avente lo spazio di attività scoperto.\n\n Questa categoria comprende anche gli impianti con spazio riservato agli spettatori\
    \ coperto.\n\n **Impianto sportivo al chiuso**\n\n Tutti gli altri impianti non ricadenti nella tipologia degli impianti\
    \ all'aperto.\n\n **Complesso sportivo**\n\n Uno o più impianti sportivi contigui aventi in comune infrastrutture e servizi;\
    \ il complesso sportivo è costituito da uno o più impianti sportivi e dalle rispettive aree di servizio annesse.\n\n **Complesso\
    \ sportivo multifunzionale**\n\n Complesso sportivo comprendente spazi destinati ad altre attività, diverse da quella\
    \ sportiva, caratterizzato da organicità funzionale, strutturale ed impiantistica.\n\n **Area di servizio annessa**\n\n\
    \ Area di pertinenza dell'impianto o complesso sportivo recintata per controllarne gli accessi.\n\n **Area di servizio\
    \ esterna**\n\n Area pubblica o aperta al pubblico, che può essere annessa, anche temporaneamente, all'impianto o complesso\
    \ sportivo mediante recinzione fissa o mobile.\n\n **Zona esterna**\n\n Area pubblica circostante o prossima all'impianto\
    \ o complesso sportivo che consente l'avvicinamento allo stesso, e lo stanziamento di servizi pubblici o privati.\n\n\
    \ **Spazi di soccorso**\n\n Spazi raggiungibili dai mezzi di soccorso e riservati alla loro sosta e manovra.\n\n **Via\
    \ d'uscita**\n\n Percorso senza ostacoli al deflusso che conduce dall'uscita dello spazio riservato agli spettatori e\
    \ dallo spazio di attività sportiva all'area di servizio annessa o all'area di servizio esterna.\n\n **Spazio calmo**\n\
    \n Luogo sicuro statico contiguo e comunicante con una via di esodo verticale od in essa inserito. Tale spazio non deve\
    \ costituire intralcio alla fruibilità delle vie di esodo ed avere caratteristiche tali da garantire la permanenza di\
    \ persone con ridotte o impedite capacità motorie in attesa dei soccorsi.\n\n **Percorso di smistamento**\n\n Percorso\
    \ che permette la mobilità degli spettatori all'interno dello spazio loro riservato."
