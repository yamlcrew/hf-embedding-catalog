      \ con altri istituti, enti, aziende che operano nel settore della ricerca.~~\n\n ~~Il centro studi ed esperienze antincendi\
      \ formulerà in tal senso specifici programmi annuali e pluriennali, da approvarsi preventivamente da parte degli organi\
      \ Tecnici centrali del Corpo nazionale dei vigili del fuoco. Il complesso delle attività di studio, ricerca e sperimentazione,\
      \ di cui ai precedenti commi del presente articolo, concorre a fornire elementi tecnico-scientifici da porsi a base\
      \ dei fondamenti attuativi della prevenzione incendi anche ai fini delle \"omologazioni\" di macchinari, impianti e\
      \ attrezzature.~~\n\n ###### ~~Attività di studio, ricerca e sperimentazione di prevenzione incendi~~\n\n ~~**1.**~~\
