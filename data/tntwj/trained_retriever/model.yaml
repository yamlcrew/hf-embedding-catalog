  sentences:
  - "ricerche e progetti nella specifica materia.~~\n\n Nell'espletamento delle proprie attribuzioni il comitato potrà articolarsi\
    \ in gruppi di lavoro.\n\n Per determinati settori di competenza e per un tempo limitato alle esigenze di elaborazione\
    \ e di aggiornamento di particolari norme tecniche, il comitato può avvalersi dell'opera di esperti o di rappresentanti\
    \ di enti e organismi diversi da quelli indicati nel precedente articolo 10.\n\n All'emanazione delle norme e delle specifiche\
    \ tecniche, elaborate e aggiornate dal comitato centrale tecnicoscientifico per la prevenzione incendi si provvede mediante\
    \ decreti del Ministero dell'interno con l'eventuale concerto di altri Ministeri interessati.\n\n Il comitato, all'inizio\
    \ di ogni anno, formula il programma generale della propria attività concernente i compiti al medesimo attribuiti, nonché\
    \ una relazione sull'attività svolta nell'anno precedente.\n\n #### ~~Articolo 12~~\n\n ###### ~~Attività di studio, ricerca\
    \ e sperimentazione~~\n\n ~~Per la promozione e l'attuazione degli studi, della ricerca e sperimentazione nel settore\
    \ della prevenzione incendi, il Corpo nazionale dei vigili del fuoco si avvale del centro studi ed esperienze antincendi\
    \ il quale, a tali fini, può assumere idonee iniziative ivi compresa la cooperazione con altri istituti, enti, aziende\
    \ che operano nel settore della ricerca.~~\n\n ~~Il centro studi ed esperienze antincendi formulerà in tal senso specifici\
    \ programmi annuali e pluriennali, da approvarsi preventivamente da parte degli organi Tecnici centrali del Corpo nazionale\
    \ dei vigili del fuoco. Il complesso delle attività di studio, ricerca e sperimentazione, di cui ai precedenti commi del\
    \ presente articolo, concorre a fornire elementi tecnico-scientifici da porsi a base dei fondamenti attuativi della prevenzione\
    \ incendi anche ai fini delle \"omologazioni\" di macchinari, impianti e attrezzature.~~\n\n ###### ~~Attività di studio,\
    \ ricerca e sperimentazione di prevenzione incendi~~\n\n ~~**1.**~~ ~~Il Dipartimento dei vigili del fuoco, del soccorso\
