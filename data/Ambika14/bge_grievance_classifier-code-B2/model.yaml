  sentences:
  - Startup, Credit and Finance. Schemes implemented by NCGTC for automatic loan. the category description outlines the schemes
    implemented by the national credit guarantee trust company ncgtc for automatic or guaranteed loans focusing on the grievances
    raised by micro and small business owners existing borrowers of banks or non-banking financial companies nbfcs and enterprises
    seeking emergency or collateral-free credit. the description categorizes the grievances into several subcategories including
    <NUM> . bank refusal despite scheme eligibility eligible micro small and medium enterprises msmes are denied loans due
    to - branches claiming the scheme is not being offered - lack of instructions from higher authorities - rejection of applications
    despite standard and compliant accounts impact msmes are denied access to credit despite meeting scheme eligibility criteria.
    <NUM> . partial or incorrect loan sanction enterprises receive amounts far below their entitlement due to - incorrect
    working capital limits - sanctioned amounts reduced without justification or explanation impact enterprises receive inadequate
    credit affecting their business operations. <NUM> . delays after sanction sanction letters are issued but funds are not
    credited for weeks due to - vague technical problems - disbursements held up despite guarantee activation impact enterprises
    experience delayed credit delivery affecting their business operations. <NUM> . collateral or additional conditions msmes
    are subjected to - demands for collateral or personal guarantees - forced purchase of insurance or third-party financial
    products impact msmes are burdened with additional costs and conditions affecting their credit accessibility. <NUM> .
    incorrect ineligibility tagging msme
  - UAM/Udyam Registration/Certificate related issues. Existing / Unauthorized UDYAM Registration Against PAN. this category
    includes grievances related to updating or correcting the email id or mobile number associated with an existing udyam
    registration. contact details provided during registration are used for communication verification and authentication
    when accessing the enterprise profile on the portal. if these contact details become outdated incorrect or inaccessible
    the enterprise owner may face difficulty receiving otps accessing the portal or managing the registration information.
    common grievances under this category include requests to change the registered mobile number or email address because
    the original number is no longer active the sim card has been lost the email account is no longer accessible or the contact
    details were entered incorrectly during registration. some complaints arise when the registered contact details belong
    to an employee or consultant who is no longer associated with the enterprise preventing the current owner from receiving
    verification messages. in other cases entrepreneurs report that they cannot update contact details because the system
    requires authentication through the old mobile number or email which they no longer have access to. these grievances are
    typically raised by msme owners proprietors partners directors of companies or authorized representatives responsible
    for managing business registrations. small business owners who registered their enterprise personally may request updates
    when their phone number or email changes. in some cases accountants consultants or administrative staff handling compliance
    activities may also submit grievances when they cannot access the registration due to outdated contact details. this category
    therefore represents issues related specifically to correcting or updating communication details associated with an existing
    udyam certificate.
  - Policy and Schemes. Related to MSME Scheme. this category encompasses grievances related to central sector schemes directly
    administered by the ministry of micro small and medium enterprises momsme where the ministry itself serves as the implementing
    authority. the category includes schemes such as zero defect zero effect zed credit linked capital subsidy scheme clcss
    lean manufacturing and other centrally managed msme support programs. it covers cases where msmes have applied for scheme
    benefits or subsidies received approvals or completed required assessments or certifications but the approved financial
    assistance has not been released or credited. the category also captures grievances where claims submitted under ministry-run
    schemes for incentives reimbursements or financial support remain pending for extended periods or are rejected without
    clear or consistent justification. this includes cases of rejection due to alleged documentation gaps system-generated
    ineligibility flags disputes over eligible machinery or activities and delays caused by human or system-level verification
    failures. additionally the category includes grievances arising from ambiguity or confusion regarding scheme eligibility
    scope or applicability such as uncertainty over mandatory certifications eligibility of second-hand versus new machinery
    applicability to service enterprises or inconsistent interpretations of scheme rules by different central or state offices.
    the category further covers portal-related issues affecting scheme access and execution including technical errors during
    registration or document upload login or authentication failures contradictory status messages and non-updating dashboards
    for application claim or training progress. these issues typically arise due to system bugs integration gaps between multiple
    portals file format or size restrictions or delays in updating portal logic after scheme guideline revisions.
