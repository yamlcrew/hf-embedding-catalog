    - UAM/Udyam Registration/Certificate related issues. Existing / Unauthorized UDYAM Registration Against PAN. this category
      includes grievances related to updating or correcting the email id or mobile number associated with an existing udyam
      registration. contact details provided during registration are used for communication verification and authentication
      when accessing the enterprise profile on the portal. if these contact details become outdated incorrect or inaccessible
      the enterprise owner may face difficulty receiving otps accessing the portal or managing the registration information.
      common grievances under this category include requests to change the registered mobile number or email address because
      the original number is no longer active the sim card has been lost the email account is no longer accessible or the
      contact details were entered incorrectly during registration. some complaints arise when the registered contact details
      belong to an employee or consultant who is no longer associated with the enterprise preventing the current owner from
      receiving verification messages. in other cases entrepreneurs report that they cannot update contact details because
      the system requires authentication through the old mobile number or email which they no longer have access to. these
      grievances are typically raised by msme owners proprietors partners directors of companies or authorized representatives
      responsible for managing business registrations. small business owners who registered their enterprise personally may
      request updates when their phone number or email changes. in some cases accountants consultants or administrative staff
      handling compliance activities may also submit grievances when they cannot access the registration due to outdated contact
      details. this category therefore represents issues related specifically to correcting or updating communication details
      associated with an existing udyam certificate.
    - Policy and Schemes. Related to MSME Scheme. this category encompasses grievances related to central sector schemes directly
      administered by the ministry of micro small and medium enterprises momsme where the ministry itself serves as the implementing
      authority. the category includes schemes such as zero defect zero effect zed credit linked capital subsidy scheme clcss
      lean manufacturing and other centrally managed msme support programs. it covers cases where msmes have applied for scheme
      benefits or subsidies received approvals or completed required assessments or certifications but the approved financial
      assistance has not been released or credited. the category also captures grievances where claims submitted under ministry-run
      schemes for incentives reimbursements or financial support remain pending for extended periods or are rejected without
