  sentences:
  - UAM/Udyam Registration/Certificate related issues. Updation of Email ID/Mobile No. Linked to UDYAM Certificate. this category
    includes grievances related to updating or correcting the email id or mobile number associated with an existing udyam
    registration. contact details provided during registration are used for communication verification and authentication
    when accessing the enterprise profile on the portal. if these contact details become outdated incorrect or inaccessible
    the enterprise owner may face difficulty receiving otps accessing the portal or managing the registration information.
    common grievances under this category include requests to change the registered mobile number or email address because
    the original number is no longer active the sim card has been lost the email account is no longer accessible or the contact
    details were entered incorrectly during registration. some complaints arise when the registered contact details belong
    to an employee or consultant who is no longer associated with the enterprise preventing the current owner from receiving
    verification messages. in other cases entrepreneurs report that they cannot update contact details because the system
    requires authentication through the old mobile number or email which they no longer have access to. these grievances are
    typically raised by msme owners proprietors partners directors of companies or authorized representatives responsible
    for managing business registrations. small business owners who registered their enterprise personally may request updates
    when their phone number or email changes. in some cases accountants consultants or administrative staff handling compliance
    activities may also submit grievances when they cannot access the registration due to outdated contact details. this category
    therefore represents issues related specifically to correcting or updating communication details associated with an existing
    udyam certificate.
  - Marketing and Skilling. Export Promotion/WTO. the export promotion and wto-related initiatives for msmes comprise a set
    of integrated measures under india s ministry of msme and the ministry of commerce to strengthen the export ecosystem
    for micro small and medium enterprises. these include the export promotion mission with a long-term financial outlay to
    support msme exports interest subvention on pre- and post-shipment export credit to reduce borrowing costs credit guarantee
    coverage for collateral-free export finance and reimbursement support for participation in international trade fairs buyer
    meets and market development activities with higher assistance for first-time exporters and priority groups. the initiatives
    also provide policy and legal support to msmes in matters related to wto compliance trade remedies such as anti-dumping
    cases and dispute settlement issues. together with complementary export facilitation instruments these measures aim to
    enhance msme competitiveness diversify export markets integrate enterprises into global value chains support labour-intensive
    sectors and sustain msmes significant contribution to india s overall exports. examples of common grievances under these
    initiatives include interest subvention limitations an msme exporter reaches the prescribed annual credit ceiling midway
    through the year resulting in partial interest relief despite continued export shipments. credit guarantee shortfall an
    exporter seeking higher-value export finance receives lower-than-expected guarantee coverage due to risk assessment norms
    increasing collateral or margin requirements. trade fair reimbursement rejection a first-time exporter is denied marketing
    assistance reimbursement because the overseas exhibition attended was not on the approved list despite generating confirmed
    buyer interest. wto-related support inadequacy an msme facing an anti-dumping investigation receives limited financial
    assistance for legal and advisory expenses leaving a large portion of costs uncovered. implementation or rollout delays
    eligible exporters are unable to access benefits during pilot or initial phases due to delays by banks or implementing
    agencies in operationalising scheme guidelines.
  - Starter, Credit and Finance. Self Reliant Fund (SRI Fund). the self reliant india sri fund is a category designed to address
    grievances raised by growth-stage msme owners manufacturing or technology-focused enterprises and startups transitioning
    into a scale phase. the primary purpose of the sri fund is to provide equity support to scalable msmes. however several
    issues and challenges hinder its effective implementation leading to grievances from the target beneficiaries. key issues
    and scenarios <NUM> . inability to access daughter funds lack of clarity on which funds to approach no publicly available
    list or contact details referred by sidbi to fund managers who do not respond no acknowledgment after submitting an expression
    of interest <NUM> . excessive delays in the investment process due diligence stretching over many months without a clear
    decision repeated requests for similar documents frequent postponement of investment committee meetings leaving enterprises
    in prolonged uncertainty <NUM> . rejection without transparency proposals declined without stated reasons applications
    marked unsuitable despite meeting published eligibility criteria verbal assurances of support later withdrawn without
    formal communication <NUM> . eligibility and interpretation disputes fund managers applying scheme guidelines inconsistently
    disputes over turnover thresholds treating registered msmes as ineligible startups applying unclear sectoral restrictions
    unevenly across applicants <NUM> . post-approval or post-commitment issues term sheets issued but funds not disbursed
    conditions altered after approval funds backing out due to internal policy changes operational procedural policy or institutional
    causes
