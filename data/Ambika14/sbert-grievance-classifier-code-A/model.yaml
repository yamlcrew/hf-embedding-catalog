    was made. details - aadhar no <NUM> pan no gnips2021g mobile no <NUM>
  sentences:
  - UAM/Udyam Registration/Certificate related issues. Cancellation of UDYAM Certificate Request. this category includes grievances
    related to requests for cancellation or deactivation of an existing udyam registration. in some cases businesses that
    were previously registered as msmes may no longer operate may have undergone structural changes or may have been registered
    incorrectly. when such situations occur the enterprise owner may wish to cancel the existing udyam certificate to prevent
    incorrect records or to allow proper registration in the future. grievances under this category typically include requests
    to cancel a registration because the business has permanently closed the enterprise was registered by mistake or the registration
    was created with incorrect information. some entrepreneurs also request cancellation when duplicate registrations exist
    for the same enterprise and they want only one valid record to remain. another common grievance arises when the enterprise
    was registered earlier under outdated or incorrect details and the owner wants the registration cancelled before creating
    a new one with correct information. these grievances are usually raised by proprietors partners directors of companies
    or authorized representatives of msmes who are responsible for maintaining the official records of the enterprise. small
    business owners who registered their enterprises earlier but later discontinued operations may also request cancellation
    to avoid confusion or misuse of the registration. in some cases accountants consultants or compliance officers working
    on behalf of the enterprise may submit the grievance if they identify that the existing udyam registration is no longer
    valid or should be removed from the records.
  - Marketing and Skilling. National SC ST HUB. national sc-st hub nssh is a central sector scheme launched in <NUM> by the
    ministry of micro small and medium enterprises and implemented by the national small industries corporation to empower
    scheduled caste and scheduled tribe entrepreneurs and strengthen their participation in the msme ecosystem. the scheme
    focuses on capacity building market access financial facilitation and handholding support while also operationalizing
    the mandatory <NUM> procurement target for sc st owned mses under the public procurement policy for mses <NUM> . through
    a network of national sc-st hub offices across the country the hub assists eligible sc st entrepreneurs holding at least
    <NUM> ownership and control in activities such as udyam and gem registration participation in government tenders access
    to credit and skill upgradation. financial support is provided in the form of reimbursements for testing and certification
    charges from recognized laboratories bank loan processing and bank guarantee fees membership fees of export promotion
    councils onboarding costs for e-commerce and government procurement platforms and fees for short-term skill and management
    training programs at reputed institutions. by reducing entry barriers and providing structured handholding nssh aims to
    enhance competitiveness ensure inclusive growth and enable sc st entrepreneurs to scale up operations and integrate with
    formal supply chains. examples of grievances reported under the scheme include rejection of reimbursement claims where
    testing or certification expenses exceed the prescribed financial ceiling despite compliance with quality standards blockage
    of financial assistance due to delays or discrepancies in caste certificate verification even when enterprises are otherwise
    registered as sc st-owned instances where sc st msmes fail to secure tenders despite the mandated procurement quota because
    of non-compliance by procuring cpses partial reimbursement of approved training or capacity-building expenses owing to
    scheme-specific limits leading to out-of-pocket costs for entrepreneurs and gaps in timely support from local nssh offices
    particularly in remote or north-eastern regions affecting onboarding to procurement portals and access to scheme benefits.
  - UAM/Udyam Registration/Certificate related issues. Existing / Unauthorized UDYAM Registration Against PAN. this category
    refers to grievances where an entrepreneur discovers that a udyam registration already exists against their pan either
    due to duplicate registration or because someone else created the registration without their authorization. since pan
    is used as a key identifier for enterprise registration the presence of an existing registration can prevent the legitimate
    owner from creating a new one or managing the enterprise details. grievances under this category usually include complaints
    about duplicate registrations created for the same enterprise or multiple registrations linked to the same pan. some business
    owners report that when they attempt to register their enterprise the system indicates that a registration already exists
    even though they are unaware of creating one earlier. in other cases entrepreneurs may find that an employee consultant
    former partner or third party registered the enterprise using the business pan without informing the owner. there may
    also be situations where an earlier registration contains incorrect enterprise information leading to confusion about
    the valid record. such grievances are generally raised by business proprietors partners of partnership firms directors
    of companies or authorized representatives responsible for registering the enterprise under msme. these complaints may
    also be submitted by compliance managers accountants or consultants who are attempting to complete the msme registration
    process for the business but encounter an existing record linked to the pan. the purpose of raising this grievance is
    to identify the existing registration verify its legitimacy and resolve conflicts arising from duplicate or unauthorized
    registrations associated with the enterprise s pan.
