widgetData:
- source_sentence: What additional document is included in the financial document apart from the Consolidated Financial Statements?
  sentences:
  - It is mentioned that the company aims to distribute between 40% to 50% of its adjusted free cash flow to shareholders.
  - Apart from the Consolidated Financial Statements, the 'Glossary of Terms and Acronyms' is included in the financial document.
  - Hilton's 2030 environmental impact goals include reducing carbon emissions intensity of managed hotels by 75 percent and
    franchised hotels by 56 percent, and reducing water and waste intensity at hotels they operate by 50 percent.
- source_sentence: What additional satellite systems do Garmin products utilize besides GPS?
  sentences:
  - These forward-looking statements involve known and unknown risks, uncertainties and other factors beyond our control,
    which may cause our actual results, performance or achievements to be materially different from any future results, performance
    or achievements expressed or implied by these forward-looking statements.
  - In addition to GPS, Garmin products utilize other global navigation satellite systems (GNSS) including the Russian Global
    Navigation Satellite System (GLONASS), the European Union Galileo system (Galileo), and the Chinese BeiDou Navigation
    Satellite System (BDS).
  - The report on the Consolidated Financial Statements was provided by PricewaterhouseCoopers LLP, identified as the firm's
    independent registered public accounting firm (PCAOB ID 238).
- source_sentence: What was the fair value of the total consideration transferred for the acquisition discussed, and how was
    it composed?
  sentences:
  - 'The fair value of consideration transferred of $212.1 million consisted of: (1) cash consideration paid of $211.3 million,
    net of cash acquired, and (2) non-cash consideration of $0.8 million representing the portion of the replacement equity
    awards issued in connection with the acquisition that was associated with services rendered through the date of the acquisition.'
  - Under these standards, a bank’s risk governance framework must ensure that the bank’s risk profile is easily distinguished
    and separate from that of its parent BHC for risk management purposes.
  - In 2023, the net earnings of Johnson & Johnson were $35,153 million. The company also registered cash dividends paid amounting
    to $11,770 million for the year, priced at $4.70 per share.
- source_sentence: What does the term 'Acquired brands' refer to and how does it affect the reported volumes?
  sentences:
  - Certain matters include claims for substantial or indeterminate amounts of damages. A liability is recorded when it is
    probable that a loss has been incurred and the amount can be reasonably estimated. If it is determined that a loss is
    reasonably possible and the loss or range of loss can be reasonably estimated, the possible loss is disclosed in the accompanying
    notes to the consolidated financial statements. If a loss is reasonably possible but the loss or range of loss cannot
    be reasonably estimated, it is stated that such an estimate cannot be made.
  - The promise to provide a software subscription is highly interdependent and interrelated with the promise to provide O&M
    services and such promises are not distinct within the context of our contracts and are accounted for as a single performance
    obligation for our On-Premises Software.
  - '''Acquired brands'' refers to brands acquired during the past 12 months. Typically, the Company has not reported unit
    case volume or recognized concentrate sales volume related to acquired brands in periods prior to the closing of a transaction.
    Therefore, the unit case volume and concentrate sales volume related to an acquired brand are incremental to prior year
    volume.'
- source_sentence: What are the terms of Delta Air Lines' agreements with its regional carriers through Delta Connection®?
  sentences:
  - Delta Connection® consists of agreements with regional airlines like Endeavor Air and SkyWest Airlines to operate flights
    under Delta's code. Delta controls major operational aspects like scheduling and pricing, while the regional carriers
    supply the services. The agreements typically last at least ten years with options for extensions.
  - Our invention of the GPU in 1999 defined modern computer graphics and established NVIDIA as the leader in computer graphics.
  - Personnel-related costs are the most significant component of the company's operating expenses such as research and development,
    sales and marketing, and general and administrative expenses, excluding restructuring and asset impairment charges.
