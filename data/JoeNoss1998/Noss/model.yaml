  - "APPENDIX\nPanelists discussed the benefits of AI-enabled systems and their potential to build better and more \ninnovative\
    \ infrastructure. They individually noted that while AI technologies may be new, the process of \ntechnological diffusion\
    \ is not, and that it was critical to have thoughtful and responsible development and \nintegration of technology within\
    \ communities. Some p anelists suggested that the integration of technology \ncould benefit from examining how technological\
    \ diffusion has worked in the realm of urban planning: \nlessons learned from successes and failures there include the\
    \ importance of balancing ownership rights, use \nrights, and community health, safety and welfare, as well ensuring better\
    \ representation of all voices,"
  - "26Algorithmic \nDiscrimination \nProtections"
