- source_sentence: 트럼프의 지지율이 하락했다고 말한 매체는?
  sentences:
  - "능은 개성에 위치한 현릉(顯陵)이다. 신혜왕후와 함께 합장되었다.\n\n=== 비판 === \n\n재위 기간 중의 정치적 역량은 매우 뛰어났지만, 집권 기간 동안 호족 세력 통제에 완전하지 못했고, 후계 구도를\
    \ 제대로 잡지 못해 그의 사후 고려 초기의 정치 혼란상을 초래했다는 비판을 받고 있다. \n2대 혜종의 권력 기반을 제대로 만들어주지 못해 그의 사후 정종의 쿠데타와 광종의 대량 숙청이 일어나 고려 초기 사회가\
    \ 혼란해진 원인을 제공했다. 물론, 그도 생전에 여러 호족 통제 정책들을 시행해 상당한 효과를 보았고, 또 주요 왕자들을 전쟁터로 늘 데려가 왕자들의 군사적 세력을 키워줘 결국 신검을 비롯한 왕자들의 난으로 권력을\
    \ 잃은 견훤과 달리, 왕건은 장남인 왕무만을 전쟁터에 늘 데리고 가 공을 세우게 해 주고, 이에 반해 다른 왕자들은 외면해서 다른 왕자들이 군사적으로 세력을 키우는 것을 막았으며, 또 자신의 사후 후계 문제를\
    \ 우려해 박술희와 왕규,염상,박수문 등을 혜종의 후견인으로 삼았으며, 후삼국 통일 과정에서 보여준 혜종의 뛰어난 군사적 능력을 믿고 그에게 보위를 넘겨 주었고, 또 혜종이 보위에 오르기 전에 혜종과 정종의 아내들을\
    \ 서로 자매들로 혼인시켜 둘의 싸움을 만류하는 정치적 배려까지 썼지만 더 치밀하지 못해 그의 사후 고려는 한동안 반란과 숙청으로 혼란해졌다."
  - "남아프리카공화국 국제관계협력부(DIRCO)는 함메를의 위치를 파악하는 데에 초점을 맞춰 리비아에서의 미션을 재개했다. 남아공과 오스트리아 정부는 리비아와의 갈등에 있어 양국 모두가 외교적인 노력이 필요하다는 것을\
    \ 알고, 그의 시신을 인도 받고 제대로 된 장례를 치르기 위해 서로 협력하기 시작했다. \n\n2011년 12월 6일 국제관계협력부 야당의 장관은, 그의 실종기간에 그의 신변의 안전 보장에 대한 확인과 적극적인\
    \ 조치를 취하지 않은 남아공 정부에게 책임을 물었다. 국제관계협력부는 내전으로 인해 상황이 어려웠다고 말했다 페니 수크라지는 비영리단체를 구성하여 그의 실종에 관한 소식을 확산시킬 수 있었다\n\n국제기자연맹의\
    \ 회장은 \"사실을 은폐하려고 한 리비아 정부에 의해 살해당한 충격적인 그의 사망 뉴스를 어떻게 감당할 수 있을지 모르겠다. 우리는 그의 부인 페니 수크라지에게 진심으로 애도의 말씀을 올린다.\"라고 말했다.\
    \ 요하네스버그 프레스 클럽의 부회장인 막셀 드 콕은 만약 기자들이 계속해서 리비아 내전의 전투와 국제법 위반 과정을 폭로하는 취재를 진행한다면, 그들은 전쟁과 분쟁지역에서 반드시 보호받아야 한다고 강조했다"
  - 정보기술(IT) 업계 양대 거인인 구글과 페이스북이 시장 지배력을 유지하기 위해 경쟁적으로 기업 인수합병(M&A)에 나서면서 이 업계 M&A 시장이 14년 만에 가장 뜨겁게 달아오르고 있다고 파이낸셜타임스(FT)가
    20일(현지시간) 보도했다. 시장조사회사 딜로직에 따르면 지난 19일 페이스북이 모바일 메신저서비스 왓츠앱을 190억달러에 인수한다고 발표하면서 올 들어 현재까지 IT업계에서만 500억달러의 M&A가 성사됐다.
    닷컴버블 당시인 2000년 1분기 780억 달러의 M&A가 이뤄진 이후 가장 바쁜 1분기다.IT업계에 이처럼 M&A의 큰 장이 선 이유는 구글과 페이스북이 막대한 현금 동원 능력과 급등한 주가를 앞세워 잠재적 라이벌을
    빠르게 사들이고 있기 때문이다. 페이스북은 2012년 10억달러를 주고 사진공유 소셜네트워크서비스(SNS) 인스타그램을 인수했다. 지난해 말에는 일정 시간이 지나면 공유한 사진이 상대방 스마트폰에서 사라지는 메신저
    서비스 스냅챗을 30억달러에 인수하려다 거절당하기도 했다. FT는 페이스북이 왓츠앱 인수에 190억달러라는 천문학적 돈을 쓴 것은 M&A에 대한 절박한 심정을 반영한다고 분석했다. 구글은 이미 세계에서 M&A를
    가장 많이 하는 기업이 됐다. 최근 블룸버그 조사 결과 구글은 2011년부터 지난달까지 3년간 총 127개 회사를 사들였다. 광고회사 WPP와 반도체회사 인텔을 누르고 M&A 건수 1위를 기록했다. 최근에는 스마트
    온도조절장치 제조사인 네스트랩을 32억달러에 인수했으며 작년 12월에는 로봇사업 진출을 위해 보스턴 다이내믹스를 사들였다. CCS인사이트의 IT 애널리스트인 제프 블레이버는 “마치 라스베이거스의 도박사들이 판돈
    제한 없는 포커 테이블에 앉아 끊임없이 판돈을 올리는 것 같다”며 과열된 분위기를 우려했다. 반면 사람들에게 쉽게 잊혀지는 IT 업계에서 관심을 유지하기 위해서는 공격적인 M&A가 불가피하다는 의견도 있다. 레트
    월래스 트리톤리서치 최고경영자(CEO)는 “한번 청중을 잃으면 파티는 끝난다”고 말했다.
- source_sentence: 호시노 센이치가 주니치의 감독으로 부임한 해는?
  sentences:
  - '우라노스는 아내 가이아가 낳은 자식들 헤카톤케이레스, 키클롭스, 티탄들을 보기 싫다고 저승 타르타로스에 감금시켜 버렸다. 가이아는 자식들이 갇혀 있는 것이 안타까워 자식들을 부추겨 우라노스에 대항하게 했다. 이에
    티탄족의 막내 크로노스가 어머니의 뜻을 받들어 우라노스를 제거하기로 하고 어머니에게 하르페(반월도)를 받았다.


    우라노스가 가이아를 만나러 왔을 때 크로노스는 하르페로 우라노스의 고환을 잘라버리고 바다에 버렸다. 이때 우라노스의 불알에서 떨어진 피가 땅에 떨어져 기간테스, 에리누스, 메리아데스가 생겨났다. 크로노스는 우라노스의
    뒤를 이어 신들의 제위에 오르면서 헤카톤케이레스, 키클롭스, 그리고 새로 생겨난 기간테스를 다시 타르타로스에 감금하였는데 가이아는 다시 자신의 자식들이 감금되는 것을 보고 크로노스를 저주하여 이렇게 말했다. "너도
    똑같이 너의 자식에게 당할 것이다."


    크로노스는 자신의 자식들이 자기에게 반란을 일으킬까 두려워 아내 레아에게서 자식이 태어나는 족족 삼켜버렸다. 그러나 레아는 막내 제우스를 살리기 위해 아기 대신 돌을 강보에 싸서 크로노스가 삼키게 해줌으로써 크로노스로부터
    제우스를 지켜내었다. 레아는 제우스를 크레타 섬에 숨겨서 키웠다.'
  - 올 3분기 글로벌 정보기술(IT) 회사 중 매출 1위는 삼성전자가 차지했다. 가장 많은 영업이익을 올린 기업은 애플이었다. 3분기 글로벌 IT업계 실적을 비교한 결과 매출 1위는 삼성전자가, 그 뒤는 애플이 차지했다.
    3~5위는 IBM 마이크로소프트 구글 순이었다. 삼성전자는 3분기 59조800억원의 매출을 기록, 40조2200억원(이하 9월 말 환율 적용)인 애플을 18조8600억원 차이로 따돌렸다. 삼성전자와 애플의 매출
    차는 1분기 4조4300억원, 2분기 17조2100억원이었다. 3분기에 그 차이를 더 벌린 것이다. 지난해 4분기만 해도 삼성전자의 매출은 애플보다 3조8900억원 적었다. 3분기 애플은 아이폰 신제품이 없어 스마트폰
    판매가 다소 부진했던 반면 삼성전자는 보급형 스마트폰 등으로 꾸준한 판매실적을 올렸기 때문으로 보인다. 시장조사기관 SA에 따르면 2분기 삼성전자와 애플의 스마트폰 시장 점유율은 각각 32.9%, 15.6%였지만
    3분기엔 35.2%, 13.4%였다. 3분기 IT 기업의 영업이익은 애플 삼성전자 마이크로소프트 인텔 IBM 순이었다. 삼성전자는 사상 처음으로 10조원대(10조1600억원)의 분기 영업이익을 올렸으나 애플(10조7600억원)의
    실적을 넘진 못했다. 다만 애플과 삼성전자의 영업이익 격차는 점점 줄어들고 있다. 2011년 4분기 15조4300억원, 2012년 1분기 11조7200억원에 이르렀던 두 회사의 영업이익 격차는 올 1분기 5조1700억원,
    2분기 9500억원 등으로 좁혀졌다.
  - '현학(玄學)은 기원후 3세기에서 6세기에 성행한 중국철학의 한 학파이다. 유교와 도교를 혼합하여 《역경》, 《도덕경》, 《장자》 등을 재독해하는 것을 목적으로 했다. 이 세 책을 "삼현(三玄)"이라 부르며 숭상했기에
    현학이라는 이름이 붙었다. 대표적인 현학자로는 왕필과 곽상이 있으며, 이 두 사람은 각각 《도덕경》과 《장자》에 주석을 단 것으로 유명하다.


    한자 玄이란 기본적으로 "어둡다"는 뜻이지만, 더 나아가 "애매하다, 알 수 없다, 미스터리, 신비주의"라는 뜻이기도 하며, 《도덕경》 제1장에 나오는 말이다. 정통 유교가 수기치인, 경세치국의 학문으로써 개인의
    인간성을 수양하고 또한 세상을 평안케 하는 형이하학적인 정치철학으로서의 기능을 가지고 있는 데 비하여, 현학은 상술한 玄의 의미와 같이 밀교적이고 형이상학적인 가치를 탐구하는데 그 목적을 두었다. 그러나 위진남북조의
    난세 와중에 국가의 권위가 떨어지고 아노미 상태가 펼쳐지자 현학자들 및 현학의 영향을 받은 자들은 개인의 보신과 영달에 힘을 쏟으며 자연을 즐기고 미신에 관심을 두게 되었다. 시간이 지나며 현학은 청담으로 대표되는
    신비주의, 과시주의, 허무주의로 변질되었다.


    알맹이는 없으면서 장황하게 허세만 부리는 말과 글을 가리키는 "현학적"이라는 말이 여기서 유래한 것이다.1'
- source_sentence: 신경줄기세포로 치료할 수 없는 뇌질환은 무엇인가?
  sentences:
  - '회색긴팔원숭이(학명: Hylobates muelleri)는 긴팔원숭이과의 긴팔원숭이속에 속하는 영장류 유인원이다. 보르네오긴팔원숭이라고도 불린다.


    여타 긴팔원숭이들과는 달리, 회색긴팔원숭이는 암수가 털 색깔이 다르지 않다. 털 색깔은 회색 또는 갈색으로, 얼굴 둘레에 둥근 링 모양의 선명한 털을 갖고 있다. 머리에는 종종 어두운 색깔의 전두부를 지니고 있다.
    몸무게는 평균 5.7 kg 정도이며, 긴팔원숭이 중에서 작은 편에 속한다.


    회색긴팔원숭이는 보르네오 섬의 풍토 종으로 섬의 북부와 동부 지역에 거주한다. 섬의 남서 지역에는 검은손긴팔원숭이가 사는 데, 놀랍게도 그들 거주 지역은 거의 겹치지 않는다. 이들은 주행성이며 우림에 거주하고,
    다른 모든 긴팔원숭이들처럼 긴팔을 가지고, 나무와 나무 사이를 건너 다니는 특징이 있다. 회색긴팔원숭이는 일자일웅 형태로 함께 살며, 길고 큰 소리를 내어 그들 가족의 거주지를 침입자로부터 방어한다. 이들의 먹이는
    주로 과일이다. 이들의 생식에 대해서는 일부만이 알려져 있지만, 다른 긴팔원숭이들과 비슷할 것으로 생각되고 있다.'
  - "1939년 무어가 케임브리지 대학교의 철학 교수직을 사임하자 비트겐슈타인이 후임자로 임명되었으며, 교수직을 갖게 된 얼마 후 영국 시민권을 획득할 수 있었다. 1939년 7월 비트겐슈타인은 빈을 방문하여 그레틀과\
    \ 다른 누나들을 만났고, 하루는 라이히스방크의 직원을 만나기 위해 베를린에 들렀다. 이후, 그는 가족이 처한 위험을 모면하기 위해 계획을 짜고 있던 형 파울을 설득하기 위해 뉴욕으로 갔다. 1939년 8월 가족에\
    \ 대한 해방 요청이 접수되었는데, 전쟁이 시작되기 1주일 전에 알려지지 않은 사람의 승인으로 비트겐슈타인 가족의 재산 금 1.7톤이 나치에게 인도되었다. 이는 2009년 가치로 환산하면 약 60억 달러에 해당하는\
    \ 금액이다. 또한 비트겐슈타인은 같은 해에 모스크바를 두 번째로 방문하여 철학자인 소피야 야노프스카야를 만났다. \n\n일을 마무리 지은 다음 비트겐슈타인은 영화관 제일 앞자리에서 영화를 보는가 하면 추리소설을\
    \ 읽으면서 편안히 서방세계를 관망하였다. 노먼 맬콤은 비트겐슈타인이 강의를 마치자마자 영화관으로 달려가곤 했다고 회고하였다.\n강의를 마친 학생들이 교실을 나가려고 의자에서 몸을 빼는 순간 비트겐슈타인은 친구를\
    \ 향해 \"갈 수 있겠어?\"하고 낮은 목소리로 묻곤 하였다. 영화관에 갈 때면 비트겐슈타인은 빵이나 파이 따위를 사들고서는 영화를 보면서 먹었다. |노먼 맬콤\n\n이 무렵 비트겐슈타인은 수학기초론에 대한 자신의\
    \ 기존 견해에 회의적인 태도를 보였다. 비트겐슈타인의 초기 사상에서 논리는 단단한 기호였으며, 그는 러셀과 화이트헤드의 《수학 개론》에 대해서도 이러한 사고를 기초로 비평하였다. 하지만 이 무렵에 이르러서 비트겐슈타인은\
    \ 자신의 글과 강의를 통해서 과거 자신의 사상을 부정하였다."
  - 전원생활을 하던 프랭크는 어느날 아들이 집으로 보내온 건강 관리 로봇이 불청객으로 느껴진다. 식습관부터 운동까지 하루 종일 따라다니며 사사건건 잔소리를 늘어놓기 때문이다. 하지만 협박까지 하며 감정에 호소하는 로봇이
    어느새 귀엽게 느껴지기 시작하면서 둘 사이의 소통이 시작된다.연초 개봉한 미국 영화 ‘로봇 앤드 프랭크’ 도입부 내용이다. 이 영화엔 노인을 위한 반려로봇이 등장한다. 모닝콜로 하루를 열어주고 정원까지 가꿔주는
    등 못하는 게 없는 만능이다. 이처럼 고령자들의 일상생활을 도와주는 ‘라이프 케어 서비스 로봇’이 미래 10대 유망 기술로 뽑혔다.한국과학기술기획평가원(KISTEP)은 10년 내 한국사회에 가장 파급효과가 큰 핵심
    트렌드로 ‘인구구조의 고령화’를 선정하고 이를 대비할 10대 미래유망기술을 발표했다.KISTEP는 재활치료와 간병을 돕는 ‘라이프 케어 서비스 로봇’을 비롯 고령자가 물건을 들 때 도와주는 ‘근력지원 로봇 슈트’
    등이 대중화될 것으로 내다봤다. 질병 치료를 위한 ‘신경줄기세포 치료기술’도 유망 기술로 꼽혔다. 환자의 피부에서 줄기세포를 채취한 뒤 신경줄기세포로 배양, 뇌세포로 이식하는 기술은 알츠하이머, 파킨슨병 등 퇴행성
    뇌질환을 근본적으로 치료할 수 있는 후보 기술로 주목받고 있다.노인들이 스마트 기기를 쉽게 사용할 수 있도록 음성을 인식하는 ‘대화형 자연어처리기술’을 비롯해 동작으로 기기를 작동할 수 있는 ‘생체신호 인터페이스’
    등도 이름을 올렸다.이 밖에 △혈액 한 방울로 질병을 진단할 수 있는 ‘나노바이오 의료센서’ △유전체를 분석하는 ‘초고속 유전체 해독기술’ △운전자 없이 운행 가능한 ‘무인자율주행자동차’ △질병을 미세하게 관찰할
    수 있는 ‘분자영상 질병진단 기술’ △3D 홀로그램 등 어디서나 네트워크가 가능한 ‘실감형 스마트워크’ 등을 유망기술로 선정했다.
- source_sentence: 첼레스티노 1세가 기록상으로 처음 언급되었을때의 직책은?
  sentences:
  - 쏘카가 지난해 베타 서비스 출시 한 달 만에 선착순 1만 명이 마감된 정기 구독 서비스인 '쏘카패스' 인기에 힘입어 다시 한 번 회원 1만 명 한정 정식 출시에 나섰다. 쏘카패스는 회원들로부터 차량 구매의 부담을
    줄이면서도 합리적인 비용으로 언제든 내 차처럼 이용할 수 있다는 평가를 받고 있다. '쏘카패스'는 매달 9,900원을 내면 아반떼부터 벤츠까지 쏘카의 1만 1천여 대 전 차량을 차종 및 횟수 제한없이 50% 할인된
    가격으로 언제든지 이용할 수 있는 서비스로, 지난해 10월 국내 모빌리티 업계 최초 선보인 구독 모델이며 출시 1개월 만에 완판되는 등 뜨거운 호응을 얻었다. 이번에 정식으로 다시 출시되는 쏘카패스 할인은 대여시간
    최소 4시간부터 최대 2주까지 폭넓게 적용받을 수 있어, 이동이 필요한 일상의 모든 순간에 비용 걱정 없이 자유로운 이동이 가능하도록 했다. 쏘카는 지난 2012년 4월 서비스 시작 이후 7년 여 만에 회원수 460만
    명을 돌파, 차량 공유(카셰어링)의 대중화를 이끌어왔다. 높은 구매 비용을 부담하면서 차량을 소유하지 않더라도 필요할 때마다 차량을 이용할 수 있는 카셰어링 서비스에 대한 인지도와 경험이 전 연령대에 걸쳐 축적되면서
    현재 쏘카 회원은 20~30대뿐만 아니라 40~50대 중장년층도 20%에 가까운 비중을 차지한다. 이에 따라 일상 전반에 상시적으로 공유 차량을 이용하는 데 있어 시간 및 비용 측면에서 좀 더 합리적인 카셰어링
    구독 서비스에 대한 수요도 늘어나고 있다. 쏘카패스 정기 구독 신청은 쏘카앱에서 가능하며, 서비스를 구독한 날부터 매월 자동 결제된다. 구독 중 서비스 취소를 하면 90일 이후 재가입이 가능하다. 차량 대여 이외
    주행요금과 하이패스 비용 등은 기존 요금 체계와 동일하다. 쏘카 한서진 마케팅본부장은 "카셰어링이 여행이나 명절 등 특별한 날이 아닌, 일상적인 이동 서비스로도 확대되면서 쏘카는 공유를 통한 차량 소유 대체라는
    모빌리티 가치를 실현하고자 한다"면서 "거의 매일 쏘카를 상시 이용하고자 하는 고객들이 더욱 합리적이고 효율적으로 쏘카 차량을 이용할 수 있도록 라이프스타일, 이동패턴 등 개별 고객에 최적화된 다양한 구독 모델을
    개발할 예정"이라고 말했다.
  - "교황 첼레스티노 1세( Caelestinus PP. I, Papa Celestino I)는 제43대 교황(재위: 422년 9월 10일 - 432년 7월 27일)이다. 《교황 연대표》에 의하면, 첼레스티노 1세는\
    \ 11월 3일에 즉위했다고 하지만, 다른 문헌에서는 모두 9월 10일에 즉위했다고 기록되어 있다. \n\n첼레스티노 1세는 캄파냐 태생의 로마인이다 프리스쿠스의 아들이라는 점 외에 그의 유년 시절에 대한 정보는\
    \ 전혀 알려져 있지 않다. 또한 성 암브로시오와 함께 밀라노에 거주한 적이 있다고 전해진다. 문헌상으로 그의 이름이 처음 등장한 것은 416년 작성된 교황 인노첸시오 1세 때의 문서인데, 여기에는 그가 부제였다고\
    \ 기록되어 있다.\n\n기독교 전례의 여러 요소가 첼레스티노 1세에 의해 고안되었다고 전해지지만, 확실하지는 않다. 428년 첼레스티노 1세는 네스토리우스를 콘스탄티노폴리스 주교좌에 착좌하는 것을 승인하였다.\
    \ 하지만 네스토리우스가 펠라기우스주의에 빠진 에클라눔의 율리아누스와 가깝다는 사실을 뒤늦게 알고는 종래의 입장을 철회하였다. 율리아누스는 강론과 서신 등을 통해 기독교에서 전통적으로 믿어오던 테오토코스(하느님의\
    \ 어머니) 교의에 반대하고 나섰다. 이 문제로 콘스탄티노폴리스에서 논쟁이 벌어졌다는 소식을 접한 첼레스티노 1세는 알렉산드리아의 치릴로 주교에게 네스토리우스에 대한 조사할 것을 지시하였다. 치릴로의 조사를 근거로\
    \ 하여 430년 8월 소집된 로마 시노드에서 첼레스티노 1세는 네스토리우스를 장엄하게 단죄하였다. 네스토리우스는 10일 이내에 자신의 오류를 인정하여 철회할 것을 지시하였으며, 형 집행의 참관은 치릴로에게 위임하였다.\n\
    \n전통적으로 콘스탄티노폴리스 교구와 알렉산드리아 교구는 경쟁 관계에 있었기 때문에 치릴로는 기꺼이 그 일을 맡기로 하고 그 해 11월 이집트 시노드에 네스토리우스의 오류 열두 목록을 제출하였다. 이 일은 첼레스티노\
    \ 1세의 승인을 받지 않은 키릴루스의 호의적인 태도에서 나온 것이었는데 결과는 더 나쁘게 되고 말았다. 알렉산드리아 학파가 사용하던 용어는 안티오키아 학파의 지지를 받지 못하였던 것이다.\n\n치릴로의 소집이\
    \ 끝나기 전에 테오도시우스 2세 황제의 요청에 따라 431년 에페소 공의회가 소집되었다. 첼레스티노 1세는 에페소 공의회에 아르카디우스와 프로옉투스 주교, 필리포 신부 등을 사절로 파견하였다. 치릴로가 431년\
    \ 6월 22일 공의회 개회를 선포하고 이집트의 주교들, 에페소의 주교, 예루살렘의 주교의 지지를 받아 네스토리우스주의를 단죄하고 성모 마리아는 하느님의 어머니라고 선포하였다. 첼레스티노 1세의 사절들이 7월 10일에\
    \ 도착하여 치릴로에 의해 결정된 바를 승인하고 네스토리우스의 해임을 확인하였다. 첼레스티노 1세는 막시미아누스를 네스토리우스 대신 콘스탄티노폴리스 주교로 착좌하는 것을 승인하였다. 당시(431년 3월 15일)\
    \ 공의회에서 낭독된 그의 서신은 총 네 편인데, 하나는 아프리카 주교들에게, 또 하나는 테살로니카 주교들에게, 또 하나는 일리리아의 주교들에게, 마지막 하나는 나르본 주교들에게 보낸 것이다. 라틴어 원본들은 소실되었으며,\
    \ 그리스어로 번역한 것이 현재 남아 있다.\n\n첼레스티노 1세는 펠라기우스주의를 적극 비판하였으며, 정통 기독교 신앙을 수호하는데 매진하였다. 431년 그는 팔라디오를 주교로 서임하고 아일랜드로 파견하였다.\
    \ 전임인 파트리치오 주교는 수도 생활을 하였다. 또한, 첼레스티노 1세는 로마에 있는 노바시아노주의자들을 강력하게 반대하였다. 소크라테스 스콜라스티쿠스의 증언에 따르면, 첼레스티노 1세는 로마에 있는 노바시아노주의자들의\
    \ 성당들을 모조리 몰수하였다고 한다. 그리하여 노바시아노주의자들은 비밀리에 민가에서 집회를 가졌다고 한다. \n\n첼레스티노 1세는 432년 7월 26일에 선종하였다. 그의 시신은 살라리아 가도에 있는 성 프리실라\
    \ 성당의 묘지에 안장되었다가, 산타 프라세데 성당으로 이장되어 오늘날까지 이르고 있다. 사후 성인으로 시성되었으며, 축일은 4월 6일이다."
  - 리위안차오(李源潮) 중국 국가부주석(사진)의 일가족이 일본 교토에 있는 호화 주택을 뇌물로 받았다는 의혹이 제기됐다. 중국 공산당 내 서열 8위인 리 부주석은 최대 정치 계파인 공산주의청년단(공청단)파의 핵심 인물로,
