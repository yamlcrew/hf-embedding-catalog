  - '2010년 7월 31일 일본 현지 언론에 따르면, 사쿠라코 양 과 가에다 군 남매는 30일 아파트 안에서 굶어 죽어 일부 시신이 부패한 상태로 발견되자 이와 유사한 일이 벌어졌던 것은 해당 아이들의 엄마이자 유흥
    업소 종업원인 시모무라 사나에씨가 지난 2010년 6월 하순, 해당 아이들을 집안에 가두어 둔 채 친구의 집에 가버렸기 때문인 것으로 보인다. 그리고 보관중인 음식은 물론, 냉장고에 있는 마실 물 조차 남기지 않고
    아동을 내버려두면서 방임시키는 일을 저질렀던 것으로 보고되어 있다. 이유는 육아 적응력이 떨어져서 그렇다. 이와 같은 23세 짜리의 철없고 비정한 모친이 아닌 일본인은 물론 일본 사회 당국을 더 낙담하게 하는 무성의한
    태도로 결론지었다.


    그 결과 피해를 당하게 하고 있는 두 아이의 행적을 보면 지난 2010년 3월, 해당 맨션 내 자택에서 이상한 소리가 들린다고 오사카시에서 운영중인 아동학대 상담전화를 통해 3번씩 신고하였으나, 최종적인 신고는
    같은 해 5월 18일 자로 접수되었고, 오사카시 관계자에 따르면 그날 오후 집을 방문하였다가 울음 소리가 더 이상 들리지 않고 집주인을 만나지 못하게 되자 어쩔 수 없이 되돌아간 바 있다.'
