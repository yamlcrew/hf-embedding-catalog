    - "교황 첼레스티노 1세( Caelestinus PP. I, Papa Celestino I)는 제43대 교황(재위: 422년 9월 10일 - 432년 7월 27일)이다. 《교황 연대표》에 의하면, 첼레스티노 1세는\
      \ 11월 3일에 즉위했다고 하지만, 다른 문헌에서는 모두 9월 10일에 즉위했다고 기록되어 있다. \n\n첼레스티노 1세는 캄파냐 태생의 로마인이다 프리스쿠스의 아들이라는 점 외에 그의 유년 시절에 대한 정보는\
      \ 전혀 알려져 있지 않다. 또한 성 암브로시오와 함께 밀라노에 거주한 적이 있다고 전해진다. 문헌상으로 그의 이름이 처음 등장한 것은 416년 작성된 교황 인노첸시오 1세 때의 문서인데, 여기에는 그가 부제였다고\
      \ 기록되어 있다.\n\n기독교 전례의 여러 요소가 첼레스티노 1세에 의해 고안되었다고 전해지지만, 확실하지는 않다. 428년 첼레스티노 1세는 네스토리우스를 콘스탄티노폴리스 주교좌에 착좌하는 것을 승인하였다.\
      \ 하지만 네스토리우스가 펠라기우스주의에 빠진 에클라눔의 율리아누스와 가깝다는 사실을 뒤늦게 알고는 종래의 입장을 철회하였다. 율리아누스는 강론과 서신 등을 통해 기독교에서 전통적으로 믿어오던 테오토코스(하느님의\
      \ 어머니) 교의에 반대하고 나섰다. 이 문제로 콘스탄티노폴리스에서 논쟁이 벌어졌다는 소식을 접한 첼레스티노 1세는 알렉산드리아의 치릴로 주교에게 네스토리우스에 대한 조사할 것을 지시하였다. 치릴로의 조사를\
      \ 근거로 하여 430년 8월 소집된 로마 시노드에서 첼레스티노 1세는 네스토리우스를 장엄하게 단죄하였다. 네스토리우스는 10일 이내에 자신의 오류를 인정하여 철회할 것을 지시하였으며, 형 집행의 참관은 치릴로에게\
      \ 위임하였다.\n\n전통적으로 콘스탄티노폴리스 교구와 알렉산드리아 교구는 경쟁 관계에 있었기 때문에 치릴로는 기꺼이 그 일을 맡기로 하고 그 해 11월 이집트 시노드에 네스토리우스의 오류 열두 목록을 제출하였다.\
      \ 이 일은 첼레스티노 1세의 승인을 받지 않은 키릴루스의 호의적인 태도에서 나온 것이었는데 결과는 더 나쁘게 되고 말았다. 알렉산드리아 학파가 사용하던 용어는 안티오키아 학파의 지지를 받지 못하였던 것이다.\n\
      \n치릴로의 소집이 끝나기 전에 테오도시우스 2세 황제의 요청에 따라 431년 에페소 공의회가 소집되었다. 첼레스티노 1세는 에페소 공의회에 아르카디우스와 프로옉투스 주교, 필리포 신부 등을 사절로 파견하였다.\
      \ 치릴로가 431년 6월 22일 공의회 개회를 선포하고 이집트의 주교들, 에페소의 주교, 예루살렘의 주교의 지지를 받아 네스토리우스주의를 단죄하고 성모 마리아는 하느님의 어머니라고 선포하였다. 첼레스티노 1세의\
      \ 사절들이 7월 10일에 도착하여 치릴로에 의해 결정된 바를 승인하고 네스토리우스의 해임을 확인하였다. 첼레스티노 1세는 막시미아누스를 네스토리우스 대신 콘스탄티노폴리스 주교로 착좌하는 것을 승인하였다. 당시(431년\
      \ 3월 15일) 공의회에서 낭독된 그의 서신은 총 네 편인데, 하나는 아프리카 주교들에게, 또 하나는 테살로니카 주교들에게, 또 하나는 일리리아의 주교들에게, 마지막 하나는 나르본 주교들에게 보낸 것이다.\
      \ 라틴어 원본들은 소실되었으며, 그리스어로 번역한 것이 현재 남아 있다.\n\n첼레스티노 1세는 펠라기우스주의를 적극 비판하였으며, 정통 기독교 신앙을 수호하는데 매진하였다. 431년 그는 팔라디오를 주교로\
      \ 서임하고 아일랜드로 파견하였다. 전임인 파트리치오 주교는 수도 생활을 하였다. 또한, 첼레스티노 1세는 로마에 있는 노바시아노주의자들을 강력하게 반대하였다. 소크라테스 스콜라스티쿠스의 증언에 따르면, 첼레스티노\
      \ 1세는 로마에 있는 노바시아노주의자들의 성당들을 모조리 몰수하였다고 한다. 그리하여 노바시아노주의자들은 비밀리에 민가에서 집회를 가졌다고 한다. \n\n첼레스티노 1세는 432년 7월 26일에 선종하였다.\
      \ 그의 시신은 살라리아 가도에 있는 성 프리실라 성당의 묘지에 안장되었다가, 산타 프라세데 성당으로 이장되어 오늘날까지 이르고 있다. 사후 성인으로 시성되었으며, 축일은 4월 6일이다."
    - 리위안차오(李源潮) 중국 국가부주석(사진)의 일가족이 일본 교토에 있는 호화 주택을 뇌물로 받았다는 의혹이 제기됐다. 중국 공산당 내 서열 8위인 리 부주석은 최대 정치 계파인 공산주의청년단(공청단)파의 핵심
      인물로, 차기 정치국 상무위원 진입이 유력한 것으로 알려졌다. 이번 의혹이 그에 대한 부패조사로 이어질 경우 중국 정치권에 작지 않은 파장이 예상된다.미국에 서버를 둔 중화권 매체 보쉰은 15일 리 부주석의
      아들 리하이진과 그의 처제 가오취안젠이 중국 벤처기업 베이다팡정그룹의 리여우 사장으로부터 해당 호화 주택을 수뢰했다고 보도했다. 리 사장은 후진타오(胡錦濤) 전 국가주석의 비서실장을 지낸 링지화 통일전선공작부장의
      가족에게도 도쿄의 한 호화 주택을 뇌물로 제공했다는 의혹을 받고 있다. 두 주택을 합친 가격은 5억달러(약 5500억원)를 호가하는 것으로 전해졌다.소식통은 1년여 전 이뤄진 해당 교토 주택의 명의 이전 수속에는
      리 사장 이외에 리 부주석의 측근인 탕빙린 장쑤성 관광국 부국장이 개입했다고 전했다. 리 부주석은 장쑤성 서기와 공산당 조직부장을 거쳤으며 리커창(李克强) 총리와 함께 공청단파를 이끌고 있다. 작년 3월 전국인민대표대회에서
      국가 부주석 자리에 오른 뒤 시진핑(習近平) 주석을 보좌해 외교 업무를 담당해왔다. 그는 2017년 열리는 19차 당 대회에서 상무위원 진입이 유력하다는 평가를 받아왔다. 하지만 그의 비서를 지낸 자오사오린
      전 장쑤성 비서장이 지난 10월 기율위반 혐의로 조사받고 있다는 사실이 공개되면서 리 부주석 역시 반부패 조사의 타깃이 될 수 있다는 관측이 제기됐다. 베이징=김동윤 특파원
  - source_sentence: 삼성의 마케팅 사례만 담아 집필한 책은?
    sentences:
    - 삼성전자의 ‘삼성갤럭시’가 국내에서 가장 가치가 높은 브랜드로 5년 연속 선정됐다.브랜드가치 평가회사인 브랜드스탁이 6일 발표한 ‘2015년 대한민국 100대 브랜드’ 순위에서 삼성갤럭시는 브랜드가치 평가지수(BSTI)
      934점을 얻어 5년째 정상에 올랐다. 이마트가 지난해에 이어 2위, 인천공항은 한 단계 상승해 3위를 차지했다. 카카오톡, 네이버, 롯데월드 어드벤처, 신한카드, KB국민은행, 신라면 등이 뒤를 이었다.구글은
      지난해 66위에서 올해 34위로 뛰어올라 상승 폭이 가장 컸다. 메르스(중동호흡기증후군) 사태의 반사이익을 누린 온라인쇼핑 브랜드도 약진했다. 11번가, G마켓, 쿠팡 등이 두 자릿수 순위 상승을 기록했다.
      밴드(59위), 스파크(84위), 에이스침대(87위), 유니클로(91위), BC카드(98위) 등 11개 브랜드가 100위권에 처음 진입했다.반면 ‘땅콩 회항’ 논란을 빚은 대한항공은 6위에서 39위로 하락했다.
      배출가스 조작 파문의 폭스바겐은 지난해 71위에서 100위권 밖으로 밀려났다. 브랜드스탁은 “대형 악재로 인해 브랜드가치가 급락한 사례가 계속 늘어나는 만큼 기업마다 브랜드가치 제고에 더욱 심혈을 기울여야 한다”고
      지적했다.BSTI는 브랜드스탁의 모의주식 거래로 형성된 브랜드 주가지수(70%)와 정기 소비자 조사지수(30%)를 조합한 브랜드가치 평가모델이다. 230여개 부문의 대표 브랜드 1000여개를 대상으로 브랜드가치를
      1000점 만점으로 지수화했다.
    - 앞으로 10년, 한국 없는 중국은 있어도 중국 없는 한국은 없다KOTRA 베이징·상하이 무역관장을 지낸 저자의 중국 비즈니스론. 한·중 자유무역협정(FTA)을 계기로 양국 협력의 양과 질을 확대해야 한다고 주장한다.
      (김상철 지음, 한스미디어, 396쪽, 1만8000원)웜홀 달팽이에게 들키다선임 직원들을 조직에 헌신하는 지원자로 만드는 과정을 생생하게 전달한다. ‘조직의 빅마우스를 열렬한 충성자로 변화시킬 수 있는가’에
      대한 해법을 제시한다. (양은하·양은호 지음, 클릭출판, 176쪽, 1만5000원)마케팅 성공사례 상식사전삼성, 현대, P&G 등 국내외 대표 기업들의 독특하고 창의적인 마케팅 성공 사례 56가지를 담았다.
      다양한 광고 사진, 만화는 물론 QR코드를 통해 관련 동영상도 감상할 수 있다. (정재학·케빈 리 지음, 길벗, 288쪽, 1만3500원)먼짓길 인생에 장자를 만나다혼란과 분열의 전국시대를 살았던 장자의 눈으로
      빈부 격차, 욕망과 만족, 경쟁과 실패 등 현대인의 삶을 바라본다. (왕이자 지음, 박성희 옮김, 북스넛, 406쪽, 1만5000원)미친 포로원정대1941년 연합군 전쟁 포로가 됐다가 수용소를 탈출해 케냐 레나나
      봉을 등정한 뒤 다시 수용소로 돌아온 세 명의 이탈리아인 이야기. 산악 논픽션의 고전으로 꼽히는 책이다. (펠리체 베누치 지음, 윤석영 옮김, 박하, 424쪽, 1만2500원)팽목항에서 불어오는 바람김동춘,
      천정환, 진태원 등 인문사회학자 13명이 세월호 참사가 인간과 사회에 던진 질문에 대해 사유하고 성찰한 글을 모았다. (노명우 외 지음, 현실문화, 376쪽, 1만4000원)시간 사용법우연히 타임머신을 얻게
      된 소년이 멋들어진 미래를 꿈꾸다 뜻하지 않은 사고와 맞닥뜨린다. ‘지금 이 순간’이 얼마나 소중한지를 알려주는 판타지 동화다. (낸시 에치멘디 글, 오윤화 그림, 김세혁 옮김, 라임, 180쪽, 9800원)백성을
      사랑한 충신이야기고구려 시대 빈민 구제책을 시행한 재상 을파소, 소를 타고 다닌 청백리 정승 맹사성, 재치와 해학이 넘친 오성 대감 이항복 등 명재상·명정승을 소개한다. (신현배 글, 양동석 그림, 현문미디어,
      236쪽, 1만2000원)황금으로 만든 나라는 왜 사라졌을까
    - '2010년 7월 31일 일본 현지 언론에 따르면, 사쿠라코 양 과 가에다 군 남매는 30일 아파트 안에서 굶어 죽어 일부 시신이 부패한 상태로 발견되자 이와 유사한 일이 벌어졌던 것은 해당 아이들의 엄마이자
      유흥 업소 종업원인 시모무라 사나에씨가 지난 2010년 6월 하순, 해당 아이들을 집안에 가두어 둔 채 친구의 집에 가버렸기 때문인 것으로 보인다. 그리고 보관중인 음식은 물론, 냉장고에 있는 마실 물 조차
      남기지 않고 아동을 내버려두면서 방임시키는 일을 저질렀던 것으로 보고되어 있다. 이유는 육아 적응력이 떨어져서 그렇다. 이와 같은 23세 짜리의 철없고 비정한 모친이 아닌 일본인은 물론 일본 사회 당국을 더
      낙담하게 하는 무성의한 태도로 결론지었다.


      그 결과 피해를 당하게 하고 있는 두 아이의 행적을 보면 지난 2010년 3월, 해당 맨션 내 자택에서 이상한 소리가 들린다고 오사카시에서 운영중인 아동학대 상담전화를 통해 3번씩 신고하였으나, 최종적인 신고는
      같은 해 5월 18일 자로 접수되었고, 오사카시 관계자에 따르면 그날 오후 집을 방문하였다가 울음 소리가 더 이상 들리지 않고 집주인을 만나지 못하게 되자 어쩔 수 없이 되돌아간 바 있다.'
