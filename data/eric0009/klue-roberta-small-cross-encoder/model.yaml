      \ 혼란해진 원인을 제공했다. 물론, 그도 생전에 여러 호족 통제 정책들을 시행해 상당한 효과를 보았고, 또 주요 왕자들을 전쟁터로 늘 데려가 왕자들의 군사적 세력을 키워줘 결국 신검을 비롯한 왕자들의 난으로\
      \ 권력을 잃은 견훤과 달리, 왕건은 장남인 왕무만을 전쟁터에 늘 데리고 가 공을 세우게 해 주고, 이에 반해 다른 왕자들은 외면해서 다른 왕자들이 군사적으로 세력을 키우는 것을 막았으며, 또 자신의 사후 후계\
      \ 문제를 우려해 박술희와 왕규,염상,박수문 등을 혜종의 후견인으로 삼았으며, 후삼국 통일 과정에서 보여준 혜종의 뛰어난 군사적 능력을 믿고 그에게 보위를 넘겨 주었고, 또 혜종이 보위에 오르기 전에 혜종과\
      \ 정종의 아내들을 서로 자매들로 혼인시켜 둘의 싸움을 만류하는 정치적 배려까지 썼지만 더 치밀하지 못해 그의 사후 고려는 한동안 반란과 숙청으로 혼란해졌다."
    - "남아프리카공화국 국제관계협력부(DIRCO)는 함메를의 위치를 파악하는 데에 초점을 맞춰 리비아에서의 미션을 재개했다. 남아공과 오스트리아 정부는 리비아와의 갈등에 있어 양국 모두가 외교적인 노력이 필요하다는\
      \ 것을 알고, 그의 시신을 인도 받고 제대로 된 장례를 치르기 위해 서로 협력하기 시작했다. \n\n2011년 12월 6일 국제관계협력부 야당의 장관은, 그의 실종기간에 그의 신변의 안전 보장에 대한 확인과\
      \ 적극적인 조치를 취하지 않은 남아공 정부에게 책임을 물었다. 국제관계협력부는 내전으로 인해 상황이 어려웠다고 말했다 페니 수크라지는 비영리단체를 구성하여 그의 실종에 관한 소식을 확산시킬 수 있었다\n\n\
      국제기자연맹의 회장은 \"사실을 은폐하려고 한 리비아 정부에 의해 살해당한 충격적인 그의 사망 뉴스를 어떻게 감당할 수 있을지 모르겠다. 우리는 그의 부인 페니 수크라지에게 진심으로 애도의 말씀을 올린다.\"\
      라고 말했다. 요하네스버그 프레스 클럽의 부회장인 막셀 드 콕은 만약 기자들이 계속해서 리비아 내전의 전투와 국제법 위반 과정을 폭로하는 취재를 진행한다면, 그들은 전쟁과 분쟁지역에서 반드시 보호받아야 한다고\
      \ 강조했다"
