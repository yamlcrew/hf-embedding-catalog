widgetData:
- source_sentence: What rights and obligations does an Authorised Person have if a storage facility holding Accepted Spot
    Commodities becomes insolvent?
  sentences:
  - "MTF (using Virtual Assets): using third-party issued fiat tokens as a payment/transaction mechanism:\n\ni.\tIn the context\
    \ of using third party fiat tokens, the Authorised Person must directly meet the requirements of the Accepted Virtual\
    \ Assets, Technology Governance and AML/CFT sections of this Guidance.\n\nii.\tFor the related fiat currency custody activities,\
    \ FSRA preference is to have the MTF utilise a Virtual Asset/Fiat Custodian authorised on the basis of paragraphs 139\
    \ - 145 or 166(b) above.\n\niii.\tIn relation to the issuance of the related fiat token, in circumstances where the issuer\
    \ is not authorised under paragraph 166(a) above, it is expected that the Authorised Person undertake the same due diligence\
    \ as that it would apply for the purposes of determining Accepted Virtual Assets (focusing on Technology Governance requirements,\
    \ the seven factors used to determine an Accepted Virtual Asset, and requirements relating to reporting and reconciliation).\n"
  - 'Valuation adjustments. The Regulator expects the following valuation adjustments to be formally considered at a minimum:
    unearned credit spreads, close out costs, Operational Risks, early termination, investing and funding costs, and future
    administrative costs and, where appropriate, model risk.

    '
  - "Storage Facilities. An Authorised Person must have arrangements in place for the approval, management, monitoring and\
    \ control for Accepted Spot Commodities and the storage facilities operated by itself or by third parties, including in\
    \ relation to:\n(a)\tsecurity arrangements;\n(b)\tperiodic stock reports;\n(c)\tperiodic inventory audits;\n(d)\tdispute\
    \ resolution procedures where the storage facility materially fails to meet any of its obligations to the title holder;\n\
    (e)\tstorage or other fees; and\n(f)\trights and obligations in the event of storage facility insolvency, as per the rules,\
    \ terms, conditions and other obligations of the Authorised Person."
- source_sentence: Regarding GEN Rule 3.3, can you provide examples of what constitutes effective and responsible management
    of an Authorised Person's affairs in the context of Virtual Assets?
  sentences:
  - 'REGULATORY REQUIREMENTS - SPOT COMMODITY ACTIVITIES

    Custody

    Due to their psychical nature, Spot Commodities may require specialist Custody arrangements, with the holding of Accepted
    Spot Commodities introducing additional operational risks.  For example, the safekeeping of gold bullion would require
    a custodian with appropriate secure vault facilities.

    '
  - "Measurement of E for pre settlement Counterparty Exposures arising from SFTs. An Authorised Person must determine E,\
    \ for a pre settlement Counterparty Exposure arising from an SFT which is not covered by a qualifying cross product Netting\
    \ agreement as follows:\n(a)\tin the case where the Authorised Person has lent Securities to a Counterparty or sold Securities\
    \ to a Counterparty with a commitment to repurchase those Securities at a specified price on a specified future date,\
    \ the latest fair value of the Securities lent or sold; and\n(b)\tin the case where the Authorised Person has lent cash\
    \ to a Counterparty through the borrowing of Securities from the Counterparty or paid cash for the purchase of Securities\
    \ from a Counterparty with a commitment to resell those Securities at a specified price on a specified future date, the\
    \ amount of cash lent or paid."
  - "The base figure for the size factor component is determined by aggregating the following components, for the Long Term\
    \ Insurance Fund:\n(a)\tthe default risk components determined in accordance with Rule ‎A8.4;\n(b)\tthe investment volatility\
    \ risk component determined in accordance with Rule ‎A8.5; and\n(c)\tthe concentration risk component determined in accordance\
    \ with Rule ‎A8.8."
- source_sentence: In the case of non-compliance with Part 17 of FSMR, what are the typical steps or actions the ADGM might
    take against an authorised firm?
  sentences:
  - 'The Regulatory Authority shall, within thirty (30) days of the date of the notification mentioned in subparagraph (2),
    notify the Account Holder or the Controlling Person of the violation, the amount of the fine and the payment request of
    the fine within no later than thirty (30) days from receipt of the notice.

    '
  - "When employing an eKYC System to assist with CDD, a Relevant Person should:\na.\tensure that it has a thorough understanding\
    \ of the eKYC System itself and the risks of eKYC, including those outlined by relevant guidance from FATF and other international\
    \ standard setting bodies;\nb.\tcomply with all the Rules of the Regulator relevant to eKYC including, but not limited\
    \ to, applicable requirements regarding the business risk assessment, as per Rule ‎6.1, and outsourcing, as per Rule ‎9.3;\n\
    c.\tcombine eKYC with transaction monitoring, anti-fraud and cyber-security measures to support a wider framework preventing\
    \ applicable Financial Crime; and\nd.\ttake appropriate steps to identify, assess and mitigate the risk of the eKYC system\
    \ being misused for the purposes of Financial Crime."
  - This Chapter deals with the regulatory requirements arising out of the need for Authorised Persons to carry out a self
    assessment of their risk which can be reviewed and assessed by the Regulator. This Chapter details the Rules stipulating
    the need to complete internal risk assessments by Authorised Persons in defined frequencies and the Regulator's role in
    reviewing the results of such assessments. In the case of Authorised Persons facing financial risks, the requirements
    in this Chapter mandate completion of an Internal Capital Adequacy Assessment Process. The Regulator will review the results
    of such internal risk assessments. This Chapter also sets out how the Regulator may impose an additional Capital Requirement
    on a firm specific basis in addition to the minimum requirement specified in Chapter 3 of these Rules to address higher-than-normal
    risk.
- source_sentence: In terms of basis risk, are there any preferred methods or models that the ADGM recommends for assessing
    the impact of divergences in market rates, such as the prime rate versus deposit and benchmark rates?
  sentences:
  - "In performing its functions and exercising its powers, the Regulator shall pursue the following objectives—\n(a)\tto\
    \ foster and maintain fairness, transparency and efficiency in the Abu Dhabi Global Market;\n(b)\tto foster and maintain\
    \ confidence in the Abu Dhabi Global Market;\n(c)\tto ensure that the financial markets in the Abu Dhabi Global Market\
    \ are supported by safe and efficient infrastructure;\n(d)\tto foster and maintain financial stability in the Abu Dhabi\
    \ Global Market, including the reduction of systemic risk;\n(e)\tto promote and enhance the integrity of the Abu Dhabi\
    \ Global Market Financial System;\n(f)\tto prevent, detect and restrain conduct that causes or may cause damage to the\
    \ reputation of the Abu Dhabi Global Market through appropriate means including the imposition of sanctions;\n(g)\tto\
    \ secure an appropriate degree of protection for direct and indirect users, and prospective users of the Abu Dhabi Global\
    \ Market;\n(h)\tto promote public understanding of the regulation of the Abu Dhabi Global Market;\n(i)\tto further the\
    \ interests of the Abu Dhabi Global Market;\n(j)\tto promote the safety and soundness of Authorised Persons and Recognised\
    \ Bodies; and\n(k)\tto pursue any other objectives as the Board may set."
  - Two-year validity period. During the two-year validity period, the Regulator will engage with and support the FinTech
    Participant and ensure the FinTech Participant operates within the parameters as set and agreed to prior to the grant
    of the FSP.
  - "Without limiting compliance with Rules ‎6.1.1 and ‎6.1.2, prior to launching any new product, service, or business practice,\
    \ or using a new or developing technology, a Relevant Person must take reasonable steps to ensure that it has:\n(a)\t\
    assessed and identified the money laundering risks relating to the product, service, business practice or technology;\
    \ and\n(b)\ttaken appropriate steps to mitigate or eliminate the risks identified under (a)."
- source_sentence: How should an Authorised Person document and justify any deviations when mapping activities into business
    lines for Operational Risk capital purposes, particularly when they differ from regulatory capital calculations in other
    risk categories?
  sentences:
  - "For the purposes of ‎8.1.2(1), in determining when it is appropriate to apply CDD measures in relation to existing customers,\
    \ a Relevant Person must take into account, amongst other things:\n(a)\tany indication that the identity of the customer,\
    \ or the customer’s Beneficial Owners, has changed;\n(b)\tany Transactions that are not reasonably consistent with the\
    \ Relevant Person’s knowledge of the customer;\n(c)\tany change in the purpose or intended nature of the Relevant Person’s\
    \ relationship with the customer; or\n(d)\tany other matter that might affect the Relevant Person’s risk assessment of\
    \ the customer."
  - Principles for business line mapping. The mapping of activities into business lines for Operational Risk capital purposes
    should be consistent with the definitions of business lines used for regulatory capital calculations in other risk categories,
    i.e. credit and Market Risk. Any deviations from this principle should be clearly motivated and documented.
  - 'REGULATORY REQUIREMENTS FOR AUTHORISED PERSONS ENGAGED IN REGULATED ACTIVITIES IN RELATION TO VIRTUAL ASSETS

    Planned and Unplanned system outages

    Authorised Persons should have a programme of planned systems outages to provide for adequate opportunities to perform
    updates and testing. Authorised Persons should also have multiple communication channels to ensure that its Clients are
    informed, ahead of time, of any outages which may affect them.

    '
