- source_sentence: Appreciates creativity and novel experiences in measured doses without needing constant stimulation.
  sentences:
  - Experimenta ocasionalmente ansiedad o un estado de ánimo bajo, pero generalmente gestiona sus emociones de manera efectiva.
  - They volunteer to emcee events, dominate brainstorming sessions, and recharge best through lively social activities.
  - They follow the news, appreciate art, and occasionally question assumptions without pushing boundaries too far.
- source_sentence: Muestra una gran sensibilidad emocional y reacciona con intensidad ante los desafíos.
  sentences:
  - Maintains a fair level of responsibility.
  - Experimentan episodios repentinos de palpitaciones, tienen miedo a los peores escenarios posibles y se preparan excesivamente
    para riesgos improbables.
  - Equilibra la estructura con la flexibilidad, manteniendo la organización cuando sea necesario, pero sin perder la capacidad
    de adaptación.
- source_sentence: Muestra una notable amabilidad y generosidad.
  sentences:
  - Demuestra una gran atención al detalle y se enorgullece de producir un trabajo completo y de alta calidad.
  - Shows average reliability and generally meets obligations with reasonable effort.
  - Rara vez muestra empatía o compasión.
- source_sentence: They often experience intense emotional distress, struggling with anxiety or insecurity.
  sentences:
  - Rara vez se desvía de los planes o de las rutinas establecidas.
  - Participates in social events occasionally but generally prefers small groups.
  - Se siente más cómodo en entornos familiares y con poca estimulación, con mínimas exigencias sociales.
- source_sentence: Occasionally tries new foods, hobbies, or ideas but does not actively seek them out.
  sentences:
  - Extremely organized, meticulous, and driven to excel in all tasks.
  - Can be both assertive and compassionate, depending on the situation.
  - Evitan salir de casa, lloran de forma repentina e inexplicable, y experimentan síntomas físicos intensos de ansiedad.
