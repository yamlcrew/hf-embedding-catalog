  sentences:
  - 'passage: title: Projecting the transmission dynamics of SARS-CoV-2 through the postpandemic period abstract: It is urgent
    to understand the future of severe acute respiratory syndrome-coronavirus 2 (SARS-CoV-2) transmission.

    We used estimates of seasonality, immunity, and cross-immunity for human coronavirus OC43 (HCoV-OC43) and HCoV-HKU1 using
    time-series data from the United States to inform a model of SARS-CoV-2 transmission.

    We projected that recurrent wintertime outbreaks of SARS-CoV-2 will probably occur after the initial, most severe pandemic
    wave.

    Absent other interventions, a key metric for the success of social distancing is whether critical care capacities are
    exceeded.

    To avoid this, prolonged or intermittent social distancing may be necessary into 2022.

    Additional interventions, including expanded critical care capacity and an effective therapeutic, would improve the success
    of intermittent distancing and hasten the acquisition of herd immunity.

    Longitudinal serological studies are urgently needed to determine the extent and duration of immunity to SARS-CoV-2.

    Even in the event of apparent elimination, SARS-CoV-2 surveillance should be maintained because a resurgence in contagion
    could be possible as late as 2024.'
  - 'passage: title: Inability to work following COVID-19 vaccination among healthcare workers - an important aspect for future
    booster vaccinations abstract: ABSTRACT Background COVID-19 vaccination is a key prevention strategy to reduce the spread
    and severity of SARS-CoV-2 infections, especially among highly exposed healthcare workers (HCWs).

    However, vaccine-related inability to work among HCWs could overstrain healthcare systems.

    Methods This study examined sick leave and intake of pro re nata (PRN) medication after the first, second and third COVID-19
    vaccination in HCWs.

    Subgroup analyses were performed for different vaccines, gender, healthcare professions, and for HCWs aged at least 30
    years.

    Data was collected by using an electronic questionnaire.

    Findings Among 1,704 HCWs enrolled, in total 595 (34·9%) HCWs were on sick leave following at least one COVID-19 vaccination,
    leading to a total number of 1,550 sick days.

    Both the absolute sick days and the rate of HCWs on sick leave significantly increased with each subsequent vaccination.

    Comparing BNT162b2mRNA and mRNA-1273 the difference in sick leave was not significant after the second dose, but mRNA-1273
    induced a significantly longer and more frequent sick leave after the third.

    Interpretation A considerable number of HCWs have been on sick leave after COVID-19 vaccination, staff absences increase
    with each additional dose, depend on the vaccine, and vary between HCWs’ gender, and profession.

    In the light of further COVID-19 infection waves and booster vaccinations, there is a risk of additional staff shortages
    due to post-vaccination inability to work, which could acutely overload healthcare systems and jeopardise patient care.'
  - 'passage: title: Plasma proteomic profiling in postural orthostatic tachycardia syndrome (POTS) reveals new disease pathways
    abstract: Abstract Postural orthostatic tachycardia syndrome (POTS) is a cardiovascular autonomic disorder characterized
    by excessive heart rate increase on standing, leading to debilitating symptoms with limited therapeutic possibilities.

    Proteomics is a large-scale study of proteins that enables a systematic unbiased view on disease and health, allowing
    stratification of patients based on their protein background.

    The aim of the present study was to determine plasma protein biomarkers of POTS and to reveal proteomic pathways differentially
    regulated in POTS.

    We performed an age- and sex-matched, case–control study in 130 individuals (case–control ratio 1:1) including POTS and
    healthy controls.

    Mean age in POTS was 30 ± 9.

    8 years (84.

    6% women) versus controls 31 ± 9.

    8 years (80.

    0% women).

    We analyzed plasma proteins using data-independent acquisition (DIA) mass spectrometry.

    Pathway analysis of significantly differently expressed proteins was executed using a cutoff log2 fold change set to 1.

    2 and false discovery rate (p-value) of &lt; 0.

    05.

    A total of 393 differential plasma proteins were identified.

    Label-free quantification of DIA-data identified 30 differentially expressed proteins in POTS compared with healthy controls.

    Pathway analysis identified the strongest network interactions particularly for proteins involved in thrombogenicity and
    enhanced platelet activity, but also inflammation, cardiac contractility and hypertrophy, and increased adrenergic activity.'
- source_sentence: 'query: Nachträglich hat bei uns in FRA das Testen von Reisenden mit AG‑Test und fachmännischem NP‑Abstrich
    ausgezeichnet funktioniert: SARS‑CoV‑2 screening strategies for returning international travellers: Evaluation of a rapid
    antigen test approach.'
  sentences:
  - 'passage: title: SARS-CoV-2 screening strategies for returning international travellers: Evaluation of a rapid antigen
    test approach abstract: International travel poses the risk of importing SARS-CoV-2 infections and introducing new viral
    variants into the country of destination.

    Established measures include mandatory quarantine with the opportunity to abbreviate it with a negative rapid antigen
    test (RAT).

    A total of 1,488 returnees were tested for SARS-CoV-2 with both PCR and RAT no earlier than 5 days after arrival.

    We assessed the sensitivity and specificity of the RAT.

    Positive samples were evaluated for infectivity in vitro in a cell culture outgrowth assay.

    We tracked if participants who tested negative were reported positive within 2 weeks of the initial test.

    Potential infectiousness was determined based on symptom onset analysis, resulting in a sensitivity of the antigen test
    of 89% in terms of infectivity.

    The specificity was 100%.

    All positive outgrowth assays were preceded by a positive RAT, indicating that all participants with proven in vitro infectivity
    were correctly identified.

    None of the negative participants tested positive during the follow-up.

    RAT no earlier than the 5th day after arrival was a reliable method for detecting infectious travellers and can be recommended
    as an appropriate method for managing SARS-CoV-2 travel restrictions.

    Compliance to the regulations and a high standard of test quality must be ensured.'
  - 'passage: title: Persistence and Evolution of SARS-CoV-2 in an Immunocompromised Host abstract: SARS-CoV-2 in an Immunocompromised
    Host This letter describes an immunocompromised patient who had persistent infection with SARS-CoV-2 over a period of
    months, despite several courses of remdesivi.'
  - 'passage: title: Imperfect Vaccination Can Enhance the Transmission of Highly Virulent Pathogens abstract: Could some
    vaccines drive the evolution of more virulent pathogens?

    Conventional wisdom is that natural selection will remove highly lethal pathogens if host death greatly reduces transmission.

    Vaccines that keep hosts alive but still allow transmission could thus allow very virulent strains to circulate in a population.

    Here we show experimentally that immunization of chickens against Marek''s disease virus enhances the fitness of more
    virulent strains, making it possible for hyperpathogenic strains to transmit.

    Immunity elicited by direct vaccination or by maternal vaccination prolongs host survival but does not prevent infection,
    viral replication or transmission, thus extending the infectious periods of strains otherwise too lethal to persist.

    Our data show that anti-disease vaccines that do not prevent transmission can create conditions that promote the emergence
    of pathogen strains that cause more severe disease in unvaccinated hosts.'
