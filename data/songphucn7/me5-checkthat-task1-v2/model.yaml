  - source_sentence: 'query: Preprint:Beschwerden nach Covid-Impfung🧵 "Von den 1 704 teilnehmenden Beschäftigten des Gesundheitswesens
      waren insgesamt 595 (34,9 %) nach mindestens einer COVID‑19‑Impfung krankgeschrieben, was zu einer Gesamtzahl von 1
