widgetData:
- source_sentence: 'query: The unexpected repercussions of COVID-19 vaccine policy: why requirements, certificates and limitations
    could do more damage than benefit | BMJ Global Health'
  sentences:
  - 'passage: title: SARS-CoV-2 infects and replicates in cells of the human endocrine and exocrine pancreas abstract: Infection-related
    diabetes can arise as a result of virus-associated β-cell destruction.

    Clinical data suggest that the severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2), causing the coronavirus disease
    2019 (COVID-19), impairs glucose homoeostasis, but experimental evidence that SARS-CoV-2 can infect pancreatic tissue
    has been lacking.

    In the present study, we show that SARS-CoV-2 infects cells of the human exocrine and endocrine pancreas ex vivo and in
    vivo.

    We demonstrate that human β-cells express viral entry proteins, and SARS-CoV-2 infects and replicates in cultured human
    islets.

    Infection is associated with morphological, transcriptional and functional changes, including reduced numbers of insulin-secretory
    granules in β-cells and impaired glucose-stimulated insulin secretion.

    In COVID-19 full-body postmortem examinations, we detected SARS-CoV-2 nucleocapsid protein in pancreatic exocrine cells,
    and in cells that stain positive for the β-cell marker NKX6.

    1 and are in close proximity to the islets of Langerhans in all four patients investigated.

    Our data identify the human pancreas as a target of SARS-CoV-2 infection and suggest that β-cell infection could contribute
    to the metabolic dysregulation observed in patients with COVID-19.

    SARS-CoV-2 is shown to infect and replicate in human pancreatic tissue, including in β-cells, which is associated with
    morphological, transcriptomic and functional changes.'
  - 'passage: title: A SARS-like cluster of circulating bat coronaviruses shows potential for human emergence abstract: The
    emergence of severe acute respiratory syndrome coronavirus (SARS-CoV) and Middle East respiratory syndrome (MERS)-CoV
    underscores the threat of cross-species transmission events leading to outbreaks in humans.

    Here we examine the disease potential of a SARS-like virus, SHC014-CoV, which is currently circulating in Chinese horseshoe
    bat populations.

    Using the SARS-CoV reverse genetics system, we generated and characterized a chimeric virus expressing the spike of bat
    coronavirus SHC014 in a mouse-adapted SARS-CoV backbone.

    The results indicate that group 2b viruses encoding the SHC014 spike in a wild-type backbone can efficiently use multiple
    orthologs of the SARS receptor human angiotensin converting enzyme II (ACE2), replicate efficiently in primary human airway
    cells and achieve in vitro titers equivalent to epidemic strains of SARS-CoV.

    Additionally, in vivo experiments demonstrate replication of the chimeric virus in mouse lung with notable pathogenesis.

    Evaluation of available SARS-based immune-therapeutic and prophylactic modalities revealed poor efficacy; both monoclonal
    antibody and vaccine approaches failed to neutralize and protect from infection with CoVs using the novel spike protein.

    On the basis of these findings, we synthetically re-derived an infectious full-length SHC014 recombinant virus and demonstrate
    robust viral replication both in vitro and in vivo.

    Our work suggests a potential risk of SARS-CoV re-emergence from viruses currently circulating in bat populations.'
  - 'passage: title: The unintended consequences of COVID-19 vaccine policy: why mandates, passports and restrictions may
    cause more harm than good abstract: Vaccination policies have shifted dramatically during COVID-19 with the rapid emergence
    of population-wide vaccine mandates, domestic vaccine passports and differential restrictions based on vaccination status.

    While these policies have prompted ethical, scientific, practical, legal and political debate, there has been limited
    evaluation of their potential unintended consequences.

    Here, we outline a comprehensive set of hypotheses for why these policies may ultimately be counterproductive and harmful.

    Our framework considers four domains: (1) behavioural psychology, (2) politics and law, (3) socioeconomics, and (4) the
    integrity of science and public health.

    While current vaccines appear to have had a significant impact on decreasing COVID-19-related morbidity and mortality
    burdens, we argue that current mandatory vaccine policies are scientifically questionable and are likely to cause more
    societal harm than good.

    Restricting people’s access to work, education, public transport and social life based on COVID-19 vaccination status
    impinges on human rights, promotes stigma and social polarisation, and adversely affects health and well-being.

    Current policies may lead to a widening of health and economic inequalities, detrimental long-term impacts on trust in
    government and scientific institutions, and reduce the uptake of future public health measures, including COVID-19 vaccines
    as well as routine immunisations.

    Mandating vaccination is one of the most powerful interventions in public health and should be used sparingly and carefully
    to uphold ethical norms and trust in institutions.'
- source_sentence: 'query: @VanessaBeeley No vaccine ! Results indicate following standard case of light COVID-19, SARSCOV2
    CD8+ Tcells not only persist but steadily differentiate in a synchronized manner deep into convalescence into a state
    characteristic of long-lived, self-renewing memory.'
  sentences:
  - 'passage: title: Protracted yet Coordinated Differentiation of Long-Lived SARS-CoV-2-Specific CD8+ T Cells during Convalescence
    abstract: Abstract CD8+ T cells can potentiate long-lived immunity against COVID-19.

    We screened longitudinally-sampled convalescent human donors against SARS-CoV-2 tetramers and identified a participant
    with an immunodominant response against residues 322 to 311 of nucleocapsid (Nuc322–331), a peptide conserved in all variants
    of concern reported to date.

    We conducted 38-parameter cytometry by time of flight on tetramer-identified Nuc322–331–specific CD8+ T cells and on CD4+
    and CD8+ T cells recognizing the entire nucleocapsid and spike proteins, and took 32 serological measurements.

    We discovered a coordination of the Nuc322–331–specific CD8+ T response with both the CD4+ T cell and Ab pillars of adaptive
    immunity.

    Over the approximately six month period of convalescence monitored, we observed a slow and progressive decrease in the
    activation state and polyfunctionality of Nuc322–331–specific CD8+ T cells, accompanied by an increase in their lymph
    node–homing and homeostatic proliferation potential.

    These results suggest that following a typical case of mild COVID-19, SARS-CoV-2–specific CD8+ T cells not only persist
    but continuously differentiate in a coordinated fashion well into convalescence into a state characteristic of long-lived,
    self-renewing memory.'
  - 'passage: publication has also been changed; recommendations are now ordered by severity of covid-19.


    About this guideline This living guideline from the World Health Organization (WHO) incorporates new evidence to dynamically
    update recommendations for covid-19 therapeutics.

    The GDG typically evaluates a therapy when the WHO judges sufficient evidence is available to make a recommendation.

    While the GDG takes an individual patient perspective in making recommendations, it also considers resource implications,
    acceptability, feasibility, equity, and human rights.

    This guideline was developed according to standards and methods for trustworthy guidelines, making use of an innovative
    process to achieve efficiency in dynamic updating of recommendations.

    The methods are aligned with the WHO Handbook for Guideline Development and according to a pre-approved protocol (planning
    proposal) by the Guideline Review Committee (GRC).

    A box at the end of the article outlines key methodological aspects of the guideline process.

    MAGIC Evidence Ecosystem Foundation provides methodological support, including the coordination of living systematic reviews
    with network meta-analyses to inform the recommendations.

    The full version of the guideline is available online in MAGICapp and in PDF on the WHO website, with a summary version
    here in The BMJ .

    These formats should facilitate adaptation, which is strongly encouraged by WHO to contextualise recommendations in a
    healthcare system to maximise impact.

    Future recommendations Recommendations on anticoagulation are planned for the next update to this guideline.

    Updated data regarding systemic corticosteroids, azithromycin, favipiravir and umefenovir for non-severe illness, and
    convalescent plasma and statin therapy for severe or critical illness, are planned for review in upcoming guideline iterations.'
