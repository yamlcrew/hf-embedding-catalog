      of severe structural defects attributed to high mica content in the aggregates.

      Consequently, the problem is popularly known as the "Mica Crisis".

      In this project the concrete blocks of four affected homes are investigated by microstructural and chemical analysis
      combined with thermodynamic modelling.

      Apart from mica, the aggregates contain iron sulphides mainly in the form of pyrrhotite.

      The sulfur content of the aggregates considerably exceeds the limit value defined by the European standard for concrete
      aggregates (EN 12620).

      The results of the microstructural analysis coupled with thermodynamic modelling demonstrate that the concrete suffers
      from internal sulfate attack triggered by pyrrhotite oxidation.

      The comparison of the results of this investigation with the data collected by chartered engineers on almost hundred
      damaged homes shows that the four investigated cases are representative of the situation in Donegal.'
    - 'passage: title: Do antibody positive healthcare workers have lower SARS-CoV-2 infection rates than antibody negative
      healthcare workers?

      Large multi-centre prospective cohort study (the SIREN study), England: June to November 2020 abstract: ABSTRACT Background
      There is an urgent need to better understand whether individuals who have recovered from COVID-19 are protected from
      future SARS-CoV-2 infection.

      Methods A large multi-centre prospective cohort was recruited from publicly funded hospital staff in the UK.

      Participants attended regular SARS-CoV-2 PCR and antibody testing (every 2-4 weeks) and completed fortnightly questionnaires
      on symptoms and exposures.

      At enrolment, participants were assigned to either the positive cohort (antibody positive or prior PCR/antibody test
      positive) or negative cohort (antibody negative, not previously known to be PCR/antibody positive).

      Potential reinfections were clinically reviewed and classified according to case definitions (confirmed, probable, possible
      (subdivided by symptom-status)) depending on hierarchy of evidence.

      Individuals in the primary infection were excluded from this analysis if infection was confirmed by antibody only.

      Reinfection rates in the positive cohort were compared against new PCR positives in the negative cohort using a mixed
      effective multivariable logistic regression analysis.

      Findings Between 18 June and 09 November 2020, 44 reinfections (2 probable, 42 possible) were detected in the baseline
      positive cohort of 6,614 participants, collectively contributing 1,339,078 days of follow-up.

      This compares with 318 new PCR positive infections and 94 antibody seroconversions in the negative cohort of 14,173
      participants, contributing 1,868,646 days of follow-up.

      The incidence density per 100,000 person days between June and November 2020 was 3.'
    - 'passage: title: Hydroxychloroquine is protective to the heart, not harmful: a systematic review abstract: Hydroxychloroquine
      (HCQ) has been shown to be at least somewhat effective in treating patients with coronavirus disease 2019 (COVID-19).

      Recently the US Food and Drug Administration and Centers for Disease Control and Prevention warnings of fatal cardiac
      toxicity from torsades de pointes (TDP) arrhythmia from HCQ receipt have been made, notwithstanding the long safe provision
      of HCQ to treat lupus and rheumatoid arthritis.

      This has resulted in restricted access of HCQ for COVID-19 treatment.

      We hypothesized that HCQ and azithromycin have not been reported to cause significant acute cardiac arrhythmic mortality.

      We performed a literature search for the effects of HCQ and azithromycin on the heart.

      No TDP or related deaths were found to have been reported as a result of HCQ and azithromycin receipt in the peer-reviewed
      literature.

      On the contrary, HCQ and azithromycin were both found to substantially reduce cardiac mortality and also decrease thrombosis,
      arrhythmia and cholesterol in treated patients in recent peer-reviewed studies and meeting presentations.

      HCQ and azithromycin do not cause TDP cardiac mortality; rather, HCQ decreases cardiac events.

      HCQ should not be restricted in COVID-19 patients out of fear of cardiac mortality.'
