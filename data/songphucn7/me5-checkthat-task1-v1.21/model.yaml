  sentences:
  - 'passage: title: Neurologic Manifestations of Hospitalized Patients With Coronavirus Disease 2019 in Wuhan, China abstract:
    The outbreak of coronavirus disease 2019 (COVID-19) in Wuhan, China, is serious and has the potential to become an epidemic
    worldwide.

    Several studies have described typical clinical manifestations including fever, cough, diarrhea, and fatigue.

    However, to our knowledge, it has not been reported that patients with COVID-19 had any neurologic manifestations.'
  - 'passage: title: Learning from mistakes in climate research abstract: Among papers stating a position on anthropogenic
    global warming (AGW), 97 % endorse AGW.

    What is happening with the 2 % of papers that reject AGW?

    We examine a selection of papers rejecting AGW.

    An analytical tool has been developed to replicate and test the results and methods used in these studies; our replication
    reveals a number of methodological flaws, and a pattern of common mistakes emerges that is not visible when looking at
    single isolated cases.

    Thus, real-life scientific disputes in some cases can be resolved, and we can learn from mistakes.

    A common denominator seems to be missing contextual information or ignoring information that does not fit the conclusions,
    be it other relevant work or related geophysical data.

    In many cases, shortcomings are due to insufficient model evaluation, leading to results that are not universally valid
    but rather are an artifact of a particular experimental setup.

    Other typical weaknesses include false dichotomies, inappropriate statistical methods, or basing conclusions on misconceived
    or incomplete physics.

    We also argue that science is never settled and that both mainstream and contrarian papers must be subject to sustained
    scrutiny.

    The merit of replication is highlighted and we discuss how the quality of the scientific literature may benefit from replication.'
  - 'passage: title: The removal of airborne SARS-CoV-2 and other microbial bioaerosols by air filtration on COVID-19 surge
    units abstract: Summary Background The COVID-19 pandemic has overwhelmed the respiratory isolation capacity in hospitals;
    many wards lacking high-frequency air changes have been repurposed for managing patients infected with SARS-CoV-2 requiring
    either standard or intensive care.

    Hospital-acquired COVID-19 is a recognised problem amongst both patients and staff, with growing evidence for the relevance
    of airborne transmission.

    This study examined the effect of air filtration and ultra-violet (UV) light sterilisation on detectable airborne SARS-CoV-2
    and other microbial bioaerosols.

    Methods We conducted a crossover study of portable air filtration and sterilisation devices in a repurposed ‘surge’ COVID
    ward and ‘surge’ ICU.

    National Institute for Occupational Safety and Health (NIOSH) cyclonic aerosol samplers and PCR assays were used to detect
    the presence of airborne SARS-CoV-2 and other microbial bioaerosol with and without air/UV filtration.

    Results Airborne SARS-CoV-2 was detected in the ward on all five days before activation of air/UV filtration, but on none
    of the five days when the air/UV filter was operational; SARS-CoV-2 was again detected on four out of five days when the
    filter was off.

    Airborne SARS-CoV-2 was infrequently detected in the ICU.

    Filtration significantly reduced the burden of other microbial bioaerosols in both the ward (48 pathogens detected before
    filtration, two after, p =0.

    05) and the ICU (45 pathogens detected before filtration, five after p =0.

    05).'
- source_sentence: 'query: You can dig deeper about the way this process functions and its effect on Irish homes in our Cement
    and Concrete Research paper👇'
  sentences:
  - 'passage: title: The “mica crisis” in Donegal, Ireland – A case of internal sulfate attack?

    abstract: In County Donegal, northwest Ireland, thousands of homes built with concrete blocks show an increasing degree
    of severe structural defects attributed to high mica content in the aggregates.

    Consequently, the problem is popularly known as the "Mica Crisis".

    In this project the concrete blocks of four affected homes are investigated by microstructural and chemical analysis combined
    with thermodynamic modelling.

    Apart from mica, the aggregates contain iron sulphides mainly in the form of pyrrhotite.

    The sulfur content of the aggregates considerably exceeds the limit value defined by the European standard for concrete
    aggregates (EN 12620).

    The results of the microstructural analysis coupled with thermodynamic modelling demonstrate that the concrete suffers
    from internal sulfate attack triggered by pyrrhotite oxidation.

    The comparison of the results of this investigation with the data collected by chartered engineers on almost hundred damaged
    homes shows that the four investigated cases are representative of the situation in Donegal.'
  - 'passage: title: Do antibody positive healthcare workers have lower SARS-CoV-2 infection rates than antibody negative
    healthcare workers?

    Large multi-centre prospective cohort study (the SIREN study), England: June to November 2020 abstract: ABSTRACT Background
    There is an urgent need to better understand whether individuals who have recovered from COVID-19 are protected from future
    SARS-CoV-2 infection.

    Methods A large multi-centre prospective cohort was recruited from publicly funded hospital staff in the UK.

    Participants attended regular SARS-CoV-2 PCR and antibody testing (every 2-4 weeks) and completed fortnightly questionnaires
    on symptoms and exposures.

    At enrolment, participants were assigned to either the positive cohort (antibody positive or prior PCR/antibody test positive)
    or negative cohort (antibody negative, not previously known to be PCR/antibody positive).

    Potential reinfections were clinically reviewed and classified according to case definitions (confirmed, probable, possible
    (subdivided by symptom-status)) depending on hierarchy of evidence.

    Individuals in the primary infection were excluded from this analysis if infection was confirmed by antibody only.

    Reinfection rates in the positive cohort were compared against new PCR positives in the negative cohort using a mixed
    effective multivariable logistic regression analysis.

    Findings Between 18 June and 09 November 2020, 44 reinfections (2 probable, 42 possible) were detected in the baseline
    positive cohort of 6,614 participants, collectively contributing 1,339,078 days of follow-up.

    This compares with 318 new PCR positive infections and 94 antibody seroconversions in the negative cohort of 14,173 participants,
    contributing 1,868,646 days of follow-up.

    The incidence density per 100,000 person days between June and November 2020 was 3.'
  - 'passage: title: Hydroxychloroquine is protective to the heart, not harmful: a systematic review abstract: Hydroxychloroquine
    (HCQ) has been shown to be at least somewhat effective in treating patients with coronavirus disease 2019 (COVID-19).

    Recently the US Food and Drug Administration and Centers for Disease Control and Prevention warnings of fatal cardiac
    toxicity from torsades de pointes (TDP) arrhythmia from HCQ receipt have been made, notwithstanding the long safe provision
    of HCQ to treat lupus and rheumatoid arthritis.

    This has resulted in restricted access of HCQ for COVID-19 treatment.

    We hypothesized that HCQ and azithromycin have not been reported to cause significant acute cardiac arrhythmic mortality.

    We performed a literature search for the effects of HCQ and azithromycin on the heart.

    No TDP or related deaths were found to have been reported as a result of HCQ and azithromycin receipt in the peer-reviewed
    literature.

    On the contrary, HCQ and azithromycin were both found to substantially reduce cardiac mortality and also decrease thrombosis,
    arrhythmia and cholesterol in treated patients in recent peer-reviewed studies and meeting presentations.

    HCQ and azithromycin do not cause TDP cardiac mortality; rather, HCQ decreases cardiac events.

    HCQ should not be restricted in COVID-19 patients out of fear of cardiac mortality.'
