    - 'passage: It uses the relative risk (RR)—ie, the ratio of attack rates with and without a vaccine—which is expressed
      as 1–RR.


      Ranking by reported efficacy gives relative risk reductions of 95% for the Pfizer–BioNTech, 94% for the Moderna–NIH,
      91% for the Gamaleya, 67% for the J&J, and 67% for the AstraZeneca–Oxford vaccines.

      However, RRR should be seen against the background risk of being infected and becoming ill with COVID-19, which varies
      between populations and over time.

      Although the RRR considers only participants who could benefit from the vaccine, the absolute risk reduction (ARR),
      which is the difference between attack rates with and without a vaccine, considers the whole population.

      ARRs tend to be ignored because they give a much less impressive effect size than RRRs: 1·3% for the AstraZeneca–Oxford,
      1·2% for the Moderna–NIH, 1·2% for the J&J, 0·93% for the Gamaleya, and 0·84% for the Pfizer–BioNTech vaccines.

      ARR is also used to derive an estimate of vaccine effectiveness, which is the number needed to vaccinate (NNV) to prevent
      one more case of COVID-19 as 1/ARR.

      NNVs bring a different perspective: 81 for the Moderna–NIH, 78 for the AstraZeneca–Oxford, 108 for the Gamaleya, 84
      for the J&J, and 119 for the Pfizer–BioNTech vaccines.

      The explanation lies in the combination of vaccine efficacy and different background risks of COVID-19 across studies:
      0·9% for the Pfizer–BioNTech, 1% for the Gamaleya, 1·4% for the Moderna–NIH, 1·8% for the J&J, and 1·9% for the AstraZeneca–Oxford
      vaccines.'
  - source_sentence: 'query: Labor in the Era of Coronavirus via @user #COVID19 #washthehate #AsianAmerican "Apart from the
      threat of illness and death, fear is perhaps the most virulent part of COVID-19."'
    sentences:
    - 'passage: title: Work in the Time of Coronavirus abstract: It was a meditation on life, love, old age, death: ideas
      that had often fluttered around her head like nocturnal birds but dissolved into a trickle of feathers when she tried
      to catch hold of them.

      —Gabriel García Márquez, Love in the Time of Cholera As surgeons, we pride ourselves on our sterility.

      We have made a home of the aseptic operating room, where don''t touch your face is a lesson learned on day 1.

      We don gown and gloves and communicate behind mask and shield, all to keep ourselves and our patients safe.

      However, with the advent of the 2019 coronavirus disease (COVID-19) pandemic, we now find ourselves unable to scrub
      out at the end of the case.

      Sterile technique has leaked into the public domain, marked not only by how expensive hand sanitizer has become or how
      frequently we are reminded to wash our hands, but also by the ways we have come to treat one another.

      It is undeniable that the social distancing movement is critical in quelling the exponential spread of this virus.

      Unfortunately, for Asians, this social sterility has left in its wake a sense of isolation and blame.

      During the last few months, there have been countless stories of racism and xenophobia toward individuals of Asian descent.

      Although these accounts have ranged from derogatory comments ("Get your coronavirus out of my country!'
    - 'passage: title: Chloroquine is a potent inhibitor of SARS coronavirus infection and spread abstract: Abstract Background
      Severe acute respiratory syndrome (SARS) is caused by a newly discovered coronavirus (SARS-CoV).

      No effective prophylactic or post-exposure therapy is currently available.

      Results We report, however, that chloroquine has strong antiviral effects on SARS-CoV infection of primate cells.

      These inhibitory effects are observed when the cells are treated with the drug either before or after exposure to the
      virus, suggesting both prophylactic and therapeutic advantage.

      In addition to the well-known functions of chloroquine such as elevations of endosomal pH, the drug appears to interfere
      with terminal glycosylation of the cellular receptor, angiotensin-converting enzyme 2.

      This may negatively influence the virus-receptor binding and abrogate the infection, with further ramifications by the
      elevation of vesicular pH, resulting in the inhibition of infection and spread of SARS CoV at clinically admissible
      concentrations.

      Conclusion Chloroquine is effective in preventing the spread of SARS CoV in cell culture.

      Favorable inhibition of virus spread was observed when the cells were either treated with chloroquine prior to or after
      SARS CoV infection.

      In addition, the indirect immunofluorescence assay described herein represents a simple and rapid method for screening
      SARS-CoV antiviral compounds.'
    - 'passage: title: Wolves make roadways safer, generating large economic returns to predator conservation abstract: Significance
      Measuring the economic benefits conveyed by predators is difficult—often, effects are indirect and operate through complex
      ecological changes.

      As a result, debates about the expansion of predators have pit salient costs against more speculative estimates of benefits
      that might be dismissed as unreliable or ideologically motivated.

      We quantify the indirect benefits of wolves ( Canis lupus ) to human lives and property through reductions in deer-vehicle
      collisions.

      Moreover, we decompose the effect into two components: changes in prey behavior versus prey abundance.

      This decomposition is important when effective policy depends on whether hunters can replicate the effects of predators.

      In the case of wolves, we conclude that human deer hunters cannot.'
