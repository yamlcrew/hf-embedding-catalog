widgetData:
- source_sentence: 'query: I''ve earlier pointed out how speech alone (not just coughing or sneezing) is enough to generate
    respiratory droplets that could spread the virus causing #COVID19. The more boisterous people are, the more particles
    they release. Watch out for loud, talkative people.'
  sentences:
  - 'passage: title: Imperfect Vaccination Can Enhance the Transmission of Highly Virulent Pathogens abstract: Could some
    vaccines drive the evolution of more virulent pathogens?

    Conventional wisdom is that natural selection will remove highly lethal pathogens if host death greatly reduces transmission.

    Vaccines that keep hosts alive but still allow transmission could thus allow very virulent strains to circulate in a population.

    Here we show experimentally that immunization of chickens against Marek''s disease virus enhances the fitness of more
    virulent strains, making it possible for hyperpathogenic strains to transmit.

    Immunity elicited by direct vaccination or by maternal vaccination prolongs host survival but does not prevent infection,
    viral replication or transmission, thus extending the infectious periods of strains otherwise too lethal to persist.

    Our data show that anti-disease vaccines that do not prevent transmission can create conditions that promote the emergence
    of pathogen strains that cause more severe disease in unvaccinated hosts.'
  - 'passage: title: Evidence for the Efficacy of a High Dose of Vitamin D on the Hyperinflammation State in Moderate-to-Severe
    COVID-19 Patients: A Randomized Clinical Trial abstract: Background and Objectives: Vitamin D supplementation plays a
    key effect in lowering cytokine storms among COVID-19 patients by influencing the activity of the renin-angiotensin system
    and the production of the angiotensin-2 converting enzyme.

    The study was conducted to explore the effect of high-dose intramuscular vitamin D in hospitalized adults infected with
    moderate-to-severe SARS-CoV-2 in comparison with the standard of care in the COVID-19 protocol.

    Materials and Methods: Two groups of patients were compared in this prospective randomized controlled trial as the vitamin
    D was administered orally to group 1 (alfacalcidol 1 mcg/day) and intramuscularly to group 2 (cholecalciferol 200,000
    IU).

    One hundred and sixteen participants were recruited in total, with fifty-eight patients in each group.

    Following the Egyptian Ministry of Health’s policy for COVID-19 management, all patients received the same treatment for
    a minimum of five days.

    Results: A significant difference was recorded in the length of hospital stay (8.

    6 versus 6.

    8 days), need for high oxygen or non-invasive mechanical ventilator (67% versus 33%), need for a mechanical ventilator
    (25% versus 75%), clinical improvement (45% versus 55%), the occurrence of sepsis (35% versus 65%), and in the monitored
    laboratory parameters in favor of high-dose vitamin D.'
  - 'passage: title: Aerosol emission and superemission during human speech increase with voice loudness abstract: Abstract
    Mechanistic hypotheses about airborne infectious disease transmission have traditionally emphasized the role of coughing
    and sneezing, which are dramatic expiratory events that yield both easily visible droplets and large quantities of particles
    too small to see by eye.

    Nonetheless, it has long been known that normal speech also yields large quantities of particles that are too small to
    see by eye, but are large enough to carry a variety of communicable respiratory pathogens.

    Here we show that the rate of particle emission during normal human speech is positively correlated with the loudness
    (amplitude) of vocalization, ranging from approximately 1 to 50 particles per second (0.

    06 to 3 particles per cm 3 ) for low to high amplitudes, regardless of the language spoken (English, Spanish, Mandarin,
    or Arabic).

    Furthermore, a small fraction of individuals behaves as “speech superemitters,” consistently releasing an order of magnitude
    more particles than their peers.

    Our data demonstrate that the phenomenon of speech superemission cannot be fully explained either by the phonic structures
    or the amplitude of the speech.

    These results suggest that other unknown physiological factors, varying dramatically among individuals, could affect the
    probability of respiratory infectious disease transmission, and also help explain the existence of superspreaders who
    are disproportionately responsible for outbreaks of airborne infectious disease.'
- source_sentence: 'query: @RealErinCruz “Face masks should not be worn by healthy individuals to protect themselves from
    acquiring respiratory infection because there is no evidence to suggest that face masks worn by healthy individuals are
    effective in preventing people from becoming ill”'
  sentences:
  - 'passage: title: Medical Masks abstract: Lisa A.

    Pompeii, PhD; Colleen S.

    Kraft, MD, MSc; Erik A.

    Brownsword, MPP; Morgan A.

    Lane, MPH; Elisa Benavides, MPH; Janelle Rios, MPH, PhD; Lewis J.'
  - 'passage: title: Whole-genome sequencing reveals host factors underlying critical COVID-19 abstract: Abstract Critical
    COVID-19 is caused by immune-mediated inflammatory lung injury.

    Host genetic variation influences the development of illness requiring critical care 1 or hospitalization 2–4 after infection
    with SARS-CoV-2.

    The GenOMICC (Genetics of Mortality in Critical Care) study enables the comparison of genomes from individuals who are
    critically ill with those of population controls to find underlying disease mechanisms.

    Here we use whole-genome sequencing in 7,491 critically ill individuals compared with 48,400 controls to discover and
    replicate 23 independent variants that significantly predispose to critical COVID-19.

    We identify 16 new independent associations, including variants within genes that are involved in interferon signalling
    ( IL10RB and PLSCR1 ), leucocyte differentiation ( BCL11A ) and blood-type antigen secretor status ( FUT2 ).

    Using transcriptome-wide association and colocalization to infer the effect of gene expression on disease severity, we
    find evidence that implicates multiple genes—including reduced expression of a membrane flippase ( ATP11A ), and increased
    expression of a mucin ( MUC1 )—in critical disease.

    Mendelian randomization provides evidence in support of causal roles for myeloid cell adhesion molecules ( SELE , ICAM5
    and CD209 ) and the coagulation factor F8 , all of which are potentially druggable targets.

    Our results are broadly consistent with a multi-component model of COVID-19 pathophysiology, in which at least two distinct
    mechanisms can predispose to life-threatening disease: failure to control viral replication; or an enhanced tendency towards
    pulmonary inflammation and intravascular coagulation.'
  - 'passage: title: Presymptomatic Transmission of SARS-CoV-2 — Singapore, January 23–March 16, 2020 abstract: Investigation
    of all 243 cases of COVID-19 reported in Singapore during January 23–March 16 identified seven clusters of cases in which
    presymptomatic transmission is the most likely explanation for the occurrence of secondary cases.'
- source_sentence: 'query: @user stumbled upon this paper via a Phys piece about the speculative prospect of no‑paradox chronal
    travel. Opinions? (Or a segment perhaps?)'
  sentences:
  - 'passage: title: Antibody-dependent enhancement and SARS-CoV-2 vaccines and therapies abstract: Antibody-based drugs and
    vaccines against severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) are being expedited through preclinical
    and clinical development.

    Data from the study of SARS-CoV and other respiratory viruses suggest that anti-SARS-CoV-2 antibodies could exacerbate
    COVID-19 through antibody-dependent enhancement (ADE).

    Previous respiratory syncytial virus and dengue virus vaccine studies revealed human clinical safety risks related to
    ADE, resulting in failed vaccine trials.

    Here, we describe key ADE mechanisms and discuss mitigation strategies for SARS-CoV-2 vaccines and therapies in development.

    We also outline recently published data to evaluate the risks and opportunities for antibody-based protection against
    SARS-CoV-2.'
  - 'passage: title: Reversible dynamics with closed time-like curves and freedom of choice abstract: The theory of general
    relativity predicts the existence of closed time-like curves (CTCs), which theoretically would allow an observer to travel
    back in time and interact with their past self.

    This raises the question of whether this could create a grandfather paradox, in which the observer interacts in such a
    way to prevent their own time travel.

    Previous research has proposed a framework for deterministic, reversible, dynamics compatible with non-trivial time travel,
    where observers in distinct regions of spacetime can perform arbitrary local operations with no contradiction arising.

    However, only scenarios with up to three regions have been fully characterised, revealing only one type of process where
    the observers can verify to both be in the past and future of each other.

    Here we extend this characterisation to an arbitrary number of regions and find that there exist several inequivalent
    processes that can only arise due to non-trivial time travel.

    This supports the view that complex dynamics is possible in the presence of CTCs, compatible with free choice of local
    operations and free of inconsistencies.'
  - 'passage: title: Personality Disorders and Personality Profiles in a Sample of Transgender Individuals Requesting Gender-Affirming
    Treatments abstract: The study aims to explore the personality patterns of a group of transgender individuals who accessed
    an Italian gender clinic to undergo gender affirming treatments, by evaluating both dimensional personality domains proposed
    by the Alternative Model of Personality Disorders and categorical DSM-IV personality disorder (PD) diagnoses.

    Eighty-seven participants (40 transgender women and 47 transgender men) completed the Personality Inventory for DSM-5
    and the Structured Clinical Interview for DSM-IV Axis II personality disorders.

    Scores obtained were compared to those of the normative samples of cisgender women and men.

    Results indicated that transgender women scored lower than cisgender women on two main domains (Negative Affectivity and
    Psychoticism) and on seven facets.

    As for transgender men, lower scores than cisgender men were found on Antagonism and on five facets.

    Transgender men scored higher than cisgender men on Depressivity.

    Nearly 50% of participants showed at least one PD diagnosis, with no gender differences in prevalence.

    Borderline PD was the most frequent diagnosis in the overall sample.

    Self-report measures provide a less maladaptive profile of personality functioning than the clinician-based categorical
    assessment.

    Results are interpreted in the light of the Minority Stress Model and support the need for a multi-method assessment of
    personality in medicalized transgender people.'
- source_sentence: 'query: 9 out of 10 children ages 5-11 in the United States hospitalized with #covid19 had not been vaccinated
