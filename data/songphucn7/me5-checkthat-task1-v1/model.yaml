      proposed by the Alternative Model of Personality Disorders and categorical DSM-IV personality disorder (PD) diagnoses.

      Eighty-seven participants (40 transgender women and 47 transgender men) completed the Personality Inventory for DSM-5
      and the Structured Clinical Interview for DSM-IV Axis II personality disorders.

      Scores obtained were compared to those of the normative samples of cisgender women and men.

      Results indicated that transgender women scored lower than cisgender women on two main domains (Negative Affectivity
      and Psychoticism) and on seven facets.

      As for transgender men, lower scores than cisgender men were found on Antagonism and on five facets.

      Transgender men scored higher than cisgender men on Depressivity.

      Nearly 50% of participants showed at least one PD diagnosis, with no gender differences in prevalence.

      Borderline PD was the most frequent diagnosis in the overall sample.

      Self-report measures provide a less maladaptive profile of personality functioning than the clinician-based categorical
      assessment.

      Results are interpreted in the light of the Minority Stress Model and support the need for a multi-method assessment
      of personality in medicalized transgender people.'
