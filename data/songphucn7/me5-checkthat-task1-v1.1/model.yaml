- source_sentence: 'query: The kinase dbt is crucial to #circadian rhythm Wang et al @user employ #CRISPR to examine dbt mutations
    in flies They discover dbt loss in adults results in loss of #sleep at night, while loss of dbt during development results
    in heightened sleep during the day'
  sentences:
  - 'passage: title: DBT affects sleep in both circadian and non-circadian neurons abstract: Sleep is a very important behavior
    observed in almost all animals.

    Importantly, sleep is subject to both circadian and homeostatic regulation.

    The circadian rhythm determines the daily alternation of the sleep-wake cycle, while homeostasis mediates the rise and
    dissipation of sleep pressure during the wake and sleep period.

    As an important kinase, dbt plays a central role in both circadian rhythms and development.

    We investigated the sleep patterns of several ethyl methanesulfonate-induced dbt mutants and discuss the possible reasons
    why different sleep phenotypes were shown in these mutants.

    In order to reduce DBT in all neurons in which it is expressed, CRISPR-Cas9 was used to produce flies that expressed GAL4
    in frame with the dbt gene at its endogenous locus, and knock-down of DBT with this construct produced elevated sleep
    during the day and reduced sleep at night.

    Loss of sleep at night is mediated by dbt loss during the sleep/wake cycle in the adult, while the increased sleep during
    the day is produced by reductions in dbt during development and not by reductions in the adult.

    Additionally, using targeted RNA interference, we uncovered the contribution of dbt on sleep in different subsets of neurons
    in which dbt is normally expressed.

    Reduction of dbt in circadian neurons produced less sleep at night, while lower expression of dbt in noncircadian neurons
    produced increased sleep during the day.'
  - 'passage: 1 158 269 individuals were eligible to be included in the third dose group.


    Following matching, the third dose and control groups each included 728 321 individuals.

    Participants had a median age of 52 years (IQR 37-68) and 51% were female.

    The median follow-up time was 13 days (IQR 6-21) in both groups.

    Vaccine effectiveness evaluated at least 7 days after receipt of the third dose, compared with receiving only two doses
    at least 5 months ago, was estimated to be 93% (231 events for two doses vs 29 events for three doses; 95% CI 88-97) for
    admission to hospital, 92% (157 vs 17 events; 82-97) for severe disease, and 81% (44 vs seven events; 59-97) for COVID-19-related
    death.

    Our findings suggest that a third dose of the BNT162b2 mRNA vaccine is effective in protecting individuals against severe
    COVID-19-related outcomes, compared with receiving only two doses at least 5 months ago.

    The Ivan and Francesca Berkowitz Family Living Laboratory Collaboration at Harvard Medical School and Clalit Research
    Institute.'
  - 'passage: title: Can touch this: training to correct police officer beliefs about overdose from incidental contact with
    fentanyl abstract: Misinformation about overdose risk from accidentally inhaling or touching fentanyl is widespread among
    police in the United States.

    This may aggravate already elevated burdens of officer stress and burnout, while chilling lifesaving overdose response.

    Police education has shown promise in reducing false beliefs about fentanyl.

    To better understand the potential of training interventions in correcting officer knowledge, we administered a 10-min
    online training with corrective messaging about occupational overdose risk from fentanyl contact to 204 police officers
    in Indiana.

    Overall, 129 officers (63%) completed baseline survey and 69 (34%) completed follow-up instrument.

    Using a 6-point Likert scale, we documented assent with the statement: "First responders who encounter fentanyl are at
    great risk of overdose by touching it or inhaling it.

    " At baseline, 79.

    8% expressed agreement, while 20.

    2% disagreed.

    At follow-up, 39.

    1% agreed, while 60.

    9% disagreed (p < .

    001).

    Baseline responses varied in that those officers without a college degree and those on patrol were more likely to report
    false beliefs.

    A brief online training intervention holds promise for correcting false beliefs about the risk of fentanyl overdose under
    circumstances commonly encountered by police.'
- source_sentence: 'query: This could be the welcome news we all need to hear: though there has been a fair amount of skepticism
    due to few cases in Singapore, heat and moisture appear to affect COVID-19 transmission according to this paper:'
  sentences:
  - 'passage: days, I couldn''t stop thinking about the incident.


    I couldn''t believe that I live in the 21st century and an accidentally visible bra strap is considered unprofessional
    and merits penalties.

    I was also shocked that I had worked at this hospital for 5 years, frequently visiting the ED, and people still didn''t
    know who I am.

    My colleagues did not know who I am.

    I had been mistaken for another Black female physician before.

    Once, a nursing note in a patient''s medical record said, “I called the neurosurgery on call pager and Dr.

    Rodriguez came to evaluate the patient.

    ” However, it was not me, but another Black woman rotating on neurosurgery.

    I asked nursing management to change the documentation, but it seemed that no one besides me saw the potential devastating
    consequences of incorrect identification of a physician in the permanent record.

    Ultimately, the note was not amended, and I grew tired of asking.

    However, in “Bra Strap Gate” as I nicknamed the incident, I felt fully the unique experience of misogynoir.

    I mulled over the times I had seen men''s Boxer shorts when they bent over.

    I thought to myself how no one in a professional setting would take a picture of that, call it unprofessional, and then
    send it to that person''s boss for punishment.

    I became paranoid that, as a female physician, I would have to endure being secretly photographed without my knowledge
    or consent.

    I became overly cautious of what I wore and how it could be potentially weaponized against me.'
