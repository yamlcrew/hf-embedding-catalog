widgetData:
- source_sentence: As of January 31, 2023, the Company's net operating loss and capital loss carryforwards totaled approximately
    $32.3 billion.
  sentences:
  - What was the percentage change in general and administrative expenses in 2023 compared to 2022?
  - What was the amount of the company's net operating loss and capital loss carryforwards as of January 31, 2023?
  - What are common challenges in pharmaceutical research and development?
- source_sentence: A 0.50% increase in completion factors, which consider aspects like claim levels and processing cycles,
    raises medical costs payable by $585 million as of December 31, 2023.
  sentences:
  - What were the total assets of Hasbro, Inc. as of December 31, 2023?
  - How does a 0.50% increase in completion factors impact medical costs payable as of December 31, 2023?
  - By what percentage did Gaming revenue change in fiscal year 2023 compared to fiscal year 2022?
- source_sentence: Alex G. Balazs was appointed as the Executive Vice President and Chief Technology Officer effective September
    5, 2023.
  sentences:
  - When was Alex G. Balazs appointed as the Executive Vice President and Chief Technology Officer?
  - What was AMC's minimum liquidity requirement under the Credit Agreement?
  - What was the nature of the legal action initiated by Aqua-Chem against the company in Wisconsin on the same day the company
    filed its lawsuit?
- source_sentence: Item 8. Financial Statements and Supplementary Data
  sentences:
  - How did the carrying amount of goodwill change from March 31, 2022 to March 31, 2023?
  - What types of revenue does the payments company generate from its various products and services?
  - What is the content of Item 8 in a financial document?
- source_sentence: The company offers Medicare eligible persons under HMO, PPO, Private Fee-For-Service, or PFFS, and Special
    Needs Plans, including Dual Eligible Special Needs, or D-SNP, plans in exchange for contractual payments received from
    CMS. With each of these products, the beneficiary receives benefits in excess of Medicare FFS, typically including reduced
    cost sharing, enhanced prescription drug benefits, care coordination, data analysis techniques to help identify member
    needs, complex case management, tools to guide members in their health care decisions, care management programs, wellness
    and prevention programs and, in some instances, a reduced monthly Part B premium. Most Medicare Advantage plans offer
    the prescription drug benefit under Part D as part of the basic plan, subject to cost sharing and other limitations.
  sentences:
  - What types of Medicare plans does the company offer and what are the key benefits provided?
  - What were the total cash discounts provided by AbbVie in 2023, 2022, and 2021?
  - How does a company account for potential liabilities from legal proceedings in its financial statements?
