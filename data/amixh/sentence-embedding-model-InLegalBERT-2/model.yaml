widgetData:
- source_sentence: '[IPC_SECTION_351] According to Whoever makes any gesture, or any preparation intending or knowing it to
    be likely that such gesture or preparation will cause any person present to apprehend that he who makes that gesture or
    preparation is about to use criminal force to that person, is said to commit an assault. IPC 351 in Simple Words they
    are considered to have committed an assault.'
  sentences:
  - '[CRPC_SECTION_162] Section 162, No statement made by any person to a police officer in the course of an investigation
    under this Chapter, shall, if reduced to writing, be signed by the person making it; nor shall any such statement or any
    record thereof, whether in a police diary or otherwise, or any part of such statement or record, be used for any purpose,
    save as hereinafter provided, at any inquiry or trial in respect of any offence under investigation at the time when such
    statement was made; Provided that when any witness is called for the prosecution in such inquiry or trial whose statement
    has been reduced into writing as aforesaid, any part of his statement, if duly proved, may be used by the accused, and
    with the permission of the Court, by the prosecution, to contradict such witness in the manner provided by section 145
    of the , 1872 (1 of 1872); and when any part of such statement is so used, any part thereof may also be used in the re-examination
    of such witness, but for the purpose only of explaining any matter referred to in his cross-examination. Nothing in this
    section shall be deemed to apply to any statement falling within the provisions of clause (1) of section 32 of the , 1872
    (1 of 1872), or to affect the provisions of section 27 of that Act.'
  - Section 446A, Without prejudice to the provisions of section 446, where a bond under this Code is for appearance of a
    person in a case and it is forfeited for breach of a condition— the bond executed by such person as well as the bond,
    if any, executed by one or more of his sureties in that case shall stand cancelled; and thereafter no such person shall
    be released only on his own bond in that case, if the Police Officer or the Court, as the case may be, for appearance
    before whom the bond was executed, is satisfied that there was no sufficient cause for the failure of the person bound
    by the bond to comply with its condition; Provided that subject to any other provision of this Code he may be released
    in that case upon the execution of a fresh personal bond for such sum of money and bond by one or more of such sureties
    as the Police Officer or the Court, as the case may be, thinks sufficient.
  - According to Whoever makes any gesture, or any preparation intending or knowing it to be likely that such gesture or preparation
    will cause any person present to apprehend that he who makes that gesture or preparation is about to use criminal force
    to that person, is said to commit an assault. IPC 351 in Simple Words they are considered to have committed an assault.
- source_sentence: '[NIA_SECTION_71] Section 71, If the maker, drawee or acceptor of a negotiable instrument has no known
    place of business or fixed residence, and no place is specified in the instrument for presentment for acceptance or payment,
    such presentment may be made to him in person wherever be can be found.'
  sentences:
  - Section 123, Whenever the District Magistrate in the case of an order passed by an Executive Magistrate under section
    117, or the Chief Judicial Magistrate in any other case is of opinion that any person imprisoned for failing to give security
    under this Chapter may be released without hazard to the community or to any other person, he may order such person to
    be discharged. Whenever any person has been imprisoned for failing to give security under this Chapter, the High Court
    or Court of Session, or, where the order was made by any other Court, the District Magistrate, in the case of an order
    passed by an Executive Magistrate under section 117, or the Chief Judicial Magistrate in any other case, may make an order
    reducing the amount of the security or the number of sureties or the time for which security has been required. An order
    under Sub-Section (1) may direct the discharge of such person either without conditions or upon any conditions which such
    person accepts; Provided that any condition imposed shall cease to be operative when the period for which such person
    was ordered to give security has expired. The State Government may prescribe the conditions upon which a conditional discharge
    may be made. If any condition upon which any person has been discharged is, in the opinion of the District Magistrate,
    in the case of an order passed by an Executive Magistrate under section 117, or the Chief Judicial Magistrate in any other
    case by whom the order of discharge was made or of his successor, not fulfilled, he may cancel the same. When a conditional
    order of discharge has been cancelled under Sub-Section (5), such person may be arrested by any police officer without
    warrant, and shall thereupon be produced before the District Magistrate, in the case of an order passed by an Executive
    Magistrate under section 117, or the Chief Judicial Magistrate in any other case. Unless such person gives security in
    accordance with the terms of the original order for the unexpired portion of the term for which he was in the first instance
    committed or ordered to be detained (such portion being deemed to be a period equal to the period between the date of
    the breach of the conditions of discharge and the date on which, except for such conditional discharge, he would have
    been entitled to release), the District Magistrate, in the case of an order passed by an Executive Magistrate under section
    117, or the Chief Judicial Magistrate in any other case may remand such person to prison to undergo such unexpired portion.
    A person remanded to prison under Sub-Section (7) shall, subject to the provisions of section 122, be released at any
    lime on giving security in accordance with the terms of the original order for the unexpired portion aforesaid to the
    Court or Magistrate by whom such order was made, or to its or his successor. The High Court or Court of Sessions may at
    any time, for sufficient reasons to be recorded in writing, cancel any bond for keeping the peace or for good behaviour
    executed under this Chapter by any order made by it, and the District Magistrate, in the case of an order passed by an
    Executive Magistrate under section 117, or the Chief Judicial Magistrate in any other case may make such cancellation
    where such bond was executed under his order or under the order of any other Court in his district. Any surety for the
    peaceable conduct or good behaviour of another person, ordered to execute a bond under this Chapter may at any time apply
    to the Court making such order to cancel the bond and on such application being made, the Court shall issue a summons
    or warrant, as it thinks fit, requiring the person for whom such surety is bound to appear or to be brought before it.
  - Section 71, If the maker, drawee or acceptor of a negotiable instrument has no known place of business or fixed residence,
    and no place is specified in the instrument for presentment for acceptance or payment, such presentment may be made to
    him in person wherever be can be found.
  - '[NIA_SECTION_121] Section 121, No maker of a promissory note and no acceptor of a bill of exchange payable to order shall,
    in a suit thereon by a holder in due course, be permitted to deny the payee’s capacity, at the date of the note or bill,
    to indorse the same.'
- source_sentence: '[IPC_SECTION_343] According to Whoever wrongfully confines any person for three days or more, shall be
    punished with imprisonment of either description for a term which may extend to two years, or with fine, or with both.
    IPC 343 in Simple Words or a fine, or both.'
  sentences:
  - D, D According to section 354D of , (1) Any man who— follows a woman and contacts, or attempts to contact such woman to
    foster personal interaction repeatedly despite a clear indication of disinterest by such woman; or monitors the use by
    a woman of the internet, email or any other form of electronic communication, commits the offence of stalking; Provided
    that such conduct shall not amount to stalking if the man who pursued it proves that— it was pursued for the purpose of
    preventing or detecting crime and the man accused of stalking had been entrusted with the responsibility of prevention
    and detection of crime by the State; or it was pursued under any law or to comply with any condition or requirement imposed
    by any person under any law; or in the particular circumstances such conduct was reasonable and justified. (2) Whoever
    commits the offence of stalking shall be punished on first conviction with imprisonment of either description for a term
    which may extend to three years, and shall also be liable to fine; and be punished on a second or subsequent conviction,
    with imprisonment of either description for a term which may extend to five years, and shall also be liable to fine. IPC
    354D in Simple Words According to section 354D of the , any man who repeatedly follows, contacts, or monitors a woman's
    electronic communications despite her clear disinterest commits the offence of stalking and can be imprisoned for up to
    three years on first conviction and up to five years on subsequent convictions, along with a fine. However, certain justifiable
    circumstances may not be considered stalking.
  - '[CONSTITUTION_ARTICLE_173] Qualification for membership of the State Legislature A person shall not be qualified to be
    chosen to fill a seat in the Legislature of a State unless he (a) is a citizen of India, and makes and subscribes before
    some person authorised in that behalf by the Election Commission an oath or affirmation according to the form set out
    for the purpose in the Third Schedule; (b) is, in the case of a seat in the Legislative Assembly, not less than twenty
    five years of age and in the case of a seat in the Legislative Council, not less than thirty years of age; and (c) possesses
    such other qualifications as may be prescribed in that behalf by or under any law made by Parliament'
  - According to Whoever wrongfully confines any person for three days or more, shall be punished with imprisonment of either
    description for a term which may extend to two years, or with fine, or with both. IPC 343 in Simple Words or a fine, or
    both.
- source_sentence: '[CPC_SECTION_82] Section 82, 1[(I) Where, in a suit by or against the Government or by or against a public
    officer in respect of any act purporting to be done by him in his official capacity, a decree is passed against the Union
    of India or a State or, as the case may be, the public officer, such decree shall not be executed except in accordance
    with the provisions of sub-section (2).] (2) Execution shall not be issued on any such decree unless it remains unsatisfied
    for the period of three months computed from the date of 2 [such decree.] 3[(3) The provisions of sub-sections (1) and
    (2) shall apply in relation to an order or award as they apply in relation to a decree, if the order or award — (a) is
    passed or made against 4 [the Union of India or a State or a public officer in respect of any such act as aforesaid, whether
    by a Court or by any other authority; and (b) is capable of being executed under the provisions of this Code or of any
    other law for the time being in force as if it were a decree.]'
  sentences:
  - Section 82, 1 (2) Execution shall not be issued on any such decree unless it remains unsatisfied for the period of three
    months computed from the date of 2 3
  - Section 131, No one shall be compelled to produce documents in his possession or electronic records under his control,
    which any other person would be entitled to refuse to produce if they were in his possession or control, unless such last-mentioned
    person consents to their production.
  - '[CONSTITUTION_ARTICLE_93] The Speaker and Deputy Speaker of the House of the People The House of the People shall, as
    soon as may be, choose two members of the House to be respectively Speaker and Deputy Speaker thereof and, so often as
    the office of Speaker or Deputy Speaker becomes vacant, the House shall choose another member to be Speaker or Deputy
    Speaker, as the case may be'
- source_sentence: '[CONSTITUTION_ARTICLE_252] Power of Parliament to legislate for two or more States by consent and adoption
    of such legislation by any other State (1) If it appears to the Legislatures of two or more States to be desirable that
    any of the matters with respect to which Parliament has no power to make laws for the States except as provided in Articles
    249 and 250 should be regulated in such States by Parliament by law, and if resolutions to that effect are passed by all
    the House of the Legislatures of those States, it shall be lawful for Parliament to pass an Act for regulating that matter
    accordingly, and any Act so passed shall apply to such States and to any other State by which it is adopted afterwards
    by resolution passed in that behalf by the House or, where there are two Houses, by each of the Houses of the Legislature
    of that State (2) Any Act so passed by Parliament may be amended or repealed by an Act of Parliament passed or adopted
    in like manner but shall not, as respects any State to which it applies, be amended or repealed by an Act of the Legislature
    of that State'
  sentences:
  - Section 9, Facts necessary to explain or introduce a fact in issue or relevant fact, or which support or rebut an inference
    suggested by a fact in issue or relevant fact, or which establish the identity of any thing or person whose identity is
    relevant, or fix the time or place at which any fact in issue or relevant fact happened, or which show the relation of
    parties by whom any such fact was transacted, are relevant in so far as they are necessary for that purpose.
  - Power of Parliament to legislate for two or more States by consent and adoption of such legislation by any other State
    (1) If it appears to the Legislatures of two or more States to be desirable that any of the matters with respect to which
    Parliament has no power to make laws for the States except as provided in Articles 249 and 250 should be regulated in
    such States by Parliament by law, and if resolutions to that effect are passed by all the House of the Legislatures of
    those States, it shall be lawful for Parliament to pass an Act for regulating that matter accordingly, and any Act so
    passed shall apply to such States and to any other State by which it is adopted afterwards by resolution passed in that
    behalf by the House or, where there are two Houses, by each of the Houses of the Legislature of that State (2) Any Act
    so passed by Parliament may be amended or repealed by an Act of Parliament passed or adopted in like manner but shall
    not, as respects any State to which it applies, be amended or repealed by an Act of the Legislature of that State
  - '[CRPC_SECTION_206] Section 206, If, in the opinion of a Magistrate taking cognizance of a petty offence, the case may
    be summarily disposed of under section 260 or section 261, the Magistrate shall, except where he is, for reasons to be
    recorded in writing of a contrary opinion, issue summons to the accused requiring him either to appear in person or by
    pleader before the Magistrate on a specified date, or if he desires to plead guilty to the charge without appearing before
    the Magistrate, to transmit before the specified date, by post or by messenger to the Magistrate, the said plea in writing
    and the amount of fine specified in the summons or if he desires to appear by pleader and to plead guilty to the charge
    through such pleader, to authorise, in writing, the pleader to plead guilty to the charge on his behalf and to pay the
    fine through such pleader; Provided that the amount of the fine specified in such summons shall not exceed one thousand
    rupees. For the purposes of this section, “petty offence” means any offence punishable only with fine not exceeding one
    thousand rupees, but does not include any offence so punishable under the Motor Vehicles Act, 1931, or under any other
    law which provides for convicting the accused person in his absence on a plea of guilty. The State Government may, by
    notification, specially empower any Magistrate to exercise the powers conferred by Sub-Section (1) in relation to any
    offence which is compoundable under section 320 or any offence punishable with imprisonment for a term not exceeding three
    months, or with fine or with both where the Magistrate is of opinion that, having regard to the facts and circumstances
    of the case, the imposition of fine only would meet the ends of justice.'
