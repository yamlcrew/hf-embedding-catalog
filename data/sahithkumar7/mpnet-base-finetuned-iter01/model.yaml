- source_sentence: What was the most frequently identified pharmaceutical in the groundwater samples?
  sentences:
  - 'Pharmacokinetic characteristics may represent key features in understanding antibiotics occurrence [62]. Most antibiotics

    are not completely metabolised in humans and animals; thus, a high percentage of the active substance (40-90%) is

    excreted in urine/faeces in the unchanged form. These molecules are discharged into water and soil through wastewater,

    animal manure, and sewage sludge, frequently used as fertilisers to agricultural lands. Also, it is expected that the

    hospital effluent will contribute partly to the pharmaceutical load in the wastewater treatment plant influence [63].'
  - 'many domestic and livestock animals. Several formulations of powder for administration in drinking water and medicated

    premix are available for poultry and pigs. The excretion of amoxicillin is predominantly renal; more than 80% of the parent

    drug is recovered unchanged in the urine. While bioavailability of 75 to 80% is reported in humans, a low value (~30%)

    was observed in pigs, calves, foals, and pigeons [26,52]. Maybe this last group of animals contribute more sharply to
    the'
