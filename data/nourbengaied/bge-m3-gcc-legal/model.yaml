  sentences:
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    Furthermore, unless they are specifically instructed by the FIU to maintain the business relationship (for example, so
    that the Competent Authorities may monitor the customer’s activity), FIs should take appropriate steps in order to decide
    whether or not to maintain the business relationship. These steps may include, but are not limited to:

    •

    Reassessing the business relationship risk and re-evaluate the customer’s risk profile, where necessary;

    •

    Initiating an enhanced customer due diligence review;

    •

    Considering the performance of an enhanced background investigation (including, if appropriate, the use of a third-party
    investigation service);

    •

    Any other reasonable steps, commensurate with the nature and size of their businesses, and bearing in mind the obligation
    to avoid “tipping off” the customer. FIs should be aware that filing an STR does not automatically mean that the relationship
    with the customer needs to be terminated. However, when deciding to terminate a business relationship for which an STR
    has been filed and no feedback has been received from the FIU after a reasonable time period, FIs should formally advise
    the FIU of their intention to do so unless there is an official objection. Reasonable Time Period for Receiving Feedback
    from the FIU

    FIs should note that there are no pre-established processing times, and no statute of limitations, in regard to the time
    interval during which the FIU may provide feedback, including instructions or requests for additional information in response
    to an STR. Furthermore, the time period that may be considered reasonable in relation to such feedback depends on numerous
    factors, including but not limited to the:

    •

    Type, size and circumstances of the transaction;

    •

    Normal average processing times for the specific transaction type;

    •

    Type of customer or business relationship;

    •

    Nature and size of the FI’s business;

    •

    Precise nature of the suspicion. The time period considered to be reasonable could thus vary widely from one case to another.
    As a general guideline, the reasonable time periods for feedback from the FIU concerning transaction types that are less
    complex, more routine, and have faster average processing times (such as account-to-account or wire transfers, the exchange
    of currencies, or over-the-counter purchases of precious metals or stones, for example) would normally be expected to
    be shorter than those for more complex, less routine transaction types (such as, for example, purchases of real estate
    or other complex assets, trade finance transactions, or various forms of loan or credit agreements). FIs that require
    further assistance in determining reasonable time periods should consult with the FIU or the relevant Supervisory Authorities.
    High-Risk Classification of Reported Business Relationships

    When a transaction or other information about a business relationship is reported to the FIU as suspicious, it means that,
    by definition, the customer or business relationship to which it pertains should be classified as high risk (in case the
    business relationship has not yet been classified as such). In situations in which no feedback or instructions have been
    received from the FIU, FIs that determine to maintain the business relationship should, commensurate with the nature and
    size of their businesses:

    •

    Document the process by which the decision was made to maintain the business relationship, along with the rationale for,
    and any conditions related to, the decision;

    •

    Implement adequate EDD measures to manage and mitigate the ML/FT risks associated with the business relationship.'
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    Financial Institutions, DNFBPs, and Virtual Asset Service Providers shall take measures to manage risks in circumstances
    where the Customer is able to benefit from the Business Relationship prior to the completion of the verification process.
    Article (7)

    1. Financial Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers, as
    applicable, shall apply Customer Due Diligence measures in the following cases:

    a. Upon the commencement of a Business Relationship;

    b. Where there is suspicion of a Crime;

    c. Where there are doubts as to the accuracy or adequacy of Customer identification data previously obtained. 2. Financial
    Institutions shall apply Customer Due Diligence measures in the following cases:

    a. When conducting occasional Transactions for a Customer amounting to or exceeding fifty-five thousand dirhams (AED 55,000),
    whether carried out as a single Transaction or several Transactions that appear to be linked;

    b. When conducting occasional Transactions in the form of Wire Transfers amounting to or exceeding three thousand five
    hundred dirhams (AED 3,500). 3. Virtual Asset Service Providers shall apply Customer Due Diligence measures when conducting
    occasional Transactions amounting to or exceeding three thousand five hundred dirhams (AED 3,500), whether carried out
    as a single Transaction or several Transactions that appear to be linked. Article (8)

    Financial Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers shall
    apply Customer Due Diligence measures and conduct ongoing monitoring in respect of the Business Relationship, which shall
    include the following:

    1. Scrutinizing Transactions carried out throughout the duration of the Business Relationship to ensure that such Transactions
    are consistent with the information available thereto regarding the Customer, the nature of their activities, and the
    risks they represent, including, where necessary, the source of funds. 2. Ensuring that documents, data, or information
    obtained as part of Customer Due Diligence measures are up to date and relevant, through reviewing records, with particular
    emphasis on records relating to categories of High-Risk Customers. Article (9)

    1. Financial Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers shall
    identify the Customer, whether permanent or occasional, and determine whether the Customer is a natural person, Legal
    Person, or Legal Arrangement, and shall verify such identity using original documents, data, or information obtained from
    a reliable and independent source, as follows:

    a. In respect of Customers who are natural person, obtaining the name as stated in the identity card or travel document,
    nationality, address, date and place of birth, and, where applicable, the name and address of the employer, together with
    a true copy of a valid identity card or travel document;

    b. In respect of Customers who are Legal Persons or Legal Arrangements, obtaining the following basic information:

    1)

    Name, legal form, memorandum of association, tax registration number of the Legal Persons subject to corporate tax, and
    the unique reference number, if any;

    2)

    Address of the registered office or principal place of business, and where the Person is foreign, the name and address
    of its legal representative in the State, if any, together with supporting evidence;

    3)

    Articles of association or any other equivalent approved documents;

    4)

    Names of relevant persons holding Senior Management positions within the Legal Person or Legal Arrangement. 2. Financial
    Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers shall verify that
    any person acting on behalf of the Customer is duly authorized to do so, and shall identify such person in accordance
    with Clause (1) of this Article. 3. Financial Institutions, Designated Non-Financial Businesses and Professions, and Virtual
    Asset Service Providers shall understand the purpose and the intended nature of the Business Relationship and obtain information
    relating thereto where necessary. 4.'
  - '[UAE-DIFC | DFSA | DFSA Anti-Money Laundering (AML) Module]


    (1) A

