  sentences:
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    Examples of some of the measures that should be considered include but are not limited to:

    •

    Assessing the effectiveness of foreign branches and majority-owned subsidiaries’ AML/CFT measures, including evaluating
    such factors as the comprehensiveness and quality of their policies, procedures and controls, and performing gap analyses
    in relation to the requirements of the

    AML-CFT Law

    and

    AML-CFT Decision

    ;

    •

    Establishing clear policies, procedures and controls in relation to the type and extent of access which managers and employees
    of foreign branches and majority-owned subsidiaries have to the FIs’ IT and operational systems, including CDD and transaction
    processing systems;

    •

    Establishing clear policies, procedures and controls in relation to the type and extent of access which customers and
    Business Relationships of foreign branches and majority-owned subsidiaries have to the FIs’ products, services and transactional
    processing capabilities;

    •

    Establishing clear policies, procedures and controls in relation to the type of CDD and transaction-related information,
    data, and analysis FIs accept from their foreign branches and majority-owned subsidiaries in relation to customer or Business
    Relationship referrals, and the extent of their reliance on such information (see

    Section 6.6, Reliance on a Third Party

    );

    •

    Implementing service-level agreements, clearly setting out the roles and responsibilities of the parties and specifying
    the nature of the CDD and record-keeping requirements to be fulfilled in relation to customer or Business Relationship
    referrals;

    •

    Establishing protocols for the certification by the foreign branches and subsidiaries of documents and other records pertaining
    to the CDD measures undertaken in relation to customer or Business Relationship referrals. In particular, in cases in
    which the minimum AML/CFT requirements of host countries in which FIs maintain foreign operations are less strict than
    those of the State, FIs should take the necessary measures to ensure that their foreign branches and/or majority-owned
    subsidiaries in those countries implement requirements consistent with those of the State, to the extent permitted by
    the laws and regulations of the host countries. If such host countries do not permit the proper implementation of the
    AML/CFT requirements consistent with those of the State, FIs should apply appropriate additional measures to manage and
    mitigate the ML/FT risks (including but not limited to those described above). They should also inform the relevant Supervisory
    Authorities of the circumstances and comply with any additional supervisory actions, controls, or requirements of the
    Competent Authorities of the State (up to and including, if requested, terminating their operations in the host countries).
    8.4 Independent Audit Function

    (

    AML-CFT Decision Article 20.6

    )

    A robust and independent audit function is a key component to a well-functioning governance structure and an effective
    AML/CFT framework. FIs are obliged to have in place an independent audit function to test the effectiveness and adequacy
    of their internal polices, controls and procedures relating to combating the crimes of money laundering and the financing
    of terrorism and of illegal organisations. In this regard, FIs should ensure that their independent audit function is
    appropriately staffed and organized, and that it has the requisite competencies and experience to carry out its responsibilities
    effectively, commensurate with the ML/FT risks to which the FIs are exposed, and with the nature and size of their businesses.
    It should be noted that, while most FIs are expected to have the capacity to meet these requirements internally, depending
    on the nature and size of their businesses, some FIs (particularly smaller ones) may not necessarily have the resources
    to maintain a fully functioning and effective internal audit unit. In such cases, those FIs should ensure that they take
    adequate measures to obtain the necessary capabilities from qualified external sources. They should also ensure that they
    have in place adequate internal capabilities to provide sufficient coordination with and oversight of any external resources
    they may utilise, and that such external resources are adequately regulated and supervised by relevant Competent Authorities.'
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    o

    Multiple transfers sent to the same person overseas by different people. o

    Departure from the UAE shortly after transferring funds. o

    Transfers of funds between various accounts that show no economic purpose (i.e., multiple transfers incurring bank fees
    where one single transfer would have been sufficient). B.10 Co-Mingling

    •

    How it works:

    Combining proceeds of crime with legitimate business takings. •

    Possible indicators

    o

    Significant and/or frequent cash deposits when business has electronic funds transfer at point-of-sale facilities. o

    Large number of accounts held by a customer with the same LFI. o

    Accounts operated by someone other than the account holder. o

    Merging businesses to create layers. o

    Complex ownership structures. o

    Regular use of third-party accounts. B.11 Gatekeepers/professional services

    •

    How it works:

    Utilizing ‘Professionals’ to establish seemingly legitimate business activities, for example, Lawyers, Accountants, Brokers,
    Company Formation Agents. •

    Possible indicators

    o

    Accounts and/or facilities opened and/or operated by company formation agents. o

    Gatekeepers that appear to have full control. o

    Known or suspected corrupt professionals offering services to criminal entities. o

    Accounts operated by someone other than the account holder. B.12 Cash deposits

    •

    How it works:

    Placement of cash into the financial system. •

    Possible indicators

    o

    Large cash deposits followed immediately by withdrawals or electronic transfers. B.13 Structuring

    •

    How it works:

    Separating large transactions into small transactions to avoid scrutiny and detection from LFIs. •

    Possible indicators

    o

    Many transactions conducted at various LFIs and/or branches, in one day. o

    Small/frequent cash deposits, withdrawals, electronic transfers made over a short time period. o

    Multiple low value domestic or international transfer. B.14 Smurfing

    •

    How it works:

    Utilizing third parties or groups of people to carry out structuring. •

    Possible indicators

    o

    Third parties conducting numerous transactions on behalf of other individuals. o

    Many transactions conducted at various LFIs and/or branches, in one day. o

    Accounts operated by someone other than the account holder. B.15 Credit Cards/Cheques/Promissory Notes

    •

    How it works:

    Instruments used to access funds held in an LFI, often in another jurisdiction. •

    Possible indicators

    o

    Frequent cheque deposits in contrast to known or expected business activity. o

    Multiple cash advances on credit card facilities. o

    Credit cards with large credit balances. B.16 Transactions inconsistent with intended purpose of the account

    •

    How it works:

    Transactions that are out of the ordinary for the individual or conducted without a clear rationale. •

    Possible indicators

    o

    Transactions to or from unrelated parties. o

    Transaction amounts that are inconsistent with the account’s expected volumes or frequencies. o

    Transactions that are out of the ordinary for the customer’s profession or business activity. B.17 Cash couriers

    •

    How it works:

    Concealing the movement of currency from one jurisdiction to another using people, luggage, mail, or any other mode of
    shipment, without declaration. •

    Possible indicators

    o

    Transactions involving locations with poor AML/CFT regimes or high exposure to corruption. o

    Customers originating from locations with poor AML/CFT regimes/high exposure to corruption. o

    Significant and/or frequent cash deposits made over a short period of time. o

    Significant and/or frequent currency exchanges made over a short period of time. B.18 Other payment technologies

    •

    How it works:

    Utilizing emerging or new payment technologies such as virtual currencies/crypto- currencies, peer-to-peer (P2P) lending
    etc. to facilitate money laundering and/or the financing of terrorism and illegal organisations. •

    Possible indicators

    o

    Excessive use of stored value cards.'
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    This may, on further investigation, generate knowledge or reasonable suspicion of financial crime and thereby require
    reporting to the appropriate law enforcement and/or regulatory authority as an STR, SAR, or equivalent local report in
    line with AML/CFT regulatory and/or UAE FIU reporting requirements. LFIs may choose to use a combination of automated
    transaction monitoring scenarios and exception-based (manual) transaction reports to monitor for potentially suspicious
    activity. The aim of the alert review process is to identify and respond to potential indicators of money laundering,
    associated predicate offenses, financing of terrorism and illegal organisations , financing of proliferation, and any
    potentially unusual activity that does not align to a customer’s or account''s profile including by deploying a risk-based
    approach. An LFI’s transaction monitoring systems and manual processes should be reviewed, assessed, and revised periodically—at
    least annually—and otherwise as appropriate, justified by the required circumstances. Additionally, this review should
    include both an evaluation of transaction monitoring system thresholds and a fine tuning of the LFI’s transaction monitoring
    system as well as an evaluation of its effectiveness. The individuals responsible for the review should have a proper
    understanding of the LFI’s framework-including the LFI''s business and customer base—to generate a meaningful output.
    2.5. Internal Organization

    In order for an LFI’s transaction monitoring and suspicious activity reporting program to be effective, it must be based
    on the foundation of a sound governance structure. Namely, an LFI’s internal organization is important to appropriately
    identifying unusual or potentially suspicious activity. Internal organization comprises an LFI’s policies, procedures,
    and processes designed to oversee and manage risks and to achieve compliance with UAE AML/CFT laws and regulations. In
    particular, an LFI’s internal organization addresses the core organizational elements of an LFI’s compliance program:
    governance and management oversight; policies and procedures; clear lines of responsibility and reporting; and ongoing
    training to account for changes in the UAE’s legislative and regulatory frameworks. •

    Governance and Management Oversight:

    Governance and management oversight helps to ensure that an LFI’s compliance program is appropriately funded, staffed,
    and equipped with the requisite technology, including to identify and report suspicious activity. An LFI’s Board of Directors
    also ensures that the compliance program has an appropriately prominent status within the organization and is operationally
    independent. In this capacity, senior management, inclusive of the Compliance Officer, within a compliance program should
    have the appropriate authority; independence; access to employees and information within the organization; and appropriate
    resources to conduct their activities—including the identification and reporting of suspicious activity—effectively. The
    compliance program should have access to the Board of Directors or a designated board committee to raise any issues or
    risks; report on the status of ongoing compliance; and escalate any other pertinent AML/CFT-related information. •

    As part of an LFI’s risk management framework, senior management and an LFI’s Board of Directors should oversee the design,
    implementation, and maintenance of a transaction monitoring and suspicious activity reporting program based on an LFI’s
    AML/CFT risks and in accordance with all applicable laws and regulations. Senior management should likewise oversee a
    vendor selection process (as applicable) if a third-party vendor is used to acquire, install, implement, or test a transaction
    monitoring program or any aspect of identifying and reporting suspicious activity, among other responsibilities. The Compliance
    Officer (or MLRO) shall periodically update the Board of Directors (or a committee of the Board) on the overall capability
    framework (that includes technology and process aspects of suspicious activity identification, investigation and reporting
    aspects). •

    Policies and Procedures

    : An LFI should have policies and procedures that govern changes to its transaction monitoring program which ensures that
    changes are defined, managed, controlled, reported, and audited. Namely, LFIs should have governance protocols surrounding
    the design and implementation of new detection scenarios; periodic assessment and validation of existing detection scenarios;
    and retiring of detection scenarios.'
- source_sentence: Cabinet Decision 74 freeze funds 24 hours Listed Persons payments screening
  sentences:
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    LFIs may create a “white list” (or a “good customer list”) of names of customers that have been flagged as potential matches
    to the UN Consolidated List and the Local Terrorist List but subsequently cleared through thorough due diligence by the
    LFI. Those “white lists” may be used to improve the process related to screening by leveraging the results of past due
    diligences and reducing the number of false positives. While an LFI should not overly rely on such a list and must diligently
    and continuously screen customers and transactions in case they are implicated in updated UN Consolidated List and Local
    Terrorist List, the use of such a “white list” may assist the LFI in expediting the dispositioning in case of repeated
    false positive matches. LFIs should have documented procedures to managing and periodically reviewing and updating those
    “white lists”. For more details and information, please refer to

    Annex 2 for related Lessons learned from CBUAE Supervision

    . 3.6. Payments Screening

    LFIs should also screen information regarding counterparties of all incoming and outgoing transfers in order to identify
    any potential match to Listed Persons. The information to be screened includes:

    •

    The parties involved in a transaction, including the sender and the receiver;

    •

    Third parties and intermediaries;

    •

    Bank Names, Bank Identifier Code ("BIC”) and other routing codes;

    •

    Free text fields;

    •

    International Securities Identification Number (“ISINs”) or other risk relevant product identifiers (there are multiple
    fields in the identifier information section for sanctions lists. An ISIN number can be screened as an identifier number
    similar to a date of birth/passport number, and towns/regions can be screened as jurisdictions operating in);

    •

    Geography, including addresses, countries, cities, towns, regions. 3.7. Confirmed match

    Under

    Articles 15

    and

    21

    of Cabinet Decision 74, when a match is found through the screening process, LFIs must immediately, without delay and
    without prior notice, freeze all Funds. Without delay, as defined by

    Article 1 of Cabinet Decision 74

    , means

    within 24 hours

    of the Listing decision being issued by the UNSC, the Sanctions Committee or the UAE Cabinet, as the case may be. For
    more details and information, please refer to the Executive Office’s

    Guidance on Targeted Financial Sanctions for FIs and DNFBPs

    . 4. Notification to Cbuae and Executive Office

    Under

    Article 21(5) of Cabinet Decision 74

    , LFIs must immediately notify the CBUAE

    in the following cases:

    •

    Identification of funds and actions that have been taken as per requirements of Relevant UNSCRs or decisions of the Cabinet
    regarding the issuance of Local Terrorist List (including but not limited to freezing), including attempted transactions.
    •

    Detection of any match with Listed Persons or entities, details of the matched data, and actions that have been taken
    as per the requirements of Relevant UNSCRs and Local Terrorist Lists, including attempted transactions. •

    Identification of a previous customer or an occasional customer listed on the UN Consolidated List or Local Terrorist
    List. •

    Suspicion that a current or previous customer, or a person with whom they have a business relationship, is a Listed Person
    or has a direct or indirect relationship with a Listed Person. •

    No action has been taken due to a false positive and the inability to dismiss a false positive through available or accessible
    information (i.e. given insufficient information, such as matching identifier information, address, DOB, or nationality).
    Please see also

    section 3.5

    above. •

    Unfreezing of Funds, identifying the information relating to funds that have been unfrozen, including their status, nature,
    value and measures that were taken in respect thereof, and any other information relevant to such decisions.'
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    For the purpose of performing its duties and competences under

    the Decree by Law

    and this Resolution, the Unit shall appoint such qualified and experienced personnel as it deems appropriate and shall
    determine their duties. The Central Bank shall provide the Unit with the human, financial, and technical resources necessary
    to enable it to perform its functions effectively. Part Two: Competences of the Unit

    Article (45)

    The Unit shall have the following competences:

    1. Establishing its organizational structure and internal regulations, which shall include procedures to ensure the efficiency
    and integrity of its staff, to define their responsibilities in handling sensitive and confidential information, and to
    prevent access or disclosure of information, except by authorized persons;

    2. Establishing a database or special register for the information available thereto, and protecting such information
    through information security and confidentiality controls, including cybersecurity measures and procedures for processing,
    storing, and disseminating information, as well as procedures to ensure restricted access to its premises, information,
    and technological systems;

    3. Ensuring that its staff obtain the necessary security clearances and are aware of their responsibilities in handling
    and disseminating sensitive and confidential information;

    4. Providing training courses and programs for the training and qualification of its staff and any other entity, whether
    within or outside the State;

    5. Preparing studies, research, and statistics relating to the Crime, and following up on any national or international
    studies, research, or statistics prepared in this regard;

    6. Preparing annual reports on its anti-crime activities, including, in particular, a general analysis of notifications
    and Suspicious Transaction reports received by the Unit, Crime activities and trends, and preparing a summary of such
    reports for publication purposes. Article (46)

    In carrying out its functions in relation to Suspicious Transaction reports, the Unit shall have the following competences:

    1. Receive reports from Financial Institutions, DNFBPs, and Virtual Asset Service Providers in accordance with the forms
    approved by the Unit, examine, analyze, and retain such reports in its database;

    2. Request Financial Institutions, DNFBPs, Virtual Asset Service Providers, and Concerned Authorities to provide any additional
    information or documents relating to the reports and information received by the Unit, as well as any other information
    it deems necessary for the performance of its functions, including information relating to disclosure systems, customs
    information, tax information, Population Register information, and the information referred to in

    Paragraph (b) of Clause (1) of Article (9)

    and

    Article (10) of this Resolution

    , within the timeframes and in the manner determined by the Unit;

    3. Analyze reports and available information as follows:

    a. Operational analysis, using available and obtainable information to identify specific targets such as persons, funds,
    or criminal networks, trace the course of specific activities or Transactions, and identify links between such targets,
    activities, or Transactions and potential criminal property;

    b. Strategic analysis using available and obtainable information, including data provided by the Concerned Authorities,
    to identify Crime trends and patterns;

    4. Provide Financial Institutions, DNFBPs, and Virtual Asset Service Providers with feedback on reports received by the
    Unit to enhance the effectiveness of Crime combating measures and the detection and reporting of Suspicious Transactions;

    5. Cooperate and coordinate with the Supervisory Authority by referring the results of its analyses relating to the quality
    of reports received, in order to ensure compliance by Financial Institutions, DNFBPs, and Virtual Asset Service Providers
    with Crime combating procedures;

    6. Use dedicated, secure, and protected channels to disseminate report-related data, analysis results, and other relevant
    information to Law Enforcement Authorities, where sufficient grounds exist to suspect a link to the Crime, for the purpose
    of taking the necessary actions in this regard;

    7. Use dedicated, secure, and protected channels to provide the Public Prosecution and Law Enforcement Authorities with
    information relating to Crime, including information obtained from Financial Intelligence Units in other countries, whether
    spontaneously or upon request.'
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    In addition, every time there is a change to the sanctions lists, the RHP must compare the newly listed persons against
    its list of past customers. If an RHP finds that it previously carried out a transaction involving a person who was not
    listed at the time but is now listed, it has not done anything wrong. But it must report the transaction so that the authorities
    are aware (see step 4 below). 3. Immediately freeze any funds in the possession or under the control of the RHP that may
    belong to a listed person and cancel (where possible) any transactions involving a listed person. When a ''''confirmed
    match'''' is found through the screening process, RHP must immediately, without delay and without prior notice, freeze
    all funds. i. ''''Freeze all funds'''' means that you

    must hold the funds

    . You cannot send them or give them to anyone except to a UAE authority. You cannot return them to the person who gave
    them to you. If the funds are cash, you should place the funds in a safe place, separate from other funds, until the authorities
    can collect them. If the funds are held in a financial institution, such as a bank, you should notify the financial institution,
    who will place them in a special account. If an RHP has recently completed a transaction that involves a listed person,
    the RHP should notify its counterparty so that they can freeze the funds at the other end if possible. It must keep records
    of the information that it used to confirm this. ii. ''''Without delay'''' means

    within 24 hours

    of the listing decision being issued by the UNSC, the Sanctions Committee or the UAE Cabinet, as the case may be. This
    means that you must take active efforts to become aware of changes to the sanctions lists by registering on the Executive
    Office''s website in order to receive automated email notifications, and that once a change has been made, you must immediately
    put it into effect by refusing to carry out any transactions for or with a listed person. iii. ''''Without prior notice''''
    means that you

    must not tell the customer

    , or the person whose funds are being frozen, what the RHP is going to do. When a ''''potential match'''' is found through
    the screening process, the RHP must suspend without delay any transaction and refrain from offering any funds or services.
    It must keep records of the information that it used to confirm this. 4. Report any listed persons and the actions the
    RHP has taken to the appropriate authorities

    With regards to LFIs obligation for TFS reporting, the CBUAE in coordination with the Executive Office, has established
    a unified mechanism to report TFS obligations utilizing the UAE Financial Intelligence Unit''s (FIU) online reporting
    platform (goAML). In case of any ''''confirmed match'''' to a listing of names of individuals or legal persons to the
    Local Terrorist List and the UN Consolidated List, the RHP are required to report any freezing measures, prohibition to
    provide funds or services or any attempted transactions via the goAML platform

    within two business days

    by selecting the Fund Freeze Report (FFR). The RHP must also ensure all the necessary information and documents are submitted.
    In case of any ''''potential match'''' to a listing of names of individuals or legal persons to the Local Terrorist List
    or UN Consolidated List, the RHP are required to report the potential match via the goAML Platform by selecting the Partial
    Name Match Report (PMNR). The RHP must also ensure all the necessary information and documents are submitted. In addition,
    the RHP must uphold suspension measures related to the ''''potential match'''' until further instructions are received
    via the goAML Platform on whether to cancel the suspension or implement freezing measures. The TFS related reports (FFR
    or PMNR) submitted via the goAML Platform will be received simultaneously by the CBUAE and the Executive Office.'
- source_sentence: what businesses need to comply with AML regulations in the UAE
  sentences:
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    (10) of 2025 Regarding Anti Money Laundering, and Combating the Financing of Terrorism and Proliferation Financing

    . Chapter Two: Financial Institutions, Designated Non-Financial Businesses and Professions, Virtual Asset Service Providers,
    and Non-Profit Organizations

    Part One: Financial Institutions and Designated Non-Financial Businesses and Professions

    Division One: Nature of Financial Institutions and Designated Non-Financial Businesses and Professions

    Article (2)

    Financial Institutions shall include any person who, as a commercial activity, carries out one or more of the following
    financial activities or operations for the benefit of, or on behalf of, a Customer:

    1. Acceptance of deposits and other repayable funds from the public. 2. Lending, including consumer loans and mortgage
    loans, with or without recourse, and the financing of commercial transactions, including the purchase of export documents
    and the purchase of debts, whether with or without recourse. 3. Financial leasing, excluding financial leasing related
    to consumer products. 4. Money or value transfer services, excluding any natural or legal person who solely provides Financial
    Institutions with messaging or other support systems for the transfer of funds. 5. Issuance and management of means of
    payment, including debit cards, credit cards, cheques, payment orders, banker drafts, and electronic money. 6. Guarantees
    and financial commitments. 7. Trading in financial market instruments such as cheques, bills of exchange, certificates
    of deposit, derivatives, and others; or foreign exchange, currency exchange instruments, interest rates, indices, other
    financial derivatives, or tradable financial instruments; and trading in commodity futures contracts. 8. Participation
    in the issuance of securities and the provision of financial services related to such issuances. 9. Management of funds
    and portfolios of all types. 10. Safekeeping and administration of cash or liquid securities on behalf of others. 11.
    Other operations for investing, managing, or operating funds or monies on behalf of others. 12. Subscription to, or savings
    in, life insurance policies and other types of investment-related insurance, including those provided by insurance agents
    and brokers. 13. Money or currency exchange. 14. Any other financial activities or operations as may be determined by
    a resolution issued by the Supervisory Authority, in coordination with the National Committee. Article (3)

    Designated Non-Financial Businesses and Professions (DNFBPs) shall include any person who carries out one or more of the
    following commercial or professional activities or businesses:

    1. Commercial Gaming Operators, including Commercial Gaming conducted on board vessels or marine craft, when conducting
    a single financial transaction or several transactions that appear to be linked and whose value equals or exceeds eleven
    thousand dirhams (AED 11,000). A financial transaction shall not include a transaction that solely involves gaming chips
    or gaming instruments. 2. Real estate brokers and agents, when concluding transactions or settlements on behalf of their
    customers in relation to the purchase or sale of real estate. 3. Dealers in valuable metals and precious stones, when
    carrying out any single cash transaction or several transactions that appear to be linked and whose value equals or exceeds
    fifty-five thousand dirhams (AED 55,000). 4. Lawyers, notaries, other independent legal professionals, and independent
    accountants, whether practicing individually, as partners, or as professionals within a firm practicing such profession,
    when they prepare, conduct, or execute financial transactions on behalf of their customers in relation to the following
    activities:

    a. Buying and selling real estate;

    b. Managing funds owned by the customer ;

    c. Managing bank accounts, savings accounts, or securities accounts;

    d. Organizing contributions for the establishment, operation, or management of Companies;

    e. Establishing, operating, managing legal persons or Legal Arrangements, or selling, or purchasing commercial entities.
    5.'
  - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


    1.1.1

    The

    Risk Management Regulation

    (Circular No. 153/2018) issued by the Central Bank of the UAE (“

    CBUAE

    ”) on 27

    th

    May 2018 states that banks must have robust systems and tools to assess and measure risks.

    1.1.2

    To set out modelling requirements for licensed banks, the CBUAE has issued

    Model Management Standards

    (“

    MMS

    ”) and Model Management Guidance (“

    MMG

    ”). Both MMS and MMG should be read jointly as they constitute a consistent set of requirements and guidance, as follows:

    (i)

    The

    MMS

    outline general standards applicable to all models and constitute minimum requirements that must be met by UAE banks.

    (ii)

    The

    MMG

    expands on technical aspects that are expected to be implemented by UAE banks for certain types of models. Given the wide
    range of models and the complexity of some, the CBUAE recognises that alternative approaches can be envisaged on specific
    technical points. Whilst this MMG neither constitutes additional legislation or regulation nor replaces or supersedes
    any legal or regulatory requirements or statutory obligations, deviations from the MMG should be clearly justified and
    will be subject to CBUAE supervisory review.

    4964'
