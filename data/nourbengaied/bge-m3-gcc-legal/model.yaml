    - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


      Financial Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers shall
      apply Enhanced Customer Due Diligence measures proportionate to the level of risk arising from a Business Relationship
      or Transactions with a natural or legal person from countries identified by the National Committee as high-risk, or
      from countries with deficiencies in Anti-Money Laundering, and combating Financing of Terrorism, and Proliferation Financing
      systems. 2. Financial Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers
      shall apply countermeasures and any other measures required by the Supervisory Authority, whether on its own initiative
      or as determined by the National Committee, in relation to high-risk countries and countries with deficiencies in Anti
      Money Laundering, combating the Financing of Terrorism, Proliferation Financing systems. Division Ten: Requirements
      Relating to New Technologies

      Article (24)

      1. Financial Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers
      shall identify and assess the risks of Money Laundering, Financing of Terrorism, and Proliferation Financing that may
      arise from the development of new products and new business practices, including new service delivery mechanisms and
      the use of new or developing technologies for both new and pre-existing products. 2. Financial Institutions, Designated
      Non-Financial Businesses and Professions, and Virtual Asset Service Providers shall assess such risks prior to the launch
      or use of products, practices, or technologies, and shall take appropriate measures to manage and mitigate those risks.
      Division Eleven: Record-Keeping

      Article (25)

      1. Financial Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers
      shall retain all records, documents, instruments, and data relating to all domestic and international financial and
      cash Transactions and commercial dealings, for a period of not less than five (5) years from the date of completion
      of the Transaction or the termination of the Business Relationship with the Customer. Such records shall be made available
      to the concerned authorities promptly upon request. 2. Financial Institutions, Designated Non-Financial Businesses and
      Professions, and Virtual Asset Service Providers shall retain all records and documents obtained through Customer Due
      Diligence measures, ongoing monitoring, account files, business correspondence, copies of personal identification documents,
      including Suspicious Transaction Reports, results of any analysis conducted, closed-circuit television (CCTV) and the
      related automated teller machines (ATMs) recordings, and any other recordings, for a period of not less than five (5)
      years from the date of termination of the Business Relationship, or from the date of account closure for Customers holding
      accounts therewith, or after the completion of an occasional Transaction, or from the date of completion of inspection
      by the Supervisory Authority, or from the date of completion of an investigation, or from the date of issuance of a
      final court judgment, with the retention period calculated by reference to the most recent of such procedures. 3. Financial
      Institutions, Designated Non-Financial Businesses and Professions, and Virtual Asset Service Providers shall organize
      retained records, documents, and instruments in a manner sufficient to permit the reconstruction of individual Transactions,
      data analysis, and the tracing of financial transactions, so as to be capable, where necessary, of providing evidence
      for prosecution of criminal activity. 4. Financial Institutions, Designated Non-Financial Businesses and Professions,
      and Virtual Asset Service Providers shall make all Customer information, including information relating to Customer
      Due Diligence, ongoing monitoring, and the results thereof, as well as records, files, documents, correspondence, and
