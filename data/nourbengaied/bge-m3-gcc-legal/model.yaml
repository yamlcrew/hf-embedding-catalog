    - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


      Examples of some of the measures that should be considered include but are not limited to:

      •

      Assessing the effectiveness of foreign branches and majority-owned subsidiaries’ AML/CFT measures, including evaluating
      such factors as the comprehensiveness and quality of their policies, procedures and controls, and performing gap analyses
      in relation to the requirements of the

      AML-CFT Law

      and

      AML-CFT Decision

      ;

      •

      Establishing clear policies, procedures and controls in relation to the type and extent of access which managers and
      employees of foreign branches and majority-owned subsidiaries have to the FIs’ IT and operational systems, including
      CDD and transaction processing systems;

      •

      Establishing clear policies, procedures and controls in relation to the type and extent of access which customers and
      Business Relationships of foreign branches and majority-owned subsidiaries have to the FIs’ products, services and transactional
      processing capabilities;

      •

      Establishing clear policies, procedures and controls in relation to the type of CDD and transaction-related information,
      data, and analysis FIs accept from their foreign branches and majority-owned subsidiaries in relation to customer or
      Business Relationship referrals, and the extent of their reliance on such information (see

      Section 6.6, Reliance on a Third Party

      );

      •

      Implementing service-level agreements, clearly setting out the roles and responsibilities of the parties and specifying
      the nature of the CDD and record-keeping requirements to be fulfilled in relation to customer or Business Relationship
      referrals;

      •

      Establishing protocols for the certification by the foreign branches and subsidiaries of documents and other records
      pertaining to the CDD measures undertaken in relation to customer or Business Relationship referrals. In particular,
      in cases in which the minimum AML/CFT requirements of host countries in which FIs maintain foreign operations are less
      strict than those of the State, FIs should take the necessary measures to ensure that their foreign branches and/or
      majority-owned subsidiaries in those countries implement requirements consistent with those of the State, to the extent
      permitted by the laws and regulations of the host countries. If such host countries do not permit the proper implementation
      of the AML/CFT requirements consistent with those of the State, FIs should apply appropriate additional measures to
      manage and mitigate the ML/FT risks (including but not limited to those described above). They should also inform the
      relevant Supervisory Authorities of the circumstances and comply with any additional supervisory actions, controls,
      or requirements of the Competent Authorities of the State (up to and including, if requested, terminating their operations
      in the host countries). 8.4 Independent Audit Function

      (

      AML-CFT Decision Article 20.6

      )

      A robust and independent audit function is a key component to a well-functioning governance structure and an effective
      AML/CFT framework. FIs are obliged to have in place an independent audit function to test the effectiveness and adequacy
      of their internal polices, controls and procedures relating to combating the crimes of money laundering and the financing
      of terrorism and of illegal organisations. In this regard, FIs should ensure that their independent audit function is
      appropriately staffed and organized, and that it has the requisite competencies and experience to carry out its responsibilities
      effectively, commensurate with the ML/FT risks to which the FIs are exposed, and with the nature and size of their businesses.
      It should be noted that, while most FIs are expected to have the capacity to meet these requirements internally, depending
      on the nature and size of their businesses, some FIs (particularly smaller ones) may not necessarily have the resources
      to maintain a fully functioning and effective internal audit unit. In such cases, those FIs should ensure that they
      take adequate measures to obtain the necessary capabilities from qualified external sources. They should also ensure
      that they have in place adequate internal capabilities to provide sufficient coordination with and oversight of any
      external resources they may utilise, and that such external resources are adequately regulated and supervised by relevant
      Competent Authorities.'
