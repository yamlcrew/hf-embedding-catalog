      •

      How it works:

      Combining proceeds of crime with legitimate business takings. •

      Possible indicators

      o

      Significant and/or frequent cash deposits when business has electronic funds transfer at point-of-sale facilities. o

      Large number of accounts held by a customer with the same LFI. o

      Accounts operated by someone other than the account holder. o

      Merging businesses to create layers. o

      Complex ownership structures. o

      Regular use of third-party accounts. B.11 Gatekeepers/professional services

      •

      How it works:

      Utilizing ‘Professionals’ to establish seemingly legitimate business activities, for example, Lawyers, Accountants,
      Brokers, Company Formation Agents. •

      Possible indicators

      o

      Accounts and/or facilities opened and/or operated by company formation agents. o

      Gatekeepers that appear to have full control. o

      Known or suspected corrupt professionals offering services to criminal entities. o

      Accounts operated by someone other than the account holder. B.12 Cash deposits

      •

      How it works:

      Placement of cash into the financial system. •

      Possible indicators

      o

      Large cash deposits followed immediately by withdrawals or electronic transfers. B.13 Structuring

      •

      How it works:

      Separating large transactions into small transactions to avoid scrutiny and detection from LFIs. •

      Possible indicators

      o

      Many transactions conducted at various LFIs and/or branches, in one day. o

      Small/frequent cash deposits, withdrawals, electronic transfers made over a short time period. o

      Multiple low value domestic or international transfer. B.14 Smurfing

      •

      How it works:

      Utilizing third parties or groups of people to carry out structuring. •

      Possible indicators

      o

      Third parties conducting numerous transactions on behalf of other individuals. o

      Many transactions conducted at various LFIs and/or branches, in one day. o

      Accounts operated by someone other than the account holder. B.15 Credit Cards/Cheques/Promissory Notes

      •

      How it works:

      Instruments used to access funds held in an LFI, often in another jurisdiction. •

      Possible indicators

      o

      Frequent cheque deposits in contrast to known or expected business activity. o

      Multiple cash advances on credit card facilities. o

      Credit cards with large credit balances. B.16 Transactions inconsistent with intended purpose of the account

      •

      How it works:

      Transactions that are out of the ordinary for the individual or conducted without a clear rationale. •

      Possible indicators

      o

      Transactions to or from unrelated parties. o

      Transaction amounts that are inconsistent with the account’s expected volumes or frequencies. o

      Transactions that are out of the ordinary for the customer’s profession or business activity. B.17 Cash couriers

      •

      How it works:

      Concealing the movement of currency from one jurisdiction to another using people, luggage, mail, or any other mode
      of shipment, without declaration. •

      Possible indicators

      o

      Transactions involving locations with poor AML/CFT regimes or high exposure to corruption. o

      Customers originating from locations with poor AML/CFT regimes/high exposure to corruption. o

      Significant and/or frequent cash deposits made over a short period of time. o

      Significant and/or frequent currency exchanges made over a short period of time. B.18 Other payment technologies

      •

      How it works:

      Utilizing emerging or new payment technologies such as virtual currencies/crypto- currencies, peer-to-peer (P2P) lending
      etc. to facilitate money laundering and/or the financing of terrorism and illegal organisations. •

      Possible indicators

      o

      Excessive use of stored value cards.'
    - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


      This may, on further investigation, generate knowledge or reasonable suspicion of financial crime and thereby require
      reporting to the appropriate law enforcement and/or regulatory authority as an STR, SAR, or equivalent local report
      in line with AML/CFT regulatory and/or UAE FIU reporting requirements. LFIs may choose to use a combination of automated
      transaction monitoring scenarios and exception-based (manual) transaction reports to monitor for potentially suspicious
      activity. The aim of the alert review process is to identify and respond to potential indicators of money laundering,
      associated predicate offenses, financing of terrorism and illegal organisations , financing of proliferation, and any
      potentially unusual activity that does not align to a customer’s or account''s profile including by deploying a risk-based
      approach. An LFI’s transaction monitoring systems and manual processes should be reviewed, assessed, and revised periodically—at
      least annually—and otherwise as appropriate, justified by the required circumstances. Additionally, this review should
      include both an evaluation of transaction monitoring system thresholds and a fine tuning of the LFI’s transaction monitoring
      system as well as an evaluation of its effectiveness. The individuals responsible for the review should have a proper
      understanding of the LFI’s framework-including the LFI''s business and customer base—to generate a meaningful output.
      2.5. Internal Organization

      In order for an LFI’s transaction monitoring and suspicious activity reporting program to be effective, it must be based
      on the foundation of a sound governance structure. Namely, an LFI’s internal organization is important to appropriately
      identifying unusual or potentially suspicious activity. Internal organization comprises an LFI’s policies, procedures,
      and processes designed to oversee and manage risks and to achieve compliance with UAE AML/CFT laws and regulations.
      In particular, an LFI’s internal organization addresses the core organizational elements of an LFI’s compliance program:
      governance and management oversight; policies and procedures; clear lines of responsibility and reporting; and ongoing
      training to account for changes in the UAE’s legislative and regulatory frameworks. •

      Governance and Management Oversight:

      Governance and management oversight helps to ensure that an LFI’s compliance program is appropriately funded, staffed,
      and equipped with the requisite technology, including to identify and report suspicious activity. An LFI’s Board of
      Directors also ensures that the compliance program has an appropriately prominent status within the organization and
      is operationally independent. In this capacity, senior management, inclusive of the Compliance Officer, within a compliance
      program should have the appropriate authority; independence; access to employees and information within the organization;
      and appropriate resources to conduct their activities—including the identification and reporting of suspicious activity—effectively.
      The compliance program should have access to the Board of Directors or a designated board committee to raise any issues
      or risks; report on the status of ongoing compliance; and escalate any other pertinent AML/CFT-related information.
      •

      As part of an LFI’s risk management framework, senior management and an LFI’s Board of Directors should oversee the
      design, implementation, and maintenance of a transaction monitoring and suspicious activity reporting program based
      on an LFI’s AML/CFT risks and in accordance with all applicable laws and regulations. Senior management should likewise
      oversee a vendor selection process (as applicable) if a third-party vendor is used to acquire, install, implement, or
      test a transaction monitoring program or any aspect of identifying and reporting suspicious activity, among other responsibilities.
      The Compliance Officer (or MLRO) shall periodically update the Board of Directors (or a committee of the Board) on the
      overall capability framework (that includes technology and process aspects of suspicious activity identification, investigation
      and reporting aspects). •

      Policies and Procedures

      : An LFI should have policies and procedures that govern changes to its transaction monitoring program which ensures
      that changes are defined, managed, controlled, reported, and audited. Namely, LFIs should have governance protocols
      surrounding the design and implementation of new detection scenarios; periodic assessment and validation of existing
      detection scenarios; and retiring of detection scenarios.'
