    sentences:
    - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


      In such cases, beyond the EDD measures described in previous sections (see Sections

      6.4, Enhanced Due Diligence (EDD) Measures

      and

      6.3.5, Ongoing Monitoring of the Business Relationship

      ), FIs should also implement additional control measures such as, but not limited to:

      •

      Requiring additional data, information or documents from the customer in order to carry out transactions (for example,
      evidence of relevant licenses or authorisations, customs documents, additional identification documents, bank or other
      references);

      •

      Restricting the customer’s use of certain products or services;

      •

      Placing restrictions and/or additional approval requirements on the processing of the customer’s transactions (for example,
      transaction size and/or volume limits, or limits to the number of transactions of certain types that can be executed
      during a given time period). FIs should also document the specific EDD, ongoing monitoring, and additional control measures
      to be taken. In this regard, FIs should obtain senior management approval for the plan, including its specific conditions,
      duration and any requirements for its removal, as well as the roles and responsibilities for its implementation, monitoring
      and reporting, commensurate with the nature and degree of the ML/FT risks associated with the business relationship.
      8. Governance

      (

      AML-CFT Law Article 16.1(d)

      ; AML-CFT Decision Articles

      4.2(a)

      ,

      20

      ,

      21

      ,

      44.4

      )

      In order for the AML/CFT framework of any organisation to be effective, it must be based on the foundation of a sound
      governance structure, and held together by a strong compliance culture. The governance structure should take the following
      into consideration:

      •

      Establish clear accountability lines and responsibilities to ensure that there is appropriate and effective oversight
      of staff who engage in activities which may pose a greater AML/CFT risk. •

      Have the mechanism to inform the board of directors (or a committee of the board) and senior management of compliance
      initiatives, compliance deficiencies, STRs filed and corrective actions taken;

      •

      Develop and maintain a system of reporting that provides accurate and timely information on the status of the AML/CFT
      program, including statistics on key elements of the program, such as the number of transactions monitored, alerts generated,
      cases created and STRs filed;

      •

      Develop and implement quality assurance testing programs to assess the effectiveness of the AML/CFT program’s implementation
      and execution of its requirements. FIs should also make sure to have management structures which are accountable for
      clear ML/FT risk management and mitigation measures, as well as appropriate independent control functions. Implicit
      in both the

      AML-CFT Law

      and the

      AML-CFT Decision

      are the elements of both, concerning which additional guidance is provided in the sections below. 8.1 Compliance Officer

      (AML-CFT Decision Articles

      20.3

      ,

      21

      and

      44.12

      )

      8.1.1 Appointment and Approval

      FIs are obliged to appoint a compliance officer (CO) with the appropriate competencies and experience to perform the
      statutory duties and responsibilities associated with this role. The

      AML-CFT Decision

      stipulates that the CO performs these duties “under his or her own responsibility”, referring to the independent nature
      of the function and from which it should be understood that the position should be at a management level. FIs must take
      all appropriate steps to identify and to prevent or manage confilicts of interests between:

      •

      The FI, its’ personnel including its CO, or any other representatives, including any person who is directly or indirectly
      associated with the organization and who has control to make decisions, and the FI’s customer. •

      The CO and senior management of the organization including the Board of Directors.'
    - '[UAE-Federal | CBUAE | CBUAE AML/CFT Standards and Guidelines]


      Record Keeping

      LFIs must maintain detailed records associated with their ML/FT/PF risk assessment and mitigation measures, as well
      as records, documents, data, and statistics for all financial transactions, records obtained through CDD measures and
      ongoing monitoring (including copies of personal identification documents), account files and business correspondence,
      and STRs/SARs and results of any analysis performed. LFIs should make the records available to the competent authorities
      immediately upon request

      . UAE CPF Legal and Regulatory Framework

      Federal Decree Law No. (20) of 2018

      , Article 16.e.1

      specifies that FIs and DNFBPs shall undertake “Prompt application of the directives when issued by the competent authorities
      in the state for implementing the decisions issued by the UN Security Council under Chapter (7) of UN Convention for
      the Prohibition and Suppression of the Financing of Terrorism and Proliferation of Weapons of Mass Destruction, and
      other related directives”. Federal Decree-Law No. (20) of 2018

      , Article (28)

