      The originating Financial Institution shall provide such data within three (3) Working Days from the date of receipt
      of a request from the Beneficiary Financial Institution or the concerned authorities. 6. Financial Institutions shall
      be prohibited from executing Wire Transfers where they fail to comply with the conditions set out in this Article. 7.
      Originating Financial Institutions shall retain all information collected regarding the originator and the beneficiary
      in accordance with the provisions of

      Article (25) of this Resolution

      . 8. Financial Institutions shall, when processing Wire Transfers, apply freezing measures and transaction prohibition
      measures in accordance with instructions issued by the Executive Office or other competent authorities relating to Targeted
      Financial Sanctions. Article (29)

      1. Intermediary Financial Institutions shall ensure that all originator and beneficiary information accompanies international
      Wire Transfers. 2. Where technical limitations prevent the originator and beneficiary information from remaining with
      an international Wire Transfer when such transfer is converted into a domestic Wire Transfer, the Intermediary Financial
      Institution receiving the international transfer shall retain a record containing all information received from the
      originating Financial Institution or from a foreign intermediary institution, in accordance with the provisions of

      Article (25) of this Resolution

      . 3. Intermediary Financial Institutions shall take reasonable and immediate measures to identify international Wire
      Transfers lacking required originator or beneficiary information, and shall establish risk-based policies and procedures
      to determine whether to execute, suspend, or reject such transfers, as well as the appropriate follow-up actions in
      respect thereof. Article (30)

      1. Beneficiary Financial Institutions shall take Reasonable Measures to identify international Wire Transfers lacking
      required originator or beneficiary information, such as monitoring them during execution, where feasible, or after execution.
      2. Beneficiary Financial Institutions shall verify the identity of the beneficiary of international Wire Transfers equal
      to or exceeding three thousand five hundred dirhams (AED 3,500), where such identity has not been previously verified.
      3. Beneficiary Financial Institutions shall establish risk-based policies and procedures to determine when to execute,
      reject, or suspend Wire Transfers lacking the required originator or beneficiary information, and to determine the appropriate
      follow-up actions. 4. Beneficiary Financial Institutions shall retain all information collected in respect of the originator
      and the beneficiary in accordance with the provisions of

      Article (25) of this Resolution

      . Article (31)

      1. Money or Value Transfer Service Providers shall comply with all relevant requirements set out in Articles (

      28

      ), (

      29

      ), and (

      30

      ) of this Resolution, whether they conduct their activities directly or through their agents. 2. Where a Money or Value
      Transfer Service Provider acts as both the originator from the State and the recipient in another State, it shall:

      a. Collect all information relating to the originator and the beneficiary for the purpose of determining whether to
      submit a Suspicious Transaction Report;

      b. Where it is decided to submit a Suspicious Transaction Report in relation to the Transaction, it shall be submitted
      to the Financial Intelligence Unit of the concerned State, together with all relevant information. Division Four: Financial
      Groups

      Article (32)

      Financial Groups shall implement group-wide programs for combating Crime, which shall be applicable to all branches
      and subsidiaries in which the group holds a majority ownership. Such programs shall, in addition to what is stipulated
      in

      Article (21) of this Resolution

      , include the following:

      1. Policies and procedures for the exchange of information required for Customer Due Diligence and crime risk management
      purposes;

      2. Provision of information relating to customers, accounts, and transactions from branches and subsidiaries to compliance,
      audit, and Anti-Money Laundering, combating Terrorism Financing officers at the financial group level where necessary
      for the purposes of combating Crime, including information resulting from the analysis of Transaction, or activities
      that appear unusual or suspicious, Suspicious Transaction Reports, or information indicating that such a report has
      been submitted.'
