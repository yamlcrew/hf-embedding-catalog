widgetData:
- source_sentence: 작은 먹거리는 숙소 들어오게 전에 사는걸 추천해요.
  sentences:
  - 저는 당신이 숙소에 들어오기 전에 작은 음식을 사는 것을 추천합니다.
  - 포스트 코로나 시대를 극복하고 몰입합니다 ↑
  - 그들은 매우 아름답고 멋진 친구들이에요.
- source_sentence: 세숫물말고 목욕물은 어떻게 설정하니?
  sentences:
  - 다만 관련 벌칙 등에 대한 조항은 ‘공포 후 1개월’이 지나 발효된다.
  - 내일 과제회의 몇 시로 정해졌는지 아세요?
  - 거실 조명등 어느정도 밝아?
- source_sentence: 특히 고무적인 것은 코로나에 따른 경기 침체에도 불구하고 한-메콩 교역이 이미 작년 수준에 이른 것입니다.
  sentences:
  - 이 조치의 가로주택정비사업과 준공업지역사업의 활성화는 보다 지속적이고 안정적인 공급을 위한 추가적인 공급대책 마련의 일환입니다.
  - 특히 고무적인 것은 한국-메콩 무역이 코로나로 인한 경기 침체에도 불구하고 이미 작년 수준에 도달했다는 점입니다.
  - 고농도 미세먼지가 발생하는 봄철 등 일정기간에 발전시설 가동률 조정 조치를 추가적으로 시행하기로 했다.
- source_sentence: 너무 큰 메일은 저장하면 안돼
  sentences:
  - 메일이 너무 크다면 저장하지마
  - 어제 비온 곳이 제주도와 울릉도 중 어디인가요?
  - 짐이 많으시면 그냥 택시 타는 것을 추천합니다.
- source_sentence: 안방에서 조명등을 켜놓는 건 삼가주시기 바랍니다.
  sentences:
  - 다음달까지 할 생각말고 이번달내로 보일러 점검을 받아야해
  - 로봇 청소기 사지마
  - 숙소는 시골 할머니 집에 온듯한 느낌이었어요.
