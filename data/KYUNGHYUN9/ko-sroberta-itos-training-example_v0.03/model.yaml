- source_sentence: 한 여성이 남자와 게임을 하고 있다.
  sentences:
  - 한 남자가 피아노를 치고 있다.
  - 기차 마당의 선로에 앉아 있는 기차
  - 에콰도르는 아직 어샌지의 망명을 결정하지 않았다.
- source_sentence: 젊은 남자는 화려한 액세서리를 가지고 있다.
  sentences:
  - 다채로운 꽃무늬 리와 다채로운 팔찌를 든 청년이 깃발을 들고 있다.
  - 한 남자가 서핑 보드 위에 있다.
  - 화려한 옷을 입은 젊은이가 총을 들고 있다.
- source_sentence: 그들은 서로 가까이 있지 않다.
  sentences:
  - 그리고 나는 내 돈을 돌봐야 했다. 나는 내 자신의 생명보험에 지불하는 내 자신의 당좌예금 계좌를 가지고 있고, 내가 무슨 뜻인지조차 모르는 많은 아이들을 알고 있다. 나는 그들에게 내가 내 생명보험에 지불한다고
    말하고 그들의 입이 그냥 바닥에 떨어진다.
  - 그들은 샤토와 매우 가깝다.
  - 그들은 샤토와 서로 어느 정도 떨어져 있다.
- source_sentence: 딱딱한 모자를 쓴 남자가 건물 프레임 앞에 주차된 빨간 트럭의 침대를 쳐다본다.
  sentences:
  - 남자가 자고 있다.
  - 2. 알코올문제의 규모와 다른 방법으로 치료를 받지 않을 수 있는 환자를 식별할 수 있는 응급부서의 능력을 감안할 때, 자금조달기관은 ED의 알코올문제 연구에 높은 우선순위를 두어야 한다.
  - 한 남자가 트럭을 보고 있다.
