widgetData:
- source_sentence: organization id
  sentences:
  - 'Primary reference table for classifying Payers into broader financial or business categories. This table groups Payers
    into segments such as ''Insurance Private'', ''Insurance Government (BPJS)'', ''Corporate'', and ''Related Parties''.
    Use this table to aggregate revenue reporting by payer channel, analyze market segmentation (e.g., Private Insurance vs.
    Government Scheme), or apply high-level billing policies to groups of payers. Note: This serves as a categorization layer
    above the individual ''Payer'' table.'
  - 'Operational transaction table recording unstructured free-text medical notes and preliminary clinical remarks associated
    with a patient admission. It captures initial diagnosis impressions, symptoms, or observation notes (e.g., ''Asthma'',
    ''Observation Febris'') entered during the admission process. Use this table to retrieve qualitative clinical context
    for a visit or search for specific medical conditions mentioned in preliminary notes. Note: This table contains raw free-text
    descriptions, NOT structured ICD-10 diagnosis codes used for billing.'
  - 'Operational transaction table recording every patient registration and visit event at the hospital. This table consolidates
    patient demographics, visit types (Inpatient, Outpatient, Emergency), primary and referral doctors, payer/insurance eligibility,
    and critical timelines (Admission and Discharge dates). Use this table to calculate patient census, Average Length of
    Stay (ALOS), track patient flow, or analyze admission volume by doctor or department. Note: This table focuses on administrative
    registration and billing initiation; it does not contain detailed clinical notes, specific lab results, or medication
    prescriptions. When analyzing patient administrative inflow and outflow data, this table is the primary and essential
    source for all patient visit metrics.'
- source_sentence: What is the total count of admissions for each patient payment category (e.g., 'Private', 'Payer') as defined
    in the PatientType master, grouped by the AdmissionType from the Admission table, for the year 2024?
  sentences:
  - 'Operational transaction table recording unstructured free-text medical notes and preliminary clinical remarks associated
    with a patient admission. It captures initial diagnosis impressions, symptoms, or observation notes (e.g., ''Asthma'',
    ''Observation Febris'') entered during the admission process. Use this table to retrieve qualitative clinical context
    for a visit or search for specific medical conditions mentioned in preliminary notes. Note: This table contains raw free-text
    descriptions, NOT structured ICD-10 diagnosis codes used for billing.'
  - 'Operational transaction table recording every patient registration and visit event at the hospital. This table consolidates
    patient demographics, visit types (Inpatient, Outpatient, Emergency), primary and referral doctors, payer/insurance eligibility,
    and critical timelines (Admission and Discharge dates). Use this table to calculate patient census, Average Length of
    Stay (ALOS), track patient flow, or analyze admission volume by doctor or department. Note: This table focuses on administrative
    registration and billing initiation; it does not contain detailed clinical notes, specific lab results, or medication
    prescriptions. When analyzing patient administrative inflow and outflow data, this table is the primary and essential
    source for all patient visit metrics.'
  - 'Core reference table that links a central patient profile to their local record at a specific hospital branch. It connects
    the central `PatientId` to a local Medical Record Number (`MrNo`) at a specific hospital (`OrganizationId`). The table
    also includes the patient''s registration date at that particular location and the status of their medical record file
    (e.g., Active, Merged). **Use this table to** find a patient''s local MR Number for a specific hospital, determine when
    a patient first registered at a site, or check the administrative status of a patient''s file at a given location. **Note:
    This table defines the relationship and local record number, not the patient''s demographic details (found in the `Patient`
    table) or their visit history (found in `Admission` or `Encounter` tables).**'
- source_sentence: List the patient names, their primary payer's name, and the invoice numbers for all invoices issued in
    the last 90 days to male patients whose payer is a 'Corporate' type.
  sentences:
  - Operational transaction table that records the movement of inventory items from one storage location (store) to another
    within the hospital network. It captures the header-level details of each transfer, including the transaction number,
    date, the originating store, and the receiving store. **Use this table to** track the flow of goods, monitor stock levels
    across different warehouses or departments, and audit inventory movements for logistics and supply chain management. **Note:**
    This table contains only the header information for the transfer event; it does NOT list the specific items or quantities
    transferred. Join with the Transfer Detail table for item-level information.
  - 'Operational transaction table recording the official event of a patient leaving the hospital (Discharge). It captures
    the precise discharge timestamp, the patient''s condition upon exit (e.g., Recovered, Improved), and the type of discharge
    (e.g., Medical Consent, Transfer) linked to their Admission. **Use this table to** calculate Length of Stay (LOS), analyze
    clinical outcomes, or track bed turnover rates. **Note: This table signifies the physical or administrative end of a visit;
    it does NOT contain the final invoice amount, though it triggers the billing closure process.**'
  - 'Primary reference table containing the master list of all external organizations responsible for patient payment guarantees.
    This includes Insurance Companies, Corporate Clients/Employers, and Government Health Schemes (e.g., BPJS, Jamkesda).
    The table stores Payer details such as Legal Name, Address, Contact Information, and specific Payer Group classifications.
    Use this table to link patient visits to their financial guarantors, generate invoices for corporate clients, or analyze
    revenue contribution by payer. Note: This table defines the ''Who Pays'' entity; specific policy terms or benefit limits
    are typically stored in separate configuration tables.'
- source_sentence: Identify `OrganizationId`s that have more than 100 `Admission` records currently in 'Active' `AdmissionStatus`
    where an `ArInvoice` exists, and the `InvoiceDate` is more than 7 days after the `AdmissionDate`.
  sentences:
  - 'Primary reference table listing the specific bank accounts owned or utilized by various Siloam Hospital units (Organizations).
    It stores detailed Account Numbers, Account Names, and operational notes (e.g., Receipt or Payment accounts), linking
    them to the parent Bank entity. **Use this table to** identify the destination account for financial settlements, reconcile
    deposits, or manage treasury master data. **Note: This defines static master data for the hospital''s bank accounts, NOT
    a transaction log of transfers or balances.**'
  - 'Operational transaction table recording every patient registration and visit event at the hospital. This table consolidates
    patient demographics, visit types (Inpatient, Outpatient, Emergency), primary and referral doctors, payer/insurance eligibility,
    and critical timelines (Admission and Discharge dates). Use this table to calculate patient census, Average Length of
    Stay (ALOS), track patient flow, or analyze admission volume by doctor or department. Note: This table focuses on administrative
    registration and billing initiation; it does not contain detailed clinical notes, specific lab results, or medication
    prescriptions. When analyzing patient administrative inflow and outflow data, this table is the primary and essential
    source for all patient visit metrics.'
  - 'Operational transaction table (Financial Log) recording the header-level details of patient invoices and billing events.
    This table captures the financial breakdown of a visit, distinguishing between Patient responsibility (Out-of-pocket)
    and Payer responsibility (Insurance/Corporate Coverage), including Gross Amounts, Discounts, Taxes, and Net Payable values.
    Use this table to analyze hospital revenue streams, track Accounts Receivable (AR), monitor billing cancellations, or
    calculate the financial yield per admission. Note: This is the Invoice HEADER table containing total values; it does not
    typically list the specific individual line items (drugs, labs, services) charged within the bill. For any financial analysis
    related to hospital revenue, Payments, Accounts Receivable (AR), billing breakdowns, or insurance claims, this invoice
    header table is the definitive starting point.'
- source_sentence: master data payer group
  sentences:
  - 'Strategic reference table linking Payers to specific Hospital Organizations (Units/Branches). This table manages the
    contractual relationships between insurance providers/corporate clients and individual hospital sites. It stores Contract
    Numbers, Validity Periods (Start/End Dates), Contract Status, and site-specific contact details. Use this table to validate
    insurance acceptance at a specific hospital branch, track contract expiration dates, or manage site-specific payer agreements.
    Note: This table enables the many-to-many relationship between Payers (Global) and Organizations (Local Sites).'
  - 'Primary reference table containing the master list of all external organizations responsible for patient payment guarantees.
    This includes Insurance Companies, Corporate Clients/Employers, and Government Health Schemes (e.g., BPJS, Jamkesda).
    The table stores Payer details such as Legal Name, Address, Contact Information, and specific Payer Group classifications.
    Use this table to link patient visits to their financial guarantors, generate invoices for corporate clients, or analyze
    revenue contribution by payer. Note: This table defines the ''Who Pays'' entity; specific policy terms or benefit limits
    are typically stored in separate configuration tables.'
  - 'Operational transaction table recording the official event of a patient leaving the hospital (Discharge). It captures
    the precise discharge timestamp, the patient''s condition upon exit (e.g., Recovered, Improved), and the type of discharge
    (e.g., Medical Consent, Transfer) linked to their Admission. **Use this table to** calculate Length of Stay (LOS), analyze
    clinical outcomes, or track bed turnover rates. **Note: This table signifies the physical or administrative end of a visit;
    it does NOT contain the final invoice amount, though it triggers the billing closure process.**'
