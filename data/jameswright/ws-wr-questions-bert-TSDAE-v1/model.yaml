- source_sentence: You have been sick so If questions it just - ’ being sorted, thanks Then assertiveness course and a . overtime
    isn selfish it just doing ’ s right for Why you?
  sentences:
  - You have been off sick so it makes sense. If anyone questions it just grey rock - it’s being sorted, thanks. Then do an
    online assertiveness course and ask your GP for a CBT referral. Not doing overtime isn’t selfish - it’s just you doing
    what’s right for you. Why would you do anything else?
  - 'Science works by the accumulation of evidence.  Independent groups work on projects and publish results.  Those results
    are examined and tested and examined again and tested again, such that they''re either confirmed or discarded and further
    work continues accordingly.  If a scientist or doctor disagrees with the ''official line'' they''re asked to present the
    data, methods and conclusions that have led to that disagreement so that it can by examined by the broader scientific
    and medical community.    And yes, someone who goes on YouTube or wherever - whether doctor, scientist or layperson -
    and tells viewers that a vaccine alters DNA structure and destroys the immune system is either a grifter or a fruitcake.
    1 minute ago, FIRETHORN1 said: ...Can you not accept that some people can hold an opposite view quite genuinely? To me,
    a "conspiracy theorist" is someone who believes what they are told, without any evidence to back it up. I can absolutely
    accept that someone can genuinely believe something without having any evidence at all to support that view.  I''m believing
    that right now, in fact. 1 minute ago, FIRETHORN1 said: There is no evidence whatsoever that the vaccine works That is
    categorically, absolutely and undeniably false, as the most cursory of research will tell you.  But then you don''t actually
    want  to believe me, do you?'
  - 'n111ck said: Thats two completely different things and lets not forget every time the government tries to, for example,
    crack down on benefit fraud its slammed as ''unfair and cruel'' in the lefty media. Where anything is provided ''free''
    by the government it will always be abused and subject to fraud - covid has proven that quite clearly. The cost of preventing
    fraud has to be balanced against the cost of the actual fraud unfortunately. Mainly because they way they do it is cruel
    and unfair and usually hits those that need the help by starting off with the objective to actively refuse and punish
    not to actually assess and help? Also possibly because benefit fraud is tiny compared to mistakes (usually in the governments
    favour) in decisions and the amount not claimed that people are eligible for?'
