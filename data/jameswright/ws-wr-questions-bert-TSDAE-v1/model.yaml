  sentences:
  - Surely you must know that that's BS? Or am I wrong, does the fact ICE cars have oil running through their veins equal
    the possession of a soul? Does that Black Edition Golf doing the rounds have soul? I'd look at this and surmise that it
    is big, cosseting, luxurious, quiet, effortlessly fast etc etc, and for me that sounds like pretty compelling transport.
    Can't you lot just accept that cars, and more specifically the enjoyment of cars, means different things to different
    people, and that you can be just as enthusiastic about electric propulsion as you can be about burning fossil fuels?
  - Phoebo · Today 03:35 So what you're proposing is a dumbing down of society to eductae the lowest common denominator? Good
    parents, parents but if school have to do the parenting then there won't be time for actual schooling, so we'll end up
    not having any engineers, doctors, architects etc? That's the outcome if you think it all the way through. The OP is completely
