  sentences:
  - 'In anycase it got too much and I spoke to my gp who was amazing and started me on evorel sequi for a 3 month trial. So
    I would say the first 4 patches have been good, I definitely seen a change in myself, I then started the conti patches,
    im currently on the last one of those 4, ive been brilliant until 3 days ago my anxiety has come back and its horrible.
    SO I have had a read of some different forums and it seems that the conti part can cause hightened anxiety. now, this
    didnt happen stright away and the anxiety has only just taised it head again in the last 3 days. So I dont want to complain
    too much as it is all better than it was prior to HRT but I guess im just looking for people with similar experiences
    to me, and I want to know if it got better or what? Thanks for taking the time to read. '
  - Just out of interest too... In an untreated Type 1 experiencing symptoms such as hunger, what happens to blood sugar levels.
    Do they just rise and rise? For example, given a typical day of carb laden breakfast, lunch and dinner and snacks, would
    you expect the BG levels to just go out of control over a short time (mmol/l into the teens and beyond? )....
  - Anyone else have post natal anxiety or depression? I’m on the wait list for counselling and my gp has prescribed tablets
    (although I’m not going to take them). Just wondering if anyone else is in the same boat and how you are coping? I’m so
    up and down x 😢
- source_sentence: I still a work I am live normally . manage symptoms in daily in there are days it like such a Do you?
  sentences:
  - 'I am certainly still a work in progress. But most days I am able to live my life normally. And manage the symptoms I
    feel. I still have to put in the daily work and in all honesty there are days it feels like such a pain lol. Do you know
    where your anxiety began? '
  - 'I''ve had the rabies anxiety too, then I met this dude in the crisis center who told me "do you know how rare rabies
    is? I''ve literally wrestled hundreds of wild animals as an exterminator and never once got rabies, and in all my years
    I''ve only seen one animal with rabies, and you can easily tell" So if the odds are low seeing an animal with rabies then
    the odds of rabies infected saliva in 90 degree weather is absolutely miniscule. '
  - Morning all, Im currently in the 3rd round of my 8 cycles of chemo for breast cancer. Had my last round on 29th June.
    I have tested positive for covid this morning after waking up with a sore throat. Spoke to the chemo line, they said dont
    worry, just get in touch if I get a temperature or feel really unwell. Has anyone else had covid while under going chemo?
    Im naturally feeling a littlw anxious and would love to hear from anyone who's been there. Thanks in advance xx
- source_sentence: yourself out speculating your problem might be, most so overwhelmed right that it sense note of what problems
    are consider possibilities .'d until GP of It GP For, there a time have to more Do you notice problems you certain?
  sentences:
  - Don't freak yourself out by speculating about what your problem might be. At the same time, most GPs are so overwhelmed
    right now that it makes sense to keep note of what your problems are and to consider possibilities. I'd make a diary entry
    every day until you see the GP about the details of your symptoms. It'll help the GP. For example, is there a particular
    time of day that you have to urinate more often? Do you notice certain problems after you eat certain things?
  - Hiya! I was just wondering how long does it take for an appointment to come for an urgent scan. I had my blood test result
    which showed ca125 of 47 and seen the GP last Friday the 30th and it's the waiting that's driving me crazy. Is it or is
    it not ovarian cancer??? I have no appetite anymore and I'm thinking if this is due to anxiety or progression of whatever
    I have? I also have this dry mouth which I am not sure if from anxiety or due to the blood pressure tablet I am taking
    which has been increased recently.
  - yma123 · Yesterday 12:08 No I didn't have any symptoms at all! CIN2 means moderate cell changes. I know it all seems very
    scary but just try and think that things like this is exactly what this process is trying to pick up so they can catch
    things before it gets to the stage that it's anything serious you're welcome to message me if you have any more questions
    or if you just want to talk about things x Thanks for elaborating on what CIN2 means I had no idea. So is that kind of
    like cell changes that happen before it develops fully into cancer? So kind of you to offer for me to PM you, thanks so
    much I will do that. It’s nice to be able to chat to people that have been through similar as it’s such an anxious time
    💐
