widgetData:
- source_sentence: رجلين يرتديان ملابس سوداء يقفان أمام مقهى مع لافتة مفتوحة
  sentences:
  - رجلين يرتديان ملابس عسكرية يقفان خارج مطعم
  - رجلين يجلسان على مقعد أمام مقهى.
  - الرعاية التلطيفية هي رعاية طبية متخصصة تركز على توفير الراحة للمرضى من الألم والأعراض الأخرى لمرض خطير. يهدف فريق الرعاية
    متعدد التخصصات إلى تحسين نوعية الحياة للأشخاص الذين يعانون من أمراض خطيرة أو تهدد الحياة ، بغض النظر عن التشخيص أو مرحلة
    المرض.
- source_sentence: ما هي الخطة المستخدمة لإعادة الإعمار
  sentences:
  - 'خطة إعادة بناء لينكولن. فكر أبراهام لنكولن في عملية استعادة الاتحاد منذ الأيام الأولى للحرب. كانت مبادئه التوجيهية هي
    إنجاز المهمة بأسرع ما يمكن وتجاهل الدعوات لمعاقبة الجنوب. في أواخر عام 1863 ، أعلن لينكولن عن خطة رسمية لإعادة الإعمار:
    1 سيتم منح عفو عام لكل من سيقسم الولاء للولايات المتحدة ويتعهد بالامتثال لجميع القوانين الفيدرالية المتعلقة بالعبودية.
    2 كان من المقرر استبعاد كبار المسؤولين الكونفدراليين والقادة العسكريين مؤقتًا من العملية.'
  - رجل يشرب
  - 'قانون إعادة البناء العسكري: بعد تمرير التعديل الرابع عشر ، أخذ الكونجرس زمام المبادرة بشكل حاسم في تحديد مسار إعادة الإعمار.
    في 2 مارس 1867 ، أصدر الكونجرس أول أربعة قوانين لإعادة الإعمار العسكري ، وأبطل قانون إعادة الإعمار العسكري الأول خطة الحكومة
    في عهد جونسون. قيادة حاسمة في تحديد مسار إعادة الإعمار. في 2 مارس 1867 ، أقر الكونجرس أول أربعة قوانين لإعادة الإعمار
    العسكري.'
- source_sentence: هل هناك دليل على أن المادة المظلمة تظهر كلما أجريت تجربة الشق المزدوج لأنها موجة؟
  sentences:
  - كيف أعالج اضطراب الانتصاب أو العجز الجنسي؟
  - لماذا من المستحيل بالنسبة للفيزيائيين أن يفهموا في تجربة الشق المزدوج أن المادة المظلمة هي التي تتأرجح؟
  - ما هو معنى الحياة؟
- source_sentence: لماذا يطرح الناس أسئلة على Quora والتي من السهل العثور على إجاباتها أيضاً على جوجل؟
  sentences:
  - كيف يمكنني كسب المال على الإنترنت؟
  - رجل يقفز في الماء
  - لماذا يطرح الناس على كورا أسئلة سخيفة حول الحقائق التي يمكن البحث عنها بسهولة في غوغل؟
- source_sentence: حسناً، لا أستطيع أنا أيضاً أقدر لك المكالمة
  sentences:
  - مع ائتمان الأقساط ، يمكنه الحصول على خطة فضية عن طريق دفع 121 دولارًا شهريًا من ماله الخاص ، مع رعاية الائتمان للتكلفة
    المتبقية للحصول على التأمين الصحي. مع تخفيض تقاسم التكاليف ، يمكنه الحصول على خطة بخصم قدره 250 دولارًا ، كما تحدد الخطة
    أيضًا تكاليفه من جيبه للمزايا المغطاة داخل الشبكة بمبلغ 2000 دولار لهذا العام. إذا اختار جون خطة برونزية ، فلن يدفع أي
    شيء مقابل قسط التأمين لأن ائتمانه المميز يغطي التكلفة بالكامل. الخطة الذهبية لها قيمة اكتوارية تبلغ 80 في المائة (مع ،
    على سبيل المثال ، 600 دولار للخصم و 25 دولارًا للزيارات المشتركة للطبيب) ، بينما إن تخفيض التكلفة الذي يمكن أن يحصل عليه
    جون من شأنه أن يجعل خطة القيمة الاكتوارية 87 بالمائة متاحة له (مع خصم 250 دولارًا و 15 دولارًا للطبيب في مثالنا).
  - أنا لا أقدر لك دعوتي.
  - شكراً على المكالمة
