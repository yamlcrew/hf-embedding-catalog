    \ the file name.\n\n    Examples\n    ----------\n    >>> file_list = tl.files.load_file_list(path=None, regx='w1pre_[0-9]+\\\
    .(npz)')\n\n    \"\"\"\n    if path is None:\n        path = os.getcwd()\n    file_list = os.listdir(path)\n    return_list\
    \ = []\n    for _, f in enumerate(file_list):\n        if re.search(regx, f):\n            return_list.append(f)\n   \
