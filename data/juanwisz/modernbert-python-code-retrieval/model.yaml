  - "def MotionBlur(k=5, angle=(0, 360), direction=(-1.0, 1.0), order=1, name=None, deterministic=False, random_state=None):\n\
    \    \"\"\"\n    Augmenter that sharpens images and overlays the result with the original image.\n\n    dtype support::\n\
    \n        See ``imgaug.augmenters.convolutional.Convolve``.\n\n    Parameters\n    ----------\n    k : int or tuple of\
    \ int or list of int or imgaug.parameters.StochasticParameter, optional\n        Kernel size to use.\n\n            *\
    \ If a single int, then that value will be used for the height\n              and width of the kernel.\n            *\
    \ If a tuple of two ints ``(a, b)``, then the kernel size will be\n              sampled from the interval ``[a..b]``.\n\
    \            * If a list, then a random value will be sampled from that list per image.\n            * If a StochasticParameter,\
    \ then ``N`` samples will be drawn from\n              that parameter per ``N`` input images, each representing the kernel\n\
    \              size for the nth image.\n\n    angle : number or tuple of number or list of number or imgaug.parameters.StochasticParameter,\
    \ optional\n        Angle of the motion blur in degrees (clockwise, relative to top center direction).\n\n           \
    \ * If a number, exactly that value will be used.\n            * If a tuple ``(a, b)``, a random value from the range\
    \ ``a <= x <= b`` will\n              be sampled per image.\n            * If a list, then a random value will be sampled\
    \ from that list per image.\n            * If a StochasticParameter, a value will be sampled from the\n              parameter\
    \ per image.\n\n    direction : number or tuple of number or list of number or imgaug.parameters.StochasticParameter,\
    \ optional\n        Forward/backward direction of the motion blur. Lower values towards -1.0 will point the motion blur\
    \ towards\n        the back (with angle provided via `angle`). Higher values towards 1.0 will point the motion blur forward.\n\
    \        A value of 0.0 leads to a uniformly (but still angled) motion blur.\n\n            * If a number, exactly that\
    \ value will be used.\n            * If a tuple ``(a, b)``, a random value from the range ``a <= x <= b`` will\n     \
    \         be sampled per image.\n            * If a list, then a random value will be sampled from that list per image.\n\
    \            * If a StochasticParameter, a value will be sampled from the\n              parameter per image.\n\n    order\
    \ : int or iterable of int or imgaug.ALL or imgaug.parameters.StochasticParameter, optional\n        Interpolation order\
    \ to use when rotating the kernel according to `angle`.\n        See :func:`imgaug.augmenters.geometric.Affine.__init__`.\n\
    \        Recommended to be ``0`` or ``1``, with ``0`` being faster, but less continuous/smooth as `angle` is changed,\n\
    \        particularly around multiple of 45 degrees.\n\n    name : None or str, optional\n        See :func:`imgaug.augmenters.meta.Augmenter.__init__`.\n\
    \n    deterministic : bool, optional\n        See :func:`imgaug.augmenters.meta.Augmenter.__init__`.\n\n    random_state\
    \ : None or int or numpy.random.RandomState, optional\n        See :func:`imgaug.augmenters.meta.Augmenter.__init__`.\n\
    \n    Examples\n    --------\n    >>> aug = iaa.MotionBlur(k=15)\n\n    Create a motion blur augmenter with kernel size\
    \ of 15x15.\n\n    >>> aug = iaa.MotionBlur(k=15, angle=[-45, 45])\n\n    Create a motion blur augmenter with kernel size\
    \ of 15x15 and a blur angle of either -45 or 45 degrees (randomly\n    picked per image).\n\n    \"\"\"\n    # TODO allow\
    \ (1, None) and set to identity matrix if k == 1\n    k_param = iap.handle_discrete_param(k, \"k\", value_range=(3, None),\
    \ tuple_to_uniform=True, list_to_choice=True,\n                                        allow_floats=False)\n    angle_param\
    \ = iap.handle_continuous_param(angle, \"angle\", value_range=None, tuple_to_uniform=True,\n                         \
    \                     list_to_choice=True)\n    direction_param = iap.handle_continuous_param(direction, \"direction\"\
    , value_range=(-1.0-1e-6, 1.0+1e-6),\n                                                  tuple_to_uniform=True, list_to_choice=True)\n\
    \n    def create_matrices(image, nb_channels, random_state_func):\n        # avoid cyclic import between blur and geometric\n\
    \        from . import geometric as iaa_geometric\n\n        # force discrete for k_sample via int() in case of stochastic\
    \ parameter\n        k_sample = int(k_param.draw_sample(random_state=random_state_func))\n        angle_sample = angle_param.draw_sample(random_state=random_state_func)\n\
    \        direction_sample = direction_param.draw_sample(random_state=random_state_func)\n\n        k_sample = k_sample\
    \ if k_sample % 2 != 0 else k_sample + 1\n        direction_sample = np.clip(direction_sample, -1.0, 1.0)\n        direction_sample\
    \ = (direction_sample + 1.0) / 2.0\n\n        matrix = np.zeros((k_sample, k_sample), dtype=np.float32)\n        matrix[:,\
    \ k_sample//2] = np.linspace(float(direction_sample), 1.0 - float(direction_sample), num=k_sample)\n        rot = iaa_geometric.Affine(rotate=angle_sample,\
    \ order=order)\n        matrix = (rot.augment_image((matrix * 255).astype(np.uint8)) / 255.0).astype(np.float32)\n\n \
    \       return [matrix/np.sum(matrix)] * nb_channels\n\n    if name is None:\n        name = \"Unnamed%s\" % (ia.caller_name(),)\n\
    \n    return iaa_convolutional.Convolve(create_matrices, name=name, deterministic=deterministic,\n                   \
    \                   random_state=random_state)"
  - "def rolling_sharpe(returns, rolling_sharpe_window):\n    \"\"\"\n    Determines the rolling Sharpe ratio of a strategy.\n\
    \n    Parameters\n    ----------\n    returns : pd.Series\n        Daily returns of the strategy, noncumulative.\n   \
    \      - See full explanation in tears.create_full_tear_sheet.\n    rolling_sharpe_window : int\n        Length of rolling\
    \ window, in days, over which to compute.\n\n    Returns\n    -------\n    pd.Series\n        Rolling Sharpe ratio.\n\n\
    \    Note\n    -----\n    See https://en.wikipedia.org/wiki/Sharpe_ratio for more details.\n    \"\"\"\n\n    return returns.rolling(rolling_sharpe_window).mean()\
    \ \\\n        / returns.rolling(rolling_sharpe_window).std() \\\n        * np.sqrt(APPROX_BDAYS_PER_YEAR)"
  - "def mpi_weighted_mean(comm, local_name2valcount):\n    \"\"\"\n    Perform a weighted average over dicts that are each\
    \ on a different node\n    Input: local_name2valcount: dict mapping key -> (value, count)\n    Returns: key -> mean\n\
    \    \"\"\"\n    all_name2valcount = comm.gather(local_name2valcount)\n    if comm.rank == 0:\n        name2sum = defaultdict(float)\n\
    \        name2count = defaultdict(float)\n        for n2vc in all_name2valcount:\n            for (name, (val, count))\
    \ in n2vc.items():\n                try:\n                    val = float(val)\n                except ValueError:\n \
    \                   if comm.rank == 0:\n                        warnings.warn('WARNING: tried to compute mean on non-float\
    \ {}={}'.format(name, val))\n                else:\n                    name2sum[name] += val * count\n              \
    \      name2count[name] += count\n        return {name : name2sum[name] / name2count[name] for name in name2sum}\n   \
    \ else:\n        return {}"
- source_sentence: "Generate and return the following encoder related substitution variables:\n\n  encoderSpecsStr:\n    For\
    \ the base description file, this string defines the default\n    encoding dicts for each encoder. For example:\n    \
    \     '__gym_encoder' : {   'fieldname': 'gym',\n          'n': 13,\n          'name': 'gym',\n          'type': 'SDRCategoryEncoder',\n\
    \          'w': 7},\n        '__address_encoder' : {   'fieldname': 'address',\n          'n': 13,\n          'name':\
    \ 'address',\n          'type': 'SDRCategoryEncoder',\n          'w': 7}\n\n  encoderSchemaStr:\n    For the base description\
    \ file, this is a list containing a\n    DeferredDictLookup entry for each encoder. For example:\n        [DeferredDictLookup('__gym_encoder'),\n\
    \         DeferredDictLookup('__address_encoder'),\n         DeferredDictLookup('__timestamp_timeOfDay_encoder'),\n  \
    \       DeferredDictLookup('__timestamp_dayOfWeek_encoder'),\n         DeferredDictLookup('__consumption_encoder')],\n\
    \n  permEncoderChoicesStr:\n    For the permutations file, this defines the possible\n    encoder dicts for each encoder.\
    \ For example:\n        '__timestamp_dayOfWeek_encoder': [\n                     None,\n                     {'fieldname':'timestamp',\n\
    \                      'name': 'timestamp_timeOfDay',\n                      'type':'DateEncoder'\n                  \
    \    'dayOfWeek': (7,1)\n                      },\n                     {'fieldname':'timestamp',\n                  \
    \    'name': 'timestamp_timeOfDay',\n                      'type':'DateEncoder'\n                      'dayOfWeek': (7,3)\n\
    \                      },\n                  ],\n\n        '__field_consumption_encoder': [\n                    None,\n\
    \                    {'fieldname':'consumption',\n                     'name': 'consumption',\n                     'type':'AdaptiveScalarEncoder',\n\
    \                     'n': 13,\n                     'w': 7,\n                      }\n                   ]\n\n\n\n  Parameters:\n\
    \  --------------------------------------------------\n  includedFields:  item from the 'includedFields' section of the\n\
    \                    description JSON object. This is a list of dicts, each\n                    dict defining the field\
    \ name, type, and optional min\n                    and max values.\n\n  retval:  (encoderSpecsStr, encoderSchemaStr permEncoderChoicesStr)"
