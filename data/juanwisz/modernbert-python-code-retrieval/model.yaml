      \ boxes from the\n            left.\n\n        Returns\n        -------\n        imgaug.augmentables.lines.LineStringsOnImage\n\
      \            Shifted line strings.\n\n        \"\"\"\n        lss_new = [ls.shift(top=top, right=right, bottom=bottom,\
      \ left=left)\n                   for ls in self.line_strings]\n        return LineStringsOnImage(lss_new, shape=self.shape)"
    - "def cross_entropy_reward_loss(logits, actions, rewards, name=None):\n    \"\"\"Calculate the loss for Policy Gradient\
      \ Network.\n\n    Parameters\n    ----------\n    logits : tensor\n        The network outputs without softmax. This\
      \ function implements softmax inside.\n    actions : tensor or placeholder\n        The agent actions.\n    rewards\
      \ : tensor or placeholder\n        The rewards.\n\n    Returns\n    --------\n    Tensor\n        The TensorFlow loss\
      \ function.\n\n    Examples\n    ----------\n    >>> states_batch_pl = tf.placeholder(tf.float32, shape=[None, D])\n\
      \    >>> network = InputLayer(states_batch_pl, name='input')\n    >>> network = DenseLayer(network, n_units=H, act=tf.nn.relu,\
      \ name='relu1')\n    >>> network = DenseLayer(network, n_units=3, name='out')\n    >>> probs = network.outputs\n   \
      \ >>> sampling_prob = tf.nn.softmax(probs)\n    >>> actions_batch_pl = tf.placeholder(tf.int32, shape=[None])\n    >>>\
      \ discount_rewards_batch_pl = tf.placeholder(tf.float32, shape=[None])\n    >>> loss = tl.rein.cross_entropy_reward_loss(probs,\
      \ actions_batch_pl, discount_rewards_batch_pl)\n    >>> train_op = tf.train.RMSPropOptimizer(learning_rate, decay_rate).minimize(loss)\n\
      \n    \"\"\"\n    cross_entropy = tf.nn.sparse_softmax_cross_entropy_with_logits(labels=actions, logits=logits, name=name)\n\
      \n    return tf.reduce_sum(tf.multiply(cross_entropy, rewards))"
  - source_sentence: "Translate an index into coordinates, using the given coordinate system.\n\n  Similar to ``numpy.unravel_index``.\n\
      \n  :param index: (int) The index of the point. The coordinates are expressed as a \n         single index by using\
      \ the dimensions as a mixed radix definition. For \n         example, in dimensions 42x10, the point [1, 4] is index\
      \ \n         1*420 + 4*10 = 460.\n\n  :param dimensions (list of ints) The coordinate system.\n\n  :returns: (list)\
      \ of coordinates of length ``len(dimensions)``."
    sentences:
    - "def coordinatesFromIndex(index, dimensions):\n  \"\"\"\n  Translate an index into coordinates, using the given coordinate\
      \ system.\n\n  Similar to ``numpy.unravel_index``.\n\n  :param index: (int) The index of the point. The coordinates\
      \ are expressed as a \n         single index by using the dimensions as a mixed radix definition. For \n         example,\
      \ in dimensions 42x10, the point [1, 4] is index \n         1*420 + 4*10 = 460.\n\n  :param dimensions (list of ints)\
      \ The coordinate system.\n\n  :returns: (list) of coordinates of length ``len(dimensions)``.\n  \"\"\"\n  coordinates\
      \ = [0] * len(dimensions)\n\n  shifted = index\n  for i in xrange(len(dimensions) - 1, 0, -1):\n    coordinates[i] =\
      \ shifted % dimensions[i]\n    shifted = shifted / dimensions[i]\n\n  coordinates[0] = shifted\n\n  return coordinates"
    - "def step(self, observation, **extra_feed):\n        \"\"\"\n        Compute next action(s) given the observation(s)\n\
      \n        Parameters:\n        ----------\n\n        observation     observation data (either single or a batch)\n\n\
      \        **extra_feed    additional data such as state or mask (names of the arguments should match the ones in constructor,\
      \ see __init__)\n\n        Returns:\n        -------\n        (action, value estimate, next state, negative log likelihood\
      \ of the action under current policy parameters) tuple\n        \"\"\"\n\n        a, v, state, neglogp = self._evaluate([self.action,\
      \ self.vf, self.state, self.neglogp], observation, **extra_feed)\n        if state.size == 0:\n            state = None\n\
      \        return a, v, state, neglogp"
    - "def pretty_eta(seconds_left):\n    \"\"\"Print the number of seconds in human readable format.\n\n    Examples:\n \
      \   2 days\n    2 hours and 37 minutes\n    less than a minute\n\n    Paramters\n    ---------\n    seconds_left: int\n\
      \        Number of seconds to be converted to the ETA\n    Returns\n    -------\n    eta: str\n        String representing\
      \ the pretty ETA.\n    \"\"\"\n    minutes_left = seconds_left // 60\n    seconds_left %= 60\n    hours_left = minutes_left\
      \ // 60\n    minutes_left %= 60\n    days_left = hours_left // 24\n    hours_left %= 24\n\n    def helper(cnt, name):\n\
      \        return \"{} {}{}\".format(str(cnt), name, ('s' if cnt > 1 else ''))\n\n    if days_left > 0:\n        msg =\
      \ helper(days_left, 'day')\n        if hours_left > 0:\n            msg += ' and ' + helper(hours_left, 'hour')\n  \
      \      return msg\n    if hours_left > 0:\n        msg = helper(hours_left, 'hour')\n        if minutes_left > 0:\n\
      \            msg += ' and ' + helper(minutes_left, 'minute')\n        return msg\n    if minutes_left > 0:\n       \
      \ return helper(minutes_left, 'minute')\n    return 'less than a minute'"
  - source_sentence: Validates control dictionary for the experiment context
    sentences:
    - "def load_file_list(path=None, regx='\\.jpg', printable=True, keep_prefix=False):\n    r\"\"\"Return a file list in\
      \ a folder by given a path and regular expression.\n\n    Parameters\n    ----------\n    path : str or None\n     \
      \   A folder path, if `None`, use the current directory.\n    regx : str\n        The regx of file name.\n    printable\
      \ : boolean\n        Whether to print the files infomation.\n    keep_prefix : boolean\n        Whether to keep path\
      \ in the file name.\n\n    Examples\n    ----------\n    >>> file_list = tl.files.load_file_list(path=None, regx='w1pre_[0-9]+\\\
      .(npz)')\n\n    \"\"\"\n    if path is None:\n        path = os.getcwd()\n    file_list = os.listdir(path)\n    return_list\
      \ = []\n    for _, f in enumerate(file_list):\n        if re.search(regx, f):\n            return_list.append(f)\n \
      \   # return_list.sort()\n    if keep_prefix:\n        for i, f in enumerate(return_list):\n            return_list[i]\
      \ = os.path.join(path, f)\n\n    if printable:\n        logging.info('Match file list = %s' % return_list)\n       \
      \ logging.info('Number of files = %d' % len(return_list))\n    return return_list"
    - "def getCompletingSwarms(self):\n    \"\"\"Return the list of all completing swarms.\n\n    Parameters:\n    ---------------------------------------------------------------------\n\
      \    retval:   list of active swarm Ids\n    \"\"\"\n    swarmIds = []\n    for swarmId, info in self._state['swarms'].iteritems():\n\
      \      if info['status'] == 'completing':\n        swarmIds.append(swarmId)\n\n    return swarmIds"
    - "def __validateExperimentControl(self, control):\n    \"\"\" Validates control dictionary for the experiment context\"\
      \"\"\n    # Validate task list\n    taskList = control.get('tasks', None)\n    if taskList is not None:\n      taskLabelsList\
      \ = []\n\n      for task in taskList:\n        validateOpfJsonValue(task, \"opfTaskSchema.json\")\n        validateOpfJsonValue(task['taskControl'],\
      \ \"opfTaskControlSchema.json\")\n\n        taskLabel = task['taskLabel']\n\n        assert isinstance(taskLabel, types.StringTypes),\
      \ \\\n               \"taskLabel type: %r\" % type(taskLabel)\n        assert len(taskLabel) > 0, \"empty string taskLabel\
      \ not is allowed\"\n\n        taskLabelsList.append(taskLabel.lower())\n\n      taskLabelDuplicates = filter(lambda\
      \ x: taskLabelsList.count(x) > 1,\n                                   taskLabelsList)\n      assert len(taskLabelDuplicates)\
      \ == 0, \\\n             \"Duplcate task labels are not allowed: %s\" % taskLabelDuplicates\n\n    return"
