widgetData:
- source_sentence: chim ưng finist là gì
  sentences:
  - 'Nam tinh hoa chuông ::: Arisaema franchetianum, tên gọi phổ thông nam tinh hoa chuông, là một loài thực vật có hoa trong
    họ Ráy (Araceae). Loài này được Engl. mô tả khoa học đầu tiên năm 1881.'
  - 'Focke-Wulf Fw 58 ::: Focke-Wulf Fw 58 Weihe ("chim ưng") là một loại máy bay của Đức, trang bị cho Luftwaffe làm máy
    bay huấn luyện.'
  - 'Chiếc lông Chim Ưng Finist ::: Chiếc lông Chim Ưng Finist (tiếng Nga: Финнст - Ясный сокол, Finist - Chim Ưng thông thái)
    là một câu chuyện cổ tích do nhà nghiên cứu văn hóa dân gian Aleksandr Afanasyev thu thập và in trong tập sách Những câu
    chuyện cổ tích Nga.'
- source_sentence: biến cố đảo song tử tây là gì
  sentences:
  - 'Biến cố đảo Song Tử Tây ::: Biến cố đảo Song Tử Tây là chuỗi sự kiện thay cờ đổi chủ trên đảo Song Tử Tây thuộc quần
    đảo Trường Sa giữa Hải quân Việt Nam Cộng hòa, Hải quân Philippines và Hải quân Việt Nam Dân chủ Cộng hòa.'
  - 'Đảo chính Zimbabwe 2017 ::: Lỗi Lua trong Mô_đun:Location_map tại dòng 481: Giá trị tọa độ dạng sai.'
  - 'Vira, Pyrénées-Orientales ::: Vira là một xã thuộc tỉnh Pyrénées-Orientales trong vùng Occitanie phía nam Pháp. Xã này
    nằm ở khu vực có độ cao trung bình 668 mét trên mực nước biển.'
- source_sentence: iobenguane là gì
  sentences:
  - 'Eguenigue ::: Eguenigue là một làng và xã tại tỉnh Territoire de Belfort, vùng Bourgogne-Franche-Comté.'
  - 'Iobenguane ::: Iobenguane, hay MIBG, là một chất tương tự aralkylguanidine của chất dẫn truyền thần kinh adrenergic norepinephrine
    và một dược phẩm phóng xạ. Nó hoạt động như một tác nhân ngăn chặn các tế bào thần kinh adrenergic. Khi được dán nhãn
    phóng xạ, nó có thể được sử dụng trong các kỹ thuật chẩn đoán y học hạt nhân cũng như trong các phương pháp điều trị chống
    ung thư thần kinh. Nó định vị vào mô adrenergic và do đó có thể được sử dụng để xác định vị trí của các khối u như pheochromocytomas
    và neuroblastomas. Với I-131, nó cũng có thể được sử dụng để loại bỏ các tế bào khối u chiếm và chuyển hóa norepinephrine.'
  - 'Don Cheadle ::: Donald Frank Cheadle Jr. (/ˈtʃiːdəl/; sinh ngày 29 tháng 11 năm 1964) là một diễn viên, biên kịch, đạo
    diễn và nhà sản xuất phim người Mỹ.'
- source_sentence: chu kì quỹ đạo của 23128 dorminy
  sentences:
  - '23128 Dorminy ::: 23128 Dorminy là một tiểu hành tinh vành đai chính với chu kỳ quỹ đạo là 1265.7380462 ngày (3.47 năm).'
  - 'Theo luật thời chiến ::: Theo luật thời chiến (tiếng Nga: По законам военного времени, Po zakonam voennogo vremeni) là
    một bộ phim truyền hình nhiều tập thuộc thể loại hình sự, hành động trong bối cảnh cuộc Chiến tranh Vệ quốc vĩ đại, do
    hãng phim truyền hình StarMedia (Nga) sản xuất.'
  - '23734 Kimgyehyun ::: 23734 Kimgyehyun là một tiểu hành tinh vành đai chính với chu kỳ quỹ đạo là 1203.4259933 ngày (3.29
    năm).'
- source_sentence: nabartha là loài gì
  sentences:
  - 'Nabartha ::: Simplicia là một chi bướm đêm thuộc họ Noctuidae, bản địa của Nam và Đông Nam Á.'
  - 'Vịt ép hạnh nhân ::: Vịt ép hạnh nhân hay còn được gọi là vịt ép Quan Thoại (tiếng Trung: 窩燒鴨; bính âm: wōshāoyā; Việt
    bính: wo1 siu1 ngaap3), là một món ăn Quảng Đông phổ biến trong các nhà hàng Trung Quốc và Polynesia ở Hoa Kỳ vào giữa
    thế kỷ 20. Món ăn được chiên ngập trong dầu và phục vụ ở dạng miếng vừa phải hoặc nguyên con. Nó thường được phục vụ với
    nước sốt được tưới lên trên, có màu nâu và vị chua ngọt. Hạnh nhân nghiền hoặc hạnh nhân bột thường được rắc lên món ăn
    ngay trước khi phục vụ, và đó cũng chính là nguồn góc tên gọi của món ăn này. Việc chuẩn bị nguyên liệu có thể là một
    quá trình dài bao gồm một số bước trong khoảng thời gian vài ngày, khiến món ăn có vẻ ngoài tương đối đơn giản này lại
    trở thành một quá trình tốn nhiều công sức. Điều này giải thích cho sự biến mất ảo của nó khỏi các nhà hàng Trung Quốc
    ngày nay: ngày nay chỉ một số ít nhà hàng có món này trong thực đơn thông thường của họ.'
  - 'Nalanda ::: Nālandā (Bản mẫu:IAST3; /naːlən̪d̪aː/, phiên âm Hán-Việt: Na Lan Đà) là một trung tâm học tập bậc cao thời
    cổ đại, một tu viện Phật giáo lớn nằm ở vương quốc cổ Magadha, ngày nay thuộc tiểu bang Bihar, Ấn Độ. Địa điểm này nằm
    cách Patna chừng 95 kilômét (59 dặm) về phía đông nam, gần thành phố Bihar Sharif và là một trung tâm học thuật quan trọng
    từ thế kỷ thứ 5 đến phát triển rực rỡ trong giai đoạn từ thời vua Śakrāditya (danh tánh của người này chưa được chắc chắn,
    có thể là triều vua Kumara Gupta I hoặc Kumara Gupta II) đến năm 1197. Ngày nay, Nalanda là một Di sản thế giới được UNESCO
    công nhận từ năm 2016.'
