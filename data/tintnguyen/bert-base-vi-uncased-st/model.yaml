widgetData:
- source_sentence: thành phố bất động sản đắt nhất
  sentences:
  - 'Đồng hồ: 18.066 đô la. Paris, kinh đô thời trang của thế giới và thủ đô thực tế của đất nước Pháp hiện được công nhận
    là một trong những thành phố đắt đỏ nhất để mua bất động sản, khi thị trường bất động sản tiếp tục phát triển mạnh với
    nền kinh tế Pháp ổn định.'
  - Hầu hết các cô gái và chàng trai đeo chiếc nhẫn thuần khiết của họ trên ngón áp út của họ. Một số cô gái thích đeo nó
    trên ngón áp út của bàn tay trái, và thay thế nó bằng chiếc nhẫn cưới của họ. Nhẫn tinh khiết không dành riêng cho ngón
    tay đeo nhẫn; bạn có thể mặc nó bất cứ nơi nào thoải mái nhất cho bạn. Một số thậm chí đeo nhẫn của họ trên một chuỗi
    như một chiếc vòng cổ. Một.
  - 'Michaela Kennedy Cuomo, con gái út của Andrew Cuomo, phải nhập viện một thời gian ngắn sau khi bất tỉnh: báo cáo. Theo
    các báo cáo, Michaela Kennedy Cuomo (bên phải, trong ảnh với cha Thống đốc Cuomo), 17 tuổi, đã phải nhập viện một thời
    gian ngắn sau khi được tìm thấy trong tình trạng bất tỉnh trong ngôi nhà ở Westchester mà cô ở cùng mẹ, Kerry Kennedy,
    theo báo cáo. (Hình ảnh Spencer Platt / Getty)'
- source_sentence: núi đọ ở tỉnh nào
  sentences:
  - Việc phát hiện một số di tích mà tiêu biểu là Núi Đọ vào cuối năm 1960, đã xuất lộ những công cụ đá thô sơ đầu tiên của
    con người. Các nhà Khảo cổ học Việt Nam cùng với Giáo sư Boriskovski đã nghiên cứu và chứng minh rằng ở Núi Đọ từng tồn
    tại một nền văn hóa sơ kỳ thời đại đá cũ. Di tích Núi Đọ thuộc địa phận hai xã Thiệu Tân và Thiệu Khánh, huyện Đông Sơn,
    Thanh Hóa. Núi Đọ là một quả núi thấp, sườn núi dốc thoai thoải từ 20 độ đến 25 độ, cao 158 m so với mặt nước biển, nằm
    ngay bên bờ hữu ngạn sông Chu; chỗ hợp lưu của hai dòng sông Mã và sông Chu cách Thành phố Thanh Hóa 7 km về phía bắc
    - tây bắc.
  - 'Virus Zika có thể lây truyền qua muỗi hoặc qua đường tình dục. Hầu hết mọi người có thể phục hồi hoàn toàn và các triệu
    chứng virus zika tự hết trong khoảng một tuần. Đa số các trường hợp không có triệu chứng nhiễm virus Zika. Tuy nhiên,
    nếu có thì các biểu hiện virus zika thông thường gồm: Sốt, phát ban, đau khớp, đau đầu, kết mạc mắt đỏ, đau cơ, cảm giác
    đau ở lưng. Bệnh virus Zika đặc biệt nguy hiểm nếu đi từ mẹ sang con. Bà bầu bị nhiễm virus Zika khi mang thai có thể
    khiến thai nhi mắc chứng đầu nhỏ. Khi lớn hơn, bé có thể bị suy giảm thị giác, thính giác, tăng trưởng kém và thậm chí
    co giật.'
  - Ý nghĩa hoa Alstroemeria Astroemeria cứng cáp là một bông hoa tuyệt đẹp kết hợp nhiều màu sắc khác nhau thành một vẻ đẹp
    gắn kết. Loài hoa tươi sáng này tượng trưng cho tình bạn, vẻ đẹp bền lâu của sự cam kết và chăm sóc.
- source_sentence: giáo của người đông sơn có hình gì
  sentences:
  - Chủ nhân của Văn hóa Đông Sơn đã chế tạo nhiều loại vũ khí từ đồng dùng để đánh xa, gồm có lao, đầu mũi tên. Để bắn tên
    tất phải có cung, nỏ bằng gỗ hoặc tre. Việc phát hiện bộ lẫy nỏ có hộp, có rãnh đặt mũi tên, có nấc để giữ dây nỏ, có
    lẫy cong đùng để bóp cò, không còn nguyên vẹn ở làng Vạc, cho thấy việc dùng cung nỏ của người Đông Sơn rất lợi hại khi
    săn bắn, chiến tranh là điều có thể tin được. Giáo hình búp da, hình lá mía. Lao cũng giống như giáo nhưng kích cỡ nhỏ
    hơn. Vũ khí đánh gần có dao găm. Dao găm có nhiều kiểu phân biệt dựa vào phần cán và đốc chắn. Nhiều chiếc dao găm được
    đúc rất công phu. Chuôi dao đúc hình tượng người nam hoặc nữ, y phục hoa văn trang sức đẹp đẽ, sống động. Phần cán dao
    găm có những chiếc được chạm trổ rất độc đáo với hình tượng động vật như rắn ngậm chân hổ, hổ ngậm chân voi, hay rắn ngậm
    chân voi...
  - 'Xét nghiệm máu FSH kiểm tra mức độ hormone kích thích nang trứng trong máu. Mức độ FHS có thể xác định xem các cơ quan
    sinh dục ở cả nam và nữ có hoạt động bình thường hay không. Mức độ FHS cũng có thể được kiểm tra để phát hiện các vấn
    đề với tuyến yên. Số lượng: * Chỉ số nguyên. Hormone kích thích nang trứng, hoặc FSH, được sản xuất bởi tuyến yên để kích
    thích sản xuất và phát triển trứng ở nữ và tinh trùng ở nam. FSH cũng kích thích sản xuất các hormone khác, bao gồm testosterone
    và estrogen.'
  - White Lightning là một tàu lượn siêu tốc bằng gỗ tại Fun Spot America ở Orlando, Florida. Chuyến xe được thiết kế riêng
    do Great Coasters International sản xuất. Chuyến đi là tàu lượn bằng gỗ đầu tiên của Orlando.
- source_sentence: bước đầu tiên trong quá trình tổng hợp protein là gì
  sentences:
  - 'Sáu bước đơn giản để trồng hoa nhài: 1 Hoa nhài phát triển mạnh trong môi trường ban ngày nóng ẩm. 2 Chọn nơi trồng hoa
    nhài của bạn. 3 Chuẩn bị đất để trồng bằng cách làm việc với một lượng lớn vật liệu hữu cơ, chẳng hạn như rêu than bùn
    hoặc phân trộn. Bón phân đa dụng mỗi tháng một lần từ tháng 3 đến tháng 11.'
  - 'PHẦN A. Đọc phần sau và ghi chú vào giấy của bạn: Tổng hợp protein là quá trình cơ thể sử dụng để tạo ra protein. Bước
    đầu tiên của quá trình tổng hợp protein được gọi là Phiên mã. Nó xảy ra trong nhân. Trong quá trình phiên mã, mRNA phiên
    mã (bản sao) DNA. DNA là ÃƒÂ ¢ Ã‚â‚¬Ã‚Å “được giải nénÃƒÂ ¢ Ã‚â‚¬Ã‚ và sợi mRNA sao chép một sợi DNA. Một khi nó làm được
    điều này, mRNA sẽ rời khỏi nhân và đi vào tế bào chất. mRNA sau đó sẽ tự gắn vào ribosome.'
  - LIÊN KẾT / TRANG WEB THÊM VÀO DANH SÁCH CÔNG VIỆC. danh từ. Skinny jeans là loại quần denim bó sát với da thường được
    làm bằng vải co giãn. Một ví dụ về quần jean bó là những chiếc quần jean bó sát từ eo đến mắt cá chân.
- source_sentence: phương pháp lóc ối bác sĩ sẽ làm gì
  sentences:
  - Gương mặt thân quen mùa 1 được phát sóng trên kênh VTV3 từ ngày 5 tháng 1 năm 2013 đến 23 tháng 3 năm 2013 với các thí
    sinh gồm Khởi My, Đại Nghĩa, Thúy Uyên, Kyo York, Phương Thanh và Chí Thiện. Bộ ba giám khảo chính là nhạc sĩ Đức Huy,
    ca sĩ Mỹ Linh và NSƯT Hoài Linh. Người dẫn chương trình mùa này là nghệ sĩ Thanh Bạch. Sau 10 tuần thi, kết quả chung
    cuộc giải nhất thuộc về thí sinh Khởi My.
  - 'Khi thai phụ đã quá ngày dự sinh, các phương pháp sau đây có thể được bác sĩ cân nhắc lựa chọn để gây khởi phát chuyển
    dạ:

    Lóc ối: Với biện pháp này, bác sĩ sẽ đeo găng và dùng ngón tay để tách màng ối ra khỏi thành tử cung.

    Phá vỡ túi nước ối: Bác sĩ sẽ tạo một lỗ nhỏ trên túi nước ối để làm vỡ ối, qua đó kích thích sự chuyển dạ.

    Oxytocin: Là một loại thuốc giúp tạo ra các cơn co thắt chuyển dạ, được tiêm theo đường tĩnh mạch vào cánh tay của thai
    phụ. Liều lượng có thể được tăng dần theo thời gian nhưng phải theo dõi cẩn thận.

    Các chất tương tự Prostaglandin: Đây là những loại thuốc được đặt trong âm đạo để làm chín muồi cổ tử cung.

    Làm giãn nở cổ tử cung: Bác sĩ có thể đặt ống thông có gắn một quả bong bóng rất nhỏ vào cuối cổ tử cung của thai phụ.
    Sau đó, nước sẽ được bơm vào quả bóng. Khi bóng đã được bơm căng, nó sẽ gây ra tác động áp lực, giúp cổ tử cung mở ra
    và quá trình chuyển dạ sẽ bắt đầu.'
  - 'Nghĩa quân Tây Sơn ở vào thế bất lợi: phía bắc có quân Trịnh, phía nam còn quân Nguyễn. Nguyễn Nhạc phải tạm hoà hoãn
    với quân Trịnh để dồn sức đánh Nguyễn. Từ năm 1776 đến năm 1783, nghĩa quân Tây Sơn đã bốn lần đánh vào Gia Định.Trong
    lần tiến quân năm 1777, Tây Sơn bắt giết được chúa Nguyễn, chỉ còn Nguyễn Ánh chạy thoát. Chính quyền họ Nguyễn ở Đàng
    Trong đến đây bị lật đổ.'
