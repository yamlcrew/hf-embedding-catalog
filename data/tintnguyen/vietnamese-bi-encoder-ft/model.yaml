widgetData:
- source_sentence: tính bền vững trong chuỗi cung ứng là gì
  sentences:
  - 'Tính bền vững của chuỗi cung ứng ::: Tính bền vững của chuỗi cung ứng là một vấn đề kinh doanh ảnh hưởng đến chuỗi cung
    ứng hoặc mạng lưới hậu cần của tổ chức về mặt môi trường, rủi ro và chi phí lãng phí.  Nhu cầu tích hợp các lựa chọn hợp
    lý về môi trường vào quản lý chuỗi cung ứng ngày càng tăng.  Tính bền vững trong chuỗi cung ứng ngày càng được các nhà
    quản trị cấp cao coi là cần thiết để mang lại lợi nhuận và đã thay thế chi phí tiền tệ, giá trị và tốc độ là chủ đề thảo
    luận giữa các chuyên gia mua và cung ứng.  Một chuỗi cung ứng bền vững nắm bắt các cơ hội tạo ra giá trị và mang lại lợi
    thế cạnh tranh đáng kể cho những người chấp nhận sớm và đổi mới quy trình.'
  - 'Ung thư biểu mô tuyến bã ::: Ung thư biểu mô tuyến bã, còn được gọi là bã nhờn tuyến ung thư biểu mô (SGC), ung thư biểu
    mô tế bào bã nhờn, và ung thư biểu mô tuyến mebomian là một khối u ác tính ở da phổ biến.  Hầu hết thường là các u khoảng
    10 mm kích thước tại chỗ.  Khối u này được cho là phát sinh từ các tuyến bã nhờn trên da và do đó, có thể bắt nguồn từ
    bất cứ nơi nào trong cơ thể nơi các tuyến này được tìm thấy.  Ung thư biểu mô tuyến bã có thể được chia thành hai loại:
    mắt và ngoại bào.  Bởi vì khu vực quanh mắt rất phong phú về loại tuyến này, khu vực này là một trang web phổ biến về
    nguồn gốc.  Nguyên nhân của những tổn thương này là, trong phần lớn các trường hợp, không rõ.  Các trường hợp thỉnh thoảng
    có thể liên quan đến hội chứng Muir-Torre.  Do sự hiếm gặp của khối u này và sự thay đổi trong biểu hiện lâm sàng và mô
    học, SGc thường bị chẩn đoán nhầm là tình trạng viêm hoặc một loại khối u phổ biến hơn.'
  - 'Dấu thời gian ::: Dấu thời gian là một chuỗi các ký tự hoặc thông tin được mã hóa xác định khi một sự kiện nào đó xảy
    ra, thường đưa ra ngày và giờ trong ngày, đôi khi chính xác đến một phần nhỏ của một giây.  Thuật ngữ này bắt nguồn từ
    tem cao su được sử dụng trong các văn phòng để đóng dấu ngày hiện tại và đôi khi, bằng mực trên tài liệu giấy, để ghi
    lại khi nhận được tài liệu.  Các ví dụ phổ biến của loại dấu thời gian này là dấu bưu điện trên một chữ cái hoặc thời
    gian "vào" và "ra" trên thẻ thời gian.'
- source_sentence: lãnh thổ mebel nằm ở đâu
  sentences:
  - 'Alexander và một ngày tồi tệ, kinh khủng, chán nản, bực bội ::: Alexander và một ngày tồi tệ, kinh khủng, chán nản, bực
    bội (tựa gốc tiếng Anh: Alexander and the Terrible, Horrible, No Good, Very Bad Day) là phim điện ảnh thiếu nhi hài hước
    của Mỹ năm 2014 do Miguel Arteta đạo diễn từ kịch bản chắp bút bởi Rob Lieber. Phim có sự tham gia của Steve Carell, Jennifer
    Garner và Ed Oxenbould, chủ yếu dựa trên cuốn sách thiếu nhi cùng tên năm 1972 của Judith Viorst. Phim khởi chiếu ở Việt
    Nam vào ngày 20 tháng 11 năm 2014.'
  - 'Vườn quốc gia Nanda Devi ::: Vườn quốc gia Nanda Devi hay Khu dự trữ sinh quyển Nanda Devi là một vườn quốc gia được
    thành lập vào năm 1982 bao gồm khu vực tự nhiên xung quanh đỉnh Nanda Devi (7.816 mét) ở bang Uttarakhand, miền bắc Ấn
    Độ. Toàn bộ vườn quốc gia nằm ở độ cao trên 3.500 m (11.500 ft) so với mực nước biển trung bình. Vườn quốc gia được UNESCO
    công nhận là Di sản thế giới từ năm 1988 trước khi được mở rộng thêm Vườn quốc gia Thung lũng các loài hoa vào năm 2005
    đổi thành Nanda Devi và Vườn quốc gia Thung lũng các loài hoa.'
  - 'Vùng Klaipėda ::: Vùng Klaipėda (tiếng Litva: Klaipėdos kraštas) hoặc Lãnh thổ Memel (tiếng Đức: Memelland hay Memelgebiet)
    được định nghĩa bởi Hiệp ước Versailles năm 1919 năm 1920 và được gọi là phần phía bắc của tỉnh East Prussia của Đức,
    dưới sự điều hành của Entente ''s Hội đồng Đại sứ. Lãnh thổ Memel, cùng với các khu vực khác bị cắt đứt từ Đức (Saar và
    Danzig) sẽ nằm dưới sự kiểm soát của Liên minh các quốc gia cho đến một ngày trong tương lai khi người dân của các khu
    vực này sẽ được phép bỏ phiếu về việc liệu đất có trở lại Đức hay không. Ngày nay, Lãnh thổ Memel cũ được kiểm soát bởi
    Litva, quốc gia đã tổ chức nó thành các quận Klaipeda, Taurage, Marijampole và Alytus.'
- source_sentence: mục đích của chiến lược gleichschaltung là gì
  sentences:
  - 'Đường sắt cao tốc Thượng Hải – Hàng Châu ::: Tuyến đường sắt cao tốc Thượng Hải Hàng Châu (tiếng Trung: 沪杭 客运 hoặc 沪杭
    高速 铁路), còn được gọi là đường sắt cao tốc Huhang hoặc đường sắt chở khách Huhang là tuyến đường sắt cao tốc ở Trung Quốc
    giữa Thượng Hải và Hàng Châu, Chiết Giang. Tuyến có chiều dài 202 km (126 mi) và được thiết kế cho dịch vụ tàu thương
    mại với tốc độ 350 km/h (217 dặm / giờ). Nó được xây dựng trong 20 tháng và mở cửa vào ngày 26 tháng 10 năm 2010. Đường
    dây rút ngắn thời gian di chuyển giữa hai thành phố từ 78 xuống còn 45 phút.  Tuyến này cũng được sử dụng bởi các chuyến
    tàu rời ga Thượng Hải đến Côn Minh và Thâm Quyến, trở thành một phần của Đường sắt cao tốc Thượng Hải Côn Minh và Hành
    lang đường sắt cao tốc Bờ biển Đông Nam. Nó đã làm cho đề xuất tuyến tàu đệm từ Thượng Hải Hàng Châu không thể triển khai.'
  - 'Trật tự thế giới mới ::: Thuật ngữ "Trật tự thế giới mới" đã được sử dụng để chỉ bất kỳ giai đoạn lịch sử mới nào chứng
    minh sự thay đổi mạnh mẽ trong tư tưởng chính trị thế giới và cán cân quyền lực. Mặc dù có nhiều cách hiểu khác nhau về
    thuật ngữ này, nó chủ yếu gắn liền với khái niệm ý thức hệ về quản trị toàn cầu chỉ trong ý nghĩa của những nỗ lực tập
    thể mới để xác định, hiểu hoặc giải quyết các vấn đề trên toàn thế giới vượt quá khả năng giải quyết của từng quốc gia.'
  - 'Gleichschaltung ::: Gleichschaltung trong bối cảnh chính trị - văn hóa là một chiến lược đạt được tầm quan trọng trung
    tâm, đặc biệt là trong thời kỳ phát xít. Từ những năm 1930, từ này đề cập đến quá trình thống nhất toàn bộ đời sống chính
    trị xã hội trong giai đoạn tiếp quản quyền lực ở Đức. Mục đích là để 1934 mâu thuẫn hiểu như đa nguyên trong chính phủ
    và xã hội nên được bãi bỏ và một chế độ độc tài để xây dựng chỉ với một trung tâm quyền lực.'
- source_sentence: giáng son sinh ngày mấy
  sentences:
  - 'Proxymetacaine ::: Proxymetacaine (INN) hoặc proparacaine (USAN) là một loại thuốc gây tê tại chỗ của nhóm aminoester.'
  - 'Giáng Son ::: Tạ Thị Giáng Son (sinh ngày 1 tháng 2 năm 1975), thường được biết đến với nghệ danh Giáng Son hay Giáng
    Sol, là một nữ nhạc sĩ người Việt Nam. Cô là một trong số rất ít những nữ nhạc sĩ thành công vào đầu thập niên 2000 của
    Việt Nam và là cựu thủ lĩnh sáng lập nên nhóm nhạc 5 Dòng Kẻ. Cô là Ủy viên Ban chấp hành của Hội Nhạc sĩ Việt Nam, hội
    viên của Hội các nhà soạn nhạc thế giới thế kỷ 21 (Composers 21) và thành viên của nhóm tác giả M6. Hiện cô đang giữ chức
    Phó trưởng khoa Kịch hát dân tộc tại trường Đại học Sân khấu và Điện ảnh Hà Nội.'
  - 'Sông Kiến Giang (Thái Bình) ::: Sông Kiến Giang là con sông đào gồm nhiều đoạn khác nhau ở khu vực nam Thái Bình .'
- source_sentence: tên thật của tỉnh drava banovina là gì
  sentences:
  - 'Drava Banovina ::: Drava Banovina hoặc Drava Banate (tiếng Slovenia: Dravska banovina) là một tỉnh (banovina) của Vương
    quốc Nam Tư từ năm 1929 đến năm 1941. Tỉnh này bao gồm hầu hết ngày nay Slovenia và được đặt tên cho Drava sông. Thành
    phố thủ đô của Drava Banovina là Ljubljana.'
  - 'Đo khoảng cách (vũ trụ) ::: Đo khoảng cách được sử dụng trong vũ trụ học vật lý để đưa ra một khái niệm tự nhiên về khoảng
    cách giữa hai vật thể hoặc sự kiện trong vũ trụ.  Chúng thường được sử dụng để buộc một số lượng có thể quan sát được
    (như độ chói của một quasar ở xa, dịch chuyển đỏ của một thiên hà xa xôi hoặc kích thước góc của các đỉnh âm trong phổ
    công suất CMB) với một đại lượng khác không thể quan sát trực tiếp, nhưng thuận tiện hơn cho việc tính toán (chẳng hạn
    như tọa độ đồng chuyển động của chuẩn tinh, thiên hà, v.v.).  Các biện pháp khoảng cách được thảo luận ở đây đều làm giảm
    khái niệm chung về khoảng cách Euclide ở độ dịch chuyển thấp.'
  - 'Mùa bão Tây Bắc Thái Bình Dương 1986 ::: Mùa bão năm 1986 ở Tây Bắc Thái Bình Dương không có giới hạn chính thức; nó
    chạy quanh năm vào năm 1986, nhưng hầu hết các cơn bão nhiệt đới có xu hướng hình thành ở tây bắc Thái Bình Dương giữa
    tháng Năm và tháng Mười Hai.  Những ngày này thường phân định thời kỳ mỗi năm khi hầu hết các cơn bão nhiệt đới hình thành
    ở tây bắc Thái Bình Dương.  Bão nhiệt đới hình thành trong toàn bộ lưu vực phía tây Thái Bình Dương đã được Trung tâm
    Cảnh báo Bão chung đặt tên.  Áp thấp nhiệt đới xâm nhập hoặc hình thành trong khu vực trách nhiệm của Philippines được
    đặt tên bởi Cơ quan Dịch vụ Khí quyển, Địa vật lý và Thiên văn học Philippines hoặc PAGASA.  Điều này thường có thể dẫn
    đến cùng một cơn bão có hai tên.'
