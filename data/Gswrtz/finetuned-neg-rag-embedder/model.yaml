widgetData:
- source_sentence: In a certain population, there are 6 times as many people aged twenty-one or under as there are people
    over twenty-one. The ratio of those twenty-one or under to the total population is A. 1 to 2. B. 1 to 3. C. 2 to 3. D.
    6 to 7.
  sentences:
  - Population size is the number of individuals in a population.
  - Reactivity is the ability of matter to combine chemically with other substances. For example, iron is highly reactive
    with oxygen. When it combines with oxygen, it forms the reddish powder called rust (see Figure below ). Rust is not iron
    but an entirely different substance that consists of both iron and oxygen.
  - The age-sex structure of a population is the number of individuals of each sex and age in the population. Age-sex structure
    influences population growth. It is represented by a population pyramid. The number of survivors at each age is plotted
    on a survivorship curve.
- source_sentence: Apolipoprotein E is rich in - A. Lysine. B. Arginine. C. Histidine. D. Methionine.
  sentences:
  - '**Apolipoprotein C-III**


    Apolipoprotein C-III:

    Apolipoprotein C-III also known as apo-CIII, and apolipoprotein C3, is a protein that in humans is encoded by the APOC3
    gene. Apo-CIII is secreted by the liver as well as the small intestine, and is found on triglyceride-rich lipoproteins
    such as chylomicrons, very low density lipoprotein (VLDL), and remnant cholesterol.'
  - '**Malaria antigen detection tests**


    Malaria antigen detection tests:

    Malaria antigen detection tests are a group of commercially available rapid diagnostic tests of the rapid antigen test
    type that allow quick diagnosis of malaria by people who are not otherwise skilled in traditional laboratory techniques
    for diagnosing malaria or in situations where such equipment is not available. There are currently over 20 such tests
    commercially available (WHO product testing 2008). The first malaria antigen suitable as target for such a test was a
    soluble glycolytic enzyme Glutamate dehydrogenase.'
  - '**Apolipoprotein E**


    Apolipoprotein E:

    Apolipoprotein E (Apo-E) is a protein involved in the metabolism of fats in the body of mammals. A subtype is implicated
    in the Alzheimer''s disease and cardiovascular diseases. It is encoded in humans by the gene APOE.'
- source_sentence: An ether is an organic compound in which two hydrocarbon groups are bonded to the same atom of what? A.
    sulfur. B. nitrogen. C. hydrogen. D. oxygen.
  sentences:
  - 'The sum of $3$ consecutive integers is $69$. What is the third number in this sequence?


    Hints:

    Call the first number in the sequence $x$ The next integer in the sequence is $x + 1$ The sum of the $3$ consecutive integers
    is: $x+ (x + 1)+ (x + 2) = 69$ $3x + 3= 69$ $3x = 66$ $x = 22$ Since $x$ is the first number, $x + 2$ is the third integer.
    Thus, the third number in the sequence is $24$.'
  - An ether is an organic compound in which two hydrocarbon groups are bonded to the same atom of oxygen. An ether is represented
    by the general formula R−O−R’. The R’ in the formula means that the hydrocarbon group can be the same as R or it can be
    different. The steps for naming ethers are listed below.
  - Ethers are composed of an oxygen atom that forms single bonds with two carbon atoms. Ethers are relatively unreactive
    making them good solvents for other organic compounds, such as in the formation of anesthetics.
- source_sentence: Ha&;s rule is related to A. Mechanism of Internal rotation. B. Mechanism of Crowning. C. Mechanism of Engagement.
    D. Mechanism of Restitution.
  sentences:
  - '**Haber''s rule**


    Haber''s rule:

    In toxicology, Haber''s rule or Haber''s law is a mathematical statement of the relationship between the concentration
    of a poisonous gas and how long the gas must be breathed to produce death, or other toxic effect. The rule was formulated
    by German chemist Fritz Haber in the early 1900s.'
  - '**Hand arm vibrations**


    Hand arm vibrations:

    In occupational safety and health, hand arm vibrations (HAVs) are a specific type of occupational hazard which can lead
    to hand arm vibration syndrome.'
  - 'The base of a triangle is decreasing at a rate of $13$ millimeters per minute and the height of the triangle is increasing
    at a rate of $6$ millimeters per minute. At a certain instant, the base is $5$ millimeters and the height is $1$ millimeter.
    What is the rate of change of the area of the triangle at that instant (in square millimeters per minute)? Choose 1 answer:
    Choose 1 answer: (Choice A) A $-8.5$ (Choice B) B $21.5$ (Choice C) C $8.5$ (Choice D) D $-21.5$


    Hints:

    Setting up the math Let... $b(t)$ denote the base of the triangle at time $t$, $h(t)$ denote the height of the triangle
    at time $t$, and $A(t)$ denote the area of the triangle at time $t$. We are given that $b''(t)=-13$ and $h''(t)=6$ (notice
    that $b''$ is negative). We are also given that that $b(t_0)=5$ and $h(t_0)=1$ for a specific time $t_0$. We want to find
    $A''(t_0)$. Relating the measures The measures relate to each other through the formula for the area of a triangle: $A(t)=\dfrac{b(t)h(t)}{2}$
    We can differentiate both sides to find an expression for $A''(t)$ : $A''(t)=\dfrac{b''(t)h(t)+b(t)h''(t)}{2}$ Using the
    information to solve Let''s plug ${b''(t_0)}={-13}$, ${h(t_0)}={1}$, ${b(t_0)}={5}$, and $C{h''(t_0)}=C{6}$ into the expression
    for $A''(t_0)$ : $\begin{aligned} A''(t_0)&=\dfrac{{b''(t_0)}{h(t_0)}+{b(t_0)}C{h''(t_0)}}{2} \\\\ &=\dfrac{({-13})({1})+({5})(C{6})}{2}
    \\\\ &=8.5 \end{aligned}$ In conclusion, the rate of change of the area of the triangle at that instant is $8.5$ square
    millimeters per minute. Since the rate of change is positive, we know that the area is increasing.'
- source_sentence: Art is sometimes divided into two kinds, high art and popular art. High art attracts a much smaller population
    than popular art,but the number is large and growing. People who enjoy high art go to the opera and symphony concerts
    ; they read serious books and go to serious plays ; they keep up with art exhibitions. Popular art is mainly a kind of
    amusement. Some TV programs are meant to be watched today and forgotten tomorrow. Many popular songs are hits for a few
    weeks ; then they disappear. Other songs remain popular for such a long time that they become _ . The line between high
    and popular art is not always clear,however. Many people believe that rock music, for example, is a real art form. Many
    films are also taken seriously ,while others disappear as nothing more than amusement. Many more people like popular art
    than high art because   _  . A. popular art is better than high art. B. high art is not a real art form. C. popular art
    will be loved for a longer time than high art. D. popular art is a kind of amusement.
  sentences:
  - '**Genre painting**


    Genre painting:

    Genre painting (or petit genre), a form of genre art, depicts aspects of everyday life by portraying ordinary people engaged
    in common activities. One common definition of a genre scene is that it shows figures to whom no identity can be attached
    either individually or collectively, thus distinguishing it from history paintings (also called grand genre) and portraits.
    A work would often be considered as a genre work even if it could be shown that the artist had used a known person—a member
    of his family, say—as a model. In this case it would depend on whether the work was likely to have been intended by the
    artist to be perceived as a portrait—sometimes a subjective question. The depictions can be realistic, imagined, or romanticized
    by the artist. Because of their familiar and frequently sentimental subject matter, genre paintings have often proven
    popular with the bourgeoisie, or middle class.'
  - '**Senior ice hockey**


    Senior ice hockey:

    Senior hockey refers to amateur or semi-professional ice hockey competition. There are no age restrictions for Senior
    players, who typically consist of those whose Junior eligibility has expired.  Senior hockey leagues operate under the
    jurisdiction of Hockey Canada or USA Hockey. They are not affiliated in any way with professional hockey leagues. Many
    former professional players play Senior hockey after their pro careers are over. The top Senior AAA teams in Canada compete
    annually for the Allan Cup.'
  - '**The arts**


    The arts:

    The arts are a very wide range of human practices of creative expression, storytelling and cultural participation. They
    encompass multiple diverse and plural modes of thinking, doing and being, in an extremely broad range of media. Both highly
    dynamic and a characteristically constant feature of human life, they have developed into innovative, stylized and sometimes
    intricate forms. This is often achieved through sustained and deliberate study, training and/or theorizing within a particular
    tradition, across generations and even between civilizations. The arts are a vehicle through which human beings cultivate
    distinct social, cultural and individual identities, while transmitting values, impressions, judgments, ideas, visions,
    spiritual meanings, patterns of life and experiences across time and space.'
