widgetData:
- source_sentence: Liver cancer treatments options
  sentences:
  - The patient underwent mesohepatectomy with total caudate lobectomy of the liver.
  - The patient was treated empirically with amikacin and ceftazidime, which was later replaced with meropenem and piperacillin-tazobactam.
    From August 3 to August 11, the patient was treated with colistin.
  - A porto-systemic shunt was created to increase blood flow. Transarterial chemoembolization (TACE) was performed using
    5-fluorouracil (5-FU), lobaplatin, and pirarubicin to treat tumor thrombi in the Right IntraHepatic Vessels (RIPV).
- source_sentence: What was the outcome of the right adrenalectomy?
  sentences:
  - Overall, the patient was observed for an extended period to monitor the progress of the condition, until the time of discharge.
    The patient was advised to continue follow-up with his physician at regular intervals, and it was recommended that the
    patient follow the prescribed plan of care to maintain the best possible clinical outcome.
  - The right adrenalectomy was performed. Histology was consistent with the material difficult to typify. Immunohistochemistry
    was positive for CK20 and cytokeratin AE1/AE3, but negative for CK7, which is related to colorectal metastasis.
  - The combination of the thyroid nodule and adrenal mass was surgically removed, and the diagnosis of VIP-secreting pheochromocytoma
    was made.
- source_sentence: giant omphalocele symptoms
  sentences:
  - Although the treatment initially showed signs of efficacy, the tumor progressed rapidly, and the patient died three months
    after the second surgical debulking procedure.
  - The patient, a 9-year-old female, presented to the hospital with a large lump in the anterior abdominal wall extending
    from the xiphisternum to the level of iliac crest.
  - The patient presented with bilateral nasovestibular lumps which grew in size over several months, occluding nasal entrance
    and protruding outside the nose.
