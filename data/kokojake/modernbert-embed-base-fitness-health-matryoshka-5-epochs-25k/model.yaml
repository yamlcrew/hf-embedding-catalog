    \ examine the association between \nhealthy dietary scores and aging indicators listed in \nSupplementary Table S2. After\
    \ adjusting for all covariates, \nwe  observed significant negative associations between healthy dietary scores (the AHEI,\
    \ DASHI, HEI-2020, and MEDI) and \naging indicators (KDMAge, PhenoAge, homeostatic dysregulation, KDMAge accelerated aging,\
    \ and PhenoAge accelerated aging). \nAdditionally, the results of the multiple logistic regression analysis \nindicated\
    \ that higher healthy dietary scores were associated with a decreased risk of accelerated aging, as shown by KDMAge and\
    \ \nPhenoAge. Restricted cubic splines in Figure 3 visualize both linear \nand non-linear relationships between healthy\
    \ dietary scores and aging indicators. KDMAge, PhenoAge, KDMAge accelerated \naging, and PhenoAge accelerated aging all\
    \ exhibited linear \nassociations with the four dietary scores.\n3.5 Aging indicators partially mediated the association\
