- source_sentence: 'tions that do not appear to have a relationship with exercise.

    Consider the following case: a 30-year-old female at ABC fit-

    ness center would like guidance on setting up an aerobic exercise program of moderate intensity. She has a heart rate
    monitor

    and is interested in using heart rate to gauge her intensity. Hav-

    ing completed the health screening questionnaire and other nec- essary documents, she meets with an exercise professional
    to de-

    termine what heart rate range would be appropriate. Based on

    the ACSM Guidelines, 64% to 76% of heart rate max is suggested for moderate intensity (1). An estimated maximal heart
    rate is

    calculated based on her age (for simplicity in this example,

    220 −age is used; for more information on estimation of maxi- mal heart rate see “Estimating Maximal Heart Rate” (23)).
    This re-

    sults in an estimated maximal heart rate of 190 (calculated as 220–30 = 190) and a suggested range of 122–144 beats per
    minute

