    103(9):3394–404. doi: 10.1210/jc.2018-00554 12. Kozakowski J, Gietka-Czernel M, Leszczyńska D, Majos A. Obesity in menopause
    - our negligence or an unfortunate inevitability? Prz Menopauzalny

    (2017) 16(2):61–5. doi: 10.5114/pm.2017.68594'
