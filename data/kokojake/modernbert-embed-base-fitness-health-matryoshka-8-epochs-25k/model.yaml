- source_sentence: "Mella is a very lively little girl of 18 months, she was born with cerebral palsy and requires \nconstant\
    \ care and attention. Her mother spends nearly every waking moment with her \nhelping her to develop and interact. “I\
    \ can’t work because I have to be with my daughter all the time, she cannot be left alone,” \nshe explained. In June 2014,\
    \ after having carried out a series of costly tests to find a solution to her daughter’s disability, Mella’s mother found\
    \ her way to the centre run by Healing Hand, one of Handicap International’s partners. Handicap International’s team provided\
    \ Mella with an adapted chair so she would no longer live constantly lying down on the floor, but would be able to sit\
    \ up encouraging her to interact with the people and things around her. They also trained the mother to use games and\
    \ routine activities to help Mella learn and develop. A community worker is regularly visiting the family to check on\
    \ the child and the family, and identify potential needs for referral (assistive devices, pain…).\nCASE STUDY: CEREBRAL\
    \ PALSY IN HAITI \nPrevention"
  sentences:
  - Sipilä and Suominen 1995 exercise physiology research
  - cerebral palsy dietary needs for toddlers
  - Rehabilitation Services Unit framework and theoretical underpinnings
- source_sentence: "that education is typically provided as part \nof a broader package of care for people \nwith CPLBP and\
    \ not as a stand-alone, single \nintervention delivered in isolation. The GDG noted that a proportion of older people\
    \ \nwho live with CPLBP might also experience \nvarying levels of intrinsic capacity such as \ncognitive decline, hearing\
    \ loss or visual impairment, which in some cases could limit \na person’s understanding of, or engagement \nin, education\
    \ interventions. A person’s \nintrinsic capacity ought to be considered \nand accommodated when prescribing and/ or delivering\
    \ structured and standardized \neducation (refer to WHO integrated care for \nolder people approach).\nThe GDG noted the\
    \ heterogeneity in the \neducation topics included in the trials (Table 6), making it difficult to judge which \ntopics\
    \ are most effective, for whom and \nwhen. The GDG referred to Clinical practice \nconsideration 2 about important messages\
    \ concerning CPLBP and referred to indirect \nevidence about empirically derived education \nmessages that were deemed\
    \ to be important \nfor people with LBP, including the following topics: staying active, identifying rare, serious \n\
    causes of low back pain, reassurance (e.g. \n“hurt does not necessarily mean harm”), \nunnecessary interventions, and\
    \ principles of management and disease knowledge (88). \nFinally, the GDG acknowledged the risk for \nharm (such as dependence\
    \ and adoption \nof unhelpful beliefs and behaviours) in \ncircumstances where health workers deliver"
  sentences:
  - clinical trials on protein supplementation and muscle synthesis in sedentary adults
  - health equity and resource considerations for local anaesthetic injections
  - education interventions for chronic low back pain (CPLBP) in older adults
- source_sentence: "between-group differences in interventions for outcomes \nof muscle mass, muscle strength and physical\
    \ perfor-\nmance. When more than 2 studies provided data on the \nsame outcome, these data were quantitatively pooled.\
    \ The data are uniformly represented by the mean and stand-\nard deviation. The qualitative synthesis was conducted \n\
    via RevMan5.4 software, with the mean difference (MD) serving as the effect indicator, and point estimates and \n95% confidence\
    \ intervals (CIs) were provided. Heteroge- neity among studies was assessed via the ­X2 test (a= 0.1), \nand the ­I2 statistic\
    \ was used for quantitative evaluation. ­I2 values were categorized as low (< 25%), moderate (50%), \nor high (≥ 75%)\
    \ heterogeneity. The data were analysed \nvia the fixed-effects model and inverse variance method when ­I2< 50%. Otherwise,\
    \ the random-effects model \nand DS-L method were employed. When there were \ninsufficient data for meta-analysis, a narrative\
    \ synthesis method was employed, utilizing the reported P values or \n95% CIs to evaluate the effectiveness of the intervention.\
    \ \nWe performed subgroup analysis to carry out further \nstudies when significant heterogeneity existed. We will conduct\
    \ sensitivity analysis in cases such as the presence \nof moderate heterogeneity among studies ­(I2 is close to \n50%,\
    \ with a P value slightly greater than 0.05) or when the"
  sentences:
  - fair and affordable access in healthcare projects
  - mean difference and confidence intervals in muscle-related outcomes
  - methods for evaluating sexual reproductive functions in males and females
