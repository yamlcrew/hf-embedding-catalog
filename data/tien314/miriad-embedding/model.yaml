      \ (60) . In contrast to the endothelium, the alveolar epithelium is often spared in sepsisinduced ALI, and therefore\
      \ active ion and fluid clearance is preserved (56) . Recent reports, however, suggest that ion pump and channel functions\
      \ are affected early during sepsis (37) .\n\n To maintain a \"dry\" alveolar space and normal lung function, it is essential\
      \ that the milieu within the alveolar space remain distinct from that of the subepithelial compartment (30) . The maintenance\
      \ mechanism depends on the formation and proper functioning of specialized molecular structures between adjacent cells\
      \ comprising the epithelial sheet, the so-called tight junctions (TJ). The alveolar epithelial TJ is a complex of integral\
      \ membrane proteins that firmly interact with the epithelial cytoskeleton (27) . TJs serve as a regulated semipermeable\
      \ barrier that limits passive diffusion of solutes across paracellular pathways between adjacent cells (1). Han et al.\
      \ (30) recently showed that ALI was associated with diminished expression and function of TJ proteins in lung epithelium.\n\
