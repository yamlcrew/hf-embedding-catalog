      \ their sensitivity to nitrobenzylthioinosine (NBTI). NBTI-sensitive and NBTI-insensitive forms are coded by ENT1 and\
      \ ENT2 genes, respectively. ENT1 and ENT2 are inhibited by dipyridamole and dilazep. 1) On the other hand, CNTs can\
      \ be divided into three forms. No specific pharmacological inhibitors have been identified for any CNTs so far. It was\
      \ reported that dipyridamole, a classic NT inhibitor, was useful in enhancing the effectiveness of cancer chemotherapeutic\
      \ agents, in particular, antimetabolites, based upon the inhibition of the nucleoside salvage pathway. 2, 3) Hence,\
