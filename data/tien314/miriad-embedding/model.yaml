  sentences:
  - "The precautionary principle, first applied to the field of environmental safety, states that, in the face of uncertain\
    \ risk and incomplete data, policy-makers should err on the side of restraint. The corollary of the principle states the\
    \ prominence of health over all other considerations, especially economic.\n\n In Malaysia, after the Nipah vims had been\
    \ recognised as a new entity, control measures were implemented which included restrictions on the importation and movement\
    \ of pigs, culling of pigs in affected areas, minimising contact between humans and potentially infected animals, Wearing\
    \ protective clothing and hygiene measures for humans in contact with pigs, and active surveillance for human cases. High-level\
    \ government commitment was essential in enacting control measures. Co-ordination between veterinary and human public\
    \ health services was reinforced and co-operation is now ongoing.\n\n Although the outbreak has been controlled successfully,\
    \ various problems were identified, including co-ordination between human and veterinary public health services and the\
    \ other government departments involved, co-ordination of international inputs, and response to the media. The need for\
    \ an effective intersectoral group dealing with zoonotic diseases is one of the lessons that has been learnt during the\
    \ Nipah virus outbreak (27) .\n\n The occurrence of a significant number of outbreaks of new and emerging zoonotic diseases\
    \ over the past few years is a matter of concern. Similar occurrences can be expected in the future as the continuous\
    \ alteration of the environment and the establishment of human settlements in formerly uninhabited areas, particularly\
    \ in the tropics, are factors that favour the emergence of diseases, the agents of which may have remained undiscovered\
    \ in nature for centuries. To these problems are added the ever-increasing demand for animal protein foods, the acceleration\
    \ of international trade, especially of food products and livestock, and the increasing number of people who are potentially\
    \ more susceptible to opportunistic infection by agents of animal origin. Apart from the direct impact on human health\
    \ through sickness and death, these new, emerging zoonoses can have other important consequences, such as the following:\n\
    \n -to serve as a reminder of the existence of infectious diseases and the capacity of these diseases to occur very unexpectedly\
    \ in new locations and new animal species -to stress the need for stronger international co-operation, better local, regional\
    \ and global networks for communicable disease surveillance and pandemic planning -to contribute to the definition of\
    \ new paradigms, especially relating to food safety policies and more generally to the protection of public health -to\
    \ reinforce the importance of intersectorial collaboration for disease containment in addition to that of independence\
    \ of sectorial interests and transparency when managing certain health risks.\n\n The challenge to public health posed\
    \ by effective surveillance, prevention and control of zoonotic diseases can be met. The recent response to a number of\
    \ outbreaks, for example, human monkeypox in central Africa, avian influenza in Hong Kong, RVF in Kenya and Somalia, and\
    \ Nipah virus in Malaysia, has shown the types of partnership required.\n\n The role of the WHO in this increasingly important\
    \ area of public health is to strengthen the capacity of countries and the international community to prevent such dangers\
    \ from developing, and to minimise the impact of outbreaks on public health. To achieve this, the WHO works in partnership\
    \ with other organisations, within a global framework, to reshape and strengthen the network for communicable disease\
    \ surveillance and control. The aim is to detect and contain the spread of viral, bacterial and zoonotic diseases where\
    \ and when they occur.\n\n Les zoonoses émergentes et leurs conséquences sur la santé publique \n\n Nombre de maladies\
    \ nouvelles, émergentes et réémergentes chez l'homme sont provoquées par des agents pathogènes transmis par des animaux\
    \ ou des produits d'origine animale. De nombreuses espèces animales, domestiques et sauvages, servent de réservoir à ces\
    \ agents, virus, bactéries ou parasites. Compte tenu de la diversité des espèces animales concernées, la surveillance\
    \ et la prophylaxie efficaces des zoonoses constituent un véritable défi. Les auteurs décrivent les conséquences directes\
    \ et indirectes des zoonoses émergentes sur la santé publique. Les conséquences directes sont celles qui se définissent\
    \ en termes de morbidité et de mortalité. Les conséquences indirectes concernent l'incidence des maladies émergentes sur\
    \ deux catégories de personnes : les professionnels de la santé et la population dans son ensemble. L'évaluation par les\
    \ professionnels de l'importance de ces maladies détermine les pratiques et l'organisation en matière de santé publique,\
    \ la définition de thèmes de recherche et l'affectation des ressources aux niveaux national et international."
  - "Haemangioma is a common type of vascular tumour in paediatric age group [1] . Most of them are benign and non-life threatening\
    \ [1] . Kasabach Merritt syndrome (KMS) is a combination of giant haemangioma, thrombocytopenia and consumptive coagulopathy\
    \ [1] [2] [3] [4] [5] . It presents with diverse clinical presentation and may be a part of other recognized syndrome\
    \ [1, 2] . KMS is a well-recognized but rare clinical entity that may be life threatening [1] [2] [3] [4] and bears considerable\
    \ anesthetic implications [3] [4] [5] .\n\n Here, we would like to report a case of an 11-year-old boy, after obtaining\
    \ a written permission from parents, who came to us for preoperative evaluation with a haemangioma (15.7×13.3 cm in maximum\
    \ dimension) involving the left forearm [Table/ Fig-1] . It began to appear as a small lesion without causing any associated\
    \ problem at the age of three years. Though the patient have attended various medical services, he was not provided with\
    \ any conclusive diagnosis nor there any improvement in his symptomology. During the last eight years it enlarged many\
    \ folds with destruction of radius, erosion & remodeling of ulna [Table/ Fig-2 ]. As there was profound bonny destruction,\
    \ an above elbow amputation was planned by his surgical team. His bed side physical examination did not reveal any other\
    \ significant abnormality. All preoperative lab parameters were normal except for a platelet count of 72,000/µL. A subsequent\
    \ coagulation profile revealed a prothombin time prolonged by five seconds and international normalized ratio (INR) of\
    \ 1.52. Considering the possibility of KMS, he was referred to haematology service. He was diagnosed with KMS by the haematology\
    \ service and no preoperative transfusion was advised. The possibility of massive blood loss and institution of massive\
    \ blood transfusion protocol was discussed and planned accordingly. He was provided general anaesthesia with endotracheal\
    \ intubation and mechanical ventilation during the surgery. Total anaesthesia time was 90 min and trachea was extubated\
    \ at the end of surgery. We did not encounter any reduction of platelet count or deterioration of coagulation profile\
    \ during the intraoperative period and there was no need of A practice derived consensus statement discussing diagnostic\
    \ workup, surgical and non-surgical treatment modalities of KMS has been published very recently [2] . Apart from the\
    \ problems associated with anatomic locations of the tumour [1, 3] and haematological abnormalities [1] [2] [3] [4] [5]\
    \ , cardiac derangement from high-volume arterio-venous shunting is also a concern [2] [3] [4] . The anaesthetic implications\
    \ of pharmacological measures used during the treatment of KMS should also be addressed with assiduity [1] [2] [3] . Anaesthesia\
    \ and surgery may possibly trigger disseminated intravascular coagulation and induce severe bleeding [3] . Although KMS\
    \ is associated with mortality and morbidity [1, 2] , case reports of successful perioperative outcome is also available\
    \ in literature [3, 5] . Recently, survival benefit has been documented in patients with traumatic hemorrhage that were\
    \ managed with hemostatic therapy guided by viscoelastic point-of-care coagulation devices (thromboelastography) [6] .\
    \ Thromboelastography is also increasingly being used in hemorrhage of non-traumatic origin [7] . In a patient with KMS,\
    \ FloTrac/Vigileo system was used successfully to guide appropriate resuscitative measures that ensured stable perioperative\
    \ hemodynamics [5] . Thus, the authors believe that the impact of use of viscoelastic point-of-care coagulation and noninvasive\
    \ cardiac output monitoring devices on mortality and morbidity of patients with KMS should be evaluated.\n\n Haemangioma\
    \ is a common condition in pediatric age group [1, 2] , thus anaesthesiologists are expected to encounter patients with\
    \ hemangioma frequently. KMS is a rare clinical manifestation in patients with haemangioma, moreover its clinical features\
    \ are diverse [1] [2] [3] [4] [5] [6] [7] . Although this particular case did not pose much challenge in the perioperative\
    \ period, this discussion should serve to remind anesthesiologists of the possible complications and management issues\
    \ that may be encountered with KMS.\n\n [Table/ Fig-1] : Haemangioma involving the left forearm [Table/ Fig-2 ]: X-ray\
    \ of the left forearm showing a large expansile soft tissue density (arrow mark) lesion in the mid and distal forearm\
    \ causing profound bone erosion and deformity, especially involving the radius and also the ulna"
  - "In addition, measurements from the onset of the QRS complex to the first major deflection of the first heart sound, the\
    \ carotid upstroke, the carotid shoulder, the beginning of the second heart sound, and the beginning of the second component\
    \ of the second heart sound are included. found to correlate with the initial positive acceleration peak of the carotid\
    \ pressure rise in a few subjects from whom these data were obtained by graphic differentiation of the carotid pressure\
    \ pulse (figure 3). Furthermore, previous work from this laboratory has already established the time of this acceleration\
    \ peak obtained from carotid pressure pulses in 10 normal subjects as occurring at .14 second after the Q.' Figure 3 shows\
    \ a comparison of the ballistocardiograph, the carotid pulse, and the graph- was found to be almost synchronous with the\
    \ anacrotic shoulder of the carotid pulse (carotid shoulder). The carotid shoulder was taken as the point of maximal deceleration\
    \ of the carotid pulse pressure rise, and could be selected with fair accuracy from simple inspection of the carotid pulse\
    \ curve. Figure 3 clarifies the relationship of the carotid shoulder and the point of maximal deceleration of the carotid\
    \ pulse. A temporal relationship between the shoulder of the carotid pulse and one of the high frequency J peaks has been\
    \ noted by Rappaport.9 Similarly, the JD point may be related to slope changes of the carotid pulse in late systole. This\
    \ slope change is visible in figure 8 . The subscript D indicates the delayed J wave. The K point has not been shown to\
    \ be related to the physiologic events as measured. The 2 L peaks, LL and LR, have a close relationship to the first and\
    \ second components of the second heart sound. LL occurs during the rapid downstroke of the carotid incisura, at the time\
    \ of the first component, and LR occurs slightly later with the second component of the second sound.\n\n A striking correlation\
    \ was found between the times of HR and HL and the reported times of right and left ventricular ejection, respectively.\
    \ In 10 subjects studied by cardiac catheterization, Braunwald, Fishman, and Cournand10 found the interval between the\
    \ onset of the Q wave of the electrocardiogram and right ventricular ejection to be .080 ±t .0079 second. This is to be\
    \ compared to a Q to HR time of .085 + .010 second in the present study. Braunwald fig. 4) . A similar early presystolic\
    \ force has been described by others, using high frequency technics.\", 12 It has been observed to be present with atrial\
    \ fibrillation, showing its independence from atrial systole.\n\n Following the F-G wave, there is a headward deflection\
    \ or force having its onset at approximately .05 second after Q. The time of onset correlates with the first major vibration\
    \ of the first heart sound, and this upstroke (the G-H wave) has been observed to be exaggerated in patients with mitral\
    \ stenosis, and other conditions causing pulmonary hypertension (fig. 4) . It is postulated that the initial event at\
    \ the onset of right ventricular contraction is an acceleration of an impulse or \"bolus\" of blood toward the base of\
    \ the heart.* This headward acceleration of blood would result in a footward force on the body (the F-G downstroke). The\
    \ subsequent deceleration (footward acceleration) resulting from the impact of this \"bolus\" against the closed A-V and\
    \ semilunar valves would result in a headward acceleration of the body. When the impact force on the pulmonic valve has\
    \ become sufficiently great to open the valve, there is a sharp headward acceleration of the now unimpeded pulse wave\
    \ as it flows into the pulmonary artery. This is reflected by a footward acceleration of the body in reaction, causing\
    \ the downstroke following the HR point. Meanwhile, an analogous headward force has begun on the left side of the heart\
    \ because of impact on the aortic valve, and terminates when the aortic valve opens, normally somewhat later than the\
    \ opening of the pulmonic valve. This impact -produces a visible headward deflection in the force ballistocardiogram terminating\
    \ at the HL point. The pulse wave then is accelerated headward in the aorta, producing a footward reaction on the body,\
    \ the HW-IL downstroke.\n\n Ejection Systole. The HL point occurs at the time of left ventricular ejection, as measured\
    \ by Braunwald10 and as may be predicted from the time of the upstroke in the carotid pulse. The subsequent footward force\
    \ on the body would be the anticipated reaction to the headward acceleration of blood in the aorta."
- source_sentence: What are the systemic manifestations of Fournier's syndrome?
  sentences:
  - "Fournier's syndrome is defined as a suppurative bacterial infection of the perineal, genital, or perianal regions. Those\
    \ conditions often lead to thrombosis of subcutaneous vessels and with infection, resulting in the development of gangrene\
    \ of the overlying skin and subcutaneous tissue [1] . This rare syndrome is a rapidly progressive and potentially lethal\
    \ necrotizing fasciitis caused by invasive infections of the lower part of the genitourinary tract, anorectal soft tissue,\
    \ and genital skin [1, 2] . The devastating rapidity is typical, as evidenced by the fact that the mean duration of symptoms\
    \ to become the target of emergency operation is just a few days, and a majority of patients are seriously ill at the\
    \ time of admission. Anesthetic management of patients with this syndrome is often difficult, due to its devastating nature\
    \ as well as significant comorbid diseases. However, because of the infrequency of the syndrome, there is limited information\
    \ regarding the anesthetic management of this disease. We recently encountered the anesthetic management in three cases\
    \ of patients with Fournier's syndrome. There were three initial emergency and six additional elective operations under\
    \ general anesthesia, except one spinal anesthesia in an elective case. Therefore, we report these cases and review the\
    \ relevant literatures.\n\n Immediate and, if required, repetitive operation is important for saving lives in patients\
    \ with this syndrome [1] [2] [3] . Fournier's syndrome is frequently associated with certain diseases and conditions.\
    \ Diabetes mellitus is probably the most common comorbid disease, as evidenced by our cases [1] . Even when the patient\
    \ has diabetes, as in our two patients, Fournier's syndrome might be the first clinical disease to be detected. The second\
    \ common condition is alcoholism, such as in all our patients, because any disorder that compromises the immunity enhances\
    \ development of a severe infection [1, 2] . The other associated clinical features are malnutrition, prolonged hospitalization,\
    \ radiation therapy, chemotherapy, neurologic deficits, cirrhosis, leukemia, renal failure, organic heart disease, vasculitis,\
    \ intravenous drug abuse, lupus, cirrhosis, AIDS and steroid medications. In obstetric anesthesia, cervical or pudendal\
    \ nerve block can induce the syndrome as well [1] .\n\n Abnormal laboratory results include hyperglycemia, hypocalcemia,\
    \ anemia, leukocytosis and thrombocytopenia, as evidenced by our patients [1] . Most of those abnormalities are due to\
    \ sepsis. The systemic manifestations include fever, tachycardia, and volume depletion similar to those of severe peritonitis\
    \ [1] . All our patients also had sepsis in terms of the preoperative definition. Two patients looked to be in late distributive\
    \ shock and the other patient in early distributive shock, respectively. In the case of no active bleeding, delayed or\
    \ inadequate volume resuscitation is a significant error that would have detrimental effects on the patients's outcome\
    \ in septic shock. If initial crystalloid fluid resuscitation is insufficient to raise the mean arterial pressure to 65\
    \ mmHg and the CVP to 8 to 12 mmHg, then vasopressors and inotropes are needed as the second step in the guidelines of\
    \ early goal-directed therapy [4] . It is rational to use a blood transfusion when the hematocrit is below 30% when invasive\
    \ monitoring might be indicated [4] . Among two patients in late septic shock, one patient fortunately responded to our\
    \ initial fluid resuscitation, whereas the other patient needed dopamine for hypotension. In another patient, early shock\
    \ occurred, and a blood transfusion and dopamine and norepinephrine were required to achieve an adequate cardiac output\
    \ and oxygen delivery to maintain vital organ function were needed, because his affected area including www.ekja.org\n\
    \n Vol. 61, No. 2, August 2011 lower extremity was wide and bleeding was ongoing. His septic manifestations reoccurred\
    \ sporadically over four months of hospitalization and progressed into cardiorespiratory collapse and death after five\
    \ debridements under general anesthesia. The preanesthetic investigation of the extent of the lesion is also important,\
    \ because the ambiguity of the region involved could influence the choice of the anesthetic technique. Koitabashi and\
    \ colleagues [5] suggested the avoidance of spinal anesthesia in the presence of lumbar subcutaneous gas. Sato and associates\
    \ [3] recommended that using general anesthesia is preferable for controlling physiologic homeostasis. Fournier's syndrome\
    \ in particular originateed in anorectal disease, which is the usual subject of regional anesthetic procedures, is known\
    \ to be aggressive, produces marked systemic toxicity and myonecrosis as in our mortal case, and can be connected with\
    \ higher mortality [1] . Hence, particular attention should be necessary for the choice of the anesthetic procedures.\
    \ The reason we performed spinal anesthesia at the secondary wound closure one month after initial debridement in one\
    \ patient was that he underwent computer tomography to depict the accurate extent of the lesion. Among gravely ill patients\
    \ it seems wise to not waste precious time doing a lot of investigation to perform regional anesthesia.\n\n The degree\
    \ of debridement for Fournier's syndrome is variable from simple incision to wide excision with massive bleeding [2] .\
    \ Many surviving patients require secondary wound closure, skin graft or a reconstructive flap procedure. In spite of\
    \ appropriate therapy, the mortality rate in Fournier's syndrome is reported to exceed 40% in many studies [1] [2] [3]\
    \ . Prolonged sepsis manifested by fever or hypotension and lasting for more than 48 hours was experienced among about\
    \ 40% of patients, as in our expired patient [2] . Some reports have associated older age, female gender, anorectal causes,\
    \ delayed admission, the presence of debilitating conditions such as renal failure and hepatic dysfunction with high mortality.\
    \ Laboratory parameters on admission statistically related to fatality include low hematocrit, calcium, albumin, and cholesterol,\
    \ and high BUN and alkaline phosphatase levels. The syndrome could rapidly progress into prolonged sepsis, DIC, pneumonia,\
    \ respiratory failure, diabetic ketoacidosis, renal failure, and heart failure.\n\n In conclusion, our experiences emphasize\
    \ that Fournier's syndrome has a fatal potential, so optimal conduct of anesthesia requires forethought and sound management\
    \ as well as an understanding of the pathophysiology of this syndrome for successful anesthesia."
  - "tissue infiltration of polymorphonuclear neutrophils (PMN). In response to bacterial infection, neutrophil activation\
    \ in the lungs leads to ALI (53) and PMN infiltration represents a primary mechanism for sepsis-induced pulmonary dysfunction\
    \ and injury (10) .\n\n In the normal lung, continuous fluid clearance by the lung lymphatics is essential for the maintenance\
    \ of dry alveolar surfaces (60) . Ion pumps and channels positioned on alveolar epithelial cell surfaces generate transepithelial\
    \ osmotic gradients that drive water movement from the alveolar space into the lung interstitium. The key pumps and channels\
    \ involved in alveolar fluid transport include aquaporin 5 (Aqp5), cystic fibrosis transmembrane conductance regulator\
    \ (CFTR), epithelial sodium channel (ENaC), and Na ϩ -K ϩ -ATPase (37) . In ALI, the lung endothelial barrier is damaged,\
    \ resulting in abnormal capillary permeability and pulmonary edema as the lymphatic clearance is overwhelmed (60) . In\
    \ contrast to the endothelium, the alveolar epithelium is often spared in sepsisinduced ALI, and therefore active ion\
    \ and fluid clearance is preserved (56) . Recent reports, however, suggest that ion pump and channel functions are affected\
    \ early during sepsis (37) .\n\n To maintain a \"dry\" alveolar space and normal lung function, it is essential that the\
    \ milieu within the alveolar space remain distinct from that of the subepithelial compartment (30) . The maintenance mechanism\
    \ depends on the formation and proper functioning of specialized molecular structures between adjacent cells comprising\
    \ the epithelial sheet, the so-called tight junctions (TJ). The alveolar epithelial TJ is a complex of integral membrane\
    \ proteins that firmly interact with the epithelial cytoskeleton (27) . TJs serve as a regulated semipermeable barrier\
    \ that limits passive diffusion of solutes across paracellular pathways between adjacent cells (1). Han et al. (30) recently\
    \ showed that ALI was associated with diminished expression and function of TJ proteins in lung epithelium.\n\n Emerging\
    \ evidence indicates that inflammation and coagulation are connected (34) . This is especially important in sepsis as\
    \ inflammatory cytokines activate the coagulation cascade and inhibit fibrinolysis, thereby shifting normal hemostasis\
    \ toward a prothrombotic state. Sepsis-driven coagulation induces consumption of coagulation factors leading to disseminated\
    \ intravascular coagulation (DIC), a phenomenon frequently associated with sepsis-induced ALI. Indeed, impairment of capillary\
    \ blood flow during sepsis has been observed in human tissues by orthogonal polarization spectral imaging and sidestream\
    \ dark-field imaging (17) . It is currently estimated that as many as 50% of all sepsis patients develop DIC (25) . Bastarache\
    \ et al. (6) have recently reported that in ALI, the alveolar compartment contains high levels of tissue factor (TF) procoagulant\
    \ activity that favor fibrin deposition in the air spaces. TF activation results in thrombin formation, which augments\
    \ permeability and enhances inflammation (14) .\n\n Vitamin C is a small, water-soluble molecule that readily acts as\
    \ a one-or two-electron reducing agent for many radicals and oxidants. Vitamin C is bioavailable equally as either dehydro-L-ascorbic\
    \ acid (DHA) or L-ascorbic acid (AscA). Specialized cells can take up reduced vitamin C (AscA) through Na ϩ -dependent\
    \ ascorbate cotransporters (SVCT1 and SVCT2). Most other cells take up vitamin C in its oxidized form (DHA) via facilitative\
    \ glucose transporters (48) . Sepsis lowers plasma AscA concentrations (57) and, importantly, low vitamin C levels correlate\
    \ inversely with multiple organ failure and directly with survival (9) . Studies using animal models show that vitamin\
    \ C prevents endotoxin-induced hypotension and improves arteriolar responsiveness, arterial blood pressure, capillary\
    \ blood flow, liver function, and survival in experimental sepsis (4, 59) .\n\n We recently showed that vitamin C, administered\
    \ after the onset of endotoxemia, attenuates proinflammatory and procoagulant states that induce lung vascular injury\
    \ and improved survival in an animal model of sepsis (23) . In the present study we show that vitamin C attenuates sepsis-induced\
    \ ALI by enhancing alveolar epithelial barrier integrity. Furthermore, vitamin C induced the expression of ion channels\
    \ and pumps, which play critical roles in improving alveolar fluid clearance. In addition, we also observed marked changes\
    \ in the viscoelastic clot properties of septic mice blood."
  - "Nucleotides can be synthesized de novo or recycled through a salvage pathway in vivo. In the salvage pathway, nucleotides\
    \ are synthesized from extracellular nucleosides and/or nucleobases. The plasma membrane transport of nucleosides is concerned\
    \ with both the physiology and pharmacology of mammalian cells. Most mammalian cells simultaneously express several nucleoside\
    \ transporters (NTs) in the plasma membrane. NTs possess certain differences in Na + -dependency, permeation selectivity,\
    \ and inhibitor sensitivity. NTs can be divided into two major classes: concentrative Na + -dependent nucleoside transporters\
    \ (CNTs) and equilibrative Na + -independent nucleoside transporters (ENTs). CNTs are nucleoside/Na + symporters that\
    \ transport nucleosides against their concentration * To whom correspondence should be addressed: Laboratory of Chemical\
    \ Toxicology and Environmental Health, Showa Pharmaceutical University, 3-3165 Higashi-Tamagawagakuen, Machida, Tokyo\
    \ 194-8543, Japan. Tel. & Fax: +81-42-721-1563; E-mail: ogra@ac.shoyaku.ac.jp gradients. In contrast, ENTs transport nucleosides\
    \ by facilitated diffusion. ENTs can be further divided into two subclasses depending on their sensitivity to nitrobenzylthioinosine\
    \ (NBTI). NBTI-sensitive and NBTI-insensitive forms are coded by ENT1 and ENT2 genes, respectively. ENT1 and ENT2 are\
    \ inhibited by dipyridamole and dilazep. 1) On the other hand, CNTs can be divided into three forms. No specific pharmacological\
    \ inhibitors have been identified for any CNTs so far. It was reported that dipyridamole, a classic NT inhibitor, was\
    \ useful in enhancing the effectiveness of cancer chemotherapeutic agents, in particular, antimetabolites, based upon\
    \ the inhibition of the nucleoside salvage pathway. 2, 3) Hence, the combination of NT inhibitors and antimetabolites\
    \ is expected to provide more effective and safer cancer chemotherapy in the clinical setting.\n\n Cimicifugoside, a triterpenoid\
    \ originating from the rhizomes of Cimicifuga simplex (C. simplex), has been used in traditional Chinese medicine as the\
    \ so-called Cimicifugae rhizoma (Fig. 1) . The medicine is prescribed because of its anti-C 2011 The Pharmaceutical Society\
    \ of Japan inflammatory, analgesic, and anti-pyretic effects. 4) In addition, it has been reported that cimicifugoside\
    \ selectively inhibits the uptake of nucleosides into phytohematoagglutinin-stimulated human lymphocytes and several malignant\
    \ cell lines. 5, 6) Indeed, the uptake of nucleosides, such as uridine, thymidine, and adenosine, but not nucleobases\
