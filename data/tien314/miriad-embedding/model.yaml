      \ permeation selectivity, and inhibitor sensitivity. NTs can be divided into two major classes: concentrative Na + -dependent\
      \ nucleoside transporters (CNTs) and equilibrative Na + -independent nucleoside transporters (ENTs). CNTs are nucleoside/Na\
