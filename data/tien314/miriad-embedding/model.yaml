  - "Tables I and II show our experience with instrumental oesophageal perforations.\n\n Spontaneous rupture of the lower\
    \ oesophagus is rare and usually presents as an acute abdomen. It should always be considered when a patient who has the\
    \ signs and symptoms of an acute abdomen is operated upon and no lesion is found in the abdomen to account for the symptoms.\
    \ The abdomen should not be closed until a perforated oesophagus has been excluded. The diagnosis can often be made at\
    \ this stage by the anaesthetist, because he will almost certainly have inflated the patient's lungs with oxygen prior\
    \ to intubation, and much of the gas will pass down the oesophagus through the perforation and rise up the mediastinum\
    \ to the supraclavicular fossae to be palpated there as crepitus.\n\n Spontaneous rupture of the oesophagus may occur\
    \ in the healthy oesophagus, in one weakened by inflammation, or as a terminal event in the chronically ill patient.\n\
    \n Rupture is almost always abrupt in onset, with no symptoms previously referable to the oesophagus, but it may also\
    \ occur insidiously in debilitated and chronically ill patients, especially if there is a fungus infection of the oesophagus.\
    \ The rupture usually occurs at the lower end of the oesophagus and the tear is linear and in the longitudinal axis. Two\
    \ main factors operate to cause spontaneous rupture of the oesophagus: (1) increased intraluminal pressure in the oesophagus;\
    \ (2) (Table IV) . What one strives for is to get an oesophago-cutaneous fistula as soon as possible by adequate and efficient\
    \ drainage of the pleural cavity and mediastinum, at the same time ensuring that the lung remains fully expanded so that\
    \ a track can form along the drainage tubes to the skin. In the very ill, shocked patient this will, in the first instance,\
    \ mean the rapid insertion of an intercostal drainage tube into the right or left pleural cavity. Suction is applied to\
    \ this tube through an underwater seal (closed drainage). The oesophagus is intubated, and gentle, continuous suction\
    \ is applied to keep the oesophagus empty. Intensive antibiotic cover is started (see below). It will be necessary, once\
    \ the acute phase of shock is over, and in the less acutely ill patient, to ensure better drainage. Through a small right\
    \ or left thoracotomy, the pleural cavity is cleared of fluid and fibrin, and a large-bore drainage tube is accurately\
    \ positioned next to the perforation. At this time it is often difficult to find the actual perforation because of fibrin\
    \ and granulation tissue. One way to demonstrate the perforation is to cover the posterior mediastinum with saline, then\
    \ to ask the anaesthetist to blow down an indwelling oesophageal tube; the bubbles that ensue localize the perforation\
    \ (Fig. 2) . At this operation two gastrostomies are done (Fig. 3) . One is used to keep the stomach empty. The reason\
    \ the stomach is kept as empty as possible is because the negative pressure in the affected pleural cavity tends to suck\
    \ gastric juice up the oesophagus through the perforation and so into the pleural cavity. This is especially true in infants\
    \ with oesophageal atresias, in whom the anastomosis has broken down, and in adults where the perforation is in the lower\
    \ two-thirds of the oesophagus. A second tube is threaded out into the jejunum and used for feeding.\n\n Adequate intravenous\
    \ replacement of fluid, calories, and protein must be given. For two to eight weeks these patients will lose a large quantity\
    \ of protein and electrolyte-rich fluid and at the (Dawes, 1964"
  - "98 However, resistance to fosfomycin due to overexpression of enolpyruvyl transferase has been also observed.\n\n Several\
    \ modifying enzymes have been described, sometimes in species that could produce this antibiotic, 99 but also in strains\
    \ that harbor plasmidic or chromosomal resistance. In all cases, they lead to the formation of inactive adducts:\n\n •\
    \ FosA is a metalloenzyme. It opens the epoxide ring of fosfomycin and forms a covalent bond between the sulfhydryl residue\
    \ of the cysteine in glutathione and the C-1 of fosfomycin. [100] [101] [102] This type of resistance has been found in\
    \ some Gram-negative strains (Enterobacteriaceae, Pseudomonas spp, and Acinetobacter spp), 103 where it is either encoded\
    \ by plasmids or by the chromosome. 104 It is worth underlining the important similarities between the DNA of these genes\
    \ and those of several strains of Streptomyces spp.\n\n • FosB allows the formation of L-cysteinefosfomycin. This type\
    \ of resistance has been found in Gram-positive species only, either encoded by plasmids in Staphylococcus spp, 103, 105,\
    \ 106 or by the chromosome in Bacillus subtilis. 107 Because the amino acid sequence of FosB is 48% identical to that\
    \ of FosA, a common origin is likely. 106, 107 • FosC allows fosfomycin phosphorylation with ATP as a cosubstrate. It\
    \ has been described in P. syringae, a species that naturally produces fosfomycin.\n\n A similar mechanism has been described\
    \ with fomA and fomB in Streptomyces wedmorensis, 108 and with rare strains of P. aeruginosa.\n\n • FosX leads to a water\
    \ adduct. It has been described in Mesorhizobium loti and Listeria monocytogenes. [110] [111] [112] Mutations in transport\
    \ systems (glpT or uhpT) are easily observed in laboratory studies, and lead to a decrease in uptake of the drug, and\
    \ thus resistance to fosfomycin. 85, 86, 113, 114 They may be associated with mutations in their regulatory genes, such\
    \ as uhpA (encoding a regulator protein required for activation of the uhpT promoter), or ptsI and cyaA, the products\
    \ of which are involved in the synthesis of cyclic AMP and therefore regulate the level of glycerophosphate transport.\n\
    \n Although many mechanisms of resistance to fosfomycin have been described since its discovery, mutations of fecal E.\
    \ coli strains during treatment of uncomplicated acute cystitis do not appear to be clinically relevant, which sets them\
    \ apart from the fluoroquinolones. 117 For some authors, the observation that fosfomycin resistance does not increase\
    \ with the passage of time could be due to the fact that mutations in murA and in transport systems have a biological\
    \ cost which is not compatible with their persistence in the community. 114, 118, 119 But another concern about the lack\
    \ of development of fosfomycin resistance must be considered, ie, that it has been little used in the past, either in\
    \ human or animal therapies.\n\n Considering the present status of its susceptibility, fosfomycin often appears to be\
    \ an interesting therapeutic option for the treatment of multidrug-resistant Enterobacteriaceae, 9 in vitro susceptibility\
    \ testing and interpretative standards Susceptibility testing for fosfomycin may be performed by the agar disk diffusion\
    \ method, the gradient diffusion method (Etest ® , AB Biodisk, Solna, Sweden), the agar or broth dilution method, or by\
    \ the break point dilution method. Unfortunately, for many reasons, fosfomycin susceptibility results were not reported\
    \ in many of the publications dealing with multidrug-resistant bacteria.\n\n The results of in vitro susceptibility testing\
    \ may be influenced by many factors. In particular, phosphate ions are able to inhibit the glycerophosphate transport\
    \ system, while a high concentration of dextrose represses the hexose phosphate uptake system, therefore false resistant\
    \ results may be reported if the medium does not include an inducer for the hexose phosphate uptake system. 86, 93, 133\
    \ In correct for this, the practice of adding glucose-6-phosphate to Mueller Hinton medium was generally adopted."
  - "Multiple myeloma (MM), also known as plasma cell myeloma, is characterized by excess bone marrow plasma cells, monoclonal\
    \ paraproteins, bone lytic lesions, renal disease and immunodeficiency [1] . Around the world, MM is the second most frequent\
    \ hematologic malignancy after non-Hodgkin lymphoma [2] .\n\n Interferon regulatory factor (IRF) belongs to the nuclear\
    \ transcription factors, named by its regulation of interferon [3] . IRF families, including more than 10 members, are\
    \ identified to have recognition of domain amino terminal of DNA with specific sequences and binding function. Functionally,\
    \ IRF not only regulates cell response to interferon, but also plays a pivotal role in cell proliferation, apoptosis,\
    \ oncogenic conversion susceptibility and T cell immune responses [3] . Multiple myeloma oncogene 1 (MUM1) / Interferon\
    \ regulatory factor 4 (IRF4) is one of interferon regulatory factors, which has been shown to be an important transcription\
    \ factor and is involved in the negative regulation of Th17 cells differentiation and the production of Th17-related cytokines,\
    \ including IL-17, IL-21 and IL-22 [4, 5] . Mechanically, IRF4 may play a key role in the IL-21-mediated Th17 cells differentiation\
    \ by influencing the balance of RORα, RORγ and Foxp3 [6] . In plasma cells, IRF4 is also known to be an important modulator\
    \ for their differentiation [7] . Moreover, IL-1 drives the early differentiation of Th17 cells by regulating the expressions\
    \ of IRF4 and RORγt [8] . Therefore, mounting evidence support that IRF4 plays a role in the differentiation of Th17 cells.\n\
    \n Th17 cells are recently identified to participate in bacterial infections, and numerous immunologic diseases [9] .\
    \ The emblematic Th-1 or Th-2 lineages secrete IL-17 rather than IL-4 or IFN-γ [10] . A recent study indicated that IL-17\
    \ plays a critical role in the control of the phenotype switch from Th-1 to Th-17, and leads to lytic bone disease in\
    \ MM [11] .\n\n Immunotherapy has emerged as a promising approach for MM treatment recently, but it still lacks targeted\
    \ specifically and optimized drugs [12] . It is generally accepted that Th17 cells and its relevant cytokines are critical\
    \ components in the autoimmunity. IRF4 is recognized as an important modulator for the differentiation of Th17 cells.\
    \ Therefore, defining the relationship between IRF4 and Th17 cells may shed a light for the treatment of MM.\n\n \n\n\
    \ To evaluate the expression of IRF4 in MM patients, we analyzed public gene expression data of purified plasma cells\
    \ from MM patients (n = 351) compared with normal plasma cells (NPC) (n = 22) or monoclonal gammopathy of undetermined\
    \ significance (MGUS) cells (n = 44). Statistical comparison of the IRF4 expression levels in the graph showed that significant\
    \ up-regulation of IRF4 is obvious in 351 MM patients compared with NPC and MGUS (p < 0.001, Figure 1A ). Moreover, we\
    \ investigated the correlation between IRF4 expression and survival. Survival months were longer in patients with low\
    \ IRF4 expression than in those with high IRF4 expression (p < 0.05, Figure 1B ). Next, we measured the IRF4 expression\
    \ in bone marrow tissues of 58 MM patients and healthy donors by immunohistochemistry. The results showed that 38 cases\
    \ of MM patients exhibited a distinct increase of IRF4 expression (+~+ + + +), the positive rate was 65.5% (38/58), including\
    \ 12 cases (+), 15 cases (+ +), 6 cases (+ + +), 5 cases (+ + + +). IRF4 is found to be expressed in MM cell nucleus,\
    \ and not observed in lymphocytes, macrophages, and neutrophils ( Figure 1C ). We then analyzed the correlations between\
    \ the expression of IRF4 and the clinical parameters. No association was found between the expression of IRF4 and the\
    \ clinical parameters, such as gender, age, proportion of plasma cells, blood sedimentation (ESR), hemoglobin (Hb), C-reactive\
    \ protein (CRP), lactate dehydrogenase (LDH), serum creatinine (sCr) and serum albumin (ALB Figure 1D ; ISS stage: p =\
    \ 0.002, Figure 1E )."
