widgetData:
- source_sentence: The Gross Merchandise Sales (GMS) decreased by 1.2% in 2023 compared to 2022.
  sentences:
  - What specific matters did the CFPB investigate concerning Equifax?
  - What was the percentage decline in GMS for the year ended December 31, 2023 compared to 2022?
  - What percentage of eBay's 2023 net revenues were attributed to international markets?
- source_sentence: Asset management and administration fees vary with changes in the balances of client assets due to market
    fluctuations and client activity.
  sentences:
  - Why was there a net outflow of cash in financing activities in fiscal 2022?
  - How do asset management and administration fees vary at The Charles Schwab Corporation?
  - What are some key goals of the corporation related to climate change?
- source_sentence: Operating profit margin was 19.3 percent in 2023, compared with 13.3 percent in 2022.
  sentences:
  - What was the operating profit margin for 2023?
  - How do the studios compete in the entertainment industry?
  - What types of audio products does Garmin's Fusion and JL Audio brands offer?
- source_sentence: Subsequent to 2023, on February 12, 2024, AbbVie borrowed $5.0 billion under the term loan credit agreement.
  sentences:
  - What percentage of U.S. dialysis patient service revenues in 2023 came from Medicare and Medicare Advantage plans?
  - What is Peloton Interactive, Inc. known for in the interactive fitness industry?
  - What was the purpose stated by AbbVie for borrowing $5.0 billion under the term loan credit agreement on February 12,
    2024?
- source_sentence: Chipotle retains an independent third-party compensation consultant each year to conduct a pay equity analysis
    of its U.S. and Canadian workforce, including factors of pay such as grade level, tenure in role, and external market
    conditions like geographic location, to ensure consistency and equitable treatment among employees.
  sentences:
  - How does Chipotle ensure pay equity among its employees?
  - How can one locate information on legal proceedings within the Consolidated Financial Statements?
  - What criteria did the independent audit use to assess the effectiveness of internal control over financial reporting at
    the company?
