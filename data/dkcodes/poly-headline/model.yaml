widgetData:
- source_sentence: USGS reports all earthquakes below magnitude 8.0 this quarter
  sentences:
  - Megaquake by September 30? A "megaquake" is defined as an earthquake with a magnitude of 8.0 or greater. This market will
    resolve to “Yes” if 1 or more earthquakes with a magnitude of 8.0 or higher occur anywhere on Earth between July 30 and
    September 30, 2025, 11:59 PM ET. Otherwise, this market will resolve to “No”. The resolution source for this market is
    the United States Geological Survey (USGS) Earthquake Hazards Program (https://earthquake.usgs.gov/earthquakes/browse/significant.php#sigdef).
    If an earthquake of substantial size has occurred within this market's timeframe but not yet appeared on the resolution
    source, this market may remain open until October 7, 2025, 11:59 PM ET, or until the earthquake in question otherwise
    appears on the resolution source. If such an earthquake has not appeared on the resolution source by that date, another
    credible resolution source will be used. After a qualifying earthquake is registered, this market will remain open for
    24 hours to account for any revisions to its recorded magnitude. After 24 hours, this market will resolve according to
    the latest provided data.
  - Will "Elio" Opening Weekend Box Office be less than $20m? This market will resolve according to how much “Elio” (2025)
    will gross domestically on its opening weekend. The “Box Office” https://www.the-numbers.com/movie/Elio(2025)#tab=box-office
    will be used to resolve this market once the values for the 3-day opening weekend (June 20 - June 22) are final (i.e.
    not studio estimates). If the reported value falls exactly between two brackets, then this market will resolve to the
    higher range bracket. Please note, this market will resolve according to the The Numbers figures provided under Weekend
    Box Office Performance for the 3-day weekend (which typically includes Thursday's previews), regardless of whether domestic
    refers to only the USA, or to USA and Canada, etc. If there is no final data available by June 30, 2025, 11:59 PM ET,
    another credible resolution source will be chosen.
  - Researchers Explore Correlation Between Solar Activity and Seismic Events
- source_sentence: VCT Americas Kickoff concludes with Team X
  sentences:
  - 'Will PNAS retract Dan Ariely’s 2012 paper on dishonesty by October 1, 2021? This market will resolve to “Yes” if the
    Proceedings of the National Academy of Sciences issues a formal retraction for Dan Ariely’s 2012 paper “Signing at the
    beginning makes ethics salient and decreases dishonest self-reports in comparison to signing at the end”, https://www.pnas.org/content/109/38/15197.short,
    on or before October 1, 2021, 11:59:59 PM ET. This retraction may be initiated by either PNAS or the original authors
    of the article. Otherwise, this market will resolve to “No.” Note: corrections and partial retractions will also resolve
    to “No.” Only a full retraction of the article will count. The resolution source for this market will be official announcements
    from the Proceedings of the National Academy of Science, see here for a list of retractions https://www.pnas.org/retractions.
    In the event of ambiguity in terms of the market outcome, the market will be resolved in good faith at the sole discretion
    of the Markets Integrity Committee (MIC).'
  - Emerging Valorant Rosters to Watch Ahead of 2025 VCT Events
  - 'Will 2GAME Esports win the VCT 2025 Americas Kickoff? VCT 2025: Americas Kickoff is scheduled to take place January 16
    - February 8, 2025. Find more information about the tournament here: liquipedia.net/valorant/VCT/2025/Americas_League/Kickoff.
    This market will resolve to “Yes” if 2GAME Esports wins this tournament. Otherwise, this market will resolve to “No”.
    If this team is eliminated from the competition based on the official rules of the tournament, this market will resolve
    to “No”. If the winner of VCT 2025: Americas Kickoff is not determined by February 31, 2025, 11:59 PM ET, this market
    will resolve to “No”. The primary resolution source for this market is official information provided directly from the
    VCT (e.g., valorantesports.com/en-US) and official footage of the tournament. However, other credible reporting may also
    be used.'
- source_sentence: Japan’s Central Election Management Council announces Constitutional Democratic Party leads in seats
  sentences:
  - 'MLB: Who will win Toronto Blue Jays v. Tampa Bay Rays, scheduled for August 2, 7:10 PM ET? In the upcoming MLB game scheduled
    for August 2, 7:10 PM ET: If the Toronto Blue Jays win, this market will resolve to “Blue Jays”. If the Tampa Bay Rays
    win, this market will resolve to “Rays”. If the game is not completed by August 9 (11:59:59 PM ET), this market will resolve
    50-50.'
  - Will the Constitutional Democratic Party win the most seats in the 2024 Japanese general election? Early general elections
    are scheduled to be held in Japan on 27 October 2024. This market will resolve to "Yes" if the Constitutional Democratic
    Party (立憲民主党, Rikken-minshutō) controls a greater number of seats in the House of Representatives of the National Diet
    of Japan than any other party after the results of the 2024 Japanese general election are finalized. Otherwise, this market
    will resolve to "No". If the results of this election aren't known by December 31, 2024, 11:59 PM ET, this market will
    resolve to "No". In the case of a tie between this party and any other for the most seats controlled, this market will
    resolve in favor of the party whose listed name comes first in alphabetical order using the English translation version
    of party names. This market's resolution will be based solely on the number of seats won by the listed party, not any
    coalition or alliance of which it may be a part. The primary resolution source for this market will be official information
    from the Japanese government, specifically the Central Election Management Council. However, a consensus of credible media
    reports will also suffice to resolve this market.
  - Tokyo Hosts Annual Democracy Forum Highlighting Japan’s Political History
- source_sentence: US Open official cancels Pegula versus Muchova semifinal match
  sentences:
  - 'US Open: Pegula vs. Muchova Jessica Pegula and Karolina Muchova are scheduled to play each other in a semifinal matchup
    in the US Open Women’s Singles Tournament on September 5, 2024, at 8:30 PM ET. This market will resolve to “Pegula” if
    Jessica Pegula wins her match against Karolina Muchova in the semifinals of the US Open Women’s Singles tournament. This
    market will resolve to “Muchova” if Karolina Muchova wins her match against Jessica Pegula in the semifinals of the US
    Open Women’s Singles tournament. If the match ends in a tie, is canceled, or delayed beyond September 12, 2024, this market
    will resolve to 50-50. The primary resolution source for this market will be official information from the US Open (ex:
    https://www.usopen.org/index.html) including live footage, however a consensus of credible reporting may also be used.'
  - Megaquake in September? A "megaquake" is defined as an earthquake with a magnitude of 8.0 or greater. This market will
    resolve to “Yes” if 1 or more earthquakes with a magnitude of 8.0 or higher occur anywhere on earth between September
    2 and September 30, 2024, 11:59 PM ET. Otherwise this market will resolve to “No”. The resolution source for this market
    is the United States Geological Survey (USGS) Earthquake hazards program (https://earthquake.usgs.gov/earthquakes/browse/significant.php#sigdef).
    If an earthquake of substantial size has occurred within this market's timeframe but not yet appeared on the resolution
    source, this market may remain open until October 7, 2024, 11:59 PM ET, or until the earthquake in question otherwise
    appears on the resolution source. If such an earthquake has not appeared on the resolution source by that date, another
    credible resolution source will be used.
  - Jessica Pegula Trains with New Coach Ahead of Upcoming Tennis Season
- source_sentence: Binance adds $SMOLE to its spot crypto exchange
  sentences:
  - $SMOLE listed on Binance in March? This market will resolve to "Yes" if the crypto token smolecoin ($SMOLE) is listed
    for spot purchase on Binance by March 31, 2024, 11:59 PM ET. Otherwise, this market will resolve to "No". The primary
    resolution source for this market will be Binance, however a consensus of credible reporting will also be used.
  - 'Historical Overview: Binance’s Impact on Global Cryptocurrency Trading Since 2017'
  - 'FDA approves PTC Therapeutics’ Vatiquinone for Friedreich’s ataxia? This market will resolve to "Yes" if the U.S. Food
    and Drug Administration (FDA) grants full or conditional approval for PTC Therapeutics’ Vatiquinone as a treatment for
    Friedreich’s ataxia by August 31, 2025, 11:59 PM ET. Otherwise, this market will resolve to "No." An approval is defined
    as: For new drugs: FDA issuance of an approval letter for a New Drug Application (NDA) or Biologics License Application
    (BLA) For already-marketed drugs seeking new indications: FDA approval of a supplemental NDA (sNDA) or supplemental BLA
    (sBLA) for the specific indication referenced For generic drugs: FDA approval of an Abbreviated New Drug Application (ANDA)
    For biosimilars: FDA approval of a 351(k) application The following constitute qualifying approvals: Standard approval
    (traditional approval based on clinical benefit), Accelerated approval (based on surrogate endpoints), Approval with Risk
    Evaluation and Mitigation Strategy (REMS), Approval with restricted distribution or indication limitations, except compassionate
    use/expanded access programs The following do not constitute qualifying approvals: Approvable letters that require additional
    actions before approval Tentative approvals pending patent or exclusivity expiration FDA requests for additional information
    or studies Extension of Prescription Drug User Fee Amendments dates Approval for compassionate use or expanded access
    programs only Approval only for export or for use outside the United States Emergency Use Authorization (EUA) without
    full approval Complete Response Letters (CRLs) indicating the application cannot be approved in its current form This
    market will immediately resolve to "No" if the FDA issues a Complete Response Letter (CRL) or explicitly declines to approve
    the application. If the drug sponsor withdraws the application before the end of the month, the market will resolve to
    "No" immediately. If the listed drug is approved before the end of the month, the market will resolve to "Yes," regardless
    of potential Advisory Committee votes against approval or later withdrawal of approval. Conditional approvals may include
    post-marketing requirements or commitments and still qualify. The primary resolution source will be official information
    from the FDA; however, a consensus of credible reporting will also be used.'
