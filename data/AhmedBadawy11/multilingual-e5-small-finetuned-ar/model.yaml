widgetData:
- source_sentence: في ديسمبر 2011، الفرقة اختارت اسمها الذي هو إكسو، مع أسماء إكسو-كي للفرقة الكورية وإكسو-إم للفرقة الصينية.
    وتم التعريف عن الأعضاء الأثني عشر بشكل منفرد من خلال 23 تيرز "إعلان" مختلف صدر من ديسمبر 2011 إلى فبراير 2012. وكان كل
    من كاي ولوهان وتاو وتشين، أول أربعة أعضاء يتم التعريف عنهم وقد ظهروا لأول مرة في أول أداء علني لهم في حدث نظام بث سول
    "دايجو دايجون" بتاريخ 29 ديسمبر 2011.
  sentences:
  - من هم أول أربعة الأعضاء اللذين تم التعرف عليهم؟
  - في أي عام إنتهى حكم زين العابدين؟
  - الى ماذا أشار اسم پلشت؟
- source_sentence: يستطيع السرطان أن يصيب كل المراحل العمرية عند الإنسان حتى الأجنة، ولكن تزيد مخاطر الإصابة به كلما تقدم
    الإنسان في العمر. ويسبب السرطان الوفاة بنسبة 13% من جميع حالات الوفاة. ويشير مجتمع السرطان الأمريكي ACS إلى موت 7.6 مليون
    شخص مريض بالسرطان في العالم في عام 2007. كما يصيب السرطان الإنسان فإن أشكال منه تصيب الحيوان والنبات على حد سواء.
  sentences:
  - كم كان عمر اللاعب رونالدو عند فوزه بجائزه الفيفا لكونه افضل لاعب لأول مره؟
  - ما هى نسب الوفاة بالسرطان؟
  - قبل اعتزاله من العب, مع اي فريق قضى الاعب رونالدو اخر سنتين؟
- source_sentence: 'يسرا (10 مارس 1951  -)، ممثلة مصرية، قدمت عدداً كبير من الأعمال في السينما المصرية والدراما التلفزيونية،
    وهي سفيرة نوايا حسنة لبرنامج الأمم المتحدة الإنمائي. بدأت حياتها السينمائية في أواخر السبعينيات القرن العشرين، مع أول
    ظهور لها عام 1973 على الشاشة الفضية، تبرر عملها في بداياتها ببعض الأفلام التي قد لا ترقى إلى مستوى فني جيد بقولها: «عندما
    بدأت كانت بداخلي شحنة كبيرة للتمثيل، وكان مجرد تفريغها يرضيني، وشيئا فشيئا أدركت الفرق بين الانتشار والاختيار»، قبل الأشتغال
    في مجال الفن والسينما، استمر مشوارها مع السينما المصرية من فيلم لآخر حتى استطاعت أن تكتسب شعبية كبيرة في أواخر الثمانينيات
    القرن العشرين ومطلع تسعينيات القرن العشرين، ومنها مجموعة من الأفلام التي وقفت فيها أمام الفنان عادل إمام، وتتحدث دوماً
    عن تأثير المخرج يوسف شاهين والفنان عادل إمام على مشوارها الفني حيث تعاملت مع المخرج يوسف شاهين لأول مرة من خلال فيلم حدوتة
    مصرية، أما عادل إمام فقد مثلا معا لأول مرة من خلال فيلم شباب يرقص فوق النار في عام 1978، وقدمت بعدها معه نحو 15 فيلماً.'
  sentences:
  - أين ولد عنترة؟
  - متى ولدت يسرا؟
  - في أي عام إستقلت الأردن من فلسطين الإنتدابية؟
- source_sentence: 'في صباح اليوم التّالي اجتمع الرّسول الكريم في قبيلة قريش وأخبرهم بما حصل معه، فقال أكثر النّاس: والله
    هذا الأمر لبيّن، وإنّ الرّسول لصادق ٌ آمين، وإنّ العير لتطرد شهرآ من مكّة إلى الشام مدبرة، وشهراً مقبلة، وقال بعضهم: إنّ
    هذا القول لا يصدّق أفيذهب محمّدٌ ويرجع إلى مكّة في ليلة واحدة؟! فارتدّ كثيرٌ ممّن كان قد أسلم، وذهب النّاس إلى أبي بكر،
    فقالوا له: يا أبا بكر إنّ صاحبك محمّد يزعم أنّه قد جاء من بيت المقدس وصلّى فيه ورجع إلى مكّة، فقال لهم أبو بكر: إنّكم
    تكذبون على رسول الله، فقالوا: بلى، ها هو الرّسول في المسجد يحدّث الناس بما حدث معه، فقال أبو بكر: والله لئن كان قال هذا
    الكلام لقد صدق، فما العجب من ذلك! فوالله إنّه ليخبرني أنّ الخبر يأتيه من الله من السّماء إلى الأرض في ساعةٍ من ليلٍ أو
    نهار فأصدّقه، فهذا أبعد ممّا تعجبون منه.'
  sentences:
  - متى أخبر الرسول قبيلة قريش ما حصل معه؟
  - من ابوه؟
  - لماذا قال انها مبررة؟
- source_sentence: 'إنْجِلْترا أو إنْكِلْترا (بالإنجليزية: ) هي أكبر دولة في المملكة المتحدة وتشترك في الحدود البرية مع اسكتلندا
    في الشمال وويلز في الغرب والبحر الأيرلندي في الشمال الغربي وبحر الكلت في الجنوب الغربي وبحر الشمال في الشرق، وتفصلها القناة
    الإنجليزية عن القارة الأوروبية جنوبًا. ويتكون البر الرئيسي من إنجلترا من الأجزاء الوسطى والجنوبية من جزيرة بريطانيا العظمى
    في شمال المحيط الأطلسي، كما تشمل أيضًا أكثر من 100 جزيرة صغيرة، مثل جزر سيلي وجزيرة وايت.'
  sentences:
  - ما الامثلة لجزر انجلترا؟
  - فى اى بلد نشأ عيد الام؟
  - ماهي طبيعية النظام السياسي في النمسا؟
