widgetData:
- source_sentence: بدأت الحقبة النفطية بالكويت عام 1936 حينما اكتشف أول بئر نفط في منطقة بحرة شمال الكويت، إلا أن النفط المكتشف
    لم يكن بكميات تجارية حتى اكتشف حقل برقان والذي توقف العمل به 1942 بسبب ظروف الحرب العالمية الثانية؛ ومع انتهاء الحرب عادت
    اعمال الحفر بالحقل لتصدر أول شحنة نفط في 30 يونيو سنة 1946. من الناحية الاقتصادية، تعد الكويت أحد أهم منتجي ومصدري النفط
    في العالم، فتمتلك خامس أكبر احتياطي نفطي في العالم، حيث يتواجد في أرضها 10% من احتياطي النفط بالعالم، ويمثل النفط والمنتجات
    النفطية ما يقرب من 87% من عائدات التصدير و80% من الإيرادات الحكومية. تعدّ الكويت من البلدان ذات الدخل المرتفع بحسب تصنيف
    البنك الدولي. تعود أسباب تلك القوة الاقتصادية إلى ضخامة الناتج المحلي الإجمالي (تعادل القدرة الشرائية) 167.9 مليار دولار،
    ونصيب الفرد المرتفع من الناتج المحلي الإجمالي الذي بلغ قرابة 45,455 دولار أمريكي في عام 2011، محتلة بذلك المركز الثامن
    عالمياً، والثاني عربياً من حيث الناتج المحلي الإجمالي.
  sentences:
  - ما اهم الفتوحات فى عهد الدولة الاموية؟
  - كم يبلغ الناتج المحلى للكويت عام 2011؟
  - لماذا قام ملك المغرب بزيارة عدد من الدول الإفريقية سنة 1980؟
- source_sentence: 'ترامادول (بالإنجليزية: Tramadol) هو مسكن ألم مركزي له مفعول مقارب للكودايين، وهو نظير هذا الأخير. ويصنف
    ضمن مسكنات الألم من النوع 2. يؤثر على نفس مستقبلات المورفين، وهو منافس على المستقبلات المورفينية.'
  sentences:
  - ما هو الاستخدام الاساسي لدواء الترامادول؟
  - لماذا سميت كرة القدم عام 1863 بكرة قدم الاتحاد؟
  - متى بدأ تصدير البترول؟
- source_sentence: 'زين الدين يزيد زيدان (بالفرنسية: Zinédine Zidane)، (مواليد 23 يونيو 1972 في مارسيليا)، هو لاعب كرة قدم
    فرنسي من أصل جزائري، ينحدر من مدينة بجاية بـ منطقة القبائل بـ الجزائر، منذ اعتزاله للعب أصبح يعمل مدربًا كرة قدم لحساب
    نادي ريال مدريد كمدرب ومدير فني للفريق قبل أن يعلن استقالته رسميًا. ولد في مارسيليا لأبوين جزائريين، يُعد زيدان واحد من
    الأساطير في تاريخ كرة القدم بشهادة العديد من الخبراء، أحرز مع منتخب بلاده كأس العالم وأتبعه بكأس أمم أوروبا ثم كأس القارات،
    حصل على جائزة أفضل لاعب في العالم 3 مرات، وعلى مستوى الأندية حقق مع نادي ريال مدريد دوري أبطال أوروبا مرة عام 2002 وكأس
    العالم للأندية 2002 وكأس السوبر الأوروبية. تم التصويت له كأفضل لاعب في الخمسين سنة الماضية في القارة الأوروبية وقد اختاره
    بيليه ضمن قائمة أفضل 125 لاعب حي في مارس 2004.'
  sentences:
  - الى اى منطقة ترجع جذور الدروز؟
  - متى ولد زين الدين زيدان؟
  - من انشأه
- source_sentence: القمر هو القمر الطبيعي الوَحيد للأرض  بالإضافة إلى أنه خامس أكبر قمرٍ طبيعيٍ في المجموعة الشمسية. فهو يُعَدُ
    أكبر قمرٍ طبيعيٍ في المجموعة الشمسية من ناحية نسبة حجمه إلى كوكبه التابع له، حيث أن قطره يصل إلى ربع قطر الأرض، كما أن
    كتلته تصل إلى 1 على 81 من كتلة الأرض، هذا بالإضافة إلى أنه يُعَدُ ثاني أعلى قمرٍ من ناحية الكثافة بعد قمر إيو.
  sentences:
  - أين تقع موريطانيا؟
  - متى بدأت دراسة فن الصوت و الموسيقى؟
  - كم يبلغ قطره؟
- source_sentence: محلياً، ليفربول هو ثاني أكثر الأندية الإنجليزية فوزاً بلقب الدوري بـ18 بطولة متأخراً عن مانشستر يونايتد
    ببطولتين الذي فاز بلقب بالدوري 20 مرة. أيضاً حصل ليفربول على بطولة دوري لانكشاير وحيدة في عام 1892، وفاز بلقب الدوري الدرجة
    الثانية 4 مرات. أما على مستوى الكؤوس فقد حصد الفريق على 15 لقباً في كأس الدرع الخيرية، و 7 ألقاب في كأس الإتحاد الإنجليزي،
    و 8 ألقاب في كأس الرابطة الإنجليزية. ليصبح بذلك مجموع بطولاته المحلية حوالي 54 لقباً. بعد تأسيس النادي ليفربول في عام
    1892، شارك في دوري كرة القدم في السنة التي تلتها. وتعتبر الفترة الأكثر نجاحاً لليفربول كانت في السبعينات و الثمانينات،
    عندما قاد بيل شانكلي وبوب بيزلي النادي لتحقيق أحد عشر لقب دوري و سبع كؤوس أوربية. ليفربول لديه منافسات طويلة مع جاره إيفرتون
    ومانشستر يونايتد. يلعب الفريق بالملابس الحمراء منذ عام 1964 عندما غير بيل شانكلي ملابس الفريق من القميص الأحمر و السروال
    الأبيض إلى اللون الأحمر. نشيد النادي هو "لن تسير لوحدك أبدا" والتي يقوم الجمهور بغنائها قبل بداية كل مباراة على أرضه.
    يلعب النادي في ملعبه الأنفيلد منذ تأسيسه.
  sentences:
  - في كم من بطولة  فاز نادي ليفيربول بلقب الدوري؟
  - هل من الممكن أن تفشل عمليات اصلاح غشاء البكارة؟
  - متى فاز المنتخب الايطالى بالبطولة مرتين متتاليتين؟
