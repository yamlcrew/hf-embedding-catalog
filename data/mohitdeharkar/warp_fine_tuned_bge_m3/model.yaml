- source_sentence: Marketing with TikTok
  sentences:
  - "In this Specialization, we show you techniques to increase price realization and maximize profits. Learn from Boston\
    \ Consulting Group's global pricing experts and University of Virginia Darden School of Business faculty, who share the\
    \ frameworks, tips and tools we use in our business and research environments. We will look at pricing through BCG's proprietary\
    \ and time-tested three “lenses”—cost and economics, customer value, and competition—to build your understanding of the\
    \ strategic power of pricing. You’ll leave the Specialization with a portfolio-building presentation that demonstrates\
    \ your ability to price strategically.\nApplied Learning Project\nUtilizing the concepts, tools and techniques taught\
    \ in each course—from basic techniques of economics to knowledge of customer segments, willingness to pay, and customer\
    \ decision making to analysis of market prices, share, and industry dynamics—you will practice setting profit maximizing\
    \ prices to improve price realization in a variety of real-world scenarios. \n Beginner"
  - "This program is for anyone asking, “Is TikTok right for my business?” In the first course, Understanding TikTok and Its\
    \ Users, you’ll be introduced to the TikTok platform, including who’s on it and what they’re creating. Then in the second\
    \ course, Marketing on TikTok, you'll learn how businesses use TikTok, how they tailor content to the platform, and how\
    \ they find an audience. In the final course, Advertising and E-commerce on TikTok, you’ll learn how to create a marketing\
    \ strategy for TikTok, how to create advertising campaigns, how to promote and sell products via organic and e-commerce\
    \ channels like Shopify, and how to use analytics to inform future marketing strategies. Throughout the program, you will\
    \ have the chance to create your own videos, as well as engage with what other businesses are doing by studying various\
    \ TikTok accounts in order to get inspiration and insight for your own future interactions with TikTok.\nBy the end of\
    \ this program, you will be able to: \nCreate fun and engaging TikTok videos\nUnderstand how TikTok fits into your business’s\
    \ marketing strategy\nArticulate how a number of different businesses use TikTok\nCreate original content using hashtags,\
    \ trends, filters, and more\nBuild and maintain a brand presence on TikTok\nCreate a content calendar\nUtilize TikTok\
    \ Ads Manager to create and execute a campaign\nSet up e-commerce integration into your TikTok account\nAnalyze data from\
    \ your efforts to inform your future content strategy\n\nApplied Learning Project\nLearners will practice creating advertisements\
    \ on TikTok through guided simulations. These simulations recreate the TikTok advertising platform and allow learners\
    \ to engage with the platform in a practice environment before creating ads with their own accounts.\n Beginner"
  - "In this course, you will explore the foundations upon which modern-day ESG was built, how market forces react to ESG,\
    \ and ways to create and maintain value using ESG investment strategies. You will also learn about the five pathways of\
    \ materiality, and how those interplay with or against ESG performance.\nYou will examine the many challenges that corporations\
    \ face when it comes to leveraging ESG investing into their portfolios, and how the changing landscape of ESG is making\
    \ this an area of untapped potential when it comes to the financial workings of businesses today. You'll also learn from\
    \ real-life case studies how you can assess risk, create better risk management policy, and build a map to identify valuable\
    \ areas of opportunity and create better decision-making approaches. Lastly, you will look at portfolio optimization and\
    \ the utilization of ESG factors to maximize returns in addition to examining different funds, their fee structures, and\
    \ how investors can blend ESG into their investment portfolio.\n\nBy the end of this course, you will know the best practices\
    \ for creating a solid risk management plan and how to create a culture that is sensitive to ESG. You will better understand\
    \ the history and framework behind ESG, and how to create a path forward using smarter methods to identify risk, navigate\
    \ ESG issues, and reach ESG investing goals.\n Intermediate"
- source_sentence: AWS Cloud Technical Essentials
  sentences:
  - "Are you in a technical role and want to learn the fundamentals of AWS? Do you aspire to have a job or career as a cloud\
    \ developer, architect, or in an operations role? If so, AWS Cloud Technical Essentials is an ideal way to start. This\
    \ course was designed for those at the beginning of their cloud-learning journey - no prior knowledge of cloud computing\
    \ or AWS products and services required!\nThroughout the course, students will build highly available, scalable, and cost\
    \ effective application step-by-step. Upon course completion, you will be able to make an informed decision about when\
    \ and how to apply core AWS services for compute, storage, and database to different use cases. You’ll also learn about\
    \ cloud security with a review of AWS' shared responsibility model and an introduction to AWS Identity and Access Management\
    \ (IAM). And, you’ll know how AWS services can be used to monitor and optimize infrastructure in the cloud.\n\nAWS Cloud\
    \ Technical Essentials is a fundamental-level course and will build your competence, confidence, and credibility with\
    \ practical cloud skills that help you innovate and advance your professional future. Enroll in AWS Cloud Technical Essentials\
    \ and start learning the technical fundamentals of AWS today!\n\nNote: This course was designed for learners with a technical\
    \ background. If you are new to the cloud or come from a business background, we recommend completing AWS Cloud Practitioner\
    \ Essentials (https://www.coursera.org/learn/aws-cloud-practitioner-essentials) before enrolling in this course.\n Beginner"
  - "In a 2018 survey of businesses, Buffer found that only 29% had effective social media marketing programs.    A recent\
    \ survey of consumers by Tomoson found 92% of consumers trust recommendations from other people over brand content, 70%\
    \ found consumer reviews to be their second most trusted source, 47% read blogs developed by influencers and experts to\
    \ discover new trends and new ideas and 35% used blogs to discover new products and services.  Also, 20% of women who\
    \ used social considered products promoted by bloggers they knew.   Today, businesses and consumers use social media to\
    \ make their purchase decisions.\nCreated in 2014, this Specialization is updated every quarter to ensure you are receiving\
    \ the most up-to-date training.  The Social Media Marketing Specialization is designed to achieve two objectives.  It\
    \ gives you the social analytics tools, and training to help you become an influencer on social media.  The course also\
    \ gives you the knowledge and resources to build a complete social media marketing strategy – from consumer insights to\
    \ final justification metrics.  In each course, you will also receive special toolkits with timely information & when\
    \ you pay for the Capstone, you receive a market planning toolkit.\nEach of the individual courses can be audited for\
    \ free. To see more, visit each course: 1-What is Social?Opens in a new tab, 2-The Importance of ListeningOpens in a new\
    \ tab, 3-Engagement & Nurture Marketing StrategiesOpens in a new tab, 4-Content, Advertising & Social IMCOpens in a new\
    \ tab, 5-The Business of SocialOpens in a new tab.\n Beginner"
  - "This specialization will provide learners with the fundamentals and history of ESG investing, and a close examination\
    \ of the set of investment approaches that are informed by environmental, social and, governance factors. You'll about\
    \ the five pathways of materiality, and how those interplay with or against ESG performance. You'll review the concepts\
    \ of positive and negative screening and identify the ESG factors that cause investors to divest from or negatively screen\
    \ certain assets. \nNext, you'll review private environmental governance, the active role that private companies are playing\
    \ in combating climate change, and the parallels between the public and private sectors. Lastly, you'll evaluate the effectiveness\
    \ of corporate authenticity and the impacts of politics when building corporate ESG policy, and the importance of creating\
    \ independent Directors to maintain neutrality and protect stakeholder interests. \nBy the end of this specialization,\
    \ you will know the best practices for creating a solid risk management plan, analyzed the complex indexing and measurement\
    \ techniques employed in the ESG space, examined climate disclosures and implementation of climate solutions, and how\
    \ social activism affects the corporate world in the 21st century. \nApplied Learning Project\nEach course module in this\
    \ Specialization culminates in an assessment. These assessments are designed to check learners' knowledge and to provide\
    \ an opportunity for learners to apply course concepts such as investment analytics, indexing tools, and critical analysis\
    \ of ESG policies, activism, and greenwashing.\nThe assessments will be cumulative and cover the fundamentals of ESG investing,\
    \ public and private governance, and sustainability factors that will allow you to build a diverse and risk-resilient\
    \ ESG portfolio.\n Beginner"
- source_sentence: Six Sigma Yellow Belt
  sentences:
  - "This specialization gives current or aspiring IT professionals an overview of the features, benefits, and capabilities\
    \ of Amazon Web Services (AWS). As you proceed through these four interconnected courses, you will gain a more vivid understanding\
    \ of core AWS services, key AWS security concepts, strategies for migrating from on-premises to AWS, and basics of building\
    \ serverless applications with AWS. Additionally, you will have opportunities to practice what you have learned by completing\
    \ labs and exercises developed by AWS technical instructors.\nApplied Learning Project\nThis specialization gives current\
    \ or aspiring IT professionals an overview of the features, benefits, and capabilities of Amazon Web Services (AWS). As\
    \ you proceed through these four interconnected courses, you will gain a more vivid understanding of core AWS services,\
    \ key AWS security concepts, strategies for migrating from on-premises to AWS, and basics of building serverless applications\
    \ with AWS. Additionally, you will have opportunities to practice what you have learned by completing labs and exercises\
    \ developed by AWS technical instructors.\n Beginner"
  - "This specialization is for you if you are looking to learn more about Six Sigma or refresh your knowledge of the basic\
    \ components of Six Sigma and Lean. Six Sigma skills are widely sought by employers both nationally and internationally.\
    \ These skills have been proven to help improve business processes, performance, and quality assurance. \nIn this specialization,\
    \ you will learn proven principles and tools specific to six sigma and lean.\nThis is a sequential, linear designed specialization\
    \ that covers the introductory level content (at the \"yellow belt\" level) of Six Sigma and Lean. Yellow Belt knowledge\
    \ is needed before advancing to Green Belt (which is a second specialization offered here on Coursera by the USG). Green\
    \ Belt knowledge is needed before moving to a Black Belt.\nThe proper sequence of this specialization is:\nCourse #1 -\
    \ Six Sigma Fundamentals\nCourse #2 - Six Sigma  Tools for Define and Measure\nCourse #3 - Six Sigma  Tools for Analyze\n\
    Course #4 - Six Sigma  Tools for Improve and Control\nAt the end of Course #4 (Six Sigma  Tools for Improve and Control),\
    \ there is a peer-reviewed, capstone project. Successful completion of this project is necessary for full completion of\
    \ this specialization.\nIt should be noted that completing either the Yellow Belt or Green Belt Specializations does not\
    \ give the learner \"professional accreditation\" in Six Sigma. However, successful completion will assist in better preparation\
    \ for such professional accreditation testing.\nApplied Learning Project\nUpon completion of this specialization, learners\
    \ will have created a project charter, project team charter, data collection plan, process map, along with null and alternative\
    \ hypotheses, problem statement, business case, goal statement, process and scope description, and timeline. All these\
    \ will be created using the six sigma principles and tools they learned.\n Beginner"
  - "Around the world, we find ourselves facing global epidemics of obesity, Type 2 Diabetes and other predominantly diet-related\
    \ diseases. To address these public health crises, we urgently need to explore innovative strategies for promoting healthful\
    \ eating. There is strong evidence that global increases in the consumption of heavily processed foods, coupled with cultural\
    \ shifts away from the preparation of food in the home, have contributed to high rates of preventable, chronic disease.\
    \ In this course, learners will be given the information and practical skills they need to begin optimizing the way they\
    \ eat. This course will shift the focus away from reductionist discussions about nutrients and move, instead, towards\
    \ practical discussions about real food and the environment in which we consume it. By the end of this course, learners\
    \ should have the tools they need to distinguish between foods that will support their health and those that threaten\
    \ it. In addition, we will present a compelling rationale for a return to simple home cooking, an integral part of our\
    \ efforts to live longer, healthier lives.\nView the trailer for the course here: https://www.youtube.com/watch?v=z7x1aaZ03xU\n\
    \ Beginner"
- source_sentence: Goodwill® Career Coach and Navigator
  sentences:
  - "Perhaps the most important thing students and professionals of all kinds can do to improve their effectiveness is embrace\
    \ the following advice: become good with words.\nThis series of courses targets the writing side of that recommendation.\
    \ The skills it focuses on include everything from how to arrange a complex set of information in a reader-friendly way,\
    \ to how to give and receive high-quality feedback, to how to consistently hit deadlines.  \nPart of Professor Barry’s\
    \ proceeds from this course will be donated to the COVID-19 relief efforts of Ozone HouseOpens in a new tab, a shelter\
    \ for homeless youth in Southeastern Michigan where he regularly conducts job-training workshops. These proceeds come\
    \ from purchases of the version of the course that earns you a certificate. The course remains free for anyone who is\
    \ simply auditing. \n Beginner"
  - "Kickstart your learning of Python with this beginner-friendly self-paced course taught by an expert. Python is one of\
    \ the most popular languages in the programming and data science world and demand for individuals who have the ability\
    \ to apply Python has never been higher.  \nThis introduction to Python course will take you from zero to programming\
    \ in Python in a matter of hours—no prior programming experience necessary! You will learn about Python basics and the\
    \ different data types. You will familiarize yourself with Python Data structures like List and Tuples, as well as logic\
    \ concepts like conditions and branching. You will use Python libraries such as Pandas, Numpy & Beautiful Soup. You’ll\
    \ also use Python to perform tasks such as data collection and web scraping with APIs.  \n\nYou will practice and apply\
    \ what you learn through hands-on labs using Jupyter Notebooks. By the end of this course, you’ll feel comfortable creating\
    \ basic programs, working with data, and automating real-world tasks using Python.  \n\nThis course is suitable for anyone\
    \ who wants to learn Data Science, Data Analytics, Software Development, Data Engineering, AI, and DevOps as well as a\
    \ number of other job roles.\n Beginner"
  - "This is the sixth course in the Google Data Analytics Certificate. These courses will equip you with the skills needed\
    \ to apply to introductory-level data analyst jobs. You’ll learn how to visualize and present your data findings as you\
    \ complete the data analysis process. This course will show you how data visualizations, such as visual dashboards, can\
    \ help bring your data to life. You’ll also explore Tableau, a data visualization platform that will help you create effective\
    \ visualizations for your presentations. Current Google data analysts will continue to instruct and provide you with hands-on\
    \ ways to accomplish common data analyst tasks with the best tools and resources.\nLearners who complete this certificate\
    \ program will be equipped to apply for introductory-level jobs as data analysts. No previous experience is necessary.\n\
    \nBy the end of this course, you will:\n - Examine the importance of data visualization.\n - Learn how to form a compelling\
    \ narrative through data stories.\n - Gain an understanding of how to use Tableau to create dashboards and dashboard filters.\n\
    \ - Discover how to use Tableau to create effective visualizations. \n - Explore the principles and practices involved\
    \ with effective presentations.\n - Learn how to consider potential limitations associated with the data in your presentations.\n\
    \ - Understand how to apply best practices to a Q&A with your audience.\n Beginner"
- source_sentence: Machine Learning Engineering for Production (MLOps)
  sentences:
  - "The future of making is here, bringing with it radical changes in the way things are designed, made, and used. And it’s\
    \ disrupting every industry. With the right knowledge and tools, this disruption is your opportunity—whether you're an\
    \ entrepreneur, designer, or engineer. \nToday’s dominant technology trends—cloud computing, mobile technology, social\
    \ connection, and collaboration—are driving businesses and consumers alike to explore profoundly different ways to design,\
    \ make, and use things. This kind of industry transformation has happened before, but the pace of change is now much faster.\
    \ In today’s competitive landscape, anyone can be an innovator—and it’s all about who innovates first. \nThrough this\
    \ specialization, you will learn the foundations of product innovation and digital manufacturing while developing your\
    \ technical skills within Autodesk® Fusion 360™.\nPlus, by completing this Specialization, you’ll unlock an Autodesk Credential\
    \ as further recognition of your success! The Autodesk Credential comes with a digital badge and certificate, which you\
    \ can add to your resume and share on social media platforms like LinkedIn, Facebook, and Twitter. Sharing your Autodesk\
    \ Credential can signal to hiring managers that you’ve got the right skills for the job and you’re up on the latest industry\
    \ trends like digital manufacturing.\nLooking for Autodesk Fusion 360 certification prep courses? Check out additional\
    \ learning resourcesOpens in a new tab to help you uplevel your skills.\nApplied Learning Project\nLearners will create\
    \ a search and rescue drone inspired by the XVEIN droneOpens in a new tab designed by student makers Yuki Ogasawara and\
    \ Ryo Kumeda. These project-based courses offer learners the opportunity to apply their Autodesk® Fusion 360™ skills,\
    \ and encourages them to explore new approaches to customizing their own drone design for manufacture.\n Beginner"
  - "Este certificado de cinco cursos, desenvolvido pelo Google, inclui um currículo inovador projetado para prepará-lo para\
    \ uma função de nível básico em suporte de TI. Uma posição na área de TI pode ser um serviço de apoio pessoalmente ou\
    \ remoto em uma pequena empresa ou em uma empresa global como o Google. Se você já lida com TI por algum tempo, ou é novo\
    \ no campo, você veio ao lugar certo. O programa faz parte do Cresça com o Google, uma iniciativa do Google para ajudar\
    \ a criar oportunidades econômicas.\nAtravés de uma mistura de palestras em vídeo, questionários e laboratórios e widgets\
    \ práticos, o programa apresentará soluções de problemas e atendimento ao cliente, redes, sistemas operacionais, administração\
    \ de sistemas e segurança. Ao longo do caminho, você aprenderá de Googlers com históricos exclusivos cuja base no suporte\
    \ de TI serviu como um ponto de partida para suas carreiras.\nAo dedicar 5 horas por semana, você pode concluir o certificado\
    \ em cerca de seis meses. Você pode pular o conteúdo que já sabe e fazer mais cedo os exames de avaliação.\nO conteúdo\
    \ do Certificado Profissional de Suporte em TI do Google está sob a Licença Internacional de Atribuição 4.0 da Creative\
    \ Commons.\n75% dos alunos que obtêm os Certificados do Google nos Estados Unidos relatam uma melhora em suas carreiras\
    \ dentro de um intervalo de 6 meses após a obtenção da certificação.\nFonte: *baseado nas respostas de pesquisa com os\
    \ graduados pelo programa, Estados Unidos, 2021\nApplied Learning Project\nEste certificado de cinco cursos, desenvolvido\
    \ pelo Google, inclui um currículo inovador projetado para prepará-lo para uma função de nível básico em suporte de TI.\
    \ Uma posição na área de TI pode ser um trabalho de serviço de apoio em pessoa ou remoto em uma pequena empresa ou em\
    \ uma empresa global como o Google. Se você já lida com TI por algum tempo, ou é novo no campo, você veio ao lugar certo.\
    \ O programa faz parte do Grow with Google, uma iniciativa do Google para ajudar a criar oportunidades econômicas.\n Beginner"
  - "Understanding machine learning and deep learning concepts is essential, but if you’re looking to build an effective AI\
    \ career, you need production engineering capabilities as well. \nEffectively deploying machine learning models requires\
    \ competencies more commonly found in technical fields such as software engineering and DevOps. Machine learning engineering\
    \ for production combines the foundational concepts of machine learning with the functional expertise of modern software\
    \ development and engineering roles. \nThe Machine Learning Engineering for Production (MLOps) Specialization covers how\
    \ to conceptualize, build, and maintain integrated systems that continuously operate in production. In striking contrast\
    \ with standard machine learning modeling, production systems need to handle relentless evolving data. Moreover, the production\
    \ system must run non-stop at the minimum cost while producing the maximum performance. In this Specialization, you will\
    \ learn how to use well-established tools and methodologies for doing all of this effectively and efficiently.\nIn this\
    \ Specialization, you will become familiar with the capabilities, challenges, and consequences of machine learning engineering\
    \ in production. By the end, you will be ready to employ your new production-ready skills to participate in the development\
    \ of leading-edge AI technology to solve real-world problems.\nApplied Learning Project\nBy the end, you'll be ready to\n\
    • Design an ML production system end-to-end: project scoping, data needs, modeling strategies, and deployment requirements\n\
    • Establish a model baseline, address concept drift, and prototype how to develop, deploy, and continuously improve a\
    \ productionized ML application\n• Build data pipelines by gathering, cleaning, and validating datasets\n• Implement feature\
    \ engineering, transformation, and selection with TensorFlow Extended\n• Establish data lifecycle by leveraging data lineage\
    \ and provenance metadata tools and follow data evolution with enterprise data schemas\n• Apply techniques to manage modeling\
    \ resources and best serve offline/online inference requests\n• Use analytics to address model fairness, explainability\
    \ issues, and mitigate bottlenecks\n• Deliver deployment pipelines for model serving that require different infrastructures\n\
    • Apply best practices and progressive delivery techniques to maintain a continuously operating production system\n Advanced"
