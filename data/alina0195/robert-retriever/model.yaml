widgetData:
- source_sentence: Populația orașului Mirabel din Canada
  sentences:
  - "Mustique (pronunțat /mÊCVstiË\x90k/) este o insulă privată mică, care face parte din Sf. Vincent și Grenadinele. Insula\
    \ este una dintre insulele numite Grenadinele, majoritatea aflate în Sf. Vincent și Grenadinele, în Indiile de Vest. Insula\
    \ se află în Parohia Grenadinele, o zonă administrativă a țării. Istoria insulei Mustique și a insulelor Grenadine în\
    \ general datează din secolul al XV-lea, când marinari spanioli au zărit pentru prima oară acest grup de mici insule stâncoase\
    \ și le-au botezat Los Pajaros (păsări), deoarece semănau cu un mic cârd de păsări care zboară deasupra mării."
  - La momentul recensământului din 2006, Mirabel avea o populație de 34.626 de locuitori. Populația din Mirabel reprezintă
    0,46% din totalul populației Quebec-ului (care număra 7.546,131 de locuitori la acel moment). Cu o populație de 34.626
    de locuitori în 2006, cea a Mirabel a crescut cu 26,77% față de recensământul din 2001 (care a numărat 27.315 de locuitori).
  - Montreal, Quebec, încorporat ca oraș în 1832, are o populație de 1.704.694 (conform recensământului din 2016) și 1.649.519
    (conform recensământului din 2011). Montreal este al doilea oraș al Canadei ca mărime și găzduiește aproape jumătate din
    populația provinciei Quebec. Este metropola provinciei și a fost cel mai populat oraș din Canada timp de un secol și jumătate.
- source_sentence: Ce este vaccinul Havrix?
  sentences:
  - HAVRIX este un vaccin indicat pentru imunizarea activă împotriva bolilor cauzate de virusul hepatitei A (HAV). HAVRIX
    este aprobat pentru utilizare la persoanele cu vârste de 12 luni și peste. Imunizarea primară trebuie administrată cu
    cel puțin 2 săptămâni înainte de expunerea preconizată la HAV. (1)
  - Vezi toate rezultatele pentru ceasul inteligent Garmin. 1 Garmin vivoactive Black. 2 Garmin Vivoactive HR GPS Smart Watch,
    potrivire obișnuită - Negru (Certificat recondiționat) de Garmin. 3 Garmin Fenix 3 HR, Gri. Amazon's Choice recomandă
    produse de înaltă calitate și la prețuri accesibile, disponibile spre livrare imediată. Garmin vivoactive HR GPS Smart
    Watch, potrivire obișnuită - Negru.
  - Vaccinul se administrează sub formă de injecție în mușchiul deltoid al brațului. Atât vaccinul Havrix, cât și cel Vaqta
    oferă o protecție eficientă împotriva hepatitei A. Există și un vaccin combinat, numit vaccinul hepatita B-hepatita A
    (Twinrix), care protejează atât împotriva hepatitei A, cât și a celei B.
- source_sentence: Orele de funcționare ale Rockwall
  sentences:
  - Rockwall County Helping Hands este principalul furnizor de servicii sociale pentru locuitorii comitatului Rockwall. De
    peste 40 de ani, agenția a adus o schimbare în viețile locuitorilor comitatului Rockwall. Citește mai mult.
  - 'Magazinul din apropiere: 1 Best Buy - Rockwall Program de lucru: 10:00 - 22:00 (la 0,5 mile distanță) 2 Walmart - Interstate
    30 Program de lucru: 24 de ore (la 1,4 mile distanță) 3 RadioShack - Rockwall Rockwall Village Program de lucru: 10:00
    - 21:00 (la 1,7 mile distanță) 4 Lowe''s - Rockwall Program de lucru: 06:00 - 22:00 (la 1,8 mile distanță) 5 Kroger -
    Rockwall Program de lucru: 06:00 - 01:00 (la 2,0 mile distanță)'
  - 'Definiția pe care o dă studentul pentru CURS. [număr] 1. : o discuție sau un discurs adresat unui grup de oameni cu scopul
    de a-i învăța despre un anumit subiect. o prelegere despre/privind politica. Ea plănuiește să susțină o serie de prelegeri
    despre artă modernă. Se așteaptă ca câteva sute de persoane să participe la prelegere.'
- source_sentence: Unde este centrul de imagistică UCSD?
  sentences:
  - Centrul de imagistică avansată din La Jolla. Pe 3 februarie 2008, Departamentul de Radiologie al UC San Diego a deschis
    un nou centru de imagistică prin rezonanță magnetică (IRM) în La Jolla. Noul centru, botezat UCSD Imaging Center at La
    Jolla, este deschis publicului și oferă acces la corpul profesoral de radioterapie de renume mondial al universității.
  - DK este o grosime a firelor din Marea Britanie (și poate Australia, dar nu sunt sigur de asta)... Grosimea DK sau cea
    a firelor duble este mai groasă decât cea a firelor sport și mai subțire decât cea a firelor grobiene. Iată intervalele
    de grosime pentru o mostră de 4 ochiuri pe rând. Numărul de ochiuri reprezintă numărul de ochiuri pe o lungime de 4 inci.
  - Baptist M&S Imaging deschide un nou centru în Schertz. Baptist M&S Imaging va deschide al zecelea centru în decembrie,
    în Schertz. Centrul va oferi medicilor și rezidenților o gamă completă de servicii medicale radiologice în partea de nord-est
    a orașului, inclusiv tehnologie de imagistică care nu se poate găsi în niciun alt loc din San Antonio.
- source_sentence: La ce folosește testarea genotipică a microsateliților?
  sentences:
  - Creare pe desktop. 1 Faceți clic pe Registru în partea superioară a oricărei pagini Walmart.com. 2 Faceți clic pe Creați
    sub Registru pentru bebeluși sau Registru pentru nuntă. 3 Introduceți informațiile solicitate și faceți clic pe Continuare.
    4 Dacă vi se solicită, conectați-vă sau creați un cont. 5 Ați terminat! 6 După ce găsiți un articol pe care doriți să-l
    adăugați, faceți clic pe Adăugați la registru și articolul va fi adăugat.
  - Microsateliții sunt adesea numiți repetiții tandem scurte (STR) de către geneticații medico-legiști sau repetiții de secvență
    simple (SSR) de către geneticații de plante. Aceștia sunt folosiți pe scară largă pentru profilarea ADN-ului în analiza
    de rudenie și identificarea medico-legală. Microsatelitul este o secvență de ADN repetitiv în care anumite motive de ADN
    (cu o lungime cuprinsă între 2 și 5 perechi de baze) sunt repetate de obicei de 5-50 de ori.
  - Genotiparea micro-satelitilor se referă la genotiparea repetitiilor tandem, precum repetitiile scurte în tandem (STR)
    sau repetitiile nucleotidice variabile în tandem (VNTR), care sunt loci de ADN polimorfice prezente pe tot genomul. Genotiparea
    micro-satelitilor este un instrument larg acceptat pentru o varietate de aplicații, inclusiv studii de cartografiere a
    legaturilor, studii de asociere și identificarea organismelor. Chimia cu cinci coloranți a companiei Applied Biosystems
    crește numărul de markeri micro-satelit pe care îi poate procesa un singur capilar, permițând o productivitate sporită.
    Figura 1 prezintă un exemplu de 18 loci micro-satelit co-electroforezați într-un singur capilar. Chimia cu cinci coloranți
    a companiei Applied Biosystems crește numărul de markeri micro-satelit pe care îi poate procesa un singur capilar, permițând
    o productivitate sporită. Figura 1 prezintă un exemplu de 18 loci micro-satelit co-electroforezați într-un singur capilar.
