  - 'suddenly she came upon a little three - legged table, all made of solid glass ; there was nothing on it except a tiny
    golden key, and alice ’ s first thought was that it might belong to one of the doors of the hall ; but, alas! either the
    locks were too large, or the key was too small, but at any rate it would not open any of them. however, on the second
    time round, she came upon a low curtain she had not noticed before, and behind it was a little door about fifteen inches
    high : she tried the little golden key in the lock, and to her great delight it fitted!'
  - the hatter shook his head mournfully. ‘ not i! ’ he replied. ‘ we quarrelled last march — just before he went mad, you
    know — ’ ( pointing with his tea spoon at the march hare, ) ‘ — it was at the great concert given by the queen of hearts,
    and i had to sing
- source_sentence: The Mock Turtle corrected Alice about the crumbs and had the Gryphon explain that whitings hold their tails
    in their mouths because they were thrown far out to sea during the dance.
  sentences:
  - the long grass rustled at her feet as the white rabbit hurried by — the frightened mouse splashed his way through the
    neighbouring pool — she could hear the rattle of the teacups as the march hare and his friends shared their never - ending
    meal, and the shrill voice of the queen ordering off her unfortunate guests to execution — once more the pig - baby was
    sneezing on the duchess ’ s knee, while plates and dishes crashed around it — once more the shriek of the gryphon, the
    squeaking of the lizard ’ s slate - pencil, and the choking of the suppressed guinea - pigs, filled the air, mixed up
    with the distant sobs of the miserable mock turtle.
  - ‘ well, then, ’ the gryphon went on, ‘ if you don ’ t know what to uglify is, you are a simpleton. ’
  - ‘ the reason is, ’ said the gryphon, ‘ that they would go with the lobsters to the dance. so they got thrown out to sea.
    so they had to fall a long way. so they got their tails fast in their mouths. so they couldn ’ t get them out again. that
    ’ s all. ’
- source_sentence: Alice exclaims "Curiouser and curiouser!" as she grows to over nine feet tall, her head hitting the roof.
    Alice plans to mail gifts to her own feet. Alice then takes the golden key and goes to the garden door.
  sentences:
  - 'alice was beginning to get very tired of sitting by her sister on the bank, and of having nothing to do : once or twice
    she had peeped into the book her sister was reading, but it had no pictures or conversations in it, ‘ and what is the
    use of a book, ’ thought alice ‘ without pictures or conversation? ’'
  - 'just then her head struck against the roof of the hall : in fact she was now more than nine feet high, and she at once
    took up the little golden key and hurried off to the garden door.'
  - 'first came ten soldiers carrying clubs ; these were all shaped like the three gardeners, oblong and flat, with their
    hands and feet at the corners : next the ten courtiers ; these were ornamented all over with diamonds, and walked two
    and two, as the soldiers did. after these came the royal children ; there were ten of them, and the little dears came
    jumping merrily along hand in hand, in couples : they were all ornamented with hearts. next came the guests, mostly kings
    and queens, and among them alice recognised the white rabbit : it was talking in a hurried nervous manner, smiling at
    everything that was said, and went by without noticing her. then followed the knave of hearts, carrying the king ’ s crown
    on a crimson velvet cushion ; and, last of all this grand procession, came the king and queen of hearts.'
- source_sentence: The King of Hearts dismisses the Hatter. As the Hatter leaves, the Queen of Hearts orders his execution,
    but he is already out of sight.
  sentences:
  - the hatter shook his head mournfully. ‘ not i! ’ he replied. ‘ we quarrelled last march — just before he went mad, you
    know — ’ ( pointing with his tea spoon at the march hare, ) ‘ — it was at the great concert given by the queen of hearts,
    and i had to sing
  - ‘ you may go, ’ said the king, and the hatter hurriedly left the court, without even waiting to put his shoes on.
  - very soon the rabbit noticed alice, as she went hunting about, and called out to her in an angry tone, ‘ why, mary ann,
    what are you doing out here? run home this moment, and fetch me a pair of gloves and a fan! quick, now! ’ and alice was
    so much frightened that she ran off at once in the direction it pointed to, without trying to explain the mistake it had
    made.
