    and i had to sing
- source_sentence: After the Queen of Hearts shouts 'Off with her head!', Alice, at her full size, retorts 'You’re nothing
    but a pack of cards!', causing them to attack her and break the dream.
  sentences:
  - ‘ who cares for you? ’ said alice, ( she had grown to her full size by this time. ) ‘ you ’ re nothing but a pack of cards!
