      улсын бүртгэлийн асуудал хариуцсан төрийн захиргааны байгууллагад хуулийн 20.6-д заасан мэдээллийг гурав хоногийн дотор
      хүргүүлэхээр зохицулдаг.
    - Хөрөнгө, орлогын мэдүүлэг гаргагчийн хөрөнгө, орлогын өөрчлөлтийн талаархи мэдүүлгийг Авлигын эсрэг хуулийн Хөрөнгө,
      орлогын мэдүүлэг гаргах зүйл дэх заалт зохицуулдаг. Энэ заалтад мэдүүлэг гаргагч мэдүүлгээ мэдүүлсний дараа хөрөнгө,
      орлогод тохиолдсон тодорхой хэмжээний өөрчлөлтийг 30 хоногийн дотор мэдүүлэх үүрэг заасан байдаг.
