widgetData:
- source_sentence: Түр арбитрыг байгуулах эрх хэнэд хамаардаг вэ? Арбитрын тухай хууль?
  sentences:
  - Амьтны тухай хуулийн зүйл 5.3.2-т заасан ан агнуурын менежментийн төлөвлөгөөнд агнуурын бүс нутгийн хэмжээ, хил хязгаарыг
    аймаг, сум, нийслэл, дүүргийн хэмжээнд тогтоож өгсөн байна.
  - 'Арбитрын тухай хуулийн Зүйл: Арбитрын төрөл-д зааснаар түр арбитрыг байгуулах эрх талуудад хамаардаг. Талууд харилцан
    тохиролцсон журмын дагуу түр арбитрыг байгуулж болно.'
  - Амьтан, ургамал, түүхий эд, бүтээгдэхүүнийг улсын хилээр нэвтрүүлэх тухай хуулийн дагуу, хуулийн 18.2 дахь хэсэгт заасан
    нөхцөлийг хангаагүй илгээмжийг илгээгчид мэдэгдэж буцаах эсвэл устгах арга хэмжээ авна.
- source_sentence: Арбитрын тухай хуульд зааснаар, түр арга хэмжээ авах нөхцөл ямар тохиолдолд хэрэглэгдэх вэ?
  sentences:
  - Авлигын эсрэг хуулийн Авлигатай тэмцэх газрын чиг үүрэг, бүрэн эрх тухай зүйл дээр Авлигатай тэмцэх газар Улсын ерөнхий
    прокурорын шийдвэрээр тодорхой хэргийг шалгах эрхтэй болохыг дурдсан байна. Улсын ерөнхий прокурорын шийдвэр нь Авлигатай
    тэмцэх газрын хэрэг шалгах эрхийг батална.
  - Арбитрын тухай хуулийн зүйл 2-ын дагуу хэрэглэгчийн эрхтэй холбоотой маргааны арбитрын хэлэлцээрийг гагцхүү бичгээр тусад
    нь байгуулах бөгөөд энэ нь хэлэлцээрийн хууль ёсны хүчин чадварыг баталгаажуулдаг.
  - Арбитрын тухай хуулийн зүйл Түр арга хэмжээ авах нөхцөл нь арбитрын бүрэлдэхүүн шаардлагатай гэж үзсэн тохиолдолд хэрэглэгдэх
    бөгөөд энэ тохиолдолд Арбитрын тухай хуулийн 19.2.4-т заасан арга хэмжээ авахуулах тухай хүсэлтэд 20.1.1, 20.1.2-т заасан
    нөхцөл нэгэн адил хамаарна.
- source_sentence: Амьтны тухай хуульд зааснаар, зөрчил гаргагчид ногдуулсан торгууль, нөхөн төлбөрийн хэмжээний ямар хувь
    иргэнийг урамшуулах мөнгөн шагналын хэмжээг тооцоход ашиглагдах вэ?
  sentences:
  - Амьтны тухай хууль тогтоомж зөрчсөн этгээдийг илрүүлсэн, илрүүлэхэд туслалцаа үзүүлсэн буюу түүний тухай мэдээлэл өгсөн
    иргэнд уг мэдээлэл нь батлагдсан тохиолдолд зөрчил гаргагчид ногдуулсан торгууль, нөхөн төлбөрийн хэмжээний 15 хувиар
    тооцож мөнгөн шагналыг сум, дүүргийн Засаг дарга олгоно.
  - Аймаг, нийслэл, сум, дүүргийн иргэдийн төлөөлөгчдийн хурлын сонгуулийн тухай хуулийн Сонгуулийн хорооны ажлын зохион байгуулалт
    зүйлийн заалт нь сонгуулийн хороод нь шаардлагатай тохиолдолд ажлын бус өдөр болон илүү цагаар ажиллаж болно гэж заасан
    бөгөөд шаардлагатай тохиолдол нь хуульд тодорхой заагдаагүй байна.
  - Арбитрын тухай хуулийн Арбитрын үндсэн шийдвэрт засвар оруулах, тайлбарлах, нэмэлт шийдвэр гаргах заалтад арбитрын үндсэн
    шийдвэрийг хүлээн авснаас хойш 30 хоногийн дотор хүсэлт гаргах хугацааг тооцохдоо арбитрын үндсэн шийдвэрийг тал нь хүлээн
    авсан өдрийн дараагийн өдрөөс эхлэн тооцоно.
- source_sentence: Аймаг, нийслэл, сум, дүүргийн иргэдийн төлөөлөгчдийн хуралын сонгуулийн зардал ямар хөрөнгөөс бүрдэнэ?
  sentences:
  - Аймаг, нийслэл, сум, дүүргийн иргэдийн төлөөлөгчдийн хуралын сонгуулийн тухай хуулийн дагуу сонгуулийн зардал нь хандив,
    намын өөрийн хөрөнгө, нэр дэвшигчийн өөрийн хөрөнгө гэсэн гурван үндсэн хөрөнгөөс бүрдэнэ.
  - Аймаг, нийслэл, сум, дүүргийн иргэдийн төлөөлөгчдийн хурлын сонгуулийн тухай хуулийн зүйл нь Сонгуулийн ерөнхий хороог
    улсын бүртгэлийн асуудал хариуцсан төрийн захиргааны байгууллагад хуулийн 20.6-д заасан мэдээллийг гурав хоногийн дотор
    хүргүүлэхээр зохицулдаг.
  - Хөрөнгө, орлогын мэдүүлэг гаргагчийн хөрөнгө, орлогын өөрчлөлтийн талаархи мэдүүлгийг Авлигын эсрэг хуулийн Хөрөнгө, орлогын
    мэдүүлэг гаргах зүйл дэх заалт зохицуулдаг. Энэ заалтад мэдүүлэг гаргагч мэдүүлгээ мэдүүлсний дараа хөрөнгө, орлогод тохиолдсон
    тодорхой хэмжээний өөрчлөлтийг 30 хоногийн дотор мэдүүлэх үүрэг заасан байдаг.
- source_sentence: Нийслэлийн Иргэдийн Төлөөлөгчдийн Хурлын сонгуулийн тойргийг байгуулахдаа ямар нөхцлийг хангасан байх ёстой
    вэ? Аймаг, Нийслэл, Сум, Дүүргийн Иргэдийн Төлөөлөгчдийн Хурлын сонгуулийн тухай хууль?
  sentences:
  - Аймаг, Нийслэл, Сум, Дүүргийн Иргэдийн Төлөөлөгчдийн Хурлын сонгуулийн тухай хуулийн зүйл нь Нийслэлийн иргэдийн Төлөөлөгчдийн
    Хурал-ын сонгуулийг явуулахад хоёр буюу хэд хэдэн хороог нэгтгэн нэг тойрог болгон зохион байгуулж болно гэж тодорхойлсон
    бөгөөд энэ нь тойргийн байгуулалтын нөхцлийг заана.
  - Ахмад настны тухай хуулийн Аж ахуйн нэгж, байгууллага, албан тушаалтны хүлээх үүрэг тухай зүйл дээр зааснаар, Эрүүл мэндийн
    асуудал эрхэлсэн төрийн захиргааны төв байгууллага насжилтын судалгааны төв, ажиллах боловсон хүчнийг бэлтгэх, тусгайлсан
    төсөл, төлөвлөгөө боловсруулж хэрэгжүүлэх үүрэгтэй.
  - Авлигын эсрэг хуульд зааснаар Монгол Улсын Ерөнхийлөгч олон нийтийн зөвлөлийн ажиллах журмыг батална. Ерөнхийлөгчийн эрх
    хэмжээ нь хуулийн дагуу зөвлөлийн үйл ажиллагааг зохицуулах, хууль ёсны дагуу ажиллах нөхцөлийг хангах явдал юм.
