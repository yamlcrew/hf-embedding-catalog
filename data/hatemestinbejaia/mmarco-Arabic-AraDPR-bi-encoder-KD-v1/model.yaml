widgetData:
- source_sentence: من هو زوج صوفيا فيرغارا
  sentences:
  - 'عرض كل الصور ( 52 ) صوفيا فيرجارا متزوجة حاليا من جو مانجانييلو . لقد كانت في تسع علاقات مع المشاهير بمتوسط حوالي 3 .
    1 سنوات لكل منها . كان متوسط زواجها 2 . 2 سنة لكل منهما . الاسم المعطى : صوفيا مارجريتا فيرجارا .'
  - ما الذي ترمز إليه السلطة الفلسطينية في Lawyer Name PA ؟ وباستخدام هذه الطريقة ، فإن PA تعني النقابة المهنية . السلطة الفلسطينية
    هي شركة مكونة من محترفين مثل المحامين وأطباء الأسنان والأطباء .
  - تشير معاني DH DH عموما إلى الزوج العزيز أو الزوج الحبيب . عادة ، هذا شكل من أشكال المودة المكتوبة التي تستخدمها الزوجات
    على الإنترنت عند الإشارة إلى أزواجهن .
- source_sentence: أين الفيفا
  sentences:
  - هل تخطط لزيارة روسيا لحضور كأس القارات 2017 FIFA أو كأس العالم FIFA 2018 ؟ [رابط] هي البوابة السياحية للحكومة الروسية
    وتزود المشجعين الذين يسافرون إلى روسيا بمعلومات مفيدة عن الدولة المضيفة لكأس العالم FIFA المقبلة .
  - '1 أصغر لاعب أرجنتيني سجل في نهائيات كأس العالم FIFA : عمره 18 عاما و 357 يوما في عام 2006 ضد صربيا والجبل الأسود . 2
    أصغر لاعب بلغ 100 مباراة دولية في تاريخ الكونميبول ( 27 عاما ، 361 يوما ) .'
  - Hotels Near Creation Museum مزيد من المعلومات . . يقع مقر متحف Creation في مدينة بطرسبورغ بولاية كنتاكي . من خلال الأموال
    الخاصة لبناء المتحف ، بدأ Young Earth Creationists ( YEC ) المتحف في عام 2011 . مفتوح للجمهور ، تم إنشاء متحف Creation
    لتعزيز وتثقيف الزوار حول نظرية الخلق التي تشرح أصل الأرض . الخلق كما يرويه التفسير الحرفي لسفر التكوين التوراتي .
- source_sentence: ما هي صمامات الفراشة المستخدمة
  sentences:
  - سوف يتصل بك المختبر قائلا إن الأنبوب لم يكن ممتلئا وستتساءل عن السبب . تختلف إبر الفراشة لجمع الدم عن إبر الفراشة للوريد
    في أنها تحتوي على إبرة مغطاة بالغمد في النهاية حتى تتمكن من إرفاقها بحامل الفراغ وثقب الأنابيب .
  - 1 قم دائما بشحن جهازك قبل مغادرة المنزل ، خاصة في الرحلات الطويلة . 2 أحضر الشاحن معك إذا كنت ستغادر طوال الليل أو لفترة
    طويلة . 3 بينما من المقرر أن تدوم بطارية iPad حتى 10 ساعات ، فإن الاستخدام المتكرر سيقصر هذا الوقت بشكل كبير . كيفية إطالة
    عمر بطارية جهاز iPad . تماما كما هو الحال مع iPhone أو iPod Touch ، سيكون عمر بطارية iPad أقصر أثناء الاستخدام الكثيف
    . ومع ذلك ، هناك بعض الإجراءات التي يمكنك اتخاذها للحفاظ على جهازك قيد التشغيل ونشطا لساعات من الاستمتاع ، وتوضح هذه المقالة
    ما يمكنك القيام به لإطالة عمر البطارية .
  - صمامات AWWA الفراشة عبارة عن صمامات سريعة الفتح تتكون من قرص دائري معدني أو ريشة مع محاورها المحورية بزوايا قائمة لاتجاه
    التدفق في الأنبوب ، والتي عند تدويرها على عمود ، تسد المقاعد في جسم الصمام . تستخدم عادة كصمامات خنق للتحكم في التدفق
    .
- source_sentence: ما هو طلاء تمبرا
  sentences:
  - يحفظ . غالبا ما يشار إليه باسم طلاء الملصقات ، وهو عبارة عن صبغة مائية ممزوجة بعامل ربط كيميائي . يستخدم على نطاق واسع
    لمشاريع الأطفال والحرف اليدوية بسبب مرونته وألوانه الزاهية وسهولة استخدامه . يتوفر طلاء تمبرا أيضا في مسحوق ، والذي يصبح
    جاهزا للطلاء عند مزجه بالماء .
  - يتم تحديث ألوان الطلاء الأكثر مبيعا لدينا يوميا لمنحك أحدث اتجاهات ألوان الطلاء . تحقق من ألوان الطلاء الأكثر شيوعا لدينا
    وابحث عن اللون المناسب لك . يتم تحديث ألوان الطلاء الأكثر مبيعا لدينا يوميا لمنحك أحدث اتجاهات ألوان الطلاء . تحقق من
    ألوان الطلاء الأكثر شيوعا لدينا وابحث عن اللون المناسب لك .
  - 'لغة إجرائية . تم التحديث : 04 - 26 - 2017 بواسطة . اللغة الإجرائية هي لغة برمجة كمبيوتر تتبع بالترتيب مجموعة من الأوامر
    . من أمثلة اللغات الإجرائية للكمبيوتر BASIC و C و FORTRAN و Pascal . شروط البرمجة'
- source_sentence: تحديد المسح
  sentences:
  - المسح أو مسح الأراضي هو تقنية ومهنة وعلم تحديد المواقع الأرضية أو ثلاثية الأبعاد للنقاط والمسافات والزوايا بينها . يطلق
    على أخصائي مسح الأراضي اسم مساح الأراضي .
  - جمعية إعادة تأهيل العظام ( ORA ) هي فريق من المتخصصين في العلاج الطبيعي في كولورادو سبرينغز . سيساعدك هؤلاء المتخصصون
    في التغلب على القيود الجسدية لمساعدتك على العودة إلى أعلى مستوى ممكن من الوظائف .
  - إجمالي المحطات . تعد المحطات الإجمالية واحدة من أكثر أدوات المسح شيوعا المستخدمة اليوم . وهي تتألف من جهاز ثيودوليت إلكتروني
    ومكون إلكتروني لقياس المسافة ( EDM ) . تتوفر أيضا محطات روبوتية كاملة تتيح التشغيل لشخص واحد من خلال التحكم في الجهاز
    باستخدام جهاز التحكم عن بعد . تاريخ
