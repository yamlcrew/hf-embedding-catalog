- source_sentence: أين تم تصوير مسلسل حديقة الحيوان
  sentences:
  - تم توجيه فيديو Come Undone بواسطة Julien Temple . تم تصوير لقطات للفرقة في حوض السمك في حديقة حيوان لندن . كانت تتخللها
    صور قصيرة لأشخاص يتراجعون بطرق مختلفة .
  - First Lido Condominium هو مجتمع جميل يقع في الطرف الجنوبي ، مباشرة على الشاطئ الأصلي ليدو كي في ساراسوتا ، فلوريدا . كان
    مجمع الوحدات السكنية ، الواقع في 1900 Ben Franklin Drive ، أول مجمع سكني تم بناؤه على شاطئ Lido في عام 1967 . يتمتع First
    Lido بإطلالات واسعة على خليج المكسيك ، وغروب الشمس الخلاب ورمال السكر البيضاء . يوفر First Lido جوا ودودا مريحا ومسبحا
    ساخنا يتم تدفئته على مدار العام وموظفي الصيانة في الموقع وخدمة الإنترنت اللاسلكي . .
  - امرأة تغمى على مجموعة من . CBS New Series ' Zoo ' الآن تصوير وتوظيف . مسلسل تلفزيوني جديد على شبكة سي بي اس Zoo يصور الآن
    في نيو أورلينز ، لويزيانا . وفقا ل Deadline ، تعمل شبكة سي بي إس على مسلسل تلفزيوني جديد مبني على فيلم جيمس باترسون الأكثر
    مبيعا في العالم . تتمحور حديقة الحيوانات حول عالم شاب منشق مجبر على حل اللغز وراء سلسلة الهجمات العنيفة الأخيرة على الحيوانات
    التي تجتاح الكوكب .
- source_sentence: ما هو صافي ثروة فانا وايت ؟
  sentences:
  - قصف هيروشيما وناجازاكي . في 6 أغسطس 1945 ، أسقطت الولايات المتحدة قنبلة ذرية ( ليتل بوي ) على هيروشيما في اليابان . بعد
    ثلاثة أيام ، ألقيت قنبلة ذرية ثانية ( فات مان ) على مدينة ناغازاكي ، وكانت هذه هي المرات الوحيدة التي استخدمت فيها الأسلحة
    النووية في الحرب ، وأسباب القصف ، وقصف هيروشيما وناجازاكي . في 6 أغسطس 1945 ، أسقطت الولايات المتحدة قنبلة ذرية ( ليتل
    بوي ) على هيروشيما في اليابان . بعد ثلاثة أيام ، أسقطت قنبلة ذرية ثانية ( فات مان ) على مدينة ناغازاكي . كانت هذه هي المرات
    الوحيدة التي استخدمت فيها الأسلحة النووية في الحرب . أسباب القصف .
  - تقدر ثروة فانا ماري روزيش المولودة ب 15 مليون دولار . روزيش ، المعروفة شعبيا باسم فانا وايت ، هي شخصية تلفزيونية أمريكية
    وممثلة سينمائية اشتهرت باسم مضيفة Wheel of Fortune منذ عام 1982 . وقد كسبت White ثروتها بصفتها مضيفة Wheel of Fortune
    منذ عام 1982 حتى الآن . ارتفعت شهرة White ؟ ؟ يعود تاريخها عندما ظهرت النسخة المجمعة من Wheel of Fortune لأول مرة في سبتمبر
    1983 .
  - بولا وايت نت وورث ولدت بولا ميشيل فور في 20 أبريل 1966 ، في توبيلو ، ميسيسيبي بالولايات المتحدة الأمريكية ، وكما تعرف
    باولا وايت بأنها عازفة تلفزيونية مسيحية ومشهورة تلفزيونية ومؤسس مشارك ل اقرأ المزيد ؟ ؟
- source_sentence: أين ولد ه ب أبيض
  sentences:
  - بولا وايت نت وورث ولدت بولا ميشيل فور في 20 أبريل 1966 ، في توبيلو ، ميسيسيبي بالولايات المتحدة الأمريكية ، وكما تعرف
    باولا وايت بأنها عازفة تلفزيونية مسيحية ومشهورة تلفزيونية ومؤسس مشارك ل اقرأ المزيد ؟ ؟
  - الكاتب | الممثل . إ . ب . ولد وايت في 11 يوليو 1899 في ماونت فيرنون ، نيويورك ، الولايات المتحدة الأمريكية باسم إلوين
    بروكس وايت . كان كاتبا وممثلا ، اشتهر ب Stuart Little ( 1999 ) ، Stuart Little 2 ( 2002 ) و Charlotte ' s Web ( 2006 )
    . كان متزوجا من كاثرين الرقيب أنجيل . توفي في 1 أكتوبر 1985 في نورث بروكلين ، مين ، الولايات المتحدة الأمريكية .
  - 'اذهب إلى : نظرة عامة ( 3 ) | ميني بيو ( 1 ) | الزوج ( 4 ) | التوافه ( 33 ) | اقتباسات شخصية ( 2 ) ولد غلين كامبل في 22
    أبريل 1936 في ديلايت ، أركنساس ، الولايات المتحدة الأمريكية باسم جلين ترافيس كامبل . وهو متزوج من كيم كامبل منذ 25 أكتوبر
    1982 . ولهما ثلاثة أطفال . كان متزوجا سابقا من سارة ديفيس وبيلي جان نونلي وديان كيرك .'
- source_sentence: كيف كان الاتحاد السوفياتي قادرا على تطوير القنبلة الذرية
  sentences:
  - تختلف الإجابة حسب مصدر اللحوم ووزن وصحة الشخص ومقدار التمارين التي يمارسها والجنس وما إلى ذلك . ومع ذلك ، يجب أن يأكل
    الشخص البالغ ما بين 5 و 6 أونصات من اللحوم عالية الجودة أو البروتين يوميا ، وتختلف الإجابة حسب مصدر اللحوم ووزن وصحة الشخص
    ومقدار التمارين التي يمارسها والجنس وهكذا دواليك . ومع ذلك ، يجب أن يأكل الشخص البالغ العادي ما بين 5 و 6 أونصات من اللحوم
    عالية الجودة أو البروتين يوميا .
  - بعد أربعة أيام من اختتام المؤتمر ، ألقت الولايات المتحدة قنبلة ذرية على هيروشيما في اليابان ؛ في 9 أغسطس ، تم إلقاء قنبلة
    أخرى على ناغازاكي . انتهت الحرب العالمية الثانية رسميا في 14 أغسطس 1945 .
  - 'المشروع السوفياتي لتطوير قنبلة ذرية ( الروسية : '' '' · '' '' '' كان برنامج بحث وتطوير سري للغاية بدأ خلال الحرب العالمية
    الثانية ، في في أعقاب اكتشاف الاتحاد السوفيتي للمشروع النووي الأمريكي والبريطاني والكندي ، سارع السوفييت بالبرنامج بعد
    القصفين الذريين الأمريكيين لهيروشيما وناجازاكي . تم تكليف المشروع الذري السوفيتي بجمع المعلومات الاستخبارية حول مشروع
    الطاقة النووية الألماني وكذلك الجهود النووية الأمريكية .'
- source_sentence: ماونت بيكر نشط
  sentences:
  - 'تم تعديل خريطة هيئة المسح الجيولوجي الأمريكية هذه من : Hyde and Crandell ، 1978 ، USGS Professional Paper 1022 - C وتظهر
    لقطة مقربة لجبل بيكر وضواحيها ، بما في ذلك أنهار Nooksack و Skagit و Baker . تأثر نهر بيكر في أسفل اليمين بشدة بانفجار
    جبل بيكر عام 1792 .'
  - تمتلك Mount Baker ثاني أكثر فوهة بركانية نشاطا حراريا في سلسلة Cascade Range بعد Mount Saint Helens . يقع جبل بيكر على
    بعد حوالي 31 ميلا ( 50 كم ) شرق مدينة بيلينجهام ، مقاطعة واتكوم ، وهو أصغر بركان في حقل جبل بيكر البركاني . وإلى الجنوب
    من سياتل ( وفي الأيام الصافية تاكوما ) بواشنطن . عرف السكان الأصليون الجبل منذ آلاف السنين ، لكن أول سجل مكتوب للجبل هو
    من الإسبانية .
  - 'وجد أيضا في : القاموس ، قاموس المرادفات ، الاصطلاحات ، الموسوعة ، ويكيبيديا . تفاصيل . تفاصيل مطالبة أو عناصر منفصلة
    للحساب . عندما يتم تفصيلها في شكل منظم لغرض إبلاغ المدعى عليه ، فإن البيان يسمى فاتورة التفاصيل .'
