widgetData:
- source_sentence: الاختلاف السرقة السطو
  sentences:
  - على عكس السطو ، يتم فرض تهمة السرقة إذا أخذ الفرد وحمل قطعة من الممتلكات التي لا تخصه بغرض حرمان المالك من الحيازة .
  - يستغرق شحن Oral - B 5000 40 دقيقة لتنظيفه مرة واحدة فقط بعد أن تبدأ البطارية في الإشارة إلى أنها منخفضة . لإعادة شحن الوحدة
    بالكامل ، يستغرق الأمر ما يقرب من 24 ساعة ، وهي ليست مشكلة بالنسبة لي لأنني لا أستخدمها إلا في الصباح .
  - المشاهد الأولية هي المكان الذي وقعت فيه الجريمة بالفعل ( اغتصاب ، سطو ، قتل . . ) المشاهد الثانوية حيث يمكن العثور على
    أدلة أخرى ، فيما يتعلق بالمشهد الأولي ( محل إقامة الموضوع ، زقاق في الشارع ، إلخ . . ) المشاهد الأولية هي المكان الذي
    وقعت فيه الجريمة بالفعل ( اغتصاب ، سطو ، قتل . . )
- source_sentence: ما هي السيارات القديمة والكلاسيكية ؟
  sentences:
  - في يونيو 1997 ، تم استبدال العبارات أخيرا بوصلة دائمة ، جسر الكونفدرالية . يعد الجسر أحد أكثر المشاريع الهندسية التي تم
    بناؤها تحديا على الإطلاق . تم الانتهاء من تصميمها وبنائها على مدى 4 سنوات من قبل أكثر من 2000 شخص . الهيكل النهائي ضخم
    . يبلغ طوله حوالي 12 . 9 كيلومترا - بطول 117 ملعب كرة قدم . يزن ما يقرب من 3 . 5 مليار كيلوغرام . إذا كان الشخص العادي
    يزن حوالي 70 كيلوغراما ( 155 رطلا ) ، فإن الجسر يعادل 50000000 شخص - أي أكثر من مرة ونصف عدد سكان كندا !
  - سيارة قديمة . تعتبر سيارة بنتلي سبيد سيكس تورر عام 1926 سيارة بريطانية مشهورة من العصر القديم . السيارة القديمة ، بالمعنى
    العام ، هي سيارة قديمة ، وبالمعنى الضيق لعشاق السيارات وهواة جمعها ، فهي سيارة من الفترة من 1919 إلى 1930 . يمتلك هؤلاء
    المتحمسون مخططات تصنيف لعصور السيارات التي تفرض التمييز بين السيارات العتيقة والسيارات القديمة والسيارات الكلاسيكية وما
    إلى ذلك .
  - نحن السلطة العالمية للمراكب المائية الفاخرة . يمتد تفانينا إلى أربعين عاما وأربعة أجيال . نحافظ على أصالة وحرفية وجمال
    وقيمة الماهوجني العتيق للأجيال القادمة . ( 952 ) 495 - 0007 .
- source_sentence: ما هو شكل الاستنزاف الجغرافي
  sentences:
  - 'رمي في الاستنزاف والتخرج والتوقف والتسرب ، وسرعان ما يدرك المرء سبب وجود الكثير من الجهد والبحث في عالم المثابرة والاحتفاظ
    . [اقرأ : " لماذا تتمتع الدورات التدريبية عبر الإنترنت بمعدلات استبقاء منخفضة - وكيفية تعزيزها . '' ] . بغض النظر عن الجهد
    والبحث المذكور ، لا يزال الالتباس قائما .'
  - من ناحية أخرى ، تنتج جروح الاستنزاف عن الاحتكاك أو الاحتكاك مثل طحن الأسنان . 4 . يحدث التآكل عندما تصطدم إحدى الصخور
    بسطح آخر . يمكن وصف الاستنزاف بأنه شكل من أشكال تآكل الأنهار أو الساحل حيث يتم جرف السطح بعيدا ، وهناك أيضا معنى آخر للاستنزاف
    . يشير الاستنزاف أيضا إلى تخفيض عدد الموظفين في الشركات من خلال العملية المعتادة مثل الاستقالة أو التقاعد . ملخص . 1 .
    يقتصر التآكل على التدمير السطحي . الاستنزاف لا يقتصر على هذا التدمير . 2 .
  - 'فيديو : نيك ستويبرل لديه أطول لسان في العالم . يشارك . يعرض Nick Stoeberl كل لسانه المذهل البالغ طوله 10 . 1 سم لاقتناص
    سجله المليء باللسان . استعد لتندهش من أطول لسان في العالم ! نيك ستويبرل البالغ من العمر 24 عاما من كاليفورنيا بالولايات
    المتحدة الأمريكية لديه حقا الرقم القياسي العالمي لأطول لسان لعق .'
- source_sentence: الفرق بين حزب سياسي ومجموعة المصالح هو أن الهدف الرئيسي
  sentences:
  - '" الفرق بين الحزب السياسي ومجموعة المصالح هو أن الهدف الرئيسي للحزب السياسي هو انتخاب أعضائه في مناصب سياسية . الجواب
    على سؤالك هو " " ب " " . أتمنى أن تكون هذه هي الإجابة التي كنت تبحث عنها وقد ساعدتك . تعليقات . "'
  - تجنب استخدام لغة نمطية أو متحيزة بأي شكل من الأشكال . غالبا ما تحدث اللغة المتحيزة مع نوع الجنس ، ولكنها قد تسيء أيضا
    إلى مجموعات من الأشخاص على أساس التوجه الجنسي أو العرق أو الاهتمام السياسي أو العرق . اللغة النمطية هي أي لغة تفترض صورة
    نمطية عن مجموعة من الناس .
  - ميدلتاون هي مدينة تقع في مقاطعة أورانج ، نيويورك ، الولايات المتحدة . تقع في منطقة وادي هدسون بنيويورك ، بالقرب من نهر
    والكيل وسفوح جبال شاوانجونك . تقع ميدلتاون بين بورت جيرفيس ونيوبورج ، نيويورك . اعتبارا من تعداد الولايات المتحدة لعام
    2010 ، كان عدد سكان المدينة 28 ، 086 ، مما يعكس زيادة قدرها 2 ، 698 من 25 ، 388 محسوبا في تعداد عام 2000 . الرمز البريدي
    هو 10940 . تقع ميدلتاون في منطقة العاصمة نيويورك .
- source_sentence: ماذا تعني كلمة الحمى القرمزية
  sentences:
  - الحمى القرمزية ( Scarletina ) هي حمى معدية تتميز بالتهاب الحلق واندفاع أحمر منتشر على الجلد ، يليه تساقط الجزء السطحي
    من الجلد . يعد التهاب الأذنين والكلى من المضاعفات الشائعة .
  - من ويكيبيديا ، الموسوعة الحرة . سيليكون RTV ( سيليكون تقسية درجة حرارة الغرفة ) هو نوع من مطاط السيليكون مصنوع من نظام
    مكون من عنصرين ( قاعدة بالإضافة إلى العلاج ؛ A + B ) متوفر في نطاق صلابة من النعومة إلى المتوسطة - عادة من 15 Shore A
    إلى 40 Shore . من أجل أن يقوم سيليكون RTV بإعادة إنتاج نسيج السطح ، يتم الاهتمام بنظافة الأصل . يعمل نزع الهواء بالتفريغ
    على إزالة فقاعات الهواء المحبوسة من خليط السيليكون والمحفز لضمان قوة الشد المثلى ، مما يؤثر على أوقات التكاثر .
  - يمكن تصنيف الحمى حسب الأعراض المصاحبة لها وسببها ونمطها . يمكن أن تكون الحمى منخفضة الدرجة ( درجة حرارة الجسم أقل من 101
    درجة فهرنهايت ) أو عالية الدرجة ( درجة الحرارة أعلى من 104 درجة فهرنهايت ) . غالبا ما يساعد نمط الحمى في تشخيص المرض .
    فيما يلي أنواع الحمى وفقا للنمط النموذجي للحمى .
