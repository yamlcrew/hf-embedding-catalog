    \ to re-identify individuals from the model's embeddings.\n\n2. **No Harm, Surveillance, or Discrimination** In line with\
    \ protecting fundamental rights, you will not use this model for:\n  - **Biometric Identification:** Continuous monitoring,\
    \ behavioral profiling, or identification of natural persons.\n  - **Discrimination:** Any purpose that leads to unfair\
    \ treatment of individuals or groups, or exploits vulnerabilities (e.g., age, disability).\n  - **Manipulation:** Coercing\
    \ or exploiting users, particularly vulnerable populations, or infringing on human autonomy.\n  \n3. **Fair Use, Security,\
    \ and Data Minimisation** If you deploy this model, you accept accountability for the processing. You must:\n  - **Minimize\
    \ Data:** Ensure any additional data used with the model is limited, pseudonymised where possible, and securely handled.\n\
    \  - **Be Transparent:** Any research or deployment must clearly state the purpose, limitations, and safeguards implemented\
    \ to protect rights.\n  - **Secure the Deployment:** Implement measures to prevent unauthorized access or adversarial\
    \ attacks on the model.\n\n4. **Redistribution and Access Revocation**\n  - **No Redistribution:** You will not share,\
    \ host, or distribute the model weights or derivatives to users without permission; they must access the model via this\
    \ repository to agree to these terms.\n  - **Dataset Withdrawal:** If any underlying dataset becomes closed or restricted,\
