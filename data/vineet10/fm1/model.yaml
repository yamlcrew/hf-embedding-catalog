widgetData:
- source_sentence: Users are entitled to a refund for excess payments after necessary deductions, provided that payments were
    not processed to a wrong account due to user error.
  sentences:
  - What is the timeline for the delivery of the documentary film as outlined in this contract?
  - Under what circumstances can a user receive a refund for multiple payments made for a single order?
  - What are the Payment Terms for the Batteries?
- source_sentence: Users can contact Customer Care before confirmation to request a refund for offline services or reschedule
    for online services, subject to the platform's discretion.
  sentences:
  - How does Paratalks handle refund requests made before a service professional confirms a booking?
  - How should proprietary and confidential information disclosed under the Agreement be treated by the Parties?
  - When does this Agreement terminate?
- source_sentence: If there is any unreasonable delay in the refund process, the User can report it to Customer Care at contact@paratalks.in
    or +91-9116768791.
  sentences:
  - What should a User do if there is an unreasonable delay in the refund process?
  - What are the confidentiality provisions in this contract?
  - What are the specified payment terms for the photography services under this contract?
- source_sentence: The refund (if permitted by the Platform) shall be processed after deductions, which may include transaction
    charges levied by the bank and/or the payment gateway, as well as any other charges incurred by the Platform for facilitating
    the payment or refund.
  sentences:
  - What are the conditions under which a user is not entitled to a refund according to Paratalks' refund policy?
  - What is the jurisdiction and governing law applicable to this contract?
  - How are refunds processed if permitted by the Platform?
- source_sentence: This Agreement shall be governed by and construed in accordance with the laws of Indiana. Any dispute arising
    out of or in connection with this Agreement shall be resolved through good faith negotiations between the Parties and
    will be subject to the jurisdiction of the courts of Dania.
  sentences:
  - Under what condition will the User not be entitled to a refund if the payment is processed to a wrong Account?
  - What events constitute Force Majeure under this Agreement?
  - Under which laws is the Battery Supply Agreement governed and how are disputes resolved?
