    모니터 사용 여부를 선택할 수 있습니다. (운전자 보조 → 후측방 안전 → 후측방 영상 표시, 사양 적용 시) 후측방 모니터 작동 조작계 방향지시등 스위치 방향지시등 스위치를 조작하여 방향지시등을 켜고 끄면, 후측방
    모니터도 켜지고 꺼집니다. 후측방 모니터 작동 조건 아래 조건에서 후측방 모니터가 작동합니다. - 좌측/우측 방향지시등이 켜질 경우, 해당 방향의 영상이 계기판에 표시됩니다. 해제 조건 • 작동 중인 방향지시등이
