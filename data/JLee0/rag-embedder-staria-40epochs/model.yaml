  - 엔진룸 점검 시 주의 사항 피에조 인젝터는 최대 200V의 고전압을 사용하므로 다음의 사고가 발생할 수 있습니다. • 인젝터 또는 인젝터 배선과의 직접 접촉에 의한 감전, 근육 손상, 신경계 손상 • 인젝터 작동부
    주변 전자기파에 의한 인공 심장 박동기 오작동 시동을 건 상태로 엔진룸을 점검할 때 위의 안전사고에 유의하여 다음을 주의하십시오. • 인젝터, 인젝터 배선, 엔진 컴퓨터를 만지지 마십시오. • 인젝터 커넥터를 분리하지
