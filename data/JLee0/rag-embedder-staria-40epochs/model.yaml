- source_sentence: 스마트폰을 사용해 차량의 시동을 거는 절차는 어떻게 되나요?
  sentences:
  - '디지털 키(스마트폰) 사용 방법: • 도어 잠금/잠금 해제: 등록된 스마트폰의 NFC 안테나를 도어 핸들 인증 패드 중앙에 2초 이상 접촉하면 도어가 잠금 또는 잠금 해제됩니다. 세이프티 언락 기능이 설정된 경우,
    운전석 도어만 먼저 잠금 해제되며, 4초 이내에 다시 접촉하면 모든 도어가 잠금 해제됩니다. • 차량 시동: 스마트폰의 NFC 안테나를 실내 인증 패드(무선 충전 패드) 중앙에 올린 후 브레이크 페달을 밟고 시동
    버튼을 눌러 시동을 거십시오. • 주의사항: 스마트폰의 모바일 데이터 연결이 원활하지 않을 경우 보안 정보 갱신이 실패할 수 있으므로, 카드 키를 사용하거나 모바일 데이터 연결이 원활한 장소에서 재시도하십시오.'
  - 와이퍼 블레이드 블레이드 점검 앞 유리 또는 와이퍼 블레이드가 오염되면 와이퍼의 효율성이 떨어지고 마찰음이 생길 수 있습니다. 오염의 공통적인 원인으로는 벌레, 수액, 일부 상업용 자동 세차기에 의한 왁스 코팅
    칠 등입니다. 와이퍼가 앞 유리창을 잘 닦아내지 못하면, 유리창과 블레이드 고무 표면을 깨끗한 물과 수건 등으로 닦으십시오. 유리창에 묻어 있는 발수 코팅제, 왁스, 유분 등을 주기적으로 닦아 내고 유막 제거제를
    사용하면 더 효과적입니다. 왁스 또는 발수 코팅이 완전히 제거되면 유리 표면에 물방울이 맺히지 않고 고르게 퍼집니다. 주의 • 앞 유리창을 닦을 때 비눗물이나 합성세제를 사용하지 마십시오. 와이퍼 블레이드가 경화되거나,
    와이퍼 작동 시 마찰이 심해 소음이나 떨림이 발생할 수 있습니다. • 앞 유리창이나 와이퍼 블레이드가 얼었다면 와이퍼를 사용하기 전에 완전히 녹이십시오. 언 상태로 와이퍼를 작동하면 블레이드가 손상될 수 있습니다.
    • 앞 유리에 휘발유, 등유, 페인트, 신나 또는 기타 솔벤트 류의 액체를 사용하지 마십시오. 와이퍼 블레이드가 손상됩니다. • 시판되는 유막 제거제는 연마제 성분이 있으니 제품에 표시된 주의 사항을 확인하고 사용하십시오.
    와이퍼 블레이드를 더 오래 사용하려면 다음과 같이 하십시오. • 먼지가 많은 곳이나 비포장도로를 주행한 후 또는 장시간 주행하지 않았을 때 깨끗한 물로 앞 유리창과 와이퍼 블레이드를 닦으십시오. • 주 2회 정도
    정기적으로 와이퍼를 작동하십시오. 오랫동안 와이퍼를 사용하지 않으면 블레이드가 변형되어 소음이나 떨림이 발생할 수 있습니다. 앞 유리창과 블레이드의 오염 물질을 제거해도 다음의 현상이 나타나면 가까운 당사 직영
    하이테크센터나 블루핸즈에서 점검을 받으십시오. • 선이 남거나 깨끗하게 닦이지 않을 때 • 소음이 발생하거나 떨릴 때 • 잔물이 스며들 때 • 유리 표면에 와이퍼 블레이드가 부분적으로 닿지 않을 때 • 와이퍼 암
    장력이 약할 때 블레이드 교체 앞 유리창 와이퍼 블레이드 엔진 시동을 끈 후 20초 이내에 와이퍼가 최상단으로 올라갈 때까지 와이퍼 스위치를 2초 이상 MIST 위치로 올리십시오. 앞유리 와이퍼와 뒷유리 와이퍼가
    동시에 이동합니다. 정지 위치 상태에서도 교체 가능합니다. 1. 와이퍼 암을 세우십시오. 2. 잠금쇠를 세우고 블레이드를 아래로 내려 분리하십시오. 3. 새 와이퍼 블레이드를 장착하십시오. 교체가 완료되면 와이퍼
    암을 내려 유리창에 위치시키고 엔진 시동 후 와이퍼를 1회 작동하여 정상적으로 작동되는지 확인하십시오. 뒷 유리창 와이퍼 블레이드 엔진 시동을 끈 후 20초 이내에 와이퍼가 하단으로 내려갈 때까지 와이퍼 스위치를
    2초 이상 MIST 위치로 올리십시오. 앞유리 와이퍼와 뒷유리 와이퍼가 동시에 이동합니다. 1. 와이퍼 암을 세우십시오. 2. 와이퍼 암과 와이퍼 블레이드가 T자가 되도록 하십시오. 3. 와이퍼 블레이드를 T자에서
    살짝 내린 후 와이퍼 암으로부터 당겨 분리하십시오. 주의 와이퍼 블레이드를 분리할 때 와이퍼 암을 뒤쪽으로 과도하게 힘을 주어 당기면 연결 부위가 파손될 우려가 있으므로 주의하십시오. 4. 새 와이퍼 블레이드의
    가운데 부분을 와이퍼 암의 가운데 홈에 “딸깍” 소리가 날 때까지 확실히 끼워 넣으십시오. 5. 와이퍼 블레이드를 살짝 당겨 확실히 고정되었는지 확인하십시오. 교체가 완료 후 와이퍼를 1회 작동시키면 와이퍼 암이
    제자리로 돌아갑니다. 주의 • 와이퍼 블레이드가 분리된 상태에서 와이퍼 암이 유리창에 닿지 않도록 주의하십시오. 유리창이 파손될 수 있습니다. • 와이퍼 블레이드가 언 상태에서 와이퍼를 작동하거나 와셔액 없이 와이퍼를
    계속 작동하면 약 10초 동안 와이퍼가 작동하지 않을 수 있습니다. 이것은 고장이 아니며 와이퍼 모터의 과부하를 막기 위한 보호 기능입니다. • 앞 유리창을 닦을 때 와이퍼 블레이드를 밖으로 젖힌 후, 호스 등을
    사용해 물을 뿌리고 깨끗한 헝겊으로 닦으십시오. • 유리창 표면에 왁스, 발수 코팅, 유분이 묻어 있으면 와이퍼 작동 시 소음이나 떨림이 발생할 수 있습니다. 이 경우 유막 제거제를 사용해 이물질을 제거하십시오.
  - '세차나 폭우 시 도어 손잡이 센서 인식 방지 기능: • 스마트 키의 잠금 버튼과 잠금 해제 버튼을 동시에 약 4초 이상 길게 누르면 차량의 비상 경고등이 4회 깜빡이며 도어 잠금 및 잠금 해제 방지 기능이 설정됩니다.
    • 이후에는 스마트 키를 휴대하여도 도어 손잡이 센서 인식에 의한 도어 잠금 및 잠금 해제가 되지 않습니다. • 기능을 해제하려면 스마트 키의 잠금 버튼 또는 잠금 해제 버튼을 눌러 도어를 잠그거나 잠금 해제하십시오.'
- source_sentence: 차량의 도어가 자동으로 잠기는 상황에는 어떤 것들이 있나요?
  sentences:
  - '도어: 자동 잠금: • R/N/D단 이동할 때: ‘P’(주차)에서 ‘R’(후진), ‘N’(중립), ‘D’(주행)로 변속하면 자동으로 도어가 잠깁니다. (시동 ‘ON’일 때만 작동) • 주행할 때: 15 km/h
    이상 주행 시 자동으로 도어가 잠깁니다. • 끄기: 도어 자동 잠금 설정을 해제합니다. 잠금 자동 해제: • P단 이동할 때: ‘P’(주차)로 변속하면 자동으로 도어가 잠금 해제됩니다. (시동 ‘ON’일 때만 작동)
    • 파워 오프 시: 시동 버튼을 ‘OFF’ 했을 때 도어가 자동으로 잠금 해제됩니다. • 끄기: 도어 자동 잠금 해제 설정을 해제합니다. 2회 눌러 전체 잠금 해제: 세이프티 언락 기능을 설정 또는 해제할 수 있습니다.
    잠금 확인음 (사양 적용 시): 도어를 잠금 또는 잠금해제 시 잠금 확인음 기능을 설정 또는 해제할 수 있습니다. 파워 테일게이트: 파워 테일게이트 기능을 설정 또는 해제할 수 있습니다. 파워 테일게이트 열림 높이
    (사양 적용 시): 파워 테일게이트 열림 높이를 선택할 수 있습니다. • 완전 열림 / 3단계 / 2단계 / 1단계 / 사용자 높이 설정 파워 테일게이트 자동 닫힘 (사양 적용 시): 기능을 설정 또는 해제할 수
    있습니다. 스마트 테일게이트 (사양 적용 시): 기능을 설정 또는 해제할 수 있습니다. 스마트 슬라이딩 도어 (사양 적용 시): 슬라이딩 도어를 설정 또는 해제할 수 있습니다. 원격 파워 도어 동시 열림 (사양
    적용 시): • 좌우 슬라이딩 도어 및 테일게이트 열림: 스마트키의 잠금 해제 버튼을 3초 이상 누르면 좌우 슬라이딩 도어와 테일게이트가 열립니다. • 좌우 슬라이딩 도어 열림: 스마트키의 잠금 해제 버튼을 3초
    이상 누르면 좌우 슬라이딩 도어가 열립니다. • 끄기: 원격 파워 도어 열림 기능을 해제합니다. 원격 창문 제어 (사양 적용 시): 기능을 설정 또는 해제할 수 있습니다.'
  - '계기판: 평균연비 표시 (사양 적용 시): 평균연비를 화면에 나타내기 위해 다음과 같이 설정할 수 있습니다. • 재 시동 후 연비/주유 후 연비/누적 연비 와이퍼/라이트 모드 표시: 와이퍼/라이트 모드 표시 기능이
    설정된 상태에서 와이퍼 스위치 또는 라이트 스위치를 작동시키면 선택한 위치를 잠시 계기판에 표시합니다. 해제하면 표시되지 않습니다. 도로 교통표지판 안내 (사양 적용 시): 디스플레이에 도로 교통표지판 정보를 설정
    및 해제할 수 있습니다. 도로 결빙 알림: 디스플레이에 도로 결빙 시 알림 화면을 설정 및 해제할 수 있습니다. 계기판 음성안내 음량: 계기판 음성안내 음량을 선택할 수 있습니다. • 음소거 / 음량 1 / 음량
    2 / 음량 3 웰컴 사운드: 웰컴 시스템의 사운드를 설정 및 해제할 수 있습니다. 테마 선택 (사양 적용 시): 계기판의 테마를 선택할 수 있습니다. • A타입 클러스터: 테마 A/테마 B/테마 C • B타입
    클러스터: 클래식 A/클래식 B/클래식 C 조명밝기 조절: 계기판의 조명 밝기를 단계별로 조절할 수 있습니다. • 1~20단계 원터치 방향지시등: 방향지시등의 깜빡임 횟수를 설정할 수 있습니다. • 끄기 • 3/5/7회
    깜빡임 무드 조명 밝기 (사양 적용 시): 차량 실내 조명 밝기를 조정할 수 있습니다. • 끄기 • 1/2/3/4 단계 무드 조명 색상 (사양 적용 시): 차량 실내 무드 조명 색상을 선택할 수 있습니다. • 폴라
    화이트/문 화이트/아이스 블루/오션 블루/제이드 그린/오키드 그린/프레지아 옐로우/썬라이즈 레드/오로라 퍼플/라이트닝 바이올렛 헤드램프 에스코트 (사양 적용 시): 헤드램프 에스코트 기능을 설정 또는 해제할 수
    있습니다. 하이빔 보조 (사양 적용 시): 하이빔 보조를 설정 또는 해제할 수 있습니다.'
  - 일반 주의 사항 • 반드시 안전벨트를 착용하십시오. • 운전할 때 자세를 평상시보다 스티어링 휠과 가깝게 하고 곧은 자세를 유지하십시오. 스티어링 휠이나 페달을 손쉽게 조작할 수 있도록 여유 있는 위치로 조정하십시오.
    • 비포장도로에서는 주의해서 주행하시고 위험한 지역은 주행을 피하십시오. • 사륜구동 차량도 일반 차량과 마찬가지로 조향 및 브레이크 조작을 신중히 하여 안전하게 운전하십시오. • 비포장도로를 주행할 때는 항상
    스티어링 휠의 바깥쪽을 확실하게 잡으십시오. 스티어링 휠 안쪽을 잡을 경우 스티어링 휠이 갑자기 돌아가 손을 다칠 수 있습니다.
- source_sentence: 어린이 보조 좌석을 동승석에 설치하지 말아야 하는 이유는 무엇인가요?
  sentences:
  - '디지털 키가 등록되어 있습니다: 차량 스마트폰 키 또는 카드 키가 등록되어 있을 때 차량 전원을 켜면 이 경고문이 4초 동안 표시됩니다. 스마트폰 키 또는 카드 키가 등록되지 않은 경우는 경고문이 표시되지 않습니다.'
  - '규격 타이어 장착 및 타이어 공기압 수시 점검: • 적합한 규격의 타이어를 사용하십시오. • 타이어의 접지 상태를 수시로 확인하십시오. • 적정 타이어 공기압을 항상 유지하십시오. • 예비 타이어의 공기압을 점검하십시오.
    • 장거리 주행 또는 고속 주행을 하기 전에 타이어 공기압을 반드시 점검하십시오. 공기압이 부족하면 고속 주행 중 스탠딩 웨이브 현상이 일어나 타이어가 파열될 수 있고, 이는 차량 전복 등의 사고로 이어질 수 있습니다.
    스탠딩 웨이브(Standing Wave) 현상: 타이어 공기압이 부족한 상태에서 고속으로 주행하면 타이어에 물결처럼 주름이 접히는 현상을 말합니다. 이 현상이 계속되면 타이어가 단시간에 파열됩니다.'
  - '어린이 보조 좌석 설치 금지: 승객 구분 센서의 유무와 상관없이 동승석에는 어린이 보조 좌석을 설치하지 마십시오. 동승석 에어백이 팽창할 때 보조 좌석이 적정한 위치에서 벗어나거나 제대로 고정되지 못해 어린이가
    큰 부상을 입을 수 있습니다.'
