  - i 알아두기 • 기온이 높거나 엔진 온도가 높은 경우 예열 없이 바로 시동이 걸릴 수도 있습니다. • 예열 표시등이 켜진 상태에서 시동 버튼을 한 번 더 누르면 예열이 완료되지 않은 상태에서도 시동을 걸 수 있습니다.
    그러나 예열 상태가 충분하지 않을 때는 시동이 걸리지 않을 수도 있습니다. • 전자식 파킹 브레이크(EPB)가 장착된 차량의 경우 'P'(주차) 상태에서 주차 브레이크가 걸려 있을 때 브레이크 페달을 밟고 'P'(주차)에서
    'R'(후진) 단 또는 'D'(주행) 상태로 변속하면 주차 브레이크가 자동으로 해제됩니다. 수동으로 해제하려면 브레이크 페달을 밟고 전자식 파킹 브레이크 스위치를 눌러 주차 브레이크를 해제하십시오. • 엔진의 온도를
    올리기 위해 정차 상태에서 공회전을 하지 마십시오. 엔진이 적정 온도에 도달할 때까지 적당한 속도로 주행하십시오(급가속 또는 급감속을 하지 마십시오.). 엔진에 시동을 걸고 바로 가속 페달을 밟지 마십시오. 엔진이
    차가운 상태이면, 터보차저에 윤활유가 공급될 수 있도록 몇 초간 공회전시키십시오.
  - 'LPG 과충전 경고등: LPG 차량은 LPG가 과충전 되었을 경우 경고등이 빨간색으로 켜집니다. 경고등이 켜지면 당사 직영 하이테크센터나 블루핸즈에서 점검을 받으십시오. 주의: LPI 차량의 경우 연료계의 과충전
    방지를 위한 레드존(Red Zone)을 넘지 않도록 주의하여 연료를 충전하십시오.'
- source_sentence: 엔진룸 점검 시 피에조 인젝터와 관련하여 발생할 수 있는 안전사고에는 어떤 것들이 있나요?
  sentences:
