    후측방 모니터 이상 후측방 모니터가 정상적으로 작동하지 않거나, 일부 화면이 깜빡이거나 카메라 영상이 정상적으로 표시되지 않는 경우 가까운 당사 직영 하이테크센터나 블루핸즈에서 점검을 받으십시오. 경고 • 후측방
    모니터에 사용되는 카메라는 광각 렌즈를 사용합니다. 영상의 왜곡을 보정해 사용하기에 실제 사물과의 거리와 차이가 있을 수 있습니다. 안전을 위해 좌/우 시야를 직접 확인하십시오. • 렌즈 표면에 이물질이 묻으면
    카메라의 기능이 저하되어 후측방 모니터가 정상적으로 작동하지 않을 수 있습니다. 항상 카메라의 렌즈 표면을 깨끗하게 유지하십시오.
  - '차량 설정하기 메뉴: 1. 인포테인먼트 시스템의 SETUP 버튼을 누르십시오. 2. 설정 → 차량을 차례로 선택한 후 원하는 항목의 설정을 변경하십시오. i 알아두기: 인포테인먼트 시스템은 업데이트로 변경될 수
