- source_sentence: 원격 공조가 작동할 때 에어컨의 자동 건조 기능은 어떻게 되나요?
  sentences:
  - '화물 고정 장치 주의사항: • 화물 고정 장치(그물망) 안에 부피가 너무 크거나 많은 물건을 넣지 마십시오. 그물망이 손상될 수 있습니다. • 차량 운전 중의 흔들림으로 인해 쉽게 깨질 수 있는 물건은 싣지 마십시오.'
  - '에어컨 자동 건조 작동 정지 조건: • 10분 동안 작동 후 정지하거나, 시동 버튼 누름, 원격 공조 작동 시 정지됩니다.'
  - 사고 및 차량 화재 시 응급조치 사고 또는 고장 시 행동 요령 고속도로나 자동차 전용 도로 등에서 사고 또는 고장 발생 시 안전을 고려하여 다음 조치를 취하십시오. 1. 신속히 비상 경고등을 켜고 차량을 갓길로
    이동하십시오. 2. 차량 뒤에 안전 삼각대를 설치하십시오. 3. 운전자와 탑승자는 가드레일 바깥과 같은 안전한 곳으로 대피하십시오. 4. 경찰서(112), 소방서(119), 또는 한국도로공사(1588-2504)로
    연락하여 도움을 받으십시오. 경고 사고가 발생했을 때는 사고 차량에서 연료가 유출될 수 있습니다. 연료가 유출된 경우 인화, 폭발 등을 방지하기 위해 엔진을 정지시키고 담뱃불 등의 화기를 멀리하십시오. 차량 화재
    시 즉시 안전한 장소에 정차하여 엔진을 정지시킨 후 소화기 등으로 진화하십시오. 진화 등의 응급조치를 할 수 없는 상황인 경우, 사람들의 접근을 막고 소방서 및 경찰서에 연락하여 필요한 조치를 취하십시오. 안전을
    위해 항상 소화기를 차내에 비치하십시오. 소화기는 소방 기구 판매처에서 구매할 수 있습니다. ※ 화재 발생 시 신속한 조치를 취할 수 있도록 평상시에 소화기 보관 위치(운전석 왼쪽 하단부, 사양 적용 시) 및 사용법을
    숙지하십시오. 소화기가 최적의 성능을 발휘할 수 있도록 관리 요령에 따라 정기적으로 점검하십시오. ※ 소화기 사용법 1. 소화기의 안전핀을 뽑으십시오. 2. 바람이 부는 방향을 등지고 서십시오. 3. 레버를 움겨쥐면서
    불이 난 곳을 향해 빗자루로 쓸듯이 방사하십시오. LPG 차량 화재 시 1. 엔진을 정지시키십시오. 2. 승객을 대피시키고, 차량 내에 있는 커버를 탈거한 후 연료 수동 차단 밸브①를 잠그십시오. 3. LPG에
    불이 붙었을 경우에는 아래와 같은 종류의 소화기를 이용하여 불을 끄십시오. • 분말 소화기 • 탄산가스 소화기 • 하론 소화기 위와 같은 응급조치가 어려운 경우, 차량 주변에 사람들이 접근하지 못하도록 막고 경찰서
    또는 소방서에 즉시 연락하십시오.
- source_sentence: 엔진 경고등이 계속 켜져 있을 때 어떤 조치를 취해야 하나요?
  sentences:
  - '세차나 폭우 시 도어 손잡이 센서 인식 방지 기능: • 스마트 키의 잠금 버튼과 잠금 해제 버튼을 동시에 약 4초 이상 길게 누르면 차량의 비상 경고등이 4회 깜빡이며 도어 잠금 및 잠금 해제 방지 기능이 설정됩니다.
    • 이후에는 스마트 키를 휴대하여도 도어 손잡이 센서 인식에 의한 도어 잠금 및 잠금 해제가 되지 않습니다. • 기능을 해제하려면 스마트 키의 잠금 버튼 또는 잠금 해제 버튼을 눌러 도어를 잠그거나 잠금 해제하십시오.'
  - '외부 공기 차단 기능 작동 조건: • 차량 상태: 히터 및 에어컨 시스템의 외기 유입 모드가 선택되어 있는 경우'
  - '엔진 경고등: 엔진 경고등은 시동을 ‘ON’ 하면 켜지고 약 3초 후 꺼집니다. 3초가 지나도 경고등이 꺼지지 않으면 엔진 제어 장치, 연료 공급 장치 등에 이상이 있는 것이므로 가능한 한 빨리 당사 직영 서비스센터나
    블루핸즈에서 점검을 받으십시오. 일부 엔진 제어 장치에 이상이 있으면 시동이 걸리지 않을 수도 있습니다. 이때는 견인하십시오.'
- source_sentence: 안전벨트를 착용할 때 골반띠는 어디에 위치시켜야 합니까?
  sentences:
  - '착용 방법: 1. 플레이트①와 벨트를 잡으십시오. 2. 벨트를 천천히 당기십시오. 3. ‘찰칵’ 소리가 날 때까지 플레이트①을 버클②에 밀어 넣으십시오. 그 후 안전벨트를 손으로 세게 당겨 잘 채워졌는지 확인하십시오.
    4. 골반띠를 복부 아래 골반에 위치시키고, 어깨띠의 길이를 알맞게 조절하십시오.'
  - '통합 경고등: 통합 경고등은 다음 중 한 가지 이상의 상황이 발생하면 켜집니다. 차량에 적용된 사양에 따라 경고등이 표시되는 상황은 다를 수 있습니다. - 전방 충돌방지 보조 고장 - 전방 충돌방지 보조 레이더
    가림 - 후측방 충돌방지 보조 고장 - 후측방 충돌방지 보조 레이더 가림 - LED 헤드램프 고장 - 하이빔 보조 고장 - 스마트 크루즈 컨트롤 고장 - 스마트 크루즈 컨트롤 레이더 가림'
  - 브레이크 브레이크 페달을 밟을 때는 여러 번에 나누어 밟으십시오 브레이크 제동력을 좋게 하는 것은 물론 제동 중임을 뒤따르는 차량에 미리 알려주어 추돌 사고를 예방할 수 있습니다 내리막길에서 브레이크 페달을 장시간
    밟으면 브레이크 성능이 저하되므로 반드시 엔진 브레이크와 함께 사용하십시오
- source_sentence: 자동차 점검 및 정비 시 엔진룸을 청소할 때 주의해야 할 사항은 무엇인가요?
  sentences:
  - 점검 및 정비 자동차는 시간이 경과하고 주행거리가 증가함에 따라 그 기능이 저하됩니다. 정기 점검 주기표를 따라 점검하여 차량의 수명을 연장하고 갑작스러운 고장으로 인한 사고를 예방하십시오. 정비할 때는 품질과
    성능이 적합한 부품을 사용하고 당사 하이테크센터나 블루핸즈에서 실시하십시오. 품질이나 성능이 부적합한 부품을 사용하거나 별도의 외부 정비소에서 정비하여 발생하는 클레임은 보증 수리 기간이어도 보증 수리를 받을 수
    없습니다. 자동차 관리법에 따라 자동차 소유자는 자동차 신규 등록일로부터 해당 기간이 지나면 반드시 점검을 받아야 합니다. 필수 준수 사항 주의 • 잘못된 정비로 고장 나지 않도록 주의하십시오. 잘못 정비하여 발생하는
    클레임은 보증 수리 기간이어도 보증 수리를 받을 수 없습니다. 취급 설명서에 기재된 점검 및 정비 방법이 어렵고 이해되지 않으면 직접 점검하지 말고 당사 직영 하이테크센터나 블루핸즈에서 점검을 받으십시오. • 물
    또는 왁스 등 액체성 물질로 엔진룸을 청소하지 마십시오. 차량의 전기 장치에 문제를 일으켜 정상적인 주행이 불가능할 수 있습니다. 경고 점검하거나 정비할 때 안전사고가 일어나지 않도록 세심한 주의를 기울이십시오.
    점검 및 정비 시 주의 사항 • 평지에서 점검하십시오. • 시동을 끄거나 'ACC'로 한 후, 'P'(주차)로 변속하고 주차 브레이크를 걸어 두십시오. • 시동이 걸린 상태에서 점검해야 할 때를 제외하고는 반드시
    시동을 끄십시오. • 환기가 잘 되는 곳에서 점검하십시오. • 차량 밑에서 정비할 때는 반드시 리프트를 사용하십시오. • 점검 및 정비 전에 배터리의 - 단자를 분리하십시오. 주의 • 배터리, 점화 케이블, 전기
    배선에는 전류가 흐르고 있습니다. 퓨즈, 메인 퓨즈가 단선되지 않도록 주의하십시오. • 엔진룸 점검 또는 정비 시 엔진 커버 상단 또는 연료 관련 부품 위에 무거운 물건을 올려놓거나 무리한 힘이나 충격을 가하지
    마십시오. • 연료 계통(연료 라인 및 연료 분사 장치)은 반드시 당사 직영 하이테크센터나 블루핸즈에서 정비하십시오. • 점검 및 정비 시 엔진 커버를 임의로 분리한 상태에서 장시간 주행하지 마십시오.
  - '루프 보관함: • 장갑, 서류, 문서 등을 보관할 수 있습니다. 루프 보관함의 허용 가능한 최대 무게는 2.5kg 입니다.'
  - '릴렉션 기능: 원터치 스위치를 이용하여 편리하게 사용할 수 있습니다. 원터치 스위치의 앞부분①을 약 0.5초 이상 누르면 미리 저장된 릴렉션 자세로 자동으로 움직입니다. 원터치 스위치에 의한 자동 작동 중에 좌석
    조절 스위치(등받이 각도 조절, 쿠션 높낮이, 릴렉션 좌석 지속 터치)를 작동하면 자동 작동이 멈추게 됩니다. 좌석 작동이 완료된 후 보다 편한 자세를 위하여 추가로 위치를 조정할 수 있습니다. 지속터치 스위치②의
    뒷부분을 누르면 릴렉션 위치로, 앞부분을 누르면 리턴 위치로 조절되며 쿠션과 등받이는 동시에 움직입니다. 쿠션 높낮이 조절 스위치③의 뒷부분을 아래로 누르면 릴렉션 위치로 쿠션이 미세 조절 되고, 위로 당기면 리턴
    위치로 쿠션이 미세 조절 됩니다.'
- source_sentence: 빙판길 주행 시 차량의 미끄러짐을 방지하기 위한 타이어 관련 조치는 무엇인가요?
  sentences:
  - '주행 중 브레이크 경고등이 켜지는 경우: 브레이크 계통에 이상이 있다는 신호이므로 아래와 같은 방법으로 안전한 장소에 차를 정지시키십시오. 1. 브레이크 페달을 밟아도 제동이 되지 않으면 평상시보다 페달을 강하게
    밟아보십시오. 2. 엔진 브레이크를 걸어 속도를 늦추고 파킹 브레이크를 작동시키면서 브레이크 페달을 밟으십시오. 주행 중 경고등이 켜진 상태에서는 급제동하지 말고 서서히 정지하십시오.'
  - '휴대폰 무선충전 주의사항: • 충전 패드에는 휴대 전화 이외의 물건들은 두지 마십시오. 충전 패드 위에 물건이 있으면 휴대 전화가 정상적으로 충전되지 않을 수 있습니다. • 충전에 이상이 있을 경우 상태 표시등이
    주황색으로 10초 동안 깜빡인 후 꺼집니다. 이럴 때는 휴대폰을 들었다가 다시 충전을 시도하거나, 충전 상태를 확인하시기 바랍니다. • 엔진 시동을 끈 후 충전 패드에 휴대폰이 놓여있는 상태에서 운전석 또는 동승석
    도어를 열면 계기판에 ''휴대폰이 무선 충전기에 있습니다''라는 경고문 및 경고음(음성안내 적용차량)으로 알려줍니다. 휴대폰을 챙긴 후 차에서 내리십시오. • 일부 제조사의 휴대폰은 위 알림이 작동하지 않을 수
    있습니다. 휴대폰의 특성으로 차량 무선 충전 시스템의 고장이 아닙니다. • 일부 휴대 전화에서 정상적으로 충전이 끝났는데도 무선 충전 시스템 표시등이 파란색으로 바뀌지 않는 경우가 있습니다. • 무선 충전 기능을
    내장하지 않은 휴대폰은 별도 액세서리 구입이 필요합니다. • 무선 충전 기능이 없는 휴대폰 또는 금속성 물질을 충전 패드 위에 올려 놓으면 미세한 소음이 발생할 수 있습니다. 이 소음은 충전패드 위의 물체를 판별하는
    과정 중에 발생하는 작동음으로 휴대폰 및 차량에 영향을 미치지 않습니다. • 일부 휴대 전화는 휴대 전화 내부 구조에 따라 충전이 되지 않을 수 있습니다. 이때 휴대 전화를 무선 충전 패드의 좌측 또는 우측으로
    움직이며 충전을 시도하십시오. 단, 휴대 전화 내부에 자석이 포함된 일부 접이식 휴대 전화는 무선 충전 패드의 좌측에 휴대 전화를 가까이 댄 상태에서 충전을 시도하십시오.'
  - 눈길, 빙판길 주행 시 주의 사항 • 가속 페달을 서서히 밟아 부드럽게 출발하십시오. • 타이어 체인이나 스노우 타이어를 사용하십시오. • 차간거리를 충분히 유지하고, 브레이크 사용 시는 엔진 브레이크를 사용하십시오.
    • 주행 중 급가속, 급제동, 과도한 스티어링 휠 조작을 하지 마십시오. 차량이 미끄러질 수 있어 위험합니다
