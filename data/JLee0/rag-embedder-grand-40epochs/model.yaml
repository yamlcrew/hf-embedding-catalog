    수 있으며, 주행 정보 표시 메뉴에서 원하는 항\n목을 선택할 수 있습니다.\n• 시간: 인포테인먼트 시스템에서 표시되는 날\n짜/시간을 저장합니다.\n• 속도: 클러스터에서 표시되는 차량의 속도를\n저장합니다.\n\
