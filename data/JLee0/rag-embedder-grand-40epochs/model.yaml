    다.\n테더 앵커를 성인용 안전벨트 또는 다른 장\n치를 연결하는 끈의 용도로 사용하지 마십시\n오."
- source_sentence: 운전자 주의 경고등이 계속 주황색으로 켜져 있을 경우 어떤 조치를 취해야 하나요?
  sentences:
  - "스마트 크루즈 컨트롤 작동   \n\n   작동 조건\n다음의 조건이 모두 만족되면 스마트 크루즈 컨\n트롤을 켤 수 있습니다.\n• 기어가 'D'(주행)에 위치\n• 작동 속도 범위 내로 주행 중\n- 전방에\
    \ 차가 없을 경우: 10-200 km/h\n- 전방에 차가 있을 경우: 0-200 km/h\n• 차체 자세 제어(ESC) 장치, ABS 장치 켜짐\n다음과 같은 경우 스마트 크루즈 컨트롤을 켤\n수 없습니다.\n\
    • 운전석 도어가 열려 있는 경우\n• 엔진이 고RPM으로 작동 중인 경우\n• 전자식 파킹 브레이크(EPB)가 체결된 경우\n• 차체 자세 제어(ESC) 장치, ABS 장치가 작\n동 중인 경우\n• 전방 충돌방지\
    \ 보조의 제동 제어가 작동 중\n인 경우\n• 원격 스마트 주차 보조의 제동 제어가 작동\n중인 경우 (사양 적용 시)\n정차 상태에서 전방에 차량이 있는 경우에는 스\n마트 크루즈 컨트롤을 켜려면 브레이크 페달을\n\
    밟아야 합니다.   \n\n   추월 가속 보조\n스마트 크루즈 컨트롤 작동 중에 운전석 방향의\n방향지시등을 작동시키면 추월 가속 보조 기능\n이 작동합니다.\n다음의 조건이 모두 만족되면 추월 가속 보조\n\
    기능이 작동합니다.\n• 60 km/h 이상으로 주행 중\n• 전방에 차량이 있는 경우\n다음과 같은 경우 추월 가속 보조 기능은 작동\n하지 않습니다.\n• 비상 경고등이 켜져 있는 경우\n• 차간거리 유지를\
    \ 위한 감속 제어 중인 경우\n• 추월 가속 보조로 일시적인 가속 중 위험한\n상황이 발생할 수 있으니 항상 주의를 기울\n이십시오.\n• 주행 방향이 다른 국가에서 사용할 경우 위\n험한 상황이 발생할 수 있으니\
    \ 항상 주의를\n기울이십시오.   \n\n   기능 켜기\n스마트 크루즈 컨트롤을 켜려면 주행 보조 버튼\n을 누르십시오. 현재 클러스터 표시창의 속도\n로 스마트 크루즈 컨트롤의 속도가 설정됩니다.\n• 전방에\
