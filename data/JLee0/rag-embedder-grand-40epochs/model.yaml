      \ 내리기\n- 스위치를 짧게 내리십시오. 설정속도가 1\nkm/h 단위로 감소합니다.\n• 설정속도를 빠르게 낮추려면 - 스위치를 길\n게 내리십시오. 설정속도가 10의 배수로 감\n소합니다.\n• 최소 30\
      \ km/h까지 설정할 수 있습니다.\n일시 해제하기\n스마트 크루즈 컨트롤을 일시 해제하려면\n스위치를 누르거나 브레이크 페달을 밟으십시\n오.   \n\n   일시 해제 후 다시 켜기\n스마트 크루즈 컨트롤이\
      \ 일시 해제 된 후 다시\n켜려면 + 스위치를 올리거나, - 스위치를 내리\n거나, 스위치를 누르십시오.\n• + 스위치를 올리거나 - 스위치를 내리면 스마\n트 크루즈 컨트롤의 속도가 현재 클러스터\n표시창의\
      \ 속도로 설정됩니다. 스위치를\n누르면 일시 해제하기 전의 설정속도로 설정\n됩니다.\n스위치를 눌러 스마트 크루즈 컨트롤을 다\n시 켜면 주행속도가 빠르게 증가하거나 감소하\n여 위험한 상황이 발생할 수\
      \ 있습니다. 이전 설\n정속도를 확인한 후에 스위치를 누르십시오.   \n\n   기능 끄기\n스마트 크루즈 컨트롤을 끄려면 주행 보조 버튼\n을 누르십시오.\n수동 속도 제한 보조가 적용된 경우에는 주행\n\
      보조 버튼을 길게 누르면 스마트 크루즈 컨트롤\n이 꺼지면서 수동 속도 제한 보조가 켜집니다.\n스위치나 버튼을 동시 조작할 경우에는 정상적\n인 작동이 어려울 수 있으니 조작에 유의하십시\n오.   \n\n\
      \   작동 상태 표시\n스마트 크루즈 컨트롤의 상태 표시를 보려면 클\n러스터를 주행 보조 뷰로 설정하십시오.   \n\n   일시 해제 상태\n스마트 크루즈 컨트롤의 상태에 따라 클러스터\n표시창에 표시되는\
      \ 항목은 다음과 같습니다.\n• 작동 상태\n(1) 전방 차량 유무 및 설정된 차간거리 단계\n(2) 설정속도\n(3) 전방 차량 유무 및 목표 차간거리   \n\n   • 일시 해제 상태\n(1) 자차\n\
      (2) 이전 설정속도\n(3) 전방 차량 유무 (사양 적용 시)   \n\n   • 전방 차량은 자차와 전방 차량과의 실제 거\n리를 반영하여 표시됩니다.\n• 목표 차간거리는 차량의 속도와 설정된 차간\n\
      거리 단계에 따라 달라집니다. 속도가 낮은\n경우 차간거리 단계를 변경하더라도 목표 차\n간거리의 변경량이 적을 수 있습니다.\n• 클러스터 사양 또는 테마에 따라 클러스터\n표시창에 표시되는 이미지나 색상이\
      \ 다를 수\n있습니다.   \n\n   일시적 가속\n스마트 크루즈 컨트롤이 켜진 상태에서 가속 페\n달을 밟으면 설정속도를 변경하지 않고 일시적\n으로 가속할 수 있습니다. 가속하는 동안에는\n클러스터 표시창의\
      \ 설정속도, 차간거리 단계\n및 목표 차간거리가 깜빡입니다. 단, 가속 페달\n밟음 정도가 부족한 경우 차량이 감속될 수 있\n습니다.   \n\n   가속 페달로 일시적으로 가속할 때는 전방에 차\n량이\
      \ 있어도 속도와 차간거리가 자동으로 조절\n되지 않으므로 주의하십시오.   \n\n   운전 스타일 연동\n운전 스타일 연동이 작동하면 클러스터 표시창\n에 ‘운전 스타일 연동 SCC’ 문구가 2초 동안 표\n\
      시되고, 운전자의 주행 성향이 반영된 차간거\n리 단계 및 목표 차간거리가 표시됩니다.   \n\n   자동 일시 해제\n아래와 같은 상황에서는 스마트 크루즈 컨트롤\n이 자동으로 일시 해제됩니다.\n• 210\
      \ km/h 이상으로 가속할 경우\n• 일정시간 이상 정차할 경우\n• 가속 페달을 일정 시간 이상 지속해서 밟을\n경우\n• 스마트 크루즈 컨트롤 작동 조건을 만족하지\n않는 경우\n스마트 크루즈 컨트롤이\
      \ 자동으로 일시 해제되\n면 경고문과 경고음을 통해 자동 일시 해제를\n알립니다.\n정차 상태에서 스마트 크루즈 컨트롤이 자동으\n로 일시 해제되면 전자식 파킹 브레이크(EPB)\n가 체결될 수 있습니다.\n\
      스마트 크루즈 컨트롤이 해제되면 전방 차량과\n의 간격이 유지되지 않습니다. 전방 도로 상황\n및 주행 상태를 확인하고 필요하면 브레이크 페\n달을 밟아 차량 속도를 직접 조절하십시오."
