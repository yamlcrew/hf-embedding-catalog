  - "주차 거리 경고 작동   \n\n   주차 안전 버튼\n주차 안전 버튼을 누르면 주차 거리 경고 기\n능을 켜거나 끌 수 있습니다.\n• 기능이 꺼져있는 상태(버튼 내 표시등 꺼져\n있음)에서 ‘R’(후진)로\
