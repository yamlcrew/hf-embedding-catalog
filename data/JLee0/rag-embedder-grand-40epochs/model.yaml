  sentences:
  - "빌트인 캠 설정\n설정 방법\n인포테인먼트 시스템 홈 화면에서 빌트인 캠을\n선택한 후, 빌트인 캠 설정 메뉴를 선택하십시\n오. 빌트인 캠 녹화를 포함하여 작동과 관련된\n다양한 항목을 설정할 수 있습니다.\
    \   \n\n   빌트인 캠 설정은 운전자 프로필과 연동되어 있\n으며, 프로필 마다 원하는 녹화 조건을 다르게\n설정할 수 있습니다.\n• 디지털 키를 사용하거나 인포테인먼트 시스\n템 화면에서 운전자를 변경하는\
