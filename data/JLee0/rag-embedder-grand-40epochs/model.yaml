  - source_sentence: 전방 주차 거리 경고 기능이 활성화되는 조건과 작동하는 차량 속도는 어떻게 되나요?
    sentences:
    - "빌트인 캠 설정\n설정 방법\n인포테인먼트 시스템 홈 화면에서 빌트인 캠을\n선택한 후, 빌트인 캠 설정 메뉴를 선택하십시\n오. 빌트인 캠 녹화를 포함하여 작동과 관련된\n다양한 항목을 설정할 수 있습니다.\
      \   \n\n   빌트인 캠 설정은 운전자 프로필과 연동되어 있\n으며, 프로필 마다 원하는 녹화 조건을 다르게\n설정할 수 있습니다.\n• 디지털 키를 사용하거나 인포테인먼트 시스\n템 화면에서 운전자를\
      \ 변경하는 경우 빌트인\n캠의 설정이 각 운전자의 프로필 설정에 따\n라 변경됩니다.\n• 모든 설정 항목은 운전자에 따라 변경됩니\n다. 단, 저장된 영상과 Wi-Fi 비밀번호는 운\n전자에 따라 변경되지\
      \ 않습니다.\n• 사용자 프로필을 삭제하거나 설정을 초기화\n할 경우 빌트인 캠 설정도 동시에 초기화 되\n며 원하는 녹화 조건으로 다시 설정이 필요\n합니다.   \n\n   *녹화\n주행 중 녹화/주차\
      \ 중 녹화 및 음성 녹음\n주행 및 주차 시 녹화 방법과 음성 녹음 여부를\n선택할 수 있습니다.\n단, 주차 중 상시 영상과 타임랩스 영상은 음성\n녹음이 되지 않습니다.   \n\n   차량 출고 후 최초\
      \ 한 번은 인포테인먼트 시스\n템에서 운전자1 또는 운전자2 프로필을 선택하\n여 사용자 초기 설정을 완료할 경우에 게스트\n프로필을 포함한 모든 프로필의 주행 및 주차\n중 상시 녹화, 이벤트 녹화 기능이\
      \ 자동으로 활\n성화됩니다.\n단, 운전자1 또는 운전자2 프로필을 설정하기\n전에 게스트 프로필에서 이미 녹화 설정을 한\n경우에는 기존 설정 상태가 유지됩니다.   \n\n   *주행 정보 표시\n빌트인\
      \ 캠 영상에 다양한 주행 정보를 기록할\n수 있으며, 주행 정보 표시 메뉴에서 원하는 항\n목을 선택할 수 있습니다.\n• 시간: 인포테인먼트 시스템에서 표시되는 날\n짜/시간을 저장합니다.\n• 속도: 클러스터에서\
      \ 표시되는 차량의 속도를\n저장합니다.\n• 기어: 클러스터에서 표시되는 변속 기어의\n위치를 저장합니다.\n• 방향 지시등: 좌 우측 방향 지시등 작동 상태\n를 저장합니다.\n• 충격 감지 정도: 빌트인\
      \ 캠의 충격 감지 센서\n를 통해 감지된 충격을 5단계로 저장합니다.\n• 위치: 내비게이션 지도에서 표시되는 차량의\nGPS 위치 정보를 저장합니다.\n• 클러스터에 표시되는 속도는 법규상 실제 차\n량의\
      \ 속도보다 높게 표시되어, 차이가 있을\n수 있습니다.\n• GPS 위치 정보는 차량 위치 및 위성 신호 수\n신 환경에 따라 정확한 위치 정보가 저장되\n지 않을 수 있습니다.\n• 주행 정보 표시를 선택하지\
      \ 않은 상태에서\n녹화가 완료된 영상은 이후에 주행 정보를\n다시 표시할 수는 없습니다.   \n\n   *녹화 시간\n주차 중 녹화 시간, 이벤트 녹화 시간, 타임랩스\n녹화 시간 및 간격을 선택할 수 있습니다.\
      \   \n\n   • 12 V 리튬 보조 배터리 충전량에 따른 녹화 가\n능한 예상 시간을 빌트인 캠 메뉴의 주차 녹\n화 가능 시간 또는 블루링크 앱을 통해서 확\n인할 수 있습니다. 휴대폰에서 주차 녹화\
      \ 가\n능 시간을 확인하려면 블루링크 서비스에 가\n입한 경우에만 사용할 수 있습니다.\n• 12 V 리튬 보조 배터리 충전량이 충분치 않은\n경우, 설정한 주차 녹화 시간 이전에 녹화가\n종료될 수 있습니다.\n\
      • 12 V 리튬 보조 배터리는 빌트인 캠 주차 녹화\n이외에도 차량 제어기/내비게이션 무선 업\n데이트, 시동 배터리 보조 등과 같이 차량의\n안정적인 전원 공급을 위해서도 사용되어,\n차량 상태에 따라 예상했던\
      \ 주차 녹화 가능\n시간 이전에 녹화가 종료될 수 있습니다.   \n\n   *충격 감지 민감도\n주행 및 주차 중 이벤트 녹화 여부의 기준이 되\n는 ‘충격 감지 민감도’를 선택할 수 있습니다. 1\n단계(매우\
      \ 둔감), 2단계(둔감), 3단계(보통), 4\n단계(민감), 5단계(매우 민감) 중에 원하는 감\n지 조건을 선택하십시오.   \n\n   *디스플레이 설정\n전/후방 녹화 영상의 높이를 조절할 수 있습니\n\
      다. 영상 화면을 보고 원하는 높이를 선택하십\n시오.   \n\n   *앱 연결\nWi-Fi 설정\n휴대폰 앱 연결을 위한 Wi-Fi 를 활성화 하거\n나, Wi-Fi 비밀번호를 설정할 수 있습니다.\n주차\
      \ 중 이벤트 휴대폰 알림\n차량을 잠근 후 도난 경보 장치가 작동 중인 상\n태에서 주차 중 이벤트 영상이 저장되면 블루링\n크 앱으로 메시지와 동영상을 전송하여 충격 감\n지를 알립니다. 주차 후 최대 5회까지만\
      \ 서비스\n가 제공되며, 알림 서비스를 사용하려면 주차\n중 이벤트 휴대폰 알림을 선택하십시오.\n• 주차 중 이벤트 휴대폰 알림은 블루링크 서\n비스에 가입한 경우에만 사용할 수 있습니\n다.\n• 주차\
      \ 후 휴대폰 알림 횟수(5회)가 초과되어\n알림이 오지 않더라도 녹화는 작동하고 있습\n니다.\n• 주차 중 이벤트 알림 기능을 사용할 경우 차\n량의 배터리 전력이 소모되어, 예상했던 주\n차 녹화 가능\
      \ 시간 이전에 녹화가 종료될 수\n있습니다.   \n\n   *SD 메모리\n녹화 영상 저장을 위한 SD 메모리의 수명 상태,\nSD 메모리 단자 위치를 확인할 수 있습니다.\nSD 메모리를 안전하게 제거하지\
      \ 않는 경우 저\n장된 파일 또는 파일 시스템이 손상될 수 있습\n니다. ‘연결 해제’ 버튼을 누른 후 메모리를 안\n전하게 제거하십시오.\nSD 메모리를 초기화 할 경우 저장된 모든 파일\n이 삭제되니,\
      \ 초기화 이전에 보관이 필요한 파\n일은 필히 백업해 주십시오.\n정품 SD 메모리를 사용하지 않는 경우 SD 메모\n리의 수명 상태 정보는 표시되지 않을 수 있습\n니다."
    - '전자 제어 장치 안정화 기능

      정상적으로 작동하는 램프에서 순간적으로 깜

      빡임 현상이 발생할 수 있습니다. 이 현상은 차

      량 전자 제어 장치의 안정화 기능에 의한 것으

      로 깜빡임 후 램프가 다시 켜질 경우 차량에 이

      상이 있는 것이 아닙니다.

      단, 깜빡임이 나타난 뒤에 램프가 꺼지거나 위

      의 현상이 반복될 경우는 차량 전자 제어 장치

      의 오류일 수 있으므로 당사 직영 하이테크센터

      나 블루핸즈에서 점검을 받으십시오.

      조명 스위치를 미등 위치로 돌렸을 때 미등이

      켜지지 않고, 전조등 위치로 돌렸을 때 전조등

      과 미등이 함께 켜지는 현상이 발생할 수 있습

      니다. 이 현상은 차량 전자제어 장치나 통신 계

      통의 고장에 의한 것일 수 있으므로 가까운 당

      사 직영 하이테크센터나 블루핸즈에서 점검을

      받으십시오.'
    - "주차 거리 경고 작동   \n\n   주차 안전 버튼\n주차 안전 버튼을 누르면 주차 거리 경고 기\n능을 켜거나 끌 수 있습니다.\n• 기능이 꺼져있는 상태(버튼 내 표시등 꺼져\n있음)에서 ‘R’(후진)로\
      \ 변속하면 자동으로 기\n능이 켜집니다.\n• ‘R’(후진) 상태에서는 안전한 주차를 위해 주\n차 안전 버튼을 눌러도 기능이 꺼지지 않\n습니다.   \n\n   전방 주차 거리 경고\n전방 주차 거리 경고\
      \ 기능은 다음의 조건에서\n켜집니다.\n• 'R'(후진)에서 'D'(주행)로 변속\n• 'D'(주행)에서 주차 안전 버튼 내 표시등\n켜진 상태 유지\n• 'D'(주행)로 주행 중 전방 주차 거리 경고 기\n\
      능의 경고 발생\n• 기능이 꺼져있는 상태에서 ‘D’(주행)로 변속\n(인포테인먼트 시스템의 설정 > 차량 > 운전\n자 보조 > 주차 안전 > 주차 거리 경고 자동 켜\n짐이 선택된 경우)\n• 전방 주차\
      \ 거리 경고는 차량 속도가 10 km/h\n이하일 때만 작동합니다.\n• 'R'(후진)에서는 전방 내측에 위치한 물체는\n경고하지 않으며, 전방 외측의 60cm 이하\n의 물체만 경고음과 함께 경고합니다.\n\
      • 주차 거리 경고 자동 켜짐을 선택하지 않은 경\n우 차량 속도가 30 km/h 이상이면 전방 주\n차 거리 경고 기능이 꺼집니다(버튼 내 표시\n등 꺼짐). 다시 10 km/h 이하로 주행해도 기\n능은\
      \ 자동으로 켜지지 않습니다.\n(인포테인먼트 시스템의 설정 > 차량 > 운전\n자 보조 > 주차 안전 > 주차 거리 경고 자동 켜\n짐을 선택하지 않은 경우)   \n\n   경고 표시 및 경고음\n물체와의\
      \ 거리 60-120cm : 경고음 삐--- 삐--- (전방 외측 미출력)\n물체와의 거리 30-60cm : 경고음 삐-삐-삐-\n물체와의 거리 30cm 이내 : 경고음 삐(연속음)   \n\n   • 각 초음파센서가\
      \ 사람 또는 물체를 감지하면\n클러스터 표시창 또는 인포테인먼트 시스템\n화면에 표시되고, 경고음이 울립니다.\n• 둘 이상의 영역을 동시에 경고하는 경우 더\n가까운 물체가 있는 영역의 경고음이 울립니\n\
      다.\n• 물체와의 거리가 60 cm 이상일 때, 전방 외\n측 단독 경고는 클러스터에 표시하지 않습니\n다.\n• 표시등 형상은 실제 차량과 다를 수 있습니\n다.   \n\n   후방 주차 거리 경고\n\
      후방 주차 거리 경고 기능은 다음의 조건에서\n켜집니다.\n• 'R'(후진)로 변속   \n\n   경고 표시 및 경고음\n물체와의 거리 60-120cm : 경고음 삐--- 삐---\n물체와의 거리 30-60cm\
      \ : 경고음 삐-삐-삐-\n물체와의 거리 30cm 이내 : 경고음 삐(연속음)   \n\n   • 각 초음파센서가 사람 또는 물체를 감지하면\n클러스터 표시창 또는 인포테인먼트 시스템\n화면에 표시되고, 경고음이\
      \ 울립니다.\n• 둘 이상의 영역을 동시에 경고하는 경우 더\n가까운 물체가 있는 영역의 경고음이 울립니\n다.\n• 표시등 형상은 실제 차량과 다를 수 있습니\n다."
