    \ 후 설정된 차간거리가 유지되\n면 정속 주행합니다.\n차량의 속도가 30 km/h 이하일 때 주행 보조\n버튼을 누르면 스마트 크루즈 컨트롤의 속도가\n30 km/h로 설정됩니다.   \n\n   차간거리 설정하기\n\
    차간거리를 변경하려면 차간거리 버튼을 반복\n하여 누르십시오.\n예를 들어, 차량의 속도가 90 km/h이면 다음\n과 같이 차간거리가 유지됩니다.\n• 4단계: 약 52.5 m\n• 3단계: 약 40 m\n•\
    \ 2단계: 약 32.5 m\n• 1단계: 약 25 m\n스마트 크루즈 컨트롤을 끄거나 일시 해제한 후\n다시 켜면 마지막으로 설정한 차간거리 단계로\n작동합니다.   \n\n   설정속도 높이기\n+ 스위치를\
