    - "테더 앵커 이용 방법\n어린이 보조 좌석을 고정할 수 있는 테더 앵커(\n후크 고정용)가 뒷좌석 등받이 뒤편에 있습니\n다.\n1. 어린이 보조 좌석의 벨트를 뒷좌석 등받이\n뒤로 넘기십시오.\n2.어린이\
      \ 보조 좌석 벨트의 고리를 테더 앵커\n에 확실히 고정시키십시오.   \n\n   • 테더 앵커를 이용하여 어린이 보조 좌석을\n고정할 때에는 사용하지 않는 뒷좌석 안전벨\n트의 플레이트를 해당 버클에 모두\
      \ 채우십시\n오.\n또한, 안전벨트 띠가 어린이 보조 좌석 뒤로\n지나가도록 하여 늘어져 있는 안전벨트 띠가\n어린이 손에 닿지 않도록 하십시오. 그렇지\n않으면 어린이 보조 좌석에 앉아 있는 어린\n이가\
      \ 늘어진 안전벨트를 잡아당겨 사고가 날\n수 있습니다.\n• 어린이 보조 좌석이 확실히 고정되어 있지\n않으면 충돌 사고가 났을 때 어린이가 심하\n게 다치거나 사망할 수 있습니다. 어린이 보\n조 좌석을\
      \ 장착하여 사용할 때는 반드시 어\n린이 보조 좌석 제작사의 지시에 따르십시\n오.\n• 어린이 보조 좌석이 단단히 고정되어 있는지\n확인하려면 어린이 보조 좌석을 여러 방향으\n로 밀거나 당겨 보십시오.\
      \ 확실히 고정되어\n있지 않은 어린이 보조 좌석은 흔들리거나\n비틀어질 수 있고 기울어지거나 분리되어 어\n린이가 심하게 다치거나 사망할 수 있습니\n다.\n• 테더 앵커는 바르게 고정된 어린이 보조 좌\n\
      석의 하중만을 견딜 수 있도록 설계되었습니\n다.\n테더 앵커를 성인용 안전벨트 또는 다른 장\n치를 연결하는 끈의 용도로 사용하지 마십시\n오."
