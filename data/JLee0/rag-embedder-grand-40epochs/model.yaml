      • 운전석 도어가 열려 있는 경우\n• 엔진이 고RPM으로 작동 중인 경우\n• 전자식 파킹 브레이크(EPB)가 체결된 경우\n• 차체 자세 제어(ESC) 장치, ABS 장치가 작\n동 중인 경우\n• 전방\
      \ 충돌방지 보조의 제동 제어가 작동 중\n인 경우\n• 원격 스마트 주차 보조의 제동 제어가 작동\n중인 경우 (사양 적용 시)\n정차 상태에서 전방에 차량이 있는 경우에는 스\n마트 크루즈 컨트롤을 켜려면\
      \ 브레이크 페달을\n밟아야 합니다.   \n\n   추월 가속 보조\n스마트 크루즈 컨트롤 작동 중에 운전석 방향의\n방향지시등을 작동시키면 추월 가속 보조 기능\n이 작동합니다.\n다음의 조건이 모두 만족되면\
      \ 추월 가속 보조\n기능이 작동합니다.\n• 60 km/h 이상으로 주행 중\n• 전방에 차량이 있는 경우\n다음과 같은 경우 추월 가속 보조 기능은 작동\n하지 않습니다.\n• 비상 경고등이 켜져 있는 경우\n\
      • 차간거리 유지를 위한 감속 제어 중인 경우\n• 추월 가속 보조로 일시적인 가속 중 위험한\n상황이 발생할 수 있으니 항상 주의를 기울\n이십시오.\n• 주행 방향이 다른 국가에서 사용할 경우 위\n험한\
      \ 상황이 발생할 수 있으니 항상 주의를\n기울이십시오.   \n\n   기능 켜기\n스마트 크루즈 컨트롤을 켜려면 주행 보조 버튼\n을 누르십시오. 현재 클러스터 표시창의 속도\n로 스마트 크루즈 컨트롤의\
      \ 속도가 설정됩니다.\n• 전방에 차량이 없다면 설정된 속도로 주행속\n도가 유지됩니다.\n• 전방에 차량이 있다면 설정된 차간거리를 유\n지하기 위해 속도를 조절합니다. 전방 차량\n이 가속하여 차간거리가\
      \ 멀어지면 설정된 속\n도까지 가속한 후 설정된 차간거리가 유지되\n면 정속 주행합니다.\n차량의 속도가 30 km/h 이하일 때 주행 보조\n버튼을 누르면 스마트 크루즈 컨트롤의 속도가\n30 km/h로\
