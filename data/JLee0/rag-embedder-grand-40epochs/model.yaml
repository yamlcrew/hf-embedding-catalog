    주행 및 주차 시 녹화 방법과 음성 녹음 여부를\n선택할 수 있습니다.\n단, 주차 중 상시 영상과 타임랩스 영상은 음성\n녹음이 되지 않습니다.   \n\n   차량 출고 후 최초 한 번은 인포테인먼트 시스\n\
