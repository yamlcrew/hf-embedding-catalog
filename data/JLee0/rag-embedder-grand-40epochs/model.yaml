      \ 약 52.5 m\n• 3단계: 약 40 m\n• 2단계: 약 32.5 m\n• 1단계: 약 25 m\n스마트 크루즈 컨트롤을 끄거나 일시 해제한 후\n다시 켜면 마지막으로 설정한 차간거리 단계로\n작동합니다.\
      \   \n\n   설정속도 높이기\n+ 스위치를 짧게 올리십시오. 설정속도가 1\nkm/h 단위로 증가합니다.\n• 설정속도를 빠르게 높이려면 + 스위치를 길\n게 올리십시오. 설정속도가 10의 배수로 증\n\
