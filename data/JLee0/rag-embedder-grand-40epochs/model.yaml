    \ 기능은 다음의 조건에서\n켜집니다.\n• 'R'(후진)에서 'D'(주행)로 변속\n• 'D'(주행)에서 주차 안전 버튼 내 표시등\n켜진 상태 유지\n• 'D'(주행)로 주행 중 전방 주차 거리 경고 기\n\
    능의 경고 발생\n• 기능이 꺼져있는 상태에서 ‘D’(주행)로 변속\n(인포테인먼트 시스템의 설정 > 차량 > 운전\n자 보조 > 주차 안전 > 주차 거리 경고 자동 켜\n짐이 선택된 경우)\n• 전방 주차 거리\
    \ 경고는 차량 속도가 10 km/h\n이하일 때만 작동합니다.\n• 'R'(후진)에서는 전방 내측에 위치한 물체는\n경고하지 않으며, 전방 외측의 60cm 이하\n의 물체만 경고음과 함께 경고합니다.\n• 주차\
    \ 거리 경고 자동 켜짐을 선택하지 않은 경\n우 차량 속도가 30 km/h 이상이면 전방 주\n차 거리 경고 기능이 꺼집니다(버튼 내 표시\n등 꺼짐). 다시 10 km/h 이하로 주행해도 기\n능은 자동으로\
    \ 켜지지 않습니다.\n(인포테인먼트 시스템의 설정 > 차량 > 운전\n자 보조 > 주차 안전 > 주차 거리 경고 자동 켜\n짐을 선택하지 않은 경우)   \n\n   경고 표시 및 경고음\n물체와의 거리 60-120cm\
    \ : 경고음 삐--- 삐--- (전방 외측 미출력)\n물체와의 거리 30-60cm : 경고음 삐-삐-삐-\n물체와의 거리 30cm 이내 : 경고음 삐(연속음)   \n\n   • 각 초음파센서가 사람 또는 물체를\
    \ 감지하면\n클러스터 표시창 또는 인포테인먼트 시스템\n화면에 표시되고, 경고음이 울립니다.\n• 둘 이상의 영역을 동시에 경고하는 경우 더\n가까운 물체가 있는 영역의 경고음이 울립니\n다.\n• 물체와의 거리가\
    \ 60 cm 이상일 때, 전방 외\n측 단독 경고는 클러스터에 표시하지 않습니\n다.\n• 표시등 형상은 실제 차량과 다를 수 있습니\n다.   \n\n   후방 주차 거리 경고\n후방 주차 거리 경고 기능은\
    \ 다음의 조건에서\n켜집니다.\n• 'R'(후진)로 변속   \n\n   경고 표시 및 경고음\n물체와의 거리 60-120cm : 경고음 삐--- 삐---\n물체와의 거리 30-60cm : 경고음 삐-삐-삐-\n\
    물체와의 거리 30cm 이내 : 경고음 삐(연속음)   \n\n   • 각 초음파센서가 사람 또는 물체를 감지하면\n클러스터 표시창 또는 인포테인먼트 시스템\n화면에 표시되고, 경고음이 울립니다.\n• 둘 이상의\
    \ 영역을 동시에 경고하는 경우 더\n가까운 물체가 있는 영역의 경고음이 울립니\n다.\n• 표시등 형상은 실제 차량과 다를 수 있습니\n다."
