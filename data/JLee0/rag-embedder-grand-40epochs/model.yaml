    - "스마트 크루즈 컨트롤 작동   \n\n   작동 조건\n다음의 조건이 모두 만족되면 스마트 크루즈 컨\n트롤을 켤 수 있습니다.\n• 기어가 'D'(주행)에 위치\n• 작동 속도 범위 내로 주행 중\n- 전방에\
