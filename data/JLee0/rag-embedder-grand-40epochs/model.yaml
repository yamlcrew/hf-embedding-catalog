  widget:
  - source_sentence: 샤시 통합 제어 시스템이 정상적으로 작동할 때 운전자가 느낄 수 있는 변화는 무엇인가요?
    sentences:
    - '멀티 타입 메인 퓨즈

      멀티 타입 퓨즈는 볼트나 너트로 고정되어 있습

      니다. 임의로 분해 또는 조립하지 말고 당사 직

      영 하이테크센터나 블루핸즈에서 정비를 받으

      십시오. 불완전한 체결 및 잘못된 조립 토크는

      전자 장치의 오작동이나 화재를 일으킬 수 있습

      니다.

      엔진룸 퓨즈 박스 커버는 ''딸깍'' 소리가 날 때까

      지 닫아 확실하게 장착하십시오. 커버가 바르

      게 장착되지 않으면 수분이 유입되어 전자 장치

      작동에 이상이 생길 수 있습니다.'
    - "샤시 통합 제어 (VSM)\n샤시 통합 제어(VSM) 시스템은 노면이 미끄럽\n거나 좌우 타이어의 노면 마찰 계수가 다른 경\n우 제동 시 차체 자세 제어(ESC) 장치와 전동\n파워 스티어링을 상호 작용하며\
      \ 제어하여 제동\n안전성 및 주행 안정성을 향상하는 시스템입니\n다.\nVSM은 Vehicle Stability Management의 약\n자입니다.   \n\n   시스템 작동\n샤시 통합 제어 시스템이\
      \ 작동할 때는 구동력과\n제동력의 영향 및 전동 파워 스티어링의 협조\n제어의 영향으로 약간의 진동 및 스티어링 휠의\n이질감이 느껴질 수 있으나 이는 정상입니다.\n다음과 같은 경우에는 샤시 통합 제어 시스템이\n\
      작동하지 않습니다.\n• 도로의 경사가 심한 경우\n• 후진 주행하는 경우\n• 차체 자세 제어(ESC) 장치 작동 정지 표시등\n이 켜진 경우\n• 전동 파워 스티어링 경고등이 켜진 경우\n시스템 이상\n\
      차체 자세 제어(ESC) 장치와 전동 파워 스티어\n링에 이상이 있을 때는 샤시 통합 제어(VSM)도\n작동하지 않습니다. 차체 자세 제어(ESC) 장치\n작동 정지 표시등이나 전동 파워 스티어링\n경고등이\
      \ 계속 켜지는 경우 당사 직영 하이\n테크센터나 블루핸즈에서 점검 및 정비를 받으\n십시오.   \n\n   • 일정 속도 이상에서 커브길 주행 시 샤시 통\n합 제어 시스템이 작동하지 않습니다.\n• 샤시\
      \ 통합 제어(VSM)는 일정 속도 이상으로\n주행 중에 마찰 계수가 다른 노면에서 ABS\n가 작동할 때 작동합니다.\n마찰 계수가 다른 노면이란 왼쪽 타이어는 얼음\n판, 오른쪽 타이어는 아스팔트를 걸쳐서\
      \ 주행\n하고 있을 때처럼 양쪽 타이어에 걸리는 마찰\n정도가 다른 길을 의미합니다.\n샤시 통합 제어 시스템은 운전자를 위한 보조\n시스템입니다.\n차량 안전 및 통제는 운전자 스스로의 판단에\n의해 이루어져야\
      \ 합니다. 시스템에 의존하여\n위험한 주행을 해서는 안 되며, 항상 스티어링\n휠을 확실하게 잡고 안전한 제동 거리를 확보해\n야 합니다. 필요하면 브레이크 페달을 밟아 속\n도를 줄이십시오.\n샤시 통합\
      \ 제어 시스템 작동 중에도 도로 및 주\n행 상태에 대하여 세심하고 지속적인 주의를 기\n울이십시오.\n차량 출고 시 제공된 타이어 및 휠과 다른 사이\n즈 또는 다른 타입의 타이어와 휠을 사용하지\n마십시오.\
      \ 시스템 오작동의 원인이 될 수 있습\n니다."
    - "열선 시트\n추울 때 히터와 함께 열선 시트를 사용하십시오.   \n\n   앞좌석 열선 시트 사용\n• 시동이 걸린 상태에서 해당 좌석 열선 시트\n버튼을 누르면 해당 좌석의 열선 기능이 켜\n집니다.\n\
      • 열선 시트 작동 중 좌석 온도가 일정 온도 이\n상 높아지면 자동으로 작동을 멈추고, 일정\n온도 이하로 내려가면 다시 작동합니다.   \n\n   • 좌석 온도 조절\n- 수동 조절\n좌석 히터 버튼을\
      \ 누를 때마다 또\n는 ∧/∨ 아이콘을 터치할 때마다\n아래와 같이 온도가 조절됩니다.\n- 자동 조절\n저온 화상 방지를 위해 열선 시트를 수동\n으로 켠 다음부터는 자동으로 좌석 온도가\n조절됩니다.\n\
      고온으로 다시 설정하려면 버튼을 눌러 조절\n하십시오. 수동으로 온도를 조절한 후 일정\n시간이 지나면 다시 자동 조절됩니다.\n• 시동을 껐다가 다시 걸면 열선 시트는 항상\n꺼진 상태가 됩니다.\n단, 운전석\
      \ 공조 연동 자동 제어 기능이 켜져\n있으면 운전석은 외기 온도에 따라 켜질 수\n도 있습니다.\n• 운전석 공조 연동 자동 제어(운전석)\n기능을 켜려면 인포테인먼트 시스템의 설정\n> 차량 > 시트 >\
      \ 열선/통풍 편의 > 공조 연동\n자동 제어 > 운전석 시트 열선/통풍을 차례로\n선택하십시오.\n시동을 걸면 운전석 열선 시트 기능이 차량\n의 내부/외부 온도에 따라 자동으로 제어됩\n니다.\n업데이트로\
      \ 인해 인포테인먼트 시스템의 상\n세 설정이 변경될 수 있습니다. 자세한 설정\n방법은 인포테인먼트 웹 매뉴얼을 참고하십\n시오.   \n\n   뒷좌석 열선 시트 사용\n• 시동을 건 상태에서 해당 좌석\
      \ 열선 버튼을\n누르면 강약 조절 표시등이 켜져 사용 중임\n을 나타내고 해당 좌석의 열선이 켜집니다.\n• 열선 시트 작동(표시등 켜짐) 상태에서 좌석\n온도가 일정 온도 이상 높아지면 자동으로\n작동을\
      \ 멈추고, 온도가 내려가면 다시 작동\n하게 됩니다.\n• 좌석 온도 조절\n- 수동 조절\n열선 시트 버튼을 누를 때마다 아래와 같\n이 온도 조절이 됩니다.\n- 자동 조절\n저온 화상 방지를 위해 열선\
      \ 시트를 수동\n으로 켠 다음부터는 자동으로 좌석 온도가\n조절됩니다."
  - source_sentence: 블루링크 서비스에 가입한 고객이 12V 리튬 보조 배터리 이상을 알림받는 방법은 무엇인가요?
    sentences:
    - "올바른 운전 자세\n올바른 운전 자세가 되도록 운전석과 스티어링\n휠을 조절하십시오.\n바람직한 운전 자세는 좌석에 깊숙이 앉아 브레\n이크 페달을 끝까지 밟았을 때 무릎이 약간 굽\n혀지고, 손목이 스티어링\
      \ 휠의 가장 먼 곳에 닿\n아야 합니다. 또한, 헤드레스트의 높이가 조절\n되는 차량인 경우는 운전자의 귀 상단이 헤드레\n스트 중심에 올 수 있도록 헤드레스트를 조절하\n십시오.   \n\n   좌석, 스티어링\
      \ 휠, 미러 조정\n• 좌석, 스티어링 휠, 미러는 출발 전에 조절하\n시고 주행 중에 절대로 조작하지 마십시오.\n• 내외측의 미러를 조정하여 충분한 시야를 확\n보하십시오.\n• 모든 게이지 및 경고등을\
      \ 확인하십시오.\n• 주차 브레이크를 풀고 브레이크 경고등이 꺼\n지는지 확인하십시오.\n• 차 주위에 사람이나 물체 등이 없는지 확인\n하십시오.\n• 운전할 때 하이힐 등 운전하기 불편한 신발\n을 신지\
      \ 마십시오. 가속 페달, 브레이크 페달\n등의 조작 능력이 저하되어 사고의 원인이\n됩니다.\n• 주차 브레이크를 풀 때는 차량이 움직일 수\n있으므로 반드시 브레이크 페달을 확실히 밟\n으십시오."
    - "하이빔 보조 (HBA)\n마주 오는 차량 또는 선행 차량의 램프 등 주변\n광원 및 조도를 인식하여 전조등을 자동으로 상\n향 또는 하향으로 전환하도록 도와줍니다.\nHBA는 High Beam Assist의\
      \ 약자입니다.\n인식 센서: 전방 카메라\n주행 중 주변의 광원 및 조도를 인식하기 위해\n서 인식 센서로 전방 카메라를 인식 센서로 사\n용합니다.   \n\n   하이빔 보조는 전방 카메라를 이용하는 기능으\n\
      로 그 성능을 최적으로 유지하기 위해서는 전방\n카메라의 관리에 주의가 필요합니다.   \n\n   하이빔 보조 설정\n하이빔 보조\n시동 'ON' 상태에서 인포테인먼트 시스템의 설\n정 > 차량 > 라이트\
      \ > 하이빔 보조를 선택하면\n하이빔 보조가 켜지고 선택을 해제할 경우 꺼집\n니다.\n하이빔 보조를 설정 할 때에는 반드시 안전한\n곳에 정차한 후 조작하십시오.   \n\n   하이빔 보조 작동\n• 설정\
      \ 메뉴에서 하이빔 보조를 선택하고 아래\n와 같이 조작하면 작동 상태가 됩니다.\n- 조명 스위치를 AUTO(자동 켜짐) 위치로\n돌리고 클러스터 방향으로 밀면 클러스터\n에 하이빔 보조 표시등이 켜집니다.\n\
      - 하이빔 보조 작동 상태에서 차속이 30\nkm/h 이상이면 상향등이 켜질 수 있습니\n다. 상향등이 켜지면 클러스터에 전조등\n상향 표시등이 켜집니다. 속도를 줄여\n20km/h 미만으로 주행하면 상향등이\
      \ 켜\n지지 않고 하이빔 보조 표시등이 흰색\n으로 표시됩니다.\n• 하이빔 보조 작동 중에 조명 스위치를 조작\n하면 아래와 같이 작동합니다.\n- 상향등이 켜지지 않은 상태에서 조명 스위\n치를 당길 경우\
      \ 상향등이 켜집니다. 이후\n조명 스위치를 놓을 경우 하이빔 보조가\n다시 작동합니다.\n- 하이빔 보조에 의해 상향등이 켜진 상태에\n서 조명 스위치를 당기면 하향등이 켜지고\n하이빔 보조가 해제됩니다.\n\
      - 조명 스위치를 클러스터 쪽으로 밀면 상시\n상향등이 켜지고 하이빔 보조가 해제됩니\n다.\n- 조명 스위치를 AUTO에서 다른 위치(하향\n등/미등/OFF)로 돌리면 해당 등이 켜지고\n하이빔 보조가 해제됩니다.\n\
      • 하이빔 보조가 작동하여 상향등이 켜진 상태\n에서 다음과 같은 상황이 발생하면 하향등\n상태로 자동 전환될 수 있습니다. 다양한 운\n전 환경을 고려하여 상황에 맞게 시스템을\n사용하십시오.\n- 다가오는\
      \ 차량의 전조등을 감지할 경우\n- 앞서가는 차량의 후미등을 감지할 경우\n- 자전거 및 이륜차의 전조등 또는 후미등을\n감지할 경우\n- 상향등을 켜지 않아도 될 만큼 주위가 밝\n을 경우\n- 전방에 가로등이나\
      \ 기타 광원이 있을 경우   \n\n   하이빔 보조 이상 및 제한 사항   \n\n   기능 이상\n하이빔 보조에 이상이 있으면 클러스터에 경고\n문이 표시되고 경고등이 켜집니다.\n당사 직영 하이테크센터나\
      \ 블루핸즈에서 점검\n을 받으십시오.   \n\n   작동 제한 사항\n• 마주 오는 차량 또는 앞 차량의 램프가 파손\n되었거나 감지 영역을 벗어나 있는 경우\n• 마주 오는 차량 또는 앞 차량의 램프가\
      \ 먼지,\n눈 등으로 덮여 있거나 물이 묻었을 경우\n• 마주 오는 차량이 전조등을 끄고 안개등을\n켰을 경우\n• 전방에 자동차의 전조등이나 미등과 유사한\n형태의 광원이 있는 경우\n• 전조등을 임의로\
      \ 수리 또는 교체한 경우\n• 전조등 에이밍이 올바르지 않을 경우\n• 좁은 커브길, 곡선로, 험로, 오르막길 또는 내\n리막길을 주행할 경우\n• 교차로 또는 굽은 도로에서 전방 차량의 일\n부만 인식될\
      \ 경우\n• 전방에 신호등, 반사 표지판, 발광 표지판 또\n는 도로 반사경이 있을 경우\n• 전방에 임시로 설치된 반사체, 발광체가 있\n을 경우(공사 구간)\n• 젖은 노면, 눈, 빙판길 등 도로환경이\
      \ 나쁠 경\n우\n• 곡선로 등에서 전방 차량이 갑자기 나타날\n경우\n• 타이어가 펑크나 견인 등으로 인하여 자동차\n가 기울어 졌을 경우\n• 마주 오는 차량 또는 선행 차량의 램프가 짙\n은 배기가스,\
      \ 연기, 안개, 눈, 길 위 물보라/눈\n보라, 김 서림 등 공기 중 장애물 때문에 감지\n되지 않을 경우\n• 하이빔 보조는 조건에 따라 정상적으로 작동\n하지 않을 수 있습니다. 차량 조작의 책임은\n\
      운전자에게 있습니다. 하이빔 보조에만 의존\n하지 말고 도로 상황을 직접 확인하면서 안\n전하게 운전 하십시오.\n• 하이빔 보조가 정상적으로 작동하지 않을 경\n우 전조등을 수동으로 전환하십시오.\n• 시동\
      \ 또는 전방 카메라 초기화(재부팅 등) 시\n약 15초 동안 기능이 작동하지 않을 수 있습\n니다."
