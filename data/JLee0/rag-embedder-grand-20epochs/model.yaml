  - "통합주행 모드 시스템   \n\n   드라이브 모드 (Drive Mode)\n운전자의 취향이나 도로 조건에 따라 드라이브\n모드를 선택할 수 있습니다.\n드라이브 모드를 선택하려면 DRIVE MODE\n버튼을\
    \ 눌러 변경하십시오.   \n\n   NORMAL 모드\n일반 도로 및 도심, 고속도로 주행 시 사용하는\n주행 모드입니다.   \n\n   ECO 모드\nECO 모드는 엔진과 변속기 제어를 통해 연비\n를 향상시키는\
    \ 주행 모드입니다.\n연비 개선 효과는 개개인의 운전 습관에 따라\n차이가 날 수 있습니다.\n• DRIVE MODE 버튼을 눌러 조작하여 ECO\n모드를 선택하면 클러스터 표시창에 ECO\n표시등이 켜지고 해당\
    \ 테마로 변경됩니다.\n• ECO 모드가 선택된 상태에서 시동을 껐다가\n다시 걸면 ECO 모드가 유지됩니다.\nECO 모드 작동 시 발생할 수 있는 차량 주행 특\n성\n연비를 우선으로 엔진 및 변속기 작동을\
    \ 제어하\n여 NORMAL 모드에 비해 급가속과 같은 연비\n를 악화시키는 주행을 억제합니다.   \n\n   ECO 모드 작동 제한\nECO 모드 작동 중에 다음과 같은 상황이 발생\n할 경우, ECO 표시등이\
    \ 켜져 있더라도 ECO 모\n드 작동이 제한될 수 있습니다.\n• 냉각수 온도가 낮을 때: 냉각수 온도가 상승\n하여 엔진이 정상적인 성능을 낼 때까지\nECO 모드 작동이 제한됩니다.\n• 오르막길을 주행할\
    \ 때: ECO 모드는 엔진 토\n크를 제한합니다. 오르막길에서는 구엔진성\n능 확보를 위해 ECO 모드 작동이 제한됩니\n다.   \n\n   SPORT 모드\nSPORT 모드는 스티어링 휠, 엔진과 변속기 제\n\
    어를 통해 스포티한 주행을 제공하는 모드입니\n다.\n• DRIVE MODE 버튼을 눌러 SPORT 모드를\n선택하면 클러스터 표시창에 SPORT 표시\n등이 켜지고 해당 테마로 변경됩니다.\n• SPORT 모드가\
    \ 선택된 상태에서 시동을 껐\n다가 다시 걸면 NORMAL 모드로 되돌아갑\n니다.\n필요한 경우 다시 SPORT 모드를 선택하십시\n오.\nSPORT 모드에서는 연비가 안 좋아질 수 있습\n니다.   \n\n\
    \   SNOW 모드(4WD 사양 적용 시)\nSNOW 모드는 눈길 등 미끄러운 노면에서 전\n륜의 구동력을 조절하여 안정적인 출발을 가능\n하게 하고, 타이어가 미끄러지는 것을 억제하\n여 안전한 주행을 돕는\
    \ 모드입니다.\n• DRIVE MODE 버튼을 눌러 SNOW 모드를\n선택하면 클러스터 표시창에 SNOW 표시등\n이 켜집니다.\n• 눈길, 빙판길 주행 시 가속 페달을 서서히 밟\n아 부드럽게 출발하십시오.\n\
    • 차간 거리를 충분히 유지하십시오.\n• 주행 중 급가속, 급제동, 과도한 스티어링 휠\n조작을 하지 마십시오. 차량이 미끄러질 수\n있어 위험합니다.   \n\n   MY DRIVE MODE\nMY DRIVE\
    \ MODE는 운전자가 선호하는 각 구\n성 요소에 대한 차량 성능을 자유롭게 조절하여\n주행할 수 있는 모드입니다.\n인포테인먼트 시스템의 차량 > 설정 > 드라이브\n모드 > MY DRIVE MODE 를 선택하여\
    \ 각 구성\n요소에 대한 차량 성능을 선택할 수 있습니다.   \n\n   MY DRIVE MODE\n파워 트레인 : ECO/NORMAL/SPORT/SMART\n스티어링 : NORMAL/SPORT\n서스펜션(사양\
    \ 적용 시) : NORMAL/SPORT\n조합 가능   \n\n   DRIVE MODE 버튼을 길게 눌러 MY DRIVE\nMODE를 선택하면 클러스터 표시창에 MY\nDRIVE MODE 표시등이 켜집니다.\n\
    • 제어기 교체나 제어기 소프트웨어 업데이트\n시, MY DRIVE MODE 설정값이 초기화될\n수 있습니다. MY DRIVE MODE 화면에서\n파워트레인, 스티어링, 서스펜션(사양 적용\n시) 재설정이 필요합니다."
