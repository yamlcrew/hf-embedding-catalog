    - "에어백 (보조 구속 장치)\n에어백 종류\n(1) 운전석 에어백\n(2) 동승석 에어백\n(3) 앞좌석 사이드 에어백\n(4) 뒷좌석 사이드 에어백\n(5) 커튼 에어백\n(6) 운전석 무릎 에어백\n(7)\
