      \n   왁스칠\n• 세차 후 차가 충분히 말라 표면에 물방울이\n없을 때 왁스를 칠하십시오.\n• 차체 온도가 높지 않은 그늘에서 왁스를 칠\n하십시오. 햇빛을 받아 뜨거울 때 왁스를 칠\n하면 얼룩집니다.\n\
      • 액체 또는 풀 형태인 양질의 왁스를 사용하\n십시오. 연마제가 섞인 왁스나 헝겊을 사용\n하면 광택이 나빠지고 도장면이 손상됩니다.\n유리와 플라스틱(합성수지) 부분은 왁스를\n칠하지 마십시오.\n• 오일,\
