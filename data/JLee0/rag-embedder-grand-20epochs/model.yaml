- source_sentence: 타이어 제조일 표기에서 '0224'는 어떤 의미를 가지고 있나요?
  sentences:
  - '경고

    등록된 카드 키가 실내 인증 패드(무선 충전 패

    드)에 올려져 있을 경우 시동을 걸 수 있습니다.

    따라서, 이러한 차량 시스템을 모르는 사람이

    나 어린이들 혼자 차 안에 남겨 두면 예기치 못

    한 사고가 일어날 수 있으므로 주의 하십시오.

    또한, 차량 도난의 우려가 있으므로 차를 벗어

    날 때는 반드시 카드 키를 휴대하십시오.'
  - "전방/측방/후방 주차 거리 경고 (PDW)\n주차 거리 경고는 차량이 전진 또는 후진할 때\n차량의 전방/측방/후방 초음파센서에서 일정\n거리 이내에 있는 사람 또는 물체를 감지하여\n표시등 또는 경고음으로 알려줍니다.\n\
    PDW는 Parking Distance Warning의 약자\n입니다.   \n\n   인식 센서\n(1) 전방 초음파센서\n(2) 전측방 초음파센서\n(3) 후측방 초음파센서\n(4) 후방 초음파센서"
  - "타이어 제조일\n타이어의 경우 제조일 기준으로 6년이 경과되\n면 자연적으로 노화되기 때문에 사용하지 않았\n더라도 임시 타이어를 포함하여 새 타이어로 교\n체해야 합니다. 이때 제조일을 확인하기 위해\n타이어의\
    \ 옆면에 DOT라는 표시를 양쪽면 중\n한면에 삽입하도록 되어 있으며 이 표시는 영문\n및 숫자로 구성되어 마지막 네 자리를 통해 제\n조일을 확인할 수 있습니다.   \n\n   표시 형식\n예 : DOT XXXX\
    \ XXXX\n표시 앞부분은 제조 공장, 타이어 크기 및 트레\n드 형상에 대한 고유 표시이고, 뒤의 4자리는\n제조 시기를 의미합니다.\n제조 시기 4자리 중 앞 2자리는 생산된 주간, 뒤\n2자리는 제조 연도를\
    \ 의미합니다. 예를 들어,\nDOT XXXX XXXX 0224로 표기되어 있다면\n2024년도 2주차에 생산된 제품이란 뜻입니다.\n타이어가 6년이 지나면 반제품 간 박리 현상을\n일으켜 차량의 손상이나 사고로\
    \ 이어질 수 있습\n니다. 제조 시기를 확인해 반드시 적절한 시기\n에 교체하십시오."
