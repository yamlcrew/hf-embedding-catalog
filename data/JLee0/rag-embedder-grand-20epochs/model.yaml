      \ 한\n달에 한 번씩 미지근한 물이나 찬물로 세차\n하십시오. 비포장도로를 주행했다면 주행 후\n세차해 다른 이물질이 표면에 쌓이지 않도록\n하십시오. 도어와 로커 패널 아래 모서리에\n있는 배출 구멍을 깨끗하게\
      \ 유지하십시오.\n• 곤충, 타르, 수액, 새의 오물, 산업 오염물이\n나 이와 유사한 퇴적물 등은 즉시 제거하지\n않으면 차의 표면을 훼손할 수 있습니다. 안\n전하고 부드러운 세제를 사용해 이물질을 제\n\
      거하고, 미지근한 물이나 찬물로 깨끗이 헹\n구어 비누 가루가 표면에 말라붙지 않도록\n하십시오.\n• 세차하기 전에 도어와 창문을 모두 닫고, 세\n차 중 안테나가 손상되지 않도록 주의하십시\n오.\n• 외관이\
      \ 너무 더러우면 자동차 전용 세척 세\n제를 사용해 세차하십시오. 가정용 중성 세\n제는 고무 제품의 변색을 일으키니 사용하지\n마십시오. 미지근한 수돗물과 같은 보통의\n물로 헹구십시오. 부드러운 스펀지나\
      \ 헝겊을\n사용해 물기를 완전히 닦고, 먼지 입자에 의\n한 긁힘을 방지하기 위해 스펀지를 자주 헹\n구면서 닦으십시오.\n• 범퍼나 차량 내·외부 합성수지 부품이 더러\n워졌을 때는 부드러운 브러시나 스펀지를\
      \ 사\n용하여 손상이 가지 않도록 주의하면서 닦아\n내십시오. 브레이크액, 엔진 오일, 그리스,\n배터리액에 오염된 경우 알코올로 닦아내십\n시오.\n딱딱한 브러시나 수세미를 사용하면 손상이\n갈 수 있습니다.\
      \   \n\n   • 차량 내외 합성수지 부품에 브레이크액, 엔\n진, 오일, 그리스, 배터리액, 방향제 등이 묻\n으면 변색이나 얼룩이 생기니 알코올로 즉시\n닦으십시오.\n• 강력 세제, 계면활성제, 뜨거운\
