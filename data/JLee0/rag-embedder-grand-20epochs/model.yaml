      \ 이상이 있는 것이므로\n당사 직영 하이테크센터나 블루핸즈에서 점검\n을 받으십시오.   \n\n   ESC 작동 정지 표시등\n차체 자세 제어(ESC) 장치 작동 정지 버튼\n을 눌러 차체 자세 제어 기능을\
      \ 해제하면 차체\n자세 제어(ESC) 장치 작동 정지 표시등이\n켜집니다.\n커브 길이나 눈이 쌓인 도로, 노면이 얼어있는\n도로에서는 ESC 기능에 의존하지 말고 안전에\n유의하여 주행하십시오. 이와 같은\
      \ 길을 주행\n하거나 차체 자세 제어(ESC) 장치 작동 표시등\n이 깜빡이면 가속하지 말고 서행하십시오."
  - source_sentence: 타이어 응급 처치 키트(TMK) 사용 후 주의해야 할 운전 조건은 무엇인가요?
    sentences:
    - "중고차 구입 인포테인먼트 시스템의 운전자 1,\n운전자 2 프로필에 지문이 하나라도 등록이 되\n어 있을 때, 차량의 도 어 잠금이 해제된 상태에\n서 차량 시동을 걸면 클러스터에 ‘생체 인증 정\n보가 등록되어\
      \ 있습니다.’라는 문구가 1회 표시\n됩니다.\n중고차를 구입한 경우 해당 문구를 반드시 확인\n하 고, 이전 사용자가 인포테인먼트 시스템의\n운전자 1, 운전자 2 프로필에 등록한 지문을 모\n두 삭제하여\
      \ 주십시오.\n원격 시동에서 지문 인증 시동으로 전환 인포테\n인먼트 시스템의 사용자 프로필 설정에서 지문\n인식 시동이 선택되어 있고, 원격으로 시동을\n건 상태에서 현대 디지털 키 앱 또는 블루링크\n\
      서비스 앱으로 도어를 잠금 해제하고 차량에 탑\n승할 경우에는 지문 인증을 진행하십시오. 지\n문 인증을 하지 않으면 시동이 꺼집니다.   \n\n   중고차 구입\n운전자 1, 운전자 2 프로필에 지문이 하나라도\n\
      등록이 되어 있으면 차량의 도어 잠금 해제 후\n차량 시동 ‘ON’ 했을 때, 클러스터에 ‘생체 인증\n정보가 등록되어 있습니다.’ 문구를 1회 표시합\n니다.\n중고차를 구입한 경우 해당 문구를 반드시 확인\n\
      하고 운전자 1, 운전자 2 프로필에 이전 사용자\n가 등록한 지문을 모두 삭제하여 주십시오."
    - '엔진 시동 시 유의 사항

      • 겨울철에는 기온이 낮아 초기 RPM이 높을

      수 있습니다.

      • 엔진이 정상적으로 작동할 수 있는 온도에

      이를 때까지 엔진 소음이 지속될 수 있으며,

      브레이크의 제동 거리가 다소 길어질 수 있

      습니다.

      • 고속 공회전을 삼가십시오.

      10분 이상 고속 공회전을 유지할 경우 배기

      장치가 손상될 수 있습니다.

      • 주행 중에 시동이 꺼지는 경우 기어를 ''P''(주

      차)로 변속하지 마십시오.

      기어를 ''P''(주차)로 변속하면 변속기가 고장

      날 수 있으며 제동 거리가 더 길어질 수 있습

      니다. 브레이크 페달을 평소보다 힘껏 밟으

      십시오.

      도로 상황을 확인하여 안전을 확보한 후, 차

      가 완전히 멈추기 전에 기어를 ''N''(중립) 상

      태에 두고 시동 버튼을 눌러 다시 시동을 거

      십시오.

      • 밀폐된 공간에서 장시간 엔진 시동을 걸어

      두지 마십시오. 배기 가스에 중독될 위험이

      있습니다.

      • 엔진 회전수(RPM)가 높은 상태에서 브레이

      크 페달을 밟지 않으면 차가 갑자기 움직일

      수 있습니다. 엔진 회전수(RPM)가 안정될

      때까지 기다렸다가 출발하십시오.

      • 절대 가속 페달을 밟으면서 시동을 걸지 마

      십시오. 차가 갑자기 움직여 사고가 날 수 있

      습니다.'
    - "타이어 펑크 시 조치 방법\n타이어 응급 처치 키트(TMK)\n(1) 컴프레서\n(2) 실런트(봉합제)\n이 설명서의 내용을 충분히 숙지한 후에 타이어\n응급 처치 키트(TMK)를 사용하십시오.\n주행 중\
      \ 타이어에 펑크가 나면 타이어 응급 처\n치 키트(TMK)를 사용하여 수리한 후 당사 직영\n하이테크센터나 블루핸즈에서 점검을 받으십\n시오.\n못이나 날카로운 물체로 인한 트레드부 펑크로\n타이어 공기압이\
      \ 충분하지 않은 경우에만 타이\n어 응급 처치 키트(TMK)를 사용하십시오.\nTMK는 Tire Mobility Kit의 약자입니다.\n• 타이어 응급 처치 키트(TMK)를 사용하여 타\n이어를 적절히 봉합한\
      \ 후 80 km/h 이하 속\n도로 200 km 이내의 당사 직영 하이테크센\n터나 블루핸즈에서 타이어를 교체하십시오.\n• 타이어 응급 처치 키트(TMK)를 사용하여 타\n이어를 수리한 상태에서는 비정상적이고\
      \ 갑\n작스러운 운전은 반드시 피하십시오. 특히\n무거운 짐이 있거나 트레일러를 사용할 경우\n더욱 안전에 유의하십시오.   \n\n   • 트레드 부: 타이어가 노면과 접촉하는 두꺼\n운 고무층 부분\n\
      • 타이어 응급 처치 키트(TMK)로는 트레드부\n만 봉합할 수 있습니다.\n• 타이어가 심각하게 손상되거나 타이어 측면\n이 손상된 경우에는 타이어 응급 처치 키트\n(TMK)를 사용하지 말고 당사 직영 하이테크\n\
