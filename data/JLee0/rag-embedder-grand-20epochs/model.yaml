      \ 남을 수 있습니다.\n• 철제면이나 마찰 세제, 알칼리성이 강한 강\n력 세제, 부식 세제 등을 크롬 처리된 표면이\n나 산화피막 처리된 알루미늄 부품에 사용하\n지 마십시오. 보호 코팅이 손상되어 도장면\n\
      이 변색하거나 손상될 수 있습니다.\n• 루프 세차 등을 위해 실내 부품을 밟으면 부\n품 외관 면이 손상될 수 있습니다.\n블랙 도어 스텝은 투명한 보호 처리제로 코\n팅되어 있습니다. 마찰 세제 등으로 손질할\n\
      경우 표면에 자국이 나거나 도어 스텝이 손\n상될 수 있습니다(사양 적용 시).\n• 자동세차기에서 세차를 할 경우 차체에 잔긁\n힘이 생겨 도장면이 손상될 수 있습니다.\n• 휘발유나 아세톤 또는 휘발성 유기용제(초\n\
      강력 세정제) 등 화학 용제는 카메라 렌즈와\n램프를 훼손할 수 있으므로 사용하지 마십시\n오.\n• 알루미늄 휠을 세척할 때 산성계 세제를 사\n용하지 마십시오. 휠 도장면이 손상될 수 있\n습니다.\n•\
      \ 고압 세척기 사용 시 차체 실링부와 위쪽 유\n리부를 통해 물이 실내로 유입될 수 있으니\n주의하십시오.\n• 자동 세차 후 앞유리 표면 왁스는 완전히 제\n거하십시오. 와이퍼 작동시 떨림 및 소음의\n\
      원인이 될 수 있습니다.   \n\n   무광 컬러 차량\n무광 컬러 차량은 자동 세차기와 스팀 세차기를\n이용하지 마십시오. 자동 세차기를 이용하면\n표면의 광택이 손상되거나 흠집이 날 수 있습니\n다. 스팀\
      \ 세차기를 이용하면 오일류 등이 도막\n에 고착되어 얼룩지며, 이 얼룩은 제거하기 어\n렵습니다.\n부드러운 재질의 타올이나 스펀지를 사용해 세\n차하고, 물기를 제거할 때는 극세사 타올을 사\n용하십시오.표면이\
