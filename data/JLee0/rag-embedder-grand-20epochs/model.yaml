    • 수시로 왁스를 바르십시오.\n알루미늄 휠 세척시 알칼리성, 산성계 세제 및\n타이어 광택제를 사용하지 마십시오. 휠 도장\n면이 손상되어 부식 및 얼룩이 발생할 수 있습\n니다."
  - "타이어 및 휠   \n\n   장착타이어 225/55R18 7.5Jx18, 공기압 앞 230(33), 뒤 230(33)\n장착타이어 245/45R19 8.0Jx19, 공기압 앞 230(33), 뒤 230(33)\n\
    장착타이어 245/40R20 8.0Jx20, 공기압 앞 230(33), 뒤 230(33)   \n\n   휠너트체결토크 11~13kgf.m   \n\n   • 해발 고도가 높을수록 대기의 압력이 낮아집니다. 해발\
