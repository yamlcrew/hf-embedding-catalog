  - "타이어 펑크 시 조치 방법\n타이어 응급 처치 키트(TMK)\n(1) 컴프레서\n(2) 실런트(봉합제)\n이 설명서의 내용을 충분히 숙지한 후에 타이어\n응급 처치 키트(TMK)를 사용하십시오.\n주행 중 타이어에\
    \ 펑크가 나면 타이어 응급 처\n치 키트(TMK)를 사용하여 수리한 후 당사 직영\n하이테크센터나 블루핸즈에서 점검을 받으십\n시오.\n못이나 날카로운 물체로 인한 트레드부 펑크로\n타이어 공기압이 충분하지 않은\
    \ 경우에만 타이\n어 응급 처치 키트(TMK)를 사용하십시오.\nTMK는 Tire Mobility Kit의 약자입니다.\n• 타이어 응급 처치 키트(TMK)를 사용하여 타\n이어를 적절히 봉합한 후 80 km/h\
    \ 이하 속\n도로 200 km 이내의 당사 직영 하이테크센\n터나 블루핸즈에서 타이어를 교체하십시오.\n• 타이어 응급 처치 키트(TMK)를 사용하여 타\n이어를 수리한 상태에서는 비정상적이고 갑\n작스러운 운전은\
    \ 반드시 피하십시오. 특히\n무거운 짐이 있거나 트레일러를 사용할 경우\n더욱 안전에 유의하십시오.   \n\n   • 트레드 부: 타이어가 노면과 접촉하는 두꺼\n운 고무층 부분\n• 타이어 응급 처치 키트(TMK)로는\
    \ 트레드부\n만 봉합할 수 있습니다.\n• 타이어가 심각하게 손상되거나 타이어 측면\n이 손상된 경우에는 타이어 응급 처치 키트\n(TMK)를 사용하지 말고 당사 직영 하이테크\n센터나 블루핸즈에서 점검 및 정비를\
    \ 받으십\n시오.\n• 심각한 손상이나 측면 손상에 타이어 응급\n처치 키트(TMK)를 사용할 경우 심각한 사고\n가 날 수 있습니다."
