    - "차체 자세 제어 (ESC) 장치 작동 표시등   \n\n   ESC 작동 표시등\n시동을 'ON' 하면 표시등이 켜지고 차체 자세\n제어(ESC) 장치에 이상이 없으면 약 3초 후에\n꺼집니다. 주행 중 차체\
