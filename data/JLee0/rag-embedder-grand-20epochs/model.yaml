    - "차체 외장 손질   \n\n   일반 주의사항\n화학 세제나 광택제를 사용하기 전에 제품에 내\n장된 사용 설명서를 반드시 숙지하십시오.\n고압 세차 시 주의사항\n• 프레임리스 도어에는 차체 실링이 적용되어\n\
      있어 고압 세차 시 차량이 손상 될 수 있습니\n다.\n• 고압 세차 노즐과 차량과의 간격을 최소 30\ncm 이상 유지하십시오.\n• 고압 세차 노즐을 창문, 조명 시스템(전조등,\n차폭등 등), 카메라,\
      \ 센서, 범퍼, 고무류(타이\n어 등), 기타 부드러운 소재의 부품, 차량 하\n부에 가까이하지 마십시오. 고압의 물줄기로\n인해 손상될 수 있습니다.\n• 고압 세차 노즐을 한 곳에 집중시키지 마십\n시오.\
      \ 고압의 물줄기로 인해 표면이 손상될\n수 있습니다.\n• 고압 세차 노즐을 유리창 주변에 집중 분사\n할 경우 물이 일부 실내로 들어갈 수 있으니\n유의하십시오.\n• 눈 또는 얼음을 고압 세차기로 제거하지\
