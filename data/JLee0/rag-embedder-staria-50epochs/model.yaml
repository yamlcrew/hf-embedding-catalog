  - source_sentence: 변속 버튼에 이상이 있을 때 운전자가 확인해야 할 사항은 무엇인가요?
    sentences:
    - '알아두기: 외기 온도 표시 단위와 히터 및 에어컨의 온도 단위가 동시에 변경됩니다.'
    - N단으로 전환되었습니다 'N'단이 선택되었을 때 이 문구가 계기판 표시창에 표시됩니다 현재 변속단이 선택되어 있습니다 현재 선택되어 있는 변속단에 해당하는 변속 버튼을 누를 경우 이 문구가 계기판 표시창에 표시됩니다
      변속 버튼이 눌려 있습니다 변속 버튼이 계속 눌린 상태이거나 변속 버튼에 이상이 있을 때 이 경고문이 계기판 표시창에 표시됩니다 변속 버튼 위에 물건이 놓여있지 않는지 확인하십시오 버튼이 눌려 있지 않아도 계속해서
      경고문이 표시될 경우 당사 직영 하이테크센터나 블루핸즈에서 점검을 받으십시오 변속 버튼을 점검하십시오 변속 버튼이 고장났을 때 이 경고문이 계기판 표시창에 표시됩니다 당사 직영 하이테크센터나 블루핸즈에서 점검을
      받으십시오
    - 알아두기 ESS는 Emergency Stop Signal의 약자입니다. 다중 충돌 방지 자동 제동 (MCB) 다중 충돌 방지 자동 제동(MCB) 시스템은 차량이 충돌하여 에어백이 전개될 때 추가 사고 위험을
      줄이기 위해 자동으로 브레이크를 작동시키는 시스템입니다. i 알아두기 MCB는 Multi-Collision Brake의 약자입니다. 시스템 작동 • 다중 충돌 방지 자동 제동(MCB) 시스템은 에어백 전개 시점부터
      짧은 시간 동안 브레이크 페달과 가속 페달의 눌림을 모니터링하고 다음과 같은 조건이 만족될 때 작동합니다. - 충돌 시 차량의 속도가 180 km/h 이하인 경우 - 브레이크 페달과 가속 페달이 거의 밟히지
      않았을 때 • 다중 충돌 방지 자동 제동(MCB) 시스템이 작동하는 동안 브레이크 페달을 일정량 이상 밟으면 시스템에 의한 자동 제동력보다 브레이크 페달에 의한 제동력이 우선하여 적용됩니다. 브레이크 페달에서
      발을 떼면 시스템에 의한 자동 제동이 유지됩니다.
  - source_sentence: 사이드 에어백이 장착된 차량에서 시트 커버를 교체하면 어떤 위험이 있을 수 있나요?
    sentences:
    - '엔진 브레이크 (Engine Brake): 물리적인 브레이크는 아니지만 엔진에 브레이크 작용을 하게 하는 것입니다. 엔진의 압축 압력으로 바퀴의 회전을 억제해 제동력을 얻습니다. • 장마철이나 비가 많이 내리는
      지역을 통과할 때는 특별히 주의하고, 타이어 중앙 부분(타이어 휠 허브)이 잠길 정도로 수위가 높으면 운전하지 마십시오. 물을 통과할 때는 천천히 주행하고 물속에서는 제동 성능이 제대로 발휘되지 않을 수 있으므로
      제동 거리를 충분히 유지하십시오. 물을 통과한 후에는 천천히 주행하면서 브레이크를 부드럽게 몇 번 밟아 브레이크를 건조하십시오'
    - '블루투스 핸즈프리 경고사항: • 반드시 안전한 곳에 차를 정차한 후 휴대 전화를 연결하십시오. 운전 중에 연결할 경우 운전자의 주의가 산만해져 사고의 위험이 있습니다. • 운전 중에는 전화번호를 눌러 전화걸기를
      시도하거나 통화하지 마십시오.'
    - '경고: 사이드 에어백 장착 차량의 경우, 시트 커버를 교체하거나 비닐 커버 등을 장착하지 마십시오. 에어백 전개에 영향을 주어 심각한 부상을 입을 수 있습니다.'
  - source_sentence: 유리창을 닫을 때 주의해야 할 점은 무엇인가요?
    sentences:
    - '도어/테일게이트/유리창을 열고 닫을 때 조심: • 도어 및 테일게이트를 열거나 닫을 때 손이나 머리 등 신체 일부가 끼거나 부딪쳐 크게 다칠 수 있습니다. 신체 일부가 끼거나 부딪히지 않도록 확인 후 도어
      및 테일게이트를 열거나 닫으십시오. • 테일게이트를 열고 닫을 때 모서리 또는 날카로운 부분에 부딪혀 신체가 다치거나 물건이 손상될 수 있으니 주의하십시오. 특히 어린이는 얼굴, 머리 등이 테일게이트 주변부에
      부딪혀 다칠 수 있으니 항상 주의하십시오. • 유리창을 닫기 전에 뒷좌석 탑승자의 손이나 머리가 끼지 않도록 먼저 확인하십시오. 특히 어린이는 머리가 낄 경우 심각한 상해를 입거나 질식할 수 있으므로 주의하십시오.'
    - '• 전복, 구름 등의 사고: 측면 충돌로 차가 전복되면 측면 에어백(사이드 및 커튼 에어백)이 작동할 수 있습니다. 에어백 제어 모듈에 있는 전복 센서에서 전복이 감지되면 측면 에어백이 작동할 수 있습니다.
      전복, 구름 등의 사고 상황에서는 정면 에어백(운전석 및 동승석 에어백, 운전석 무릎 에어백)이 작동하지 않을 수 있습니다. • 전주나 나무 등과의 충돌 사고: 전봇대나 나무와 같은 기둥형 물체와 충돌할 때
      에어백 센서에 기준 범위 이상의 충격이 전해지지 않으면 에어백이 작동하지 않을 수 있습니다.'
    - '고속도로 주행: • 주행 전 연료, 냉각수, 엔진오일, 벨트류, 타이어 공기압 등을 점검하십시오. • 안전벨트를 반드시 착용하십시오. • 고속도로 진입 시 가속 차선에서 방향 지시등을 켜고 충분히 가속한 후
      본선 차량의 속도에 맞추어 본선에 진입하십시오. • 차간 거리를 충분히 확보하고 스티어링 휠을 천천히 조작하십시오. • 터널에서 나올 때 횡풍을 받아 차체가 흔들리는 경우 침착하게 속도를 줄이고 진로를 수정하십시오.
      • 고속도로에서 벗어날 때는 미리 출구를 잘 확인한 후 방향 지시등을 켜고 출구로 진출하십시오.출구를 지나치는 경우 다음 출구까지 계속 주행하십시오. 당황하여 급제동하면 매우 위험합니다. • 급제동은 미끄러질
      위험이 있으므로 매우 위험합니다. • 노면이 젖어 있을 때는 타이어가 미끄러지기 쉬우므로 속도를 낮추십시오. • 고속 주행 시 브레이크 페달을 많이 사용하면 브레이크 장치가 과열되거나 브레이크액이 기화되어 브레이크
      성능이 저하되므로 매우 위험합니다. 엔진 브레이크를 함께 사용하십시오.'
  - source_sentence: 에어백의 최대 효과를 얻기 위해 충돌 시 반드시 착용해야 하는 것은 무엇인가요?
    sentences:
    - '에어백 관련 주의 사항: • 에어백은 안전벨트에 의한 충격 보호 기능을 보조하기 위해 개발된 보조 안전 장치입니다. 안전벨트를 착용해야만 충돌이 발생할 때 에어백의 최대 효과를 얻을 수 있고, 그렇지 않으면
      실명, 상해, 사망 등의 위험을 당할 수 있습니다. • 주행 전 운전자와 탑승자는 좌석을 가능한 뒤로 이동하십시오. 에어백이 작동할 때 탑승자의 상체와 에어백 간의 거리가 멀수록 안전합니다. 유아/어린이의 에어백
      관련 주의 사항: 차량 운전 상태에서 탑승한 아이들을 안전하게 보호하기 위해서는 아래의 사항을 지키십시오. • 아이들은 항상 뒷좌석에 앉히십시오. ※ 동승석 에어백이 장착된 차량은 동승석에 유아용 보호장치를
      설치하지 마십시오. 특히 차량 진행 방향의 반대 방향으로 설치하면 에어백 작동에 의해 심하게 다치거나 사망할 수 있습니다. • 약 10-15세 정도(신장에 따라 다름)의 어린이를 동승석에 앉혀야 할 경우 반드시
      안전벨트를 착용시키고 가능한 한 좌석을 뒤쪽으로 밀어 에어백과 거리를 멀리하도록 하십시오. • 아이를 안고 타지 마십시오. 특히 에어백이 장착된 차량에서 동승석 탑승 시 아이를 안고 탑승하면 더욱 위험합니다.
      • 유아 탑승 시에는 반드시 뒷좌석에 유아용 보호장치를 장착하여 앉히십시오. 경고: 어린이나 유아 및 임산부, 노약자는 동승석 에어백이 장착된 차량의 동승석에는 절대 앉히지 마십시오. 또한 유아용 보조시트도
      장착하여 운전하지 마십시오. 사고가 나면 에어백 팽창 충격으로 얼굴에 부상을 입거나 사망할 수 있습니다.'
    - '주의: 드라이브 벨트의 장력이 부족하면 충전량이 부족하여 배터리의 전력 소모가 늘어납니다. 이 경우 충전 경고등이 켜지지 않더라도 시동이 걸리지 않을 수 있습니다.'
    - '연료 부족 경고등: 연료 부족 경고등은 남은 연료량이 적을 때 켜지고, 차량에 적용된 사양에 따라 계기판 표시창에 경고문이 같이 표시됩니다. 연료 부족 경고등이 켜지면 즉시 연료를 보충하십시오. 연료가 완전히
      소모된 상태로 주행하면 엔진 및 연료 장치가 고장 날 수 있습니다.'
  - source_sentence: 하이패스 시스템의 등록을 정상적으로 사용하기 위해 차량과 함께 준비해야 할 것은 무엇인가요?
    sentences:
    - '시동을 유지하려면 디지털 키를 무선 충전기에 올려놓으십시오: 원격 시동 상태에서 디지털 키로 도어를 잠금 해제하여 도어를 열면 이 경고문이 최대 30초 동안 표시됩니다. 주행 가능한 시동 상태로 전환하려면
      경고문이 표시되었을 때 등록된 디지털 키를 무선 충전기 위에 올려놓으십시오.'
    - '틸트 열림/닫힘 및 슬라이드 열림/닫힘 작동 방법: • 틸트 열림/닫힘: 선루프 스위치를 위쪽으로 누르면 선루프 글라스가 틸트 상태로 열립니다. 닫으려면 스위치를 앞으로 누르십시오. • 슬라이드 열림/닫힘:
      선루프 스위치를 뒤쪽으로 누르면 선루프 글라스가 열리고 스위치를 앞쪽으로 누르면 글라스가 닫힙니다. • 자동 작동 중 멈추려면 스위치를 어느 방향으로든 살짝 누르십시오.'
    - '하이패스 시스템 명의 이전 및 등록 관련 주의사항: • 하이패스 시스템이 장착된 차량을 타인에게 매각 또는 양도하는 경우, 차량의 명의와 함께 하이패스 시스템의 명의를 함께 이전하십시오. 명의 변경이 불가한
      경우 하이패스 시스템의 등록을 말소해야 합니다. • 하이패스 시스템이 장착된 차량을 타인에게 매수 또는 양수 받은 경우, 하이패스 시스템의 등록명의를 함께 이전 받아야만 정상적으로 하이패스 기능을 사용할 수
      있습니다. 차량과 구비 서류를 준비하여 인근에 위치한 당사 직영 하이테크센터나 블루핸즈에 직접 방문하여 등록하십시오.'
