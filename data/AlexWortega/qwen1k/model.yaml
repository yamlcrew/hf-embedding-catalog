widgetData:
- source_sentence: How old is Garry Marshall?
  sentences:
  - 'Garry Marshall

    On the morning of July 19, 2016, Marshall died at a hospital in Burbank, California at the age of 81 due to complications
    of pneumonia after suffering a stroke.[20][21]'
  - 'Gregg Marshall

    Michael Gregg Marshall (born February 27, 1963) is an American college basketball coach who currently leads the Shockers
    team at Wichita State University. Marshall has coached his teams to appearances in the NCAA Men''s Division I Basketball
    Tournament in twelve of his eighteen years as a head coach. He is the most successful head coach in Wichita State University
    history (261 wins), and is also the most successful head coach in Winthrop University history (194 wins).'
  - 'Guillotine

    For a period of time after its invention, the guillotine was called a louisette. However, it was later named after Guillotin
    who had proposed that a less painful method of execution should be found in place of the breaking wheel, though he opposed
    the death penalty and bemoaned the association of the guillotine with his name.'
- source_sentence: Are there cherry trees in Cherry Springs State Park?
  sentences:
  - 'Cherry Springs State Park

    Awards and press recognition have come to Cherry Springs and its staff. Thom Bemus, who initiated and coordinates the
    Stars-n-Parks program, was named DCNR''s 2002Volunteer of the Year.[66] In 2007the park''s Dark Sky Programming and staff
    received the Environmental Education Excellence in Programming award from the Pennsylvania Recreation and Parks Society.[67]
    Operations manager Chip Harrison and his wife Maxine, who directs the Dark Sky Fund, received a 2008award from the Pennsylvania
    Outdoor Lighting Council for "steadfast adherence and active promotion of the principles of responsible outdoor lighting
    at Cherry Springs State Park".[68] The DCNR has named Cherry Springs one of "25 Must-See Pennsylvania State Parks", specifically
    for having the "darkest night skies on the east coast".[69] Cherry Springs State Park was featured in the national press
    in 2003when USA Today named it one of "10Great Places to get some stars in your eyes",[70] in 2006when National Geographic
    Adventure featured it in "Pennsylvania: The Wild, Wild East",[71] and in The New York Times in 2007.[53] All these were
    before it was named an International Dark Sky Park by the International Dark-Sky Association in 2008.[38]'
  - 'Cantonese

    Although Cantonese shares a lot of vocabulary with Mandarin, the two varieties are mutually unintelligible because of
    differences in pronunciation, grammar and lexicon. Sentence structure, in particular the placement of verbs, sometimes
    differs between the two varieties. A notable difference between Cantonese and Mandarin is how the spoken word is written;
    both can be recorded verbatim, but very few Cantonese speakers are knowledgeable in the full Cantonese written vocabulary,
    so a non-verbatim formalized written form is adopted, which is more akin to the Mandarin written form.[4][5] This results
    in the situation in which a Cantonese and a Mandarin text may look similar but are pronounced differently.'
  - 'Cherry Springs State Park

    Cherry Springs State Park is an 82-acre (33ha)[a] Pennsylvania state park in Potter County, Pennsylvania, United States.
    The park was created from land within the Susquehannock State Forest, and is on Pennsylvania Route 44 in West Branch Township.
    Cherry Springs, named for a large stand of Black Cherry trees in the park, is atop the dissected Allegheny Plateau at
    an elevation of 2,300 feet (701m). It is popular with astronomers and stargazers for having "some of the darkest night
    skies on the east coast" of the United States, and was chosen by the Pennsylvania Department of Conservation and Natural
    Resources (DCNR) and its Bureau of Parks as one of "25 Must-See Pennsylvania State Parks".[4]'
- source_sentence: How many regions are in Belgium?
  sentences:
  - 'Pine City, Minnesota

    Pine City is a city in Pine County, Minnesota, in East Central Minnesota. Pine City is the county seat of, and the largest
    city in, Pine County.[7] A portion of the city is located on the Mille Lacs Indian Reservation. Founded as a railway town,
    it quickly became a logging community and the surrounding lakes made it a resort town. Today, it is an arts town and commuter
    town to jobs in the Minneapolis–Saint Paul metropolitan area.[8] It is also a green city.[9] The population was 3,127
    at the 2010 census.'
  - 'Provinces of Belgium

    The country of Belgium is divided into three regions. Two of these regions, the Flemish Region or Flanders, and Walloon
    Region, or Wallonia, are each subdivided into five provinces. The third region, the Brussels-Capital Region, is not divided
    into provinces, as it was originally only a small part of a province itself.'
  - 'United Belgian States

    The United Belgian States was a confederal republic of eight provinces which had their own governments, were sovereign
    and independent, and were governed directly by the Sovereign Congress (; ), the confederal government. The Sovereign Congress
    was seated in Brussels and consisted of representatives of each of the eight provinces. The provinces of the republic
    were divided into 11 smaller separate territories, each with their own regional identities:In 1789, a church-inspired
    popular revolt broke out in reaction to the emperor''s centralizing and anticlerical policies. Two factions appeared:
    the "Statists" who opposed the reforms, and the "Vonckists" named for Jan Frans Vonck who initially supported the reforms
    but then joined the opposition, due to the clumsy way in which the reforms were carried out.'
- source_sentence: Are there black holes near the galactic nucleus?
  sentences:
  - 'Supermassive black hole

    In September 2014, data from different X-ray telescopes has shown that the extremely small, dense, ultracompact dwarf
    galaxy M60-UCD1 hosts a 20 million solar mass black hole at its center, accounting for more than 10% of the total mass
    of the galaxy. The discovery is quite surprising, since the black hole is five times more massive than the Milky Way''s
    black hole despite the galaxy being less than five-thousandths the mass of the Milky Way.'
  - 'Aquarela do Brasil

    "Aquarela do Brasil" (Portuguese:[akwaˈɾɛlɐ du bɾaˈziw], Watercolor of Brazil), written by Ary Barroso in 1939 and known
    in the English-speaking world simply as "Brazil", is one of the most famous Brazilian songs.'
  - 'Supermassive black hole

    The difficulty in forming a supermassive black hole resides in the need for enough matter to be in a small enough volume.
    This matter needs to have very little angular momentum in order for this to happen. Normally, the process of accretion
    involves transporting a large initial endowment of angular momentum outwards, and this appears to be the limiting factor
    in black hole growth. This is a major component of the theory of accretion disks. Gas accretion is the most efficient
    and also the most conspicuous way in which black holes grow. The majority of the mass growth of supermassive black holes
    is thought to occur through episodes of rapid gas accretion, which are observable as active galactic nuclei or quasars.
    Observations reveal that quasars were much more frequent when the Universe was younger, indicating that supermassive black
    holes formed and grew early. A major constraining factor for theories of supermassive black hole formation is the observation
    of distant luminous quasars, which indicate that supermassive black holes of billions of solar masses had already formed
    when the Universe was less than one billion years old. This suggests that supermassive black holes arose very early in
    the Universe, inside the first massive galaxies.'
- source_sentence: When did the July Monarchy end?
  sentences:
  - 'July Monarchy

    Despite the return of the House of Bourbon to power, France was much changed from the era of the ancien régime. The egalitarianism
    and liberalism of the revolutionaries remained an important force and the autocracy and hierarchy of the earlier era could
    not be fully restored. Economic changes, which had been underway long before the revolution, had progressed further during
    the years of turmoil and were firmly entrenched by 1815. These changes had seen power shift from the noble landowners
    to the urban merchants. The administrative reforms of Napoleon, such as the Napoleonic Code and efficient bureaucracy,
    also remained in place. These changes produced a unified central government that was fiscally sound and had much control
    over all areas of French life, a sharp difference from the complicated mix of feudal and absolutist traditions and institutions
    of pre-Revolutionary Bourbons.'
  - 'Wachovia

    Wachovia Corporation began on June 16, 1879 in Winston-Salem, North Carolina as the Wachovia National Bank. The bank was
    co-founded by James Alexander Gray and William Lemly.[9] In 1911, the bank merged with Wachovia Loan and Trust Company,
    "the largest trust company between Baltimore and New Orleans",[10] which had been founded on June 15, 1893. Wachovia grew
    to become one of the largest banks in the Southeast partly on the strength of its accounts from the R.J. Reynolds Tobacco
    Company, which was also headquartered in Winston-Salem.[11] On December 12, 1986, Wachovia purchased First Atlanta. Founded
    as Atlanta National Bank on September 14, 1865, and later renamed to First National Bank of Atlanta, this institution
    was the oldest national bank in Atlanta. This purchase made Wachovia one of the few companies with dual headquarters:
    one in Winston-Salem and one in Atlanta. In 1991, Wachovia entered the South Carolina market by acquiring South Carolina
    National Corporation,[12] founded as the Bank of Charleston in 1834. In 1998, Wachovia acquired two Virginia-based banks,
    Jefferson National Bank and Central Fidelity Bank. In 1997, Wachovia acquired both 1st United Bancorp and American Bankshares
    Inc, giving its first entry into Florida. In 2000, Wachovia made its final purchase, which was Republic Security Bank.'
  - 'July Monarchy

    The July Monarchy (French: Monarchie de Juillet) was a liberal constitutional monarchy in France under Louis Philippe
    I, starting with the July Revolution of 1830 and ending with the Revolution of 1848. It marks the end of the Bourbon Restoration
    (1814–1830). It began with the overthrow of the conservative government of Charles X, the last king of the House of Bourbon.'
