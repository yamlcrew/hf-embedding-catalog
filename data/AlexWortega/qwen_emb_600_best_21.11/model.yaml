  widget:
  - source_sentence: When was the frigate the USS Alliance built?
    sentences:
    - 'Middle Stone Age

      The Middle Stone Age (or MSA) was a period of African prehistory between the Early Stone Age and the Later Stone Age.
      It is generally considered to have begun around 280,000 years ago and ended around 50–25,000 years ago.[1] The beginnings
      of particular MSA stone tools have their origins as far back as 550–500,000 years ago and as such some researchers consider
      this to be the beginnings of the MSA.[2] The MSA is often mistakenly understood to be synonymous with the Middle Paleolithic
      of Europe, especially due to their roughly contemporaneous time span, however, the Middle Paleolithic of Europe represents
      an entirely different hominin population, Homo neanderthalensis, than the MSA of Africa, which did not have Neanderthal
      populations. Additionally, current archaeological research in Africa has yielded much evidence to suggest that modern
      human behavior and cognition was beginning to develop much earlier in Africa during the MSA than it was in Europe during
      the Middle Paleolithic.[3] The MSA is associated with both anatomically modern humans (Homo sapiens) as well as archaic
      Homo sapiens, sometimes referred to as Homo helmei. Early physical evidence comes from the Gademotta Formation in Ethiopia,
      the Kapthurin Formation in Kenya and Kathu Pan in South Africa.[2]'
    - 'USS Alliance (1778)

      Originally named Hancock, she was laid down in 1777 on the Merrimack River at Amesbury, Massachusetts, by the partners
      and cousins, William and James K. Hackett, launched on 28 April 1778, and renamed Alliance on 29 May 1778 by resolution
      of the Continental Congress. Her first commanding officer was Capt. Pierre Landais, a former officer of the French Navy
      who had come to the New World hoping to become a naval counterpart of Lafayette. The frigate''s first captain was widely
      accepted as such in America. Massachusetts made him an honorary citizen and the Continental Congress gave him command
      of Alliance, thought to be the finest warship built to that date on the western side of the Atlantic.'
    - 'USS Frigate Bird (AMS-191)

      The second ship in the Navy to be named "Frigate Bird", she was laid down 20 July 1953, as AMS-191; launched 24 October
      1953, by Quincy Adams Yacht Yard, Inc., Quincy, Massachusetts; sponsored by Mrs. Matthew Gushing; and commissioned 13
      January 1955, Lieutenant (jg) George B. Shick, Jr., in command. She was reclassified MSC-191 on 7 February 1955.'
  - source_sentence: How many bananas do Americans consume each year?
    sentences:
    - 'Dust Bowl

      The Dust Bowl was a period of severe dust storms that greatly damaged the ecology and agriculture of the American and
      Canadian prairies during the 1930s; severe drought and a failure to apply dryland farming methods to prevent the aeolian
      processes (wind erosion) caused the phenomenon.[1][2] The drought came in three waves, 1934, 1936, and 1939–1940, but
      some regions of the high plains experienced drought conditions for as many as eight years.[3] With insufficient understanding
      of the ecology of the plains, farmers had conducted extensive deep plowing of the virgin topsoil of the Great Plains
      during the previous decade; this had displaced the native, deep-rooted grasses that normally trapped soil and moisture
      even during periods of drought and high winds. The rapid mechanization of farm equipment, especially small gasoline
      tractors, and widespread use of the combine harvester contributed to farmers'' decisions to convert arid grassland (much
      of which received no more than 10inches (~250mm) of precipitation per year) to cultivated cropland.[4]'
    - 'Banana production in the United States

      Commercial banana production in the United States is relatively limited in scale and economic impact. While Americans
      eat 26 pounds (12kg) of bananas per person per year, the vast majority of the fruit is imported from other countries,
      chiefly Central and South America, where the US has previously occupied areas containing banana plantations, and controlled
      the importation of bananas via various fruit companies, such as Dole and Chiquita. [1]'
    - 'Spinach in the United States

      Per capita spinach consumption is greatest in the Northeast and Western US. About 80% of fresh-market spinach is purchased
      at retail and consumed at home, while 91% of processed spinach is consumed at home. Per capita spinach use is strongest
      among Asians, highest among women 40 and older, and weakest among teenage girls.'
  - source_sentence: Which rapper has the most Grammy wins?
    sentences:
    - 'Rhineland

      The Rhineland (German: Rheinland, French: Rhénanie, Latinised name: Rhenania) is the name used for a loosely defined
      area of Western Germany along the Rhine, chiefly its middle section.'
    - 'Grammy Award for Best Rap Album

      6 wins Eminem 4 wins Kanye West 2 wins Outkast Kendrick Lamar'
    - 'Latin Grammy Award records

      René Pérez Joglar "Residente" and Eduardo Cabra "Visitante" with 24 awards, have won more than any other male artist.'
  - source_sentence: Is Iodine radioactive?
    sentences:
    - 'Double-decker bus

      With the exception of coaches, double-decker buses are uncommon in the United States. Many private operators, such as
      Megabus, run by Coach USA, employs double-decker buses on its busier intercity routes.'
    - 'Iodine-123

      I is the most suitable isotope of iodine for the diagnostic study of thyroid diseases. The half-life of approximately
      13.13 hours is ideal for the 24-hour iodine uptake test and I has other advantages for diagnostic imaging thyroid tissue
      and thyroid cancer metastasis. The energy of the photon, 159 keV, is ideal for the NaI (sodium iodide) crystal detector
      of current gamma cameras and also for the pinhole collimators. It has much greater photon flux than I. It gives approximately
      20 times the counting rate of I for the same administered dose. The radiation burden to the thyroid is far less (1%)
      than that of I. Moreover, scanning a thyroid remnant or metastasis with I does not cause "stunning" of the tissue (with
      loss of uptake), because of the low radiation burden of this isotope. (For the same reasons, I is never used for thyroid
      cancer or Graves disease "treatment", and this role is reserved for I.)'
    - 'Iodine-131

      Iodine-131 (131I) is an important radioisotope of iodine discovered by Glenn Seaborg and John Livingood in 1938 at the
      University of California, Berkeley.[1] It has a radioactive decay half-life of about eight days. It is associated with
      nuclear energy, medical diagnostic and treatment procedures, and natural gas production. It also plays a major role
      as a radioactive isotope present in nuclear fission products, and was a significant contributor to the health hazards
      from open-air atomic bomb testing in the 1950s, and from the Chernobyl disaster, as well as being a large fraction of
      the contamination hazard in the first weeks in the Fukushima nuclear crisis. This is because I-131 is a major fission
      product of uranium and plutonium, comprising nearly 3% of the total products of fission (by weight). See fission product
      yield for a comparison with other radioactive fission products. I-131 is also a major fission product of uranium-233,
      produced from thorium.'
  - source_sentence: Is a birth certificate a form of ID?
    sentences:
    - 'Identity documents in the United States

      The birth certificate is the initial identification document issued to parents shortly after the birth of their child.
      The birth certificate is typically issued by local governments, usually the city or county where a child is born. It
      is an important record, often called a "feeder document," because it establishes U.S. citizenship through birthright
      citizenship, which is then used to obtain, or is the basis for, all other identity documents.[2] By itself, the birth
      certificate is usually only considered proof of citizenship but not proof of identity, since it is issued without a
      photograph at birth, containing no identifying features. A birth certificate is normally produced along with proof of
      identity, such as a driver''s license or the testimony of a third party (such as a parent), to establish identity or
      entitlement to a service.'
    - 'Identity document

      In Canada, different forms of identification documentation are used, but there is no de jure national identity card.
      The Canadian passport is issued by the federal (national) government, and the provinces and territories issue various
      documents which can be used for identification purposes. The most commonly used forms of identification within Canada
      are the health card and driver''s licence issued by provincial and territorial governments. The widespread usage of
      these two documents for identification purposes has made them de facto identity cards.'
    - 'International Ladies'' Garment Workers'' Union

      The ILGWU was founded on June 3, 1900[2] in New York City by seven local unions, with a few thousand members between
      them. The union grew rapidly in the next few years but began to stagnate as the conservative leadership favored the
      interests of skilled workers, such as cutters. This did not sit well with the majority of immigrant workers, particularly
      Jewish workers with a background in Bundist activities in Tsarist Russia, or with Polish and Italian workers, many of
      whom had strong socialist and anarchist leanings.'
