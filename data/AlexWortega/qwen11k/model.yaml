widgetData:
- source_sentence: Who is the father of philosophy?
  sentences:
  - 'Charles Sanders Peirce

    Charles Sanders Peirce (/pɜːrs/[9] "purse"; 10September 1839 – 19April 1914) was an American philosopher, logician, mathematician,
    and scientist who is sometimes known as "the father of pragmatism". He was educated as a chemist and employed as a scientist
    for 30 years. Today he is appreciated largely for his contributions to logic, mathematics, philosophy, scientific methodology,
    and semiotics, and for his founding of pragmatism.'
  - 'Georg Wilhelm Friedrich Hegel

    According to Hegel, "Heraclitus is the one who first declared the nature of the infinite and first grasped nature as in
    itself infinite, that is, its essence as process. The origin of philosophy is to be dated from Heraclitus. His is the
    persistent Idea that is the same in all philosophers up to the present day, as it was the Idea of Plato and Aristotle".
    For Hegel, Heraclitus''s great achievements were to have understood the nature of the infinite, which for Hegel includes
    understanding the inherent contradictoriness and negativity of reality; and to have grasped that reality is becoming or
    process and that "being" and "nothingness" are mere empty abstractions. According to Hegel, Heraclitus''s "obscurity"
    comes from his being a true (in Hegel''s terms "speculative") philosopher who grasped the ultimate philosophical truth
    and therefore expressed himself in a way that goes beyond the abstract and limited nature of common sense and is difficult
    to grasp by those who operate within common sense. Hegel asserted that in Heraclitus he had an antecedent for his logic:
    "[...] there is no proposition of Heraclitus which I have not adopted in my logic".'
  - 'History of nuclear weapons

    The notion of using a fission weapon to ignite a process of nuclear fusion can be dated back to 1942. At the first major
    theoretical conference on the development of an atomic bomb hosted by J. Robert Oppenheimer at the University of California,
    Berkeley, participant Edward Teller directed the majority of the discussion towards Enrico Fermi''s idea of a "Super"
    bomb that would use the same reactions that powered the Sun itself.'
- source_sentence: When was Father's Day first celebrated in America?
  sentences:
  - 'Father''s Day (United States)

    Father''s Day was founded in Spokane, Washington at the YMCA in 1910 by Sonora Smart Dodd, who was born in Arkansas.[4]
    Its first celebration was in the Spokane YMCA on June 19, 1910.[4][5] Her father, the Civil War veteran William Jackson
    Smart, was a single parent who raised his six children there.[4] After hearing a sermon about Jarvis'' Mother''s Day at
    Central Methodist Episcopal Church in 1909, she told her pastor that fathers should have a similar holiday honoring them.[4][6]
    Although she initially suggested June 5, her father''s birthday, the pastors did not have enough time to prepare their
    sermons, and the celebration was deferred to the third Sunday of June.[7][8]'
  - 'Father''s Day

    In [[Peru]], Father''s Day is celebrated on the third Sunday of June and is not a public holiday. People usually give
    a present to their fathers and spend time with him mostly during a family meal.'
  - 'Sacramento River

    The Sacramento and its wide natural floodplain were once abundant in fish and other aquatic creatures, notably one of
    the southernmost large runs of chinook salmon in North America. For about 12,000 years, humans have depended on the vast
    natural resources of the watershed, which had one of the densest Native American populations in California. The river
    has provided a route for trade and travel since ancient times. Hundreds of tribes sharing regional customs and traditions
    inhabited the Sacramento Valley, first coming into contact with European explorers in the late 1700s. The Spanish explorer
    Gabriel Moraga named the river Rio de los Sacramentos in 1808, later shortened and anglicized into Sacramento.'
- source_sentence: What is the population of Austria in 2018?
  sentences:
  - 'Utah State Capitol

    The Utah State Capitol is the house of government for the U.S. state of Utah. The building houses the chambers and offices
    of the Utah State Legislature, the offices of the Governor, Lieutenant Governor, Attorney General, the State Auditor and
    their staffs. The capitol is the main building of the Utah State Capitol Complex, which is located on Capitol Hill, overlooking
    downtown Salt Lake City.'
  - 'Same-sex marriage in Austria

    A September 2018 poll for "Österreich" found that 74% of Austrians supported same-sex marriage and 26% were against.'
  - 'Demographics of Austria

    Population 8,793,370 (July 2018 est.) country comparison to the world: 96th'
- source_sentence: What language family is Malay?
  sentences:
  - 'Malay language

    Malay is a member of the Austronesian family of languages, which includes languages from Southeast Asia and the Pacific
    Ocean, with a smaller number in continental Asia. Malagasy, a geographic outlier spoken in Madagascar in the Indian Ocean,
    is also a member of this language family. Although each language of the family is mutually unintelligible, their similarities
    are rather striking. Many roots have come virtually unchanged from their common ancestor, Proto-Austronesian language.
    There are many cognates found in the languages'' words for kinship, health, body parts and common animals. Numbers, especially,
    show remarkable similarities.'
  - 'Filipinos of Malay descent

    In the Philippines, there is misconception and often mixing between the two definitions. Filipinos consider Malays as
    being the natives of the Philippines, Indonesia, Malaysia and Brunei. Consequently, Filipinos consider themselves Malay
    when in reality, they are referring to the Malay Race. Filipinos in Singapore also prefer to be considered Malay, but
    their desire to be labeled as part of the ethnic group was rejected by the Singaporean government. Paradoxically, a minor
    percentage of Filipinos prefer the Spanish influence and may associate themselves with being Hispanic, and have made no
    realistic attempts to promote and/or revive the Malay language in the Philippines.'
  - 'Preferred provider organization

    In health insurance in the United States, a preferred provider organization (PPO), sometimes referred to as a participating
    provider organization or preferred provider option, is a managed care organization of medical doctors, hospitals, and
    other health care providers who have agreed with an insurer or a third-party administrator to provide health care at reduced
    rates to the insurer''s or administrator''s clients.'
- source_sentence: When was ABC formed?
  sentences:
  - 'American Broadcasting Company

    ABC launched as a radio network on October 12, 1943, serving as the successor to the NBC Blue Network, which had been
    purchased by Edward J. Noble. It extended its operations to television in 1948, following in the footsteps of established
    broadcast networks CBS and NBC. In the mid-1950s, ABC merged with United Paramount Theatres, a chain of movie theaters
    that formerly operated as a subsidiary of Paramount Pictures. Leonard Goldenson, who had been the head of UPT, made the
    new television network profitable by helping develop and greenlight many successful series. In the 1980s, after purchasing
    an 80% interest in cable sports channel ESPN, the network''s corporate parent, American Broadcasting Companies, Inc.,
    merged with Capital Cities Communications, owner of several print publications, and television and radio stations. In
    1996, most of Capital Cities/ABC''s assets were purchased by The Walt Disney Company.'
  - 'Roman concrete

    Roman concrete, also called opus caementicium, was a material used in construction during the late Roman Republic until
    the fading of the Roman Empire. Roman concrete was based on a hydraulic-setting cement. Recently, it has been found that
    it materially differs in several ways from modern concrete which is based on Portland cement. Roman concrete is durable
    due to its incorporation of volcanic ash, which prevents cracks from spreading. By the middle of the 1st century, the
    material was used frequently, often brick-faced, although variations in aggregate allowed different arrangements of materials.
    Further innovative developments in the material, called the Concrete Revolution, contributed to structurally complicated
    forms, such as the Pantheon dome, the world''s largest and oldest unreinforced concrete dome.[1]'
  - 'Americans Battling Communism

    Americans Battling Communism, Inc. (ABC) was an anti-communist organization created following an October 1947 speech by
    Pennsylvania Judge Blair Gunther that called for an "ABC movement" to educate America about communism. Chartered in November
    1947 by Harry Alan Sherman, a local lawyer active in various anti-communist organizations, the group took part in such
    activities as blacklisting by disclosing the names of people suspected of being communists. Its members included local
    judges and lawyers active in the McCarthy-era prosecution of communists.'
