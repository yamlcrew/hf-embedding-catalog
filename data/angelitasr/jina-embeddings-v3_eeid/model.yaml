widgetData:
- source_sentence: '###Question###:Factorising into a Double Bracket-Factorise a quadratic expression in the form x² + bx
    - c-If

    \(

    m^{2}+5 m-14 \equiv(m+a)(m+b)

    \)

    then \( a \times b= \)

    ###Correct Answer###:\( -14 \)

    ###Misconcepted Incorrect answer###:\( 5 \)'
  sentences:
  - Does not know that units of volume are usually cubed
  - Believes the coefficent of x in an expanded quadratic comes from multiplying the two numbers in the brackets
  - Does not copy a given method accurately
- source_sentence: '###Question###:Rounding to the Nearest Whole (10, 100, etc)-Round non-integers to the nearest 10-What
    is \( \mathbf{8 6 9 8 . 9} \) rounded to the nearest ten?

    ###Correct Answer###:\( 8700 \)

    ###Misconcepted Incorrect answer###:\( 8699 \)'
  sentences:
  - Rounds to the wrong degree of accuracy (rounds too much)
  - 'Believes division is commutative '
  - Believes that a number divided by itself equals 0
- source_sentence: '###Question###:Simultaneous Equations-Solve linear simultaneous equations requiring a scaling of both
    expressions-If five cups of tea and two cups of coffee cost \( £ 3.70 \), and two cups of tea and five cups of coffee
    cost \( £ 4.00 \), what is the cost of a cup of tea and a cup of coffee?

    ###Correct Answer###:Tea \( =50 \mathrm{p} \) coffee \( =60 p \)

    ###Misconcepted Incorrect answer###:\( \begin{array}{l}\text { Tea }=0.5 \\ \text { coffee }=0.6\end{array} \)'
  sentences:
  - Misinterprets the meaning of angles on a straight line angle fact
  - Does not include units in answer.
  - Believes midpoint calculation is just half of the difference
- source_sentence: '###Question###:Quadratic Sequences-Find the nth term rule for ascending quadratic sequences in the form
    ax² + bx + c-\(

    6,14,28,48,74, \ldots

    \)


    When calculating the nth-term rule of this sequence, what should replace the triangle?


    nth-term rule: \( 3 n^{2} \)\( \color{red}\triangle \)  \(n\) \( \color{purple}\square \)


    ###Correct Answer###:\( -1 \)

    (or just a - sign)

    ###Misconcepted Incorrect answer###:\[

    +1

    \]

    (or just a + sign)'
  sentences:
  - 'When finding the differences between terms in a sequence, believes they can do so from right to left '
  - When solving an equation forgets to eliminate the coefficient in front of the variable in the last step
  - Believes parallelogram is the term used to describe two lines at right angles
- source_sentence: '###Question###:Written Multiplication-Multiply 2 digit integers by 2 digit integers using long multiplication-Which
    working out is correct for $72 \times 36$?

    ###Correct Answer###:![ Long multiplication for 72 multiplied by 36 with correct working and correct final answer. First
    row of working is correct: 4 3 2. Second row of working is correct: 2 1 6 0. Final answer is correct: 2 5 9 2.]()

    ###Misconcepted Incorrect answer###:![ Long multiplication for 72 multiplied by 36 with incorrect working and incorrect
    final answer. First row of working is incorrect: 4 2 2. Second row of working is incorrect: 2 7. Final answer is incorrect:
    4 4 9.]()'
  sentences:
  - When solving an equation forgets to eliminate the coefficient in front of the variable in the last step
  - Thinks a variable next to a number means addition rather than multiplication
  - When two digits multiply to 10 or more during a multiplication problem, does not add carried value to the preceding digit
