widgetData:
- source_sentence: '###Question###:Area Units-Convert from km² to m²-\( 2 \mathrm{~km}^{2} \) is the same as _____ \( m^{2}
    \)

    ###Correct Answer###:\( 2000000 \)

    ###Misconcepted Incorrect answer###:\( 2000 \)'
  sentences:
  - Confuses an equation with an identity
  - Does not square the conversion factor when converting squared units
  - Rounds to wrong degree of accuracy (decimal places rather than significant figures)
- source_sentence: '###Question###:Basic Angle Facts (straight line, opposite, around a point, etc)-Find missing angles using
    angles around a point-What is the size of angle \( x \) ? ![Angles around a point, split into 2 parts. One is labelled
    310 degrees and the other x.]()

    ###Correct Answer###:\( 50^{\circ} \)

    ###Misconcepted Incorrect answer###:\( 310^{\circ} \)'
  sentences:
  - Believes the arrows for parallel lines mean equal length
  - Rounds to the wrong degree of accuracy (rounds too little)
  - Incorrectly identifies angles as vertically opposite
- source_sentence: '###Question###:BIDMAS-Use the order of operations to carry out calculations involving addition, subtraction,
    multiplication, and/or division-\[

    10-8 \times 7+6=

    \]


    Which calculation should you do first?

    ###Correct Answer###:\( 8 \times 7 \)

    ###Misconcepted Incorrect answer###:\( 7+6 \)'
  sentences:
  - Ignores the negative sign
  - Carries out operations from right to left regardless of priority order
  - In repeated percentage change, believes the second change is only a percentage of the first change, without including
    the original
- source_sentence: '###Question###:Multiples and Lowest Common Multiple-Identify common multiples of three or more numbers-Which
    of the following numbers is a common multiple of \( 4,6 \) and \( 12 \) ?

    ###Correct Answer###:\( 12 \)

    ###Misconcepted Incorrect answer###:\( 2 \)'
  sentences:
  - Confuses factors and multiples
  - 'Does not know that to factorise a quadratic expression, to find two numbers that add to give the coefficient of the x
    term, and multiply to give the non variable term

    '
  - Does not link Pythagoras Theorem to finding distance between two points
- source_sentence: '###Question###:Combined Events-Calculate the probability of two independent events occurring without drawing
    a tree diagram-![Two spinners shown. The first spinner has the numbers 1-4 and the second spinner has the number 1-5.]()
    You spin the above fair spinners

    What is the probability of getting a \( 1 \) on both spinners?

    ###Correct Answer###:\( \frac{1}{20} \)

    ###Misconcepted Incorrect answer###:\( \frac{1}{9} \)'
  sentences:
  - When multiplying fractions, multiplies the numerator and adds the denominator
  - Does not follow the arrows through a function machine, changes the order of the operations asked.
  - Believes a curve can show a constant rate
