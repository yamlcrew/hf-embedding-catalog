      disclosure of all material facts including the disclosures mentioned in Schedule I. iii) In addition to the disclosures
      in Schedule A, the following disclosures shall be made: i) Date of shareholders approval for buy-back, if applicable;
      ii) Minimum and maximum number of securities that the company proposes to buy-back, sources of funds from which the
      buy-back would be made and the cost of financing the buy-back; iii) Proposed time table from opening of offer till the
      extinguishment of the certificates; iv) Process and methodology to be adopted for the buy- back; v) Brief information
      about the company; i) The Public announcement shall be dated and signed on behalf of the Board of Directors of the company
      by its manager or secretary, if any, and by not less than two directors of the company one of whom shall be a managing
      director where there is one. ii) A full and complete disclosure of all material facts including the disclosures mentioned
      in Schedule I. Page 46 of 51 SCHEDULE - IV [Regulation 16(iv)(b)] Public Announcement for Open Market Buy-Back through
      Stock Exchange Particulars Content Public Announcement i) The Public announcement shall be dated and signed on behalf
      of the Board of Directors of the company by its manager or secretary, if any, and by not less than two directors of
      the company one of whom shall be a managing director where there is one. ii) A full and complete disclosure of all material
      facts including the disclosures mentioned in Schedule I. iii) In addition to the disclosures in Schedule A, the following
      disclosures shall be made: i) Date of shareholders approval for buy-back, if applicable; ii) Minimum and maximum number
      of securities that the company proposes to buy-back, sources of funds from which the buy-back would be made and the
      cost of financing the buy-back; iii) Proposed time table from opening of offer till the extinguishment of the certificates;
      iv) Process and methodology to be adopted for the buy- back; v) Brief information about the company; Particulars Content
      vi) Audited Financial information for the last 3 years and the lead manager shall ensure that the particulars (audited
      statement and un-audited statement) contained therein shall not be more than more than 6 months old from the date of
      the public announcement together with financial ratios as may be specified by the Board; Explanation: Ensure that the
      un-audited financial results, if any disclosed, should be certified / limited review by statutory auditors. vii) Details
      of escrow account opened and the amount deposited therein; viii) Listing details and stock market data: a) high, low
      and average market prices of the securities of the company proposed to be bought back, during the preceding three years;
      b) monthly high and low prices for the six months preceding the date of the public announcement; c) the number of securities
      traded on the days when the high and low prices were recorded on the relevant stock exchanges during the period stated
      at (a) and (b) above; d) the stock market data referred to above shall be shown separately for periods marked by a change
      in capital structure, with such period commencing from the date the concerned stock exchange recognises the change in
