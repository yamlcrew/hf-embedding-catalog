    name is recorded as such with a depository/depository participant; (e) Board means the Securities and Exchange Board of
    India established under section 3 of the Act; 1[(f) Change in control in case of a body corporate (A) if its shares are
    listed on any recognised stock exchange, shall be construed with reference to the definition of control in terms of regulations
    framed under clause (h) of sub-section (2) of section 11 of the Act; (B) if its shares are not listed on any recognised
    stock exchange, shall be construed with reference to the definition of control as provided in sub-section (27) of Section
    2 of the Companies Act, 2013 (18 of 2013);] (g) Depositor means a person who owns the gold deposited with the vault for
    creation of Electronic Gold Receipt and its trading on recognized stock exchange; (h) Electronic Gold Receipt shall have
    the meaning assigned to it under the Securities Contracts (Regulation) Act, 1956; (i) Gold standard means the purity and
    standard of gold as specified by the recognized stock exchanges; (j) Nominated agencies means agencies nominated by the
    Directorate General of Foreign Trade for import of Gold under the Foreign Trade (Development and Regulation) Act, 1992;
    1 Substituted by the Securities and Exchange Board of India (Change in Control in Intermediaries) (Amendment) Regulations,
