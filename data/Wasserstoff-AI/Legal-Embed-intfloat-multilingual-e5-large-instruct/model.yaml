  - source_sentence: 'The issuer making a private placement of debt securities and non-convertible redeemable preference shares
      and seeking listing thereof on a recognised stock exchange shall make the following disclosures in the placement memorandum:
      (a) disclosures specified in 28[Schedule I] of these regulations; (b) disclosures specified in the Companies Act, 2013
      (18 of 2013), as applicable; (c) additional disclosures as may be specified by the Board. (2) The disclosures as provided
      in sub-regulation (1) shall be made on the websites of stock exchange(s) where such securities are proposed to be listed
      and shall be available for download in PDF or any other format as may be specified by the Board. (3) The issuer shall
      ensure that the audited financial statements contained in the placement memorandum 29[] shall not be more than six months
      old from the date of filing placement memorandum or the issue opening date, as applicable: 27 Substituted by the by
      the Securities and Exchange Board of India (Issue and Listing of Non-Convertible Securities) (Amendment) Regulations,
      2024 w. Prior to substitution, it read as The debenture trustee shall submit a due diligence certificate to the stock
      exchange: (a) in case of secured debt securities, in the format as specified in Schedule IV of these regulations; and
      (b) in case of unsecured debt securities, in the format as specified in Schedule IVA of these regulations. Prior to
      this, it was substituted by the Securities and Exchange Board of India (Issue and Listing of Non-Convertible Securities)
      (Amendment) Regulations, 2022, w. Prior to substitution, sub-regulation 3 read as: Debenture trustee shall submit a
      due diligence certificate to the stock exchange in the format as specified in Schedule IV of these regulations. 28 Substituted
      by the Securities and Exchange Board of India (Issue and Listing of Non-Convertible Securities) (Second Amendment) Regulations,
      2023, w. Prior to substitution, the words were Schedule II. 29 Omitted by the Securities and Exchange Board of India
      (Issue and Listing of Non-Convertible Securities) (Second Amendment) Regulations, 2023, w. Prior to omission, the words
      were and tranche placement memorandum. Page 26 of 79 Provided that in case of: (a) listed issuers (whose non-convertible
      securities or specified securities are listed on recognised stock exchange(s)), who are in compliance with the listing
      regulations; (b) the issuers of non-convertible securities, who are subsidiaries of entities who have listed their specified
      securities, and are in compliance with the listing regulations, instead of audited financial statements for the stub
      period, they may disclose unaudited financial information for such period in the format as prescribed in the listing
      regulations with limited review report, as filed with the stock exchange(s), subject to necessary disclosures in this
      regard in the placement memorandum including risk factors. Allotment of securities 46. The issuer shall ensure allotment
      of debt securities and non-convertible redeemable preference shares issued on a private placement basis and credit to
      the dematerialised account of the investors, is made within such time as may be specified by the Board. PART B ADDITIONAL
      PROVISIONS FOR LISTING OF DEBT SECURITIES ISSUED ON PRIVATE PLACEMENT BASIS Filing of shelf placement memorandum 47.
      30[] Creation of security 48. (1) While creating a charge or security, the issuer shall have the option to create charge
