widgetData:
- source_sentence: (Laughter) And I've already hinted what that something is.
  sentences:
  - हे मजेशीर आहे, मी ट्विटर आणि फेसबुकवर विचारले असे की, "तुम्ही अगतिकतेची व्याख्या कशी कराल? तुम्हाला कशामुळे अगतिक वाटते?"
  - (हशा) आणि मी आधीच थोडीशी कल्पना दिली आहे ते काय करावे लागेल त्याबद्दल.
  - 'तर मी जेव्हा ह्या दालनात नजर फिरवितो माणसांवर, ज्यांनी मिळवलंय, किंवा मिळवायच्या मार्गावर आहेत, लक्षणीय यश, मी त्यांना
    हे लक्षात ठेवायला सांगतो: वाट पाहू नका.'
- source_sentence: I no longer try to be right; I choose to be happy.
  sentences:
  - এটি একটি অসাধারণ ঘনটা এবং এক অদ্ভুত অনুধাবন।
  - কেন এই ধারণাটা ছড়িয়ে গেল?
  - আমি সুখে থাকাকেই বেছে নিয়েছি।
- source_sentence: And if tempers are still too high, then they send someone off to visit some relatives, as a cooling-off
    period.
  sentences:
  - और यदि तब भी गुस्सा शांत न हो, तो वो किसी को अपने रिश्तेदारों से मिलने भेज देते हैं शांत होने के लिये।
  - और वे तुम्हे गलत समय पर बाधित करते रहते है जब तुम अच मैं कुच करने कि कोशिश कर रहे होते हो जिसके लिये वे तुम्हे भुगतान
    करते है वे तुमको बधित करते हैं।
  - 'इस प्रयोग का आखिरी सवाल था: कैसे आप अपने जीवन से दूसरों पर सकारात्मक प्रभाव डालेंगे?'
- source_sentence: I see, I see one way in the back.
  sentences:
  - ಸ್ಟಾಂಡರ್ಡ್ ಚಾರ್ಟರ್ಡ್ 140 ಮಿಲಿಯನ್ ತಂದಿದೆ.
  - ನಗರಗಳಲ್ಲಂತೂ ಶೇಕಡಾ ೮೦ರಷ್ಟು ಮಕ್ಕಳು ಕಾಲೇಜಿಗೆ ಹೋಗುತ್ತಾರೆ.
  - ಇನ್ನು ಯಾರಾದರೂ? ನನಗೆ ಕಾಣಿಸುತ್ತಿದೆ, ಅಲ್ಲಿ..ಹಿಂದೆ.. ಒಂದು ಕೈ ಕಾಣಿಸುತ್ತಿದೆ.
- source_sentence: Whenever it rains, magically, mushrooms appear overnight.
  sentences:
  - ಈ ವಿಷಯವನ್ನು ಅವರು ಮುಚ್ಚಿಟ್ಟರು, ಆದರೆ ಇತರರಿಗೆ ಬೇಗನೇ ತಿಳಿಯಿತು.
  - ಮಳೆಯಾದಾಗೆಲ್ಲ, ಮನಮೋಹಕವಾಗಿ, ಅಣಬೆಗಳು ಒಂದು ರಾತ್ರಿಯ  ವೇಳೆಯಲ್ಲಿ ಕಾಣಿಸಿಕೊಳ್ಳುತ್ತವೆ.
  - 'ಪ್ರೇಕ್ಷಕ: 1947 ಎಬಿ: 1947, ಯಾವ ತಿಂಗಳು?'
