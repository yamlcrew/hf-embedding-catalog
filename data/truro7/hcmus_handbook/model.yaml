- source_sentence: tôi ko đủ điều kiện tốt nghiệp nhưng đã hoàn tất chương trình sẽ được xử lý thế nào ?
  sentences:
  - "tích luỹ của chương trình thứ nhất đạt dưới điểm trung bình. b) Đạt ít hơn 15 tín chỉ tích lũy/một học kỳ (không kể Ngoại\
    \ ngữ, Giáo dục Quốc Phòng, Giáo dục thể chất, Tin học cơ sở). 82 \n \n3. Thời gian tối đa được phép học đối với sinh\
    \ viên học cùng lúc hai chương \ntrình là thời gian tối đa quy định cho chương trình thứ nhất, quy định tại khoản 7 Điều\
    \ \n2 của Quy chế này. Khi học chương trình thứ hai, sinh viên được công nhận kết quả \ncủa những học phần có nội dung\
    \ và khối lượng kiến thức tương đương có trong \nchương trình thứ nhất. \n4. Điều kiện để sinh viên được xét cấp bằng\
    \ tốt nghiệp ngành thứ hai: \na) Được cấp bằng tốt nghiệp ở ngành thứ nhất. \nb) Đủ điều kiện xét tốt nghiệp ở ngành thứ\
    \ hai. \nc) Nộp hồ sơ xét tốt nghiệp ngành thứ hai trong thời gian tối đa quy định cho \nchương trình thứ nhất. \n5. \
    \ Trường chỉ tổ chức đào tạo chương trình thứ hai cho sinh viên khi đáp \nứng các yêu cầu bảo đảm chất lượng về chỉ tiêu\
    \ tuyển sinh, năng lực đào tạo; đồng \nthời có quy định chi tiết về quy trình, thủ tục, điều kiện đăng ký học và cấp bằng\
    \ tốt \nnghiệp chương trình thứ hai. \nĐiều 23.  Xử lý vi phạm đối với sinh viên \n1. Sinh viên có gian lận trong thi,\
    \ kiểm tra, đánh giá kết quả học tập sẽ bị xử \nlý kỷ luật đối với từng học phần đã vi phạm theo các quy định của Quy\
    \ chế thi tốt \nnghiệp Trung học phổ thông hiện hành do Bộ Giáo dục và Đào tạo ban hành, trừ \ntrường hợp quy định tại\
    \ khoản 2 Điều này. \n2. Sinh viên thi hộ hoặc nhờ người thi hộ đều bị kỷ luật ở mức đình chỉ học \ntập 01 (một) năm đối\
    \ với trường hợp vi phạm lần thứ nhất và buộc thôi học đối với \ntrường hợp vi phạm lần thứ hai. \n3. Người học sử dụng\
    \ hồ sơ, văn bằng, chứng chỉ giả làm điều kiện trúng \ntuyển hoặc điều kiện tốt nghiệp sẽ bị buộc thôi học; văn bằng tốt\
    \ nghiệp nếu đã \nđược cấp sẽ bị thu hồi, huỷ bỏ."
  - "kỳ tiếp theo. 8. Sinh viên tốt nghiệp trễ tiến độ nếu không vi phạm pháp luật và bị kỷ luật thì không áp dụng tính Điểm\
    \ trừ trong học kỳ trễ tiến độ. Sinh viên đã hoàn tất 122 \n \nchương trình đào tạo nhưng chưa đủ điều kiện tốt nghiệp\
    \ thì không đánh giá kết quả \nrèn luyện. \n9. Sinh viên khuyết tật hoặc mồ côi (cả cha lẫn mẹ hoặc cha hoặc mẹ), hoàn\
    \ \ncảnh gia đình đặc biệt khó khăn có xác nhận của địa phương không có khả năng \ntham gia hoặc không đáp ứng yêu cầu\
    \ chung các hoạt động rèn luyện thì được ưu \ntiên, khuyến khích, cộng điểm khi đánh giá kết quả rèn luyện.  \n10. Sinh\
    \ viên đạt thủ khoa đầu ra toàn khóa của các ngành sẽ được cộng 10 \nđiểm vào điểm rèn luyện toàn khóa học nếu như không\
    \ vi phạm kỷ luật trong toàn \nbộ quá trình học. \n11. Sinh viên đạt giải trong các kỳ thi cấp Quốc gia trở lên sẽ được\
    \ cộng 5 \nđiểm vào điểm rèn luyện toàn khóa học nếu như không vi phạm nội quy, quy chế \nhoặc bị kỷ luật trong toàn bộ\
    \ quá trình học. \n12. Các trường hợp đặc biệt khác Hội đồng đánh giá cấp Trường sẽ xem xét \nvà quyết định cụ thể. \n\
    Chương IV \nTỔ CHỨC ĐÁNH GIÁ VÀ SỬ DỤNG KẾT QUẢ ĐÁNH GIÁ \nĐiều 9.  Quy trình đánh giá kết quả rèn luyện \n1. Vào đầu\
    \ mỗi năm học, Phòng Công tác Sinh viên xây dựng kế hoạch và \nphổ biến công tác đánh giá kết quả rèn luyện của sinh viên\
    \ đến các Khoa, Đoàn \nthanh niên và Hội Sinh viên. \n2. Trong mỗi học kỳ, sinh viên căn cứ vào kết quả rèn luyện của\
    \ bản thân, tự \nđánh giá theo mức điểm chi tiết tại Phụ lục ban hành kèm theo Quy chế này. \n3. Vào cuối mỗi tháng và\
    \ cuối mỗi học kỳ, các Khoa, Đoàn thanh niên và Hội \nSinh viên tiến hành cập nhật các thành tích của sinh viên, danh\
    \ sách sinh viên tham \ngia các sự kiện, chương trình, hoạt động do đơn vị chịu trách nhiệm tổ chức theo \nphương thức\
    \ đã thống nhất với Phòng Công tác Sinh viên."
  - "do thiên tai hoặc dịch bệnh, đánh giá cuối học kỳ theo hình thức thi viết có thể được tổ chức bằng phương thức trực tuyến;\
    \ Hiệu trưởng quyết định lựa chọn đánh giá cuối học kỳ bằng phương 86 \n \nthức trực tuyến thay cho phương thức trực tiếp\
    \ theo quy định, bảo đảm trung thực, \ncông bằng và khách quan như khi đánh giá trực tiếp. \n5. Đối với loại học phần\
    \ thực hành: sinh viên phải tham dự đầy đủ các bài \nthực hành. Điểm tổng hợp đánh giá học phần là các điểm thành phần\
    \ bao gồm: điểm \ncác bài thực hành trong học kỳ, điểm chuyên cần, điểm bài thi thực hành cuối kỳ. \n6. Điểm học phần\
    \ theo thang điểm 10, là điểm cuối cùng để đánh giá kết \nquả của một học phần, được tính từ tổng các điểm thành phần\
    \ nhân với trọng số \ntương ứng, được làm tròn tới một chữ số thập phân. \n7. Sinh viên phải hoàn thành nghĩa vụ đóng\
    \ học phí theo quy định. \nĐiều 7. Công tác tổ chức thi kết thúc học phần  \n7.1. Cuối mỗi học kỳ, Trường chỉ tổ chức\
    \ một kỳ thi kết thúc học phần theo kế \nhoạch giảng dạy và học tập của học kỳ, năm học. Công tác tổ chức thi kết thúc\
    \ học \nphần do Phòng Khảo thí và ĐBCL phụ trách, bao gồm: xếp lịch thi, in danh sách thi, \nmời cán bộ coi thi, tổ chức\
    \ thi, in sao đề thi, bàn giao bài thi cho giảng viên chấm \nvà nhận lại điểm thi đã chấm, thanh toán coi thi, chấm thi\
    \ … \n7.2. Lịch thi kết thúc học phần phải được công bố cho sinh viên trước 1 tháng \n(tính từ ngày bắt đầu thi). \n7.3.\
    \ Phòng Đào tạo có trách nhiệm cung cấp dữ liệu cho Phòng Khảo thí và \nĐBCL chuẩn bị công tác tổ chức thi. \n7.4. Các\
    \ Khoa/Bộ môn có trách nhiệm phối hợp với Phòng Khảo thí và ĐBCL \ntrong công tác cung cấp thông tin các học phần mở trong\
    \ học kỳ; hỗ trợ cán bộ coi \nthi; tổ chức thi các lớp thực hành. \nĐiều 8. Đề thi kết thúc học phần  \n8.1. Về nội dung:\
    \ Đề thi kết thúc học phần phải phù hợp với nội dung học phần \nđã quy định trong đề cương chi tiết học phần. Đối với\
    \ các môn chung thuộc khối"
- source_sentence: phân loại kết quả rèn luyện theo điểm số được chia như thế nào ?
  sentences:
  - "trao đổi với các bên liên quan về các hành vi vi phạm của SV. c) Khoa hoặc Phòng Công tác sinh viên xem xét, đề nghị\
    \ Hội đồng khen thưởng và kỷ luật sinh viên của Nhà trường; 144 \n \nd) Hội đồng khen thưởng và kỷ luật sinh viên tổ chức\
    \ họp để xét kỷ luật, \nthành phần bao gồm: các thành viên của Hội đồng, đại diện tập thể lớp \nSV có SV vi phạm và SV\
    \ có hành vi vi phạm (nếu có). SV vi phạm kỷ luật \nđã được mời mà không đến dự (nếu không có lý do chính đáng), không\
    \ \ncó bản Tự kiểm điểm thì Hội đồng vẫn tiến hành họp và xét thêm khuyết \nđiểm thiếu ý thức tổ chức kỷ luật.  \nHội\
    \ đồng kiến nghị áp dụng hình thức kỷ luật và có văn bản đề nghị Hiệu \ntrưởng ra quyết định kỷ luật bằng văn bản. \n\
    2. \nHồ sơ xử lý kỷ luật của SV: \na) Bản tự kiểm điểm (nếu có); \nb) Biên bản các buổi làm việc (theo Điểm b Khoản 1\
    \ Điều này); \nc) Biên bản họp Hội đồng khen thưởng và kỷ luật sinh viên; \nd) Các tài liệu có liên quan khác. \nĐiều\
    \ 13. Chấm dứt hiệu lực của quyết định kỷ luật \n1. \nĐối với SV bị kỷ luật khiển trách: sau 03 tháng kể từ ngày có quyết\
    \ định kỷ \nluật, nếu SV không tái phạm hoặc không có những vi phạm đến mức phải xử lý kỷ \nluật thì đương nhiên được\
    \ chấm dứt hiệu lực của quyết định kỷ luật và được hưởng \nquyền lợi của SV kể từ ngày quyết định kỷ luật chấm dứt hiệu\
    \ lực. \n2. \nĐối với SV bị kỷ luật cảnh cáo: sau 06 tháng kể từ ngày có quyết định kỷ \nluật, nếu SV không tái phạm hoặc\
    \ không có những vi phạm đến mức phải xử lý kỷ \nluật thì đương nhiên được chấm dứt hiệu lực của quyết định kỷ luật và\
    \ được hưởng \nquyền lợi của SV kể từ ngày quyết định kỷ luật chấm dứt hiệu lực. \n3. \nĐối với trường hợp đình chỉ học\
    \ tập có thời hạn: khi hết thời hạn đình chỉ, \nSV phải nộp đơn xin học lại kèm theo chứng nhận của địa phương (cấp xã,\
    \ phường, \nthị trấn) nơi cư trú về việc chấp hành tốt nghĩa vụ công dân tại địa phương; chứng \nnhận của cơ quan có thẩm\
    \ quyền về việc đã chấp hành xong hình phạt tù nhưng \ncho hưởng án treo để Nhà trường xem xét, tiếp nhận vào học tiếp\
    \ nếu đủ điều kiện."
  - "tiếng, giữ gìn vệ sinh chung. 4. Nhà trường từ chối phục vụ đối với khách đã sử dụng rượu bia/chất kích thích, trang\
    \ phục không lịch sự, thái độ ứng xử không đúng mực khi đến cơ quan./. 163 \n \nQUY ĐỊNH \nXÉT CẤP HỌC BỔNG KHUYẾN KHÍCH\
    \ HỌC TẬP \n(Ban hành kèm theo quyết định số 575/QĐ-KHTN ngày 25/03/2024 của Hiệu \ntrưởng Trường ĐH Khoa học tự nhiên,\
    \ ĐHQG-HCM) \n \nĐiều 1: Quy định chung \n-  Học bổng này áp dụng đối với tất cả sinh viên (SV) Đại học Chính quy \n(ĐHCQ)\
    \ tại Trường Đại học Khoa học tự nhiên đang trong thời gian đào tạo theo thiết \nkế của khóa học. \n-  SV không bị kỷ\
    \ luật từ mức khiển trách trở lên trong kỳ xét học bổng. \n- Học bổng được cấp theo từng học kỳ trong năm học như sau:\
    \ \n•  Đối với SV ĐHCQ: cấp 2 học kỳ, mỗi học kỳ 5 tháng. \n•  Đối với SV ĐHCQ chương trình Chất lượng cao, Tiên tiến,\
    \ Việt - \nPháp: cấp 03 học kỳ.  \n- Điểm trung bình xét học bổng trong kỳ được tính từ điểm học phần lần thứ \nnhất,\
    \ không bao gồm điểm I, điểm học phần cải thiện, điểm học phần trả nợ và điểm \ncác học phần không được tính vào điểm\
    \ trung bình theo Quy chế đào tạo trình độ \nĐại học hiện hành của Trường. \n- Số tín chỉ đăng ký tối thiểu là số tín\
    \ chỉ của các học phần đăng ký học trong kỳ. \n- Số tín chỉ xét học bổng là số tín chỉ của các học phần tham gia vào việc\
    \ \ntính Điểm trung bình xét học bổng. \n- Trong kỳ xét học bổng, SV không có bất kỳ điểm học phần nào dưới 5.0 \n(bao\
    \ gồm điểm của các học phần không tính vào Điểm trung bình xét học bổng). \n- Điểm rèn luyện là điểm được xác định theo\
    \ Quy chế đánh giá kết quả rèn \nluyện SV đang được áp dụng."
  - "Tốt, Khá, Trung bình, Yếu và Kém. 2. Phân loại kết quả rèn luyện: a) Từ 90 đến 100 điểm: loại Xuất sắc. b) Từ 80 đến\
    \ 89 điểm: loại Tốt. c) Từ 65 đến 79 điểm: loại Khá. 121 \n \nd) \nTừ 50 đến 64 điểm: loại Trung bình. \ne) \nTừ 35 đến\
    \ 49 điểm: loại Yếu. \nf) \nDưới 35 điểm: loại Kém. \nĐiều 8.  Phân loại sinh viên để đánh giá \n1. Trong thời gian sinh\
    \ viên bị kỷ luật mức khiển trách, kết quả rèn luyện không \nđược vượt quá loại Khá. \n2. Trong thời gian sinh viên bị\
    \ kỷ luật mức cảnh cáo, kết quả rèn luyện không \nđược vượt quá loại Trung bình. \n3. Sinh viên bị kỷ luật mức đình chỉ\
    \ học tập không được đánh giá rèn luyện \ntrong thời gian bị đình chỉ. \n4. Sinh viên bị kỷ luật mức buộc thôi học không\
    \ được đánh giá kết quả rèn \nluyện.  \n5. Sinh viên nghỉ học tạm thời hoặc sinh viên còn đang trong thời gian đào tạo\
    \ \nnhưng không đăng ký học phần thì kết quả rèn luyện trong học kỳ đó được xếp loại \nTrung bình (50 điểm). \n6. Sinh\
    \ viên đồng thời học hai chương trình đào tạo sẽ được đánh giá kết quả \nrèn luyện tại đơn vị quản lý chương trình thứ\
    \ nhất và lấy ý kiến nhận xét của đơn vị \nquản lý chương trình thứ hai làm căn cứ, cơ sở để đánh giá thêm. Trường hợp\
    \ chương \ntrình thứ nhất đã hoàn thành thì đơn vị quản lý chương trình thứ hai sẽ tiếp tục được \nđánh giá kết quả rèn\
    \ luyện của người học. \n7. Sinh viên chuyển trường được sự đồng ý của Hiệu trưởng hai cơ sở đào tạo \nthì được bảo lưu\
