- source_sentence: A partir daí, a Capa foi passada para o filho mais velho de cada geração.
  sentences:
  - Deste dia em diante, a capa foi passada para o mais velho de cada nova geração.
  - As receitas do encontro deverão ser penhoradas.
  - Morreu nessa sexta-feira o compositor Fernando Brant.
- source_sentence: É sem dúvida o melhor recomeço que poderíamos ter, porque vencemos grandes adversários.
  sentences:
  - Sem dúvida nenhuma, foi o melhor recomeço que a gente poderia ter.
  - Além disso, são ainda disponibilizados três parques de estacionamento gratuitos perto dos pontos principais.
  - Zelada substituiu Nestor Cerveró na Diretoria Internacional da Petrobrás em 2008.
- source_sentence: Além do Snapdragon 820, outros processadores que receberão o Quick Charge 3.0 incluem Snapdragon 620, 618,
    617, e 430.
  sentences:
  - A definição da chave acontecerá na próxima terça-feira.
  - O objetivo de Putin é coordenarem um plano conjunto de ações aéreas e por mar.
  - A tecnologia Quick Charge 3.0 vai estar presente nos processadores Snapdragon 820, 620, 618, 617 e 430.
- source_sentence: Foi também instaurado um inquérito ao Atlético de Madrid por "bloqueamento de escadas" do estádio Vicente
    Calderón.
  sentences:
  - Ainda hoje me questionado os motivos de ser o patinho feito da imprensa.
  - O Atlético de Madrid também incorre numa acusação, a de ter escadas bloqueadas no Estádio Vicente Calderón.
  - Em contrapartida, na sondagem da Universidade Católica para a RTP, o destaque vai também para os pequenos partidos.
- source_sentence: O 1.º troféu disputado em Portugal foi ganho pelo Sporting e o Sporting é líder do campeonato com o FC
    Porto .
  sentences:
  - O primeiro troféu que se disputou em Portugal foi ganho pelo Sporting.
  - Deste dia em diante, a capa foi passada para o mais velho de cada nova geração.
  - Alexandre Pato recebeu em posição legal, fez o gol, mas o impedimento foi marcado.
