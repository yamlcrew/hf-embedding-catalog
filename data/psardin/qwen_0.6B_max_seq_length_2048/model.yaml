  - source_sentence: "Tom provoziert Nico verbal in dessen Bar «zum Wolf», weshalb Nico ihn aus seinem Lokal verweist. Tom\
      \ ist hierüber erzürnt, wartet bis zum Feierabend bis Nico die Bar verlässt und zieht seine Pistole aus der Jackentasche.\
      \ Er gibt vor dem Lokal aus einer Distanz von ca. 10 Metern einen gezielten Schuss ab, trifft Nico jedoch nicht. Kurz\
      \ danach wird Tom von der Polizei festgenommen. Er wird von der Polizei korrekt belehrt und danach zur Sache befragt.\
      \ Er gibt zu, dass er in der Bar «zum Wolf» etwas getrunken hat, bestreitet aber, irgendetwas mit dem Vorfall zu tun\
      \ zu haben. Weiter erklärt er, dass er ohne seinen Anwalt keine weiteren Aussagen machen wird. Nach der ersten staatsanwaltschaftlichen\
      \ Einvernahme wird für Tom ein Rechtsanwalt bestellt. Im Rahmen des Untersuchungsverfahrens findet in der Folge eine\
      \ Konfrontationseinvernahme zwischen Nico als Hauptbelastungszeuge und Tom statt. Umstritten ist dabei vor allem die\
      \ Zielrichtung des Schusses. Während Nico sagt, Tom habe direkt auf ihn gezielt, sagt Tom, er habe gezielt danebengeschossen.\
      \ Weitere Zeugen konnten nicht ausfindig gemacht werden. \nSind die Aussagen von Tom, welche er bei der Polizei machte,\
      \ verwertbar?"
    sentences:
    - 1 Für die vorzeitige Erteilung der Niederlassungsbewilligung müssen die Integrationskriterien nach Artikel 58a Absatz
      1 AIG erfüllt sein.
    - 3 Das Rechtsgeschäft bedarf zu seiner Gültigkeit der öffentlichen Beurkundung oder, wenn es eine Verfügung von Todes
      wegen oder ein Erbteilungsvertrag ist, der im Erbrecht vorgeschriebenen Form.
    - 'Die beschuldigte Person muss verteidigt werden, wenn:a. die Untersuchungshaft einschliesslich einer vorläufigen Festnahme
      mehr als 10 Tage gedauert hat;

      b.61 ihr eine Freiheitsstrafe von mehr als einem Jahr, eine freiheitsentziehende Massnahme oder eine Landesverweisung
      droht;

      c. sie wegen ihres körperlichen oder geistigen Zustandes oder aus anderen Gründen ihre Verfahrensinteressen nicht ausreichend
      wahren kann und die gesetzliche Vertretung dazu nicht in der Lage ist;

      d. die Staatsanwaltschaft vor dem erstinstanzlichen Gericht oder dem Berufungsgericht persönlich auftritt;

      e. ein abgekürztes Verfahren (Art. 358–362) durchgeführt wird.'
  - source_sentence: "Die Stadt Winterthur beschloss am 10. Februar 2022, die Fabrikantenvilla «Alpenschloss» nicht unter\
      \ Denkmalschutz zu stellen. Gegen diesen Beschluss erhob der Verein für Orts- und Kulturpflege ohne anwaltliche Vertretung\
      \ Rekurs beim Baurekursgericht des Kantons Zürich. Zu seiner Legitimation führt der Verein mit Sitz in Aarau aus, er\
      \ setze sich seit dem Jahr 2000 gesamtschweizerisch statutengemäss für eine vielfältige Kultur sowie für intakte, harmonische\
      \ Ortsbilder ein, worunter er auch die Erhaltung wichtiger Zeugen der Kultur und Architektur zähle. Neben der Geschäftsstelle\
      \ in Aarau verfüge er über eine Regionalvertretung in Zürich sowie eine in Fribourg. Aus der Homepage des Vereins geht\
      \ ausserdem hervor, dass er gelegentlich ein Verzeichnis mit Ortschaften und Ortsteilen publiziert, welche er ohne nähere\
      \ Begründung in verschiedene Kategorien einteilt (A: ortstypisch, harmonisch, malerisch – B: ohne architektonischen\
      \ orts typischen Charakter – C: unpassend, verunstaltend, architektonisch chaotisch). Das Baurekursgericht verzichtete\
      \ auf die Durchführung eines Vernehmlassungsverfahrens und trat am 25. Mai 2022 auf den Rekurs nicht ein. Es begründete\
      \ seinen Entscheid wie folgt: Der Verein habe es versäumt, seine legitimationsbegründende Tätigkeit ausführlicher darzu\
      \ legen und mit Unterlagen zu belegen. Der Rekurs sei deshalb nicht genügend substantiiert. Das Baurekursgericht ging\
      \ in seiner Urteilsbegründung nicht auf das auf der Homepage des Vereins genannte Verzeichnis der Ortschaften und Ortsteile\
      \ ein. Der Verein ist empört über diesen Entscheid und möchte ihn weiterziehen. Der Verein für Orts- und Kulturpflege\
      \ hat das Rechtsmittel gegen den Entscheid des Baure kursgerichts ergriffen und reicht mit seinem Rechtsmittel Unterlagen\
      \ ein, woraus hervorgehen soll, dass er sich auch mit Denkmälern und Ortschaften im Kanton Zürich beschäftigt hat. So\
      \ findet sich nun ein Auszug aus dem oben genannten Verzeichnis von Ortschaften und Ortstei len im Kanton Zürich bei\
      \ den Akten, welche er kategorisiert hat. Gehen Sie davon aus, dass das Baurekursgericht auf den Rekurs des Vereins\
      \ für Orts- und \nKulturpflege eintritt und die Frage, ob die Stadt Winterthur das «Alpenschloss» zurecht nicht \nunter\
      \ Schutz gestellt hat, materiell zu beurteilen hat. Bei den Akten liegt ein denkmalpflegeri\nsches Gutachten, das die\
      \ Stadt Winterthur eingeholt hat und auf das sie sich in ihrem Be\nschluss wesentlich abstützt. Der Verein für Orts-\
      \ und Kulturpflege bringt in seiner Replik erst\nmals vor, die Gutachterin sei Vorstandsmitglied des Vereins der Hauseigentümer\
      \ Zürich, einer Untersektion des Schweizerischen Vereins der Hauseigentümer. Dieser Verein sei bekannt für \nseine eigentümer-\
      \ und investorenfreundliche Haltung. Der Denkmalschutz werde «in diesen \nKreisen» als überflüssig angesehen. Überhaupt\
      \ sei dieses Gutachten ein Gefälligkeitsgutach\nten. Der Verein für Orts- und Kulturpflege reicht ein von ihm in Auftrag\
      \ gegebenes Gutachten \nein, welches zu einem anderen Schluss kommt als dasjenige, das die Stadt Winterthur einge\n\
      holt hat. Nehmen Sie an, die letzte kantonale Rechtsmittelinstanz hat das Rechtsmittel des Vereins für \nOrts- und Kulturpflege\
      \ gutgeheissen und das Verfahren an die Stadt Winterthur zurückgewie\nsen, um das «Alpenschloss» unter Denkmalschutz\
      \ zu stellen. Gegen diesen Entscheid möchte \nsich die Stadt Winterthur wehren. Anhang \nAuszug aus dem Planungs- und\
      \ Baugesetz (PBG) des Kantons Zürich \nC. Rekurs- und Beschwerdelegitimation \nI. Allgemein \n§ 338 a. Zum Rekurs und\
      \ zur Beschwerde ist berechtigt, wer durch die angefochtene Anord\nnung berührt ist und ein schutzwürdiges Interesse\
      \ an ihrer Aufhebung oder Änderung hat. \nDasselbe gilt für die Anfechtung von Erlassen. \nII. Kantonale Verbandsbeschwerde\
      \ \n§ 338 b. 1 Gesamtkantonal tätige Verbände, die sich seit wenigstens zehn Jahren im Kanton \nstatutengemäss dem Natur-\
      \ und Heimatschutz oder verwandten, rein ideellen Zielen wid\nmen, können Rekurs oder Beschwerde erheben gegen: \na.\
      \ Anordnungen und Erlasse, soweit sie sich auf den III. Titel [Der Natur- und Heimatschutz] \noder § 238 Abs. 2 stützen,\
      \ \nb. Bewilligungen für Bauten und Anlagen ausserhalb der Bauzonen, \nc. Festsetzungen von überkommunalen Gestaltungsplänen\
      \ ausserhalb der Bauzonen. \n2Das Rekurs- oder Beschwerderecht steht den Verbänden nur für Rügen zu, die mit den In\n\
      teressen des Natur- und Heimatschutzes in unmittelbarem Zusammenhang stehen. \n3Treffen Gesuchsteller und Verband Vereinbarungen\
      \ über Verpflichtungen, die Belange des \nöffentlichen Rechts betreffen, gelten diese ausschliesslich als gemeinsame\
      \ Anträge an die \nBehörde. Diese berücksichtigt das Ergebnis in ihrer Anordnung oder ihrem Entscheid, soweit \nsich\
      \ die Vereinbarungen als rechtmässig und angemessen erweisen und der Sachverhalt \nrichtig und vollständig festgestellt\
      \ wurde. \n4Vereinbarungen zwischen Gesuchstellern und Verbänden über finanzielle oder andere \nLeistungen sind nicht\
      \ zulässig, soweit diese bestimmt sind für: \na. die Durchsetzung von Verpflichtungen des öffentlichen Rechts, insbesondere\
      \ behördlicher \nAuflagen, \nb. Massnahmen, die das öffentliche Recht nicht vorsieht oder die in keinem Zusammenhang\
      \ \nmit dem Vorhaben stehen, \nc. die Abgeltung eines Rechtsmittelverzichts oder eines anderen prozessualen Verhaltens.\
      \ \n5Die Rechtsmittelbehörde tritt auf einen Rekurs oder eine Beschwerde nicht ein, wenn die\nser oder diese rechtsmissbräuchlich\
      \ ist oder der Verband unzulässige Leistungen im Sinne \nvon Abs. 3 gefordert hat.  \nWelche Voraussetzungen müssen\
      \ erfüllt sein, damit die Stadt Winterthur ein Rechts mittel vor Bundesgericht ergreifen kann? Erläutern Sie kurz inwiefern\
      \ diese erfüllt sind. Beschränken Sie sich bei Ihrer Antwort auf das Anfechtungsobjekt, die Beschwerdele gitimation\
      \ und Beschwerdegründe."
