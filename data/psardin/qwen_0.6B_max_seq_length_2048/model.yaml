      ist jede geldwerte Leistung der Gesellschaft oder Genossenschaft an die Inhaber gesellschaftlicher Beteiligungsrechte
      oder an ihnen nahestehende Dritte, die sich nicht als Rückzahlung der im Zeitpunkt der Leistung bestehenden Anteile
      am einbezahlten Grund- oder Stammkapital darstellt (Dividenden, Boni, Gratisaktien, Gratis-Partizipationsscheine, Liquidationsüberschüsse
      und dergleichen).25
  - source_sentence: "Herr A. ist 50 Jahre alt und war lange Zeit arbeitslos. Seit kurzem hat er bei der Tiefbau AG\neine\
      \ neue Stelle als «Aufräumer». Jeden Freitagabend fährt Herr A. zu einer Baustelle der\nTiefbau AG und räumt während\
      \ rund vier Stunden die Baustelle auf. Er ordnet die Gerät-\nschaften, reinigt den Pausencontainer und kontrolliert,\
      \ ob die Baustelle vorschriftsmässig ge-\nsichert und abgeschlossen ist.\nAuf einer Baustelle, auf der ein altes Bauernhaus\
      \ umgebaut wird, entdeckt Herr A. bei seinem\nKontrollgang eine Wandnische. Darin befindet sich eine alte Jagdflinte.\
      \ Herr A., der bis zu\ndiesem Zeitpunkt noch nie eine echte Waffe in der Hand gehalten hat, ist begeistert und ent-\n\
      schliesst sich, die Waffe mit nach Hause zu nehmen.\nAuf dem Weg nach Hause deponiert A. die Waffe auf dem Beifahrersitz\
      \ seines Autos. Bei\neiner längeren Rotlichtphase kann Herr A. seine Neugierde nicht mehr zügeln und er schaut\nsich\
      \ die Jagdflinte genauer an. Dabei löst sich völlig unerwartet ein Schuss aus der Waffe und\nverletzt Herrn A. am Fuss.\n\
      Herr A. muss in der Folge im Krankenhaus behandelt werden und fällt für sechs Wochen bei\nder Tiefbau AG aus. \nHat\
      \ Herr A. allenfalls mit einer Kürzung der Leistungen zu rechnen?"
    sentences:
    - 2 In Abweichung von Artikel 21 Absatz 1 ATSG werden in der Versicherung der Nichtberufsunfälle die Taggelder, die während
      der ersten zwei Jahre nach dem Unfall ausgerichtet werden, gekürzt, wenn der Versicherte den Unfall grob fahrlässig
      herbeigeführt hat. Die Kürzung beträgt jedoch höchstens die Hälfte der Leistungen, wenn der Versicherte im Zeitpunkt
      des Unfalls für Angehörige zu sorgen hat, denen bei seinem Tode Hinterlassenenrenten zustehen würden.
    - 2 Der Vollzug ist nicht möglich, wenn die Ausländerin oder der Ausländer weder in den Heimat- oder in den Herkunftsstaat
      noch in einen Drittstaat ausreisen oder dorthin gebracht werden kann.
    - 3 Die Verteilnetzbetreiber legen in ihren Netzgebieten für feste Endverbraucher mit gleichartiger Verbrauchscharakteristik,
      die von der gleichen Spannungsebene Elektrizität beziehen, einen einheitlichen Elektrizitätstarif fest.14 Die Elektrizitätstarife
      sind für mindestens ein Jahr fest und sind aufgeschlüsselt nach Netznutzung, Energielieferung, Abgaben und Leistungen
      an Gemeinwesen zu veröffentlichen.
  - source_sentence: "Zulasten des Grundstücks GB 100 (Liegenschaft), das im Eigentum von Arthur (A) steht, be steht seit\
      \ dem 1.1.2019 ein selbständiges und dauerndes Baurecht zugunsten von Beat (B); im Rahmen des Baurechts wurde ein Parkhaus\
      \ mit 200 Parkplätzen erstellt. Der Baurechtszins, den der Baurechtsnehmer Beat dem Baurechtsgeber Arthur schuldet,\
      \ ist im Grundbuch eingetragen. Am 1. November 2021 verstirbt Beat. Einziger Erbe ist sein volljähriger Sohn Carl (C).\
      \ Mit dem Tod von Beat kehrt Unruhe ein: Der jährlich am 1. Januar geschuldete Baurechtszins wird schon im Jahr 2022\
      \ nicht mehr geleistet. Arthur lässt sich noch vertrösten, weil Carl ihm erläu tert, er befinde sich gerade in einem\
      \ finanziellen Engpass; er werde bis Ende 2022 die Zahlung leisten. Als Carl aber auch Ende Januar 2023 weder den Baurechtzins\
      \ 2022 noch für 2023 ge leistet hat, reisst bei Arthur der Geduldsfaden; er will wissen, ob und gegebenenfalls auf welche\
      \ Weise er den Baurechtszins erhältlich machen kann. Angesichts der finanziellen Probleme von Carl fürchtet er, dass\
      \ seine Forderung auf Leistung des Baurechtszinses ungedeckt bleibt. Carl anerkennt den Betrag der offenen Baurechtszinse\
      \ gegenüber Arthur schriftlich in der Hoffnung, Arthur damit ruhigzustellen und Zeit zu gewinnen. Bevor Arthur seine\
      \ rechtlichen Möglichkei ten ausschöpft, wird das Baurecht zur Vollstreckung anderweitiger Schulden im Rahmen einer\
      \ Betreibung auf Pfändung betreibungsrechtlich gepfändet. Carl versucht, seine Gläubiger abzu schütteln, indem er einige\
      \ Wochen später das selbständige und dauernde Baurecht ohne Ab sprache mit Arthur zu einem geringen Preis auf seinen\
      \ Freund Dieter (D) zu Eigentum überträgt in der Absicht, damit die Pfändung auszuhebeln. Das Grundbuchamt stellt Arthur\
      \ korrekt eine Anzeige zu, wonach das selbständige und dauernde Baurecht auf Dieter übertragen worden sei. Arthur ist\
      \ froh, dass jetzt der finanzkräftige Dieter Eigentümer des Baurechts ist, und kann sich erst jetzt dazu entschliessen,\
      \ seine Rechte bezüglich des Baurechtszinses vollumfänglich aus zuschöpfen. \nHat Arthur eine Möglichkeit, den ausstehenden\
      \ Baurechtszins mit einem immobiliarsa chenrechtlichen Instrument erhältlich zu machen? Nennen Sie Rechtsgrundlagen,\
      \ Vo raussetzungen und Wirkungen des Instruments."
    sentences:
    - 1 Ist der Schuldner zu einem Tun verpflichtet, so kann sich der Gläubiger, unter Vorbehalt seiner Ansprüche auf Schadenersatz,
      ermächtigen lassen, die Leistung auf Kosten des Schuldners vorzunehmen.
    - '1 Kein Prospekt muss veröffentlicht werden, wenn das öffentliche Angebot:a. sich nur an Anlegerinnen und Anleger richtet,
      die als professionelle Kunden gelten;

      b. sich an weniger als 500 Anlegerinnen und Anleger richtet;

      c. sich an Anlegerinnen und Anleger richtet, die Effekten im Wert von mindestens 100 000 Franken erwerben;

      d. eine Mindeststückelung von 100 000 Franken aufweist;

      e. über einen Zeitraum von 12 Monaten berechnet einen Gesamtwert von 8 Millionen Franken nicht übersteigt.'
