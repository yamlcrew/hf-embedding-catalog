- source_sentence: "Tom provoziert Nico verbal in dessen Bar «zum Wolf», weshalb Nico ihn aus seinem Lokal verweist. Tom ist\
    \ hierüber erzürnt, wartet bis zum Feierabend bis Nico die Bar verlässt und zieht seine Pistole aus der Jackentasche.\
    \ Er gibt vor dem Lokal aus einer Distanz von ca. 10 Metern einen gezielten Schuss ab, trifft Nico jedoch nicht. Kurz\
    \ danach wird Tom von der Polizei festgenommen. Er wird von der Polizei korrekt belehrt und danach zur Sache befragt.\
    \ Er gibt zu, dass er in der Bar «zum Wolf» etwas getrunken hat, bestreitet aber, irgendetwas mit dem Vorfall zu tun zu\
    \ haben. Weiter erklärt er, dass er ohne seinen Anwalt keine weiteren Aussagen machen wird. Nach der ersten staatsanwaltschaftlichen\
    \ Einvernahme wird für Tom ein Rechtsanwalt bestellt. Im Rahmen des Untersuchungsverfahrens findet in der Folge eine Konfrontationseinvernahme\
    \ zwischen Nico als Hauptbelastungszeuge und Tom statt. Umstritten ist dabei vor allem die Zielrichtung des Schusses.\
    \ Während Nico sagt, Tom habe direkt auf ihn gezielt, sagt Tom, er habe gezielt danebengeschossen. Weitere Zeugen konnten\
    \ nicht ausfindig gemacht werden. \nSind die Aussagen von Tom, welche er bei der Polizei machte, verwertbar?"
  sentences:
  - 1 Für die vorzeitige Erteilung der Niederlassungsbewilligung müssen die Integrationskriterien nach Artikel 58a Absatz
    1 AIG erfüllt sein.
  - 3 Das Rechtsgeschäft bedarf zu seiner Gültigkeit der öffentlichen Beurkundung oder, wenn es eine Verfügung von Todes wegen
    oder ein Erbteilungsvertrag ist, der im Erbrecht vorgeschriebenen Form.
  - 'Die beschuldigte Person muss verteidigt werden, wenn:a. die Untersuchungshaft einschliesslich einer vorläufigen Festnahme
    mehr als 10 Tage gedauert hat;

    b.61 ihr eine Freiheitsstrafe von mehr als einem Jahr, eine freiheitsentziehende Massnahme oder eine Landesverweisung
    droht;

    c. sie wegen ihres körperlichen oder geistigen Zustandes oder aus anderen Gründen ihre Verfahrensinteressen nicht ausreichend
    wahren kann und die gesetzliche Vertretung dazu nicht in der Lage ist;

    d. die Staatsanwaltschaft vor dem erstinstanzlichen Gericht oder dem Berufungsgericht persönlich auftritt;

    e. ein abgekürztes Verfahren (Art. 358–362) durchgeführt wird.'
- source_sentence: "Die Stadt Winterthur beschloss am 10. Februar 2022, die Fabrikantenvilla «Alpenschloss» nicht unter Denkmalschutz\
    \ zu stellen. Gegen diesen Beschluss erhob der Verein für Orts- und Kulturpflege ohne anwaltliche Vertretung Rekurs beim\
    \ Baurekursgericht des Kantons Zürich. Zu seiner Legitimation führt der Verein mit Sitz in Aarau aus, er setze sich seit\
    \ dem Jahr 2000 gesamtschweizerisch statutengemäss für eine vielfältige Kultur sowie für intakte, harmonische Ortsbilder\
    \ ein, worunter er auch die Erhaltung wichtiger Zeugen der Kultur und Architektur zähle. Neben der Geschäftsstelle in\
    \ Aarau verfüge er über eine Regionalvertretung in Zürich sowie eine in Fribourg. Aus der Homepage des Vereins geht ausserdem\
    \ hervor, dass er gelegentlich ein Verzeichnis mit Ortschaften und Ortsteilen publiziert, welche er ohne nähere Begründung\
    \ in verschiedene Kategorien einteilt (A: ortstypisch, harmonisch, malerisch – B: ohne architektonischen orts typischen\
    \ Charakter – C: unpassend, verunstaltend, architektonisch chaotisch). Das Baurekursgericht verzichtete auf die Durchführung\
    \ eines Vernehmlassungsverfahrens und trat am 25. Mai 2022 auf den Rekurs nicht ein. Es begründete seinen Entscheid wie\
    \ folgt: Der Verein habe es versäumt, seine legitimationsbegründende Tätigkeit ausführlicher darzu legen und mit Unterlagen\
    \ zu belegen. Der Rekurs sei deshalb nicht genügend substantiiert. Das Baurekursgericht ging in seiner Urteilsbegründung\
    \ nicht auf das auf der Homepage des Vereins genannte Verzeichnis der Ortschaften und Ortsteile ein. Der Verein ist empört\
    \ über diesen Entscheid und möchte ihn weiterziehen. Der Verein für Orts- und Kulturpflege hat das Rechtsmittel gegen\
    \ den Entscheid des Baure kursgerichts ergriffen und reicht mit seinem Rechtsmittel Unterlagen ein, woraus hervorgehen\
    \ soll, dass er sich auch mit Denkmälern und Ortschaften im Kanton Zürich beschäftigt hat. So findet sich nun ein Auszug\
    \ aus dem oben genannten Verzeichnis von Ortschaften und Ortstei len im Kanton Zürich bei den Akten, welche er kategorisiert\
    \ hat. Gehen Sie davon aus, dass das Baurekursgericht auf den Rekurs des Vereins für Orts- und \nKulturpflege eintritt\
    \ und die Frage, ob die Stadt Winterthur das «Alpenschloss» zurecht nicht \nunter Schutz gestellt hat, materiell zu beurteilen\
    \ hat. Bei den Akten liegt ein denkmalpflegeri\nsches Gutachten, das die Stadt Winterthur eingeholt hat und auf das sie\
    \ sich in ihrem Be\nschluss wesentlich abstützt. Der Verein für Orts- und Kulturpflege bringt in seiner Replik erst\n\
    mals vor, die Gutachterin sei Vorstandsmitglied des Vereins der Hauseigentümer Zürich, einer Untersektion des Schweizerischen\
    \ Vereins der Hauseigentümer. Dieser Verein sei bekannt für \nseine eigentümer- und investorenfreundliche Haltung. Der\
    \ Denkmalschutz werde «in diesen \nKreisen» als überflüssig angesehen. Überhaupt sei dieses Gutachten ein Gefälligkeitsgutach\n\
    ten. Der Verein für Orts- und Kulturpflege reicht ein von ihm in Auftrag gegebenes Gutachten \nein, welches zu einem anderen\
    \ Schluss kommt als dasjenige, das die Stadt Winterthur einge\nholt hat. Nehmen Sie an, die letzte kantonale Rechtsmittelinstanz\
    \ hat das Rechtsmittel des Vereins für \nOrts- und Kulturpflege gutgeheissen und das Verfahren an die Stadt Winterthur\
    \ zurückgewie\nsen, um das «Alpenschloss» unter Denkmalschutz zu stellen. Gegen diesen Entscheid möchte \nsich die Stadt\
    \ Winterthur wehren. Anhang \nAuszug aus dem Planungs- und Baugesetz (PBG) des Kantons Zürich \nC. Rekurs- und Beschwerdelegitimation\
    \ \nI. Allgemein \n§ 338 a. Zum Rekurs und zur Beschwerde ist berechtigt, wer durch die angefochtene Anord\nnung berührt\
    \ ist und ein schutzwürdiges Interesse an ihrer Aufhebung oder Änderung hat. \nDasselbe gilt für die Anfechtung von Erlassen.\
    \ \nII. Kantonale Verbandsbeschwerde \n§ 338 b. 1 Gesamtkantonal tätige Verbände, die sich seit wenigstens zehn Jahren\
    \ im Kanton \nstatutengemäss dem Natur- und Heimatschutz oder verwandten, rein ideellen Zielen wid\nmen, können Rekurs\
    \ oder Beschwerde erheben gegen: \na. Anordnungen und Erlasse, soweit sie sich auf den III. Titel [Der Natur- und Heimatschutz]\
    \ \noder § 238 Abs. 2 stützen, \nb. Bewilligungen für Bauten und Anlagen ausserhalb der Bauzonen, \nc. Festsetzungen von\
    \ überkommunalen Gestaltungsplänen ausserhalb der Bauzonen. \n2Das Rekurs- oder Beschwerderecht steht den Verbänden nur\
    \ für Rügen zu, die mit den In\nteressen des Natur- und Heimatschutzes in unmittelbarem Zusammenhang stehen. \n3Treffen\
    \ Gesuchsteller und Verband Vereinbarungen über Verpflichtungen, die Belange des \nöffentlichen Rechts betreffen, gelten\
    \ diese ausschliesslich als gemeinsame Anträge an die \nBehörde. Diese berücksichtigt das Ergebnis in ihrer Anordnung\
    \ oder ihrem Entscheid, soweit \nsich die Vereinbarungen als rechtmässig und angemessen erweisen und der Sachverhalt \n\
    richtig und vollständig festgestellt wurde. \n4Vereinbarungen zwischen Gesuchstellern und Verbänden über finanzielle oder\
    \ andere \nLeistungen sind nicht zulässig, soweit diese bestimmt sind für: \na. die Durchsetzung von Verpflichtungen des\
    \ öffentlichen Rechts, insbesondere behördlicher \nAuflagen, \nb. Massnahmen, die das öffentliche Recht nicht vorsieht\
    \ oder die in keinem Zusammenhang \nmit dem Vorhaben stehen, \nc. die Abgeltung eines Rechtsmittelverzichts oder eines\
    \ anderen prozessualen Verhaltens. \n5Die Rechtsmittelbehörde tritt auf einen Rekurs oder eine Beschwerde nicht ein, wenn\
    \ die\nser oder diese rechtsmissbräuchlich ist oder der Verband unzulässige Leistungen im Sinne \nvon Abs. 3 gefordert\
    \ hat.  \nWelche Voraussetzungen müssen erfüllt sein, damit die Stadt Winterthur ein Rechts mittel vor Bundesgericht ergreifen\
    \ kann? Erläutern Sie kurz inwiefern diese erfüllt sind. Beschränken Sie sich bei Ihrer Antwort auf das Anfechtungsobjekt,\
    \ die Beschwerdele gitimation und Beschwerdegründe."
  sentences:
  - 2 Es prüft die Verletzung von Grundrechten und von kantonalem und interkantonalem Recht nur insofern, als eine solche
    Rüge in der Beschwerde vorgebracht und begründet worden ist.
  - 1 Jedermann hat in der Ausübung seiner Rechte und in der Erfüllung seiner Pflichten nach Treu und Glauben zu handeln.
  - 2 In der Folgebewertung dürfen Aktiven nicht höher bewertet werden als zu den Anschaffungs- oder Herstellungskosten. Vorbehalten
    bleiben Bestimmungen für einzelne Arten von Aktiven.
- source_sentence: "Die Schwarz AG weist folgende Bilanz auf:\nBank/Wertschriften: 900'000\nHypothek: 500'000 \nLiegenschaft:\
    \ 700'000\nAktienkapital: 300'000 \nKapitalreserven: 200'000 \nGewinnreserven: 600'000 \nBank/Wertschriften + Liegenschaft:\
    \ 1'600'000\nHyphotek + Aktienkapital + Kapitalreserven + Gewinnreserven: 1'600'000\nStille Reserven: Liegenschaft 300'000\n\
    Jochen Schwarz ist Alleinaktionär der Schwarz AG. Diese ist im Bereich der Unter-\nnehmensberatung tätig, wobei Jochen\
    \ Schwarz ihr einziger Angestellter ist. Die Schwarz\nAG hat ihre Geschäftstätigkeit in den letzten Jahren zunehmend reduziert\
    \ und nur noch\nvereinzelt Aufträge ausgeführt. Im Mai 2016 kommt Jochen Schwarz altersbedingt zum\nSchluss, dass er für\
    \ die Schwarz AG keine Verwendung mehr hat, er möchte aber die\nLiegenschaft für eigene private Zwecke nutzen. Er entschliesst\
    \ sich deshalb zu folgen-\ndem Vorgehen: Zunächst lässt er sich die Liegenschaft zum Buchwert von CHF 700'000\nund unter\
    \ Übernahme der Hypothek als Naturaldividende zulasten der Kapitalreserven\nausschütten. Daraufhin verkauft er sämtliche\
    \ Aktien der Schwarz AG für einen Kaufpreis\nvon CHF 780'000 an August Weiss. \nWelche Steuerfolgen löst die Ausschüttung\
    \ der Liegenschaft in Form einer Naturaldi-\nvidende für die Schwarz AG und Jochen Schwarz aus?"
  sentences:
  - 3 Niemand darf in einen Staat ausgeschafft werden, in dem ihm Folter oder eine andere Art grausamer und unmenschlicher
    Behandlung oder Bestrafung droht.
  - 1 Die dinglichen Rechte entstehen und erhalten ihren Rang und ihr Datum durch die Eintragung in das Hauptbuch.
  - 1 Steuerbarer Ertrag von Aktien, Stammanteilen an Gesellschaften mit beschränkter Haftung und Genossenschaftsanteilen
    ist jede geldwerte Leistung der Gesellschaft oder Genossenschaft an die Inhaber gesellschaftlicher Beteiligungsrechte
    oder an ihnen nahestehende Dritte, die sich nicht als Rückzahlung der im Zeitpunkt der Leistung bestehenden Anteile am
    einbezahlten Grund- oder Stammkapital darstellt (Dividenden, Boni, Gratisaktien, Gratis-Partizipationsscheine, Liquidationsüberschüsse
    und dergleichen).25
- source_sentence: "Herr A. ist 50 Jahre alt und war lange Zeit arbeitslos. Seit kurzem hat er bei der Tiefbau AG\neine neue\
    \ Stelle als «Aufräumer». Jeden Freitagabend fährt Herr A. zu einer Baustelle der\nTiefbau AG und räumt während rund vier\
    \ Stunden die Baustelle auf. Er ordnet die Gerät-\nschaften, reinigt den Pausencontainer und kontrolliert, ob die Baustelle\
    \ vorschriftsmässig ge-\nsichert und abgeschlossen ist.\nAuf einer Baustelle, auf der ein altes Bauernhaus umgebaut wird,\
    \ entdeckt Herr A. bei seinem\nKontrollgang eine Wandnische. Darin befindet sich eine alte Jagdflinte. Herr A., der bis\
    \ zu\ndiesem Zeitpunkt noch nie eine echte Waffe in der Hand gehalten hat, ist begeistert und ent-\nschliesst sich, die\
    \ Waffe mit nach Hause zu nehmen.\nAuf dem Weg nach Hause deponiert A. die Waffe auf dem Beifahrersitz seines Autos. Bei\n\
    einer längeren Rotlichtphase kann Herr A. seine Neugierde nicht mehr zügeln und er schaut\nsich die Jagdflinte genauer\
    \ an. Dabei löst sich völlig unerwartet ein Schuss aus der Waffe und\nverletzt Herrn A. am Fuss.\nHerr A. muss in der\
    \ Folge im Krankenhaus behandelt werden und fällt für sechs Wochen bei\nder Tiefbau AG aus. \nHat Herr A. allenfalls mit\
    \ einer Kürzung der Leistungen zu rechnen?"
  sentences:
  - 2 In Abweichung von Artikel 21 Absatz 1 ATSG werden in der Versicherung der Nichtberufsunfälle die Taggelder, die während
    der ersten zwei Jahre nach dem Unfall ausgerichtet werden, gekürzt, wenn der Versicherte den Unfall grob fahrlässig herbeigeführt
    hat. Die Kürzung beträgt jedoch höchstens die Hälfte der Leistungen, wenn der Versicherte im Zeitpunkt des Unfalls für
    Angehörige zu sorgen hat, denen bei seinem Tode Hinterlassenenrenten zustehen würden.
  - 2 Der Vollzug ist nicht möglich, wenn die Ausländerin oder der Ausländer weder in den Heimat- oder in den Herkunftsstaat
    noch in einen Drittstaat ausreisen oder dorthin gebracht werden kann.
  - 3 Die Verteilnetzbetreiber legen in ihren Netzgebieten für feste Endverbraucher mit gleichartiger Verbrauchscharakteristik,
    die von der gleichen Spannungsebene Elektrizität beziehen, einen einheitlichen Elektrizitätstarif fest.14 Die Elektrizitätstarife
    sind für mindestens ein Jahr fest und sind aufgeschlüsselt nach Netznutzung, Energielieferung, Abgaben und Leistungen
    an Gemeinwesen zu veröffentlichen.
- source_sentence: "Zulasten des Grundstücks GB 100 (Liegenschaft), das im Eigentum von Arthur (A) steht, be steht seit dem\
    \ 1.1.2019 ein selbständiges und dauerndes Baurecht zugunsten von Beat (B); im Rahmen des Baurechts wurde ein Parkhaus\
    \ mit 200 Parkplätzen erstellt. Der Baurechtszins, den der Baurechtsnehmer Beat dem Baurechtsgeber Arthur schuldet, ist\
    \ im Grundbuch eingetragen. Am 1. November 2021 verstirbt Beat. Einziger Erbe ist sein volljähriger Sohn Carl (C). Mit\
    \ dem Tod von Beat kehrt Unruhe ein: Der jährlich am 1. Januar geschuldete Baurechtszins wird schon im Jahr 2022 nicht\
    \ mehr geleistet. Arthur lässt sich noch vertrösten, weil Carl ihm erläu tert, er befinde sich gerade in einem finanziellen\
    \ Engpass; er werde bis Ende 2022 die Zahlung leisten. Als Carl aber auch Ende Januar 2023 weder den Baurechtzins 2022\
    \ noch für 2023 ge leistet hat, reisst bei Arthur der Geduldsfaden; er will wissen, ob und gegebenenfalls auf welche Weise\
    \ er den Baurechtszins erhältlich machen kann. Angesichts der finanziellen Probleme von Carl fürchtet er, dass seine Forderung\
    \ auf Leistung des Baurechtszinses ungedeckt bleibt. Carl anerkennt den Betrag der offenen Baurechtszinse gegenüber Arthur\
    \ schriftlich in der Hoffnung, Arthur damit ruhigzustellen und Zeit zu gewinnen. Bevor Arthur seine rechtlichen Möglichkei\
    \ ten ausschöpft, wird das Baurecht zur Vollstreckung anderweitiger Schulden im Rahmen einer Betreibung auf Pfändung betreibungsrechtlich\
    \ gepfändet. Carl versucht, seine Gläubiger abzu schütteln, indem er einige Wochen später das selbständige und dauernde\
    \ Baurecht ohne Ab sprache mit Arthur zu einem geringen Preis auf seinen Freund Dieter (D) zu Eigentum überträgt in der\
    \ Absicht, damit die Pfändung auszuhebeln. Das Grundbuchamt stellt Arthur korrekt eine Anzeige zu, wonach das selbständige\
    \ und dauernde Baurecht auf Dieter übertragen worden sei. Arthur ist froh, dass jetzt der finanzkräftige Dieter Eigentümer\
    \ des Baurechts ist, und kann sich erst jetzt dazu entschliessen, seine Rechte bezüglich des Baurechtszinses vollumfänglich\
    \ aus zuschöpfen. \nHat Arthur eine Möglichkeit, den ausstehenden Baurechtszins mit einem immobiliarsa chenrechtlichen\
    \ Instrument erhältlich zu machen? Nennen Sie Rechtsgrundlagen, Vo raussetzungen und Wirkungen des Instruments."
  sentences:
  - 1 Ist der Schuldner zu einem Tun verpflichtet, so kann sich der Gläubiger, unter Vorbehalt seiner Ansprüche auf Schadenersatz,
    ermächtigen lassen, die Leistung auf Kosten des Schuldners vorzunehmen.
  - '1 Kein Prospekt muss veröffentlicht werden, wenn das öffentliche Angebot:a. sich nur an Anlegerinnen und Anleger richtet,
    die als professionelle Kunden gelten;

    b. sich an weniger als 500 Anlegerinnen und Anleger richtet;

    c. sich an Anlegerinnen und Anleger richtet, die Effekten im Wert von mindestens 100 000 Franken erwerben;

    d. eine Mindeststückelung von 100 000 Franken aufweist;

    e. über einen Zeitraum von 12 Monaten berechnet einen Gesamtwert von 8 Millionen Franken nicht übersteigt.'
  - 1 Das Pfandrecht kann jederzeit eingetragen werden, solange das Baurecht besteht, und ist von der Löschung im Zwangsverwertungsverfahren
    ausgenommen.
