  - source_sentence: "Die Schwarz AG weist folgende Bilanz auf:\nBank/Wertschriften: 900'000\nHypothek: 500'000 \nLiegenschaft:\
      \ 700'000\nAktienkapital: 300'000 \nKapitalreserven: 200'000 \nGewinnreserven: 600'000 \nBank/Wertschriften + Liegenschaft:\
      \ 1'600'000\nHyphotek + Aktienkapital + Kapitalreserven + Gewinnreserven: 1'600'000\nStille Reserven: Liegenschaft 300'000\n\
      Jochen Schwarz ist Alleinaktionär der Schwarz AG. Diese ist im Bereich der Unter-\nnehmensberatung tätig, wobei Jochen\
      \ Schwarz ihr einziger Angestellter ist. Die Schwarz\nAG hat ihre Geschäftstätigkeit in den letzten Jahren zunehmend\
      \ reduziert und nur noch\nvereinzelt Aufträge ausgeführt. Im Mai 2016 kommt Jochen Schwarz altersbedingt zum\nSchluss,\
      \ dass er für die Schwarz AG keine Verwendung mehr hat, er möchte aber die\nLiegenschaft für eigene private Zwecke nutzen.\
      \ Er entschliesst sich deshalb zu folgen-\ndem Vorgehen: Zunächst lässt er sich die Liegenschaft zum Buchwert von CHF\
      \ 700'000\nund unter Übernahme der Hypothek als Naturaldividende zulasten der Kapitalreserven\nausschütten. Daraufhin\
      \ verkauft er sämtliche Aktien der Schwarz AG für einen Kaufpreis\nvon CHF 780'000 an August Weiss. \nWelche Steuerfolgen\
      \ löst die Ausschüttung der Liegenschaft in Form einer Naturaldi-\nvidende für die Schwarz AG und Jochen Schwarz aus?"
    sentences:
    - 3 Niemand darf in einen Staat ausgeschafft werden, in dem ihm Folter oder eine andere Art grausamer und unmenschlicher
