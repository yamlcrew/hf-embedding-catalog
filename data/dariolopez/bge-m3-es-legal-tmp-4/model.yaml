widgetData:
- source_sentence: Es uso privativo el que determina la ocupación de una porción del dominio público, de modo que se limita
    o excluye la utilización del mismo por otros interesados.
  sentences:
  - ¿Qué es el uso privativo de los bienes de dominio público?
  - ¿Qué es la sanidad ambiental?
  - ¿Qué información básica debe contener la información que se facilita al afectado cuando se obtienen datos personales de
    él?
- source_sentence: 'Las retribuciones básicas, que se fijan en la Ley de Presupuestos Generales del Estado, estarán integradas
    única y exclusivamente por: a) El sueldo asignado a cada Subgrupo o Grupo de clasificación profesional, en el supuesto
    de que éste no tenga Subgrupo. b) Los trienios, que consisten en una cantidad, que será igual para cada Subgrupo o Grupo
    de clasificación profesional, en el supuesto de que éste no tenga Subgrupo, por cada tres años de servicio.'
  sentences:
  - ¿Qué se entiende por retribuciones básicas?
  - ¿Cuál es el título competencial de esta ley orgánica?
  - ¿Qué se aprueba a propuesta del Ministro de Hacienda?
- source_sentence: Se reconoce el valor social de las niñas, niños y adolescentes como personas que realizan un aporte afectivo,
    cultural y ético al caudal social, y cuyo protagonismo, creatividad y posicionamiento activo enriquecen la vida colectiva.
  sentences:
  - ¿Qué sucede si se produce un incumplimiento de las actuaciones establecidas en el Plan de inclusión sociolaboral?
  - ¿Qué se reconoce en cuanto al valor social de la infancia?
  - ¿Cuál es el plazo de prescripción de las infracciones?
- source_sentence: Las empresas y las universidades podrán promover y participar en programas de voluntariado que cumplan
    los requisitos establecidos en esta Ley.
  sentences:
  - ¿Cuál es la consideración de las infracciones muy graves?
  - ¿Qué tipo de empresas pueden promover y participar en programas de voluntariado?
  - ¿Qué tipo de entidades están obligadas a cumplir con las obligaciones de publicidad activa?
- source_sentence: Artículo 6. Definiciones. 1. Discriminación directa e indirecta. b) La discriminación indirecta se produce
    cuando una disposición, criterio o práctica aparentemente neutros ocasiona o puede ocasionar a una o varias personas una
    desventaja particular con respecto a otras por razón de las causas previstas en el apartado 1 del artículo 2.
  sentences:
  - ¿Cuál es el papel del Consejo de Salud de Área?
  - ¿Qué se considera discriminación indirecta?
  - ¿Qué tipo de información se considera veraz?
