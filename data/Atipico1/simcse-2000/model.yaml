  - source_sentence: 릴레이로 이번주 TV와 라디오 방송 출연을 확정한게 누구야?
    sentences:
    - ▲ 사진=롯데엔터테인먼트 제공 영화 완벽한 타인의 주역 유해진, 조진웅, 이서진, 염정아가 릴레이로 이번주 TV와 라디오 방송 출연을 확정했다. 완벽한 타인은 완벽해 보이는 커플 모임에서 한정된 시간 동안 핸드폰으로
      오는 전화, 문자, 카톡을 강제로 공개해야 하는 게임 때문에 벌어지는 예측불허 이야기를 담은 작품이다. 완벽한 타인에서 완벽한 연기를 펼친 배우들은 이번 주 릴레이로 TV와 라디오 방송 출연을 확정하며 열일
      행보를 펼친다. 먼저 오는 24일 오후 7시 MBC FM영화음악 한예리입니다에는 유해진과 염정아가 함께 출연한다. 간첩, 전우치에 이어 세 번째로 함께 호흡을 맞춘 두 사람은 이번 라디오 출연에서 영화에 대한
      이야기를 나누며 걸출한 입담과 절친 케미스트리를 선보일 것으로 보인다. 이어 이번 영화로 처음 만나 절친이 된 유해진, 조진웅, 이서진이 25일 오후 11시 10분 KBS2 해피투게더4에 출연한다. 세끼 인연
      유해진과 이서진, 그리고 조진웅의 예능감이 유감없이 발휘될 예정이다. 마지막으로 26일에는 MBC 배철수의 음악캠프에서 이서진을 만날 수 있다. 완벽한 타인에서 가장 파격적인 연기 변신을 선보인 그는 음악캠프
      특별 DJ로 활약했던 인연으로 이번 출연이 성사됐다. 이서진은 거침없는 언변으로 영화 완벽한 타인의 현장 비하인드 스토리를 밝힐 예정이다. 한편 완벽한 타인은 오는 31일 개봉을 앞두고 있다.
    - 부산 부산진구(구청장 서은숙)는 오는 7월부터 단독주택가 재활용정거장 운영 사업을 부암1동과 개금2동으로 확대 추진한다고 밝혔다. 재활용정거장 사업은 일반 주택가 주민들이 편리하게 재활용품을 배출할 수 있도록
      일정시간에 지정된 장소에 ‘재활용정거장’이라는 배출 거점을 만들어 주민들이 이용할 수 있도록 하고, 운영 시간 외에는 철수하는 이동식 분리수거장이다. 각 정거장마다 도시광부라 불리는 자원관리사가 정거장을 관리하고
      주민들의 재활용품 분리배출을 지원한다. 부산진구는 2019년 3월부터 전포1동 지역에 재활용정거장 25개소를 설치하여 174회 운영, 재활용품 38,700마대를 수거했다. 이 사업이 주민들의 올바른 재활용품
      분리배출 문화를 확산시키고 마을의 쓰레기 문제를 주민들이 직접 해결하는 지역공동체의 모범안을 제시한 사례로 평가받음에 따라 오는 7월부터 부암1동과 개금2동 지역에 재활용정거장 운영을 확대 추진하기로 했다.
      재활용정거장은 부암1동이 5개소, 개금2동은 10개소이다. 부암1동은 매주 월요일과 수요일, 개금2동은 화요일과 목요일 오후 4시부터 8시까지 4시간동안 운영된다. 주민들은 종이류, 플라스틱류, 유리병류, 캔․고철류,
      비닐류 등 재활용 전품목을 가까운 재활용정거장으로 배출하면 된다. 오후 8시 이후 운영을 마치면 수거업체가 재활용정거장에 배출된 재활용품을 모두 수거해 간다. 이후 정거장은 철거되고 다음 운영요일에 다시 설치된다.
      또한 주민들의 재활용품 배출 혼동을 줄이기 위해 기존 문전수거 방식도 병행해 운영한다. 구 관계자는 “재활용정거장 사업은 단독주택지역의 재활용품 혼합배출 실태를 개선하여 실질적인 자원 재활용율 높이고 쾌적한
      골목길 조성에 크게 기여할 것으로 기대한다”며 주민들이 다함께 적극 참여해 줄 것을 당부했다.
