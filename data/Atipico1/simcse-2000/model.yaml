      배추 역시 신세계 포인트 적립 시 20% 할인 판매해 소비 촉진에 앞장선다. 이마트는 이번 농산물 할인 행사를 시작으로 농림축산식품부와 함께 순차적으로 친환경 농산물 등 다양한 할인 행사를 진행할 예정이다.
      롯데마트와 롯데슈퍼 역시 오는 27일까지 전 점에서 '대한민국 농할 갑시다' 행사를 진행한다. 롯데마트 역시 최근 가격이 상승한 달걀과 무, 배추를 할인 품목으로 정해 실질적인 가계의 물가 안정에 기여할 것으로
      기대하고 있다. '농할 갑시다' 행사는 엘포인트(L.Point) 회원이 롯데, 신한, 현대 등 7대 카드로 결제 시 적용된다. 행사 기간 동안 달걀을 20% 할인하며, 배추와 무도 20% 할인된 가격인 각 1260원에
