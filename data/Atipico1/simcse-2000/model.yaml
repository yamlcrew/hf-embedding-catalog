      매장 가격이 다를 수 있음을 알리고 있다. 4개 업체 모두 배달의민족, 요기요, 쿠팡이츠 등 주요 배달 플랫폼에 이 같은 정보를 공지하지 않았다. 대개 배달 앱을 통해 주문하는 만큼 이제라도 주문 및 결제 과정에서
      주요 거래조건을 명확하게 알려야 할 것이다. 소비자단체에 따르면 햄버거뿐 아니라 상당수 일반 음식점이 배달 앱으로 주문할 때 식당가보다 음식값을 더 비싸게 받고 있다. 매장에선 할인되는 품목이 배달 주문 때는
      할인 적용이 안 되는 경우도 있다. 식당가와 배달가의 차이가 난다는 지적에 아예 매장 가격을 올려버리기도 한다니 소비자를 봉으로 아는 태도다. 이는 전체 외식 물가 인상으로 이어지는 것이라 우려스럽다. 코로나19로
