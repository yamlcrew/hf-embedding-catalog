- source_sentence: 릴레이로 이번주 TV와 라디오 방송 출연을 확정한게 누구야?
  sentences:
  - ▲ 사진=롯데엔터테인먼트 제공 영화 완벽한 타인의 주역 유해진, 조진웅, 이서진, 염정아가 릴레이로 이번주 TV와 라디오 방송 출연을 확정했다. 완벽한 타인은 완벽해 보이는 커플 모임에서 한정된 시간 동안 핸드폰으로
    오는 전화, 문자, 카톡을 강제로 공개해야 하는 게임 때문에 벌어지는 예측불허 이야기를 담은 작품이다. 완벽한 타인에서 완벽한 연기를 펼친 배우들은 이번 주 릴레이로 TV와 라디오 방송 출연을 확정하며 열일 행보를
    펼친다. 먼저 오는 24일 오후 7시 MBC FM영화음악 한예리입니다에는 유해진과 염정아가 함께 출연한다. 간첩, 전우치에 이어 세 번째로 함께 호흡을 맞춘 두 사람은 이번 라디오 출연에서 영화에 대한 이야기를
    나누며 걸출한 입담과 절친 케미스트리를 선보일 것으로 보인다. 이어 이번 영화로 처음 만나 절친이 된 유해진, 조진웅, 이서진이 25일 오후 11시 10분 KBS2 해피투게더4에 출연한다. 세끼 인연 유해진과 이서진,
    그리고 조진웅의 예능감이 유감없이 발휘될 예정이다. 마지막으로 26일에는 MBC 배철수의 음악캠프에서 이서진을 만날 수 있다. 완벽한 타인에서 가장 파격적인 연기 변신을 선보인 그는 음악캠프 특별 DJ로 활약했던
    인연으로 이번 출연이 성사됐다. 이서진은 거침없는 언변으로 영화 완벽한 타인의 현장 비하인드 스토리를 밝힐 예정이다. 한편 완벽한 타인은 오는 31일 개봉을 앞두고 있다.
  - 부산 부산진구(구청장 서은숙)는 오는 7월부터 단독주택가 재활용정거장 운영 사업을 부암1동과 개금2동으로 확대 추진한다고 밝혔다. 재활용정거장 사업은 일반 주택가 주민들이 편리하게 재활용품을 배출할 수 있도록 일정시간에
    지정된 장소에 ‘재활용정거장’이라는 배출 거점을 만들어 주민들이 이용할 수 있도록 하고, 운영 시간 외에는 철수하는 이동식 분리수거장이다. 각 정거장마다 도시광부라 불리는 자원관리사가 정거장을 관리하고 주민들의
    재활용품 분리배출을 지원한다. 부산진구는 2019년 3월부터 전포1동 지역에 재활용정거장 25개소를 설치하여 174회 운영, 재활용품 38,700마대를 수거했다. 이 사업이 주민들의 올바른 재활용품 분리배출 문화를
    확산시키고 마을의 쓰레기 문제를 주민들이 직접 해결하는 지역공동체의 모범안을 제시한 사례로 평가받음에 따라 오는 7월부터 부암1동과 개금2동 지역에 재활용정거장 운영을 확대 추진하기로 했다. 재활용정거장은 부암1동이
    5개소, 개금2동은 10개소이다. 부암1동은 매주 월요일과 수요일, 개금2동은 화요일과 목요일 오후 4시부터 8시까지 4시간동안 운영된다. 주민들은 종이류, 플라스틱류, 유리병류, 캔․고철류, 비닐류 등 재활용
    전품목을 가까운 재활용정거장으로 배출하면 된다. 오후 8시 이후 운영을 마치면 수거업체가 재활용정거장에 배출된 재활용품을 모두 수거해 간다. 이후 정거장은 철거되고 다음 운영요일에 다시 설치된다. 또한 주민들의
    재활용품 배출 혼동을 줄이기 위해 기존 문전수거 방식도 병행해 운영한다. 구 관계자는 “재활용정거장 사업은 단독주택지역의 재활용품 혼합배출 실태를 개선하여 실질적인 자원 재활용율 높이고 쾌적한 골목길 조성에 크게
    기여할 것으로 기대한다”며 주민들이 다함께 적극 참여해 줄 것을 당부했다.
  - 그룹 세븐틴이 미국 간판 토크쇼 ‘엘렌 쇼’에 첫 출연을 확정 지었다. 세븐틴은 다음 달 1일(현지 시각) 방송되는 미국 토크쇼 ‘엘렌 드제너러스 쇼’(이하 엘렌 쇼)에 첫 출연을 확정 지어 전 세계 팬들의 폭발적인
    반응을 얻었다. 이날 방송에서 세븐틴은 지난 2019년 8월 발매한 디지털 싱글 ‘HIT’ 무대를 선보인다. ‘HIT’는 제목처럼 타격감이 느껴지는 사운드와 세븐틴의 폭발적인 에너지가 그대로 전해지는 강렬한 EDM
    장르의 댄스곡으로 발매와 동시에 국내는 물론 해외에서도 큰 사랑을 받았다. ‘엘렌 쇼’는 미국 유명 코미디언이자 작가, 배우 등 멀티 엔터테이너인 엘렌 드제너러스가 진행하는 토크쇼로 브루노 마스, 두아 리파, 존
    레전드, 저스틴 비버 등 세계적인 팝스타들이 대거 출연해 화제를 모았으며 미국의 데이타임 쇼 중 높은 인기를 보유하고 있는 프로그램이다. 앞서 세븐틴은 지난 1월 방송된 미국 CBS ‘제임스 코든 쇼’와 NBC
    ‘켈리 클락슨 쇼’에 연달아 출연해 스페셜 앨범 타이틀곡 ‘HOME;RUN’과 미니 7집 타이틀곡 ‘Left & Right’의 무대를 선사, 막강한 글로벌 영향력을 확인 시켜 주며 전 세계 팬들과 해외 유수 매체의
    호평 세례를 받았다. 이렇듯 세븐틴은 스토리텔링이 담긴 완성도 높은 무대와 세븐틴만이 할 수 있는 퍼포먼스를 선보여 ‘K팝 퍼포먼스 강자’라는 칭호를 얻는 등 전 세계를 열광시킨 바 있어 이번 ‘엘렌쇼’에서 어떤
    무대를 선보일지 기대감이 치솟고 있다. 한편 세븐틴이 출연하는 미국 토크쇼 ‘엘렌 쇼’는 다음 달 1일(현지 시각)에 만나볼 수 있다.
- source_sentence: 롯데리아에 직접 가서 불고기버거세트를 먹으려면 얼마를 내야 하지
  sentences:
  - 햄버거 프랜차이즈 업체들이 배달 애플리케이션으로 일정 금액 이상 주문할 때 배달비가 무료라고 내세우지만 이미 제품 가격에 포함된 것으로 드러났다. 햄버거를 배달 앱으로 주문하면 같은 제품이라도 매장보다 더 가격이
    비싸다. 사실상 소비자 기만 행위다. 19일 한국소비자원의 조사 결과 롯데리아, 맥도날드, 버거킹, KFC 등 주요 4개 햄버거 프랜차이즈의 모든 제품이 매장 가격에 비해 배달 가격이 비쌌다. 예를 들어 롯데리아
    불고기버거세트의 배달가는 7000원으로 매장가 5900원보다 1100원을, 버거킹 리얼와퍼세트는 1200원을 더 내야 한다. 메뉴를 많이 주문할수록 가격 차이가 커져 소비자가 피해를 보는 구조라는 것도 분통터지게
    한다. 기업이 이윤을 추구하는 것은 당연하지만 소비자를 속여서까지 이익을 내선 안 된다. 더 큰 문제는 프랜차이즈들이 이런 사실을 제대로 고지하지 않았다는 점이다. 버거킹, KFC는 자사 홈페이지에서만 배달과 매장
    가격이 다를 수 있음을 알리고 있다. 4개 업체 모두 배달의민족, 요기요, 쿠팡이츠 등 주요 배달 플랫폼에 이 같은 정보를 공지하지 않았다. 대개 배달 앱을 통해 주문하는 만큼 이제라도 주문 및 결제 과정에서 주요
    거래조건을 명확하게 알려야 할 것이다. 소비자단체에 따르면 햄버거뿐 아니라 상당수 일반 음식점이 배달 앱으로 주문할 때 식당가보다 음식값을 더 비싸게 받고 있다. 매장에선 할인되는 품목이 배달 주문 때는 할인 적용이
    안 되는 경우도 있다. 식당가와 배달가의 차이가 난다는 지적에 아예 매장 가격을 올려버리기도 한다니 소비자를 봉으로 아는 태도다. 이는 전체 외식 물가 인상으로 이어지는 것이라 우려스럽다. 코로나19로 비대면이
    늘면서 배달 앱을 이용한 음식 주문은 소비자의 일상이 됐다. 이런 상황에서 무료배달이라는 꼼수를 쓴 햄버거 프랜차이즈는 비난받아 마땅하다.
  - 물가 안정과 우리 농산물 소비 촉진을 위한 '대한민국 농할(농산물 할인) 갑시다'가 돌아왔다. 이마트, 롯데마트와 롯데슈퍼는 농림축산식품부와 손잡고 오는 27일까지 다양한 농산물 할인 혜택을 통해 물가 안정 및
    농가 돕기에 나선다. 이번 '농할갑시다'의 키 포인트는 '물가 안정'과 '소비 촉진'이다. 유통업계와 농림축산식품부는 이번 '농할갑시다'를 통해 물가를 안정시키고 판로에 어려움을 겪고 있는 국내 농가들을 도울 예정이다.
    행사 기간 동안 이마트에서는 '농할갑시다' 행사 상품을 구매할 경우, 신세계포인트 적립 고객에 한해 20% 할인을 적용한다. 할인은 1인당 최대 1만원(구매금액 5만원)까지 받을 수 있다. 먼저 AI(조류독감)로
    갑작스레 오른 달걀 가격 안정화를 위해 이마트와 농림축산식품부는 약 50종에 달하는 달걀 할인 행사를 선보인다. 이마트에서 달걀을 신세계포인트 적립하여 구매할 시, 판매 가격의 20%를 할인받을 수 있다. 또 올겨울
    잦은 한파와 폭설로 인해 가격이 크게 오른 '무'도 신세계포인트 적립 시 20% 할인해 판매한다. 무는 올 1월 제주도에 내린 폭설로 생산량이 줄어들어 가격이 상승했다. 농산물유통정보에 따르면 무 20㎏ 평균 가격은
    작년 12월 중순 1만536원이었으나 올해 1월 14일 1만5980원으로 한 달 만에 약 51.6% 오른 셈이다. 코로나19로 소비량이 대폭 감소해 지지부진한 판매량을 보이고 있는 배추 역시 신세계 포인트 적립
    시 20% 할인 판매해 소비 촉진에 앞장선다. 이마트는 이번 농산물 할인 행사를 시작으로 농림축산식품부와 함께 순차적으로 친환경 농산물 등 다양한 할인 행사를 진행할 예정이다. 롯데마트와 롯데슈퍼 역시 오는 27일까지
    전 점에서 '대한민국 농할 갑시다' 행사를 진행한다. 롯데마트 역시 최근 가격이 상승한 달걀과 무, 배추를 할인 품목으로 정해 실질적인 가계의 물가 안정에 기여할 것으로 기대하고 있다. '농할 갑시다' 행사는 엘포인트(L.Point)
    회원이 롯데, 신한, 현대 등 7대 카드로 결제 시 적용된다. 행사 기간 동안 달걀을 20% 할인하며, 배추와 무도 20% 할인된 가격인 각 1260원에 판매한다. 달걀의 경우 1인당 3판 한정으로 판매할 계획이며,
    배추와 무를 포함해 1인당 최대 할인 한도는 1만원이다. 롯데마트 정재우 상품본부장은 "최근 급격히 오른 물가 안정의 취지에 맞춰 농림축산식품부와 함께 이번 행사를 준비했다"며 "합리적인 가격에 우리 농산물을 구입할
    수 있는 기회가 되길 바란다"고 말했다.
  - '상장회사법제 구축 공동 세미나

    제1주제 상장회사법 제정에 관한 구상

    Ⅴ 결론

    경험적으로 볼 때 새로운 법을 제정한다는 게 매우 어려운 일이다. 특히 학계와 실무계에서 회사법을 상법에서 분리하여야 한다는 주장이 오랫동안 있어 왔지만 큰 반향을 불러일으키지 못한 것이 현실이다. 이러한 상황에서
    대안으로 구상한 것이 바로 상장회사법의제정이다. 상장회사법의 경우 이미 2007년도에 ｢상장법인에 관한 법률｣ 제정안이 입법예고된 바 있다는 점에서 추후에도 그 제정을 위한 공감대를 이끌어 내기가 용이할 것으로
    보인다. 본고는 2019년의 시점에서 다시 한번 상장회사법의 제정 필요성으로 다음과 같은 3가지이유를 제시하였다. 첫째, 급격하게 변화하는 자본시장에 유연하게 대응하여 다양하면서도 다수의 이해관계자를 보호하기 위해서는
    상장회사법을 제정할 필요가 있다. 둘째, 현재 상법과 자본시장법에 나누어 규정되고 있는 상장회사에 대한 특례를 하나로 합하여 단행법화한다면 국내외의 수범자 입장에서의 편의성이 제고될 서이다. 셋째, 상장회사에 관련된
    여러 법제가 산재하고 있어 체계적인 정합성이 미흡하므로, 이를 극복하기 위해서는 상장회사법의 제정이 필요하다. 단기적인 과제로서 외부감사법상 상장회사에 적용되는 규정을 상장회사법으로 이관한다면 도움이 될 것으로
    보인다. 이에 비교법적인 차원에서 미국과 독일 및 일본과 태국법의 동향을 파악하였다. 미국은 상장회사에 관한 규정을 회사법에 일부 두면서도 동시에 전국규모의 증권거래소가 마련한 상장회사 규정에 의하여 상장회사의
    지배구조가 보충적으로 규율되고 있다. 독일은 주식법에서 상장회사와 비상장회사 모두를 다루고 있다. 일본의 경우에는 단행의 회사법을 두고 있지만, 상장회사에 대한 규제의 선진화를 위하여 2007년 상장회사에 적용될
    공개회사법요강안을 발표한 바 있다. 태국은 세계적으로 유래를 찾기 어려운 입법으로서 공개주식회사법을 별도로 제정하여 시행하고 있는 국가이다. 본고는 기존에 정부가 마련한 ｢상장법인에 관한 법률｣ 제정안을 기본으로
    하면서 위에 소개된 여러 국가의 입법례를 참고하여 상장회사법에 들어갈 규정들을 몇 가지 제시하였다. 본고에서 상장회사법에 편입되어야 할 추가적인 규정을 요약하여 정리하면 다음과 같다. 먼저 지배구조와 관련하여 주주명부의
    폐쇄 및 기준일을 단축하는 규정, 이사에게 내부통제체제 구축의무를 부과하는 규정 및 사외이사의 회의를 강제하는 규정을 두어야 한다. 다음으로 현행 외부감사법에 있는 상장회사의 회계처리기준과 회계감사에 관한 규정을
    상장회사법으로 이관한다. 마지막으로 합병 등과 같은 조직재편과 관련하여 몇 가지를 개선한다. 즉, 상장회사에서 합병 등에 반대하는 주주에 대해서는 주식매수청구권을 인정하지 않으며, 삼각합병에서 제3자에게 제공되는
    합병의 대가가 모회사가 발행한 의결권있는 주식의 10%를 초과하는 경우에는 모회사 주주총회의 승인을 요구한다. 그리고 합병 등에 필요한 채권자보호절차와 관련하여 채권자에 대한 개별최고제도를 폐지함은 물론이고 채권자의
    손해가 없다면 그에 대해서는 채권자보호절차를 마련하지 않는다.'
- source_sentence: 어떤 방법으로 합동수사본부는 범죄유형별 대처시스템을 강화하려 할까
  sentences:
  - '2. 형사사법업무처리의 전자화

    (1) 형사사법정보시스템

    정부는 2010년 「형사사법절차 전자화 촉진법」을 근거로 형사사법기관 간 전산시스템을 연계하고 전산정보를 공동 활용하는 동시에 대국민 형사사법정보서비스(사건 조회, 재판서 및 통지서 조회, 벌과금 조회, 민원신청,
    범죄피해자 지원 등)를 제공하는 형사사법공통시스템(KICS)을 구축하였다. 경찰, 검찰, 법무부, 법원은 각각의 KICS 전용 서버를 설치하여 운영하고 있고 공통시스템 서버 운영과 각 기관 간 KICS 연계 업무는
    형사사법공통시스템 운영단이 수행하고 있다. 아래의 차세대 형사사법정보시스템의 구성도(그림1)를 보면 노란색으로 표시된 재구축 부분은 기존의 2010년부터 형사사법정보시스템에서 제공되던 것을 기술적 업그레이드만 하는
    것이다. 차세대 형사사법정보시스템(그림1)에서 파란색으로 표시된 신규 부분은 2024년을 목표로 하고 있는 빅데이터 분석 플랫폼 구축과 전자문서화 시스템 영역이다.'
  - '나. 연기금의 분산투자 확대

    1) 필요성 및 현황

    □ 국민연금 등 연기금의 자산이 폭발적으로 늘어나고 있는 상황에서 특정자산에 집중해 투자할 경우 여러 가지 문제 초래

    ― 국민연금 등 연기금들이 현재의 채권 위주 운용전략을 유지할 경우 시장에서의 지배력이 심각한 수준에 달할 전망

    ⦁ 이창용(2004)은 2015년에도 국민연금 전체 자산 중 국내채권의 비중이 70%대 중반을 유지할 경우, 국내 채권시장에서 차지하는 국민연금의 비중이 20% 이상에 달할 것으로 전망

    ⦁ 만약 해외채권과 해외주식의 비중을 크게 늘리면 국민연금의 국내자산시장에서 차지하는 비중이 크게 줄어들 것으로 전망

    ― 국민연금 등 특정 기관투자자의 고등급 채권 위주의 운용 전략이 지속되어 채권시장에서 차지하는 비중이 커지면 다음과 같은 부작용 예상

    ⦁ 국채수익률이 낮아지는 등 금리 왜곡 가능성

    ⦁ 국민연금의 국채수요로 정부가 저비용으로 재정자금을 조달할 수 있기 때문에 재정규율이 약화될 가능성

    ⦁ 고등급 채권 발행 주체인 대기업에 자본이 집중되고, 신성장 동력원이 되는 신생기업에 대한 자본공급 부진 가능성

    ― 국민연금이 국내 주식에 대한 투자를 계속해서 늘려 그 비중이 급속도로 커질 경우에도 문제가 발생

    ⦁ 국민연금 보유 주식의 가격이 하락하여 국민연금이 손절매에 나설 경우 일반투자자들의 투매를 초래해 시장이 불안해질 가능성

    ⦁ 국민연금의 개별기업에 대한 지분율 상승으로 지배구조에 영향

    ― 자산 축적기에 분산투자가 제대로 구축되지 않을 경우에는 향후 연금지급이 본격화되면 자산시장 왜곡을 초래할 가능성'
  - '제목 범정부 서민생활침해사범 근절 대책 추진 중간결과

    □ 이번에 설치된 합동수사본부는

    ○ 안전행정부, 미래창조과학부, 경찰청, 국세청, 금융위원회, 금융감독원, 사행산업통합감독위원회 등 유관기관이 참여하여,

    - 서민생활 침해사범에 대한 범정부 차원의 효율적인 예방․단속, 범죄수익 환수․탈루세액 징수, 피해자 보호 등과 관련하여 유관기관별 역할분담과 협업을 통하여 기관별 역량을 최대한 결집하고, 범죄유형별 대응시스템을
    강화하였을 뿐만 아니라,관련 기관의 적극적 제도개선을 이끌어내는 계기를 마련하였음 ○ 서민생활침해사범 합동수사본부는 이후에도 1차 단속 과정에서 나타난 미흡한 점을 더욱 보완, 지속적인 단속활동을 전개하여 서민
    피해자 보호, 불법수익의 철저한 환수, 탈루세액 징수에 박차를 가하는 한편, 불법차명물건(대포통장, 대포차, 대포폰 등)을 이용한 범죄 및 파밍, 스미싱 등 신종 사기 범죄로부터 서민을 보호하는 제도 개선에 더욱
    노력하겠음.'
- source_sentence: 용재 오닐이 참가하고 있는 현악기로 연주하는 사중주단은 뭐야
  sentences:
  - 한국계 미국 비올리스트 리처드 용재 오닐이 ‘제63회 그래미 어워즈’에서 ‘베스트 클래시컬 인스트루먼털 솔로(Best Classical Instrumental Solo)’ 상을 받았다. 용재 오닐은 ‘그래미 어워즈’
    본 시상식에 앞서 한국시간으로 15일 진행된 사전 시상식 ‘프리미어 세리머니(Premiere Ceremony)’에서 이 부문 수상자로 호명됐다. 데이비드 앨런 밀러가 지휘하고 미국 알바니 심포니가 함께 연주한 테오파니디스의
    비올라와 챔버 오케스트라를 위한 협주곡으로 영예를 안았다. 용재 오닐은 ‘디토 페스티벌’ 음악감독 등을 맡아 한국에서 클래식음악의 대중화에 기여했다. 세계적 현악 사중주단 ‘타카치 콰르텟’에 합류해 활약 중이다.
  - ‘안단테 칸타빌레(Andante Cantabile)’. 이탈리아어로 ‘노래하듯 천천히’라는 뜻이다. 현악사중주단 ‘아벨콰르텟’은 2021년을 그렇게 한발자국씩, 희망을 담아 걸어나가기로 했다. 최근 한국일보 사옥에서
    만난 ‘아벨콰르텟’ 멤버 윤은솔(34ㆍ바이올린), 박수현(32ㆍ바이올린), 문서현(24ㆍ비올라), 조형준(34ㆍ첼로)은 “코로나19 때문에 천천히 걸을 수밖에 없고 잠깐 멈춰야 할 때도 있겠지만, 항상 앞으로 나아가려는
    마음이 중요하다”며 “이왕이면 좋은 생각을 하면서, 천천히 노래하듯 나아가고 싶다”고 입을 모았다. ‘아벨콰르텟’은 18일 광주 유ㆍ스퀘어문화관, 20일 서울 예술의전당에서 ‘안단테 칸타빌레’라는 이름의 네번째
    정기연주회를 연다. 2013년 결성된 ‘아벨콰르텟’은 재작년 코로나19 만큼이나 큰 위기를 겪었다. 처음 팀을 만들 때 구심점 역할을 했던 비올리스트 김세준이 개인 사정으로 콰르텟을 떠나게 된 것. 오랜시간 합을
    맞춰왔던 연주자의 공백은 컸다. 남은 3명이 “이대로 활동을 그만둬야 하나”하고 고민할 정도였다. 다행히 지난해 초 막내 문서현이 합류하면서 ‘아벨콰르텟’의 새 삶이 시작됐다. 문서현은 “관객으로 만났던 ‘아벨콰르텟’은
    인간적이면서 따뜻한 소리가 기억에 남는 현악사중주단”이라며 “특정 장르에 머무르지 않고 다양한 시도를 하는 팀이어서 앞으로가 기대된다”고 했다. 이달 공연의 첫곡인 슈베르트 현악사중주 12번은 ‘아벨콰르텟’의 새출발을
    알리는 신호탄이다. 오스트리아 빈에서 기존 멤버들과 만난 문서현이 처음으로 합주한 작품이기도 하다. 조형준은 “단악장의 짧은 곡이지만 몰아치는 감정의 소용돌이가 어마어마하다”면서 “지금까지 주로 고전시대 작품을
    많이 했다면 이번에는 낭만주의 색깔을 마음껏 보여줄 수 있을 것”이라고 말했다. 뒤이어 펼쳐지는 멘델스존의 현악사중주 6번은 작곡가의 슬픔과 격정이 “제한 없이 드러나는” 곡이다. 멘델스존이 사랑하는 누나의 죽음을
    접한 직후 쓴 곡으로 알려져 있다. 윤은솔은 “다른 팀원들이 이 곡을 공연해보자고 계속 제안했는데 지금까지 자신이 없어서 미루고만 있다가 최근 어떤 계기를 통해 연주할 힘을 얻었다”며 “마음의 준비가 됐기에 완성도
    높은 음악을 들려드리고 싶다”고 했다. 마지막은 실내악 명작으로 꼽히는 차이코프스키의 현악사중주 1번이다. ‘안단테 칸타빌레’라는 제목이 붙은 2악장이 특히 유명한데, 이번 공연의 이름과 같다. 박수현은 이 곡을
    두고 “따뜻하고 달콤한 유럽 크리스마스의 향기가 난다”고 표현했다. 박수현은 “차이코프스키는 아무런 음악적 지식이 없는 사람도 듣기만 하면 아름다움을 느낄 수 있는 곡들을 썼는데, 현악사중주 1번에도 그런 철학이
    잘 담겨 있다”고 말했다.
  - 어느덧 내 나이 팔순을 지나간다. 최근에 팔순을 맞은 한 대학 동창이 예배시간에 이런 회고사를 했다. “목회에서 은퇴한 뒤 그동안 만났던 성도들을 떠올리며 기도하고 있습니다. 어떤 날은 새벽 5시30분 시작된 기도가
    오전 10시까지 이어져 아침식사를 거르기도 했습니다.” 대학 동기 모임에서 또 다른 친구가 김홍도 목사(전 금란교회 담임목사)의 옆구리를 쿡 찌르면서 농담을 건넸다. “홍도야, 예배시간에 그 친구가 한 얘기 들었지?
    성도를 위해 기도하느라고 아침도 못 먹었단다. 너는 성도가 수만 명이나 되는데 하루 종일 밥숟가락을 뜰 수나 있겠나.” 예전에는 인간이 강건하면 수명이 팔십이라고 했다. 난 그 나이만큼 살고 있으니 감사하다. 난
    태어나서 네 살이 될 때까지 앞을 보지 못했다. 결핵성 관절염을 앓아 작대기를 짚고 학교에 다녔다. 또 건강이 좋지 않고 집이 가난해 행복한 꿈을 꿀 수 없었다. 그렇게 부족한데도 하나님께선 날 아껴주시고 목회를
    완주할 수 있게 해주셨다. 하나님은 내게 좋은 부모님을 주셨다. 부모님은 내게 여호와에 대한 경외심을 삶으로 가르쳤다. 나 역시 부모님의 뒤를 따라 복음과 양심을 지키려 노력했다. 그리고 내 자녀들이 바통을 이어
    목회의 길을 가고 있다. 참으로 은혜로운 일이다. 하나님은 또 내게 신앙심 깊은 아내를 허락하셨다. 아내의 소원이 참 재밌다. 하나님 앞에서 ‘난 목사의 며느리였고 목사의 아내였고 목사의 어머니였고 목사의 할머니였다’는
    소리를 하고 싶다는 것이다. “여호와를 경외하며 그의 길을 걷는 자마다 복이 있도다. 네가 네 손이 수고한 대로 먹을 것이라 네가 복되고 형통하리로다. 네 집 안방에 있는 네 아내는 결실한 포도나무 같으며 네 식탁에
    둘러앉은 자식들은 어린 감람나무 같으리로다. 여호와께서 시온에서 네게 복을 주실 것이며 너는 평생에 예루살렘의 번영을 보며 네 자식의 자식을 볼지어다.(시 128)” 성경에는 복이란, 손이 수고한 대로 소득을 얻는
    것이라고 돼 있다. 복은 곧 아내와 아이들이 한 식탁에 둘러앉아 밥을 먹는 것이요, 자식의 자식 곧 손주를 보는 것이다. 생각하면 누구나 받는 싱거운 복 같지만 깊이 생각할수록 아무나 받을 수 없는 것이기도 하다.
    요즘 젊은이들이 일자리나 결혼, 출산 등의 문제로 고통 받는다고 하니 평범해 보이는 일상은 실상 비범한 일이다. 하나님께서 내게 여호와를 경외하는 아내는 물론 감람나무 같은 자식들과 그들의 자식까지 보는 기쁨을
    주셨다. 모두 하나님의 은혜다. 아버지는 평생 강원도 산골을 걸어 다니며 목회하셨다. 난 목회 초반 자전거를 탔다. 내 자녀들은 자동차를 타고 목회를 하고 있다. 아마도 손주들은 비행기를 타고 다니며 목회할 것이다.
    나는 엘리야의 때에 바알에게 무릎 꿇지 않은 7000인의 사람들이 있었던 것처럼 오늘날에도 그런 천연기념물 같은 성도가 있다고 믿는다. 역경의 열매는 역경을 이긴 자들의 것이다. 이 시간에도 천연기념물 같은 주의
    종들이 역경을 묵묵히 감내하고 있을 것이라 믿는다. 그들이 지나간 자리에 한층 더 커지고 환해지고 깨끗해지고 튼튼해지고 안전해진 주님의 교회가 있길 바라며 기도한다.
- source_sentence: 연제구의 도시미화와 저소득층 노인들의 일자리 창출에도 도움이 되는 게 뭐야
  sentences:
  - 연제구(구청장 이성문)는 지난해에 이어 ‘2021년 불법 유동광고물 수거보상사업’을 시행한다. ‘불법 유동광고물 수거보상사업’은 도시미관을 해치는 불법 광고물을 근절하기 위해 사업 참여자가 불법 유동광고물을 수거하여
    구청 도시재생과에 가져가면 구청에서는 보상금을 지급하는 사업이다. 구는 1월 11일부터 15일까지 연제구민 중 만 60세 이상 저소득 어르신을 대상으로 신청을 받아 총 50명을 수거보상사업 참여자로 선발하였다.
    참여자로 선발된 어르신들은 오는 2월부터 시작하는 수거 활동에 앞서 연제구청 구민홀에서 불법 유동광고물 구분 기준, 수거 방법, 수거 시 안전 수칙 등에 대해서 사전 교육을 받았으며 수거활동 중 발생할 수 있는
    안전사고에 대비해 단체 보험에도 가입했다. 불법 광고물 정비에 주민들이 참여할 수 있는 기회를 제공하여 주민들로부터 불법 광고물에 대한 경각심을 제고 할 수 있을 것으로 기대된다. 구 관계자는 “이번 사업을 통해
    주민과 함께 품격 있는 연제구를 만드는 데 일조하고, 저소득 어르신의 실버 일자리 창출에도 기여할 것으로 기대된다”고 말했다.
  - "이시종 충북도지사는 24일 오후 2시 도청 대회의실에서 국가철도망 구축계획에 충북도 철도사업의 반영을 위한 민ㆍ관ㆍ정 간담회를 개최했다. 이날 간담회에는 이 지사를 비롯해 한범덕 청주시장, 송기섭 진천군수, 조병옥\
    \ 음성군수, 이장섭, 임호선 국회의원과 박문희 도의회 의장, 최충진 청주시의회 의장, 김성우 진천군의회 의장, 최용락 음성군의회 의장 등 지역 정치권 관계자와 민간사회단체총연합회 유철웅 회장 등 민간사회단체 관계자까지\
    \ 34명이 참석했다. 이번 간담회에서는 4차 국가철도망구축계획 공청회가 얼마 남지 않은 중요한 시점에서 그동안 철도사업의 국가계획 반영 추진상황을 공유하고, 각 기관과 단체별 참여 방안과 도민의 힘을 모으기 위한\
    \ 다양한 방안이 논의됐다. 도는 청주도심을 통과하는 충청권 광역철도, 수도권에서 진천 국가대표선수촌과 혁신도시를 거쳐 청주공항을 잇는 수도권내륙선 광역철도, 음성 감곡에서 혁신도시를 거쳐 청주공항을 잇는 중부내륙선\
    \ 지선 등의 노선을 국가계획에 반영하기 위해 집중하고 있다. 이 지사는 \"해당 철도노선을 국가계획에 반영해야만 추진할 수 있기 때문에 우선은 반영을 목표로 최선을 다해야 한다\"며 \"많은 도민들의 공감대와\
    \ 적극적인 지지가 필요한 때인 만큼 참석자들이 구심점 역할을 해 줄 것\"을 당부했다. 도 관계자는 \"국가철도망계획은 10년 단위 계획으로 전국 지자체가 각자의 사업 반영을 위해 각축전을 벌이는 상황\"이라며\
    \ \"충북도 사업이 최대한 반영될 수 있도록 최선을 다하겠다\"고 말했다. \n\n　"
  - '4. 나가며

    노인복지주택이 지속가능한 노인복지정책이 되기 위해서는 사업시행자에게는 경제적으로 이득이 되고, 정책대상인 노인가구에게도 주거생활에 실질적인 도움을 줄 수 있어야 할 것이다. 그러나 그간 노인복지주택에의 사업시행자는
    건설부지 및 부대시설 기준완화, 조세감면 등 각종 혜택을 받아 경제적 이득을 실현한 반면, 정책대상가구인 노인가구는 입소자격 제한규정으로 재산권 행사에 많은 불편을 겪어왔다. 이러한 정책집행 의지와 현실 간 괴리
    속에서 다수의 노인복지주택에서 입소자격이 없는 자가 탈법적으로 입주하는 행위가 발생해온 것이다. 다음과 같은 측면에서도 노인복지주택정책에 대한 면밀한 검토가 필요하다. 첫째, 노인복지주택이 용도상 자연경관이 우수한
    녹지지역 혹은 기반시설이 확보되지 않은 지역에도 건축될 수 있어 국토난개발을 유발할 가능성이 크다. 둘째, 보다 근본적으로 노인복지주택과 같이 노인들만 거주하는 주택이 노인복지 측면에서 바람직한지를 검토할 필요가
    있다. 우리나라와 같이 급격한 고령화를 경험하고 있는 일본의 경우, 젊은 세대와 노인 세대가 함께 거주하는(age-mix) 정책이 중요하게 인식되고 있기 때문이다. 현행 노인복지주택 입소자자격 등은 노인의 주거복지증진과
    행복추구에 부정적인 영향을 끼치고 있다는 점을 볼 때, 현행의 노인복지주택정책을 지속시키는 것이 실익이 있는지에 대한 면밀한 검토가 필요한 시점이다. 이를 위해 향후 공급되는 분양형 노인복지주택제도를 폐지하고,
    노인복지주택을 「주택법」 체계 내로 흡수하는 방안을 적극적으로 검토할 필요가 있을 것이다.'
