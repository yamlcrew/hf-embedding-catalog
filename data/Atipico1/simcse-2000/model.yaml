      강렬한 EDM 장르의 댄스곡으로 발매와 동시에 국내는 물론 해외에서도 큰 사랑을 받았다. ‘엘렌 쇼’는 미국 유명 코미디언이자 작가, 배우 등 멀티 엔터테이너인 엘렌 드제너러스가 진행하는 토크쇼로 브루노 마스,
