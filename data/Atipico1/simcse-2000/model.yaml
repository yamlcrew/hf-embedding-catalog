    - 물가 안정과 우리 농산물 소비 촉진을 위한 '대한민국 농할(농산물 할인) 갑시다'가 돌아왔다. 이마트, 롯데마트와 롯데슈퍼는 농림축산식품부와 손잡고 오는 27일까지 다양한 농산물 할인 혜택을 통해 물가 안정
      및 농가 돕기에 나선다. 이번 '농할갑시다'의 키 포인트는 '물가 안정'과 '소비 촉진'이다. 유통업계와 농림축산식품부는 이번 '농할갑시다'를 통해 물가를 안정시키고 판로에 어려움을 겪고 있는 국내 농가들을
      도울 예정이다. 행사 기간 동안 이마트에서는 '농할갑시다' 행사 상품을 구매할 경우, 신세계포인트 적립 고객에 한해 20% 할인을 적용한다. 할인은 1인당 최대 1만원(구매금액 5만원)까지 받을 수 있다. 먼저
      AI(조류독감)로 갑작스레 오른 달걀 가격 안정화를 위해 이마트와 농림축산식품부는 약 50종에 달하는 달걀 할인 행사를 선보인다. 이마트에서 달걀을 신세계포인트 적립하여 구매할 시, 판매 가격의 20%를 할인받을
      수 있다. 또 올겨울 잦은 한파와 폭설로 인해 가격이 크게 오른 '무'도 신세계포인트 적립 시 20% 할인해 판매한다. 무는 올 1월 제주도에 내린 폭설로 생산량이 줄어들어 가격이 상승했다. 농산물유통정보에
