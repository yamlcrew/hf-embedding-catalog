    \ 활용\n․ 추진사유 : 신규 인력 채용에 따른 업무 공백 발생 대응\n․ 추진내용 : 대관/하우스, 기획 프로그램의 운영과 관련한 전문 용역 활용(5월~)\n2021년 삼일로창고극장 기획 프로그램\n기획 프로그램\
    \ 예산 : 198,000천원 \n변경내용 : 삼일로창고극장 공동운영단 협의에 의한 프로그램 구성 구체화"
  - 부산 북구(구청장 정명희)는 생활쓰레기 감량 및 효율적인 재활용품 분리배출을 유도하기 위해 ‘소규모 공동주택 분리수거대 설치 시범 사업’을 지난해 6월부터 시작해 총 23개소에 재활용품 분리수거대 설치를 완료했다고
    14일 밝혔다. 그간 연립주택 등 소규모 공동주택에는 재활용품을 분리배출 할 수 있는 시설이 없어 입주민들이 임의로 정한 장소에 재활용품을 배출해, 도시미관 저해 및 악취 등으로 생활불편을 야기해왔다. 소규모 공동주택
    재활용품 분리수거대 설치 대상은 5~20세대 이상의 소규모 공동주택이며, 분리수거대 설치 공간 확보되고 전담 관리인이 지정된 건물이다. 재활용품 분리수거대의 규격은 2,250×450×1,060mm이며, 투명페트병,
    플라스틱류(유색페트병), 유리병, 캔·고철류, 비닐류를 수거할 수 있는 5분류형이다. 또한, 북구는 분리수거대 운영에 필요한 그물망도 함께 지원하고 재활용품의 적정한 분리 배출을 위해 지속적으로 관리 및 점검할
    예정이다. 정명희 구청장은 “주민참여예산사업의 일환으로 설치된 소규모 공동주택 재활용품 분리수거대가 주민 생활불편 해소와 자원 재활용률 제고에 도움이 되길 바란다”며 “지구환경 보존과, 더 나은 미래를 다음세대에
    전달하기 위해 주민 여러분의 관심과 협조를 당부드린다”고 말했다.
