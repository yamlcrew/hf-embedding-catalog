- source_sentence: '''한화꿈에그린''은 언제 입주 예정이야?'
  sentences:
  - 인천 논현지구 ‘꿈에그린’ 분양현장 인천 남동구 논현택지개발지구는 77만여평의 터에 1만4천여가구가 들어서는 대단지이다. 특히 이곳은 30평형 이상의 중대형 아파트들로 이뤄져 앞으로 고급주거단지를 형성할 것으로
    보인다. 이곳에는 지난해 주택공사가 5천여가구, 민간업체가 2천여가구를 이미 공급했고, 올해는 주공 1600여가구, 한화건설이 논현2택지개발지구 6블럭에서 ‘한화꿈에그린’ 982가구를 공급한다. 주공은 내년에도
    3천여가구를 공급할 예정이다. ‘한화꿈에그린’은 39평형 208가구, 46평형 574가구, 48평형 100가구, 56평형 100가구로 지하 2층, 지상 29층 13개동 규모다. 입주는 2007년 9월 예정이다.
    한화건설 쪽은 이번 분양단지를 한화가 남동구 고잔동 ㈜한화 소유 공장 터에 독자적으로 개발할 예정인 ‘한화 타운’ 아파트 1만2천여가구의 시범단지 성격으로 보고 심혈을 기울이는 모습이다. 입지 여건= ‘한화꿈에그린’은
    인천 소래포구와 가까운 논현택지개발지구에 자리잡고 있지만 ‘한화 타운’이 조성될 소래논현도시개발지구와도 가깝다. 한화 공장 터 72만평은 지난해 말 건설교통부로부터 도시개발계획을 승인받았는데, 전체의 67.4%(48만7821평)가
    공원이나 녹지·도로·학교 등 기반시설용지로 개발될 예정이라 친환경적 단지가 될 것으로 보인다. 이번에 분양하는 ‘한화꿈에그린’은 이 ‘한화타운’에 만들어질 근린공원 바로 앞이어서 15층 이상이면 공원 조망도 가능하다.
    이곳은 오봉산이 가깝고 중앙공원 등 녹지공간이 풍부하지만, 일부에서는 중앙공원이 길쭉한 모양이라 공원으로서의 가치가 떨어진다는 평가를 내리기도 한다. 제2경인고속도로와 서울외곽순환도로, 영동고속도로와 접해 있어
    교통은 편리한 편이다. 그러나 서울까지는 1시간 넘게 걸려, 인천이나 수원, 시흥 쪽으로 출퇴근하는 실수요자에게 더 적합하다. 현재 대중교통은 마을버스와 시내버스 밖에 없다. 그러나 입주 뒤 2008년 준공 예정인
    수인선 역사가 논현택지지구 안에 3곳(호구포역, 논현역, 소래역) 개설되면 교통불편이 다소 해소될 것으로 보인다. ‘한화꿈에그린’ 단지는 논현역에서 걸어서 5분 거리다. 수인선 노선은 오이도~달월~월곶~소래~논현~호구포역~남동~원인재(인천지하철
    1호선)~연수역이며, 원인재역에서 갈아타면 부평 등 인천 시내로는 30분이면 충분히 진입할 수 있다. 택지개발지구라 지구 안에 14개의 학교가 들어서고, 논현역 주변에 상업시설들이 들어서므로 생활편의시설은 이용하기
    편리할 것으로 예상된다. 친환경 도시개발지구 잇닿아수인선 개설땐 교봉물편 해소지난해 보다 분양값 낮게 책정 단지 배치= 주로 남동향과 남서향 등 남향 위주로 모든 단치를 배치했다.
  - '상장회사법제 구축 공동 세미나

    제1주제 상장회사법 제정에 관한 구상

    Ⅴ 결론

    경험적으로 볼 때 새로운 법을 제정한다는 게 매우 어려운 일이다. 특히 학계와 실무계에서 회사법을 상법에서 분리하여야 한다는 주장이 오랫동안 있어 왔지만 큰 반향을 불러일으키지 못한 것이 현실이다. 이러한 상황에서
    대안으로 구상한 것이 바로 상장회사법의제정이다. 상장회사법의 경우 이미 2007년도에 ｢상장법인에 관한 법률｣ 제정안이 입법예고된 바 있다는 점에서 추후에도 그 제정을 위한 공감대를 이끌어 내기가 용이할 것으로
    보인다. 본고는 2019년의 시점에서 다시 한번 상장회사법의 제정 필요성으로 다음과 같은 3가지이유를 제시하였다. 첫째, 급격하게 변화하는 자본시장에 유연하게 대응하여 다양하면서도 다수의 이해관계자를 보호하기 위해서는
    상장회사법을 제정할 필요가 있다. 둘째, 현재 상법과 자본시장법에 나누어 규정되고 있는 상장회사에 대한 특례를 하나로 합하여 단행법화한다면 국내외의 수범자 입장에서의 편의성이 제고될 서이다. 셋째, 상장회사에 관련된
    여러 법제가 산재하고 있어 체계적인 정합성이 미흡하므로, 이를 극복하기 위해서는 상장회사법의 제정이 필요하다. 단기적인 과제로서 외부감사법상 상장회사에 적용되는 규정을 상장회사법으로 이관한다면 도움이 될 것으로
    보인다. 이에 비교법적인 차원에서 미국과 독일 및 일본과 태국법의 동향을 파악하였다. 미국은 상장회사에 관한 규정을 회사법에 일부 두면서도 동시에 전국규모의 증권거래소가 마련한 상장회사 규정에 의하여 상장회사의
    지배구조가 보충적으로 규율되고 있다. 독일은 주식법에서 상장회사와 비상장회사 모두를 다루고 있다. 일본의 경우에는 단행의 회사법을 두고 있지만, 상장회사에 대한 규제의 선진화를 위하여 2007년 상장회사에 적용될
    공개회사법요강안을 발표한 바 있다. 태국은 세계적으로 유래를 찾기 어려운 입법으로서 공개주식회사법을 별도로 제정하여 시행하고 있는 국가이다. 본고는 기존에 정부가 마련한 ｢상장법인에 관한 법률｣ 제정안을 기본으로
    하면서 위에 소개된 여러 국가의 입법례를 참고하여 상장회사법에 들어갈 규정들을 몇 가지 제시하였다. 본고에서 상장회사법에 편입되어야 할 추가적인 규정을 요약하여 정리하면 다음과 같다. 먼저 지배구조와 관련하여 주주명부의
    폐쇄 및 기준일을 단축하는 규정, 이사에게 내부통제체제 구축의무를 부과하는 규정 및 사외이사의 회의를 강제하는 규정을 두어야 한다. 다음으로 현행 외부감사법에 있는 상장회사의 회계처리기준과 회계감사에 관한 규정을
    상장회사법으로 이관한다. 마지막으로 합병 등과 같은 조직재편과 관련하여 몇 가지를 개선한다. 즉, 상장회사에서 합병 등에 반대하는 주주에 대해서는 주식매수청구권을 인정하지 않으며, 삼각합병에서 제3자에게 제공되는
    합병의 대가가 모회사가 발행한 의결권있는 주식의 10%를 초과하는 경우에는 모회사 주주총회의 승인을 요구한다. 그리고 합병 등에 필요한 채권자보호절차와 관련하여 채권자에 대한 개별최고제도를 폐지함은 물론이고 채권자의
    손해가 없다면 그에 대해서는 채권자보호절차를 마련하지 않는다.'
  - 배우 한상진이 한다감과 부부 호흡을 맞춘다. 28일 소속사 이니셜 엔터테인먼트는 “한상진이 KBS 새 일일 드라마 ‘국가대표 와이프’에 출연한다”고 밝혔다. ‘국가대표 와이프’는 강남의 집 한 채를 통해 삶의 클래스를
    올리려 고군분투하는 서초희와 남편 강남구의 이야기를 담는다. 행복은 집 자체가 아니라, 그 집에서 서로를 보듬고 살아가는 사람임을 깨닫는 현실적인 가족 이야기를 그려낸다. 앞서 한다감이 출연을 확정 지었다. 극
    중 한상진은 서초희(한다감)의 남편이자 대학 전임교수 강남구 역을 맡는다. 강남구는 아내의 헌신적인 뒷바라지로 대학 전임교수 자리에 안착한 인물이다. 한상진은 현실감 없는 이상주의자 강남구로 분해 활약할 예정이이다.
    그는 앞서 드라마 ‘하얀거탑’ ‘이산’ ‘마의’ ‘웰컴2라이프’ ‘솔약국집 아들들’ ‘결혼해주세요’ ‘빅맨’ ‘인형의 집’ ‘뿌리깊은나무’ ‘미녀의 탄생’ ‘육룡이 나르샤’ ‘해치’ 등 수많은 작품에서 활약했다.
    최근에는 독립영화 ‘북성로 히어로’의 감독으로 영역을 넓혔다. 한편 ‘국가대표 와이프’는 현재 방영 중인 ‘속아도 꿈결’의 후속작으로, 캐스팅을 마무리하고 다음 달부터 본격적인 촬영에 들어간다. 오는 9월 첫 방송
    예정이다.
- source_sentence: 정보보호 유관기관 관계자 등 몇 여명이 참여한 상태로 제2회 정보보호 서밋이 열렸니
  sentences:
  - '정보보호 서밋 개최, 정보보호를 위한 5.5.2.1 실천 수칙 다짐 □ 미래창조과학부(장관 최양희, 이하 미래부)와 한국인터넷진흥원(원장 ***)은 12월 24일(수) 엘타워에서 윤종록 미래부 차관과 기업 정보보호
    최고책임자, 정보보호 유관기관 관계자 등 300여명이 참석한 가운데 ‘제2회 정보보호 서밋’을 개최하였다. □ ‘정보보호 서밋’은 기업의 정보보호 인식제고 및 자발적인 실천을 장려하고 정보보호에 대한 자긍심을 고취하기
    위한 행사로

    o 작년 정보보호 최고책임자 협의회 출범식에 이어 올해는 기업의 자율적인 정보보호 실천 의지를 표명하고 정보보호 최고책임자의 역할을 다짐하는 정보보호 수칙 발표와 정보보호 대상(大賞), 해킹 방어대회, 정보보호
    삽화 공모전 시상식이 함께 진행되었다.'
  - '‘제2회 정보보호의 날’기념식 개최 - 국제 정보보호 컨퍼런스 및 채용박람회 등 다양한 부대행사 열려-

    □ 이외에도 정보보호의 날 주요 행사로서 정보보호 인력채용 박람회가 열려 대학생 등 구직난 해소를 위해 국내 상위 보안관련 기업의 ‘채용상담의 장’이 같은 장소에서 마련되었다. o 주요 정보보호기업 및 연구기관
    30여개사와 전국대학 및 대학원 정보보호 유관분야 전공학생 800여명이 참가한 본 박람회에서는 채용상담은 물론 이력서 및 자기소개서 작성 컨설팅, 적성검사 등이 함께 진행돼 참가자들의 큰 호응을 얻은 가운데 성황리에
    개최되었다. □ 이번에 개최된 다양한 정보보호 행사가 스마트 ICT시대의 국민행복과 창조경제의 실현을 위해 필요한 정보보호의 중요성을 인식하는 계기가 되고, 정보보호 실천문화를 확산되는데 기여할 것으로 기대된다.'
  - 2011년 10월 기준 독일의 스마트폰 보급률은 34.2%로 집계됐다. 독일의 스마트폰 보급률은 유럽의 주요 5개국(프랑스, 영국, 독일, 스페인, 이탈리아) 가운데 가장 낮은 수치이다. 그러나 증가율의 측면에서
    보았을 때, 2011년 독일의 스마트폰 보급률은 2010년 대비 64% 증가한 것으로 유럽에서 가장 빠른 보급률 증가세를 기록하고 있는 것으로 나타났다 (ComScore, 2012). 이러한 미디어 생태계의 변화
    속에서 독일의 신문사들은 SNS(Social Network Service)를 이용한 전략을 추진하고 있다. 구체적으로 독일 일간 신문의 40%는 수익 창출을 위해 SNS계정을 만들고 기사의 홍보 및 광고 수단으로
    이용하고 있으며, 26%는 SNS이용자를 시민리포터로 활용하고 있다. SNS를 활용한 전략은 시행초기단계이기 때문에 수익성이 실증적으로 검증되지는 않았다. 그러나 이와 같은 전략은 스마트미디어를 주로 활용하는 젊은
    층의 높은 참여를 유도할 수 있을 것으로 기대된다(심영섭, 2012).
- source_sentence: 철강산업부산물 재활용을 주제로 한국건설순환자원학회가 실시한 세미나에서 누가 기조발표를 했어
  sentences:
  - '건설폐기물 재활용기본계획 의견수렴 공청회 개최

    □ 한국건설순환자원학회(회장:한국건설기술연구원 ***박사)에서는 2006. 8.29(화요일) 오후3시부터 한국과학기술회관 중강당에서 건설폐기물 재활용기본계획(안)에 대한 공청회를 갖고 전문가, 관련업계, 시민단체
    등 각계의 다양한 의견을 수렴할 예정이다. □ 이번 공청회는 ‘07년부터 ’11년까지 향후 5년간 우리나라에서 발생되는 건설폐기물을 대상으로 재활용촉진을 위한 각종 시책사업과 예산사업계획을 제시하여 그 필요성과
    우선순위에 대한 의견을 수렴할 예정으로서, 한국건설순환자원학회에서 『건설폐기물 재활용 기본계획(안)』에 대한 연구용역 내용을 발표하고, 학계, 관련업계, 연구기관, 시민단체 등 전문가 7명의 지정토론과 방청석 참석자의
    질의·응답형식으로 추진할 계획이다. □ 환경부는 최근 발생량이 급증하고 있는 건설폐기물을 친환경적으로 적정처리하고 고부가가치의 순환골재로 재활용을 촉진하기 위하여 특별법을 제정·시행하는 등 각종 정책을 추진하고
    있어 향후 5년간 정부정책의 로드맵이 되는 건설폐기물 재활용기본계획(안)의 공청회에 대하여 관련업계, 학계, 연구기관 등에서 상당한 관심을 갖고 이에 참여할 것으로 전망하고 있다. □ 향후 추진일정은 공청회에서
    제시된 의견을 수렴하여 건설폐기물 재활용기본계획안을 마련하고, 관계 중앙행정기관 및 지자체의 의견을 들어 최종 정부안을 확정, ‘07년 1월1일부터 시행할 계획이다.'
  - 조해녕.김진탁 후임 맡아 DGB금융 박인규 회장이 이사회 의장직을 사퇴했다. 이에 따라 임원후보추천위원회에서도 빠진다. 21일 금융권에 따르면 박인규 회장은 최근 열린 임시 이사회에서 DGB금융지주와 대구은행 이사회
    의장직을 사퇴했다. DGB금융과 대구은행의 후임 이사회 의장에는 조해녕 사외이사와 김진탁 사외이사가 각각 선임됐다. 이날 임시 이사회에서는 지배구조 내부규범을 개정해 지주 회장 겸 은행장을 임원후보추천위원회 위원에서
    배제하도록 했다. 새 내부규범은 임원후보추천위원회를 사외이사 3인 이상으로 구성하도록 했다. 임원후보추천위는 최고경영자 후보 추천, 사외이사 후보 추천, 감사위원 후보 추천 등을 맡는다. 금융권에서는 회장이 사외이사
    선임과정에 참여하고, 사외이사가 회장 연임을 결정하는 이른바 셀프 연임이 문제로 지적돼 왔다. 금융당국이 지배구조 개선에 나서고 있는 가운데 KB금융, 하나금융 등의 경우 회장이 임원추천위원회에서 빠졌다. 그동안
    DGB금융도 사외이사가 아닌 사람이 이사회 의장을 할 수 있는 예외 조항을 이용해 지주 회장 겸 은행장이 이사회 의장을 맡아 사외이사 선임과 회장 연임 과정 등에 개입해 왔다. 이번 지배구조 내부규범 개정으로 회장이
    임추위에서 제외되면 영향력을 행사할 수 없어 임추위 운영의 독립성과 지배구조 투명성에 기여할 것으로 보인다.
  - 한국건설순환자원학회가 주관하고 국토교통부 도로미세먼지연구단이 주최한 '철강산업부산물 재활용 및 미세먼지 저감 기술대응 포럼'이 20일 오전 엘타워 중회의실에서 개최됐다. 이날 포럼은 국내 철강 및 건설산업의 탄소중립과
    지속가능한 발전과 상생을 모색하기 위해 마련됐으며 한국건설순환자원학회 최연왕 회장과 도로미세연구단장ㆍ국립한경대학 김혁중 교수, 한국법학회 원영철 회장을 포함해 산ㆍ학ㆍ연 관계자 20여명이 참석했다. 포럼은 한국건설순환자원학회
    최연왕 회장의 축사에 이어 주제발표, 패널토론 순으로 진행됐다. 국립 한경대학 김혁중 교수의 '그린뉴딜 탄소중립 정책 및 선순환向 철강 산업부산물'이라는 주제의 기조발표에 이어 △자원순환산업인증원 박성호 국장의
    '철강산업부산물의 재활용 확대를 위한 기술개발의 필요성' △포스코건설 이창홍 부장의 '철강산업부산물현황 및 건설분야 적용사례기반 업싸이클링 검토' △현대제철 이종민 부장의 '제강슬래그 아스팔트혼합물 도로포장 성능검토'
    △SG주식회사 박경원 전무 '제강슬래그 골재를 활용한 아스팔트 혼합물 내구공용성'에 대해 발표가 이어졌다. 김혁중 교수는 기조발표를 통해"철강 고체부산물의 재활용과 선순환 확대 방안의 지속적인 연구와 업사이클링
    개념 및 한국형 그린뉴딜 정책추진의 상생과 발전을 위해 산ㆍ학ㆍ연ㆍ관의 역할이 중요하다" 강조했다. 이날 포럼의 축사를 맡은 한국건설순환자원학회 최연왕 회장은 "세계 기후변화에 발빠르게 대응하며 탄소 제로를 목표로
    산학연 관계자들과 함께 의견을 나누는 지리"라며 "철강산업은 온실가스 최대배출 업종으로 건설산업의 탄소중립에 대한 실천방안에 대한 논의와 토론으로 탄소중립의 새로운 패러다임을 구축하는 시간이 되길 기대한다"고 말했다.
- source_sentence: 연제구의 도시미화와 저소득층 노인들의 일자리 창출에도 도움이 되는 게 뭐야
  sentences:
  - 연제구(구청장 이성문)는 지난해에 이어 ‘2021년 불법 유동광고물 수거보상사업’을 시행한다. ‘불법 유동광고물 수거보상사업’은 도시미관을 해치는 불법 광고물을 근절하기 위해 사업 참여자가 불법 유동광고물을 수거하여
    구청 도시재생과에 가져가면 구청에서는 보상금을 지급하는 사업이다. 구는 1월 11일부터 15일까지 연제구민 중 만 60세 이상 저소득 어르신을 대상으로 신청을 받아 총 50명을 수거보상사업 참여자로 선발하였다.
    참여자로 선발된 어르신들은 오는 2월부터 시작하는 수거 활동에 앞서 연제구청 구민홀에서 불법 유동광고물 구분 기준, 수거 방법, 수거 시 안전 수칙 등에 대해서 사전 교육을 받았으며 수거활동 중 발생할 수 있는
    안전사고에 대비해 단체 보험에도 가입했다. 불법 광고물 정비에 주민들이 참여할 수 있는 기회를 제공하여 주민들로부터 불법 광고물에 대한 경각심을 제고 할 수 있을 것으로 기대된다. 구 관계자는 “이번 사업을 통해
    주민과 함께 품격 있는 연제구를 만드는 데 일조하고, 저소득 어르신의 실버 일자리 창출에도 기여할 것으로 기대된다”고 말했다.
  - '4. 나가며

    노인복지주택이 지속가능한 노인복지정책이 되기 위해서는 사업시행자에게는 경제적으로 이득이 되고, 정책대상인 노인가구에게도 주거생활에 실질적인 도움을 줄 수 있어야 할 것이다. 그러나 그간 노인복지주택에의 사업시행자는
    건설부지 및 부대시설 기준완화, 조세감면 등 각종 혜택을 받아 경제적 이득을 실현한 반면, 정책대상가구인 노인가구는 입소자격 제한규정으로 재산권 행사에 많은 불편을 겪어왔다. 이러한 정책집행 의지와 현실 간 괴리
    속에서 다수의 노인복지주택에서 입소자격이 없는 자가 탈법적으로 입주하는 행위가 발생해온 것이다. 다음과 같은 측면에서도 노인복지주택정책에 대한 면밀한 검토가 필요하다. 첫째, 노인복지주택이 용도상 자연경관이 우수한
    녹지지역 혹은 기반시설이 확보되지 않은 지역에도 건축될 수 있어 국토난개발을 유발할 가능성이 크다. 둘째, 보다 근본적으로 노인복지주택과 같이 노인들만 거주하는 주택이 노인복지 측면에서 바람직한지를 검토할 필요가
    있다. 우리나라와 같이 급격한 고령화를 경험하고 있는 일본의 경우, 젊은 세대와 노인 세대가 함께 거주하는(age-mix) 정책이 중요하게 인식되고 있기 때문이다. 현행 노인복지주택 입소자자격 등은 노인의 주거복지증진과
    행복추구에 부정적인 영향을 끼치고 있다는 점을 볼 때, 현행의 노인복지주택정책을 지속시키는 것이 실익이 있는지에 대한 면밀한 검토가 필요한 시점이다. 이를 위해 향후 공급되는 분양형 노인복지주택제도를 폐지하고,
    노인복지주택을 「주택법」 체계 내로 흡수하는 방안을 적극적으로 검토할 필요가 있을 것이다.'
  - "이시종 충북도지사는 24일 오후 2시 도청 대회의실에서 국가철도망 구축계획에 충북도 철도사업의 반영을 위한 민ㆍ관ㆍ정 간담회를 개최했다. 이날 간담회에는 이 지사를 비롯해 한범덕 청주시장, 송기섭 진천군수, 조병옥\
    \ 음성군수, 이장섭, 임호선 국회의원과 박문희 도의회 의장, 최충진 청주시의회 의장, 김성우 진천군의회 의장, 최용락 음성군의회 의장 등 지역 정치권 관계자와 민간사회단체총연합회 유철웅 회장 등 민간사회단체 관계자까지\
    \ 34명이 참석했다. 이번 간담회에서는 4차 국가철도망구축계획 공청회가 얼마 남지 않은 중요한 시점에서 그동안 철도사업의 국가계획 반영 추진상황을 공유하고, 각 기관과 단체별 참여 방안과 도민의 힘을 모으기 위한\
    \ 다양한 방안이 논의됐다. 도는 청주도심을 통과하는 충청권 광역철도, 수도권에서 진천 국가대표선수촌과 혁신도시를 거쳐 청주공항을 잇는 수도권내륙선 광역철도, 음성 감곡에서 혁신도시를 거쳐 청주공항을 잇는 중부내륙선\
    \ 지선 등의 노선을 국가계획에 반영하기 위해 집중하고 있다. 이 지사는 \"해당 철도노선을 국가계획에 반영해야만 추진할 수 있기 때문에 우선은 반영을 목표로 최선을 다해야 한다\"며 \"많은 도민들의 공감대와\
    \ 적극적인 지지가 필요한 때인 만큼 참석자들이 구심점 역할을 해 줄 것\"을 당부했다. 도 관계자는 \"국가철도망계획은 10년 단위 계획으로 전국 지자체가 각자의 사업 반영을 위해 각축전을 벌이는 상황\"이라며\
    \ \"충북도 사업이 최대한 반영될 수 있도록 최선을 다하겠다\"고 말했다. \n\n　"
- source_sentence: 어느 곳에 추가로 부산진구에서 재활용품 분리배출을 위한 정거장을 만들기로 했어
  sentences:
  - 부산 부산진구(구청장 서은숙)는 오는 7월부터 단독주택가 재활용정거장 운영 사업을 부암1동과 개금2동으로 확대 추진한다고 밝혔다. 재활용정거장 사업은 일반 주택가 주민들이 편리하게 재활용품을 배출할 수 있도록 일정시간에
    지정된 장소에 ‘재활용정거장’이라는 배출 거점을 만들어 주민들이 이용할 수 있도록 하고, 운영 시간 외에는 철수하는 이동식 분리수거장이다. 각 정거장마다 도시광부라 불리는 자원관리사가 정거장을 관리하고 주민들의
    재활용품 분리배출을 지원한다. 부산진구는 2019년 3월부터 전포1동 지역에 재활용정거장 25개소를 설치하여 174회 운영, 재활용품 38,700마대를 수거했다. 이 사업이 주민들의 올바른 재활용품 분리배출 문화를
    확산시키고 마을의 쓰레기 문제를 주민들이 직접 해결하는 지역공동체의 모범안을 제시한 사례로 평가받음에 따라 오는 7월부터 부암1동과 개금2동 지역에 재활용정거장 운영을 확대 추진하기로 했다. 재활용정거장은 부암1동이
    5개소, 개금2동은 10개소이다. 부암1동은 매주 월요일과 수요일, 개금2동은 화요일과 목요일 오후 4시부터 8시까지 4시간동안 운영된다. 주민들은 종이류, 플라스틱류, 유리병류, 캔․고철류, 비닐류 등 재활용
    전품목을 가까운 재활용정거장으로 배출하면 된다. 오후 8시 이후 운영을 마치면 수거업체가 재활용정거장에 배출된 재활용품을 모두 수거해 간다. 이후 정거장은 철거되고 다음 운영요일에 다시 설치된다. 또한 주민들의
    재활용품 배출 혼동을 줄이기 위해 기존 문전수거 방식도 병행해 운영한다. 구 관계자는 “재활용정거장 사업은 단독주택지역의 재활용품 혼합배출 실태를 개선하여 실질적인 자원 재활용율 높이고 쾌적한 골목길 조성에 크게
    기여할 것으로 기대한다”며 주민들이 다함께 적극 참여해 줄 것을 당부했다.
  - "서울시 민간위탁사업 「삼일로창고극장」2021년 사업 및 예산 1차 변경 계획\n1 변경개요\n추진근거\n대표이사 방침 제15호(기획제작팀-30, 2021.1.12.) “서울시 민간위탁사업 삼일로창고극장 2021년\
