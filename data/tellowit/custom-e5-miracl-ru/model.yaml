  - source_sentence: 'query: Были ли братья и сестра у Рюрика?'
    sentences:
    - 'passage: 29 января 1923 года Ататюрк женился на Латифе Ушаклыгиль (Латифе Ушакизаде). Брак Ататюрка и Латифе-ханым,
      которая вместе с основателем Турецкой республики отправлялась во многие поездки по стране, закончился 5 августа 1925
      года. Причиной развода, по неофициальной версии, явилось постоянное вмешательство жены в дела Ататюрка. Родных детей
      у него не было, зато он взял 8 приёмных дочерей (Афет, Сабиху, , , , , и Афифе) и 2 сыновей (, ). Всем приёмным детям
      Ататюрк обеспечил хорошее будущее. Одна из приёмных дочерей Ататюрка стала историком, другая — первой турецкой женщиной-лётчиком.
      Карьера дочерей Ататюрка служила широко пропагандируемым примером для эмансипации турецкой женщины.'
    - 'passage: ABS стала особенно актуальной в связи с массовым распространением вакуумных усилителей в тормозных системах
      и эффективных, быстродействующих дисковых тормозных механизмов, которые в сочетании друг с другом легко позволяют при
      нажатии на педаль заблокировать колёсные тормозные механизмы. Колёса при этом прекращают вращаться и, как показали исследования,
      эффективность торможения автомобиля в таком режиме (движение «юзом», то есть, скольжение неподвижных колёс по асфальту)
      существенно снижается по сравнению со случаем, когда тормозящие колёса катятся (на грани срыва в «юз»). Кроме того,
      очень важно то, что при заблокированных передних колёсах машина становится неуправляемой, поскольку направление движения
      практически не зависит от поворота передних колес, если они не катятся, а скользят. При таком торможении «юзом» шины
      не оказывают сопротивления боковому уводу, то есть, любая боковая сила (например, возникающая при наезде на неровность
      дорожного покрытия) может вызвать неконтролируемое водителем отклонение автомобиля от прямолинейного движения. В результате
      при торможении «юзом» машина с дисковыми тормозами и усилителем нередко испытывала опасную тенденцию к заносу задней
      оси. Применение автоматических регуляторов тормозных сил на задних тормозных механизмах решало данную проблему лишь
      отчасти.'
    - 'passage: Князь Григорий Семёнович Друцкий (XVIII колено от Рюрика), в 1422 году подписал договор Великого княжества
      Литовского с Орденом вместе с братьями. Его сын, князь Василий Григорьевич, от брака с дочерью киевского воеводы Юрши
      оставил двух сыновей — князя Богдана и князя Романа. Первый из них по завещанию тётки, сестры матери в 1488 году получили
      имение Любче с приселками в Луцком повете (уезде). После смерти бездетного князя Богдана Васильевича король Александр
      в 1500 году подтвердил его брату, князю Роману Васильевичу все привилегии на Любче.'
  - source_sentence: 'query: Выходит в Калмыкии газета на калмыцком языке на март 2019?'
    sentences:
    - 'passage: 31 октября Сноуден встретился в Москве с депутатом Бундестага Хансом-Кристианом Штрёбеле и главным редактором
      журнала Der Spiegel Георгом Масколо и три часа обсуждал с ними прослушку американскими спецслужбами телефонов канцлера
      Германии Ангелы Меркель. На следующий день Сноуден заявил, что готов дать показания генеральной прокуратуре ФРГ по делу
      о прослушке американскими спецслужбами телефонных переговоров канцлера ФРГ Ангелы Меркель в обмен на предоставление
      бессрочного политического убежища в Германии. Также Сноуден обратился к властям США с просьбой о помиловании, так как,
      по его мнению, разведывательные службы США систематически нарушали закон, поэтому раскрытие информации имело положительный
      эффект. Соответствующее письмо Сноуден передал немецкому депутату Штрёбеле, с которым встречался в Москве, а тот его
      передал американскому послу. Американская администрация отвергла просьбу Сноудена.'
    - 'passage: Миджна́шхар (, букв. "Среди́нная страна́") — территория в средней части Армянского нагорья, которая представляет
      собой обширное плоскогорье, изрезанное горами и долинами. Окружена естественной средой многочисленных горных хребтов
      и гор, поэтому ещё с древности называлась "Срединной страной". Горная цепь Армянского хребта тянется начиная с горы
      Арарат до реки Ефрат, тем самым деля Срединную страну на северную и южную части. В административном отношении Миджнашхар
      приблизительно соответствует провинции Айрарат Великой Армении. Здесь находились почти все столицы Армении — Армавир,
      Ервандашат, Арташат, Вагаршапат, Двин, и последняя столица армянского царства Ани.'
    - 'passage: «Ойратские известия» печатались в Астрахани в 1917—1918 годах. Газета была двуязычной — статьи частично публиковались
      на русском и калмыцком языках. Калмыцкие статьи печатались на калмыцком алфавите тодо-бичиг. В заголовке газеты было
      указано, что она является ежедневной, но выходила она с периодичностью один раз в две недели. Всего вышло 5 номеров.
      Первый номер вышел 15 ноября 1917 года и последний — в январе 1918 года. Редактором газеты был калмыцкий просветитель
      и общественный деятель Номто Очиров. Кроме Номто Очирова в издании газеты участвовали Церен Петкиев, Д. Онкоров, Б.
      Боваев, С-Г. Хадылов.'
  - source_sentence: 'query: Сколько жен можно иметь в исламе?'
    sentences:
    - 'passage: В 2005 году религиозный комитет официально запретил практику принудительных браков. Тем не менее, официальный
      договор между женихом и отцом невесты обязателен. Ни женщина, ни мужчина не могут просто жениться/выйти замуж за иностранца.
      Многожёнство разрешено, мужчине позволено иметь до четырёх жён, однако при условии, что он может их всех одинаково содержать.
      На практике мужчины эти правила не соблюдают, и ситуация с браками гораздо хуже. Полиандрия (многомужество) запрещена,
      как противоречащая принципам ислама.'
    - 'passage: «Святой Александр Невский» или «Александр Невский» — парусный линейный корабль Балтийского флота Российской
      империи, один из кораблей типа «Слава России». Находился в составе флота с 1749 по 1763 год, принимал участие в Семилетней
      войне, в том числе в блокаде пролива Зунд и осаде Кольберга, а по окончании службы был разобран. До войны неоднократно
      участвовал в практических плаваниях флота и торжественных мероприятиях.'
    - 'passage: XVIII век стал периодом нового оживления контактов Тибета с Китаем, где с 1644 года воцарилась маньчжурская
      династия Цин (1644—1911). Манчжуры всё больше вмешивались в дела Тибета, рассматривая тибетскую теократию как инструмент
      влияния на монголов. Среди первых цинских императоров два долгожителя манчжурского императорского дома — Канси (правил
      1661—1722) и Цяньлун (правил 1735—1796) были усердными буддистами. Правление второго совпало по времени с долгим правлением
      в Тибете седьмого Далай-ламы — Кэлсанга Гьяцо (1708—1757). С воцарением Цяньлуна, который был адептом ваджраяны не столько
      из политических соображений, сколько совершенно искренне, тибетский буддизм переживал подъём как в Тибете и Монголии,
      так и в Пекине и в других крупных городах Китая. При этом императоре процветала буддийская живопись, которую исполняли
      на шёлке лучшие придворные художники. Стиль этих произведений обычно называют сино-тибетским.'
  - source_sentence: 'query: В каком году была создана группа My Bloody Valentine?'
    sentences:
    - 'passage: В центральном Тибете власть находилась в руках разных сильных семейств-кланов, которых поддерживали буддийские
      школы. Конец XVI — начало XVII века были временем усиления связей между школой Гелуг и монголами, которые к тому времени
      стали независимыми: Далай-лама III (1543—1588) совершил поездку в Монголию и обратил в свою веру Алтан-хана (1548—1582),
      а Далай-лама IV (1589—1616) обрёл реинкарнацию в одном из представителей правящего монгольского дома. Живопись центрального
      Тибета в этот период представляла собой сложную смесь разных стилей. Среди икон-танка XVI века есть выполненные в непальском
      стиле «бери», есть выполненные в стиле «менри», есть разные смешанные варианты. Характерной чертой было растущее распространение
      китайских приёмов в изображении одежды божеств.

      В рамках центрально-тибетской живописи XVI века выделяют живописный стиль «другри», который появился в недрах буддийской
      школы Дрикунг Кагью при четвёртом Гьялва Другпе (главе этой школы) по имени Пема Карпо (1527 −1592). Старейший монастырь
      этой школы — Ралунг, находится вблизи территории Бутана, поэтому стиль «другри» считают «бутанским». Он представляет
      собой смесь разных элементов и приёмов «менри», «гадри» и бутанской живописи.'
    - 'passage: В 1991 году My Bloody Valentine сами продюсируют свой второй лонгплей «Loveless» (1991). Этот альбом был встречен
      великолепными обзорами и стал хитом в Великобритании, поднявшись на 24 место в чартах. В Америке группа также достигла
      успеха (в том числе благодаря выступлениям с нойз-рок-группой Dinosaur Jr). Несмотря на то что группа достигла пика
      популярности и её аудитория расширялась, «Loveless» не продавался в количествах, достаточных, чтобы возместить $500
      000, затраченных на запись. Поэтому лейбл Creation отказывается от группы. Creation так до конца и не оправились до
      1994 года, когда к ним пришли Oasis. My Bloody Valentine подписали контракт с Island Records и закрылись в студии для
      записи нового альбома. Однако нового релиза не последовало. Последней записью группы стала кавер-версия «Map Ref. 41N
      93W» группы Wire для трибьюта (1995).'
    - 'passage: В проекте планировки территории запланировано три пешеходных перехода в районе «Лахта-центра»: подземный,
      между «Лахта-центром» и вестибюлем новой станции метро; два надземных, соединяющих комплекс с остановками общественного
      транспорта и причалами водного транспорта. Пешеходные переходы будут проходить через Приморское шоссе, предположительно
      от Лахта-центра на сторону южной Лахты, к улицам Южная, Славянская или Александровская.'
  - source_sentence: 'query: Где происходит действие первой игры Warcraft?'
    sentences:
    - 'passage: Warcraft Adventures: Lord of the Clans — отменённая компьютерная игра в жанре графического квеста, которую
      совместно разрабатывали американская компания Blizzard Entertainment и американо-российская студия Animation Magic с
      по . Действие "Warcraft Adventures" происходит в вымышленной вселенной Warcraft вскоре после событий игры ""; главный
      герой, орк по имени Тралл, пытается объединить племена орков, после проигранной войны живущие в резервациях под властью
      победителей-людей. Игровой процесс "Warcraft Adventures" должен был быть схож с другими графическими квестами того времени
      — при помощи интерфейса «укажи и щелкни» игрок мог исследовать мир, решать головоломки и взаимодействовать с другими
      персонажами.'
    - 'passage: Тем временем с аэродрома Энгельс вылетел вертолёт Ми-4, в задачу экипажа которого входило найти и подобрать
      Гагарина. Экипаж вертолёта Ми-4 первым обнаружил спускаемый аппарат, но Гагарина рядом не было; ситуацию прояснили местные
      жители, которые сказали, что Гагарин уехал на грузовике в город Энгельс. Вертолёт взлетел и взял курс на город. С его
      борта на дороге неподалеку от КПП ракетного дивизиона заметили автомашину, на которой Гагарин после доклада в части
      направлялся к спускаемому аппарату. Гагарин вышел из машины и махал руками, его подобрали, и вертолёт полетел на аэродром
      Энгельс, передав радиограмму: «Космонавт взят на борт, следую на аэродром». На месте посадки Гагарину была вручена его
      первая награда за полёт в космос — медаль «За освоение целинных земель». Впоследствии такая же медаль вручалась на месте
      посадки и многим другим космонавтам.'
    - 'passage: В начале 2009 года, примерно через год после того, как Bullet For My Valentine выпустили свой второй студийный
      альбом «Scream Aim Fire», группа начала писать новый материал. В марте 2009 года в интервью с Metal Hammer Мэттью Так
      заявил, что в предыдущих альбомах он писал тексты для песен, после группа писала партии инструментальных частей, но
      в Fever они всё делали одновременно. Bullet for My Valentine начали работу в студии в апреле 2009 года с продюсером
      Доном Гилмором (наиболее известный по своей работе с Linkin Park и Good Charlotte). Запись велась как в родном Монмоусшире
      (Уэльс), так и в Лос-Анджелесе, Калифорния, также BFMV отменили тур в Южной Африке для продолжения записи. Группа приняла
      решение отдохнуть от записи в середине 2009 года, чтобы выступить на различных турах, в том числе 2009 Mayhem Festival.
      Во время Mayhem Festival Bullet for My Valentine включили в свой сет-лист новую песню. По окончании тура группа вернулась
      в студию, чтобы закончить Fever. Запись была завершена в декабре 2009 года, и Гилмор начал сводить альбом в Малибу,
      Калифорния.

      Мы хотели сделать что-то новое и захватывающее, но в то же время остаться самими собой. Взять Дона Гилмора к нам было
      очень сознательным решением. Мы не хотели, чтобы он изменил нас как музыкантов, а только помог с вокалом и улучшил выступления.
      Это странная штука — петь в студии, вы не получаете адреналин, нет энергии, шума, это лишь ты перед микрофоном, смотришь
      на парня, который смотрит на тебя. Выступать в студии было трудно, но Дон был удивителен. Мы переписывали тексты и партии
      раз пять в некоторых песнях, потому что они казались ему недостаточно сильными. Мы работали безумно много, чтобы получить
      разнообразные вокальные партии, но всё ещё оставаясь прежними. Вокал занял больше времени, чем всё остальное на альбоме
      вместе взятое. Это была трудная работа, но я лично думал, что это всё имеет большой смысл. Все жужжат об этом. Мы просто
      пытались вернуть эти энергию и волнение и вибрацию обратно в группу, потому что Scream Aim Fire просто разорвали наши
      сердца своим желанием быть в группе.

      14 февраля 2010 года группа выпустила новый трек «Begging For Mercy», доступный для бесплатного скачивания с официального
      веб-сайта в течение ограниченного времени.'
