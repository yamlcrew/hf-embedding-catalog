- source_sentence: Thí sinh ở Thành phố Hồ Chí Minh nộp lệ phí đăng ký nguyện vọng đại học năm 2023 khi nào?
  sentences:
  - 'I. Đối với thí sinh

    ...

    7. Đăng ký và xử lý nguyện vọng:

    ...

    b) Từ ngày 31/7 đến 17 giờ 00 ngày 06/8/2023:

    - Thí sinh phải nộp lệ phí xét tuyển theo số lượng NVXT bằng hình thức trực tuyến theo hướng dẫn của Bộ GDĐT;

    - Riêng thí sinh thuộc diện hưởng chính sách ưu tiên khu vực, ưu tiên đối tượng phải phối hợp với các điểm tiếp nhận rà
    soát thông tin khu vực (Phụ lục VI) và đối tượng ưu tiên của thí sinh (nếu có).

    Thí sinh tìm hiểu kỹ tài liệu hướng dẫn và phải thực hiện đúng, đủ, hết quy trình ĐKXT; thí sinh chưa rõ các nội dung
    khai báo, nộp lệ phí xét tuyển có thể liên hệ với cán bộ tại các điểm tiếp nhận hoặc cán bộ của CSĐT trực các số điện
    thoại hỗ trợ công tác tuyển sinh để được hướng dẫn.'
  - '“Nhà nước thu hồi đất là việc Nhà nước quyết định thu lại quyền sử dụng đất của người được Nhà nước trao quyền sử dụng
    đất hoặc thu lại đất của người sử dụng đất vi phạm pháp luật về đất đai.”“1. Nhà nước quyết định thu hồi đất trong các
    trường hợp sau đây:

    a) Thu hồi đất vì mục đích quốc phòng, an ninh; phát triển kinh tế - xã hội vì lợi ích quốc gia, công cộng;

    b) Thu hồi đất do vi phạm pháp luật về đất đai;

    c) Thu hồi đất do chấm dứt việc sử dụng đất theo pháp luật, tự nguyện trả lại đất, có nguy cơ đe dọa tính mạng con người.

    2. Nhà nước quyết định trưng dụng đất trong trường hợp thật cần thiết để thực hiện nhiệm vụ quốc phòng, an ninh hoặc trong
    tình trạng chiến tranh, tình trạng khẩn cấp, phòng, chống thiên tai.”'
  - '1. Gây phiền hà, sách nhiễu hoặc cản trở người đến khiếu nại, tố cáo, kiến nghị, phản ánh.

    2. Thiếu trách nhiệm trong việc tiếp công dân; làm mất hoặc làm sai lệch thông tin, tài liệu do người khiếu nại, tố cáo,
    kiến nghị, phản ánh cung cấp.

    3. Phân biệt đối xử trong khi tiếp công dân.

    4. Lợi dụng quyền khiếu nại, tố cáo, kiến nghị, phản ánh để gây rối trật tự công cộng.

    5. Xuyên tạc, vu khống, gây thiệt hại cho cơ quan, tổ chức, đơn vị, cá nhân.

    6. Đe dọa, xúc phạm cơ quan, tổ chức, đơn vị, người tiếp công dân, người thi hành công vụ.

    7. Kích động, cưỡng ép, dụ dỗ, lôi kéo, mua chuộc người khác tập trung đông người tại nơi tiếp công dân.

    8. Vi phạm các quy định khác trong nội quy, quy chế tiếp công dân.1. Khi tiếp công dân, người tiếp công dân phải bảo đảm
    trang phục chỉnh tề, có đeo thẻ công chức, viên chức hoặc phù hiệu theo quy định.

    2. Yêu cầu người đến khiếu nại, tố cáo, kiến nghị, phản ánh nêu rõ họ tên, địa chỉ hoặc xuất trình giấy tờ tùy thân, giấy
    ủy quyền (nếu có); có đơn hoặc trình bày rõ ràng nội dung khiếu nại, tố cáo, kiến nghị, phản ánh; cung cấp thông tin,
    tài liệu cần thiết cho việc tiếp nhận, thụ lý vụ việc.

    3. Có thái độ đứng mực, tôn trọng công dân, lắng nghe, tiếp nhận đơn khiếu nại, tố cáo, kiến nghị, phản ánh hoặc ghi chép
    đầy đủ, chính xác nội dung mà người đến khiếu nại, tố cáo, kiến nghị, phản ánh trình bày.

    4. Giải thích, hướng dẫn cho người đến khiếu nại, tố cáo, kiến nghị, phản ánh chấp hành chủ trương, đường lối, chính sách,
    pháp luật, kết luận, quyết định giải quyết đã có hiệu lực pháp luật của cơ quan có thẩm quyền; hướng dẫn người khiếu nại,
    tố cáo, kiến nghị, phản ánh đến đúng cơ quan hoặc người có thẩm quyền giải quyết.

    5. Trực tiếp xử lý hoặc phân loại, chuyển đơn, trình người có thẩm quyền xử lý khiếu nại, tố cáo, kiến nghị, phản ánh;
    thông báo kết quả xử lý khiếu nại, tố cáo, kiến nghị, phản ánh cho công dân.

    6. Yêu cầu người vi phạm nội quy nơi tiếp công dân chấm dứt hành vi vi phạm; trong trường hợp cần thiết, lập biên bản
    về việc vi phạm và yêu cầu cơ quan chức năng xử lý theo quy định của pháp luật.'
- source_sentence: Người vợ thường xuyên bị chồng hành hung, đánh đập có thể được trợ giúp pháp lý khi tiến hành khởi kiện
    người chồng không?
  sentences:
  - 'Các yêu cầu cơ bản

    ...

    5.7 Yêu cầu về ngăn nước trong hố khoan (cách ly các tầng nước)

    ...

    5.7.2 Đối với hố khoan máy

    1) Trong điều kiện bình thường thì biện pháp ngăn nước trong hố khoan máy là ngăn nước bằng ống chống (đáy ống nằm trong
    vữa xi măng đặc) hoặc bằng bộ nút chuyên dụng. Trong điều kiện phức tạp như ngăn cách ly hai tầng chứa nước hoặc ngăn
    chống nước áp lực phun lên thì phải có thiết kế cho từng trường hợp cụ thể.

    2) Trước khi tiến hành ngăn nước trong hố khoan, phải xác định chính xác độ sâu của đoạn cần ngăn nước, đặc điểm địa tầng
    phía trên, phía dưới bộ nút ngăn, mực nước ngầm trong hố khoan để có biện pháp ngăn nước thích hợp. Các số liệu thu thập
    và diễn biến trong quá trình ngăn nước phải được ghi tỉ mỉ trong nhật ký khoan máy (tham khảo điều C.1.1, Phụ lục C).

    3) Kiểm tra chất lượng ngăn nước trong hố khoan theo các bước sau:

    - Khoan qua cột đá xi măng chân ống chống hoặc đoạn nút ngăn nước bằng vữa xi măng;

    - Đổ thêm hoặc hút bớt nước trong hố khoan để nâng cao hoặc hạ thấp mực nước trong hố khoan một khoảng bằng 1/3 cột nước
    có trong hố khoan trước khi tiến hành ngăn nước, để nước hồi phục dần đến ổn định;

    - Đo mức độ thay đổi của mực nước trong hố khoan trước và sau khi ngăn nước;

    4) Nếu mức độ thay đổi mực nước giữa 3 lần đo liên tiếp nhỏ hơn 1 cm thì việc ngăn nước đạt yêu cầu. Nếu kết quả ngăn
    nước chưa đạt yêu cầu thì phải tiến hành ngăn nước lại.

    ...'
  - 'Nguyên tắc và cách thức làm việc của Hội đồng:

    1. Hội đồng làm việc theo nguyên tắc tư vấn.

    2. Ý kiến tư vấn của Hội đồng được thảo luận tập thể và do chủ tọa cuộc họp kết luận. Người chủ tọa và kết luận tại cuộc
    họp Hội đồng là Chủ tịch Hội đồng hoặc Phó Chủ tịch được Chủ tịch Hội đồng ủy quyền.

    3. Những vấn đề quan trọng về tài chính, tiền tệ quốc gia có thể tác động lớn đến quốc phòng, an ninh và kinh tế - xã
    hội thì thành phần mời họp Hội đồng do Thường trực Hội đồng đề xuất và Chủ tịch Hội đồng quyết định.

    4. Đối với những đề án lớn, phức tạp, Hội đồng tổ chức việc tham khảo ý kiến các chuyên gia, các doanh nhân, các nhà khoa
    học,... trước khi đưa ra Hội đồng họp thảo luận.

    5. Hội đồng họp định kỳ mỗi quý một lần vào tháng cuối quý. Trường hợp cần thiết theo yêu cầu của Thủ tướng Chính phủ
    hoặc Chủ tịch Hội đồng, Hội đồng sẽ tiến hành họp đột xuất. Ngoài việc tổ chức thảo luận tập trung để các thành viên cho
    ý kiến trực tiếp tại các cuộc họp Hội đồng, Hội đồng có thể lấy ý kiến tham gia của thành viên bằng văn bản.'
  - 'Lĩnh vực, hình thức trợ giúp pháp lý

    1. Trợ giúp pháp lý được thực hiện trong các lĩnh vực pháp luật, trừ lĩnh vực kinh doanh, thương mại.

    2. Các hình thức trợ giúp pháp lý bao gồm:

    a) Tham gia tố tụng;

    b) Tư vấn pháp luật;

    c) Đại diện ngoài tố tụng.Người được trợ giúp pháp lý

    1. Người có công với cách mạng.

    2. Người thuộc hộ nghèo.

    3. Trẻ em.

    4. Người dân tộc thiểu số cư trú ở vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn.

    5. Người bị buộc tội từ đủ 16 tuổi đến dưới 18 tuổi.

    6. Người bị buộc tội thuộc hộ cận nghèo.

    7. Người thuộc một trong các trường hợp sau đây có khó khăn về tài chính:

    a) Cha đẻ, mẹ đẻ, vợ, chồng, con của liệt sĩ và người có công nuôi dưỡng khi liệt sĩ còn nhỏ;

    b) Người nhiễm chất độc da cam;

    c) Người cao tuổi;

    d) Người khuyết tật;

    đ) Người từ đủ 16 tuổi đến dưới 18 tuổi là bị hại trong vụ án hình sự;

    e) Nạn nhân trong vụ việc bạo lực gia đình;

    g) Nạn nhân của hành vi mua bán người theo quy định của Luật Phòng, chống mua bán người;

    h) Người nhiễm HIV.

    ….'
- source_sentence: Ai phải nộp phí dịch vụ duy trì hệ thống kiểm tra trạng thái chứng thư số?
  sentences:
  - '"1. Những người được bảo vệ gồm:

    a) Người tố giác tội phạm;

    b) Người làm chứng;

    c) Bị hại;

    d) Người thân thích của người tố giác tội phạm, người làm chứng, bị hại.

    2. Người được bảo vệ có quyền:

    a) Đề nghị được bảo vệ;

    b) Được thông báo, giải thích về quyền và nghĩa vụ;

    c) Được biết về việc áp dụng biện pháp bảo vệ; đề nghị thay đổi, bổ sung, hủy bỏ biện pháp bảo vệ;

    d) Được bồi thường thiệt hại, khôi phục danh dự, bảo đảm các quyền và lợi ích hợp pháp trong thời gian bảo vệ.

    3. Người được bảo vệ có nghĩa vụ:

    a) Chấp hành nghiêm chỉnh các yêu cầu của cơ quan bảo vệ liên quan đến việc bảo vệ;

    b) Giữ bí mật thông tin bảo vệ;

    c) Thông báo kịp thời đến cơ quan có trách nhiệm bảo vệ về những vấn đề nghi vấn trong thời gian được bảo vệ."'
  - 'Mạng nội bộ và Internet

    1. Có biện pháp phát hiện và phòng chống xâm nhập, phòng chống phát tán mã độc hại trên mạng nội bộ và Internet.

    2. Có biện pháp phòng chống tấn công từ chối dịch vụ từ bên trong mạng nội bộ và bên ngoài Internet.

    3. Yêu cầu có các biện pháp xác thực đảm bảo an toàn đối với các kết nối không dây.

    4. Có biện pháp phân tách các phân vùng mạng để đảm bảo kiểm soát được các truy cập hệ thống thông tin và đảm bảo truy
    cập hiệu quả đối với các dữ liệu cần truy cập nhanh chóng.

    5. Xác định, xây dựng và triển khai các phương án dự phòng cho các vị trí có mức độ ảnh hưởng cao tới hoạt động của hệ
    thống mạng hoặc có khả năng làm tê liệt hệ thống mạng của đơn vị khi xảy ra sự cố.

    6. Xác định và đảm bảo nhu cầu băng thông của mạng nội bộ và Internet.

    7. Thường xuyên cập nhật các bản vá lỗi hệ thống, cập nhật cấu hình cho các thiết bị mạng và các thiết bị bảo mật.

    8. Bảo đảm chất lượng và đầy đủ các trang thiết bị mạng, an ninh, bảo mật, phần mềm chống virus, công cụ phân tích, quản
    trị mạng được cài đặt trong mạng của đơn vị.'
  - 'Người nộp phí

    Người nộp phí dịch vụ duy trì hệ thống kiểm tra trạng thái chứng thư số là doanh nghiệp được cấp giấy phép cung cấp dịch
    vụ chứng thực chữ ký số cho tổ chức, doanh nghiệp sử dụng theo quy định của pháp luật.Nghĩa vụ của tổ chức cung cấp dịch
    vụ chứng thực chữ ký số công cộng đối với cơ quan quản lý nhà nước về chữ ký số và dịch vụ chứng thực chữ ký số

    ...

    5. Nộp phí dịch vụ duy trì hệ thống kiểm tra trạng thái chứng thư số theo quy định.

    6. Báo cáo định kỳ và đột xuất theo quy định của Bộ Thông tin và Truyền thông và yêu cầu của các cơ quan nhà nước có thẩm
    quyền.'
- source_sentence: Có được sử dụng trẻ em trong việc mua bán thuốc lá?
  sentences:
  - '"1. Sản xuất, mua bán, nhập khẩu, tàng trữ, vận chuyển thuốc lá giả, sản phẩm được thiết kế có hình thức hoặc kiểu dáng
    như bao, gói hoặc điếu thuốc lá; mua bán, tàng trữ, vận chuyển nguyên liệu thuốc lá, thuốc lá nhập lậu.

    2. Quảng cáo, khuyến mại thuốc lá; tiếp thị thuốc lá trực tiếp tới người tiêu dùng dưới mọi hình thức.

    3. Tài trợ của tổ chức, cá nhân kinh doanh thuốc lá, trừ trường hợp quy định tại Điều 16 của Luật này.

    4. Người chưa đủ 18 tuổi sử dụng, mua, bán thuốc lá.

    5. Sử dụng người chưa đủ 18 tuổi mua, bán thuốc lá.

    6. Bán, cung cấp thuốc lá cho người chưa đủ 18 tuổi.

    7. Bán thuốc lá bằng máy bán thuốc lá tự động; hút, bán thuốc lá tại địa điểm có quy định cấm.

    8. Sử dụng hình ảnh thuốc lá trên báo chí, xuất bản phẩm dành riêng cho trẻ em.

    9. Vận động, ép buộc người khác sử dụng thuốc lá."'
  - 'Trường hợp sử dụng đất được cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất

    1. Nhà nước cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất cho những trường
    hợp sau đây:

    a) Người đang sử dụng đất có đủ điều kiện cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn
    liền với đất theo quy định tại các điều 100, 101 và 102 của Luật này;

    b) Người được Nhà nước giao đất, cho thuê đất từ sau ngày Luật này có hiệu lực thi hành;

    c) Người được chuyển đổi, nhận chuyển nhượng, được thừa kế, nhận tặng cho quyền sử dụng đất, nhận góp vốn bằng quyền sử
    dụng đất; người nhận quyền sử dụng đất khi xử lý hợp đồng thế chấp bằng quyền sử dụng đất để thu hồi nợ;

    d) Người được sử dụng đất theo kết quả hòa giải thành đối với tranh chấp đất đai; theo bản án hoặc quyết định của Tòa
    án nhân dân, quyết định thi hành án của cơ quan thi hành án hoặc quyết định giải quyết tranh chấp, khiếu nại, tố cáo về
    đất đai của cơ quan nhà nước có thẩm quyền đã được thi hành;

    đ) Người trúng đấu giá quyền sử dụng đất;

    e) Người sử dụng đất trong khu công nghiệp, cụm công nghiệp, khu chế xuất, khu công nghệ cao, khu kinh tế;

    g) Người mua nhà ở, tài sản khác gắn liền với đất;

    h) Người được Nhà nước thanh lý, hóa giá nhà ở gắn liền với đất ở; người mua nhà ở thuộc sở hữu nhà nước;

    i) Người sử dụng đất tách thửa, hợp thửa; nhóm người sử dụng đất hoặc các thành viên hộ gia đình, hai vợ chồng, tổ chức
    sử dụng đất chia tách, hợp nhất quyền sử dụng đất hiện có;

    k) Người sử dụng đất đề nghị cấp đổi hoặc cấp lại Giấy chứng nhận bị mất.

    ..."'
  - 'Quản lý dân cư

    1. Dân cư trên địa bàn Thủ đô được quản lý với quy mô, mật độ, cơ cấu theo Quy hoạch chung xây dựng Thủ đô.

    2. Hội đồng nhân dân thành phố Hà Nội ban hành chính sách ưu tiên đầu tư và huy động các nguồn lực đầu tư xây dựng các
    khu đô thị, nhà ở, hệ thống hạ tầng kỹ thuật, hạ tầng xã hội đồng bộ, hiện đại, thuận tiện ở ngoại thành; phối hợp với
    các tỉnh, thành phố trực thuộc trung ương trong Vùng Thủ đô phát triển kinh tế - xã hội và giải quyết việc làm nhằm hạn
    chế tình trạng di dân tự phát vào nội thành.3. Việc đăng ký thường trú ở ngoại thành được thực hiện theo quy định của
    pháp luật về cư trú.

    4. Công dân thuộc một trong các trường hợp sau đây thì được đăng ký thường trú ở nội thành:

    a) Các trường hợp quy định tại các khoản 2, 3 và 4 Điều 20 của Luật cư trú;

    b) Các trường hợp không thuộc điểm a khoản này đã tạm trú liên tục tại nội thành từ 3 năm trở lên, có nhà ở thuộc sở hữu
    của mình hoặc nhà thuê ở nội thành của tổ chức, cá nhân có đăng ký kinh doanh nhà ở; đối với nhà thuê phải bảo đảm điều
    kiện về diện tích bình quân theo quy định của Hội đồng nhân dân thành phố Hà Nội và được sự đồng ý bằng văn bản của tổ
    chức, cá nhân có nhà cho thuê cho đăng ký thường trú vào nhà thuê.'
- source_sentence: Kiểm định viên chính kỹ thuật an toàn lao động phải đáp ứng những tiêu chuẩn gì về trình độ đào tạo?
  sentences:
  - 'Quyền và nghĩa vụ của người trúng đấu giá biển số xe ô tô; người nhận chuyển nhượng, trao đổi, được tặng cho, thừa kế
    xe ô tô gắn biển số trúng đấu giá

    ...

    2. Nghĩa vụ của người trúng đấu giá biển số xe ô tô bao gồm:

    ...

    c) Không được chuyển nhượng, trao đổi, tặng cho, để thừa kế biển số xe ô tô trúng đấu giá, trừ trường hợp chuyển nhượng,
    trao đổi, tặng cho, để thừa kế xe ô tô gắn biển số trúng đấu giá.Thủ tục đăng ký xe

    ...

    3. Trường hợp chuyển quyền sở hữu xe kèm theo biển số xe trúng đấu giá

    a) Chủ xe nộp hồ sơ và làm thủ tục thu hồi theo quy định tại khoản 1 Điều 14, khoản 1 Điều 15 Thông tư này, chủ xe không
    phải nộp lại biển số xe trúng đấu giá nhưng phải nộp bản sao chứng từ chuyển quyền sở hữu xe và xuất trình bản chính để
    đối chiếu (chứng từ chuyển quyền sở hữu phải thể hiện rõ nội dung chuyển quyền sở hữu xe kèm theo biển số trúng đấu giá);

    b) Tổ chức, cá nhân nhận chuyển quyền sở hữu xe nộp hồ sơ và làm thủ tục đăng ký sang tên xe theo quy định tại khoản 2
    Điều 14, khoản 2 Điều 15 Thông tư này và được đăng ký, giữ nguyên biển số xe trúng đấu giá (chứng từ chuyển quyền sở hữu
    phải thể hiện rõ nội dung chuyển quyền sở hữu xe kèm theo biển số trúng đấu giá).

    Tổ chức, cá nhân đã nhận chuyển quyền sở hữu xe kèm theo biển số xe trúng đấu giá, không được tiếp tục chuyển quyền sở
    hữu xe kèm theo biển số xe trúng đấu giá cho tổ chức, cá nhân khác; được chuyển quyền sở hữu xe theo quy định của pháp
    luật.'
  - 'Đề xuất sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện và điều kiện đầu tư kinh doanh

    1. Căn cứ điều kiện phát triển kinh tế - xã hội, yêu cầu quản lý nhà nước trong từng thời kỳ và điều ước quốc tế về đầu
    tư, bộ, cơ quan ngang bộ trình Chính phủ đề xuất sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều
    kiện đầu tư kinh doanh.

    2. Việc đề xuất sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu tư kinh doanh được thực
    hiện trong Đề nghị xây dựng văn bản quy phạm pháp luật theo quy định của Luật Ban hành văn bản quy phạm pháp luật, trong
    đó có những nội dung sau đây:

    a) Ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu tư kinh doanh dự kiến sửa đổi, bổ sung;

    b) Phân tích sự cần thiết, mục đích của việc sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện
    đầu tư kinh doanh phù hợp với quy định tại khoản 1 Điều 7 Luật Đầu tư;

    c) Căn cứ sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu tư kinh doanh và đối tượng phải
    tuân thủ;

    d) Đánh giá tính hợp lý, khả thi của việc sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu
    tư kinh doanh và sự phù hợp với điều ước quốc tế về đầu tư;

    đ) Đánh giá tác động của việc sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu tư kinh doanh
    đối với công tác quản lý nhà nước và hoạt động đầu tư kinh doanh của các đối tượng phải tuân thủ.'
  - 'Kiểm định viên chính kỹ thuật an toàn lao động - Mã số: V.09.03.01

    ...

    2. Tiêu chuẩn về trình độ đào tạo, bồi dưỡng:

    a) Có bằng tốt nghiệp đại học trở lên thuộc các chuyên ngành kỹ thuật phù hợp với phạm vi thực hiện kiểm định;

    b) Có chứng chỉ bồi dưỡng chức danh nghề nghiệp viên chức chuyên ngành kiểm định kỹ thuật an toàn lao động hoặc chứng
    chỉ kiểm định viên kiểm định kỹ thuật an toàn lao động.

    3. Tiêu chuẩn về năng lực chuyên môn, nghiệp vụ:

    a) Có năng lực chủ trì tổ chức, triển khai các hoạt động nghiệp vụ kiểm định kỹ thuật an toàn lao động và đề xuất giải
    pháp nâng cao hiệu quả triển khai thực hiện các hoạt động thuộc lĩnh vực kiểm định;

    b) Có năng lực tổ chức phối hợp với các tổ chức, cá nhân có liên quan khác trong quá trình thực hiện nhiệm vụ về hoạt
    động kiểm định kỹ thuật an toàn lao động;

    c) Có khả năng hướng dẫn nghiệp vụ về lĩnh vực kiểm định kỹ thuật an toàn lao động phù hợp với chuyên ngành được đào tạo;

    d) Đã chủ trì 01 nhiệm vụ khoa học và công nghệ cấp bộ, cấp tỉnh ở mức đạt trở lên liên quan đến lĩnh vực kiểm định kỹ
    thuật an toàn lao động hoặc tham gia ít nhất 02 nhiệm vụ khoa học và công nghệ cấp bộ, cấp tỉnh được nghiệm thu ở mức
    đạt trở lên liên quan đến lĩnh vực kiểm định;

    đ) Có khả năng ứng dụng công nghệ thông tin trong thực hiện các nhiệm vụ của kiểm định viên chính kỹ thuật an toàn lao
    động và có khả năng sử dụng ngoại ngữ trong một số nhiệm vụ cụ thể được giao.

    4. Yêu cầu về thời gian công tác tối thiểu đối với viên chức dự thi hoặc xét thăng hạng chức danh Kiểm định viên chính
    kỹ thuật an toàn lao động: Có thời gian công tác giữ chức danh Kiểm định viên kỹ thuật an toàn lao động hoặc tương đương
    từ đủ 09 năm trở lên (không kể thời gian tập sự, thử việc). Trường hợp có thời gian giữ chức danh nghề nghiệp tương đương
    thì phải có ít nhất 01 năm (đủ 12 tháng) giữ chức danh Kiểm định viên kỹ thuật an toàn lao động tính đến ngày hết thời
    hạn nộp hồ sơ đăng ký dự thi hoặc xét thăng hạng.'
