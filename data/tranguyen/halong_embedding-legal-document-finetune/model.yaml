      3. Trường hợp chuyển quyền sở hữu xe kèm theo biển số xe trúng đấu giá

      a) Chủ xe nộp hồ sơ và làm thủ tục thu hồi theo quy định tại khoản 1 Điều 14, khoản 1 Điều 15 Thông tư này, chủ xe không
      phải nộp lại biển số xe trúng đấu giá nhưng phải nộp bản sao chứng từ chuyển quyền sở hữu xe và xuất trình bản chính
      để đối chiếu (chứng từ chuyển quyền sở hữu phải thể hiện rõ nội dung chuyển quyền sở hữu xe kèm theo biển số trúng đấu
      giá);

      b) Tổ chức, cá nhân nhận chuyển quyền sở hữu xe nộp hồ sơ và làm thủ tục đăng ký sang tên xe theo quy định tại khoản
      2 Điều 14, khoản 2 Điều 15 Thông tư này và được đăng ký, giữ nguyên biển số xe trúng đấu giá (chứng từ chuyển quyền
      sở hữu phải thể hiện rõ nội dung chuyển quyền sở hữu xe kèm theo biển số trúng đấu giá).

      Tổ chức, cá nhân đã nhận chuyển quyền sở hữu xe kèm theo biển số xe trúng đấu giá, không được tiếp tục chuyển quyền
      sở hữu xe kèm theo biển số xe trúng đấu giá cho tổ chức, cá nhân khác; được chuyển quyền sở hữu xe theo quy định của
      pháp luật.'
    - 'Đề xuất sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện và điều kiện đầu tư kinh doanh

      1. Căn cứ điều kiện phát triển kinh tế - xã hội, yêu cầu quản lý nhà nước trong từng thời kỳ và điều ước quốc tế về
      đầu tư, bộ, cơ quan ngang bộ trình Chính phủ đề xuất sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc
      điều kiện đầu tư kinh doanh.

      2. Việc đề xuất sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu tư kinh doanh được thực
      hiện trong Đề nghị xây dựng văn bản quy phạm pháp luật theo quy định của Luật Ban hành văn bản quy phạm pháp luật, trong
      đó có những nội dung sau đây:

      a) Ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu tư kinh doanh dự kiến sửa đổi, bổ sung;

      b) Phân tích sự cần thiết, mục đích của việc sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện
      đầu tư kinh doanh phù hợp với quy định tại khoản 1 Điều 7 Luật Đầu tư;

      c) Căn cứ sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu tư kinh doanh và đối tượng
      phải tuân thủ;

      d) Đánh giá tính hợp lý, khả thi của việc sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện
      đầu tư kinh doanh và sự phù hợp với điều ước quốc tế về đầu tư;

      đ) Đánh giá tác động của việc sửa đổi, bổ sung ngành, nghề đầu tư kinh doanh có điều kiện hoặc điều kiện đầu tư kinh
      doanh đối với công tác quản lý nhà nước và hoạt động đầu tư kinh doanh của các đối tượng phải tuân thủ.'
    - 'Kiểm định viên chính kỹ thuật an toàn lao động - Mã số: V.09.03.01

      ...

      2. Tiêu chuẩn về trình độ đào tạo, bồi dưỡng:

      a) Có bằng tốt nghiệp đại học trở lên thuộc các chuyên ngành kỹ thuật phù hợp với phạm vi thực hiện kiểm định;

      b) Có chứng chỉ bồi dưỡng chức danh nghề nghiệp viên chức chuyên ngành kiểm định kỹ thuật an toàn lao động hoặc chứng
      chỉ kiểm định viên kiểm định kỹ thuật an toàn lao động.

      3. Tiêu chuẩn về năng lực chuyên môn, nghiệp vụ:

      a) Có năng lực chủ trì tổ chức, triển khai các hoạt động nghiệp vụ kiểm định kỹ thuật an toàn lao động và đề xuất giải
      pháp nâng cao hiệu quả triển khai thực hiện các hoạt động thuộc lĩnh vực kiểm định;

      b) Có năng lực tổ chức phối hợp với các tổ chức, cá nhân có liên quan khác trong quá trình thực hiện nhiệm vụ về hoạt
      động kiểm định kỹ thuật an toàn lao động;

      c) Có khả năng hướng dẫn nghiệp vụ về lĩnh vực kiểm định kỹ thuật an toàn lao động phù hợp với chuyên ngành được đào
      tạo;

      d) Đã chủ trì 01 nhiệm vụ khoa học và công nghệ cấp bộ, cấp tỉnh ở mức đạt trở lên liên quan đến lĩnh vực kiểm định
      kỹ thuật an toàn lao động hoặc tham gia ít nhất 02 nhiệm vụ khoa học và công nghệ cấp bộ, cấp tỉnh được nghiệm thu ở
      mức đạt trở lên liên quan đến lĩnh vực kiểm định;

      đ) Có khả năng ứng dụng công nghệ thông tin trong thực hiện các nhiệm vụ của kiểm định viên chính kỹ thuật an toàn lao
      động và có khả năng sử dụng ngoại ngữ trong một số nhiệm vụ cụ thể được giao.

      4. Yêu cầu về thời gian công tác tối thiểu đối với viên chức dự thi hoặc xét thăng hạng chức danh Kiểm định viên chính
      kỹ thuật an toàn lao động: Có thời gian công tác giữ chức danh Kiểm định viên kỹ thuật an toàn lao động hoặc tương đương
      từ đủ 09 năm trở lên (không kể thời gian tập sự, thử việc). Trường hợp có thời gian giữ chức danh nghề nghiệp tương
      đương thì phải có ít nhất 01 năm (đủ 12 tháng) giữ chức danh Kiểm định viên kỹ thuật an toàn lao động tính đến ngày
      hết thời hạn nộp hồ sơ đăng ký dự thi hoặc xét thăng hạng.'
