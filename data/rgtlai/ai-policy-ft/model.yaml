    \ understandable in plain language, and give you agency over data collection \nand the specific context of use; current\
    \ hard-to-understand no­\ntice-and-choice practices for broad uses of data should be changed. Enhanced \nprotections and\
    \ restrictions for data and inferences related to sensitive do­\nmains, including health, work, education, criminal justice,\
    \ and finance, and \nfor data pertaining to youth should put you first. In sensitive domains, your \ndata and related\
    \ inferences should only be used for necessary functions, and \nyou should be protected by ethical review and use prohibitions.\
