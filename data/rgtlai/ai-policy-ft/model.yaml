  sentences:
  - " \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n  \n \n \n \n \nHOW THESE PRINCIPLES CAN MOVE INTO PRACTICE\n\
    Real-life examples of how these principles can become reality, through laws, policies, and practical \ntechnical and sociotechnical\
    \ approaches to protecting rights, opportunities, and access. \nThe federal government is working to combat discrimination\
    \ in mortgage lending. The Depart­\nment of Justice has launched a nationwide initiative to combat redlining, which includes\
    \ reviewing how \nlenders who may be avoiding serving communities of color are conducting targeted marketing and advertising.51\
    \ \nThis initiative will draw upon strong partnerships across federal agencies, including the Consumer Financial \nProtection\
    \ Bureau and prudential regulators. The Action Plan to Advance Property Appraisal and Valuation \nEquity includes a commitment\
    \ from the agencies that oversee mortgage lending to include a \nnondiscrimination standard in the proposed rules for\
    \ Automated Valuation Models.52\nThe Equal Employment Opportunity Commission and the Department of Justice have clearly\
    \ \nlaid out how employers’ use of AI and other automated systems can result in \ndiscrimination against job applicants\
    \ and employees with disabilities.53 The documents explain \nhow employers’ use of software that relies on algorithmic\
    \ decision-making may violate existing requirements \nunder Title I of the Americans with Disabilities Act (“ADA”). This\
    \ technical assistance also provides practical \ntips to employers on how to comply with the ADA, and to job applicants\
    \ and employees who think that their \nrights may have been violated. \nDisparity assessments identified harms to Black\
    \ patients' healthcare access. A widely \nused healthcare algorithm relied on the cost of each patient’s past medical\
    \ care to predict future medical needs, \nrecommending early interventions for the patients deemed most at risk. This\
    \ process discriminated \nagainst Black patients, who generally have less access to medical care and therefore have generated\
    \ less cost \nthan white patients with similar illness and need. A landmark study documented this pattern and proposed\
    \ \npractical ways that were shown to reduce this bias, such as focusing specifically on active chronic health \nconditions\
    \ or avoidable future costs related to emergency visits and hospitalization.54 \nLarge employers have developed best practices\
    \ to scrutinize the data and models used \nfor hiring. An industry initiative has developed Algorithmic Bias Safeguards\
    \ for the Workforce, a structured \nquestionnaire that businesses can use proactively when procuring software to evaluate\
    \ workers. It covers \nspecific technical questions such as the training data used, model training process, biases identified,\
    \ and \nmitigation steps employed.55 \nStandards organizations have developed guidelines to incorporate accessibility\
    \ criteria \ninto technology design processes. The most prevalent in the United States is the Access Board’s Section \n\
    508 regulations,56 which are the technical standards for federal information communication technology (software, \nhardware,\
    \ and web). Other standards include those issued by the International Organization for \nStandardization,57 and the World\
    \ Wide Web Consortium Web Content Accessibility Guidelines,58 a globally \nrecognized voluntary consensus standard for\
    \ web content and other information and communications \ntechnology. \nNIST has released Special Publication 1270, Towards\
    \ a Standard for Identifying and Managing Bias \nin Artificial Intelligence.59 The special publication: describes the\
    \ stakes and challenges of bias in artificial \nintelligence and provides examples of how and why it can chip away at\
    \ public trust; identifies three categories \nof bias in AI – systemic, statistical, and human – and describes how and\
    \ where they contribute to harms; and \ndescribes three broad challenges for mitigating bias – datasets, testing and evaluation,\
    \ and human factors – and \nintroduces preliminary guidance for addressing them. Throughout, the special publication takes\
    \ a socio-\ntechnical perspective to identifying and managing AI bias. \n29\nAlgorithmic \nDiscrimination \nProtections\
    \ \n"
