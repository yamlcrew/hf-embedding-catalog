  - source_sentence: How does the document address algorithmic discrimination protections?
    sentences:
    - " \n \n \n \n \n \n \n \n \n \n \n \nSAFE AND EFFECTIVE \nSYSTEMS \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe\
      \ expectations for automated systems are meant to serve as a blueprint for the development of additional \ntechnical\
      \ standards and practices that are tailored for particular sectors and contexts. \nOngoing monitoring. Automated systems\
      \ should have ongoing monitoring procedures, including recalibra­\ntion procedures, in place to ensure that their performance\
      \ does not fall below an acceptable level over time, \nbased on changing real-world conditions or deployment contexts,\
      \ post-deployment modification, or unexpect­\ned conditions. This ongoing monitoring should include continuous evaluation\
      \ of performance metrics and \nharm assessments, updates of any systems, and retraining of any machine learning models\
      \ as necessary, as well \nas ensuring that fallback mechanisms are in place to allow reversion to a previously working\
      \ system. Monitor­\ning should take into account the performance of both technical system components (the algorithm\
      \ as well as \nany hardware components, data inputs, etc.) and human operators. It should include mechanisms for testing\
      \ \nthe actual accuracy of any predictions or recommendations generated by a system, not just a human operator’s \n\
      determination of their accuracy. Ongoing monitoring procedures should include manual, human-led monitor­\ning as a check\
      \ in the event there are shortcomings in automated monitoring systems. These monitoring proce­\ndures should be in place\
      \ for the lifespan of the deployed automated system. \nClear organizational oversight. Entities responsible for the\
      \ development or use of automated systems \nshould lay out clear governance structures and procedures.  This includes\
      \ clearly-stated governance proce­\ndures before deploying the system, as well as responsibility of specific individuals\
      \ or entities to oversee ongoing \nassessment and mitigation. Organizational stakeholders including those with oversight\
      \ of the business process \nor operation being automated, as well as other organizational divisions that may be affected\
      \ due to the use of \nthe system, should be involved in establishing governance procedures. Responsibility should rest\
      \ high enough \nin the organization that decisions about resources, mitigation, incident response, and potential rollback\
      \ can be \nmade promptly, with sufficient weight given to risk mitigation objectives against competing concerns. Those\
      \ \nholding this responsibility should be made aware of any use cases with the potential for meaningful impact on \n\
      people’s rights, opportunities, or access as determined based on risk identification procedures.  In some cases, \n\
      it may be appropriate for an independent ethics review to be conducted before deployment. \nAvoid inappropriate, low-quality,\
      \ or irrelevant data use and the compounded harm of its \nreuse \nRelevant and high-quality data. Data used as part\
      \ of any automated system’s creation, evaluation, or \ndeployment should be relevant, of high quality, and tailored\
      \ to the task at hand. Relevancy should be \nestablished based on research-backed demonstration of the causal influence\
      \ of the data to the specific use case \nor justified more generally based on a reasonable expectation of usefulness\
      \ in the domain and/or for the \nsystem design or ongoing development. Relevance of data should not be established solely\
      \ by appealing to \nits historical connection to the outcome. High quality and tailored data should be representative\
      \ of the task at \nhand and errors from data entry or other sources should be measured and limited. Any data used as\
      \ the target \nof a prediction process should receive particular attention to the quality and validity of the predicted\
      \ outcome \nor label to ensure the goal of the automated system is appropriately identified and measured. Additionally,\
      \ \njustification should be documented for each data attribute and source to explain why it is appropriate to use \n\
      that data to inform the results of the automated system and why such use will not violate any applicable laws. \nIn\
      \ cases of high-dimensional and/or derived attributes, such justifications can be provided as overall \ndescriptions\
      \ of the attribute generation process and appropriateness. \n19\n"
