  - source_sentence: How does the Blueprint for an AI Bill of Rights relate to existing laws and regulations regarding automated
      systems?
    sentences:
    - " \n \n \n \n \n \n \n \n \n \n \n \n \n \nAbout this Document \nThe Blueprint for an AI Bill of Rights: Making Automated\
      \ Systems Work for the American People was \npublished by the White House Office of Science and Technology Policy in\
      \ October 2022. This framework was \nreleased one year after OSTP announced the launch of a process to develop “a bill\
      \ of rights for an AI-powered \nworld.” Its release follows a year of public engagement to inform this initiative. The\
      \ framework is available \nonline at: https://www.whitehouse.gov/ostp/ai-bill-of-rights \nAbout the Office of Science\
      \ and Technology Policy \nThe Office of Science and Technology Policy (OSTP) was established by the National Science\
      \ and Technology \nPolicy, Organization, and Priorities Act of 1976 to provide the President and others within the Executive\
      \ Office \nof the President with advice on the scientific, engineering, and technological aspects of the economy, national\
      \ \nsecurity, health, foreign relations, the environment, and the technological recovery and use of resources, among\
      \ \nother topics. OSTP leads interagency science and technology policy coordination efforts, assists the Office of \n\
      Management and Budget (OMB) with an annual review and analysis of Federal research and development in \nbudgets, and\
      \ serves as a source of scientific and technological analysis and judgment for the President with \nrespect to major\
      \ policies, plans, and programs of the Federal Government. \nLegal Disclaimer \nThe Blueprint for an AI Bill of Rights:\
      \ Making Automated Systems Work for the American People is a white paper \npublished by the White House Office of Science\
      \ and Technology Policy. It is intended to support the \ndevelopment of policies and practices that protect civil rights\
      \ and promote democratic values in the building, \ndeployment, and governance of automated systems. \nThe Blueprint\
      \ for an AI Bill of Rights is non-binding and does not constitute U.S. government policy. It \ndoes not supersede, modify,\
      \ or direct an interpretation of any existing statute, regulation, policy, or \ninternational instrument. It does not\
      \ constitute binding guidance for the public or Federal agencies and \ntherefore does not require compliance with the\
      \ principles described herein. It also is not determinative of what \nthe U.S. government’s position will be in any\
      \ international negotiation. Adoption of these principles may not \nmeet the requirements of existing statutes, regulations,\
      \ policies, or international instruments, or the \nrequirements of the Federal agencies that enforce them. These principles\
      \ are not intended to, and do not, \nprohibit or limit any lawful activity of a government agency, including law enforcement,\
      \ national security, or \nintelligence activities. \nThe appropriate application of the principles set forth in this\
      \ white paper depends significantly on the \ncontext in which automated systems are being utilized. In some circumstances,\
      \ application of these principles \nin whole or in part may not be appropriate given the intended use of automated systems\
      \ to achieve government \nagency missions. Future sector-specific guidance will likely be necessary and important for\
      \ guiding the use of \nautomated systems in certain settings such as AI systems used as part of school building security\
      \ or automated \nhealth diagnostic systems. \nThe Blueprint for an AI Bill of Rights recognizes that law enforcement\
      \ activities require a balancing of \nequities, for example, between the protection of sensitive law enforcement information\
      \ and the principle of \nnotice; as such, notice may not be appropriate, or may need to be adjusted to protect sources,\
      \ methods, and \nother law enforcement equities. Even in contexts where these principles may not apply in whole or in\
      \ part, \nfederal departments and agencies remain subject to judicial, privacy, and civil liberties oversight as well\
      \ as \nexisting policies and safeguards that govern automated systems, including, for example, Executive Order 13960,\
      \ \nPromoting the Use of Trustworthy Artificial Intelligence in the Federal Government (December 2020). \nThis white\
      \ paper recognizes that national security (which includes certain law enforcement and \nhomeland security activities)\
      \ and defense activities are of increased sensitivity and interest to our nation’s \nadversaries and are often subject\
      \ to special requirements, such as those governing classified information and \nother protected data. Such activities\
      \ require alternative, compatible safeguards through existing policies that \ngovern automated systems and AI, such\
      \ as the Department of Defense (DOD) AI Ethical Principles and \nResponsible AI Implementation Pathway and the Intelligence\
      \ Community (IC) AI Ethics Principles and \nFramework. The implementation of these policies to national security and\
      \ defense activities can be informed by \nthe Blueprint for an AI Bill of Rights where feasible. \nThe Blueprint for\
      \ an AI Bill of Rights is not intended to, and does not, create any legal right, benefit, or \ndefense, substantive\
      \ or procedural, enforceable at law or in equity by any party against the United States, its \ndepartments, agencies,\
      \ or entities, its officers, employees, or agents, or any other person, nor does it constitute a \nwaiver of sovereign\
      \ immunity. \nCopyright Information \nThis document is a work of the United States Government and is in the public domain\
      \ (see 17 U.S.C. §105). \n2\n"
