    - " \n12 \nCSAM. Even when trained on “clean” data, increasingly capable GAI models can synthesize or produce \nsynthetic\
      \ NCII and CSAM. Websites, mobile apps, and custom-built models that generate synthetic NCII \nhave moved from niche\
      \ internet forums to mainstream, automated, and scaled online businesses.  \nTrustworthy AI Characteristics: Fair with\
      \ Harmful Bias Managed, Safe, Privacy Enhanced \n2.12. \nValue Chain and Component Integration \nGAI value chains involve\
      \ many third-party components such as procured datasets, pre-trained models, \nand software libraries. These components\
      \ might be improperly obtained or not properly vetted, leading \nto diminished transparency or accountability for downstream\
      \ users. While this is a risk for traditional AI \nsystems and some other digital technologies, the risk is exacerbated\
      \ for GAI due to the scale of the \ntraining data, which may be too large for humans to vet; the diﬃculty of training\
      \ foundation models, \nwhich leads to extensive reuse of limited numbers of models; and the extent to which GAI may\
      \ be \nintegrated into other devices and services. As GAI systems often involve many distinct third-party \ncomponents\
      \ and data sources, it may be diﬃcult to attribute issues in a system’s behavior to any one of \nthese sources. \nErrors\
      \ in third-party GAI components can also have downstream impacts on accuracy and robustness. \nFor example, test datasets\
      \ commonly used to benchmark or validate models can contain label errors. \nInaccuracies in these labels can impact\
      \ the “stability” or robustness of these benchmarks, which many \nGAI practitioners consider during the model selection\
      \ process.  \nTrustworthy AI Characteristics: Accountable and Transparent, Explainable and Interpretable, Fair with\
      \ \nHarmful Bias Managed, Privacy Enhanced, Safe, Secure and Resilient, Valid and Reliable \n3. \nSuggested Actions\
      \ to Manage GAI Risks \nThe following suggested actions target risks unique to or exacerbated by GAI. \nIn addition\
      \ to the suggested actions below, AI risk management activities and actions set forth in the AI \nRMF 1.0 and Playbook\
      \ are already applicable for managing GAI risks. Organizations are encouraged to \napply the activities suggested in\
      \ the AI RMF and its Playbook when managing the risk of GAI systems.  \nImplementation of the suggested actions will\
      \ vary depending on the type of risk, characteristics of GAI \nsystems, stage of the GAI lifecycle, and relevant AI\
      \ actors involved.  \nSuggested actions to manage GAI risks can be found in the tables below: \n• \nThe suggested actions\
      \ are organized by relevant AI RMF subcategories to streamline these \nactivities alongside implementation of the AI\
      \ RMF.  \n• \nNot every subcategory of the AI RMF is included in this document.13 Suggested actions are \nlisted for\
      \ only some subcategories.  \n \n \n13 As this document was focused on the GAI PWG eﬀorts and primary considerations\
      \ (see Appendix A), AI RMF \nsubcategories not addressed here may be added later.  \n"
