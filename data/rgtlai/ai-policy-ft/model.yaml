  - " \n12 \nCSAM. Even when trained on “clean” data, increasingly capable GAI models can synthesize or produce \nsynthetic\
    \ NCII and CSAM. Websites, mobile apps, and custom-built models that generate synthetic NCII \nhave moved from niche internet\
    \ forums to mainstream, automated, and scaled online businesses.  \nTrustworthy AI Characteristics: Fair with Harmful\
    \ Bias Managed, Safe, Privacy Enhanced \n2.12. \nValue Chain and Component Integration \nGAI value chains involve many\
    \ third-party components such as procured datasets, pre-trained models, \nand software libraries. These components might\
    \ be improperly obtained or not properly vetted, leading \nto diminished transparency or accountability for downstream\
    \ users. While this is a risk for traditional AI \nsystems and some other digital technologies, the risk is exacerbated\
    \ for GAI due to the scale of the \ntraining data, which may be too large for humans to vet; the diﬃculty of training\
    \ foundation models, \nwhich leads to extensive reuse of limited numbers of models; and the extent to which GAI may be\
    \ \nintegrated into other devices and services. As GAI systems often involve many distinct third-party \ncomponents and\
    \ data sources, it may be diﬃcult to attribute issues in a system’s behavior to any one of \nthese sources. \nErrors in\
    \ third-party GAI components can also have downstream impacts on accuracy and robustness. \nFor example, test datasets\
    \ commonly used to benchmark or validate models can contain label errors. \nInaccuracies in these labels can impact the\
    \ “stability” or robustness of these benchmarks, which many \nGAI practitioners consider during the model selection process.\
    \  \nTrustworthy AI Characteristics: Accountable and Transparent, Explainable and Interpretable, Fair with \nHarmful Bias\
    \ Managed, Privacy Enhanced, Safe, Secure and Resilient, Valid and Reliable \n3. \nSuggested Actions to Manage GAI Risks\
    \ \nThe following suggested actions target risks unique to or exacerbated by GAI. \nIn addition to the suggested actions\
    \ below, AI risk management activities and actions set forth in the AI \nRMF 1.0 and Playbook are already applicable for\
    \ managing GAI risks. Organizations are encouraged to \napply the activities suggested in the AI RMF and its Playbook\
    \ when managing the risk of GAI systems.  \nImplementation of the suggested actions will vary depending on the type of\
    \ risk, characteristics of GAI \nsystems, stage of the GAI lifecycle, and relevant AI actors involved.  \nSuggested actions\
    \ to manage GAI risks can be found in the tables below: \n• \nThe suggested actions are organized by relevant AI RMF subcategories\
    \ to streamline these \nactivities alongside implementation of the AI RMF.  \n• \nNot every subcategory of the AI RMF\
    \ is included in this document.13 Suggested actions are \nlisted for only some subcategories.  \n \n \n13 As this document\
    \ was focused on the GAI PWG eﬀorts and primary considerations (see Appendix A), AI RMF \nsubcategories not addressed\
    \ here may be added later.  \n"
- source_sentence: What proactive steps should be taken during the design phase of automated systems to assess equity and
    prevent algorithmic discrimination?
  sentences:
  - " \n \n \n \n \n \n \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe expectations for automated systems are meant to\
    \ serve as a blueprint for the development of additional \ntechnical standards and practices that are tailored for particular\
    \ sectors and contexts. \nAny automated system should be tested to help ensure it is free from algorithmic discrimination\
    \ before it can be \nsold or used. Protection against algorithmic discrimination should include designing to ensure equity,\
    \ broadly \nconstrued.  Some algorithmic discrimination is already prohibited under existing anti-discrimination law.\
    \ The \nexpectations set out below describe proactive technical and policy steps that can be taken to not only \nreinforce\
    \ those legal protections but extend beyond them to ensure equity for underserved communities48 \neven in circumstances\
    \ where a specific legal protection may not be clearly established. These protections \nshould be instituted throughout\
    \ the design, development, and deployment process and are described below \nroughly in the order in which they would be\
    \ instituted. \nProtect the public from algorithmic discrimination in a proactive and ongoing manner \nProactive assessment\
    \ of equity in design. Those responsible for the development, use, or oversight of \nautomated systems should conduct\
    \ proactive equity assessments in the design phase of the technology \nresearch and development or during its acquisition\
    \ to review potential input data, associated historical \ncontext, accessibility for people with disabilities, and societal\
    \ goals to identify potential discrimination and \neffects on equity resulting from the introduction of the technology.\
    \ The assessed groups should be as inclusive \nas possible of the underserved communities mentioned in the equity definition:\
    \  Black, Latino, and Indigenous \nand Native American persons, Asian Americans and Pacific Islanders and other persons\
    \ of color; members of \nreligious minorities; women, girls, and non-binary people; lesbian, gay, bisexual, transgender,\
    \ queer, and inter-\nsex (LGBTQI+) persons; older adults; persons with disabilities; persons who live in rural areas;\
    \ and persons \notherwise adversely affected by persistent poverty or inequality. Assessment could include both qualitative\
    \ \nand quantitative evaluations of the system. This equity assessment should also be considered a core part of the \n\
    goals of the consultation conducted as part of the safety and efficacy review. \nRepresentative and robust data. Any data\
    \ used as part of system development or assessment should be \nrepresentative of local communities based on the planned\
    \ deployment setting and should be reviewed for bias \nbased on the historical and societal context of the data. Such\
    \ data should be sufficiently robust to identify and \nhelp to mitigate biases and potential harms. \nGuarding against\
    \ proxies.  Directly using demographic information in the design, development, or \ndeployment of an automated system\
    \ (for purposes other than evaluating a system for discrimination or using \na system to counter discrimination) runs\
    \ a high risk of leading to algorithmic discrimination and should be \navoided. In many cases, attributes that are highly\
    \ correlated with demographic features, known as proxies, can \ncontribute to algorithmic discrimination. In cases where\
    \ use of the demographic features themselves would \nlead to illegal algorithmic discrimination, reliance on such proxies\
    \ in decision-making (such as that facilitated \nby an algorithm) may also be prohibited by law. Proactive testing should\
    \ be performed to identify proxies by \ntesting for correlation between demographic information and attributes in any\
    \ data used as part of system \ndesign, development, or use. If a proxy is identified, designers, developers, and deployers\
    \ should remove the \nproxy; if needed, it may be possible to identify alternative attributes that can be used instead.\
    \ At a minimum, \norganizations should ensure a proxy feature is not given undue weight and should monitor the system\
    \ closely \nfor any resulting algorithmic discrimination.   \n26\nAlgorithmic \nDiscrimination \nProtections \n"
  - " \n \n \n \n \n \n \nHUMAN ALTERNATIVES, \nCONSIDERATION, AND \nFALLBACK \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\n\
    The expectations for automated systems are meant to serve as a blueprint for the development of additional \ntechnical\
    \ standards and practices that are tailored for particular sectors and contexts. \nEquitable. Consideration should be\
    \ given to ensuring outcomes of the fallback and escalation system are \nequitable when compared to those of the automated\
    \ system and such that the fallback and escalation \nsystem provides equitable access to underserved communities.105 \n\
    Timely. Human consideration and fallback are only useful if they are conducted and concluded in a \ntimely manner. The\
    \ determination of what is timely should be made relative to the specific automated \nsystem, and the review system should\
    \ be staffed and regularly assessed to ensure it is providing timely \nconsideration and fallback. In time-critical systems,\
    \ this mechanism should be immediately available or, \nwhere possible, available before the harm occurs. Time-critical\
    \ systems include, but are not limited to, \nvoting-related systems, automated building access and other access systems,\
    \ systems that form a critical \ncomponent of healthcare, and systems that have the ability to withhold wages or otherwise\
    \ cause \nimmediate financial penalties. \nEffective. The organizational structure surrounding processes for consideration\
    \ and fallback should \nbe designed so that if the human decision-maker charged with reassessing a decision determines\
    \ that it \nshould be overruled, the new decision will be effectively enacted. This includes ensuring that the new \n\
    decision is entered into the automated system throughout its components, any previous repercussions from \nthe old decision\
    \ are also overturned, and safeguards are put in place to help ensure that future decisions do \nnot result in the same\
    \ errors. \nMaintained. The human consideration and fallback process and any associated automated processes \nshould be\
    \ maintained and supported as long as the relevant automated system continues to be in use. \nInstitute training, assessment,\
    \ and oversight to combat automation bias and ensure any \nhuman-based components of a system are effective. \nTraining\
    \ and assessment. Anyone administering, interacting with, or interpreting the outputs of an auto­\nmated system should\
    \ receive training in that system, including how to properly interpret outputs of a system \nin light of its intended\
    \ purpose and in how to mitigate the effects of automation bias. The training should reoc­\ncur regularly to ensure it\
    \ is up to date with the system and to ensure the system is used appropriately. Assess­\nment should be ongoing to ensure\
    \ that the use of the system with human involvement provides for appropri­\nate results, i.e., that the involvement of\
    \ people does not invalidate the system's assessment as safe and effective \nor lead to algorithmic discrimination. \n\
    Oversight. Human-based systems have the potential for bias, including automation bias, as well as other \nconcerns that\
    \ may limit their effectiveness. The results of assessments of the efficacy and potential bias of \nsuch human-based systems\
    \ should be overseen by governance structures that have the potential to update the \noperation of the human-based system\
    \ in order to mitigate these effects. \n50\n"
  - " \n \n \nApplying The Blueprint for an AI Bill of Rights \nSENSITIVE DATA: Data and metadata are sensitive if they pertain\
    \ to an individual in a sensitive domain \n(defined below); are generated by technologies used in a sensitive domain;\
    \ can be used to infer data from a \nsensitive domain or sensitive data about an individual (such as disability-related\
    \ data, genomic data, biometric \ndata, behavioral data, geolocation data, data related to interaction with the criminal\
    \ justice system, relationship \nhistory and legal status such as custody and divorce information, and home, work, or\
    \ school environmental \ndata); or have the reasonable potential to be used in ways that are likely to expose individuals\
    \ to meaningful \nharm, such as a loss of privacy or financial harm due to identity theft. Data and metadata generated\
    \ by or about \nthose who are not yet legal adults is also sensitive, even if not related to a sensitive domain. Such\
    \ data includes, \nbut is not limited to, numerical, text, image, audio, or video data. \nSENSITIVE DOMAINS: “Sensitive\
    \ domains” are those in which activities being conducted can cause material \nharms, including significant adverse effects\
    \ on human rights such as autonomy and dignity, as well as civil liber­\nties and civil rights. Domains that have historically\
    \ been singled out as deserving of enhanced data protections \nor where such enhanced protections are reasonably expected\
    \ by the public include, but are not limited to, \nhealth, family planning and care, employment, education, criminal justice,\
    \ and personal finance. In the context \nof this framework, such domains are considered sensitive whether or not the specifics\
    \ of a system context \nwould necessitate coverage under existing law, and domains and data that are considered sensitive\
    \ are under­\nstood to change over time based on societal norms and context. \nSURVEILLANCE TECHNOLOGY: “Surveillance\
    \ technology” refers to products or services marketed for \nor that can be lawfully used to detect, monitor, intercept,\
    \ collect, exploit, preserve, protect, transmit, and/or \nretain data, identifying information, or communications concerning\
    \ individuals or groups. This framework \nlimits its focus to both government and commercial use of surveillance technologies\
    \ when juxtaposed with \nreal-time or subsequent automated analysis and when such systems have a potential for meaningful\
    \ impact \non individuals’ or communities’ rights, opportunities, or access. \nUNDERSERVED COMMUNITIES: The term “underserved\
    \ communities” refers to communities that have \nbeen systematically denied a full opportunity to participate in aspects\
    \ of economic, social, and civic life, as \nexemplified by the list in the preceding definition of “equity.” \n11\n"
