    sentences:
    - 'Public_195

      Đặt vấn đề

      Trí tuệ nhân tạo trong giáo dục: Xu thế không thể đảo ngược

      Dù có lịch sử phát triển hơn 100 năm, từ những năm 1920 (xem Hình 1), sự có mặt của trí tuệ nhân tạo (AI) trong lĩnh
      vực giáo dục chỉ được biết tới mạnh mẽ nhất từ tháng 3 năm 1965, khi báo cáo UNESCO Courier giới thiệu về học máy (learning
      machines) - Bộ chương trình được phát triển ở Mĩ để hỗ trợ học sinh học tập [1], [2], [3], [4], [5], [6]. Trong suốt
      60 năm vừa qua, quá trình phát triển vượt bậc của những công cụ AI trong giáo dục gắn liền với sự thay đổi về đặc điểm
      và yêu cầu kinh tế - xã hội, về nhu cầu và điều kiện giáo dục và quan trọng nhất, về quan niệm dạy và học của từng quốc
      gia trên thế giới.

      |<image_1>|

      Từ những năm 1950 đến 1990

      Trong giai đoạn này, sự phát triển của AI chủ yếu xoay quanh việc sử dụng máy tính để cải thiện kết quả và trải nghiệm
      dạy và học. Cụ thể, từ những năm 1960, ý tưởng về việc sử dụng máy tính và công nghệ trong giáo dục bắt đầu xuất hiện
      với khái niệm về dạy và học máy (teaching and learning machines) được đề cập trong các trích dẫn của các nhà giáo dục
      có tiếng [7]. Một ví dụ điển hình của học máy kể tới PLATO (Programmed Logic for Automatic Teaching Operations) - một
      hệ thống dạy học hỗ trợ máy tính, tiên phong cho nền dạy học trực tuyến ngày nay. Những năm 1970 chứng kiến tính ứng
      dụng cao của AI trong giáo dục, trong đó xuất hiện những thử nghiệm đầu tiên về việc tích hợp công nghệ trong giáo dục
      (Educational technology tools) nhằm nâng cao hiệu quả học tập. Một số hệ thống AI sớm (Early artificial intelligence
      systems) như AutoTutor (Hệ thống hỏi đáp hỗ trợ học sinh học ngôn ngữ), LEGO Mindstorms (Sản phẩm giáo dục sử dụng chương
      trình và cảm biến để giúp học sinh hiểu về lập trình, kĩ thuật và cơ bản của robot) cũng được phát triển trong giai
      đoạn này [7].

      Từ những năm 1980 đến 1990

      Khi cơ sở hạ tầng công nghệ được cải thiện đáng kể, những công cụ AI trong giáo dục ra đời ngoài mục đích nâng cao thành
      tích còn gia tăng trải nghiệm học tập thích thú và tích cực cho học sinh đối với tất cả các môn học. Một số công cụ
      nổi bật kể tới là sự ra đời của những môi trường giáo dục ảo (Virtual learning environments), các phần mềm và ứng dụng
      học tập tự động và cá nhân hóa (Ví dụ: Cognitive Tutor dạy và học Toán, Programming by Example dạy và học Lập trình,
      Jupiter Learning dạy và học Điện và Kĩ thuật) [8].

      Từ năm 2000 đến nay

      |<image_2>|

      Sự bùng nổ của các công cụ AI trong giáo dục bắt đầu trở nên mạnh mẽ từ những năm 2000 và hoàn toàn thay đổi cục diện
      giáo dục thế giới vào năm 2020, với sự tác động lớn của đại dịch COVID-19. Cụ thể, từ những năm 2000, các nền tảng giáo
      dục trực tuyến kết hợp các tính năng tự động của AI trở nên phổ biến, cho phép người học được tự tiếp cận kiến thức
      thông qua các nền tảng trực tuyến, tự xây dựng lộ trình học tập linh hoạt phù hợp với nhu cầu cá nhân [8]. Ví dụ, nền
      tảng Khan Academy thành lập năm 2006 đã xây dựng hơn 6000 video bài giảng miễn phí và hệ thống đánh giá kết quả tự động,
      giúp học sinh tự đánh giá năng lực bản thân và đưa ra định hướng học tập phù hợp nhất. Một nền tảng đáng chú ý khác
      là Knewton, xuất hiện từ năm 2008, sử dụng thuật toán và dữ liệu để tối ưu hóa trải nghiệm học tập [9].

      Từ những năm 2010

      Sự xuất hiện của Chatbots - công cụ AI cho phép con người giao tiếp với máy tính để tiếp cận kiến thức và giải đáp thắc
      mắc đã bắt đầu thay đổi quan niệm của các nhà nghiên cứu và nhà giáo dục về tiềm năng còn tiềm ẩn của các công cụ AI
      trong lĩnh vực giáo dục [7]. Cùng với đó, công nghệ thực tế ảo (VR - Virtual Reality) và thực tế ảo tăng cường (AR \-
      Augmented Reality) cũng được tích hợp trong giảng dạy, mang lại trải nghiệm học tập hoàn toàn khác biệt so với giáo
      dục truyền thống. Ví dụ, Google Expeditions sử dụng thực tế ảo tăng cường để đưa học sinh vào các hành trình thực tế
      ảo, mở rộng không gian giáo dục đến những nơi học sinh chưa từng đặt chân.

      Hình 1: Cột mốc phát triển của AI dựa trên khả năng giải quyết vấn đề [10]

      Từ Hình 1 ta thấy được rằng, khả năng giải quyết vấn đề và xử lý thông tin của AI phát triển một cách đáng chú ý từ
      năm 2010, đánh dấu giai đoạn vàng của kỉ nguyên AI. Nếu năm 2015, AI có thể thực hiện những thao tác mang tính nhận
      diện và thông hiểu như nhận diện khuôn mặt và thông hiểu văn bản, thì năm 2023, với sự ra đời của AI tạo sinh, các công
      cụ AI có thể vận dụng kiến thức từ dữ liệu, phân tích hiện tượng như một con người và đưa ra những đánh giá hiện trạng
      nhằm sáng tạo ra những ý tưởng mới [10]. Nhìn từ góc độ phát triển tư duy, AI đã đạt tới được cấp độ sáng tạo - cấp
      độ cao nhất trong thang đo tư duy Bloom.

      Tác động của đại dịch COVID-19

      Ngoài quá trình phát triển vốn có của AI, tác động của đại dịch COVID-19 tới quá trình dạy và học tạo ra một cú hích
      lớn cho nhận thức toàn cầu về tầm quan trọng của công nghệ trong giáo dục. Theo World Bank, chỉ trong hai năm đại dịch,
      việc học tập của hơn 1.6 tỉ học sinh bị gián đoạn ở nhiều mức độ khác nhau, từ học trực tuyến tới nghỉ học hoàn toàn
      (2023). Trong hai năm này, các nền tảng học tập trực tuyến, các ứng dụng công nghệ giáo dục và các ứng dụng AI thông
      minh trở thành giải pháp tối ưu để cải thiện việc tiếp cận giáo dục ở nhiều quốc gia trên toàn thế giới [11], đóng vai
      trò như cầu nối giữa người học và tri thức, không chỉ cung cấp nền tảng để trao đổi tri thức mà còn cung cấp trải nghiệm
      học tập hấp dẫn [12].

      Vì vậy, UNESCO (2021) nhấn mạnh rằng, việc sử dụng công nghệ không chỉ giúp duy trì quá trình giảng dạy và học tập trong
      tình huống khẩn cấp như đại dịch mà còn tạo ra cơ hội cho sự sáng tạo trong giáo dục, hướng tới một nền giáo dục tiên
      tiến và chất lượng hơn [13]. Hơn nữa, các giải pháp công nghệ có thể được phát triển dựa trên cơ sở hạ tầng và tài nguyên
      hiện có. Do đó, việc thúc đẩy tính bền vững giáo dục có tiềm năng đạt được bằng cách trang bị cho học sinh các kĩ năng
      cần thiết, bao gồm kĩ năng số để điều hướng và định vị bản thân trong một thế giới đang tiến triển không ngừng. Từ đó
      trở đi, nhận thức và thói quen sử dụng công nghệ của nhà trường, giáo viên và học sinh toàn cầu cũng có sự chuyển biến
      rõ rệt. Xu hướng sử dụng AI để giải quyết các thách thức hiện nay trong giáo dục trở nên phổ biến - một bình thường
      mới, một xu thế không thể đảo ngược [1], [2], [3], [4], [5], [6]. Ví dụ, có thể kể đến những ứng dụng trò chơi tích
      hợp AI nhằm tăng tương tác học tập (Quizlet, Quizziz, Padlet…), những nền tảng học tập như Coursera sử dụng AI để cung
      cấp trải nghiệm học tập cá nhân hóa hiện nay đã trở thành một phần không thể thiếu trong giáo dục chính quy và trong
      suốt hành trình học tập suốt đời.'
    - 'Public_195

      Đặt vấn đề

      Từ vô địch cờ vua tới vô địch Olympics: Cuộc đua AI chưa có hồi kết

      Nhìn từ góc độ kĩ thuật, trong lịch sử gần 100 năm hình thành và phát triển, có thể nói rằng, cuộc đua về trí thông
      minh của AI vẫn chưa có hồi kết. Bắt đầu với một sự kiện chấn động thế giới vào năm 1997 khi Deep Blue - một siêu máy
      tính sử dụng trí tuệ nhân tạo phát triển bởi IBM đánh bại kì thủ cờ vua thế giới nổi tiếng Garry Kasparov, thể hiện
      khả năng tư duy chiến lược vượt qua trí tuệ con người [14]. Chiến thắng này được coi là một bước ngoặt mang tính cách
      mạng trong quá trình phát triển của AI, chỉ ra tiềm năng vượt bậc của công cụ này trong việc giải quyết các nhiệm vụ
      phức tạp yêu cầu nhiều bước thực hiện phân tích dữ liệu tức thì. Trong ba thập kỉ tiếp theo, sự tiến bộ của AI trong
      việc giải quyết các vấn đề đa lĩnh vực diễn ra theo ba giai đoạn chính, tạm thời dừng chân với một phát minh mới nhất
      của các nhà khoa học về một công cụ AI vượt qua những học sinh ưu tú nhất, giành giải vô địch Olympics Toán học thế
      giới.

      Dù hành trình từ chiến thắng cờ vua tới chiến thắng Olympics chứng minh được tiềm năng của các công cụ AI trong việc
      không ngừng đẩy lùi ranh giới của những gì trước đây được coi là không thể, cuộc đua AI vẫn rất quyết liệt và chưa có
      hồi kết. Đối mặt với hiện tượng này, các quốc gia trên thế giới dần đón nhận tiềm năng của AI, đồng thời đối mặt với
      những thách thức liên quan đến quyền riêng tư, các yếu tố về đạo đức nhằm đảm bảo rằng, những lợi ích của AI trong giáo
      dục được khai thác công bằng và hướng tới tiến bộ chung của xã hội. Các quốc gia cũng nhận thức rõ hơn về sự cần thiết
      để chuẩn bị công dân đáp ứng yêu cầu của thời đại số, bắt đầu tích hợp AI vào chiến lược giáo dục quốc gia của mình.
      Báo cáo Giám sát Giáo dục toàn cầu của UNESCO (2021) là một minh chứng cho xu hướng toàn cầu này với sự tập trung vào
      việc nâng cao tính tiện ích, tính bao quát và chất lượng của giáo dục thông qua công nghệ mới.'
