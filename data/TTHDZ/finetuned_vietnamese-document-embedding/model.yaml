      Vùng gắn kết của các mục tiêu gắn kết


      Trong hầu hết kết quả thu được, các túi liên kết của dẫn xuất VK3 với mục tiêu gắn kết Aβ40-1BA4, Aβ42-1Z0Q, 5Aβ17-42,
      12Aβ9-40 và 18Aβ9-40 đều tập trung trong cùng một vùng không gian bên trong của mục tiêu gắn kết, vùng này chính là
      vùng gắn kết. Hầu như độ phân tán rất nhỏ, những hình ảnh tiêu biểu về vùng gắn kết của 5 mục tiêu gắn kết

      Việc chạy MD có thời gian khác nhau được áp dụng cho từng mục tiêu gắn kết. Rõ ràng từ hình 3.30 và hình 3.31, trạng
      thái cân bằng của hệ phức hợp (dẫn xuất VK3 và mục tiêu gắn kết) ở những khoảng thời gian khác nhau khi năng lượng tương
      tác của dẫn xuất VK3 và mục tiêu gắn kết bão hòa. Chỉ những cấu hình đã đạt trạng thái cân bằng mới được sử dụng để
      tính ∆Gbind bằng phương pháp MM- PBSA. Kết quả cuối cùng được cho trong bảng 3.4 phù hợp với kết quả docking (năng lượng
      liên kết của VK3-10 thấp nhất), với tương tác van der Waals chiếm ưu thế hơn tương tác tĩnh điện. Điều quan trọng cần
      lưu ý VK3-9 và VK3-10 có ái lực mạnh hơn những dẫn xuất khác (bảng 3.4). Những chất có năng lượng tự do liên kết cao
      hơn rõ rệt. Cụ thể, _∆G_ bind = -15.41±3.44 và -12.42±3.87 kcal.mol-1 cho VK3-9 và VK3-10. Cũng bằng phương pháp MM-PBSA
      Ngô Sơn Tùng và Mai Xuân Lý (NS Tung and MS Li, Private Communication) đã tính được năng lượng liên kết của Cucurmin
      _∆G_ bind = -14.3 kcal.mol-1 và kết quả này phù hợp với đánh giá bằng thực nghiệm _∆G_ bind =-13.33 kcal.mol-1 [25].
      Vì vậy kết quả MM-PBSA chỉ ra rằng VK3-9 và VK3-10 mạnh như Cucurmin trong việc chống sự kết tập của các amyloid peptid[39].
      Sử dụng các kết quả thu được cho _∆G_ bind chúng ta có thể đánh giá hằng số ức chế IC50 của VK3-9 và VK3-10 vào khoảng
      μM – nM. Điều này phù hợp với các thí nghiệm của Y-C Chen và các cộng sự.

      Bảng 3.4: Năng lượng tự do liên kết, tương tác tĩnh điện, tương tác van der Waals kcal.mol-1 của 5 dẫn xuất VK3 với
      Amyloid beta 1-40 peptid thu được bằng phương pháp MM-PBSA.

