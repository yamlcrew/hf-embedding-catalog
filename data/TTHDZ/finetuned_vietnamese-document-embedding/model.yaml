  - 'Public_056

    Danh sách liên kết đơn (Single Linked List)

    nan

    Như ta đã biết mảng ( _array_ ) là tập có thứ tự các phần tử có cùng chung một kiểu dữ liệu và được tổ chức liên tục nhau
    trong bộ nhớ. Ưu điểm lớn nhất của mảng là đơn giản và xử lý nhanh nhờ cơ chế truy cập phần tử trực tiếp vào các phần
    tử của mảng. Hạn chế lớn nhất của mảng là số lượng phần tử không thay đổi gây nên hiện tượng thừa bộ nhớ trong một số
    trường hợp và thiếu bộ nhớ trong một số trường hợp khác. Đối với một số bài toán có dữ liệu lớn, nhiều khi ta không đủ
    không gian nhớ tự do liên tục để cấp phát cho mảng. Để khắc phục hạn chế này ta có thể xây dựng kiểu dữ liệu danh sách
    liên kết đơn được định nghĩa, biểu diễn và thao tác như dưới đây.'
- source_sentence: Theo tài liệu Public_517, mối quan hệ giữa mô hình chi tiết/cụm lắp và bản vẽ trong Autodesk Inventor là
    gì?
  sentences:
  - 'Public_269

    GIỚI THIỆU VỀ NGÔN NGỮ LẬP TRÌNH DART


    Dart, một ngôn ngữ lập trình đa năng do Google phát triển, đã chuyển mình từ một ứng cử viên thay thế JavaScript thành
    một trụ cột quan trọng trong phát triển ứng dụng đa nền tảng hiện đại. Được công bố rộng rãi vào năm 2011, Dart giờ đây
    hỗ trợ các ứng dụng trên web, di động, máy tính để bàn và phía máy chủ, nhờ vào sự kết hợp với Flutter cùng bộ tính năng
    mạnh mẽ. Phần này sẽ giới thiệu nguồn gốc, các mốc phát triển quan trọng và vai trò của Dart trong việc giúp các nhà phát
    triển tạo ra ứng dụng đa nền tảng hiệu suất cao từ một mã nguồn duy nhất.

    |<image_2>|

    **Hình 2.1:** Ngôn ngữ lập trình Dart

    |<image_3>|

    **Hình 2.3:** Thống kê các ngôn ngữ lập trình phổ biến năm 2023

    Với vai trò mở rộng trong nhiều lĩnh vực và sự hỗ trợ từ cộng đồng, Dart hứa hẹn sẽ tiếp tục là một công cụ không thể
    thiếu cho các nhà phát triển trong tương lai.'
  - 'Public_517



    Autodesk Inventor liên kết mô hình chi tiết và cụm lắp với bản vẽ. Mọi thay đổi của mô hình sẽ được cập nhật vào bản vẽ.
    Ngược lại, bạn có thể thay đổi mô hình chi tiết và cụm lắp bằng cách sửa kích thước mô hình ngay trong bản vẽ. Mối quan
    hệ 2 chiều này đảm bảo cho bản vẽ luôn luôn phản ánh các thông số thiết kế mới nhất của mô hình.'
  - 'Public_517

    Trình tự thực hiện

    Sử dụng kích thước mô hình

    Bạn có thể cho hiện kích thước mô hình trong bản vẽ. Chỉ kích thước nào song song với mặt phẳng chiếu mới được hiện lên.
    Nếu bạn cài đặt Autodesk Inventor với tùy chọn, cho phép sửa đổi mô hình từ trong bản vẽ thì bạn có thể thay đổi mô hình
    bằng cách sửa kích thước mô hình trong bản vẽ. Bạn có thể thay đổi kiểu kích thước mô hình như với kích thước bản vẽ.

    Để hiện kích thước mô hình trong bản vẽ, kích phải một hình chiếu và chọn Get Model Dimensions trong menu vừa hiện lên.
    Các kích thước mô hình song song với mặt phẳng chiếu sẽ hiện lên trong hình chiếu.

    Để xóa kích thước mô hình khỏi hình chiếu, kích phải lên kích thước cần xóa rồi chọn Delete trong menu vừa hiện lên.

    Để chuyển kích thước mô hình sang hình chiếu khác, xóa kích thước trong hình chiếu nguồn, xong kích phải lên hình chiếu
    đích và chọn Get Model Dimensions trong menu vừa hiện lên.

    Để sửa một kích thước mô hình, kích phải lên kích thước cần sửa, chọn Edit Model Dimension trong menu vừa hiện lên. Nhập
    giá trị mới vào hộp thoại Edit Dimension, xong kích vào dấu check để thực hiện.'
- source_sentence: Thách thức nào đặc thù khi huấn luyện AI cho an ninh mạng?
  sentences:
  - 'Public_076

    Kiến trúc tổng thể của hệ thống phòng thủ AI

    Một giải pháp AI an ninh mạng toàn diện thường bao gồm nhiều lớp:'
  - "Public_123\nMạng nơ ron tích chập (mạng CNN)\nKiến trúc chung của mạng neural tích chập\nTích chập được ứng dụng phổ\
    \ biến trong lĩnh vực thị giác máy tính. Thông qua các phép tích chập, các đặc trưng chính từ ảnh được trích xuất và truyền\
    \ vào các tầng _tích chập_ (layer convolution). Mỗi một tầng tích chập sẽ bao gồm nhiều đơn vị mà kết quả ở mỗi đơn vị\
    \ là một phép biến đổi tích chập từ layer trước đó thông qua phép nhân tích chập với bộ lọc.\nVề cơ bản thiết kế của một\
    \ mạng nơ ron tích chập 2 chiều có dạng như sau:\nINPUT -> [[CONV -> RELU]*N -> POOL?]*M -> [FC -> RELU]*K -> FC\nTrong\
    \ đó:\n  * INPUT: Tầng đầu vào\n  * CONV: Tầng tích chập\n  * RELU: Tầng kích hoạt. Thông qua hàm kích hoạt ( _activation\
    \ function_ ), thường là ReLU hoặc LeakyReLU để kích hoạt phi tuyến\n  * POOL: Tầng tổng hợp, thông thường là Max pooling\
    \ hoặc có thể là Average pooling dùng để giảm chiều của ma trận đầu vào.\n  * FC: Tầng kết nối hoàn toàn. Thông thường\
    \ tầng này nằm ở sau cùng và kết nối với các đơn vị đại diện cho nhóm phân loại.\nCác kí hiệu [] _N, []_ M hoặc []*K ám\
    \ chỉ các khối bên trong [] có thể lặp lại nhiều lần liên tiếp nhau. M, K là số lần lặp lại. Kí hiệu -> đại diện cho các\
    \ tầng liền kề nhau mà tầng đứng trước sẽ làm đầu vào cho tầng đứng sau. Dấu ? sau POOL để thể hiện tầng POOL có thể có\
    \ hoặc không sau các khối tích chập.\nNhư vậy ta có thể thấy một mạng nơ ron tích chập về cơ bản có 3 quá trình khác nhau:\n\
    \  * Quá trình tích chập (convolution): Thông qua các tích chập giữa ma trận đầu vào với bộ lọc để tạo thành các đơn vị\
    \ trong một tầng mới. Quá trình này có thể diễn ra liên tục ở phần đầu của mạng và thường sử dụng kèm với hàm kích hoạt\
    \ ReLU. Mục tiêu của tầng này là trích suất đặc trưng hai chiều.\n  * Quá trình tổng hợp (max pooling): Các tầng càng\
    \ về sau khi trích xuất đặc trưng sẽ cần số lượng tham số lớn do chiều sâu được qui định bởi số lượng các kênh ở các tầng\
    \ sau thường tăng tiến theo cấp số nhân. Điều đó làm tăng số lượng tham số và khối lượng tính toán trong mạng nơ ron.\
    \ Do đó để giảm tải tính toán chúng ta sẽ cần giảm kích thước các chiều của khối ma trận đầu vào hoặc giảm số đơn vị của\
    \ tầng. Vì mỗi một đơn vị sẽ là kết quả đại diện của việc áp dụng 1 bộ lọc để tìm ra một đặc trưng cụ thể nên việc giảm\
    \ số đơn vị sẽ không khả thi. Giảm kích thước khối ma trận đầu vào thông qua việc tìm ra 1 giá trị đại diện cho mỗi một\
    \ vùng không gian mà bộ lọc đi qua sẽ không làm thay đổi các đường nét chính của bức ảnh nhưng lại giảm được kích thước\
    \ của ảnh. Do đó quá trình giảm chiều ma trận được áp dụng. Quá trình này gọi là tổng hợp nhằm mục đích giảm kích thước\
    \ dài, rộng.\n  * Quá trình kết nối hoàn toàn (fully connected): Sau khi đã giảm kích thước đến một mức độ hợp lý, ma\
    \ trận cần được trải phẳng (flatten) thành một vector và sử dụng các kết nối hoàn toàn giữa các tầng. Quá trình này sẽ\
    \ diễn ra cuối mạng CNN và sử dụng hàm kích hoạt là ReLU. Tầng kết nối hoàn toàn cuối cùng (fully connected layer) sẽ\
    \ có số lượng đơn vị bằng với số classes và áp dụng hàm kích hoạt là softmax nhằm mục đích tính phân phối xác xuất."
  - "Public_076\nKiến trúc tổng thể của hệ thống phòng thủ AI\nTầng phân tích và học máy\n* Giám sát (Supervised Learning):\
    \ sử dụng dữ liệu đã gắn nhãn (ví dụ, gói tin tấn công) để dự đoán tấn công đã biết.\n  * Không giám sát (Unsupervised/Anomaly\
    \ Detection): tìm kiếm mẫu hành vi bất thường, hữu ích với các cuộc tấn công 0-day.\n  * Học bán giám sát và tự giám sát:\
    \ giảm phụ thuộc vào dữ liệu gắn nhãn khan hiếm.\n  * Học tăng cường (Reinforcement Learning): cho phép hệ thống tự điều\
    \ chỉnh chính sách phản ứng dựa trên kết quả."
