  - source_sentence: Khi thêm node vào đầu danh sách liên kết đơn, nếu danh sách không rỗng, con trỏ 'p' sẽ trỏ đến đâu?
    sentences:
    - "Public_056\nDanh sách liên kết đơn (Single Linked List)\nThao tác trên danh sách liên kết đơn\nCác thao tác trên danh\
      \ sách liên kết đơn bao gồm:\n  * Tạo node rời rạc có giá trị value cho danh sách liên kết đơn\n  * Thêm một node vào\
      \ đầu danh sách liên kết đơn.\n  * Thêm một node vào cuối danh sách liên kết đơn.\n  * Thêm node vào vị trí xác định\
      \ trong danh sách liên kết đơn.\n  * Loại node trong sách liên kết đơn.\n  * Tìm node trong sách liên kết đơn.\n  *\
      \ Sắp xếp node trong danh sách liên kết đơn.\n  * Sửa đổi nội dung node trong sách liên kết đơn.\n  * Đảo ngược các\
      \ node trong danh sách liên kết đơn.\n  * Duyệt các node của danh sách liên kết đơn.\nĐể đơn giản, ta xem thành phần\
      \ thông tin của node (Item) là một số nguyên. Khi đó, các thao tác trên danh sách liên kết đơn ta định nghĩa một lớp\
      \ các thao tác như sau:\nstruct node { // _biểu diễn node_\nint info; // _thành phần thông tin của node_\nstruct node\
      \ *next; // _thành phần con trỏ của node_\n}*start; // _danh sách liên kết đơn: *start._\nclass single_linked_list {\
      \ // _biểu diễn lớp danh sách liên kết đơn_\npublic:\nnode* create_node(int);// _Tạo một node cho danh sách liên kết\
      \ đơn_\nvoid insert_begin(); // _thêm node vào đầu DSLKĐ_\nvoid insert_pos(); // _thêm node tại vị trí cụ thể trên DSLKĐ_\n\
      void insert_last(); // _thêm node vào cuối DSLKĐ_\nvoid delete_pos(); // _loại node tại vị trí cho trước trên DSLKĐ_\n\
      void sort(); // _sắp xếp nội dung các node theo thứ tự tăng dần_\nvoid search(); // _tìm kiếm node trên DSLKĐ_\nvoid\
      \ update(); // _sửa đổi thông tin của node trên DSLKĐ_\nvoid reverse(); // _đảo ngược danh sách liên kết đơn_\nvoid\
      \ display(); // _hiển thị nội dung DSLKĐ_\nsingle_linked_list(){// _constructor của lớp single linked list_. start =\
      \ NULL;// _chú ý start là biến toàn cục_\n}\n};\n**Thao tác:** _tạo một node rời rạc có giá trị value cho DSLKĐ_ **.**\n\
      node *single_linked_list::create_node(int value){\nstruct node *temp; // _khai báo hai con trỏ node *temp_ temp = new(struct\
      \ node); // _cấp phát miền nhớ cho temp_ if (temp == NULL){ // _nếu không đủ không gian nhớ_\ncout<<“ _không đủ bộ nhớ\
      \ để cấp phát_ \"<<endl; return 0;\nelse {\ntemp->info = value;// _thiết lập thông tin cho node temp_\ntemp->next =\
      \ NULL; // _thiết lập liên kết cho node temp_\nreturn temp;// _trả lại node temp đã được thiết lập_\n}\n}\n**Thao tác:\
      \ _thêm node vào đầu DSLKĐ_.**\nvoid single_linked_list::insert_begin(){ // _chèn node vào đầu DSLKĐ_\nint value; cout<<“Nhập\
      \ giá trị node:\"; cin>>value; // _giá trị node cần chèn_\nstruct node *temp, *p; // _sử dụng hai con trỏ temp và p_\n\
      temp = create_node(value);// _tạo một node rời rạc có giá trị value_\nif (start == NULL){ // _nếu danh sách liên kết\
      \ rỗng_\nstart = temp; // _danh sách liên kết chính là node temp_\nstart->next = NULL; // _không có liêt kết với node\
      \ khác_\n}\nelse { // _nếu danh sách không rỗng_\np = start; // _p trỏ đến node đầu của start_\nstart = temp; // _node\
      \ temp trở thành node đầu tiên của start_\nstart->next = p;// _các node còn lại chính là p_\n}\n}\nHình 3.2. dưới đây\
      \ mô tả phép thêm node vào đầu danh sách liên kết đơn.\n|<image_2>|\n**Hình 3.2. Thêm node vào đầu danh sách liên kết\
      \ đơn**\n**Thao tác thêm node vào cuối danh sách liên kết đơn** :\nvoid single_linked_list::insert_last() **{** // _thêm\
      \ node vào cuối DSLKĐ_\nint value;\ncout<<“Nhập giá trị cho node: \";cin>>value; // _nhập giá trị node_\nstruct node\
      \ *temp, *s; // _sử dung hai con trỏ temp và s_\ntemp = create_node(value);// _tạo node rời rạc có giá trị value_\n\
      if(start==NULL) {// _trường hợp DSLKĐ rỗng_\nstart = temp;\ntemp->next=NULL;\n}\ns = start; // _s trỏ đến node đầu danh\
      \ sách_\nwhile (s->next != NULL){ // _di chuyển s đến node cuối cùng_\ns = s->next;\n}\ntemp->next = NULL; // _temp\
      \ không chỏ đi đâu nữa_ s->next = temp; // _thiết lập liên kết cho s_ cout<<“ _Hoàn thành thêm node vào cuối_ \"<<endl;\n\
      }\n|<image_3>|\n**Hình 3.3. Thêm node vào cuối danh sách liên kết đơn**\n**Thao tác thêm node vào vị trí pos của danh\
      \ sách liên kết đơn** :\nvoid single_linked_list::insert_pos() **{** // _thêm node vào vị trí pos_\nint value, pos,\
      \ counter = 0; cout<<\"Nhap gia tri node:\";cin>>value; struct node *temp, *s, *ptr; // _sử dụng ba con trỏ node_\n\
      temp = create_node(value);// _tạo node rời rạc có giá trị value_\ncout<<“Nhập vị trí node cần thêm: \";cin>>pos; int\
      \ i; s = start; // _s trỏ đến node đầu tiên_\nwhile (s != NULL){ // _đếm số node của DSLKĐ_\ns = s->next; counter++;\n\
      }\nif (counter==0) {// _trường hợp DSLK đơn rỗng_\ncout<<”Danh sách rỗng”; return;\n}\nif (pos == 1){ // _nếu pos là\
      \ vị trí đầu tiên_\nif (start == NULL){ // _trường hợp DSLKĐ rỗng_\nstart = temp; start->next = NULL;\n}\nelse { //\
      \ _thêm node temp vào đầu DSLKĐ_\nptr = start; start = temp; start->next = ptr;\n}\n}\nelse if (pos > 1 && pos <= counter){\
      \ // _trường hợp pos hợp lệ_\ns = start; // _s trỏ đến node đầu tiên_\nfor (i = 1; i < pos; i++){ // _di chuyển đến\
      \ node pos-1_\nptr = s; s = s->next;\n}\nptr->next = temp; temp->next = s; // _thiết lập liên kết cho node_\n}\nelse\
      \ { cout<<“ _Vượt quá giới hạn DSLKĐ_ \"<<endl; }\n}\n|<image_4>|\n**Hình 3.4. Thêm node vào vị trí pos**\n**Thao tác\
      \ loại node tại vị trí pos** :\nvoid single_linked_list::delete_pos() **{** // _loại node ở vị trí pos_\nint pos, i,\
      \ counter = 0;\nif (start == NULL){ // _nếu danh sách liê kết đơn rỗng_\ncout<<“Không thực hiện được\"<<endl; return;\n\
      }\ncout<<“ _Vị trí cần loại bỏ_ :\";cin>>pos;\nstruct node *s, *ptr; s = start; // _s trỏ đến đầu danh sách_\nif (pos\
      \ == 1){// _nếu vị trí loại bỏ là node đầu tiên_\nstart = s->next; s->next=NULL; free(s);}\nelse {\nwhile (s != NULL)\
      \ { // _đếm số node của DSLKĐ_\ns = s->next; counter++;}\nif (pos > 0 && pos <= counter){ // _nếu vị trí pos hợp lệ_\n\
      s = start;// _s trỏ đến node đầu của danh sách_\nfor (i = 1;i < pos; i++){ // _di chuyển đến vị trí pos-1_\nptr = s;\
      \ s = s->next;\n}\nptr->next = s->next; // _thiết lập liên kết cho node_\n}\nelse { cout<<\"Vi tri ngoai danh sach\"\
      <<endl; } free(s); // _giải phóng s_\ncout<<\"Node da bi loai bo\"<<endl;\n}\n}\n|<image_5>|\n**Hình 3.5. Thao tác loại\
      \ node ở vị trí pos**\n**Thao tác sửa đổi nội dung của node** :\nvoid single_linked_list::update() **{** // _sửa đổi\
      \ thông tin của node_\nint value, pos, i;\nif (start == NULL){ // _nếu danh sách LKĐ rỗng_\ncout<<“ _Không thực hiện\
      \ được_ \"<<endl; return;\n}\ncout<<“Nhập vị trí node cần sửa:\";cin>>pos; cout<<“ _Giá trị mới của node_ :\";cin>>value;\
      \ struct node *s, *ptr; // _sử dụng hai con trỏ s và ptr_ s = start; // _s trỏ đến node đầu tiên_\nif (pos == 1) { start->info\
      \ = value;} // _sửa luôn node đầu tiên_\nelse { // _nếu pos không phải là node đầu tiên_\nfor (i = 0;i < pos - 1;i++){//\
      \ _chuyển s đến vị trí pos-1_\nif (s == NULL){// _Nếu s là node cuối cùng_\ncout<<\"Vị trí \"<<pos<<\" _không hợp lệ_\
      \ “; return;\n}\ns = s->next;\n}\ns->info = value; // _Sửa đổi thông tin cho node_\n}\ncout<<“ _Hoàn thành việc sửa\
      \ đổi_ \"<<endl;\n}\n**Thao tác duyệt danh sách liên kết đơn** :\nvoid single_linked_list::display() **{** // _hiển\
      \ thị nội dung DSLKĐ_\nstruct node *temp; // _sử dụng một con trỏ temp_\nif (start == NULL){ // _nếu danh sách rỗng_\
      \ cout<<“ _Có gì đâu mà hiển thị_ \"<<endl; return;\n}\ntemp = start; // _temp trỏ đến node đầu trong DSLKĐ_\ncout<<“\
      \ _Nội dung DSLKĐ_ : \"<<endl;\nwhile (temp != NULL) { // _lặp cho đến node cuối cùng_ cout<<temp->info<<\"->\"; //\
      \ _hiển thị thông tin node_ temp = temp->next; // _di chuyển đến node tiếp theo_\n}\ncout<<\" _NULL_ \"<<endl; // _node\
      \ cuối cùng là NULL_\n}\n**Thao tác tìm node trong danh sách liên kết đơn** :\n_**void single_linked_list::search(){**_\
      \ // _Tìm kiếm node_\nint value, pos = 0; bool flag = false;\nif (start == NULL){// _nếu danh sách rỗng_ cout<<“ _ta\
      \ không có gì để tìm_ \"<<endl; return;\n}\ncout<<“ _Nội dung node cần tìm_ :\";cin>>value; struct node *s; s = start;//\
      \ _s trỏ đến đầu danh sách_ while (s != NULL){ pos++;\nif (s->info == value){// _Nếu s- >infor là value_\nflag = true;\n\
      cout<<“ _Tìm thấy_ \"<<value<<\" _tại vị trí_ \"<<pos<<endl;\n}\ns = s->next;\n}\nif (!flag) {// _đến cuối vẫn không\
      \ thấy_\ncout<<“ _Giá trị_ \"<<value<<“ _không tồn tại_ \"<<endl;\n}\n}\n**Thao tác sắp xếp các node trong danh sách\
      \ liên kết đơn** : void single_linked_list::sort() **{** // _sắp xếp theo nội dung các node_\nstruct node *ptr, *s;\
      \ // _sử dụng hai con trỏ ptr và s_\nint value; // _giá trị trung gian_\nif (start == NULL){// _nếu danh sách rỗng_\
      \ cout<<“ _không có gì để sắp xếp_ \"<<endl; return;\n}\nptr = start;// _ptr trỏ đến node đầu danh sách_\nwhile (ptr\
      \ != NULL){ // _lặp trong khi ptr khác rỗng_\nfor (s = ptr->next; s !=NULL; s = s->next){ // _s là node tiếp theo_\n\
      if (ptr->info > s->info){// _nếu điều này xảy ra_\nvalue = ptr->info;// _tráo đổi nội dung hai node_\nptr->info = s->info;\
      \ s->info = value;\n}\n}\nptr = ptr->next;\n}\n}\n**Thao tác đảo ngược các node của DSLKĐ** :\nvoid single_linked_list::reverse()\
      \ **{** // _đảo ngược danh sách_\nstruct node *ptr1, *ptr2, *ptr3; // _sử dụng ba con trỏ node_\nif (start == NULL)\
      \ {// _Nếu danh sách rỗng_\ncout<<“ _ta không cần đảo_ \"<<endl; return;\n}\nif (start->next == NULL){//Nếu danh sách\
      \ chỉ có một node cout<<“ _đảo ngược là chính nó_ \"<<endl; return;\n}\nptr1 = start; // _ptr1 trỏ đến node đầu tiên_\n\
      ptr2 = ptr1->next;// _ptr2 trỏ đến node kế tiếp của ptr1_ ptr3 = ptr2->next;// _ptr3 trỏ đến nod kế tiếp của ptr2_ ptr1->next\
      \ = NULL;// _Ngắt liên kết ptr1_\nptr2->next = ptr1;// _node ptr2 bây giờ đứng trước node ptr1_\nwhile (ptr3 != NULL){//\
      \ _Lặp nếu ptr3 khác rỗng_ ptr1 = ptr2; // _ptr1 lại bắt đầu tại vị trí ptr2_ ptr2 = ptr3; // _ptr2 bắt đầu tại vị trí\
      \ ptr3_\nptr3 = ptr3->next; // _ptr3 trỏ đến node kế tiếp_\nptr2->next = ptr1; // _Thiết lập liên kết cho ptr2_\n}\n\
      start = ptr2; // _node đầu tiên bây giờ là ptr2_\n}\n**//Chương trình cài đặt các thao tác trên danh sách liên kết đơn:**\n\
      #include<iostream> using namespace std;\nstruct node { // _biểu diễn danh sách liên kết đơn_\nint info; // _thành phần\
      \ thông tin_\nstruct node *next; // _thành phần liên kết_\n}*start;\nclass single_linked_list { // _biểu diễn lớp single_linked_list_\n\
      public:\nnode* create_node(int);// _tạo node rời rạc có giá trị value_\nvoid insert_begin();// _thêm node vào đầu danh\
      \ sách liên kết đơn_\nvoid insert_pos();// _thêm node vào vị trí pos trong danh sách liên kết đơn_\nvoid insert_last();//\
      \ _thêm node vào cuối danh sách liên kết đơn_ void delete_pos();// _loại node tại vị trí pos của sách liên kết đơn_\
      \ void sort();// _sắp xếp theo giá trị node cho danh sách liên kết đơn_ void search();// _tìm node trong danh sách liên\
      \ kết đơn_\nvoid update(); // _cập nhật thông tin cho node_\nvoid reverse(); // _đảo ngược các node trong danh sách\
      \ liên kết đơn_ void display(); // _duyệt danh sách liên kết đơn_ single_linked_list(){// _constructor của lớp_\nstart\
      \ = NULL;\n}\n};"
