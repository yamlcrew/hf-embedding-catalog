- source_sentence: 미국의 빅테크 기업들이 최근에 어떤 사이버 보안 조치를 강화하고 있나요?
  sentences:
  - "23 Ⅱ. ICT 이슈 Top10\n ⑥미국, 반도체 산업 활성화에 박차\n CHIPS 법안을 통한 연구개발 및 제조 지원 강화\n• 미국 정부는 반도체법 (CHIPS Act)에 따라 반도체 산업을 활성화하기\
    \ 위해 R&D와 제조 지원에 \n520억 달러(약 64조 8,400 억 원)를 책정함 . 이 조치는 반도체 생산 분야에서 미국의 경쟁력을 \n회복하려는 목적이며 , 자금 배분은 세계 공급량의 40%에서 10%로\
    \ 급감한 국내 생산 능력을 \n강화하기 위한 전략적 노력임\n• 반도체 법에 의해 지원되는 여러 이니셔티브 중 110억 달러(약 13조 7,100 억 원)가 R&D에 \n특별히 할당되었으며 , 이는 글로벌 반도체\
    \ 시장에서 미국의 위치를 강화하고 , 중요 공급망에서 \n기술 주권 확보의 시급성을 해결하려는 목적임\n 대규모 반도체 공장 건설을 위한 정부 보조금 배정\n• 반도체법은 반도체 제조 시설 건설을 위해 390억\
    \ 달러(약 48조 6,000 억 원)의 직접 보조금을 \n배정함 . 이 자금은 차세대 반도체를 생산할 수 있는 최첨단 공장 개발을 가속화할 목적이자 , \n국가 반도체 인프라 재건에 대한 정부의 결단을 보여줌\
    \ . 인텔(Intel), 글로벌파운드리스 \n(GlobalFoundries), TSMC 와 같은 기업들이 잠재적 수혜자로 , 수천 개의 일자리 창출과 미국의 \n제조 능력 강화를 약속하는 프로젝트를 진행 중임\n\
    • 자금의 신속한 배치를 위해, 미국 상무부는 2024년 3월 말까지 주요 보조금을 배분할 계획을 \n발표함 . 프로젝트 비용의 최대 15%를 지원하는 보조금은 반도체 산업에 대한 민간 부문의 \n2,300 억\
    \ 달러(약 286조 2,000 억 원) 이상의 투자를 촉진할 것으로 기대되며 , 이는 강력한 민관 \n파트너십의 실현을 보여줌\n 국가 반도체 기술 센터 설립 및 연구개발 투자\n• 국가 반도체 기술 센터(NSTC)\
    \ 의 설립은 미국이 반도체 혁신 분야에서 리더십을 유지하려는 \n노력의 중요한 이정표임 . 50억 달러(약 6조 2,400 억 원) 이상의 초기 투자로 , NSTC 는 국가 \n반도체 R&D 노력의 핵심이 될\
    \ 것으로 기대됨 . 이 민관 컨소시엄은 반도체 기술 혁신을 주도하고 , \n최첨단 반도체 기술의 설계, 프로토타이핑 , 시범 운영을 용이하게 하는 임무를 맡고 있음\n• 이외에도 CHIPS 법안의 R&D 프로그램은\
    \ 국가 첨단 포장 제조 프로그램 (National Advanced \nPackaging Manufacturing Program) 및 CHIPS 제조 USA 연구소 (CHIPS Manufacturing \nUSA\
    \ Institute) 에 대한 자금 지원을 포함함 . 이러한 프로그램은 첨단 포장 기술부터 제조 공정의 \n디지털 트윈 기술 개발에 이르기까지 반도체 제조의 핵심 측면을 다루기 위해 설계됨 . 이를 통해, \n\
    미국 정부는 제조에만 초점을 맞추지 않고 반도체 산업에서 지속적인 리더십을 유지하기 위해 \n필요한 연구 및 개발을 우선시하는 포괄적인 국가 전략의 기반을 마련하고 있음"
  - "8 Ⅰ. ICT 국가 산업 현황\n 2.ICT 정부기구\n ③ 국가과학기술위원회 (NSTC) \n 미국 국가과학기술위원회 (NSTC)\n• 국가과학기술위원회 (National Science and Technology\
    \ Council) 는 1993년 설립되었으며 \n백악관 산하의 자문기구로 역할을 담당하고 있음\n• 국가과학기술위원회의 기능은 ① 과학기술정책 결정과정의 조정 ② 과학기술정책결정 프로그램의 \n목표 지원 ③ 연방정부\
    \ 전반에 대한 과학기술정책 의제 통합에 기여 ④ 과학기술 분야의 연방 \n정책 및 프로그램 개발 구현 ⑤ 과학기술분야의 국제협력 강화가 포함됨\n• 국가과학기술 위원회는 최근 ‘외국 인재 채용 프로그램 ’과 ‘STEM\
    \ 교육을 통한 컴퓨팅 능력 \n구축’ 관련 가이드라인을 발간했으며 , ‘연방 사이버보안 연구 및 개발 전략 계획’을 발행함\n[표 4] 미국 국가과학기술위원회 (NSTC)\n구분 내용\n주요 인사아라티 프라바카르\n\
    (Arati Prabhakar)\n백악관 과학기술정책실 (OSTP) 국장\n주요 소식‘외국 인재 채용 프로그램 ’ 지침 발행 ‣ 반도체 및 과학법에 의거해 발행\n‣ 프로그램에 대한 정의, 금지 사항 등 정리\n\
    ‘연방 사이버보안 \n연구 및 개발 전략 계획’ 발행‣ 사이버보안 관련 연구 자금 지원과 개발 \n우선순위에 대한 업데이트 지침 제공\n‣ NCS 관련 중요 목표 및 속성 식별\n‘STEM 교육을 통한 컴퓨팅 능력\
    \ 구축’ \n가이드 발행‣ STEM 교육으로 컴퓨터 활용 능력을 \n육성한 모범 사례를 식별·장려\n주요\n산하 조직\n출처 : 국가과학기술위원회"
  - "25 Ⅱ. ICT 이슈 Top10 \n ⑧미국, 사이버보안 강화에 박차 \n 미국 정부 기관, 해킹 피해 대응 강화\n• 미국의 여러 기업과 정부기관이 MOVEIt 파일 공유 소프트웨어의 취약점을 이용한 사이버\
    \ \n공격을 당함. 도난당한 데이터의 민감도에 대한 구체적인 정보는 아직 명확하지 않으나 , 이 \n사건은 최근 몇 년간 발생한 연방기관의 세 번째 주요 침해 사례임\n• 이러한 사건들은 정부기관 내에서 사이버\
    \ 보안 프로토콜의 긴급한 재평가를 촉발하며 , 정교한 \n사이버 적대자로부터 민감한 정보를 보호하기 위한 강력한 사이버 보안 조치의 필요성을 강조함 . \n사이버 보안 및 인프라 보안국 (CISA) 은 이러한\
    \ 해킹의 범위를 적극적으로 조사하며 , 연방기관이 \n받는 영향을 파악하고 적시에 조치를 취할 수 있도록 지원함\n 미국, 새로운 국가 사이버 보안 전략 발표\n• 백악관은 2023년 3월, 증가하는 사이버 위협에\
    \ 대한 국가 방어를 강화하기 위해 새로운 국가 \n사이버 보안 전략을 공개함 . 이 전략은 병원, 에너지 시설 등 핵심 인프라를 보호하고 , 디지털 \n생태계 위협에 대응하기 위해 UN과의 협력을 강화함 . 조\
    \ 바이든 (Joe Biden) 미국 대통령은 \n일상과 국가 안보를 뒷받침하는 디지털 인프라에 대한 신뢰의 중요성을 강조하며 , 공격보다 \n방어가 용이한 탄력적인 디지털 생태계를 구축하는 전략의 목표를 강조함\n\
    • 이 전략은 사이버 위협 해결을 위한 5개의 핵심을 제시함 . 여기에는 핵심 기반 시설 방어, 위협 \n행위자 교란, 보안 및 회복력을 촉진하기 위한 시장 세력 형성, 회복력 있는 미래에 대한 투자, \n국제\
    \ 파트너십 구축이 포함됨 . 책임 소재를 대규모 조직으로 재조정하고 강력한 협업과 보안 \n기술, 인력 개발에 대한 장기 투자로 국가 사이버보안을 강화하려는 행정부의 의지를 내포함\n 빅테크 기업, 클라우드 보안\
    \ 강화 조치\n• 최근 미국 정부 관리들의 이메일이 해킹된 사건에 대응하여 , 아마존 , 구글, 마이크로소프트 등 \n주요 클라우드 서비스 제공업체들은 투명성을 높이고 보안 조치를 강화하라는 압박을 받음.  \n\
    특히 마이크로소프트는 중국 정부와 연계된 스파이 작전으로 인해, 마이크로소프트 네트워크의 \n취약점을 악용하여 민감한 이메일 계정에 접근한 사건으로 인해 정밀 조사를 받음. 이 사건은 \n보안 프로토콜의 재평가와\
    \ 유사한 침해를 방지하기 위해 보다 엄격한 조치의 도입을 촉발함\n• 이에 미국 사이버 보안 및 인프라 보안국 (CISA) 은 사이버 보안 문제를 해결하기 위한 민관 \n협업의 중요성을 강조하며 , 이 사건을\
    \ 조사 중임. 더 큰 투명성과 강화된 보안 관행으로의 \n이동은 클라우드 제공업체가 사이버 위협에 대한 방어에서 사이버 보안의 공유 책임 모델로의 \n광범위한 전환을 반영함"
- source_sentence: AI와 관련된 정책 권장 사항을 개발하기 위해 어떤 활동을 시작했나요?
  sentences:
  - "6 Ⅰ. ICT 국가 산업 현황\n 2.ICT 정부기구\n  ① 국가통신정보관리청 (NTIA)\n 국가통신정보관리청 (NTIA)\n• 상무부 산하의 국가통신정보관리청 (National Telecommunications\
    \ and Information \nAdministration) 은 주로 통신 및 정보 정책 문제에 대하여 대통령에게 자문을 제공할 책임이 \n있는 행정 기관임\n• 국가통신정보관리청은 최근 ‘AI 업무’, ‘Open\
    \ Weight AI 모델’ 등 AI 관련 정책 권장 사항 \n개발을 위한 대중 참여, 의견 요청 등을 시작함 . 또 무선 공급망 혁신 기금을 통해 차세대 무선 \n기술 지원에 약 8,000 만 달러(약 1,068\
    \ 억 4,000 만 원)를 지원함\n[표 2] 미국 국가통신정보관리청 (NTIA)\n구분 내용\n주요 인사앨런 데이비슨\n(Alan Davidson)\n사라 모리스\n(Sarah Morris)\n국가통신정보관리청\
    \ \n청장/차관보국가통신정보관리청\n부청장 /부차관보 (대행)\n주요 소식‘AI 업무’ 행정명령에 대한 대중 참여 시작‣ AI 모델의 개방성 관련 검토에서 대중 \n참여 시작\n‣ 안전하고 접근성 높은 AI 정책\
    \ 모색\n‘무선 공급망 혁신 기금’ 지원‣ 무선 공급망 혁신 기금 3차 보조금으로 \n약 8,000 만 달러 지원\n‣ 차세대 무선 기술을 위한 토대 마련 목적\nOpen Weight AI 모델에 대한 의견 요청‣\
    \ Open Weight AI 모델 관련 위험, \n이점, 향후 정책에 대한 의견 요청 시작\n‣ 정책 권장사항 개발 목적\n주요\n산하 조직\n출처 : 미국 국가통신정보관리청"
  - "27 Ⅱ. ICT 이슈 Top10\n ⑩미 국방부 , 디지털 트윈 기술 도입 확대\n 국방부의 디지털 트윈 기술 활용 현황\n• 디지털 트윈이 전투 수행에서의 변혁적 잠재력을 인정받고 있음. 지멘스 정부 기술\
    \ \n(Siemens Government Technologies) 의 존 우스티카 (John Ustica)  사장은 광범위한 데이터 \n입력을 활용하여 결과를 모델링하고 예측하는 기술의 능력을 강조함 . 이러한\
    \ 인식은 공급망 \n관리 및 전장 능력 향상 등의 작업에서 디지털 트윈의 개발 및 적용을 가속화하기 위한 \n다양한 DOD 조직의 프로젝트로 이어짐\n• 공군은 디지털 트윈 기술 채택에 있어 선두주자로 , 위치타\
    \ 주립대학교 국립 항공 연구소에 \n1억 달러(약 1,240 억 원) 계약을 수여함으로써 입증됨 . 이 계약은 F-16 파이팅 팔콘(F-16 \nFighting Falcon)  및 B-1 랜서(B-1 Lancer)\
    \  항공기의 디지털 트윈을 생성하는 데 중점을 \n두고 있으며 , DOD가 디지털 트윈을 운영에 통합하려는 의지를 보여줌\n 디지털 트윈을 통한 군사 작전 강화 방안\n• 인공지능 /기계학습 도구와 디지털 트윈의\
    \ 통합은 물리적 무기의 성능을 크게 향상시키는 \n것으로 입증됨 . 공군 연구소 (Air Force Research Laboratory) 의 WeaponONE 포트폴리오 \n실증은 이러한 능력으로 디지털 트윈을\
    \ 성공적으로 활용함 . 이 접근법은 물리적 생산 전에 \n무기 시스템을 최적화하여 군사 작전의 효과를 높이는 동시에 시간과 자원을 절약함\n• 1970년대 기술인 ALQ-99 전술 방해 시스템 (ALQ-99 Tactical\
    \ Jamming System) 에 대한 \n해군 항공 시스템 사령부의 디지털 트윈 실험은 기존 군사 자산의 현대화 및 수명 연장 \n가능성을 증명함\n 디지털 트윈 기술의 미래 발전 방향\n• 전장 능력과 공급망\
    \ 탄력성을 업그레이드하기 위한 도구로서 디지털 트윈을 탐색하는 \n국방부의 노력은 디지털 현대화로의 전략적 전환을 나타냄 . 미 국방부는 디지털 트윈이 더 \n많은 데이터를 포함하여 의사 결정 과정의 정확도가\
    \ 높음에 주목하여 군사 작전을 계획하고 \n실행하는데 중심적인 역할을 할 것으로 기대함\n• 위치타 주립대학교 국립 항공 연구소와 같은 학술 기관과의 협력은 전문 지식과 자원을 \n통해 디지털 트윈 개발이 가속화되는\
    \ 미래를 예고함 . 이러한 협력은 혁신을 촉진할 뿐만 \n아니라 국방부 운영을 기술적으로 고도화하여 미국의 군사 준비성과 전략적 능력을 더욱 \n강화할 것으로 기대됨"
  - "10 Ⅰ. ICT 국가 산업 현황\n 3.ICT 주요정책\n  ② AI 안전 서약(Summit on AI Safety)\n AI 기업의 안전한 연구개발을 위한 서약 \n• 2023년 7월, 조 바이든 (Joe\
    \ Biden) 대통령은 AI 기술을 개발하는 주요 기업이 새로운 기술과 \n시스템을 설계･공유･테스트하는 연구개발 과정에 필요한 3가지 원칙과 8가지 세부 조항으로 \n이루어진 ‘AI 안전 서약(Summit on\
    \ AI Safety)’ 을 발표함\n• AI 안전 서약은 ▲안전 ▲보안 ▲신뢰 등 3가지 원칙을 기반으로 책임감 있는 AI(Responsible \nAI) 개발을 추진하는 것을 목적으로 함\n• 오픈AI(OpenAI),\
    \ 구글(Google), 마이크로소프트 (Microsoft), 메타(Meta), 아마존 (Amazon), \n앤트로픽 (Anthropic), 인플렉션 AI(InflectionAI) 등 대형언어모델 (LLM) 을\
    \ 보유한 주요 기업 \n7곳이 AI 안전 서약에 동의함\n• 미국 행정부는 자국에서 AI 안전 서약 의제를 진전시키고 , 동맹국 및 파트너와 협력하여 AI \n개발 및 사용을 관리하기 위한 국제 프레임워크를 구축할\
    \ 예정임 . 백악관은 보도자료를 통해 \n한국, 호주, 브라질 , 캐나다 , 칠레, 프랑스 , ​​독일, 인도, 유럽연합 (EU) 등 20개국을 언급함\n[표 6] AI 안전 서약 3가지 원칙\n원칙 세부 조항\n\
    출시 전 \n제품 안전성 보장‣ 기업은 AI 시스템 출시 전에 내·외부 보안 테스트 약속\n‣ 기업은 AI 위험 관리에 관한 정보를 업계 전반, 정부, 시민 사회, 학계와 공유하기 \n위해 최선을 다할 것 약속\n\
    보안을 최우선으로 \n하는 시스템 구축‣ 회사는 독점·미공개 모델 가중치 보호를 위해 사이버보안 및 내부 위협 보호 장치에 \n투자하기로 약속\n‣ 기업은 AI 시스템의 취약점을 제3자가 쉽게 발견하고 보고할 수\
    \ 있도록 전념\n대중의 신뢰 획득‣ 기업은 워터마킹 시스템 등 콘텐츠의 AI 생성 시기를 사용자가 알 수 있도록 강력한 \n기술 메커니즘을 개발하기 위해 노력\n‣ 기업은 AI 시스템의 기능, 한계, 적합 또는\
    \ 부적합한 사용 영역을 공개적으로 \n보고하기로 약속\n‣ 기업은 AI 시스템이 야기할 수 있는 사회적 위험에 대한 연구를 우선시하며 , 악의적 \n편견과 차별을 피하고 개인정보를 보호하기 위한 노력을 약속\n\
    ‣ 기업은 주요 사회 문제에 대처하기 위한 고급 AI 시스템을 개발·배포하기 위해 전념\n출처 : 미국 백악관"
- source_sentence: 1조 달러 클럽 기업에는 어떤 회사들이 포함되나요?
  sentences:
  - "11 Ⅰ. ICT 국가 산업 현황\n 3.ICT 주요정책\n  ③ 국가 AI R&D 전략 계획\n 책임 있는 AI R&D 투자를 위한 국가 전략 \n• 2023년 5월 미국 과학기술정책국 (OSTP) 은 책임\
    \ 있는 AI R&D 투자를 위한 ‘국가 AI R&D \n전략 계획(National AI R&D Strategic Plan)’ 업데이트를 발표함\n• 국가 AI R&D 전략 계획은 9대 전략으로 이루어져 있으며\
    \ , 그 내용은 이하와 같음\n① 책임 있는 AI 연구에 대한 장기 투자: AI 분야 글로벌 리더십 확보와 공익에 기여하는 책임 \n있는 혁신을 위해 생성형 AI 등 차세대 AI에 대한 투자를 우선\n② 인간과\
    \ AI의 협업을 위한 효과적인 방법 개발: 인간의 능력을 효과적으로 보완하는 AI \n시스템을 만드는 방법에 대한 이해 제고\n③ AI의 윤리적 , 법적, 사회적 영향에 대한 이해 및 대응: AI 시스템이 국가의\
