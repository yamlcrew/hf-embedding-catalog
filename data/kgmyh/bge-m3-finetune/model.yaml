      \ ‘Open Weight AI 모델’ 등 AI 관련 정책 권장 사항 \n개발을 위한 대중 참여, 의견 요청 등을 시작함 . 또 무선 공급망 혁신 기금을 통해 차세대 무선 \n기술 지원에 약 8,000 만 달러(약\
