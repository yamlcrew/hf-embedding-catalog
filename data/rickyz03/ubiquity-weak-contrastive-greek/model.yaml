widgetData:
- source_sentence: εἰ δὲ καὶ τὸν ψωμόν μου ἔφαγον μόνος καὶ οὐχὶ ὀρφανῷ μετέδωκα·
  sentences:
  - Σῶσόν με, ὁ θεός, ὅτι εἰσήλθοσαν ὕδατα ἕως ψυχῆς μου.
  - τὰ κρέα ἔτι ἦν ἐν τοῖς ὀδοῦσιν αὐτῶν πρὶν ἢ ἐκλείπειν, καὶ κύριος ἐθυμώθη εἰς τὸν λαόν, και ἐπάταξεν κύριος ἐν τῷ λαῷ
    πληγὴν μεγάλην σφόδρα.
  - καὶ οὐκ ἔφαγον ἐν ὀδύνῃ μου ἀπʼ αὐτῶν, οὐκ ἐκάρπωσα ἀπʼ αὐτῶν εἰς ἀκάθαρτον, οὐκ ἔδωκα ἀπʼ αὐτῶν τῷ τεθνηκότι· ὑπήκουσα
    τῆς φωνῆς κυρίου τοῦ θεοῦ μου, ἐποίησα καθότι ἐνετείλω μοι.
- source_sentence: καὶ μετὰ τὸ ὑπνῶσαι αὐτὸν ἐπροφήτευσεν καὶ ὑπέδειξεν βασιλεῖ τὴν τελευτὴν αὐτοῦ καὶ ἀνύψωσεν ἐκ γῆς τὴν
    φωνὴν αὐτοῦ ἐν προφητείᾳ ἐξαλεῖψαι ἀνομίαν λαοῦ.
  sentences:
  - πᾶς λόγος οὐχ ὑπερῆρεν αὐτόν, καὶ ἐν κοιμήσει ἐπροφήτευσεν τὸ σῶμα αὐτοῦ.
  - οὗτοι εἰσελεύσονται εἰς τὰ ἅγιά μου, καὶ οὗτοι προσελεύσονται πρὸς τὴν τράπεζάν μου τοῦ λειτουργεῖν μοι καὶ φυλάξουσι
    τὰς φυλακάς μου.
  - διαθῆκαι αἰῶνος ἐτέθησαν πρὸς αὐτόν, ἵνα μὴ ἐξαλειφθῇ κατακλυσμῷ πᾶσα σάρξ.
- source_sentence: Αλληλουια. Ἐξομολογεῖσθε τῷ κυρίῳ, ὅτι χρηστός, ὅτι εἰς τὸν αἰῶνα τὸ ἔλεος αὐτοῦ·
  sentences:
  - καὶ ὄνομα τῷ ποταμῷ τῷ δευτέρῳ Γηών· οὗτος ὁ κυκλῶν πᾶσαν τὴν γῆν Αἰθιοπίας.
  - Αλληλουια. Ἐν ἐξόδῳ Ισραηλ ἐξ Αἰγύπτου, οἴκου Ιακωβ ἐκ λαοῦ βαρβάρου
  - καὶ ἔστησα τὴν διαθήκην μου πρὸς αὐτούς, ὥστε δοῦναι αὐτοῖς τὴν γῆν τῶν Χαναναίων, τὴν γῆν, ἣν παρῳκήκασιν, ἐν ᾗ καὶ παρῴκησαν
    ἐπʼ αὐτῆς.
- source_sentence: καὶ ἐπέβη ἐπὶ χερουβιν καὶ ἐπετάσθη, ἐπετάσθη ἐπὶ πτερύγων ἀνέμων.
  sentences:
  - ἐν τῇ καρδίᾳ μου ἔκρυψα τὰ λόγιά σου, ὅπως ἂν μὴ ἁμάρτω σοι.
  - Ἡ δὲ τοῦ βασιλέως ἐπιστολὴ περιεῖχεν οὕτως Βασιλεὺς Ἀντίοχος τῷ ἀδελφῷ Λυσίᾳ χαίρειν.
  - καὶ ὄψεται αὐτὸν ὁ ἱερεύς, καὶ ἰδοὺ μετέβαλεν θρὶξ λευκὴ εἰς τὸ αὐγάζον, καὶ ἡ ὄψις αὐτοῦ ταπεινὴ ἀπὸ τοῦ δέρματος, λέπρα
    ἐστίν· ἐν τῷ κατακαύματι ἐξήνθησεν· καὶ μιανεῖ αὐτὸν ὁ ἱερεύς, ἁφὴ λέπρας ἐστίν.
- source_sentence: καὶ ἐξήγαγεν αὐτοὺς ἐκ σκότους καὶ σκιᾶς θανάτου καὶ τοὺς δεσμοὺς αὐτῶν διέρρηξεν.
  sentences:
  - ὅτι ποῖον ἔθνος μέγα, ᾧ ἐστιν αὐτῷ θεὸς ἐγγίζων αὐτοῖς ὡς κύριος ὁ θεὸς ἡμῶν ἐν πᾶσιν, οἷς ἂν αὐτὸν ἐπικαλεσώμεθα;
  - καὶ ἔσται ὡς ἀγριομυρίκη ἐν τῇ ἐρήμῳ, οὐκ ὄψεται ὅταν ἔλθῃ τὰ ἀγαθά, καὶ κατασκηνώσει ἐν ἁλίμοις, ἐν ἐρήμῳ, ἐν γῇ ἁλμυρᾷ
    ἥτις οὐ κατοικεῖται.
  - ἄκουσον, θύγατερ, καὶ ἰδὲ καὶ κλῖνον τὸ οὖς σου καὶ ἐπιλάθου τοῦ λαοῦ σου καὶ τοῦ οἴκου τοῦ πατρός σου,
