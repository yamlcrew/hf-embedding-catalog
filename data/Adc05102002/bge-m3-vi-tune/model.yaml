    \ Thủ trưởng cơ quan các cấp chịu trách nhiệm chi tiền thưởng cho các tập thể, cá nhân thuộc biên chế, quỹ lương do cấp\
    \ mình quản lý và hạch toán chi theo quy định.\nCác tập thể, cá nhân thuộc bộ, ban, ngành, đoàn thể trung ương, tỉnh,\
    \ thành phố trực thuộc trung ương được Thủ tướng Chính phủ, Chủ tịch nước quyết định khen thưởng thì bộ, ban, ngành, tỉnh,\
    \ đoàn thể trung ương đó có trách nhiệm chi thưởng từ ngân sách nhà nước của cấp mình và hạch toán chi thành mục riêng.\n\
    Cá nhân được nhận danh hiệu Nhà giáo, Thầy thuốc, Nghệ sỹ, Nghệ nhân (nhân dân và ưu tú) thuộc bộ, ban, ngành, tỉnh, đoàn\
    \ thể trung ương trình Thủ tướng Chính phủ xét, phong tặng thì bộ, ban, ngành, tỉnh, đoàn thể trung ương đó chi trả tiền\
    \ thưởng và hạch toán chi thành mục riêng."
  - "của cử tri;\n\n\t\tĐiểm d) Chỉ đạo, áp dụng biện pháp cần thiết giải quyết công việc trong trường hợp đột xuất, khẩn\
