    sentences:
    - "việc sau:\n- Xây dựng phương án, kế hoạch thực hiện kiểm kê đất đai, lập bản đồ hiện trạng sử dụng đất trên địa bàn\
      \ cấp huyện;\n- Chuẩn bị nhân lực, thiết bị kỹ thuật, tài chính theo quy định phục vụ cho kiểm kê đất đai, lập bản đồ\
      \ hiện trạng sử dụng đất; phân công trách nhiệm và sự phối hợp giữa các lực lượng thực hiện;\n- Thu thập, đánh giá,\
      \ lựa chọn các tài liệu đất đai có liên quan phục vụ kiểm kê đất đai gồm hồ sơ quy hoạch, kế hoạch sử dụng đất; kết\
      \ quả thống kê đất đai 05 năm gần nhất, kết quả kiểm kê đất đai, lập bản đồ hiện trạng sử dụng đất hai kỳ trước đó;\n\
      - Phối hợp với Chi nhánh Văn phòng đăng ký đất đai rà soát, tổng hợp các trường hợp biến động về đất đai đã thực hiện\
      \ xong thủ tục hành chính trong kỳ kiểm kê đất đai thuộc thẩm quyền của Ủy ban nhân dân cấp huyện (theo mẫu Phụ lục\
      \ số \n\t\tĐiểm d) Ủy ban nhân dân cấp xã tổ chức thực hiện và hoàn thành trước thời điểm kiểm kê đất đai đối với các\
      \ công việc sau:\n- Xây dựng phương án, kế hoạch thực hiện kiểm kê đất đai trên địa bàn xã;\n- Chuẩn bị nhân lực, thiết\
      \ bị kỹ thuật phục vụ cho kiểm kê đất đai; phân công trách nhiệm cho các lực lượng tham gia hực hiện;\n- Phổ biến, quán\
      \ triệt nhiệm vụ đến các cán bộ và tuyên truyền cho người dân về chủ trương, kế hoạch kiểm kê;\n- Thu thập các tài liệu,\
      \ số liệu về đất đai hiện có phục vụ cho kiểm kê gồm các loại bản đồ, dữ liệu phục vụ cho điều tra khoanh vẽ hiện trạng;\
      \ hồ sơ địa chính; thông báo chỉnh lý biến động và trích lục bản đồ, sơ đồ kèm theo; hồ sơ thanh tra, kiểm tra, xử lý\
      \ vi phạm trong sử dụng đất; kết quả thống kê đất đai của 05 năm gần nhất, kết quả kiểm kê đất đai, lập bản đồ hiện\
      \ trạng sử dụng đất hai kỳ trước đó; bảng tổng hợp các trường hợp biến động trong kỳ kiểm kê do Văn phòng Đăng ký đất\
      \ đai chuyển đến và các hồ sơ, tài liệu đất đai khác có liên quan;\n- Rà soát, đối chiếu, đánh giá khả năng sử dụng,\
      \ lựa chọn các tài liệu, số liệu, bản đồ thu thập để sử dụng cho kiểm kê;\n- Rà soát phạm vi ranh giới hành chính trên\
      \ bản đồ sử dụng cho điều tra kiểm kê để chỉnh lý thống nhất với bản đồ biên giới, bản đồ địa giới hành chính mới nhất\
      \ đã được cơ quan có thẩm quyền phê duyệt. Trường hợp đường địa giới hành chính cấp xã đang có tranh chấp hoặc không\
      \ thống nhất giữa hồ sơ địa giới với thực địa thì Ủy ban nhân dân của các đơn vị hành chính cấp xã có liên quan làm\
      \ việc để thống nhất xác định phạm vi, trách nhiệm kiểm kê đất đai của từng bên theo quy định tại khoản 3 Điều 11 của\
      \ Thông tư này;\n- In ấn tài liệu phục vụ cho kiểm kê đất đai (trừ bản đồ phục vụ điều tra);\n-"
    - "Điều 22. Báo tin và xử lý tin báo về sự cố, tai nạn giao thông đường sắt\n\n\tKhoản 1. Khi có sự cố, tai nạn xảy ra\
      \ lái tàu hoặc nhân viên hỗ trợ an toàn phải báo ngay cho nhân viên điều độ chạy tàu.\n\n\t\tĐiểm a) Các ga hai đầu\
      \ khu gian;\n\n\t\tĐiểm b) Doanh nghiệp kinh doanh đường sắt đô thị.\n\n\t\tĐiểm a) Cơ quan công an nơi gần nhất;\n\n\
      \t\tĐiểm b) Ủy ban nhân dân cấp tỉnh (trong trường hợp xảy ra tai nạn chết người và trong các trường hợp cần sự phối\
      \ hợp của Ủy ban nhân dân các cấp) và các đơn vị có liên quan.\n\n\tKhoản 4. Doanh nghiệp kinh doanh đường sắt đô thị\
      \ quy định việc báo tin sự cố giao thông đường sắt gây ra không phải dừng tàu, không bế tắc chính tuyến, không ảnh hưởng\
      \ đến biểu đồ chạy tàu.\n\n\tKhoản 5. Trường hợp quá thời gian chạy tàu trong khu gian theo kế hoạch chạy tàu mà không\
      \ xác định được thông tin về đoàn tàu, nhân viên phục vụ chạy tàu tại ga đón phải thông báo tới Tổ chức điều hành giao\
      \ thông vận tải đường sắt đô thị để có biện pháp xử lý tình huống và tổ chức xác định vị trí đoàn tàu trong khu gian.\
      \ Đồng thời báo ngay cho nhân viên điều độ chạy tàu để có biện pháp xử lý tình huống.\n\n\t\tĐiểm a) Khi xảy ra sự cố,\
      \ tai nạn các cá nhân có liên quan phải nhanh chóng tìm mọi biện pháp, thông qua các phương tiện thông tin, liên lạc\
      \ hoặc gặp trực tiếp để báo tin về sự cố, tai nạn đến các tổ chức, cá nhân có liên quan theo quy định tại Khoản 1, Khoản\
      \ 2 và Khoản 3 Điều này;\n\n\t\tĐiểm b) Trong trường hợp các cá nhân quy định tại Khoản 1, Khoản 2 và Khoản 3 Điều này\
      \ không thể liên lạc được với một trong số các tổ chức, cá nhân có liên quan thì yêu cầu tổ chức, cá nhân mình đã liên\
      \ lạc được cùng phối hợp, hỗ trợ trong việc báo tin cho tổ chức, cá nhân còn lại.\n\n\t\tĐiểm a) Địa điểm xảy ra sự\
      \ cố, tai nạn (km, khu gian, xã, phường, quận, huyện, tỉnh, thành phố);\n\n\t\tĐiểm b) Thời gian xảy ra sự cố, tai nạn;\n\
      \n\t\tĐiểm c) Số người chết, số người bị thương (nếu có);\n\n\t\tĐiểm d) Sơ bộ trạng thái hiện trường, phương tiện bị\
      \ sự cố, tai nạn; kết cấu hạ tầng bị ảnh hưởng do sự cố, tai nạn gây ra;\n\n\t\tĐiểm đ) Ngoài việc báo tin ban đầu theo\
      \ quy định tại Khoản 1 Điều này, nhân viên điều độ chạy tàu phải lập báo cáo tai nạn theo Mẫu quy định tại Phụ lục số\
      \ 1 ban hành kèm theo Thông tư này. Báo cáo tai nạn được gửi cùng Hồ sơ vụ việc về sự cố, tai nạn tới các cơ quan chức\
      \ năng theo quy định tại Khoản 3 Điều 22 của Thông tư này.\n\n"
    - "đường bộ giao nhau, nơi đường bộ giao nhau cùng mức với đường sắt, nơi tầm nhìn bị che khuất; lùi xe không quan sát\
      \ hoặc không có tín hiệu báo trước, trừ hành vi vi phạm quy định tại điểm a khoản 8 Điều này;\n\n\t\tĐiểm p) Không thắt\
      \ dây an toàn khi điều khiển xe chạy trên đường;\n\n\t\tĐiểm q) Chở người trên xe ô tô không thắt dây an toàn (tại vị\
      \ trí có trang bị dây an toàn) khi xe đang chạy;\n\n\t\tĐiểm r) Chạy trong hầm đường bộ không sử dụng đèn chiếu sáng\
      \ gần;\n\n\t\tĐiểm s) Điều khiển xe chạy dưới tốc độ tối thiểu trên những đoạn đường bộ có quy định tốc độ tối thiểu\
      \ cho phép.\n\n\tKhoản 4. Phạt tiền từ \n\tKhoản 000.000 đồng đến \n\t\tĐiểm a) Dùng tay sử dụng điện thoại di động\
      \ khi đang điều khiển xe chạy trên đường;\n\n\t\tĐiểm b) Đi vào khu vực cấm, đường có biển báo hiệu có nội dung cấm\
      \ đi vào đối với loại phương tiện đang điều khiển, trừ các hành vi vi phạm quy định tại điểm c khoản 5, điểm a khoản\
      \ 8 Điều này và các trường hợp xe ưu tiên đang đi làm nhiệm vụ khẩn cấp theo quy định;\n\n\t\tĐiểm c) Điều khiển xe\
      \ không đủ điều kiện để thu phí theo hình thức điện tử tự động không dừng đi vào làn đường dành riêng thu phí theo hình\
      \ thức điện tử tự động không dừng tại các trạm thu phí;\n\n\t\tĐiểm d) Dừng xe, đỗ xe tại vị trí: Bên trái đường một\
      \ chiều hoặc bên trái (theo hướng lưu thông) của đường đôi; trên đoạn đường cong hoặc gần đầu dốc nơi tầm nhìn bị che\
      \ khuất; trên cầu, gầm cầu vượt, song song với một xe khác đang dừng, đỗ, trừ hành vi vi phạm quy định tại điểm b khoản\
      \ 6 Điều này;\n\n\t\tĐiểm đ) Dừng xe, đỗ xe, quay đầu xe trái quy định gây ùn tắc giao thông;\n\n\t\tĐiểm e) Xe không\
      \ được quyền ưu tiên lắp đặt, sử dụng thiết bị phát tín hiệu của xe được quyền ưu tiên;\n\n\t\tĐiểm g) Không thực hiện\
      \ biện pháp bảo đảm an toàn theo quy định khi xe ô tô bị hư hỏng ngay tại nơi đường bộ giao nhau cùng mức với đường\
      \ sắt;\n\n\t\tĐiểm h) Không nhường đường cho xe xin vượt khi có đủ điều kiện an toàn;\n\n\t\tĐiểm i) Lùi xe, quay đầu\
      \ xe trong hầm đường bộ; dừng xe, đỗ xe, vượt xe trong hầm đường bộ không đúng nơi quy định.\n\n\tKhoản 5. Phạt tiền\
      \ từ \n\tKhoản 000.000 đồng đến \n\t\tĐiểm a) Không chấp hành hiệu lệnh của đèn tín hiệu giao thông;\n\n\t\tĐiểm b)\
      \ Không chấp hành hiệu lệnh, hướng dẫn của người điều khiển giao thông hoặc người kiểm soát giao thông;\n\n\t\tĐiểm\
      \ c) Đi ngược chiều của đường một chiều, đi ngược chiều trên đường có biển \n\t\t\t“Cấm đi ngược chiều”\n, trừ các hành\
      \ vi vi phạm quy định tại điểm a khoản 8 Điều này và các trường hợp xe ưu tiên đang đi làm nhiệm vụ khẩn cấp theo quy\
      \ định;\n\n\t\tĐiểm d) Vượt xe trong những trường hợp không được vượt, vượt xe tại đoạn đường có biển báo hiệu có nội\
      \ dung cấm vượt (đối với loại phương tiện đang điều khiển); không có báo hiệu trước khi vượt; vượt bên phải xe khác\
      \ trong"
  - source_sentence: Có giấy chứng nhận tốt nghiệp tạm thời có được tham dự khóa đào tạo nghề luật sư không?
    sentences:
    - "đồng do Chủ tịch Liên đoàn luật sư Việt Nam quyết định. \n\t\t\t Người đạt yêu cầu kiểm tra kết quả tập sự hành nghề\
      \ luật sư được Hội đồng kiểm tra cấp Giấy chứng nhận kiểm tra kết quả tập sự hành nghề luật sư. \n\t\t\t 3. Bộ Tư pháp\
      \ có trách nhiệm hướng dẫn và giám sát việc tổ chức kiểm tra kết quả tập sự hành nghề luật sư.\" \n\t\t\t 7. Điều 16\
      \ được sửa đổi, bổ sung như sau: \n\t\t\t “Điều 16. Người được miễn, giảm thời gian tập sự hành nghề luật sư \n\t\t\t\
      \ 1. Người đã là thẩm phán, kiểm sát viên, điều tra viên cao cấp, điều tra viên trung cấp, giáo sư, phó giáo sư chuyên\
      \ ngành luật, tiến sỹ luật, thẩm tra viên cao cấp ngành Tòa án, kiểm tra Viên cao cấp ngành Kiểm sát, chuyên viên cao\
      \ cấp, nghiên cứu viên cao cấp, giảng viên cao cấp trong lĩnh vực pháp luật được miễn tập sự hành nghề luật sư. \n\t\
      \t\t 2. Người đã là điều tra viên sơ cấp, thẩm tra viên chính ngành Tòa án, kiểm tra viên chính ngành Kiểm sát, chuyên\
      \ viên chính, nghiên cứu viên chính, giảng viên chính trong lĩnh vực pháp luật được giảm hai phần ba thời gian tập sự\
      \ hành nghề luật sư. \n\t\t\t 3. Người có thời gian công tác ở các ngạch chuyên viên, nghiên cứu viên, giảng viên trong\
      \ lĩnh vực pháp luật, thẩm tra viên ngành Tòa án, kiểm tra viên ngành Kiểm sát từ mười năm trở lên thì được giảm một\
      \ nửa thời gian tập sự hành nghề luật sư.”\n\n\n\tKhoản 8. Điều 17\nđược sửa đổi, bổ sung như sau:\n\n\t\t\t“Điều 17.\
      \ Cấp Chứng chỉ hành nghề luật sư \n\t\t\t 1. Người đạt yêu cầu kiểm tra kết quả tập sự hành nghề luật sư có hồ sơ đề\
      \ nghị cấp Chứng chỉ hành nghề luật sư gửi Ban chủ nhiệm Đoàn luật sư. \n\t\t\t Hồ sơ gồm có: \n\t\t\t a) Đơn đề nghị\
      \ cấp Chứng chỉ hành nghề luật sư theo mẫu do Bộ Tư pháp ban hành; \n\t\t\t b) Phiếu lý lịch tư pháp; \n\t\t\t c) Giấy\
      \ chứng nhận sức khỏe; \n\t\t\t d) Bản sao Bằng cử nhân luật hoặc bản sao Bằng thạc sỹ luật; \n\t\t\t đ) Bản sao Giấy\
      \ chứng nhận kiểm tra kết quả tập sự hành nghề luật sư. \n\t\t\t Trong thời hạn bảy ngày làm việc, kể từ ngày nhận đủ\
      \ hồ sơ hợp lệ, Ban chủ nhiệm Đoàn luật sư chuyển hồ sơ cho Sở Tư pháp kèm theo bản xác nhận người đề nghị cấp Chứng\
      \ chỉ hành nghề luật sư có đủ tiêu chuẩn luật sư theo quy định của Luật này. \n\t\t\t 2. Người được miễn tập sự hành\
      \ nghề luật sư có hồ sơ đề nghị cấp Chứng chỉ hành nghề luật sư gửi Sở Tư pháp nơi người đó thường trú. \n\t\t\t Hồ\
      \ sơ gồm có: \n\t\t\t a) Các giấy tờ quy định tại các điểm a, b và c khoản 1 Điều này; \n\t\t\t b) Giấy tờ quy định\
      \ tại điểm d khoản 1 Điều này, trừ những người là giáo sư, phó giáo sư chuyên ngành luật, tiến sỹ luật; \n\t\t\t c)\
      \ Bản sao giấy tờ chứng minh là người được miễn tập sự hành nghề luật sư quy định tại khoản 1"
    - "Điều 10. Vi phạm quy định về quản lý rừng bền vững\n\n\tKhoản 1. Phạt tiền từ \n\tKhoản 000.000 đồng đến \n\tKhoản\
      \ 000.000 đồng đối với hành vi không xây dựng, trình cấp có thẩm quyền phê duyệt phương án quản lý rừng bền vững hoặc\
      \ không thực hiện đúng phương án quản lý rừng bền vững đã được cấp có thẩm quyền phê duyệt.\n\n\tKhoản 2. Phạt tiền\
      \ từ \n\tKhoản 000.000 đồng đến \n\tKhoản 000.000 đồng đối với hành vi đánh giá, cấp chứng chỉ quản lý rừng bền vững\
      \ không đúng quy định của pháp luật về tiêu chí quản lý rừng bền vững.\n\n\t\tĐiểm a) Buộc xây dựng phương án quản lý\
      \ rừng bền vững trình cấp có thẩm quyền phê duyệt đối với hành vi quy định tại khoản 1 Điều này;\n\n\t\tĐiểm b) Buộc\
      \ thu hồi chứng chỉ quản lý rừng bền vững đã cấp đối với hành vi quy định tại khoản 2 Điều này."
    - "Điều 6. Ghi nhãn dụng cụ chứa hóa chất trong kho chứa hóa chất, trong phòng thí nghiệm\n\n\tKhoản 1. Hóa chất đóng\
      \ thùng, đóng chai, bao gói nguyên đai, nguyên kiện tồn chứa trong kho chứa hóa chất và lưu giữ trong phòng thí nghiệm\
      \ thực hiện ghi nhãn dụng cụ chứa hóa chất theo quy định tại khoản 3,4 Điều 27 Luật hóa chất.\n\n\t\tĐiểm a) Ghi nhãn\
      \ trên dụng cụ chứa hóa chất trong kho chứa hóa chất bảo đảm các thông tin: tên hóa chất, công thức hóa học; biện pháp\
      \ phòng ngừa để sử dụng an toàn; thời hạn sử dụng; hình đồ cảnh báo, từ cảnh báo, cảnh báo nguy cơ (nếu có).\n\n\t\t\
      Điểm b) Ghi nhãn trên dụng cụ chứa hóa chất sử dụng trong quá trình thực hiện thí nghiệm, nghiên cứu khoa học bảo đảm\
      \ một hoặc một số thông tin sau:\n- Tên hóa chất, công thức hóa học;\n- Hàm lượng, nồng độ hoặc thành phần chính."
  - source_sentence: Phạt cọc gấp đôi thì có đúng quy định pháp luật?
    sentences:
    - "khẩn cấp theo quy định;\n\n\t\tĐiểm d) Vượt xe trong những trường hợp không được vượt, vượt xe tại đoạn đường có biển\
      \ báo hiệu có nội dung cấm vượt (đối với loại phương tiện đang điều khiển); không có báo hiệu trước khi vượt; vượt bên\
      \ phải xe khác trong trường hợp không được phép, trừ trường hợp tại đoạn đường có nhiều làn đường cho xe đi cùng chiều\
      \ được phân biệt bằng vạch kẻ phân làn đường mà xe chạy trên làn đường bên phải chạy nhanh hơn xe đang chạy trên làn\
      \ đường bên trái;\n\n\t\tĐiểm đ) Điều khiển xe không đi bên phải theo chiều đi của mình; đi không đúng phần đường hoặc\
      \ làn đường quy định (làn cùng chiều hoặc làn ngược chiều) trừ hành vi quy định tại điểm c khoản 4 Điều này; điều khiển\
      \ xe đi qua dải phân cách cố định ở giữa hai phần đường xe chạy; điều khiển xe đi trên hè phố, trừ trường hợp điều khiển\
      \ xe đi qua hè phố để vào nhà;\n\n\t\tĐiểm e) Tránh xe đi ngược chiều không đúng quy định, trừ hành vi vi phạm sử dụng\
      \ đèn chiếu xa khi tránh xe đi ngược chiều quy định tại điểm g khoản 3 Điều này; không nhường đường cho xe đi ngược\
      \ chiều theo quy định tại nơi đường hẹp, đường dốc, nơi có chướng ngại vật;\n\n\t\tĐiểm g) Không tuân thủ các quy định\
      \ khi vào hoặc ra đường cao tốc; điều khiển xe chạy ở làn dừng xe khẩn cấp hoặc phần lề đường của đường cao tốc; chuyển\
      \ làn đường không đúng nơi cho phép hoặc không có tín hiệu báo trước khi chạy trên đường cao tốc; không tuân thủ quy\
      \ định về khoảng cách an toàn đối với xe chạy liền trước khi chạy trên đường cao tốc;\n\n\t\tĐiểm h) Không nhường đường\
      \ hoặc gây cản trở xe được quyền ưu tiên đang phát tín hiệu ưu tiên đi làm nhiệm vụ;\n\n\t\tĐiểm i) Điều khiển xe chạy\
      \ quá tốc độ quy định từ 10 km/h đến 20 km/h.\n\n\tKhoản 6. Phạt tiền từ \n\tKhoản 000.000 đồng đến \n\t\tĐiểm a) Điều\
      \ khiển xe chạy quá tốc độ quy định trên 20 km/h đến 35 km/h;\n\n\t\tĐiểm b) Dừng xe, đỗ xe trên đường cao tốc không\
      \ đúng nơi quy định; không có báo hiệu để người lái xe khác biết khi buộc phải dừng xe, đỗ xe trên đường cao tốc không\
      \ đúng nơi quy định; quay đầu xe trên đường cao tốc;\n\n\t\tĐiểm c) Điều khiển xe trên đường mà trong máu hoặc hơi thở\
      \ có nồng độ cồn nhưng chưa vượt quá 50 miligam/100 mililít máu hoặc chưa vượt quá 0,25 miligam/1 lít khí thở.\n\n\t\
      Khoản 7. Phạt tiền từ \n\tKhoản 000.000 đồng đến 1\n\t\tĐiểm a) Không chú ý quan sát, điều khiển xe chạy quá tốc độ\
      \ quy định gây tai nạn giao thông; dừng xe, đỗ xe, quay đầu xe, lùi xe, tránh xe, vượt xe, chuyển hướng, chuyển làn\
      \ đường không đúng quy định gây tai nạn giao thông; không đi đúng phần đường, làn đường, không giữ khoảng cách an toàn\
      \ giữa hai xe theo quy định gây tai nạn giao thông hoặc đi vào đường có biển báo hiệu có nội dung cấm đi vào đối với\
      \ loại phương tiện đang điều khiển, đi ngược chiều của đường một chiều,"
    - "đường bộ giao nhau, nơi đường bộ giao nhau cùng mức với đường sắt, nơi tầm nhìn bị che khuất; lùi xe không quan sát\
      \ hoặc không có tín hiệu báo trước, trừ hành vi vi phạm quy định tại điểm a khoản 8 Điều này;\n\n\t\tĐiểm p) Không thắt\
      \ dây an toàn khi điều khiển xe chạy trên đường;\n\n\t\tĐiểm q) Chở người trên xe ô tô không thắt dây an toàn (tại vị\
      \ trí có trang bị dây an toàn) khi xe đang chạy;\n\n\t\tĐiểm r) Chạy trong hầm đường bộ không sử dụng đèn chiếu sáng\
      \ gần;\n\n\t\tĐiểm s) Điều khiển xe chạy dưới tốc độ tối thiểu trên những đoạn đường bộ có quy định tốc độ tối thiểu\
      \ cho phép.\n\n\tKhoản 4. Phạt tiền từ \n\tKhoản 000.000 đồng đến \n\t\tĐiểm a) Dùng tay sử dụng điện thoại di động\
      \ khi đang điều khiển xe chạy trên đường;\n\n\t\tĐiểm b) Đi vào khu vực cấm, đường có biển báo hiệu có nội dung cấm\
      \ đi vào đối với loại phương tiện đang điều khiển, trừ các hành vi vi phạm quy định tại điểm c khoản 5, điểm a khoản\
      \ 8 Điều này và các trường hợp xe ưu tiên đang đi làm nhiệm vụ khẩn cấp theo quy định;\n\n\t\tĐiểm c) Điều khiển xe\
      \ không đủ điều kiện để thu phí theo hình thức điện tử tự động không dừng đi vào làn đường dành riêng thu phí theo hình\
      \ thức điện tử tự động không dừng tại các trạm thu phí;\n\n\t\tĐiểm d) Dừng xe, đỗ xe tại vị trí: Bên trái đường một\
      \ chiều hoặc bên trái (theo hướng lưu thông) của đường đôi; trên đoạn đường cong hoặc gần đầu dốc nơi tầm nhìn bị che\
      \ khuất; trên cầu, gầm cầu vượt, song song với một xe khác đang dừng, đỗ, trừ hành vi vi phạm quy định tại điểm b khoản\
      \ 6 Điều này;\n\n\t\tĐiểm đ) Dừng xe, đỗ xe, quay đầu xe trái quy định gây ùn tắc giao thông;\n\n\t\tĐiểm e) Xe không\
      \ được quyền ưu tiên lắp đặt, sử dụng thiết bị phát tín hiệu của xe được quyền ưu tiên;\n\n\t\tĐiểm g) Không thực hiện\
      \ biện pháp bảo đảm an toàn theo quy định khi xe ô tô bị hư hỏng ngay tại nơi đường bộ giao nhau cùng mức với đường\
      \ sắt;\n\n\t\tĐiểm h) Không nhường đường cho xe xin vượt khi có đủ điều kiện an toàn;\n\n\t\tĐiểm i) Lùi xe, quay đầu\
      \ xe trong hầm đường bộ; dừng xe, đỗ xe, vượt xe trong hầm đường bộ không đúng nơi quy định.\n\n\tKhoản 5. Phạt tiền\
      \ từ \n\tKhoản 000.000 đồng đến \n\t\tĐiểm a) Không chấp hành hiệu lệnh của đèn tín hiệu giao thông;\n\n\t\tĐiểm b)\
      \ Không chấp hành hiệu lệnh, hướng dẫn của người điều khiển giao thông hoặc người kiểm soát giao thông;\n\n\t\tĐiểm\
      \ c) Đi ngược chiều của đường một chiều, đi ngược chiều trên đường có biển \n\t\t\t“Cấm đi ngược chiều”\n, trừ các hành\
      \ vi vi phạm quy định tại điểm a khoản 8 Điều này và các trường hợp xe ưu tiên đang đi làm nhiệm vụ khẩn cấp theo quy\
      \ định;\n\n\t\tĐiểm d) Vượt xe trong những trường hợp không được vượt, vượt xe tại đoạn đường có biển báo hiệu có nội\
      \ dung cấm vượt (đối với loại phương tiện đang điều khiển); không có báo hiệu trước khi vượt; vượt bên phải xe khác\
      \ trong"
    - "Điều 328. Đặt cọc\n\n\tKhoản 1. Đặt cọc là việc một bên (sau đây gọi là bên đặt cọc) giao cho bên kia (sau đây gọi\
      \ là bên nhận đặt cọc) một khoản tiền hoặc kim khí quý, đá quý hoặc vật có giá trị khác (sau đây gọi chung là tài sản\
      \ đặt cọc) trong một thời hạn để bảo đảm giao kết hoặc thực hiện hợp đồng.\n\n\tKhoản 2. Trường hợp hợp đồng được giao\
      \ kết, thực hiện thì tài sản đặt cọc được trả lại cho bên đặt cọc hoặc được trừ để thực hiện nghĩa vụ trả tiền; nếu\
      \ bên đặt cọc từ chối việc giao kết, thực hiện hợp đồng thì tài sản đặt cọc thuộc về bên nhận đặt cọc; nếu bên nhận\
      \ đặt cọc từ chối việc giao kết, thực hiện hợp đồng thì phải trả cho bên đặt cọc tài sản đặt cọc và một khoản tiền tương\
      \ đương giá trị tài sản đặt cọc, trừ trường hợp có thỏa thuận khác."
  - source_sentence: Không có chứng minh có được thăm chồng ở trung tâm cai nghiện không?
    sentences:
    - "Điều 3. Giải thích từ ngữ\n\tKhoản 1. Hôn nhân là quan hệ giữa vợ và chồng sau khi kết hôn.\n\n\tKhoản 2. Gia đình\
      \ là tập hợp những người gắn bó với nhau do hôn nhân, quan hệ huyết thống hoặc quan hệ nuôi dưỡng, làm phát sinh các\
      \ quyền và nghĩa vụ giữa họ với nhau theo quy định của Luật này.\n\n\tKhoản 3. Chế độ hôn nhân và gia đình là toàn bộ\
      \ những quy định của pháp luật về kết hôn, ly hôn; quyền và nghĩa vụ giữa vợ và chồng, giữa cha mẹ và con, giữa các\
      \ thành viên khác trong gia đình; cấp dưỡng; xác định cha, mẹ, con; quan hệ hôn nhân và gia đình có yếu tố nước ngoài\
      \ và những vấn đề khác liên quan đến hôn nhân và gia đình.\n\n\tKhoản 4. Tập quán về hôn nhân và gia đình là quy tắc\
      \ xử sự có nội dung rõ ràng về quyền, nghĩa vụ của các bên trong quan hệ hôn nhân và gia đình, được lặp đi, lặp lại\
      \ trong một thời gian dài và được thừa nhận rộng rãi trong một vùng, miền hoặc cộng đồng.\n\n\tKhoản 5. Kết hôn là việc\
      \ nam và nữ xác lập quan hệ vợ chồng với nhau theo quy định của Luật này về điều kiện kết hôn và đăng ký kết hôn.\n\n\
      \tKhoản 6. Kết hôn trái pháp luật là việc nam, nữ đã đăng ký kết hôn tại cơ quan nhà nước có thẩm quyền nhưng một bên\
      \ hoặc cả hai bên vi phạm điều kiện kết hôn theo quy định tại Điều 8 của Luật này.\n\n\tKhoản 7. Chung sống như vợ chồng\
      \ là việc nam, nữ tổ chức cuộc sống chung và coi nhau là vợ chồng.\n\n\tKhoản 8. Tảo hôn là việc lấy vợ, lấy chồng khi\
      \ một bên hoặc cả hai bên chưa đủ tuổi kết hôn theo quy định tại điểm a khoản 1 Điều 8 của Luật này.\n\n\tKhoản 9. Cưỡng\
      \ ép kết hôn, ly hôn là việc đe dọa, uy hiếp tinh thần, hành hạ, ngược đãi, yêu sách của cải hoặc hành vi khác để buộc\
      \ người khác phải kết hôn hoặc ly hôn trái với ý muốn của họ.\n\n\tKhoản 10. Cản trở kết hôn, ly hôn là việc đe dọa,\
      \ uy hiếp tinh thần, hành hạ, ngược đãi, yêu sách của cải hoặc hành vi khác để ngăn cản việc kết hôn của người có đủ\
      \ điều kiện kết hôn theo quy định của Luật này hoặc buộc người khác phải duy trì quan hệ hôn nhân trái với ý muốn của\
      \ họ.\n\n\tKhoản 11. Kết hôn giả tạo là việc lợi dụng kết hôn để xuất cảnh, nhập cảnh, cư trú, nhập quốc tịch Việt Nam,\
      \ quốc tịch nước ngoài; hưởng chế độ ưu đãi của Nhà nước hoặc để đạt được mục đích khác mà không nhằm mục đích xây dựng\
      \ gia đình.\n\n\tKhoản 12. Yêu sách của cải trong kết hôn là việc đòi hỏi về vật chất một cách quá đáng và coi đó là\
      \ điều kiện để kết hôn nhằm cản trở việc kết hôn tự nguyện của nam, nữ.\n\n\tKhoản 13. Thời kỳ hôn nhân là khoảng thời\
      \ gian tồn tại quan hệ vợ chồng, được tính từ ngày đăng ký kết hôn đến ngày chấm dứt hôn nhân.\n\n\tKhoản 14. Ly hôn\
      \ là việc chấm dứt quan hệ vợ"
    - "Điều 9. Thăm gặp thân nhân\n\n\tKhoản 1. Việc thăm gặp thân nhân được thực hiện theo quy định tại Điều 28 Nghị định\
      \ số 221/2013/NĐ-CP ngày 30 tháng 12 năm 2013 của Chính phủ quy định chế độ áp dụng biện pháp xử lý hành chính đưa vào\
      \ cơ sở cai nghiện bắt buộc.\n\n\tKhoản 2. Khi tới thăm gặp học viên, thân nhân học viên xuất trình Giấy chứng minh\
      \ nhân dân hoặc giấy tờ có ảnh của cơ quan có thẩm quyền cấp và khai báo quan hệ với học viên với cán bộ phụ trách thăm\
      \ gặp. Trường hợp thăm gặp tại phòng dành riêng cho vợ, chồng ngoài giấy tờ trên phải có giấy đăng ký kết hôn hoặc có\
      \ xác nhận của Ủy ban nhân dân xã, phường, thị trấn nơi cư trú về tình trạng hôn nhân.\n\n\tKhoản 3. Cán bộ phụ trách\
      \ thăm gặp có trách nhiệm: kiểm tra giấy tờ của thân nhân, đối chiếu số lần thăm gặp trong sổ theo dõi thăm gặp của\
      \ cơ sở cai nghiện bắt buộc (Mẫu số 13); hướng dẫn và cùng thân nhân, học viên thực hiện thủ tục thăm gặp theo quy chế\
      \ thăm gặp thân nhân của cơ sở cai nghiện bắt buộc. Trường hợp không đủ điều kiện thăm gặp phải giải thích rõ cho thân\
      \ nhân và học viên biết.\n\n\tKhoản 4. Trường hợp nghi vấn học viên cất giấu ma tuý hoặc các đồ vật, chất cấm sử dụng\
      \ theo quy chế của cơ sở cai nghiện bắt buộc thì cán bộ phụ trách thăm gặp phối hợp với cán bộ bảo vệ tiến hành kiểm\
      \ tra học viên."
    - "Điều 2. Giải thích từ ngữ\n\tKhoản 1. Hệ thống thông tin duyên hải là hạ tầng mạng viễn thông hàng hải do Nhà nước\
      \ đầu tư và giao cho Công ty TNHH MTV Thông tin điện tử hàng hải Việt Nam quản lý, khai thác.\n\n\t\tĐiểm a) Dịch vụ\
      \ trực canh cấp cứu INMARSAT: là dịch vụ trực canh tiếp nhận các báo động cấp cứu INMARSAT từ phương tiện bị nạn, sau\
      \ đó xử lý, chuyển tiếp các thông tin phục vụ tìm kiếm, cứu nạn tới các cơ quan phối hợp tìm kiếm, cứu nạn; đồng thời\
      \ hỗ trợ kết nối thông tin trong quá trình tìm kiếm, cứu nạn giữa các đơn vị trên bờ với các phương tiện bị nạn và với\
      \ các phương tiện tham gia tìm kiếm, cứu nạn khác;\n\n\t\tĐiểm b) Dịch vụ trực canh cấp cứu COSPAS-SARSAT: là dịch vụ\
      \ trực canh tiếp nhận các báo động cấp cứu COSPAS-SARSAT từ các phương tiện bị nạn, sau đó xử lý, chuyển tiếp các thông\
      \ tin phục vụ tìm kiếm, cứu nạn tới các cơ quan phối hợp tìm kiếm, cứu nạn và hỗ trợ kết nối thông tin trong quá trình\
      \ tìm kiếm, cứu nạn giữa các đơn vị trên bờ với các phương tiện bị nạn và với các phương tiện tham gia tìm kiếm, cứu\
      \ nạn khác;\n\n\t\tĐiểm c) Dịch vụ trực canh cấp cứu DSC: là dịch vụ trực canh tiếp nhận các báo động cấp cứu DSC từ\
      \ phương tiện bị nạn, sau đó xử lý, chuyển tiếp\ntới cơ quan phối hợp tìm kiếm, cứu nạn và hỗ trợ kết nối thông tin\
      \ trong quá trình tìm kiếm, cứu nạn giữa các đơn vị trên bờ với các phương tiện bị nạn và các phương tiện tham gia tìm\
      \ kiếm, cứu nạn khác;\n\n\t\tĐiểm d) Dịch vụ trực canh cấp cứu RTP: là dịch vụ trực canh tiếp nhận các cuộc gọi cấp\
      \ cứu qua phương thức thoại trên kênh 16 VHF từ phương tiện bị nạn, sau đó xử lý, chuyển tiếp tới cơ quan phối hợp tìm\
      \ kiếm, cứu nạn và hỗ trợ kết nối thông tin trong quá trình tìm kiếm, cứu nạn giữa các đơn vị trên bờ với các phương\
      \ tiện bị nạn và các phương tiện tham gia tìm kiếm, cứu nạn khác;\n\n\t\tĐiểm đ) Dịch vụ phát MSI RTP: là dịch vụ phát\
      \ quảng bá các thông tin an toàn hàng hải qua phương thức thoại trên kênh 16 VHF;\n\n\t\tĐiểm e) Dịch vụ phát MSI NAVTEX:\
      \ là dịch vụ phát quảng bá các thông tin an toàn hàng hải qua phương thức in trực tiếp băng hẹp trên các tần số 518kHz,\
      \ 490 kHz và 4209,5 kHz;\n\n\t\tĐiểm g) Dịch vụ phát MSI EGC: là dịch vụ phát quảng bá các thông tin an toàn hàng hải\
      \ EGC qua hệ thống INMARSAT C;\n\n\t\tĐiểm h) Dịch vụ thông tin LRIT: là dịch vụ cung cấp thông tin LRIT của tàu thuyền\
      \ mang cờ quốc tịch Việt Nam và tàu thuyền mang cờ quốc tịch nước ngoài theo Công ước SOLAS;\n\n\t\tĐiểm i) Dịch vụ\
      \ kết nối thông tin ngành hàng hải: là dịch vụ vận hành mạng công nghệ thông tin nội bộ (gọi tắt là mạng intranet hàng\
      \ hải) nhằm kết nối, chia sẻ thông tin chuyên ngành hàng hải do Đài trung tâm xử lý thông tin hàng hải"
  - source_sentence: Quản lý và sử dụng Quỹ Thi đua, Khen thưởng ngành Văn hóa, Thể thao và Du lịch được quy định như thế
