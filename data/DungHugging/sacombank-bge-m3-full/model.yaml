widgetData:
- source_sentence: Cơ chế một cửa quốc gia về xuất nhập khẩu.
  sentences:
  - Kết nối cổng National Single Window để thanh toán thuế hải quan.
  - Thước đo mức độ suy giảm giá trị của quyền chọn (Time Decay) khi thời gian trôi dần về ngày đáo hạn.
  - Gửi tiền không kỳ hạn cho doanh nghiệp
- source_sentence: Ngân hàng mở (Open Banking).
  sentences:
  - số tiền tối đa được phép rút tiền mặt nằm trong hạn mức cấp tín dụng
  - nhận lãi suất tiền gửi (Savings Interest) hàng tháng
  - Ngân hàng số (Digital Banking).
- source_sentence: vay vốn kinh doanh bổ sung vốn lưu động
  sentences:
  - vay vốn kinh doanh đầu tư tài sản cố định
  - ưu đãi trả lại tiền mặt vào tài khoản thẻ khi chi tiêu
  - hạn mức thấu chi được cấp dựa trên giá trị sổ tiết kiệm cầm cố
- source_sentence: tạo thẻ ảo (Virtual Card) để thanh toán Online
  sentences:
  - Cổ phiếu của các công ty đầu ngành, có vốn hóa lớn, tài chính vững mạnh và chi trả cổ tức ổn định.
  - ưu đãi giảm giá 20% khi đặt món qua ứng dụng
  - sử dụng số thẻ ảo để mua hàng trên Internet an toàn hơn
- source_sentence: ưu đãi Buffet hải sản giá rẻ tại Saigon Seafood
  sentences:
  - hồ sơ vay tín chấp được duyệt nhanh qua App trong 1 giờ
  - Private Banking là dịch vụ ngân hàng chuyên biệt, cung cấp giải pháp bảo toàn và gia tăng tài sản cho các cá nhân có giá
    trị tài sản ròng cao (HNWI).
  - Áp dụng tiêu chuẩn CRS (Common Reporting Standard) trong trao đổi thông tin thuế quốc tế.
