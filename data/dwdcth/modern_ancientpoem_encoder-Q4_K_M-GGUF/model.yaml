widgetData:
- source_sentence: 下班后和同事直奔常去的那家火锅店，热热闹闹地涮了一晚上。
  sentences:
  - 联延掩四远，赫弈成洪炉。
  - 把酒仰问天，古今谁不死。
  - 骑出平阳里，筵开卫尉家。
- source_sentence: 站在山顶看日出时，突然觉得世俗烦恼都不重要了。
  sentences:
  - 郁没二悲魂，萧条犹在否。
  - 封疆亲日月，邑里出王公。
  - 心朝玉皇帝，貌似紫阳人。
- source_sentence: 隔壁老张家两个儿子都被征走了，现在天天以泪洗面。
  sentences:
  - 若教为女嫁东风，除却黄莺难匹配。
  - 山东今岁点行频，几处冤魂哭虏尘。
  - 远图尝画地，超拜乃登坛。
- source_sentence: 边境小镇常年没人驻守，只有老李一个人在山脚下种地。
  sentences:
  - 海徼长无戍，湘山独种畬。
  - 高名宋玉遗闲丽，作赋兰成绝盛才。
  - 九衢南面色，苍翠绝纤尘。
- source_sentence: 微信列表翻到底，能说真心话的居然只剩快递群。
  sentences:
  - 黛消波月空蟾影，歌息梁尘有梵声。
  - 代情难重论，人事好乖移。
  - 时应记得长安事，曾向文场属思劳。
