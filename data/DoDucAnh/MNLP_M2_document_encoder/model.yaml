widgetData:
- source_sentence: '''আমি'' শব্দটি কোন লিঙ্গ?

    A. উভয় লিঙ্গ

    B. ক্লীব লিঙ্গ

    C. পুংলিঙ্গ

    D. স্ত্রী লিঙ্গ'
  sentences:
  - F.P. Dobroslavin, tibbin müxtəlif sahələri üzrə tanınmış bir alimdir, ancaq daha çox baş vermiş tədqiqatlara görə seçilir.
    Onun əməyinin sanitar-gigiyenik sahəyə təsiri əhəmiyyətlidir.
  - 'বাংলা ভাষায় শব্দগুলোর লিঙ্গ সাধারণত তিনটি মূল শ্রেণিতে ভাগ হয়: পুংলিঙ্গ (পুরুষ), স্ত্রী লিঙ্গ (মহিলা), এবং ক্লীব লিঙ্গ
    (যার কোনো লিঙ্গ নেই)।'
  - Waves are disturbances that transfer energy from one place to another without transferring matter. Think of a ripple on
    a pond – the water molecules don't travel across the pond with the ripple; they mostly move up and down as the energy
    passes through them.
- source_sentence: '企业产品组合中所拥有的产品线数目是

    A. 产品组合的宽度

    B. 产品组合的相关性

    C. 产品组合的深度

    D. 产品组合的长度'
  sentences:
  - 产品组合的宽度（Width）是指企业拥有的产品线数目。
  - This fluid is produced by the walls of the vagina and the Bartholin's glands.
  - "### Assumption of Risk Defined  \nAssumption of risk is a legal doctrine used in tort law that can limit or bar recovery\
    \ in negligence claims. This doctrine suggests that if a person voluntarily engages in a risky activity, knowing the risks\
    \ involved, they cannot hold another party responsible for resulting injuries. Common scenarios where this applies include\
    \ contact sports and recreational activities, where participants understand the inherent hazards.  \n\n### Elements of\
    \ Assumption of Risk  \nTo successfully argue assumption of risk, certain elements must be established:  \n1. **Knowledge\
    \ of the Risk**: The individual must have actual or constructive knowledge of the risk involved.  \n2. **Voluntary Exposure**:\
    \ The individual must voluntarily choose to expose themselves to that risk.  \n3. **Informed Consent**: The individual\
    \ must have consented to take that risk despite being aware of it.  \n\n### Contributory Negligence  \nContributory negligence\
    \ is a legal concept that exists in some jurisdictions where a plaintiff's own negligence contributes to their injury.\
    \ Under this doctrine, if the plaintiff is found to have played any part in their injury, they may be barred from recovering\
    \ damages, or the damage award could be reduced. It emphasizes the responsibility of the injured party to exercise reasonable\
    \ care for their own safety.  \n\n### Interaction of Assumption of Risk and Contributory Negligence  \nIn many jurisdictions,\
    \ both assumption of risk and contributory negligence can coexist as defenses. However, some legal systems assert that\
    \ if a plaintiff is found contributorily negligent, they cannot also claim assumed risk for the same incident. This overlap\
    \ can complicate cases since the determination of the plaintiff's awareness and behavior prior to the accident can alter\
    \ the outcome.  \n\n### Legal Standard for Warnings and Liability  \nIn negligence cases, the adequacy of warnings provided\
    \ is crucial. Courts often assess whether the warnings were sufficient to inform the individual of the specific hazards\
    \ present. A simple sign may not meet the threshold if it fails to clearly communicate the danger involved, especially\
    \ if the harm is not immediately obvious or if the context (e.g., a crowded street) suggests additional risks."
- source_sentence: "While shopping at a grocery store, a customer tripped over a broken tile, fell, and suffered a concussion.\
    \ A few months after the accident, the customer's attorney deposed a store employee. In the deposition, the employee testified,\
    \ \"I'd been telling the store manager for years to get that broken tile fixed, but he wouldn't do it. \" The employee\
    \ died in an automobile accident after being deposed. At trial, the deposition should be\nA. admitted, as a dying declaration.\
    \ \nB. admitted, as former testimony. \nC. not admitted, because it is hearsay not within any exception. \nD. not admitted,\
    \ because the employee is not available for cross-examination. "
  sentences:
  - In the context of human evolution, brain size is often compared to body size in a measurement called the encephalization
    quotient (EQ). This measure assesses the expected brain size for an animal of a given body size compared to actual brain
    size. An increase in EQ among hominins is often linked to advancements in cognitive abilities, such as problem-solving
    and social interaction.
  - Another exception to the hearsay rule, though often with specific requirements related to the declarant's belief of impending
    death, is the dying declaration.
  - In assessing moral actions, it is also essential to consider societal norms. In the U.S. context in 2020, moral standards
    often emphasize community well-being and individual rights. An action like diverting emergency supplies would likely be
    condemned in most social circles, while stepping out of rhythm during a line dancewould not commonly qualify as a serious
    moral offense. Thus, moral wrongness is often context-dependent and tied closely to consequences for individuals and society.
- source_sentence: 'Recent research on hominid species dating from the Middle Pliocene indicates there was (as of 2020):

    A. multiple hominid species but with limited diversity.

    B. a single species with no diversity.

    C. decreased species diversity but increased numbers of hammerstones and flakes, indicating stone tool manufacture.

    D. a single dominant species that outcompeted all others, leading to decreased diversity.

    E. increased species diversity due to a prolonged ice age followed by a severe drought.

    F. decreased species diversity due to a prolonged ice age followed by a severe drought.

    G. a great amount of species diversity, or a single species that exhibited a lot of diversity.

    H. increased species diversity but with decreased population numbers due to harsh climate conditions.

    I. increased species diversity but decreased numbers of hammerstones and flakes, indicating less stone tool manufacture.

    J. very little species diversity during this period and very few hominids.'
  sentences:
  - Hammerstones and flakes are artifacts associated with early stone tool technology. Hammerstones are hard rocks used to
    strike other stones, while flakes are the sharp pieces produced from such strikes, which could be utilized for tasks like
    cutting or scraping, indicating early cognitive and manual skills in tool-making among certain species.
  - The Doppler effect is a phenomenon that occurs when the source of a wave and the observer are moving relative to each
    other. It results in a change in the observed frequency of the wave compared to the source frequency.
  - Counseling and therapeutic interventions can play a role in addressing student behavioral issues, but they should be considered
    within a broader context of classroom dynamics and educational strategies. Counseling might help the child develop coping
    mechanisms, social skills, and emotional regulation strategies. However, the effectiveness of counseling is often maximized
    when the child is supported in the classroom environment as well, suggesting that changes to the teacher's approach could
    lead to improved outcomes.
- source_sentence: 'Hipotalamusi NUK kontrollon sekretimin e hormoneve:

    A. FSH dhe LH

    B. te rritjes(GH)

    C. ACTH

    D. te pankreasit'
  sentences:
  - In the context of estate planning and inheritance law, a will serves as a legal document outlining how a person's property
    and assets will be distributed after their death. The interpretation of a will often hinges on the intent of the testator,
    or the person who made the will, which can affect how property interests are determined.
  - State laws that regulate matters of legitimate local concern but have an incidental effect on interstate commerce are
    subject to a less strict balancing test. Under this test, a state law will be upheld unless the burden imposed on interstate
    commerce is clearly excessive in relation to the putative local benefits.
  - Hipotalamusi është një pjesë e trurit që ndodhet nën talamusin. Ai luan një rol kryesor në lidhjen e sistemit nervor me
    sistemin endokrin përmes gjëndrës së hipofizës.
