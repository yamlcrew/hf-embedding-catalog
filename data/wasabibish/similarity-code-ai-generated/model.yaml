- source_sentence: "// wage-input.dto.ts\nimport { IsNumber, IsPositive } from 'class-validator';\n\nexport class WageInputDto\
    \ {\n  @IsNumber()\n  @IsPositive()\n  hourlyWage: number;\n\n  @IsNumber()\n  @IsPositive()\n  hoursWorked: number;\n\
    }\n\n// It will handle the input validation too.\n\n\n// employee.controller.ts\nimport { Body, Controller, Post } from\
    \ '@nestjs/common';\nimport { WageInputDto } from './dto/wage-input.dto';\nimport { EmployeeService } from './employee.service';\n\
    \n@Controller('employee')\nexport class EmployeeController {\n  constructor(private readonly employeeService: EmployeeService)\
    \ {}\n\n  @Post('/wage')\n  async getWage(@Body() input: WageInputDto) {\n    return this.employeeService.getWage(input);\n\
    \  }\n}\n\n// employee.service.ts\nimport { Injectable } from '@nestjs/common';\nimport { WageInputDto } from './dto/wage-input.dto';\n\
    \nconst WEEKLY_HOURS = 40;\n\n@Injectable()\nexport class EmployeeService {\n  async getWage(input: WageInputDto) {\n\
    \    let weeklyHours = 0;\n    let overTimeHours = 0;\n    let weeklyWage = 0;\n\n    const hasDoneOverTime = input.hoursWorked\
    \ > WEEKLY_HOURS;\n\n    if (hasDoneOverTime) {\n      weeklyHours = WEEKLY_HOURS;\n      overTimeHours = input.hoursWorked\
    \ - WEEKLY_HOURS;\n    } else {\n      weeklyHours = input.hoursWorked;\n    }\n\n    weeklyWage = weeklyHours * input.hourlyWage;\n\
    \n    if (hasDoneOverTime) {\n      weeklyWage = weeklyWage + overTimeHours * (input.hourlyWage * 1.5);\n    }\n\n   \
    \ return { weeklyWage };\n  }\n}"
