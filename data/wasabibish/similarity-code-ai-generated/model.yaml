    \ {\n  @Post()\n  calculateWeeklyWage(@Body() data: WeeklyWageInput): { weeklyWage: number } {\n    // Input validation\n\
    \    if (data.hourlyWage <= 0 || data.hoursWorked <= 0 || !Number.isInteger(data.hoursWorked)) {\n      throw new HttpException('Invalid\
