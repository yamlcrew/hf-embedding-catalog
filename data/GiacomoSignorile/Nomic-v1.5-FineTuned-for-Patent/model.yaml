  widget:
  - source_sentence: 'Shaped charge warhead and a method for producing the warhead. Title: Shaped charge warhead and a method
      for producing the warhead


      Abstract: Described is a shaped charge warhead comprising an axially symmetric fragmentation casing designed to define
      a containment space and having in a base portion a casting hole for the explosive, a detonator housed in the casting
      hole and a conical liner of the shaped charge positioned inside the containment space.The casing and the conical or
      hemispherical liner, with a variable thickness, if necessary, are made in a single piece.The casing extends along a
      respective axis of extension in such a way as to also define a standoff of the charged warhead.


      Business Description: The present invention relates to a shaped charge warhead and to a method for producing the warhead.
      A shaped charge warhead (known as SCW – Shape Charge Warhead) is a device comprising a fragmentation container (casing)
      that defines the volume within which a shaped charge liner is positioned. The volume between the liner and the casing
      is filled with explosive.


      Tech Features: The technical features include: One-piece shaped charge warhead: the patented warhead is manufactured
      by additive manufacturing (powder bed fusion), which makes it possible to create, in a single piece, both the axisymmetric
      container and the conical or hemispherical shell of the shaped charge liner. This eliminates assembly operations, reducing
      errors and complexity. Warheads currently available on the market are usually assembled from separate components, such
      as the container and the shell. This process presents the risk of misalignments between the components, which may negatively
      affect the symmetry of the explosive wave and, consequently, the penetrative capability of the jet. Cellular septa structure:
      the conical or hemispherical shell of the warhead has a cellular septa structure containing unsintered powder. This
      feature contributes to increasing the penetrative capability of the jet generated by the explosion, optimizing the mass
      distribution within the shell and improving performance. Variable thickness: the conical shell may be produced with
      variable thickness, representing an advantage over conventional constant-thickness warheads. This allows further optimization
      of explosive jet formation and control of the fragmentation flow. Shells of warheads currently available on the market
      are generally of constant thickness, which does not allow optimization of fragmentation flow or penetration. Advanced
      materials: the warhead may be manufactured using advanced metallic materials, such as copper, aluminum, tungsten, bismuth,
      or zirconium alloys—materials that are difficult to use with traditional technologies. Fragmentation control: the integration
      of geometric defects within the thickness of the container allows more precise control of the size of fragments generated
      by the explosion, improving safety and effectiveness.


      Applications: The patented shaped charge warhead technology has possible applications in strategic sectors such as defense,
      controlled demolitions, and the mining industry, where high precision is required in penetrating hard materials or creating
      controlled fragmentations. In civil and industrial demolitions, the warheads can be employed to bring down structures
      with maximum precision and safety, minimizing collateral damage. In the mining sector, the warheads could improve the
      efficiency of explosions for extracting minerals with greater control and reducing risks. The technology solves the
      limitations by identifying and overcoming the problem of critical assembly (thanks to single-piece additive manufacturing)
      and improving the performance of the explosive jet through the cellular septa structure and advanced materials. This
      translates into greater efficiency, reliability, and flexibility of use, creating value for the user thanks to warheads
      that offer better penetration, fragment control, and reduction of production and maintenance costs.


      Advantages: Elimination of assembly: the warhead is manufactured as a single body through additive manufacturing, reducing
      alignment errors and production complexity. Improved penetrative capability: thanks to the cellular septa structure
      containing unsintered powder, the explosive jet has greater effectiveness and precision. Variable shell thickness: allows
      optimal mass distribution, improving jet efficiency and fragmentation capability. Advanced materials: the technology
      enables the use of metallic alloys that are difficult to employ with traditional methods, offering greater strength
      and performance. Fragmentation control: geometric defects in the container make it possible to precisely manage the
      size of the explosive fragments. These advantages translate into improved performance, reduced production costs, and
      greater safety.'
    sentences:
    - "COLLABORATIVE ROBOT FOR WAREHOUSE LOGISTICS. Title: COLLABORATIVE ROBOT FOR WAREHOUSE LOGISTICS\n\nAbstract: \n\nBusiness\
      \ Description: Highly adaptive and flexible automatic system for the removal of protective film used for pallet wrapping.\
      \ A prototype has been developed and tested both in the case where the film wraps the pallet only on the side and in\
      \ the case where it covers the pallet both on the side and on the top surface showing a success rate of 100% and 76.92%\
      \ respectively.\n\nTech Features: The operation of removing the protective film is typically carried out by operators\
      \ equipped with cutting tools or automated systems designed specifically for the particular product and not suitable\
      \ for the use of different types of pallets such as those required in the intra-logistics supply chain. The device consists\
      \ of a robotic manipulator with 7 degrees of freedom and an end-effector equipped with a blade to cut the protective\
      \ film. The device is flexible because it allows protective film to be cut on pallets of different nature, shape and\
      \ size without modification of the equipment, eliminating the need for conversion times. The device has a reduced footprint,\
      \ even considering a possible mounting on a mobile base to increase the working space. The device can be integrated\
      \ with a second manipulator equipped with an end-effector that includes a gripper to pick up and manipulate the protective\
      \ film. A prototype of the device has been made and experimentally validated in the laboratory.\n\nApplications: Intra-logistics\
      \ sector that consists of the operations to be performed to move packages within a warehouse usually to compose multi-product\
      \ pallets; Industrial automation and mechanical transport sector for all those industries that in the 4.0 paradigm want\
      \ to introduce process innovations, in order to increase production while ensuring the integrity of the product on the\
      \ pallet and safety for the human operator who may find himself working near the cutting device.\n\nAdvantages: Reduced\
      \ footprint; Flexibility; Versatility."
    - '‘TurtHEX’: data contextualization and augmented reality Bluetooth system. Title: ‘TurtHEX’: data contextualization
      and augmented reality Bluetooth system


      Abstract: Disclosed are a communication system (100), for a communication from a user device (102) facing a communication
      network according to a Bluetooth protocol (104) including a Bluetooth localization infrastructure arranged in a confined
      environment (A) to a recipient device (106) facing a communication network according to an Internet protocol (108),
      and a communication system (100), for a communication from a recipient device (106) facing a communication network according
      to an Internet protocol (112) to a user device (102) facing a communication network according to a Bluetooth protocol
      (104) including a Blue- tooth localization infrastructure arranged in a confined environment (A). An advanced request
      communication message and an advanced response communication message are also disclosed.


      Business Description: TurtHEX technology enables private, personalized and contextualized communication channels to
      be opened in indoor environments for any user with a Bluetooth or WiFi device. Each communication channel is tied to
      the user''s location in the space: TurtHEX allows any environment to present itself and provide contextualized information
      to any device connected to the system.


      Tech Features: TurtHEX technology revolutionizes the concept of Bluetooth and WiFi networks by introducing in a transparent
      manner information regarding the user''s position in space, with centimeter resolution, along with the data stream between
      network and user. This information is made available to the user without the need for additional devices: any user with
      a Bluetooth or WiFi device can obtain a personalized and contextualized data stream. TurtHEX system is based on a new
      type of router based on a set of directional antennas, called Anchor , which can be directly substituted for current
      WiFi routers. Each TurtHEX Anchor can provide location functionality transparently, combined with normal networking
      functionality. As with normal WiFi access-points, in the case of larger environments it is possible to install multiple
      anchors that will be able to automatically cooperate in a "plug-and-play" manner in the localization function further
      improving the accuracy of spatial localization.

      In particular, TurtHEX is the world''s first technology capable of locating general-purpose Bluetooth and WiFi devices
      with centimeter accuracy in complex environments, without the need for any prior calibration.

      The TRL of the patented technology is 7.


      Applications: Home automation; Augmented reality; Domotics in both private and working environments; Smart industry;
      Agricolture.


      Advantages: Self-calibrating system; User-friendly; Real-time contextualized and transparent dataflow.'
