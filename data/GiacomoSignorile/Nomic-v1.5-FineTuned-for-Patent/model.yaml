  - "System and method for wireless measurements. Title: System and method for wireless measurements\n\nAbstract: \n\nBusiness\
    \ Description: The invention relates to a system for the wireless measurement of different quantities. Such system is\
    \ composed by a passive circuit containing a resistive-transduction sensor and a simple electronic readout unit. The invention\
    \ comprises also a measurement method to determine the value of the quantity of interest starting from a reading of system\
    \ electrical impedance.\n\nTech Features: The system of the present invention is composed by two parts. The first part\
    \ is a circuit made only by passive elements, among which there are an antenna and any resistive-transduction sensor.\
    \ Therefore, different quantities can be measured, according to a specific application. Furthermore, the passive circuit\
    \ can be fabricated through low-cost additive technologies. The second part is an electronic readout unit. It is equipped\
    \ with another antenna that couples with that of the passive circuit, allowing for circuit power supply without adding\
    \ any battery to the circuit and the wireless measurement of the quantity of interest. In addition, it presents also the\
    \ electronics needed to read system electrical impedance (in particular, its real part) and for a proper treatment of\
    \ the generated reading signal. Finally, the unit implements a method that allows determining the value of the quantity\
    \ of interest from impedance reading.\n\nApplications: Industrial field: process control; Transportation sector: monitoring\
    \ the conditions of the means of transportation; Building sector: structural health monitoring of buildings or infrastructures;\
    \ Food: monitoring food and beverage quality; Medical field: monitoring vital parameters.\n\nAdvantages: Possibility of\
    \ monitoring different quantities; The use of batteries inside passive circuit is avoided; Wireless measurement of the\
    \ quantity; Possibility of measuring in hermetic environments; Low-cost fabrication of disposable passive circuits; Measurement\
    \ applications inside human body."
  - 'Electro-actuated braking system and relative control method. Title: Electro-actuated braking system and relative control
    method


    Abstract: The invention relates to an electric vehicle (1) comprising: at least one wheel (10); an electric motor (20)
    mechanically connected to the at least one wheel (10) in order to drive the at least one wheel (10), where the electric
    motor (20) is configured to provide regenerative braking that exerts a first braking effect on the at least one wheel
    (10); an electrically actuated brake (30) mechanically connected to the at least one wheel (10) in order to apply a second
    braking action to the at least one wheel (10); at least one storage device (40) electrically connected to the electric
    motor (20) and to the electrically actuated brake (30) so as to supply power thereto and to receive energy in the form
    of current from the regenerative braking of the electric motor (20); and at least one control unit (50, 51). The unique
    feature of the invention is that the storage device (40) comprises sensor means (41) adapted to detect at least one physical
    condition of the storage device (40), in particular the state of charge and/or temperature of the storage device (40),
    wherein the at least one control unit (50, 51) is configured to: receive, from the sensor means (41), at least one value
    relating to the at least one physical condition of the storage device (40); comparing the at least one value with a predetermined
    threshold value stored in a memory device of the at least one control unit (50, 51); if the at least one value is above
    the predetermined threshold, the current generated by the regenerative braking is suppressed from flowing towards the
    storage device (40), and the current is allowed to flow towards the electrically actuated brake (30).


    Business Description: The invention refers to a Control System for one or more Electric Motors to which an electro-actuated
    braking system is integrated. The purpose of the system is guarantee the health of the individual components of an electric
    vehicle''s driveline (Energy Storage System - Motor - Brake) by optimizing energy efficiency through the use of different
    states that implement a different allocation between electro-actuated braking and electric motor during braking maneuvers,
    depending on the demand provided by the driver.


    Tech Features: The system assesses through sensors the condition of individual driveline components and, after analyzing
    the input given by the driver, determines the required braking torque and the type of split between electro-actuated brake
    and electric motor. The control will first prioritize the safety of the vehicle, going to ensure at all times that the
    driver''s request is met, after which the goal will be to maximize energy recovery through regenerative braking (RB) available
    to the electric motor and minimizing the use of the electro-actuated brake, and finally, to ensure the health of each
    driveline component. Among the control states of the system is the method called "Disconnected." In this braking state,
    the energy storage system will be electrically isolated from the electric motor block and the brake. Braking torque will
    thus be generated by allocating it between the RB and the electro-actuated brake such that the RB generates enough current
    to activate the electro-actuated brake enough to cumulatively obtain the optimum torque to meet the demand.


    Applications: Electric and hybrid vehicles in several categories (passenger cars, sports cars, urban, SUV) Quadricycle
    (heavy and light), scooters, tricycles, and motorcycles with electric/hybrid powertrain Commercial and industrial vehicles,
    buses and vehicles for special applications


    Advantages: Increased regenerative efficiency at high states of charge of the storage device Braking split between RB
    of electric motor and electro-actuated brake according to component conditions Better preservation of the condition of
    the storage device in a long-life view'
- source_sentence: 'Zero-Emissions Driving Systems - ZEDS. Title: Zero-Emissions Driving Systems - ZEDS


    Abstract: An electric motor adapted to be mounted in a wheel of a vehicle includes: a stator provided with at least one
    winding; a rotor provided with at least one permanent magnet facing towards the at least one winding, wherein the rotor
    surrounds, at least partly, the stator and rotates around it; a braking system for slowing or stopping the motion of the
    rotor relative to the stator. The braking system further includes: a second stator enveloping at least one portion of
    the rotor and provided with a coil adapted to generate, when activated, a magnetic field; a magnetorheological fluid positioned
    in an air gap obtained between the second stator and the at least one portion of the rotor, wherein the magnetorheological
    fluid increases its viscosity when it is subjected to the magnetic field of the coil and exerts a braking force between
    the rotor and the second stator.


    Business Description: A system suitable for braking a vehicle avoiding the production of particulate matter and other
    pollutants, combining the efficiencies coming from an in-wheel electric motor with the potential of a magnetorheological
    brake. The physical behavior of both systems has been optimized to achieve braking process both safe and environmentally
    sustainable.


    Tech Features: The invention consists of a combination of an in-wheel electric motor and a magnetorheological brake, to
    obtain an integrated driving system with zero emissions, both in traction and braking. The in-wheel electric motor allows
    the vehicle to be decelerated through regenerative braking, limiting the use of the combined magnetorheological braking
    system to extreme braking cases. Through its particular behavior under the effect of an applied magnetic field, the fluid
    is able to change its state from liquid to semi-solid. The characteristic of the fluid thus allows to obtain a braking
    torque sufficient to stop the vehicle without having an extreme reduction of torque at low speeds. The system has been
    sized to occupy a space limited to the width of the wheel disc, in order to be optimal for a modular and plug-and-play
    application. TRL: 2


    Applications: Passenger Vehicles; Quadri-cycles; Motor vehicles; In-Wheel electric motors; Industrial Vehicles; Working
    machines.


    Advantages: Avoiding pollutants generated by braking; Reduction of the braking time response; Efficiency optimization
    of the vehicle; Stability Safety systems easy to be implemented; Reduction of needed maintenance for the braking system.'
  sentences:
  - 'CAPTURE OF PLENOPTIC IMAGES BETWEEN ARBITRARY PLANES. Title: CAPTURE OF PLENOPTIC IMAGES BETWEEN ARBITRARY PLANES


    Abstract: A process and an apparatus are described for the plenoptic capture of photographic or cinematographic images
    of an object or a 3D scene (10) of interest, both based on correlated light emitting source and correlation measurement,
    along the line of “Correlation Plenoptic Imaging” (CPI). A first image sensor (Da) and a second image sensor (Db) detect
    images along a path of a first light beam (a) and a second light beam (b), respectively. A processing unit (100) of the
    intensities detected by the synchronized image sensors (Da, Db) is configured to retrieve the propagation direction of
    light by measuring spatio-temporal correlations between light intensities detected in the image planes of at least two
    arbitrary planes (P′, P″; D′b, D″a) chosen in the vicinity of the object or within the 3D scene (10).


    Business Description: A process and an apparatus for the plenotic acquisition of images called "plenotic imaging between
    arbitrary planes", based on the measurement of the spatio-temporal correlations of light. Light coming from the scene
    of interest is divided into at least two distinct beams, each one reproducing on a separate sensor the image of a specific
    plane within the 3D scene of interest. By measuring the intensity correlations between the two sensors, it is possible
    to reconstruct the direction of light propagation between the two chosen planes, so as to be able to increase the depth
    of field of the acquired images, modify their focus plane, the retrospect, and reconstruct the 3D image of the scene,
    maintaining the maximum resolution allowed by the optical system.


    Tech Features: The invention is based on the concept of "Correlation Plenoptic Imaging" (CPI), a method of creating plenotic
    images based on the measurement of the spatio-temporal correlations of light, and characterised by the possibility of
    combining the maximum possible resolutions (defined by the numerical aperture of the optical system) with a depth of field
    not otherwise accessible. In this device, two separate sensors provide images of two different planes contained in the
    3D scene of interest. The measurement of the space-time correlations between the intensities revealed by the two sensors
    allows to reconstruct the direction of light propagation and to obtain the typical features of plenotic imaging (refocusing
    of images, increase of depth of field, 3D reconstruction of the scene). Compared to the already patented CPI devices,
    the current device allows to further widen the maximum depth of field obtainable, safeguarding the maximum resolution.


    Applications: 3D imaging; Space imaging; 3D microscopy; Photography; Industrial inspection; Virtual and augmented reality.


    Advantages: Possibility to simultaneously perform plenoptic imaging and standard imanging of two distinct planes, both
    at high resolution; Efficient refocusing of the scene between the two reference planes; 3D imaging with a single sensor;
    Simpler structure compared with other CPI devices.'
  - 'Exoskeleton for back support during load movement. Title: Exoskeleton for back support during load movement


    Abstract: Exoskeleton configured to be worn by a user, comprising a waist anchoring device (100, 110) for anchoring to
    the user''s waist, a torso anchoring device (101) for anchoring to the user''s torso, a thigh anchoring device for anchoring
    to the user''s thighs, the waist anchoring device (100, 110) being connected to the torso anchoring device (101) through
    an upper frame, and to the thigh anchoring device for anchoring to the user''s thighs through a lower frame. At least
    one actuation unit is further present, which is configured to generate an assistive torque. Said actuation unit is positioned
    at the height of the user''s waist.


    Business Description: Low back pain and musculoskeletal injuries are serious problems for workers subjected to manual
    load handling activities, also due to inappropriate postures during activities. The use of exoskeletons in dynamic environments
    is one possible solution for the management of labour-intensive activities, but they must have an adequate mechanical
    coupling of all the constituent parts with the wearer, in order to maximise the transmission of forces, be comfortable
    and not restrict the movements of the users'' lower limbs. The designed exoskeleton, weighing approx. 6kg, positions the
    motorized joints in correspondence of the user’s hips at the height of the iliac ridges, minimizing the kinematic misalignment
    between man and robot and allowing to comfortably discharge the assistance forces.


    Tech Features: The actuation groups are placed at the height of the wearer’s hips, removing the bulk from the lower limbs;
    The exoskeleton can be adapted to the wearer’s body by means of tubular aluminium frames comprising a first spherical
    joint positioned at the wearer’s shoulder blades and connected to two frame branches, Each comprising a pair of rotational
    joints (passive, but which can be supported by an active motor-driven to the waist), which develop laterally from the
    spine of the wearer and in the direction of the anchorage to the waist; The exoskeleton can be divided into two modules:
    a trunk module and a lower limb module. The latter, anchored to the thigh, includes additional rotary joints connected
    to the actuator group, which allow you to follow the movements of the user in a passive way.


    Applications: Logistics: support for cargo handling.


    Advantages: Does not require the adoption of kinematic compensation methods, being stable on the back of the user; It
    allows a high freedom of movement of the user’s torso, and also does not limit the movement of the lower limbs of the
    user; Comfortable, adhering to the user, adapting to all body types; Effective in force transmission.'
