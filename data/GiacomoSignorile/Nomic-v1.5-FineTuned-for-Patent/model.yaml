    - 'Novel anti-HIV compunds. Title: Novel anti-HIV compunds


      Abstract: The present invention relates to the use in the medical field of 2-oxo-2H-pyrrol- 1 (5)-carboxamide derivatives
      in the treatment of HIV infections, pharmaceutical compositions containing these derivatives as active ingredients,
      and a process for the preparation of such derivatives.


      Business Description: The present invention concerns the development of a new and effective synthesis methodology based
      on catalytic carbonilation techniques of a particular class of heterocyclic compounds, namely 2-oxo-2H-pyrrol-1(5H)-carboxymamides,
      and in the discovery of their pharmacological activity in vitro as powerful anti-HIV agents with a very low degree of
      toxicity.


      Tech Features: The current absence of a curative therapy and vaccines for HIV infection determine the high demand for
      new anti-HIV therapeutic agents that are effective, non-toxic and do contribute to the containment of resistant forms
      of the virus. The invention concerns the synthesis of 2-oxo-2H-pyrrol-1(5H)-carboxymamides by a novel and efficient
      synthetic approach involving the catalytic carbonylation of propargyl ureas  capable of associating a significant anti-HIV
      activity with a low degree of toxicity, and therefore suitable for a prolonged therapeutic treatment. In fact, pharmacological
      tests in vitro demonstrated that these compounds posses specific anti-HIV activity as potent inhibitors of reverse transcriptase,
      while showing a cytotoxic activity that in same cases was 10-20 times lower with respect to commercial anti-HIV drugs,
      such as ripilvirine and etravirine.


      Applications: Innovative drugs for the treatment of HIV infections; Pharmacological research.


      Advantages: Favorable activity/toxicity ratio; Low operating costs; No complex procedures; Prolonged therapeutic treatment.'
    - "PRODUCTION OF HIGH ORGANOLEPTIC AND NUTRITIONAL VALUE OLIVE OIL. Title: PRODUCTION OF HIGH ORGANOLEPTIC AND NUTRITIONAL\
      \ VALUE OLIVE OIL\n\nAbstract: \n\nBusiness Description: The procedure involves the use of a non-toxic and organoleptically\
      \ inert cryogen in the process of extracting oil from olives. In addition to high yields, it guarantees the production\
      \ of olive oils, especially extra virgin, enriched in cellular compounds extracted from the fruit and, in particular,\
      \ in components with aromatic and antioxidant activity, with a consequent significant increase in their organoleptic\
      \ and nutritional quality. The unmistakable characteristics of the oils most recognizable by the consumer are closely\
      \ linked to the raw material, the type of olives processed and their production area.\n\nTech Features: The proposed\
      \ procedure provides the use of \"carbonic snow\", the carbon dioxide (CO 2 ) in a solid state for the extraction of\
      \ olive oil. The solid CO 2 causes the formation of ice crystals in the freezing fruit, which in turn determines the\
      \ collapse of the cellular structure of the pulp. This facilitates the release of substances and their transfer into\
      \ the oil, which results rich in cellular metabolites with high biological value. The gaseous CO 2 , being heavier than\
      \ air, tends to remain above the olive paste, creating a gaseous layer able to avoid direct contact with the air oxygen\
      \ and to preserve the cellular constituents from oxidative degradation. The method makes economically sustainable early\
      \ harvesting of the olives: the olives less mature will be richer in water and bioactive components (polyphenols, tocopherols);\
      \ then, the early harvesting limits the damage caused by attacks of Bactrocera oleae (the olive fly), one of the most\
      \ feared adversities by producers of the sector, able to significantly affect both the yield and the quality of the\
      \ oil produced.\n\nApplications: Use in mills.\n\nAdvantages: Higher yield, on average 9% more (17.4 kg of product instead\
      \ of 16 kg per quintal of olives); Better nutritional quality (e.g. 6% more vitamin E); Greater resistance to oxidative\
      \ processes; Production of oil richer in antioxidants and aromatic components; Longer shelf life than that of oil obtained\
      \ using conventional technologies."
