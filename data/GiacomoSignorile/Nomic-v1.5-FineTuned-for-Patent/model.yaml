    fluid increases its viscosity when it is subjected to the magnetic field of the coil and exerts a braking force between
    the rotor and the second stator.


    Business Description: A system suitable for braking a vehicle avoiding the production of particulate matter and other
    pollutants, combining the efficiencies coming from an in-wheel electric motor with the potential of a magnetorheological
    brake. The physical behavior of both systems has been optimized to achieve braking process both safe and environmentally
    sustainable.


    Tech Features: The invention consists of a combination of an in-wheel electric motor and a magnetorheological brake, to
    obtain an integrated driving system with zero emissions, both in traction and braking. The in-wheel electric motor allows
    the vehicle to be decelerated through regenerative braking, limiting the use of the combined magnetorheological braking
    system to extreme braking cases. Through its particular behavior under the effect of an applied magnetic field, the fluid
    is able to change its state from liquid to semi-solid. The characteristic of the fluid thus allows to obtain a braking
    torque sufficient to stop the vehicle without having an extreme reduction of torque at low speeds. The system has been
    sized to occupy a space limited to the width of the wheel disc, in order to be optimal for a modular and plug-and-play
    application. TRL: 2


    Applications: Passenger Vehicles; Quadri-cycles; Motor vehicles; In-Wheel electric motors; Industrial Vehicles; Working
    machines.


    Advantages: Avoiding pollutants generated by braking; Reduction of the braking time response; Efficiency optimization
    of the vehicle; Stability Safety systems easy to be implemented; Reduction of needed maintenance for the braking system.'
- source_sentence: 'Coated nanoparticles for the transport of therapeutic and diagnostic agents. Title: Coated nanoparticles
    for the transport of therapeutic and diagnostic agents


    Abstract: Nanoconstructs consisting of a core and a lipid coating, suitable for conveying therapeutic and diagnostic (or
    "theranostic") agents to target tissues or organs, delivering them to the cells of interest where the nanoparticle load
    is released, are described. A further aspect of the invention concerns diagnostic, therapeutic or theranostic compositions
    comprising coated nanoparticles together with pharmaceutically acceptable vehicles or excipients.


    Business Description: Nanoconstructs consisting of a core and a lipid coating to deliver therapeutic and diagnostic agents
    to target tissues or organs. Artificial lipid formulations mimicking extracellular vesicles.


    Tech Features: The invention relates to nanoparticles coated with layers of phospholipids and other biomolecules capable
    of mimicking the function of extracellular vesicles and of transporting therapeutic or diagnostic agents to target cells
    or tissues, and of releasing them at the intracellular level. A further aspect of the invention relates to diagnostic,
    therapeutic or theranostic compositions comprising the nanoparticles coated together with pharmaceutically acceptable
    carriers or excipients. TRL 3


    Applications: Oncological treatments; Neurodegenerative treatments; Musculoskeletal treatments; Metabolic treatments;
    Cosmetic treatments.


    Advantages: Coated nanoparticles for delivering therapeutic and diagnostic agents to target tissues; Bioartificial nanoparticles
    mimicking the tissue tropism of natural EVs; Versatile use of various particles as nuclei (i.e. organic and inorganic);
    Ad-hoc composition of lipids to mimic tumor-derived EVs.'
  sentences:
  - 'SYNTHETIC ANALOGUES OF XANTHOHUMOL. Title: SYNTHETIC ANALOGUES OF XANTHOHUMOL


    Abstract: The present invention relates to novel synthetic analogues of xanthohumol and the use thereof.


    Business Description: The present invention relates to new synthetic analogues of Xanthumol (XN), a prenylated chalcone
    of natural origin found in the female inflorescence of the hop plant (Humulus lupulus L.-Cannabaceae). The new compounds
    showed anti-angiogenic, antioxidant and chemopreventive properties and their anti-proliferative, anti-invasive, anti-angiogenic
    activity is greater than the natural compound.


    Tech Features: Xanthumol is a flavonoid known for its multiple properties: anti-invasive, antiproliferative, antiangiogenic,
    pro-apoptotic, antibacterial, inhibitory on cytochrome P450 enzymes involved in the metabolic activation of carcinogenesis
    and anti-inflammatory, exerted through the reduction of oxide production nitrate (NO). However, the therapeutic use of
    Xanthumol of natural origin presents some critical issues due to its low potency and selectivity. The new molecules with
    a structure similar to natural Xanthumol are more effective compounds in the treatment of degenerative processes characterized
    by phenomena of cellular hyperproliferation, angiogenesis, tissue destruction from uncontrolled hyperproteolysis and which
    can show better properties in terms of bioavailability, efficacy and reduced toxicity compared to known compound.


    Applications: Prevention and treatment of diseases where hyperproliferative processes are involved; Treatment of tumors;
    Treatment of diseases in which inflammatory processes are involved; Treatment of cardiovascular and neurodegenerative
    diseases.


    Advantages: Higher activity and lower toxicity than the natural compound; Action on multiple molecular targets, useful
    to prevent the emergence of possible tumor resistance; Inhibition of angiogenesis, essential in the prevention and/or
    treatment of tumor angiogenesis.'
  - "Reactor for the treatment of sludge with high nitrogen content. Title: Reactor for the treatment of sludge with high\
    \ nitrogen content\n\nAbstract: \n\nBusiness Description: Nitrogen in the form of ammonium ion (NH4 +) is one of the main\
    \ culprits of groundwater eutrophication. One of the main causes of this phenomenon is the intensive use of synthetic\
    \ nitrogen-based fertilizers and that one. On the other hand, agricultural products need this important element to grow.\
    \ The present invention relates to a reactor for the capture of chemical elements or compounds from a liquid mixture.\n\
    \nTech Features: The reactor is composed of two fixed beds (n ≥ 2) adsorbents / desorbents placed on a circular crown\
    \ connected to a rotating shaft placed in the center of the crown, which allows the single fixed bed to pass from an absorption\
    \ situation to a desorption one by changing (1), and with respect to the washing solution (1). The number of adsorption\
    \ / desorption beds will depend on the sizing of the beds or on the characteristic times of the two adsorption and desorption\
    \ phases as well as the fluid dynamics (load losses). When the material is adsorbent / desorbent it will be exhausted,\
    \ the fixed bed will be replaced by simple mechanical operations when it is in the rest position. The adsorbent / desorbent\
    \ material can be regenerated, recycled or disposed of as appropriate.\n\nApplications: Treatment in zoo technical wastewaters\
    \ with high nitrogen content (in decreasing order of total nitrogen content: pollen, pig slurry, slurry and bovine manure)\
    \ after a suitable hydrolysis pretreatment; Capture of ammonia nitrogen that is formed during the hydrolysis phase of\
    \ biomass in biogas / biomethane plants.\n\nAdvantages: Removal of nitrogen present in the sewage, manure and digestate;\
    \ Stabilization of biological process of anaerobic digestion (if the case); Contextual recovery of Nitrogen in the form\
    \ of ammonium ion; Nitrogen reuse, in a circular economy approach, as a biological (liquid) fertilizer to replace the\
    \ fossil based-one."
