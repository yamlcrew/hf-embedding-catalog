  - source_sentence: "Procedure for the detection of organic UV filters. Title: Procedure for the detection of organic UV\
      \ filters\n\nAbstract: \n\nBusiness Description: The invention concerns an optimized analytical procedure for the detection\
      \ and quantification of organic UV filters, emerging contaminants with potential harmful effects on aquatic ecosystems.\
      \ The aim is to develop a simple, rapid, portable, and cost-effective voltammetric method, as an alternative to traditional\
      \ chromatographic techniques, for environmental water monitoring and the characterization of sunscreen products.\n\n\
      Tech Features: The technology is based on an innovative method to detect and quantify UV filters such as octocrylene,\
      \ oxybenzone, and octinoxate, applicable to aqueous matrices and sunscreen products. After a simple sample treatment\
      \ (concentration for water samples or extraction for creams), the analysis is performed using an electrochemical sensor\
      \ that measures specific electrical signals: each substance produces a characteristic “peak,” allowing it to be identified\
      \ and quantified simultaneously. Compared to traditional laboratory methods, such as liquid chromatography or gas chromatography,\
      \ the proposed solution is more cost-effective, portable, rapid, uses fewer solvents, and enables on-site analysis while\
      \ maintaining high sensitivity and repeatability.\n\nApplications: Environmental monitoring of marine, lake, and river\
      \ waters; Control of wastewater and treatment plants; Rapid on-site analysis of emerging contaminants; Characterization\
      \ of sunscreens and oils; Quality control in the cosmetic sector.\n\nAdvantages: Portable method suitable for field\
      \ analysis; Lower costs compared to chromatographic techniques; Reduced use of organic solvents; Fast and simple analyses;\
      \ Simultaneous quantification of multiple UV filters; Good correlation with conventional analytical methods."
