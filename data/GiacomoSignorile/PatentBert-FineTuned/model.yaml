- source_sentence: 'TARGETING SMALL RNAS AS A THERAPY FOR ALS. Title: TARGETING SMALL RNAS AS A THERAPY FOR ALS


    Abstract: The present invention relates to an inhibitor of miR-129, relative compounds and pharmaceutical compositions
    for use in the treatment and/or prevention of amyotrophic lateral sclerosis and Alzheimer''s disease. The invention also
    relates to a method for the diagnosis and/or prognosis of Alzheimer''s disease in a subject or to identify a subject at
    risk to develop amyotrophic lateral sclerosis or Alzheimer''s disease and to a method for the measuring the efficacy of
    a therapy for amyotrophic lateral sclerosis or for Alzheimer''s disease and relative kits.


    Business Description: We propose to develop a drug product to treat all forms of ALS by targeting an important pathogenic
    pathway, miR-129-1 that is up-regulated in both familial and sporadic ALS patients, in human and SOD1 G93A mice (A-B).
    Antisense technology is entering a phase of clinical successes and we believe that our strategy can provide clinically
    meaningful benefit to patients that have no therapeutic hope. To date, current approved treatments for ALS, which at best
    guarantee a span life extension of 3 months, are riluzole (Li et al., Plos One 2013) and edaravone (Ito et al, Exp Neurol,
    2008) .


    Tech Features: Our proposed miR-129-1 PMO therapeutic strategy outperformed when compared with these ALS approved molecules.
    Our patented a miR-129-1 modulation strategy with a Morpholino Antisense Oligonucleotide (ASO-PMO) and demonstrated in
    vivo that it recovers the expression of its target protein HuD, allowing for a 12.5% ​​increase in survival and an improvement
    neuromuscular performance of SOD1 G93A mice, a genetic model of ALS, treated in the pre-symptomatic phase. To improve
    miR-129-1 PMO therapeutic efficacy, better delivery to target tissue is needed: based on our experimental data from another
    study on motor neuron disease, an arginine-rich peptide conjugated with PMO (CPP-PMO) shows an increased efficacy in vivo
    . In addition, the mouse model TDP43 can be used to demonstrate a more general efficacy of the product, before proceeding
    with toxicological and pharmacokinetic evaluation in the preclinical setting. In addition, the mouse model TDP43 can be
    used to demonstrate a more general efficacy of the product, before proceeding with toxicological and pharmacokinetic evaluation
    in the preclinical setting.


    Applications: Familial amyotrophic lateral sclerosis, Sporadic amyotrophic lateral sclerosis, Alzheimer Disease, Epilepsy,
    Fragile X syndrome, Tubero sclerosis complex and Cornea pathologies.


    Advantages: Targeting miRNA allows modulation of a large number of target genes; PMO works as a steric-blocker, a more
    effective strategy when the target is a miRNA; PMO is superior to small molecules for improved target affinity; PMO fulfills
    important criteria of solubility, stability, binding affinity, in vitro and in vivo efficacy and in vivo toxicity if compared
    to other chemistries; PMO has low risk in terms of toxicity, off target effects and immune response stimulation.'
  sentences:
  - 'Antimicrobial dental adhesive graphene-based. Title: Antimicrobial dental adhesive graphene-based


    Abstract: Disclosed is a dental adhesive including a polymeric adhesive and a nanofiller dispersed in the polymeric adhesive,
    the nanofiller being constituted by graphene nanostructures which are properly dispersed inside the polymer adhesive and
    over the surface of the adhesive layer without formation of agglomerates, so that the dental adhesive exhibits significant
    antimicrobial and antibiofilm properties against pathogens of the oral cavity.


    Business Description: The patent is based on a dental adhesive with antimicrobial and anti-biofilm properties taking advantage
    of the use of graphene-based micro and nanometer fillers. The nanomaterials introduced into an adhesive are uniformly
    dispersed, without agglomerations inside the polymer and partially exposed over the adhesive surface. These significantly
    inhibit, by mechanical action, adhesion and bacterial growth.


    Tech Features: The adhesive object of the patent consists of a dental adhesive composed of BisGMA, filled with graphene-based
    nanoplachets (GNP), produced at low cost by thermal expansion, or its derivatives incorporated in the polymer matrix.
    Adhesives have strong antimicrobial properties against the bacteria that typically populate the oral cavity, such as Streptococcus
    mutants. Current commercial adhesives use nanometric fillers, in particular barium glass, zirconium oxide, aluminum oxide,
    or silicon dioxide, for the sole purpose of increasing the micromechanical adhesion between the adhesive and dentin or
    enamel, and therefore typically do not have specific properties. antimicrobials. The antimicrobial dental adhesives used
    have limitations, as organic fillers tend to worsen the mechanical characteristics of dental materials. In fact, these
    fillers are subject to shrinkage after the cure and polymerization phase, just like the matrix and therefore limit the
    mechanical strength of the composite.


    Applications: Dental adhesive with antimicrobial properties.


    Advantages: The particular production process of the new adhesive possess antimicrobial properties; The production of
    this adhesive does not require structural changes to companies producing dental adhesives; GNP possess the properties
    of the basal plane typical of 2D graphene, at a lower cost and without its technological problems. Moreover they can be
    used on a large scale.'
  - "OXYSTEROL FOR THE TREATMENT AND PREVENTION OF CORONAVIRUS DISEASES. Title: OXYSTEROL FOR THE TREATMENT AND PREVENTION\
    \ OF CORONAVIRUS DISEASES\n\nAbstract: \n\nBusiness Description: The invention aims to provide antiviral compounds for\
    \ the prevention and treatment of infections caused by a coronavirus, particularly by SARS-CoV-2. The invention shows\
    \ that 27-hydroxycholesterol can activate the innate immune response and induce the response of cells and tissues. Formulated\
    \ in a pharmaceutical composition, it significantly inhibits the infectivity of SARS-CoV-2 (100% at the highest doses).\n\
    \nTech Features: An oxysterol called 27-hydroxycholesterol (27OHC), a derivative of cholesterol obtained by oxidation,\
    \ endogenous, that is, produced naturally by the human body, has been identified as an antiviral compound. In fact,  in\
    \ vitro tests, 27OHC was administered after inoculating susceptible cells with SARS-CoV-2, simulating a viral infection\
    \ treatment protocol. 27OHC was able to inhibit the replication of SARS-CoV-2 and other human coronavirus that causes\
    \ the common cold (HCoV-OC43), without cytotoxicity, at concentrations in the micromolar range.\n\nThis study has been\
    \ published on the journal Redox Biology and is available ( https://doi.org/10.1016/j.redox.2020.101682 ).\n\nApplications:\
    \ Pharmaceutical sector; Respiratory diseases; Chronic inflammatory gastrointestinal diseases.\n\nAdvantages: New treatment\
    \ for SARS-CoV-2; Treatment active against other Coronaviruses; Physiological drug naturally present in the human organism."
  - 'TARGETING SMALL RNAS AS A THERAPY FOR ALS. Title: TARGETING SMALL RNAS AS A THERAPY FOR ALS


    Abstract: The present invention relates to an inhibitor of miR-129, relative compounds and pharmaceutical compositions
    for use in the treatment and/or prevention of amyotrophic lateral sclerosis and Alzheimer''s disease. The invention also
    relates to a method for the diagnosis and/or prognosis of Alzheimer''s disease in a subject or to identify a subject at
    risk to develop amyotrophic lateral sclerosis or Alzheimer''s disease and to a method for the measuring the efficacy of
    a therapy for amyotrophic lateral sclerosis or for Alzheimer''s disease and relative kits.


    Business Description: We propose to develop a drug product to treat all forms of ALS by targeting an important pathogenic
    pathway, miR-129-1 that is up-regulated in both familial and sporadic ALS patients, in human and SOD1 G93A mice (A-B).
    Antisense technology is entering a phase of clinical successes and we believe that our strategy can provide clinically
    meaningful benefit to patients that have no therapeutic hope. To date, current approved treatments for ALS, which at best
    guarantee a span life extension of 3 months, are riluzole (Li et al., Plos One 2013) and edaravone (Ito et al, Exp Neurol,
    2008) .


    Tech Features: Our proposed miR-129-1 PMO therapeutic strategy outperformed when compared with these ALS approved molecules.
    Our patented a miR-129-1 modulation strategy with a Morpholino Antisense Oligonucleotide (ASO-PMO) and demonstrated in
    vivo that it recovers the expression of its target protein HuD, allowing for a 12.5% ​​increase in survival and an improvement
    neuromuscular performance of SOD1 G93A mice, a genetic model of ALS, treated in the pre-symptomatic phase. To improve
    miR-129-1 PMO therapeutic efficacy, better delivery to target tissue is needed: based on our experimental data from another
    study on motor neuron disease, an arginine-rich peptide conjugated with PMO (CPP-PMO) shows an increased efficacy in vivo
    . In addition, the mouse model TDP43 can be used to demonstrate a more general efficacy of the product, before proceeding
    with toxicological and pharmacokinetic evaluation in the preclinical setting. In addition, the mouse model TDP43 can be
    used to demonstrate a more general efficacy of the product, before proceeding with toxicological and pharmacokinetic evaluation
    in the preclinical setting.


    Applications: Familial amyotrophic lateral sclerosis, Sporadic amyotrophic lateral sclerosis, Alzheimer Disease, Epilepsy,
    Fragile X syndrome, Tubero sclerosis complex and Cornea pathologies.


    Advantages: Targeting miRNA allows modulation of a large number of target genes; PMO works as a steric-blocker, a more
    effective strategy when the target is a miRNA; PMO is superior to small molecules for improved target affinity; PMO fulfills
    important criteria of solubility, stability, binding affinity, in vitro and in vivo efficacy and in vivo toxicity if compared
    to other chemistries; PMO has low risk in terms of toxicity, off target effects and immune response stimulation.'
- source_sentence: "High reduction and backdrivability ACTUATion SYSTEM with minimal lateral encumbrance. Title: High reduction\
    \ and backdrivability ACTUATion SYSTEM with minimal lateral encumbrance\n\nAbstract: \n\nBusiness Description: Typical\
    \ robotic actuation units have a motor and its transmission system aligned with the axis of the joint they actuate, resulting\
    \ in large lateral encumbrance of the whole system.\n\nThis solution aims at solving this problem and allows to locate\
    \ the last transmission stage at an arbitrary distance from the axis of the screw.\n\nTech Features: This invention consists\
    \ in a class of actuation systems which is specifically designed to minimize the lateral encumbrance of the exoskeletal\
    \ system to maximize its practical usability. Its core components are a motor coupled to a leadscrew or ballscrew system\
    \ and a further (arbitrary) transmission system to connect the nut of the screw based transmission to the output wheel.\n\
    \nFurthermore, this solution allows to displace the location of the screw with respect to the final transmission stage,\
    \ allowing the adaptation of the location of the different stages of the system without influencing the overall behavior.The\
    \ designed anti-blockage system guarantees proper functioning of each mechanical component and high back-drivability of\
    \ the overall system even for high overall gearing.\n\nApplications: Robotics.\n\nAdvantages: Minimal lateral encumbrance;\
    \ High gearing; Highly Back-drivable; Torque estimation through current measurement; Capability of dislocating the screw\
    \ from the point of application of force."
