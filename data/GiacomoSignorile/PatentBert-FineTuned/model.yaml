      \ ACTUATion SYSTEM with minimal lateral encumbrance\n\nAbstract: \n\nBusiness Description: Typical robotic actuation\
      \ units have a motor and its transmission system aligned with the axis of the joint they actuate, resulting in large\
      \ lateral encumbrance of the whole system.\n\nThis solution aims at solving this problem and allows to locate the last\
