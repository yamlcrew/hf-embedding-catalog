  widget:
  - source_sentence: "COMPOSITIONS COMPRISING OR CONSISTING OF POLYDATIN FOR USE IN TREATMENT OF BONE DISEAS. Title: COMPOSITIONS\
      \ COMPRISING OR CONSISTING OF POLYDATIN FOR USE IN TREATMENT OF BONE DISEAS\n\nAbstract: \n\nBusiness Description: The\
      \ patent concerns the possible use of polydatin for the treatment of pathologies characterized by reduced bone mass.\
      \ Polydatin is an oligostilbene that can be extracted in abundant quantities from the roots of the Polygonum Cuspidatum\
      \ plant and, according to our studies about osteoblastic proliferation and differentiation, is able to increase osteogenic\
      \ activity.\n\nTech Features: Skeletal pathologies are widespread in the world population, more than 200 million people\
      \ are osteoporosis patients and have a high probability of fracture. Polydatin is a substance of natural origin, free\
      \ of the side effects related to the use of synthetic drugs, currently administered for the treatment of bone loss diseases\
      \ . Our experiments carried out in two-dimensional cultures (2D) and in cells grown on Scaffold (3D), have shown that\
      \ polydatin is able to increase the activity of osteoblasts (ALP) and the deposition of Bone Matrix. The compositions\
      \ comprising or consisting of polydatin may be administered orally (for example capsules or tablets, solutions, emulsions)\
      \ or topically (oils, creams, ointments), or even through an appropriate enrichment of the active ingredient in functional\
      \ foods\n\nApplications: Patients with traumatic-degenerative pathologies of the skeleton and oral cavity; Osteoporosis\
      \ patients;\n\nAdvantages: Molecule of natural origin; Antioxidant activity on the whole organism; Possibility of topical\
      \ use;"
    sentences:
    - "Inhibitory compounds neurodegeneration and tumors. Title: Inhibitory compounds neurodegeneration and tumors\n\nAbstract:\
      \ \n\nBusiness Description: The inhibition of the monoacylglycerol lipase enzyme (MAGL), naturally present in many brain\
      \ cells and involved in physio-pathological processes, has a high therapeutic potential: neurodegenerative inflammation\
      \ pathologies and tumors could be treated with new reversible inhibitory compounds, which would reduce the side effects\
      \ of the irreversible inhibitors tested so far.\n\nTech Features: Monoacylglycerol lipase (MAGL) is a human enzyme of\
      \ the endocannabinoid system involved in numerous physio-pathological processes (regulation of inflammation, anxiety,\
      \ immune modulation, motor coordination ...), yet its overexpression/upregulation can cause neuroinflammatory diseases\
      \ and tumors. The inhibition of MAGL for therapeutic purposes has been studied so far with irreversible inhibitors,\
      \ which however nullify the enzyme activity, leading to a progressive loss of the therapeutic effect and to addiction\
      \ phenomena. On the contrary, the new-patented compounds based on a strong non-covalent reversible mechanism of action\
      \ avoid the side effects mentioned. Effective in laboratory on various tumor cell lines (e.g. colorectal, breast and\
      \ ovarian cancer), they could also treat other MAGL-mediated pathologies (neuroinflammation/degeneration, pain, amyotrophic\
      \ multiple/lateral sclerosis, Alzheimer's disease, Parkinson's disease). Link to scientific publication and information\
      \ on Ca' Foscari website\n\nApplications: Innovative and less harmful pharmaceutical compositions for the treatment\
      \ of serious neurodegenerative pathological conditions; Innovative and less harmful pharmaceutical compositions for\
      \ cancer treatment.\n\nAdvantages: Temporary nature and reversibility; Drastic reduction of side effects; High efficacy\
      \ tested on tumor cell lines; Exploitable to treat numerous neurodegenerative diseases; One of the few non-covalent\
      \ reversible MAGL inhibitors with high efficacy."
    - 'New computational method for the prognosis of amyotrophic lateral sclerosis. Title: New computational method for the
      prognosis of amyotrophic lateral sclerosis


      Abstract: A method is described for determining a disease progression and survival prognosis, at a succession of prediction
      times, for patients suffering from amyotrophic lateral sclerosis (ALS). The method comprises a step of defining a set
      of variables associated with the onset and progression of amyotrophic lateral sclerosis, comprising a first group of
      variables associated with the onset of amyotrophic lateral sclerosis (comprising at least the variables “patient sex”,
      “disease onset age”, “disease onset site”), a second group of dynamic time variables (comprising at least the variable
      “time elapsed since disease onset”), a third group of dynamic functional variables (comprising at least one of the variables
      breathing, swallowing, communicating, walking/self-care or at least one variable of a functional progression and/or
      severity scale of amyotrophic lateral sclerosis), and further at least one variable associated with survival. The method
      further provides for encoding by means of a Dynamic Bayesian Network, using at least one trained algorithm, a plurality
      of probabilistic conditional dependence relationships, in which each relationship is a probabilistic conditional dependence
      relationship between two of the aforesaid variables. The aforesaid prediction times are defined so that each prediction
      time belongs to a respective time interval in which the conditional dependence relationships between the variables are
      stationary. The method further involves describing the Dynamic Bayesian Network, using at least one trained algorithm,
      by means of a corresponding graph, comprising said variables as nodes and comprising topological connections oriented
      between nodes corresponding to variables among which a probabilistic conditional dependence is identified. In the graph,
      given a node, the connections entering it show a conditional probability of the value assumed by the variable associated
      with such node, in a given prediction time, depending on the values assumed, in a prior prediction time, from the variables
      associated with the nodes from which such connections originate. The method further comprises the steps of entering,
      for each of the defined variables, data acquired at a given acquisition time relating to the situation of a specific
      patient; and calculating, by electronic processing and/or calculating means, on the basis of the Dynamic Bayesian Network
      and the graph, and starting from the aforesaid acquired data, the values of each of the defined variables, at one or
      more prediction times following the acquisition time. Finally, the method involves obtaining, in a given prediction
      time, disease progression prognosis results on the basis of the values of one or more of the variables of the third
      group calculated in such prediction time; and the survival prognosis results on the basis of the value of at least one
      variable associated with survival, calculated at such prediction time.


      Business Description: The invention relates to a new probabilistic model based on dynamic Bayesian networks: by introducing
      specific clinical data of patients suffering from amyotrophic lateral sclerosis (ALS), the model object of the invention
      allows to predict the course of the disease, the loss of autonomy in specific functional domains and the survival, and
      to identify risk factors of the disease.


      Tech Features: Amyotrophic lateral sclerosis (ALS) is a neurodegenerative disease, characterized by progressive muscle
      paralysis caused by motor neuron degeneration. The onset and progression of ALS are very heterogeneous, making the development
      of personalised approaches extremely difficult. The invention consists of a probabilistic predictor of ALS progression,
      based on a dynamic Bayesian network built using a database of over 4000 patients treated at specialised centres in Italy
      and Israel. By intoducing the clinical information of a new ALS subject, the invention allows to simulate the clinical
      course and to probabilistically predict the risk of impairment of the functional domains typical of ALS and the survival,
      representing an important tool to support clinical decision-making and the drafting of the treatment plan.


      Applications: Online platform (SaaS)/software for predicting ALS progression; Support to clinical decision and drafting
      of the treatment plan; Institutional stakeholder decision support; In silico generation of patient populations with
      specific characteristics.


      Advantages: Prediction of ALS progression; Personalized medicine approach; Clinical decision support; Identification
      of new prognostic markers; Possible alternative to placebo cohorts in clinical trials.'
