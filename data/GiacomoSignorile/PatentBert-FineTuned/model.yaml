    - 'Polymeric endodontic instruments. Title: Polymeric endodontic instruments


      Abstract: The present invention relates to an endodontic tool for shaping a dental root canal, wherein said tool comprises
      a handle (13), a tang (11), and a stem (10) made of polymeric material and comprising a tip (12) and at least one helically
      developing cutting edge (100), and wherein said stem (10) develops along a longitudinal axis (A-A). The stem (10) has
      a substantially conical or tapering twisted shape, in particular said stem (10) having a solid cross-section with a
      diameter increasing from the tip (12) to the tang (11).


      Business Description: Endodontic files for shaping canal roots are made of Ni-Ti alloy or stainless steel. Production,
      based on precision micromechanics processes, involves high costs and time. Production limitations affect the geometries,
      especially near the tip, reducing cutting efficiency. Another critical issue is the potential failure of the instrument
      during treatment, which can trap it in the canal and require invasive procedures for the patient.


      Tech Features: The analysis of materials databases has identified families of biocompatible polymers, potentially reinforced,
      capable of sustaining the applied loads even better than the traditional metallic materials used for endodontic files.
      The selected polymers offer advantages in terms of fatigue resistance and reduced costs. However, they present critical
      issues related to hardness and torsion resistance, which are fundamental characteristics for the shaping of the canal
      root. To address these issues, the use of biocompatible surface coatings with high hardness and low friction coefficient
      is proposed, applicable through technologies such as chemical vapor deposition. These coatings can significantly improve
      the surface resistance of polymers, making them suitable for use in endodontic files.


      Applications: Biocompatible polymers have been identified that withstand critical stresses leading to the failure of
      metallic tools during canal shaping; The identified polymers, with lower density and cost compared to metals, allow
      the use of inexpensive mass production technologies.


      Advantages: Drastic reduction in production costs; Reduction or elimination of the risk of instrument failure in the
      canal; Creation of innovative geometries through 3D printing or injection molding for large-scale production.'
    - 'Unidirectional mechanical device. Title: Unidirectional mechanical device


      Abstract: Unidirectional mechanical device comprising at least one array (10; 20) of three or more cells (100; 200).
      Each cell (100; 200) of the array comprises: a floating mass (101; 201); at least one first elastic element (102; 202)
      connecting the floating mass (101; 201) to a reference external structure for the unidirectional mechanical device,
      wherein the at least one first elastic element (102; 202) comprises at least one first folded beam; at least one second
      elastic element (103) connecting the floating mass (101) to a second floating mass of a preceding cell of the at least
      one array (10), wherein the at least one second elastic element (103) comprises at least one second folded beam; at
      least one third elastic element (104) connecting the floating mass (101) to a third floating mass of a succeeding cell
      of the at least one array (10), wherein the at least one third elastic element (104) comprises at least one third folded
      beam; an electric system configured to control a potential difference acting on the floating mass (101; 201), determining
      an overall electrostatic stiffness of the at least one array (10; 20).


      Business Description: The invention consists of a mono-directional mechanical filter at a micrometric scale, which can
      be integrated into MEMS systems. In certain frequency bands, the device allows the propagation of mechanical waves in
      only one direction, blocking those travelling in the opposite direction. We obtain this filter by means of a periodic
      structure with time-modulated stiffness, here achieved by regulating suitable voltages.


      Tech Features: In mechanics, the principle of reciprocity dictates that a system excited at point A and observed at
      point B behaves in the same way if excited at B and observed at A. One of the ways to create a non-reciprocal system
      is to break temporal invariance. A substantial number of scientific works in recent years have dealt with the theoretical
      and experimental description of these systems, created through periodic structures of time-varying stiffness. However,
      these works remain confined to the level of speculation and demonstrative prototypes to the macro-scale, with complicated
      and difficult to implement solutions. The present invention realizes the above principles in an easy-to-produce MEMS
      device by using an electrostatic principle for the modulation of the stiffness which, since it is not present at the
      macro-scale but only at the micro-scale, had not been considered with this aim up to now. Essentially, the system is
      made up of the repetition of some elementary cells, made up of springs and masses that house an electrode with parallel
      faces for modulation. We speculate that this new type of system can be used both as a new sensor and/or as a component
      (e.g. filter) in more complex systems.


      Applications: MEMS directional sensor; Directional filter for devices that use elastic waves as the main means of transduction.


      Advantages: Uses mechanical waves; Mechanical device with non-symmetrical response (equivalent of an electric diode);
      Lower frequencies as compared to electromagnetic waves; Can be manufactured using traditional MEMS technologies.'
  - source_sentence: "GEL FORMULATION FOR THE ORAL ADMINISTRATION OF DRUGS IN PARTICULAR TO DYSPHAGIC PATIENTS. Title: GEL\
      \ FORMULATION FOR THE ORAL ADMINISTRATION OF DRUGS IN PARTICULAR TO DYSPHAGIC PATIENTS\n\nAbstract: \n\nBusiness Description:\
      \ The present invention relates to a gel formulation containing water-soluble active ingredients mainly available on\
      \ the pharmaceutical market as oral solid dosage forms such as immediate-release tablets or capsules or powders or granules\
      \ for oral use. The formulation object of the present invention satisfies the particular needs of patients who show\
      \ anomalies in the swallowing process. The pathological condition related to swallowing problems is called dysphagia.\n\
      \nTech Features: The present invention provides a method for reformulating water-soluble drugs, when commercially available\
      \ for oral administration only in solid form with immediate release, mostly tablets and / or capsules without neglecting\
      \ the existence of granules and powders for oral use. Drugs are reformulated as semi-solid preparations suitable for\
      \ oral administration in patients with swallowing. This method allows to obtain an unchanged release of the active ingredient,\
      \ compared to that of the drug formulated in the original dosage form. The present patent therefore describes a semi-solid\
      \ formulation with rheological characteristics comparable to commercially gelled drinks, used for hydration and the\
      \ administration of therapy to patients with swallowing disorders.\n\nApplications: Avoid any handling operations by\
      \ eliminating the dangers associated with loss of active substance; Avoid contamination and dosage errors with greater\
      \ safety in the administration of drugs; The active substance is formulated in a dosage form with a consistency suitable\
      \ for swallowing in the dysphagic patients without its release kinetics being altered.\n\nAdvantages: Potential applicability\
      \ in hospital pharmacies to standardize, optimize and automate the galenic preparations of drugs available only as tablets;\
      \ Large-scale marketing can improve the therapeutic possibilities for dysphagia patients; Industrial production may\
      \ cover a market share, which is currently entrusted to galenic production in a pharmacy."
    sentences:
    - "Supplement for psychiatric disorders. Title: Supplement for psychiatric disorders\n\nAbstract: \n\nBusiness Description:\
      \ The present invention relates to an ester of a phospholipid with conjugated linoleic acid (CLA) as a nutritional supplement\
      \ in treatment of psychiatric disorders with neuroinflammatory and neurodegenerative basis, such as depression, bipolar\
      \ disorder and schizophrenia.\n\nTech Features: The search for alternative therapies in place of non-steroidal anti-inflammatory\
      \ drugs for neuroinflammation is crucial since the risk of side effects derived from their use has been demonstrated\
      \ especially during pregnancy with serious outcomes such as the development of sexual organs in the fetus as well as\
      \ subsequent psychiatric trajectory in the offspring life in both sexes. Therefore, an alternative therapeutic approach\
      \ would be resolutive to pharmacological treatment. We have shown in in-vivo models that the dietary intake of 0.5%\
      \ CLA (i) increases omega-3 DHA fatty acid levels by approx. 10 times in both the maternal and fetal liver, and approx.\
      \ 5 times in the fetal brain; (ii) increases gene expression of PPAR alpha and its PEA and OEA ligands. These molecules\
      \ are known to exert a potent anti-neuroinflammatory activity and thereby a protective effect against those psychiatric\
      \ disorders with neuroinflammatory basis. Furthermore, as ester of a phospholipid the bioavailability of CLA is increased.\n\
      TRL= 3 - 4 ( in-vivo )\n\nApplications: Psychiatric disorders with neuroinflammatory basis such as depression, bipolar\
      \ disorder and schizophrenia.\n\nAdvantages: Absence of side effects; Suitable also during critical windows of vulnerability\
      \ such as pregnancy and infancy; CLA can be formulated as a functional food, facilitating its compliance."
    - "Safepack: Safety Backpack for riders. Title: Safepack: Safety Backpack for riders\n\nAbstract: \n\nBusiness Description:\
      \ Safepack is the first smart backpack designed for Gig Economy delivery service riders. It is fully integrated into\
      \ the work dynamics and improves user safety by reducing the possibility of distraction and enhancing communication\
      \ with other road users.\n\nTech Features: Safepack consists of: 1) Tactile navigation system, inserted in the belt,\
      \ consisting of piezoelectric actuators that vibrate in the direction of the path to follow and an inflation system\
      \ that ensures the fitting and correct perception of the vibration. 2) Communication system based on voice interface\
      \ (Speaker and microphone): the rider can receive information from the platform, such as the delivery of a new order\
      \ (collection / delivery point, distance, compensation), can accept or reject it and communicate delays or emergencies.\
      \ 3) Automatic lighting system, aimed at improving communication with other road users. The light is generated by side-emitting\
      \ optical fibers connected to a yellow LED for the visibility lights, and red LEDs for the directional and brake lights.\
      \ Finally, Safepack communicates via bluetooth with the platform app and with the navigation app. The volume of the\
      \ voice interface and the intensity of the vibration can be adjusted thanks to a pressure sensor placed in the right\
      \ shoulder strap.\n\nApplications: Riders working in Gig economy delivery services.\n\nAdvantages: A smart product perfectly\
      \ integrated into the working dynamics of the delivery platforms; Offers a support tool that allows a rider not to have\
      \ to constantly look at a smartphone to receive navigation instructions and information from the platform app; Improves\
      \ rider safety by reducing distracting factors, making him visible and communicating his movements to other road users."
    - "GEL FORMULATION FOR THE ORAL ADMINISTRATION OF DRUGS IN PARTICULAR TO DYSPHAGIC PATIENTS. Title: GEL FORMULATION FOR\
