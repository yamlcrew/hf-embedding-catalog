    - "Fluid filtering device based on a rotating valve pressure exchanger. Title: Fluid filtering device based on a rotating\
      \ valve pressure exchanger\n\nAbstract: \n\nBusiness Description: The invention consists of an high pressure reciprocating\
      \ pumping system equipped with an energy recovery device, intended for reverse osmosis plants. The patented device,\
      \ descending by previous ENEA's patents, permits to realize water treatment plants with low energy consumption.\n\n\
      Tech Features: During ENEA's research in absorption refrigeration machines, have been patented several reciprocating\
      \ pumping systems based on oil gear pumps coupled with an original self-adjusting rotating valve. Such a coupling, instead\
      \ of the usual piston-rod-crank kinematic, has permitted to realize low cost and high reliability high pressure reciprocating\
      \ pumps, called \"VR pumps\". Basing on the original know-how developed for the technology, a new invention has been\
      \ patented, which consists to link a high pressure primary pump, VR type or not, to a second VR pump acted by the pressure\
      \ of the waste water coming from the desalination plant, instead by pressurized oil as usual. Such second VR pump acts\
      \ on the desalination circuit like an innovative pressure exchanger.\n\nApplications: Reverse osmosis desalination plants;\
      \ Microfiltration desalination plants.\n\nAdvantages: Low cost; Easy scale up; Suitable for small plants; Low specific\
      \ energy consumption."
    - "Mechanical towing for automatic vehicle convoys. Title: Mechanical towing for automatic vehicle convoys\n\nAbstract:\
      \ \n\nBusiness Description: The patent allows a mechanical coupling between vehicles in order to guarantee the safety\
      \ and operation of a convoy of even 10 vehicles capable of circulating as if it were a single vehicle. This technology\
      \ therefore allows a single driver in the head vehicle to automatically control the convoy of vehicles connected, revolutionizing\
      \ the local transport systems with transport services that would otherwise not be feasible.\n\nTech Features: The patented\
      \ mobile mechanical connection couples two vehicles and transforms them into a convoy that moves like a single unit.\
      \ By means of an automatic guidance system, the coupled vehicles are able to synchronize automatically with the movements\
      \ of the head vehicle, ensuring compliance with the trajectory of the head vehicle. The mechanical connection also acts\
      \ as a safeguard in case of malfunctions and motion \"harmonizer\". This system allows single vehicles to form convoys\
      \ driven by the driver only on the leading vehicle: free-flow car-sharing vehicles can be relocated from areas where\
      \ they would be stationed for a long time to areas where there is demand, forming a convoy also of 10 vehicles and moving\
      \ them with one driver; buses can be extended for the central sections of the transport lines with the highest demand\
      \ without increasing the drivers; transport systems can be created in which small buses gather people on call in the\
      \ suburbs and form a single convoy that crosses the center with a single driver. The patented coupling mechanism allows\
      \ passenger transport companies to re-organize their services by means of convoys of vehicles which combine the maintenance\
      \ of the optimum passenger capacity and the social requirements imposed by pandemic of COVID-19 and the containment\
      \ measures taken.\n\nApplications: Car-sharing services; Logistics and goods distribution companies; Public and private\
      \ transport with variable capacity.\n\nAdvantages: Certified transport system; Responsible automation; Flexible and\
      \ client-oriented transport system; Efficiency of transport and sharing systems; Management cost reduction, creating\
      \ capillary and high capacity services."
