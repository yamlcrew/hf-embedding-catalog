      \nFurthermore, this solution allows to displace the location of the screw with respect to the final transmission stage,\
      \ allowing the adaptation of the location of the different stages of the system without influencing the overall behavior.The\
      \ designed anti-blockage system guarantees proper functioning of each mechanical component and high back-drivability\
      \ of the overall system even for high overall gearing.\n\nApplications: Robotics.\n\nAdvantages: Minimal lateral encumbrance;\
