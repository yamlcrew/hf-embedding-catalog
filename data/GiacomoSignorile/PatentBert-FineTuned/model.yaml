  - source_sentence: "OFFLOADNN. Title: OFFLOADNN\n\nAbstract: \n\nBusiness Description: Resource availability at the edge\
      \ is generally limited, with particular regard to memory consumption of DNNs, rarely considered as a limiting factor\
      \ to the execution of tasks at the edge. Furthermore, the structure of the DNNs required for different CV inference\
      \ tasks and the correlation among them have often been overlooked. Accounting for all this, the invention decreases\
      \ the resource consumption of DNNs dedicated to run CV tasks, which in turn allow to run more tasks or to decrease the\
      \ energy consumption with the same number of running tasks.\n\nTech Features: The invention is OffloaDNN, a framework\
      \ to support the scalable offloading of computer vision (CV) tasks to the edge. We formulated the problem of DNN for\
      \ scalable Offloading of Tasks (DOT) to find the optimal configuration of the DNN, the tasks that can be admitted and\
      \ the allocation of compute and network resources to assign to the tasks. DOT minimizes the task rejection rate and\
      \ resource consumption, while meeting the accuracy and latency requirements of admitted tasks. As the DOT is NP-hard,\
      \ and therefore complex to solve to optimality, OffloaDNN solves the DOT efficiently using a weighted tree-based graph\
      \ modeling of the feasible solutions. The invention allows to decrease the resources needed at the edge, also allowing\
      \ for multiple task execution when these require the same DNN components. The lowering of resources needed implies also\
      \ a lower energy consumption with operational savings.\n\nApplications: Computer vision tasks using edge computing.\n\
      \nAdvantages: Lower resources needed at the edge; Lower energy consumption; Lower operative costs."
