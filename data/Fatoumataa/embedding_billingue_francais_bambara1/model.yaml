widgetData:
- source_sentence: bantuw ka bonya ye mun ye ani a ye nɔ jumɛn bila sahara woroduguyanfan afiriki la?
  sentences:
  - le trac est une anxiété liée à la performance. on peut le gérer par la respiration profonde, la répétition et la visualisation
    positive pour canaliser l'énergie.
  - bantuw ka bonya ye mɔgɔw ka bɔnɔgɔla ni kanko tɔnba ye min kɛra san ba caman kɔnɔ, ka bantu kanw ni sɛnɛko ni nɛgɛko fɛɛrɛw
    jɛnsɛn sahara woroduguyanfan afiriki fanba la, ka sigida jamanaw sɛmɛntiya kosɛbɛ.
  - bantuw ka farali, afiriki sahara woroduguyanfan fɛ, bantukanw, sɛnɛ, nɛgɛko
- source_sentence: définissez l'adaptation chez les animaux.
  sentences:
  - ka i sen don sigida ɲɛnamaya la, o b'a to i bɛ se ka baara dege kulu kɔnɔ, ka sekow yiriwa ani ka i sen don kosɛbɛ i ka
    sigida yiriwali la. o ye jamanadenw ka degeliw ye.
  - c'est la capacité d'un animal à changer de couleur rapidement. (ceci est une forme d'adaptation (camouflage), mais pas
    la définition générale de l'adaptation animale).
  - l'adaptation animale est l'évolution des caractéristiques physiques ou comportementales d'une espèce, au fil des générations,
    qui lui permettent de mieux survivre et se reproduire dans son environnement spécifique.
- source_sentence: quel est le résultat si on moitié 2 ?
  sentences:
  - 1. car le moitié de 2 est 1.
  - farikolokan (bolonɔbila, jɔcogo, ɲɛda cogoya) bɛ daɲɛ cikan dafa ani k'a barika bonya, ka dusukunnataw ni ŋaniyaw lase
    minnu ma fɔ, minnu nafa ka bon kumaɲɔgɔnya dafalen na.
  - -4. erreur fréquente dans le calcul de moitié.
- source_sentence: zuluw n'u ka kɛlɛli tubabukan ɲɛfɔ.
  sentences:
  - zuluw ye afiriki saheliyanfan mɔgɔw ye, minnu tɔgɔ bɔra u ka sɔrɔdasi jɛkulu fɛ chaka zulu ka fanga kɔrɔ san kɛmɛda xixe
    siècles na. u ye tubabu kɛlɛ kosɛbɛ, kɛrɛnkɛrɛnnenya la isandlwana kɛlɛ la san 1879, hali ni u labanna ka se sɔrɔ.
  - sɔrɔdasi fɛɛrɛ kura (bufalo horns) ,zuluw tun ye jamana ye min ye tubabu bisimila hɛrɛ la afiriki saheliyanfan fɛ. (u
    ka tariku n'u ni sigibagaw cɛsira ɲɛfɔli nkalonma).
  - '''théboudienne'' tɛ maliden ye nka senegali don. mali la, '' jɛgɛ tiga '' ye dumuni ye min ka di kosɛbɛ, a ka c''a la,
    a bɛ labɛn ni nakɔfɛnw ni tomati mɔni ye.'
- source_sentence: expliquez le rôle du contrat social selon john locke.
  sentences:
  - protection des droits naturels,le contrat social sert à rendre le peuple entièrement soumis à un souverain absolu. (locke
    défend un gouvernement limité, pas une soumission absolue comme hobbes).
  - les éco-gestes (réduire sa consommation, trier, réutiliser) diminuent la quantité de déchets produits et facilitent leur
    valorisation. ils réduisent le volume à collecter et à traiter, allégeant la pression sur les systèmes de gestion des
    déchets.
  - pour locke, le contrat social est un accord par lequel les individus sortent de l'état de nature pour protéger leurs droits
    naturels et établir un gouvernement limité. il fonde la société civile.
