- source_sentence: who is the publisher of the norton anthology american literature
  sentences:
  - W. W. Norton & Company W. W. Norton & Company is an American publishing company based in New York City. It has been owned
    wholly by its employees since the early 1960s. The company is known for its "Norton Anthologies" (particularly The Norton
    Anthology of English Literature) and its texts in the Norton Critical Editions series, the latter of which are frequently
    assigned in university literature courses.
  - New Orleans La Nouvelle-Orléans (New Orleans) was founded in Spring of 1718 (7 May has become the traditional date to
    mark the anniversary, but the actual day is unknown[25]) by the French Mississippi Company, under the direction of Jean-Baptiste
    Le Moyne de Bienville, on land inhabited by the Chitimacha. It was named for Philippe II, Duke of Orléans, who was Regent
    of the Kingdom of France at the time. His title came from the French city of Orléans.
  - I Really Like You The music video was directed by Peter Glanz. Jepsen filmed part of the song's music video on 16 February
    2015, in front of the Mondrian Hotel in Manhattan alongside Tom Hanks, Justin Bieber and a troupe of dancers. Also making
    cameo appearances in the video are Rudy Mancuso and Andrew B. Bachelor (A.K.A. King Bach), well-known users of the short-form
    video sharing application Vine. The video was released on 6 March 2015.[15] CBC Music's Nicolle Weeks described it as
    "a more affable version" of the music video for The Verve's "Bitter Sweet Symphony" (1997).[16] The music video has been
    rated as one of 10 Best Music Videos of 2015 (So Far) by the readers of Billboard.[17]
- source_sentence: how many members on the house of representatives
  sentences:
  - 'United States House of Representatives The composition and powers of the House are established by Article One of the
    United States Constitution. The House is composed of Representatives who sit in congressional districts that are allocated
    to each of the 50 states on a basis of population as measured by the U.S. Census, with each district entitled to one representative.
    Since its inception in 1789, all Representatives have been directly elected. The total number of voting representatives
    is fixed by law at 435.[1] As of the 2010 Census, the largest delegation is that of California, with fifty-three representatives.
    Seven states have the smallest delegation possible, a single representative: Alaska, Delaware, Montana, North Dakota,
    South Dakota, Vermont, and Wyoming.[2]'
  - Ain't No Mountain High Enough "Ain't No Mountain High Enough" is an R&B/soul song written by Nickolas Ashford & Valerie
    Simpson in 1966 for the Tamla label, a division of Motown. The composition was first successful as a 1967 hit single recorded
    by Marvin Gaye and Tammi Terrell, becoming a hit again in 1970 when recorded by former Supremes frontwoman Diana Ross.
    The song became Ross' first solo number-one hit on the Billboard Hot 100 chart and was nominated for a Grammy Award.
  - Synthetic element In chemistry, a synthetic element is a chemical element that does not occur naturally on Earth, and
    can only be created artificially. So far, 24 synthetic elements have been created (those with atomic numbers 95â€“118).
    All are unstable, decaying with half-lives ranging from 15.6 million years to a few hundred microseconds.
- source_sentence: what is the meaning of mbbs and md
  sentences:
  - Adductor longus muscle Its main actions is to adduct and laterally rotate the thigh; it can also produce some degree of
    flexion/anteversion.[1]
  - Category 6 cable When used for 10/100/1000BASE-T, the maximum allowed length of a Cat 6 cable is up to 100 meters (328 ft).
    This consists of 90 meters (295 ft) of solid "horizontal" cabling between the patch panel and the wall jack, plus 5 meters
    (16 ft) of stranded patch cable between each jack and the attached device.[7] For 10GBASE-T, an unshielded Cat 6 cable
    should not exceed 55 meters.[8]
  - Doctor of Medicine Historically, Australian medical schools have followed the British tradition by conferring the degrees
    of Bachelor of Medicine and Bachelor of Surgery (MBBS) to its graduates whilst reserving the title of Doctor of Medicine
    (MD) for their research training degree, analogous to the PhD, or for their honorary doctorates. Although the majority
    of Australian MBBS degrees have been graduate programs since the 1990s, under the previous Australian Qualifications Framework
    (AQF) they remained categorized as Level 7 Bachelor's degrees together with other undergraduate programs.
- source_sentence: what holds the bone ends of an amphiarthrodial joint together
  sentences:
  - Pubic symphysis The pubic symphysis is a nonsynovial amphiarthrodial joint. The name comes from the Greek word "symphysis",
    meaning "growing together". The width of the pubic symphysis at the front is 3–5 mm greater than its width at the back.
    This joint is connected by fibrocartilage and may contain a fluid-filled cavity; the center is avascular, possibly due
    to the nature of the compressive forces passing through this joint, which may lead to harmful vascular disease.[2] The
    ends of both pubic bones are covered by a thin layer of hyaline cartilage attached to the fibrocartilage. The fibrocartilaginous
    disk is reinforced by a series of ligaments. These ligaments cling to the fibrocartilaginous disk to the point that fibers
    intermix with it.
  - 'John 3:16 In Exodus 4:22, the Israelites as a people are called "my firstborn son" by God using the singular form. In
    John, the focus shifts to the person of Jesus as representative of that title. The verse is part of the New Testament
    narrative in the third chapter of John in the discussion at Jerusalem between Jesus and Nicodemus, who is called a "ruler
    of the Jews". (v.1) After speaking of the necessity of a man being born again before he could "see the kingdom of God",
    (v.3) Jesus spoke also of "heavenly things" (v.11-13) and of salvation (v.14-17) and the condemnation (v.18,19) of those
    that do not believe in Jesus. "14 And as Moses lifted up the serpent in the wilderness, even so must the Son of man be
    lifted up: 15 That whosoever believeth in him should not perish, but have eternal life." (John 3:14-15) Note that verse
    15 is nearly identical to the latter part of John 3:16.'
  - Tony Hadley Anthony Patrick Hadley (born 2 June 1960) is an English singer-songwriter, occasional stage actor and radio
    presenter. He rose to fame in the 1980s as the lead singer of the new wave band Spandau Ballet before launching a solo
    career following the group's split in 1990. Hadley is recognisable for his suave image,[1] as well as his powerful blue-eyed
    soul voice, which has been described by AllMusic as a "dramatic warble".[2] He has also been described as a "top crooner"
    by the BBC.[3]
- source_sentence: what are the 5 liberties of the first amendment
  sentences:
  - First Amendment to the United States Constitution The First Amendment (Amendment I) to the United States Constitution
    prohibits the making of any law respecting an establishment of religion, ensuring that there is no prohibition on the
    free exercise of religion, abridging the freedom of speech, infringing on the freedom of the press, interfering with the
    right to peaceably assemble, or prohibiting the petitioning for a governmental redress of grievances. It was adopted on
    December 15, 1791, as one of the ten amendments that constitute the Bill of Rights.
  - Poor People's Campaign The SCLC announced the campaign on December 4, 1967. King delivered a speech which identified "a
    kind of social insanity which could lead to national ruin."[23] In January 1968, the SCLC created and distributed an "Economic
    Fact Sheet" with statistics explaining why the campaign was necessary.[24] King avoided providing specific details about
    the campaign and attempted to redirect media attention to the values at stake.[25] The Poor People’s Campaign held firm
    to the movement’s commitment to non-violence. “We are custodians of the philosophy of non-violence,” said King at a press
    conference. “And it has worked”.[9] King originally wanted the Poor People's Campaign to start in Quitman County, Mississippi
    because of the intense and visible economic disparity there.[26]
  - 'Jake and the Never Land Pirates Jake and the Never Land Pirates (also known as Captain Jake and the Never Land Pirates
    in the fourth season and associated merchandise[1]) is an Annie Award-winning musical and interactive American children''s
    animated television series shown on Disney Junior. It is based on Disney''s Peter Pan franchise, which in turn is based
    on the famous book and play by British author J. M. Barrie. It is the first Disney Junior original show following the
    switch from Playhouse Disney. It stars Sean Ryan Fox from Henry Danger, Megan Richie, Jadon Sand, David Arquette, Corey
    Burton, Jeff Bennett, Loren Hoskins and Dee Bradley Baker. The title character Jake was previously voiced by Colin Ford,
    and then later by Cameron Boyce, while Izzy was voiced for the first three seasons by Madison Pettis and Cubby was voiced
    by Jonathan Morgan Heit. The series is created by Disney veteran Bobs Gannaway, whose works include another Disney Junior
    series, Mickey Mouse Clubhouse, and films such as Secret of the Wings, The Pirate Fairy and Planes: Fire & Rescue. The
    last episode aired on November 6, 2016.'
