widgetData:
- source_sentence: La Estrategia Nacional de Redes Ultrarrápidas tiene como objetivo impulsar el despliegue de redes de acceso
    ultrarrápido a la banda ancha, tanto fijo como móvil, de cara a lograr su universalización, así como fomentar su adopción
    por ciudadanos, empresas y administraciones, para garantizar la cohesión social y territorial.
  sentences:
  - ¿Cuál es el objetivo principal de la exoneración de deudas?
  - ¿Qué se entiende por especies invasoras?
  - ¿Cuál es el objetivo de la Estrategia Nacional de Redes Ultrarrápidas?
- source_sentence: La Ley del Presupuesto de la Comunidad Autónoma de Andalucía podrá actualizar la cuantía de las sanciones
    contenidas en la presente norma.
  sentences:
  - ¿Qué ley se refiere a la actualización de la cuantía de las sanciones?
  - ¿Qué se requiere para la concesión de las licencias y permisos de primera ocupación?
  - ¿Cuál es el objetivo del Plan Estratégico sobre Trastornos Adictivos?
- source_sentence: Art. 154. La celebración de tratados por los que se atribuya a una organización o institución internacionales
    el ejercicio de competencias derivadas de la Constitución requerirá la previa aprobación por las Cortes de una Ley Orgánica
    de autorización, que se tramitará conforme a lo establecido en el presente Reglamento para las leyes de este carácter.
  sentences:
  - ¿Cuál es el importe destinado a la financiación de las necesidades correspondientes al transporte regular de viajeros
    de las distintas Islas Canarias?
  - ¿Cuál es el propósito de la Disposición final tercera?
  - ¿Cuál es el procedimiento para la celebración de tratados internacionales?
- source_sentence: Disposición final tercera. Entrada en vigor. El presente real decreto entrará en vigor el día siguiente
    al de su publicación en el «Boletín Oficial del Estado».
  sentences:
  - ¿Quién puede concluir contratos para la adquisición de bienes o derechos?
  - ¿Qué es el régimen de recursos del Consejo General de los Colegios Oficiales de Ingenieros Agrónomos?
  - ¿Cuál es el propósito de la Disposición final tercera?
- source_sentence: El plazo máximo para resolver y notificar la resolución expresa que ponga fin al procedimiento será de
    nueve meses, a contar desde la fecha de inicio del procedimiento administrativo sancionador, que se corresponde con la
    fecha del acuerdo de incoación.
  sentences:
  - ¿Cuál es el plazo para la resolución del procedimiento sancionador en el caso de infracciones graves o muy graves?
  - ¿Qué establece el Real Decreto 521/2020?
  - ¿Cuál es el objetivo de la cooperación española para el desarrollo sostenible en relación con la igualdad de género?
