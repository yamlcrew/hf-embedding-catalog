    ''description'': ''<p>Внешний аккумулятор Xiaomi Mi Power Bank 3 20000 mAh Type-C White обеспечит зарядку мобильных телефонов,
    планшетов, ноутбуков или микротоковых электронных девайсов (смарт-часов, фитнес-браслетов) при отсутствии сети. Допускается
    двусторонняя зарядка (подключение к сети и мобильному гаджету). Производителем предусмотрена защита от перегрева, скачков
    напряжения, перегрузок, коротких замыканий.</p> \n<h2>Компактность и производительность</h2> \n<p>Батарея Li-Pol защищена
    от воздействия внешней среды, механических повреждений пластиковым корпусом размерами 153,5х73,5х27,5 мм. На нижней торцевой
    стороне корпуса размещаются разъемы USB Тype С для подключения разряженных портативных устройств и micro-USB для подключения
    к сети самого повербанка. Сверху находится кнопка включения и световые индикаторы, которые сигнализируют об уровне заряда
    аккумулятора. Ключевые показатели работы:</p> \n<ul> \n<li>напряжение на выходе &ndash; 12 В;</li> \n<li>выходная мощность
    &ndash; 45 Вт;</li> \n<li>зарядка аккумулятора проводится в течение 4,5 часов при подключении к сети.</li> \n</ul> \n<p>Полного
    заряда аккумулятора достаточно для подзарядки 4-7 смартфонов, в зависимости от модели. Срок службы Power Bank составляет
    в среднем 8 лет (500 рабочих циклов).</p>'', ''rating'': 4.45, ''review_count'': 2237}'
