  - '{''long_web_name'': ''Хлебопечка Kitfort KT-304'', ''price'': 11990.0, ''description'': ''<p>Хлебопечь Kitfort КТ-304
    мощностью 550 Вт позволяет готовить хлеб весом до 750 г. Модель оснащена таймером, который дает возможность отсрочить
    старт программы на срок до 13 часов.</p>\n<h2>Простая готовка вкусного хлеба</h2>\n<p>Прибор имеет 16 автоматических программ,
    среди которых есть режимы для приготовления джема, йогурта, варенья, плова, каши, кекса, пирога, пасты, лазаньи, пиццы,
    а также для замеса теста. Есть функция поддержания температуры. Корпус выполнен из металла — прочного материала, устойчивого
    к механическим повреждениям. Основные параметры устройства:</p>\n<ul>\n<li>вес 4,9 кг — удобно перемещать;</li>\n<li>дисплей
    — отображает время, номер выбранной программы, оставшееся время до конца работы;</li>\n<li>звуковая индикация — оповещает
    об окончании программы и этапах ее выполнения.</li>\n</ul>\n<p>К прибору прилагаются мерный стаканчик, лопатка и крюк.
    Длина сетевого шнура составляет 1 м — удобно пользоваться даже на значительном расстоянии от розетки.</p>'', ''rating'':
    4.88, ''review_count'': 177}'
