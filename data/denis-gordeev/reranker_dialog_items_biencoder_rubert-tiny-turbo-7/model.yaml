      аксессуара. Наушникам свойственны такие особенности:</p>\r\n<ul>\r\n<li>сопротивление – 250 Ом;</li>\r\n<li>уровень
      SPL – 96 дБ;</li>\r\n<li>чувствительность – 96 дБ.</li>\r\n</ul>\r\n<p>Наивысший показатель мощности составляет 100
      мВ, а искажение во время эксплуатации не превышает 0,05%. Также имеется адаптер, позволяющий подключать технику к любому
      типу предусилителя.</p>'', ''rating'': 4.92, ''review_count'': 85}'
