- source_sentence: Привет! Хочу купить фитнес-браслет для отслеживания шагов и сна. Может, что-то недорогое, но с хорошей
    функциональностью? Подскажете, какие есть варианты?
  sentences:
  - '{''long_web_name'': ''Смарт браслет HUAWEI Band 8 (ASK-B19) розовый'', ''price'': 3383.0, ''description'': ''<p>Смарт-браслет
    Huawei Band 8 розового цвета (ASK-B19) — это устройство, которое поможет контролировать физическую активность и состояние
    здоровья.</p>\n<h2>Компактная модель</h2>\n<p>Браслет оснащен цветным экраном AMOLED диагональю 1,47 дюйма. На нем отображается
    информация о количестве пройденных шагов, частоте сердечных сокращений, уровне кислорода в крови и другие данные. Устройство
    имеет следующие параметры:</p>\n<ul>\n<li>встроенный динамик позволяет принимать и отклонять звонки;</li>\n<li>сенсорный
    дисплей обеспечивает удобную навигацию;</li>\n<li>ремешок из силикона не вызывает аллергических реакций и раздражений
    кожи;</li>\n<li>корпус выполнен из пластика, который защищает внутренние детали от повреждений.</li>\n</ul>\n<p>Благодаря
    водонепроницаемости можно плавать в бассейне или море, не снимая гаджет. Также есть функция поиска смартфона.</p>'', ''rating'':
    4.95, ''review_count'': 211}'
  - '{''long_web_name'': ''Наушники Beyerdynamic DT 770 Pro (250 Ohm) Black'', ''price'': 33281.0, ''description'': ''<p>Наушники
    Beyerdynamic DT 770 Pro Black закрытого динамического типа с диапазоном частот от 5 до 35000. Особенность модели заключается
    в наличии специального велюрового амбушюра и пружинного изголовья из высокопрочной стали, которое сохраняет первозданную
    форму в течение продолжительного времени.</p>\r\n<h2>Технический потенциал и отсутствие помех</h2>\r\n<p>Конструкция наушников
    предполагает встроенную систему Bass Reflex, которая позволяет достичь более качественных звуков на низкой и высокой частоте.
    Модель характеризуется улучшенной шумоизоляцией, предотвращающей возникновение помех во время использования аксессуара.
    Наушникам свойственны такие особенности:</p>\r\n<ul>\r\n<li>сопротивление – 250 Ом;</li>\r\n<li>уровень SPL – 96 дБ;</li>\r\n<li>чувствительность
    – 96 дБ.</li>\r\n</ul>\r\n<p>Наивысший показатель мощности составляет 100 мВ, а искажение во время эксплуатации не превышает
    0,05%. Также имеется адаптер, позволяющий подключать технику к любому типу предусилителя.</p>'', ''rating'': 4.92, ''review_count'':
    85}'
  - '{''long_web_name'': ''Внешний аккумулятор Xiaomi Power Bank 3 30000 mAh White'', ''price'': 1699.0, ''url'': ''https://megamarket.ru/catalog/details/xiaomi-power-bank-3-30000-mah-vneshniy-akkumulyator-white-600002354850/'',
