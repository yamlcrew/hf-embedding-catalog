    ''id'': ''100024214080_16245'', ''description'': ''<p>Настенный наклонно-поворотный кронштейн для телевизора&nbsp;<strong>ONKRON
    M4S</strong>&nbsp;предназначен для экранов с диагональю от 17 до 43 дюймов (43,18-109,2 см).</p><p>Крепление для ТВ подходит
    для маленьких и средних телевизоров весом до 35 кг. Крепкий и надежный, при этом элегантный кронштейн для ТВ станет стильным
    дополнением домашнего интерьера.</p><p><strong>Преимущества:</strong></p><p>а) Предусмотренная производителем система
    держателей проводов позволит закрепить их в нужном положении &ndash; это придаст дополнительное удобство и сделает более
    аккуратным внешний вид Вашего устройства.<br />б) Крепление на стену изготовлено из высококачественной стали, что обеспечивает
    его прочность.<br />в) Пластиковые накладки скроют всевозможные монтажные крепления, добавив эстетичности образу Вашего
    устройства.<br />г) Вы можете занимать любое удобное положение при просмотре ТВ за счет широких возможностей регулировки
    угла наклона от -5&deg; до +8&deg;. Эти возможности позволят получать удовольствие от просмотра.<br />д) Подходит практически
    всем современным телевизорам - LCD, LED, OLED, Ultra HD, plasma, с выгнутыми и плоскими мониторами. Поддерживает стандарты
    VESA в диапазоне от 100x100 мм до 200x200 мм.</p><p>Приятным удивлением станет стоимость подставки для телевизора &ndash;
    ценовое решение можно назвать максимально выгодным, учитывая заявленные технические характеристики продукта, особенно
