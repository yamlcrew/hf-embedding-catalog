widgetData:
- source_sentence: 'search_query: wat is a slash command?'
  sentences:
  - 'search_document: Community moderation features: Google Cloud Vision SafeSearch auto-rejects adult, violent, or racy uploaded
    images. Messages with 3 or more reports are auto-hidden pending review. Community bot with engagement scheduler, filters,
    and slash commands. Admin audit trails for all moderation actions. User presence shows online, idle, and DND states. Community
    profiles display role (CEO, admin, moderator, student), subscription tier, TQS score, and badges.'
  - 'search_document: Community has 9 or more channels organized by topic. Trading channels: entries, analysis, front-testing,
    crypto, stock, questions, stop-losses, fundamental-analysis, trade-ideas. General channels: announcement, general-chat,
    homework. Results channel and sunday-talk (weekly mindset). Premium-gated channels: homework, front-testing, entries,
    stop-losses, questions. Features include text plus multiple images, trade result cards, emoji reactions, reply threads,
    pinned messages, message editing, and admin moderation tools. Exclusive premium community channels are English-language.'
  - 'search_document: General sizing formula: position size equals account risk amount divided by stop distance value. This
    keeps risk constant across different instruments and setup sizes instead of using arbitrary lot size choices.'
- source_sentence: 'search_query: What''s the homework loop for students?'
  sentences:
  - 'search_document: Courses are organized into Sections and Activities (video lessons plus assessments) with progress tracking.
    CMP Trading Course requires PREMIUM or BUNDLE subscription. Psychology Course requires BUNDLE only. You can track your
    progress through each section, complete assessments to test your understanding, and watch video lessons at your own pace.
    Full CMP course programs are delivered in English.'
  - 'search_document: Live training schedule: Monday through Thursday mentor Zoom sessions with live Q and A. Friday CEO Review
    with weekly chart breakdowns and audits. 24/7 homework loop where students post chart breakdowns, get critique, and track
    improvement prompts. Requires PREMIUM subscription or above. All live sessions are conducted in English.'
  - 'search_document: When answering product questions, always align with the user tier and avoid promising locked features.
    If feature access is uncertain, instruct the user to check subscription status in account settings.'
- source_sentence: 'search_query: I have a risk violation, can I still get the Elite Performer badge?'
  sentences:
  - 'search_document: The Relative Strength Index (RSI) is a momentum oscillator that measures the speed and magnitude of
    recent price changes to evaluate whether an instrument is overbought or oversold. Developed by J. Welles Wilder, RSI oscillates
    between 0 and 100. The standard calculation uses a 14-period lookback. RSI compares the average gain over the period to
    the average loss, producing a value that reflects the balance between buying and selling pressure. When gains dominate,
    RSI moves higher. When losses dominate, RSI moves lower. Traditional interpretation defines RSI above 70 as overbought
    (potentially due for a pullback) and RSI below 30 as oversold (potentially due for a bounce). However, these levels are
    guidelines, not precise signals. In strong trends, RSI can remain overbought or oversold for extended periods without
    price reversing. RSI divergence occurs when price makes a new high but RSI makes a lower high (bearish divergence) or
    when price makes a new low but RSI makes a higher low (bullish divergence). Divergence suggests that momentum is weakening
    relative to price, which can precede reversals. However, divergence can persist for many candles before price responds,
    making timing unreliable. RSI is useful as an educational tool for understanding momentum concepts. It quantifies whether
    recent price action has been dominated by buying or selling and how that momentum compares to the recent past. It provides
    context about the energy behind a move. In CMP methodology, RSI and all indicators are explicitly excluded from the execution
    process. CMP reads momentum directly from candle body sizes, wick behavior, and structural progression rather than from
    derived oscillator values. Understanding RSI helps traders speak the common language of technical analysis, but CMP practitioners
    should not use it for trade decisions.'
  - 'search_document: Journal Warrior (Silver Tier): Requires 45 consecutive days of complete trade journaling with discipline.
    Must have zero late entries (log within 24 hours) and zero missed days (max 2 consecutive gaps allowed). Locks if 3 or
    more consecutive days are missed or more than 5 late entries. Progress decays after 14 days of inactivity.'
  - 'search_document: Elite Performer (Platinum Tier): Master-level achievement requiring 70 percent or higher win rate, 200
    or more trades, 90 or more trading days over a 90-day window, average R:R of 2.0 or higher, zero risk violations in last
    60 days, and admin review plus approval. Locks if any risk violations occur in the last 60 days.'
- source_sentence: 'search_query: whats the role of higher timeframe direction for external structure?'
  sentences:
  - 'search_document: Common invalid markers: mid-candle entry, counter-structure execution, undefined stop loss, random late
    chase, indicator dependency, and revenge-driven re-entry. These patterns reduce process quality even if occasional trades
    win.'
  - 'search_document: A bearish candle closes lower than it opened, meaning sellers dominated that period. The body is typically
    colored red or black. The longer the body relative to the wicks, the stronger the selling conviction. Bearish candles
    at key resistance zones or after extended uptrends can signal potential selling pressure, but context and structure always
    matter more than a single candle.'
  - 'search_document: External structure comes from higher timeframe direction and context. Internal structure is lower timeframe
    behavior used for precision entries. Internal behavior should align with external direction for valid CMP execution.'
- source_sentence: 'search_query: whats collected by litfx??'
  sentences:
  - 'search_document: Privacy policy: LITFX collects account information (name, email), usage data (course progress, journal
    entries, chat messages), and device information for security. Card details are NOT stored on LITFX servers — payments
    are handled by a secure payment processor. AI Mentor and journal analysis use your data only for generating responses
    — your data is NOT used to train AI models. The platform uses industry-standard encryption and security protections.'
  - 'search_document: Beginning traders consistently make a recognizable set of mistakes that, while natural, can be accelerated
    past through awareness and deliberate practice. Trading without a plan is the most fundamental error. Beginners often
    enter trades based on gut feeling, tips, or excitement without defined entry criteria, stop loss, take profit, or position
    sizing rules. Without a plan, there is no way to evaluate whether the process is working because there is no process.
    Risking too much per trade is common because beginners underestimate how frequently losses occur. Risking 5-10 percent
    per trade means a normal losing streak of 3-5 trades can lose 15-50 percent of the account, making recovery extremely
    difficult. Not using stop losses or moving them further away when price approaches them converts small planned losses
    into large unplanned losses. The inability to accept a small loss leads to accepting a much larger one. Overtrading driven
    by the belief that more trades equal more profit. In reality, more trades without quality filter reduces average setup
    quality and increases transaction costs. Taking 20 trades a day is almost certainly overtrading for any style except high-frequency
    automated trading. Chasing price by entering after a move has already happened because of FOMO. The best entry was earlier,
    and entering late means worse risk-reward, tighter stops, and higher probability of being caught in a pullback. Strategy
    hopping after a few losses by constantly switching approaches without giving any single approach enough trades to demonstrate
    its edge. Every strategy has losing periods, and switching at the bottom of a drawdown means the trader always experiences
    the worst of each approach. Ignoring the learning process by expecting immediate profitability. Trading is a skill that
    develops over months and years of deliberate practice, not something mastered in days or weeks.'
  - 'search_document: A shooting star has a small body at the bottom with a long upper wick (at least 2x the body). When it
    appears after an uptrend near resistance, it suggests sellers rejected higher prices. The same shape at the bottom of
    a downtrend is called an inverted hammer and can signal potential buying interest. Always confirm with the next candle
    close and surrounding structure.'
