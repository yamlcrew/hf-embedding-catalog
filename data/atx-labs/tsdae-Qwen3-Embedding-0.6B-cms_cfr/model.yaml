widgetData:
- source_sentence: LTCH PPS is moving back to a Federal Fiscal Year effective October 1, 2009 If the estimated cost of the
    case is greater than the outlier threshold an additional payment is added to the LTC-DRG payment amount The outlier payment
    is 80 percent of the difference between the estimated cost of the case and the outlier threshold (the LTC-DRG payment
    plus a fixed loss amount) The estimated cost of the case is calculated by multiplying the Medicare allowable charge on
    the claim by the LTCH's overall cost-to-charge ratio obtained from the latest settled cost report For discharges occurring
    on or after August 8, 2003, (high cost outlier payments may be reconciled upon cost report settlement to account for differences
    between the estimated cost-to-charge-ratio and the actual cost-to-charge ratio for the period during which the discharge
    occurs
  sentences:
  - '90.1 - General (Rev. 486, Issued: 03-04-05, Effective Date/Implementation Date: Allogeneic stem cell transplantation
    is a procedure in which a portion of a healthy donor''s stem cells is obtained and prepared for intravenous infusion to
    restore normal hematopoietic function in recipients having an inherited or acquired hematopoietic deficiency or defect
    Expenses incurred by a donor are a covered benefit to the recipient/beneficiary but, except for physician services, are
    not paid separately Services to the donor include physician services, hospital care in connection with screening the stem
    cell, and ordinary follow-up care Autologous Stem Cell Transplantation Autologous stem cell transplantations is a technique
    for restoring stem cells using the patient''s own previously stored cells'
  - LTCH PPS is moving back to a Federal Fiscal Year effective October 1, 2009 If the estimated cost of the case is greater
    than the outlier threshold an additional payment is added to the LTC-DRG payment amount The outlier payment is 80 percent
    of the difference between the estimated cost of the case and the outlier threshold (the LTC-DRG payment plus a fixed loss
    amount) The estimated cost of the case is calculated by multiplying the Medicare allowable charge on the claim by the
    LTCH's overall cost-to-charge ratio obtained from the latest settled cost report For discharges occurring on or after
    August 8, 2003, (high cost outlier payments may be reconciled upon cost report settlement to account for differences between
    the estimated cost-to-charge-ratio and the actual cost-to-charge ratio for the period during which the discharge occurs
  - 'The following messages shall be used when Medicare contractors deny TAVR claims for POS: Claim Adjustment Reason Code
    (CARC) 58: "Treatment was deemed by the payer to have been rendered in an inappropriate or invalid place of service Refer
    to the 835 Healthcare Policy Identification Segment (loop 2110 Service Payment Information REF), if present." Remittance
    advice remark code (RARC) N428: "Not covered when performed in this place of service." Beginning January 2, 2020, contractors
    shall no longer report RARC N428 for claims denied for invalid POS Medicare Summary Notice (MSN) 21.25: "This service
    was denied because Medicare only covers this service in certain settings." Spanish Version: "El servicio fue denegado
    porque Medicare solamente lo cubre en ciertas situaciones." Professional Claims Modifier -62 For TAVR claims with dates
    of service on or after July 1, 2013, contractors shall pay claim lines with 33361, 33362, 33363, 33364, 33365 & 0318T
    only when billed with modifier -62'
- source_sentence: 'Implementation: 07-11-25) Laboratories exempt through an approved State licensure program are subject
    to validation surveys conducted by CMS or its designee A validation survey of a CLIA-exempt laboratory is conducted to
    ensure that the exempt laboratory meets CLIA compliance CMS laboratory surveyor applies the CLIA regulations during a
    validation survey When condition-level deficiencies are determined, CMS directs the State to take appropriate enforcement
    action. (See section 6208)'
  sentences:
  - '4146.7E - Criminal Penalties for Improper Disclosure (Rev. 1, 05-21-04) Under the Federal Privacy Act, the following
    criminal penalties may be applicable: · Any officer or employee of the State who intentionally discloses individually
    identifiable information prohibited from disclosure under the Privacy Act, shall be guilty of a misdemeanor and fined
    not more than $5,000; · Any officer or employee of the State who willfully maintains a system of records without meeting
    the notice requirements of the Privacy Act shall be guilty of a misdemeanor and fined not more than $5,000 and · Any individual
    who knowingly and willfully requests or obtains any record concerning an individual from an agency under false pretenses
    shall be guilty of a misdemeanor and fined not more than $5,000.'
  - 'Implementation: 07-11-25) Laboratories exempt through an approved State licensure program are subject to validation surveys
    conducted by CMS or its designee A validation survey of a CLIA-exempt laboratory is conducted to ensure that the exempt
    laboratory meets CLIA compliance CMS laboratory surveyor applies the CLIA regulations during a validation survey When
    condition-level deficiencies are determined, CMS directs the State to take appropriate enforcement action. (See section
    6208)'
  - See Chapter 24, § 30.2 for definitions of electronic and paper claims for use in application of the Medicare payment floor
    See Chapter 1, § 80.2.1.2 for differentiation between electronic claims that comply with the requirements of the standard
    implementation guides adopted for national use under HIPAA and those submitted electronically using pre-HIPAA formats
    supported by Medicare This HIPAA format differentiation applies to the payment floor, but not to the ceiling.
- source_sentence: Also, directed in-service could be used in situations where staff performance results in deficient practice
    A directed in-service training program would correct this deficient practice through retraining the staff in the use of
    clinically and professionally sound methods to produce quality outcomes Notice of intent to impose directed in-service
    training must be given at least 15 calendar days before the effective date of the enforcement action in non-IJ situations
    and at least 2 calendar days before the effective date in IJ situations.
  sentences:
  - 'Categories of Services Requiring HCPCS Codes Category HCPCS Codes Antigens 95144-95149, 95165, 95170, 95180, and 95199
    Vaccines 90657-90659, 90732, 90744, 90746, 90747, 90748, G0008, G0009, and G0010 Category HCPCS Codes Splints 29105-29131,
    29505-29515 Casts 29000-29085, 29305, 29325-29445, 29450, 29700-29750, 29799 NOTE: A/B MACs (HHH) shall advise their HHAs
    to report the above HCPCS codes with the exception of vaccines under Revenue Code 0550 (Skilled Nursing) The only time
    revenue code 0550 may be reported is when the HHA is billing for antigens, splints, or casts See Chapter 18 for the reporting
    of vaccines by HCPCS codes.'
  - If proprietary or privileged data were submitted under seal, the decision must state whether the data were material and
    what role they played in the determination, but without disclosing the substance or contents of the evidence under seal
    A separate statement of the rationale for the ALJ's treatment of the sealed evidence must be prepared and kept under seal
    itself If the ALJ decision is appealed to the Board, this statement must be provided to the Board under seal. (6) A statement
    regarding appeal rights.
  - Also, directed in-service could be used in situations where staff performance results in deficient practice A directed
    in-service training program would correct this deficient practice through retraining the staff in the use of clinically
    and professionally sound methods to produce quality outcomes Notice of intent to impose directed in-service training must
    be given at least 15 calendar days before the effective date of the enforcement action in non-IJ situations and at least
    2 calendar days before the effective date in IJ situations.
- source_sentence: Items and services or items or services includes without limitation, any item, device, drug, biological,
    supply, or service (including management or administrative services), including, but not limited to, those that are listed
    in an itemized claim for program payment or a request for payment; for which payment is included in any Federal or State
    health care program reimbursement method, such as a prospective payment system or managed care system or that are, in
    the case of a claim based on costs, required to be entered in a cost report, books of account, or other documents supporting
    the claim (whether or not actually entered)
  sentences:
  - CMS will not implement, other than at the beginning of a calendar year, requirements under this part that impose a new
    significant cost or burden on MA organizations or plans, unless a different effective date is required by statute.
  - Items and services or items or services includes without limitation, any item, device, drug, biological, supply, or service
    (including management or administrative services), including, but not limited to, those that are listed in an itemized
    claim for program payment or a request for payment; for which payment is included in any Federal or State health care
