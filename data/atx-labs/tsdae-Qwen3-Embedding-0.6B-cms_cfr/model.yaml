    a claim based on costs, required to be entered in a cost report, books of account, or other documents supporting the claim
    (whether or not actually entered)
  - Subject to 50% reduction of the practice expense component for certain therapy services furnished in both institutional
    and non-institutional settings (effective for services April 1, 2013 and after). 6 = Subject to 25% reduction of the TC
    diagnostic cardiovascular services (effective for services January 1, 2013 and after) PIC Position 7 = Subject to 20%
    reduction of the TC diagnostic ophthalmology services (effective for services January 1, 2013 and after). 9 = Concept
    does not apply Codes with RVUs equal to zero are not included in the payment indicator file These codes may have multiple
    procedure indicators not shown See note below this table for instructions on these codes
- source_sentence: '(Rev. 38, 10-31-03) Cost plans who choose this option will follow the following rules: 1\ Enrollments
    will be effective the first day of the month after the month the cost plan receives an enrollment form The cost plan must
    be open to accept such enrollments. 2\ November 15 through December 31 of every year: Enrollments received during this
    time period will be effective January 1 of the following year (except as noted below). (NOTE: Enrollments made between
    November 15 and November 30 may be effective December 1 or January 1 The cost plan must allow the individual to choose
    the effective date'
  sentences:
  - (a) Except as provided in this part, the Board is not bound by the Federal Rules of Evidence However, the Board may apply
    the Federal Rules of Evidence when appropriate, for example, to exclude unreliable evidence. (b) The Board must exclude
    evidence that it determines is clearly irrelevant or immaterial, or unduly repetitive. (c) The Board may accept privileged
    information or proprietary data, but must maintain it under seal. (d) The Board may permit the parties to introduce the
    testimony of expert witnesses on scientific and clinical issues, rebuttal witnesses, and other relevant evidence The Board
    may require that the testimony of expert witnesses be submitted in the form of a written report, accompanied by the curriculum
    vitae of the expert preparing the report. (e) Experts submitting reports must be available for cross-examination at an
    evidentiary hearing upon request of the Board or a party to the proceeding, or the report will be excluded from the record.
    (f) Except as set forth in paragraph (c) of this section or unless otherwise ordered by the Board for good cause shown,
    all documents and other evidence offered or taken for the record is open to examination by all parties.
  - '40.10.1 - Traveling Beneficiaries and Transfer of Title of Oxygen Equipment or Capped Rental Items (Rev. 1532, Issued:
    06-11-08, Effective: 07-01-08, Implementation: 07-07-08) If a beneficiary has two residences in different areas and uses
    a local supplier in each area or if a beneficiary changes suppliers during or after the rental period, this does not result
    in a new rental episode The supplier that provides the item in the 36th month of a rental episode for oxygen equipment
    or the 13th month of a rental episode for capped rental DME is responsible for transferring title to the equipment to
    the beneficiary'
  - '(Rev. 38, 10-31-03) Cost plans who choose this option will follow the following rules: 1\ Enrollments will be effective
    the first day of the month after the month the cost plan receives an enrollment form The cost plan must be open to accept
    such enrollments. 2\ November 15 through December 31 of every year: Enrollments received during this time period will
    be effective January 1 of the following year (except as noted below). (NOTE: Enrollments made between November 15 and
    November 30 may be effective December 1 or January 1 The cost plan must allow the individual to choose the effective date'
