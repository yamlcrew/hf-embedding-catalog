  - 'Ordinarily, the SA develops as much information on the issue as is appropriate, completes the certification, and forwards
    the documentation to the RO for its decision The SA should use the following criteria: · If the provider/supplier meets
    the CoPs, Conditions for Coverage, or in substantial compliance with the Requirements for SNFs, and is in full compliance
    with all other requirements, i.e., no deficiencies, send the Certification and Transmittal (Form CMS-1539) and all other
    documents to the RO within 10 calendar days of the survey or · When the provider/supplier meets the CoPs or Conditions
    for Coverage, but it fails to meet other requirements, i.e., it has deficiencies below the Condition level, transmit all
    documentation to the RO within 45 calendar days of the survey'
