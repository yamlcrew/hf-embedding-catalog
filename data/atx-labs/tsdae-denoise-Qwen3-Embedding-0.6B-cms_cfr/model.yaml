- source_sentence: 'and/ Outpatient Speech Pathology Specified in 485.701-485.729 2290 of Physical Therapy Pathology Services
    (.,: 03-15-13 Effective 03-15-13, Implementation 03-15-13 basis of outpatient and language under (p Security Participation
    (CoPs) agencies) public providers outpatient are 42 Part, E_of the Operations Manual (and 2290-2306 the SOM interpretive
    guidelines for (State) and accreditation organizations.'
  sentences:
  - Improvement is evidenced by objective successive measurements. · Therapy is not considered reasonable and necessary under
    this condition if the patient's expected restorative potential would be insignificant in relation to the extent and duration
    of therapy services required to reach such potential. · Therapy is not required to effect improvement or restoration of
    function where a patient suffers a transient or easily reversible loss of function (such as temporary weakness following
    surgery) which could reasonably be expected to improve spontaneously as the patient gradually resumes normal activities
    Therapy in such cases is not considered reasonable and necessary to treat the patient's illness or injury, under this
    condition
  - 'Providers of Outpatient Physical Therapy and/ or Outpatient Speech Pathology Services Specified in §§ 485.701-485.729
    2290 - Providers of Outpatient Physical Therapy and Speech-Language Pathology Services - Citations (Rev. 83, Issued: 03-15-13,
    Effective: 03-15-13, Implementation: 03-15-13) The statutory basis for providers of outpatient physical therapy and outpatient
    speech- language pathology services is found under § 1861(p) of the Social Security Act The Conditions of Participation
    (CoPs) for rehabilitation agencies, clinics (operated by physicians) and public health agencies as providers of outpatient
    physical therapy and speech-language pathology services, are specified in 42 CFR Part 485, Subpart H Appendix E_of the
    State Operations Manual (SOM) and sections 2290-2306 of the SOM contain interpretive guidelines for regional offices (ROs),
    State Agencies (SAs) and accreditation organizations (AOs).'
  - 'Where those sections refer to an EGHP of 20 or more employees, substitute the term "large group health plan" for purposes
    of applying them to disabled individuals This provision is effective for items and services furnished on or after January
    1, 1987, and before October 1, 1995 A large group health plan means any health plan that meets the following criteria:
    · Is paid for by or contributed to by an employer or by an employee organization, including a self-insured plan; · Provides
    health care directly or through other methods such as insurance or reimbursement to employees, the employer, other associated
    or formerly associated with the employer in a business relationship or their families'
