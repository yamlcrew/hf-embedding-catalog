- source_sentence: General supervision means that the physician need not be physically present at the patient's place of residence
    when the service is performed; however, the service must be performed under his or her overall supervision and control
    The physician orders the service(s) to be performed, and contact is maintained between the nurse or other employee and
    the physician, e.g., the employee contacts the physician directly if additional instructions are needed, and the physician
    must retain professional responsibility for the service All other "incident to" requirements must be met (see §§60-60.4).
    3 The services are included in the physician's/clinic's bill, and the physician or clinic has incurred an expense for
    them (see §60.2). 4 The services of the paramedical are required for the patient's care; that is, they are reasonable
    and necessary as defined in the Medicare Benefit Policy Manual, Chapter 16, "General Exclusions from Coverage," §20. 5
    When the service can be furnished by an HHA in the local area, it cannot be covered when furnished by a physician/clinic
    to a homebound patient under this provision, except as described in §60.4.C.
  sentences:
  - '110.2 - Inpatient Rehabilitation Facility Medical Necessity Criteria (Rev. 10892 Implementation: 11-08-21) In order for
    IRF care to be considered reasonable and necessary, the documentation in the patient''s IRF medical record (which must
    include the preadmission screening described in section 110.1.1, the overall plan of care described in section 110.1.3,
    and the admission orders described in section 110.1.4) must demonstrate a reasonable expectation that the following criteria
    were met at the time of admission to the IRF Certain exceptions to these requirements may apply due to conditions arising
    during the Public Health Emergency defined in 42 CFR § 400.200 These exceptions are described further in Section 110.2.6
    of this manual. 1\'
  - 'Implementation: 11-01-24) Transmit the CMS-2591 to CO via PC or terminal Use instructions in the CROWD User Guide available
    via the CMS Enterprise Portal The report is due as soon as possible after the end of the reporting month but no later
    than the 15th of the month following the end of the reporting month.'
  - General supervision means that the physician need not be physically present at the patient's place of residence when the
    service is performed; however, the service must be performed under his or her overall supervision and control The physician
    orders the service(s) to be performed, and contact is maintained between the nurse or other employee and the physician,
    e.g., the employee contacts the physician directly if additional instructions are needed, and the physician must retain
    professional responsibility for the service All other "incident to" requirements must be met (see §§60-60.4). 3 The services
    are included in the physician's/clinic's bill, and the physician or clinic has incurred an expense for them (see §60.2).
    4 The services of the paramedical are required for the patient's care; that is, they are reasonable and necessary as defined
    in the Medicare Benefit Policy Manual, Chapter 16, "General Exclusions from Coverage," §20. 5 When the service can be
    furnished by an HHA in the local area, it cannot be covered when furnished by a physician/clinic to a homebound patient
    under this provision, except as described in §60.4.C.
