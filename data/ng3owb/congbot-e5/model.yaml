    - 'passage: # 101_2018_TT_BTC_ch2_art7

      Điều 7. Chi cấp phương tiện trợ giúp, dụng cụ chỉnh hình


      1. Nguyên tắc cấp phương tiện trợ giúp, dụng cụ chỉnh hình


      a) Cấp tiền để đối tượng mua phương tiện trợ giúp, dụng cụ chỉnh hình theo niên hạn sử dụng theo quy định;


      b) Mức tiền cấp mua phương tiện trợ giúp, dụng cụ chỉnh hình (bao gồm cả tiền mua vật phẩm phụ, bảo trì phương tiện)
      theo phụ lục ban hành kèm theo Thông tư này;


      c) Việc cấp tiền mua phương tiện trợ giúp, dụng cụ chỉnh hình (bao gồm cả tiền mua vật phẩm phụ, bảo trì phương tiện)
      được thực hiện một lần vào đầu niên hạn sử dụng.


      2. Chế độ hỗ trợ khi đi làm phương tiện trợ giúp, dụng cụ chỉnh hình, điều trị phục hồi chức năng


      a) Đối tượng được hưởng chế độ cấp phương tiện trợ giúp, dụng cụ chỉnh hình khi đi làm dụng cụ chỉnh hình, phương tiện
      trợ giúp được hỗ trợ một lần tiền ăn và tiền tàu xe (bao gồm cả lượt đi và về), mỗi niên hạn 01 lần. Mức hỗ trợ theo
      đơn giá 5.000 đồng/km nhân với khoảng cách từ nơi cư trú đến cơ sở y tế gần nhất đủ điều kiện về chuyên môn kỹ thuật
      cung cấp dụng cụ chỉnh hình, nhưng tối đa không quá 1.400.000 đồng/người;


      Ví dụ: Ông Nguyễn Văn A là thương binh khi đi làm chân giả được hỗ trợ một lần tiền ăn và tiền tàu xe. Khoảng cách từ
      nhà Ông Nguyễn Văn A đến Trung tâm Chỉnh hình Phục hồi chức năng gần nhất là 175 km. Ông Nguyễn Văn A được hỗ trợ một
      lần tiền ăn và tiền tàu xe cho cả lượt đi và về là: 5.000 đồng x 175 km = 875.000 đồng;


      b) Đối tượng được hưởng chế độ phục hồi chức năng khi đi điều trị phục hồi chức năng theo chỉ định của bệnh viện cấp
      tỉnh trở lên được hỗ trợ một lần tiền ăn và tiền tàu xe (theo khoảng cách từ nơi cư trú đến cơ sở phục hồi chức năng
      gần nhất đủ điều kiện về chuyên môn kỹ thuật): Mức hỗ trợ thực hiện theo quy định tại điểm a khoản này.


      3. Đối tượng, quy trình, thủ tục lập sổ theo dõi và cấp phương tiện trợ giúp, dụng cụ chỉnh hình thực hiện theo quy
      định của Bộ LĐTBXH.'
    - 'passage: # 02_2020_UBTVQH14_chuong2_muc6_7

      Điều 24. Chế độ ưu đãi đối với thương binh, người hưởng chính sách như thương binh


      1. Trợ cấp, phụ cấp hằng tháng đối với thương binh, người hưởng chính sách như thương binh như sau:


      a) Trợ cấp hằng tháng căn cứ vào tỷ lệ tổn thương cơ thể và loại thương binh;


      b) Trợ cấp người phục vụ đối với thương binh, người hưởng chính sách như thương binh có tỷ lệ tổn thương cơ thể từ 81%
      trở lên sống ở gia đình;


      c) Phụ cấp hằng tháng đối với thương binh, người hưởng chính sách như thương binh có tỷ lệ tổn thương cơ thể từ 81%
      trở lên;


      d) Phụ cấp đặc biệt hằng tháng đối với thương binh, người hưởng chính sách như thương binh có tỷ lệ tổn thương cơ thể
      từ 81% trở lên có vết thương đặc biệt nặng. Thương binh, người hưởng chính sách như thương binh hưởng phụ cấp đặc biệt
      hằng tháng thì không hưởng phụ cấp hằng tháng.


      2. Bảo hiểm y tế.


      3. Điều dưỡng phục hồi sức khỏe hai năm một lần; trường hợp có tỷ lệ tổn thương cơ thể từ 81% trở lên thì được điều
      dưỡng phục hồi sức khỏe hằng năm.


      4. Ưu tiên, hỗ trợ trong giáo dục và đào tạo, tạo điều kiện làm việc trong cơ quan nhà nước, tổ chức, doanh nghiệp căn
      cứ vào tỷ lệ tổn thương cơ thể.


      5. Chế độ ưu đãi quy định tại các điểm c, e, g, h, i và k khoản 2 Điều 5 của Pháp lệnh này.


      6. Được Nhà nước hỗ trợ cơ sở vật chất ban đầu, bao gồm nhà xưởng, trường, lớp, trang bị, thiết bị, được vay vốn ưu
      đãi để sản xuất, kinh doanh, miễn hoặc giảm thuế theo quy định của pháp luật đối với cơ sở sản xuất, kinh doanh dành
      riêng cho thương binh, người hưởng chính sách như thương binh, bệnh binh.


      Điều 25. Chế độ ưu đãi đối với thân nhân của thương binh, người hưởng chính sách như thương binh


      1. Bảo hiểm y tế đối với những người sau đây:


      a) Cha đẻ, mẹ đẻ, vợ hoặc chồng, con từ đủ 06 tuổi đến chưa đủ 18 tuổi hoặc từ đủ 18 tuổi trở lên nếu còn tiếp tục đi
      học hoặc bị khuyết tật nặng, khuyết tật đặc biệt nặng của thương binh, người hưởng chính sách như thương binh có tỷ
      lệ tổn thương cơ thể từ 61% trở lên;


      b) Người phục vụ thương binh, người hưởng chính sách như thương binh có tỷ lệ tổn thương cơ thể từ 81% trở lên sống
      ở gia đình.


      2. Thương binh, người hưởng chính sách như thương binh có tỷ lệ tổn thương cơ thể từ 61% trở lên chết thì thân nhân
      được hưởng trợ cấp tuất như sau:


      a) Cha đẻ, mẹ đẻ, vợ hoặc chồng đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động, con chưa đủ 18 tuổi
      hoặc từ đủ 18 tuổi trở lên nếu còn tiếp tục đi học hoặc bị khuyết tật nặng, khuyết tật đặc biệt nặng được hưởng trợ
      cấp tuất hằng tháng;


      b) Cha đẻ, mẹ đẻ sống cô đơn, vợ hoặc chồng đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động sống cô
      đơn, con mồ côi cả cha mẹ chưa đủ 18 tuổi hoặc từ đủ 18 tuổi trở lên nếu còn tiếp tục đi học hoặc bị khuyết tật nặng,
      khuyết tật đặc biệt nặng được hưởng trợ cấp tuất hằng tháng và trợ cấp tuất nuôi dưỡng hằng tháng.


      3. Chế độ ưu đãi quy định tại điểm d và điểm đ khoản 2 Điều 5 của Pháp lệnh này đối với con của thương binh, người hưởng
      chính sách như thương binh.


      4. Trợ cấp một lần đối với thân nhân với mức bằng 03 tháng trợ cấp hằng tháng, phụ cấp hằng tháng hiện hưởng khi thương
      binh, người hưởng chính sách như thương binh đang hưởng trợ cấp hằng tháng chết.


      5. Trợ cấp mai táng đối với người hoặc tổ chức thực hiện mai táng khi thương binh, người hưởng chính sách như thương
      binh đang hưởng trợ cấp hằng tháng chết.


      Mục 7. BỆNH BINH


      Điều 26. Điều kiện, tiêu chuẩn bệnh binh


      1. Sỹ quan, quân nhân chuyên nghiệp, hạ sỹ quan, binh sỹ trong Quân đội nhân dân và sỹ quan, hạ sỹ quan, chiến sỹ trong
      Công an nhân dân bị mắc bệnh có tỷ lệ tổn thương cơ thể từ 61% trở lên khi làm nhiệm vụ cấp bách, nguy hiểm mà không
      đủ điều kiện hưởng chế độ hưu trí thì được cơ quan có thẩm quyền cấp "Giấy chứng nhận bệnh binh" khi thôi phục vụ trong
      Quân đội nhân dân, Công an nhân dân.


      2. Chính phủ quy định chi tiết Điều này.


      Điều 27. Chế độ ưu đãi đối với bệnh binh


      1. Trợ cấp, phụ cấp hằng tháng đối với bệnh binh như sau:


      a) Trợ cấp hằng tháng căn cứ vào tỷ lệ tổn thương cơ thể;


      b) Trợ cấp người phục vụ đối với bệnh binh có tỷ lệ tổn thương cơ thể từ 81% trở lên sống ở gia đình;


      c) Phụ cấp hằng tháng đối với bệnh binh có tỷ lệ tổn thương cơ thể từ 81% trở lên;


      d) Phụ cấp đặc biệt hằng tháng đối với bệnh binh có tỷ lệ tổn thương cơ thể từ 81% trở lên có bệnh đặc biệt nặng. Bệnh
      binh hưởng phụ cấp đặc biệt hằng tháng thì không hưởng phụ cấp hằng tháng.


      2. Bảo hiểm y tế.


      3. Điều dưỡng phục hồi sức khỏe hai năm một lần; trường hợp có tỷ lệ tổn thương cơ thể từ 81% trở lên được điều dưỡng
      phục hồi sức khỏe hằng năm.


      4. Chế độ ưu đãi quy định tại các điểm c, e, g, h, i và k khoản 2 Điều 5 của Pháp lệnh này.


      Điều 28. Chế độ ưu đãi đối với thân nhân của bệnh binh


      1. Bảo hiểm y tế đối với những người sau đây:


      a) Cha đẻ, mẹ đẻ, vợ hoặc chồng, con từ đủ 06 tuổi đến chưa đủ 18 tuổi hoặc từ đủ 18 tuổi trở lên nếu còn tiếp tục đi
      học hoặc bị khuyết tật nặng, khuyết tật đặc biệt nặng của bệnh binh có tỷ lệ tổn thương cơ thể từ 61% trở lên;


      b) Người phục vụ bệnh binh có tỷ lệ tổn thương cơ thể từ 81% trở lên sống ở gia đình.


      2. Bệnh binh có tỷ lệ tổn thương cơ thể từ 61% trở lên chết thì thân nhân được hưởng trợ cấp tuất như sau:


      a) Cha đẻ, mẹ đẻ, vợ hoặc chồng đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động, con chưa đủ 18 tuổi
      hoặc từ đủ 18 tuổi trở lên nếu còn tiếp tục đi học hoặc bị khuyết tật nặng, khuyết tật đặc biệt nặng được hưởng trợ
      cấp tuất hằng tháng;


      b) Cha đẻ, mẹ đẻ sống cô đơn, vợ hoặc chồng đủ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật Lao động sống cô
      đơn, con mồ côi cả cha mẹ chưa đủ 18 tuổi hoặc từ đủ 18 tuổi trở lên nếu còn tiếp tục đi học hoặc bị khuyết tật nặng,
      khuyết tật đặc biệt nặng được hưởng trợ cấp tuất hằng tháng và trợ cấp tuất nuôi dưỡng hằng tháng.


      3. Chế độ ưu đãi quy định tại điểm d và điểm đ khoản 2 Điều 5 của Pháp lệnh này đối với con của bệnh binh.


      4. Trợ cấp một lần đối với thân nhân với mức bằng 03 tháng trợ cấp hằng tháng, phụ cấp hằng tháng hiện hưởng khi bệnh
      binh đang hưởng trợ cấp hằng tháng chết.


      5. Trợ cấp mai táng đối với người hoặc tổ chức thực hiện mai táng khi bệnh binh đang hưởng trợ cấp hằng tháng chết.'
    - 'passage: # 834_2024_VBHN_BLDTBXH_art3_4


      Chương II


      MỨC HƯỞNG TRỢ CẤP, PHỤ CẤP ƯU ĐÃI


      Điều 3. Mức chuẩn trợ cấp ưu đãi3


      1. Mức chuẩn trợ cấp ưu đãi người có công với cách mạng là 2.055.000 đồng (sau đây gọi tắt là mức chuẩn).


      2. Mức chuẩn quy định tại khoản 1 Điều này làm căn cứ để tính mức hưởng trợ cấp, phụ cấp và các chế độ ưu đãi đối với
      người có công với cách mạng và thân nhân người có công với cách mạng. Các mức quy định theo mức chuẩn tại Nghị định
      này được điều chỉnh khi mức chuẩn được điều chỉnh và làm tròn đến hàng nghìn đồng.


      Điều 4. Mức hưởng trợ cấp, phụ cấp ưu đãi4


      1. Mức hưởng trợ cấp, phụ cấp ưu đãi hằng tháng đối với người có công với cách mạng và thân nhân của người có công với
      cách mạng được quy định tại Phụ lục I ban hành kèm theo Nghị định này.


      2. Mức hưởng trợ cấp ưu đãi hằng tháng đối với thương binh, người hưởng chính sách như thương binh được quy định tại
      Phụ lục II ban hành kèm theo Nghị định này.


      3. Mức hưởng trợ cấp ưu đãi hằng tháng đối với thương binh loại B được quy định tại Phụ lục III ban hành kèm theo Nghị
      định này.


      4. Mức hưởng trợ cấp ưu đãi một lần đối với người có công với cách mạng và thân nhân người có công với cách mạng được
      quy định tại Phụ lục IV ban hành kèm theo Nghị định này. Trường hợp mức trợ cấp một lần tính theo thâm niên thì sau
      khi đã tính tròn số năm tham gia kháng chiến mà còn có tháng lẻ thì số tháng lẻ được tính tròn số theo nguyên tắc: từ
      đủ 06 tháng đến dưới 12 tháng được tính là 01 năm, dưới 06 tháng được tính là 06 tháng. Trường hợp không xác định được
      ngày, tháng bắt đầu hoạt động kháng chiến thì được tính từ ngày 01 tháng 7 của năm đó.'
