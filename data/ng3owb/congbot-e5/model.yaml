    III. TỔ CHỨC THỰC HIỆN


    1. Bộ Lao động - Thương binh và Xã hội


    - Hoàn thiện thể chế chính sách pháp luật về ưu đãi người có công với cách mạng.


    - Tổng kết, rà soát việc công nhận người có công với cách mạng; xem xét, giải quyết đối với những trường hợp do trước
    đây chưa đủ điều kiện xác nhận, hoặc đã được cơ quan có thẩm quyền kết luận là không đủ điều kiện xác nhận, nhưng nay
    có thêm được cơ sở, căn cứ xác nhận khác theo quy định.


    - Giải quyết căn bản hồ sơ xác nhận người có công với cách mạng còn tồn đọng.


    - Tiếp tục thực hiện Đề án xác định danh tính hài cốt liệt sĩ còn thiếu thông tin.


    - Đẩy mạnh tu bổ, tôn tạo nghĩa trang liệt sĩ và các công trình ghi công liệt sĩ, bảo đảm các công trình ghi công liệt
    sĩ trở thành những công trình lịch sử, văn hóa, để giáo dục tinh thần yêu nước, chủ nghĩa anh hùng cách mạng trong các
    tầng lớp nhân dân.


    - Chủ trì xây dựng Đề án phát triển các cơ sở nuôi dưỡng, điều dưỡng người có công với cách mạng, trình Thủ tướng Chính
    phủ trong quý 1/2019.


    - Chủ trì xây dựng kế hoạch chăm sóc sức khỏe, điều dưỡng, chỉnh hình, phục hồi chức năng, cung cấp dụng cụ trợ giúp đối
    với người có công với cách mạng; xây dựng điều kiện, tiêu chuẩn, quy chế, chuyên môn, kỹ thuật đối với việc nuôi dưỡng,
    điều dưỡng người có công với cách mạng.


    - Phát huy phong trào chăm sóc người có công với cách mạng, xã phường làm tốt công tác thương binh, liệt sĩ và người có
    công với cách mạng.


    - Tổng kết, rà soát việc công nhận người có công với cách mạng theo Kết luận số 63-KL/TW ngày 27 tháng 5 năm 2013 của
    Ban Chấp hành Trung ương khóa XI. Sơ kết việc thực hiện Chỉ thị số 31/CT-TTg ngày 28 tháng 11 năm 2012 của Thủ tướng Chính
    phủ.


    - Xây dựng cơ sở dữ liệu quản lý về chi trả trợ cấp, hồ sơ người có công với cách mạng, liệt sĩ, mộ liệt sĩ và nghĩa trang
    liệt sĩ, tiến tới xây dựng cơ sở dữ liệu quốc gia về lĩnh vực người có công với cách mạng.


    - Tham gia xây dựng chương trình công tác tuyên truyền, giáo dục chính trị tư tưởng về công tác chăm sóc người có công
    với cách mạng.


    - Cải cách hành chính lĩnh vực người có công với cách mạng trên ba phương diện thể chế, tổ chức bộ máy và công chức công
    vụ.


    - Chú trọng công tác đào tạo bồi dưỡng nâng cao trình độ chuyên môn nghiệp vụ, ý thức, trách nhiệm của công chức thực
    hiện công tác người có công với cách mạng trong bộ máy quản lý Nhà nước.


    - Phối hợp huy động các nguồn lực xã hội khác trong việc thực hiện các chế độ ưu đãi đối với người có công với cách mạng
    trong các lĩnh vực của đời sống xã hội.


    - Biểu dương, nhân rộng gương người có công với cách mạng điển hình tiên tiến, tiêu biểu vượt khó vươn lên, tích cực tham
    gia phong trào thi đua yêu nước, phong trào đền ơn đáp nghĩa.


    - Chủ trì thực hiện ưu tiên trong tuyển sinh, đào tạo đối với con của người có công với cách mạng theo học ở nhà trường
    thuộc hệ thống giáo dục nghề nghiệp; chỉ đạo các trường học thuộc hệ thống giáo dục nghề nghiệp tham gia hoạt động chăm
    sóc, giữ gìn các công trình ghi công liệt sĩ và các hoạt động đền ơn đáp nghĩa, giáo dục nhận thức về ưu đãi người có
    công với cách mạng sâu rộng trong thế hệ trẻ.


    - Phối hợp với các cơ quan liên quan nghiên cứu, ban hành chính sách đối với người bị ảnh hưởng bởi chất độc hóa học thế
    hệ thứ 3 của người tham gia kháng chiến bị ảnh hưởng bởi chất độc hóa học; người tham gia kháng chiến trong giai đoạn
    1974 - 1975 nhưng chưa đủ thời gian được cấp Huy chương.


    - Thực hiện công tác kiểm tra, thanh tra trong việc thực hiện chính sách ưu đãi người có công.


    2. Bộ Quốc phòng


    - Chủ trì, phối hợp với các bộ, ngành liên quan nghiên cứu, trình Chính phủ ban hành Nghị định và triển khai chế độ, chính
    sách đối với người Việt Nam có công với cách mạng, người tham gia kháng chiến, chiến tranh bảo vệ Tổ quốc và làm nhiệm
    vụ quốc tế đang định cư ở nước ngoài; nghiên cứu, đề xuất sửa đổi, bổ sung, hoàn thiện các chế độ, chính sách đối với
    người tham gia cách mạng, tham gia kháng chiến, chiến tranh bảo vệ Tổ quốc và làm nhiệm vụ quốc tế.


    - Hoàn thiện cơ chế, chính sách về công tác tìm kiếm, quy tập hài cốt liệt sĩ; hoàn thiện hồ sơ liệt sĩ, danh sách liệt
    sĩ; lập bản đồ tìm kiếm, quy tập hài cốt liệt sĩ; tổ chức lực lượng bảo đảm cho nhiệm vụ tìm kiếm, quy tập; mở rộng và
    tăng cường hợp tác quốc tế; thực hiện có hiệu quả công tác quy tập hài cốt liệt sĩ ở trong nước và ngoài nước.


    - Chủ trì, phối hợp đẩy mạnh công tác xét duyệt, thẩm định hồ sơ xác nhận người có công với cách mạng; tham gia rà soát,
    tổng duyệt việc công nhận người có công với cách mạng thuộc trách nhiệm của Bộ Quốc phòng.


    - Tiếp tục thực hiện có hiệu quả các hoạt động đền ơn đáp nghĩa.


    - Chỉ đạo các cơ quan, đơn vị thuộc Bộ Quốc phòng cung cấp hồ sơ, tài liệu liên quan đến việc giải quyết chính sách ưu
    đãi người có công với cách mạng khi có đề nghị của cơ quan thanh tra, điều tra; giám định các hồ sơ tài liệu xác nhận
    người có công với cách mạng thuộc lực lượng quân đội khi có yêu cầu của các cơ quan chức năng.


    - Tham gia sơ kết việc thực hiện Chỉ thị số 31/CT-TTg ngày 28 tháng 11 năm 2012 của Thủ tướng Chính phủ.


    3. Bộ Công an


    - Chủ trì cung cấp xác minh thông tin liên quan đến người tham gia cách mạng bị mất tin, mất tích hoặc xác minh lý lịch
    nhân thân trong quá trình xác lập hồ sơ đề nghị công nhận người có công với cách mạng, đặc biệt đối với trường hợp hồ
    sơ tồn đọng; giám định các hồ sơ tài liệu xác nhận người có công với cách mạng khi có yêu cầu của các cơ quan chức năng.


    - Chủ trì phát động phong trào chăm sóc người có công với cách mạng và các hoạt động đền ơn đáp nghĩa trong toàn lực lượng
    Công an nhân dân Việt Nam.


    - Phối hợp với các đơn vị tổng kết, rà soát việc công nhận người có công với cách mạng do Bộ Công an trực tiếp quản lý
    theo quy định của Pháp lệnh Ưu đãi người có công với cách mạng.


    4. Bộ Tài chính


    - Đảm bảo nguồn kinh phí thực hiện chế độ ưu đãi người có công với cách mạng theo quy định.


    - Phối hợp kiểm tra, thanh tra việc sử dụng ngân sách thực hiện chế độ ưu đãi người có công với cách mạng.


    5. Bộ Kế hoạch và Đầu tư


    Bảo đảm nguồn kinh phí đầu tư phát triển thực hiện chính sách hỗ trợ cải thiện nhà ở, xây dựng, cải tạo, nâng cấp các
    cơ sở nuôi dưỡng, điều dưỡng cho người có công với cách mạng.


    6. Bộ Xây dựng


    Chủ trì chỉ đạo, hướng dẫn, kiểm tra, đôn đốc việc thực hiện chính sách hỗ trợ nhà ở đối với người có công với cách mạng
    theo Quyết định số 22/2013/QĐ-TTg ngày 26 tháng 4 năm 2013 của Thủ tướng Chính phủ và theo Nghị quyết số 63/NQ-CP ngày
    25 tháng 7 năm 2017 của Chính phủ.


    7. Bộ Y tế


    - Chủ trì xây dựng về điều kiện, tiêu chuẩn, quy chế, chuyên môn, kỹ thuật trong việc: Giám định Y khoa để xác định tỷ
    lệ tổn thương cơ thể (khả năng lao động) đối với thương binh, bệnh binh, người hoạt động kháng chiến bị nhiễm chất độc
    hóa học bị dị dạng, dị tật theo đề nghị của cơ quan có thẩm quyền.


    - Chủ trì thực hiện chương trình phát hiện sớm, can thiệp sớm trẻ em là con, cháu nạn nhân chất độc hóa học không may
    bị dị tật bẩm sinh và các dạng khuyết tật khác. Nghiên cứu các biện pháp ngăn ngừa các bệnh, tật, dị tật bẩm sinh và khuyết
    tật khác có liên quan đến chất độc hóa học.


    - Phối hợp với Bộ Lao động - Thương binh và Xã hội xây dựng điều kiện, tiêu chuẩn, quy chế, chuyên môn, kỹ thuật đối với
    việc nuôi dưỡng, điều dưỡng người có công với cách mạng.


    8. Bộ Giáo dục và Đào tạo


    Chủ trì chỉ đạo hệ thống giáo dục quốc dân (trừ hệ thống giáo dục nghề nghiệp): Thực hiện ưu tiên trong tuyển sinh, đào
    tạo đối với con của người có công với cách mạng; tham gia hoạt động chăm sóc, giữ gìn các công trình ghi công liệt sĩ
    và các hoạt động đền ơn đáp nghĩa khác, đưa việc giáo dục nhận thức về ưu đãi người có công với cách mạng sâu rộng trong
    học sinh, sinh viên.


    9. Bộ Thông tin và Truyền thông


    - Phối hợp với Bộ Lao động - Thương binh và Xã hội và Bộ Quốc phòng để tích hợp các dữ liệu về người có công với cách
    mạng phục vụ công tác tìm kiếm hài cốt liệt sĩ và xác định danh tính hài cốt liệt sĩ còn thiếu thông tin, tiến tới xây
    dựng cơ sở dữ liệu quốc gia về người có công với cách mạng.


    - Chỉ đạo, định hướng các cơquan truyền thông và hệ thống thông tin cơ sở tăng cường thông tin, tuyên truyền về lĩnh vực
    người có công với cách mạng.


    10. Bộ Văn hóa, Thể thao và Du lịch


    Chủ trì chỉ đạo, tổ chức các hoạt động văn hóa, nghệ thuật, theo kế hoạch hàng năm và dài hạn để tuyên truyền, giáo dục
    chính trị, tư tưởng, nâng cao nhận thức của người dân về truyền thống đạo lý cao đẹp của dân tộc "Uống nước nhớ nguồn",
    "Ăn quả nhớ người trồng cây".


    11. Bộ Ngoại giao


    Phối hợp với Bộ Quốc phòng, Bộ Lao động - Thương binh và Xã hội trong việc tìm kiếm, quy tập và xác định danh tính hài
    cốt liệt sĩ còn thiếu thông tin và trong việc thực hiện chính sách người có công với cách mạng định cư ở nước ngoài.


    12. Đài Truyền hình Việt Nam, Đài Tiếng nói Việt Nam, Thông tấn xã Việt Nam: Chủ trì xây dựng các chuyên mục, chuyên đề
    theo kế hoạch hàng năm và dài hạn về ưu đãi người có công với cách mạng.


    13. Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương


    Chủ trì, xây dựng và tổ chức thực hiện Kế hoạch của từng địa phương; phối hợp với các bộ, ngành thực hiện các chương trình,
    dự án trong Kế hoạch; huy động mọi nguồn lực và lồng ghép các hoạt động có liên quan của các chương trình khác trên địa
    bàn để đạt được các mục tiêu trong Kế hoạch; kiện toàn cơ quan đầu mối ở địa phương để thực hiện Kế hoạch.


    14. Các bộ, ban, ngành khác: Căn cứ vào chức năng nhiệm vụ, phối hợp với các bộ, ban, ngành liên quan tổ chức, triển khai
    thực hiện Kế hoạch.


    15. Đề nghị Ủy ban trung ương Mặt trận Tổ quốc Việt Nam chủ trì, phối hợp với các tổ chức chính trị - xã hội thực hiện
    công tác tuyên truyền và giám sát việc thực hiện chính sách chế độ ưu đãi đối với người có công với cách mạng.


    16. Các tổ chức chính trị - xã hội, tổ chức xã hội, tổ chức xã hội - nghề nghiệp, doanh nghiệp và cộng đồng.


    Khuyến khích các tổ chức chính trị - xã hội, xã hội - nghề nghiệp, các đoàn thể quần chúng, các tổ chức phi chính phủ,
    doanh nghiệp, cộng đồng trong và ngoài nước tham gia vào các hoạt động đền ơn đáp nghĩa, chăm sóc người và gia đình có
    công với cách mạng.


    Hàng năm, các bộ, ngành và Ủy ban nhân dân các tỉnh, thành phố trực thuộc trung ương báo cáo kết quả thực hiện về Bộ Lao
    động - Thương binh và Xã hội tổng hợp, báo cáo Thủ tướng Chính phủ./.'
