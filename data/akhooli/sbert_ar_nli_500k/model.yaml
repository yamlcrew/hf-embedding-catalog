widgetData:
- source_sentence: من هو عتلة الدهون
  sentences:
  - واحدة من الأسلحة التي لطالما أردت الحصول عليها كانت بندقية Marlin 39A ذات الحركة الرافعة .22. صدق أو لا تصدق ، بدأت هذه
    الرغبة بلعبة أركيد. عندما كنت مراهقًا ، اعتدت أن ألعب لعبة رماية في معرض الرماية تحاكي زجاجات الرماية ببندقية رافعة ،
    وبعد إعادة تجميع البندقية ، كان قياس الزناد 2 رطل ، وكان من السهل رفع البندقية. لقد سحبت الرصاص والمسحوق من 0.22 ثانية
    كان علي أن أختبر ما إذا كان زنبرك المطرقة الأخف سيظل ينبثق من البرايمر. من بين الأنواع الثلاثة المختلفة من 0.22 ثانية
    التي اختبرتها ، أطلقت البندقية المركب الأولي دون أي مشاكل.
  - يشمل أعداء الولب الطيور الجارحة مثل نسر wedgetail ، والذي غالبًا ما يمكن ملاحظته وهي تنقض على مستعمرات من أنواع مختلفة
    من الولاب الصخري عندما تتعرض على الأسطح الصخرية العارية. شغوفًا بكل الأشياء الأسترالية ، أتجول في جميع أنحاء WikiAnswers
    ، وأجيب على الأسئلة التي لها اتصال بعيدًا بأستراليا ... وبعضها الآخر ... لأن اهتماماتي بعيدة وواسعة.
  - لافاييت فات ليفر (من مواليد 18 أغسطس 1960 في باين بلاف أركنساس) هو لاعب كرة سلة أمريكي محترف متقاعد لعب في الدوري الاميركي
    للمحترفين. وهو حاليًا مدير تطوير اللاعبين في سكرامنتو كينغز.
- source_sentence: ما هو الشكل المناسب في الفن
  sentences:
  - طهي الحلزونات جيدًا يمكن أن يقضي على الديدان المثقوبة. تشمل أعراض طفيل الكبد الخمول ، وضعف الشهية ، آلام في البطن ، وركود
    صفراوي ، وهي حالة لا يمكن أن تتدفق فيها العصارة الصفراوية من الكبد إلى الأمعاء. هذه المضاعفات الأخيرة هي التي تجعل الجلد
    يتحول إلى اللون الأخضر.
  - حددت حركة الباروك المتوترة والفاخرة فن القرن السابع عشر. تميزت فترة الباروك بالديناميكية المبالغ فيها والتفاصيل الواضحة
    التي تهدف إلى خلق الدراما والعظمة في النحت والرسم والعمارة ، وعلى الرغم من كونها فنانًا من القرن السادس عشر تقنيًا ، إلا
    أن كارافاجيو الإيطالي أثر بشكل كبير على الفن الباروكي. كانت لوحاته خروجًا واضحًا عن التقاليد الفنية في Mannerism - - الشكل
    الفني السائد في القرن السادس عشر - مع استخدامه الدرامي للضوء والظل وتصويره الواقعي للأشياء والأشخاص.
  - الشكل هو أحد العناصر السبعة للفن وهي الأدوات المرئية التي يستخدمها الفنان لتأليف عمل فني. بالإضافة إلى الشكل ، فهي تشمل
    الخط والشكل والقيمة واللون والملمس والفضاء. كعنصر من عناصر الفن ، يشير الشكل إلى شيء ثلاثي الأبعاد ويحيط بالحجم ، الطول
    والعرض والارتفاع ، مقابل الشكل ثنائي الأبعاد أو المسطح. الشكل هو شكل ثلاثي الأبعاد ، ومثل الأشكال ، يمكن أن يكون هندسيًا
    أو عضويًا.
- source_sentence: تعريف وحدة حرارية بريطانية
  sentences:
  - وحدة حرارية بريطانية. الوحدة الحرارية البريطانية ، أو BTU ، هي وحدة طاقة. إنها تقريبًا الطاقة اللازمة لتسخين رطل واحد
    من الماء بدرجة فهرنهايت واحدة. 1 وحدة حرارية بريطانية = 1055 جول ، 252 سعرة حرارية ، 0.293 واط / ساعة أو الطاقة الناتجة
    عن حرق عود ثقاب واحد. 1 واط تساوي حوالي 3.412 وحدة حرارية بريطانية في الساعة. غالبًا ما يتم استخدام BTU كنقطة مرجعية لمقارنة
    أنواع الوقود المختلفة. على الرغم من أنها سلع مادية ويتم قياسها وفقًا لذلك ، مثل الحجم أو البراميل ، يمكن تحويلها إلى وحدات
    حرارية بريطانية اعتمادًا على ...
  - وحدة حرارية بريطانية ، اختصار للوحدة الحرارية البريطانية ، هي مقياس أساسي للطاقة الحرارية (الحرارية). وحدة حرارية بريطانية
    هي كمية الطاقة اللازمة لرفع درجة حرارة رطل واحد (0.45 كجم) من الماء بمقدار 1 درجة فهرنهايت (0.55 درجة مئوية).
  - قانون مساهمات التأمين الفيدرالي (FICA) FICA هو عمل للحكومة الفيدرالية يتطلب من أصحاب العمل والموظفين دفع ضرائب لبرامج
    مزايا الضمان الاجتماعي والرعاية الطبية وفقًا للأسعار التي تحددها الحكومة الفيدرالية.
- source_sentence: ما هو الغرض من المعجل الدائري
  sentences:
  - 'هناك نوعان أساسيان من مسرعات الجسيمات: المعجلات الخطية والمسرعات الدائرية. تدفع المسرعات الخطية الجسيمات على طول خط شعاع
    خطي أو مستقيم. تدفع المسرعات الدائرية الجسيمات حول مسار دائري.'
  - مرحبا جميعا. جاكلين هوارد هنا. أنا ¢ Ã'ââ ؟؟ m 330 قدمًا تحت الأرض في مختبر Fermi National Accelerator Laboratory في إلينوي.
    إنه المكان الذي يبحث فيه العلماء عن أصغر اللبنات الأساسية لكل مادة ، والتي يمكن أن تعزز فهمنا لكل شيء نراه من حولنا ،
    وحتى أنفسنا.
  - من المتوقع أن تساعد اللوائح في تعزيز الخدمات الصحية وتلبية احتياجات المرضى من خلال تخفيف الازدحام وتقليل أعباء العمل ،
    خاصة في المناطق الريفية. غالبية NPs في بريتش كولومبيا لديهم التعليم والكفاءات المطلوبة للقبول والتسريح ، ولكن لم يكن لديهم
    القدرة التشريعية. كولومبيا البريطانية هي الولاية القضائية الثانية في كندا التي لديها ممرضات ممرضات مؤهلات يقبلن ويخرجن
    المرضى من المستشفيات ، بعد أونتاريو. تم تقديم الممرضات الممارسات إلى بريتش كولومبيا. في عام 2005 للمساعدة في تحسين الوصول
    إلى خدمات الرعاية الصحية الأولية.
- source_sentence: هل يغطي العلاج الطبي (أ) أو (ب) تكلفة المعينات السمعية
  sentences:
  - يتم تعريف الإعاقة غير المرئية ، أو الإعاقة الخفية ، على أنها إعاقات لا تظهر على الفور. قد لا يكون من الواضح أن بعض الأشخاص
    الذين يعانون من إعاقات بصرية أو سمعية لا يرتدون نظارات أو أجهزة سمعية أو أجهزة سمعية سرية. قد يرتدي بعض الأشخاص الذين
    يعانون من فقدان البصر العدسات اللاصقة.
  - يغطي الجزء ب من برنامج Medicare (التأمين الطبي) فحوصات السمع والتوازن التشخيصية إذا طلب طبيبك أو مقدم رعاية صحية آخر هذه
    الاختبارات لمعرفة ما إذا كنت بحاجة إلى علاج طبي. لا يغطي برنامج Medicare فحوصات السمع الروتينية أو المعينات السمعية أو
    اختبارات تركيب المعينات السمعية.
  - '"أمثلة من Similes From The Odyssey. Homeric Similes ، المعروفة أيضًا باسم Epic Similes ، هي مقارنات تفصيلية بين كائنين
    مختلفين باستخدام مثل أو مثل. غالبًا ما نستخدم التشبيهات القصيرة في الكلام اليومي ، مثل المثال ، à¢Ã''€ÂŠ'' إنها صعبة مثل
    المسامير. في الواقع ، نحن نستخدمها كثيرًا حتى يمكن أن تصبح مصطلحات. • الانتباه بطرق غير متوقعة ، فكاهية ، مروعة أو بطولية.
    وهي أيضًا أطول من ذلك بكثير. فيما يلي بعض الأمثلة المتشابهة لهوميري من أحد أشهر أعمال هوميروس: الأوديسة. استخدم التشبيهات
    القصيرة في الكلام اليومي ، مثل المثال ، ""إنها صعبة مثل الأظافر."" حقيقة ، نحن نستخدمها كثيرًا بحيث يمكن أن تصبح مصطلحات.
    ومع ذلك ، يتم استخدام Homeric Simile لإعادة توجيه انتباه القارئ بطرق غير متوقعة أو روح الدعابة أو مروعة أو بطولية."'
