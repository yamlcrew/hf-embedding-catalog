widgetData:
- source_sentence: ما هو متوسط ​​مزايا الضمان الاجتماعي
  sentences:
  - الغرض الرئيسي من الدورة الشهرية هو تحضير الجسد الأنثوي للتكاثر أو الحمل. خلال هذا الوقت ، يتم تخصيب بويضة جديدة. إذا لم
    تكن المرأة حاملاً ، فسوف يسفك الرحم.
  - ما هو معدل الاستحقاق الشهري للعامل المتقاعد؟ متوسط ​​استحقاق تقاعد الضمان الاجتماعي الشهري لشهر يناير 2016 هو 1،341 دولارًا.
    المبلغ يتغير شهريا. عندما تكون جاهزًا للتقدم بطلب للحصول على مزايا التقاعد ، استخدم تطبيق التقاعد عبر الإنترنت ، وهو الطريقة
    الأسرع والأسهل والأكثر ملاءمة للتقدم. معلومات اكثر. حقائق أساسية عن الضمان الاجتماعي.
  - لإعطائك فكرة عما قد تتلقاه ، لعام 2015 ، يبلغ متوسط ​​مبلغ مخصصات SSDI 1165 دولارًا أمريكيًا في الشهر ، ولكن يمكنك الحصول
    على ما يصل إلى 2663 دولارًا أمريكيًا ، إذا كنت مهتمًا بكيفية حساب الضمان الاجتماعي لـ AIME و PIA ، فإليك الطريقة . كم
    ستعتمد إعانة إعاقة الضمان الاجتماعي على أرباحك المغطاة - الأجور التي دفعت عليها ضرائب الضمان الاجتماعي - قبل أن تصبح معاقًا.
- source_sentence: ما هو الراتب الابتدائي لمن يلتحق بالجيش
  sentences:
  - كان الراتب المبدئي لجندي في الجيش الأمريكي بدرجة رواتب E-1 هو 1،491 دولارًا شهريًا اعتبارًا من السنة المالية 2012 ، وفقًا
    لموقع ArmyTimes.com. جندي برتبة أجر E-4 وله أكثر من أربع سنوات في الخدمة تلقى 2،266.50 دولارًا شهريًا. الجندي الأعلى رتبة
    في الجيش الأمريكي هو الرقيب الرائد ، الذي يحمل رتبة أجر من E-9. كان الراتب الأساسي الشهري للجندي بدرجة رواتب E-9 مع 20
    عامًا في الخدمة هو 5،523.60 دولارًا.
  - 17 التعليقات. Meclizine هو الاسم العام للدواء المسمى Antivert والأدوية التي لا تستلزم وصفة طبية (OTC) المعروفة باسم Dramamine
    و Bonine. يستخدم ميكليزين لعلاج دوار الحركة والدوخة. ينتمي الدواء إلى فئة من العقاقير تسمى مضادات الهيستامين ، والتي تستخدم
    بشكل عام لعلاج الحساسية ، ومع ذلك ، يعمل الميكليزين بشكل مختلف قليلاً ، حيث يقلل من الغثيان وتشنجات العضلات ، ويستخدم
    عقار كليزين لعلاج دوار الحركة والدوخة. ينتمي الدواء إلى فئة من العقاقير تسمى مضادات الهيستامين ، والتي تستخدم بشكل عام
    لعلاج الحساسية.
  - تأسيس حزمة الراتب الخاص بك. جنود الخدمة الفعلية وجنود الاحتياط في الجيش النشطين يكسبون رواتب الجيش الأساسية. الراتب الأساسي
    هو راتبك الأساسي كجندي في الخدمة الفعلية ويتم احتسابه فقط كجزء من إجمالي دخلك ، ويتم توزيعه في اليوم الأول والخامس عشر
    من كل شهر ، على غرار العديد من الوظائف المدنية. جنود الخدمة الفعلية وجنود الاحتياط في الجيش النشطين يكسبون رواتب الجيش
    الأساسية. الراتب الأساسي هو راتبك الأساسي كجندي في الخدمة الفعلية وهو يُحتسب فقط كجزء من إجمالي دخلك.
- source_sentence: إدانة والد جاريد كوشنر
  sentences:
  - تم تعيين صهر دونالد ترامب جاريد كوشنر `` مستشارًا كبيرًا للرئيس '' يوم الاثنين وكان كوشنر فعالًا في حملة ترامب وأشار إلى
    أنه يخطط للانتقال إلى واشنطن والعمل لصالح الرئيس المنتخب.
  - تشارلز كوشنر. تشارلز كوشنر (من مواليد 16 مايو 1954) هو مطور عقاري أمريكي ومجرم مدان. أسس شركات كوشنر في عام 1985. وفي
    عام 2005 ، أدين بالمساهمات غير القانونية في الحملة ، والتهرب الضريبي ، والتلاعب بالشهود ، وقضى فترة في السجن الفيدرالي.
    بعد إطلاق سراحه ، استأنف مسيرته المهنية في مجال العقارات.
  - '191 متابع. ج: بشكل عام ، يجب إصلاح الفتق المعرضة لخطر حدوث مضاعفات ، أو التي تسبب الألم ، أو التي تحد من النشاط. إذا
    لم يتم إصلاحها ، فهناك خطر من أن عملية جراحية طارئة قد تكون مطلوبة في وقت لاحق. في بعض الأحيان ، يمكن السيطرة على الفتق
    مؤقتًا عن طريق ارتداء جهاز يشبه الحزام يطبق ضغطًا خارجيًا ، مما يدفع الأنسجة مرة أخرى إلى البطن ويحملها هناك ، وهذا الجهاز
    يسمى الجمالون ، وفي بعض الأحيان ، يمكن التحكم في الفتق مؤقتًا عن طريق ارتداء جهاز يشبه الحزام يطبق ضغطًا خارجيًا ، والذي
    يدفع الأنسجة مرة أخرى إلى البطن ويثبتها هناك. هذا الجهاز يسمى الجمالون.'
- source_sentence: لماذا اتسعت الاقدام؟
  sentences:
  - لأن الجمال تمشي لمسافات طويلة للعثور على الماء ، إذا كانت أقدامها واسعة فإنها تجد أنه من الأسهل أن تمشي لمسافات طويلة.
    كما أن الأرجل العريضة تساعد الجمل على عدم الغرق في الرمال العميقة.
  - دليل لزراعة نبات الخشخاش المائي. كان خشخاش الأفيون ، Papaver somniferum ، يزرعه الإنسان منذ عصور ما قبل التاريخ. تنمو
    اليوم P. ​​somniferum في الحدائق والبراري في معظم أنحاء العالم ، بما في ذلك الولايات المتحدة وأوروبا. لا يكاد يوجد سوبر
    ماركت في العالم لا يبيع بذوره. دليل لزراعة نبات الخشخاش المائي. كان خشخاش الأفيون ، Papaver somniferum ، يزرعه الإنسان
    منذ عصور ما قبل التاريخ. تنمو اليوم P. ​​somniferum في الحدائق والبراري في معظم أنحاء العالم ، بما في ذلك الولايات المتحدة
    وأوروبا. لا يكاد يوجد سوبر ماركت في العالم لا يبيع بذوره.
  - نشأت الجمال من أمريكا الشمالية. تشير الأدلة الأحفورية إلى أن كاميلوبس ، رائد الجمل الحديث ، ظهر في الحي الذي كان يعيش
    فيه قبل 2.5 مليون سنة ، وقد انتقلت هذه الحيوانات من الأمريكتين منذ 10000 عام ، لكن أقاربها هاجروا إلى آسيا ثم أفريقيا
    ، حيث بقوا على قيد الحياة. اليوم ، هذه هي الإبل الحقيقية ، الدروماري والبكتريا. نحن نعلم أيضًا أن الإبل في أمريكا الجنوبية
    ، بما في ذلك اللاما ، والألبكة ، وغواناكو ، وفيكونا ، فيكو ، نشأت من. يمكن العثور على روابط Camelops للمزيد. معلومة
- source_sentence: هل توجد مخازن في الجهاز الهضمي
  sentences:
  - كازينو - لعبة ورق يتم فيها أخذ البطاقات على الطاولة وبطاقات مؤهلة في اليد. كاسينو. لعبة الورق ، البطاقات - لعبة تلعب بأوراق
    اللعب. الكازينو الملكي - أحد أشكال الكازينو حيث تحتوي بطاقات الوجه على قيم نقاط إضافية. كازينو الأشياء بأسمائها الحقيقية
    - أحد أشكال الكازينو حيث تكون قيمة البستوني نقطة واحدة.
  - بي دي إف. نص. أصلي. الإنسان كائن معقد لأن الإنسان يتكون من تريليونات من الخلايا والكثير من الأجهزة والأعضاء ، ومن بعض
    الأجهزة الرئيسية أجهزة الدورة الدموية والجهاز الهيكلي والجهاز الهضمي والجهاز العصبي والجهاز التنفسي. نص. أصلي. الإنسان
    كائن حي معقد لأن الإنسان يتكون من تريليونات من الخلايا والكثير من الأجهزة والأعضاء ، ومن بعض الأجهزة الرئيسية أجهزة الدورة
    الدموية والجهاز الهيكلي والجهاز الهضمي والجهاز العصبي والجهاز التنفسي.
  - '1 إطلاق الماء والأحماض والإنزيمات والمخازن بواسطة الجهاز الهضمي والأعضاء الملحقة في تجويف الجهاز الهضمي. 2 الامتصاص.
    3 حركة الجزيئات العضوية الصغيرة ، والإلكتروليتات ، والفيتامينات ، والمياه عبر ظهارة الجهاز الهضمي وإلى الدم والجهاز الليمفاوي
    والجهاز الهضمي (وتسمى أيضًا القناة الهضمية أو الجهاز الهضمي). 1 الجهاز الهضمي عبارة عن أنبوب مستمر يمتد من الفم إلى فتحة
    الشرج. 2 ويشمل الأعضاء التالية: 3 فم. 4 بلعوم. 5 مريء. 6 بطن. 7 ـ الأمعاء الدقيقة. 8 الأمعاء الغليظة.'
