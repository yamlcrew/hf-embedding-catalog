- source_sentence: كم فدان بحيرة رونكونكوما
  sentences:
  - أبعاد بحيرة Ronkonkoma - تختلف من 215 فدانًا عندما يكون هناك جفاف إلى 275 فدانًا عندما تكون هناك ظروف غمرتها المياه. -
    متوسط ​​العمق 14.5 قدم. - أعمق أعماق 45 قدم. و 90 قدمًا. في المناطق الجنوبية الغربية.
  - يقع Alpine Lake Resort في أعالي جبال West Virginia Alleghenies ، على بعد 25 دقيقة فقط من مناطق الجذب السياحي Deep Creek
    Lake وساعة واحدة من Morgantown WV ، ويقع على مساحة 2000 فدان مشجرة بكثافة مع ملعب غولف من 18 حفرة حائز على جوائز وبحيرة
    نقية مساحتها 150 فدانًا تغذيها الينابيع والجداول الجبلية كنقطة محورية للمنتجع.
  - إجابة جيكم يونغ. صوت الثقة 36.1 ألف. مايكل دي هيغينز هو رئيس أيرلندا. تم انتخابه كرئيس 9th لأيرلندا وتولى منصبه في 11
    نوفمبر 2011 لمدة 7 سنوات ، وبالتالي يجب أن يظل في منصبه حتى نوفمبر 2018.
- source_sentence: ما مقدار الأخطاء الطبية التي يقوم بها المحامون
  sentences:
  - العديد من محامي سوء الممارسة الطبية يعملون لحسابهم الخاص ، وبعضهم شركاء في مكاتب المحاماة. بالنسبة لهؤلاء المحامين ، تعتمد
    الأرباح على مكاسب الدعاوى القضائية ، لأن الشركاء والممارسين الفرديين لا يحصلون عادةً على رواتب. وفقًا لموقع LawFirms.com
    ، يتم تسوية متوسط ​​حالة سوء الممارسة الطبية بمبلغ 425000 دولار.
  - تم تطوير عقار ثاليدومايد غثيان الصباح ، الذي تسبب في إنجاب النساء الحوامل لأطفال بدون ذراعين وأرجل ، لأول مرة من قبل النازيين
    ، ربما كجزء من برنامج أسلحتهم الكيميائية ، وفقًا لبحث جديد. تم تطويره لأول مرة من قبل علماء يعملون في ألمانيا في زمن الحرب
    ، ويمكن أن يكون له آثار على مسؤولية الحكومة الألمانية. ولم تقدم حتى الآن تعويضات إلا للضحايا الألمان ، على الرغم من أن
    العقار تم توزيعه في 46 دولة.
  - 'في التقاضي المدني ، مثل دعوى سوء الممارسة الطبية ، يتحمل المدعي (الطرف المتضرر) عبء الإثبات. هذا يعني أنه يجب أن تكون
    قادرًا على إثبات ، وفقًا للمعايير القانونية المطلوبة ، أن: مقدمو الرعاية الصحية الذين تريد مقاضاتهم ارتكبوا بالفعل خطأ
    في الرعاية التي قدموها لك ؛ و.'
- source_sentence: الذي كان متزوج بيلي جويل
  sentences:
  - يقيس اختبار alanine aminotransferase (ALT) كمية هذا الإنزيم في الدم. يوجد ALT بشكل رئيسي في الكبد ، ولكن أيضًا بكميات
    أقل في الكلى والقلب والعضلات والبنكرياس. كان ALT يُسمى سابقًا ترانساميناز الجلوتاميك البيروفي (SGPT).
  - 'ما هي الشاحنة التي قادها بيلي بوب في موسيقى البلوز؟ يجيب kgb Ã⠀ Ã''ÂÃ''Â »Arts & Entertainment â € » أفلام »ما هي الشاحنة
    التي قادها بيلي بوب في موسيقى البلوز؟ كانت شاحنة بيلي بوب 78-79 LWB 4X4 في فيلم فارسيتي بلوز. اكتب kgb_ أي شيء ، 24/7!
    العلامات: اسكواش البلوز ، بيلي بوب.'
  - في عام 1985 ، للموسيقي بيلي جويل (مواليد 9 مايو 1949) ؛ انتهى الزواج في عام 1994 وأنجب طفلاً واحدًا هو أليكسا راي جويل.
    التقى برينكلي وجويل في عام 1983 في جزيرة سانت بارتس في منطقة البحر الكاريبي وتزوجا في 23 مارس 1985 على متن يخت على نهر
    هدسون ، وهو الزواج الثاني لكليهما.
- source_sentence: لعبة باما مسو 2015
  sentences:
  - '"الخليج الفارسي (الفارسية: خà "ØÂÂØÂÂØ Â ''ŽÃ ¢ ، العربية: اÃ℠¢ "ج Ø Ã ""¢"" هو البحر الأبيض المتوسط ​​في غرب آسيا. المسطح
    المائي هو امتداد للمحيط الهندي (خليج عمان) عبر مضيق هرمز ويقع بين إيران في الشمال الشرقي وشبه الجزيرة العربية إلى الجنوب
    الغربي."'
  - إنها واشنطن ريد سكينز ضد كليفلاند براونز الساعة 8 مساءً. (التوقيت الشرقي) على NBC و CSN في الأسبوع 1 من 2015 قبل الموسم.
    اعثر على معلومات هنا حول وقت لعبة Redskins-Browns ، والقناة التلفزيونية التي يتم تشغيلها ، وجدول Redskins الكامل لعام
    2015 ، وكيفية البث المباشر عبر الإنترنت ، والاحتمالات ، والمذيعين ، والمختارات والمزيد. سقسقة شارك.
  - 'إعادة التشغيل: وفقًا لجدول DirecTV الخاص بي ، فإن أول إعادة للعبة MSU-Alabama تكون في الساعة 3:30 صباحًا يوم الأحد ،
    17 نوفمبر على ESPN ، ومرة ​​أخرى في ظهر يوم الثلاثاء التالي ظهر يوم ESPNU.'
- source_sentence: هل يمكنك تناول lortab أثناء الحمل
  sentences:
  - نعم ، هل يمكنني تناول عقار لورتاب 10 طوال فترة حملي بسبب وجود ورم في مبيضي وفي كثير من الألم بسبب نمو الطفل والضغط عليه
    ، لذلك لمدة 9 أشهر كنت أعاني من مسكنات الألم كنت قلقة من البداية ولكن بعد ذلك بالتحدث مع طبيبي وحماتي التي هي RN وجدت
    الأمر على ما يرام.
  - 'حتى أن بعض النساء لا يلاحظن نزيفًا أو تشنجًا عند الانغراس ، لذلك لا تقلقي إذا كنتِ تحاولين الحمل ولا تعانين من هذه الأعراض
    ؛ لا يزال من الممكن أن تكوني حامل. الدورة الشهرية المتأخرة أو الفائتة: تأخر الدورة الشهرية أو ضياعها هو أكثر أعراض الحمل
    شيوعًا التي تدفع المرأة إلى اختبار الحمل. عندما تصبحي حاملاً ، يجب تفويت الدورة التالية. ومع ذلك ، يمكن أن تنزف بعض النساء
    أثناء الحمل ، ولكن عادةً ما يكون هذا النزيف أقصر أو أخف من الدورة العادية.'
  - الحفاظ على ازدهار الأوركيد الخاص بك لأطول فترة ممكنة - عند زراعة الأوركيد ، فأنت تريد التأكد من أن الزهور تدوم لأطول فترة
    ممكنة. كم من الوقت تدوم أزهار الأوركيد ، تعتمد بشكل كبير على تنوع الأوركيد بالإضافة إلى الرعاية التي تتلقاها الأزهار.
    أزهار فالاينوبسيس ، وهي واحدة من أكثر الأنواع شيوعًا ، تتفتح عادةً مرة أو مرتين في السنة ويمكن أن تستمر الإزهار في أي
    مكان من 60 إلى 120 يومًا.
