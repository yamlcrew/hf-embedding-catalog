widgetData:
- source_sentence: ماذا يعني اسم كريستين باللغة الإنجليزية
  sentences:
  - 'اسم كريستين هو اسم لاتيني طفل. في اللاتينية ، معنى اسم كريستين هو: أتباع المسيح. اسم كريستين هو اسم طفل أمريكي. في أمريكا
    ، معنى اسم كريستين هو: أتباع المسيح. اسم كريستين هو اسم طفل انجليزي. معنى اسم كريستين في اللغة الإنجليزية هو: كريستينا
    وكريستيانا. أتباع المسيح. اسم كريستين هو اسم طفل يوناني. معنى اسم كريستين في اليونانية: الممسوح.'
  - '"يشمل الخيار المتخصص أصناف الخيار الموروثة مثل خيار الليمون والخيار ""الأرميني الحلو"" ، بالإضافة إلى خيار الدفيئة التي
    لا تتطلب تلقيحًا لتثبيتها. يتم تربية خيار الحاوية من أجل الكروم المدمجة ، وهو أفضل لزراعة السطح وحدائق المساحات الصغيرة.
    الخيار الأرميني الحلو له نكهة خيار خفيفة ، مثل البطيخ بدون الحلاوة. لا يحتاجون إلى تقشير ، كما أن شكلهم المضلع يجعل المقاطع
    العرضية مثيرة للاهتمام عند تقطيعها. ""خيار الليمون"" (65 يومًا ، إرث ، تلقيح مفتوح) عبارة عن خيار صغير ، مستدير ، أصفر
    تجده غالبًا في أسواق المزارعين."'
  - 'تزين كريستين ستيوارت غلاف عدد أزياء المرأة الخريفية من مجلة T ، في أكشاك بيع الصحف في 21 أغسطس. ها هي الفتاة البالغة
    من العمر 26 عامًا كان على الممثلة أن تشاركها مع ماج: عن علاقتها مع روبرت باتينسون: ࢠ"أراد الناس مني وروب أن نكون معًا
    بشكل سيء لدرجة أن علاقتنا تحولت إلى منتج. لم تعد الحياة الحقيقية.'
- source_sentence: هل يمكن علاج سرطان العظام
  sentences:
  - علاج سرطان العظام. يعتمد علاج سرطان العظام على نوع سرطان العظام لديك ومدى انتشاره وصحتك العامة. العلاجات الرئيسية هي الجراحة
    والعلاج الكيميائي والعلاج الإشعاعي.
  - اضطراب نخاع العظم هو سبب أقل شيوعًا وأكثر خطورة لارتفاع خلايا الدم البيضاء. اللوكيميا هي الجاني الأكثر شيوعًا. مع هذا
    النوع من السرطان ، ينتج نخاع العظم أعدادًا كبيرة من خلايا الدم البيضاء المعيبة ويطلقها في الدم. يمكن أن تؤدي اضطرابات
    نخاع العظام الأخرى ، مثل كثرة الحمر الحقيقية ، إلى زيادة عدد كرات الدم البيضاء.
  - (الولايات المتحدة الأمريكية). متوسط ​​الراتب لمصمم الويب في نيويورك ، نيويورك هو 53329 دولارًا في السنة. لا يتمتع الأشخاص
    في هذه الوظيفة عمومًا بأكثر من 10 سنوات من الخبرة. المهارات التي تزيد من رواتب هذه الوظيفة هي التجارة الإلكترونية و Adobe
    InDesign و Dreamweaver. الخبرة لها تأثير معتدل على الدخل لهذه الوظيفة.
- source_sentence: تعريف واجهة scsi
  sentences:
  - يوفر Windows Installer واجهة مستخدم كاملة (UI) لتثبيت تطبيق أو منتج. تقدم واجهة المستخدم للمستخدم الخيارات المتاحة لتكوين
    التثبيت والحصول على معلومات من المستخدم حول عملية التثبيت المعلقة. حول واجهة المستخدم يصف وظيفة واجهة مستخدم المثبت. يصف
    استخدام واجهة المستخدم استخدام واجهة المستخدم الداخلية للمثبت. يتم عرض المعلومات المرجعية في مربع الحوار الداخلي المثبت
    وأنماط وخيارات التحكم في مرجع واجهة المستخدم.
  - 'تعريف florid: تعريف florid هو شخص ذو بشرة متوهجة ، أو شيء معقد للغاية. (صفة) مثال على شخص يمكن وصفه بأنه مزهر هو عداء
    ذو ​​وجه أحمر ، متورد الوجه تحول وجهه إلى اللون الأحمر بمجهود ...'
  - (واجهة نظام الكمبيوتر الصغيرة) يُعد SCSI عبارة عن واجهة أجهزة لما يصل إلى 15 جهازًا طرفيًا متصلًا ببطاقة PCI أو PCI Express
    (محول مضيف SCSI) على اللوحة الأم. قدم في عام 1986 من قبل Shugart Associates (انظر SASI) ، تم استبدال هذه العمارة المتوازية
    الأصلية إلى حد كبير بإصدار تسلسلي (انظر SCSI المرفق التسلسلي).
- source_sentence: كم رسوم التأخير
  sentences:
  - رسم تأخر دفعة. يتم فرض رسوم السداد المتأخر (رسوم التأخير) على المقترض الذي يتخلف عن دفع الحد الأدنى من السداد على الأقل
    بحلول الموعد النهائي للدفع. لتجنب الرسوم المتأخرة ، تأكد من دفع الحد الأدنى للمبلغ على الأقل بحلول تاريخ الاستحقاق. قد
    تؤثر الدفعات المتأخرة على سجلك الائتماني سلبًا ، حتى إذا تم سداد رصيدك المستحق بالكامل لاحقًا. يتم تحديد الرسوم المتأخرة
    العرضية بمبلغ 25 دولارًا بموجب اللوائح الفيدرالية.
  - 'ينص قانون ملكية تكساس ، القسم 92.019 ، على أنه لا يجوز للمالك فرض رسوم تأخير على المستأجر لعدم دفع الإيجار إلا إذا: 1
    تم تضمين إشعار بالرسوم في عقد إيجار مكتوب ؛ 2 الرسم المتأخر هو تقدير معقول للأضرار التي لحقت بالمالك نتيجة التأخر في دفع
    الإيجار ؛ و.'
  - يجب أن يتم الاحتفاظ بالحسابات المصرفية المشتركة بملكية متساوية لتكون مؤمنة من قبل مؤسسة التأمين الفيدرالية (FDIC) بحد
    أقصى 250.000 دولار لكل مودع. على سبيل المثال ، يجب أن يتمتع الوالد والطفل في حساب مشترك بنفس القدرة على سحب الأموال لزيادة
    حماية مؤسسة التأمين الفيدرالية (FDIC).
- source_sentence: ما هي المواد المصنوعة من الدعك
  sentences:
  - معظم مقشراتي مصنوعة من قماش يتكون من 65٪ قطن و 35٪ بوليستر. يبدو أن الكمية الصغيرة من البوليستر تمنع سوائل الجسم من التسرب
    عبر القماش إلى بشرتي الأساسية. بعض أنواع الدعك من القطن 100٪. ومع ذلك ، تأكد من استخدام قماش ناعم ومتين إذا كنت تنوي صنع
    الدعك من القطن بنسبة 100٪. lvmama يحب هذا.
  - بلدة وندسور ، مقاطعة أشاتبولا ، أوهايو. مرحبًا بكم في وندسور تاونشيب ، مقاطعة أشتابولا - أوهايو. مرحبًا بكم في وندسور
    بولاية أوهايو ، وهي بلدة تقع في الركن الجنوبي الغربي من مقاطعة أشتابولا.
  - Scrubs (مسلسل تلفزيوني) (تمت إعادة توجيهه من مستشفى القلب المقدس (Scrubs)) Scrubs (منمق كـ [الدعك]) هو مسلسل تلفزيوني
    كوميدي طبي أمريكي تم إنشاؤه بواسطة Bill Lawrence والذي تم بثه من 2 أكتوبر 2001 إلى 17 مارس 2010 ، على NBC ولاحقًا ABC.
    يتتبع المسلسل حياة الموظفين في مستشفى القلب المقدس التعليمي الخيالي.
