- source_sentence: كم التبن لإطعام الحصان
  sentences:
  - يجب أن يشرب الماعز الصغير من أمه لمدة 8 أسابيع على الأقل قبل أن يتم فطامه لإكمال التبن أو المرعى. سيأخذ بعض أصحاب الماعز
    الأطفال بعيدًا عن الأم على الفور ويغذون بالزجاجة. سيحتفظون بها في أماكن منفصلة ، ويحلبون الأم ، ثم يسكبون الحليب في زجاجة
    ويطعمون الطفل.
  - التوزيع الطبيعي القياسي. التوزيع الطبيعي القياسي هو التوزيع الطبيعي بمتوسط ​​0 وانحراف معياري 1. يمكن العثور على المناطق
    الواقعة تحت هذا المنحنى باستخدام جدول عادي قياسي (الجدول A في كتب Moore and Moore & McCabe المدرسية). تتضمن جميع نصوص
    الإحصائيات التمهيدية هذا الجدول. قم بتنسيقه بشكل مختلف. التوزيع العادي القياسي. التوزيع الطبيعي القياسي هو التوزيع الطبيعي
    بمتوسط ​​0 وانحراف معياري 1. يمكن العثور على المناطق الواقعة تحت هذا المنحنى باستخدام جدول عادي قياسي (الجدول A في كتب
    Moore and Moore & McCabe).
  - إذا افترض المالكون أن 20 في المائة من التبن سوف يضيع ، فإن الحصان الذي يبلغ وزنه 1000 رطل في المتوسط ​​سيتطلب 24 رطلاً
    من التبن يوميًا (20 رطلاً لتلبية التوصيات بالإضافة إلى 4 أرطال إضافية لحساب النفايات). تغير درجات الحرارة الباردة أيضًا
    متطلبات التغذية اليومية.
- source_sentence: من هم المتجولون rathkeale
  sentences:
  - جواب سريع. يظل السلمون النيئ المبرد طازجًا لمدة يوم إلى يومين. سمك السلمون المطبوخ في الثلاجة آمن للأكل لمدة ثلاثة إلى
    أربعة أيام. توصي وزارة الزراعة الأمريكية بضبط درجة حرارة الثلاجة على 40 درجة فهرنهايت أو أقل للحفاظ على سلامة الغذاء.
    أكمل القراءة.
  - Rathkeale Rovers هو اسم غير رسمي يطلق على مجموعة من المجرمين ، مقرها في أيرلندا ولكنها تعمل على المستوى الدولي. إنهم جميعًا
    أعضاء في مجتمع السفر الأيرلندي ، ويستخدمون أعمال المسافر التقليدية مثل وضع مدرج المطار أو تجديد المنزل كغطاء للأنشطة غير
    القانونية. ويشتهرون بكونهم أحد أغنى الأشخاص تنظيماً في العالم مجموعات الجريمة. تشمل الجرائم المزعومة غسيل الأموال وتهريب
    المخدرات وسرقة الأعمال الفنية ، وجميعهم أعضاء في مجتمع السفر الأيرلندي ، ويستخدمون أعمال المسافر التقليدية مثل وضع مدرج
    المطار أو تجديد المنزل كغطاء للأنشطة غير القانونية. تشتهر بكونها واحدة من أغنى مجموعات الجريمة المنظمة في العالم. تشمل
    الجرائم المزعومة غسل الأموال وتهريب المخدرات وسرقة الأعمال الفنية.
  - سام ألارديس ، مدرب سندرلاند ، كان مسؤولاً أيضًا عن وست هام يونايتد وبلاكبيرن روفرز ونيوكاسل يونايتد وبولتون واندرارز في
    الدوري الإنجليزي الممتاز ، وتولى روبرتو مانشيني منصب مدير مانشستر سيتي في عام 2009 ، وهو أول دور له في كرة القدم الإنجليزية.
    تولى تدريب بولتون واندرارز ونيوكاسل يونايتد وبلاكبيرن روفرز ووست هام وسندرلاند. أدار خمسة مدربين أربعة أندية مختلفة في
    الدوري الإنجليزي الممتاز. تولى رون أتكينسون تدريب أستون فيلا وكوفنتري سيتي وشيفيلد وينزداي ، ولفترة وجيزة ، نوتنجهام فورست.
- source_sentence: ما هي الأضرار اللاحقة
  sentences:
  - 'سيارات فيراري: القصة. شركة سيارات فيراري هي شركة تصنيع مقرها في مارانيلو ، إيطاليا. تأسست الشركة في عام 1929 على يد إنزو
    فيراري ، وكانت تُعرف في الأصل باسم سكوديريا فيراري. صنعت سكوديريا فيراري لأول مرة سيارات السباق ، لكنها بدأت في النهاية
    في إنتاج سيارات الشوارع التي تعمل بشكل قانوني بدءًا من عام 1947. تعد شركة Ferrari S.p.A حاليًا واحدة من أنجح شركات تصنيع
    السيارات الرياضية في العالم.'
  - 'وبطريقة أخرى ، فإن الأضرار التبعية هي نوع الأضرار التي لا يتوقعها الشخص العاقل والعادي والحصيف ما لم يخبرهم أحدهم أن
    تلك الأضرار ممكنة. في قرار مستشفى رونوك ، قرر القضاة: كانت تكاليف الفائدة المرتفعة على قرض البناء بمثابة أضرار تبعية.'
  - '"بيتر: أعتقد أن ""الأضرار التبعية"" هي تسمية تُطبق على الأضرار التي يمكن استردادها ، في غياب أحكام العقد التي تتعارض
    مع ذلك. ولكن الأهم من ذلك ، فإن الحالة التي تشير إليها قد تبدو درسًا موضوعيًا في عدم الاعتماد على المصطلحات القانونية
    وبدلاً من ذلك استخدام وسائل أخرى أكثر وضوحًا للحد من الأضرار."'
- source_sentence: متوسط ​​سعر الفائدة للمنازل المصنعة
  sentences:
  - للقيام بذلك ، نظر HSH في بيانات الربع الرابع من الرابطة الوطنية للوسطاء العقاريين لمتوسط ​​أسعار المنازل و HSH.com في
    الربع الرابع متوسط ​​سعر الفائدة للرهون العقارية ذات السعر الثابت لمدة 30 عامًا لتحديد مقدار الأموال التي يحتاجها مشترو
    المنازل لكسبها من أجل تحمل المبلغ الأساسي ودفع الفائدة فقط على منزل متوسط ​​السعر في السوق.
  - '"جورج هاميلتون في بالم بيتش عام 2013. لم يكن الكولونيل ساندرز بهذا الاسمرار من قبل. في إعلان تجاري جديد يصنع جولات على
    YouTube لليوم الوطني للدجاج المقلي ، يلعب بالم بيتش جورج هاميلتون دور ""العقيد المقرمش الإضافي ،"" ¢ â واحد من عدة إعلانات
    عبر الإنترنت قام الممثل بوليفاردير بعملها لسلسلة الدجاج هذا الصيف."'
  - قدر مكتب الحماية المالية للمستهلك معدل الفائدة النموذجي لقرض شراء منزل مصنّع في عام 2012 بنسبة 6.79٪. على النقيض من ذلك
    ، كان متوسط ​​معدل الفائدة الثابت لمدة 30 عامًا على الرهن العقاري التقليدي في ذلك العام من 3.6 إلى 4.2 في المائة ، وفقًا
    لموقع HSH.com ، ناشر معلومات القروض.
- source_sentence: لماذا رائحة الغسيل بعد الغسيل
  sentences:
  - 'كيفية التخلص من الرائحة: إذا تم اكتشافها على الفور ، فعادة ما يكون غسل الملابس مرة أخرى هو كل ما يلزم لإزالة الروائح
    الكريهة. إذا لم ينجح ذلك وما زلت تواجه مشاكل ، جرب إحدى الطرق التالية: اغسل مرة أخرى ولكن هذه المرة أضف كوبًا واحدًا من
    الخل إلى الحمولة (جنبًا إلى جنب مع منظف الغسيل).'
  - Honorificabilitudinitatibus هي كلمة مكونة من 27 حرفًا ، وتعني بصيغة الجمع أن تكون في حالة القدرة على الحصول على مرتبة
    الشرف. تصادف أن تكون الكلمة أطول كلمة استخدمها شكسبير على الإطلاق ، لكن جذورها تعود إلى قرون قبل عصره إلى القرن الحادي
    عشر على الأقل.
  - حافظ على ملابسك منتعشة وجافة بالمجفف الكهربائي من سيرز. عندما يدور يوم الغسيل ، يمكنك الاعتماد على الأداء الفعال للمجفف
    الكهربائي. يحتوي سيرز على مجففات تناسب ديكور أي غرفة غسيل. من الفولاذ المقاوم للصدأ إلى تشطيبات الأونيكس ، يسهل تنسيق
    هذا الجهاز الأنيق مع الغسالة التي تختارها.
