- source_sentence: A Principal Physiotherapy Researcher is responsible for planning research projects related to physiotherapy
    and healthcare. S/He identifies potential research areas and designs research projects. S/He leads grant application processes
    to secure research resources and partners with external organisations for research projects. S/He serves as the principal
    investigator in research projects of her/his specialisation, assists in the publication of findings in peer reviewed journals
    and presents research at local and international conferences. S/He may work in various settings such as but not limited
    to public and private institutions, sports teams, acute hospitals, community hospitals, rehabilitation centres, voluntary
    welfare organisations, schools, integrated and long-term care facilities and clients homes and work environments. S/He
    may also work as part of a collaborative, interdisciplinary team which may include teachers, nurses, doctors, audiologists,
    psychologists, social workers, occupational therapists and speech therapists. S/He may collaborate with research institutions
    to advance her/his research. S/He should be analytical, inquisitive and innovative. S/He should possess time and project
    management skills.
  sentences:
  - The Principal Physiotherapy Researcher specializes in managing clinical physiotherapy operations within acute care hospitals.
    This role focuses primarily on supervising physiotherapy staff, coordinating patient treatment schedules, and ensuring
    adherence to clinical protocols. Responsibilities include overseeing daily therapy sessions, facilitating communication
    between therapists and medical teams, and maintaining compliance with healthcare regulations. The researcher does not
    engage in grant writing or research publication activities but instead emphasizes clinical service delivery, staff training,
    and quality assurance. Strong leadership, organizational, and interpersonal skills are required to optimize therapeutic
    outcomes and support hospital administration.
  - The Principal Physiotherapy Researcher leads the development and execution of physiotherapy and healthcare research initiatives.
    This role involves identifying key research opportunities, designing comprehensive studies, and spearheading grant applications
    to secure necessary funding. The researcher acts as the chief investigator on projects within their area of expertise,
    contributing to academic publications and disseminating findings at both national and international forums. Operating
    across diverse environments—including hospitals, rehabilitation centers, sports organizations, educational institutions,
    and community settings—the researcher collaborates with multidisciplinary teams comprising healthcare and social service
    professionals. Proficiency in analytical thinking, innovation, and effective project management is essential to successfully
    advance research objectives and foster partnerships with external research bodies.
  - The Engineer/Engineering Manager/Maintenance Manager utilises engineering expertise to oversee the operation and upkeep
    of machinery within food manufacturing processes. This role involves designing and implementing production lines for both
    new product launches and improvements to existing food production capacity. The incumbent stays current with technological
    advancements relevant to food processing and maintains strong relationships with equipment suppliers to support the organisation’s
    technical needs. Responsibilities include controlling production processes, ensuring the reliability and sustainability
    of plant equipment through capacity planning, resource management for maintenance activities, and making informed decisions
    on equipment upgrades or retirements. The role demands a strong command of high-speed production machinery, effective
    communication skills for team leadership, and an analytical approach to promptly address equipment issues while adhering
    strictly to food safety standards and Workplace Safety and Health regulations.
- source_sentence: The Senior Laboratory Chemist develops and validates new and improved test methods and establishes improved
    analytical techniques for the purpose of product testing and quality control. He/She liaises with government agencies,
    testing laboratories and external suppliers on matters relating to regulatory requirements, international standards and
    product specifications. He supports laboratory operations by validating the technical specifications of new laboratory
    equipment and providing guidance for the conduct of laboratory special projects. The Senior Laboratory Chemist ensures
    the compliance of laboratory activities with Workplace Safety and Health (WSH) and Environmental Management System (EMS)
    requirements, by reviewing laboratory safe work practices and Standard Operating Procedures (SOPs). He manages non-conformance
    by highlighting standard deviation and product failure data to the quality assurance team. He validates continuous improvement
    initiatives and activities for the laboratory, and provides coaching and mentoring to the laboratory team. The Senior
    Laboratory Chemist leads a team of chemists in the laboratory. He is able to multi-task, and possesses excellent analytical,
    communication and interpersonal skills.
  sentences:
  - The Gas Systems Operations Principal Engineer is responsible for overseeing the operational procedures of the system control
    center, gas transportation network, and gas market to ensure uninterrupted gas supply in compliance with applicable standards
    and protocols. This role leads comprehensive network analyses to assess natural gas capacities across various networks
    and determines bookable capacities for shippers. The engineer provides technical guidance on project requirements related
    to gas system operations and evaluates response strategies for resolving network abnormalities. Additionally, they supervise
    the technical accuracy of management reports concerning market operations, injection tolerances, and nomination variances,
    while defining load profiling methods for capacity certificates. They develop and implement technical training programs
    to enhance team capabilities and lead staff development initiatives. The role involves proposing emergency technical responses
    and recovery actions aligned with the crisis management framework, as well as assessing cyber incident severity to guide
    appropriate response measures, including vulnerability assessments and penetration testing. Operating within the control
    room environment, the engineer utilizes control panels, consoles, and computer systems to manage gas operations, occasionally
    performing rotating shifts to support 24/7 operations. Strong leadership and stakeholder engagement skills are essential,
    alongside a systematic and approachable demeanor for mentoring junior staff and ensuring effective emergency response
    and operational fault management.
  - The Senior Laboratory Chemist is responsible for developing and refining analytical methodologies to enhance product testing
    and quality assurance. This role involves coordinating with regulatory bodies, external labs, and vendors to ensure alignment
    with international standards and compliance requirements. The Senior Laboratory Chemist oversees the validation of new
    laboratory instruments and guides special technical projects within the lab. Ensuring adherence to Workplace Safety and
    Health (WSH) and Environmental Management System (EMS) policies, this professional reviews laboratory safety protocols
    and standard operating procedures. They monitor deviations and product failures, collaborating closely with the quality
    assurance team to address non-conformances. Additionally, the Senior Laboratory Chemist drives continuous improvement
    efforts, while mentoring and leading a team of chemists. Strong multitasking capabilities, along with excellent analytical,
    communication, and interpersonal skills, are essential for success in this position.
  - The Senior Quality Assurance Manager oversees the overall quality management system for manufacturing operations, focusing
    on compliance with industry regulations and customer requirements. This role directs cross-functional teams to implement
    quality improvement initiatives, manages supplier quality programs, and ensures that production processes meet established
    standards. The Senior Quality Assurance Manager is responsible for developing company-wide quality policies, conducting
    audits, and liaising with external certification bodies. Strong leadership, strategic planning, and risk management skills
    are required to maintain high-quality standards and support business objectives.
- source_sentence: The Producer - Broadcast leads the production of broadcast content by managing the production operations
    and budgets, providing creative direction to the production cast as well as overseeing post-production processes to lead
    the content to completion. He/She is responsible for ensuring the script readiness for production by collaborating with
    scriptwriters to develop the script in episodic series. He oversees the filming of the content and provides creative direction
    during filming. He manages the overall production operations, resolving issues and recommending solutions to improve the
    operations. He performs creative as well as management responsibilities and leads a team of roles responsible for the
    creative coordination and logistical management of production. In some instances, he is also responsible for hiring of
    the right cast for the production to enable the achievement of the creative vision of the production. The work involves
    leading projects or teams and provision of guidance to the production department in identifying projects with high customer
    and/or audience appeal and monetisation potential. He is expected to liaise with external and internal stakeholders. He
    should have a flair for translating an idea or story into the desired end product. He needs to have a pulse of the audience
    to understand the type of content would succeed and should therefore be produced. He also needs to be an expert project
    manager to deliver a project on time and within budget.
  sentences:
  - The Producer - Radio hosts live radio shows by engaging with listeners, curating music playlists, and coordinating on-air
    content schedules. This role requires excellent verbal communication skills and the ability to interact spontaneously
    with callers and guests. The Producer manages show timings, ensures compliance with broadcasting regulations specific
    to radio, and works closely with sound engineers to maintain audio quality. Unlike television broadcast production, this
    position focuses on audio-only content creation, requiring expertise in voice modulation and live audience engagement
    rather than visual storytelling or filming. The Producer also collaborates with marketing teams to promote radio programs
    and reaches out to sponsors for advertising partnerships. Strong organizational skills and adaptability are necessary
    to handle the dynamic nature of live radio broadcasting.
  - The Producer - Broadcast is responsible for overseeing the entire lifecycle of broadcast content production, including
    managing budgets, directing creative efforts with the cast, and supervising post-production activities to ensure the final
    product meets quality standards. This role involves close collaboration with scriptwriters to finalize scripts for episodic
    series and providing artistic guidance throughout filming. The Producer manages production operations, troubleshoots challenges,
    and implements improvements to streamline workflows. Leading a team that handles both creative coordination and logistical
    tasks, the Producer may also participate in casting decisions to align with the creative vision. Additionally, this position
    requires strong project leadership skills to identify content with high audience engagement and commercial potential,
    while maintaining effective communication with both internal teams and external partners. A keen understanding of audience
    preferences, coupled with expert project management abilities, is essential to deliver successful productions on schedule
    and within allocated budgets.
  - The Game Director leads the creative direction and overall vision of the game, encompassing gameplay mechanics, narrative,
    audio design, cinematics, and promotional content. Collaborating closely with senior team members, they help define the
    game concept and transform the client’s brief into a cohesive creative strategy. They oversee the integration of story,
    art, design, sound, and cinematic elements to ensure consistent quality and vision throughout production. Acting as the
    key creative decision-maker, the Game Director coordinates cross-departmental tasks and manages approvals during development
    phases. Their role requires strong leadership, excellent communication skills, and the ability to influence both internal
    teams and external partners to achieve a unified, impactful game experience.
- source_sentence: The Principal Engineer/Engineering Manager (Engineering Train) leads cross-functional teams in maintenance
    work involving engineering trains. He/She also applies technical expertise to improve maintenance regime, provide advice
    on engineering studies and new engineering initiatives, as well as the engagement and management of external contractors.
    He is required to carry out his duties at various train depots and workshops. He has excellent problem solving and analytical
    skills, and applies his managerial skills to lead his team to fulfil the responsibilities of operational and maintenance
    activities. He also facilitates the implementation of organisational maintenance regimes and continuous improvement initiatives.
  sentences:
  - The Senior Assistant Engineer/Assistant Engineer (Engineering Train) leads a team responsible for conducting both preventive
    and corrective maintenance on engineering trains. Proficient in operating calibration and diagnostic tools, this role
    also involves enhancing maintenance procedures and overseeing team performance to meet predefined Key Performance Indicators
    (KPIs). The position requires working on rotating shifts across multiple train depots and workshops. Demonstrating strong
    leadership and attention to detail, the engineer ensures strict adherence to workplace safety protocols and maintains
    an organized environment during maintenance operations.
  - The Principal Engineer/Project Manager (Rail Infrastructure) directs projects focused on the development and expansion
    of rail infrastructure systems. This position involves planning, budgeting, and supervising construction activities rather
    than maintenance operations. The role requires expertise in civil engineering design, contract negotiations, and stakeholder
    engagement with government agencies and contractors. The incumbent primarily works at construction sites and corporate
    offices, emphasizing project delivery timelines and regulatory compliance, without direct involvement in train maintenance
    or operational management.
  - The Principal Engineer/Engineering Manager (Engineering Train) oversees multidisciplinary teams responsible for the upkeep
    and servicing of engineering trains. This role demands the application of specialized technical knowledge to enhance maintenance
    procedures, offer guidance on engineering research and innovative projects, and coordinate with external contractors.
    The incumbent operates across multiple train depots and workshops, demonstrating strong analytical and problem-solving
    capabilities. Leadership acumen is essential to manage the team effectively in executing operational and maintenance tasks,
    while also driving the adoption of organizational maintenance standards and ongoing improvement programs.
- source_sentence: The Workshop Supervisor/Senior Foreman supervises multiple maintenance teams in performing scheduled as
    well as routine preventive and corrective maintenance of bus fleets. His/Her duties include planning and assigning maintenance
    teams according to schedule, allocating prioritised maintenance and redirecting resources to meet service requirements.
    He is also responsible for the deployment and coordination of bus breakdown recovery teams. He coordinates the implementation
    of maintenance, operations and safety audits across multiple maintenance teams, review maintenance performances as well
    as recommends improvement initiatives to achieve established Key Performance Indicators (KPIs). He is required to work
    in the bus workshop and/or depot environment based on rotating shifts. He possesses excellent supervision skills, takes
    a systematic approach to coordinate work activities across multiple maintenance teams, and is resourceful to achieve maintenance
    targets and requirements.
  sentences:
  - The Harbour Pilot is responsible for guiding vessels safely into and out of the port, coordinating berthing operations,
    and ensuring compliance with all maritime safety regulations and emergency procedures. This role requires a valid Harbour
    Pilot Licence from the Flag State authority and passing a colour vision assessment. The Harbour Pilot must demonstrate
    strong analytical skills, excellent organisational abilities, and effectively liaise with various port personnel to maintain
    smooth and secure vessel navigation.
  - The Workshop Planner coordinates the procurement and inventory management of spare parts for bus maintenance but does
    not supervise maintenance teams. This role focuses on forecasting parts requirements, liaising with suppliers, and managing
    stock levels to prevent service disruptions. Unlike supervisory positions, the planner operates primarily in an office
    environment, supporting workshop operations through logistical and administrative tasks rather than direct team management
    or on-site maintenance activities.
  - The Workshop Supervisor/Senior Foreman oversees several maintenance crews responsible for both planned and reactive upkeep
    of bus fleets. This role involves organizing and dispatching teams following maintenance schedules, prioritizing tasks,
    and reallocating resources to ensure service continuity. Additionally, the supervisor manages breakdown recovery operations
    and facilitates maintenance, operational, and safety audits across various teams. They evaluate maintenance outcomes and
    suggest improvements to meet defined Key Performance Indicators (KPIs). The position requires presence in bus workshops
    or depots, often on rotating shifts, and demands strong leadership abilities, methodical coordination skills, and resourcefulness
    to fulfill maintenance objectives.
