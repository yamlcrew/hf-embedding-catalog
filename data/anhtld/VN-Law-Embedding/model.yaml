- source_sentence: '{"question": "Công việc cấp bách do hỏa hoạn có được phép làm thêm đến 300 giờ không?"}'
  sentences:
  - "Chào bạn,\n\nTheo quy định của pháp luật lao động Việt Nam, **có thể** công việc cấp bách do hỏa hoạn được phép làm thêm\
    \ đến 300 giờ trong một năm, nhưng **không phải là tự động và cần tuân thủ các điều kiện nhất định**.\n\n**Căn cứ pháp\
    \ lý:**\n\n* **Điều 107 Bộ luật Lao động 2019** quy định về làm thêm giờ, trong đó có các trường hợp được làm thêm giờ\
    \ vượt quá 200 giờ/năm.\n* **Khoản 2 Điều 107 Bộ luật Lao động 2019** quy định:  Người sử dụng lao động được sử dụng người\
    \ lao động làm thêm giờ khi đáp ứng đầy đủ các yêu cầu sau đây:\n    * Được sự đồng ý của người lao động.\n    * Bảo đảm\
    \ số giờ làm thêm của người lao động không quá 50% số giờ làm việc bình thường trong 01 ngày; trường hợp áp dụng quy định\
    \ làm việc theo tuần thì tổng số giờ làm việc bình thường và số giờ làm thêm không quá 12 giờ trong 01 ngày; không quá\
    \ 30 giờ trong 01 tháng và **tổng số không quá 200 giờ trong 01 năm**, trừ trường hợp quy định tại khoản 3 Điều này.\n\
    * **Khoản 3 Điều 107 Bộ luật Lao động 2019** quy định các trường hợp được làm thêm giờ **từ trên 200 giờ đến 300 giờ trong\
    \ một năm**:\n    * Sản xuất, gia công hàng xuất khẩu theo đơn đặt hàng theo mùa;\n    * Gia công, chế biến nông, lâm,\
    \ diêm nghiệp, thủy sản;\n    * **Thực hiện công việc trong trường hợp có tính chất thời vụ, công việc gia công hàng xuất\
    \ khẩu và cần phải giải quyết công việc cấp bách không thể trì hoãn.**\n\n**Phân tích và giải thích:**\n\n* **\"Công việc\
    \ cấp bách do hỏa hoạn\"** có thể được xem là thuộc trường hợp **\"cần phải giải quyết công việc cấp bách không thể trì\
    \ hoãn\"** quy định tại Khoản 3 Điều 107.  Ví dụ:\n    * **Chữa cháy:**  Đây là công việc cấp bách, không thể trì hoãn\
    \ để bảo vệ tính mạng, sức khỏe và tài sản.\n    * **Khắc phục hậu quả hỏa hoạn:** Dọn dẹp, sửa chữa khẩn cấp để sớm ổn\
    \ định sản xuất, kinh doanh hoặc sinh hoạt cũng có thể được xem là công việc cấp bách.\n* **Không phải tự động được làm\
    \ thêm 300 giờ:** Việc được làm thêm giờ đến 300 giờ không phải là quyền mặc định khi có hỏa hoạn.  Doanh nghiệp vẫn phải:\n\
    \    * **Được sự đồng ý của người lao động:**  Người lao động có quyền từ chối làm thêm giờ.\n    * **Đảm bảo các giới\
    \ hạn khác:**  Mặc dù được phép làm thêm đến 300 giờ/năm, nhưng vẫn phải tuân thủ các giới hạn khác về làm thêm giờ trong\
    \ ngày, trong tháng (như đã nêu ở Khoản 2 Điều 107).\n    * **Trả lương làm thêm giờ theo quy định:**  Việc làm thêm giờ\
    \ phải được trả lương theo đúng quy định của pháp luật (tính theo hệ số lương làm thêm giờ).\n    * **Chứng minh được\
    \ tính chất cấp bách:** Doanh nghiệp cần chứng minh được công việc thực sự là cấp bách, không thể trì hoãn do hỏa hoạn\
    \ gây ra, và việc làm thêm giờ là cần thiết để giải quyết tình huống đó.\n\n**Tóm lại:**\n\nCông việc cấp bách do hỏa\
    \ hoạn **có thể** được phép làm thêm đến 300 giờ trong một năm, nhưng phải đáp ứng các điều kiện sau:\n\n1. **Công việc\
    \ thực sự cấp bách và không thể trì hoãn do hỏa hoạn gây ra.**\n2. **Được sự đồng ý của người lao động.**\n3. **Tuân thủ\
    \ các giới hạn khác về làm thêm giờ trong ngày, trong tháng (dù được phép vượt quá 200 giờ/năm).**\n4. **Trả lương làm\
    \ thêm giờ đầy đủ theo quy định.**\n\n**Lưu ý quan trọng:**\n\n* **Đây là quy định chung của pháp luật lao động.**  Trong\
    \ thực tế, việc áp dụng có thể phụ thuộc vào tình huống cụ thể, ngành nghề, và thỏa ước lao động tập thể (nếu có).\n*\
    \ **Để đảm bảo tuân thủ đúng pháp luật, doanh nghiệp nên tham khảo ý kiến của cơ quan quản lý lao động địa phương hoặc\
    \ chuyên gia pháp lý.**\n\nHy vọng giải thích này rõ ràng và hữu ích cho bạn!"
  - 'Có một số cách ghi địa điểm làm việc khi người lao động làm việc tại nhà, tùy thuộc vào mức độ cụ thể và thỏa thuận giữa
    người lao động và người sử dụng lao động. Dưới đây là một số gợi ý phổ biến:


    **1. Ghi địa điểm làm việc cụ thể:**


    * **Cách ghi:** "Địa điểm làm việc: Tại nhà riêng của Người lao động, địa chỉ: [Địa chỉ cụ thể của người lao động]."


    * **Ưu điểm:** Rõ ràng, chính xác, xác định cụ thể nơi làm việc là nhà riêng của người lao động. Điều này có thể quan
    trọng cho các vấn đề liên quan đến bảo hiểm tai nạn lao động (nếu có tai nạn xảy ra tại nhà trong giờ làm việc).


    * **Nhược điểm:**  Có thể ít linh hoạt nếu người lao động đôi khi làm việc ở địa điểm khác (ví dụ quán cà phê, co-working
    space).


    **2. Ghi địa điểm làm việc linh hoạt:**


    * **Cách ghi:** "Địa điểm làm việc: Làm việc từ xa tại địa điểm do Người lao động lựa chọn, ưu tiên tại nhà riêng."  hoặc
    "Địa điểm làm việc: Linh hoạt, tại bất kỳ địa điểm nào phù hợp với công việc, bao gồm nhưng không giới hạn tại nhà riêng
    của Người lao động."


    * **Ưu điểm:**  Linh hoạt hơn, cho phép người lao động làm việc ở nhiều địa điểm khác nhau mà không cần sửa đổi hợp đồng.
    Phản ánh đúng bản chất làm việc từ xa là sự linh hoạt về địa điểm.


    * **Nhược điểm:**  Ít cụ thể hơn, có thể không phù hợp nếu công ty muốn kiểm soát địa điểm làm việc hoặc có các quy định
    cụ thể về nơi làm việc.


    **3. Ghi địa điểm làm việc kết hợp:**


    * **Cách ghi:** "Địa điểm làm việc: Địa điểm chính là tại nhà riêng của Người lao động, địa chỉ: [Địa chỉ cụ thể của người
    lao động].  Ngoài ra, Người lao động có thể làm việc tại [Địa điểm khác, ví dụ: văn phòng công ty, địa điểm khác được
    thỏa thuận]."


    * **Ưu điểm:** Kết hợp được sự cụ thể của địa chỉ nhà riêng và sự linh hoạt khi làm việc ở các địa điểm khác. Phù hợp
    cho các trường hợp làm việc hybrid (vừa tại nhà vừa tại văn phòng).


    * **Nhược điểm:**  Cần xác định rõ "địa điểm khác được thỏa thuận" là gì để tránh hiểu lầm.


    **Lưu ý quan trọng khi ghi địa điểm làm việc tại nhà:**


    * **Thỏa thuận rõ ràng:**  Điều quan trọng nhất là sự thỏa thuận rõ ràng giữa người lao động và người sử dụng lao động
    về địa điểm làm việc. Ghi rõ ràng trong hợp đồng lao động hoặc phụ lục hợp đồng.

    * **Chính sách công ty:**  Tham khảo chính sách làm việc từ xa của công ty (nếu có) để đảm bảo cách ghi phù hợp với quy
    định của công ty.

    * **Tính pháp lý:**  Mặc dù làm việc tại nhà ngày càng phổ biến, pháp luật lao động có thể chưa có quy định cụ thể về
    địa điểm làm việc tại nhà. Nên ưu tiên sự rõ ràng và thỏa thuận để tránh tranh chấp sau này.

    * **Bảo hiểm:**  Xem xét các vấn đề liên quan đến bảo hiểm tai nạn lao động khi làm việc tại nhà. Cách ghi địa điểm có
    thể ảnh hưởng đến việc giải quyết các vấn đề bảo hiểm (dù thực tế việc làm việc tại nhà vẫn được xem là địa điểm làm việc).


    **Tóm lại:**


    Không có một cách ghi địa điểm làm việc tại nhà nào là "đúng" tuyệt đối.  Cách ghi phù hợp nhất phụ thuộc vào:


    * **Mức độ linh hoạt mà công ty và người lao động mong muốn.**

    * **Chính sách làm việc từ xa của công ty.**

    * **Mục đích và ý nghĩa của việc ghi địa điểm làm việc (ví dụ: bảo hiểm, kiểm soát).**


    **Lời khuyên:** Nên lựa chọn cách ghi rõ ràng, cụ thể nhất có thể, đồng thời đảm bảo sự linh hoạt cần thiết và tuân thủ
    các quy định của công ty cũng như pháp luật hiện hành.  Tốt nhất là nên có sự thảo luận và thống nhất giữa người lao động
    và người sử dụng lao động trước khi ghi vào hợp đồng.'
  - '{"answer":"Có, có giới hạn thời gian thử việc đối với người lao động giao kết hợp đồng lao động có thời hạn trên 01 tháng.


    **Căn cứ theo Điều 25 Bộ luật Lao động 2019**, thời gian thử việc do hai bên thỏa thuận căn cứ vào tính chất và mức độ
    phức tạp của công việc nhưng chỉ được thử việc một lần đối với một công việc và bảo đảm điều kiện sau đây:


    * **Không quá 06 ngày** đối với công việc có yêu cầu trình độ kỹ năng nghề bậc thấp.

    * **Không quá 30 ngày** đối với công việc có yêu cầu trình độ kỹ năng nghề trung cấp, công nhân kỹ thuật, nhân viên nghiệp
    vụ.

    * **Không quá 60 ngày** đối với công việc có yêu cầu trình độ kỹ năng nghề cao đẳng trở lên.

    * **Đối với công việc của người quản lý doanh nghiệp theo quy định của Luật Doanh nghiệp, Luật Quản lý, sử dụng vốn nhà
    nước đầu tư vào sản xuất, kinh doanh tại doanh nghiệp thì thời gian thử việc không quá 180 ngày.**


    **Như vậy, đối với hợp đồng lao động có thời hạn trên 01 tháng, giới hạn thời gian thử việc vẫn được áp dụng và phụ thuộc
    vào tính chất công việc:**


    * **Công việc đơn giản, bậc thấp:** Tối đa 6 ngày.

    * **Công việc trung cấp, nhân viên nghiệp vụ:** Tối đa 30 ngày.

    * **Công việc cao đẳng trở lên:** Tối đa 60 ngày.

    * **Công việc quản lý:** Tối đa 180 ngày.


    **Lưu ý quan trọng:**


    * **Thỏa thuận:** Thời gian thử việc phải được thỏa thuận giữa người sử dụng lao động và người lao động.

    * **Một lần thử việc:** Chỉ được thử việc một lần cho một công việc cụ thể.

    * **Hợp đồng thử việc:** Có thể giao kết hợp đồng thử việc hoặc thỏa thuận về nội dung thử việc trong hợp đồng lao động.


    **Tóm lại, dù là hợp đồng lao động có thời hạn trên 01 tháng, vẫn phải tuân thủ các quy định về giới hạn thời gian thử
    việc theo Bộ luật Lao động 2019, dựa trên tính chất và yêu cầu kỹ năng của công việc.**"}'
- source_sentence: '{"question": "Người sử dụng lao động có thể yêu cầu người lao động làm thêm giờ mà không cần bảo vệ sức
    khỏe?"}'
  sentences:
  - "Theo quy định của pháp luật Việt Nam hiện hành, **người nước ngoài muốn làm việc hợp pháp tại Việt Nam thì thường phải\
    \ có giấy phép lao động.**\n\n**Tuy nhiên, có một số trường hợp ngoại lệ mà người nước ngoài được phép làm việc tại Việt\
    \ Nam mà không cần giấy phép lao động.**  Những trường hợp này được quy định cụ thể trong Luật Lao động và các văn bản\
    \ hướng dẫn thi hành.\n\n**Nói chung, nếu người nước ngoài làm việc tại Việt Nam mà không có giấy phép lao động (khi thuộc\
    \ diện phải có) là hành vi vi phạm pháp luật.**  Hậu quả có thể bao gồm:\n\n* **Đối với người lao động nước ngoài:**\n\
    \    * Bị phạt tiền.\n    * Bị trục xuất khỏi Việt Nam.\n    * Gặp khó khăn trong việc xin visa và giấy phép lao động\
    \ trong tương lai.\n\n* **Đối với người sử dụng lao động (doanh nghiệp, tổ chức tuyển dụng):**\n    * Bị phạt tiền.\n\
    \    * Bị đình chỉ hoạt động một phần hoặc toàn bộ.\n    * Gặp các vấn đề pháp lý khác.\n\n**Các trường hợp người nước\
    \ ngoài được miễn giấy phép lao động (theo quy định hiện hành, có thể thay đổi theo thời gian, nên cần kiểm tra văn bản\
    \ pháp luật mới nhất):**\n\n* **Làm việc dưới 3 tháng:**  Nếu thời gian làm việc tại Việt Nam dưới 3 tháng.\n* **Chủ sở\
    \ hữu hoặc thành viên góp vốn:** Là chủ sở hữu hoặc thành viên góp vốn của công ty trách nhiệm hữu hạn.\n* **Chủ tịch\
    \ Hội đồng thành viên hoặc Chủ tịch Hội đồng quản trị:**  Của công ty cổ phần.\n* **Nhà quản lý, giám đốc điều hành, chuyên\
    \ gia, lao động kỹ thuật:**  Trong một số trường hợp cụ thể được quy định (ví dụ: làm việc trong các dự án ODA, dự án\
    \ quan trọng quốc gia, ...) và được cơ quan có thẩm quyền xác nhận.\n* **Di chuyển nội bộ doanh nghiệp:**  Được cử sang\
    \ Việt Nam làm việc theo hình thức di chuyển nội bộ doanh nghiệp trong phạm vi 11 ngành dịch vụ trong biểu cam kết dịch\
    \ vụ của Việt Nam với WTO.\n* **Kết hôn với người Việt Nam:**  Là vợ/chồng của công dân Việt Nam và sinh sống tại Việt\
    \ Nam.\n* **Học sinh, sinh viên:**  Học tập tại Việt Nam.\n* **Tình nguyện viên:**  Làm việc cho các tổ chức phi chính\
    \ phủ, tổ chức quốc tế tại Việt Nam.\n* **Người lao động nước ngoài vào làm việc tại vị trí chuyên gia, nhà quản lý, giám\
    \ đốc điều hành hoặc lao động kỹ thuật có thời gian làm việc dưới 30 ngày và tổng thời gian không quá 03 tháng trong 01\
    \ năm.**\n* **Các trường hợp khác theo quy định của pháp luật.**\n\n**Để chắc chắn về trường hợp cụ thể của mình, người\
    \ nước ngoài và người sử dụng lao động nên:**\n\n* **Tham khảo Luật Lao động Việt Nam và các văn bản hướng dẫn thi hành\
    \ hiện hành.**\n* **Liên hệ với cơ quan quản lý nhà nước về lao động (Sở Lao động - Thương binh và Xã hội) để được tư\
    \ vấn cụ thể.**\n* **Tìm hiểu thông tin trên các trang web chính thức của chính phủ Việt Nam về lao động và việc làm.**\n\
    \n**Tóm lại:**  **Thông thường, người nước ngoài cần có giấy phép lao động để làm việc hợp pháp tại Việt Nam. Tuy nhiên,\
    \ có một số trường hợp được miễn giấy phép lao động.  Việc làm việc mà không có giấy phép lao động khi không thuộc trường\
    \ hợp miễn là vi phạm pháp luật và có thể dẫn đến hậu quả pháp lý.**  Do đó, việc tuân thủ pháp luật lao động Việt Nam\
    \ là rất quan trọng."
  - "Không, **người sử dụng lao động không thể yêu cầu người lao động làm thêm giờ mà không cần bảo vệ sức khỏe**.  Đây là\
    \ một hành vi vi phạm pháp luật lao động và đạo đức kinh doanh.\n\nDưới đây là các lý do chi tiết:\n\n* **Luật Lao động\
    \ Việt Nam quy định rõ về làm thêm giờ và bảo vệ sức khỏe người lao động:**\n    * **Điều 107, Bộ luật Lao động 2019**\
    \ quy định về làm thêm giờ, trong đó nhấn mạnh việc **bảo đảm số giờ làm việc thêm của người lao động không quá 50% số\
    \ giờ làm việc bình thường trong 01 ngày; trường hợp áp dụng quy định làm việc theo tuần thì tổng số giờ làm việc bình\
    \ thường và số giờ làm thêm không quá 12 giờ trong 01 ngày; không quá 40 giờ trong 01 tháng; bảo đảm số giờ làm thêm của\
    \ người lao động không quá 200 giờ trong 01 năm, trừ trường hợp quy định tại khoản 3 Điều này, và không quá 300 giờ trong\
    \ 01 năm đối với một số trường hợp đặc biệt.**\n    * **Điều 109, Bộ luật Lao động 2019** quy định về **nghỉ trong giờ\
    \ làm việc**, bao gồm cả việc nghỉ ngơi ngắn giữa giờ làm việc và nghỉ ăn giữa ca, đảm bảo người lao động có thời gian\
    \ phục hồi sức khỏe.\n    * **Điều 110, Bộ luật Lao động 2019** quy định về **nghỉ hàng tuần**, đảm bảo người lao động\
    \ có thời gian nghỉ ngơi dài hơn để phục hồi sức khỏe sau một tuần làm việc.\n    * **Điều 111, Bộ luật Lao động 2019**\
    \ quy định về **nghỉ lễ, tết**, đây cũng là thời gian nghỉ ngơi quan trọng cho người lao động.\n    * **Các quy định về\
    \ an toàn, vệ sinh lao động** cũng là một phần quan trọng của việc bảo vệ sức khỏe người lao động, và phải được đảm bảo\
    \ ngay cả khi làm thêm giờ.\n\n* **Trách nhiệm của người sử dụng lao động:** Người sử dụng lao động có trách nhiệm **bảo\
    \ đảm điều kiện làm việc an toàn, vệ sinh lao động, phòng chống cháy nổ; trang bị đầy đủ phương tiện bảo hộ lao động;\
    \ tổ chức khám sức khỏe định kỳ; thực hiện các biện pháp phòng ngừa tai nạn lao động, bệnh nghề nghiệp; bồi dưỡng bằng\
    \ hiện vật cho người lao động làm các công việc nặng nhọc, độc hại, nguy hiểm.**  Những trách nhiệm này không hề bị loại\
    \ bỏ khi người lao động làm thêm giờ, mà thậm chí còn trở nên quan trọng hơn do người lao động có thể mệt mỏi hơn và dễ\
    \ bị tổn thương hơn.\n\n* **Hậu quả pháp lý:** Nếu người sử dụng lao động vi phạm các quy định về làm thêm giờ và không\
    \ bảo vệ sức khỏe người lao động, họ có thể bị **xử phạt hành chính** theo quy định của pháp luật. Nghiêm trọng hơn, nếu\
    \ hành vi này gây ra **thiệt hại nghiêm trọng đến sức khỏe hoặc tính mạng người lao động**, người sử dụng lao động có\
    \ thể bị **truy cứu trách nhiệm hình sự**.\n\n**Tóm lại:**\n\nNgười sử dụng lao động **bắt buộc phải bảo vệ sức khỏe người\
    \ lao động** trong mọi trường hợp, bao gồm cả khi người lao động làm thêm giờ. Việc yêu cầu làm thêm giờ mà không quan\
    \ tâm đến sức khỏe người lao động là **vi phạm pháp luật và đạo đức**, và có thể dẫn đến những hậu quả tiêu cực cho cả\
    \ người sử dụng lao động và người lao động.\n\n**Nếu bạn là người lao động và cảm thấy quyền lợi của mình bị xâm phạm,\
    \ bạn có thể:**\n\n* **Trao đổi trực tiếp với người sử dụng lao động** để giải quyết vấn đề.\n* **Khiếu nại đến công đoàn\
    \ cơ sở (nếu có) hoặc Liên đoàn Lao động cấp trên.**\n* **Khiếu nại đến cơ quan quản lý nhà nước về lao động (Sở Lao động\
    \ - Thương binh và Xã hội).**\n* **Khởi kiện ra tòa án** để bảo vệ quyền lợi hợp pháp của mình.\n\nHãy luôn bảo vệ sức\
    \ khỏe của bạn và đòi hỏi quyền lợi chính đáng của mình theo pháp luật!"
  - "Câu hỏi của bạn liên quan đến trách nhiệm xác định mức độ thiệt hại trong trường hợp người lao động có lỗi nhưng thiệt\
    \ hại không rõ ràng, trong bối cảnh luật lao động Việt Nam. Dưới đây là phân tích chi tiết để bạn hiểu rõ hơn:\n\n**Theo\
    \ quy định của pháp luật lao động Việt Nam (đặc biệt là Bộ luật Lao động), trách nhiệm xác định mức độ thiệt hại trong\
    \ trường hợp người lao động có lỗi nhưng thiệt hại không rõ ràng sẽ thuộc về:**\n\n**1. Người sử dụng lao động (NSDLĐ):**\n\
    \n* **Trách nhiệm ban đầu và chính:** NSDLĐ là người chịu thiệt hại trực tiếp và là người có trách nhiệm ban đầu trong\
    \ việc xác định mức độ thiệt hại.  Họ phải tiến hành các bước để làm rõ thiệt hại và đánh giá mức độ ảnh hưởng.\n* **Căn\
    \ cứ xác định:** NSDLĐ sẽ dựa trên các yếu tố sau để xác định thiệt hại:\n    * **Bằng chứng về lỗi của người lao động:**\
    \  Phải có bằng chứng chứng minh người lao động có hành vi vi phạm nội quy lao động, quy định của công ty hoặc các hành\
    \ vi khác dẫn đến thiệt hại.\n    * **Các tài liệu, chứng cứ liên quan đến thiệt hại:** Ví dụ như biên bản kiểm kê, báo\
    \ cáo thiệt hại, hóa đơn sửa chữa, chứng từ liên quan đến chi phí khắc phục hậu quả, v.v.\n    * **Đánh giá thực tế thiệt\
    \ hại:**  Nếu thiệt hại không rõ ràng về mặt định lượng (ví dụ thiệt hại về uy tín, gián đoạn sản xuất), NSDLĐ cần cố\
    \ gắng đánh giá một cách hợp lý nhất có thể, dựa trên các thông tin và dữ liệu có sẵn.\n* **Quy trình xác định:**  NSDLĐ\
    \ cần thực hiện quy trình xác định thiệt hại một cách minh bạch, khách quan và có sự tham gia của các bên liên quan (nếu\
    \ có thể, như đại diện tập thể lao động).\n\n**2. Đại diện tập thể lao động (Công đoàn cơ sở hoặc Ban chấp hành công đoàn\
    \ lâm thời):**\n\n* **Vai trò giám sát và bảo vệ quyền lợi người lao động:**  Nếu tại đơn vị có tổ chức công đoàn, đại\
    \ diện tập thể lao động có quyền và trách nhiệm tham gia vào quá trình xác định mức độ thiệt hại để đảm bảo quyền lợi\
    \ của người lao động được bảo vệ.\n* **Tham gia ý kiến:** Đại diện tập thể lao động có thể đưa ra ý kiến phản biện, yêu\
    \ cầu NSDLĐ cung cấp thêm thông tin, giải thích rõ ràng về cách xác định thiệt hại. Họ cũng có thể đề xuất các phương\
    \ án khác nếu thấy cách xác định của NSDLĐ không hợp lý hoặc không công bằng.\n\n**3. Cơ quan có thẩm quyền (Thanh tra\
    \ lao động, Tòa án):**\n\n* **Khi có tranh chấp:** Nếu người lao động không đồng ý với mức độ thiệt hại mà NSDLĐ xác định,\
    \ hoặc có tranh chấp về trách nhiệm bồi thường thiệt hại, các bên có thể đưa vụ việc đến cơ quan có thẩm quyền để giải\
    \ quyết.\n* **Thanh tra lao động:** Có thể vào cuộc để hòa giải, kiểm tra quá trình xác định thiệt hại của NSDLĐ và đưa\
    \ ra khuyến nghị hoặc kết luận.\n* **Tòa án:**  Là cơ quan có thẩm quyền cuối cùng giải quyết tranh chấp lao động. Tòa\
    \ án sẽ xem xét toàn bộ hồ sơ, chứng cứ, nghe ý kiến của các bên và đưa ra phán quyết cuối cùng về mức độ thiệt hại và\
    \ trách nhiệm bồi thường. Trong trường hợp thiệt hại không rõ ràng, Tòa án có thể yêu cầu giám định để làm rõ.\n\n**Tóm\
    \ lại, quy trình chung sẽ là:**\n\n1. **NSDLĐ phát hiện lỗi của người lao động và nghi ngờ có thiệt hại.**\n2. **NSDLĐ\
    \ tiến hành thu thập chứng cứ, tài liệu để xác định lỗi và thiệt hại.**\n3. **NSDLĐ đánh giá và xác định mức độ thiệt\
    \ hại (dựa trên các căn cứ hợp lý).**\n4. **Thông báo cho người lao động về mức độ thiệt hại và yêu cầu bồi thường (nếu\
    \ có).**\n5. **Trao đổi, thương lượng với người lao động (và đại diện tập thể lao động nếu có) về mức độ thiệt hại và\
    \ phương án bồi thường.**\n6. **Nếu không thống nhất, có thể đưa ra cơ quan hòa giải lao động, Thanh tra lao động hoặc\
    \ Tòa án để giải quyết.**\n\n**Lưu ý quan trọng:**\n\n* **Tính minh bạch và khách quan:** Quá trình xác định thiệt hại\
    \ cần đảm bảo tính minh bạch, khách quan, công bằng và có căn cứ rõ ràng. Tránh việc NSDLĐ tự ý áp đặt mức độ thiệt hại\
    \ mà không có cơ sở.\n* **Bảo vệ quyền lợi người lao động:** Pháp luật lao động luôn hướng đến việc bảo vệ quyền lợi của\
    \ người lao động. Do đó, quá trình xác định thiệt hại và yêu cầu bồi thường phải tuân thủ các quy định pháp luật, đảm\
    \ bảo người lao động không bị lợi dụng hoặc đối xử bất công.\n* **Mức độ bồi thường:**  Mức độ bồi thường thiệt hại của\
    \ người lao động thường sẽ giới hạn ở mức độ thiệt hại thực tế và không quá nặng nề so với lỗi của người lao động và khả\
    \ năng tài chính của họ.\n\n**Trong trường hợp thiệt hại \"không rõ ràng\", việc xác định sẽ càng phức tạp và cần sự thận\
    \ trọng, tỉ mỉ hơn.** NSDLĐ cần cố gắng thu thập càng nhiều thông tin, chứng cứ càng tốt để có thể đưa ra một đánh giá\
    \ hợp lý nhất.  Việc tham khảo ý kiến của các chuyên gia (nếu cần) hoặc đại diện tập thể lao động cũng là một cách để\
    \ đảm bảo tính khách quan và công bằng."
- source_sentence: '{"question": "Có được phép cho người lao động 17 tuổi làm công việc nâng vật nặng không?"}'
  sentences:
  - "Chào bạn,\n\nVới thông tin bạn cung cấp, **công nhân này có khả năng cao là đủ điều kiện hưởng lương hưu**. Tuy nhiên,\
    \ để xác định chính xác, cần xem xét thêm một số yếu tố.\n\nDưới đây là phân tích chi tiết dựa trên Luật Bảo hiểm xã hội\
    \ hiện hành của Việt Nam:\n\n**Các điều kiện hưởng lương hưu đối với trường hợp nghỉ hưu trước tuổi do suy giảm khả năng\
    \ lao động (nghề nặng nhọc, độc hại, nguy hiểm):**\n\nTheo quy định hiện hành (Luật Bảo hiểm xã hội và các văn bản hướng\
    \ dẫn), người lao động làm nghề nặng nhọc, độc hại, nguy hiểm được nghỉ hưu sớm hơn tuổi quy định nếu đáp ứng các điều\
    \ kiện sau:\n\n1. **Tuổi nghỉ hưu:**  Đối với nam, tuổi nghỉ hưu thông thường năm 2023 là 60 tuổi 9 tháng và đang dần\
    \ tăng lên theo lộ trình. Tuy nhiên, **người làm nghề nặng nhọc, độc hại, nguy hiểm có thể được nghỉ hưu sớm hơn tối đa\
    \ 5 năm so với tuổi quy định**.  Như vậy, **ở tuổi 60, người công nhân này đã đạt tuổi nghỉ hưu hoặc thậm chí vượt quá\
    \ tuổi nghỉ hưu sớm**.\n\n2. **Thời gian đóng bảo hiểm xã hội:**  **Ít nhất 20 năm đóng bảo hiểm xã hội**. Người công\
    \ nhân này đã có **23 năm đóng bảo hiểm xã hội**, **đáp ứng điều kiện này**.\n\n3. **Suy giảm khả năng lao động:**  **Phải\
    \ thuộc một trong các trường hợp sau:**\n    * **Suy giảm khả năng lao động từ 61% trở lên.**\n    * **Suy giảm khả năng\
    \ lao động từ 81% trở lên và có đủ 15 năm làm nghề hoặc công việc đặc biệt nặng nhọc, độc hại, nguy hiểm.**\n    * **Suy\
    \ giảm khả năng lao động từ 61% trở lên và có đủ 15 năm làm việc ở nơi có phụ cấp khu vực hệ số 0,7 trở lên trước ngày\
    \ 01/01/2021.**\n\n**Trong trường hợp của bạn:**\n\n* **Tuổi:** 60 tuổi, đủ điều kiện về tuổi nghỉ hưu sớm.\n* **Thời\
    \ gian đóng BHXH:** 23 năm, đủ điều kiện về thời gian đóng BHXH.\n* **Nghề nặng nhọc:**  Bạn đã nêu rõ là \"nghề nặng\
    \ nhọc\".  Điều này là yếu tố quan trọng.\n\n**Để xác định chính xác có đủ điều kiện hay không, cần làm rõ:**\n\n* **Loại\
    \ nghề nặng nhọc, độc hại, nguy hiểm cụ thể:**  Cần xác định rõ công việc của người công nhân này có thuộc danh mục nghề,\
    \ công việc nặng nhọc, độc hại, nguy hiểm do Bộ Lao động - Thương binh và Xã hội quy định hay không.\n* **Mức độ suy giảm\
    \ khả năng lao động:**  **Đây là yếu tố quan trọng nhất.** Để được nghỉ hưu sớm do nghề nặng nhọc, độc hại, nguy hiểm,\
    \ người công nhân **cần phải được Hội đồng Giám định Y khoa kết luận bị suy giảm khả năng lao động theo các mức độ quy\
    \ định (như đã nêu ở trên)**.\n\n**Kết luận:**\n\n**Với các thông tin bạn cung cấp, người công nhân này có khả năng rất\
    \ cao là đủ điều kiện hưởng lương hưu do nghỉ hưu trước tuổi vì làm nghề nặng nhọc, độc hại, nguy hiểm.**\n\n**Để chắc\
    \ chắn, người công nhân nên:**\n\n1. **Xác định rõ nghề nghiệp của mình có thuộc danh mục nghề nặng nhọc, độc hại, nguy\
    \ hiểm hay không.** Có thể tra cứu danh mục này trên website của Bộ Lao động - Thương binh và Xã hội hoặc hỏi cán bộ phụ\
    \ trách BHXH tại công ty/đơn vị.\n2. **Đi giám định sức khỏe để xác định mức độ suy giảm khả năng lao động.**  Cơ quan\
    \ BHXH sẽ hướng dẫn thủ tục giám định sức khỏe.\n3. **Liên hệ với cơ quan Bảo hiểm xã hội nơi mình cư trú để được tư vấn\
    \ và hướng dẫn cụ thể về thủ tục hưởng lương hưu.**\n\n**Tóm lại, khả năng đủ điều kiện là rất cao, nhưng cần hoàn tất\
    \ các thủ tục xác nhận để đảm bảo quyền lợi của người lao động.**\n\nChúc bạn và người công nhân sớm có kết quả tốt đẹp!"
  - 'Về mặt pháp lý, **không thể chỉ trả 200% lương cho làm thêm giờ vào ngày lễ ngay cả khi người lao động đồng ý.**


    Luật Lao động Việt Nam quy định rất rõ về mức lương làm thêm giờ, đặc biệt là vào ngày lễ, Tết. Cụ thể:


    **Theo Điều 98 Bộ luật Lao động 2019:**


    * **Làm thêm giờ vào ngày thường:** Được trả ít nhất bằng 150% tiền lương giờ bình thường.

    * **Làm thêm giờ vào ngày nghỉ hằng tuần:** Được trả ít nhất bằng 200% tiền lương giờ bình thường.

    * **Làm thêm giờ vào ngày nghỉ lễ, Tết, ngày nghỉ có hưởng lương:** Được trả ít nhất bằng **300%** tiền lương giờ bình
    thường.


    **Như vậy, mức lương tối thiểu khi làm thêm giờ vào ngày lễ, Tết là 300%**, chứ không phải 200%.


    **Giải thích rõ hơn:**


    * **100%:**  Tiền lương cho ngày làm việc bình thường (bạn vẫn được trả lương cho ngày nghỉ lễ đó như bình thường).

    * **200%:**  Tiền lương làm thêm giờ vào ngày lễ (bù đắp cho việc bạn phải làm việc vào ngày nghỉ lễ).


    **Tổng cộng là 300%**.


    **Về việc "người lao động đồng ý":**


    * **Sự đồng ý của người lao động là cần thiết để làm thêm giờ.**  Người sử dụng lao động không thể ép buộc người lao động
    làm thêm giờ, trừ một số trường hợp đặc biệt được quy định trong luật.

    * **Tuy nhiên, sự đồng ý của người lao động không có nghĩa là họ có thể "đồng ý" nhận mức lương thấp hơn mức tối thiểu
    mà luật quy định.**  Luật Lao động bảo vệ quyền lợi của người lao động, và các thỏa thuận trái với luật (ví dụ như thỏa
    thuận trả lương làm thêm giờ ngày lễ thấp hơn 300%) thường sẽ không có hiệu lực pháp lý.


    **Tóm lại:**


    * **Không thể trả 200% lương làm thêm giờ vào ngày lễ, ngay cả khi người lao động đồng ý.**

    * **Mức lương tối thiểu theo luật là 300% tiền lương giờ bình thường khi làm thêm giờ vào ngày lễ, Tết, ngày nghỉ có hưởng
    lương.**

    * **Thỏa thuận trả lương thấp hơn mức luật định là không hợp pháp và không có hiệu lực.**


    **Khuyến nghị:**


    Để đảm bảo quyền lợi của mình, người lao động nên nắm rõ các quy định của pháp luật lao động, đặc biệt là về tiền lương
    làm thêm giờ. Nếu có bất kỳ thắc mắc hoặc tranh chấp nào liên quan đến tiền lương, người lao động có thể liên hệ với các
    cơ quan chức năng như Liên đoàn Lao động hoặc Sở Lao động - Thương binh và Xã hội để được tư vấn và hỗ trợ.'
  - "Về nguyên tắc, **KHÔNG ĐƯỢC PHÉP** sử dụng người lao động 17 tuổi để làm công việc nâng vật nặng nếu công việc đó thuộc\
    \ danh mục công việc nặng nhọc, độc hại, nguy hiểm hoặc vượt quá khả năng thể chất của người chưa thành niên.\n\n**Dưới\
    \ đây là giải thích chi tiết dựa trên Luật Lao động Việt Nam:**\n\n* **Bảo vệ người lao động chưa thành niên:** Luật Lao\
    \ động Việt Nam đặc biệt quan tâm đến việc bảo vệ người lao động chưa thành niên (người dưới 18 tuổi).  Điều 143 của Bộ\
    \ luật Lao động quy định về sử dụng người lao động chưa thành niên, trong đó nhấn mạnh việc cấm sử dụng người chưa thành\
    \ niên làm công việc nặng nhọc, độc hại, nguy hiểm hoặc công việc, nơi làm việc có ảnh hưởng xấu đến nhân cách của họ.\n\
    \n* **Danh mục công việc nặng nhọc, độc hại, nguy hiểm:**  Chính phủ Việt Nam ban hành **Thông tư 11/2020/TT-BLĐTBXH**\
    \ quy định Danh mục nghề, công việc nặng nhọc, độc hại, nguy hiểm và đặc biệt nặng nhọc, độc hại, nguy hiểm.  **Công việc\
    \ nâng vật nặng thường xuyên hoặc nâng vật nặng vượt quá giới hạn cho phép rất có thể thuộc danh mục này.**\n\n* **Giới\
    \ hạn về thể chất của người chưa thành niên:** Người 17 tuổi vẫn đang trong giai đoạn phát triển về thể chất. Việc nâng\
    \ vật nặng quá sức có thể ảnh hưởng tiêu cực đến sự phát triển xương khớp, cơ bắp và sức khỏe tổng thể của họ. Luật pháp\
    \ nhằm bảo vệ sức khỏe và sự phát triển toàn diện của người chưa thành niên.\n\n* **Công việc được phép làm (có điều kiện):**\
    \  Luật Lao động **không cấm hoàn toàn** người 17 tuổi làm việc, nhưng quy định rất chặt chẽ về loại công việc, điều kiện\
    \ làm việc và thời giờ làm việc.  Người 17 tuổi có thể được làm một số công việc nhất định **nếu đáp ứng các điều kiện\
    \ sau:**\n    * **Không thuộc danh mục công việc cấm:** Công việc đó không nằm trong danh mục nghề, công việc nặng nhọc,\
    \ độc hại, nguy hiểm và đặc biệt nặng nhọc, độc hại, nguy hiểm.\n    * **Phù hợp với sức khỏe và thể chất:** Công việc\
    \ phải phù hợp với sức khỏe, thể chất và sự phát triển của người chưa thành niên.\n    * **Được sự đồng ý của người đại\
    \ diện theo pháp luật:**  Phải có sự đồng ý của cha, mẹ hoặc người giám hộ (trừ trường hợp pháp luật có quy định khác).\n\
    \    * **Đảm bảo điều kiện làm việc an toàn:**  Người sử dụng lao động phải đảm bảo điều kiện làm việc an toàn, vệ sinh\
    \ lao động và các biện pháp bảo vệ sức khỏe khác.\n    * **Giới hạn thời giờ làm việc:** Thời giờ làm việc của người chưa\
    \ thành niên không được vượt quá thời giờ làm việc của người chưa thành niên theo quy định của pháp luật (thường là ít\
    \ hơn người trưởng thành).\n\n**Tóm lại:**\n\nViệc cho người lao động 17 tuổi làm công việc nâng vật nặng **cần phải xem\
    \ xét kỹ lưỡng:**\n\n1. **Loại công việc nâng vật nặng cụ thể:**  Công việc đó có thuộc danh mục công việc nặng nhọc,\
    \ độc hại, nguy hiểm hay không? Mức độ nặng của vật cần nâng là bao nhiêu? Tần suất nâng vật như thế nào?\n2. **Khả năng\
    \ thể chất của người lao động 17 tuổi:**  Thể trạng của người lao động đó có đủ sức khỏe để thực hiện công việc nâng vật\
    \ nặng đó không?\n\n**Lời khuyên:**\n\n* **Tra cứu Danh mục nghề, công việc nặng nhọc, độc hại, nguy hiểm:**  Người sử\
    \ dụng lao động cần tra cứu **Thông tư 11/2020/TT-BLĐTBXH** để xác định công việc nâng vật nặng có thuộc danh mục cấm\
    \ hay không.\n* **Đánh giá rủi ro:**  Thực hiện đánh giá rủi ro về an toàn và sức khỏe đối với công việc nâng vật nặng,\
    \ đặc biệt là khi sử dụng người lao động chưa thành niên.\n* **Tham khảo ý kiến chuyên gia:**  Nếu không chắc chắn, nên\
    \ tham khảo ý kiến của cơ quan quản lý lao động địa phương hoặc chuyên gia về an toàn lao động để được tư vấn cụ thể.\n\
    * **Ưu tiên công việc nhẹ nhàng hơn:**  Nếu có thể, nên bố trí người lao động 17 tuổi làm các công việc nhẹ nhàng, phù\
    \ hợp với độ tuổi và thể trạng của họ.\n\n**Vi phạm quy định về sử dụng lao động chưa thành niên có thể bị xử phạt hành\
    \ chính.** Do đó, việc tuân thủ luật pháp là rất quan trọng để bảo vệ quyền lợi của người lao động và tránh các rủi ro\
    \ pháp lý cho người sử dụng lao động."
- source_sentence: '{"question": "Người lao động 15 tuổi có được phép làm công việc cán kim loại không?"}'
  sentences:
  - "Nếu một người Việt Nam bị lôi kéo làm việc ở nước ngoài và bị bóc lột, họ có thể tìm kiếm sự giúp đỡ từ nhiều nguồn khác\
    \ nhau. Dưới đây là một số tổ chức và cá nhân mà họ có thể liên hệ:\n\n**1. Đại sứ quán hoặc Lãnh sự quán Việt Nam tại\
    \ nước sở tại:**\n\n* **Đây là kênh hỗ trợ quan trọng nhất và đầu tiên bạn nên nghĩ đến.**  Đại sứ quán và Lãnh sự quán\
    \ có trách nhiệm bảo vệ quyền lợi của công dân Việt Nam ở nước ngoài.\n* **Họ có thể giúp:**\n    * Cung cấp thông tin\
    \ và tư vấn pháp lý về quyền lợi của người lao động và luật pháp địa phương.\n    * Liên hệ với chính quyền địa phương\
    \ (cảnh sát, cơ quan lao động, v.v.) để báo cáo tình trạng bị bóc lột.\n    * Hỗ trợ xin giấy tờ tùy thân tạm thời nếu\
    \ bị mất hoặc tịch thu.\n    * Cung cấp nơi ở tạm thời (nếu có thể).\n    * Hỗ trợ liên lạc với gia đình ở Việt Nam.\n\
    \    * Hỗ trợ thủ tục hồi hương về Việt Nam.\n    * Kết nối với các tổ chức hỗ trợ nạn nhân buôn người tại địa phương.\n\
    \n**Cách liên hệ:** Tìm thông tin liên hệ của Đại sứ quán hoặc Lãnh sự quán Việt Nam tại nước sở tại trên trang web của\
    \ Bộ Ngoại giao Việt Nam hoặc tìm kiếm trực tuyến.\n\n**2. Tổ chức Lao động Quốc tế (ILO):**\n\n* ILO là một cơ quan chuyên\
    \ môn của Liên Hợp Quốc, hoạt động để thúc đẩy các tiêu chuẩn lao động quốc tế và bảo vệ quyền của người lao động.\n*\
    \ **Họ có thể giúp:**\n    * Cung cấp thông tin về quyền lao động quốc tế.\n    * Kết nối với các tổ chức đối tác địa\
    \ phương chuyên về lao động và chống buôn người.\n    * (Tuy nhiên, ILO thường không trực tiếp can thiệp vào từng trường\
    \ hợp cá nhân, mà tập trung vào việc hợp tác với chính phủ và các tổ chức khác.)\n\n**3. Các tổ chức phi chính phủ (NGOs)\
    \ địa phương và quốc tế chuyên về chống buôn người và hỗ trợ nạn nhân:**\n\n* Rất nhiều NGOs hoạt động trên toàn thế giới\
    \ để chống lại nạn buôn người và hỗ trợ nạn nhân.\n* **Họ có thể giúp:**\n    * Cung cấp nơi ở an toàn và tạm thời.\n\
    \    * Tư vấn tâm lý và hỗ trợ tinh thần.\n    * Hỗ trợ pháp lý và đại diện pháp lý.\n    * Hỗ trợ y tế.\n    * Hỗ trợ\
    \ tái hòa nhập cộng đồng sau khi được giải cứu.\n    * Cung cấp thông tin và tư vấn về quyền lợi.\n\n**Cách tìm NGOs:**\
    \ Tìm kiếm trực tuyến bằng các từ khóa như \"anti-human trafficking NGOs [tên quốc gia]\", \"organizations helping trafficked\
    \ people [tên quốc gia]\".  Đại sứ quán/Lãnh sự quán cũng có thể cung cấp thông tin về các NGOs uy tín tại địa phương.\n\
    \n**4. Cảnh sát và cơ quan chức năng địa phương:**\n\n* Nếu tình hình nguy hiểm hoặc có dấu hiệu tội phạm (bắt giữ trái\
    \ phép, bạo lực, v.v.), hãy báo cáo ngay cho cảnh sát địa phương.\n* **Họ có thể giúp:**\n    * Điều tra vụ việc.\n  \
    \  * Giải cứu nạn nhân.\n    * Khởi tố những kẻ bóc lột.\n\n**5. Đường dây nóng hỗ trợ nạn nhân buôn người:**\n\n* Nhiều\
    \ quốc gia và tổ chức quốc tế có đường dây nóng chuyên biệt để hỗ trợ nạn nhân buôn người.\n* **Tìm kiếm trực tuyến đường\
    \ dây nóng tại quốc gia đó.**  Ví dụ, có thể tìm kiếm \"human trafficking hotline [tên quốc gia]\".\n\n**6. Gia đình và\
    \ bạn bè ở Việt Nam:**\n\n* Nếu có thể liên lạc được, hãy thông báo cho gia đình và bạn bè ở Việt Nam về tình hình.\n\
    * Họ có thể giúp:\n    * Liên hệ với Đại sứ quán/Lãnh sự quán Việt Nam.\n    * Tìm kiếm thông tin và hỗ trợ từ các tổ\
    \ chức ở Việt Nam.\n    * Hỗ trợ tài chính (nếu cần thiết).\n\n**7. Các tổ chức hỗ trợ người lao động di cư ở Việt Nam:**\n\
    \n* Một số tổ chức ở Việt Nam chuyên hỗ trợ người lao động di cư và phòng chống buôn người.\n* **Họ có thể giúp:**\n \
    \   * Tư vấn và hỗ trợ trước khi đi làm việc ở nước ngoài (để tránh bị lừa).\n    * Hỗ trợ gia đình người bị nạn.\n  \
    \  * Hỗ trợ tái hòa nhập sau khi hồi hương.\n\n**Quan trọng:**\n\n* **Hành động càng sớm càng tốt.** Đừng chần chừ khi\
    \ nhận ra mình đang bị bóc lột.\n* **Thu thập bằng chứng nếu có thể.** Ví dụ: ghi âm cuộc trò chuyện, chụp ảnh nơi làm\
    \ việc, giữ lại hợp đồng lao động (nếu có).\n* **Giữ liên lạc với người thân ở Việt Nam (nếu an toàn).**\n* **Ưu tiên\
    \ sự an toàn của bản thân.**\n\n**Nếu bạn hoặc ai đó bạn biết đang ở trong tình huống này, hãy liên hệ ngay lập tức với\
    \ một trong những nguồn hỗ trợ trên.** Đừng im lặng chịu đựng, bạn không đơn độc và có những người sẵn sàng giúp đỡ."
  - "Theo quy định của pháp luật lao động Việt Nam, **người lao động 15 tuổi KHÔNG được phép làm công việc cán kim loại.**\n\
    \n**Giải thích chi tiết:**\n\n* **Độ tuổi lao động tối thiểu và công việc nặng nhọc, độc hại, nguy hiểm:**  Luật Lao động\
    \ Việt Nam quy định độ tuổi lao động tối thiểu là 15 tuổi. Tuy nhiên, người lao động từ đủ 15 tuổi đến dưới 18 tuổi chỉ\
    \ được làm những công việc được pháp luật cho phép và **không được làm công việc nặng nhọc, độc hại, nguy hiểm hoặc công\
    \ việc có ảnh hưởng xấu đến sự phát triển thể chất, trí tuệ, nhân cách.**\n\n* **Cán kim loại là công việc nặng nhọc,\
    \ độc hại, nguy hiểm:** Công việc cán kim loại thường được xếp vào danh mục công việc nặng nhọc, độc hại, nguy hiểm vì:\n\
    \    * **Sử dụng máy móc, thiết bị công nghiệp:**  Thường xuyên tiếp xúc với máy cán, máy móc công nghiệp có thể gây tai\
    \ nạn lao động (kẹp tay, nghiến tay, v.v.).\n    * **Môi trường làm việc khắc nghiệt:**  Thường xuyên tiếp xúc với tiếng\
    \ ồn lớn, bụi kim loại, nhiệt độ cao, rung động.\n    * **Yêu cầu thể lực:** Công việc có thể đòi hỏi sức lực lớn để vận\
    \ hành máy móc, di chuyển vật liệu kim loại nặng.\n    * **Nguy cơ tai nạn lao động:**  Rủi ro bị thương tích do máy móc,\
    \ vật liệu kim loại, hoặc do môi trường làm việc không an toàn.\n\n* **Danh mục công việc cấm sử dụng lao động chưa thành\
    \ niên:**  Bộ Lao động - Thương binh và Xã hội đã ban hành danh mục các công việc và nơi làm việc cấm sử dụng lao động\
    \ chưa thành niên.  Mặc dù không có tên cụ thể \"cán kim loại\" trong danh mục, nhưng các công việc liên quan đến **sản\
    \ xuất, gia công kim loại, vận hành máy móc công nghiệp nặng, làm việc trong môi trường có nguy cơ tai nạn lao động cao**\
    \ đều có thể được xem là thuộc danh mục cấm hoặc hạn chế đối với lao động chưa thành niên.\n\n**Tóm lại:**\n\nPháp luật\
    \ Việt Nam bảo vệ người lao động chưa thành niên, đặc biệt là trong các công việc có tính chất nặng nhọc, độc hại, nguy\
    \ hiểm. Công việc cán kim loại thuộc nhóm này và **không phù hợp với người lao động 15 tuổi**.  Việc sử dụng lao động\
    \ 15 tuổi trong công việc cán kim loại là **vi phạm pháp luật lao động**.\n\n**Lời khuyên:**\n\nNếu bạn đang xem xét sử\
    \ dụng hoặc làm công việc cán kim loại khi 15 tuổi, hãy tìm hiểu kỹ về quy định pháp luật và lựa chọn công việc phù hợp\
    \ với độ tuổi và sức khỏe của mình. Nếu bạn là người sử dụng lao động, hãy tuân thủ nghiêm ngặt các quy định về sử dụng\
    \ lao động chưa thành niên để đảm bảo an toàn và quyền lợi cho người lao động trẻ tuổi."
  - 'Chào bạn,


    Để trả lời câu hỏi "Công ty yêu cầu thử việc 120 ngày cho vị trí trưởng phòng, điều này có hợp lý không?", chúng ta cần
    xem xét các khía cạnh pháp lý và thực tế.


    **Về mặt pháp lý:**


    Theo **Bộ luật Lao động 2019** của Việt Nam, thời gian thử việc được quy định như sau tại **Điều 25**:


    * **Không quá 180 ngày:** Đối với công việc của người quản lý doanh nghiệp theo quy định của Luật Doanh nghiệp, Luật Quản
    lý, sử dụng vốn nhà nước đầu tư vào sản xuất, kinh doanh tại doanh nghiệp.

    * **Không quá 60 ngày:** Đối với công việc có chức danh nghề nghiệp cần trình độ chuyên môn, kỹ thuật từ cao đẳng trở
    lên.

    * **Không quá 30 ngày:** Đối với công việc có chức danh nghề nghiệp cần trình độ chuyên môn, kỹ thuật trung cấp, công
    nhân kỹ thuật, nhân viên nghiệp vụ.

    * **Không quá 06 ngày làm việc:** Đối với công việc khác.


    **Vị trí Trưởng phòng** thường được xem là **công việc có chức danh nghề nghiệp cần trình độ chuyên môn, kỹ thuật từ cao
    đẳng trở lên** hoặc thậm chí là **công việc của người quản lý doanh nghiệp** (tùy thuộc vào quy mô và cơ cấu công ty,
    cũng như vai trò cụ thể của trưởng phòng).


    **Phân tích thời gian thử việc 120 ngày:**


    * **Nếu vị trí Trưởng phòng được xem là công việc quản lý doanh nghiệp theo Luật Doanh nghiệp:** Thì thời gian thử việc
    **120 ngày là hợp lý** và nằm trong giới hạn pháp luật (không quá 180 ngày).

    * **Nếu vị trí Trưởng phòng được xem là công việc có chức danh nghề nghiệp cần trình độ chuyên môn, kỹ thuật từ cao đẳng
    trở lên:** Thì thời gian thử việc **120 ngày là KHÔNG hợp lý** và **KHÔNG tuân thủ pháp luật**.  Thời gian thử việc tối
    đa trong trường hợp này chỉ là **60 ngày**.


    **Về mặt thực tế và tính hợp lý:**


    * **Thời gian 120 ngày (4 tháng) là một khoảng thời gian khá dài** cho giai đoạn thử việc, đặc biệt là đối với vị trí
    quản lý cấp trung như Trưởng phòng.

    * **Mục đích của thử việc:**  Thử việc là để cả công ty và người lao động đánh giá xem công việc và môi trường làm việc
    có phù hợp với nhau hay không.  Thông thường, trong vòng 2-3 tháng, cả hai bên đã có thể có đủ thông tin để đưa ra quyết
    định.

    * **Ảnh hưởng đến người lao động:**  Thời gian thử việc quá dài có thể gây ra sự bất an, không chắc chắn cho người lao
    động, ảnh hưởng đến động lực làm việc và gắn bó với công ty.

    * **Tính hợp lý về mặt công việc:**  Mặc dù vị trí Trưởng phòng đòi hỏi nhiều kỹ năng và trách nhiệm, nhưng việc đánh
    giá năng lực và sự phù hợp của một người cho vị trí này thường không cần thiết phải kéo dài đến 120 ngày.


    **Khuyến nghị:**


    1. **Xác định rõ vị trí Trưởng phòng thuộc loại công việc nào:**  Bạn cần xem xét mô tả công việc, trách nhiệm, quyền
    hạn của vị trí Trưởng phòng trong công ty đó để xác định xem nó có được xem là "công việc của người quản lý doanh nghiệp"
    hay không.

    2. **Tham khảo Bộ luật Lao động:**  Xem lại Điều 25 Bộ luật Lao động 2019 để hiểu rõ quy định về thời gian thử việc.

    3. **Trao đổi với công ty:**  Bạn nên trao đổi trực tiếp với bộ phận nhân sự của công ty để làm rõ lý do vì sao thời gian
    thử việc lại là 120 ngày.  Hỏi rõ vị trí này được công ty xếp vào loại công việc nào theo quy định của pháp luật lao động.

    4. **Đàm phán (nếu có thể):** Nếu bạn cảm thấy thời gian thử việc 120 ngày là quá dài và không hợp lý, bạn có thể đàm
    phán với công ty để rút ngắn thời gian thử việc.


    **Tóm lại:**


    Khả năng cao là **thời gian thử việc 120 ngày cho vị trí Trưởng phòng là KHÔNG hợp lý và KHÔNG tuân thủ pháp luật** nếu
    vị trí này được xem là công việc có chức danh nghề nghiệp cần trình độ chuyên môn, kỹ thuật từ cao đẳng trở lên.  Chỉ
    khi vị trí Trưởng phòng được xem là "công việc của người quản lý doanh nghiệp" theo Luật Doanh nghiệp thì thời gian 120
    ngày mới hợp lý về mặt pháp lý.


    Bạn nên làm rõ với công ty về vấn đề này để đảm bảo quyền lợi của mình và tuân thủ pháp luật lao động. Nếu cần thiết,
    bạn có thể tham khảo ý kiến của luật sư hoặc chuyên gia về lao động để được tư vấn cụ thể hơn.'
- source_sentence: '{"question": "Người sử dụng lao động có phải thiết lập cơ chế và thực hiện đối thoại, trao đổi với người
    lao động và tổ chức đại diện người lao động không?"},'
  sentences:
  - 'Phụ lục hợp đồng lao động có thể được sửa đổi, bổ sung bởi **hai bên** tham gia hợp đồng lao động, tức là **người sử
    dụng lao động** và **người lao động**.


    **Giải thích chi tiết:**


    * **Tính chất của Phụ lục hợp đồng lao động:** Phụ lục hợp đồng lao động là một bộ phận không thể tách rời của hợp đồng
    lao động. Nó có giá trị pháp lý tương đương với hợp đồng lao động và dùng để quy định chi tiết hoặc sửa đổi, bổ sung một
    số điều khoản của hợp đồng lao động.


    * **Nguyên tắc sửa đổi, bổ sung hợp đồng lao động:**  Theo quy định của pháp luật lao động Việt Nam (Bộ luật Lao động
    hiện hành), việc sửa đổi, bổ sung hợp đồng lao động phải tuân theo nguyên tắc **tự nguyện, thỏa thuận** giữa người sử
    dụng lao động và người lao động.  Điều này cũng áp dụng cho phụ lục hợp đồng lao động vì nó là một phần của hợp đồng lao
    động.


    * **Ai có quyền sửa đổi, bổ sung:**  Chính vì nguyên tắc trên, chỉ có **người sử dụng lao động và người lao động** đã
    ký kết hợp đồng lao động (và do đó, phụ lục hợp đồng lao động) mới có quyền sửa đổi, bổ sung phụ lục đó.  Một bên không
    thể tự ý sửa đổi, bổ sung mà không có sự đồng ý của bên còn lại.


    **Quy trình sửa đổi, bổ sung:**


    Việc sửa đổi, bổ sung phụ lục hợp đồng lao động thường được thực hiện bằng một trong hai hình thức:


    1. **Thỏa thuận bằng văn bản:**  Đây là hình thức phổ biến và được khuyến khích. Hai bên thỏa thuận các nội dung sửa đổi,
    bổ sung và lập thành văn bản (thường gọi là "Phụ lục sửa đổi, bổ sung hợp đồng lao động" hoặc một tên gọi tương tự). Văn
    bản này phải được cả hai bên ký tên và có giá trị pháp lý như phụ lục hợp đồng lao động ban đầu.


    2. **Thỏa thuận miệng (trong một số trường hợp hạn chế):**  Mặc dù không được khuyến khích, trong một số trường hợp đơn
    giản, các bên có thể thỏa thuận miệng về việc sửa đổi, bổ sung. Tuy nhiên, để đảm bảo tính pháp lý và tránh tranh chấp
    sau này, việc lập thành văn bản vẫn là lựa chọn tốt nhất.


    **Tóm lại:**


    Để sửa đổi, bổ sung phụ lục hợp đồng lao động, cần có sự **thỏa thuận và đồng ý của cả người sử dụng lao động và người
    lao động**. Việc sửa đổi, bổ sung thường được thực hiện bằng văn bản để đảm bảo tính rõ ràng và pháp lý.  Việc một bên
    tự ý sửa đổi, bổ sung phụ lục hợp đồng lao động mà không có sự đồng ý của bên còn lại là không hợp lệ và có thể dẫn đến
    tranh chấp lao động.'
  - "{\"answer\": \"Có. Luật pháp Việt Nam quy định rõ ràng rằng người sử dụng lao động **phải** thiết lập cơ chế và thực\
    \ hiện đối thoại, trao đổi với người lao động và tổ chức đại diện người lao động tại cơ sở.\n\n**Căn cứ pháp lý chính:**\n\
    \n* **Bộ luật Lao động 2019:**  Điều 63 và Điều 64 quy định chi tiết về đối thoại tại nơi làm việc.\n\n**Nội dung chính\
    \ của quy định này:**\n\n* **Đối thoại định kỳ:** Người sử dụng lao động phải tổ chức đối thoại định kỳ với người lao\
    \ động và tổ chức đại diện người lao động (nếu có).  Thời gian đối thoại định kỳ được quy định cụ thể trong Bộ luật Lao\
    \ động và các văn bản hướng dẫn.\n* **Đối thoại khi có yêu cầu:**  Ngoài đối thoại định kỳ, người sử dụng lao động cũng\
    \ phải đối thoại khi có yêu cầu từ người lao động hoặc tổ chức đại diện người lao động.\n* **Nội dung đối thoại:**  Nội\
    \ dung đối thoại rất rộng, bao gồm nhiều vấn đề liên quan đến quan hệ lao động, như:\n    * Tình hình sản xuất, kinh doanh\
    \ của doanh nghiệp.\n    * Việc thực hiện hợp đồng lao động, thỏa ước lao động tập thể, nội quy lao động, quy chế và các\
    \ cam kết, thỏa thuận khác tại nơi làm việc.\n    * Điều kiện làm việc.\n    * Yêu cầu của người lao động, tổ chức đại\
    \ diện người lao động đối với người sử dụng lao động.\n    * Các nội dung khác mà hai bên quan tâm.\n* **Mục đích của\
    \ đối thoại:**\n    * Tăng cường sự hiểu biết giữa người sử dụng lao động và người lao động.\n    * Xây dựng quan hệ lao\
    \ động hài hòa, ổn định và tiến bộ.\n    * Ngăn ngừa và giải quyết các tranh chấp lao động.\n    * Thực hiện dân chủ tại\
    \ nơi làm việc.\n\n**Tổ chức đại diện người lao động:**\n\n* Tổ chức đại diện người lao động có thể là Công đoàn cơ sở\
    \ hoặc tổ chức của người lao động tại doanh nghiệp (nếu được thành lập hợp pháp theo quy định của pháp luật).\n* Vai trò\
    \ của tổ chức đại diện người lao động rất quan trọng trong đối thoại, trao đổi, bảo vệ quyền và lợi ích hợp pháp, chính\
    \ đáng của người lao động.\n\n**Tóm lại:**\n\nViệc thiết lập cơ chế và thực hiện đối thoại, trao đổi với người lao động\
    \ và tổ chức đại diện người lao động là **nghĩa vụ pháp lý** của người sử dụng lao động tại Việt Nam. Đây là một công\
    \ cụ quan trọng để xây dựng quan hệ lao động tốt đẹp, đảm bảo quyền lợi của người lao động và sự phát triển bền vững của\
    \ doanh nghiệp.\n\nĐể có thông tin chi tiết và chính xác nhất, bạn nên tham khảo trực tiếp **Bộ luật Lao động 2019** và\
    \ các văn bản hướng dẫn liên quan.\"}"
  - "Theo quy định pháp luật hiện hành của Việt Nam, **không có quy định bắt buộc** trọng tài viên lao động phải tham gia\
    \ một khóa đào tạo cụ thể nào trước khi hành nghề.\n\nTuy nhiên, để trở thành một trọng tài viên lao động có năng lực\
    \ và chuyên nghiệp, việc tham gia các khóa đào tạo, bồi dưỡng kiến thức và kỹ năng về pháp luật lao động, kỹ năng giải\
    \ quyết tranh chấp, kỹ năng trọng tài là **rất quan trọng và được khuyến khích.**\n\n**Giải thích chi tiết hơn:**\n\n\
    * **Pháp luật không quy định bắt buộc:**  Hiện tại, Luật Hòa giải, đối thoại tại Tòa án và các văn bản pháp luật liên\
    \ quan đến trọng tài lao động không quy định cụ thể về việc trọng tài viên lao động phải có chứng chỉ hay hoàn thành khóa\
    \ đào tạo nào.  Điều kiện để trở thành Trọng tài viên lao động thường tập trung vào kinh nghiệm, kiến thức và uy tín trong\
    \ lĩnh vực lao động.\n\n* **Khuyến khích đào tạo để nâng cao năng lực:** Mặc dù không bắt buộc, nhưng việc tham gia các\
    \ khóa đào tạo mang lại nhiều lợi ích thiết thực cho trọng tài viên lao động:\n    * **Cập nhật kiến thức pháp luật:**\
    \ Pháp luật lao động liên tục thay đổi và phát triển. Các khóa đào tạo giúp trọng tài viên cập nhật những quy định mới\
    \ nhất, đảm bảo áp dụng pháp luật chính xác trong quá trình giải quyết tranh chấp.\n    * **Nâng cao kỹ năng chuyên môn:**\
    \ Các khóa đào tạo thường trang bị các kỹ năng cần thiết cho trọng tài viên như:\n        * **Kỹ năng hòa giải, thương\
    \ lượng:**  Giúp trọng tài viên hướng dẫn các bên tranh chấp tìm ra giải pháp hòa bình, tự nguyện.\n        * **Kỹ năng\
    \ điều hành phiên họp trọng tài:** Đảm bảo phiên họp diễn ra hiệu quả, công bằng và đúng trình tự.\n        * **Kỹ năng\
    \ phân tích, đánh giá chứng cứ:**  Giúp trọng tài viên đưa ra phán quyết khách quan, dựa trên cơ sở pháp lý và chứng cứ\
    \ xác thực.\n        * **Kỹ năng soạn thảo phán quyết trọng tài:**  Đảm bảo phán quyết rõ ràng, dễ hiểu, có tính khả thi\
    \ và tuân thủ pháp luật.\n    * **Mở rộng mạng lưới chuyên môn:** Các khóa đào tạo là cơ hội để trọng tài viên gặp gỡ,\
    \ trao đổi kinh nghiệm với các đồng nghiệp, chuyên gia trong lĩnh vực lao động.\n    * **Nâng cao uy tín cá nhân:** Việc\
    \ có chứng chỉ đào tạo hoặc tham gia các khóa học uy tín có thể giúp trọng tài viên nâng cao uy tín và được các bên tranh\
    \ chấp tin tưởng hơn.\n\n**Các loại hình đào tạo mà trọng tài viên lao động có thể tham gia:**\n\n* **Khóa đào tạo do\
    \ các Trung tâm Trọng tài Lao động tổ chức:**  Các trung tâm trọng tài thường xuyên tổ chức các khóa đào tạo chuyên sâu\
    \ về trọng tài lao động, mời các chuyên gia, luật sư, thẩm phán có kinh nghiệm giảng dạy.\n* **Khóa đào tạo do các trường\
    \ đại học, viện nghiên cứu tổ chức:**  Các cơ sở đào tạo này có thể tổ chức các khóa học ngắn hạn, dài hạn về pháp luật\
    \ lao động, giải quyết tranh chấp, kỹ năng trọng tài.\n* **Hội thảo, hội nghị chuyên đề:**  Tham gia các sự kiện này giúp\
    \ trọng tài viên cập nhật thông tin mới nhất về pháp luật lao động và xu hướng giải quyết tranh chấp.\n\n**Tóm lại:**\n\
    \nMặc dù không bắt buộc, việc tham gia các khóa đào tạo là **hết sức cần thiết và có lợi** cho trọng tài viên lao động.\
    \  Nó giúp nâng cao năng lực chuyên môn, kiến thức pháp luật, kỹ năng giải quyết tranh chấp, từ đó góp phần vào việc giải\
    \ quyết tranh chấp lao động một cách hiệu quả, công bằng và đúng pháp luật.  Để trở thành một trọng tài viên lao động\
    \ giỏi, việc **tự giác học hỏi, trau dồi kiến thức và kỹ năng một cách liên tục** là điều quan trọng hơn cả."
