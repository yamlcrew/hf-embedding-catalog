      \ thiết).\n\n**7. Các tổ chức hỗ trợ người lao động di cư ở Việt Nam:**\n\n* Một số tổ chức ở Việt Nam chuyên hỗ trợ\
      \ người lao động di cư và phòng chống buôn người.\n* **Họ có thể giúp:**\n    * Tư vấn và hỗ trợ trước khi đi làm việc\
      \ ở nước ngoài (để tránh bị lừa).\n    * Hỗ trợ gia đình người bị nạn.\n    * Hỗ trợ tái hòa nhập sau khi hồi hương.\n\
      \n**Quan trọng:**\n\n* **Hành động càng sớm càng tốt.** Đừng chần chừ khi nhận ra mình đang bị bóc lột.\n* **Thu thập\
      \ bằng chứng nếu có thể.** Ví dụ: ghi âm cuộc trò chuyện, chụp ảnh nơi làm việc, giữ lại hợp đồng lao động (nếu có).\n\
