    - "Theo quy định của pháp luật lao động Việt Nam, **người lao động 15 tuổi KHÔNG được phép làm công việc cán kim loại.**\n\
      \n**Giải thích chi tiết:**\n\n* **Độ tuổi lao động tối thiểu và công việc nặng nhọc, độc hại, nguy hiểm:**  Luật Lao\
      \ động Việt Nam quy định độ tuổi lao động tối thiểu là 15 tuổi. Tuy nhiên, người lao động từ đủ 15 tuổi đến dưới 18\
      \ tuổi chỉ được làm những công việc được pháp luật cho phép và **không được làm công việc nặng nhọc, độc hại, nguy hiểm\
      \ hoặc công việc có ảnh hưởng xấu đến sự phát triển thể chất, trí tuệ, nhân cách.**\n\n* **Cán kim loại là công việc\
      \ nặng nhọc, độc hại, nguy hiểm:** Công việc cán kim loại thường được xếp vào danh mục công việc nặng nhọc, độc hại,\
      \ nguy hiểm vì:\n    * **Sử dụng máy móc, thiết bị công nghiệp:**  Thường xuyên tiếp xúc với máy cán, máy móc công nghiệp\
      \ có thể gây tai nạn lao động (kẹp tay, nghiến tay, v.v.).\n    * **Môi trường làm việc khắc nghiệt:**  Thường xuyên\
      \ tiếp xúc với tiếng ồn lớn, bụi kim loại, nhiệt độ cao, rung động.\n    * **Yêu cầu thể lực:** Công việc có thể đòi\
      \ hỏi sức lực lớn để vận hành máy móc, di chuyển vật liệu kim loại nặng.\n    * **Nguy cơ tai nạn lao động:**  Rủi ro\
      \ bị thương tích do máy móc, vật liệu kim loại, hoặc do môi trường làm việc không an toàn.\n\n* **Danh mục công việc\
      \ cấm sử dụng lao động chưa thành niên:**  Bộ Lao động - Thương binh và Xã hội đã ban hành danh mục các công việc và\
      \ nơi làm việc cấm sử dụng lao động chưa thành niên.  Mặc dù không có tên cụ thể \"cán kim loại\" trong danh mục, nhưng\
