      \ có nguy cơ tai nạn lao động cao** đều có thể được xem là thuộc danh mục cấm hoặc hạn chế đối với lao động chưa thành\
      \ niên.\n\n**Tóm lại:**\n\nPháp luật Việt Nam bảo vệ người lao động chưa thành niên, đặc biệt là trong các công việc\
      \ có tính chất nặng nhọc, độc hại, nguy hiểm. Công việc cán kim loại thuộc nhóm này và **không phù hợp với người lao\
