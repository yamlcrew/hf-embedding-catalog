  - người từ 17 tuổi trở lên chỉ cần giấy tờ tùy thân là có thể đến quầy mở tài khoản.
- source_sentence: 'thẻ hội viên priority pass: ưu đãi tặng kèm cho chủ thẻ chính'
  sentences:
  - giao dịch nạp tiền (topup) vào ví điện tử bị loại trừ.
  - hội viên priority pass được phát hành kèm thẻ tín dụng
  - giải thưởng vietlott trên 10 tỷ đồng khách hàng phải liên hệ trực tiếp để làm thủ tục.
- source_sentence: không ưu đãi giao dịch rút tiền mặt
  sentences:
  - gọi lên tổng đài vietlott tốn 1.2 đồng mỗi phút.
  - không ưu đãi dịch vụ quốc tế ngoài
  - mức lãi suất cố định cho chứng chỉ tiền gửi được công bố là 7,1% mỗi năm.
- source_sentence: lãi suất cao nhất của sản phẩm tiết kiệm trực tuyến lên đến 5,7%/năm.
  sentences:
  - dùng gói an sinh xã hội thì vĩnh viễn không mất phí duy trì tài khoản.
  - hành lý bị trì hoãn trên 12 giờ được bồi thường tối đa 12 giờ.
  - mức lãi suất trần mà khách hàng có thể nhận được khi gửi online là 5,7%/tuần.
