  - source_sentence: "passage: British Rail produced a variety of railbuses, both as a means of acquiring new rolling stock\
      \ cheaply, and to provide economical services on lightly-used lines. \n\nRailbuses are a very lightweight type of railcar\
      \ designed specifically for passenger transport on little-used railway lines. As the name suggests, they share many\
      \ aspects of their construction with a bus, usually having a bus body, or a modified bus body, and having four wheels\
      \ on a fixed wheelbase, rather than bogies. Some units were equipped for operation as diesel multiple units.\n\nIn the\
      \ late 1950s, British Rail tested a series of small railbuses, produced by a variety of manufacturers, for about £12,500\
      \ each (£261,000 at 2014 prices). These proved to be very economical (on test the Wickham bus was about ), but were\
      \ somewhat unreliable. Most of the lines they worked on were closed following the Beeching Cuts and, being non-standard,\
      \ they were all withdrawn in the mid-1960s, so they were never classified under the TOPS system."
