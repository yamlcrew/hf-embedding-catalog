  - source_sentence: "passage: 엄마는 치어리딩의 안전에 대해 우려할 수 있으므로 안전 조치에 대해 확신을 심어줘야 합니다. 치어리딩 트라이아웃과 연습 중 안전 프로토콜, 장비, 코치 자격, 비상\
      \ 절차 등을 자세히 알려드리세요. \n\n치어리딩 안전에 대한 추가 과정이나 워크숍에 참여하여 엄마의 신뢰를 더욱 높일 수 있습니다. 다른 스포츠와 비교하여 치어리딩 부상 통계를 제공하고, 연습과 공연 중에\
      \ 사용되는 보호 장비를 설명하고, 치어리딩 안전 모범 사례에 중점을 둔 자료를 소개하는 것도 도움이 될 수 있습니다."
    sentences:
    - 'passage: 스페이스바 문제는 키보드 드라이버가 오래되거나 손상되었을 수 있습니다. 키보드 드라이버를 업데이트하는 방법은 다음과 같습니다.


      1. `Win + X`를 동시에 누르고 장치 관리자를 선택합니다.

      2. ''키보드''라는 범주를 찾아 확장합니다. 키보드 모델을 마우스 오른쪽 버튼으로 클릭하고 ''드라이버 업데이트''를 선택합니다.

      3. ''업데이트된 드라이버 소프트웨어를 자동으로 검색''을 선택하고 Windows에서 사용 가능한 업데이트를 찾도록 합니다. 업데이트가 표시되면 설치합니다.

      4. PC를 다시 시작하고 나중에 스페이스바를 테스트합니다.


      드라이버를 업데이트해도 문제가 해결되지 않으면 다른 문제 해결사를 실행해 볼 수 있습니다. Windows에는 일반적인 시스템 오류를 진단하고 해결하도록 설계된 기본 제공 도구가 있습니다. 하드웨어 및 장치 문제
      해결사를 실행하려면 다음 단계를 따르십시오.


      1. `Win + I`를 눌러 설정을 엽니다. ''시스템 > 문제 해결 > 기타 문제 해결사''로 이동합니다.

      2. ''하드웨어 및 장치''라는 옵션이 나타날 때까지 아래로 스크롤합니다. 옆에 있는 ''실행''을 클릭합니다.

      3. 문제 해결사가 잠재적인 문제를 검색하기 시작합니다. 프로세스가 완료될 때까지 기다립니다. 제안된 해결책이 있으면 해결하십시오.

      4. 문제 해결사를 실행한 후 PC를 다시 시작하고 스페이스바가 제대로 작동하는지 확인하십시오.'
