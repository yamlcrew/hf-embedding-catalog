  sentences:
  - 'query: What challenges did they face during their travels?'
  - "passage: The first step in dressing like Emma Ross is to build a wardrobe filled with basic items that are versatile\
    \ and easy to mix and match. \n\nThese basic items include: skinny, boyfriend, or distressed jeans; plain, striped, or\
    \ graphic t-shirts; checkered, flannel, or solid colored blouses; cardigans, pullovers, or zip-up sweaters; denim, plaid,\
    \ or A-line skirts; leather, denim, or bomber jackets; casual sundresses, maxi dresses, or little black dresses; boots,\
    \ sneakers, loafers, or ballet flats. \n\nIt's best to choose neutral colors like white, black, gray, navy blue, and beige\
    \ for your basics. This will make it easier to pair different pieces together."
  - 'passage: 매치가 성사되면 대화를 시작할 차례입니다. 범블에서는 여성 사용자만 대화를 시작할 수 있으므로 인내심을 갖고 메시지를 기다리세요. 다른 사용자들과 계속 스와이프하고 소통하면서 프로필을 활성화 상태로
    유지하는 것도 중요합니다.


    여성 사용자가 첫 메시지를 보내면 신속하고 진심으로 답장하세요. 빠른 답장은 열정과 관심을 보여주는 좋은 인상을 줄 수 있습니다. 그녀의 질문에 솔직하게 답하고 그녀의 프로필에 있는 것과 관련된 질문도 해보세요.
    의미 있는 대화는 강한 유대감을 형성하고 실제로 만날 가능성을 높입니다.


    대화를 시작할 때는 "안녕하세요" 또는 "잘 지내세요"와 같은 일반적인 인사말을 피하세요. 대신 그녀의 프로필에서 특정 요소를 언급하여 진정한 참여를 보여주세요. 또한 정치나 종교와 같이 그녀의 입장을 잘 모르는
    상태에서 논란이 될 수 있는 주제는 피하세요.'
- source_sentence: "passage: British Rail produced a variety of railbuses, both as a means of acquiring new rolling stock\
    \ cheaply, and to provide economical services on lightly-used lines. \n\nRailbuses are a very lightweight type of railcar\
    \ designed specifically for passenger transport on little-used railway lines. As the name suggests, they share many aspects\
    \ of their construction with a bus, usually having a bus body, or a modified bus body, and having four wheels on a fixed\
    \ wheelbase, rather than bogies. Some units were equipped for operation as diesel multiple units.\n\nIn the late 1950s,\
    \ British Rail tested a series of small railbuses, produced by a variety of manufacturers, for about £12,500 each (£261,000\
    \ at 2014 prices). These proved to be very economical (on test the Wickham bus was about ), but were somewhat unreliable.\
    \ Most of the lines they worked on were closed following the Beeching Cuts and, being non-standard, they were all withdrawn\
    \ in the mid-1960s, so they were never classified under the TOPS system."
