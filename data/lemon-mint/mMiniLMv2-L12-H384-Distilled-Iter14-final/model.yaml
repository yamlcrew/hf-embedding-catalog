- source_sentence: 'passage: Here is how to compress a file in Terminal:


    1. Use the `ls` command to list the files in the current directory. Confirm the presence of the file you wish to compress
    and note the precise spelling and case sensitivity of the file.

    2. To zip a single file called "example_file.txt," enter the following command:

    ```csharp

    zip my_compressed_archive.zip example_file.txt

    ```

    Replace "my_compressed_archive" with your own unique identifier and adjust "example_file.txt" according to your actual
    file name. Press Enter to execute the command.'
  sentences:
  - 'passage: Regular moisturizing is crucial to prevent and alleviate dry skin under your nose. Opt for non-comedogenic moisturizers,
    which are less likely to clog pores, and apply them immediately after washing your face while your skin is still damp
    to lock in moisture.


    Non-comedogenic means the product doesn''t contain ingredients known to block pores. Heavier creams might be necessary
    in winter months when indoor heating systems sap moisture from the air.'
  - 'query: 유럽 몰도바 국민 대회의 목적은 무엇이었습니까?'
  - 'passage: When planning dates with your significant other, consider including activities that both adults and children
    can enjoy together. Examples include trips to the zoo, bowling alleys, miniature golf courses, or movie nights at home
    with kid-friendly films. Including your children in these outings allows them to spend quality time with you while also
    giving you and your partner opportunities to connect.


    It''s crucial to establish clear boundaries and expectations surrounding dating and relationships within your household.
    Discuss topics like privacy, personal space, and appropriate behavior with your children. Explain that although you may
    have feelings for your partner, maintaining healthy familial bonds remains paramount.'
- source_sentence: "passage: 엄마는 치어리딩의 안전에 대해 우려할 수 있으므로 안전 조치에 대해 확신을 심어줘야 합니다. 치어리딩 트라이아웃과 연습 중 안전 프로토콜, 장비, 코치 자격, 비상 절차\
    \ 등을 자세히 알려드리세요. \n\n치어리딩 안전에 대한 추가 과정이나 워크숍에 참여하여 엄마의 신뢰를 더욱 높일 수 있습니다. 다른 스포츠와 비교하여 치어리딩 부상 통계를 제공하고, 연습과 공연 중에 사용되는\
    \ 보호 장비를 설명하고, 치어리딩 안전 모범 사례에 중점을 둔 자료를 소개하는 것도 도움이 될 수 있습니다."
  sentences:
  - 'passage: 스페이스바 문제는 키보드 드라이버가 오래되거나 손상되었을 수 있습니다. 키보드 드라이버를 업데이트하는 방법은 다음과 같습니다.


    1. `Win + X`를 동시에 누르고 장치 관리자를 선택합니다.

    2. ''키보드''라는 범주를 찾아 확장합니다. 키보드 모델을 마우스 오른쪽 버튼으로 클릭하고 ''드라이버 업데이트''를 선택합니다.

    3. ''업데이트된 드라이버 소프트웨어를 자동으로 검색''을 선택하고 Windows에서 사용 가능한 업데이트를 찾도록 합니다. 업데이트가 표시되면 설치합니다.

    4. PC를 다시 시작하고 나중에 스페이스바를 테스트합니다.


    드라이버를 업데이트해도 문제가 해결되지 않으면 다른 문제 해결사를 실행해 볼 수 있습니다. Windows에는 일반적인 시스템 오류를 진단하고 해결하도록 설계된 기본 제공 도구가 있습니다. 하드웨어 및 장치 문제
    해결사를 실행하려면 다음 단계를 따르십시오.


    1. `Win + I`를 눌러 설정을 엽니다. ''시스템 > 문제 해결 > 기타 문제 해결사''로 이동합니다.

    2. ''하드웨어 및 장치''라는 옵션이 나타날 때까지 아래로 스크롤합니다. 옆에 있는 ''실행''을 클릭합니다.

    3. 문제 해결사가 잠재적인 문제를 검색하기 시작합니다. 프로세스가 완료될 때까지 기다립니다. 제안된 해결책이 있으면 해결하십시오.

    4. 문제 해결사를 실행한 후 PC를 다시 시작하고 스페이스바가 제대로 작동하는지 확인하십시오.'
  - 'query: 1880년 남성 테니스 시즌에서 가장 많이 우승한 선수는 누구입니까?'
  - 'passage: 가족 구성원을 내쫓는 것은 모든 당사자에게 심각한 감정적 결과를 초래할 수 있는 극단적인 조치이므로 신중하게 고려해야 합니다. 이 가이드는 내쫓는 것이 무엇을 의미하는지 그리고 상황에 맞는 선택인지
    이해하는 데 도움이 되는 포괄적인 단계를 제공합니다. 이 기사는 가족 구성원을 내쫓는 것을 옹호하거나 권장하지 않으며 사용자의 요청에 따라 정보를 제공합니다.


    내쫓는 것을 고려하는 첫 번째 단계는 가족 구성원을 내쫓고 싶은 이유를 평가하는 것입니다. 일반적인 이유로는 지속적인 학대(신체적, 정신적 또는 재정적), 중독 문제, 심각한 성격 차이 또는 유해한 행동이 있습니다.
    치료사, 상담사 또는 신뢰할 수 있는 종교 지도자와 같은 전문가의 조언을 구하여 대안적인 관점과 대처 전략을 제공받을 수 있습니다. 내쫓는 것이 근본적인 문제를 해결하지 못하고 오히려 악화될 수 있다는 점을 기억하십시오.'
- source_sentence: 'passage: Slow roasting a pig shoulder is a delicate process. Set your oven to 300°F (150°C). Place the
    prepared pork shoulder in a Dutch oven or deep baking dish, add liquid (like broth, beer, or cider), cover tightly, and
    cook low and slow for approximately 6 hours or until internal temperature reaches 195°F (90°C).


    Low-temperature roasting breaks down tough collagen fibers transforming them into gelatin, making the meat succulent.
    Covering maintains humidity necessary for tenderization. Adding liquid deglazes pan drippings, integrating additional
    flavors. An accurate thermometer probe inserted into the thickest part avoids under/overcooking.'
  sentences:
  - 'query: 스트릭틀리 컴 댄싱의 탈락 기준은 매 시즌마다 바뀌나요?'
  - 'passage: 에키노칵투스는 황금 술통 선인장 (Echinocactus grusonii)과 할머니 선인장 (Echinocactus polycephalus)과 같은 여러 인기 종을 포함하는 선인장 속입니다. 이
    선인장들은 독특한 모양, 아름다운 가시와 낮은 관리 요구 사항으로 유명합니다. 그러나 번창하려면 여전히 적절한 관리가 필요합니다. 이 가이드는 에키노칵투스를 관리하는 방법에 대한 자세한 단계를 제공하여 건강과 장수를
    보장합니다.


    첫째, 적합한 화분과 흙을 선택하는 것이 중요합니다. 과도한 수분으로 인한 뿌리 부패를 방지하기 위해 배수구가 있는 테라코타 또는 무광택 도자기 화분을 선택하십시오. 화분은 선인장의 현재 크기보다 약간만 크게 해야
    합니다. 너무 큰 화분은 물이 고인 흙으로 이어질 수 있습니다.


    흙은 배수가 잘 되는 선인장 혼합물을 선택하거나 펄라이트, 거친 모래, 피트모스 또는 퇴비를 같은 비율로 섞어서 직접 만들 수 있습니다. 이 혼합물은 식물의 뿌리에 적절한 통기와 배수를 제공하면서도 약간의 수분을
    유지합니다.'
  - 'query: α1-아드레날린 수용체는 어떤 약물의 주요 표적입니까?'
