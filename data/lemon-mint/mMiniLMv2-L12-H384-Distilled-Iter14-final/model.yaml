    - 'passage: 에키노칵투스는 황금 술통 선인장 (Echinocactus grusonii)과 할머니 선인장 (Echinocactus polycephalus)과 같은 여러 인기 종을 포함하는 선인장 속입니다.
      이 선인장들은 독특한 모양, 아름다운 가시와 낮은 관리 요구 사항으로 유명합니다. 그러나 번창하려면 여전히 적절한 관리가 필요합니다. 이 가이드는 에키노칵투스를 관리하는 방법에 대한 자세한 단계를 제공하여 건강과
      장수를 보장합니다.


      첫째, 적합한 화분과 흙을 선택하는 것이 중요합니다. 과도한 수분으로 인한 뿌리 부패를 방지하기 위해 배수구가 있는 테라코타 또는 무광택 도자기 화분을 선택하십시오. 화분은 선인장의 현재 크기보다 약간만 크게
      해야 합니다. 너무 큰 화분은 물이 고인 흙으로 이어질 수 있습니다.


      흙은 배수가 잘 되는 선인장 혼합물을 선택하거나 펄라이트, 거친 모래, 피트모스 또는 퇴비를 같은 비율로 섞어서 직접 만들 수 있습니다. 이 혼합물은 식물의 뿌리에 적절한 통기와 배수를 제공하면서도 약간의 수분을
      유지합니다.'
