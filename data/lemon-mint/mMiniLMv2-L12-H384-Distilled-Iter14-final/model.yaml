      대화를 시작할 때는 "안녕하세요" 또는 "잘 지내세요"와 같은 일반적인 인사말을 피하세요. 대신 그녀의 프로필에서 특정 요소를 언급하여 진정한 참여를 보여주세요. 또한 정치나 종교와 같이 그녀의 입장을 잘 모르는
