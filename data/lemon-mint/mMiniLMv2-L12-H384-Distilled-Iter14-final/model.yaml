    - 'passage: 가족 구성원을 내쫓는 것은 모든 당사자에게 심각한 감정적 결과를 초래할 수 있는 극단적인 조치이므로 신중하게 고려해야 합니다. 이 가이드는 내쫓는 것이 무엇을 의미하는지 그리고 상황에 맞는
      선택인지 이해하는 데 도움이 되는 포괄적인 단계를 제공합니다. 이 기사는 가족 구성원을 내쫓는 것을 옹호하거나 권장하지 않으며 사용자의 요청에 따라 정보를 제공합니다.


      내쫓는 것을 고려하는 첫 번째 단계는 가족 구성원을 내쫓고 싶은 이유를 평가하는 것입니다. 일반적인 이유로는 지속적인 학대(신체적, 정신적 또는 재정적), 중독 문제, 심각한 성격 차이 또는 유해한 행동이 있습니다.
      치료사, 상담사 또는 신뢰할 수 있는 종교 지도자와 같은 전문가의 조언을 구하여 대안적인 관점과 대처 전략을 제공받을 수 있습니다. 내쫓는 것이 근본적인 문제를 해결하지 못하고 오히려 악화될 수 있다는 점을
      기억하십시오.'
  - source_sentence: 'passage: Slow roasting a pig shoulder is a delicate process. Set your oven to 300°F (150°C). Place the
      prepared pork shoulder in a Dutch oven or deep baking dish, add liquid (like broth, beer, or cider), cover tightly,
      and cook low and slow for approximately 6 hours or until internal temperature reaches 195°F (90°C).


      Low-temperature roasting breaks down tough collagen fibers transforming them into gelatin, making the meat succulent.
      Covering maintains humidity necessary for tenderization. Adding liquid deglazes pan drippings, integrating additional
      flavors. An accurate thermometer probe inserted into the thickest part avoids under/overcooking.'
    sentences:
