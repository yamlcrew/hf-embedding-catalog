widgetData:
- source_sentence: 'query: 전쟁이 끝난 후에도 인물들은 어떻게 살아갈까요?'
  sentences:
  - 'query: 오타비아노 데글리 우발디니는 어떤 전투에서 승리했습니까?'
  - 'passage: 푸흐스는 언어 사건(Sprachereignis)이 신앙의 형성에서 중요한 역할을 한다고 주장했습니다. 그는 예수의 말씀과 행위가 "언어 사건"을 구성하며, 이 사건을 통해 신앙이 최초로 언어에
    진입하고 "존재의 집"인 언어 안에서 존재적 가능성으로 제공된다고 설명했습니다.


    즉, 예수의 말씀과 행위는 단순한 역사적 사건을 넘어서서 인간의 존재를 새롭게 조명하고 신앙의 가능성을 열어주는 언어적 사건으로 이해되어야 합니다. 푸흐스는 이러한 언어 사건을 통해 하나님의 사랑이 구체화되고,
    미래에 대한 희망과 사랑의 삶을 위한 가능성이 열린다고 주장했습니다.'
  - 'query: 센트럴 아케이드 건설 계획은 어디에서 처음 제안되었습니까?'
- source_sentence: 'query: Is a diploma in journalism an academically recognized qualification?'
  sentences:
  - 'query: 프림로즈 국제 비올라 아카이브는 누가 설립했습니까?'
  - 'query: How is the Billboard Adult Contemporary chart compiled?'
  - 'query: What kind of music is used in Laverne & Shirley with the Fonz?'
- source_sentence: 'query: 제프 존슨은 대학교에서 총 몇 야드를 달렸습니까?'
  sentences:
  - 'query: 토마스 핀크니 대위의 부모는 누구입니까?'
  - 'query: Where was Charles van Rysselberghe born?'
  - 'passage: Theophilos succeeded Michael II in 829 and was the last Byzantine Emperor to support iconoclasm. Theophilos
    waged war against the Arabs throughout the entirety of his reign, being forced to war on two fronts as Sicily had been
    taken and Arab armies continued to march from the East as well. The defence after the invasion of Anatolia by the Abbasid
    Caliph Al-Ma''mun in 830 was led by the Emperor himself, but the Byzantines were defeated and lost several fortresses.
    In 831 Theophilos retaliated by leading a large army into Cilicia and capturing Tarsus. The Emperor returned to Constantinople
    in triumph, but in the autumn he was defeated in Cappadocia. Another defeat in the same province in 833 forced Theophilos
    to sue for peace, which he obtained the next year, after the death of Al-Ma''mun.


    War continued, and Theophilos personally led armies into Mesopotamia in 837, capturing Melitene and Arsamosata with a
    massive army numbering 70,000. Further battles and attacks would take place until Theophilos died of disease in 842. He
    was succeeded by his son Michael III.'
- source_sentence: 'query: What were the nationalities of the people who died in April 1999?'
  sentences:
  - 'query: 패트릭 리히는 몇 번의 NCAA 축구 결승전에 진출했습니까?'
  - 'passage: 데이비드 A. 카리온 바랄트 준장은 2004년부터 2008년까지 아니발 아세베도 비라 푸에르토리코 주지사 행정부에서 푸에르토리코 주방위군 사령관을 역임했습니다. 그는 1957년 9월 17일에 푸에르토리코
    리오 피에드라스에서 태어났습니다. 그는 푸에르토리코 마야궤스의 푸에르토리코 대학교에서 경제학을, 푸에르토리코의 인터아메리칸 대학교 법학대학원에서 법학을 공부했습니다.


    카리온 바랄트 준장은 인터아메리칸 대학교 법학부에서 법학 박사 학위를 받았습니다. 또한 펜실베이니아주 칼라일의 칼라일 배럭스에 있는 미국 육군 전쟁 대학원에서 전략 기획 석사 학위를 취득했으며, 푸에르토리코 마야궤스의
    푸에르토리코 대학교에서 경제학을 전공한 학사 학위를 가지고 있습니다. 버지니아주 샬롯츠빌에서 군 법무관 과정을 수료했습니다. 그는 푸에르토리코 대법원, 미국 항소 법원 제1순회 법원, 푸에르토리코 지방의 미국 지방
    법원에서 변호사 자격을 취득했습니다.'
  - 'query: What sport was he the French champion of?'
- source_sentence: 'passage: Paul Petersen is a former public official in Arizona who was accused of smuggling pregnant women
    from the Marshall Islands to at least three different states, as part of an adoption scheme. He pled guilty to charges
    of human smuggling, communication fraud, fraud and other charges in June 2020 and was sentenced to six years in prison
    in an Arkansas federal case in December 2020. His actions violated a compact between the United States and the Marshall
    Islands, which bans Marshallese people from traveling to the United States for adoptions unless they have a specific visa.


    Petersen used this legal opening and charged couples $35,000 to adopt children from the Islands, and hired individuals
    to recruit pregnant women to give birth in the United States, then give their children up for adoption. In compensation
    the women received $10,000 and the cost of their travel was covered. Some adoptive families denied being made aware that
    Petersen was paying the women involved, and many of the women claim that the only medical care they received was during
    labor pains or while they were giving birth. Petersen illegally accessed state funded medical benefits, and falsified
    residency information, to ensure medical care for the women, totaling nearly $814,000 in Arizona Medicaid funds.'
  sentences:
  - 'query: What are the major tourist attractions in Union Hill-Novelty Hill CDP?'
  - 'passage: 2000년 미국 인구 조사에 따르면 역사적인 남부 중앙 로스앤젤레스의 2.55 평방 마일에 49,728명이 거주하고 있으며, 평방 마일당 평균 19,474명으로 도시와 카운티 모두에서 가장 높은
    인구 밀도를 보입니다. 중간 연령은 23세로, 도시와 카운티 모두에서 젊은 편이며, 0세에서 34세 사이의 주민 비율은 카운티에서 가장 높은 수준에 속합니다.


    이 지역 주민 중 라틴 아메리카인이 87.2%를 차지하고, 흑인은 10.1%, 백인은 1.8%, 아시아인은 1.0%, 기타는 0.6%입니다. 이 지역 주민의 56.3%가 해외에서 태어났으며, 출생지로는 멕시코와
    엘살바도르가 가장 많습니다. 해외 출생 인구 비율은 도시나 카운티 전체와 비교할 때 높은 수준입니다.'
  - 'query: 테리 메이틀랜드는 실제로 범죄를 저질렀습니까?'
