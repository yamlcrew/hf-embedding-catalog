      카리온 바랄트 준장은 인터아메리칸 대학교 법학부에서 법학 박사 학위를 받았습니다. 또한 펜실베이니아주 칼라일의 칼라일 배럭스에 있는 미국 육군 전쟁 대학원에서 전략 기획 석사 학위를 취득했으며, 푸에르토리코
      마야궤스의 푸에르토리코 대학교에서 경제학을 전공한 학사 학위를 가지고 있습니다. 버지니아주 샬롯츠빌에서 군 법무관 과정을 수료했습니다. 그는 푸에르토리코 대법원, 미국 항소 법원 제1순회 법원, 푸에르토리코
