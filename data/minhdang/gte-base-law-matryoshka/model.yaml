- source_sentence: '[''Chỉ định thầu\n1. Chỉ định thầu được áp dụng trong các trường hợp sau đây:\na) Gói thầu cấp bách cần
    triển khai nhằm mục tiêu bảo vệ chủ quyền, an ninh quốc gia; gói thầu cần thực hiện để khắc phục ngay hoặc để xử lý kịp
    thời hậu quả gây ra do thiên tai, hỏa hoạn, tai nạn bất ngờ, sự cố, thảm họa hoặc sự kiện bất khả kháng khác;\nb) Gói
    thầu cung cấp dịch vụ tư vấn, phi tư vấn, hàng hóa, xây lắp cần triển khai ngay để tránh gây nguy hại đến tính mạng và
    tài sản của cộng đồng dân cư trên địa bàn hoặc để không ảnh hưởng nghiêm trọng đến công trình liền kề;\nc) Gói thầu cung
    cấp dịch vụ tư vấn, phi tư vấn, thuốc, hóa chất, vật tư xét nghiệm, thiết bị y tế, linh kiện, phụ kiện, phương tiện, xây
    lắp cần triển khai ngay để phục vụ công tác phòng, chống dịch bệnh hoặc duy trì hoạt động của cơ sở khám bệnh, chữa bệnh
    trong trường hợp cấp bách, tránh gây nguy hại đến tính mạng, sức khỏe người dân; gói thầu mua thuốc, hóa chất, vật tư
    xét nghiệm, thiết bị y tế, linh kiện, phụ kiện để cấp cứu người bệnh trong tình trạng cấp cứu theo quy định của Luật Khám
    bệnh, chữa bệnh trong trường hợp cơ sở khám bệnh, chữa bệnh không có đủ thuốc, hóa chất, vật tư xét nghiệm, thiết bị y
    tế, linh kiện, phụ kiện; gói thầu mua thuốc, thiết bị y tế chỉ có duy nhất một hãng sản xuất trên thị trường;\nd) Gói
    thầu cần thực hiện để bảo vệ bí mật nhà nước;\n...'']'
  sentences:
  - Trong trường hợp nào thì ngân sách trung ương được gia hạn khoản vay ngân quỹ nhà nước?
  - Hành vi trình diễn khiêu dâm trong cấu thành tội sử dụng người dưới 16 tuổi vào mục đích khiêu dâm là gì?
  - Cho phép chỉ định thầu để mua thuốc, thiết bị y tế trong trường hợp khẩn cấp?
- source_sentence: "['\"1. Cuối mỗi học kỳ chính, sinh viên được cảnh báo học tập dựa trên một số điều kiện như sau:\\na)\
    \ Tổng số tín chỉ không đạt trong học kỳ vượt quá 50% khối lượng đã đăng kí học trong học kỳ, hoặc tổng số tín chỉ nợ\
    \ đọng từ đầu khóa học vượt quá 24;\\nb) Điểm trung bình học kỳ đạt dưới 0,8 đối với học kỳ đầu của khóa học, dưới 1,0\
    \ đối với các học kỳ tiếp theo;\\nc) Điểm trung bình tích lũy đạt dưới 1,2 đối với sinh viên trình độ năm thứ nhất, dưới\
    \ 1,4 đối với sinh viên trình độ năm thứ hai, dưới 1,6 đối với sinh viên trình độ năm thứ ba dưới 1,8 đối với sinh viên\
    \ các năm tiếp theo.\\n2. Sinh viên bị buộc thôi học trong các trường hợp sau:\\na) Số lần cảnh báo học tập hoặc mức cảnh\
    \ báo học tập vượt quá giới hạn theo quy định của cơ sở đào tạo;\\nb) Thời gian học tập vượt quá giới hạn theo quy định\
    \ tại khoản 5 Điều 2 của Quy chế này.\\n3. Quy chế của cơ sở đào tạo quy định cụ thể:\\na) Việc lựa chọn áp dụng một số\
    \ điều kiện cảnh báo học tập, giới hạn số lần hoặc mức cảnh báo học tập nhưng không vượt quá 2 lần cảnh báo liên tiếp;\\\
    nb) Quy trình, thủ tục cảnh báo học tập, buộc thôi học; việc thông báo hình thức áp dụng tới sinh viên;\\nc) Việc bảo\
    \ lưu kết quả học tập đã tích luỹ trong trường hợp sinh viên bị buộc thôi học.\"'\n '\"1. Cuối mỗi năm học, sinh viên\
    \ được đánh giá đạt tiến độ học tập bình thường và được học tiếp lên năm học sau nếu đạt cả hai điều kiện sau:\\na) Điểm\
    \ trung bình năm học đạt từ 1,0 trở lên đối với năm học thứ nhất, từ 1,2 trở lên đối với năm thứ hai và từ 1,4 đối với\
    \ năm thứ ba trở đi;\\nb) Số tín chỉ nợ đọng từ đầu khóa không vượt quá 16.\\n2. Sinh viên bị buộc thôi học trong các\
    \ trường hợp sau:\\na) Điểm trung bình năm học đạt dưới 0,8;\\nb) Điểm trung bình tích lũy đạt dưới 1,2 sau 2 năm học,\
    \ dưới 1,4 sau 3 năm học và dưới 1,6 từ sau 4 năm học trở đi;\\nc) Thời gian học tập vượt quá giới hạn theo quy định tại\
    \ khoản 5 Điều 2 của Quy chế này.\\n3. Sinh viên không thuộc diện quy định tại khoản 1 và khoản 2 Điều này được xếp lớp\
    \ học cùng khoá sau để cải thiện kết quả học tập.\\n4. Quy chế của cơ sở đào tạo quy định cụ thể:\\na) Việc lựa chọn áp\
    \ dụng một số điều kiện cảnh báo học tập tương tự quy định đối với đào tạo theo tín chỉ tại khoản 1 Điều 11 của Quy chế\
    \ này;\\nb) Quy trình, thủ tục cảnh báo học tập (nếu có), buộc thôi học; việc thông báo hình thức áp dụng tới sinh viên;\\\
    nc) Việc bảo lưu kết quả học tập đã tích luỹ trong trường hợp sinh viên bị buộc thôi học.\"']"
  sentences:
  - Người lao động có thời gian tham gia bảo hiểm xã hội bắt buộc mà tự tử có được hưởng trợ cấp mai táng không?
  - Giấy chứng nhận sử dụng công cụ hỗ trợ bị mất thì trình tự, thủ tục đề nghị cấp lại được thực hiện như thế nào?
  - Xử lý kết quả học tập theo tín chỉ và niên chế được quy định như thế nào?
- source_sentence: '[''Chuyển ngành, chuyển nơi học, chuyển cơ sở đào tạo, chuyển hình thức học\n1. Sinh viên được xem xét
    chuyển sang học một chương trình, một ngành đào tạo khác, hoặc một phân hiệu khác của cơ sở đào tạo, hoặc từ phân hiệu
    về trụ sở chính khi có đủ các điều kiện sau:\na) Không đang là sinh viên trình độ năm thứ nhất hoặc năm cuối khóa, không
    thuộc diện bị xem xét buộc thôi học và còn đủ thời gian học tập theo quy định tại khoản 5 Điều 2 của Quy chế này;\nb)
    Sinh viên đạt điều kiện trúng tuyển của chương trình, ngành đào tạo, của trụ sở chính (hoặc phân hiệu ) trong cùng khóa
    tuyển sinh;\nc) Cơ sở đào tạo, trụ sở chính (hoặc phân hiệu) có đủ các điều kiện bảo đảm chất lượng, chưa vượt quá năng
    lực đào tạo đối với chương trình, ngành đào tạo đó theo quy định hiện hành của Bộ Giáo dục và Đào tạo;\nd) Được sự đồng
    ý của thủ trưởng các đơn vị chuyên môn phụ trách chương trình, ngành đào tạo, người phụ trách phân hiệu (nơi chuyển đi
    và chuyến đến) và của hiệu trưởng cơ sở đào tạo.\n2. Sinh viên được xem xét chuyển cơ sở đào tạo khi có đủ các điều kiện
    sau:\na) Không đang là sinh viên trình độ năm thứ nhất hoặc năm cuối khóa, không thuộc diện bị xem xét buộc thôi học và
    còn đủ thời gian học tập theo quy định tại khoản 5 Điều 2 của Quy chế này;\nb) Sinh viên đạt điều kiện trúng tuyển của
    chương trình, ngành đào tạo cùng khóa tuyển sinh tại nơi chuyển đến;\nc) Nơi chuyển đến có đủ các điều kiện bảo đảm chất
    lượng, chưa vượt quá năng lực đào tạo đối với chương trình, ngành đào tạo đó theo quy định hiện hành của Bộ Giáo dục và
    Đào tạo;\nd) Được sự đồng ý của hiệu trưởng cơ sở đào tạo xin chuyển đi và cơ sở đào tạo xin chuyển đến.\n3. Sinh viên
    được xem xét chuyển từ đào tạo theo hình thức chính quy sang hình thức vừa làm vừa học hoặc đào tạo từ xa của cơ sở đào
    tạo nếu còn đủ thời gian học tập theo quy định đối với hình thức chuyển đến.\n4. Quy chế của cơ sở đào tạo quy định chi
    tiết thẩm quyền, điều kiện, thủ tục chuyển chương trình, ngành đào tạo, chuyển nơi học, chuyển cơ sở đào tạo hoặc chuyển
    hình thức học; việc công nhận kết quả học tập hoặc chuyển đổi tín chỉ đã tích lũy đối cho sinh viên thuộc các trường hợp
    này.'']'
  sentences:
  - Điều kiện để được chuyển ngành, chuyển nơi học, chuyển cơ sở đào tạo, chuyển hình thức học đối với sinh viên?
  - Chi hỗ trợ học nghề cho người sau cai nghiện ma túy được thực hiện như thế nào?
  - Nhiệm vụ của Hiệp hội Nhiên liệu sinh học Việt Nam là gì?
- source_sentence: "['\"4. Thủ tục chứng thực chữ ký quy định tại Khoản 1, 2 và 3 Điều này cũng được áp dụng đối với các trường\
    \ hợp sau đây:\\na) Chứng thực chữ ký của nhiều người trong cùng một giấy tờ, văn bản;\\nb) Chứng thực chữ ký của người\
    \ khai lý lịch cá nhân;\\nc) Chứng thực chữ ký trong giấy tờ, văn bản do cá nhân tự lập theo quy định của pháp luật;\\\
    nd) Chứng thực chữ ký trong Giấy ủy quyền đối với trường hợp ủy quyền không có thù lao, không có nghĩa vụ bồi thường của\
    \ bên được ủy quyền và không liên quan đến việc chuyển quyền sở hữu tài sản, quyền sử dụng bất động sản.\"'\n '\"Điều\
    \ 24. Thủ tục chứng thực chữ ký\\n2. Người thực hiện chứng thực kiểm tra giấy tờ yêu cầu chứng thực, nếu thấy đủ giấy\
    \ tờ theo quy định tại Khoản 1 Điều này, tại thời điểm chứng thực, người yêu cầu chứng thực minh mẫn, nhận thức và làm\
    \ chủ được hành vi của mình và việc chứng thực không thuộc các trường hợp quy định tại Điều 25 của Nghị định này thì yêu\
    \ cầu người yêu cầu chứng thực ký trước mặt và thực hiện chứng thực như sau:\\na) Ghi đầy đủ lời chứng chứng thực chữ\
    \ ký theo mẫu quy định;\\nb) Ký, ghi rõ họ tên, đóng dấu của cơ quan, tổ chức thực hiện chứng thực và ghi vào sổ chứng\
    \ thực.\\nĐối với giấy tờ, văn bản có từ (02) hai trang trở lên thì ghi lời chứng vào trang cuối, nếu giấy tờ, văn bản\
    \ có từ 02 (hai) tờ trở lên thì phải đóng dấu giáp lai.\"']"
  sentences:
  - Bí thư Thường trực Trung ương Đoàn Thanh niên Cộng sản Hồ Chí Minh được nhận mức phụ cấp phục vụ bao nhiêu?
  - Định giá lại tài sản lần thứ hai trong vụ án hình sự được thực hiện khi nào?
  - Chứng thực chữ ký cho giấy uỷ quyền sẽ được thực hiện như thế nào?
- source_sentence: '[''Mức giảm thời hạn chấp hành án phạt tù\n1. Phạm nhân bị phạt tù chung thân, lần đầu được giảm xuống
    ba mươi năm.\n2. Phạm nhân bị phạt tù từ ba mươi năm trở xuống, mỗi lần có thể được giảm từ một tháng đến ba năm. Trường
    hợp được giảm ba năm phải là những phạm nhân chấp hành nghiêm chỉnh Nội quy trại giam, trại tạm giam, nhà tạm giữ và lập
    công hoặc có thành tích đặc biệt xuất sắc trong lao động, học tập cải tạo.\n3. Mỗi năm một phạm nhân chỉ được xét giảm
    thời hạn chấp hành án phạt tù một lần, khoảng cách giữa hai lần xét giảm ít nhất là một năm. Trường hợp đã được giảm mà
    thời hạn tù còn lại không đủ một năm thì năm tiếp theo có thể đề nghị xét giảm sớm hơn trước một đợt, nhưng vẫn phải bảo
    đảm mỗi năm chỉ được xét giảm một lần.\nTrường hợp sau khi đã được giảm thời hạn mà có lý do đặc biệt đáng được khoan
    hồng như lập công hoặc mắc bệnh hiểm nghèo thì có thể được xét giảm thêm nhưng không được quá hai lần trong một năm.\n4.
    Mỗi phạm nhân có thể được giảm thời hạn chấp hành án phạt tù nhiều lần, nhưng phải bảo đảm thời hạn thực tế chấp hành
    án phạt tù được một phần hai mức hình phạt tù có thời hạn đã tuyên hoặc hai mươi năm đối với hình phạt tù chung thân.'']'
  sentences:
  - Mỗi năm thì phạm nhân được xét giảm thời hạn chấp hành án phạt tù bao nhiêu lần?
  - Giám đốc Quỹ bảo tồn di sản Huế do ai bổ nhiệm?
  - Chấp hành viên có bắt buộc ký tên vào văn bản thỏa thuận thi hành án dân sự của đương sự hay không?
