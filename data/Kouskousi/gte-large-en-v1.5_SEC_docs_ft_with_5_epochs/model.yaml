    \ ensuring lifestyle, preparing for the unexpected\nor leaving a legacy. RiverSource seeks to partner with our advisors\
    \ to address clients’ goals and long-term needs at a differentiated level and provide a strong risk\nprofile.\nRetirement\
    \ Solutions\nThrough our advisors, we provide \nRiverSource\n annuity products to clients to help individuals address\
