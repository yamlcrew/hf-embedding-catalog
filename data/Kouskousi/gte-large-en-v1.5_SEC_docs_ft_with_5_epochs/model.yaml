      \ and medium-sized businesses and governmental clients, as well as the accounts of high net worth individuals and smaller\n\
      institutional clients, including tax-exempt and not-for-profit organizations for which we receive management and performance-related\
      \ fees.\n•\nOther separately managed accounts, including those offered through models that represent assets under advisement.\n\
      •\nManagement of owned assets such as assets held in the general account of our RiverSource Life companies, Ameriprise\
      \ Certificate Company and Ameriprise\nBank.\n•\nManagement of CLOs, which includes providing collateral management services\
      \ to special purpose vehicles that primarily invest in syndicated bank loans and\nissue multiple tranches of securities\
      \ collateralized by the assets for which we earn fees based on the value of assets and performance-based fees.\n•\n\
      Private funds of various types where we provide investment management and related services to private, pooled investment\
      \ vehicles organized as limited\npartnerships, limited liability companies, or other entities for which we may receive\
      \ fees based on the value of the assets or performance-based fees.\n•\nCollective funds and separately managed accounts\
      \ sponsored by Ameriprise Trust Company (“ATC”) and offered to certain qualified institutional clients such\nas retirement,\
      \ pension, and profit-sharing plans for which we receive management fees.\n•\nSub-advised accounts for certain U.S.\
      \ and non-U.S. funds, private banking individually managed accounts, common trust funds, and other portfolios sponsored\n\
      or advised by other firms for which we earn management fees and possibly performance-based fees.\nDistribution\nWe maintain\
      \ distribution teams and capabilities that aid the sales, marketing, and support of the products and services of our\
      \ global asset management business.\nThese distribution activities are generally organized into two major categories:\
      \ retail distribution and institutional/high net worth distribution. However, alternatives\nand certain other areas\
      \ have a level of specialized distribution.\nOur Segments - Retirement & Protection Solutions\nRiverSource solutions\
      \ are one way we deliver on the Ameriprise client experience and \nConfident Retirement\n approach. We offer clients\
      \ annuities, life insurance and\ndisability income insurance products to meet their needs or current stage in life—whether\
      \ that is covering essentials, ensuring lifestyle, preparing for the unexpected\nor leaving a legacy. RiverSource seeks\
      \ to partner with our advisors to address clients’ goals and long-term needs at a differentiated level and provide a\
      \ strong risk\nprofile.\nRetirement Solutions\nThrough our advisors, we provide \nRiverSource\n annuity products to\
      \ clients to help individuals address their asset accumulation and income goals. Our advisor\nnetwork is the only distributor\
      \ of new \nRiverSource\n annuity products, although advisors offer fixed, variable, and structured annuities from selected\
      \ unaffiliated\ninsurers. As part of the continued evolution of the business model for our Retirement & Protection Solutions\
      \ segment, we focus on the accumulation solutions\nclients want (such as the structured variable annuity, a registered\
      \ index-linked annuity).\nRevenues for our variable annuity products are primarily earned as fees based on a contractholder’s\
      \ benefit base, contract value or separate account values, which is\nimpacted by both market movements and net asset\
      \ flows. We also earn net investment income on general account assets supporting reserves for non-life contingent\n\
      payout annuities, structured variable annuities, certain guaranteed benefits and fixed investment options offered with\
      \ variable annuities, and on capital supporting\nthe business. In addition, we receive fees charged on assets allocated\
      \ to our separate accounts to cover administrative costs and a portion of the management fees\nfrom the underlying investment\
      \ accounts in which assets are invested. Revenues for our payout annuities with a life contingent feature are earned\
      \ as premium\nrevenue. Intersegment revenues for this segment reflect fees paid by our Asset Management segment for\
      \ marketing support and other services provided in\nconnection with the availability of VIT Funds. Intersegment expenses\
      \ for this segment include distribution expenses for services provided by our Advice & Wealth\nManagement segment, as\
      \ well as expenses for investment management services provided by our Asset Management segment. All intersegment activity\
      \ is eliminated\nin our consolidated results.\nProtection\nWe provide life and disability income insurance products\
      \ to address the protection and risk management needs of our retail clients. New \nRiverSource\n insurance\nproducts\
      \ are exclusively offered through our advisor network. Our advisors also offer insurance products of unaffiliated carriers.\
      \ The primary sources of revenues for\nour protection business are premiums, fees and charges we receive to assume insurance-related\
      \ risk. We earn net investment income on owned assets supporting\ninsurance reserves and on capital supporting the business."
