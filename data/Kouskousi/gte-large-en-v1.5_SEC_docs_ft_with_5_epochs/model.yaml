  - "Index\nAmeriprise Financial, Inc.\nIntellectual Property\nWe rely on a combination of contractual rights and copyright,\
    \ trademark, and patent registrations and trade secret laws to establish and protect our intellectual\nproperty. In the\
    \ U.S. and other jurisdictions, we have established and registered, or filed applications to register, certain trademarks\
    \ and service marks that we\nconsider important to the marketing of our products and services, including but not limited\
    \ to the \nAmeriprise Financial, Threadneedle, RiverSource, Columbia\nThreadneedle and Columbia Threadneedle Investments\
    \ \nbrands. We have in the past and will continue to establish and protect our intellectual property rights.\nEnterprise\
    \ Risk Management\nEnterprise risk management and our risk management program is an important component in how we manage\
    \ our business. All operating subsidiaries of Ameriprise\nmust comply with our enterprise risk management policy and framework,\
    \ which: (i) establishes a structure for effective enterprise risk management, including\noversight and governance; (ii)\
    \ delineates key constituent roles and responsibilities; and (iii) imposes a number of core risk management processes.\
    \ The enterprise risk\nmanagement policy is designed to manage risks that may impact Ameriprise, including capital, credit,\
    \ market, liquidity, operational, strategic, reputational, legal and\ncompliance, and product. The enterprise risk management\
    \ policy is supported by underlying risk policies at business units that provide further detail on the business\nunit’s\
    \ risk governance, appetite, and tolerance.\nRegulation\nVirtually all aspects of our business, including the activities\
    \ of the parent company and our subsidiaries, are subject to various federal, state, local and foreign laws\nand regulations.\
    \ These laws and regulations provide broad regulatory, administrative and enforcement powers to supervisory agencies and\
    \ other bodies, including\nU.S. federal and state regulatory and law enforcement agencies, foreign government agencies\
    \ or regulatory bodies and U.S. and foreign securities exchanges. The\ncosts of complying with such laws and regulations\
    \ are significant and increasing, and the consequences for the failure to comply may include civil or criminal\ncharges,\
    \ fines, censure, the suspension of individual employees, restrictions on or prohibitions from engaging in certain lines\
    \ of business (or in certain states or\ncountries), revocation of certain registrations and reputational damage. We have\
    \ made and expect to need to continue to make significant investments in our\ncompliance and supervision processes, enhancing\
    \ policies, procedures and oversight to monitor our compliance with the numerous legal and regulatory requirements\napplicable\
    \ to our business.\nWe operate in a highly scrutinized regulatory environment and it remains subject to change. Regulatory\
    \ developments, both in and outside of the U.S., have resulted\nor are expected to result in greater regulatory oversight\
    \ and internal compliance obligations for firms across the financial services industry. In addition, we continue\nto see\
    \ enhanced legislative and regulatory interest regarding retirement investing and fiduciary initiatives, as well as environmental,\
    \ social and governance (“ESG”)\nconsideration and responsible investing; cybersecurity and resilience; the use of artificial\
    \ intelligence; responsible information and data collection, storage and use;\nfinancial crime prevention; and privacy\
    \ matters, and we will continue to closely review and monitor any legislative or regulatory proposals and changes. States\
    \ in the\nU.S. and jurisdictions outside the U.S. continue to add new complexity to the patchwork of laws and regulations\
    \ already in existence relating to privacy,\ncybersecurity, artificial intelligence and other areas and we are expecting\
    \ similar new laws at the federal level and in multiple states in the U.S. The same complexity\nresulting from multiple\
    \ standards exists for retirement investing where individual states and federal regulators continue to propose or enact\
    \ their own rules. These\nlegal and regulatory changes have impacted and may in the future impact how we are regulated\
    \ and how we operate and govern our businesses.\nThe discussion and overview set forth below provides a general framework\
    \ of the primary laws and regulations impacting our businesses. Certain of our subsidiaries\nmay be subject to one or\
    \ more elements of this regulatory framework depending on the nature of their business, the products and services they\
    \ provide and the\ngeographic locations in which they operate. To the extent the discussion includes references to statutory\
    \ and regulatory provisions, it is qualified in its entirety by\nreference to these statutory and regulatory provisions\
    \ and is current only as of the date of this report.\n10"
