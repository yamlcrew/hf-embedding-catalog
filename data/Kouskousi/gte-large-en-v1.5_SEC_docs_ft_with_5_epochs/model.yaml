      \ Risk Management\nEnterprise risk management and our risk management program is an important component in how we manage\
      \ our business. All operating subsidiaries of Ameriprise\nmust comply with our enterprise risk management policy and\
      \ framework, which: (i) establishes a structure for effective enterprise risk management, including\noversight and governance;\
      \ (ii) delineates key constituent roles and responsibilities; and (iii) imposes a number of core risk management processes.\
      \ The enterprise risk\nmanagement policy is designed to manage risks that may impact Ameriprise, including capital,\
      \ credit, market, liquidity, operational, strategic, reputational, legal and\ncompliance, and product. The enterprise\
      \ risk management policy is supported by underlying risk policies at business units that provide further detail on the\
      \ business\nunit’s risk governance, appetite, and tolerance.\nRegulation\nVirtually all aspects of our business, including\
      \ the activities of the parent company and our subsidiaries, are subject to various federal, state, local and foreign\
