    - 'Our comprehensive hedging program focuses mainly

      on first order sensitivities of assets and liabilities: Equity Market Level (Delta), Interest Rate Level (Rho) and Volatility
      (Vega). Additionally, various second order

      sensitivities are managed. We use various options, swaptions, swaps and futures to manage risk exposures. The exposures
      are measured and monitored daily, and

      adjustments to the hedge portfolio are made as necessary.

      To evaluate interest rate and equity price risk we perform sensitivity testing which measures the impact on pretax income
      from the sources listed below for a 12-month

      period following a hypothetical 100 basis point increase in interest rates or a hypothetical 10% decline in equity prices.
      The interest rate risk test assumes a sudden

      100 basis point parallel shift in the yield curve, with rates then staying at those levels for the next 12 months. The
      equity price risk test assumes a sudden 10% drop in

      equity prices, with equity prices then staying at those levels for the next 12 months. In estimating the values of variable
      annuities, indexed annuities, stock market

      certificates, indexed universal life (“IUL”) insurance and the associated hedging instruments, we assume no change in
      implied market volatility despite the 10% drop

      in equity prices.

      65'
