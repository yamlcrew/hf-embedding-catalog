  - "Index\nAmeriprise Financial, Inc.\nOther revenues increased $84 million, or 58%, for 2022 compared to the prior year\
    \ primarily reflecting the yield on deposit receivables arising from reinsurance\ntransactions.\nExpenses\nRemeasurement\
    \ (gains) losses of future policy benefit reserves increased $46 million for 2022 compared to the prior year primarily\
    \ reflecting an increase in expense on\nLTC insurance as policy and claim terminations returned to more normalized levels\
    \ compared to the prior year which benefited from COVID-19 related impacts.\nGeneral and administrative expense, which\
    \ excludes integration and restructuring charges and expenses attributable to CIEs, \ndecreased $39 million, or 15%, to\
    \ 2022\ncompared to the prior year primarily due to a larger unfavorable change in the mark-to-market impact on share-based\
    \ compensation expenses in the prior year due to\nshare price appreciation.\nFair Value Measurements\nWe report certain\
    \ assets and liabilities at fair value; specifically, separate account assets, derivatives, market risk benefits, embedded\
    \ derivatives and most\ninvestments and cash equivalents. Fair value assumes the exchange of assets or liabilities occurs\
    \ in orderly transactions and is not the result of a forced liquidation\nor distressed sale. We include actual market\
    \ prices, or observable inputs, in our fair value measurements to the extent available. Broker quotes are obtained when\n\
    quotes from pricing services are not available. We validate prices obtained from third parties through a variety of means\
    \ such as: price variance analysis, subsequent\nsales testing, stale price review, price comparison across pricing vendors\
    \ and due diligence reviews of vendors. See Note 16 to the Consolidated Financial Statements\nfor additional information\
    \ on our fair value measurements.\nFair Value of Liabilities and Nonperformance Risk\nCompanies are required to measure\
    \ the fair value of liabilities at the price that would be received to transfer the liability to a market participant\
    \ (an exit price). Since\nthere is not a market for our obligations of our market risk benefits, fixed deferred indexed\
    \ annuities, structured variable annuities, and IUL insurance, we consider the\nassumptions participants in a hypothetical\
    \ market would make to reflect an exit price. As a result, we adjust the valuation of market risk benefits, fixed deferred\n\
    indexed annuities, structured variable annuities, and IUL insurance by updating certain contractholder assumptions, adding\
    \ explicit margins to provide for risk, and\nadjusting the rates used to discount expected cash flows to reflect a current\
    \ market estimate of our nonperformance risk. The nonperformance risk adjustment is\nbased on observable market data adjusted\
    \ to estimate the risk of our life insurance company subsidiaries not fulfilling these liabilities. Consistent with general\
    \ market\nconditions, this estimate resulted in a spread over the U.S. Treasury curve as of December 31, 2023. As our\
    \ estimate of this spread widens or tightens, the liability will\ndecrease or increase, respectively. If this nonperformance\
    \ credit spread moves to a zero spread over the U.S. Treasury curve, the reduction to future total equity\nwould be approximately\
    \ $795 million, net of the reinsurance accrual and income taxes (calculated at the statutory tax rate of 21%), based on\
    \ December 31, 2023\ncredit spreads.\nLiquidity and Capital Resources\nOverview\nAs of December 31, 2023 and 2022, we\
    \ had Available Capital for Capital Adequacy of $5.4 billion and $5.2 billion, respectively. Available Capital for Capital\
    \ Adequacy\nbest reflects the available capital resources of our operations.\nWe maintained substantial liquidity during\
    \ the year ended December 31, 2023. At December 31, 2023 and 2022, we had $7.5 billion and $7.0 billion, respectively,\
    \ in\ncash and cash equivalents excluding CIEs and other restricted cash on a consolidated basis.\nAt December 31, 2023\
    \ and 2022, the parent company had $544 million and $389 million, respectively, in cash, cash equivalents, and unencumbered\
    \ liquid securities.\nLiquid securities predominantly include U.S. government agency mortgage back securities. Additional\
    \ sources of liquidity include a line of credit with an affiliate up\nto $727 million and an unsecured revolving committed\
    \ credit facility for up to $1.0 billion that expires in June 2026. Management’s estimate of liquidity available to the\n\
    parent company in a volatile and uncertain economic environment as of December 31, 2023 was $1.8 billion which includes\
    \ cash, cash equivalents, unencumbered\nliquid securities, the line of credit with an affiliate and a portion of the committed\
    \ credit facility."
