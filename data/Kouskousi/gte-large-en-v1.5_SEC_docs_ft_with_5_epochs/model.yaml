      Expenses

      Distribution expenses decreased $93 million, or 2%, for 2022 compared to the prior year primarily lower average equity
      markets and decreased transactional activity.

      Interest credited to fixed accounts increased $65 million, or 11%, for 2022 compared to the prior year primarily reflecting
      the following items:

      •

      An $23 million decrease in expense from the unhedged nonperformance credit spread risk adjustment on IUL benefits. The
      favorable impact of the

      nonperformance credit spread was $13 million for 2022 compared to an unfavorable impact of $10 million for the prior
      year.

      •

      A $105 million increase in expense from other market impacts on IUL benefits, net of hedges, which was an expense of
      $51 million for 2022 compared to a benefit

      of $54 million for the prior year. The increase in expense was primarily due to an increase in the IUL embedded derivative
      in the current year period, which

      reflected higher option costs due to a higher new money rate, compared to a decrease in the IUL embedded derivative
      in the prior year period, which reflected

      lower option costs due to higher discount rates.

      Benefits, claims, losses and settlement expenses increased $398 million for 2022 compared to the prior year primarily
      reflecting the following items:

      •

      A $1.2 billion decrease in expense associated with the reinsurance transaction for life contingent payout annuity policies
      in the prior year.

      •

      An $806 million decrease in expense from market impacts on SVA embedded derivative, net of hedges in place to offset
      those risks. This decrease was the result

      of a favorable $1.0 billion change in the market impact on the SVA embedded derivative, partially offset by an unfavorable
      $224 million change in the market

      impact on derivatives hedging the SVA embedded derivative. The main market driver contributing to these changes was
      the equity market impact on the SVA

      embedded derivative net of the impact on the corresponding hedge assets, which resulted in a benefit for 2022 compared
      to an expense in the prior year.

      Remeasurement (gains) losses of future policy benefit reserves increased $53 million for 2022 compared to the prior
      year primarily reflecting an increase in expense on

      LTC insurance as policy and claim terminations returned to more normalized levels compared to the prior year period
      which benefited from COVID-19 related impacts.

      Change in fair value of market risk benefits increased $424 million for 2022 compared to the prior year primarily reflecting
      the following items:

      •

      A $769 million increase in expense from other market impacts on variable annuity guaranteed benefits, net of hedges
      in place to offset those risks. This decrease

      was the result of an unfavorable $865 million change in the market impact on variable annuity guaranteed benefits reserves,
      partially offset by a favorable

      $96 million change in the market impact on derivatives hedging the variable annuity guaranteed benefits. The main market
      drivers contributing to these changes

      are summarized below:

      •

      Equity market impact on the variable annuity guaranteed benefits liability net of the impact on the corresponding hedge
      assets resulted in an expense for

      2022 compared to a benefit in the prior year.

      •

      Interest rate and bond impact on the variable annuity guaranteed benefits liability net of the impact on the corresponding
      hedge assets resulted in a benefit

      for 2022 compared to an expense in the prior year.

      •

      Volatility impact on the variable annuity guaranteed benefits liability net of the impact on the corresponding hedge
      assets resulted in a higher expense for

      2022 compared to the prior year.

      •

      Other unhedged items, including the difference between the assumed and actual underlying separate account investment
      performance, transaction costs

      and various behavioral items, were a higher net expense for 2022 compared to the prior year.

      General and administrative expense increased $288 million, or 8%, 2022 the prior year primarily reflecting the operating
      expenses of the acquired BMO Global Asset

      Management (EMEA) business and higher integration related expenses, partially offset by disciplined expense management
      and reengineering, lower performance fee

      related compensation and a favorable foreign exchange impact.

      Income Taxes

      Our effective tax rate was 19.9% for 2022 compared to 18.3% for the prior year. See Note 24 to our Consolidated Financial
      Statements for additional discussion on

