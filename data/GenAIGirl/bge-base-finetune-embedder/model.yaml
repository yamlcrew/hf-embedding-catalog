- source_sentence: What is significant about New Delhi's history?
  sentences:
  - As of the 2011 India census, Arackal had a population of 16,739 with 7,963 males and 8,776 females.
  - Edappadi K. Palaniswami is an Indian politician. He is the current and 8th Chief Minister of Tamil Nadu. He is the chief
    minister since 16 February 2017. Palaniswami is a senior leader of All India Anna Dravida Munnetra Kazhagam.
  - New Delhi () is the capital of India and a union territory of the megacity of Delhi. It has a very old history and is
    home to several monuments where the city is expensive to live in. In traditional Indian geography it falls under the North
    Indian zone. The city has an area of about 42.7 km. New Delhi has a population of about 9.4 Million people.
- source_sentence: What was the significance of the Pandyan kingdom in ancient Tamil history?
  sentences:
  - Ektara (literally "one-string", also called iktar, ', yaktaro gopichand) is a one-string instrument. It is most often
    used in traditional music from Bangladesh, India , Egypt, and Pakistan.
  - Polygar War or Palayakarar Wars refers to the wars fought between the Polygars ("Palayakarrars") of former Madurai Kingdom
    in Tamil Nadu, India and the British colonial forces between March 1799 to May 1802. The British finally won after carrying
    out long and difficult protracted jungle campaigns against the Polygar armies and finally defeated them. Many lives were
    lost on both sides and the victory over Polygars made large part of territories of Tamil Nadu coming under British control
    enabling them to get a strong hold in India.
  - The Pandyan kingdom பாண்டியர் was an ancient Tamil state in South India of unknown antiquity. Pandyas were one of the
    three ancient Tamil kingdoms (Chola and Chera being the other two) who ruled the Tamil country from pre-historic times
    until end of the 15th century. They ruled initially from Korkai, a sea port on the southern most tip of the Indian peninsula,
    and in later times moved to Madurai.
- source_sentence: Can you tell me about Louis-Frédéric Nussbaum's contributions?
  sentences:
  - Shipkila is a mountain pass and border post on the Republic of India-People's Republic of China border. It is through
    this pass which the river Sutlej enters India (from the Tibet Autonomous Region).
  - Suvra Mukherjee (September 17, 1940 – August 18, 2015) was the First Lady of India from 2012 until her death in 2015.
    She was the wife of Indian President Pranab Mukherjee from 1957 until her death in 2015.
  - Louis-Frédéric Nussbaum (1923-1996 ), also known as Louis Frédéric or Louis-Frédéric, was a French scholar, art historian,
    writer, translator and editor. He was a specialist in the cultures of Asia, especially India and Japan.
- source_sentence: What were the original goals of Dravida Kazhagam?
  sentences:
  - Sir Patrick Geddes (2 October 1854 – 17 April 1932) was a Scottish biologist, sociologist, geographer, philanthropist
    and pioneering town planner. He developed a new urban theoris, including the second master plan of Jerusalem in 1919.
    He also developed the first master plan of Tel Aviv in 1925 that included the Bauhaus architecture in the White City of
    Tel Aviv. His other work was in India during the period of British India. A small memorial board to Patrick Geddes is
    under a bridge of the Heil HaShirion Street in Tel Aviv.
  - Dravida Kazhagam (or Dravidar Kazhagam, "Dravidian Organization") was one of the first Dravidian parties in India. The
    party was founded by E.V. Ramasamy, also called Thanthai Periyar. Its original goals were to eradicate the ills of the
    existing caste system including untouchability and to obtain a "Dravida Nadu" (Dravidian nation) from the Madras Presidency
    i.e., a separate nation from India for Dravidian people alone.
  - Dheeran Chinnamalai ( born as Theerthagiri Sarkkarai Mandraadiyaar [Sarkkarai Mandraadiyaar Refers Payiran Kulam] or Theerthagiri
    Gounder on April 17, 1756) was a Kongu chieftain and Palayakkarar from Tamil Nadu who rose up in revolt against the British
    East India Company in the Kongu Nadu, Southern India. He was born in Melapalayam, near Erode in the South Indian state
    of Tamil Nadu.
- source_sentence: Can you tell me about the literary contributions of Chattopadhyay?
  sentences:
  - The Election Commission of India held indirect 2nd presidential elections of India on May 6, 1957. Dr. Rajendra Prasad
    won his re-election with 459,698 votes over his rivals Chowdhry Hari Ramwho got 2,672 votes and Nagendra Narayan Das who
    got 2,000 votes. Rajendra Prasad, has been the only person, to have won and served two terms, as President of India.
  - S. Rajendra Babu (born 1 June 1939) is an Indian judge. He was the 34th Chief Justice of India from May to June 2004.
    He also served as the chairperson of National Human Rights Commission of India.
  - Rishi Bankim Chandra Chattopadhyay (27 June 1838 – 8 April 1894) was a Bengali writer, poet and journalist. He was the
    composer of India's national song "Vande Mataram". It was originally a Bengali and Sanskrit "stotra" (hymn) portraying
    India as a mother goddess. The song inspired the activists during the Indian Independence Movement. Chattopadhyay wrote
    13 novels. He also wrote several 'serious, serio-comic, satirical, scientific and critical articles in Bengali. His works
    were widely translated into other regional languages of India.
