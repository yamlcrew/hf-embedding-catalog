widgetData:
- source_sentence: 김옥균의 시신은 어떻게 처리되었나요?
  sentences:
  - 그가 일본에 남긴 머리카락과 의복을 김옥균의 호위역이었던 와다 엔지로에게 비밀리로 넘겨 받으며 미야자키 도텐에 의해 아사쿠사 혼간지로 안치한 뒤 제사를 지냈다. 그의 연인인 오타마는 후일 어느 일본인 기업인과 결혼하였고,
    그의 다른 연인인 마츠노 나카는 딸 사다를 데리고 행상과 노동을 하면서 겨우 생계를 이어갔다. 1910년(융희 4년) 한일 병합 이후 조선에서는 그가 생존하여 개혁정책을 펼쳤더라면 한일 병합은 일어나지 않았을 것이라는
    여론이 나타나면서 재평가되기 시작하였다. 유길준, 박영효, 윤치호 등은 그가 암살당하지 않고 오래 살았다면 한일 병합을 막았을 것이라고 내다봤다. 암장한 묘소는 한일 합방 이후 충청남도 아산군 영인면 아산리 143번지(현,
    아산시 영인면 아산리 143번지)로 이전되었다.
  - 유해가 선박으로 옮겨졌고, 조선에 도착한 그의 시신은 강화도 양화진에서 능지처참(陵遲處斬)을 당하고, 머리는 저잣거리에 효시된 후 실종되었다. 효시(梟示)된 그의 목에는 '모반(謀反) 대역부도(大逆不道) 죄인 옥균(玉均)
    당일 양화진두(楊花津頭) 능지처참'이라고 쓰여진 커다란 천이 나부끼고 있었다.
  - 간에이 8년(1631년), 야마다 부교로 전임되었고, 간에이 10년(1633년)에는 그 역직 수당의 영지로 이세 국 내의 3천 석 소령을 추가로 받고 9천 석의 영주가 되었다. 그해 유키쓰구는 후타미 향()을 이세
    신궁에 기부하도록 쇼군 도쿠가와 이에미쓰에게 진언하였다. 시마 국 도바 번주였던 구키씨()가 지난해의 간에이 7년(1630년)에 다른 곳으로 전봉되면서, 그때까지 구키 가문이 횡령했던 6개 촌 내 2천 132석의
    소령을 이세 신궁 소속의 소령으로 복귀시켰다. 나아가 전임 야마다 부교였던 오카다 요시아쓰()의 대부터 시작되었던 야마다 봉행소()의 이전을 추진하였다. 이에 따라 간에이 12년(1635년)에는 와타라이 군 아라타키
    촌()에서 고바야시 촌()으로 관청을 이전하였고, 이듬해의 간에이 13년(1636년)에는 선박 창고의 이전도 완료하였다.
- source_sentence: 궁궐 생활을 떠나기 위해 어떤 방법을 사용했나요?
  sentences:
  - 델타는 네 개의 별로 이루어진 사중성계로, 근접 쌍성 두 개로 이루어져 있다. 넷 중에서 가장 밝은 돛자리 델타 A는 분광형 A의 주계열성으로 겉보기 등급은 +2.02이다. A의 반성 B는 겉보기 등급은 훨씬 어두운
    +5.01이며 A와는 천구 상에서 2.6초각 떨어져 있다.
  - 그녀는 30세가 넘어서 천주교를 접했다. 천주교가 알려지고 그녀에게 광대한 빛으로 다가왔으므로, 그녀는 궁궐에서의 생활에 만족하지 못하게 되었고 삶에 있어서 보다 숭고한 의미를 찾았다. 그녀는 그것을 더 잘 알고
    믿기 위하여 교리를 더 깊게 공부하기를 원했다. 그러나, 궁궐은 사치와 미신으로 인해 진리의 실천을 위한 장소가 없었다. 그 당시, 궁녀는 매우 심각한 이유를 제외하고는 죽을 때까지 궁궐에서 사는 것이 관습이었기
    때문에, 그녀가 그곳을 빠져나오기란 어려운 일이었다. 그러나 그녀는 교회의 가르침을 따라 여생을 보내기로 결심했고, 병을 가장하여 마침내 출궁 허가를 받았다.
  - 6월 22일, 의회의 사자 로메이후가 국왕 일가를 투옥하라는 명령서를 가지고 왔다. 모두가 드러난, 루이 16세는 브이에가 구원하러 올 시간을 벌어 보려고 시도했다. 국왕은 피로하기 때문에 파리로 떠날 때까지 2
    ~ 3시간의 휴식을 원한다고 말했다. 로메이후는 라파예트 부관으로 내심은 왕당파였기 때문에 이것을 받아들였다. 그러나 다른 사자인 바이욘이 거부를 하여 “파리로, 파리로”라고 군중을 부추겼다. 군중 노성과 열기에
    공포를 느낀 촌장과 마을 의원, 상점주가 출발을 호소했기 때문에, 국왕도 결국 어쩔 수 없었고, 국왕 일가는 마차 안에 타고 있을 수 밖에 없었다. 마리 앙투아네트는 굴욕으로 입술을 깨물며 입을 닫고 있었다. 불과
    반시간 후 브이에 후작이 부대를 데리고 바렌 마을 앞까지 와서 국왕이 이미 굴복한 것을 알게 되었다. 그는 발을 돌려 국경을 넘어 망명했다.
- source_sentence: 1990년에 발행된 이라크 디나르 지폐의 액면가는 무엇인가요?
  sentences:
  - 요르단은 1995년 10월 23일부터 1 미국 달러 = 0.709 요르단 디나르의 고정 환율을 실시하고 있다. 1, 5, 10 키르시, ¼, ½, 1 디나르짜리 동전과 1, 5, 10, 20, 50 디나르짜리 지폐가
    통용된다.
  - 1617년경, 종파의 안정과 안전을 확보하기는 했지만, 해결해야할 지속적인 문재들이 남아 있었다. 브래드퍼드는 종파는 나이가 들어가고 있었고, 스스로를 부양하는 여러 가지 문제점이 있다고 언급했다. 가지고 있던
    재산을 탕진한 일부는 결국 포기를 하고 잉글랜드로 귀환했다. 더 많은 사람들이 따라갈까 봐 우려를 했으며, 종파는 유지하기 힘들었다. 고용 문제는 다른 이들을 레이던에 오기를 주저하게 만들었으며, 젊은 교인들은
    취업과 모험을 찾아서 떠났다. 또한 개신교의 터전에서는 좀처럼 힘든 전도의 가능성도 그러한 우려를 부채질하고 있었다.
  - 1990년에는 10, 50, 100, 200, 500, 1,000 디나르 지폐가 발행되었는데, 지폐의 디자인은 1991년까지 사용되었던 지폐의 디자인과 거의 비슷하였다. 1991년에는 5,000 디나르 지폐가 발행되었다.
- source_sentence: 마에하라 세이지의 하버드 대학교 국제문제연구소 연구 기간은 언제였나요?
  sentences:
  - 미에 현에서 기업가의 차남으로 태어나 도쿄 대학 법학부를 졸업했고, 1976년 통상산업성에 입성하여 중소기업 대책이나 석유문제 등을 담당했다. 1985년 미국 하버드 대학교 국제문제연구소에 파견돼 1년간 연구원으로
    지냈다. 1988년 7월 통산성에서 물러나 자유민주당의 후보로서 1990년 중의원 선거에 출마하여 당선됐다. 1993년 자민당을 탈당해 오자와 이치로를 따라 신생당 결성에 참가했고, 2009년 8월 중의원 선거에서는
    소선거구제 도입 이래 최대 득표수로 재선에 성공했다. 같은해 9월에 발족한 하토야마 유키오 내각의 외무상에 취임해 2010년까지 재임했다. 2012년에는 당시 총리에 오른 간 나오토 의원을 대신하여 국무대신 (부총리)에
    취임했다.
  - P(PTIME 또는 DTIME("n"))는 결정론적 튜링 기계로 다항 시간 안에 풀 수 있는 판정 문제를 모아 놓은 복잡도 종류이다. 선형 계획 제품, 최대공약수 문제 등이 P에 포함되며, 2002년에는 주어진
    숫자가 소수인지 판별하는 문제도 P에 속한다는 것이 증명되었다
  - 1876년 가이세이 학교에 입학, 1880년 를 발표했다. 1885년 «a href="%EC%87%BC%EC%84%B8%EC%93%B0%20%EC%8B%A0%EC%A6%88%EC%9D%B4">쇼세쓰 신즈이()>
    및 를 발표하여 메이지 문단의 문을 열었다. 1890년 도쿄 전문학교에 문학과를 창설하고 다음해부터 을 발간, 모리 오가이()와의 몰이상논쟁(沒理想論爭)을 거쳐서 차츰 연극, 특히 윌리엄 셰익스피어에 대한 관심이
    깊어졌다. 만년은 셰익스피어의 전역(全譯)에 힘을 기울였다.
- source_sentence: 메이지 천황이 사망한 년도는 언제인가?
  sentences:
  - .50 BMG 개발 과정에서 독일이 제2차 세계 대전 중 대전차 라이플을 위해 개발한 13.2 mm TuF를 복제해서 사용할지에 대한 논의가 있었다. 하지만, 분석 결과 13.2 mm탄은 성능면에서 .30-06
    스프링필드보다 열악한데다, 자동 화기를 위한 연속 격발에 적합하지 않다고 결론이 나서 복제안은 철회되었다. 또한, 13.2 mm TuF과 .50 BMG는 개발 목적이 다르기 때문에 두 탄의 특성도 완전히 달랐다.
    13.2 mm탄은 대전차용인데 반하여, .50 BMG는 개발 목적이 대공 기관총이었기 때문이다. 따라서 .50 BMG탄을 사용하는 M2HB 브라우닝은 91 m 거리에 있는 22.2 mm 강철판과 500 m의 거리에
    있는 19 mm의 장갑강철판을 뚫을 수 있는 대공, 대전차, 대인과 다목적으로 사용할 수 있는 대형 화기에 적합하도록 의도하여 설계하였다.
  - 메이지 2년(1869년) 6월 22일에 가메다 지번사에 임명되었고, 같은해 7월 5일에 영지 부임을 허가받았으며, 8월 5일, 종5위에 서임되었다. 메이지 4년(1871년) 7월 폐번치현이 됨에 따라 지번사에서
    면직되었다. 같은해 9월 24일 메이지 천황을 알현하였다. 메이지 12년(1879년)에 17세의 나이로 사망하였다. 아내와 자식이 없어서 양부 다카쿠니의 친 장남인 이와키 다카하루가 이와키씨 계승하였다.
  - 이보담이 봉원사 주지가 된 해인 1912년에 일본의 메이지 천황이 사망했다. 이때 이보담은 메이지가 위독하다는 보도를 접한 뒤 곧바로 병세 회복을 위한 기도를 사흘간 올렸고, 얼마 지나지 않아 사망 소식이 들려오자
    일주일 동안 일장기를 내걸고 미타경을 읽으며 애도했다. 메이지 사망 당시 조선에서 공개적으로 애도 기도를 한 승려는 이회광과 이보담, 그리고 이름이 밝혀지지 않은 울산의 한 승려까지 총 세 명뿐이었다.
