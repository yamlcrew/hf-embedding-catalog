      나타내었다. </p> <p>Fig. 3의 그래프를 보면 알수 있듯이 직사각형 캔틸레버보다 삼각형에 가까운 사다리꼴 캔틸레버가 더 많은 표면 변형량을 보였고, 이 표면상에 압전소자가 있다면 더많은 전력량을 수확할
      수 있을 것이다. 이러한 결과에 기대를 하여 같은 형상으로 캔틸레버를 제작하여 에너지 수확에 대한 실험을 계획하였다. </p> <h2>2.3. Solidworks 고유 진동수 해석</h2> <p>Solidworks
      해석 프로그램을 통해서 켄틸리버의 고유진동수를 예측하였다 (Fig. 4). 그리하여 실험시 Shaker를 통해 진동을 발생시킬 때 실험 횟수를 최소화하며 켄틸리버가 최대로 진동할 수 있는 주파수를 찾을 수 있었다.
