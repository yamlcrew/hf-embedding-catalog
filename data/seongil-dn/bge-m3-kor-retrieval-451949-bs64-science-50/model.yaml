    sentences:
    - <h1>요 약</h1><p>환경에 존재하는 장바이러스는 오염된 물을 통하여 경구경로로 전염이 가능하고, 바이러스는 적은 양으로도 인체에 감염이 가능하므로 인간의 건강을 위협할 수 있다. 환경 수계 및 음용수에서
      발견되는 바이러스의 수치는 비교적 낮으므로 수백에서 수천 리터의 물을 농축시킬 필요가 있다. 따라서 이 연구의 주요 목적은 수계 시료로부터 장바이러스를 농축, 정제, 및 검출할 수 있는 신속, 간편하고 효과적인
      방법을 개발하는 것이다. 먼저 바이러스를 1MDS 카트리지 필터에 흡착시켜 농축시키고 약 \( 500 \mathrm{~m} \ell \)의 \( 1.5 \% \) beef extract/\( 0.05 \mathrm{M}
      \) glycin\( (\mathrm{pH} 9.4) \)으로 용출시킨다. 이 연구에서는 흡착필터로부터 얻은 바이러스 1차 용출액을 더욱 농축시키고 정제하기 위하여 세가지 방법을 시도하였다. 이들 가운데서 유기
      응집법이 바이러스 재농축에 가장 효과적인 방법이었다. 이 방법으로 시료 부피를 200에서 400배까지 감소시킬 수 있었으며 최종 바이러스 수거율은 \( 72 \% \) 이상이었다. 마지막으로 시료를 막 디스크
      필터로 여과시키고 plaque assay 혹은 CC-PCR법으로 분석하였다. </p>
    - '먹는 물의 병원성미생물 조기검출방법 확립

      □ PCR(중합효소 연쇄반응, Polymerase Chain Reaction)

      효소(DNA polymerase)와 시약 등을 사용하여 미생물(바이러스, 원생동물 등)의 유전자(DNA, RNA) 중 특정 부위만 연속적으로 증폭시켜 원하는 대상 유전자(target gene)의 존재를 확인하는
      방법. □ 총배양성바이러스분석법(TCVA: total culturable virus assay)

      환경시료(상수원수)중에 함유된 바이러스가 시료 채취시 여과막에 흡착되고, 여과막의 바이러스를 탈리(분리)ㆍ농축한 후 원액과 희석 원액을 살아있는 세포(BGM : Buffalo Monkey Kidney Cell
      ,원숭이신장세포)에 접종하고 37℃에서 1차(14일) 배양하고, 1차 배양액을 2차(14일) 계대배양한 후 세포병변효과(Cytophatic Effect) 양성갯수, 채수량 등 계산식(프로그램)에 적용하여 바이러스
      농도(MPN)값을 계산. □ 통합세포배양-중합효소연쇄반응방법(ICC-PCR : integrated cell culture-PCR)

      총배양성바이러스분석법과 동일한 방법으로 시료의 전처리를 수행하고, 세포에 시료를 접종하여 3일(72시간)간 배양한 후에 증식한 바이러스를 유전자분석법(PCR ; 중합효소 연쇄반응방법)으로 검출. - 실시간 중합효소연쇄반응(Real
      time PCR)방법

      실시간중합효소연쇄반응(Real time PCR)방법은 병원성미생물별 특정 유전자(target sequence)의 증폭과 함께 형광량도 증가하도록 시약을 첨가하여, 반응 후의 형광변화를 분석하고, 농도를 알고
      있는 표준식(Standard curve)과 비교하여 대상 미생물별 정량화가 가능한 방법. ※ Real time PCR은 특정 유전자를 증폭한 후 전기영동하여 증폭 산물을 확인할 필요가 없다는 점에서 기존의 방법보다
      시간이 단축되며, 다량의 시료를 동시에 수행이 가능한 장점이 있다. - 장바이러스 및 장관계바이러스

      바이러스는 숙주에 매우 특이적으로 감염하여, 사람에게 감염하여 질병을 일으키는 병원성 바이러스 역시 대부분 사람에게만 제한적으로 감염한다. 분변에 다량 존재하는 장관계바이러스로는 장바이러스(Enterovirus
      ; 폴리오바이러스, 콕사키바이러스, 에코바이러스)와 그밖에 아데노바이러스, 레오바이러스, 로타바이러스, A형 간염 바이러스, E형 간염바이러스, 그리고 노로바이러스와 같이 장염을 일으키는 바이러스가 포함된다.
      장관계바이러스(Human enteric viruses)는 100여종의 바이러스가 알려져 있다(장바이러스는 70여종).'
