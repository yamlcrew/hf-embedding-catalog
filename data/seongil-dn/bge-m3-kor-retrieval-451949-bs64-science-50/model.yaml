- source_sentence: 다중 스위칭 소자를 사용한 벅-부스트 컨버터의 특징은 뭐야?
  sentences:
  - <p>본 실험에서는 소수상품평 검색성능을 엄격한(strict) 평가와 관대한(lenient) 평가의 두 경우로 나누이 평가한다. 여기서 엄격한 평가는 소수상품평 집합을 김색한 후, 헤당 집합 속의 개별 상품평 증
    소수상품평까지 모두 검색하는(알아맞히는) 경우를 정답으로 하고, 관대한 평가는 소수상품평 집합만을 김색하는 것을 정답으로 한다. 예를 들어 어떤 상품평 집합의 실제 구성이 [N, P, P, P, P, P]로 되어있으면,
    엄격한 평가의 경우, 해당 집합을 소수상품평으로 검색한 후, 이 집합 속에서 N으로 분류된 소수상품평까지 김색하는 경우([N, P, P, P, P, P]로 순서까시 맞힘)를 정답으로 간주한다. 걸국 엄격한 평가는
    일단 다양한 상품평 집합들 속에서 소수상품평을 포함하는 집합들을 검색한 후에, 한발 더 나아가 개별 집합 속의 개별 소수상품평까지 추가로 선별헤 낼 수 있어야 한다. </p> <p>이에 비해 관대한 평가는, 다양한
    상품평 집합들 속에서 소수상품평이 존재하는 집합만 검색하면 되기 때문에, 개별 상품평의 긍정/부정 분류가 설령 틀리더라도 상품평 집합의 긍정/부정 비대칭도의 조건만 맞으면 된다. 예컨대 실제 집합이 [N, P,
    P, P, P, P]일 때, 긍정/부정 자동분류 중 일부 오번류가 있는 [P, N, P, P, P, P]나 [P, P, P, P, P, N]도 비대칭도가 동일하기 때문에 소수상품평 집합으로 검색된다. 본 실험에서는
    소수상품평이 포함돼있음을 판단하는 기준을 '비대칭도가 \( 0.5 \) 보다 큰가 \( (0.5<1 \) Skewness|)'와 '비대칭도가 \(1 \)보다 큰가 \( (1< \) |Skewness|)'로 나누어
    평가한다. </p> <h2>4.4 실험결과</h2> <p>소수상품평 검색성능을 정밀도, 재현울, F \(1 \) 점수로 각각 엄격하게(strict) 또는 관대하게(lenient) 평가한 걸과를 Table \(7
    \)과 Table \(8 \)에 각각 정리한다. </p> <p>Table \(7 \)의 엄격한 평가의 경우, 스마트폰과 영화의 두 비대칭도 정의에 대하여 미수정 감성사전(SWN \&OPL)을 이용헸을 때의 \(4
    \)개의 F \(1 \)점수의 평균은 \( 11.4 \% \) 였다. 한편, Table \(7 \)에서 도메인 특화된 감성사전(MRG \&SBL)을 이용혰을 때의 평균 F \(1 \)점수는 \( 19.8 \% \)였다.
    Table \(8 \) 의 관대한 평가에서는, 미수정 사전과 도메인 특화 사전의 평균 F \(1 \) 점수가 각각 \( 48.9 \% \) 와 \( 53.8 \% \)였다. 두 표 모두에서 도메인 특화된 감성사전을
    이용한 경우가 미수정 감성사전을 이용한 경우보다 소수상품평 검색에서 더 좋은 성능을 나타냄을 확인할 수 있다. 미수정 사전과 수정 사전의 평균 F \(1 \) 점수의 차이는 엄격한 평가의 경우 \( 8.4 \%
    \) 었고, 관대한 평가의 경우 \( 4.9 \% \) 었다. </p>
  - <h1>III 결론</h1><p>본 논문에서는 기존의 벅-부스트 컨버터의 효율 보다 높은 효율을 갖는 다중 스위칭 소자를 사용한 벅-부스트 컨버터를 설계하였다. 제안한 컨버터는 동일면적 및 동일 효율 또는 적은
    효율 감소만으로도 넓은 출력 전압 범위를 갖도록 설계하였다. 벅-부스트컨버터는 고전류에서 고효율을 위해 PWM 제어법을 이용하여 제어하였고, 전류모드를 이용하여 설계하였다. 제안한 컨버터는 최대 출력전류 \( 300
    \mathrm{~mA} \), 입력 전압 \( 3.3 \mathrm{~V} \)에 출력전압 \( 700 \mathrm{mV}^{\sim} 12 \mathrm{~V}, 1.5 \mathrm{MHz} \) 의 스위칭주파수를
    갖는다. 최대 효율은 \( 90 \% \) 를 갖도록 설계하였다. 또한 과부하 및 기타 환경적인 변화에 의한 오동작으로 인해 전력 손실과 내부 및 외부 IC의 손상을 방지하기 위한 보호회로를 IC 내부에 설계하여
    신뢰성을 향상시켰다. 마지막으로 고안된 ESD 보호 소자를 설계 및 탑재하여 정전기 방지로 인한 IC의 손상을 방지하고, 기존의 ggNMOS의 높은 트리거 전압을 개선하여, 낮은트리거링 특성을 갖는 ESD 보호회로를
    제안 및 설계하였다. 시뮬레이션 결과 일반적인 ggnmos의 트리거전압이 \( 8 \mathrm{~V} \) 내외인 것에 반해 고안된 소자의 트리거전압은 \( 4 \mathrm{~V} \) 내외로 더 낮은 트리거
    전압 특성을 나타냈다. </p>
  - <h1>요 약</h1><p>본 논문에서는 DT-CMOS(Dynamic Threshold voltage Complementary MOSFET) 스위칭 소자를 사용한 DC-DC Buck 컨버터를 제안하였다. 높은 효율을
    얻기 위하여 PWM 제어방식을 사용하였으며, 낮은 온 저항을 갖는 DT-CMOS 스위치 소자를 설계하여 도통 손실을 감소시켰다. 제안한 Buck 컨버터는 밴드갭 기준 전압 회로,삼각파 발생기, 오차 증폭기, 비교기,
    보상 회로, PWM 제어 블록으로 구성되어 있다. 삼각파 발생기는 전원전압(3.3V)부터 접지까지 출력 진폭의 범위를 갖는 \( 1.2 \mathrm{MHz} \) 의 주파수를 생성하며, 비교기는 2단 증폭기로
    설계되었다. 그리고 오차 증폭기는 \( 70 \mathrm{~dB} \) 의 이득과 \( 64^{\circ} \)의 위상여유를 갖도록 설계하였다. 또한 제안한 Buck 컨버터는current-mode PWM 제어회로와
    낮은 온저항을 갖는 스위치를 사용하여 \( 100 \mathrm{~mA} \)의 출력 전류에서 최대 \( 95 \% \)의 효율을 구현하였으며, \( 1 \mathrm{~mA} \)이하의 대기모드에도 높은 효율을
    구현하기 위하여 LDO 레귤레이터를 설계하였으며,또한 2개의 IC 보호 회로를 내장하여 신뢰성을 확보하였다. </p><h1>1. 서론</h1><p>최근의 휴대전화, PDA, MP3과 같은 휴대용 멀티미디어의 사용이
    급증함에 따라 고효율, 소형화를 위해 기존의 Linear 방식의 전원장치에서 SMPS 방식으로 대체되고 있는 추세이다. SMPS(Switching Mode Power Supply)는 스위칭주파수를 이용해 에너지
    축적용 소자의 소형화를 이룰 수 있으나, 스위칭 주파수의 고주파화로 인해 생기는 스위칭 손실, 인덕터 손실, 전도 손실 등에 대한대책을 강구하여야 한다. 기존의 저전압 DC-DC 컨버터는 스위칭 소자로서 일반적인
    CMOS 소자를 사용해 왔다. 그러나 CMOS 스위칭 소자는 매우 작은 온 저항을 얻기 위해서 매우 큰 면적을 필요로 하기 때문에 본 연구에서는 이러한 스위칭 소자의 면적 문제를 개선 하고자 문턱전압을 낮추어 온
    저항을 줄일 수 있는 DT-CMOS를 사용한 스위칭 소자를 제안하였다. 제안된 소자는 기존의 일반적인 CMOS 공정을 이용하고, 기존의 CMOS 소자 보다 더 적은 면적을 갖고, 더 작은 온저항을 갖는다.[3]
    </p><p>따라서 본 논문에서는 DT-CMOS 스위칭 소자를이용하여 동일 면적에서 기존의 CMOS 스위칭 소자를 사용한 SMPS 보다 더 높은 효율을 갖는 DC-DCBuck 컨버터를 설계하였다. 본론 1절에서는
    DT-CMOS 스위칭 소자의 기본적인 개념과 구현 방법 그리고 동작 특성에 대해 설명하였으며, 2절에서는 DC-DC Buck 컨버터 설계에 대해 설명하였다. 3절에서는 낮은 출력 전류에서 효율이 급격히 감소하는
    PWM 방식을 보완하는 LDO 레귤레이터에 대해 설명하였으며, 4절에서는 IC를 보호하기 위한 회로에 대해 설명하였다. </p>
