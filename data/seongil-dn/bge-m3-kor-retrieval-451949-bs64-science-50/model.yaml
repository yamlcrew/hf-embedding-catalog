  - source_sentence: 예측 방법론에서는 어떤 데이터를 대상으로 해?
    sentences:
    - 인공지능을 통한 기상현상의 예측은 비교적 최근 들어 연구가 진행되었기 때문에 크게 기계학습 기법과 딥러닝 기법을 이용하여 기상현상을 예측하려는 시도가 이루어져 왔으며, 다양한 장소에서 수집되는 데이터에 대한
      전처리 및 학습 데이터에 대한 품질 관리가 매우 중요하다. 인공지능을 통해 기상 현상을 예측하고자 하는 경우, 예측 알고리즘을 통해 문제 해결을 도모할 수 있으며, 데이터의 품질 관리에 있어서 분류 알고리즘을
      이용할 수 있다. 빅데이터의 활용에 있어서, 데이터베이스마다 기준 정보가 동일하지 않기 때문에 데이터 정제 시 기준 정보를 표준화 하는 것이 중요하며, 통합 DB 설계 시 1) 공통된 규칙을 가지도록 하고,
      2) 데이터 무결성이나 성능 상의 이슈 없는 구조적으로 설계되며, 3) 설계된 데이터베이스에 대한 제대로 된 관리 체계가 보장 되도록 해당 내용을 고려해야 한다.
    - <h1>II. 본론</h1><h2>1. 예측 방법론</h2><p>예측 방법론에서 사용하는 데이터는 사전에 수집된 과거 데이터나 제한된 데이터를 대상으로 하므로 예기치 않은 사회적 이슈와 미세먼지와 같이 새롭게
      주목을 받는 요인들은 체계적으로 수집되어 있지 않은 경우가 많다. 이런 한정적인 데이터를 이용한 예측은 각 데이터의 영향력이 과대평가될 수있으므로 미래의 예측값의 오차를 크게 할 수 있다. 연속적이거나 이산되어
      있는 입력데이터들의 차이도 적절한 결과를 예측하기에 문제가 될 수 있다. </p><p>이러한 예측 방법론이 가진 오차와 한계에도 불구하고 예측의 긍정적인 효용성 때문에 최근 등장하고 있는 빅데이터 기반의 머신러닝
      등의 방법론을 통한 노력이 꾸준히 진행되고 있다. </p><h3>가. 선형회귀분석</h3><p>선형회귀분석은 벡터 독립변수 \( x \) 와 스칼라 종속변수 \( y \) 의 관계를 정량적으로 분석하여 가장
      비슷한 예측값 \( \hat{y} \) 을 도출하는 방법론이다. </p><p>\[ \hat{y}=f(x) \approx y \]</p><p>선형회귀분석을 위해서는 각 변수의 존재를 사전에 파악할 필요가 있다.
      관중수 예측에서 선형 회귀 분석(다중회귀분석)을 사용할 경우, 관중수에 영향을 미치는 변수를 어느 정도 알 수 있어야 하므로 예측 결과값이 총관중수와 같은 평균값 도출에는 적합하지만, 구역별 관중수 등을 세밀하게
      예측값을 도출해야 할 경우에는 입력 변수 및 데이터의 한계로 결과값에 오차가 커질 수 있다. </p><h3>나. 시계열분석</h3><p>시계열분석 방법은 양적 예측밥법으로 과거의 데이터를 시간에 따른 변화를
      파악하여 예측값을 도출하는 방법론이다. 시계열 분석방법에는 지수평활법, 자기회귀법, ARIMA법이 있다. 지수평활법은 과거 데이터 영향력의 차이를 줄이기 최신 자료에 가중치를 주어서 예측값을 도출하는 방법이다.
      자기회귀법은 과거 데이터가 미치는 영향력을 어느 정도 제거하여 예측값을 도출하는 방법이다. ARIMA법은 시계열 분석 방법의 대표적인 방법으로써, 시계열 자료의 자기 상관 특성을 이용한다. 이와 같은 다양한
      시계열분석 방법론을 이용한 예측은 통상 오랜 기간의 데이터가 있을 때 사용한다. </p><p>시계열 분석(지수평활, 자기회귀, ARIMA) 방법론을 관중수 예측에 활용하려면 오랜 기간의 관중수 데이터가 있어야
      한다. 새로운 이벤트의 경우 누적 데이터가 부족하기 때문에 원하는 관중수 예측값을 도출하는데는 한계가 있을 수 밖에 없다. </p><h3>다. 시뮬레이션</h3><p>시뮬레이션(수학적 모델링) 기법은 기업의
      비즈니스 로직을 수학적으로 구축하여 컴퓨터 시뮬레이션을 통해 예측값을 도출하는 방법이다. 보통 물류, 유통 등 비즈니스 로직을 세세히 잘 알고 있을 때 사용한다. 시뮬레이션 기법은 최적의 우편물 배달 경로 도출과
      같이 통계적이거나 수학적인 분석으로는 정확한 예측 값을 주어진 시간 내에 도출할 수 없을 때 주로 사용한다. </p><p>시뮬레이션(수학적 모델링) 기법은 관중수에 영향을 미치는 비즈니스 로직을 정확히 파악하고
      있을 때 사용할 수 있다. 아직 프로야구 관중수에 영향을 미치는 요인에 대한 연구나 세밀한 비즈니스로직을 분석한 결과가 많지 않아서 관중수 예측에 적용하기는 쉽지 않을 것이다. </p><h3>라. 머신러닝</h3><p>머신러닝이란
      주로 빅데이터를 활용해 비선형의 형태로 결과값을 예측하는 방법이다. 머신러닝 기법은 선형회귀분석 방법론과 달리 사전에 영향을 미치는 변수를 모두 알지 못한 상태에서도 예측값을 도출할 수 있다. 따라서 빅데이터
      형태로 자료를 수집할 수 있고, 예측하지 못한 변수들이 종종 등장하는 경우에 적절히 활용할 수 있다. 다만 실제 분석시간보다 데이터를 컴퓨터가 이해하기 쉽도록 정제하는 시간이 더 많이 걸릴 수가 있고, 분석방법론에
      따라 예측값이 달라지는 한계도 존재한다. </p><p>머신러닝 방법론은 빅데이터를 활용해 비선형의 형태로 관중 수를 예측할 때 사용할 수 있다. 또한 예측 못한 변수가 있더라도 데이터의 학습을 통하여 어느 정도
      예측값을 도출하는 것이 가능하다. 따라서 현재의 제한된 기간에 수집된 빅데이터를 활용하여 예측값을 도출하기에 최적의 방법론으로 볼 수 있다. </p>
    - <h2>2. 서비스 구성기법</h2><p>서비스 구성기법은 사용자가 원하는 서비스를 적절히 제공할 수 있는 디바이스를 선택하여 서비스 세션을 구성하는 것이다. 또한 서비스 세션을 위해 선택되는 디바이스는 사용자의
      위치나 업무, 서비스가 요청되는 시기에 따라 수시로 변하게 된다. 이러한 서비스 구성 기법은 사용자에게 요청하는 서비스에 대해서 사용자가 만족할 수 있는 품질을 제공할 수 있어야 하며, 끊김없는 서비스 제공을
      위해 사영가능한 디바이스를 미리 예약하여 사용자가 서비스 요청시 서비스 제공시간을 줄일 필요도 있다. 그리고 서비스 예약기법은 사용자의 priority나 스케줄 및 이동성 정보 등의 상황 정보를 기반으로 예측형
      서비스 예약 구성기법이 가능해야 한다. 이러한 동적인 서비스 구성기법을 통해 사용자는 어디에서나 언제든지 원하는 서비스를 제공받을 있게 함으로써 서비스 가용성을 높일 수 있게 한다. </p><p>지능적인 서비스
      구성을 위해서 공간내의 디바이스들은 사용자가 원하는 서비스를 적절히 제공할 수 있는지 여부를 판별하기 위한 서비스 컴포넌트를 가져야 한다. 즉 하나의 어플리케이션 서비스는 다양한 서비스 컴포넌트들의 조합을 통해
      제공될 수 있다. 예를 들어 동영상을 보기 위해서는 동영상을 보여줄 수 있는 디스플레이 부분과 음성을 재생할 수 있는 오디오와 같은 서비스 컴포넌트들이 제공되어야 사용자에게 적절한 어플리케이션 서비스를 제공할
      수 있는 것이다. 이러한 서비스 컴포넌트는 디바이스가 가지는 다양한 서비스 컴포지션(service composition)을 정의하는 방법에 의존적이며, 참고문헌 [7\(\sim\)9]에서와 같이 다양한 프로젝트들을
      통해 활발히 연구가 진행되고 있다. 이러한 서비스 컴포넌트는 재사용이 가능하며, 서로 다른 컴포넌트간의 협업을 통해 보다 나은 서비스를 제공할 수도 있다. 이러한 서비스 컴포넌트를 활용하여 퍼스널 서버는 어플리케이션
      서비스를 적절하게 제공할 수 있는 후보 디바이스를 찾아 서비스 구성 테이블을 생성하여 관라해야 한다. 그리고 각 서비스 구성리스트는 사용자에게 보다 나은 서비스 질을 제공할 수 있는 우선순위에 따라 구성된다.
      표 1 은 어플리케이션 서비스에 따른 서비스 구성 테이블 예를 보여준다. </p><h2>3. 기존의 접근제어 및 서비스 구성기법의 문제점</h2><p>그림 2에서 보는 바와 같이 접근모드가 group mode
      일 때 여러 퍼스널 서버들이 자신에게 주어진 권한내에서 공간내의 인섭 디바이스를 이용하고자 할 때 임의의 사용자에 의해 디바이스가 사용되고 있어 주변의 다른 사용자가 공유된 디바이스로 서비스를 받지 못하는 서비스
      충돌 현상이 발생할 수 있다. 예를 들어 PS 1은 무선 인터페이스로 UWB를 사용하며, PS2는 802.11기반의 WLAN을 사용한다. 또한 공간내에는 각각의 무선 인터페이스에 대한 AP 가 설치되어 있다고
      가정하자. 이때 PS 1이 Digital TV를 통해 VOD 서비스를 제공받고 있다. 이 경우 PS 2 가 동일한 서비스를 Digital TV 에 요청하면 무선링크 계층에서 인지할 수 없는 어플리케이션 계층에서의
      서비스 충돌이 발생한다. 이러한 서비스 충돌로 인해 퍼스널 서버는 불필요한 메시지를 발생시켜 비효율적으로 배터리를 소모한다. </p><p>또한 서비스 컴포넌트 기반으로 어플리케이션 서비스를 적절히 제공할 수
      있는 후보 디바이스를 통해 서비스를 제공받을 때 그림 3에서 보듯이 우선순위가 높은 후보 디바이스에게 먼저 서비스 요청 메시지를 보내게 된다. 이때 서비스 요청메시지를 받은 디바이스가 사용 중일 때 사용자는
      차선책인 디바이스에게 서비스 요청 메시지를 보내게 된다. 이러한 불푈요한 서비스 요청 메시지를 주고받는 데 걸리는 시간은 사용자에게 서비스를 제공하는데 지연을 발생시킨다. </p>
  - source_sentence: 이수화 상에서는 물과 반응하여 페로브스카이트 소재의 분해를 야기하는 원인이 뭐야?
    sentences:
    - <h1>요 약</h1><p>본 논문에서는 Electrocorticogram(ECoG) 신호를 이용하여 손과 팔꿈치의 움직임을 추론하는 방법을 제안한다. 환자로부터 다수의 채널을 이용하여 표면 근전도 신호와 ECoG
      신호를 동시에 취득하였다. 추론하는 동작은 손을 쥐었다 펴는 동작과 팔꿈치를 안으로 굽히는 동작이며, 외부 자극에 의해 동작을 수행하는 방법 대신 환자의 자유의지에 의해 동작을 수행하게 하였다. 표면 근전도
      신호를 이용하여 동작을 수행한 운동 시점을 찾고, ECOG 신호를 이용하여 동작을 추론한다. 각 동작의 특징을 추출하기 위하여 ECoG 신호를 전체 대역을 포함한 \( \delta, \theta, a \),
      \( \beta, \mathrm{y} \) 총 6 개의 대역을 나누어 정보 엔트로피를 구하고, 최대우도추정법을 사용하여 동작을 추정하였다. 실험 결과 감마대역의 ECOG를 사용할 경우 다른 대역을 사용할 때
      보다 높은 평균 \( 74 \% \) 의 성능을 보이며, 다른 대역보다 감마 대역에서 높은 추정 성공률을 보였다. 또한 운동 시점을 기준으로 3 개의 시간 구간으로 나누어 준비전위를 포함하는 'before'
      구간과 'onset' 구간을 비교하였다. 'before' 구간과 'onset' 구간에서 추정 성공률은 각각 \( 66 \% \), \( 65 \% \) 로 준비전위를 이용할 수 있다는 것을 알 수 있었다. </p>
    - "효율이 높고 광안정성이 우수한 페로브스카이트 태양전지 소재/소자 기술 개발 - 고효율(21.2%)과 고안정성(1,000시간 유지)을 모두 만족하는 페로브스카이트 태양전지용 핵심 소재 및 저비용 제조 기술 개발-\n\
      □ 이번 연구에서는 이전 연구성과(구조, 공정, 신조성 기술)를 기반*으로 이종접합** 페로브스카이트 태양전지의 고효율화(21.2%)와 높은 광안정성(자외선 포함한 광조사에서 1,000시간 이상 안정한 효율\
      \ 유지)을 모두 만족하는 광전극 소재를 저온(기존 900 ℃이상 고온 → 200 ℃이하) 에서 합성하는 방법을 개발하였다. *【 연구진 이전 연구성과 】\n・무-유기 하이브리드 페로브스카이트 태양전지 플랫폼\
      \ 구조 기술 개발 (Nature Photonics 2013.5) \n・매우 균일하고 치밀한 페로브스카이트 박막 제조 신규 용액 공정 기술 개발 (Nature Materials 2014.7) \n・고효율을 위한\
      \ 페로브스카이트 결정상 안정화 신조성 기술 개발 (Nature 2015.1) \n・고품질 페로브스카이트 박막 형성을 위한 신규 공정 기술 개발 (Science 2015.6) 등\n** 이종접합 : 같은 소재간의\
      \ 접합인 동종 접합과 달리 다른 종류의 소재간의 접합을 의미, 페로브스카이트는 무기물, 유기물, 무/유기 혼성물 간의 이종접합을 이룸.\nㅇ 더 나아가서 연속적이며 대량 생산 공정이 가능한“핫-프레싱 (hot-pressing)\
      \ 공법*”을 새롭게 제안하여, 고효율 / 고안정성 / 저비용의 방법으로 페로브스카이트 태양전지를 제조하는 새로운 태양전지제조 방법론을 제안하였다. * 핫-프레싱 공법 : 온도와 압력을 가하여 두 물체를 단단히\
      \ 점착 시키는 방법"
    - <h1>2. 환경적 요인에 의한 페로브카이트 소재 불안정성</h1><h2>2.1. 수분에 의한 안정성 영향</h2><p>유기 페로브스카이트인 \( \mathrm{MAPbI}_{3} \) 의 \(\mathrm{MA}^{+}\)와
      \(\mathrm{I}^{-}\)는 약한 결합을 하고 있어 이수화 상 (dihydrate phase)에서는 물과 반응하여 페로브스카이트 소재의 분해를 야기한다. 이는 \( \mathrm{MAPbI}_{3} \)
      와 물이 반응하여 생성된 이수화 화합물 (\( \mathrm{MAPbI}_{3} \cdot \mathrm{H}_{2} \mathrm{O} \)) 이 \( \mathrm{CH}_{3} \mathrm{NH}_{2}\),
      \(\mathrm{HI}\), \(\mathrm{PbI}_{2} \) 로 분해되고, 생성된 \( \mathrm{CH}_{3} \mathrm{NH}_{2} \) 와 \( \mathrm{HI} \) 는 물에 녹아
      결국 고상의 \( \mathrm{PbI}_{2} \) 만 남는 것으로 설명할 수 있다. </p><p>무기 페로브스카이트는 수분에 의한 재결정화 및 표면 결합 리간드의 손실과 분해로 인해 표면에 트랩 준위가 증가하여
      발광효율이 감소한다. 또한 페로브 스카이트 소재는 빛이 없는 상황에서도 물에 의해 소재가 분해되어 안정성이 감소한다. </p><h2>2.2. 빛에 의한 안정성 영향</h2><p>페로브스카이트 소재가 장시간 빛에
      노출되는 경우 광-생성 전하 (photo-generated carrier)가 페로브스카이트 소재 표면으로 확산되어 이온성 표면 리간드와 결합한다. 이 과정 중에 몇 개의 리간드들은 용매에 녹아, 보호되지 않은
      면을 중심으로 페로브스카이트 소재끼리 응집하여 발광 효율이 감소한다. 또한 페로브스카이트 소재의 응집 및 리간드 손실로 인해 트랩 준위가 증가하여 광학적 특성이 현저히 감소된다. pc-LED는 실생활에서 장시간
      빛에 노출되기때문에 빛에 의한 발광 감소 및 소재 안정성 감소는 고연색 발광을 필요로 하는 pc-LED의 적용에 문제가 된다. </p><h2>2.3. 산소에 의한 안정성 영향</h2><p>페로브스카이트 소재는
      빛에 노출된 경우에만 산소와 반응하며 특히 광-생성 전하를 가진 페로브스카이트 소재는 산소 분자의 영향을 받기 쉽다. 산소 분자가 격자로 확산되어 공공 결함 (vacancy)을 채우게 되고 광-생성 전자가 전도대에,
      정공이 가전자대에 생성된다. 페로브스카이트 소재와 산소가 반응해 \( \mathrm{O}^{2-} \) 가 생성되어 \( \mathrm{MAPbI}_{3} \) 가 \( \mathrm{PbI}_{2}\), \(\mathrm{H}_{2}
      \mathrm{O}\), \(\mathrm{I}_{2}\), \(\mathrm{CH}_{3} \mathrm{NH}_{2} \) 로 분해된다. 이러한 광-산화 (photo-oxidation) 과정으로 페로브스카이트
      소재가 분해되어 안정성이 감소한다. </p><h2>2.4. 열에 의한 안정성 영향</h2><p>열중량분석 (TGA) 분석으로 확인한 페로브스카이트 소재는 수분과 산소가 없을 때 \( \mathrm{CsPbX}_{3}
      \) 는 \( 500{ }^{\circ} \mathrm{C} \),\( \mathrm{MAPbX}_{3} \) 는 \( 220{ }^{\circ} \mathrm{C} \) 까지 구조를 유지할 수 있다. 유 ·
      무기 페로브스카이트는 열에 의해 비교적 높은 안정성을 가지고 있지만 고온에서 페로브스카이트 소재가 수분과 산소에 반응하면 구조 분해가 더 가속화되어 안정성이 급격히 감소한다. </p><p>또한 고온에서 발광
      효율이 감소하는데 이는 열적으로 활성화된 할로겐 공공 결함에 의해 \(\mathrm{MAPbBr}_{3} \) 는\( 100{ }^{\circ} \mathrm{C} \) 이상의 온도에서 발광을 거의 보이지 않으며
      \( \mathrm{CsPbBr}_{3} \) 는 약 \( 80 \% \) 의 발광 손실을 보이는 것으로 확인할 수 있다. </p>
