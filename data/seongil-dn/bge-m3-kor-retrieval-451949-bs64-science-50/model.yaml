      colspan=8>계</td><td>91.09</td><td>90.54</td><td>99.39</td></tr></tbody></table> <table border><caption>표 7. 방법 3의 형식분류율
      및 형식별 문자 인식기의 인식율</caption> <tbody><tr><tr><td>In Out</td><td>Type1</td><td>Type2</td><td>Type3</td><td>Type4</td><td>Type5</td><td>Type6</td><td>Type7</td><td>Rec(T)</td><td>Rec(C)</td><td>Rec(C/T)</td></tr><tr><td>Type1</td><td>53,259</td><td>1</td><td>17</td><td>5</td><td>0</td><td>0</td><td>10</td><td>99.94</td><td>98.88</td><td>98.94</td></tr><tr><td>Type2</td><td>0</td><td>37,092</td><td>0</td><td>1</td><td>2</td><td>0</td><td>15</td><td>99.95</td><td>95.51</td><td>99.95</td></tr><tr><td>Type3</td><td>20</td><td>1</td><td>12,314</td><td>8</td><td>0</td><td>3</td><td>0</td><td>99.74</td><td>98.88</td><td>99.14</td></tr><tr><td>Type4</td><td>30</td><td>25</td><td>15</td><td>76,430</td><td>12</td><td>45</td><td>26</td><td>99.80</td><td>98.20</td><td>98.39</td></tr><tr><td>Type5</td><td>1</td><td>34</td><td>1</td><td>6</td><td>48,377</td><td>21</td><td>32</td><td>99.80</td><td>97.64</td><td>97.83</td></tr><tr><td>Type6</td><td>0</td><td>1</td><td>7</td><td>58</td><td>5</td><td>6,058</td><td>0</td><td>98.84</td><td>97.52</td><td>98.66</td></tr><tr><td>Type7</td><td>8</td><td>14</td><td>1</td><td>5</td><td>3</td><td>2</td><td>67.106</td><td>99.95</td><td>99.14</td><td>99.19</td></tr><tr><td
      colspan=8>계</td><td>99.86</td><td>98.61</td><td>98.76</td></tr></tbody></table> <p>방법 1, 2, 3의 결과로 보아, 인쇄체 문자인식에 있어서
      방향각도 특징을 입력으로 하는 MLP 신경망 형식분류기는 \( 99 \% \) 이상의 분류율로 자소 조합 방식을 기반으로 하는 문자의 형식분류에 적절하여, 형식 대분류 후 문자 상세인식 전략을 사용하는 방법에
      매우 유용하게 사용될 수 있음을 알 수 있다. 또한 각 형식이 알려진 후의 문자인식에 있어서도 마찬가지로 방향각도 특징을 입력으로 하는 2단계 MLP 신경망 인식 방법이 \( 98 \% \) 이상의 인식율을
      보여 유용하게 사용될 수 있음을 알 수 있다. </p> <p>단순 스위칭 방법과 통합 방법을 혼용하여, 형식분류기의 1순위 분류결과뿐만 아니라 2순위 형식에 대해서도 인식을 하여 보다 높은 신뢰도값을 가지는
      문자클래스를 인식 결과로 하는 방법인 방법 4, 5, 6, 7에 대한 문자인식 결과를 방법 1, 2, 3의 결과와 함께<그림 11>에 나타내었다. 방법 5와 7이 \( 98.65 \% \) 의 인식율로 가장
      높은 인식율을 보였는데, 각각 방법 4와 6에 문자인식 신뢰도값을 형식분류기의 결과값으로 가중화한 방법으로 방법 3의 경우에서처럼 형식분류기의 분류결과값이 문자인식율의 향상에 도움이 되었다는 것을 나타내는 것이다.
      방법 6과 7은 방법 4와 5의 변형으로 형식분류기 \( \mathrm{TR} \)의 출력값이나 \( \mathrm{CR} \) 문자인식기의 신뢰도 값이 임계치( \( \beta \) ) 보다 낮을 경우에만
      2순위 형식의 \( \mathrm{CR} \)을 선택적으로 호출하였다. <그림 11>에서 나타났듯이, 형식분류기와 문자인식기의 인식결과가 의심스러운 경우만 호출한 방법 6과 7이 무조건적으로 2순위 형식에 대해서도
      인식한 방법 4와 5에 비해 성능이 우수함을 알 수 있다. </p>
    - <h1>요 약</h1><p>본 논문에서는 표면 Texturing 방법 중 습식 에칭법을 이용하여 태양전지에 사용되는 전극의 표면을 거칠게 처리하였고, 표면 처리 후 \( \mathrm{TiO}_{2} \) 산화물
      반도체를 사용한 염료 감응 태양전지를 제작하였다. 표면 처리된 전극을 에칭 시간에 따른 분광특성을 측정 분석하였으며, 에칭 시간에 따라 제작한 \( \mathrm{TiO}_{2} \) 염료 감응 태양전지의 전기적
      특성을 평가함으로써 표면 처리에 따른 태양전지의 효율 향상에 관한 연구를 진행하였다. 결과적으로 전극 표면을 10 분간 에칭 처리한 태양전지의 경우 기존 효율과 비교하였을 때, 약 \( 27.46[\%] \)
      개선됨을 확인할 수 있었다. </p><h1>I. 서론</h1><p>태양전지 산업에서 주로 단결정 및 다결정 실리콘계 태양전지가 높은 시장 점유율을 보이지만, 실리콘 태양전지는 높은 제조단가, 복잡한 제조공정
      등의 측면에서 경쟁력이 다소 떨어져 어려움을 겪는 실정에 놓여있다. 이에 이를 대체할 여러 태양전지 중에서 염료 감응 태양전지가 개발되어 지속적인 연구가 진행되고 있다. </p><p>염료 감응 태양전지의 경우에는
      제조단가가 실리콘의 \(5\) 분의 \(1\) 수준에 불과하며, 다양한 색상구현, 유연성 및 투명성 등의 다양한 응용 가능성으로 상용화에 유리한 특징을 지니고 있어 차세대 태양전지로 불린다. 하지만 이러한 여러
      장점에도 불구하고 염료 감응 태양전지가 상용화되어 제품으로 생산되기 위해서는 태양전지의 효율이 더욱 개선되어야 하는 연구과제가 남아 있는 상태이다. 이러한 염료 감응 태양전지의 효율을 향상하는 방안으로는 나노입자의
      산화물 반도체의 입자크기, 결정성, 표면 상태 조절 기술 등의 개발과 나노입자 산화물 반도체 표면과의 견고한 결합력을 가지며 넓은 범위 파장을 흡수할 수 있는 염료의 개방 등 나노입자 산화물 반도체에 관한 연구가
      필요하다. 또 입사되는 빛이 태양전지 표면을 통해 전지 내부로 모두 투과되지 못하고 표면에서 반사되면서 발생하는 광학적 손실을 줄이기 위한 대책도 연구 개발 이루어져야 한다. </p><p>본 연구는 이전 논문에서
      다룬 결과를 바탕으로 DSSC(Dye-Sensitized Solar Cell)에 대표적으로 사용되는 \( \mathrm{TiO}_{2} \) 산화물 반도체를 이용하여 태양전지를 제작하고, 추가로 태양전지 상층
      표면에서의 반사손실을 감소시키기 위해 FTO(Fluorine doped Tin Oxide) 유리 기판을 표면 처리하여 광 전극으로 전달되는 빛의 양을 증가시켜 효율을 개선하고자 하였다. 유리 기판의 표면 처리는
      공정 과정이 매우 간단하고, 컨트롤하기 쉬우며, 가격이 저렴한 습식 에칭을 이용하였다. 이렇게 표면 처리한 전극과 염료 감응 태양전지의 최적 조건을 얻기 위해서 Sample을 광학적, 전기적 특성을 연구하였다.
      </p>
    - <h1>2. 설계 내용</h1> <p>이번 연구에서는 기존에 연구되었던 켄틸리버의 길이및 추의 무게에 직접적으로 의존하지 않고 켄틸리버의 구조적 형상에 따라 상용 압전소자(PI사의 DuraAct)로부터 최대의
