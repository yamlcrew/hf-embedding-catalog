widgetData:
- source_sentence: 'query: 2018 글로벌인텔리전스서밋은 언제 어디서 열렸나요?'
  sentences:
  - 'passage: 서 원장은 이날 서울 웨스틴조선호텔에서 열린 국가안보전략연구원 주최 `2018 글로벌인텔리전스서밋`의 축하 영상메시지를 통해 "두 번의 남북정상회담에 이어 지난주에 미북 정상이 한반도의 완전한
    비핵화와 평화정책에 합의했다. 정보가 왜 안보의 버팀목이자 평화의 길잡이인지 정보가 어떻게 세계 평화에 기여하는지를 제대로 보여줬다고 생각한다”고 말했다.'
  - 'passage: 1999년 벨라루스의 야당 인사들은 이 단체를 콤소몰에 빗대어 "루카몰"()이라고 부르기도 하였다. 이는 루카셴코와 콤소몰의 합성어로 루카셴코 대통령의 개인 숭배를 정치적 기반으로 이용하는 청소년
    단체를 뜻한다.'
  - 'passage: 멕시코의 학교 교육에서는 스페인어와 영어가 필수이고 외국어로는 독일어, 프랑스어 등이 있다. 이 나라의 UNAM이라는 대학은 등록금이 원화로 단돈 500원에 이를 정도로 싸다.'
- source_sentence: 'query: 도부 철도 오고세 선의 종점은 어디인가요?'
  sentences:
  - 'passage: 《30 ROCK》은 미국 NBC TV의 코미디 시리즈이다. NBC방송사를 통해 방송되는 코미디쇼 《TGS》의 제작진과 그외 방송국 사람들의 이야기를 다룬다. 티나 페이, 트레이시 모건, 제인 크라코스키,
    잭 맥브레이어, 스콧 애짓, 앨릭 볼드윈 등 13명의 고정 출연진 외에 매회 뜻밖의 명사들이 출연한다.'
  - 'passage: 1952년 1월 18일에 대한민국 정부는 ‘인접 해양 주권에 관한 대통령 선언(평화선 선언)’을 발표하면서 이 섬을 평화선 안에 포함시켜 보호하도록 했다. 일본 측은 이에 항의하며 대한민국 측에
    독도에 대한 한국 영유권을 부정하는 외교 문서를 보냈다. 이후부터 이 섬은 국제 사회에서 분쟁 지역으로 보이기 시작하였다.'
  - 'passage: 도부 철도 오고세 선()은 일본의 철도 노선 하나이다. 도부 철도가 운영한다. 일본 사이타마현 사카도 시에 있는 사카도 역과 군마 현 이루마 군 오고세 정에 있는 오고세 역을 잇는다.'
- source_sentence: 'query: 묵주기도를 1단만 바치자는 평의회가 있었나요?'
  sentences:
  - 'passage: 이 공항은 남부 베트남의 호찌민 시(넓게 보면 동남보()를 거점으로 한다.

    호찌민 시 중심부(1군)에서 7km 떨어진 떤빈 군에 위치하고 있으며, 공항에서 시내까지는 택시와 버스(152번)로 오고 갈 수 있다.'
  - 'passage: 어떤 평의회에서는 심지어 묵주기도를 5단이 아닌 1단만 바치자고 했던 경우가 있는가 하면 또한 교본에 조직, 운영에 따른 규칙이 자세히 나열되고 있지만 번역이 어렵게 되어 이해하는 데 곤란했던
    일 등 여러 가지 시행착오가 있었으니, 어려운 문제가 생길 때마다 기도하며 연구해서 원만히 운영함으로써 오늘날과 같은 대군단의 조직을 갖추게 된 것이다.'
  - 'passage: 마르더의 차대는 체코제의 38(t) 전차 차대를 사용하여 기계적 신뢰성이 매우 높았으며 화력은 장거리에서 대부분의 경전차와 중전차를 격파하기에 충분한 것이었지만, 마르더 1과 2에서 지적된 수비의
    약점들은 거의 그대로 계승되었다.'
- source_sentence: 'query: 아불 하이르는 언제 화레즘을 공격했나요?'
  sentences:
  - 'passage: 1616년(광해군 8년) 음력 4월 1일 형 흥안군과 함께 사간원에서 탄핵을 받았는데, 당시 사간원에서는 흥안군과 경평군이 새로운 궁궐을 짓기 위해 마련된 빈 부지에 일부 사대부들이 집을 지었다는
    이유로 소란을 피우며, 당시 부지 내에 있던 사대부들의 집을 무단으로 철거하거나, 종들을 풀어 집들을 뺏었다고 보고하였다. 또 두 형제가 늙은 부녀자를 구타하고, 과부들을 능욕하는 등의 행위도 저질렀다고도 하였다.
    또 1618년(광해군 10년)에는 대궐 안의 하인을 무단으로 데려가 폭행하고 감금하는 바람에, 광해군이 직접 추고하라는 전교를 내렸다. 당시 대신들은 여러 차례에 걸쳐 경평군의 삭탈 관직을 청하였으나, 광해군은
    이에 대해서는 윤허하지 않았다. 그러나 경평군은 3년 뒤인 1621년(광해군 13년)에 활인서의 별제로 있던 이제인을 무자비하게 구타하는 바람에, 추고를 하라는 전교가 또 내려졌다. 또 이듬해인 1622년(광해군
    14년)에는 한 금리와 그 처를 잡아다가 죽기 직전까지 구타를 하여 또 탄핵을 받았다.'
  - 'passage: 위도 상으로는 태양의 복사열을 잘 받는 위치에 있지만, 고지대에 있기 때문에 기온은 연중 온화하고, 관광에는 적합한 기후를 가진다. 호수의 연평균 수온도 16.9℃로 안정되어 있다. 풍화설월의
    명소인 따리 4경 중의 하나인 ‘얼하이의 달’로 호수면에 떠오르는 달의 풍치가 뛰어나다고 알려져 있다. 남안의 하관진과 북서쪽에 위치하는 호접천을 묶는 관광선이 운행되고 있다. 선내에서는 부이족의 삼도차를 제공하거나
    부이족의 춤을 선보이는 것도 있다.

    옛 명칭에는 엽유호, 곤미천, 시얼허(西洱河), 시얼허(西二河) 등으로 나온다. 차마고도의 출발지로 8세기에 남조국은 농업용수나 식용수 확보를 위해 이곳에 수도를 두었다고 추측된다. 또한 주위의 숲은 사슴 사냥의
    장소로서 이용되고 있었다고 한다. 그 다음 937년에 개국한 대리국도 얼하이를 생활의 터전으로 이용했다.'
  - 'passage: 1430 - 31년, 아불 하이르는 바카스와 함께 화레즘을 공격해 우르간즈를 점령했다. 그러나 1431년, 우즈베크인들은 도시를 포기하고 후퇴했다. 아불 하이르의 군대는 아스트라한 부근에서 자신에게
    대항하는 두명의 칸에게 패배를 안겨줬다. 1435 - 36년 우즈베크 군대는 화레즘을 다시금 공격하고 몇 년 뒤에는 아스트라한을 공격했다. 1446년 초반에 아불 하이르와 그의 군대는 시르다리야 강 유역을 공격해
    결국 티무르 왕조의 땅 일부를 빼앗았다. 시그나크는 아불 하이르의 새 수도가 되었고, 트란스옥시아나에 대한 그의 공격은 그 곳을 중심으로 이뤄졌다.'
- source_sentence: 'query: 주계열성의 중심핵 온도는 얼마나 될까요?'
  sentences:
  - 'passage: 수소 핵융합 과정은 온도에 민감하기 때문에 중심핵의 온도가 조금만 올라가도 핵융합의 강도는 막대하게 증가한다. 주계열성의 중심핵 온도는 가장 뜨거운 별과 가장 차가운 별을 비교하면 10배 정도밖에
    차이가 나지 않는다. 예를 들면 O형 항성의 경우 중심 온도는 4천만 켈빈이며 어둡고 희미한 적색 왜성의 중심부 온도는 4백만 켈빈 정도에 이른다.'
  - 'passage: 처음 묘소는 충청남도 서산군 보현동(普賢洞) 인좌에 안장되었다가, 뒤에 두번째 부인 순천박씨가 매장된 경기도 양주군 와부면 도곡리 산 97-1 안골(현, 남양주시 와부읍 도곡1리 안골) 금대산(金臺山)의
    갓무봉 언덕으로 이장, 합장되었다. 동시에 충청북도 충주에 안장되었던 본처 대구서씨의 묘소도 이장하여 그의 묘소에 합장하였다. 중종 때의 반정공신 박원종의 묘소가 근처에 있다. 완순군 이재완 역시 그의 묘소 근처에
    안장되었다. 또한 완순군의 묘 아래에는 그의 양자 이재완의 아들 이달용의 묘가 있다.'
  - 'passage: 독일 형법(Strafgesetzbuch, StGB)은 모든 류의 범죄에 적용 가능한 총칙(Allgemeiner Teil)과 각각의 범죄를 서술해놓은 각칙(Besonderer Teil)으로 구성되어있다.
    다른 법률에서도 다른 종류의 범죄들을 서술하고 있기는 하지만, 총칙에서 서술된 원칙은 그런 법률들에도 적용이 가능하다. 대륙법체계를 따르기 때문에 성문화 되어있고, 판사에 의해 이해되고 적용된다. 그렇기 때문에
    사안의 사실관계확정에 초점을 두며 무죄추정의 원칙이 적용된다. 특히, 독일은 헌법 103조 2항에서 죄형법정주의를 채택하고 있고, 이를 형법총칙 제1조에서 다시 한번 언급하고 있다. 즉, 형법상의 책임은 의회가
    제정한 법률에 근거해야 한다고 밝히고 있다. 의회에서 제정한 법률이 어떤 행위를 범죄화하기 위한 목적으로 인용하지 않는 한, 정부의 시행령이나 규칙으로는 범죄에 대한 책임을 묻기에 충분하지 않다. 형법총칙 제11조
    5항에 보면 위법한 행위란 형법상의 구성요건을 실행하는 행위라고 한다. 즉, 범죄가 성립되려면 [범죄의 성립요건]을 만족해야 하며 이에는 구성요건 해당성, 위법성, 유책성(책임)이 있다. 특히 형법총칙 제16조에
    ''구성요건적 착오''를 둠으로써 범죄성립 요건을 만족하였더라도 구성요건을 착오한 자는 죄를 면제해주거나 경감해줄 수 있도록 조치하였다. 형벌의 종류에는 자유형, 벌금형, 재산형, 부가형의 4가지가 존재한다. 제2차
    세계대전 이후 형법을 부분개정하는 과정에서, 1949년 사형 제도가 폐지되었고, 1951년 내란죄, 간첩죄 등 국가적 법익을 침해하는 범죄에 대한 개정이 이루어졌으며, 1953년 보호관찰부 집행유예 제도와 가석방
    제도가 도입되는 등 형법체제가 정비되었다. 1990년 동서독 통일 이후 독일 형법은 몇몇 분야에서 동독 형법과 서독 형법으로 나눠진 이원적 법적용 상황이 형성되었고 이를 제거하기 위해 1994년 5월 동성애 규정이
    폐지되었고, 제182조의 죄명을 개정하는 등, 구동독 형법의 구성요건을 수용하는 노력을 보였다.'
