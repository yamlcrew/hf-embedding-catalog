      부이족의 춤을 선보이는 것도 있다.

      옛 명칭에는 엽유호, 곤미천, 시얼허(西洱河), 시얼허(西二河) 등으로 나온다. 차마고도의 출발지로 8세기에 남조국은 농업용수나 식용수 확보를 위해 이곳에 수도를 두었다고 추측된다. 또한 주위의 숲은 사슴 사냥의
      장소로서 이용되고 있었다고 한다. 그 다음 937년에 개국한 대리국도 얼하이를 생활의 터전으로 이용했다.'
    - 'passage: 1430 - 31년, 아불 하이르는 바카스와 함께 화레즘을 공격해 우르간즈를 점령했다. 그러나 1431년, 우즈베크인들은 도시를 포기하고 후퇴했다. 아불 하이르의 군대는 아스트라한 부근에서
      자신에게 대항하는 두명의 칸에게 패배를 안겨줬다. 1435 - 36년 우즈베크 군대는 화레즘을 다시금 공격하고 몇 년 뒤에는 아스트라한을 공격했다. 1446년 초반에 아불 하이르와 그의 군대는 시르다리야 강
