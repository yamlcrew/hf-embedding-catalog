      갓무봉 언덕으로 이장, 합장되었다. 동시에 충청북도 충주에 안장되었던 본처 대구서씨의 묘소도 이장하여 그의 묘소에 합장하였다. 중종 때의 반정공신 박원종의 묘소가 근처에 있다. 완순군 이재완 역시 그의 묘소
      근처에 안장되었다. 또한 완순군의 묘 아래에는 그의 양자 이재완의 아들 이달용의 묘가 있다.'
    - 'passage: 독일 형법(Strafgesetzbuch, StGB)은 모든 류의 범죄에 적용 가능한 총칙(Allgemeiner Teil)과 각각의 범죄를 서술해놓은 각칙(Besonderer Teil)으로 구성되어있다.
      다른 법률에서도 다른 종류의 범죄들을 서술하고 있기는 하지만, 총칙에서 서술된 원칙은 그런 법률들에도 적용이 가능하다. 대륙법체계를 따르기 때문에 성문화 되어있고, 판사에 의해 이해되고 적용된다. 그렇기 때문에
      사안의 사실관계확정에 초점을 두며 무죄추정의 원칙이 적용된다. 특히, 독일은 헌법 103조 2항에서 죄형법정주의를 채택하고 있고, 이를 형법총칙 제1조에서 다시 한번 언급하고 있다. 즉, 형법상의 책임은 의회가
      제정한 법률에 근거해야 한다고 밝히고 있다. 의회에서 제정한 법률이 어떤 행위를 범죄화하기 위한 목적으로 인용하지 않는 한, 정부의 시행령이나 규칙으로는 범죄에 대한 책임을 묻기에 충분하지 않다. 형법총칙 제11조
      5항에 보면 위법한 행위란 형법상의 구성요건을 실행하는 행위라고 한다. 즉, 범죄가 성립되려면 [범죄의 성립요건]을 만족해야 하며 이에는 구성요건 해당성, 위법성, 유책성(책임)이 있다. 특히 형법총칙 제16조에
      ''구성요건적 착오''를 둠으로써 범죄성립 요건을 만족하였더라도 구성요건을 착오한 자는 죄를 면제해주거나 경감해줄 수 있도록 조치하였다. 형벌의 종류에는 자유형, 벌금형, 재산형, 부가형의 4가지가 존재한다.
      제2차 세계대전 이후 형법을 부분개정하는 과정에서, 1949년 사형 제도가 폐지되었고, 1951년 내란죄, 간첩죄 등 국가적 법익을 침해하는 범죄에 대한 개정이 이루어졌으며, 1953년 보호관찰부 집행유예 제도와
      가석방 제도가 도입되는 등 형법체제가 정비되었다. 1990년 동서독 통일 이후 독일 형법은 몇몇 분야에서 동독 형법과 서독 형법으로 나눠진 이원적 법적용 상황이 형성되었고 이를 제거하기 위해 1994년 5월
      동성애 규정이 폐지되었고, 제182조의 죄명을 개정하는 등, 구동독 형법의 구성요건을 수용하는 노력을 보였다.'
