- source_sentence: 'query: NH농협금융지주 임원후보추천위원회는 금융지주 대표이사 회장 최종후보로 누구를 추천했나?'
  sentences:
  - 'passage: 검찰이 고용노동부가 삼성전자서비스의 불법파견 여부를 조사할 당시 고위 공무원들이 조사과정에 부당하게 개입했다는 의혹에 대해 강제수사에 나섰다. 서울중앙지검 공공형사수사부(김성훈 부장검사)는 13일
    오전 정부세종청사에 있는 노동부 노동정책실 노사협력정책과 등지에 검사와 수사관들을 보내 삼성전자서비스 근로감독 관련 기록과 컴퓨터 하드디스크 등을 확보하고 있다. 노동부는 삼성전자서비스 AS센터에 대해 불법파견
    의혹이 제기되자 2013년 6∼7월 수시 근로감독을 벌였다. 노동부는 근로감독을 한 차례 연장한 끝에 같은 해 9월 불법파견이 아니라는 결론을 내렸다. 이 과정에서 정현옥 당시 차관이 노동정책실장에게 노동부 출신
    삼성전자 핵심인사와 접촉을 지시하는 등 노동부 고위직들이 삼성 측과 유착해 근로감독 결과에 부당한 영향력을 행사했다는 의혹이 제기됐다. 검찰은 이런 의혹을 뒷받침하는 정황을 일부 포착하고 이날 강제수사에 나선 것으로
    전해졌다. 고용노동행정개혁위원회는 최근 이런 내용의 조사결과를 발표하고 검찰 수사를 촉구했다. 삼성전자서비스 노조 등은 정 전 차관 등 노동부 전.현직 공무원 11명을 직권남용권리행사방해 등 혐의로 검찰에 고발한
    바 있다.'
  - 'passage: 2018 평창동계올림픽이 열리는 2월 한 달 간 개최지인 강원지역 고속도로와 국도 등에서 각국 선수단과 임원 등 관계자들의 이동을 돕기 위해 올림픽 전용차로(O·L :Olympic Lane)가
    운용된다. 21일 도로교통공단에 따르면 평창올림픽(2월9∼25일) 기간을 낀 2월1∼28일 영동고속도로 인천방향 대관령나들목(IC)→강릉분기점(JC) 약 19.8㎞ 구간, 국도 6호선·지방도 456호선 태기사거리∼대관령IC
    39.6㎞ 구간 등 전체 59.4㎞ 구간 1차로에 올림픽 전용차로가 설정된다. 차로 운용 시간대는 오전 7시부터 다음날 오전 1시까지다. 올림픽에 이은 동계 패럴림픽(3월9∼18일) 기간에는 영동고속도로 구간만
    전용차로를 둔다. 이 기간 고속도로 구간 전용차로는 9인승 이상 승용·승합자동차와 올림픽조직위원회 행사차량임을 표시한 차량만 운행할 수 있다. 국도·지방도 구간 전용차로는 올림픽 차량과 36인승 이상 대형 승합차량
    등만 이용 가능하다. 이를 제외한 일반 차량의 전용차로 통행은 제한되며, 위반하면 승합차 7만원·승용차 6만원의 범칙금과 벌점 30점이 부과된다. 평창군에 있는 장평터널과 속사터널은 올림픽 기간에는 전용차로로만
    운용되므로 일반 차량은 다른 길로 우회해야 한다. 올림픽 전용차로 구간에는 운전자 안내를 위해 표지판을 설치하고, 도로 위에 전용차로임을 뜻하는 청색 점선과 오륜마크를 표기한다.'
  - 'passage: 김광수 전 금융정보분석원(FIU) 원장(사진)이 NH농협금융지주 회장에 내정됐다. 19일 NH농협금융지주 임원후보추천위원회는 김광수 전 원장을 금융지주 대표이사 회장 최종후보로 추천했다고 밝혔다.
    당초 후보자 3명에 대해 심층면접을 거쳐 최종 후보자를 추천할 계획이었으나 윤용로 현 코람코자산신탁 회장의 후보 고사와 당일 김용환 현 회장의 후보 사퇴로 김광수 단독 후보자에 대해 심층면접을 했다. 심층면접 결과
    농협금융 임추위는 만장일치로 김 전 원장을 최종 후보로 결정하고 주주총회에 추천하기로 결정했다. 김 전 원장은 행시 27회로 관직에 입문한 옛 재정경제원 관료 출신으로 현 정부 들어 금융위원장, 금융감독원장 등으로
    하마평에 올랐던 인물이다.'
- source_sentence: 'query: 비욘세는 아이가 몇이야?'
  sentences:
  - 'passage: 두산중공업은 한국중부발전이 발주한 신서천 화력발전소 탈황설비(FGD, Flue Gas Desulfurization) 공사를 약 1240억원에 수주했다고 27일 밝혔다. 신서천 화력발전소는 충남
    서천군 서면 마량리에 건설중인 1000MW급 발전소다. 두산중공업은 지난 2015년 이 발전소와 터빈.발전기 공급계약을 맺은 데 이어, 금호산업과 컨소시엄을 이뤄 탈황설비 공사를 수행하게 됐다. 두산중공업이 맡은
    탈황설비 기자재 공급 금액은 700억원 규모다. 탈황설비는 화력발전소의 배기가스 내 대기오염 원인 물질인 황산화물(SOx)을 제거함으로써 발전소 굴뚝에서 나오는 연기를 수증기 수준으로 정화시켜주는 친환경 설비다.'
  - 'passage: {IMG:1}더불어민주당 오중기 경북도지사 후보가 2일 포항에서 선거사무실에서 비전선포식을 갖고 한반도 핵심은 경북이라고 강조했다. 오 후보는 비전 선포식 자리에서 남북정상회담의 성공적 개최로
    향후 남북 경제협력에 있어 핵심적인 역할을 할 지역이 포항을 중심으로 한 동해안이다며 동해안 일대는 ‘한반도 신 경제지도’를 수행할 전력, 해양 등 인프라가 구축돼 있어 남북경협을 주도할 위치에 있다고 밝혔다.
    또, 한반도 신경제지도의 핵심은 남북 철도, 도로를 이어 한반도에 H라인을 구축, 대륙과 해양으로 뻗어나갈 인프라를 조성하는 것이다며 동해안 지역은 부산~금강산~원산~나진으로 연결되는 ‘동해안벨트’에 포함된다고
    설명했다. 특히,동해선을 통해 남북철도가 연결되면 시베리아 횡단철도(TSR)와 연계해 남한의 물류가 유라시아까지 공급될 수 있다”며 정상회담 성공적 개최에 따른 기대감을 드러냈다. {IMG:2}오 후보는 이와 함께
    문재인 정부의 국정철학인 지역균형발전과 연계한 지역발전 전략으로 5대 정책과 15대 실천 방안을 내놓았다. 5대 정책은 대기업과 상생협력 생태계 조성.청년 창업 메카 실현, 전통역사와 문화자원을 활용한 인간 중심의
    문화 르네상스, 인구소멸 위기의 대응, 경북의 미래 먹거리 창출과 안전한 경북 등이다. 이를 위한 15대 실천방안으로는 원전해체 연구센터를 포함한 국제 원자력 안전 연구단지 조성과 연구·교육·체험 산업 클러스터
    조성, 백두대간 임업 클러스터구축, 남북 6축 고속도로 조기 착공, 미래형 자동차 철강소재 부품산업 벨트육성 등을 제시했다. 이에 앞서 오 후보는 지난달 30일 경북 영덕군 강구항에서 남북정상회담의 성공을 축하하고
    후속조치의 중요성을 강조하는 2018 남북정상회담과 경북의 역할이란 제목으로 기자회견을 가졌다. 오 후보는 청와대 균형발전실 선임행정관으로 국정에 참여했고 중앙당 지도부 경험이 있는 저 오중기가 도민들과 더불어
    경북 미래의 문을 여는 열쇠가 되겠다. 문재인 정부의 국정철학을 경북에서 완성하겠다고 말했다.'
  - 'passage: 아이와 함께 특별한 행사에 참석하는 한 엄마를 상상해보시라. 아이 뒤치다꺼리를 해야 할 지도 모른다는 생각에 되도록 편한 옷을 입을 거라고 생각하게 된다. 노출이 있는 옷은 언감생심이다. 아이를
    곁에 둔 엄마와 ‘섹시’는 어울려서는 안 되는 조합같이 느껴지기 때문이다. 그러나 팝스타 비욘세의 선택은 달랐다. 통념을 완벽하게 깬 드레스를 입고 아이와 함께 행사장에 등장했다. 비욘세 28일(현지시간) 뉴욕
    매디슨 스퀘어 가든에서 열린 제60회 그래미 시상식에서 남편 제이지와 딸 블루 아이비와 함께했다. 비욘세, 제이지 부부는 할리우드 여배우들의 성폭력 고발 캠페인 ‘미투’에 동참한 듯 모두 검은색 의상을 입었다.
    6살 된 딸은 흰색 긴 재킷을 입었다. 특히 아이 옆에 앉은 비욘세의 드레스는 시선을 강탈하기 충분했다. 자리에 앉아 있을 때 양옆으로 쫙 벌어지는 긴 드레스였다. 허벅지까지 노출되는 과감한 드레스였다. 아이와
    동석한 행사에서 나온 모습이라고 상상하기 어렵다. 비욘세는 지난해 6월 낳은 쌍둥이에 바로 옆에 동석한 딸까지, 세 아이의 엄마다.'
- source_sentence: 'query: 2017년 말산업실태조사 결과에 따르면 승마시설 수는?'
  sentences:
  - 'passage: 승마시설 512곳으로 늘어.. 말 사육 수 2만7210마리 귀족 레포츠라는 이미지가 짙은 승마를 즐기는 국민이 늘고 있다. 승마인구 증가로 말산업 또한 확대되면서 말산업으로 인한 경제적 효과는
    3조4000억원에 이르는 것으로 분석됐다. 6일 농림축산식품부가 발표한 2017년 말산업실태조사 결과에 따르면 승마시설 수는 전년 대비 6.9% 증가한 512개소다. 이는 2012~2016년 제1차 말산업육성 종합계획상
    목표인 500개소를 초과 달성한 수치다. 말산업 사업체 수는 전년 대비 8.4% 증가한 2470개소다. 이 중 말 보유 사업체 수는 9.5% 증가한 2146개소다. 말 사육마릿수는 전년 대비 0.3% 증가한 2만7210마리다.
    사육용도는 승용이 1만1458마리(42.1%)로 가장 많고 경주용 7303마리(26.8%), 번식용 4549마리(16.7%), 육용 865마리(3.2%) 등이다. 특히 승마인구는 1만292명 증가한 94만8714명으로
    지속적인 성장 추세다. 이 중 정기적으로 승마를 하는 즐기는 정기 승마인구는 전년 대비 3.9% 증가한 4만9312명이다. 체험 승마인구는 전년 대비 0.8% 증가한 89만9402명이다. 말산업 종사자는 전년 대비
    0.1% 증가한 6946명이다. 다만 경마분야 종사자는 전년 대비 4.2% 감소한 9315명을 기록했다. 이는 무인발매기 도입으로 인한 발매인원이 감소한 데 따른 것으로 분석됐다.'
  - 'passage: {IMG:1}블랙리스트 타파와 공공성 회복을 위한 연극인회의(블랙타파)가 한국연극협회 이사장을 향해 재차 사퇴할 것을 촉구했다. 블랙타파는 1일 정대경 이사장은 더 이상 거짓말 하지 말고 사퇴하라는
    논평을 통해, 정 이사장이 언론 등을 통해 밝힌 해명이 거짓이라고 지적했다. 지난달 29일 블랙타파가 한국연극협회 이사회는 정대경 이사장을 탄핵하라! 는 제목의 성명서를 발표하자, 이후 정 이사장은 언론을 통해
    예술위 안에서 지원 배제를 막기 위해 가장 열심히 싸웠다 블랙리스트의 존재를 알고부터 이를 원만하게 해결하게 위해 최선을 다했는데 억울하다고 호소하며, 자신사퇴를 거부했다. 블랙타파는 정 이사장의 입장은 이미 밝혀진
    사실을 왜곡하는 행위라고 말하는 동시에 언론을 향해 더 이상 정대경 이사장의 거짓말을 실어나르지 말라고 주장했다. 블랙리스트 진상조사 및 제도개선위원회의 진상조사(진상조사위) 결과, 정 이사장은 한국문화예술위원회
    위원으로서 임무를 수행하던 기간에 블랙리스트 실행을 묵인 방조하고, 블랙리스트 피해자 배제에 깊이 관여한 것으로 드러났다. 하지만 연극인이 더욱 분노하는 지점은 그가 한국연극협회 이사장 선거에 문체부 등에 요청하여
    관권을 개입시킨 범죄사실이다. 블랙타파는 진상조사위가 지난 8일 발표한 종합결과보고 자료집에는 정대경 이사장이 예술위 위원의 직위를 이용해 문체부, 예술위에 선거 개입을 요구한 사실이 적시되어 있다며 정 이사장의
    선거개입 요청에 대한 다수의 진술이 있으며, 정대경 이사장은 블랙리스트 실행을 막기 위해 양해조치를 요구했다고 주장하고 있지만 그것이 선거에 도움이 될 것이라고 생각했다고 스스로 진술하였다고 했다. 이어 블랙타파는
    블랙리스트 묵인, 방조, 협조 등의 행위도 문제적이지만 선거에 관권을 끌어들인 행위는 그 자체가 범죄행위라며 자신의 당선을 위해 민간협회 독립성을 스스로 무너뜨린 파렴치한 행위가 아닐 수 없다고 지적했다. 끝으로
    블랙타파는 정 이사장을 향해 지난 과오를 반성하고 사죄하며 최소한의 책임이라도 다하는 것이 연극인으로서 자신의 명예를 지키는 일이다고 충고하고, 한국연극협회에 정 이사장의 범죄 사실에 대한 정확한 입장을 밝혀주기
    바란다고 촉구했다. 블랙타파는 지난해 4월, 120개 단체와 600여 명의 연극인·예술가의 지지를 통해 결성된 단체이다. 블랙타파는 정 이사장이 스스로 물러나지 않거나, 이사회가 그를 탄핵하지 않을 시 직권남용권리행사방해죄의
    공범 및 직무유기죄 등으로 형사고발한다는 입장이다.'
  - 'passage: 보령제약은 필리핀 제약사인 인듀어메디칼과 3년간 50억원 규모의 항암제 이피마이신주, 에이디마이신주, 옥살리플라틴주, 네오타빈주 4개 품목에 대한 독점공급계약을 체결했다고 12일 밝혔다. 계약식은
    지난 11일 스페인 마드리드 이페마(IFEMA) 컨벤션센터에서 개최된 세계의약품전시회(CPhI Worldwdie) 현장에서 진행됐다. 이번 계약으로 보령제약은 3년 간 총 50억원(400만 달러) 규모의 의약품을
    공급하게 됐으며 1차 항암제에 대한 동남아 시장 확대를 가속화하게 됐다. 보령제약은 태국, 인도네시아, 베트남 등 동남아시아 지역에 항암제를 수출하고 있다. 이를 기반으로 아프리카, 중남미지역 등으로 시장을 더욱
    넓혀갈 계획이다. 한편, 2002년 창립된 인듀어메디칼은 필파마웰스그룹의 7개 계열사 중 하나로 대표 품목은 페니실린계 의약품 및 흡입마취제 등이다. 필리핀과 싱가포르 제조시설을 거점으로 글로벌 파트너사와 함께
    60여개의 의료기기 및 의약품을 통해 시장을 선도하고 있는 중견 제약사다.'
- source_sentence: 'query: LG유플러스 새로운 사령탑에 누가 올랐어?'
  sentences:
  - 'passage: 현재 코스모화학(005420)은 전일대비 8.44% 상승하여 25,050원 선에서 거래가 이루어지고 있다. 상장주식수 대비 거래량은 2.55%로 적정수준 최근 한달간 코스모화학의 상장주식수 대비
    거래량을 비교해보니 일별 매매회전율이 2.55%로 집계됐다. 그리고 동기간 장중 저점과 고점의 차이인 일평균 주가변동률을 4.32%를 나타내고 있다. 외국인 보유량 감소, 기관 증가 (5일 누적) 최근 5일간 동종목의
    외국인 투자자는 3,346주 순매도하였고 반면 기관은 4,650주 순매수하였다. 전날 두 주체 각각 9,693주, 4,650주 순매수하며 보유 비율을 늘렸다. 다음 표는 동종목의 외국인, 기관의 일별 순매수량을
    나타낸 것이다. fnRASSI는 증권전문 기업 씽크풀과 파이낸셜뉴스의 협업으로 로봇기자가 실시간으로 생산하는 기사입니다.'
  - 'passage: 현재 엠에스오토텍(123040)은 전일대비 9.39% 상승하여 1,980원 선에서 거래가 이루어지고 있다. 주가등락폭이 너무 커 최근 한달간 엠에스오토텍의 상장주식수 대비 거래량을 비교해보니 일별
    매매회전율이 0.34%로 집계됐다. 동기간 일평균 주가변동률은 17.52%로 장중 주가등락이 심하기 때문에 투자시 주의가 요망된다. 외국인/개인 순매수, 기관은 순매도(한달누적) 전일 외국인이 4,382주를 순매수했다.
    4주간을 기준으로 보면 외국인이 매매관점을 매도에서 매수로 전환하면서 3,781주를 순매수했고, 개인들도 매기를 떨어뜨리면서도 10,851주를 순매수했다. 하지만 기관은 순매수에서 순매도로 반전되면서 14,632주를
