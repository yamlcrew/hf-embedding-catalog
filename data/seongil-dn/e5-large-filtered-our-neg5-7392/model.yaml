      설명했다. 특히,동해선을 통해 남북철도가 연결되면 시베리아 횡단철도(TSR)와 연계해 남한의 물류가 유라시아까지 공급될 수 있다”며 정상회담 성공적 개최에 따른 기대감을 드러냈다. {IMG:2}오 후보는 이와
