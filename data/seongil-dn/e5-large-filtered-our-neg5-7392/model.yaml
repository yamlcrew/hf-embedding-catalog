  - 'passage: {IMG:1}LG유플러스 새로운 사령탑에 하현회 부회장이 올랐다. 구광모 LG회장 취임 뒤 그룹 내 첫 인사이자, 5G 통신 상용화, 케이블TV 인수합병 등 굵직한 사안들을 앞둔 만큼 그 변화에
    관심이 쏠린다. LG유플러스는 16일 이사회를 열고 하 부회장을 신임 최고경영자(CEO)로 선임했다. 부산대 사학과, 일본 와세다대 경영학 석사를 마친 하 부회장은 지난 1985년 LG금속에 입사한 뒤, LG디스플레이에서
    전략기획담당, 중소형사업부장, IT사업부장을 지냈다. 지난 2012년부터 2년간 ㈜LG 시너지팀장을 맡은 그는, 모바일과 차세대 디스플레이, 에너지 솔루션과 친환경 자동차부품 등 그룹 주력사업과 차세대 성장사업이
    본궤도에 진입할 수 있도록 기반을 확립했다. 아울러 LG전자 HE사업본부장을 맡아 울트라 올레드 TV를 세계 최초로 출시해 차세대 TV 부문에서 선도적으로 사업기반을 구축했다. 특히 지난 2015년부터 ㈜LG 대표이사를
    맡으면서 계열사 실적 개선을 이끌며 LG그룹이 사업 성과를 거두는 데 핵심적인 역할을 수행했다. 올해 그는 ㈜LG 부회장으로 승진했다. 하 부회장은 지난 2015년부터 LG유플러스 이사회 멤버로 주요 의사결정에
    참여해오기도 했다. 모바일 비디오, IoT, AI, 5G 등 통신산업의 변화에 대한 이해가 깊고 미래 먹거리 사업에 힘을 기울여왔다는 평가다. 하 부회장은 LG그룹 내 재무통으로 불리는 권영수 부회장과 달리 전략통으로
    통하기 때문에 향후 투자를 늘리는 방향에도 관심이 쏠린다. 다만, 하 부회장의 어깨는 무겁다. 그가 이끌어야 할 LG유플러스 앞에는 풀어야할 숙제가 산적해 있기 때문이다. 5G 상용화를 위한 장비사 선정이 가장
    시급한 과제다. 전임 권영수 부회장은 5G 장비로 중국 화웨이를 사용하겠다고 밝혔지만, 이에 국내 여론은 싸늘한 편이다. 실제 5G에서도 LG유플러스가 화웨이 장비를 도입한다면 비판 여론을 풀어나가는 것은 하 부회장의
    몫이 될 예정이다. LG유플러스가 이미 추진하고 있는 케이블TV MA에서도 하 부회장의 경영 능력이 시험대에 오를 전망이다. LG유플러스는 미디어 플랫폼 확대를 위해 CJ헬로를 비롯한 케이블TV MA에 공개적으로
    관심을 드러낸 바 있다. LG유플러스가 케이블TV MA를 위해 다양한 사업자들과 접촉했던 만큼 하 부회장의 결정은 방송·통신 시장에서 새로운 변화의 바람으로 작용할 것으로 보인다. 세계 최대 온라인동영상서비스(OTT)
    넷플릭스와의 제휴도 관심사다. 전임 권 부회장이 넷플릭스와 제휴를 의욕적으로 추진했지만, LG유플러스 내부적으로는 조심스러운 분위기가 감지됐던 것이 현실이다. 회사 내부적으로는 미디어 사업 1위 목표를 내세우고
    있다. 콘텐츠 대가 산정 비율이나 망 사용료 등은 비단 LG유플러스에게만 적용되는 것이 아니기 때문이다. 논란을 피해 어느 정도 수준의 협상력을 발휘할지는 하 부회장의 조율 능력이 중요한 것으로 예상된다. 한편,
    전임 CEO인 권영수 부회장이 ㈜LG 대표이사로 옮기더라도 이전까지 하 부회장의 위치처럼 LG유플러스 이사회 내 기타비상무이사로 남는 점도 주목된다. 이에 따라, 하 부회장 체제의 조직 재정비는 연말 그룹 인사에
    맞춰 진행되고, 올해 남은 기간 동안 기존 경영 기조를 이어갈 것이란 전망이 지배적이다. 통신업계에서는 LG유플러스가 새로운 CEO를 맞이한 만큼 케이블TV 인수나 넷플릭스 제휴 확대와 같은 현안을 두고 새판을
    짜기 위한 결정이 머지 않아 나올 것으로 내다보고 있다. LG유플러스는 관계자는 하 부회장이 ㈜LG에서 계열사간 시너지를 창출한 경험을 바탕으로 LG유플러스의 본원적 경쟁력을 지속 강화하는 동시에 미래시장 개척을
    위한 신성장동력 발굴에 집중해 나갈 예정이라고 강조했다.'
- source_sentence: 'query: 쿠첸은 적자행진에서 어떻게 벗어났어?'
  sentences:
  - 'passage: 쿠첸이 4분기만에 적자행진에서 벗어났다. 수익성 회복을 위한 판매 채널 확대, 원가율 개선 노력과 신제품 출시 등 호재가 맞물렸다. 16일 생활가전업계 및 증권가에 따르면 쿠첸은 지난 1.4분기
    619억원의 매출액과 13억원의 영업이익을 기록했다. 매출액은 1년전 685억원에 비해 9.7% 줄었지만 영업이익은 6억원에서 13억원으로 두배이상 늘었다. 이에 따라 쿠첸은 지난 2.4분기부터 시작된 분기 기준
    적자 행진에서 벗어나게 됐다. 쿠첸은 지난해 1.4분기 6억원의 영업이익을 기록한 이후 2.4분기에 57억원 손실, 3.4분기 12억원 손실, 4.4분기 20억원 적자 등 작년 한 해 83억원 가량의 손실을 입었다.
    금액 기준으로 역대 최대 규모였다. 회사 측은 올 1.4분기 설 연휴로 호실적이 가능했다고 본다. 실제로 지난해 4.4분기 대비로 IH압력밥솥, 열판압력밥솥, 일반밥솥, 전기레인지, 기타품목 모두 매출이 상승했다.
    특히 쿠첸의 야심작이었던 IR밥솥과 전기레인지가 함께 나아지고 있는 점이 특징이다. 프리미엄급 IR밥솥 비중이 순차적으로 증가하고 있고, 전기레인지 인지도 확대에 따라 홈쇼핑.B2B 채널에서 판매 호조를 나타냈다고
    회사 측은 설명했다. 판매 채널을 수수료가 높은 오프라인에서 온라인 위주로 개선하고, 원가율을 낮추는 등 노력을 기울이고 있다.'
  - 'passage: 현대에이치씨엔(126560)은 52주신고가를 기록하고 있어 주목할만하다. 동종목의 현재 주가는 4,650원 선에서 이루어지고 있다. 거래일을 기준으로 최근 3일간 평균 거래량은 31만 주이다.
    이는 60일 일 평균 거래량 9만 주와 비교해보면 최근 거래량이 급격히 늘어났다는 것을 알 수 있다. 거래비중 기관 30.5%, 외국인 28.18% 최근 한달간 주체별 거래비중을 살펴보면 개인이 전체 거래량의 41.31%를
    차지하며 가장 활발한 참여를 보였고, 기관은 30.5%, 외국인은 28.18%의 거래 참여율을 보였다. 그리고 최근 5일간 거래비중은 개인이 전체 거래의 35.43%를 차지하며 가장 적극적인 모습을 보여줬고, 외국인은
    33.83%를 나타냈으며 기관은 30.73%를 나타냈다. 외국인/기관 순매수, 개인은 순매도(한달누적) 전일까지 기관이 2일 연속, 외국인이 10일 연속 각각 동종목을 순매수 했다. 4주간을 기준으로 보면 외국인이
    초반에 동종목을 순매수한 이후에 기세를 이어가며 158,133주를 순매수했고, 기관도 초반에 동종목을 순매수한 이후에 최근에는 순매수량이 줄어들고 있음에도 불구하고 3,362주를 순매수했다. 반면 개인들은 매도쪽으로
    방향을 잡으면서 161,495주를 순매도한 것으로 나타났다. fnRASSI는 증권전문 기업 씽크풀과 파이낸셜뉴스의 협업으로 로봇기자가 실시간으로 생산하는 기사입니다.'
  - 'passage: 세계적인 복서 플로이드 메이웨더 주니어 (Floyd Mayweather Jr.)가 전용기를 타고 국내 입국할 예정이다. 열렬한 힙합 마니아로 잘 알려진 메이웨더는 본인의 공식 브랜드 TMT 산하
