    메이웨더는 이번 일정 중에 26일에는 서울 강남구 신사동 ‘바이브레이트 플래그쉽 스토어’에서 팬들과 만난다. 팬들과 가깝게 만나는 팬사인회 일정으로 진행될 예정이다. 특히 이날 행사에는 세계 챔피언 복서 플로이드
    메이웨더 주니어(Floyd Mayweather Jr. 이하 메이웨더)를 비롯해 래퍼 릴 웨인과, 릴 제임스가 함께할 예정으로 더욱 기대를 모은다. 메이웨더는 총 자산 규모가 1조가 넘을 정도로 소위 얘기하는 ‘거물급’
    스포츠 스타이다. 경제지 포브스에 따르면 2015년 기준 세계에서 가장 많은 돈을 번 스포츠 스타며 메이웨더의 별명은 ‘머니’로 그의 남다른 돈자랑은 SNS는 물론 언론에서까지 항상 화제를 낳은 바 있다. 메이웨더는
    1996년 데뷔 이후 49전 ‘무’패 최근 UFC역사상 가장 핫한 ‘코너 맥그리거’와의 결투에서 승리한 스포츠 스타다. 이번 팬미팅은 국내 팬들을 위해 메이웨더 측에서 준비한 깜짝 이벤트로 한국스타들의 뜨거운 사랑을
    받고 있는 감각적인 스트릿 브랜드 바이브레이트에서 주최해 팬들에게 잊지 못할 감동과 추억을 선사할 예정이다. 한편 메이웨더 팬미팅에 대한 상세 정보 및 이벤트는 바이브레이트 공식 SNS를 통해 확인이 가능하다.'
