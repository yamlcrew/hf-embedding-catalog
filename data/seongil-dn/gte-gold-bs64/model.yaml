widgetData:
- source_sentence: 세종특별자치시의 행정구역은 어떻게 되나요?
  sentences:
  - 잉글랜드 주민들이 앵글로색슨족인 반면 스코틀랜드 주민들은 아일랜드나 프랑스 북부 브르타뉴, 스페인 북부 갈리시아와 같은 켈트족이다. 따라서 잉글랜드와는 문화가 다르며, 국민성도 다르다. 언어는 원래 영어와 다른
    스코틀랜드 게일어, 그리고 스코트어를 사용하였으나 영어의 영향 및 스코틀랜드문화에 대한 잉글랜드의 탄압으로 사용인구가 줄어들었다. 스코트어는 영어와 계통이 같은 게르만어파로서 중세영어의 모습을 많이 보존하고 있다.
    스코틀랜드 사람들의 영어도 스코트어가 혼합되어 있는데, 발음도 잉글랜드 발음과 많이 다르다. 예를 들어 잉글랜드 사람들은 모음 다음에 나오는 알(R)을 발음하지 않는 반면 스코틀랜드 사람들은 미국이나 캐나다 사람들처럼
    알(R)을 분명히 발음한다. 스코틀랜드 게일어는 게르만어파와 전혀 다른 켈트어파에 속하는 켈트족의 순수한 언어로서 현재 사용인구가 1000여명밖에 남아있지 않아 사멸위기에 놓여있다. 2005년에 공용어로 지정되었다.2005년
    총선거 이전까지 스코틀랜드에는 영국 의회의 하원 의석 가운데 72석이 할당되어 있었다. 이것은 연합왕국을 구성하는 다른 지역에 비해 의석이 과다 할당된 것이었다. 1998년 스코틀랜드법의 81조를 통해 스코틀랜드의
    선거구를 잉글랜드와 균등하게 조정하였다. 그 결과 스코틀랜드에 할당된 의석을 57석으로 줄이는 스코틀랜드 선거구 조정 위원회의 권고가 2005년 총선거에서부터 적용되었다. 이러한 의석수 삭감을 위해 영국 의회에서는
    1998년 스코틀랜드법에 대한 수정안이 2004년 스코틀랜드 선거구법으로 통과되었다. 과도할당된 의석을 바탕으로 스코틀랜드는 영국 하원 내에서의 큰 발언권을 갖고 있었으나, 스코틀랜드 의회가 부활되고 난 이후에는
    그러한 발언권이 굳이 필요하지 않게 되었다는 점도 관련된다.
  - 새만금지역은 행정구역상 2시1군 19개 읍·면·동으로 군산시, 김제시, 부안군에 걸쳐 총 401km에 이르며 뉴욕 맨해튼의 5배, 서울특별시 면적의 3분의2, 행정복합도시로 새롭게 탄생되는 세종특별자치시 면적의
    5.7배에 달한다.
  - 세종특별자치시의 행정 구역은 1읍, 9면, 9행정동(14개 법정동)으로 구성되어 있으며, 2018년 6월 말 주민등록 기준으로 인구는 30만0332 명, 11만7734 가구이다.
- source_sentence: 니체는 어느 나라 사람인가?
  sentences:
  - 성리학(性理學) 12세기에 남송의 주희(朱熹)가 집대성한 유교의 주류 학파이다. 성리학의 어원은 주희가 주창한 성즉리(性卽理)를 축약한 명칭이다.
  - 니체는 1844년 10월 15일 예전의 프로이센 (독일)의 작센 지방의 작은 마을인 뢰켄(Röcken)에서 루터교 목사의 아들로 태어났다. 그의 이름은 프러시아의 왕인 프리드리히 빌헬름 4세에게서 빌려온 것으로,
    빌헬름 4세는 니체가 태어나던 날에 나이가 49세를 넘어있었다(니체는 훗날 그의 이름에서 가운데에 있던 "빌헬름"을 빼 버렸다.) 니체의 아버지인 카를 빌헬름 루트비히 니체(1813-1849)는 루터교회 목사이자
    전직 교사이었고, 프란치스카 욀러(1826~1897)와 1843년에 결혼하였다. 그의 여동생인 엘리자베스 니체는 1846년에 태어났고, 뒤를 이어 남동생인 루드비히 요셉이 1848년에 태어났다. 니체의 아버지는
    뇌 질환으로 1849년에 세상을 떠났다. 그의 어린 남동생은 1850년에 죽었다. 그 후 가족은 나움부르크로 이사를 갔고, 그곳에서 니체의 할머니와 어머니 프란치스카, 아버지의 결혼하지 않은 두 자매, 두 하녀들과
    함께 살며 어린시절을 보냈다. 니체의 할머니가 1856년에 세상을 하직하자, 가족은 그들의 집으로 이사했다.
  - 19세기 철학자 프리드리히 니체는 '신은 죽었다.'라는 발언으로 잘 알려진 명사이다. 그러나 이 발언은 니체가 직접 한 발언이 아니라 그의 작품 속 인물들 사이의 대화에서 나온 문장이다. 니체는 기독교적 유신론이
    한 신앙 체제로서 서구 세계의 도덕적 근원이였으나 현대 사상의 결과 즉 허무주의의 부상과 기독교적 가치의 하락으로 붕괴되고 거부되었다고 논증하였다. 니체는 굳은 무신론자로서 허무주의와 인본주의의 부작용을 걱정하기도
    하였다. 따라서 그는 새로운 사회를 요구하였는데, 그것은 바로 초인 중심의 사회였다.
- source_sentence: 돼지의 번식은 태어난 지 몇개월 정도 되면 짝짓기를 할 수 있나요?
  sentences:
  - 워싱턴 기념탑(555피트, 약 169.3m)의 높이 이상으로 건축물을 건설하지 못하도록 하여, 뉴욕와 달리 초고층 건물이 드물다. 백악관, 펜타곤, 연방 의사당 등 미국의 주요 정부 기관이 있다. 정식 연방주가
    아니므로 상원 의석은 없으나, 표결권이 없는 미국 하원 파견대표 1명 (2019년 현재 민주당의 Eleanor Holmes Norton의원)과 대통령선거인단 3표를 확보하고 있다.
  - 두더지는 태어난 지 2-3년이면 새끼를 낳을 수 있다. 3-4월에 짝짓기를 하고 1년에 1회, 2-7마리의 새끼를 낳는다. 성장이 매우 빨라서 6개월이면 앞발을 제외하고 어미와 비슷한 크기로 자란다. 수명은 5년
    정도이다.
  - 돼지는 번식이 매우 빨라서 태어난 지 8개월 정도가 되면 짝짓기를 할 수 있다. 임신기간은 114일이고 보통 한배에 8-12마리를 낳는다. 갓 태어난 새끼돼지는 약 1kg가량이고, 1주일이 지나면 두 배로 늘어난다.
    다 자란 수퇘지는 230 kg 이상 되며, 암퇘지도 200kg이 넘는다. 돼지가 완전히 자라기 위해서는 1년 반에서 2년이 걸리며 수명은 9-15년이다. 돼지는 오랜 시간과 노력을 거친 품종 개량으로 오늘날 수많은
    종에 이르렀다.이슬람교와 유대교의 발원지인 서아시아가 고온건조한 사막기후여서 잡식동물인 데다가 자주 씻는 돼지는 키우기 부적합한 동물이다. 게다가 비활동적인 성격때문에 불결한 짐승으로 여겨졌다. 지금도 이슬람교도와
    유대인들은 돼지고기를 먹지 않는 전통이 있다.
- source_sentence: 인간은 언제 달에 착륙했는가?
  sentences:
  - 세종특별자치시의 행정 구역은 1읍, 9면, 9행정동(14개 법정동)으로 구성되어 있으며, 2018년 6월 말 주민등록 기준으로 인구는 30만0332 명, 11만7734 가구이다.
  - 아폴로 11호(Apollo 11)는 처음으로 달에 착륙한 유인 우주선이다. 아폴로 계획의 다섯 번째 유인우주비행인 동시에 세 번째 유인 달 탐사이기도 했다. 1969년 7월 16일에 발사되었으며 선장 닐 암스트롱,
    사령선 조종사 마이클 콜린스, 달 착륙선 조종사 버즈 올드린이 탔다. 7월 20일 암스트롱과 올드린은 달에 발을 딛은 최초의 인류가 되었다. 당시 콜린스는 달 궤도를 돌고 있었다.
  - 1969년 7월 16일 13시 32분 UTC에 플로리다 주 케네디 우주 센터에서 새턴 5호 로켓으로 발사되었다. NASA의 5번째 아폴로 프로그램 유인우주선 임무였다. 7월 20일 20시 17분 UTC에 달착륙선이
    달의 표면에 착륙했다. 선장은 닐 암스트롱 중위, 조종사는 버즈 올드린이었다. 달에 착륙하고 6시간이 지나서 7월 21일 02시 56분 15초 UTC에 암스트롱이 달에 내렸다. 버즈 올드린은 20분 후에 내려왔다.
    2시간 30분을 달에서 걸어다니면서 21.5 kg의 달 모래 등을 채집했다. 달 궤도를 돌고 있는 사령선에는 마이클 콜린스 (우주비행사)가 혼자 남아있었다. 달에 착륙하고 21.5 시간이 지나서 달착륙선이 이륙해
    사령선과 도킹했다.콜린스는 원래 아폴로 8호 때 사령선 조종사를 맡기로 되어 있었으나, 등 부상으로 인해 탈락하고 짐 러벨이 대신 임무를 맡았다. 또한 아폴로 11호 달 착륙선 조종사를 맡기로 되어 있었으나, 사령선
    조종사는 우주 비행 경험이 있는 사람만 할 수 있기 때문에 제미니 계획에서 우주비행을 한 경험이 있던 콜린스 비행사가 사령선 조종사로 일종의 '진급'을 하게 되었다.달 착륙선은 미국의 국장이자 아폴로 11호의 기장
    마스코트인 흰머리수리에서 착안, 이글("Eagle")로 이름지어졌다. 사령선의 이름은 아폴로 11호 승무원들이 자신들의 달 탐험을 미 대륙을 발견했던 콜롬버스의 이름을 따서 콜럼비아("Columbia")로 이름이
    지어졌다. 미국 항공우주국 내부 문서에는 달 착륙선과 사령선을 각각 빙수("Snowcone")와 건초가리("Haystack")로 부를 계획이 잡혀 있었으나, 이들 이름은 언론에 계획이 공표되기 전에 조용히 바뀌었다.
- source_sentence: 인간은 언제 달에 착륙했는가?
  sentences:
  - 아폴로 11호(Apollo 11)는 처음으로 달에 착륙한 유인 우주선이다. 아폴로 계획의 다섯 번째 유인우주비행인 동시에 세 번째 유인 달 탐사이기도 했다. 1969년 7월 16일에 발사되었으며 선장 닐 암스트롱,
    사령선 조종사 마이클 콜린스, 달 착륙선 조종사 버즈 올드린이 탔다. 7월 20일 암스트롱과 올드린은 달에 발을 딛은 최초의 인류가 되었다. 당시 콜린스는 달 궤도를 돌고 있었다.
  - 가톨릭 신자들은 모든 주일 (그리스도교)과 더불어 의무 대축일에 해당하는 천주의 성모 마리아 대축일(1월 1일), 주님 부활 대축일, 성모 승천 대축일(8월 15일), 주님 성탄 대축일(12월 25일)에 미사에
    참례해야 하는 것이 기본적인 의무이다.
  - 사일런스는 닥터를 죽이기 위한 계획의 일환으로 우주복이 필요했으며, 전 인류에 걸쳐 '암시 능력'을 이용해 인류가 달에 가기 위한 연구를 하게 만들고 그 결과 인간이 만들어낸 우주복을 훔쳐 각종 최신 과학기술력을
    탑재하여 개조한다. 하지만 사일런스가 "인간은 우릴 보고있을 때만 죽일 수 있다." 라고 말한 장면을 닥터가 아폴로 우주선의 송신 장치에 붙여놓아 아폴로 우주선이 달 착륙할때 TV 화면을 보고있던 전 세계 사람들에게
    '사일런스를 죽여라'라는 암시가 걸리고 그 결과 사일런스는 1969년를 기점으로 더이상 인류에게 암시를 하지 못하게 되었다.
