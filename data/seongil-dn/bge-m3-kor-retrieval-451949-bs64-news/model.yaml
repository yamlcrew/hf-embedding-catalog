- source_sentence: 어느 정도의 인원을 대상으로 25일에 도착한 예방주사를 접종할 수 있어?
  sentences:
  - “길고 길었던 ‘코로나19 터널’을 빠져 나오는 신호탄이 되길 간절히 기원합니다.” 코로나19 종식 염원을 담은 아스트라제네카(AZ) 백신이 26일부터 접종에 들어간다. 접종이 하루 앞으로 다가오면서 일선 보건당국도
    비상 근무체제에 돌입했다. 25일 낮 12시10분께 AZ 백신을 실은 운반차량이 군경의 호위 속에 안양시 동안구보건소 앞에 도착하자, 보건소 직원들이 건물 앞까지 나와 백신을 맞았다. ‘생물학적 제제 출하증명서’가
    오가고 아이스박스가 열리자, 투명한 5밀리리터 통 위에 빨간 캡이 씌워진 AZ가 그 모습을 드러냈다. 보건소 직원들은 조심스럽게 백신을 하나 하나 들추며 혹시라도 깨지거나 파손된 물건은 없는지 상태를 살폈다. 점검을
    마친 백신이 곧장 보건소 3층에 마련된 전용 냉장고로 들어가면서 이날 백신 상륙 작전은 약 5분 만에 마무리됐다. 이날 들어온 1차 물량은 30바이알, 300명분이다. 한숨 돌릴 틈도 없이 입고식을 마친 직원들은
    보건소장실에 모여 ‘예방접종 후 이상반응 관리’ 교육을 받았다. 26일 오전 9시부터는 동안구 9개 요양시설 종사자 중 일부인 1개소, 20명이 보건소를 방문해 첫 접종을 받을 예정이다. 동안구보건소 관계자는 “접종을
    차질 없이 진행하기 위해 만반의 준비를 마쳤다”면서 “가장 중요한 백신을 보관하는 전용 냉장고는 영상 2~8도를 항시 유지하고 있으며 정전에도 대비하기 위해 무정전 전원장치(UPS)까지 갖춰져 있다”고 말했다.
    이와 함께 수원시 영통구보건소에도 20바이알의 AZ 백신이 무사히 도착했다. 보건소 1층에 마련된 접종실엔 안내문이 비치됐고, 직원들은 예진표 작성부터 신분증과 체온 확인, 예진 후 접종, 이상반응 모니터링, 확인증
    발급까지 방문자가 거쳐야 할 동선을 한 번 더 꼼꼼히 점검했다. 영통구보건소 관계자는 “소방서와 연계한 긴급 출동 체계가 마련돼 있다”면서 “만일의 상황을 대비해 자동제세동기(AED) 점검을 마쳤으며 응급키트도
    구비해놨다”고 밝혔다.
  - 사법농단 의혹 재판에서 6연속 무죄를 끊고 ‘1호 유죄’가 나온 배경에는 “대법원장과 법원행정처는 특정 재판에서 명백한 잘못이 있을 경우 판사 지적권한이 있다”는 재판부의 독특한 판시가 있다. 앞서 임성근 전 부산고법
    부장판사가 1심에서 ‘위헌적이지만, 남용할 직권 자체가 없었다’며 무죄 선고를 받은 것과는 상반된다. 서울중앙지법 형사32부(부장판사 윤종섭)는 23일 대법원장과 법원행정처에는 재판사무의 핵심영역에 대해 명백한
    잘못이 있을 경우 담당 판사의 잘못을 ‘지적’할 수 있는 권한이 있다고 밝혔다. 이민걸 전 법원행정처 기획조정실장과 이규진 전 대법원 양형위원회 상임위원의 일부 재판개입 등 행위(직권남용)를 유죄 판단하면서다.
    사법농단 관련 재판에서는 처음 나온 판시다. 재판부는 전제로 “직업적으로 충분히 단련하지 못하거나 나태해 쟁점이 별로 없는 것만 우선 처리해 장기미제를 만드는 판사가 있을 수 있다”고 말했다. 그러면서 “이런 경우에도
    재판 독립을 이유로 누구도 지적을 못한다면 국민의 재판청구권 보장과 충돌할 수 있다”고 했다. 헌법 103조에 따른 법관 독립이 ‘신성불가침’은 아니라는 얘기다. 재판부는 이를 뒷받침할 명시적 규정은 없지만 헌법과
    법원조직법 해석상 명백한 잘못을 전제로 사법행정사무를 총괄하는 대법원장과 행정처에 판사를 지적할 권한이 있다고 봤다. 선뜻 이해하기 어려운 이 법리는 경계가 애매모호한 직권남용죄의 특성 때문에 도출된 것이다. 직권남용은
    ‘남용될 직권’의 존재를 전제한다. 표면상 이유로는 수긍할 수 있지만 실제로 따져보면 위법하다는 까다로운 조건을 만족해야 한다. 임 전 부장판사의 경우 “각 재판관여행위가 위헌적”이라는 판단에도 불구하고 “(서울중앙지법
    형사수석부장판사 당시의) 일반적 직무권한에 속한다고 해석될 여지가 없다”며 1심에서 무죄를 선고 받았다. 아울러 재판부는 “공무원의 직무범위를 벗어난 ‘월권행위’도 직무와 상당한 관련성이 인정된다면 직권남용이 성립될
    수 있다”며 직권남용 범위를 상대적으로 넓게 판단했다. 직권의 범주를 형식적으로만 봐선 안 된다는 취지다. 이 전 실장 등은 이를 엄격하게 판단해야 한다며 검찰과 치열한 공방을 벌였지만 1심에서 받아들여지지 않았다.
    재판부는 이 같은 법리에 따라 헌법재판소 파견 법관을 통한 내부 기밀 수집, 한정위헌 취지의 위헌제청 결정 사건과 옛 통합진보당 국회의원·비례대표 지방의회의원 관련 행정소송에 대한 재판개입 등에 대한 일부 직권남용
    혐의를 유죄로 판단했다. 검찰은 이번 재판을 양승태 전 대법원장 등 ‘수뇌부’를 단죄할 여지를 열어줄 계기로 보고 있다. 검찰 관계자는 “재판부가 앞선 사법농단 관련 재판과 달리 직권남용 범위를 넓게 봤다”며 “사법부
    윗선의 유죄 가능성을 높인 판결”이라고 평가했다.
  - '65세 이상 73%, 6-59개월 54% 인플루엔자 접종 마쳐, 가능하면 11월 15일 이전 완료하세요~ □ 또한, 남은 물량은 충분하나, 일시적으로 지역적 부족상황이 발생할 수 있어 그에 대한 백신수급 운영
