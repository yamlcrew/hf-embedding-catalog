    sentences:
    - “길고 길었던 ‘코로나19 터널’을 빠져 나오는 신호탄이 되길 간절히 기원합니다.” 코로나19 종식 염원을 담은 아스트라제네카(AZ) 백신이 26일부터 접종에 들어간다. 접종이 하루 앞으로 다가오면서 일선 보건당국도
      비상 근무체제에 돌입했다. 25일 낮 12시10분께 AZ 백신을 실은 운반차량이 군경의 호위 속에 안양시 동안구보건소 앞에 도착하자, 보건소 직원들이 건물 앞까지 나와 백신을 맞았다. ‘생물학적 제제 출하증명서’가
      오가고 아이스박스가 열리자, 투명한 5밀리리터 통 위에 빨간 캡이 씌워진 AZ가 그 모습을 드러냈다. 보건소 직원들은 조심스럽게 백신을 하나 하나 들추며 혹시라도 깨지거나 파손된 물건은 없는지 상태를 살폈다.
      점검을 마친 백신이 곧장 보건소 3층에 마련된 전용 냉장고로 들어가면서 이날 백신 상륙 작전은 약 5분 만에 마무리됐다. 이날 들어온 1차 물량은 30바이알, 300명분이다. 한숨 돌릴 틈도 없이 입고식을 마친
      직원들은 보건소장실에 모여 ‘예방접종 후 이상반응 관리’ 교육을 받았다. 26일 오전 9시부터는 동안구 9개 요양시설 종사자 중 일부인 1개소, 20명이 보건소를 방문해 첫 접종을 받을 예정이다. 동안구보건소
      관계자는 “접종을 차질 없이 진행하기 위해 만반의 준비를 마쳤다”면서 “가장 중요한 백신을 보관하는 전용 냉장고는 영상 2~8도를 항시 유지하고 있으며 정전에도 대비하기 위해 무정전 전원장치(UPS)까지 갖춰져
      있다”고 말했다. 이와 함께 수원시 영통구보건소에도 20바이알의 AZ 백신이 무사히 도착했다. 보건소 1층에 마련된 접종실엔 안내문이 비치됐고, 직원들은 예진표 작성부터 신분증과 체온 확인, 예진 후 접종,
      이상반응 모니터링, 확인증 발급까지 방문자가 거쳐야 할 동선을 한 번 더 꼼꼼히 점검했다. 영통구보건소 관계자는 “소방서와 연계한 긴급 출동 체계가 마련돼 있다”면서 “만일의 상황을 대비해 자동제세동기(AED)
      점검을 마쳤으며 응급키트도 구비해놨다”고 밝혔다.
    - 사법농단 의혹 재판에서 6연속 무죄를 끊고 ‘1호 유죄’가 나온 배경에는 “대법원장과 법원행정처는 특정 재판에서 명백한 잘못이 있을 경우 판사 지적권한이 있다”는 재판부의 독특한 판시가 있다. 앞서 임성근 전
      부산고법 부장판사가 1심에서 ‘위헌적이지만, 남용할 직권 자체가 없었다’며 무죄 선고를 받은 것과는 상반된다. 서울중앙지법 형사32부(부장판사 윤종섭)는 23일 대법원장과 법원행정처에는 재판사무의 핵심영역에
      대해 명백한 잘못이 있을 경우 담당 판사의 잘못을 ‘지적’할 수 있는 권한이 있다고 밝혔다. 이민걸 전 법원행정처 기획조정실장과 이규진 전 대법원 양형위원회 상임위원의 일부 재판개입 등 행위(직권남용)를 유죄
      판단하면서다. 사법농단 관련 재판에서는 처음 나온 판시다. 재판부는 전제로 “직업적으로 충분히 단련하지 못하거나 나태해 쟁점이 별로 없는 것만 우선 처리해 장기미제를 만드는 판사가 있을 수 있다”고 말했다.
      그러면서 “이런 경우에도 재판 독립을 이유로 누구도 지적을 못한다면 국민의 재판청구권 보장과 충돌할 수 있다”고 했다. 헌법 103조에 따른 법관 독립이 ‘신성불가침’은 아니라는 얘기다. 재판부는 이를 뒷받침할
      명시적 규정은 없지만 헌법과 법원조직법 해석상 명백한 잘못을 전제로 사법행정사무를 총괄하는 대법원장과 행정처에 판사를 지적할 권한이 있다고 봤다. 선뜻 이해하기 어려운 이 법리는 경계가 애매모호한 직권남용죄의
      특성 때문에 도출된 것이다. 직권남용은 ‘남용될 직권’의 존재를 전제한다. 표면상 이유로는 수긍할 수 있지만 실제로 따져보면 위법하다는 까다로운 조건을 만족해야 한다. 임 전 부장판사의 경우 “각 재판관여행위가
      위헌적”이라는 판단에도 불구하고 “(서울중앙지법 형사수석부장판사 당시의) 일반적 직무권한에 속한다고 해석될 여지가 없다”며 1심에서 무죄를 선고 받았다. 아울러 재판부는 “공무원의 직무범위를 벗어난 ‘월권행위’도
      직무와 상당한 관련성이 인정된다면 직권남용이 성립될 수 있다”며 직권남용 범위를 상대적으로 넓게 판단했다. 직권의 범주를 형식적으로만 봐선 안 된다는 취지다. 이 전 실장 등은 이를 엄격하게 판단해야 한다며
      검찰과 치열한 공방을 벌였지만 1심에서 받아들여지지 않았다. 재판부는 이 같은 법리에 따라 헌법재판소 파견 법관을 통한 내부 기밀 수집, 한정위헌 취지의 위헌제청 결정 사건과 옛 통합진보당 국회의원·비례대표
      지방의회의원 관련 행정소송에 대한 재판개입 등에 대한 일부 직권남용 혐의를 유죄로 판단했다. 검찰은 이번 재판을 양승태 전 대법원장 등 ‘수뇌부’를 단죄할 여지를 열어줄 계기로 보고 있다. 검찰 관계자는 “재판부가
      앞선 사법농단 관련 재판과 달리 직권남용 범위를 넓게 봤다”며 “사법부 윗선의 유죄 가능성을 높인 판결”이라고 평가했다.
    - '65세 이상 73%, 6-59개월 54% 인플루엔자 접종 마쳐, 가능하면 11월 15일 이전 완료하세요~ □ 또한, 남은 물량은 충분하나, 일시적으로 지역적 부족상황이 발생할 수 있어 그에 대한 백신수급 운영
      대책도 준비하고 있다고 덧붙였다. ○ 올해 처음으로 부족한 공급에 신속히 대처하기 위해 시도 및 질병관리본부에서 직접 공급할 수 있는 추가 물량*을 확보하였으며, 상황 발생 시 신속히 조치할 예정이다. * 추가확보물량:
      시·도0.25㎖5,220 도즈, 0.5㎖80,680 도즈/ 본부0.25㎖40,000 도즈, 0.5㎖40,000 도즈

      □ *** 예방접종관리과장은 “아직까지 접종 받지 않은 어르신 및 어린이 보호자들은 지정의료기관 방문 전에 꼭 관할 보건소, 질병관리본부 콜센터(☎1339) 및 보건복지콜센터(☎129)로 문의하여 당일 접종이
      가능한 의료기관을 안내받거나, 예방접종 도우미 홈페이지 및 스마트폰 앱*에서 확인 후 방문” 해달라고 당부했다. * 질병관리본부 예방접종도우미 홈페이지((https://nip.cdc.go.kr) 접속> 일반인(자세히
      보기)> 예방접종도우미 연결), 예방접종도우미 스마트폰 앱의 의료기관 검색

      ○ 또한, “인플루엔자 예방접종의 효과는 균주, 유행 특성 등에 따라 건강한 성인에서 70-90%, 소아에서 50-95% 범위 내로 다양한 것으로 알려져 있어,

      - 30초 이상 손씻기, 기침이나 재채기를 할 때 휴지나 옷깃으로 입을 가리는 기침예절 준수 등의 예방 수칙 실천을 병행하고,

      - 기침, 발열, 근육통 등 인플루엔자 의심 증상이 발생할 경우 사람이 많이 모인 곳을 피하고 의료기관을 늦지 않게 방문하여 진료받는 것이 중요하다”며 덧붙였다. ○ 아울러, “무료접종 대상자 외에 임신부,
      만성질환자, 50~64세 인구 등의 인플루엔자 고위험군도 감염 예방을 위해 본격적인 인플루엔자 유행 전에 예방접종이 필요하다”고 밝혔다.'
  - source_sentence: 길어지는 코로나를 준비하기 위해 조선대학교가 시행하고 있는 과정은 뭐야?
    sentences:
    - 조선대학교병원(병원장 정종훈)은 코로나19 장기화 및 재확산 대비를 위한 중증환자 전담 간호사 양성 교육을 시작했다고 2일 밝혔다. 보건복지부와 국립중앙의료원이 주최하고 조선대병원이 주관하는 이번 양성 교육
      과정은 체계적인 간호교육 시스템을 통해 중증 환자 담당 간호사 양성을 목표로 하고 있다. 지난 1일 병원 7층 세미나A실에서 시작된 '중증환자 전담 간호사' 양성 교육은 4주간 진행되며 교육 내용은 중환자 간호
      이론교육 및 모의실습과 중환자실 임상실습으로 구성된다. 이론교육 및 모의실습에는 △중환자의 신체사정 및 기본간호 △호흡기계 중재 및 간호 △특수처치 및 응급간호 등 중환자 간호 공통교육 이론강의 등을 비롯해
      개인보호구 착탈의 방법 등이 포함됐다. 중환자실 실습을 통해서는 실제 중환자실 현장에서 개인별로 1:1 프리셉터가 배정되어 습득한 내용을 바탕으로 밀착 교육을 진행한다. 유윤정 조선대병원 간호부장은 "코로나19
      장기화 및 재확산 대비를 위해 진행하는 이번 양성 교육을 통해 전문성 있는 중환자 전담 인력을 양성하고 간호역량을 강화할 수 있을 것으로 보인다"며 "중환자 간호교육 인프라와 인적 자원 확보를 위해 최선을 다하겠다"고
      밝혔다.
    - 조선대학교는 지난 25일 총장실에서 우수 행정서비스 운영 사례를 발굴해 구성원들에게 공유, 확산시키고자 '대학행정서비스 우수사례 및 인증 시상식'을 진행했다고 30일 밝혔다. 지난 2019년부터 부서컨설팅을
      수행 중인 조선대는 올해 18개 부서(누적 45개)에 대한 컨설팅을 수행한다. 5년 주기로 대학 내 전 부서에 대한 컨설팅을 진행하는 것이 목표다. 조선대가 지난 2월 수행한 대학행정서비스 컨설팅 결과, 교수학습지원센터의
      'E-Learning지원팀'이 코로나19에 적극적으로 대응한 우수사례로 선정됐다. E-Learning지원팀은 코로나19 속 온라인수업에 대한 수요 및 요구사항을 수집해 반영했다. 또 온라인수업 콘텐츠를 제작해
      수시로 안내하고 우수콘텐츠 공모전 시행으로 우수사례를 공유해 온라인 수업의 전반적인 질을 향상시키는 데 기여했다. 또 온라인시험 및 수업 운영 모니터링단을 꾸려 수업의 질 관리에 적극 노력했다. 조선대학교는
      E-Learning지원팀이 진행한 온라인 수업의 질 관리 결과를 교육혁신원 홈페이지 및 업무포털을 활용해 '2020학년도 대학 교육행정 서비스 CQI를 위한 부서 컨설팅 결과 보고서'로 공유할 예정이다.
    - 김천상무가 최하위 부천과 원정 경기서 승점 1점을 보태는 데 그쳐 순위상승 기회를 놓쳤다. 김천은 지난 8일 부천종합운동장에서 열린 ‘하나원큐 K리그2 2021’ 11R 부천FC와의 경기에서 득점없이 0-0무승부를
      기록했다. 김천은 조규성-오현규-강지훈이 쓰리톱, 심상민-정현철-박용우-안태현 중원, 이명재-정승현-하창래가 쓰리백에 나서는 3-4-3전술로 부천을 맞았다. 특히 이날 골키퍼에는 구성윤이 처음으로 장갑을 꼈다.
      양팀은 경기 휘슬과 함께 치열한 중원다툼에 나서 전반 7분 부천 안재준이 먼저 날카로운 슛을 날리자 김천도 오현규가 12분과 18분 잇따라 위협적인 슛으로 맞받아쳤다. 오현규의 슛으로 조금씩 공세의 강도를 높이기
      시작한 김천은 32분 이명재가 회심의 슛을 쐈으나 골대를 살짝 넘어갔으며, 39분에는 박용우가 프리킥 슛을 쐈지만 부천 수비수 강의빈에 막히면서 전반을 0-0으로 마쳤다. 김천은 후반들어서도 공격이 여의치 않자
      7분 강지훈 대신 정재를 투입해 측면 공세를 높였고, 11분과 15분 안태현과 정재희 잇따라 부천 골문을 노렸지만 무위에 그쳤다. 좀처럼 득점 찬스를 만들지 못하던 김천은 31분 부천 한지호에게 골을 허용했으나
      VAR 판독으로 무효가 되면서 위기를 넘겼다. 김천은 후반 44분 이명재가 결정적인 문전 슈팅을 날렸지만 부천 골키퍼 전종혁의 선방에 막히는 등 막판 파상적인 공세를 펼쳤지만 득점을 만들지 못했다.
  - source_sentence: 반도체 양성에 대한 정부의 후원은 언제 끝날 예정이야?
    sentences:
    - 반도체 산업의 정치적 요인을 분석한 결과, 초기에는 반도체 산업의 활성화를 위해 대형 국책사업 추진 등 전폭적인 지원사업이 이루어져왔으나, 현재 반도체와 관련된 예산 등 정부지원은 상대적으로 감소하고 있는 것으로
      나타났다 (한국산업기술진흥원 2017). 그러나 정부는 반도체 산업의 성장을 지원하기위해 다각적인 측면에서 노력 중에 있다. 관련 업종별 ․ 수준별 특성을 고려한 차별화된 스마트공장 지원 강화를 통하여 뿌리
      등 16개 등의 업종별 ‘대표 스마트공장’(30개, ~’22년) 및 고도화를 통한 스마트공장 프리미엄 5,000개(’22년) 구축을 추진하고자 하였으며, SW ․ 제어기기 등의 스마트 제조 플랫폼 개발을 통하여
      반도체 산업의 재도약을 추진하고 있다(산업통상자원부 2017). 뿐만 아니라, 지능형반도체산업과 융합 가능한 임베디드 SW 산업 발전을 위해 다양한 정책 사업을 추진하고 있다(한국산업기술진흥원 2017).
    - 정부가 인공지능(AI), 전기차 등에 들어가는 핵심 부품인 차세대 전력 반도체 육성에 본격적으로 나선다. 2025년까지 차세대 전력 반도체 상용화 제품을 5개 이상 개발하고, 6∼8인치 파운드리(위탁생산) 인프라
      구축도 추진한다. 정부는 1일 제7차 혁신성장 빅3 추진회의를 열고 이런 내용을 담은 '차세대 전력 반도체 기술개발 및 생산역량 확충 방안'을 발표했다. 전력 반도체란 전력의 변환·변압·안정·분배·제어를 수행하는
      반도체를 말하며, 차세대 전력 반도체는 실리콘보다 전력 효율과 내구성이 뛰어난 3대 신소재 웨이퍼로 제작된 반도체를 뜻한다. 인공지능(AI), 5G나 고온·고압 내구성이 필요한 전기차, 신재생에너지 발전의 인버터
      등에 적용되는 필수 부품이다. 앞으로 전자기기 수요가 확대되고 전력 소비가 늘 것으로 예상되면서 미래 성장 가능성이 높은 분야로 꼽힌다. 산업부에 따르면 글로벌 전력 반도체 시장 규모는 2019년 450억 달러에서
      2023년 530억 달러 규모로 성장할 것으로 전망됐다. 이에 따라 미국과 중국, 일본 등도 다양한 정책적 지원을 추진 중이다. 우리 정부도 2017년부터 총 830억 원 규모의 '파워반도체 상용화 사업'을
      진행 중이다. 그러나 국내 전력 반도체 시장 규모는 약 20억 달러 규모로, 기술력 부족과 해외 기업의 특허 선점으로 수요의 90% 이상을 수입에 의존하는 실정이다. 이에 정부는 2025년까지 글로벌 수준의
      경쟁력을 확보하기 위해 상용화 제품 개발, 기반 기술 강화, 미래 제조공정 확보 등을 본격적으로 지원하기로 했다. 국내 수요기업과 연계한 과제를 발굴해 차세대 전력 반도체 상용화 제품을 5개 이상 개발할 방침이다.
      현재 실리콘 소재의 한계를 극복하기 위해 실리콘카바이드(SiC), 질화갈륨(GaN), 갈륨 옥사이드(Ga2O3) 등 3대 신소재 응용기술을 개발하고, 국내 기업의 소재·웨이퍼 기술 확보를 지원할 방침이다. 고집적·고성능
      차세대 전력 반도체 개발을 위해 파워 집적회로(IC) 설계 기술개발을 지원한다. 아울러 차세대 전력 반도체 관련 파운드리 서비스를 확대하기 위해 국내 파운드리와 6∼8인치 기반의 양산 공정을 구축하는 방안도
      추진한다. 성윤모 산업부 장관은 "AI, 5G 등 신기술 구현과 자율차, 신재생 등 미래 성장 분야의 활성화를 위해선 전력의 효율적인 관리가 필수이며, 차세대 전력 반도체는 이를 위한 핵심 부품"이라며 "아직
      초기인 이 분야 시장을 선점하고 미래 경쟁력을 확보하기 위해 R＆D, 인프라 등을 적극 지원할 계획"이라고 말했다.
    - 근로시간은 짧지만 국민 소득은 높은 국가들을 분석해 보니 노동 유연성과 생산성이 높다는 연구결과가 나왔다. 전국경제인연합회 산하 한국경제연구원은 경제협력개발기구(OECD) 통계와 통계청 데이터를 이용해 우리나라와
      덴마크ㆍ노르웨이ㆍ독일ㆍ네덜란드 4개국의 노동생산성 등을 비교한 결과 이같이 나타났다고 29일 밝혔다. 한경연에 따르면 이들 국가의 평균 연간 근로시간은 1,396시간이었고, 평균 1인당 국민총소득은 6만187달러로
      집계됐다. 반면 한국은 이들 국가보다 1.4배(1,967시간) 더 길게 일했지만, 소득은 3만2,115달러로 절반 수준이었다. 한경연은 이들 유럽 4국의 특징을 △높은 고용률 △높은 노동생산성 △높은 노동유연성
      △시간제 근로 활성화 △높은 수준의 인적자원이라고 정리했다. 이들 국가의 평균 고용률은 76.4%로 한국(66.8%)보다 9.6%포인트 높았다. 특히 네덜란드와는 11.4%포인트 차이가 났다. 우리나라가 네덜란드
      수준의 고용률을 달성하려면 418만6,000명의 일자리가 더 만들어져야 한다고 한경연은 분석했다. 시간당 노동생산성도 한국(40.5달러)은 이들 국가 평균(73.3달러)에 크게 못 미쳤다. 노르웨이는 84.3달러로
      한국보다 2배 이상 높았다. 세계경제포럼(WEF) 노동시장 유연성 평가에서도 한국 점수는 크게 낮았다. 한국은 54.1점을 받아 OECD 37개국 중 35위에 그친 반면 4개 국가의 평균 점수는 68.9점이었다.
      가장 높은 덴마크(71.4점)는 OECD 3위에 올랐다. 아울러 이들 국가는 시간제 근로 비율이 높았는데 네덜란드는 37.0%에 달해 한국(14.0%)보다 2.6배 높은 것으로 나타났다. 한경연은 이들 국가가
      적게 일하면서 많이 벌 수 있었던 비결은 노동시장 개혁을 통해 노동 유연성을 확보했기 때문이라고 분석했다. 추광호 한경연 경제정책실장은 “적게 일하고 많이 버는 국가들은 시간제 근로 활성화, 노동 규제 완화
      등을 통해 고용률을 높이고, 높은 생산성을 토대로 소득을 높였다”고 말했다. 한편 한경연이 우리나라 산업별 소득과 근로시간을 비교한 결과 적게 일하고 많이 버는 산업은 금융 및 보험업으로 나타났다. 한경연에
      따르면 금융 및 보험업은 전체 월 임금 총액인 372만원보다 1.6배 높은 593만원을 벌었지만, 월 근로시간은 9시간 짧았다. 반면 숙박 및 음식점업은 이보다 적은 234만원을 벌지만 12시간 더 일하는 것으로
      나타났다.
  - source_sentence: E-GMP의 세번째 배터리 공급 회사로 어느 곳이 선발됐어?
    sentences:
    - 손흥민(손흥민)의 골이 30일째 침묵한 토트넘이 시즌 첫 3연패에 빠지며 8위로 추락했다. 토트넘은 5일(한국시간) 영국 런던의 토트넘 홋스퍼 스타디움에서 열린 첼시와 2020-2021 잉글랜드 프로축구 프리미어리그
      22라운드 홈경기에서 전반 24분 조르지뉴에게 내준 페널티킥 결승 골을 만회하지 못하고 0-1로 패했다. 해리 케인의 부상 결장에 손흥민 골침묵까지 이어진 토트넘은 이번 시즌 첫 3연패이자 홈 경기 2연패로
      승점 33에 머물면서 8위로 한 계단 내려앉았다. 지난달 6일 브렌트퍼드(2부)와 EFL컵 준결승전에서 득점을 맛본 손흥민은 이후 30일째 득점 신고를 하지 못하며 6경기(정규리그 5경기ㆍFA컵 1경기) 연속
      무득점 행진을 이어갔다. 손흥민의 이번 시즌 공격포인트는 16골 10도움(EPL 12골 6도움ㆍ유로파리그 3골 3도움·리그컵 1골ㆍFA컵 1도움)이다. 아울러 통계전문 옵타에 따르면 토트넘의 조제 모리뉴 감독은
      2000년 9월 벤피카(포르투갈)에서 감독직을 시작한 이후 자신의 사령탑 커리어 통산 327번째 홈 경기에서 처음으로 ‘홈경기 2연패’를 당하는 아쉬움까지 곱씹어야 했다. 반면 첼시는 승점 36(골 득실+13)으로
      에버턴(승점 36ㆍ골 득실+6)을 골득실차로 따돌리고 8위에서 6위로 올라섰다.
    - ‘포항 배터리 규제자유특구’가 중소벤처기업부의 2020년 규제자유특구 운영성과 평가에서 전국 유일 2년 연속 최고등급인 ‘우수’ 특구로 21일 선정됐다. 이번 중소벤처기업부의 규제자유특구 운영성과 평가는 전국
      14개 규제자유특구를 대상으로 성과 달성도, 파급효과, 규제특례 활용실적 등을 토대로 종합평가를 실시됐으며, 포항 배터리·대구 스마트웰니스·전북 친환경자동차 규제자유특구 3개 특구가 우수 평가를 받았다. 2019년
      7월 영일만 일반산업단지 및 블루밸리 국가산업단지 일원(556,694.22㎡, 17만평)을 배터리 규제자유특구로 지정받은 이후 포항시는 배터리 전후방 기업들에 대한 적극적인 투자유치 활동으로 대규모 투자를 이끌어냈다.
      GS건설의 배터리 리사이클링 공장 건립, 포스코케미칼의 이차전지 인조흑연 음극재 생산공장 건립, 에코프로비엠 등 에코프로 6개 자회사의 양극재 생산공장 건립 등의 투자로 이차전지 밸류체인 구축과 이를 바탕으로
      배터리 규제자유특구를 미래 유망산업인 배터리산업 육성의 거점으로서의 기반을 마련한 것이 높은 평가를 받았다. 뿐만 아니라, 규제자유특구 실증 연구개발 수행과 전기차 배터리 산업 육성 전초 기지 역할을 감당할
      이차전지종합관리센터를 107억 원의 사업비를 투입해 블루밸리 국가산업단지 규제자유특구 내 건립 하는 등 특구 활성화를 위한 지자체의 적극적인 의지도 높은 평가를 받았다. 이차전지종합관리센터는 이차전지 고도화와
      고부가 가치화를 통해 배터리 산업을 체계적으로 육성하기 위한 국내 최초, 최대 규모의 인프라이며, 이곳을 배터리 산업 허브로 육성해 배터리 소재, 부품, 장비 상용화 기술개발 및 우수 기업 유치 등의 마중물
      역할로 지역경제 활성화에 크게 기여할 것이다. 더 나아가 포항시는 국가 전기차 사용후 배터리 순환경제 기반 조성 및 배터리 산업 컨트롤 타워 구축을 목표로 추진하고 있는 환경부의 ‘배터리 자원순환 클러스터 구축사업’에도
      참여해 총력을 기울이고 있다. 포항시는 철강산업의 뒤를 이어 지역의 새로운 먹거리 산업으로 이차전지산업을 육성하기 위해 중소벤처기업부, 환경부 등 중앙 부처와 긴밀한 협력체계를 유지하면서 이차전지분야 기술개발,
      기술실증, 기업육성의 전주기적 기업지원 인프라 구축으로 포항을 우리나라의 배터리 메카도시로 육성해나갈 계획이다. 이강덕 포항시장은 “중앙부처뿐만 아니라 배터리소재기업인 포스코케미칼과 에코프로, GS건설 등과
      적극적인 협업으로 이차전지산업 육성을 통해 포항의 발전를 넘어 우리나라 배터리산업 육성에도 큰 기여를 할 수 있도록 행정력을 집중하겠다”라고 전했다.
    - 중국 전기차용 배터리 업체들이 탈중국화에 속도를 내며 ‘K배터리’를 위협하고 있다. 텃밭인 한국과 유럽 시장에서도 K배터리는 ‘C배터리’(중국산 배터리)의 거센 도전에 직면했다. 21일 업계에 따르면 중국 배터리
      선두 업체인 CATL은 현대자동차그룹이 최근 선정한 전기차 전용 플랫폼 E-GMP 3차 물량 배터리 공급사로 낙찰됐다. 현대차그룹이 2023년 이후 출시 예정인 3개 차종에 대한 배터리 공급사를 선정했는데 SK이노베이션이
      1종, CATL이 2종을 따낸 것이다. 총 9조원 규모 물량 중 절반 이상을 CATL이 차지한 것으로 알려졌다. 업계 관계자는 “CATL이 국내 시장까지 파고든 것은 가격·성능·생산력 측면에서 K배터리와 견줘
      충분한 경쟁력을 지니고 있다는 뜻”이라며 “안정적 수급을 위해 배터리 공급사를 다변화해야하는 현대차 입장에서 스펙이 맞지 않는 삼성SDI, 코나EV 등 화재로 안전 이슈가 불거진 LG에너지솔루션의 상황을 감안하면
      CATL을 선택할 수밖에 없었을 것”이라고 말했다. 다만 당초 3차 물량의 핵심으로 꼽혔던 스포츠유틸리티(SUV) 전기차 ‘아이오닉7’에 탑재될 배터리 선정은 미뤄졌다. 업계에서는 현대차와 LG에너지솔루션이
      인도네시아에 건설을 추진 중인 합작법인이 아이오닉7에 탑재할 배터리를 생산할 것이라는 관측이 우세하다. C배터리의 영토 확장은 한국 시장을 넘어 유럽을 정조준하고 있다. 메르세데스 벤츠를 생산하는 독일 완성차
      업체 다임러 그룹은 지난해 CATL과 배터리 공급은 물론 연구 분야에서도 협력을 강화키로 했다. 업계에 따르면 양사는 향후 다임러 그룹에서 생산하는 모든 전기차에 사용되는 배터리를 CATL에 우선 발주하고 CATL이
      수주를 거부하는 경우에만 다른 배터리 업체를 통해 공급받는 형태의 계약을 체결한 것으로 알려졌다. 이에 대해 업계 관계자는 “차종별로 배터리 업체를 선정하는 기존 방식에서 벗어난 파격적인 형태”라며 “말 그대로
      CATL이 ‘수퍼 을’(갑을 뛰어넘는 영향력을 지닌 을)로 성장했음을 보여주는 대목”이라고 말했다. ‘세계의 자동차 시장’이라 불리는 중국의 막대한 전기차 생산량에다 정부의 전폭적인 지원을 바탕으로 성장한 CATL은
      지난해 비중국 시장 점유율을 대폭 늘렸다. 배터리 시장조사 기관인 SNE리서치에 따르면 2019년 중국을 제외한 글로벌 전기차 시장에서 CATL 배터리 사용량은 0.2GWh(기가와트시)로 LG에너지솔루션(12.3GWh),
      삼성SDI(4.3GWh), SK이노베이션(2.1GWh)에 비해 초라한 수준이었다. 하지만 지난해 5.3GWh로 무려 2,457.1%의 성장률을 기록했다. 점유율 역시 0.4%에서 6.5%로 껑충 뛰었다. CATL은
      또 상상을 초월하는 생산능력을 갖춰 전기차 배터리 시장의 최상위 포식자로 군림하겠다는 계획을 세우고 있다. CATL이 현재 국내·외에서 진행 중인 배터리 공장 건설 프로젝트를 종합하면 자체 생산과 합작사를 합쳐
      2025년엔 486.8GWh, 2030년엔 591.8GWh의 생산능력을 보유하게 된다. 2020년 글로벌 시장 전체 전기차용 배터리 사용량이 142.8GWh인 점을 감안하면 어마어마한 규모다. 업계 관계자는
      “올해 예정된 글로벌 자동차 회사들의 배터리 공급사 입찰 규모는 약 1.4TWh(테라와트시)로 지난해 판매된 전기차 총 배터리 용량의 10배에 달한다”며 “수주전 결과에 따라 배터리 업체들의 향후 수년간 순위표에
      지각 변동이 생길 수 있다는 뜻”이라고 말했다. 이어 “전기차 시장을 선도하는 유럽까지 C배터리가 침투한 만큼 K배터리는 신흥 시장이자 중국의 진출이 제한되는 미국 시장을 선점할 필요가 있다”면서 “LG와 SK가
      빠른 시일 내에 합의를 하고 선의의 경쟁을 통해 K배터리의 경쟁력을 키워야 할 때”라고 강조했다.
  - source_sentence: 지역 예술인을 위한 공모를 시행했던 프로젝트는 어떤 것에 일부분이야?
    sentences:
    - 충남 공주시는 제민천과 국고개 일원을 대상으로 지난해 8월부터 추진한 공공미술 프로젝트 사업이 완료됐다고 21일 밝혔다. 문화체육관광부가 주최 공주시가 주관한 공공미술 프로젝트는 지역예술인 일자리 제공 및 주민
      문화 향유 증진이라는 취지로 전국 228개 지자체 대상으로 추진됐다. 이에 시는 지난해 8월 공모를 통해 한국미술협회(공주지부)와 충남공예협동조합 2개팀을 선정 지역작가 37명의 참여를 통해 진행해 '중동교~대통교'사이에
      조명과 벤치, 포토존 그리고 주민참여로 만들어진 송사리 조형물을 설치해 주민들에게 휴식 공간을 제공했다. 그리고 '국고개 흐르는 효심'은 도조작품, 화분조형, 이복이야기 동화책 및 국고개 가이드북 만들기 등
      커뮤니티 프로그램 운영 역사.문화.예술 중심지의 특성을 살리는데 중점을 뒀다. 황의정 문화체육과장은 "앞으로도 시민들이 언제 어디서나 문화예술을 누리고, 지역예술인에게는 일자리를 제공할 수 있는 다양한 사업을
      진행하겠다"고 말했다.
    - 배우 신성록이 여권 사진을 공개해 시선을 모았다. 18일 오후 방송된 SBS 예능 프로그램 ‘집사부일체’에는 김종국이 사부로 출연했다. 사부를 만나기 전, 출연진은 가고 싶었던 바캉스 장소에 대해 이야기했다.
      차은우는 “하와이에 가고 싶다”고 했고, 이승기는 “제주도 여행이 간절하다”고 말했다. 양세형은 “나도 제주도”라고 외쳤다. 양세형은 “은우의 여권 사진이 궁금하다”며 호기심을 드러냈다. 차은우의 여권 사진이
      공개되자, 이승기는 “프로필 사진이냐”며 감탄했다. 양세형은 “모델 같다”고 말했다. 신성록은 “동네 사진관에서 여권 사진을 찍었다. 보정이 심해서 AI 같다”며 자신의 사진을 공개했다. 그의 여권 사진을 본
      양세형은 “실물이 더 잘생겼다”고 말했다. 한편 ‘집사부일체’는 매주 일요일 오후 6시 25분에 방송된다.
    - 마산의 원도심 성호동의 역사가 예술로 기록되고 되살아난다. 시대를 살아낸 사람들의 애틋한 이야기가 아름다운 소리, 몸짓, 조형, 화첩에 담겨 시민을 만난다. 창원시와 창원시문화도시지원센터는 오는 30일 오후
      2시 마산합포구 문신길 일대에서 성호동과 그 주변 지역주민들의 삶, 지리적, 환경적 문화를 예술에 담은 〈사회참여예술창작지원사업〉 ‘예술로 성호창발(城湖創發)’ 창작 발표회를 갖는다고 밝혔다. 문화특화지역조성사업의
      일환으로 진행하는 이 사업은 생성과 소멸의 과정을 거쳐 성장해온 도심 속 흩어져 있는 다양한 문화를 예술로 기록하고 후대에 물려주기 위한 취지로 순수예술 창작물을 구현하고 예술의 사회적 책임에 관해 고찰해 보는
      사업이다. 앞으로 지역 예술인들과 뜻을 모아 소중한 원도심의 문화가 한순간 덧없이 사라지는 일이 없도록 매년 확대해 나갈 계획이다. 성호동을 대상으로 올해 처음 시행하는 ‘예술로 성호창발(城湖創發)’ 사업은
      지난해 10월 지역 예술인들을 대상으로 참가자를 공개 모집한 결과, 사업 취지를 이해하고 창작 능력과 작품의 완성도가 기대되는 4개 단체를 선정하였다. 선정된 4개 단체 작가들은 스토리 개발을 위해 성호동 주민들을
      만나 세밀한 대화를 나누기도 하고, 장르와 특성에 맞는 창작품을 만들기 위해 성호동 구석구석을 누비는 열정을 보였다. 발표회는 1월 30일 오후 2시부터 4시 30분까지 ‘성호동 이바구 투어’라는 이름으로 마산박물관
      앞에 모여 문신 길을 따라 추산창작공작소 4933을 거쳐 임항선 그린웨이, 그리고 성호동 생활문화센터를 지나 정법사로 이동하면서 펼쳐진다. 〈(사)경남국악관현악단 ‘휴’〉가 ‘추산창작공작소 4933’에서 동네
      이야기를 판소리로 엮어 국악 관현악과 경서도 소리를 통해 성호동의 옛이야기를 펼치고, 는 ‘성호동의 역사와 추억을 담다’란 주제로 도시가 발달하면서 퇴색되어가는 성호동 동네잔치의 상징적 의미를 담은 조형물을
      설치했다. 〈신미란 작가〉는 ‘성호동 생활문화센터 2층 전시장’에서 성호동 사람과 삶의 이야기(話)와 그림(畵)을 표현한 ‘성호화첩(成湖話畵)’을 발표하며, 〈박은혜 춤패〉는 ‘일란 이필이의 춤을 찾아가는 소소한
      춤 여행’이란 주제로 이필이 선생의 춤을 추며 다큐멘터리 시사회를 가지는 것으로 전체 일정을 마친다. 공식 행사 외의 진행은 성호동 토박이 김경년 창원시도시재생지원센터 해설사가 맡아 행사장을 이동하는 중간중간
      맛깔나는 이바구로 성호동의 역사를 들려준다. 심재욱 창원시 문화체육관광국장은 “도시는 사람의 역사를 품은 곳으로 이제 사람이 도시를 품어야 문화예술로 지속 성장의 가능성을 보여줄 수 있다”라며 문화의 힘을 강조했다.
      한편 행사 참가는 사회적 거리두기를 위해 참석 인원을 20명으로 제한하여 운영한다.
