      상승세를 보이고 있으나(2016년 3.72% 기록), 전술(前述)한 영미법계 국가보다는 매우 낮은 무죄율을 보여주고 있다. 따라서 검찰과 경찰의 관계에 대하여 상당히 뿌리 깊은 논쟁이 계속 남아 있고 경우에
      따라서는 권력기관 상호간의 감정적인 분쟁으로까지 비화되고 있으나, 검/경 수사권조정 문제는 무엇보다도 국민의 기본권을 최대한으로 존중해야 한다는 기본입장에서 검토되지 않으면 안 된다. 즉 수사지휘권의 문제를
      국가기관 간의 권한 대립의 문제로 볼 것이 아니라 과연 검사의 사법경찰에 대한 지휘ㆍ감독이 국민의 인권보호에 기여하는가 또한 형사사법정의의 실현에 유익한 것인가라는 측면에서 논의되어야 할 것이다.
    - 서울시는 11월부터 공영주차 요금을 5분 단위로 부과하도록 한 '주차장 설치 및 관리 조례 개정안'을 공포했다고 30일 밝혔다. 개정 조례안에 따르면 서울시 공영주차장 1급지 기준으로 기존에는 5분 내로 주차했을
      경우 1000원을 내야했지만 11월부터는 절반인 500원만 내면 된다. 이와 함께 시는 이날 주차장 설치 및 관리 기준이 되는 자동차의 범위에 '이륜자동차'를 포함하고 주차장 건설 융자대상을 5면 이상의 소규모
      주차장까지 확대하는 내용의 조례 개정안을 입법 예고했다. 또 기존 '여행주차장' 명칭을 '여성우선주차장'으로 변경하고 여성우선주차장을 확장형 주차구획에 우선 설치하도록 했다. '도로명주소법'이 시행됨에 따라
      조례에 규정된 기존 도로명을 새주소도로명으로 정비하고 시장이 주차요금을 조정할 수 있는 범위를 30%에서 50%로 확대해 주차수요를 지역 여건 및 환경변화에 따라 탄력적으로 관리할 수 있도록 할 예정이다. 이번
      개정안은 부서 협의, 법제심사, 조례규칙심의회 의결, 시의회 의결 등 입법 절차를 거쳐 시행된다.
    - 해양경찰이 관할하는 범죄에 대한 검거율은 매우 높은 수준으로 2011년 98.9%, 2012년 검거율 98.8%에 이르고 있어 거의 모든 범죄자가 검거되는 것을 알 수 있다. 이례적인 것은 범죄발생건수에 비해
      검거인원이 30%가 되지 않는데 이는 동일인이 여러 건의 범죄를 저지렀기 때문으로 볼 수 있다. 해양범죄는 육상범죄와는 달리 같은 범죄 또는 비슷한 범죄를 반복으로 행하는 경우가 많다. 수산업법 위반의 경우를
      예로 들면 동일한 사람이 금지된 행위를 반복하여 행하거나, 한 사람이 여러 가지를 동시에 위반하는 경우가 많다. 범죄가 반복적으로 이루어지는 경우가 많기 때문에 범죄발생건수에 비해 검거인원이 적은 것으로 볼
      수 있다. 구속자는 매우 적은 것으로 나타나고 있는데 이는 불구속수사의 원칙이 해양경찰에서 철저히 지켜지고 있음을 보여주고 있다.
  - source_sentence: 정수기 성능검사기준에서 유기중금속을 시험하는 항목은 어떤 필터에 적용되니?
    sentences:
    - '정수기 성능검사기준 강화

      □ 정수기에 대한 관리를 강화하기 위하여 “먹는물관리법”에 근거한 “정수기의 기준․규격 및 검사기관 지정고시”를 11월 24일부로 개정․시행한다. ○ 이번 고시 개정은 현행 정수기관리제도의 문제점을 개선하기
      위하여 2003년에 「먹는물 관련기기 개선방안」에 대한 연구사업을 추진하였고, 금년에는 전문가 토론회, 자문회의, 세미나 등을 개최하여 관련 학계, 소비자, 전문가의 다양한 의견을 수렴하여 추진되었다. □ 이번에
      개정․시행되는 주요 개선내용은 다음과 같다. ○ 정수기 성능검사의 내실화를 기하기 위하여

      - 기존에는 일반성능 항목(냄새, 맛, 색도, 탁도, 일반세균 등 5항목)과 특수성능 항목(총트리할로메탄 등 43항목)에 대해 조제수(일반세균제외)를 사용하여 성능을 검사하고, 기타 수질기준 항목에 대해서는
      먹는물수질기준 적합여부만을 검사하였으나,

      ⇒ 일반성능 검사항목 중 조제수로 사용하는 수돗물에서는 대부분 일반세균이 검출되지 않으므로 동 항목을 수돗물에서 검출빈도가 높은 소독부산물인 ‘클로로포름’으로 대체하고,

      ⇒ 일반성능 및 특수성능 검사항목 이외의 항목 중 건강상 유해영향 물질과 소독부산물질(페놀 등 33항목)은 정수기 유출수가 유입수 함유농도를 초과하는지 여부를 의무적으로 검사토록 하였으며,

      ⇒ 정수성능 저하에 따른 소비자들의 불만을 해소하기 위해 성능검사 제거율을 냄새․맛․탁도 항목은 기존 80%에서 90%로, 색도는 70%에서 80%로 상향 조정하였으며, 클로로포름의 제거율 기준을 80%로 신설하였다.
      ※ 간이정수기(유효정수량 500ℓ이하)는 현행대로 성능검사를 실시하되, 표시사항에 “간이정수기”를 표기하도록 의무화

      ○ 또한, 시중에 판매되는 정수기의 유통관리를 강화하기 위하여

      - 기존에는 연간 1회 표본을 추출하여 수거검사를 실시하였으나

      ⇒ 앞으로는 시중에 유통되는 모든 정수기 제품을 모델별로 수거하여 검사를 실시하고, 최초 검사시에 비해 정수성능이 현저히 떨어지는 제품을 제조․수입․판매한 자에 대하여는 먹는물 관리법에 따라 영업장폐쇄 등 행정처분을
      실시할 계획이다. - 기존에는 정수기 필터의 원산지, 제조원 등 표시기준이 정해져있지 않아 불량필터가 시중에 유통되어 정수기의 품질을 떨어뜨리는 주요인이 됨에 따라

      ⇒ 정수기 품질검사 신청시 필터의 원산지 증명서류를 제출토록하는 한편, 필터의 원산지, 제조원, 교체시기 등을 반드시 표시하도록 정수기 필터의 표시기준을 신설하였다. ※ 정수기 필터의 표시기준 규정은 고시일로부터
      6개월 이후부터 시행

      - 소규모 정수기 제조업체가 도산 등의 사유로 부품공급과 A/S가 불가능하게 되어 소비자가 피해를 입는 것을 방지하기 위하여

      ⇒ 정수기 품질검사기관 내에 소비자보호센터를 설치하여 소비자상담, 부품공급, A/S 등 소비자 보호활동을 실시하도록 하였다.'
    - '정수기 성능검사기준 강화<br>□ 정수기필터 규격화 및 성능기준 설정계획안<br>○ 필터 표준규격, 시험방법을 마련하고, 필터의 특성․기능에 따라 검사항목 제정 및 인증제 실시 <table><tbody><tr><td>필터종류</td><td>특징
