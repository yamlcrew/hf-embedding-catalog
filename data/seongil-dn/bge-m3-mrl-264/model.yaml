      역삼투막 필터</td><td> 0.0001 μm 유․무기화합물, 미생물</td><td>유해중금속 : 납, 비소, 수은, 6가크롬,카드뮴, 세레늄, 망간, 철, 알루미늄, 아연, 구리무기물 : 경도, 암모니아성질소,
      황산이온, 시안, 불소, 염소이온, 질산성질소미생물 : 대장균군, 일반세균</td></tr><tr><td> 이온교환수지 필터</td><td> 양이온 또는 음이온 제거</td><td> 이온성 물질(양이온, 음이온)</td></tr><tr><td>
      활성탄 필터</td><td> 잔류염소, 유기물 제거 맛, 냄새 제거</td><td> 소독제 및 소독 부산물</td></tr></tbody></table>'
    - 백퍼센트 상훈이 '드림팀' 최고 에이스로 등극했다. 7일 오전 방송된 KBS 2TV '출발드림팀2'에 출연한 상훈은 장애물 경기 첫 출연과 동시에 우승을 차지해 '최강운동돌'의 탄생을 알렸다. 이날 상훈은 통계청
      직원들을 상대로 종합장애물 5종 경기에 나서면서 뛰어난 집중력과 균형성을 자랑했다. 상훈은 1단계부터 5단계까지 차분하면서도 타고난 순발력으로 경기를 이끌어갔다. 특히 상훈은 1단계에서는빠른 스피드로 최고기록을
      냈으며, 3단계에서는 엄청난 집념과 발 힘으로 영화 같은 한 장면을 연출하며, 5단계까지 완주해 현장에 응원하러 와 준 수많은 팬들뿐만 아니라 '드림팀'과 '통계청' 직원들의뜨거운 박수와 호응을 이끌어냈다.
      상훈은 소속사를 통해 "완주가 목표였는데 내가 유일한 완주자였다"며 "이번에 백퍼센트 앨범을위해서 몸을 만들었던 게 도움이 된 것 같다"고 전했다.& lt;연예부&gt;
  - source_sentence: 어떤 사람이 공시 규정을 따랐을 때 P2P 플랫폼에 관한 기본 데이터를 줘야 하는 거야?
    sentences:
    - '□ (공시규제: 실적 정보) 동등 계층간 통신망(P2P) 플랫폼으로 하여금 과거 또는 미래의 실적에 대한 정보를 COBS 4.6에 따라 공개하도록 함. ○ 과거 실적정보(과거 6개월 동안의 부도율 등)를 공시할
      때에는 이러한 실적이 반복되지 않을 수 있다는 경고를 해야 하고, 좋은 실적만을 공시하는 것을 예방하기 위해 과거 1년간의 실적은 반드시 포함되어야 하고 더불어 과거 5년간의 실적 정보도 포함되어야 함. ○
      미래의 실적에 대한 추정은 합리적인 가정과 객관적인 데이터에 기반해야 하고 수수료 및 다른 비용이 실적에 미치는 영향에 대해서도 공시해야 함. □ (공시규제: 담보 등 안전장치) 동등 계층간 통신망(P2P)
      업체는 ‘보증(guaranteed)’, ‘보호(protected)’, ‘안전(secure)’하다는 문구를 사용할 경우 공정하고, 명확하며, 오해의 소지가 없게 공시하도록 함. ○ 업체는 소비자가 명확하게 이해할
      수 있도록 정보를 제공해야 하고, 이러한 장치에 한계가 있다면 이를 설명해야 함.'
    - 한국항로표지기술원(원장 박계각) 국립등대박물관은 코로나19로 위축된 국민의 문화향유 증진을 위해 등대 만들기 키트와 컬러링 북으로 구성된 교구재 드림 이벤트를 진행중이라고 12일 밝혔다. 이번 이벤트는 집콕
      생활의 답답함과 무료함을 느끼는 아이들을 대상으로 봄 꽃 같은 설렘을 느낄 수 있도록 준비했으며, 등대박물관에서 운영 중인 등대스탬프 투어 커뮤니티 ‘안녕, 등대’(cafe.naver.com/lighthousetour)에서
      참여가 가능하다. 누구나 참여할 수 있으며 ‘안녕, 등대’ 커뮤니티에 ‘등대와 아이가 함께 나온 사진’을 이벤트 게시판에 올리고 참여댓글을 달면 된다. 선착순 100세트 한정으로 진행되는 이번 이벤트는 사진에
      나온 아이의 수만큼 교구재 꾸러미가 지급되며 상품 소진 시까지 진행된다. 국립등대박물관 관계자는 ‘코로나19로 지친 아이들에게 교구재 꾸러미를 통해 즐거움과 재미를 느낄 수 있는 기회가 되길 바란다’고 말했다.
    - '□ (공시규제: 기본원칙) 공시규제의 핵심은 동등 계층간 통신망(P2P) 업체로부터의 모든 정보는 공정하고(fair), 명확하며(clear), 오해의 소지가 없도록(notmisleading) 공시되어야 한다는
      것임. (PRIN 7, COBS 4.2.1R(1))

      ○ 이를 통해 소비자에게 제공되는 모든 정보는 정확하고 소비자의 니즈에 충분히 부합하는 정보가 제공되어야 함. ○ 실제 금융감독청(FCA)에서 시장조사를 한 바에 따르면 여러 플랫폼들이 리스크에 대한 경고는
      줄이고 수익만을 강조하거나, 오해의 소지가 있거나 비현실적으로 낙관적인 인상을 주는 정보를 제공하거나, 중요한 정보를 경시하는 경향이 있었음. ○ 예를 들면, 웹사이트 배너(banner)에 있는 수익률은 수수료
      등 비용, 부도율, 세금 등의 영향에 대한 설명 없이 제공되었고, 상품과 연관된 리스크에 대한 정보는 찾기 어려운 곳에 배치하는 등의 문제가 발견되었음. ○ 또한 예금이자율과 비교하여 마치 투자자가 예금자로
      오판할 수 있도록 하는 경우도 있었음. □ (공시규제: P2P 플랫폼 정보) P2P 플랫폼에 대한 기본 정보를 투자자에게 제공하도록 함. ○ 플랫폼의 세부 연락처, 인가(full authorisation) 증서,
      투자자에게 제공되는 실적리포트의 세부사항, 플랫폼의 이해상충 관련 내부정책(policy), 비용 및 수수료에 관한 정보, 고객 자금 보호장치에 관한 세부 내용 등이 제공되어야 함. ○ 또한 플랫폼과 투자자간
      핵심적인 권리와 의무를 규정한 계약서가 거래가 발생하기 전 적정한 시간 내에 제공되어야 함.'
  - source_sentence: 어떤 전공을 하는 의료인이 강원대병원 소속이면서 일주일에 한 번 화천군에 파견돼?
    sentences:
    - 국회 국토교통위원회 소속 김은혜 국민의힘 의원이 청년에 대한 주택담보비율(LTV) 완화를 촉구했다. 김 의원은 13일 페이스북에 글을 올려 “민주당이 발표한 ‘누구나 집 프로젝트’를 봤다. 격려를 해주고 싶지만,
      의문점이 가시지 않는다”며 “결론적으로는 집을 살 수 있게 해주는 정책이 아니라 사는 걸 불가능하게 만드는 정책”이라고 지적했다. 그는 “10년 살고 내 집 마련 하는 정책이 지금까지 없지 않았다. 근데 10년
      공공임대 주민들은 왜 힘들어했을까”라며 “정부는 정부대로 ‘내 집 마련’ 홍보하면서 주민들에겐 정교한 설계 없는 분양가 혹은 감정평가액이라는 자의적인 기준에 혹사당하게 했기 때문”이라고 말했다. 이어 “시장경제
      200년 역사상 공짜 점심은 없다”며 만일 주택 가격이 오르면 입주자들이 원리금 부담 때문에, 떨어지면 사업자가 입주자들의 분양 포기로 피해를 볼 것이라고 주장했다. 김 의원은 “현재의 부동산 규제, 옥죄는
      대출을 보면 현금 부자에게만 집을 살 수 있도록 하고 있다”며 “집을 사고 싶다는데 정부가 팔 걷고 나서 ‘대출 안 된다’ 개입하고 40~60% 선 긋는 나라, 찾기 어렵다”고 비판했다. 그러면서 “문재인 정부
      분들은 진작 빚내서 집 사놓고선 청년들에겐 월급은커녕 대출로도 집값을 충당할 수 없도록 자산 양극화의 수렁에 내몰고 있다”며 “갚을 능력이 있는 청년의 생애 최초 집 마련에 LTV를 90% 이상 풀어주는 각오
      없이 절망의 고리를 끊을 수 없다”고 강조했다. 아울러 “대출의 상환 기간 또한 30년 이상으로 늘려 주택 구입 부담을 줄일 방법을 논의해 달라”고 촉구했다.
    - 속보=강원도내 예방접종센터가 2차 접종과 6개 시·군에서의 추가 신규 개소를 앞두고 인력난에 비상이 걸렸다. 20일 오전 찾은 춘천시 예방접종센터, 최근 80대 고령자가 하루 사이 주사를 두 번 맞은 사고(본보
      지난 19일자 1면 보도)가 일어난 뒤 근로자를 임시 채용하고 필수 확인 장소에 보건소 직원을 배치하는 등 안전한 접종을 위해 안간힘을 쓰고 있는 모습을 보였다. 그러나 여전히 인력이 충분치 않아 자원봉사자와
      예방접종 외 업무를 맡고 있는 공무원들이 자발적으로 안내를 맡지 않으면 원활한 진행이 어려운 상황이었다. 더욱이 춘천뿐 아니라 원주, 강릉, 삼척시가 22일부터 시작되는 화이자 백신 2차 접종을 앞두고 어려움을
      겪고 있다. 원주는 공무원뿐 아니라 자원봉사자에 지역 군부대 인력까지 동원해야 하는 상황이다. 강릉은 시청에서 근무하는 행정직 공무원을 하루 13명씩 차출하고, 자원봉사자를 모집하는 등 인력 마련을 서두르고
      있지만 한번에 많은 인원이 들이닥칠 경우 안전한 접종이 가능할지는 미지수다. 접종을 아직 시작하지 않은 군단위 지역은 상황이 더욱 심각하다. 특히 최근 코로나19 환자가 급증하면서 역학조사, 환자 관리, 예방접종
      업무가 모두 가중돼 보건소의 인력난은 세 배가 됐다. 양구군은 29일부터 시작되는 예방접종에 보건소 전 직원을 총동원하겠다는 방침이지만 당장 코로나19 환자가 발생할 경우 인력 공백이 발생할 수밖에 없다. 지난
      16일부터 접종을 시작한 인제군도 군청 직원 등 분야를 가리지 않고 공공기관 근로자들이 예방접종 업무에 투입되고 있는 실정이다. 강원도는 안전한 예방접종을 위해 예산 지원을 지속적으로 요청하고, 일선 시·군
      인력난 해소에 적극 나서기로 했다. 도 관계자는 “인력 지원을 위해 2억5,000만원의 예산을 최근 확보했다”며 “지원을 신청한 시·군에 우선 분배하고 지속적으로 수요를 파악할 계획”이라고 말했다.
    - 【화천】화천군보건의료원의 산부인과 진료에 차질이 우려된다. 군보건의료원은 그간 산부인과 진료를 하던 공중보건의가 15일 소집해제되지만 후임 공중보건의를 확보하지 못해 당분간 임시진료체제로 운영하기로 했다. 우선
      강원대병원 산부인과 교수를 초빙해 20일부터 5월 말까지 주 1회, 매주 화요일에만 임시진료를 실시하기로 하면서 지역 임산부들의 불편이 예상되고 있다. 의료원은 그간 공중보건의를 배치받아 산부인과를 운영했으나
      올해는 산부인과 공중보건의를 확보받지 못해 현재 산부인과 전문의 채용 공고를 게시한 상태다. 그러나 연봉 2억원대를 제시해도 농촌지역 근무를 선호하는 전문의가 많지 않아 채용공고 기간 지원자가 있을지는 장담하지
      못하고 있다. 또 힘들게 전문의를 채용하더라도 인건비에 대한 국비 지원이 없고 도비(30%)와 군비(70%)로만 부담해야 하는 어려움도 안고 있다. 지역에서는 농촌에서 공중보건의의 비중이 큰 만큼 이들이 떠난
      빈자리를 채우는 대책을 정부 차원에서 마련, 의료공백이 발생하지 않도록 조치해야 한다는 지적이 나오고 있다. 특히 공중보건의 수급이 불분명한데도 정부 지원이 없어 농촌 주민들만 불이익을 받고 의료 사각지대에
      내몰리고 있다는 불만이 커지고 있다. 이재성 화천군보건의료원장은 “농촌의 빈약한 의료환경은 주민들의 이탈 또는 출산율 저하와 무관하지 않은 만큼 정부차원에서 의료복지행정의 폭을 확대해야 한다”고 말했다.
  - source_sentence: 어떤 사람의 연금 수령액을 증가시키면 연금재정이 어려워져?
    sentences:
    - '특허청장, 이차전지 조립장비 강소기업 현장방문

      □ 특허청은 2006년부터 모태펀드 특허계정에 출자하여 벤처캐피탈이 우수한 특허를 보유한 기업을 발굴하여 투자할 수 있도록 지원하는 역할을 수행하고 있다. * 특허청(출자) → 모태펀드(출자) → 벤처캐피탈(투자)
      → 우수특허 중소·벤처기업

      ** 예산 1,900억원 출자, 47개 子조합 결성(총 결성액 1조 1,165억원), 총 668개 기업에 9,878억원 투자(2019.6월 누계)

      ㅇ 투자자인 대덕인베스트먼트㈜는 2013년 모태펀드(특허계정)에서 60억원을 출자받아 펀드를 결성하였고, ㈜엠플러스가 보유한 우수한 특허를 높이 평가하여 2016년 20억원을 투자한 후 코스닥 상장을 통해 회수에
      성공했다. □ 박원주 특허청장은 “부품·소재·장비 분야에서 일본 등 선도국의 기술을 대체하고 신기술을 개발하여 특허로 보호받을 수 있는 강소 기업이 지속적으로 나와야 한다.”면서 “앞으로도 엠플러스와 같은 소재·부품·장비
      기업들이 특허를 바탕으로 자금을 조달하여 성장할 수 있도록 지식재산 금융 지원을 계속해서 확대해 나가겠다.”

      고 밝혔다.'
    - 한편, 제19대국회에서는 소득대체율을 높이지 않는 대신, 연금급여산식의 기준이 되는 기준소득월액의 상ㆍ하한액을 인상함으로써 가입자 전체의 소득평균을 높여 보험급여를 인상하는 방안도 논의되었다. 이 방안은 소득재분배
      부문에 해당하는 국민연금의 A값을 상향하여 소득재분배 기능을 강화하는 장점을 가진 반면, 보험료가 인상되는 저소득층 가입자와 영세사업장, 그리고 고소득 사업장가입자와 사업장의 연금보험료 부담이 증가하기 때문에,
      경제 및 산업계의 반발로 이어질 가능성도 있다. 또한 고소득 가입자들의 연급수급액의 증가는 시간의 경과에 따라 연금재정에 추가적인 부담을 주게 된다는 것이다.
    - 다. 재정<br>□ 저출산·고령화의 진전으로 세원이 되는 생산가능인구의 비중은 줄어들고, 연금급여 및 의료비 지출 등은 늘어남에 따라 재정수지 부담은 가중될 전망<br>― 출산율이 하락하면 전체 인구 중 생산가능인구의
      비율이 감소하고 따라서 세수 감소로 이어질 가능성<br>― 반면, 고령화로 인해 연금수급자가 증가하면 연금 및 의료비 등의 재정지출 확대로 이어질 가능성<br>― 국민연금 가입자 중 노령연금 수급율은 인구감소
      및 은퇴자 증가에 따라 2010년 13.3%, 2030년 41.9%, 2050년 88.5%로 급증할 전망<br>□ IMF에 따르면 GDP 대비 재정수지는 생산가능인구비율 1% 증가 시 0.06%p 개선되는 반면,
      노인인구 1% 증가시 0.46%p 악화<br>― 또한, OECD는 고령화로 인해 노인관련 재정지출이 급증해 주요국의 2050년 재정수지가 적자를 기록할 것으로 전망
