  widget:
  - source_sentence: 핀란드의 교사 양성 교육의 시작은 언제야
    sentences:
    - '핀란드의 교사 양성교육은 1863년 Jyväskylä 대학의 세미나에서 시작이 되었다 (Department of Teacher Education at University of Jyväskylä, 2017:
      2). 당시 세미나의 목적은 초등학교 교사들을 교육시키기 위한 것이었다. 1860년대부터 지속적으로 교사 양성 교육에 대한 논쟁이 있어 왔는데, 그 논쟁은 ‘교사 양성 교육과정의 목표’와 ‘가르치는 내용’에
      대한 것이었다. 이 논쟁들은 오늘날까지도 이어지고 있다. 논쟁의 주요 주제는 교사 양성 교육이 실질적인 것에 중심을 두어야 하는지, 이론적인 것에 중심을 두어야하는지와 관련이 있었다 (Jakku-Sihvonen,
      & Niemi, 2006). 많은 논쟁을 거치면서 핀란드에서는 교사 양성 교육에 있어 이론과 실제의 조화 및 통합이라는 전통을 수립할 수 있었다 (Simola, 2005).'
    - 한편, 우리나라에서는 국어교육과, 영어교육과, 수학교육과 등 각 과목별로 교사교육학과가 별도로 설치되어 있음에 비해, 핀란드에서는 과목별로 담당 학과가 나뉘어져 있지 않고 교사교육학과 하나에서 모든 교과의 교사
      양성을 통합하여 운영하고 있다. 이는 교사 양성에 있어 교과별 특수성보다는 교사 양성 교육의 전문성을 더 중시한 접근이라고 할 수 있다. 즉 교사 양성 교육 특히 교직학 교육에 있어서는 교과별 차이를 크게 보지
      않고 교사 양성 교육의 공통성에 더 초점을 두고 있는 것이다. 핀란드 교사 양성 교육에 있어 각 하위 영역, 즉 교과내용학, 교직학(교과교육학), 교육 실습 등은 각 전문 담당 기관에서 분리하여 맡도록 하고
      있지만, 과목별 교직학은 통합하여 운영하고 있는 모습을 보여 주었다. 이러한 체제는 하나의 전공 교과 교육만이 아니라 타 전공 교과교육 이수도 수월하게 하여 핀란드 교사들이 모두 2개 이상의 교과 교사 자격을
      갖추고 있는 배경이 되고 있다.
    - '{IMG:1}소위 서울시향 사태라는 큰 내홍을 겪은 뒤 하락세의 길을 걸은 서울시립교향악단(서울시향)이 다시 기지개를 켜고 도약할 준비를 하고 있다. 서울시향 제5대 대표이사로 올 3월 취임한 강은경 대표이사는
      23일 첫 기자회견을 열고, 향후 핵심 운영 방향으로 예술적 요청과 공공적 요청을 조화롭게 구현하는 21세기 지속가능한 오케스트라를 만들겠다고 강조했다. 21세기 지속가능이라는 모호한 표현에는, 이전의 내홍을
      넘어선 오케스트라의 본질적인 고민이 고스란히 담겼다. 강 대표이사는 다양한 문화가 공존하는 21세기임에도, 19~20세기 운영하던 회원제 운영 방식이 여전히 남은 가장 보수적인 영역이 오케스트라이다며 우리뿐만이
      아니라 서구를 비롯해 모든 오케스트라가 고민하는 문제가 이 시대에 어떻게 살아남는가이다고 이야기했다.이어 파산하는 오케스트라를 여럿 보았고, 여러 예술단체가 경영의 어려움을 호소하고 있다. 이러한 어려움은 경영·재무적
      건전성에만 국한되지 않는다며 지역사회와 소통하고, 시민·기업과 손을 잡고 동반성장할 계획을 구체화한 오케스트라만이 21세기에 살아남을 것이다고 했다. 그러면서 21세기 서울에 있는 공공예술단체로서 서울시향은
      서울시민이 살아 있는 시향이라고 느낄만한 여러 시도를 할 것이다. 이를 통해 한국의 수많은 클래식 예술단체에 어떻게 생존하는지 모델을 보여주고 싶다고 강조했다. 이를 위해 ▲조직 건전성 확보 ▲예술 부문 안정화
      및 역량 강화 ▲생애주기별 예술교육 시스템 구축 ▲지역사회와의 동반 성장 등을 부문별 추진 과제로 삼는다. 조직 건전성 확보를 위한 내·외부 소통을 강화한다. 지난 5월 4일 서울시 정책에 발맞추어 사무보조
      공무직 3명을 정규직으로 전환했다. 또한 지난해 4월에 도입한 근로자이사 제도를 통해 단원들의 의견을 이사회에 반영하고, 재단의 주요 의사 결정에 협치를 구현하고 있다. 아울러 관객들과 후원회원들이 오케스트라와
      친밀하게 소통할 수 있는 다양한 이벤트를 마련해, 시민과 호흡하는 오케스트라로 발전하기 위해 노력한다는 계획이다. 공석인 음악감독도 임명하기 위해 최근 음악감독추천위원회를 발족하고 속도를 낸다. 다만 강 대표이사는
      차기 음악감독은 시급성보다는 적합성이 중요하다며 동고동락할 단원들의 의견부터 여러 외부 전문가와 관객들의 의견까지 수렴하는 절차를 거칠 것이다고 강조했다. 그는 이러한 절차는 시간이 걸리더라도 민주적인 소통과
      숙의 과정을 통해 건강한 오케스트라를 만들겠다는 서울시향의 강력한 의지이다고 덧붙였다. 음악감독이 부재인 기간에 서울시향의 예술적 안정성 강화를 위해 부지휘자를 빠른 시일 내에 선발한 계획이다. 지난해 9월
      최수열 지휘자가 사임한 이후 현재까지 공석인 상황이다. 강 대표이사는 수석부지휘자(associate conductor)와 부지휘자(assistant conductor)의 층위로 구분된 부지휘자 제도를 통해 예술적
      리더십을 견고하게 할 계획이다고 했다. 시민을 위한 생애주기별 교육시스템 구축을 위해서는 SPO Kids 양성 및 미래 관객 개발에 노력할 것이다고 했다. 서울시향이 이미 진행하고 있던 초·중학교로 찾아가 음악에
      대해 친절히 설명하고 연주를 들려주는 음악수업 2교시와 학생들을 공연장으로 초청하여 공연문화를 경험하게 하는 음악이야기를 꾸준히 진행하고, 교과서에 나오는 클래식음악을 음악수업 교재용 영상으로 제작하는 교과서음악
      영상화 사업을 진행해 서울시 소재 중학교에 배포한다. 또한 지난해 시범사업으로 진행하였던 lt;오케스트라 캠프gt;를 정규 사업화하여, 서울시향 단원들이 서울시내 청소년 오케스트라들을 교육하는 프로그램을 마련할
      예정이다. 20대 관객을 위한 채널과 콘서트 미리 공부하기 등 중장년층 교육프로그램, 공연장을 찾는 바쁜 직장인들을 배려하기 위한 교육콘텐츠 팟캐스트화 등 매체의 다변화도 모색한다. 지역사회와의 소통 및 협력을
      통한 동반성장으로는 기존의 우리동네 음악회를 강화하고, 발달장애아와 그 가족을 위한 음악회 행복한 음악회 - 함께!를 연 2회로 확대하려 한다. 이밖에 기업과의 협력 등을 모색하여 문화 소외계층 및 사회적 배려자에
      대한 문화예술 경험의 기회를 늘리는 등 문화복지 혜택을 꾸준히 확대해 나간다는 방침이다. 강 대표는 독특한 이력의 소유자이다. 중학교 때 바이올린 공부했고, 대학 때는 법학을, 그 이후에는 한예종에서 예술경영을
      전공했다. 그는 이게 장점인지는 모르겠지만 음악과 법, 예술경영을 공부했고 연구자였다가 실무자를 거쳐 지금은 경영자가 됐다며 다양한 시행착오들이 모여 지금의 유연성을 가지게 된 게 감사한 부분이라고 생각한다고
      했다. 어린시절 음악인의 삶을 꿈꿨던 그는 단원들의 고충을 가장 먼저 파악하고, 그들의 직업적 질병을 완화하고 재단 구성원들의 심신 안정을 도모하고자 긴급 의료체계와 전문병원과의 MOU를 통한 협력체계 구축해
      복지혜택을 대폭 강화했다.'
  - source_sentence: 제5회 대한민국 자원순환 정크아트 공모전을 주최한 건 어디야
    sentences:
    - "더불어민주당이 ‘국민통합’을 명분으로 ‘이익공유제’를 본격 추진한다. 신종 코로나바이러스감염증(코로나19) 국면에서 ‘특수’를 누린 기업 이익을 나눠 사회경제 통합을 이루자는 ‘선한 의지’가 명분이다. 대기업ㆍ금융권\
      \ 자본으로 펀드를 만들자는 구체적 제안도 나왔다. 그러나 양극화 해소라는 국가적 과제를 개인·기업의 윤리로 해결하는 것이 온당한가라는 의문이 잇따른다. 경제계에선 “실효가 입증되지 않은 반(反)시장적 계층\
      \ 편가르기”라고 비판한다. ◇이낙연도 김종인도 ‘통합ㆍ공공선’ 고민 \n이낙연 민주당 대표는 12일 ‘코로나19 이익공유제’를 추진하겠다고 거듭 확인했다. 문재인 대통령이 100대 국정과제로 꼽았던 ‘협력이익공유제’를\
      \ 모델로 제시했다. 대기업과 중소기업이 협력으로 생산한 이익을 공유하기로 계약하면, 정부가 세금 감면, 정책자금 우대 등의 혜택을 주는 내용이다. ‘코로나19 이익공유’는 대선을 겨냥한 이 대표의 정책 승부수다.\
      \ 새해 들어 꺼낸 이명박·박근혜 전 대통령 사면이 정치적 통합이라면, 이익공유제는 경제적 통합을 상징한다. 민주당은 이익공유제 논의를 위해 ‘코로나 불평등 해소 및 재정 정책태스크포스( TF)’를 띄웠다.\
      \ 네이버ㆍ카카오ㆍ삼성ㆍLGㆍ배달의민족 등 이익공유제 참여 대상 기업의 이름도 벌써부터 오르내린다. ‘비대면 특수'를 누린 곳들이다. 홍익표 민주당 정책위의장은 KBS라디오 인터뷰에서 “대기업 또는 금융기업에서\
      \ 펀드를 구성해 중소기업이나 벤처를 지원하고 사회적으로 어려움을 겪는 계층에게 일자리를 만들어내는 사업을 고민하고 있다”고 했다. 국민의힘은 ‘이익공유제’를 ‘기업 팔 비틀기’라고 비판하지만, 내부에서는 ‘보수판\
      \ 코로나19 대책’을 고민 중이다. 김종인 국민의힘 비상대책위원장은 ‘공공선(公共善) 자본주의’ 철학이 담긴 보고서를 소속 의원 전원에 보내기도 했다. 2016년 미국 공화당 대선 경선 후보였던 마르코 루비오\
      \ 상원의원이 제시한 개념으로, ‘시장은 국민을 이롭게 하려고 존재한다’는 내용이 골자다. 4월 서울ㆍ부산시장 선거와 내년 대선을 앞두고 경제 민주화에 근간한 양극화 해소 방안을 내놔야 한다는 주문으로 읽혔다.\
      \ ◇전문가들은 “?...” \n경제 전문가들은 이익공유제를 그다지 반기지 않았다. 최병호 부산대 경제학부 교수는 한국일보와의 통화에서 “코로나19로 인한 이득을 누가, 얼마나 누렸는지 객관적 근거가 없다”며\
      \ “기업의 이익이 늘었다면 법인세를 늘리는 등 제도적 회수 방안을 강구해야지 이익을 나누자는 것은 즉흥적 생각\"이라고 지적했다. 선의에 의존하는 ‘금모으기식’ 정책은 효과를 담보할 수 없다. 민주당이 지난해\
      \ 추진한 ‘재난지원금 자발적 기부’ ‘착한 임대료 운동’이 대표적 예다. 당정청은 지난해 5월 1차 전국민 재난지원금을 지급하며 ‘기부 규모가 적지 않을 것’이라고 기대했지만, 기부된 금액은 1.9%에 그쳤다.\
      \ 건물주의 자발적 임대료 인하를 유도하는 ‘착한 임대료 운동’ 역시 호응이 미미하다. ‘계층 편가르기’라는 비판도 비등하다. 양극화 해소 등 국민 복지는 기업이 책임질 일이 아니라는 반론도 있다. 이병태 카이스트\
      \ 경영학과 교수는 “기업의 이익은 주주의 몫인데 정부가 압력을 가해 ‘공유하라’는 것은 경영진의 배임을 강요하는 것”이라며 “코로나19 재난 대응의 주체는 기업이 아니라 정부”라고 꼬집었다."
