- source_sentence: 경기도 체육회는 지방체육회의 법인화 지침서 내용 중 어느 부분에 대하여 문제점을 제기하였어
  sentences:
  - 광주 서부소방서는 전통시장 점포 점검의 날을 맞아 상인의 자율적 화재예방을 위해 양동시장을 점검했다고 11일 밝혔다. 전통시장 점포 점검의 날 캠페인은 겨울철 화재예방 및 안전의식 고취를 위해 지난해 11월부터
    매월 2주차 수요일에 서부 지역 8개 시장에 대해 운영되고 있다. 주요 내용은 △점포 내 화재취약요인 제거 △전기·가스시설 사용 안전수칙 안내 등 화재안전교육 및 컨설팅 △시장 진입로에 화재예방 관련 플래카드 부착
    △시장 상인·시민에게 화재예방 홍보물품 배부 등이다. 서부소방서 관계자는 "전통시장은 점포가 밀집돼 있고 타기 쉬운 물건들도 많이 있는 만큼 화재 발생 시 다른 장소에서 발생하는 화재보다 피해가 크기 때문에 자율적이고
    주기적인 점포 점검이 필수적이다"고 강조했다.
  - 경기도체육진흥센터(이하 센터) 설립 추진 관련, 이원성 경기도체육회장이 1인 시위를 이어가고 있는 가운데 전국 지방체육회의 지지 성명 또한 계속되고 있다. 7일 도체육회에 따르면 이날 전국 17개 시ㆍ도체육회장과
    228개 전국시ㆍ군ㆍ구체육회장협의회가 성명서와 입장문을 발표하며 경기도체육회의 센터 설립 반대 지지 의사를 밝혔다. 전날 세종시에서 열린 전국 시ㆍ도체육회장협의회 후 경기도체육회의 입장에 동조 의사를 밝혔던 시ㆍ도체육회장들은
    이날 성명서를 통해 “지방체육회는 국민의 건강과 체육발전을 책임지는 공공 단체임을 다시 한번 강조하며 경기도의회의 센터 설립을 즉각 중단하라”고 촉구했다. 또한 전국 228개 기초자치단체 체육회 회장단 협의회 곽종배
    회장(인천시 연수구체육회장)도 이날 이원성 도체육회장이 1인 피켓 시위를 벌이고 있는 경기도청사 정문 앞을 방문해 입장문을 발표했다. ‘경기도체육진흥센터 설립을 우려하는 이유’라는 제목의 입장문에서 전국시ㆍ군ㆍ구체육회장협의회는
    “경기도의 센터 설립이 강행된다면 이는 비단 경기도 만의 문제가 아니고, 간신히 민선 체제로 자리잡고 있는 전국 지방체육회에 찬물을 끼얹는 행위다”라고 우려를 표했다. 이날 시위 현장에는 도체육회 임원, 시ㆍ군체육회장,
    종목단체장 및 사무국장 등 체육인들의 격려 방문이 이어졌다. 한편 최근 경기도가 문화체육관광부에 질의한 ‘지방자치단체 체육업무 직접수행 가능 여부’에 대한 회신 내용도 공개됐다. 회신에서 문화체육관광부는 “체육진흥센터
    설립과 일정 범위내 체육진흥 사업 직접 수행은 가능하지만, 지방체육회 고유 사업의 직접 수행으로 체육진흥 사업 활동을 형해화 하거나 지방체육회를 실질적으로 대체하는 성격의 법인을 설립하는 것은 ‘국민체육진흥법 제33조
    2의 규정’을 침해할 소지가 있다”고 전했다.
  - 경기도 시ㆍ군체육회가 대한체육회의 지방체육회 법인화 가이드라인이 현실과 동떨어졌다며 조정을 요구했다. 시ㆍ군체육회 사무국장협의회는 8일 오후 경기도체육회 대회의실에서 강병국 도체육회 사무처장, 시ㆍ군 체육회 사무국장
    및 관계자 등이 참석한 가운데 지방체육회 법인설립 간담회를 가졌다. 이날 회의에서 시ㆍ군 사무국장들은 오는 6월 공포되는 국민체육진흥법 일부 개정안에 담긴 지방체육회 법정 법인화 과정 중 정관승인 규정이 지방체육회의
    의견이 제대로 반영되지 않은 일방적인 규정이라고 지적했다. A체육회 사무국장은 “지방체육회 법인화 설립에 많은 어려움을 느끼고 있다. 특히 지역에 따라 다를 수밖에 없는 임원 구성과 기본 재원 마련이 가장 큰 난제”라고
    말했다. 또 B체육회 사무국장은 “지방체육회가 특수법인으로 묶인 것은 매우 잘 된 일이다. 그러나 여건이 서로 다른 시ㆍ군체육회가 독립성을 가진 특수법인에 일방적으로 속하게 된다면 많은 문제가 야기될 것“이라며
    “이제라도 대한체육회는 지역 특성에 맞는 법인 설립이 될 수 있도록 표준 정관이 조정돼야 한다. 이 문제가 해결되지 않는다면 지방체육회의 법인 설립은 아무런 의미가 없다”고 주장했다. 강병국 도체육회 사무처장은
    “어려운 여건 속에서 지역 체육의 행정을 이끌면서 법인화에 적극 앞장서 주신데 대해 감사하다”면서 “이 자리에서 도출되는 의견을 적극 수렴해 정관을 만들도록 하겠다. 사무국장 협의회와 적극 소통하겠다”고 밝혔다.
- source_sentence: 녹조근정훈장을 수상하는 민병헌 교수는 어디 소속이니
  sentences:
  - '첨단재생의료기술 분야 국가경쟁력 향상에 기여한 민병현 교수, 녹조근정훈장 수상

    □ 녹조근정훈장을 수상하는 아주대학교 의료원 민병현 교수는 ‘국내 최초로 골연골 결손 환자에게 자가연골세포 이식에 성공하고, 골관절염의 진단과 치료법 개발을 특화하는 등 첨단재생 의료기술 발전에 크게 기여’한 공로를
    인정받았다. ○ 근정포장을 수상하는 충남대학교 송민호 교수는 ‘미토콘드리아 기능 이상이 당뇨병에 미치는 원인을 규명하고, 미토콘드리아 내막의 CRIF1* 단백질 기능을 분자생물학적으로 규명하는 등 난치성 만성질환
    당뇨병분야 진단 치료 기반을 구축’한 공로를 인정받았다. * CRIF1(Growth differentiation factor1) : 미토콘드리아 내막에 존재하는 단백질, 미토콘드리아 에너지 생성에 필수적 역할 수행

    ○ 대통령 표창을 수상하는 ㈜코오롱생명과학 김수정 연구소장은 ‘세계 최초 골관절염 세포유전자치료제이자 국내 29번째 신약인「인보사」를 개발하여, 미국 먼디파마에 기술이전 계약을 체결하는 성과를 이룩하는 등 국내
    신약의 우수성을 세계적으로 입증’한 공로를 인정받았다. ○ 국무총리 표창은 ㈜엠큐브테크놀로지 김승태 상무와 경북대학교 이재태 교수가 수상한다. - 김승태 상무는 ‘3차원 이미지 기반의 실시간 방광용적 측정 진단이
    가능한 초음파 방광용적 측정기(CUBEScan)를 제품화하여 미국, 유럽 등 의료기기 해외시장 개척에 기여’하였다. - 이재태 교수는 ‘대구경북첨단의료산업진흥재단 이사장을 역임 (2015~2018)하면서 신개념
    당뇨병·갑상선암 치료제 개발, 영상 추적제 개발 등의 연구용역(R&D)을 수행하였고, 국가 첨단의료분야 연구개발 및 산업 육성 진흥에 기여’하였다.'
  - 옥조근정훈장 저 혼자 한 일이 아니고 당연히 할 일을 한 것 뿐입니다. 동료 분들께 고맙다는 말 드리고 싶습니다. 제가 대표로 받았다고 생각해요 올해 대한민국 공무원상 옥조근정훈장을 받은 김종복 서울시 지방사회복지주사(사진)는
