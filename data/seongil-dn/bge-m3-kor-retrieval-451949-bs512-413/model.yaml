    높였다. 쪽방 문패.배치도 설치로 신속한 복지서비스 제공이 가능해졌다. 지정기탁금을 활용해 수납시설을 설치해 만성질환, 장애, 노령 등으로 인해 활동이 불편한 주민들의 좁은 생활공간을 정리해 쾌적한 내부 환경을
    조성했다. 소외된 이웃과 함께하는 아름다운 동행(일촌맺기) 사업을 통해 개별화된 현대사회에서 이웃 간 교류가 단절된 노인인구와 자원봉사자들 간 1:1 결연을 시행했다. 그는 혼자 할수있는 일이 아니고 협력해서 함께
    했다라며 이를 계기로 쪽방 주변 지역에 새로운 변화가 있었으면 좋겠다라고 말했다. 이어 여러 사업을 진행하면서 주민들과 친밀감과 유대감이 형성됐다. 그를 계기로 원할한 소통이 되다 보니 마을공동체가 복원된 것이
    가장 큰 수확이라고 말했다.
  - 일본국헌법에 의하면 일본의 국가수반은 일왕이다. 다만, 일본국헌법은 일왕을 상징적 존재로 규정하고 있으며, 실제에 있어서도 상징적이고 의례적인 행위를 할뿐 국가수반으로서 행정권, 군사통수권 등을 갖고 있지 않다.
    일왕은 선출에 의하지 않고 세습에 의해서 그 직을 계승하다. 즉, 일본국헌법 제2조는 “왕위는 세습하며, 국회가 의결한 황실전범의 규정에 따라서 계승한다.”고 규정하고 있다. 다시 말해서 왕위는 세습하는 것이며,
    세습에 관련된 규정은 국회가 결정하는 것으로 되어 있다. 일왕은 일본국헌법에 규정된 국사 행위만 할 수 있고, 국정에 관한 권능은 갖고 있지 않다. 일왕은 국회의 지명에 근거하여 총리를 임명하고, 내각의 지명에
    근거하여 최고재판소의 장인 재판관을 임명한다. 그리고 일왕은 내각의 조언과 승인에 따라서 아래표와 같은 국사에 관한 일을 한다.
- source_sentence: 국민의료비 중 공공재원의 지출이 58.2퍼센트 비율을 차지하고 있는 나라는 어디야
  sentences:
  - '5) 건강보험 재정

    2010년 기준으로 독일의 GDP 대비 국민의료비 비중은 11.6%이고, 국민 의료비 중 공공지출 비율은 76.8%로 OECD 국가의 평균인 72.2%를 소폭 상회하고 있다. 이 같은 재정을 충당하기 위한 독일의
    공적건강보험의 재원으로는 보험료, (연방)정부의 보조금 그리고 기타 수입 등이 있다. 이 중 주요 재원은 보험료 이며 정부의 보조금이 부분적으로 사용된다. 보험료는 근로자와 고용주가 부담하며, 연금과 산재보험수급자도
    의료보험료를 부담하여야 한다. 2009년 이전에는 각 질병금고들이 수지균형의 원칙에 따라 보험요율을 자율적으로 결정하기 때문에 각 질병금고의 종류별로 그리고 같은 종류라도 지역별로 보험요율의 변동폭이 매우 상이했다.
    보험료는 원칙적으로 보험가입자와 고용주, 연금보험자(관리기구) 또는 기타 기관들이 소득수준에 따라 부담하며 모두 건강기금(Gesundheitsfonds) 으로 납입된다. 2009년부터 모든 질병금고에 동일한 보험요율이
    적용되어 15.5%로 단일화되었으며, 그 이전까지 고용주와 근로자가 동일하게 절반씩 동일하게 부담하던 것을 2011년부터 고용주는 7.3%를 부담하고 근로자는 8.2%를 차등적으로 부담하게 되었다.'
  - 케이아이엔엑스(093320)는 52주신고가를 기록하고 있어 주목할만하다. 동종목의 현재 주가는 26,600원 선에서 이루어지고 있다. 거래일을 기준으로 최근 3일간 평균 거래량은 5만 주이다. 이는 60일 일 평균
    거래량 4만 주와 비교해보면 최근 거래량이 약간 증가했지만 크게 벗어나지는 않았다. 상장주식수 대비 거래량은 1.91%로 적정수준 최근 한달간 케이아이엔엑의 상장주식수 대비 거래량을 비교해보니 일별 매매회전율이
    1.91%로 집계됐다. 그리고 동기간 장중 저점과 고점의 차이인 일평균 주가변동률을 4.7%를 나타내고 있다. 지표 항목 값 종합점수 성장성 매출액증가율 0.01 7.02 자기자본증가율 0.07 안정성 부채비율
    13.76 10 유동비율 540.46 이익안정성 10 수익성 ROA 11.42 9.19 ROE 12.99 영업이익율 20.41 케이아이엔엑스의 퀀트 재무 점수는 26.21점으로 지난 분기에 비해 성장성 점수가 하락했다.
    이는 매출액 증가율과 자기자본 증가율이 감소하였기 때문이다. 수익성 측면에서 볼때 ROA, ROE, 영업이익률 모두 개선되어 이전보다 좋은 점수를 받았다. fnRASSI는 증권전문 기업 씽크풀과 파이낸셜뉴스의 협업으로
    로봇기자가 실시간으로 생산하는 기사입니다.
  - 공적건강보험에 대한 지속적인 보장성 및 역할 강화 노력으로 전체 의료비 중 공공재원이 차지하는 비중이 지속적으로 증가하고 있는 상황이지만 여전히 개인의 의료비 부담이 높기 때문에 민영건강보험의 재원 부담 비중도
    지속적으로 증가하고 있는 추세이다. 전체 의료비 중 자동차보험과 민영건강보험(실 손의료보험)을 통한 의료비 지출비중은 5.8%에 이르고 있다. 나머지 31.4%는 가계직접부담으로 이 중의 일부가 정액형 건강보험을
    통해 지출되고 있다. 정액형 건강보험은 의료비 보장과 함께 중증질환에 걸렸을 때 현실적으로 경제활동이 지속되기 어려워 소득상실 리스크를 보장하는 기능까지 포함하고 있기 때문에 정액형 건강보험의 재원조달 비중을 계량적으로
    추산하기 어렵다. 공공재원을 통한 의료비 지출은 1980년 이후 꾸준히 증가하여 왔지만 OECD국가와 비교했을 때 그 비중이 여전히 낮은 상황이다. OECD 회원국 중에서 국민의료비 중 공공부문 지출 비중이 높은
    나라는 덴마크 85.0%, 영국 84.1%, 노르웨이 84.1% 등이며, 낮은 나라는 칠레 47.4%, 미국 47.7%, 멕시코 48.3% 등으로 나타나고 있다. 한국의 의료비 지출 중 공공재원에 의한 지출 비중은
    58.2%이며, 이는 OECD 평균 71.8%를 크게 하회하는 수준으로, 그만큼 개인의 의료비 부담이 상대적으로 높은 상황이다. 한국의 공공재원이 낮은 이유는 국민건강보험 제도를 도입한 초기부터 타 OECD 국가에
    비해 ‘저부담-저급여’ 구조를 유지했기 때문이며, 동일한 부담을 하는데도 보장률이 낮은 것은 아니기 때문에 낮은 공공재원 비중 자체를 문제점으로 지적하기는 어렵다.
