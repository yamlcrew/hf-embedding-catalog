      제기되고 있기 때문이다. 현대차 관계자는 "국내는 물론 해외서도 경제불확실로 인해 판매가 위축될 수 있다"며 "특히 글로벌 자동차 업체들의 공세가 강화돼 치열한 경쟁을 벌일 것으로 예상된다"고 말했다.
