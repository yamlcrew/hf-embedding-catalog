      공학교실 참가 학생들을 대상으로 진행된다. 전국 12개 초등학교 400여명의 초등학생들과 선생님이 전국의 주요 사업장에 초청됐다. 주니어 공학교실은 기초적인 과학 원리가 실제 기술로 구현되는지 실습을 통해 확인해
      볼 수 있는 초등학생 대상 교육프로그램이다. 현대모비스 연구원들이 강사로 참여해 매달 전국 사업장 인근의 초등학교를 방문, 별도 제작한 교보재를 이용해 관련 기술이 적용된 미래자동차 모형을 직접 제작하는 형태로
      운영되고 있다.
    - 부산의 원도심인 중구와 영도구를 잇는 부산대교 야경이 다양한 빛과 음악 연출로 재탄생했다. 부산시는 부산 원도심 현대화의 상징 교량인 부산대교에 최근 친환경 LED 경관조명을 아치에 554개, 아치바.내부.트러스하부
      등에 774개를 설치하고 본격 운영을 시작했다고 7일 밝혔다. 또 조명 연출과 음악 연동이 가능한 조명제어기를 설치해 시간대별, 계절별, 주말.공휴일 등 각종 행사 개최 시 각기 다른 이미지를 연출할 수 있게
      됐다. 부산대교 경관조명은 2000년부터 설치.운영돼 왔으나, 메탈과 나트륨 투광조명으로 연출이 불가능하고 시설 노후화로 인한 고장이 잦아 운영에 어려움이 있었다. 이에 부산시는 이번 새로운 경관조명 운영을
      위해 설계용역, 주민설명회 개최, 경관자문과 시 경관위원회 심의 등을 거쳐 지난해 8월 착공했다. 부산시 관계자는 부산대교의 주요 조망점인 영도구 웰컴센터와 중구 롯데백화점 주변 수변 산책로에는 스피커를 설치해
      매시간별 음악과 연동되는 경관조명 연출로 생동감 있는 경관조명을 감상할 수 있는 공간을 마련했다며 앞으로 부산의 새로운 관광명소로 거듭나 원도심에 활력을 불어넣는 계기가 될 것으로 기대한다고 말했다.
    - ‘국제관광도시’ 부산의 해안을 잇는 다리 7곳에 각각 ‘미디어파사드’(LED 조명을 비춰 영상을 표현하는 기법)가 적용돼 빛의 향연이 펼쳐진다. 또 광안대교에는 와이어(주케이블)를 걷는 클라이밍과 번지점프 관광
      프로그램이 도입된다. 수륙양용버스가 육지와 바다를 넘나들고 수영강에는 레이저 분수쇼가 펼쳐진다. 지난해 국제관광도시로 선정된 부산이 올해부터 외국인 관광객 1000만 명을 유치하고 세계 10대 관광도시로 진입하기
      위해 구체적인 사업들을 본격 추진한다. 부산시는 21일 해운대구 벡스코에서 열리는 ‘국제관광도시 온라인 시민보고회’에서 ‘국제관광도시 육성사업 기본계획 최종 용역 결과’를 발표한다. 국제관광도시 육성사업 기본계획은
      핵심 관광 콘텐츠인 ‘시그니처’ 사업 등 74개 세부 사업을 담고 있다. 시그니처 사업은 ‘7 세븐브릿지 랜드마크 프로젝트’ ‘24 열린 바다 프로젝트’ ‘365 영화 이벤트 도시 프로젝트’이다. 7 세븐브릿지
      랜드마크 프로젝트는 125억 원을 투입해 광안대교, 부산항대교, 남항대교, 영도다리, 을숙도대교, 신호대교, 가락대교 다리 7곳을 랜드마크형 관광 상품으로 조성한다. 7개 교량은 각기 다른 건축 양식과 수려한
      해안경관을 갖추고 있어 관광 자원으로서 활용 가치가 높다는 것이다. 교량별로 스토리텔링을 각각 개발하고 외벽에는 다양한 영상을 투사하는 ‘미디어파사드’를 적용한다. 번지점프대, 보행로 그리고 와이어 위를 걷는
      클라이밍 등 다양한 체험 프로그램도 운영된다. 또 시티투어버스, 관광유람선 등과 연계한 상품도 개발된다. 24 열린 바다 프로젝트는 79억 원으로 해상 관광을 활성화하는 데 초점을 맞춘다. 달빛수영대회, 서핑,
      국제 레크리에이션 피싱 대회, 자작보트 페스티벌 등 사계절 운영 가능한 ‘해양레저스포츠시티’를 조성한다. 수륙양용버스, 수상택시 그리고 깡깡이마을 도선도 운행한다. 수영강에는 레이저 분수대가 설치된다. 리버덕
      등 공공 예술 작품도 바다 위에 전시된다. 또 365 영화 이벤트 도시 프로젝트는 85억 2000만 원 예산으로 ‘영화와 축제의 도시’ 부산을 주제로 부산 대표 축제와 영화 산업을 지원하고 영화·드라마 촬영지
      투어, 부산국제영화제 시상식 갈라쇼 상품화 등 다양한 프로그램을 개발한다. 여기다 산복도로, 을숙도, 골목길 등 부산의 지역적 특성을 녹여 낸 개성 있는 관광 상품도 선보인다. 골목길 투어, 산복도로 예술 계단
      조성, 부산 달빛 플리마켓, 부산 부평 ‘스트릿’ 푸드 페스티벌, 시장 워킹투어, 동양 최대 철새도래지 탐사 프로그램, 습지에서 즐기는 이색 체험 등이 대표적이다. 여기다 모노레일, ‘집라인’, 케이블카, 트램
      등 체험 관광 인프라를 확충한다. 이 외에도 외국인 관광객들이 최적화된 여행을 즐길 수 있도록 부산 주요 관광지에 스마트 환경이 구축된다. ‘스테이션형 스마트모빌리티’가 대표적이다. 이 곳에서 여행자들은 공유
      킥보드나 전기 자전거를 빌리거나 충전할 수 있으며 주변 여행지 경로까지 탐색할 수 있다. 변성완 부산시장 권한대행은 “가덕신공항 건설, 2030부산월드엑스포 유치 등 호재를 기회로 삼아 부산을 명품 체류형 관광
      중심지로 육성하겠다”고 말했다.
