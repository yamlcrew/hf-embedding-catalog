  - source_sentence: 영상통화로 내연녀와 말다툼하던 40대 남성이 분을 이기지 못하고 내연녀 집에 불을 질렀다가 현행범으로 체포된 건 누구지?
    sentences:
    - 정신이상 증세 가능성 서울 영등포경찰서는 지난달 여의도순복음교회에 불을 지른 혐의(현존건조물방화)로 A씨(28)를 구속했다고 2일 밝혔다. A씨는 지난달 25일 오후 7시 40분께 교회 5층 계단 복도에 불을
      낸 혐의를 받고 있다. 당시 화재로 교회 건물에 있던 450여명이 긴급 대피하기도 했다. 경찰은 주변 폐쇄회로(CC)TV 영상을 분석해 A씨가 화재 장소를 서둘러 나온 지 3분 만에 연기가 나고 2시간 전에도
      화재 장소를 다녀간 점 등을 확인, 지난달 27일 그를 체포했다. 경찰 조사에서 A씨는 예배를 보러 갔다가 내부 지리를 몰라 5층에 올라갔을 뿐 불을 지르지 않았다고 범행을 부인했다. 하지만 A씨는 지난 2013년
      이 교회에 신자로 등록하고 다닌 사실이 있어 경찰은 A씨 진술이 거짓인 것으로 판단했다. 경찰 관계자는 A씨가 수년 전부터 정신이상 증세를 보였다는 부친의 진술이 있고 체포된 뒤에도 줄곧 영어로만 말을 하는
      등 이상행동을 보여 정신이상 증세에 의해 범행을 벌였을 가능성이 있다고 전했다.
    - 질병관리본부는 25일 “지난해 12월 초 감비아와 세네갈 기니비사우 등 아프리카 지역을 여행한 감비아 거주 교민 1명(52세 남성)이 인수공통감염병인 리프트밸리열에 걸려 목숨을 잃었다”며 여행 시 주의를 당부했다.
      리프트밸리열 바이러스에 감염된 모기에 물리거나 감염된 동물(소 염소 양 낙타 영양 등)의 혈액, 조직에 접촉해 옮는다. 대부분 아프리카 국가와 아라비아반도에서 풍토병으로 발생하고 있다. 사람 간 전파 사례는
      보고되지 않았다. 2∼6일 잠복한 뒤 감기처럼 열과 근육통 관절통 두통 증상을 보인다. 8∼10% 환자에서 뇌염 출혈 등 중증으로 악화하며 출혈이 생기면 3∼6일 안에 사망한다. 바이러스 치료제나 예방백신은
      아직 개발돼 있지 않다. 질병관리본부 관계자는 “해당 지역 여행 시 감염된 동물의 혈액이나 체액, 사체 접촉을 피하고 모기 기피제를 써 물리지 않도록 해야 한다”고 말했다. 또 “살균되지 않은 동물의 젖이나
      감염 동물의 고기를 먹어선 안 된다”고 강조했다.
    - '{IMG:1}영상통화로 내연녀와 말다툼하던 40대 남성이 분을 이기지 못하고 내연녀 집에 불을 질렀다가 현행범으로 체포됐다. 부산 사하경찰서는 내연녀 집에 불을 지른 혐의(방화)로 회사원 A(43)씨를 붙잡아
      조사하고 있다고 19일 밝혔다. 경찰에 따르면, A씨는 19일 오전 0시 10분쯤 부산 사하구 모 아파트에 있는 내년여 B(40·여)씨의 집에서 소파와 침대 등에 일회용 라이터로 불을 놓아 700만원 상당의
      재산피해를 낸 혐의를 받고 있다. 당시 영상통화로 불을 붙이는 장면을 본 B씨가 곧바로 112에 신고해, 출동한 경찰이 현장에서 A씨를 붙잡았다. 경찰 조사결과 A씨는 내연녀의 집에서 밖에 있던 B씨와 영상통화를
      하던 중 또다른 남자문제로 말다툼을 벌이다 홧김에 라이터로 불을 붙인 것으로 드러났다. 경찰은 A씨에 대한 구속영장을 신청할 예정이다.'
