- source_sentence: 부산대교의 주요 조망점에 설치한 것은 뭐야?
  sentences:
  - 현대모비스는 주요 연구소 및 생산공장에 초등학생을 초청해 현장 견학과 과학 이벤트 참여 기회를 제공하고 있다고 16일 밝혔다. 이 행사는 사회공헌활동의 일환으로 추진하고 있는 과학꿈나무 육성 프로그램인 주니어 공학교실
    참가 학생들을 대상으로 진행된다. 전국 12개 초등학교 400여명의 초등학생들과 선생님이 전국의 주요 사업장에 초청됐다. 주니어 공학교실은 기초적인 과학 원리가 실제 기술로 구현되는지 실습을 통해 확인해 볼 수
    있는 초등학생 대상 교육프로그램이다. 현대모비스 연구원들이 강사로 참여해 매달 전국 사업장 인근의 초등학교를 방문, 별도 제작한 교보재를 이용해 관련 기술이 적용된 미래자동차 모형을 직접 제작하는 형태로 운영되고
    있다.
  - 부산의 원도심인 중구와 영도구를 잇는 부산대교 야경이 다양한 빛과 음악 연출로 재탄생했다. 부산시는 부산 원도심 현대화의 상징 교량인 부산대교에 최근 친환경 LED 경관조명을 아치에 554개, 아치바.내부.트러스하부
    등에 774개를 설치하고 본격 운영을 시작했다고 7일 밝혔다. 또 조명 연출과 음악 연동이 가능한 조명제어기를 설치해 시간대별, 계절별, 주말.공휴일 등 각종 행사 개최 시 각기 다른 이미지를 연출할 수 있게 됐다.
    부산대교 경관조명은 2000년부터 설치.운영돼 왔으나, 메탈과 나트륨 투광조명으로 연출이 불가능하고 시설 노후화로 인한 고장이 잦아 운영에 어려움이 있었다. 이에 부산시는 이번 새로운 경관조명 운영을 위해 설계용역,
    주민설명회 개최, 경관자문과 시 경관위원회 심의 등을 거쳐 지난해 8월 착공했다. 부산시 관계자는 부산대교의 주요 조망점인 영도구 웰컴센터와 중구 롯데백화점 주변 수변 산책로에는 스피커를 설치해 매시간별 음악과
    연동되는 경관조명 연출로 생동감 있는 경관조명을 감상할 수 있는 공간을 마련했다며 앞으로 부산의 새로운 관광명소로 거듭나 원도심에 활력을 불어넣는 계기가 될 것으로 기대한다고 말했다.
  - ‘국제관광도시’ 부산의 해안을 잇는 다리 7곳에 각각 ‘미디어파사드’(LED 조명을 비춰 영상을 표현하는 기법)가 적용돼 빛의 향연이 펼쳐진다. 또 광안대교에는 와이어(주케이블)를 걷는 클라이밍과 번지점프 관광
    프로그램이 도입된다. 수륙양용버스가 육지와 바다를 넘나들고 수영강에는 레이저 분수쇼가 펼쳐진다. 지난해 국제관광도시로 선정된 부산이 올해부터 외국인 관광객 1000만 명을 유치하고 세계 10대 관광도시로 진입하기
    위해 구체적인 사업들을 본격 추진한다. 부산시는 21일 해운대구 벡스코에서 열리는 ‘국제관광도시 온라인 시민보고회’에서 ‘국제관광도시 육성사업 기본계획 최종 용역 결과’를 발표한다. 국제관광도시 육성사업 기본계획은
    핵심 관광 콘텐츠인 ‘시그니처’ 사업 등 74개 세부 사업을 담고 있다. 시그니처 사업은 ‘7 세븐브릿지 랜드마크 프로젝트’ ‘24 열린 바다 프로젝트’ ‘365 영화 이벤트 도시 프로젝트’이다. 7 세븐브릿지
    랜드마크 프로젝트는 125억 원을 투입해 광안대교, 부산항대교, 남항대교, 영도다리, 을숙도대교, 신호대교, 가락대교 다리 7곳을 랜드마크형 관광 상품으로 조성한다. 7개 교량은 각기 다른 건축 양식과 수려한 해안경관을
    갖추고 있어 관광 자원으로서 활용 가치가 높다는 것이다. 교량별로 스토리텔링을 각각 개발하고 외벽에는 다양한 영상을 투사하는 ‘미디어파사드’를 적용한다. 번지점프대, 보행로 그리고 와이어 위를 걷는 클라이밍 등
    다양한 체험 프로그램도 운영된다. 또 시티투어버스, 관광유람선 등과 연계한 상품도 개발된다. 24 열린 바다 프로젝트는 79억 원으로 해상 관광을 활성화하는 데 초점을 맞춘다. 달빛수영대회, 서핑, 국제 레크리에이션
    피싱 대회, 자작보트 페스티벌 등 사계절 운영 가능한 ‘해양레저스포츠시티’를 조성한다. 수륙양용버스, 수상택시 그리고 깡깡이마을 도선도 운행한다. 수영강에는 레이저 분수대가 설치된다. 리버덕 등 공공 예술 작품도
    바다 위에 전시된다. 또 365 영화 이벤트 도시 프로젝트는 85억 2000만 원 예산으로 ‘영화와 축제의 도시’ 부산을 주제로 부산 대표 축제와 영화 산업을 지원하고 영화·드라마 촬영지 투어, 부산국제영화제 시상식
    갈라쇼 상품화 등 다양한 프로그램을 개발한다. 여기다 산복도로, 을숙도, 골목길 등 부산의 지역적 특성을 녹여 낸 개성 있는 관광 상품도 선보인다. 골목길 투어, 산복도로 예술 계단 조성, 부산 달빛 플리마켓,
    부산 부평 ‘스트릿’ 푸드 페스티벌, 시장 워킹투어, 동양 최대 철새도래지 탐사 프로그램, 습지에서 즐기는 이색 체험 등이 대표적이다. 여기다 모노레일, ‘집라인’, 케이블카, 트램 등 체험 관광 인프라를 확충한다.
    이 외에도 외국인 관광객들이 최적화된 여행을 즐길 수 있도록 부산 주요 관광지에 스마트 환경이 구축된다. ‘스테이션형 스마트모빌리티’가 대표적이다. 이 곳에서 여행자들은 공유 킥보드나 전기 자전거를 빌리거나 충전할
    수 있으며 주변 여행지 경로까지 탐색할 수 있다. 변성완 부산시장 권한대행은 “가덕신공항 건설, 2030부산월드엑스포 유치 등 호재를 기회로 삼아 부산을 명품 체류형 관광 중심지로 육성하겠다”고 말했다.
- source_sentence: 만나교회는 언제부터 '담장을 넘는 토요 예배'를 시작했는가?
  sentences:
  - ‘우리는 흩어지기 위해 모입니다.’ 경기도 성남 분당구의 만나교회(김병삼 목사)가 4월부터 ‘담장을 넘는 토요예배’를 시작하면서 내건 표어다. 토요예배는 교인들을 지역 사회와 봉사 현장으로 적극 파송하고 기존 공간
    활용도를 높이자는 취지에서 시작했다. 교회가 부흥하는 경우에도 새 건물을 짓기보다는 기존 자원을 활용해 예배와 사역에 최대한 집중해 성장주의 패러다임을 탈피하자는 것이다. ‘주일 예배’에 익숙한 기존 목회자들과
    성도들로서는 파격으로 비칠 수밖에 없다. 7일 오후 만나교회의 첫 토요예배에 참석했다. 김병삼 목사는 “토요예배는 흩어짐을 위한 충전소”라고 강조했다. 주일에 교회 봉사, 지역사회 사역 등에 적극 참여하는 신자들은
    토요예배에 참석해 매번 파송식을 갖는다. 토요일에는 평소보다 길게 진행되는 예배에 참석해 힘을 얻고, 주일에는 봉사와 사역에 온전히 집중하기 위해서다. 만나교회는 기독교대한감리회(기감)에 소속돼 있는 건전한 교회다.
    일부 이단 교파처럼 토요일을 안식일로 지키자고 주장하는 것이 아니다. 토요일만이 참된 안식일이라고 강조하는 제칠일안식일예수재림교회는 대한예수교장로회(예장) 합동 통합 고신과 기감 등으로부터 이단 판정을 받은 바
    있다. 오후 5시 시작된 예배의 총 소요 시간은 1시간30분. 평소 주일예배(약 50분)보다 여유롭게 진행됐다. 성도들은 약 40분에 걸친 설교시간을 제외한 나머지를 대부분 찬양과 기도에 집중했다. 일부는 예배가
    끝난 뒤에도 후속 예배가 없어 계속 자리에 남아 개인 기도 시간을 가졌다. 주일예배 때는 좀처럼 보기 힘든 장면이다. 김 목사는 “주일마다 교회봉사와 지역사회 사역에 나서는 신자들이 사실 예배에 봉사까지 겹치면
    지치는 경우가 많다”며 “충분한 시간을 갖고 진행되는 토요예배에서 하나님의 은혜로 충분히 충전 받은 다음 헌신의 자리로 나아가자는 뜻을 모았다”고 취지를 설명했다. 첫 토요예배에 참석한 성도는 1050여명으로 전체
    교인(1만여명)의 10분의 1 수준이었다. 주일마다 반복되는 주차대란 같은 모습은 볼 수 없었다. 향후 예배 인원이 분산되면 일요일에도 혼잡 사태가 줄어들 것으로 예상된다. 70개에 달하는 교회 내 소그룹 모임
    공간 활용도도 높아져 성도 간 교제도 더 원활해질 전망이다. 그동안에는 소그룹 모임 공간 한 곳당 10명씩 써도 700명밖에 쓸 수가 없었다. 예배에 참석한 박주호(51) 집사는 토요예배에 참석한 다음 일요일에는
    교회 미디어사역, 경기도 광주 외국인노동자 사역에 나설 예정이다. 그는 “직장인이라 토요일에 쉬기 때문에 처음에는 부담스러웠다”면서도 “한국교회가 기존의 교인 수 증가, 건축 위주의 성장주의 프레임을 깨고 세상에
    나가서 섬겨야 진정한 성장을 이루는 것이라는 취지에 공감해 예배에 참석했다”고 말했다.
  - 코로나19 시대 비대면 목회의 방향으로 김병삼 만나교회 목사는 오프라인을 기반으로 한 온라인 사역인 ‘올라인(all-line) 사역’을 강조했다. 김 목사는 지난 9일 서울 강남구 강변교회에서 ‘비대면 시대의 목회와
    예배’라는 주제로 열린 한국복음주의협의회 주최 4월 월례 발표회에서 “이전과는 전혀 다른 목회적 환경 속에서 온라인이냐 오프라인이냐를 주장하는 건 무의미하다”며 이같이 말했다. 그는 교회의 온·오프라인 사역을 기독교인들의
    교회생활과 가정생활에 빗대며 “오프라인을 기반으로 하지 않는 온라인은 허상에 불과하다”며 “사회적 상황이나 교회의 상황에 따라, 사역의 특성이나 성도의 생활 패턴 등에 따라 끊임없이 균형추를 움직여야 한다”고 강조했다.
    김 목사가 담임으로 있는 만나교회는 코로나19 이전인 2018년부터 ‘미디어 교회’를 만들어 올라인 사역을 감당하고 있다. 단순히 온라인 예배를 넘어서 중보기도 목양 교육 훈련 선교 나눔 구제 등 교회가 하고 있었던
    모든 사역에 온라인 목회를 적용하고 있다. 김 목사는 이를 “복음을 교회 안 담장에 가두지 않고, 교회 밖으로 넘어가게 하는 영적 운동의 시작이었다”고 말했다. 그러면서 올라인 사역이 가능했던 이유로 만나교회가
    갖고 있는 교회론을 꼽았다. 김 목사는 “교회 중심이 아닌 선교 중심적인 교회를 추구하다 보니 자연스럽게 건물에 한정된 교회를 넘어서게 됐다. 이전에는 건물이 중심이 된 만나교회를 기반으로 선교했다면, 이제 그
    구분이 사라졌다”며 “‘교회는 건물이 아니다’는 교회론이 없었다면 쉽게 시도하지 못했을 사역”이라고 전했다. 김 목사는 비대면 시대 한국교회의 과제는 ‘교회의 건물이나 제도를 어떻게 지킬까’가 아니라 ‘교회의 본질적
    기능인 복음전도를 어떻게 수행할 것인가’라고 정리했다. 그런 면에서 온라인 예배는 가장 효율적인 선교 매체라고 말했다. 김 목사는 “예배뿐 아니라 랜선 성지순례, 성서학당, 미디어 가정사역 등 비대면 사회를 사는
    성도들을 위한 다양한 양육·훈련 콘텐츠도 준비하고 있다”고 소개했다. 앞서 ‘나는 스마트한 제사장입니다’라는 제목으로 발표한 주석현 평택성결교회 목사 역시 “목회는 전달이 생명”이라며 “온라인 미디어를 적극 활용해야
    한다”고 강조했다. 주 목사는 “현재 한국교회는 ‘성전 종교’에서 ‘디지털 유목시대’로 진입했다”며 “코로나19 팬데믹처럼 단절된 상황에서 온라인 미디어 사용은 필수”라고 말했다. 주 목사는 “코로나19 시대 목회자들은
    스마트한 제사장이 돼야 한다. 성도들이 함께 참여할 수 있는 콘텐츠를 개발해야 한다”며 “성경적 연결점을 제시하면서도 마음이 담긴 영상을 제작해야 한다”고 조언했다.
  - 중소기업계가 '의제매입세액공제제도' 개선을 촉구했다. 원재료 가격이 높아지는데도 제조업체 공제율은 10년간 똑같아 불합리하다는 주장이다. 식품·목재·재활용 제조업 분야 30여개 중소기업협동조합은 26일 서울 여의도
    중소기업중앙회 회의실에서 간담회를 열고 의제매입세액공제율을 높여 줄 것으로 요구했다. 의제매입세액공제는 농산물·수산물·축산물·임산물을 가공해 판매하는 사업자가 제조 과정에서 부가가치세 면세물품을 사들이는 경우 구입액에
    세금이 포함된 것으로 간주해 일정비율을 돌려주는 제도다. 현행 공제율은 개인 음식점 7.41%, 법인 음식점 5.67% 등으로 규정돼 있으나 그 밖의 제조업체에는 모두 1.96%가 적용되고 있다. 조합들은 "원재료
    비용은 날로 증가하고 있는데 공제율은 2001년 이후 10여년간 제자리걸음"이라며 "중소기업 경영안정과 물가상승 억제를 위해 공제율을 높여야 한다"고 촉구했다. 특히 식품제조업체들은 음식점과 같은 원재료를 사용함에도
    공제율에서는 차별을 당하고 있다고 주장했다. 이들은 "원재료 가격이 너무 높아 업체들의 고통이 가중되고 있다"며 "최소한 중소기업에 한해서라도 음식점과 같은 공제율인 7.41%를 적용해야 한다"고 강조했다. 한국목재공업협동조합은
    "실제 투입하는 면세제품 부가가치세는 구입액의 4.76%에 이르는 상황으로 지금 공제받는 비율인 1.96%는 이에 한참 못 미친다"며 "공제율 상향조정이 절실한 상황"이라고 목소리를 높였다. 한국제지원료재생업협동조합
    역시 "공제율을 제정 취지에 맞게 확대해야 한다. 내년 말로 예정된 일몰 시한도 폐지해야 한다"고 촉구했다. 중소기업들은 "현행 의제매입세액공제가 적용 대상 사업자를 음식업자와 그 외의 사업자로 구분하여 공제율을
    달리 적용하고 있어 상대적으로 영세한 식품업이 제도의 차별을 받아왔다"면서 "어려운 경제상황과 중소제조업의 경영난을 감안할 때 공제율 조정이 시급하다"고 밝혔다.
- source_sentence: 최근 한달간 크레아 플래닛의 주식거래에서 외국인과 기관은 어떤 매매를 보였어?
  sentences:
  - 크레아플래닛(058530)은 현재 주가가 전일 대비 13.08% 상승한 1,210원 선에서 거래가 이루어지고 있다. 매매주체는개인,외국인 최근 한달간 주체별 거래비중을 살펴보면 개인이 89.62%, 외국인이 10.36%를
    기록한 것으로 나타났다. 그리고 최근 5일간 거래비중은 개인 비중이 87.53%로 가장 높았고, 외국인이 12.46%로 그 뒤를 이었다. 기관은 거래에 참여하지 않은 것으로 보인다. 외국인/기관 순매수, 개인은
    순매도(한달누적) 3월23일부터 전일까지 기관과 외국인은 2거래일 연속 동반 순매수를 보였다. 4주간을 기준으로 보면 외국인이 순매수량을 늘리며 515,582주를 순매수했고, 기관도 초반에 동종목을 순매수한 이후에
    기세를 이어가며 2,355주를 순매수했다. 반면 개인들은 매도 관점으로 접근하면서 517,937주를 순매도한 것으로 나타났다. fnRASSI는 증권전문 기업 씽크풀과 파이낸셜뉴스의 협업으로 로봇기자가 실시간으로
    생산하는 기사입니다.
  - 현대기아자동차가 올해 국내외 시장 위축에도 사상 최대 실적을 기록했다. 현대차와 기아차 모두 상반기 영업이익이 지난해보다 20% 이상 증가하는 등 규모 외에 실익에서도 좋은 성적을 거뒀다. 현대차는 올 상반기 매출액
    42조1051억원, 영업이익 4조7849억원, 당기순이익 4조9982억원을 기록했다고 26일 밝혔다. 현대차는 지난해 상반기보다 매출은 9.9%, 영업이익은 21.0% 증가했다. 당기순이익 역시 19.5%나 늘었다.
    해외에서는 국내 생산 수출분 66만3637대, 해외생산 판매분 119만1168대를 더해 모두 185만4805대를 팔아 지난해 상반기보다 14.9%나 상승했다. 이에 따라 글로벌 판매에서 내수 비중이 사상 처음으로
    15%대로 내려갔다. 매출원가율은 플랫폼 통합 등의 효과로 지난해보다 0.3%포인트 감소한 76.1%를 기록했다. 또 기아차는 상반기 매출액 24조3409억원, 영업이익 2조3397억원,당기순이익 2조2977억원
    등을 기록했다고 27일 밝혔다. 지난해 같은 기간과 비교해 매출액은 9.5%, 영업이익은 25.0% 늘었고, 당기순이익은 10.4% 증가했다. 모닝과 프라이드, K5 등 주요 차종이 전 세계 시장에서 판매호조를
    보이며 판매량 역시 12.4% 증가했다. 기아차가 올 상반기 판매한 차량은 해외공장 생산분을 포함해 139만대에 달했다. 기아차는 해외시장에서 '제값 받기' 노력 등 내실경영이 실적 호조로 이어졌다고 평가했다.
    하지만 이들 업체들은 하반기에는 상당한 어려움을 겪을 것으로 전망했다. 유럽은 재정위기로 인해 폐차지원제도 등 수요진작 정책을 내놓지 못하고 있다. 여기에 인도와 브라질의 경기침체 우려까지 제기되고 있기 때문이다.
    현대차 관계자는 "국내는 물론 해외서도 경제불확실로 인해 판매가 위축될 수 있다"며 "특히 글로벌 자동차 업체들의 공세가 강화돼 치열한 경쟁을 벌일 것으로 예상된다"고 말했다.
  - 크라운해태홀딩스(005745)는 현재 주가가 전일 대비 12.21% 상승한 19,300원 선에서 거래가 이루어지고 있다. 외국인은 순매수, 개인은 순매도(한달누적) 5월15일부터 전일까지 외국인이 4거래일 연속
    순매수를 보였다. 4주간을 기준으로 보면 외국인이 5,266주를 순매수했지만, 개인은 순매도로 돌아서면서 5,266주를 순매도했다. 기관의 순매수량에는 변함이 없다. 외국인은 순매수, 개인은 순매도(한달누적) 5월15일부터
    전일까지 외국인이 4거래일 연속 순매수를 보였다. 4주간을 기준으로 보면 외국인이 매수반전의 모습을 보이며 5,266주를 순매수했지만, 개인은 순매수에서 순매도로 반전되면서 5,266주를 순매도했다. 기관의 순매수량에는
    변함이 없다. 주가등락폭 크고, 상장주식수 대비 거래량도 상당히 높아 최근 한달간 크라운해태홀의 매매회전율을 분석한 결과 4일에 1번 꼴로 주식의 주인이 바뀐 것으로 나타났다. 이는 비정상적으로 높은 회전율을 보인
    것으로 투자에 각별한 주의가 요망된다. 또한 평균적으로 장중 주가변동률이 13.97%에 달할 정도로 등락이 심하기 때문에 다시한번 주의가 필요하다. 비중소제목 비중멘트투자주체별 누적순매수 , 투자주체별 매매비중＊기관과
    외국인을 제외한 개인 및 기타법인 등의 주체는 모두 개인으로 간주하였음 fnRASSI는 증권전문 기업 씽크풀과 파이낸셜뉴스의 협업으로 로봇기자가 실시간으로 생산하는 기사입니다.
- source_sentence: '넥슨의 ''야생의 땅: 듀랑고'' 사전예약이 얼마를 돌파했나?'
  sentences:
  - 성가(聖歌)는 거룩한 노래라는 의미로 세속적인 노래와 구분하기 위해 쓰여 왔다. 예배 중에 특별한 순서로 화음을 맞춰 찬양하는 합창단을 성가대라고 부르고 있다. 하지만 성가와 성가대라는 말은 성경적인 의미와 한국기독교
    전통과는 거리가 멀다. 성경에는 찬송이라는 단어가 208번, 노래 176번, 찬양 83번, 찬미 13번 등장하지만, ‘성가’는 한 번도 등장하지 않는다. 초기 한국기독교는 성가라는 말이 아닌 찬양이라는 말을 썼다.
    1892년 존스(G H Jones)와 로드와일러(L C Rothweiler) 선교사는 당시 성도들에게 많이 불리던 찬양을 모아 최초로 ‘찬미가’라는 찬양곡집을 출판했다. 이후 찬양곡을 모은 책들이 1893년 ‘찬양가’,
    1895년 ‘찬셩시’라는 이름으로 출간됐다. 특히 1893년 언더우드는 최초로 4성부의 악보를 수록해 ‘찬양가’를 출판했다. 성가대 역시 초기 한국교회에선 사용되지 않던 단어다. 1913년 평양 장대현교회는 한국교회
    최초로 ‘찬양대’를 조직했다. 이듬해 새문안교회에 찬양대가 구성됐고 이름을 ‘찬미대’라고 했다. 대부분 학자들은 일본의 영향으로 교회에서 ‘성가’ ‘성가대’라는 말을 쓰게 됐다고 언급한다. 1960년대 한·일 국교
    정상화가 본격화된 이후 어떤 경로로, 누구에 의해서인지 단정할 순 없으나, ‘세이카다이(聖歌隊)’라는 말이 그대로 한국교회에 유입돼 성가대라는 말로 통용됐다는 것이다. 세속적인 노래와 구분을 짓는 성가는 하나님께
    드리는 찬양의 의미를 충분히 담을 수 없다. 찬양은 예수님의 성육신 사건과 십자가의 은혜, 부활과 재림의 구속사적 사건, 하나님께 드리는 영광과 존귀를 한 곡에 담은 것이다. 성가대라는 말은 여러 사람이 하모니를
    맞춰 신앙의 고백과 하나님께 영광을 드리는 찬양대의 의미를 충분히 반영하지 못한다. 일본의 영향을 받은 성가대보다는 한국교회 전통을 계승하고 성경적인 의미의 찬양을 그대로 포함하고 있는 찬양대라는 말로 부르는 것이
    필요하다.
  - '넥슨은 ‘야생의 땅: 듀랑고(이하 듀랑고)’의 사전예약이 200만 건을 돌파했다고 16일 밝혔다. 듀랑고는 넥슨 자회사 왓스튜디오에서 개발하고 넥슨이 서비스하는 공룡 시대를 배경으로 한 다중접속역할수행(MMORPG)
    게임으로 오는 25일 정식 출시된다. 지난달 19일부터 시작한 사전예약을 통해 하루 만에 30만 명이 몰리며 높은 기대감을 보였고, 28일 만인 지난 15일 기준으로 200만 명을 돌파했다. 넥슨은 사전예약 200만
    달성을 기념해 참여자 전원에게 특별 보상으로 ‘줄무늬 콤프소그나투스’를 지급한다. ‘줄무늬 콤프소그나투스’는 야생에서 포획이 불가능한 희귀 공룡펫으로, 귀여운 외형으로 많은 사랑을 받고 있는 듀랑고의 메인 마스코트다.
    보다 자세한 내용은 공식 홈페이지 및 페이스북 팬페이지에서 확인할 수 있다.'
