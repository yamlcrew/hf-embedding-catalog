    - 중소기업계가 '의제매입세액공제제도' 개선을 촉구했다. 원재료 가격이 높아지는데도 제조업체 공제율은 10년간 똑같아 불합리하다는 주장이다. 식품·목재·재활용 제조업 분야 30여개 중소기업협동조합은 26일 서울
