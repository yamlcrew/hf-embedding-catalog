      5월15일부터 전일까지 외국인이 4거래일 연속 순매수를 보였다. 4주간을 기준으로 보면 외국인이 매수반전의 모습을 보이며 5,266주를 순매수했지만, 개인은 순매수에서 순매도로 반전되면서 5,266주를 순매도했다.
      기관의 순매수량에는 변함이 없다. 주가등락폭 크고, 상장주식수 대비 거래량도 상당히 높아 최근 한달간 크라운해태홀의 매매회전율을 분석한 결과 4일에 1번 꼴로 주식의 주인이 바뀐 것으로 나타났다. 이는 비정상적으로
      높은 회전율을 보인 것으로 투자에 각별한 주의가 요망된다. 또한 평균적으로 장중 주가변동률이 13.97%에 달할 정도로 등락이 심하기 때문에 다시한번 주의가 필요하다. 비중소제목 비중멘트투자주체별 누적순매수
