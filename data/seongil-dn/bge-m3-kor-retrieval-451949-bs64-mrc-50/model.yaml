  - source_sentence: '넥슨의 ''야생의 땅: 듀랑고'' 사전예약이 얼마를 돌파했나?'
    sentences:
    - 성가(聖歌)는 거룩한 노래라는 의미로 세속적인 노래와 구분하기 위해 쓰여 왔다. 예배 중에 특별한 순서로 화음을 맞춰 찬양하는 합창단을 성가대라고 부르고 있다. 하지만 성가와 성가대라는 말은 성경적인 의미와
      한국기독교 전통과는 거리가 멀다. 성경에는 찬송이라는 단어가 208번, 노래 176번, 찬양 83번, 찬미 13번 등장하지만, ‘성가’는 한 번도 등장하지 않는다. 초기 한국기독교는 성가라는 말이 아닌 찬양이라는
      말을 썼다. 1892년 존스(G H Jones)와 로드와일러(L C Rothweiler) 선교사는 당시 성도들에게 많이 불리던 찬양을 모아 최초로 ‘찬미가’라는 찬양곡집을 출판했다. 이후 찬양곡을 모은 책들이
      1893년 ‘찬양가’, 1895년 ‘찬셩시’라는 이름으로 출간됐다. 특히 1893년 언더우드는 최초로 4성부의 악보를 수록해 ‘찬양가’를 출판했다. 성가대 역시 초기 한국교회에선 사용되지 않던 단어다. 1913년
      평양 장대현교회는 한국교회 최초로 ‘찬양대’를 조직했다. 이듬해 새문안교회에 찬양대가 구성됐고 이름을 ‘찬미대’라고 했다. 대부분 학자들은 일본의 영향으로 교회에서 ‘성가’ ‘성가대’라는 말을 쓰게 됐다고 언급한다.
      1960년대 한·일 국교 정상화가 본격화된 이후 어떤 경로로, 누구에 의해서인지 단정할 순 없으나, ‘세이카다이(聖歌隊)’라는 말이 그대로 한국교회에 유입돼 성가대라는 말로 통용됐다는 것이다. 세속적인 노래와
      구분을 짓는 성가는 하나님께 드리는 찬양의 의미를 충분히 담을 수 없다. 찬양은 예수님의 성육신 사건과 십자가의 은혜, 부활과 재림의 구속사적 사건, 하나님께 드리는 영광과 존귀를 한 곡에 담은 것이다. 성가대라는
      말은 여러 사람이 하모니를 맞춰 신앙의 고백과 하나님께 영광을 드리는 찬양대의 의미를 충분히 반영하지 못한다. 일본의 영향을 받은 성가대보다는 한국교회 전통을 계승하고 성경적인 의미의 찬양을 그대로 포함하고
      있는 찬양대라는 말로 부르는 것이 필요하다.
    - '넥슨은 ‘야생의 땅: 듀랑고(이하 듀랑고)’의 사전예약이 200만 건을 돌파했다고 16일 밝혔다. 듀랑고는 넥슨 자회사 왓스튜디오에서 개발하고 넥슨이 서비스하는 공룡 시대를 배경으로 한 다중접속역할수행(MMORPG)
      게임으로 오는 25일 정식 출시된다. 지난달 19일부터 시작한 사전예약을 통해 하루 만에 30만 명이 몰리며 높은 기대감을 보였고, 28일 만인 지난 15일 기준으로 200만 명을 돌파했다. 넥슨은 사전예약
      200만 달성을 기념해 참여자 전원에게 특별 보상으로 ‘줄무늬 콤프소그나투스’를 지급한다. ‘줄무늬 콤프소그나투스’는 야생에서 포획이 불가능한 희귀 공룡펫으로, 귀여운 외형으로 많은 사랑을 받고 있는 듀랑고의
      메인 마스코트다. 보다 자세한 내용은 공식 홈페이지 및 페이스북 팬페이지에서 확인할 수 있다.'
