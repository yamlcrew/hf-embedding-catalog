      같은 원재료를 사용함에도 공제율에서는 차별을 당하고 있다고 주장했다. 이들은 "원재료 가격이 너무 높아 업체들의 고통이 가중되고 있다"며 "최소한 중소기업에 한해서라도 음식점과 같은 공제율인 7.41%를 적용해야
