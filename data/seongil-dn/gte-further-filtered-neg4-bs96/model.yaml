  widget:
  - source_sentence: '''백발 급구''의 주인공 구신의 직업은 무엇인가요?'
    sentences:
    - 그레고리아 데 헤수스(Gregoria de Jesús, 1875년 5월 9일 - 1943년 3월 15일)는 필리핀의 독립운동가이자 카티푸난의 여성 지도자였다. 필리핀 임시 혁명정부의 제1대 부통령이자 첫 번째
      퍼스트 레이디였다.
    - ＜백발 급구＞는 모스크바와 페테르부르크의 건축물들에 대한 작가의 폭넓은 이해를 엿볼 수 있는 작품이다. 건축물 사진첩들을 뒤적이며 소일하는 것을 위로 삼아 부정한 아내와의 원만치 못한 결혼 생활을 견뎌가고 있는
      주인공 구신은 페테르부르크 출장 중에 렌필름 영화사 앞에서 이류 배우 나타샤와 만나게 된다. 사출 전문가라는 특이한 직업과는 어울리지 않게 페테르부르크의 유명 건축물들을 건설한 예술가들에 대한 이해와 삶의 깊이를
      가진 구신의 매력에 빠져든 나타샤는 구신과 보낸 이틀을 잊지 못하게 된다. 모스크바로 돌아온 구신도 나타샤와의 사랑을 통해 삶의 의미를 다시 찾게 되고 모스크바의 생활을 정리하고 페테르부르크의 나타샤에게로 되돌아가게
      되면서 작품은 끝을 맺는다.
    - '1991년 의족을 하고 눈을 가린 초인은 절대 붕대를 풀어서는 안된다고 어머니는 말한다. 그때 어머니가 아버지에게 가정폭력을 당하자 붕대를 풀고 아버지를 살해한다.

      결국 모자는 동반자살을 위해 초인의 목을 조르려고 하자 초인은 붕대를 벗고 달아난다.19년후인 2010년 자동차 폐기장에서 일하는 임규남(고수 분)은 교통 사고로 인해 병원에 입원하게 되고, 그 때문에 일하던
      곳에서 해직당한다. 그 이후 일자리를 알아보던 규남은 전당포 일을 맡게 된다. 사장은 자꾸 장부와 금고의 돈이 맞지 않는다며 의문을 제기한다. 어느 날 자동차 폐기장에서 일하던 규남의 친구들이 전당포로 놀러온다.
      다 함께 점심을 먹던 중 갑자기 몸이 움직이지 않고, 이상한 기운이 감돈다. 규남은 살짝 정신을 차렸지만 친구들과 사장은 움직이지 않는다. 잠시 후 사람이 들어오고 사장은 초점이 없는 눈으로 금고의 돈을 꺼내
      그 사람에게 건넨다. 뭔가 일이 이상하게 흘러간다고 생각한 규남은 정신을 바짝 차려 움직이는데 성공한다. 초인은 규남만 움직이는 것을 보며 놀라움을 감추지 못한다. 규남은 초인을 물리치려 하지만 규남은 조종당하는
      자신의 친구들과 사장의 공격을 당하고 결국 사장이 죽게된다. 초인이 물러난 후 정신이 깨어난 규남의 친구들은 규남과 함께 녹화된 CCTV 테잎을 보게 되고 초인에 의해 조종받았다는 사실을 알게 되고 싸우기로
      결심한다. 그리고 자신을 제외한 모든 사람들을 눈으로 조종한다는 사실을 깨달은 규남은 전투 끝에 규남을 제압하고 얼굴에 봉지를 씌워 경찰서에 데려간다. 경찰에게 자초지종을 이야기 하고 CCTV 비디오 테이프를
      건네주지만 경찰은 규남을 믿지 않는다. 결국 경찰은 봉투를 벗기게 되고 전부 조종당한다. 총격전 끝에 가까스로 살아남은 규남은 경찰의 총을 뺏어가면서 총기탈취 용의자로 몰리게 된다. 한편 규남의 친구들은 눈으로
      조종한다는 사실을 깨닫고 각종 무기와 방어구를 갖고 초인을 대하지만 전혀 통하지 않고, 초인에게 끌려간다. 규남은 전당포에서 인질로 붙잡힌 친구들을 찾지만 친구들은 초인에 의해 살해된다. 초인을 쫒던 규남은
      옥상에서 초인을 만나 죽이려 하지만 반대편에 사장의 딸 영숙(정은채 분)이 난간위에 올라가 떨어질 위기에 처했다는 것을 보고 잠시 움찔하지만 결국 초인과 같이 뛰어내려 초인은 죽고 규남은 살아남는다. 영숙은
      다행히 옥상쪽으로 떨어져 살아남는다. 이 사고로 규남은 전신마비가 되고 스튜어디스가 된 영숙은 그를 챙긴다. 몇 개월후 지하철 선로에 떨어진 유치원생이 위기에 처한다. 유치원생을 넘어 전차가 지나가고, 규남에
      의해 구조된다.'
  - source_sentence: 산화적 인산화와 ATP 합성의 차이는 무엇인가요?
    sentences:
    - ATP를 만드는데 사용되는 또 다른 방법은 산화적 인산화를 통해서이며, 이는 세포 호흡 중에 일어난다. 산화적 인산화는 NADH를 NAD로 산화시키는 과정에서 2.5개의 ATP를 생성하고, FADH를 FAD로
      산화시키는 과정에서 1.5개의 ATP를 생성한다. 미토콘드리아 내막을 가로질러 양성자의 전기화학적 구배로 저장된 위치 에너지는 ADP와 P(무기인산)로부터 ATP를 생성하는데 필요하고, 이 부분에서 기질수준
      인산화와 큰 차이가 난다. 이러한 H의 농도 기울기는 ATP 생성효소에 의해 이용되어, H가 전기화학적인 구배에 의해 ATP 생성효소를 통해서 미토콘드리아의 막 사이 공간에서 미토콘드리아 기질로 확산될 때(화학삼투)
      방출되는 자유 에너지를 ATP 생성과 짝짓는다. 역으로, 전자전달은 H를 미토콘드리아 기질에서 막 사이 공간으로 능동수송하는데 필요한 에너지를 제공한다.
    - '역사적으로 아디프산은 산화에 쓰이는 여러 지방(FAT)에서 만들어졌다. 현재 아디프산은 사이클로헥세인올과 "KA oil"(케톤-알코올 오일의 약자(Ketone-Alcohol oil), 이하 케알오일)이라 불리는
      사이클로헥세온의 혼합물로부터 만들어진다. 이 케알오일은

      여러가지를 거쳐 질산과 산화된다. 사이클로헥세인올이 아질산을 내놓으면서 케톤으로 바뀐다:'
    - 산화적 인산화는 에너지 방출 반응을 사용하여 에너지 흡수 반응을 진행시킨다. 두 세트의 반응이 짝지어져 있다고 하는데, 이는 두 반응 중 하나가 작동하지 않으면 다른 하나도 작동할 수 없다는 것을 의미한다.
      NADH와 같은 전자공여체에서부터 산소(O)와 같은 전자수용체에 이르기까지 전자전달계를 통한 전자의 흐름은 에너지를 방출하는 과정이다. 반면에 ATP 합성은 에너지를 흡수하는 과정이다. 전자전달계와 ATP 생성효소는
      모두 미토콘드리아 내막에 존재하고, 미토콘드리아 내막을 통과하는 H의 움직임에 의해 전자전달계에서 ATP 생성효소로 에너지가 전달되는데, 이러한 과정을 화학삼투라고 한다. 실제로 이것은 단순한 전기 회로 같으며,
      H는 전자전달계의 H 펌핑 효소들에 의해 미토콘드리아 기질(N쪽, 상대적으로 H 농도가 낮은 쪽)에서 막 사이 공간(P쪽, 상대적으로 H 농도가 높은 쪽)으로 능동수송된다. 이러한 효소들은 배터리와 같으며,
      회로를 통해 전류를 흐르게 하는 일을 수행한다. 양성자(H)의 움직임은 막을 가로질러 전기화학적인 기울기를 만들어 내는데, 이것은 종종 양성자 구동력(proton-motive force)라고 불린다. 양성자
      구동력은 H의 농도 차이(양성자 기울기, ΔpH)로 인한 화학적인 위치 에너지와 H가 상대 이온 없이 막을 지나 이동할 때, 전하의 분리 차이로 인한 전기적인 위치 에너지의 2가지 구성 요소를 가진다.
  - source_sentence: 이승만의 독립운동 단체 활동에 대해 자세히 알고 싶습니까?
    sentences:
    - 한편, 북미정상회담을 준비하던 와중에 틸러슨 국무장관이 경질되는 사건이 일어났다. 더욱이 트위터를 통해 소식을 알렸는데 트럼프와 틸러슨이 자주 이견을 보였고 북한에 상대적으로 유화적인 태도를 보였기 때문인 것으로
      알려졌다. 후임에는 마이크 폼페이오 CIA국장이 내정되어 4월 27일 임명되었는데 미국의 대외정책이 더욱 강경해질 것이라는 분석이 나왔다. 또한 북미정상회담 발표 이후 북한은 자제하던 대미 공세를 15일부터
      재개했는데 미국이 인권문제를 언급할 것을 사전에 예방하면서 협상력을 높이기 위한 명분 쌓기라는 관측이다.
    - 독립협회와 청년이승만(獨立協會와 靑年 李承晩 Independence Association and young Rhee Syng-Man)은 1959년 서울에서 상영된 대한민국의 영화로, 대통령 이승만의 청년기 개화,
      계몽운동사를 다루었다. 특히 기울어져 가는 이조 말엽의 국운을 바로잡기 위한 그의 투쟁사를 중심으로 한 전기물이었다.경기도 안양군의 스튜디오에서 제작되었으며 서울 시공관에서 1959년 11월 20일 개봉되었다.1960년
      1월 1일자 동아일보의 영화평 보도에 의하면 연기자 5백여 명과 엑스트라 6만 명이 출연하였다 한다. 그밖에 특별히 외국인 연기자들이 초빙되기도 했다.
    - 이후 이승만이 영향을 발휘하던 독립운동단체 흥업구락부에서도 가입하여 활동하였는데 1925년 11월 신흥우,송진우 등과 함께 미국의 이승만과 사전 협의를 거친 끝에 태평양문제연구회 조선지회를 조직하고 위원을 맡았다.
      1927년 1월에는 비타협적 민족주의자와 사회주의자들이 결합한 좌우연합 독립운동 단체인 신간회 발기인으로 참가했다. 1934년 2월 연희전문학교 부교장을 맡았다. 연희전문학교 부교장 시절 특히 체육에 관심이
      깊어, 그의 주선으로 연희전문학교 주최 전국중학교체육대회를 매년 개최하기도 하였다. 1937년 7월 조선체육회 회장을 맡았다.
  - source_sentence: 아키야마가 나오를 도와주기로 결심한 이유는 무엇인가요?
    sentences:
    - 장위(, 1976년 11월 10일 ~ )는 중화인민공화국의 배우이다. 후베이 성 스옌 시 윈 현 출생이며, 본명은 장밍룽()이다. 2006년 11월 중화인민공화국의 유명 감독과 프로듀서 등과 성관계를 가진 것을
      찍은 녹음 테이프를 공개하여 논란을 불러일으켰다.
    - 출소한 아키야마를 만난 나오는 다짜고짜 도움을 청해보지만, 대답은 당연히 ‘No’. 하지만 절박한 심정의 그녀는 끈질기게 아키야마의 뒤를 쫓는다. 나오가 귀찮아진 아키야마는 “도와 줄 테니 잠시 기다리라”는
      거짓말로 그녀를 떼어놓지만, 순진한 나오는 정말로 밤을 세워가며 아키야마를 기다린다. 그런 모습을 멀리서 지켜본 아키야마는 마음을 고쳐먹고 나오를 도와주기로 결심한다.
    - '코코야시 마을의 여자 해병 벨메일에 의해 구해졌고, 비가 오고 폭풍이 오는 위급한 상황임에도 불구하고 해맑게 웃고 있었다. 자신과 같이 구조된 여자아이는 바로 ''노지코'', 자신의 양언니이다.(KBS 더빙판에는
      ''사비나''로 번역.) 나미는 벨메일의 손에서 코코야시 마을에서 키워졌으며 여전히 행복한 나날을 지내고 있었다. 나미는 바다에 관해 관심이 많았으며 특히 지도를 그리는 실력은 거의 신동에 가까웠다. 그러나
      벨메일이 자신의 친엄마가 아니라는 사실을 마음 속에 새겨두고 있었으며, 그것 때문에 벨메일은 순간적인 홧김에 나미를 집 밖으로 쫓아버린다. 벨메일은 나미가 좋아하는 귤 음식을 한다며 노지코에게 나미를 다시 불러오라고
      하였다. 노지코는 나미에게 가서 벨메일이 미안하다고 하니 같이 집으로 돌아가자고 하였고 나미는 승낙하였다. 그때 갑자기 코코야시 마을에 아론 일당이 들어왔다. 아론 일당의 선장 아론은 ''지금부터 이 마을을
      지배할테니, 어른당 10만 베리, 어린이당 5만 베리를 납부하라''고 명령하였다. 마을 사람들은 어쩔 수 없이 모두 납부하였고 겐조를 비롯한 마을 사람들은 벨메일의 집을 건드리지 않아서 다행이라 생각했지만 불운하게도
      벨메일이 요리를 하고 있어 집 밖으로 피어오르는 연기때문에 들키고 말았다.

      벨메일은 아론 일당이 자신의 집 앞에 와있다는 것을 짐작하고 아론에게 총을 겨누었으나 어인의 엄청난 힘으로 벨메일은 고폭행 당했다때 나미와 노지코, 겐조가 달려왔고 벨메일은 전재산이 겨우 10만베리라 모두 내주었다.
      아론 일당은 나미와 노지코가 벨메일의 자식이 아니라면 그 돈을 겐조가 내고 벨메일을 살려 주기로 하였다. 이때 벨메일은 결국 나미와 노지코를 자기 자식이라 발언해버리고, 돈이 모자란 조건에 아론은 벨메일을 죽이기로
      한다. 벨메일은 나미와 노지코에게 ''생존하면 반드시 행복한 일이 많이 있을것이다. 나미, 노지코.

      사랑한다."라는 유언을 남기며 아론의 총탄에 목숨을 잃고 겐조 또한 간부에게 베여버려 크게 다치고 만다. 이때 나미가 해도를 그리는 데 엄청난 실력을 갖추고 있는 것을 알아버린 아론은 나미를 강제로 끌고 가서
      자신의 측량실에 나미에게 해도를 그리라고 한다. 나미는 마을 사람들이 자신 때문에 죽는 것을 꺼려하여 결국 아론 파크의 문신을 어깨에 새기고 만다. 아론은 ''내 눈앞에 1억 베리를 바치면 너를 포함한 코코야시
      마을을 해방시켜주겠다''고 제안했고 나미는 그 제안을 받아들였다. 그 때부터 나미는 코코야시 마을을 사기 위해 해적 전문 도둑이 되어 바다로 떠나서 해적들한테서 돈을 뺐기 시작했다.'
  - source_sentence: 안압지의 역사적 이름은 무엇인가요?
    sentences:
    - 1980년, 안압지에서 발굴된 토기 파편 등으로 신라시대에 이 곳이 월지(月池)라고 불렸다는 사실이 확인되었다. 이는 신라 왕궁인 반월성(半月城)과 가까이 있었기 때문이며, 임해전의 이름도 본디 월지궁이었다고
      한다. 조선시대에는 폐허가 된 이곳에 기러기와 오리들이 날아들자 조선의 묵객들이 안압지(雁鴨池)라는 이름을 붙였다. 《삼국사기》에 동궁을 임해전(臨海殿), 즉 바다에 면한 건물이라고 불렀다는 기록이 있으며,
      여기에서 안압지는 바다를 상징한다.
    - 성은 왕, 본관은 개성이며, 이름은 기록이 남아있지 않아 알 수 없다. 충혜왕, 공민왕 등과 이복 형제간이다. 용산원자의 어머니 조국장공주는 원나라 황족 출신으로, 원 순종의 아들인 위왕 에무게의 딸이다. 1324년(충숙왕
      11년)에 충숙왕이 원나라에 있을 때 그와 혼인하였다.
    - 안압지라는 명칭은 조선 초기에 간행된 《동국여지승람》과 《동경잡기》등에 나타나고 있다.
