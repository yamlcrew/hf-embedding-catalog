    시위를 할 수 없으니 그 열망을 화환에 담아 보낸 것”이라며 “전염병보다 (주지사의) 행정 능력과 비효율적인 예산 집행이 문제”라고 꼬집었다. 2005년 특별자치주가 되면서 중앙정부로부터 받고 있는 특별자치기금
    운용에 문제가 있다는 지적도 잇따랐다. 자치권을 인정받는 아체는 이슬람 관습법(샤리아)이 실질 지배하는 독특한 지역이다.
