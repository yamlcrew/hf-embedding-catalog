    외에도 유튜브에서 ‘세종테크노파크’를 검색한 후 채널에 접속해 시청할 수 있다. 메타버스 강연참여자는 세종테크노파크로부터 접속 환경 적응을 위한 매뉴얼을 전달받고, 사전모임을 통해 아바타 개설 등 사전연습을 진행한다.
