    일반도로에서 자율주행차 실증을 진행하는 등 안전성 확보와 인프라를 구축하는데 주력해왔다. 특히 ㈜오토노머스에이투지는 안전점검 등을 거쳐 지난 3월부터 약 3달간 산학연클러스터지원센터-세종시청-세종시외버스터미널 등
    6.3㎞ 구간에서 자율주행버스 시범 운행을 해 왔다. 지난 5월부터는 시민체험단 27명을 대상으로 레벨4 수준에서 시속 50㎞까지 고속주행 기술을 점검하는 유상서비스를 사전 점검했다. 31일~7월30일 진행되는
