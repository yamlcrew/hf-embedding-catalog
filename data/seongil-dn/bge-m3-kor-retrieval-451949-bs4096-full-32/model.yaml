      이재민들은 1일 강진과 지진해일의 대재앙이 일어난지 7일째를 맞았지만 국제사회가 지원하는 구호품을 거의 공급 받지 못하고 있다. 도로변 인도에서 밤을 새운 시슬라(38.주부)는 "반다 아체 공군기지에 외국 수송기들이
      잇따라 도착하는데 구호품을 나눠준다는 소식은 없다"면서 "도대체 정부는 무엇을 하는지 모르겠다"고 분통을 터뜨렸다. 시슬라는 "악취를 막기 위한 마스크는 일부 나눠주는 것을 봤다"면서 "그러나 먹기 위한 비상식품이나
      부상자들을 치료하기 위한 의약품, 텐트 등은 아예 볼 수가없다"고 말했다. 또 만디리(28.점원)는 "구호품이 속속 도착하고 있다는 말을 들었지만 어디를 가야 식량을 얻을 수 있는 지 도대체 알 수가 없다"면서
      "통신 두절로 우리는 정보를 얻을 수 없다"고 하소연했다. 반다 아체 공군기지에 구호품을 싣고 도착한 호주 공군의 리처드(24) 상병은 "어제 밤 호주를 출발해 생수와 라면, 과자류를 갖고 왔다"면서 "배급은
      인도네시아군 소관 사항"이라고 말했다. 인도네시아 들도 "반다 아체 인근 도시인 메단의 폴로냐공항이나 자카르타 할림 페르다나쿠수마 공군기지에는 국제사회가 지원해준 각종 구호품이 산더미처럼 쌓여 있다"고 말했다.
      이에 대해 임시 주정부 청사가 마련된 반다 아체 주지사 관저의 한 관계자는 "인력도 부족하고 정신이 없다"면서 "특히 헬기나 트럭 등 운송장비가 부족해 대책이없다"고 털어놨다. 한편 심리적 공황에 빠진 반다
      아체주 주민과는 달리 자카르타의 고급 호텔 등지에서는 부유층들이 연말연시를 맞아 초호화 파티를 벌여 대조를 이루고 있다고 인도네시아 현지 들이 전했다.
    - 우리나라는 우리의 발전경험을 개도국과 공유하는 경제발전경험공유사업(KSP)이라는 대표적인 정책자문 사업을 실시 중이다. 2004년에 베트남과 우즈베키스탄에 대한 자문을 시작으로 10년 이상 수행해 오면서 대상국가와
      주제들을 다각화하였다. 특히 경제발전과 거시금융경제 등 전체적인 발전담론 위주의 자문에서 구체적인 성장전략으로 자문 영역이 전환되는 추세에 있다. 그동안의 수행 경험을 바탕으로 하여 급변하는 국제사회 개발협력
      정세와 일관된 우리나라 정책자문 사업의 방향성이 요구된다. 정책자문 컨설팅의 역할과 방향성 정립이 더욱 중요해진 이유이다. 경제발전의 조건이 선진국의 그것과 매우 다른 개도국의 지속가능한 발전을 촉진하기 위하여
      개 도국은 선진국과는 차별화된 성장전략이 필요하다. 혁신역량을 바탕으로 한 산업과 무역의 역동성이 개도국의 지속가능하고 상생적인 발전을 유인하며, 따라서 개도국 혁신역량의 구축에 초점을 맞추는 협력모델이 중요하다.
      주목할 점은 한 국가의 발전에 영향을 미치는 혁신이란 기술뿐만 아니라 제도나 조직 측면에서의 혁신 등 매우 다양한 측면을 포함한다는 것이다.
    - 인도네시아 서북단 아체특별자치주(州) 주정부 건물 앞에 최근 축하 화환 10개가 줄지어 늘어섰다. 주민들이 자발적으로 보낸 화환들인데, 축하 메시지가 이채롭다. ‘수마트라에서 가장 가난한 지역이 된 걸 축하한다’
      ‘빈곤 우승자가 된 주지사에게 감사하다’ ‘가난 1등 아체 축하’ 등이다. 발신자는 ‘아체 주민들’, ‘전 아첨꾼’이라고 돼 있다. 22일 드틱닷컴에 따르면 아체의 주도인 반다아체 주정부 청사 앞에 17일 다양한
      화환이 전시됐다. 축하 형식을 갖췄지만 기실 모두 수마트라섬에 있는 10개 주 중에서 아체특별자치주가 가장 빈곤한 지역에 선정된 걸 비꼬는 내용이다. 경찰까지 출동했다. 실제 인도네시아 통계청(BPS)은 지난해
      9월 기준 아체의 빈곤율이 15.43%로 수마트라섬에서 가장 높다고 최근 발표했다. 수마트라섬은 자바섬에 이어 인도네시아 2대 주요 섬이다. 인도네시아 전체 빈곤율은 10.19%이다. 지난해 3월 조사에서 아체는
      수마트라섬에서 븡쿨루주에 이어 빈곤율 2위였다. 아체 주정부 관계자는 “신종 코로나바이러스 감염증(코로나19) 사태로 인한 결과”라며 “인도네시아 전체 빈곤율이 전년 동기 대비 0.97%포인트 증가한 걸 감안하면
      같은 기간 0.42%포인트 상승한 아체는 양호한 편”이라고 해명했다. 아울러 아체 주정부는 “빈곤율을 줄이기 위한 정책 노력을 계속하고 있다”고 밝혔다. 그러면서 “아체는 2000년 (인도네시아 중앙정부와)
      내전, 2004년 동남아 쓰나미로 인해 급속도로 가난해진 역사적 배경이 있기 때문에 두 배로 열심히 일해야 한다”고 덧붙였다. 정작 주민들은 핑계에 불과하다고 일축했다. 풍자 화환을 보낸 한 주민은 “코로나19로
      인해 시위를 할 수 없으니 그 열망을 화환에 담아 보낸 것”이라며 “전염병보다 (주지사의) 행정 능력과 비효율적인 예산 집행이 문제”라고 꼬집었다. 2005년 특별자치주가 되면서 중앙정부로부터 받고 있는 특별자치기금
      운용에 문제가 있다는 지적도 잇따랐다. 자치권을 인정받는 아체는 이슬람 관습법(샤리아)이 실질 지배하는 독특한 지역이다.
