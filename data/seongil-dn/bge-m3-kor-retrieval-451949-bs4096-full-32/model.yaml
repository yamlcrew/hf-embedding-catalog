- source_sentence: 인도네시아에서 아체특별자치주가 기록한 빈곤 퍼센트는 얼마나 돼?
  sentences:
  - 연말연시를 맞아 인도네시아 부유층이 초호화 파티를 벌이고 있는 것과는 달리 대재앙으로 살아남은 반다 아체주의 이재민들이 이번엔 굶주림으로 생사 기로에 놓였다. 고지대의 길거리 등에서 텐트도 없이 생활하고 있는 이재민들은
    1일 강진과 지진해일의 대재앙이 일어난지 7일째를 맞았지만 국제사회가 지원하는 구호품을 거의 공급 받지 못하고 있다. 도로변 인도에서 밤을 새운 시슬라(38.주부)는 "반다 아체 공군기지에 외국 수송기들이 잇따라
    도착하는데 구호품을 나눠준다는 소식은 없다"면서 "도대체 정부는 무엇을 하는지 모르겠다"고 분통을 터뜨렸다. 시슬라는 "악취를 막기 위한 마스크는 일부 나눠주는 것을 봤다"면서 "그러나 먹기 위한 비상식품이나 부상자들을
    치료하기 위한 의약품, 텐트 등은 아예 볼 수가없다"고 말했다. 또 만디리(28.점원)는 "구호품이 속속 도착하고 있다는 말을 들었지만 어디를 가야 식량을 얻을 수 있는 지 도대체 알 수가 없다"면서 "통신 두절로
    우리는 정보를 얻을 수 없다"고 하소연했다. 반다 아체 공군기지에 구호품을 싣고 도착한 호주 공군의 리처드(24) 상병은 "어제 밤 호주를 출발해 생수와 라면, 과자류를 갖고 왔다"면서 "배급은 인도네시아군 소관
    사항"이라고 말했다. 인도네시아 들도 "반다 아체 인근 도시인 메단의 폴로냐공항이나 자카르타 할림 페르다나쿠수마 공군기지에는 국제사회가 지원해준 각종 구호품이 산더미처럼 쌓여 있다"고 말했다. 이에 대해 임시 주정부
    청사가 마련된 반다 아체 주지사 관저의 한 관계자는 "인력도 부족하고 정신이 없다"면서 "특히 헬기나 트럭 등 운송장비가 부족해 대책이없다"고 털어놨다. 한편 심리적 공황에 빠진 반다 아체주 주민과는 달리 자카르타의
    고급 호텔 등지에서는 부유층들이 연말연시를 맞아 초호화 파티를 벌여 대조를 이루고 있다고 인도네시아 현지 들이 전했다.
  - 우리나라는 우리의 발전경험을 개도국과 공유하는 경제발전경험공유사업(KSP)이라는 대표적인 정책자문 사업을 실시 중이다. 2004년에 베트남과 우즈베키스탄에 대한 자문을 시작으로 10년 이상 수행해 오면서 대상국가와
    주제들을 다각화하였다. 특히 경제발전과 거시금융경제 등 전체적인 발전담론 위주의 자문에서 구체적인 성장전략으로 자문 영역이 전환되는 추세에 있다. 그동안의 수행 경험을 바탕으로 하여 급변하는 국제사회 개발협력 정세와
