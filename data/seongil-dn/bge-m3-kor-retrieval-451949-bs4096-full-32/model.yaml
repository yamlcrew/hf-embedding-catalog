      등 6.3㎞ 구간에서 자율주행버스 시범 운행을 해 왔다. 지난 5월부터는 시민체험단 27명을 대상으로 레벨4 수준에서 시속 50㎞까지 고속주행 기술을 점검하는 유상서비스를 사전 점검했다. 31일~7월30일 진행되는
      이번 일반시민 대상 유상 서비스로 일반시민들은 500원 이하의 저렴한 비용으로 자율주행버스를 이용할 수 있게 된다. 자율주행버스는 안전요원 2명이 동승하며, 코로나19 확산 차단을 위한 방역 등 안전을 최우선
      가치로 두고 매주 월~금요일 주 5일 운행한다. 정차정류장은 국책연구단지→소담동→세종시청→시외버스터미널 순이며, 1일 운행 횟수는 오전11시, 오후 2시, 3시, 4시 등 모두 4회다. 류제일 경제정책과장은
      “세종시에 자율주행 대중교통 셔틀을 도입할 경우 교통체증 및 주차난 해소, 대기오염 저감 등이 기대된다”라며 “앞으로 자율주행 기술동향을 고려해 자율주행 대중교통 버스 도입을 검토해 나갈 계획”이라고 말했다.
    - 세종시가 4월 과학의 달을 맞아 (재)세종테크노파크와 오는 22일 ‘스마트한 세종의 미래’를 주제로 실시간 강연을 연다. 이번 강연은 메타버스를 활용해 온라인 생중계로 자율주행차 전문가 강연이다. 메타버스는
      가공, 추상을 의미하는 ‘메타(meta)’와 현실 세계를 의미하는 ‘유니버스(universe)’의 합성어로 3차원 가상세계를 의미한다. 특히 메타버스 가상세계에서 자율주행전문가가 참가자와 직접 자신의 아바타로
      강연에 참여해, 첨단 과학기술을 체험하는 형식이다. 메타버스 강연은 45명을 선착순 모집하고, 신청은 16일까지 세종테크노파크 홈페이지와 세종시청 홈페이지에서 가능하다. 강연은 22일 오후 3시부터 1시간 동안이고,
      메타버스 신청자 외에도 유튜브에서 ‘세종테크노파크’를 검색한 후 채널에 접속해 시청할 수 있다. 메타버스 강연참여자는 세종테크노파크로부터 접속 환경 적응을 위한 매뉴얼을 전달받고, 사전모임을 통해 아바타 개설
      등 사전연습을 진행한다. 또 강연 당일에는 가상공간 내 강연 및 공연은 관람하고 강연자와 참석자간 소통을 통해 질의응답을 할 예정이다. 시 관계자는 “짧은 시간 동안 과학을 체험할 수 있는 특별한 기회를 마련하기
      위해 메타버스라는 가상세계를 선택했다”며 “스마트한 세종의 미래에 시민 여러분들의 많은 관심과 참여 바란다”고 말했다. 한편 이번 행사는 과학기술정보통신부의 4월 과학의 달 ‘봄날의 과학산책’ 과 연계한 지역별
      프로그램으로, 전국의 지역과학문화 거점센터들이 릴레이 형식으로 과학콘텐츠를 선보이고 있다. 시는 2021년 지역과학문화 거점센터로 선정돼 (재)세종테크노파크가 운영 중에 있다.
  - source_sentence: 관광 교통 서비스 체계 구축 정책의 추진은 몇 단계로 나눠서 할 수 있을까?
    sentences:
    - 창의ᆞ혁신상품은 TV홈쇼핑으로 구매하세요! □ 미래부가 내세우는 공영TV홈쇼핑의 또 다른 차별화 포인트는 중소기업, 농축수산가공업체 등을 위한 종합 글로벌 유통 채널 구축의 구심점으로 공영TV홈쇼핑을 활용한다는
      것이다. o 공영TV홈쇼핑은 인터넷, 모바일, 오프라인 매장을 연결하는 종합유통 채널 구축을 위한 시발점이 될 것이다. 심사과정에서 TV홈쇼핑에서 발생한 광고효과를 다른 유통채널을 통해 판매로 유도하는 종합
      유통 채널 구축 전략을 평가하고, 중소기업ㆍ창의혁신기업ㆍ농어민 지원을 위해 기존에 운영되고 있는 유통채널과의 전략적 제휴 등도 추진해 나가도록 할 계획이다. o 또한, 공영TV홈쇼핑은 창의ㆍ혁신 상품, 중소기업
      제품 등의 글로벌시장 진출을 지원하기 위한 기반을 구축할 것이다. 농식품부, 중기청등 관련 부처에서 추진 중인 해외진출 지원 사업 등과 연계하고, 이미 해외에서 TV홈쇼핑 채널을 운영 중인 기존 TV홈쇼핑 업체와의
      상생 협력 등을 통해 해외 판로 개척 모델을 만들어 나가도록 유도할 계획이다. □ 미래부는 12월 12일 더케이호텔서울(서초구 양재동)에서 승인신청 요령 등에 대한 사업자 대상 설명회를 개최하여 공영TV홈쇼핑채널
      신청을 희망하는 사업자들에게 자세한 안내를 할 예정이다. o 이후, 12월 29일부터 31일까지 3일간 사업자 신청 접수를 받고 시청자 의견청취, 심사위원회 운영 등의 심사 절차를 진행하여 2015년 1월에는
      신설 공영TV홈쇼핑 사업자 선정을 마무리할 계획이다.
    - 관광 교통 서비스 체계 정책 추진 주체로는 중앙 및 지방정부, 공공기관, 민간기관 등이 고려될 수 있다. 중앙정부 및 지방정부, 공공기관 중 연구기관은 정책을 추진하는 주체로서, 지방정부와 사업기관은 정책을
      실행하는 주체로서, 민간 기관은 직접 사업을 추진하는 주체로서 참여할 수 있다. 관광 교통은 기존 교통시설 및 수단을 관광객이 이용하는 개념이기 때문에 정책 영역이 국토교통부, 문화체육관광부, 넓게는 해양수산부
      등 여러 부처에 걸쳐 있다. 원활한 정책사업 추진을 위해서는 부처 간 협력이 필수적이며, 부처 간 협력 체계로는 협력적 개별사업추진, 공동사업추진, 사업추진 조직구성 등 세 가지 대안을 고려해볼 수 있다. 관광
      교통 서비스 체계 구축 정책은 3단계로 구분하여 추진할 수 있다. 1단계는 2016년 2017년으로 설정하고자 하며, 이 시기는 관광 교통 정책 사업을 추진하기 위한 기반을 마련하는 단계이다. 2단계는 2018년부터
      2020년까지 3년간으로 본격적인 정책 사업이 추진되는 시기이며, 3단계는 2021년 이후 정책사업의 효과가 창출되는 기간으로, 확장된 형태의 신규 사업을 발굴 및 추진할 수 있어야 한다.
    - 관광교통 서비스 체계는 관광 활동을 위한 관광객의 이동 편의성과 효용을 최대화 하는 시스템을 뜻한다. 서비스 체계를 적용하는 영역은 관광 교통 정보, 관광교통수단, 관광교통 편의 서비스로 구분하여 볼 수 있다.
      관광교통 정보는 관광 목적지에 도달하기 위해 필요한 관광교통 수단 및 관광교통 편의 서비스 등에 대한 종합적 정보를 뜻한다. 주요 관광자원과 관광 자원까지 이동하는 데 필요한 루트, 루트를 이동하기 위해 필요한
      관광교통 수단과 비용, 관광교통 편의 서비스 등에 대한 정보를 모두 포함한다. 관광교통 수단은 출발지로부터 관광목적지를 연결하는 일반 및 특수교통수단을 뜻한다. 또한 교통 수단의 시간적, 공간적 연계 배치와
      기반 시설로서 공항, 터미널, 역 또한 교통수단의 범위에 포함한다. 관광교통 편의 시스템은 교통수단의 이용을 보다 편리하게 하는 제도 및 서비스를 뜻한다. 관광교통 편의 서비스 영역에는 예약 할인, 그 밖의
      제반 편의 서비스를 모두 포괄한다. 또한 교통수단의 이용은 물론 관광지 입장까지 아우르는 통합 패스 티켓, 바우처 등을 포함한다.
