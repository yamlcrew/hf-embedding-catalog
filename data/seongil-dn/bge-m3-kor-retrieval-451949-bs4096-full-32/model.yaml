    - '2. 거시경제분석모델을 통한 수요전망

      가. 실물경제 및 금융산업 성장 전망

      (1) 실물경제 성장 전망

      □ 한국 실질 국내총생산(GDP)은 성장률이 지속적으로 하락하는 추세에 있음. ○ 한국의 연평균 성장률은 1980년대에는 8.9%, 1990년부터 외환위기 이전인 1997년까지는 8.2%로 빠른 성장세를 유지하였으나,
      1998년 외환위기로 성장률이 △5.5%까지 하락함. ○ 1999년에는 기저효과 등으로 실질 국내총생산(GDP) 성장률이 11.3%까지 반등하였다가 점차 하락세를 보여 2003년에는 2.9%까지 하락함

      ○ 이후 2007년까지 연평균 4.9%의 성장률을 보였으나, 2008년과 2009년에는 글로벌 금융위기의 영향으로 다시 큰 폭으로 하락

      ○ 2010년에는 전년대비 6.5% 성장하였으나, 2011년 유로지역 재정위기로 인해 다시 하락하여 2012년에는 2.3%를 기록하고 2013년과 2014년에는 반등하여 각각 2.9% 및 3.3%를 기록

      ○ 2015년에는 수출 둔화 지속과 내수 회복 지연 등으로 2.6%를 기록하였으며, 2016년에는 소폭 상승한 2.7%를 기록할 전망

      □ 이러한 경제성장률 하락 추세는 앞으로도 지속될 것으로 예상됨. ○ 한국 잠재성장률이 2016년에는 약 2.9%이지만 2040년에는 1.7%까지 점진적으로 하락할 것으로 전망

      ○ 물론 성장잠재력 수준은 여러 유·무형의 요인들에 의해 결정이 되기 때문에 직접적인 관측이 어렵지만 여러 통계기법을 활용하여 잠재성장률을 추정하더라도, 향후 잠재성장률의 추세적인 하락은 불가피한 현상으로 판단됨.
      □ 경제성장률은 장기적으로 잠재성장률 추세와 비슷한 움직임을 보이겠지만 단기적으로는 경기적인 요인으로 인해 잠재성장률 수준을 하회하거나 상회할 수 있음. ○ 이에 따라 금융연구원의 경제전망 모형을 이용하여 향후
      5년간인 2017∼2021년까지의 경제성장률을 추정함. □ 2017년 우리경제는 내수와 수출부진으로 2.5% 성장에 그칠 것으로 예상되며, 이후 2018년과 2019년에는 소폭 개선되어 각각 2.7%, 2.8%를
      기록할 것으로 전망됨. (2) 금융산업 성장 전망

      □ 2016년 1~3분기 중 한국에서 창출된 부가가치는 1,109.7조원이며 이중 금융업이 창출한 부가가치는 68.6조원으로 전체 부가가치중 6.18%를 차지함.'
    - 지문이나 홍채와 같은 바이오 정보는 신체와 행동상의 특성을 통해 신원을 확인하는 기술로서, 기존에 저장해 둔 개인의 바이오 정보와 제시된 바이오 정보를 대조하는 방식이며, 또한 각 개인의 신체에 각인되어 특별한
      신체적 변화가 없는 한 평생토록 바꿀 수 없기 때문에 개인정보 중에서도 가장 민감한 개인정보에 해당한다고 볼 수 있다. 그럼에도 불구하고, 개인정보 생명주기에 따라 수집과정에서 명확한 인식과 설명(개인정보 열람
      정정 삭제 청구권) 없는 수집의 위험성, 저장관리 과정에서 해킹에 의한 유출 및 삭제, 이용 및 제공과정에서 다른 개인정보 데이터베이스와의 결합에 따른 오 남용(특성, 습관, 행동, 감정추론) 사례가 발생할
      가능성이 존재하며, 원데이터의 복원이나 당사자 역추적 등도 가능하므로 개인정보 유출 가능성을 배제할 수는 없다. 본 진정사건과 관련하여 공익근무요원들에 대한 복무(근태)관리는 담당자가 지속적인 점검을 통하여
      이를 감독할 수가 있으며, 부득이하게 출퇴근용 카드발급시스템을 사용한다 하더라도 충분히 예방할 수 있으므로 지문등록시스템 도입은 침해의 최소성에 맞지 않다고 판단된다.
  - source_sentence: 장애인활동 지원에 관한 법률이 개정되어 무엇이 늘어났어?
    sentences:
    - '장애인 활동 지원에 관한 법률 시행 규칙 일부 개정령안

      1. 개정이유

      보건복지부 사회보장위원회 결정(2013.12월 의결)에 따라 2016년부터 사회보장사업의 선정기준을 전국가구평균소득에서 기준 중위소득으로 표준화가 추진되고 있어 기존 ‘전국가구평균소득’을 ‘기준중위소득’으로
      변경하고, 「장애인복지법」상 서비스 지원 종합조사 도입으로 ‘기본급여’와 ‘추가급여’가 ‘활동지원급여’로 통합됨에 따라 본인부담율을 조정하는 한편, 운영상 나타난 일부 미비사항을 보완하고자 함 2. 주요내용

      가. 본인부담금의 산정방법을 기준중위소득으로 변경하고, ‘기본급여’와 ‘추가급여’가 ‘활동지원급여’인 단일서비스로 통합됨에 따라 본인부담율 조정(안 별표6)

      나. 활동지원 응급안전서비스 신청서 개선(안 별지 제5의2서식)

      3. 참고사항

      가. 관계법령 : 생략

      나. 예산조치 : 별도조치 필요 없음

      다. 합의 : 해당기관 없음

      라. 기타 : 1) 신ㆍ구조문대비표'
    - '장애인활동 지원에 관한 법률 시행령 일부개정령안

      1. 의결주문

      장애인활동 지원에 관한 법률 시행령 일부개정령안을 별지와 같이 의결한다.

      2. 제안이유 및 주요내용

      활동지원급여를 신청할 수 있는 사람을 종전의 중증장애인에서 모든 장애인으로 확대하고 활동지원급여 신청의 조사를 「장애인복지법」에 따른 서비스 지원 종합조사로 대체하는 등의 내용으로 「장애인활동 지원에 관한 법률」이
      개정됨에 따라, 이에 맞추어 활동지원급여 수급자격 심의기준 및 수급자격 갱신에 관한 사항 등을 정비하는 한편, 활동지원급여 수급자격 결정의 유효기간을 종전의 2년에서 3년으로 늘림으로써 수급자의 권익을 보다
      안정적으로 보호하고, 과태료의 가중된 부과처분에 적용되는 차수를 명확히 하는 등 현행 제도의 운영상 나타난 일부 미비점을 개선ㆍ보완하려는 것임. 3. 주요토의과제

      없음 4. 참고사항

      가. 관계법령 : 생략

      나. 예산조치 : 별도조치 필요 없음

