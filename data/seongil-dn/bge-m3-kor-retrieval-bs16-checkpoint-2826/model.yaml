    sentences:
    - '제2장 청년층 노동시장 동향 및 청년내일채움공제의 성과 개괄

      □ 본 장에서는 청년내일채움공제 사업의 도입 배경으로 작용한 청년층 노동시장의 현황을 살펴보고, 세부 성과에 앞서 청년내일채움공제가 현 청년고용 실태에 미친 개괄적 성과를 평가하고자 한다

      제1절 청년층 노동시장 동향

      1. 청년층 인구구조 변화 추이

      □ 고용률과 실업률, 취업자 수 등의 고용지표는 경제 및 노동시장의 상황 뿐 만 아니라, 인구구조 변화에 의해 영향을 받는 만큼, 청년층의 노동시장 동향을 파악하기 위해서는 청년층 인구구조의 변화양상을 이해할
      필요가 있음 □ 청년층 인구구조 변화 추이

      ○ 전체 생산가능인구가 여전히 증가추세에 있는 것에 비해, 청년층(15∼29세) 생산가능인구는 1990년을 기점으로 감소추세에 있음. 2018년 청년층 생산가능인구는 전년대비 133천명 감소한 9,149천명임
