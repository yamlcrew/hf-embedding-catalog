      종목으로 열린 경기에서 모두 패배하였다. 김택용은 스타2리그 뿐만아니라 스타1리그에서도 2010년 여름부터 3년째 스타리그에 이름을 올리지 못했다. 2012년 8월 12일 마침내 염보성을 상대로 어렵게 프로리그
      스타2 종목에서 처음으로 승리를 거두었다(1승 6패). 결국 부진을 극복하지 못한 채 2012년 8월 케스파 랭킹 22위로까지 떨어지고 말았다. 하지만 그 후 2012년 8월 18일 김정우 마저 김택용의 스타2
      승리 제물이 되었다. 엘리전까지 가는 혈전 끝에 스타Ⅱ에서 두각을 돋보이는 김정우를 격파하였고, 2012년 9월 2일 SK플래닛 스타 프로리그 시즌2 준플레이오프 2차전에서 다시 한번 염보성을 스타Ⅱ로 격파하면서
      조금씩 기세를 올렸다.'
    - 이소룡의 아버지는 유명한 광둥 경극 배우였으며, 아버지의 뒤를 이어 아주 어린 나이부터 영화를 접하게 되었고, 생후 3개월에 《금문녀》라는 영화로 데뷔하였다. 그가 18세가 되었을 때 이미 그는 스무 편의 영화에
      출연한 상태였다.
  - source_sentence: 페니스가 없는 여성의 심리적 반응은 어떠한가?
    sentences:
    - PIRA는 무장해제위원회(Decommingsioning Commission)에 의해 2005년 10월 무장투쟁을 포기했음을 확인받았으며, 우익 민주연합당(DUP)를 제외한 정당들도 이를 인정했다. 단, DUP에서는
      증거가 없다며 무장투쟁포기사실을 인정하지 않았는데, 이는 DUP가 PIRA를 통해서 존재할 수 있기 때문이다. 그 실례로 북아일랜드의 수도 벨파스트에서 발행하는 일간지에선 PIRA 지도자 오닐이 무장투쟁을 포기하자,
      민주연합당 지도자 이언 페이즐리(Ian Paisley)가 "가지마! 난 네가 필요해!"라고 말하는 내용의 풍자만화를 실었다.
    - 성적 만족을 위해서라면 정신적인 사랑 없이 육체적 결합이 가능하다고 주장하였다. 정분이 없이도 성교가 가능하며 성관계는 일종의 오락 내지는 친밀행위에 지나지 않는다고 보았다. 그러나 이는 보수적인 유학자들 외에도
      남성 지식인과 기독교계열의 반발을 불러왔다.
    - 첫째는 "자신에게 페니스가 없는"것을 강하게 자각하고, 완전하게 페니스가 없는 존재로 받아들일 것이다. 이것은 열등감을 가진 여자를 만든다. 이 경우 무기력한 인간이 되어버린다고 한다. 둘째는 "자신은 페니스가
      언젠가 나오고, 나는 남자"라고 믿고, 남성적인 성격을 갖출 경우이다. 세 번째는 성기라는 대상을 선망할 때 성기를 "페니스 → 아이"라는 상징으로 생각하고, 아이를 손에 넣는 길을 선택하는 경우이다.
  - source_sentence: 신탁청은 언제 해체되었는가?
    sentences:
    - 신탁통치령(信託統治領, ) 혹은 신탁통치 지역(信託統治 地域)은 국제 연맹 위임통치령의 후신으로 제2차 세계 대전의 종전과 함께 국제 연맹이 유엔으로 대체됨에 따라 생겨났다.다음 11개 지역이 신탁통치령이었다.
      1994년 10월 팔라우 독립을 마지막으로 신탁통치령은 소멸되었다.
    - 히가시코게 역()은 일본 돗토리현 야즈 군 야즈 정에 위치한 서일본 여객철도 인비 선의 철도역이다. 단선 승강장 1면 1선의 구조를 갖춘 지상역이다.
    - 신탁청은 1994년 12월 31일 해체될 때까지 15,102개의 기업체를 매각하고 4358개의 기업체를 재사유화했으며, 호텔, 식당, 약국 및 서점 등 소규모 사업장 25,030개를 사유화하고 46,552건의
      부동산을 매각해 총 91,042건의 사유화를 기록했다. 이를 통해 666억 마르크의 매각수익을 올리고, 2111억 마르크의 투자와 150만 개의 일자리를 보장받았다. 초기에 추산되었던 기업가치가 약 6000억
      마르크였던 것에 비하면 1/10 수준밖에 되지 않은 턱없이 낮은 매각수익이다. 사유화된 15,000여 기업 중 구동독인들에 의한 매입은― 주로 경영자기업인수(MBO) 혹은 종업원기업인수(EBO) ― 6%에 지나지않았고,
      외국인 투자자 매입도 사유화 전체 기업 중 9% 정도로 나타났다.
  - source_sentence: 석신산의 탈수 반응 생성물은 무엇인가요?
    sentences:
    - 석신산은 푸마르산으로 산화되거나 다이에틸석시네이트(diethylsuccinate, (CHCOCHCH))와 같은 다이에스터로 전환될 수 있다. 이러한 다이에틸 에스터(diethyl ester)는 스토브 축합(Stobbe
      condensation) 반응의 기질이다. 석신산의 탈수는 석신산 무수물을 생성한다. 석신산은 1,4-뷰테인다이올, 말레산 무수물, 석신이미드, 2-피롤리디논 및 테트라하이드로푸란을 유도하는데 사용될 수 있다.
    - 2006년 ‘동의대 5·3 동지회’ 회원 등은 “동의대 사건 이후 경찰 조사 과정에서 고문 등 인권침해가 있었다”며 진실·화해를 위한 과거사 정리 위원회(이하 진실화해위)에 진실규명을 신청하였다. 이로 인해
      진실화해위 소위원회는 “구타 등 인권침해가 있어 국가가 사과해야 한다”는 내용의 조사 결과 보고서를 심의·의결, 2010년 1월 19일에 열린 진실화해위 전원위원회에 상정했으나, “진실화해위는 ‘권위주의 통치’
      시기에 일어난 일을 조사 대상으로 삼는데, 동의대 사건은 노태우 정권 시절에 일어난 일이므로 조사 대상 자체가 되지 않는다”며 재적위원 과반수가 이 사건을 각하하기로 의결해 사건이 각하되었다. 다음날인 1월
      20일에는 조사하지 않기로 했다고 밝힘으로서, 보고서 내용은 논의조차 되지 못한 것으로 전해졌다.
    - 저산소 상태에서 석신산의 축적은 활성 산소 생산의 증가에 의한 허혈 재관류 손상(reperfusion injury)과 관련이 있다. 허혈(ischemia) 동안 푸마르산은 퓨린 뉴클레오타이드의 분해 및 말산-아스파르트산
      셔틀의 역방향 반응의 일부분으로부터 형성된다. 과도한 푸마르산은 석신산 탈수소효소의 역반응을 통해 석신산의 생산 및 축적을 야기한다. 재관류시 석신산은 신속하게 산화되어 활성산소의 갑작스럽고 광범위한 생성을
      초래한다. 활성산소는 세포자살 기작을 촉발시키거나 단백질, 세포막, 세포소기관 등에 산화적 손상을 유발한다. 동물 모델에서 허혈성 석신산 축적의 약리학적 억제는 허혈 재관류 손상을 개선시켰다. 현재 석신산 매개
      활성산소 생성의 억제는 약물 치료의 표적으로 조사 중이다.
  - source_sentence: 파올로 말디니는 어떤 선수인가요?
    sentences:
    - 체사레 말디니는 1954년부터 1966년까지 AC 밀란에서 뛰었고, 아들 파올로 말디니는 1985년부터 2009년까지 AC 밀란에서 뛰었으며, 손자 크리스티안 말디니가 2005년 10월 18일 AC 밀란 유스팀에
      입단해 3부자가 모두 AC 밀란에서 활약하게 되었다.
    - 파올로 체사레 말디니 (, 1968년 6월 26일, 이탈리아 밀라노 ~ )는 이탈리아의 은퇴한 축구 선수로, 포지션은 왼쪽 풀백과 센터백이었다. 그는 밀란의 전설적인 수비수 였을 뿐 아니라 역대 최고 수비수로도
      불릴 만큼 대단한 선수였다. 현재 밀란의 스포츠 전략 & 개발 디렉터로 활동하고 있다.
    - 조 주니어(Joe Junior, 본명은 Jose Maria Rodrigues, Jr.(조즈 마리아 로드리게스 주니어), 중문명(中文名)은 羅利期(뤄리지, 나이기), 1947년 7월 22일 ~ )는 영국 국적자
      신분의 포르투갈계 영국인 남성으로 중화인민공화국 마카오 특별행정구에서 출생한 중화인민공화국 홍콩 특별행정구의 가수, 작사가, 영화배우, 텔레비전 연기자이다.
