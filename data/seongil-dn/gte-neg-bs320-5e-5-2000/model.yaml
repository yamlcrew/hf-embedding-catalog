- source_sentence: G드라이브는 코로나19 때문에 재택근무가 확대되자 어떻게 활용되었어
  sentences:
  - 디지털 시대로의 전환은 정부의 일하는 방식에 변화를 가져왔다. 코로나 19의 확산과 함께 재택근무의 실시로 정부원격근무서비스(GVPN), G드라이브가 원격 근무 인프라 및 온라인 협업툴로 활용되었다. GVPN은
    공무원이 인터넷이 연결된 곳이라면 국내‧외 출장지나 집에서 사무실처럼 업무를 처리할 수 있게 해주는 시스템이다. G드라이브는 정부 클라우드 서비스로 2017년 체계적 지식관리 및 행정 업무의 연속성을 확보하기 위해
    서비스를 시작하였다. 업무용 컴퓨터 대신 클라우드에 업무계획, 통계, 정책보고서, 업무편람 등 공무원의 업무 및 정책 자료를 저장·관리하게 되었다. 공무원은 일하는 방식에 있어 GVPN, G드라이브 활용과 스마트워크센터와
    같은 스마트업무환경에 익숙해지고 있다. 그러나 대면문화에 익숙한 조직문화, 접근성이 떨어지는 스마트워크센터, 데이터 활용에 대한 공감대 미흡 등의 어려움이 남아있다. 코로나 장기화로 어쩔 수 없이 비대면 문화에
    익숙해지고 있지만 비대면 환경에서도 업무에 집중할 수 있는 문화로의 전환, 데이터 기반 행정 활성화를 위한 내부 업무 정비 및 표준화 등이 뒷받침되어야 할 것이다.
  - 신종 코로나바이러스 감염증(코로나19) 이후 부상한 긱 이노코미(임시직 경제)가 고용시장을 바꿔놓으면서 ‘긱 워커’를 겨냥한 신생기업(스타트업)들이 뜨고 있다. 긱 워커란 회사에 정규직으로 얽매이지 않고 일정 기간
    계약을 맺고 일하는 초단기 노동자다. 프리랜서 디자이너나 개발자, 각종 배달원, 번역가나 컨설턴트 등이 여기 속한다. 22일 관련업계에 따르면 회사는 정규직 채용보다 비용을 아낄 수 있고, 구직자는 장소와 시간에
    구애 받지 않고 자유롭게 일하며 동시에 여러 계약으로 수익을 올릴 수 있어서 긱 워커를 선호한다. 특히 긱 워커로 일하는 20,30대 MZ세대(밀레니얼+Z세대)들이 늘면서 이들을 겨냥해 사업을 펼치는 스타트업들도
    매출이 증가하거나 대규모 투자를 받고 있다. 대표적인 경우가 긱 워커와 기업을 연결해 주는 중개 스타트업들이다. 전세계에서 이용자가 가장 많은 미국의 업워크는 3,500가지 분야의 긱 워커 1,200만 명이 이용하고
    있다. 이스라엘 스타트업 파이버도 디자이너와 개발자 등 400여 직종의 긱 워커들이 이용하면서 지난해 매출이 전년보다 약 78% 성장했다. 2012년 설립된 크몽은 국내에서 가장 큰 긱 워커 중개 스타트업이다.
    이 업체에 따르면 디자인, 개발자, 영상, 마케팅 등 400여 분야에서 총 25만 명의 긱 워커들이 이용해 거래액이 4년 간 10배 이상 급증했다. 특히 이 곳을 통해 계약을 맺은 개발자, 디자이너, 영상 및 음악
    전문가의 상위 10%는 연 평균 수입이 8,500만~3억4,400만 원에 이른다. 덕분에 크몽은 높은 성장성을 인정 받아 지난 4월 312억 원의 투자를 받았다. 스타트업 브레이브모바일도 이사, 청소, 실내장식,
    반려동물 훈련, 과외, 심리상담 등 1,000여 가지 분야의 긱 워커를 연결해 주는 중개 서비스 ‘숨고’로 지난 14일 320억 원의 투자를 받았다. 이 업체에 따르면 코로나19 이후 각종 가정용 서비스에 대한
    수요가 크게 늘어 지난해 매출이 전년 대비 160% 이상 성장했다. 숨고의 가입자는 약 500만 명이며 누적으로 3,000만 회 이상 긱 워커들에게 일을 제공했다. 채용 플랫폼을 운영하는 원티드는 긱 워커들에게
    인공지능(AI)을 이용해 적합한 일자리를 소개하는 ‘원티드 긱스’ 서비스를 아예 따로 개발했다. 또 일자리 매니저인 매칭 매니저를 도입해 이들이 해당 일자리에 어울리는 긱 워커를 찾아내 계약부터 업무 진행, 정산까지
    모든 과정을 1 대 1로 조율한다. 원티드 관계자는 “원티드 긱스 덕분에 등록된 긱 워커가 1년 만에 36배 증가했고 기업들의 채용 의뢰도 10배 늘었다”고 말했다. 긱 워커 증가에 맞춰 이들을 위한 스타트업 서비스도
    늘고 있다. 금융기술 스타트업 엠마우스는 하나은행, 애큐온저축은행과 함께 긱 워커들에게 월급을 가불해 주는 ‘페이워치’ 앱을 선보였다. 긱 워커가 위성위치확인시스템(GPS)을 이용해 이 앱으로 출퇴근을 기록하면
    일한 날짜만큼 금액을 미리 빌려 쓸 수 있다. 이후 월급을 받을 때 가불액을 제외한 나머지가 입금된다. 세무회계 스타트업 자비스앤빌런즈는 긱 워커를 위한 세무 서비스 ‘삼쩜삼’을 운영한다. 세금 환급액을 확인하고
    수수료 3.3%를 내면 간편하게 세무신고도 할 수 있는 서비스다. 이런 서비스 덕분에 이 업체는 올들어 65억 원을 투자받았다. 관련업계에서는 긱 이코노미 시장이 커지며 긱 워커를 겨냥한 스타트업과 서비스는 계속
    늘어날 것으로 보고 있다. 이복기 원티드랩 대표는 “2025년까지 긱 이코노미의 부가가치가 2,948조 원에 이를 것이라는 외국 컨설팅 업체의 분석이 있다”며 “긱 워커 시장도 계속 커지면서 이들을 겨냥한 서비스
    시장도 함께 증가할 것”이라고 전망했다.
  - 33살에 임원 38살에 최고경영자 국내 재벌그룹에서 경영권 승계가 진행 중이거나 최근에 끝난 재벌총수 3~4세들이 처음 임원이 되는 나이는 평균 33살, 사장이나 회장 등 최고경영자의 지위에 오르는 나이는 평균
    38살로 조사됐다. 또 이들 재벌 3~4세들이 입사해 최고경영자가 되는 데 걸리는 기간은 평균 11년 정도인 것으로 나타났다. 최근 일부 그룹 총수 일가의 초고속 승진이 사회적으로 주목을 받고 있는 가운데, 에서
    경영승계가 진행되고 있거나 최근에 끝난 삼성, 엘지, 현대·기아차, 에스케이, 한진, 롯데, 두산, 신세계, 씨제이, 효성, 코오롱, 현대백화점 등 12개 주요 그룹의 재벌총수 3~4세(한진·롯데는 2세) 36명을
    대상으로 경영승계 실태를 조사했더니 이렇게 나타났다. 조상 대상은 삼성에선 이재용 삼성전자 상무 등 5명, 엘지는 구본걸 엘지상사 부사장 등 3명, 현대·기아차는 정의선 기아차 사장 등 4명, 에스케이는 최태원
    에스케이㈜ 회장 등 4명, 한진은 조양호 회장 등 4명, 롯데는 신동빈 부회장, 두산은 박정원 ㈜두산 사장 등 5명, 신세계는 정용진 부사장 등 2명, 씨제이는 이재현 회장 등 2명, 효성은 조현준 부사장 등 3명,
    코오롱은 이웅렬 회장, 현대백화점은 정지선 부회장 등 2명이다. 12개 그룹 총수 3~4세 36명 조사 입사 11년만에 최고경영자 ‥ “능력검증 필요” 조사 결과, 재벌 3~4세들은 평균 27.3살에 계열사에 입사한
    뒤, 32.8살에 처음 임원에 임명됐다. 임원이 되는 데 걸린 기간은 평균 5.5년이었다. 재벌 3~4세 중에서 이미 사장 이상 직급(회장, 부회장 포함)을 맡고 있거나, 직급은 이에 못미치지만 대표이사를 맡아
    사실상 최고경영자 노릇을 하고 있는 17명이 최고경영자에 오른 나이는 평균 38.2살이었다. 최고경영자 지위까지 오르는 데 걸린 기간은 입사 시점을 기준으로 하면 10.8년, 첫 임원 임명을 기준으로 하면 6.4년이었다.
    또 삼성 이건희 회장과 엘지 구본무 회장, 현대·기아차의 정몽구 회장, 한화의 김승연 회장, 금호아시아나의 박삼구 회장, 두산의 박용오·용성 회장, 효성의 조석래 회장 등 주요 그룹의 현직 재벌총수 8명은 평균
    28.2살에 계열사에 들어온 뒤, 30.2살에 임원으로 승진하고, 37.5살에 최고경영자에 선임된 것으로 나타났다. 재벌 3~4세들과 현직 재벌총수들을 비교하면, 임원 승진 나이는 2년 정도 늦어졌으나, 최고경영자로
    선임되는 나이는 비슷하다. 정광선 한국기업지배구조 개선지원센터 원장(중앙대 교수)은 “재벌총수 일가의 초고속 승진과 조급한 경영승계는 기업을 위험에 빠뜨릴 수 있는 만큼 충분한 경영수업과 경영능력에 대한 객관적
    검증이 필요하다”고 말했다. 곽정수 대기업전문기자
- source_sentence: 사천시가 진행하는 신년 맞이 행사에 참여하려면 어떤 동영상을 봐야 해
  sentences:
  - 'Ⅱ. 미 연준의 비전통적 통화정책 수행원칙

    이 절에서 우리는 먼저 미국 중앙은행의 제도와 정책이 어떤 특성을 가지고 있는지를 살펴보되, 이후 검토할 비전통적인 통화원칙 논의와 관련이 깊은 내용을 중심으로 알아본다. 그리고 금융위기의 과정에서 미 연준이 어떻게
    대응하였는지를 알아보고, 마지막으로 이러한 대응과정에서의 원칙이 무엇이었는지를 고찰해 본다. 1. 미국 중앙은행 제도와 통화정책의 특성

    미국에서 중앙은행의 역할을 하고 있는 연방준비제도(Federal Reserve System, 이하 연준제도 또는 연준)의 가장 큰 특징은 반관반민(半官半民)의 성격이 있다는 점이다. 이 제도를 이루고 있는 세 주체는
    연방준비제도이사회, 지역연준, 그리고 연방공개시장위원회이다. 미국의 수도인 워싱턴에 위치한 연방준비제도이사회(Federal Reserve Board, 정식명칭은 the Board of Governors of the
    Federal Reserve System, 이하 연준이사회)는 공공부문의 성격을 띠고 있으나, 20세기 초반의 경제상황을 반영하여 미국 전역에 분포되어 있는 12개의 연방준비은행(Federal Reserve Banks,
    이하 지역연준)은 법적으로는 완전히 사적인 조직이다. 비록 공공부문이기는 하나 연준이사회의 독립성은 14년이라는 이사의 임기와 예산의 독립성으로 보장되어 있으며, 국민에 대한 책임을 진다는 원칙에 따라 연준이사회는
    의회에 설명할 법적 의무를 진다. 이러한 독립성은 흔히 정부 내에서의 독립(independence within the government)이라고 불리고 있다. 전통적인 통화금융정책에서 가장 중요한 수단인 연방기금금리(federal
    funds rate)를 결정하는 연방공개시장위원회(Federal Open Market Committee, 약어로 FOMC)는 12명으로 구성되어 있다. 연준이사회를 구성하는 7명의 연준이사는 항상 구성원으로 포함되며,
    12명의 지역연준 총재들 중에서 5명이 투표자로 참가함으로써 총 12명이 투표권을 행사한다. 뉴욕 연준의 총재는 연방공개시장위원회의 부의장 자격으로 상시 투표에 참여하고 있으며, 다른 지역연준의 총재들은 2년(시카고
    및 클리블랜드 연준) 혹은 3년(나머지 9개 지역연준)마다 돌아가며 투표권을 나누어 갖고 있다.'
  - 경남 사천시가 신축년 새해를 맞아 18일부터 23일까지 공식 유튜브 채널인 「사천TV」 를 통해 댓글 이벤트를 실시한다고 17일 밝혔다. 이번 이벤트는 사천바다케이블카, 무지개빛 해안도로 등 다른 관광명소에 비해
