  - source_sentence: G드라이브는 코로나19 때문에 재택근무가 확대되자 어떻게 활용되었어
    sentences:
    - 디지털 시대로의 전환은 정부의 일하는 방식에 변화를 가져왔다. 코로나 19의 확산과 함께 재택근무의 실시로 정부원격근무서비스(GVPN), G드라이브가 원격 근무 인프라 및 온라인 협업툴로 활용되었다. GVPN은
      공무원이 인터넷이 연결된 곳이라면 국내‧외 출장지나 집에서 사무실처럼 업무를 처리할 수 있게 해주는 시스템이다. G드라이브는 정부 클라우드 서비스로 2017년 체계적 지식관리 및 행정 업무의 연속성을 확보하기
      위해 서비스를 시작하였다. 업무용 컴퓨터 대신 클라우드에 업무계획, 통계, 정책보고서, 업무편람 등 공무원의 업무 및 정책 자료를 저장·관리하게 되었다. 공무원은 일하는 방식에 있어 GVPN, G드라이브 활용과
      스마트워크센터와 같은 스마트업무환경에 익숙해지고 있다. 그러나 대면문화에 익숙한 조직문화, 접근성이 떨어지는 스마트워크센터, 데이터 활용에 대한 공감대 미흡 등의 어려움이 남아있다. 코로나 장기화로 어쩔 수
      없이 비대면 문화에 익숙해지고 있지만 비대면 환경에서도 업무에 집중할 수 있는 문화로의 전환, 데이터 기반 행정 활성화를 위한 내부 업무 정비 및 표준화 등이 뒷받침되어야 할 것이다.
    - 신종 코로나바이러스 감염증(코로나19) 이후 부상한 긱 이노코미(임시직 경제)가 고용시장을 바꿔놓으면서 ‘긱 워커’를 겨냥한 신생기업(스타트업)들이 뜨고 있다. 긱 워커란 회사에 정규직으로 얽매이지 않고 일정
      기간 계약을 맺고 일하는 초단기 노동자다. 프리랜서 디자이너나 개발자, 각종 배달원, 번역가나 컨설턴트 등이 여기 속한다. 22일 관련업계에 따르면 회사는 정규직 채용보다 비용을 아낄 수 있고, 구직자는 장소와
      시간에 구애 받지 않고 자유롭게 일하며 동시에 여러 계약으로 수익을 올릴 수 있어서 긱 워커를 선호한다. 특히 긱 워커로 일하는 20,30대 MZ세대(밀레니얼+Z세대)들이 늘면서 이들을 겨냥해 사업을 펼치는
      스타트업들도 매출이 증가하거나 대규모 투자를 받고 있다. 대표적인 경우가 긱 워커와 기업을 연결해 주는 중개 스타트업들이다. 전세계에서 이용자가 가장 많은 미국의 업워크는 3,500가지 분야의 긱 워커 1,200만
      명이 이용하고 있다. 이스라엘 스타트업 파이버도 디자이너와 개발자 등 400여 직종의 긱 워커들이 이용하면서 지난해 매출이 전년보다 약 78% 성장했다. 2012년 설립된 크몽은 국내에서 가장 큰 긱 워커 중개
      스타트업이다. 이 업체에 따르면 디자인, 개발자, 영상, 마케팅 등 400여 분야에서 총 25만 명의 긱 워커들이 이용해 거래액이 4년 간 10배 이상 급증했다. 특히 이 곳을 통해 계약을 맺은 개발자, 디자이너,
      영상 및 음악 전문가의 상위 10%는 연 평균 수입이 8,500만~3억4,400만 원에 이른다. 덕분에 크몽은 높은 성장성을 인정 받아 지난 4월 312억 원의 투자를 받았다. 스타트업 브레이브모바일도 이사,
      청소, 실내장식, 반려동물 훈련, 과외, 심리상담 등 1,000여 가지 분야의 긱 워커를 연결해 주는 중개 서비스 ‘숨고’로 지난 14일 320억 원의 투자를 받았다. 이 업체에 따르면 코로나19 이후 각종
      가정용 서비스에 대한 수요가 크게 늘어 지난해 매출이 전년 대비 160% 이상 성장했다. 숨고의 가입자는 약 500만 명이며 누적으로 3,000만 회 이상 긱 워커들에게 일을 제공했다. 채용 플랫폼을 운영하는
      원티드는 긱 워커들에게 인공지능(AI)을 이용해 적합한 일자리를 소개하는 ‘원티드 긱스’ 서비스를 아예 따로 개발했다. 또 일자리 매니저인 매칭 매니저를 도입해 이들이 해당 일자리에 어울리는 긱 워커를 찾아내
      계약부터 업무 진행, 정산까지 모든 과정을 1 대 1로 조율한다. 원티드 관계자는 “원티드 긱스 덕분에 등록된 긱 워커가 1년 만에 36배 증가했고 기업들의 채용 의뢰도 10배 늘었다”고 말했다. 긱 워커 증가에
      맞춰 이들을 위한 스타트업 서비스도 늘고 있다. 금융기술 스타트업 엠마우스는 하나은행, 애큐온저축은행과 함께 긱 워커들에게 월급을 가불해 주는 ‘페이워치’ 앱을 선보였다. 긱 워커가 위성위치확인시스템(GPS)을
      이용해 이 앱으로 출퇴근을 기록하면 일한 날짜만큼 금액을 미리 빌려 쓸 수 있다. 이후 월급을 받을 때 가불액을 제외한 나머지가 입금된다. 세무회계 스타트업 자비스앤빌런즈는 긱 워커를 위한 세무 서비스 ‘삼쩜삼’을
      운영한다. 세금 환급액을 확인하고 수수료 3.3%를 내면 간편하게 세무신고도 할 수 있는 서비스다. 이런 서비스 덕분에 이 업체는 올들어 65억 원을 투자받았다. 관련업계에서는 긱 이코노미 시장이 커지며 긱
      워커를 겨냥한 스타트업과 서비스는 계속 늘어날 것으로 보고 있다. 이복기 원티드랩 대표는 “2025년까지 긱 이코노미의 부가가치가 2,948조 원에 이를 것이라는 외국 컨설팅 업체의 분석이 있다”며 “긱 워커
      시장도 계속 커지면서 이들을 겨냥한 서비스 시장도 함께 증가할 것”이라고 전망했다.
