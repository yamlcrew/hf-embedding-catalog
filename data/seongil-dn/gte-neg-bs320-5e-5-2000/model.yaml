    수산종자이다. 방류해역은 사전에 조사된 인천 주꾸미 서식지 4곳으로 각각 ▲영흥해역(20만3천 마리), ▲강화군 동검도(10만 마리), ▲중구 영종(15만 마리), ▲옹진군 대이작도(5만 마리)이다. 어업인과 낚시인
    모두에게 인기 있는 주꾸미는 급격한 생산량 감소로 산란기 금어기(5. 11.~8. 31.)와 시범방류 품종 지정 등 자원회복을 위한 정부 정책이 시행 중이다. * 주꾸미 금어기: 2018년부터 시행

    ** 해양수산부 수산종자 방류 지침: 2019년부터 시범방류 품종'
  - 해양수산부는 어업이나 양식업에 종사하면서 어촌의 발전을 이끌어나갈 '수산업경영인'을 다음 달 28일까지 모집한다고 밝혔다. 수산업경영인은 어업 종사 경력에 따라 '어업인후계자'와 '우수경영인' 등 2단계로 나뉜다.
    어업인후계자는 만 50세 미만이고 어업분야 종사 경력이 없거나 10년 미만인 사람 중에서 선정한다. 우수경영인은 만 60세 이하로 어업인후계자 선정 후 5년 이상 지난 사람 가운데에서 선발한다. 어업인후계자는 연간
    금리 2％와 10년 상환의 조건으로 최대 3억 원까지, 우수경영인은 연리 1％와 15년 상환 조건으로 최대 2억 원까지 융자 지원을 받을 수 있다. 신청은 각 지방자치단체에 하면 된다. 해수부는 어업인후계자 300명,
    우수경영인 50명을 선발해 4월 중 해당 지자체에 공지할 예정이다.
- source_sentence: 안정적인 경제성장과 소비 증가 등 능력을 키우고 있으며 인구 6억 3000만 명의 거대 경제권으로 구성된 동남아시아 단체는 뭐지
  sentences:
  - 중국의 창지투개발계획 등 동북지역 개발전략은 동북아에서 실질적으로 개발협력의 기회를 제공한다는 점에서 중요한 의미를 가진다. 중국 동북지역은 인구가 1억명을 초과하고, 세계 20위권국가 규모에 해당하는 8,000억
    달러의 GDP(2012년)와 높은 경제성장률을 보이고 있는 지역으로 최근 러시아 극동지역과 한반도 북부를 포함하는 동북아 지역개발의 실질적인 중심역할을 하고 있다. 북한은 두만강유역에서의 개발을 추진할 능력을 보유하지
    못하고 있고, 러시아는 비록 동북아에서의 전략적 지위 확보에 관심이 있지만 실질적인 개발투자를 실행할 능력은 보유하고 있지 못하며, 남한도 동북아지역의 개발을 주도할 만한 전략과 자금력을 갖추고 있지 못하다는 점에서
    중국 주도의 두만강유역 개발을 부정적으로만 평가할 수 없는 상황이라 할 수 있다. 따라서, 한국은 중국 및 러시아와 두만강유역에서의 적극적 협력을 통해 남, 북, 중, 러 네 나라의 공동이익을 최대화하면서 한반도경제와
    대륙경제의 통합을 위한 장기포석을 마련할 필요가 있다.
