    - 또한 유치원의 방과후 과정 및 어린이집의 특별활동과 사교육 관련 질문을 혼동하는 경우가 있어, 두 질문을 구분할 수 있도록 질문배치와 지침의 위치 등을 수정하도록 제안하였다. ‘일반과목’, ‘논술’ 등의 표현이
      적절하지 않다는 지적이 있어 구체적으로 표현할 것과, 사교육 이유 항목의 표현을 수정할 것을 제안했다. 사교육 시간 항목은 유아 사교육이 분 단위로 짧게 진행되는 경우가 많다는 점을 고려해, 시간 단위로만 응답하던
      방식에서 시간과 분으로 응답하도록 제안했다. 그 밖에 사교육 과목과 유형, 인적사항 항목 등에 대한 표현 검토를 제안했으며, 가정 양육 조사표의 반일제 이상 학원 누락 오류를 줄이기 위해 지침의 배치 등을 조정하도록
      했다. 3차 인지면접에서는 2차 인지면접 결과를 반영하여 수정된 조사표의 개선효과를 평가하는데 초점을 두었다. 3차 인지면접 결과, 조사표 구조 인식 개선효과는 확인되었지만 여전히 응답오류나 오류 가능성이 발견되었다.
      따라서 응답오류 방지를 위해 조사표 첫 부분이나 조사 안내문에 전체 조사표 구조에 대한 설명을 제시할 필요가 있어 보인다. 또한 데스크톱이나 모바일조사표를 설계할 때, 전체 사교육 과목으로 선택한 과목을 해당
      질문에 제시하면서 과목을 강조하여 제시할 필요가 있다.
    - "글로벌 전문기업 400개 육성을 위한 2차 후보기업 모집 착수\n□ 산업통상자원부(장관 윤상직)는 수출 1억불 이상 글로벌 전문기업 400개 육성(2017년)을 위해 3.3(월)부터 2차 글로벌 전문 후보기업\
      \ 모집에 들어간다고 밝힘\nㅇ 지난해 9월 산업부는 “글로벌 전문기업 육성 방안”을 발표(경제관계장관회의, 9.23)하고 1차 글로벌 전문 후보기업 46개사를 선정하여 기업의 글로벌화를 위한 다양한 시책을\
      \ 지원 중에 있음\nㅇ 2차 글로벌 전문 후보기업은 최근 3년간 연간 수출 2천만불 이상 1억불 미만 실적이 있는 중소·중견기업 중에서 수출잠재력, 매출대비 수출비율, 수출확대계획 등을 종합적으로 고려하여\
      \ 4월 중 선정될 예정\n□ 글로벌 전문 후보기업에 선정된 기업은 4대 플랫폼을 통해 기업 글로벌화를 위한 프리미엄 종합지원 프로그램을 제공받고, 산업부와 유관기관의 기존 시책도 우대*하여 지원받을 수 있음\
      \ * IP스타기업(특허청) 선정 평가시 후보기업에 5점 가점 부여, 표준기술력향상사업(국가기술표준원) 평가시 7점 가점 등 \n□ 관심 있는 기업은 4.1일까지 한국산업기술진흥원(KIAT)에 접수신청하면 되며\
      \ 산업부와 진흥원은 후보기업 선정 평가를 거쳐 4월 중 최종 선정기업을 확정할 예정임 * 사업설명회 일정 : 3.12(수) 15:00 대한상공회의소 국제회의실"
    - '산업부, 글로벌전문기술개발사업에 1,565억원 지원

      □ 산업통상자원부(장관 윤상직)는 국내 중소․중견기업의 기술경쟁력 강화를 통해 글로벌전문기업으로 육성하기 위한 ‘2014년도 글로벌 전문기술개발사업(주력 및 신산업)‘의 신규 지원계획을 공고함

      ㅇ 동 사업은 글로벌 기술경쟁력을 보유한 우수 중소·중견기업을육성하는 산업부의 대표 R&D사업으로, 지원 규모는 과제 특성에따라 최대 5년 이내에서 매년 2~10억원 규모임 □ 2014년 글로벌전문기술개발사업(주력
      및 신산업) 지원 예산 1,565억원 중 금번 신규 지원 공고대상은 5개 내역사업, 413억원 규모임

      ㅇ 섬유생활스트림, 해양레저장비, 개인용이동수단, 청정생산기반 등 4개 사업의 신규 예산은 223억원으로,

      - 품목지정형 과제* 32개에 153.29억원을 지원하며,

      * 품목 : 단위 기술이 아닌 ‘주요 성능을 포함한 제품 혹은 제품군’을 의미

      - (예) 고기능성 친환경 벽지제품, 휴대용 접이식 전기자전거, 등

      * 품목지정형 과제수 : 섬유생활스트림 25개, 해양레저장비 2개, 개인용 이동수단 2개, 청정생산기반 3개

      - 자유공모형 과제는 섬유생활스트림, 해양레저장비, 청정생산기반 등 3개 사업에서 69.67억원을 지원함

      ㅇ 우수기술연구센터(ATC) 사업은 자유공모형 과제를 지원하며, 우수 중소·중견기업 부설연구소 40개 내외를 선정하여 190억원을 지원함'
  - source_sentence: 주꾸미어종의 낚시금지기간은 언제야
    sentences:
    - 7월 1일부터 낚시어선도 출항 전 비상대응요령 안내 의무화<br>낚시어선의 안전운항 등을 위한 안내(게시용) (예)<br>2. 주요 낚시어종의 포획금지 체장․체중 등 수산자원 보호 <table><tbody><tr><td>어종</td><td>금지기간</td><td>금지구역</td><td>금지체장․체중</td></tr><tr><td>주꾸미</td><td>5.11～8.31</td><td>전국</td><td>-</td></tr><tr><td>갈치</td><td>7.1～7.31<br>(근해채낚기어업과
      연안복합어업 제외)</td><td>전국</td><td>18㎝이하(항문장)</td></tr><tr><td>문치가자미</td><td>12.1～1.31</td><td>전국</td><td>15㎝이하</td></tr><tr><td>넙치</td><td>-</td><td>-</td><td>21㎝이하</td></tr><tr><td>농어</td><td>-</td><td>-</td><td>30㎝이하</td></tr></tbody></table>
    - '인천시 주꾸미 방류..“잘 커서 돌아올게요!” - 자체 생산 주꾸미 수산종자 50만여 마리를 인천 바다에 방류 -

      인천광역시(시장 박남춘)는 수산자원연구소에서 자체 생산한 주꾸미 수산종자 50만여 마리를 7월 말까지 인천 앞바다에 방류한다고 밝혔다. 이번에 생산한 주꾸미 수산종자는 50일 동안 대량양식 기술을 통해 생산한
      우량 수산종자이다. 방류해역은 사전에 조사된 인천 주꾸미 서식지 4곳으로 각각 ▲영흥해역(20만3천 마리), ▲강화군 동검도(10만 마리), ▲중구 영종(15만 마리), ▲옹진군 대이작도(5만 마리)이다. 어업인과
      낚시인 모두에게 인기 있는 주꾸미는 급격한 생산량 감소로 산란기 금어기(5. 11.~8. 31.)와 시범방류 품종 지정 등 자원회복을 위한 정부 정책이 시행 중이다. * 주꾸미 금어기: 2018년부터 시행

      ** 해양수산부 수산종자 방류 지침: 2019년부터 시범방류 품종'
    - 해양수산부는 어업이나 양식업에 종사하면서 어촌의 발전을 이끌어나갈 '수산업경영인'을 다음 달 28일까지 모집한다고 밝혔다. 수산업경영인은 어업 종사 경력에 따라 '어업인후계자'와 '우수경영인' 등 2단계로 나뉜다.
      어업인후계자는 만 50세 미만이고 어업분야 종사 경력이 없거나 10년 미만인 사람 중에서 선정한다. 우수경영인은 만 60세 이하로 어업인후계자 선정 후 5년 이상 지난 사람 가운데에서 선발한다. 어업인후계자는
      연간 금리 2％와 10년 상환의 조건으로 최대 3억 원까지, 우수경영인은 연리 1％와 15년 상환 조건으로 최대 2억 원까지 융자 지원을 받을 수 있다. 신청은 각 지방자치단체에 하면 된다. 해수부는 어업인후계자
      300명, 우수경영인 50명을 선발해 4월 중 해당 지자체에 공지할 예정이다.
  - source_sentence: 안정적인 경제성장과 소비 증가 등 능력을 키우고 있으며 인구 6억 3000만 명의 거대 경제권으로 구성된 동남아시아 단체는 뭐지
    sentences:
    - 중국의 창지투개발계획 등 동북지역 개발전략은 동북아에서 실질적으로 개발협력의 기회를 제공한다는 점에서 중요한 의미를 가진다. 중국 동북지역은 인구가 1억명을 초과하고, 세계 20위권국가 규모에 해당하는 8,000억
      달러의 GDP(2012년)와 높은 경제성장률을 보이고 있는 지역으로 최근 러시아 극동지역과 한반도 북부를 포함하는 동북아 지역개발의 실질적인 중심역할을 하고 있다. 북한은 두만강유역에서의 개발을 추진할 능력을
      보유하지 못하고 있고, 러시아는 비록 동북아에서의 전략적 지위 확보에 관심이 있지만 실질적인 개발투자를 실행할 능력은 보유하고 있지 못하며, 남한도 동북아지역의 개발을 주도할 만한 전략과 자금력을 갖추고 있지
      못하다는 점에서 중국 주도의 두만강유역 개발을 부정적으로만 평가할 수 없는 상황이라 할 수 있다. 따라서, 한국은 중국 및 러시아와 두만강유역에서의 적극적 협력을 통해 남, 북, 중, 러 네 나라의 공동이익을
      최대화하면서 한반도경제와 대륙경제의 통합을 위한 장기포석을 마련할 필요가 있다.
    - "자연‧문화 자원 조사현황\x03<br> 문화경관 자원 <table><tbody><tr><td colspan='2'>구분</td><td>명칭</td><td>지정번호</td><td>비고</td></tr><tr><td\
