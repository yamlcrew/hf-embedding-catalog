    sentences:
    - 'Ⅱ. 미 연준의 비전통적 통화정책 수행원칙

      이 절에서 우리는 먼저 미국 중앙은행의 제도와 정책이 어떤 특성을 가지고 있는지를 살펴보되, 이후 검토할 비전통적인 통화원칙 논의와 관련이 깊은 내용을 중심으로 알아본다. 그리고 금융위기의 과정에서 미 연준이
      어떻게 대응하였는지를 알아보고, 마지막으로 이러한 대응과정에서의 원칙이 무엇이었는지를 고찰해 본다. 1. 미국 중앙은행 제도와 통화정책의 특성

      미국에서 중앙은행의 역할을 하고 있는 연방준비제도(Federal Reserve System, 이하 연준제도 또는 연준)의 가장 큰 특징은 반관반민(半官半民)의 성격이 있다는 점이다. 이 제도를 이루고 있는 세
      주체는 연방준비제도이사회, 지역연준, 그리고 연방공개시장위원회이다. 미국의 수도인 워싱턴에 위치한 연방준비제도이사회(Federal Reserve Board, 정식명칭은 the Board of Governors
      of the Federal Reserve System, 이하 연준이사회)는 공공부문의 성격을 띠고 있으나, 20세기 초반의 경제상황을 반영하여 미국 전역에 분포되어 있는 12개의 연방준비은행(Federal Reserve
      Banks, 이하 지역연준)은 법적으로는 완전히 사적인 조직이다. 비록 공공부문이기는 하나 연준이사회의 독립성은 14년이라는 이사의 임기와 예산의 독립성으로 보장되어 있으며, 국민에 대한 책임을 진다는 원칙에
      따라 연준이사회는 의회에 설명할 법적 의무를 진다. 이러한 독립성은 흔히 정부 내에서의 독립(independence within the government)이라고 불리고 있다. 전통적인 통화금융정책에서 가장
      중요한 수단인 연방기금금리(federal funds rate)를 결정하는 연방공개시장위원회(Federal Open Market Committee, 약어로 FOMC)는 12명으로 구성되어 있다. 연준이사회를 구성하는
      7명의 연준이사는 항상 구성원으로 포함되며, 12명의 지역연준 총재들 중에서 5명이 투표자로 참가함으로써 총 12명이 투표권을 행사한다. 뉴욕 연준의 총재는 연방공개시장위원회의 부의장 자격으로 상시 투표에 참여하고
      있으며, 다른 지역연준의 총재들은 2년(시카고 및 클리블랜드 연준) 혹은 3년(나머지 9개 지역연준)마다 돌아가며 투표권을 나누어 갖고 있다.'
