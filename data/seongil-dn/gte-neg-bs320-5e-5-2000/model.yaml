      \ </td></tr><tr><td>소쩍새</td><td>제324호</td><td> </td></tr><tr><td>명승(1)</td><td>태백 검룡소</td><td>제73호</td><td> </td></tr><tr><td>중요민속문화재(1)</td><td>태백산\
      \ 천제단</td><td>제228호</td><td> </td></tr><tr><td>지방 지정</td><td>강원도 민속문화재(1)</td><td>태백산 석장승</td><td>제4호</td><td> </td></tr><tr><td>기타</td><td>민속자원(5)</td><td>검룡소(儉龍沼)기우제(祈雨祭),\
      \ 두문동재, 불바래기, 창죽, 예터</td><td> </td><td> </td></tr></tbody></table> [주요 문화경관 자원 현황]"
    - 2008년 금융위기 이후 세계경제의 전반적 침체는 수출주도 성장을 지속해온 우리나라 경제에 위기를 가져왔다. 우리 경제는 위기 극복을 위해 내수시장 활성화 등의 정책을 제시하고 있으나, 아직까지 뚜렷한 반전의
      모멘텀을 찾지 못한 것으로 판단된다. 그러므로 대외의존도가 높은 우리나라의 경제구조하에서 위기 극복은 수출 및 무역의 확대를 통해 이루어져야 한다. 이러한 측면에서 볼 때 최근 ASEAN 경제 통합 강화 흐름은
      활용 여하에 따라 우리가 처한 경제 위기를 극복할 수 있는 하나의 단초를 제공할 수 있다. 동남아시아 10개 국가로 구성된 아세안은 인구 6억 3,000만명의 거대 경제권으로 최근 안정적인 경제성장, 중산층
      확대에 따른 소비증대, 젊은층의 비중이 높은 인구학적 장점 등은 시장 및 생산기반으로서의 잠재력을 점증시키고 있다.
