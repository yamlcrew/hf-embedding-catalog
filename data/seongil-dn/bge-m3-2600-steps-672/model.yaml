- source_sentence: where are dna nucleotides found
  sentences:
  - 'A: Nucleotides are made up of a phosphate group, a five-ring sugar and a nitrogenous base. Nucleic acids, such as deoxyribonucleic
    acid (DNA) and ribonucleic (RNA), contain repeating nucleotides. Nucleotides link together to form nucleic acids by connecting
    the phosphate group of one nucleotide to the sugar of another. Continue Reading'
  - 'A nucleotide consists of three things: 1  A nitrogenous base, which can be either adenine, guanine, cytosine, or thymine
    (in the case of RNA, thymine is replaced by uracil). 2  A five-carbon sugar, called deoxyribose because it is lacking
    an oxygen group on one of its carbons. 3  One or more phosphate groups.'
