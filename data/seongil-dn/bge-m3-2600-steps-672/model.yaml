- source_sentence: what is the name of the region at the back of the eye
  sentences:
  - 'The eyeball has 3 main layers: the sclera, the uvea, and the retina. Sclera: The sclera is the tough, white covering
    over most of the outside of the eyeball. In the front of the eye it is continuous with the cornea, which is clear to let
    light through. Uvea: The uvea is the middle layer of the eyeball.ntraocular melanoma (melanoma of the eye). Intraocular
    melanoma is the most common type of cancer that develops within the eyeball in adults, but it is still fairly rare. Melanomas
    of the skin are much more common than intraocular melanomas.'
  - The beginning of the optic nerve in the retina is called the optic nerve head or optic disc. Since there are no photoreceptors
    (cones and rods) in the optic nerve head, this area of the retina cannot respond to light stimulation.As a result, it
    is known as the blind spot, and everybody has one in each eye.rom there, the nerve fibers become the optic tract, passing
    through the thalamus and turning into the optic radiation until they reach the visual cortex in the occipital lobe at
    the back of the brain. This is where the visual center of the brain is located.
  - Subconjunctival hemorrhage facts. 1  The conjunctiva is the thin tissue that covers the sclera. 2  It is the outermost
    protective coating of the eyeball. 3  The small blood vessels within the conjunctiva may break spontaneously or from injury,
    causing a red area on the sclera, resulting in a subconjunctival hemorrhage.
  - To test visual sensitivity a more careful experiment must be performed. The retina at the back of the human eye has two
    types of receptors, known as cones and rods. The cones are responsible for colour vision, but are much less sensitive
    to low light than the rods. In bright light the cones are active and the iris is stopped down. This is called photopic
    vision. When we enter a dark room, the eyes first adapt by opening up the iris to allow more light in.
  - 1 If the condition affects the top, outer side of the front of the eyelids, it is called anterior blepharitis, a condition
    with a disease process similar to that of seborrheic dermatitis of the face and scalp. Blepharitis is an inflammatory
    condition affecting the area around the base of the eyelashes. 2  It can be acute, but that form is better described as
    eyelid infection (bacterial or viral), whereas chronic forms of the inflammation are diagnosed as blepharitis.
  - Vitrectomy (Trans Pars Plana Vitrectomy). Vitrectomy is the surgical removal of vitreous gel from the middle and back
    of the inner eye. The vitreous gel fills the back 80% of the inner eye, otherwise known as the vitreous cavity, which
    is directly in front of the retina.
