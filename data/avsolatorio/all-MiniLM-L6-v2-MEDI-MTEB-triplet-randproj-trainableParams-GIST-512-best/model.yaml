  - Outpatient quick diagnosis units (QDUs) have become an increasingly recognized alternative to hospitalization for the
    diagnosis of a number of potentially serious diseases. No study has prospectively evaluated the usefulness of QDU for
    the diagnosis of unexplained fever.We prospectively assessed patients referred to QDU due to fever of uncertain nature
    (FUN), defined as a temperature> 38 °C during at least 1 week and no diagnosis after a previous evaluation. We also evaluated
    consecutive patients with FUN who were hospitalized during the same period. QDU and hospital costs were analysed by micro-costing
    techniques.We evaluated 176 QDU patients and 168 controls. QDU patients were younger and required fewer investigations
    than controls. QDU patients had higher prevalence of viral infections (36% vs. 8%, P < 0·001) and lower prevalence of
    bacterial infections (6% vs. 46%, P < 0·001) and malignancies (2% vs. 14%, P < 0·001). While time-to-diagnosis of QDU
    patients was longer than length-of-stay of controls (25·82 vs.12·89 days, P < 0·001), 56% of QDU patients only required
    up to two visits. Cost per QDU patient was €644·59, while it was €4404·64 per hospitalized patient.
  - Early countershock of ventricular fibrillation (VF) has been shown to improve immediate and long-term outcome of out-of-hospital
    cardiac arrest. However, studies indicate that countershock of prolonged VF most commonly results in asystole or a nonperfusing
    bradyarrhythmia (pulseless electrical activity [PEA]), which rarely respond to current therapy. The cause of these postcountershock
    rhythm disturbances is not well understood but may be related to electrical injury of the globally ischemic myocardium
    or to local metabolic abnormalities that impair impulse formation and cardiac contraction. The purpose of this study was
    to evaluate changes in serum potassium and free calcium homeostasis during cardiac arrest and advanced cardiac life support
    (ACLS) interventions.After sedation, intubation, anesthesia, and instrumentation, VF was induced in 13 dogs. After 7.5
    minutes of VF, animals were immediately countershocked, standard closed-chest CPR was initiated, and epinephrine was administered
    (1 mg in repeated doses if necessary).Ten animals could not be resuscitated despite 20 minutes of ACLS interventions.
    In these animals, a progressive increase in serum potassium was observed from the onset of ACLS to the termination of
    resuscitation efforts (4.3+/-.6 to 6.0+/-.8 mEq/L, P<.01). A significant increase was observed within 10 minutes of beginning
    ACLS measures. This was accompanied by a decrease in ionized calcium concentration over the same period (4.95+/-.40 to
    3.44 mg/dL, P<.01). The decrease in ionized calcium was significant within 5 minutes of ACLS interventions. Nine of these
    10 animals had either postcountershock asystole or PEA at the termination of resuscitative efforts. The increase in potassium
    was not related to acidemia. Successfully resuscitated animals did not demonstrate these electrolyte changes.
- source_sentence: Does living in an urban environment confer advantages for childhood nutritional status?
  sentences:
  - Increasing evidence exists that hyperprolactinemia alters metabolic profile. The mechanism of this effect is unknown.
    We aimed to investigate the differences between the metabolic profile of patients with prolactinomas and nonfunctional
    pituitary adenomas and to evaluate the impact of other pituitary hormones on their metabolic profile.Our retrospective
    study included 86 consecutive patients with prolactinomas and nonfunctional adenomas (29 prolactinomas and 57 adenomas).
    Body mass index (BMI), blood pressure, serum prolactin, growth hormone (GH), insulin-like growth factor I (IGF-I), adrenocorticotropic
    hormone (ACTH), cortisol, urinary free cortisol, triiodothyronine (T3), thyroxine (T4), thyroid-stimulating hormone (TSH),
    dehydroepiandrosterone-sulfate (DHEA-S), testosterone in men, triglycerides, total cholesterol, HDL (high-density lipoprotein)
    cholesterol, LDL (Low-density lipoprotein) cholesterol, alanine-transaminase, aspartate-transaminase, fasting glucose,
    and C-reactive protein (CRP) were obtained for all patients. Regression analyses were performed on log-transformed data.After
    adjustment for age, gender, and tumor size, prolactinomas were associated with higher BMI (OR 5.61, 95%CI 1.70-9.51, p
    = 0.005), LDL cholesterol (OR 3.60, 95%CI 1.35-5.93, p = 0.015), DHEA-S (OR 1.97, 95%CI 1.23-3.72, p = 0.026), and lower
    GH levels (OR 0.43, 95%CI 0.03-0.84, p = 0.037). In a linear multivariate regression, the association between DHEA-S,
    GH, and prolactin remained significant even after adjustment for BMI. GH and IGF-I were associated with BMI and LDL cholesterol,
    but the association diminished after adjustment for serum prolactin.
  - The purpose of this paper is to examine the relationship between childhood undernutrition and poverty in urban and rural
    areas.Anthropometric and socio-economic data from Multiple Indicator Cluster Surveys in Angola-Secured Territory (Angola
    ST), Central African Republic and Senegal were used in this analysis. The population considered in this study is children
    0-59 months, whose records include complete anthropometric data on height, weight, age, gender, socio-economic level and
    urban or rural area of residence. In addition to simple urban/rural comparisons, the population was stratified using a
    wealth index based on living conditions and asset ownership to compare the prevalence, mean Z-score and odds ratios for
    stunting and wasting.In all cases, when using a simple urban/rural comparison, the prevalence of stunting was significantly
    higher in rural areas. However, when the urban and rural populations were stratified using a measure of wealth, the differences
    in prevalence of stunting and underweight in urban and rural areas of Angola ST, Central African Republic and Senegal
    disappeared. Poor children in these urban areas were just as likely to be stunted or underweight as poor children living
    in rural areas. The odds ratio of stunting in the poorest compared with the richest quintile was 3.4, 3.2 and 1.5 in Angola
    ST, Senegal and Central African Republic, respectively.
  - To investigate artificial tears containing different preservatives for antimicrobial efficacy. Based on the challenge
    test outlined in the European Pharmacopoeia, products were tested in their original containers to see whether their component
    preservative had sufficient activity.Five brands of over-the-counter artificial tears each containing different preservatives
    (benzalkonium chloride/EDTA, parabens, chlorobutanol, silver chloride complex, and Purite-stabilized oxychloro complex)
    were inoculated with test microorganisms (Pseudomonas aeruginosa, Staphylococcus aureus, and Candida albicans). Changes
    in the microbial start concentration with time were followed by plating onto growth media to provide a measure of the
    preservative efficacy. In another test, artificial tears were applied to paper disks that were then placed onto agar growth
    media seeded with microorganisms. Zones of inhibition were measured after incubation.Only the brand of artificial tears
    containing benzalkonium chloride/EDTA satisfied the major criteria for antimicrobial preservation for all the test microorganisms.
    Only a benzalkonium chloride/EDTA-containing disk placed on agar seeded with S. aureus produced a zone of inhibition in
    the agar diffusion test.
