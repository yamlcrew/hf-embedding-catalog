- source_sentence: 'RF-VH5972 Satış ve Pazarlama Müdürü Tuğlar Turizm Otelcilik Gıda Tasıma San ve Tic Lt Kars


    Kars Sarıkamış Kayak Merkezinde yer alan 5 yıldızlı tam pansiyon konsepti olan ''''Sarpino Mountain Hotel''''  bünyesinde 
    ‘Satış ve Pazarlama Müdürü” olarak görev alacak takım arkadaşı aramaktayız. 


     Üniversitelerin ilgili bölümlerinden mezun, tercihen Turizm İşletme vb.


    ·         Otelde uygulanacak fiyatlar konusunda genel yönetim ile periyodik toplantılar yapmak, çevre otellerin fiyatlarını
    da inceleyerek uygulanacak fiyatları saptamak, yönetimin onayına sunmak ve onayı takiben yeni fiyatların duyurulması konusunda
    çalışma yapmak,


    ·         Yurt içinde ve Yurt dışında otelin imajını en iyi şekilde tanıtmak,


    ·         Online satış kanalları konusunda tecrübeli ve fiyat takibini yapabilecek,


    ·         Acenta ve kurumsal müşteri portföyü olan,


    ·         Alanında en az 3 yıl deneyim sahibi,


    ·         İyi derecede İngilizce bilen, Elektra ve Office programlarına hakim,


    ·         Güler yüzlü, diksiyonu düzgün, iletişim yönü kuvvetli, misafir memnuniyeti odaklı çalışabilen,


    '
