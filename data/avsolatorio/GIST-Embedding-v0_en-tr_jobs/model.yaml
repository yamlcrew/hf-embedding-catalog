- source_sentence: "RF-CU81810 Pazarlama Yöneticisi / Yönetmeni Finansevim Gayrimenkul Otomotiv İletişimOrg. Paz. İstanbul(Asya)\n\
    \n  \n\n\n'Hayata Değer Katan Projeler Üretmek' mottosu ile yola çıkan Kolo Holding bünyesindeki Finansevim Şirketimizde\
    \ görevlendirilmek üzere ‘Pazarlama Yöneticisi / Yönetmeni ’arayışımız bulunmaktadır.  \n\n\n  \n\n\n*GENEL NİTELİKLER*\n\
    \n* Üniversitelerin ilgili bölümlerinden mezun,\n* Çok iyi düzeyde İngilizce bilen,\n* MS Office ve MS Outlook programlarına\
    \ hâkim,\n* Sektörü ve potansiyel pazarları analiz edebilen,\n* Fuar takibi, katılımı ve müşteri portföyü geliştirilmesinde\
    \ deneyimli,\n* Problem çözme ve organizasyon yeteneğine sahip,\n* Analitik düşünce yapısına sahip, takım çalışmasına\
    \ yatkın, güçlü liderlik vasıflarına sahip, kişisel ilişki yönetimi konusunda başarılı,\n* Ortaya çıkarılan ürünlerin\
    \ satışta ve pazarlamadaki yansımalarını gözlemleyebilecek, analiz edebilecek ve öngörüde bulunabilecek deneyime sahip\
    \ olan,\n* Ürün geliştirme ve marka yönetimi tecrübesi olan,yeni ekip kurma ve bölüm oluşturma konularında tecrübeli olmak\n\
    * PR, Reklam, Kurumsal İletişim ve Marka Yönetimi alanlarında deneyimli,\n* Seyahat engeli bulunmayan.\n\n \n\n*İŞİN TANIMI*\n\
    \n* Ürün ve hizmetleri tanıtmak için pazarlama kampanyaları geliştirmek\n* Anahtar müşteriler ile ilişki kurarak anlaşmaları\
    \ müzakere etmek,\n* Satış ve pazarlama faaliyet bütçelerini yönetmek,\n* Müşteri kitlelerini tanımlamak amacıyla araştırma\
    \ yapmak ve verileri analiz etmek,\n* Yeni fikir ve stratejiler tasarlamak,\n* Basılı, çevrim içi, elektronik medya ve\
    \ doğrudan posta dahil olmak üzere reklam ve tanıtım faaliyetlerini planlamak,\n* Tutarlı bir kurumsal imaj tesis etmek,\n\
    * Pazar araştırmasını değerlendirmek ve değişen rekabet koşullarını karşılamak için pazarlama stratejisi düzenlemek,\n\
    * Rakip ürünlerin, satış ve pazarlama faaliyetlerini izlemek,\n* Reklam, üretim, satış ve dağıtım gibi departman çalışanları\
    \ ile işbirliği içerisinde olmak,\n* Pazarlama faaliyet raporlarının hazırlanmasına rehberlik etmek ve yönetime sunmak,\n\
    * Gelişen pazarlama stratejilerinden haberdar olmak.\n\nPazarlama Yöneticisi / Yönetmeni Satış Ve Pazarlama Pazarlama\
    \ İletişimi Pazarlama Analizi Pazar Geliştirme Stratejik Pazarlama Pazarlama Dijital Pazarlama "
