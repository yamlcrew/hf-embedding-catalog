  - source_sentence: What are the genetic changes related to familial glucocorticoid deficiency ?
    sentences:
    - Mutations in the MC2R, MRAP, and NNT genes account for the majority of cases of familial glucocorticoid deficiency;
      mutations in other genes, some known and some unidentified, can also cause this condition.  The MC2R gene provides instructions
      for making a protein called adrenocorticotropic hormone (ACTH) receptor, which is found primarily in the adrenal glands.
      The protein produced from the MRAP gene transports the ACTH receptor from the interior of the cell to the cell membrane.
      When the ACTH receptor is embedded within the cell membrane, it is turned on (activated) by the MRAP protein. Activated
      ACTH receptor can then attach (bind) to ACTH, and this binding triggers the adrenal glands to produce glucocorticoids.
      MC2R gene mutations lead to the production of a receptor that cannot be transported to the cell membrane or, if it does
      get to the cell membrane, cannot bind to ACTH. MRAP gene mutations impair the transport of the ACTH receptor to the
      cell membrane. Without the binding of the ACTH receptor to its hormone, there is no signal to trigger the adrenal glands
      to produce glucocorticoids.  The NNT gene provides instructions for making an enzyme called nicotinamide nucleotide
      transhydrogenase. This enzyme is found embedded in the inner membrane of structures called mitochondria, which are the
      energy-producing centers of cells. This enzyme helps produce a substance called NADPH, which is involved in removing
      potentially toxic molecules called reactive oxygen species that can damage DNA, proteins, and cell membranes. NNT gene
      mutations impair the enzyme's ability to produce NADPH, leading to an increase in reactive oxygen species in adrenal
      gland tissues. Over time, these toxic molecules can impair the function of adrenal gland cells and lead to their death
      (apoptosis), diminishing the production of glucocorticoids.
    - "Heart conditions and other disorders, age-related changes, rheumatic fever, or infections can cause acquired heart\
      \ valve disease. These factors change the shape or flexibility of once-normal heart valves.\n                \nThe cause\
      \ of congenital heart valve disease isnt known. It occurs before birth as the heart is forming. Congenital heart valve\
      \ disease can occur alone or with other types of congenital heartdefects.\n                \nHeart Conditions and Other\
      \ Disorders\n                \nCertain conditions can stretch and distort the heart valves. These conditions include:\n\
      \                \nAdvanced high blood pressure and heart failure, thiscan enlarge the heart or the main arteries.\n\
      \                \nAtherosclerosis in the aorta. Atherosclerosis is a condition in which a waxy substance called plaque\
      \ builds up inside the arteries. The aorta is the main artery that carries oxygen-rich blood to the body.\n        \
      \        \nDamage and scar tissue due to a heart attack or injury to the heart.\n                \nRheumatic Fever\n\
      \                \nUntreated strep throat or other infections with strep bacteria that progress to rheumatic fever can\
      \ cause heart valve disease.\n                \nWhen the body tries to fight the strep infection, one or more heart\
      \ valves may be damaged or scarred in the process. The aortic and mitral valves most often are affected. Symptoms of\
      \ heart valve damage often dont appear until many years after recovery from rheumatic fever.\n                \nToday,\
      \ most people who have strep infections are treated with antibiotics before rheumatic fever occurs. If you have strep\
      \ throat, take all of the antibiotics your doctor prescribes, even if you feel better before the medicine is gone.\n\
      \                \nHeart valve disease caused by rheumatic fever mainly affects older adults who had strep infections\
      \ before antibiotics were available. It also affects people from developing countries, where rheumatic fever is more\
      \ common.\n                \nInfections\n                \nCommon germs that enter the bloodstream and get carried to\
      \ the heart can sometimes infect the inner surface of the heart, including the heart valves. This rare but serious infection\
      \ is called infective endocarditis.\n                \nThe germs can enter the bloodstream through needles, syringes,\
      \ or other medical devices and through breaks in the skin or gums. Often, the bodys defenses fight off the germs and\
      \ no infection occurs. Sometimes these defenses fail, which leads to infective endocarditis.\n                \nInfective\
      \ endocarditis can develop in people who already have abnormal blood flow through a heart valve as the result of congenital\
      \ or acquired heart valve disease. The abnormal blood flow causes blood clots to form on the surface of the valve. The\
      \ blood clots make it easier for germs to attach to and infect the valve.\n                \nInfective endocarditis\
      \ can worsen existing heart valve disease.\n                \nOther Conditions and Factors Linked to Heart Valve Disease\n\
      \                \nMany other conditions and factors are linked to heart valve disease. However, the role they play\
      \ in causing heart valve disease often isnt clear.\n                \nAutoimmune disorders. Autoimmune disorders, such\
      \ as lupus, can affect the aortic and mitral valves.\n                \nCarcinoid syndrome. Tumors in the digestive\
      \ tract that spread to the liver or lymph nodes can affect the tricuspid and pulmonary valves.\n                \nDiet\
      \ medicines. The use of fenfluramine and phentermine (fen-phen) sometimes has been linked to heart valve problems. These\
      \ problems typically stabilize or improve after the medicine is stopped.\n                \nMarfan syndrome. Congenital\
      \ disorders, such as Marfan syndrome and other connective tissue disorders, can affect the heart valves.\n         \
      \       \nMetabolic disorders. Relatively uncommon diseases (such as Fabry disease) and other metabolic disorders (such\
      \ as high blood cholesterol) can affect the heart valves.\n                \nRadiation therapy. Radiation therapy to\
      \ the chest area can cause heart valve disease. This therapy is used to treat cancer. Heart valve disease due to radiation\
      \ therapy may not cause symptoms until years after the therapy."
    - 'Dengue is an infection caused by a virus. You can get it if an infected mosquito bites you. Dengue does not spread
      from person to person. It is common in warm, wet areas of the world. Outbreaks occur in the rainy season. Dengue is
      rare in the United States.     Symptoms include a high fever, headaches, joint and muscle pain, vomiting, and a rash.
      In some cases, dengue turns into dengue hemorrhagic fever, which causes bleeding from your nose, gums, or under your
      skin. It can also become dengue shock syndrome, which causes massive bleeding and shock. These forms of dengue are life-threatening.    There
      is no specific treatment. Most people with dengue recover within 2 weeks. Until then, drinking lots of fluids, resting
      and taking non-aspirin fever-reducing medicines might help. People with the more severe forms of dengue usually need
      to go to the hospital and get fluids.    To lower your risk when traveling to areas where dengue is found       - Wear
      insect repellent with DEET     - Wear clothes that cover your arms, legs and feet     - Close unscreened doors and windows        NIH:
      National Institute of Allergy and Infectious Diseases'
  - source_sentence: What is (are) multiple sulfatase deficiency ?
    sentences:
    - Spinal cord infarction is a stroke either within the spinal cord or the arteries that supply it. It is caused by arteriosclerosis
      or a thickening or closing of the major arteries to the spinal cord. Frequently spinal cord infarction is caused by
      a specific form of arteriosclerosis called atheromatosis, in which a deposit or accumulation of lipid-containing matter
      forms within the arteries. Symptoms, which generally appear within minutes or a few hours of the infarction, may include
      intermittent sharp or burning back pain, aching pain down through the legs, weakness in the legs, paralysis, loss of
      deep tendon reflexes, loss of pain and temperature sensation, and incontinence.
    - There is no cure for OPCA. The disorder is slowly progressive with death usually occurring approximately 20 years after
      onset.
    - 'Multiple sulfatase deficiency is a condition that mainly affects the brain, skin, and skeleton. Because the signs and
      symptoms of multiple sulfatase deficiency vary widely, researchers have split the condition into three types: neonatal,
      late-infantile, and juvenile.  The neonatal type is the most severe form, with signs and symptoms appearing soon after
      birth. Affected individuals have deterioration of tissue in the nervous system (leukodystrophy), which can contribute
      to movement problems, seizures, developmental delay, and slow growth. They also have dry, scaly skin (ichthyosis) and
      excess hair growth (hypertrichosis). Skeletal abnormalities can include abnormal side-to-side curvature of the spine
      (scoliosis), joint stiffness, and dysostosis multiplex, which refers to a specific pattern of skeletal abnormalities
      seen on x-ray. Individuals with the neonatal type typically have facial features that can be described as "coarse."
      Affected individuals may also have hearing loss, heart malformations, and an enlarged liver and spleen (hepatosplenomegaly).
      Many of the signs and symptoms of neonatal multiple sulfatase deficiency worsen over time.  The late-infantile type
      is the most common form of multiple sulfatase deficiency. It is characterized by normal cognitive development in early
      childhood followed by a progressive loss of mental abilities and movement (psychomotor regression) due to leukodystrophy
      or other brain abnormalities. Individuals with this form of the condition do not have as many features as those with
      the neonatal type, but they often have ichthyosis, skeletal abnormalities, and coarse facial features.  The juvenile
      type is the rarest form of multiple sulfatase deficiency. Signs and symptoms of the juvenile type appear in mid- to
      late childhood. Affected individuals have normal early cognitive development but then experience psychomotor regression;
      however, the regression in the juvenile type usually occurs at a slower rate than in the late-infantile type. Ichthyosis
      is also common in the juvenile type of multiple sulfatase deficiency.  Life expectancy is shortened in individuals with
      all types of multiple sulfatase deficiency. Typically, affected individuals survive only a few years after the signs
      and symptoms of the condition appear, but life expectancy varies depending on the severity of the condition and how
      quickly the neurological problems worsen.'
