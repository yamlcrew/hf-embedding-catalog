      of an unstable MPV17 protein that is quickly broken down. A dysfunctional or absent MPV17 protein leads to problems
      with the maintenance of mtDNA, which can cause a reduction in the amount of mtDNA (known as mitochondrial DNA depletion).
      Mitochondrial DNA depletion impairs mitochondrial function in many of the body's cells and tissues, particularly the
      brain, liver, and other tissues that have high energy requirements. Reduced mitochondrial function in the liver and
      brain lead to the liver failure and neurological dysfunction associated with MPV17-related hepatocerebral mitochondrial
      DNA depletion syndrome. Researchers suggest that the less mtDNA that is available in cells, the more severe the features
      of Navajo neurohepatopathy.
