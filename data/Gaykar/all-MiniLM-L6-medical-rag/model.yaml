- source_sentence: what research (or clinical trials) is being done for Cushing's Syndrome ?
  sentences:
  - NINDS supports research on Cushing's syndrome aimed at finding new ways to diagnose, treat, and cure the disorder.
  - The National Institute of Neurological Disorders and Stroke (NINDS) conducts research related to transverse myelitis in
    its laboratories at the National Institutes of Health (NIH), and also supports additional transverse myelitis research
    through grants to major medical institutions across the country. Some studies focus on strategies to repair the spinal
    cord, including approaches using cell transplantation. The NINDS also funds researchers who are using animal models of
    spinal cord injury to study strategies for replacement or regeneration of spinal cord nerve cells. The knowledge gained
    from such research should lead to a greater knowledge of the mechanisms responsible for transverse myelitis and may ultimately
    provide a means to prevent and treat this disorder.
  - Is tracheoesophageal fistula inherited? In most cases, tracheoesophageal fistula (TEF) is not inherited and there is only
    one affected person in a family. When TEF is isolated (i.e. does not occur with any other abnormalities), it is considered
    a multifactorial condition (caused by a combination of various genetic and environmental factors). However, in most isolated
    cases, no specific genetic changes or environmental factors have been proven to cause the condition. When TEF occurs as
    a feature of a specific genetic syndrome or chromosome abnormality, it may follow the inheritance pattern and recurrence
    risk for the underlying condition. In these cases, it may be caused by changes in single genes or chromosomes, or it may
    be multifactorial.
- source_sentence: What are the symptoms of Thrombotic thrombocytopenic purpura, congenital ?
  sentences:
  - What are the signs and symptoms of Thrombotic thrombocytopenic purpura, congenital? The Human Phenotype Ontology provides
    the following list of signs and symptoms for Thrombotic thrombocytopenic purpura, congenital. If the information is available,
    the table below includes how often the symptom is seen in people with this condition. You can use the MedlinePlus Medical
    Dictionary to look up the definitions for these medical terms. Signs and Symptoms Approximate number of patients (when
    available) Respiratory distress 5% Autosomal recessive inheritance - Confusion - Elevated serum creatinine - Fever - Hemolytic-uremic
    syndrome - Heterogeneous - Increased blood urea nitrogen (BUN) - Increased serum lactate - Microangiopathic hemolytic
    anemia - Microscopic hematuria - Prolonged neonatal jaundice - Proteinuria - Reticulocytosis - Schistocytosis - Thrombocytopenia
    - Tremor - The Human Phenotype Ontology (HPO) has collected information on how often a sign or symptom occurs in a condition.
    Much of this information comes from Orphanet, a European rare disease database. The frequency of a sign or symptom is
    usually listed as a rough estimate of the percentage of patients who have that feature. The frequency may also be listed
    as a fraction. The first number of the fraction is how many people had the symptom, and the second number is the total
    number of people who were examined in one study. For example, a frequency of 25/25 means that in a study of 25 people
    all patients were found to have that symptom. Because these frequencies are based on a specific study, the fractions may
    be different if another group of patients are examined. Sometimes, no information on frequency is available. In these
    cases, the sign or symptom may be rare or common.
  - What are the signs and symptoms of Insulin-like growth factor I deficiency? The Human Phenotype Ontology provides the
    following list of signs and symptoms for Insulin-like growth factor I deficiency. If the information is available, the
    table below includes how often the symptom is seen in people with this condition. You can use the MedlinePlus Medical
