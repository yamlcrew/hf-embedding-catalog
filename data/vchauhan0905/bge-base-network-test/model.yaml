  - How do I add an MT10 to my dashboard network?
  - Can a mesh backhaul link operate on both 2.4GHz and 5GHz?
- source_sentence: 'site VPN page can be adjusted and this value applies to all Auto VPN peers we have iBGP connections to.
    For the eBGP hold timer this is per neighbor and can

    be more aggressive since this is monitoring a local link. When adjusting either value it is important to take into account
    load on the MX concentrator.

    Platform Sizing Considerations

    For Z3/c platforms we recommend only advertising a handful of aggregates or a default route to the datacenter. For the
    rest of the MX Security & SD-WAN

    appliances we recommend sizing the BGP topology to 1500 prefixes from the DC. This is due to the fact that smaller appliances
    may also be running other

    features such as Advanced Security and Meraki Insight etc.

    Route Table Integrity

    In order to maintain integrity of the route table for all MXs in the SD-WAN fabric, Meraki has implemented protection
    both inbound and outbound from the vpn

    concentrator. To protect the integrity of the route tables inbound, there is a configurable Receive limit. In addition
    to protecting the integrity inbound, there is

    also an AS Path ACL that is placed outbound for all eBGP peers. This AS Path ACL ensures that the Meraki ASN is always
    the originating ASN. This ensures

    that Merakis SD WAN fabric will never be transit between two DCs. By default this is on and can be disabled by clicking
    the checkbox under Allow transit.

    If the MX is deployed in a warm spare (high availability) configuration, the Virtual IP (VIP) will be used instead of
    the WAN IP address.'
  sentences:
  - What prefix size should I use for my virtual network?
  - Why is a site NOT being blocked when it should be?
  - What does a flashing white LED power light refer to on MX84?
- source_sentence: 'MX Load Balancing and Flow Preferences

    All MX security appliances feature a secondary uplink that can be used for load balancing and failover purposes. This
    article explains how to enable and

    configure a secondary uplink, load balancing between uplinks, and flow preferences for different types of traffic.

    Enabling and Configuring WAN 2

    Some MX models (MX75, MX84, MX85, MX95, MX105, MX250, MX400, MX450, MX600) have a dedicated secondary uplink port (WAN
    2). To use these ports,

    a cable just needs to be connected and the IP can be configured on the MX''s local status page or through the Meraki dashboard.
    On all other MX models, a LAN

    port can be configured as a secondary Internet port for use as WAN 2.

    To enable and configure WAN 2 on an MX without a dedicated WAN 2 port:

    1. Navigate to the MX''s local status page.

    2. Click the Configure tab at the top.

    3. Under Port 1, 2, or 4 (depending on the MX model), switch the Role to Internet:

    1 4. Configure the WAN port as needed:

    ◦ VLAN tagging - Assigns a VLAN tag to all traffic sent out of this port. If set to Don''t use VLAN tagging, traffic

    will be sent untagged.

    ◦ Connection Type - Select PPPoE if needed. Otherwise, leave as Direct.

    ◦ IP assignment - If the interface will get a dynamic address from the ISP, set to DHCP. Otherwise, set

    to Static and configure an Address, Netmask, Gateway, and DNS servers.'
  sentences:
  - How do I unlink Umbrella from my network?
  - Does the MX84 support dual WAN uplinks?
  - How do I switch between product types to take a packet capture on?
