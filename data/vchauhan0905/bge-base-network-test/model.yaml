    Creating a Systems Manager Network

    To create a Systems Manager network for endpoint management, follow this process:

    5 1. Log in to https://dashboard.meraki.com (or your chosen region''s dashboard url) using the account created earlier.

    2. From the prompt window, choose Set up Systems Manager and select Next.

    3. Give the network a name, for example, "Company Phones." If the page has a drop-down for Network type,

    select EMM (Systems Manager).

    4. Review the page, then select Create network at the bottom of the screen.

    Once complete, you''ve successfully created a Meraki Systems Manager network. This is where you can configure profiles,
    payloads, applications, and many'
