widgetData:
- source_sentence: 'Initiates a ping from the switch and displays the results visually to see latency over time.

    Troubleshooting Console (read-only CLI terminal)

    The troubleshooting console can be opened using the “Tools” tab of the switch details page. It is available only for Dashboard
    administrators with full (read/write)

    access.

    The console provides read-only access to "show" commands through a console emulator to assist with troubleshooting operations.
    Write commands and

    configuration are not permitted.

    10 The “Detach” button will open the console in a new tab.

    Alternatively, the console can be launched using the “Launch Terminal” button on the left side of the switch details page.

    MAC forwarding table

    Displays the MAC addresses of clients learned via layer 2 interfaces, including the associated VLAN and physical port
    number.

    Switch ports page

    This functions similarly to MS switches. The name of each port comes from the abbreviated interface name from IOS-XE (e.g.
    Gi1/0/1 for GigabitEthernet1/0/1).

    If a description is included in the configuration on the CLI, this will be shown as well.

    Cloud-monitored switch troubleshooting console limitations:

    • The console will proxy individual commands to the CLI of the switch through the cloud. It does not establish a persistent
    connection.

    • Only full read/write Dashboard administrators have access to the troubleshooting console. Read-only Dashboard users
    are not permitted

    access to the console.'
  sentences:
  - What troubleshooting tools are available from Dashboard for Cloud monitored switches?
  - Why am I seeing traffic from a 6.X.X.X IP reach my syslog server?
  - What types of applications can Meraki Insight track?
- source_sentence: 'SAML does support the use of multiple organizations. Similarly to traditional logins, it needs to determine
    that the user is identical across the affected

    organizations. Thus, for this to occur, the following must be identical across the designed organizations:

    • X.509 cert fingerprint for the organization (case sensitive)

    • SAML administrator role (as only one role attribute can be used in the token)

    ◦ The permissions granted can be different in each Organization, but the role name must be identical

    When this occurs, the user will be directed to the MSP portal and receive the desired permissions in each organization.
    The Consumer URL for any of the MSP

    organizations can be used, as they will all direct the user to the MSP portal.

    Troubleshooting

    If errors are presented when attempting to log in with SAML SSO, log in as a traditional administrator and review the
    SAML login history. This is located on the

    Organization > Administrators page, directly under the SAML administrator roles title. This includes a history of attempted
    SAML logins, any errors

    encountered, and what username/role was provided in the assertion.

    For additional information on resolving possible error messages, please refer to the article on SAML Login History Error
    Messages.

    Receiving e-mails or alerts with SAML SSO

    Due to the ability to provide any unique value in the SAML user field, administrators logged in via SAML SSO are not able
    to receive emails or alerts from'
  sentences:
  - How can I check if my Meraki MR access point is running in low power mode?
  - What should I do if I get an error when trying to login via SAML?
  - What should I check first if I cannot connect to the Client VPN from all devices?
