  widget:
  - source_sentence: Hưởng phụ cấp rồi có được hưởng tiền lương tăng thêm 8%?
    sentences:
    - Theo Khoản 1 Điều 24 của Dự thảo Luật Đường bộ, "đường cứu nạn" là công trình được xây dựng tại các đoạn đường đèo dốc.
      Mục đích của đường cứu nạn là để các phương tiện bị mất kiểm soát khi xuống dốc có thể rời khỏi đường chính đi vào,
      từ đó giảm tốc độ và bảo đảm dừng lại an toàn.
    - Tôi hiện công tác tại Trung tâm Công tác xã hội trẻ em TP. Hồ Chí Minh. Tôi được biết, theo khoản 1 Điều 3 Nghị định
      17/2015/NĐ-CP, người có hệ số lương 2,34 trở xuống được tăng thêm tiền lương bằng 8% mức lương hiện hưởng (gồm hệ số
      lương theo ngạch, bậc, chức vụ, chức danh hiện hưởng nhân mức lương cơ sở). Tuy nhiên, quy định này hiện có 2 cách hiểu
      khác nhau. Có ý kiến cho rằng, người có hệ số lương 2,34 nếu có thêm phụ cấp chức vụ vẫn thuộc đối tượng hưởng tiền
      lương tăng thêm 8% (chẳng hạn phụ cấp chức vụ Phó Trưởng phòng 0,25). Theo ý kiến khác, đối tượng được hưởng chính sách
      này phải là người có hệ số lương cộng phụ cấp chức vụ không quá 2,34. Tôi xin hỏi, cách hiểu nào là chính xác?Sở Nội
      vụ thành phố Hồ Chí Minh trả lời vấn đề này như sau:Khoản 1 Điều 3 Nghị định 17/2015/NĐ-CP ngày 14/5/2015 của Chính
      phủ về quy định tiền lương tăng thêm đối với cán bộ, công chức, viên chức và người hưởng lương trong lực lượng vũ trang
      có hệ số lương từ 2,34 trở xuống được tăng thêm tiền lương bằng 8% mức lương hiện hưởng bao gồm hệ số lương theo ngạch,
      bậc, chức vụ, chức danh hiện hưởng nhân mức lương cơ sở. Như vậy, trường hợp người có hệ số lương 2,34, đồng thời là
      Phó Trưởng phòng với phụ cấp chức vụ là 0,25 như bà Vân nêu vẫn được hưởng tiền lương tăng thêm 8% theo quy định.
    - Điều 281. Nghĩa vụ phải thực hiện hoặc không được thực hiện một công việc 1. Nghĩa vụ phải thực hiện một công việc là
      nghĩa vụ mà theo đó bên có nghĩa vụ phải thực hiện đúng công việc đó. 2. Nghĩa vụ không được thực hiện một công việc
      là nghĩa vụ mà theo đó bên có nghĩa vụ không được thực hiện công việc đó.
  - source_sentence: Dựa vào nội dung của Điều 73, tại sao một Dự thảo Luật Tình trạng khẩn cấp lại cần có điều khoản quy
      định việc bãi bỏ một văn bản pháp luật hiện hành như Pháp lệnh về Tình trạng khẩn cấp năm 2000?
    sentences:
    - 'Điều 60. Biên bản họp Hội đồng thành viên 1. Cuộc họp Hội đồng thành viên phải được ghi biên bản và có thể ghi âm hoặc
      ghi và lưu giữ dưới hình thức điện tử khác. 2. Biên bản họp Hội đồng thành viên phải thông qua ngay trước khi kết thúc
      cuộc họp. Biên bản phải bao gồm các nội dung chủ yếu sau đây: a) Thời gian và địa điểm họp; mục đích, chương trình họp;
      b) Họ, tên, tỷ lệ phần vốn góp, số và ngày cấp giấy chứng nhận phần vốn góp của thành viên, người đại diện theo ủy quyền
      dự họp; họ, tên, tỷ lệ phần vốn góp, số và ngày cấp giấy chứng nhận phần vốn góp của thành viên, người đại diện theo
      ủy quyền của thành viên không dự họp; c) Vấn đề được thảo luận và biểu quyết; tóm tắt ý kiến phát biểu của thành viên
      về từng vấn đề thảo luận; d) Tổng số phiếu biểu quyết hợp lệ, không hợp lệ; tán thành, không tán thành, không có ý kiến
      đối với từng vấn đề biểu quyết; đ) Các quyết định được thông qua và tỷ lệ phiếu biểu quyết tương ứng; e) Họ, tên, chữ
      ký và nội dung ý kiến của người dự họp không đồng ý thông qua biên bản họp (nếu có); g) Họ, tên, chữ ký của người ghi
      biên bản và chủ tọa cuộc họp, trừ trường hợp quy định tại khoản 3 Điều này. 3. Trường hợp chủ tọa, người ghi biên bản
      từ chối ký biên bản họp thì biên bản này có hiệu lực nếu được tất cả thành viên khác của Hội đồng thành viên tham dự
      họp ký và có đầy đủ nội dung theo quy định tại các điểm a, b, c, d, đ và e khoản 2 Điều này. Biên bản họp ghi rõ việc
      chủ tọa, người ghi biên bản từ chối ký biên bản họp. Người ký biên bản họp chịu trách nhiệm liên đới về tính chính xác
      và trung thực của nội dung biên bản họp Hội đồng thành viên.'
    - Theo Khoản 1 Điều 50 của Dự thảo Luật Thanh tra (sửa đổi), hoạt động thanh tra được thực hiện theo hai hình thức chính
      là thanh tra theo kế hoạch hoặc thanh tra đột xuất.
    - Điều khoản này là cần thiết để đảm bảo tính thống nhất và rõ ràng của hệ thống pháp luật. Khi một văn bản pháp luật
      mới có giá trị pháp lý cao hơn (Luật) được ban hành để điều chỉnh một lĩnh vực cụ thể, các văn bản pháp luật cũ hơn
      hoặc đã lỗi thời (như Pháp lệnh) về cùng một vấn đề cần phải được bãi bỏ một cách rõ ràng. Điều này nhằm tránh xung
      đột pháp luật, chồng chéo hoặc gây nhầm lẫn trong quá trình áp dụng pháp luật, đồng thời khẳng định rằng Luật mới sẽ
      là khung pháp lý duy nhất và có thẩm quyền cao nhất về tình trạng khẩn cấp.
  - source_sentence: Tính chi phí kiểm toán dự án vốn Nhà nước theo Thông tư nào?
    sentences:
    - Điều 519. Trả tiền dịch vụ 1. Bên sử dụng dịch vụ phải trả tiền dịch vụ theo thỏa thuận. 2. Khi giao kết hợp đồng, nếu
      không có thỏa thuận về giá dịch vụ, phương pháp xác định giá dịch vụ và không có bất kỳ chỉ dẫn nào khác về giá dịch
      vụ thì giá dịch vụ được xác định căn cứ vào giá thị trường của dịch vụ cùng loại tại thời điểm và địa điểm giao kết
      hợp đồng. 3. Bên sử dụng dịch vụ phải trả tiền dịch vụ tại địa điểm thực hiện công việc khi hoàn thành dịch vụ, trừ
      trường hợp có thỏa thuận khác. 4. Trường hợp dịch vụ được cung ứng không đạt được như thỏa thuận hoặc công việc không
      được hoàn thành đúng thời hạn thì bên sử dụng dịch vụ có quyền giảm tiền dịch vụ và yêu cầu bồi thường thiệt hại.
    - 'Theo Điều 1 của Dự thảo Luật Trật tự, an toàn giao thông đường bộ, luật này quy định về trật tự, an toàn giao thông
      đường bộ, bao gồm các nội dung chính sau: Quy tắc giao thông đường bộ; phương tiện giao thông đường bộ; người điều khiển
      phương tiện tham gia giao thông đường bộ; chỉ huy, điều khiển giao thông đường bộ; tuần tra, kiểm soát về trật tự, an
      toàn giao thông đường bộ; giải quyết tai nạn giao thông đường bộ; và quản lý nhà nước về trật tự, an toàn giao thông
      đường bộ.'
    - 'Nngày 18/2/2020 Chi nhánh Công ty TNHH Kiểm toán và Định giá Thăng Long – T.D.K – Khu vực miền Bắc và Trường Cao đẳng
      Hàng hải I đã ký hợp đồng về việc kiểm toán báo cáo quyết toán dự án hoàn thành công trình: Nâng cấp, cải tạo Hồ huấn
      luyện chuyên ngành của Trường Cao đẳng Hàng hải I (hình thức hợp đồng là trọn gói, thời gian thực hiện là 30 ngày).Ngày
      20/2/2020, Bộ Tài chính ban hành Thông tư số10/2020/TT-BTCquy định về quyết toán dự án hoàn thành sử dụng nguồn vốn
      Nhà nước có hiệu lực kể từ ngày 10/4/2020.Ngày 17/3/2020, Chi nhánh Công ty TNHH Kiểm toán và Định giá Thăng Long –
      T.D.K – Khu vực miền Bắc phát hành báo cáo kiểm toán độc lập về công trình: Nâng cấp, cải tạo Hồ huấn luyện chuyên ngành
      của Trường Cao đẳng Hàng hải I.Ngày 18/6/2020, Trường Cao đẳng Hàng hải I trình Cục Hàng hải Việt Nam thẩm tra, phê
      duyệt quyết toán dự án hoàn thành công trình nêu trên.Cho tôi hỏi, khi Cục Hàng hải Việt Nam tiến hành thẩm tra, phê
      duyệt quyết toán dự án hoàn thành công trình nêu trên thì chi phí kiểm toán báo cáo quyết toán dự án hoàn thành được
      tính theo Thông tư số 10/2020/TT-BTC hay Thông tư số 64/2018/TT-BTC?Bộ Tài chính trả lời vấn đề này như sau:Tại Điều
      26 Thông tư số 10/2020/TT-BTC ngày 20/2/2020 của Bộ Tài chính về quyết toán dự án hoàn thành sử dụng nguồn vốn Nhà nước
      quy định như sau:“Điều 26. Xử lý chuyển tiếpDự án, tiểu dự án, công trình, hạng mục công trình độc lập đã nộp hồ sơ
      quyết toán dự án hoàn thành về cơ quan chủ trì thẩm tra quyết toán và các hợp đồng kiểm toán độc lập đã ký trước thời
      điểm Thông tư này có hiệu lực: Thực hiện theo quy định tại Thông tư số 09/2016/TT-BTC ngày 18/1/2016 của Bộ Tài chính
      quy định về quyết toán dự án hoàn thành thuộc nguồn vốn Nhà nước và Thông tư số 64/2018/TT-BTC ngày 30/7/2018 của Bộ
      Tài chính sửa đổi, bổ sung một số điều của Thông tư số 09/2016/TT-BTC ngày 18/01/2016 quy định về quyết toán dự án hoàn
      thành thuộc nguồn vốn nhà nước”.Theo quy định nêu trên, chi phí thẩm tra phê duyệt quyết toán và chi phí kiểm toán của
      các dự án chuyển tiếp thực hiện như sau:- Đối với các dự án hoàn thành đã nộp hồ sơ quyết toán dự án hoàn thành về cơ
      quan thẩm tra quyết toán trước thời điểm Thông tư số 10/2020/TT-BTC ngày 20/2/2020 có hiệu lực: Chi phí thẩm tra, phê
      duyệt quyết toán dự án hoàn thành thực hiện theo Thông tư số 09/2016/TT-BTC ngày 18/1/2016 của Bộ Tài chính quy định
      về quyết toán dự án hoàn thành thuộc nguồn vốn Nhà nước và Thông tư số 64/2018/TT-BTC ngày 30/7/2018 của Bộ Tài chính
      sửa đổi, bổ sung một số điều của Thông tư số 09/2016/TT-BTC ngày 18/1/2016 quy định về quyết toán dự án hoàn thành thuộc
      nguồn vốn Nhà nước.- Đối với các hợp đồng kiểm toán đã ký kết trước thời điểm Thông tư số 10/2020/TT-BTC ngày 20/2/2020
      có hiệu lực: Chi phí kiểm toán độc lập báo cáo quyết toán dự án hoàn thành thực hiện theo quy định tại Thông tư số 09/2016/TT-BTC
      ngày 18/1/2016 của Bộ Tài chính quy định về quyết toán dự án hoàn thành thuộc nguồn vốn Nhà nước và Thông tư số 64/2018/TT-BTC
      ngày 30/7/2018 của Bộ Tài chính sửa đổi, bổ sung một số điều của Thông tư số 09/2016/TT-BTC ngày 18/1/2016 quy định
      về quyết toán dự án hoàn thành thuộc nguồn vốn Nhà nước.'
  - source_sentence: Tôi đang muốn phát hành trái phiếu riêng lẻ cho công ty của mình, nhưng không biết quy trình cụ thể như
      thế nào?
    sentences:
    - Điều 129. Trình tự, thủ tục chào bán và chuyển nhượng trái phiếu riêng lẻ 1. Công ty quyết định phương án chào bán trái
      phiếu riêng lẻ theo quy định của Luật này. 2. Công ty công bố thông tin trước mỗi đợt chào bán cho nhà đầu tư đăng ký
      mua trái phiếu và thông báo đợt chào bán cho sở giao dịch chứng khoán ít nhất 01 ngày làm việc trước ngày dự kiến tổ
      chức đợt chào bán trái phiếu. 3. Công ty công bố thông tin về kết quả của đợt chào bán cho các nhà đầu tư đã mua trái
      phiếu và thông báo kết quả đợt chào bán đến sở giao dịch chứng khoán trong thời hạn 10 ngày kể từ ngày kết thúc đợt
      chào bán trái phiếu. 4. Trái phiếu phát hành riêng lẻ được chuyển nhượng giữa các nhà đầu tư đáp ứng điều kiện về đối
      tượng mua trái phiếu riêng lẻ quy định tại khoản 2 Điều 128 của Luật này, trừ trường hợp thực hiện theo bản án, quyết
      định của Tòa án đã có hiệu lực pháp luật, phán quyết của Trọng tài có hiệu lực hoặc thừa kế theo quy định pháp luật.
      5. Căn cứ quy định của Luật này và Luật Chứng khoán, Chính phủ quy định chi tiết về loại trái phiếu, hồ sơ, trình tự,
      thủ tục phát hành và giao dịch trái phiếu riêng lẻ; công bố thông tin; phát hành trái phiếu ra thị trường quốc tế.
    - 'Theo điểm d khoản 1 Điều 13 của Luật Quản lý, sử dụng vũ khí, vật liệu nổ và công cụ hỗ trợ, cơ quan Công an có thẩm
      quyền cấp phép phải báo cáo Bộ trưởng Bộ Công an xem xét, quyết định trong các trường hợp sau đây:

      1. Trường hợp quy định tại khoản 3 Điều 11 của Luật này.

      2. Trường hợp mang nhiều hơn 10 khẩu súng ngắn, chủng loại khác và cơ số đạn, phụ kiện kèm theo (nếu có).'
    - Theo Khoản 1 Điều 25 của Luật Trưng cầu ý dân, những đối tượng sau đây không được ghi tên vào danh sách cử tri:1. Người
      bị kết án tử hình đang trong thời gian chờ thi hành án.2. Người đang phải chấp hành hình phạt tù mà không được hưởng
      án treo.3. Người bị Tòa án tuyên bố mất năng lực hành vi dân sự.
  - source_sentence: Khoản 6 Điều 28 quy định Viện kiểm sát nhân dân có quyền yêu cầu các cơ quan, cá nhân liên quan đến việc
      thi hành án thực hiện những việc cụ thể nào và thời hạn thực hiện các yêu cầu đó được quy định ra sao?
    sentences:
    - Theo Khoản 1 Điều 29 của Luật Công chứng, điều kiện về địa điểm trụ sở đối với các Văn phòng công chứng khi thực hiện
      hợp nhất hoặc sáp nhập là các Văn phòng công chứng đó phải có trụ sở trong cùng 01 tỉnh, thành phố trực thuộc trung
      ương.
    - 'Theo khoản 6 Điều 28 Luật Tổ chức Viện kiểm sát nhân dân, Viện kiểm sát nhân dân có quyền yêu cầu Tòa án, cơ quan thi
      hành án dân sự cùng cấp và cấp dưới, Chấp hành viên, cơ quan, tổ chức và cá nhân liên quan đến việc thi hành án thực
      hiện các việc sau đây:

      1. Ra quyết định thi hành án đúng quy định của pháp luật (điểm a).

      2. Thi hành bản án, quyết định theo quy định của pháp luật (điểm b).

      3. Tự kiểm tra việc thi hành án và thông báo kết quả cho Viện kiểm sát nhân dân (điểm c).

      4. Cung cấp hồ sơ, tài liệu, vật chứng có liên quan đến việc thi hành án (điểm d).


      Về thời hạn thực hiện, các yêu cầu quy định tại các điểm a, b và d khoản này phải được thực hiện ngay. Riêng yêu cầu
      quy định tại điểm c khoản này phải được thực hiện trong thời hạn 30 ngày, kể từ ngày nhận được yêu cầu.'
    - 'Theo điểm d khoản 1 Điều 31 của Luật Bảo hiểm xã hội số 41/2024/QH15, các đối tượng quy định tại các điểm g, h, m và
      n khoản 1 Điều 2 của Luật này được quyền lựa chọn tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc.


      *   **Về mức tối thiểu và tối đa:** Mức tiền lương làm căn cứ đóng bảo hiểm xã hội bắt buộc thấp nhất phải bằng mức
      tham chiếu và cao nhất bằng 20 lần mức tham chiếu tại thời điểm đóng.

      *   **Về thời điểm được lựa chọn lại:** Người lao động được lựa chọn lại tiền lương làm căn cứ đóng bảo hiểm xã hội
      sau khi đã thực hiện đóng bảo hiểm xã hội theo tiền lương làm căn cứ đóng đã lựa chọn ít nhất 12 tháng. Điều này mang
      lại sự linh hoạt cho người lao động trong việc điều chỉnh mức đóng phù hợp với thu nhập và nhu cầu của họ, nhưng vẫn
      đảm bảo tính ổn định trong một khoảng thời gian nhất định.'
