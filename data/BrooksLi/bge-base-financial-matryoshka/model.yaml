- source_sentence: highlighting the attractiveness of electric vehicles relative to the internal combustion vehicle. Many
    major automobile manufacturers have electric vehicles available today in major markets including the U.S., China and Europe,
    and other current and prospective automobile manufacturers are also developing electric vehicles.
  sentences:
  - What is the role of the Nominating and Corporate Governance Committee at NVIDIA?
  - Which markets feature electric vehicles from major automobile manufacturers including those from the U.S., China, and
    Europe?
  - Where in the Annual Report on Form 10-K are the contents of Item 8 included?
- source_sentence: The Financial Statement Schedule can be found on page S-1 of IBM's Form 10-K.
  sentences:
  - What was the total amount of future interest payments associated with the Notes as of September 30, 2023?
  - What page of IBM's Form 10-K contains the Financial Statement Schedule?
  - What are the key components of the HPE Global Wellness Program?
- source_sentence: Mr. Aujla has been the Executive Vice President and Chief Financial Officer since August 2023.
  sentences:
  - When did Mr. Aujla start his role as Executive Vice President and Chief Financial Officer at Intuit?
  - What type of fees are typically included in the management and franchise contracts for hotels, and how are they structured?
  - How are delivery sales categorized in financial statements?
- source_sentence: The information required by this Item 3 is incorporated herein by reference to the information set forth
    under the captions 'Legal Matters' and 'Government Investigations, Audits and Reviews' in Note 12 of the Notes to the
    Consolidated Financial Statements included in Part II, Item 8, 'Financial Statements and Supplementary Data'.
  sentences:
  - What does the Comprehensive Environmental Response, Compensation and Liability Act impose on property owners?
  - When did the injunctive relief ordered in the MDL concerning prescription opiates go into effect?
  - What are the specific captions under which information related to legal proceedings is discussed in the consolidated financial
    statements?
- source_sentence: The Cybersecurity Strategy outlines the key priorities for our cybersecurity program and the methods by
    which our Information Security department seeks to accomplish those goals, including assessing risk, prioritizing testing,
    identifying remedial actions and validating improvements.
  sentences:
  - What are the key priorities outlined in the cybersecurity strategy described?
  - What was the percentage increase in Intelligent Edge net revenue in fiscal 2023 compared to fiscal 2022?
  - What is the expected long-term rate of return for equities and bonds in Procter & Gamble's defined benefit retirement
    plans?
