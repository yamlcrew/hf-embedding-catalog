  - source_sentence: Когда решения ученого совета вступают в силу?
    sentences:
    - '4,7. Одво и то же лицо может быть членом наблюдательного совета

      Университета неограниченное число раз.


      4.8. Ректор Университета и проректоры не могут быть членами

      наблюдательного совета Университета. Ректор Университета участвует

      в заседаниях наблюдательного совета Университета с правом

      совещательного голоса,


      4.9. Членами наблюдательного совета Университета не могут быть

      лица, имеющие неснятую или непогашенную судимость.


      4.10. Университет не вправе выплачивать членам наблюдательного

      совета Университета вознаграждение за выполнение ими своих

      обязанностей, за исключением компенсации документально

      подтвержденных расходов, непосредственно связанных с участием в работе

      наблюдательного совета Университета.


      4.11. Члены наблюдательного совета Университета могут

      пользоваться услугами Университета только на равных условиях с другими

      гражданами.'
    - 'Ученый совет Университета формирует и утверждает планы своей

      работы с учетом предложений органов управления и структурных

      подразделений Университета, а также утверждает регламент работы

      ученого совета Университета.


      Заседания ученого совета Университета проводятся не реже чем

      1 (один) раз в 3 (три) месяца, кроме летнего периода.


      Решение ученого совета Университета считается принятым, если

      за него проголосовало большинство его членов, присутствующих

      30


      на заседании, при явке не менее 50 (пятидесяти) процентов списочного

      состава ученого совета Университета.


      Решения ученого совета Университета оформляются протоколами

      и вступают в силу с даты их подписания председателем ученого совета

      Университета. Решения ученого совета Университета по вопросам,

      относящимся к его компетенции, являются обязательными для выполнения

      всеми работниками и обучающимися Университета.'
    - 'Я согласен (а) на перезачёт дисциплин (ы) / практик (и), изученных (ной)

      мною ранее, указанных (ной) в учебной карточке/справке о периоде


      обучения

      (да/нет) (подпись обучающегося)


      Я согласен (а) на переаттестацию дисциплин (ы)/ практик (и), изученных

      (ной) мною ранее, указанных (ной) в учебной карточке/справке о периоде


      обучения

      (да/нет) (подпись обучающегося)


      Я уведомлен (а) о том, что до выхода приказа о переводе являюсь

      обучающимся той образовательной программы, формы обучения, на которой

      числюсь, и обязан выполнять все обязательства, касающиеся образовательного

      процесса, в том числе в части оплаты обучения в случае обучения на месте

      по договору об оказании платных образовательных услуг


      (подпись обучающегося)


      В случае возникновения превышения норм в части объема программы

      более чем на 2 экзамена и 5 зачетов за один учебный год я согласен (а) на перевод


      с понижением курса (ов)

      (подпись обучающегося)'
  - source_sentence: В какие сроки нужно предоставить медицинскую справку?
    sentences:
    - '— информирование обучающихся филиала о порядке назначения

      и условиях выплаты стипендий и материальной поддержки;


      — рассмотрение обращений обучающихся, относящихся к деятельности

      Стипендиальной комиссии филиала;


      — решение иных вопросов, входящих в компетенции Стипендиальной

      комиссии филиала.'
    - '3.3. При проведении мероприятий текущего контроля успеваемости

      могут быть использованы инструменты  электронно-информационной

      образовательной среды (далее — ЭИОС), дистанционные образовательные

      технологии, электронное обучение с возможностью применения прокторинга

      в синхронном / асинхронном режиме.


      3.4. Текущий контроль успеваемости может — осуществляться

      в следующих формах: по учебному предмету, дисциплине, модулю — домашние

      задания, самостоятельные работы, рефераты, эссе, коллоквиумы, лабораторные

      работы, тестирование, защита индивидуальных и групповых проектов и т.д;

      по практике — контроль за выполнением индивидуального задания,

      собеседование с руководителем по практической подготовке, контроль качества

      заполнения пунктов индивидуального отчета по практике и т.д.'
    - '—в случае болезни обучающийся подает лично (для очной

      формы — обучения)/ лично или посредством корпоративной почты

      (для очно-заочной/заочной формы обучения) заявление с приложением

      медицинской справки (электронного листа нетрудоспособности (далее — ЭЛН).

      Оригинал медицинской справки (ЭЛН) принимается к рассмотрению в течение

      двух рабочих дней со дня даты закрытия листка нетрудоспособности

      (больничного листа). Нарушение обучающимся процедуры закрытия

      больничного листа (режима больничного листа), что повлекло отсутствие

      на промежуточной аттестации (повторной промежуточной аттестации) в период

      такого нарушения, не относится к уважительным причинам. Не принимается

      к рассмотрению медицинский документ, подтверждающий плановый

      медицинский осмотр (диспансеризацию);'
  - source_sentence: Как проходит назначение ректора Университета?
    sentences:
    - '1.6. Министерство осуществляет следующие функции и полномочия

      учредителя Университета в установленном порядке:


      - выполнение функций и полномочий учредителя Университета при

      его создании, реорганизации и ликвидации;


      - утверждение по согласованию с Росимуществом устава

      Университета, а также вносимых в него изменений;


      - назначение и освобождение от должности ректора Университета;


      - заключение и расторжение трудового договора с ректором

      Университета; о


      - согласование программы развития Университета;


      - формирование и утверждёние государственного задания на оказание

      государственных услуг (выполнение работ) (далее — государственное

      задание) в соответствии с предусмотренными настоящим уставом

      основными видами деятельности Университета;


      - рассмотрение предложений Университета о создании или

      ликвидации филиалов и представительств;


      - представление на рассмотрение наблюдательного совета

      Университета предложений:


      о внесении изменений в устав Университета;'
    - '5.12. Допускается пересдача оценки «удовлетворительно», которая

      является единственной оценкой «удовлетворительно» из всех оценок,

      полученных за весь период обучения, или одной оценки «хорошо»,

      при отсутствии оценок «удовлетворительно» за весь период обучения,

      для получения диплома с отличием. Не допускается пересдача практик

      и курсовых работ (проектов). Пересдача может быть произведена только

      на последнем курсе обучения с разрешения должностного лица, курирующего

      образовательную деятельность в Университете на основании личного заявления

      обучающегося, согласованного с директором (заместителем директора,

      курирующего образовательную деятельность) института (школы, филиала).'
    - 'По результатам обработки полученных бюллетеней оформляется

      протокол о принятии наблюдательным советом Университета решений

      путем проведения заочного голосования, который подписывается

      председателем наблюдательного совета.


      4.39, Каждый член наблюдательного совета Университета имеет при

      голосовании | (один) голос. В случае равенства голосов решающим

      является голос председателя наблюдательного совета Университета.


      4.40. Первое заседание наблюдательного совета Университета после

      его создания, а также первое заседание нового состава наблюдательного

      совета Университета созывается по требованию учредителя Университета.

      До избрания председателя наблюдательного совета Университета на таком

      заседании председательствует старший по возрасту член наблюдательного

      совета Университета, за исключением представителя работников

      Университета.


      4.41. Конференция работников и обучающихся Университета

      является коллегиальным органом управления Университета.'
  - source_sentence: Как долго рассматривают апелляцию?
    sentences:
    - 'До даты проведения заседания наблюдательного совета

      Университета, а также непосредственно на заседании могут быть

      представлены дополнительные материалы для рассмотрения по вопросам

      повестки дня.


      4.35. В заседании наблюдательного совета Университета вправе

      участвовать ректор Университета. Иные приглашенные председателем

      наблюдательного совета Университета лица могут участвовать в заседании

      наблюдательного совета Университета, если против их присутствия

      не возражает более чем одна треть от общего числа членов

      наблюдательного совета Университета.


      4.36. Заседание наблюдательного совета Университета является

      правомочным, если все члены наблюдательного совета Университета

      извещены о времени и месте его проведения, и на заседании присутствует

      более половины членов наблюдательного совета Университета. Передача

      членом наблюдательного совета Университета своего голоса другому лицу

      не допускается.'
    - '5.2. Обучающийся подает в отдел по сопровождению образовательных

      программ и работе с обучающимися филиала или в Единый деканат заявление

      о переводе с приложением справки о периоде обучения (зачетной книжки)

      или ее копии и иных документов, подтверждающих образовательные и иные

      индивидуальные достижения обучающегося (иные документы представляются

      по усмотрению обучающегося), а также предоставляет документ,

      подтверждающий факт проживания на территории Донецкой Народной

      Республики, Луганской Народной Республики, Украины и факт пересечения

      государственной границы Российской Федерации. В случае подачи указанного

      заявления несовершеннолетним обучающимся к заявлению прилагается

      письменное согласие родителей (законных представителей).


      При невозможности предоставления обучающимся справки о периоде


      обучения (зачетной книжки) или ее копии аттестационной комиссией

      13'
    - 'Апелляция рассматривается в срок не позднее двух рабочих дней со дня

      подачи апелляции на заседании апелляционной комиссии.'
