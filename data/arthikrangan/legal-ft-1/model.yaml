- source_sentence: Why should manipulative and exploitative uses of AI be prohibited according to the context provided?
  sentences:
  - to operate without human intervention. The adaptiveness that an AI system could exhibit after deployment, refers to self-learning
    capabilities, allowing the system to change while in use. AI systems can be used on a stand-alone basis or as a component
    of a product, irrespective of whether the system is physically integrated into the product (embedded) or serves the functionality
    of the product without being integrated therein (non-embedded).
  - '(28)



    Aside from the many beneficial uses of AI, it can also be misused and provide novel and powerful tools for manipulative,
    exploitative and social control practices. Such practices are particularly harmful and abusive and should be prohibited
    because they contradict Union values of respect for human dignity, freedom, equality, democracy and the rule of law and
    fundamental rights enshrined in the Charter, including the right to non-discrimination, to data protection and to privacy
    and the rights of the child.













    (29)'
  - A Union legal framework laying down harmonised rules on AI is therefore needed to foster the development, use and uptake
    of AI in the internal market that at the same time meets a high level of protection of public interests, such as health
    and safety and the protection of fundamental rights, including democracy, the rule of law and environmental protection
    as recognised and protected by Union law. To achieve that objective, rules regulating the placing on the market, the putting
    into service and the use of certain AI systems should be laid down, thus ensuring the smooth functioning of the internal
    market and allowing those systems to benefit from the principle of free movement of goods and services. Those rules should
    be clear and robust
