- source_sentence: How often should the risk-management system be reviewed and updated to maintain its effectiveness?
  sentences:
  - The risk-management system should consist of a continuous, iterative process that is planned and run throughout the entire
    lifecycle of a high-risk AI system. That process should be aimed at identifying and mitigating the relevant risks of AI
    systems on health, safety and fundamental rights. The risk-management system should be regularly reviewed and updated
    to ensure its continuing effectiveness, as well as justification and documentation of any significant decisions and actions
    taken subject to this Regulation. This process should ensure that the provider identifies risks or adverse impacts and
    implements mitigation measures for the known and reasonably foreseeable risks of AI systems to the health, safety and
    fundamental rights in light
  - solely on profiling them or on assessing their personality traits and characteristics should be prohibited. In any case,
    that prohibition does not refer to or touch upon risk analytics that are not based on the profiling of individuals or
    on the personality traits and characteristics of individuals, such as AI systems using risk analytics to assess the likelihood
    of financial fraud by undertakings on the basis of suspicious transactions or risk analytic tools to predict the likelihood
    of the localisation of narcotics or illicit goods by customs authorities, for example on the basis of known trafficking
    routes.
