    - 세계 3대 오페라 중 하나로 꼽히는 ‘카르멘’이 6~8일 서울 세종문화회관 대극장 무대에 오른다.카르멘은 19세기 프랑스 작가 프로스페르 메리메의 원작 소설을 조르주 비제가 각색한 오페라다. 1820년대 스페인
      남부 세비야를 배경으로 담배 공장에서 일하는 집시 여인 카르멘과 순수한 청년 돈 호세의 비극적인 연애담을 그린 작품이다. 베르디의 ‘라 트라비아타’, 푸치니의 ‘라 보엠’과 더불어 세계 3대 오페라라는 명성을
      얻고 있다.솔직하고 당당한 카르멘은 당시 프랑스에선 파격으로 받아들여졌다. 1875년 3월 프랑스 오페라 코미크 극장에서 초연했을 때에는 비평가들이 “부도덕하고 표면적인 실패작”이라고 비난했다. 하지만 지금은
      세계에서 가장 인기 있는 오페라가 됐다. ‘하바네라’ ‘집시의 노래’ ‘투우사의 노래’ ‘꽃노래’ 등 극 중 아리아는 일반 관객들에게도 친숙하다.오페라 제작을 맡은 누오바오페라단(단장 강민우)은 2004년 창단
      이래 국내 오페라계에서는 잘 공연되지 않는 작품들을 주로 발표해왔다. 대중적인 작품도 새롭게 해석하거나 실험적인 무대로 꾸미기 위한 시도를 계속하고 있다. 지난해에는 프랑스 작곡가 자크 오펜바흐의 ‘호프만의
      이야기’로 제5회 대한민국 오페라 대상을 받았다. 연출을 맡은 이회수 예감오페라앙상블 예술감독은 “그동안 카르멘은 주인공 카르멘의 ‘팜 파탈’ 측면을 지나치게 강조해온 감이 있었다”며 “이번 작품은 카르멘이
      갖고 있는 자유로움을 최대한 부각할 것”이라고 말했다. 무대 디자인도 자유로움을 상징하는 ‘새’를 모티브로 꾸몄다고 한다.주인공 카르멘 역할은 소프라노 박명숙(사진)과 메조소프라노 서윤진 고은정이 맡았다. 대개
      오페라 배역은 소프라노, 메조소프라노, 알토 등으로 음역이 정해져 있다. 카르멘은 소프라노와 메조소프라노가 동시에 맡을 수 있는 배역 가운데 하나라는 설명이다.공연 첫날 무대에 오르는 박씨는 지난해 ‘호프만의
      이야기’에서도 주인공 줄리에타 역을 맡았다. 박씨는 “카르멘은 성적인 매력과 잔혹한 측면을 동시에 갖고 있는 열정적인 여성”이라며 “소프라노만이 표현할 수 있는 화려한 카르멘을 보여 드리겠다”고 말했다. 서울필하모닉
      오케스트라가 연주를, 모티브오페라코러스가 합창을 맡는다. 3만~20만원. (02)581-5404
