      입는 손실이 동일한 데도 중소기업에 높은 손실률을 적용하거나 더 높은 목표이익률을 부과하며 높은 이율을 적용했다는 설명이다. 우리·산업·수출입·외환·전북·제주은행 등 6곳은 담보 제공시 금리 차별이 없었다.박세춘
      금감원 부원장보는 “적발된 12개 은행에 금리차별을 개선하기 위한 세부이행 계획서를 요청했다”며 “이를 토대로 7월부터는 신규대출과 만기를 연장할 때 인하된 금리를 적용토록 할 것”이라고 밝혔다. 또 만기 이전이라도
      해당 중소기업에 개별적으로 통보해 인하된 금리를 적용받을 수 있도록 조치하는 한편 분기마다 현장점검을 할 계획이다.금감원은 개선안이 시행되면 중소기업 담보대출 평균 금리가 연 5.25%에서 4.99%로 하락,
      대기업(4.73%)에 근접할 것으로 분석했다. 이에 따라 중소기업 320만곳의 이자부담이 연 1419억원 감소할 것으로 분석했다. 하지만 금리 차별을 지적받은 은행 중 일부는 “동일한 담보를 제공하는 기업에
      대해선 동일한 금리를 적용하고 있다”며 “국회가 금융당국을 몰아붙이자 금감원이 제대로 점검도 하지 않고 억지 주장을 하고 있다”며 반발했다. 한 은행 관계자는 “금감원이 은행의 금리 결정구조에 과도하게 개입한
      것”이라며 “은행의 금리운용 범위가 좁아지면 리스크를 고려해 비우량 중소기업을 더 기피하게 될 것”이라고 우려했다. 류시훈/김일규 기자 bada@hankyung.com
    - 연금 전문가 단체인 한국연금학회는 재직 공무원의 연금 부담금을 지금보다 43% 올리고 수령액은 34% 삭감하는 공무원연금 개혁안을 21일 공식 발표했다. 정부가 올초 마련한 개혁안보다 훨씬 강력한 것이어서 향후
      추진 과정에서 공무원 집단의 거센 반발이 예상된다.개혁안에 따르면 새 제도가 도입되는 2016년 이전에 채용된 공무원의 납부율(기여금)은 월소득액의 14%(본인부담 7%)에서 2026년까지 20%(본인부담 10%)로
      6%포인트 단계적으로 인상된다. 지금보다 연금 부담액이 43% 늘어나고, 국민연금 납부율(9%)보다도 두 배가량 많다.연금 급여 상승폭은 현행 재직 1년당 1.9%포인트에서 2026년 1.25%포인트로 34%
      삭감된다. 최대 가입 기간인 33년간 연금을 부은 공무원의 경우 퇴직 후 매월 받는 연금 수령액이 전체 재직 기간 월평균 소득의 62.7%에서 41.2%로 떨어진다. 이자율 등을 고려하면 2016년 이후 가입
      기간에 대해서는 사실상 원금과 이자 합계를 은퇴 이후에 받게 되는 구조로 바뀌게 된다는 게 연금학회의 설명이다. 2010년 이전 임용자의 연금 수령 나이도 현행 60세에서 단계적으로 상향돼 2033년부터 국민연금
      가입자 및 2010년 이후 채용 공무원과 마찬가지로 65세로 조정된다. 2016년 이후 임용된 신규 공무원은 국민연금과 같은 부담과 혜택을 적용, 9% 기여금(본인부담 4.5%)을 40년간 납부하면 전 재직
      기간 월평균 소득의 40%를 받는다.이와 함께 연금학회는 연금 혜택이 대거 축소되는 현직 공무원과의 형평을 고려해 은퇴한 연금 수급자에게 적용되는 고통분담 방안도 내놨다. 연금학회는 2016년 이전 은퇴자에게
      수령액의 3%를 ‘재정안정화 기여금’ 명목으로 부과하고, 연간 수령액 인상폭도 현행(소비자물가상승률)보다 줄이는 방안을 제시했다.연금학회는 개혁안이 시행되면 시행 첫해인 2016년부터 공무원연금 적자를 보전하는
      정부보전금을 2025년까지 매년 40%가량 절감할 수 있을 것으로 내다봤다. 현 제도가 계속 이어질 경우 2016년에 정부가 부담해야 하는 보전금은 3조6780억원이다. 하지만 새 제도가 시행되면 정부보전금은
      2조935억원으로, 1조6000억원(43%)을 아낄 수 있다. 장기적으로는 2080년까지 지금보다 333조8000억원의 보전금을 줄일 수 있다는 게 연금학회의 설명이다.연금학회와 새누리당은 이 개혁안을 토대로
      22일 국회에서 공무원연금 개혁 토론회를 열 예정이다. 이번 개혁안이 당·정·청 협의를 거쳐 최종 정책으로 반영될지는 아직까지 미지수다. 연금학회가 내놓은 안이 당초 예상을 훨씬 뛰어넘는 고강도 개혁안이어서
      공무원노조 등 공무원 집단의 거센 반발이 예상된다. 연금개혁을 논의 중인 새누리당 경제혁신특별위원회는 연금학회 제안 등을 검토하고 여론을 수렴해 다음달께 최종안을 마련할 방침이다.
    - 'ATP는 ATP 생성효소라고 불리는 효소에 의해 만들어진다. ATP 생성효소와 ATP 생성효소의 유전자의 구조는 알려진 모든 형태의 생명체에서 놀라울 정도로 유사하다.


      ATP 생성효소는 보통 H(양성자)의 농도 기울기의 형태로 막을 경계로 한 전기화학적 기울기에 의해 구동된다. 전자전달계의 기능은 H(양성자)의 농도 기울기를 생성하는 것이다. 모든 살아있는 생물체에서 일련의
      산화환원 반응은 막을 경계로 한 전기화학적 기울기 또는 소위 양성자 구동력(proton motive force)을 생성하는데 사용된다.


      산화환원 반응은 전자가 전자공여체 분자로부터 전자수용체 분자로 전달되는 화학 반응이다. 이러한 반응을 일으키는 근본적인 힘은 반응물과 생성물의 깁스 자유 에너지이다. 깁스 자유 에너지는 일을 하는데 있어 이용가능한("자유")
      에너지이다. 반응계의 전체 깁스 자유 에너지를 감소시키는 반응은 자발적으로 진행된다. 물론 자발적인 반응이 반응속도론적으로 저해되면, 반응이 천천히 진행될 수는 있다.


      고에너지 분자(전자공여체)로부터 저에너지 분자(전자수용체)로 전자가 전달되는 것은 일련의 산화환원 반응으로 공간적으로 분리될 수 있는데, 이것이 전자전달계이다.


      반응이 열역학적으로 가능하다고 해서, 그 반응이 실제로 일어날 수 있다는 것을 의미하는 것은 아니다. 수소 기체와 산소 기체의 혼합물은 저절로 발화하지는 않는다. 대부분의 생화학 반응을 유용한 속도로 진행시키기
      위해서는 활성화 에너지를 공급하거나 반응계 고유의 활성화 에너지를 낮추는 것이 필요하다. 살아있는 생물은 생화학 반응의 활성화 에너지를 낮추기 위해 복잡한 고분자 구조(효소)를 사용한다.


      열역학적으로 불리한 반응(전하의 분리 또는 농도 기울기의 형성과 같은)을 열역학적으로 유리한 반응(고에너지 상태에서 저에너지 상태로의 전이)과 결합시켜서, 반응계의 전체 자유 에너지를 감소시키고(열역학적으로
      가능하게 만드는) 생물에게 유용한 반응을 진행시킬 수 있도록 한다. 효소는 열역학적으로 유리한 반응이 동시에 일어나는 경우에만 열역학적으로 불리한 반응을 촉매한다는 원리는 모든 알려진 생물에게 적용된다.


      전자전달계는 막을 경계로 한 전기화학적 기울기의 형태로 에너지를 생성한다. 이 에너지는 유용한 일을 수행하는데 사용된다. 전기화학적 기울기는 막을 가로질러 분자를 운반하는데 사용될 수 있다. 전기화학적 기울기는
      세균의 편모를 회전시키는 것과 같은 기계적인 작업을 수행하는데 사용될 수 있다. 전기화학적 기울기는 성장에 필요한 고에너지 분자인 ATP와 NADPH를 생성하는데 사용될 수 있다.'
  - source_sentence: 씬님의 소속사는 어디인가?
    sentences:
    - '씬님(박수혜, 1990년 10월 21일 ~ )은 메이크업, 화장품 리뷰 등을 주요 콘텐츠로 활동하는 DIA TV 소속의 대한민국 유튜버이다. 네이버 블로그에서 화장품 리뷰, 화장법 등을 소개하며 뷰티 블로거로
      활동을 시작했고, 2013년부터 유튜브를 통해 영상을 업로드하며 현재까지 뷰티 크리에이터 활동을 이어오고 있다. 영화, 애니메이션 등의 캐릭터나 유명인을 화장을 재현하는 커버 메이크업이나 화장품 리뷰와 리뷰하는
      제품을 활용하는 메이크업 영상 등을 주로 업로드하고 있으며, 특정 상황에 추천하는 메이크업 스타일이나 브이로그 형식으로 일상을 소개하는 영상도 업로드하고 있다.


      최근에는 유튜브를 벗어나 방송 활동 등 대외 활동도 활발히 진행하고 있으며, 유튜브 채널에는 고정된 영상 업로드 스케쥴 없이 보통 한 주에 한 개 정도의 영상이 업로드 된다. 2019년 5월 현재 유튜브 채널
      씬님의 구독자 수는 162만 명으로 한국 유튜브 채널 중 114위에 올라있다. 뷰티 크리에이터 중에서는 포니, 이사배에 이어 3번째로 구독자 수가 많다.'
    - “성남시 새누리당 의원들은 자신을 지배자로 착각합니다.”(이재명 성남시장 트위터) “시장이 시의회를 존중하지 않고 무시하고 있습니다.”(이영희 시의회 새누리당 대표의원)이 시장과 시의회 새누리당은 성남시정의
