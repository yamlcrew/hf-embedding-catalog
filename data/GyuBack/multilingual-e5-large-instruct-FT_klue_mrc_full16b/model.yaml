    sentences:
    - '1364년 무라드 1세가 처음 세웠다. 초기는 전쟁포로들이나 비이슬람교도, 특히 발칸지방 기독교 소년들로 강제 징집한 병사들로 구성되었다. 일단 징집당하면 이슬람과 튀르크 전통을 익힌 뒤 이슬람으로 개종해야했고
      엄격한 신체훈련과 각종무기를 다루는 기술을 익힌후에 부대로 편성됐다.

      일종의 개인경호대로 알라와 황제 이외에는 그 어느누구에게도 복종하지 않았다. 평상시에는 황제가 머무는 수도 경비를 맡아 일종의 경찰관이나 소방관 같은 역할을 하다 전쟁나면 최정예부대로 참전하여 무용을 떨쳤다.

      특별한 군복을 지급받았고 상비군으로서 급여를 지급받았으며 다른 이슬람교도와 달리 콧수염 외 수염을 기르지 않았다. 초기에 결혼 및 병영밖에서 사는 것이 금지되었을 정도로 엄격한 규율하에 생활했는데 16세기에
      금혼규정을 비롯한 일부 규정이 완화되었다

      제정 로마 근위대가 본래 목적보다는 황제의 최대위협이 된 것처럼 예니체리도 영향력이 막강해지자 점차 탐욕스러워지고 권력집단화 돼 정치에 관여하며 타락했다. 18세기에 이르며 막강한 특권과 영향력으로 정부를 장악하고
      군대 구조 현대화를 위한 시도들을 방해하고 자기들 입맛에 맞는 정책들을 강요하며 빈번히 반란을 일으켰고 심지어 황제조차 갈아 치울 수 있을 정도였다. 1622년에는 예니체리를 해체하고 군대를 재조직하려고 시도한
      오스만 2세를 암살했다

      1807년에는 반란을 일으켜 군대를 유럽식으로 현대화 하려던 셀림 3세를 끌어내리고 이어 마무드 2세가 권좌에 올랐다. 마무드 2세도 반대했으나 결국 타협했고 10년 이상을 권력보강에 힘썼다

      권력남용, 군사적 비효율성, 개혁 반대, 135,000명의 봉급 지급에 따른 재정압박 등으로 한계에 다다르자 마침내 마무드 2세는 예니체리를 뿌리뽑기로 결정했다

      1826년 새로운 군대를 조직한다는 사실이 알려지자 또다시 반란을 일으켰다. 1826년 6월 14일과 15일 이스탄불에서 반란군은 결국 군대에 밀려 그들의 막사로 후퇴했고 마무드 2세는 포병에게 막사에 일제히
      발포하라 명하고 15문의 대포로 일제사격을 감행하여 반란군 대부분을 학살했다. 살아남은 자들도 거의 대부분 유배되거나 처형당했다. 2년 후 마지막으로 남은 예니체리 부대를 압수, 해산하며 예니체리는 전부 해체됐다.'
    - “노조 파업으로 자동차 생산라인이 멈춰서고, 하청업체는 일감 부족으로 고통을 받는 악순환을 언제까지 반복해야 하는지…. 이젠 ‘파’자만 들어도 진절머리가 납니다.”현대자동차 노조가 ‘이틀간 부분파업 돌입’을
      결정한 19일 오후. 울산 북구 중산 자동차 부품단지 내 엔진부품 업체인 M기업 김모 회장(53)은 망연자실한 표정으로 이렇게 말했다. 김 회장은 “중소부품사들 입장에선 납품받는 현대차보다 연례행사하듯 파업하는
      노조가 더 무섭다”며 “주말특근 거부의 충격에서 벗어날 만하니까 또 파업한다”고 비난했다.○27년간 23차례 파업 현대차노조는 이날 쟁의대책위원회를 열고 20, 21일 울산 아산 전주 등 모든 공장에서 1조(오후
      1시30분~3시30분), 2조(오후 5시30분~7시30분) 각 2시간 총 8시간 부분파업하기로 결정했다. 지난해 강경 성향의 문용문 집행부가 들어선 이후 두 번째 파업이다. 노조는 당초 파업 일정을 20~22일
      3일로 잡았다가 조합원 반발로 이처럼 조정한 것으로 전해졌다. 회사 측은 “중앙노동위원회의 추가 협의(조정연기) 권고를 노조가 거부했다”고 설명했다. 노조는 올해 임단협안을 통해 △정년 61세 연장 △기본급
      13만498원 인상 △순이익 30% 성과급 지급 △상여금 800% 지급 △퇴직금 누진제 △대학 미진학 자녀에게 기술취득 지원금 1000만원 지급 등을 요구하고 있다. 회사 측은 “성과급을 제외한 임금 인상과
      퇴직금 누진제, 정년 연장 등 신규 요구만 따져도 7000만원에 이른다”고 주장했다. 회사 관계자는 “노조의 임단협안 75개 조항 180개 항목을 노사가 함께 한번 읽어본 정도인데, 일괄 타결안을 내놓으라는
      것은 파업 수순밟기에 불과하다”며 대화 재개를 촉구했다. 노조 측은 “사측이 조합원의 고용과 복지 요구에 대해 기존 단협보다 후퇴한 안을 제시하고 타결 의지도 보이지 않고 있다”며 “진실된 대화 의지를 보여라”고
      맞섰다.노조는 22일 사측과 18차 본교섭을 갖고 2차 쟁대위도 개최할 계획이다. 회사 측 제시안이 부족하다고 판단하면 투쟁 수위를 단계적으로 높여갈 가능성이 높은 것으로 관측된다.○반발하는 울산시민·협력업체울산지역
      현대차 중소협력업체들은 추석 대목을 앞두고 벼랑 끝으로 내몰리고 있다며 반발했다. 북구 효문동의 한 부품업체 사장은 “파업 강도를 높이면 추석 전 도산하는 업체도 생겨날 것”이라고 걱정했다.협력업체들은 파업
      장기화를 우려하고 있다. 현대차노조는 지난해 28일간 파업을 벌여 회사 측에 차량 8만2000여대, 1조7000억원의 손실을 입혔다. 노조 설립 이래 임금 협상으로 초강경 파업에 나선 첫 사례로 꼽힌다. 울산에는
      500여개의 협력업체에 4만여명이 일하고 있다. 가족까지 포함하면 현대차와 직간접적으로 연관된 인원은 15만여명으로 추산된다. 현대차 인근 매곡 부품공장에서 일하는 김광수 씨(42)는 “협력업체 근로자는 열심히
      일해도 연봉 5000만원 이상을 받기 힘들다”며 “업계 최고 연봉을 받으면서 심야근무도 안 하고 1억원을 더 받겠다니 이해하기 힘들다”고 반발했다.울산상공회의소와 140여개 시민사회단체로 구성된 행복도시만들기울산협의회(행울협)는
      조만간 노조를 방문, 파업 중단을 촉구하기로 했다. 김철 울산상의 회장(행울협 공동위원장)은 “노조 파업으로 현대차가 생산차질 물량을 불가피하게 해외로 돌리면 협력업체 줄도산이 우려된다”며 “파국을 막는 길은
      노조의 파업 자제뿐”이라고 지적했다.
    - '1943년 슈타우펜베르크는 중령으로 진급했으며, 북아프리카로 건너가 제 10 기갑사단의 참모장을 맡게 되었다 북아프리카 전선에서 슈타우펜베르크는 작전 지역을 시찰하던 중, 1943년 4월 7일에 영국 전투기의
      습격을 받아 중상을 입는다. 그는 독일 본토로 이송되어 뮌헨의 병원에서 치료를 받으며 석달동안 입원하였다. 여기서 그는 왼쪽 눈과 왼쪽 손, 오른쪽 손가락 두 개를 잃게 된다. 뮌헨 병원에서 재활치료를 받는
      동안, 그는 생각만 하고 있었던 히틀러 암살계획에 가담하여 자신의 손으로 히틀러를 해치우기로 결심하게 된다. 히틀러 제거 계획은 이미 재활 치료를 거의 마친 이후 독일 육군 본부에 보직을 받고 루트비히 베크를
      중심으로 한 22명의 가담자들을 만나고 난 뒤부터였다.


      1943년 7월 1일 슈타우펜베르크는 대령으로 진급하면서 독일 베를린 국방군 본부의 예비군 참모장으로 임명되었다.

      올브리히트장군의 군사령관 후임인 프리드리히 프롬을 상관으로 만나게 되는데, 프롬도 이미 히틀러 제거 음모에 묵시적으로 가담했었다. 즉, 프롬은 ''반나치세력''에 대해 모든 것을 알고 있으면서도 모르는체 하면서
      슈타우펜베르크의 거사에 협조했다.


      1944년 6월 6일, 미국,영국,캐나다 연합군이 프랑스 노르망디에 상륙작전을 감행했다. 이때 슈타우펜베르크도 다른 고위 장교들과 마찬가지로 전쟁이 패배로 돌아갈 것을 확신했다. 그는 즉각 휴전하는 것만이 인명의
      불필요한 희생을 막고 독일과 독일 국민, 그리고 유럽 대다수 국가들의 피해를 최소화하며 자신의 조국을 구하는 길이라고 확신했다. 1943년 말에 슈타우펜베르크는 독일의 즉각 휴전 조건으로서 연합국이 납득할 만하다고
      생각하는 것들을 요구서로 적어 보냈다. 요구서에는 독일 국경을 폴란드의 비엘코폴스카와 포즈나뉴가 포함되는 1914년 국경으로 인정해 줄 것을 비롯해, 오스트리아와 주데텐란트 지방을 독일 영토로 유지하며, 알자스-로렌
      지방에는 자치권을 부여하고, 남쪽으로는 현 전시 국경에서 확장해 티롤, 볼자노, 메라노 등까지 병합하는 것 등이 포함되어 있었다. 비영토 관련 요구는 연합군의 독일 점령을 일절 불허할 것과, 전범 인계를 거부한
      것 등이 있었다. 전범 인계 거부는 자국 범죄자는 그 나라가 심판할 권리가 있다는 이유에서였다. 이 요구 사항들은 서방 연합국에만 국한된 것일 뿐 동부전선(러시아 전선)에는 해당되지 않는 것이었다. 그는 ''독일은
      서쪽, 북쪽, 남쪽 지역에서만 물러나고, 동쪽 점령지에 대해서는 군사적 점령 상태를 유지할 권리''를 요구했다. 하지만 노르망디에 연합군이 상륙한 뒤, 루트비히 베크를 주축으로 한 ''반나치세력''들과 슈타우펜베르크는
      이러한 위기에 서방연합군과의 휴전 협상 시도가 명목적이었을 뿐임을 깨달았다. 독일의 무조건 항복만이 전쟁에 종지부를 찍을 수 있었다.'
  - source_sentence: 전기화학적 기울기가 ATP와 무엇을 만들어낼 수 있는가?
    sentences:
    - 다음달부터는 충분한 담보를 제공했는데도 중소기업이라는 이유만으로 대기업보다 높은 금리를 부담하는 불합리한 차별이 사라진다.금융감독원은 13일 이 같은 내용을 포함한 대기업·중소기업 간 불합리한 금리차별 개선방안을
