- source_sentence: 예니체리가 완전히 해산되었을 시기 재위 중인 황제는?
  sentences:
  - '1364년 무라드 1세가 처음 세웠다. 초기는 전쟁포로들이나 비이슬람교도, 특히 발칸지방 기독교 소년들로 강제 징집한 병사들로 구성되었다. 일단 징집당하면 이슬람과 튀르크 전통을 익힌 뒤 이슬람으로 개종해야했고
    엄격한 신체훈련과 각종무기를 다루는 기술을 익힌후에 부대로 편성됐다.

    일종의 개인경호대로 알라와 황제 이외에는 그 어느누구에게도 복종하지 않았다. 평상시에는 황제가 머무는 수도 경비를 맡아 일종의 경찰관이나 소방관 같은 역할을 하다 전쟁나면 최정예부대로 참전하여 무용을 떨쳤다.

    특별한 군복을 지급받았고 상비군으로서 급여를 지급받았으며 다른 이슬람교도와 달리 콧수염 외 수염을 기르지 않았다. 초기에 결혼 및 병영밖에서 사는 것이 금지되었을 정도로 엄격한 규율하에 생활했는데 16세기에 금혼규정을
    비롯한 일부 규정이 완화되었다

    제정 로마 근위대가 본래 목적보다는 황제의 최대위협이 된 것처럼 예니체리도 영향력이 막강해지자 점차 탐욕스러워지고 권력집단화 돼 정치에 관여하며 타락했다. 18세기에 이르며 막강한 특권과 영향력으로 정부를 장악하고
    군대 구조 현대화를 위한 시도들을 방해하고 자기들 입맛에 맞는 정책들을 강요하며 빈번히 반란을 일으켰고 심지어 황제조차 갈아 치울 수 있을 정도였다. 1622년에는 예니체리를 해체하고 군대를 재조직하려고 시도한
    오스만 2세를 암살했다

    1807년에는 반란을 일으켜 군대를 유럽식으로 현대화 하려던 셀림 3세를 끌어내리고 이어 마무드 2세가 권좌에 올랐다. 마무드 2세도 반대했으나 결국 타협했고 10년 이상을 권력보강에 힘썼다

    권력남용, 군사적 비효율성, 개혁 반대, 135,000명의 봉급 지급에 따른 재정압박 등으로 한계에 다다르자 마침내 마무드 2세는 예니체리를 뿌리뽑기로 결정했다

    1826년 새로운 군대를 조직한다는 사실이 알려지자 또다시 반란을 일으켰다. 1826년 6월 14일과 15일 이스탄불에서 반란군은 결국 군대에 밀려 그들의 막사로 후퇴했고 마무드 2세는 포병에게 막사에 일제히 발포하라
    명하고 15문의 대포로 일제사격을 감행하여 반란군 대부분을 학살했다. 살아남은 자들도 거의 대부분 유배되거나 처형당했다. 2년 후 마지막으로 남은 예니체리 부대를 압수, 해산하며 예니체리는 전부 해체됐다.'
  - “노조 파업으로 자동차 생산라인이 멈춰서고, 하청업체는 일감 부족으로 고통을 받는 악순환을 언제까지 반복해야 하는지…. 이젠 ‘파’자만 들어도 진절머리가 납니다.”현대자동차 노조가 ‘이틀간 부분파업 돌입’을 결정한
    19일 오후. 울산 북구 중산 자동차 부품단지 내 엔진부품 업체인 M기업 김모 회장(53)은 망연자실한 표정으로 이렇게 말했다. 김 회장은 “중소부품사들 입장에선 납품받는 현대차보다 연례행사하듯 파업하는 노조가
    더 무섭다”며 “주말특근 거부의 충격에서 벗어날 만하니까 또 파업한다”고 비난했다.○27년간 23차례 파업 현대차노조는 이날 쟁의대책위원회를 열고 20, 21일 울산 아산 전주 등 모든 공장에서 1조(오후 1시30분~3시30분),
    2조(오후 5시30분~7시30분) 각 2시간 총 8시간 부분파업하기로 결정했다. 지난해 강경 성향의 문용문 집행부가 들어선 이후 두 번째 파업이다. 노조는 당초 파업 일정을 20~22일 3일로 잡았다가 조합원 반발로
    이처럼 조정한 것으로 전해졌다. 회사 측은 “중앙노동위원회의 추가 협의(조정연기) 권고를 노조가 거부했다”고 설명했다. 노조는 올해 임단협안을 통해 △정년 61세 연장 △기본급 13만498원 인상 △순이익 30%
    성과급 지급 △상여금 800% 지급 △퇴직금 누진제 △대학 미진학 자녀에게 기술취득 지원금 1000만원 지급 등을 요구하고 있다. 회사 측은 “성과급을 제외한 임금 인상과 퇴직금 누진제, 정년 연장 등 신규 요구만
    따져도 7000만원에 이른다”고 주장했다. 회사 관계자는 “노조의 임단협안 75개 조항 180개 항목을 노사가 함께 한번 읽어본 정도인데, 일괄 타결안을 내놓으라는 것은 파업 수순밟기에 불과하다”며 대화 재개를
    촉구했다. 노조 측은 “사측이 조합원의 고용과 복지 요구에 대해 기존 단협보다 후퇴한 안을 제시하고 타결 의지도 보이지 않고 있다”며 “진실된 대화 의지를 보여라”고 맞섰다.노조는 22일 사측과 18차 본교섭을
    갖고 2차 쟁대위도 개최할 계획이다. 회사 측 제시안이 부족하다고 판단하면 투쟁 수위를 단계적으로 높여갈 가능성이 높은 것으로 관측된다.○반발하는 울산시민·협력업체울산지역 현대차 중소협력업체들은 추석 대목을 앞두고
    벼랑 끝으로 내몰리고 있다며 반발했다. 북구 효문동의 한 부품업체 사장은 “파업 강도를 높이면 추석 전 도산하는 업체도 생겨날 것”이라고 걱정했다.협력업체들은 파업 장기화를 우려하고 있다. 현대차노조는 지난해 28일간
    파업을 벌여 회사 측에 차량 8만2000여대, 1조7000억원의 손실을 입혔다. 노조 설립 이래 임금 협상으로 초강경 파업에 나선 첫 사례로 꼽힌다. 울산에는 500여개의 협력업체에 4만여명이 일하고 있다. 가족까지
    포함하면 현대차와 직간접적으로 연관된 인원은 15만여명으로 추산된다. 현대차 인근 매곡 부품공장에서 일하는 김광수 씨(42)는 “협력업체 근로자는 열심히 일해도 연봉 5000만원 이상을 받기 힘들다”며 “업계 최고
    연봉을 받으면서 심야근무도 안 하고 1억원을 더 받겠다니 이해하기 힘들다”고 반발했다.울산상공회의소와 140여개 시민사회단체로 구성된 행복도시만들기울산협의회(행울협)는 조만간 노조를 방문, 파업 중단을 촉구하기로
    했다. 김철 울산상의 회장(행울협 공동위원장)은 “노조 파업으로 현대차가 생산차질 물량을 불가피하게 해외로 돌리면 협력업체 줄도산이 우려된다”며 “파국을 막는 길은 노조의 파업 자제뿐”이라고 지적했다.
  - '1943년 슈타우펜베르크는 중령으로 진급했으며, 북아프리카로 건너가 제 10 기갑사단의 참모장을 맡게 되었다 북아프리카 전선에서 슈타우펜베르크는 작전 지역을 시찰하던 중, 1943년 4월 7일에 영국 전투기의
    습격을 받아 중상을 입는다. 그는 독일 본토로 이송되어 뮌헨의 병원에서 치료를 받으며 석달동안 입원하였다. 여기서 그는 왼쪽 눈과 왼쪽 손, 오른쪽 손가락 두 개를 잃게 된다. 뮌헨 병원에서 재활치료를 받는 동안,
    그는 생각만 하고 있었던 히틀러 암살계획에 가담하여 자신의 손으로 히틀러를 해치우기로 결심하게 된다. 히틀러 제거 계획은 이미 재활 치료를 거의 마친 이후 독일 육군 본부에 보직을 받고 루트비히 베크를 중심으로
    한 22명의 가담자들을 만나고 난 뒤부터였다.


    1943년 7월 1일 슈타우펜베르크는 대령으로 진급하면서 독일 베를린 국방군 본부의 예비군 참모장으로 임명되었다.

    올브리히트장군의 군사령관 후임인 프리드리히 프롬을 상관으로 만나게 되는데, 프롬도 이미 히틀러 제거 음모에 묵시적으로 가담했었다. 즉, 프롬은 ''반나치세력''에 대해 모든 것을 알고 있으면서도 모르는체 하면서
    슈타우펜베르크의 거사에 협조했다.


    1944년 6월 6일, 미국,영국,캐나다 연합군이 프랑스 노르망디에 상륙작전을 감행했다. 이때 슈타우펜베르크도 다른 고위 장교들과 마찬가지로 전쟁이 패배로 돌아갈 것을 확신했다. 그는 즉각 휴전하는 것만이 인명의
    불필요한 희생을 막고 독일과 독일 국민, 그리고 유럽 대다수 국가들의 피해를 최소화하며 자신의 조국을 구하는 길이라고 확신했다. 1943년 말에 슈타우펜베르크는 독일의 즉각 휴전 조건으로서 연합국이 납득할 만하다고
    생각하는 것들을 요구서로 적어 보냈다. 요구서에는 독일 국경을 폴란드의 비엘코폴스카와 포즈나뉴가 포함되는 1914년 국경으로 인정해 줄 것을 비롯해, 오스트리아와 주데텐란트 지방을 독일 영토로 유지하며, 알자스-로렌
    지방에는 자치권을 부여하고, 남쪽으로는 현 전시 국경에서 확장해 티롤, 볼자노, 메라노 등까지 병합하는 것 등이 포함되어 있었다. 비영토 관련 요구는 연합군의 독일 점령을 일절 불허할 것과, 전범 인계를 거부한
    것 등이 있었다. 전범 인계 거부는 자국 범죄자는 그 나라가 심판할 권리가 있다는 이유에서였다. 이 요구 사항들은 서방 연합국에만 국한된 것일 뿐 동부전선(러시아 전선)에는 해당되지 않는 것이었다. 그는 ''독일은
    서쪽, 북쪽, 남쪽 지역에서만 물러나고, 동쪽 점령지에 대해서는 군사적 점령 상태를 유지할 권리''를 요구했다. 하지만 노르망디에 연합군이 상륙한 뒤, 루트비히 베크를 주축으로 한 ''반나치세력''들과 슈타우펜베르크는
    이러한 위기에 서방연합군과의 휴전 협상 시도가 명목적이었을 뿐임을 깨달았다. 독일의 무조건 항복만이 전쟁에 종지부를 찍을 수 있었다.'
- source_sentence: 전기화학적 기울기가 ATP와 무엇을 만들어낼 수 있는가?
  sentences:
  - 다음달부터는 충분한 담보를 제공했는데도 중소기업이라는 이유만으로 대기업보다 높은 금리를 부담하는 불합리한 차별이 사라진다.금융감독원은 13일 이 같은 내용을 포함한 대기업·중소기업 간 불합리한 금리차별 개선방안을
    발표했다. 금감원이 최근 18개 은행의 중소기업 담보대출금리 부과실태를 점검한 결과, 12곳은 중소기업 담보대출금리를 산출할 때 신용도나 기여도에 따른 금리 차등 외에 불합리한 차별을 해왔다. 도산시 은행이 입는
    손실이 동일한 데도 중소기업에 높은 손실률을 적용하거나 더 높은 목표이익률을 부과하며 높은 이율을 적용했다는 설명이다. 우리·산업·수출입·외환·전북·제주은행 등 6곳은 담보 제공시 금리 차별이 없었다.박세춘 금감원
    부원장보는 “적발된 12개 은행에 금리차별을 개선하기 위한 세부이행 계획서를 요청했다”며 “이를 토대로 7월부터는 신규대출과 만기를 연장할 때 인하된 금리를 적용토록 할 것”이라고 밝혔다. 또 만기 이전이라도 해당
    중소기업에 개별적으로 통보해 인하된 금리를 적용받을 수 있도록 조치하는 한편 분기마다 현장점검을 할 계획이다.금감원은 개선안이 시행되면 중소기업 담보대출 평균 금리가 연 5.25%에서 4.99%로 하락, 대기업(4.73%)에
    근접할 것으로 분석했다. 이에 따라 중소기업 320만곳의 이자부담이 연 1419억원 감소할 것으로 분석했다. 하지만 금리 차별을 지적받은 은행 중 일부는 “동일한 담보를 제공하는 기업에 대해선 동일한 금리를 적용하고
    있다”며 “국회가 금융당국을 몰아붙이자 금감원이 제대로 점검도 하지 않고 억지 주장을 하고 있다”며 반발했다. 한 은행 관계자는 “금감원이 은행의 금리 결정구조에 과도하게 개입한 것”이라며 “은행의 금리운용 범위가
    좁아지면 리스크를 고려해 비우량 중소기업을 더 기피하게 될 것”이라고 우려했다. 류시훈/김일규 기자 bada@hankyung.com
  - 연금 전문가 단체인 한국연금학회는 재직 공무원의 연금 부담금을 지금보다 43% 올리고 수령액은 34% 삭감하는 공무원연금 개혁안을 21일 공식 발표했다. 정부가 올초 마련한 개혁안보다 훨씬 강력한 것이어서 향후
    추진 과정에서 공무원 집단의 거센 반발이 예상된다.개혁안에 따르면 새 제도가 도입되는 2016년 이전에 채용된 공무원의 납부율(기여금)은 월소득액의 14%(본인부담 7%)에서 2026년까지 20%(본인부담 10%)로
    6%포인트 단계적으로 인상된다. 지금보다 연금 부담액이 43% 늘어나고, 국민연금 납부율(9%)보다도 두 배가량 많다.연금 급여 상승폭은 현행 재직 1년당 1.9%포인트에서 2026년 1.25%포인트로 34% 삭감된다.
    최대 가입 기간인 33년간 연금을 부은 공무원의 경우 퇴직 후 매월 받는 연금 수령액이 전체 재직 기간 월평균 소득의 62.7%에서 41.2%로 떨어진다. 이자율 등을 고려하면 2016년 이후 가입 기간에 대해서는
    사실상 원금과 이자 합계를 은퇴 이후에 받게 되는 구조로 바뀌게 된다는 게 연금학회의 설명이다. 2010년 이전 임용자의 연금 수령 나이도 현행 60세에서 단계적으로 상향돼 2033년부터 국민연금 가입자 및 2010년
    이후 채용 공무원과 마찬가지로 65세로 조정된다. 2016년 이후 임용된 신규 공무원은 국민연금과 같은 부담과 혜택을 적용, 9% 기여금(본인부담 4.5%)을 40년간 납부하면 전 재직 기간 월평균 소득의 40%를
    받는다.이와 함께 연금학회는 연금 혜택이 대거 축소되는 현직 공무원과의 형평을 고려해 은퇴한 연금 수급자에게 적용되는 고통분담 방안도 내놨다. 연금학회는 2016년 이전 은퇴자에게 수령액의 3%를 ‘재정안정화 기여금’
    명목으로 부과하고, 연간 수령액 인상폭도 현행(소비자물가상승률)보다 줄이는 방안을 제시했다.연금학회는 개혁안이 시행되면 시행 첫해인 2016년부터 공무원연금 적자를 보전하는 정부보전금을 2025년까지 매년 40%가량
    절감할 수 있을 것으로 내다봤다. 현 제도가 계속 이어질 경우 2016년에 정부가 부담해야 하는 보전금은 3조6780억원이다. 하지만 새 제도가 시행되면 정부보전금은 2조935억원으로, 1조6000억원(43%)을
    아낄 수 있다. 장기적으로는 2080년까지 지금보다 333조8000억원의 보전금을 줄일 수 있다는 게 연금학회의 설명이다.연금학회와 새누리당은 이 개혁안을 토대로 22일 국회에서 공무원연금 개혁 토론회를 열 예정이다.
    이번 개혁안이 당·정·청 협의를 거쳐 최종 정책으로 반영될지는 아직까지 미지수다. 연금학회가 내놓은 안이 당초 예상을 훨씬 뛰어넘는 고강도 개혁안이어서 공무원노조 등 공무원 집단의 거센 반발이 예상된다. 연금개혁을
    논의 중인 새누리당 경제혁신특별위원회는 연금학회 제안 등을 검토하고 여론을 수렴해 다음달께 최종안을 마련할 방침이다.
  - 'ATP는 ATP 생성효소라고 불리는 효소에 의해 만들어진다. ATP 생성효소와 ATP 생성효소의 유전자의 구조는 알려진 모든 형태의 생명체에서 놀라울 정도로 유사하다.


    ATP 생성효소는 보통 H(양성자)의 농도 기울기의 형태로 막을 경계로 한 전기화학적 기울기에 의해 구동된다. 전자전달계의 기능은 H(양성자)의 농도 기울기를 생성하는 것이다. 모든 살아있는 생물체에서 일련의 산화환원
    반응은 막을 경계로 한 전기화학적 기울기 또는 소위 양성자 구동력(proton motive force)을 생성하는데 사용된다.


    산화환원 반응은 전자가 전자공여체 분자로부터 전자수용체 분자로 전달되는 화학 반응이다. 이러한 반응을 일으키는 근본적인 힘은 반응물과 생성물의 깁스 자유 에너지이다. 깁스 자유 에너지는 일을 하는데 있어 이용가능한("자유")
    에너지이다. 반응계의 전체 깁스 자유 에너지를 감소시키는 반응은 자발적으로 진행된다. 물론 자발적인 반응이 반응속도론적으로 저해되면, 반응이 천천히 진행될 수는 있다.


    고에너지 분자(전자공여체)로부터 저에너지 분자(전자수용체)로 전자가 전달되는 것은 일련의 산화환원 반응으로 공간적으로 분리될 수 있는데, 이것이 전자전달계이다.


    반응이 열역학적으로 가능하다고 해서, 그 반응이 실제로 일어날 수 있다는 것을 의미하는 것은 아니다. 수소 기체와 산소 기체의 혼합물은 저절로 발화하지는 않는다. 대부분의 생화학 반응을 유용한 속도로 진행시키기
    위해서는 활성화 에너지를 공급하거나 반응계 고유의 활성화 에너지를 낮추는 것이 필요하다. 살아있는 생물은 생화학 반응의 활성화 에너지를 낮추기 위해 복잡한 고분자 구조(효소)를 사용한다.


    열역학적으로 불리한 반응(전하의 분리 또는 농도 기울기의 형성과 같은)을 열역학적으로 유리한 반응(고에너지 상태에서 저에너지 상태로의 전이)과 결합시켜서, 반응계의 전체 자유 에너지를 감소시키고(열역학적으로 가능하게
    만드는) 생물에게 유용한 반응을 진행시킬 수 있도록 한다. 효소는 열역학적으로 유리한 반응이 동시에 일어나는 경우에만 열역학적으로 불리한 반응을 촉매한다는 원리는 모든 알려진 생물에게 적용된다.


    전자전달계는 막을 경계로 한 전기화학적 기울기의 형태로 에너지를 생성한다. 이 에너지는 유용한 일을 수행하는데 사용된다. 전기화학적 기울기는 막을 가로질러 분자를 운반하는데 사용될 수 있다. 전기화학적 기울기는
    세균의 편모를 회전시키는 것과 같은 기계적인 작업을 수행하는데 사용될 수 있다. 전기화학적 기울기는 성장에 필요한 고에너지 분자인 ATP와 NADPH를 생성하는데 사용될 수 있다.'
- source_sentence: 씬님의 소속사는 어디인가?
  sentences:
  - '씬님(박수혜, 1990년 10월 21일 ~ )은 메이크업, 화장품 리뷰 등을 주요 콘텐츠로 활동하는 DIA TV 소속의 대한민국 유튜버이다. 네이버 블로그에서 화장품 리뷰, 화장법 등을 소개하며 뷰티 블로거로
    활동을 시작했고, 2013년부터 유튜브를 통해 영상을 업로드하며 현재까지 뷰티 크리에이터 활동을 이어오고 있다. 영화, 애니메이션 등의 캐릭터나 유명인을 화장을 재현하는 커버 메이크업이나 화장품 리뷰와 리뷰하는
    제품을 활용하는 메이크업 영상 등을 주로 업로드하고 있으며, 특정 상황에 추천하는 메이크업 스타일이나 브이로그 형식으로 일상을 소개하는 영상도 업로드하고 있다.


    최근에는 유튜브를 벗어나 방송 활동 등 대외 활동도 활발히 진행하고 있으며, 유튜브 채널에는 고정된 영상 업로드 스케쥴 없이 보통 한 주에 한 개 정도의 영상이 업로드 된다. 2019년 5월 현재 유튜브 채널 씬님의
    구독자 수는 162만 명으로 한국 유튜브 채널 중 114위에 올라있다. 뷰티 크리에이터 중에서는 포니, 이사배에 이어 3번째로 구독자 수가 많다.'
  - “성남시 새누리당 의원들은 자신을 지배자로 착각합니다.”(이재명 성남시장 트위터) “시장이 시의회를 존중하지 않고 무시하고 있습니다.”(이영희 시의회 새누리당 대표의원)이 시장과 시의회 새누리당은 성남시정의 파행
    원인에 대해 엇갈린 주장을 하고 있다. 한국경제신문의 인터뷰 요청에 이 시장 측은 “민감한 시기라 응하기 어렵다”며 거절했다.성남시정 파행에 대한 이 시장의 입장은 확고하다. 다수당의 의회 보이콧으로 시 행정이
    마비됐다는 주장이다. 이 시장은 트위터를 통해 연일 새누리당을 비판하고 있다. 특히 이 시장은 올 들어 새누리당이 창의교육도시 사업 예산을 두 차례나 삭감하자 트위터를 통해 맹비난했다. 그는 “사교육비 부담을 줄여주는
    창의교육 예산을 왜 삭감했을까요? 행패일까요, 무지일까요?”라고 비꼬았다. 이어 “삭감된 창의교육 예산을 되살리기 위해 시민들이, 특히 학부모와 학생들이 나서야 한다”고 주장했다. 이 시장은 새누리당 A시의원이
    술자리에서 양주병으로 업체 관계자를 폭행했다는 확인되지 않은 사실을 연일 리트위트하면서 새누리당의 반발을 사기도 했다.
  - 세계 3대 오페라 중 하나로 꼽히는 ‘카르멘’이 6~8일 서울 세종문화회관 대극장 무대에 오른다.카르멘은 19세기 프랑스 작가 프로스페르 메리메의 원작 소설을 조르주 비제가 각색한 오페라다. 1820년대 스페인
    남부 세비야를 배경으로 담배 공장에서 일하는 집시 여인 카르멘과 순수한 청년 돈 호세의 비극적인 연애담을 그린 작품이다. 베르디의 ‘라 트라비아타’, 푸치니의 ‘라 보엠’과 더불어 세계 3대 오페라라는 명성을 얻고
    있다.솔직하고 당당한 카르멘은 당시 프랑스에선 파격으로 받아들여졌다. 1875년 3월 프랑스 오페라 코미크 극장에서 초연했을 때에는 비평가들이 “부도덕하고 표면적인 실패작”이라고 비난했다. 하지만 지금은 세계에서
    가장 인기 있는 오페라가 됐다. ‘하바네라’ ‘집시의 노래’ ‘투우사의 노래’ ‘꽃노래’ 등 극 중 아리아는 일반 관객들에게도 친숙하다.오페라 제작을 맡은 누오바오페라단(단장 강민우)은 2004년 창단 이래 국내
    오페라계에서는 잘 공연되지 않는 작품들을 주로 발표해왔다. 대중적인 작품도 새롭게 해석하거나 실험적인 무대로 꾸미기 위한 시도를 계속하고 있다. 지난해에는 프랑스 작곡가 자크 오펜바흐의 ‘호프만의 이야기’로 제5회
    대한민국 오페라 대상을 받았다. 연출을 맡은 이회수 예감오페라앙상블 예술감독은 “그동안 카르멘은 주인공 카르멘의 ‘팜 파탈’ 측면을 지나치게 강조해온 감이 있었다”며 “이번 작품은 카르멘이 갖고 있는 자유로움을
    최대한 부각할 것”이라고 말했다. 무대 디자인도 자유로움을 상징하는 ‘새’를 모티브로 꾸몄다고 한다.주인공 카르멘 역할은 소프라노 박명숙(사진)과 메조소프라노 서윤진 고은정이 맡았다. 대개 오페라 배역은 소프라노,
    메조소프라노, 알토 등으로 음역이 정해져 있다. 카르멘은 소프라노와 메조소프라노가 동시에 맡을 수 있는 배역 가운데 하나라는 설명이다.공연 첫날 무대에 오르는 박씨는 지난해 ‘호프만의 이야기’에서도 주인공 줄리에타
