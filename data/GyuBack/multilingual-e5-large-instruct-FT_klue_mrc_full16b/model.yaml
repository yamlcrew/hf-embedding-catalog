      행정이 마비됐다는 주장이다. 이 시장은 트위터를 통해 연일 새누리당을 비판하고 있다. 특히 이 시장은 올 들어 새누리당이 창의교육도시 사업 예산을 두 차례나 삭감하자 트위터를 통해 맹비난했다. 그는 “사교육비
