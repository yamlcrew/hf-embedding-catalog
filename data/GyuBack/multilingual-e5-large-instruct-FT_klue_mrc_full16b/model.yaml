    합창을 맡는다. 3만~20만원. (02)581-5404
- source_sentence: 클럽 엠스타에 새로 더해진 아이템 중 발에 착용 가능한 것은?
  sentences:
  - 농협이 일본 최대 유통업체인 이온(AEON)그룹에 한국의 신선농산물을 공급하는 데 성공했다. 일본 대기업의 촘촘한 유통망을 확보하게 되면서 최근 공급 과잉으로 가격이 폭락하고 있는 한국 농산물의 수출에도 청신호가
    켜질 전망이다. ○국내 수급 조절에도 유리농협중앙회는 3일 6가량(2만달러 상당)의 안성 신고배를 이온그룹에 처음으로 수출했다고 발표했다. 이달 안에 멜론(1만5000달러)과 애호박(1만5000달러)도 이온그룹에
    추가 공급하기로 했다. 금액은 크지 않지만 이온그룹이 일본에 총 227개 자회사와 1만6000여개의 대형마트·편의점을 보유하고 있는 최대 유통업체라는 점에서 향후 한국 농산물의 일본 시장 진출 확대에 전환점이 될
    것이라는 설명이다. 김상길 농협 회원경제지원부 팀장은 “이온 같은 대형마트에서 신고배 등이 팔리게 되면 다른 업체 바이어들도 관심을 가질 수밖에 없다”며 “미국과 대만에 편중돼왔던 배 수출시장 다변화에도 효과가
    있을 것”이라고 말했다. 농협은 이온그룹과 맺은 양해각서(MOU)에 따라 올 연말까지 300만달러 규모의 신선농산물을 수출한다는 계획이다. 상반기엔 배(총 50만달러 수출 예상)와 애호박·멜론(100만달러)에 집중하고
    하반기엔 양배추(100만달러) 위주로 공급하기로 했다. 이상욱 농업경제 대표는 “신규 수출품목을 개발해 다양화된 품목으로 이온그룹과의 거래를 지속적으로 확대할 계획”이라며 “이온그룹의 홍콩 매장인 자스코에도 파파야와
    멜론을 수출할 예정”이라고 말했다. 이번에 수출되는 신고배와 애호박, 멜론 등은 일본 시장에서 경쟁력이 높다는 평가를 받은 품목들이다. 안성 신고배는 일본에서 배 공급이 잘 이뤄지지 않는 4~5월까지 보관이 가능해
    일본 소비자들이 많이 찾는다. 애호박은 일본에 없는 품종으로 최근 일본의 젊은 주부 등을 중심으로 인기를 얻고 있다. 껍질을 벗겨 놓은 양파는 일본 측이 수출을 공식 요청한 품목이다. ○2017년 10억달러 수출
    달성이번 수출을 계기로 최근 엔화 약세와 일본 내 반한감정 확산 등으로 위축돼왔던 대일본 농산물 수출이 다시 활기를 띨 수 있을지 주목된다. 지난해 농협의 대일본 농산물 수출은 2억5000만달러로 전년 대비 20.6%
    급감해 동남아(28.3% 증가)와 중국(24.3% 증가) 등에 비해 실적이 참담했다. 이 대표는 “앞으로 판매조직의 핵심역량을 농산물 수출에 쏟아부을 것”이라며 “대일본 수출을 기반으로 올해 농협의 수출 4억달러,
    2017년엔 10억달러 목표를 반드시 달성하겠다”고 말했다.
  - tvN 수목극 ‘메모리스트’(연출 김휘, 소재현, 오승열 극본 안도하, 황하나)에서 매회 소름 끼치는 연기로 시청자들의 감탄을 자아낸 조한철이 종영 소감을 전했다. ‘메모리스트’는 국가공인 초능력 형사 동백과 초엘리트
    프로파일러 한선미가 미스터리한 ‘절대악’ 연쇄살인마를 추적하는 과정을 그린 수사극. 조한철은 극중 지우개의 하수인이자 ‘집행자’ 진재규로 분해 절정의 연기 기량으로 극의 몰입도를 극대화, 진재규의 생을 온전히 살아낸
    듯 캐릭터의 서사를 완벽하게 그려냈다. 소속사 눈컴퍼니를 통해 조한철은 “진재규를 연기하는 매일이 긴장감의 연속이었다. 지금까지 맡아온 역할들과는 사뭇 다른 결을 지닌, 낯선 캐릭터였기 때문이다”라며, “하지만
    진재규라는 흔치 않은 인물을 표현할 수 있어서 영광이었다”고 전했다. 이어 “유승호, 이세영은 진짜 프로다. 각자의 연기뿐만 아니라 합도 훌륭했던 덕분에 상당한 시너지를 낼 수 있었다. 베테랑 배우들답게 짧은 시간에
    집중력 있게 촬영을 리드했다”라며 애정을 아끼지 않았다. 그런가 하면 “‘메모리스트’는 드라마를 함께 만든 모든 이의 치열한 고뇌와 노력이 담긴 결과물이다. 촬영 현장에서 열과 성을 다한 스태프분들께 진심을 담아
    존경을 표한다. 시청자분들께도 더할 나위 없이 감사하다. 저에게 그렇듯 ‘메모리스트’가 여러분께 오랫동안 기억에 남았으면 좋겠다”라는 진솔한 소회와 감사 인사도 놓치지 않았다. 조한철은 첫 등장부터 미스터리를 증폭,
    폭풍처럼 몰아칠 극 전개의 방아쇠를 당겼다. 사진 기자 출신 연쇄살인마의 섬뜩한 면모부터 위태롭고도 비루한 삶, 애잔한 부성애, 처절한 최후까지 숨 막히는 열연으로 숱한 명장면을 탄생시킨 조한철. 단단한 연기 내공을
    오롯이 드러내며 진재규 그 자체를 구현, 서늘한 눈빛부터 절제된 표정, 행동 하나하나 섬세히 녹여내 브라운관에 고스란히 담았다. 연기의 끝을 가늠키 어려운 그의 차기작에 기대가 더해지는 이유다. 한편 tvN 수목극
    ‘메모리스트’는 오늘(30일) 10시 50분 최종회가 방송된다.
  - 넷마블(대표 권영식, 이승원)은 온라인 댄스게임 ‘클럽 엠스타’에 신규 펫 ‘붕어빵 춘식이’, 시즌 패션 아이템 등을 추가하고 이를 기념한 이벤트를 진행한다고 밝혔다. ‘붕어빵 춘식이’는 붕어빵과 고구마를 파는
    귀여운 쥐 외형을 한 펫으로 11월 동안 한시적으로 선보인다. 신규 펫은 캡슐머신을 통해 만나볼 수 있으며, 획득 시 레벨 쑥쑥 영양제 및 바삭 붕어빵 아이템을 함께 제공한다. 이와 함께 코트, 목폴라 니트, 앵클
    부츠 등 다양한 패션 아이템과 신규 음원 5곡도 추가했다. 넷마블은 이번 업데이트를 기념해 오는 12일까지 진행하는 미션타임 이벤트에 참여하면 캡슐머신-펫, 가을 캠핑 박스, 행운석 등 다양한 보상을 지급한다.
