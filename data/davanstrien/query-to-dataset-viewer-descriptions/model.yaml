    nman smiled to himself, for he believed he had mistaken some shining\\nberry of the woods for the glistening eyeballs\
    \ of a prowling savage, and\\nhe rode forward, continuing the conversation which had been interrupted\\nby the passing\
    \ thought.\\n\\nMajor Heyward was mistaken only in suffering his youthful and generous\\npride to suppress his active\
