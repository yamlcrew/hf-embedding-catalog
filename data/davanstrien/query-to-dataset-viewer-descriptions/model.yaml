    - "NEGATIVE: DATASET_NAME: \"vikp/starcoder_cleaned\"\nFEATURES: {'code': {'dtype': 'string', '_type': 'Value'}, 'repo_path':\
      \ {'dtype': 'string', '_type': 'Value'}}\nDATA SAMPLE:\n[\n  {\n    \"row_idx\": 0,\n    \"row\": {\n      \"code\"\
      : \"# ---\\n# jupyter:\\n#   jupytext:\\n#     text_representation:\\n#       extension: .py\\n#       format_name:\
      \ light\\n#       format_version: '1.5'\\n#       jupytext_version: 1.14.4\\n#   kernelspec:\\n#     display_name: Python\
      \ 3\\n#     language: python\\n#     name: python3\\n# ---\\n\\n# # 09 Strain Gage\\n#\\n# This is one of the most commonly\
      \ used sensor.  It is used in many transducers.  Its fundamental operating principle is fairly easy to understand and\
      \ it will be the purpose of this lecture. \\n#\\n# A strain gage is essentially a thin wire that is wrapped on film\
      \ of plastic.  \\n# <img src=\\\"img/StrainGage.png\\\" width=\\\"200\\\">\\n# The strain gage is then mounted (glued)\
      \ on the part for which the strain must be measured.  \\n# <img src=\\\"img/Strain_gauge_2.jpg\\\" width=\\\"200\\\"\
      >\\n#\\n# ## Stress, Strain\\n# When a beam is under axial load, the axial stress, $\\\\sigma_a$, is defined as:\\n#\
      \ \\\\begin{align*}\\n# \\\\sigma_a = \\\\frac{F}{A}\\n# \\\\end{align*}\\n# with $F$ the axial load, and $A$ the cross\
      \ sectional area of the beam under axial load.\\n#\\n# <img src=\\\"img/BeamUnderStrain.png\\\" width=\\\"200\\\">\\\
      n#\\n# Under the load, the beam of length $L$ will extend by $dL$, giving rise to the definition of strain, $\\\\epsilon_a$:\\\
      n# \\\\begin{align*}\\n# \\\\epsilon_a = \\\\frac{dL}{L}\\n# \\\\end{align*}\\n# The beam will also contract laterally:\
      \ the cross sectional area is reduced by $dA$.  This results in a transverval strain $\\\\epsilon_t$.  The transversal\
      \ and axial strains are related by the Poisson's ratio:\\n# \\\\begin{align*}\\n# \\\\nu = - \\\\frac{\\\\epsilon_t\
      \ }{\\\\epsilon_a}\\n# \\\\end{align*}\\n# For a metal the Poission's ratio is typically $\\\\nu = 0.3$, for an incompressible\
      \ material, such as rubber (or water), $\\\\nu = 0.5$.\\n#\\n# Within the elastic limit, the axial stress and axial\
      \ strain are related through Hooke's law by the Young's modulus, $E$:\\n# \\\\begin{align*}\\n# \\\\sigma_a = E \\\\\
      epsilon_a\\n# \\\\end{align*}\\n#\\n# <img src=\\\"img/ElasticRegime.png\\\" width=\\\"200\\\">\\n\\n# ## Resistance\
      \ of a wire\\n#\\n# The electrical resistance of a wire $R$ is related to its physical properties (the electrical resistiviy,\
      \ $\\\\rho$ in $\\\\Omega$/m) and its geometry: length $L$ and cross sectional area $A$.\\n#\\n# \\\\begin{align*}\\\
      n# R = \\\\frac{\\\\rho L}{A}\\n# \\\\end{align*}\\n#\\n# Mathematically, the change in wire dimension will result inchange\
      \ in its electrical resistance.  This can be derived from first principle:\\n# \\\\begin{align}\\n# \\\\frac{dR}{R}\
      \ = \\\\frac{d\\\\rho}{\\\\rho} + \\\\frac{dL}{L} - \\\\frac{dA}{A}\\n# \\\\end{align}\\n# If the wire has a square\
      \ cross section, then:\\n# \\\\begin{align*}\\n# A & = L'^2 \\\\\\\\\\n# \\\\frac{dA}{A} & = \\\\frac{d(L'^2)}{L'^2}\
      \ = \\\\frac{2L'dL'}{L'^2} = 2 \\\\frac{dL'}{L'}\\n# \\\\end{align*}\\n# We have related the change in cross sectional\
      \ area to the transversal strain.\\n# \\\\begin{align*}\\n# \\\\epsilon_t = \\\\frac{dL'}{L'}\\n# \\\\end{align*}\\\
      n# Using the Poisson's ratio, we can relate then relate the change in cross-sectional area ($dA/A$) to axial strain\
      \ $\\\\epsilon_a = dL/L$.\\n# \\\\begin{align*}\\n# \\\\epsilon_t &= - \\\\nu \\\\epsilon_a \\\\\\\\\\n# \\\\frac{dL'}{L'}\
      \ &= - \\\\nu \\\\frac{dL}{L} \\\\; \\\\text{or}\\\\\\\\\\n# \\\\frac{dA}{A} & = 2\\\\frac{dL'}{L'} = -2 \\\\nu \\\\\
      frac{dL}{L}\\n# \\\\end{align*}\\n# Finally we can substitute express $dA/A$ in eq. for $dR/R$ and relate change in\
      \ resistance to change of wire geometry, remembering that for a metal $\\\\nu =0.3$:\\n# \\\\begin{align}\\n# \\\\frac{dR}{R}\
      \ & = \\\\frac{d\\\\rho}{\\\\rho} + \\\\frac{dL}{L} - \\\\frac{dA}{A} \\\\\\\\\\n# & = \\\\frac{d\\\\rho}{\\\\rho} +\
      \ \\\\frac{dL}{L} - (-2\\\\nu \\\\frac{dL}{L}) \\\\\\\\\\n# & = \\\\frac{d\\\\rho}{\\\\rho} + 1.6 \\\\frac{dL}{L} =\
      \ \\\\frac{d\\\\rho}{\\\\rho} + 1.6 \\\\epsilon_a\\n# \\\\end{align}\\n# It also happens that for most metals, the resistivity\
      \ increases with axial strain.  In general, one can then related the change in resistance to axial strain by defining\
      \ the strain gage factor:\\n# \\\\begin{align}\\n# S = 1.6 + \\\\frac{d\\\\rho}{\\\\rho}\\\\cdot \\\\frac{1}{\\\\epsilon_a}\\\
      n# \\\\end{align}\\n# and finally, we have:\\n# \\\\begin{align*}\\n# \\\\frac{dR}{R} =  S \\\\epsilon_a\\n# \\\\end{align*}\\\
      n# $S$ is materials dependent and is typically equal to 2.0 for most commercially availabe strain gages. It is dimensionless.\\\
      n#\\n# Strain gages are made of thin wire that is wraped in several loops, effectively increasing the length of the\
      \ wire and therefore the sensitivity of the sensor.\\n#\\n# _Question:\\n#\\n# Explain why a longer wire is necessary\
      \ to increase the sensitivity of the sensor_.\\n#\\n# Most commercially available strain gages have a nominal resistance\
      \ (resistance under no load, $R_{ini}$) of 120 or 350 $\\\\Omega$.\\n#\\n# Within the elastic regime, strain is typically\
      \ within the range $10^{-6} - 10^{-3}$, in fact strain is expressed in unit of microstrain, with a 1 microstrain = $10^{-6}$.\
      \  Therefore, changes in resistances will be of the same order.  If one were to measure resistances, we will need a\
      \ dynamic range of 120 dB, whih is typically very expensive.  Instead, one uses the Wheatstone bridge to transform the\
      \ change in resistance to a voltage, which is easier to measure and does not require such a large dynamic range.\\n\\\
      n# ## Wheatstone bridge:\\n# <img src=\\\"img/WheatstoneBridge.png\\\" width=\\\"200\\\">\\n#\\n# The output voltage\
      \ is related to the difference in resistances in the bridge:\\n# \\\\begin{align*}\\n# \\\\frac{V_o}{V_s} = \\\\frac{R_1R_3-R_2R_4}{(R_1+R_4)(R_2+R_3)}\\\
      n# \\\\end{align*}\\n#\\n# If the bridge is balanced, then $V_o = 0$, it implies: $R_1/R_2 = R_4/R_3$.\\n#\\n# In practice,\
      \ finding a set of resistors that balances the bridge is challenging, and a potentiometer is used as one of the resistances\
      \ to do minor adjustement to balance the bridge.  If one did not do the adjustement (ie if we did not zero the bridge)\
      \ then all the measurement will have an offset or bias that could be removed in a post-processing phase, as long as\
      \ the bias stayed constant.\\n#\\n# If each resistance $R_i$ is made to vary slightly around its initial value, ie $R_i\
      \ = R_{i,ini} + dR_i$.  For simplicity, we will assume that the initial value of the four resistances are equal, ie\
      \ $R_{1,ini} = R_{2,ini} = R_{3,ini} = R_{4,ini} = R_{ini}$.  This implies that the bridge was initially balanced, then\
      \ the output voltage would be:\\n#\\n# \\\\begin{align*}\\n# \\\\frac{V_o}{V_s} = \\\\frac{1}{4} \\\\left( \\\\frac{dR_1}{R_{ini}}\
      \ - \\\\frac{dR_2}{R_{ini}} + \\\\frac{dR_3}{R_{ini}} - \\\\frac{dR_4}{R_{ini}} \\\\right)\\n# \\\\end{align*}\\n#\\\
      n# Note here that the changes in $R_1$ and $R_3$ have a positive effect on $V_o$, while the changes in $R_2$ and $R_4$\
      \ have a negative effect on $V_o$.  In practice, this means that is a beam is a in tension, then a strain gage mounted\
      \ on the branch 1 or 3 of the Wheatstone bridge will produce a positive voltage, while a strain gage mounted on branch\
      \ 2 or 4 will produce a negative voltage.  One takes advantage of this to increase sensitivity to measure strain.\\\
      n#\\n# ### Quarter bridge\\n# One uses only one quarter of the bridge, ie strain gages are only mounted on one branch\
      \ of the bridge.\\n#\\n# \\\\begin{align*}\\n# \\\\frac{V_o}{V_s} = \\\\pm \\\\frac{1}{4} \\\\epsilon_a S\\n# \\\\end{align*}\\\
      n# Sensitivity, $G$:\\n# \\\\begin{align*}\\n# G = \\\\frac{V_o}{\\\\epsilon_a} = \\\\pm \\\\frac{1}{4}S V_s\\n# \\\\\
      end{align*}\\n#\\n#\\n# ### Half bridge\\n# One uses half of the bridge, ie strain gages are mounted on two branches\
      \ of the bridge.\\n#\\n# \\\\begin{align*}\\n# \\\\frac{V_o}{V_s} = \\\\pm \\\\frac{1}{2} \\\\epsilon_a S\\n# \\\\end{align*}\\\
      n#\\n# ### Full bridge\\n#\\n# One uses of the branches of the bridge, ie strain gages are mounted on each branch.\\\
      n#\\n# \\\\begin{align*}\\n# \\\\frac{V_o}{V_s} = \\\\pm \\\\epsilon_a S\\n# \\\\end{align*}\\n#\\n# Therefore, as we\
      \ increase the order of bridge, the sensitivity of the instrument increases.  However, one should be carefull how we\
      \ mount the strain gages as to not cancel out their measurement.\\n\\n# _Exercise_\\n#\\n# 1- Wheatstone bridge\\n#\\\
      n# <img src=\\\"img/WheatstoneBridge.png\\\" width=\\\"200\\\">\\n#\\n# > How important is it to know \\\\& match the\
      \ resistances of the resistors you employ to create your bridge?\\n# > How would you do that practically?\\n# > Assume\
      \ $R_1=120\\\\,\\\\Omega$, $R_2=120\\\\,\\\\Omega$, $R_3=120\\\\,\\\\Omega$, $R_4=110\\\\,\\\\Omega$, $V_s=5.00\\\\\
      ,\\\\text{V}$.  What is $V_\\\\circ$?\\n\\nVs = 5.00\\nVo = (120**2-120*110)/(230*240) * Vs\\nprint('Vo = ',Vo, ' V')\\\
      n\\n# typical range in strain a strain gauge can measure\\n# 1 -1000 micro-Strain\\nAxialStrain = 1000*10**(-6)  # axial\
      \ strain\\nStrainGageFactor = 2\\nR_ini = 120 # Ohm\\nR_1 = R_ini+R_ini*StrainGageFactor*AxialStrain\\nprint(R_1)\\\
      nVo = (120**2-120*(R_1))/((120+R_1)*240) * Vs\\nprint('Vo = ', Vo, ' V')\\n\\n# > How important is it to know \\\\&\
      \ match the resistances of the resistors you employ to create your bridge?\\n# > How would you do that practically?\\\
      n# > Assume $R_1= R_2 =R_3=120\\\\,\\\\Omega$, $R_4=120.01\\\\,\\\\Omega$, $V_s=5.00\\\\,\\\\text{V}$.  What is $V_\\\
      \\circ$?\\n\\nVs = 5.00\\nVo = (120**2-120*120.01)/(240.01*240) * Vs\\nprint(Vo)\\n\\n# 2- Strain gage 1:\\n#\\n# One\
      \ measures the strain on a bridge steel beam.  The modulus of elasticity is $E=190$ GPa.  Only one strain gage is mounted\
      \ on the bottom of the beam; the strain gage factor is $S=2.02$.\\n#\\n# > a) What kind of electronic circuit will you\
      \ use?  Draw a sketch of it.\\n#\\n# > b) Assume all your resistors including the unloaded strain gage are balanced\
      \ and measure $120\\\\,\\\\Omega$, and that the strain gage is at location $R_2$.  The supply voltage is $5.00\\\\,\\\
      \\text{VDC}$.  Will $V_\\\\circ$ be positive or negative when a downward load is added?\\n\\n# In practice, we cannot\
      \ have all resistances = 120 $\\\\Omega$.  at zero load, the bridge will be unbalanced (show $V_o \\\\neq 0$). How could\
      \ we balance our bridge?\\n#\\n# Use a potentiometer to balance bridge, for the load cell, we ''zero'' the instrument.\\\
      n#\\n# Other option to zero-out our instrument? Take data at zero-load, record the voltage, $V_{o,noload}$.  Substract\
      \ $V_{o,noload}$ to my data.\\n\\n# > c) For a loading in which $V_\\\\circ = -1.25\\\\,\\\\text{mV}$, calculate the\
      \ strain $\\\\epsilon_a$ in units of microstrain.\\n\\n# \\\\begin{align*}\\n# \\\\frac{V_o}{V_s} & = - \\\\frac{1}{4}\
      \ \\\\epsilon_a S\\\\\\\\\\n# \\\\epsilon_a & = -\\\\frac{4}{S} \\\\frac{V_o}{V_s}\\n# \\\\end{align*}\\n\\nS = 2.02\\\
      nVo = -0.00125\\nVs = 5\\neps_a = -1*(4/S)*(Vo/Vs)\\nprint(eps_a)\\n\\n# > d) Calculate the axial stress (in MPa) in\
      \ the beam under this load.\\n\\n\\n\\n# > e) You now want more sensitivity in your measurement, you install a second\
      \ strain gage on to\\n\\n# p of the beam.  Which resistor should you use for this second active strain gage?\\n#\\n#\
      \ > f) With this new setup and the same applied load than previously, what should be the output voltage?\\n\\n# 3- Strain\
      \ Gage with Long Lead Wires \\n#\\n# <img src=\\\"img/StrainGageLongWires.png\\\" width=\\\"360\\\">\\n#\\n# A quarter\
      \ bridge strain gage Wheatstone bridge circuit is constructed with $120\\\\,\\\\Omega$ resistors and a $120\\\\,\\\\\
      Omega$ strain gage.  For this practical application, the strain gage is located very far away form the DAQ station and\
      \ the lead wires to the strain gage are $10\\\\,\\\\text{m}$ long and the lead wire have a resistance of $0.080\\\\\
      ,\\\\Omega/\\\\text{m}$.  The lead wire resistance can lead to problems since $R_{lead}$ changes with temperature.\\\
      n#\\n# > Design a modified circuit that will cancel out the effect of the lead wires.\\n\\n# ## Homework\\n#\\n\",\n\
      \      \"repo_path\": \"Lectures/09_StrainGage.ipynb\"\n    },\n    \"truncated_cells\": []\n  },\n  {\n    \"row_idx\"\
      : 1,\n    \"row\": {\n      \"code\": \"# ---\\n# jupyter:\\n#   jupytext:\\n#     split_at_heading: true\\n#     text_representation:\\\
      n#       extension: .py\\n#       format_name: light\\n#       format_version: '1.5'\\n#       jupytext_version: 1.14.4\\\
      n#   kernelspec:\\n#     display_name: Python 3\\n#     language: python\\n#     name: python3\\n# ---\\n\\n#export\\\
      nfrom fastai.basics import *\\nfrom fastai.tabular.core import *\\nfrom fastai.tabular.model import *\\n\\nfrom fastai.tabular.data\
      \ import *\\n\\n#hide\\nfrom nbdev.showdoc import *\\n\\n\\n# +\\n#default_exp tabular.learner\\n# -\\n\\n# # Tabular\
      \ learner\\n#\\n# > The function to immediately get a `Learner` ready to train for tabular data\\n\\n# The main function\
      \ you probably want to use in this module is `tabular_learner`. It will automatically create a `TabulaModel` suitable\
      \ for your data and infer the irght loss function. See the [tabular tutorial](http://docs.fast.ai/tutorial.tabular)\
      \ for an example of use in context.\\n\\n# ## Main functions\\n\\n#export\\n@log_args(but_as=Learner.__init__)\\nclass\
      \ TabularLearner(Learner):\\n    \\\"`Learner` for tabular data\\\"\\n    def predict(self, row):\\n        tst_to =\
      \ self.dls.valid_ds.new(pd.DataFrame(row).T)\\n        tst_to.process()\\n        tst_to.conts = tst_to.conts.astype(np.float32)\\\
      n        dl = self.dls.valid.new(tst_to)\\n        inp,preds,_,dec_preds = self.get_preds(dl=dl, with_input=True, with_decoded=True)\\\
      n        i = getattr(self.dls, 'n_inp', -1)\\n        b = (*tuplify(inp),*tuplify(dec_preds))\\n        full_dec = self.dls.decode((*tuplify(inp),*tuplify(dec_preds)))\\\
      n        return full_dec,dec_preds[0],preds[0]\\n\\n\\nshow_doc(TabularLearner, title_level=3)\\n\\n\\n# It works exactly\
      \ as a normal `Learner`, the only difference is that it implements a `predict` method specific to work on a row of data.\\\
      n\\n#export\\n@log_args(to_return=True, but_as=Learner.__init__)\\n@delegates(Learner.__init__)\\ndef tabular_learner(dls,\
      \ layers=None, emb_szs=None, config=None, n_out=None, y_range=None, **kwargs):\\n    \\\"Get a `Learner` using `dls`,\
      \ with `metrics`, including a `TabularModel` created using the remaining params.\\\"\\n    if config is None: config\
      \ = tabular_config()\\n    if layers is None: layers = [200,100]\\n    to = dls.train_ds\\n    emb_szs = get_emb_sz(dls.train_ds,\
      \ {} if emb_szs is None else emb_szs)\\n    if n_out is None: n_out = get_c(dls)\\n    assert n_out, \\\"`n_out` is\
      \ not defined, and could not be infered from data, set `dls.c` or pass `n_out`\\\"\\n    if y_range is None and 'y_range'\
      \ in config: y_range = config.pop('y_range')\\n    model = TabularModel(emb_szs, len(dls.cont_names), n_out, layers,\
      \ y_range=y_range, **config)\\n    return TabularLearner(dls, model, **kwargs)\\n\\n\\n# If your data was built with\
      \ fastai, you probably won't need to pass anything to `emb_szs` unless you want to change the default of the library\
      \ (produced by `get_emb_sz`), same for `n_out` which should be automatically inferred. `layers` will default to `[200,100]`\
      \ and is passed to `TabularModel` along with the `config`.\\n#\\n# Use `tabular_config` to create a `config` and cusotmize\
      \ the model used. There is just easy access to `y_range` because this argument is often used.\\n#\\n# All the other\
      \ arguments are passed to `Learner`.\\n\\npath = untar_data(URLs.ADULT_SAMPLE)\\ndf = pd.read_csv(path/'adult.csv')\\\
      ncat_names = ['workclass', 'education', 'marital-status', 'occupation', 'relationship', 'race']\\ncont_names = ['age',\
      \ 'fnlwgt', 'education-num']\\nprocs = [Categorify, FillMissing, Normalize]\\ndls = TabularDataLoaders.from_df(df, path,\
      \ procs=procs, cat_names=cat_names, cont_names=cont_names, \\n                                 y_names=\\\"salary\\\"\
      , valid_idx=list(range(800,1000)), bs=64)\\nlearn = tabular_learner(dls)\\n\\n#hide\\ntst = learn.predict(df.iloc[0])\\\
      n\\n# +\\n#hide\\n#test y_range is passed\\nlearn = tabular_learner(dls, y_range=(0,32))\\nassert isinstance(learn.model.layers[-1],\
      \ SigmoidRange)\\ntest_eq(learn.model.layers[-1].low, 0)\\ntest_eq(learn.model.layers[-1].high, 32)\\n\\nlearn = tabular_learner(dls,\
      \ config = tabular_config(y_range=(0,32)))\\nassert isinstance(learn.model.layers[-1], SigmoidRange)\\ntest_eq(learn.model.layers[-1].low,\
      \ 0)\\ntest_eq(learn.model.layers[-1].high, 32)\\n\\n\\n# -\\n\\n#export\\n@typedispatch\\ndef show_results(x:Tabular,\
      \ y:Tabular, samples, outs, ctxs=None, max_n=10, **kwargs):\\n    df = x.all_cols[:max_n]\\n    for n in x.y_names:\
      \ df[n+'_pred'] = y[n][:max_n].values\\n    display_df(df)\\n\\n\\n# ## Export -\\n\\n#hide\\nfrom nbdev.export import\
