      DATA SAMPLE:\n[\n  {\n    \"row_idx\": 0,\n    \"row\": {\n      \"instruction\": \"Please complete the task of abstracting\
      \ and extracting text content from different domains, where input is the content of the article and output is the result\
      \ of the summary.\",\n      \"input\": \"\\n  \\\"Mine ear is open, and my heart prepared:\\n  The worst is worldly\
      \ loss thou canst unfold:\\n  Say, is my kingdom lost?\\\"\\n\\n  SHAKESPEARE.\\n\\n\\nIt was a feature peculiar to\
      \ the colonial wars of North America, that\\nthe toils and dangers of the wilderness were to be encountered before\\\
      nthe adverse hosts could meet. A wide and apparently an impervious\\nboundary of forests severed the possessions of\
      \ the hostile provinces of\\nFrance and England. The hardy colonist, and the trained European who\\nfought at his side,\
      \ frequently expended months in struggling against the\\nrapids of the streams, or in effecting the rugged passes of\
      \ the\\nmountains, in quest of an opportunity to exhibit their courage in a more\\nmartial conflict. But, emulating\
      \ the patience and self-denial of the\\npractised native warriors, they learned to overcome every difficulty;\\nand\
      \ it would seem that, in time, there was no recess of the woods so\\ndark, nor any secret place so lovely, that it might\
      \ claim exemption from\\nthe inroads of those who had pledged their blood to satiate their\\nvengeance, or to uphold\
      \ the cold and selfish policy of the distant\\nmonarchs of Europe.\\n\\nPerhaps no district throughout the wide extent\
      \ of the intermediate\\nfrontiers can furnish a livelier picture of the cruelty and fierceness\\nof the savage warfare\
      \ of those periods than the country which lies\\nbetween the head waters of the Hudson and the adjacent lakes.\\n\\\
      nThe facilities which nature had there offered to the march of the\\ncombatants were too obvious to be neglected. The\
      \ lengthened sheet of the\\nChamplain stretched from the frontiers of Canada, deep within the\\nborders of the neighboring\
      \ province of New York, forming a natural\\npassage across half the distance that the French were compelled to\\nmaster\
      \ in order to strike their enemies. Near its southern termination,\\nit received the contributions of another lake,\
      \ whose waters were so\\nlimpid as to have been exclusively selected by the Jesuit missionaries\\nto perform the typical\
      \ purification of baptism, and to obtain for it the\\ntitle of lake \\\"du Saint Sacrement.\\\" The less zealous English\
      \ thought\\nthey conferred a sufficient honor on its unsullied fountains, when they\\nbestowed the name of their reigning\
      \ prince, the second of the house of\\nHanover. The two united to rob the untutored possessors of its wooded\\nscenery\
      \ of their native right to perpetuate its original appellation of\\n\\\"Horican.\\\"[1]\\n\\nWinding its way among countless\
      \ islands, and imbedded in mountains, the\\n\\\"holy lake\\\" extended a dozen leagues still farther to the south. With\\\
      nthe high plain that there interposed itself to the further passage of\\nthe water, commenced a portage of as many miles,\
      \ which conducted the\\nadventurer to the banks of the Hudson, at a point where, with the usual\\nobstructions of the\
      \ rapids, or rifts, as they were then termed in the\\nlanguage of the country, the river became navigable to the tide.\\\
      n\\nWhile, in the pursuit of their daring plans of annoyance, the restless\\nenterprise of the French even attempted\
      \ the distant and difficult gorges\\nof the Alleghany, it may easily be imagined that their proverbial\\nacuteness would\
      \ not overlook the natural advantages of the district we\\nhave just described. It became, emphatically, the bloody\
      \ arena, in which\\nmost of the battles for the mastery of the colonies were contested.\\nForts were erected at the\
      \ different points that commanded the facilities\\nof the route, and were taken and retaken, razed and rebuilt, as victory\\\
      nalighted on the hostile banners. While the husbandman shrank back from\\nthe dangerous passes, within the safer boundaries\
      \ of the more ancient\\nsettlements, armies larger than those that had often disposed of the\\nsceptres of the mother\
      \ countries, were seen to bury themselves in these\\nforests, whence they rarely returned but in skeleton bands, that\
      \ were\\nhaggard with care, or dejected by defeat. Though the arts of peace were\\nunknown to this fatal region, its\
      \ forests were alive with men; its\\nshades and glens rang with the sounds of martial music, and the echoes\\nof its\
      \ mountains threw back the laugh, or repeated the wanton cry, of\\nmany a gallant and reckless youth, as he hurried\
      \ by them, in the\\nnoontide of his spirits, to slumber in a long night of forgetfulness.\\n\\nIt was in this scene\
      \ of strife and bloodshed that the incidents we shall\\nattempt to relate occurred, during the third year of the war\
      \ which\\nEngland and France last waged for the possession of a country that\\nneither was destined to retain.\\n\\\
      nThe imbecility of her military leaders abroad, and the fatal want of\\nenergy in her councils at home, had lowered\
      \ the character of Great\\nBritain from the proud elevation on which it had been placed, by the\\ntalents and enterprise\
      \ of her former warriors and statesmen. No longer\\ndreaded by her enemies, her servants were fast losing the confidence\
      \ of\\nself-respect. In this mortifying abasement, the colonists, though\\ninnocent of her imbecility, and too humble\
      \ to be the agents of her\\nblunders, were but the natural participators.\\n\\nThey had recently seen a chosen army\
      \ from that country, which,\\nreverencing as a mother, they had blindly believed invincible--an army\\nled by a chief\
      \ who had been selected from a crowd of trained warriors,\\nfor his rare military endowments, disgracefully routed by\
      \ a handful of\\nFrench and Indians, and only saved from annihilation by the coolness and\\nspirit of a Virginian boy,\
      \ whose riper fame has since diffused itself,\\nwith the steady influence of moral truth, to the uttermost confines\
      \ of\\nChristendom.[2] A wide frontier had been laid naked by this unexpected\\ndisaster, and more substantial evils\
      \ were preceded by a thousand\\nfanciful and imaginary dangers. The alarmed colonists believed that the\\nyells of the\
      \ savages mingled with every fitful gust of wind that issued\\nfrom the interminable forests of the west. The terrific\
      \ character of\\ntheir merciless enemies increased immeasurably the natural horrors of\\nwarfare. Numberless recent\
      \ massacres were still vivid in their\\nrecollections; nor was there any ear in the provinces so deaf as not to\\nhave\
      \ drunk in with avidity the narrative of some fearful tale of\\nmidnight murder, in which the natives of the forests\
      \ were the principal\\nand barbarous actors. As the credulous and excited traveller related the\\nhazardous chances\
      \ of the wilderness, the blood of the timid curdled\\nwith terror, and mothers cast anxious glances even at those children\\\
      nwhich slumbered within the security of the largest towns. In short, the\\nmagnifying influence of fear began to set\
      \ at naught the calculations of\\nreason, and to render those who should have remembered their manhood,\\nthe slaves\
      \ of the basest of passions. Even the most confident and the\\nstoutest hearts began to think the issue of the contest\
      \ was becoming\\ndoubtful; and that abject class was hourly increasing in numbers, who\\nthought they foresaw all the\
      \ possessions of the English crown in America\\nsubdued by their Christian foes, or laid waste by the inroads of their\\\
      nrelentless allies.\\n\\nWhen, therefore, intelligence was received at the fort, which covered\\nthe southern termination\
      \ of the portage between the Hudson and the\\nlakes, that Montcalm had been seen moving up the Champlain, with an army\\\
      n\\\"numerous as the leaves on the trees,\\\" its truth was admitted with more\\nof the craven reluctance of fear than\
      \ with the stern joy that a warrior\\nshould feel, in finding an enemy within reach of his blow. The news had\\nbeen\
      \ brought, towards the decline of a day in midsummer, by an Indian\\nrunner, who also bore an urgent request from Munro,\
      \ the commander of a\\nwork on the shore of the \\\"holy lake,\\\" for a speedy and powerful\\nreinforcement. It has\
      \ already been mentioned that the distance between\\nthese two posts was less than five leagues. The rude path, which\\\
      noriginally formed their line of communication, had been widened for the\\npassage of wagons; so that the distance which\
      \ had been travelled by the\\nson of the forest in two hours, might easily be effected by a detachment\\nof troops,\
      \ with their necessary baggage, between the rising and setting\\nof a summer sun. The loyal servants of the British\
      \ crown had given to\\none of these forest fastnesses the name of William Henry, and to the\\nother that of Fort Edward;\
      \ calling each after a favorite prince of the\\nreigning family. The veteran Scotchman just named held the first, with\
      \ a\\nregiment of regulars and a few provincials; a force really by far too\\nsmall to make head against the formidable\
      \ power that Montcalm was\\nleading to the foot of his earthen mounds. At the latter, however, lay\\nGeneral Webb, who\
      \ commanded the armies of the king in the northern\\nprovinces, with a body of more than five thousand men. By uniting\
      \ the\\nseveral detachments of his command, this officer might have arrayed\\nnearly double that number of combatants\
      \ against the enterprising\\nFrenchman, who had ventured so far from his reinforcements, with an army\\nbut little superior\
      \ in numbers.\\n\\nBut under the influence of their degraded fortunes, both officers and\\nmen appeared better disposed\
      \ to await the approach of their formidable\\nantagonists, within their works, than to resist the progress of their\\\
      nmarch, by emulating the successful example of the French at Fort du\\nQuesne, and striking a blow on their advance.\\\
      n\\nAfter the first surprise of the intelligence had a little abated, a\\nrumor was spread through the entrenched camp,\
      \ which stretched along the\\nmargin of the Hudson, forming a chain of outworks to the body of the\\nfort itself, that\
      \ a chosen detachment of fifteen hundred men was to\\ndepart, with the dawn, for William Henry, the post at the northern\\\
      nextremity of the portage. That which at first was only rumor, soon\\nbecame certainty, as orders passed from the quarters\
      \ of the\\ncommander-in-chief to the several corps he had selected for this\\nservice, to prepare for their speedy departure.\
      \ All doubt as to the\\nintention of Webb now vanished, and an hour or two of hurried footsteps\\nand anxious faces\
      \ succeeded. The novice in the military art flew from\\npoint to point, retarding his own preparations by the excess\
      \ of his\\nviolent and somewhat distempered zeal; while the more practised veteran\\nmade his arrangements with a deliberation\
      \ that scorned every appearance\\nof haste; though his sober lineaments and anxious eye sufficiently\\nbetrayed that\
      \ he had no very strong professional relish for the as yet\\nuntried and dreaded warfare of the wilderness. At length\
      \ the sun set in\\na flood of glory, behind the distant western hills, and as darkness drew\\nits veil around the secluded\
      \ spot the sounds of preparation diminished;\\nthe last light finally disappeared from the log cabin of some officer;\\\
      nthe trees cast their deeper shadows over the mounds and the rippling\\nstream, and a silence soon pervaded the camp,\
      \ as deep as that which\\nreigned in the vast forest by which it was environed.\\n\\nAccording to the orders of the\
      \ preceding night, the heavy sleep of the\\narmy was broken by the rolling of the warning drums, whose rattling\\nechoes\
      \ were heard issuing, on the damp morning air, out of every vista\\nof the woods, just as day began to draw the shaggy\
      \ outlines of some tall\\npines of the vicinity, on the opening brightness of a soft and cloudless\\neastern sky. In\
      \ an instant the whole camp was in motion; the meanest\\nsoldier arousing from his lair to witness the departure of\
      \ his\\ncomrades, and to share in the excitement and incidents of the hour. The\\nsimple array of the chosen band was\
      \ soon completed. While the regular\\nand trained hirelings of the king marched with haughtiness to the right\\nof the\
      \ line, the less pretending colonists took their humbler position\\non its left, with a docility that long practice\
      \ had rendered easy. The\\nscouts departed; strong guards preceded and followed the lumbering\\nvehicles that bore the\
      \ baggage; and before the gray light of the morning\\nwas mellowed by the rays of the sun, the main body of the combatants\\\
      nwheeled into column, and left the encampment with a show of high\\nmilitary bearing, that served to drown the slumbering\
      \ apprehensions of\\nmany a novice, who was now about to make his first essay in arms. While\\nin view of their admiring\
      \ comrades, the same proud front and ordered\\narray was observed, until the notes of their fifes growing fainter in\\\
      ndistance, the forest at length appeared to swallow up the living mass\\nwhich had slowly entered its bosom.\\n\\nThe\
      \ deepest sounds of the retiring and invisible column had ceased to be\\nborne on the breeze to the listeners, and the\
      \ latest straggler had\\nalready disappeared in pursuit; but there still remained the signs of\\nanother departure,\
      \ before a log cabin of unusual size and\\naccommodations, in front of which those sentinels paced their rounds,\\nwho\
      \ were known to guard the person of the English general. At this spot\\nwere gathered some half dozen horses, caparisoned\
      \ in a manner which\\nshowed that two, at least, were destined to bear the persons of females,\\nof a rank that it was\
      \ not usual to meet so far in the wilds of the\\ncountry. A third wore the trappings and arms of an officer of the staff;\\\
      nwhile the rest, from the plainness of the housings, and the travelling\\nmails with which they were encumbered, were\
      \ evidently fitted for the\\nreception of as many menials, who were, seemingly, already awaiting the\\npleasure of those\
      \ they served. At a respectful distance from this\\nunusual show were gathered divers groups of curious idlers; some\\\
      nadmiring the blood and bone of the high-mettled military charger, and\\nothers gazing at the preparations, with dull\
      \ wonder of vulgar curiosity.\\nThere was one man, however, who, by his countenance and actions, formed\\na marked exception\
      \ to those who composed the latter class of spectators,\\nbeing neither idle, nor seemingly very ignorant.\\n\\nThe\
      \ person of this individual was to the last degree ungainly, without\\nbeing in any particular manner deformed. He had\
      \ all the bones and joints\\nof other men, without any of their proportions. Erect, his stature\\nsurpassed that of\
      \ his fellows; seated, he appeared reduced within the\\nordinary limits of the race. The same contrariety in his members\
      \ seemed\\nto exist throughout the whole man. His head was large; his shoulders\\nnarrow; his arms long and dangling;\
      \ while his hands were small, if not\\ndelicate. His legs and thighs were thin, nearly to emaciation, but of\\nextraordinary\
      \ length; and his knees would have been considered\\ntremendous, had they not been outdone by the broader foundations\
      \ on\\nwhich this false superstructure of the blended human orders was so\\nprofanely reared. The ill-assorted and injudicious\
      \ attire of the\\nindividual only served to render his awkwardness more conspicuous. A\\nsky-blue coat, with short and\
      \ broad skirts and low cape, exposed a long\\nthin neck, and longer and thinner legs, to the worst animadversions of\\\
      nthe evil disposed. His nether garment was of yellow nankeen, closely\\nfitted to the shape, and tied at his bunches\
      \ of knees by large knots of\\nwhite ribbon, a good deal sullied by use. Clouded cotton stockings, and\\nshoes, on one\
      \ of the latter of which was a plated spur, completed the\\ncostume of the lower extremity of this figure, no curve\
      \ or angle of\\nwhich was concealed, but, on the other hand, studiously exhibited,\\nthrough the vanity or simplicity\
      \ of its owner. From beneath the flap of\\nan enormous pocket of a soiled vest of embossed silk, heavily ornamented\\\
      nwith tarnished silver lace, projected an instrument, which, from being\\nseen in such martial company, might have been\
      \ easily mistaken for some\\nmischievous and unknown implement of war. Small as it was, this uncommon\\nengine had excited\
      \ the curiosity of most of the Europeans in the camp,\\nthough several of the provincials were seen to handle it, not\
      \ only\\nwithout fear, but with the utmost familiarity. A large, civil cocked\\nhat, like those worn by clergymen within\
      \ the last thirty years,\\nsurmounted the whole, furnishing dignity to a good-natured and somewhat\\nvacant countenance,\
      \ that apparently needed such artificial aid, to\\nsupport the gravity of some high and extraordinary trust.\\n\\nWhile\
      \ the common herd stood aloof, in deference to the quarters of Webb,\\nthe figure we have described stalked in the centre\
      \ of the domestics,\\nfreely expressing his censures or commendations on the merits of the\\nhorses, as by chance they\
      \ displeased or satisfied his judgment.\\n\\n\\\"This beast, I rather conclude, friend, is not of home raising, but\
      \ is\\nfrom foreign lands, or perhaps from the little island itself over the\\nblue water?\\\" he said, in a voice as\
      \ remarkable for the softness and\\nsweetness of its tones, as was his person for its rare proportions: \\\"I\\nmay\
      \ speak of these things, and be no braggart; for I have been down at\\nboth havens; that which is situate at the mouth\
      \ of Thames, and is named\\nafter the capital of Old England, and that which is called 'Haven,' with\\nthe addition\
      \ of the word 'New'; and have seen the snows and brigantines\\ncollecting their droves, like the gathering to the ark,\
      \ being outward\\nbound to the Island of Jamaica, for the purpose of barter and traffic in\\nfour-footed animals; but\
      \ never before have I beheld a beast which\\nverified the true Scripture war-horse like this: 'He paweth in the\\nvalley,\
      \ and rejoiceth in his strength: he goeth on to meet the armed\\nmen. He saith among the trumpets, Ha, ha; and he smelleth\
      \ the battle\\nafar off, the thunder of the captains, and the shouting.' It would seem\\nthat the stock of the horse\
      \ of Israel has descended to our own time;\\nwould it not, friend?\\\"\\n\\nReceiving no reply to this extraordinary\
      \ appeal, which in truth, as it\\nwas delivered with the vigor of full and sonorous tones, merited some\\nsort of notice,\
      \ he who had thus sung forth the language of the Holy Book\\nturned to the silent figure to whom he had unwittingly\
      \ addressed\\nhimself, and found a new and more powerful subject of admiration in the\\nobject that encountered his\
      \ gaze. His eyes fell on the still, upright,\\nand rigid form of the \\\"Indian runner,\\\" who had borne to the camp\
      \ the\\nunwelcome tidings of the preceding evening. Although in a state of\\nperfect repose, and apparently disregarding,\
      \ with characteristic\\nstoicism, the excitement and bustle around him, there was a sullen\\nfierceness mingled with\
      \ the quiet of the savage, that was likely to\\narrest the attention of much more experienced eyes than those which\
      \ now\\nscanned him, in unconcealed amazement. The native bore both the tomahawk\\nand knife of his tribe; and yet his\
      \ appearance was not altogether that\\nof a warrior. On the contrary, there was an air of neglect about his\\nperson,\
      \ like that which might have proceeded from great and recent\\nexertion, which he had not yet found leisure to repair.\
      \ The colors of\\nthe war-paint had blended in dark confusion about his fierce\\ncountenance, and rendered his swarthy\
      \ lineaments still more savage and\\nrepulsive than if art had attempted an effect which had been thus\\nproduced by\
      \ chance. His eye, alone, which glistened like a fiery star\\namid lowering clouds, was to be seen in its state of native\
      \ wildness.\\nFor a single instant, his searching and yet wary glance met the\\nwondering look of the other, and then\
      \ changing its direction, partly in\\ncunning, and partly in disdain, it remained fixed, as if penetrating the\\ndistant\
      \ air.\\n\\nIt is impossible to say what unlooked-for remark this short and silent\\ncommunication, between two such\
      \ singular men, might have elicited from\\nthe white man, had not his active curiosity been again drawn to other\\nobjects.\
      \ A general movement among the domestics, and a low sound of\\ngentle voices, announced the approach of those whose\
      \ presence alone was\\nwanted to enable the cavalcade to move. The simple admirer of the\\nwar-horse instantly fell\
      \ back to a low, gaunt, switch-tailed mare, that\\nwas unconsciously gleaning the faded herbage of the camp nigh by;\
      \ where,\\nleaning with one elbow on the blanket that concealed an apology for a\\nsaddle, he became a spectator of\
      \ the departure, while a foal was quietly\\nmaking its morning repast, on the opposite side of the same animal.\\n\\\
      nA young man, in the dress of an officer, conducted to their steeds two\\nfemales, who, as it was apparent by their\
      \ dresses, were prepared to\\nencounter the fatigues of a journey in the woods. One, and she was the\\nmost juvenile\
      \ in her appearance, though both were young, permitted\\nglimpses of her dazzling complexion, fair golden hair, and\
      \ bright blue\\neyes, to be caught, as she artlessly suffered the morning air to blow\\naside the green veil which descended\
      \ low from her beaver. The flush\\nwhich still lingered above the pines in the western sky was not more\\nbright nor\
      \ delicate than the bloom on her cheek; nor was the opening day\\nmore cheering than the animated smile which she bestowed\
      \ on the youth,\\nas he assisted her into the saddle. The other, who appeared to share\\nequally in the attentions of\
      \ the young officer, concealed her charms\\nfrom the gaze of the soldiery, with a care that seemed better fitted to\\\
      nthe experience of four or five additional years. It could be seen,\\nhowever, that her person, though moulded with\
      \ the same exquisite\\nproportions, of which none of the graces were lost by the travelling\\ndress she wore, was rather\
      \ fuller and more mature than that of her\\ncompanion.\\n\\nNo sooner were these females seated, than their attendant\
      \ sprang lightly\\ninto the saddle of the war-horse, when the whole three bowed to Webb,\\nwho, in courtesy, awaited\
      \ their parting on the threshold of his cabin,\\nand turning their horses' heads, they proceeded at a slow amble,\\\
      nfollowed by their train, towards the northern entrance of the\\nencampment. As they traversed that short distance,\
      \ not a voice was\\nheard amongst them; but a slight exclamation proceeded from the younger\\nof the females, as the\
      \ Indian runner glided by her, unexpectedly, and\\nled the way along the military road in her front. Though this sudden\
      \ and\\nstartling movement of the Indian produced no sound from the other, in\\nthe surprise her veil also was allowed\
      \ to open its folds, and betrayed\\nan indescribable look of pity, admiration, and horror, as her dark eye\\nfollowed\
      \ the easy motions of the savage. The tresses of this lady were\\nshining and black, like the plumage of the raven.\
      \ Her complexion was not\\nbrown, but it rather appeared charged with the color of the rich blood,\\nthat seemed ready\
      \ to burst its bounds. And yet there was neither\\ncoarseness nor want of shadowing in a countenance that was exquisitely\\\
      nregular and dignified, and surpassingly beautiful. She smiled, as if in\\npity at her own momentary forgetfulness,\
      \ discovering by the act a row of\\nteeth that would have shamed the purest ivory; when, replacing the veil,\\nshe bowed\
      \ her face, and rode in silence, like one whose thoughts were\\nabstracted from the scene around her.\\n\\n\\n\\n\\\
      n  \\\"Sola, sola, wo, ha, ho, sola!\\\"\\n\\n  SHAKESPEARE.\\n\\n\\nWhile one of the lovely beings we have so cursorily\
      \ presented to the\\nreader was thus lost in thought, the other quickly recovered from the\\nalarm which induced the\
      \ exclamation, and, laughing at her own weakness,\\nshe inquired of the youth who rode by her side,--\\n\\n\\\"Are such\
      \ spectres frequent in the woods, Heyward; or is this sight an\\nespecial entertainment on our behalf? If the latter,\
      \ gratitude must\\nclose our mouths; but if the former, both Cora and I shall have need to\\ndraw largely on that stock\
      \ of hereditary courage which we boast, even\\nbefore we are made to encounter the redoubtable Montcalm.\\\"\\n\\n\\\
      \"Yon Indian is a 'runner' of the army; and, after the fashion of his\\npeople, he may be accounted a hero,\\\" returned\
      \ the officer. \\\"He has\\nvolunteered to guide us to the lake, by a path but little known, sooner\\nthan if we followed\
      \ the tardy movements of the column: and, by\\nconsequence, more agreeably.\\\"\\n\\n\\\"I like him not,\\\" said the\
      \ lady, shuddering, partly in assumed, yet more\\nin real terror. \\\"You know him, Duncan, or you would not trust yourself\\\
      nso freely to his keeping?\\\"\\n\\n\\\"Say, rather, Alice, that I would not trust you. I do know him, or he\\nwould\
      \ not have my confidence, and least of all at this moment. He is\\nsaid to be a Canadian, too; and yet he served with\
      \ our friends the\\nMohawks, who, as you know, are one of the six allied nations.[3] He was\\nbrought among us, as I\
      \ have heard, by some strange accident in which\\nyour father was interested, and in which the savage was rigidly dealt\\\
      nby--but I forget the idle tale; it is enough, that he is now our\\nfriend.\\\"\\n\\n\\\"If he has been my father's\
      \ enemy, I like him still less!\\\" exclaimed the\\nnow really anxious girl. \\\"Will you not speak to him, Major Heyward,\
      \ that\\nI may hear his tones? Foolish though it may be, you have often heard me\\navow my faith in the tones of the\
      \ human voice!\\\"\\n\\n\\\"It would be in vain; and answered, most probably, by an ejaculation.\\nThough he may understand\
      \ it, he affects, like most of his people, to be\\nignorant of the English; and least of all will he condescend to speak\\\
      nit, now that war demands the utmost exercise of his dignity. But he\\nstops; the private path by which we are to journey\
      \ is, doubtless, at\\nhand.\\\"\\n\\nThe conjecture of Major Heyward was true. When they reached the spot\\nwhere the\
      \ Indian stood, pointing into the thicket that fringed the\\nmilitary road, a narrow and blind path, which might, with\
      \ some little\\ninconvenience, receive one person at a time, became visible.\\n\\n\\\"Here, then, lies our way,\\\"\
      \ said the young man, in a low voice.\\n\\\"Manifest no distrust, or you may invite the danger you appear to\\napprehend.\\\
      \"\\n\\n\\\"Cora, what think you?\\\" asked the reluctant fair one. \\\"If we journey\\nwith the troops, though we may\
      \ find their presence irksome, shall we not\\nfeel better assurance of our safety?\\\"\\n\\n\\\"Being little accustomed\
      \ to the practices of the savages, Alice, you\\nmistake the place of real danger,\\\" said Heyward. \\\"If enemies have\\\
      nreached the portage at all, a thing by no means probable, as our scouts\\nare abroad, they will surely be found skirting\
      \ the column where scalps\\nabound the most. The route of the detachment is known, while ours,\\nhaving been determined\
      \ within the hour, must still be secret.\\\"\\n\\n\\\"Should we distrust the man because his manners are not our manners,\
      \ and\\nthat his skin is dark?\\\" coldly asked Cora.\\n\\nAlice hesitated no longer; but giving her Narragansett[4]\
      \ a smart cut\\nof the whip, she was the first to dash aside the slight branches of the\\nbushes, and to follow the\
      \ runner along the dark and tangled pathway. The\\nyoung man regarded the last speaker in open admiration, and even\\\
      npermitted her fairer though certainly not more beautiful companion to\\nproceed unattended, while he sedulously opened\
      \ the way himself for the\\npassage of her who has been called Cora. It would seem that the\\ndomestics had been previously\
      \ instructed; for, instead of penetrating\\nthe thicket, they followed the route of the column; a measure which\\nHeyward\
      \ stated had been dictated by the sagacity of their guide, in\\norder to diminish the marks of their trail, if, haply,\
      \ the Canadian\\nsavages should be lurking so far in advance of their army. For many\\nminutes the intricacy of the\
      \ route admitted of no further dialogue;\\nafter which they emerged from the broad border of underbrush which grew\\\
      nalong the line of the highway, and entered under the high but dark\\narches of the forest. Here their progress was\
      \ less interrupted, and the\\ninstant the guide perceived that the females could command their steeds,\\nhe moved on,\
      \ at a pace between a trot and a walk, and at a rate which\\nkept the sure-footed and peculiar animals they rode, at\
      \ a fast yet easy\\namble. The youth had turned to speak to the dark-eyed Cora, when the\\ndistant sound of horses'\
      \ hoofs, clattering over the roots of the broken\\nway in his rear, caused him to check his charger; and, as his companions\\\
      ndrew their reins at the same instant, the whole party came to a halt, in\\norder to obtain an explanation of the unlooked-for\
      \ interruption.\\n\\nIn a few moments a colt was seen gliding, like a fallow-deer, among the\\nstraight trunks of the\
      \ pines; and, in another instant, the person of the\\nungainly man described in the preceding chapter, came into view,\
      \ with as\\nmuch rapidity as he could excite his meagre beast to endure without\\ncoming to an open rupture. Until now\
      \ this personage had escaped the\\nobservation of the travellers. If he possessed the power to arrest any\\nwandering\
      \ eye when exhibiting the glories of his altitude on foot, his\\nequestrian graces were still more likely to attract\
      \ attention.\\nNotwithstanding a constant application of his one armed heel to the\\nflanks of the mare, the most confirmed\
      \ gait that he could establish was\\na Canterbury gallop with the hind legs, in which those more forward\\nassisted\
      \ for doubtful moments, though generally content to maintain a\\nloping trot. Perhaps the rapidity of the changes from\
      \ one of these paces\\nto the other created an optical illusion, which might thus magnify the\\npowers of the beast;\
      \ for it is certain that Heyward, who possessed a\\ntrue eye for the merits of a horse, was unable, with his utmost\\\
      ningenuity, to decide by what sort of movement his pursuer worked his\\nsinuous way on his footsteps with such persevering\
      \ hardihood.\\n\\nThe industry and movements of the rider were not less remarkable than\\nthose of the ridden. At each\
      \ change in the evolutions of the latter, the\\nformer raised his tall person in the stirrups; producing, in this\\\
      nmanner, by the undue elongation of his legs, such sudden growths and\\ndiminishings of the stature, as baffled every\
      \ conjecture that might be\\nmade as to his dimensions. If to this be added the fact that, in\\nconsequence of the ex\
      \ parte application of the spur, one side of the\\nmare appeared to journey faster than the other; and that the aggrieved\\\
      nflank was resolutely indicated by unremitted flourishes of a bushy tail,\\nwe finish the picture of both horse and\
      \ man.\\n\\nThe frown which had gathered around the handsome, open, and manly brow\\nof Heyward, gradually relaxed,\
      \ and his lips curled into a slight smile,\\nas he regarded the stranger. Alice made no very powerful effort to\\ncontrol\
      \ her merriment; and even the dark, thoughtful eye of Cora lighted\\nwith a humor that, it would seem, the habit, rather\
      \ than the nature of\\nits mistress repressed.\\n\\n\\\"Seek you any here?\\\" demanded Heyward, when the other had\
      \ arrived\\nsufficiently nigh to abate his speed; \\\"I trust you are no messenger of\\nevil tidings?\\\"\\n\\n\\\"\
      Even so,\\\" replied the stranger, making diligent use of his triangular\\ncastor, to produce a circulation in the close\
      \ air of the woods, and\\nleaving his hearers in doubt to which of the young man's questions he\\nresponded; when, however,\
      \ he had cooled his face, and recovered his\\nbreath, he continued, \\\"I hear you are riding to William Henry; as I\
      \ am\\njourneying thitherward myself, I concluded good company would seem\\nconsistent to the wishes of both parties.\\\
      \"\\n\\n\\\"You appear to possess the privilege of a casting vote,\\\" returned\\nHeyward; \\\"we are three, whilst\
      \ you have consulted no one but yourself.\\\"\\n\\n\\\"Even so. The first point to be obtained is to know one's own\
      \ mind. Once\\nsure of that, and where women are concerned, it is not easy, the next\\nis, to act up to the decision.\
      \ I have endeavored to do both, and here I\\nam.\\\"\\n\\n\\\"If you journey to the lake, you have mistaken your route,\\\
      \" said\\nHeyward, haughtily; \\\"the highway thither is at least half a mile behind\\nyou.\\\"\\n\\n\\\"Even so,\\\"\
      \ returned the stranger, nothing daunted by this cold\\nreception; \\\"I have tarried at 'Edward' a week, and I should\
      \ be dumb not\\nto have inquired the road I was to journey; and if dumb there would be\\nan end to my calling.\\\" After\
      \ simpering in a small way, like one whose\\nmodesty prohibited a more open expression of his admiration of a\\nwitticism\
      \ that was perfectly unintelligible to his hearers, he\\ncontinued: \\\"It is not prudent for any one of my profession\
      \ to be too\\nfamiliar with those he is to instruct; for which reason I follow not the\\nline of the army; besides which,\
      \ I conclude that a gentleman of your\\ncharacter has the best judgment in matters of wayfaring; I have\\ntherefore\
      \ decided to join company, in order that the ride may be made\\nagreeable, and partake of social communion.\\\"\\n\\\
      n\\\"A most arbitrary, if not a hasty decision!\\\" exclaimed Heyward,\\nundecided whether to give vent to his growing\
      \ anger, or to laugh in the\\nother's face. \\\"But you speak of instruction, and of a profession; are\\nyou an adjunct\
      \ to the provincial corps, as a master of the noble science\\nof defence and offence; or, perhaps, you are one who draws\
      \ lines and\\nangles, under the pretence of expounding the mathematics?\\\"\\n\\nThe stranger regarded his interrogator\
      \ a moment, in wonder; and then,\\nlosing every mark of self-satisfaction in an expression of solemn\\nhumility, he\
      \ answered:--\\n\\n\\\"Of offence, I hope there is none, to either party: of defence, I make\\nnone--by God's good mercy,\
      \ having committed no palpable sin since last\\nentreating his pardoning grace. I understand not your allusions about\\\
      nlines and angles; and I leave expounding to those who have been called\\nand set apart for that holy office. I lay\
      \ claim to no higher gift than a\\nsmall insight into the glorious art of petitioning and thanksgiving, as\\npractised\
      \ in psalmody.\\\"\\n\\n\\\"The man is, most manifestly, a disciple of Apollo,\\\" cried the amused\\nAlice, \\\"and\
      \ I take him under my own especial protection. Nay, throw\\naside that frown, Heyward, and in pity to my longing ears,\
      \ suffer him to\\njourney in our train. Besides,\\\" she added, in a low and hurried voice,\\ncasting a glance at the\
      \ distant Cora, who slowly followed the footsteps\\nof their silent but sullen guide, \\\"it may be a friend added to\
      \ our\\nstrength, in time of need.\\\"\\n\\n\\\"Think you, Alice, that I would trust those I love by this secret path,\\\
      ndid I imagine such need could happen?\\\"\\n\\n\\\"Nay, nay, I think not of it now; but this strange man amuses me;\
      \ and if\\nhe 'hath music in his soul,' let us not churlishly reject his company.\\\"\\nShe pointed persuasively along\
      \ the path with her riding-whip, while\\ntheir eyes met in a look which the young man lingered a moment to\\nprolong;\
      \ then yielding to her gentle influence, he clapped his spurs\\ninto his charger, and in a few bounds was again at the\
      \ side of Cora.\\n\\n\\\"I am glad to encounter thee, friend,\\\" continued the maiden, waving her\\nhand to the stranger\
      \ to proceed, as she urged her Narragansett to renew\\nits amble. \\\"Partial relatives have almost persuaded me that\
