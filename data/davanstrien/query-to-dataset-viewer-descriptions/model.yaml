    nthis gentleman to postpone his chant until a safer opportunity.\\\"\\n\\n\\\"You will diminish them, indeed,\\\" returned\
    \ the arch girl, \\\"for never did\\nI hear a more unworthy conjunction of execution and language, than that\\nto which\
    \ I have been listening; and I was far gone in a learned inquiry\\ninto the causes of such an unfitness between sound\
    \ and sense, when you\\nbroke the charm of my musings by that bass of yours, Duncan!\\\"\\n\\n\\\"I know not what you\
