    n\\nThe frown which had gathered around the handsome, open, and manly brow\\nof Heyward, gradually relaxed, and his lips\
    \ curled into a slight smile,\\nas he regarded the stranger. Alice made no very powerful effort to\\ncontrol her merriment;\
    \ and even the dark, thoughtful eye of Cora lighted\\nwith a humor that, it would seem, the habit, rather than the nature\
    \ of\\nits mistress repressed.\\n\\n\\\"Seek you any here?\\\" demanded Heyward, when the other had arrived\\nsufficiently\
    \ nigh to abate his speed; \\\"I trust you are no messenger of\\nevil tidings?\\\"\\n\\n\\\"Even so,\\\" replied the stranger,\
    \ making diligent use of his triangular\\ncastor, to produce a circulation in the close air of the woods, and\\nleaving\
    \ his hearers in doubt to which of the young man's questions he\\nresponded; when, however, he had cooled his face, and\
    \ recovered his\\nbreath, he continued, \\\"I hear you are riding to William Henry; as I am\\njourneying thitherward myself,\
    \ I concluded good company would seem\\nconsistent to the wishes of both parties.\\\"\\n\\n\\\"You appear to possess the\
    \ privilege of a casting vote,\\\" returned\\nHeyward; \\\"we are three, whilst you have consulted no one but yourself.\\\
    \"\\n\\n\\\"Even so. The first point to be obtained is to know one's own mind. Once\\nsure of that, and where women are\
    \ concerned, it is not easy, the next\\nis, to act up to the decision. I have endeavored to do both, and here I\\nam.\\\
    \"\\n\\n\\\"If you journey to the lake, you have mistaken your route,\\\" said\\nHeyward, haughtily; \\\"the highway thither\
    \ is at least half a mile behind\\nyou.\\\"\\n\\n\\\"Even so,\\\" returned the stranger, nothing daunted by this cold\\\
    nreception; \\\"I have tarried at 'Edward' a week, and I should be dumb not\\nto have inquired the road I was to journey;\
    \ and if dumb there would be\\nan end to my calling.\\\" After simpering in a small way, like one whose\\nmodesty prohibited\
