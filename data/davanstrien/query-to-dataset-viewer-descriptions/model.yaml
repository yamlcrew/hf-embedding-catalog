    \ live, until we reached the big river. There we\\nfought the Alligewi, till the ground was red with their blood. From\
    \ the\\nbanks of the big river to the shores of the salt lake, there was none to\\nmeet us. The Maquas followed at a distance.\
    \ We said the country should\\nbe ours from the place where the water runs up no longer on this stream,\\nto a river twenty\
    \ suns' journey toward the summer. The land we had taken\\nlike warriors, we kept like men. We drove the Maquas into the\
    \ woods with\\nthe bears. They only tasted salt at the licks; they drew no fish from\\nthe great lake; we threw them the\
    \ bones.\\\"\\n\\n\\\"All this I have heard and believe,\\\" said the white man, observing that\\nthe Indian paused: \\\
    \"but it was long before the English came into the\\ncountry.\\\"\\n\\n\\\"A pine grew then where this chestnut now stands.\
    \ The first pale-faces\\nwho came among us spoke no English. They came in a large canoe, when my\\nfathers had buried\
    \ the tomahawk with the redmen around them. Then,\\nHawkeye,\\\" he continued, betraying his deep emotion only by permitting\\\
    nhis voice to fall to those low, guttural tones, which rendered his\\nlanguage, as spoken at times, so very musical; \\\
    \"then, Hawkeye, we were\\none people, and we were happy. The salt lake gave us its fish, the wood\\nits deer, and the\
    \ air its birds. We took wives who bore us children; we\\nworshipped the Great Spirit; and we kept the Maquas beyond the\
    \ sound of\\nour songs of triumph!\\\"\\n\\n\\\"Know you anything of your own family at that time?\\\" demanded the white.\\\
    n\\\"But you are a just man, for an Indian! and, as I suppose you hold their\\ngifts, your fathers must have been brave\
    \ warriors, and wise men at the\\ncouncil fire.\\\"\\n\\n\\\"My tribe is the grandfather of nations, but I am an unmixed\
    \ man. The\\nblood of chiefs is in my veins, where it must stay forever. The Dutch\\nlanded, and gave my people the fire-water;\
    \ they drank until the heavens\\nand the earth seemed to meet, and they foolishly thought they had found\\nthe Great Spirit.\
    \ Then they parted with their land. Foot by foot, they\\nwere driven back from the shores, until I, that am a chief and\
    \ a\\nsagamore, have never seen the sun shine but through the trees, and have\\nnever visited the graves of, my fathers!\\\
    \"\\n\\n\\\"Graves bring solemn feelings over the mind,\\\" returned the scout, a good\\ndeal touched at the calm suffering\
    \ of his companion; \\\"and they often aid\\na man in his good intentions; though, for myself, I expect to leave my\\\
    nown bones unburied, to bleach in the woods, or to be torn asunder by the\\nwolves. But where are to be found those of\
    \ your race who came to their\\nkin in the Delaware country, so many summers since?\\\"\\n\\n\\\"Where are the blossoms\
    \ of those summers!--fallen, one by one: so all of\\nmy family departed, each in his turn, to the land of spirits. I am\
    \ on\\nthe hill-top, and must go down into the valley; and when Uncas follows\\nin my footsteps, there will no longer\
    \ be any of the blood of the\\nsagamores, for my boy is the last of the Mohicans.\\\"\\n\\n\\\"Uncas is here!\\\" said\
    \ another voice, in the same soft, guttural tones,\\nnear his elbow; \\\"who speaks to Uncas?\\\"\\n\\nThe white man loosened\
    \ his knife in his leathern sheath, and made an\\ninvoluntary movement of the hand towards his rifle, at this sudden\\\
    ninterruption; but the Indian sat composed, and without turning his head\\nat the unexpected sounds.\\n\\nAt the next\
    \ instant, a youthful warrior passed between them, with a\\nnoiseless step, and seated himself on the bank of the rapid\
    \ stream. No\\nexclamation of surprise escaped the father, nor was any question asked,\\nor reply given, for several minutes;\
    \ each appearing to await the moment\\nwhen he might speak, without betraying womanish curiosity or childish\\nimpatience.\
    \ The white man seemed to take counsel from their customs,\\nand, relinquishing his grasp of the rifle, he also remained\
    \ silent and\\nreserved. At length Chingachgook turned his eyes slowly towards his son,\\nand demanded,--\\n\\n\\\"Do\
    \ the Maquas dare to leave the print of their moccasins in these\\nwoods?\\\"\\n\\n\\\"I have been on their trail,\\\"\
    \ replied the young Indian, \\\"and know that\\nthey number as many as the fingers of my two hands; but they lie hid,\\\
    nlike cowards.\\\"\\n\\n\\\"The thieves are outlying for scalps and plunder!\\\" said the white man,\\nwhom we shall call\
    \ Hawkeye, after the manner of his companions. \\\"That\\nbushy Frenchman, Montcalm, will send his spies into our very\
    \ camp, but\\nhe will know what road we travel!\\\"\\n\\n\\\"Tis enough!\\\" returned the father, glancing his eye towards\
    \ the setting\\nsun; \\\"they shall be driven like deer from their bushes. Hawkeye, let us\\neat to-night, and show the\
    \ Maquas that we are men to-morrow.\\\"\\n\\n\\\"I am as ready to do the one as the other; but to fight the Iroquois\\\
    n'tis necessary to find the skulkers; and to eat, 'tis necessary to get\\nthe game--talk of the devil and he will come;\
    \ there is a pair of the\\nbiggest antlers I have seen this season, moving the bushes below the\\nhill! Now, Uncas,\\\"\
    \ he continued in a half whisper, and laughing with a\\nkind of inward sound, like one who had learnt to be watchful,\
    \ \\\"I will\\nbet my charger three times full of powder, against a foot of wampum,\\nthat I take him atwixt the eyes,\
    \ and nearer to the right than to the\\nleft.\\\"\\n\\n\\\"It cannot be!\\\" said the young Indian, springing to his feet\
    \ with\\nyouthful eagerness; \\\"all but the tips of his horns are hid!\\\"\\n\\n\\\"He's a boy!\\\" said the white man,\
    \ shaking his head while he spoke, and\\naddressing the father. \\\"Does he think when a hunter sees a part of the\\ncreatur',\
    \ he can't tell where the rest of him should be!\\\"\\n\\n[Illustration: _Copyright by Charles Scribner's Sons_\\n\\nUNCAS\
    \ SLAYS A DEER\\n\\n_Avoiding the horns of the infuriated animal, Uncas darted to his side,\\nand passed his knife across\
    \ the throat_]\\n\\nAdjusting his rifle, he was about to make an exhibition of that skill,\\non which he so much valued\
    \ himself, when the warrior struck up the piece\\nwith his hand, saying--\\n\\n\\\"Hawkeye! will you fight the Maquas?\\\
    \"\\n\\n\\\"These Indians know the nature of the woods, as it might be by\\ninstinct!\\\" returned the scout, dropping\
    \ his rifle, and turning away like\\na man who was convinced of his error. \\\"I must leave the buck to your\\narrow,\
    \ Uncas, or we may kill a deer for them thieves, the Iroquois, to\\neat.\\\"\\n\\nThe instant the father seconded this\
    \ intimation by an expressive gesture\\nof the hand, Uncas threw himself on the ground, and approached the\\nanimal with\
    \ wary movements. When within a few yards of the cover, he\\nfitted an arrow to his bow with the utmost care, while the\
    \ antlers\\nmoved, as if their owner snuffed an enemy in the tainted air. In another\\nmoment the twang of the cord was\
    \ heard, a white streak was seen glancing\\ninto the bushes, and the wounded buck plunged from the cover, to the\\nvery\
    \ feet of his hidden enemy. Avoiding the horns of the infuriated\\nanimal, Uncas darted to his side, and passed his knife\
    \ across the\\nthroat, when bounding to the edge of the river it fell, dyeing the\\nwaters with its blood.\\n\\n\\\"'Twas\
    \ done with Indian skill,\\\" said the scout, laughing inwardly, but\\nwith vast satisfaction; \\\"and 'twas a pretty\
    \ sight to behold! Though an\\narrow is a near shot, and needs a knife to finish the work.\\\"\\n\\n\\\"Hugh!\\\" ejaculated\
    \ his companion, turning quickly, like a hound who\\nscented game.\\n\\n\\\"By the Lord, there is a drove of them!\\\"\
    \ exclaimed the scout, whose eyes\\nbegan to glisten with the ardor of his usual occupation; \\\"if they come\\nwithin\
    \ range of a bullet I will drop one, though the whole Six Nations\\nshould be lurking within sound! What do you hear,\
    \ Chingachgook? for to\\nmy ears the woods are dumb.\\\"\\n\\n\\\"There is but one deer, and he is dead,\\\" said the\
    \ Indian, bending his\\nbody till his ear nearly touched the earth. \\\"I hear the sounds of feet!\\\"\\n\\n\\\"Perhaps\
    \ the wolves have driven the buck to shelter, and are following\\non his trail.\\\"\\n\\n\\\"No. The horses of white men\
    \ are coming!\\\" returned the other, raising\\nhimself with dignity, and resuming his seat on the log with his former\\\
    ncomposure. \\\"Hawkeye, they are your brothers; speak to them.\\\"\\n\\n\\\"That will I, and in English that the king\
    \ needn't be ashamed to\\nanswer,\\\" returned the hunter, speaking in the language of which he\\nboasted; \\\"but I see\
    \ nothing, nor do I hear the sounds of man or beast;\\n'tis strange that an Indian should understand white sounds better\
    \ than a\\nman who, his very enemies will own, has no cross in his blood, although\\nhe may have lived with the redskins\
    \ long enough to be suspected! Ha!\\nthere goes something like the cracking of a dry stick, too--now I hear\\nthe bushes\
    \ move--yes, yes, there is a trampling that I mistook for the\\nfalls--and--but here they come themselves; God keep them\
    \ from the\\nIroquois!\\\"\\n\\n\\n\\n\",\n      \"output\": \"In another part of the forest by the river a few miles\
    \ to the west, Hawkeye and Chingachgook appear to be waiting for someone as they talk with low voices. It is now afternoon.\
    \ The Indian and the scout are attired according to their forest habits: Chingachgook with his semi-nude, war-painted\
    \ body and scalping tuft of hair, his tomahawk, scalping knife, and short rifle; Hawkeye with his hunting shirt, skin\
    \ cap, buckskin leggings, knife, pouch and horn, and long rifle. They discuss their respective forefathers, and Chingachgook\
