    \ tones, that set the music, the poetry, and even the uneasy\\nmotion of his ill-trained beast at defiance:--\\n\\n  \\\
    \"How good it is, O see,\\n    And how it pleaseth well,\\n  Together, e'en in unity,\\n    For brethren so to dwell.\\\
    n  It's like the choice ointment,\\n    From the head to the beard did go:\\n  Down Aaron's beard, that downward went,\\\
    n    His garment's skirts unto.\\\"\\n\\nThe delivery of these skilful rhymes was accompanied, on the part of the\\nstranger,\
    \ by a regular rise and fall of his right hand, which\\nterminated at the descent, by suffering the fingers to dwell a\
    \ moment on\\nthe leaves of the little volume; and on the ascent, by such a flourish\\nof the member as none but the initiated\
    \ may ever hope to imitate. It\\nwould seem that long practice had rendered this manual accompaniment\\nnecessary; for\
    \ it did not cease until the preposition which the poet had\\nselected for the close of his verse, had been duly delivered\
    \ like a word\\nof two syllables.\\n\\nSuch an innovation on the silence and retirement of the forest could not\\nfail\
    \ to enlist the ears of those who journeyed at so short a distance in\\nadvance. The Indian muttered a few words in broken\
    \ English to Heyward,\\nwho, in his turn, spoke to the stranger; at once interrupting, and, for\\nthe time, closing his\
    \ musical efforts.\\n\\n\\\"Though we are not in danger, common prudence would teach us to journey\\nthrough this wilderness\
