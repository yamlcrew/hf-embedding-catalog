    \ films George Wallace -LRB- 1997 -RRB- and Gia -LRB- 1998 -RRB- , and won an Academy Award for Best Supporting Actress\
    \ for her performance in the drama Girl , Interrupted -LRB- 1999 -RRB- .   Jolie 's starring role as the video game heroine\
    \ Lara Croft in Lara Croft : Tomb Raider -LRB- 2001 -RRB- established her as a leading Hollywood actress . She continued\
    \ her successful action-star career with Mr. & Mrs. Smith -LRB- 2005 -RRB- , Wanted -LRB- 2008 -RRB- , and Salt -LRB-\
    \ 2010 -RRB- , and received critical acclaim for her performances in the dramas A Mighty Heart -LRB- 2007 -RRB- and Changeling\
    \ -LRB- 2008 -RRB- , which earned her a nomination for an Academy Award for Best Actress . Beginning in the 2010s , she\
    \ expanded her career into directing , screenwriting , and producing , starting with the wartime dramas In the Land of\
    \ Blood and Honey -LRB- 2011 -RRB- and Unbroken -LRB- 2014 -RRB- . Her biggest commercial success came with the fantasy\
    \ picture Maleficent -LRB- 2014 -RRB- .   In addition to her film career , Jolie is noted for her humanitarian efforts\
    \ , for which she has received a Jean Hersholt Humanitarian Award and an honorary damehood of the Order of St Michael\
    \ and St George -LRB- DCMG -RRB- , among other honors . She promotes various causes , including conservation , education\
    \ , and women 's rights , and is most noted for her advocacy on behalf of refugees as a Special Envoy for the United Nations\
    \ High Commissioner for Refugees -LRB- UNHCR -RRB- . As a public figure , Jolie has been cited as one of the most influential\
    \ and powerful people in the American entertainment industry , as well as the world 's most beautiful woman , by various\
    \ media outlets . Her personal life is the subject of wide publicity . Divorced from actors Jonny Lee Miller and Billy\
    \ Bob Thornton , she separated from her third husband , actor Brad Pitt , in September 2016 . They have six children together\
    \ , three of whom were adopted internationally . \",\n      \"label\": 2\n    },\n    \"truncated_cells\": []\n  },\n\
    \  {\n    \"row_idx\": 1,\n    \"row\": {\n      \"claim\": \"John McCain has chaired the House Commerce Committee.\"\
    ,\n      \"text\": \"John Sidney McCain III -LRB- born August 29 , 1936 -RRB- is an American politician who currently\
    \ serves as the senior United States Senator from Arizona . He was the Republican nominee for the 2008 U.S. presidential\
    \ election .   McCain followed his father and grandfather , both four-star admirals , into the United States Navy , graduating\
    \ from the U.S. Naval Academy in 1958 . He became a naval aviator , flying ground-attack aircraft from aircraft carriers\
    \ . During the Vietnam War , he was almost killed in the 1967 USS Forrestal fire . In October 1967 , while on a bombing\
    \ mission over Hanoi , he was shot down , seriously injured , and captured by the North Vietnamese . He was a prisoner\
    \ of war until 1973 . McCain experienced episodes of torture , and refused an out-of-sequence early repatriation offer\
    \ . His war wounds have left him with lifelong physical limitations .   He retired from the Navy as a captain in 1981\
    \ and moved to Arizona , where he entered politics . Elected to the U.S. House of Representatives in 1982 , McCain served\
    \ two terms . He was first elected to the U.S. Senate in 1986 , winning re-election easily five times , most recently\
    \ in 2016 . While generally adhering to conservative principles , McCain at times has had a media reputation as a `` maverick\
    \ '' for his willingness to disagree with his party on certain issues . After being investigated and largely exonerated\
    \ in a political influence scandal of the 1980s as a member of the Keating Five , he made campaign finance reform one\
    \ of his signature concerns , eventually gaining passage of the McCain -- Feingold Act in 2002 . He is also known for\
    \ his work in the 1990s to restore diplomatic relations with Vietnam , and for his belief that the Iraq War should have\
    \ been fought to a successful conclusion . McCain has chaired the Senate Commerce Committee , opposed spending that he\
    \ considered to be pork barrel , and played a key role in alleviating a crisis over judicial nominations with the bi-partisan\
    \ group known as the Gang of 14 .   McCain ran for the Republican nomination in 2000 but lost a heated primary season\
    \ contest to George W. Bush of Texas . He secured the nomination in 2008 after coming back from early reversals , but\
    \ was defeated by Democratic candidate Barack Obama in the general election , losing by a 365 -- 173 electoral college\
    \ margin and by 53 -- 46 % in the popular vote . He subsequently adopted more orthodox conservative stances and attitudes\
    \ and largely opposed actions of the Obama administration , especially in regard to foreign policy matters . By 2013 ,\
    \ however , he had become a key figure in the Senate for negotiating deals on certain issues in an otherwise partisan\
    \ environment . In 2015 , McCain became chairman of the Senate Armed Services Committee . \",\n      \"label\": 0\n  \
    \  },\n    \"truncated_cells\": []\n  }\n]"
