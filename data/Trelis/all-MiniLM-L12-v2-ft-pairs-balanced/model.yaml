- source_sentence: What is the primary responsibility of the Referee during a Touch Rugby match?
  sentences:
  - " related matters inside the Perimeter \nfor the Duration of a match, has jurisdiction over all players, coaches and \n\
    officials and is required to:\n25.1.1\tInspect the Field of Play, Line Markings and Markers prior to the \ncommencement\
    \ of the Match to ensure the safety of all participants.\n25.1.2\tAdjudicate on the Rules of the game;\n25.1.3\tImpose\
    \ any sanction necessary to control the match;\n25.1.4\tAward Tries and record the progressive score;\n25.1.5\tMaintain\
    \ a count of Touches during each Possession;\n25.1.6\tAward Penalties for Infringements against the Rules; and\n25.1.7\t\
    Report to the relevant competition administration any Sin Bins, \nDismissals or injuries to any participant sustained\
    \ during a Match.\n25.2\tOnly Team captains are permitted to seek clarification of a decision directly \nfrom the Referee.\
