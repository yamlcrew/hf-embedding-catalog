      \ or direction towards a Team’s Defending Try Line.\nChange of Possession\nThe act of moving control of the ball from\
      \ one Team to the other.\nDead/Dead Ball\nWhen the ball is out of play including the period following a Try and \nuntil\
      \ the match is recommenced and when the ball goes to ground \nand/or outside the boundaries of the Field of Play prior\
      \ to the \nsubsequent Rollball.\nDead Ball Line\nThe end boundaries of the Field of Play. There is one at each end of\
      \ \nthe Field of Play. See Appendix 1.\nDef"
