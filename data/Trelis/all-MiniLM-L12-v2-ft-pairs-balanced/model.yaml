- source_sentence: Under what circumstances can a player perform a Rollball seven (7) metres in-field?
  sentences:
  - "\tIf a player mishandles the ball and even if in an effort to gain control, the ball \nis accidentally knocked Forward\
    \ into any other Player, a Change of Possession \nresults.\n10  The Touch  \n10.1\tA Touch may be made by either a defending\
    \ player or a player in Possession.\n10.2\tA defending player may not claim a Touch if contact has not been made. If a\
    \ \nplayer claims a Touch has been made, but the Referee is unsure the Touch will \ncount.\nRuling = A Penalty to the\
    \ Attacking Team at the point of the Infringement and the offending \nplayer sent to the Sin Bin.\n10.3\tPlayers of both\
    \ Defending and Attacking Teams are to use the minimum force \nnecessary to make a Touch. Players must ensure that the\
    \ method employed in \nmaking a Touch does not pose an unnecessary risk to player safety.\nRuling = A Penalty to the non-offending\
    \ Team at the point of the Infringement.\n10.4\tIf the ball is accidentally knocked from the hands of a player in Possession\
    \ \nduring a Touch, the Touch counts and the Attacking Team retains Possession.\n10.5\tThe defending player must not deliberately\
    \ knock the ball from the hands of a \nplayer in Possession during a Touch.\n Ruling = A Penalty to the Attacking Team\
    \ at the point of the Infringement.\n10.6\tA player must not pass or otherwise deliver the ball after a Touch has been\
    \ \nmade.\nRuling = A Penalty to the Defending Team at the point of the Infringement, or if In-Goal the \nnearest point\
    \ on the seven (7) metre line.\n10.7\tThe Half may pass or run with the ball but cannot get Touched while in \nPossession\
    \ of the ball.\nRuling = A Change of Possession occurs at the point of the Touch, or if In-Goal the nearest \npoint on\
    \ the seven (7) metre line.\n10.8\tIf a Touch is made in the In-Goal Area before the ball is grounded, the player in \n\
    Possession is to perform a Rollball seven (7) metres from the Team’s Attacking \nTry Line, provided it is not the sixth\
    \  Touch and the player is not Half.\n10.9\tIf a player in Possession is Touched while on or behind their Defending Try\
    \ Line, \nthe Touch counts and once the Referee sets the Mark seven ("
  - " a player enters the Field of Play but does not impede the scoring of a Try the \noffending player will be sent to the\
    \ Sin Bin.\n17.8\tFollowing a Try, players may Interchange at will, without having to wait for the \nplayer to enter the\
    \ Interchange Area, but must do so prior to the Tap being taken \nto recommence play.\n18  Penalty  \n18.1\tThe Tap must\
    \ be performed in accordance with the Definitions.\nRuling = The Referee will instruct the offending Team to return to\
    \ the Mark and perform the \nTap again.\n18.2\tFor Infringements that occur between seven (7) metre lines, the Mark for\
    \ the \nPenalty Tap is at the point of Infringement unless otherwise indicated by the \nReferee. \n18.3\tFor Infringements\
    \ that occur within the Seven Metre Zone the Tap must be \ntaken at the nearest seven (7) metre line.\n18.4\tFor Infringements\
    \ that occur beyond the Field of Play or in the In-Goal Area \nthe Mark is seven (7) metres infield from the Sideline,\
    \ or directly Forward of \nthe Infringement on the seven (7) metre line nearest the Infringement or at a \nposition indicated\
    \ by the Referee.\n18.5\tThe Mark must be indicated by the Referee before a Penalty Tap is taken.\n18.6\tThe Penalty Tap\
    \ must be performed without delay after the Referee indicates \nthe Mark.\nRuling = A Penalty to the non-offending team\
    \ at the point of Infringement.\n18.7\tA player may perform a Rollball instead of a Penalty Tap and the player who \n\
    receives the ball does not become the Half.\n18.8\tIf the Defending Team is penalised three (3) times upon entering their\
    \ Seven \nMetre Zone during a single Possession, the last offending player will be given an \nExclusion until the end\
    \ of that Possession.\n18.9\tA Penalty Try is awarded if any action by a player, Team official or spectator, \ndeemed\
    \ by the Referee to be contrary to the Rules or spirit of the game clearly \nprevents the Attacking Team from scoring\
    \ a Try.\nFIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football Australia 2020\n15\n19  Advantage  \n19.1\tWhere\
