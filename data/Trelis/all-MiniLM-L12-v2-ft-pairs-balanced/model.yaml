- source_sentence: What happens if a player in possession is touched while on or behind their defending try line?
  sentences:
  - " the Dead Ball Lines. There are two (2), one (1) at each end of the \nField of Play. See Appendix 1.\nInterchange\nThe\
    \ act of an on-field player leaving the Field of Play to be replaced \nby an off-field player entering the Field of Play.\n\
    Interchange Area\nA marked rectangle for each Team on opposite sides of the Field \nof Play usually measuring 20 metres\
    \ long by no more than five (5) \nmetres wide, extending ten (10) metres either side of the Halfway \nLine and not less\
    \ than one (1) metre from the Sideline. It is the area \nin which all off-field players must remain until an Interchange\
    \ is \ninitiated. See Appendix 1.\nKick\nStrike or propel forcibly with the foot, a blow or forceful thrust with \nthe\
    \ foot to the ball. A Tap to commence or recommence play or a \nPenalty Tap is not defined as a kick.\nLine Markings\n\
    Markings of the Field of Play. See Appendix 1.\nLink\nThe player beside the Wing player.\nMark (for a Tap)\nThe centre\
    \ of the Halfway Line for the commencement or \nrecommencement of play, or the position where a Penalty Tap is \nawarded\
    \ as a result of an Infringement.\nMark (for a Touch)\nThe position in the Field of Play where the player in Possession\
    \ was \nat the time the Touch was made.\nFIT Playing Rules - 5th Edition\n2\nCOPYRIGHT © Touch Football Australia 2020\n\
    Middle\nThe player inside the Link player.\nNTA\nNational Touch Association\nAs defined in the FIT Constitution.\nObstruction\n\
    A deliberate attempt by either an attacking or defending player \nto gain an unfair Advantage by interfering with the\
    \ opposition to \nprevent them from gaining a rightful Advantage.\nOffside (Attacker)\nAn attacking player in a position\
    \ Forward of the ball.\nOffside (Defender)\nA defending player in a position closer than seven (7) metres from \nthe Mark\
    \ of the Rollball; or ten (10) metres from the Mark of a Tap.\nOnside\nA position whereby a player may legitimately become\
    \ involved with \nplay. A player with both feet on or behind their Defending Try Line.\nPass\nThe act of changing Possession\
    \ between individual attacking \nplayers by propelling the ball laterally and/or backwards and may \ninclude a flick,\
    \ knock or throw.\nPer"
  - " Player\nThe player who replaces another player during Interchange. There is \na maximum of eight (8) substitute players\
    \ in any Team and except \nwhen interchanging, in the Sin Bin, dismissed or on the Field of Play, \nthey must remain in\
    \ the Substitution Box.\nTap and Tap Penalty\nThe method of commencing the match, recommencing the match \nafter Half\
    \ Time and after a Try has been scored. The Tap is also the \nmethod of recommencing play when a Penalty is awarded. The\
    \ Tap \nis taken by placing the ball on the ground at or behind the Mark, \nreleasing both hands from the ball, tapping\
    \ the ball gently with either \nfoot or touching the foot on the ball. The ball must not roll or move \nmore than one\
    \ (1) metre in any direction and must be retrieved \ncleanly, without touching the ground again. The player may face any\
    \ \ndirection and use either foot. Provided it is at the Mark, the ball does \nnot have to be lifted from the ground prior\
    \ to a Tap being taken.\nTeam\nA group of players constituting one (1) side in a competition match.\nTFA\nTouch Football\
    \ Australia Limited\nTouch\nAny contact between the player in Possession and a defending \nplayer. A Touch includes contact\
    \ on the ball, hair or clothing and may \nbe made by a defending player or by the player in Possession.\nTouch Count\n\
    The progressive number of Touches that each Team has before a \nChange of Possession, from zero (0) to six (6).\nTry\n\
    The result of any attacking player, except the Half, placing the ball on \nor over the Team’s Attacking Try Line before\
    \ being Touched.\nTry Lines\nThe lines separating the In-Goal Areas from the Field of Play. See \nAppendix 1.\nVoluntary\
    \ Rollball\nThe player in Possession performs a Rollball before a Touch is made \nwith a defending player.\nWing\nThe\
    \ player outside the Link player.\nWinner\nThe Team that scores the most Tries during the match.\nFIT Playing Rules -\
    \ 5th Edition\n4\nCOPYRIGHT © Touch Football Australia 2020\n  Rules of Play  \n  Mode of Play    \nThe object of the\
    \ game of Touch is for each Team to score Tries and to prevent the \nopposition from scoring. The ball may be passed,\
    \ knocked or handed between players \nof the Attacking Team who may in turn run"
