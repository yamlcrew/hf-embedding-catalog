    - " Player\nThe player who replaces another player during Interchange. There is \na maximum of eight (8) substitute players\
      \ in any Team and except \nwhen interchanging, in the Sin Bin, dismissed or on the Field of Play, \nthey must remain\
      \ in the Substitution Box.\nTap and Tap Penalty\nThe method of commencing the match, recommencing the match \nafter\
      \ Half Time and after a Try has been scored. The Tap is also the \nmethod of recommencing play when a Penalty is awarded.\
      \ The Tap \nis taken by placing the ball on the ground at or behind the Mark, \nreleasing both hands from the ball,\
      \ tapping the ball gently with either \nfoot or touching the foot on the ball. The ball must not roll or move \nmore\
      \ than one (1) metre in any direction and must be retrieved \ncleanly, without touching the ground again. The player\
      \ may face any \ndirection and use either foot. Provided it is at the Mark, the ball does \nnot have to be lifted from\
      \ the ground prior to a Tap being taken.\nTeam\nA group of players constituting one (1) side in a competition match.\n\
      TFA\nTouch Football Australia Limited\nTouch\nAny contact between the player in Possession and a defending \nplayer.\
      \ A Touch includes contact on the ball, hair or clothing and may \nbe made by a defending player or by the player in\
      \ Possession.\nTouch Count\nThe progressive number of Touches that each Team has before a \nChange of Possession, from\
      \ zero (0) to six (6).\nTry\nThe result of any attacking player, except the Half, placing the ball on \nor over the\
      \ Team’s Attacking Try Line before being Touched.\nTry Lines\nThe lines separating the In-Goal Areas from the Field\
      \ of Play. See \nAppendix 1.\nVoluntary Rollball\nThe player in Possession performs a Rollball before a Touch is made\
      \ \nwith a defending player.\nWing\nThe player outside the Link player.\nWinner\nThe Team that scores the most Tries\
      \ during the match.\nFIT Playing Rules - 5th Edition\n4\nCOPYRIGHT © Touch Football Australia 2020\n  Rules of Play\
      \  \n  Mode of Play    \nThe object of the game of Touch is for each Team to score Tries and to prevent the \nopposition\
      \ from scoring. The ball may be passed, knocked or handed between players \nof the Attacking Team who may in turn run"
    - "1\twhen a Change of Possession takes place due to a player in Possession \nmaking contact with the Sideline or any\
      \ ground outside the Field of Play, \nprior to a Touch being made; or\n13.6.2\twhen the ball not in Possession of a\
      \ player makes contact with the \nSideline or any ground outside the Field of Play.\n13.7\tA player may not perform\
      \ a Tap in replacement of a Rollball.\nRuling = The offending Team must return to the Mark and perform the Rollball.\n\
      13.8\tAn attacking player, other than the player performing the Rollball, may receive \nthe ball at the Rollball and\
      \ shall do so without delay. That player is referred to as \nthe Half.\n13.9\tThe Half may control the ball with a foot\
      \ prior to picking up the ball. \n13.10\tA player ceases to be the Half once the ball is passed to another player.\n\
      13.11\tDefending players are not to interfere with the performance of the Rollball or the \nHalf. \nRuling = A Penalty\
      \ to the Attacking Team at a point ten (10) metres directly Forward of the \nInfringement.\n13.12\tPlayers of the Defending\
      \ Team must not move Forward of the Onside position \nuntil the Half has made contact with the ball, unless directed\
      \ to do so by the \nReferee or in accordance with 13.12.1.\n13.12.1\tWhen the Half is not within one (1) metre of the\
      \ Rollball, Onside players \nof the Defending Team may move Forward as soon as the player \nperforming the Rollball\
      \ releases the ball. If the Half is not in position and \na defending player moves Forward and makes contact with the\
      \ ball, a \nChange of Possession results.\n13.13\tIf in the act of performing the Rollball, the Attacking player makes\
      \ contact with \nthe Sideline or any ground outside the Field of Play a Change of Possession will \noccur with the Rollball\
      \ to be taken seven (7) metres in field.\n13.14\tAfter a Touch is made between the Dead Ball Line and the seven (7)\
      \ metre line, \nan Attacking Team is permitted to Rollball on the seven (7) metre line at a point \ndirectly in line\
      \ with where the Touch was made.\nFIT Playing Rules - 5th Edition\n12\nCOPYRIGHT © Touch Football Australia"
