- source_sentence: What happens to a player who is sent to the Sin Bin Area in Touch Rugby International Rules?
  sentences:
  - " to the Sin Bin must return to the Interchange Area prior to re-\nentering the Field of Play.\n22.4\tAny action that\
    \ causes the Touch Count to restart will result in a continuation of \nthat Possession. For the avoidance of doubt, should\
    \ a defender knock the ball \ndown or give away a Penalty, this does not mean that the Possession has been \ncompleted,\
    \ but rather the Possession continues. \nFIT Playing Rules - 5th Edition\n16\nCOPYRIGHT © Touch Football Australia 2020\n\
    23  Dismissal  \n23.1\tA player or official dismissed for misconduct is to take no further part in that \nmatch and is\
    \ to move to and remain outside the Perimeter for the remainder of \nthe match.\n23.2\tThe dismissed player or official\
    \ cannot be replaced and, in accordance with NTA \nDisciplinary Regulations, that player shall receive an automatic two\
    \ (2) match \nsuspension. \n24  Drop-Off  \n24.1\tShould a Winner be required in drawn matches, the following Drop-Off\
    \ \nprocedure is used to determine a Winner.\n24.1.1\tEach Team will reduce their on-field Team to four (4) players and\
    \ within \n60 seconds take up a position to restart play from the Halfway Line, \ndefending the same end of the field\
    \ as at the End of Play.\n24.1.2\tThe Drop-Off commences with a Tap from the centre of the Halfway Line \nby the Team\
    \ that did not commence the match with Possession.\n24.1.3\tThe Drop-Off will commence with a two (2) minute period of\
    \ extra time.\n24.1.4\tShould a Team be leading at the expiration of the two (2) minute period \nof extra time then that\
    \ Team will be declared the Winner and Match \ncomplete.\n24.1.5\tShould neither Team be leading at the expiration of\
    \ two (2) minutes, a \nsignal is given and the match will pause at the next Touch or Dead Ball. \nEach Team will then\
    \ remove another player from the Field of Play.\n24.1.6\tThe Match will recommence immediately after the players have\
    \ left the \nfield at the same place where it paused (i.e. the Team retains Possession \nat the designated number of Touches,\
    \ or at Change of Possession due to \nsome Infringement or the sixth Touch) and the Match will continue until"
