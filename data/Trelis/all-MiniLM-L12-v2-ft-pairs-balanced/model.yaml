  - "1\twhen a Change of Possession takes place due to a player in Possession \nmaking contact with the Sideline or any ground\
    \ outside the Field of Play, \nprior to a Touch being made; or\n13.6.2\twhen the ball not in Possession of a player makes\
    \ contact with the \nSideline or any ground outside the Field of Play.\n13.7\tA player may not perform a Tap in replacement\
    \ of a Rollball.\nRuling = The offending Team must return to the Mark and perform the Rollball.\n13.8\tAn attacking player,\
    \ other than the player performing the Rollball, may receive \nthe ball at the Rollball and shall do so without delay.\
    \ That player is referred to as \nthe Half.\n13.9\tThe Half may control the ball with a foot prior to picking up the ball.\
    \ \n13.10\tA player ceases to be the Half once the ball is passed to another player.\n13.11\tDefending players are not\
    \ to interfere with the performance of the Rollball or the \nHalf. \nRuling = A Penalty to the Attacking Team at a point\
    \ ten (10) metres directly Forward of the \nInfringement.\n13.12\tPlayers of the Defending Team must not move Forward\
    \ of the Onside position \nuntil the Half has made contact with the ball, unless directed to do so by the \nReferee or\
    \ in accordance with 13.12.1.\n13.12.1\tWhen the Half is not within one (1) metre of the Rollball, Onside players \nof\
    \ the Defending Team may move Forward as soon as the player \nperforming the Rollball releases the ball. If the Half is\
    \ not in position and \na defending player moves Forward and makes contact with the ball, a \nChange of Possession results.\n\
    13.13\tIf in the act of performing the Rollball, the Attacking player makes contact with \nthe Sideline or any ground\
    \ outside the Field of Play a Change of Possession will \noccur with the Rollball to be taken seven (7) metres in field.\n\
    13.14\tAfter a Touch is made between the Dead Ball Line and the seven (7) metre line, \nan Attacking Team is permitted\
    \ to Rollball on the seven (7) metre line at a point \ndirectly in line with where the Touch was made.\nFIT Playing Rules\
    \ - 5th Edition\n12\nCOPYRIGHT © Touch Football Australia"
