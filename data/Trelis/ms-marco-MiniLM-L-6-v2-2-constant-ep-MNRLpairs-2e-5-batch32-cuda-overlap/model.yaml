- source_sentence: What happens if neither team is leading at the end of the two-minute period of extra time?
  sentences:
  - infringement the action of a player contrary to the rules of the game. in - goal area the area in the field of play bounded
    by the sidelines, the try lines and the dead ball lines. there are two ( 2 ), one ( 1 ) at each end of the field of play.
    see appendix 1. interchange the act of an on - field player leaving the field of play to be replaced by an off - field
    player entering the field of play. interchange area a marked rectangle for each team on opposite sides of the field of
    play usually measuring 20 metres long by no more than five ( 5 ) metres wide, extending ten ( 10 ) metres either side
    of the halfway line and not less than one ( 1 ) metre from the sideline. it is the area in which all off - field players
    must remain until an interchange is initiated. see appendix 1. kick strike or propel forcibly with the foot, a blow or
    forceful thrust with the foot to the ball. a tap to commence or recommence play or a penalty tap is not defined as a kick.
    line markings markings of the field of play. see appendix 1. link the player beside the wing player.
  - touch count the progressive number of touches that each team has before a change of possession, from zero ( 0 ) to six
    ( 6 ). try the result of any attacking player, except the half, placing the ball on or over the team ’ s attacking try
    line before being touched. try lines the lines separating the in - goal areas from the field of play. see appendix 1.
    voluntary rollball the player in possession performs a rollball before a touch is made with a defending player. wing the
    player outside the link player. winner the team that scores the most tries during the match. fit playing rules - 5th edition
    4 copyright © touch football australia 2020 rules of play mode of play the object of the game of touch is for each team
    to score tries and to prevent the opposition from scoring. the ball may be passed, knocked or handed between players of
    the attacking team who may in turn run or otherwise move with the ball in an attempt to gain territorial advantage and
    to score tries. defending players prevent the attacking team from gaining a territorial advantage by touching the ball
    carrier.
  - 24. 1. 2 the drop - off commences with a tap from the centre of the halfway line by the team that did not commence the
    match with possession. 24. 1. 3 the drop - off will commence with a two ( 2 ) minute period of extra time. 24. 1. 4 should
    a team be leading at the expiration of the two ( 2 ) minute period of extra time then that team will be declared the winner
    and match complete. 24. 1. 5 should neither team be leading at the expiration of two ( 2 ) minutes, a signal is given
    and the match will pause at the next touch or dead ball. each team will then remove another player from the field of play.
    24. 1. 6 the match will recommence immediately after the players have left the field at the same place where it paused
    ( i. e. the team retains possession at the designated number of touches, or at change of possession due to some infringement
    or the sixth touch ) and the match will continue until a try is scored. 24. 1. 7 there is no time off during the drop
    - off and the clock does not stop at the two ( 2 ) minute interval.
