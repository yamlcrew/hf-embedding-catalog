- source_sentence: What happens if a player in possession enters the defending team's seven-metre zone?
  sentences:
  - 10. 8 if a touch is made in the in - goal area before the ball is grounded, the player in possession is to perform a rollball
    seven ( 7 ) metres from the team ’ s attacking try line, provided it is not the sixth touch and the player is not half.
    10. 9 if a player in possession is touched while on or behind their defending try line, the touch counts and once the
    referee sets the mark seven ( 7 ) metres directly forward of the contact point from the defending team ’ s try line, a
    rollball is performed. 10. 10 if a player in possession intentionally makes a touch on an offside defender who is making
    every effort to retire and remain out of play, the touch counts. fit playing rules - 5th edition copyright © touch football
    australia 2020 9 10. 11 if a touch is made on a player in possession while the player is juggling the ball in an attempt
