  - 7. 7 the tap to commence or recommence play must be performed without delay. ruling = a penalty to the non - offending
    team at the centre of the halfway line. 8 match duration 8. 1 a match is 40 minutes in duration, consisting of two ( 2
    ) x 20 minute halves with a half time break. 8. 1. 1 there is no time off for injury during a match. 8. 2 local competition
    and tournament conditions may vary the duration of a match. 8. 3 when time expires, play is to continue until the next
    touch or dead ball and end of play is signaled by the referee. 8. 3. 1 should a penalty be awarded during this period,
    the penalty is to be taken. 8. 4 if a match is abandoned in any circumstances other than those referred to in clause 24.
    1. 6 the nta or nta competition provider in its sole discretion shall determine the result of the match. 9 possession
    9. 1 the team with the ball is entitled to six ( 6 ) touches prior to a change of possession. 9. 2 on the change of possession
    due to an intercept, the first touch will be zero ( 0 ) touch.
  - '12. 6 if a player from the defending team unintentionally makes contact with the ball in flight and the ball is retrieved
    by an attacking player, play and the touch count continues. 12. 7 a player from the attacking team cannot pass the ball
    into a defending player intentionally seeking a rebound or a restart of the touch count. ruling = a penalty to the defending
    team at the point of the pass. 13 the rollball 13. 1 the attacking player is to position on the mark, face the opponent
    ’ s try line, make a genuine attempt to stand parallel to the sidelines, place the ball on the ground between the feet
    in a controlled manner and : 13. 1. 1 step forward over the ball ; or 13. 1. 2 roll the ball back between the feet no
    more than one ( 1 ) metre ; or 13. 1. 3 pass a foot over the ball. ruling = a change of possession to the defending team
    at the point of the infringement. 13. 2 a player must perform the rollball on the mark. ruling = a penalty to the defending
    team at the point of the infringement. 13. 3 a player must not perform a voluntary rollball.'
