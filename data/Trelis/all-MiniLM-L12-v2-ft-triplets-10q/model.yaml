    sentences:
    - "/or outside the boundaries of the Field of Play prior to the \nsubsequent Rollball.\nDead Ball Line\nThe end boundaries\
      \ of the Field of Play. There is one at each end of \nthe Field of Play. See Appendix 1.\nDefending Try Line\nThe line\
      \ which a Team has to defend to prevent a Try.\nDefending Team\nThe Team without or which is losing Possession.\nDismissal\n\
      When a player is sent from the Field of Play for the rest of the match.\nDrop-Off\nA procedure used to determine a Winner\
      \ following equal scores at \nthe expiration of normal Duration.\nDuration\nThe length of time a competition match lasts,\
      \ which is normally \nforty-five minutes, inclusive of a five (5) minute Half Time.\nEnd of Play\nWhen the Referee indicates\
      \ completion of the match.\nExclusion\nWhen a player is sent to the nearest Sin Bin Area following three (3) \npenalties\
      \ by the Defending Team upon entering their Seven Metre \nZone. The player is counted as a player on the Field of Play\
      \ and \ncannot be replaced or interchanged.\nFIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football Australia 2020\n\
      1\nFIT \nFederation of International Touch\nField of Play\nThe playing area bounded by the Sidelines and Dead Ball Lines,\
      \ both \nof which are out of bounds. See Appendix 1.\nForced Interchange\nWhen a player is required to undertake a compulsory\
      \ Interchange for \nan Infringement ruled more serious than a Penalty but less serious \nthan a Permanent Interchange,\
      \ Sin Bin or Dismissal.\nForward\nA position or direction towards the Dead Ball Line beyond the Team’s \nAttacking Try\
      \ Line.\nFull Time\nThe expiration of the second period of time allowed for play.\nHalf\nThe player who takes Possession\
      \ following a Rollball.\nHalf Time\nThe break in play between the two halves of a match.\nImminent\nAbout to occur,\
      \ it is almost certain to occur.\nInfringement\nThe action of a player contrary to the Rules of the game.\nIn-Goal Area\n\
      The area in the Field of Play bounded by the Sidelines, the Try Lines \nand the Dead Ball Lines. There are two (2),\
      \ one (1) at each end of the \nField of Play. See Appendix 1.\nInterchange\nThe act of an on-field player leaving the\
      \ Field of Play to be replaced \nby"
    - "\tIf a player mishandles the ball and even if in an effort to gain control, the ball \nis accidentally knocked Forward\
      \ into any other Player, a Change of Possession \nresults.\n10  The Touch  \n10.1\tA Touch may be made by either a defending\
      \ player or a player in Possession.\n10.2\tA defending player may not claim a Touch if contact has not been made. If\
      \ a \nplayer claims a Touch has been made, but the Referee is unsure the Touch will \ncount.\nRuling = A Penalty to\
      \ the Attacking Team at the point of the Infringement and the offending \nplayer sent to the Sin Bin.\n10.3\tPlayers\
      \ of both Defending and Attacking Teams are to use the minimum force \nnecessary to make a Touch. Players must ensure\
      \ that the method employed in \nmaking a Touch does not pose an unnecessary risk to player safety.\nRuling = A Penalty\
      \ to the non-offending Team at the point of the Infringement.\n10.4\tIf the ball is accidentally knocked from the hands\
      \ of a player in Possession \nduring a Touch, the Touch counts and the Attacking Team retains Possession.\n10.5\tThe\
      \ defending player must not deliberately knock the ball from the hands of a \nplayer in Possession during a Touch.\n\
      \ Ruling = A Penalty to the Attacking Team at the point of the Infringement.\n10.6\tA player must not pass or otherwise\
      \ deliver the ball after a Touch has been \nmade.\nRuling = A Penalty to the Defending Team at the point of the Infringement,\
      \ or if In-Goal the \nnearest point on the seven (7) metre line.\n10.7\tThe Half may pass or run with the ball but cannot\
      \ get Touched while in \nPossession of the ball.\nRuling = A Change of Possession occurs at the point of the Touch,\
      \ or if In-Goal the nearest \npoint on the seven (7) metre line.\n10.8\tIf a Touch is made in the In-Goal Area before\
      \ the ball is grounded, the player in \nPossession is to perform a Rollball seven (7) metres from the Team’s Attacking\
      \ \nTry Line, provided it is not the sixth  Touch and the player is not Half.\n10.9\tIf a player in Possession is Touched\
      \ while on or behind their Defending Try Line, \nthe Touch counts and once the Referee sets the Mark seven ("
    - " it is not the sixth  Touch and the player is not Half.\n10.9\tIf a player in Possession is Touched while on or behind\
      \ their Defending Try Line, \nthe Touch counts and once the Referee sets the Mark seven (7) metres directly \nForward\
      \ of the contact point from the Defending Team’s Try Line, a Rollball is \nperformed.\n10.10\tIf a player in Possession\
      \ intentionally makes a Touch on an Offside defender \nwho is making every effort to retire and remain out of play,\
      \ the Touch counts.\nFIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football Australia 2020\n9\n10.11\tIf a Touch\
      \ is made on a player in Possession while the player is juggling the ball \nin an attempt to maintain control of it,\
      \ the Touch counts if the attacking player \nfollowing the Touch retains Possession.\n10.12\tIf a player in Possession\
      \ is Touched and subsequently makes contact with \neither the Sideline, a field marker or the ground outside the Field\
      \ of Play, the \nTouch counts and play continues with a Rollball at the Mark where the Touch \noccurred.\n10.13\tWhen\
      \ a player from the Defending Team enters its defensive Seven Metre Zone, \nthe Defending Team must move Forward at\
      \ a reasonable pace until a Touch is \nImminent or made.\nRuling = A Penalty to the Attacking Team at the point of the\
      \ Infringement.\n10.14\tWhen a player in Possession enters the Defending Teams’ Seven Metre Zone \nthe Defending Team\
      \ is not obliged to move Forward but cannot retire back \ntowards their Try Line until a Touch is Imminent or made.\n\
      Ruling = A Penalty to the Attacking Team at the seven (7) metre line in line with the point of \nthe Infringement.\n\
      11  Passing  \n  \n11.1\tA player in Possession may not kick, pass, flick, knock, throw, hand-off or \notherwise propel\
      \ the ball in a Forward direction, either intentionally or otherwise \nto another player.\nRuling = A Penalty will be\
