      \ below four (4), all players must be in \nan Onside position for a Tap to be taken unless directed to do so by the\
      \ Referee.\nRuling = The Player will be directed to return to the Mark and to take the Tap again.\n7.7\tThe Tap to commence\
      \ or recommence play must be performed without delay.\nRuling = A Penalty to the non-offending team at the centre of\
      \ the Halfway line.\n8  Match Duration  \n  \n8.1\tA match is 40 minutes in duration, consisting of two (2) x 20 minute"
    - " a player enters the Field of Play but does not impede the scoring of a Try the \noffending player will be sent to\
