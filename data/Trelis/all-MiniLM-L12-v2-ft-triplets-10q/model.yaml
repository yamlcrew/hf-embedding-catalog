      \ \n14.1\tA Try is worth one (1) point. \n14.2\tA Try is awarded when a player, other than the Half, places the ball\
      \ on or over \nthe Try Line without being Touched.\n14.3\tIn attempting to score a Try, a player must have control of\
      \ the ball prior to \nplacing it on or over the Try Line.\n14.4\tIf a Player places the ball on the ground and releases\
