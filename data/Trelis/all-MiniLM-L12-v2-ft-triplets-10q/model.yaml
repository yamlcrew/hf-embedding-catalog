      \ no closer than five (5) metres \nfrom the Dead Ball Line and must not coach or communicate (verbal or non-\nverbal)\
      \ with either Team or the Referees.\n7  Commencement and Recommencement of Play  \n7.1\tTeam captains are to toss a\
      \ coin in the presence of the Referee(s) with the \nwinning captain’s Team having the choice of the direction the Team\
      \ wishes \nto run in the first half; the choice of Interchange Areas for the duration of the \nmatch, including any\
      \ extra time; and the choice of which team will commence \nthe match in Possession.\n7.2\tA player of the Attacking\
      \ Team is to commence the match with a Tap at the \ncentre of the Halfway Line following the indication to commence\
      \ play from the \nReferee.\n7.3\tFor the recommencement of play following a Half Time break, Teams shall \nchange directions\
      \ and the Team not commencing the match with Possession is \nto re-start the match with a Tap.\n7.4\tFor the recommencement\
      \ of play following the scoring of a Try, the Team \nagainst which the Try was conceded will recommence play with a\
      \ Tap.\n7.5\tA Tap may not be taken until all attacking Players are in an Onside position.\nRuling = The Player will\
      \ be directed to return to the Mark and to take the Tap again.\nFIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football\
      \ Australia 2020\n7\n7.6\tA Tap may not be taken until at least four (4) defending players are in an Onside \nposition\
