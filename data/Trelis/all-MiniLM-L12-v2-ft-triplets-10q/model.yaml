      \ of extra time.\n24.1.4\tShould a Team be leading at the expiration of the two (2) minute period \nof extra time then\
      \ that Team will be declared the Winner and Match \ncomplete.\n24.1.5\tShould neither Team be leading at the expiration\
      \ of two (2) minutes, a \nsignal is given and the match will pause at the next Touch or Dead Ball. \nEach Team will\
      \ then remove another player from the Field of Play.\n24.1.6\tThe Match will recommence immediately after the players\
      \ have left the \nfield at the same place where it paused (i.e. the Team retains Possession \nat the designated number\
      \ of Touches, or at Change of Possession due to \nsome Infringement or the sixth Touch) and the Match will continue\
      \ until"
