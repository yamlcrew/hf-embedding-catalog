widgetData:
- source_sentence: According to the text, when is an approach permitted?
  sentences:
  - "25.1.2\tAdjudicate on the Rules of the game;\n25.1.3\tImpose any sanction necessary to control the match;\n25.1.4\tAward\
    \ Tries and record the progressive score;\n25.1.5\tMaintain a count of Touches during each Possession;\n25.1.6\tAward\
    \ Penalties for Infringements against the Rules; and\n25.1.7\tReport to the relevant competition administration any Sin\
    \ Bins, \nDismissals or injuries to any participant sustained during a Match.25.2\tOnly Team captains are permitted to\
    \ seek clarification of a decision directly \nfrom the Referee.An approach may only be made during a break in play or\
    \ at \nthe discretion of the Referee."
  - "11.2\tA player in Possession  may not intentionally kick, pass, flick, knock, throw, \nhand-off or otherwise propel the\
    \ ball in a Forward direction over an opposition \nplayer and regain Possession.Ruling = A Penalty will be awarded to\
    \ the Defending Team at the Mark where the ball was \npropelled Forward.12  Ball Touched in Flight  \n  \n12.1\tIf a player\
    \ from the Defending Team deliberately makes contact with the ball in \nflight and the ball goes to ground, the Attacking\
    \ Team retains the ball and the \nTouch Count restarts as zero (0) Touch.12.2\tIf a player from the Defending Team deliberately\
    \ makes contact with the ball \nin flight and the ball is retrieved by an attacking player, without touching the \nground,\
    \ play continues and the next Touch is zero (0) Touch."
  - "Ruling = A Penalty to the Attacking Team at the point of the Infringement or on the seven (7) \nmetre line directly Forward\
    \ of the Infringement.15.4\tWhen a Rollball occurs within Defending Team’s Seven Metre Zone or a Penalty \nTap within\
    \ ten (10) metres of the Defending Team’s Try Line, all players from the \nDefending Team must have both feet on or behind\
    \ their Try Line and no other \npart of the body in contact with the ground Forward of their Try Line.Ruling = A Penalty\
    \ to the Attacking Team at the seven (7) metre line directly Forward of the \npoint of the Infringement.15.5\tAfter effecting\
    \ the Touch, the defending player must retire the required seven \n(7) metres or to the Defending Try Line as indicated\
    \ by the Referee without \ninterfering with the Attacking Team.Ruling = A Penalty to the Attacking Team ten (10) metres\
    \ Forward of the Infringement or if \non the Defensive Try Line, on the seven (7) metre line."
- source_sentence: If a player intentionally propels the ball forward over an opponent and regains possession, what is the
    ruling?
  sentences:
  - "24.5\tFor the avoidance of doubt for clauses 24.3 and 24.4 the non-offending Team \nwill retain a numerical advantage\
    \ on the Field of Play during the Drop-Off.25  Match Officials  \n25.1\tThe Referee is the sole judge on all match related\
    \ matters inside the Perimeter \nfor the Duration of a match, has jurisdiction over all players, coaches and \nofficials\
    \ and is required to:\n25.1.1\tInspect the Field of Play, Line Markings and Markers prior to the \ncommencement of the\
    \ Match to ensure the safety of all participants.25.1.2\tAdjudicate on the Rules of the game;\n25.1.3\tImpose any sanction\
    \ necessary to control the match;\n25.1.4\tAward Tries and record the progressive score;\n25.1.5\tMaintain a count of\
    \ Touches during each Possession;\n25.1.6\tAward Penalties for Infringements against the Rules; and\n25.1.7\tReport to\
    \ the relevant competition administration any Sin Bins, \nDismissals or injuries to any participant sustained during a\
    \ Match."
  - "See Appendix 1.Forced Interchange\nWhen a player is required to undertake a compulsory Interchange for \nan Infringement\
    \ ruled more serious than a Penalty but less serious \nthan a Permanent Interchange, Sin Bin or Dismissal.Forward\nA position\
    \ or direction towards the Dead Ball Line beyond the Team’s \nAttacking Try Line.Full Time\nThe expiration of the second\
    \ period of time allowed for play.Half\nThe player who takes Possession following a Rollball.Half Time\nThe break in play\
    \ between the two halves of a match.Imminent\nAbout to occur, it is almost certain to occur.Infringement\nThe action of\
    \ a player contrary to the Rules of the game.In-Goal Area\nThe area in the Field of Play bounded by the Sidelines, the\
    \ Try Lines \nand the Dead Ball Lines.There are two (2), one (1) at each end of the \nField of Play.See Appendix 1.Interchange\n\
    The act of an on-field player leaving the Field of Play to be replaced \nby an off-field player entering the Field of\
    \ Play."
  - "Ruling = A Change of Possession occurs at the point of the Touch, or if In-Goal the nearest \npoint on the seven (7)\
    \ metre line.10.8\tIf a Touch is made in the In-Goal Area before the ball is grounded, the player in \nPossession is to\
    \ perform a Rollball seven (7) metres from the Team’s Attacking \nTry Line, provided it is not the sixth  Touch and the\
    \ player is not Half.10.9\tIf a player in Possession is Touched while on or behind their Defending Try Line, \nthe Touch\
    \ counts and once the Referee sets the Mark seven (7) metres directly \nForward of the contact point from the Defending\
    \ Team’s Try Line, a Rollball is \nperformed.10.10\tIf a player in Possession intentionally makes a Touch on an Offside\
    \ defender \nwho is making every effort to retire and remain out of play, the Touch counts."
- source_sentence: How large is the Ruck/Rollball Area?
  sentences:
  - "13.5\tA player may only perform a Rollball at the Mark under the following \ncircumstances:\n13.5.1\twhen a Touch has\
    \ been made; or\n13.5.2\twhen Possession changes following the sixth Touch; or\n13.5.3\twhen Possession changes due to\
    \ the ball being dropped or passed and \ngoes to the ground; or\n13.5.4\twhen Possession changes due to an Infringement\
    \ by an attacking player \nat a Penalty, a Tap or a Rollball; or\nFIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football\
    \ Australia 2020\n11\n13.5.5\twhen Possession changes after the Half is Touched or when the Half \nplaces the ball on\
    \ or over the Try Line; or\n13.5.6\tin replacement of a Penalty Tap; or\n13.5.7\twhen so directed by the Referee.13.6\t\
    A player is to perform a Rollball seven (7) metres in-field under the following \ncircumstances:\n13.6.1\twhen a Change\
    \ of Possession takes place due to a player in Possession \nmaking contact with the Sideline or any ground outside the\
    \ Field of Play, \nprior to a Touch being made; or\n13.6.2\twhen the ball not in Possession of a player makes contact\
    \ with the \nSideline or any ground outside the Field of Play."
