- source_sentence: When may players interchange following a try in Touch Rugby?
  sentences:
  - "5.2\tA Team must have a minimum of four (4) players on the field for a match to \ncommence or continue, except during\
    \ a Drop-Off.5.3\tWhere the number of players on the field from one Team falls below four (4), \nthe match is to be abandoned\
    \ and the non-offending Team is to be declared the \nWinner.5.3.1\tThis does not apply for players sent to the Sin Bin\
    \ Area.5.4\tIn mixed gender competitions, the maximum number of males allowed on the \nField of Play is three (3), the\
    \ minimum male requirement is one (1) and the \nminimum female requirement is one (1).6  Team Coach and Team Officials\
    \  \n6.1\tThe Team coach(s) and Team officials may be permitted inside the Perimeter \nbut shall be required to be positioned\
    \ either in the Interchange Area or at the \nend of the Field of Play for the duration of the match.6.2\tThe Team coach(s)\
    \ and Team officials may move from one position to the other \nbut shall do so without delay."
  - "17.8\tFollowing a Try, players may Interchange at will, without having to wait for the \nplayer to enter the Interchange\
    \ Area, but must do so prior to the Tap being taken \nto recommence play.18  Penalty  \n18.1\tThe Tap must be performed\
    \ in accordance with the Definitions.Ruling = The Referee will instruct the offending Team to return to the Mark and perform\
    \ the \nTap again.18.2\tFor Infringements that occur between seven (7) metre lines, the Mark for the \nPenalty Tap is\
    \ at the point of Infringement unless otherwise indicated by the \nReferee.18.3\tFor Infringements that occur within the\
    \ Seven Metre Zone the Tap must be \ntaken at the nearest seven (7) metre line."
  - "4.4\tHats or caps are permitted to be worn during a match provided they are safe \nand meet any NTA regulations.4.5\t\
    Safe footwear must be worn with exceptions allowed for game variants such as \nBeach Touch.4.6\tLight leather or synthetic\
    \ boots with soft moulded soles are permitted.4.6.1\tShoes with screw-in studs are not to be worn by any player or Referee.4.7\t\
    Players are not to participate in any match wearing any item of jewellery, \nchain, identification band/bracelet or similar\
    \ item that may prove dangerous.Any jewellery or other items that cannot be removed are to be taped to the \nsatisfaction\
    \ of the Referee.4.8\tLong (extend beyond the finger flesh when viewed from the palm) or sharp \nfingernails are not allowed.4.9\t\
    Referees and players may wear spectacles or sunglasses provided they are safe \nand securely attached."
- source_sentence: Is there a time-out for injuries during a standard Touch Rugby match?
  sentences:
  - "Line \nMarkings are to be laid out as shown in Appendix 1 - The Field of Play.Sidelines \nextend seven (7) metres beyond\
    \ the Try Lines to join the Dead Ball Lines and \ndefine the In-Goal Areas which measure fifty (50) metres wide by seven\
    \ (7) \nmetres in length.1.3\tThe Interchange Areas are located no closer than one (1) metre from each \nSideline.1.4\t\
    Suitably sized markers, cones or corner posts of a distinguishing colour and \nmade from safe and pliable material should\
    \ be positioned at the intersections of \nthe Sideline and Halfway line and the Sideline and the Try Line.1.4.1\tMarkers,\
    \ cones or corner posts placed on the junction of the Sideline and \nTry Line are deemed to be in the Field of Play.1.4.2\t\
    All other markers or cones are deemed to be out of the Field of Play.1.5\tThe standard playing surface is grass.Other\
    \ surfaces including synthetic grass \nmay be used but shall be subject to NTA approved standards."
  - "10.10\tIf a player in Possession intentionally makes a Touch on an Offside defender \nwho is making every effort to retire\
    \ and remain out of play, the Touch counts.FIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football Australia 2020\n\
    9\n10.11\tIf a Touch is made on a player in Possession while the player is juggling the ball \nin an attempt to maintain\
    \ control of it, the Touch counts if the attacking player \nfollowing the Touch retains Possession.10.12\tIf a player\
    \ in Possession is Touched and subsequently makes contact with \neither the Sideline, a field marker or the ground outside\
    \ the Field of Play, the \nTouch counts and play continues with a Rollball at the Mark where the Touch \noccurred.10.13\t\
    When a player from the Defending Team enters its defensive Seven Metre Zone, \nthe Defending Team must move Forward at\
    \ a reasonable pace until a Touch is \nImminent or made.Ruling = A Penalty to the Attacking Team at the point of the Infringement."
  - "4.9\tReferees and players may wear spectacles or sunglasses provided they are safe \nand securely attached.4.10\tReferees\
    \ and players may wear sport monitoring equipment and medical \nsupports such as knee or ankle braces provided, at the\
    \ sole discretion of \ncompetition’s controlling body, the items are not dangerous.5  Team Composition  \n5.1\tA Team\
    \ consists of a maximum of 14 players, no more than six (6) of whom are \nallowed on the field at any time.FIT Playing\
    \ Rules - 5th Edition\n6\nCOPYRIGHT © Touch Football Australia 2020\nRuling = A Penalty awarded to the non-offending Team\
    \ at the time the offence is identified \nseven (7) metres infield on the Halfway Line or the position of the ball, whichever\
    \ is the \ngreater Advantage.5.2\tA Team must have a minimum of four (4) players on the field for a match to \ncommence\
    \ or continue, except during a Drop-Off."
