widgetData:
- source_sentence: What happens if neither team is leading after the two-minute drop-off period?
  sentences:
  - "24  Drop-Off  \n24.1\tShould a Winner be required in drawn matches, the following Drop-Off \nprocedure is used to determine\
    \ a Winner.24.1.1\tEach Team will reduce their on-field Team to four (4) players and within \n60 seconds take up a position\
    \ to restart play from the Halfway Line, \ndefending the same end of the field as at the End of Play.24.1.2\tThe Drop-Off\
    \ commences with a Tap from the centre of the Halfway Line \nby the Team that did not commence the match with Possession.24.1.3\t\
    The Drop-Off will commence with a two (2) minute period of extra time.24.1.4\tShould a Team be leading at the expiration\
    \ of the two (2) minute period \nof extra time then that Team will be declared the Winner and Match \ncomplete.24.1.5\t\
    Should neither Team be leading at the expiration of two (2) minutes, a \nsignal is given and the match will pause at the\
    \ next Touch or Dead Ball."
  - "25.1.2\tAdjudicate on the Rules of the game;\n25.1.3\tImpose any sanction necessary to control the match;\n25.1.4\tAward\
    \ Tries and record the progressive score;\n25.1.5\tMaintain a count of Touches during each Possession;\n25.1.6\tAward\
    \ Penalties for Infringements against the Rules; and\n25.1.7\tReport to the relevant competition administration any Sin\
    \ Bins, \nDismissals or injuries to any participant sustained during a Match.25.2\tOnly Team captains are permitted to\
    \ seek clarification of a decision directly \nfrom the Referee.An approach may only be made during a break in play or\
    \ at \nthe discretion of the Referee."
  - "21  Forced Interchange  \n21.1\tWhere the Referee deems it necessary to implement a Forced Interchange \nfollowing an\
    \ Infringement, the Referee is to stop the match, direct the ball to \nbe placed on the Mark, advise the offending player\
    \ of the reason for the Forced \nInterchange, direct that player to return to the Interchange Area, display the \nrelevant\
    \ signal and award a Penalty to the non-offending Team.22  Sin Bin  \n22.1\tThe on-field Referee is required to indicate\
    \ the commencement and the end of \nthe Sin Bin time.22.2\tAny player sent to the Sin Bin must stand in the Sin Bin Area\
    \ at the opposition’s \nend of the Field of Play and on the same side as their Interchange Area.22.3\tAny player sent\
    \ to the Sin Bin must return to the Interchange Area prior to re-\nentering the Field of Play.22.4\tAny action that causes\
    \ the Touch Count to restart will result in a continuation of \nthat Possession."
- source_sentence: What actions constitute misconduct under rule 20.1.6?
  sentences:
  - "FIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football Australia 2020\n7\n7.6\tA Tap may not be taken until at least\
    \ four (4) defending players are in an Onside \nposition or unless directed to so by the Referee.Where the number of players\
    \ \non the field from the Defending Team falls below four (4), all players must be in \nan Onside position for a Tap to\
    \ be taken unless directed to do so by the Referee.Ruling = The Player will be directed to return to the Mark and to take\
    \ the Tap again.7.7\tThe Tap to commence or recommence play must be performed without delay.Ruling = A Penalty to the\
    \ non-offending team at the centre of the Halfway line.8  Match Duration  \n  \n8.1\tA match is 40 minutes in duration,\
    \ consisting of two (2) x 20 minute halves with \na Half Time break.8.1.1\tThere is no time off for injury during a match.8.2\t\
    Local competition and tournament conditions may vary the duration of a match."
  - "Ruling = A Penalty to the Defending Team at the point of the Infringement.13.5\tA player may only perform a Rollball\
    \ at the Mark under the following \ncircumstances:\n13.5.1\twhen a Touch has been made; or\n13.5.2\twhen Possession changes\
    \ following the sixth Touch; or\n13.5.3\twhen Possession changes due to the ball being dropped or passed and \ngoes to\
    \ the ground; or\n13.5.4\twhen Possession changes due to an Infringement by an attacking player \nat a Penalty, a Tap\
    \ or a Rollball; or\nFIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football Australia 2020\n11\n13.5.5\twhen Possession\
    \ changes after the Half is Touched or when the Half \nplaces the ball on or over the Try Line; or\n13.5.6\tin replacement\
    \ of a Penalty Tap; or\n13.5.7\twhen so directed by the Referee."
  - "18.7\tA player may perform a Rollball instead of a Penalty Tap and the player who \nreceives the ball does not become\
    \ the Half.18.8\tIf the Defending Team is penalised three (3) times upon entering their Seven \nMetre Zone during a single\
    \ Possession, the last offending player will be given an \nExclusion until the end of that Possession.18.9\tA Penalty\
    \ Try is awarded if any action by a player, Team official or spectator, \ndeemed by the Referee to be contrary to the\
    \ Rules or spirit of the game clearly \nprevents the Attacking Team from scoring a Try.FIT Playing Rules - 5th Edition\n\
    COPYRIGHT © Touch Football Australia 2020\n15\n19  Advantage  \n19.1\tWhere a Defending Team player is Offside at a Tap\
    \ or Rollball and attempts \nto interfere with play, the Referee will allow Advantage or award a Penalty, \nwhichever\
    \ is of greater Advantage to the Attacking Team."
- source_sentence: Who is permitted to directly seek clarification of a Referee's decision?
  sentences:
  - "8.2\tLocal competition and tournament conditions may vary the duration of a match.8.3\tWhen time expires, play is to\
    \ continue until the next Touch or Dead Ball and End \nof Play is signaled by the Referee.8.3.1\tShould a Penalty be awarded\
    \ during this period, the Penalty is to be taken.8.4\tIf a match is abandoned in any circumstances other than those referred\
    \ to in \nclause 24.1.6 the NTA or NTA competition provider in its sole discretion shall \ndetermine the result of the\
    \ match.9  Possession  \n  \n9.1\tThe Team with the ball is entitled to six (6) Touches prior to a Change of \nPossession.9.2\t\
    On the Change of Possession due to an intercept, the first Touch will be zero (0) \nTouch.9.3\tFollowing the sixth Touch\
    \ or a loss of Possession due to any other means, the \nball must be returned to the Mark without delay."
  - "The player is counted as a player on the Field of Play \nand cannot be replaced or Interchanged.FIT Playing Rules - 5th\
    \ Edition\nCOPYRIGHT © Touch Football Australia 2020\n3\nSin Bin Area\nThe area between the Dead Ball Line and the Perimeter\
    \ where \nplayers are sent for either a Sin Bin period or Exclusion for repeated \nSeven Metre Zone Infringements.There\
    \ are four (4) Sin Bin Areas.See Appendix 1.Spirit of the Game\nThe act of good sportsmanship and fair play.Substitute\
    \ Player\nThe player who replaces another player during Interchange.There is \na maximum of eight (8) substitute players\
    \ in any Team and except \nwhen interchanging, in the Sin Bin, dismissed or on the Field of Play, \nthey must remain in\
    \ the Substitution Box.Tap and Tap Penalty\nThe method of commencing the match, recommencing the match \nafter Half Time\
    \ and after a Try has been scored.The Tap is also the \nmethod of recommencing play when a Penalty is awarded."
  - "FIT Playing Rules - 5th Edition\nCOPYRIGHT © Touch Football Australia 2020\n17\n24.3\tAt the commencement of the Drop-Off,\
    \ if there is a player serving time in the \nSin  Bin and is yet to complete the required time, their Team commences the\
    \ \nDrop-Off with one (1) less player on the field than their opposition and continues \nto play with one (1) player less\
    \ until the Sin Bin period has been completed.24.4\tAt the commencement of the Drop-Off, if a Team has had a player dismissed\
    \ for \nthe remainder of the match that Team continues to play with one (1) player less \nthan the opposition Team for\
    \ the duration of the Drop-Off.24.5\tFor the avoidance of doubt for clauses 24.3 and 24.4 the non-offending Team \nwill\
    \ retain a numerical advantage on the Field of Play during the Drop-Off."
- source_sentence: What are the dimensions of the rectangular field of play, excluding in-goal and interchange areas?
  sentences:
  - "24  Drop-Off  \n24.1\tShould a Winner be required in drawn matches, the following Drop-Off \nprocedure is used to determine\
    \ a Winner.24.1.1\tEach Team will reduce their on-field Team to four (4) players and within \n60 seconds take up a position\
    \ to restart play from the Halfway Line, \ndefending the same end of the field as at the End of Play.24.1.2\tThe Drop-Off\
    \ commences with a Tap from the centre of the Halfway Line \nby the Team that did not commence the match with Possession.24.1.3\t\
    The Drop-Off will commence with a two (2) minute period of extra time.24.1.4\tShould a Team be leading at the expiration\
    \ of the two (2) minute period \nof extra time then that Team will be declared the Winner and Match \ncomplete.24.1.5\t\
    Should neither Team be leading at the expiration of two (2) minutes, a \nsignal is given and the match will pause at the\
    \ next Touch or Dead Ball."
  - "Touch Count\nThe progressive number of Touches that each Team has before a \nChange of Possession, from zero (0) to six\
    \ (6).Try\nThe result of any attacking player, except the Half, placing the ball on \nor over the Team’s Attacking Try\
    \ Line before being Touched.Try Lines\nThe lines separating the In-Goal Areas from the Field of Play.See \nAppendix 1.Voluntary\
    \ Rollball\nThe player in Possession performs a Rollball before a Touch is made \nwith a defending player.Wing\nThe player\
    \ outside the Link player.Winner\nThe Team that scores the most Tries during the match.FIT Playing Rules - 5th Edition\n\
    4\nCOPYRIGHT © Touch Football Australia 2020\n  Rules of Play  \n  Mode of Play    \nThe object of the game of Touch is\
    \ for each Team to score Tries and to prevent the \nopposition from scoring.The ball may be passed, knocked or handed\
    \ between players \nof the Attacking Team who may in turn run or otherwise move with the ball in an \nattempt to gain\
    \ territorial Advantage and to score Tries."
  - "12.2\tIf a player from the Defending Team deliberately makes contact with the ball \nin flight and the ball is retrieved\
    \ by an attacking player, without touching the \nground, play continues and the next Touch is zero (0) Touch.12.3\tIf\
    \ a player from the Defending Team deliberately makes contact with the ball \nin flight, propelling it Forward and an\
    \ attacking player, in an attempt to regain \npossession, drops the ball, the Attacking Team retains Possession and the\
    \ \nFIT Playing Rules - 5th Edition\n10\nCOPYRIGHT © Touch Football Australia 2020\nTouch Count restarts as zero (0) Touch.12.4\t\
    If a player from the Defending Team deliberately makes contact with the ball \nin flight, propelling it towards the Defending\
    \ Team’s Dead Ball Line and an \nattacking player, in an attempt to regain possession drops the ball, a Change of \nPossession\
    \ occurs.12.5\tIf a player from the Defending Team unintentionally makes contact with the ball \nin flight and the ball\
    \ goes to ground, a Change of Possession occurs."
- source_sentence: Who indicates to commence play at the start of a Touch Rugby match?
  sentences:
  - "24.5\tFor the avoidance of doubt for clauses 24.3 and 24.4 the non-offending Team \nwill retain a numerical advantage\
    \ on the Field of Play during the Drop-Off.25  Match Officials  \n25.1\tThe Referee is the sole judge on all match related\
    \ matters inside the Perimeter \nfor the Duration of a match, has jurisdiction over all players, coaches and \nofficials\
    \ and is required to:\n25.1.1\tInspect the Field of Play, Line Markings and Markers prior to the \ncommencement of the\
    \ Match to ensure the safety of all participants.25.1.2\tAdjudicate on the Rules of the game;\n25.1.3\tImpose any sanction\
    \ necessary to control the match;\n25.1.4\tAward Tries and record the progressive score;\n25.1.5\tMaintain a count of\
    \ Touches during each Possession;\n25.1.6\tAward Penalties for Infringements against the Rules; and\n25.1.7\tReport to\
    \ the relevant competition administration any Sin Bins, \nDismissals or injuries to any participant sustained during a\
    \ Match."
  - "See Appendix 1.Forced Interchange\nWhen a player is required to undertake a compulsory Interchange for \nan Infringement\
    \ ruled more serious than a Penalty but less serious \nthan a Permanent Interchange, Sin Bin or Dismissal.Forward\nA position\
    \ or direction towards the Dead Ball Line beyond the Team’s \nAttacking Try Line.Full Time\nThe expiration of the second\
    \ period of time allowed for play.Half\nThe player who takes Possession following a Rollball.Half Time\nThe break in play\
    \ between the two halves of a match.Imminent\nAbout to occur, it is almost certain to occur.Infringement\nThe action of\
    \ a player contrary to the Rules of the game.In-Goal Area\nThe area in the Field of Play bounded by the Sidelines, the\
    \ Try Lines \nand the Dead Ball Lines.There are two (2), one (1) at each end of the \nField of Play.See Appendix 1.Interchange\n\
    The act of an on-field player leaving the Field of Play to be replaced \nby an off-field player entering the Field of\
    \ Play."
  - "6.2\tThe Team coach(s) and Team officials may move from one position to the other \nbut shall do so without delay.While\
    \ in a position at the end of the Field of Play, \nthe Team coach(s) or Team official must remain no closer than five\
    \ (5) metres \nfrom the Dead Ball Line and must not coach or communicate (verbal or non-\nverbal) with either Team or\
    \ the Referees.7  Commencement and Recommencement of Play  \n7.1\tTeam captains are to toss a coin in the presence of\
    \ the Referee(s) with the \nwinning captain’s Team having the choice of the direction the Team wishes \nto run in the\
    \ first half; the choice of Interchange Areas for the duration of the \nmatch, including any extra time; and the choice\
    \ of which team will commence \nthe match in Possession.7.2\tA player of the Attacking Team is to commence the match with\
    \ a Tap at the \ncentre of the Halfway Line following the indication to commence play from the \nReferee."
