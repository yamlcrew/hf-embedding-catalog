widgetData:
- source_sentence: 한동대학교에서는 결석이나 정학으로 인해 등록금이 감액되나요?
  sentences:
  - '제 63 조 (결석 또는 정학자 납입금)

    납입금은 결석, 정학 또는 제적의 이유로 감액되지 않는다.'
  - '제 52 조 (총학생회)

    건전한 학풍을 조성하고 학생자치활동을 신장시키기 위하여 한동대학교 총학생회(이하 "총학생회"라 한다)를 둔다.

    총학생회의 조직과 운영에 관한 사항은 총장의 승인을 얻어 학생회칙으로 따로 정한다.

    전시·사변 또는 이에 준하는 국가 비상사태시에는 그 활동이 정지된다.'
  - '제 63 조 (결석 또는 정학자 납입금)

    납입금은 결석, 정학 또는 제적의 이유로 감액되지 않는다.'
- source_sentence: 한동대학교 입학전형은 어떻게 진행되며, 입학사정관제는 어떻게 운영되나요?
  sentences:
  - '제 52 조 (총학생회)

    건전한 학풍을 조성하고 학생자치활동을 신장시키기 위하여 한동대학교 총학생회(이하 "총학생회"라 한다)를 둔다.

    총학생회의 조직과 운영에 관한 사항은 총장의 승인을 얻어 학생회칙으로 따로 정한다.

    전시·사변 또는 이에 준하는 국가 비상사태시에는 그 활동이 정지된다.'
  - '제목: 한동대학교 학칙

    소관부서: 교무팀 1073, 1074

    학교웹페이지: https://rule.handong.edu'
  - '제 13 조 (입학전형)

    입학전형은 당해연도 한국대학교육협의회의 대학입학전형기본사항, 이 대학교의 대학입학전형시행계획과 모집요강에 따라 선발한다.

    입학전형의 전형요소와 일정등 상세한 사항은 총장이 따로 정한다.

    입학전형을 시행함에 있어 입학사정관제로 학생을 선발할 수 있으며, 입학사정관제의 운영에 관한 세부사항은 총장이 따로 정한다.'
- source_sentence: 한동대학교에서 전공이나 부전공을 변경할 수 있나요? 2학년 진학 전에 전공을 미리 정할 수도 있나요?
  sentences:
  - '제 21 조 (전공변경)

    전공 변경은 매 학년도 학기 개시 전 소정기간내에 신청하고 총장이 허가한다.

    전공 및 부전공 변경은 2학년 이상 학생에 허용한다.

    학과(부) 구분없이 입학한 학생은 다음 각호에 따라 소속 학과(부) 및 전공을 선택하여야 하며 1전공이 소속된 학부를 학생의 소속학부로 배정한다.

    주간학생은 2학년 1학기 진학시 소속 학부와 전공을 선택하여야 한다. 다만, 총장이 필요하다고 인정하는 경우에는 2학년 1학기 진학 전에 소속 계열과 전공을 선택할 수 있다.'
  - '제 4 조 (전공 및 학생정원)

    이 대학교의 모집단위별 학생정원은 별표 1과 같다.

    이 대학교의 모집단위내 개설전공, 학과, 학부, 계열 정원은 2학년 진학부터 적용하며 그 정원은 별표 2와 같다.

    학부에는 2이상의 전공을 둘 수 있다.'
  - '제 21 조 (전공변경)

    전공 변경은 매 학년도 학기 개시 전 소정기간내에 신청하고 총장이 허가한다.

    전공 및 부전공 변경은 2학년 이상 학생에 허용한다.

    학과(부) 구분없이 입학한 학생은 다음 각호에 따라 소속 학과(부) 및 전공을 선택하여야 하며 1전공이 소속된 학부를 학생의 소속학부로 배정한다.

    주간학생은 2학년 1학기 진학시 소속 학부와 전공을 선택하여야 한다. 다만, 총장이 필요하다고 인정하는 경우에는 2학년 1학기 진학 전에 소속 계열과 전공을 선택할 수 있다.'
- source_sentence: 한동대학교 입학할 때 보증인을 지정해야 하나요? 어떤 사람이 보증인이 될 수 있나요?
  sentences:
  - '제목: 한동대학교 학칙

    소관부서: 교무팀 1073, 1074

    학교웹페이지: https://rule.handong.edu'
  - '제 22 조 (보증인)

    대학 입학 전형에 따라 보증인을 둘 수 있으며, 보증인은 당해 학생의 보호자이어야 하며 부득이한 경우에는 재학 중 학비, 기타 신상에 관한 일체의 책임을 질 수 있는 자로 한다.

    보증인의 주소 및 신상의 변동이 있을 때에는 즉시 신고하여야 한다.'
  - '제 22 조 (보증인)

    대학 입학 전형에 따라 보증인을 둘 수 있으며, 보증인은 당해 학생의 보호자이어야 하며 부득이한 경우에는 재학 중 학비, 기타 신상에 관한 일체의 책임을 질 수 있는 자로 한다.

    보증인의 주소 및 신상의 변동이 있을 때에는 즉시 신고하여야 한다.'
- source_sentence: 한동대학교에 합격한 후 어떤 절차를 언제까지 마쳐야 하나요? 기한을 넘기면 어떻게 되나요?
  sentences:
  - '제 52 조 (총학생회)

    건전한 학풍을 조성하고 학생자치활동을 신장시키기 위하여 한동대학교 총학생회(이하 "총학생회"라 한다)를 둔다.

    총학생회의 조직과 운영에 관한 사항은 총장의 승인을 얻어 학생회칙으로 따로 정한다.

    전시·사변 또는 이에 준하는 국가 비상사태시에는 그 활동이 정지된다.'
  - '제 17 조 (입학절차)

    입학허가 예정자는 지정된 기일 내 소정의 서류를 제출하고 수학에 필요한 제반절차를 이행하여야 한다.

    이유없이 기일 내 제1항의 절차를 이행하지 않을 때에는 입학허가를 취소한다.'
  - '제목: 한동대학교 학칙

    소관부서: 교무팀 1073, 1074

    학교웹페이지: https://rule.handong.edu'
