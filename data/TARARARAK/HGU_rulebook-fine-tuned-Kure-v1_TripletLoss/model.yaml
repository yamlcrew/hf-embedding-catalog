      학생설계융합전공과 글로벌융합전공은 학제적 교과과정을 학생 스스로 구성하여 승인 받은 전공을 이수하는 것으로, 취득학점은 당해 학과(부)의 전공 이수학점 이상이어야 하며, 기타 시행에 필요한 사항은 총장이 따로
