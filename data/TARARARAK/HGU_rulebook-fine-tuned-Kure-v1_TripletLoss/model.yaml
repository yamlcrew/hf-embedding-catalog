- source_sentence: 총학생회가 자치활동을 위해 필요한 비용은 어떻게 충당하나요?
  sentences:
  - '제 14 장 납입금


    제 61 조 (납입금 납입의무)

    학생은 매학기 등록기간에 소정의 납입금을 납부하여야 한다. 다만, 사정에 따라 총장의 허가를 얻어 분납할 수 있다.

    납입금의 금액 및 납입기일은 매학기 개시전에 이를 공시한다.


    제 62 조 (실험실습비 및 기타 납입금)

    실험실습비 및 기타 납입금에 관한 비용은 실비를 따로 징수할 수 있다.


    제 63 조 (결석 또는 정학자 납입금)

    납입금은 결석, 정학 또는 제적의 이유로 감액되지 않는다.


    제 64 조 (휴학자의 납입금)

    휴학자에 대하여는 다음 학기 이후의 휴학기간중의 납입금을 면제 한다. 다만, 당해학기 개강일전에 휴학한 자는 그 학기부터 면제한다.

    납입금을 납입하고 당해학기 휴학한 자의 납입금은 휴학시점에 따라 복학시 등록금을 차등 면제한다. 이때 면제 등록금에 대하여는 증 액된 납입금을 징수하지 아니한다.

    제2항의 휴학시점에 따라 복학시 등록금을 차등 면제하는 기준은 학사운영규정으로 정한다.


    제 65 조 (납입금의 반환)

    기납부한 납입금은 과오로 인한 경우 이외에는 일체 반환되지 않는다. 다만, 관계법령이 정하는 바와 교무처장이 인정하는 경우는 예외로한다.



    '
  - '제 12 장 학생활동


    제 51 조 (학생활동)

    학생은 이 대학교의 건학정신에 따라 덕성을 기르고 교칙을 준수하며 전심ᆞ성의로 학업에 종사하고 신체를 단련하여 사회의 지도자가 될 자질을 닦아야 한다.


    제 52 조 (총학생회)

    건전한 학풍을 조성하고 학생자치활동을 신장시키기 위하여 한동대학교 총학생회(이하 ''총학생회''라 한다)를 둔다.

    총학생회의 조직과 운영에 관한 사항은 총장의 승인을 얻어 학생회칙으로 따로 정한다.

    전시·사변 또는 이에 준하는 국가 비상사태시에는 그 활동이 정지된다.


    제 53 조 (회비)

    총학생회 회원은 소정의 회비를 납부하여야 한다.


    제 54 조 (학생지도)

    학업 및 학생생활을 지도하기 위하여 담임지도교수를 둘 수 있다.

    담임지도교수는 학생이 건전한 사고방식을 지닌 유능한 학생이 되도록 학생지도에 최선의 노력을 다한다.


    제 55 조 (학생지도위원회)

    학생자치 활동을 비롯한 학생들의 생활전반에 관한 사항을 지도, 협의하기 위하여 학생지도위원회를 둔다.

    학생지도위원회는 위원장 1인을 포함한 11인 이내의 위원으로 구성하되, 학생인재개발처장을 위원장으로 하고 교목실장, RC학장은 당연직위원이 되며 그외 위원은 전임교원중에서 총장이 임명한다.

    학생지도위원회의 운영에 관하여 필요한 사항은 총장이 따로 정한다.


    제 56 조 (학업방해 행위의 금지)

    학생은 학내에서 정치적 활동을 할 수 없으며, 수업ᆞ연구 등 학교의 기본기능 수행을 방해하는 개인 또는 단체의 어떠한 행위도 할 수 없 다.


    제 57 조 (학생단체의 승인)

    총학생회 이외의 학생단체를 조직하고자 할 때에는 학생지도위원회의 승인을 받아야 한다.


    제 58 조 (간행물)

    학생의 간행물 발간, 배포 및 게시에 관한 사항은 총장이 따로 정한다.



    '
  - '제 9 장 시험 및 성적


    제 40 조 (시험자격)

    각 교과목의 당해학기 결석 일수가 소정의 한계를 초과할 때에는 그 교과목의 성적을 인정하지 않는다.


    제 41 조 (추가시험)

    질병 기타 부득이한 사고로 인하여 시험에 응하지 못할 경우에는 사전에 추가시험원을 제출하여 학과(부)장의 승인을 받아야 한다.


    제 42 조 (성적평가)

    학업성적은 시험성적, 과제물 평가, 출석상황 등을 종합하여 평가한다. 다만 실험ᆞ실습 및 특수한 과목의 성적은 따로 기준을 정할 수 있다.

    총장이 지정하는 교과목 또는 분반에 대하여는 합격 여부만 구분하여 P(급) 또는 F(낙)로 표시하며, 평점은 부여하지 않는다.

    교과목 담당교수는 교과목 또는 분반 내에서 성적평가유형(Grade평가, P/F평가)을 병행할 수 있으며, 세부 운영 사항은 총장이 따로 정 한다.

    성적평가자료가 미비할 경우에는 잠정적으로 ''I''(미완)의 성적을 부여한다.

    각 과목별 학업성적은 다음과 같이 분류하되, D0(60점) 이상과 PD 또는 P일 때 학점을 취득한 것으로 인정한다.

    **Grade 평가 기준표**

    | 등급 | 점수 범위 | 평점 |

    |———|—————|———|

    | A+ | 95-100 | 4.5 |

    | A0 | 90-94 | 4.0 |

    | B+ | 85-89 | 3.5 |

    | B0 | 80-84 | 3.0 |

    | C+ | 75-79 | 2.5 |

    | C0 | 70-74 | 2.0 |

    | D+ | 65-69 | 1.5 |

    | D0 | 60-64 | 1.0 |

    | F | 0-59 | 0.0 |

    **P/F 평가 기준표**

    | 등급 | 실점 |

    |———|———|

    | PD | 90점 이상 |

    | P | 70점 이상 |

    | F | 70점 미만 |

    | I |  |

    | W | |

    제 42조의 2(취득학점의 철회)

    주간학부 학생은 이수한 교과목의 취득학점을 철회할 수 있다.

    철회한 과목의 성적은 성적증명서에 ''W''로 표기한다.

    취득학점 철회 대상자, 철회가능 최대학점 등 시행에 관한 세부사항은 학사운영규정으로 따로 정한다.


    제 43 조 (수강과목 철회 및 재이수)

    수강신청한 과목을 철회할 수 있으며, 이에 관한 세부사항은 학사운영규정으로 정한다.

    이미 이수한 과목을 재이수하고자 할 때는 재이수 신청을 하여 이미 취득한 학점을 취소하고 재이수할 수 있다.

    재이수는 성적이 ''C+''이하인 과목에 한하여 허용한다. 다만, 총장이 특별히 필요하다고 인정하는 경우에는 그러하지 아니하다.


    제 44 조 (학사경고)

    매학기 평점평균 2.0미만인 자에게 학사경고를 과하되, 본인 및 보증인, 소속 학과(부)장에게 즉시 통보한다. 다만, 직전학기까지의 취 득학점이 110학점 이상이고 등록학기 8학기 이상의 학생은 제외한다.

    제1항의 학생에게는 수강신청 학점을 제한 할 수 있으며, 이에 관한 세부사항은 총장이 따로 정한다.



    '
- source_sentence: 부전공 과정을 운영하는 기준은 무엇인가요?
  sentences:
  - '제 15 장 장학금


    제 66 조 (장학금)

    이 대학교 학생중 품행이 방정하고 학업성적이 우수한 자와 가계곤란으로 학업계속에 지장이 있는 학생에 대하여는 장학금을 지급할 수 있다.

    장학금 지급에 관한 세부사항은 총장이 따로 정한다.



    '
