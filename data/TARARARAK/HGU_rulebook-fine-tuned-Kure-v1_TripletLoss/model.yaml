    이유없이 기일 내 제1항의 절차를 이행하지 않을 때에는 입학허가를 취소한다.


    제 18 조 (재입학)

    퇴학 또는 제적된 자가 재입학을 원할 때에는 퇴학 또는 제적하였던 학과(부)의 동일학년 이하만 1회에 한하여 허가할 수 있다. 다만, 다음 각호의 1에 해당하는 자는 재입학할 수 없다.

    제28조 제6호에 의해 재학연한을 초과하여 제적된 학생은 재입학을 할 수 없다.

    재입학생이 이미 이수한 학점은 이를 통산하여 인정할 수 있다.

    제1항의 규정에도 불구하고 제적된 자는 제적된 날로부터 1년이 경과한 후에 재입학 할 수 있다. 다만, 징계로 제적된 자는 학생지도위 원회에서 재입학에 대하여 심의 의결한 경우에 한한다.


    제 19 조 (편입학)

    입학전형은 당해연도 교육부의 대학 편입학 전형 기본계획과 이 대학교 모집요강에 따라 선발한다.

    편입학은 편입학 하고자 하는 학년의 직전 학기까지의 과정을 수료한 자 또는 이와 동등이상의 학력이 있다고 인정된 자로서 모집단위 별 1학년 또는 2학년 학생 중 직전 학기 및 직전 학년도에 제적된 인원을 소정의
    절차를 거쳐 모집할 수 있다. 다만, 법령이 정하는 경우는 정원의 제한 없이 정원외 편입학을 허가할 수 있다.

    학사학위를 취득한 자는 3학년에 편입학할 수 있다. 다만, 편입학할 수 있는 인원은 당해 학년 입학정원의 5퍼센트 이내이어야 하고, 당해 학년 모집단위별 입학정원의 10퍼센트를 초과할 수 없다.

    제출 서류의 허위기재, 서류의 위조, 변조, 대리시험 또는 시험부정행위 등 편입학 부정행위가 편입학허가 전에 그 사실이 판명된 때에 는 불합격처리 하고 편입학 허가 후에 사실이 판명된 때에도 편입학을 취소하고 학적을
    말소한다.

    편입학한 학생이 전적학교에서 취득한 학점은 졸업 학점의 2분의 1 범위내에서 이 대학교 학점으로 인정할 수 있다.


    제 20 조 (정원외 입학)

    입학전형은 당해연도 한국대학교육협의회의 대학입학전형기본사항, 이 대학교의 대학입학전형시행계획, 교육부의 대학 편입학전형 기 본계획과 이 대학교의 모집요강에 따라 선발한다.


    제 21 조 (전공변경)

    전공 변경은 매 학년도 학기 개시 전 소정기간내에 신청하고 총장이 허가한다.

    전공 및 부전공 변경은 2학년 이상 학생에 허용한다.

    제21조 2(학과(부)선택)

    학과(부) 구분없이 입학한 학생은 다음 각호에 따라 소속 학과(부) 및 전공을 선택하여야 하며 1전공이 소속된 학부를 학생의 소속학부로 배정한다.

    주간학생은 2학년 1학기 진학시 소속 학부와 전공을 선택하여야 한다. 다만, 총장이 필요하다고 인정하는 경우에는 2학년 1학기 진학 전에 소속 계열과 전공을 선택할 수 있다.


    제 22 조 (보증인)

    대학 입학 전형에 따라 보증인을 둘 수 있으며, 보증인은 당해 학생의 보호자이어야 하며 부득이한 경우에는 재학 중 학비, 기타 신상에 관한 일체의 책임을 질 수 있는 자로 한다.

    보증인의 주소 및 신상의 변동이 있을 때에는 즉시 신고하여야 한다.



    '
  - '제 23 장 도서관


    제 84 조 (도서관)

    이 대학교에 도서관을 두며 운영에 관한 세부사항은 따로 정한다.



    '
  - '제 16 장 직제


    제 67 조 (직제)

    이 대학교의 직제는 따로 정한다.



    '
- source_sentence: 제적 유보가 가능한 상황은 어떤 경우야?
  sentences:
  - '제 15 장 장학금


    제 66 조 (장학금)

    이 대학교 학생중 품행이 방정하고 학업성적이 우수한 자와 가계곤란으로 학업계속에 지장이 있는 학생에 대하여는 장학금을 지급할 수 있다.

    장학금 지급에 관한 세부사항은 총장이 따로 정한다.



    '
  - '제 8 장 부전공 및 복수전공


    제 37 조 (부전공)

    개설 전공이 있는 경우에 해당 전공의 부전공을 허용하는 것을 원칙으로 하되, 총장이 특별히 필요하다고 인정하는 경우에는 개설 전공 없이 부전공만을 운영하는 교과과정을 둘 수 있다.

    소정의 절차를 밟아 부전공으로 21학점이상 취득한 자에게 부전공 이수를 인정하고 학적부와 졸업증서에 이를 표시한다.

    부전공 운영에 관한 사항은 총장이 따로 정한다.


    제 38 조 (전공 등)

    학생은 복수(연계)전공으로 1전공 33학점 이상, 2전공 33학점 이상 이수함을 원칙으로 한다. 다만, 전공심화 교육을 위하여 복수 전공 (심화형)(45학점+33학점), 주전공 부전공( 45학점+21학점), 단수
    심화 전공 (60학점 이상)을 허용할 수 있다.

    복수(연계)전공, 복수 전공(심화형), 주전공 부전공, 단수 심화 전공 허용 및 전공운영 기준은 총장이 따로 정한다.

    학생설계융합전공과 글로벌융합전공은 학제적 교과과정을 학생 스스로 구성하여 승인 받은 전공을 이수하는 것으로, 취득학점은 당해 학과(부)의 전공 이수학점 이상이어야 하며, 기타 시행에 필요한 사항은 총장이 따로 정한다.

    모듈형설계전공은 복수의 모듈 교육과정을 선택하여 이수하는 전공 교육과정으로 기타 시행에 필요한 사항은 총장이 따로 정한다.

    제38조의 2(모듈 교육과정, 전공 및 융복합 영역의 특화분야 인정 및 표기) 총장은 학생이 이수한 모듈 교육과정과 전공과목 및 융복합 영역의 특정분야에 특화 되어 있다고 인정할 경우 학적부, 졸업증명서, 성적증명서에이수모듈명과
    특화분야를 표기할 수 있으며 또한 별 도의 증명서를 발급할 수 있다. 전공 및 융복합 영역의 특화분야의 운영에 관한 세부사항은 총장이 따로 정한다.



    '
  - '제 6 장 휴학, 복학, 제적 및 퇴학


    제 25 조 (휴학)

    학생은 재학 중 휴학할 수 있으며 시행에 관한 세부 사항은 학사운영규정으로 정한다.

    제23조 및 제24조에 따른 등록(등록금 납부 및 수강신청)을 완료하지 못한 자는 당해학기 미등록휴학 처리한다. 다만, 휴학기간이 3년 이상이고 본인의 의사가 없는 경우 제적처리한다.

    질병 등으로 타 학생에게 현저히 피해를 주어 팀 활동이나 학생생활관 입주 등 공동체 생활이 어렵다고 판단되는 자는 심리검사 또는 상담이나 치료를 받아야 한다. 이를 거부하거나 권고휴학을 거부하는 자에게 총장은 학생지도위원회의
    심의를 거쳐 휴학을 명할 수 있으며, 이에 관한 세부사항은 학사운영규정으로 정한다.


    제 26 조 (복학)

    복학의 절차 및 시기 등에 관하여는 학사운영규정으로 정한다.

    제25조 제5항에 의거 미등록휴학된 자는 다음학기 제1항의 절차에 따라 복학하거나 휴학하여야 한다.


    제 27 조 (자퇴)

    자퇴코자 하는 자는 보증인이 연서한 사유서를 제출하여 총장의 허가를 받아야 한다.


    제 28 조 (제적)

    학생으로서 다음 각호의 1에 해당하는 자는 제적한다.

    휴학기간 경과후 복학하여야 하는 학기의 소정기간내에 복학하지 않은 자

    등록금 분납신청자중 소정의 기간내에 완납하지 못한 자

    학사경고를 연속 3회 또는 통산 4회 받은 자

    재학연한을 초과한 자

    제1항 제1호의 경우 제적 처리를 원칙으로 하되, 교무처장이 인정하는 경우, 해당학기에 휴학연장으로 처리할 수 있다.

    제1항 제4호의 경우 제적 처리를 원칙으로 하되, 질병 또는 이에 준하는 특별한 사유가 있다고 총장이 인정한 경우에는 1회에 한하여 제적을 유보하고 권고휴학을 하도록 할 수 있다.



    '
