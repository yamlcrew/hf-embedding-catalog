- source_sentence: 입학 부정행위가 있으면 한동대에서는 어떤 조치를 하나요?
  sentences:
  - '제 16 조 (입학허가 및 특별과정)

    입학은 총장이 허가하되, 제출 서류의 허위기재, 서류의 위조, 변조, 대리시험 또는 시험부정행위 등 입학 부정행위가 입학허가 전에 그 사실이 판명된 때에는 불합격처리하고 입학허가 후에 사실이 판명된 때에도 입학을
    취소한다.

    특별과정 운영에 관한 세부사항은 총장이 따로 정한다.'
  - "제 19 조 (편입학)\n입학전형은 당해연도 교육부의 대학 편입학 전형 기본계획과 이 대학교 모집요강에 따라 선발한다.\n편입학은 편입학 하고자 하는 학년의 직전 학기까지의 과정을 수료한 자 또는 이와 동등이상의\
    \ 학력이 있다고 인정된 자로서 모집단위 별 1학년 또는 2학년 학생 중 직전 학기 및 직전 학년도에 제적된 인원을 소정의 절차를 거쳐 모집할 수 있다.\n다만, 법령이 정하는 경우는 정원의 제한 없이 정원외 편입학을\
    \ 허가할 수 있다.\n학사학위를 취득한 자는 3학년에 편입학할 수 있다.\n다만, 편입학할 수 있는 인원은 당해 학년 입학정원의 5퍼센트 이내이어야 하고, 당해 학년 모집단위별 입학정원의 10퍼센트를 초과할 수\
    \ 없다.\n제출 서류의 허위기재, 서류의 위조, 변조, 대리시험 또는 시험부정행위 등 편입학 부정행위가 편입학허가 전에 그 사실이 판명된 때에는 불합격처리 하고 편입학 허가 후에 사실이 판명된 때에도 편입학을\
    \ 취소하고 학적을 말소한다. \n편입학한 학생이 전적학교에서 취득한 학점은 졸업 학점의 2분의 1 범위내에서 이 대학교 학점으로 인정할 수 있다."
  - '제 16 조 (입학허가 및 특별과정)

    입학은 총장이 허가하되, 제출 서류의 허위기재, 서류의 위조, 변조, 대리시험 또는 시험부정행위 등 입학 부정행위가 입학허가 전에 그 사실이 판명된 때에는 불합격처리하고 입학허가 후에 사실이 판명된 때에도 입학을
    취소한다.

    특별과정 운영에 관한 세부사항은 총장이 따로 정한다.'
  - '제 52 조 (총학생회)

    건전한 학풍을 조성하고 학생자치활동을 신장시키기 위하여 한동대학교 총학생회(이하 "총학생회"라 한다)를 둔다.

    총학생회의 조직과 운영에 관한 사항은 총장의 승인을 얻어 학생회칙으로 따로 정한다.

    전시·사변 또는 이에 준하는 국가 비상사태시에는 그 활동이 정지된다.'
