  - '제 1 조 (목적)

    이 학칙은 한동대학교(이하 "이 대학교"라 한다) 교훈의 실천과 교육이념, 교육목적 및 교육목표를 달성하기 위한 교육조직, 학사운영 등에 관한 사항을 규정함을 목적으로 한다.'
  - '제 17 조 (입학절차)

    입학허가 예정자는 지정된 기일 내 소정의 서류를 제출하고 수학에 필요한 제반절차를 이행하여야 한다.

    이유없이 기일 내 제1항의 절차를 이행하지 않을 때에는 입학허가를 취소한다.'
  - '제목: 한동대학교 학칙

