    공개강좌에 관한 규정은 총장이 따로 정한다.'
- source_sentence: 한동대학교는 입학 전형의 공정성을 어떻게 관리하나요? 관련 위원회도 있나요?
  sentences:
  - '제 15 조 (입학 관련 위원회)

    입학전형의 공정하고 원활한 관리를 위하여 입시공정관리위원회와 입학전형관리위원회를둔다.

    입시공정관리위원회와 입학전형관리위원회는 총장 직속으로 구성하되, 그 구성, 기능 및 운영에 관한 사항은 관련 지침 등에 따르거나, 총장이 따로 정한다.'
  - '제 52 조 (총학생회)

    건전한 학풍을 조성하고 학생자치활동을 신장시키기 위하여 한동대학교 총학생회(이하 "총학생회"라 한다)를 둔다.

    총학생회의 조직과 운영에 관한 사항은 총장의 승인을 얻어 학생회칙으로 따로 정한다.

    전시·사변 또는 이에 준하는 국가 비상사태시에는 그 활동이 정지된다.'
  - '제목: 한동대학교 학칙

    소관부서: 교무팀 1073, 1074

