- source_sentence: 한동대학교에 합격한 후 어떤 절차를 언제까지 마쳐야 하나요? 기한을 넘기면 어떻게 되나요?
  sentences:
  - '제 52 조 (총학생회)

    건전한 학풍을 조성하고 학생자치활동을 신장시키기 위하여 한동대학교 총학생회(이하 "총학생회"라 한다)를 둔다.

