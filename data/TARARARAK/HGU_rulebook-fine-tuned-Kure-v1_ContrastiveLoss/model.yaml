      매학기 평점평균 2.0미만인 자에게 학사경고를 과하되, 본인 및 보증인, 소속 학과(부)장에게 즉시 통보한다.

      다만, 직전학기까지의 취득학점이 110학점 이상이고 등록학기 8학기 이상의 학생은 제외한다.

      제1항의 학생에게는 수강신청 학점을 제한 할 수 있으며, 이에 관한 세부사항은 총장이 따로 정한다.'
    - '제 84 조 (도서관)

      이 대학교에 도서관을 두며 운영에 관한 세부사항은 따로 정한다.'
    - '제 55 조 (학생지도위원회)

      학생자치 활동을 비롯한 학생들의 생활전반에 관한 사항을 지도, 협의하기 위하여 학생지도위원회를 둔다.

      학생지도위원회는 위원장 1인을 포함한 11인 이내의 위원으로 구성하되, 학생인재개발처장을 위원장으로 하고 교목실장, RC학장은 당 연직위원이 되며 그외 위원은 전임교원중에서 총장이 임명한다.

      학생지도위원회의 운영에 관하여 필요한 사항은 총장이 따로 정한다.'
