widgetData:
- source_sentence: 교무회의에서 총장이 필요하다고 인정하는 사항도 심의하나요?
  sentences:
  - '제 72 조 (회의)

    교수회는 재적인원 과반수의 출석과 출석인원 과반수의 찬성으로 의결한다.'
  - '제 38 조 (전공 등)

    학생은 복수(연계)전공으로 1전공 33학점 이상, 2전공 33학점 이상 이수함을 원칙으로 한다.

    다만, 전공심화 교육을 위하여 복수 전공(심화형)(45학점+33학점), 주전공 부전공( 45학점+21학점), 단수 심화 전공 (60학점 이상)을 허용할 수 있다.

    복수(연계)전공, 복수 전공(심화형), 주전공 부전공, 단수 심화 전공 허용 및 전공운영 기준은 총장이 따로 정한다.

    학생설계융합전공과 글로벌융합전공은 학제적 교과과정을 학생 스스로 구성하여 승인 받은 전공을 이수하는 것으로, 취득학점은 당해 학과(부)의 전공 이수학점 이상이어야 하며, 기타 시행에 필요한 사항은 총장이 따로 정한다.

    모듈형설계전공은 복수의 모듈 교육과정을 선택하여 이수하는 전공 교육과정으로 기타 시행에 필요한 사항은 총장이 따로 정한다.

    총장은 학생이 이수한 모듈 교육과정과 전공과목 및 융복합 영역의 특정분야에 특화 되어 있다고 인정할 경우 학적부, 졸업증명서, 성적증명서에이수모듈명과 특화분야를 표기할 수 있으며 또한 별도의 증명서를 발급할 수
    있다.

    전공 및 융복합 영역의 특화분야의 운영에 관한 세부사항은 총장이 따로 정한다.'
  - '제 11 조 (입학자격)

    제1학년에 입학할 수 있는 자는 다음 각호의 1에 해당하는 자이어야 한다.

    고등학교 졸업자 또는 졸업예정자.

    고등학교 졸업학력 검정고시 합격자.

    외국의 초,중,고등학교 전학교 교육과정을 이수한 자.

    기타 법령에 의하여 고등학교 졸업자와 동등이상의 학력이 있다고 인정된 자.'
- source_sentence: 한동대학교에서 학칙 개정은 어떻게 이루어지나요?
  sentences:
  - '제 18 조 (재입학)

    퇴학 또는 제적된 자가 재입학을 원할 때에는 퇴학 또는 제적하였던 학과(부)의 동일학년 이하만 1회에 한하여 허가할 수 있다.

    다만, 다음 각호의 1에 해당하는 자는 재입학할 수 없다.

    제28조 제6호에 의해 재학연한을 초과하여 제적된 학생은 재입학을 할 수 없다.

    재입학생이 이미 이수한 학점은 이를 통산하여 인정할 수 있다.

    제1항의 규정에도 불구하고 제적된 자는 제적된 날로부터 1년이 경과한 후에 재입학 할 수 있다.

    다만, 징계로 제적된 자는 학생지도위원회에서 재입학에 대하여 심의 의결한 경우에 한한다.'
  - '제 26 조 (복학)

    복학의 절차 및 시기 등에 관하여는 학사운영규정으로 정한다.

    제25조 제5항에 의거 미등록휴학된 자는 다음학기 제1항의 절차에 따라 복학하거나 휴학하여야 한다.'
  - '제 1 조 (목적)

    이 학칙은 한동대학교(이하 "이 대학교"라 한다) 교훈의 실천과 교육이념, 교육목적 및 교육목표를 달성하기 위한 교육조직, 학사운영 등에 관한 사항을 규정함을 목적으로 한다.'
- source_sentence: 한동대학교 교무회의는 어떻게 의결되나요?
  sentences:
  - '제 73 조 (기능)

    이 대학교 교육 및 운영에 관한 중요한 사항을 종합 심의하기 위하여 교무회의를 둔다.'
  - '제 45 조 (졸업)

    이 학칙에서 정한 소정의 전과정을 이수하고 전체 성적 평점평균이 2.0 이상이며, 졸업요건을 충족한 자에게는 별지 제1호 서식의 학위증을 수여한다.

    제1항의 규정에도 불구하고 본인의 신청에 따라 최대 1년간 졸업을 연기할 수 있으며 이의 시행에 관한 세부사항은 총장이 따로 정한다.

    학위과정 재적 중 부득이한 사유로 졸업에 필요한 소정의 과정을 이수하지 못한 자 중 특별한 사유가 있는 자에게 명예졸업증서를 수여할 수 있다.

    명예졸업에 관한 세부사항은 따로 정한다.'
  - '제 1 조 (목적)

    이 학칙은 한동대학교(이하 "이 대학교"라 한다) 교훈의 실천과 교육이념, 교육목적 및 교육목표를 달성하기 위한 교육조직, 학사운영 등에 관한 사항을 규정함을 목적으로 한다.'
- source_sentence: 한동대학교 학칙 개정은 누가 공포하나요?
  sentences:
  - '제 57 조 (학생단체의 승인)

    총학생회 이외의 학생단체를 조직하고자 할 때에는 학생지도위원회의 승인을 받아야 한다.'
  - '제 66 조 (장학금)

    이 대학교 학생중 품행이 방정하고 학업성적이 우수한 자와 가계곤란으로 학업계속에 지장이 있는 학생에 대하여는 장학금을 지급할 수 있다.

    장학금 지급에 관한 세부사항은 총장이 따로 정한다.'
  - '제 74 조 (구성)

    교무회의는 총장, 부총장, 교목실장, 처장과 총장이 임명하는 5인 이내의 위원으로 구성한다.

    다만, 총장이 필요하다고 인정할 때에는 이외의 자를 출석시켜 의견을 발표하게 할 수 있다.'
- source_sentence: 한동대학교의 입학 지원절차는 어디에서 확인할 수 있나요?
  sentences:
  - '제 44 조 (학사경고)

    매학기 평점평균 2.0미만인 자에게 학사경고를 과하되, 본인 및 보증인, 소속 학과(부)장에게 즉시 통보한다.

    다만, 직전학기까지의 취득학점이 110학점 이상이고 등록학기 8학기 이상의 학생은 제외한다.

    제1항의 학생에게는 수강신청 학점을 제한 할 수 있으며, 이에 관한 세부사항은 총장이 따로 정한다.'
  - '제 84 조 (도서관)

    이 대학교에 도서관을 두며 운영에 관한 세부사항은 따로 정한다.'
  - '제 55 조 (학생지도위원회)

    학생자치 활동을 비롯한 학생들의 생활전반에 관한 사항을 지도, 협의하기 위하여 학생지도위원회를 둔다.

    학생지도위원회는 위원장 1인을 포함한 11인 이내의 위원으로 구성하되, 학생인재개발처장을 위원장으로 하고 교목실장, RC학장은 당 연직위원이 되며 그외 위원은 전임교원중에서 총장이 임명한다.

    학생지도위원회의 운영에 관하여 필요한 사항은 총장이 따로 정한다.'
