widgetData:
- source_sentence: 한동대학교 학칙 개정은 어떤 절차를 거쳐 이루어지나요? 교무회의와 대학평의원회의 심의가 필요한가요?
  sentences:
  - '제 78 조 (사전공고)

    학칙 개정 사유가 발생하였을 경우 총장은 학칙 개정 안을 기획위원회에 상정하여 1차 심의케한 후 이를 7일 이상의 기간 공고하여야 한'
  - '제 79 조 (심의 및 공포)

    총장은 학칙 개정안을 사전 공고하여 의견 수렴 절차를 거친 후 교무회의심의를 거쳐 대학평의원회의 심의를 받아야 한다.

    학칙 개정은 대학평의원회 심의 후 총장이 확정.공포 한다.'
  - '제 31 조 (교과과정)

    교과과정의 편성과 운영에 관한 사항은 총장이 따로 정한다.

    재학중 성적이 우수한 학생을 선발하여 학사학위과정과 석사학위과정을 상호연계하는 학.석사 연계과정을 이수하게 할 수 있다.

    학사학위과정의 3학년 이상 교과목 또는 석사학위과정의 교과목 중 학·석사 공통인정과목을 지정할 수 있고, 이를 이수한 학생은 학사학위과정 졸업학점을 초과하는 학점 범위내에서 석사학위과정 학점으로 인정 할 수 있다.

    학.석사연계과정 시행에 관한 세부사항은 총장이 따로 정한다.

    공학교육인증제 교육과정을 운영하는 학부는 총장의 승인을 얻어 일반교육과정의 전공명과 구분되는 별도의 인증제 전공명을 부여할 수 있다.

    공학교육인증제 교육과정의 시행에 관한 세부사항은 총장이 따로 정한다. 융복합 미래 인재 양성을 위해 고등교육법 시행령 제 12조 의2에 근거한 소단위전공 교육과정인 모듈 교육과정을 둘 수 있으며, 모듈 교육과정
    시행에 관한 세부사항은 총장이 따로 정한다.'
- source_sentence: 한동대학교에서는 매 학기 납입금을 어떻게 납부하나요? 분납이 가능한가요?
  sentences:
  - '제 12 조 (입학 지원절차)

    입학 지원절차는 모집시에 총장이 따로 정하여 공고한다.'
  - '제 61 조 (납입금 납입의무)

    학생은 매학기 등록기간에 소정의 납입금을 납부하여야 한다. 다만, 사정에 따라 총장의 허가를 얻어 분납할 수 있다.

    납입금의 금액 및 납입기일은 매학기 개시전에 이를 공시한다.'
  - '제 67 조 (직제)

    이 대학교의 직제는 따로 정한다.'
- source_sentence: 한동대학교 입학전형은 어떻게 진행되며, 입학사정관제는 어떻게 운영되나요?
  sentences:
  - '제목: 한동대학교 학칙

    소관부서: 교무팀 1073, 1074

    학교웹페이지: https://rule.handong.edu'
  - '제 25 조 (휴학)

    학생은 재학 중 휴학할 수 있으며 시행에 관한 세부 사항은 학사운영규정으로 정한다.

    제23조 및 제24조 에 따른 등록(등록금 납부 및 수강신청)을 완료하지 못한 자는 당해학기 미등록휴학 처리한다.

    다만, 휴학기간이 3년 이상이고 본인의 의사가 없는 경우 제적처리한다.

    질병 등으로 타 학생에게 현저히 피해를 주어 팀 활동이나 학생생활관 입주 등 공동체 생활이 어렵다고 판단되는 자는 심리검사 또는 상담이나 치료를 받아야 한다.

    이를 거부하거나 권고휴학을 거부하는 자에게 총장은 학생지도위원회의 심의를 거쳐 휴학을 명할 수 있으며, 이에 관한 세부사항은 학사운영규정으로 정한다.'
  - '제 13 조 (입학전형)

    입학전형은 당해연도 한국대학교육협의회의 대학입학전형기본사항, 이 대학교의 대학입학전형시행계획과 모집요강에 따라 선발한다.

    입학전형의 전형요소와 일정등 상세한 사항은 총장이 따로 정한다.

    입학전형을 시행함에 있어 입학사정관제로 학생을 선발할 수 있으며, 입학사정관제의 운영에 관한 세부사항은 총장이 따로 정한다.'
- source_sentence: 한동대학교에서 전공이나 부전공을 변경할 수 있나요? 2학년 진학 전에 전공을 미리 정할 수도 있나요?
  sentences:
  - '제 85 조 (글로벌 미래 평생교육원 학점은행제 운영)

    「학점은행 등에 관한 법률」에 따라 평가인정을 받는 학습과정을 이수한 자 등에게 학점인정을 통하여 학력인정의 기회를 부여하는 학점은행제를 운영할 수 있다.

    학점은행제 운영과 관련하여 학점의 인정범위 및 학적관리 등에 관한 사항은 총장이 따로 정한다.'
  - '제 21 조 (전공변경)

    전공 변경은 매 학년도 학기 개시 전 소정기간내에 신청하고 총장이 허가한다.

    전공 및 부전공 변경은 2학년 이상 학생에 허용한다.

    학과(부) 구분없이 입학한 학생은 다음 각호에 따라 소속 학과(부) 및 전공을 선택하여야 하며 1전공이 소속된 학부를 학생의 소속학부로 배정한다.

    주간학생은 2학년 1학기 진학시 소속 학부와 전공을 선택하여야 한다. 다만, 총장이 필요하다고 인정하는 경우에는 2학년 1학기 진학 전에 소속 계열과 전공을 선택할 수 있다.'
  - '제 7 조 (학년도 및 학기)

    학년도는 3월 1일부터 다음해 2월말일까지로 한다.

    학년도는 다음과 같이 두 학기로 나누는 것을 원칙으로 한다.

    다만, 수업은 2주를 초과하지 않는 범위내에서 학기 개시일 전에 개강할 수 있다.

    제1학기 : 3월 1일부터 8월 31일까지.

    제2학기 : 9월 1일부터 다음해 2월 말일까지.

    하기 및 동기 방학기간 중에 1개 이상의 계절학기를 둘 수 있으며, 계절학기 운영에 관한 사항은 총장이 따로 정한다.

    정규학기 중 학생들이 자기주도적 학습활동을 할 수 있는 자유학기를 둘 수 있으며, 자유학기 운영에 관한 사항은 총장이 따로 정한다.

    정규학기 및 계절학기 중 학생들이 진로적성 탐색에 집중하거나 문제발굴과 해결을 위한 참여적 학습활동 위주의 혁신학기를 둘 수 있으며, 혁신학기 운영에 관한 사항은 총장이 따로 정한다.'
- source_sentence: 한동대학교 교수회는 어떻게 구성되나요?
  sentences:
  - '제 69 조 (구성)

    교수회는 조교수 이상의 전임교원으로 구성한다.'
  - '제 62 조 (실험실습비 및 기타 납입금)

    실험실습비 및 기타 납입금에 관한 비용은 실비를 따로 징수할 수 있다.'
  - '제 84 조 (도서관)

    이 대학교에 도서관을 두며 운영에 관한 세부사항은 따로 정한다.'
