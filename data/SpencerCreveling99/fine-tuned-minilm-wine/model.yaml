widgetData:
- source_sentence: Decanting recommended for a balanced, buttery and full-bodied white
  sentences:
  - Dusty cherry and tomato aromas are neither elegant nor elevated. A jagged palate lacks flow, while this tastes of salty
    sour plum. A low-depth finish tastes peppery. Overall, this is simply adequate Pinot Noir.
  - Pale in color, this fragrant wine has some bottle age that gives a toast and almond character. Ripe strawberry flavors
    balance between softness and a crisp, tight aftertaste. It is ready to drink.
  - Starts off slowly, but opens considerably with air—so much so that it's probably worth decanting as you might a bottle
    of young white Burgundy. It's buttery and full, yet possesses a stony mineral quality that gives it balance. Initial peppery-spicy
    notes on the finish smooth out the longer it sits in the glass. Editors' Choice.
- source_sentence: Deep red wine, raspberry and vanilla scent
  sentences:
  - Features some superb elements that come off as a bit disjointed—perhaps it just needs some time? High-toned cherry fruit
    picks up some herbal notes and peppery cinnamon flavors, then finishes crisp, with hints of orange pekoe tea.
  - This wine has a deep violet-red color and a nose of raspberry, vanilla and graphite. Fruit-dominant flavors of raspberry
    and cherry, with a touch of custard, showcase a satisfying cooperation between deep and bright notes that make for a satisfying
    sipping experience.
  - Wiese & Krohn have made a specialty of Colheitas, vintage-dated wood-aged Ports. This 1983, aged in wood for 28 years,
    is an opulent, ripe example of the style. It is sweet and very concentrated, with burnt old wood flavors to go with raisins
    and prunes. The acidity is intense, a fine counterpoint to the rich fruit.
- source_sentence: somthing that is Light, citrus and peach chardonnay
  sentences:
  - This is a rich, full-bodied and finely structured wine. Named after the patriarch of the estate, it is firmly packed with
    dark plum and ripe blackberry fruits that are flanked by a dense texture and balanced acidity. It needs some time, so
    drink from 2018.
  - Light in weight and subtle in flavor, this Chard is a welcome change from some of its mega-mallowy Oz compatriots. There
    are citrus and peach flavors on the palate and floral, yellow fruit aromas; it starts to get toasty with aeration.
  - This blend of 45% Cabernet Sauvignon, 45% Merlot and 10% Syrah was too sweet for this taster. It's full of huge ripe fruit
    and a lingering aroma of burnt toast.
- source_sentence: Wine with Complex wine, surprising aroma and transitions to black fruits
  sentences:
  - This pure Merlot is racy, ripe and ready to drink, with fruit that shows maturity. Tannins are well integrated into the
    structure, leaving plenty of room for the juicy fruit and mature, spicy flavors. Drink now.
  - Forced, candied aromas of chocolaty oak and herbal, slightly weedy berry fruits feed into a chunky, blocky, creamy palate
    with saucy berry flavors combined with minty, top-heavy oak. The finish tastes minty, lactic and oaky, with heat.
  - This wine opens with a curious aroma of fried foods, like hashed browns from a diner, before finding its sense of black
    fruit, mild spice and leather. Dry and somewhat puckering on the palate, it's full bodied and powerfully concentrated.
- source_sentence: somthing that is Delicate red, fruity notes and a touch of oakiness
  sentences:
  - Sourced from the winery's highest, steepest site, and barrel-fermented with partial malolactic, this is a fine effort
    in a lighter vintage. Yeasty and creamy in the mouth, it melds a mix of banana, pineapple and coconut cream in a wine
    with excellent structure and length. The hint of caramel provides a flourish on the finish.
  - This tiny boutique does well with thick and heavy wines that frequently top 15% alcohol. This sweet, syrupy Syrah is loaded
    with blueberries, chocolate, licorice and espresso flavors. Nothing shy here, but it delivers a lot of flavor for the
    price.
  - This is a dark, earthy wine. Clove and leather notes accent modest black-cherry fruit, but the texture is plush and silky,
    making it approachable now.
