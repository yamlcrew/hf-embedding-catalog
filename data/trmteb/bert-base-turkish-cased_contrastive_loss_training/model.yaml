  sentences:
  - 'Karacaahmet Sultan Derneği Başkanı Muharrem Ercan, Üsküdar''daki Karacaahmet Sultan Derneği''nde düzenlediği basın toplantısında
    yaptığı konuşmada, Başbakan Recep Tayyip Erdoğan''ın katıldığı bir televizyon programında, Karacaahmet Cemevi ile ilgili
    söylediği ''''Gidin bakın orada bir ucube olarak Karacaahmet Türbesi''nin yanında durur. Şimdi hala olan cemevi ruhsatı
    filan yoktur, hala kaçaktır'''' şeklindeki sözlerini üzüntü ile karşıladıklarını söyledi.  Yapının sadece bir cemevi değil,
    aynı zamanda bir dergah olduğunu belirten Ercan, şöyle konuştu:  ''''Binanın ruhsatı yok. Zaten hiçbir cemevinin ruhsatı
    yoktur. Biz asla cemevi, cami ayrımı yapmıyoruz ama bugün Şakirin Camisi''nin de ruhsatı yoktur. Ben üzülüyorum şimdi.
    Çünkü 18 sene olmuş. 18 sene sonra bunun tekrar gündeme getirilmesinden üzüntü duyduk. Bizim bir bayrak derdimiz yok.
    Bizim bir toprak derdimiz yok. Bizim hiçbir derdimiz yok. Vergiyse veririz, askerlikse yaparız. Yeri geldi mi demokrasinin
    sibobuyuz.''''  O dönemde kendisinin derneğin yönetiminde olmadığını ve mezar taşlarının kırılarak üzerine inşaat yapıldığı
    konusunda bir şey diyemeyeceğini dile getiren Ercan, ''''O dönemde mahkemeye verildik. Üsküdar 15. Ağır Ceza Mahkemesi''nde
    yargılandık ve beraat ettik. Bildiğim kadarıyla vatandaşların çoğuna yer gösterilmiştir. Kırılma falan yok. Benim duyduğum
    çoğu vatandaşa yer gösterildiği yönünde. Zaten çok çok 5 tane falan var, bunlarda mahkeme dosyasında, razılık alınmış
    vaziyette, öyle zoraki kırılma, zoraki kaldırılma diye bir şey yok'''' diye konuştu.  Ercan, 18 sene sonra bu olayın gündeme
    getirilmesine gücendiklerini dile getirerek, sözlerini şöyle sürdürdü:  ''''Sayın Başbakan''ın kullandığı kelimeyi ve
    üslubu onaylamıyoruz. Üzüntü kaynağı oldu bizim için. Çünkü kendisi 74 milyon yurttaşımızın Başbakanı. Yani onun için
    oraya ''ucube'', işte buraya cemevi ayrımı yapması, birlikten, beraberlikten bahseden bir Başbakanımız''ın, böyle bir
    söz söylemesini gerçekten yadırgadık.  İslam inancına göre ramazan ayı hoşgörü, kalp kırmamak, gönül kırmamak, insanları
    sevmek, saymak, barışı korumak değil mi? Ama sen, kalkacaksın burada 15-20 milyon Alevi insanını bir yerde rencide edeceksin.
    Sayın Başbakan''dan tekrar tekrar rica ediyoruz, Faruk Çelik''e teşekkür ediyoruz belirli bir gayret göstermiştir, öncelikli
    olan cemevilerimiz yasal statüye kavuşturulsun. Kalkıp da şimdi bu saatten sonra yıkarlarsa da bir şey diyemeyiz.'''''
  - Palandöken Dağı'ndaki bir otelde 2 aydır kamp yapan Atletizm Milli Takım Antrenörü İbrahim Tunç, bugün yapılan çalışmalar
    sonrası odasına çekildi. Burada bir süre sonra rahatsızlanan İbrahim Tunç, yan odada kalan sporcularından duvara vurarak
    yardım istedi. Odaya gelen sporcular, antrenörlerinin terlediğini fark etti. İbrahim Tunç'u resepsiyona indiren sporcular,
    durumu otel yönetimine bildirdi. İbrahim Tunç, otele çağrılan ambulansla Atatürk Üniversitesi Tıp Fakültesi Yakutiye Araştırma
    Hastanesi Acil Servisine kaldırıldı. Burada doktorların yaptığı tüm müdahaleye karşın Konya Selçuk Üniversitesi Beden
    Eğitimi Öğretmenliği Bölümü mezunu olan İbrahim Tunç kurtarılamayarak hayatını kaybetti. Damar genişlemesi hastalığı olduğu
    öğrenilen ve kalp krizi geçirdiği belirtilen edilen genç antrenörün cenazesi otopsi için Erzurum Adli Tıp Grup Başkanlığı'na
    gönderildi. İbrahim Tunç'un ani ölümü sporcularını ve spor camiasını yasa boğdu. İbrahim Tunç'un çalıştırdığı sporcular
    Adli Tıp Kurumu önünde gözyaşlarına boğuldu. Konya'da yaşayan İbrahim Tunç'un ailesi acı haber üzerine Erzurum'a gelmek
    için yola çıktı. Daha önce de kalp sorunu nedeniyle tedavi gördüğü öğrenilen evli 1 erkek çocuk babası İbrahim Tunç'un
    cenazesi bugün toprağa verilmek üzere memleketi Konya'ya götürülecek.
  - Düzce’de geçtiğimiz gün meydana gelen selde Akçakoca ilçesi Esmahanım Köyü'nde 4’ü çocuk 7 kişinin kayıp olduğu bildirilmişti.
    Bugün gerçekleştirilen arama kurtarma çalışmalarında bir kişinin cansız bedenine ulaşıldığı belirtildi. Düzce Valiliğinden
    yapılan açıklamada, Düzce'nin Akçakoca ilçesine bağlı Esmahanım ile Uğurlu köyü arasında dere yatağında bir kişinin cesedinin
    bulunduğu belirtildi. Akçakoca Devlet Hastanesine kaldırılan kadının cenazesi, kayıp kişilerin yakınları tarafından teşhis
    edildi. Cesedin, kayıp olarak aranan 42 yaşındaki Fatma Töngel'e ait olduğu belirlendi. Kaybolan Cengiz (53), Fatma (42)
    ve Kağan Töngel (3), anne Nilgün (39) ile kızları Funda (9), ikizler Sanem ve İlayda Sinem Kaplan (7) için gün boyu sürdürülen
    arama çalışmalara havanın kararmasıyla yarına kadar ara verdi.
