    kadın bakanlara onay vermemesi çağrısı da yapıyor.  Karara muhafazakârların yanısıra kadın hakları savunucuları da tepkili.
    Aşırı muhafazakâr olan 3 kadın bakanın, kadın haklarının iyleştirilmesi için hiçbir çaba sarfetmeyeceği belirtiliyor.  İran
