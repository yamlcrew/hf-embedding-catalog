      şeklinde konuştu. İftar yemeğine Beşiktaş Kulübü Asbaşkanı Deniz Atalay, Yönetim Kurulu Üyesi Şafak Mahmut Yazıcıoğlu'nun
      yanı sıra Ereğli Belediye Başkanı Hüseyin Uysal, Ereğli İlçe Emniyet Müdürü Fahri Küçük, Ereğli Beşiktaş Taraftarları
      Derneği Başkanı Bahadır Kasap'ın yanı sıra çok sayıda siyah-beyazlı taraftar katıldı.
    - Kuzey Kıbrıs Türk Cumhuriyeti Cumhurbaşkanı Mehmet Ali Talat da, seçimlere ve sonrasına ilişkin görüşlerini NTV'ye anlattı.  Talat,
      anketlerde önde gözüken Ulusal Birlik Partisi'nin iktidara gelmesi halinde, Rum kesimiyle müzakerelerde hassas bir sürecin
      başlayacağı yönünde işaretler verdi.  Talat, "Burada önemli olan, kurulacak hükümetin Kıbrıs sorunua bakışıdır. Hükümet,
      sorununa ilişkin yaklaşımımızı desteklerse sorun olmaz ama desteklemezse yetki çatışması çıkar” dedi.  Talat, UBP lideri
      Derviş Eroğlu'nun Rum kesimiyle müzakerelere Dışişleri Bakanı'nın katılması yönündeki önerisine de sıcak bakmadığını
      açıkladı.  Cumhurbaşkanı talat, “Eğer uygun bir kişi olursa bunu değerlendiririm ama bu siyasi maksatla söyleniyorsa...
      Takdir edersiniz ki kendi ekibimi kendim belirlerim. Toplulmararası müzakerelere daha önce dışişleri bakanı hiç katılmadı.
      Bu konu da yine seçimden sonra belli olacaktır” şeklinde konuştu.  Ana muhalefet Ulusal Birlik Partisi (UBP) bu pazar
      günü yapılacak seçimler öncesi son mitingini Güzelyurt ilçesinde gerçekleştirdi.  6 milletvekili çıkaracak Güzelyurt
      ilçesinin İnönü meydanındaki miting alanına parti otobüsüyle gelen UBP Genel Başkanı Derviş Eroğlu ve UBP'nin milletvekili
      adayları meydanda coşkuyla karşılandı.  Partinin renkleri olan turuncu-beyaz balonlarla süslenen ve çok sayıda UBP destekçisinin
      hazır bulunduğu meydanda, "Tek başına iktidar, Eroğlu Başbakan", "Cumhuriyetçi Türk Partisi (CTP) gidecek, UBP gelecek"
      gibi sloganlar atıldı.  UBP Genel Başkanı Eroğlu, partisinin milletvekili adaylarını miting alanında kurulan sahneye
      çağırması ve halkı selamlamasının ardından bir konuşma yaptı.  "Zafer için yola çıktık" diyen Eroğlu, CTP Genel Başkanı
      ve Başbakan Ferdi Sabit Soyer'in bugünkü açıklamasında seçimden sonra Bakanlar Kurulunu değiştireceğini söylediğini
      hatırlattı, ancak değiştirmesine gerek kalmayacağını, çünkü partisinin CTP'nin Bakanlar Kurulu’nu göndereceğini öne
      sürdü.  CTP'nin artık iktidardan inme vaktinin geldiğini ileri süren Eroğlu, "2003 seçimlerinde Ferdi Bey 'Brüksel,
      AB' diye diye gençlerin hayalleriyle oynadı. Bir 'evet'le 5 yıl hayatımızı zehir ettiler. Halkımız artık karar verdi,
      'Oyun bitti' diyor" şeklinde konuştu.  Bu arada, Lefkoşa'dan Güzelyurt'a giden UBP miting konvoyu, Güzelyurt'tan Lefkoşa'ya
      giden CTP miting konvoyuyla Lefkoşa-Güzelyurt yolunda karşılaştı. İki partinin destekçileri bu karşılaşmada, bayraklar
      sallayarak, araçlarının kornolarını çaldı.  Kıbrıs Türk halkı bu pazar günü, 50 sandalyeli meclisin yeni üyelerini belirlemek
      için kendi devlet çatısı altındaki 10. genel seçime gidecek. Seçim yasakları ise yarın başlıyor.    KKTC Başbakanı ve
      Cumhuriyetçi Türk Partisi (CTP) Genel Başkanı Ferdi Sabit Soyer, ''ilerlemek isteyen bu halkı kimse durduramaz'' dedi.  KKTC'de
      iktidarın büyük ortağı Cumhuriyetçi Türk Partisi, pazar günü yapılacak milletvekilliği erken genel seçimleri propagandaları
      çerçevesinde son mitingini dün akşam düzenledi.  CTP Genel Başkanı ve Başbakan Ferdi Sabit Soyer, Lefkoşa İnönü Meydanı'ndaki
      mitingde yaptığı konuşmada, meydanın yoğunluğuna vurgu yaparak ''Bu iş bitti'' dedi.  Ana muhalefet Ulusal Birlik Partisi
      (UBP) Genel Başkanı Derviş Eroğlu'nu eleştiren Soyer, 2003 genel seçimleri ile 2005'deki cumhurbaşkanlığı seçimlerine
      değinerek, Eroğlu'nun başbakanlık ve cumhurbaşkanlığı hayallerinin kısa sürdüğünü kaydetti.  ''Statükocuların hayallerinin
      nisan yağmuru gibi kısa sürdüğünü'' ifade eden Soyer, ''Çünkü, ilerlemek isteyen bu halkı kimse durduramaz. Çünkü geri
      vitesi çıkardık, hep ileri'' dedi.  Soyer, ''barış, çözüm, demokrasi, ekonomik gelişme, sevgi ve aşk için CTP'nin 'yeşil
      yolunda' ilerleyeceklerini'' söyledi.
