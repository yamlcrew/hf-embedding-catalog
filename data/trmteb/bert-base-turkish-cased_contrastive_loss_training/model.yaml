      EURO 2016'da Almanya formasıyla gol attı, takımda kalacak mı?" sorusu üzerine Fikret Orman, "Türkiye'de de çok gol attı.
      Sadece Almanya'da atmadı. Onunla ay sonuna veya önümüzdeki ay başında görüşeceğiz. Hayırlısı bakalım. Beşiktaş bize
      göre dünyanın en önemli kulüplerinden biridir. Kimler geldi, kimler geçti. Mario Gomez'i takımımızda istiyoruz ama bu
      karşılıklı istekle alakalı. Beşiktaş Kulübü ciddi bir kurumdur. Hiçbir konuda araç olmaz ancak amaç olur. Defans blokunda
      sakatlıklar yaşadık. Devre arası ayrılan oyuncularımız oldu. Çok önde oynadığımız için de biraz açıklar veriyoruz. Bir
      iki bölgeye yatırım yapacağız. Çok fazla bir şey yapmayacağız." ifadelerini kullandı. Siyah-beyazlı kulübün başkanı,
      "Beşiktaşlı oyuncular İsmail Köybaşı ve Quaresma'nın performansını nasıl buluyorsunuz? sorusuna, "Bunlar özel oyuncular.
      İsmail Köybaşı'nın kontratını yenileme sürecindeyiz. Bazıları mesaj atıyor, 'yok yenilemeyin' diye. Şimdi İsmail güzel
      oynayınca, 'aman kaçırmayın' diyorlar. Transferde doğru bildiğimiz şekilde hareket ediyoruz. Taraftarlarımızın istekleri
