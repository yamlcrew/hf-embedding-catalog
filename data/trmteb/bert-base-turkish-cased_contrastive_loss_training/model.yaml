      olarak tamamlamanın 4 yıllık bir çalışmanın sonucu olduğunu söyledi. Sezonun rüya gibi geçtiğini ifade eden Orman, "Bizim
      işimiz Beşiktaşlıları mutlu etmek. Bu bizim arzumuz. Bütün Beşiktaşlılar ile bir araya gelmeye çalışıyoruz. Beşiktaş
      takımı bu yıl hepimizi mutlu etti. Bu yıl işimiz zor aslında. Stadımız her ne kadar bittiyse de beklentilerimiz fazla.
      Hiç merak etmeyin. Bugüne kadar bu işi planlayarak yaptık. Bundan sonra da planlayarak gideceğiz. Kimsenin lafı ile
