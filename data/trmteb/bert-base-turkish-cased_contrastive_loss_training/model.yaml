- source_sentence: İstanbul'un Kartal, Maltepe, Kadıköy ve Çekmeköy ilçelerinin bazı mahallelerinde 11-12 Ocak'ta elektrik
    kesintisi yapılacak.
  sentences:
  - 'Türkiye Çevre Eğitim Vakfı Yönetim Kurulu Başkanı Rıza Epikmen, 2011 yılında Türkiye genelinde 354 tane mavi bayrak dalgalandığını
    belirterek, ''''Mavi bayrak sayısında elde ettiğimiz verilerle önümüzdeki yılda yüzde 10 ile 12 civarında bir artış bekliyoruz''''
    dedi.  TÜRÇEV Bodrum ofisi, Bitez beldesinde düzenlenen törenle açıldı. TÜRÇEV Başkanı Rıza Epikmen, törende gazetecilere
    yaptığı açıklamada, Türkiye''de mavi bayrak ve eko okullar programını yönettiklerini söyledi. Amaçlarının Türkiye''deki
    mavi bayrak sayısını artırmak olduğunu ifade eden Epikmen, şunları söyledi: ''''Var olan mavi bayraklarımızdaki hizmet
    kalitesini arttırmak ve dolayısıyla da tesislerimize en yakın en efektif şekilde müdahale edebileceğimiz konumda yer almak
    istiyoruz. Geçtiğimiz senelerde Antalya ofisimizi açtık faaliyete girdi. Bu yıl Bodrum ofisimiz faaliyette ve bu yıl sonuna
    doğru da aktif bir şekilde İzmir ofisimiz devreye girecek. 2011 yılında Türkiye genelinde 354 tane mavi bayrağımız dalgalandı.
    Bunlardan 7 tanesi marinaydı, 12 tane teknemizde mavi bayrağımız dalgalanıyor, geri kalan tesislerimiz plaj ve turistik
    tesis. Mavi bayrak sayısında elde ettiğimiz verilerle önümüzdeki yılda yüzde 10 ile 12 civarında bir artış bekliyoruz.''''  Mavi
    bayrak sayısında şu anda dünya dördüncüsü olduklarını anlatan Epikmen, ''''Önümüzdeki yıl bir aksilik olmadığı taktirde
    dünya üçüncülüğüne yükselmeyi hedefliyoruz. Sadece mavi bayrağa sayı olarak bakmıyoruz, hizmet kalitesinde de tesislerimizde
    sürekli eğitim sağlayıp mavi bayrak kriterlerinin gelişmesi için çalışıyoruz'''' dedi.  Güney illeri dışında Karadeniz
    bölgesinde de mavi bayrağın olması ve dalgalanması için çalışmalar yaptıklarını belirten Epikmen, şöyle konuştu: ''''Buradaki
    en büyük eksiklik belediyelerimizdeki arıtma tesisi eksikliği. Dolayısıyla Kültür ve Turizm Bakanlığı, Sağlık Bakanlığı,
    Orman ve Su İşleri Bakanlığı ile birlikte projeler hazırlayıp bu belediyelerimizin de arıtma tesislerini bir an önce tamamlaması
    için yol gösteriyoruz, projelerine yardımcı oluyoruz. Ümit ediyorum ki Türkiye''nin dört bir yanında mavi bayrağımız dalgalanacak.''''
    Bodrum Kaymakamı Mehmet Gödekmerdan ise Bodrum''da mavi bayraklı plaj, tesis ve tekne sayısını artırmak istediklerini
    söyledi. Bodrum''un mavi bayrak konusunda şanslı bir ilçe olduğuna işaret eden Gödekmerdan, şunları kaydetti:''''41 tane
    mavi bayraklı plajımız var. 3 tane mavi bayraklı marinamız, 2 tane de mavi bayraklı teknemiz var. Dolayısıyla 46 tane
    mavi bayraklı birimimiz oluyor. Muğla ili de illerimiz arasında ikinci sırada. Birinci sırada Antalya ilimiz var. Temennimiz
    bütün plajlarımızın, koylarımızın teknelerimizin ve marinalarımızın mavi bayrak vasıflarına ulaşması ve alanlarında bu
    vasıflarını kaybetmeden devam ettirmesidir. İnşallah TÜRÇEV ile beraber belediyelerimiz ile beraber basınımızın da yardımlarıyla
    bu konuda Bodrum''a elimizden geldiği kadarıyla hizmet etmeye çalışacağız. Hedefimiz temiz çevre, temiz deniz, temiz marinalar
    ve temiz tekneler.'''''
  - İsrail askeri mahkemesi, tutuklu yargılanan "Hanzala Cesaret Ödülü" sahibi Filistinli Ahed et-Temimi'nin (16) duruşmasının
    11 Mart'a ertelenmesine karar verdi İşgal altındaki Batı Şeria'nın Ramallah kentinde bulunan Ofer Askeri Mahkemesi'nde
    görülen duruşmada, bir sonraki duruşmanın 11 Mart'a ertelenmesine karar verildi. Mahkemeye elleri kelepçeli şekilde getirilen
    Temimi'nin "zafer" işareti yaptığı görüldü. Bunun üzerine bir mahkeme görevlisinin Temimi'nin kelepçeli ellerini tuttuğu
    görüntülere yansıdı. Ahed'in annesi Neriman et-Temimi ise mahkeme salonunda gözyaşlarını tutmakta zorlandı. Duruşmanın
    başlangıcında görüntü almalarına izin verilen basın mensupları, daha sonra mahkeme salonundan çıkarıldı. İsrail askerleri,
    16 yaşındaki Ahed et-Temimi'yi, 19 Aralık 2017'de Ramallah'ta ailesiyle yaşadığı eve düzenlediği baskınla gözaltına almıştı.
    Annesi Neriman'ın ise kızıyla ilgili bilgi almak üzere gittiği Ramallah'ın doğusundaki gözaltı biriminde İsrail askerleri
    tarafından gözaltına alındığı kaydedilmişti. "Filistinli cesur kız" olarak da bilinen Ahed, 2012'de ağabeyi gözaltına
    alındığında İsrail askerlerine karşı gösterdiği tavır nedeniyle İstanbul'da "Hanzala Cesaret Ödülü"ne layık görülmüştü.
  - Adana'da dün saat 18.30 sıralarında Cemalpaşa Mahallesi Atatürk Caddesi'nde bir tantuni lokantası gayet sakin, içeride
    müşteriler var. Aynı dakikalarda bir ilaç firmasında çalışan Nilgün Akyollar, işyerine ait 34 FV 7149 plakalı otomobille
    evine gitmek üzere yola çıktı. Kavşakta kırmızı ışıkta bekleyen Akyollar, yeşil ışığın yanmasının ardından hareket etti.
    Bu sırada otomobilin sağ tarafından 01 DB 027 plakalı otomobile çarptı. Çarpmanın etkisiyle paniğe kapılan sürücü Akyollar,
    yanlışlıkla fren yerine gaza bastı, durmak için de el frenini çekmeye çalıştı. Hızlanan otomobil, kaldırımdan çıkıp yol
    kenarındaki 10'dan fazla çalışan ve müşterinin bulunduğu tantuni satılan lokantaya girdi. Kapıyı ve camı kıran otomobil,
    masa, sandalye ve kasanın bulunduğu bölümü devirip duvara çarptıktan sonra durabildi. Lokantada çalışanlar panikle kaçmaya
    çalışırken, bir müşteri çarpmanın etkisiyle oturduğu sandalyeden düşerek ayağından, bir çalışan da hafif şekilde kolundan
    yaralandı. Sürücü Nilgün Akyollar olayın şokuyla uzun süre araçtan inemdi. Kaza yerinde inceleme yapan polis ekipleri,
    şaşkınlıklarını gizleyemedi. Polisler 30 santimetre yükseklikten otomobilin çıkıp işyerine girmesinin çok zor olduğunu
    belirtirken, görgü tanıkları yaşananları anlattı. Bir görgü tanığı "İnanılmaz bir kaza. Kazayı gören herkes şaşırdı, şaşırılmayacak
    bir olay değil. Araç ani hareketle işyerine girdi. Bu caddede hızı 80-90 da olsa, buradan direksiyonu kırıp, kaldırıma
    çıkarak içeri girmesi fizik kurallarına aykırı bir olay ki o kadar hız asla yapılamaz" dedi.  Kaza anı işyerindeki 2 güvenlik
    kamerası tarafından saniye saniye kaydedildi.
- source_sentence: Manisa'nın Alaşehir ilçesinde bir hurdacı tarafından cinsel istismara maruz kaldıktan sonra boğularak öldürülen
    4 yaşındaki Irmak Kupal'ın babası, eşi ve 10 yaşındaki kızını bıçaklayarak öldürdükten sonra intihar girişiminde bulundu.
  sentences:
  - 'FETÖ 15 Temmuz darbe girişimi sırasında Genelkurmay Karargahı''nda yaşanan eylemlere ilişkin, aralarında sözde Yurtta
    Sulh Konseyi üyelerinin de yer aldığı 221 sanığın yargılandığı davanın 15''inci celsesi görüldü. Ankara 17. Ağır Ceza
    Mahkemesince, Sincan Ceza İnfaz Kurumları Kampüsü''ndeki salonda görülen duruşmaya tutuklu ve tutuksuz sanıklar, müştekiler
    ve tarafların avukatları katıldı. Davanın 15''inci celsesi, eski Genelkurmay İstihbarat Başkanlığı 1. İstihbarat Analiz
    ve Değerlendirme Daire Başkanı Tuğamiral Sinan Sürer savunma yaptı. Darbe girişiminde vatandaşlara darbeci askerlerle
    ateş ettiği kameralara yansıyan Sürer''in savunma yaptığı sırada, Genelkurmay Karargahı''nda vurulan sivillerden birinin
    annesi fenalık geçirdi. Şehit yakını, sağlık ekiplerinin müdahalesi için duruşma salonundan çıkarıldığı sırada "Oğlumun
    katili burada, karşımda" diyerek tepki gösterdi. Atatürkçü ve çağdaş yaşam tarzına sahip olduğunu, FETÖ ile ilgisi bulunmadığını
    iddia eden sanık Sürer, yıllık izinde olmasına rağmen neden Genelkurmay Karargahı''na gittiğine ilişkin açıklama yapmak
    istediğini belirtti. Darbe girişimi olduğu gün, İstanbul''daki üniversiteye kayıt yaptırmak için yola çıktığını, Bolu''ya
    geldiğinde evrakını unuttuğunu fark ederek dönmek zorunda kaldığını öne süren Sürer, yoldayken emir astsubayının kendisini
    arayarak Genelkurmay Başkanlığı Karargahı''nda karışık bir durumun söz konusu olduğunu söylediğini anlattı. Bunun üzerine
    karargaha gittiğini dile getiren Sürer, bu sırada kendisini arayan Albay Alper Esat''ın "Bir kalkışma ve terör saldırısı"
    olduğunu söylediğini, ne yapmaları gerektiği konusunda kendisinden yardım istediğini savundu. Sürer, "Sorumluluk bilinci
    çerçevesinde ben de ''Herkes kendi emniyetini alsın, karargaha kimse gelmesin, herkes zincir yapıp birbirini arasın.''
    dedim. Kalkışma deyince PKK''nın Türkiye''nin bir yerinde ayaklanma yaptığını düşündüm çünkü o dönemlerde öz yönetim konuşuluyordu"
    ifadelerini kullandı. Bu aşamadan sonra Genelkurmay Karargahı''nda vurulan sivillere ilişkin savunma yapacağını söyleyen
    Sürer, ateş açtığı anın görüntülerini ulusal kanaldaki haber programında izlediğini, bunların gerçekleri yansıtmadığını
    iddia etti. Bunun üzerine Mahkeme Başkanı Oğuz Dik, sanığa sivillere ateş açtığı sırada güvenlik kameralarına yansıyan
    görüntülerden elde edilen fotoğrafları gösterdi. Komuta katına geldiğinde Özel Kuvvetler Komutanlığı (ÖKK) personelinin
    çeşitli tedbirler aldığını gördüğünü anlatan Sürer, dışarıdan çatışma seslerinin geldiğini ifade etti. Kurşunlara hedef
    olmamak için komuta katındaki odasına gitmek amacıyla koridora çıktığında 7 ya da 8 kişilik sivil grupla karşılaştığını
    belirten Sürer, şöyle devam etti: "Çatışmaların durduğuna kanaat getirince çantamda bulundurduğum ve o zamana kadar çıkarmadığım
    tabancamı da yanıma alarak odama doğru gittim. Personelin konsantrasyonu tamamen sivillere yönelikti, girişleri ve odaları
    kontrol altına almaya çalışıyorlardı. Genel sekreterlik koridoruna geldiğimde iki ÖKK personelinin koridoru, ikisinin
    de merdiveni tuttuğuna şahit oldum. Koridorda sivil hareketlilik ve panik vardı. Ne olduğuna baktım, orayı terk etmişlerdi,
    vurulanı görmedim. Kesinlikle ateş etmedim. Tamamen korunma refleksi ile silahımı tuttum. Bu hengamede ''Gidin buradan''
    diye bağırdığımı hatırlıyorum. Tekme atmam da söz konusu değildir. Refleks gereği caydırma maksadıyla vurmuş olabilirim.
    Yaralı birine, kaldı ki böyle biri de yoktu, böyle bir muamelede bulunmam karakterime sığmaz. O gecenin hiçbir anında
    silah kullanmadım, elimde silahın olması, ateş ettim manasına gelmez. Her türlü incelemenin yapılması durumunda vurulan
    şahıslara isabet eden mermilerin benim silahıma ait olmadığı gerçeği ortaya çıkacaktır. Eğer ateş ettiğime dair görüntüleri
    getirirseniz hem üzerime atılı bütün suçları kabul ederim hem de kafama sıkarım. Bu kadar da eminim kendimden." Sivillerin
    karargahtan hızlı bir şekilde ayrılmaya çalıştıklarını anlatan Sürer, "Sivil şahısların arkası bize dönüktü. Ateş edilmiş
    olsalar bile sırtlarından vurulmaları söz konusu olacaktır. Şehit Resul Kaptancı ve şehit Mesut Acun''un göğüslerinden
    vuruldukları tespit edilmiştir. Yani kendilerine ateş edildiğinde yüzleri silahlara dönüktür" diye konuştu. Sürer, örgütün
    şifreli haberleşme programı ByLock kullanıcısı olduğuna dair iddianamede yer alan bilgileri kabul etmedi. Sürer, "Ne bilgisayarıma
    ne de cep telefonlarıma bu programı yüklemedim. Google Store''den indirilebilen bir programı ne şekilde cihazıma yüklediğim
    ve kimlerle görüştüğümün ortaya konulmasını talep ediyorum" ifadelerini kullandı. Darbe toplantılarına katıldığına ilişkin
    gizli tanık Kuzgun''un ifadelerinin gerçek olmadığını, söz konusu tanık ile aralarında husumet bulunduğunu iddia eden
    Sürer, diğer gizli tanık Şapka''nın ise kendisini teşhis edemediğini savundu. Harp Okulundan tanıdığı Kuzgun''un devre
    arkadaşı olduğunu dile getiren Sürer, "Söz konusu amiral, darbe toplantılarına katıldığını ve FETÖ''cü olduğunu söylüyor.
    Bu amiralin Yurtta Sulh Konseyi üyesi olması gerekmez mi? Kuzgun''a haksızlık yapılmasın, ben yerimi ona vermeye hazırım"
    diye konuştu. Sürer, darbe toplantılarına katıldığı tespit edilen firari Adil Öksüz''ü tanımadığını ve adını basından
    duyduğunu öne sürdü. Darbe girişimi gecesi "Ataşeler" adlı WhatsApp grubuna mesaj çektiğini kabul eden Sürer, söz konusu
    yazışmayı sanık eski Tuğgeneral Mehmet Partigöç''ün tehdidiyle yaptığını iddia etti. Yurtdışındaki görevli ataşelerle
    hızlı iletişim kurmak için 2015''te söz konusu yazışma grubunun kurulduğunu bildiren Sürer, iddianamedeki yeni bir grup
    kurduğu iddiasını ise reddetti. "Partigöç malum mesajın çekilmesini ''Genelkurmay Başkanının kesin emri var.'' diyerek
    talep ettiğinde itiraz ettim. Partigöç''e ''Zaten bildiriyi web sitesine koymuşsunuz, bu hukuksuz bildiriyi neden yayınlıyorsunuz?
    Bu hukuksuz işe bizi neden karıştırıyorsunuz? Zaten Türkiye''deki yabancı ataşeler bildiriyi görmüştür ve kendi makamlarına
    ulaştırmıştır.'' diye itirazda bulundum. Ancak bana cevaben ''Genelkurmay Başkanının emrine karşı mı geliyorsun?'' dedi.
    Yanındaki özel kuvvetler personeli de bana silah doğrulttu. Bunun üzerine mesajı atmak zorunda kaldım. Son bir yıldır
    kullanılan gruptan ''TSK yönetime el koymuştur, TSK sitesindeki bildiriyi görevli olduğunuz yerdeki muhataplarınıza bildiriniz.''
    diye mesajı gönderdim." Mesajı ilerleyen saatlerde sildiğine dikkati çeken Sürer, sanıklar Partigöç, Orhan Yıkılkan ve
    Ramazan Güzel ile karargahı yönetmek ve Akıncı Üssü ile irtibat sağladıkları iddiasını da kabul etmedi. Savunmasının ardından
    çapraz sorgusuna geçilen sanık Sürer''e, Mahkeme Başkanı Dik, dava dosyasının delilleri arasında yer alan çok sayıda fotoğraf
    gösterdi. Güvenlik kameralarına yansıyan görüntülerden elde edilen bu fotoğraflardaki kişinin kendisi olduğunu kabul eden
    Sürer, Dik''in "Silah kullandın mı?" sorusuna, "Koruma amaçlı elimi kaldırmadım, hedef gözetmedim" iddiasında bulundu.
    Sanığa, silahlı halini belgeleyen fotoğraflarını bir kez daha gösteren Başkan Dik, Sürer''e "Bu hedef gözetme değil mi?
    ÖKK personeli var, sen neden silah çektin?" diye sordu. Kendisince güvenlik önlemleri aldığını ifade eden Sürer, emir
    astsubayından tabanca aldığı anı gösteren fotoğraflardaki silahın ise cep telefonu olduğunu savundu. Bunun üzerine Başkan
    Dik, fotoğrafı yeniden inceledikten sonra sanığın telefon olarak iddia ettiği cismin bariz şekilde silah olduğunu söyleyerek,
    bu yöndeki sorularını yeniledi. Mahkeme Başkanı Dik''in "Yanınızdaki astsubaydan silah alıyorsunuz, görüntülerde anlaşılıyor."
    demesi üzerine Sürer, silah almadığını, şarjör verdiğini öne sürdü. Dik bunun üzerine, "Önünde silahsız sivil şahıs var,
    yerde yatıyor. Burada sen ne yapıyorsun? Adamın elinde silah da yok yaralanmış." sorusunu yöneltti. Sürer, "Ben onu görmedim.
    Kaos ortamı vardı. Bu görüntüyü ilk kez görüyorum. Elimdeki silah değil, cep telefonudur." dedi. Dik''in "Bu silah" uyarısı
    üzerine ise Sürer, "Olabilir. Cep telefonuna benzetmiş olabilirim. İkisi de aynı renkte. Tamam tabanca, ilk etapta telefon
    gibi geldi." şeklinde konuştu. Sürer, odasındaki aramalarda ele geçirilen 2 tabancadan birini kendisinin, diğerinin ise
    darbe girişimi sırasında odasına gelen Recep Özkan''ın olduğunu savundu. Bu savunma karşısında Başkan Dik, Özkan''ın adına
    ruhsatlı tabanca bulunmadığını söyledi. Duruşma savcısı Aytekin Cenikli de "Silahınızı emniyete almasın için emir astsubayına
    veriyorsunuz, siz emniyet almayı bilmiyor musunuz?" sorusu üzerine Sürer, "Ben silahlara aşina değilim." karşılığını verdi.
    Cenikli''nin, "Nasıl bir subaysınız?" sözleri üzerine, "Ben silahlara çok aşina değilim, emir astsubayı bunun kursunu
    alıyor." değerlendirmesinde bulundu. Savcı Cenikli, sanık avukatının savunma sırasında halkın darbeyi önlemek için Genelkurmay
    Karargahı''nda bulunmasını "suçmu��" gibi yansıttığını dile getirerek, "Halkımız, demokrasi için gereğini yapmıştır. Bundan
    sonra milletimizin yapacakları açısında bu girişimin önemli olduğunu düşünüyorum." dedi. Sanık eski Tuğgeneral Mehmet
    Partigöç de sanığı tehdit etmediğini belirtti. Partigöç, "Anlaşılan o ki benim üzerimden çok defter kapatmaya çalıştı.
    Sanık 23.32''de karargaha giriyor. İddiasına göre 23.40''ta benim tehdit etmemle ataşelere mesajı çekiyor. Binaya girmesi
    zaten birkaç dakika sürer. Kalıyor, bir-iki dakika. Peki ben hangi ara kendisini tehdit etmişim?" şeklinde konuştu. Sürer
    ise bu sorunun cevabını savunması sırasında verdiğini söyledi.  Örgütün haberleşme programı ByLock''u kullandığı da belirlenen
    Sürer''in, Konutkent''teki villada Adil Öksüz liderliğinde gerçekleştirilen darbe planlaması toplantılarına katıldığı
    da iddianamede yer alıyor. İddianamede, Sürer''in daire başkanı olarak amiri konumunda bulunduğu yurt dışındaki askeri
    ataşelere, "Ataşeler" WhatsApp grubu üzerinden "Arkadaşlar, TSK yönetime el koymuştur. Bunu tüm muhataplarınıza derhal
    iletin" şeklinde talimat verdiği, ataşelerin büyük çoğunluğunun da mesajı "Emredersiniz" şeklinde cevapladığı
    tespitine yer veriliyor. Duruşmada ayrıca, eski Kara Havacılık Kurmay Başkanı Albay Mehmet Şahin''in savunma yapması bekleniyor.
    İddianamede, sanık eski Albay Şahin''in, 15 Temmuz gecesi darbecilerin önemli güçlerinden olan Hava Kuvvetlerinin darbe
    planı içindeki organizasyonunu, sevk ve idaresini yapan ekipte bulunduğu kaydediliyor. Şahin''in, darbe girişimi sırasında
    hava harekatının merkezi Akıncı 4. Ana Jet Üssü Komutanlığında, darbe girişimine katılan uçak ve pilotları ￼￼￼yönlendirerek
    darbe girişimine aktif katıldığı belirtiliyor. Bir itirafçının beyanında, Şahin''in darbenin başarılı olması için "Gerekirse
    Hava Kuvvetleri bu ülkeyi yerle bir eder" dediği aktarılıyor. Sürer''in yanı sıra savunma yapması beklenen Şahin''in de
    darbe girişimini planlayan ve organizasyonunu gerçekleştiren sözde Yurtta Sulh Konseyi üyeleri arasında yer aldığı bildiriliyor.'
