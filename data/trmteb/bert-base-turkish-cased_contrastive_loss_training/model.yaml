  - Mısır'da Anayasa Mahkemesi'nin ülke tarihinin ilk demokratik meclisini feshetmesi ve devrik rejimin son Başbakanı Ahmed
    Şefik'e adaylık izni vermesinin yankıları devam ederken, Mısır siyasetini derinden etkileyecek iki dava önümüzdeki hafta
    karara bağlanacak. Mısır İdare Mahkemesi'nin göreceği ilk dosyada, Başbakan Kemal Genzuri'ye karşı açılan dava karara
    bağlanacak. Avukat Şahate Muhammed tarafından açılan davada, ''Müslüman Kardeşler Cemaati'' isminin kullanılmasının yasaklanması
    ve cemaatin bütün faaliyetleri ile mal varlığının dondurulması talep ediliyor. Dava kapsamında cemaatin başkent Kahire
    ve diğer şehirlerdeki merkezlerinin de kapatılması istenirken, bu taleplere gerekçe olarak, cemaatin ''sivil toplum örgütlerinin
    tabi olduğu yasaların dışında ve izinsiz faaliyet yürütmesi'' gösterildi. Bu çerçevede cemaatin bünyesinden çıkan Hürriyet
    ve Adalet Partisi'nin (HAP) genel seçimde parlamentodaki koltukların çoğunu kazanmasının da, şüpheleri arttırdığı kaydedildi.
    Mahkeme aynı zamanda, Anayasa Mahkemesi'nin son kararıyla feshedilen meclisteki milletvekili Hamdi Fehrani tarafından
    açılan davayı da karara bağlayacak. Mısır'da yönetimi elinde bulunduran Yüksek Askeri Konsey'in Başkanı Mareşal Hüseyin
    Tantavi ve Başbakan'a karşı açılan davada, yine Müslüman Kardeşler cemaatinin merkezlerinin kapatılarak faaliyetlerinin
    yasaklanması isteniyor. Dava dosyasında, cemaatin Kahire'deki merkezinin, Avrupa Birliği, ABD ve Dünya Bankası'ndan üst
    düzey yetkiler tarafından ziyaret edildiği ve cemaatin Rehberlik Konseyi Başkanı'nın, bu toplantılarda Mısır adına açıklamalar
    yaptığı kaydedildi. Ülkede cumhurbaşkanlığı seçimi, iki önemli din adamı arasında da şiddetli tartışmaya yol açtı. Cumhurbaşkanlığı
    seçiminde tarafsız ve her adaya eşit mesafede olduğunu ilan ederek tartışmalara yol açan Mısır Müftüsü Ali Cuma, ''seçimde
    tarafsız kalmak haramdır'' diyen Müslüman Alimler Birliği Başkanı Şeyh Yusuf el-Karadavi'ye sert eleştiriler yöneltti.
    Cuma, seçimde tarafsız kalmasının gerekçelerini açıklayarak, dinin siyasetle ilgisinin olamayacağını vurguladı. Siyasi
    kurumların zaman ve mekanla değişeceğini belirten Cuma, dini siyasi bir partiyle ilişkilendirmenin dine karşı yapılmış
    bir kötülük ve ihanet olacağını belirtti. AA
