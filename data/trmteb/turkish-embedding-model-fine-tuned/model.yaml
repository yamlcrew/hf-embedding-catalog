widgetData:
- source_sentence: CIA, filmi indirdi ve filmi ertesi gün Birleşmiş Milletlere götürdü.
  sentences:
  - Bir açıklama yapmalısın! Wolverstone'a ne oldu?
  - CIA, BM’nin filmi hemen görmesi gerektiğini düşünüyordu.
  - Benim yolum en zor yoldur.
- source_sentence: Port Royal'de bu serseriyi bekleyen bir idam sehpası var. Kanlı Korsan buna müdahale ederdi ama Lord Julian
    önce davranıp ona engel oldu.
  sentences:
  - Babamız bunların hayvan değil yaratık olduğunu söyledi.
  - Port Royal suçluları cezalandırmak için olanaklara sahiptir.
  - Geç Anneler Günü kahvaltısına bazı arkadaşlar sırayla ev sahipliği yapıyorlar.
- source_sentence: satın almak için hangi boyut Fitbit şarj
  sentences:
  - Texas A&M'den bir eğitim, yıldan yıla çok arzu edilen ve çok uygun fiyatlı olmaya devam ediyor. Texas A&M'e bir yıl boyunca
    katılmak için toplam ortalama katılım maliyeti yaklaşık 22,470 $ (devlet içi ikamet edenler için), eğitim ve harç, oda
    ve yönetim kurulu, kitaplar, ulaşım ve çeşitli masraflar içerir. Kolej İstasyonu'ndaki Texas A&M Üniversitesi'nde dönem
    başına 15 lisans kredi saatine dayanarak; bazı harç ve harçlar buraya yansıtılmamıştır.
  - İlk fitbitimi satın almak istiyorum ve şarj saatine karar verdim. Bununla birlikte, bileğimi ölçtükten sonra, 6,5 inçte
    geldi. Mevcut boyutları kontrol ettikten sonra küçük ve büyük arasındayım gibi görünüyor. Küçük 6,7'ye çıkar ve büyük
    6.3'ten başlar. Hangisinin daha iyi olacağından gerçekten emin değilim.
  - Atriyal Dalgalanma Nedenleri. Atriyal dalgalanma, kalbin anormalliklerinden veya hastalıklarından, vücudun başka bir yerinde
    kalbi etkileyen bir hastalıktan veya elektriksel dürtülerin kalp yoluyla bulaşma şeklini değiştiren maddelerin tüketilmesinden
    kaynaklanabilir. Bazı insanlarda, altta yatan hiçbir neden bulunmaz.
- source_sentence: '"Ben kimim" sorusuna nasıl cevap veririm?'
  sentences:
  - Notlarımı nasıl ezberleyebilirim?
  - Birinin en zor soru olan "ben kimim?" sorusuna nasıl cevap verebileceği nasıl açıklanabilir?
  - Donald Trump'ın 2016 seçimlerini kazanma ihtimali nedir?
- source_sentence: Stoklara nasıl yatırım yapabilirim?
  sentences:
  - '

    Bu soru yüklü ama denemek için elimden geleni yapacağım. Öncelikle, hisse senetlerine yatırım yapmadan önce hazır olup
    olmadığınızı belirlemeniz gerekir. Yüksek faizli borcunuz varsa, hisse senetlerine yatırım yapmadan önce onu ödemeniz
    daha iyi olacaktır. Hisse senetleri uzun vadede yaklaşık %8-10 getiri sağlar, bu nedenle %8-10''dan daha yüksek faizli
    herhangi bir borcunuzu ödemeniz daha iyi olur. Çoğu insan, 401k''larında veya Roth IRA''larında ortak fonlar aracılığıyla
    hisse senetlerine başlar. Bireysel hisse senetleri yerine ortak fonlara yatırım yapmak istiyorsanız, çok okumalı ve öğrenmelisiniz.
    Bir aracı hesap veya hisse senedi aklınızda varsa, doğrudan şirkete DRIP (temettü yeniden yatırma planı) aracılığıyla
    yatırım yapabilirsiniz. Farklı aracı kurumları karşılaştırarak size en uygun olanı belirlemeniz gerekir. İnternet bilgisine
    sahip olduğunuzu göz önünde bulundurarak, daha düşük komisyonlar sunan bir indirimli aracı kurum kullanmanızı öneririm.
    İyi bir kılavuz, yatırım yaptığınız tutarın %1''inden daha az komisyon ödemektir. Çevrimiçi aracı hesabınızı açıp içine
    para yatırdıktan sonra, hisse senedi satın alma işlemi oldukça basittir. Satın almak istediğiniz hisse senedi miktarı
    için bir emir verin. Bu, mevcut piyasa fiyatında bir satın alma anlamına gelen bir piyasa emri olabilir. Veya fiyatı kontrol
    edebileceğiniz bir sınır emri kullanabilirsiniz. Yeni başlayanlar için birçok iyi kitap vardır. Kişisel olarak, Motley
    Fool''dan öğrendim. Ve son olarak, eğlenin. Öğrendiğiniz kadarını öğrenin ve kulübünüzün tadını çıkarın.'
  - '"En iyi çözüm, arabayı satın almak ve kendi kredinizi almak (ChrisInEdmonton''un yanıtladığı gibi). Buna rağmen, kredi
    birliğim, bir başkasını başlığa eklerken hala bir kredim olduğunda bir başlık kayıt ücreti için izin verdi.  Başlık sahibi
    olan bankaya, bir başkasını başlığa eklemek için bir hüküm olup olmadığını sorabilirsiniz.  Benim için toplam maliyet,
    bankada bir öğleden sonra ve yaklaşık 20 veya 40 dolar (bir süredir) oldu."'
  - 'Öncelikle varsayımınız doğru: Büyük bir miktar YetAnotherCryptoCoin''i ICO''sundan kısa bir süre sonra nasıl nakde çevirebilirsiniz?
    Kripto borsaları yeni bir para birimini eklemek için biraz zaman alır, hatta hiç eklemeyebilirler. Ve hatta eklediklerinde,
    işlem hacmi genellikle düşüktür. Sanırım bu, yatırımcılar için gerçekten çekici olmayan şeydir (teknoloji tutkunlarından
    ayrı olarak), yüksek volatilite dışında. Güvenilir bir işlem yeteneği tamamen eksikliği.'
