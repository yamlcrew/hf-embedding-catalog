widgetData:
- source_sentence: What integer value is assigned to the global constant SDS_SecondaryType in JADE?
  sentences:
  - '#### drawWidth


    **Type:** - Integer


    **Availability:** - Read or write at run time only


    The **drawWidth **property of the [Window](../window_class/window_class.htm) class contains the line width for output
    from graphics methods on a form or control.


    Set the **drawWidth** property to a value in the range **1** through **32,767**.  This value represents the width of the
    line in pixels.  The default value is **1** pixel wide.


    Increase the value of the **drawWidth** property to increase the width of the line.'
  - '#### JadeDynamicObjectTypes Category Global Constants


    The global constants listed in the following table define symbolic names for the values of the [JadeDynamicObject](../../encyclosys1/jadedynamicobject_class/jadedynamicobject_class.htm#jadedynamicobjectclass)
    class [type](../../encyclosys1/jadedynamicobject_class/type.htm#typejadedynamicobject) attribute of dynamic objects returned
    from [JadeDatabaseAdmin](../../encyclosys1/jadedatabaseadmin_class/jadedatabaseadmin_class.htm#jadedatabaseadminclass)
    class query methods.


    | Global Constant | Integer Value |

    | ---- | ---- |

    | SDS_PrimaryType | 1 |

    | SDS_SecondaryProxyType | 2 |

    | SDS_SecondaryType | 3 |

    | SDS_TransactionType | 4 |'
  - "#### sortOrder\n\n**Type:** - Integer\n\n**Availability:** - Read or write at run time only\n\nThe **sortOrder **property\
    \ of the [JadeTableColumn](jadetablecolumn_class.htm) class contains the precedence of the column referenced by this object\
    \ when sorting, in the range **1** through **3**, or it contains zero (**0**) to remove sorting on the current column.\n\
    \nFor a description of this property, see the [Table](../../encyclowin/control_class/table_class.htm#tableclass) control\
    \ [sortColumn](../../encyclowin/window__form__and_control_properties/sortcolumn.htm#sortcolumnwin) property.  See also\
    \ the [JadeTableColumn](jadetablecolumn_class.htm) class [sortAsc](sortasc.htm), [sortCased](sortcased.htm), and [sortType](sorttype.htm)\
    \ properties, which are dependent on the column already being recorded as a sort column by the **sortOrder** property.\n\
    \nThe code fragment in the following example shows the use of the **sortOrder** property.\n\n```\ntable1.accessColumn(2).sortOrder\
    \ := 1;   // first column in sort\r\ntable1.accessColumn(4).sortOrder := 2;   // second column\r\ntable1.accessColumn(5).sortOrder\
    \ := 3;   // third column\n```"
- source_sentence: How are values in the ByteArray referenced?
  sentences:
  - "#### findAllElementsByNameNS\n\n```\nfindAllElementsByNameNS(namespaceURI: String;\r\n                        localName:\
    \    String;\r\n                        elements:     JadeXMLElementArray input);\n```\nThe **findAllElementsByNameNS\
    \ **method of the [JadeXMLElement](jadexmlelement_class.htm) class fills the elements array with all descendant elements\
    \ that have the values specified in the **namespaceURI** and **localName** parameters, respectively.\n\nAs the search\
    \ uses the collection sequence, the elements may not be in the document sequence.\n\nIf you want to match all namespaces\
    \ or local names, specify an asterisk character (**'*'**) in the **namespaceURI** or **localName** parameter.  Note, however,\
    \ that if you specify **\"*\"** in the **localName** parameter, the access method uses the document sequence to locate\
    \ the requested elements rather than the collection sequence that optimizes performance."
  - '## ByteArray Class


    The **ByteArray** class is an ordered collection of [Byte](../../encycloprim/byte_type/byte_type.htm#byte) values in which
    the values are referenced by their position in the collection.


    Byte arrays inherit the methods defined in the [Array](../array_class/array_class.htm) class.


    The bracket (**[ ]**) subscript operators enable you to assign values to and receive values from a **Byte** array.


    For details about the methods defined in the **ByteArray** class, see "[ByteArray Methods](bytearray_methods.htm)", in
    the following section.


    [Array](../array_class/array_class.htm)


    (None)'
  - '#### Exposing Properties for a Selected Class


    To expose all properties for a selected class


    - Right‑click on the class row in the **Classes** table and then select the **Expose Properties for Selected Class** command
    from the popup menu that is displayed.


    This command does _not_ automatically add methods or constants to the C# exposure, even if the **Show Methods** or **Show
    Constants** option is checked.  (For details, see "[Toggling the Display of Methods](toggling_the_display_of_methods.htm)"
    or "[Toggling the Display Constants](toggling_the_display_of_constants.htm)", later in this chapter.)


    All properties in that class are then exposed for inclusion in the C# exposure; that is, each property check box in the
    **Features** pane is checked, indicating that the properties for that class will be generated in the C# class library.


    You can tailor the property selection by unchecking the check box of any property that you want to exclude from the exposure.'
- source_sentence: How can you resolve opening database error 14544 in single user mode?
  sentences:
  - "#### Changing Lock Type\n\nA type upgrade can queue and potentially time out, causing a [JoobObjectLockedException](joobobjectlockedexception.htm)\
    \ to be thrown, if the requested type is not compatible with existing locks. For example, this could happen when upgrading\
    \ a shared lock to exclusive.\n\nLock type downgrades will never be queued, as the strength is being lowered so there\
    \ will be no lock incompatibilities.\n\nWhen a Jade session is in transaction state, requests to downgrade lock type are\
    \ ignored. The lock maintains its current type. However, lock types can be upgraded regardless of transaction state.\n\
    \nWhen a lock type is being upgraded from shared to update, the object is unlocked before the update lock is requested.\
    \ This happens even if the Jade session is in transaction state, and is the only situation where an object is unlocked\
    \ while in transaction state. The reason for doing this is to prevent potential deadlocks, as discussed in more detail\
    \ under \"[Avoiding Deadlock Exceptions](avoiding_deadlock_exceptions.htm)\", later in this chapter.\n\nThe following\
    \ code fragment gives examples of upgrading and downgrading lock types.\n\n```\nTimeSpan timeOut = TimeSpan.FromSeconds(10);\r\
    \ncontext.Lock(obj1, LockType.Shared, LockDuration.Transaction, timeOut);\r\ncontext.Lock(obj1, LockType.Reserve, LockDuration.Transaction,\
    \ timeOut);\r\n                                // The lock is now upgraded from shared to reserve.\r\ncontext.Lock(coll,\
    \ LockType.Exclusive, LockDuration.Transaction, timeOut);\r\n                   \r\nusing (System.Data.IDbTransaction\
    \ tran = context.BeginTransaction())\r\n{\r\n    context.Lock(obj1, LockType.Exclusive, LockDuration.Transaction,\r\n\
    \                       timeOut); // The lock type is upgraded to exclusive, as\r\n                                 //\
    \ locks can be upgraded (but not downgraded)\r\n                                 // when in transaction state.\r\n   \
    \ foreach (C1 obj2 in coll)\r\n    {\r\n        // The exclusive lock on coll is not downgraded by the implicit shared\r\
    \n        // lock associated with foreach, because transaction state is in effect.\r\n    }\r\n    context.Lock(obj1,\
    \ LockType.Shared, LockDuration.Transaction, timeOut);\r\n                      // The lock type is not downgraded, but\
    \ remains as exclusive.\r\n    tran.Commit();    // All transaction duration locks are released.\r\n}\n```"
  - '### 1411 - Attempt to add unknown system file


    Cause


    This error occurs if the system schema maintenance function attempts to add a new unknown system file.


    Action


    This is an internal error.  If your Jade licenses include support, contact your local Jade support center or Jade Support.'
  - '### 14544 - A concurrent process has already opened the same database


    Cause


    This error occurs if you attempt to open a database that is already open in single user (exclusive) mode.


    Action


    Determine in which mode the database should be opened; that is, single user or multiuser mode.'
- source_sentence: What is the cause of the 3323 DbCrypt error?
  sentences:
  - '### 3323 - DbCrypt memory allocation failure


    Cause


    This error occurs if a memory allocation error occurs in the use of the database encryption module.


    Action


    If your Jade licenses include support, contact your local Jade support center or Jade Support.'
  - '### 3028 - Database file is in use by another process


    Cause


    This error occurs if you attempt to open a database file that is already open by another process.


    Action


    Refer to the Jade messages log file (**jommsg.log**) for information about the file.  Generally, another program is accessing
    the file or the database as a whole.'
  - '### Where Do Jade Methods Execute?


    Jade methods execute only in Jade nodes. A Jade node is the fundamental building block of Jade''s distributed architecture.
    Each node contains the Jade Object Manager (JOM), the Jade Interpreter, various caches, and one or more Jade processes.


    The Jade thin client is _not_ a Jade node; Jade methods do not execute there, although a great deal of effort has been
    expended to make it look as though they do.


    In most production systems, there is one database server node (**jadrap.exe**, **jadrapb.exe**, or **jadserv.exe**), one
    or more application server nodes (**jadapp.exe** or **jadappb.exe**), and one or more fat/standard client nodes (**jade.exe**)
    for background processing, web services, or HTML forms.


    When **jade.exe** is run in single user mode, there is one node only.'
- source_sentence: Which subclasses are associated with the JadeXMLCharacterData class?
  sentences:
  - '## JadeXMLCharacterData Class


    The **JadeXMLCharacterData** class is the abstract superclass of character-based nodes in an XML document tree; that is,
    the text, **CDATA**, and comment nodes.


    For details about the property defined in the **JadeXMLCharacterData** class, see "[JadeXMLCharacterData Property](jadexmlcharacterdata_property.htm)",
    in the following section.


    [JadeXMLNode](../jadexmlnode_class/jadexmlnode_class.htm)


    [JadeXMLCDATA](../jadexmlcdata_class/jadexmlcdata_class.htm), [JadeXMLComment](../jadexmlcomment_class/jadexmlcomment_class.htm),
    [JadeXMLText](../jadexmltext_class/jadexmltext_class.htm)'
  - "### Minimizing the Working Set\n\nIn loops where there are multiple filters, apply the cheapest filters first and then\
    \ the filters that reduce the working set the most. For example, consider the following code fragment, which finds sales\
    \ of appliances in a specified city.\n\n```\nwhile iter.next(tran) do\r\n    if  tran.type = Type_Sale\r\n    and tran.myBranch.myLocation.city\
    \ = targetCity\r\n    and tran.myProduct.isAppliance then\r\n        <do something with tran>\r\n    endif;\r\nendwhile;\n\
    ```\nIn this example, **tran.type** should be checked first, because it is the cheapest. The **tran** object must be fetched\
    \ to evaluate all of the other conditions, so we may as well check the **type** attribute first. If we did the **isAppliance**\
    \ check first, we would have to fetch all of the product objects for the transactions that were not sales. Regardless\
    \ of how many transactions are sales and how many products are appliances, it will save time to check **tran.type** first.\n\
    \nNow, assume that:\n\n- 80 percent of transactions are sales\n\n- 15 percent, on average, are likely to be in the target\
    \ city\n\n- 90 percent of the products are appliances\n\nIt pays to check the city first, even though it means fetching\
    \ the branch and location objects for the non‑appliance products. There are very few non‑appliance products, so the number\
    \ of extra fetches is small. By contrast, checking for non‑appliance products for all other cities would result in a large\
    \ number of extra fetches.\n\nIt doesn't matter if the filters are conditions of an [if](../../devref/ch1languageref/if_instruction.htm#if)\
    \ instruction, multiple [if](../../devref/ch1languageref/if_instruction.htm#if) instructions, or multiple conditions in\
    \ the [where](../../devref/ch1languageref/where_clause_optimization.htm#whereoptimization) clause of a [while](../../devref/ch1languageref/while_instruction.htm#while)\
    \ statement; the end result is the same.\n\nThis code fragment example is simple and concise, to convey the concept. In\
    \ the real world, each successive filter may be in another method, another class, or even another schema. It may take\
    \ a bit of investigation to find all of the filters involved in a single loop."
  - '##### responseType


    Use the **responseType** parameter of the [beginNotification](beginnotification.htm) method to specify the frequency with
    which the subscribed event was notified.


    The valid values for the **responseType** parameter, represented by global constants in the [NotificationResponses](../../encycloprim/appaglobalconstants/notificationresponses_category.htm#notificationresponsescategory)
    category, are listed in the following table.


    | Global Constant | Integer Value | Sends a notification… |

    | ---- | ---- | ---- |

    | Response_Cancel | 1 | When the object receives a matching event and then cancels the notification |

    | Response_Continuous | 0 | Whenever the object receives a matching event |

    | Response_Suspend | 2 | When the object receives a matching event and then suspends notification until the user refreshes
    the local copy of the object |'
