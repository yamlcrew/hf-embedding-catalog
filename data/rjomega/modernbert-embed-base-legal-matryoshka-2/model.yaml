- source_sentence: "analyst is usually the only person to review documents for release, notwithstanding any requirement for\
    \ approval \nfrom superiors.  It would presumably minimize the risk of error (and the risk of releasing classified information)\
    \ by \nlimiting the number of people who handle releasable information, yet the State Department appears to do just the\
    \ \nopposite. \n154"
  sentences:
  - ¿Qué puede hacer la persona afectada según la Ley en esta situación?
  - What is minimized by limiting the number of people who handle releasable information?
  - What is a 'cost build-up' used for?
- source_sentence: "Counts Two and Three in No. 11-445: February 9, 2010 FOIA Requests  \n            to the CIA \nOn February\
    \ 4, 2010, the CIA informed the plaintiff that, with respect to his December 1, \n2009 FOIA request for FOIA processing\
    \ notes related to previous FOIA requests, the CIA could \nnot retrieve FOIA requests by an organization’s name, but only\
    \ by a person’s name.  See Third"
  sentences:
  - What kind of evidence is necessary for a reasonable juror to make a finding?
  - What are the counts mentioned in No. 11-445?
  - What case number is associated with Christopher Mooney v. State of Maryland?
- source_sentence: "by fee category—they do not speak to whether the CIA has chosen to create and retain the \n“database listings”\
    \ that the plaintiff seeks.  As to this latter issue, the principles outlined above \nregarding the creation of records\
    \ apply.  See supra Part III.D.2.  It is clear from the CIA’s \ndeclaration that the agency has not chosen to create and\
    \ retain such database listings, see First"
  sentences:
  - What does the State Department appear to do in contrast to minimizing the risk of error?
  - What has the CIA not chosen to create and retain?
  - Which exemptions are the agency allowed to use to justify withholding e-mail domain information?
- source_sentence: "functional test, too.  Id. at 89–90.  Still, the Court made clear that this functional test was “not \n\
    relevant.”  Id. at 90.  So, just as in Energy Research, its application of the functional test was \ndicta.  And because\
    \ this discussion relied on the dicta from Energy Research, this was dicta \nupon dicta. \n \n The Government is thus\
    \ imprecise when it asserts as the “law of the case” that the"
  sentences:
  - What page is the functional test mentioned as 'not relevant'?
  - What issue did the court address regarding the containers?
  - ¿Qué acción tomó el Tribunal en relación a la Sentencia apelada?
- source_sentence: "filed.  See id.  In light of this factual predicate, the CIA does not explain how requiring NSC to \n\
    file a new FOIA request would have resulted in no delay.  The CIA would have first needed to \nprocess the new request,\
    \ and although “the legwork for the request ha[d] [already] been \ncompleted,” Fifth Lutz Decl. ¶ 12, the CIA would have\
    \ admittedly had to assess NSC’s fee status"
  sentences:
  - What do the solicitations include for WOSB or SDVOSB offerors?
  - What request would result in delay according to the CIA?
  - Where can the transcript reference be found that discusses the mentor-protégé joint venture competition issue?
