widgetData:
- source_sentence: Benutzer benötigt einen eigenen Zugang als Gemeinde.
  sentences:
  - Userin erklärt wie Urlaubsberechnung erfolgt. Nicht speichern sondern Urlaub berechnen anklicken. RT werden separat geführt
  - Benutzer muss sich einmal an denjenigen wenden, der mit dem Hauptzugang der Gemeinde arbeitet.
  - "Benutzer sendet uns einmal einen Screenshot der aktuellen Daten im KitaPlaner.\r\nAn Entwickler weitergegeben.\r\nLaut\
    \ Entwickler sind die Daten alle im KitaPlaner angekommen. Die Archivkinder können noch einmal einzeln synchronisiert\
    \ werden, wenn nötig."
- source_sentence: Die  Kollegin hat keinen Zugriff auf die Eltern-App, wer kann dies aktivieren?
  sentences:
  - Nachdem die Browserdaten der letzten 4 Wochen gelöscht wurden hat der Login wieder funktioniert
  - Gebeten sich dazu an den Träger zu wenden
  - Im Abgleich Belegung und BE konnte man erkennen, dass der entsprechenden Platzstruktur zwei Kinder zu viel zugeordnet
    waren.
- source_sentence: "Hallo zusammen,\r\n \r\nwir haben im letzten Monat zusammen mit Digibox eine neue Funktion auf unserer\
    \ Homepage eingestellt\r\nzur Buchung von Schulungen und Infoveranstaltungen. Mittlerweile ist dort alles weitestgehend\
    \ getestet und funktioniert so wie gewünscht. Früher waren Termine per Überschrift getrennt, aber alle auf der gleichen\
    \ Seite. Der Aufwand neue Termine einzustellen\r\n oder bestehende zu bearbeiten war nicht klein. Zusätzlich mussten neue\
    \ Kategorien geschaffen werden für eine gesteigerte Nachfrage unserer Produkte. Von daher sollte diese Systematik umgestellt\
    \ werden, sodass man erst zwei Dropdown-Menüs auswählen muss, damit\r\n Termine angezeigt werden. Durch das Fachteam wurden\
    \ zusätzlich bei den Schulungen Dokumente zur Verfügung gestellt zu allen Formaten und Bundesländern, um für verbesserte\
    \ Transparenz zu sorgen. Hier sind die beiden Seiten zu finden:\r\n \r\nFür Schulungen: \r\nhttps://kitaplus.de/services/schulungen\r\
    \nFür Infoveranstaltungen: \r\nhttps://kitaplus.de/services/infoveranstaltungen\r\n \r\nDieses System erleichtert den\
    \ Prozess im Hintergrund sehr stark bei der Erstellung von Terminen, und ist gleichzeitig für Interessenten deutlich übersichtlicher\
    \ bei einer Vielzahl von verschiedenen Formaten. Die Formate werden nun erst\r\n angezeigt, nachdem man ein Bundesland\
    \ im ersten Schritt ausgewählt hat. Danach kann man entweder eines oder alle Formate auswählen, unter denen Termine chronologisch\
    \ sortiert auftauchen. Zuletzt kann man sich über das Kontaktformular zu einer Veranstaltung\r\n anmelden. \r\n \r\nDiese\
    \ Mail dient als Info für alle, dass ihr Bescheid wisst, falls ihr das noch nicht mitbekommen habt. Falls jemand Feedback\
    \ zu dieser Funktion haben sollte, könnt ihr euch gerne persönlich bei mir zurückmelden.\r\n\r\nIch wünsche allen eine\
    \ angenehme Restwoche und genießt die Sonnenstrahlen!\r\n \r\nViele Grüße,\r\nWladimir"
  sentences:
  - N
  - N
  - laufend muss auf nein gesetzt werden, danach kann das Datum dort eingegeben werden
- source_sentence: Userin fragt warum bei einem Bericht bei den Plätzen laut Betriebserlaubnis 15 steht und bei der Platzstruktur
    dann aber 17?
  sentences:
  - "1. Userin hatte noch keinen Personalbogen erstellt. Mit Userin den Personalbogen erstellt und freigegeben.\r\n2. Userin\
    \ hatte schon das Beschäftigungsende eingegeben. Sie musste die Ausbildung und Funktion noch befristen."
  - Weil es genau so in den Einrichtungsstammdaten hinterlegt wurde. Ich kann bei der Platzstruktur ja was anderes hinterlegt
    haben als bei den Pl. laut Betriebserlaubnis
  - Es wurde für das kommende KGJ noch kein LB erstellt, daher kommt der Hinweis.
- source_sentence: "Userin hinterlegt Email-Adresse im Benutzerkonto und speichert. Aber die Adresse wird trotz Bestätigung\
    \ nicht gespeichert. \r\nEMA ist notwendig für 2FA\r\n\r\n Roesler =  jil.roesler@cse.ruhr"
  sentences:
  - Unter dem Namen der Dame gibt es nur einen Login. Vielleicht schaut sie mit dem Login einer anderen Kollegin auf die zweite
    Einrichtung? Oder sie hat einen Login als Träger? Dies klärt sie mit der Einrichtung ab.
  - Userin hat die Rolle "Mitarbeiter".
  - N
