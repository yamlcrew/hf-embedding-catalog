widgetData:
- source_sentence: Userin kann die eingetragene AU nicht löschen.
  sentences:
  - "Userin muss über das Drei Punkte System gehen und dann über Abwesenheitszeitraum eintragen und als Art Einträge löschen\
    \ auswählen.\r\nMit Userin die AU zusammen gelöscht."
  - Hier muss bei allen Kindern der Haken bei "förderfähig" in der BI gesetzt werden.
  - "Userin an ihren Träger verwiesen. \r\nUserin erklärt, dass die AWO keinen Support über uns hat."
- source_sentence: User möchte EL für BV freischalten.
  sentences:
  - Userin hatte in der Beschäftigung zu wenige Stunden für den bestimmten Zeitraum hinterlegt. Sie muss passend zu der Erstattung
    auch passende Stunden hinterlegen.
  - Anwenderin musst den Filter weiter zurückstellen.
  - Die Rolle Einrichtung kann keinen Zugriff dazu erhalten. Das ist so konzeptionell vom LJA so festgesetzt.
- source_sentence: Userin kann EVN nicht freigeben. Sie wird gebeten, dass sie die Monatsdaten neu erstellt und freigibt.
    Das System macht dies aber nicht. Sie bekommt auch keine Fehlermeldung.
  sentences:
  - Kidz hatte zum Zeitpunkt des Anrufs eine Störung, die vermutlich zu diesem Problem geführt hat. Userin leider nicht mehr
    erreicht, daher wird der Anruf geschlossen.
  - Nein, wenn nur auf der kitaplus-Verwaltungsseite, wird als Wunsch für die GAPP weitergegeben.
  - Ja im Berichtsgenerator kann sie sich eine entsprechende Liste ziehen
- source_sentence: Er kann einen Antrag auf Personalausnahme nicht freigeben. Trotz Setzung der Haken über Beschäftigungsinformationen
    können die Daten nicht gespeichert werden.
  sentences:
  - Es  handelt sich um ein lokales Problem. Die Seite baut sich nach dem Löschen mit der aktualisierten Zahl nicht automatisch
    wieder auf. Durch die Taste F5 wird die Seite neu geladen.
  - Sie kann Vertretung wählen oder ggf eine andere und die Qualifikation muss die Mitarbeiterin ihr nennen. Sonst kann sie
    dazu beim Landesamt nachfragen, da inhaltliche Fragen
  - Er speichert diese über Einrichtungsdaten speichern. Danach konnte der Antrag freigegeben werden.
- source_sentence: "Ein Vater taucht nicht auf bei den Eltern im Elternbeirat \r\n\r\nAußerdem auf die Kinder mit archivierten\
    \ Angehörigen hingewiesen und ihr gezeigt"
  sentences:
  - "1. Vorlage da. Userin auch gezeigt wie sie die verwanden kann\r\n2. Als Wunsch weitergegeben."
  - In der Kinderliste haben Kinder gefehlt. Userin muss die Daten in der Kinderliste hinterlegen.
  - Weil er keinen Zugang zur EAPP hat, Außerdem auf die Kinder mit archivierten Angehörigen hingewiesen und ihr gezeigt wie
    sie das lösen kann
