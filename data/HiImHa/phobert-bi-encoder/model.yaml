widgetData:
- source_sentence: Khi điều_chỉnh quy_hoạch mạng_lưới đường_bộ , cần tuân_thủ những nguyên_tắc nào ?
  sentences:
  - '[ Nghị_định 168 _ 2024 _ NĐ-CP ] > Chương II > Điều 7 . Xử_phạt , trừ điểm giấy_phép lái của người điều_khiển xe mô_tô
    , xe_gắn_máy , các loại xe tương_tự xe mô_tô và các loại xe tương_tự xe_gắn_máy vi_phạm quy_tắc giao_thông đường_bộ Theo
    Khoản 13 : Ngoài việc bị áp_dụng hình_thức xử_phạt , người điều_khiển xe thực_hiện hành_vi vi_phạm còn bị trừ điểm giấy_phép
    lái_xe như sau : Nội_dung Điểm d : Thực_hiện hành_vi quy_định tại điểm b khoản 8 , khoản 10 Điều này bị trừ điểm giấy_phép
    lái_xe 10 điểm .'
  - '[ Nghị_định 168 _ 2024 _ NĐ-CP ] > Chương II > Điều 21 . Xử_phạt , trừ điểm giấy_phép lái_xe của người điều_khiển xe
    ô_tô tải , máy_kéo ( bao_gồm cả rơ moóc hoặc sơ_mi rơ moóc được kéo_theo ) và các loại xe tương_tự xe ô_tô vận_chuyển
    hàng_hoá vi_phạm quy_định về bảo_đảm trật_tự , an_toàn giao_thông đường_bộ với xe ô_tô vận_chuyển hàng_hoá Nội_dung Khoản
    4 : Phạt tiền từ 2.000.000 đồng đến 3.000.000 đồng đối_với người điều_khiển xe thực_hiện hành_vi chở hàng vượt quá chiều
    cao xếp_hàng cho_phép đối_với xe ô_tô tải ( kể_cả rơ moóc và sơ_mi rơ moóc ) .'
  - '[ Luật Đường_bộ ] > Chương I > Điều 5 . Quy_hoạch mạng_lưới đường_bộ , quy_hoạch kết_cấu_hạ_tầng đường_bộ Theo Khoản
    1 : Quy_hoạch mạng_lưới đường_bộ được quy_định như sau : Nội_dung Điểm b : Việc lập , thẩm_định , phê_duyệt , điều_chỉnh
    quy_hoạch mạng_lưới đường_bộ phải tuân_thủ quy_định của pháp_luật về quy_hoạch và bảo_đảm kết_nối phương_thức vận_tải
    đường_bộ với các phương_thức vận_tải khác ;'
- source_sentence: Hạn chót để đầu_tư công_trình kiểm_soát tải_trọng xe trên các tuyến đường_cao_tốc do doanh_nghiệp nhà_nước
    đầu_tư là khi nào ?
  sentences:
  - '[ Thông_tư 35 _ 2024 _ TT-BGTVT ] > Chương II > Điều 63 . Cơ_sở đào_tạo Theo Khoản 1 : Đối_với công_tác đào_tạo lái_xe
    Nội_dung Điểm i : Tổ_chức kiểm_tra môn_học : người đứng đầu cơ_sở đào_tạo lái_xe căn_cứ nội_dung kiểm_tra quy_định tại khoản
    4 Điều 6 , khoản 4 Điều 7 và khoản 4 Điều 8 Thông_tư này xây dựng quy_trình kiểm_tra ;'
  - '[ Nghị_định 165 _ 2024 _ NĐ-CP ] > Chương_VI > Điều 55 . Lộ_trình đầu_tư xây_dựng đối_với đường_cao_tốc chưa đáp_ứng
    tiêu_chuẩn , quy_chuẩn kỹ_thuật theo khoản 1 Điều 45 Luật Đường_bộ ,  đường gom , đường bên , Trung_tâm quản_lý , điều_hành
    giao_thông tuyến đường_cao_tốc , công_trình kiểm_soát tải_trọng xe , hệ_thống thu phí điện_tử không dừng Theo Khoản 3
    : Đối_với Trung_tâm quản_lý , điều_hành giao_thông tuyến đường_cao_tốc , công_trình kiểm_soát tải_trọng xe Nội_dung Điểm
    a : Đối_với dự_án đường_bộ cao_tốc đầu_tư theo hình_thức đầu_tư công và đường_cao_tốc do doanh_nghiệp nhà_nước đầu_tư
    : trường_hợp dự_án cân_đối được nguồn vốn để đầu_tư các hạng_mục trên thì tổ_chức thực_hiện đầu_tư trước ngày 31 tháng
    12 năm 2027 . Trường_hợp dự_án không cân_đối được nguồn vốn để đầu_tư , chủ đầu_tư hoặc người_quản_lý , sử_dụng đường_cao_tốc
    báo_cáo cấp có thẩm_quyền bố_trí vốn đầu_tư để đầu_tư , bảo_đảm khai_thác an_toàn ;'
  - '[ Nghị_định 158 _ 2024 _ NĐ-CP ] > Chương II > Điều 25 . Quy_định đối_với vận_tải hàng_hoá nội_bộ bằng xe ô_tô Theo Khoản
    1 : Xe ô_tô vận_tải hàng_hoá nội_bộ Nội_dung Điểm a : Xe ô_tô phải đáp_ứng các điều_kiện tham_gia giao_thông theo quy_định
    tại khoản 1 Điều 35 , khoản 1 , khoản 2 và khoản 3 Điều 40 của Luật Trật_tự , an_toàn giao_thông đường_bộ ; phải có dây
    an_toàn tại vị_trí ghế_ngồi , có hướng_dẫn về an_toàn giao_thông và thoát hiểm khi xảy ra sự_cố trên xe ;'
- source_sentence: Nếu các văn_bản pháp_luật được viện_dẫn trong Nghị_định 165/2024/NĐ-CP bị thay thế thì tôi phải áp_dụng
    theo văn_bản nào ?
  sentences:
  - '[ Nghị_định 168 _ 2024 _ NĐ-CP ] > Chương II > Điều 18 . Xử_phạt , trừ điểm giấy_phép lái_xe các hành_vi vi_phạm quy_định
    về điều_kiện của người điều_khiển xe_cơ_giới Theo Khoản 3 : Phạt tiền từ 300.000 đồng đến 400.000 đồng đối_với một trong
    các hành_vi vi_phạm sau đây : Nội_dung Điểm a : Người điều_khiển xe ô_tô , xe chở người bốn bánh có gắn động_cơ , xe chở
    hàng bốn bánh có gắn động_cơ và các loại xe tương_tự xe ô_tô kinh_doanh vận_tải không mang theo giấy_phép lái_xe , trừ
    hành_vi vi_phạm quy_định tại điểm c khoản 8 Điều này ;'
  - '[ Thông_tư 12 _ 2025 _ TT-BCA ] > Chương II > Điều 16 . Hồ_sơ dự sát_hạch lái_xe Theo Khoản 3 : Hồ_sơ đề_nghị sát_hạch
    cấp giấy_phép lái_xe do quá thời_hạn sử_dụng , do giấy_phép lái_xe mất và quá thời_hạn sử_dụng của cá_nhân nộp tại Phòng
    Cảnh_sát giao_thông Nội_dung Điểm d : Giấy khám sức_khoẻ của người lái_xe do cơ_sở khám bệnh , chữa bệnh đủ tiêu_chuẩn
    theo quy_định của pháp_luật về khám bệnh , chữa bệnh cấp còn hiệu_lực ;'
  - '[ Nghị_định 165 _ 2024 _ NĐ-CP ] > Chương_IX > Điều 68 . Hiệu_lực thi_hành Nội_dung Khoản 2 : Trường_hợp các văn_bản
    quy_phạm_pháp_luật được viện_dẫn tại Nghị_định này được sửa_đổi , bổ_sung , thay thế thì áp_dụng theo các quy_định tại
    các văn_bản quy_phạm_pháp_luật sửa_đổi , bổ_sung , thay_thế đó .'
- source_sentence: Cơ_quan nào cần thống_nhất với Bộ Giao_thông vận_tải trước khi mở tuyến xe_buýt tại khu_vực cảng_hàng_không
    ?
  sentences:
  - '[ Luật Đường_bộ ] > Chương_IV > Điều 58 . Quyền và nghĩa_vụ của đơn_vị kinh_doanh vận_tải hành_khách bằng xe ô_tô Theo
    Khoản 2 : Đơn_vị kinh_doanh vận_tải hành_khách bằng xe ô_tô có các nghĩa_vụ sau đây : Nội_dung Điểm d : Bồi_thường thiệt_hại
    do người lao_động , người đại_diện của đơn_vị kinh_doanh vận_tải hành_khách bằng xe ô_tô gây ra trong quá_trình vận_tải
    theo quy_định của pháp_luật ;'
  - '[ Nghị_định 158 _ 2024 _ NĐ-CP ] > Chương_IV > Điều 73 . Uỷ_ban_nhân_dân cấp tỉnh Nội_dung Khoản 2 : Phối_hợp với Uỷ_ban_nhân_dân
    cấp tỉnh có tuyến xe_buýt đi qua để thống_nhất thực_hiện các nhiệm_vụ nêu tại khoản 3 Điều 5 của Nghị_định này . Thống_nhất
    với Bộ Giao_thông vận_tải trước khi mở tuyến xe_buýt có điểm đầu hoặc điểm cuối nằm trong khu_vực cảng_hàng_không .'
  - '[ Nghị_định 165 _ 2024 _ NĐ-CP ] > Chương_V > Điều 41 . Cấp lại chứng_chỉ thẩm_tra_viên an_toàn giao_thông đường_bộ Nội_dung
    Khoản 4 : Chứng_chỉ cấp lại có thời_hạn theo thời_hạn của chứng_chỉ đã cấp .'
- source_sentence: Tôi lái_xe không giữ khoảng_cách an_toàn dẫn đến va_chạm với xe phía trước thì bị xử_phạt như_thế_nào ?
  sentences:
  - '[ Thông_tư 38 _ 2024 _ TT-BGTVT ] > Chương I > Điều 2 . Đối_tượng áp_dụng Nội_dung : Thông_tư này áp_dụng đối_với người
    lái_xe , người điều_khiển xe_máy chuyên_dùng và tổ_chức , cá_nhân liên_quan đến quản_lý và thực_hiện các quy_định về tốc_độ
    thiết_kế , tốc_độ khai_thác của đường_bộ và khoảng_cách an_toàn của xe_cơ_giới , xe_máy chuyên_dùng khi tham_gia giao_thông
    trên đường_bộ .'
  - '[ Nghị_định 168 _ 2024 _ NĐ-CP ] > Chương II > Điều 18 . Xử_phạt , trừ điểm giấy_phép lái_xe các hành_vi vi_phạm quy_định
    về điều_kiện của người điều_khiển xe_cơ_giới Nội_dung Khoản 6 : Phạt tiền từ 4.000.000 đồng đến 6.000.000 đồng đối_với
    người từ đủ 16 tuổi đến dưới 18 tuổi điều_khiển xe ô_tô , xe chở người bốn bánh có gắn động_cơ , xe chở hàng bốn bánh
    có gắn động_cơ và các loại xe tương_tự xe ô_tô .'
  - '[ Nghị_định 168 _ 2024 _ NĐ-CP ] > Chương II > Điều 6 . Xử_phạt , trừ điểm giấy_phép lái_xe của người điều_khiển xe ô_tô
    , xe chở người bốn bánh có gắn động_cơ , xe chở hàng bốn bánh có gắn động_cơ và các loại xe tương_tự xe ô_tô vi_phạm quy_tắc
    giao_thông đường_bộ Theo Khoản 4 : Phạt tiền từ 2.000.000 đồng đến 3.000.000 đồng đối_với người điều_khiển xe thực_hiện
    một trong các hành_vi vi_phạm sau đây : Nội_dung Điểm l : Không giữ khoảng_cách an_toàn để xảy ra va_chạm với xe chạy
    liền trước hoặc không giữ khoảng_cách theo quy_định của biển_báo hiệu “ Cự_ly tối_thiểu giữa hai xe ” , trừ các hành_vi
    vi_phạm quy_định tại điểm d khoản 5 Điều này .'
