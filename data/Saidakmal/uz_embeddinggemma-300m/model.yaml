- source_sentence: Nyu-York shahridagi Uol-Strat qayerda joylashgan
  sentences:
  - Intrinsic factor Intrinsic factor (IF), shuningdek, oshqozon ichki faktor (GIF) deb ham tanilgan, oshqozonning parietal
    hujayralari tomonidan ishlab chiqariladigan glikoproteindir. Bu keyinchalik kichik ichakning iliumida vitamin B12 (cobalamin)
    ni sug'orish uchun zarur.
  - Biz Millerlarmiz Denverda yashovchi Devid Klark ismli kichik kannabis savdogari pul va o'tmishdagi o'g'ir o'g'riliklarini
    o'g'irlaydi. Ulardan ba'zilari uning boy giyohvandlik lordlari yetkazib beruvchi Brad Gurdlingerga qarzdor. Devid unga
    olib kelinganidan so'ng Gurdlinger Dovudni qarzini to'xtatish uchun Meksikadan marixuana "smirchasi"ni burishtirishga
    majbur qiladi. Bojxona orqali o'tishga harakat qilayotgan bir kishi juda shubhali ekanligini anglab, u o'z stripperining
    Ros, o'smir qochqin va kichkina o'g'ri Keysi va o'n sakkiz yoshli Keni bilan birga "Dollar" deb nomlangan yolg'on oila
    sifatida suratga chiqaradi.
  - Wall Street - bu Nyu-York shahridagi Lower Manhattan moliyaviy tumanidagi East Riverda Broadwaydan Janubiy ko'chig'gacha
    shimoli-g'arbiydan janubi-sharbiygacha o'tgan sakkiz blok uzunlikdagi ko'cha. [1] Vaqt o'tishi bilan, ushbu atama butun
    AQShning moliyaviy bozorlari, Amerika moliyaviy xizmatlari sanoati (agar moliyaviy firmalar jismoniy joylashtirilmasa
    ham) yoki Nyu-Yorkda joylashgan moliyaviy manfaatlar uchun metonimga aylandi. [2]
- source_sentence: '"Mening orzuim bor" qo''shiqni kim yozgan'
  sentences:
  - Birma temir yo'li Tailandda joylashgan Hellfire Toursga ko'ra, "ikki ko'prik 1945 yil 13 fevral kuni Royal Air Force (RAF)
    bombardiruvchi samolyotlari tomonidan muvaffaqiyatli bombardimon qilingan va zararlangan. Qozog'a poydevori tufayli tuzatishlar
    amalga oshirildi va aprel oyida yog'och temir yo'l trestli ko'prik qayta ish bilan ta'mirlandi. 3 aprel kuni AQSh armiyasi
    havo kuchlarining (USAAF) Liberator og'ir bombachilari tomonidan ikkinchi bombardimon reyd qilindi.
  - '"I Have a Dream" qo''shiqini Benny Andersson va Bjorn Ulvaeus yozgan va guruhning 1979 yilgi Voulez-Vous albumiga olingan.
    Anni-Frid Lyngstad bosh qo''shiqlarni kuylagan. 1979 yil dekabr oyida "Take a Chance on Me" ning jonli versiyasi bilan
    B-qarshi sifatida chiqarilib chiqdi. Qopishtirilgan qo''shiq to''rtta guruh a''zosidan tashqari boshqa vokalchilarni o''z
    ichiga olgan yagona ABBA qo''shig''i bo''lib tan olingan. Yakuniy chorusda Stokholm xalqaro maktabi bolalar xori mavjud.
    Buyuk Britaniyada "I Have a Dream" musiqasi "Another Brick in the Wall" tomonidan 1 o''rinni egalladi.'
  - To'g'ri, o'lim bizni qilmaydi qismida (NCIS) Gibs Ryanning Dearingni tuzog'iga tushirish uchun hukm qilingan sobiq ofitser
    Jonatan Kolni ishga qabul qilishga qaror qiladi. Dastlab Dearing Colega uni uchratishni aytganda ishlashi mumkin edi,
    lekin Dearing uchrashuvga kelmaydi va uning o'rniga Cole uchun telefon qoldiradi. Oldingi qo'ng'iroqlar va Colega Gibsga
    direktor Vance bilan hech qachon qiziqmaganligini va adolat bilan chindan ham qiziqishini bildiradi. Bosh qoshida, qo'ng'iroqni
    tahlil qilish jamoasi uni tuzoqqa jalb qilish uchun uning mashinasida Vance avtopusxasi borligini tushunadi, u o'g'irilganida
    o'rnatilgan, NCIS Bosh Qoshxonasiga qayiq qilish va butun bino evakuatsiya qilinadi. Cole Tonyni deaktiv qilishga urinyapti,
    ammo uning terma-tush ustida (qoshiq ustida) bor, chunki o'limga sabab bo'lganidan so'ng, Bob Gibbsning telefon qo'ng'iroqidan
    qo'ng'iroq qildi va uning tanasi va odamlari bilan birga qo'rqib, kompyuterda urilgan va kompyuterda urilgan, ammo "Qo'ng'riqchi"
    bilan birga qo'ng'riqchixonaga tushadi.
- source_sentence: Lady antebellum ismi qayerdan kelib chiqqan ?
  sentences:
  - Lady Antebellum 2010 yil 9 avgust kuni BBC Radio 2 Drivetime Show-da guruh uy egasiga Liza Tarbuqqa Antebellum nomi guruh
    "avval" uylarini suratga olganida kelib chiqqanligini tushuntirdi. Avval urushdan oldingi arxitektura usuli Amerika Janubiyidagi
    katta plantatsiya uylarini tasvirlaydi. Latindagi bellum so'zi " urush" degani; "avval" demak " urushdan oldin " degani.
  - Necrotising fasciitis B.C. 5-asrda Hippokrates necrotising yumshoq to'qima infektsiyasini Streptococcal infeksiyaning
    komplikasiyasi bo'lgan kasallik deb tasvirlagan. Bu kasallik "tanamizning barcha qismida eritsipellalarga ega bo'lgan,
    sababi esa oddiy hodisa edi. Suyaklar, go'sht va suyaklar (qut, tendon yoki nerv) tanadan tushib, ko'plab o'limlar yuz
    berdi". Necrotising yumshoq to'qima infektsiyasini birinchi marta ingliz shifokor Leonard Gillespie va ingliz shifokor
    Gilbert Blaine va Tomas Trotter tomonidan 18 asrda tavsiflab berilgan edi. O'sha paytda necrotising yumshoq to'qima infektsiyasi
    pedaenik (g'irni-qizish yoki g'angrenni bosish) deb nomlangan.
  - Sutro yo'li Quyosh Orion qo'li ichki chekkasi yaqinida, Mahalliy Bubble mahalliy Fluff ichida va Gould Beltda, Galaktik
    markazidan 26,4 ± 1,0 kly (8,09 ± 0,31 kpc) masofada joylashgan. Quyosh hozirda Galaktik diskning markaziy toshidan 530
    parsek (1698 ly) uzoqlikda joylashgan.
