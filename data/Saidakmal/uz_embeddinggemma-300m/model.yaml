widgetData:
- source_sentence: kimning xoʻjayini boʻlgan
  sentences:
  - 'Salingerning 2010 yilda vafot etganidan so''ng, Salingerning agent bo''lgan Phyllis Westberg, uning asarlariga film,
    televideniye yoki sahna huquqlarini litsenziyalash bo''yicha hech narsa o''zgarmaganini aytdi. [1] Salinger tomonidan
    1957 yilda yozilgan xatda u o''limidan keyin chiqarilgan "The Catcher in the Rye" kitobining adaptiyasiga ochiqligi ayon
    bo''lgan. U shunday yozgan: "Birinchidan, huquqlar bir kun sotilishi mumkin. Men boy o''lmasim ehtimoli mavjud bo''lgani
    uchun, men sotilmagan huquqlarni xotinim va qizimga sug''urta siyosati sifatida qoldirish g''oyasi bilan juda jiddiy o''ynayman.
    Bu menga hech qanday oxirat bermaydi, ammo, tezda qo''shishim mumkin, Holdenfield muomalasi natijalarini ko''rishim shart
    emasligini bilish. Salinger shuningdek, uning hikoyasini filmga tayyorlash uchun mos kelmasligiga ishondi va bu roman
    va so''zning birinchi tarjimasi dialogga aylanishi kerak deb yozgan.'
  - Dragon Soul "Dragon Soul" - Yaponiyalik qo'shiqchi Takayoshi Tanimotoning yettinchi singli. U qo'shiqni gitarist va qo'shiqchi
    Takafumi Iwasaki bilan birga "Dragon Soul" deb nomlangan maxsus birlikning bir qismi sifatida ijro etdi. 2009 yil 20 may
    kuni CD-da muntazam va cheklangan nashr sifatida chiqarildi; cheklangan nashrda Dragon Ball Kai Dragon Battlers savdo
    kartalari kartalari o'yinchasi mavjud edi.
  - The Hateful Eight (Ko'pincha H8ful Eight deb marketing qilinadi) Quentin Tarantino tomonidan yozib va yozib olingan 2015
    yilgi amerikalik g'arbiy film. U Samyuel L. Jekson, Kurt Rasel, Jenifer Jeyson Leigh, Walton Goggins, Demian Bichir, Tim
    Roth, Maykl Madsen va Brus Dernni Amerikaning Fuqarolik urushidan keyin bir vaqtlar cho'pon to'xtashida qor bo'ronidan
    panoh izlayotgan sakkiz begona kishi sifatida tasvirlaydi.
- source_sentence: Kevin o'yinchi bo'lib, yosh va beqaror bo'lib, sho'zni tark etadi.
  sentences:
  - Nullifikatsiya (AQSh Konstitutsiyasi) Nullifikatsiya nazariyasi, davlatlar o'rtasida bitim (yoki "kompakt") asosida Ittifoqni
    tuzgan va federal hukumatning yaratuvchilari sifatida davlatlar ushbu hukumatning hokimiyatining chegaralarini belgilash
    uchun yakuniy vakolatga ega. Bu asosida, federal hukumatning hokimiyatining chegarasini aniqlovchi yakuniy nazariyasi
    bo'yicha, davlatlar federal sudlar emas, balki federal hukumatning hokimiyatining eng oxirgi ta'rifchisi hisoblanadi.
    Ushbu nazariyaga ko'ra, davlatlar federal hukumatning konstitutsiyaviy vakolatlaridan tashqari deb hisoblaydigan federal
    qonunlarni rad etishlari yoki bekor qilishlari mumkin.
  - '"Take Me Out to the Ball Game" - bu Shimoliy Amerika beysbolining no Rasmiy himniga aylangan Jack Norworth va Albert
    Von Tilzer tomonidan 1908 yilda yaratilgan Tin Pan Alley qo''shiqidir, garchi uning mualliflaridan hech biri qo''shiqni
    yozishdan oldin o''yinga bormagan bo''lsa ham.[1] Qo''shiq chorusi an''anaviy ravishda beysbol o''yinining yettinchi o''yinining
    o''rtasida kuylanadi. Fanlar, odatda, birga kuylashga rag''batlantirilgan va ba''zi futbol maydonlarida "uy jamoasi" so''zlari
    jamoa nomi bilan almashtirilgan.'
