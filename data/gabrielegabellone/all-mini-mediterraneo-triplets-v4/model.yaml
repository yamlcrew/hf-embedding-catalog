- source_sentence: How to load documents?
  sentences:
  - MapCity contains the geometries that are displayed on the interactive map on the frontend.
  - The maps app contains State, Region, Province, Company, City, Particella, Map, MapCity, Property, Group, PropertyHasMap,
    Palette, PaletteColor, and Geotiff models.
  - Use the load_documents command which creates document file instances from folders in ./files/2-Database-solare path.
- source_sentence: What is the MapCity model?
  sentences:
  - The document app contains Document, DocumentFile, Type, Language, Theme, Keyword, and Oss models used in the document
    consultation section.
  - Document contains all the document metadata such as name, author, year, type, language used in the document consultation
    section.
  - MapCity contains the geometries that are displayed on the interactive map on the frontend.
- source_sentence: What is the cleantables command?
  sentences:
  - Takes care of eliminating all instances of Palette, Group, MapCity, Map, Province, and Property models.
  - Set CORS_ALLOWED_ORIGINS in the environment file with allowed origins like localhost,127.0.0.1,http://localhost:3000.
  - 'from matplotlib import pyplot as plt


    colors = [''Accent'', ''Accent_r'', ''Blues'', ''Blues_r'', ''BrBG'', ''BrBG_r'',]

    ax = res_union. plot(cmap=colors[random. randint(0, len(colors))])

    ax = res_union. plot(cmap=''Greens_r'')

    gdf1. plot(ax=ax, facecolor=''none'', edgecolor=''k'')

    gdf2. plot(ax=ax, facecolor=''none'', edgecolor=''k'')

    plt. savefig("overlay. png")

    ```.'
- source_sentence: How to restore a database dump?
  sentences:
  - Use the generategeotiff command which generates Geotiff instances from a shapefile. Run with python manage.py generategeotiff
    <path>.
  - Use the generategeotiff command which generates Geotiff instances from a shapefile. Run with python manage.py generategeotiff
    <path>.
  - Copy the dump file to data/postgresql folder, then inside the database container run pg_restore -U $POSTGRES_USER -d $POSTGRES_DB
    --clean --if-exists /var/lib/postgresql/data/db_backup.dump
- source_sentence: What is the State model?
  sentences:
  - State contains the geometries of the states, in our specific case it contains only the entire geometries of the Italian
    state.
  - Use the load_documents command which creates document file instances from folders in ./files/2-Database-solare path.
  - The maps app contains State, Region, Province, Company, City, Particella, Map, MapCity, Property, Group, PropertyHasMap,
