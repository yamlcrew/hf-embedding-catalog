widgetData:
- source_sentence: What are the main clinical manifestations and characteristics of congenital syphilis?
  sentences:
  - Trained staff in community health centers obtain information on infant weight during periodic visits scheduled at three
    and six months. Age- and sex-adjusted standard deviation scores (SDS) for weight are calculated using Dutch reference
    curves. Infant growth rates of weight gain in the first three and six months after birth are then calculated by comparing
    the weight at three or six months to the birth weight SDS. These growth rates provide information on the infant's growth
    trajectory and can help identify any deviations from the norm.
  - The main clinical manifestations of congenital syphilis include prematurity, low birth weight, hepatomegaly with or without
    splenomegaly, cutaneous lesions, limb pseudoparalysis, respiratory distress, jaundice, anemia, generalized lymphadenopathy,
    and osteitis and osteochondritis. Late congenital syphilis is characterized by saber shin deformity of the tibia, Clutton's
    joints, frontal bossing, saddle nose, deformed upper medial incisor teeth (Hutchinson's teeth), neurological deafness,
    and difficulty in learning.
  - When evaluating newborns, orthopaedic surgeons should consider risk factors such as difficult vaginal delivery of a large
    infant, which can be associated with fractures or brachial plexus injury, and breech position, which can be associated
    with developmental dysplasia of the hip (DDH). They should also be aware of conditions like Klippel-Feil syndrome, congenital
    muscular torticollis, arthrogryposis, and neurologic problems indicated by a high arch in the feet.
- source_sentence: 'How do genetic and fetal environmental factors contribute to the increased risk of type 2 diabetes and
    vascular disease in infants with intrauterine growth restriction (IUGR)?

    '
  sentences:
  - Radiologically, children with leukemia who develop measles-related pneumonia initially show perihilar and widespread peribronchial
    fine nodular opacities. In more severe cases, a diffuse honeycomb pattern with increased interstitial markings and areas
    of consolidation may develop. Histopathologically, lung biopsy reveals extensive alveolar exudate of mononuclear cells,
    with the presence of multinucleate giant cells and eosinophilic inclusions. Electron microscopy may confirm the presence
    of paramyxovirus group, which includes measles, in the giant cells.
  - According to the data from Children's Hospital Boston, the rate of urinary tract infection in infants between 0 and 3
    months of age with fever and clinical bronchiolitis is 8%. The rate of bacteremia is 1.3%, and the rate of meningitis
    is 0.4%.
  - Genetic and fetal environmental factors play a role in the increased risk of type 2 diabetes and vascular disease in infants
    with intrauterine growth restriction (IUGR). The fetal insulin hypothesis suggests that genetically determined insulin
    resistance leads to decreased insulin-mediated growth in the fetus, as well as insulin resistance in adulthood, resulting
    in type 2 diabetes. Insulin resistance in IUGR infants can also lead to abnormal vascular development, increasing the
    risk of hypertension and vascular disease. Additionally, the thrifty genotype hypothesis proposes that genes responsible
    for causing diabetes have been retained in the genome of all individuals due to their beneficial effects during periods
    of starvation and undernourishment. However, in modern times of overeating and lack of exercise, these genes contribute
    to detrimental conditions such as early-onset obesity.
- source_sentence: 'What role did psychological data play in shaping the understanding of encopretic and constipation problems
    in children?

    '
  sentences:
  - Possible causes of neonatal jaundice in this patient could include blood group incompatibility, G6PD deficiency, or metabolic
    liver disease such as the cholangitic variant of congenital hepatic fibrosis.
  - In children, pyoderma gangrenosum is commonly associated with ulcerative colitis, followed by leukemia and Crohn's disease.
  - Psychological data was collected to create a psychological profile for children with encopretic and constipation problems.
    This data likely provided insights into the psychological factors that may contribute to these issues, helping to develop
    a more comprehensive understanding of the condition and potential treatment approaches.
- source_sentence: 'What are the potential causes of the fractures and rickets in the 18-year-old girl with idiopathic DeToni
    Debre-Fanconi syndrome?

    '
  sentences:
  - The management of diabetes mellitus in children requires adherence to certain standards that are different from those
    for adults. Children, including school-aged children, often lack the ability to control their diabetes optimally, necessitating
    the involvement of an adult. The responsibility of the family in the treatment of children with diabetes is crucial, with
    parents playing an active role in supervision and education. The management of diabetes in children disrupts their daily
    activities and can have an impact on their quality of life.
  - The fractures and rickets in the 18-year-old girl with idiopathic DeToni Debre-Fanconi syndrome may be caused by a combination
    of factors, including the unsuccessful treatment with vitamin D and potassium phosphate, as well as the low serum calcium
    levels and increased serum phosphorus levels observed during immobilization. The horizontal position with partial immobilization
    may have also played a role in changing the calcium-phosphate homeostasis and shifting bone minerals from inactive diaphyseal
    bone to the metabolically active sites of fractures and rickets.
  - Coats' disease is more common in males and can occur in both children and adults. While the exact cause of Coats' disease
    is not fully understood, it is suspected to be caused by a somatic mutation in the NDP gene. Other risk factors for developing
    Coats' disease are currently unknown.
- source_sentence: 'How can interdisciplinary collaboration and clearly defined strategies help reduce damage and suffering
    for children and adolescents with mental disorders and their families?

    '
  sentences:
  - 'The infant in the NICU presented with a degraded general status, intubation, and mechanical ventilation. They also had
    unilaterally diminished breath sounds, hypoxemia, oliguria, tachycardia, hypotension, abdominal distention, and fever.
    Additionally, they exhibited hepatosplenomegaly, oliguria progressing to anuria, thrombocytopenia, and hyperchromic hematuria. '
  - Pneumothorax in children can have various causes, including lung cysts. In cases where there are signs of pneumothorax
    without a lung lesion to account for the condition, cysts of the lung should be suspected. The presence of cysts can be
    confirmed through radiographic evidence, which can also help determine the location and characteristics of the cysts.
  - Interdisciplinary collaboration, involving caregivers, mental health managers, and professionals, can play a crucial role
    in reducing damage and suffering for children and adolescents with mental disorders and their families. By developing
    a shared vision and practice, professionals can work together to establish dynamic strategies that address the complex
    demands of these individuals. This collaboration requires critical observation of services, conduct, and strategies to
    ensure that families and mental health services are brought closer together. By bridging the gap between demands and care,
    interdisciplinary collaboration can help improve the well-being and outcomes for children, adolescents, and their families.
