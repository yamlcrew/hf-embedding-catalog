widgetData:
- source_sentence: 'How do thiazolidinediones (TZDs) affect retinal vessel formation in ischemic retinopathy?

    '
  sentences:
  - Perioperative steroid treatment in RRD-CD patients may have various effects. Steroids can reduce choroidal detachment
    by decreasing permeability and fluid transudation. They can also stabilize the blood ocular barrier, inhibit inflammatory
    reactions and cellular proliferation, and potentially suppress the formation of proliferative vitreoretinopathy (PVR).
    These effects may improve the chances of successful retinal detachment repair and contribute to better anatomical and
    functional outcomes after surgery. However, data regarding the effectiveness of perioperative steroid treatment in RRD-CD
    are scarce, highlighting the need for further research in this area.
  - Thiazolidinediones (TZDs) have been shown to suppress pathological vessel formation in the ischemic retina. In experimental
    models, intravitreal injection of TZDs has been found to suppress retinal leukostasis and vascular leakage. The molecular
    mechanisms of the action of TZDs in retinal vessel disease are still unclear, but it is hypothesized that TZDs protect
    against retinal vessel disorders through their ability to increase circulating levels of adiponectin (APN).
  - Diabetic retinopathy (DR) is diagnosed by a professional ophthalmologist using direct ophthalmoscopy or fundus fluorescein
    angiography. The classification of DR is based on criteria determined at a national ophthalmology conference in 1985,
    which includes the stages of no retinopathy, nonproliferative diabetic retinopathy (NPDR), or proliferative diabetic retinopathy
    (PDR).
- source_sentence: 'How does atropine treatment affect the progression of myopia and the associated changes in ocular parameters?

    '
  sentences:
  - Antibiotic susceptibility is tested using the classic agar diffusion (Kirby-Bauer) method. Standardized bacterial suspension
    is prepared and swabbed onto Mueller-Hinton agar. Discs of antibiotics are applied to the plates, and after incubation,
    the plates are inspected for inhibition zones. The diameter of the complete inhibition zones is measured to determine
    the antibiotic susceptibility of the bacteria.
  - Some factors that can contribute to the development of anterior capsule fibrosis include the size of the continuous curvilinear
    capsulorhexis (CCC), the material and design of the intraocular lens (IOL), and pre-existing conditions such as pseudoexfoliation,
    diabetes, uveitis, myotonic muscular dystrophy, or retinitis pigmentosa.
  - Atropine treatment slows the progression of myopia and leads to changes in ocular parameters. During treatment, there
    is a reduction in myopia progression, accompanied by a decrease in lens thickness (LT) and an increase in vitreous chamber
    depth (VCD) and axial length (AL). When atropine is stopped, there is a myopic rebound, with a rapid increase in VCD and
    AL. These changes suggest that atropine primarily affects the growth of the vitreous chamber and axial length, contributing
    to its effectiveness in slowing myopia progression.
- source_sentence: 'How was tranexamic acid administered in the treatment of patients with traumatic hyphema, and what additional
    measures were taken based on specific observations during the treatment process?

    '
  sentences:
  - Some imaging modalities used to diagnose glaucoma include confocal scanning laser ophthalmoscopy (CSLO), optical coherence
    tomography, and scanning laser polarimetry. These modalities allow for quantitative imaging of the optic nerve and retinal
    nerve fiber layer (RNFL) to detect glaucomatous damage.
  - Patients who display local tumor recurrence within the eye are at a greater risk for distant, life-threatening tumor metastasis.
    Those with local recurrence have a higher likelihood of developing metastasis compared to those without local recurrence,
    indicating a greater malignant potential of uveal melanoma.
  - Tranexamic acid was administered as a 5% eye drop for 5 days every 6 hours to patients with traumatic hyphema. In cases
    where corneal epithelium abrasion was observed, chloramphenicol eye drops were added every 6 hours. Additionally, if the
    intraocular pressure (IOP) was greater than 22 mm Hg, one or two topical anti-glaucoma medications were added to the treatment
    regimen.
- source_sentence: 'What surgical techniques are used for the removal of intraretinal foreign bodies (IRFBs)?

    '
  sentences:
  - Corneal topography has an important role in the early detection of keratoconus (grade one). It increases the odds of treatment
    before the disease progresses to higher grades. Different devices, such as the Orbscan and Pentacam, are available for
    corneal topography. These devices use different technologies, such as rotating Scheimpflug camera and slit-scan technology,
    to assess the corneal surface. However, the use of different technologies in these devices may result in measurement differences,
    which can lead to diagnostic or treatment differences between different centers.
  - The standard approach for the removal of IRFBs is three-port pars plana vitrectomy. Additional procedures such as lensectomy
    or phacoemulsification may be performed if there is significant lens opacity. Scleral buckling with cryotherapy or endophotocoagulation
    may be done for eyes with retinal detachment. Fluid-gas exchange or silicone oil injection may also be used. In cases
    of magnetic foreign bodies, intraocular forceps or an intraocular magnet may be used for extraction. Nonmagnetic IRFBs
    can be removed using an extrusion needle or suction of the vitrectomy probe.
  - The examination of eye movements is of clinical relevance for several disciplines, including neurology, ophthalmology,
    pediatrics, neuropediatrics, internal medicine, and otorhinolaryngology.
- source_sentence: 'How does intravitreal injection of tacrolimus affect the expression of chemokines in the retina?

    '
  sentences:
  - For patients with severe eye changes and diplopia, high dose prednisone (120 mg/day) can be effective in reducing symptoms.
    Some clinicians also add azathioprine as a steroid sparing agent during long term treatment. Orbital decompression operations
    and a combination of orbital radiotherapy and steroids have also shown to be effective in reducing proptosis and diplopia
    in some patients. Corrective muscle surgery may be undertaken for residual diplopia when the eyes are quiet.
  - Anaplastic OAs are characterized by intensive vascularity. The choice of laser radiation for tumor removal depends on
    the vascularity observed. For low-grade OAs with minimal vascularity, laser vaporization using radiation with a wavelength
    of 1.47 μm and power of 7 W is planned. However, for anaplastic OAs with intense vascularity, semiconductor laser radiation
    with a wavelength of 0.808 μm and power of 30 W is used due to its good coagulating properties.
  - Intravitreal injection of tacrolimus has been shown to markedly reduce the expression of monocyte chemoattractant protein-1
    (MCP-1) and regulated upon activation, normal T cell expressed and secreted (RANTES) mRNA in the retina of immunized rats.
    MCP-1 and RANTES are potent chemoattractants for T lymphocytes and macrophages, which are infiltrating cells observed
    in the posterior segment of eyes with ocular inflammation. The suppression of MCP-1 and RANTES gene expression by tacrolimus
    may lead to a reduced number of infiltrating T lymphocytes and macrophages in the vitreous cavity and retina, thereby
    reducing the inflammatory reactions associated with ocular inflammation.
