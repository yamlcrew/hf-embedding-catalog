      \ மேலும் அணுக்கரு உறை சீர்திருத்தப்படுகிறது.\n          |\n6. சைட்டோகினேசிஸ்: சைட்டோபிளாசம் பிரிந்து, மரபணு ரீதியாக\
      \ ஒரே மாதிரியான இரண்டு மகள் செல்களை உருவாக்குகிறது.\n          |\n7. புதிதாக உருவாக்கப்பட்ட கலங்களுக்கான இடைநிலையுடன்\
      \ செயல்முறை மீண்டும் தொடங்குகிறது.\n\nமேலே உள்ள நிலைகள் யூகாரியோட்களில் உள்ள உயிரணுப் பிரிவின் ஒரு வகை மைட்டோசிஸிற்கானவை\
