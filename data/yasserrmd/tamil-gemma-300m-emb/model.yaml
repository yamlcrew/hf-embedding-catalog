      அங்கீகரிக்கப்படாத அணுகலைத் தடுக்க, இயல்புநிலை உள்நுழைவு விவரங்களை மாற்ற பரிந்துரைக்கப்படுகிறது.


      5. **சாதனங்களை நெட்வொர்க்குடன் இணைக்கவும்:** சாதனங்களை கம்பி அல்லது வயர்லெஸ் இணைப்பு மூலம் பிணையத்துடன் இணைக்க முடியும்.
      கம்பி இணைப்புக்கு, சாதனத்திலிருந்து ஈதர்நெட் கேபிளை ரூட்டரில் உள்ள லேன் போர்ட்களில் ஒன்றில் இணைக்கவும். வயர்லெஸ் இணைப்பிற்கு,
      நீங்கள் முன்பு கட்டமைத்த நெட்வொர்க் பெயர் மற்றும் கடவுச்சொல்லைப் பயன்படுத்தி Wi-Fi நெட்வொர்க்குடன் இணைக்கவும்.


      6. **நெட்வொர்க்கை சோதிக்கவும்:** எல்லா சாதனங்களும் இணையத்தை அணுகி பிணையத்தில் ஒருவருக்கொருவர் தொடர்புகொள்ள முடியுமா
      எனச் சரிபார்க்கவும். நெட்வொர்க்கில் உள்ள மற்றொரு சாதனத்தின் ஐபி முகவரியை பிங் செய்வதன் மூலம் இதைச் செய்யலாம்.


      உங்கள் உள்ளூர் நெட்வொர்க் இப்போது அமைக்கப்பட்டுள்ளது மற்றும் பயன்படுத்த தயாராக உள்ளது. ரூட்டரின் ஃபார்ம்வேரைப் பாதுகாப்பாகவும்
      சிறப்பாகவும் வைத்திருக்க அதைத் தொடர்ந்து புதுப்பிப்பதை உறுதிசெய்யவும்.'
  - source_sentence: முடிவு மரம் கற்றல் செயல்முறையை விவரிக்கவும்.
    sentences:
    - குறிப்பிட்ட மதிப்பாய்வின் சூழல் இல்லாமல், அதற்கான சுருக்கத்தை என்னால் வழங்க இயலாது. நான் சுருக்கமாகச் சொல்ல விரும்பும்
      மதிப்பாய்வைத் தர முடியுமா?
    - 'தேசிய கீதத்தின் போது கணினிகள் ஏன் தொப்பிகளைக் கழற்றுவதில்லை?


      ஏனென்றால் அவர்களிடம் மோசமான கேச் ஆசாரம் இருக்கிறது!'
    - 'முடிவெடுக்கும் மரக் கற்றல் என்பது இயந்திரக் கற்றலில் வகைப்பாடு அல்லது பின்னடைவு மாதிரிகளை உருவாக்குவதற்கு பரவலாகப்
      பயன்படுத்தப்படும் முறையாகும். இது முன்னறிவிப்பு மாறிகளின் மதிப்புகளின் அடிப்படையில் துணைக்குழுக்களாக தரவுகளின் சுழல்நிலை
      பகிர்வை உள்ளடக்கியது.


      அல்காரிதம் முழு பயிற்சி தரவுத்தொகுப்புடன் தொடங்குகிறது, இது ரூட் முனையாக கருதப்படுகிறது. "தூய்மை" அல்லது "தகவல் ஆதாயம்"
      ஆகியவற்றின் அடிப்படையில், தரவைப் பிரிப்பதற்கான சிறந்த அம்சத்தைத் தீர்மானிப்பதே குறிக்கோள். இலக்கு மாறி கொடுக்கப்பட்ட
      தரவு எவ்வளவு நன்றாகப் பிரிக்கப்படுகிறது என்பதைக் கணக்கிட இந்த அளவீடு பயன்படுத்தப்படுகிறது, மேலும் அந்த கட்டத்தில் வகைப்படுத்தலுக்கான
      மிக முக்கியமான அம்சத்தைத் தேர்வுசெய்ய அல்காரிதம் உதவுகிறது.


      தேர்ந்தெடுக்கப்பட்ட அம்சம், தரவை துணைக்குழுக்களாகப் பிரித்து, சைல்டு நோட்களை உருவாக்க பயன்படுகிறது. இந்த குழந்தை முனைகள்
      ஒவ்வொன்றும் மதிப்பீடு செய்யப்பட்டு மேலும் பிரிக்கப்பட்டு, ஒரு குறிப்பிட்ட மரத்தின் ஆழத்தை அடையும் வரை அல்லது ஒரு இலை
      முனையில் உள்ள நிகழ்வுகளின் எண்ணிக்கை ஒரு குறிப்பிட்ட வரம்பிற்குக் கீழே இருப்பது போன்ற ஒரு நிறுத்த அளவுகோலை சந்திக்கும்
      வரை செயல்முறை மீண்டும் தொடரும்.


      ஒவ்வொரு முனையிலும், எல்லா நிகழ்வுகளும் ஒரே வகுப்பைச் சேர்ந்தவை எனில், ஒரு இலை முனை உருவாக்கப்பட்டு வகுப்புப் பெயருடன்
      லேபிளிடப்படும். இல்லையெனில், அல்காரிதம் பிரிக்கப்பட வேண்டிய மற்றொரு மாறியைத் தேர்ந்தெடுத்து செயல்முறை தொடர்கிறது.


      மரத்தை நிர்மாணித்த பிறகு, மரத்தின் வேர் முனையிலிருந்து இலைக் கணு வரை பயணிப்பதன் மூலம் புதிய நிகழ்வுகளைக் கணிக்கப் பயன்படுத்தலாம்.
      ஒவ்வொரு உள் முனையிலும், தரவுகளில் உள்ள தொடர்புடைய அம்சத்தின் மதிப்பின் அடிப்படையில் முடிவு எடுக்கப்படுகிறது, மேலும்
      தரவு பொருத்தமான குழந்தை முனைக்கு அனுப்பப்படும்.


      முடிவெடுக்கும் மரக் கற்றலின் முக்கிய நன்மைகளில் ஒன்று அதன் விளக்கம் ஆகும், ஏனெனில் மரத்தை எளிதில் காட்சிப்படுத்தலாம்
      மற்றும் முடிவெடுக்கும் செயல்முறை புரிந்து கொள்ள எளிதானது. இருப்பினும், தரவுத்தொகுப்பில் சிறிய மாற்றங்களுக்கு அல்காரிதம்
      அதிக உணர்திறன் கொண்டதாக இருக்கும், மேலும் மரத்தின் ஆழம் அல்லது இலை முனைகளில் உள்ள நிகழ்வுகளின் எண்ணிக்கையைக் கட்டுப்படுத்துவதன்
      மூலம் அதிகப்படியான பொருத்தத்தைத் தவிர்க்க கவனமாக இருக்க வேண்டும்.'
  - source_sentence: '"காபி இயந்திரங்களை" இலக்காகக் கொண்டு தேடுபொறி உகப்பாக்கம் பிரச்சாரத்திற்கான முக்கிய வார்த்தைகளின் பட்டியலை
      உருவாக்கவும்.'
