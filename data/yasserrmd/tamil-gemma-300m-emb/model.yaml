      குணப்படுத்தவும், இறந்த நிலங்களை மீண்டும் உயிர்ப்பிக்கவும், ராஜ்யத்தின் சமநிலையை மீட்டெடுக்கவும் சக்தியைக் கொண்டிருந்தது.


