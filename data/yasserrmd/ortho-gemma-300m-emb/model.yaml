widgetData:
- source_sentence: Is radiological glenoid wear always associated with poor clinical results after humeral head replacement?
  sentences:
  - Patient-centred care in healthcare systems includes understanding the patient's treatment needs, experiences, satisfaction,
    and perceived overall quality of healthcare. In orthodontic treatment, patient-centred care involves considering the patient's
    oral health-related quality of life (OHRQoL) and self-esteem. It is important in orthodontics because it allows for a
    better understanding of the patient's perceived benefits and health gains associated with orthodontic therapy.
  - Radiological glenoid wear may be present after humeral head replacement, but it is not always associated with poor clinical
    results. Some patients may show signs of glenoid erosion on radiographic imaging while experiencing satisfactory clinical
    results.
  - The potential risks associated with intraoperative skull-femoral traction during scoliosis surgery include stretching
    of the vascular supply, which can lead to spinal cord ischemia and subsequent neurological injury. The spinal motor system
    is particularly vulnerable to ischemic insult caused by the application of corrective forces on the spine.
- source_sentence: 'What are the treatment options for heterotopic mesenteric ossification (HMO)?

    '
  sentences:
  - The recommended approach for managing orthopaedic infections associated with bone prostheses typically involves a two-stage
    surgery. This approach involves the removal of infected prostheses, eradication of causative pathogens, and subsequent
    replacement of devices. In addition to surgery, intracellular antimicrobials may be used to target bacteria that may be
    harbored within periprosthetic fibroblasts. This approach aims to prevent relapse and reduce the risk of infection recurrence.
  - The ligamentous support of the CMC joint, particularly the dorsoradial ligament (DRL), can make standard dorsal portals
    difficult to manipulate and stretch during surgery. This may increase the risk of nerve damage, as the standard dorsal
    portal includes a thin subcutaneous layer with a sensory nerve. In contrast, the TP is fashioned through the superficial
    anterior oblique ligament (SAOL) or radial capsule, which allows for easier manipulation and potentially reduces the risk
    of nerve damage.
  - The treatment of HMO can be either medical or surgical, depending on the patient's clinical condition and the extent of
    ossification. Nonsteroidal anti-inflammatory drugs and cimetidine have been reported to prevent the recurrence of ossification.
    Surgical therapy is reserved for patients experiencing bowel obstruction symptoms, while asymptomatic patients are observed
    with radiological examinations for progression of the disease. In the case described, the ossificated formations found
    in the mesocolon and the abdominal trauma were excised, while closure of Hartman's colostomy was avoided due to the presence
    of bone tissue in the sigmoid stump.
- source_sentence: 'What factors are associated with better outcomes in the treatment of septic arthritis using arthroscopic
    drainage and debridement?

    '
  sentences:
  - Developmental dysplasia of the hip (DDH) encompasses a spectrum of abnormalities affecting the hip joint, including dysplasia,
    subluxation, and dislocation. Hip dysplasia refers to abnormalities in the structure of the femoral head, acetabulum,
    or both. The acetabulum may be shallow, and the femoral head ossification may be delayed or altered. There are various
    classifications of hip abnormalities in DDH, including located/reduced hip (femoral head within the acetabulum), subluxated
    hip (femoral head partially out of the acetabulum), and dislocated hip (femoral head outside of the acetabulum). These
    classifications can further be described as subluxatable (femoral head can be partially displaced from the acetabulum)
    or dislocatable (femoral head can be completely displaced from the acetabulum), and dislocated hips can be reducible (femoral
    head goes back into the acetabulum with manipulation) or irreducible (femoral head cannot go back into the acetabulum).
    The development of the hip joint relies on proper positioning of the hip for the acetabulum and proximal femur to develop
    normally.
  - The fulfillment of expectations is a distinct outcome measure in spine surgery that differs from other global measures
    in several ways. Firstly, it includes both preoperative and postoperative perspectives, whereas other global measures
    only focus on the postoperative state. Secondly, the fulfillment of expectations is determined from prospectively gathered
    information, eliminating the reliance on patients' recall. Thirdly, it provides a detailed understanding of which symptoms
    and functions have improved to target levels and which have not, allowing for a rationale behind patients' rating of outcomes.
    Lastly, surgeons can use this information to address specific concerns of patients during postoperative discussions.
  - Factors associated with better outcomes in the treatment of septic arthritis using arthroscopic drainage and debridement
    include early diagnosis and treatment, proper joint drainage, appropriate systemic and oral antibiotics, and early rehabilitation.
    Other studies have also reported a positive correlation between lower Gachter stage and good to excellent functional results.
    The time interval between onset of symptoms and drainage also bears prognostic correlation on long-term results, with
    better outcomes observed in those drained within 12 days of symptom onset.
- source_sentence: 'What are the selection criteria for using the Ilizarov technique in treating distal tibial fractures?

    '
  sentences:
  - Trunk stabilization exercises are an important component of rehabilitation training as they re-educate the trunk muscles
    for proper activation and coordination, leading to improved vertebral stability. These exercises also help maintain spinal
    alignment, provide motion control for functional activity, and are widely used to prevent and treat back pain.
  - The selection criteria for using the Ilizarov technique in treating distal tibial fractures include patients aged 18-75
    years with displaced distal metaphyseal tibial fractures with an angulation of more than 10 degrees in any plane. Intra-articular
    fractures are included if the incongruence of the articular surface is more than 2 mm. Only patients with isolated fractures,
    without other disorders affecting gait, who are able to understand and follow instructions in Swedish, are enrolled in
    the treatment.
  - Hindfoot deformities can be caused by various factors, including involvement of the talonavicular and naviculocuneiform
    joints, which can lead to pes planus and a valgus deformity of the hindfoot. Insufficient or damaged tibialis posterior
    tendon, dysfunction of the capsule, and weakening of collateral ligaments (deltoid, calcaneonavicular, talonavicular)
    can also contribute to the collapse of the longitudinal arch and the development of pes planovalgus.
- source_sentence: 'How can the combination of distraction osteogenesis and osteotomy be beneficial in managing cases of vertical
    alveolar bone deficiencies?

    '
  sentences:
  - Dry needling, which involves the insertion of a solid needle into the skin to regulate trigger points within the musculature,
    may serve as an effective therapeutic adjunct for patients with ankle instability. It is believed to reduce motor disturbances
    in the musculature and accelerate muscle fatigability. Studies have shown that inclusion of dry needling in active patients
    with ankle instability secondary to injury led to better outcomes in pain and function. However, further investigation
    is needed to determine the efficacy of dry needling in improving functional outcomes and return to play specifically in
    American football athletes.
  - The bracing phase of the Ponseti method lasts for four to five years and can be challenging for the child, the family,
    and the healthcare team. It requires consistent adherence to wearing the brace for long periods of time, which can be
    difficult for some families. Additionally, the cost of modern clubfoot braces can be prohibitive for many patients, particularly
    in developing countries.
  - The combination of distraction osteogenesis and osteotomy can be beneficial in managing cases of vertical alveolar bone
    deficiencies. In some cases, if the distraction process alone does not achieve the desired outcome, an osteotomy can be
    performed to further advance the affected segment. This combined approach allows for improved soft tissue gain and surgical
    advancement, which may not be achievable with osteotomy alone.
