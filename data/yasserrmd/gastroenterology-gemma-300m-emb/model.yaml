widgetData:
- source_sentence: What are some perceptual abnormalities associated with functional gastrointestinal disorders like IBS?
  sentences:
  - Some potential treatments for gastric ulcers include fruit polyphenol extract, cyanidin-3-O-glucoside, ethyl acetate soluble
    fraction of fruit, M. fragrans seed, dihydroguaiaretic acid, M. malabarica fruits, M. andamanica leaves, a polyherbal
    formulation containing M. fragrans fruits, Oryza sativa L. O. sativa bran oil, rice fluid, and Punica granatum L. P. granatum
    peel extract. These treatments have shown protective activity against gastric ulcers, anti-H. pylori activity, wound healing
    activity, antioxidant activity, and cytoprotective activity.
  - Studies have shown that patients with IBS often exhibit perceptual abnormalities related to visceral stimuli. These abnormalities
    include hypersensitivity in the upper gastrointestinal tract and colon, heightened perception of normal intestinal contractions,
    and modifiability of colonic distensions by attention, anxiety, and relaxation. Hypervigilance towards expected aversive
    events arising from the viscera and hyperalgesia induced by sustained noxious visceral stimulation are two distinct perceptual
    alterations observed in IBS patients.
  - The mainstay of treatment for non-metastatic GCC is surgical resection. However, the extent of surgical resection with
    appendectomy versus right hemicolectomy is debated. Both the North American and European Neuroendocrine Tumor Societies
    recommend right hemicolectomy as standard first-line treatment for GCC even after appendectomy due to the high risk of
    metastases and improvement in prognosis. However, there is evidence to suggest limited or no benefit of right hemicolectomy,
    primarily in patients with low grade and/or limited disease burden. A meta-analysis of 13 studies demonstrated no significant
    difference in failure rates between appendectomy alone and extended resection in patients with localized disease and low
    grade histology.
- source_sentence: What are the advantages and limitations of using fibrin glue for fistulas in Crohn's disease?
  sentences:
  - Cavernous hemangioma of the liver is often asymptomatic, but some patients may experience abdominal pain or abdominal
    distension. Macroscopically, the lesions are usually dark red and well circumscribed, although their appearance can vary
    due to factors such as thrombosis, fibrosis, and calcification. Histologically, cavernous hemangiomas are composed of
    blood-filled spaces lined by a single layer of endothelial cells and supported by a basement membrane. Fibrosis may or
    may not be present, and rare complications include spontaneous rupture, traumatic rupture, portal hypertension, and coagulopathy.
  - Barium esophagram may be useful as the initial test when the clinician determines that the patient is at high risk of
    perforation during endoscopy. This includes patients with suspected high-risk lesions or strictures high up in the esophagus.
    Performing both barium esophagram and endoscopy can provide complementary information in certain situations, such as pre-operative
    assessment of Zenker's diverticulum or when manometry is not readily available for the assessment of suspected achalasia.
    Therefore, barium esophagram can be recommended as the initial test in specific cases where endoscopy may pose a higher
    risk.
  - The main advantage of using fibrin glue for fistulas in Crohn's disease is the preservation of anal sphincter function.
    However, there are limitations such as early extravasation of the mixture from the fistulous tract and failure to identify
    all fistula branches, resulting in a high recurrence rate. Data on the effectiveness of fibrin glue in Crohn's disease
    is limited, with one study reporting clinical remission in 38% of patients compared to 16% in the control group.
- source_sentence: 'What is the role of accurate noninvasive detection of inoperable disease with imaging modalities in selecting
    patients for surgery in colorectal cancer?

    '
  sentences:
  - The presence of a foreign body, such as the endoprosthesis, is considered to pose a risk for the development of biliary
    infection. It is preferable to remove all stones after the biliary endoprosthesis, as the friction produced between the
    stones and the endoprostheses may induce stone fragmentation. The indwelling of the endoprostheses for a considerable
    period may affect the size of the stones and potentially provide a chance for subsequent endoscopic bile duct clearance.
  - The changes in serum protein levels observed in Crohn's disease and ulcerative colitis, such as the increase in acute
    phase reactants and the decrease in certain proteins, are similar to those seen in other inflammatory conditions (Weeke,
    Weeke, and Bendixen, 1971). This indicates that these alterations in serum protein levels are not specific to Crohn's
    disease and ulcerative colitis but rather reflect the general inflammatory response.
  - Accurate noninvasive detection of inoperable disease with imaging modalities plays a pivotal role in selecting patients
    who would benefit from surgery in colorectal cancer. It helps identify patients with metastases or extra-hepatic disease
    who may not be suitable candidates for surgery.
- source_sentence: 'Why is it important to determine the clinical characteristics and surgical outcomes of OBI-associated
    hepatocellular carcinoma (HCC)?

    '
  sentences:
  - The Risk Evaluation of Viral Load Elevation and Associated Liver Disease/Cancer Hepatitis B Virus (REVEAL-HBV) study found
    that high HBV DNA levels and elevated ALT levels during the immune-active phase of chronic hepatitis B are associated
    with a greater risk of cirrhosis and HCC. Serum ALT levels as low as twice the upper limit of normal (ULN) were found
    to be associated with progression to cirrhosis and HCC in adults. These findings have led to a more aggressive approach
    to the treatment of chronic hepatitis B during the immune-active phase.
  - It is important to determine the clinical characteristics and surgical outcomes of OBI-associated hepatocellular carcinoma
    (HCC) because different etiologies of HCC may modulate the clinical characteristics and outcomes, requiring different
    preventive and therapeutic strategies. Understanding the specific characteristics and outcomes of OBI-associated HCC can
    help guide treatment decisions and improve patient outcomes.
  - Common symptoms of achalasia include dysphagia, retrosternal pain, regurgitation of stagnant food, and weight loss. Patients
    with achalasia may also experience pulmonary symptoms such as cough and hoarseness caused by aspiration. Complications
    of achalasia include an increased incidence of esophageal cancer and the risk of aspiration pneumonia.
- source_sentence: What are the hepatic manifestations and treatment options for individuals with Alagille syndrome (ALGS)?
  sentences:
  - Probiotics are living microorganisms that can have beneficial effects on the body. Studies have shown that probiotics
    can effectively attenuate alcoholic liver disease and improve liver function. They achieve these effects by maintaining
    the balance of intestinal microbiota, activating the endogenous microbial community, and regulating the immune system.
    Probiotics have been used in the treatment of alcoholic liver disease, with some strains, such as Lactobacillus rhamnosus
    GG (LGG), showing effectiveness in increasing the number of beneficial bacteria in the gut and altering serum levels of
    certain liver enzymes and bilirubin.
  - The Kimura-Takemoto classification is a system used to assess gastric mucosal atrophy. It identifies different atrophic
    patterns based on characteristic features observed during endoscopy. These patterns include C1 (atrophic mucosa in the
    antrum only), C2 (atrophic mucosa at the gastric angle or in the lower corpus), C3 (atrophic mucosa also found in the
    upper corpus), O1 (atrophic mucosa surrounds the gastric cardia, but the folds of the great curvature are maintained),
    O3 (entire gastric mucosa is atrophic, and the folds of the greater curvature disappear), and O2 (an intermediate condition
    between O1 and O3).
  - The hepatic manifestations of ALGS typically include severe pruritus and disfiguring xanthomas. Treatment options for
    ALGS-related liver disease primarily involve supportive measures, such as choleretic agents (e.g., ursodeoxycholic acid),
    medications for itch relief (e.g., cholestyramine, rifampin, naltrexone), and surgical biliary diversion procedures (e.g.,
    partial internal biliary diversion, ileal exclusion). The Kasai procedure, commonly used for biliary atresia, is not recommended
    for ALGS individuals as it may worsen the outcome. Liver transplantation is also an option and has shown an 80% 5-year
    survival rate, with most affected individuals experiencing catch-up growth.
