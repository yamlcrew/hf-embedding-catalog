widgetData:
- source_sentence: Item 8 in IBM's 2023 Annual Report to Stockholders details the Financial Statements and Supplementary Data,
    which are included on pages 44 through 121.
  sentences:
  - What was the amount gained from the disposal of assets in 2022?
  - What section of IBM's Annual Report for 2023 contains the Financial Statements and Supplementary Data?
  - What were the cash outflows for capital expenditures in 2023 and 2022 respectively?
- source_sentence: For the fiscal year ended March 31, 2023, Electronic Arts reported a gross margin of 75.9 percent, an increase
    of 2.5 percentage points from the previous year.
  sentences:
  - How did investment banking revenues at Goldman Sachs change in 2023 compared to 2022, and what factors contributed to
    this change?
  - What was the gross margin percentage for Electronic Arts in the fiscal year ending March 31, 2023?
  - What were the risk-free interest rates for the fiscal years 2021, 2022, and 2023?
- source_sentence: Cash, cash equivalents, and restricted cash at the beginning of the period totaled $7,013 for a company.
  sentences:
  - What was the amount of cash, cash equivalents, and restricted cash at the beginning of the period for the company?
  - What is the impact of the new $1.25 price point on Dollar Tree’s sales units and profitability?
  - What was the total amount attributed to Goodwill in the acquisition of Nuance Communications, Inc. as reported by the
    company?
- source_sentence: generate our mall revenue primarily from leases with tenants through base minimum rents, overage rents
    and reimbursements for common area maintenance (CAM) and other expenditures.
  sentences:
  - How does Visa facilitate financial inclusion with their prepaid cards?
  - What are the main objectives of the economic sanctions imposed by the United States and other international bodies?
  - What revenue sources does Shoppes at Venetian primarily rely on from its tenants?
- source_sentence: For the fiscal year ended August 26, 2023, we reported net sales of $17.5 billion compared with $16.3 billion
    for the year ended August 27, 2022, a 7.4% increase from fiscal 2022. This growth was driven primarily by a domestic same
    store sales increase of 3.4% and net sales of $327.8 million from new domestic and international stores.
  sentences:
  - What drove the 7.4% increase in AutoZone's net sales for fiscal 2023 compared to fiscal 2022?
  - What percentage of HP's external U.S. hires in fiscal year 2023 were racially or ethnically diverse?
  - How much did GameStop Corp's valuation allowances increase during fiscal 2022?
