widgetData:
- source_sentence: Teams across Delta have worked together to make an impact through enhanced landing procedures, optimizations
    to flight routing and speed, and weight reduction initiatives, saving over 20 million gallons of jet fuel in 2022 and
    2023.
  sentences:
  - What was the percentage increase in Services net sales from 2022 to 2023?
  - How much jet fuel did Delta Air Lines save between 2022 and 2023 through optimizations in aircraft operations?
  - How did Ford Pro's EBIT in 2023 compare to the previous year, and what contributed to this change?
- source_sentence: On February 14, 2022, the State of Texas filed a lawsuit against us in Texas state court (Texas v. Meta
    Platforms, Inc.) alleging that "tag suggestions" and other uses of facial recognition technology violated the Texas Capture
    or Use of Biometric Identifiers Act and the Texas Deceptive Trade Practices-Consumer Protection Act, and seeking statutory
    damages and injunctive relief.
  sentences:
  - What did the auditor’s report dated February 9, 2024, state about the effectiveness of Enphase Energy’s internal control
    over financial reporting as of December 31, 2023?
  - What legal action did the State of Texas initiate against Meta Platforms, Inc. on February 14, 2022?
  - What caused the pretax loss in the Corporate & Other segment to increase in 2023 compared to 2022?
- source_sentence: Our two operating segments are "Compute & Networking" and "Graphics." Refer to Note 17 of the Notes to
    the Consolidated Financial Statements in Part IV, Item 15 of this Annual Report on Form 10-K for additional information.
  sentences:
  - What are the two operating segments of NVIDIA as mentioned in the text?
  - How much did the gross margin increase in 2023 compared to 2022?
  - What is the total assets and shareholders' equity of Chubb Limited as of December 31, 2023?
- source_sentence: The increase in marketing and sales expenses in fiscal year 2023 was mainly due to higher advertising and
    promotional spending related to Apex Legends Mobile and the FIFA franchise.
  sentences:
  - What are included in Part IV, Item 15(a)(1) of the Annual Report on Form 10-K?
  - What was the net income reported for the fiscal year ending in August 2023?
  - What was the primary cause of the increase in marketing and sales expenses in fiscal year 2023?
- source_sentence: 'Information on legal proceedings is included in Contact Email  PRIOR HISTORY: None PLACEHOLDER FOR ARBITRATION.'
  sentences:
  - Where can information about legal proceedings be found in the financial statements?
  - What remaining authorization amount was available for share repurchases as of January 28, 2023?
  - What is the total amount authorized for the repurchase of common stock up to December 2023?
