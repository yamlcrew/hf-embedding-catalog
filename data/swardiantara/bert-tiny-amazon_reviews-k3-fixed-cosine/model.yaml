widgetData:
- source_sentence: I received my first order of this product and it was broke so I ordered it again. The second one was broke
    in more places than the first. I can't blame the shipping process as it's shrink wrapped and boxed.
  sentences:
  - I thought the bag would be much lighter. The bag, however, is good quality.
  - This product is not very good compared to others. It runs when you sweat.
  - 'I ordered two of these. One came broken. It was packaged okay, so I believe it was broken due to the mail carrier tossing
    it onto my porch. The one that did not break, I love. It looks nice on my counter and serves its purpose. Updated review:
    Ok so the salt cellar that did not break during shipping pretty much shattered at the lightest touch after 3 weeks on
    my counter. I can no longer recommend this item, clearly they are not very durable at all.'
- source_sentence: Arrived broken. Manufacturer defect. Two of the legs of the base were not completely formed, so there was
    no way to insert the casters. I unpackaged the entire chair and hardware before noticing this. So, I'll spend twice the
    amount of time boxing up the whole useless thing and send it back with a 1-star review of part of a chair I never got
    to sit in. I will go so far as to include a picture of what their injection molding and quality assurance process missed
    though. I will be hesitant to buy again. It makes me wonder if there aren't missing structures and supports that don't
    impede the assembly process.
  sentences:
  - My kids love these rings! Good quality. Gave them something fun to do.
  - I ended up returning this bag for credit. While there was nothing wrong with the quality, it turned out to be too small.
  - My second one; so far they've held up just find. This one has been in daily use for work, all the zippers continue to
    work just fine. A metal jug of hot coffee is often in the main pocket, but I've never felt any heat from it. So far, these
    and the SOG Ninja packs are a very good deal for what they cost.
- source_sentence: The barbell pad is fine but the ankle strap is terrible. It does not hold well at all. I guess I’ll havw
    to return everything.
  sentences:
  - I thought the bag would be much lighter. The bag, however, is good quality.
  - Usually amFilm is my go-to for screen protectors, been buying them for years. However, these LG G7 ones have slipped and
    even fallen off after even a short fall (like from the couch to the floor). Only the thin black frame is sticky, so there's
    really not much holding it on. I don't drop my phone often, but still... I need something that adheres to the entire screen,
    not just the edges.
  - I thought the bag would be much lighter. The bag, however, is good quality.
- source_sentence: Does not play with with the two cases i bought. I'd request a refund but mines already cracked from the
    cases.
  sentences:
  - Seems to protect well, feels nice, just wish it would stick a bit better. The first one would not stay applied. Kept peeling
    from the top no matter what I did. I figured it could be my error, so I removed and cleaned the screen very well with
    additional alcohol wipes. The second one has been on a few days, but is starting to peel from a different spot. I love
    the feel of the protector otherwise.
  - I ended up returning this bag for credit. While there was nothing wrong with the quality, it turned out to be too small.
  - My second one; so far they've held up just find. This one has been in daily use for work, all the zippers continue to
