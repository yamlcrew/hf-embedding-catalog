- source_sentence: I had problem with the 2 screen protectors, any of them paste well on the screen. Very disappointing because
    I also bought the complete screen protection and I hope not happening the same thing...
  sentences:
  - Seems to protect well, feels nice, just wish it would stick a bit better. The first one would not stay applied. Kept peeling
    from the top no matter what I did. I figured it could be my error, so I removed and cleaned the screen very well with
    additional alcohol wipes. The second one has been on a few days, but is starting to peel from a different spot. I love
    the feel of the protector otherwise.
  - I bought this headphone for my daughter. She loves it. It's super lightweight and no pressure felt either on head or ears
