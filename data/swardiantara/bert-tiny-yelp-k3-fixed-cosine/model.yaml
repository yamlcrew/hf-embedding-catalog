- source_sentence: If I could give this place less than one star, I would. I have no idea who gave this place high reviews
    but they must either own the place or be time travelers from back in the day when this place might not have sucked. The
    decor is tired and grimy, the place reeked of smoke, and the bartender/server was surly, to put it mildly. We went there
    on a Saturday night with a mind to try the Irish food. Apparently, we were out of luck. I've always thought that the secrets
    of restaurant success is to actually stock food for people to eat. He told us before we ordered that they had no \"pies\".
    No chicken pot pie, no shepherds pie, etc. So, we gamely tried to order other things. We placed our order. My wife, for
    example, ordered the Irish stew and he came back 5 min later telling us they were out of that and even more things for
    several people in our party. At that point my wife picked out a third option, ham and cabbage, only to be told again that
    \"they were out\". At that point, realizing that the only food to be had in the place was what was crusted on the menus,
    we asked to pay for our drinks and left. They actually then gave us flack for not having enough to put it on a debit card.
    In short, unless you like your dinner with a side of disappointment and depression, I'd probably avoid this place like
    the plague. Speaking of the plague, I suppose we should thank Mr. Surly for inspiring us to walk out. I only have two
    bathrooms at my house and would've been hard pressed to accommodate several violently ill people at once.
  sentences:
  - This is an older retail store.  I normally have a loving relationship with Eat 'n Park, but this one just didn't hit home
    for me.  I came during the Sunday Brunch Buffet; my friend partook, I abstained after seeing the fare.  I ordered two
    eggs over-easy with a side of toast.  Getting beyond the murky, dated feel of the store, it was actually fairly clean
    on the interior and in the restrooms.  \n\nI received my food and the eggs were cooked perfectly.  Maybe not a big deal
    for some, but you would be surprised at how often over-easy comes out over-hard or, worse, uncooked.  I think the real
    reason I enjoy Eat 'n Park most of the time is the normal salad bar items.
  - I am an old school Vegas guy when it comes to service in this town. This place has only been open for a couple weeks and
    all I can say is wow! I've witnessed the owner and GM personally go to each customer to see how everything was going.
    I've seen this on ALL of the four times I have visited. The hardest things to convey to a service staff is to anticipate
    guests needs and recover from mistakes. They have obviously done a great job of that. Kudos!\n\nI love the Cajun style
    fish and shrimp tacos. Really fresh on perfectly soft, corn tacos. BTW, their happy hour is pretty freakin awesome to
    take advantage on their indoor-outdoor patio. Way more of a bargain and laid back atmosphere than Kona Grill --in the
    same lot. I just hope the Lambo-driving, Affliction/True Religion wearing-Summerlin douche bags- that scare away all the
    cute girls away, don't ruin my new favorite spot.
  - Will not come back. Food is average but the service is terrible. \n\nThe Pho is not impressive but OK and their egg rolls
    are made from refrigerated product with some unrecognizable stuff inside!!\n\nThe service is among the worst I've ever
    experienced. The waitress/owner gave a face like a stone and didn't even say a word when taking our order. The only one
    word we got there was a \"Thanks\" when she bring the check.... Since we were the only Asian customers there and all others
    were getting normal service, I may have to establish an assumption that the way you are treated is correlated to your
    looking. Unbelievable!
- source_sentence: Top notch doctor in a top notch practice. Can't say I am surprised when I was referred to him by another
    doctor who I think is wonderful and because he went to one of the best medical schools in the country. \nIt is really
    easy to get an appointment. There is minimal wait to be seen and his bedside manner is great.
  sentences:
  - When I was about to leave Champaign for Chicago, my boss and I went on a culinary tour around Chambana and Silvercreek
    was on the top of our list. She was raving about the Sunday brunch and they were right, it was so so good. \n\nThere's
    an egg station if you want your eggs custom made. Then there's other fancy meats, fish like whole smoked salmon, pastries,
    and of course, desserts.  The price tag is expensive for the Chambana area but the food selection will all be worth it.
    This is a must do for anyone in town.
  - Lidia, you should be ashamed! This spot wouldn't have lasted a year in NYC. Citizens of Pittsburgh, don't be fooled. Lidia's
    is average at best. I ate here when it opened,a and again 4 years later. Nothing has changed. We did have some great bar
    nibbles, quality cocktails, and a good bottle of wine off of a pretty good list, but the food and service lacked. For
    starters we were served ice cold meatballs and limp soggy salads. The took away everything and only brought back fresh
    salads (mind you, we were one of about 10 tables being served that evening!). The entrees were dull and lacked seasoning.
    The servers were confused (how many times does it take to ask fro fresh pepper?) and our waiter seemed to hand off our
    table to another server. It's tough to find anything good here. Just another 'poser'.
  - I'm thinking this place gets the high reviews for their awesome drink specials... definitely not the food.\nThe drinks
    are always a deal, and it must be popular on weekend... it was dead the night I went.. but at least l could get some bad
    wings and a few beers at midnight. Barkeep was very nice too.
- source_sentence: Last summer I had an appointment to get new tires and had to wait a super long time. I also went in this
    week for them to fix a minor problem with a tire they put on. They \"fixed\" it for free, and the very next morning I
    had the same issue. I called to complain, and the \"manager\" didn't even apologize!!! So frustrated. Never going back.  They
    seem overpriced, too.
  sentences:
  - Just came back from my second visit to The Main Ingredient, and I definitely plan to return! I'd been to this location
    a few times when it was Lisa G.'s, and I'm happy to report that MI is superior (I always found Lisa G.'s a little pretentious
    and overpriced). \n\nSandwiches are great - the Jive Turkey and Tuna sandwiches are delicious and very flavorful - and
    the service is excellent! I came in with a group of 5 co-workers on our lunch break and there weren't any tables available
    for our party but the waitress was really nice and apologetic and told us she would seat us soon. She took our orders
    in advance because we were in a bit of a hurry and seated us within a few minutes. She offered to give us separate checks
    and brought them shortly after our food arrived; of course, saying \"no rush,\" but just trying to be helpful because
    we were pressed for time. Finally, a restaurant that doesn't act like it's the hugest hassle in the world to provide separate
    checks! It's a reality of modern dining and I love it when restaurants don't treat you like a pariah for requesting your
    own ticket. It makes things so much less awkward/complicated when you're out for a quick bite to eat with friends or coworkers.\n\nDefinitely
    check out the Main Ingredient next time you're looking for good food and service in a cute, cozy environment.
  - I've eaten here twice now, and neither time was particularly enjoyable.  The food itself is fine; exactly what you'd expect
    from a Perkins.  I tried one of their newer omelets, and it was surprisingly tasty.  I had that problem where I was too
    full to eat more but wanted to keep eating...  The service, however, leaves much to be desired.\n\nThe first time I went
    was on a Sunday around noon, so it was pretty busy.  My boyfriend and I stood in front of the podium waiting for someone
    to come to put our names on the list.  When someone finally came, he first took the name of someone who had come in after
    us, like we weren't even there.  It took a while to be seated, but that's understandable since it was about time for Sunday
    brunch.\n\nThe second time was again on a Sunday around noon, but it wasn't near as busy.  Our waitress took our orders
    promptly, but afterwards, the quality of service plummeted.  My water glass was empty for at least 15 minutes before getting
    a refill, twice.  The waitress had walked past our table many times, but didn't even look at us to see how we were doing.  Our
    food took forever to come, and I understand there were five of us so that can take a while, but this was ridiculous.  And
    the waitress didn't say a thing the whole time.  When the food did come, it was warm, so at least the meal itself was
    good.  I asked for a box, but it never came.  I ended up asking for one at the counter myself to avoid waiting probably
    another half hour.  Overall, our waitress stopped at our table maybe five times total, and never apologized for the long
    wait or even noticed that we were pretty upset with our service.  In addition, several of the other employees were arguing
    loudly in earshot of customers, which I think is pretty unprofessional.\n\nI can't say I'd recommend going here, and if
    you do, expect to wait.
  - WOW! Just try it. Delicious! Best Spring Roll I've had in a long time. The Phnom Penh soup was exotic and fabulous. The
    owners obviously care about their food and their homeland. I will definitely go back soon.
- source_sentence: Best Irish food in the Burgh.  Great bar food too.  The service is maybe a bit surly and it's not the cleanest,
    nor the best decor.  But, that's not what this place is about.  It's a town Irish bar and it serves great solid Irish
    fare and suds to the locals.  And it does it better than anyone.  I go back again and again.
