    - I'm thinking this place gets the high reviews for their awesome drink specials... definitely not the food.\nThe drinks
      are always a deal, and it must be popular on weekend... it was dead the night I went.. but at least l could get some
      bad wings and a few beers at midnight. Barkeep was very nice too.
    - \"Absolute Perfect Dining!\"\n\nBoth my husband and I ate at this restaurant on the fourth of July and were amazed at
      the views and all the firework displays all over Las Vegas. What a spectacular view this restaurant provided. The food,
      ambiance and service were superb. If you want to try something fun for dessert, try the three scoops of sorbet (raspberry,
      mango and orange) with mint and crystalized sugar. What a treat! Make sure you share this dessert as it is very large.
      In fact, everything they serve is large so make sure you have an appetite. We enjoyed ourselves and will definitely
      return. \n\n\nVisited July 2013
