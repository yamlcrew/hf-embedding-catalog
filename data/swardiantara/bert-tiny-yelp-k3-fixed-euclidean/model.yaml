- source_sentence: This place is absolute garbage...  Half of the tees are not available, including all the grass tees.  It
    is cash only, and they sell the last bucket at 8, despite having lights.  And if you finish even a minute after 8, don't
    plan on getting a drink.  The vending machines are sold out (of course) and they sell drinks inside, but close the drawers
    at 8 on the dot.  There are weeds grown all over the place.  I noticed some sort of batting cage, but it looks like those
    are out of order as well.  Someone should buy this place and turn it into what it should be.
