      addition, several of the other employees were arguing loudly in earshot of customers, which I think is pretty unprofessional.\n\nI
      can't say I'd recommend going here, and if you do, expect to wait.
    - WOW! Just try it. Delicious! Best Spring Roll I've had in a long time. The Phnom Penh soup was exotic and fabulous.
      The owners obviously care about their food and their homeland. I will definitely go back soon.
  - source_sentence: Best Irish food in the Burgh.  Great bar food too.  The service is maybe a bit surly and it's not the
      cleanest, nor the best decor.  But, that's not what this place is about.  It's a town Irish bar and it serves great
      solid Irish fare and suds to the locals.  And it does it better than anyone.  I go back again and again.
    sentences:
    - This is an older retail store.  I normally have a loving relationship with Eat 'n Park, but this one just didn't hit
      home for me.  I came during the Sunday Brunch Buffet; my friend partook, I abstained after seeing the fare.  I ordered
      two eggs over-easy with a side of toast.  Getting beyond the murky, dated feel of the store, it was actually fairly
      clean on the interior and in the restrooms.  \n\nI received my food and the eggs were cooked perfectly.  Maybe not a
      big deal for some, but you would be surprised at how often over-easy comes out over-hard or, worse, uncooked.  I think
      the real reason I enjoy Eat 'n Park most of the time is the normal salad bar items.
    - While looking on the internet for a good steakhouse in Vegas, I came across Austin's. What a find! Don't let the less
      than desirable locale stop you from giving this place a try. Not only is the food delicious, it's very reasonably priced.
      \nWhat we had -\nTo start, they bring you a basket of different types of bread. All very good but the pretzel bread
      was the best!\nSalad - while there were several to choose from, my husband and I split the wedge salad. It was fantastic!
      it was covered in crumbled bacon, chopped tomatoes and onions, blue cheese dressing and crumbles. \nMain Course - The
      reviews I read said to order the rib-eye so my brother and I split it (22 ounces!)  It was tender and really flavorful
      and worth the $36 price tag. My husband and sister in law each ordered the petite filet at $27. My sister in law said
      it was \"like buttah\". \nSide Dishes - they are ALL $6 each which, if you go to any high end steakhouse on the Strip,
      run anywhere from $12 to $15 each. We had the creamed corn which had bits of jalapeno peppers in it, french fries, and
      gorgonzola mashed potatoes. All quite tasty and plenty to split between the 4 of us. \nDessert - we were there to celebrate
      my brother and sister in law's birthdays so they received complimentary creme brulee's, but our waiter, Shawn, mentioned
      that he loved the apple crisp so I ordered that and was very happy I did. It was in phyllo dough and the apples were
      perfectly cooked and the topping was fabulous. Probably one of the best apple crisps I've ever had ( and I've had a
      lot of apple crisps!) \n\nShawn also mentioned that if you go on restaurant.com, there are deals to be had for our next
      visit which is something I'll check out the next time I'm headed to Vegas (FYI, Restaurant.com is on Ebates.com which
      gives you rebates when you purchase through them so check that out!)\n\nAfter all was said and done, it was less than
      $50 per person for an exceptional steak dinnerl! Now THAT'S a deal!
