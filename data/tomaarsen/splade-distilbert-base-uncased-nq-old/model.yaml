  - The Washington Post The Washington Post is an American daily newspaper. It is the most widely circulated newspaper published
    in Washington, D.C., and was founded on December 6, 1877,[7] making it the area's oldest extant newspaper. In February
    2017, amid a barrage of criticism from President Donald Trump over the paper's coverage of his campaign and early presidency
    as well as concerns among the American press about Trump's criticism and threats against journalists who provide coverage
    he deems unfavorable, the Post adopted the slogan "Democracy Dies in Darkness".[8]
- source_sentence: how old was messi when he started his career
  sentences:
  - Lionel Messi Born and raised in central Argentina, Messi was diagnosed with a growth hormone deficiency as a child. At
    age 13, he relocated to Spain to join Barcelona, who agreed to pay for his medical treatment. After a fast progression
    through Barcelona's youth academy, Messi made his competitive debut aged 17 in October 2004. Despite being injury-prone
    during his early career, he established himself as an integral player for the club within the next three years, finishing
    2007 as a finalist for both the Ballon d'Or and FIFA World Player of the Year award, a feat he repeated the following
    year. His first uninterrupted campaign came in the 2008â€“09 season, during which he helped Barcelona achieve the first
    treble in Spanish football. At 22 years old, Messi won the Ballon d'Or and FIFA World Player of the Year award by record
    voting margins.
  - We Are Marshall Filming of We Are Marshall commenced on April 3, 2006, in Huntington, West Virginia, and was completed
    in Atlanta, Georgia. The premiere for the film was held at the Keith Albee Theater on December 12, 2006, in Huntington;
    other special screenings were held at Pullman Square. The movie was released nationwide on December 22, 2006.
  - One Fish, Two Fish, Red Fish, Blue Fish One Fish, Two Fish, Red Fish, Blue Fish is a 1960 children's book by Dr. Seuss.
    It is a simple rhyming book for beginning readers, with a freewheeling plot about a boy and a girl named Jay and Kay and
    the many amazing creatures they have for friends and pets. Interspersed are some rather surreal and unrelated skits, such
    as a man named Ned whose feet stick out from his bed, and a creature who has a bird in his ear. As of 2001, over 6 million
    copies of the book had been sold, placing it 13th on a list of "All-Time Bestselling Children's Books" from Publishers
    Weekly.[1] Based on a 2007 online poll, the United States' National Education Association labor union named the book one
    of its "Teachers' Top 100 Books for Children."[2]
- source_sentence: is send in the clowns from a musical
  sentences:
  - Money in the Bank ladder match The first match was contested in 2005 at WrestleMania 21, after being invented (in kayfabe)
    by Chris Jericho.[1] At the time, it was exclusive to wrestlers of the Raw brand, and Edge won the inaugural match.[1]
    From then until 2010, the Money in the Bank ladder match, now open to all WWE brands, became a WrestleMania mainstay.
    2010 saw a second and third Money in the Bank ladder match when the Money in the Bank pay-per-view debuted in July. Unlike
    the matches at WrestleMania, this new event featured two such ladder matches â€“ one each for a contract for the WWE Championship
    and World Heavyweight Championship, respectively.
  - The Suite Life on Deck The Suite Life on Deck is an American sitcom that aired on Disney Channel from September 26, 2008
    to May 6, 2011. It is a sequel/spin-off of the Disney Channel Original Series The Suite Life of Zack & Cody. The series
    follows twin brothers Zack and Cody Martin and hotel heiress London Tipton in a new setting, the SS Tipton, where they
    attend classes at "Seven Seas High School" and meet Bailey Pickett while Mr. Moseby manages the ship. The ship travels
    around the world to nations such as Italy, France, Greece, India, Sweden and the United Kingdom where the characters experience
    different cultures, adventures, and situations.[1]
  - 'Send In the Clowns "Send In the Clowns" is a song written by Stephen Sondheim for the 1973 musical A Little Night Music,
    an adaptation of Ingmar Bergman''s film Smiles of a Summer Night. It is a ballad from Act Two, in which the character
    Desirée reflects on the ironies and disappointments of her life. Among other things, she looks back on an affair years
    earlier with the lawyer Fredrik, who was deeply in love with her but whose marriage proposals she had rejected. Meeting
    him after so long, she realizes she is in love with him and finally ready to marry him, but now it is he who rejects her:
    he is in an unconsummated marriage with a much younger woman. Desirée proposes marriage to rescue him from this situation,
    but he declines, citing his dedication to his bride. Reacting to his rejection, Desirée sings this song. The song is later
    reprised as a coda after Fredrik''s young wife runs away with his son, and Fredrik is finally free to accept Desirée''s
    offer.[1]'
