  - source_sentence: what primary plant tissue is involved in transport of minerals
    sentences:
    - The ground tissue comprises the bulk of the primary plant body. Parenchyma, collenchyma, and sclerenchyma cells are
      common in the ground tissue. Vascular tissue transports food, water, hormones and minerals within the plant. Vascular
      tissue includes xylem, phloem, parenchyma, and cambium cells. Two views of the structure of the root and root meristem.
    - Â· just now. Report Abuse. 1.Water transport-in xylem from the roots up the plant. A passive process = transpiration
      2.Sugar transport-sucrose is the main sugar transported in phloem from leaves up and down the plant. An active process-needs
      ATP.Process called translocation Look up transpiration and translocation Discuss the cells used in each, the direction
      and the mechanism. Peter S Â· 6 years ago.ugar i.e. glucose is produced in leaves (green parts of the plant) and it
      is transported to other parts of the plants such as reproductive organs, fruits and seeds, roots and stem (growing tips
      etc) through phloem tissue. Xylems are made up of dead cells while phloem tissue is made up of living cells.
    - 1 of 6. Plants have tissues to transport water, nutrients and minerals. Xylem transports water and mineral salts from
      the roots up to other parts of the plant, while phloem transports sucrose and amino acids between the leaves and other
      parts of the plant. Xylem and phloem in the centre of the plant root.
    - Xylem is one of two types of vascular tissues found in plant (the other being Phloem). The word Xylem is derived from
      the Greek for wood. The xylem is responsible for the transport (translocation) of water and soluble mineral nutrients
      from the roots throughout the plant, this facilitates the replacement of water lost during transpiration and photosynthesis.
    - Various vascular tissues in the root allow for transportation of water and nutrients to the rest of theplant.Plant cells
      have a cell wall to provide support, a large vacuole for storage of minerals, food, andchloroplasts where photosynthesis
      takes place.
    - The function of the phloem tissue is to transport food nutrients such as glucose and amino acids from the leaves and
      to all other cells of the plant, this is called translocation.
    - Plants have tissues to transport water, nutrients and minerals. Xylem transports water and mineral salts from the roots
      up to other parts of the plant, while phloem transports sucrose and amino acids between the leaves and other parts of
      the plant. Xylem and phloem in the centre of the plant root
    - Seed plants contain 2 types of vascular tissue (xylem & phloem) to help transport water, minerals, & food throughout
      the root & shoot systems.Plant cells have several specialized structures including a central vacuole for storage, plastids
      for storage of pigments, and a thick cell wall of cellulose.lants have 3 tissue systems --- ground, dermal, and vascular
      tissues. Plant tissues make up the main organs of a plant --- root, stem, leaf, & flower.
    - 'This article is about vascular tissue in plants. For transport in animals, see Circulatory system. Vascular tissue
      is a complex conducting tissue, formed of more than one cell type, found in vascular plants. The primary components
      of vascular tissue are the xylem and phloem. These two tissues transport fluid and nutrients internally. There are also
      two meristems associated with vascular tissue: the vascular cambium and the cork cambium. All the vascular tissues within
      a particular plant together constitute the vascular tissue system of that plant. The cells in vascular tissue are typically
      long and slender. Since the xylem and phloem function in the conduction of water, minerals, and nutrients throughout
      the plant, it is not surprising that their form should be similar to pipes.'
