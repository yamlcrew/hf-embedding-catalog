  - source_sentence: what does ly mean in a blood test
    sentences:
    - According to the Hormone-Refractory Prostate Cancer Association, LY on a blood test stands for lymphocytes. The number
      in the results represents the percentage of lymphocytes in the white blood count. Lymphocytes should count for 15 to
      46.8 percent of white blood cells. Continue Reading.
    - FROM OUR EXPERTS. Trace lysed blood refers to a finding that is usually reported from a urinary dip stick analysis.
      It implies that there is a small quantity of red cells in the urine that have broken open. The developer on the dip
      stick reacts with the hemoglobin that is released when the red cells are lysed.
    - Does anybody know what LM and TFT in blood testing is please? Does anybody know what LM and TFT in blood testing is
      please? TFT is Thyroid Function Tests , usually done as a series of tests for TSH (Thyroid-stimulating hormone) and
      for the T3 (Triiodothyronine) and T4 ( Thyroxine), which are the hormones produced by the thyroid gland.
    - Uses. A blood lipid test measures the levels of HDL (high-density lipoprotein) cholesterol and LDL (low-density lipoprotein)
      cholesterol in the blood as well as triglycerides. These results can help doctors determine patients' health status.
    - It is found in almost all body tissues and can be measured by a simple blood test. Normal LDH levels are generally low
      and range between 140 IU/liter to 333 IU/ liter. Low LDH levels are usually no cause for concern. However, elevated
      LDH levels may indicate cell damage.
    - Usually, an LFT blood test measures the amount of bilirubin in the blood. Bilirubin is released when red blood cells
      breakdown, and it is the liver that detoxifies the bilirubin and helps to eliminate it from the body. Bilirubin is a
      part of the digestive juice, bile, which the liver produces.
    - 'Medical Definition of LYE. 1. : a strong alkaline liquor rich in potassium carbonate leached from wood ashes and used
      especially in making soap and washing; broadly: a strong alkaline solution (as of sodium hydroxide or potassium hydroxide).
      2.: a solid caustic (as sodium hydroxide).edical Definition of LYE. 1. : a strong alkaline liquor rich in potassium
      carbonate leached from wood ashes and used especially in making soap and washing; broadly: a strong alkaline solution
      (as of sodium hydroxide or potassium hydroxide). 2. : a solid caustic (as sodium hydroxide).'
    - FROM OUR COMMUNITY. Hi Terry, The LY (Lymphocytes) in your blood test is; the type of white blood cell found in the
      blood and lymph systems; part of the immune system. BUN/CREAT - Bun and Creatinine are tests done to monitor kidney
      function. I'm sorry, but I've never heard of the other 2.
    - The Lactic Acid Plasma Test, or Lactate Test, measures the amount of lactate in the blood to determine if a patient
      has lactic acidosis.he test may be ordered at prescribed intervals to monitor lactate levels. The Lactate Test is also
      known as Lactic Acid, Plasma Lactate, and L-Lactate. Patients will be instructed to fast prior to this blood test and
      be in a resting state.
