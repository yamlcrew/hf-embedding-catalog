  - Vallabhbhai Patel As the first Home Minister and Deputy Prime Minister of India, Patel organised relief efforts for refugees
    fleeing from Punjab and Delhi and worked to restore peace across the nation. He led the task of forging a united India,
    successfully integrating into the newly independent nation those British colonial provinces that had been "allocated"
    to India. Besides those provinces that had been under direct British rule, approximately 565 self-governing princely states
    had been released from British suzerainty by the Indian Independence Act of 1947. Employing frank diplomacy with the expressed
    option to deploy military force, Patel persuaded almost every princely state to accede to India. His commitment to national
    integration in the newly independent country was total and uncompromising, earning him the sobriquet "Iron Man of India".[3]
    He is also affectionately remembered as the "Patron saint of India's civil servants" for having established the modern
    all-India services system. He is also called the Unifier of India.[4]
  - National debt of the United States As of July 31, 2018, debt held by the public was $15.6 trillion and intragovernmental
    holdings were $5.7 trillion, for a total or "National Debt" of $21.3 trillion.[5] Debt held by the public was approximately
    77% of GDP in 2017, ranked 43rd highest out of 207 countries.[6] The Congressional Budget Office forecast in April 2018
    that the ratio will rise to nearly 100% by 2028, perhaps higher if current policies are extended beyond their scheduled
    expiration date.[7] As of December 2017, $6.3 trillion or approximately 45% of the debt held by the public was owned by
    foreign investors, the largest being China (about $1.18 trillion) then Japan (about $1.06 trillion).[8]
