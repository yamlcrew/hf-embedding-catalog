widgetData:
- text: Rollin' (Limp Bizkit song) The music video was filmed atop the South Tower of the former World Trade Center in New
    York City. The introduction features Ben Stiller and Stephen Dorff mistaking Fred Durst for the valet and giving him the
    keys to their Bentley Azure. Also making a cameo is break dancer Mr. Wiggles. The rest of the video has several cuts to
    Durst and his bandmates hanging out of the Bentley as they drive about Manhattan. The song Ben Stiller is playing at the
    beginning is "My Generation" from the same album. The video also features scenes of Fred Durst with five girls dancing
    in a room. The video was filmed around the same time as the film Zoolander, which explains Stiller and Dorff's appearance.
    Fred Durst has a small cameo in that film.
- text: 'Maze Runner: The Death Cure On April 22, 2017, the studio delayed the release date once again, to February 9, 2018,
    in order to allow more time for post-production; months later, on August 25, the studio moved the release forward two
    weeks.[17] The film will premiere on January 26, 2018 in 3D, IMAX and IMAX 3D.[18][19]'
- text: who played the dj in the movie the warriors
- text: Lionel Messi Born and raised in central Argentina, Messi was diagnosed with a growth hormone deficiency as a child.
    At age 13, he relocated to Spain to join Barcelona, who agreed to pay for his medical treatment. After a fast progression
    through Barcelona's youth academy, Messi made his competitive debut aged 17 in October 2004. Despite being injury-prone
    during his early career, he established himself as an integral player for the club within the next three years, finishing
    2007 as a finalist for both the Ballon d'Or and FIFA World Player of the Year award, a feat he repeated the following
    year. His first uninterrupted campaign came in the 2008â€“09 season, during which he helped Barcelona achieve the first
    treble in Spanish football. At 22 years old, Messi won the Ballon d'Or and FIFA World Player of the Year award by record
    voting margins.
- text: 'Send In the Clowns "Send In the Clowns" is a song written by Stephen Sondheim for the 1973 musical A Little Night
    Music, an adaptation of Ingmar Bergman''s film Smiles of a Summer Night. It is a ballad from Act Two, in which the character
    Desirée reflects on the ironies and disappointments of her life. Among other things, she looks back on an affair years
    earlier with the lawyer Fredrik, who was deeply in love with her but whose marriage proposals she had rejected. Meeting
    him after so long, she realizes she is in love with him and finally ready to marry him, but now it is he who rejects her:
    he is in an unconsummated marriage with a much younger woman. Desirée proposes marriage to rescue him from this situation,
    but he declines, citing his dedication to his bride. Reacting to his rejection, Desirée sings this song. The song is later
    reprised as a coda after Fredrik''s young wife runs away with his son, and Fredrik is finally free to accept Desirée''s
    offer.[1]'
