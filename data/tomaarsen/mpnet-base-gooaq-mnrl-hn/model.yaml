- source_sentence: are barrettes bad for hair?
  sentences:
  - 'We hear this question quite often: Are Synthetic Dreads harmful for my hair? The short answer for this is: no, dreadlocks
    are not harmful for your hair, provided that they have been installed the right way and providing that you have healthy
    hair!'
  - Hair, skin, and nail supplements commonly contain antioxidants such as vitamins A, C, and E, or Coenzyme Q10, as well
    as biotin, a B-complex vitamin. The minerals manganese and selenium are often found in supplements marketed for healthy
    hair, along with fatty acids such as fish oil and flaxseed oil.
  - Fruits rich in Vitamin C combat hair loss problems and help keep hair healthy. Figs contain nutrients that promote hair
    health, such as magnesium and Vitamins C and E, which help hair growth. The nutrients in this fruit stimulate blood circulation
    in the body to speed up hair growth.
  - Barrettes Anything that requires you putting bare metal into your hair should be avoided. The cheaper models can have
    sharp edges that can actually cut the hair and even the most well made barrettes will entangle hair in their clasping
    mechanism. They also tend to be smaller and can't hold much hair.
  - Just as getting the right nutrients helps keep your skin and internal organs healthy, nutrients can affect your hair growth
    too. Folic acid (vitamin B-9), when taken regularly as recommended, is just one of the nutrients that can promote overall
    healthy hair.
  - Lightening your hair with hydrogen peroxide can damage the cuticle, because the hydrogen peroxide needs to enter through
    your hair cuticle to dye the hair. Cuticle damage can lead to breakage, split ends, and frizz. Deep conditioner treatments
    will help reduce damage to the hair cuticle.
