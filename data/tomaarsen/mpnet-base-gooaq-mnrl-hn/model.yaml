- source_sentence: negative electrode is anode or cathode?
  sentences:
  - The anode is the electrode where electricity moves into. The cathode is the electrode where electricity is given out or
    flows out of. The anode is usually the positive side. A cathode is a negative side.
  - In electrochemistry, the anode is where oxidation occurs and is the positive polarity contact in an electrolytic cell.
    At the anode, anions (negative ions) are forced by the electrical potential to react chemically and give off electrons
    (oxidation) which then flow up and into the driving circuit.
  - In electrochemistry, the anode is where oxidation occurs and is the positive polarity contact in an electrolytic cell.
    At the anode, anions (negative ions) are forced by the electrical potential to react chemically and give off electrons
    (oxidation) which then flow up and into the driving circuit.
  - In a galvanic (voltaic) cell, the anode is considered negative and the cathode is considered positive. This seems reasonable
    as the anode is the source of electrons and cathode is where the electrons flow. However, in an electrolytic cell, the
    anode is taken to be positive while the cathode is now negative.
  - 'By definition: The anode is the electrode where oxidation (loss of electrons) takes place (metal-A electrode); in a galvanic
    cell, it is the negative electrode, because when oxidation occurs, electrons are left behind on the electrode.'
  - In electrochemistry, the anode is where oxidation occurs and is the positive polarity contact in an electrolytic cell.
    At the anode, anions (negative ions) are forced by the electrical potential to react chemically and give off electrons
    (oxidation) which then flow up and into the driving circuit.
