  - Sour salt is actually citric acid, a white crystalline compound with an acidic, tart taste; it is often used to furnish
    the sour taste element in sweet/sour dishes such as cabbage soup.
  - Cream of tartar, which is actually a byproduct of the winemaking process, is an acidic powder that is typically used in
    baking to stabilize eggs and creams, as well as adding volume and thickness to the final product.
  - Fumaric acid or trans-butenedioic acid is the chemical compound with the formula HO 2 CCH=CHCO 2 H. This white crystalline
    compound is one of two isomeric unsaturated dicarboxylic acids, the other being maleic acid.umaric acid has been used
    a food acidulant since 1946. It is approved for use as a food additive in the EU, USA and Australia and New Zealand. As
