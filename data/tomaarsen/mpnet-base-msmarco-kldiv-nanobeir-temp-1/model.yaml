- source_sentence: wht is tartaric acid
  sentences:
  - Tartaric Acid. Tartaric acid is a naturally occurring organic acid which appears as a white crystalline solid at room
    temperature. Foods such as grapes, apricots, avocados, apples and sunflower seeds have all been known to have high concentrations
    of the acid.Alternatively, it has also been found in tamarinds which are a type of tree indigenous to tropical Africa
    and other warms parts of the world.ses. As mentioned above, Mexican cuisine relies heavily on the use of tartaric acid
    which, when combined with baking soda, acts as a leavening agent. The acid also plays a major role in wine-making where
    it is used during the fermentation process for acidity adjustments to make for a more palate pleasing taste.
  - Send Enquiry. Tartaric Acid. Tartaric acid is a white crystalline diprotic organic acid. It occurs naturally in many plants,
    particularly grapes, bananas, and tamarinds, and is one of the main acids found in wine.It is added to other foods to
    give a sour taste, and is used as anantioxidant. Salts of tartaric acid are known as tartrates.end Enquiry. Tartaric Acid.
    Tartaric acid is a white crystalline diprotic organic acid. It occurs naturally in many plants, particularly grapes, bananas,
