    distribution spreads out.
  - So if you want a bell curve chart, you first have to enter the right data. In this tutorial, we select a range of numbers
    corresponding to a Mean average and a Standard Deviation. After applying Excel's Normal Distribution function to those
    numbers, Excel gives you a perfectly-formed bell curve.
  - "With standardized IQ tests, IQ tests are designed so that their scores have a â\x80\x98bell curveâ\x80\x99 distribution\
    \ in the general population with an average of 100. This curve has a peak in the middle where most people score and tapering\
    \ ends where only a few people score. In statistics this is called a normal distribution."
  - "Definition: The term bell curve is used to describe the mathematical concept called normal distribution, sometimes referred\
    \ to as Gaussian distribution. â\x80\x98Bell curveâ\x80\x99 refers to the shape that is created when a line is plotted\
    \ using the data points for an item that meets the criteria of â\x80\x98normal distributionâ\x80\x99.he important things\
    \ to note about a normal distribution is the curve is concentrated in the center and decreases on either side. This is\
    \ significant in that the data has less of a tendency to produce unusually extreme values, called outliers, as compared\
    \ to other distributions."
