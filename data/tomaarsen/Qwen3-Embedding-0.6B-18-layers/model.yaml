  sentences:
  - The Invisible Man Griffin is the surname of the story's protagonist. His name is not mentioned until about halfway through
    the book. Consumed with his greed for power and fame, he is the model of science without humanity. A gifted young student,
    he becomes interested in the science of refraction. During his experiments, he accidentally discovers chemicals (combined
    with an unspecified kind of radiation) that would make living tissue invisible. Obsessed with his discovery, he tries
    the experiment on himself and becomes invisible. However, he does not know how to reverse the process, and he slowly discovers
    that the advantages of being invisible do not outweigh the disadvantages and the problems he faces. Thus begins his downfall
    as he takes the road to crime for his survival, revealing in the process his lack of conscience, inhumanity and complete
    selfishness. He progresses from obsession to fanaticism, to insanity, and finally to his fateful end.
  - 'Instruct: Given a web search query, retrieve relevant passages that answer the query

    Query:who did the united states become independent from'
  - Jordan Belfort Jordan Ross Belfort (/ˈbɛlfɔːrt/; born July 9, 1962) is an American author, motivational speaker, and former
    stockbroker. In 1999, he pleaded guilty to fraud and related crimes in connection with stock-market manipulation and running
    a boiler room as part of a penny-stock scam. Belfort spent 22 months in prison as part of an agreement under which he
    gave testimony against numerous partners and subordinates in his fraud scheme.[5] He published the memoir The Wolf of
    Wall Street, which was adapted into a film and released in 2013.
