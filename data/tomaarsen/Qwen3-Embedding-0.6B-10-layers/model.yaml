    stockbroker. In 1999, he pleaded guilty to fraud and related crimes in connection with stock-market manipulation and running
    a boiler room as part of a penny-stock scam. Belfort spent 22 months in prison as part of an agreement under which he
    gave testimony against numerous partners and subordinates in his fraud scheme.[5] He published the memoir The Wolf of
    Wall Street, which was adapted into a film and released in 2013.
