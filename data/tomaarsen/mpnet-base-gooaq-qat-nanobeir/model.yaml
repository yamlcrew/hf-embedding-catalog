config:
  architectures:
  - MPNetModel
  model_type: mpnet
  tokenizer_config:
    bos_token: <s>
    cls_token: <s>
    eos_token: </s>
    mask_token: <mask>
    pad_token: <pad>
    sep_token: </s>
    unk_token: '[UNK]'
cardData:
  language:
  - en
  license: apache-2.0
  tags:
  - sentence-transformers
  - sentence-similarity
  - feature-extraction
  - dense
  - generated_from_trainer
  - dataset_size:90000
  - loss:QuantizationAwareLoss
  - loss:MultipleNegativesRankingLoss
  base_model: microsoft/mpnet-base
  widget:
  - source_sentence: what is the difference between trojan virus and worm?
    sentences:
    - Worms spread from computer to computer, but unlike a virus, it has the capability to travel without any help from a
      person. ... A Trojan horse is not a virus. It is a destructive program that looks as a genuine application. Unlike viruses,
      Trojan horses do not replicate themselves but they can be just as destructive.
    - You're usually no longer infectious 24 hours after starting a course of antibiotics, but this time period can sometimes
      vary. For example, the antibiotics may take longer to work if your body takes longer to absorb them, or if you're taking
      other medicine that interacts with the antibiotics.
    - Eating salt raises the amount of sodium in your bloodstream and wrecks the delicate balance, reducing the ability of
      your kidneys to remove the water. The result is a higher blood pressure due to the extra fluid and extra strain on the
      delicate blood vessels leading to the kidneys.
  - source_sentence: which are the neighbouring countries of pakistan?
    sentences:
