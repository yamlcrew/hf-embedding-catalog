    are worried about your account being compromised. They're very unlikely to do anything, but if something goes wrong, at
    least you can prove you forewarned them.
  - 1) Under Section 80CCD(1), investment in Atal Pension Yojana or NPS up to ₹ 1.5 lakh qualifies for income tax deduction.
    But remember that the total amount of deduction under sections 80C, 80CCC and 80CCD cannot exceed ₹ 1.5 lakh.
  - 1GB (or 1024MB) of data lets you send or receive about 1,000 emails and browse the Internet for about 20 hours every month.
    (This limit relates only to your 1GB mobile data allocation; if you are an 'inclusive mobile broadband customer' you also
    get 2000 BT Wi-fi wi-fi minutes every month.)
- source_sentence: how many carbon atoms are in carbon dioxide?
  sentences:
  - For CO2 there is one atom of carbon and two atoms of oxygen. For H2O, there is one atom of oxygen and two atoms of hydrogen.
    A molecule can be made of only one type of atom.
  - Avian influenza refers to the disease caused by infection with avian (bird) influenza (flu) Type A viruses. These viruses
    occur naturally among wild aquatic birds worldwide and can infect domestic poultry and other bird and animal species.
    Avian flu viruses do not normally infect humans.
  - At the end of "Inception," Dom Cobb (Leonardo DiCaprio) finally returns home to his kids after spending a long time in
    the dream world. Cobb carries a little top with him. If the top keeps spinning, that means he is in a dream. ... The final
    shot shows the top spinning, but it never reveals whether it falls over.
- source_sentence: is duchenne muscular dystrophy a dominant or recessive trait?
  sentences:
  - Duchenne muscular dystrophy is inherited in an X-linked recessive pattern. Males have only one copy of the X chromosome
    from their mother and one copy of the Y chromosome from their father. If their X chromosome has a DMD gene mutation, they
    will have Duchenne muscular dystrophy.
  - An automatic transmission will downshift for you when you drive uphill. However, for moderately steep slopes, it's wise
    to shift to the gear range marked D2, 2, or L to ascend and descend the hill. For steep slopes that you can't ascend at
    a speed faster than 10 mph (about 15 kph), shift to D1 or 1.
  - The dream suggests captivity and it refers to your fear of punishment. Another interpretation of this dream refers to
    a need to do what you feel is right in waking life. Being in jail suggests that your feelings may be trapped by a limited
    mind and body. ... Jail also suggests repressed feelings.
