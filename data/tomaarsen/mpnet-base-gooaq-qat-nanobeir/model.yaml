- source_sentence: what is the difference between trojan virus and worm?
  sentences:
  - Worms spread from computer to computer, but unlike a virus, it has the capability to travel without any help from a person.
    ... A Trojan horse is not a virus. It is a destructive program that looks as a genuine application. Unlike viruses, Trojan
    horses do not replicate themselves but they can be just as destructive.
  - You're usually no longer infectious 24 hours after starting a course of antibiotics, but this time period can sometimes
    vary. For example, the antibiotics may take longer to work if your body takes longer to absorb them, or if you're taking
    other medicine that interacts with the antibiotics.
  - Eating salt raises the amount of sodium in your bloodstream and wrecks the delicate balance, reducing the ability of your
    kidneys to remove the water. The result is a higher blood pressure due to the extra fluid and extra strain on the delicate
    blood vessels leading to the kidneys.
- source_sentence: which are the neighbouring countries of pakistan?
  sentences:
  - Pakistan is bordered by India on the east, the Arabian Sea on the south, Iran on the southwest, and Afghanistan on the
    west and north; in the northeast is the disputed territory (with India) of Kashmir, of which the part occupied by Pakistan
    borders on China.
  - Age is a big factor when it comes to how much sleep a dog needs. Just as human babies need a lot of sleep, the AKC notes
    your puppy needs 15-20 hours of sleep a day to help his central nervous system, immune system and muscles develop properly.
  - 'Step 1: Connect your iPhone to your computer using n USB cable through any of the USB ports available on your computer.
    Step 2: Open iTunes, click the "Files" tab and check the boxes to sync or transfer your files. Step 3: Select your desired
    destination folder for the files and click "Sync" to complete the transfer.'
- source_sentence: what can you do with 1gb of data?
  sentences:
