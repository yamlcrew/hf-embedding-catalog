  - Economy of New Zealand New Zealand's diverse market economy has a sizable service sector, accounting for 63% of all GDP
    activity in 2013.[17] Large scale manufacturing industries include aluminium production, food processing, metal fabrication,
    wood and paper products. Mining, manufacturing, electricity, gas, water, and waste services accounted for 16.5% of GDP
    in 2013.[17] The primary sector continues to dominate New Zealand's exports, despite accounting for 6.5% of GDP in 2013.[17]
  - John Dalton John Dalton FRS (/ˈdɔːltən/; 6 September 1766 – 27 July 1844) was an English chemist, physicist, and meteorologist.
    He is best known for proposing the modern atomic theory and for his research into colour blindness, sometimes referred
    to as Daltonism in his honour.
- source_sentence: who was the first president of indian science congress meeting held in kolkata in 1914
  sentences:
  - Nobody to Blame "Nobody to Blame" is a song recorded by American country music artist Chris Stapleton. The song was released
    in November 2015 as the singer's third single overall. Stapleton co-wrote the song with Barry Bales and Ronnie Bowman.
    It became Stapleton's first top 10 single on the US Country Airplay chart.[2] "Nobody to Blame" won Song of the Year at
    the ACM Awards.[3]
  - Indian Science Congress Association The first meeting of the congress was held from 15â€“17 January 1914 at the premises
    of the Asiatic Society, Calcutta. Honorable justice Sir Ashutosh Mukherjee, the then Vice Chancellor of the University
    of Calcutta presided over the Congress. One hundred and five scientists from different parts of India and abroad attended
    it. Altogether 35 papers under 6 different sections, namely Botany, Chemistry, Ethnography, Geology, Physics and Zoology
    were presented.
  - New Soul "New Soul" is a song by the French-Israeli R&B/soul singer Yael Naïm, from her self-titled second album. The
    song gained popularity in the United States following its use by Apple in an advertisement for their MacBook Air laptop.
    In the song Naïm sings of being a new soul who has come into the world to learn "a bit 'bout how to give and take." However,
    she finds that things are harder than they seem. The song, also featured in the films The House Bunny and Wild Target,
    features a prominent "la la la la" section as its hook. It remains Naïm's biggest hit single in the U.S. to date, and
    her only one to reach the Top 40 of the Billboard Hot 100.
- source_sentence: who wrote get over it by the eagles
  sentences:
  - Get Over It (Eagles song) "Get Over It" is a song by the Eagles released as a single after a fourteen-year breakup. It
    was also the first song written by bandmates Don Henley and Glenn Frey when the band reunited. "Get Over It" was played
    live for the first time during their Hell Freezes Over tour in 1994. It returned the band to the U.S. Top 40 after a fourteen-year
    absence, peaking at No. 31 on the Billboard Hot 100 chart. It also hit No. 4 on the Billboard Mainstream Rock Tracks chart.
    The song was not played live by the Eagles after the "Hell Freezes Over" tour in 1994. It remains the group's last Top
    40 hit in the U.S.
  - Pokhran-II In 1980, the general elections marked the return of Indira Gandhi and the nuclear program began to gain momentum
    under Ramanna in 1981. Requests for additional nuclear tests were continued to be denied by the government when Prime
    Minister Indira Gandhi saw Pakistan began exercising the brinkmanship, though the nuclear program continued to advance.[7]
    Initiation towards hydrogen bomb began as well as the launch of the missile programme began under Late president Dr. Abdul
    Kalam, who was then an aerospace engineer.[7]
  - R. Budd Dwyer Robert Budd Dwyer (November 21, 1939 – January 22, 1987) was the 30th State Treasurer of the Commonwealth
    of Pennsylvania. He served from 1971 to 1981 as a Republican member of the Pennsylvania State Senate representing the
    state's 50th district. He then served as the 30th Treasurer of Pennsylvania from January 20, 1981, until his death. On
    January 22, 1987, Dwyer called a news conference in the Pennsylvania state capital of Harrisburg where he killed himself
    in front of the gathered reporters, by shooting himself in the mouth with a .357 Magnum revolver.[4] Dwyer's suicide was
    broadcast later that day to a wide television audience across Pennsylvania.
