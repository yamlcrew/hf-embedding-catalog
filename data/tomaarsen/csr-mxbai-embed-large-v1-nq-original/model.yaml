    - R. Budd Dwyer Robert Budd Dwyer (November 21, 1939 – January 22, 1987) was the 30th State Treasurer of the Commonwealth
      of Pennsylvania. He served from 1971 to 1981 as a Republican member of the Pennsylvania State Senate representing the
      state's 50th district. He then served as the 30th Treasurer of Pennsylvania from January 20, 1981, until his death.
