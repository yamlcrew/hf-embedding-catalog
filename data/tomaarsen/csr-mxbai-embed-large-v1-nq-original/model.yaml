  - 'Monopoly Junior Players take turns in order, with the initial player determined by age before the game: the youngest
    player goes first. Players are dealt an initial amount Monopoly money depending on the total number of players playing:
    20 in a two-player game, 18 in a three-player game or 16 in a four-player game. A typical turn begins with the rolling
    of the die and the player advancing their token clockwise around the board the corresponding number of spaces. When the
    player lands on an unowned space they must purchase the space from the bank for the amount indicated on the board, and
    places a sold sign on the coloured band at the top of the space to denote ownership. If a player lands on a space owned
    by an opponent the player pays the opponent rent in the amount written on the board. If the opponent owns both properties
    of the same colour the rent is doubled.'
