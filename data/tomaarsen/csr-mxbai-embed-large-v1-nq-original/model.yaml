      Bowman. It became Stapleton's first top 10 single on the US Country Airplay chart.[2] "Nobody to Blame" won Song of
      the Year at the ACM Awards.[3]
    - Indian Science Congress Association The first meeting of the congress was held from 15â€“17 January 1914 at the premises
      of the Asiatic Society, Calcutta. Honorable justice Sir Ashutosh Mukherjee, the then Vice Chancellor of the University
      of Calcutta presided over the Congress. One hundred and five scientists from different parts of India and abroad attended
      it. Altogether 35 papers under 6 different sections, namely Botany, Chemistry, Ethnography, Geology, Physics and Zoology
      were presented.
    - New Soul "New Soul" is a song by the French-Israeli R&B/soul singer Yael Naïm, from her self-titled second album. The
      song gained popularity in the United States following its use by Apple in an advertisement for their MacBook Air laptop.
      In the song Naïm sings of being a new soul who has come into the world to learn "a bit 'bout how to give and take."
      However, she finds that things are harder than they seem. The song, also featured in the films The House Bunny and Wild
      Target, features a prominent "la la la la" section as its hook. It remains Naïm's biggest hit single in the U.S. to
      date, and her only one to reach the Top 40 of the Billboard Hot 100.
  - source_sentence: who wrote get over it by the eagles
