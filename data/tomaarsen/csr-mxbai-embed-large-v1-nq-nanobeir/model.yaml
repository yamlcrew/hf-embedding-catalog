  - text: Get Over It (Eagles song) "Get Over It" is a song by the Eagles released as a single after a fourteen-year breakup.
      It was also the first song written by bandmates Don Henley and Glenn Frey when the band reunited. "Get Over It" was
      played live for the first time during their Hell Freezes Over tour in 1994. It returned the band to the U.S. Top 40
      after a fourteen-year absence, peaking at No. 31 on the Billboard Hot 100 chart. It also hit No. 4 on the Billboard
      Mainstream Rock Tracks chart. The song was not played live by the Eagles after the "Hell Freezes Over" tour in 1994.
      It remains the group's last Top 40 hit in the U.S.
