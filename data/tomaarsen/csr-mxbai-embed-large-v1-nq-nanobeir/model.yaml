  widget:
  - text: Saudi Arabia–United Arab Emirates relations However, the UAE and Saudi Arabia continue to take somewhat differing
      stances on regional conflicts such the Yemeni Civil War, where the UAE opposes Al-Islah, and supports the Southern Movement,
      which has fought against Saudi-backed forces, and the Syrian Civil War, where the UAE has disagreed with Saudi support
      for Islamist movements.[4]
  - text: Economy of New Zealand New Zealand's diverse market economy has a sizable service sector, accounting for 63% of
      all GDP activity in 2013.[17] Large scale manufacturing industries include aluminium production, food processing, metal
      fabrication, wood and paper products. Mining, manufacturing, electricity, gas, water, and waste services accounted for
      16.5% of GDP in 2013.[17] The primary sector continues to dominate New Zealand's exports, despite accounting for 6.5%
