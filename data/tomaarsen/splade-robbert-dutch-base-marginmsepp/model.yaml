- text: Welke van de buikspieren is het meest oppervlakkig?
- text: Hebben kassasystemen internet nodig
- text: Hagel is neerslag in de vorm van grote ballen of klompen ijs. Begin vorige week was er een storm die hagel produceerde.
    Hagel begint als kleine ijsdeeltjes die voornamelijk groeien door accretie; om groot te worden, hebben ze overvloedige
    waterdruppels nodig. Terwijl de hagelsteen naar boven en naar beneden beweegt door de storm, botst hij tegen waterdruppels,
    waardoor hij met elke botsing groter wordt. Hagelstenen kunnen zo groot worden als sinaasappels en grapefruits. Hagelstenen
    beginnen als kleine ijsdeeltjes die voornamelijk groeien door accretie; om groot te worden, hebben ze overvloedige waterdruppels
    nodig. Terwijl de hagelsteen naar boven en naar beneden beweegt door een storm, botst hij tegen waterdruppels, waardoor
    hij met elke botsing groter wordt. Hagelstenen kunnen zo groot worden als sinaasappels en grapefruits.
- text: wat is WIST
- text: Bij het bouwen met gietwanden wordt de vloeren van de kelder voorbereid alsof het een plaatvloer is, vaak met de betonnen
    vloer die wordt gestort nadat de bovenste verdiepingen zijn geplaatst en het dak, de ramen en de deuren zijn geïnstalleerd.
    De leidingen voor vloerdrainage en piping moeten worden aangelegd vóór het storten.
