      than water, which is why salt water does not freeze as quickly as pure water. This lower freezing point is what enables
      salt to melt ice and snow. When you spread salt on ice, it acts almost like a molecular sponge. It draws some of the
      frozen water molecules to it and, because of its lower freezing point, breaks the molecular bonds between them. These
      broken molecular bonds cause the ice to melt, creating a brine that encourages further melting.
