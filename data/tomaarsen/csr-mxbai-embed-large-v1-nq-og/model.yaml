  - text: Saudi Arabia–United Arab Emirates relations However, the UAE and Saudi Arabia continue to take somewhat differing
      stances on regional conflicts such the Yemeni Civil War, where the UAE opposes Al-Islah, and supports the Southern Movement,
      which has fought against Saudi-backed forces, and the Syrian Civil War, where the UAE has disagreed with Saudi support
      for Islamist movements.[4]
  - text: Economy of New Zealand New Zealand's diverse market economy has a sizable service sector, accounting for 63% of
      all GDP activity in 2013.[17] Large scale manufacturing industries include aluminium production, food processing, metal
      fabrication, wood and paper products. Mining, manufacturing, electricity, gas, water, and waste services accounted for
      16.5% of GDP in 2013.[17] The primary sector continues to dominate New Zealand's exports, despite accounting for 6.5%
      of GDP in 2013.[17]
  - text: who was the first president of indian science congress meeting held in kolkata in 1914
  - text: Get Over It (Eagles song) "Get Over It" is a song by the Eagles released as a single after a fourteen-year breakup.
      It was also the first song written by bandmates Don Henley and Glenn Frey when the band reunited. "Get Over It" was
      played live for the first time during their Hell Freezes Over tour in 1994. It returned the band to the U.S. Top 40
      after a fourteen-year absence, peaking at No. 31 on the Billboard Hot 100 chart. It also hit No. 4 on the Billboard
      Mainstream Rock Tracks chart. The song was not played live by the Eagles after the "Hell Freezes Over" tour in 1994.
      It remains the group's last Top 40 hit in the U.S.
  - text: 'Cornelius the Centurion Cornelius (Greek: Κορνήλιος) was a Roman centurion who is considered by Christians to be
      one of the first Gentiles to convert to the faith, as related in Acts of the Apostles.'
