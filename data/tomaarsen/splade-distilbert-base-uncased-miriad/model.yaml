- text: "He does it right, but there are times that he doesn't (Joana) Let's go there and pee? Because she does not want to\
    \ wear a diaper, she rips off her diaper (Filomena). The family caregiver may understand this action as a \"pang\" and\
    \ \"tantrum\", and \"forget\" that these episodes are part of the clinical picture of dementia. Conflicts related to incontinence\
    \ and other difficult-to-manage symptoms eventually lead to a variety of interpretations, and past history of the emotional\
    \ relationship between the elderly and the family caregiver can cause older emotional issues to surface again in these\
    \ episodes.\n\n With psycho-functional limitations, new demands arise that can be distressing for those who care because\
    \ of affective involvement. Subjective constructions are fundamental elements in upkeeping the relationship of care 10\
    \ .\n\n Besides the psychological aspect involved in the loss of identity and the specific cognitive aspects of dementia,\
    \ some behavioral and psychiatric changes are important even in the consultation with the ESF professionals: psychotic\
    \ symptoms, agitation and aggression, mood swings, disinhibited behavior and euphoria, apathy and insomnia. Some studies\
    \ [11] [12] [13] pointed out the significant association between the presence of apathy and a faster cognitive and functional\
    \ decline in these patients. Another very relevant situation regarding the appearance of neuropsychiatric symptoms is\
    \ the association of these symptoms with the institutionalization and shorter patient survival. They also showed that\
    \ the highest Neuropsychiatric Inventory (NPI) score was signifi-cantly associated with more severe cognitive impairment,\
    \ greater caregiver distress, and higher cost, but was not associated with a formal diagnosis of dementia performed by\
    \ the primary care physician.\n\n Changed behaviors and even risky behaviors, such as turning on the gas switch and not\
    \ turning off, stirring in pots on a hot stove, or ingestion of liquids or toxic materials are situations in the face\
    \ of neuropsychiatric manifestations in dementia. Filomena reports several neuropsychiatric symptoms of her husband. She\
    \ compares his behavior to that of children who explore the environment to discover the cause and effect of things and\
    \ the sensations obtained by the senses. Her role in this context resembles that of a mother trying to prevent the child\
    \ from getting hurt: He lights up the gas switch, he's just like a child, sometimes he starts to eat the slipper, I have\
    \ to get it out of his mouth.\n\n Hallucination is another neuropsychiatric symptom described by family caregivers. Joana\
    \ reports that when the husband talks to people who have died, the family members feel fear and distance themselves. Filomena\
    \ has fun when her mother speaks with those who have died: \"She talks to those who have passed away, she sends the dog\
    \ out, which does not exist\". Each family caregiver experiences the symptoms presented by the dementia in a unique way,\
    \ and ways to address and interpret this phenomenon and give meaning to their experience.\n\n The negative development\
    \ of dementia perceived by Celina, Filomena, Maria, Teresa and Joana show that the disease follows a course that transcends\
    \ the biological event itself. The dementia process evidences psychological and sociocultural constructions permeated\
    \ by meanings and interpretations according to those who live and those who maintain interpersonal relationships with\
    \ the elderly person with dementia.\n\n In the discourse of family caregivers, seniors with dementia have aggressive behaviors\
    \ such as agitation, spitting, cursing, clawing, throwing objects, revealing a level of aggression that can impact the\
    \ feelings and interpretations produced during the care routine. Freud 14 affirms that human instincts are of two types:\
    \ Those who tend to preserve and unite, which we call 'erotic' [...] with a deliberate expansion of the popular conception\
    \ of 'sexuality'; and those who tend to destroy and kill, which we group as an aggressive or destructive instinct. All\
    \ actions in human life involve the confluence of these two instincts of preservation and destruction. The ideal situation\
    \ for life in society would be the dominance of reason over the instinctual life controlling destructive impulses, which\
    \ is utopian. In this perspective, aggressiveness is inherent in the human condition.\n\n In seniors with dementia with\
    \ a declining psychological realm of the Self, the progressive loss of identity and the repercussion of cognitive decline,\
    \ an actual decline in the rational realm of psychic life emerges. This decline refers to the cerebral aspect of inhibitory\
    \ control and social cognition, showing that the emergence of aggressive behaviors is related to the biological component.\
    \ The declining reason turns its demands and needs into instinctual acts and more basic reflexes, and can produce a continuous\
    \ imbalance in the expression between the instincts of preservation and aggression.\n\n Aggressiveness can be triggered\
    \ by situations of frustration, when they do not get what they want, when they are afraid or consider some humiliating\
    \ situation, when they are exposed to environmental overstimulation or feel any physical pain or side effects from medication."
- text: "Neurosurgery is of great interest to historians of medicine and technology because it is relatively young, because\
    \ it developed in an era of journals and publications, because lines and traditions of training and mentorship are relatively\
    \ clear, and because the technologies that enabled the evolution of the profession and acted as inflection points in the\
    \ emergence of certain surgical approaches and procedures are at once well documented and remarkably unambiguous. To the\
    \ extent that is the case for neurosurgery as a whole, it is even more so for surgery of the skull base.\n\n To trace\
    \ the history of skull base surgery along its full expanse is to begin with Horsley and pituitary tumors (unless one wants\
    \ to start even earlier with the treatment of trigeminal neuralgia); to move to Cushing's work in the same arena (but\
    \ also that of many others as well); to emphasize the impact of microsurgical techniques and new imaging modalities; to\
    \ outline once radically innovative, but now widely practiced anatomical approaches to the skull base; to emphasize the\
    \ importance of team approaches; to discuss emerging therapeutic strategy as well as instrumentation and techniques; to\
    \ acknowledge the importance of advances in neuroanesthesia and the medical and perioperative care of the neurosurgical\
    \ patient; and to recognize the contributions of the many individuals who, over the past 25 years, have added to and furthered\
    \ the field in these and other ways.\n\n It is not hard to point to leading individuals and important techniques. It is\
    \ perhaps more difficult to frame them in a meaningful historical perspective because the work has occurred relatively\
    \ recently, in the time frame historians call \"near history.\" Difficulties arise from both an evaluative and a nosological\
    \ standpoint. For example, from an evaluative standpoint, how does one stratify the relative importance of corticosteroids,\
    \ osmotic diuretics, and CSF drainage techniques and technologies in the control of intracranial pressure and the facilitation\
    \ of exposure for base of skull surgery? How does one think about the idea of hybrid surgery and stereotactic radiation?\
    \ What will be the long-term view of anatomical approaches to giant basilar aneurysms in the light of endovascular surgery?\
    \ Have we reached a tipping point in the management of vestibular schwannomas, given the availability of and the outcomes\
    \ associated with stereotactic radiosurgery?\n\n From a nosological standpoint, should we think about base of skull surgery\
    \ in terms of anatomical approaches? One textbook that does just that starts with subfrontal approaches and then moves\
    \ around the calvaria and down to the petrous and temporal region in a Cook's tour of exposure, in the tradition of Henry's\
    \ Extensile Exposure and comparable surgical classics. 1, 6 Other publications have explored a set of technologies. 5,\
    \ 7, 10 Another focuses on the contribution of great men. 9 Many surgeons have written about specific particular pathologies\
    \ at the skull base.\n\n Introduction their colleagues write about the premodern period. Elhadi and colleagues also comment\
    \ on the introduction of radiography in early neurosurgery. Gross and Grossi and their colleagues concentrate on petrosal\
    \ approaches; Schmitt and Jane on third ventriculostomy; and Chittiboina and colleagues on the history of a very simple\
    \ but ubiquitous instrument, the Freer elevator, and its inventor. In contrast to the more comprehensive overviews written\
    \ by Goodrich, Donald, and others, these essays concentrate on selected details. While it is important not to miss the\
    \ forest for the trees, sometimes the trees are worth studying no less than the forest. \n\n The authors report no conflict\
    \ of interest."
