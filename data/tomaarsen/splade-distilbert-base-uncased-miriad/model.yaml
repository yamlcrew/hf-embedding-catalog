      \ modalities; to outline once radically innovative, but now widely practiced anatomical approaches to the skull base;\
      \ to emphasize the importance of team approaches; to discuss emerging therapeutic strategy as well as instrumentation\
      \ and techniques; to acknowledge the importance of advances in neuroanesthesia and the medical and perioperative care\
      \ of the neurosurgical patient; and to recognize the contributions of the many individuals who, over the past 25 years,\
      \ have added to and furthered the field in these and other ways.\n\n It is not hard to point to leading individuals\
      \ and important techniques. It is perhaps more difficult to frame them in a meaningful historical perspective because\
      \ the work has occurred relatively recently, in the time frame historians call \"near history.\" Difficulties arise\
      \ from both an evaluative and a nosological standpoint. For example, from an evaluative standpoint, how does one stratify\
      \ the relative importance of corticosteroids, osmotic diuretics, and CSF drainage techniques and technologies in the\
      \ control of intracranial pressure and the facilitation of exposure for base of skull surgery? How does one think about\
      \ the idea of hybrid surgery and stereotactic radiation? What will be the long-term view of anatomical approaches to\
      \ giant basilar aneurysms in the light of endovascular surgery? Have we reached a tipping point in the management of\
      \ vestibular schwannomas, given the availability of and the outcomes associated with stereotactic radiosurgery?\n\n\
      \ From a nosological standpoint, should we think about base of skull surgery in terms of anatomical approaches? One\
      \ textbook that does just that starts with subfrontal approaches and then moves around the calvaria and down to the\
      \ petrous and temporal region in a Cook's tour of exposure, in the tradition of Henry's Extensile Exposure and comparable\
      \ surgical classics. 1, 6 Other publications have explored a set of technologies. 5, 7, 10 Another focuses on the contribution\
      \ of great men. 9 Many surgeons have written about specific particular pathologies at the skull base.\n\n Introduction\
      \ their colleagues write about the premodern period. Elhadi and colleagues also comment on the introduction of radiography\
      \ in early neurosurgery. Gross and Grossi and their colleagues concentrate on petrosal approaches; Schmitt and Jane\
      \ on third ventriculostomy; and Chittiboina and colleagues on the history of a very simple but ubiquitous instrument,\
      \ the Freer elevator, and its inventor. In contrast to the more comprehensive overviews written by Goodrich, Donald,\
      \ and others, these essays concentrate on selected details. While it is important not to miss the forest for the trees,\
      \ sometimes the trees are worth studying no less than the forest. \n\n The authors report no conflict of interest."
  - text: 'How do neuromediators contribute to the pathogenesis of pruritus in AD?

      '
  - text: "Pericardial effusion (PE) is a life-threatening condition, as accumulation of fluid in the pericardial sac can\
      \ lead to cardiac tamponade and fatal shock. 1, 2 PE is often associated with an underlying disease or condition, and\
      \ the causes can vary widely. 3, 4 Pericardiocentesis performed by needle (with or without echoguidance), and various\
      \ surgical procedures (including subxiphoid pericardial tube drainage, pericardial window performed through a left anterior\
      \ thoracotomy, or video-assisted thoracoscopic surgery) can alleviate PE. 5 Our retrospective clinical experiences of\
      \ treating PE with subxiphoid pericardiostomy are presented in this study.\n\n We reviewed the medical records of patients\
      \ who underwent subxiphoid pericardiostomy to treat persistent symptomatic PE in our clinic between 1990 and 2000. Echocardiography\
      \ (ECG) was used to diagnose PE and N Becit, A Özyazicioglu, M Ceviz et al.\n\n determine the size of the effusion.\
      \ A diastolic echo-free space of < 10 mm between the left ventricular posterior wall and pericardium was determined\
      \ as mild PE, 10 -20 mm as moderate, and > 20 mm as severe PE. Patients with cardiac tamponade and/or moderate to severe\
      \ PE were treated by subxiphoid pericardiostomy and tube drainage.\n\n Some patients with pre-operative tuberculosis\
      \ were treated with an adult fourdrug regimen (isoniazid, 300 mg/day and rifampin, 600 mg/day for 12 months, streptomycin,\
      \ 1 g/day for 2 months, and pyrazinamide, 2 g/day for 3 months) preoperatively. The effusion was drained after a 3-week\
      \ course of anti-tuberculosis therapy. In these, and patients diagnosed with tuberculous pericarditis, the tuberculosis\
      \ therapy regimen was given for 12 months post-operatively.\n\n The technique used for subxiphoid pericardiostomy (described\
      \ previously 3 ) was performed under general anaesthetic, or local anaesthesia and sedation. General anaesthesia was\
      \ preferred in children and was induced with 1.5 mg/kg ketamine. Neuromuscular block was achieved with 0.1 mg/kg vecuronium,\
      \ and anaesthesia maintained with 60% N 2 O, 40% O 2 and 0.5 -1.0% isoflurane. Local anaesthetic (2% lidocaine solution)\
      \ was injected into the dermal and subdermal layers, and sedation and analgesia was provided by 1 mg/kg ketamine intravenously.\
      \ A piece of anterior pericardium, approximately 2 -4 cm in diameter, was excised under direct vision and submitted\
      \ for histopathological analysis. The pericardial cavity was decompressed and fluid samples were collected for culture\
      \ and cytological analysis. To prevent acute cardiac dilatation during decompression of the pericardial cavity, intravenous\
      \ digoxin was administered and the pericardial cavity was decompressed gradually.\n\n The pericardial cavity was examined\
      \ under direct vision and/or by digital examination to detect any tumour or adhesions. Gentle digital lysis of adhesions\
      \ and opening of loculations were performed as needed, to enhance satisfactory drainage. A soft chest tube was placed\
      \ in the pericardial cavity, lateral to the right ventricle, after pericardiotomy for post-operative drainage. It was\
      \ connected to an underwater sealed system, and was removed when fluid drainage ceased.\n\n Patients with mild haemorrhagic\
      \ effusion and cardiac tamponade, due to trauma or invasive cardiac interventions, were considered haemodynamically\
      \ unstable and unsuitable for surgical subxiphoid pericardiostomy, even under local anaesthetic. These patients underwent\
      \ pericardiocentesis in the intensive care unit, which provided immediate relief. Subxiphoid pericardiostomy was performed\
      \ later if haemorrhagic PE persisted. Patients were followed, with physical examinations and ECG, in the outpatient\
      \ clinic for at least 1 year.\n\n Numerical results are given as mean ± SD. Fisher's exact test was used to compare\
      \ proportions between groups (comparison of the rates of recurrence and constriction between patient groups with uraemic\
      \ pericarditis, tuberculous pericarditis and non-tuberculous bacterial pericarditis). The McNemar test was used for\
      \ comparison of proportions within one group (to assess the significance of rates of recurrence and constriction in\
      \ patients with tuberculous pericarditis). Statistical differences were considered significant if P < 0.05."
  - text: "Henry M. Blumberg, MD In this issue of Infection Control and Hospital Epidemiology, a potpourri of tuberculosis\
      \ (TB)-related articles are being published. 1-7 Tuberculosisrelated issues have been an important focus for the past\
      \ decade for those in infection control and hospital epidemiology, especially in urban areas where the large majority\
      \ of TB cases occur, 8 but also, because of federal regulations, for those in low-endemic areas or areas where no TB\
      \ cases occur (approximately half of the counties in the United States).\n\n The resurgence of TB beginning in the mid1980s\
      \ in the United States (in large part, due to failure and underfunding of the public health infrastructure and to the\
      \ epidemic of human immunodeficiency virus [HIV] infection) and outbreaks of TB have highlighted the risk of nosocomial\
      \ transmission of TB. 9,10 These outbreaks affected both healthcare workers (HCWs) and patients. The fact that outbreaks\
      \ in New York and Miami, among others, involved multidrug-resistant (MDR) strains that were associated with high morbidity\
      \ and mortality among HIV-infected individuals punctuated the importance of effective TB infection control measures.\
      \ Commingling of patients with unsuspected TB and those who were quite immunosuppressed led to amplification of nosocomial\
      \ transmission. A decade ago, few institutions were prepared for the changing epidemiology of TB.\n\n Several recent\
      \ studies have demonstrated that infection control measures are effective in preventing nosocomial transmission of TB,\
      \ 11-13 and two reports in this issue, from institutions in Kentucky 1 and New York, 2 provide additional data on decreases\
      \ in HCW tuberculin skin-test (TST) conversions following implementation of TB infection control measures. In most studies,\
      \ multiple interventions (administrative controls, environmental controls, and respiratory protection) were initiated\
      \ at approximately the same time, making it more difficult to identify the most crucial aspect of the program. The importance\
      \ of TB infection control measures in contributing to the decline in TB cases in the United States, as well as the reduction\
      \ in the number of MDR-TB cases in New York City, often has been understated. Increased federal funding for TB control\
      \ activities and expansion of directly observed therapy clearly are important in efforts to prevent TB, but the initial\
      \ decline in TB cases and in MDR TB in the United States beginning in 1993 likely was due, in large part, to interruption\
      \ of TB transmission within healthcare facilities. Unfortunately, increased funding for TB control in the United States\
      \ in the last 5 years often has not trickled down to inner-city hospitals, which frequently are the first line in the\
      \ battle against TB.\n\n From our experience and that of others, it appears clear that administrative controls are the\
      \ most important component of a TB infection control program. At Grady Memorial Hospital in Atlanta, we were able to\
      \ decrease TB exposure episodes markedly and concomitantly to decrease HCW TST conversions after implementing an expanded\
      \ respiratory isolation policy. 11 We continue to isolate appropriately approximately 95% of those subsequently diagnosed\
      \ with TB. We were able to reduce TST conver-sion rates markedly during a period of time in which we had isolation rooms\
      \ that would be considered suboptimal by Centers for Disease Control and Prevention (CDC) guidelines 14 (rooms that\
      \ were under negative pressure but had less than six air changes per hour) and were using submicron masks. Implementation\
      \ of better-engineered isolation rooms (>12 air changes per hour) with the completion of renovations to the hospital\
      \ may have put us in better compliance with regulatory agencies and made the staff feel more secure, but has had little\
      \ impact on further reducing low rates of HCW TST conversions. In addition, the termination of outbreaks and reduction\
      \ of TST conversion rates at several institutions took place before introduction of National Institute for Occupational\
      \ Safety and Health-approved masks and fit testing. 2,15,16 United States healthcare institutions are required by regulatory\
      \ mandates to develop a \"respiratory protection program\" (including fit testing), which can be time-consuming, expensive,\
      \ and logistically difficult. 17 Data published to date suggest that the impact of formal fit testing on proper mask\
      \ use is small. 18 These federal mandates also have turned some well-meaning (trying to comply fully with the Occupational\
      \ Safety and Health Administration [OSHA] regulations) but misguided infection control practitioners into \"facial hair\
      \ police.\" These types of processes divert time, effort, and resources away from what truly is effective in preventing\
      \ nosocomial transmission of TB, as well as from other important infection control activities such as preventing nosocomial\
      \ bloodstream infections or transmission of highly resistant pathogens such as vancomycin-resistant Enterococcus or\
      \ preparing for the onslaught of vancomycin-resistant Staphylococcus aureus. At a time when US healthcare institutions\
      \ are under enormous pressure due to healthcare reform, market forces, and managed care, it is essential that federal\
      \ regulatory agencies look carefully at scientific data when issuing regulations."
