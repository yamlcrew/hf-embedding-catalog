    winning five NBA championships in 1947,[b] 1956, 1975, 2015 and 2017. Golden State's five NBA championships are tied for
    fourth-most in NBA history with the San Antonio Spurs, and behind only the Boston Celtics (17), Los Angeles Lakers (16)
    and Chicago Bulls (6). As of 2017, the Warriors are the third most valuable NBA franchise according to Forbes, with an
    estimated value of $2.6Â billion.[6]
  - Evacuation Day (New York) Evacuation Day on November 25 marks the day in 1783 when British troops departed from New York
    City on Manhattan Island, after the end of the American Revolutionary War. After this British Army evacuation, General
    George Washington triumphantly led the Continental Army from his former headquarters, north of the city, across the Harlem
    River south down Manhattan through the town to The Battery at the foot of Broadway.[1]
  - Biochemical oxygen demand BOD can be used as a gauge of the effectiveness of wastewater treatment plants. It is listed
