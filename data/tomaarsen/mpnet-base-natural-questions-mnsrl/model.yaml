    to the infant princess. The fairies attend the banquet at the palace. Each fairy is presented with a golden plate and
    drinking cups adorned with jewels. Soon after, an old fairy enters the palace and is seated with a plate of fine china
    and a crystal drinking glass. This old fairy is overlooked because she has been within a tower for many years and everyone
    had believed her to be deceased. Six of the other seven fairies then offer their gifts of beauty, wit, grace, dance, song,
    and goodness to the infant princess. The evil fairy is very angry about having been forgotten, and as her gift, enchants
    the infant princess so that she will one day prick her finger on a spindle of a spinning wheel and die. The seventh fairy,
    who hasn't yet given her gift, attempts to reverse the evil fairy's curse. However, she can only do so partially. Instead
