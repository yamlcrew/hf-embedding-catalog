    birth to Ellis Shepherd, Alex goes to see her since he is her emergency contact. He brings Meredith and her kids back
    to her house. She asks to move back in with him in her old house. Alex sells Meredith back the house and he and Jo rent
    a loft.
  - List of presidents of the United States by age The median age upon accession to the presidency is 55 years and 3 months.
    This is how old Lyndon B. Johnson was at the time of his inauguration. The youngest person to assume the office was Theodore
    Roosevelt, who became president at the age of 42 years, 322 days, following William McKinley's assassination; the oldest
    was Donald Trump, who was 70 years, 220 days old at his inauguration. The youngest person to be elected president was
    John F. Kennedy, at 43 years, 163 days of age on election day; the oldest was Ronald Reagan, who was 73 years, 274 days
    old at the time of his election to a second term.
  - iPad (2018) The iPad (officially sixth-generation iPad) is a 9.7-inch (25cm) tablet computer designed, developed, and
