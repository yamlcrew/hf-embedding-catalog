widgetData:
- source_sentence: where is the tiber river located in italy
  sentences:
  - Sales taxes in British Columbia On 1 July 2010, the PST and GST were combined into the Harmonized Sales Tax (HST) levied
    according to the provisions of the GST. The conversion to HST was controversial. Popular opposition led to a referendum
    on the tax system, the first such referendum in the Commonwealth of Nations, resulting in the province reverting to the
    former PST/GST model on 1 April 2013.
  - 'Tiber The Tiber (/ˈtaɪbər/, Latin: Tiberis,[1] Italian: Tevere [ˈteːvere])[2] is the third-longest river in Italy, rising
    in the Apennine Mountains in Emilia-Romagna and flowing 406 kilometres (252 mi) through Tuscany, Umbria and Lazio, where
    it is joined by the river Aniene, to the Tyrrhenian Sea, between Ostia and Fiumicino.[3] It drains a basin estimated at
    17,375 square kilometres (6,709 sq mi). The river has achieved lasting fame as the main watercourse of the city of Rome,
    founded on its eastern banks.'
  - 'Water in California California''s limited water supply comes from two main sources: surface water, or water that travels
    or gathers on the ground, like rivers, streams, and lakes; and groundwater, which is water that is pumped out from the
    ground. California has also begun producing a small amount of desalinated water, water that was once sea water, but has
    been purified.'
- source_sentence: what kind of car does jay gatsby drive
  sentences:
  - Jay Gatsby At the Buchanan home, Jordan Baker, Nick, Jay, and the Buchanans decide to visit New York City. Tom borrows
    Gatsby's yellow Rolls Royce to drive up to the city. On the way to New York City, Tom makes a detour at a gas station
    in "the Valley of Ashes", a run-down part of Long Island. The owner, George Wilson, shares his concern that his wife,
    Myrtle, may be having an affair. This unnerves Tom, who has been having an affair with Myrtle, and he leaves in a hurry.
  - 'Panama Canal The Panama Canal (Spanish: Canal de Panamá) is an artificial 77 km (48 mi) waterway in Panama that connects
    the Atlantic Ocean with the Pacific Ocean. The canal cuts across the Isthmus of Panama and is a conduit for maritime trade.
    Canal locks are at each end to lift ships up to Gatun Lake, an artificial lake created to reduce the amount of excavation
    work required for the canal, 26 m (85 ft) above sea level, and then lower the ships at the other end. The original locks
    are 34 m (110 ft) wide. A third, wider lane of locks was constructed between September 2007 and May 2016. The expanded
    canal began commercial operation on June 26, 2016. The new locks allow transit of larger, post-Panamax ships, capable
    of handling more cargo.[1]'
  - Solar maximum Predictions of a future maximum's timing and strength are very difficult; predictions vary widely. There
    was a solar maximum in 2000. In 2006 NASA initially expected a solar maximum in 2010 or 2011, and thought that it could
    be the strongest since 1958.[3] However, the solar maximum was not declared to have occurred until 2014, and even then
    was ranked among the weakest on record.[4]
- source_sentence: who sings if i can dream about you
  sentences:
  - Wesley Jonathan Wesley Jonathan Waples (born October 18, 1978), known professionally as Wesley Jonathan, is an American
    actor. He is best known for his starring role as Jamal Grant on the NBC Saturday morning comedy-drama series City Guys,
    Sweetness in the 2005 film Roll Bounce, as well as Burrell "Stamps" Ballentine on TV Land's The Soul Man.
  - I Can Dream About You "I Can Dream About You" is a song performed by American singer Dan Hartman on the soundtrack album
    of the film Streets of Fire. Released in 1984 as a single from the soundtrack, and included on Hartman's album I Can Dream
    About You, it reached number 6 on the Billboard Hot 100.[1]
  - Blood is thicker than water In modern society, the proverb "blood is thicker than water" is used to imply that family
    relationships are always more important than friends.
- source_sentence: who did jesse palmer end up with on the bachelor
  sentences:
  - Jesse Palmer In 2004, Palmer was the first professional athlete to appear on The Bachelor television program and the first
    non-American bachelor, in which he was given his choice of eligible single women. He eventually selected Jessica Bowlin,
    but their courtship lasted for only a few months after the end of the show.[19][20]
  - Wave base In seawater, the water particles are moved in a circular orbital motion when a wave passes. The radius of the
    circle of motion for any given water molecule decreases exponentially with increasing depth. The wave base, which is the
    depth of influence of a water wave, is about half the wavelength.
  - Do You Remember the First Time? (The Vampire Diaries) Elena, after everyone continues to convince her that she had once
    loved damon decides to run through the magic free, mystic falls border. So she does, and she gets glimpses of her and
    Damon but never fully remembers yet that she loves him. Damon pulls her back across the line and she asks about a kiss
    in the rain. He continues to try to get her to remember.
- source_sentence: when did the american civil rights movement end
  sentences:
  - 'A Sunday Afternoon on the Island of La Grande Jatte A Sunday Afternoon on the Island of La Grande Jatte (French: Un dimanche
    après-midi à l''Île de la Grande Jatte) painted in 1884, is one of Georges Seurat''s most famous works. It is a leading
    example of pointillist technique, executed on a large canvas. Seurat''s composition includes a number of Parisians at
    a park on the banks of the River Seine.'
  - Paleolithic Paleolithic humans made tools of stone, bone, and wood.[23] The early paleolithic hominins, Australopithecus,
    were the first users of stone tools. Excavations in Gona, Ethiopia have produced thousands of artifacts, and through radioisotopic
    dating and magnetostratigraphy, the sites can be firmly dated to 2.6Â million years ago. Evidence shows these early hominins
    intentionally selected raw materials with good flaking qualities and chose appropriate sized stones for their needs to
    produce sharp-edged tools for cutting.[29]
  - African-American civil rights movement (1954–1968) The Civil Rights Movement (also known as the American civil rights
    movement, African-American civil rights movement, and other terms,[b]) was a human rights movement from 1954â€“1968 that
    encompassed strategies, groups, and social movements to accomplish its goal of ending legalized racial segregation and
    discrimination laws in the United States. The movement secured the legal recognition and federal protection of black Americans
    in the United States Constitution and federal law.
