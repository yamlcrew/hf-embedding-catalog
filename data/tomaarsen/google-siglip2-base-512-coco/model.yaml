    pad_token: <pad>
    unk_token: <unk>
    use_default_system_prompt: false
  chat_template_jinja: "{{ bos_token }}{% if messages[0]['role'] == 'system' %}{{ raise_exception('System role not supported')\
    \ }}{% endif %}{% for message in messages %}{% if (message['role'] == 'user') != (loop.index0 % 2 == 0) %}{{ raise_exception('Conversation\
    \ roles must alternate user/assistant/user/assistant/...') }}{% endif %}{% if (message['role'] == 'assistant') %}{% set\
    \ role = 'model' %}{% else %}{% set role = message['role'] %}{% endif %}{{ '<start_of_turn>' + role + '\r\n' + message['content']\
    \ | trim + '<end_of_turn>\r\n' }}{% endfor %}{% if add_generation_prompt %}{{'<start_of_turn>model\r\n'}}{% endif %}"
