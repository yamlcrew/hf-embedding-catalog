  - "Document: # الجوهر (جذر: جهر)\n\n## Al-Munāwī, al-Tawqīf ʿalā Muhimmāt al-Taʿārīf (d. 1622 CE)\n*التوقيف على مهمات التعاريف\
    \ للمناوي*\n\nالجوهر: ماهية إذا وجدت في الأعيان كانت لا في موضع وهو منحصر في خمسة: هيولى وصورة وجسم ونفس وعقل، لأنه إما\
    \ أن يكون مجردا أو لا، والأول إما أن لا يتعلق بالبدن تعلق تدبير وتصرف أو يتعلق. والأول العقل والثاني النفس، وغير المجرد\
    \ إما مركب أولا، والأول الجسم والثاني إما حال أو محل، الأول الصورة والثاني الهيولى وتسمى الحقيقة.فالجوهر ينقسم إلى بسيط\
    \ روحاني كالعقول، والنفوس المجردة، وإلى بسيط جسماني كالعناصر، وإلى مركب في العقل دون الخارج كالماهيات الجوهرية المركبة\
    \ من الجنس والفصل، وإلى مركب منهما كالمولدات الثلاثة.\n\n## Al-Tahānawī, Kashshāf Iṣṭilāḥāt al-Funūn wa-l-ʿUlūm (d. 1777\
    \ CE)\n*كشّاف اصطلاحات الفنون والعلوم للتهانوي*\n\nالجوهر:[في الانكليزية] Substance ،essence [ في الفرنسية] Substance\
    \ ،essence \nيطلق على معان: منها الموجود القائم بنفسه حادثا كان أو قديما ويقابله العرض بمعنى ما ليس كذلك. ومنها الحقيقة\
    \ والذات، وبهذا المعنى يقال أي شيء هو في جوهره أي ذاته وحقيقته، ويقابله العرض بمعنى الخارج من الحقيقة. والجوهر بهذين المعنيين\
    \ لا شكّ في جوازه في حقّ الله تعالى وإن لم يرد الإذن بالإطلاق. ومنها ما هو من أقسام الموجود الممكن، فهو عند المتكلمين\
    \ لا يكون إلّا حادثا إذ كل ممكن حادث عندهم. وأما عند الحكماء فقد يكون قديما كالجوهر المجرّد وقد يكون حادثا كالجوهر المادي.\
    \ وعند كلا الفريقين لا يجوز إطلاقه بهذا المعنى على الله تعالى بناء على أنّه قسم من الممكن. فتعريفه عند المتكلّمين الحادث\
    \ المتحيز بالذات، والمتحيز بالذات هو القابل للإشارة الحسّية بالذات بأنه هنا أو هناك، ويقابله العرض. فقال الأشاعرة:العرض\
    \ هو الحادث القائم بالمتحيّز بالذات فخرج الإعدام والسّلوب لعدم حدوثها لأنّ الحادث من أقسام الموجود. وخرج أيضا ذات الربّ\
    \ وصفاته لعدم كونها حادثة ولا قائمة بالمتحيّز بالذات، فإنّ الربّ تعالى ليس بمتحيّز أصلا. وبالجملة فذات الربّ تعالى وصفاته\
    \ ليست بأعراض ولا جواهر. وقال بعض الأشاعرة العرض ما كان صفة لغيره وينبغي أن يراد بما الحادث بناء على أنّ العرض من أقسام\
    \ الحادث وألّا ينتقض بالصفات السلبية وبصفات الله تعالى إذا قيل بالتغاير بين الذات والصفات كما هو مذهب بعض المتكلمين، وإن\
    \ لم يكن بالتغاير بينهما فصفات الله تعالى تخرج بقيد الغيرية. وقال المعتزلة العرض هو ما لو وجد لقام بالمتحيّز. وإنما اختاروا\
    \ هذا لأنّ العرض ثابت عندهم في العدم منفكا عن الوجود الذي هو زائد على الماهية ولا يقوم بالمتحيّز حال العدم، بل إذا وجد\
    \ العرض قام به. وهذا بناء على قولهم بأنّ الثابت في العدم ذوات المعدومات من غير قيام بعضها ببعض، فإنّ القيام من خواص الوجود\
    \ إلّا عند بعضهم، فإنّهم قالوا باتصاف المعدومات بالصفات المعدومة الثابتة. ويردّ عليهم فناء الجواهر فإنه عرض عندهم وليس\
    \ على تقدير وجوده قائما بالمتحيّز الذي هو الجوهر عندهم لكونه منافيا للجواهر، ولا ينعكس أيضا على من أثبت منهم عرضا لا في\
    \ محل كأبي هذيل العلّاف، فإنه قال: إنّ بعض أنواع كلام الله لا في محل، وكبعض البصريين القائلين بإرادة قائمة لا في محل.\
    \ وأما ما قيل من أنّ خروجها لا يضر [...]\n\n## Academy of the Arabic Language in Cairo, al-Muʿjam al-Wasīṭ (1998)\n*المعجم\
    \ الوسيط لمجموعة من المؤلفين*\n\n(الْجَوْهَر) (انْظُر جَوْهَر)\n\n## Academy of the Arabic Language in Cairo, al-Muʿjam\
    \ al-Wasīṭ (1998)\n*المعجم الوسيط لمجموعة من المؤلفين*\n\n(الْجَوْهَر)جَوْهَر الشَّيْء حَقِيقَته وذاته وَمن الْأَحْجَار\
    \ كل مَا يسْتَخْرج مِنْهُ شَيْء ينْتَفع بِهِ والنفيس الَّذِي تتَّخذ مِنْهُ الفصوص وَنَحْوهَا و (فِي الفلسفة) مَا قَامَ\
    \ بِنَفسِهِ ويقابله الْعرض وَهُوَ مَا يقوم بِغَيْرِهِ واحدته جَوْهَرَة (ج) جَوَاهِر\n\n## Aḥmadnagarī, Dastūr al-ʿUlamāʾ,\
    \ or Jāmiʿ al-ʿUlūm fī Iṣṭilāḥāt al-Funūn (d. 18th Century CE)\n*دستور العلماء للأحمدنكري*\n\nالْجَوْهَر: الأَصْل: وَفِي\
    \ عرف الْحُكَمَاء هُوَ الْمَوْجُود لَا فِي مَوْضُوع. وَبِعِبَارَة أُخْرَى مَاهِيَّة إِذا وجدت فِي الْأَعْيَان كَانَت لَا\
    \ فِي مَوْضُوع. وَأَيْضًا قَالُوا الْجَوْهَر هُوَ المتحيز بِالذَّاتِ فَإِن كَانَ محلا فَهُوَ الهيولى والمادة. وَإِن كَانَ\
    \ حَالا فَهُوَ الصُّورَة الجسمية أَو النوعية. وَإِن لم يكن حَالا وَلَا محلا فَإِن كَانَ مركبا مِنْهُمَا فَهُوَ الْجِسْم\
    \ الطبيعي. وَإِن لم يكن كَذَلِك. فَإِن كَانَ مُتَعَلقا بالأجسام تعلق التَّدْبِير وَالتَّصَرُّف فَهُوَ النَّفس الإنسانية\
    \ أَو الفلكية. وَإِلَّا فَهُوَ الْعقل. فأقسام الْجَوْهَر خَمْسَة. ثمَّ إِن الْجَوْهَر منقسم إِلَى بسيط روحاني كالعقول\
    \ والنفوس الْمُجَرَّدَة. وَإِلَى بسيط جسماني كالعناصر. وَإِلَى مركب فِي الْعقل دون الْخَارِج كالماهية البسيطة الجوهرية\
    \ المركبة من الْجِنْس والفصل. وَإِلَى مركب مِنْهُمَا كالمواليد الثَّلَاثَة. قيل إِن الْمُلَازمَة فِي قَوْلهم ثمَّ الْجَوْهَر\
    \ إِن كَانَ محلا فَهُوَ الهيولى مَمْنُوع فَإِن الْجِسْم مَحل للأعراض مَعَ أَنه لَيْسَ بهيولى وَأجِيب بِأَن المُرَاد إِن\
    \ كَانَ محلا لجوهر آخر فَهُوَ الهيولى بِخِلَاف الْجِسْم فَإِنَّهُ لَيْسَ محلا للجوهر بل للعرض. وَفِيه نظر إِذْ النَّفس\
    \ مَحل للصورة الجوهرية مَعَ أَنَّهَا لَيست هيولى أَقُول فِي نظره نظر لِأَن الصُّور الجوهرية مَا دَامَت فِي الذِّهْن لَا\
    \ تكون إِلَّا اعراضا. فَإِن قلت هَذَا إِنَّمَا يَصح على مَذْهَب من قَالَ بِحُصُول الْأَشْيَاء فِي الذِّهْن يَا شباحها\
    \ واظلالها. وَأما على مَذْهَب من يَقُول بحصولها فِي الذِّهْن بِأَعْيَانِهَا فَلَا قلت المُرَاد إِن كَانَ محلا لجوهر دائمي\
    \ أَي فِي الوجودين الذهْنِي والخارجي فَهُوَ الهيولى.\n\n## Al-Mu'jam Al-Kabir\n*المعجم الكبير*\nPOS: noun\n\nحجر كريم\
    \ كالياقوت واللؤلؤ ونحوهما. أصل الشيء وحقيقته. (فارسية معربة).\n\n## Al-Mu'jam Al-Kabir\n*المعجم الكبير*\nPOS: noun\n\n\
    انظره في رسمه\n\n## Al-Mu'jam Al-Kabir\n*المعجم الكبير*\nPOS: noun\n\nالدَّرّ : كُلُّ حَجَرٍ يُسْتَخْرج منه شيءٌ يُنْتَفَع\
    \ به. وقيل : النَّفِيس الذى تُتَّخذ منه الفُصوص ونحوُها substance (فى المنطق): ما قام بنَفْسِه , فهو مُتَقَوِّمٌ بذاتِه\
    \ ومُتَعَيِّنٌ بماهيَّتِه , وهو المَقُولَةُ الأولى من مَقُولات أرسطو , وبه تقومُ الأعراضُ والكَيْفِيَّات, ويقابله العَرَضُ\
    \ من الشيء: ما كانت عليه جِبلَّتُه\n\n## Al-Mu'jam Al-Wasit\n*المعجم الوسيط*\nPOS: noun\n\n## Al-Mu'jam Al-Wasit\n*المعجم\
    \ الوسيط*\nPOS: noun\n\nجوهر الشيء: حقيقته وذاته من الأحجار: كل ما يستخرج منه شيء ينتفع به النفيس الذي تتخذ منه الفصوص\
    \ ونحوها (في الفلسفة): ما قام بنفسه. ويقابله العرض\n"
