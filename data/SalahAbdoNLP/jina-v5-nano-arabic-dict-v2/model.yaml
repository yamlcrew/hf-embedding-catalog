  - 'Document: # المُعَرَّفَةُ (جذر: عرف)


    ## Yāqūt al-Ḥamawī, Muʿjam al-Buldān (d. 1229)

    *معجم البلدان لياقوت الحموي*


    المُعَرَّفَةُ:

    منهل بينه وبين كاظمة يوم أو يومان، عن الحفصي.


    ## Al-Suyūṭī, Muʿjam Maqālīd al-ʿUlūm fī l-Ḥudūd wa-l-Rusūm (d. 1505 CE)

    *معجم مقاليد العلوم للسيوطي*


    المَعْرِفة: إِدْرَاك صور الموجودات.


    ## Al-Munāwī, al-Tawqīf ʿalā Muhimmāt al-Taʿārīf (d. 1622 CE)

    *التوقيف على مهمات التعاريف للمناوي*


    المعرفة: عند النحاة: ما وضع ليدل على شيء بعينه وهي المضمرات والأعلام والمبهمات، وما عرف باللام، والمضاف إلى أحدهما.وعند
    أهل النظر: إدراك الشيء على ما هو عليه وهي مسبوقة بنسيان حاصل بعد العلم، ولذلك يسمى الحق تعالى بالعالم دون العارف.المعرفة
    عند القوم: سمو اليقين. وقيل سقوط الوهم لوضوح الاسم. وقيل زوال البرهان بكمال العيان. وقيل دثور الريب لظهور الغيب. وقيل
    هجوم الأنوار على الأبرار.


    ## Al-Tahānawī, Kashshāf Iṣṭilāḥāt al-Funūn wa-l-ʿUlūm (d. 1777 CE)

    *كشّاف اصطلاحات الفنون والعلوم للتهانوي*


    المعرفة:[في الانكليزية] Knowledge [ في الفرنسية] Connaissance هي تطلق على معان. منها العلم بمعنى الإدراك مطلقا تصوّرا
    كان أو تصديقا. ولهذا قيل كلّ معرفة وعلم فإمّا تصوّر أو تصديق.ومنها التصوّر كما سبق وعلى هذا يسمّى التصديق علما كما مرّ
    أيضا. ومنها إدراك البسيط سواء كان تصوّرا للماهية أو تصديقا بأحوالها، وإدراك المركّب سواء كان تصوّرا أو تصديقا، على هذا
    الاصطلاح يخصّ بالعلم، فبين المعرفة والعلم تباين بهذا المعنى، وكلاهما أخصّ من العلم بمعنى الإدراك مطلقا، وكذا الحال في
    المعنى الثاني للمعرفة والعلم. وبهذا الاعتبار يقال عرفت الله دون علمته. ومناسبة هذا الاصطلاح بما نسمعه من أئمة اللغة من
    حيث إنّ متعلّق المعرفة في هذا الاصطلاح وهو البسيط واحد ومتعلّق العلم وهو المركّب متعدّد، كما أنّهما كذلك عند أهل اللغة
    وإن اختلف وجه التعدّد والوحدة، فإنّ وجه التعدّد والوحدة في اللغوي يرجع إلى تقييد الاسم الأول بإسناد أمر إليه وإطلاقه عنه،
    سواء كان مدخوله مركّبا أو بسيطا، وفي الاصطلاحي إلى نفس المحكوم عليه. فإن كان مركّبا فهو متعلّق العلم وإن كان بسيطا فمتعلّق
    المعرفة. ومنها إدراك الجزئي سواء كان مفهوما جزئيا أو حكما جزئيا، وإدراك الكلّي مفهوما كلّيا كان أو حكما كلّيا على هذا
    الاصطلاح يخصّ بالعلم، وبالنظر إلى هذا يقال أيضا عرفت الله دون علمته، والمراد بالحكم التصديق، والنسبة بينهما على هذا على
    قياس المعنى الثاني والثالث، والنسبة بين تلك المعاني الثلاثة للمعرفة هي العموم من وجه، وكذا بين تلك المعاني الثلاثة للعلم،
    وكذا بين المعرفة بالمعنى الثاني أي بمعنى التصوّر وبين العلم بالمعنى الثالث الرابع، وكذا بين المعرفة بالمعنى الثالث والعلم
    بالمعنى والرابع، وكذا بين المعرفة بالمعنى الرابع والعلم بالمعنى الثالث كما لا يخفى. قيل الاصطلاح الثاني والرابع متفرّعان
    على الثالث لأنّ الجزئي والتصوّر أشبه بالبسيط والكلّي والتصديق بالمركّب، هذا والأقرب أن يجعل استعمال المعرفة في التصوّرات
    والعلم في التصديقات أصلا لأنّه عين المعنى اللغوي ثم يفرّع عليه المعنيان الآخران، هكذا في شرح المطالع وحواشيه وحواشي المطول.
    ومنها إدراك الجزئي عن دليل كما في التوضيح في تعريف الفقه ويسمّى معرفة استدلالية أيضا. ومنها الإدراك الأخير من الإدراكين
    لشيء واحد إذا تخلّل بينهما عدم بأن أدرك أولا ثم ذهل عنه ثم أدرك ثانيا. قيل  [...]


    ## Al-Barakatī, al-Taʿrīfāt al-Fiqhīya (d. 1975 CE)

    *التعريفات الفقهيّة للبركتي*


    المَعْرِفة: ما وضع ليدل على شيء بعينه والنَكِرَةُ بخلافه، وأيضاً المعرفة إدراك الشيء عليه ما هو عليه، وهي مسبوقة بالجهل
    أو النسيان بعد العلم بخلاف العلم، ولذلك يوصف الحق تعالى بالعالم لا بالعارف. وفي "الكليات": "والعلم يقال لإدراك الكلي أو
    المركب، والمعرفة تقال لإدراك الجزئي أو البسيط ولهذا يقال: عرفت الله دون علمته"، وفي "نفحات الأنس" للجامي "معرفت عبارت
    ست ازباز شاختن معلوم مجمَل در صُوَر تفاصيل".


    ## Academy of the Arabic Language in Cairo, al-Muʿjam al-Wasīṭ (1998)

    *المعجم الوسيط لمجموعة من المؤلفين*


    (الْمعرفَة) مَوضِع الْعرف من الطير وَالْخَيْل (ج) معارف


    ## Aḥmadnagarī, Dastūr al-ʿUlamāʾ, or Jāmiʿ al-ʿUlūm fī Iṣṭilāḥāt al-Funūn (d. 18th Century CE)

    *دستور العلماء للأحمدنكري*


    الْمعرفَة: إِدْرَاك الْأَمر الجزئي أَو البسيطة مُطلقًا أَي عَن دَلِيل. أَولا كَمَا أَن الْعلم إِدْرَاك الْكُلِّي أَو الْمركب.
    وَلِهَذَا يُقَال عرفت الله وَلَا يُقَال علمت الله. وَأَيْضًا يُقَال للإدراك الْمَسْبُوق بِالْعدمِ أَو للأخير من الإدراكين
    بِشَيْء وَاحِد إِذا تخَلّل بَينهمَا عدم بِأَن أدْرك أَولا ثمَّ ذهل عَنهُ ثَانِيًا - وَالْعلم يُقَال للإدراك الْمُجَرّد
    من هذَيْن الاعتبارين وَلذَا يُقَال الله عَالم الأعارف - وَفسّر صدر الشَّرِيعَة الْمعرفَة بِإِدْرَاك الجزئيات عَن دَلِيل
    - وَاعْترض عَلَيْهِ الْمُحَقق التَّفْتَازَانِيّ فِي التَّلْوِيح بقوله والقيد الْأَخير مِمَّا لَا دلَالَة عَلَيْهِ أصلا
    لَا لُغَة وَلَا اصْطِلَاحا انْتهى. وَلَك أَن تَقول لَا نسلم أَنه لَا دلَالَة للفظ على هَذَا الْقَيْد لُغَة لِأَن الْمعرفَة
    إِدْرَاك الشَّيْء بتفكر وتدبر. وَلذَا يُقَال عرفت الله إِذْ معرفَة الله تَعَالَى إِنَّمَا هِيَ بتدبر آثاره. قَالَ الْعَلامَة
    الطَّيِّبِيّ لَا يُقَال يعرف الله بل يُقَال يعلم لِأَن الْمعرفَة تسْتَعْمل فِي الْعلم الْمَوْصُوف بتفكر وتدبر. وَأَيْضًا
    لم يطلقوا لفظ الْمعرفَة على اعْتِقَاد الْمُقَلّد لِأَنَّهُ لَيْسَ لَهُ معرفَة على دَلِيل. فَلَمَّا ثَبت عدم إِطْلَاقهم
    الْمعرفَة على اعْتِقَاد الْمُقَلّد ثَبت الِاصْطِلَاح أَيْضا يَعْنِي أَنهم وَإِن لم يصرحوا بالاصطلاح إِلَّا أَنه وَقع مِنْهُم
    مَا يدل عَلَيْهِ حَيْثُ لم يطلقوا لفظ الْمعرفَة على اعْتِقَاد الْمُقَلّد وَلَيْسَ بِلَازِم أَن يصرحوا أَي المصطلحون باصطلاحهم
    إِذْ كثير من الاصطلاحات إِنَّمَا يعلم بموارد استعمالات الْأَلْفَاظ.وَعند النُّحَاة الْمعرفَة مَا يشار بهَا إِلَى مُتَعَيّن
    أَي مَعْلُوم عِنْد السَّامع من حَيْثُ إِنَّه كَذَلِك. والنكرة مَا يشار بهَا إِلَى أَمر مُتَعَيّن من حَيْثُ ذَاته وَلَا
    يقْصد مُلَاحظَة تعينه وَإِن كَانَ مُتَعَيّنا معهودا فِي نَفسه فَإِن بَين مصاحبة التَّعْيِين وملاحظته فرقا بَينا. وَذَلِكَ
    الْأَمر إِمَّا فَرد منتشر أَو مَاهِيَّة من حَيْثُ هِيَ على اخْتِلَاف المذهبين كَمَا ذكرنَا فِي التَّعْرِيف - والمعرفة
    خَمْسَة أَنْوَاع - الْمُضْمرَات. والأعلام. وَأَسْمَاء الإشارات. والموصلات. وَذُو اللَّام والمضاف إِلَى أَحدهَا.وَتَحْقِيق
    الْمقَام أَن فهم الْمعَانِي من الْأَلْفَاظ إِنَّمَا [...]


    ## Aḥmadnagarī, Dastūr al-ʿUlamāʾ, or Jāmiʿ al-ʿUlūm fī Iṣṭilāḥāt al-Funūn (d. 18th Century CE)

    *دستور العلماء للأحمدنكري*


    الْمعرفَة: والمعرفة فِي اصْطِلَاح أَرْبَاب السلوك فِي هِيَ مَا قَالَه الْعَارِف النامي قدوة العارفين نور الدّين الشَّيْخ
    عبد الرَّحْمَن الجامي قدس سره السَّامِي فِي (نفحات الْأنس من حضرات الْقُدس) من أَن الْمعرفَة عبارَة عَن إِعَادَة الْمعرفَة
    بالمعلوم الْمُجْمل فِي صور التفاصيل. كَمَا هُوَ فِي (علم النَّحْو) كل من العوامل اللفظية والمعنوية وَمَا هُوَ عَملهَا،
    هَذَا النَّوْع من الْفَهم على سَبِيل الْإِجْمَال (هُوَ النَّحْو) . وإعادة فهم كل عَامل مِنْهَا على التَّفْصِيل فِي وَقت
    قِرَاءَة سَواد الْعَرَبيَّة بِلَا توقف وَلَا روية واستعمالها فِي محلهَا هُوَ معرفَة النَّحْو. وإعادة الْفَهم بالفكر الْجيد
    وروية هُوَ التعرف على النَّحْو. إِذا معرفَة الربوبية عبارَة عَن إِعَادَة فهم الذَّات وَالصِّفَات الإلهية فِي صور تفاصيل
    الْأَهْوَال والحوادث والنوازل، بعد ذَلِك وعَلى سَبِيل الْإِجْمَال يصبح مَعْلُوما أَن الْمَوْجُود الْحَقِيقِيّ وَالْفَاعِل
    الْمُطلق هُوَ سُبْحَانَهُ، وَحَتَّى تكون صُورَة التَّوْحِيد الْمُجْمل مفصلة علميا وَلَا عيب فِيهَا فعلى صَاحب علم التَّوْحِيد
    أَلا يرى فِي صور تفاصيل الوقائع وَالْأَحْوَال المتجددة والمتضادة من ضَرَر ونفع وَمنع وَعَطَاء وثابت ومتحول وضار وَنَافِع
    ومعطي ومانع وقابض وباسط سوى الْحق سُبْحَانَهُ وَتَعَالَى، وَأَن لَا يعلم من دون التَّوَقُّف والروية، فَإِذا لم يفعل لَا
    يُسمى عَارِفًا. وَإِذا كَانَ لأوّل وهلة غافلا وحاضرا عَن قريب وَيعرف الْفَاعِل الْمُطلق جلّ ذكره فِي صُورَة الوسائط والروابط،
    فَإِنَّهُ يُسمى متعرفا وَلَيْسَ عَارِفًا، وَإِذا كَانَ غافلا كليا ويحول تأثيرات الْأَفْعَال إِلَى الوسائط فَإِنَّهُ يُسمى
    سَاهِيا ولاهيا مُشْركًا خفِيا. مثلا إِذا قرر معنى التَّوْحِيد وَهُوَ مُسْتَغْرق فِي بَحر التَّوْحِيد وَالْآخر وعَلى سَبِيل
    انكاره يعاوده وَيَقُول إِن هَذَا القَوْل لَيْسَ عَفْو الخاطر بل نتيجة للفكر والروية، فَيُؤْخَذ فِي الْحَال بغضب وقسوة
    لِأَنَّهُ لَا يعلم أَن جَزَاء هَذَا هُوَ عين مصداق قَول الْمُنكر، وَإِلَّا فالفاعل الْمُطلق فِي صُورَة هَذَا الانكار إِعَادَة
    الْفَهم ويترفق بِهِ.


