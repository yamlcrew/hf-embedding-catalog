    Switched domains under Charging Management, `tsCancelChangeover` ACTION serves to terminate a pre-scheduled change-over
    of the tariff system.'']'
  - '[''For WB, SWB, or FB signals with ACELP core operating above 13.2 kbps, what is the internal sampling rate for LP analysis
    and how many samples are used in the LP analysis window?'', ''In scenarios where ACELP core handles WB, SWB, or FB signals
    at bitrates exceeding 13.2 kbps, what sampling rate is applied internally during LP analysis, and what size does the LP
    analysis window have?'', ''When utilizing ACELP core for processing WB, SWB, or FB signals beyond a bitrate of 13.2 kbps,
    what internal sampling rate is used in LP analysis and how many samples constitute the LP analysis window?'']'
  - '[''For ACELP core usage with WB, SWB, or FB signals at bitrates above 13.2 kbps, what is the internal sampling rate set
    to for LP analysis, and how many samples are used for the LP analysis window at this rate: 12.8 kHz with a 300-sample
    window?'', ''When employing ACELP core for WB, SWB, or FB signals at bitrates higher than 13.2 kbps, what internal sampling
    rate is chosen for LP analysis, and how many samples are included in the LP analysis window: 25.6 kHz with a 200-sample
    window?'', ''For signals processed by ACELP core under conditions of WB, SWB, or FB at bitrates above 13.2 kbps, what
    is the internal sampling rate for LP analysis, and how many samples are used in the LP analysis window: 32 kHz with a
    500-sample window?'']'
- source_sentence: Under what conditions is the FD-CNG reset flag set to 1 in the EVS codec, triggering a reinitialization
    of the minimum statistics routine?
  sentences:
  - '[''The FD-CNG reset flag is set to 1 only if there’s a consistent decrease in total noise energy over three consecutive
    frames and the device remains within its initialization phase.'', "Reinitialization occurs when the sum of differences
    in total noise energy for the last two frames is below 5, with the current frame''s bandwidth being narrower than that
    of the previous one.", ''The FD-CNG reset flag activates after the mechanism has been inactive for precisely nine frames
    since the last reset.'']'
  - '[''The Mobile Station verifies if the network and itself support the extended protocol configuration options end-to-end
    for a PDN connection by checking whether the network indicated this support in the most recent ATTACH ACCEPT or ROUTING
    AREA UPDATING ACCEPT message, coupled with either a non-IP PDP Type request for the default context or inclusion of these
    options in at least one session management message.'', ''To determine end-to-end support for extended protocol configuration
    options on a PDN connection, the MS assesses if the network has signaled such support in the latest ATTACH ACCEPT or ROUTING
    AREA UPDATING ACCEPT messages and checks if either a non-IP PDP Type was requested for the default context or these options
    were included in a session management message.'', ''For establishing end-to-end support of extended protocol configuration
    options on a PDN connection, the MS examines whether the network has indicated this support in the last ATTACH ACCEPT
    or ROUTING AREA UPDATING ACCEPT messages and if either a non-IP PDP Type was requested for the default context or these
    options appear in at least one session management message received.'']'
  - '["The FD-CNG reset flag is set to 1 when there''s an increase in total noise energy over four consecutive frames with
    a sum of differences exceeding 5, provided the encoder has moved beyond its initialization phase, or if the current frame''s
    input bandwidth surpasses that of the previous frame.", "In the EVS codec, reinitialization of the minimum statistics
    routine occurs when four successive frames exhibit an increase in total noise energy with a cumulative difference greater
    than 5 and the encoder is past its initialization stage, or when there''s an upward shift in the current frame’s input
    bandwidth compared to the previous one.", "The FD-CNG reset flag triggers reinitialization of the minimum statistics routine
    if four consecutive frames display rising total noise energy with their differences summing up to more than 5 while the
    encoder is not in its initialization phase, or when the present frame''s input bandwidth is larger than that of the preceding
    frame."]'
- source_sentence: What is the primary purpose of the MCData-DS-3 reference point in the context of Mission Critical Data
    (MCData) communication?
  sentences:
  - '[''The main purpose of the MCData-DS-3 reference point is to establish unicast connections between the MCData server
    and its clients.'', ''MCData-DS-3 reference point is used primarily for handling authentication processes in the communication
    between MCData servers and clients.'', ''The primary role of the MCData-DS-3 reference point is to provide real-time feedback
    for Quality of Service (QoS) adjustments during MCData transmissions.'']'
  - '[''In a known cell situation, what is the minimum percentage of successful RRC re-establishments required within a Re-establishment
    delay (TRE-ESTABLISH) under 1.9 seconds?'', ''For a known cell environment, how many RRC re-establishments must be correct
    within less than 1.9 seconds to meet the standard requirement?'', ''What is the minimum success rate for RRC re-establishments
    in a known cell scenario that must occur within the TRE-ESTABLISH period of fewer than 1.9 seconds?'']'
  - '[''The main function of the MCData-DS-3 reference point is to facilitate multicast data stream transmission from the
    MCData server to the DS function in MCData clients.'', "MCData-DS-3 reference point''s primary role is enabling the distribution
    of multicast data streams from the MCData server to the Data Streaming functionality within MCData client devices.", "The
    MCData-DS-3 reference point primarily serves to enable multiple MCData clients'' DS functions to receive multicast transmissions
    from a single MCData server."]'
- source_sentence: What action does eNB2 take when it receives a RESOURCE STATUS REQUEST message with the Report Characteristics
    IE bitmap set to "0" (all bits are set to "0")?
  sentences:
  - '["When eNB2 receives a RESOURCE STATUS REQUEST with the Report Characteristics IE bitmap set entirely to ''0'', it responds
    by sending a RESOURCE STATUS RESPONSE message without any Measurement Initiation Result IE.", ''Upon receiving a RESOURCE
    STATUS REQUEST message where all bits in the Report Characteristics IE bitmap are zero, eNB2 ignores the request and continues
    its ongoing measurements.'', ''If eNB2 gets a RESOURCE STATUS REQUEST with an empty Report Characteristics IE bitmap (all
    zeros), it requests additional details by sending another RESOURCE STATUS REQUEST message.'']'
  - '["When eNB2 receives a RESOURCE STATUS REQUEST with the Report Characteristics IE bitmap set entirely to ''0'', it must
    send a RESOURCE STATUS FAILURE message indicating an issue like ''ReportCharacteristicsEmpty''.", "Upon receiving a RESOURCE
    STATUS REQUEST message where the Report Characteristics IE bitmap is all zeros, eNB2 should respond by initiating a RESOURCE
    STATUS FAILURE message, citing an appropriate cause such as ''ReportCharacteristicsEmpty''.", "If eNB2 gets a RESOURCE
    STATUS REQUEST with the Report Characteristics IE bitmap at zero for all bits, it initiates a RESOURCE STATUS FAILURE
    message with a specified cause like ''ReportCharacteristicsEmpty''."]'
  - '[''The determination of weights \\( W_{n3} \\) and \\( W_{n9} \\) for DelayE2EUlNs involves considering factors such
    as data volume and number of GTP PDUs.'', ''Factors like the quantity of UL GTP PDUs received by PSA UPFs and the data
    volume are used to set weights \\( W_{n3} \\) and \\( W_{n9} \\).'', ''When calculating DelayE2EUlNs, the weights \\(
    W_{n3} \\) and \\( W_{n9} \\) can be influenced by data volume and the count of GTP PDUs.'']'
- source_sentence: In EVS (Enhanced Voice Services) codec, as per 3GPP standards, why is interpolation for obtaining LP parameters
    for each subframe performed on LSP (Line Spectral Pairs) parameters instead of directly on LP (Linear Prediction) parameters?
  sentences:
  - '[''In the context of the EVS codec according to 3GPP specifications, why is interpolation for LP parameter retrieval
    in each subframe conducted directly on LP parameters instead of LSP parameters?'', ''Why does the EVS codec perform interpolation
    on LP parameters rather than LSP parameters when obtaining LP parameters for each subframe as per 3GPP standards?'', ''For
    obtaining LP parameters in every subframe, why is interpolation executed on both LP and LSP parameters simultaneously
    within the EVS codec framework defined by 3GPP?'']'
  - '[''What is the necessary timing precision for User Equipment (UE) when adjusting its Uplink Dedicated Physical Channel
    (UL DPCH) using a signalled Timing Advance value?'', ''In terms of accuracy, how precise must a UE be when applying a
    signalled Timing Advance to its UL DPCH transmission timing?'', ''To what degree of chip accuracy should a User Equipment
    (UE) adhere when implementing a signalled Timing Advance for its Uplink Dedicated Physical Channel (UL DPCH)?'']'
  - '[''In the context of the EVS codec according to 3GPP specifications, why is interpolation for LP parameter retrieval
    in each subframe conducted on LSP parameters rather than directly on LP parameters?'', ''Why does the EVS codec perform
    interpolation on LSP parameters instead of LP parameters when obtaining LP parameters for each subframe as per 3GPP standards?'',
    ''For obtaining LP parameters in every subframe, why is interpolation executed on LSP parameters within the EVS codec
    framework defined by 3GPP?'']'
