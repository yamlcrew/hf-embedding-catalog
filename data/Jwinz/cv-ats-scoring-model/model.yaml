  - source_sentence: "Deskripsi Pekerjaan\r\nAbout the Job:\r\nLead the development and maintenance of a compliance framework\
      \ aligned with business strategies, conduct external audits, and manage security risks to protect sensitive data such\
      \ as cardholder data (CHD) and personally identifiable information (PII).\r\nWhat you will do:\r\nEnsure the implementation\
      \ of payment gateway security follows PCI DSS v4.0, ISO 27001:2022, GDPR, SOC 2, and data privacy regulations.\r\nMonitor\
      \ changes in industry regulations and assess their impact on the organization, updating compliance policies and procedures\
      \ accordingly.\r\nDevelop and manage a compliance framework that aligns with business strategy and ensures adherence\
      \ to laws and regulations.\r\nCoordinate and lead external compliance audits (PCI DSS, ISO 27001, SOC 2), including\
      \ audit preparation, document collection, and external audit team management.\r\nReview and create security policies\
      \ and procedures that meet regulatory requirements and industry best practices.\r\nEnsure employee adherence to security\
      \ policies and communicate policies effectively across the organization.\r\nMaintain documentation for compliance activities,\
      \ including risk assessments, audits, incident response exercises, and remediation efforts.\r\nIdentify potential security\
      \ risks, mitigate non-compliance risks, and implement controls to protect data and meet regulatory requirements.\r\n\
      Collaborate with legal, IT, and operations teams to mitigate risks and ensure security policies protect sensitive data\
      \ like CHD and PII.\r\nPerform regular Data Protection Impact Assessments (DPIAs) to ensure data handling practices\
      \ comply with privacy laws (GDPR, etc.).\r\nOversee encryption, tokenization, and data anonymization practices to meet\
      \ regulatory requirements.\r\nEnsure third-party vendors and partners comply with security and compliance requirements,\
      \ including performing vendor security assessments and audits.\r\nOversee incident response protocols to ensure they\
      \ comply with data breach notification laws (GDPR, PCI DSS) and manage incident reporting.\r\nEnsure forensic investigations\
      \ are conducted and documented for security incidents, with appropriate actions taken for resolution and prevention\
      \ of future incidents.\r\nDevelop and deliver security compliance training programs for staff, including management\
      \ and IT personnel, ensuring an understanding of regulatory requirements.\r\nConduct security awareness campaigns and\
      \ compliance-focused training sessions to reduce human-related security risks.\r\nProvide regular reports on compliance\
      \ status, risk assessments, audit findings, and remediation efforts to senior management and stakeholders.\r\nDevelop\
      \ Key Risk Indicators (KRI) and Key Performance Indicators (KPI) to measure compliance effectiveness and track improvements.\r\
      \nPromote a culture of continuous improvement by identifying opportunities to enhance compliance processes, tools, and\
      \ resources.\r\nKualifikasi Minimum\r\nWhat we are looking for:\r\nBachelor’s degree in Information Technology, Computer\
      \ Information Systems, or related fields\r\n4 years of experience in IT Security Compliance, Risk Management, and Information\
      \ Security, preferably in the financial services or payment industry\r\nRelevant certifications such as CISA, CISM,\
      \ CISSP, PCI DSS QSA, or ISO 27001 Lead Auditor\r\nDeep knowledge of PCI DSS v4.0, ISO 27001:2022, GDPR, SOC 2, and\
      \ other relevant compliance frameworks\r\nExpertise in IT security principles, data encryption, risk management, and\
      \ GRC (Governance, Risk, and Compliance) methodologies\r\nExperience with security technologies like firewalls, IDS/IPS,\
      \ SIEM, and encryption tools\r\nProficiency with compliance tools and methodologies such as audit management systems\
      \ and risk assessment platforms\r\nStrong analytical thinking and attention to detail\r\nExcellent communication skills\
      \ to convey complex compliance requirements to various departments\r\nStrong problem-solving abilities\r\nAbility to\
      \ work under pressure, manage multiple tasks, and meet tight deadlines\r\nHigh initiative"
