      - Thiết kế và triển khai mô hình MVVM cho các module mới, thồng nhất cấu trúc dự án và nâng cao khả năng kiểm thử.

      - Tích hợp thành công Google Billing v3, xử lý triệt để các trạng thái phức tạp của gói đăng ký như dùng thử, hủy gói
      và gia hạn tự động.

      - Làm việc trực tiếp với đội ngũ thiết kế để chuyển đổi các bản vẽ Figma thành giao diện Android chính xác đến từng
      pixel theo chuẩn Material Design.

      - Chủ động đề xuất các giải pháp kỹ thuật và tham gia phản biện trong các buổi họp kiến trúc hàng tuần.


