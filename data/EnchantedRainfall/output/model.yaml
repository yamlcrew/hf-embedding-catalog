    - 'Họ tên: Nguyễn Văn Minh

      Vị trí: Chuyên gia Phát triển Phần mềm Cao cấp (Java)


      Tóm tắt chuyên môn:

      Tôi là một kỹ sư phần mềm với hơn 8 năm kinh nghiệm, trong đó có 5 năm đảm nhiệm vai trò Senior Developer tại các dự
      án quốc tế. Tôi có thế mạnh trong việc xây dựng các hệ thống microservices hiệu suất cao, khả năng mở rộng tốt và áp
      dụng các quy chuẩn thiết kế phần mềm hiện đại. Tôi luôn ưu tiên chất lượng mã nguồn thông qua việc kiểm thử tự động
      và quy trình review nghiêm ngặt.


      Kinh nghiệm làm việc:


      Công ty Giải pháp Công nghệ Global (01/2020 - Hiện tại)

      Lead Java Developer

      - Chịu trách nhiệm thiết kế và phát triển các giải pháp phân tích dữ liệu và mô hình dữ liệu cho nền tảng của khách
      hàng Âu Mỹ.

      - Xây dựng kiến trúc microservices dựa trên Spring Boot, tích hợp Spring Security và Spring Data JPA để quản lý giao
      dịch phức tạp.

      - Phát triền các tính năng cho ứng dụng di động Android, tập trung vào việc giao tiếp với thiết bị quét mã và phần cứng
      ngoại vi qua Android SDK.

      - Tối ưu hóa hiệu năng hệ thống bằng cách sử dụng PostgreSQL với các kiểu dữ liệu JSON và JSONB.

      - Thiết lập quy trình CI/CD sử dụng Docker và Kubernetes để triển khai trên hạ tầng Linux.

      - Thực hiện kiểm thử tích hợp và đơn vị với JUnit5 và AssertJ để đảm bảo độ tin cậy của phần mềm.


      Tập đoàn Logistics Tech Solutions (05/2016 - 12/2019)

      Senior Software Engineer

      - Tham gia vào dự án nâng cấp hệ thống ERP tập trung vào quản lý kho hàng (Inventory Mangement) và vật tư.

      - Phát triển các dịch vụ RESTful sử dụng JAX-RS và Jersey, hỗ trợ phân tích dữ liệu XML/JSON qua Jackson.

      - Bảo trì và tối ưu hóa mã nguồn hiện có, đề xuất các cải tiến kỹ thuật giúp giảm 20% thời gian xử lý dữ liệu.

      - Sử dụng Kafka và RabbitMQ để xử lý luồng dữ liệu bất đồng bộ giữa các dịch vụ.

      - Quản lý dự án thông qua Maven và Gradle, đảm bảo tính nhất quán của các thư viện phụ thuộc.

      - Chủ động đề xuất các công nghệ mới phù hợp với bài toán kinh doanh thay vì chạy theo sở thích cá nhân.


      Kỹ năng kỹ thuật:

      - Ngôn ngữ: Java 11/17, SQL.

      - Frameworks: Spring IoC, Spring Boot, Hibernate, AOP.

      - Database: PostgreSQL, Redis.

      - Công cụ & Môi trường: Docker, K8s, Git, Jenkins, Linux (Ubuntu/CentOS).

      - Testing: Mockito, PowerMock, JUnit 5.

      - Networking & Giao thức: WebSockets, AMQP, Netty.


      Học vấn:

      - Thạc sĩ Khoa học Máy tính - Đại học Bách Khoa Hà Nội.

      - Cử nhân Công nghệ Thông tin - Hệ tiên tiến (Học hoàn toàn bằng Tiếng Anh).


      Ngôn ngữ & Kỹ năng mềm:

      - Tiếng Anh: Sử dụng thành thạo trong công việc (nghe, nói, đọc, viết).

      - Có tư duy phản biện, khả năng hiện thực hóa tầm nhìn chiến lược thành các bước hành động cụ thể.

      - Sẵn sàng hỗ trợ đồng đội và trực tiếp giải quyết các vấn đề kỹ thuật khó khi cần thiết.'
