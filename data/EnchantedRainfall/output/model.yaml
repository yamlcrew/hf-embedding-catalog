      trúc mã nguồn lớn. Khả năng giao tiếp trôi chảy bằng tiếng Nga và tiếng Ukraina phục vụ công việc quốc tế.


      KỸ NĂNG CỐT LÕI

      - Ngôn ngữ: Kotlin (Thành thạo Coroutines), Java.

      - Thư viện phản ứng: RxJava (2 & 3).

      - Kiến trúc & Thành phần: Android Jetpack (ViewModel, LiveData, Room, Navigation), MVVM, MVP.

      - Thanh toán: Google Play Billing Library v3 (Quản lý chu kỳ thuê bao/Subscription lifecycle).

      - Media: ExoPlayer, Android Video/Audio Core APIs.

      - Ngôn ngữ: Tiếng Ukraina (Lưu loát), Tiếng Nga (Giao tiếp tốt), Tiếng Anh chuyên ngành.

      - Khác: OOD, Design Patterns, Material Design, tối ưu hóa hiệu suất ứng dụng.


      KINH NGHIỆM LÀM VIỆC


      Công ty Công nghệ Global Stream (01/2021 - Hiện tại)

