      Tôi là một kỹ sư đảm bảo chất lượng với hơn 4 năm kinh nghiệm thực chiến trong các dự án phần mềm quy mô lớn. Thế mạnh
      của tôi là xây dựng hệ thống kiểm thử tự động cho cả nền tảng web và ứng dụng di động, đặc biệt am hiểu các quy trình
      nghiệp vụ phức tạp trong hệ thống quản trị doanh nghiệp.


      KỸ NĂNG CHUYÊN MÔN

      - Ngôn ngữ lập trình: Thành thạo JavaScript (ES6+).

      - Công cụ tự động hóa: Triển khai kiểm thư tự động với Puppeteer và Jest cho ứng dụng Web. Sử dụng Detox để thực hiện
      Grey box testing trên mobile.

      - Kiểm thử API: Có kinh nghiệm dày dặn trong việc xác thực các dịch vụ thuộc kiến trúc microservices.

      - Hệ thống ERP: Từng tham gia kiểm định các module về tài chính, kho vận và quản trị nhân sự.

      - Công cụ quản lý: Sử dụng thành thạo Jira, Trello và TestRail để theo dõi tiến độ và quản lý lỗi.

      - Ngoại ngữ: Tiếng Anh trình độ trung cấp trở lên, có khả năng đọc tài liệu chuyên môn và trao đổi trực tiếp với khách
      hàng quốc tế.


      KINH NGHIỆM LÀM VIỆC


      Công ty Giải pháp Công nghệ ABC (Tháng 05/2021 - Hiện tại)

      Vai trò: Senior Automation QA

      - Thiết kế và duy trì khung kiểm thử tự động hóa (Automation Framework) sử dụng Puppeteer kết hợp với Jest, giúp giảm
      40% thời gian kiểm thử hồi quy.

      - Thực hiện kiểm tra tính toàn vẹn của dữ liệu và luồng nghiệp vụ trên hệ thống ERP doanh nghiệp.

      - Xây dựng các kịch bản kiểm thử API để đảm bảo sự ổn định của hệ thống trong môi trường microservices.

      - Phối hợp chặt chẽ với đội ngũ phát triển để phân tích yêu cầu và tối ưu hóa chất lượng sản phẩm.

      - Đào tạo và hướng dẫn cho các thành viên mới về quy trình vận hành công cụ Detox cho mảng Mobile Automation.


      Công ty Phần mêm Global Tech (Tháng 06/2019 - Tháng 04/2021)

      Vai trò: Kiểm thử viên Phần mềm

      - Thực hiện kiểm thử thủ công và tự động cho các ứng dụng web hướng người dùng.

      - Phân tích và báo cáo lỗi trên hệ thống Jira.

      - Viết tài liệu hướng dẫn kiểm thử và các kịch bản test case chi tiết.

      - Tham gia vào các buổi họp Sprint Planning và Review theo mô hình Agile.


      HỌC VẤN

      - Tốt nghiệp Cử nhân Công nghệ thông tin - Đại học Bách Khoa.

      - Chứng chỉ ISTQB Foundation Level.'
