  - 'Hồ sơ ứng tuyển: Chuyên viên Kiểm thử Tự động


    TÓM LƯỢC NGHỀ NGHIỆP

    Tôi là một kỹ sư đảm bảo chất lượng với hơn 4 năm kinh nghiệm thực chiến trong các dự án phần mềm quy mô lớn. Thế mạnh
    của tôi là xây dựng hệ thống kiểm thử tự động cho cả nền tảng web và ứng dụng di động, đặc biệt am hiểu các quy trình
    nghiệp vụ phức tạp trong hệ thống quản trị doanh nghiệp.


    KỸ NĂNG CHUYÊN MÔN

    - Ngôn ngữ lập trình: Thành thạo Python (Pytest framework).

    - Công cụ tự động hóa: Triển khai kiểm thư tự động với Selenium và Robot Framework cho ứng dụng Web. Sử dụng Appium để
    thực hiện kiểm thử trên các thiết bị di động.

    - Kiểm thử API: Có kinh nghiệm dày dặn trong việc xác thực các dịch vụ thuộc kiến trúc microservices sử dụng thư viện
    Requests.

    - Hệ thống ERP: Từng tham gia kiểm định các module về tài chính, kho vận và quản trị nhân sự.

    - Công cụ quản lý: Sử dụng thành thạo Jira, Trello và TestRail để theo dõi tiến độ và quản lý lỗi.

    - Ngoại ngữ: Tiếng Anh trình độ trung cấp trở lên, có khả năng đọc tài liệu chuyên môn và trao đổi trực tiếp với khách
    hàng quốc tế.


    KINH NGHIỆM LÀM VIỆC


    Công ty Giải pháp Công nghệ ABC (Tháng 05/2021 - Hiện tại)

    Vai trò: Senior Automation QA

    - Thiết kế và duy trì khung kiểm thử tự động hóa (Automation Framework) sử dụng Selenium kết hợp với Python, giúp giảm
    40% thời gian kiểm thử hồi quy.

    - Thực hiện kiểm tra tính toàn vẹn của dữ liệu và luồng nghiệp vụ trên hệ thống ERP doanh nghiệp.

    - Xây dựng các kịch bản kiểm thử API để đảm bảo sự ổn định của hệ thống trong môi trường microservices.

    - Phối hợp chặt chẽ với đội ngũ phát triển để phân tích yêu cầu và tối ưu hóa chất lượng sản phẩm.

    - Đào tạo và hướng dẫn cho các thành viên mới về quy trình vận hành công cụ Appium cho mảng Mobile Automation.


    Công ty Phần mêm Global Tech (Tháng 06/2019 - Tháng 04/2021)

    Vai trò: Kiểm thử viên Phần mềm

    - Thực hiện kiểm thử thủ công và tự động cho các ứng dụng web hướng người dùng dựa trên ngôn ngữ Python.

    - Phân tích và báo cáo lỗi trên hệ thống Jira.

    - Viết tài liệu hướng dẫn kiểm thử và các kịch bản test case chi tiết.

    - Tham gia vào các buổi họp Sprint Planning và Review theo mô hình Agile.


    HỌC VẤN

    - Tốt nghiệp Cử nhân Công nghệ thông tin - Đại học Bách Khoa.

    - Chứng chỉ ISTQB Foundation Level.'
  - 'HỒ SƠ NĂNG LỰC - LẬP TRÌNH VIÊN JAVA CAO CẤP. Tóm tắt: Chuyên gia phát triển phần mềm với hơn 3 năm kinh nghiệm thực
    chiến trong mảng tài chính và hệ thống thanh toán quốc tế. Có thế mạnh về kiến trúc Microservices và tối ưu hóa hệ quản
    trị dữ liệu Oracle. Đã từng dẫn dắt các dự án chuyển đổi hạ tầng số và tích hợp hệ thống phức tạp. Kinh nghiệm làm việc:
    Kỹ sư Backend tại Fintech Solutions (Tháng 2/2021 - Hiện tại). Chịu trách nhiệm thiết kế và duy trì các dịch vụ lõi sử
    dụng Spring Boot. Hợp tác chặt chẽ với đội ngũ managemnt từ Na Uy để triển khai các tính năng mới cho cổng thanh toán.
    Cải thiện quy trình CI/CD giúp giảm thời gian triển khai sản phẩm. Ứng dụng Splunk để giám sát hệ thống và phát hiện lỗi
    kịp thời. Phát triển các module bảo mật và mã hóa dữ liệu nhạy cảm. Lập trình viên Java tại Global Tech (Tháng 6/2019
    - Tháng 1/2021). Tham gia xây dựng ứng dụng dựa trên Java và Spring Framework. Quản lý công việc và tài liệu thông qua
    Jira và Confluence. Thực hiện tích hợp API với các đối tác ngân hàng lớn. Kỹ năng chuyên môn: Ngôn ngữ lập trình: Java
    (Thành thạo), Javascript (Cơ bản). Frameworks: Spring Boot, Spring Security, Spring Microservices. Cơ sở dữ liệu: Oracle
    SQL, PL/SQL. Công cụ: Gitlab CI/CD, Jira, Confluence, Splunk. Khác: Am hiểu quy trình Agile/Scrum, kiến thức tốt về IT
    Security và mã hóa. Ngôn ngữ: Tiếng Anh (Giao tiếp tốt, trình độ tương đương Upper-intermediate). Sẵn sàng làm việc tại
    văn phòng Krakow mỗi tuần một lần để phối hợp cùng team quốc tế. Điểm mạnh: Khả năng tự học nhanh, cam kết chất lượng
    code và hiệu suất (performence) công việc cao.'
