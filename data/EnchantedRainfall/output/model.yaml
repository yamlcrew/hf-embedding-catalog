    - 'NGUYỄN MINH HOÀNG

      Lập trình viên Ruby on Rails


      Tóm tắt chuyên môn:

      Tôi là một nhà phát triễn (typo) phần mềm với hơn 2 năm kinh nghiễm (typo) làm việc thực tế trong các dự án web sử dụng
      ngôn ngữ Ruby. Tôi có kiến thức vững chắc về lập trình hướng đối tượng, kiến trúc MVC và các tiêu chuẩn bảo mật cho
      ứng dụng web. Thế mạnh của tôi là xây dựng hệ thống backend ổn định và tối ưu hóa hiệu suất cơ sở dữ liệu.


      Kinh nghiệm làm việc:


      Công ty Công nghệ số Alpha

      Lập trình viên Backend (Tháng 06/2022 - Hiện tại)

      - Thiết kế và duy trì các hệ thống máy chủ sử dụng Ruby on Rails cho mảng thương mại điện tử.

      - Trực tiếp cấu hình và triển khai ứng dụng lên các nền tảng đám mây như AWS và Heroku.

      - Tối ưu hóa các truy vấn phức tạp trên PostgreSQL để cải thiện tốc độ tải trang lên 30%.

      - Xây dựng hệ thống JSON API phục vụ cho ứng dụng di động Android và iOS.

      - Áp dụng ElasticSearch để xử lý tính năng tìm kiếm sản phẩm thông minh.

      - Sử dụng Docker để nhất quán môi trường phát triển giữa các thành viên trong đội ngũ.


      Giải pháp Phần mềm Sky

      Junior Ruby Developer (Tháng 01/2021 - 05/2022)

      - Tham gia phát triển các tính năng mới cho nền tảng quản lý nhân sự dựa trên nền tảng Rails.

      - Phối hợp chặt chẽ với bộ phận thiết kế để tích hợp giao diện từ HTML5/CSS3 vào hệ thống.

      - Xử lý các luồng dữ liệu thông qua giao thức HTTP và đảm bảo tính toàn vẹn của dữ liệu.

      - Quản lý các phiên bản mã nguồn chặt chẽ bằng Git, thực hiện việc gộp nhánh và giải quyết xung đột mã nguồn hàng ngày.

      - Thiết kế sơ đồ cơ sở dữ liệu quan hệ trên MySQL đảm bảo tính chuẩn hóa dữ liệu.


      Kỹ năng chính:

      - Ngôn ngữ: Thành thạo Ruby và các đặc tính metaprogramming.

      - Framework: Ruby on Rails (RoR).

      - Database: PostgreSQL, MySQL, có tìm hiểu thêm về MongoDB.

      - API: Thiết kế và tài liệu hóa RESTful API.

      - Công cụ: Git, Docker, SonarQube để kiểm tra chất lượng mã nguồn.

      - Frontend cơ bản: React.js, HTML5, CSS3.


      Học vấn:

      Cử nhân Công nghệ thông tin - Đại học Bách Khoa TP.HCM'
