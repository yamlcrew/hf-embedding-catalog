- source_sentence: "Project Description\r\nCKLR: Customer Knowledge Repository is the CRM Datamart enabling analytical reporting\
    \ and scoring. This solution is based on Oracle 19c database, PL/SQL packages handling data loads from source systems\r\
    \n\r\nResponsibilities\r\nBusiness Analyst role: liaise with business users in order to define and refine requirements\
    \ for data ingestion and data modeling. Have a thorough understanding of customers' business needs and translate those\
    \ business needs into functional specifications. - Create functional & technical documentation – e.g. architecture documentation,\
    \ unit testing plans, and results, data integration specifications - Coach fellow data engineers on data warehousing best\
    \ practices and technical concepts show less\r\n\r\nSkills\r\nOracle, PL/SQL, Functional Testing, Oracle Data Integrator,\
    \ ETL\r\n\r\nNice to have\r\nOracle Hyperion Planning, Shell Scripting\r\n\r\nLanguages\r\nRomanian B2\r\nEnglish B2\r\
    \n\r\nSeniority\r\nSenior\n\n## Ideal Candidate Profile\nSenior Business Analyst with extensive experience in data warehousing\
    \ and business intelligence, specializing in Oracle 19c and PL/SQL development. Adept at translating complex business\
    \ requirements into functional and technical specifications for data ingestion and data modeling within CRM datamarts.\
    \ Proven ability to create comprehensive documentation, including architecture designs and unit testing plans, while also\
    \ mentoring data engineers on best practices. Expertise in ETL processes and data integration using tools such as Oracle\
    \ Data Integrator ensures the delivery of high-quality, data-driven solutions that meet critical business needs."
  sentences:
  - 'HỌ TÊN: Marek Kowalski. ĐỊA CHỈ: Warsaw, Ba Lan. TÓM TẮT CHUYÊN MÔN: Quản lý Dự án Công nghệ (Project Manager) dày dặn
    kinh nghiệm trong lĩnh vực thương mại điện tử và marketing. Có khả năng điều phối xây dựng các ứng dụng web phức tạp,
    giám sát tối ưu hóa cơ sở dữ liệu và quản lý các giải pháp frontend linh hoạt giúp tăng hiệu suất hệ thống. KỸ NĂNG CỐT
    LÕI: Quản lý kỹ thuật: Ruby-on-Rails 5, Stimulus framework. Cơ sở dữ liệu: Hiểu biết cấu trúc SQL. Frontend: Quản trị
    giao diện CSS3, jQuery, HTML5. Công cụ: Git, Jira, Agile, Docker, CI/CD. KINH NGHIỆM LÀM VIỆC: Quản lý Dự án Công nghệ
    tại TechSolutions, Warsaw (Tháng 3/2021 – Hiện tại). Chịu trách nhiệm quản lý việc xây dựng các tính năng mới cho nền
    tảng tiếp thị đa kênh. Điều phối dự án công cụ lập kế hoạch chiến lược (Planning), hỗ trợ đội ngũ xây dựng lộ trình dự
    án và phân bổ nguồn lực một cách tối ưu. Quản lý việc phát triển hệ thống danh bạ (Directory) giúp tổ chức thông tin nhân
    sự và kế hoạch nội bộ. Giám sát triển khai các giải pháp CMS cho nền tảng web và di động, tập trung vào việc quản lý tài
    sản kỹ thuật số hiệu quả. Phối hợp với đội ngũ lập trình để tích hợp framework Stimulus nhằm tạo ra các giao diện người
    dùng phản hồi nhanh mà không làm tăng độ phức tạp của mã nguồn. Quản lý Sản phẩm (Product Lead) tại E-Comm Innovations
    (Tháng 6/2018 – Tháng 2/2021). Tham gia điều phối phát triển các công cụ điều phối quy trình (Workflow) trong lĩnh vực
    bán lẻ, quản lý các bước thực thi và xử lý payload dữ liệu lớn. Lên kế hoạch hệ thống kiểm soát tính bảo mật (Disclosure
    control) nhằm quản lý quyền truy cập thông tin nhạy cảm của khách hàng. Điều hành xây dựng bộ công cụ bản địa hóa (Localization)
    giúp quản lý nội dung đa ngôn ngữ cho các chiến dịch toàn cầu. Phân tích yêu cầu và kiểm thử các câu lệnh SQL để xử lý
    báo cáo dữ liệu phức tạp. Định hướng sử dụng jQuery và CSS để tinh chỉnh giao diện người dùng theo tiêu chuẩn hiện đại.
    GIÁO DỤC: Cử nhân Công nghệ thông tin - Đại học Công nghệ Warsaw.'
  - 'ANDREI POPESCU - Senior Data Architect & Business Analyst. Summary: Results-oriented Senior Data professional with over
    9 years of experience in designing and implementing large-scale data warehousing solutions. Proven expertise in bridging
    the gap between business requirements and technical implementation within the Oracle ecosystem. Expert in PL/SQL development
    and ETL orchestration. Experience: Lead Data Solutions Analyst | FinTech Solutions (Jan 2020 - Present). Acts as the primary
    interface between the marketing department and the IT engineering team to translate complex business needs into detailed
    functional specifications for a global CRM repository. Orchestrates data ingestion workflows using Oracle Data Integrator
    (ODI) to ensure high availability of reporting data. Responsible for creating and maintaining technical architeture documentation
    and system design layouts. Mentors a team of 5 data engineers on best practices for data modeling and query optimization.
    Conducted extensive functional testing and validation of data pipelines to ensure accuracy in analytical scoring models.
    Senior ETL Developer | Global Data Systems (June 2015 - Dec 2019). Developed and optimized complex PL/SQL packages for
    high-volume data processing on Oracle 19c databases. Streamlined data migration tasks through advanced Shell Scripting
    and automation. Collaborated on the design of data marts for financial reporting, ensuring alignment with stakeholder
    expectations. Drafted unit test plans and performed rigorous system integration testing. Key Skills: Advanced Oracle Database
