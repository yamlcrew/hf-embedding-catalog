    50k concurrent users, identifying critical bottlenecks before major product launches.\n- Conducted accessibility audits
    (WCAG) and security vulnerability scans as a standard part of the DoD.\n\nQA Automation Engineer | Global Marketing Systems
    | May 2019 – Dec 2021\n- Developed and maintained over 800 automated test scripts in Python for a global advertising platform.\n-
    Managed the full lifecycle of exploratory testing sessions for new feature releases, uncovering edge cases missed by automated
    suites.\n- Worked closely with product owners to define acceptance criteria and ensure the technical feasibility of new
    requirements.\n- Participated in weekly knowledge-sharing sessions, presenting on topics like ''Stability in Python Automation''
    and ''API Mocking Strategies with Responses''.\n- Contributed to the CI/CD pipeline integration, ensuring that automated
    tests triggered on every merge request to maintain build stability.\n- Monitored production logs and quality KPIs to drive
    data-driven decisions regarding hotfixes and patches.\n\nEDUCATION\nBachelor of Science in Computer Science | Technical
    University | 2015 – 2019\n\nADDITIONAL INFORMATION\n- Frequent participant in international tech conferences and local
    QA meetups.\n- Experienced in working with remote teams across multiple time zones.\n- Enthusiastic about learning new
    domain-specific technologies and business logic.'
