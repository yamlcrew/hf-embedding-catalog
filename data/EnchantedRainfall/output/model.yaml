- source_sentence: "**Requirements:**\r\n\r\n3+ years of experience in Software testing.\r\nUnderstanding/experience with\
    \ ERP systems in different domains.\r\nKnowledge and experience working with programming language JavaScript.\r\nExperience\
    \ with test automation library Puppeteer + Jest.\r\nExperience with web application testing.\r\nExperience with API testing\
    \ and service-based architecture.\r\nGood to have experience with Mobile Automation - Detox(Grey box testing library).\r\
    \nWorking with test management and issue management tools.\r\nIntermediate+ level of English (reading, writing, and speaking).\n\
    \n## Ideal Candidate Profile\nHighly motivated software testing professional with 3+ years of experience, specializing\
    \ in ensuring the quality of ERP systems and web applications across diverse domains. Proficient in JavaScript and leveraging\
    \ test automation libraries such as Puppeteer and Jest to develop robust testing solutions. Adept at API testing within\
    \ service-based architectures, with practical experience using test and issue management tools to streamline workflows.\
    \ Possessing a strong command of English, I am eager to contribute my skills to deliver high-quality software."
  sentences:
  - 'ALEX RIVERA Junior QA Engineer | Crypto Enthusiast PROFESSIONAL SUMMARY Detail-oriented Quality Assurance professional
    with under 1 year of professional experience in manual testing across web and mobile platforms. Proven track record in
    the blockchain and DeFi space through intensive internships, ensuring the security and functionality of digital asset
    platforms. Expertise in Agile workflows and end-to-end testing lifecycles. TECHNICAL SKILLS - Testing Tools: Postman,
    Swagger, Jira, TestRail, Confluence - Methodology: Scrum, Kanban, Waterfall, Agile Mangement - Crypto Knowledge: Smart
    contracts verfication, Web3 wallets (MetaMask, Trust Wallet), Tokenomics, NFT standards - API Testing: RESTful API validation,
    JSON, Status code verification - Documentation: Test plans, Checklists, Bug reports, Traceability matrices PROFESSIONAL
    EXPERIENCE ChainLinker Solutions | QA Intern January 2024 – Present - Supported manual testing efforts for a decentralized
    entertainment platform connecting creators with crypto-incentivized audiences. - Conducted API testing using Postman to
    ensure seamless data flow between the frontend and smart contract layers. - Drafted and maintained over 100 test cases
    and detailed checklists for monthly release cycles. - Collaborated with developers in a fast-paced Scrum environment to
    resolve bugs before deployment. - Performed regression testing on mobile wallet integrations to guarantee transaction
    security. - Analyzed project requirements to identify potential logic gaps and edge cases in the product design. SoftServe
    Digital | QA Trainee October 2023 – December 2023 - Executed functional and UI/UX testing for various e-commerce and fintech
    applications. - Logged detailed bug reports in Jira with clear steps to reproduce and environment details. - Participated
    in daily stand-ups and sprint planning sessions under Kanban methodology. - Supported senior engineers in creating test
    reports and summarizing testing progress for stakeholders. - Performed exploratory testing on new features to uncover
    non-obvious defects. EDUCATION Bachelor of Science in Information Technology State University of Technology (Graduated
    2023) CERTIFICATIONS & INTERESTS - ISTQB Certified Tester Foundation Level - Personal experience trading and staking various
    cryptocurrencies since 2019. - Active member of several Web3 developer communities.'
  - 'ALEX THOMPSON\nSenior QA Automation Engineer (Python Focus)\n\nPROFESSIONAL SUMMARY\nHighly analytical and proactive
    Quality Assurance Engineer with over 4.5 years of experience in the software development lifecycle. Specialized in building
    robust Python-based automation frameworks and driving quality standards across cross-functional squads. Proven track record
    in leveraging quality metrics to optimize release cycles and advocating for a test-first approach in fast-paced environments.\n\nCORE
    COMPETENCIES\n- Programming: Python, JavaScript, SQL\n- Frameworks: Pytest, Playwright, Robot Framework, Requests (API
    Testing)\n- Performance & Security: JMeter, OWASP ZAP, Burp Suite\n- Quality Management: TestRail, Jira, Grafana (Metrics
    Dashboards)\n- CI/CD: Jenkins, GitLab CI\n- Soft Skills: Leadership, Critical Thinking, International Collaboration\n-
    Languages: English (Fluent/C1)\n\nWORK EXPERIENCE\n\nLead Software Development Engineer in Test | InnovateTech Solutions
    | Jan 2022 – Present\n- Architected a modular automation framework using Python and Pytest, reducing regression execution
    time by 40%.\n- Took ownership of the end-to-end quality strategy for high-traffic web applications, ensuring 99.9% uptime.\n-
    Mentored a team of 5 developers and manual testers to adopt a ''Quality Mindset'', focusing on test design principles
    and early defect detection.\n- Implemented automated reporting tools that track code coverage and defect density, providing
