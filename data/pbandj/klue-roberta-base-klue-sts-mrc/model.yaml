  sentences:
  - 전문경영인의 직무는 사람들을 좋아하는 것이나 변화시키는 것이 아니다. 그들의 강점을 일에 투입하는 것이다.《나의 GM 시절》中◇나의 GM 시절=20세기 전반 미국 제너럴모터스(GM)를 가장 성공적인 제조·판매기업으로
    일군 경영자 앨프리드 P 슬론 2세의 회고록. 회사가 곤경에 처한 1923년부터 최고경영자(CEO)를 맡아 ‘모든 소득계층과 용도에 맞는 자동차’란 전략을 사용해 포드의 아성을 무너뜨리고 미국 자동차 업계의 선두주자로
    발돋움하는 과정을 그렸다. (앨프리드 P 슬론 2세 지음, 심재영 옮김, 북코리아, 618쪽, 2만5000원)◇모바일 트렌드 2015=온·오프라인 경계 붕괴와 온라인에서 오프라인으로 이어지는 서비스의 확산이 상거래와
    모바일 결제, 커뮤니케이션, 미디어 콘텐츠, 사물인터넷, 이동통신, 유통 등 개별 분야에서 어떻게 실현될 것인지 전망했다. 모바일 결제와 디바이스, 네트워크 분야에서 급부상하고 있는 알리바바, 텐센트, 샤오미 등
    중국 기업도 소개한다. (커넥팅랩 지음, 미래의창, 311쪽, 1만5000원)◇천천히, 함께하는 마지막=현직 일간지 기자가 시한부 암 환자인 아버지와 보낸 일상을 담담하게 기록했다. 암 환자와 가족들이 맞닥뜨린
    현실과 투병 과정에서 생길 수 있는 경제적 문제 등을 꼼꼼하게 적었다. 암 환자도 일상이 있고, 그 일상을 세심하게 살필 필요가 있으며, 작은 행동으로도 암 환자와 추억을 만들고 즐거움을 나눌 수 있다는 메시지를
    전한다. (이현택 지음, 책밭, 264쪽, 1만2000원)◇인생을 배우다=괴테 연구의 세계적 권위자로 꼽히는 전영애 서울대 독문과 교수가 한국과 독일을 오가며 마음에 남은 단상과 삶의 지혜를 담은 에세이를 모았다.
    평생을 문학과 더불어 살아온 저자의 삶과 독일, 한국에서 만난 다양한 사람들의 사연과 괴테, 카프카, 니체, 쿤체 등 독일을 대표하는 작가들의 문학세계를 황규백 작가의 그림과 함께 담았다. (전영애 지음, 청림출판,
    288쪽, 1만3800원)
  - “박수근 화백의 유화가 2004년 3월 뉴욕 크리스티 경매에서 112만7500달러(약 12억4000만원)에 낙찰됐을 때만 해도 중국 현대미술이 주목받지 못했지만 요즘 중국 미술품은 세계 경매시장의 중심에 서 있습니다.”(우찬규
    학고재갤러리 회장)중국 작가들의 그림값이 2010년 이후 천정부지로 치솟고 있다. 근대 문인화가 치바이스의 작품 ‘송백고립도’(266×100㎝)는 2011년 5월 베이징 자더경매에서 4억2550만위안(약 736억원)에
    낙찰되며 중국 회화 사상 최고가를 기록했다. 산수화가 리커란의 1964년 작품 ‘완산훙볜’ 역시 2012년 베이징 경매에서 응찰자들의 치열한 경합 끝에 2억9300만위안(약 507억원)에 팔렸다. ○45억원 vs
    736억원 산수화 등 근대미술뿐 아니라 현대미술에서도 ‘아트 차이나’의 파워가 거세다. 지난해 10월 중국 현대화가 쩡판즈의 유화 ‘최후의 만찬’이 뉴욕경매에서 2330만달러(약 250억원)에 낙찰돼 아시아 현대미술
    사상 최고가 기록을 세웠다. 최근 미술품 거래가 많이 늘어나고 있는 홍콩과 베이징, 상하이는 세계 주요 미술 시장으로 떠오르고 있다.반면 한국 작가의 그림값은 하향 곡선 또는 답보 상태다. 2007년 박수근 화백의
    1950년대 후반 작품 ‘빨래터’가 45억2000만원에 낙찰돼 국내 미술품 경매 최고가를 기록한 이후 이렇다 할 만한 작품이 나오지 않고 있다. 이중섭 화백의 ‘황소’(35억6000만원), 김환기 화백(1913~1974)의
    ‘꽃과 항아리’(30억5000만원) 등이 그나마 뒤를 잇고 있다.치바이스와 비슷한 시기에 활동했던 한국화 대가들의 작품가격은 오히려 외환위기 직전인 1996년께에 비해 3분의 1 수준까지 떨어졌다. 현재 청전 이상범을
    비롯해 소정 변관식, 의제 허백련, 이당 김은호, 심향 박승무 등 6대 한국화가들의 40호 크기 작품가격(2000만~7000만원)은 치바이스와 장테천 등에 비해 수백 배 벌어진 상태다.미술품 경매회사인 서울옥션과
    K옥션의 지난달 경매 낙찰 총액(142억원)이 지난 6월보다 두 배 가까이 늘어 시장 회복의 기미를 보이고 있지만 국내 미술 경기가 2008년 이후 7년째 불황을 거치면서 그림값이 중국에 비해 턱없이 낮아졌다는
    게 전문가들의 진단이다. 김윤섭 한국미술경영연구소장은 “국제 시장에서 중국과 한국 현대 미술품의 최고가 그림값은 무려 16배나 벌어졌다”며 “세계 시장에서 제값을 못 받는 것도 문제지만 국내에서 대접 못 받는 현상(domestic
    discount)이 더 심각하다”고 지적했다.○미술품 손비 3000만원까지 인정해야한국 미술이 중국에 비해 국제 시장에서 주목받지 못하는 진짜 이유는 뭘까. 이동재 아트사이드갤러리 대표는 “2013년부터 미술품(작고
    작가 6000만원 이상 작품)에 양도세가 부과되면서 시장이 심각한 위기에 빠졌다”며 “국내외 컬렉터(미술품 수집가)와 기업들이 국내 작가의 작품 구입을 꺼리고 있다”고 지적했다. 세금도 세금이지만 실명 노출 부담
    때문에 컬렉터들이 공개적인 거래를 기피하고 그에 따라 세수증대 효과는 없이 시장만 위축시켰다는 설명이다. 2007년 6000억원 수준에 이르렀던 국내 미술품 거래시장 규모가 지난해 3900억여원으로 쪼그라든 것도
    이런 이유에서다.기업의 미술품 구입비를 손비로 인정하는 범위가 선진국과 달리 너무 적은 것도 시장 위축 요인으로 꼽힌다. 이옥경 서울옥션 부회장은 “정부에서는 기업의 환경미화, 장식을 목적으로 한 미술품 구매에
    대해 손금 산입이 가능한 금액을 500만원까지로 제한하고 있다”며 “이를 최소한 3000만원까지로 올려야 한다”고 말했다. 노승진 노화랑 대표는 “한 해 동안 거래되는 미술품의 50%가량이 건당 500만원 미만이며,
    미술품 구매자의 약 90%가 개인인데, 개인이 미술품을 구입할 때 500만원까지 소득공제해주는 방안도 마련돼야 한다”고 말했다.
  - 권오갑 현대중공업 사장이 15일 취임 1년을 맞았다. 권 사장은 현대중공업이 창사 이래 최대 규모의 적자(1조1037억원·지난해 2분기)를 기록한 직후 ‘구원투수’로 나서 지난 1년 동안 구조조정을 진두지휘했다.
    선제적인 구조조정에는 성공했지만, 흑자전환과 노사갈등 봉합 등은 여전히 숙제로 남아 있다는 평가가 나온다.○최악 상황에서 친정 복귀권 사장은 2010년 현대중공업그룹이 다시 인수한 현대오일뱅크의 초대 사장을 맡았다.
    현대오일뱅크의 경영실적이 궤도 위에 올랐다는 평가가 나오기 시작할 무렵 친정인 현대중공업은 창사 이래 최대 위기를 맞았다. 해양플랜트사업에서 대규모 손실이 발생하면서 1972년 창사 이래 최악의 실적을 기록한 것이다.“원칙과
    초심으로 돌아가자”는 취임사와 함께 친정으로 복귀한 권 사장은 취임 한 달 만에 임원 구조조정을 단행했다. 임원의 31%를 줄이는 인사였다. 한 달 뒤인 11월10일에는 과장급 이상 직원을 대상으로 성과연봉제를
    도입했다. 올해 1월부터는 직원 1300여명을 대상으로 희망퇴직을 시행했다. 전 직원(약 2만6000명)의 5% 정도를 퇴직시키는 고강도 구조조정이었다.조직 규모를 줄이는 작업도 함께 진행했다. 현대중공업과 현대삼호중공업,
    현대미포조선 등 그룹 내 3개 조선사 영업조직을 통합하고 해양사업본부와 플랜트사업본부를 하나로 합쳤다. 연이은 구조조정 방안 발표에 노조의 반발은 거셌지만 권 사장은 “회사는 창사 이래 최대 적자를 기록하고 있는데
    여전히 ‘우리가 가장 잘하고 있다’는 착각과 오만함에 대해 누군가는 경종을 울려야 한다”며 고삐를 놓지 않았다.한 달에 한 번꼴로 구조조정 방안을 발표하던 권 사장은 취임한 지 약 9개월 만인 지난 6월1일 인위적인
    인력 구조조정을 전면 중단한다고 선언했다. 고강도 구조조정이 어느 정도 마무리됐다고 판단한 것이다. 조선업계 관계자는 “현대중공업과 함께 ‘빅3’로 불리는 삼성중공업, 대우조선해양은 이제야 구조조정 논의를 시작하고
    있다”며 “현대중공업이 선제적으로 구조조정을 완료한 만큼 실적 개선에 속도를 내기 좋은 위치에 서 있다”고 말했다.○실적 개선과 노사문제는 여전한 숙제구조조정을 마무리한 권 사장의 최대 관심사는 실적 회복이다.
    권 사장은 취임 직후인 지난해 3분기 1조9346억원 영업손실을 기록한 사실을 발표하면서 “4분기에 500억원 규모의 흑자를 낼 자신이 있다”고 말했지만, 이후 한 번도 분기별 흑자를 내지 못했다. 지난해 적자
    규모는 3조원이 넘는다.현대중공업은 하반기 흑자를 기록하겠다는 목표를 세웠다. 권 사장 역시 지난달 15일 그룹 임원 200여명과 경주 남산에 올라 “하반기에 반드시 흑자 전환을 이뤄내 재도약 기반을 마련하겠다”고
    말했다. 그는 지난 7월30일 2억원어치의 자사주를 매입하고, 임원들을 상대로 ‘주식 갖기 운동’을 전개하고 있다. 회사 관계자는 “실적 회복에 자신이 있음을 보여주기 위한 결정”이라고 설명했다.노사갈등 해결도
    남아 있는 숙제 중 하나다. 현대중공업 노동조합은 권 사장의 고강도 구조조정에 반기를 들었고, 지난해 19년 무분규 기록을 깨고 파업을 벌였다. 노조는 권 사장을 근로기준법 위반 혐의로 고발하기도 했다. 권 사장은
    지난해 11월 이후 자신의 임금을 전액 반납하는 등 다양한 노력을 하고 있지만, 노조를 설득하지는 못했다. 현대중공업 노조는 올해 사상 최초로 조선 3사가 동반 적자를 기록할 것이라는 관측이 나오는 와중에도 파업을
    강행했다. 현재 노사는 추석 전 임금협상 타결을 목표로 하고 있지만, 그 가능성이 크지 않다는 게 조선업계 관계자들의 지배적인 관측이다.
- source_sentence: 현대의 조선 3사 중, 이번 년도 상반기 때 임원 수가 가장 적었던 곳은?
  sentences:
  - 올해 상반기 1조3000억원에 가까운 영업적자를 낸 현대중공업이 전체 임원의 30% 안팎을 줄이는 고강도 구조조정에 착수했다. 또 관리직 등 지원부서 직원을 대폭 줄이는 대신 생산·영업을 강화하는 방안도 추진한다.
    수익 창출이 어려운 사업과 해외법인 운영은 원점에서 재검토하고 전사 차원의 비용 절감에도 나서기로 했다.창사 이래 최악의 위기에도 노동조합이 파업 움직임을 보이는 가운데 회사 측에서 솔선해 거품과 군살을 걷어내고
    새롭게 도약할 수 있는 체력을 기르기 위해서다.현대중공업은 12일 최길선 회장과 권오갑 사장 주재로 긴급 본부장 회의를 열어 이같이 결정했다. 7개 사업본부장이 모두 참석한 가운데 열린 이 회의에선 260명의 조선
    3사 임원 전원이 일괄 사직서를 제출하기로 했다.○“냉정하게 현실을 직시하라”권 사장은 이날 “지금 현실을 직시해야 하며 강도 높은 개혁을 통해 새롭게 변화하지 않으면 안 된다”며 “우리 회사를 바라보는 많은 국민과
    주주들을 생각해 분명한 개혁 청사진을 갖고 책임감 있게 일해달라”고 강조했다.이번 고강도 조직개편의 핵심은 임원 구조조정이다. 대상은 현대중공업, 현대미포조선, 현대삼호중공업 등 3개 조선 계열사 임원들이다. 3개
    조선 계열사 임원은 올 상반기 기준으로 현대중공업 213명, 현대미포조선 27명, 현대삼호중공업 20명 등 260명이다. 회사는 이들의 사직서를 13일 받은 뒤 선별적으로 수용 여부를 결정할 계획이다.그룹 고위
    관계자는 “예년에는 임원 인사 때 사직 처리하는 비율이 10~15%였지만 이번에는 최대 30% 선으로 확대할 것”이라며 “인사 시기도 11월 말~12월 초에서 올해는 10월 중으로 앞당길 예정”이라고 설명했다.조직개편에도
    나설 예정이다. 지원조직을 대폭 축소하고 생산과 영업 중심으로 조직 시스템을 바꿀 방침이다. 또 우수인력을 생산과 영업으로 전진 배치해 회사를 정상화하는 방안도 추진하기로 했다. 과감한 사업재편도 진행한다. 수익
    창출이 어려운 사업과 해외법인들은 원점에서 재검토해 조정하기로 했다. 줄일 수 있는 비용은 모두 줄이는 등 전사적인 비용 절감에도 나선다. 생산현장의 혁신 작업도 시작한다. 이를 위해 공정개선혁신팀을 새로 만들어
    모든 사업본부의 공정 효율을 재점검하기로 했다.○권오갑의 승부수 통할까이번 구조조정 및 조직개편 방안은 권 사장이 취임 한 달여 만에 현대중공업을 회생시키기 위해 내놓은 승부수다. 현대중공업은 지난 2분기 1조1037억원대의
    영업 적자를 기록하는 등 올해 상반기 누적 적자가 1조2925억원에 달했다. 1972년 창사 이래 처음이다.위기 수습을 위해 지난달 15일 현대오일뱅크 사장이던 권 사장이 ‘구원투수’로 전격 투입됐다. 이에 앞서
    현직을 떠나 있던 최 회장도 지난 8월 복귀했다.하지만 회사가 초유의 위기에 빠진 가운데서도 노조는 20년 만의 파업 강행을 거론하며 사측을 계속 압박하고 있다. 권 사장은 취임 이후 노조 측과 임단협을 마무리하기
    위해 적극 나섰지만 아직 타협점을 찾지 못했다. 노조가 쟁의행위 찬반투표일을 무기한 연장하고 교섭을 중단했기 때문이다.
  - 마법사 멀린으로부터 명검 엑스칼리버를 얻어 나라를 통일한 우서왕은 강적 콘월과의 화해 잔치에서 그의 처를 훔쳐 보고는 멀린의 마법으로 그녀와의 동침에 성공한다. 그 결과 아서가 태어나지만, 멀린과의 약속에 따라
    마법을 사용한 대가로 아서는 태어나자마자 멀린에게 맡겨진다. 우서는 죽기 전 검을 바위에 박아 넣는데, 아무도 그 검을 바위에서 뽑지 못하고 사람들은 그 검을 뽑은 자가 왕이 될 것이라고 믿게 된다. 청년이 된
    아서는 출생의 비밀을 모르고 기사의 심부름꾼으로 지내다, 우연히 바위에 박힌 엑스칼리버를 쉽게 뽑아 들게 되고 다시 나타난 마법사 멀린과 함께 지내면서 칼의 마력을 알게 된다. 하지만 몇몇 기사들은 그를 왕으로
    인정하지 않으려 들고, 아서는 자신의 편에선 기사들과 함께 그들과 싸워 이기고 왕위에 올라 원탁의 기사라는 동맹을 결성하게 된다. 화려한 기사의 황금시대를 맞이하지만 뛰어난 기사 랜슬롯 경과 왕비 귀네비어가 사랑에
    빠져 불륜을 저지르고, 모드레드가 반란을 일으켜며, 암흑의 시대가 찾아온다. 아서와 모드레드 간 최후의 결전에서 두 사람은 동시에 서로를 찔러 죽음에 이르게 되는데, 치명적인 부상을 입은 아서는 퍼시벌에게 엑스칼리버를
    호수에 던져 버리라고 유언한다. 호수로 간 퍼시벌은 엑스칼리버를 바다에 던지자, 물 속에서 요정의 손이 올라오고, 요정의 손에 쥐어진 엑스칼리버는 물 속으로 사라진다. 퍼시벌이 다시 왕에게 돌아왔으나, 아서왕을
    태운 배도 바다 저 멀리 사라진다.
  - 내년에 스마트폰과 4세대 이동통신 LTE 확산 속도는 둔화되지만 알뜰폰 시장은 더 활성화될 것으로 전망됐다. 웨어러블 컴퓨터와 사물인터넷(IoT)은 내년에도 핵심 화두가 될 것으로 예상됐다. KT경제경영연구소는
    10일 국내 정보통신기술(ICT) 산업의 주요 이슈와 관전 포인트를 제시하는 ‘2014년 ICT 10대 주목 이슈’ 특집 보고서를 발간했다. 통신 분야에서는 알뜰폰 시장 활성화가 주요 이슈로 꼽혔다. 연구소는 “가입자
    및 스마트폰의 포화, 보조금 경쟁 완화 등 알뜰폰 성장을 위한 환경이 조성되고 있다”며 “특히 우체국 농협 등 대형 유통망이 확대돼 알뜰폰 시장이 본격적으로 개화할 수 있을지 주목된다”고 밝혔다. IoT 시장은
    그동안 공공재나 산업시설물 영역에 한정됐지만 앞으로 가전과 자동차 등 전방위로 확대될 것으로 연구소는 내다봤다. 미디어·포털 분야에서는 스마트폰을 통해 방송 콘텐츠를 이용하는 OTT(over-the-top) 서비스의
    확산을 주요 이슈로 제시했다. 카카오톡, 라인 등 모바일 메신저의 글로벌 플랫폼 주도권 경쟁이 더 치열해지고, 다양한 메시지 전달 기법 등장으로 모바일 광고 시장이 활성화될 것으로 전망됐다. 정보기술(IT) 서비스·제조
    분야에서는 신성장 동력 발굴에 대한 관심이 높아지면서 포스트 스마트폰 단말로서 웨어러블 단말의 안착 가능성에 주목해야 할 것으로 지적됐다. 연구소는 “웨어러블 컴퓨터를 둘러싼 경쟁 구도 변화와 킬러 서비스 등장
    여부가 관심”이라고 설명했다.
- source_sentence: 박근혜 씨가 두 번째로 순방할 나라는?
  sentences:
  - 박근혜 대통령이 쿠웨이트 사우디아라비아 아랍에미리트(UAE) 카타르 등 중동 4개국 순방을 위해 1일 출국했다.박 대통령은 순방 기간 4개국 정상과 각각 양자회담을 하고 에너지, 보건의료, 정보통신기술(ICT)
    등 고부가가치 신성장동력 분야에서 협력 확대를 논의할 예정이다. 주철기 외교안보수석은 “국내 기업들의 중동 진출 50주년을 맞아 제2의 중동붐을 한국 경제의 신성장동력으로 활용한다는 것이 이번 순방의 테마”라고
    설명했다. 박 대통령도 이날 출국에 앞서 3·1절 기념사에서 “이번 순방을 통해 제2의 중동붐으로 제2의 경제 부흥을 위한 토대를 마련할 수 있도록 총력을 다해 비즈니스 외교를 펼칠 것”이라고 말했다.박 대통령은
    4개국 모두에서 양국 경제인들이 참석하는 대규모 비즈니스 포럼을 열어 우리 기업들의 현지 수주 활동을 지원할 예정이다. 이번 순방에는 삼성전자와 현대자동차 등 115개 기업과 경제단체로 구성된 역대 최대 규모의
    경제사절단이 동행한다. 에너지, 건설, 제조, 정보기술(IT), 보건의료, 금융 등 다양한 분야 기업들이 참여하며, 절반 이상이 중견·중소기업들이다. 박 대통령은 3일까지 첫 순방국인 쿠웨이트를 방문한다. 8년
    만에 이뤄지는 한국 대통령의 쿠웨이트 방문이다. 3~4일에는 최대 원유 공급국이자 해외건설 수주시장인 사우디아라비아를 방문해 에너지·원전, 건설·플랜트, 보건·의료, ICT 등의 분야 협력 방안을 논의한다. 이어
    4~6일 UAE를 방문한다. 중동 순방 마지막 국가인 카타르(6~8일)에선 환자 송출 등 보건의료, 월드컵 관련 인프라 건설 투자, 원자력, ICT, 교육, 문화 등 새로운 협력 분야를 적극 발굴하는 방안이 추진된다.
    박 대통령은 7박9일간 순방을 마친 뒤 9일 오전 귀국한다.
  - "필트다운 인의 발견과 관련한 기록은 거의 없다. 그러나, 1912년 12월 18일 열린 런던 지질학회 회의에서 찰스 도우슨은 4년 전 필즈 다운의 노동자에게서 유골의 파편을 넘겨 받았다고 주장하였다. 도우슨은\
    \ 그 노동자가 해당 지역에서 작업을 하다 부서진 상태의 유골을 발견하였고, 자신이 현장을 다시 찾아가 더 많은 유골을 찾게 되었다고 보고하였다. 도우슨은 이 유골들을 대영박물관의 지질학 담당인 아서 스미스 우드워드에게\
    \ 보여주었다. 우드워드는 이 발견에 큰 관심을 보였으며 1912년 6월에서 9월 사이에 도우슨과 함께 수 차례 발굴작업을 벌여 몇 개의 뼈 조각을 더 발견하였다. \n\n \n런던 지질학회의 회의에서 우드워드는\
    \ 유골들을 재조합한 결과 이 유골은 후두부의 크기가 작아 뇌의 용량이 현대인에 비해 약 3분의 2 정도인 점을 제외하면 현생 인류와 매우 흡사한 모습이라고 설명하였다. 우드워드는 또한 이 유골의 치아 역시 현생\
    \ 인류와 같이 마모된 흔적이 있지만, 아래턱뼈만은 어린 침팬지와 흡사한 형태를 보인다고 밝혔다. 우드워드는 대영박물관에서 두개골을 재조합하고 필트다운 인이라는 이름을 붙였다. 우드워드는 이 유골이 인간에 가까운\
    \ 머리뼈와 유인원에 가까운 아래턱뼈로 이루어져 있는 점을 감안할 때 잉글랜드에 살았던 유인원과 인간 사이의 잃어버린 고리에 해당한다고 추정하였다.\n\n잉글랜드 왕립 외과 의사회의 아서 케이스 교수는 이 유골의\
    \ 복제품을 사용하여 우드워드의 방식과는 다른 방법으로 복원하여 머리뼈의 크기가 현생 인류와 같은 새로운 모형을 제작하였다. 이 새로운 모형을 바탕으로 케이스는 필트다운 인의 학명을 호모 필트다우네시스 (Homo\
    \ piltdownensis)로 명명하면서 해당 유골이 보다 현생 인류에 가깝다고 언급하였다. \n\n1913년 초 킹스 칼리지 런던의 대이비드 워터스턴은 네이처에 기고한 논문에서 이 유골은 인간의 머리뼈와 유인원의\
    \ 아래턱뼈를 이어붙인 조작이라고 주장하였다. 1915년 프랑스 고생물학자 마셀린 보울도 같은 의견을 발표하였고, 미국의 동물학자 게리트 스미스 밀러는 현생인류의 두개골과 유인원의 아래턱뼈가 동시에 발견된 것일\
    \ 뿐이라고 주장하였다. 1923년 해부학자 프란츠 바이덴라이히는 필트다운 유골의 치아와 아래턱뼈가 정합하지 않는다는 점을 지적하였다. 그러나 이러한 반대 의견에도 불구하고 학계는 필트다운 인이 발견 된 후 30년\
    \ 동안 이 유골을 원시 인류의 하나로서 인정하였다.\n\n1915년 도우슨은 필트다운 지역의 다른 곳에서 두 번째 필트다운 인 유골을 발견했다고 주장하였고 이로써 필트다운 인의 존재는 의심할 여지가 없는 것으로\
    \ 여겨졌다."
  - 지난해 가요계의 가장 큰 이슈는 대형 기획사들의 ‘멀티 레이블’(복수 음반기획사) 구축이었다. 작은 음반기획사를 단순히 인수합병하는 것이 아니라 자회사로 두고 독립적 성격을 유지하도록 하는 방식이다. 중소 기획사는
    자신들의 음악적 색채를 유지한 채 대형 기획사의 자금과 네트워크를 이용할 수 있고, 대형 기획사는 경쟁력 있는 콘텐츠를 확보하는 ‘윈-윈 전략’인 셈이다.○SM 로엔 큐브 등 레이블 구축에 속도소녀시대 동방신기
    슈퍼주니어 등이 소속된 SM엔터테인먼트(SM)는 지난해 8월 자회사 SM C&C를 통해 울림엔터테인먼트(울림)를 합병했다. 인피니트와 넬 등이 이곳 소속이다. SM에 인수됐지만 울림은 ‘울림 레이블’을 운영하며
    독자 행보를 유지하고 있다. 기존 SM 소속 가수들과는 다른 색깔의 음악으로 장르의 다양성을 꾀한다는 전략이다. SM은 앞으로도 인수합병 등을 통해 산하 레이블을 늘려나간다는 방침이다. 포미닛과 비스트 등이 속한
    큐브엔터테인먼트도 산하에 에이큐브엔터테인먼트 큐브DC 뮤직큐브 등을 두고 있다. 에이큐브엔터테인먼트는 독립 음반 레이블로 에이핑크와 허각 등이 소속돼 있다. 큐브DC에는 비 노지훈 신지훈 등이 속해 있다. 뮤직큐브에선
    김도훈 김형석 황세준 등 프로듀서와 작사·작곡가들이 활동 중이다. 이들은 큐브 소속 가수들의 음반 기획, 제작 등을 맡고 있다. 지난해 9월에는 국내 최대 음원 서비스 ‘멜론’을 보유한 로엔엔터테인먼트가 ‘로엔트리
    레이블’과 새로 영입한 작곡가 신사동호랭이를 주축으로 하는 ‘콜라보따리 레이블’을 설립하며 멀티 레이블 체제로 전환했다. 로엔트리에는 아이유 써니힐 김석훈 등이, 콜라보따리에는 지아 피에스타 등이 있다. 로엔은
    지난해 12월 스타쉽엔터테인먼트 지분 70%를 매입해 자회사로 편입시켰다. 씨스타 케이윌 등이 속한 스타쉽도 산하 독립 레이블로 스타쉽 엑스를 두고 있다. 여기에는 매드클라운, 정기고 등 힙합 뮤지션들이 속해 있다.○다양한
    콘텐츠 확보…“색채 유지 중요”국내에선 지난해 하반기 이후 레이블 구축 움직임이 두드러졌지만 미국 일본 등에선 이미 흔한 일이다. 유니버설뮤직그룹 소니뮤직그룹 워너뮤직그룹 등은 성격이 다른 레이블을 여럿 운영하며
    다양한 아티스트를 선보이고 있다. 유니버설뮤직그룹에는 에미넴·레이디 가가 등이 속한 인터스코프 레코즈와 섹스 피스톨스·마이크 올드필드가 소속된 버진 레코즈, 비치 보이스·케이티 페리를 보유한 캐피털 레코즈, 스매싱
    펌킨스가 속한 캐롤라인 레코즈 등을 보유하고 있다. 싸이도 유니버설뮤직그룹 산하 ‘유니버설 리퍼블릭 레코드’와 음반 유통 계약을 맺고 활동 중이다. 소니뮤직그룹에는 브리트니 스피어스·알 켈리 등이 속한 RCA레코즈,
    비욘세·셀린 디옹이 활동하고 있는 콜롬비아 레코즈 등이 있다. 워너뮤직그룹도 제이슨 므라즈·브루노 마스가 소속된 아틀란틱, 그린데이·린킨파크가 속한 워너브러더스 레코즈, 뮤즈·데미안 라이스가 소속된 워너뮤직UK
    등을 두고 있다. 이 같은 시스템을 통해 레이블은 본사의 자본력과 시스템을 바탕으로 음악적 특성을 유지하고 본사는 다양한 콘텐츠를 세계 시장에 소개할 수 있다. 국내 대형 기획사들도 레이블을 통해 경쟁력 있는 콘텐츠를
    확보해 해외 시장에 진출한다는 방안이다. 하지만 한국 시장의 규모를 고려할 때 레이블 체제가 본격화되면 몇몇 대형 업체가 시장을 좌지우지할 것이란 우려도 있다. 비슷비슷한 아이돌 가수들이 레이블 이름만 바꿔 양산되는
    상황에 처할 수도 있다. 이세환 소니뮤직코리아 차장은 “각 레이블의 음악적 색채를 꾸준히 유지하는 것이 중요하다”며 “특정 장르가 잘된다고 유행처럼 레이블을 만드는 일은 피해야 한다”고 말했다.
- source_sentence: 베네딕토 16세가 영국 방문 이후 향한 곳은?
  sentences:
  - 에픽게임즈의 한국지사 에픽게임즈 코리아(대표 박성철)는 ‘코리아 그래픽스(Korea Graphics)’에서 언리얼 엔진 세션을 진행한다고 28일 밝혔다. ‘코리아 그래픽스’는 그래픽 업계를 위한 최신의 정보를 제공하고,
    실무에 도움이 되는 그래픽 솔루션 구축 성공 사례를 소개하는 장을 마련하기 위해 지난 2012년, ‘코리아 그래픽스 월드’라는 이름으로 처음 개최됐다. 올해 8회째를 맞는 ‘코리아 그래픽스 2020’은 ‘엔지니어링을
    위한 크리에이티브 디자인 및 비주얼라이제이션’을 주제로 국내 제조 및 건축 업계와 그래픽 기반의 산업디자인을 비롯해 VR/AR/MR, AI(인공지능) 그리고 3D 프린팅 업계를 아우르는 최신 그래픽 기술 동향과
    신기술 정보를 제공할 예정이다. 행사는 신종 코로나바이러스 감염증에 따른 안전성과 편의를 위해 6월 10일(수)과 11일(목), 양일에 걸쳐 온라인에서 개최된다. 에픽게임즈는 '언리얼 엔진을 통한 제조 산업의 디지털
    트랜스포메이션'과 'AEC 산업 인터랙션 디자인 단계에서 트윈모션의 역할'이라는 주제로 두 개의 강연을 진행한다. 10일에 진행되는 '언리얼 엔진을 통한 제조 산업의 디지털 트랜스포메이션' 세션에서는 제조 산업에서
    혁신을 위한 중요한 트렌드로 자리 잡은 디지털 트랜스포메이션에 대해 살펴본다. AR/VR 등 여러 플랫폼을 지원하는 리얼타임 3D 창작 플랫폼 언리얼 엔진을 통해 세계 주요 제조업체들이 어떻게 디지털 트랜스포메이션으로
    혁신하고 있는지에 대한 사례와 함께 여기에 사용된 언리얼 엔진의 기능들을 에픽게임즈 코리아의 신광섭 부장이 설명한다. 에픽게임즈 코리아 진득호 과장은 11일, 'AEC 산업 인터랙션 디자인 단계에서 트윈모션의 역할'
    강연에서 리얼타임 몰입형 3D 건축 시각화 솔루션인 트윈모션을 소개한다. 직관적인 인터페이스와 언리얼 엔진의 강력함을 통합한 트윈모션을 AEC 프로젝트에 활용한 사례와 프로젝트 이해관계자의 많은 피드백을 수렴하는
    과정에 대해 알아보는 시간이 될 예정이다. 에픽게임즈 코리아 박성철 대표는 “언리얼 엔진은 이제 게임 산업을 넘어, 제조와 건축, 영화 및 미디어 등 다양한 산업 분야에서도 폭발적으로 도입이 증가되고 있으며, 얼마
    전 출시된 언리얼 엔진 4.25를 통해 관련 분야 종사자분들을 위한 다양한 기능들이 대폭 업데이트됐다.”라면서, “이번 ‘코리아 그래픽스’에서의 세션을 통해 건축 및 제조 등 산업 분야의 종사자분들이 언리얼 엔진으로
    인터랙티브하고 몰입감 넘치는 리얼타임 경험을 제작하시는 데 있어 실질적인 도움을 얻어 가시길 바란다.”라고 말했다. ‘코리아 그래픽스 2020’의 무료 참석 등록 및 행사에 관한 자세한 내용은 홈페이지에서 확인할
    수 있다.
  - 친구들과 생각 없이 주고받은 카카오톡 대화 내용이 외부에 유출될 수도 있다는 의구심이 높아지면서 해외 모바일 메신저로 떠나는 ‘사이버 망명’이 줄을 잇고 있다. 시장조사업체 랭키닷컴의 조사에서는 지난주 카카오톡
    사용자가 1주일 새 40만명 줄었다. 독일에 서버를 둔 텔레그램으로 60만명이 옮겨 간 영향이 컸다. 회사원 이태봉 씨는 “범죄 혐의를 받는 사람만이 수사기관의 조사 대상이라는 것은 알지만 카카오톡에서 격의 없이
    주고받은 대화와 사진 등이 서버 어딘가에 저장돼 있고 밖으로 유출될 수 있다는 사실에 기분이 개운치가 않다”고 말했다.이용자들이 카카오톡에 분노하는 까닭은 이동통신사들도 저장하지 않는 문자메시지를 서버에 5~6일
    동안 보관해왔기 때문이다. SK텔레콤 KT LG유플러스 등 통신 3사는 통화와 문자의 발신 기록만 1년간 서버에 남겨둘 뿐 통화·문자 내용은 저장해 두지 않는다. 2004년 11월 치러진 ‘2005학년도 대학수학능력시험’에서
    발생한 부정 사건이 계기가 됐다. 경찰은 휴대폰 문자 24만8000건을 분석해 증거를 제출했는데, 이 과정에서 통신사가 문자 내용을 서버에 저장해 두고 있는 사실이 알려져 사회적 논란을 일으켰다.이후 통신사는 문자
    내용은 앞의 한 글자만 남기고 나머지는 모두 지워지도록 했다. 한 글자를 남긴 것은 통신기록을 남기기 위해서다. 통신기록을 남기는 것은 요금 오류에 대비하는 차원도 있다. 다만 휴대폰 문자는 암호화돼 있지 않아
    중간에 메시지를 가로채는 해킹 등에 노출돼 있다는 게 단점이다.카카오톡을 서비스하는 다음카카오 관계자는 “기기 분실, 장기 출장·휴가 등으로 휴대폰을 꺼놓거나 네트워크에 연결되지 않아 일정 기간 카톡을 확인할 수
    없는 사람이 많기 때문에 대화 내용을 저장하지 않을 수 없다”고 말했다. 만약 대화 내용을 서버에 저장하지 않는다면 다시 카카오톡을 실행했을 때 그동안의 메시지를 받아볼 수 없다는 설명이다.지난 8일부터 카카오톡
    메시지의 서버 저장 기간은 기존 3~7일에서 2~3일로 줄었다. 다음카카오 관계자는 “압수수색 영장 발부에 걸리는 시간을 고려하면 서버에 저장된 메시지를 수사기관이 거의 볼 수 없게 될 것”이라며 “단 3일 이상
    휴대폰이 꺼져 있으면 이전 메시지를 볼 수 없게 된다”고 말했다.최근 텔레그램이 각광받고 있지만 네이버가 서비스하는 라인도 수사기관이 접근하기 어렵다. 서버가 일본에 있기 때문이다. 네이버 관계자는 “일본 수사기관의
    영장이 있는 경우에만 대화 내용을 제공한다”고 말했다. 지난 7월 도입한 ‘타이머챗’ 기능을 사용하면 라인도 서버에서 대화 내용이 바로 삭제된다. 타이머챗은 사용자가 2초에서 1주일까지 설정한 기한이 지나면 메시지가
    자동 삭제되는 기능이다.
  - "2010년의 교황 베네딕토 16세의 영국 방문은 2010년 9월 16일부터 9월 19일까지 로마 가톨릭교회의 교황인 베네딕토 16세가 국빈 자격으로는 처음으로 영국을 공식 방문한 사건이다(1982년 교황 요한\
    \ 바오로 2세의 방영은 개인적인 방문이었다). 교황 베네딕토 16세는 스코틀랜드 방문을 시작으로 엘리자베스 2세와 런던 시장 보리스 존슨을 만났으며, 추후 영국 수상 데이비드 캐머런과 영국 성공회 캔터베리 대주교\
    \ 로완 윌리엄스와도 면담했다.\n\n 이 방문은 때마침 일어난 가톨릭 사제의 아동 성폭력 사건과 맞물려 미디어의 큰 관심을 받았다. 리처드 도킨스, 크리스토퍼 히친스 등의 전투적 무신론자들은 1985년 성추행\
    \ 사건때도 현 교황이 성추행 가해자인 신부들을 비호했던 사실을 들며 옛날 칠레의 독재자 피노체트를 영국에서 체포했던 것처럼 교황을 체포할 것을 요구했다. \n\n또한 이 방문은 가톨릭의 여성 차별과 낙태, 동성애\
    \ 등의 반대 그리고 인위적인 피임에 대한 거부로 인한 에이즈 확산, 특히 엄청난 비용 때문에 비판의 도마에 올랐으며, 이런 이유로 방문 직전에 스티븐 프라이, 리처드 도킨스 등 50명의 영국 지식인들이 일간지\
    \ 《가디언》에 반대 성명을 게재하고 교황을 국빈 대접해서는 안된다고 주장했다. \n\n교황은 17일 출국, 몰타로 떠났다."
- source_sentence: 스토브의 후기 및 평가를 남기면 무조건 받을 수 있는 것은?
  sentences:
  - 스마일게이트 스토브(대표 한영운)는 자사의 인디게임 유통 서비스 '스토브 인디'의 서비스 개편을 진행하고, '인큐베이터'와 '스튜디오', ‘마이 인디’ 등 게임 창작자들을 위한 지원 공간을 오픈하고 창작자 지원
    플랫폼으로써의 기능을 강화 했다고 10일(목) 밝혔다. 스토브가 선보인 인큐베이터는 창작자가 게임을 전시하고 유저들의 피드백을 받을 수 있는 곳이다. 스토브는 향후 인큐베이터에 전시된 게임을 대상으로 포커스 그룹
    테스트를 진행하거나 일반 유저 피드백을 받을 수 있는 데모 서포터즈 프로그램을 운영할 방침이다. 이를 통해 개발 단계에서 창작자들이 유저들로부터 다양한 의견을 듣고 게임을 개선할 수 있도록 지원한다는 계획이다.
    스토브 인디의 ‘스튜디오’는 창작자가 온라인으로 직접 게임을 등록하고 판매할 수 있는 공간이며, 창작자가 개발일지나 업데이트 내용 등의 게시물을 자유롭게 올리고 유저와 소통할 수 있는 공간인 '마이 인디' 서비스도
    도입 했다. 스토브 인디 이용자들은 마이인디를 통해 관심을 두고 있었던 창작자는 물론 개별 게시판을 구독해 새로 올라오는 소식을 빠르게 받아볼 수 있다. 게임 창작자는 마이 인디를 통해 커뮤니티와 더불어, 유저들과
    직접적으로 소통할 수 있는 소셜 공간을 갖는 셈이다. 또한, 스토브 인디게임도 이날 새롭게 단장했다. 게임 검색의 편의성은 물론 주제별, 장르별 추천을 통해 유저 취향에 맞는 인디 게임을 보다 쉽게 찾아볼 수 있게
    변했다. 각 게임에의 상세 페이지에는 다른 유저가 메긴 별점과 짧은 후기, 게임 전문지에서 작성한 깊이 있는 리뷰까지 한 눈 볼 수 있는 등 다양한 정보가 담겨 있다. 스토브 인디에 신규 게임도 출시됐다. 빠른
    속도감의 로그라이트 플랫포머 ‘스커지브링어’와 캐릭터 대신 스테이지를 진행하는 방식의 ‘나트’, 톱다운 방식의 탄막 슈팅 게임 ‘제노크라이시스’ 등 유저들로부터 호평을 받고 있는 신작들이 다수 공개 됐다. 이외에도
    서양 판타지 SRPG 게임 ‘던전 오브 나흘벅’ 등 해외 개발사의 게임들도 스토브에서 번역 및 유저 검수를 통해 한글화 퀄리티를 높여 출시할 계획도 전했다. 스토브는 이번 개편을 기념해 다양한 이벤트도 진행한다.
    이벤트 기간 내 유저가 스토브 인디게임을 첫 구매할 경우 50% 할인에 더해 게임을 구매한 비용만큼 스토브 캐시를 환급 받을 수 있다. 사실상 게임 하나가 무료인 셈. 여기에 별점과 후기를 남긴 모든 유저에게 300
    스토브 캐시를 지급하는 리뷰 이벤트도 함께 진행된다. 끝으로, 스토브 인디가 앞으로 나아갈 방향과 계획을 담은 'STOVE 인디 로드맵'을 공개 했다. 이번 로드맵에는 게임잼과 인디 게임 공모전 개최, 온라인 게임쇼
    주관 등 굵직한 계획도 담겨 있어 인디 게임사들의 관심이 모아질 전망이다. 스마일게이트 스토브 한영운 대표는 “스토브 인디는 앞으로도 좋은 게임을 발굴하고 소개하는 데에 그치지 않고, 더 수준 높은 게임을 만들
    수 있도록 창작자와 유저를 잇는 다리가 되고자 한다”며, “국내외 인디 게임 생태계 발전을 위해 인디 게임 전문 커뮤니티를 비롯해 다양한 행사 등 많은 계획이 세워져 있으니 앞으로도 많은 성원을 부탁 드린다”고
    말했다.
  - 앞으로 서울 시내 임대주택에 사는 기초생활수급자의 임대료가 지금보다 20% 내려가고 관리비도 최대 30%까지 낮아진다. 서울시는 이 같은 내용을 담은 ‘공공임대주택 종합개선대책’을 11일 발표했다. 지난해 임대단지
    거주민들의 자살이 잇따르자 서울시가 전담 태스크포스(TF)팀을 꾸려 만든 대책이다.시는 우선 공공·재개발·국민 임대주택에 입주한 기초생활수급자 5834가구에 대해 임대료 인하를 추진한다. 기초생활수급자는 주로 영구임대주택에
    배정돼 월 임대료 5만원을 낸다. 하지만 1995년부터 영구임대주택 공급이 끊겨 서울 시내 12만 기초생활수급가구 중 5834가구는 공공·재개발·국민임대 등 다른 형태의 임대주택에 살며 월 15만~27만원의 임대료를
    내왔다. 시는 공공임대주택 등에 거주하는 기초수급자의 임대료를 영구임대주택과 비교, 차액의 20%를 감면하기로 했다. 이 경우 임대료는 13만~22만원대로 낮아진다. 또 폐지판매 등 잡수입 활용, 경비실 통합 운영,
    에너지 효율화, 공동전기료 지원 확대 등을 통해 임대주택의 관리비도 최대 30% 내리도록 유도할 계획이다.세대와 계층 간 융합을 이루는 ‘소셜 믹스’도 추진한다. 주로 기초생활수급자, 노인, 장애인, 소년·소녀가장
    등 저소득 취약계층이 입주하는 영구임대주택의 슬럼화를 막기 위해 신혼부부나 세 자녀 가구 등 연령·소득 수준이 다양한 가구를 함께 입주시킬 예정이다. SH공사가 독점해온 임대주택 관리에도 민간업체가 참여하는 경쟁
    체제가 도입된다. 이건기 서울시 주택정책실장은 “독거 어른신 무료 급식 확대, 24시간 상시 시설물 수선 체계 구축, 은둔형 및 알코올 의존 주민에 대한 맞춤형 돌봄 치료까지 도입한다”고 말했다.
  - 국무총리실이 세종시의 행정 비효율 문제를 해결하기 위해 현재 공무원들이 많은 시간과 비용을 들여 서울과 세종시를 오가는 업무 시스템 전반을 손질하기로 했다. 올해 말께 산업통상자원부 보건복지부 교육부 고용노동부
    등이 세종시로 이주하는 시점에 맞춰 정부 행정의 중심축을 세종시에 구축해야 한다는 판단에서다. 하지만 주요 부처 장관 및 고위 간부들이 국회 일정에 맞춰 대거 서울에 상주하는 관행이 고쳐지지 않으면 한계가 있을
    것이라는 지적도 만만찮다. ○독일 행정부 벤치마킹25일 총리실과 행정중심복합도시건설청에 따르면 정부는 지난해 6월 확정된 ‘세종시 중장기적 발전 방안’을 수정해 오는 12월 발표할 예정이다. 세종시 발전 방안은
    세종시 로드맵의 최상위 계획이자 세종시 개발의 법정 지침으로 국무총리가 위원장인 세종시지원위원회가 결정한다.정부가 세종시 발전 방안을 1년 만에 수정하기로 한 것은 당초 행정중심도시로 설계된 세종시가 오히려 국가
    행정의 걸림돌로 작용하고 있다는 지적 때문이다. 안전행정부가 지난해 말 작성한 ‘세종시 이전에 따른 행정 효율성 진단 및 지원 방안 연구’ 보고서에 따르면 정부 부처의 세종시 이전으로 발생하는 행정 비용은 연간
    4조8108억원에 이른다. 국무조정실 관계자는 “영상회의 활용 확대, 공무원 출장 자제 등 현행 대책이 전혀 먹혀들지 않고 있다는 판단에 따라 근본적인 해결 방안을 모색하기로 했다”고 설명했다. 정부는 그동안 연구기관,
    학계 등이 제시한 모든 해결 방안을 모아 놓고 원점에서 새로운 청사진을 그린다는 방침이다. 국무회의를 비롯한 정부 부처 간 공식·비공식 회의를 세종시 중심의 회의 체계로 전환하는 방안도 검토하기로 했다. 해외에도
    눈을 돌려 독일 행정부의 사례를 중점적으로 벤치마킹할 계획이다. 본과 베를린으로 행정기관이 분산돼 있는 독일은 원격 화상회의 등 정보기술(IT) 인프라를 적극 활용하고 있다. 정부 관계자는 “우리도 영상회의를 하고
    있지만 아직은 초기 시범 단계에 머물고 있는 것이 사실”이라며 “독일 정부가 영상회의를 통해 어떻게 부처 간 소통 능력을 키웠는지 들여다볼 생각”이라고 말했다.○기업투자 유치도 확대하지만 현실적으로 고위 관료들의
    서울 상주 문제가 정부 내 일정보다는 정기·임시국회 일정 등에 더 영향을 받고 있는 만큼 국회 대정부 질문을 원격 화상회의로 진행하거나 장·차관 대신 실무 관료들의 답변을 가능케 하는 풍토 마련이 시급하다는 의견이
    많다. 한 경제부처 관계자는 “대다수 장관들이 국회가 열리는 기간에 서울을 떠날 수 없는 것이 현실”이라며 “국회가 세종시의 행정 비효율을 줄이는 데 얼마나 협조할지가 관건”이라고 말했다. 정부가 세종시 발전 방안을
    전면 수정하기로 한 또 다른 이유는 예상과 달리 민간 투자가 저조하기 때문이다. 지금까지 이마트 홈플러스 등 대형마트 2곳이 입점을 결정한 것 외에는 눈에 띄는 투자가 없다. 또 지난 1년 동안 청원 충주 등이
    경제자유구역으로 지정되고 경제 활성화 대책으로 다수의 지역이 민간 투자 혜택을 받으면서 상대적으로 세종시의 투자 매력이 떨어진 것도 문제점으로 지적되고 있다. 행정중심복합도시건설청 관계자는 “이 상태로는 세종시가
    행정기관만 가진 베드타운이 될 가능성이 있다”며 “타지역에 비해 부족한 투자 인센티브를 확대할 계획”이라고 말했다.
