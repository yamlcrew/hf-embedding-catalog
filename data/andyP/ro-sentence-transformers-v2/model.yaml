widgetData:
- source_sentence: După aceea i-a dus în casa lui și le-a pus masa. Și s-a bucurat foarte mult, împreună cu toți cei din casa
    lui, pentru că a crezut în Dumnezeu.
  sentences:
  - După ce i-a dus în casă, le-a pus masa și s-a bucurat cu toată casa lui că a crezut în Dumnezeu.
  - 'Doamne, ascultă! Doamne, iartă! Doamne, ia aminte: fă și nu întârzia, de dragul tău, Dumnezeule! Pentru că numele tău
    este invocat asupra cetății tale și asupra poporului tău».'
  - De aceea se vor numi argint lepădat, căci Domnul i-a lepădat.”
- source_sentence: Și chiar dacă aș avea dar de profeție și înțeleg toate misterele și toată cunoașterea, și chiar dacă aș
    avea toată credința încât să mut munții, dar nu am dragoste creștină, nu sunt nimic.
  sentences:
  - El i-a întrebat:‒ Dar voi, cine ziceți că sunt Eu?Petru, răspunzând, I-a zis:‒ Tu ești Cristosul!
  - Și dacă aș avea darul profeției și aș pătrunde toate tainele și toată cunoașterea, dacă aș avea toată credința, încât
    să mut și munții, dar n‑aș avea dragoste, n‑aș fi nimic.
  - Și s-a dus primul și a turnat potirul său peste pământ; și a căzut o rană vătămătoare și dureroasă peste oamenii care
    au avut semnul fiarei și peste cei ce s-au închinat icoanei ei.
- source_sentence: În fața lor, am cântărit Argintul, aurul primit Și-uneltele care s-au dat În dar – de către împărat, De
    sfetnici și de-aceia cari Erau în slujba lui mai mari – Casei lui Dumnezeu, pe care El, la Ierusalim, o are.
  sentences:
  - 'Moise și Aaron le-au zis tuturor fiilor lui Israel: „Diseară, veți ști că Domnul v-a scos din țara Egiptului,'
  - 'Așa vorbește Domnul Dumnezeu, care a făcut cerurile și le-a întins, care a întins pământul și cele de pe el, care a dat
    suflare celor ce-l locuiesc și suflet celor ce merg pe el:'
  - Am cântărit înaintea lor argintul, aurul și uneltele date în dar pentru Casa Dumnezeului nostru de către împărat, sfetnicii
    și căpeteniile lui și de toți cei din Israel care se aflau acolo.
- source_sentence: Rabit, Chișion, Ebeț,
  sentences:
  - 'Fariseii, văzând aceasta, I‑au zis: „Uite că ucenicii Tăi fac ce nu este îngăduit să se facă în ziua sabatului!”'
  - Bărbații lui Israel se întorseseră; și bărbații lui Beniamin s-au înspăimântat, văzând prăpădul care avea să-i ajungă.
  - Scutură-te de țărână!Ridică-te! Așază-te pe tron, Ierusalime!Dezleagă-ți legăturile de la gât,fiică a Sionului, aflată
    în captivitate!
- source_sentence: Mai bine e să locuiești Pe casă, decât să trăiești În ea – oricât ar fi de mare – C-o soață rea, gâlcevitoare.
  sentences:
  - Nu i s-a spus domnului meu ce am făcut când Izabela a ucis pe profeții DOMNULUI, cum am ascuns o sută de bărbați dintre
    profeții DOMNULUI, câte cincizeci într-o peșteră și i-am hrănit cu pâine și apă?
  - Și acum trimite‐mi un bărbat iscusit să lucreze în aur și în argint și în aramă și în fier și în purpură și în cârmezin
    și albastru și care să știe să facă săpături, ca să stea cu bărbații iscusiți care sunt la mine în Iuda și in Ierusalim,
    pe care i‐a pregătit David, tatăl meu.
  - Când te lovește cineva peste un obraz, întoarce-i-l și pe celălalt. Iar dacă cineva îți ia haina (cu forța), nu te opune
    să îi lași și cămașa.
