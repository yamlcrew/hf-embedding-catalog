widgetData:
- source_sentence: Și i-a trimis să predice împărăția lui Dumnezeu și să vindece bolnavii.
  sentences:
  - Nici nu le-ai auzit, nici nu le-ai cunoscutși nici atunci, demult, urechea nu ți-a fost deschisă să le auzi.Căci am știut
    că sigur te vei purta cu necredincioșieși că, încă din pântec, ai fost numit răzvrătit.
  - Apoi, i-a trimis să propovăduiască Împărăția lui Dumnezeu și să tămăduiască pe cei bolnavi.
  - 'Ei s‑au adunat împotriva lui Moise și a lui Aaron și le‑au zis: „Până aici! Ajunge! Toată adunarea, toți sunt sfinți
    și DOMNUL este în mijlocul lor! De ce vă înălțați voi mai presus de adunarea DOMNULUI?”'
- source_sentence: Dar din adâncimile gropii am chemat numele Tău, Doamne.
  sentences:
  - Dar am chemat Numele Tău, Doamne, din fundul gropii.
  - O, prelungește bunătatea ta iubitoare celor ce te cunosc și dreptatea ta celor integri în inimă.
  - 'Apoi, Isus i-a zis: „Vezi să nu spui la nimeni, ci du-te de te arată preotului și adu darul pe care l-a rânduit Moise,
    ca mărturie pentru ei.”'
- source_sentence: Și fă drugii din lemn de salcâm și îmbracă-i cu aur.
  sentences:
  - Meșobab; Iamlec; Ioșa, fiul lui Amația;
  - Și să faci pârghiile din lemn de salcâm și să le îmbraci cu aur.
  - Coț, pe Anub, l-a dobândit, Pe Hațobebe și-n sfârșit, Pe cei cari țin de Aharhel – Al lui Harum fiu, este el.
- source_sentence: Da, pentru tine, Sioane, pentru sângele legământului făcut cu tine,i-am eliberat pe prizonierii tăidin
    groapa fără apă.
  sentences:
  - cunoscut fiind într‐adevăr mai înainte de întemeierea lumii, dar arătat la sfârșitul vremurilor pentru voi,
  - „La paisprezece ani, apoi, Luat-am drumul înapoi, Către Ierusalim, urmat Și de Barnaba. L-am chemat, Atuncea, și pe Tit,
    cu mine.
  - Cât despre tine, datorită sângelui legământului Meu cu tine,îți voi elibera captivii din groapa fără apă.
- source_sentence: 'Atunci veți începe să spuneți: «Noi am mâncat și am băut în fața Ta și pe străzile noastre ai dat învățături!»'
  sentences:
  - 'Atunci veți începe să ziceți: Noi am mâncat și am băut înaintea ta și ne‐ai învățat în ulițele noastre.'
  - 'Au pus martori mincinoși, care ziceau: „Omul acesta nu încetează să vorbească împotriva acestui loc sfânt și împotriva
    Legii.'
  - Iar mulţimile se mirau văzând că muţii vorbesc, ciungii se vindecă, şchiopii umblă şi orbii văd. Şi slăveau pe Dumnezeul
    lui Israel.
