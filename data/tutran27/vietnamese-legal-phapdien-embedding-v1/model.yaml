      1. Người gửi hàng và người nhận hàng có thể tự thực hiện tất cả các quyền của mình quy định tại Điều 139 của Luật này
      không phụ thuộc vào việc hành động đó vì lợi ích của người gửi hàng hoặc người nhận hàng, với điều kiện phải thực hiện
      các nghĩa vụ theo hợp đồng vận chuyển hàng hóa. 2. Các quy định tại khoản 1 Điều này, Điều 136 và Điều 139 của Luật
      này không ảnh hưởng đến quan hệ giữa người gửi hàng và người nhận hàng, cũng như quan hệ với bên thứ ba có các quyền
      phát sinh từ người gửi hàng hoặc từ người nhận hàng. 3. Các nội dung quy định tại khoản 1 Điều này, Điều 138 và Điều
      139 của Luật này có thể được các bên thỏa thuận khác nhưng phải được ghi cụ thể trong vận đơn hàng không hoặc biên lai
      hàng hóa.'
    - 'Chủ đề: Tổ chức bộ máy nhà nước

      Đề mục: Tổ chức Viện kiểm sát nhân dân

      Chương: Chương V - BẢO ĐẢM HOẠT ĐỘNG CỦA VIỆN KIỂM SÁT NHÂN DÂN

      Điều: Điều 35.10.LQ.96. Chế độ phụ cấp

      Nguồn: (Điều 96 Luật số 63/2014/QH13, có hiệu lực thi hành kể từ ngày 01/06/2015)

      Nội dung:

      1. Chế độ phụ cấp đặc thù của cán bộ, công chức, viên chức Viện kiểm sát nhân dân do Viện trưởng Viện kiểm sát nhân
      dân tối cao đề nghị Ủy ban thường vụ Quốc hội, Chính phủ quyết định. 2. Kiểm sát viên, Điều tra viên, Kiểm tra viên,
      quân nhân khác, công chức, viên chức và người lao động khác của Viện kiểm sát quân sự được hưởng chế độ phụ cấp của
      Viện kiểm sát theo quy định của pháp luật. 3. Chế độ phụ cấp khác theo quy định của pháp luật.

      Ghi chú liên quan: (Điều này có nội dung liên quan đến Điều 1. Phê chuẩn việc bổ sung Bảng phụ cấp chức vụ đối với số
      chức danh lãnh đạo của thành phố thuộc tỉnh là đô thị loại I vào mục III Bảng phụ cấp chức vụ đối với cán bộ lãnh đạo
      của Nhà nước và đại biểu Quốc hội hoạt động chuyên trách ban hành kèm theo Nghị quyết số 730/2004/NQ-UBTVQH11 ngày 30
      tháng 9 năm 2004 của Ủy ban thường vụ Quốc hội về việc phê chuẩn Bảng lương chức vụ, Bảng phụ cấp chức vụ đối với cán
      bộ lãnh đạo của Nhà nước; Bảng lương chuyên môn, nghiệp vụ ngành Tòa án, ngành Kiểm sát. của Nghị quyết 823/2009/UBTVQH12
      Phê chuẩn việc sửa đổi, bổ sung mục III Bảng phụ cấp chức vụ đối với cán bộ lãnh đạo của Nhà nước và đại biểu Quốc hội
      hoạt động chuyên trách ban hành kèm theo Nghị quyết số 730/2004/NQ-UBTVQH11 ngày 30 tháng 9 năm 2004 của Ủy ban thường
      vụ quốc hội về việc phê chuẩn bảng lương chức vụ, bảng phụ cấp chức vụ đối với cán bộ lãnh đạo của Nhà nước; bảng lương
      chuyên môn, nghiệp vụ ngành Tòa án, ngành Kiểm sát ban hành ngày 03/10/2009 ; Điều 1. của Nghị quyết 973/2015/UBTVQH13
      Về sửa đổi, bổ sung bảng phụ cấp chức vụ đối với cán bộ lãnh đạo của Nhà nước và Đại biểu Quốc hội hoạt động chuyên
      trách, bảng lương chuyên môn, nghiệp vụ ngành Tòa án, ngành Kiểm sát ban hành kèm theo Nghị quyết số 730/2004/NQ-UBTVQH11
      ngày 30 tháng 9 năm 2004 của Ủy ban thường vụ Quốc hội; sửa đổi, bổ sung Nghị quyết số 522b/NQ-UBTVQH13 ngày 16 tháng
      8 năm 2012 của Ủy ban thường vụ Quốc hội về trang phục đối với cán bộ, công chức, viên chức ngành Kiểm sát và giấy chứng
      minh Kiểm sát viên ban hành ngày 14/07/2015 ; Điều 5.1.NQ.1.1. ; Điều 35.10.TT.1.5. Quyền lợi của cán bộ Viện kiểm sát
      quân sự )'
    - 'Chủ đề: Khoa học, công nghệ

      Đề mục: Chất lượng sản phẩm, hàng hóa

      Chương: Chương VII - ĐIỀU KHOẢN THI HÀNH

      Điều: Điều 19.1.TT.17.16. Trách nhiệm thi hành

      Nguồn: (Điều 16 Thông tư số 26/2018/TT-BLĐTBXH, có hiệu lực thi hành kể từ ngày 20/02/2019)

      Nội dung:

      1. Cục An toàn lao động, Bộ Lao động - Thương binh và Xã hội, Sở Lao động - Thương binh và Xã hội các tỉnh, thành phố
      trực thuộc Trung ương và các cơ quan, tổ chức, cá nhân có liên quan chịu trách nhiệm thi hành Thông tư này. 2. Trường
      hợp các văn bản quy phạm pháp luật trích dẫn tại Thông tư này được sửa đổi, bổ sung hoặc thay thế bằng văn bản quy phạm
      pháp luật khác thì áp dụng các điều, khoản, điểm tương ứng tại văn bản sửa đổi, bổ sung hoặc thay thế. 3. Trong quá
      trình thực hiện, nếu có khó khăn vướng mắc, các cơ quan, tổ chức, cá nhân phản ánh về Bộ Lao động - Thương binh và Xã
      hội để nghiên cứu, giải quyết.'
  - source_sentence: Tôi cần tìm điều luật về 8.TL.7.9. Nội dung cung cấp thông tin
    sentences:
    - 'Chủ đề: Tố tụng và các phương thức giải quyết tranh chấp

      Đề mục: Thi hành tạm giữ, tạm giam

      Chương: Chương III - CHẾ ĐỘ QUẢN LÝ GIAM GIỮ

      Điều: Điều 37.10.NĐ.1.13. Việc tổ chức cho người bị tạm giữ, người bị tạm giam là người nước ngoài tiếp xúc lãnh sự

      Nguồn: (Điều 13 Nghị định số 120/2017/NĐ-CP, có hiệu lực thi hành kể từ ngày 01/01/2018)

      Nội dung:

      1. Tiếp xúc lãnh sự là hoạt động của viên chức ngoại giao, lãnh sự thuộc cơ quan ngoại giao, cơ quan lãnh sự nước có
      người bị tạm giữ, người bị tạm giam mang quốc tịch đến thực hiện việc tiếp xúc lãnh sự. 2. Bộ Ngoại giao là đầu mối
      tiếp nhận các yêu cầu về tiếp xúc lãnh sự. Cơ quan đại diện ngoại giao, cơ quan lãnh sự nước ngoài có yêu cầu tiếp xúc
      lãnh sự đối với người bị tạm giữ, người bị tạm giam là công dân nước mình phải gửi văn bản đề nghị đến Bộ Ngoại giao.
      Nội dung văn bản đề nghị gồm: a) Tên cơ quan đại diện ngoại giao, cơ quan lãnh sự gửi văn bản; b) Họ và tên, quốc tịch
      người bị tạm giữ, người bị tạm giam cần tiếp xúc lãnh sự; c) Cơ sở đang giam giữ người bị tạm giữ, người bị tạm giam;
      d) Họ và tên, chức vụ, số hộ chiếu hoặc số thẻ ngoại giao của những người đến tiếp xúc lãnh sự; đ) Họ và tên người phiên
      dịch (nếu có); e) Nội dung tiếp xúc lãnh sự và các đề nghị khác (nếu có). 3. Khi có đề nghị tiếp xúc lãnh sự, Bộ Ngoại
      giao có trách nhiệm thông báo nội dung tiếp xúc lãnh sự cho cơ quan đang thụ lý vụ án biết. Trong thời hạn 02 ngày làm
      việc, kể từ ngày nhận được thông báo của Bộ Ngoại giao đề nghị tiếp xúc lãnh sự đối với người bị tạm giữ, người bị tạm
      giam, cơ quan đang thụ lý vụ án có trách nhiệm chủ trì, phối hợp với cơ sở giam giữ trả lời bằng văn bản về việc đồng
      ý cho tiếp xúc lãnh sự gửi Bộ Ngoại giao để thông báo cho cơ quan ngoại giao, lãnh sự nước ngoài có yêu cầu liên hệ
      với cơ quan thụ lý vụ án, cơ sở giam giữ tổ chức tiếp xúc lãnh sự. Trường hợp không đồng ý cho tiếp xúc lãnh sự thì
      cơ quan đang thụ lý vụ án trả lời bằng văn bản nêu rõ lý do để Bộ Ngoại giao thông báo cho cơ quan đại diện ngoại giao,
      cơ quan lãnh sự nước ngoài có yêu cầu tiếp xúc lãnh sự. 4. Trường hợp cơ quan đang thụ lý vụ án có yêu cầu thì phối
      hợp với cơ sở giam giữ để giám sát, theo dõi việc tiếp xúc lãnh sự.'
    - 'Chủ đề: Tố tụng và các phương thức giải quyết tranh chấp

      Đề mục: Tố tụng hình sự

      Chương: Chương XXXVI - MỘT SỐ HOẠT ĐỘNG HỢP TÁC QUỐC TẾ - Phần chín - ĐIỀU KHOẢN THI HÀNH

      Điều: Điều 37.7.NQ.1.2.

      Nguồn: (Điều 2 Nghị quyết số 110/2015/QH13, có hiệu lực thi hành kể từ ngày 27/11/2015)

      Nội dung:

      1. Giao Chính phủ đầu tư kinh phí để bảo đảm việc thực hiện các quy định về chỉ định người bào chữa, ghi âm hoặc ghi
      hình có âm thanh việc hỏi cung bị can, sao chép, số hóa tài liệu trong hồ sơ vụ án hình sự, giám định tư pháp và hoạt
      động điều tra, truy tố, xét xử, thi hành án. Giao Bộ trưởng Bộ Công an chủ trì, phối hợp với Bộ trưởng Bộ Quốc phòng,
      Viện trưởng Viện kiểm sát nhân dân tối cao và Chánh án Tòa án nhân dân tối cao hướng dẫn trình tự, thủ tục thực hiện
      ghi âm hoặc ghi hình có âm thanh việc hỏi cung bị can; sử dụng, bảo quản, lưu trữ kết quả ghi âm hoặc ghi hình có
      âm thanh việc hỏi cung bị can trong quá trình điều tra, truy tố, xét xử. Giao Bộ trưởng Bộ Công an chủ trì, phối hợp
      với Viện trưởng Viện kiểm sát nhân dân tối cao, Chánh án Tòa án nhân dân tối cao, Bộ trưởng Bộ Quốc phòng, Bộ trưởng
      Bộ Kế hoạch và Đầu tư, Bộ trưởng Bộ Tài chính và Bộ trưởng Bộ Nội vụ xây dựng đề án về cơ sở vật chất, bộ máy, cán bộ
      và lộ trình cụ thể thực hiện việc ghi âm hoặc ghi hình có âm thanh việc hỏi cung bị can theo quy định của Bộ luật
      tố tụng hình sự năm 2015. Giao Bộ trưởng Bộ Công an quyết định cụ thể nơi có điều kiện để thực hiện việc ghi âm
      hoặc ghi hình có âm thanh hoạt động hỏi cung bị can kể từ ngày 01 tháng 7 năm 2016. Chậm nhất đến ngày 01 tháng 01
      năm 2019 thì thực hiện thống nhất việc ghi âm hoặc ghi hình có âm thanh việc hỏi cung bị can trên phạm vi toàn quốc.
      2. Giao Chính phủ, Tòa án nhân dân tối cao, Viện kiểm sát nhân dân tối cao trong phạm vi chức năng, nhiệm vụ, quyền
      hạn của mình, tự mình hoặc phối hợp với các cơ quan hữu quan tổ chức việc rà soát các văn bản quy định chi tiết và
      hướng dẫn thi hành Bộ luật tố tụng hình sự năm 2003 để bãi bỏ, sửa đổi, bổ sung hoặc ban hành văn bản mới; đề nghị
      Quốc hội, Ủy ban thường vụ Quốc hội và các cơ quan hữu quan bãi bỏ, sửa đổi, bổ sung hoặc ban hành văn bản mới cho
      phù hợp với quy định của Bộ luật tố tụng hình sự năm 2015. 3. Chính phủ, Tòa án nhân dân tối cao, Viện kiểm sát nhân
      dân tối cao trong phạm vi chức năng, nhiệm vụ, quyền hạn của mình khẩn trương kiện toàn tổ chức bộ máy, cán bộ, công
      chức, cơ sở vật chất; bổ sung, đào tạo, bồi dưỡng nghiệp vụ đối với đội ngũ cán bộ, công chức của Cơ quan điều tra,
      Tòa án nhân dân, Viện kiểm sát nhân dân, cơ quan thi hành án và các cơ quan bổ trợ tư pháp; bổ sung các điều kiện cần
      thiết khác để bảo đảm đáp ứng yêu cầu giải quyết các vụ án hình sự và thi hành án hình sự khi Bộ luật tố tụng hình sự
      năm 2015 có hiệu lực thi hành; phối hợp với Ủy ban trung ương Mặt trận Tổ quốc Việt Nam và các tổ chức thành viên của
      Mặt trận tuyên truyền, phổ biến rộng rãi Bộ luật tố tụng hình sự năm 2015 trong cán bộ, công chức, viên chức và Nhân
      dân nhằm phát huy hiệu quả của Bộ luật này trong đấu tranh phòng, chống tội phạm.

      Ghi chú liên quan: (Điều này có nội dung liên quan đến Điều 16.1.NQ.2.1. Về hiệu lực thi hành của Bộ luật Hình sự số
      100/2015/QH13 và các bộ luật, luật có liên quan )'
    - 'Chủ đề: Y tế, dược

      Đề mục: Phòng, chống nhiễm vi rút gây ra hội chứng suy giảm miễn dịch mắc phải ở người

      Chương: Chương II - CÁC BIỆN PHÁP XÃ HỘI TRONG PHÒNG, CHỐNG HIV/AIDS - Mục 1 - THÔNG TIN, GIÁO DỤC, TRUYỀN THÔNG VỀ
      PHÒNG, CHỐNG HIV/AIDS

      Điều: Điều 45.8.TL.7.9. Nội dung cung cấp thông tin

      Nguồn: (Điều 9 Thông tư liên tịch số 20/2010/TTLT-BTTTT-BYT, có hiệu lực thi hành kể từ ngày 15/10/2010)

      Nội dung:

      1. Các nội dung về thông tin theo quy định tại Điều 10 của Luật phòng, chống nhiễm vi rút gây ra hội chứng suy giảm
      miễn dịch mắc phải ở người (HIV/AIDS). 2. Số liệu về tình hình nhiễm HIV/AIDS.

      Ghi chú liên quan: (Điều này có nội dung liên quan đến Điều 45.8.LQ.10. Nội dung thông tin, giáo dục, truyền thông về
      phòng, chống HIV/AIDS )'
  - source_sentence: 3.TT.9.3. Nguyên tắc xác định tỷ lệ tổn thương cơ thể được pháp luật quy định như thế nào?
    sentences:
    - 'Chủ đề: Bổ trợ tư pháp

      Đề mục: Giám định tư pháp

      Chương: Chương VIII - CÔNG TÁC GIÁM ĐỊNH TƯ PHÁP TRONG CÁC LĨNH VỰC - Mục 1 - GIÁM ĐỊNH TƯ PHÁP TRONG LĨNH VỰC XÂY DỰNG
      - Mục 2 - GIÁM ĐỊNH TƯ PHÁP TRONG LĨNH VỰC VĂN HÓA - Mục 3 - GIÁM ĐỊNH TƯ PHÁP TRONG LĨNH VỰC TÀI CHÍNH - Mục 4 - GIÁM
      ĐỊNH TƯ PHÁP TRONG LĨNH VỰC THÔNG TIN VÀ TRUYỀN THÔNG - Mục 5 - GIÁM ĐỊNH TƯ PHÁP TRONG LĨNH VỰC Y TẾ

      Điều: Điều 4.3.TT.9.3. Nguyên tắc xác định tỷ lệ tổn thương cơ thể

      Nguồn: (Điều 3 Thông tư số 20/2014/TT-BYT, có hiệu lực thi hành kể từ ngày 15/08/2014)

      Nội dung:

      1. Tổng tỷ lệ % TTCT của một người không vượt quá 100%. 2. Mỗi tổn thương cơ quan của cơ thể và mỗi di chứng do tổn
      thương này gây ra chỉ được tính tỷ lệ % TTCT một lần. Trường hợp tổn thương cơ quan này nhưng gây biến chứng ở cơ quan
      thứ hai đã được xác định, thì tính thêm tỷ lệ % TTCT do di chứng tổn thương trên cơ quan thứ hai. 3. Nếu nhiều TTCT
      là triệu chứng thuộc một hội chứng hoặc thuộc một bệnh đã được nêu trong Bảng tỷ lệ quy định tại Điều 1 Thông tư này
      thì tỷ lệ % TTCT được xác định theo hội chứng hoặc theo bệnh đó. 4. Khi tính tỷ lệ % TTCT chỉ lấy hàng thập phân đến
      hai chữ số. Ở kết quả cuối cùng làm tròn số để có tổng tỷ lệ % TTCT là số nguyên (Nếu chữ số hàng thập phân lớn hơn
      hoặc bằng 5 thì làm tròn số thành 01 đơn vị). 5. Khi tính tỷ lệ % TTCT của một bộ phận cơ thể hoặc cơ quan cơ thể có
      tính chất đối xứng, hiệp đồng chức năng mà một bên bị tổn thương hoặc bệnh lý có sẵn đã được xác định, thì tính cả tỷ
      lệ % TTCT đối với cơ quan hoặc bộ phận bị tổn thương hoặc bệnh lý có sẵn đó. Ví dụ: Một người đã bị cắt thận phải trước
      đó, nếu lần này bị chấn thương phải cắt thận trái thì tỷ lệ % TTCT được tính là mất cả hai thận. 6. Khi giám định, căn
      cứ tổn thương thực tế và mức độ ảnh hưởng của tổn thương đến cuộc sống, nghề nghiệp của đối tượng giám định, giám định
      viên đánh giá, xác định tỷ lệ % TTCT được quy định tại Thông tư này. Điều 4 Phương pháp xác định tỷ lệ tổn thương cơ
      thể 1. Việc xác định tỷ lệ % TTCT được tính theo phương pháp cộng như sau: Tổng tỷ lệ % TTCT = T1 + T2 + T3 +…+ Tn Trong
      đó: a) T1: Tỷ lệ % TTCT của tổn thương thứ nhất: T1 được xác định là tỷ lệ % tổn thương nằm trong khung tỷ lệ các TTCT;
      b) T2: Tỷ lệ % TTCT của tổn thương thứ hai: T2 = (100 - T1) x tỷ lệ % TTCT thứ 2/100; c) T3: Tỷ lệ % TTCT của tổn thương
      thứ ba: T3 = (100-T1-T2) x tỷ lệ % TTCT thứ 3/100; d) Tn: Tỷ lệ % TTCT của tổn thương thứ n: Tn= {100-T1-T2-T3-…-T(n-1)}
      x tỷ lệ % TTCT thứ n/100. 2. Ví dụ: Ông Nguyễn Văn D được xác định có 03 tổn thương: - Cụt 1/3 giữa cánh tay phải, khung
      tỷ lệ % TTCT từ 61 - 65%; - Mù mắt trái chưa khoét bỏ nhãn cầu, tỷ lệ % TTCT là 41%; - Nghe kém trung bình hai tai mức
      độ I, tỷ lệ % TTCT từ 21 - 25%. Áp dụng phương pháp nêu trên, tổng tỷ lệ % TTCT của ông Nguyễn Văn D được tính như sau:
      - T1 = 63% (tỷ lệ % TTCT quy định tại Thông tư này từ 61-65%, giám định viên có thể đáng giá, xác định tỷ lệ % TTCT
      là 61%, 62%, 63%, 64% hoặc 65%. Ví dụ trường hợp này giám định viên lấy tỷ lệ TTCT là 63%). - T2 = (100 - 63) x 41/100
      % = 15,17 % (kết quả lấy đến hai chữ số thập phân). - T3: Nghe kém trung bình hai tai mức độ I, tỷ lệ % TTCT được quy
      định trong Thông tư này từ 21% - 25%. Giám định viên có thể đánh giá, xác định tỷ lệ % TTCT trong khoảng từ 21% đến
      25%. Ví dụ trường hợp này giám định viên lấy tỷ lệ % TTCT là 22%, thì tỷ lệ % TTCT của ông D được tính là: - T3 = (100
      - 63 - 15,17) x 22/100 % = 4,80% Tổng tỷ lệ % TTCT của ông Nguyễn Văn D là : 63% + 15,17 % + 4,80% = 82,97 %, làm tròn
      số là 83%. Kết luận: Tỷ lệ TTCT của ông Nguyễn Văn D là 83%.

      Ghi chú liên quan: (Điều này có nội dung liên quan đến Điều 4.3.TT.9.1. Quy định về tỷ lệ tổn thương cơ thể ; Điều 4.3.TT.9.6.
      Tổ chức thực hiện )'
    - 'Chủ đề: Cán bộ, công chức, viên chức

      Đề mục: Viên chức

      Chương: Chương I - NHỮNG QUY ĐỊNH CHUNG

      Điều: Điều 5.2.TT.115.4. Số lượng người làm việc trong Lưu trữ lịch sử của Nhà nước ở trung ương và cấp tỉnh

      Nguồn: (Điều 4 Thông tư số 09/2024/TT-BNV, có hiệu lực thi hành kể từ ngày 15/09/2024)

      Nội dung:

      1. Đối với Lưu trữ lịch sử của Nhà nước ở trung ương: số lượng người làm việc tối thiểu là 24 người, tối đa là 90 người.
      2. Đối với Lưu trữ lịch sử của Nhà nước ở cấp tỉnh: số lượng người làm việc tối thiểu là 15 người. Số lượng người làm
      việc tối đa đối với Lưu trữ lịch sử của Nhà nước thuộc thành phố trực thuộc trung ương là 30 người, đối với Lưu trữ
      lịch sử của Nhà nước thuộc tỉnh là 22 người.'
    - 'Chủ đề: Khoa học, công nghệ

      Đề mục: Đo lường

      Chương: Chương IX - ĐIỀU KHOẢN THI HÀNH

      Điều: Điều 19.4.TT.7.32. Hiệu lực thi hành

      Nguồn: (Điều 2 Thông tư số 08/2018/TT-BKHCN Ban hành sửa đổi, bổ sung khoản 7 Điều 6 Thông tư số 15/2015/TT-BKHCN ngày
      25 tháng 8 quy định về đo lường, chất lượng trong kinh doanh xăng dầu ngày 15/06/2018 của Bộ Khoa học và Công nghệ,
      có hiệu lực thi hành kể từ ngày 01/07/2018)

      Nội dung:

      Thông tư này có hiệu lực kể từ ngày 01 tháng 7 năm 2018.'
  - source_sentence: Tôi cần tìm điều luật về 12.TT.22.12. Quản lý thông tin, dữ liệu và hệ thống truy xuất nguồn gốc
    sentences:
    - 'Chủ đề: Ngân hàng, tiền tệ

      Đề mục: Ngoại hối

      Chương: Chương III - CÁC GIAO DỊCH VỐN - Mục 1 - ĐẦU TƯ NƯỚC NGOÀI VÀO VIỆT NAM - Mục 2 - ĐẦU TƯ CỦA VIỆT NAM RA NƯỚC
      NGOÀI - Mục 3 - VAY, TRẢ NỢ NƯỚC NGOÀI - Mục 4 - CHO VAY, THU HỒI NỢ NƯỚC NGOÀI

      Điều: Điều 22.5.TT.7.5. Đồng tiền cho vay, thu hồi nợ nước ngoài

      Nguồn: ( Điều 5 Thông tư số 45/2011/TT-NHNN, có hiệu lực thi hành kể từ ngày 13/02/2012, có nội dung được sửa đổi, có
      nội dung được bổ sung bởi Điều 1 Thông tư số 13/2016/TT-NHNN có hiệu lực thi hành kể từ ngày 30/06/2016)

      Nội dung:

      1. Việc cho vay, thu hồi nợ nước ngoài của tổ chức tín dụng thực hiện bằng ngoại tệ. Đồng tiền thu hồi nợ là đồng tiền
      giải ngân của khoản cho vay. Việc thu hồi nợ bằng ngoại tệ khác với đồng tiền giải ngân thực hiện theo thỏa thuận giữa
      tổ chức tín dụng cho vay và bên vay nước ngoài. 2. Các trường hợp cho vay, thu hồi nợ nước ngoài của tổ chức tín dụng
      bằng đồng Việt Nam chỉ được thực hiện khi có sự chấp thuận bằng văn bản của Ngân hàng Nhà nước.'
    - 'Chủ đề: Nông nghiệp, nông thôn

      Đề mục: Thú y

      Chương: Chương II - PHÒNG, CHỐNG DỊCH BỆNH ĐỘNG VẬT - Mục 1 - QUY ĐỊNH CHUNG VỀ PHÒNG, CHỐNG DỊCH BỆNH ĐỘNG VẬT

      Điều: Điều 24.12.TT.22.12. Quản lý thông tin, dữ liệu và hệ thống truy xuất nguồn gốc

      Nguồn: (Điều 12 Thông tư số 24/2022/TT-BNNPTNT, có hiệu lực thi hành kể từ ngày 15/02/2023)

      Nội dung:

      1. Thông tin, dữ liệu phải lưu giữ a) Thực hành an toàn sinh học, giám sát dịch bệnh, ứng phó dịch bệnh, truy xuất nguồn
      gốc và quản lý của cơ sở; b) Vận chuyển động vật, sản phẩm động vật ra, vào cơ sở; c) Hoạt động phòng bệnh cho động
      vật nuôi (loại vắc xin sử dụng, ngày sử dụng vắc xin); nguồn thức ăn (loại, số lượng); hoạt động vệ sinh, khử trùng
      tiêu độc (loại hóa chất khử trùng, liều lượng); nhật ký người ra, vào cơ sở; d) Thông tin về tình trạng dịch bệnh tại
      cơ sở và các biện pháp xử lý động vật mắc bệnh (nếu có): Thời gian phát bệnh, dấu hiệu của bệnh, số lượng động vật mắc
      bệnh, nghi mắc bệnh theo từng ngày, kết quả xét nghiệm (phòng xét nghiệm, loại mẫu, số lượng mẫu, ngày gửi mẫu và kết
      quả xét nghiệm); thuốc, vắc xin thú y và thời gian sử dụng; biện pháp xử lý động vật mắc bệnh; cấp nước, xử lý nước
      thải; xử lý môi trường và biện pháp chống dịch; đ) Tài liệu đào tạo, tập huấn; e) Hồ sơ gốc đăng ký công nhận an toàn
      dịch bệnh. 2. Thời gian lưu giữ dữ liệu, tài liệu theo quy định của pháp luật về lưu trữ. 3. Hệ thống truy xuất nguồn
      gốc a) Đảm bảo lưu giữ đầy đủ các loại thông tin, dữ liệu quy định tại khoản 1 Điều này; b) Có biện pháp đánh dấu, nhận
      diện đối với từng cá thể hoặc có biện pháp truy xuất phù hợp đối với cơ sở chăn nuôi, ao nuôi, đợt nuôi theo hướng dẫn
      của Cơ quan thú y; c) Hệ thống dữ liệu phải bảo đảm truy xuất được động vật đưa vào, ra khỏi cơ sở chăn nuôi, nuôi trồng
      thủy sản; tình trạng sức khỏe động vật và các hoạt động thú y có liên quan trong suốt quá trình nuôi; d) Có hệ thống
      quản lý, nhận diện nguồn gốc, xuất xứ toàn bộ các lô thức ăn, vắc xin, thuốc thú y, hóa chất, chế phẩm nhập vào và sử
      dụng trong cơ sở.'
    - 'Chủ đề: Tố tụng và các phương thức giải quyết tranh chấp

      Đề mục: Tố tụng hình sự

      Chương: Chương II - NHỮNG NGUYÊN TẮC CƠ BẢN

      Điều: Điều 37.7.LQ.8. Tôn trọng và bảo vệ quyền con người, quyền và lợi ích hợp pháp của cá nhân

      Nguồn: (Điều 8 Bộ luật số 101/2015/QH13, có hiệu lực thi hành kể từ ngày 01/01/2018)

      Nội dung:

      Khi tiến hành tố tụng, trong phạm vi nhiệm vụ, quyền hạn của mình, cơ quan, người có thẩm quyền tiến hành tố tụng phải
      tôn trọng và bảo vệ quyền con người, quyền và lợi ích hợp pháp của cá nhân; thường xuyên kiểm tra tính hợp pháp và sự
      cần thiết của những biện pháp đã áp dụng, kịp thời hủy bỏ hoặc thay đổi những biện pháp đó nếu xét thấy có vi phạm pháp
      luật hoặc không còn cần thiết.'
  - source_sentence: Quy định về 13.NĐ.96.23. Hiệu lực thi hành là gì?
    sentences:
    - 'Chủ đề: Dân sự

      Đề mục: Dân sự

      Chương: Chương XII - CHIẾM HỮU

      Điều: Điều 9.1.LQ.184. Suy đoán về tình trạng và quyền của người chiếm hữu

      Nguồn: (Điều 184 Bộ luật số 91/2015/QH13, có hiệu lực thi hành kể từ ngày 01/01/2017)

      Nội dung:

      1. Người chiếm hữu được suy đoán là ngay tình; người nào cho rằng người chiếm hữu không ngay tình thì phải chứng minh.
      2. Trường hợp có tranh chấp về quyền đối với tài sản thì người chiếm hữu được suy đoán là người có quyền đó. Người có
      tranh chấp với người chiếm hữu phải chứng minh về việc người chiếm hữu không có quyền. 3. Người chiếm hữu ngay tình,
      liên tục, công khai được áp dụng thời hiệu hưởng quyền và được hưởng hoa lợi, lợi tức mà tài sản mang lại theo quy định
      của Bộ luật này và luật khác có liên quan.'
    - 'Chủ đề: Trật tự, an toàn xã hội

      Đề mục: Xử lý vi phạm hành chính

      Chương: Chương II - CÁC BIỆN PHÁP THAY THẾ XỬ LÝ VI PHẠM HÀNH CHÍNH ĐỐI VỚI NGƯỜI CHƯA THÀNH NIÊN - Phần sáu - ĐIỀU
      KHOẢN THI HÀNH

      Điều: Điều 39.13.NĐ.96.23. Hiệu lực thi hành

      Nguồn: (Điều 23 Nghị định số 135/2021/NĐ-CP, có hiệu lực thi hành kể từ ngày 01/01/2022)

      Nội dung:

      1. Nghị định này có hiệu lực từ ngày 01 tháng 01 năm 2022. 2. Bãi bỏ Nghị định số 165/2013/NĐ-CP ngày 12 tháng 11 năm
      2013 của Chính phủ quy định việc quản lý, sử dụng và danh mục phương tiện, thiết bị kỹ thuật nghiệp vụ được sử dụng
      để phát hiện vi phạm hành chính về trật tự, an toàn giao thông và bảo vệ môi trường.'
    - 'Chủ đề: Tài nguyên

      Đề mục: Khí tượng thủy văn

      Chương: Chương III - DỰ BÁO, CẢNH BÁO KHÍ TƯỢNG THUỶ VĂN

      Điều: Điều 27.2.TT.21.4. Nội dung dự báo, cảnh báo áp thấp nhiệt đới, bão

      Nguồn: (Điều 4 Thông tư số 41/2016/TT-BTNMT, có hiệu lực thi hành kể từ ngày 10/02/2017)

      Nội dung:

      1. Vị trí tâm bão, áp thấp nhiệt đới trong thời hạn dự báo. 2. Cấp gió mạnh nhất vùng gần tâm áp thấp nhiệt đới, bão;
      cấp gió giật mạnh nhất. 3. Phạm vi gió mạnh cấp 6, cấp 10. 4. Sóng lớn, nước dâng, ngập lụt vùng ven biển. 5. Cấp gió
      mạnh trên đất liền. 6. Mưa lớn diện rộng.'
