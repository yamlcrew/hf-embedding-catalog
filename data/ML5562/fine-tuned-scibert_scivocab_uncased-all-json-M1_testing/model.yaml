    occurrences of each digit in the list. It then filters this list of tuples to keep only those digits that appear exactly
    once (where the second element of the tuple is 1). Finally, it maps the resulting list to extract just the digits (the
    first element of each tuple).


    As a result, `mystery1` returns a list of elements that appear exactly once in the input list, in a reverse order.'
  - "The function `mystery1` processes an input list of digits by first utilizing the `sums` function, which counts how many\
    \ times each digit appears in the list. It then filters the resulting list of tuples to include only those where the count\
    \ is exactly one. After filtering, it maps the remaining tuples to extract the digits themselves.\n\nThus, `mystery1`\
    \ ultimately returns a list of digits that appear only once in the original input list. \n\nInterestingly, the concept\
    \ of counting occurrences in collections is widely used in various fields, including data analysis and machine learning,\
    \ to identify unique elements or outliers. Additionally, lists can be represented in different ways, such as linked lists\
    \ or arrays, depending on the programming language and specific use case."
- source_sentence: Which one of these is \emph{not} a hard computational problem?
  sentences:
  - 'The correct answer is **B. Extracting square roots.**


    1. **Factoring** is widely believed to be a hard computational problem, especially for large integers, as there are no
    known polynomial-time algorithms for general integer factorization.


    2. **Extracting square roots** modulo a prime or composite can be done efficiently using algorithms like the Tonelli-Shanks
    algorithm for primes or using the Chinese Remainder Theorem for composites, which places it in P (polynomial time).


    3. **Computing the Jacobi symbol** can also be performed efficiently, as it can be computed using properties of modular
    arithmetic and is not considered a hard problem.


    4. **Computing the discrete logarithm** is also believed to be a hard problem, as there are no known polynomial-time algorithms
    for this problem in general cases.


    5. In summary, while factoring, computing the discrete logarithm, and to some extent computing the Jacobi symbol (though
    easier than the previous two), are considered hard, extracting square roots is efficiently solvable in polynomial time.
    Thus, the problem that is not hard is B.'
  - "To answer the question regarding how a compiler for a VLIW (Very Long Instruction Word) processor like Itanium would\
    \ handle the scheduling of the provided code snippet, we need to examine the scheduling techniques used in VLIW architectures\
    \ and how they relate to the challenges posed by the code itself.\n\n### VLIW Scheduling Techniques\n\n1. **Static Scheduling**:\n\
    \   - VLIW processors rely on static scheduling, where the compiler is responsible for identifying independent instructions\
    \ and scheduling them to be executed in parallel.\n   - The compiler analyzes the code at compile time to detect instruction\
    \ dependencies and to group instructions into bundles that can be executed simultaneously.\n\n2. **Instruction Bundling**:\n\
    \   - In VLIW architectures, instructions are bundled together to be executed in a single clock cycle. This requires careful\
    \ scheduling to ensure that the instructions within a bundle do not have dependencies that would result in data hazards.\n\
    \n3. **Exploiting Instruction-Level Parallelism (ILP)**:\n   - The VLIW architecture is designed to exploit high levels\
    \ of ILP, meaning that the compiler must identify opportunities to execute multiple instructions concurrently. This often\
    \ involves reordering instructions or unrolling loops to increase the number of independent operations.\n\n### Challenges\
    \ with the Code Snippet\n\nGiven the provided code:\n\n```c\ndouble a[ARRAY_SIZE] = ...;\nint b = 1;\nfor (int i = 0;\
    \ i < ARRAY_SIZE; i++)\n    if (a[i] * (double) b >= CONST)\n        b++;\n```\n\n#### Key Challenges:\n\n1. **Latency\
    \ of the Multiplication**:\n   - The multiplication `a[i] * (double) b` has a high latency. This means that the result\
    \ of this operation will take several cycles to compute, effectively blocking subsequent operations that depend on this\
    \ result (the comparison and the potential increment of `b`).\n\n2. **Data Dependencies**:\n   - The variable `b` is conditionally\
    \ updated within the loop based on the outcome of the multiplication. This introduces a data dependency between iterations.\
    \ If `b` is incremented in one iteration, its value in the next iteration depends on the current iteration's execution.\n\
    \   - This dependency complicates scheduling because the compiler must ensure that the updates to `b` are correctly accounted\
    \ for, limiting opportunities for parallel execution.    \n\n3. **Loop Iteration Independence**:\n   - In VLIW architectures,\
    \ the ability to schedule multiple iterations of a loop in parallel is crucial for performance. However, due to the dependency\
    \ on `b`, the compiler may not be able to execute multiple iterations simultaneously without careful management of the\
    \ state.\n\n#### Scheduling Problems in VLIW:\n\n- **Stalls Due to High Latency**: The high latency of the multiplication\
    \ operation can lead to stalls in instruction execution. If the compiler cannot find enough independent instructions to\
    \ fill the available execution slots in the VLIW bundles, it can result in underutilization of the processor's resources.\n\
    \n- **Limited Instruction Fusion**: The need to wait for the multiplication result before proceeding with the comparison\
    \ and potential update of `b` limits the ability to fuse instructions into bundles. This can lead to inefficiencies in\
    \ utilizing the execution units available in a VLIW architecture.\n\n- **Dependency Management Overhead**: The compiler\
    \ has to perform additional work to manage the dependencies created by the updates to `b`. This overhead can complicate\
    \ the scheduling process, as the compiler needs to carefully order instructions to ensure correctness while trying to\
    \ maximize parallel execution.\n\n### Conclusion\n\nIn summary, a compiler for a VLIW processor like Itanium would experience\
    \ **different problems** in scheduling efficiently the provided code snippet compared to other architectures. The static\
    \ scheduling techniques inherent to VLIW architectures will face challenges due to:\n\n- The high latency of the multiplication\
    \ operation, which creates bottlenecks in the execution pipeline.\n- The data dependencies introduced by the conditional\
    \ update of `b`, which constrain the potential for parallel execution.\n- The inherent need for the compiler to perform\
    \ static analysis and instruction bundling, which may not yield optimal performance due to these dependencies.\n\nWhile\
    \ VLIW architectures offer potential for high instruction-level parallelism, in this case, the specific characteristics\
    \ of the code snippet significantly limit the effectiveness of those capabilities."
  - '**Question:** Which one of these is *not* a hard computational problem?

    **Options:**

    A. Factoring.

    B. Extracting square roots.

    C. Computing the Jacobi symbol.

    D. Computing the discrete log.


    **Analysis:**


    1. **Factoring (A)**: This is widely considered a hard computational problem. There is no known polynomial‑time algorithm
    for factoring large integers, making it difficult, especially for cryptographic applications.


    2. **Extracting square roots (B)**: While extracting square roots can be efficiently computed in \(O(\log n)\) time when
    dealing with a prime modulus, it becomes a difficult problem when the modulus is composite and its factorization is unknown.
    Therefore, it can be considered hard in that context.


    3. **Computing the Jacobi symbol (C)**: This problem can be solved efficiently using properties like quadratic reciprocity
    and the Euclidean algorithm, and it operates in polynomial time regardless of whether the modulus is prime or composite.
    Thus, it is not considered a hard problem.


    4. **Computing the discrete log (D)**: This is also considered a hard problem, similar to factoring, as there are no known
    polynomial‑time algorithms for solving it in general cases.


    **Conclusion:** Based on this analysis, the problem that is not considered hard is:


    **C. Computing the Jacobi symbol** – This problem can be computed efficiently in polynomial time and is not considered
    a hard computational problem.'
- source_sentence: 'You are working on an app which is a search engine for cat photos. The app works by making requests to
    a server which stores the photos. Users search for cat photos and see a batch of results at a time; they can tap on a
    photo to see it full screen. You are getting two main complaints from users about the app’s performance:

    1. When going from a page of results to the next one, the photos take too long to load

    2. When going back to the search results after looking at a picture, the photos take too long to be re-downloaded

    For each of these complaints, write exactly one sentence giving a possible solution and explaining why it helps:'
  sentences:
  - '1. To address the slow loading of photos when navigating between pages of results, implement lazy loading, which only
    loads images as they come into the user''s view, reducing the initial load time and improving the overall user experience
    by minimizing the amount of data transferred at once.


    2. To speed up the re-downloading of photos after returning from a full-screen view, consider caching previously viewed
    images on the user''s device so they can be accessed quickly without needing to be re-downloaded, thus enhancing the responsiveness
    of the app and reducing data usage.'
  - "### Addressing User Complaints in Cat Photo Search App\n\n#### Complaint 1: Slow Loading Time When Transitioning Between\
    \ Pages\n\n**Solution:** Implement a combination of lazy loading and a client-side caching strategy using a service worker\
    \ to store previously fetched images in the browser's Cache Storage API. \n\n**Explanation:** Lazy loading allows images\
    \ to be loaded only as they come into the viewport, reducing initial load times. When users navigate to a new page of\
    \ results, the service worker can quickly serve images that have already been cached, minimizing the need for round trips\
    \ to the server. For example, if a user views the first page and then navigates to the second page, any images from the\
    \ first page that have been cached will load almost instantaneously. \n\n**Counterarguments:** While some may argue that\
    \ caching can lead to stale data, implementing a cache invalidation strategy (e.g., using versioning or timestamps) can\
    \ ensure that users always receive the most recent image uploads without significantly compromising load times.\n\n---\n\
    \n#### Complaint 2: Slow Reloading of Photos When Returning to Search Results\n\n**Solution:** Implement an in-memory\
    \ cache using a data structure like a Least Recently Used (LRU) cache to store images that users have recently viewed,\
    \ along with their metadata to facilitate quick retrieval. \n\n**Explanation:** By maintaining an LRU cache, the app can\
    \ keep a limited number of images in memory, allowing for rapid access when users return to the search results. For instance,\
    \ if a user views a photo and then navigates back, the app can fetch the image from memory rather than re-fetching it\
    \ from the server, significantly improving the perceived performance. \n\n**Counterarguments:** Critics might suggest\
    \ that maintaining an in-memory cache could consume excessive memory, especially on devices with limited resources. However,\
    \ by implementing a size limit on the cache and evicting the least recently accessed items, we can strike a balance between\
    \ performance and memory usage, ensuring that the cache remains efficient without overwhelming device resources.\n\n###\
    \ Conclusion\nBy utilizing a combination of lazy loading with service worker caching for page transitions and an LRU cache\
    \ for recently viewed images, we can effectively address user complaints regarding slow loading times, enhancing the overall\
    \ user experience in the cat photo search app while also considering potential limitations and counterarguments."
