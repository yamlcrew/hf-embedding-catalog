      3. **Anti-symmetric**: A relation is anti-symmetric if for every (a, b) and (b, a) in R, if a ≠ b, then it must be that
      a = b. Since R only contains (1, 1) and no pairs where a ≠ b, R is **anti-symmetric**.


      4. **Transitive**: A relation is transitive if whenever (a, b) and (b, c) are in R, then (a, c) must also be in R. The
