      \[

      P \approx 0.3997

      \]


      To express this in terms of a fraction with a denominator that matches one of the options, we can multiply both numerator
      and denominator by a suitable factor to match one of the options.


      After checking against the options provided, we find that:


      - \( P = \frac{1}{1200} \)


      Thus, the correct answer is:


      Answer: C) \( \frac{1}{1200} \)'
