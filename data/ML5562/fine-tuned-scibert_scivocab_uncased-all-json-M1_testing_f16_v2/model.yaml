      rectangle is represented by its lower left corner $(x_1,y_1)$ and its upper right corner $(x_2, y_2)$. All coordinates
      are of type Long. We require $x_1 \le x_2$ and $y_1 \le y_2$. Define a function hull that, given an Array[Rectangle],
      computes the smallest rectangle containing each of the elements of the array, using one of the collection operations
      mentioned in Week 02 videos.
    sentences:
    - "Alright, so I need to figure out how to compute the smallest rectangle that contains all the given rectangles. I have\
      \ to think about the coordinates and how they work together.\n\nFirst, let's outline what we have:\n\n1. Each rectangle\
      \ is defined by two points: the lower left corner $(x_1, y_1)$ and the upper right corner $(x_2, y_2)$.\n2. We need\
      \ to find the overall bounds of these rectangles in terms of their corners.\n\nTo do this, we can define the smallest\
      \ rectangle that contains all the rectangles by looking for the minimum and maximum coordinates among all rectangles:\n\
      \n- The minimum x-coordinate ($min_x$) will be the smallest $x_1$ among all rectangles.\n- The maximum x-coordinate\
      \ ($max_x$) will be the largest $x_2$ among all rectangles.\n- The minimum y-coordinate ($min_y$) will be the smallest\
      \ $y_1$ among all rectangles.\n- The maximum y-coordinate ($max_y$) will be the largest $y_2$ among all rectangles.\n\
      \nSo, the function `hull` can be summarized as follows:\n\n1. Initialize $min_x$ to a really large number (like infinity).\n\
      2. Initialize $max_x$ to a really small number (like negative infinity).\n3. Do the same for $min_y$ and $max_y$.\n\
      4. For each rectangle in the array, update $min_x$, $max_x$, $min_y$, and $max_y$ accordingly.\n5. After checking all\
      \ rectangles, we can define the overall bounding rectangle with the corners: \n   - Lower left: $(min_x, min_y)$\n \
      \  - Upper right: $(max_x, max_y)$\n\nSo, the resulting rectangle will be represented as:\n$$\n\\text{Bounding Rectangle}\
      \ = ((min_x, min_y), (max_x, max_y))\n$$\n\nHere’s a rough pseudo-code to illustrate this:\n\n```plaintext\nfunction\
      \ hull(rectangles):\n    min_x = infinity\n    max_x = -infinity\n    min_y = infinity\n    max_y = -infinity\n    \n\
      \    for each rectangle in rectangles:\n        min_x = min(min_x, rectangle.x1)\n        max_x = max(max_x, rectangle.x2)\n\
      \        min_y = min(min_y, rectangle.y1)\n        max_y = max(max_y, rectangle.y2)\n    \n    return ((min_x, min_y),\
      \ (max_x, max_y))\n```\n\nIn summary, the `hull` function computes the smallest rectangle that contains all given rectangles\
      \ by determining the minimum and maximum coordinates of all rectangles. The final bounding rectangle is defined by its\
      \ lower left corner at $(min_x, min_y)$ and its upper right corner at $(max_x, max_y)$."
