widgetData:
- source_sentence: "Ποιοι είναι υπόχρεοι υποβολής δήλωσης απόδοσης φόρου των έκτακτω ν αμοιβών και \nποσοστών ( bonus ) πέραν\
    \ των μισθών των ναυτιλιακών εταιρειών του άρθρου 25 του ν. \n27/1975;"
  sentences:
  - "Σε περίπτωση που για τη δωρεά ή τη γονική παροχή συντάσσεται συμβολαιογραφικό έγγραφο, η \nδήλωση υποβάλλεται πριν από\
    \ την κατάρτιση του συμβολαίου. Όταν δεν συντάσσεται συμβόλαιο, \nη δήλωση υποβάλλεται μέσα σε έξι (6) μήνες από την παράδοση\
    \ του αντικειμένου της  δωρεάς ή \nτης γονικής παροχής (άρθρο 86 ν. 2961/2001). "
  - Ως έδρα του υπό ίδρυση φυσικού προσώπου ορίζεται η διεύθυνση της κατοικίας του ιδρυτή. Εναλλακτικά, μπορεί να οριστεί
    η έδρα της επιχειρηματικής δραστηριότητας του ιδρυτή, είτε πρόκειται για φυσικό ή νομικό πρόσωπο, είτε για νομική οντότητα
    αντίστοιχα.
  - "Υπόχρεοι σε υποβολή δήλωσης απόδοσης του φόρου δέκα τοις εκατό (10%) με βάση τις διατάξεις \nτης παραγράφου 5 του άρθρου\
    \ 43 του ν. 4111/2013 είναι οι πιο κάτω δικαιούχοι:  \nα) μέλη του Δ.Σ . ή Διευθυντές και στελέχη για έκτακτες αμοιβές\
    \ και ποσοστά (bonus) επιπλέον των \nμισθών που λαμβάνουν από αλλοδαπές επιχειρήσεις της περ. α΄ της παρ. 5 του άρθρου\
    \ 43 του ν. \n4111/2013 από το έτος 2012 και μετά,  \nβ) υπάλληλοι για έκτακτες αμοιβές και ποσοστά (bonus) επιπλέον των\
    \ μισθών που λαμβάνουν \nαπό αλλοδαπές επιχειρήσεις της περ. α΄ της παρ. 5 του ίδιου άρθρου και νόμου από το έτος 2019\
    \ \nκαι μετά,  \nγ) μέλη του Δ.Σ . ή Διευθυντές, στελέχη και υπάλληλοι για έκτακτες αμοιβές και  ποσοστά (bonus) \nεπιπλέον\
    \ των μισθών, που λαμβάνουν από ημεδαπές επιχειρήσεις της περ. β΄ της παρ. 5 του ίδιου \nάρθρου και νόμου από το έτος\
    \ 2019 και μετά και  \nδ) μέλη του Δ.Σ . ή Διευθυντές, στελέχη και υπάλληλοι για έκτακτες αμοιβές και ποσοστά (bonus)\
    \ \nεπιπλέον των μισθών που λαμβάνουν από διαχειρίστριες εταιρείες ή επιχειρήσεις εγκατεστημένες \nστην Ελλάδα σύμφωνα\
    \ με το άρθρο 25 του ν. 27/1975 από το έτος 2019 και μετά. "
- source_sentence: "Τι ισχύει σχετικά με την θέση του οχήματος σε ακινησία ηλεκτρονικά, χωρίς \nπροσέλευση στην Δ.Ο.Υ.;"
  sentences:
  - 'Κάθε επιχείρηση μπορεί να εκπληρώσει την υποχρέωση αυτή επιλέγοντας είτε:

    • υπηρεσίες Παρόχου Ηλεκτρονικής Έκδοσης Στοιχείων,

    • τη δωρεάν εφαρμογή της ΑΑΔΕ, timologio και τη δωρεάν εφαρμογή για

    κινητές συσκευές myDATAapp, οι οποίες προσφέρουν ισοδύναμη λύση και

    καλύπτουν, χωρίς κόστος, και τις περιπτώσεις έκδοσης ηλεκτρονικών

    τιμολογίων που αφορούν σε δημόσιες συμβάσεις'
  - "Η δήλωση φόρου δωρεάς -γονικής παροχής  υποβάλλεται στη Δ. Ο.Υ. της φορολογίας εισοδήματος του υπόχρεου σε φόρο \nδωρεοδόχου/τέκνου\
    \ και σε περίπτωση που αρμόδιο για την παραλαβή της δήλωσης φορολογίας \nεισοδήματος είναι το ΚΕ.ΦΟ.Δ.Ε.  Αττικής ή Θεσσαλονίκης,\
    \  υποβάλλεται στα ΚΕ.ΦΟ.Κ. Αττικής \nκαι Θεσσαλονίκης, αντίστοιχα.  Αν ο δωρεοδόχος ή το τέκνο κατοικ εί στο εξωτερικό\
    \ ή έχει την έδρα του στο εξωτερικό , αρμόδιο \nείναι το ΚΕ.ΦΟ.Κ. Αττικής (Δ.ΟΡΓ.Α 1065199 ΕΞ 2022/20 -07-2022 Απόφαση,\
    \ όπως ισχύει)."
  - "Με τις διατάξεις   της παρ. 2 του άρθρου 62 του δέκατου βιβλίου του ν. 5177/2025 (Α΄ 21), η θέση \nτων ΕΙΧ οχημάτων και\
    \ μοτοσυκλετών σε ακινησία υποβάλλεται ηλεκτρονικά χωρίς προσέλευση \nστην Δ.Ο.Υ και παράδοση των σ τοιχείων κυκλοφορίας\
    \ (άδεια και πινακίδες κυκλοφορίας) με την \nπροϋπόθεση ότι αυτά: α) δεν βρίσκονται ήδη σε ακινησία στην Δ.Ο.Υ. ή σε άλλη\
    \ αρχή, και β) τα \nστοιχεία κυκλοφορίας του οχήματος βρίσκονται στην κατοχή των ιδιοκτητών τους.  \nΚατ΄ εφαρμογή των\
    \ ως ά νω διατάξεων, η ακινησία δηλώνεται ηλεκτρονικά μέσω της Ενιαίας \nΨηφιακής Πύλης της Δημόσιας Διοίκησης (gov.gr\
    \ -ΕΨΠ), ο ιδιοκτήτης ή κάτοχος αφαιρεί τα στοιχεία \nκυκλοφορίας από το όχημά του και τα φυλάσσει με ευθύνη του, ενώ\
    \ το όχημα φυλάσσεται επίσης \nμε ευθ ύνη του ιδιοκτήτη/κατόχου σε κλειστό και περιφραγμένο χώρο ο οποίος δηλώνεται \n\
    ηλεκτρονικά.  \nΤο αίτημα άρσης της ακινησίας, εφόσον η ακινησία είχε δηλωθεί ηλεκτρονικά, δηλώνεται επίσης \nηλεκτρονικά\
    \ μέσω της Ενιαίας Ψηφιακής Πύλης της Δημόσιας Διοίκησης (gov.g r-ΕΨΠ), με την  καταβολή των τελών κυκλοφορίας του έτους\
    \ της άρσης και την επιβεβαίωση ύπαρξης, κατά τον \nχρόνο της άρσης, έγκυρου ασφαλιστικού συμβολαίου."
- source_sentence: "Πότε πρέπει να υποβάλει δήλωση έναρξης εργασιών φυσικό πρόσωπο - \nΔιαχειριστής εάν αποκτά τρίτο ΑΜΑ (εξαιρουμένης\
    \ της περίπτωσης απόκτησης \nτρίτου ΑΜΑ για την περίπτωση της από κοινού μίσθωσης δύο δωματίων που \nήδη έχουν λάβει διαφορετικούς\
    \ );"
  sentences:
  - Η απόφαση Ε.2132/08-07-2019 αφορά την παροχή οδηγιών για την ορθή εφαρμογή της ΠΟΛ.1006/2013. Αυτές οι οδηγίες δίνονται
    μετά την τροποποίησή της με τις διατάξεις της Α.1164/2019 απόφασης του Διοικητή της ΑΑΔΕ.
  - Υπεύθυνη δήλωση από τον φορολογικό εκπρόσωπο απαιτείται για την αποδοχή του ορισμού του. Αυτό συμβαίνει εφόσον την αίτηση
    απόδοσης ΑΦΜ και Κλειδαρίθμου δεν την υποβάλλει ο ίδιος ο φορολογικός εκπρόσωπος. Η δήλωση αυτή πρέπει να έχει βεβαιωμένο
    το γνήσιο της υπογραφής.
  - "Τα φυσικά πρόσωπα θα πρέπει να υποβάλουν αίτημα έναρξης εργασιών εντός τριάντα \n(30) ημερών από τη λήψη του τρίτου ΑΜΑ\
    \ (εξαιρουμένης της περίπτωσης απόκτησης \nτρίτου ΑΜΑ για την περίπτωση της από κοινού μίσθωσης δύο δωματίων που ήδη \n\
    έχουν λάβει διαφορετικούς ) εκτός αν για άλλο λόγο υπήρχε υποχρέωση για έναρξη \nεργασιών σε προγενέστερο χρόνο ή εάν\
    \ τα ακίνητα εκμισθώνονται επιπλωμένα και με \nάλλες  παροχές πλην της παροχής κλινοσκεπασμάτων."
- source_sentence: "Ποιες αντικειμενικές δαπάνες λαμβάνονται υπόψη για τον προσδιορισμό της συνολικής \nετήσιας δαπάνης του\
    \ φορολογουμένου;"
  sentences:
  - "Μια τέτοια λύση δεν δημιουργεί πρόβλημα αρκεί να γίνει σωστός διαχωρισμός των \nποσών (ώστε να αποφευχθεί λάθος καταβολή\
    \ ή διπλή φο ρολόγηση) και τα ποσά  να \nαποδοθούν με τα προβλεπόμενα έντυπα."
  - Η δήλωση αυτή υποβάλλεται μέσω ηλεκτρονικού ταχυδρομείου στο ΚΕΦΟΔΕ Αττικής, στην διεύθυνση doyaathinon@1836.syzefxis.gov.gr.
    Οι εν λόγω υποκείμενοι υποχρεούνται να υποβάλλουν την παραπάνω δήλωση πριν τη διενέργεια οποιωνδήποτε φορολογητέων πράξεων
    στην Ελλάδα. Ως δικαιολογητικό απαιτείται η συμπληρωμένη δήλωση έναρξης εργασιών κοινοτικών υποκειμένων χωρίς εγκατάσταση
    στην Ελλάδα (Declaration of commencement of activity for taxable persons without establishment in Greece).
  - "Οι αντικειμενικές δαπάνες που λαμβάνονται υπόψη για τον προσδιορισμό της συνολικής \nετήσιας δαπάνης του φορολογουμένου\
    \ είναι:\n- Ιδιοκατοικούμενες ή μισθωμένες ή δωρεάν παραχωρούμενες κύριες κατοικίες, καθώς και \nιδιοκατοικούμενες ή μισθωμέν\
    \ ες δευτερεύουσες κατοικίες των βοηθητικών χώρων αυτών καθώς \nκαι των ιδιόκτητων ή μισθωμένων αυτοτελών ή δωρεάν παραχωρούμενων\
    \ βοηθητικών χώρων,   \n- Δαπάνες επιβατικών αυτοκινήτων Ι.Χ., αυτοκινήτων μικτής χρήσης και αυτοκινήτων τύπου \nJEEP\
    \ ,  \n- Δαπάνη ιδιωτικών σ χολείων στοιχειώδους και μέσης εκπαίδευσης,  \n- Δαπάνη οικιακών βοηθών (πέραν του ενός),\
    \ οδηγών αυτοκινήτου, δασκάλων κλπ.,  \n- Δαπάνες σκαφών αναψυχής ιδιωτικής χρήσης,  \n- Δαπάνες αεροσκαφών, ελικοπτέρων,\
    \ ανεμόπτερων,  \n- Δαπάνες δεξαμενών κολύμβησης (εσωτερικές και εξωτερικές).  \nΕπίσης, στις παραπάνω αντικειμενικές\
    \ δαπάνες προστίθεται και ένα ποσόν ως ελάχιστη \nαντικειμενική δαπάνη διαβίωσης, το οποίο ορίζεται στο ποσό των τριών\
    \ χιλιάδων ευρώ (3.000), \nπροκειμένου για άγαμο, διαζευγμένο ή χήρο και στο ποσό των πέντε χιλ ιάδων ευρώ (5.000), \n\
    προκειμένου για συζύγους που υποβάλλουν κοινή δήλωση, εφόσον δηλώνεται πραγματικό ή \nτεκμαρτό εισόδημα.  \nΣημειώνεται\
    \ ότι οι αντικειμενικές δαπάνες και υπηρεσίες του άρθρου 31 του ΚΦΕ δεν εφαρμόζονται \nγια φυσικά πρόσωπα που έχουν τη\
    \ φορολο γική κατοικία τους στην αλλοδαπή,  ανεξαρτήτως αν \nαποκτούν εισόδημα στην Ελλάδα, ενώ εφαρμόζονται οι διατάξεις\
    \ απόκτησης περιουσιακών \nστοιχείων του άρθρου 32 του ΚΦΕ για τους κατοίκους αλλοδαπής μόνο στην περίπτωση που \nαποκτάται\
    \ εισόδημα στην Ελλάδα.  \nΑκόμη , η ετήσια αντικειμενική δαπάνη και η δαπάνη απόκτησης περιουσιακών στοιχείων δεν \n\
    εφαρμόζονται προκειμένου για αγορά επιβατικού αυτοκινήτου ιδιωτικής χρήσης, οχήματος τύπου \nL, μοτοποδηλάτου, μοτοσυκλέτας,\
    \ καθώς και οχήματος παντός εδάφους ή άλλου μικρού οχ ήματος \nμε τρεις ή τέσσερεις τροχούς, μηδενικών ρύπων με Λιανική\
    \ Τιμή Προ Φόρων (Λ.Τ.Π.Φ.) έως \nπενήντα χιλιάδες (50.000) ευρώ. Για τα αυτοκίνητα του προηγούμενου εδαφίου ορίζεται\
    \ μηδενική \nετήσια αντικειμενική δαπάνη, ενώ για τα άνω του ορίου αυτού η ετήσια αντικειμενική δαπάνη \nορίζεται σε τέσσερις\
    \ χιλιάδες (4.000) ευρώ (άρθρο 33 περ. θ’ του ΚΦΕ). Η αγορά των ως άνω \nοχημάτων με ΛΤΠΦ άνω των 50.000 ευρώ δεν εμπίπτει\
    \ στις διατάξεις του άρθρου 33 του ΚΦΕ και \nκατ’ επέκταση υπάγεται στις διατάξεις του άρθρου 32 το υ ΚΦΕ ολόκληρο το\
    \ ποσό που \nκαταβλήθηκε για την αγορά ενός αυτοκινήτου της συγκεκριμένης κατηγορίας. Δεν επιβάλλεται στα \nαυτοκίνητα\
    \ αυτά φόρος πολυτελούς διαβίωσης.  \nΕπιπλέον, για φυσικά πρόσωπα που υπάγονται στις διατάξεις του άρθρου 5Γ, δεν εφαρμόζεται\
    \ η \nετήσια    αντικειμενική δαπάνη, η οποία προκύπτει βάσει  κατοικίας (κύριας  και δευτερευουσών) \nή/και επιβατικών\
    \ αυτοκινήτων ιδιωτικής χρήσης (ανεξαρτήτως αριθμού οχημάτων) (Ε. 2029/2022, \nΑΔΑ: 69ΩΡ46ΜΠ3Ζ -ΨΨ4  εγκύκλιος)."
- source_sentence: Πού υποβάλλεται η δήλωση φόρου κληρονομιάς;
  sentences:
  - Δύο εγκύκλιοι του ΓΓΔΕ ασχολούνται με τη χορήγηση ΑΦΜ σε αλλοδαπούς, καλύπτοντας διαφορετικές κατηγορίες. Η εγκύκλιος
    ΠΟΛ 1230/08-10-2013 αφορά τη χορήγηση ΑΦΜ σε αλλοδαπούς, υπηκόους τρίτων χωρών, οι οποίοι είναι κάτοχοι δελτίου αιτήσαντος
    άσυλο αλλοδαπού ή δελτίου αιτούντος διεθνή προστασία. Επίσης, η εγκύκλιος ΠΟΛ 1250/25-11-2013 ρυθμίζει τη χορήγηση ΑΦΜ
    σε αλλοδαπά φυσικά πρόσωπα, υπηκόους τρίτων χωρών, που αντικειμενικά στερούνται διαβατηρίου.
  - "Η δήλωση φόρου κληρονομιάς υποβάλλεται  στη Δ.Ο.Υ., στην χωρική αρμοδιότητα της οποίας \nανήκει η τελευταία διεύθυνση\
    \ κατοικίας του κληρονομουμένου, όπως αυτή έχει δηλωθεί στο \nΜητρώο του και σε περίπτωση που η ως άνω διεύθυνση κατοικίας\
    \ βρίσκεται στην χωρική  αρμοδιότητα των  ΚΕ.ΦΟ.Δ.Ε. Αττικής κα ι Θεσσαλονίκης, υποβάλλεται στα ΚΕ.ΦΟ.Κ. Αττικής και \n\
    Θεσσαλονίκης,  αντίστοιχα.   \nΑν ο κληρονομούμενος κατοικούσε στο εξωτερικό, η δήλωση υποβάλλεται στ o KE.ΦΟ.Κ. Αττικής\
    \ \n(Δ.ΟΡΓ.Α 1065199 ΕΞ 2022/20 -7-2022 Απόφαση - Β΄ 3886, ΑΔΑ: ΨΒΛΕ46ΜΠ3Ζ -Ε6Λ, όπως \nίσχυει ι)."
  - Εάν κατά την είσοδο στις ψηφιακές υπηρεσίες με τους κωδικούς TAXISnet δεν επιτρέπεται η υποβολή αιτήματος λόγω προβλήματος
    στα στοιχεία Μητρώου, εμφανίζεται ένα ενημερωτικό μήνυμα. Αυτό το μήνυμα ενημερώνει τον φορολογούμενο ότι πρέπει να εξυπηρετηθεί
    με αυτοπρόσωπη παρουσία από την αρμόδια Υπηρεσία.
