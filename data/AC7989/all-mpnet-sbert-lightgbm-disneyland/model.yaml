widgetData:
- source_sentence: 'Branch: Disneyland_Paris. Review: Went in the quiet period and that was bad enough. The rides and other
    attractions were interesting but not really designed for adults. The food was wayyyyy overpriced and horrible (if you
    are lucky to snatch some hot food before others get to it). We purchased the 2 Park pass. Don''t bother as it will take
    you a day to negotiate just 1 Park. I think the best part of the day was the fudge we found on our way out of the park.
    Would hate to see this place during peak periods. I''m pretty sure I would''ve just walked out with any more of a crowd. '
  sentences:
  - 'Branch: Disneyland_Paris. Review: We visited on 26th April and paid 67 euros per adult (x4) and 64 euros for our 4 year
    old. We got there at 12 (it opens at 10am) and found it to be quiet in the ticket queue. Once inside the park however,
    it became obvious that a lot of the rides for younger families  such as Robinson Crusoes tree house and the pirate boat
    were closed. In total 14 attractions were closed. Most of them aimed at the younger audiences. Of the children''s rides
    that were open, there were at least 20 minute queues for Dumbo, Carousel, teacups and mad hatters tea party. We did t
    even bother queuing for the character meets as the wait was 30 minutes and the encounters were too brief for it to be
    worth it. We stopped for a bite to eat in the diner. Food was VERY expensive and cold. Not worth the money. We ended up
    riding the  it''s a small world  boat twice and then it was time for the parade. The parade was the best part of the entire
    day. I think that we should be warned about the ride closures prior to purchasing tickets and the tickets should be reduced
    if lots of attractions are to be closed. Overpriced and not good value for money when attractions are closed.'
  - 'Branch: Disneyland_Paris. Review: It was an amazing day at Paris Disneyland. We took the train to the park which was
    very convenient and easy. We started in the Studio in the morning, and we recommend to start on this side because this
    area tends to have more people lining up for thrilling rides. The best ride for me was Hyperspace mountain on the Disney
    Park side, and rode it twice, and it was the most thrilling ride in the park with 360 degree turns.The park was not very
    full as we only waited for about 30 to 45 minutes for each ride, and we got to go on most rides.Definitely would recommend
    to stay for the fireworks, although leaving the park will be difficult because everyone is trying to leave at the same
    time, especially when it is raining, in our case.'
  - 'Branch: Disneyland_HongKong. Review: It is supposed to be the stuff of a magical fairy tale but unfortunately fairy dust
    and filthy lucre cannot be expected to go hand it hand. I was bummed by the fact that every turn at the park seemed designed
    to relieve you off your dough (every ride or attraction opens into a themed boutique with overprices merchandise, the
    food is so costly you''d think you were being served solid gold). And those Photo op ready Princesses with their artificial
    demeanour, cheap gowns, affected mannerisms, and annoying laughter made me want to hurl. But those are the minuses and
    pluses there are aplenty.Little girls are going to adore the place even if the magic is not quite there and are even going
    to insist you join the queue to interact with the Princesses and a host of Disney characters (some admittedly are cute).
    The rides are ones they will enjoy (Dumbo the flying Elephant, Cinderella Carousel, DIsney train, Its a small world, Adventures
    of Pooh to name a few) and the parade will make them squeal with joy. There is even Sleeping Beauty''s castle, Snow White
    Grotto, Jungle River Cruise and fireworks which will have them beside themselves with glee.Some of the shows are really
    good. The Lion King Festival and the Mickey Mouse Theatre were particularly noteworthy. And even I have to admit the grand
    finale,  Disney in the Stars  Fireworks was absolutely magical! '
- source_sentence: 'Branch: Disneyland_California. Review: My wife and I went in June and even though it was like the 4th
    time I have been in 25 years, its always as fun! new attractions make it worthwhile even if you have already been there!'
  sentences:
  - 'Branch: Disneyland_HongKong. Review: We really hate having loads of Chinese mainland there! they won''t line up or follow
    the rules. you must be strict and don''t let them cutting the line!! They also won''t smoke only in the smoking area!!
    nasty! This is one of the smallest disneyland in the world. you can finish all the rides and attraction within one day.
    sometimes you can play the rides over and over! for family with kids or young couples, they would enjoy spending a day
    there. the price of the restaurants increased a lot.'
  - 'Branch: Disneyland_California. Review: This is where Orlando got its number one travel destination in the world status.
    This is THE  1 world class park.'
  - 'Branch: Disneyland_California. Review: Disneyland ~ Best Holiday Ever!Went once or twice a year as a kid for a couple
    decades, yet haven''t been back in about 20 years ~ & O My ~ What a Fantastic Holiday! It''s as I remember it, yet even
    way more fun than I remember! All the original rides attractions w plenty of new ones to experience & with today''s technology
    ~ it''s Amazing!I recommend Disneyland to anyone & everyone ~ no better holiday on earth ~& is most definitely ''The Happiest
    Place on Earth'' ~ so sad, coming home ~ didn''t care to leave even before we got there!Looking in to moving to California
    permanently!Will definitely be going back next year.By chance, we picked one of the best times of year to go ~First 2
    days, ''regular'' Disneyland, last 3 days ~ ''Winter'' Disneyland ~SO Beautiful ~ even more lights & snow every night
    w the fireworks!*Best Holiday Ever!'
- source_sentence: 'Branch: Disneyland_Paris. Review: If you go to Disney, try to plan an entire day there,because it''s worth
    it. It takes about 1 hour and 20 minutes to get there from Paris(you must take a metro depending on the area that you''re
    going from, and them the train  RER A).It''s better if you book the tickets online,it is cheaper. We went on a Monday,and
    we booked tickets for 47 euros person:at both parks:Disneyland Park and Walt Disney Studios. If you go during the weekend
    the price is 59 eur person(online booking). At the entrance the price is about 90 eur pers, so definitely book online.
    :)Also,one day is not enough for both parks,if you want to fully enjoy both. Walt Disney closes at 19.00 and Disneyland
    at 23.00.But we enjoyed every second we spent there. :) '
  sentences:
  - 'Branch: Disneyland_California. Review: I have been to Disney world many times and on our trip to California my Sister
    and I decided it would be crazy to miss the opportunity to go to the original Disney! When we did it was very good but
    in comparison to Disney World in Florida it is tiny! We walked the whole park in just over an hour and it was so busy
    we didn   t get the chance to go on any rides because the lines were so long! It was very nice and I   m glad I visited
    but I probably wouldn   t go back. '
  - 'Branch: Disneyland_California. Review: What can I say that as not been said its Disney except that I enjoyed Disney Florida
    a bit more but really who''s complaining'
  - 'Branch: Disneyland_Paris. Review: I am an avid Disney fan. I enjoy all their parks. This one doesn''t disappoint. Crowds
    get a bit hectic at times, but we found it tolerable. Make sure you use the fast pass system so you don''t have to wait
    in lines (as much). Make restaurant reservations well in advance or you will be eating a lot of quick serve.I love their
    version of space mountain, it puts ours (FL) to shame.If you are familiar with Walt Disney World in Florida, don''t waste
    your time with their night time spectacular. The projection on the castle was nice, but the fireworks were really lame.
    Walt Disney World shoots off more fireworks in 2 minutes that they shoot off in their entire show.'
- source_sentence: 'Branch: Disneyland_California. Review: Just a lovely experience to always visit Disneyland Park, if you
    ever been to Disneyland then there is nothing super or special to mention here, get your fastpass as quick as you can
    to the popular rides, we were just frustrated with the very busy Peter Pan''s flight when we were in the long queue and
    then it went out of order for around thirty minutes or so which added a lot to the wait in a hot summer day. They are
    constructing a new right over there and couple were under maintenance too. The castle in there is tiny compared to the
    one in Disneyland Orlando! '
  sentences:
  - 'Branch: Disneyland_California. Review: Took my family to disneyland for a birthday celebration. This month they have
    the Halloween Private party from 6pm 11pm. Awesome! We all dressed up. You trick or treat and get a ton of candy. The
    fireworks are great! Not a lot of people. We paid 49.00 a person for the evening. Will do it again.'
  - 'Branch: Disneyland_California. Review: there are many themes. And i like tomorrow land. personally, children will like
    this park more.  i like exciting game more. If you do not like advanturous games, you can go to this park and take photo
    with Mini and Mickey.'
  - 'Branch: Disneyland_Paris. Review: Visited park with 10year old son with various medical issues, my friend and her daughter
    (celebrating her 13th birthday). Staff were helpful & pleasant throughout our visit, the parades and especially the illuminations
    were magical. Visited the park Thursday and Saturday, I would not go on weekend again as it was very crowded compared
    to the Thursday. Will definitely be back.'
- source_sentence: 'Branch: Disneyland_HongKong. Review: It is my second time coming to HK Disneyland. Unlucky us, it rained.
    Haha! Although rain didnt stop us from enjoying. Its just sad that the afternoon parade was cancelled. But during the
    night when the weather cleared, HK Disneyland pushed through the Paint the Night Parade. It was my first time seeing it.
    6 years ago there was only fireworks behind the castle (which is now still under renovation).My family and I will definitely
    go back. Love seeing my little one enjoying Disneyland. '
  sentences:
  - 'Branch: Disneyland_HongKong. Review: Must see for kids, judging by their reaction to everything what is happening.I will
    now talk about obvious things, but those were disappointing.Half of performances are in Chinese, which Is logical, but
    does not allow one english speaking to fully integrateVery limited choice of food, mostly fast food, which is always true
    for open parks as well. Not too much interactive attractions, rather very conservativeStill, for kids this is lots of
    fun, so I suppose adult''s opinion is a bit biased '
  - 'Branch: Disneyland_California. Review: This is an excellent park to visit. You cannot miss it.The Star wars rides were
    amazing!! Too bad the Harry Potter ride was not open when we went.Waited more than an hour to see Mickey but it was worth
    it!Will definitely come back the next time we are in California.'
  - 'Branch: Disneyland_California. Review: first tip:pre purchase your tickets, do not arrive there without them, second
    tip: load your 3 fastpasses 30 days prior to your arrival on the Disney website, create an account and link all of your
    tickets together. You will then be able to quickly use the Fastpass kiosks once in the park, where you will only be able
    to get one Fastpass at a time, but you''ll be able to do this for all tickets at the same time if you wish   a great time
    saver.'
