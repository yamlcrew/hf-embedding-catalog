  - source_sentence: 'Job Description Summary Our mission is to provide a great software product to our aviation customers
      with world class engineering solutions. We are looking for a Data Engineer to join one of our growing teams. The ideal
      candidate will thrive in a dynamic, results-driven, team-oriented environment. This role is responsible for developing
      data engineering jobs and workflows that enable data analytics and reporting solutions based on the given design and
      architecture. In this role you will see yourself responsible for executing and delivering the results using agile methodologies.
      This role is also responsible for providing post-deployment support, when needed. Job Description CAN WORK REMOTELY
      WITHIN US Roles And Responsibilities In this role you will: Configure existing applications to consume new and modified
      customer data feeds. Perform data profiling and data analysis for any source systems and the target data repositories.
      Understand metadata and the underlying data structures needed to standardize the data load processes. Develop data mapping
      specifications based on the results of data analysis and functional requirements. Build automated Extract, Transform
      & Load (ETL) jobs based on data mapping specifications. Create and enhance automation on frequently executed tasks.
      Validate the data mapping results. Implement new and ensure compliance with Data Quality (DQ) rules provided. Implement
      and control the use of master data configurations. Participate in the requirement gathering process and implement new
      solutions to address customer needs. Basic Requirements Bachelor''s Degree in Computer Science or STEM Majors (Science,
      Technology, Engineering and Math) Role is posted for Austin, TX but is open for remote work opportunities Must be able
      to legally work in the country to which you have applied for. We will not sponsor individuals for employment visas,
      now or in the future for this job. Desired Characteristics Hands-on experience in scripting and programming languages
      like Python, C# and Powershell. Hands-on experience in writing SQL scripts for sql server, Oracle, My SQL, or Postgre
      SQL. Exposure to Data visualization or reporting tools like Power BI, Tableau or SSRS. Experience with aircraft data
      frames such as DFDR, QAR, ARINC-717, ARINC-429, etc. Experience in handling regular expressions. Exposure to Extract,
      Transform & Load (ETL) tools. Personal And Leadership Attributes Effective written and oral communication and interpersonal
      skills, bilingual preferred. Demonstrates the ability to help team members. Inquisitive with a desire to learn and grow
      quickly as a contributor to the larger team. Identifies opportunities for innovation and offers new ideas. Takes the
      initiative to experiment with new software frameworks. Adapts to new environments and changing requirements. Pivots
      quickly as needed. When coached, responds to need & seeks info from other sources. Communicates project status or challenges
      in a clear and concise manner to other team members. Did you know that research has shown that women [ and people of
      color ] are less likely to apply to a job unless they meet 100% of the requirements? GE Digital is committed to building
      an inclusive workplace where everyone feels like they belong and can bring their entire selves to work this drives our
      innovation! Even if you dont meet every one of the preferred criteria in this job description, we encourage you to still
      apply as you might be a fantastic fit for this role, or other currently open roles. About Us At GE Digital, we are creating
      technology and solutions to enable social, mobile, analytical and cloud capabilities for the Industrial Internet. The
      Industrial Internet is an open, global network that connects people, data, and machines. Its about making infrastructure
      more intelligent and advancing the industries critical to the world we live in. At GE, we believe its about the future
      of industryenergy, aviation, healthcare, transportation, manufacturing. Its about making the world work better. GE is
      transforming itself to become the world''s premier digital industrial company, executing critical outcomes for our customers.
      The salary range for this position is $88,800 USD - $101,000 USD. The specific salary offered to a candidate may be
      influenced by a variety of factors including the candidates experience, their education, and the work location. In addition,
      this position is eligible for a performance bonusvariable incentive compensation. Available benefits include Health,
      Medical, Vision, 401 K, Paid Leave Additional Information GE offers a great work environment, professional development,
      challenging careers, and competitive compensation. GE is an Equal Opportunity Employer . Employment decisions are made
      without regard to race, color, religion, national or ethnic origin, sex, sexual orientation, gender identity or expression,
      age, disability, protected veteran status or other characteristics protected by law. GE will only employ those who are
      legally authorized to work in the United States for this opening. Any offer of employment is conditioned upon the successful
      completion of a drug screen (as applicable). Relocation Assistance Provided: No This is a remote position'
