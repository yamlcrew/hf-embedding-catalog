- source_sentence: 'Who We Are Apex Fintech Solutions (AFS) powers innovation and the future of digital wealth management
    by processing millions of transactions daily, to simplify, automate, and facilitate access to financial markets for all.
    Our robust suite of fintech solutions enables us to support clients such as Stash, Betterment, So Fi, and We Bull, and
    more than 20 million of our clients'' customers. Collectively, AFS creates an environment in which companies with the
    biggest ideas in fintech are empowered to change the world. We are based in Dallas, TX and also have offices in Austin,
    New York, Chicago, Portland, and Belfast. If you are seeking a fast-paced and entrepreneurial environment where you''ll
    have the opportunity to make an immediate impact, and you have the guts to change everything, this is the place for you.
    AFS has received a number of prestigious industry awards, including: 2021, 2020, 2019, and 2018 Best Wealth Management
    Company - presented by Fintech Breakthrough Awards 2021 Most Innovative Companies - presented by Fast Company 2021 Best
    API & Best Trading Technology - presented by Global Fintech Awards About This Role As a Principal Cloud Software Engineer
    at Apex Silver, you are responsible for design and development of software code. You will help lead other developers in
    the design and development of financial services applications that integrate with cloud-based services. You are a results
    oriented leader who can lead a team to exceed client expectations. You perform hands-on work required to meet service
    level requirements. You will lead by example. Key Responsibilities Coordinate with your cross functional product development
    team and members of the software development team Oversee and provide guidance to other development team members Design
    and develop highly performant large scale financial services applications Implement robust CICD processes Adhere to Silvers
    coding standards Keep up-to-date with industry trends and technology developments Skills & Requirements Requires a bachelor''s
    degree (or equivalent experience) and at least 10 years of experience Extensive knowledge of software development processes
    Extensive knowledge of bash shell scripting Extensive knowledge of implementing serverless solutions using amazon web
    services lambda, SQS, Event Bridge Extensive knowledge of Cloud Databases: amazon web services RDSAurora, Dynamo DBExtensive
    knowledge of Infrastructure-as-Code deployment tools like Cloud Formation templates, Terraform Extensive knowledge of
    amazon web services Cloud Technologies (EC 2, RDS, Amazon MQ, S 3, API Gateway, etc.)Extensive knowledge of bash shell
    scripting Extensive knowledge of CICD processes and tools like like Bit Bucket and Pipelines Knowledge of Java and SQLSolid
    experience in coding object oriented software Knowledge of javascript and front-end web frameworks Possess strong knowledge
    of fintech, investment services clearingcustody, best practices, and procedures Excellent communication, organizational,
    analytical and team building skills Lead and direct the work of others Demonstrates strong problem solving skills, process
    driven mindset, resourcefulness, and the ability to meet responsibilities with minimal direct oversight #engineering #mid-senior
    #full-time OUR REWARDS We offer a robust package of employee perks and benefits, including healthcare benefits (medical,
    dental and vision, EAP), competitive PTO, 401 k match, parental leave, and HSA contribution match. We also provide our
    employees with a paid subscription to the Calm app and offer generous external learning and tuition reimbursement benefits.
    At AFS, we offer a hybrid work schedule for most roles that allows employees to have the flexibility of working from home
    and one of our primary offices. AFS is committed to creating a diverse environment and is proud to be an equal opportunity
    employer. All qualified applicants will receive consideration for employment without regard to race, color, religion,
    gender, gender identity or expression, sexual orientation, national origin, natural or protective hairstyle, genetics,
    disability, age, or any other basis forbidden under federal, state, or local law.'
