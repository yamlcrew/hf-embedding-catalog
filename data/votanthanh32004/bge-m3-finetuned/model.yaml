      all. Our robust suite of fintech solutions enables us to support clients such as Stash, Betterment, So Fi, and We Bull,
      and more than 20 million of our clients'' customers. Collectively, AFS creates an environment in which companies with
      the biggest ideas in fintech are empowered to change the world. We are based in Dallas, TX and also have offices in
      Austin, New York, Chicago, Portland, and Belfast. If you are seeking a fast-paced and entrepreneurial environment where
      you''ll have the opportunity to make an immediate impact, and you have the guts to change everything, this is the place
      for you. AFS has received a number of prestigious industry awards, including: 2021, 2020, 2019, and 2018 Best Wealth
      Management Company - presented by Fintech Breakthrough Awards 2021 Most Innovative Companies - presented by Fast Company
      2021 Best API & Best Trading Technology - presented by Global Fintech Awards About This Role As a Principal Cloud Software
      Engineer at Apex Silver, you are responsible for design and development of software code. You will help lead other developers
      in the design and development of financial services applications that integrate with cloud-based services. You are a
      results oriented leader who can lead a team to exceed client expectations. You perform hands-on work required to meet
      service level requirements. You will lead by example. Key Responsibilities Coordinate with your cross functional product
      development team and members of the software development team Oversee and provide guidance to other development team
      members Design and develop highly performant large scale financial services applications Implement robust CICD processes
      Adhere to Silvers coding standards Keep up-to-date with industry trends and technology developments Skills & Requirements
