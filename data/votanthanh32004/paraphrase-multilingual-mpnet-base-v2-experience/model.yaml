    mạng lưới phân phối sang mô hình Data-driven và triển khai hệ thống SAP ERP đồng bộ.
  - Chuyên viên kiểm toán hệ thống thông tin (IT Auditor) tại một ngân hàng truyền thống trong 6 năm, rà soát tuân thủ ISO
