- source_sentence: Must possess 4+ years of experience applying data mining techniques, specifically building and tuning decision
    trees, and utilizing clustering algorithms for customer segmentation.
  sentences:
  - Served as the first and only legal counsel for a Series B software startup for 6 years, aggressively negotiating commercial
    contracts while simultaneously handling all internal HR and equity compliance.
  - Applied advanced data mining methodologies over 5 years, leveraging decision trees and K-means clustering to segment millions
    of retail customers and optimize targeted marketing campaigns.
  - Architected highly resilient AWS cloud infrastructures over 10 years tailored exclusively for the healthcare sector, implementing
    strict data encryption and IAM protocols to ensure total HIPAA compliance for millions of PHI records.
- source_sentence: Yêu cầu 10+ năm kinh nghiệm dẫn dắt các dự án Digital Transformation quy mô lớn, tái cấu trúc quy trình
    phân phối truyền thống sang mô hình Data-driven và tích hợp hệ thống ERP/CRM hiện đại.
  sentences:
  - Designed highly scalable backend software architectures using .NET and PostgreSQL for 15 years, integrating secure JWT
    authentication for a cloud-based human resources application.
  - Làm Software Architect cho các hệ thống ngân hàng số trong 9 năm, rất giỏi về kiến trúc cloud và microservices, nhưng
    hoàn toàn thiếu kiến thức về vật lý lưới điện và các tiêu chuẩn truyền tin trong ngành điện năng.
  - Làm chuyên viên phân tích dữ liệu (Data Analyst) trong 10 năm, phụ trách việc sử dụng các công cụ như PowerBI để trực
    quan hóa dữ liệu bán hàng từ hệ thống CRM có sẵn, không trực tiếp thiết kế hay dẫn dắt các dự án chuyển đổi.
- source_sentence: Must have 12+ years of leadership experience developing enterprise AML programs, navigating SEC regulations,
    and managing regulatory audits in the financial services sector.
  sentences:
  - Chuyên gia tư vấn luật hôn nhân và gia đình trong 8 năm, hỗ trợ khách hàng các thủ tục kết hôn có yếu tố nước ngoài và
    giải quyết tranh chấp quyền nuôi con sau ly hôn.
  - Processed multi-spectral satellite datasets for 10 years at an environmental NGO, applying custom machine learning models
    to accurately track deforestation rates and monitor agricultural land-use changes.
  - Developed robust enterprise AML programs and navigated complex SEC regulations for 14 years, successfully managing large-scale
    regulatory audits and mitigating systemic risk for a major financial institution.
- source_sentence: Yêu cầu 10+ năm kinh nghiệm, dẫn dắt mảng an toàn dược phẩm toàn cầu, am hiểu các quy định báo cáo biến
    cố bất lợi của FDA/EMA và dẫn dắt các buổi điều trần về an toàn thuốc.
  sentences:
  - Developed specialized computer vision models for automated farming equipment over 5 years, expertly processing drone imagery
    to assess crop health indices and drastically reducing chemical waste through targeted spraying algorithms.
  - Bác sĩ điều trị tại khoa Tim mạch trong 11 năm, am hiểu về tác dụng phụ của thuốc trên bệnh nhân thực tế, nhưng chưa từng
    làm việc trong môi trường công ty dược hay quản trị quy trình an toàn thuốc theo chuẩn quốc tế.
  - Directed global Phase III oncology trials, managed CRO budgets, and oversaw FDA GCP compliance for 12 years.
