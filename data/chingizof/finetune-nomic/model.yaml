    \ The solid blue thick line denotes a fiber pathway. The control points consist of intersection points (yellow solid dots)\
    \ and center points (blue solid dots).](JHE2018-8643871.003){#fig3}\n\n![NURBS-G pathway fitting. The solid blue thick\
    \ line denotes a fiber pathway. The set of control points consists of only intersection points (yellow dots).](JHE2018-8643871.004){#fig4}\n\
