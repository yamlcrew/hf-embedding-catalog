    \ % 4 == 0) {\n        return true;\n    }\n    return false;\n}\n\n// Get the number of days in a given month\nfunction\
    \ getDaysInMonth(int month, int year) returns int {\n    int[] daysInMonth = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31,\
    \ 30, 31];\n    if (month == 2 && isLeapYear(year)) {\n        return 29;\n    }\n    return daysInMonth[month - 1];\n\
    }\n\n// Calculate the day of week for a given date using Zeller's congruence\n// Returns 0 = Sunday, 1 = Monday, ...,\
    \ 6 = Saturday\nfunction getDayOfWeek(int year, int month, int day) returns int {\n    int m = month;\n    int y = year;\n\
    \    \n    if (m < 3) {\n        m = m + 12;\n        y = y - 1;\n    }\n    \n    int k = y % 100;\n    int j = y / 100;\n\
    \    \n    int h = (day + (13 * (m + 1)) / 5 + k + k / 4 + j / 4 - 2 * j) % 7;\n    \n    // Convert to Sunday = 0 format\n\
    \    int dayOfWeek = (h + 6) % 7;\n    return dayOfWeek;\n}\n\n// Get month name\nfunction getMonthName(int month) returns\
    \ string {\n    string[] months = [\"January\", \"February\", \"March\", \"April\", \"May\", \"June\",\n             \
    \          \"July\", \"August\", \"September\", \"October\", \"November\", \"December\"];\n    return months[month - 1];\n\
    }\n\n// Format and print calendar for a given month and year\nfunction printCalendar(int month, int year) {\n    string\
    \ monthName = getMonthName(month);\n    io:println(string `   ${monthName} ${year}`);\n    io:println(\"Su Mo Tu We Th\
    \ Fr Sa\");\n    \n    int firstDay = getDayOfWeek(year, month, 1);\n    int daysInMonth = getDaysInMonth(month, year);\n\
    \    \n    // Print leading spaces\n    string line = \"\";\n    int i = 0;\n    while (i < firstDay) {\n        line\
    \ = line + \"   \";\n        i = i + 1;\n    }\n    \n    // Print days\n    int day = 1;\n    int currentDayOfWeek =\
    \ firstDay;\n    \n    while (day <= daysInMonth) {\n        if (day < 10) {\n            line = line + string ` ${day}\
    \ `;\n        } else {\n            line = line + string `${day} `;\n        }\n        \n        currentDayOfWeek = currentDayOfWeek\
    \ + 1;\n        \n        if (currentDayOfWeek == 7) {\n            io:println(line);\n            line = \"\";\n    \
    \        currentDayOfWeek = 0;\n        }\n        \n        day = day + 1;\n    }\n    \n    // Print remaining line\
    \ if exists\n    if (line != \"\") {\n        io:println(line);\n    }\n}"
