      \ map if word exists, otherwise setting to 1\n// 4. Returns the frequency map\nfunction countWords(TextAnalyzer analyzer)\
      \ returns map<int> {\n    // Split by whitespace and common punctuation\n    regexp:RegExp regex = re `[\\s.,;:!?]+`;\n\
      \    string[] tokens = regex.split(analyzer.text);\n    \n    map<int> frequencyDict = {};\n    \n    foreach string\
      \ token in tokens {\n        // Skip empty tokens\n        if token.trim().length() == 0 {\n            continue;\n\
