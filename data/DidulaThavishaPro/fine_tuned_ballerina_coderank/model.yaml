- source_sentence: 'Represent this query for searching relevant code: Design an algorithm in ballerina to check the validity
    of a 10-digit phone number.'
  sentences:
  - "import ballerina/random;\n\n// This function creates an array of 10 random integers between 0 and 100 (inclusive).\n\
    // We iterate 10 times, and in each iteration we generate a random number\n// using the random:createIntInRange function\
    \ which takes a start (inclusive) \n// and end (exclusive) parameter. Since we want 0-100 inclusive, we use 0 and 101.\n\
    // We collect all generated numbers in an array and return it.\nfunction createRandomList() returns int[]|error {\n  \
    \  int[] result = [];\n    foreach int i in 0 ..< 10 {\n        int randomNum = check random:createIntInRange(0, 101);\n\
    \        result.push(randomNum);\n    }\n    return result;\n}"
  - "import ballerina/random;\n\n// We need to generate a random password of 10 characters\n// The password should contain\
    \ a mix of uppercase letters, lowercase letters, and digits\n// Strategy:\n// 1. Define a string containing all possible\
    \ characters (A-Z, a-z, 0-9)\n// 2. For each position in the password (10 times), randomly select a character from this\
    \ set\n// 3. Build the password string by concatenating the randomly selected characters\nfunction randomPassword() returns\
    \ string|error {\n    string lettersAndDigits = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789\";\n\
    \    int charSetLength = lettersAndDigits.length();\n    string password = \"\";\n    \n    // Generate 10 random characters\n\
    \    int i = 0;\n    while i < 10 {\n        // Get a random index within the character set\n        int randomIndex =\
    \ check random:createIntInRange(0, charSetLength);\n        // Append the character at that index to the password\n  \
    \      password = password + lettersAndDigits[randomIndex];\n        i = i + 1;\n    }\n    \n    return password;\n}"
  - "// To validate a phone number:\n// 1. Check if the length is exactly 10 characters\n// 2. Check if all characters are\
    \ digits (0-9)\n// Return true if both conditions are met, false otherwise\nfunction checkPhoneNumber(string phoneNumber)\
    \ returns boolean {\n    // Check if length is exactly 10\n    if phoneNumber.length() != 10 {\n        return false;\n\
    \    }\n    \n    // Check if all characters are digits\n    foreach string:Char c in phoneNumber {\n        if c < \"\
    0\" || c > \"9\" {\n            return false;\n        }\n    }\n    \n    // Phone number is valid\n    return true;\n\
    }"
  - "import ballerina/io;\n\n// This function reads a number from input and determines if it's greater than 10\n// Returns\
    \ \"OK\" if the number is greater than 10, otherwise returns \"Not OK\"\nfunction checkNumber(int num) returns string\
    \ {\n    if num > 10 {\n        return \"OK\";\n    } else {\n        return \"Not OK\";\n    }\n}\n\npublic function\
    \ main() returns error? {\n    // Read input from user\n    string input = io:readln(\"Enter a number: \");\n    \n  \
    \  // Convert string to integer\n    int num = check int:fromString(input);\n    \n    // Check and print result\n   \
    \ string result = checkNumber(num);\n    io:println(result);\n}"
- source_sentence: 'Represent this query for searching relevant code: Input an array of numbers, and build a function in ballerina
    to replace all even numbers with 0.'
  sentences:
  - "// The function takes an integer array as input\n// Iterates through each element\n// Checks if the element is even (divisible\
    \ by 2 with no remainder)\n// If even, replaces it with 0\n// Returns the modified array\nfunction replaceEven(int[] arr)\
    \ returns int[] {\n    foreach int i in 0 ..< arr.length() {\n        if arr[i] % 2 == 0 {\n            arr[i] = 0;\n\
    \        }\n    }\n    return arr;\n}"
  - "import ballerina/io;\n\n// Iterate from 0 to N (inclusive)\n// Check if each number is divisible by 2 (even number)\n\
    // Print the number if it's even\nfunction printEvenNumbers(int N) {\n    int x = 0;\n    while x <= N {\n        if x\
    \ % 2 == 0 {\n            io:println(x);\n        }\n        x = x + 1;\n    }\n}"
  - "import ballerina/io;\n\n// Iterate through numbers from 0 to n (inclusive)\n// Check if each number is even (divisible\
    \ by 2)\n// Print the even numbers\nfunction printEvenNumbers(int n) {\n    int i = 0;\n    while i <= n {\n        if\
    \ i % 2 == 0 {\n            io:println(i);\n        }\n        i += 1;\n    }\n}"
  - "import ballerina/io;\n\n// This function takes an array of integers and prints every other element\n// starting from\
    \ index 0 (i.e., elements at indices 0, 2, 4, etc.)\n// We iterate through the array with a step of 2 using a while loop\n\
    // since Ballerina doesn't have a step parameter in traditional for loops\nfunction printEveryOther(int[] lst) {\n   \
    \ int i = 0;\n    while i < lst.length() {\n        io:println(lst[i]);\n        i = i + 2;\n    }\n}"
