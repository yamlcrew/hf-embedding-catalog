    \ metadata;\n}"
  - "import ballerina/io;\nimport ballerina/random;\n\n// This function creates a simple number guessing game in Ballerina\n\
    // Since Ballerina doesn't have a GUI library like PyGame, we'll create\n// a text-based game that demonstrates game loop\
    \ concepts\n// The game will generate a random number and let the player guess it\n// Returns true if the player wants\
    \ to play again, false otherwise\nfunction playGuessingGame(int minRange, int maxRange, int maxAttempts) returns boolean|error\
    \ {\n    // Generate a random number between minRange and maxRange\n    int secretNumber = check random:createIntInRange(minRange,\
    \ maxRange + 1);\n    int attempts = 0;\n    boolean gameRunning = true;\n    \n    io:println(string `Welcome to the\
    \ Number Guessing Game!`);\n    io:println(string `Guess a number between ${minRange} and ${maxRange}`);\n    io:println(string\
    \ `You have ${maxAttempts} attempts.`);\n    \n    // Game loop - similar to PyGame's event loop\n    while gameRunning\
    \ && attempts < maxAttempts {\n        attempts += 1;\n        io:println(string `\\nAttempt ${attempts}/${maxAttempts}`);\n\
    \        \n        // Get player input\n        string input = io:readln(\"Enter your guess: \");\n        int|error guess\
    \ = int:fromString(input);\n        \n        if guess is error {\n            io:println(\"Invalid input! Please enter\
    \ a number.\");\n            attempts -= 1; // Don't count invalid inputs\n            continue;\n        }\n        \n\
    \        // Check the guess\n        if guess == secretNumber {\n            io:println(string `Congratulations! You guessed\
    \ the number ${secretNumber} in ${attempts} attempts!`);\n            gameRunning = false;\n        } else if guess <\
    \ secretNumber {\n            io:println(\"Too low! Try again.\");\n        } else {\n            io:println(\"Too high!\
    \ Try again.\");\n        }\n        \n        // Check if out of attempts\n        if attempts >= maxAttempts && guess\
    \ != secretNumber {\n            io:println(string `Game Over! The number was ${secretNumber}`);\n            gameRunning\
    \ = false;\n        }\n    }\n    \n    // Ask if player wants to play again\n    string playAgain = io:readln(\"\\nPlay\
    \ again? (yes/no): \");\n    return playAgain.toLowerAscii() == \"yes\";\n}\n\n// Main game initialization and loop function\n\
    function initializeGame() returns error? {\n    boolean running = true;\n    \n    // Main game loop - similar to PyGame's\
    \ main loop\n    while running {\n        boolean|error continueGame = playGuessingGame(1, 100, 7);\n        \n      \
    \  if continueGame is error {\n            io:println(\"An error occurred: \" + continueGame.message());\n           \
    \ running = false;\n        } else {\n            running = continueGame;\n        }\n    }\n    \n    io:println(\"Thanks\
    \ for playing!\");\n}"
  - "import ballerina/http;\n\n// Function to make a POST request with the specified parameters\n// Takes the URL, headers\
