    \    string[] installRequires = [\n        \"ruamel.yaml==0.15.100\",\n        \"pyserial==3.5\",\n        \"pyserial-asyncio==0.4\"\
    ,\n        \"sortedcontainers==2.3.0\",\n        \"psutil==5.7.3\"\n    ];\n    \n    // Build extras require map\n  \
    \  map<string[]> extrasRequire = {\n        \"pin2dmd\": pin2dmdRequires,\n        \"linux_i2c\": linuxI2cRequires,\n\
    \        \"rpi\": rpiRequires,\n        \"cli\": cliRequires,\n        \"osc\": oscRequires,\n        \"irc\": ircRequires,\n\
    \        \"vpe\": vpeRequires,\n        \"crash_reporter\": crashReporterRequires\n    };\n    \n    // Build entry points\
