  - source_sentence: What specific actions is the UK government implementing as part of the third National Adaptation Programme
      (NAP3) to address the impacts of climate change?
    sentences:
    - '(The Thames Barrier in London, shown at low tide. Photo by mikeinlondon via Getty Images.)

      The government is taking action to adapt the UK to climate change. This can help reduce the costs from climate change
      impacts and make our economy and society more resilient.

      This page explains more about:

      climate change and adaptation

      the risks and opportunities of climate change

      what the government is doing to make sure that the UK is prepared for climate change – including the third National
      Adaptation Programme (NAP3)

      Climate change

      Our climate is changing. The main cause is human activity: in particular, burning fossil fuels for energy, which emits
      greenhouse gases into the atmosphere and causes the world’s temperature to rise.

      In the UK we can see the effects of climate change already. In 2022 the UK recorded the warmest year on record with
      temperatures reaching over 40°C, which had impacts on public health and the environment. These temperatures would not
      have been possible without climate change caused by human activity. The frequency of hotter summers will increase in
      the future, and we can expect the winters to become wetter, which will make flooding more likely across the UK.

      The government is taking action to limit climate change through its commitment to reach net zero greenhouse gas emissions
      by 2050. One of these actions is reducing our reliance on fossil fuels. Achieving ‘net zero’ in the UK and across the
      world will help to limit temperature rises in the future and reduce the level of climate change we need to adapt to.

      Climate adaptation

      Climate adaptation relates to actions that protect us against the impacts of climate change. This includes reacting
      to the changes we have seen already, as well as preparing for what will happen in the future.

      The UK government is taking steps to address the impacts of climate change to protect communities, our economy and the
      environment.

      Examples of the government’s approach to climate adaptation include:

      building new flood defences to protect against rising sea levels

      planning for more green spaces in urban areas to help keep them cool and planting more drought-resistant crops

      building infrastructure that can withstand expected climate impacts such as extreme heat and flooding

      Many of the actions in NAP3 can help to improve our standard of living too, by upgrading our buildings and infrastructure,
      improving the sustainability and productivity of important sectors such as agriculture and forestry, and restoring our
      natural environment.

      Climate risks and opportunities

      Climate change can lead to both risks and opportunities, although there are more risks than opportunities. Without measures
      to adapt to climate change, we would experience additional issues including:

      health risks

      damage to houses and infrastructure'
    - 'We will help shape an international order in which all citizens are well informed, able to participate in democratic
      processes and enjoy their rights in offline and online public spaces, as well as freedom of expression; and we will
      promote an information ecosystem that supports accountability and inclusive deliberative democracy.

      The UK commits to an open, free, global, interoperable, reliable and secure Internet; and to ensuring emerging tech
      supports, rather than erodes, the enjoyment of democracy, human rights and fundamental freedoms. Working collectively
      with international partners, civil society and the tech sector is critical in ensuring that the online world and technologies
      promote freedom, democracy and inclusion, and protect human rights and fundamental freedoms.

      We will strengthen our collaboration in the multi-stakeholder spaces that support digital democracy. We will enhance
      our advisory support to the Freedom Online Coalition (FOC) and will bid to continue as a member of the FOC Steering
      Committee and to maintain our role as co-chairs of the Taskforce on Internet Shutdowns (TFIS).

      We will support our overseas network to better understand the threat posed by information disorder through digital platforms.
      In doing so, we will identify international best practice and increase our understanding of information disorder in
      elections, independent media as well as gendered disinformation impacts on women’s political empowerment and participation
      in electoral processes.

      We will champion the importance of a vibrant, independent, and pluralistic civic space online and offline, where people
      can exercise their freedoms. We will work in collaboration with other donors, civil society, academia and the private
      sector to leverage the opportunities and mitigate the risks that digital transformation provides for civil society and
      civic space.

      We will support open and accountable use of emerging digital technologies, especially the need for democratic and human
      rights safeguards. This includes grant support for the Open Government Partnership to help enable open and accountable
      use of emerging digital technologies by driving digital governance reforms in 10 countries (Ghana, Indonesia, Kenya,
      Nigeria, Dominic Republic, Armenia, Colombia, Zambia, the Philippines and Ukraine), accelerating collective action and
      norm-raising on digital governance and increasing impact through better connection between global pledges and country
      action.

      Chapter 3 – Digital inclusion: leaving no one behind in a digital world

      The benefits of digital transformation are not evenly distributed. A third of the world’s population is offline, and
      that is concentrated within the poorest and most marginalised groups.'
