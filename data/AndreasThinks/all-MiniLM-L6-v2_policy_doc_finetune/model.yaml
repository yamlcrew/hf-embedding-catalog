  - '323. Similarly, DCMS Ministers in both Houses of Parliament expressed at the dispatch box their disappointment about
    the proposed changes to BBC local radio services. There have also been several instances over the Charter period where
    a lack of effective transparency in engaging the public has been highlighted in the media and by Parliamentarians. For
    example, the BBC’s failure to explain how it was dealing with complaints about the anti-semitic incident on a bus on Oxford
    Street at the end of 2021 in the face of significant public pressure received widespread media coverage. The announcement
    of the closure of BBC Singers led to Parliamentary discussions and media reports raising concerns about how the decision
    had been made and communicated, including internally within the BBC.

    The government’s response

    324. When considering how the BBC communicates with audiences, it is our view that the BBC should be held to a higher
    standard than other organisations given the extent of its public funding. This higher standard needs to go beyond publication
    of more data and information, to straightforward and open communication with audiences. The BBC Board has overall responsibility
    for ensuring that the BBC communicates changes that have an impact on audiences effectively with those audiences. This
    has to be accompanied by equally effective communication with its workforce. Evidence received indicates that the BBC
    has not always achieved this.

    7.1 We recommend that the BBC continues to learn from recent experiences where announcements about service changes have
    led to criticism about the BBC’s approach to transparency.

    7.2 We also recommend that the BBC publishes details of its strategy for communicating with audiences which explains improvements
    to its communications approach already made, but also how it identifies any changes needed so that audiences and staff
    can be confident that future service changes and their impact will be explained clearly.

    Understanding audience needs

    What we learnt

    325. During evidence gathering, many stakeholders made proposals regarding how the BBC could improve its transparency
    in specific ways to help audiences hold it to account. All of these proposals related to individual specific themes in
    previous chapters. Ofcom’s research suggests that there are perception issues with the BBC’s impartiality that more effective
    transparency could help address.

    The government’s response

    326. It is important that licence fee payers do not just have the opportunity to shape the services that the BBC provides,
    but that they also have the opportunity to tell the BBC how they would like the BBC to be more transparent.'
  - '67. Building on our Fraud Plan, DWP is investing £70 million between 2022/23 and 2024/25 in advanced analytics to tackle
    fraud and error, which it expects will help it to generate savings of around £1.6 billion by 2030/31[footnote 24].

    68. Investing in advanced analytics, such as machine learning, is essential to enable the public sector to keep up with
    offenders. Sophisticated crimminals already utilise such tools to analyse large amounts of data to exploit existing weaknesses
    and vulnerabilities in public sector systems. In DWP these tools can play a crucial role in detecting and preventing fraudulent
    activities in DWPs benefit systems. Going forward we want to maximise the benefits that advanced analytics and machine
    learning can offer.

    69. Where these tools are used to assist in the prevention and detection of fraud, DWP always ensures appropriate safeguards
    are in place to ensure the proportionate, ethical, and lawful use of data with human input. In decision making, any final
    decision will always be made by a member of DWP staff and DWP seeks to ensure compliance using internal monitoring protocols.
    DWPs Personal Information Charter sets out in more detail how the Department uses these tools, as well as Artificial Intelligence
    and automated decision making.

    Continuous improvement to Universal Credit (UC)

    70. As we complete the Move to UC, the Department’s spending on UC alone is forecast to double (relative to 2022/23 in
    nominal terms) to reach over £85 billion by 2028/29[footnote 25].

    71. We are constantly improving UC to reduce fraud and error and to ensure the right support reaches the right people.

    72. Building on our previous Fraud Plan our UC Continuous Improvement plan brings together multi-disciplinary teams to
    look at the largest areas of loss within UC and considers how we can improve our processes to reduce these.

    73. These teams focus on understanding the root-causes and scale of the losses, design and test solutions with a view
    to implementing them more widely if the tests are successful. The implementation of these solutions may involve changes
    to policy, improvements to the operation of UC service or greater use of data and automation to prevent the fraud.'
- source_sentence: What is the date and time of the next meeting?
  sentences:
  - 'Defra is working with the British Standards Institution (BSI) to develop a suite of nature investment standards that
    will support best practice standardisation of methodologies with regards to best practices for assessing the baseline,
    monitoring, and verifying the delivery of nature-based carbon removals. This will be critical for the purposes of supplying
    and selling credits into nature markets, and for quantifying within value chain mitigation of environmental impacts. These
    standards will build on and aim to align with the work of international integrity initiatives, including the Integrity
    Council for Voluntary Carbon Markets (ICVCM) and the Voluntary Carbon Markets Initiative (VCMI).

    As part of this programme, BSI is developing the ‘Nature markets - Overarching principles and framework’, which will apply
    to nature-based environmental improvement projects and the quantification of ecosystem services. These principles will
    set the basis by which nature markets can be more effectively designed and governed. A first draft of the BSI Flex 701
    standard was published for consultation in March 2024.

    Further to this, BSI will be developing more specific thematic and market specific standards to follow over the course
    of 2024 to 2025, for example, for nature-based carbon and biodiversity. This will include a certification mechanism to
    allow methodologies which meet these standards to become certified as offering high integrity.

    1.2 A standardised approach to product level impact quantification

    Increasingly, businesses are seeing the benefits of communicating product level impact data to consumers and other businesses
    in the supply chain. Product level accounting can help improve understanding of the impacts of specific products and supply
    chains to inform changes at the supplier and product level to reduce impacts. Product level data can also enable more
    accurate reporting of company impacts from the ‘bottom-up’, by summing up the impact of all products sold by the company,
    in addition to any energy use or emissions on site.

    Product level impact data is generated through lifecycle assessments (LCAs). Although there are many commonalities between
    Scope 3 and product carbon footprinting, there are a number of practical and methodological differences summarised in
    section 4.1 of the WRAP Protocol.

    Relevant priorities

    1.3 – A standardised product level accounting method (including multi-metric approach)

    Developing a product level accounting method'
  - 'To enable efficient and extensive use of genomic AMR data, the design and implementation of data handling solutions will
    be explored. The design should accommodate complexities such as AMR outbreaks caused by the same AMR-causing mobile genetic
    element transferred among different pathogen species, or longer-term trends in AMR epidemiology. These should provide
    new or use existing open standards, for the handling of AMR-related information, to facilitate working with international
    partners and allow convenient and effective querying for surveillance and response planning. Few countries offer large
    scale sequencing and analysis of AMR associated isolates so UK data would provide vital insight into the molecular epidemiology
    of these infections and position the UK to exploit the knowledge these new methods can provide.

    Theme 2 - Optimising the use of antimicrobials

    Outcome 4 - Antimicrobial stewardship and disposal

    By 2029, the UK has strengthened antimicrobial stewardship and diagnostic stewardship by improved targeting of antimicrobials
    and diagnostic tools for humans, animals and plants, and improved the disposal of antimicrobials, informed by the right
    data, risk stratification and guidance.

    This outcome has:

    3 commitments:

    clinical decision support

    appropriate prescribing and disposal

    behavioural interventions

    2 human health targets (see appendix B):

    target 4a: by 2029, we aim to reduce total antibiotic use in human populations by 5% from the 2019 baseline

    target 4b: by 2029, we aim to achieve 70% of total use of antibiotics from the Access category (new UK category) across
    the human healthcare system

    While all use of antimicrobials drives AMR, there is an opportunity to reduce inappropriate use of antimicrobials occurring,
    for example, when antimicrobials are taken when they are not needed, or when taken for longer than necessary.

    According to the National Institute for Health and Care Excellence’s NICE guideline (NG15):

    The term ‘antimicrobial stewardship’ is defined as ‘an organisational or healthcare‑system‑wide approach to promoting
    and monitoring judicious use of antimicrobials to preserve their future effectiveness’.'
