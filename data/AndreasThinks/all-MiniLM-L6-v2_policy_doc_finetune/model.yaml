      \ experience with Kenya and South Africa.\nWe will collaborate with Government Digital Service (GDS) to share know-how\
      \ with partner countries on digitalisation in the public sector, building on our advisory role in GovStack[footnote\
      \ 56]. We will leverage the UK experience of DPI for public or regulated services (health, transport, banking, land\
      \ registries) based on the significant demand for this expertise from developing countries and riding the momentum on\
      \ DPI generated by the G20 India presidency of 2023.\n 6.4 Enhancing FCDO’s digital development capability\nThe UK government\
      \ will also enhance its own digital development capability to keep up with the pace of technological change, to be forward-looking\
      \ and anticipate emergent benefits and risks of digital transformation. We will invest in new research on digital technologies\
      \ and on their inclusive business models to build the global evidence base, share lessons learned and improve knowledge\
      \ management through our portfolio of digital development and technology programmes, including the FCDO’s new Technology\
      \ Centre for Expertise (Tech CoE), which will complement and support our programming portfolio.\nSince all sectors within\
      \ international development are underpinned by digital technologies, we will ensure that digital development skills\
      \ are mainstreamed across the FCDO. We will raise awareness and upgrade staff knowledge through new training opportunities\
      \ on best practice in the complex and evolving area of digital development, through partnering with existing FCDO capability\
      \ initiatives, ie the International Academy’s Development Faculty, the Cyber Network and the International Technology\
      \ curriculum."
