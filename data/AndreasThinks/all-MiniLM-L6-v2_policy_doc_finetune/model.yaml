      of March 2028.

      Other impacts

      HMRC is required to consider the justice impact test and rural proofing measures in relation to their impacts on rural
      communities and the justice system.

      HMRC’s assessments suggest any impact is likely to be negligible. Mitigations are in place for those whose rural location
      impacts their internet access to the point where it is not feasible to operate MTD, as discussed in the ‘Equalities
      impacts’ section.

      This measure does not fall within the scope of the environmental principles duty.

      Other impacts have been considered and none have been identified.

      Monitoring and evaluation

      HMRC’s communications programme includes work to build software developer, agent and taxpayer readiness, to promote
      inclusion in the large-scale public beta testing programme beginning in 2025 and encourage voluntary early adoption
      of MTD for ITSA.

      HMRC is committed to monitoring and formally evaluating the impact of MTD for ITSA, including both customer and revenue
      impacts. This will build on HMRC’s track record in successfully evaluating MTD for VAT and publishing the findings.
      Independent social research will be undertaken both before and after MTD for ITSA is introduced to gather evidence of
      customer impacts and behaviour change. Self Assessment data will be used to monitor take-up and estimate additional
      tax revenue due to MTD. The evaluation will take until at least 2029, when all data for the 2027 to 28 tax year becomes
      available for analysis.

