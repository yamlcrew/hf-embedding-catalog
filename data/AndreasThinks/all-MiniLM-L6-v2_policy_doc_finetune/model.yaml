- source_sentence: Who are the joint leaders of the new Anti-social Behaviour Taskforce responsible for overseeing the implementation
    and delivery of the action plan?
  sentences:
  - '80. It is also vital that we measure the overall success of this plan in tackling anti-social behaviour to ensure that
    it is meeting the commitments we have set out. We will assess the impact of our proposals on both communities’ experience
    and perceptions of anti-social behaviour and their effectiveness in tackling it. To achieve this, we will draw from the
    wide range of data enhancements outlined throughout this plan, alongside wider measures, to monitor and evaluate its success
    and to further inform our understanding of what works in driving down anti-social behaviour.

    81. We will oversee the implementation and delivery to this action plan with a new Anti-social Behaviour Taskforce jointly
    led by the Home Secretary and the Secretary of State for Levelling Up that will bring together national and local partners,
    with a sole focus of addressing anti-social behaviour and restoring pride in place in communities.

