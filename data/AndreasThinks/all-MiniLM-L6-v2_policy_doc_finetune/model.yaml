  - source_sentence: What are the five criteria that community projects must meet to be considered for funding by the Community
      Ownership Fund?
    sentences:
    - 'We want to fund community projects that do at least 1 of these 5 things:

      increase feelings of pride in, and improve perceptions of, the local area as a place to live

      improve social trust, cohesion, and sense of belonging

      increase local participation in community life, arts, culture, or sport

      improve local economic outcomes – including creating jobs, volunteering opportunities, and improving employability and
      skills levels in the local community

      improve social and wellbeing outcomes – including having a positive impact on physical and mental health of local people,
      and reducing loneliness and social isolation

      Strengthening community ownership across the UK

      The Fund will be delivered directly by the UK government to communities in England, Scotland, Wales, and Northern Ireland.
      The UK government is committed to fair opportunities to access funding through the Community Ownership Fund across the
      UK.

      A minimum target of spending in line with per-capita allocations has therefore been set in Scotland, Wales, and Northern
      Ireland. The Community Ownership Fund will target a minimum of £12.3 million in Scotland, £7.1 million in Wales, and
      £4.3 million in Northern Ireland of the total Fund over the 4 years until March 2025.

      The design of the Fund recognises the different landscapes for community ownership across the UK, with different legislation
      in England and Wales, Scotland, and Northern Ireland. We have engaged widely with local stakeholders to ensure the Fund
      is effective, accessible and achieves its objectives.

      Applications will be assessed against a consistent framework. Eligibility for the Fund and the bidding assessment criteria
      are consistent in all 4 nations.

      Glossary

      Community asset

      For this fund, an asset is physical building or space. It must be used by the community and accessible to as many people
      as possible.

      Community Asset Transfer

      Across the United Kingdom, Community Asset Transfer (CAT) policy frameworks support the transfer of community assets
      from public authorities to community organisations. The legislation and policy contexts work slightly differently in
      parts of the United Kingdom.

      England

      Asset of community value

      In England the Localism Act 2011 introduced a right for community groups to nominate buildings or land to their local
      authority as an asset of community value.

      If the local authority agreed that the nomination met the test of being land of community value, the council would place
      the asset on a list of assets of community value for a period of 5 years.

      What this did was introduce a community right to bid. If the owner of a listed asset decided that they wish to sell
      the asset during the 5-year period of listing, then they must notify the local authority who would inform the nominating
      community group.'
