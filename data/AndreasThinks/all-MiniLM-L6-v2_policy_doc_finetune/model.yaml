- source_sentence: How much funding has the government committed to expand the Public Sector Fraud Authority to deploy AI
    in combating fraud?
  sentences:
  - '2) Embracing the opportunities presented by making greater use of cutting-edge technology, such as AI, across the public
    sector. The government is:

    More than doubling the size of i.AI, the AI incubator team, ensuring that the UK government has the in-house expertise
    consisting of the most talented technology professionals in the UK, who can apply their skills and expertise to appropriately
    seize the benefits of AI across the public sector and Civil Service.

    Committing £34 million to expand the Public Sector Fraud Authority by deploying AI to help combat fraud across the public
    sector, making it easier to spot, stop and catch fraudsters thereby saving £100 million for the public purse.

    Committing £17 million to accelerate DWP’s digital transformation, replacing paper-based processes with simplified online
    services, such as a new system for the Child Maintenance Service.

    Committing £14 million for public sector research and innovation infrastructure. This includes funding to develop the
    next generation of health and security technologies, unlocking productivity improvements in the public and private sector
    alike.

    3) Strengthening preventative action to reduce demand on public services. The government is:

    Committing an initial £105 million towards a wave of 15 new special free schools to create over 2,000 additional places
    for children with special educational needs and disabilities (SEND) across England. This will help more children receive
    a world-class education and builds on the significant levels of capital funding for SEND invested at the 2021 Spending
    Review. The locations of these special free schools will be announced by May 2024.

    Confirming the location of 20 Alternative Provision (AP) free schools, which will create over 1,600 additional AP places
    across England as part of the Spending Review 2021 commitment to invest £2.6 billion capital in high needs provision.
    This will support early intervention, helping improve outcomes for children requiring alternative provision, and helping
    them to fulfil their potential.'
  - "We will help build the UKDev (UK International Development) approach and brand by leveraging the UK’s comparative advantage\
