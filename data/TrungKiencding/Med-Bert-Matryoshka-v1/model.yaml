widgetData:
- source_sentence: 'Со стороны мочевыделительной системы: очень редко — гематурия. При приеме розувастатина может наблюдаться
    протеинурия. Изменения содержания белка в моче (от отсутствия или до наличия следовых количеств до уровня ++ и выше) наблюдаются
    менее чем у 1% пациентов, принимающих розувастатин в дозе 10 и 20 мг, и примерно у 3%, принимающих препарат в дозе 40
    мг. Незначительное изменение количества белка в моче, выраженное в изменении от нулевого уровня или наличия следов до
    уровня +, наблюдалось при приеме препарата в дозе 20 мг. В большинстве случаев протеинурия уменьшалась и самостоятельно
    проходила в процессе лечения. При анализе данных клинических исследований не выявлена причинная связь между протеинурией
    и острыми или прогрессирующими заболеваниями почек.'
  sentences:
  - Лираглутид снижает чувство голода?
  - При терапии розувастатином может происходить изменение содержания белка в моче?
  - При данном заболевании обязательно полностью отказаться от любых молочных продуктов?
- source_sentence: Сердце — полый мышечный орган, нагнетающий кровь в артерии большого и малого кругов кровообращения и принимающий
    кровь. Располагается в грудной полости в составе органов среднего средостения; по форме сердце напоминает конус. Продольная
    ось сердца направлена косо — справа налево, сверху вниз и сзади наперед; оно на две трети располагается в левой половине
    грудной полости. Верхушка сердца обращена вниз, влево и вперед, проецируется на пятый межреберный промежуток на пересечении
    со средней ключичной линией, а более широкое основание сердца вправо, кверху и кзади.
  sentences:
  - Пневмосклероз является результатом воспалительных процессов в лёгких?
  - Сердце относистся к органам среднего средостения?
  - Препарат содержит как минимум 2 компонента в своём составе?
- source_sentence: В просвете желудочно-кишечного тракта Полифепан связывает и выводит из организма патогенные бактерии и
    бактериальные токсины, лекарственные препараты, яды, соли тяжелых металлов, алкоголь, аллергены. Препарат сорбирует также
    избыток некоторых продуктов обмена веществ, в том числе билирубина, холестерина, мочевины, метаболитов, ответственных
    за развитие эндогенного токсикоза. Полифепан не токсичен, не всасывается, полностью выводится из кишечника в течение 24
    часов.
  sentences:
  - Полифепан накапливается в печени?
  - Пространство между фолликулами заполнено соединительной тканью?
  - Никотинамид и никотиновая кислота это одно и то же вещество в составе витамина PP?
- source_sentence: Дизентерия (бактериальная дизентерия, шигеллез) — инфекционная болезнь с фекально-оральным механизмом передачи,
    вызывается бактериями рода шигелл. Протекает с преимущественным поражением слизистой оболочки дистального отдела толстой
    кишки.
  sentences:
  - Дизентерия поражает слизистую толстой кишки?
  - Действие препарата сопровождается увеличением плацентарного кровотока?
  - У пациентки есть покраснение кожи, не так ли?
- source_sentence: 'Цитогенетические методы предназначены для изучения структуры хромосомного набора или отдельных хромосом.
    Объектом цитогенетических наблюдений могут быть делящиеся соматические, мейотические и интерфазные клетки. Чаще исследования
    выполняются на соматических клетках: наиболее удобный объект - культура лимфоцитов периферической крови, но также и культура
    клеток из кусочков кожи (фибробласты), костного мозга, эмбриональных тканей, хориона, клеток амниотической жидкости.'
  sentences:
  - Эти методы направлены на выявление биохимического фенотипа организма?
  - Чаще всего кариесом болеют дети?
  - Употребление настоя шиповника способствует накоплению желчи в организме?
