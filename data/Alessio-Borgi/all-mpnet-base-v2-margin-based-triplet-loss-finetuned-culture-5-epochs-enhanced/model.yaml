- source_sentence: 'Bachtel a summit in the canton of Zurich Bachtel is a mountain of the Zurich Oberland, located between
    Hinwil and Wald in the canton of Zurich. It lies approximately halfway between the Schnebelhorn (the highest point of
    the canton) and Lake Zurich. On the summit is the Bachtel Tower, a 60 metres (200 ft) tall radio tower. The Bachtel range
    (also Allmann or Allmen, Bachtel-Allmen-Kette) separates the Töss and Glatt basins. Extending to the north of Bachtel
    proper, towards Bauma, it includes Auenberg (1050 m), Allmen (1079 m) and Stüssel (1051 m). {''name'': ''Bachtel'', ''photo'':
