      {''instance of'': ''mountain'', ''country'': ''Switzerland'', ''continent'': ''Europe'', ''located in the administrative
      territorial entity'': ''Canton of the Grisons'', ''subclass of'': ''mountain'', ''mountain range'': ''Schwyzer Voralpen'',
      ''described by source'': ''Meyers Konversations-Lexikon, 4th edition (1885–1890)''}'
  - source_sentence: 'Myrmecophyte plants that live in association with ants Myrmecophytes (; literally "ant-plant") are plants
      that live in a mutualistic association with a colony of ants. There are over 100 different genera of myrmecophytes.
      These plants possess structural adaptations in the form of domatia where ants can shelter, and food bodies and extrafloral
      nectaries that provide ants with food. In exchange for these resources, ants aid the myrmecophyte in pollination, seed
      dispersal, gathering of essential nutrients, and defense. Domatia adapted specifically to ants may be called myrmecodomatia.
      {''note'': ''infobox not present in Wikipedia''} {''subclass of'': ''plant'', ''instance of'': ''taxon'', ''described
      by source'': ''Great Soviet Encyclopedia (1926–1947)'', ''taxon rank'': ''species'', ''maintained by WikiProject'':
      ''WikiProject Invasion Biology'', ''has use'': ''medicinal plant''}'
    sentences:
    - 'captain member of a sports team In team sport, captain is a title given to a member of the team. The title is frequently
      honorary, but in some cases the captain may have significant responsibility for strategy and teamwork while the game
      is in progress on the field. In either case, it is a position that indicates honor and respect from one''s teammates
      – recognition as a leader by one''s peers. In association football and cricket, a captain is also known as a skipper.
      Various sports have differing roles and responsibilities for team captains. Depending on the sport, team captains may
      be given the responsibility of interacting with game officials regarding application and interpretation of the rules.
      In many team sports, the captains represent their respective teams when the match official does the coin toss at the
      beginning of the game. The team captain, in some sports, is selected by the team coach, who may consider factors ranging
      from playing ability to leadership to serving as a good moral example to the team. Coaches may also choose to change
      team captains from time to time, or to have a rotation of team captains. Some of the greatest captains in history are
      the ones with the most subtle of traits that are required for success. From Sam Walker in his book The Captain Class
      he states that a captain is "the most important factor for a team''s success". {''aliases'': [''team captain'']} {''instance
      of'': ''position'', ''subclass of'': ''athlete''}'
    - 'statesperson civil servant or politician in high government offices A statesman or stateswoman is a politician or a
