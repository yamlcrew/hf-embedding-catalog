  sentences:
  - 'trees of Pakistan tree species of the country Pakistan In Pakistan, more than 430 tree species are distributed over 82
    families and 226 genera. Out of these, 22 species from 5 families and 11 genera belong to softwood trees of gymnosperms.
    For all plant families found in Pakistan, see Flora of Pakistan. The Deodar Tree is the official national tree of Pakistan.
    Its name is derived from ''Sanskrit'' and means "Wood of the God". It is amongst the tallest trees in the country, reaching
    heights of around 40-50 meters, with trunks up to 3 meters in diameter. {''note'': ''infobox not present in Wikipedia''}
    {''subclass of'': ''tree''}'
  - 'emblem book book collecting emblems (allegorical illustrations) with accompanying explanatory text An emblem book is
    a book collecting emblems (allegorical illustrations) with accompanying explanatory text, typically morals or poems. This
    category of books was popular in Europe during the 16th and 17th centuries. Emblem books are collections of sets of three
    elements: an icon or image, a motto, and text explaining the connection between the image and motto. The text ranged in
    length from a few lines of verse to pages of prose. Emblem books descended from medieval bestiaries that explained the
    importance of animals, proverbs, and fables. In fact, writers often drew inspiration from Greek and Roman sources such
    as Aesop''s Fables and Plutarch''s Lives. {''aliases'': [''emblem books'']} {''subclass of'': ''book''}'
  - 'moving walkway roughly horizontal conveyor for pedestrians A moving walkway, also known as an autowalk, moving pavement,
    moving sidewalk in US English, travolator, or travelator, is a slow-moving conveyor mechanism that transports people across
    a horizontal or inclined plane over a short to medium distance. Moving walkways can be used by standing or walking on
    them. They are often installed in pairs, one for each direction. {''aliases'': [''moving sidewalk'', ''autowalk'', ''moving
    pavement'', ''people-mover'', ''travolator'', ''travelator'']} {''instance of'': ''mode of transport'', ''subclass of'':
    ''mode of transport'', ''described by source'': ''Meyers Konversations-Lexikon, 4th edition (1885–1890)'', ''on focus
    list of Wikimedia project'': ''Wikipedia:Vital articles/Level/4'', ''has use'': ''transport''}'
- source_sentence: 'charity supergroup Group of famous musicians formed to raise funds or awareness A charity supergroup is
    a music group comprising famous musicians or other celebrities which is formed to raise funds or awareness for charities
    or causes. The supergroup is usually together only for a single album, performance, or single. The concept dates back
    to at least 1971 when George Harrison and Ravi Shankar organized The Concert for Bangladesh, and a subsequent album and
    film, to support UNICEF relief efforts in that country. In the 1980s forming a one-off supergroup to record a charity
    single became a popular way of promoting a current cause, following Band Aid''s "Do They Know Its Christmas?" and USA
    for Africa''s "We Are the World" which were recorded to support famine relief in Ethiopia in 1984 and 1985 respectively.
    {''note'': ''infobox not present in Wikipedia''} {''subclass of'': ''musical group'', ''instance of'': ''type of musical
    group''}'
