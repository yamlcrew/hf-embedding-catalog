  - 'shuizhu Chinese dish Shuizhu (Chinese: 水煮; pinyin: shuǐzhǔ, [ʂwěɪ ʈʂù ɻôʊ pʰjɛ̂n]) is a Chinese dish which originated
    from the cuisine of Sichuan province; its name literally means "water boiled (meat)". The dish consists of meat, chili
    pepper, and much vegetable oil. The meat is prepared with water, starch, and a slight amount of salt. Boiled vegetables
    are placed at the bottom of the serving bowl or dish. The prepared raw meat is poached in water that is heated to boiling
    point for 20–30 seconds, just enough to remove rawness yet preserving the meat''s tenderness. Then it is drained and put
    in the serving dish with vegetables. Minced dried chili, sichuan pepper, minced garlic, and other seasoning are spread
    over the meat. Vegetable oil is heated in a pan nearly to smoking point, then poured over the prepared meat and vegetable.
    This dish maintains tenderness of the meat by poaching it instead of stir frying. It offers a good combination of tender
    meat, freshness of vegetable, hot spicy flavor of chili pepper, and numbing sensation of Sichuan pepper. {''title'': ''Shuizhu'',
    ''label1'': ''Chinese'', ''data1'': ''水煮'', ''label2'': ''Cuisine'', ''data2'': ''Sichuan cuisine''} {''instance of'':
    ''dish'', ''subclass of'': ''dish'', ''course'': ''main course'', ''has part(s)'': ''meat'', ''country of origin'': ''Mexico'',
    ''made from material'': ''garlic''}'
- source_sentence: 'jewelry creation of objects of personal adornment, which may fulfill both decorative and functional purposes
    Jewellery (or jewelry in American English) consists of decorative items worn for personal adornment such as brooches,
    rings, necklaces, earrings, pendants, bracelets, and cufflinks. Jewellery may be attached to the body or the clothes.
    From a western perspective, the term is restricted to durable ornaments, excluding flowers for example. For many centuries
    metal such as gold often combined with gemstones, has been the normal material for jewellery, but other materials such
    as glass, shells and other plant materials may be used. Jewellery is one of the oldest types of archaeological artefact
    – with 100,000-year-old beads made from Nassarius shells thought to be the oldest known jewellery. The basic forms of
    jewellery vary between cultures but are often extremely long-lived; in European cultures the most common forms of jewellery
    listed above have persisted since ancient times, while other forms such as adornments for the nose or ankle, important
    in other cultures, are much less common. Jewellery may be made from a wide range of materials. Gemstones and similar materials
    such as amber and coral, precious metals, beads, and shells have been widely used, and enamel has often been important.
    In most cultures jewellery can be understood as a status symbol, for its material properties, its patterns, or for meaningful
    symbols. Jewellery has been made to adorn nearly every body part, from hairpins to toe rings, and even genital jewellery.
    In modern European culture the amount worn by adult males is relatively low compared with other cultures and other periods
    in European culture. {''aliases'': [''jewellery'', ''jewelry art'', ''jewellery making'', ''jewelry making'']} {''subclass
    of'': ''visual arts'', ''described by source'': ''Small Brockhaus and Efron Encyclopedic Dictionary'', ''instance of'':
    ''type of arts'', ''on focus list of Wikimedia project'': ''Wikipedia:Vital articles/Level/4''}'
  sentences:
  - 'atrocity any of the three legally defined international crimes of genocide, war crimes, and crimes against humanity An
    atrocity crime is a violation of international criminal law that falls under the historically three legally defined international
    crimes of genocide, war crimes, and crimes against humanity. Ethnic cleansing is widely regarded as a fourth mass atrocity
    crime by legal scholars and international non-governmental organizations (NGOs) working in the field, despite not yet
    being recognized as an independent crime under international law. Crimes of aggression are considered by some to be mass
    atrocity crimes and they are included in the jurisdiction of the International Criminal Court. However, most legal scholars
    do not consider them to be mass atrocity crimes. While it is certainly a grave violation of international law and frequently
    the context in which mass atrocity crimes are committed, the crime of aggression is distinguishable because it is an attack
    on the territory, sovereignty, or political independence of a state rather than on individuals. The primary international
    laws defining mass atrocity crimes are the 1948 Convention on the Prevention and Punishment of the Crime of Genocide,
    the 1949 Geneva Conventions and their 1977 Additional Protocols, and the 1998 Rome Statute of the International Criminal
    Court. The jurisprudence of the International Criminal Court, ad hoc international criminal tribunals, and the International
    Court of Justice further define and enforce these laws. {''aliases'': [''mass atrocity crimes'']} {''subclass of'': ''law'',
    ''instance of'': ''area of law'', ''described by source'': ''Encyclopædia Britannica 11th edition'', ''on focus list of
    Wikimedia project'': ''WikiProject Human Rights''}'
  - 'local government lowest tier of administration within a sovereign state Local government is a generic term for the lowest
    tiers of governance or public administration within a particular sovereign state. Local governments typically constitute
    a subdivision of a higher-level political or administrative unit, such as a nation or state. Local governments generally
    act within the powers and functions assigned to them by law or directives of a higher level of government. In federal
    states, local government generally comprises a third or fourth level of government, whereas in unitary states, local government
    usually occupies the second or third level of government. The institutions of local government vary greatly between countries,
    and even where similar arrangements exist, country-specific terminology often varies. Common designated names for different
    types of local government entities include counties, districts, cities, townships, towns, boroughs, parishes, municipalities,
    municipal corporations, shires, villages, and local government areas. The same term may be used in different countries
    to refer to local governance institutions with vastly different institutional features, powers, or functions. In addition
    to general-purpose local governments, some countries have special-purpose local governments (special districts), such
    as independent school districts, elected water boards, or local service districts. Although there is no single, commonly
    accepted definition of the term, the most precise definition of local governments is provided by the International Monetary
    Fund (IMF), which divides the general government sector into three sub-sectors (central, state, and local government)
    and defines local governments as "institutional units whose fiscal, legislative, and executive authority extends over
    the smallest geographical areas distinguished for administrative and political purposes." The IMF further notes that local
    governments "typically provide a wide range of services to local residents," while "the scope of their authority is generally
    much less than that of central government or state governments, and they may or may not be entitled to levy taxes." They
    are often heavily dependent on grants (transfers) from higher levels of government, and they may also act, to some extent,
    as agents of central or regional governments. They should also be able to appoint their own officers, independently of
    external administrative control. Even when local governments act as agents of central or state governments to some extent,
    they can be treated as a separate level of government, provided they are also able to raise and spend some funds on their
    own initiative and own responsibility." Other definitions for local governments are less prescriptive and emphasize the
    political or representative nature of local governments. For instance, OECD defines local governments as "decentralized
    entities whose governance bodies are elected through universal suffrage and which has general responsibilities and some
    autonomy with respect to budget, staff and assets." The Local Public Sector Alliance defines local government institutions
    as "a corporate body (or institutional unit) that performs one or more public sector functions within a [local] jurisdiction
    that has adequate political, administrative, and fiscal autonomy and authority to respond to the needs and priorities
    of its constituents". Questions regarding the empowerment of local government institutions, the structure and nature of
    local political leadership, and the extent of local self-governance and municipal autonomy are key questions of public
    administration and governance. Local elections are held in many countries. {''aliases'': [''regional government'', ''local
    municipality'']} {''subclass of'': ''government'', ''instance of'': ''form of government''}'
