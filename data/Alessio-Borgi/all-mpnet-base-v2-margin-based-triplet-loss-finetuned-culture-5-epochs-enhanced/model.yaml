    - 'CoMix Wave Films Japanese animation studio CoMix Wave Films, Inc. (Japanese: 株式会社コミックス・ウェーブ・フィルム, Hepburn: Kabushiki-gaisha
      Komikkusu Uēbu Firumu) is a Japanese animation film studio and distribution company based in Chiyoda, Tokyo, Japan.
