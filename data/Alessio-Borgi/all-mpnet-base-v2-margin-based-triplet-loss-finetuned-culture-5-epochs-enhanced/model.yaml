  - 'Jugo species of plant Juglans regia, known by various common names including the common walnut, English walnut, or Persian
    walnut amongst other names, is a species of walnut. It is native to Eurasia in at least southwest and central Asia and
    southeast Europe, but its exact natural area is obscure due to its long history of cultivation. The species has numerous
    cultivars which produce the edible walnut consumed around the world and produced predominately in China. It is widely
    cultivated across temperate regions throughout the world including those of Eurasia, Australia, and the Americas. {''image_caption'':
