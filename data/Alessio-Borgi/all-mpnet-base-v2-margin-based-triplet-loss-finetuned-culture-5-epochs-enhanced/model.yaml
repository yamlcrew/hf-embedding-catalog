      supply a suitable, single citation for synonym lists|date|=|November 2018}}'', ''synonyms'': "''''J. duclouxiana''''
      <small>Dode</small><br />''''J. fallax'''' <small>Dode</small><br />''''J. kamaonica'''' <small>(C. de Candolle) Dode</small><br
      />''''J. orientis'''' <small>Dode</small><br />''''J. regia'''' subsp. ''''fallax'''' <small>(Dode) Popov</small><br
      />''''J. regia'''' subsp. ''''kamaonica'''' <small>(C. de Candolle) Mansf.</small><br />''''J. regia'''' subsp. ''''turcomanica''''
      <small>Popov</small><br />''''J. regia'''' var. ''''orientis'''' <small>(Dode) Kitam.</small><br />''''J. regia''''
