  - 'CoMix Wave Films Japanese animation studio CoMix Wave Films, Inc. (Japanese: 株式会社コミックス・ウェーブ・フィルム, Hepburn: Kabushiki-gaisha
    Komikkusu Uēbu Firumu) is a Japanese animation film studio and distribution company based in Chiyoda, Tokyo, Japan. The
    studio is known for its anime feature films, short films, and television commercials, particularly those made by director
    Makoto Shinkai. It was founded in March 2007 when it split from CoMix Wave Inc., which was initially formed in 1998 from
