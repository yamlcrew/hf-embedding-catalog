- source_sentence: 'New South Wales Premier''s Literary Awards Literary prizes awarded by the New South Wales state government
    in Australia The New South Wales Premier''s Literary Awards, also known as the NSW Premier''s Literary Awards, were first
    awarded in 1979. They are among the richest literary awards in Australia. Notable prizes include the Christina Stead Prize
    for Fiction, the Kenneth Slessor Prize for Poetry, and the Douglas Stewart Prize for Non-Fiction. As of 2019, the Awards
    are presented by the NSW Government and administered by the State Library of New South Wales in association with Create
    NSW, with support of Multicultural NSW and the University of Technology Sydney (UTS). Total prize money in 2019 was up
    to A$305,000, with eligibility limited to writers, translators and illustrators with Australian citizenship or permanent
    resident status. {''aliases'': ["New South Wales Premier''s Literary Awards"]} {''instance of'': ''literary award'', ''subclass
    of'': ''literary award'', ''country'': ''Germany'', ''described by source'': ''Dutch Heights''}'
