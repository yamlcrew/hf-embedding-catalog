  sentences:
  - 'Thunnus genus of fishes Thunnus is a genus of ocean-dwelling, ray-finned bony fish from the mackerel family, Scombridae.
    More specifically, Thunnus is one of five genera which make up the tribe Thunnini – a tribe that is collectively known
    as the tunas. Also called the true tunas or real tunas, Thunnus consists of eight species of tuna (more than half of the
    overall tribe), divided into two subgenera. Their coloring, metallic blue on top and shimmering silver-white on the bottom,
    helps camouflage them from above and below. Atlantic bluefin tuna, the largest member of this genus, can grow to 15 feet
    (4.6 m) long and weigh up to 1,500 pounds (680 kg). All tunas are extremely strong, muscular swimmers, and the yellowfin
    tuna is known to reach speeds of up to 50 miles per hour (80 km/h) when pursuing prey. As with all tunas, members of this
    genus are warm-blooded, which is a rare trait among fish; this enables them to tolerate cold waters and to dive to deeper
    depths. Bluefin tunas, for example, are found in Newfoundland and Iceland, and also in the tropical waters of the Gulf
    of Mexico and the Mediterranean Sea, where some individuals go each year to spawn. Due to overfishing, the range of this
    genus has declined significantly, having been effectively extirpated from the Black Sea, for example. {''name'': ''True
    tunas'', ''fossil_range'': ''{{Fossilrange|Tertiary|holocene}}'', ''image_caption'': ''Yellowfin tuna'', ''taxon'': ''Thunnus'',
    ''authority'': ''South, 1845'', ''type_species'': "''''Scomber thynnus''''", ''type_species_authority'': ''Linnaeus, 1758'',
    ''subdivision_ranks'': ''Subgenus'', ''subdivision'': "* ''''T. (Thunnus)'''' (bluefin group)\n* ''''T. (Neothunnus)''''
    (yellowfin group)", ''synonyms'': "*''''Albacora'''' <small>Jordan, 1888</small>\n*''''Germo'''' <small>Jordan, 1888</small>\n*''''Thynnus''''
    <small>Aguilera, 2020</small>\n*''''Kishinoella'''' <small>Jordan & Hubbs, 1925</small>\n*''''Neothunnus'''' <small>Kishinouye,
    1923</small>\n*''''Orcynus'''' <small>Cuvier, 1816</small>\n*''''Parathunnus'''' <small>Kishinouye, 1923</small>\n*''''Semathunnus''''
    <small>Fowler, 1933</small>", ''aliases'': [''tuna'', ''tunafish'', ''tuna fish'', ''tunas'', ''tuna fishes'', ''tunafishes'',
    ''tunny'', ''tunnies'']} {''subclass of'': ''fish'', ''instance of'': ''taxon'', ''taxon rank'': ''species'', ''described
