- source_sentence: 'square open public spaces in cities or towns, usually rectilinear, surrounded by buildings, and often
    located at the junction of two or more thoroughfares A town square (or public square, urban square, or simply square),
    also called a plaza or piazza, is an open public space commonly found in the heart of a traditional town, and which is
    used for community gatherings. A square in a city may be called a city square. Related concepts are the civic center,
    the market square and the village green. Most squares are hardscapes suitable for open markets, concerts, political rallies,
    and other events that require firm ground. They are not necessarily a true geometric square. Being centrally located,
    town squares are usually surrounded by small shops such as bakeries, meat markets, cheese stores, and clothing stores.
    At their center is often a well, monument, statue or other feature. Those with fountains are sometimes called fountain
    squares. The term "town square" (especially via the term "public square") is synonymous with the politics of many cultures,
    and the names of a certain town squares, such as the Euromaidan or Red Square, have become symbolic of specific political
    events throughout history. {''aliases'': [''public square'', ''city square'', ''town square'', ''plaza'', ''piazza'',
    ''urban square'', ''maydon'', ''pedestrian plaza'']} {''subclass of'': ''geographic location'', ''on focus list of Wikimedia
    project'': ''Wikipedia:Vital articles/Level/4'', ''described by source'': ''Encyclopædia Britannica 11th edition'', ''instance
    of'': ''geographic location'', ''properties for this type'': ''located in the administrative territorial entity''}'
  sentences:
  - 'Campus of the University of Tokyo Japanese historical campus The campus of the University of Tokyo is the location of
    the first modern Japanese university. The campus is of historical note for two reasons. First, it was not damaged by air
    raids during World War II. Second, many university buildings have been declared National Treasures of Japan as they are
    examples of historic architectural design. This article focuses on registered cultural heritage. {''note'': ''infobox
    not present in Wikipedia''} {''instance of'': ''building'', ''subclass of'': ''building'', ''country'': ''Germany'', ''located
    in the administrative territorial entity'': ''Monmouth'', ''architectural style'': ''Art Nouveau architecture'', ''significant
    event'': ''construction (economic activity)''}'
  - 'Amoriguard type of paint Amoriguard is a water-based paint with fillers based on recycled industrial waste. The colour
    has an effective 70% mass of solids, which occupy a volume of at least 55% excluding water. It was invented in South Africa
    by Mulalo Doyoyo and co-developed by Ryan Purchase. Substances in the paint such as volatile organic compounds, ammonia,
    formaldehyde, lead, alkyl phenol ethoxylate and glycol are low in quantity or absent. It is manufactured below critical
    pigment volume concentration (CPVC) which means that most voids between pigment particles in the dried film are filled
    with solid particles as opposed to air. The paint is hydrophobic and chemical-resistant. == References == {''note'': ''infobox
    not present in Wikipedia''} {''subclass of'': ''building material'', ''instance of'': ''building material'', ''described
    by source'': ''Encyclopædia Britannica 11th edition'', ''on focus list of Wikimedia project'': ''Wikipedia:Vital articles/Level/4'',
    ''made from material'': ''concrete''}'
  - 'Atellan Farce genre of comedy from Latin theatre The Atellan Farce (Latin: Atellanae Fabulae or Fabulae Atellanae, "favola
    atellana"; Atellanicum exhodium, "Atella comedies"), also known as the Oscan Games (Latin: ludi Osci, "Oscan plays"),
    were masked improvised farces in Ancient Rome. The Oscan athletic games were very popular, and usually preceded by longer
    pantomime plays. The origin of the Atellan Farce is uncertain, but the farces are similar to other forms of ancient theatre
    such as the South Italian Phlyakes, the plays of Plautus and Terence, and Roman mime. Most historians believe the name
    is derived from Atella, an Oscan town in Campania. The farces were written in Oscan and imported to Rome in 391 BC. In
    later Roman versions, only the ridiculous characters speak their lines in Oscan, while the others speak in Latin. {''aliases'':
    [''ludi Osci'']} {''instance of'': ''theatrical genre'', ''country'': ''Indonesia'', ''subclass of'': ''theatre''}'
- source_sentence: 'Gone with the Wind 1939 film by Victor Fleming Gone with the Wind is a 1939 American epic historical romance
    film adapted from the 1936 novel by Margaret Mitchell. The film was produced by David O. Selznick of Selznick International
    Pictures and directed by Victor Fleming. Set in the American South against the backdrop of the American Civil War and
    the Reconstruction era, the film tells the story of Scarlett O''Hara (Vivien Leigh), the strong-willed daughter of a Georgia
    plantation owner, following her romantic pursuit of Ashley Wilkes (Leslie Howard), who is married to his cousin, Melanie
    Hamilton (Olivia de Havilland), and her subsequent marriage to Rhett Butler (Clark Gable). The film had a troubled production.
    The start of filming was delayed for two years until January 1939 because Selznick was determined to secure Gable for
    the role of Rhett, and filming concluded in July. The role of Scarlett was challenging to cast, and 1,400 unknown women
    were interviewed for the part. Sidney Howard''s original screenplay underwent many revisions by several writers to reduce
    it to a suitable length. The original director, George Cukor, was fired shortly after filming began and was replaced by
    Fleming, who in turn was briefly replaced by Sam Wood while taking some time off due to exhaustion. Post-production concluded
    in November 1939, just a month before its premiere. It received generally positive reviews upon its release on December
    15, 1939. While the casting was widely praised, the long running time received criticism. At the 12th Academy Awards,
    Gone with the Wind received ten Academy Awards (eight competitive, two honorary) from thirteen nominations, including
    wins for Best Picture, Best Director (Fleming), Best Adapted Screenplay (posthumously awarded to Sidney Howard), Best
    Actress (Leigh), and Best Supporting Actress (Hattie McDaniel, becoming the first African American to win an Academy Award).
    It set records for the total number of wins and nominations at the time. Gone with the Wind was immensely popular when
    first released. It became the highest-earning film made up to that point and held the record for over a quarter of a century.
    When adjusted for monetary inflation, it is still the highest-grossing film in history. It was re-released periodically
    throughout the 20th century and became ingrained in popular culture. Although the film has been criticized as historical
    negationism, glorifying slavery and the Lost Cause of the Confederacy myth, it has been credited with triggering changes
    in the way in which African Americans were depicted cinematically. Gone with the Wind is regarded as one of the greatest
    films of all time, and in 1989, became one of the twenty-five inaugural films selected for preservation in the United
    States National Film Registry. {''name'': ''Gone with the Wind'', ''alt'': ''A film poster showing a man and a woman in
    a passionate embrace.'', ''caption'': ''Theatrical release poster'', ''director'': ''Victor Fleming'', ''producer'': ''David
    O. Selznick'', ''screenplay'': ''Sidney Howard'', ''based_on'': "{{based on|''''Gone with the Wind''''|Margaret Mitchell}}",
    ''starring'': "{{plainlist|\n* Clark Gable\n* Vivien Leigh |<!-- Regardless of where Leigh''s name appears on the posters,
    she receives second billing in the film itself -->|\n* Leslie Howard\n* Olivia de Havilland\n|<!-- DO NOT ADD HATTIE McDANIEL
    TO THIS LIST. SHE WAS *NOT* STAR BILLED. This is not a matter of editorial discretion but of how the actors were credited.
    Only four actors received star billing: Gable, Leigh, Howard, and de Haviland. This is corroborated by the opening credits:
    https://www.youtube.com/watch?v=fFNuDkQxHGA&t=60. Regardless of whether we agree or not, it is not Wikipedia''s place
    to revise history. -->}} * Leslie Howard\n* Olivia de Havilland", ''music'': ''Max Steiner'', ''cinematography'': ''Ernest
    Haller'', ''editing'': ''{{plainlist|\n* Hal C. Kern\n* James E. Newcom}}'', ''production_companies'': ''{{Plainlist|\n*
    Selznick International Pictures\n* Metro-Goldwyn-Mayer}}'', ''distributor'': "Loew''s Inc. {{refn|Loews was the parent
    company of MGM.|ref|{{cite book |last1=Gomery |first1=Douglas |last2=Pafort-Overduin |first2=Clara |title=Movie History:
    A Survey |edition=2nd |year=2011 |publisher=Taylor & Francis |isbn=9781136835254 |page=[https://books.google.com/books?id=s0PP2Gm8xNcC&q=Loews+144&pg=PA144
    144]}}|</ref>|group|=|nb}}", ''released'': ''{{film date|1939|12|15|Atlanta premiere}}'', ''runtime'': "{{plainlist|\n*
    221&nbsp;minutes\n* 234–238&nbsp;minutes (with overture, intermission, entr''acte, and exit music)}}", ''country'': ''United
    States'', ''language'': ''English'', ''budget'': ''$3.85&nbsp;million'', ''gross'': ''>$390&nbsp;million'', ''aliases'':
    [''GWTW'']} {''instance of'': ''film'', ''color'': ''color'', ''distribution format'': ''video on demand'', ''CNC film
    rating (France)'': ''no age restriction'', ''original language of film or TV show'': ''English'', ''FSK film rating'':
