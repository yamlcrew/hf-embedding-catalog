      Affairs, Senior Citizens, Women and Youth'', ''country'': ''Germany'', ''year'': ''1956'', ''year2'': ''2017'', ''website'':
      ''[http://www.djlp.jugendliteratur.org/ djlp.jugendliteratur.org]'', ''aliases'': [''German Youth Literature Award'']}
      {''instance of'': ''literary award'', ''subclass of'': ''literary award'', ''country'': ''Germany'', ''described by
      source'': ''Dutch Heights''}'
  - source_sentence: 'New South Wales Premier''s Literary Awards Literary prizes awarded by the New South Wales state government
      in Australia The New South Wales Premier''s Literary Awards, also known as the NSW Premier''s Literary Awards, were
      first awarded in 1979. They are among the richest literary awards in Australia. Notable prizes include the Christina
      Stead Prize for Fiction, the Kenneth Slessor Prize for Poetry, and the Douglas Stewart Prize for Non-Fiction. As of
      2019, the Awards are presented by the NSW Government and administered by the State Library of New South Wales in association
      with Create NSW, with support of Multicultural NSW and the University of Technology Sydney (UTS). Total prize money
      in 2019 was up to A$305,000, with eligibility limited to writers, translators and illustrators with Australian citizenship
      or permanent resident status. {''aliases'': ["New South Wales Premier''s Literary Awards"]} {''instance of'': ''literary
      award'', ''subclass of'': ''literary award'', ''country'': ''Germany'', ''described by source'': ''Dutch Heights''}'
    sentences:
    - 'Russia: War, Peace and Diplomacy 2005 essay collection book Russia: War, Peace and Diplomacy is a 2005 book edited
      by Mark Erickson and Ljubica Erickson. The book is a collection of essays from a number of renowned historians including
      Omer Bartov, Jürgen Förster, David Glantz, Antony Beevor, Norman Stone, Hew Strachan and Robert Service. The book was
      written in honour of historian John Erickson and also includes essays from his colleagues in the United Kingdom, United
      States and Russia. The foreword was written by Sir Michael Howard. {''name'': ''Russia: War, Peace and Diplomacy'',
      ''published'': ''2005 (Weidenfeld & Nicolson)'', ''isbn'': ''9780297849131'', ''editors'': ''Mark Eerickson and Ljubica
