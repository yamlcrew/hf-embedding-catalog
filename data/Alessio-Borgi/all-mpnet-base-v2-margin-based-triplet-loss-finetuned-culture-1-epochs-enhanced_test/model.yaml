- source_sentence: 'comics creative work in which images and text convey information such as narratives Comics is a medium
    used to express ideas with images, often combined with text or other visual information. It typically takes the form of
    a sequence of panels of images. Textual devices such as speech balloons, captions, and onomatopoeia can indicate dialogue,
    narration, sound effects, or other information. There is no consensus among theorists and historians on a definition of
    comics; some emphasize the combination of images and text, some sequentiality or other image relations, and others historical
    aspects such as mass reproduction or the use of recurring characters. Cartooning and other forms of illustration are the
    most common means of image-making in comics. Photo comics is a form that uses photographic images. Common forms include
    comic strips, editorial and gag cartoons, and comic books. Since the late 20th century, bound volumes such as graphic
    novels, comic albums, and tankōbon have become increasingly common, along with webcomics as well as scientific/medical
    comics. The history of comics has followed different paths in different cultures. Scholars have posited a pre-history
    as far back as the Lascaux cave paintings. By the mid-20th century, comics flourished, particularly in the United States,
    western Europe (especially France and Belgium), and Japan. The history of European comics is often traced to Rodolphe
    Töpffer''s cartoon strips of the 1830s, while Wilhelm Busch and his Max and Moritz also had a global impact from 1865
    on, and became popular following the success in the 1930s of strips and books such as The Adventures of Tintin. American
    comics emerged as a mass medium in the early 20th century with the advent of newspaper comic strips; magazine-style comic
    books followed in the 1930s, and the superhero genre became prominent after Superman appeared in 1938. Histories of Japanese
    comics and cartooning (manga) propose origins as early as the 12th century. Japanese comics are generally held separate
    from the evolution of Euro-American comics, and Western comic art probably originated in 17th-century Italy. Modern Japanese
    comic strips emerged in the early 20th century, and the output of comic magazines and books rapidly expanded in the post-World
    War II era (1945)– with the popularity of cartoonists such as Osamu Tezuka. Comics has had a lowbrow reputation for much
    of their history, but towards the end of the 20th century, they began to find greater acceptance with the public and academics.
    The English term comics is used as a singular noun when it refers to the medium itself (e.g. "Comics is a visual art form."),
    but becomes plural when referring to works collectively (e.g. "Comics are popular reading material."). The comics may
    be further adapted to animations (anime), dramas, TV shows, movies. {''source'': ''R. C. Harvey, 2001 {{sfn|Harvey|2001|p|=|76}}'',
    ''width'': ''30em'', ''aliases'': [''sequential art'', ''ninth art'', ''comic work'']} {''instance of'': ''literary genre'',
    ''subclass of'': ''literary work'', ''described by source'': ''Encyclopædia Britannica 11th edition'', ''different from'':
    ''Synopsis''}'
  sentences:
  - 'Ediacaran biota enigmatic tubular and frond-shaped, mostly sessile organisms that lived during the Ediacaran Period (ca.
    635–542 Mya) The Ediacaran (; formerly Vendian) biota is a taxonomic period classification that consists of all life forms
    that were present on Earth during the Ediacaran Period (c. 635–538.8 Mya). These were enigmatic tubular and frond-shaped,
    mostly sessile, organisms. Trace fossils of these organisms have been found worldwide, and represent the earliest known
    complex multicellular organisms. The term "Ediacara biota" has received criticism from some scientists due to its alleged
    inconsistency, arbitrary exclusion of certain fossils, and inability to be precisely defined. The Ediacaran biota may
    have undergone evolutionary radiation in a proposed event called the Avalon explosion, 575 million years ago. This was
    after the Earth had thawed from the Cryogenian period''s extensive glaciation. This biota largely disappeared with the
    rapid increase in biodiversity known as the Cambrian explosion. Most of the currently existing body plans of animals first
    appeared in the fossil record of the Cambrian rather than the Ediacaran. For macroorganisms, the Cambrian biota appears
    to have almost completely replaced the organisms that dominated the Ediacaran fossil record, although relationships are
    still a matter of debate. The organisms of the Ediacaran Period first appeared around 600 million years ago and flourished
    until the cusp of the Cambrian 538.8 million years ago, when the characteristic communities of fossils vanished. A diverse
    Ediacaran community was discovered in 1995 in Sonora, Mexico, and is approximately 555 million years in age, roughly coeval
    with Ediacaran fossils of the Ediacara Hills in South Australia and the White Sea on the coast of Russia. While rare fossils
    that may represent survivors have been found as late as the Middle Cambrian (510–500 Mya), the earlier fossil communities
    disappear from the record at the end of the Ediacaran leaving only curious fragments of once-thriving ecosystems. Multiple
    hypotheses exist to explain the disappearance of this biota, including preservation bias, a changing environment, the
    advent of predators and competition from other life-forms. A sampling, reported in 2018, of late Ediacaran strata across
    the scattered remnants of Baltica (< 560 Mya) suggests the flourishing of the organisms coincided with conditions of low
    overall productivity with a very high percentage produced by bacteria, which may have led to high concentrations of dissolved
    organic material in the oceans. Determining where Ediacaran organisms fit in the tree of life has proven challenging;
    it is not even established that most of them were animals, with suggestions that they were lichens (fungus-alga symbionts),
    algae, protists known as foraminifera, fungi or microbial colonies, or hypothetical intermediates between plants and animals.
    The morphology and habit of some taxa (e.g. Funisia dorothea) suggest relationships to Porifera or Cnidaria (e.g. Auroralumina).
    Kimberella may show a similarity to molluscs, and other organisms have been thought to possess bilateral symmetry, although
    this is controversial. Most macroscopic fossils are morphologically distinct from later life-forms: they resemble discs,
    tubes, mud-filled bags or quilted mattresses. Due to the difficulty of deducing evolutionary relationships among these
    organisms, some palaeontologists have suggested that these represent completely extinct lineages that do not resemble
    any living organism. Palaeontologist Adolf Seilacher proposed a separate subkingdom level category Vendozoa (now renamed
    Vendobionta) in the Linnaean hierarchy for the Ediacaran biota. If these enigmatic organisms left no descendants, their
    strange forms might be seen as a "failed experiment" in multicellular life, with later multicellular life evolving independently
    from unrelated single-celled organisms. A 2018 study confirmed that one of the period''s most-prominent and iconic fossils,
    Dickinsonia, included cholesterol, suggesting affinities to animals, fungi, or red algae. {''aliases'': [''Ediacara biota'',
    ''Vendozoa'']} {''subclass of'': ''animal'', ''described by source'': ''Brockhaus and Efron Encyclopedic Dictionary'',
    ''instance of'': ''taxon'', ''on focus list of Wikimedia project'': ''Wikipedia:Vital articles/Level/4'', ''taxon rank'':
    ''genus'', ''CITES Appendix'': ''Appendix II of CITES''}'
  - 'political philosophy sub-discipline of philosophy and political science Political philosophy, or political theory, is
    the philosophical study of government, addressing questions about the nature, scope, and legitimacy of public agents and
    institutions and the relationships between them. Its topics include politics, justice, liberty, property, rights, law,
    and authority: what they are, if they are needed, what makes a government legitimate, what rights and freedoms it should
    protect, what form it should take, what the law is, and what duties citizens owe to a legitimate government, if any, and
    when it may be legitimately overthrown, if ever. Political theory also engages questions of a broader scope, tackling
    the political nature of phenomena and categories such as identity, culture, sexuality, race, wealth, human-nonhuman relations,
    ethics, religion, and more. Political philosophy is a branch of philosophy, but it has also played a major part in political
    science, within which a strong focus has historically been placed on both the history of political thought and contemporary
    political theory (from normative political theory to various critical approaches). {''boxes'': "{''Library resources box'':
    []}", ''count'': ''1'', ''aliases'': [''political thought'', ''philosophy of politics'']} {''subclass of'': ''philosophy'',
    ''instance of'': ''branch of philosophy'', ''on focus list of Wikimedia project'': ''Wikipedia:Vital articles/Level/4'',
    ''described by source'': ''Brockhaus and Efron Encyclopedic Dictionary''}'
  - 'São Paulo most populous city in Brazil São Paulo (; Portuguese: [sɐ̃w ˈpawlu] ; Portuguese for ''Saint Paul'') is the
    capital of the state of São Paulo, as well as the most populous city in Brazil, the Americas, and both the Western and
    Southern Hemispheres. Listed by the Globalization and World Cities Research Network (GaWC) as an alpha global city, it
    exerts substantial international influence in commerce, finance, arts, and entertainment. It is the largest urban area
    by population outside Asia and the most populous Portuguese-speaking city in the world. The city''s name honors Paul the
    Apostle and people from the city are known as paulistanos. The city''s Latin motto is Non ducor, duco, which translates
    as "I am not led, I lead." Founded in 1554 by Jesuit priests, the city was the center of the bandeirantes settlers during
    Colonial Brazil, but it became a relevant economic force only during the Brazilian coffee cycle in the mid-19th century
    and later consolidated its role as the main national economic hub with industrialization in Brazil in the 20th century,
    which made the city a cosmopolitan melting pot, home to the largest Arab, Italian, and Japanese diasporas in the world,
    with ethnic neighborhoods like Bixiga, Bom Retiro, and Liberdade, and people from more than 200 other countries. The city''s
    metropolitan area, Greater São Paulo, is home to more than 20 million inhabitants and ranks as the most populous in Brazil
    and one of the most populous in the world. The process of conurbation between the metropolitan areas around Greater São
    Paulo also created the São Paulo Macrometropolis, the first megalopolis in the Southern Hemisphere, with more than 30
    million inhabitants. São Paulo is the largest urban economy in Latin America and one of the world''s major financial centres,
    representing around 10% of the Brazilian GDP and just over a third of São Paulo state''s GDP. The city is the headquarters
    of B3, the largest stock exchange of Latin America by market capitalization, and has several financial districts, mainly
    in the areas around Paulista, Faria Lima and Berrini avenues. São Paulo is home to 63% of established multinationals in
    Brazil, and is the source of around one third of the Brazilian scientific production. Its main university, the University
    of São Paulo, is often considered the best in Brazil and Latin America. São Paulo is among the top 100 science and technology
    clusters in the world. The metropolis is also home to several of the tallest skyscrapers in Brazil, including the Alto
    das Nações, Platina 220, Figueira Altos do Tatuapé, Mirante do Vale, Edifício Itália, Altino Arantes Building, North Tower
    and many others. The city is one of the main cultural hubs in Latin America and it is home to monuments, parks and museums
    such as the Latin American Memorial, Ibirapuera Park, São Paulo Museum of Art, Pinacoteca, Cinemateca, Itaú Cultural,
    Museum of Ipiranga, Catavento Museum, Football Museum, Museum of the Portuguese Language, and the Museum of Image and
    Sound. São Paulo also holds relevant cultural events like the São Paulo Jazz Festival, São Paulo Art Biennial, São Paulo
    Fashion Week, Lollapalooza, Primavera Sound, Comic Con Experience and the São Paulo Gay Pride Parade, the second-largest
    LGBT event in the world. São Paulo was also host of many sporting events such as the 1950 and 2014 FIFA World Cups, the
    1963 Pan American Games, the São Paulo Indy 300 and the NFL Brazil Games in addition to hosting the annual Brazilian Grand
    Prix of Formula One and the Saint Silvester Road Race. {''name'': ''São Paulo'', ''official_name'': "Municipality of São
    Paulo<br/>''''Município de São Paulo''''", ''settlement_type'': ''Municipality'', ''named_for'': ''Paul the Apostle'',
