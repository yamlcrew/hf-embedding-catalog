      that supported the Lincoln Administration during the American Civil War. It held the 1864 National Union Convention
      that nominated Abraham Lincoln for president and Andrew Johnson for vice president in the 1864 United States presidential
      election. Following Lincoln''s successful re-election and assassination, Johnson tried and failed to sustain the Union
      Party as a vehicle for his presidential ambitions. The coalition did not contest the 1868 elections, but the Republican
      Party continued to use the "Union Republican" label throughout the period of Reconstruction. Abraham Lincoln won the
      1860 United States presidential election, receiving 180 electoral votes and 53% of the popular vote in the free states;
      opposition to Lincoln was divided, with most northern Democrats voting for Illinois Senator Stephen Douglas. Following
      the Republican victory, Douglas strongly condemned secession and publicly supported the federal government''s efforts
      to preserve the Union. Pro-administration War Democrats in states like Ohio sought to cooperate with Republicans through
      the formation of Union parties in opposition to the anti-administration Peace faction. Elsewhere, the Union Party appeared
      as a coalition of conservative Republicans and Democrats opposed by the Radical Republicans. Besides allowing voters
      of diverse pre-war partisan allegiances to unite under a common banner, the Union label served a valuable propaganda
      purpose by implying the coalition''s opponents were dis-unionists. The preeminent policy of the National Union Party
      was the preservation of the Union by the prosecution of the war to its ultimate conclusion. They rejected proposals
