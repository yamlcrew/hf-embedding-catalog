  sentences:
  - 'Shibuya Goldfish Japanese manga series Shibuya Goldfish (Japanese: 渋谷金魚, Hepburn: Shibuya Kingyo) is a Japanese manga
    series written and illustrated by Hiroumi Aoi. It was serialized in Square Enix''s Gangan Joker from September 2016 to
    April 2021 and published in 11 volumes. {''ja_kanji'': ''渋谷金魚'', ''caption'': ''Cover of the first volume'', ''genre'':
