    - 'skald poet in the courts of Scandinavian rulers during the Viking Age A skald, or skáld (Old Norse: [ˈskɔːld]; Icelandic:
      [ˈskault], meaning "poet"), is one of the often named poets who composed skaldic poetry, one of the two kinds of Old
      Norse poetry in alliterative verse, the other being Eddic poetry. Skaldic poems were traditionally composed to honor
      kings, but were sometimes ex tempore. They include both extended works and single verses (lausavísur). They are characteristically
      more ornate in form and diction than eddic poems, employing many kennings, which require some knowledge of Norse mythology,
      and heiti, which are formal nouns used in place of more prosaic synonyms. Dróttkvætt metre is a type of skaldic verse
      form that most often use internal rhyme and alliteration. More than 5,500 skaldic verses have survived, preserved in
      more than 700 manuscripts, including in several sagas and in Snorri Sturluson''s Prose Edda, a handbook of skaldic composition
      that led to a revival of the art. Many of these verses are fragments of originally longer works, and the authorship
      of many is unknown. The earliest known skald from whom verses survive is Bragi Boddason, known as Bragi the Old, a Norwegian
      skald of the first half of the 9th century. Most known skalds were attached to the courts of Norwegian kings during
      the Viking Age, and increasingly were Icelanders. The subject matter of their extended poems was sometimes mythical
      before the conversion to Christianity, thereafter usually historical and encomiastic, detailing the deeds of the skald''s
      patron. The tradition continued into the Late Middle Ages. The standard edition of the skaldic poetic corpus, Den norsk-islandske
      skjaldedigtning, was edited by Finnur Jónsson and published in 1908–1915. A new edition was prepared online by the Skaldic
      Poetry of the Scandinavian Middle Ages project and began publication in 2007. {''note'': ''infobox not present in Wikipedia''}
      {''instance of'': ''human'', ''occupation'': ''poet'', ''sex or gender'': ''male'', ''copyright status as a creator'':
      ''copyrights on works have expired'', ''described by source'': ''Brockhaus and Efron Encyclopedic Dictionary'', ''subclass
      of'': ''poet'', ''country of citizenship'': ''France''}'
    - 'Deutscher Jugendliteraturpreis German literary award for children''s and young adult literature (1956-) The Deutscher
      Jugendliteraturpreis (German Youth Literature Award) is an annual award established in 1956 by the Federal Ministry
      of Family Affairs, Senior Citizens, Women and Youth to recognise outstanding works of children''s and young adult literature.
      It is Germany''s only state-funded literary award. In the past, authors from many countries have been recognised, including
      non-German speakers. {''name'': ''Deutscher Jugendliteraturpreis'', ''caption'': ''The bronze statuette "Momo" (named
      after the Michael Ende book of the same name) given to the winners of the "Deutscher Jugendliteraturpreis", created
