  - source_sentence: 'Gomal River river in Afghanistan and Pakistan The Gomal (Urdu: دریائے گومل, Pashto: ګومل سیند، ګومل
      دریاب) is a 400-kilometre-long (250 mi) river in Afghanistan and Pakistan. It rises in northern Afghanistan''s Paktika
      Province and joins the Indus River 20 miles south of Dera Ismail Khan, in Pakistan''s Khyber Pakhtunkhwa province. Gomal
      University in Dera Ismail Khan and Gomal District in Afghanistan''s Paktika province are named after the river. {''name'':
      ''Gomal'', ''map'': ''{{maplink|frame|=|yes|frame-align|=|left|type|=|line|id|=|Q8501|text|=|Interactive Map}}'', ''map_size'':
