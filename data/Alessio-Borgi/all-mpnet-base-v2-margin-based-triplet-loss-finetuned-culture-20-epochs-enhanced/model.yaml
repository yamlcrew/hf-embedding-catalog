    sentences:
    - 'Eddie Murphy American actor and comedian Edward Regan Murphy (born April 3, 1961) is an American actor, comedian, and
      singer. He had his breakthrough as a standup comic before gaining stardom for his film roles; he is widely recognized
      as one of the greatest comedians of all time. He has received several accolades including a Golden Globe Award, a Grammy
      Award, and an Emmy Award as well as nominations for an Academy Award and a BAFTA Award. He was honored with the Mark
      Twain Prize for American Humor in 2015 and the Cecil B. DeMille Award in 2023. Murphy shot to fame on the sketch comedy
      show Saturday Night Live, for which he was a regular cast member from 1980 to 1984 and broke out as a movie star in
      the 1980s films 48 Hrs., Trading Places, and Beverly Hills Cop. He then established himself as a leading man with starring
      roles in: The Golden Child (1986), Coming to America (1988), Harlem Nights (which he also directed) (1989), Boomerang
      (1992), The Nutty Professor (1996), Dr. Dolittle (1997), Bowfinger (1999), Daddy Day Care (2003), and Norbit (2007).
      Murphy both won the Golden Globe for Best Supporting Actor and received a nomination for the Academy Award for Best
      Supporting Actor for his role in Dreamgirls (2006). Murphy has worked as a voice actor, including Mushu in Disney''s
      Mulan (1998), Thurgood Stubbs in the sitcom The PJs (1999–2001), and Donkey in the Shrek franchise (2001–present), the
      latter of which earned him a BAFTA Award for Best Actor in a Supporting Role nomination. Murphy often takes on multiple
      roles in a single film, such as in Coming to America, Vampire in Brooklyn, the Nutty Professor films, Bowfinger, The
      Adventures of Pluto Nash and Norbit. This is intended as Murphy''s tribute to one of his idols, Peter Sellers. Following
      a string of poorly received films, he had a career resurgence with leading roles in films such as Dolemite Is My Name
      (2019), Coming 2 America (2021), You People, Candy Cane Lane (both 2023) and Beverly Hills Cop: Axel F (2024). In 2020,
      he won his first Primetime Emmy Award for Outstanding Guest Actor in a Comedy Series for hosting Saturday Night Live.
      Murphy''s films have grossed over $3.8 billion ($6.5 billion adjusted for inflation) in the United States and Canada
      box office, and over $6.7 billion worldwide. In 2015, his films made him the sixth-highest grossing actor in the United
      States. As a singer, Murphy has released three studio albums, including How Could It Be (1985), So Happy (1989), and
