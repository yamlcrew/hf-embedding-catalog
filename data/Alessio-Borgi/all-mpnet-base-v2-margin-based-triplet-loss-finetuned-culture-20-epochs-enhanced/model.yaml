      the World Drivers'' Championship a combined eight times. Red Bull owns two teams in Formula One, Red Bull Racing and
      Racing Bulls. The Red Bull Junior Team was also the name of RSM Marko, a team that competed in International Formula
      3000 between 1999 and 2003, sponsored by Red Bull and run by Helmut Marko. The Red Bull Junior Team was formed in 2001
      as Red Bull''s European driver programme. Red Bull offers funding and support for the promising young drivers that are
      part of the programme. In 2004, Christian Klien became the first Red Bull Junior to race in Formula One, while in 2008,
