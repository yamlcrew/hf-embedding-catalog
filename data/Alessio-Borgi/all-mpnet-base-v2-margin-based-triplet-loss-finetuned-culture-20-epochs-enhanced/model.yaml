- source_sentence: 'Viktor Rumpelmayer Austro-Hungarian architect Viktor Rumpelmayer (7 November 1830 – 14 June 1885, in Vienna)
    was a 19th-century Austro-Hungarian architect, whose style was a combination of French and Italian influences and the
    Viennese trends characteristic for the period. He is regarded as one of the most eminent Central European architects of
    his time. Born in Preßburg, Hungary (Pozsony, today Bratislava, Slovakia), Rumpelmayer worked not only in his home country,
    but also in Bulgaria, where he designed and constructed the Neo-Baroque royal palace of Bulgaria (today the National Art
    Gallery) and Knyaz Alexander Battenberg''s summer palace Euxinograd, on the Black Sea coast. Among his other works are
    a number of palaces for well-known members of the nobility, the British embassy in Vienna with Christ Church, the German
    embassy in Vienna the Portuguese pavilion at the Paris Exposition Universelle (1900), among other prominent commissions
    Rumpelmayer also redesigned the Festetics Palace in Keszthely, Hungary. == References == {''note'': ''infobox not present
    in Wikipedia''} {''instance of'': ''human'', ''occupation'': ''architect'', ''sex or gender'': ''male'', ''languages spoken,
    written or signed'': ''German'', ''country of citizenship'': ''Germany'', ''copyright status as a creator'': ''copyrights
    on works have expired'', ''field of work'': ''architecture''}'
  sentences:
  - 'Red Bull Junior Team Red Bull''s GP2 series racing team The Red Bull Junior Team is a driver development programme operated
    by Austrian conglomerate company Red Bull GmbH to identify and develop talent in open-wheel racing. Members of the Junior
    Team are financed and sponsored by Red Bull in kart racing and junior formulae. The programs have been successful in bringing
    a selection of drivers into Formula One. Five graduates—Sebastian Vettel, Daniel Ricciardo, Max Verstappen, Pierre Gasly
    and Carlos Sainz Jr.—have won a Formula One Grand Prix, whilst Vettel and Verstappen have won the World Drivers'' Championship
    a combined eight times. Red Bull owns two teams in Formula One, Red Bull Racing and Racing Bulls. The Red Bull Junior
    Team was also the name of RSM Marko, a team that competed in International Formula 3000 between 1999 and 2003, sponsored
    by Red Bull and run by Helmut Marko. The Red Bull Junior Team was formed in 2001 as Red Bull''s European driver programme.
    Red Bull offers funding and support for the promising young drivers that are part of the programme. In 2004, Christian
    Klien became the first Red Bull Junior to race in Formula One, while in 2008, Sebastian Vettel became the first Red Bull
    Junior to win a Formula One Grand Prix, the Italian Grand Prix. Two years later, in 2010, Vettel became the first Red
    Bull Junior graduate to win the Formula One World Championship. The similar Red Bull Driver Search, now ended, was an
