- source_sentence: 'Internationale Maifestspiele Wiesbaden music festival The Internationale Maifestspiele Wiesbaden (International
    May Festival, IMF) is a theater festival in Wiesbaden, Germany. Established in the late 19th century after the Bayreuth
    Festival, the festival is one of the most distinguished international theatre and music festivals in the world. It is
    presented annually in May at the Hessisches Staatstheater Wiesbaden, the State Theatre of Hesse in the capital Wiesbaden.
    The festival currently features performances of operas, ballets, plays and musicals. Visiting companies, mostly from European
    theaters, present their recent productions along with performances of the Theater Wiesbaden. Concerts from a wide array
    of music genres are featured as well as artistic circus acts and modern dance presentations. Lectures, recitals, cabaret
    performances, art showings and readings are also part of the program. {''name'': ''Internationale Maifestspiele Wiesbaden'',
