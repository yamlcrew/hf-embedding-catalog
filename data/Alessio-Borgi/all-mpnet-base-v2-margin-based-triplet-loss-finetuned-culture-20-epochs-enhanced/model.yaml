  - 'Hans Ji Maharaj Indian guru (1900–1966) Hans Rām Singh Rawat, called Shrī Hans Jī Mahārāj and by various other honorifics
    (8 November 1900 – 19 July 1966), was an Indian religious leader. He was born in Gadh-ki-Sedhia, north-east of Haridwar
    in present-day Uttarakhand, India. His parents were Ranjit Singh Rawat and Kalindi Devi. He was considered a Satguru by
    his students who called him affectionately "Shri Maharaj ji" or just "Guru Maharaj ji." He had a daughter from his first
    wife Sinduri Devi, and four sons from his second wife Rajeshwari Devi, later known among followers as "Mata Ji" and "Shri
