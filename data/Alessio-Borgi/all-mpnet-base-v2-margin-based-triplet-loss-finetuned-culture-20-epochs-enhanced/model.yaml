  sentences:
  - 'Eddie Murphy American actor and comedian Edward Regan Murphy (born April 3, 1961) is an American actor, comedian, and
    singer. He had his breakthrough as a standup comic before gaining stardom for his film roles; he is widely recognized
    as one of the greatest comedians of all time. He has received several accolades including a Golden Globe Award, a Grammy
    Award, and an Emmy Award as well as nominations for an Academy Award and a BAFTA Award. He was honored with the Mark Twain
    Prize for American Humor in 2015 and the Cecil B. DeMille Award in 2023. Murphy shot to fame on the sketch comedy show
    Saturday Night Live, for which he was a regular cast member from 1980 to 1984 and broke out as a movie star in the 1980s
    films 48 Hrs., Trading Places, and Beverly Hills Cop. He then established himself as a leading man with starring roles
    in: The Golden Child (1986), Coming to America (1988), Harlem Nights (which he also directed) (1989), Boomerang (1992),
    The Nutty Professor (1996), Dr. Dolittle (1997), Bowfinger (1999), Daddy Day Care (2003), and Norbit (2007). Murphy both
    won the Golden Globe for Best Supporting Actor and received a nomination for the Academy Award for Best Supporting Actor
    for his role in Dreamgirls (2006). Murphy has worked as a voice actor, including Mushu in Disney''s Mulan (1998), Thurgood
    Stubbs in the sitcom The PJs (1999–2001), and Donkey in the Shrek franchise (2001–present), the latter of which earned
