  - 'Ministerialists and Oppositionists former political groupings in Western Australia Ministerialists and Oppositionists
    were political groupings in the political systems of several Australian colonies and states, used to describe supporters
    or opponents of the government of the day. The terminology had earlier been used in the same way in the United Kingdom.
    Prior to federation in 1901 (and for a short period after) a formal political party structure was not fully in place,
