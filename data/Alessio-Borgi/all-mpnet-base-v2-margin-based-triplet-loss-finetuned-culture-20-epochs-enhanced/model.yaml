  - 'weed plant considered undesirable in a particular situation A weed is a plant considered undesirable in a particular
    situation, growing where it conflicts with human preferences, needs, or goals. Plants with characteristics that make them
    hazardous, aesthetically unappealing, difficult to control in managed environments, or otherwise unwanted in farm land,
    orchards, gardens, lawns, parks, recreational spaces, residential and industrial areas, may all be considered weeds. The
    concept of weeds is particularly significant in agriculture, where the presence of weeds in fields used to grow crops
    may cause major losses in yields. Invasive species, plants introduced to an environment where their presence negatively
    impacts the overall functioning and biodiversity of the ecosystem, may also sometimes be considered weeds. Taxonomically,
    the term "weed" has no botanical significance, because a plant that is a weed in one context, is not a weed when growing
    in a situation where it is wanted. Some plants that are widely regarded as weeds are intentionally grown in gardens and
    other cultivated settings. For this reason, some plants are sometimes called beneficial weeds. Similarly, volunteer plants
    from a previous crop are regarded as weeds when growing in a subsequent crop. Thus, alternative nomenclature for the same
    plants might be hardy pioneers, cosmopolitan species, volunteers, "spontaneous urban vegetation," etc. Although whether
    a plant is a weed depends on context, plants commonly defined as weeds broadly share biological characteristics that allow
    them to thrive in disturbed environments and to be particularly difficult to destroy or eradicate. In particular, weeds
    are adapted to thrive under human management in the same way as intentionally grown plants. Since the origins of agriculture
    on Earth, agricultural weeds have co-evolved with human crops and agricultural systems, and some have been domesticated
    into crops themselves after their fitness in agricultural settings became apparent. More broadly, the term "weed" is occasionally
    applied pejoratively to species outside the plant kingdom, species that can survive in diverse environments and reproduce
    quickly; in this sense it has even been applied to humans. Weed control is important in agriculture and horticulture.
    Methods include hand cultivation with hoes, powered cultivation with cultivators, smothering with mulch or soil solarization,
    lethal wilting with high heat, burning, or chemical attack with herbicides and cultural methods such as crop rotation
    and fallowing land to reduce the weed population. {''width'': ''22em'', ''align'': ''right'', ''quote'': ''"What would
    the world be, once bereft,<br />\nof wet and wildness? Let them be left.<br />\nO let them be left; wildness and wet;<br
    />\nLong live the weeds and the wilderness yet.'', ''source'': "— Gerard Manley Hopkins'' poem ''''Inversnaid''''", ''aliases'':
    [''weeds'', ''plant weed'', ''plant weeds'']} {''subclass of'': ''plant'', ''instance of'': ''taxon'', ''described by
    source'': ''Great Soviet Encyclopedia (1926–1947)'', ''taxon rank'': ''species'', ''maintained by WikiProject'': ''WikiProject
    Invasion Biology'', ''has use'': ''medicinal plant''}'
- source_sentence: 'Khalifa Sufi religious leader and teacher in North and West Africa In the Muslim world, the marabout (Arabic:
    مُرابِط, romanized: murābiṭ, lit. ''one who is attached/garrisoned'') is a descendant of Muhammad (Arabic: سـيّد, romanized:
    sayyid and sidi in the Maghreb) and a Muslim religious leader and teacher who historically had the function of a chaplain
    serving as a part of an Islamic army, notably in North Africa and the Sahara region, in West Africa, and historically
    in the Maghreb. The marabout is often a scholar of the Quran, or religious teacher. Others may be wandering holy men who
    survive on alms or as spiritual directors of Muslim religious communities, often as muršid ("guide") of Sufi orders. The
    term "marabout" is also used for the mausolea of such religious leaders (cf. maqām, mazār, in Palestine also walī/velī).
    {''aliases'': [''Marabouts'']} {}'
