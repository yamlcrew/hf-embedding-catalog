- source_sentence: How long after your Initial Enrollment Period ends do you have to avoid a tax penalty by making your last
    HSA contribution?
  sentences:
  - "86\nSection 6: Medicare drug coverage (Part D)\n86\nPlans can change their formularies at any time. Your plan may notify\
    \ you of \nany formulary changes that affect drugs you’re taking. \nContact your plan for its current formulary, or visit\
    \ the plan’s website. \nYou can also visit Medicare.gov/plan-compare or call 1-800-MEDICARE \n(1-800-633-4227) to find\
    \ out if a drug is on your plan’s formulary. TTY users \ncan call 1-877-486-2048. \nImportant! Each month you fill a prescription,\
    \ your plan sends you \nan “Explanation of Benefits” notice. Review your notice and check it \nfor mistakes. Contact your\
    \ plan if you have questions or find mistakes. \nIf you suspect fraud, call the Medicare Drug Integrity Contractor at\
    \ \n1-877-7SAFERX (1-877-772-3379). Go to page 106. \nPlans may have coverage rules for certain drugs \n• Prior authorization:\
    \ Limits coverage of a drug to patients who meet certain \nrequirements. Before you can fill the prescription, your prescriber\
    \ must \ncontact your plan to show the drug is medically necessary and that you \nmeet certain requirements. \nPlans may\
    \ also use prior authorization when they cover a drug for only \ncertain medical conditions it’s approved for, but not\
    \ others. When this \noccurs, plans will likely have alternative drugs on their list of covered drugs \n(formulary) for\
    \ the other medical conditions the drug is approved to treat. \nContact your plan or visit their website to find out about\
    \ prior authorization \nrequirements.\n• Quantity limits: Limits how much of a drug you can get at a time. \n• Step therapy:\
    \ You may need to try one or more similar, lower-cost drugs \nbefore the plan will cover the prescribed drug. \n• Opioid\
    \ pain medication safety checks at the pharmacy: Before the \npharmacy fills your prescriptions, your plan and pharmacy\
    \ perform \nadditional safety checks, like checking for drug interactions and incorrect \ndosages. \n \nThe opioid safety\
    \ checks also include checking for possible unsafe \namounts of opioid pain medications, limiting the day’s supply of\
    \ a first"
  - "Enrollment Period\nYou can avoid a tax penalty \nby making your last HSA \ncontribution the month before \nyou turn 65.\n\
    2 months after your Initial \nEnrollment Period ends\nAnd your birthday is on \nthe 1st day of the month\nGenerally, your\
    \ Medicare \ncoverage starts the first day \nof the month before you turn \n65. You can avoid a tax penalty \nby making\
    \ your last HSA \ncontribution 2 months before \nyou turn 65.\nIf you wait to \nsign up for \nMedicare:\nLess than 6 months\
    \ after \nyou turn 65\nYou can avoid a tax penalty by \nstopping HSA contributions the \nmonth before you turn 65.\n6\
