- source_sentence: Under what circumstances can you change your Medicare Advantage plan during the year?
  sentences:
  - "19\nSection 1: Signing up for Medicare\n19\nI have other health coverage. Should I get Part B?\nThis information can\
    \ help you decide if you should get Part B based on the \ntype of health coverage you may have. \nEmployer or union coverage\n\
    If you or your spouse (or family member if you have a disability) are still \nworking and you have health coverage through\
    \ that employer or union, go \nto page 21 to find out how your coverage works with Medicare. You can also \ncontact the\
    \ employer or union benefits administrator for information. This \nincludes federal or state employment and active-duty\
    \ military service. It might \nbe to your advantage to delay Part B enrollment while you still have health \ncoverage\
    \ based on your or your spouse’s current employment. \nCoverage based on current employment doesn’t include: \n• COBRA\
    \ (or similar continuation coverage after employment ends) \n• Retiree coverage \n• VA coverage \n• Individual health\
    \ insurance coverage (like through the Health Insurance \nMarketplace®) \n• Former employer coverage you get through severance\
    \ or a layoff\nTRICARE\nIf you have TRICARE (health care program for active-duty and retired service \nmembers and their\
    \ families), you generally must sign up for Part A and \nPart B when you’re first eligible to keep your TRICARE coverage.\
    \ However, \nif you’re an active-duty service member or an active-duty family member, you \ndon’t have to sign up for\
    \ Part B to keep your TRICARE coverage. For more \ninformation, contact your TRICARE contractor. Go to page 90. \nIf you\
    \ have CHAMPVA coverage, you must sign up for Part A and Part B to \nkeep it. Call 1-800-733-8387 for more information\
    \ about CHAMPVA.\nMedicaid\nIf you have Medicaid and don’t have Part B, Medicare will pay first for the \nPart A services\
    \ Medicare covers. You may also be able to get help from your \nstate to pay for Part A and Part B premiums through a\
    \ Medicare Savings \nProgram. Go to pages 91–92. To learn more about signing up for Part B, go to \npage 15.\nFor more\
    \ information on Medicaid and to find out if you qualify, visit"
  - "•\t You’ll generally get a decision from the Medicare Administrative Contractor \nwithin 60 days after they get your\
    \ request. If Medicare will cover the item(s) \nor service(s), it will be listed on your next MSN.\n•\t You may have the\
    \ right to a fast appeal if you think your Medicare services \nfrom a hospital or other facility are ending too soon (page\
    \ 100).\nIf you’re in a Medicare Advantage or other Medicare health plan \nThe timeframe for filing an appeal may be different\
    \ than Original Medicare. \nIn some cases, you can file a fast appeal. To learn more, look at the materials \nyour plan\
    \ sends you, call your plan, or visit Medicare.gov/claims-appeals/how-\ndo-i-file-an-appeal. \nIf you have a separate\
    \ Medicare drug plan \nEven before you buy a certain drug, you have the right to:\n•\t Get a written explanation for drug\
    \ coverage decisions (called a “coverage \ndetermination”) from your Medicare drug plan. A coverage determination is \n\
    the first decision your Medicare drug plan (not the pharmacy) makes about \nyour benefits. This can be a decision about\
    \ if the plan covers your drug, if \nyou met the plan’s requirements to cover the drug, or how much you pay for \nthe\
    \ drug. You’ll also get a coverage determination decision if you ask your \nplan to make an exception to its rules to\
    \ cover your drug. \n•\t Ask for an exception if you or your prescriber (your doctor or other health \ncare provider who’s\
    \ legally allowed to write prescriptions) believe you need \na drug that isn’t on your plan’s list of covered drugs (formulary)."
  - "63\nSection 4: Medicare Advantage Plans & other options\n63\nProviders can join or leave a plan’s provider network any\
    \ time during the year. \nYour plan can also change the providers in the network any time during the \nyear. If this happens,\
    \ you usually won’t be able to change plans but you can \nchoose a new provider. You generally can’t change plans during\
    \ the year.\nImportant! Even though the network of providers may change during \nthe year, the plan must still give you\
    \ access to qualified doctors and \nspecialists. Your plan will notify you that your provider is leaving your \nplan so\
    \ you have time to choose a new one. You’ll get this notice if it’s \na primary care or behavioral health provider and\
    \ you’ve gone to that \nprovider in the past three years. If any of your other providers leave your \nplan, you’ll get\
    \ this notice in certain situations. \nYour plan will also: \n• Help you choose a new provider to continue managing your\
    \ health care \nneeds.\n• Help you continue needed care that’s already in progress.\n• Notify you about the different\
    \ enrollment periods available to you and \noptions you may have for changing plans.\nRead your notices carefully so you’re\
    \ aware of any changes and can change \nplans if you aren’t satisfied, either during Open Enrollment or a Special \nEnrollment\
    \ Period, if you qualify.\nWhen an in-network provider or benefit isn’t available or can’t meet your \nmedical needs,\
    \ your plan must help you get any medically necessary covered \nservices outside the provider network (at the in-network\
    \ cost sharing). \nCompare: If you have Original Medicare, you don’t need a referral to \nuse a specialist in most cases\
    \ (page 57), and you generally don’t need \nprior approval to use a covered benefit. \nImportant! Read the information\
    \ you get from your plan \nIf you’re in a Medicare Advantage Plan, review the “Annual Notice of \nChange” and “Evidence\
    \ of Coverage” from your plan each year.\n• \nAnnual Notice of Change: Includes any changes in coverage, costs, \nand\
    \ more that will be effective in January. Your plan will send you a \nprinted copy by September 30.\n• \nEvidence of Coverage:\
    \ Gives you details about what the plan covers,"
