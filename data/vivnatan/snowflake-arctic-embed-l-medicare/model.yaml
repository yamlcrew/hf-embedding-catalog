    \ month you \napply for Medicare.\nNote: A Medical Savings Account (MSA) Plan is similar to an HSA. Go to page 67."
  - "to a third-party app. Go to page 109.\nWhat’s assignment? \nAssignment means that your doctor, provider, or supplier\
    \ agrees (or is \nrequired by law) to accept the Medicare-approved amount as full payment for \ncovered services. Most\
    \ doctors, providers, and suppliers accept assignment, \nbut always check to make sure that yours do.\nIf your doctor,\
    \ provider, or supplier accepts assignment: \n• Your out-of-pocket costs may be less. \n• They agree to charge you only\
