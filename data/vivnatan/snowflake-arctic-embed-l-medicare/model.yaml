- source_sentence: What are the consequences of not signing up for Medicare Part B when you are first eligible?
  sentences:
  - "Will I have to sign up for Part A and/or Part B?\nIf you’re close to 65, but NOT getting Social Security or RRB benefits,\
    \ you’ll \nneed to sign up for Medicare. Visit SSA.gov/medicare to apply for Part A and \nPart B. You can also contact\
    \ Social Security 3 months before you turn 65 to \nset up an appointment. If you worked for a railroad, visit RRB.gov,\
    \ or call the \nRRB at 1-877-772-5772. TTY users can call 1-312-751-4701. \nIn most cases, if you don’t sign up for Part\
    \ B when you’re first eligible, you may \nhave a delay in getting Medicare Part B coverage in the future because you \n\
    can only sign up at certain times. You may also have to pay a late enrollment \npenalty for as long as you have Part B.\
    \ Go to page 23."
  - "•\t Visit ACL.gov/ltc to learn more about planning for long‑term care. \n•\t Visit the Eldercare Locator at eldercare.acl.gov,\
    \ or call 1-800-677-1116 to \nfind help in your community.\n•\t Call your Long-Term Care Ombudsman, or visit ltcombudsman.org\
    \ for help \nwith services you need and to be advised of your rights, and to find an \nOmbudsman program near you.\n•\t\
    \ Call your State Medical Assistance (Medicaid) office or visit Medicaid.gov \nand ask for information about long-term\
    \ care coverage. \n•\t Call your State Health Insurance Assistance Program (SHIP). Go to \npages 114–117 for the phone\
    \ number of your local SHIP. \n•\t Call your State Insurance Department for information on long‑term care \ninsurance.\
    \ Call 1-800-MEDICARE (1‑800‑633‑4227) to get the phone \nnumber. TTY users can call 1‑877‑486‑2048.\n•\t Get a copy of\
    \ “A Shopper’s Guide to Long-Term Care Insurance” from the \nNational Association of Insurance Commissioners at content.naic.org/sites/\n\
    default/files/publication-ltc-lp-shoppers-guide-long-term.pdf."
  - "47\nSection 2: Find out what Medicare covers\n47\nPreventive service  \nObesity behavioral therapy \nIf you have a body\
    \ mass index (BMI) of 30 or more, Medicare covers obesity \nscreenings and behavioral counseling to help you lose weight\
    \ by focusing on \ndiet and exercise. Medicare covers this counseling if your primary care doctor \nor other primary care\
    \ provider gives the counseling in a primary care setting \n(like a doctor’s office), where they can coordinate your personalized\
    \ plan with \nyour other care. You pay nothing for this service if your primary care doctor or \nother provider accepts\
    \ assignment. \nOccupational therapy services\nMedicare covers medically necessary therapy to help you perform activities\
    \ of \ndaily living (like dressing or bathing). This therapy helps to improve or maintain \ncurrent capabilities or slow\
    \ decline when your doctor or other health care \nprovider certifies you need it. You pay 20% of the Medicare-approved\
    \ amount. \nThe Part B deductible applies. \nOpioid Use Disorder treatment services \nMedicare covers Opioid Use Disorder\
    \ treatment services in Opioid Treatment \nPrograms. The services include medication (like methadone, buprenorphine, \n\
    naltrexone, naloxone, and nalmefene hydrochloride), dispensing and \nadministering medications, substance use counseling,\
    \ drug testing, individual \nand group therapy, intake activities, periodic assessments, and intensive \noutpatient services.\
    \ Medicare covers counseling, therapy services, and periodic \nassessments both in-person and, in certain circumstances,\
    \ virtually (using \naudio and video communication technology like your phone or a computer). \nMedicare also covers services\
    \ given through Opioid Treatment Program mobile \nunits.\nMedicare pays doctors and other providers for office-based Opioid\
    \ Use \nDisorder treatment, including management, care coordination, psychotherapy, \ncounseling activities, and allotment\
    \ and distribution of medications. \nUnder Original Medicare, you won’t have to pay any copayments for these \nservices\
    \ if you get them from an Opioid Treatment Program provider that’s \nenrolled in Medicare and meets other requirements.\
    \ However, the Part B \ndeductible still applies. Talk to your doctor or other health care provider to"
