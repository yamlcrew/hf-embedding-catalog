  sentences:
  - దక్షిణ కాలిఫోర్నియా ఆర్థిక వ్యవస్థ వైవిధ్యమైనది మరియు యునైటెడ్ స్టేట్స్‌లో అతిపెద్దది.ఇది పెట్రోలియం యొక్క సమృద్ధిపై ఎక్కువగా
