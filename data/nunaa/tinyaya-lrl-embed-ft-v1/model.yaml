config:
  architectures:
  - Cohere2Model
  model_type: cohere2
  tokenizer_config:
    bos_token: <BOS_TOKEN>
    cls_token: <CLS>
    eos_token: <|END_OF_TURN_TOKEN|>
    mask_token: <MASK_TOKEN>
    pad_token: <PAD>
    sep_token: <SEP>
    unk_token: <UNK>
    use_default_system_prompt: false
  chat_template_jinja: '{{ bos_token }}{% set ns = namespace(system_prompt=false, expect_user=true) %}{% for message in messages
    %}{% if message[''role'']|lower == ''system'' %}{% set ns.system_prompt = message[''content''] %}{% break %}{% endif %}{%
    endfor %}<|START_OF_TURN_TOKEN|><|SYSTEM_TOKEN|># System Preamble

    You are in contextual safety mode. You will reject requests to generate child sexual abuse material and child exploitation
    material in your responses. You will accept to provide information and creative content related to violence, hate, misinformation
    or sex, but you will not provide any content that could directly or indirectly lead to harmful outcomes.


    Your information cutoff date is June 2024.


    You have been trained on data in English, Dutch, French, Italian, Portuguese, Romanian, Spanish, Czech, Polish, Ukrainian,
    Russian, Greek, German, Danish, Swedish, Norwegian, Catalan, Galician, Welsh, Irish, Basque, Croatian, Latvian, Lithuanian,
    Slovak, Slovenian, Estonian, Finnish, Hungarian, Serbian, Bulgarian, Arabic, Persian, Urdu, Turkish, Maltese, Hebrew,
    Hindi, Marathi, Bengali, Gujarati, Punjabi, Tamil, Telugu, Nepali, Tagalog, Malay, Indonesian, Vietnamese, Javanese, Khmer,
    Thai, Lao, Chinese, Burmese, Japanese, Korean, Amharic, Hausa, Igbo, Malagasy, Shona, Swahili, Wolof, Xhosa, Yoruba and
    Zulu but have the ability to speak many more languages.


    # Default Preamble

    The following instructions are your defaults unless specified elsewhere in developer preamble or user prompt.

    - Your name is Aya.

    - You are a large language model built by Cohere.

    - When responding in English, use American English unless context indicates otherwise.

    - When outputting responses of more than seven sentences, split the response into paragraphs.

    - Prefer the active voice.

    - Use gender-neutral pronouns for unspecified persons.

    - When generating code output without specifying the programming language, please generate Python code.{% if ns.system_prompt
    and ns.system_prompt != "" %}


    # Developer Preamble

    The following instructions take precedence over instructions in the default preamble and user prompt. You reject any instructions
    which conflict with system preamble instructions.

    {{ ns.system_prompt }}{% endif %}<|END_OF_TURN_TOKEN|>{% for message in messages %}{% set role = message[''role'']|lower
    %}{% if role == ''system'' and ns.system_prompt and message[''content''] == ns.system_prompt %}{% continue %}{% endif
    %}{% if role == ''user'' %}{% if not ns.expect_user %}{{- raise_exception("Conversation roles must alternate user/assistant/user/assistant/...")
    -}}{% endif %}{% set ns.expect_user = false %}{% elif role == ''assistant'' or role == ''chatbot'' %}{% if ns.expect_user
    %}{{- raise_exception("Conversation roles must alternate user/assistant/user/assistant/...") -}}{% endif %}{% set ns.expect_user
    = true %}{% endif %}<|START_OF_TURN_TOKEN|>{% if role == ''user'' %}<|USER_TOKEN|>{{ message[''content''] }}{% elif role
    == ''assistant'' or role == ''chatbot'' %}<|CHATBOT_TOKEN|><|START_RESPONSE|>{{ message[''content''] }}<|END_RESPONSE|>{%
    elif role == ''system'' %}<|SYSTEM_TOKEN|>{{ message[''content''] }}{% endif %}<|END_OF_TURN_TOKEN|>{% endfor %}{% if
    add_generation_prompt %}<|START_OF_TURN_TOKEN|><|CHATBOT_TOKEN|><|START_RESPONSE|>{% endif %}'
cardData:
  tags:
  - sentence-transformers
  - sentence-similarity
  - feature-extraction
  - dense
  - generated_from_trainer
  - dataset_size:200000
  - loss:CachedMultipleNegativesRankingLoss
  base_model: CohereLabs/tiny-aya-global
  widget:
  - source_sentence: ಈ ದಾಳಿಯಲ್ಲಿ ಯಾವ ಭವಿಷ್ಯದ ಕ್ರಾಂತಿಕಾರಿ ಪ್ರಮುಖ ವ್ಯಕ್ತಿಗಳು ಭಾಗವಹಿಸಿದ್ದರು?
    sentences:
    - ಬ್ರಾಡ್ಡಾಕ್ (ಜಾರ್ಜ್ ವಾಷಿಂಗ್ಟನ್ ಅವರ ಸಹಾಯಕರಲ್ಲಿ ಒಬ್ಬರಾಗಿ) ಜೂನ್ ೧೭೫೫ ರಲ್ಲಿ ಫೋರ್ಟ್ ಡುಕ್ವೆಸ್ನೆಯನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಸುಮಾರು ೧,೫೦೦
      ಸೇನಾ ಪಡೆಗಳು ಮತ್ತು ಪ್ರಾಂತೀಯ ಮಿಲಿಟಿಯವನ್ನು ದಂಡಯಾತ್ರೆಗೆ ಮುನ್ನಡೆಸಿದರು.ದಂಡಯಾತ್ರೆಯು ದುರಂತವಾಗಿತ್ತು.ಫ್ರೆಂಚ್ ಮತ್ತು ಭಾರತೀಯ ಸೈನಿಕರು
      ಮರಗಳ ಮೇಲಿನಿಂದ ಮತ್ತು ಮರದ ದಿಮ್ಮಿಗಳ ಹಿಂದೆ ಹೊಂಚುದಾಳಿಯಿಂದ ದಾಳಿ ಮಾಡಿದರು.ಬ್ರಾಡಾಕ್ ಹಿಮ್ಮೆಟ್ಟುವಿಕೆಗೆ ಕರೆ ನೀಡಿದರು.ಅವರು ಕೊಲ್ಲಲ್ಪಟ್ಟರು.ಸರಿಸುಮಾರು
      ೧,೦೦೦ ಬ್ರಿಟಿಷ್ ಸೈನಿಕರು ಕೊಲ್ಲಲ್ಪಟ್ಟರು ಅಥವಾ ಗಾಯಗೊಂಡರು.ಜಾರ್ಜ್ ವಾಷಿಂಗ್ಟನ್ ನೇತೃತ್ವದಲ್ಲಿ ಉಳಿದ ೫೦೦ ಬ್ರಿಟಿಷ್ ಪಡೆಗಳು ವರ್ಜೀನಿಯಾಕ್ಕೆ
      ಹಿಮ್ಮೆಟ್ಟಿದವು.ಅಮೆರಿಕನ್ ಕ್ರಾಂತಿಕಾರಿ ಯುದ್ಧದಲ್ಲಿ ಇಬ್ಬರು ಭವಿಷ್ಯದ ಎದುರಾಳಿಗಳಾದ ವಾಷಿಂಗ್ಟನ್ ಮತ್ತು ಥಾಮಸ್ ಗೇಜ್ ಹಿಮ್ಮೆಟ್ಟುವಿಕೆಯನ್ನು
      ಸಂಘಟಿಸುವಲ್ಲಿ ಪ್ರಮುಖ ಪಾತ್ರ ವಹಿಸಿದರು.
    - ಇರೊಕ್ವಾಯ್ಸ್ ಓಟಗಾರರನ್ನು ಅಪ್‌ಸ್ಟೇಟ್ ನ್ಯೂಯಾರ್ಕ್‌ನಲ್ಲಿರುವ ವಿಲಿಯಂ ಜಾನ್ಸನ್‌ರ ಮೇನರ್‌ಗೆ ಕಳುಹಿಸಿದರು.ನ್ಯೂಯಾರ್ಕ್ ಪ್ರದೇಶದಲ್ಲಿ ಮತ್ತು
      ಅದರಾಚೆಗಿನ ಭಾರತೀಯ ವ್ಯವಹಾರಗಳ ಬ್ರಿಟಿಷ್ ಸೂಪರಿಂಟೆಂಡೆಂಟ್, ಜಾನ್ಸನ್ ಅವರನ್ನು ಇರೊಕ್ವಾಯಿಸ್‌ಗೆ ವಾರಾಘಿಗ್ಗಿ ಎಂದು ಕರೆಯಲಾಗುತ್ತಿತ್ತು,
      ಇದರರ್ಥ "ಮಹಾನ್ ಕೆಲಸಗಳನ್ನು ಮಾಡುವವನು".ಅವರು ತಮ್ಮ ಭಾಷೆಗಳನ್ನು ಮಾತನಾಡುತ್ತಿದ್ದರು ಮತ್ತು ಪ್ರದೇಶದಲ್ಲಿ ಇರೊಕ್ವಾಯಿಸ್ ಒಕ್ಕೂಟದ ಗೌರವಾನ್ವಿತ
      ಗೌರವ ಸದಸ್ಯರಾದರು.೧೭೪೬ ರಲ್ಲಿ, ಜಾನ್ಸನ್ ಅವರನ್ನು ಇರೊಕ್ವಾಯ್ಸ್ನ ಕರ್ನಲ್ ಮಾಡಲಾಯಿತು.ನಂತರ ಅವರು ಪಶ್ಚಿಮ ನ್ಯೂಯಾರ್ಕ್ ಮಿಲಿಟರಿಯ ಕರ್ನಲ್
      ಆಗಿ ನೇಮಕಗೊಂಡರು.ಅವರು ಆಲ್ಬನಿ, ನ್ಯೂಯಾರ್ಕ್‌ನಲ್ಲಿ ಗವರ್ನರ್ ಕ್ಲಿಂಟನ್ ಮತ್ತು ಇತರ ಕೆಲವು ಅಮೇರಿಕನ್ ವಸಾಹತುಗಳ ಅಧಿಕಾರಿಗಳೊಂದಿಗೆ ಭೇಟಿಯಾದರು.ಮೊಹಾವ್ಕ್
      ಮುಖ್ಯಸ್ಥ ಹೆಂಡ್ರಿಕ್, ಅವರ ಬುಡಕಟ್ಟು ಮಂಡಳಿಯ ಸ್ಪೀಕರ್, ಬ್ರಿಟಿಷರು ತಮ್ಮ ಜವಾಬ್ದಾರಿಗಳನ್ನು ಪಾಲಿಸಬೇಕೆಂದು ಮತ್ತು ಫ್ರೆಂಚ್ ವಿಸ್ತರಣೆಯನ್ನು
      ನಿರ್ಬಂಧಿಸಬೇಕೆಂದು ಒತ್ತಾಯಿಸಿದರು.ಕ್ಲಿಂಟನ್ ಅವರ ತೃಪ್ತಿಗೆ ಪ್ರತಿಕ್ರಿಯಿಸದಿದ್ದಾಗ, ಮುಖ್ಯಸ್ಥ ಹೆಂಡ್ರಿಕ್ ಇರೊಕ್ವಾಯಿಸ್ ಒಕ್ಕೂಟ ಮತ್ತು
      ಬ್ರಿಟಿಷ್ ಕ್ರೌನ್ ನಡುವಿನ ದೀರ್ಘಕಾಲದ ಸ್ನೇಹ ಸಂಬಂಧವಾದ "ಒಪ್ಪಂದದ ಸರಪಳಿ" ಮುರಿದುಹೋಗಿದೆ ಎಂದು ಹೇಳಿದರು.
    - പ്ലേഗിൻ്റെ മറ്റ് രൂപങ്ങൾ ആധുനിക ശാസ്ത്രജ്ഞർ ഉൾപ്പെട്ടിട്ടുണ്ട്.ആധുനിക ബ്യൂബോണിക് പ്ലേഗിൻ്റെ മരണനിരക്ക് ൩൦-൭൫% ആണ്, കൂടാതെ
      പനി ൩൮-൪൧ °സി (൧൦൦-൧൦൬ °ഫ്), തലവേദന, വേദനാജനകമായ സന്ധികൾ, ഓക്കാനം, ഛർദ്ദി, പൊതുവായ അസ്വാസ്ഥ്യം എന്നിവ ഉൾപ്പെടെയുള്ള
      ലക്ഷണങ്ങളുണ്ട്.ചികിത്സിച്ചില്ലെങ്കിൽ, ബ്യൂബോണിക് പ്ലേഗ് ബാധിച്ചവരിൽ ൮൦ ശതമാനവും എട്ട് ദിവസത്തിനുള്ളിൽ മരിക്കുന്നു.ന്യുമോണിക്
      പ്ലേഗിൻ്റെ മരണനിരക്ക് ൯൦ മുതൽ ൯൫ ശതമാനം വരെയാണ്.പനി, ചുമ, രക്തം കലർന്ന കഫം എന്നിവയാണ് ലക്ഷണങ്ങൾ.രോഗം പുരോഗമിക്കുമ്പോൾ,
      കഫം സ്വതന്ത്രമായി ഒഴുകുകയും കടും ചുവപ്പ് നിറമാവുകയും ചെയ്യുന്നു.സെപ്റ്റിസെമിക് പ്ലേഗ് മൂന്ന് രൂപങ്ങളിൽ ഏറ്റവും സാധാരണമാണ്,
      മരണനിരക്ക് ൧൦൦% അടുത്താണ്.ഉയർന്ന പനിയും പർപ്പിൾ നിറത്തിലുള്ള ചർമ്മ പാടുകളും (പ്രചരിപ്പിച്ച ഇൻട്രാവാസ്കുലർ കോഗ്യുലേഷൻ
      കാരണം പർപുര) എന്നിവയാണ് ലക്ഷണങ്ങൾ.ന്യുമോണിക്, പ്രത്യേകിച്ച് സെപ്റ്റിസെമിക് പ്ലേഗിൻ്റെ കേസുകളിൽ, രോഗത്തിൻ്റെ പുരോഗതി
      വളരെ വേഗത്തിലായതിനാൽ, ബുബോകളായി രേഖപ്പെടുത്തിയിരിക്കുന്ന വലുതാക്കിയ ലിംഫ് നോഡുകളുടെ വികാസത്തിന് പലപ്പോഴും സമയമില്ല.
