- source_sentence: ಈ ದಾಳಿಯಲ್ಲಿ ಯಾವ ಭವಿಷ್ಯದ ಕ್ರಾಂತಿಕಾರಿ ಪ್ರಮುಖ ವ್ಯಕ್ತಿಗಳು ಭಾಗವಹಿಸಿದ್ದರು?
  sentences:
  - ಬ್ರಾಡ್ಡಾಕ್ (ಜಾರ್ಜ್ ವಾಷಿಂಗ್ಟನ್ ಅವರ ಸಹಾಯಕರಲ್ಲಿ ಒಬ್ಬರಾಗಿ) ಜೂನ್ ೧೭೫೫ ರಲ್ಲಿ ಫೋರ್ಟ್ ಡುಕ್ವೆಸ್ನೆಯನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಸುಮಾರು ೧,೫೦೦
    ಸೇನಾ ಪಡೆಗಳು ಮತ್ತು ಪ್ರಾಂತೀಯ ಮಿಲಿಟಿಯವನ್ನು ದಂಡಯಾತ್ರೆಗೆ ಮುನ್ನಡೆಸಿದರು.ದಂಡಯಾತ್ರೆಯು ದುರಂತವಾಗಿತ್ತು.ಫ್ರೆಂಚ್ ಮತ್ತು ಭಾರತೀಯ ಸೈನಿಕರು
    ಮರಗಳ ಮೇಲಿನಿಂದ ಮತ್ತು ಮರದ ದಿಮ್ಮಿಗಳ ಹಿಂದೆ ಹೊಂಚುದಾಳಿಯಿಂದ ದಾಳಿ ಮಾಡಿದರು.ಬ್ರಾಡಾಕ್ ಹಿಮ್ಮೆಟ್ಟುವಿಕೆಗೆ ಕರೆ ನೀಡಿದರು.ಅವರು ಕೊಲ್ಲಲ್ಪಟ್ಟರು.ಸರಿಸುಮಾರು
    ೧,೦೦೦ ಬ್ರಿಟಿಷ್ ಸೈನಿಕರು ಕೊಲ್ಲಲ್ಪಟ್ಟರು ಅಥವಾ ಗಾಯಗೊಂಡರು.ಜಾರ್ಜ್ ವಾಷಿಂಗ್ಟನ್ ನೇತೃತ್ವದಲ್ಲಿ ಉಳಿದ ೫೦೦ ಬ್ರಿಟಿಷ್ ಪಡೆಗಳು ವರ್ಜೀನಿಯಾಕ್ಕೆ
    ಹಿಮ್ಮೆಟ್ಟಿದವು.ಅಮೆರಿಕನ್ ಕ್ರಾಂತಿಕಾರಿ ಯುದ್ಧದಲ್ಲಿ ಇಬ್ಬರು ಭವಿಷ್ಯದ ಎದುರಾಳಿಗಳಾದ ವಾಷಿಂಗ್ಟನ್ ಮತ್ತು ಥಾಮಸ್ ಗೇಜ್ ಹಿಮ್ಮೆಟ್ಟುವಿಕೆಯನ್ನು
    ಸಂಘಟಿಸುವಲ್ಲಿ ಪ್ರಮುಖ ಪಾತ್ರ ವಹಿಸಿದರು.
  - ಇರೊಕ್ವಾಯ್ಸ್ ಓಟಗಾರರನ್ನು ಅಪ್‌ಸ್ಟೇಟ್ ನ್ಯೂಯಾರ್ಕ್‌ನಲ್ಲಿರುವ ವಿಲಿಯಂ ಜಾನ್ಸನ್‌ರ ಮೇನರ್‌ಗೆ ಕಳುಹಿಸಿದರು.ನ್ಯೂಯಾರ್ಕ್ ಪ್ರದೇಶದಲ್ಲಿ ಮತ್ತು
    ಅದರಾಚೆಗಿನ ಭಾರತೀಯ ವ್ಯವಹಾರಗಳ ಬ್ರಿಟಿಷ್ ಸೂಪರಿಂಟೆಂಡೆಂಟ್, ಜಾನ್ಸನ್ ಅವರನ್ನು ಇರೊಕ್ವಾಯಿಸ್‌ಗೆ ವಾರಾಘಿಗ್ಗಿ ಎಂದು ಕರೆಯಲಾಗುತ್ತಿತ್ತು, ಇದರರ್ಥ
    "ಮಹಾನ್ ಕೆಲಸಗಳನ್ನು ಮಾಡುವವನು".ಅವರು ತಮ್ಮ ಭಾಷೆಗಳನ್ನು ಮಾತನಾಡುತ್ತಿದ್ದರು ಮತ್ತು ಪ್ರದೇಶದಲ್ಲಿ ಇರೊಕ್ವಾಯಿಸ್ ಒಕ್ಕೂಟದ ಗೌರವಾನ್ವಿತ ಗೌರವ
    ಸದಸ್ಯರಾದರು.೧೭೪೬ ರಲ್ಲಿ, ಜಾನ್ಸನ್ ಅವರನ್ನು ಇರೊಕ್ವಾಯ್ಸ್ನ ಕರ್ನಲ್ ಮಾಡಲಾಯಿತು.ನಂತರ ಅವರು ಪಶ್ಚಿಮ ನ್ಯೂಯಾರ್ಕ್ ಮಿಲಿಟರಿಯ ಕರ್ನಲ್ ಆಗಿ ನೇಮಕಗೊಂಡರು.ಅವರು
    ಆಲ್ಬನಿ, ನ್ಯೂಯಾರ್ಕ್‌ನಲ್ಲಿ ಗವರ್ನರ್ ಕ್ಲಿಂಟನ್ ಮತ್ತು ಇತರ ಕೆಲವು ಅಮೇರಿಕನ್ ವಸಾಹತುಗಳ ಅಧಿಕಾರಿಗಳೊಂದಿಗೆ ಭೇಟಿಯಾದರು.ಮೊಹಾವ್ಕ್ ಮುಖ್ಯಸ್ಥ
    ಹೆಂಡ್ರಿಕ್, ಅವರ ಬುಡಕಟ್ಟು ಮಂಡಳಿಯ ಸ್ಪೀಕರ್, ಬ್ರಿಟಿಷರು ತಮ್ಮ ಜವಾಬ್ದಾರಿಗಳನ್ನು ಪಾಲಿಸಬೇಕೆಂದು ಮತ್ತು ಫ್ರೆಂಚ್ ವಿಸ್ತರಣೆಯನ್ನು ನಿರ್ಬಂಧಿಸಬೇಕೆಂದು
    ಒತ್ತಾಯಿಸಿದರು.ಕ್ಲಿಂಟನ್ ಅವರ ತೃಪ್ತಿಗೆ ಪ್ರತಿಕ್ರಿಯಿಸದಿದ್ದಾಗ, ಮುಖ್ಯಸ್ಥ ಹೆಂಡ್ರಿಕ್ ಇರೊಕ್ವಾಯಿಸ್ ಒಕ್ಕೂಟ ಮತ್ತು ಬ್ರಿಟಿಷ್ ಕ್ರೌನ್ ನಡುವಿನ
    ದೀರ್ಘಕಾಲದ ಸ್ನೇಹ ಸಂಬಂಧವಾದ "ಒಪ್ಪಂದದ ಸರಪಳಿ" ಮುರಿದುಹೋಗಿದೆ ಎಂದು ಹೇಳಿದರು.
  - പ്ലേഗിൻ്റെ മറ്റ് രൂപങ്ങൾ ആധുനിക ശാസ്ത്രജ്ഞർ ഉൾപ്പെട്ടിട്ടുണ്ട്.ആധുനിക ബ്യൂബോണിക് പ്ലേഗിൻ്റെ മരണനിരക്ക് ൩൦-൭൫% ആണ്, കൂടാതെ
    പനി ൩൮-൪൧ °സി (൧൦൦-൧൦൬ °ഫ്), തലവേദന, വേദനാജനകമായ സന്ധികൾ, ഓക്കാനം, ഛർദ്ദി, പൊതുവായ അസ്വാസ്ഥ്യം എന്നിവ ഉൾപ്പെടെയുള്ള ലക്ഷണങ്ങളുണ്ട്.ചികിത്സിച്ചില്ലെങ്കിൽ,
    ബ്യൂബോണിക് പ്ലേഗ് ബാധിച്ചവരിൽ ൮൦ ശതമാനവും എട്ട് ദിവസത്തിനുള്ളിൽ മരിക്കുന്നു.ന്യുമോണിക് പ്ലേഗിൻ്റെ മരണനിരക്ക് ൯൦ മുതൽ ൯൫
    ശതമാനം വരെയാണ്.പനി, ചുമ, രക്തം കലർന്ന കഫം എന്നിവയാണ് ലക്ഷണങ്ങൾ.രോഗം പുരോഗമിക്കുമ്പോൾ, കഫം സ്വതന്ത്രമായി ഒഴുകുകയും കടും
    ചുവപ്പ് നിറമാവുകയും ചെയ്യുന്നു.സെപ്റ്റിസെമിക് പ്ലേഗ് മൂന്ന് രൂപങ്ങളിൽ ഏറ്റവും സാധാരണമാണ്, മരണനിരക്ക് ൧൦൦% അടുത്താണ്.ഉയർന്ന
    പനിയും പർപ്പിൾ നിറത്തിലുള്ള ചർമ്മ പാടുകളും (പ്രചരിപ്പിച്ച ഇൻട്രാവാസ്കുലർ കോഗ്യുലേഷൻ കാരണം പർപുര) എന്നിവയാണ് ലക്ഷണങ്ങൾ.ന്യുമോണിക്,
    പ്രത്യേകിച്ച് സെപ്റ്റിസെമിക് പ്ലേഗിൻ്റെ കേസുകളിൽ, രോഗത്തിൻ്റെ പുരോഗതി വളരെ വേഗത്തിലായതിനാൽ, ബുബോകളായി രേഖപ്പെടുത്തിയിരിക്കുന്ന
    വലുതാക്കിയ ലിംഫ് നോഡുകളുടെ വികാസത്തിന് പലപ്പോഴും സമയമില്ല.
- source_sentence: రెస్టారెంట్లకు ఏ ప్రాంతం ఆకర్షణీయంగా మారింది?
  sentences:
  - ജ്വലനവും വായുവും തമ്മിലുള്ള ബന്ധത്തെക്കുറിച്ചുള്ള ആദ്യത്തെ അറിയപ്പെടുന്ന പരീക്ഷണങ്ങളിലൊന്ന് ബിസിഇ രണ്ടാം നൂറ്റാണ്ടിലെ
    മെക്കാനിക്സിലെ ഗ്രീക്ക് എഴുത്തുകാരനായ ഫിലോ ഓഫ് ബൈസാൻ്റിയമാണ് നടത്തിയത്.തൻ്റെ കൃതിയായ ന്യൂമാറ്റിക്കയിൽ, കത്തുന്ന മെഴുകുതിരിക്ക്
    മുകളിലൂടെ ഒരു പാത്രം മറിച്ചിടുകയും പാത്രത്തിൻ്റെ കഴുത്തിൽ വെള്ളം വലിക്കുകയും ചെയ്യുന്നത് കഴുത്തിലേക്ക് കുറച്ച് വെള്ളം
    കയറാൻ കാരണമായി എന്ന് ഫിലോ നിരീക്ഷിച്ചു.പാത്രത്തിലെ വായുവിൻ്റെ ഭാഗങ്ങൾ ക്ലാസിക്കൽ മൂലകമായ തീയായി പരിവർത്തനം ചെയ്യപ്പെട്ടുവെന്നും
    അതിനാൽ ഗ്ലാസിലെ സുഷിരങ്ങളിലൂടെ രക്ഷപ്പെടാൻ കഴിയുമെന്നും ഫിലോ തെറ്റായി അനുമാനിച്ചു.നിരവധി നൂറ്റാണ്ടുകൾക്ക് ശേഷം ലിയനാർഡോ
    ഡാവിഞ്ചി, ജ്വലനത്തിലും ശ്വസനത്തിലും വായുവിൻ്റെ ഒരു ഭാഗം ദഹിപ്പിക്കപ്പെടുന്നുവെന്ന് നിരീക്ഷിച്ചുകൊണ്ട് ഫിലോയുടെ കൃതികൾ
    നിർമ്മിച്ചു.
  - నైరుతి ఫ్రెస్నోలోని ఫ్రెస్నో స్ట్రీట్ నుండి కెర్మాన్, కాలిఫోర్నియా వరకు పశ్చిమాన ౨౦ మైళ్ల (౩౨ కి.మీ) వరకు విస్తరించి ఉన్న
    ౨౦వ శతాబ్దపు ప్రారంభ వ్యవస్థాపకుడు మరియు మిలియనీర్ మ్. థియో కెర్నీ పేరు మీదుగా కెర్నీ బౌలేవార్డ్‌ను పొరుగు ప్రాంతంలో చేర్చారు.ఒక
    చిన్న, రెండు లేన్ల గ్రామీణ రహదారి దాని పొడవులో ఎక్కువ భాగం, కెర్నీ బౌలేవార్డ్ పొడవైన తాటి చెట్లతో కప్పబడి ఉంది.ఫ్రెస్నో
    స్ట్రీట్ మరియు థోర్న్ ఏవ్ మధ్య ఉన్న కెర్నీ బౌలేవార్డ్ యొక్క దాదాపు అర-మైలు విస్తీర్ణం ఒకప్పుడు ఫ్రెస్నో యొక్క ఎలైట్ ఆఫ్రికన్-అమెరికన్
    కుటుంబాలకు ఇష్టపడే పొరుగు ప్రాంతం.మరొక విభాగం, బ్రూక్‌హావెన్, జెన్‌సన్‌కు దక్షిణాన వెస్ట్ సైడ్ యొక్క దక్షిణ అంచున మరియు
    ఎల్మ్‌కు పశ్చిమాన, పొరుగువారి ఇమేజ్‌ను పునరుద్ధరించే ప్రయత్నంలో ఫ్రెస్నో సిటీ కౌన్సిల్ ఈ పేరును పెట్టింది.స్థానిక గ్యాంగ్‌కు
    సంబంధించి ఏకాంత ఉపవిభాగం "డాగ్ పౌండ్" అని పిలువబడింది మరియు ౨౦౦౮ చివరి నాటికి అధిక స్థాయి హింసాత్మక నేరాలకు ప్రసిద్ధి
