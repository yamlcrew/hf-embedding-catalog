      परिणाम झाला आहे.अनेक राज्यांमध्ये उपस्थित असलेली प्रमुख परीक्षा मंडळे म्हणजे सीबीएसई आणि सिसी, नेन्बसे
    - '१८९० के दशक में, शिकागो विश्वविद्यालय को डर था कि उसके विशाल संसाधन अच्छे छात्रों को आकर्षित करके छोटे स्कूलों को नुकसान
      पहुंचाएंगे, इसलिए उसने कई क्षेत्रीय कॉलेजों और विश्वविद्यालयों से सम्बद्धता स्थापित कर ली: डेस मोइनेस कॉलेज, कालामाजू
      कॉलेज, बटलर विश्वविद्यालय और स्टेटसन विश्वविद्यालय।१८९६ में, विश्वविद्यालय माउंट कैरोल, इलिनोइस में शिमर कॉलेज से संबद्ध
      हो गया।संबद्धता की शर्तों के तहत, विद्यालयों को विश्वविद्यालय के समतुल्य अध्ययन पाठ्यक्रम रखना, किसी भी संभावित प्राध्यापक
      की नियुक्ति या बर्खास्तगी के बारे में विश्वविद्यालय को पहले से सूचित करना, विश्वविद्यालय की स्वीकृति के बिना कोई प्राध्यापक
      नियुक्तियां नहीं करना, तथा सुझावों के लिए परीक्षाओं की प्रतियां भेजना आवश्यक था।शिकागो विश्वविद्यालय ने संबद्ध विद्यालय
      से स्नातक करने वाले किसी भी ऐसे वरिष्ठ छात्र को डिग्री प्रदान करने पर सहमति व्यक्त की है, जिसने सभी चार वर्षों में आ
      ग्रेड प्राप्त किया हो, तथा किसी भी अन्य स्नातक को, जिसने शिकागो विश्वविद्यालय में बारह सप्ताह का अतिरिक्त अध्ययन किया
      हो।किसी सम्बद्ध स्कूल का छात्र या संकाय सदस्य शिकागो विश्वविद्यालय में निःशुल्क ट्यूशन पाने का हकदार था, तथा शिकागो
      के छात्र भी उन्हीं शर्तों पर सम्बद्ध स्कूल में पढ़ने तथा अपने काम के लिए क्रेडिट पाने के पात्र थे।शिकागो विश्वविद्यालय
      ने संबद्ध स्कूलों को निःशुल्क पुस्तकें, वैज्ञानिक उपकरण और सामग्री उपलब्ध कराने, यात्रा व्यय को छोड़कर विशेष प्रशिक्षक
      और व्याख्याता उपलब्ध कराने, तथा शिकागो विश्वविद्यालय प्रेस द्वारा प्रकाशित प्रत्येक पुस्तक और पत्रिका की एक प्रति निःशुल्क
      उपलब्ध कराने पर भी सहमति व्यक्त की।समझौते में यह प्रावधान था कि कोई भी पक्ष उचित नोटिस देकर सम्बद्धता समाप्त कर सकता
      है।शिकागो विश्वविद्यालय के कई प्रोफेसरों को यह कार्यक्रम पसंद नहीं आया, क्योंकि इसमें उन्हें बिना पारिश्रमिक के अतिरिक्त
      श्रम करना पड़ता था, तथा उनका मानना ​​था कि इससे विश्वविद्यालय की शैक्षणिक प्रतिष्ठा को ठेस पहुंची।यह कार्यक्रम १९१०
      तक इतिहास में समा गया।'
  - source_sentence: ਪਾਲ ਬਾਰਨ ਨੇ ਕੀ ਵਿਕਾਸ ਕੀਤਾ
    sentences:
    - దక్షిణ కాలిఫోర్నియా ఆర్థిక వ్యవస్థ వైవిధ్యమైనది మరియు యునైటెడ్ స్టేట్స్‌లో అతిపెద్దది.ఇది పెట్రోలియం యొక్క సమృద్ధిపై
      ఎక్కువగా ఆధారపడి ఉంటుంది, ఇతర ప్రాంతాలకు భిన్నంగా ఆటోమొబైల్స్ దాదాపుగా ఆధిపత్యం వహించవు, రవాణాలో అత్యధిక భాగం ఈ ఇంధనంపై
      నడుస్తుంది.దక్షిణ కాలిఫోర్నియా పర్యాటకం మరియు హాలీవుడ్ (సినిమా, టెలివిజన్ మరియు సంగీతం)కి ప్రసిద్ధి చెందింది.ఇతర పరిశ్రమలలో
      సాఫ్ట్‌వేర్, ఆటోమోటివ్, పోర్ట్‌లు, ఫైనాన్స్, టూరిజం, బయోమెడికల్ మరియు ప్రాంతీయ లాజిస్టిక్స్ ఉన్నాయి.ఈ ప్రాంతం హౌసింగ్
      బబుల్ ౨౦౦౧–౨౦౦౭లో అగ్రగామిగా ఉంది మరియు హౌసింగ్ క్రాష్‌తో భారీగా ప్రభావితమైంది.
    - 'ਬਾਰਨ ਨੇ ਯੂਐਸ ਏਅਰ ਫੋਰਸ ਲਈ ਰੈਂਡ ਕਾਰਪੋਰੇਸ਼ਨ ਵਿੱਚ ਆਪਣੀ ਖੋਜ ਦੌਰਾਨ ਸਰਵਾਈਵੇਬਲ ਕਮਿਊਨੀਕੇਸ਼ਨ ਨੈੱਟਵਰਕਾਂ ਵਿੱਚ ਵੰਡੇ ਗਏ ਅਡੈਪਟਿਵ ਮੈਸੇਜ
      ਬਲਾਕ ਸਵਿਚਿੰਗ ਦੀ ਧਾਰਨਾ ਵਿਕਸਿਤ ਕੀਤੀ, ਜੋ ਪਹਿਲਾਂ ੧੯੬੧ ਦੀਆਂ ਗਰਮੀਆਂ ਵਿੱਚ ਹਵਾਈ ਸੈਨਾ ਨੂੰ ਬ੍ਰੀਫਿੰਗ ਬੀ-੨੬੫ ਦੇ ਰੂਪ ਵਿੱਚ ਪੇਸ਼ ਕੀਤੀ
      ਗਈ ਸੀ, ਬਾਅਦ ਵਿੱਚ ਰੈਂਡ ਰਿਪੋਰਟ ਪੀ ਦੇ ਰੂਪ ਵਿੱਚ ਪ੍ਰਕਾਸ਼ਿਤ ਕੀਤੀ ਗਈ ਸੀ। ੧੯੬੨ ਵਿੱਚ -੨੬੨੬, ਅਤੇ ਅੰਤ ਵਿੱਚ ੧੯੬੪ ਵਿੱਚ ਰਿਪੋਰਟ ਆਰਐਮ
      ੩੪੨੦ ਵਿੱਚ।ਰਿਪੋਰਟ ਪੀ-੨੬੨੬ ਨੇ ਇੱਕ ਵੱਡੇ ਪੈਮਾਨੇ, ਵੰਡੇ, ਬਚਣ ਯੋਗ ਸੰਚਾਰ ਨੈਟਵਰਕ ਲਈ ਇੱਕ ਆਮ ਆਰਕੀਟੈਕਚਰ ਦਾ ਵਰਣਨ ਕੀਤਾ ਹੈ।ਇਹ ਕੰਮ ਤਿੰਨ
      ਮੁੱਖ ਵਿਚਾਰਾਂ ''ਤੇ ਕੇਂਦ੍ਰਿਤ ਹੈ: ਕਿਸੇ ਵੀ ਦੋ ਬਿੰਦੂਆਂ ਦੇ ਵਿਚਕਾਰ ਕਈ ਮਾਰਗਾਂ ਵਾਲੇ ਵਿਕੇਂਦਰੀਕ੍ਰਿਤ ਨੈਟਵਰਕ ਦੀ ਵਰਤੋਂ, ਉਪਭੋਗਤਾ ਸੰਦੇਸ਼ਾਂ
      ਨੂੰ ਸੰਦੇਸ਼ ਬਲਾਕਾਂ ਵਿੱਚ ਵੰਡਣਾ, ਬਾਅਦ ਵਿੱਚ ਪੈਕੇਟ ਕਿਹਾ ਜਾਂਦਾ ਹੈ, ਅਤੇ ਸਟੋਰ ਅਤੇ ਫਾਰਵਰਡ ਸਵਿਚਿੰਗ ਦੁਆਰਾ ਇਹਨਾਂ ਸੁਨੇਹਿਆਂ ਦੀ ਡਿਲੀਵਰੀ।'
    - ੧੯੫੦ ਦੇ ਦਹਾਕੇ ਦੇ ਅਖੀਰ ਵਿੱਚ, ਅਮਰੀਕੀ ਕੰਪਿਊਟਰ ਵਿਗਿਆਨੀ ਪਾਲ ਬਾਰਨ ਨੇ ਅਮਰੀਕਾ ਦੁਆਰਾ ਫੰਡ ਕੀਤੇ ਗਏ ਰੈਂਡ ਕਾਰਪੋਰੇਸ਼ਨ ਦੇ ਇੱਕ ਖੋਜ ਪ੍ਰੋਗਰਾਮ
      ਦੇ ਹਿੱਸੇ ਵਜੋਂ ਦੂਰਸੰਚਾਰ ਸੰਦੇਸ਼ਾਂ ਲਈ ਇੱਕ ਨੁਕਸ-ਸਹਿਣਸ਼ੀਲ, ਕੁਸ਼ਲ ਰੂਟਿੰਗ ਵਿਧੀ ਪ੍ਰਦਾਨ ਕਰਨ ਦੇ ਟੀਚੇ ਨਾਲ ਡਿਸਟ੍ਰੀਬਿਊਟਿਡ ਅਡੈਪਟਿਵ
      ਮੈਸੇਜ ਬਲਾਕ ਸਵਿਚਿੰਗ ਦੀ ਧਾਰਨਾ ਵਿਕਸਿਤ ਕੀਤੀ। ਰੱਖਿਆ ਵਿਭਾਗ।ਇਸ ਸੰਕਲਪ ਨੇ ਨੈੱਟਵਰਕ ਬੈਂਡਵਿਡਥ ਦੇ ਪੂਰਵ-ਅਲੋਕੇਸ਼ਨ ਦੇ ਇਸ ਤੋਂ ਪਹਿਲਾਂ
      ਸਥਾਪਿਤ ਸਿਧਾਂਤਾਂ ਦਾ ਵਿਰੋਧ ਅਤੇ ਵਿਰੋਧ ਕੀਤਾ, ਜੋ ਕਿ ਬੇਲ ਸਿਸਟਮ ਵਿੱਚ ਦੂਰਸੰਚਾਰ ਦੇ ਵਿਕਾਸ ਦੁਆਰਾ ਵੱਡੇ ਪੱਧਰ 'ਤੇ ਮਜ਼ਬੂਤ ​​ਕੀਤਾ ਗਿਆ
      ਸੀ।੧੯੬੦ ਦੇ ਦਹਾਕੇ ਦੇ ਅਖੀਰ ਵਿੱਚ ਨੈਸ਼ਨਲ ਫਿਜ਼ੀਕਲ ਲੈਬਾਰਟਰੀ (ਯੂਨਾਈਟਡ ਕਿੰਗਡਮ) (ਐਨਪੀਐਲ) ਵਿੱਚ ਡੋਨਾਲਡ ਡੇਵਿਸ ਦੇ ਸੁਤੰਤਰ ਕੰਮ ਤੱਕ
      ਨਵੀਂ ਧਾਰਨਾ ਨੂੰ ਨੈੱਟਵਰਕ ਲਾਗੂ ਕਰਨ ਵਾਲਿਆਂ ਵਿੱਚ ਬਹੁਤ ਘੱਟ ਗੂੰਜ ਮਿਲੀ।ਡੇਵਿਸ ਨੂੰ ਆਧੁਨਿਕ ਨਾਮ ਪੈਕੇਟ ਸਵਿਚਿੰਗ ਬਣਾਉਣ ਅਤੇ ਅਗਲੇ ਦਹਾਕੇ
      ਵਿੱਚ ਯੂਰਪ ਵਿੱਚ ਬਹੁਤ ਸਾਰੇ ਪੈਕੇਟ ਸਵਿਚਿੰਗ ਨੈਟਵਰਕ ਨੂੰ ਪ੍ਰੇਰਿਤ ਕਰਨ ਦਾ ਸਿਹਰਾ ਦਿੱਤਾ ਜਾਂਦਾ ਹੈ, ਜਿਸ ਵਿੱਚ ਸੰਯੁਕਤ ਰਾਜ ਵਿੱਚ ਅਰਪਾਨੇਟ
      ਦੇ ਅਰੰਭਕ ਵਿੱਚ ਸੰਕਲਪ ਨੂੰ ਸ਼ਾਮਲ ਕਰਨਾ ਸ਼ਾਮਲ ਹੈ।
