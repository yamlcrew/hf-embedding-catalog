- source_sentence: विश्वविद्यालय का शैक्षणिक निकाय कितने स्नातक विभागों से बना है?
  sentences:
  - शिकागो विश्वविद्यालय के शैक्षणिक निकायों में कॉलेज, स्नातकोत्तर अनुसंधान के चार प्रभाग और सात व्यावसायिक स्कूल शामिल हैं।विश्वविद्यालय
    में एक पुस्तकालय प्रणाली, शिकागो विश्वविद्यालय प्रेस, शिकागो विश्वविद्यालय प्रयोगशाला स्कूल और शिकागो विश्वविद्यालय चिकित्सा
    केंद्र भी हैं, तथा फर्मीलैब, आर्गोन राष्ट्रीय प्रयोगशाला और समुद्री जैविक प्रयोगशाला सहित कई स्वतंत्र शैक्षणिक संस्थानों
    के साथ इसके संबंध हैं।विश्वविद्यालय को उच्च शिक्षा आयोग द्वारा मान्यता प्राप्त है।
  - भारतात, खाजगी शाळांना स्वतंत्र शाळा म्हणतात, परंतु काही खाजगी शाळांना सरकारकडून आर्थिक मदत मिळत असल्याने, ती अनुदानित
    किंवा विनाअनुदानित शाळा असू शकते.तर, काटेकोर अर्थाने, खाजगी शाळा ही विनाअनुदानित स्वतंत्र शाळा आहे.या व्याख्येच्या हेतूसाठी,
    केवळ आर्थिक मदतीची पावती ग्राह्य धरली जाते, सरकारकडून अनुदानित दराने खरेदी केलेली जमीन नाही.राज्यघटनेतील विधायी विषयांच्या
    समवर्ती सूचीमध्ये शिक्षण दिल्यामुळे शाळांचे संचालन करणे केंद्र सरकार आणि राज्य सरकार या दोघांच्याही अधिकारात आहे.केंद्र
    सरकारला व्यापक धोरण निर्देश देण्याची प्रथा आहे तर राज्ये या क्षेत्राच्या प्रशासनासाठी स्वतःचे नियम आणि नियम तयार करतात.इतर
    गोष्टींबरोबरच, यामुळे शाळा सोडल्याच्या प्रमाणपत्रांसाठी परीक्षा घेणार्‍या ३० विविध परीक्षा मंडळे किंवा शैक्षणिक प्राधिकरणांवर
    परिणाम झाला आहे.अनेक राज्यांमध्ये उपस्थित असलेली प्रमुख परीक्षा मंडळे म्हणजे सीबीएसई आणि सिसी, नेन्बसे
  - '१८९० के दशक में, शिकागो विश्वविद्यालय को डर था कि उसके विशाल संसाधन अच्छे छात्रों को आकर्षित करके छोटे स्कूलों को नुकसान
    पहुंचाएंगे, इसलिए उसने कई क्षेत्रीय कॉलेजों और विश्वविद्यालयों से सम्बद्धता स्थापित कर ली: डेस मोइनेस कॉलेज, कालामाजू
    कॉलेज, बटलर विश्वविद्यालय और स्टेटसन विश्वविद्यालय।१८९६ में, विश्वविद्यालय माउंट कैरोल, इलिनोइस में शिमर कॉलेज से संबद्ध
    हो गया।संबद्धता की शर्तों के तहत, विद्यालयों को विश्वविद्यालय के समतुल्य अध्ययन पाठ्यक्रम रखना, किसी भी संभावित प्राध्यापक
    की नियुक्ति या बर्खास्तगी के बारे में विश्वविद्यालय को पहले से सूचित करना, विश्वविद्यालय की स्वीकृति के बिना कोई प्राध्यापक
    नियुक्तियां नहीं करना, तथा सुझावों के लिए परीक्षाओं की प्रतियां भेजना आवश्यक था।शिकागो विश्वविद्यालय ने संबद्ध विद्यालय
    से स्नातक करने वाले किसी भी ऐसे वरिष्ठ छात्र को डिग्री प्रदान करने पर सहमति व्यक्त की है, जिसने सभी चार वर्षों में आ ग्रेड
    प्राप्त किया हो, तथा किसी भी अन्य स्नातक को, जिसने शिकागो विश्वविद्यालय में बारह सप्ताह का अतिरिक्त अध्ययन किया हो।किसी
    सम्बद्ध स्कूल का छात्र या संकाय सदस्य शिकागो विश्वविद्यालय में निःशुल्क ट्यूशन पाने का हकदार था, तथा शिकागो के छात्र भी
    उन्हीं शर्तों पर सम्बद्ध स्कूल में पढ़ने तथा अपने काम के लिए क्रेडिट पाने के पात्र थे।शिकागो विश्वविद्यालय ने संबद्ध स्कूलों
    को निःशुल्क पुस्तकें, वैज्ञानिक उपकरण और सामग्री उपलब्ध कराने, यात्रा व्यय को छोड़कर विशेष प्रशिक्षक और व्याख्याता उपलब्ध
    कराने, तथा शिकागो विश्वविद्यालय प्रेस द्वारा प्रकाशित प्रत्येक पुस्तक और पत्रिका की एक प्रति निःशुल्क उपलब्ध कराने पर
    भी सहमति व्यक्त की।समझौते में यह प्रावधान था कि कोई भी पक्ष उचित नोटिस देकर सम्बद्धता समाप्त कर सकता है।शिकागो विश्वविद्यालय
    के कई प्रोफेसरों को यह कार्यक्रम पसंद नहीं आया, क्योंकि इसमें उन्हें बिना पारिश्रमिक के अतिरिक्त श्रम करना पड़ता था, तथा
    उनका मानना ​​था कि इससे विश्वविद्यालय की शैक्षणिक प्रतिष्ठा को ठेस पहुंची।यह कार्यक्रम १९१० तक इतिहास में समा गया।'
