    - 'Seigarrena. Euskal Herriko Agintaritzaren Aldizkarian eta Arabako Aldizkari Ofizialean Agindu hau argitaratzea.

      AZKEN XEDAPENAK

      Lehenengoa. Inskribatzeko den Agindu honek Euskal Herriko Agintaritzaren Aldizkarian argitaratzen den egunetik izango
      du ondorioak.

      Bigarrena. Administrazio-bidea amaitzen duen Agindu honen aurka, interesdunek aukerako berraztertzeko errekurtsoa jar
      diezaiokete Kultura sailburuari hilabeteko epean, edo bestela, administrazioarekiko auzi-errekurtsoa Euskal Autonomia
      Erkidegoko Auzitegi Nagusiko administrazioarekiko auzietarako salari bi hilabeteko epean, Agindu hau argitaratzen edo
      jakinarazten den egunaren biharamunetik hasita.

      Vitoria-Gasteiz, 2011ko martxoaren 15a.

      Kulturako sailburua,

      MARÍA BLANCA URGELL LÁZARO.

      I. ERANSKINA

      MUGAKETA

      a) Mugaketaren deskribapena.

      Mugatutako eremuaren barne geratzen dira, bai eraikina bera, bai eraikin horren ingurua. Horrela, bada, mugaketa-eremuak
      honako muga hauek ditu: NEn, baserriaren lurrek ondoko errotarekin duten muga; NWn, fatxadarekiko lerro paraleloa, 15
      m-ra; SWra, baserriaren lurrek ondoko etxebizitzarekin eta haren eraikin osagarriekin duten muga, eta SEn, Goikoplaza
      kalearen espaloia.

      b) Mugaketaren justifikazioa.

      Mugaketa hori proposatzeko arrazoia izan da beharrezko ikusten dela Laudioko Etxebarri edo Goikoplaza 16 baserriaren
      ingurumena eta ikus-bista zaintzea. Ingurunearen mugaketak beharrezkoa baita ondarea behar bezala babesteko eta balioesteko
      baserriaren inguruko lurren eta eraikinerako sarbidearen babesa dakar berekin, betiere, baserriaren bereizgarritasunak
      kontserbatzeko. Horregatik, mugaketa honek baserri-eraikina ez ezik inguruko lursailak ere bereganatzen ditu.

      II. ERANSKINA

      DESKRIPZIOA'
