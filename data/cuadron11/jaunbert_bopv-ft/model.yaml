- source_sentence: Zein da Etxebarriko Udalak eta Polizia eta Larrialdietako Euskal Akademiak sinatutako akordioaren helburua
    tokiko poliziaren oinarrizko eskalako agente-plazak bitarteko-erregimenean estaltzeari dagokionez?
  sentences:
  - 'Gobernu Kontseiluak, 2022ko urtarrilaren 25ean egindako bilkuran, Amorebieta-Etxanoko Befesa Zinc Oxido S.A.U. enpresari
    dagokion kanpoko larrialdietako plana onartzeko erabakia hartu zuen, eta behar bezalako publikotasuna emateko, honako
    hau

    EBAZTEN DUT

    :

    Artikulu bakarra

    Euskal Herriko Agintaritzaren Aldizkarian argitaratzea Amorebieta-Etxanoko Befesa Zinc Oxido S.A.U. enpresari dagokion
    kanpoko larrialdietako plana onartzeko erabakiaren testua. Ebazpen honi atxikita dago.

    Vitoria-Gasteiz, 2022ko urtarrilaren 31.

    Jaurlaritzaren Idazkaritzako eta Legebiltzarrarekiko Harremanetarako zuzendaria,

    JON IÑAKI URBINA GARCÍA DE VICUÑA.

    ERANSKINA, JAURLARITZAREN IDAZKARITZAKO ETA LEGEBILTZARRAREKIKO HARREMANETARAKO ZUZENDARIAREN URTARRILAREN 31KO 18/2022
    EBAZPENARENA

    ERABAKIA, AMOREBIETA-ETXANOKO BEFESA ZINC OXIDO S.A.U. ENPRESARI DAGOKION KANPOKO LARRIALDIETAKO PLANA ONARTZEKOA

    1/2017 Legegintzako Dekretuak onartutako Larrialdiak Kudeatzeko Legearen testu bateginaren 10. artikuluaren arabera, Eusko
    Jaurlaritza da Euskal Autonomia Erkidegoko babes zibila zuzentzeko eta koordinatzeko organo gorena, bere eskumenen esparruan.
    Testu bategin beraren 11. artikuluak dioenez, Segurtasun Saila da Babes Zibileko politikaren organo arduraduna, Eusko
    Jaurlaritzak ezarritako helburu orokorrekin bat etorriz.

    Erabaki-proposamen honen xedea da goiburuan aipatzen den kanpoko larrialdietako plana (aurrerantzean, KLP) Gobernu Kontseiluari
    aurkeztea, hark onar dezan.

    Kanpoko larrialdietako plana babes zibileko plan berezia da, eta haren helburua da kanpoko erantzuna antolatzea instalazio
    horietan gerta litezkeen eta enpresaren kanpoaldean eragina izan dezaketen istripu-hipotesi jakin batzuen aurrean. Ildo
    horretan, enpresak barneko larrialdietako planean aurreikusi dituen neurriak osatzen ditu.'
  - Hitzarmen honen helburua da, beraz, udal sinatzaileen eskaerei erantzutea, eta haiei aldi baterako estaldura-zerbitzua
    eskaintzea, bitarteko-erregimenean, tokiko poliziaren oinarrizko eskalako agente-plazak
  - 'Bestetik, Loren Oliva Santamaría Etxebarriko Udaleko alkatea, hori ordezkatuz.

    Bi alderdiek, duten ordezkaritzarekin bat, dagozkien eskuduntzetan jardunez eta elkarri ordezkaritza horretatik ondorioztatzen
    diren ahalmenak errekonozituta,

    AZALDU DUTE:

    Lehenengoa. Jarduten ari diren bi administrazioak jabe direla toki mailan tokiko poliziaren oinarrizko eskalako agente-plazak
    bitarteko-erregimenean estaltzeak eragiten dituen arazoez. Halakoak estaltzea beharrezkoa izaten da bai oporraldietan,
    oro har, udan, edota aurreikusi ezinezko baldintzetan edo bestelakoetan, eta nolanahi ere bitarteko agente horiek kontratatu
    behar izaten direla dagozkien funtzioak betetzeko.

    Bigarrena. Arazo horri ondo helduko bazaio, aipatutako bi aldeek batera bultzatu beharko dute Udaltzaingoko Oinarrizko
    Eskalako bitarteko agente izateko lan-poltsa bat sortzeko; Udalek, hala, hango pertsonak bizkor eta eraginkor kontratatu
    ahal izango dituzte, behar dutenean, lehendik egongo baitira hautatuta eta beren funtzioak ondo gauzatzeko trebatuta eta
    gaituta.

    Hirugarrena. Halaber, Euskal Autonomia Erkidegoko Segurtasun Publikoaren Sistemak Ertzaintzaren eta Udaltzaingoen arteko
    lankidetza- eta koordinazio-mekanismo bateratuak behar ditu, hain zuzen, azken horien ekintza-baliabideak optimizatzeko.

    Laugarrena. Sinatzen duen udalak ez ditu berezko baliabide teknikoak bitarteko tokiko agenteak hautatzeko eta prestatzeko,
    eta, Polizia eta Larrialdietako Euskal Akademiak horretarako baliabideak eta azpiegiturak dituenez, bi alderdiek jotzen
    dute egokia dela Akademia erabiltzea, bitarteko-erregimenean, beharrezkoak diren tokiko poliziako oinarrizko eskalako
    bitarteko agente-plazak estaltzeko.'
- source_sentence: Zein dira Arabako Erakunde Sanitario Integratuko Kanpo Kontsulten Gainbegirale lanpostua lortzeko baldintzak?
  sentences:
  - Arabako Erakunde Sanitario Integratuko Medikuntza Intentsiboko Unitatearen Gainbegirale lanpostua (Arabako Unibertsitate
    Ospitaleko Santiago egoitza) hutsik dago.
  - 'Arabako Erakunde Sanitario Integratuko Arabako Unibertsitate Ospitaleko Kanpo Kontsulten Gainbegirale lanpostua hutsik
    egongo dela aurreikusi da. Hori dela-eta, Euskadiko Antolamendu Sanitarioari buruzko ekainaren 26ko 8/1997 Legearen 28.
    artikuluaren hirugarren arau komunean, Osakidetzaren lanpostu funtzionalak arautzen dituen uztailaren 19ko 186/2005 Dekretuan
    eta azaroaren 11ko 255/1997 Dekretuan ezartzen denaren arabera, lanpostu hori izendapen askez betetzeko deialdi publikoa
    iragartzea erabaki du Zuzendaritza Gerentzia honek, honako oinarrien arabera

    OINARRIAK

    Parte hartzeko baldintzak.

    Deialdi honetan parte hartu ahal izango dute baldintza hauek betetzen dituztela egiaztatzen dutenek:

    a) Osakidetzako edozein zerbitzu-erakundetako langile finkoa izatea (estatutupekoa, funtzionarioa edo lan-legepeko kontratuduna)
    eta lanpostua jabetzan edukitzea B1 lanbide-taldean.

    b) B1 (Diplomadun sanitarioak) lanbide-taldearen titulazioa edukitzea.

    c) Hiru urteko lan-esperientzia B1 taldean, gutxienez, edukitzea.

    d) Hizkuntza-eskakizuna: 2. hizkuntza-eskakizuna, derrigortasun-datarik gabe.

    e) Uztailaren 19ko 186/2005 Dekretuaren eta Osakidetzako Euskara Planaren gainerako betebeharrak betetzea.

    Aintzat hartuko diren merezimenduak.

    a) Erizaintzako zerbitzu edota Unitateetan prestakuntza edo lan esperientzia.

    b) Taldeak antolatzeko eta kudeatzeko esperientzia izatea.

    c) Giza Baliabideen Kudeaketarako laguntza-tresnen ezagutza.

    d) Formakuntza edota ezagutza kudeaketa tresnetan, kalitate ereduetan, prozesuetan, hala nola, prozesu eta etengabeko
    hobekuntzan, ISO eta MGAn.

    e) Ebidentziatan oinarritutako praktika/ezagutza (BPSO egiaztapena).

    Lanpostu hau betetzeko interesgarria izan daitekeen eta balioa erants dezakeen edozein merezimendu aurkeztu ahalko da.

    Euskararen ezagutza.

    Osakidetza-Euskal osasun zerbitzuan Euskararen erabilera normalizatzeko martxoaren 18ko 67/2003 Dekretuak eta berau garatzen
    duten arauek xedatutakoaren arabera egingo da balorazioa.

    Eskaerak egiteko epea eta aurkezteko modua.'
