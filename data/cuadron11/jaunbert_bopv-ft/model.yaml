  - source_sentence: Zein dira moluskuen ekoizpeneko guneen sailkapenak Euskal Autonomia Erkidegoko itsasertzean?
    sentences:
    - Agindu honek xedetzat du Euskal Autonomia Erkidegoko itsasertzeko moluskuen ekoizpeneko aldeen aitorpena eta sailkapena
      ezartzea.
    - 'Kostuaren eta plazen arteko erlazio onuragarriena: gehienez, 5 puntu.

      Jarduera nagusia nekazaritza izatea: 10 puntu.

      Seigarrena. Burutzeko epea.

      2018ko ekitaldirako, apirilaren 17ko 62/2007 Dekretuko 2. artikuluak aipatutako diruz lagun daitezkeen jarduerak burutzeko
      epea ezin izango da izan 2018ko abenduaren 31tik haratagokoa.

      Zazpigarrena. Errekurtsoak.

      Agindu honek amaiera ematen dio administrazio-bideari, eta, beronen aurka, aukerako berraztertze-errekurtsoa jar dakioke
      Ekonomiaren Garapeneko eta Azpiegituretako sailburuari, hilabeteko epean. Bestela, administrazioarekiko auzi-errekurtsoa
      aurkez daiteke Euskal Autonomia Erkidegoko Justizia Auzitegi Nagusiko Administrazioarekiko Auzien Salan, bi hilabeteko
      epean. Kasu bietan, agindua argitaratu eta biharamunean hasiko da epea.

      AZKEN XEDAPENA

      Agindu honek Euskal Herriko Agintaritzaren Aldizkarian argitaratu eta biharamunetik aurrera izango ditu ondorioak.

      Vitoria-Gasteiz, 2018ko maiatzaren 30a.

      Ekonomiaren Garapeneko eta Azpiegituretako sailburua,

      MARÍA ARANZAZU TAPIA OTAEGUI.

      (Ikus .PDF)'
    - 'B eta C motetan sailkatutako guneei dagokienez, ohartarazi beharra dago, arazteko zentrorik eta berrezarpeneko gunerik
      ez dagoenez, debekatuta dagoela gune horietan moluskuak biltzea.

      Itsasoko aisialdi-arrantzaren erregelamendua onesten duen urriaren 3ko 198/2000 Dekretuaren azken xedapenak eskumena
      ematen dio arrantzaren arloko eskumena duen sailburuari dekretu horretan xedatutakoa garatu eta betearazteko, eta dekretuaren
      II. eranskineko bigarren apartatuan bildutako espezieak harrapatzeko baldintzak eta aldiak aldarazteko, itsaski-baliabideen
      egoerari buruz egiten diren azterlan eta analisi zientifikoetatik eratorritako gomendioen arabera. Escherichia coli
      bakterioaren kontzentrazioei buruz azterlanek adierazten dituzten datuak ikusita, beharrezkotzat jotzen da ez baimentzea
      198/2000 Dekretuaren II. eranskinak esperimentu gisa aurreikusten zuen kuskubikoen harrapaketa.

      Hori guztia kontuan izanik, hau

      EBAZTEN DUT

      :

      Lehenengoa. Euskal Autonomia Erkidegoko itsasertzeko moluskuen ekoizpeneko guneen kokalekua, mugak eta sailkapena ezartzea,
      Batzordearen 2019ko martxoaren 15eko 2019/627 (EB) Betearazpen Erregelamenduaren 52. artikuluaren arabera.

      Bigarrena. Hondarribia (Bidasoa ibaiaren estuarioa): Ikus I. eta II. eranskinak.

      Sailkapeneko B eremua: ibai-ahotik aireportuko muturrerainoko esparrua (PAV 1/01). Bertan lortutako moluskuek arazketa-prozesu
      bat pasa beharko dute bizirik merkaturatu baino lehen.

      Eremu itxiak: honako hauek moluskuak ekoizteko gune itxiak dira, eta debekatu egiten da bertan moluskuok biltzea:

      Aireportuaren muturretik barrualderantz doan eremua.

      Hondarribiko arrantza-portua.

      Hondarribiko kirol-portua.

      Beteranoen moila.

      Hirugarrena. Mundaka (Oka ibaiaren estuarioa). Ikus I. eta II. eranskinak:'
  - source_sentence: Zein da goi-mailako kirolariaren deklarazioaren indarraldia?
    sentences:
    - Goi-mailako kirolari eta teknikarien deklarazioak lehen aipaturiko dekretuan ezartzen diren ondorioak izango ditu, eta
      haren indarraldia, oro har, lau urtekoa izango da, dekretuan finkatzen den eran.
    - 'Goi Mailako Kirolari buruzko uztailaren 20ko 203/2010 Dekretuak 4.2 artikuluan xedatzen duenez, Eusko Jaurlaritzan
      kirol-arloko eskumena duen sailburuak, Goi Mailako Kirolaren Ebaluazio Batzordearen proposamenez, goi-mailako kirolariaren
      izaera emango die euren kirol-modalitate eta -diziplinan munduko edo Europako onenen artean daudenei, betiere dekretuan
      bertan eta haren I. eranskinean ezarritako hautaketa-irizpideekin bat etorriz, eta Dekretuaren hurrengo artikuluetan
      ezartzen diren baldintzak betetzen badituzte.

      Dekretuaren 6.2 eta 7.2 artikuluen arabera, bestalde, Eusko Jaurlaritzan kirol-arloko eskumena duen sailburuak, Goi
      Mailako Kirolaren Ebaluazio Batzordearen proposamenez, goi-mailako teknikariaren izaera emango dio dekretuan bertan
      ezarritakoaren arabera goi-mailako kirolari deklaratu den pertsona baten edo gehiagoren arduradun tekniko nagusiaren
      eginkizuna betetzen duenari eta goi mailako epaileen izaera honako hauei emango die: nazioarteko kirol-lehiaketetan
      maila horretan aritu, eta kirol-modalitate bakoitzaren nazioarteko federazioaren organoek egindako zerrendetan nazioarteko
      epaile-aitorpena jaso dutenei.

      Goi-mailako kirolari, teknikari eta epaileen deklarazioak lehen aipaturiko dekretuan ezartzen diren ondorioak izango
      ditu, eta haren indarraldia, oro har, lau urtekoa izango da, dekretuan finkatzen den eran.

      Aurkeztu diren eskabide guztiak banan-banan aztertu eta baloratu ondoren, Balorazio Batzordeak, 2016ko abenduaren 2an
      egindako bilkuran, dagokion proposamena egin zuen.

      Ondorioz, hauxe

      EBATZI DUT

      :

      Lehenengoa. Goi Mailako Kirolaren Ebaluazio Batzordearen proposamena ikusita, I eranskinean aipatzen direnak deklaratzea
      goi-mailako kirolari eta teknikari, Goi Mailako Kirolari buruzko uztailaren 20ko 203/2010 Dekretuan ezarritako ondorioekin.

      Bigarrena. Deklarazioa indarrean sartuko da Euskal Herriko Agintaritzaren Aldizkarian agindu hau argitaratzen denean.'
    - '2012ko ekainaren 25ean, Euskal Autonomia Erkidegoko esnetarako behien abeltzaintza-ustiategietan abereen ongizatea
      hobetzeko laguntzei buruzko maiatzaren 29ko 100/2012 Dekretua argitaratu zen. Dekretu honen bidez, esnetarako behien
      abeltzaintza-ustiategiei lagundu nahi zaie. Laguntza horiek jaso ahal izateko, abereen ongizatea hobetzeko neurriak
      hartu beharko dituzte, eta neurriok arlo honetan dagoeneko nahitaezkoak direnak baino eskakizun handiagoak izan beharko
      dituzte.

      Agindu honen bidez, 2014. urterako laguntzetarako deia egin nahi da, maiatzaren 29ko 100/2012 Dekretuaren 6. artikuluarekin
      bat etorriz. Artikulu horren arabera, nekazaritza eta abeltzaintza arloetan eskumena duen saileko pertsona titularrak
      egingo duen agindu baten bidez, dekretu honetan jasotako laguntzen deialdia egingo du, eta hala, eskabideak aurkezteko
      epea zabalduko da. Laguntza horiek jasotzeko gutxienez 5 urteko kontratua sinatu behar denez, bereizketa egiten da laguntza
      lehenengo aldiz eskatu dutenen eta konpromisoa sinatu aurreko ekitaldietan eskatu dutenen artean.

      Bestetik, Euskal Autonomia Erkidegoko Aurrekontuen Araubideari buruz indarrean dauden lege-xedapenen Testu Bategina
      onetsi duen irailaren 27ko 1/1994 Legegintzako Dekretuak eta Euskal Autonomia Erkidegoko 2014ko Aurrekontu Orokorrak
      onetsi dituen abenduaren 20ko 4/2013 Legeak bide ematen dute aurtengo laguntzen deialdia egiteko.

      Hori dela eta, honako hau

      EBAZTEN DUT

      :

      Lehenengoa. Deialdia.

      Agindu honen bidez, esnetarako behien abeltzaintza-ustiategietan abereen ongizatea hobetzeko laguntzei buruzko maiatzaren
      29ko 100/2012 Dekretuan ezarritako laguntzetarako dei egiten da, 2014. urteari begira.

      Bigarrena. Eskabideak aurkeztea.'
