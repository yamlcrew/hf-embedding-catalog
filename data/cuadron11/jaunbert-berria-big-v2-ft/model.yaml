  - source_sentence: Motoz bidaiatzean, zein abantaila eskaintzen ditu motoak autoaren aldean?
    sentences:
    - 'Enpresei dagokienez, beste abantaila batzuk ikusten dizkio kontratu horiei: bezeroari malgutasuna eskaintzen diote,
      eta autoak eta furgonetak erosteak enpresen kontabilitatean eragiten du.'
    - 'IRIBAR: Hori da. Ikusita haraino gindoazela, bidean zer ikus genezakeen identifikatu genuen, azken finean Euskal Herritik
      Errumaniaraino hainbat herrialde daude-eta tartean. Azkenean, bidaian Frantzia, Suitza, Austria, Hungaria, Errumania,
      Serbia, Kroazia eta Italia zeharkatu genituen. Inprobisatzen joaten ginen askotan, betiere eguraldiak baldintzaturik.


      Euritan, beraz, ez zenuten bidaiatu?


      ZUBIMENDI: Bai, baina traje berezi batekin, ez bustitzeko.


      IRIBAR: Eguraldi txarreko egunak hiri handiak bisitatzeko baliatu genituen. Eslovenian, adibidez, oso eguraldi txarra
      egin zigun, eta leku asko urpean gelditu ziren. Hor gure planak aldatu behar izan genituen.


      Zer eraman zenuten zuekin?


      ZUBIMENDI: Zorionez, badugu lekua motoan, bidaiatzeko oso aproposa baita. Alboan bi maleta genituen, bakoitzak berea,
      eta atzeko kutxan kanpin denda eta lo egitekoak. Kanpinetan egin dugu lo gehienbat; erosotasuna lehenetsi dugu.


      Autoarekin alderatuta, zer ematen dizue motoak?


      ZUBIMENDI: Motoan panoramika osoa duzu, alboan duzun dena ikusten da, eta autoan, aldiz, leihoek baldintzatzen zaituzte.
      Inguruan duzun guztia sentitzen da. Euria egiten duenean hezetasun hori nabaritzen duzu, adibidez, eta lur bustiak igortzen
      duen usaina ere bai, noski.


      IRIBAR: Motoarekin bidaia osoa disfrutatzen duzu, jatorritik helmugarainoko bide guztia. Ez da hegazkinarekin bezala
      gertatzen; kasu horretan, bidaia helmugan hasten da.


      Jendeak ongi gidatzen du Europan zehar?'
    - 'Nazar (Nafarroa)


      Euskal selekzioa?


      Euskadiko selekzioa lortzea, ezbairik gabe, lorpen historikoa izan da. Baina horretan geratzen bada, euskaldun askorentzat
      —ni barne, nafarra bainaiz— egunik ilunena eta tristeena izango da. Lehen egunetako poza eta berotasuna gozatu ondoren,
      itzul gaitezen errealitatera. Oraingoz, Euskadiko pilota selekzioan Araba, Bizkai eta Gipuzkoako lizentzia duten pilotariak
      soilik lehiatu ahal izango dira. Hortaz, kanpoan geratuko dira Nafarroakoak eta Iparraldekoak.


      Nafarroako pilotariek Espainia eta Iparraldekoek Frantzia ordezkatuko dute. Espainiako eta Frantziako ikurrekin lehiatuko
      dira. Areago, euskaldunen arteko borroka eta lehia izango da.


      Badakit berrogei urte baino gehiago daramatzagula euskal selekzioa aldarrikatzen, haren esperoan. Merezi du hainbeste
      urte itxoitea eta euskal selekzioa izan beharrean Euskadiko selekzioa lortzea? Bide erdian geratzea ote da irtenbidea?
      Nire irudiko, ez. Gainera, kontuan hartu behar dugu batzuentzat hau guztia aski izan dela eta haien ustez nahi genukeena
      jadanik lortu dela. Kito.


      Martxel Toledok dioen bezala, «ezin dugu inolaz ahaztu garaipen osoa izateko ofizialtasun horren beste zati bat, eta
      garrantzitsua gainera, falta zaigula oraindik, alegia, zazpi herrialdeak kontuan hartuko dituen euskal pilota selekzioa
      izatea». Nik, garrantzitsua esan beharrean, garrantzitsuena esango nuke. Egindako urratsa ez da nahikoa; horretan geratuz
      gero, hobeto geunden lehen bezala.'
  - source_sentence: Zergatik ez du Hernialde herria aipatzen Joxean Sagastizabalen 'Kutsidazu bidea, Ixabel' liburuak?
    sentences:
    - 'Set formatuan


      Set formatuan jokatuko dituzte partida guztiak: lehen bi setak hamabost tantora izango dira, eta, hirugarren seta beharko
      balitz, hori zortzi tantora izango da. Emaitzen arabera lortuko dituzte puntuak bikoteek, sailkapenerako: setetan 2-0
      irabazten duen bikoteak, lau puntu lortuko ditu; 2-1 irabazten duenak, bi; 2-1 galtzen duenak, bat; 2-0 galtzen duenak,
      batere ez; eta bi setak kontuan hartuta hamabost tanto lortzen ez dituenari puntu bat kenduko zaio.


      Multzo bakoitzeko aurreneko bi bikote sailkatuek jokatuko dituzte finalerdiak, apirilaren 13an: A multzoko lehena B
      multzoko bigarrenaren aurka ariko da, eta B multzoko lehena, A multzoko bigarrenaren kontra. Irabazleek finala jokatuko
      dute astebete geroago, apirilaren 20an, Galarretan.


      Irazu eta Zaldua, Jabaleraren eta Goikoetxea VI.aren aurka. Horixe izango da txapelketako lehen neurketa, larunbatean,
      16:30ean. Jabalerarentzat eta Goikoetxea VI.arentzat partida berezia izango da. Doneztebeko (Nafarroa) aurrelariak estreinakoa
      izango du txapelketan. Urtarriletik ari da Oriamendirekin, aurretik E-Remonterekin jokatu eta gero.


      Zestoako (Gipuzkoa) atzelariak, berriz, lehen aldiz jokatuko du Oriamendirekin. «Gogotsu» dago, baina baita «urduri»
      ere. «Oso gustura» ariko da Jabalerarekin. «Ikusi izan dut jokatzen, eta oso gogorra da. Ea txapelketa ona egin dezakegun».'
    - '«Garrantzitsua da ibilbidea. Jende askok ez daki istorioa gure herrian girotuta dagoela, ez baitu ''Hernialde'' aipatzen,
      ''Arrialde'' baizik»


      LUIS ARANA Hernialdeko alkatea


      Herriaren ikur bihurtu ziren, hortaz, bai barnetegia, bai eta liburua ere. Herritarrek, ordea, ez zuten hasieratik begi
      onez ikusi obra. «Badakit herrian bertan antzerkiaren emanaldia izan zela, eta baserriko amona bizi zela oraindik. Antzerkira
      gonbidatu zuten, eta ikusi zuenean esan zuen: ‘Aizu, ni ez nintzen hain gaiztoa, e!’», gogoratu du Aranak. Eta Irazabalbeitiak
      gehitu du: «Baserritar Peio horiek ateratzen zirelako; jendeak esaten zuen ez ote zituzten baserritarrak gutxiesten...».


      Hain zuzen ere, Aranak txantxetan esan du agian horregatik ez duela Hernialde herria aipatzen, horregatik jarriko ziola
      herriari Arrialde izena Joxean Sagastizabal idazleak: «Agian hango jendea ez haserretzeko egingo zuen [barrez]! Joxeani
      berari galdetu beharko diogu!».


      Esajerazioa estrategia


      Sagastizabalek, ordea, ondo zekien zertan ari zen, Juan Martini barre egitea bere buruari barre egitea ere bai baitzen.
      Izan ere, idazleak hilabete pasa eman zuen Hernialdeko Goienetxe baserrian, 1976. urtean. Egunero egiten zuen Hernialdetik
      Alkizarako bidea, euskarazko eskolak hartzeko. Ia 50 urte geroago, harriduraz begiratzen dio 19 urterekin aise egiten
      zuen bideari: «Euskaldun berri batzuek esan izan didate Juan Martin tontoegia dela, eta euskaldun zahar batzuek esan
      izan didate baserritarrak ez direla hain basatiak. Komedia batean dena dago esajeratua; bestela, ez luke berdin funtzionatuko».'
    - '«Genero berdintasunaren, eta ahalduntze feminista indibidual eta kolektiboaren aldeko tresna bat da etxea»


      ANA LOPEZ DE URALDE Gasteizko Udaleko Berdintasun zinegotzia


      Gasteizen bezala, Emakumeen Etxea izeneko elkarteak eta Iruñeko Udalak kudeatzen dute proiektua. Hala ere, nekeza izan
      zen bidea, batean zein bestean. Zailtasun materialak nabarmendu dituzte Iruñeko etxeko kideek —egoitza duin bat lortzea
      eta egokitzea, funtsean—. Gasteizkoek, berriz, «erresistentzia» politikoak dituzte aipagai: «Etxea sortzearen alde borrokatu
      ginen hiru urtez, baina ez udal gobernuak, ez alderdiek, ez zuten proiektuan sinisten», azaldu du Roblesek. Haizea kontra
      izanda ere, aurrera egin zuen guneak, Sorginenea Emakumeen Etxea izenarekin.


      Baina ireki eta urtebetera —tartean pandemia—, kudeaketa eredu partekatua amaitutzat jo zuten bi aldeek. Harrezkero,
      udalak gestionatzen du etxea, oso-osorik. Lekuak ere beste izen bat du: Gasteizko Emakumeen Etxea da, ofizialki. Gunearen
      kudeaketa utzita, «indarra» galdu zuen Sorgineneak, baina ordainean, «aktibismoa» irabazi zuen etxeak, Mari Jose Sainz
      elkarteko ordezkariak dioenez. Egun, elkarteak kudeatzen ditu Eleen Ganbara liburutegi feminista— 2.500 liburu baino
      gehiago ditu— eta emakumeen ahalduntzerako sortutako hainbat batzorde.


      Tailerrak eta proiektuak'
  - source_sentence: Euskaltegietako ikasle ohien artean, zenbatek adierazi dute berriz matrikulatzeko probabilitate handia
      dutela?
    sentences:
    - '«Konfiantza» ematen


      Pilar Kaltzadak eta Paul Bilbaok Euskalgintzaren Kontseiluan idazkari nagusi izan zen urteetan izan zuten gertuko hartu-emana
      Mendigurenekin. Hunkituta, bere izaeran eta mundua ikusteko eran hark izan zuen «inpaktua» nabarmendu du Kaltzadak.
      «Utzi zuen gauzak egiteko beste modu bat, eta marka pertsonala. Nire kasuan, behintzat, zuzen-zuzenean eragin dit».
      Haren lanerako gaitasuna ere nabarmendu du, eta taldeak eratzeko zuen gaitasuna. «Ikusi, pentsatu, eta konbentzitu egiten
      zuen jendea». Gero «konfiantza» ere ematen bazekien: eskuzabal. «Taldearekiko eta jendearekiko zuen konfiantza itsua,
      eta berariaz esaten zuen», azaldu du Bilbaok. Ezaugarri horiek «lemazain ezin hobea» egiten zutela uste du.


      Bai Euskarari kanpainaren harira, 1998an, bost estadio euskararen alde betetzeko egin zuten ahalegin harekin oroitu
      da Kaltzada, eta Mendigurenek hor erakutsi zuen adorearekin. «Objektiboki ezinezkoa zena egingarria zela sinetsarazten
      zizun». Beste dohain ahaltsu bat ere bazuen: «Ausardia azpimarratu behar dela uste dut». Haren «pazientzia eta determinazioa»
      ere goraipagarritzat dauzka Bilbaok, eta atakarik zailenetan ere «adostasunerako» bidean beti egiten zuen ahalegina.
      «Jende guztiarekin hitz egin behar da». Oso berea zuen esaldi hori. Eta Kontseiluko arduradun gisara egiten zituen bilera
      ugarietan, jende urrunenekoekin ere, beti «edukizko zer esana» izateko zuen gaitasuna mirestekoa iruditu zaio beti Bilbaori.


      Euskalgintzan, oro har, adostasunak lortzeko bidean Mendigurenek egin zituen ahalegin horiek erabakigarriak izan ziren
      uste erabatekoa du egun Kaltzadak. «Gauzak egiteko bidea erabat eraldatu zuen. Beste egoera batera eraman gintuen».


      «Gauzak egiteko bidea erabat aldatu zuen. Beste egoera batera eraman gintuen».


      PILAR KALTZADA Kontseiluan Mendigurenen lankidea izana'
    - '1935. Izenbururik gabe, Nikolas Lekuona


      Nikolas Lekuonaren fotomuntaketa bat, 1935ekoa. JUANTXO EGAÑA


      «Artista burutu gabea» izan zen Nikolas Lekuona, Agirrerentzat. Harena da Agirrek BERRIAri proposatutako ibilbideko
      bigarren lana. 1913an jaio zen, Ordizian (Gipuzkoa), eta 22 urte baino ez zituela hil zen, 1936ko gerran. Jorge Oteizaren
      eta Narkis Balenziagaren lagun mina izan zen, eta, haiekin batera, «estreinako euskal abangoardistetako bat». Haren
      fotomuntaketak zaizkio bereziki aipagarri komisarioari. Fotomuntaketa eta collagea modernitatearen bi forma oso garrantzitsu
      izan ziren, publizitateari eta propagandari lotuak, baina baita «eskura dagoen horren tasunari» ere, eta hura izan zen
      Euskal Herrian teknika hori jorratu zuen lehena. Europako gerra arteko garaian —Bauhaus Alemanian, futurismoa Italian…—,
      artista askok erabili zuten —«aldizkarietatik irudiak moztu eta konstelazio berriak eraiki zituzten»—, eta garai berean
      landu zituen bereak Lekuonak ere, hamar-hamabost bat denera. Eta, kasu honetan, katalogoan idatzita dator Agirreren
      gogoeta: «Sinkronia hori tarteko, konbentzitu gaitezke egiazki modernoak izan ginela behingoagatik gutxienez».


      «Askotan badirudi arte modernoan beti berandu ibili garela, frankismoa dela eta, baina gerra aurretik oso garai politean
      geunden, batez ere Donostia inguruan», gogorarazi du. Lekuonarengana itzulita, ziur da gerrak eten egin zuela «potentzialitate
      handia» zuen artista baten bidea: «Oso narratiboa zen, identitatea jorratu zuen… euskal Buñuel bat izan zitekeen, ukitu
      ez-formalista batekin».


      1943. Damak, Mari Paz Jimenez


      Maria Paz Jimenezen ''Damak'' (1943). JUANTXO EGAÑA'
    - 'Oiartzun: Arrazoi nagusiak pertsonalak dira, denbora faltarekin edo kontziliazioarekin lotutakoak, eta, gero, prezioa.


      Allur: Ez dago inor esan duenik euskaltegira joateagatik bat-batean euskararen kontrako bihurtu dela, gaizki sentitu
      dela edo tratu txarra jaso duela.


      Azkue: Euskaltegien eta haien jardueren inguruan, oro har, ez dago ikuspegi negatiborik. Gehiago eragiten dute kanpo
      faktore batzuek: norberaren agenda, kontziliazioa; berriro matrikulatu nahi badute, prezioa...


      Oiartzun: Geroago agertzen dira beste faktoreak: azterketetara bideratuegi egotea, norberaren ordutegietara egokitutako
      talderik ez topatzea... Azpitik daude, bukaeran, materialak eta metodologia.


      «Uzteko arrazoiei aurre egin behar zaie. Adibidez, prezioa merkeagoa izango balitz, %24 berriro joango lirateke»


      JUANJO ALLUR Siadecoko ikerlaria


      Ba al dago modurik ikasle ohiak euskaltegietara itzultzeko?


      Oiartzun: Herenek diote berriz matrikulatzeko probabilitatea handia dela, eta %9,5ek erabatekoa dela.


      Azkue: Berreskuratu egin beharko lirateke; kopuru handia da.


      Allur: Uzteko arrazoiei aurre egin behar zaie. Adibidez, prezioa merkeagoa izango balitz, %24 berriro joango lirateke.


      Hori guztia ikusita, zer erronka daude hizkuntza politikaren arloan?


      Azkue: Euskara ikastea gero eta eskuragarriagoa izatea, horixe izan behar da gure bidea; diru kontuak ez daitezela arazo
      izan. Ikusi dugu merkeago eskainita jende gehiago matrikulatzen dela. Beste erronka bat da jendea berriro matrikulatzea;
      orain, ikasleen erdiak ez dira berriro matrikulatzen. Gero, gure lehentasunetan dago aisialdian, kiroletan, lagunartean,
      familian, transmisioan, lan munduan eta etorkinen artean eragitea.'
  - source_sentence: Zein izan zen emakumezkoen zesta-puntako Nazioen Ligaren lehen ekitaldiko emaitza euskal selekzioaren
      eta Frantziaren arteko partidan?
    sentences:
    - '''Ekografiak''


      Zuloa luzatu


      Zientzia fikzioaz ari bagara, espazioan eraikitako zulo bat nahi adina luzatu daiteke. Kilometroak har ditzake, bere
      sortzaileak nahi bezainbeste; izan ere, zientzia fikzioak ematen dizkigun oparietako bat errealitatean ditugun muga
      zehatz horiek justifikatu beharrik ez izatea da. Edo bai?


      El Hoyo filmak bigarren zatia estreinatu du jada Netflixen, eta bertako protagonista absolutua den zulo horrek —ez baitezagun
      ahaztu protagonista bakarra bera dela— luzeran eta etereotasunean irabazi duen arren, ez nago oso ziur filmak istorioaren
      aldetik irabazi duen. Bai, Hovik eta Milena Smit jarri dituzte protagonista eta, bai, gure Zorion Egileor handiak ere
      zuloan harrapatuta jarraitzen du; eta badakigu aktore horiek normalean lan polita egiten dutela pantailan. Baina kontatu
      nahi dena ulertzen ez denean, ez dago munduko aktorerik onenak ere egin dezakeen lanik. Eta hori da, hain zuzen, nire
      ustez El Hoyo 2 filmak falta duena: ulergarritasuna.


      Niri, pertsonalki, dezente gustatu zitzaidan lehen zatia. Tankera honetako fenomenoek izan ohi duten neurriz kanpoko
      miresmenik gabe, baina entretenigarria eta, niretzako garrantzitsuena, zer kontatua zuen filma iruditu zitzaidan. Bazuen
      filosofia, batzuen kritika soziala, eta bazuen ondo eramandako akzioa. Bigarren honetan, ordea, azken hau bai, baina
      beste guztia, hausnarketari dagokiona, akzioak jan egin duela uste dut. Eta hau esaterakoan ez dakit oso zuzen nabilen,
      ez baitut bertan egon den inorekin kontrastatu; baina esango nuke istorioaren pisuak indarra galtzearen erantzukizun
      handiena muntaketak izan duela.'
    - 'Zehaztu du atzoko emaitzak ikusita «birplanteatu» egin beharko dutela zein izanen den proiektuaren etorkizuna, eta
      uste duela bere egitekoa lehenbiziko lerrotik urrun dagoela. Halere, zehaztu du beharrezkoa dela planteatzea «borroka»
      horrekin nola jarraitu ahal den: «Gauza bat argi dago: ezin dugu [independentismoaren] borroka hau atzean utzi».


      Euskal Herritik ere babesa


      Andoni Ortuzar EBBko lehendakariarena izan da Euskal Herriko lehenbiziko erreakzioa. Ortuzarrek Junts eta PSC zoriondu
      ditu: «Politikaren, elkarrizketaren eta desberdinen arteko akordioak lortzeko gaitasunaren garaia da». Gehitu du atzoko
      bozek «Kataluniako politikaren konplexutasuna» erakusten dutela.


      Eneko Andueza PSEko buruak, berriz, «emaitza historikoa» lortu izanagatik zoriondu zituen alderdikide katalanak. «Kataluniak
      aldi berri bat irekitzen du. Orain kataluniar guztientzat agintzeko garaia da».'
    - 'Garaipen ahaztezinak lortu ditu euskal selekzioak


      Ikusmira eta ilusioa aurrez ere bazeuden; eta horri garaipenak gehituta, pluralean, festa biribildu du euskal selekzioak.
      Gau, partida eta garaipen historikoak izan dira, euskal selekzioa lehen aldiz aritu baita Nazioarteko Euskal Pilota
      Federazioak antolatutako txapelketa batean: zesta-puntako Nazioen Ligaren lehen ekitaldian. Eta, gainera, etxean, Gernika-Lumon
      (Bizkaia). Emakumeek estreinatu dute elastikoa, eta nola. Elaia Gogenolak eta Maia Goikoetxeak bi set baino ez dituzte
      behar izan Frantziaren aurkako partida irabazteko: aurrenekoan 15-3 nagusitu dira, eta bigarrengoan, berriz, 15-2. Parean,
      Frantziako selekzioaren elastikoarekin, bi euskal puntista izan dituzte, lapurtarrak biak: Oihana Sorozabal eta Xana
      Gonzalez.


      Emozio handiko lehia izan da, baita pilotarientzat ere, agertokia ez baitzen nolanahikoa. Ilusioa, poza, urduritasuna...
      nabaritu dira bai kantxan bai harmailetan. Eta guztien artean lortu dute garaipena, nagusitasun osoz. 25 minutu baino
      ez du iraun partidak. Bukatutakoan, «gustura» mintzatu dira biak. Gogenolak aitortu du «urduri» kantxaratu direla. Hain
      zuzen, aurrelariak huts egin du lehen bi tantoetan; bi errebeskada gora joan zaizkio jarraian. Baina kito, horiexek
      izan dira partida guztian egin dituen huts bakarrak. Hortik aurrera, asmatu du, eta hainbat tanto ikusgarri egin.


      0-2 galtzen hasi arren, euskal selekzioak berehala irauli du partida, tantoak bata bestearen atzetik eginda. Seigarrena
      ederra izan da; erremate bikain batekin bukatu du tantoa Gogenolak. Baita 11.a ere, pilota txokoan utzita egindakoa.
      Frantziako selekzioko atzelaria, Xana Gonzalez, ez da eroso aritu, eta hainbat tantotan huts egin du. Azkenean, 15-3
      irabazi dute lehen seta.'
  - source_sentence: Zein dira Manex Goienetxeren iritziz Euskal Herriaren historiaren ezaugarri nagusiak?
    sentences:
    - 'Hau ez da Eguzkibegi ekitaldi esanguratsu hau antolatzeaz arduratzen den lehen aldia. 2009an, Ibilaldi ahaztezin bat
      antolatu zuen, arrasto sakona utzi zuena Galdakaon eta hezkuntza-ingurune osoan. Gaur, hamabost urte baino gehiago igaro
      ondoren, ikastola ospakizun honen buru da berriro, belaunaldi berriekin, ilusio berriekin eta historia berriro egiteko
      asmo irmoarekin.


      Espiritu horrexek bultzatzen du orain ikastola 2025eko Ibilaldia antolatzera, dena dioen lelo batekin: Magaletik Herrira,
      euskara erdire. Euskara etxeko berotasunetik gure plazen erdigunera, gure solasaldietara eta gure bizitzetara eramateko
      deia. Gertutasunaz hitz egiten duen leloa, baina baita erantzukizun kolektiboaz ere.


      Maiatzaren 25ean egingo da Ibilaldia. Eta motorrak berotzeko, Eguzkibegik Galdakao bizitzaz betetzen ari diren hamaika
      jarduera jarri ditu abian: jai herrikoiak, kontzertuak, mendi irteerak, topaketa kultural eta komunitarioak… ekitaldia
      finantzatzen laguntzeaz gain, belaunaldien arteko loturak indartzen dituztenak eta euskarak kohesio sozialaren ardatz
      gisa duen rola indartzen dutenak.


      Dagoeneko, hezkuntza-komunitate osoak, familiek, ikasleek, irakasleek eta ikasle ohiek elkarrekin dihardute lanean aurtengo
      Ibilaldia ahaztezina izan dadin. Galdakaon ez ezik, euskara bizi, defendatu eta ospatzen dela uste duten guztien bihotzean
      ere arrastoa utziko duen ekitaldia izango delako.


      Eguzkibegik ez baitu hezten bakarrik: argia ematen du. Oxabik aurtengo Ibilaldirako egin duen abestiak dioen bezala,
      «pauso bakar batek alda dezake geroa».


      Eguzkibegi Ikastolaren egitasmoak berrikuntza, hurbiltasuna eta ingurunearekiko lotura sendoa batzen ditu. EGUZKIBEGI
      IKASTOLA'
    - 'Izan ere, Euskal Herriaren mapak askotarikoak dira euskaldunen imajinarioan.


      313 mapa batu dituzte Imago Vasconiae atlasean Oleagak eta Esparzak.'
