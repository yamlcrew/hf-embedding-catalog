      «Historia orokorrari buruzko liburuak badaude. Baina berezko ezaugarriak dituen herri bat baldin bada, herri horrek
      eskatzen du bere historia orokorra eta nazionala egitea».




      «Bizi den herri batek bere memoria historikoa eskuratzeko nahia eta eskubide du, anitzetan itzalperaturik dena, ez bakarrik
      auzoko beste potentzia batzuengatik, baina ere guhaurrek ahantzi, baztertu, galarazi dugulako, edo batzuek digutelako».




      «Historiak ekartzen duena da Euskal Herri hau izan dela bere historian anitzetako. Lurralde bakoitzak ukan duela eta
      duela bere nortasuna, bere egoera historiko berezia, bere indar sozial eta ekonomikoetan berezitasuna... Horrek ez du
      esan nahi herririk ez dagoenik. Herri bat badago, baina egoera anitzetako dena. Niretzat, bederen, hori zorion bat da».






      Euskal Herriaren Historia Europan'
