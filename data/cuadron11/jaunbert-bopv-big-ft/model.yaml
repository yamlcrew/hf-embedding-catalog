- source_sentence: Nork du eskumena larrialdietako lanbide-jardunaren ziurtagiria emateko EAEko osasun-zentro publikoetan
    ibilbide profesionala egin duten interesdunen kasuan?
  sentences:
  - 'Parte hartzeko eskubidea izanik, Espainiako nazionalitatea ez duten izangaiek nazionalitatea egiaztatzen dien dokumentua
    aurkeztu behar dute eta, beste Estatu bateko nazionalitatea duen batekiko ahaidetasun-lotura edo haren kontura biziz gero,
    lotura hori dutela egiaztatzen duten dokumentuak ere bai. Era berean, ezkontidearen zinpeko aitorpen bat edo hitzemate
    bat aurkeztu behar dute beste ezkontideagandik eskubidez bananduta ez dagoela adierazteko eta, hala badagokio, izangaia
    haren kontura edo kargura dagoela adierazteko.

    Elkargoko kide izatearen egiaztagiria, deialdiko oinarri espezifikoetan hala eskatzen denean.

    Diziplina-espediente bidez, izangaia administrazio publikoetako zerbitzuetatik ez dagoela kanporatuta eta eginkizun publikoetarako
    ez dagoela ezgaitua adierazten duen zinpeko aitorpena edo agindua.

    Espainiako nazionalitatea ez duten izangaiek, Espainiako Estatuari buruzko aitorpenaz gain, zinpeko aitorpena edo agindua
    aurkeztu behar dute, esanez ez daudela eginkizun publikoetarako gaitasunez gabetuta edo antzeko egoera batean, eta orobat
    haien Estatuan, baldintza beretan, funtzio publikora sartzea eragozteko moduko diziplina-zehapen edo baliokiderik ez dutela.

    Destinoaz jabetzeko unean, destinoa normaltasunez betetzeko behar den gaitasun psikofisikoa egiaztatzen duen azterketa
    medikoaren dokumentua aurkeztu behar dute, Osakidetzako Prebentzio Zerbitzuak emana.

    Hirugarrena. Emandako epe horretan aipatutako agiriekin bertaratzen ez direnak edo agiri horiek aztertuta antzematen bada
    kategoria/lanpostu funtzionalean sartzeko betebeharren bat betetzen ez dutela, ezingo dira jabetu esleitu zaien langile
    estatutarioaren destinoaz. Ondorioz, deuseztatuta geratuko dira jarduerak, eta hori ez da eragozpena izango hasierako
    eskabidean faltsukeriaren bat jartzeagatik izan dezaketen erantzukizuna eskatzeko.

    Era berean, interesdunei gogorarazten zaie epe barruan edo, hala dagokionean, epe luzatuan destinoaz jabetzen ez badira,
    hautatze-probetatik eratorritako eskubideak galduko dituztela.'
  - Dekretuan emandako idazkeran, hezkuntza-arloko eskumena duen sailburuak zehaztuko du ikastetxe publikoetan eta pribatu
    itunduetan hezkuntza-sistemako lanbide-heziketa egin nahi duten ikasleak onartzeko
  - 'Agindu honen xedea da EAEko lurralde-eremuan larrialdietako lanbide-jardunaren ziurtagiria emateko ardura izango duten
    unitateak izendatzea ziurtagiri hori beharrezkoa da ondoren larrialdietako medikuntzako espezialistaren ziurtagiria lortzeko,
    bai eta ziurtagiri hori emateko prozedura arautzea ere, gure lurralde-eremuko osasun-zentro pribatuetan egindako lanbide-jardunaren
    kasuan, uztailaren 2ko 610/2024 Errege Dekretuan jasotakoaren arabera (errege-dekretu horrek Larrialdietako Medikuntzako
    mediku espezialistaren titulua ezartzen du, eta Familia eta Komunitateko Medikuntzako mediku espezialistaren tituluaren
    prestakuntzako zenbait alderdi eguneratzen ditu).

    Horretarako, Jaurlaritzari buruzko ekainaren 30eko 7/1981 Legearen 26. eta 28. artikuluetan ezarritako eskumenen arabera,

    XEDATZEN DUT

    :

    1. artikulua

    Lanbide-jardunaren egiaztagiria emateko unitate eskudunak.

    a) Plangintza, Antolamendu eta Ebaluazio Sanitarioko zuzendariak du egiaztapen-ziurtagiria emateko eskumena, ibilbide
    profesionala EAEko osasun-zentro pribatuetan egin duten interesdunen kasuan.

    b) Osakidetza-Euskal osasun zerbitzuko Giza Baliabideetako Zuzendaritzak du egiaztapen-ziurtagiria emateko eskumena, ibilbide
    profesionala EAEko osasun-zentro publikoetan egin duten interesdunen kasuan.

    2. artikulua

    EAEko osasun-zentro pribatuen kasuan ziurtagiria emateko prozedura.

    Uztailaren 2ko 610/2024 Errege Dekretuaren lehen xedapen iragankorraren 5. apartatuko c) letraren arabera, prozedura alderdi
    batek eskatuta hasiko da. Horretarako, interesdunak dagokion eskaera aurkeztu beharko du, eta eskaerarekin batera, C.1.1
    osasun-zentroetako U.68 laguntza-unitateko edo C.2.5.7 osasun-zentroetako U.100 laguntza-unitateko gerentearen edo legezko
    ordezkariaren proposamena aurkeztu beharko du, egiaztatutako aldi osoan baimendua, osasun-zentro, -zerbitzu eta -establezimenduak
    baimentzeko oinarri orokorrak ezartzen dituen urriaren 10eko 1277/2003 Errege Dekretuan xedatutakoaren arabera.'
- source_sentence: Zein da udal euskaltegiek jasotako dirulaguntzen zuriketa egiteko erabiltzen den dokumentua?
  sentences:
  - Ebazpen honen helburua da udal euskaltegiei 2024-2025 ikasturteko euskara-ikastaroengatik esleituko zaizkien dirulaguntzen
    baldintzak eta prozedura arautzea.
  - '10. artikulua

    Laguntzen bateragarritasuna.

    Ebazpen honen kontura ematen diren dirulaguntzak bateragarriak izango dira helburu horretarako beste edozein entitatek
    eman ditzakeen laguntzekin, betiere diruz lagundutako jardueraren gain-finantzazioa gertatzen ez bada.

    Gain-finantziazioa gertatuko balitz, murriztu egingo da dirulaguntza, dagokion neurrira doitu arte.

    Gain-finantziazio hori itzulketa egiteko obligazio bera eskatzen duten beste laguntzekin batera gertatuko balitz, itzuli
    beharreko diru-kopurua, proportzionala izango da, jarduera burutzeko kostu osoaren eta esleitutako laguntzaren araberako
    proportzioan.

    11. artikulua

    Zuriketa.

    Udal euskaltegiek jasotako dirulaguntzen zuriketa beren langileen soldata gastu gordinei buruz Euskaltegiaren legezko
    ordezkariak luzatutako egiaztagiriaren bitartez egingo da.

    Halaber, lehen zuriketarekin batera, euskaltegiaren 2008 urteko behin betiko aurrekontu zehatzari buruz Euskaltegiaren
    legezko ordezkariak sinatutako egiaztagiria erantsiko da, izan dituen benetako sarrerak eta gastuak zehaztuz.

    Gastuak ez zuritzeak dirulaguntza osorik bertan behera uztea ekarriko du eta, horrez gainera, kasu honetan, ordaindutako
    kopuruak itzuli beharko dira abenduaren 17ko 698/1991 Dekretuaren arabera.

    Aipatutako egiaztagiriak HABEri aurkezteko epeak:

    a) 2009ko otsailaren 15a, 2008ko urritik abendura bitarteko gastuen zuri-agiriak eta 2008 urteko behin betiko aurrekontu
    zehatzari buruzko egiaztagiria aurkezteko.

    b) 2009ko urriaren 15a, 2009ko urtarril-iraila bitarteko gastuen zuri-agiriak aurkezteko.

    12. artikulua

    Hutsegiteei eta ez betetzeei buruzko arauak.

    Edozein kasutan, azaroaren 11ko 1/1997ko Legegintza Dekretuak onartzen duen Euskadiko Ogasun Nagusiaren Antolarauei buruzko
    Legearen Testu Bateginak aurreikusten dituen hutsegite eta arau hausteen arauen menpe daude deialdi honetako onuradunak.'
  - 'Euskal Autonomia Erkidegoak, Konstituzioko 148.1.16 eta Estatutuko 10.19 artikuluen babesean, eskumen osoa bereganatu
    zuen Kultura Ondareari dagokionez. Aipaturiko eskumen horretaz baliatuz, Euskal Kultura Ondareari buruzko uztailaren 3ko
    7/1990 Legea, kultura-interesa duten Euskal Autonomia Erkidegoko ondasunak deklaratzeko prozedurak arautzen dituena, onartu
    zen.

    Izurtzako Arana jauregia (Bizkaia) kultura aldetik duen interesa ikusita eta haren kultura-balioan oinarrituta, eta indarrean
    dagoen legerian xedatutakoari jarraituz, Kultura, Gazteria eta Kiroletako sailburuordeak jauregia Euskal Kultura Ondarearen
    Zerrenda Orokorrean sartzeko espedientearen hasiera eskatzea erabaki zuen 2010eko otsailaren 17ko Ebazpenaren bidez (martxoaren
    16ko EHAA, 51. zk.).

    Espediente horren administrazio-izapidean, lehen aipaturiko 7/1990 Legearen 17. eta 11.3 artikuluetan ezarritakoarekin
    bat, jendaurrean jarri zen espedientea eta interesdunei entzuteko epea ireki zen.

    Horretarako legez ezarrita dauden izapideak bete ondoren, Luis Vidal Gutiérrez Ibarzabal jaunak eta Izurtzako Udalak alegazio-idazki
    bana aurkeztu dute.

    Luis Vidal Gutiérrez Ibarzabal jaunak dio kotxetokia eta usategia egoera txarrean daudela eta, beraz, elementu horien
    izaera zalantzazkoa dela; gainera, duela urte batzuk eraitsi zen, bestelako lan batzuk egin zirenean, berez jauregiaren
    eremu babestua alde horretatik mugatu beharko zukeen horma bat, mugakide den lursailean zegoena.

    Aipaturiko elementu horien egoera txarra dela eta, erantzun behar dugu beraien hondatzeak ez duela esan nahi jauregiaren
    monumentuaren zati ez direnik. Eraitsitako hormari dagokionez, ez haren kokalekuak ez haren estiloak ere ez dute aholkatzen
    horma berriz ere eraikitzea, ez baitauka eraginik babestu nahi diren elementuetan.'
- source_sentence: Zein da dirulaguntza eskatzeko erabili behar den eredu ofiziala lortzeko webgunea?
  sentences:
  - 'Osaera.

    Deialdi honetako prozedura epaituko duen epaimahaia 7 kidek osatuko dute.

    Hautagaiei eskatzen zaien titulazioaren maila bera edo goragokoa eduki behar dute epaimahaikide guztiek.

    Epaimahaiko burua kasuan kasuko osasun-eskualdeko lehen mailako atentzioko gerentea izango da, edo, ez balego, Osakidetza-Euskal
    Osasun Zerbitzuko beste osasun-eskualde bateko gerentea.

    Hauek izango dira epaimahaikide:

    Kasuan kasuko eskualdeko zuzendaritzako taldeko kide bi, edo, horrelakorik ez badago, beste osasun-eskualde bateko Zuzendaritzako
    taldekoak.

    Eskualdeko Kontseilu Teknikoko kide bat.

    Osakidetza-Euskal Osasun Zerbitzuko Asistentzia Sanitarioko Zuzendaritza/Lehen Mailako Atentzioko Zuzendariordetzako kide
    bat.

    Langileen ordezkari bat.

    Osakidetza-Euskal Osasun Zerbitzuan eginkizun administratiboak dituzten eta goi-mailako titulazioa duten langile finkoen
    artean aukeratuko da idazkaria, eta ez du botorik izango hautagaiak kalifikatzeko gaietan.

    Erabakiak botoen gehiengoz hartuko dira. Berdinketarik egonez gero, epaimahaiburuaren kalitatezko botoak ebatziko du.

    Publizitatea.

    Deialdi hau EHAAn argitaratuko da.

    Prozedura hau garatzeko hartzen diren ebazpenak ere EHAAn argitaratuko dira.

    Errekurtsoak.

    Ebazpen honen aurka eta berau garatzeko hartzen diren behin betiko ebazpenen aurka gora jotzeko errekurtsoa aurkez dakioke
    Osakidetza-Euskal Osasun Zerbitzuko zuzendari nagusiari, hilabeteko epean, ebazpena Euskal Herriko Agintaritzaren Aldizkarian
    argitaratu eta biharamunetik aurrera. Hala agintzen da urtarrilaren 13ko 4/1999 Legean (Herri Administrazioen Araubide
    Juridiko eta Administrazio Prozedura Erkidearen azaroaren 26ko 30/1992 Legea aldatu zuen lege horrek).

    Bilbao, 2009ko urtarrilaren 12a.

    Bilboko Eskualdeko zuzendari gerentea,

    JESÚS M.ª LARRAÑAGA GARITANO.'
  - 'Espediente horri Bizkaiko Hezkuntza Ordezkaritzak egin dizkio izapideak, indarreko arauek eskatzen dituzten agiriak erantsi
    zaizkio eta eskumena duten erakundeek egin diote txostena.

    Arau hauek ikusi dira: apirilaren 3ko 332/1992 Errege Dekretua, araubide orokorreko unibertsitateaz kanpoko irakaskuntzak
    eskaintzeko baimenak ikastetxe pribatuei emateari buruzkoa (apirilaren 9ko BOE); otsailaren 12ko 132/2010 Errege Dekretua,
    Haur Hezkuntzako bigarren zikloko, Lehen Hezkuntzako eta Bigarren Hezkuntzako irakaskuntzak ematen dituzten ikastetxeek
    bete behar dituzten derrigorrezko baldintzak ezartzen dituena (martxoaren 12ko BOE); azaroaren 4ko 1589/2011 Errege Dekretua,
    Mantentze-lan elektromekanikoko teknikariaren titulua ezarri eta dagozkion gutxieneko irakaskuntzak finkatzen dituena
    (abenduaren 15eko BOE); martxoaren 18ko 384/2011 Errege Dekretua, Ingurumen-hezkuntzako eta -kontroleko goi-mailako teknikariaren
    titulua ezarri eta dagozkion gutxieneko irakaskuntzak finkatzen dituena (apirilaren 14ko BOE); otsailaren 28ko 28/2012
    Dekretua, Ingurumen-hezkuntzako eta -kontroleko goi-mailako teknikariaren tituluari dagokion curriculuma ezartzen duena
    (martxoaren 21eko EHAA); otsailaren 8ko 177/2008 Errege Dekretua, Instalazio elektriko eta automatikoetako teknikariaren
    titulua ezarri, eta dagozkion gutxieneko irakaskuntzak finkatzen dituena (martxoaren 1eko BOE); martxoaren 2ko 66/2010
    Dekretua, Instalazio elektriko eta automatikoetako teknikariaren tituluari dagokion curriculuma ezartzen duena (apirilaren
    8ko EHAA), eta gai horretan aplikatu beharreko indarreko araudia. Horiek horrela, hau

    EBAZTEN DUT

    :

    1. artikulua

    2013-2014 ikasturtetik aurrera jarraian zehazten den ikastetxe pribatuaren baimena aldatzen da:

    Kode zenbakia: 48003631.

    Izen generikoa: Bigarren Hezkuntzako ikastetxe pribatua.

    Izen espezifikoa: «Somorrostro».

    Titularra: Fundación canónica autónoma Escuelas Católicas Marcelo Gangoiti.

    Helbidea: San Juan, 10.

    Udalerria: Muskiz.'
  - 'ERABAKIA

    Lehenengoa. Diru-baliabideak esleitzea, 700.000,00 euro, 3211-Enpresa programaren kargura, hain zuzen ere, maiatzaren
    11ko 1451/1983 Errege Dekretuaren II. kapituluan eta Desgaitasuna duten pertsonen enplegua sustatzeko Lan eta Gizarte
    Segurantza Ministerioaren 1994ko apirilaren 13ko Aginduan ezarritako laguntzak finantzatzeko.

    Kopuru hori eguneratu egin daiteke, baldin eta indarrean dagoen legeriaren arabera aurrekontuetan aldaketak onartzen badira.
    Aldaketa horiek eginez gero, horren berri emango da Lanbide-Euskal Enplegu Zerbitzuko zuzendari nagusiaren ebazpen baten
    bidez.

    Emango diren laguntzen bolumen osoak ezin izango du gainditu zenbateko hori, edo hori eguneratzetik sortzen dena.

    Desgaitasunak dituzten pertsonei enpresa arruntetan lan-kontratu mugagabeak egiteko laguntzek Europako Gizarte Funtsaren
    % 50eko finantziazioaren laguntza izango dute, Euskal Autonomia Erkidegoko EGIF 2014-2020 Programa Operatiboaren barruan.

    Bigarrena. Laguntza horien kudeaketari buruzko alderdi hauen gaineko informazioa ematea (Euskal Autonomia Erkidegoko berezko
    dirulaguntzen antolakuntzako eta erregimen juridikoko araudiak aplikatzeak eragina izango du alderdi horietan):

    Erabaki honetan aipatzen diren dirulaguntzak jasotzeko eskabideak eredu ofizialean aurkeztu beharko dira. Eranskinean
    jasota dago eredu ofiziala, eta honako toki hauetan eskuratu ahal izango da hori: http://www.lanbide.euskadi.eus webgunean;
    Lanbide-Euskal Enplegu Zerbitzuaren Zerbitzu Zentraletan (Jose Atxotegi kalea 1, Vitoria-Gasteiz 01009); eta Lanbide-Euskal
    Enplegu Zerbitzuaren lurraldeetako enplegu-bulegoetan eta -lokaletan.

    Horretaz gain, eskaerak Administrazio Publikoen Administrazio Prozedura Erkidearen 39/2015 Legearen 16.4 artikuluan aurreikusitako
    moduetako edozeinetan aurkeztu ahal izango dira.

    Lanbide-Euskal Enplegu Zerbitzuaren Laneratzea Aktibatzeko Zuzendaritzak hartuko du bere gain eskabideak kudeatzeko eta
    izapidetzeko ardura, eta erakunde autonomo horren zuzendari nagusiak ebatziko ditu.'
- source_sentence: Nola zehaztuko da ordezkogaien hurrenkera 2017-2018 ikasturtean Euskal Autonomia Erkidegoko unibertsitatez
    kanpoko herri-ikastetxeetan?
  sentences:
  - 'Administrazio Kontseiluko kideen izendapenak, c) idatz-zatian aipatzen denak, lau urteko indarraldia izango du. Izendapena
    berritu ahal izango da, hurrengo lerrokadan ezarritakoari kalterik egin gabe.

    Kontseiluko kideak kargutik kentzeko erabakia autonomia-erkidegoko organo eskudunak hartuko du, kide horiek ordezkatzen
    dituzten antolakundeek, organismoek eta erakundeek hala proposatuta.

    Hori horrela, eta Gobernuaren ekainaren 30eko 7/1981 Legean eta Estatuko Portuei eta Nabigazio Zibilari buruzko azaroaren
    24ko 27/1992 Legean xedatutakoaren arabera (azken horretan, 40. artikuluko 2. idatz-zatia aldatu du Interes Orokorreko
    Portuen Araubide Ekonomikoari eta Zerbitzuak emateari buruzko azaroaren 26ko 48/2003 Legea aldatzen duen abuztuaren 5eko
    33/2010 Legeko azken xedapenetako bigarrenak), eta Etxebizitza, Herri Lan eta Garraioetako sailburuak proposatuta, Gobernu
    Kontseiluak 2011ko irailaren 13an egindako bileran onetsi ondoren, honakoa

    XEDATU DUT

    :

    1. artikulua

    Pasaiako Portuko Agintaritzaren Administrazio Kontseiluko kide-kargutik kenduko dira jarraian adieraziko diren pertsona,
    honako zuzenbide publikoko erakunde juridikoek proposatuta:

    Errenteriako Udalak eskatuta:

    Juan Carlos Merino González jauna.

    Gipuzkoako Foru Aldundiak eskatuta:

    Arantza Tapia Otaegi andrea.

    2. artikulua

    Aipatuko den zuzenbide publikoko erakunde publikoek proposatuta, eta azken xedapenetako bigarreneko 10. puntuko 2. zenbakian
    aurreikusitako eran, jarraian adieraziko diren pertsonak izendatuko dira Pasaiako Portuko Agintaritzaren Administrazio
    Kontseiluko kide, aipatuko diren erakundeen ordezkari legez jarduteko:

    Errenteriako Udalak eskatuta:

    Maite Peña López andrea.

    Gipuzkoako Foru Aldundiak eskatuta:

    Juan Carlos Alduntzin Juanena jauna.

    AZKEN XEDAPENA

    Dekretu hau kideen kargugabetzea eta izendapen berria Pasaiako Portuko Agintaritzaren Administrazio Kontseiluko lehendakariari
    jakinarazten zaizkion egunetik aurrera sartuko da indarrean eta Euskal Herriko Agintaritzaren Aldizkarian argitaratu beharko
    da.

    Vitoria-Gasteizen, 2011ko irailaren 13an.

    Lehendakaria,'
  - 'Hezkuntza, Unibertsitate eta Ikerketako sailburuaren 2012ko abuztuaren 27ko Aginduaren bitartez onartu zen Euskal Autonomia
    Erkidegoko unibertsitatez kanpoko herri-ikastetxeetan egon daitezkeen aldi baterako irakasleen beharrak estaltzeko hautagaien
    zerrenda kudeatzeko araudia. Agindu horrek ezartzen du berdinketa kasuak konpontzeko irizpidea abizenen eta izenen araberako
    hurrenkera alfabetikoa izango dela, eta urteroko zozketa baten bidez ebatziko da zein letratik hasi.

    Halaber, letra horrek zehaztu egingo du zein hurrenkeraren arabera aukeratuko duten lanpostua ordezkogaiek, hau da, zozketa
    horretan ateratzen letrak zehaztuko du nor izango den lehen ordezkogaia ikasturtean zehar deitu daitekeen edozein hautatze-prozesutan.

    Zozketa hori 2017ko martxoaren 23an egin zen Langileak Kudeatzeko Zuzendaritza honen egoitzan. Horregatik guztiarengatik,

    EBAZTEN DUT

    :

    Artikulu bakarra

    Argitara ematea «K» letrak zehaztuko duela nork zein hurrenkera izango duen ordezkogaien zerrendan 2017-2018 ikasturtean.
    Letra hori erabiliko da berdinketa-kasuetan. Era berean, letra horrek zehaztuko du zein hurrenkeran parte hartuko duten
    izangaiek ikasturtean egiten den beste edozein hautaketa-prozesutan. Horrela, bada, «K» letrak zehaztuko du nor izango
    den lehenengoa, abizenen eta izenaren arabera.

    Vitoria-Gasteiz, 2017ko martxoaren 23a.

    Langileak Kudeatzeko zuzendaria,

    KONRADO MUGERTZA URKIDI.'
  - 'Izen generikoa: Haur, Lehen eta Bigarren Hezkuntzako ikastetxe pribatua.

    Izen espezifikoa: «Ayalde».

    Titularra: «Sopensa S.A.».

    Helbidea: Aiartza, 5.

    Udalerria: Loiu.

    Lurralde historikoa: Bizkaia.

    Baimendutako irakaskuntzak:

    Haur Hezkuntzako 1. zikloa: 6 unitate, honelako edukierakoak:

    1 urteko haurrentzako unitate 1, 8 ikaspostutarako edukierarekin.

    2 urteko haurrentzako 2 unitate, 13 ikaspostutarako edukierarekin bakoitza.

    3 urteko haurrentzako 3 unitate, 18 ikaspostutarako edukierarekin bakoitza.

    Haur Hezkuntzako 2. zikloa: 12 unitate, 300 ikaspostutarako edukierarekin.

    Lehen Hezkuntza: 24 unitate, 600 ikaspostutarako edukierarekin.

    Derrigorrezko Bigarren Hezkuntza: 16 unitate, 480 ikaspostutarako edukierarekin.

    Batxilergoa: Zientziak eta Teknologia, Giza eta Gizarte Zientziak eta Artea modalitateak: 6 unitate, 210 ikaspostutarako
    edukierarekin.

    Hezkuntza Berezia: 3 gela ireki.

    Bigarrena. Hezkuntzarako Eskubidea arautzen duen uztailaren 3ko 8/1985 Lege Organikoaren hamahirugarren artikuluan ezarritakoaren
    arabera, ikastetxeek ezin izango dute beren burua identifikatzeko beren erregistro-inskripzioetan agertzen direnez bestelako
    izendapenik erabili.

    Hirugarrena. Hezkuntza Administrazioari zuzendutako eskabide edo komunikazio guztietan, dokumentazio propioan eta ikastetxeari
    buruzko publizitatean, hori egiteko bidea edozein dela ere, ikastetxearen erakunde titularrak izen generikoa, espezifikoa
    eta ikastetxearen kodea erabili beharko ditu, erregistro-inskripzioan jasotako datuen arabera.

    Halaber, ikastetxearen publizitateak estatuz kanpoko ikastetxeen izenak eta publizitatea arautzen dituen otsailaren 13ko
    401/1979 Errege Dekretuaren 10. artikuluan xedatutakoa bete beharko du.'
- source_sentence: Zein da epea agindu honen aurkako administrazioarekiko auzi-errekurtsoa aurkezteko?
  sentences:
  - Horretarako, agindu honen aurkako administrazioarekiko auzi-errekurtsoa aurkezteko bi hilabeteko epea bukaturik egon beharko
    da.
  - 'Pertsona fisikoei dagokienez, laguntza soziosanitarioak ez ezik laguntza horiek aplikatzeko baliabideak ere behar dituztenak
    izango dira onuradun.

    Hirugarrena. Agindu hau Euskal Herriko Agintaritzaren Aldizkarian argitaratzea eta fundazioari bidaltzea.

    Agindu honek amaiera ematen dio administrazio-bideari, eta, beraren aurka, berraztertzeko errekurtsoa aurkeztu ahal izango
    zaio Herri Administrazio eta Justiziako sailburuari, hilabeteko epean, agindua jakinarazi eta biharamunetik aurrera; edo
    bestela, administrazioarekiko auzi-errekurtsoa aurkez daiteke Euskal Autonomia Erkidegoko Auzitegi Nagusiko Administrazioarekiko
    Auzietako Salan, bi hilabeteko epean, agindua jakinarazi eta biharamunetik aurrera.

    Vitoria-Gasteiz, 2013ko apirilaren 19a.

    Herri Administrazio eta Justiziako sailburua,

    JOSU IÑAKI ERCORECA GERVASIO.'
  - '4. artikulua

    Ikastetxeak, diru-laguntza horiei dagokienez, erakunde emaileak egin beharreko egiaztapen-jardunen mende jarriko dira
    eta Kontrol Ekonomikoko Bulegoari eta Herri Kontuen Euskal Epaitegiari eskatzen dieten informazioa emango diete. Horretarako,
    ikasleei eta enpresei egindako ordainketen ziurtagiriak izango dituzte, lau urteko epean, diru-laguntza ematen denetik
    hasita.

    AZKEN XEDAPENA

    Aipatu ebazpenak ez dio amaiera ematen administrazio-bideari; beraren kontra, gora jotzeko errekurtsoa aurkeztu ahal izango
    zaio Hezkuntzako sailburuordeari, betiere Herri Administrazioen Araubide Juridikoaren eta Administrazio Prozedura Erkideari
    buruzko azaroaren 26ko 30/1992 Legearen 107. artikulua (lege hura urtarrilaren 13ko 4/1999 Legeak aldatu zuen) eta hurrengoak
    betez.

    Vitoria-Gasteiz, 2011ko azaroaren 30a.

    Administrazio eta Zerbitzuen sailburuordea,

    MARÍA SOLEDAD ESTEBAN GALARZA.

    (Ikus .PDF)'
