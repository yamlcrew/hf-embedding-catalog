    darama terrorista'
- source_sentence: Zer irizpide etiko unibertsal ikasi zituen Joshuak Egipton?
  sentences:
  - 'EAJk botoen laurdenak galdu ditu Urdaibaiko 22 udalerrietan


    Hauek dira Urdaibaiko biosferaren erreserbaren koordenatuak: ipar latitudea, 43º 12’ eta 43º 28’ bitartean; mendebaldeko
    longitudea, 2º 33’ eta 2º 46‘ bitartean. Espazio babestu horretan, Bizkaiko 22 udalerri daude, gehienak Busturialdekoak
    (hemeretzi), eta horietan denetan izan da gai garrantzitsua botoa erabakitzean biosferaren barruan eraiki nahi duten Guggenheim
    berriaren proiektua. Horietako udalerri gehienak herri txikiak dira; hirugarren sektorea eta bereziki turismoari lotutako
    jarduerak indarrez bultzatuko lituzkeen egitasmo horren eragina igar lezakete leku horietan. Bada, 2019tik 2023ra, bere
    botoen ia laurdenak galdu ditu Guggenheim berria sustatzen ari den alderdi politikoak, EAJk, erreserbako 22 udalerriak
    osorik hartuta. 18.089 boto lortu zituen 2019ko udal hauteskundeetan, eta 13.692 atera zituen iazko udal bozetan, 4.397
    boto galduta. Urdaibain egitekoa den proiektu horren eztabaida pil-pilean den honetan, %24,3ko boto galera hori beste
    aldagai bat da luze gabe egingo diren Eusko Legebiltzarrerako hauteskundeen ekuazioan.'
  - 'Gutunaren testuan, Dusselek dio Joshuaren familiak, Daviden dinastiaren ondorengoak, Belenera joan behar izan zuela haurra
    jaiotzera. Baliabiderik ez zutenez, etorkin pobreak zirenez, Mariak behartsu erditu bide zuen haurra, «pixoihaletan bildu
    eta aska batean etzan zuen, ostatuan lekurik aurkitu ez zutelako». Erromatar Inperioko monarka kolonialak, Herodesek,
    Daviden ondorengo bat jaio zitekeela jakitean, egun batean boterea lehiatuko ote zitzaion beldurrez, «Belenen eta bere
    inguruetan bi urtetik beherako ume guztiak hiltzea» agindu zuen. Josek «Herodes mutikoa hiltzeko haren bila zebilela»
    jakin zuenean, bere familia hartu, Egiptora joan eta han geratu ziren Herodes hil zen arte. Beraz, Joshuaren bizitza pobreziaren,
    umiliazioaren, zapalkuntzaren arriskuan hasi zen eta jaio orduko ia hil egin zuten. Jazarri politiko bat zen orduan! Bai,
    jazarri politikoa eta ez erlijiosoa, hiltzen saiatu zirelako, «zeren Joshuaren genealogian, Gantzuduna, Daviden ondorengoa
    zela adierazten baitzen».


    Gero, Joshua, Egipton, erbesteratu politiko eta etorkin gisa bizi izan zen, eta han asko ikasi zuen zibilizazio hartatik.
    Ikasi zituenen artean, garrantzitsuenak, Azken Judizioan oinarrizko printzipio gisa zerrendatzen dituen irizpide etiko
    unibertsalak izan ziren. Gertaera hau oso ospatua izan ohi zen egiptoar tradizioetan, eta Ma''at justiziaren Jainkosa
    Handia zen protagonista eta epaile gorena. Ma''at jainkosak bere aurrean Berpizkundea eskatuz agertzen zitzaion hildakoari
    galdetzen zion zein ekintza on egin zuen bere bizitzan, eta hildakoak erantzuten zion: «Nik eman diot ogia gosetuari,
    ura egarrituari, jantzia biluziari, txalupa erromesari». Egiptoko Hildakoen Liburuko 125. kapitulua, Joshuak Mateoren
    Ebanjelioan berregiten duena.'
  - 'Espazioa


    Denbora eta espazioa, unibertsoaren ardatz. Lotuak daude ezinbestean, baina biak banatzen hasita, eta bakarra aukeratu
    behar bagenu, zertan moldatzen garen hobeto, huraxe hautatuko genuke bakoitzak. Nik, denbora. Aski ongi kalkulatzen dut,
    erlojuen premiarik gabe, denboraren joana. Aldiz, sumatzen dut espazio kontuetan trakets hutsa naizela. Oso umetan antzematen
    dio haurrak zertan den iaio eta zertan baldar...


    Donostiara iritsi ziren traktoreen argazkia zekarren berripaper honek atzo, lehen orrian. Aldarrikapen martxa zen laborariena,
    eta argazkiko lehen traktorearen aurrealdean, kartoi batean eskuz idatzia, argi irakur zitekeen: «Baserritar gabe bizirik
    ez». Muturrekoa. «Baserritarrik gabe bizirik ez» espero nuen nik. Gero ohartu nintzen ez zela hain larria. Ez zela sen
    eskasia. Zela espazioaren kudeaketa okerra soilik. Txartela eskuz egin zuena Baserritarrik idazten hasiko zen eta kartoiaren
    ertzera azkartxo iritsi. Presaka ariko zen —espazioa eta denbora elkarri lotuak daudela jakiteko ez dago Einstein izan
    beharrik—, eta beste bati ez ekitea erabakiko zuen. Total...


    Bilintxen bertsorik ezagunenetarikoa ere hala iritsi zaigu: «... maite bat maitatzen det, baina haren jabe, sekula izateko
    esperantza gabe». –RIK = R.I.P.'
- source_sentence: Nor dira Hiria lokatzetan podcasteko zuzeneko saioan parte hartuko duten Lokatza podcast feministaren sorkuntza
    taldeko kideak?
  sentences:
  - 'Era berean, saiorako propio sortutakoak izango dira Lasaren bideoak ere.


    Eta biharkoaren ondoren izango al dira Lokatza gehiago? Ezetz, Agirrek berehala. «Itzulera puntual bat da hau».'
  - 'Duela hogei urte pasa New Yorken jaiotako diziplinarteko Zaharregia, txikiegia agian proiektuaren berrinterpretazio bat
    ere eskainiko dute Loraldian Kirmen Uribe idazleak, Mikel Urdangarin, Rafa Rueda eta Bingen Mendizabal musikariek eta
    Mikel Valverde artistak. Martxoaren 13an izango da saio hori, Arriaga antzokian, emanaldiaren jatorrizko titulua moldatuta:
    Munduari begiratzeko.


    Hiria lokatzetan podcasta zuzenean egingo dute martxoaren 10ean. Lokatza podcast feministaren sorkuntza taldeak hartuko
    du parte. Bertan izango dira Ainara Lasa, Amagoia Gurrutxaga, Idurre Eskisabel, Lorea Agirre, Miren Narbaiza, Miren Amuriza
    eta Lizar Begoña. Guggenheim museoaren entzungelan egingo dute zuzeneko saioa.


    Horrez gainera, Basabi taldeak emanaldia izango du martxoaren 9an, Neomak taldea ere izango da oholtzan, martxoaren 14an.
    Jean Mixel Bedaxagarrek martxoaren 16an joko du Itsasmuseumen. Eta Jon Maia bertsolariak martxoaren 23an eskainiko du
    Kantu berri bat gara emanaldia Euskaldunan. Bilaka kolektiboak Mitologia txikiak dantza emanaldia eskainiko du 19an. Amaraun
    taularatuko dute Oihana Iguaran eta Amaiur Luluagak 20an, eta dantza bertikaleko ikuskizun hibrido bat aurkeztuko du Harrobia
    dantza taldeak 23an. Dantzariak ez ezik, bertan izango dira Itziar Ituño aktorea eta Toti Martinez de Lezea idazlea ere.


    Euskararen geroa


    Hiru hitzaldiko ziklo bat ere antolatu dute: Euskara bihar. Hurrengo hamarkadetan jarraitu beharreko norabideaz gogoeta
    egitea da jaialdiaren asmoa, eta Jon Sarasua, Xan Aire eta Gartzen Garaio Atxurrak ordubeteko hitzaldi bana emango dute.
    Biran izango dira saio guztiak. Martxoaren 6an ariko da Sarasua, 11n Aire, eta 18an Garaio.'
  - 'Segurtasuna bermatu


    Lehendakariak azpimarratu zuen 2020ko uztailerako «Euskadi osasun zaintzako fasean» egongo zela, eta hauteskundeak «erabateko
    segurtasun bermeekin» egingo zirela. EH Bilduk, Elkarrekin Podemosek eta PPk, baina, ez zuten uste boto emaileen segurtasuna
    bermatzeko baldintzak betetzen zirenik. Martxotik indarrean ziren neurri gogorrak, tartean itxialdia, atzean utzi behar
    ziren herritarrak bozkalekuetara joan zitezen, eta, osasun krisiarekin batera krisi ekonomikoa abian zela, koalizio abertzaleak
    argi esan zuen hura «lehertu aurretik» egin nahi zituela hauteskundeak Urkulluk.


    Batera edo bestera, Jaurlaritzako buruak uztailerako deitu zuen bozetara, pandemiaren eta haren aurkako neurri gogorren
    nekea eta haserrea biziagotu aurretik herritarren artean. Parte hartzea %52koa izan zen, inoizko apalena, eta EAJk irabazi
    zituen bozak, 31 eserleku eskuratuta, aurreko hauteskundeetan baino bi gehiago, nahiz eta 50.000 boto galdu zituen.


    Uztailaren 12ko hauteskundeen aurreko asteetan, orduko Jaurlaritzako Osasun sailburu Nekane Murga maskararik gabe azaltzen
    zen pandemiaren berri emateko agerraldietan. Itxialdi gogorrak emaitza onak izan zituela azpimarratu zuten ekain bukaera
    eta uztail hasiera hartan, baina, hauteskundeak egin eta egun gutxira, maskararekin azaltzen hasi zen jarduneko sailburua,
    berriro ere kutsatzeen berri emateko, eta herritarren ardura eskatzen zuen etengabe.


    Europako hauteskundeak


    Ordularia aurreratu egin du orain Urkulluk, eta aurrerapen hori gaur-gaurkoak diren zenbait aldagai aintzat hartuz azaldu
    daitezke. Alde batera utzita bertan behera geratutako 2020ko apirileko deialdi hark logika ematen dion ala ez aurtengo
    deialdiari, Europako Parlamenturako bozak dira Urkulluren erabakia azaltzeko aldagai garrantzitsuetako bat; ekainaren
    9an egingo dira horiek. EAJk behin baino gehiagotan adierazi du Europarako bozak «Pedro Sanchezen inguruko plebiszitu
    bat» izango direla, Espainiako Estatu osoan batera egingo baitira.'
