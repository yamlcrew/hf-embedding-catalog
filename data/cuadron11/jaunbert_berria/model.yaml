- source_sentence: Zein da paleoartisten eginkizuna kaskezurren berreraikuntzan?
  sentences:
  - 'Behargin bat hil da Urizaharrean


    Behargin bat hil da gaur arratsaldean Urizaharreko (Araba) harrobian izan den lan istripuan. Ertzaintzak 14:26an izan
    du gertakariaren berri, eta larrialdi zerbitzuak istripua gertatu den lekura bertaratu dira, baina ez dute langilea erreskatatzea
    lortu. Oraindik ez dute argitu istripua zerk eragin duen, baina, lehen informazioen arabera, langilea makina batean harrapatuta
    geratu da. Larrialdi zerbitzuak istripua jazo den lekuan dira oraindik. Ertzainak eta Arabako suhiltzaileak bertaratu
    dira.


    Aurten Euskal Herrian beharrean ari zela hil den zortzigarren langilea da, eta aste honetako laugarrena. Atzo bertan gizon
    bat hil zen Errenteriako (Gipuzkoa) Altzate auzoan, aldamio batetik erorita. Eta herenegun garraiolari bat hil zen Cadreitako
    (Nafarroa) istripu batean. Astelehenean, berriz, beste langile bat hil zen istripuz, Nafarroa iparraldean, Arriben (Araitz).
    Eskailera bat egiten ari zela, zortzi metrotik erori zen.'
  - 'Gimenezek oharatarazi du: «Orain badugu modua herri proiektua berriz lantzeko, eta proiekturik gabe ez dago herritarrak
    motibatzerik». Izan ere, aldi berean arazoaren fruitua eta arazoaren parte dira independentismoari iragarritako emaitzak
    eta hautagaitzen atomizazioa. Peña-Lopezek hauxe azpimarratu du: «Ez dago inolako adostasunik urriaren 1ekoaren analisia
    egiteko orduan, eta, beraz, ezinezkoa da batasuna izatea eta herri proiektu batua osatzea baita gutxienekoetan edo ekintzetan,
    helburuetan edo mugetan ere. Kontua ez baita proiektua bizkorrago edo mantsoago egitea, ezkerreko aldera jotzea edo eskuineko
    aldera jotzea, baizik eta zehaztu gabe daudela denontzako moduko gutxieneko batzuk».


    «2015eko irailaren 29an, parlamentuko deklarazioa bozkatu zen egunean, argi geratu zen independentismoak gaizki kalkulatu
    zuela zer-nolako hegemonia zuen benetan, eta hori ordaindu egiten da», nabarmendu du Pachecok. «Orain ikusten ari gara
    zein diren ondorioak: gehiengoa gal daiteke parlamentuan, eragin sozialak larriak dira, alde batera geratzen ari da oinarria
    zabaltzeko ideia, eta indarra galdu da gizartean». Eta irmo azpimarratu du: «Nolabaiteko arinkeriaz jokatu zuten gobernua
    egituratzeko orduan. Erbesteko gobernu bat osatzea erabakitzen bada, modu serioan egin behar da, ondorio guztietarako».


    Motibatzailea eta gizarte talde askoren batzailea izandako prozesu hura presaka abiatu izanaren ondorio da, hiru politologoen
    ustez, independentismoaren zatiketa. Hirurak bat datoz desilusioa ekarri duela edo, behintzat, egoera batekin gehiegi
    lotutako motibazioa bultzatu zuela deklarazioak epe bat jarri izanak (18 hilabete), pentsatu gabe atzeraldiak eta gatazka
    instituzional eta sozialak izan zitezkeela. Pachecok gogorarazi duenez, «garai batean jende guztiak bere kabuz pentsatzen
    zuen nolakoa izan behar zuen herrialdeak, besteekin kontrastatu gabe, bakoitzak bere eredua amestuta».


    «Erbesteko gobernu bat osatzea erabakitzen bada, modu serioan egin behar da, ondorio guztietarako».'
  - 'Kas-kas kaskezurrari


    Mundu honetan Beltzaren eskuek egin zidaten batzarri, ene kaskezurra fermuki hartu zuelarik. Hola abiatu nuen pasaia gizatiarra.


    Adrie Kennisek hala dio: «Burezurretik hasten da dena». Alfons anaia biritxiarekin batera, kaskezurra eskuetan hartu eta
    biziarazten dute. Alta, ez dira emaginak, ezta ere doulak: Herbehereetako paleoartistak baizik. Konparazione, Lucy australopitekusaren
    burezurra eskuetan tinkatu eta gorpuztu dute, DNA izpi batek lagundurik.


    Neolitoko Ötzi momifikaturik atzeman zutelarik Alpeetan, haren eskultura obratu zuen bikoteak 2011n. Gerora, ordea, zientziaren
    aitzinamenduek azaleratu dute larrua aisa ilunagoa zuela, eta burusoila omen zela. Horregatik ere, Britainia Handiko Cheedar
    ehiztari-biltzailearen berreraikitze berria eskatu diete artistei, paleogenetikaren aurkikuntzek erakutsi baitute, larruaren
    iluntasunez gain, begi urdinak ere bazituela.


    Ene buruari galdetu diot ea ene kaskezurrak nehoiz salatuko ote duen nolakoak ziren ene gorputz-adierazpenak eta morfologia.'
- source_sentence: Zer dinamika eta proposamen alternatibo behar dira egungo ekoizpen eta kontsumo eredua aldatzeko?
  sentences:
  - 'Tapiak fiskalaren aurrean deklaratu zuen iaz, ''Davalor auziari'' lotuta


    Arantxa Tapia Eusko Jaurlaritzako Ekonomiaren Garapen, Jasangarritasun eta Ingurumen sailburuak fiskaltzaren aurrean «ikertu
    gisa» deklaratu zuen 2023a amaitu aurretik. Nafarroako PPko buruzagi ohi Jaime Ignacio del Burgok jarritako salaketa baten
    harira egin zuen. Hark «influentzia trafikoa» leporatu zion Tapiari, Nafarroako Gobernuko Garapen Ekonomikoko kontseilari
    ohi Manu Aierdi konbentzitu zuelakoan Davalor enpresari 2,6 milioi euroko diru laguntza bat emateko, Sodena sozietate
    publikoaren bitartez.


    Fiskaltzaren zitazioa jaso ostean, Tapiak Eusko Jaurlaritzako Etika Publikorako Batzordeari eman zion haren berri, eta
    Gobernantza Publiko eta Autogobernuko sailburu Olatz Garamendik zuzendutako taldeak abenduaren 27an ebatzi zuen haren
    inguruan; Eldiario.es-en arabera, Tapiak jada deklaratu zuen ordurako. Ebazpenean ageri denez, auzia ikerketa aurreko
    fasean zegoela jaso zuen Tapiak —dokumentuan ez da izenik ageri— «ikertu gisa entzuna izateko» EAEko Fiskaltzaren zitazioa.
    Hau da, auzia ez da epaitegietara iritsi; kasu honetan, EAEko Auzitegi Nagusiko instrukzio epaitegi batera, sailburua
    foruduna baita.


    Etika Publikorako Batzordeak abenduan ebatzi zuen ez dagoela Tapiak bere karguan jarraitzeko arazorik ere, epaitegi batek
    ahozko epaiketa ireki ezean. Era berean, adierazi zuen sailburuak fiskalari eta, hala «badagokio, instrukzio epaitegiari»,
    laguntzen jarraitu behar duela.'
  - '2022an Nafarroako esportazioak %11,2 hazi ziren 2021aren aldean. Baina aldi berean inportazioak are gehiago hazi ziren,
    %26,8. Horrela, energia gutxiago kontsumitzen dugun itxuraren atzean, BPGa igota ere, albiste txar bat ezkutatzen da:
    barneko energia-kontsumoaren beherakadak energia kontsumo esternalizatua, kontabilizatu gabea eta sostengaezina eskatzen
    du, planetako beste leku batzuetatik ondasunak inportatu eta garraiatzen direlarik. Munduko energia-kontsumoaren eta berotegi-efektuko
    gasen isurketen hazkundeari egiten diogun ekarpena da.


    Erakundeen diskurtsoak, kapitalismo berdearen bozgorailu gisa, errealitatearekin talka egiten du. Hazkunde ekonomikoaren
    eta ondasunen ekoizpenaren ilusioa inposatu nahi zaigu, energia-iturri berriztagarrien eta garapen teknologikoaren bidez.
    Egiatan, energia-kontsumo bera (barrukoa gehi kanpora ateratakoa) eta kutsadura-maila bera mantentzen edo hau handiagotzen
    jarraitzen dugu; aldiz, berriztagarriekin ez gara erregai fosilak ordezkatzen ari, eta berriztagarrien hedapenak material
    berrien estraktibismoa areagotzen du, honek ekosistemen jasangarritasunean duen inpaktuarekin. Datuek eta ebidentzia zientifikoek
    beste bide baten beharra adierazten digute.


    Beste dinamika eta proposamen batzuk behar ditugu, egungo ekoizpen, kontsumo eta enpresa-irabazien bilaketarako eredua
    zalantzan jartzen duten agertoki berriak irekitzeko. Baliabide naturalen eta kutsaduraren erabilera murriztuz, egiazkoak
    eta materialki eraginkorrak diren politikak garatuz, hemen eta planetako gainerako lekuetan berdintasun sozialera eta
    ongizate kolektibora eramango gaituztenak.'
  - 'Norabidea berrestea


    Iragan urteetako joerak finkatzen ari direla iritzi diote BERRIAko musika kritikariek: hala nola elektronikaren hedapena
    eta post-punkaren indartzea. Dena dela, «eszenaren pluraltasuna» ere nabarmendu dute.


    Urte berri bat hasteak ekar dezake, batzuetan, kolpez bidea aldatzea. Baita musikan ere. Inoiz, ailegatu dira euskal eszena
    guztiz astindu duten joera berri eta apurtzaileak, aurrez ezarritako ildoetatik apartekoak zabaldu dituztenak, eta erakutsi
    dituzte beste paisaia batzuk. 2023an, baina, zenbait talderen pausa eta agur iragarpenak eta beste salbuetsita, susmo
    bat da nagusi: 2022aren aldean, noranzkoa berbera ez ote den. Oro har, tesia hori dela iradoki dute, nork bere manerara,
    Urko Ansa, Julen Azpitarte, Ihintza Orbegozo eta Andoni Tolosa BERRIAko musika kritikariek. «Ez dut uste euskal musika
    asko aldatzen denik urte batetik bestera», esplikatu du Azpitartek. «Norabidearen berrestea» aipatu Orbegozok.


    «Inpresioa daukat aurreko urteetako joerak berretsi direla», garatu du Orbegozok ideia. Inguruari erreparatuz, aise antzeman
    ditu aipatu joera horietako batzuk. Adibidez, belaunaldi berriek Euskal Herrian «errotutako» rockaren eta punkaren tradizioa
    hautsi nahia, orain dela zenbait hamarkada genero horietan ari ziren gazteen antzerako «errebeldiaz» baina rap, trap,
    reggaetoi doinuak eginez eta entzunez. Bestalde, kritikariak nabarmendu du musika elektronikoa are eta gehiago hedatu
    dela aurten. «Beste leku batzuetan baino beranduago bada ere, eta horri eskerrak, elektronikaren azpigeneroen inguruko
    ezagutza gero eta zabalagoa da, eta, izatez, horietako asko kultuzko musika motatzat ere jotzen dira gaur egun».


    Eztanden segidak'
- source_sentence: Zer neurri hartu ditu EAJk pailazoen ikuskizunaren inguruan?
  sentences:
  - 'Donostiako Onkologikoaren integrazioa Osakidetzan


    Osasun Saila: «Aukera emango du Euskadi nazioartean kokatzeko onkologiaren arloan»


    Onkologikoa sare publikoan integratu ostean, protoi terapiako zentro berrian jarri du arreta Alberto Martinezen taldeak.
    Haien esanetan, bi azpiegura horiek jauzi garrantzitsu bat ekarriko dute onkologiako zerbitzuen garapenean.


    Alberto Martinez Osasun sailburuak iragarri zuen otsailean: ekainaren 30ean ipini zuen Onkologikoa Osakidetzaren barruan
    integratzeko data. Hamabi urte igaro dira 2013an Eusko Legebiltzarrak onartu zuenetik Onkologikoa osasun sistema publikoan
    txertatzea eskatzeko mozioa.


    Urteak joan eta urteak etorri, 2018an heldu zion Jaurlaritzak eskaerari: orduan sartu zen indarrean Onkologikoaren publifikazioa
    arautuko zuen dekretua. Handik gutxira, Onkologikoa hasia zen bere jarduerak egokitzen Osakidetzaren plangintzara.


    Bost urteko geldialdiaren ostean berrekin zion prozesuari —COVID-19ak eragindako pandemia tartean—. 2023an hasi zuten
    integrazioa gauzatzeko pausoak ematen: hasieran zerbitzuena bakarrik, eta, gero, funtzionala —azpiegiturak eta langileak
    barne—.


    2024ko urrian, Osasun Sailak jakitera eman zuen Onkologikoaren izaera monografikoa baztertzeko erabakia, «Donostialdea
    ESIko profesionalei entzun ondoren».


    Luze joan da prozesua. Osasun Sailak argudiatu duenez, «konplexutasun handiko prozesua da administrazioaren, zuzenbidearen
    eta lanaren ikuspegitik». Dena dela, gustura daude emaitzarekin: «Onkologikoa Donostialdeko ESIan integratzeko prozesuak,
    protoi terapiako eraikin berriaren ondoan, eragin positiboa izango du euskal gizarte osoarentzat, eta aukera emango du
    Euskadi nazioartean kokatzeko onkologiaren arloan».


    Protoi terapiako zentroa nola izango den irudikatzen duen infografia. BERRIA


    Protoi terapiako zentroa, 2027rako prest'
  - 'Rousseauk jakinarazi du protesta ekintzak egingo dituztela aste osoan, «eta beharrezkoa den denbora guztian ere».


    Bilera, arratsaldean


    Parisko gobernua laborarien haserrea baretu nahian dabil azken egunotan. Gabriel Attal lehen ministroa eta Marc Fesneau
    Laborantza ministroa 18:00etan bilduko da FNSEAren eta haren gazte adarreko buruzagiekin. Aurretik, Fesneauk iragarri
    du gibeleratu egingo dutela laborantzako lege proiektua. Etzi zuen aurkeztekoa, baina aste batzuk hartuko dituzte orain
    zenbait aldaketa egiteko; horien artean, laborari gazteak instalatzeko prozedurak errazteko.


    Duela bi aste hartu zuen gobernuaren gidaritza Attalek, eta nekazarien krisiari aurre egin behar dio lehen-lehenik. Asko
    du jokoan, Emmanuel Macron presidenteak ez duelako nahi laborarien haserrea jaka horien protestaren mailara iristea. Osagai
    politikoak ere baditu krisiak, eskuin muturra (RN Batasun Nazionala) eta eskuina (Errepublikanoak) krisiari etekin politikoa
    atera nahian dabiltzalako.'
  - 'duela egiten. Haien asmoa ez da inor betatzea, inor debekatzea edota jazartzea, baina aizu, terrorismoaren biktimak mintzen
    badira, EAJren lana da pailazoei belarritik tira egitea, haien ikuskizuna agendatik kentzea, espazio publikoa galaraztea
