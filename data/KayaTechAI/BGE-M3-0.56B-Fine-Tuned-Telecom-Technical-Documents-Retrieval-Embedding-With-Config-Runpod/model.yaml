widgetData:
- source_sentence: How does the Session Description Protocol (SDP) typically facilitate media session setup?
  sentences:
  - The Serving GPRS Support Node (SGSN) typically initiates a PDP context activation procedure towards the GGSN after receiving
    a request from the mobile device.
  - SDP is used to describe the parameters for media streams, such as codecs, transport protocols, and IP addresses, enabling
    endpoints to agree on how to exchange media.
  - They show the order of the bits produced by the speech encoder.
- source_sentence: What is the primary function of an encoder in digital signal processing?
  sentences:
  - An encoder converts raw data into a specific digital format, often for compression or transmission.
  - A packetization time of 20ms is specified for GSM_HR within the Circuit Switched Core Network.
  - No, a fixed line may not always accept a hook flash, for instance, if it is an ISDN line.
- source_sentence: What are the three distinct categories of Integration Reference Point (IRP) specifications?
  sentences:
  - The three categories are Interface IRPs, NRM IRPs, and Data Definition IRPs.
  - Certain categories of UEs may be configured for uplink MIMO operation in CELL_DCH state.
  - MCData private emergency alerts are targeted to an MCData user.
- source_sentence: What security requirement applies to the management connection between a Home NodeB/Home eNodeB and the
    operator's management platform?
  sentences:
  - The management connection between a Home NodeB/Home eNodeB and the operator's management platform must be end-to-end secure.
  - The gprsSSF sends the ApplyChargingReportGPRS operation to report charging-related information to the gsmSCF as previously
    requested.
  - The Voice Activity Detection (VAD) algorithm uses these results.
- source_sentence: What is the provisioning scope for the eMLPP service?
  sentences:
  - eMLPP is provisioned per subscriber.
  - The main objective is to verify that the User Equipment (UE) tracks channel variations and selects the optimal transport
    format for frequency non-selective scheduling.
  - SDP is used in SIP communications to describe the parameters and media capabilities of a session, such as audio/video
    codecs, transport protocols, and IP addresses, enabling participants to agree on the media types to be used.
