widgetData:
- source_sentence: A certain junior class has 1000 students and a certain senior class has 900 students. Among these students,
    there are 60 siblings pairs each consisting of 1 junior and 1 senior. If 1 student is to be selected at random from each
    class, what is the probability that the 2 students selected will be a sibling pair?
  sentences:
  - Let's see Pick 60/1000 first Then we can only pick 1 other pair from the 800 So total will be 60 / 900 *1000 Simplify
    and you get 2/30000
  - To maximize number of hot dogs with 300$ Total number of hot dogs bought in 250-pack = 22.95*13 =298.35$ Amount remaining
    = 300 - 298.35 = 1.65$ This amount is too less to buy any 8- pack . Greatest number of hot dogs one can buy with 300 $
    = 250*13 = 3250
  - artificial leg
- source_sentence: A stock trader originally bought 300 shares of stock from a company at a total cost of m dollars. If each
    share was sold at 80% above the original cost per share of stock, then interns of m for how many dollars was each share
    sold?
  sentences:
  - Let Cost of 300 shares be $ 3000 So, Cost of 1 shares be $ 10 =>m/300 Selling price per share = (100+80)/100 * m/300 Or,
    Selling price per share = 9/5 * m/300 => 9m/1500
  - The prognostic value of p53 nuclear accumulation in gastric cancer is still unclear, as shown by the discordant results
    still reported in the literature. In this study, we evaluated the correlation between p53 accumulation and long-term survival
    of patients resected for intestinal and diffuse-type gastric cancer. Eighty-three patients with carcinoma of the intestinal
    type and 53 patients with carcinoma of the diffuse type were included in the study. Immunohistochemical staining of the
    paraffin sections was performed by using monoclonal antibody DO1; cases were considered positive when nuclear immunostaining
    was observed in 10% or more of the tumor cells. Prognostic significance of different variables was investigated by univariate
    and multivariate analysis. p53 positivity was found in 51.8% of intestinal-type and 50.9% of diffuse-type cases. No significant
    correlation between the rate of p53 overexpression and age, sex, tumor location, tumor size, depth of invasion, lymph
    node involvement, distant metastases, and surgical radicality was found in the two groups of patients. A statistically
    significant difference in survival rate was observed between p53-negative and p53-positive cases in the intestinal type
    (P < .05), confirmed by multivariate analysis (P < .005; relative risk = 3.09). On the contrary, no correlation with survival
    was found in diffuse-type cases according to p53 overexpression.
  - Many animal behaviors occur in a regular cycle. Two types of cyclic behaviors are circadian rhythms and migration.
- source_sentence: Are lactate levels in severe malarial anaemia associated with haemozoin-containing neutrophils and low
    levels of IL-12?
  sentences:
  - Hyperlactataemia is often associated with a poor outcome in severe malaria in African children. To unravel the complex
    pathophysiology of this condition the relationship between plasma lactate levels, parasite density, pro- and anti-inflammatory
    cytokines, and haemozoin-containing leucocytes was studied in children with severe falciparum malarial anaemia. Twenty-six
    children with a primary diagnosis of severe malarial anaemia with any asexual Plasmodium falciparum parasite density and
    Hb < 5 g/dL were studied and the association of plasma lactate levels and haemozoin-containing leucocytes, parasite density,
    pro- and anti-inflammatory cytokines was measured. The same associations were measured in non-severe malaria controls
    (N = 60). Parasite density was associated with lactate levels on admission (r = 0.56, P < 0.005). Moreover, haemozoin-containing
    neutrophils and IL-12 were strongly associated with plasma lactate levels, independently of parasite density (r = 0.60,
    P = 0.003 and r = -0.46, P = 0.02, respectively). These associations were not found in controls with uncomplicated malarial
    anaemia.
  - one of two female reproductive organs that produces eggs and secretes estrogen.
  - hydrogen
- source_sentence: Does phosphatidylethanol mediate its effects on the vascular endothelial growth factor via HDL receptor
    in endothelial cells?
  sentences:
  - 'Patients having previous bariatric surgery are at risk for weight regain and return of co-morbidities. If an anatomic
    basis for the failure is identified, many surgeons advocate revision or conversion to a Roux-en-Y gastric bypass. The
    aim of this study was to determine whether revisional bariatric surgery leads to sufficient weight loss and co-morbidity
    remission. From 2005-2012, patients undergoing revision were entered into a prospectively maintained database. Perioperative
    outcomes, including complications, weight loss, and co-morbidity remission, were examined for all patients with a history
    of a previous vertical banded gastroplasty (VBG) or Roux-en-Y gastric bypass (RYGB). Twenty-two patients with a history
    of RYGB and 56 with a history of VBG were identified. Following the revisional procedure, the RYGB group experienced 35.8%
    excess weight loss (%EWL) and a 31.8% morbidity rate. For the VBG group, patients experienced a 46.2% %EWL from their
    weight before the revisional operation with a 51.8% morbidity rate. Co-morbidity remission rate was excellent. Diabetes
    (VBG:100%, RYGB: 85.7%), gastroesophageal reflux disease (VBG: 94.4%, RYGB: 80%), and hypertension (VBG: 74.2%, RYGB:60%)
    demonstrated significant improvement.'
  - 'Explanation: Let A, B, C represent their respective weights. Then, we have: A + B + C = (45 x 3) = 135 …. (i) A + B =
    (40 x 2) = 80 …. (ii) B + C = (44 x 2) = 88 ….(iii) Adding (ii) and (iii), we get: A + 2B + C = 168 …. (iv) Subtracting
    (i) from (iv), we get : B = 33. B’s weight = 33 kg.'
  - Previous epidemiological studies have shown that light to moderate alcohol consumption has protective effects against
    coronary heart disease but the mechanisms of the beneficial effect of alcohol are not known. Ethanol may increase high
    density lipoprotein (HDL) cholesterol concentration, augment the reverse cholesterol transport, or regulate growth factors
    or adhesion molecules. To study whether qualitative changes in HDL phospholipids mediate part of the beneficial effects
    of alcohol on atherosclerosis by HDL receptor, we investigated whether phosphatidylethanol (PEth) in HDL particles affects
    the secretion of vascular endothelial growth factor (VEGF) by a human scavenger receptor CD36 and LIMPII analog-I (CLA-1)-mediated
    pathway. Human EA.hy 926 endothelial cells were incubated in the presence of native HDL or PEth-HDL. VEGF concentration
    and CLA-1 protein expression were measured. Human CLA-1 receptor-mediated mechanisms in endothelial cells were studied
    using CLA-1 blocking antibody and protein kinase inhibitors. Phosphatidylethanol-containing HDL particles caused a 6-fold
    increase in the expression of CLA-1 in endothelial cells compared with the effect of native HDL. That emergent effect
    was mediated mainly through protein kinase C and p44/42 mitogen-activated protein kinase pathways. PEth increased the
    secretion of VEGF and that increase could be abolished by a CLA-1 blocking antibody.
- source_sentence: Said to go hand-in-hand with science, what evolves as new materials, designs, and processes are invented?
  sentences:
  - Technology evolves as new materials, designs, and processes are invented.
  - Technological design constraints may be physical or social.
