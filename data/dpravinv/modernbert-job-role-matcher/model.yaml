widgetData:
- source_sentence: Logistics Services Manager
  sentences:
  - 'The Logistics Contracts Manager/Logistics Programme Manager is responsible for managing multiple logistics programmes
    and related customer service activities. He/She is also responsible for managing the contracts to ensure customer requirements
    are met and managing overall programme resources, including manpower, internal assets and external vendors.


    Analytical and logical, he is required to manage resources and obtain buy-in from internal and external stakeholders.
    He is also expected to lead programmes and make business decisions independently.'
  - "The Quality Engineer identifies user requirements and expectations to inform quality standards for end-products, and\
    \ analyses product development processes to identify relevant quality standards. He/She incorporates relevant and suitable\
    \ international standards into product development processes, quality standards and testing processes. He identifies quality-testing\
    \ types and variations based on business needs and requirements and develops testing processes. He identifies suitable\
    \ measures of quality for testing and contributes to the development of test scenarios and plans. He conducts various\
    \ quality tests, and analyses data to identify operating and usage conditions in which performance of quality measures\
    \ starts to decline. He also automates quality testing for applicable and suitable tests.\n\nHe works in a team setting\
    \ and is proficient in programming languages required by the organisation. He is familiar with international quality standards,\
    \ and uses test automation frameworks and tools, as well as applicable quality testing and analysis tools.  \n\nThe Quality\
    \ Engineer possesses strong analytical ability with excellent communication and interpersonal skills. He is highly meticulous\
    \ in nature, curious and work dynamically."
  - 'The Customer Services Agent provides assistance to customers at check-in counters. He/She ensures that passengers details
    match the information on travel documents and handles customer issues regarding flight operations and automated check-in
    systems. To maintain a safe working environment, he complies with all safety and/or security standards and reports safety
    and/or security breaches to officers and supervisors.


    The Customer Services Agent demonstrates professional behaviour when responding to passenger complaints and acts as a
    service ambassador for the organisation. He works in shifts to accommodate round-the-clock flight arrivals and departures.
    He is physically strong to assist passengers with lifting of their baggage. Furthermore, he is service-oriented, possesses
    good communication skills as well as handles passengers with special needs in an appropriate manner.'
- source_sentence: Rail Facility Maintenance Technician
  sentences:
  - "A Patient Service Assistant Supervisor is responsible for supporting the frontline services provided. S/He assists supervisors\
    \ in the management of department operations and the team involved in providing frontline services. S/He is required to\
    \ assist in managing complaints. S/He assist supervisors in the performance of risk and quality management.\n\nS/He may\
    \ work in various locations such as private and public hospitals, community and primary care settings. S/He may assist\
    \ to manage different counters including reception for patient registration, billing and payment as well as patient care.\
    \ \n\nS/He should be proactive and meticulous. S/He should possess interpersonal, leadership and problem-solving skills.\n"
  - 'The Technician (Mechanical and Electrical) works in a team to perform preventive and corrective maintenance of mechanical
    and electrical systems at various rail premises. He/She assists in the preparation of maintenance work and performs routine
    maintenance under supervision. He supports the team in conducting fault analysis and testing to improve the reliability
    of mechanical and electrical systems as well as supervises the work of contractors and external stakeholders in ensuring
    compliance to safety requirements and operating standards.


    He is required to work in shifts and carries out his duties in the workshops and at various train stations. He is technically
    inclined and adept in the repair and maintenance of mechanical and electrical systems. He is capable of communicating
    effectively within the team, able to multi-task and prioritise his assigned maintenance workload in supporting maintenance
    activities.'
  - 'The Product Manager drives the conceptualisation, development, launch and ongoing evolution of specific products for
    the organisation to deliver the intended customer experience. He/She develops the strategic roadmap for the products in
    alignment with the overall product strategy, and ensures that the product roadmap supports business drivers by defining
    key success criteria for the product. He directs market research for gathering product feedback and identifying improvement
    areas and opportunities for the product and/or associated services. He also collaborates with various teams to develop
    engaging marketing materials for integrated product and content/service offerings.


    The work involves collaboration with the organisation''s leadership for defining the strategic direction for the product
    to drive the operational efficiency and customer reach. He is expected to keep an eye on the market for tracking the evolution
    of technologies, competitors and customer behaviour that could impact the product and/or service.


    He should be an effective leader, with a broad sense of perspective and strong business acumen. He ought to possess the
    ability to inspire and influence key internal and external stakeholders and should be able to build and manage wider relationships.
    He should also be seen as a key industry expert in his domain.'
- source_sentence: Business Development Analyst
  sentences:
  - 'The Production Supervisor supervises production staff to ensure production targets are met, in accordance with organisation
    policies and workplace safety and health regulations. He/She is responsible for planning, assigning and directing work,
    coordinating weekly meetings, addressing product and employee complaints, and resolving problems. He also implements policies
    and procedures and recommends improvements with a view to increase efficiency and productivity in production methods,
    equipment, operating procedures and working conditions.


    He works with his colleagues in a manufacturing plant setting. He possesses leadership and communication skills to set
    direction to achieve organisational goals.'
  - "The Business Analyst/Market Research Analyst/Market Analyst supports the operational insights for the development of\
    \ business strategies. He/She identifies areas for new business development opportunities by gathering data, analysing\
    \ information and generating reports based on industry and market trends. \n\nThe Business Analyst/Market Research Analyst/Market\
    \ Analyst possesses good communication, planning and organisational skills. He is also able to manage stakeholders and\
    \ work effectively in a team. He is a highly driven, motivated and confident individual, and is able to deliver results\
    \ in a dynamic business environment."
  - "The Lead Product Designer drives the design and development of the product line lifecycle, including the end-to-end iterative\
    \ design process. He/She empowers the team to drive product development in the conceptualisation and design phase, including\
    \ formulation of design strategies and achieving design solutions based on insights researched by the team.\n\nHe evaluates\
    \ design concepts and drawings to determine the best product. He has a strong understanding on how product technologies\
    \ and frameworks can formulate impactful design concepts, is well-versed in product development lifecycles and stays abreast\
    \ of the latest emerging industry trends in terms of product design.\n\nThe Lead Product Designer translates market insights,\
    \ emerging industry trends and feedback from teams, into novel product design strategies, with a clear view of how this\
    \ sits within the product development lifecycle. He is articulate and a strong communicator with internal and external\
    \ stakeholders and manages stakeholders\x92 expectations as well as coach the team to build their competencies in product\
    \ design. "
- source_sentence: In-Flight Catering Operations Manager
  sentences:
  - 'The Manager (Production/Catering-Cabin) leads collaborative efforts with other departments and airlines to review catering
    operations and ensure compliance with food hygiene and quality standards. He/She is responsible for driving continuous
    improvement and business development initiatives to improve productivity and meet customer needs. He develops Standard
    Operating Procedures (SOPs) and systems to mitigate safety and/or security risks and oversees adherence to safety and/or
    security standards. He also develops the teams technical capabilities through coaching and maintains positive morale within
    the teams.


    The Manager (Production/Catering-Cabin) has an in-depth knowledge of supply chain operations, food handling and production
    processes in the airline industry. He also possesses remarkable interpersonal and stakeholder management skills to build
    and maintain relationships with internal and external stakeholders. In addition, he has strong communication and people
    management skills to lead staff and teams with extensive knowledge of policy requirements and quality and hygiene regulations
    of the organisation and internationally.'
  - "The Waste Recycling Executive/Waste Recovery Executive assists with the management of waste sorting and materials recovery\
    \ operations. He/She consolidates relevant data to research on the existing and emerging trends on waste and recyclables\
    \ sorting processes. He also recommends suitable equipment and/or technologies to improve waste and recyclables sorting\
    \ operations. He is required to evaluate reported mechanical faults to rectify issues. In performing most of these functions,\
    \ he recommends and facilitate the implementation of effective work processes, maintenance schedules of equipment and\
    \ manage incidents related to waste sorting operations. \n\nHe works in a waste management facility where he is exposed\
    \ to unpleasant sights and smells, and may at times be exposed to dangerous and/or toxic substances. He oversees the handling\
    \ of potentially dangerous materials and ensures that all activities are completed in a safe and efficient manner. He\
    \ is also required to manage teams and incidents relating to waste sorting and materials recovery operations and to communicate\
    \ with relevant stakeholders and clients. \n\nHe is organised, responsive, approachable, able to multi-task and capable\
    \ of interacting with stakeholders."
  - The Associate Business Analyst assists in the identification and analysis of business requirements and systems specifications.
    He/She conducts feasibility studies and analysis on the risk and benefits of proposed solutions. He analyses systems and
    processes to identify enhancement opportunities to resolve system gaps, evaluates the ability of an existing system to
    support proposed changes, and identifies systems deficiencies and performance gaps. He assists with translating business
    requirements into functional specifications, and documents specifications and interfaces between legacy and new systems,
    and systems enhancements and detailed specifications. He supports users on change control and systems updates and User
    Acceptance Testing and integration testing in accordance with the implementation plan. He is knowledgeable of techniques
    to elicit and manage requirements, as well as software development models including Agile methodologies. He is also familiar
    with requirements life cycle management, analysis planning and monitoring, requirements analysis and design definition.
    The Associate Business Analyst possesses an analytical mind, and is able to see interlinkages with system solutions and
    usability. He adopts a systematic approach in handling ambiguous or complex issues, and actively discusses his perspectives
    to arrive at effective solutions.
- source_sentence: Senior Aerospace Quality Control Engineer
  sentences:
  - The Senior NDT Level 3 Engineer (Aircraft Maintenance) manages non-destructive testing (NDT) operations for assessing
    the quality of aircraft structures. He/She establishes new NDT techniques and qualifies new procedures. He drives compliance
    of all NDT inspections with the requirements of customers, original equipment manufacturer (OEM) and EN 4179, NAS 410,
    NADCAP as appropriate. He drives collaboration with workshops and engineering teams for failure investigations and recommends
    engineering solutions for structural flaws and defects. He develops special process control plans and manages equipment
    maintenance and operator certification programmes. He also monitors results of NDT for trends and corrective actions,
    and leads technical audits to ensure compliance with relevant standards and NDT requirements. He reviews compliance with
    airworthiness and legislative requirements, while proposing enhancements to the organisation's standard operating procedures
    (SOPs), and safety, health and quality systems. He proactively contributes to the development of lean and sustainability
    practices, and conducts research and digital innovation in NDT for continuous process improvements. As a team leader,
    he appraises staff performance and conducts coaching and training for level 1 and level 2 NDT personnel. He is able to
    work cross-functionally, employing critical reasoning, analytical thinking and problem-solving skills to identify deviations
    and mitigate potential quality risks in aircraft maintenance processes.
  - "The Workplace Safety and Health (WSH) Coordinator is responsible for coordinating health and safety systems in the organisation,\
    \ and conducting periodic inspections to ensure that the implemented risk control measures are being observed and practiced.\
    \ He/she investigates and reports WSH incidents and coordinate implementation of emergency preparedness and response plans.\
    \ \n\nHe/She is required to work on-site in his course of work. \n\nThe WSH Coordinator is practical and meticulous. He\
    \ is required to observe safety hazards and deal with them in a prompt and decisive manner.\n"
  - 'The Automation Coordinator/Robot Coordinator oversees automated equipment and robots used in manufacturing processes.
    He/She is the primary responder, responsible for troubleshooting automated production systems and performing preventive
    and predictive maintenance on equipment. He also contributes to process optimisation by managing data from automated manufacturing
    systems to facilitate real-time insight gathering and decision-making.


    He may be required to work on rotating shifts in a factory setting, and under strict compliance to workplace safety and
    health requirements, organisational quality control and other parameters.


    He is able to work independently, and as part of a team, to achieve production and quality targets, and interact effectively
    with others to ensure that all issues are resolved appropriately and efficiently.'
