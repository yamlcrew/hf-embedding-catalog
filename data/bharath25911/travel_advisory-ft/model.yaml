- source_sentence: What are the symptoms caused by the chikungunya virus?
  sentences:
  - 'In the Northern Hemisphere, the flu season usually runs from November to   April.

     In the Southern Hemisphere, the flu season usually runs between April and   October.

     In the tropics, there is flu activity year round.'
  - "The virus that causes chikungunya is spread through the bite of an infected mosquito. It can cause fever and pain in\
    \ the joints. In some cases, the joint pain can be severe and last for months or years.\nProtect yourself from mosquito\
    \ bites at all times.\nLearn more:\nInsect bite and pest preventionChikungunyaDengue \nIn this country, risk of dengue is\
    \ sporadic. It is a viral disease spread to humans by mosquito bites.\nDengue can cause flu-like symptoms. In some cases,\
    \ it can lead to severe dengue, which can be fatal.\nThe level of risk of dengue changes seasonally, and varies from year\
    \ to year. The level of risk also varies between regions in a country and can depend on the elevation in the region."
  - 'Health

    Relevant Travel Health NoticesGlobal Measles Notice - 13 March, 2024COVID-19 and International Travel - 13 March, 2024This
    section has information and advice about health risks you might face when travelling. Following this advice can help reduce
    your risk of getting sick. Not all risks are listed here.It''s best to talk to a healthcare provider or visit a travel
    health clinic preferably 6 weeks before your trip to get personalized health advice. Even if your travel date is coming
    up soon, it''s still worthwhile to make an appointment.Routine vaccines

    Make sure your routine vaccinations are up-to-date before you travel, no matter where you’re going.'
- source_sentence: What are the recommended methods for cleaning your hands to reduce the spread of infectious diseases?
  sentences:
  - 'To reduce your risk of getting sick, avoid contact with animals like stray dogs, livestock (such as pigs and cows), monkeys,
    snakes, rodents, birds, and bats. Avoid eating undercooked meat.

    Make sure to closely watch children; they are more likely to try to touch animals.Person-to-person infections

    When travelling, you can reduce your risk of getting or spreading respiratory infections, like the flu or COVID-19, by:


    staying at your accommodation and limiting contact with others if you’re sick

    wearing a well-fitting mask, especially: 


    if you’re sick and need to be around others 

    when you’re at large indoor events or in crowded settings, like sporting events, concerts, and airports'
  - 'cleaning your hands regularly with soap and water for at least 20 seconds, or using hand sanitizer containing at least
    60% alcohol

    covering your coughs and sneezes with a tissue or your elbow, not your hands


    Mass gatherings (large-scale events)Clean your hands to help reduce the spread of infectious diseasesRespiratory infectious
    diseases: How to reduce the spread with personal protective measures

    To lower your risk of getting sexually transmissible infections (STIs), HIV, and mpox, you can:


    get vaccinated against mpox if you’re eligible

    have fewer sexual partners

    use protection during sexual activity, like condoms and dental dams.'
