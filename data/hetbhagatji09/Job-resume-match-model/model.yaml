- source_sentence: '6007 - O''Fallon - 1254 Central Park Drive, O''Fallon, Illinois, 62269 CarMax, the way your career should
    be! About This Job As a Customer Specialist, you will be empowered to provide an iconic experience for our Customers by
    acting as a guide and offering support during every step of their CarMax journey, reinforcing our simple and seamless
    process. While communicating and partnering effectively with teams across the organization, you will work to ensure each
    customer has a positive experience buying and selling cars. We’ve become the nation’s largest retailer of used cars due
    to our honesty and transparency, and those same values will help you succeed, too. What You Will Do – Essential Responsibilities
    Provide exceptional customer service by guiding customers every step of the way, from sale or facilitating the appraisal
    to test drives and arranging financing applicationsConduct vehicle condition assessments by collecting, recording, and
    communicating information to Buyers that will be used to perform customer appraisalsCheck in and receive vehicles that
    are shipped to CarMax; complete the daily scanning and reconciliation of vehicle inventoryPerform cosmetic inspections
    and ensure that all vehicles meet CarMax Quality StandardsPerform various administrative duties, including, but not limited
    to: printing daily reports, maintaining transaction paperwork, contacting finance companies regarding Customer contracts,
    obtaining requirement information regarding registration and/or titling, auditing completed paperwork, cash/payment managementCreate
    service appointments and review repair order invoices for retail service work performed; ensure accuracy of documentation
    for billing Purpose of the role This is a high-energy retail sales environment where you will work as a team to meet goals
    and handle a wide range of customer interactions. To make sure everything goes smoothly, the ability to quickly build
    rapport with people and understand their needs is essential. You will manage a variety of diverse tasks, with limited
    supervision, including vehicle sales, processing of sales paperwork, assessing vehicle condition for use in appraisals,
    and even managing repair orders. We work and learn as a team and the prospects are bright for professionals who aspire
    to become mentors, managers and business leaders. Qualifications And Requirements To perform this job successfully, an
    individual must be able to perform each essential duty satisfactorily. The requirements listed below are representative
    of the knowledge, skill, and/or ability required. Reasonable accommodations may be made to enable individuals with disabilities
    to perform the essential functions. Demonstrate exceptional communication skillsDisplay confidence in self, the product
    and CarMaxAbility to build and maintain strong relationshipsDemonstrate strong team behaviors including integrity, respect,
    inclusion, fairness and funBalance the needs of the Customer and the business when making decisionsSeek to fully understand
    and meet Customer needsCreate win-win solutions to Customer issuesGet work done well, on time and follow the right processDrive
    work processes and pay close attention to detailPerform multiple duties in a high energy, fast-paced working environmentRead,
    interpret and transcribe data in order to maintain accurate recordsLift objects that weigh as much as 25 lbs. Education
    And/or Experience High School Diploma, or equivalentSales and customer service experience, in an area such as retail,
    preferredValid Driver’s LicenseBasic skills with Microsoft Office Suite (e.g., Word, Excel and PowerPoint) preferred About
    CarMax CarMax disrupted the auto industry by delivering the honest, transparent and high-integrity experience customers
    want and deserve. This innovative thinking around the way cars are bought and sold has helped us become the nation’s largest
    retailer of used cars, with over 200 locations nationwide. Our amazing team of more than 25,000 associates work together
    to deliver iconic customer experiences. Along the way, we help every associate grow their career and achieve their best,
    at work and in their community. We are recognized for our commitment to training and diversity and are one of the FORTUNE
    100 Best Companies to Work For®. CarMax is an equal opportunity employer, and all qualified candidates will receive consideration
    for employment without regard to race, color, religion, sex, sexual orientation, gender identity, genetic information,
    national origin, protected veteran status, disability status, or any other characteristic protected by law. Upon an applicant''s
    request, CarMax will consider reasonable accommodation to complete the CarMax Job Application .'
  sentences:
  - As a compassionate and experienced educator with a strong passion for early childhood development, I am dedicated to creating
