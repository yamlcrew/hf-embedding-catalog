- source_sentence: 'Our client, an industrial controls and engineering firm is seeking a Automation Engineer to join their
    team. As an Automation Engineer, you will be part of the Automation group supporting client projects in the industrial
    automation field. This is a great opportunity to join a team of telented engineers specializing in industrial controls
    and automation, SCADA, instrumentation, wired and wireless networks, reporting systems, and related technologies. Job
    Title: Automation Engineer Location: Irvine, CA OR Thousand Oaks, CA Pay: $100,000 - $140,000 Key Responsibilities PLC
    programming HMI software programming Field instrumentation of: PLCs, motors, pumps, valves, sensors, etc. Computer, virtualized
    servers, network configuration and installation Field installation and startup involving all of the above and generally
    "making it work" Requirements PLC, HMI Programming experience Experience with Industrial Controls/Automation SCADA Bachelors
    Degree If this is a role that interests you and you’d like to learn more, click apply now and a recruiter will be in touch
    with you to discuss this great opportunity. We look forward to speaking with you! About ManpowerGroup, Parent Company
    Of Experis ManpowerGroup® (NYSE: MAN), the leading global workforce solutions company, helps organizations transform in
    a fast-changing world of work by sourcing, assessing, developing, and managing the talent that enables them to win. We
    develop innovative solutions for hundreds of thousands of organizations every year, providing them with skilled talent
    while finding meaningful, sustainable employment for millions of people across a wide range of industries and skills.
    Our expert family of brands – Manpower, Experis, Talent Solutions, and Jefferson Wells – creates substantial value for
    candidates and clients across more than 75 countries and territories and has done so for over 70 years. We are recognized
    consistently for our diversity - as a best place to work for Women, Inclusion, Equality and Disability and in 2022 ManpowerGroup
    was named one of the World''s Most Ethical Companies for the 13th year - all confirming our position as the brand of choice
    for in-demand talent. project engineering'
