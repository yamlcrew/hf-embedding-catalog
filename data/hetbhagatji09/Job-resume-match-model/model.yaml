  - source_sentence: 'ROLE DESCRIPTION We''re seeking a polished and persuasive Sr. Copywriter to help shape compelling narratives
      for our clients across a range of industries.This role requires a strong command of language, the ability to adapt your
      style to different audiences, and seamless collaboration with other creatives to ensure outputs are on-brand and on-brief.
      The ideal candidate is a skilled wordsmith with a penchant for taking big-picture thinking and bringing the details
      to life in a highly creative and collaborative environment. PRIMARY RESPONSIBILITIESCopywriting: Writes and edits clear,
      concise, and engaging copy for various formats (CPG, websites, sales materials, marketing campaigns, ect.) Ensures copy
      is grammatically correct, engaging, and persuasive.Attention to Detail & Adaptability: Possesses a meticulous eye for
      detail, ensuring grammatical accuracy while flexibly adapting writing styles to suit diverse audiences, purposes, and
      brand voices.Collaboration: Works closely with Creative Directors and other teams to generate unique ideas and develop
      compelling copy that is on brief and on brand. Strategic Support: Contribute to the research and discovery phases of
      brand strategy development using various methods.Concept Development: Generate unique ideas and develop compelling copy
      that is on brief and on brand. QUALIFICATIONS4-5 years of proven copywriting experience in an agency setting A well-developed
      portfolio demonstrating a strong command of language, syntax, and a variety of copywriting stylesDemonstrated ability
      to think strategically and translate insights into actionable messagingExperience working in cross-functional teams
      and collaborating with designers and strategists BONUSPrevious copywriting experience for packaging and CPG ATTRIBUTES
      OF SKIDMORVIANS Ability to work entrepreneurially in shades of grayAdaptable and flexible with wearing “multiple hats”
      within our boutique studioResourceful and comfortable with taking ownership of undefined work or problem solvingAbility
      to bring structure to the nebulous and communicate clearly in the face of ambiguity Desire for excellence and to learn
      and growCoachable, continuous learner who is vulnerable about one’s own growthCurious and hungry for knowledge, with
      a desire to excel and have meaningful impactHigh creative and service standards with a passion for continuous improvement
      Passionate about Brand, Collaboration, and ResultsCreative, innovative problem solver who cares more for collaboration
      than being “right,” the winner, or in chargeAbility to capture and respond to feedback in ways that value othersDesire
      to remove “not possible” from your vocabulary; substitute with “how might we…” PURPOSE + VALUES OF SKIDMORVIANSEvery
      member of the Skidmore team is expected to continuously strive to fulfill the Studio’s core purpose and uphold our core
      values:Core Purpose: To help good organizations and good people be their best. Core Values:Be a Sage: Bring wisdom,
      Add confidence, Be discerningHave the Zest: Bring enthusiasm, Add flavor, Be genuineDeliver the Goods: Bring purpose,
      Add value, Be unified BENEFITSPaid time off: Paid vacations days, 11-13 paid holidays per calendar year, and unlimited
      paid sick/personal time after 60 days employment.Medical Coverage: The Studio pays a portion of the premium for both
      employees and eligible family members.Dental Coverage: 100% Studio paid for employees.Vision Coverage: 100% Studio paid
      for employees.401K Plan: Sponsored 401k retirement savings plan which includes an employer match after 90 days employment.Wellness
      Reimbursement: Monthly wellness stipend.Wireless Communication Stipend: Stipend for personal cell phone and home internet
      expenses. COACHING & PERSONAL DEVELOPMENTEvery Skidmorvian is supported with a customized, personal development plan
      with regular coaching sessions. The plans include rituals and routines for recognition; education and training planning;
      skills, values, and performance evaluations; and career path creation. Skidmorvians are expected to have personal commitment
      to their own development, and develop the ability to ask for and receive support from studio’s managers, leadership,
      and coaches. REMOTE / VIRTUAL / “CONNECTED” STUDIOSkidmore Studio is operated as a connected team who work remotely,
      predominately in Eastern and Central Time Zones. Our virtual work expectation is the team is connected Monday through
      Friday and available for online meetings, phone calls and chats during common business hours (9 am – 5 pm Eastern, 8
      am - 4 pm Central).Our team is expected to travel for in-person studio-wide meetings every quarter. Previously, those
      quarterly meetings were taking place in Detroit, Michigan. Future locations may change.Teammates are provided company
      hardware and software tools relevant to their roles and are expected to have reliable internet connections and the ability
      to appear on camera for meetings indicated as video conferences. ABOUT SKIDMORESkidmore Studio is a strategic creative
      studio originally based in Detroit and now running remotely. Founded as an illustration shop in 1959, the studio helps
      consumer-facing organizations grow through expert brand strategy, design, packaging, website, and marketing support.
      The team of designers and creative strategists craft brands that get today’s consumers excited about products on shelves,
      online, and in their everyday lives. Skidmore works with nationally recognized CPG brands such as Vital Essentials,
      Zee Zee’s, McCrea’s, Smooj, Griffin Claw, Xenith, and Lipari Foods.'
