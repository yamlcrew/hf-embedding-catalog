  - One of the paper's authors, Eric Steig of the University of Washington, stated "We now see warming is taking place on
    all seven of the earth’s continents in accord with what models predict as a response to greenhouse gases."
  - This effect results in the increased absorption of radiation that accelerates melting."
- source_sentence: The Greenland ice sheet is at least 400,000 years old and warming was not global when Europeans settled
    in Greeland 1,000 years ago
  sentences:
  - 'Between 2001 and 2005: Sermeq Kujalleq broke up, losing 93 square kilometres (36 sq mi) and raised awareness worldwide
    of glacial response to global climate change.'
  - On the other hand, any doubling of the percentage of carbon dioxide in the air would raise the temperature of the earth's
    surface by 4°; and if the carbon dioxide were increased fourfold, the temperature would rise by 8°."
  - IPCC authors concluded ECS is very likely to be greater than 1.5 °C (2.7 °F) and likely to lie in the range 2 to 4.5 °C
