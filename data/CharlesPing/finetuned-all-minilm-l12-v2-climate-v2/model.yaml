    time.
  - Developers in Florida have announced the addition of solar panels on all new homes in several subdivisions.
  - Greenhouse gases, in particular carbon dioxide and methane, played a significant role during the Eocene in controlling
    the surface temperature.
- source_sentence: Because current climate change is so rapid, the way species typically adapt (eg - migration) is, in most
    cases, simply not be possible.
  sentences:
  - An overall analysis of coral loss found that coral populations on the Great Barrier Reef had declined by 50.7% from 1985
    to 2012, but with only about 10% of that decline attributable to bleaching, and the remaining 90% caused about equally
    by tropical cyclones and by predation by crown-of-thorns starfishes.
  - Human activities therefore allow species to migrate to new areas (and thus become invasive) occurred on time scales much
    shorter than historically have been required for a species to extend its range.
  - Originally it was believed that the drought in the Sahel primarily was caused by humans over-using natural resources in
