widgetData:
- source_sentence: Pershendetje…. si mund te informohem nese kontrata e shkembimit ndermjet paleve eshte e regjistruar ne
    kadaster
  sentences:
  - Pershendetje... si mund te kontrolloj se a eshte e regjistruar ne kadaster kontrata e shkembimit ndermjet paleve?
  - Pershendetje, nese jeni nje pensionist dhe keni nevoje per nje operacion ne nje spital shteteror rajonal, a duhet te paguani
    per operacionin? Nese nuk paguani per operacionin, a ka nje mbeshtetje per kostot e tjera qe mund te lindin gjate operacionit
    apo duhet te mbuloni te gjitha kostot?
  - How can I resolve this issue with the 1991 certificate, considering I'm concerned there may be problems with registering
    with the Cadastre? This is because on August 1, 1991, my brother and I, each having two Amtp of our own as part of two
    farming families, were united and did not make any declaration of separation in civil status. We have no disputes over
    each other's property.
- source_sentence: Dua te dal ne pension parakohshem por nuk figurojne vitet e punes si mami- infermiere ne ish spitalin e
    Arrnit kukes prej vitit 01.01.1985 e deri ne vitin 1992. Ne libreze jane te rregullta si te veproj ju lutem?!..
  sentences:
  - Si mund të procedoj për të rregjistruar pronën sipas certifikatës së vitit 1991 në Kadaster, duke pasur parasysh që nuk
    kemi bërë ndarjen e pronës në gjendjen civile me vëllain tim?
  - A ka ndonjë restorant italian të mirë në këtë zonë?
  - What are some traditional dishes from the region of Kukes, Albania?
- source_sentence: 'Pershendetje!


    Deri tani ne banoret e shkalles, kemi patur te njejten tarife per mirembajtjen e ambienteve ne bashkepronesi. Tani, kryesia
    e asamblese ka marre nje vendim qe apartamentet qe jane dhene me qira nga pronaret, po per qellime banimi, te kene nje
    tarife me te larte per mirembajtjen e ambienteve ne bashkepronesi. Dhe kjo tarife eshte miratiar prej tyre ne masen 250%
    me e larte se tarifa e banoreve te tjere.


    Ju lutem, do te doja te dija nese eshte ligjore kjo kerkese e tyre per tarifimin me te larte te pronareve qe kane dhene
    shtepine me qira, po per qellime banimi?


    Faleminderit!'
  sentences:
  - 'Përshëndetje,


    Udhëzimi nr. 27, datë 20.12.2010 “Për llogaritjen e tarifës së administrimit për ndërtesat e banimit në bashkëpronësi”
    parashikon se:


    “Asambleja e bashkëpronarëve për llogaritjen e tarifës së administrimit për çdo bashkëpronar, bazohet në kuotën e pjesëmarrjes
    në bashkëpronësi dhe merr në konsideratë masën e përdorimit të elementeve të veçanta të bashkëpronësisë nga pronarët e
    çdo njësie individuale. Me masë përdorimi, kuptohet frekuenca e përdorimit të pajisjeve dhe e objekteve të instaluara
    në godinë. Kështu, bashkëpronarët e kateve përdhe, që nuk përdorin ashensorin, mund të përjashtohen nga kjo pagesë. Për
    njësitë që përdoren për shërbime, në varësi të aktivitetit të tyre, asambleja mund të miratojë një tarifë më të lartë.
    Për familjet që nuk banojnë për një kohë më të gjatë se 6 muaj në banesë, mund të reduktojë tarifën e administrimit dhe
    të mirëmbajtjes.”

    Pra, sipas udhëzimit, parashikohen disa raste kur Asambleja miraton tarifë më të lartë ose më të ulët në bazë të kritereve
    të ndryshme. Në rastin tuaj, kur prona juaj rezulton të përdoret vetëm për banim nuk supozohet të caktohet një tarifë
    më e lartë përvec se, nëse kjo tarifë vjen si pasojë e ndonjë arsye tjetër të justifikuar nga Asambleja e bashkëpronarëve.
    Do të ju këshillonim të bisedonit me Administratorin ku të parashtroni pretendimet tuaj në lidhje me sa më sipër, në mënyrë
    që të arrinit në një zgjidhje.


    Faleminderit!'
  - 'Përshëndetje,


    Ju keni të drejtë t’ia shisni pjesën tuaj të apartamentit, por përpara se t’ia shisni dikujt tjetër, ju duhet të njoftoni
    vëllain tuaj që është bashkëpronar dhe t’i jepni mundësinë të blejë pjesën tuaj. Kodi civil parashikon se:


    “Bashkëpronari, para se t’ia shesë pjesën e vet në sendin e paluajtshëm një personi që nuk është bashkëpronar, detyrohet
    të njoftojë me shkrim bashkëpronarët e tjerë nëse dëshirojnë të blejnë pjesën me të njëjtat kushte që do t’ia shesë personit
    të tretë. Në rast se këta nuk përgjigjen brenda 3 (tre) muajve se dëshirojnë të blejnë pjesën, bashkëpronari është i lirë
    të shesë pjesën e tij në persona të tretë. Ai duhet t’ua bëjë të njohur bashkëpronarëve të tjerë bashkëpronarin e ri.”


    Faleminderit!'
  - 'Përshëndetje,


    Nëse nuk keni mundur të arrini në një marrëveshje, mund të paraqisni një kërkesë në gjykatë për pjestim të sendit duke
    thirrur në gjyq të gjithë bashkëpronarët. Pjesëtimi i sendit të përbashkët bëhet me ndarjen e tij në natyrë sipas pjesëve
    që kanë bashkëpronarët, në qoftë se kjo ndarje është e mundshme dhe nuk dëmton qëllimin përkatës të sendit. Kur sendi
    i përbashkët nuk mund të ndahet në natyrë gjykata urdhëron që ai të shitet në ankand dhe vlefta e tij të ndahet ndërmjet
    bashkëpronarëve, sipas pjesëve përkatëse, duke llogaritur edhe shumat që ata duhet t’i paguajnë njëri-tjetrit për shkak
    të marrëdhënies së bashkëpronësisë. Kur sendi që nuk mund të ndahet në natyrë, është shtëpi banimi, gjykata ia lë në pjesë,
    në kushtet e sipërtreguara, atij nga bashkëpronarët që banon në atë shtëpi ose ka nevojë më shumë se të tjerët për atë
    sipërfaqe banimi.


    Faleminderit!'
- source_sentence: Pershendetje. Bashkeshorti im sapo ka mare 1 apartament me akt dhurimi nga prindrit e tij. A mund tme perfshije
    dhe mua ne bashkepronesi? a paguajme tarifen 15%?
  sentences:
  - 'Përshëndetje


    Jo, norma e tatimit prej 15% nuk paguhet sipas parashikimeve të reja në Ligjin “Për tatimin mbi të ardhurat” i cili në
    nenin 60 pika 7 parashikon se përjashtohen nga tatimi: “Dhurimet dhe trashëgimia e përfituar nga/ose ndërmjet trashëgimtarëve
    ligjorë në radhë të parë dhe të dytë, sipas neneve 361 deri 363 të Kodit Civil, si dhe dhurimet dhe trashëgimia brenda
    lidhjes gjinore motër-vëlla”. Për sa i përket pjesës së përfshirjes suaj në bashkëpronësi, i takon pronarit të ri (bashkëshortit
    tuaj) të ju përfshijë në të.


    Faleminderit!'
  - 'Përshëndetje,


    Do duhet fillimisht të procedoni me vecimin nga trungu dhe më pas mund të bëni ndryshimin e vendbanimit nëpërmjet aplikimit
    online.


    Vecimi nga trungu bëhet vetëm fizikisht, pranë gjendjes civile ku rezultoni të keni vendbanimin aktual nëpërmjet plotësimit
    të një formulari prej personave madhorë që rezultojnë në trungun tuaj familjar (pra anëtarët  e tjerë madhorë bëjnë kërkesën
    për heqjen tuaj nga trungu) dhe ka një koston prej 1000 lekë.


    Pas kryerjes së vecimit kryeni ndryshimin e vendbanimit në rrugë elektronike (on-line), nëpërmjet paraqitjes së kërkesës
    në portalin qeveritar “eAlbania”, duke depozituar dokumentin e pronësisë së banesës, kontratën e qiramarrjes, huadhënies,
    përdorimit ose çdo dokument tjetër të ligjshëm që provon vendbanimin.


    Faleminderit.'
  - 'Përshëndetje,


    Në kuadër të hartës së re gjyqësore, çështja juaj ka kaluar për shqyrtim në Tiranë. Ky kalim, rrjedhimisht korrespondon
    me përcjelljen nga Gjykata e Shkodrës së dosjes tuaj gjyqësore. Sidoqoftë, nëse ju nevojitet dokumentacioni origjinal,
    mund të përpiloni një kërkesë/formular për kopje të akteve të dosjes gjyqësore, e cila do të përmbajë vulën e gjykatës
    dhe është e barazvlefshme me origjinalin.


    Faleminderit!'
- source_sentence: Ku mund te marrim nje certifikat personale
  sentences:
  - 'Pershendetje. Referuar ligjit 118/2018 “Per kadastren” Ne nenin 30 te tij parashikon se Individët, familjet dhe personat
    juridikë privatë apo shtetërorë, që zotërojnë dokumente


    pronësie, por nuk kanë të përcaktuar në to sipërfaqen, duhet t’i paraqesin regjistruesit një kërkesë për


    regjistrim pronësie, e cila duhet të shoqërohet me:


    a) dokumentin e pronësisë;


    b) dokumentacionin hartografik për pasurinë, i cili miratohet nga ASHK-ja;


    c) deklaratën noteriale të pronarëve kufitarë, që vërtetojnë përmbajtjen e kërkesës për kufijtë e


    pasurisë që pretendohet të regjistrohet.


    Nëse deklarata noteriale nuk mund të sigurohet, apo ka mosmarrëveshje për kufirin e pasurive, ai


    përcaktohet nga ASHK-ja. Palët e interesuara kanë të drejtën e ankimit gjyqësor ndaj aktit të ASHK-së që


    përcakton kufirin. Pra nese ASHK refuzon kerkesen tuaj per regjistrimin e prones sepse ju nuk siguroni dot aktin noterial
    me vellain tuaj per kalimin e pronesise, atehere kunder vendimit te refuzimit qe ju jep ASHK drejtohuni gjykates'
  - "Pershendetje,\nJu duhet te aplikoni Online ne E Albania ne Seksionin Familja ime, dhe e merrin certifikane personale\
    \ pa pagese elektronikisht menjehere \nhttps://e-albania.al/eAlbaniaServices/UseService.aspx?service_code=38\nJu faleminderit!"
  - 'Përshëndetje,


    Referuar Udhëzimit nr.481, datë 05.09.2013 për “Procedurat e korigjimit të emrit/mbiemrit si korigjim material”:


    Shtetasit mund të kërkojnë që t’i bëjnë përmirësime rubrikave të emrit/ mbiemrit. Këto përmirësime lidhen me saktësimin
    e shkronjave të veçanta që kanë të bëjnë me rregullat e drejtshkrimit të gjuhës shqipe. Për këto raste shtetasit paraqesin
    në zyrën e gjendjes civile kërkesën për përmirësimin e emrit si dhe çdo dokument tjetër që disponojnë, apo që provon shqiptimin
    ndryshe nga shkrimi, të një shkronje të veçantë të emrit/ mbiemrit.


    Paraqituni pranë zyrës së gjendjes civile dhe kërkoni ndreqjen e gabimit të ndodhur, duke e shoqëruar më një kopje të
    aktit të lindjes.


    Zgjidhja ligjore është parashikuar në mënyrë administrative pranë Zyrës së gjëndjes civile, nëse kjo zyrë nuk korigjon
    mbiemrin tuaj, ju mund t’i drejtoheni gjykatës.


    Faleminderit!'
