    - 'Pershendetje,


      Referuar ligjit nr. 9723/2007 “Per regjistrimin e biznesit” ne nenin 43 te tij parashikohet se Çdo subjekt, që kryen
      regjistrimin fillestar, mbart edhe detyrimin të regjistrojë çdo ndryshim në të dhënat e njoftuara dhe në dokumentet
      shoqëruese, që depozitohen në regjistër, sipas seksionit III.


      Në rast ndryshimi të aktit të themelimit, statutit ose ndryshimit të kontratës së shoqërisë së thjeshtë (kur është në
      formë të shkruar), depozitohet edhe teksti i plotë i tyre, që pasqyron ndryshimet e mëpasshme. Për degët dhe zyrat e
      përfaqësimit të shoqërive të huaja depozitohet statuti dhe akti i themelimit të shoqërisë së huaj apo dokumenti ekuivalent
      i krijimit, sipas legjislacionit të huaj, me tekstin e plotë, që pasqyron ndryshimet e bëra.


      3. Përveç sa parashikohet mësipër, subjekti duhet të regjistrojë dhe të depozitojë aktet përkatëse, si më poshtë:


      a) pasqyrat financiare vjetore, raportin e ecurisë së veprimtarisë dhe raportin e auditimit, të mbajtur sipas kërkesave
      ligjore, në rastet kur mbajtja e këtyre dokumenteve është e detyrueshme;


      b) emërimin dhe shkarkimin e ekspertit kontabël të autorizuar, në rastet kur emërimi është i detyrueshëm, numrin e licencës
      profesionale, si dhe të dhënat e tyre të identifikimit;


      c) emërimin e likuiduesve, si dhe të dhënat e tyre të identifikimit;


      ç) aktet e prishjes, mbylljes apo shpërndarjes, aktet e transformimit, bashkimit, ndarjes, hapjes së procedurave të
      administrimit, likuidimit ose riorganizimit, si dhe aktet e tjera të ndërmjetme, të parashikuara nga legjislacioni në
      fuqi. Për degët dhe zyrat e përfaqësimit të shoqërive të huaja regjistrohen edhe aktet e transformimit, të bashkimit,
      ndarjes, hapjes dhe mbylljes së procedurave të likuidimit ose falimentimit të shoqërisë së huaj;


      d) vendet e tjera të ushtrimit të veprimtarisë, të ndryshme nga selia;


      dh) dokumentet, që vërtetojnë vënien e pengjeve ose garancitë e tjera për pjesëmarrjet në kapitalin e subjektit;


      e) çdo regjistrim tjetër të detyrueshëm sipas dispozitave ligjore në fuqi.


      Faleminderit.'
