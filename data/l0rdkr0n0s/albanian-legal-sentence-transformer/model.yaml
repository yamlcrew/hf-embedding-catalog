widgetData:
- source_sentence: 'Pershendetje


    Mund qe nje person qe ka mbushur 80 vjec te beje kontrate dhurimi?


    Ka kufizim moshe per te bere dhurim ose testament?'
  sentences:
  - 'Pershendetje!


    Ne lidhje me situaten qe gjendeni, sipas pershkrimit te bere nga ana juaj, legjislacioni shqiptar ka parashikuar te drejten
    per kompesim te pasagjerve te cilet si ne rastin tuaj ju eshte anulluar fluturimi. Kjo situate eshte parashikuar nga dipozitat
    e Kodit Ajror te RSH, Regullore europiane 261/2004 si dhe Udhezimin Nr. 1 date 26.02.2013 te Ministrit te Transporteve.


    Konkretisht, ne keto akte parashikohet qe ne raste te anullimit te fluturimeve, pasagjeret kane te drejten e kompesimit
    per shpenzimet e kryera, kompesim i cili behet duke perllogaritur distancat e udhetimit dhe kushtet te tjera.


    Problematika qe ju adresoni ne pyetjen tuaj eshte se keni marre nje rimbursim rreth 50% te shumes se shpenzuar per prerjen
    e biletave, nderkohe qe per shkak te situates se epidemise se shkaktuar nga COVID 19, fluturimet nga Republika e Shqiperise
    jane pezulluar/ndaluar. Legjislacioni i fushen parashikon se pasagjeret e humbin te drejten per kompesim ne rast se anullimi
    i fluturimit eshte shkaktuar nga shkaqe dhe rrethana te cilat jane jashte kontrollit te ketij subjekti (kompanise se fluturimit),
    si ne rastin konkret me shpalljen e fatkeqesise natyrore ne Republiken e Shqiperise dhe te gjitha kufizimet qe kane pasuar
    si masa per parandalimin e perhapjes se epidemise.


    Gjithesesi, nese ju e vleresoni ndryshe situaten, ligji parashikon te drejten tuaj per t’u ankuar duke nisur qe nga kompania
    ajrore, te Autoriteti i Aviacionit Civil e deri prane juridiksionit gjyqesor.'
  - Pershendetje. Nuk ka asnje kufizim moshe, per sa kohe personi zoteron zotesi te plote per te vepruar, si dhe zoteron aftesite
    e nevojshme mendore per te qene i vetedijshem mbi veprimin juridik qe po kryen.
  - 'Përshëndetje,


    Shpenzimet e ekspertit bëjnë pjesë në kategorinë e “shpenzimeve të tjera gjyqësore” dhe parapaguhen nga pala që i ka kërkuar,
    në bankë, në shumën që ka caktuar gjykata me vendim. Për këtë arsye, është lehtësisht e provueshme pagesa e ekspertit.
    Kërkoni nga avokatja mandat-pagesën për të vërtetuar pagesën e kryer.


    Faleminderit!'
- source_sentence: 'Pershendetje,


    Mund te me ndihmoni me nje pyetje? A eshte e nevojshme dorezimi i Vendimit te Asamblese ne QKB per kompanite e huaja qe
    jane dege ne Shqiperi, jo zyra qendrore?'
  sentences:
  - 'Përshëndetje,


    Sipas legjislacionit shqiptar, nuk lejohet përdorimi i dy mbiemrave nga bashkëshortët. Kodi i Familjes në nenin 51 të
    tij parashikon se: “Bashkëshortët, kur lidhin martesën, kanë të drejtë të zgjedhin për të mbajtur si mbiemër të përbashkët
    njërin nga mbiemrat e tyre ose të mbajnë secili mbiemrin e vet”.


    Faleminderit!'
  - 'Pershendetje,


    Referuar ligjit nr. 9723/2007 “Per regjistrimin e biznesit” ne nenin 43 te tij parashikohet se Çdo subjekt, që kryen regjistrimin
    fillestar, mbart edhe detyrimin të regjistrojë çdo ndryshim në të dhënat e njoftuara dhe në dokumentet shoqëruese, që
    depozitohen në regjistër, sipas seksionit III.


    Në rast ndryshimi të aktit të themelimit, statutit ose ndryshimit të kontratës së shoqërisë së thjeshtë (kur është në
    formë të shkruar), depozitohet edhe teksti i plotë i tyre, që pasqyron ndryshimet e mëpasshme. Për degët dhe zyrat e përfaqësimit
    të shoqërive të huaja depozitohet statuti dhe akti i themelimit të shoqërisë së huaj apo dokumenti ekuivalent i krijimit,
    sipas legjislacionit të huaj, me tekstin e plotë, që pasqyron ndryshimet e bëra.


    3. Përveç sa parashikohet mësipër, subjekti duhet të regjistrojë dhe të depozitojë aktet përkatëse, si më poshtë:


    a) pasqyrat financiare vjetore, raportin e ecurisë së veprimtarisë dhe raportin e auditimit, të mbajtur sipas kërkesave
    ligjore, në rastet kur mbajtja e këtyre dokumenteve është e detyrueshme;


    b) emërimin dhe shkarkimin e ekspertit kontabël të autorizuar, në rastet kur emërimi është i detyrueshëm, numrin e licencës
    profesionale, si dhe të dhënat e tyre të identifikimit;


    c) emërimin e likuiduesve, si dhe të dhënat e tyre të identifikimit;


    ç) aktet e prishjes, mbylljes apo shpërndarjes, aktet e transformimit, bashkimit, ndarjes, hapjes së procedurave të administrimit,
    likuidimit ose riorganizimit, si dhe aktet e tjera të ndërmjetme, të parashikuara nga legjislacioni në fuqi. Për degët
    dhe zyrat e përfaqësimit të shoqërive të huaja regjistrohen edhe aktet e transformimit, të bashkimit, ndarjes, hapjes
    dhe mbylljes së procedurave të likuidimit ose falimentimit të shoqërisë së huaj;


    d) vendet e tjera të ushtrimit të veprimtarisë, të ndryshme nga selia;


    dh) dokumentet, që vërtetojnë vënien e pengjeve ose garancitë e tjera për pjesëmarrjet në kapitalin e subjektit;


    e) çdo regjistrim tjetër të detyrueshëm sipas dispozitave ligjore në fuqi.


    Faleminderit.'
  - 'Përshëndetje,


    Në këtë rast, mund të revokoni prokuren. Prokuren mund ta përpiloni ne vendin ku keni vendbanimin, sipas ligjit dhe rregullave
    të shtetit të huaj. Duhet të kini kujdes në hartimin e prokurës, në të cilën objekti të jetë i qartë dhe i kuptueshëm,
    Prokura e huaj, për të patur vlerë ligjore në Shqipëri, duhet të jetë e përkthyer dhe e legalizuar.  Më pas i’a dërgoni
    avokatit nëpërmjet postës ose formave të tjera të kontaktit, në mënyrë që ai të marrë dijeni mbi këtë veprim të kryer
    nga ana juaj.


    Faleminderit!'
- source_sentence: Përshëndetje, kam një kredi që më ka kaluar në përmbarim dhe në pamundësi për ta bërë pagesën të gjithën
    doja të dija çfarë masash mund të merren nëse nuk kam gjë kolateral përveç pagesës që marr dhe doja të shtoja që në person
    të dytë si garant ka dal vëllai, por dhe ai nuk është se ka ndonjë pasuri përveçse rrogës dhe ai po ashtu.
  sentences:
  - 'Pershendetje,

    Ligji qe rregullon ndihmen qe jep shteti lidhur me perfitimin e banesave sociale eshte ligji 22/2018 “Për strehimin social”.


    Se pari, ju duhet te plotesoni kriteret e ketij ligji per te perfituar nga programet sociale (me poshte keni informacion
    mbi kriretet). Kriteret zbatohen vetëm për ato individë/familje që kanë të ardhura të pamjaftueshme ose që nuk kanë fare
    të ardhura.


    Statusin e përfituesit nga programet sociale, sipas këtij ligji, e gëzon çdo individ që ka mbushur moshën 18 vjeç dhe
    familjet e regjistruara në zyrat e gjendjes civile në njësitë e vetëqeverisjes vendore, të cilët në momentin e aplikimit
    plotësojnë ke kritere:


    a) nuk kanë në pronësi një banesë ose zotërojnë sipërfaqe banimi nën normat e strehimit apo banojnë në banesa jashtë standardeve
    në fuqi, për të cilat normat e strehimit përcaktohen me vendim të Këshillit të Ministrave;


    b) kanë mbetur të pastrehë, si rezultat:


    i) i fatkeqësive natyrore;


    ii) i prishjes së objekteve të pakualifikuara si banesë;


    iii) i zhvendosjeve për shkak të investimeve publike dhe nga objektet e përjashtuara nga procesi i legalizimeve;


    iv) nga zbatimi i akteve administrative dhe zbatimi i vendimeve gjyqësore të formës së prerë;


    c) familjet që kanë një banesë të vjetër, në rrezik shembjeje, ose një banesë që i nënshtrohet një plani rregullues, për
    shkak të vjetërsisë së saj.

    Se dyti, ju bejme me dije se aplikimi për të përfituar strehim, bëhet me dy faza.


    Në fazën e parë ju duhet te paraqisni kerkesen prane Bashkise tuaj perkatese, sipas formatit qe kjo Bashki ka miratuar.
    Nese ju kaloni fazen e pare te perzgjedhjes, do te njoftoheni nga Bashkia per te plotesuar dokumentacionin e nevojshem.

    Lidhur me formularet perkates per te aplikuar, lutem drejtohuni prane Njesise Administrative/Bashkise ku keni vendbanimin.
    Faleminderit,'
  - "1    \nPërshëndetje,\n\nNëse ju jeni debitor kundrejt një subjekti të caktuar, në bazë të Kodit Civil ju mbani pergjegjesi\
    \ me pasurine tuaj të tashme dhe te ardhme, pra edhe nese ju nuk keni para per momentin, detyrimi do te mbetet. Me konkretisht,\
    \ kontratat bankare te huase perbejne titull ekzekutiv dhe si te tilla, kreditori, pra Banka ka te drejte qe te kerkoje\
    \ leshimin e urdherit te ekzekutimit ne gjykate. Ky eshte nje gjykim i cili zhvillohet pa pranine e paleve dhe madje ju\
    \ si debitor nuk merrni dijeni fare. Me pas ceshtja shkon prane Zyres permbarimore shteterore ose private, per ekzekutimin\
    \ e detyrueshem. Persa kohe ju keni dhe dorëzanës,i cili  është një familjar i juaji, atëherë ekzekutimi detyrimit do\
    \ preki edhe pasurinë e tij.Dorëzania është një veprim juridik me të cilën një person (dorëzanësi), detyrohet t’I sigurojë\
    \ kreditorit ekzekutimin e detyrimit të një personi të tretë (debitori kryesor). Në rastin konkret, bazuar në rrethanat\
    \ që ju keni referuar dorëzanësi është përsëri në paaftësi paguese.\n\nAtëherë përmbarimi fillimisht do të bllokojë llogaritë\
    \ tuaja bankare, dhe do të vendose sekuestrimin në pasurite tuaja të luajtshme dhe të paluajtshme që janë të regjistruara.\
    \ Nese ju aktualisht nuk keni te holla ne banke, apo pasuri të tjera por vetëm rrogën detyrimi do të përmushet në vazhdimësi\
    \ nga rroga juaj, duke llogatitur të ardhurat e nevojshme për jetesë dhe pjesa tjetër do të mbahet për llogari të kreditorit.\n\
    \nGjithashtu ekzekutimi i detyrueshem është një procedure që rregullohet nga ligji dhe nuk eshte ne diskrecionin e kreditorit,\
    \ apo te permbarimit. Nese konstatoni veprime ne kundershtim me dispozitat e K.Pr.Civile, mund t’i drejtoheni gjykates\
    \ me kerkese per kundershtim te veprimeve permbarimore.\n\nTheksoj se persona të tretë qofshin edhe prindërit tuaj, të\
    \ cilët nuk janë përfshirë si dorëzanës apo nuk kanë dalë garant për detyrimin nuk mund të preket pasuria e tyre.\n\n\
    Ju faleminderit!"
  - 'Përshëndetje,


    Ju keni të drejtë t’ia shisni pjesën tuaj të apartamentit, por përpara se t’ia shisni dikujt tjetër, ju duhet të njoftoni
    vëllain tuaj që është bashkëpronar dhe t’i jepni mundësinë të blejë pjesën tuaj. Kodi civil parashikon se:


    “Bashkëpronari, para se t’ia shesë pjesën e vet në sendin e paluajtshëm një personi që nuk është bashkëpronar, detyrohet
    të njoftojë me shkrim bashkëpronarët e tjerë nëse dëshirojnë të blejnë pjesën me të njëjtat kushte që do t’ia shesë personit
    të tretë. Në rast se këta nuk përgjigjen brenda 3 (tre) muajve se dëshirojnë të blejnë pjesën, bashkëpronari është i lirë
    të shesë pjesën e tij në persona të tretë. Ai duhet t’ua bëjë të njohur bashkëpronarëve të tjerë bashkëpronarin e ri.”


    Faleminderit!'
- source_sentence: Pershendetje, jam i interesuar per nje djale qe kam njohur pasi e kane braktisur ne jetimore qe foshnje
    dhe sot qe ka mbushur 18 vjec e kane nxjerr nga jetimorja, por ai nuk ka asnje mundesi strehimi as te ardhura, babai tij
    biologjik eshte ne gjendje te mire ekonomike por nuk interesohet fare per te dhe as nuk e pranon ate. Doja te dija nese
    ka ndonje forme se si mund ti drejtohet gjykates per te kerkuar dicka, apo ku mund te drejtohet!
  sentences:
  - 'Pershendetje,


    Legjislacioni shqiptar parashikon se shpenzimet e kontratës së shitjes dhe shpenzimet e tjera të lidhura me të ( shpenzimet
    noteriale), janë në ngarkim të blerësit, përveç kur në marrëveshje parashikohet ndryshe. Pra palet me marreveshje mund
    te ngarkojne detyrimet pales shitese, apo ti ndajne ato mes tyre.


    Ndersa ne lidhje me tatimin, personi qe shet pasurine dhe qe perfiton te ardhurat nga kjo shitje, paguan detyrimet perkatese.
    Individi që kalon të drejtën e pronësisë mbi pasurinë e paluajtshme, paguan tatimin para kryerjes së regjistrimit të aktit
    të kalimit të pasurisë, në përputhje me aktet dhe procedurat ligjore në fuqi. Pasuria e paluajtshme e kaluar, nuk regjistrohet
    pa provuar pagimin e këtij detyrimi pranë zyrave vendore të regjistrimit të pasurive të paluajtshme.


    Pai jane kryer te gjitha veprimet nga zyra noteriale mbi hartim, perpilim, nenshkrim kontrate shite- blerje, mbi fitimin
    e pronesise duhet te nderrmerrni marrjen e masave per te regjistruar kontraten e shiteblerejes prane ASHK, nga ku te aplikoni
    me per leshim certifikate pronesie, kopje fragment harte, kopje kartele te pasurise se paluajtshme, sherbime te cilat
    kryhen ne portalin e- albania ose mund te kerkoni ndihmen e sherbimit noterial.

    Faleminderit!'
  - 'Pershendetje

    Sipas legjislacionit shqiptar (Ligji Nr.8153/ 1996 “Për statusin e jetimit”, i ndryshuar, neni 1), përfitojnë statusin
    e jetimit personat me moshë nga 0-25 vjeç, të rritur ose jo në institucione shtetërore a private të përkujdesit shoqëror
    dhe që plotësojnë disa kritere ndër të cilët edhe personat që braktisen nga të dy prindërit dhe nuk u njihet identiteti
    i tyre. Përderisa në momentin aktual, personi nuk ka të njohur atësinë dhe ka moshën mbi 18 vjeç e gëzon statusin e jetimit,
    sepse plotëson kriterin e mësipërm. Prandaj, ai mund të përfitojë nga ky status përkrahje lidhur me disa shërbime.


    Sipas Ligjit Nr.8153/ 1996 “Për statusin e jetimit”, institucionet që janë përkujdesur (edhe ato arsimore), janë të detyruara
    që me mbarimin e vitit të parafundit të shkollës të dërgojnë statistika të sakta pranë Ministrisë përgjegjëse për çështjet
    e punës dhe çështje sociale, si dhe pranë zyrave të ndihmës dhe përkujdesit shoqëror në bashki, me qëllim që të merren
    masa për sistemimin e tyre me punë dhe strehim sipas rregullave që caktohen me Vendim të Këshillit të Ministrave.


    Duke qenë se problemi kryesor i tij pas largimit nga konvikti është strehimi, sjellim në vëmendje se ai mund të jetë përfitues
    i programeve sociale të strehimit të ofruara nga njësia e vetëqeverisjes vendore përkatëse (programi i banesave sociale
    me qira, programi i banesave me kosto të ulët…etj), bazuar në kriterin e kushteve sociale, ku kanë  përparësi edhe individët
    me statusin e jetimit, që nga çasti i daljes nga qendrat e përkujdesjes shoqërore dhe deri në moshën 30 vjeç.(Ligji Nr.
    22/2018 “Për strehimin social”)

    Duke gëzuar statusin e jetimit, personi mund të përfitojë edhe shërbime të tjera si:


    – Bazuar në Ligjin Nr. 57/ 2019 “Për asistencën sociale në Republikën e Shqipërisë”, ai mund të jetë përfitues i ndihmës
    ekonomike si person me statusin e jetimit që nuk ndodhet në institucionet e përkujdesjes shoqërore dhe konsiderohet “individ
    në nevojë”. Në kuptimin e këtij ligji, “jetim është është fëmija deri në moshën 25 vjeç. (Neni 4, pika g dhe gj; Neni
    7, pika b)


    – Ai mund t’i drejtohet zyrave të punës, për tu regjistruar si i papunë(nëse nuk vazhdon shkollën e mesme apo të lartë).
    Sipas legjislacionit, punësimi i jetimëve duhet të bëhet me përparësi nga zyrat e punës e përkujdesjes sociale; jetimët
    e punësuar trajtohen me përparësi nga punëdhënësi, duke krijuar mundësi për mbajtjen në punë gjatë procesit të shkurtimit
    të veprimtarisë.( Ligji Nr.8153/ 1996 “Për statusin e jetimit”, neni 12 dhe 13)


    – Nëse nuk është në marrëdhënie pune, i sigurohen falas nga shteti shërbimi shëndetësor, shërbimi dentar dhe medikamentet
    si dhe udhëtimi me mjetet e transportit shtetëror e privat qytetas, si dhe ndërqytetas sipas akteve nënligjore përkatëse.(Ligji
    Nr.8153/ 1996 “Për statusin e jetimit”, neni 9 dhe 10)


    – Nëse ndjek shkollën e mesme ose të lartë përfiton bursë dhe trajtim me veshmbathje për vitet e shkollës së mesme dhe
    të lartë, sipas përcaktimeve me vendim të Këshillit të Ministrave.( Ligji Nr.8153/ 1996 “Për statusin e jetimit”, neni
    6)


    – Nëse është duke kryer shërbimin e detyruar ushtarak, duhet t’i jepet nga shteti një kuotë suplementare dhe pasi e mbaron
    atë duhet të sistemohet me strehim e punë nga bashkia në bazë të kërkesës së bërë 6 muaj më parë nga kryesia e Shoqatës
    së Jetimëve Shqiptarë.


    – Ai mund të përfitojë edhe nga shërbimi “strehimi i organizuar”, i cili është një shërbim i kujdesit shoqëror në nivel
    vendor, që ofrohet për 24 orë në ditë në qendrat rezidenciale, për të përmbushur nevojat themelore sociale, kulturore,
    arsimore, rekreative nga subjekte publike ose jopublike. Ligji Nr. 121/2016 “Për shërbimet e kujdesit shoqëror në Republikën
    e Shqipërisë” i parashikon shprehimisht edhe jetimët si kategori përfituese.(Neni 23)

    Faleminderit.'
  - 'Pershendetje


    Ju bejme me dije se shperblimet e lindjes per vitin 2018 ne shumicen e  bashkive te vendit nuk jane shperndare ose jane
    shperndare me vonese per shkak te mosakordimit te fondeve nga Ministria e Brendshme, e cila ishte pergjegjese per akordimin
    dhe alokimin e ketyre fondave deri ne Janar 2019, atehere kur kjo pergjegjesi i ka kaluar Ministrise se Shendetesise.


    Per te ditur arsyet e sakta te voneses ose mosmarrjes se shperblimit per rastin tuaj, Ju mund t’i drejtoheni me kerkese
    per informacion Bashkise/Njesise Administrative ku keni vendbanimin. Mendoj se arsyeja lidhet me faktin se fondet e ardhura
    po shperdahen per lindjet e kryera ne periudha me te hershme se e juaja (pra per lindjet e para 2018).


    Gjithsesi sic ju kemi sugjeruar edhe me pare, ne lidhje me kete problemtike, e cila cenon te drejtat tuaja, ju mund t’i
    drejtoheni me nje ankese edhe institucionit te Avokatit te Popullit. Ky institucion mund te hetoje situaten dhe t’i beje
