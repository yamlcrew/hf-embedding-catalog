      Statusin e përfituesit nga programet sociale, sipas këtij ligji, e gëzon çdo individ që ka mbushur moshën 18 vjeç dhe
      familjet e regjistruara në zyrat e gjendjes civile në njësitë e vetëqeverisjes vendore, të cilët në momentin e aplikimit
