    sentences:
    - 'Pershendetje!


      Ne lidhje me situaten qe gjendeni, sipas pershkrimit te bere nga ana juaj, legjislacioni shqiptar ka parashikuar te
      drejten per kompesim te pasagjerve te cilet si ne rastin tuaj ju eshte anulluar fluturimi. Kjo situate eshte parashikuar
      nga dipozitat e Kodit Ajror te RSH, Regullore europiane 261/2004 si dhe Udhezimin Nr. 1 date 26.02.2013 te Ministrit
      te Transporteve.


      Konkretisht, ne keto akte parashikohet qe ne raste te anullimit te fluturimeve, pasagjeret kane te drejten e kompesimit
      per shpenzimet e kryera, kompesim i cili behet duke perllogaritur distancat e udhetimit dhe kushtet te tjera.


      Problematika qe ju adresoni ne pyetjen tuaj eshte se keni marre nje rimbursim rreth 50% te shumes se shpenzuar per prerjen
      e biletave, nderkohe qe per shkak te situates se epidemise se shkaktuar nga COVID 19, fluturimet nga Republika e Shqiperise
      jane pezulluar/ndaluar. Legjislacioni i fushen parashikon se pasagjeret e humbin te drejten per kompesim ne rast se
      anullimi i fluturimit eshte shkaktuar nga shkaqe dhe rrethana te cilat jane jashte kontrollit te ketij subjekti (kompanise
      se fluturimit), si ne rastin konkret me shpalljen e fatkeqesise natyrore ne Republiken e Shqiperise dhe te gjitha kufizimet
      qe kane pasuar si masa per parandalimin e perhapjes se epidemise.


      Gjithesesi, nese ju e vleresoni ndryshe situaten, ligji parashikon te drejten tuaj per t’u ankuar duke nisur qe nga
      kompania ajrore, te Autoriteti i Aviacionit Civil e deri prane juridiksionit gjyqesor.'
    - Pershendetje. Nuk ka asnje kufizim moshe, per sa kohe personi zoteron zotesi te plote per te vepruar, si dhe zoteron
