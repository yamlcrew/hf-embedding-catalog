    sentences:
    - 'Pershendetje,


      Legjislacioni shqiptar parashikon se shpenzimet e kontratës së shitjes dhe shpenzimet e tjera të lidhura me të ( shpenzimet
      noteriale), janë në ngarkim të blerësit, përveç kur në marrëveshje parashikohet ndryshe. Pra palet me marreveshje mund
      te ngarkojne detyrimet pales shitese, apo ti ndajne ato mes tyre.


      Ndersa ne lidhje me tatimin, personi qe shet pasurine dhe qe perfiton te ardhurat nga kjo shitje, paguan detyrimet perkatese.
      Individi që kalon të drejtën e pronësisë mbi pasurinë e paluajtshme, paguan tatimin para kryerjes së regjistrimit të
      aktit të kalimit të pasurisë, në përputhje me aktet dhe procedurat ligjore në fuqi. Pasuria e paluajtshme e kaluar,
      nuk regjistrohet pa provuar pagimin e këtij detyrimi pranë zyrave vendore të regjistrimit të pasurive të paluajtshme.


      Pai jane kryer te gjitha veprimet nga zyra noteriale mbi hartim, perpilim, nenshkrim kontrate shite- blerje, mbi fitimin
      e pronesise duhet te nderrmerrni marrjen e masave per te regjistruar kontraten e shiteblerejes prane ASHK, nga ku te
      aplikoni me per leshim certifikate pronesie, kopje fragment harte, kopje kartele te pasurise se paluajtshme, sherbime
      te cilat kryhen ne portalin e- albania ose mund te kerkoni ndihmen e sherbimit noterial.

      Faleminderit!'
    - 'Pershendetje

      Sipas legjislacionit shqiptar (Ligji Nr.8153/ 1996 “Për statusin e jetimit”, i ndryshuar, neni 1), përfitojnë statusin
      e jetimit personat me moshë nga 0-25 vjeç, të rritur ose jo në institucione shtetërore a private të përkujdesit shoqëror
      dhe që plotësojnë disa kritere ndër të cilët edhe personat që braktisen nga të dy prindërit dhe nuk u njihet identiteti
      i tyre. Përderisa në momentin aktual, personi nuk ka të njohur atësinë dhe ka moshën mbi 18 vjeç e gëzon statusin e
      jetimit, sepse plotëson kriterin e mësipërm. Prandaj, ai mund të përfitojë nga ky status përkrahje lidhur me disa shërbime.


      Sipas Ligjit Nr.8153/ 1996 “Për statusin e jetimit”, institucionet që janë përkujdesur (edhe ato arsimore), janë të
      detyruara që me mbarimin e vitit të parafundit të shkollës të dërgojnë statistika të sakta pranë Ministrisë përgjegjëse
      për çështjet e punës dhe çështje sociale, si dhe pranë zyrave të ndihmës dhe përkujdesit shoqëror në bashki, me qëllim
      që të merren masa për sistemimin e tyre me punë dhe strehim sipas rregullave që caktohen me Vendim të Këshillit të Ministrave.


      Duke qenë se problemi kryesor i tij pas largimit nga konvikti është strehimi, sjellim në vëmendje se ai mund të jetë
      përfitues i programeve sociale të strehimit të ofruara nga njësia e vetëqeverisjes vendore përkatëse (programi i banesave
      sociale me qira, programi i banesave me kosto të ulët…etj), bazuar në kriterin e kushteve sociale, ku kanë  përparësi
      edhe individët me statusin e jetimit, që nga çasti i daljes nga qendrat e përkujdesjes shoqërore dhe deri në moshën
      30 vjeç.(Ligji Nr. 22/2018 “Për strehimin social”)

      Duke gëzuar statusin e jetimit, personi mund të përfitojë edhe shërbime të tjera si:


      – Bazuar në Ligjin Nr. 57/ 2019 “Për asistencën sociale në Republikën e Shqipërisë”, ai mund të jetë përfitues i ndihmës
      ekonomike si person me statusin e jetimit që nuk ndodhet në institucionet e përkujdesjes shoqërore dhe konsiderohet
      “individ në nevojë”. Në kuptimin e këtij ligji, “jetim është është fëmija deri në moshën 25 vjeç. (Neni 4, pika g dhe
      gj; Neni 7, pika b)


      – Ai mund t’i drejtohet zyrave të punës, për tu regjistruar si i papunë(nëse nuk vazhdon shkollën e mesme apo të lartë).
      Sipas legjislacionit, punësimi i jetimëve duhet të bëhet me përparësi nga zyrat e punës e përkujdesjes sociale; jetimët
      e punësuar trajtohen me përparësi nga punëdhënësi, duke krijuar mundësi për mbajtjen në punë gjatë procesit të shkurtimit
      të veprimtarisë.( Ligji Nr.8153/ 1996 “Për statusin e jetimit”, neni 12 dhe 13)


      – Nëse nuk është në marrëdhënie pune, i sigurohen falas nga shteti shërbimi shëndetësor, shërbimi dentar dhe medikamentet
      si dhe udhëtimi me mjetet e transportit shtetëror e privat qytetas, si dhe ndërqytetas sipas akteve nënligjore përkatëse.(Ligji
      Nr.8153/ 1996 “Për statusin e jetimit”, neni 9 dhe 10)


      – Nëse ndjek shkollën e mesme ose të lartë përfiton bursë dhe trajtim me veshmbathje për vitet e shkollës së mesme dhe
      të lartë, sipas përcaktimeve me vendim të Këshillit të Ministrave.( Ligji Nr.8153/ 1996 “Për statusin e jetimit”, neni
      6)


      – Nëse është duke kryer shërbimin e detyruar ushtarak, duhet t’i jepet nga shteti një kuotë suplementare dhe pasi e
      mbaron atë duhet të sistemohet me strehim e punë nga bashkia në bazë të kërkesës së bërë 6 muaj më parë nga kryesia
      e Shoqatës së Jetimëve Shqiptarë.


      – Ai mund të përfitojë edhe nga shërbimi “strehimi i organizuar”, i cili është një shërbim i kujdesit shoqëror në nivel
      vendor, që ofrohet për 24 orë në ditë në qendrat rezidenciale, për të përmbushur nevojat themelore sociale, kulturore,
      arsimore, rekreative nga subjekte publike ose jopublike. Ligji Nr. 121/2016 “Për shërbimet e kujdesit shoqëror në Republikën
      e Shqipërisë” i parashikon shprehimisht edhe jetimët si kategori përfituese.(Neni 23)

      Faleminderit.'
    - 'Pershendetje


