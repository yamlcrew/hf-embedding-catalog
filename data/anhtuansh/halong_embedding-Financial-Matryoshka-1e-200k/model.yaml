widgetData:
- source_sentence: quyết_định điều_chuyển tài_sản công có yêu_cầu_là quyết_định điều_chuyển tài_sản hoặc văn_bản hồi_đáp .
  sentences:
  - cấp lại giấy chứng_nhận đăng_ký tàu cá do cấp nào thực_hiện ?
  - thủ_tục cấp lại giấy_phép thành_lập văn_phòng đại_diện tại việt_nam của doanh_nghiệp kinh_doanh dịch_vụ lữ_hành nước_ngoài
    trong trường_hợp giấy_phép thành_lập văn_phòng đại_diện bị mất , bị hủy_hoại , bị hư_hỏng * hoặc bị tiêu_hủy có yêu_cầu
    thành_phần hồ_sơ những gì ?
  - quyết_định điều_chuyển tài_sản công có kết_quả_thực_hiện là gì ?
- source_sentence: 'chuyển trường đối_với học_sinh trung_học cơ_sở . có phí , lệ_phí là : trực_tiếp : trực_tuyến : dịch_vụ
    bưu_chính :'
  sentences:
  - cấp giấy chứng_nhận là lương_y cho các đối_tượng quy_định tại khoản 6 , điều 1 , thông_tư số 29 / 2015 / tt - byt có cách_thức
    nộp hồ_sơ như thế_nào ?
  - chuyển trường đối_với học_sinh trung_học cơ_sở . có phí , lệ_phí là bao_nhiêu ?
  - chuyển_đổi công_ty trách_nhiệm hữu_hạn một thành_viên thành_công_ty trách_nhiệm hữu_hạn hai thành_viên trở lên có cách_thức
    nộp hồ_sơ như thế_nào ?
- source_sentence: thủ_tục đăng_ký khai_tử do cơ_quan ủy_ban nhân_dân & nbsp ; xã , & nbsp ; phường , & nbsp ; thị_trấn .
    thực_hiện
  sentences:
  - tiếp_nhận người có công vào cơ_sở nuôi_dưỡng , điều_dưỡng người có công do tỉnh quản_lý_do cấp nào thực_hiện ?
  - cấp giấy_phép hoạt_động đối_với cơ_sở khám bệnh , chữa bệnh khi thay_đổi người chịu trách_nhiệm chuyên_môn của cơ_sở khám
    bệnh , chữa bệnh thuộc thẩm_quyền của sở y_tế được thực_hiện mức_độ mấy ?
  - thủ_tục đăng_ký khai_tử do cơ_quan nào giải_quyết ?
- source_sentence: thẩm_định nội_dung điều_chỉnh báo_cáo nghiên_cứu khả_thi , quyết_định phê_duyệt điều_chỉnh dự_án ppp do
    nhà đầu_tư đề_xuất có_thể nộp hồ_sơ trực_tiếp
  sentences:
  - tiếp_tục hưởng trợ_cấp thất_nghiệp do cấp nào thực_hiện ?
  - thủ_tục tặng giấy_khen của chủ_tịch ubnd cấp huyện về thành_tích thi_đua theo đợt , chuyên_đề có kết_quả_thực_hiện là
    gì ?
  - thẩm_định nội_dung điều_chỉnh báo_cáo nghiên_cứu khả_thi , quyết_định phê_duyệt điều_chỉnh dự_án ppp do nhà đầu_tư đề_xuất
    có cách_thức nộp hồ_sơ như thế_nào ?
- source_sentence: thủ_tục cấp thẻ hướng_dẫn_viên du_lịch nội_địa có yêu_cầu_là thẻ hướng_dẫn_viên du_lịch nội_địa
  sentences:
  - đăng_ký thay_đổi nội_dung giấy chứng_nhận đăng_ký thành_lập đối_với cơ_sở trợ_giúp xã_hội ngoài công_lập thuộc thẩm_quyền
    thành_lập của phòng lao_động – thương_binh và xã_hội có cách_thức nộp hồ_sơ như thế_nào ?
  - thủ_tục cấp thẻ hướng_dẫn_viên du_lịch nội_địa có kết_quả_thực_hiện là gì ?
  - cấp giấy_phép hoạt_động khám , chữa bệnh_nhân_đạo đối_với bệnh_viện trên địa_bàn quản_lý của sở y_tế ( trừ các bệnh_viện
    thuộc thẩm_quyền của bộ y_tế và bộ quốc_phòng ) và áp_dụng đối_với trường_hợp khi thay_đổi hình_thức tổ_chức , chia tách
    , hợp_nhất , sáp_nhập có phí , lệ_phí là bao_nhiêu ?
