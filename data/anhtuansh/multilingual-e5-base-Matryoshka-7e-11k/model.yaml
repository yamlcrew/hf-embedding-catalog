widgetData:
- source_sentence: 1.500.000 ( một triệu năm trăm_nghìn ) đồng / giấy_phép ( theo quy_định tại khoản b điều 4 thông_tư số
    143 / 2016 / tt - btc ngày 26 / 9 / 2016 của bộ tài_chính , có hiệu_lực thi_hành kể từ ngày 01 / 01 / 2017 ) .
  sentences:
  - 'phí lệ_phí của thủ_tục : thủ_tục cấp lại giấy_phép thành_lập văn_phòng đại_diện của thương_nhân nước_ngoài tại việt_nam
    là bao_nhiêu ?'
  - khi nào người giải_quyết tố_cáo tạm đình_chỉ việc giải_quyết tố_cáo ?
  - người điều_khiển , người đi trên phương_tiện , phương_tiện xuất_cảnh , nhập_cảnh qua cửa_khẩu biên_giới đất_liền phải
    thực_hiện thủ_tục biên_phòng điện_tử như thế_nào ?
- source_sentence: "bước 1 : tổ_chức sử_dụng đất chuẩn_bị hồ_sơ theo quy_định của pháp_luật ; \n bước 2 : tổ_chức sử_dụng\
    \ đất nộp hồ_sơ tại bộ_phận hành_chính công về tài_nguyên và môi_trường của ban quản_lý khu kinh_tế quảng_ninh tại trung_tâm\
    \ phục_vụ hành_chính công tỉnh ; \n bước 3 : cán_bộ bộ_phận hành_chính công về tài_nguyên và môi_trường kiểm_tra hồ_sơ\
    \ và trao giấy tiếp_nhận hồ_sơ cho nhà đầu_tư ; \n bước 4 : tổ_chức sử_dụng đất căn_cứ thời_gian ghi trên giấy tiếp_nhận\
    \ hồ_sơ đến trung_tâm phục_vụ hành_chính công_nhận kết_quả ."
  sentences:
  - khiếu_nại quyết_định kỷ_luật cán_bộ , công_chức được thực_hiện trong trường_hợp nào ?
  - 'trình_tự thực_hiện của thủ_tục : thủ_tục miễn , giảm tiền thuê đất trong khu kinh_tế ( trừ khu kinh_tế vân_đồn ) là gì
    ?'
  - trường_hợp đã hết thời_hiệu yêu_cầu thi_hành án , đề_nghị khôi_phục thời_hiệu thi_hành án cần những thủ_tục gì ?
- source_sentence: "theo quy_định tại nghị_định số 91 / 2017 / nđ - cp ngày 31 / 7 / 2017 của chính_phủ quy_định chi_tiết\
    \ thi_hành luật sửa_đổi , bổ_sung một_số điều của luật thi_đua , khen_thưởng năm 2013 : \n trong thời_hạn 20 ngày_ngày\
    \ làm_việc ( 30 ngày làm_việc đối_với trường_hợp phải lấy ý_kiến hiệp y ) kể từ ngày nhận đủ hồ_sơ theo quy_định , trưởng\
    \ ban ban thi_đua - khen_thưởng trung_ương trình thủ_tướng chính_phủ xem_xét , quyết_định ; \n sau khi nhận được quyết_định\
    \ khen_thưởng của thủ_tướng chính_phủ , trong thời_hạn 10 ngày làm_việc , ban thi_đua - khen_thưởng trung_ương sao quyết_định\
    \ và thông_báo kết_quả khen_thưởng cho bộ , ban , ngành , tỉnh , đoàn_thể trung_ương trình khen_thưởng ; \n sau khi nhận\
    \ được quyết_định khen_thưởng của cấp có thẩm_quyền , trong thời_hạn 10 ngày làm_việc , cơ_quan trình khen_thưởng thông_báo\
    \ và gửi kết_quả khen_thưởng cho các trường_hợp được khen_thưởng ; \n đối_với các trường_hợp không đủ điều_kiện , tiêu_chuẩn\
    \ , hồ_sơ theo quy_định , trong thời_hạn 10ngày làm_việc kể từ ngày nhận đủ hồ_sơ theo quy_định , ban thi_đua - khen_thưởng\
    \ trung_ương thông_báo bằng văn_bản cho bộ , ban , ngành , tỉnh , đoàn_thể trung_ương trình khen_thưởng ."
  sentences:
  - yêu_cầu về xác_nhận quá_trình thực_hành trong cấp chứng_chỉ hành_nghề khám chữa bệnh là gì ?
  - đề_nghị cho biết thời_hạn thực_hiện thủ_tục tặng_thưởng " cờ thi_đua của chính_phủ " về thành_tích thi_đua theo đợt hoặc
    chuyên_đề
  - vợ_chồng tôi năm nay được 38 tuổi , nghề_nghiệp là nông_dân . vợ_chồng tôi muốn tham_gia bhxh tự_nguyện để khi về già
    có lương hưu . vậy vợ_chồng tôi có được đóng bhxh không ?
- source_sentence: theo quy_định tại điểm c khoản 1 điều 211 luật doanh_nghiệp , trường_hợp_doanh_nghiệp ngừng hoạt_động_kinh_doanh
    01 năm mà không thông_báo với cơ_quan đăng_ký kinh_doanh và cơ_quan thuế thì doanh_nghiệp thuộc trường_hợp bị thu_hồi
    giấy chứng_nhận đăng_ký doanh_nghiệp . - trình_tự , thủ_tục thu_hồi giấy chứng_nhận đăng_ký doanh_nghiệp thực_hiện theo
    quy_định tại khoản 3 điều 63 nghị_định số 78 / 2015 / nđ - cp được sửa_đổi , bổ_sung tại khoản 20 điều 1 nghị_định số
    108 / 2018 / nđ - cp sửa_đổi , bổ_sung một_số điều của nghị_định số 78 / 2015 / nđ - cp. theo đó , phòng đăng_ký kinh_doanh
    thông_báo bằng văn_bản về hành_vi vi_phạm và yêu_cầu người đại_diện theo pháp_luật của doanh_nghiệp đến trụ_sở của phòng
    để giải_trình . sau 10 ngày làm_việc , kể từ ngày kết_thúc thời_hạn hẹn trong thông_báo mà người được yêu_cầu không đến
    hoặc nội_dung giải_trình không được chấp_thuận thì phòng đăng_ký kinh_doanh ra quyết_định thu_hồi giấy chứng_nhận đăng_ký
    doanh_nghiệp . - như_vậy , theo quy_định nêu trên việc công_ty ngừng hoạt_động_kinh_doanh 01 năm mà không thông_báo với
    cơ_quan đăng_ký kinh_doanh và cơ_quan thuế là vi_phạm_quy_định pháp_luật và thuộc một trong các trường_hợp bị thu_hồi
    giấy chứng_nhận đăng_ký doanh_nghiệp .
  sentences:
  - thủ_tục và hồ_sơ xin phép chuyển_đổi mục_đích sử_dụng , di_dời , tháo_dỡ ?
  - thời_gian đăng_ký hoạt_động của chi_nhánh của tổ_chức trọng_tài nước_ngoài tại việt_nam được quy_định như thế_nào ?
  - công_ty tnhh xyz ngừng hoạt_động_kinh_doanh 01 năm mà không thông_báo với cơ_quan đăng_ký kinh_doanh và cơ_quan thuế ?
    trong trường_hợp này , công_ty bị thu_hồi giấy chứng_nhận đăng_ký doanh_nghiệp thì có đúng quy_định pháp_luật hiện_hành
    không ?
- source_sentence: 'thời_hạn giải_quyết việc gia_hạn thời_gian học_tập cho lưu học_sinh để hoàn_thành khóa học như sau : tối_đa
    20 ngày làm_việc kể từ ngày nhận đủ hồ_sơ hợp_lệ .'
  sentences:
  - tôi muốn hỏi về gia_hạn thời_gian học_tập cho lưu học_sinh để hoàn_thành khóa học , có thời_hạn giải_quyết như thế_nào
    ?
  - thành_phần hồ_sơ giải_quyết chế_độ hỗ_trợ đối_với người việt_nam có công với cách_mạng quy_định tại nghị_định số 102 /
    2018 / nđ - cp ngày 20 / 7 / 2018 của chính_phủ về chế_độ hỗ_trợ và một_số chế_độ đãi_ngộ khác đối_với người việt_nam
    có công với cách_mạng , người tham_gia kháng_chiến , chiến_tranh bảo_vệ tổ_quốc và làm nhiệm_vụ quốc_tế đang định_cư ở
    nước_ngoài ( nghị_định số 102 / 2018 / nđ - cp ) , bao_gồm những giấy_tờ gì ?
  - nhiệm_vụ thiết_kế bvtc gồm nội_dung gì ? đơn_vị lập và thẩm_quyền phê_duyệt nhiệm_vụ thiết_kế bvtc ?
