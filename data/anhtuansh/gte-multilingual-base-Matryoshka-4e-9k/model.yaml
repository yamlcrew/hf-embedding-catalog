widgetData:
- source_sentence: 'theo quy_định tại điều 35 nghị_định số 201 / 2013 / nđ - cp thì thời_hạn giải_quyết thủ_tục hành_chính
    về cấp giấy_phép thăm_dò , khai_thác nước dưới đất như sau : 1 . tiếp_nhận và kiểm_tra hồ_sơ : trong thời_hạn mười ( 10
    ) ngày làm_việc , kể từ ngày nhận hồ_sơ , cơ_quan tiếp_nhận hồ_sơ có trách_nhiệm xem_xét , kiểm_tra hồ_sơ . trường_hợp
    hồ_sơ không hợp_lệ , cơ_quan tiếp_nhận hồ_sơ thông_báo cho tổ_chức , cá_nhân đề_nghị cấp phép để bổ_sung , hoàn_thiện
    hồ_sơ theo quy_định . trường_hợp hồ_sơ sau khi đã bổ_sung mà vẫn không đáp_ứng yêu_cầu theo quy_định thì cơ_quan tiếp_nhận
    hồ_sơ trả lại hồ_sơ và thông_báo rõ lý_do cho tổ_chức , cá_nhân đề_nghị cấp phép . 2 . thẩm_định_đề_án , báo_cáo thăm_dò
    , khai_thác , sử_dụng tài_nguyên nước , xả nước_thải vào nguồn nước trong hồ_sơ đề_nghị cấp phép ( sau đây gọi chung là
    đề_án , báo_cáo ) : a ) trong thời_hạn ba_mươi ( 30 ) ngày làm_việc , kể từ ngày nhận đủ hồ_sơ hợp_lệ theo quy_định tại
    khoản 1 điều này , cơ_quan tiếp_nhận hồ_sơ có trách_nhiệm thẩm_định_đề_án , báo_cáo ; nếu cần_thiết thì kiểm_tra thực_tế
    hiện_trường , lập hội_đồng thẩm_định_đề_án , báo_cáo . trường_hợp đủ điều_kiện cấp phép , cơ_quan tiếp_nhận hồ_sơ trình
    cơ_quan có thẩm_quyền cấp giấy_phép ; trường_hợp không đủ điều_kiện để cấp phép thì trả lại hồ_sơ cho tổ_chức , cá_nhân
    đề_nghị cấp phép và thông_báo lý_do không cấp phép ; b ) trường_hợp phải bổ_sung , chỉnh_sửa để hoàn_thiện đề_án , báo_cáo
    thì cơ_quan tiếp_nhận hồ_sơ gửi văn_bản thông_báo cho tổ_chức , cá_nhân đề_nghị cấp phép nêu rõ những nội_dung cần bổ_sung
    , hoàn_thiện đề_án , báo_cáo . thời_gian bổ_sung , hoàn_thiện hoặc lập lại đề_án , báo_cáo không tính vào thời_gian thẩm_định_đề_án
    , báo_cáo . thời_gian thẩm_định sau khi đề_án , báo_cáo được bổ_sung hoàn_chỉnh là hai mươi ( 20 ) ngày làm_việc ; c )
    trường_hợp phải lập lại đề_án , báo_cáo , cơ_quan tiếp_nhận hồ_sơ gửi văn_bản thông_báo cho tổ_chức , cá_nhân đề_nghị
    cấp phép nêu rõ những nội_dung đề_án , báo_cáo chưa đạt yêu_cầu , phải làm lại và trả lại hồ_sơ đề_nghị cấp phép . 3 .
    trả kết_quả giải_quyết hồ_sơ_cấp phéptrong thời_hạn năm ( 05 ) ngày làm_việc , kể từ ngày nhận được giấy_phép của cơ_quan
    có thẩm_quyền , cơ_quan tiếp_nhận hồ_sơ thông_báo cho tổ_chức , cá_nhân đề_nghị cấp phép để thực_hiện nghĩa_vụ tài_chính
    và nhận giấy_phép .'
  sentences:
  - ai có thẩm_quyền giải_quyết tố_cáo hành_vi vi_phạm_pháp_luật trong thực_hiện nhiệm_vụ , công_vụ của cán_bộ , công_chức
    , viên_chức ?
  - thời_hạn giải_quyết thủ_tục hành_chính về cấp giấy_phép thăm_dò , giấy_phép khai_thác nước dưới đất ?
  - tôi có_thể đăng_ký ngành , nghề kinh_doanh không có trong hệ_thống ngành kinh_tế việt_nam không ?
- source_sentence: khoản 2 điều 2 thông_tư 30 quy_định , đoàn khám bệnh , chữa bệnh_nhân_đạo là một nhóm nhân_viên y_tế trong
    nước , nước_ngoài do cá_nhân , tổ_chức trong nước , nước_ngoài tổ_chức để khám bệnh , chữa bệnh_nhân_đạo cho nhân_dân
    .
  sentences:
  - tàu_thủy lưu_trú du_lịch có tiêu_chí xếp_hạng bắt_buộc không ?
  - tôi muốn xin cấp lại sổ thuyền_viên thì cần những hồ_sơ gì ?
  - đoàn khám bệnh , chữa bệnh_nhân_đạo là gì ?
- source_sentence: 'thành_phần hồ_sơ thực_hiện tthc sửa_đổi , bổ_sung / cấp lại giấy chứng_nhận lưu_hành tự_do ( cfs ) đối_với
    hàng_hóa xuất_khẩu thuộc phạm_vi quản_lý của bộ nông_nghiệp và phát_triển nông_thôn ( quy_định tại quyết_định số 1312
    / qđ - bnn - qlcl ngày 22 / 4 / 2019 về việc công_bố thủ_tục hành_chính được thay_thế , tthc bị bãi_bỏ lĩnh_vực quản_lý
    chất_lượng nông_lâm_sản và thủy_sản thuộc phạm_vi chức_năng quản_lý của bộ nông_nghiệp và phát_triển nông_thôn ) : - văn_bản
    đề_nghị sửa_đổi , bổ_sung / cấp lại cfs của thương_nhân : 01 bản_chính . - các giấy_tờ liên_quan đến việc sửa_đổi , bổ_sung
    / cấp lại cfs.'
  sentences:
  - kính gửi cục quản_lý chất_lượng nông_lâm_sản và thuỷ_sản , công_ty tôi đã được quý cục cấp giấy chứng_nhận lưu_hành tự_do
    cfs , nay tôi muốn sửa_đổi một_số thông_tin trên giấy cfs , vậy hồ_sơ đề_nghị sửa_đổi cần những gì ?
  - thời_gian để được cấp quyết_định chỉ_định tổ_chức đánh_giá sự phù_hợp lĩnh_vực sản_phẩm , hàng_hóa_vật_liệu xây_dựng đối_với
    trường_hợp thay_đổi , bổ_sung phạm_vi , lĩnh_vực được chỉ_định
  - hồ_sơ đăng_ký dự_tuyển lao_động của người lao_động gồm những gì ?
- source_sentence: 'hồ_sơ đề_nghị gia_hạn giấy_phép cung_cấp dịch_vụ trò_chơi điện_tử g1 trên mạng bao_gồm : - đơn đề_nghị
    gia_hạn giấy_phép bao_gồm : tên , địa_chỉ của doanh_nghiệp ; số , nơi cấp , ngày cấp giấy chứng_nhận đăng_ký doanh_nghiệp
    ; số , ngày cấp , ngày hiệu_lực của giấy_phép đã được cấp ; lý_do đề_nghị gia_hạn giấy_phép ; cam_kết của doanh_nghiệp
    về các nội_dung kê_khai trong đơn đề_nghị .'
  sentences:
  - thành_phần hồ_sơ
  - nhà đầu_tư phải nộp bao_nhiêu bộ hồ_sơ đề_nghị thủ_tướng chính_phủ cho phép đầu_tư gián_tiếp ra nước_ngoài đối_với các
    trường_hợp đầu_tư khác quy_định tại điều 9 nghị_định 135 / 2015 / nđ - cp ?
  - phần vốn của thành_viên chưa góp vốn trong thời_hạn 90 ngày , kể từ ngày được cấp giấy chứng_nhận đăng_ký doanh_nghiệp
    trong công_ty tnhh hai thành_viên trở lên được xử_lý như thế_nào ? trường_hợp có người nhận mua lại phần vốn chưa góp
    này thì công_ty có phải đăng_ký thay_đổi thành_viên với cơ_quan đăng_ký kinh_doanh không ? hồ_sơ , thủ_tục được quy_định
    như thế_nào ?
- source_sentence: quản_lý nhập_khẩu hàng_hóa bị điều_tra , phục_vụ công_tác điều_tra , áp_dụng biện_pháp phòng_vệ thương_mại
    .
  sentences:
  - mục_đích của thủ_tục khai_báo là gì ?
  - đơn_vị chúng_tôi đã được cấp chứng_chỉ năng_lực hoạt_động xây_dựng nhưng hiện_nay chúng_tôi thay_đổi người đại_diện pháp_luật
    của đơn_vị . vậy chúng_tôi có phải làm thủ_tục nào để thay_đổi người đại_diện theo pháp_luật của chúng_tôi trên chứng_chỉ
    ?
  - trường_hợp nào thì được cấp lại giấy xác_nhận đăng_ký công_cụ hỗ_trợ , thủ_tục cấp lại giấy xác_nhận đăng_ký công_cụ hỗ_trợ
    như thế_nào ?
