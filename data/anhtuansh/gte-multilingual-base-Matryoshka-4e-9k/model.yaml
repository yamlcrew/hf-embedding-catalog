      trường_hợp đầu_tư khác quy_định tại điều 9 nghị_định 135 / 2015 / nđ - cp ?
    - phần vốn của thành_viên chưa góp vốn trong thời_hạn 90 ngày , kể từ ngày được cấp giấy chứng_nhận đăng_ký doanh_nghiệp
      trong công_ty tnhh hai thành_viên trở lên được xử_lý như thế_nào ? trường_hợp có người nhận mua lại phần vốn chưa góp
      này thì công_ty có phải đăng_ký thay_đổi thành_viên với cơ_quan đăng_ký kinh_doanh không ? hồ_sơ , thủ_tục được quy_định
      như thế_nào ?
  - source_sentence: quản_lý nhập_khẩu hàng_hóa bị điều_tra , phục_vụ công_tác điều_tra , áp_dụng biện_pháp phòng_vệ thương_mại
