  - source_sentence: ai quyết_định mức cấp tín_dụng tối_đa vượt quá các giới_hạn quy_định trong trường_hợp đặc_biệt ?
    sentences:
    - "4 . mức dư_nợ cấp tín_dụng quy_định tại khoản 1 và khoản 2 điều này bao_gồm cả tổng mức đầu_tư vào trái_phiếu do khách_hàng\
      \ phát_hành . \n 5 . giới_hạn và điều_kiện cấp tín_dụng để đầu_tư , kinh_doanh cổ_phiếu của ngân_hàng thương_mại , chi_nhánh\
      \ ngân_hàng nước_ngoài do ngân_hàng nhà_nước quy_định . \n 6 . trường_hợp nhu_cầu vốn của một khách_hàng và người có\
      \ liên_quan vượt quá giới_hạn cấp tín_dụng quy_định tại khoản 1 và khoản 2 điều này thì tổ_chức tín_dụng , chi_nhánh\
      \ ngân_hàng nước_ngoài được cấp tín_dụng hợp vốn theo quy_định của ngân_hàng nhà_nước . \n 7 . trong trường_hợp đặc_biệt\
      \ , để thực_hiện nhiệm_vụ kinh_tế - xã_hội mà khả_năng hợp vốn của các tổ_chức tín_dụng , chi_nhánh ngân_hàng nước_ngoài\
      \ chưa đáp_ứng được yêu_cầu vay vốn của một khách_hàng thì thủ_tướng chính_phủ quyết_định mức cấp tín_dụng tối_đa vượt\
      \ quá các giới_hạn quy_định tại khoản 1 và khoản 2 điều này đối_với từng trường_hợp cụ_thể ."
    - "khoản 1 . nhiệm_vụ , quyền_hạn của thủ_tướng chính_phủ : \n a ) quyết_định việc sử_dụng quỹ_tích_lũy trả nợ để xử_lý\
      \ rủi_ro đối_với các khoản cho vay lại và bảo_lãnh chính_phủ theo quy_định tại khoản 4 điều 14 của luật quản_lý nợ công\
      \ , bao_gồm quyết_định về bên nhận ứng vốn , trị_giá ứng vốn , lãi_suất ứng vốn , thời_hạn hoàn_trả ứng vốn . \n b )\
      \ quyết_định việc khoanh nợ khoản ứng vốn hoặc cơ_cấu lại khoản ứng vốn . quyết_định việc sử_dụng nguồn quỹ để xử_lý\
      \ rủi_ro phát_sinh , bao_gồm xóa nợ gốc , lãi , lãi phạt , thay_đổi lãi_suất ứng vốn khi bên nhận ứng vốn gặp khó_khăn\
      \ do nguyên_nhân bất_khả_kháng . \n c ) quyết_định việc trích một phần phí bảo_lãnh , phí cho vay lại và quy_định việc\
      \ quản_lý sử_dụng kinh_phí được trích từ phí bảo_lãnh , phí quản_lý cho vay lại cho nghiệp_vụ quản_lý nợ công ."
    - "điều 14 . trách_nhiệm của ủy_ban nhân_dân tỉnh , thành_phố trực_thuộc trung_ương \n 1 . chỉ_đạo sở khoa_học và công_nghệ\
      \ phối_hợp với các cơ_quan_chức_năng thuộc ủy_ban nhân_dân tỉnh , thành_phố trực_thuộc trung_ương tổ_chức hướng_dẫn\
      \ triển_khai thực_hiện thông_tư này . \n 2 . chỉ_đạo sở khoa_học và công_nghệ phối_hợp với cơ_quan , đơn_vị có liên_quan\
      \ tiến_hành thanh_tra , kiểm_tra thực_hiện quy_định pháp_luật trong việc thuê và sử_dụng người việt_nam ở nước_ngoài\
      \ và chuyên_gia nước_ngoài đảm_nhiệm chức_danh lãnh_đạo tại các tổ_chức khoa_học và công_nghệ công_lập trên địa_bàn\
      \ tỉnh . \n 3 . định_kỳ hằng năm , gửi báo_cáo về bộ khoa_học và công_nghệ về tình_hình thuê người việt_nam ở nước_ngoài\
      \ và chuyên_gia nước_ngoài đảm_nhiệm chức_danh lãnh_đạo tổ_chức khoa_học và công_nghệ công_lập thuộc phạm_vi quản_lý\
      \ ."
