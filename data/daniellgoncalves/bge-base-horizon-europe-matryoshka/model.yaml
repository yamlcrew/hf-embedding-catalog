- source_sentence: "EU Grants: Amendment Guide: V1. 1 – 15.02.2024 \r\n28 \r\n            Grey  = clauses that can be activated\
    \ only by the EU (Automatic – only PO can change system data, Selected by EU or On -demand).  \r\nText in grey  = information\
    \ that applies only to specific types of EU grant agreements.  SPECIAL AT -CLAUSES  \r\nAT-clauses  Mandatory combinations\
    \ and supporting \r\ndocuments  Other combinations  \r\n No Name  \r\nProgramme -specific provisions  \r\n71 [ONLY for\
    \ programmes \r\nwith progress reporting ] \r\nChange of the progress \r\nreporting schedule  Mandatory combinations:\
    \  \r\n- Change of Annex 1 (if change/reallocation \r\nof tasks and changes to the use of resources \r\nare necessary)\
    \  (AT21)  \r\n  \r\n AT71 — AT71 serves to adapt the progress \r\nreporting schedule.  \r\n This amendment type can be\
    \ flagged as Error \r\nAmendment by the EU Officer . \r\n72a [ONLY for programmes \r\nwith blended finance single \r\n\
    action ] Change of \r\nadditional information on \r\nthe blended finance \r\ninvestment component    AT72a — AT72a serves\
    \ to adjust the investment \r\ncomponent amount in programmes with blended \r\nfinance (single action) . \r\nIt is possible\
    \ to set an effective date; if not set, \r\nthe amendment will take effect on the entry into \r\nforce date.  \r\n This\
    \ amendment type can be flagged as Error \r\nAmendment by the EU Officer . \r\n72b [ONLY for programmes \r\nwith Annex\
    \ 6] Change of \r\nAnnex 6    AT72b — AT72b serves to replace Annex 6 and it \r\nis applicable in programmes with Annex\
    \ 6 . \r\n This amendment type can be flagged as Error \r\nAmendment by the EU Officer . \r\n …."
  sentences:
  - "Who is responsible for agreeing to the Portal Terms and Conditions and the Portal Privacy Statement for an organization?\r\
    \n"
  - "What type of amendment serves to adapt the progress reporting schedule in EU grant agreements?\r\n"
  - "How will the allocation of financial contributions be determined in the Programme?\r\n"
- source_sentence: "benefit, at any stage of the project, during as well as after the end of the project, provided \r\nthey\
    \ have key exploitable results (KER; high potential to be exploited, i.e.to be used in a \r\nproduct, process or service,\
    \ or act as an important input to further research, R&I related \r\npolicy or education, etc). Results such as outcomes\
    \ or announcements of consortia meetings, \r\nconferences or other events are not considered as key exploitable results\
    \ and all project \r\ndeliverables are not necessarily key exploitable results either.  \r\nPublishing results in the\
    \ Horizon Results Platform ensures high visibility  to a variety of \r\npotential users and stake holders including industry,\
    \ academia, investors, public \r\nadministrations, etc and may lead to finding help to exploit the results directly (e.g.\
    \ \r\nfinancing)  or finding third parties which may be interested to exploit the results.  \r\nExample:  Certain beneficiari\
    \ es in a project have developed a prototype and have \r\njointly filed for intellectual property protection, however\
    \ they do not have the capacity \r\nto bring the results to the market. The beneficiaries concerned published their results\
    \ \r\non the Horizon Results Pla tform and a company signalled its interest to use the \r\ntechnology in its production\
    \ line. After negotiations, the beneficiaries agreed to \r\ntransfer ownership of the prototype and any attached rights\
    \ to this company in return \r\nfor royalties.  \r\nThe use of the Hor izon Results Platform becomes mandatory , if one\
    \ year after the end of \r\nthe action, key exploitable results are not exploited.  \r\nExample:  Beneficiaries in a project\
    \ have developed R&I policy recommendations and \r\nguidelines to be used by public authorities in ca se of water pollution\
    \ resulting from \r\nindustrial activities. The beneficiaries would like to see them being used but despite \r\ntheir\
    \ best efforts they have not managed to have local authorities use them. At the \r\nlatest one year after the end of the\
    \ grant, the beneficiaries must publish the policy"
  sentences:
  - "What are some activities that can be included in a proposal for co-creation in R&I?\r\n"
  - "When does publishing results on the Horizon Results Platform become mandatory?\r\n"
  - "What is the Commission empowered to do in order to ensure the effective assessment of the Programme's progress towards\
    \ the achievement of its objectives?\r\n"
- source_sentence: "FAQ  \r\n• FAQ on LEAR appointment  \r\n2.3 Bank account registration and validation  \r\nRegistration\
    \ and validation of  the bank account for payments  \r\nIn addition to the validation of the participating organisations,\
    \  we also have to validate  the bank \r\naccount that will be used for our payments  to you  (usually bank account of\
    \ the Coordinator) .  \r\nThe Central Validation Service  will contact the Coordinator after the PIC is validated , to\
    \ enter \r\nthe bank account details  into the Participant Register and upload the necessary supporting \r\ndocuments\
    \ ( My Organisations  > Actions > Modify Organisation ). \r\nThe documents required will be listed  in the notification\
    \ you receive.  In general, you will need \r\nto provide the bank account details and either a bank statement or financial\
    \ identification form."
  sentences:
  - "What documents are needed to validate the bank account for LEAR payments?\r\n"
  - "When is there no need to request an amendment if termination takes effect after the end of the action?\r\n"
  - "What is the definition of force majeure according to the passage?\r\n"
- source_sentence: "including  data. They are globally unique and long -lasting references to digital objects \r\n(such as\
    \ data, publications and other research outputs)  or non -digital objects such as \r\nresearchers, research institutions,\
    \ grants, etc. Frequently used persistent identifiers \r\ninclude digital object identifiers (DOIs), Handles, and others.\
    \  For further reading on PID \r\ntypes, please refer to https://www.dpconline.org/handbook/technical -solutions -and-\r\
    \ntools/persistent -identifiers . \r\nTo enhance the findability of r esearch outputs, and their potential reuse, standardised\
    \ \r\nmetadata frameworks are essential, ensuring that data and other research outputs \r\nare accompanied by rich metadata\
    \ that provides them with context.  \r\nTo enhance the re -usability of research data, they must be licenced. For more\
    \ \r\ninformation on the licences required for data under Horizon Europe, please refer to the \r\nAGA (article 17).  \r\
    \nTrusted repositories  assume a central role in the Horizon Europe for the deposition of \r\nand access to publications\
    \ and resea rch data. For a definition of trusted repositories in \r\nHorizon Europe please refer to the AGA (article\
    \ 17). Proposers, with the help of data \r\nand research support staff (e.g. data stewards, data librarians, et c), should\
    \ check \r\nwhether the repositories that th ey plan to deposit their data have the features of \r\ntrusted repositories,\
    \ and justify this accordingly in their Data Management Plans.  \r\nData management plans (DMPs) are a cornerstone for\
    \ responsible management of \r\nresearch outputs, notably data and are mandatory in Horizon Europe for projects \r\ngenerating\
    \  and/or reusing data (on requirements and the frequency of DMPs as \r\ndeliverables consult the AGA article 17). A template\
    \ for a DMP  is provided under the \r\nreporting templates in the reference documents  of the Funding and Tenders portal\
    \ of \r\nthe European Commission. Its use is recom mended but not mandatory.  DMPs are"
  sentences:
  - "How can a Beneficiary submit a Financial Statement?\r\n"
  - "Under what circumstances can a consortium composition or project be altered during grant preparation?\r\n"
  - "What is a cornerstone for responsible management of research outputs in Horizon Europe?\r\n"
