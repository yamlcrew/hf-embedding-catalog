    \ — Form — Eligibility conditions  — Calculation   \r\n1.1 What? If eligible under the Grant Agreement  (currently not\
    \ in any Programme) , the \r\nbeneficiaries/affiliated entities  may charge ‘Contributions’.  \r\nA (simplified) contribution\
    \ is very similar to a simplified cost (e.g. unit cost); it is normally an \r\napproximation of the costs, calculated\
    \ ex -ante, and pai d on the basis of pre -defined mile \r\nstones/work packages. However, a simplified contribution is\
    \ differentiated from a simplified \r\ncost because it already incorporates the funding rate in the ex -ante calculation\
    \ of the amount \r\ninstead of applying the funding r ate afterwards. This means that there is no need to apply a \r\n\
    funding rate to the amount claimed by the recipient in a request for payment.  Contributions  \r\n[OPTION 1 for programmes\
    \ without contributions:  \r\nNot applicable  ] \r\n[OPTION 2 for programmes with unit contributions:  \r\nF.  Contributions\
    \  \r\nF.X [Insert name of unit contribution ]  \r\n[Insert name of unit contribution ] are eligible, if and as declared\
    \ eligible in the call conditions, if they fulfil \r\nthe general eligibility conditions and are calculated as unit costs\
    \ in accordance with the method set out in \r\nAnnex 2a  [and [insert additional eligibility conditions, if any] ]. ]\
    \ \r\n[OPTION 3 for programmes with flat -rate contributions:  \r\nF.X [Insert name of flat -rate contribution ]  \r\n\
    [Insert name of flat -rate contribution ] are eligible, if and as declared eligible in the call conditions, if they \r\
    \nfulfil the general eligibility conditions for flat -rate contributions [and [insert additional eligibility conditions,\
    \ \r\nif any] ]. \r\nThey  will be calculated  at a flat-rate of [ …%] of [list the costs/contributions on which the flat\
    \ -rate should be"
  sentences:
