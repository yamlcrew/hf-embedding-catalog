  sentences:
  - “Dr. Kendall, I was telling these gentlemen about my aunt’s recent kidney transplant.”  Mia turned her full attention
    back to the ambassador, grateful his determination to impress her with his medical interest might inadvertently provide
    her with another piece of information. “In the States?”  “No. Here in Dar. At Kaboni Private.”  “Your aunt is an expatriate?”  He
    laughed and snagged another glass of champagne from a waiter. “Oh my, no. Aunt Lilly’s as southern as fried chicken. She’s
    from Atlanta.”  “Then why…” She caught herself, allowing her mind a moment to frantically sift through the questions pelting
    her thoughts. She could think of only two reasons why Americans would risk below-par treatment in a third-world country…fear
    and money. Fear they couldn’t outlast the UNOS wait-list time, and money if they were unable to pay for the expensive
    procedure if, by chance, they were lucky enough to beat the odds of getting an organ in America.
  - “Oh I just want a bite, just a bite.” Then the dessert arrives and they turn into a vacuum. Apparently it was a bite from
    a shovel. “Yeah, I have a bit of a sweet tooth.” No, you are a pathetic sugar fiend. I love the phrase “I have a sweet
    tooth.” I always want to say, “You’re ordering it for your tooth? That’s interesting, because it’s going straight to your
    butt. I think your butt owes your tooth an explanation.” I guess we all have our own way of rationalizing. In defense
    of the friend with the sweet tooth, no one has ever really needed dessert. Who was the first guy to ask for dessert? “That
    was a good meal. I’m full.
