    Countess of Davenport, was a pretty, voluptuous blonde with a gaming habit and a penchant for dangerous men. Dangerous
    men who weren’t her husband, that was. Cecily exchanged an exasperated look with the small pug dog who sat drooling into
    a pink satin cushion on top of an ornate chaise longue. The furniture in Lavinia’s boudoir was gilded and tasseled and
    braided to within an inch of its life. Lord, but the woman had terrible taste.
