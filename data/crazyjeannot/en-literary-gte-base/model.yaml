    new girl. ‘But I, for one, think it’s a very nice room!’  ‘Hear, hear!’ chorused the others. And indeed it was a very
    nice dormitory. Despite Amy’s scornful words, there was plenty of room for all the girls. Each one had a little cabinet
    beside her bed, in which she could keep all her personal belongings, as well as a small wardrobe. The beds had pretty
    green, floral patterned bedspreads, which matched the curtains at the big window, from where there was a splendid view
    of the beautiful gardens. One of the beds already had a pair of slippers placed neatly beside it, and there was a book
