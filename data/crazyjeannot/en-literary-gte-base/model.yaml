- source_sentence: It is less likely that he encountered it in the course of his more general reading. It is not easy to establish
    to what extent the word was in use at this time. Although Diderot made reference to it in his famous encyclopaedia, it
    did not appear in the French dictionary until 1835, despite the fact that it was a Frenchman who coined it. The Encyclopaedia
    Britannica of 1842 does not include the word, which first appears in the eighth edition (1855). Nor does it appear in
    the contemporary German  18  D. McNeill  dictionary, although this may be attributable to the reluctance of the brothers
    Grimm to include words of manifestly foreign origin. In sum, the evidence is inconclusive, but suggests that Marx did
    indeed come across the term only months, or weeks, before it appeared in Herr Hermes’ article. Why, then, to turn to our
    second and more important question, did the term appeal so strongly to Marx? To answer this, let us consider in more detail
    the context of his own article on the debates on the theft of wood. It is evident from the tone as well as the content
    that Marx is outraged.
