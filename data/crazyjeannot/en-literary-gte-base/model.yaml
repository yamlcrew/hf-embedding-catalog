    over one arm, and a full pincushion. “Wait a moment, what are you doing?”  “Taking your measurements and fitting you,”
    she replied. “But you’re a lady.”  One dark brow arched high. “Also a modiste. Is it so incredible to you that a woman
    of my station can be both wellborn and clever with a needle?”  Nève closed her mouth, reminded of her own situation. “Well,
    no, but one would expect needlepoint rather than dressmaking.”  “Needlepoint.” Lady Marsden gave an eloquent sniff as
    she proceeded to efficiently measure Nève’s chemise-clad shape from head to toe. “It’s a rather exceptional kind of torture,
    I assure you. I much prefer design. These dresses, for example”—she paused and pointed to the arrangement of heavily embroidered
    silks that the other women held—“are my own creations.
