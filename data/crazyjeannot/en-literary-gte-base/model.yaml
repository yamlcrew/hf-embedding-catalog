    unpacking,’ sighed Nora, opening her night case. ‘Thank goodness our trunks aren’t brought up until tomorrow, because
    I simply couldn’t face having to put everything away tidily on my first day back.’  A frown crossed Amy’s haughty little
    face as she said, ‘Don’t tell me that we actually have to unpack our trunks ourselves?
