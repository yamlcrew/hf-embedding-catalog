      Arts and Culture and the annual Puerto Rican People''s Parade, as well as the National Museum of Mexican Art

      and St. Adalbert''s Church in Pilsen. The Near West Side holds the University of Illinois at Chicago and was once

      home to Oprah Winfrey''s Harpo Studios, the site of which has been rebuilt as the global headquarters of

      McDonald''s.[236]

      The city''s distinctive accent, made famous by its use in classic films like The Blues Brothers and television

      programs like the Saturday Night Live skit "Bill Swerski''s Superfans", is an advanced form of Inland Northern

