  - 'Opening ceremony of the 1984 Summer

    Olympics at the LA Coliseum

    Wilshire Grand Center, built in

    2017, is the tallest building in

    California and in the Western

    United States.

    As a consequence of World War II, suburban growth, and population density, many amusement parks were

    built and operated in this area.[69] An example is Beverly Park, which was located at the corner of Beverly

    Boulevard and La Cienega before being closed and substituted by the Beverly Center.[70]

    In the second half of the 20th century, Los Angeles substantially reduced the amount of housing that could be

    built by drastically downzoning the city. In 1960, the city had a total zoned capacity for approximately 10

    million people. By 1990, that capacity had fallen to 4.5 million as a result of policy decisions to ban housing

    through zoning.[71]

    Racial tensions led to the Watts riots in 1965, resulting in 34 deaths and over 1,000 injuries.[72]

    In 1969, California became the birthplace of the Internet, as the first

    ARPANET transmission was sent from the University of California,

    Los Angeles (UCLA) to the Stanford Research Institute in Menlo

    Park.[73]

    In 1973, Tom Bradley was elected as the city''s first African American

    mayor, serving for five terms until retiring in 1993. Other events in

    the city during the 1970s included the Symbionese Liberation Army''s

    South Central standoff in 1974 and the Hillside Stranglers murder

    cases in 1977–1978.[74]

    In early 1984, the city surpassed Chicago in population, thus

    becoming the second largest city in the United States.[75]

    In 1984, the city hosted the Summer Olympic Games for the second time. Despite being boycotted by 14

    Communist countries, the 1984 Olympics became more financially successful than any previous,[76] and the

    second Olympics to turn a profit; the other, according to an analysis of contemporary newspaper reports, was

    the 1932 Summer Olympics, also held in Los Angeles.[77]

