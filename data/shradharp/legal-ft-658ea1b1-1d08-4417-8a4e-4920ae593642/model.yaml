  - 'history.[65][66] The University of Chicago, formerly at another location, moved to the same South Side location in

    1892. The term "midway" for a fair or carnival referred originally to the Midway Plaisance, a strip of park land

    that still runs through the University of Chicago campus and connects the Washington and Jackson Parks.[67][68]

    During World War I and the 1920s there was a major expansion in

    industry. The availability of jobs attracted African Americans from the

    Southern United States. Between 1910 and 1930, the African American

    population of Chicago increased dramatically, from 44,103 to 233,903.[69]

    This Great Migration had an immense cultural impact, called the Chicago

    Black Renaissance, part of the New Negro Movement, in art, literature,

    and music.[70] Continuing racial tensions and violence, such as the

    Chicago race riot of 1919, also occurred.[71]

    The ratification of the 18th amendment to the Constitution in 1919 made

    the production and sale (including exportation) of alcoholic beverages

    illegal in the United States. This ushered in the beginning of what is

    known as the gangster era, a time that roughly spans from 1919 until 1933 when Prohibition was repealed. The

    1920s saw gangsters, including Al Capone, Dion O''Banion, Bugs Moran and Tony Accardo battle law enforcement

    and each other on the streets of Chicago during the Prohibition era.[72] Chicago was the location of the infamous

    St. Valentine''s Day Massacre in 1929, when Al Capone sent men to gun down members of a rival gang, North Side,

    led by Bugs Moran.[73]

    From 1920 to 1921, the city was affected by a series of tenant rent strikes, which lead to the formation of the

    Chicago Tenants Protective association, passage of the Kessenger tenant laws, and of a heat ordinance that legally

    required flats to be kept above 68 °F during winter months by landlords.[74][75][76][77][78][79]

