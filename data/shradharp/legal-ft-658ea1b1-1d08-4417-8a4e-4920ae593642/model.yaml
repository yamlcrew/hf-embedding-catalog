      Los Angeles

      Los Angeles,[a] often referred to by its initials L.A., is the

      commercial, financial, and cultural center of Southern

      California. With an estimated 3,820,914 residents within the

      city limits as of 2023,[8] it is the most populous city in the

      U.S. state of California and the second-most populous in the

      United States, behind only New York City. Los Angeles has an

      ethnically and culturally diverse population, and is the

      principal city of a metropolitan area of 12.9 million people

      (2024). Greater Los Angeles, a combined statistical area that

      includes the Los Angeles and Riverside–San Bernardino

      metropolitan areas, is a sprawling metropolis of over 18.5

      million residents.

      The majority of the city proper lies in a basin in Southern

      California adjacent to the Pacific Ocean in the west and

      extending partly through the Santa Monica Mountains and

      north into the San Fernando Valley, with the city bordering

      the San Gabriel Valley to its east. It covers about 469 square

      miles (1,210  km2),[6] and is the county seat and most

      populated city of Los Angeles County, which is the most

      populous county in the United States with an estimated 9.86

      million residents as of 2022.[17] It is the third-most visited

      city in the U.S. with over 2.7 million visitors as of 2023.[18]

      The area that became Los Angeles was originally inhabited by

      the indigenous Tongva people and later claimed by Juan

      Rodríguez Cabrillo for Spain in 1542. The city was founded

      on September 4, 1781, under Spanish governor Felipe de

      Neve, on the village of Yaanga.[19] It became a part of the

      First Mexican Empire in 1821 following the Mexican War of

      Independence. In 1848, at the end of the Mexican–American'
