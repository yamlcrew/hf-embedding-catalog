widgetData:
- source_sentence: How much is the company's obligations for non-cancellable operating leases for minimum rent payments throughout
    the future fiscal years as of January 28, 2024?
  sentences:
  - While we do not expect to repatriate cash to the U.S. to satisfy domestic liquidity needs, if these amounts were distributed
    to the U.S., in the form of dividends or otherwise, we may be subject to additional foreign withholding taxes and U.S.
    state income taxes, which could be material.
  - Operating leases (minimum rent) | $ | 1,645,318 |
  - the top three exposures being to issuers and counterparties domiciled in France at $5.1 billion, the United Kingdom at
    $4.8 billion, and Canada at $1.7 billion.
- source_sentence: What does the Selected Drug list published by CMS include?
  sentences:
  - Trodelvy product sales were $680 million in 2022 and increased by 56% to $1.1 billion in 2023.
  - Medicaid Services (“CMS”) published the first “Selected Drug” list, which includes XARELTO and STELARA as well as IMBRUVICA.
  - Cost of revenues decreased by 9%, or $123.9 million, in the year ended December 31, 2023, as compared to the same period
    in 2022.
- source_sentence: What was the dividend per share paid in 2023 and how did it change from the previous year?
  sentences:
  - Dividends of $4.52 per share and $3.92 per share were paid in 2023 and 2022, respectively.
  - We design, develop, manufacture, sell and lease high-performance fully electric vehicles and energy generation and storage
    systems, and offer services related to our products.
  - As of December 31, 2023, AMC operated 217 IMAX screens and 169 Dolby Cinema screens, according to the large screen format
    detailing from the data provided.
- source_sentence: What generation technology does the 40 Series graphics cards feature?
  sentences:
  - We believe that a diverse, equitable, and inclusive workplace is a strategic business imperative and we take a comprehensive
    view of diversity, equity, and inclusion. We conduct annual pay equity analyses and support many employee-led inclusion
    networks.
  - HP records revenue from the sale of equipment under sales-type leases as revenue at the commencement of the lease. This
    method is applied unless certain conditions such as customer acceptance remain uncertain or significant obligations to
    the customer remain unfulfilled.
  - The 40 Series features our third generation RTX technology, third generation NVIDIA DLSS, and fourth generation Tensor
    Cores to deliver up to 4X the performance of the previous generation.
- source_sentence: What typical reimbursement methods are used in the company's contracts with hospitals for inpatient and
    outpatient services?
  sentences:
  - We typically contract with hospitals on either (1) a per diem rate, which is an all-inclusive rate per day, (2) a case
    rate for diagnosis-related groups (DRG), which is an all-inclusive rate per admission, or (3) a discounted charge for
    inpatient hospital services. Outpatient hospital services generally are contracted at a flat rate by type of service,
    ambulatory payment classifications, or APCs, or at a discounted charge.
  - In IBM’s 2023 Annual Report to Stockholders, the Financial Statements and Supplementary Data are detailed on pages 44
    through 121.
  - Certain joint venture agreements in China allow for the contractual right to report vehicle sales of non-GM trademarked
    vehicles by those joint ventures, which are included in the total vehicle sales General Motors reports for China.
