- source_sentence: Spanien. De Kgl. Frivillige, som havde gjort Opstand i Provindsen Toledo, ere blevne adsplittede og Hovedmændene
    tagne til Fange. En Bataillon af det 100de Regiment, som var dra liget mod Rebellerne, er vendt tilbage med mange Fanger.
    Omtrent 400 Mand af Oprørerne have trukket sig tilbagetil Andalusien, men forfølges af 2 Regimenter Cavalleri og llet
    Ditto Jnfanteri. De fangne Anføreres Papirer have skaffet Regjeringen adskillige vigtige Oplysninger. Jfølge disse blev
    der Natteumellem den 11te og 12te taget de eftertrykkeligste Forholdsregler, for at forebygge alle videre Udbrud af de
    Misfornøiedes Rænker. Talrige Patrouiller gjennemstrøifede Hovedstaden i alle Retninger, medens stærke Piquets af Linietropper,
    vare opstillede paa de anseeligste Pladse. De, som ikke kjendte Anledningen til disse alvorlige Foranstaltninger, bleve
    baade længstede og forundrede derover, da man ikke mærkede Spor af Uroligheder, men det varede ikke længe, før man kom
    efter Aarsagen. Det gjaldt nemlig om at forsikkre sig adskillige vigtige Personer, iblandt hvilke nævnes Hr. Otal, Medlem
    af Raadet for Castilien, Generalen Grev Negri, en af Don Carloss Hofstat, Militairintendanten Marcos del Ponte og General
    Manso. Grev Negri var flygtet ind i DonCarloss egne Værelser. Da Politiets Generalintendant Hr. San Martin erfarede dette,
    begav han sig til Kongen for har melde ham dette Tilfælde, men H. M. befalede ham at Parrestere Greven, hvor han fandt
    ham, om det end var i det Kongl. Capel. Hr. San Martin begav sig derpaa hertil Jnfantens Palai, hvor han ogsaa fandt Grev
    Negri og arresterede ham uagtet adskillige Jndvendinger fra Don Car loss Side. Ogsaa nogle Munke ere i denne Andledning
    fængslede, hvilket opvakte megen Glæde, fordi man formodede, at disse Personer hidtil havde havt en Slags stiltiende Tilladelse
    til ustraffet at udruge eller deeltage i hvilkesomhelst Rænker. Ligeledes ere paa Grund af disse Uroligheder nogle i Krigsministeriet
    ansatte Embedsmænd deels afsatte, deels forflyttede. Uagtet det saaledes hidtil er lykkedes Regjeringen af haandthæve
    sin Autoritet, høres der dog idelige Beretninger om nye Bevægelser af Carlisterne, f. Ex. i Leon, Valladolid, og de baskiske
    Provindser. Skjønt disse ikke synes at være af Betydenhed og maaskee heller ikke blive det, saalænge, Kongen lever, er
    det dog, hvis han skulde overleves af Jnfanten, at befrygte, at en Borgerkrig vil udbryde i Spanien, mellem den Sidstes
    og den unge Prindsesses eller Dronningens Tilhængere og det saa meget mere, som Geistligheden, hvis politiske Jndflydelse
    i dette Land uden Tvivl endnu er større end den burde være, synes at være paa Jnfantens Side. Ogsaa i Anledning af Urolighederne
    i Valladolid ere 4 Munke arresterede.
