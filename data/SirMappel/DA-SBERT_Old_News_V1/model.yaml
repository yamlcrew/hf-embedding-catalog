    Grev Negri, en af Hofstat, Militairintendanten Marcos del og Manso. Negri i egne dette, for Tilfælde, men H. M. fandt
    det end var i Capel. Martin begav sig derpaa Jnfantens fandt Negri og arresterede ham Jndvendinger Car Ogsaa ere i hvilket
    megen fordi formodede, Personer havde stiltiende Tilladelse til ustraffet at eller Ligeledes Grund af nogle i ansatte
    forflyttede. Uagtet hidtil er Regjeringen haandthæve dog Beretninger om Ex. i de baskiske ikke være af heller blive Kongen
