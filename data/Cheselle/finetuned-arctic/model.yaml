- source_sentence: What are the Principles of Artificial Intelligence Ethics developed by the US Intelligence Community intended
    to guide?
  sentences:
  - "Evaluation data; Ethical considerations; Legal and regulatory requirements. \nInformation Integrity; Harmful Bias \n\
    and Homogenization \nAI Actor Tasks: AI Deployment, AI Impact Assessment, Domain Experts, End-Users, Operation and Monitoring,\
    \ TEVV \n \nMEASURE 2.10: Privacy risk of the AI system – as identiﬁed in the MAP function – is examined and documented.\
    \ \nAction ID \nSuggested Action \nGAI Risks \nMS-2.10-001 \nConduct AI red-teaming to assess issues such as: Outputting\
    \ of training data \nsamples, and subsequent reverse engineering, model extraction, and \nmembership inference risks;\
    \ Revealing biometric, conﬁdential, copyrighted, \nlicensed, patented, personal, proprietary, sensitive, or trade-marked\
    \ information; \nTracking or revealing location information of users or members of training \ndatasets. \nHuman-AI Conﬁguration;\
    \ \nInformation Integrity; Intellectual \nProperty \nMS-2.10-002 \nEngage directly with end-users and other stakeholders\
    \ to understand their"
  - "8 \nTrustworthy AI Characteristics: Accountable and Transparent, Privacy Enhanced, Safe, Secure and \nResilient \n2.5.\
    \ Environmental Impacts \nTraining, maintaining, and operating (running inference on) GAI systems are resource-intensive\
    \ activities, \nwith potentially large energy and environmental footprints. Energy and carbon emissions vary based on\
    \ \nwhat is being done with the GAI model (i.e., pre-training, ﬁne-tuning, inference), the modality of the \ncontent,\
    \ hardware used, and type of task or application. \nCurrent estimates suggest that training a single transformer LLM can\
    \ emit as much carbon as 300 round-\ntrip ﬂights between San Francisco and New York. In a study comparing energy consumption\
    \ and carbon \nemissions for LLM inference, generative tasks (e.g., text summarization) were found to be more energy-\
    \ \nand carbon-intensive than discriminative or non-generative tasks (e.g., text classiﬁcation)."
  - "security and defense activities.21 Similarly, the U.S. Intelligence Community (IC) has developed the Principles \nof\
    \ Artificial Intelligence Ethics for the Intelligence Community to guide personnel on whether and how to \ndevelop and\
    \ use AI in furtherance of the IC's mission, as well as an AI Ethics Framework to help implement \nthese principles.22\n\
    The National Science Foundation (NSF) funds extensive research to help foster the \ndevelopment of automated systems that\
    \ adhere to and advance their safety, security and \neffectiveness. Multiple NSF programs support research that directly\
    \ addresses many of these principles: \nthe National AI Research Institutes23 support research on all aspects of safe,\
    \ trustworthy, fair, and explainable \nAI algorithms and systems; the Cyber Physical Systems24 program supports research\
    \ on developing safe \nautonomous and cyber physical systems with AI components; the Secure and Trustworthy Cyberspace25"
