- source_sentence: How can information security measures be applied to maintain the integrity and confidentiality of GAI models
    and systems?
  sentences:
  - "using: ﬁeld testing with sub-group populations to determine likelihood of \nexposure to generated content exhibiting\
    \ harmful bias, AI red-teaming with \ncounterfactual and low-context (e.g., “leader,” “bad guys”) prompts. For ML \npipelines\
    \ or business processes with categorical or numeric outcomes that rely \non GAI, apply general fairness metrics (e.g.,\
    \ demographic parity, equalized odds, \nequal opportunity, statistical hypothesis tests), to the pipeline or business\
    \ \noutcome where appropriate; Custom, context-speciﬁc metrics developed in \ncollaboration with domain experts and aﬀected\
    \ communities; Measurements of \nthe prevalence of denigration in generated content in deployment (e.g., sub-\nsampling\
    \ a fraction of traﬃc and manually annotating denigrating content). \nHarmful Bias and Homogenization; \nDangerous, Violent,\
    \ or Hateful \nContent \nMS-2.11-003 \nIdentify the classes of individuals, groups, or environmental ecosystems which"
  - "27 \nMP-4.1-010 \nConduct appropriate diligence on training data use to assess intellectual property, \nand privacy,\
    \ risks, including to examine whether use of proprietary or sensitive \ntraining data is consistent with applicable laws.\
    \  \nIntellectual Property; Data Privacy \nAI Actor Tasks: Governance and Oversight, Operation and Monitoring, Procurement,\
    \ Third-party entities \n \nMAP 5.1: Likelihood and magnitude of each identiﬁed impact (both potentially beneﬁcial and\
