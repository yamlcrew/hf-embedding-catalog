- source_sentence: What are the existing regulatory safety requirements mentioned in the context for medical devices?
  sentences:
  - "47 \nAppendix A. Primary GAI Considerations \nThe following primary considerations were derived as overarching themes\
    \ from the GAI PWG \nconsultation process. These considerations (Governance, Pre-Deployment Testing, Content Provenance,\
    \ \nand Incident Disclosure) are relevant for voluntary use by any organization designing, developing, and \nusing GAI\
    \ and also inform the Actions to Manage GAI risks. Information included about the primary \nconsiderations is not exhaustive,\
    \ but highlights the most relevant topics derived from the GAI PWG.  \nAcknowledgments: These considerations could not\
    \ have been surfaced without the helpful analysis and \ncontributions from the community and NIST staﬀ GAI PWG leads:\
    \ George Awad, Luca Belli, Harold Booth, \nMat Heyman, Yooyoung Lee, Mark Pryzbocki, Reva Schwartz, Martin Stanley, and\
    \ Kyra Yee. \nA.1. Governance \nA.1.1. Overview \nLike any other technology system, governance principles and techniques\
    \ can be used to manage risks"
  - "behavior or outcomes of a GAI model or system, how they could occur, and stress test safeguards”. AI \nred-teaming can\
    \ be performed before or after AI models or systems are made available to the broader \npublic; this section focuses on\
    \ red-teaming in pre-deployment contexts.  \nThe quality of AI red-teaming outputs is related to the background and expertise\
    \ of the AI red team \nitself. Demographically and interdisciplinarily diverse AI red teams can be used to identify ﬂaws\
    \ in the \nvarying contexts where GAI will be used. For best results, AI red teams should demonstrate domain \nexpertise,\
    \ and awareness of socio-cultural aspects within the deployment context. AI red-teaming results \nshould be given additional\
    \ analysis before they are incorporated into organizational governance and \ndecision making, policy and procedural updates,\
    \ and AI risk management eﬀorts. \nVarious types of AI red-teaming may be appropriate, depending on the use case: \n•"
  - "SECTION TITLE\n \n \n \n \n \n \nApplying The Blueprint for an AI Bill of Rights \nRELATIONSHIP TO EXISTING LAW AND POLICY\n\
    There are regulatory safety requirements for medical devices, as well as sector-, population-, or technology-spe­\ncific\
    \ privacy and security protections. Ensuring some of the additional protections proposed in this framework \nwould require\
    \ new laws to be enacted or new policies and practices to be adopted. In some cases, exceptions to \nthe principles described\
    \ in the Blueprint for an AI Bill of Rights may be necessary to comply with existing law, \nconform to the practicalities\
    \ of a specific use case, or balance competing public interests. In particular, law \nenforcement, and other regulatory\
    \ contexts may require government actors to protect civil rights, civil liberties, \nand privacy in a manner consistent\
    \ with, but using alternate mechanisms to, the specific principles discussed in"
