widgetData:
- source_sentence: How can organizations tailor their measurement of GAI risks based on specific characteristics?
  sentences:
  - "3 \nthe abuse, misuse, and unsafe repurposing by humans (adversarial or not), and others result \nfrom interactions between\
    \ a human and an AI system.  \n• \nTime scale: GAI risks may materialize abruptly or across extended periods. Examples\
    \ include \nimmediate (and/or prolonged) emotional harm and potential risks to physical safety due to the \ndistribution\
    \ of harmful deepfake images, or the long-term eﬀect of disinformation on societal \ntrust in public institutions."
  - "12 \nCSAM. Even when trained on “clean” data, increasingly capable GAI models can synthesize or produce \nsynthetic NCII\
    \ and CSAM. Websites, mobile apps, and custom-built models that generate synthetic NCII \nhave moved from niche internet\
    \ forums to mainstream, automated, and scaled online businesses.  \nTrustworthy AI Characteristics: Fair with Harmful\
    \ Bias Managed, Safe, Privacy Enhanced \n2.12. \nValue Chain and Component Integration"
  - "case context. \nOrganizations may choose to tailor how they measure GAI risks based on these characteristics. They may\
    \ \nadditionally wish to allocate risk management resources relative to the severity and likelihood of \nnegative impacts,\
    \ including where and how these risks manifest, and their direct and material impacts \nharms in the context of GAI use.\
    \ Mitigations for model or system level risks may diﬀer from mitigations \nfor use-case or ecosystem level risks."
- source_sentence: What methods are suggested for measuring the reliability of content authentication techniques in the context
    of content provenance?
  sentences:
  - "updates. \nInformation Integrity; Data Privacy \nMG-3.2-003 \nDocument sources and types of training data and their origins,\
    \ potential biases \npresent in the data related to the GAI application and its content provenance, \narchitecture, training\
    \ process of the pre-trained model including information on \nhyperparameters, training duration, and any ﬁne-tuning or\
    \ retrieval-augmented \ngeneration processes applied. \nInformation Integrity; Harmful Bias \nand Homogenization; Intellectual\
    \ \nProperty"
  - "Security \nMS-2.7-005 \nMeasure reliability of content authentication methods, such as watermarking, \ncryptographic\
    \ signatures, digital ﬁngerprints, as well as access controls, \nconformity assessment, and model integrity veriﬁcation,\
    \ which can help support \nthe eﬀective implementation of content provenance techniques. Evaluate the \nrate of false\
    \ positives and false negatives in content provenance, as well as true \npositives and true negatives for veriﬁcation.\
    \ \nInformation Integrity \nMS-2.7-006"
  - "GV-1.6-003 \nIn addition to general model, governance, and risk information, consider the \nfollowing items in GAI system\
    \ inventory entries: Data provenance information \n(e.g., source, signatures, versioning, watermarks); Known issues reported\
    \ from \ninternal bug tracking or external information sharing resources (e.g., AI incident \ndatabase, AVID, CVE, NVD,\
    \ or OECD AI incident monitor); Human oversight roles \nand responsibilities; Special rights and considerations for intellectual\
    \ property,"
- source_sentence: What are the suggested actions an organization can take to manage GAI risks?
  sentences:
  - "Information Integrity; Dangerous, \nViolent, or Hateful Content; CBRN \nInformation or Capabilities \nGV-1.3-007 Devise\
    \ a plan to halt development or deployment of a GAI system that poses \nunacceptable negative risk. \nCBRN Information\
    \ and Capability; \nInformation Security; Information \nIntegrity \nAI Actor Tasks: Governance and Oversight \n \nGOVERN\
    \ 1.4: The risk management process and its outcomes are established through transparent policies, procedures, and other"
  - "match the statistical properties of real-world data without disclosing personally \nidentiﬁable information or contributing\
    \ to homogenization. \nData Privacy; Intellectual Property; \nInformation Integrity; \nConfabulation; Harmful Bias and\
    \ \nHomogenization \nAI Actor Tasks: AI Deployment, AI Impact Assessment, Governance and Oversight, Operation and Monitoring\
    \ \n \nMANAGE 2.3: Procedures are followed to respond to and recover from a previously unknown risk when it is identiﬁed.\
    \ \nAction ID"
  - "• \nSuggested Action: Steps an organization or AI actor can take to manage GAI risks.  \n• \nGAI Risks: Tags linking\
    \ suggested actions with relevant GAI risks.  \n• \nAI Actor Tasks: Pertinent AI Actor Tasks for each subcategory. Not\
    \ every AI Actor Task listed will \napply to every suggested action in the subcategory (i.e., some apply to AI development\
    \ and \nothers apply to AI deployment).  \nThe tables below begin with the AI RMF subcategory, shaded in blue, followed\
    \ by suggested actions."
- source_sentence: How can harmful bias and homogenization be addressed in the context of human-AI configuration?
  sentences:
  - "on GAI, apply general fairness metrics (e.g., demographic parity, equalized odds, \nequal opportunity, statistical hypothesis\
    \ tests), to the pipeline or business \noutcome where appropriate; Custom, context-speciﬁc metrics developed in \ncollaboration\
    \ with domain experts and aﬀected communities; Measurements of \nthe prevalence of denigration in generated content in\
    \ deployment (e.g., sub-\nsampling a fraction of traﬃc and manually annotating denigrating content). \nHarmful Bias and\
    \ Homogenization;"
  - "MP-5.1-001 Apply TEVV practices for content provenance (e.g., probing a system's synthetic \ndata generation capabilities\
    \ for potential misuse or vulnerabilities. \nInformation Integrity; Information \nSecurity \nMP-5.1-002 \nIdentify potential\
    \ content provenance harms of GAI, such as misinformation or \ndisinformation, deepfakes, including NCII, or tampered\
    \ content. Enumerate and \nrank risks based on their likelihood and potential impact, and determine how well"
  - "MS-1.3-002 \nEngage in internal and external evaluations, GAI red-teaming, impact \nassessments, or other structured\
    \ human feedback exercises in consultation \nwith representative AI Actors with expertise and familiarity in the context\
    \ of \nuse, and/or who are representative of the populations associated with the \ncontext of use. \nHuman-AI Conﬁguration;\
    \ Harmful \nBias and Homogenization; CBRN \nInformation or Capabilities \nMS-1.3-003"
- source_sentence: How can structured human feedback exercises, such as GAI red-teaming, contribute to GAI risk measurement
    and management?
  sentences:
  - "rank risks based on their likelihood and potential impact, and determine how well \nprovenance solutions address speciﬁc\
    \ risks and/or harms. \nInformation Integrity; Dangerous, \nViolent, or Hateful Content; \nObscene, Degrading, and/or\
    \ \nAbusive Content \nMP-5.1-003 \nConsider disclosing use of GAI to end users in relevant contexts, while considering\
    \ \nthe objective of disclosure, the context of use, the likelihood and magnitude of the"
  - "15 \nGV-1.3-004 Obtain input from stakeholder communities to identify unacceptable use, in \naccordance with activities\
    \ in the AI RMF Map function. \nCBRN Information or Capabilities; \nObscene, Degrading, and/or \nAbusive Content; Harmful\
    \ Bias \nand Homogenization; Dangerous, \nViolent, or Hateful Content \nGV-1.3-005 \nMaintain an updated hierarchy of\
    \ identiﬁed and expected GAI risks connected to \ncontexts of GAI model advancement and use, potentially including specialized\
    \ risk"
  - "AI-generated content, for example by employing techniques like chaos \nengineering and seeking stakeholder feedback.\
    \ \nInformation Integrity \nMS-1.1-008 \nDeﬁne use cases, contexts of use, capabilities, and negative impacts where \n\
    structured human feedback exercises, e.g., GAI red-teaming, would be most \nbeneﬁcial for GAI risk measurement and management\
    \ based on the context of \nuse. \nHarmful Bias and \nHomogenization; CBRN \nInformation or Capabilities \nMS-1.1-009"
