  - source_sentence: 'Instruct: Identify solution for the email

      Query: Hi IT team,


      We''re in the Denver office and are currently configured with a static public IP: 4.8.253.30, subnet 255.255.255.252,
      gateway 4.8.253.29. DNS servers are 8.8.8.8 and 1.1.1.1. We’re experiencing intermittent connectivity to corporate resources
      and VPN. Could you please verify that this static IP assignment is correctly provisioned on the edge device, review
      the firewall/NAT rules, and confirm there are no ISP-side changes affecting this circuit? If you need us to run any
      tests from the site, please advise. Also, please confirm who the Authorized Contacts are for this site and whether any
      changes are required in the contract with Lumen.


      Thanks'
    sentences:
    - 'If the Mac SSO Extension is failing to renew the token for a user, an error message similar to the one below will appear
      with the error message "Something went wrong. \[4s7ch\]".


      Follow the steps below to resolve this issue.


      [![](https://sitesandservices.atlassian.net/wiki/download/attachments/4792746087/Screenshot%202025-01-14%20at%202.26.17%E2%80%AFPM.png?api=v2){.confluence-embedded-image
      .image-center width="524"}]{.confluence-embedded-file-wrapper .image-center-wrapper .confluence-embedded-manual-size}


      1.  Login to Entra/AD and navigate to the impacted user.


      2.  Make note of their object ID.


      [![](https://sitesandservices.atlassian.net/wiki/download/attachments/4792746087/Screenshot%202025-01-22%20at%204.40.58%E2%80%AFPM.png?api=v2){.confluence-embedded-image
      .image-center width="465"}]{.confluence-embedded-file-wrapper .image-center-wrapper .confluence-embedded-manual-size}


      3.  Open Keychain Access on the device with the error.


      4.  In the Login keychain, search for primary and navigate to an item called "primaryrefreshtoken-..."


      5.  Search for the primaryrefreshtoken that has the account that matches the object ID you noted from Entra.


      [![](https://sitesandservices.atlassian.net/wiki/download/attachments/4792746087/Screenshot%202025-01-22%20at%204.45.41%E2%80%AFPM.png?api=v2){.confluence-embedded-image
      .image-center width="760"}]{.confluence-embedded-file-wrapper .image-center-wrapper .confluence-embedded-manual-size}


      6.  Delete the primaryrefreshtoken that matches


      7.  Close and reopen the application the user was attempting to sign into and you should be prompted to authenticate
      as expected.


      ### If you continue to experience issues with the SSO Extension giving an error after removing the primaryrefreshtoken,
      follow the steps below: {#MacSSOExtensionFailingtoRenewToken(Somethingwentwrong)-IfyoucontinuetoexperienceissueswiththeSSOExtensiongivinganerrorafterremovingtheprimaryrefreshtoken,followthestepsbelow:}


      1.  Open Keychain Access \> click Keychain Access in the menu bar \> click Settings \> click Reset Default Keychains.


      1.  This is completely blow away all sign in tokens for all applications on the Mac. It is important to communicate
      this to the user first.


      2.  Enter the login password for the Mac to finish creating a new keychain


      3.  Reboot the Mac


      4.  Follow the steps in this article to setup passkey again on the Mac [https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4690968609/Mac+only+Local+password+reset#Resetting-Mac-Passkey-(P-SSO)](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4690968609/Mac+only+Local+password+reset#Resetting-Mac-Passkey-(P-SSO)){card-appearance="inline"
      rel="nofollow"}


      1.  Once passkey is setup again, return to this article


      5.  Attempt to sign into Teams, Outlook, or Office suite again. SSO Extension should prompt for sign in again.


      6.  If successful, sign into all other Microsoft apps including Teams, Outlook, Office suite, and Edge browser'
    - 'Check if Installomator supports the App you want to install by checking this link:


      [Installomator/Labels.txt](https://github.com/Installomator/Installomator/blob/main/Labels.txt){.external-link rel="nofollow"}


      The label is also used when configuring the App Update and App Install policies, so it is helpful to keep this link
      open while creating the policies.


      Prior to starting this process, it is helpful to have the application downloaded already so that the icon can be retrieved
      from the application to upload to Jamf Pro.


      Documentation for that process:


      [Exporting app icon for use in Jamf](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4294934712/Exporting+app+icon+for+use+in+Jamf){linked-resource-id="4294934712"
      linked-resource-version="1" linked-resource-type="page"}


      There is a Separate Process for Creating Apps that have Native Jamf Patch Management.


      ::: {#expander-5443223 .expand-container}

      ::: {#expander-control-5443223 .expand-control}

      [![](https://sitesandservices.atlassian.net/wiki/images/icons/grey_arrow_down.png){.expand-control-image style="vertical-align:middle;"}]{.expand-control-icon}[Has
      a Jamf Patch Management ]{.expand-control-text}

      :::


      ::: {#expander-content-5443223 .expand-content}

      If the App has a Jamf Patchment Software Title, we can use this to known when Apps require updating. We can then use
      a SmartGroup looking at out of date software to run the Update


      ## **Add the App to Patch Management** {#Jamf/Installomator:ConfiguringApplications-AddtheApptoPatchManagement}


      1.  Navigate to Computers \> Patch Management \> Search for Software Title in search bar


      2.  Click + button on desired software


      ## **Smart Groups** {#Jamf/Installomator:ConfiguringApplications-SmartGroups}


      We need 3 Smart Groups:


      1.  Display Name: %Name%\_Installed


      1.  Click Edit, then click Add


      2.  Criteria is \"Application Title\", Operator is \"is\", Value is \"%Name%\"


      3.  After entering the name of the application, click the \"\...\" button next to the field


      4.  Click Choose


      5.  Click Save


      2.  Display Name: %Name%\_Out of Date


      1.  Click Edit, click Add, then click Show Advanced Criteria


      2.  Scroll to Patch Reporting Software Title, click Choose


      3.  Criteria is \"Patch Reporting: %Name%\", Operator is \"is not\", Value is \"Latest Version\"


      4.  Click Save


      3.  Display Name: %Name%\_Member_Out of Date


      1.  Click Edit, then click Add


      2.  Criteria is \"Computer Group\", Operator is \"member of\", Value is \"%Name%\_Out of Date\"


      3.  Click Save


      ## **Policies** {#Jamf/Installomator:ConfiguringApplications-Policies}


      Three policies are needed.


      -   **%Name%\_Install_Installomator** for the initial install


      -   **%Name%\_Update_Installomator_Self_Service** for updating manually through Self Service.


      -   **%Name%\_Update_Installomator** for updating automatically.


      ### **Configure App Install - %Name%\_Install_Installomator** {#Jamf/Installomator:ConfiguringApplications-ConfigureAppInstall-%Name%_Install_Installomator}


      1.  Navigate to Computers \> Policies


      2.  Click New


      3.  Click Options header and complete the following steps:


      1.  Click General


      1.  Set Display Name to %Name%\_Install_Installomator


      2.  Set Execution Frequency: Ongoing


      2.  Click Scripts


      1.  Click Configure


      2.  Scroll to Installomator, [Please See](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4594892814/Installomator+Scripts){linked-resource-id="4594892814"
      linked-resource-version="12" linked-resource-type="page"} then click Add


      3.  Set Application Name as it is listed in [https://github.com/Installomator/Installomator/blob/main/Labels.txt](https://github.com/Installomator/Installomator/blob/main/Labels.txt){.external-link
      card-appearance="inline" rel="nofollow"}


      4.  In Parameter 5, type \"INSTALL=force flag\".


      5.  Set the Priority to Before


      3.  Click Maintenance


      1.  Click Configure


      2.  Verify that \"Update Inventory\" is checked


      4.  Click Scope tab and complete the following steps:


      1.  Click Targets


      1.  Set Target Computers to All Computers


      2.  Set Target Users to All Users


      2.  Click Exclusions


      1.  Add group %Name%\_Member_of_Out_of_Date


      5.  Click Self Service tab and complete the following steps:


      1.  Check the box for "Make the Policy Available in Self Service"


      2.  Set Self Service Display Name to %Name%


      3.  Set Description to %Name%


      4.  Upload Icon (if possible)


      1.  Click Upload Icon


      2.  Click Choose File


      3.  Navigate to file path where %Name% Icon is saved from [Exporting app icon for use in Jamf](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4294934712/Exporting+app+icon+for+use+in+Jamf){linked-resource-id="4294934712"
      linked-resource-version="1" linked-resource-type="page"}


      4.  Click Upload


      5.  Click Save


      ### **Configure App Update Through Self Service - %Name%\_Update_Installomator_Self_Service** {#Jamf/Installomator:ConfiguringApplications-ConfigureAppUpdateThroughSelfService-%Name%_Update_Installomator_Self_Service}


      1.  Navigate to Computers \> Policies


      2.  Click New


      3.  In the Options tab complete the following steps:


      1.  Click General


      1.  Set Display Name to: %Name%\_Update_Installomator_Self_Service


      2.  Ensure Execution Frequency is set to Ongoing


      3.  Ensure the Category is set to "Updates"


      2.  Click Scripts


      1.  Click Configure


      2.  Scroll to Installomator, [Please See](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4594892814/Installomator+Scripts){linked-resource-id="4594892814"
      linked-resource-version="12" linked-resource-type="page"} then click Add


      3.  Set Application Name as it is listed in [https://github.com/Installomator/Installomator/blob/main/Labels.txt](https://github.com/Installomator/Installomator/blob/main/Labels.txt){.external-link
      card-appearance="inline" rel="nofollow"}


      4.  Set the Priority to Before.


      3.  Click Maintenance


      1.  Click Configure


      2.  Verify that \"Update Inventory\" is checked


      4.  In the Scope tab complete the following steps:


      1.  Click Targets


      2.  Change Target Computers from All Computers to Specific Computers


      3.  Change Target Users from All Users to Specific Users


      4.  Click Add


      5.  Click Computer Groups


      6.  Navigate to %Name%\_Member_Out of Date, click Add


      5.  In the Self Service tab complete the following steps:


      1.  Check the box for "Make the Policy Available in Self Service"


      2.  Set Self Service Display Name to %Name%


      3.  Set Description to %Name%


      4.  Set Button Name Before Initiation to \"Update\"


      5.  Set Button Name After Initiation to \"Update\"


      6.  Check the box for Display Notifications for the Policy


      1.  Set location to Self Service and Notification Center


      2.  Set subject to %Name% Update Available


      3.  Set message to There is an update for %Name%, please update to stay on the latest version.


      7.  Click Select Existing Icon


      8.  Click Icon


      9.  Click Make Selection


      10. Click Save


      11. If prompted, choose Notify All


      12. Click Save


      ### **Configure App to Update Automatically While Closed - %Name%\_Update_Installomator** {#Jamf/Installomator:ConfiguringApplications-ConfigureApptoUpdateAutomaticallyWhileClosed-%Name%_Update_Installomator}


      1.  Navigate to Computers \> Policies


      2.  Click New


      3.  In the Options tab complete the following steps:


      1.  Click General


      1.  Set Display Name to: %Name%\_Update_Installomator


      2.  Set trigger to Recurring Check-in


      3.  Set execution frequency to "Once every day"


      2.  Click Scripts


      1.  Click Configure


      2.  Scroll to Installomator, [Please See](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4594892814/Installomator+Scripts){linked-resource-id="4594892814"
      linked-resource-version="12" linked-resource-type="page"} then click Add


      3.  Set Priority to Before


      4.  Set Application Name as it is listed in [https://github.com/Installomator/Installomator/blob/main/Labels.txt](https://github.com/Installomator/Installomator/blob/main/Labels.txt){.external-link
      card-appearance="inline" rel="nofollow"}


      5.  Set Parameter 5 to \"BLOCKING_PROCESS_ACTION=silent_fail\"


      6.  Set Parameter 6 to "NOTIFY=silent"


      3.  Click Maintenance


      1.  Click Configure


      2.  Ensure Update Inventory is checked


      4.  In the Scope tab complete the following steps:


      1.  Click the Targets tab and set the following settings:


      1.  Change Target Computers from All Computers to Specific Computers


      2.  Change Target Users from All Users to Specific Users


      3.  Click Add


      4.  Click Computer Groups


      5.  Navigate to %Name%\_Member_Out of Date, click Add


      5.  In the Self Service tab complete the following steps:


      1.  Ensure \"Make the policy available in Self Service\" is unchecked


      2.  Click Save

      :::

      :::


      ::: {#expander-320509342 .expand-container}

      ::: {#expander-control-320509342 .expand-control}

      [![](https://sitesandservices.atlassian.net/wiki/images/icons/grey_arrow_down.png){.expand-control-image style="vertical-align:middle;"}]{.expand-control-icon}[Does
      not have Jamf Patch Management]{.expand-control-text}

