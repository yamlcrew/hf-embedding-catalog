    not have Jamf Patch Management]{.expand-control-text}

    :::


    ::: {#expander-content-320509342 .expand-content}

    If the App does not have a Parchment Management Software Title in Jamf then we must ensure that the Installomator label
    makes use of the `appNewVersion` attribute. You will need to check the Fragment from the installomator github page [https://github.com/Installomator/Installomator/tree/main/fragments/labels](https://github.com/Installomator/Installomator/tree/main/fragments/labels){.external-link
    card-appearance="inline" rel="nofollow"}


    This is because without one, Installomator will need to download the App everytime to check the version. If theres an
    App that doesnt use the appNewVersion, we will either need to create a custom installomator with one, use title editor
    or use manual packaging.


