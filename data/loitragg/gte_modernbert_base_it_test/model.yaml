  - 'Device compliance is a set of rules that devices must meet to be considered complaint. When not compliant they are restricted
    in what they can access and may be prevent from signing in.


    ::: plugin_pagetree

    :::


    ## Excluding from compliance policy {#DeviceCompliance-Excludingfromcompliancepolicy}


    If you need to exclude someone temporarily because compliance isn''t working, or because they are a senior person who
    can''t immediately update their computer and it''s an emergency, add the user to the group: **Users_Device_Compliance_Excluded**'
- source_sentence: 'Instruct: Identify solution for the email

    Query: What is the known issue with Self Updater breaking PatchMyPC installs for VSCode, and what are the recommended
    workarounds?'
  sentences:
  - 'The official policy is here. Update if any timelines change: [Data Deletion Schedules (sharepoint.com)](https://glondon.sharepoint.com/sites/ITSupport/SitePages/Data-Deletion-Schedules.aspx){.external-link
    rel="nofollow"}


    This doc explains what controls each piece of retention. Note that all items in SharePoint, OneDrive and Exchange are
    backed up for two years for disaster recovery, so anything should be recoverable for two years from the time it was made
    inactive. (See notes at bottom of this doc)


    Most of the retention policies are set in the Purview (Compliance) portal under Data Lifecycle Management \> Retention
    Policies.


    Here is an excellent flowchart on how these policies work: [Flowchart to determine when an item is retained or deleted
    \| Microsoft Learn](https://learn.microsoft.com/en-us/purview/retention-flowchart){.external-link rel="nofollow"}


    [![image-20240816-173652.png](https://sitesandservices.atlassian.net/wiki/download/attachments/4468080680/image-20240816-173652.png?api=v2){.confluence-embedded-image
    .image-center width="760"}]{.confluence-embedded-file-wrapper .image-center-wrapper .confluence-embedded-manual-size}


    ## OneDrive {#Employeedataretention-OneDrive}


    Once the manager approves account deletion, it''s gone. (After the brief recovery period)


    See "Shared mailboxes" below for the task on finding people where managers haven''t responded to deletion requests.


    ## Exchange {#Employeedataretention-Exchange}


    -   **Active mailboxes: "Active Mailboxes Default" policy**


    -   Keeps content for one year and then does nothing.


    -   This means everything will be kept for at least one year, no matter what.


    -   **Active mailboxes, Deleted Items folder**


    -   The default Messaging Records Management (MRM) policy is under Purview (Compliance) portal under Data Lifecycle Management
    \> Exchange (legacy)


    -   [Default Retention Policy in Exchange Online \| Microsoft Learn](https://learn.microsoft.com/en-us/exchange/security-and-compliance/messaging-records-management/default-retention-policy){.external-link
    rel="nofollow"}


    -   The "Deleted Items" tag is included in this default policy. It applies to Deleted Items, and it deletes (which is
    a second deletion, i.e. permanent deletion) after one year.


    -   This is necessary because people don''t purge their deleted items, and the folder continues to grow forever.


    -   **Shared mailboxes**


    -   Shared mailboxes are just active mailboxes.


    -   We have a task every year to pull a list of all mailboxes that have been shared for an excessive amount of time so
    we can confirm that they can be removed.


    -   This also catches issues with OneDrive and user accounts being kept too long.


    -   **Inactive Mailboxes: "Inactive Mailboxes" policy**


    -   Adaptive scope filters this to only inactive mailboxes.


    -   Mailboxes are kept for two years and then nothing happens.


    -   We manually exclude mailboxes from the retention policy, and then they can finally delete.


    -   [Learn about retention policies & labels to retain or delete \| Microsoft Learn](https://learn.microsoft.com/en-us/purview/retention?tabs=table-overriden#retention-policies-and-retention-labels){.external-link
    rel="nofollow"}


    -   [Learn about inactive mailboxes \| Microsoft Learn](https://learn.microsoft.com/en-us/purview/inactive-mailboxes-in-office-365#what-are-inactive-mailboxes){.external-link
    rel="nofollow"}


    -   [Inactive Mailbox Deletion Procedure - IT Services - Confluence](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/5265719404/Inactive+Mailbox+Deletion+Procedure){linked-resource-id="5265719404"
    linked-resource-version="2" linked-resource-type="page"}


    ## Notes on Disaster Recovery {#Employeedataretention-NotesonDisasterRecovery}


    **My questions:**


    1.  Is it possible to request deletion of particular backups? In other words, if I sent in a ticket \"please delete all
    backups before (date) for User ABC\" \-- is that doable?


    ```{=html}

    <!-- -->

    ```

    2.  Does the backup always include Purges and Discovery holds? In our test restore a few weeks ago, those folders were
    included.


    The reason I ask item 2 is because it affects the total length of time items are stored. If purges ARE backed up, then
    a purged item would be stored in our system for one year due to our retention policy, and then the BaaS system would keep
    that backup for two more years, effectively keeping all items for an absolute minimum of three years.


    [Folder Exclusions - Veeam Backup for Microsoft 365 Guide](https://helpcenter.veeam.com/docs/vbo365/guide/vbo_excluding_folder.html?ver=70){.external-link
    rel="nofollow"}


    **Per Ark Data Centers (formerly Involta):**


    Your backups are NOT immutable -- it is possible for us to manually go in via powershell and remove certain data. This
    isnt a normal request and I think i\''ve done it maybe one time in the last year, but its something we can do :)


    The only thing im excluding from backup are:\

    Junk\

    Sync Issues\

    In-Place hold items.


    The rest we are backing up.'
