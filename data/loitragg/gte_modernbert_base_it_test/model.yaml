    - '## **Computer Setup** {#CreatingaUSBdrivewithOSDCloud-ComputerSetup}


      > NOTE: Your machine needs to be able to write unencrypted files to a USB drive. If your computer is not already in
      Device_USB_Encryption_Exclusion, add it.


      On the machine that will create the USB drive:


      Install Windows 11 24H2 ADK: [https://go.microsoft.com/fwlink/?linkid=2289980](https://go.microsoft.com/fwlink/?linkid=2289980){.external-link
      rel="nofollow"}


      -   Install locally when prompted - we want to install on this machine


      -   You can accept all the defaults when installing


      Install Windows PE add-on: [https://go.microsoft.com/fwlink/?linkid=2289981](https://go.microsoft.com/fwlink/?linkid=2289981){.external-link
      rel="nofollow"}


      -   There are no settings, so you can click Next to install.


      ## **Configuring a USB drive with OSD Cloud** {#CreatingaUSBdrivewithOSDCloud-ConfiguringaUSBdrivewithOSDCloud}


      1.  Copy this script on a PC:


      [https://glondon.sharepoint.com/:u:/r/sites/Group_IT/Shared%20Documents/General/OSDCloud/OSDCloud%20Automated%20USB%20with%20User%20Prompt.ps1?csf=1&web=1&e=6FRniH](https://glondon.sharepoint.com/:u:/r/sites/Group_IT/Shared%20Documents/General/OSDCloud/OSDCloud%20Automated%20USB%20with%20User%20Prompt.ps1?csf=1&web=1&e=6FRniH){.external-link
      card-appearance="inline" rel="nofollow"}


      ::: {.confluence-information-macro .confluence-information-macro-information}

      []{.aui-icon .aui-icon-small .aui-iconfont-info .confluence-information-macro-icon}


      ::: confluence-information-macro-body

      It''s stored in the team "Gravity -- Group IT" so use your Gravity Global account to access the link

      :::

      :::


      2.  Open PowerShell ISE as an administrator


      3.  Paste the script in PowerShell ISE and run (or you can download the file and run it). This script will remind you
      to have a 32GB flash drive connected to the PC.


      1.  NOTE: The initial popup may appear behind the ISE window. If it seems stuck, there is probably a popup hiding.


      2.  If you use Windows PowerShell instead (as admin), the first popup message will fail. You can ignore the error and
      it will proceed automatically.


      ::: {.confluence-information-macro .confluence-information-macro-information}

      []{.aui-icon .aui-icon-small .aui-iconfont-info .confluence-information-macro-icon}


      ::: confluence-information-macro-body

      It''s probably best to disconnect other USB flash drives to not accidentally format the wrong flash drive

      :::

      :::


      4.  The script will also prompt for a name for the OSDCloud Template. Follow the naming scheme Win\_(version of Windows)\_(Build
      version)\_(Current month and year).


      1.  Example: Win_11_24H2_Feb25.


      5.  In the console of PowerShell ISE, eventually you''ll be asked to confirm which USB Drive you want to format.


      1.  If you only have one USB drive connected, it''s the only USB drive listed. If you have more than one USB drive connected,
      be careful and choose the correct drive.


      ## **Dell BIOS Configuration Files** {#CreatingaUSBdrivewithOSDCloud-DellBIOSConfigurationFiles}


      Add these two files to the root of the OSDCloud drive. (Note there are two partitions on the USB stick - you want OSDCloud)


      -   CCTK Folder: [https://glondon.sharepoint.com/:f:/r/sites/Group_IT/Shared%20Documents/General/OSDCloud/CCTK?csf=1&web=1&e=q5sltN](https://glondon.sharepoint.com/:f:/r/sites/Group_IT/Shared%20Documents/General/OSDCloud/CCTK?csf=1&web=1&e=q5sltN){.external-link
      card-appearance="inline" rel="nofollow"}


      -   BIOSChanges.ini: [https://glondon.sharepoint.com/:u:/r/sites/Group_IT/Shared%20Documents/General/OSDCloud/BIOSChanges.ini?csf=1&web=1&e=P8ufTf](https://glondon.sharepoint.com/:u:/r/sites/Group_IT/Shared%20Documents/General/OSDCloud/BIOSChanges.ini?csf=1&web=1&e=P8ufTf){.external-link
      card-appearance="inline" rel="nofollow"}


      Both the folder and file should be placed in the root of the USB drive.


      ## Dell Command Update and other drivers {#CreatingaUSBdrivewithOSDCloud-DellCommandUpdateandotherdrivers}


      On your OSDCloud USB stick:


      -   There are two partitions - choose the WINPE "drive" in Windows Explorer


      -   Create a folder called "Dell_Drivers" in the root


      -   Download and copy three files there:


      -   Installer for latest Dell Command Update (Windows Universal Application) [https://www.dell.com/support/kbdoc/en-us/000177325/dell-command-update](https://www.dell.com/support/kbdoc/en-us/000177325/dell-command-update){.external-link
      card-appearance="inline" rel="nofollow"}


      -   .NET Desktop Runtime (the version required by Dell Command Update; usually the LTS version): [https://dotnet.microsoft.com/en-us/download/dotnet/8.0](https://dotnet.microsoft.com/en-us/download/dotnet/8.0){.external-link
      card-appearance="inline" rel="nofollow"}


      -   Note that you want the DESKTOP RUNTIME, not the SDK, nor the CLI runtime. Annoying.


      -   Latest Intel NPU driver: [https://www.intel.com/content/www/us/en/download/794734/intel-npu-driver-windows.html](https://www.intel.com/content/www/us/en/download/794734/intel-npu-driver-windows.html){.external-link
      card-appearance="inline" rel="nofollow"}


      -   This is only necessary so long as Dell Command Update still installs a version with bugs. This shouldn''t be necessary
      past 2025, we hope.


      ## Rebuild the computer {#CreatingaUSBdrivewithOSDCloud-Rebuildthecomputer}


      If rebuilding a PC already enrolled in Gravity Global, follow this article:


      [PC Rebuild Procedure](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4294672385/PC+Rebuild+Procedure){linked-resource-id="4294672385"
      linked-resource-version="11" linked-resource-type="page"}


      If needing to rebuild a PC and enroll it in Gravity Global, follow this article:


      [Enrolling a PC in Gravity from other organizations](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4294311952/Enrolling+a+PC+in+Gravity+from+other+organizations){linked-resource-id="4294311952"
      linked-resource-version="10" linked-resource-type="page"}'
