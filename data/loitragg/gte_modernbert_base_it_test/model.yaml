  - source_sentence: 'Instruct: Identify solution for the email

      Query: Hi IT team,


      I forgot my Mac login password and can''t sign in to my account. I understand from the password reset policy that resets
      are not performed and identity must be verified, with escalation to IT leadership. I don''t currently have a Passkey
      device. Could you please advise on the next steps or escalate my case to leadership? I''m able to provide my employee
      ID and HR-approved ID verification information if needed; I can also come to the office to verify identity in person
      if required. Any guidance on identity verification options would be appreciated.


      Thanks,

      Alex'
    sentences:
    - 'If a person reaches out to Help Desk to reset their password or passkey, follow the actions below. The goal is to confirm
      identity before proceeding. It is possible an attacker could compromise a user\''s personal email in order to reach
      out to us to have us reset the password or add an MFA device for them. We must verify user identity before making any
      changes.


      ## Entra Password Reset {#MFA,PasskeyandPasswordResetprocedures-EntraPasswordReset}


      As of 2025, there will no more password resets as standard practice. If someone needs a password reset, escalate to
      IT leadership. DO NOT RESET PASSWORDS.


      ## Mac only: Local password reset {#MFA,PasskeyandPasswordResetprocedures-Maconly:Localpasswordreset}


      Mac Local password changes will require a Passkey(Phone or FIDO) if this isn''t available please follow MFA: Does not
      have Computer or phone


      [Unable to Login to Mac or Forgotten Mac Password](https://sitesandservices.atlassian.net/wiki/spaces/IT/pages/4690968609/Unable+to+Login+to+Mac+or+Forgotten+Mac+Password){linked-resource-id="4690968609"
      linked-resource-version="11" linked-resource-type="page"}


      ## Does not have computer or phone {#MFA,PasskeyandPasswordResetprocedures-Doesnothavecomputerorphone}


      DO NOT MAKE CHANGES. Regardless of how urgent the situation seems, **escalate to IT leadership**.


      If the person claims to be Mark Lethbridge and it''s an emergency, great... call IT leadership mobile phones over and
      over until someone answers.


      **[Attackers always make it "an emergency" ]{colorid="brky8ktto6"}**so you don''t have time to follow procedure. Don''t
      fall for it.


      IT leadership must verify identity with one of the options below because it is too easy to AI-generate voice and video.
      We simply cannot trust that any inbound digital communication is real.


      1.  Verify social security number, national insurance number or another national ID number with HR


      1.  HR confirms they have a national ID number for all employees and contractors.


      2.  Have the person connect directly with HR to provide the information, and HR can confirm with IT that it is correct.


      2.  Meet in person


      1.  Contact HR for help. Usually, an employee lives near another employee.


      2.  If we can contact one known-safe employee and ask them to meet the other employee at an office, a coffee shop, etc.
      and verify, then that is sufficient to issue a TAP.


      3.  Use a notary


      1.  If there is no practical way to have people meet in person, notaries are available virtually everywhere.


      2.  The form is here: [MFA or TAP identity verification form.pdf](https://glondon.sharepoint.com/:b:/r/sites/Group_IT/Shared%20Documents/Data%20Security/MFA%20or%20TAP%20identity%20verification%20form.pdf?csf=1&web=1&e=Yi4Bqz){.external-link
      rel="nofollow"}


      4.  Verify through HR leadership


      1.  While much more risky, there may be situations where an HR team member (Director-level or higher) may request reset
      on behalf of a user. While we must verify the identity of the HR team member making the request, and we should inform
      them of risks, this counts as acceptable verification in an emergency.


      ## Has computer, doesn''t have phone {#MFA,PasskeyandPasswordResetprocedures-Hascomputer,doesn’thavephone}


      If a person is unable to access their passkey device, due to it be being lost, stolen, broken, left at home, bought
      a new phone, etc...


      1.  Have them follow the add/remove procedures themselves from their computer.


      1.  As of 2025, all computers have passkeys built in: use Windows Hello for Business, PIN, fingerprint or face.


      2.  They should be able to go to [start.gravityglobal.com](http://start.gravityglobal.com){.external-link rel="nofollow"},
      click their photo \> View Account, and go to Security Info to add/remove MFA devices from that computer.


      ## Has phone, doesn''t have computer {#MFA,PasskeyandPasswordResetprocedures-Hasphone,doesn’thavecomputer}


      In the case of a new computer, we should know that they have a new computer (obviously). Follow new computer setup steps.


      In the case of logging into a personal computer, the user must use cross-device authentication to log in with their
      mobile device''s passkey (or Yubikey, for some people).


      ## Bitlocker Recovery Key: Has phone and computer {#MFA,PasskeyandPasswordResetprocedures-BitlockerRecoveryKey:Hasphoneandcomputer}


      Sometimes, people lock themselves out of their computers by doing something odd like entering a password too many times,
      and Windows wants the recovery key to unlock.


      1.  Try to ensure they have their phone and can sign in to something, like the Gravity Start Page


      1.  Even for users who don''t have passkeys set up on their phone, they should have a Yubikey that works on anything,
      including mobile browser. There are very few exceptions.


      2.  If you can see sign ins in their sign in log, from their phone, to whatever you asked them to sign into, it''s probably
      really them.


      1.  Give them the computer recovery key to unlock the machine.


      2.  Since they can''t actually log into the machine without biometrics/PIN, the ways this could be bad are very few.'
