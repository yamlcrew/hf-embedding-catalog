      Query: How to enable WSL and Virtual Machine Platform on Windows'
    sentences:
    - 'Allows users/developers to run a Linux terminal environment directly on Windows.


      -   Install both "Windows Subsystem for Linux" and "Ubuntu" from Company Portal.


      -   Enable "WSL" and "Virtual Machine Platform" in "Turn Windows Features on or off".


      -   Reboot.'
    - 'The Azure VPN allows IT to connect to our private Azure vnet, which currently only has a couple of servers, and to
      the London office to access Synergist until that system can be turned off.


      **IT:**


      Users have to be authorized in the \"Azure VPN\" enterprise app. Then, they can install Azure VPN desktop program and
      connect using the base profile attached here (the one NOT labeled \"finance\"): [Password: Azure VPN configuration file
      \| TeamPasswordManager (msappproxy.net)](https://passwords-glondon.msappproxy.net/index.php/pwd/view/637){.external-link
      rel="nofollow"}


      **Finance:**


      Users must be authorized for the \"Finance VPN\" enterprise app. The profile is stored in the same location as above,
      but with \"finance\" in the name.


      **Azure VPN desktop program:**


      These apps are available in Self Service(under your user sign-in) and Company Portal.


      -   Windows: [https://learn.microsoft.com/en-us/azure/vpn-gateway/openvpn-azure-ad-client](https://learn.microsoft.com/en-us/azure/vpn-gateway/openvpn-azure-ad-client){.external-link
      card-appearance="inline" rel="nofollow"}


      -   Mac: [https://learn.microsoft.com/en-us/azure/vpn-gateway/openvpn-azure-ad-client-mac](https://learn.microsoft.com/en-us/azure/vpn-gateway/openvpn-azure-ad-client-mac){.external-link
      card-appearance="inline" rel="nofollow"}'
    - 'Remote in to the **Management Computer to access Brivo system:**


      TPM:


      [**Houston Security Card Access**](https://passwords-glondon.msappproxy.net/index.php/pwd/view/1600){.external-link
      rel="nofollow"}


