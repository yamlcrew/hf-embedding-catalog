      \ V7을 달성했다. 현재도 베스트 10의 단골이다.\n\ntvk(TV 카나가와)의 인기 방송 \"사쿠사쿠\"의 캐릭터 \"시라이 빈센트\"를 좋아한다. 같은 방송국의 토크쇼 \"심해어\"에서 \"사쿠사쿠\"\
      팬을 의미하는 \"사쿠사커\"임을 공언하고 있다(2006년 9월 29일 방송에서). 이것이 훗날 \"사쿠사쿠\"에서도 화제가 되어, 나카무라 유우를 필두로 하는 출연자(특히 흑막)가 몹시 기뻐했다 한다.\n\n\
      헬로! 프로젝트 내의 교우관계 \n헬로! 프로젝트 내에서는 야구치 마리와 사이가 좋다. \"웃음을 터트리는 포인트가 같다\"는 이유에서라고 한다. 그 외, 아베와는 같은 모닝구무스메。 오리지널 멤버인 나카자와\
      \ 유코, 이이다 카오리 및 야구치와 같은 2기 멤버의 야스다 케이와는 모닝구무스메。에서 고락을 함께한 \"무엇과도 바꿀 수 없는 멤버\"로 현재도 친교가 두텁다. 나카자와는 2008년 8월 10일에 개최된\
      \ 아베의 생일기념 콘서트에도 축하하기 위해 참가했다.\n\n쯔지 노조미, 카고 아이에게는 동생처럼 대하는 경우가 많다. 이 두 사람의 이야기를 하는 것만으로도 \"이유없이 덥썩! 껴안고 싶어진다.\", \"\
      헬로!에는 어린 애들이라던가도 많지만, 쯔지, 카고만은 특별\"이라고 본인도 언급하고 있다. 분카 방송 \"에어모니。\"에서는, 쯔지 본인이 에어모니。에 출현하지 않았음에도 불구하고 쯔지의 이야기를 곧잘 하곤\
      \ 했다. 쯔지는 아베를 \"나찌미\"라고 부르며 잘 따른다. 쯔지 이외에도, 니이가키 리사, 카메이 에리, 후쿠다 카논 등, 그녀의 영향을 크게 받은 \"여동생 격\"이 많다.\n\nYUKI \n본인 말로는,\
      \ 가수를 지망하게 된 계기는 \"중학생 시절 왕따를 당해 낙심하고 있던 때, 라디오에서 쥬디 앤 마리의 곡 '어린 시절부터'를 들은 것\"이라 한다. 현재도 가수 지망의 계기가 된 YUKI (쥬디 앤 마리의\
