      \ engagées en Indochine. Il ne participera donc pas directement au conflit. \n\nLe , le groupement autonome de la Légion\
      \ étrangère est créé. C'est l'ancêtre du Commandement de la Légion étrangère actuelle.\n\nGuerre d'Algérie \nLors du\
      \ déclenchement des « évènements d'Algérie », le  RE comme l'ensemble de la Légion qui vit en Algérie depuis 1831 va\
      \ participer aux combats qui vont durer jusqu'en 1962; Il y perdra , sous-officiers et légionnaires en mettant hors\
      \ de combat  et en récupérant  individuelles et collectives.\n\n : , mort d'un sous-lieutenant du  de marche dans le\
      \ djebel Orbata. Le , la  du Centre d'instruction  détruit une bande rebelle au nord-ouest de Franchetti. Le , l'État-major\
      \ tactique du  RE aux ordres du chef de bataillon Fournier est engagé dans la région de Sebdou puis sur la piste de\
      \ Djilali. la section d'élèves sous-officiers de l'Adc Kemenceî se heurte aux rebelles et en abat 24, au prix de . Le\
      \ , des rebelles s'infiltrent dans Sidi-Bel-Abbès. repérés, ils se retranchent dans une maison. les légionnaires du\
      \  RE donnent l'assaut au prix de , dont le légionnaire Zimmermann qui sera le dernier légionnaire tué sur le sol d'Algérie.\
      \ \n\n : le , les corps du général Rollet, du chef de bataillon (prince) Aage de Danemark et du légionnaire Zimmermann\
      \ (représentant l'ensemble des légionnaires morts sur cette terre d'Algérie) sont transférés au cimetière de Puyloubier\
      \ (Bouches du Rhône).  : cérémonie de départ au pied du Monument aux Morts (qui sera démonté et rapatrié sur Aubagne).\
      \ Les pavillons noirs rapportés de Tuyen-Quang en 1885 par le capitaine Borelli sont brûlés en application de ses souhaits\
      \ de ne jamais les voir quitter Sidi-Bel-Abbès. , départ de Bel-Abbès.\n\nLe  Etranger va néanmoins conserver des unités\
      \ au Sahara en vertu des accords d'Evian (défense du site nucléaire de Reggane). Les derniers légionnaires de ces compagnies\
      \ sahariennes regagneront Aubagne en 1969 et seront notamment cantonnés à Bou-Sfer (avec le  REP et le  REC qui en partiront\
      \ en 1967).\n\nDepuis 1962 \nLe , les précurseurs arrivent au camp de la Demande à Aubagne, qui va devenir le quartier\
      \ Vienot. Le colonel Vaillant, chef de corps, débarque avec le drapeau le .\n\nLe , la première veillée de Camerone\
      \ en métropole a lieu à Gémenos, petit village situé près d'Aubagne. Le  se déroule l'inauguration du Monument aux Morts\
      \ rapatrié d'Algérie et la célébration du centenaire du combat de Camerone avec défilé sur la Canebière à Marseille.\n\
      \nLe Groupement d'instruction (GILE) s'implante quant à lui à Corte (Haute-Corse) et à Bonifacio (Corse du Sud).\n\n\
      \ : la compagnie motorisée de la Légion étrangère (CMLE) du  RE est mise sur pied à Corte. Elle est déployée au Tchad\
      \ à l'occasion de l'opération Tacaud. Elle déplorera  au combat aux côtés du  REP jusqu'à son désengagement en 1970.\
      \ Elle devient la  compagnie du Groupement opérationnel (GOLE, crée le ).\n\nLe  RE se scinde en deux pour redonner\
      \ naissance au  REI, qui récupère le GILE et le GOLE stationnés en Corse.\n\n : création de la  dont le  RE fera partie.\
      \ Une unité est déployée au Liban dans le cadre de la FMSB de mai à  (Élément de commandement et de soutien immédiat,\
      \ de la valeur d'une compagnie). \n\n à  : le  RE engage un peloton de transport dans le cadre de l'opération Daguet\
      \ dans le Golfe. \n\nDepuis 1991, le régiment fourni régulièrement des renforts aux unités de Légion déployées en opération\
      \ extérieures et intérieures (notamment Sentinelle depuis 2015).\n\nTraditions\n\nInsigne \n\nCe premier insigne du\
      \  REI (1950-1955) reprend la symbolique de la Légion étrangère avec la grenade à sept flamme et les couleurs vert et\
      \ rouge. Le numéro du régiment est indiqué dans la bombe tandis que le globe rappelle celui du monument aux morts de\
      \ la Légion étrangère à Sidi Bel Abbès.\n\nL'insigne actuel du  RE reprend la symbolique du ruban de la médaille commémorative\
      \ de l'expédition du Mexique créée en 1863. Cet insigne était initialement destiné à la  du  étranger (1936). Il devient\
      \ en 1950, l'insigne du GALE (groupement autonome de la Légion étrangère) puis enfin en 1955 celui du  RE.\n\nIl s'agit\
      \ d'un losange blanc sur lequel figurent les armes du Mexique (un circaète noir tenant dans ses serres un serpent vert)\
      \ et une croix de Saint-André aux couleurs de la Légion et du Mexique (le vert et le rouge).\n\nCette symbolique du\
      \ Mexique serait elle-même héritée d'une légende Aztèque concernant la fondation de Tenochtitlan. La croix est d'ailleurs\
      \ présente sur le Codex de Mendoza (Cf. article sur les Armoiries du Mexique).\n\nDrapeau \n\nLes noms des campagnes\
      \ suivantes s'inscrivent en lettres d'or sur le drapeau:\n\n Sébastopol 1855\n Kabylie 1857\n Magenta 1859\n Camerone\
      \ 1863\n Extrême-Orient 1884-1885\n Dahomey-Maroc 1892-1907-1925\n Madagascar 1895-1905\n Orient 1915-1917\n AFN 1952-1962\n\
      \nChant \nNous sommes tous des volontaires\n\nNous marchons gaiement en cadence,\nMalgré le vent, malgré la pluie,\n\
      Les meilleurs soldats de la France,\nsont là devant vous les voici.\n\n(Refrain)\nNous sommes tous des volontaires,\n\
      Les gars du  Étranger,\nNotre devise est légendaire,\nHonneur, fidélité-fidélité,\nMarchons Légionnaires,\nDans la boue,\
      \ dans le sable brûlant,\nMarchons l'âme légère\nEt le cœur vaillant,\nMarchons Légionnaires.\n\nPartout où le combat\
      \ fait rage,\nL'on voit le  Étranger,\nExemple d'héroisme, de courage,\nSe couvrir de glorieux lauriers.\n\nGardons\
      \ dans le fond de nos âmes,\nLe souvenir de nos aînés.\nEt pour la grenade à sept flammes,\nLoyal prêt à tout sacrifier.\n\
      \nDécorations \nLe drapeau du régiment est décoré de :\n la Croix de la Légion d'honneur depuis le \n de la Croix de\
      \ guerre 1939-1945 avec une palme\nde la Croix de guerre des théâtres d'opérations extérieurs avec 2 palmes au titre\
      \ des actions du 6e bataillon au Maroc (guerre du Rif) 1925-1926\n de la fourragère aux couleurs de la croix de croix\
      \ de guerre des TOE\n la Médaille d'or de la ville de Milan depuis le \n la croix avec épée du mérite de l'ordre souverain\
      \ de Malte\n\nFaits d'armes faisant particulièrement honneur au régiment \n Siège de Sébastopol (1854)\n Bataille de\
      \ Magenta (1859)\n Bataille de Camerone (1863)\n\nPersonnalités ayant servi au sein du régiment \n\n Eugene Bullard\n\
      \ Capitaine Jean Danjou\n Joseph Arthur Dufaure du Bessol alors capitaine\n Siegfried Freytag, as de l'aviation allemande\n\
      \ le général de brigade Peppino Garibaldi avec ses 5 frères, dont deux meurent lors des combats en Argonne en 1915\n\
      \ Lord Kitchener of Khartoum\n Pierre  de Serbie\n\nUn certain nombre de Compagnons de la Libération ont servi au  RE\
      \ :\n\n Gabriel Bablon\n Henri Bénévène\n Joseph Bakos\n Hermann Eckstein\n Georges Ungerman\n\nLe régiment aujourd'hui\n\
      \nMissions \nLa mission principale du régiment est de soutenir le commandement de la Légion étrangère qui est chargé\
      \ de la gestion administrative de toute la Légion, et des spécificités qui y sont rattachées.\n\nOrganisation \nLe \
      \ étranger est articulé en trois compagnies d'effectifs très variables :\n\n La CCSR, ou compagnie de commandement et\
      \ des services régimentaire, regroupe tous les services contribuant au bon fonctionnement de la vie quotidienne de l'unité\
      \ (cuisines, infirmerie, ateliers mécaniques, pionniers, etc.) ;\n La CSLE ou compagnie des services de la Légion étrangère,\
      \ compte quant à elle les services propres au fonctionnement de la Légion en général (division des ressources humaines,\
      \ de la sécurité, histoire et patrimoine, communication, musique de la Légion étrangère, etc.) ;\n La CAPLE ou compagnie\
      \ administrative de la Légion étrangère s'occupe plus particulièrement de l'accueil des candidats à l'engagement, de\
      \ la sélection, de l'administration du personnel « hors corps » (grands malades, etc.). Elle comptait aussi en son sein\
      \ l'équipe de cross jusqu'en 2012 avant que celle-ci ne disparaisse au profit d'une section du club sportif.\n\nLe régiment\
      \ a la particularité d'avoir plusieurs emprises :\n l'Institution des invalides de la Légion étrangère (IILE) à Puyloubier\
      \ (Bouches-du-Rhône) accueille les anciens dans une structure médicalisée leur permettant, pour les plus valides, de\
      \ continuer à travailler ;\n le Centre d'hébergement et d'accueil de la Légion étrangère (CHALE) à La Ciotat (Bouches-du-Rhône)\
      \ qui permet d'héberger les légionnaires en permission longue durée avec ou sans leurs familles ;\n le Centre de Convalescence\
      \ et des permissionnaires de la Légion étrangère de La Malmousque (CCPLEM) à Marseille (Bouches-du-Rhône) qui accueille\
      \ les légionnaires blessés et permissionnaires célibataires.\n la Maison du Légionnaire à Auriol (13) qui accueille\
      \ des anciens légionnaires valides en pension complète. Cette Maison a été fondée en 1934 par le Général Rollet\n\n\
      Matériels \nLe  RE est un régiment à vocation administrative qui n'a pas de matériels majeurs.\n\nBibliographie \n Service\
      \ d'Information et de Relations Publique de l'Armée de Terre (SIRPA Terre)\n Division communication et information de\
      \ la Légion étrangère\n Camerone, Pierre Sergent, Éditions Fayard, 1980 – \n L'armée d'Afrique 1930-1962, Collectif,\
      \ Éditions Lavauzelle, 1980.\n Histoire de la Légion, de Narvik à Kolwesi, Henri Le Mire, Éditions Albin Michel, 1978\
      \ – \n Le  Étranger, Tibor Szecsko et Philippe Cart Tanneur, Éditions B.I.P, 1986 -\n\nNotes et références\n\nVoir aussi\n\
