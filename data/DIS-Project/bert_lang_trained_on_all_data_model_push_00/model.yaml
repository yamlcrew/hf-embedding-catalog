    sentences:
    - "Jane Jacobs\n\nComienzos\n\nJacobs nació Jane Butzner en Scranton, Pensilvania, la hija de Bess Robison Butzner, una\
      \ ex maestra y enfermera y John Decker Butzner, un médico. Eran una familia protestante en una ciudad fuertemente católica.​\
      \ Su hermano, John Decker Butzner, Jr., trabajó como juez en el Tribunal de Apelaciones de los Estados Unidos para el\
      \ Cuarto Circuito. Después de graduarse en la Scranton High School, trabajó durante un año como asistente no remunerada\
      \ del editor de páginas femeninas del Scranton Tribune.\n\nFormación en Nueva York\n\nEn 1935, durante la Gran Depresión,\
      \ se mudó a Nueva York con su hermana Betty. Jane Butzner tomó un gusto inmediato al Greenwich Village de Manhattan,\
      \ que no se ajustaba a la estructura de la red de la ciudad. Las hermanas pronto se mudaron allí desde Brooklyn.​\n\
      Durante sus primeros años en la ciudad, Jacobs ocupó una variedad de trabajos, trabajando principalmente como estenógrafa\
      \ y escritora independiente, a menudo escribiendo sobre distritos laborales de la ciudad. Estas experiencias, dijo ella\
      \ más tarde, \"... me dieron una noción más clara de lo que estaba sucediendo en la ciudad y cómo eran los negocios,\
      \ cómo era el trabajo\". Su primer trabajo fue para una revista especializada, primero como secretaria y luego como\
      \ editora. Vendió artículos en el Sunday Herald Tribune, la revista Cue y Vogue.\nEstudió en la Escuela de Estudios\
      \ Generales de la Universidad de Columbia durante dos años, tomando cursos de geología, zoología, derecho, ciencias\
      \ políticas y economía.​ Acerca de la libertad de seguir estudiando a través de sus amplios intereses, dijo:\n  \"Por\
      \ primera vez me gustó la escuela y por primera vez tuve buenas notas. Esto fue casi mi perdición porque después de\
      \ haber cosechado, estadísticamente, un cierto número de créditos me convertí en propiedad del Barnard College en Columbia,\
      \ y una vez que fui propiedad de Barnard tuve que estudiar, al parecer, lo que Barnard quería que estudiara. No es lo\
      \ que quería aprender. Afortunadamente, mis notas en el instituto habían sido tan malas que Barnard decidió que no podía\
      \ pertenecer a él y, por lo tanto, se me permitió continuar eligiendo mis estudios.\"​\n\nCarrera\n\nDespués de asistir\
      \ a la Escuela de Estudios Generales de la Universidad de Columbia durante dos años, Butzner encontró un trabajo en\
      \ la revista Iron Age. Su artículo de 1943 sobre el declive económico en Scranton tuvo buena acogida y llevó a la Corporación\
      \ Murray a ubicar allí una fábrica de aviones de combate. Alentada por este éxito, Butzner solicitó a la Junta de Producción\
      \ de Guerra que respaldara más operaciones en Scranton. Al experimentar la discriminación en Iron Age, también abogó\
      \ por la igualdad salarial para las mujeres y por el derecho de los trabajadores a sindicalizarse.​\n\nAmerika\n\nSe\
      \ convirtió en una escritora de la Office of War Information y luego en una reportera para Amerika, una publicación\
      \ del Departamento de Estado de EE. UU.​para distribuirla en la Unión Soviética. Mientras trabajaba allí conoció a Robert\
      \ Hyde Jacobs Jr., un arquitecto educado en Columbia que estaba diseñando aviones de combate para Grumman. Se casaron\
      \ en 1944. Juntos tuvieron una hija, Burgin, y dos hijos, James y Ned. Compraron un edificio de tres pisos en 555 Hudson\
      \ St. \nJane continuó escribiendo para Amerika después de la guerra, mientras que Robert dejó Grumman y volvió a su\
      \ trabajo como arquitecto.\nLos Jacobs rechazaron los suburbios en rápido crecimiento como \"parásitos\", y prefirieron\
      \ quedarse en el Greenwich Village. Renovaron su nueva casa, en el medio de una zona residencial y comercial mixta,\
      \ y crearon un jardín en el patio trasero.​\nTrabajando para el Departamento de Estado durante el macartismo, Jacobs\
      \ recibió un cuestionario sobre sus creencias políticas y lealtades. Jacobs era anticomunista y había abandonado el\
      \ Sindicato Federal de Trabajadores por sus aparentes simpatías comunistas. Sin embargo, ella estaba a favor de la sindicación\
      \ y supuestamente apreciaba la escritura de Saul Alinsky; por lo tanto, estaba bajo sospecha. El 25 de marzo de 1952,\
      \ Jacobs dio una respuesta ahora famosa a Conrad E. Snow, presidente de la Junta de Seguridad de Lealtad del Departamento\
      \ de Estado de los Estados Unidos. En su prólogo a su respuesta, ella dijo:\n\n   \"La otra amenaza a la seguridad de\
      \ nuestra tradición, creo, se encuentra en casa. Es el miedo actual a las ideas radicales y de las personas que las\
      \ proponen. No estoy de acuerdo con los extremistas de la izquierda o la derecha, pero creo que se les debe permitir\
      \ hablar y publicar, tanto porque ellos mismos tienen, y deberían tener, sus derechos, y una vez que sus derechos se\
      \ han ido, los derechos del resto de nosotros apenas estarán seguros ...\"​\n\nForo arquitectónico\n\nJacobs abandonó\
      \ Amerika en 1952 cuando anunció que se mudaría a Washington, DC. Encontró un trabajo bien remunerado en Architectural\
      \ Forum, publicado por Henry Luce de Time Inc.​ Después de un éxito temprano en el trabajo, Jacobs comenzó a trabajar\
      \ en expedientes sobre planificación urbana y \"decadencia urbana\". En 1954, fue elegida para cubrir un desarrollo\
      \ en Filadelfia diseñado por Edmund Bacon. Aunque sus editores esperaban un informe positivo, Jacobs criticó el proyecto\
      \ de Bacon, reaccionando contra la aparente falta de atención mostrada por los afroamericanos pobres que se vieron directamente\
      \ afectados. Cuando Bacon le mostró a Jacobs ejemplos de bloques no desarrollados y desarrollados, ella concluyó que\
      \ el \"desarrollo\" parecía terminar con la vida comunitaria activa en la calle.​ Cuando Jacobs regresó a las oficinas\
      \ del Foro de Arquitectura, comenzó a cuestionar el consenso de los años 50 sobre la planificación urbana.​\nEn 1955,\
      \ Jacobs conoció a William Kirk, un pastor episcopaliano que trabajó en East Harlem. Kirk llegó a las oficinas del Foro\
      \ de Arquitectura para describir el impacto que la \"revitalización\" tuvo en East Harlem, y presentó a Jacobs al vecindario.\
      \ \nEn 1956, Jacobs pronunció una conferencia en la Universidad de Harvard, sustituyendo a Douglas Haskell del Architectural\
      \ Forum.​ Se dirigió a los principales arquitectos, urbanistas e intelectuales (incluido Lewis Mumford), hablando sobre\
      \ el tema de East Harlem. Instó a esta audiencia a \"respetar, en el más profundo sentido, fragmentos urbanos de caos\
      \ que tienen una extraña sabiduría propia que aún no está incluida en nuestro concepto de orden urbano\". Contrariamente\
      \ a sus expectativas, la charla fue recibida con entusiasmo, pero también la marcó como una amenaza para los planificadores\
      \ urbanos consagrados, los propietarios de bienes raíces y los promotores. Architectural Forum imprimió el discurso\
      \ ese año, junto con fotografías de East Harlem.​\n\nFundación Rockefeller y Muerte y vida de las grandes ciudades americanas\n\
      \nDespués de leer el texto de su discurso de Harvard, William H. Whyte invitó a Jacobs a escribir un artículo para la\
      \ revista Fortune. El artículo resultante, \"Downtown Is for People\", apareció en una edición de Fortune de 1958, y\
      \ marcó su primera crítica pública a Robert Moses. Su postura, particularmente su crítica al Lincoln Center, no fue\
      \ popular entre los partidarios de la renovación urbana en Architectural Forum y Fortune.​ Particularmente indignó a\
      \ C. D. Jackson, el editor de Fortune, quien exigió a Whyte por teléfono: \"¿Quién es esta loca?\"​\nEl artículo de\
      \ Fortune llamó la atención de Chadbourne Gilpatric, entonces director asociado de la División de Humanidades de la\
      \ Fundación Rockefeller. [33] La fundación se había movido intensamente en temas urbanos, con un reciente premio al\
      \ Instituto de Tecnología de Massachusetts para estudios de estética urbana que culminaría en la publicación de Imagen\
      \ de la ciudad de Kevin A. Lynch.​ En mayo de 1958, Gilpatric invitó a Jacobs a comenzar a trabajar como revisor de\
      \ propuestas de subvenciones. Más adelante en ese año, la Fundación Rockefeller otorgó una subvención a Jacobs para\
      \ producir un estudio crítico sobre urbanismo y vida urbana en los EE. UU. (Desde mediados de la década de 1950 hasta\
      \ mediados de la década de 1960, la División de Humanidades de la fundación patrocinó un programa de investigación,\
      \ del cual Jacobs era la beneficiaria más conocida.) Gilpatric alentó a Jacobs a \"explorar [...] el campo del diseño\
      \ urbano para buscar ideas y acciones que puedan mejorar el pensamiento sobre cómo el diseño de ciudades podría servir\
      \ mejor a la vida urbana, incluyendo el valor cultural y humano \". Afiliada a The New School (entonces llamada The\
      \ New School for Social Research), pasó tres años realizando investigaciones y escribiendo borradores. En 1961, Random\
      \ House publicó el producto de su investigación: La muerte y la vida de las grandes ciudades de Estados Unidos.\nLa\
      \ obra sigue siendo uno de los libros más influyentes en la historia de la planificación urbanística estadounidense.​\
      \ Ella acuñó muchos términos como \"capital social\", \"usos primarios mixtos\" y \"ojos en la calle\", que fueron adoptados\
      \ profesionalmente en el diseño urbano, la sociología y otros campos. Jacobs pintó una imagen devastadora de toda la\
      \ profesión de la planificación urbana, etiquetándola de pseudociencia. Esto provocó respuestas airadas de varios hombres\
      \ ricos y poderosos. Jacobs fue criticada como una \"dama militante\" y una \"ama de casa\": una aficionada que no tenía\
      \ derecho a interferir con una disciplina establecida. Su libro también fue criticado por la izquierda por dejar de\
      \ lado la raza y aceptar la gentrificación.​\nEn 1962 renunció a su puesto en Architectural Forum para convertirse en\
      \ autora y madre a tiempo completo. Además de su actividad en la política local, fue una opositora notable de la Guerra\
      \ de Vietnam y marchó al Pentágono en octubre de 1967. Criticó la construcción del World Trade Center como un desastre\
      \ para el puerto de Manhattan.​\n\nLucha por el Greenwich Village\n\nDurante las décadas de 1950 y 1960, el vecindario\
      \ de Jacobs en Greenwich Village fue transformado por los esfuerzos de la Ciudad y el Estado para construir viviendas\
      \ (ver, por ejemplo, la lucha de Jacobs para construir West Village Houses en lugar de grandes casas de departamentos),\
      \ promotores privados, la expansión de la Universidad de Nueva York (NYU) y los planes de renovación urbana de Robert\
      \ Moses. El plan de Moses, financiado como \"eliminación de barrios marginales\" por el Título I de la Ley de Vivienda\
      \ de 1949, también exigía la demolición de varios bloques y su reemplazo por rascacielos de alto nivel. El plan obligó\
      \ a 132 familias a abandonar sus hogares y desplazó a 1.000 pequeñas empresas; el resultado fue Washington Square Village.​\n\
      Como parte de sus esfuerzos por revitalizar el área, Moses propuso por primera vez la extensión de la Quinta Avenida\
      \ a través del Washington Square Park en 1935. Ante la oposición de la comunidad, Moses archivó el proyecto, pero revivió\
      \ la idea en la década de 1950. Moses argumentó que la extensión de la Quinta Avenida mejoraría el flujo de tráfico\
      \ a través del vecindario y proporcionaría acceso a la autopista planeada del Bajo Manhattan (LOMEX), que conectaría\
      \ el Puente de Manhattan y el Puente de Williamsburg con el Túnel Holland.​\nEn respuesta, la activista local Shirley\
      \ Hayes creó el \"Comité para Salvar el Parque Washington Square\", una coalición de docenas de grupos vecinales locales\
      \ que se opusieron a la extensión de la carretera. Raymond S. Rubinow finalmente se hizo cargo de la organización, cambiando\
      \ su nombre a \"Comité de Emergencia Conjunto para cerrar Washington Square al tráfico\". Jacobs se había unido al comité\
      \ bajo Hayes, pero tomó un papel más destacado bajo Rubinow, llegando a medios de comunicación como como el Village\
      \ Voice, que proporcionó una cobertura más comprensiva que publicaciones como el New York Times. El comité obtuvo el\
      \ apoyo de notables como Margaret Mead, Eleanor Roosevelt, Lewis Mumford, Charles Abrams y William H. Whyte, así como\
      \ Carmine De Sapio, residente de Greenwich Village e influyente líder demócrata. La participación de De Sapio resultó\
      \ decisiva. El 25 de junio de 1958, la ciudad cerró Washington Square Park al tráfico, y el comité conjunto celebró\
      \ una ceremonia de atar con cinta (en vez de cortarla).​\nLos planes para la autopista LOMEX continuaron, sin embargo,\
      \ a pesar de la creciente oposición de la comunidad en áreas como Little Italy. En la década de 1960, Jacobs presidió\
      \ el Comité Conjunto para \n detener la Autopista del Bajo Manhattan. Los periódicos como The New York Times simpatizaban\
      \ con Moses, mientras que el Village Voice recientemente creado cubría los mítines de la comunidad y estaba contra la\
      \ autopista. Jacobs continuó luchando contra la autopista cuando los planes resurgieron en 1962, 1965 y 1968, y se convirtió\
      \ en una heroína local por su oposición al proyecto.​ Fue arrestada por un oficial de policía vestido de civil el 10\
      \ de abril de 1968, en una audiencia pública durante la cual la multitud cargó contra el escenario y destruyó las notas\
      \ del taquígrafo. Fue acusada de incitar disturbios, daños y obstrucción a la administración pública. Después de meses\
      \ de pruebas llevadas a cabo en Nueva York, su cargo se redujo a una conducta contra el orden público.​\nNueva York:\
      \ una película documental dedicó una hora de la serie a la batalla entre Moses y Jacobs. La muy crítica biografía de\
      \ Robert Caro sobre Moses, The Power Broker, da solo una breve mención a este evento pese a la fuerte influencia de\
      \ Jacobs en Caro.​​\n\nVida en Toronto\n\nPoco después de su arresto en 1968, Jacobs se mudó a Toronto, y finalmente\
      \ se estableció en 69 Albany Avenue en The Annex desde 1971 hasta su muerte en 2006. Decidió abandonar los EE. UU. en\
      \ parte porque se opuso a la guerra de Vietnam, le preocupaba el destino de sus dos hijos en edad de reclutamiento y\
      \ no quería seguir luchando contra el gobierno de la ciudad de Nueva York. Ella y su esposo eligieron Toronto porque\
      \ era agradable y ofrecían oportunidades de empleo, y se mudaron a un área de Toronto que incluía a tantos estadounidenses\
      \ que evitaban el reclutamiento que se conocía como el \"ghetto estadounidense\".​\nRápidamente se convirtió en una\
      \ figura destacada en su nueva ciudad y ayudó a detener la propuesta de Autopista Spadina. Un tema frecuente de su trabajo\
      \ fue preguntar si estamos construyendo ciudades para las personas o para los automóviles. Fue arrestada dos veces durante\
      \ las manifestaciones. También tuvo una influencia considerable en la regeneración del vecindario de St. Lawrence, un\
      \ proyecto de vivienda considerado como un gran éxito. Se convirtió en ciudadana canadiense en 1974, y más tarde le\
      \ dijo al escritor James Howard Kunstler que la doble ciudadanía no era posible en ese momento, lo que implicaba que\
      \ había perdido su ciudadanía estadounidense.​\nEn 1980, ofreció una perspectiva urbanística sobre la soberanía de Quebec\
      \ en su libro The Question of Separatism: Quebec and the Struggle over Separation. Jacobs fue defensora de una provincia\
      \ de Toronto para separar la ciudad propiamente dicha de Ontario. Jacobs dijo, \"Las ciudades, para prosperar en el\
      \ siglo veintiuno, deben separarse políticamente de sus áreas circundantes\".\nLe fue concedida Orden de Canadá en 1996\
      \ por sus escritos fundamentales y sus comentarios que invitan a la reflexión sobre el desarrollo urbano. La sección\
      \ de sociología urbana y de la comunidad de la American Sociological Association le otorgó su premio Outstanding Lifetime\
      \ Contribution en 2002. En 1997, el gobierno de la ciudad de Toronto patrocinó una conferencia titulada \"Jane Jacobs:\
      \ Ideas That Matter\", que condujo a un libro del mismo nombre. Al final de la conferencia, se creó el Premio Jane Jacobs.\
      \ Incluye un estipendio anual de 5.000 dólares por tres años para \"honrar a los héroes anónimos originales de Toronto,\
      \ mediante la búsqueda de ciudadanos que participen en actividades que contribuyan a la vitalidad de la ciudad\".​\n\
      Jacobs nunca rehuyó expresar su apoyo político a candidatos específicos. Se opuso a la amalgama de 1997 de las ciudades\
      \ de Metro Toronto, por temor a que los vecindarios individuales tuvieran menos poder con la nueva estructura. Respaldó\
      \ a un ecologista, Tooker Gomberg, que perdió la carrera por la alcaldía en Toronto en 2000, y fue asesor de la exitosa\
      \ campaña a la alcaldía de David Miller en 2003. Durante la campaña a la alcaldía, Jacobs ayudó a ejercer presión contra\
      \ la construcción de un puente para unir el paseo marítimo de la ciudad con el Aeropuerto del Centro de la Ciudad de\
      \ Toronto (TCCA).​ Después de las elecciones, se revocó la decisión anterior del concejo municipal de Toronto de aprobar\
      \ el puente y se detuvo el proyecto de construcción del puente. TCCA actualizó el servicio de ferry y el aeropuerto\
      \ todavía está operativo en 2018.\nJacobs también participó en una lucha contra un plan del Royal St. George's College\
      \ (una escuela establecida muy cercana a la residencia de Jacobs desde hace mucho tiempo en el distrito Annex de Toronto)\
      \ para reconfigurar sus instalaciones. Jacobs sugirió no solo que se detuviera el rediseño, sino también que la escuela\
      \ fuera forzada a salir por completo del barrio. Aunque el consejo de Toronto inicialmente rechazó los planes de la\
      \ escuela, la decisión se revirtió más tarde, y la Junta Municipal de Ontario dio el visto bueno al proyecto cuando\
      \ los oponentes no lograron presentar testigos creíbles y trataron de retirarse del caso durante la audiencia.​\nTambién\
      \ influyó en la planificación urbana de Vancouver. Jacobs ha sido llamada \"la madre del vancouverismo\",​ refiriéndose\
      \ al uso de esa ciudad de su filosofía de \"densidad bien hecha\".​El renombrado arquitecto Bing Thom describió el vancouverismo\
      \ de esta manera:​\n   \"Es poner énfasis sobre el espacio público. Creo que los habitantes de Vancouver están muy,\
      \ muy orgullosos de que construyamos una ciudad que realmente tenga una enorme cantidad de espacio en el paseo marítimo\
      \ para que la gente pueda recrearse y disfrutar. Al mismo tiempo, False Creek y Coal Harbour eran anteriormente tierras\
      \ industriales que estaban muy contaminadas y degradadas. Hemos actualizado todo esto con un nuevo desarrollo, y las\
      \ personas tienen acceso al agua y a las vistas. Por consiguiente, la idea para mí es de tener mucha gente viviendo\
      \ muy cerca, mezclando los usos. Entonces, tenemos apartamentos en la parte superior de las tiendas. En Surrey tenemos\
      \ una universidad en la parte superior de un centro comercial. Esta mezcla de usos refleja a Vancouver en términos de\
      \ nuestra cultura y de cómo vivimos juntos.\"​\nJacobs murió en Toronto Western Hospital a los 89 años, el 25 de abril\
      \ de 2006, al parecer, de un derrame cerebral. Le sobrevivió un hermano, James Butzner (nacido en 2009)​; sus dos hijos,\
      \ James y Ned de Vancouver, y una hija, Burgin Jacobs; dos nietos y dos bisnietos. Tras su muerte, su familia declaró:\n\
      \  \"Lo importante no es que haya muerto, sino que haya vivido, y que el trabajo de su vida haya influido mucho en nuestra\
      \ forma de pensar. Por favor, recuérdala leyendo sus libros e implementando sus ideas.\"​\n\nJane Jacobs Days\n\nDespués\
      \ de la muerte de Jacobs en abril de 2006, el alcalde de la ciudad de Nueva York, Michael Bloomberg, anunció el Día\
      \ de Jane Jacobs, celebrado el 28 de junio de 2006. La ciudad de Toronto proclamó su cumpleaños al año siguiente, 4\
      \ de mayo de 2007, como el Jane Jacobs Day.​\n\nObras\n\nJane Jacobs pasó su vida estudiando las ciudades. Sus libros\
      \ incluyen:\n\nLa muerte y la vida de las grandes ciudades americanas\n\nEs su libro más influyente y posiblemente el\
      \ libro más influyente sobre planificación urbana y ciudades del siglo XX. Ampliamente leído tanto por profesionales\
      \ de la planificación como por el público en general, el libro es una fuerte crítica de las políticas de renovación\
      \ urbana de la década de 1950, que, según ella, destruyó comunidades y creó espacios urbanos aislados y antinaturales.\
      \ Jacobs abogó por la abolición de las leyes de zonificación y la restauración del mercado libre de solares, lo que\
      \ daría como resultado vecindarios densos de uso mixto y citó con frecuencia al Greenwich Village de la ciudad de Nueva\
      \ York como un ejemplo de una comunidad urbana vibrante.\nRobert Caro lo ha citado como la influencia más fuerte en\
      \ The Power Broker, su biografía ganadora del Pulitzer de Robert Moses, aunque Caro no menciona su nombre ni siquiera\
      \ una vez en el libro a pesar de las batallas de Jacobs con Moses sobre su propuesta Autopista del Bajo Manhattan. Se\
      \ dice que Caro cortó un capítulo sobre Jacobs debido a la longitud de su libro.​ \nMás allá de las lecciones prácticas\
      \ de diseño y planificación de la ciudad que ofrece Death and Life, los fundamentos teóricos del trabajo desafían la\
      \ mentalidad del desarrollo moderno. Jane Jacobs defiende sus posiciones con sentido común y anécdotas.\n\nLa economía\
      \ de las ciudades\n\nLa tesis de este libro es que las ciudades son los principales impulsores del desarrollo económico.\
      \ Su argumento principal es que el crecimiento económico explosivo se deriva del reemplazo de importaciones urbanas.\
      \ El reemplazo de importaciones ocurre cuando una ciudad comienza a producir bienes localmente que importó anteriormente,\
      \ por ejemplo, fábricas de bicicletas de Tokio que reemplazan a los importadores de bicicletas de Tokio en el siglo\
      \ XIX. Jacobs afirma que el reemplazo de importaciones construye infraestructura local, habilidades y producción. Jacobs\
      \ también afirma que el aumento de la producción se exporta posteriormente a otras ciudades, dando a esas otras ciudades\
      \ una nueva oportunidad para participar en la sustitución de importaciones, lo que produce un ciclo positivo de crecimiento.\n\
      En una entrevista con Bill Steigerwald en Reason Magazine, Jacobs dijo que si la recuerdan por ser una gran intelectual,\
      \ será recordada no por su trabajo relacionado con la planificación urbana, sino por el descubrimiento del reemplazo\
      \ de importaciones. Los críticos afirman erróneamente que sus ideas repiten la idea de la sustitución de importaciones\
      \ avanzada por estudiosos como Andre Gunder Frank. La sustitución de importaciones era una teoría económica nacional\
      \ que implicaba que si una nación sustituía sus importaciones por producción nacional, la nación se haría más rica,\
      \ mientras que la idea de Jacob se basa enteramente en las ciudades y podría denominarse sustitución de importaciones\
      \ urbanas. Sin embargo, incluso esto generaría confusión porque, en la práctica, la sustitución de importaciones en\
      \ la India y América Latina estaba subvencionada y ordenada por el gobierno, mientras que el concepto de sustitución\
      \ de importaciones de Jacobs es un proceso de descubrimiento y división del trabajo dentro de una ciudad.​\nEn la segunda\
      \ parte del libro, Jacobs argumenta que las ciudades precedieron a la agricultura. Ella argumenta que en las ciudades\
      \ el comercio de animales y granos silvestres permitió la división inicial del trabajo necesaria para el descubrimiento\
      \ de la agricultura; estos descubrimientos luego se mudaron fuera de la ciudad debido a la competencia por la tierra.\
      \ Otra interpretación de la historia, generalmente considerada contradictoria con la de Jacobs, es apoyada por el arqueólogo\
      \ marxista Vere Gordon Childe y en los últimos tiempos por otro materialista histórico Charles Keith Maisels​ que argumentan\
      \ que la agricultura precedió a las ciudades. La aparente oposición entre las teorías de Childe y Jacobs descansa en\
      \ su definición de 'ciudad', 'civilización' o 'urbana'. Childe, como otros materialistas como Maisels o Henri Lefebvre,\
      \ define \"urbano\" o \"civilización\" como sinecismo -como comunidad política monolítica, alfabetizada, socialmente\
      \ estratificada,​ mientras que, como se puede ver en La economía de las ciudades o las ciudades y la Riqueza de las\
      \ Naciones, Jacobs define la ciudad puramente en la línea de comercio geográficamente denso dando paso al descubrimiento\
      \ empresarial y mejoras posteriores en la división del trabajo. Sin los requisitos de la alfabetización, la construcción\
      \ monumental o los signos de fuerzas civiles y armadas especializadas, las \"ciudades\" pueden interpretarse con precisión\
      \ que existen miles de años antes, de cuando Childe y Maisels las colocan. Sin embargo, la definición de Jacobs es una\
      \ suposición, ya que \"ciudad\" se define simplemente como una gran ciudad o \"un gran asentamiento humano\" que indica\
      \ la permanencia. Los primeros restos de la humanidad descubiertos por los arqueólogos no nos dan más información que\
      \ la de cazadores-recolectores, ya que todavía no hay evidencia de agricultura o asentamiento, lo que implica un estilo\
      \ de vida nómada hasta que se hagan nuevos descubrimientos.​\n\nLa cuestión del separatismo: Quebec y la lucha por la\
      \ soberanía\n\nThe Question of Separatism incorporó y amplió la presentación de Jacobs de las Conferencias Massey de\
      \ 1979, tituladas Canadian Cities and Sovereignty-Association. Se publicó en 1980 y se reimprimió en 2011 con una entrevista\
      \ previamente no publicada de 2005 con Robin Philpot sobre el tema en el que evoca la relativa desaprobación de ese\
      \ libro entre sus lectores habituales. Esta fue, de hecho, la primera vez que se le solicitó que lo discutiera en una\
      \ entrevista. El columnista Richard Gwyn adelantó que aunque no la criticaban abiertamente, los lectores canadienses\
      \ de habla inglesa pensaban que no entendía cómo funcionaba la política canadiense y que no estaba siendo útil en un\
      \ momento de angustia por la unidad nacional (el referéndum de 1980 fue derrotado por un voto del 60%). La cuestión\
      \ del separatismo tampoco se mencionó en la bibliografía de su obituario de 2006 en The Globe and Mail.​\nEl libro de\
      \ Jacobs avanza la opinión de que la eventual independencia de Quebec es mejor para Montreal, Toronto, el resto de Canadá\
      \ y el mundo; y que tal independencia puede lograrse pacíficamente. Como precedente, cita la secesión de Noruega de\
      \ Suecia y cómo enriqueció a ambas naciones. Se examinan los orígenes del movimiento secesionista contemporáneo en la\
      \ Revolución silenciosa, junto con la dependencia histórica de Canadá de los recursos naturales y la propiedad extranjera\
      \ para su propio desarrollo económico. Jacobs afirma que tal enfoque es colonial y, por lo tanto, retrospectivo, citando\
      \ por ejemplo que Canadá compra sus esquís y muebles de Noruega o de fábricas de propiedad noruega en Canadá, el último\
      \ procedimiento es un producto de los aranceles canadienses diseñados específicamente para fomentar tales fábricas.\
      \ Las opiniones públicas relevantes de René Lévesque, Claude Ryan, y luego el primer ministro Pierre Trudeau también\
      \ se analizan críticamente. Un ejemplo es su incapacidad para reconocer que dos monedas independientes respectivas son\
      \ esenciales para el éxito de un Quebec independiente y un Canadá resultante más pequeño, un problema que es central\
      \ en su libro. Jacobs enfatiza la necesidad de que Montreal continúe desarrollando su liderazgo de la cultura quebequense,\
      \ pero que tal necesidad finalmente no puede ser satisfecha por las crecientes tendencias de Montreal hacia el estatus\
      \ de ciudad regional, tendencias que presagian una sumisión económica, política y cultural al Toronto de habla inglesa.\
      \ Tal resultado, según Jacobs, a largo plazo condenaría la independencia de Quebec tanto como obstaculizaría el propio\
      \ futuro de Canadá. Concluye con su observación de que la equiparación popular de la secesión política con el fracaso\
      \ político y económico es el resultado de la Ilustración, que percibió la naturaleza como una fuerza para la \"estandarización,\
      \ uniformidad, universalidad e inmutabilidad\". Desde entonces, los naturalistas y sus lectores se han dado cuenta gradualmente\
      \ de que la naturaleza es una fuerza para la diversidad, y que, \"la diversidad misma es la esencia de la excelencia\"\
      . El tipo correcto de secesión, afirma Jacobs, puede conducir al tipo correcto de diversidad.\n\nLas ciudades y la riqueza\
      \ de las naciones\n\nCities and the Wealth of Nations intenta hacer por la economía lo que The Death and Life of Great\
      \ American Cities hizo por la planificación urbana moderna, aunque no ha recibido la misma atención crítica. Comenzando\
      \ con un tratamiento conciso de la economía clásica, este libro cuestiona uno de los supuestos fundamentales de los\
      \ grandes economistas. Los economistas clásicos (y neoclásicos) consideran que el estado-nación es el principal actor\
      \ en macroeconomía. Jacobs argumenta que no es el estado-nación, sino que es la ciudad la que es el verdadero actor\
      \ en este juego mundial. Reafirma la idea del reemplazo de importaciones de su libro anterior, The Economy of Cities,\
      \ mientras especulaba sobre las ramificaciones adicionales de considerar primero a la ciudad y luego a la nación, o\
      \ no.\n\nSistemas de supervivencia\n\nSistemas de supervivencia: Un diálogo sobre los fundamentos morales del comercio\
      \ y la política, se mueve fuera de la ciudad, estudiando los fundamentos morales del trabajo. Al igual que con sus otros\
      \ trabajos, utilizó un enfoque de observación. Este libro está escrito como un diálogo platónico. Parece que ella (como\
      \ lo describen los personajes de su libro) tomó recortes de periódicos de juicios morales relacionados con el trabajo,\
      \ los recopiló y ordenó para encontrar los que se ajustaban a dos patrones de comportamiento moral que eran mutuamente\
      \ excluyentes. Ella llama a estos dos patrones \"Síndrome Moral A\", o síndrome moral comercial, y \"Síndrome Moral\
      \ B\", o síndrome moral guardián. Afirma que el síndrome moral comercial es aplicable a los dueños de negocios, científicos,\
      \ agricultores y comerciantes. Del mismo modo, afirma que el síndrome moral del guardián es aplicable al gobierno, organizaciones\
      \ benéficas, cazadores-recolectores e instituciones religiosas. También afirma que estos Síndromes Morales son fijos\
      \ y no fluctúan con el tiempo.\nEs importante enfatizar que Jane Jacobs brinda una teoría sobre la moralidad del trabajo\
      \ y no sobre todas las ideas morales. Las ideas morales que no están incluidas en sus patrones son aplicables a ambos.\n\
      Jane Jacobs continúa describiendo lo que sucede cuando estos dos patrones morales se mezclan, mostrando los fundamentos\
      \ del trabajo de la Mafia y el Comunismo, y lo que sucede cuando a la policía del subterráneo de Nueva York se les paga\
      \ bonificaciones aquí, reinterpretadas como parte de un análisis más amplio.\n\nLa naturaleza de las economías\n\nLa\
      \ naturaleza de las economías, un diálogo entre amigos sobre la premisa: \"los seres humanos existen por completo en\
      \ la naturaleza como parte del orden natural en todos los aspectos\" (p.xx), sostiene que los mismos principios subyacen\
      \ tanto en los ecosistemas como en las economías: \"desarrollo y el codesarrollo a través de las diferenciaciones y\
      \ sus combinaciones, la expansión a través de diversos usos múltiples de la energía y el auto-mantenimiento a través\
      \ de la auto-reabastecimiento de combustible \"(p.82).\nLos personajes de Jacobs discuten los cuatro métodos por los\
      \ cuales los \"sistemas dinámicamente estables\" pueden evadir el colapso: \"bifurcaciones, circuitos de retroalimentación\
      \ positiva, controles de retroalimentación negativa y adaptaciones de emergencia\" (p.98). Sus conversaciones también\
      \ cubren la \"doble naturaleza de la aptitud para la supervivencia\" (rasgos para evitar la destrucción del propio hábitat\
      \ y el éxito en la competencia para alimentarse y reproducirse), e imprevisibilidad, incluido el efecto mariposa caracterizado\
      \ en términos de multiplicidad de variables así como la respuesta desproporcionada a la causa y la autoorganización\
      \ donde \"un sistema puede ser creado a medida que avanza\" (p.137).\nA través del diálogo, los personajes de Jacobs\
      \ exploran y examinan las similitudes entre el funcionamiento de los ecosistemas y las economías. Los temas incluyen\
      \ el desarrollo ambiental y económico, el crecimiento y la expansión, y cómo las economías y los entornos se mantienen\
      \ vivos a través del \"reabastecimiento de combustible\". Jacobs también comenta sobre la naturaleza de la diversidad\
      \ económica y biológica y su papel en el desarrollo y crecimiento de los dos tipos de sistemas.\nEl libro está lleno\
      \ de muchos ejemplos económicos y biológicos del mundo real, que ayudan a mantener el libro \"con los pies en la tierra\"\
      \ y comprensible, aunque es denso. Los conceptos están provistos de ejemplos económicos y biológicos, mostrando su coherencia\
      \ en ambos mundos.\nUna idea particularmente interesante es la creación de \"algo de la nada\", una economía de la nada.\
      \ En el mundo biológico, la energía libre se da a través de la luz solar, pero en el mundo económico, la creatividad\
      \ humana y los recursos naturales suministran esta energía libre, o al menos energía de arranque. Otra visión interesante\
      \ es la creación de diversidad económica mediante la combinación de diferentes tecnologías, por ejemplo, la máquina\
      \ de escribir y la televisión como entradas y salidas de un sistema informático: esto puede conducir a la creación de\
      \ \"nuevas especies de trabajo\".\n\nDark Age Ahead\n\nPublicado en 2004 por Random House, Dark Age Ahead postula el\
      \ argumento de Jacobs de que la civilización \"norteamericana\" muestra signos de un descenso en espiral comparable\
      \ al colapso del imperio romano. Su discusión se centra en \"cinco pilares de nuestra cultura de los que dependemos\
      \ para mantenerse firmes\", que se pueden resumir como la familia nuclear y la comunidad; la calidad en educación; el\
      \ libre pensamiento en la ciencia; el gobierno representativo e impuestos responsables; y la responsabilidad corporativa\
      \ y profesional. Como sugiere el título del libro, el punto de vista de Jacobs es mucho más pesimista que el de sus\
      \ trabajos anteriores. Sin embargo, en la conclusión, ella admite: \"En un momento dado es difícil saber si las fuerzas\
      \ de la vida cultural o la muerte están en ascenso. Es la expansión suburbana, con sus asesinatos de comunidades y desechos\
      \ de tierra, tiempo y energía, un ¿Signo de decadencia? ¿O el creciente interés en los medios para superar la expansión\
      \ es un signo de vigor y adaptabilidad en la cultura norteamericana? Podría decirse que cualquiera de las dos afirmaciones\
      \ podría resultar cierta\".​"
    - "is a 2017 action-adventure game developed and published by Nintendo for the Nintendo Switch and Wii U consoles. Breath\
      \ of the Wild is the nineteenth installment of The Legend of Zelda franchise and is set at the end of the Zelda timeline.\
      \ The player controls Link, who awakens from a hundred-year slumber to defeat Calamity Ganon and restore the kingdom\
      \ of Hyrule.\n\nSimilar to the original 1986 The Legend of Zelda game, players are given little instruction and can\
      \ explore the world freely. Tasks include collecting various items and gear to aid in objectives such as puzzle-solving\
      \ or side quests. The world is unstructured and designed to encourage exploration and experimentation, and the main\
      \ story quest can be completed in a nonlinear fashion.\n\nDevelopment of Breath of the Wild took place over five years,\
      \ following the responses from some fans who wanted a larger game world to explore. Wanting to rethink the conventions\
      \ of the series, Nintendo introduced elements such as an open world and detailed chemistry and physics engines. Monolith\
      \ Soft, known for their work on the open world Xenoblade Chronicles series, assisted in designing landscapes and topography.\
      \ The game was originally planned for release in 2015 as a Wii U exclusive but was delayed twice. Released on March\
      \ 3, 2017, Breath of the Wild was a launch game for the Nintendo Switch and the final Nintendo-published game for the\
      \ Wii U. Two waves of downloadable content were released throughout 2017 in an expansion pass.\n\nBreath of the Wild\
      \ received critical acclaim for its open-ended gameplay and attention to detail. Critics called it a landmark in open\
      \ world game design, although it received minor criticism for its technical performance at launch. It won several game\
      \ of the year awards and has since been cited as one of the greatest video games of all time. By 2021 it had sold over\
      \ 27 million copies, making it one of the best-selling video games of all time. A spin-off, Hyrule Warriors: Age of\
      \ Calamity, was released in 2020. A sequel is set for release on the Switch in 2022.\n\nGameplay\n\nBreath of the Wild\
      \ is an action-adventure game set in an open world where players are tasked with exploring the kingdom of Hyrule while\
      \ controlling Link. Breath of the Wild encourages nonlinear gameplay, which is illustrated by the game's lack of defined\
      \ entrances or exits to areas, scant instruction given to the player, and encouragement to explore freely. Breath of\
      \ the Wild introduces a consistent physics engine to the Zelda series, letting players approach problems in different\
      \ ways rather than trying to find a single solution. The game also integrates a \"chemistry engine\" that defines the\
      \ physical properties of most objects and governs how they interact with the player and one another. For example, during\
      \ thunderstorms, metal objects will attract powerful lightning strikes; during a storm, therefore, a player must be\
      \ careful not to wear metal, but may also throw metal objects at enemies to draw lightning to them. These design approaches\
      \ result in a generally unstructured and interactive world that rewards experimentation and allows for nonlinear completion\
      \ of the story.\n\nAs Link, players can perform actions such as running, climbing, swimming, and gliding with a paraglider,\
      \ although Link is limited by his stamina. Link can procure items from the environment, including weapons, food, and\
      \ other resources. Unlike previous Zelda games, weapons and shields degrade through use. Many items have multiple uses;\
      \ for example, wooden weapons can light fires, wooden shields can collect incoming enemy arrows, and shields can be\
      \ used as makeshift snowboards. Players can obtain food and materials for elixirs from hunting animals, gathering wild\
      \ fruit, or collecting parts of defeated enemies. By cooking combinations of food or materials, the player can create\
      \ meals and elixirs that can replenish Link's health and stamina, or provide temporary status bonuses such as increased\
      \ strength or resistance to heat or cold. An important tool in Link's arsenal is the \"Sheikah Slate\", which can be\
      \ used to mark waypoints on the in-game map and take pictures of materials, creatures, and enemies. These pictures are\
      \ stored in an in-game compendium that can be used to locate valuable items. The Sheikah Slate also gives the player\
      \ the ability to create remote bombs, manipulate metal objects, form ice blocks on watery surfaces, and temporarily\
      \ stop objects in time. In combat, players can lock onto targets for more precise attacks, while certain button combinations\
      \ allow for advanced offensive and defensive moves. Players may also defeat enemies without weapons, such as by rolling\
      \ boulders off cliffs into enemy camps.\n\nBesides exploration, players can undergo quests or challenges to obtain certain\
      \ benefits. Activating towers and shrines will add waypoints to the map that the player may warp to at any time. Activating\
      \ towers also adds territories to the map, although location names are not added until the player explores that area.\
      \ Dotted throughout Hyrule are shrines that contain challenges ranging from puzzles to battles against robotic opponents.\
      \ Clearing shrines earns Spirit Orbs. After earning four of these orbs, they can be traded for additional health or\
      \ stamina points. When Link has at least 13 hearts, he can reclaim the Master Sword in the Korok Forest. The Master\
      \ Sword is the only unbreakable weapon in the game;  however it can run out of energy after extended use, requiring\
      \ a 10 minute recharge. Scattered across Hyrule are small puzzles that reveal Korok Seeds, which can be traded to expand\
      \ inventory size for weapons, shields, and bows. Towns serve as hotspots for quests, sidequests, and shops selling materials\
      \ and clothing. Hikers and other travelers offer sidequests, hints, or conversation. Additionally, players can scan\
      \ Amiibo figures against their controller to summon items or call Link's horse Epona from previous Zelda games and Wolf\
      \ Link from Twilight Princess.\n\nPlot\n\nBreath of the Wild takes place at the end of the Zelda timeline in the kingdom\
      \ of Hyrule. 10,000 years before the beginning of the game, the ancient Sheikah race had developed Hyrule into an advanced\
      \ civilization, protected by four enormous animalistic machines called the Divine Beasts and an army of autonomous weapons\
      \ called Guardians. When the evil Calamity Ganon appeared and threatened Hyrule, four great warriors were given the\
      \ title of Champion, and each piloted one of the Divine Beasts to weaken Ganon while the princess with the blood of\
      \ the goddess and her appointed knight fought and defeated him by sealing him away.\n\n10,000 years later, the kingdom\
      \ of Hyrule had since regressed to a medieval state. Reading their ancestors' prophecies, the Hylians recognized the\
      \ signs of Ganon's return and excavated surrounding areas to uncover the Divine Beasts and Guardians. During this time,\
      \ Princess Zelda trained vigorously to awaken the sealing magic needed to defeat Ganon while trying to maintain her\
      \ personal research. In the meantime, a knight was appointed to protect her, that being Link, who was chosen due to\
      \ his ability to wield the Master Sword, also known as the Sword that Seals the Darkness. The champions of Hyrule's\
      \ races — Daruk, warrior of the mountainous Goron; Mipha, princess of the aquatic Zora; Revali, archer of the birdlike\
      \ Rito; and Urbosa, chief of the desert-dwelling Gerudo — assembled to pilot the Divine Beasts (Vah Rudania, Vah Ruta,\
      \ Vah Medoh, and Vah Naboris, respectively) while the current Zelda and Link battled Ganon. However, Ganon possessed\
      \ the Guardians and Divine Beasts, turning them against Hyrule. King Rhoam and the Champions were killed, the castle\
      \ town was destroyed, and Link was gravely wounded while defending the Hyrulean Army's only remaining base, Fort Hateno.\
      \ Zelda took Link to safety for him to heal, hid the Master Sword in the Lost Woods under protection from the Great\
      \ Deku Tree, and used her magic to seal herself and Ganon in Hyrule Castle. This cataclysmic tragedy came to be known\
      \ through the ages as the Great Calamity.\n\n100 years after being placed in a healing chamber in the Shrine of Resurrection,\
      \ an amnesiac Link awakens in a now-ravaged Hyrule. He meets an old man, who reveals himself as the lingering spirit\
      \ of King Rhoam. Rhoam explains that Ganon, sealed in Hyrule Castle, has grown strong; he pleads for Link to defeat\
      \ Ganon before he breaks free and destroys the world.\n\nLink travels across Hyrule, returning to locations from his\
      \ past and regaining his memories. With the help of the Hyrulean races, he boards the four Divine Beasts and purges\
      \ them of Ganon's monsters, releasing the spirits of Hyrule's former champions and allowing them to pilot the Divine\
      \ Beasts once again. After obtaining the Master Sword from the Lost Woods, Link enters Hyrule Castle and defeats Ganon\
      \ with the help of the Divine Beasts and Zelda's Bow of Light. Zelda seals Ganon away, restoring peace and allowing\
      \ the spirits of King Rhoam and the champions to depart to the afterlife. Sensing their presence, Link and Zelda smile\
      \ fondly.\n\nIf players have found all 13 memories in the quest \"Captured Memories\", they unlock a secret ending in\
      \ which Zelda realizes that Hyrule must be rebuilt and that she and Link must begin the process themselves. As Link\
      \ and Zelda survey Hyrule and embark to rebuild their world, the princess confides that she may no longer possess any\
      \ supernatural power, yet still she has happily come to terms with it.\n\nDevelopment\n\nNintendo EPD, an internal division\
      \ of Nintendo, developed Breath of the Wild for the Nintendo Switch and Wii U. According to series producer Eiji Aonuma,\
      \ the development team aimed to \"rethink the conventions of Zelda\". Development started immediately upon the release\
      \ of The Legend of Zelda: Skyward Sword (2011). Aonuma received comments from players who wished to see a more interconnected\
      \ map to explore the locales between the gameplay areas. In 2013, Nintendo experimented with nonlinear gameplay in The\
      \ Legend of Zelda: A Link Between Worlds, which was a common point of praise from many outlets. At E3 2014, Aonuma said\
      \ he planned to reform dungeons and puzzles, two of the series' major gameplay elements, and redesign the game to allow\
      \ players to reach the end without progressing through the story. As Nintendo had never developed a modern open-world\
      \ game on the scale of Breath of the Wild, they looked at earlier titles to learn more about the challenges of making\
      \ a modern large-scale open-world game, specifically The Elder Scrolls V: Skyrim and Shadow of the Colossus, which had\
      \ some similar climbing mechanics and whose creator Fumito Ueda was friends with Aonuma. For the art style, the development\
      \ team drew inspiration from various Japanese anime which they had grown up watching. Series protagonist Link was redesigned\
      \ for the game, with Aonuma purposely making him more gender neutral so that players could more easily relate to him.\n\
      \nBefore full development, the developers designed a playable 2D prototype similar to the original Zelda to experiment\
      \ with physics-based puzzles. The final game uses a modified version of the Havok physics engine. At the 2017 Game Developers\
      \ Conference, director Hidemaro Fujibayashi, technical director Takuhiro Dohta, and art director Satoru Takizawa held\
      \ a presentation titled \"Change and Constant – Breaking Conventions with The Legend of Zelda: Breath of the Wild\"\
      , during which they demoed the prototype. Aonuma called the physics engine in Breath of the Wild a major development\
      \ for the Zelda series, saying that it \"underpins everything in the world\" and makes things operate in a \"logical\
      \ and realistic way\", allowing players to approach puzzles and problems in different ways. He expanded on the difficulty\
      \ in developing this system, recalling how one day during development he entered an area in the game and found that\
      \ all the objects had been blown away by the wind. As previous Zelda games increased the amount of actions Link could\
      \ perform, the development team realized that having too many actions would complicate the controls, so instead of adding\
      \ more actions, they increased the number of events the player could interact with in the world.\n\nThe game was built\
      \ and demonstrated with touchscreen features for the Wii U, but the developers found that \"looking back and forth between\
      \ the Gamepad and the screen\" distracted from the game. The features were removed when the game moved to tandem development\
      \ across the Switch and Wii U. The Wii U GamePad also affected animation; although Link is canonically left-handed,\
      \ he is right-handed in the game to match the GamePad's control scheme, which has its sword-swinging buttons on its\
      \ right side. The Switch version performs better than the Wii U release when docked to a television, although when undocked,\
      \ both run at the same resolution. The Switch version also has higher-quality environmental sounds. Aonuma stated that\
      \ the art design was inspired by gouache and en plein air art to help identify the vast world. Takizawa has also cited\
      \ the Jōmon period as an inspiration for the ancient Sheikah technology and architecture that is found in the game,\
      \ due to the mystery surrounding the period. The game's landscape was based on locations in and around Kyoto, the hometown\
      \ of game director Hidemaro Fujibayashi, and was partially designed by Monolith Soft, who assisted with topographical\
      \ level design. The game's initial area was made a plateau so that players can see the world's expansive environments.\n\
      \nBreath of the Wild was the first main Zelda game to use voice acting in cutscenes, although Link remains a silent\
      \ protagonist. Aonuma was affected by the first time he heard a character with a human voice in-game, and wanted to\
      \ leave a similar impression on players. The team decided to record voice-overs for all cutscenes instead of only the\
      \ key scenes, as originally planned. Nintendo provided voice-overs and subtitles in eight languages. Initially, players\
      \ were not able to mix and match the languages of voices and subtitles; however, Nintendo released an update in May\
      \ 2017 that allowed players to choose the voice-over language. After five years of development, the game went gold on\
      \ February 3, 2017, with Nintendo holding a wrap party to celebrate. Coinciding with the game's launch in Taiwan and\
      \ South Korea in early 2018, Nintendo introduced a patch worldwide adding traditional and simplified Chinese and Korean\
      \ translations for the Nintendo Switch version.\n\nThe original score was composed by Manaka Kataoka, Yasuaki Iwata,\
      \ and Hajime Wakai. Kataoka and Wakai had previously worked on the Zelda games Spirit Tracks and The Wind Waker respectively.\
      \ The soundtrack was primarily written and performed on a piano, with a focus on ambient music and sounds rather than\
      \ melodic and upbeat music as seen in previous Zelda games. According to Wakai, this helped add \"authenticity\" to\
      \ the environments and was taken on as a challenge by the rest of the sound team.\n\nRelease\n\nAonuma originally teased\
      \ the game for the Wii U in January 2013 during a Nintendo Direct presentation. The game, he continued, would challenge\
      \ the series' conventions, such as the requirement that players complete dungeons in a set order. The next year, Nintendo\
      \ introduced the game's high-definition, cel-shaded visual style with in-game footage at its E3 2014 press event. Once\
      \ planned for release in 2015, the game was delayed early in the year and did not show at that year's E3. Zelda series\
      \ creator Shigeru Miyamoto reaffirmed that the game was still set for release on the Wii U, despite the development\
      \ of Nintendo's next console, the Nintendo Switch. The game was delayed again in April 2016 due to problems with its\
      \ physics engine. Nintendo let attendees play the game's Wii U version at E3 2016, where they also announced its subtitle,\
      \ Breath of the Wild. CNET said that the showing would \"take your breath away\", and Breath of the Wild was the most\
      \ talked-about E3 2016 game on social media according to Brandwatch, a social media monitoring platform. It was also\
      \ listed among the best games at E3 by Eurogamer, GameSpot, and GamesRadar+. At a Nintendo presentation in January 2017,\
      \ a trailer was shown announcing that the game would be released as a launch game for the Switch.\n\nBreath of the Wild\
      \ launched for both the Wii U and Switch on March 3, 2017. It was the last Nintendo game released for the Wii U. The\
      \ Switch version was available in limited \"Special Edition\" and \"Master Edition\" bundles, which both included a\
      \ Sheikah Eye coin, a Calamity Ganon tapestry with world map, a soundtrack CD, and a themed carrying case for the Switch.\
      \ The Master Edition also included a figurine based on the Master Sword. An \"Explorer's Edition\" was released for\
      \ the Switch on November 23, 2017, containing a two-sided map and a 100-page book of story information. In Europe, the\
      \ game used unique packing artwork. A five-disc, 211-track soundtrack was released in Japan on April 25, 2018.\n\nDownloadable\
      \ content \nOn June 30, 2017, Nintendo released a \"season pass\" for two bundled downloadable content (DLC): The Master\
      \ Trials and The Champions' Ballad. The Master Trials adds gameplay modes, features, and items. In the Trial of the\
      \ Sword challenge, the player faces three trials, consisting of twelve, sixteen, and twenty-three rooms respectively.\
      \ Each room is full of enemies which the player must defeat before proceeding. Every room must be completed before the\
      \ player can claim their reward. The player begins with no equipment and will lose all progress if they receive a game\
      \ over. At the end of each trial the player's Master Sword has its attack power upgraded by ten points and the blue\
      \ sheen of its blade grows slightly. By the end of the third trial, the Master Sword will have doubled in attack power\
      \ and will glow blue. The pack also adds an option to play the game at a higher difficulty level, called \"Master Mode\"\
      , which adds faster rank leveling and raises the ranks of enemies by 1. The enemies are more perceptive when Link sneaks\
      \ near them and slowly regenerate health in battle. New floating platforms throughout the land offer enemies to battle\
      \ and treasure as a reward. The Hero's Path feature draws the player's path on the game's map, designed to help players\
      \ determine places they have not visited. The player can also find the hidden Travel Medallion to save Link's current\
      \ position as a single waypoint to which the player can transport Link at any time. New items include the Korok Mask,\
      \ which alerts the player when a Korok is nearby, and other themed cosmetics related to previous Zelda games.\n\nThe\
      \ Champions' Ballad was released on December 7, 2017. It added a new dungeon, additional story content, new gear, and\
      \ additional challenges, as well as the Master Cycle Zero, a motorcycle-like vehicle that Link can ride upon completing\
      \ the quest line.\n\nA \"Complete Edition\" containing all DLC on the game card was released in Japan on October 8,\
      \ 2021.\n\nReception\n\nBreath of the Wild was released to critical acclaim, with many calling the game a masterpiece\
      \ and one of the greatest video games of all time. On the review aggregator Metacritic, Breath of the Wild was the highest-rated\
      \ game of 2017 and holds the largest number of perfect reviews of any game from any year. Industry publications including\
      \ IGN, GameSpot, Polygon, Entertainment Weekly, Eurogamer, Electronic Gaming Monthly, GamesRadar+, and Game Informer\
      \ ranked Breath of the Wild the best game of 2017. According to Metacritic, Breath of the Wild topped 18 lists of the\
      \ decade's best games, more than any other game of the 2010s.\n\nThe open-world gameplay received praise. Jose Otero\
      \ of IGN described it as \"a masterclass in open-world design\" and \"a wonderful sandbox full of mystery, dangling\
      \ dozens upon dozens of tantalizing things in front of you that just beg to be explored\". GameSpot called it the most\
      \ impressive game Nintendo had made, writing that it \"takes designs and mechanics perfected in other games and reworks\
      \ them for its own purposes to create something wholly new, but also something that still feels quintessentially like\
      \ a Zelda game ... It's both a return to form and a leap into uncharted territory, and it exceeds expectations on both\
      \ fronts.\" Edge wrote that the game world was \"an absolute, and unremitting, pleasure to get lost in\" and that \"\
      the magic of being given all the tools in the opening hour is the knowledge that the solution to any problem is already\
      \ at your disposal, and you can always change tack\". According to Digital Trends, the ability to climb any surface\
      \ and glide across the map gave players freedom of movement that \"broke the genre open, pushing developers to rethink\
      \ how players interact with the world\" and \"putting extra thought into vertical design.\" In contrast to \"Ubisoft-style\"\
      \ games that filled the game's map with points of interests and objectives, Breath of the Wilds free-form exploration\
      \ encourage players to set their own objectives, marking the map with discoveries that serve as \"a record of what players\
      \ have accomplished.\"\n\nAccording to Kyle Orland of Ars Technica, \"after spending a week utterly immersed in Nintendo's\
      \ open-world reimagining of the tried-and-true Zelda formula, it's hard to return to the more formulaic entries of the\
      \ franchise's past\". Journalists commented on unexpected interactions between game elements, with serendipitous moments\
      \ proving popular on social media. Chris Plante of The Verge predicted that whereas prior open-world games tended to\
      \ feature prescribed challenges, Zelda would influence a new generation of games with open-ended problem-solving. Digital\
      \ Trends wrote that the game's level of experimentation allowed players to interact with and exploit the environment\
      \ in creative ways, resulting in various \"tricks\" still discovered years after release.\n\nReviewers lauded the sense\
      \ of detail and immersion. Kotaku recommended turning off UI elements in praise of the indirect cues that contextually\
      \ indicate the same information, such as Link shivering in the cold or waypoints appearing when using the scope. Reviewers\
      \ also commented on the unexpected permutations of interactions between Link, villagers, pets, and enemies, many of\
      \ which were shared widely on social media. A tribute to former Nintendo president Satoru Iwata, who died during development,\
      \ also attracted praise.\n\nJim Sterling was more critical than most, giving Breath of the Wild a 7/10 score. They criticized\
      \ the difficulty, weapon durability, and level design, but praised the open world and variety of content. Other criticism\
      \ focused on the unstable frame rate and the low resolution of 900p; updates addressed some of these problems.\n\nIn\
      \ a 2021 poll conducted by TV Asahi, polling over 50,000 Japanese users, Breath of the Wild was voted the best console\
      \ game of all time, above Dragon Quest V at number two.\n\nIn 2021, IGN listed Breath of the Wild as #1 in their list\
      \ of top 100 games of all time.\n\nSales\nBreath of the Wild broke sales records for a Nintendo launch game in multiple\
      \ regions. In Japan, the Switch and Wii U versions sold a combined 230,000 copies in the first week of release, with\
      \ the Switch version becoming the top-selling game released that week. In the UK, Breath of the Wild was the second-bestselling\
      \ retail game its week of release behind Horizon Zero Dawn, and became the third-bestselling Zelda game behind Wind\
      \ Waker and Twilight Princess. In the United States, Breath of the Wild was the second-bestselling video game during\
      \ its month of release behind Tom Clancy's Ghost Recon Wildlands. Nintendo reported that Breath of the Wild sold more\
      \ than one million copies in the US that month, 925,000 of which were for Switch – a 100% attach rate. In April 2017,\
      \ Nintendo reported it had sold 3.84 million copies of Breath of the Wild worldwide by the end of March, 1.08 million\
      \ for Wii U and 2.76 million for Switch, surpassing the Switch's global sales of 2.74 million for the same period. Nintendo\
      \ president Tatsumi Kimishima said that the attach rate of Breath of the Wild to the Switch was \"unprecedented\". By\
      \ March 2019, the game sold 14.27 million copies worldwide, 12.77 on the Switch and 1.61 on the Wii U, making Breath\
      \ of the Wild the best-selling game in the franchise. Total sales for the Switch version reached 25.80  million by December\
      \ 2021. It has sold 1.69 million copies on the Wii U.\n\nAwards\n\nFollowing its demonstration at E3 2016, Breath of\
      \ the Wild received several accolades from the Game Critics Awards and from publications such as IGN and Destructoid.\
      \ It was listed among the best games at E3 by Eurogamer, GameSpot, and GamesRadar+. In late 2016, Breath of the Wild\
      \ received two awards at Gamescom, and won the award for Most Anticipated Game at The Game Awards 2016.\n\nAfter its\
      \ release, Breath of the Wild won multiple awards at The Game Awards 2017, including Game of the Year, Best Game Direction,\
      \ and Best Action/Adventure Game, and was nominated for Best Art Direction, Best Score/Music, and Best Audio Design.\
      \ At the 2018 21st Annual D.I.C.E. Awards, it won Game of the Year among other awards.\n\nLegacy \n\nShortly after Breath\
      \ of the Wild release, journalists and video game industry figures discussed how it would influence future open-world\
      \ games and the Zelda series. Benjamin Plich, designer of Assassin's Creed: Unity and For Honor, said that he believed\
      \ developers would take inspiration from its focus on experimental and emergent gameplay, such as \"the ability to experiment\
      \ with things more freely, in an open way\" and having \"a powerful sense of autonomy and experimentation with the environment\
      \ and the tools at their disposal.\" Damien Monnier, designer of The Witcher 3: Wild Hunt, said Breath of the Wild \"\
      managed to bring classic open world mechanics together while not relying on them to guide the player through its world,\"\
      \ encouraging players to \"go and explore it because you wonder what's out there, not because a loot icon tells you\
      \ to.\" Its \"reactive physics\" sandbox design was \"a revelation for the open world genre at large\" according to\
      \ Screen Rant, and the game was noted for its experimental chemistry engine, emphasizing chemistry as much as physics.\
      \ PC Gamer wrote that the game \"[set] a standard the rest of the genre should live by.\"\n\nIn the years since its\
      \ release, multiple games and developers have cited Breath of the Wild as an inspiration. These include Genshin Impact,\
      \ Ghost of Tsushima, Immortals: Fenyx Rising, Telling Lies, Halo Infinite, and Elden Ring. Similarities have also been\
      \ noted between Breath of the Wild and other open world titles since its launch, including Pokemon Legends: Arceus,\
      \ Sonic Frontiers  and Horizon: Forbidden West. According to Digital Trends, Breath of the Wild has become a popular\
      \ point of comparison among open world games, \"approaching “It’s the Dark Souls of…” levels of cliché.\"\n\nThe game's\
      \ success sparked increased interest in the Wii U emulator Cemu, as the Cemu developers rapidly updated the software\
      \ to run the game at a steady frame rate within weeks of release.\n\nIn September 2020, Nintendo announced Hyrule Warriors:\
      \ Age of Calamity, a hack and slash game in the style of Dynasty Warriors series, following 2014's Hyrule Warriors.\
      \ Age of Calamity is a spin-off of Breath of the Wild, with the story set 100 years before. The game was released on\
      \ November 20, 2020, on the Nintendo Switch.\n\nSequel \n\nAn untitled sequel was announced at E3 2019 for the Switch.\
      \ It was conceived during planning for Breath of the Wild DLC; the team came up with too many ideas, some of which could\
      \ not be implemented due to technical constraints, so they decided to use their ideas for a new game. According to Aonuma,\
      \ the sequel will build atop the original's world with a new story and gameplay elements, and is inspired in part by\
      \ Red Dead Redemption 2. Fujibayashi will reprise his role as director. It was announced at E3 2021 that the game would\
      \ be released in 2022 and that players will be able to explore the sky of Hyrule with new mechanics.\n\nExplanatory\
      \ notes\n\nReferences\n\nExternal links \n \n \n \n\n2017 video games\nAction-adventure games\nAIAS Game of the Year\
      \ winners\nNintendo Entertainment Planning & Development games\nNintendo games\nNintendo Switch games\nOpen-world video\
      \ games\nPost-apocalyptic video games\nFantasy video games\nHigh fantasy video games\nSingle-player video games\nBreath\
      \ of the Wild\nVideo games about amnesia\nVideo games developed in Japan\nVideo games that use Amiibo figurines\nVideo\
      \ games using Havok\nVideo games with alternate endings\nVideo games with cel-shaded animation\nVideo games with downloadable\
      \ content\nWii U eShop games\nWii U games"
    - "Joshua Lawrence Chamberlain (born Lawrence Joshua Chamberlain, September 8, 1828February 24, 1914) was an American\
      \ college professor from Maine who volunteered during the American Civil War to join the Union Army. He became a highly\
      \ respected and decorated Union officer, reaching the rank of brigadier general (and brevet major general). He is best\
      \ known for his gallantry at the Battle of Gettysburg, for which he was awarded the Medal of Honor.\n\nChamberlain was\
      \ commissioned a lieutenant colonel in the 20th Maine Volunteer Infantry Regiment in 1862, and fought at the Battle\
      \ of Fredericksburg. He became commander of the regiment in June 1863 when losses at the Battle of Chancellorsville\
      \ elevated the original commander, Colonel Adelbert Ames, to brigade command. During the second day's fighting at Gettysburg\
      \ on July 2, Chamberlain's regiment occupied the extreme left of the Union lines at Little Round Top. Chamberlain's\
      \ men withstood repeated assaults from the 15th Alabama Infantry Regiment and finally drove the Confederates away with\
      \ a downhill bayonet charge. Chamberlain was severely wounded while commanding a brigade during the Second Battle of\
      \ Petersburg in June 1864, and was given what was intended to be a deathbed promotion to brigadier general. In April\
      \ 1865, he fought at the Battle of Five Forks and was given the honor of commanding the Union troops at the surrender\
      \ ceremony for the infantry of Robert E. Lee's Army at Appomattox Court House, Virginia.\n\nAfter the war, he entered\
      \ politics as a Republican and served four one-year terms of office as the 32nd Governor of Maine from 1867 to 1871.\
      \ After leaving office, he returned to his alma mater, Bowdoin College, serving as its president until 1883. He died\
      \ in 1914 at age 85 due to complications from the wound that he received at Petersburg.\n\nEarly life and education\n\
      Chamberlain was born in Brewer, Maine, the son of Sarah Dupee (née Brastow) and Joshua Chamberlain, on September 8,\
      \ 1828.  Chamberlain was of English ancestry and could trace his family line back to twelfth-century England, during\
      \ the reign of King Stephen. Chamberlain's great-grandfather Ebenezer, was a New Hampshire soldier in the French and\
      \ Indian War, and the American Revolutionary War. Chamberlain's grandfather Joshua, was a ship builder, and colonel\
      \ during the War of 1812, before moving his family to a Brewer farm in 1817. Chamberlain's father Joshua served as a\
      \ lieutenant-colonel in the Aroostook War.\n\nChamberlain was the first of five children.  His father named him after\
      \ James Lawrence, and favored a military career for his son, while Chamberlain's mother wanted him to become a minister.\
      \ Chamberlain became a member of the Congregational Church in Brewer in the mid-1840s, and attended Major Whiting's\
      \ military academy in Ellsworth.  Chamberlain then taught himself Greek so he could be admitted to Bowdoin College in\
      \ 1848. At college, Chamberlain was a member of the Peucinian Society, Phi Beta Kappa, and the Alpha Delta Phi fraternity.\
      \ He taught Sunday school in Brunswick during his freshman and sophomore years, and led the choir at the Congregational\
      \ Church-First Parish Church during his Junior and Senior years. Chamberlain graduated in 1852, then entered the Bangor\
      \ Theological Seminary for three years of study.  Besides studying in Latin and German, Chamberlain eventually mastered\
      \ French, Arabic, Hebrew and Syriac.\n\nOn 7 December 1855, Chamberlain married Fanny Adams, cousin and adopted daughter\
      \ of a local clergyman.  Their first child was a girl named Grace Dupee, born on 16 October 1856.  Their son Harold\
      \ Wylls was born on 10 October 1858.  A second and fourth child died early. In the fall of 1855, Chamberlain returned\
      \ to Bowdoin, and began a career in education, first as an instructor in logic and natural theology, then as professor\
      \ of rhetoric and oratory. He eventually went on to teach every subject in the curriculum with the exception of science\
      \ and mathematics. In 1861 he was appointed professor of modern languages, which he held until 1865.\n\nAmerican Civil\
      \ War\n\nEarly career\n\nAt the beginning of the American Civil War, Chamberlain believed the Union needed to be supported\
      \ against the Confederacy by all those willing. On several occasions, Chamberlain spoke freely of his beliefs during\
      \ his class, urging students to follow their hearts in regards to the war while maintaining that the cause was just.\
      \ Of his desire to serve in the War, he wrote to Maine's Governor Israel Washburn, Jr., \"I fear, this war, so costly\
      \ of blood and treasure, will not cease until men of the North are willing to leave good positions, and sacrifice the\
      \ dearest personal interests, to rescue our country from desolation, and defend the national existence against treachery.\"\
      \ Many faculty at Bowdoin did not feel his enthusiasm for various reasons and Chamberlain was subsequently granted a\
      \ leave of absence (supposedly to study languages for two years in Europe). He then promptly enlisted unbeknownst to\
      \ those at Bowdoin and his family. Offered the colonelcy of the 20th Maine Regiment, he declined, according to his biographer,\
      \ John J. Pullen, preferring to \"start a little lower and learn the business first.\" He was appointed lieutenant colonel\
      \ of the regiment on August 8, 1862, under the command of Col. Adelbert Ames. The 20th was assigned to the 3rd Brigade,\
      \ 1st Division, V Corps in the Union Army of the Potomac.  One of Chamberlain's younger brothers, Thomas Chamberlain,\
      \ was also an officer of the 20th Maine, and another, John Chamberlain, visited the regiment at Gettysburg as a member\
      \ of the U.S. Christian Commission until appointed as a chaplain in another Maine Volunteer regiment.\nThe 20th Maine\
      \ fought at the Battle of Fredericksburg, suffering relatively small numbers of casualties in the assaults on Marye's\
      \ Heights, but were forced to spend a miserable night on the freezing battlefield among the many wounded from other\
      \ regiments. Chamberlain chronicled this night well in his diary and went to great length discussing his having to use\
      \ bodies of the fallen for shelter and a pillow while listening to the bullets zip into the corpses.\nThe 20th missed\
      \ the Battle of Chancellorsville in May 1863 due to an outbreak of smallpox in their ranks (which was caused by an errant\
      \ smallpox vaccine), keeping them on guard duty in the rear. Chamberlain was promoted to colonel of the regiment in\
      \ June 1863 upon the promotion of Ames.\n\nBattle of Gettysburg\n\nChamberlain became most famous for his achievements\
      \ during the Battle of Gettysburg. On July 2, the second day of the battle, Union forces were recovering from initial\
      \ setbacks and hastily regrouping into defensive positions on a line of hills south of the town. Sensing the momentary\
      \ vulnerability of the Union forces, the Confederates began an attack against the Union left flank. Chamberlain's brigade,\
      \ commanded by Col. Strong Vincent, was sent to defend Little Round Top by the army's Chief of Engineers, Brig. Gen.\
      \ Gouverneur K. Warren. Chamberlain found himself and the 20th Maine at the far left end of the entire Union line. He\
      \ quickly understood the strategic significance of the small hill, and the need for the 20th Maine to hold the Union\
      \ left at all costs. The men from Maine waited until troops from the 15th Alabama Infantry Regiment, commanded by Col.\
      \ William C. Oates, charged up the hill, attempting to flank the Union position. Time and time again the Confederates\
      \ struck, until the 20th Maine was almost doubled back upon itself. With many casualties and ammunition running low,\
      \ Col. Chamberlain recognized the dire circumstances and ordered his left wing (which was now looking southeast, compared\
      \ to the rest of the regiment, which was facing west) to initiate a bayonet charge. From his report of the day: \"At\
      \ that crisis, I ordered the bayonet. The word was enough.\" While battlefield conditions make it unlikely that many\
      \ men heard Chamberlain's order, most historians believe he initiated the charge.\n\nThe 20th Maine charged down the\
      \ hill, with the left wing wheeling continually to make the charging line swing like a hinge, thus creating a simultaneous\
      \ frontal assault and flanking maneuver, capturing 101 of the Confederate soldiers and successfully saving the flank.\
      \ This version of the battle was popularized by the book The Killer Angels and the movie Gettysburg. Chamberlain sustained\
      \ one slight wound in the battle, one when a shot hit his sword scabbard and bruised his thigh. Chamberlain also personally\
      \ took a Confederate prisoner with his saber during the charge. After initiating the maneuver, he came upon a Confederate\
      \ officer wielding a revolver who quickly fired, narrowly missing his face. Chamberlain remained steadfast, and with\
      \ his sword at the officer's throat accepted the man's arms and surrender. The pistol Chamberlain captured at Gettysburg\
      \ can still be seen on display in the Civil War exhibit of the Maine State Museum. For his tenacity at defending Little\
      \ Round Top, he was known by the sobriquet Lion of the Round Top. Prior to the battle, Chamberlain was quite ill, developing\
      \ malaria and dysentery. Later, due to this illness, he was taken off active duty until he recovered.\n\nFor his \"\
      daring heroism and great tenacity in holding his position on the Little Round Top against repeated assaults, and carrying\
      \ the advance position on the Great Round Top\", Chamberlain was awarded the Medal of Honor.\n\nMedal of Honor citation\n\
      \nSiege of Petersburg\n\nIn April 1864, Chamberlain returned to the Army of the Potomac and was promoted to brigade\
      \ commander shortly before the Siege of Petersburg and given command of the 1st Brigade, First Division, V Corps. In\
      \ a major action on June 18, during the Second Battle of Petersburg, Chamberlain was shot through the right hip and\
      \ groin, the bullet exiting his left hip. Despite the injury, Chamberlain withdrew his sword and stuck it into the ground\
      \ in order to keep himself upright to dissuade the growing resolve for retreat. He stood upright for several minutes\
      \ until he collapsed and lay unconscious from loss of blood. The wound was considered mortal by the division's surgeon,\
      \ who predicted he would perish; Chamberlain's incorrectly recorded death in battle was reported in the Maine newspapers,\
      \ and Lt. Gen. Ulysses S. Grant gave Chamberlain a battlefield promotion to the rank of brigadier general after receiving\
      \ an urgent recommendation on June 19 from corps commander Maj. Gen. Gouverneur K. Warren: \"He has been recommended\
      \ for promotion for gallant and efficient conduct on previous occasion and yesterday led his brigade against the enemy\
      \ under most destructive fire. He expresses the wish that he may receive the recognition of his services by promotion\
      \ before he dies for the gratification of his family and friends.\" Not expected to live, Chamberlain displayed surprising\
      \ will and courage, and with the support of his brother Tom, was back in command by November. Although many, including\
      \ his wife Fanny, urged Chamberlain to resign, he was determined to serve through the end of the war.\n\nIn early 1865,\
      \ Chamberlain regained command of the 1st Brigade of the 1st Division of V Corps, and he continued to act with courage\
      \ and resolve. On March 29, 1865, his brigade participated in a major skirmish on the Quaker Road during Grant's final\
      \ advance that would finish the war. Despite losses, another wound (in the left arm and chest that almost caused amputation),\
      \ and nearly being captured, Chamberlain was successful and brevetted to the rank of major general by President Abraham\
      \ Lincoln. Chamberlain gained the name \"Bloody Chamberlain\" at Quaker Road. Chamberlain kept a Bible and framed picture\
      \ of his wife in his left front \"chest\" pocket. When a Confederate shot at Chamberlain, the bullet went through his\
      \ horse's neck, hit the picture frame, entered under Chamberlain's skin in the front of his chest, traveled around his\
      \ body under the skin along the rib, and exited his back. To all observers Union and Confederate, it appeared that he\
      \ was shot through his chest. He continued to encourage his men to attack.\n\nAppomattox\n\nOn the morning of April\
      \ 9, 1865, Chamberlain learned of the desire by General Robert E. Lee to surrender the Army of Northern Virginia when\
      \ a Confederate staff officer approached him under a flag of truce. \"Sir,\" he reported to Chamberlain, \"I am from\
      \ General Gordon. General Lee desires a cessation of hostilities until he can hear from General Grant as to the proposed\
      \ surrender.\" The next day, Chamberlain was summoned to Union headquarters where Maj. Gen. Charles Griffin informed\
      \ him that he had been selected to preside over the parade of the Confederate infantry as part of their formal surrender\
      \ at Appomattox Court House on April 12.\n\nChamberlain was thus responsible for one of the most poignant scenes of\
      \ the American Civil War. As the Confederate soldiers marched down the road to surrender their arms and colors, Chamberlain,\
      \ on his own initiative, ordered his men to come to attention and \"carry arms\" as a show of respect. In memoirs written\
      \ forty years after the event, Chamberlain described what happened next:\n\nChamberlain stated that his salute to the\
      \ Confederate soldiers was unpopular with many Unionists, but he defended his action in his posthumously published 1915\
      \ memoir The Passing of the Armies. Many years later, Gordon, in his own memoirs, called Chamberlain \"one of the knightliest\
      \ soldiers of the Federal Army.\" Gordon never mentioned the anecdote until after he read Chamberlain's account, more\
      \ than 40 years later.\n\nIn his book Hymns of the Republic: The Story of the Final Year of the American Civil War,\
      \ S. C. Gwynne states that this particular account is \"one of the most cherished of the bogus Appomattox stories\"\
      , claiming that \"there is no convincing evidence that it ever happened\" and that \"none of the thirty thousand other\
      \ people who saw the surrender noted any such event\" (p. 298). \"The source was Chamberlain, a true hero and, also,\
      \ in subsequent years, one of the great embellishers of the war. His memoirs are an adjectival orgy, often reflecting\
      \ the world as he wanted it to be instead of the way it was. For one thing, he did not command the troops at the ceremony,\
      \ as he claimed, and thus couldn’t order the men to salute. His story, moreover, changed significantly over the years.\"\
      \ Gwynne also states that \"Its staying power was mostly rooted in the fact that Gordon never refuted it. The rebel\
      \ general apparently liked it, and it reflected well on him, as the time went by Gordon added his own liberal embellishments,\
      \ including the suggestion that Lee himself had led the Army through town. The two generals would clearly have preferred\
      \ this distinctly Walter Scott-like sequence, described in countless books and memoirs, to the decidedly less romantic\
      \ one that actually took place.\" Gywnne's cited reference for this disclosure is Lee's Last Retreat by William Marvel\
      \ (pp. 194–95).\n\nIn all, Chamberlain served in 20 battles and numerous skirmishes, was cited for bravery four times,\
      \ had six horses shot from under him, and was wounded six times.\n\nPost-war service\n\n \nChamberlain left the U.S.\
      \ Army soon after the war ended, going back to his home state of Maine. Due to his immense popularity, he served as\
      \ Governor of Maine for four one-year terms after he won election as a Republican. His victory in 1866 set the record\
      \ for the most votes and the highest percentage for any Maine governor by that time. He would break his own record in\
      \ 1868. During his time in office, he was attacked by those angered by his support for capital punishment and by his\
      \ refusal to create a special police force to enforce the prohibition of alcohol.\n\nAfter leaving political office,\
      \ he returned to Bowdoin College. He was originally offered the presidency of the new state university in Orono, but\
      \ declined, hoping for the same position at his alma mater. That came in 1871, he was appointed president of Bowdoin\
      \ and remained in that position until 1883, when he was forced to resign because of ill health from his war wounds.\
      \ He also served as an ex-officio trustee of nearby Bates College from 1867 to 1871.\n\nIn January 1880, there was a\
      \ dispute about who was the newly elected governor of Maine, and the Maine State House was occupied by a band of armed\
      \ men. The outgoing governor, Alonzo Garcelon, summoned Chamberlain, the commander of the Maine Militia, to take charge.\
      \ Chamberlain sent home the armed men, and arranged for the Augusta police to keep control. He stayed in the State House\
      \ most of the twelve-day period until the Maine Supreme Judicial Court's decision on the election results was known.\
      \ During this time, there were threats of assassination and kidnapping, and on one occasion, he went outside to face\
      \ down a crowd of 25–30 men intending to kill him, and both sides offered bribes to appoint him a United States senator.\
      \ Having gratified neither side in the dispute, he did not become a senator, and his career in state politics ended.\n\
      \nLater life\nAfter resigning from Bowdoin in 1883, he went to New York City to practice law. Chamberlain served as\
      \ Surveyor of the Port of Portland, Maine, a federal appointment, and engaged in business activities, including real\
      \ estate dealings in Florida (1885) and a college of art in New York, as well as hotels. He traveled to the West Coast\
      \ to work on railroad building and public improvements. From the time of his serious wound in 1864 until his death,\
      \ he was forced to wear an early form of a catheter with a bag and underwent six operations to try to correct the original\
      \ wound and stop the fevers and infections that plagued him, without success.\n\nIn 1893, 30 years after the battle\
      \ that made the 20th Maine famous, Chamberlain was awarded the Medal of Honor for his actions at Gettysburg. The citation\
      \ commends him for his \"Daring heroism and great tenacity in holding his position on the Little Round Top against repeated\
      \ assaults, and carrying the advance position on the Great Round Top.\" As in many other Civil War actions, controversy\
      \ arose when one of his subordinate officers stated that Chamberlain never actually ordered a charge at Gettysburg.\
      \ The claim never seriously affected Chamberlain's fame or notability however. This original medal was lost, and later\
      \ rediscovered in 2013, and donated to the Pejepscot Historical Society in Brunswick, Maine. A second, redesigned medal\
      \ issued in 1904 is currently housed at Bowdoin College.\n[Note: In 1898, Chamberlain at the age of 70 and afflicted\
      \ with his multiple Civil War wound disabilities, offered his services to the nation again volunteering to command US\
      \ Army forces in the Spanish American War. Despite persistent efforts with Acting Secretary Alger in the War Department\
      \ and the President he was denied the opportunity due to his health issues. Ironically, his principal opponent at Gettysburg,\
      \ former Colonel William C. Oates CSA (15th Alabama Regiment), was appointed in his place as a Brigadier General of\
      \ US Volunteers.]\n\nIn 1905, Chamberlain became a founding member of the Maine Institution for the Blind, in Portland,\
      \ now called The Iris Network. Chamberlain's wife herself was visually impaired, which led him to serve on the organization's\
      \ first board of directors.\n\nBeginning with his first election as governor of Maine and continuing to the end of his\
      \ life, Chamberlain was active in the Grand Army of the Republic. Despite continual pain and discomfort from his wounds\
      \ of 1864, he made many return visits to Gettysburg and delivered speeches at soldiers' reunions. He made his last known\
      \ visit on May 16 and 17, 1913, while involved in planning the 50th anniversary reunion. Because of deteriorating health,\
      \ he was unable to attend the reunion less than two months later.\n\nDeath\nChamberlain died of his lingering wartime\
      \ wounds in 1914 in Portland, Maine, at the age of eighty-five. He is interred at Pine Grove Cemetery in Brunswick,\
      \ Maine. Beside him as he died was Dr. Abner O. Shaw of Portland, one of the two surgeons who had operated on him in\
      \ Petersburg 50 years previously. A full study of his medical history strongly suggests that it was complications from\
      \ the wound suffered at Petersburg that resulted in his death. He was the last Civil War veteran to die as a result\
      \ of wounds from the war and considered by some the last casualty of the war.\n\nLegacy\n\nChamberlain's home, located\
      \ across Maine Street from the Bowdoin College campus, is now the Joshua L. Chamberlain Museum and is owned by the Pejepscot\
      \ Historical Society, which maintains an extensive research collection on Chamberlain. Memorabilia on display include\
      \ the minié ball that almost ended his life at Petersburg, his original Medal of Honor, and Don Troiani's original painting\
      \ of the charge at Little Round Top. Tours of the home are conducted by volunteer docents from late May until mid-October.\n\
      \nUS Route 1A is carried across the Penobscot River between Bangor and Brewer, Maine by the Joshua Chamberlain Bridge,\
      \ a two-lane steel plate girder bridge opened on November 11, 1954.\n\nThe village of Chamberlain, Maine, in the town\
      \ of Bristol, is named for him.\n\nMedal of Honor\nIn September 2013, the original Medal of Honor awarded to Chamberlain\
      \ in 1893 was donated to the Pejepscot Historical Society, which owns the Joshua L. Chamberlain Museum in Brunswick,\
      \ after being authenticated by the Maine State Museum, the Library of Congress, the Smithsonian Institution, and the\
      \ Awards and Decorations Branch of the Department of the Army. The donor, who chose to remain anonymous, found it in\
      \ the back of a book bought during a church sale at the First Parish Church in Duxbury, Massachusetts; Chamberlain's\
      \ granddaughter Rosamond Allen, his last surviving descendant, had donated her estate to that church upon her death\
      \ in 2000. Chamberlain's alma mater of Bowdoin College has a 1904 Medal of Honor belonging to Chamberlain in its possession.\
      \ The original 1893 medal is on display at the Chamberlain Museum.\n\nBibliography\n\n Maine, Her Place in History,\
      \ his speech at the Centennial Exhibition (1877)\n Ethics and Politics of the Spanish War (1898)\n Universities and\
      \ Their Sons, editor (1898)\n Property: Its Office and Sanction (1900)\n De Monts and Acadia (1904)\n Ruling Powers\
      \ in History (1905)\n The Passing of the Armies (1915)\nA special edition of his Paris report on \"Education in Europe\"\
      \ was published by the United States government (Washington, 1879).\n\nCommand history\nLieutenant Colonel (second in\
      \ command under Adelbert Ames), 20th Maine (August 8, 1862)\nColonel, commanding 20th Maine (May 20, 1863)\nCommanding\
      \ 3rd Brigade, 1st Division, V Corps (August 26 – November 19, 1863)\nCommanding 1st Brigade (June 6–18, 1864)\nBrigadier\
      \ General of Volunteers (June 18, 1864)\nCommanding 1st Brigade (November 19, 1864 – January 5, 1865)\nCommanding 1st\
      \ Brigade (February 27 – April 11, 1865)\nBrevet Major General of Volunteers (March 29, 1865)\nCommanding 1st Division\
      \ (April 20 – June 28, 1865)\nCommanding 1st Brigade, 3rd Division, Wright's Provisional Corps, Middle Department (June\
      \ 28 – July, 1865)\nMustered out of volunteer service (January 15, 1866)\n\nIn popular culture\nChamberlain emerged\
      \ as a key character in Michael Shaara's Pulitzer Prize–winning historical novel about Gettysburg, The Killer Angels\
      \ (1974), and in a prequel novel by his son, Jeff Shaara, Gods and Generals (1996). Chamberlain is portrayed by actor\
      \ Jeff Daniels in the films Gettysburg (1993) and Gods and Generals (2003), based on the books. His portrayal in these\
      \ books and films significantly enhanced Chamberlain's reputation in the general public, making him into a more popular\
      \ and well known figure.\n\nTom Eishen's historical novel Courage on Little Round Top is a detailed look at Chamberlain\
      \ as well as Robert Wicker, the young Confederate officer who fired his pistol at Chamberlain's head during the 20th\
      \ Maine's historic charge down Little Round Top.\n\nKen Burns's 1990 nine-part PBS film The Civil War featured Chamberlain\
      \ prominently.\n\nSteve Earle's song \"Dixieland\" from his album The Mountain refers to Chamberlain and the Battle\
      \ of Gettysburg:\n\nThe book The Lost Regiment and the subsequent series by author William R. Forstchen chronicle the\
      \ adventures of the \"35th Maine\", a Union regiment from Maine having been transported to an alien planet. The regiment\
      \ was based on the 20th Maine, with the main character and commander of the regiment, Andrew Lawrence Keane, also being\
      \ a college professor.\n\nIn the alternate history 2003 novel Gettysburg: A Novel of the Civil War, written by Forstchen\
      \ and Newt Gingrich, Chamberlain is featured as a character.  In the book, an alternate history of the Civil War, Chamberlain\
      \ makes a heroic stand similar to the real life battle on Little Round Top.  Unlike in real life, Chamberlain is overwhelmed,\
      \ wounded, and forced to surrender, but he survives and returns in the third book of the series, Never Call Retreat\
      \ (2005).\n\nA musical, Chamberlain: A Civil War Romance, with book and lyrics by Sarah Knapp and music by Steven M.\
      \ Alper was commissioned by Maine State Music Theatre in 1993 and received its premiere at that theatre in July, 1996.\
      \ That production starred Mark Jacoby as Chamberlain and Sarah Knapp as Fannie Chamberlain. It was revived in a revised\
      \ form by Maine State in 2014. According to its bookwriter, the musical is \"an exploration of the perennial conflict\
      \ between public duty and private devotion. This musical ... not only celebrates a great Civil War hero, but also examines\
      \ a universal theme: How a person's sense of duty and destiny affect his personal life.\"\n\nAnother Forstchen work,\
      \ \"A Hard Day For Mother\", is a short story from the first volume in the variety anthology series Alternate Generals\
      \ edited by Harry Turtledove. That work is based on the premise of: \"what if Chamberlain was on the Confederate side\
      \ at Gettysburg?\" The story assumes that a decade before the outbreak of the Civil War Chamberlain had taken a teaching\
      \ job at a Virginia military academy and developed a love for the state of Virginia; that with the outbreak of war he\
      \ joined the Confederate side under Robert E. Lee; that in Gettysburg he gained the Little Round Top for the Confederacy,\
      \ fighting against his own brother Tom commanding the 20th Maine; that thereby Chamberlain won the battle and the entire\
      \ war for the Confederacy; that he later remained in the independent Confederacy and was eventually elected its President;\
      \ and that his reconciliatory attitude towards the North led to Confederacy and the United States eventually holding\
      \ referendums and freely deciding to re-unite in 1914, following Chamberlain's death.\n\nOn the Showtime TV series Homeland,\
      \ the character Nicholas Brody tells his family the story of Chamberlain, encouraging them to emulate him.\n\nIn the\
      \ song \"Ballad of the 20th Maine\" by The Ghost of Paul Revere (Maine's official state ballad):\nThe book Percy Jackson\
      \ and the Sea Of Monsters by author Rick Riordan hints at Chamberlain being a demigod, stating that he single-handedly\
      \ changed the course of the civil war.\n\nSee also\n\n List of Medal of Honor recipients for the Battle of Gettysburg\n\
      \ List of American Civil War Medal of Honor recipients: A–F\n List of American Civil War generals (Union)\n\nReferences\n\
      \nCitations\n\nGeneral references\n\nFurther reading\n\n Rasbach, Dennis A. Joshua Lawrence Chamberlain and the Petersburg\
      \ Campaign: His Supposed Charge from Fort Hell, his Near-Mortal Wound, and a Civil War Myth Reconsidered. El Dorado\
      \ Hills, CA: Savas Beatie, 2016. .\n\nExternal links\n\n Joshua Chamberlain Seeks Assistance for Jaffa Adams Colonists,\
      \ 1867 Shapell Manuscript Foundation\n Joshua Lawrence Chamberlain Digital Archive at Bowdoin College\n Chamberlain-Adams\
      \ Family Papers. Schlesinger Library, Radcliffe Institute, Harvard University.\n www.joshualawrencechamberlain.com A\
      \ collection of primary resources\n Index to Joshua Lawrence Chamberlain's Pages\n Joshua Lawrence Chamberlain Biography\n\
      \ Joshua Chamberlain: Maine's Favorite Son\n Tribute to Major General Joshua Lawrence Chamberlain\n Joshua L. Chamberlain,\
      \ a Biographical Essay\n Medal of Honor recipients on Film\n Joshua L. Chamberlain Museum in Brunswick, Maine Managed\
      \ by the Pejepscot Historical Society\n The Iris Network (formerly the Maine Institution for the Blind)\n \n\n1828 births\n\
      1914 deaths\n19th-century American politicians\nBusinesspeople from Maine\nAmerican Civil War recipients of the Medal\
      \ of Honor\nAmerican Congregationalists\nEducators from Maine\nBangor Theological Seminary alumni\nBowdoin College alumni\n\
      Bowdoin College faculty\nGovernors of Maine\nHistorians of the American Civil War\nMaine Republicans\nPeople from Brewer,\
      \ Maine\nPeople of Maine in the American Civil War\nPoliticians from Bangor, Maine\nPoliticians from Portland, Maine\n\
      Presidents of Bowdoin College\nRepublican Party state governors of the United States\nUnion Army generals\nUnited States\
      \ Army Medal of Honor recipients\nWriters from Brunswick, Maine\nMilitary personnel from Maine\nBurials at Pine Grove\
      \ Cemetery (Brunswick, Maine)\nAmerican people of English descent\n19th-century American businesspeople"
