      \nDès 1883, les bataillons (, ) du  RE sont envoyés au Tonkin. Ils prennent Sontay le . Du  au , les  de Tuyen-Quang\
      \ dont  repoussent  chinois.\n\nEn 1892, le  RE est engagé au Dahomey (actuel Bénin) et débarquent à Cotonou le . Ils\
      \ combattent en septembre et en octobre. Les  de la colonne Faurax affrontent des milliers de combattants du roi Béhanzin\
      \ et rembarquent victorieux le .\n\nEntre 1892 et 1894, les compagnies du  RE interviennent également au Soudan. Le\
      \ , les légionnaires du lieutenant Betheder et du sergent Minnaêrt  se battent avec acharnement à Bossé. Ils perdent\
      \  et blessés au prix d'une victoire qui verra cet héroïque sergent (qui s'est déjà distingué au Tonkin) décoré de la\
      \ Légion d'honneur pour sa vaillance au feu.\n\nEn 1895-96, le régiment fait partie de l'expédition qui va conquérir\
      \ Madagascar. Si les combats voient l'ennemi vite céder du terrain, les conditions climatiques sont terribles et causent\
      \ des ravages. les pertes par maladies sont énormes (). Les légionnaires s'épuisent à donner le maximum sans se plaindre.\
      \ On a coutume de dire dans tout le corps expéditionnaire : « quand un troupier de France rentre à l'hôpital, c'est\
      \ pour être rapatrié, un tirailleur c'est pour guérir, un légionnaire c'est pour mourir ». La pacification débute en\
      \ 1895 et s'étend jusqu'en 1905, date du retour définitif des unités du  RE sur l'Algérie.\n\nL'épopée marocaine commence\
      \ dès 1906. Le , le chef de bataillon Provost est tué à Casablanca en repoussant une violente attaque. En 1908, le \
      \ RE se distingue à Menabah. en 1911, la  du capitaine Labordette perd  dont son chef à Alouana.\n\nPremière Guerre\
      \ mondiale \nLe régiment ne participe pas directement à la Grande guerre. Il continue à administrer l'institution et\
      \ à fournir les effectifs pour l'ensemble des unités engagées. En 1914, il forme la totalité ou l'ossature de plusieurs\
      \ unités.\n\n : le  RE fournit l'effectif complet du  RM du  RE (constitué des , , ). Ces unités combattront   au prix\
      \ de  et s'illustrent à Taza ou à Sidi-Amar. Le  RM sera dissout le  et ses bataillons et compagnies montées deviennent\
      \ autonomes.\n\n : le  RE fournit l'ossature des  RM,  RM et  RM (« Légion garibaldienne ») engagés en France, dont\
