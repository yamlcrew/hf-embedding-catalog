    \ (1863)\n\nPersonnalités ayant servi au sein du régiment \n\n Eugene Bullard\n Capitaine Jean Danjou\n Joseph Arthur\
    \ Dufaure du Bessol alors capitaine\n Siegfried Freytag, as de l'aviation allemande\n le général de brigade Peppino Garibaldi\
    \ avec ses 5 frères, dont deux meurent lors des combats en Argonne en 1915\n Lord Kitchener of Khartoum\n Pierre  de Serbie\n\
    \nUn certain nombre de Compagnons de la Libération ont servi au  RE :\n\n Gabriel Bablon\n Henri Bénévène\n Joseph Bakos\n\
    \ Hermann Eckstein\n Georges Ungerman\n\nLe régiment aujourd'hui\n\nMissions \nLa mission principale du régiment est de\
    \ soutenir le commandement de la Légion étrangère qui est chargé de la gestion administrative de toute la Légion, et des\
    \ spécificités qui y sont rattachées.\n\nOrganisation \nLe  étranger est articulé en trois compagnies d'effectifs très\
    \ variables :\n\n La CCSR, ou compagnie de commandement et des services régimentaire, regroupe tous les services contribuant\
    \ au bon fonctionnement de la vie quotidienne de l'unité (cuisines, infirmerie, ateliers mécaniques, pionniers, etc.)\
    \ ;\n La CSLE ou compagnie des services de la Légion étrangère, compte quant à elle les services propres au fonctionnement\
    \ de la Légion en général (division des ressources humaines, de la sécurité, histoire et patrimoine, communication, musique\
    \ de la Légion étrangère, etc.) ;\n La CAPLE ou compagnie administrative de la Légion étrangère s'occupe plus particulièrement\
    \ de l'accueil des candidats à l'engagement, de la sélection, de l'administration du personnel « hors corps » (grands\
    \ malades, etc.). Elle comptait aussi en son sein l'équipe de cross jusqu'en 2012 avant que celle-ci ne disparaisse au\
    \ profit d'une section du club sportif.\n\nLe régiment a la particularité d'avoir plusieurs emprises :\n l'Institution\
    \ des invalides de la Légion étrangère (IILE) à Puyloubier (Bouches-du-Rhône) accueille les anciens dans une structure\
    \ médicalisée leur permettant, pour les plus valides, de continuer à travailler ;\n le Centre d'hébergement et d'accueil\
    \ de la Légion étrangère (CHALE) à La Ciotat (Bouches-du-Rhône) qui permet d'héberger les légionnaires en permission longue\
    \ durée avec ou sans leurs familles ;\n le Centre de Convalescence et des permissionnaires de la Légion étrangère de La\
    \ Malmousque (CCPLEM) à Marseille (Bouches-du-Rhône) qui accueille les légionnaires blessés et permissionnaires célibataires.\n\
    \ la Maison du Légionnaire à Auriol (13) qui accueille des anciens légionnaires valides en pension complète. Cette Maison\
    \ a été fondée en 1934 par le Général Rollet\n\nMatériels \nLe  RE est un régiment à vocation administrative qui n'a pas\
    \ de matériels majeurs.\n\nBibliographie \n Service d'Information et de Relations Publique de l'Armée de Terre (SIRPA\
    \ Terre)\n Division communication et information de la Légion étrangère\n Camerone, Pierre Sergent, Éditions Fayard, 1980\
    \ – \n L'armée d'Afrique 1930-1962, Collectif, Éditions Lavauzelle, 1980.\n Histoire de la Légion, de Narvik à Kolwesi,\
    \ Henri Le Mire, Éditions Albin Michel, 1978 – \n Le  Étranger, Tibor Szecsko et Philippe Cart Tanneur, Éditions B.I.P,\
    \ 1986 -\n\nNotes et références\n\nVoir aussi\n\nArticles connexes \n Légion étrangère\n Commandement de la Légion étrangère\n\
    \ Pionniers de la Légion étrangère\n  étranger de cavalerie\n  étranger\n  étranger de parachutistes\n  étranger de génie\n\
