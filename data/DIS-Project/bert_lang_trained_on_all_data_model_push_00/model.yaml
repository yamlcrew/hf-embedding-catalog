    \ du lieutenant Betheder et du sergent Minnaêrt  se battent avec acharnement à Bossé. Ils perdent  et blessés au prix\
    \ d'une victoire qui verra cet héroïque sergent (qui s'est déjà distingué au Tonkin) décoré de la Légion d'honneur pour\
    \ sa vaillance au feu.\n\nEn 1895-96, le régiment fait partie de l'expédition qui va conquérir Madagascar. Si les combats\
    \ voient l'ennemi vite céder du terrain, les conditions climatiques sont terribles et causent des ravages. les pertes\
    \ par maladies sont énormes (). Les légionnaires s'épuisent à donner le maximum sans se plaindre. On a coutume de dire\
    \ dans tout le corps expéditionnaire : « quand un troupier de France rentre à l'hôpital, c'est pour être rapatrié, un\
    \ tirailleur c'est pour guérir, un légionnaire c'est pour mourir ». La pacification débute en 1895 et s'étend jusqu'en\
    \ 1905, date du retour définitif des unités du  RE sur l'Algérie.\n\nL'épopée marocaine commence dès 1906. Le , le chef\
    \ de bataillon Provost est tué à Casablanca en repoussant une violente attaque. En 1908, le  RE se distingue à Menabah.\
    \ en 1911, la  du capitaine Labordette perd  dont son chef à Alouana.\n\nPremière Guerre mondiale \nLe régiment ne participe\
