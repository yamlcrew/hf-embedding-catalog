    \ 1883, les bataillons (, ) du  RE sont envoyés au Tonkin. Ils prennent Sontay le . Du  au , les  de Tuyen-Quang dont\
    \  repoussent  chinois.\n\nEn 1892, le  RE est engagé au Dahomey (actuel Bénin) et débarquent à Cotonou le . Ils combattent\
    \ en septembre et en octobre. Les  de la colonne Faurax affrontent des milliers de combattants du roi Béhanzin et rembarquent\
