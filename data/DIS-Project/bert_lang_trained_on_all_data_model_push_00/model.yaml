      \ à l'origine de  du  REI et  du  REI. L'état-major vient du  REI et le chef de bataillon du  REI. Perdant  au feu,\
      \ le bataillon de Légion du RMA sera cité à  dont 2 à l'ordre de l'armée avant d'être dissout en 1917.\n\nAu Tonkin,\
