      \ d'abord à la pacification de l'Algérie puis est acheminé en Crimée (1853-1856) où il forme une brigade avec son régiment\
      \ frère, le  RE, au sein de la . Il participe à la bataille de l'Alma et au siège de Sébastopol. Son chef de corps,\
      \ le colonel Vienot, est tué au combat le . Le , les ouvrages blancs sont enlevés. Enfin, il participe à la prise de\
      \ la tour de Malakoff le .\n\nLe régiment participe ensuite à la campagne d'Italie en 1859, au sein de la  d'infanterie\
      \ du  d'armée (Mac Mahon), et s'illustre lors de la bataille de Magenta. il rentre triomphalement dan Milan libérée\
      \ le .\n\nÀ son retour en Algérie, il est licencié le  par décret impérial. Ses effectifs sont reversés au  Etranger\
      \ qui change d'appellation le  et devient le Régiment étranger.\n\n1861-1867 : expédition du Mexique. Le régiment arrive\
      \ au Mexique le  et débarque le  à Veracruz. Sa  se couvre de gloire en se sacrifiant lors de la Bataille de Camerone\
      \ le . Les  et  participent au siège d'Oaxaca qui capitule en . Le  perd le   au combat de Santa Isabel. Le  de la même\
      \ année, le régiment quitte le Mexique.\n\nLors de la Guerre de 1870-1871, la Légion est tardivement engagée. C'est\
      \ fin  que le régiment est intégré dans le  (, ) et se trouve engagé vers Orléans (ou le régiment refuse par 3 fois\
      \ l'ordre de retraiter et où s'illustre le sous-lieutenant à titre étranger Kara, futur Pierre  de Serbie) en  et  puis\
      \ à Montbéliard en  où il oblige les Allemands à quitter la ville.\n\n1871 à 1914 \nDurant la Commune de Paris en 1871,\
      \ le régiment participe avec l'armée versaillaise à la semaine sanglante.\n\nLe régiment retourne en Algérie en  (Mascara\
      \ près d'Oran).\n\nLe  la « Légion étrangère », nom donné au Régiment étranger le , se dédouble en deux régiments étrangers\
      \ constitués chacun de  et d'une compagnie de dépôt.\n\nLors de l'expédition de Madagascar en 1895-1896, il forme avec\
      \ le  un bataillon de marche qui dépend du Régiment Algérie, de l'armée d'Afrique sous les ordres du colonel Oudri du\
      \  étranger.\n\nEn 1881, le  RE est engagé au Maroc (combats de Chellaha du ) et dans le Sud Oranais (combat de Chott\
