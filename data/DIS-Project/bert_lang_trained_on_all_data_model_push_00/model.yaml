- source_sentence: ما هو تأثير استخدام عقاقير الخصوبة التي تسبب فرط التحفيز على معدلات الولادات المتعددة؟
  sentences:
  - "جزيرة تاروت هي جزيرة سعودية تقع في الخليج العربي، وتتبع إدارياً محافظة القطيف إحدى محافظات المنطقة الشرقية. وتعتبر رابع\
    \ أكبر جزيرة في الخليج العربي بعد قشم وبوبيان ومملكة البحرين، ويرتبط تاريخ الجزيرة بتاريخ منطقة البحرين. ويرجع تاريخ الجزيرة\
    \ المعروف إلى أكثر من خمسة آلاف عام قبل الميلاد، وهي من أقدم البقاع التي عاش فيها الإنسان، ومن أقدم بقاع شبه الجزيرة العربية.\
    \ والجزيرة هي إحدى مكونات واحة القطيف في المنطقة الشرقية.\n\nالتسمية \nترجع تسمية جزيرة تاروت بذلك نسبةً إلى عشتار أو\
    \ أشتار أو عشتروت أو عشتاروت وهي آلهة الحب والجمال والجنس والحرب عند البابليين والكنعانيين ومنهم الفينيقيين أيضاً. وترمز\
    \ بشكل عام إلى الآلهة الأم الأولى منجبة الحياة، وكان أحد رموزها الأسد.\n\nالتاريخ \nكانت جزيرة تاروت إحدى أهم مراكز مملكة\
    \ دلمون وكان لها دور كبير في تاريخ المنطقة خلال أكثر من خمسة آلاف سنة سبقت الميلاد، واستمر فيها الاستقرار البشري بكل عنفوان\
    \ ونشاط، دللت عليه المعثورات الأثرية فيها خلال هذه القرون حتى يومنا هذا، وهو أمر يندر حدوثه في الكثير من المناطق الأثرية\
    \ في العالم. وكان لها الدور الأكبر في الحياة التجارية في الخليج وتعتمد عليها بلاد الرافدين وبقية المنطقة الساحلية في شرقي\
    \ شبه الجزيرة العربية ولها علاقات وطيدة مع الكثير من المناطق المتحضرة في المنطقة.\n\nالجغرافيا\n\nالموقع \nتقع جزيرة تاروت\
    \ على بعد 6 كم من ساحل خليج كيبوس شرق المملكة العربية السعودية، على دائرة عرض 26 ْ شمالاً.\n\nالمساحة \nتبلغ مساحة جزيرة\
    \ تاروت حالياً 32 كم مربع تقريباً.\n\nالتركيب السكاني \nيبلغ عدد سكان جزيرة تاروت 77,757 نسمة موزعين على مناطقها المختلفة\
    \ وفقاً لإحصاء عام 2010م. ويضم فيها مجتمع جزيرة تاروت أربع فئات هي: الصيادون، والفلاحون، والتجار، وموظفو الحكومة والشركات\
    \ والمؤسسات. وقد اتجه كثير من الأهالي للعمل في الشركات الكبرى\nمثل أرامكو وسابك والمتقدمة والهيئة الملكية للجبيل وينبع.\n\
    \nالمناخ \nمناخها شبيه بمناخ معظم مدن الخليج العربي. فهو شديد الرطوبة صيفاً في الفترة الممتدة من مايو إلى سبتمبر تهب فيه\
    \ الرياح الخفيفة ويعتدل الجو ويصبح لطيفاً في الفترة الممتدة من سبتمبر إلى مايو حيث تتراوح الحرارة بين 18 و 22 درجة مئوية\
    \ أثناء النهار وبين 8 و 13 درجة مئوية أثناء الليل.\n\nالحياة الفطرية \nتتواجد في الجزيرة طبيعة متنوعة من طيور وأسماك وأشجار\
    \ ومع التمدد العمراني بدأت بالتقلص والتلاشي نتيجة إزالة المزارع ودفن البحر لكن لا يزال جزء كبير منها متواجد.\n\nالطيور\
    \ \n\nيتواجد في الجزيرة العديد من الطيور، ولاسيما أن جزيرة تاروت بوابة للطيور المهاجرة.\n\nقائمة ببعض الطيور المحلية المتواجدة\
    \ أو التي تواجدت في الجزيرة \n\nوغيرها الكثير\n\nقائمة ببعض الطيور المهاجرة \n\nوغيرها الكثير\n\nالأشجار \n\nكانت النخيل\
    \ سابقاً تغطي معظم جزيرة تاروت، ولكن في السنوات الأربعين الأخيرة تم حرق وإتلاف نخيل تاروت وتدمير مزارعها.\n\nقائمة بالأشجار\
    \ التي تتواجد أو تواجدت في الجزيرة \n\nوغيرها الكثير\n\nغابات المانجروف \n\nكانت تحيط بجزيرة تاروت الكثير من أشجار المانجروف\
    \ المسماة محلياً بالقرم وهي تنمو على الشواطئ البحرية التي يغمرها الماء في حالة المد وينحسر عنها في حالة الجزر ولهذه النبتة\
    \ أهمية في تنمية الأسماك والبيئة البحرية، ولكن وبعد التمدد العمراني والدفن الجائر للمنطقة لم يتبقى إلا القليل، وهي مهددة\
    \ بسبب التوسع العمراني. يوجد لها محمية تمتد من شاطئ الزور وسنابس ومروراً بشاطئ الرملة البيضاء بالربيعية وانتهاءاً بشاطئ\
    \ دارين.\nتوجد المنطقة الأخرى للمانجروف في شاطئ حي الجامعيين غرب الجزيرة وهو تحت تهديد التوسع السكاني، والتلوث البيئي.\
    \ في 13 يونيو 2013، تم إجراء حملة بيئية لتنظيف الشاطئ بحضور متطوعين من القطيف ومن خارجها.\n\nالآثار \nتعد قلعة تاروت من\
    \ أهم المعالم الأثرية الباقية في محافظة القطيف، وشُيدت هذه القلعة قبل حوالي 600 عام، فوق أنقاض أساسات مبانٍ قديمة تعود\
    \ إلى الألف الثالثة ق.م..\n\nفي عام 1968م زار جيفري بيبي رئيس البعثة الدنماركية جزيرة تاروت بعد أن سمع عن بعض مكتشفات\
    \ بعض المدافن التي تعود إلى الفترة الهلينستية في الجزيرة، فجعلها أحد أهداف المسح الدنماركي للمنطقة الشرقية الذي تم في\
    \ سنة 1968م ومن خلاله تم اكتشاف بعض المعثورات الأثرية منها التماثيل والفخار والذي أطلق على بعض منه (فخار العُبيد).\n\n\
    ومن خلال تلك المكتشفات والتسلسل الطبقي للموقع فقد أطلق عبارته الشهيرة بأن تاروت أقدم موقع استيطاني في الخليج.\n\nتفتحت\
    \ الحضارة الإنسانية على أرض تاروت من أزمان سحيقة، وتعاقبت عليها أقوام وحضارات سادت ثم بادت مخلفة وراءها آثاراً دالة على\
    \ العيش في هذه الأرض وقد لعبت الصدفة في إبراز الكثير من تاريخ الجزيرة.\n\nعثر على الكثير من الآثار الفينيقية والساسانية\
    \ والإسلامية فحينما بدأ أهل قرية الربيعية ببناء بيوتهم من الحصا والجص بدلا من العشش عام 1854 لجأ بعض العاملين بالمقلاع\
    \ إلى المرتفعات القريبة (جنوب الربيعية) من أجل اقتلاع الحجارة فعثر بعضهم على الجرار ووجدوا قبورا عديدة أوحت للباحثين بأنها\
    \ تشبه قبور اليهود، وعثروا أيضا على أواني فخارية لها فتحات من أعلى تشبه الطشت المغطى الذي يطلق عليه أهل تاروت (متكات)\
    \ وفي منطقة الخارجية بشمال تاروت عثر على بعض التماثيل الطينية الصغيرة.\n\nالخادم العابد \n\nالخادم العابد وهو تمثال منحوت\
    \ من الحجر الجيري القاسي ألقشطي اللون من الحجارة المحلية المتوفرة في المنطقة، يبلغ ارتفاعه 94 سم وهو على شكل رجل يتراوح\
    \ عمره ما بين أربعين إلى خمسين سنة، وهو منتصب حليق الرأس والوجه، عاري الجسد ويشد حول خصره حزام بارز من ثلاث لفات، وفي\
    \ أسفل البطن يظهر العضو التناسلي. يداه على صدره، الكف الأيمن فوق الكف الأيسر بضوح الأصابع والأظافر كما أن عظام القفص الصدري\
    \ أسفل الرقبة تشكل الرقم 7 الهندية، مرافق اليدين مدببة وبارزة للخارج وتكوين الفراغ بين الذراعين والصدر وتحت الإبط. الرأس\
    \ لا رقبة لها تقريباً والوجه بملامح حسنة التنفيذ والتي لا ينقصها التعبير وبأذنان بارزتان للخارج عليهما تجاويف الأذن وعينان\
    \ غائرتان يحيطهما بروز نافر، الفم كبير بعض الشيء مما يوحي بأنه يتلو تراتيل دينية لكن عليه بعض التلف مع الأنف الذي تحصل\
    \ على أكبر نسبة من التلف، الساقين ينفصلا عن بعضهما عند الركبة، ويقدمين مفقودتان أما الظهر فيظهر عليه ملامح العامود الفقري\
    \ بخط غائر محفور بوضوح ويقسم الظهر إلى نصفين كما أن الحزام في أسفل الظهر وانحناء بسيط بين الفخذ والساق ليكون زاوية بسيطة\
    \ أو انحناء بسيط خلف الركبة. هذا التمثال مكسور من الرقبة والخصر وهو مرمم.\nلقد نحت هذا التمثال بعناية ليمثل الخادم العابد\
    \ وهو في وضعية الصلاة والخشوع التام والتضرع للآلهة وقد جمع بين أسلوب التجريد ومحاكة الطبيعة وهو أسلوب وفن ذو أبعاد ثلاث\
    \ وهو شبيه بتماثيل المتعبدين السومرية التي وجدت في بلاد الرافدين في مواقع مختلفة مثل تل الحريري وتل خفاجة وتل أسمر والتي\
    \ تعود إلى النصف الأول من الألف الثالث قبل الميلاد من عصر ميسلم أو قريب منه، لكن بملامح قد تكون اقرب إلى السامية.\nلا\
    \ يعتقد بأن هذا التمثال قد جلب من بلاد الرافدين وانه قد نحت هناك وذلك أن هذا الحجر من الحجارة المحلية في المنطقة. هذا\
    \ التمثال لا يحتوي على أية كتابة مثل معظم التماثيل في بلاد الرافدين والتي تعود إلى نفس الحقبة وهو ليس التمثال الوحيد المكتشف\
    \ في الجزيرة أو في المنطقة الشرقية لكن قد يكون من أقدمها.\nوقد يعتبر هذا التمثال نذرا لشخص ما من سكان الجزيرة كما أن عملية\
    \ حلق شعر الرأس قد تكون من الطقوس التعبدية لأهل المنطقة قديماً والتي لا يعرف عنها الكثير، كما أن وقوفه عارياً قد يمثل\
    \ وقوفه أمام الإله في وضعية الخادم أو الزاهد العابد الفقير، وقد يكون هذا التمثال أيضا بديلاً سحرياً بدافع ديني وان فتح\
    \ الفم لإلقاء الشعائر الدينية تخدم دون انقطاع الشخص الذي وهبها نحو حياة خالدة.\n\nالتنقيب والبحث \nيرى كثير من الباحثين\
    \ ممن حاولوا دراسة هذة المنطقة أنها كانت على الارجح مهد السلالات البشرية بعد ارتقائها سلم الحضارة، وبناء على منشورات الآثار\
    \ السعودية، فإنه أمكن معرفة الكثير من تاريخ الاستيطان البشري في المنطقة الشرقية والتي تعتبر تاروت جزء منها ووقد كتب الباحث\
    \ الآثري ت.بيبي كتابا بعد أن اجرى تنقيبا اثريا في تاروت وذلك في عام 1971. قال فيه: (وقد عثرت في ثاج وتاروت على عدد من\
    \ النقوش التي يعود بعضها إلى ماقبل القرن الخامس قبل الميلاد، أسلوبها لا يختلف عن الأسلوب الكتابي الجنوبي إلا بمقدار ماتختلف\
    \ السبنية عن المعينية، وينحصر الاختلاف في عكس بعض الحروف كاللام والجيم والذال والنون ولهذا أطلق عليها البروفيسور ألبرت\
    \ جام اسم السباحسانية.\n\nدفعت هذه الآثار كثيرا من العلماء والمؤرخين إلى زيارة جزيرة تاروت وجمع الظاهر من آثارها، وتمكنت\
    \ البعثات التنقيبية من جمع المئات من قطع الفخار والكتابات القديمة مما دفع إحدى بعثات التنقيب إلى التأكيد بقدم الجزيرة،\
    \ واتصالها بالحضارة السومرية في بلاد ما بين النهرين. في عام 1968 تلقى الباحث الأثري ت.بيبي تصريحا للتنقيب والكشف، وقد\
    \ كشفت استطلاعاته عن وجود استيطان ومقابر في المنطقة الرفيعة بجزيرة تاروت وتوصل من خلال بحثه إلى التمييز بين مرحلتين.الأولى\
    \ ذات علاقة بالفترة الخاصة بحضارة بلاد ما بين النهرين، وهي فجر السلالات الثاني والثالث. والثانية تعود إلى ما بعد الأولى\
    \ بكثير وتتصل العصر الهيلينستي.\n\nوفي فريق (حي) الأطرش الواقع في الطرف الشمالي من منطقة الرفيعة، عثر في قناة الري على\
    \ قطع من الحجر الصابوني، وقد أثبتتالبعثة الدنماركية من خلال ما عثرت عليه من آثار أن منطقة الرفيعة كانت مصدرا للأواني غير\
    \ المنقوشة المزخرفة والتي يعود تاريخها إلى اواسط الألف الثالث قبل الميلاد.\n\nكذلك قامت في عام 1972 بعثة بالتنقيب عن آثار\
    \ (تاروت), وكان يرأسها الدكتور عبد الله المصري، وكانت حصيلة التنقيب: تلك الاحجار الثمينة والجرار التي استخدمت كقبور للموتى\
    \ وواكدت البحوث بأن ارض تاروت مليئة بتراث الحضارات القديمة التي عاشت في منطقة الخليج، كما تم العثور على سيوف ذهبية، وبعض\
    \ التماثيل الصغيرة، وعملات قديمة وأواني فخارية وفضية وأحجار كريمة،\n\nقلعة تاروت \n\nوتقع قلعة تاروت التي تم بناؤها بين\
    \ عامي 1515 و 1521م في وسط جزيرة تاروت وبالتحديد في الطرف الجنوبي الغربي من حي الديرة ولكن من غير المعروف حتى الآن من\
    \ الذي بناها رغم ترجيحات بعض الباحثين من أن أهالي القطيف وتاروت بنوها لتحميهم من هجمات البرتغاليين إبان غزواتهم إلا ان\
    \ البعض يرى أن الغزاة البرتغال هم الذين بنوها لتحميهم من هجمات الأتراك ضدهم إلا أنهم اضطروا لتسليم القلعة عام 1559م وخرجوا\
    \ من تاروت إلى جزيرة أوآل (البحرين). وتتكون القلعة من 4 أبراج يقوم كل واحد منها في ركن من أركانها فناؤها مستطيل تتوسطه\
    \ بئر عميقة يعتقد أنها لتخزين المؤونة في فترات الحصار ويزخر متحف الرياض الوطني بكثير من المقتنيات الأثرية ذات الدلالة\
    \ التاريخية الهامة، التي تم اكتشافها في منطقة قصر تاروت الأثري، وكان آخر ما اكتشف هو مدفع حربي قديم، يعود بتاريخه لنفس\
    \ الحقبة الزمنية، وهو موجود في متحف الدمام الإقليمي.\n\nالثقافة\n\nالآدب \nجاءت الأدلة الأدبية في الشعر وغيره تؤيد استمرارية\
    \ الأهمية التجارية لجزيرة تاروت وتؤيد الأدلة الأثرية التي ناقشناها في كتابنا «جزيرة تاروت» والتي تؤكد على أهمية هذه الجزيرة\
    \ في المجال التجاري الاقصادي على مستوى الخليج العربي ولها صلات تجارية على مستوى المحيط الهندي والبحر الأحمر وشرقي أفريقيا\
    \ منذ آلاف السنوات.\n\nوانطلاقا من أهمية الشعر العربي باعتباره مصدرا مهما للتاريخ القديم والذي حفظ لنا الكثير من المعلومات\
    \ عن البيئة والطبيعة في شبه الجزيرة العربي اعتمدنا عليه هنا كمصدر نستدل به على أهمية جزيرة تاروت باعتبارها المركز التجاري\
    \ الأهم في الخليج العربي وخاصة فيما يتعلق باستيراد وتصدير البخور والعطور عند العرب.\n\nومن أهم الأبيات التي ذكرت جزيرة\
    \ تاروت «دارين»:\n\n1- قال الأعشى وقيل البيت لغيره:\n\nقال النابغة المتوفى سنة 18 قبل الهجرة تقريبا حوالي 604م:\n\nقال\
    \ أعشى قيس المتوفى عام 7هـ/ 629م:\n\nوذكرها أيضا وقال فيها:\n\nقال جرير المتوفى 110هـ/ 728 م:\n\nوذكرها الفرزدق 110هـ\
    \ فقال:\n\nقال أبو نواس المتوفى عام 198هـ/814م:\n\nقال ابن الرومي المتوفي 283 هـ/ 896م:\n\nثنائي مسك دارين وذكري عنبر\
    \ الشحر\n\nقال ابن هاني الأندلسي المتوفي عام 362 هـ:\n\nقال الشريف الرضي المتوفى 403 هـ:\n\nقال المعري المتوفي 449 هـ:\n\
    \nوقال أيضاً:\n\nقال ابن زيدون المتوفي عام 463 ه‍ 1071م:\n\nوهذ ابن حيوس المتوفى سنة 473 هـ:\n\nوابن الحداد المتوفى سنة\
    \ 480 هـ:\n\nقال ابن حمديس المتوفى عان 527 هـ:\n\nقال الأعمى التطيلي المتوفي 525 هـ:\n\nويذكرها التعاويذي المتوفى سنة\
    \ 583 هـ:\n\nقال صفي الدين الحلي:\n\nقال ابن معتوق:\n\nوهو القائل:\n\nوقيل فيها أيضا:\n\nوقال الشيخ جمال الدين أبو زكريا\
    \ الصرصري:\n\nوقال أبو القاسم عبد الواحد بن الحريش الأصبهاني يرثي أبا العباس أحمد بن إبراهيم الضبي الملقب بالكافي الأوحد\
    \ المتوفى سنة 399 هـ :\n\nالأمثال\n\nعادات وتقاليد \nمن المعتاد عند أغلب الاسر في المنطقة أن يتخير أهل العروسين لإعلان\
    \ يوم الخطبة يتفائلون به ويتوافد المدعوون من الأهل والجيران لكلا العروسين وتبدأ سلسلة التهاني والتبريكات، ورائحة البخور\
    \ والطعام والمولد هو السائد وقد جرت العادة في تاورت أن يقوم أهل العريس بتقديم كمية من السمك لأهل العروس ويقوم هؤلاء بدورهم\
    \ بتوزيع السمك على الأهل والمعارف والجيران إعلاماً لهم أن الفتاة ابنة فلان قد خطبت إلى ابن فلان، وهي من العادات التي تتميز\
    \ بها جزيرة تاروت عن بقية جاراتها مع العلم أن هذه العادة بدأت تختفي هذه السنوات إلا أنها لا زالت موجودة ويقوم بعض الناس\
    \ أو الأسر الميسورة بإبقاء هذه العادة.\n\nوجرت العادة أيضاً أن تحجز الخطيبة في البيت بعد إعلان خطبتها فلا تبرحه إلا للأمور\
    \ الهامة التي تستدعي خروجها، وبقاؤها في البيت يتطلب من الأم أيضاً إعدادها إعداداً تاماً لكي تصبح زوجة كاملة لتحوز على\
    \ رضا زوجها وأهله وبالطبع من العادة المتبعة قديماً أن الخطيب لا يحضر بيت خطيبته أيام الخطبة ولا يراها إلا ليلة الدخلة.\
    \ كما تعتبر ليلة الغسالة من الليالي التي اندثرت في المجتمع التاروتي فقد كانت العادة أن تستقبل الفتاة صديقاتها وبنات حيها\
    \ وقريباتها عند غروب الشمس أو قبلها بقليل ويسيرون في موكب تتقدمهن العروسة وهن ينشدن الأناشيد حتى يصلن إلى العين العودة\
    \ الخاصة بنساء البلدة وبعد الانتهاء من الاستحمام يعدن الفتيات بالعروسة إلى دارها بأغانيهن الشعبية وزغاريدهن، ومن أغانيهن:\n\
    \nهبهب يا مشمر [1] من فوق رأس البيض\nهبهب يا مشمر\nخلها تتكشمر [2] (فلانة) كحيلة العين\nخليها تتكشمر.\n\nوهكذا يبقين في\
    \ الغناء حتى يصلن إلى دار أبيها ويكملن فرحتهن وأناشيدهن حتى ساعة متأخرة من الليل، ثم يتركوها متمنين للعروسين السعادة والهناء،\
    \ بينما نجد العريس في بيته جالساً على كرسي صغير وحوله الشباب يغنون ويرقصون ويقوم المحسِّن (الحلاق) بحلق شعر رأسه وذقنه\
    \ ثم يأخذه الشباب في موكب حافل بالإناشيد والتصفيق حتى يصلوا به إلى أحد العيون أو حمام باشا، ولا يكادون يدخلون حتى يقوم\
    \ الشباب بخدمته من فرك جسمه وتجهيز ملابسه، وبعد الانتهاء من استحمامه ما يبرحون الخروج من الحمام بأناشيدهم وأغانيهم الشعبية\
    \ وهم في طريقهم إلى بيت العريس، ومن أناشيدهم سبحان الله والحمد لله ولا إله إلا الله..والله أكبر، أما اليوم فقد تغير بعض\
    \ الشيء في مراسيم الزفاف أهمها هو بقاء الزوج في بيت أهل زوجته فقد بدأت هذه العادة تتلاشى إن لم تكن قد تلاشت فعلاً ففي\
    \ السابق كان يزف العريس إلى بيت أهل زوجته ويظل هناك بعض الأيام ثم ما يبرح أن يذهب إلى بيته أو المسكن الذي يقطنه فربما\
    \ كان يسكن مع والديه.\n\nقرى جزيرة تاروت \n\nتاروت وسنابس والربيعية ودارين والزور وتتكون قرية تاروت من أحياء أهمها الديرة\
    \ والتي كانت محاطة بسور يحيطها من جميع الجهات وقد اندثر حالياً وليس له وجود وقلعة تاروت تقع في الجهة الجنوبية الغربية\
    \ منه وأحياء منها حي الدشة والحوامي والفسيل وأرض الجبل والحسينية والوقف والمرجان وباشلامة والصواري والأندلس واليمامه والنجيمة\
    \ والجفرة وفريق أبو براة والخارجية وفريق الأطرش بالإضافة إلى المناطق السكنية التي تم دفنها في الجزيرة وهي: التركية والتركية\
    \ الصناعية وحي الجامعيين والمنيرة والمزروع والمناخ والمشاري والمحيسنيات وحي الرضا وشاطئ الهادي ودخل المحدود والشاطئ.\n\
    \nسنابس \n\nتتربع على الشاطئ الشرقي للجزيرة وهي ليست مدينة حديثة حيث يوجد بها عدد من البيوت المبنية باللبن ويوجد بها مسجد\
    \ شهير هو مسجد الشيخ محمد المبارك وهو من المساجد التي بُنيت على الطراز البحريني في بناء المساجد، وقد بنى منارة المسجد\
    \ الشهيرة أحد الأساتذة البناؤن من دولة البحرين وتعد هذه المدينة همزة وصل بين كل قرى الجزيرة شأنها شأن تاروت وفي سنابس\
    \ ميناء صغير لقوراب الصيد وبها مركز لسلاح الحدود.\nاشتهر سكانها بصيد الأسماك واللؤلؤ .\n\nقرية الزور \n\nوهي من القرى\
    \ الصغيرة في الطرف الشمالي للجزيرة وكانت تعرف بثنية من الانثناءة الجغرافية التي تتخذها وهو رأس من الأرض ممتد داخل البحر\
    \ ويسمى زوراً والأزوار في الخليج كثيرة ويوجد في غرب الزور تلال عددها 33 تلاً وهي عبارة عن مستوطنات هيلينية محترقة تعود\
    \ إلى ما قبل الميلاد بقرن واحد وقد وجد في هذه التلال هياكل آدمية محترقة وقطع أواني فخارية متكسرة وقد سوِر هذا الموقع الأثري\
    \ عام 1407هـ ويعرف المكان بدوحة مبيريك نسبة لعبد يدعى مبارك هو من عبيد آل بوفلاسة وقد عمّر قرية الزور مجموعة من الإمارتيين\
    \ والعمانيين ويوجد في الزور مسجد واحد فقط بني سنة 1400هـ ومركز لخفر السواحل.\n\nوفي الزور ميناء قديم له إهميته بالنسبة\
    \ لأهالي سنابس وتاروت وقد وصل عدد السفن الشراعية التي تزوره ذات يوم إلى 300 سفينة لصيد الأسماك واستخرج اللؤلؤ اما الآن\
    \ فتضائلت أهميته بسبب افتتاح ميناء دارين، وفي غرب الزور توجد تلال رمالها محترقة فيها قواقع بحرية بمختلف الأشكال وبعض الأحجام\
    \ الترسبية وقطع أواني الفخار .\n\nالربيعية \n\nأسسها الملا حسن بن ربيع صاحب ديوان الزهور الربيعية عام 1340هـ عندما كان\
    \ تلميذاً للعلامة عبد الله بن معتوق وقد كان معظم منازلها إلى وقت قريب من العشش. أما الآن فتطورت تطوراً ملحوظا ويوجد بها\
    \ أربعة أحياء وتسمى «فريق الجنوب» في الجنوب و «حي الشمال» شمال الربيعية و «الحي الوسط» في الجهة الوسطى إلى الشرقية وحي\
    \ «البدرية» في الجهة الغربية. بها ثلاثة مساجد مركزية (مسجد الفتح، ومسجد الخضر، ومسجد العباس) ومدرستان وسوق وحمام شعبي\
    \ واحد يسمى عين السعودية التي تقع على مكان اثري يعتبر أحد الأماكن الأثرية المهمة في جزيرة تاروت وقد كان بها مستشفى جزيرة\
    \ تاروت الذي بني عام 1383هـ وهدم عام 1402هـ تحول إلى مستوصف العناية الأولية واقتصر على الربيعية حيث يوجد مستوصف واحد في\
    \ كل قرية في جزيرة تاروت عدا الزور. يوجد بها عين ماء تسمى عين السعودية وهو بئر ارتوازية يقابل المسجد الجامع في سوق الربيعية\
    \ الشعبي وكان ويفصل الربيعية عن البحر ثلاث مزارع: مزرعة الكويتي ومزرعة المصلي ومزرعة والصفار. ويربطها بدارين خط ساحلي\
    \ مسفلت واخر زراعي بتاروت، وسكن بها ثلاثة من كبار علماء القطيف هم السيد صالح انصيف والشيخ محمد جمال الخباز والشيخ عبد\
    \ الكريم الحبيل. الأخير لازال يقطن فيها، كما يوجد برج للماء في مستشفى تاروت الكبير الذي بني في عهد الملك عبد العزيز وفيها\
    \ فريق رياضي يدعى الربيع اسس عام 1391هـ وتشتهر بوجود مسجد الخضر فيها أحد أكبر المساجد على مستوى المنطقة .\n\nدارين \n\n\
    وهي القرية الأخيرة في الساحل الشرقي للجزيرة، ومن أشهر موانئ البحر العربي الشرقي منها تصل بضائع الشرق إلى مختلف أنحاء الجزيرة\
    \ من الاقمشة وأنواع الطيب والافاوية والأسلحة كالرماح والسيوف لانها تقع على ساحل تصل اليه السفن بسهولة ويسر لعمقه ولقلة\
    \ الحواجز الصخرية التي تعوق سير السفن ولكن هذا الميناء فقد اهميته بعد إنشاء ميناء البصرة وبعد اتخاذ العقير ميناء العصور\
    \ الأخيرة، ودارين هي مكان ينسب اليه المسك وقيل بها البيت المشهور:\n\nيمرون بالدهنا خفافاً عيابهم ويرجعن من دارين بجرا\
    \ الحقائب\n\nوالبحارة اطلقوا على الجزيرة (جزيرة دارين) لانها أول ما يقابلون إذا اتوا مبحرين وتقسم دارين إلى ثلاثة احياء\
    \ وهي الشرق والحوطة وتجرى فيها المتاجرة بالتوابل والعطور والذهب واللؤلؤ، اما الحي الثالث فهو عبارة عن جزيرة صغيرة تسمى\
    \ الحالة وقد اختفت معالمها عام 1399هـ إذ ردم ما حولها برمال صحراوية.\n\nوقد وجد بدراين جرتا دراهم فضية بتأثيرات ساسانية\
    \ وهي عبارة عن قطع مستديرة من الفضة على أحد وجهيها نقش يمثل الجزء العلوي من صورة كسرى الفرس ويظهر وجهه في وضع جانبي وعلى\
    \ رأسه التاج الساساني المجنح وعلى الوجه الثاني للدرهم حارسان مدججان بالسلاح أو واقفين بدونه ويمكن اعتبارهما كاهنين بينهما\
    \ معبد النار الذي يسهران على حدمته أو حراسته. ويعتبر مطار دارين الذي انشئ بها كأول مطار ينشأ بالمنطقة الشرقية حيث انشئ\
    \ قبل الحرب العالمية تقريباً عام 1938م بالرفيعة بالقرب من الربيعية في جزيرة تاروت.\n\nالديرة \nالديرة هي الحي الأقدم في\
    \ جزيرة تاروت والمرتفع عن الأحياء كأنه في تل وسبب في ذلك هو اعماره منذو آلاف السنين حيث يعود تاريخه إلى عهد الفينيقيين.\
    \ تجد فيه البيوت الطينية والحجرية متراصة، ذات أزقة ضيقة وممرات، وبالتجول بين أزقتها تفوح رائحة الماضي السحيق والتاريخ\
    \ العميق، وبالعبور تحت أسقف سباطاتها ترتسم ذكريات أجيال وأجيال مرت من هنا.\n\nالتركية \nوهي من المناطق الحديثة المدفونة\
    \ في الجزيرة، ويبلغ حجمها 4 كم2 وتتفرع إلى:\n التركية أ\n التركية ب\n التركية ج\n التركية د\n التركية الصناعية؛ وهي مخصصة\
    \ للورشات والمعامل الصناعية.\n\nالأحياء المتفرعة \n\n الزور\n النرجس\n الصدفة\n الزمرد\n النخيل\n المناخ\n اللؤلؤ\n الجامعيين\n\
    \ المروج\n الصناعية\n الورود\n الواحة\n الروضة\n الفتح\n الأندلس\n المرجان\n\nالنشاط الاقتصادي\n\nالزراعة \nنسبة 8% من\
    \ السكان يعتمدون في حياتهم الاقتصادية على الزراعة فأرض تاروت تنتج الفاكهة بمختلف أنواعها: كاللوز والرمان والتين والعنب\
    \ والبطيخ والليمون والبرتقال والموز والبوبي وكذلك جميع أنواع الخضار كالباميا والطماطم والباذنجان والخس والبقل والكوسة\
    \ والبصل وغيرها\nويوجد عدد اشجار النخيل والتي تقدّر بـ 150 الف نخلة واصنافها متعدده منها ((لخلاص)) والغرة والماجي والبجيرة\
    \ ولخنيزي والحلا وخصاب العصفور والشيشي وغيرة.\n\nكان لدى الفلاح التاروتي معرفة تامة بالأرض الصالحة وطريقة التسميد وكذا\
    \ تركيب الاشجار وأوقاتها وكيفية تقليمها والطريقة لتخزين الحبوب والفواكة الغضة واليابسة. لذا نجدهم يتكلمون بكل ثقة عن اجود\
    \ أنواع الأراضي ويقسمونها إلى الأرض الطينية والأرض الرملية. والمغبرة والصفراء والمخلخلة والمتماسكة والأرض المفرطة في التخلخل\
    \ ويرجعون بحكم خبرتهم جودة الأرض ودناءتها إلى اعشاب نبتها.\n\nصيد الاسماك \nتعتبر الممون الرئيسي لأسواق المنطقة الشرقية\
    \ بالسمك، حيث يتم بيع وشراء كميات كبيرة من الأسماك بالمزاد العلني كل يوم في سوق تاروت والقطيف وهو ما يسمى بالمفرش، ويعتبر\
    \ المصدر الرئيسي لتزويد أسواق الدمام والخبر والظهران بالأسماك وامتدت إلى مدن المملكة العربية السعودية الأخرى.\n\nالصناعات\
    \ \nكانت هناك مصانع صغيرة منها مصنع الاواني الفخارية وكان الاهال يصنعون بعض حاجياتهم مثل الحبال والفرش مثل الخوصية والصوفية\
    \ ويقوم بهذا العمل سيدات المجتمع التاروتي كما عرف على رجال أهل تاروت بصناعة المراكب الشراعية وصناعة الاثاث كالسجم وهو\
    \ سرير نوم الطفل (المنز) والقفص وهو لوضع الطيور وهناك أنواع منها لوضع الفواكة والخضار وهذه الصناعات تتعلق ب النخلة التي\
    \ تعتبر المصدر الأول لهذه الصناعات الشعبية.\n\nأما في السنوات الأخيرة ظهرت مصانع كثيرة منها مصنع للثلج ومصنع للطوب الاسمنتي\
    \ والالمنيوم ومصانع قطع الحجر والرخام ومصنع للحلوى في دارين وهو الوحيد والفريد في جزيرة تاروت هذا بالإضافة إلى ورش الحدادة\
    \ والنجارة والميكانيكا.\n\nالأسواق والمراكز التجارية\n\nسيتي مول القطيف \nسيتي مول القطيف أو القطيف سيتي مول أو مجمع القطيف\
    \ المركزي هو مركز تسوق كبير يقع أقصى غرب جزيرة تاروت، بمحافظة القطيف، من المنطقة الشرقية للمملكة العربية السعودية. يقع\
    \ سيتي مول القطيف على امتداد شارع الرياض، الذي يُمثِّل أحد الطرق الرئيسة في محافظة القطيف. يطل سيتي مول القطيف على الواجهة\
    \ البحرية المقابلة لجزيرة تاروت ويُجاوره مخطط الشاطئ السكني. يُمكن الوصول إلى المركز التجاري عبر الجسر البحري الممتد إلى\
    \ جزيرة تاروت. تعلو البهو خيمة مخروطية بارتفاع 27 متراً تُمثِّل شراع سفينة من الخارج. يحتوي سيتي مول القطيف على أكثر من\
    \ 78 محلا تجارياً بمساحات تتراوح ما بين 50 و 3,500 متر مربع. خصصت بعض المحال إلى الشركات ذات العلامات التجارية المتخصصة.\
    \ منها في الملابس والعطور وكذلك المجوهرات والأحذية والكماليات والاحتياجات المنزلية. تتخذ العديد من اللجان الأهلية والمنظمات\
    \ والجمعيات الخيرية مركز القطيف التجاري لإقامة مختلف أنواع الفعاليات، منها فعاليات إرشادية، برامج تطوعية، ومقابلات ندوية.\
    \ تم تخصيص مساحة 3500 متر مربع لصالة ألعاب حديثة.\n\nالرياضة \n\nهناك حاليا ثلاثة نوادٍ مسجلة رسميًا بالرئاسة في الجزيرة\
    \ وهي:\n الهدى بتاروت\nوسجل في عام 1396هـ بينما كان متأسسا قبل هذا التاريخ بفترة طويلة.\n النور بسنابس\nالذي تأسس عام\
    \ 1391هـ بعد أن سجل رسمياً غير اسمه السابق وهو هلال الجزيرة.\n الجزيرة بدارين تأسس عام 1386 هـ\n الربيع في الربيعية وهو\
    \ من الاندية التي لم تسجل رسميا في رعاية الشباب وكان من الاندية المسجلة في مركز الخدمة الاجتماعية وكان له مقر في الثمانينات\
    \ الميلادية\nولكل الاندية انشطة رياضية وثقافية داخل مبانيها.وتوجد في جزيرة تاروت عموما الكثير من الفرق الرياضية والتي\
    \ تمارس لعبة كرة القدم وتسمى فرق الحواري.\n\nالأماكن التاريخية والترفيهية والرياضية \n قلعة تاروت الأثرية\n مطار دارين;\
    \ بني في عام 1911 من قبل الإمبراطورية البريطانية خلال الحرب العالمية الأولى\n برج أبو الليف\n مهرجان الدوخلة\n كورنيش\
    \ دارين\n كورنيش المحيسنيات\n كورنيش سنابس\n كورنيش الزور\n سيتي مول القطيف\n نادي الجزيرة الرياضي بدارين\n نادي النور\
    \ الرياضي بسنابس\n نادي الهدى الرياضي بتاروت\n صالة الأبراج الترفيهية للبلياردو\n صالة البدر لكمال الأجسام\n\nجمعية تاروت\
    \ الخيرية \n\nجمعية تاروت الخيرية هي منظمة خيرية مقرها جزيرة تاروت، بمحافظة القطيف، في المنطقة الشرقية للمملكة العربية\
    \ السعودية. تأسست جمعية تاروت الخيرية للخدمات الاجتماعية في محرم 1378هـ في جزيرة تاروت وسجلت لدى وزارة الشؤون الاجتماعية\
    \ برقم (12).\n\nتهدف إلى المشاركة في رفع المستوى الاجتماعي والثقافي والصحي بجزيرة تاروت عن طريق الفعاليات والأنشطة التالية:\n\
    \n تقديم المساعدات المالية والعينية على شكل رواتب شهرية ومساعدات مؤقتة للأسر والأفراد الذين يثبت استحقاقهم للمساعدة على\
    \ ضوء البحث الاجتماعي .\n تقديم الخدمات الإيوائية للمعاقين والأيتام ومن في حكمهم وغيرهم ممن يستحقون الرعاية الدائمة .\n\
    \ تقديم المساعدات المالية أو العينية للمتضررين من الحوادث والكوارث الطبيعية مثل الحريق أو انهيار منازلهم بسبب الأمطار\
    \ أو العواصف .\n رفع الوعي الاجتماعي من خلال اشراك المجتمع في تنفيذ المشاريع الخيرية .\n تبني تنفيذ البرامج الصحية والوقائية\
    \ بالمنطقة أو المشاركة في تنفيذها .\n إقامة الدورات التدريبية لأبناء المجتمع مثل دورات الحاسب الآلي والتقوية الطلابية\
    \ ومختلف دورات العلم والمعرفة\n\nالهيكل الإداري والتنظيمي لجمعية تاروت الخيرية:\n\n رئيس المجلس: محمد بن علي بن محمد الصغير.\n\
    \ نائب الرئيس: محمد بن سعيد سلمان الصفار.\n\nالأقسام واللجان في الجمعية:\n\n اللجنة الصحية.\n الشئون الادارية.\n اللجنة\
    \ النسائية.\n لجنة العلاقات العامة.\n\nالحدائق والمنتزهات\n\nمؤسسة تطوير دارين وتاروت \nفي 24 نوفمبر 2022، أعلن الأمير\
    \ محمد بن سلمان اعتماد التوجه التنموي لجزيرة دارين وتاروت والمبادرات المستقبلية للجزيرة، وإنشاء مؤسسة تطوير جزيرة دارين\
    \ وتاروت بميزانية تقديرية بقيمة مليارين و 644 مليون ريال، تهدف المؤسسة للارتقاء بجودة الحياة وتنمية الناتج المحلي، من\
    \ خلال الاستفادة من الميزات النسبية للجزيرة في النواحي التراثية، والبيئة، والسياحية. بما يسهم في تحقيق التنوع الاقتصادي.\n\
    \nويتضمن التوجه التنموي للجزيرة الواقعة على مساحة 32 كيلو متراً مربعاً ويقطنها 120 ألف نسمة، تحديد المقومات والمزايا النسبية\
    \ والتنافسية للجزيرة وفق ثلاث ركائز رئيسية لرسم مستقبل جزيرة دارين وتاروت، وهي: المحافظة على الجانب الثقافي والتراثي التاريخي\
    \ للجزيرة. وإحياء المواقع الطبيعية والبيئية. والارتقاء بجودة الحياة وتعزيز اقتصادها السياحي.\n\nولتحقيق مستهدفات التوجه\
    \ التنموي للجزيرة طُورت أكثر من 19 مبادرة نوعية، على أكثر من جانب، فعلى الجانب الثقافي سيتم تطوير قلعة ومطار دارين كوجهات\
    \ سياحية تراثية، وإقامة عدة مهرجانات ثقافية وتراثية في الجزيرة بالإضافة لإنشاء مسارات متعددة للمشاة تتخلل المناطق التراثية\
    \ في الجزيرة، وعلى الجانب البيئي سيتم إنشاء أكبر غابة مانجروف على ضفاف الخليج العربي، وإنشاء عدد من الفنادق والنزل البيئية\
    \ في المناطق الطبيعية، بالإضافة إلى الارتقاء بجودة الحياة في الجزيرة عن طريق إنشاء الطرق والبنى التحتية والحدائق العامة\
    \ والتي تتضمن عدة ملاعب ومنشآت رياضية حديثة.\n\nومن المتوقع أن يسهم التوجه التنموي في الناتج المحلي الإجمالي بمتوسط يصل\
    \ إلى 297 مليون ريال سنوياً، وزيادة عدد السياح وصولاً إلى 1.36 مليون سائح بحلول عام 2030، وتوفير آلاف الفرص الوظيفية بالإضافة\
    \ إلى تخصيص ما يصل إلى 48% من مساحة الجزيرة للساحات والحدائق العامة والواجهات البحرية والطرق والمرافق.\n\nانظر ايضاً \n\
    \ برج أبو الليف\n تل تاروت\n قلعة تاروت\n مطار دارين\n ميناء دارين\n\nوصلات خارجية \n موقع جزرة تاروت \n صفحة جزيرة تاروت\
    \ على الفيسبوك https://www.facebook.com/Tarut.Island\n ملتقى سنابس الثقافي \n تاروت ومصر القديمة \n شبكة فكر الثقافية\
    \ www.fajrweb.net\n\nمعرض صور\n\nالمراجع \n\n موقع جزيرة تاروت\n\nانظر أيضاً \n تاروت ليبيا\n\nجزر الخليج العربي\nجزر\
    \ السعودية\nجزر المنطقة الشرقية\nخليج تاروت\nقرى محافظة القطيف\nمدن فينيقية\nمستعمرات برتغالية سابقة\nمواقع أثرية في السعودية"
  - "دوكهي أميرة كوريا (بالكورية: 덕혜옹주; اليابانية: 徳恵姫) ( 25 مايو 1912 - 21 أبريل 1989) كانت آخر أميرة للإمبراطورية الكوريا\
    \ ولدت بقصر تشانغدوك في سيول ، وكانت الابنة الصغرى للإمبراطورغوانغمو ووالدتها يانغ غوي إن خليلة غوانغمو . بعد ولادة دوكهي\
    \ منحت أمها اللقب الملكي.  لم تعترف اليابان بها كأميرة حتى عام 1917 عندما ادخل اسمها رسميًا في سجل العائلة الإمبراطورية،\
    \ ذلك بسبب أنها لم تكن ابنة ملكة. أحبها والدها كثيرًا وأنشأ لها قصر دوكسو كروضة ومكان للعيش.\n\nحياتها المبكرة \nعام 1917\
    \ تم إدخال اسمها بشكل رسمي في سجلات العائلة الإمبراطورية. أنشأ والدها روضة أطفال قصر دوكسو في جكجودانغ، قاعة هامنيونغ،\
    \ والتي كان يحضر إليها الفتيات من العائلات النبيلة. في 1919 تمت خطبتها إلى كم جانغ هان، ابن أخ كم هوانغجن (حاجب الملك)\
    \ لكن زواجها منه لم يكتمل.\n\nدراستها ومرضها \nفي عام 1925 أخذت إلى اليابان تحت غطاء إكمال دراستها. وكبقية إخوتها فقد\
    \ درست في غاكشوين. وصفت بأنها هادئة وذات صوت متقلب. بعد سماع نبأ وفاة والدتها في 1929, عزلت نفسها في غرفتها حتى أعطيت\
    \ الإذن لزيارة كوريا بشكل مؤقت من أجل حضور جنازة والدتها في 1930. في ربيع عام 1930 - في مستهل مرضها العقلي (يظهر في السير\
    \ أثناء النوم) - انتقلت إلى قصر الملك إي (منزل أخيها ولي العهد ويمن) في طوكيو. في هذه الفترة كانت تنسى إطعام نفسها والشرب\
    \ في معظم الأحيان. قام طبيبها بتشخيص حالتها كخرف مبكر, لكن حالتها تحسنت في العام التالي.\n\nالزواج والطلاق \nفي مايو 1931,\
    \ بعد ’وساطة زواج‘ بوساطة الإمبراطورة تيميه عقيلة تايشو إمبراطور اليابان، تم زواجها من الكونت سو تاكيكو (武志 | من 1923\
    \ إلى 1985) أحد النبلاء اليابانيين. تم إقرار الزواج في الواقع في عام 1930 , حيث احتج أخوها بسبب سوء حالتها الصحية، لكنها\
    \ ما أن استعادت بعض صحتها حتى تمت إجراءات الزواج مباشرة. وفي 14 أغسطس 1932 أنجبت ابنتها الوحيدة ماساي (باليابانية: 正惠\
    \ | اسمها الكوري: جونغهي).\n\nبعد عام 1933 أصيبت الأميرة دوكهي بالعديد من الأمراض العقلية، حيث قضت سنوات عديدة من حياتها\
    \ في العيادات النفسية. وفي 1953 تم طلاق الأميرة من زوجها، ولم تكتف الأميرة بهذا الزواج غير السعيد حتى انتحرت ابنتها بإغراق\
    \ نفسها في 1955, وتسبب هذا في تدهور حالتها الصحية.\n\nالعودة والوفاة \nعادت الأميرة دوكهي إلى كوريا بدعوة من الحكومة الكورية\
    \ في 26 يناير 1962. أمضت بقية حياتها في قاعة ناكسون بقصر تشانغدوك، جنباً إلى جنب مع ولي العهد وابنه الأميرة غو وزوجته\
    \ جوليا موليك, بالإضافة إلى وصيفتها بيون بوكدونغ. ماتت الأميرة في 21 أبريل 1989 في قاعة سغانغ بقصر تشانغدوك. وتم دفنها\
    \ في هونغيرنغ في ناميانغجو بالقرب من سول.\n\nالعائلة \n الأب:\n الإمبراطور غوجونغ.\n الأم:\n السيدة بونغنيونغ.\n الزوج:\n\
    \ الكونت سو تاكيكو.\n الذرية:\n الكونتيسة سو ماساي.\n\nالأسلاف \n\n</center>\n\nالأعمال ذات الصلة \n مسرحية 《الأميرة دوكهي》,\
    \ مركز سول الفني، 3 مايو 1995 إلى 4 يونيو.\n دراما التحرير 《دوكهي الأميرة الأخيرة》, هيئة بث منهوا(إم بي سي كوريا), 15\
    \ أغسطس 1996.\n سيرة ذاتية 《الأميرة دوكهي》, هونما ياسكو جو، إي هن يوك، التاريخ, سنة 2008.\n رواية 《الأميرة دوكهي》, غوون\
    \ بيونغ جو، مكتبة داسان، سنة 2009.\n\n فيلم The last princess إنتاج عام 2016\n\nانظر أيضا \n الإمبراطور غوجونغ.\n .\n\
    \ .\n .\n فصام.\n\nمراجع\n\nوصلات خارجية \n\n تاريخ كوريا 《الأميرة دوكهي آخر أميرات كوريا》, نظام البث الكوري (كي بي إس).\n\
    \ دوكهي أميرة جوسون الأخيرة, نافير كاست.\n\nأسرة إي\nأشخاص من سول\nأميرات مملكة جوسون\nأميرات كوريات\nبنات الأباطرة\n\
    خريجو جامعة كاكوشوين\nغوجونغ إمبراطور كوريا\nمصابون بالفصام\nملوك ونبلاء ذوو إعاقات\nمواليد 1912\nنساء كوريات جنوبيات\n\
    وفيات 1989\nوفيات بسبب الأمراض"
  - "يطلق لفظ توأم على الذريتان الناتجان من فترة حمل واحدة داخل رحم الأم. وعادة ما يكون الفرق بين زمن الولادة هو بضعة دقائق\
    \ أو سويعات لا أكثر.\n\nوهناك صنفين من التوائم، التوائم المتشابهة في الشكل والتوائم المختلفة في الشكل. ويرجع ذلك إلى مرحلة\
    \ تلقيح البويضة في رحم المرأة (الأنثى)، حيث تنشأ التوائم المتشابهة من بويضة واحدة لقحها حيوان منوي واحد في طريق انقسامها،\
    \ مما أدى ذلك لتكون أكثر من جنين. بينما تنتج التوائم المختلفة شكلا من أكثر من بويضة ملقحة بأكثر من حيوان منوي.\n\nفي المقابل،\
    \ يُسمى الجنين الذي يتطور وحده في الرحم جنين مفرد، والمصطلح العام للذرية الواحدة من الولادة المتعددة متعددة. ويشار إلى\
    \ الأفراد المتشابهه في الشكل كالتوائم ولكن لا تربطهم أي صلة باسم الشبيه.\n\nأسباب حدوث الحمل بتوأم \nيحدث الحمل بالتوأم\
    \ نتيجة لبعض الأسباب التي لم يستطع العلماء تحديدها بشكل قاطع في الوقت الحالي، لكن هناك بعض الأسباب  التي يعزى إليها الحمل\
    \ بتوأم، وهي على سبيل المثال:\n\n فرط الطول أو الوزن عند بعض السيدات، فقد لوحظ زيادة احتمالية ولادة التوأم في هذه الحالات.\n\
    \ وجود المرأة في مرحلة الإرضاع، حيث تزداد بشكل كبير احتمالية حدوث الحمل بتوأم.\n وجود عوامل وراثية تزيد من فرصة ولادة\
    \ التوأم بشكل كبير.\n الحمل في سن كبير (بعد سن الخامسة والثلاثين).\n بعض الأطعمة التي تزداد مع تناولها فرصة حدوث الحمل\
    \ بتوأم بشكل كبير جدًا.\n عند حدوث الحمل بتوأم لمرة واحدة، تزداد الفرصة لحدوث ذلك في المرات القادمة.\n\nإحصائيات \nيناهز\
    \ عدد التوائم (الثنائية والثلاثية) أكثر من 125 مليون شخص في العالم (ما يقارب 1.9% من عدد سكان الأرض) 10ملايين توائم متشابهة\
    \ (حوالي 0.2% من عدد سكان الأرض و 8% من عدد التوائم).\n\nحسب الملاحظة التاريخية فإن:\n من كل 80 حمل، يكون حمل واحد لتوائم.\n\
    \ تختلف نسبة التوائم المتشابهة حسب المجموعات العرقية: أقل تكرارا في آسيا، وأكثر تكرارا في أفريقيا. وأعلى نسبة تكرار مسجلة\
    \ في المجموعة العرقية يوروباس .\n يزيد احتمال الحصول على توائم لدى النساء اللاتي تتعاطى أدوية تزيد في الخصوبة.\n\nارتفع\
    \ معدل مواليد التوأم البشري في الولايات المتحدة بنسبة 76٪ من عام 1980 إلى 2009، بمقدار 18.9 إلى 33.3 لكل 1000 ولادة (حوالي\
    \ 80٪).\n\nوتمتلك شعوب يوروبا أعلى معدلات التوأمة في العالم بمقدار 90-100 توأم لكل 1000 ولادة حية، ربما بسبب ارتفاع استهلاك\
    \ نوع معين من اليام الذي يحتوي على إستروجين نباتي طبيعي قد يحفز المبايض لإطلاق بويضة من كل جانب.\n\nيوجد في وسط أفريقيا\
    \ 18-30 مجموعات توائم (أو 36-60 توأم) لكل 1000 ولادة حية. وفي أمريكا اللاتينية، وجنوب آسيا، وجنوب شرق آسيا توجد أدنى المعدلات؛\
    \ فقط من 6 إلى 9 مجموعات توائم لكل 1000 ولادة حية. بينما تمتلك أمريكا الشمالية وأوروبا معدلات متوسطة؛ من 9 إلى 16 مجموعات\
    \ توائم لكل 1000 ولادة حية.\n\nومن المرجح أن يُنتِج الحمل المتعدد مواليد تامة مدة الحمل بنسبة أقل من المواليد المفردة،\
    \ حيث تستمر مدة حمل التوأم في المتوسط 37 أسبوعا (ثلاثة أسابيع أقل من المدة الكاملة).\n\nالنساء اللاتي لديهن تاريخ عائلي\
    \ من التوائم الأخوية لديهم فرصة أكبر لإنتاج التوائم الأخوية، حيث أن هناك ميلا وراثيا إلى فرط التبويض. بينما لا توجد صلة\
    \ وراثية معروفة للتوائم المتطابقة.\n\nأنواع التوائم والاقترانية الزيجوتية \nالغالبية العظمى من التوائم إما ثنائية الزيجوت\
    \ (أخوية) أو أحادية الزيجوت (متطابقة). وتُناقَش المتغيرات الأقل شيوعا أسفل المقال.\n\nالتوائم يمكن أن تكون:\n\n أنثى-\
    \ أنثى\n ذكر- ذكر\n ذكر- أنثى، وهو الاقتران الأكثر شيوعا حيث أن نصف التوائم الأخوية (ثنائية الزيجوت) تتكون من ذكر وأنثى\n\
    \nبين ولادات غير التوائم، الذكور المفردة هي الأكثر شيوعا بقليل من الإناث المفردة (حوالي خمسة في المئة). وتختلف المعدلات\
    \ الخاصة بالولادات المفردة قليلا حسب البلد. على سبيل المثال، نسبة جنس الولادة في الولايات المتحدة هي 1.05 ذكور/ إناث،\
    \ في حين أنها 1.07 ذكور/ إناث في إيطاليا. ومع ذلك، فإن الذكور أيضا أكثر عرضة من الإناث للموت في الرحم، وبما أن معدل الوفيات\
    \ في الرحم هو أعلى للتوائم، فإنه يؤدي إلى أن التوائم الإناث أصبحت أكثر شيوعا من التوائم الذكور.\n\nالاقترانية الزيجوتية\
    \ هي درجة المطابقة بين جينوم التوائم.\n\nتوائم ثنائية الزيجوت (أخوية) \n\nتحدث التوائم ثنائية الزيجوت أو التوائم الأخوية\
    \ (والتي يشار إليها أيضا باسم «التوائم غير المتطابقة»، أو «توائم البيضتين»)، عندما تنغرس بيضتان مخصبتان في جدار الرحم\
    \ في نفس الوقت. وذلك عندما يتم تخصيب اثنين من البيض كل على حدا بواسطة اثنين مختلفين من الحيوانات المنوية، مما ينتج التوائم\
    \ الأخوية. وتكوّن البيضتان اثنين من الزيجوت، ومن هنا جاءت التسمية بالتوائم ثنائية الزيجوت أو توائم البيضتين. التوائم الأخوية\
    \ هما في الأساس شقيقان عادييان يولدان في نفس الوقت، حيث أنهما ينشأان من بيضتين منفصلتين يخصبهما حيوانان منويان منفصلان،\
    \ تماما مثل الأشقاء العاديين.\n\nوهذا هو النوع الأكثر شيوعا من التوائم.\n\nالتوائم ثنائية الزيجوت، مثل أي أشقاء آخرين،\
    \ لديهم فرصة صغيرة للغاية من امتلاك نفس الملف الكروموسومي. وحتى لو حصلوا على نفس الملف الكروموسومي، سيكون لديهم دائما\
    \ مادة وراثية مختلفة على كل كروموسوم، بسبب الانتقال المتبادل للكروموسومات خلال الانقسام الاختزالي. ومثل أي أشقاء آخرين،\
    \ قد تبدو التوائم ثنائية الزيجوت متشابهة، خاصة بالنظر إلى أنها في نفس العمر. ومع ذلك، فالتوائم ثنائية الزيجوت قد تبدو\
    \ أيضا مختلفة جدا عن بعضها البعض.\n\nوتُظهر الدراسات أن هناك ميل وراثي للتوائم ثنائية الزيجوت. ومع ذلك، فإن الأم فقط هي\
    \ المسئولة عن فرص وجود مثل هذه التوائم. ولا توجد أي آلية معروفة بالنسبة للأب ليشارك في إنتاج أكثر من بويضة واحدة. وتتراوح\
    \ التوائم ثنائية الزيجوت من ستة لكل ألف ولادة في اليابان (على غرار معدل التوائم أحادية الزيجوت) إلى 14 وأكثر في الألف\
    \ في بعض البلدان الأفريقية.\n\nالتوائم ثنائية الزيجوت هي أيضا أكثر شيوعا بين الأمهات الأكبر سنا، مع مضاعفة معدلات التوائم\
    \ في الأمهات فوق سن 35. ومع ظهور تقنيات مساعدة النساء على الحمل، ارتفع معدل التوائم الأخوية بشكل ملحوظ.\n\nالتوائم أحادية\
    \ الزيجوت (متطابقة) \n\nتحدث التوائم أحادية الزيجوت أو التوائم المتطابقة عندما يتم تخصيب بويضة واحدة لتشكيل زيجوت واحد\
    \ (ومن هنا جاءت تسمية «أحادي الزيجوت»)، الذي ينقسم بعد ذلك إلى جنينين منفصلين.\n\nالآلية \nوفيما يتعلق بالتوأمة العفوية\
    \ أو الطبيعية أحادية الزيجوت، تقترح نظرية حديثة أن التوائم أحادية الزيجوت تتشكل بعد انكماش الكيسة الأريمية بشكل أساسي،\
    \ وتقسيم خلايا السلف (تلك التي تحتوي على المادة الجينية الأساسية للجسم) إلى النصف، تاركة نفس المادة الجينية مقسمة إلى\
    \ جزئين على الجانبين المتقابلين من الجنين. ويتطور جنينان منفصلان في نهاية المطاف. لا يعتبر الانقسام العفوي للزيجوت إلى\
    \ اثنين من الأجنة سمة وراثية، بل هو حدث عفوية وعشوائي.\n\nويمكن أن تنشأ التوائم أحادية الزيجوت أيضا بشكل مصطنع عن طريق\
    \ تقسيم الجنين. ويمكن استخدامه كتوسع للتلقيح الصناعي؛ لزيادة عدد الأجنة المتاحة لنقل الأجنة.\n\nمعدل الحدوث \nتحدث التوأمة\
    \ أحادية الزيجوت في الولادة بمعدل حوالي 3 لكل 1000 ولادة في جميع أنحاء العالم. (حوالي 0.3٪ من سكان العالم).\n\nوتتوزع\
    \ احتمالية حدوث توائم أحادية الزيجوت عن طريق إخصاب واحد بين جميع السكان في جميع أنحاء العالم. وهذا يتناقض بشكل ملحوظ مع\
    \ التوأمة ثنائية الزيجوت، التي تتراوح من حوالي ستة لكل ألف ولادة في اليابان (تشبه تقريبا معدل التوائم المتطابقة، التي\
    \ تتراوح من 4-5) إلى 15 وأكثر في الألف في بعض أجزاء الهند، وما يصل إلى أكثر من 20 لكل ألف في بعض بلدان وسط أفريقيا. ومع\
    \ ذلك فإن السبب الحقيقي لانقسام الزيجوت أو الجنين غير معروف.\n\nتقنيات التلقيح الاصطناعي هي الأكثر احتمالا لخلق التوائم\
    \ ثنائية الزيجوت. وبالنسبة لولادات التلقيح الصناعي، هناك ما يقرب من 21 زوجا من التوائم لكل 1000 ولادة.\n\nالتشابه والتخلق\
    \ الجيني \nالتوائم أحادية الزيجوت متطابقة وراثيا تقريبا، وهما دائما نفس الجنس إلا إذا كان هناك طفرة خلال التطور. ويصبح\
    \ أطفال التوائم أحادية الزيجوت نصف الأشقاء وراثيا (أو أشقاء بالكامل، إذا تناسل زوج من التوائم أحادية الزيجوت مع زوج آخر\
    \ أو مع نفس الشخص). التوائم المتماثلة ليس لها نفس بصمات الأصابع، لأن الأجنة تلمس أجزاء مختلفة من بيئتهم داخل حدود الرحم،\
    \ مما يؤدى إلى اختلافات صغيرة في المطبوعات المقابلة لها، مما يجعلها فريدة من نوعها.\n\nتمتلك التوائم أحادية الزيجوت دائما\
    \ مظاهر خارجية مختلفة.؛ وذلك عادة بسبب عامل بيئي أو تعطيل كروموسومات X المختلفة في التوائم أحادية الزيجوت الإناث. وفي\
    \ بعض الحالات النادرة للغاية، بسبب اختلال الصيغة الصبغية، يُظهر التوائم مظاهر جنسية مختلفة، ويحدث ذلك عادة مع انقسام زيجوت\
    \ متلازمة كلاينفيلتر XXY بشكل غير متساو.\n\nعلى الرغم من تشابه التوائم أحادية الزيجوت وراثيا إلى حد كبير إلا أنهما ليسا\
    \ نفس الشيء بالضبط. وتم تحليل الحمض النووي في خلايا الدم البيضاء من 66 زوجا من التوائم أحادية الزيجوت ل 506,786 شكل للنوكليوتيدات\
    \ المتعددة المفردة المعروف حدوثها في المجتمعات البشرية. ظهرت أشكال متعددة في 2 من 33 مليون مقارنة، مما دفع الباحثين إلى\
    \ استنتاج أن خلايا دم التوائم أحادية الزيجوت قد تكون موجودة بترتيب مختلف على تسلسل الحمض النووي الواحد لكل 1.2 × 107 نيوكليوتيد،\
    \ مما يعني مئات من الاختلافات عبر الجينوم بأكمله. وقد حدثت الطفرات التي تنتج الاختلافات التي تم الكشف عنها في هذه الدراسة\
    \ خلال انقسام الخلايا الجنينية (بعد نقطة الإخصاب). وإذا كانت تحدث في وقت مبكر من تطور الجنين، فستكون موجودة في نسبة كبيرة\
    \ جدا من خلايا الجسم.\n\nهناك سبب آخر للاختلافات بين التوائم أحادية الزيجوت وهو تعديلات ما فوق الجينات الناجمة عن تأثيرات\
    \ بيئية مختلفة طوال حياتهم. ويشير علم التخلق إلى مستوى نشاط أي جين معين. وقد يصبح الجين نشط أو مثبَط كليا أو جزئيا في\
    \ الفرد. ويتم إثارة هذه التعديلات فوق الجينية من خلال الأحداث البيئية. قد يكون للتوائم أحادية الزيجوت خواص جينية مختلفة\
    \ بشكل ملحوظ. وأظهرت دراسة على 80 زوج من التوائم أحادية الزيجوت يتراوح سنها من 3 إلى 74عاما أن التوائم الأصغر لديها عدد\
    \ قليل نسبيا من الاختلافات جينية. ويزداد عدد الاختلافات الجينية مع التقدم في السن. وتبين أن التوائم البالغة من العمر خمسين\
    \ عاما لديها فروق تخلقية أكثر ثلاثة أضعاف من التوائم التي تبلغ من العمر ثلاث سنوات. ويوجد اختلاف كبير بين التوائم التي\
    \ أمضت حياتها متفرقة (مثل تلك التي يتبناها أسرتان مختلفتان عند الولادة). وعلى الرغم من أن بعض الخصائص تظل متشابهة مثل\
    \ العمر، هناك بعض الخواص التي قد تختلف، مثل الذكاء والشخصية.\n\nالجسم القطبي والتوائم النصفية \nوأظهرت دراسة أجريت عام\
    \ 1981 على توأم متعدد الصبغيات xxx بدون قلب متوفى أنه على الرغم من أن تطور الجنين يُظهر أن التوائم متطابقة، حيث أن التوأم\
    \ المتوفى يتشارك المشيمة مع التوأم الصحيح، إلا أن الاختبارات كشفت أنه ربما كان توأم الجسم القطبي. ولم يتمكن الباحثون من\
    \ التنبؤ بما إذا كان الجنين الصحيح يمكن أن يُنتج توأمة الجسم القطبي.\n\nفي عام 2003، دعت دراسة ما إلى أن العديد من الحالات\
    \ ثلاثية الصبغيات تنشأ من توأم شبه متطابقة.\n\nنوع توأم غير معروف \nفي عام 2007، أفادت دراسة حالة زوج من التوائم الحية،\
    \ أحدهما ثنائي الجنس والآخر نمطه الظاهري ذكر. ووُجِد أن التوائم على حد سواء كيميرا، ويتشاركان كل الحمض النووي الخاص بالأم\
    \ وفقط نصف الحمض النووي للأب. لا يمكن تحديد الآلية الدقيقة للإخصاب إلا أن الدراسة ذكرت أنه من غير المرجح أن تكون حالة\
    \ توأمة الجسم القطبي.\n\nدرجة الانفصال \n\nتعتمد درجة انفصال التوائم في الرحم على إذا ما تم الانقسام إلى بويضتين مخصبتين\
    \ ووقت الانفصال. دائما ما تنتج التوائم ثنائية الزيجوت من بويضتين مخصبتين. بينما تنقسم التوائم أحادية الزيجوت إلى بويضتين\
    \ مخصبتين في وقت ما مبكر جدا من الحمل. ويحدد توقيت هذا الفصل المشيمية (عدد المشيمة) وعدد الأكياس السلوية للحمل. التوائم\
    \ ثنائية المشيمة إما أنها لم تنقسم أبدا (كانت بويضتين ملقحتين) أو أنها انقسمت في غضون الأربعة أيام الأولى. بينما تنقسم\
    \ التوائم أحادية الكيس السلوي بعد الأسبوع الأول.\n\nفي حالات نادرة جدا، تصبح التوائم ملتصقة. تتشكل التوائم الزيجوتية غير\
    \ الملتصقة حتى اليوم الرابع عشر من التطور الجنيني، ولكن عندما تحدث التوأمة بعد 14 يوما، من المرجح أن تكون التوائم ملتصقة.\
    \ وعلاوة على ذلك، يمكن أن تكون هناك اختلافات في البيئة المشتركة للتوائم في الرحم، مما يؤدي إلى مضاعفات الحمل.\n\nومن المفاهيم\
    \ الخاطئة الشائعة أن وجود مشيمتين يعني أن التوائم ثنائية الزيجوت. ولكن إذا انفصلت التوائم أحادية الزيجوت في وقت مبكر بما\
    \ فيه الكفاية، يصبح ترتيب أكياس السلى والمشيمة في الرحم لا يمكن تمييزه عن التوائم ثنائية الزيجوت.\n\nالتركيبة السكانية\
    \ \nوجدت دراسة أجريت في عام 2006 أن عامل النمو الشبيه بالأنسولين الموجود في منتجات الألبان قد يزيد من فرصة التوأمة ثنائية\
    \ الزيجوت. وخلصت الدراسة إلى أن «الأنماط الجينية التي ترتبط بارتفاع عامل النمو الشبيه بالأنسولين والتي تفضل الوجبات الغذائية\
    \ التي تتضمن منتجات الألبان، وخاصة في المناطق التي يُعطى فيها هرمون النمو للماشية تعزز فرص الحمل المتعدد بسبب تحفيز المبيض.»\n\
    \nوفي الفترة من 1980 إلى 1997، ارتفع عدد المواليد التوأم في الولايات المتحدة بنسبة 52٪. ويمكن أن يعزى هذا الارتفاع جزئيا\
    \ على الأقل إلى ازدياد شعبية أدوية الخصوبة وبعض الإجراءات مثل التلقيح الصناعي، مما يؤدي إلى تعدد الولادات أكثر مما يحدث\
    \ في حالة الإخصاب دون مساعدة. ويمكن أيضا أن يكون مرتبط بزيادة هرمونات النمو في الغذاء.\n\nالأصل العرقي \n\nينتج حوالي\
    \ 1 من كل 90 ولادة بشرية (1.1٪) عن حمل توأم. ويختلف معدل التوأمة ثنائية الزيجوت اختلافا كبيرا بين المجموعات العرقية، حيث\
    \ تصل إلى حوالي 45 لكل 1000 ولادة (4.5٪) في يوروبا، و10٪ في لينها ساو بيدرو، وهي مستوطنة برازيلية صغيرة تنتمي إلى مدينة\
    \ كانديدو غودوي. في كانديدو غودوي، تنتج واحدة من كل خمس حالات حمل توائم. وقدم المؤرخ الأرجنتيني خورخي كاماراسا نظرية بأن\
    \ تجارب الطبيب النازي يوزاف منغيله قد تكون مسؤولة عن ارتفاع نسبة التوائم في المنطقة. ورُفضت النظرية من قِبل العلماء البرازيليين\
    \ الذين درسوا التوائم الذين يعيشون في لينها ساو بيدرو، واقترحوا العوامل الجينية داخل هذا المجتمع كتفسير أكثر ترجيحا. كما\
    \ لوحظ ارتفاع معدل التوأمة في أماكن أخرى من العالم، بما في ذلك:\n\n إيغبو-أورا في نيجيريا\n كودينجي، وتقع في ولاية كيرلا،\
    \ الهند\n محمدبور أومري، وتقع في ولاية أتر برديش، الهند\n\nوقد أدى الاستخدام الواسع النطاق لعقاقير الخصوبة التي تسبب فرط\
    \ التحفيز (تحفيز إطلاق بويضات متعددة من مبيض الأم) إلى ما يسميه البعض «وباء تعدد الولادات». وفي عام 2001، وللمرة الأولى\
    \ على الإطلاق في الولايات المتحدة، تجاوز معدل التوأمة 3٪ من جميع الولادات. ومع ذلك، لا يزال معدل التوائم أحادية الزيجوت\
    \ حوالي 1 لكل 333 ولادة في جميع أنحاء العالم.\n\nوفي دراسة عن سجلات الأمومة ل 5750 امرأة من الهوسا في منطقة السافانا في\
    \ نيجيريا، كان هناك 40 توأم ثنائي وتوأمان ثلاثيان لكل 1000 مولود. وكان ستة وعشرون في المئة من التوائم أحادية الزيجوت.\
    \ وكان معدل الولادات المتعددة، الذي كان أعلى بنحو خمسة أمثال ما لوحظ في أي سكان غربيين، أقل بكثير من عدد المجموعات الإثنية\
    \ الأخرى التي تعيش في المناخ الحار والرطب في الجزء الجنوبي من البلد. وكانت حالات تعدد الولادات مرتبطة بعمر الأم ولكنها\
    \ لم تحمل أي ارتباط بالمناخ أو انتشار الملاريا.\n\nالعوامل المؤهبة \nالعوامل المؤهبة للتوأمة أحادية الزيجوت غير معروفة.\n\
    \nوتزداد احتمالية حدوث التوائم ثنائية الزيجوت عندما تكون العوامل التالية موجودة في المرأة:\n\n يكون أصلها من غرب أفريقيا\
    \ (وخاصة اليوروبا)\n يتراوح عمرها بين 30 و 40 عاما\n أكبر من متوسط الطول والوزن\n لديها عدة حالات حمل سابقة.\nوقد يكون\
    \ لدى النساء اللواتي يخضعن لبعض علاجات الخصوبة فرصة أكبر للولادات المتعددة ثنائية الزيجوت. في الولايات المتحدة كان من\
    \ المقدر أنه بحلول عام 2011 ولادة 36٪ من التوائم نتيجة الحمل من خلال تقنيات التلقيح بالمساعدة.\n\nتختلف فرص ولادة التوائم\
    \ اعتمادا على أنواع علاجات الخصوبة المستخدمة. مع التلقيح الصناعي، يرجع ذلك أساسا إلى إدخال أجنة متعددة في الرحم. كما أن\
    \ فرط تحفيز المبيض دون التلقيح الاصطناعي لديه مخاطر عالية جدا للولادات المتعددة. عكس انقطاع الإباضة مع كلوميفين الذي لديه\
    \ فرصة أقل نسبيا ولكنها مهمة للحمل المتعدد.\n\nالفاصل الزمني للولادة \nأعطت دراسة ألمانية مدتها 15 عاما على 4,110 حالة\
    \ حمل (8,220 توأم مولود مهبليا) في هسن متوسط فاصل زمني للولادة يبلغ 13.5 دقيقة. وتم قياس الفترة الفاصلة بين الولادة بين\
    \ التوأمين كما يلي:\n\n خلال 15 دقيقة: 75.8٪\n 16-30 دقيقة: 16.4٪\n 31-45 دقيقة: 4.3٪\n 46-60 دقيقة: 1.7٪\n أكثر من 60\
    \ دقيقة: 1.8٪ (72 حالة)\n\nوأشارت الدراسة إلى أن حدوث المضاعفات كان أكثر احتمالا مع زيادة الفاصل الزمني بين ولادة التوائم،\
    \ واقترحت أن تبقى الفترة الفاصلة قصيرة، على الرغم من ملاحظة أن الدراسة لم تفحص أسباب المضاعفات ولم تسيطر على عوامل مثل\
    \ مستوى خبرة طبيب التوليد، أو رغبة النساء في الولادة، أو «استراتيجيات إدارة» إجراءات توليد التوأم الثاني.\n\nالمضاعفات\
    \ أثناء الحمل\n\nمتلازمة التوأم المتلاشي \n\nيعتقد الباحثون أن ما يصل إلى 1 من كل 8 حالات حمل تبدأ كحمل متعدد، ولكن جنين\
    \ واحد فقط يستمر إلى الاكتمال، حيث يتوفى الجنين الآخر في وقت مبكر جدا من الحمل دون اكتشافه أو تسجيله. قد يكشف تخطيط الصدى\
    \ التوليدي في وقت مبكر عن جنين إضافي في بعض الأحيان، والذي يفشل في التطور وبدلا من ذلك يتفكك ويختفي في الرحم. هناك عدة\
    \ أسباب للجنين «المتلاشي»، بما في ذلك امتصاصه من قِبل الجنين الآخر أو المشيمة أو الأم. ويعرف ذلك باسم متلازمة التوأم المتلاشي.\
    \ وأيضا، في نسبة غير معروفة من الحالات، قد يتحد اثنان من اللقاحات بعد الإخصاب مباشرة، مما يؤدى إلى تكون كيميري واحد يصبح\
    \ بعد ذلك جنين.\n\nالتوائم الملتصقة \n\nالتوائم الملتصقة (أو «السيامي») هي التوائم أحادية الزيجوت التي تلتصق أجسامهما\
    \ معا خلال فترة الحمل. يحدث ذلك عندما يبدأ الزيجوت بالانقسام بعد اليوم الثاني عشر بعد الإخصاب، ويفشل في الانفصال تماما.\
    \ وتحدث هذه الحالة في حوالي 1 لكل 50,000 حمل بشري. يتم تقييم معظم التوائم الملتصقة الآن للخضوع لعملية جراحية لمحاولة فصلها\
    \ إلى أجسام وظيفية منفصلة. وتزداد درجة الصعوبة إذا تقاسم التوائم الأعضاء والهياكل الحيوية، مثل الدماغ والقلب والكبد.\n\
    \nالكيمرية \n\nكيميرا هو شخص أو حيوان عادي باستثناء ذلك الذي يكون بعض أجزائه قد جاءت بالفعل من توأم أو من الأم. قد ينشأ\
    \ الكيميرا إما من الأجنة التوائم أحادية الزيجوتية (حيث يكون من المستحيل الكشف عنها)، أو من الأجنة ثنائية الزيجوت، والتي\
    \ يمكن تحديدها من خلال مقارنات كروموسومية من أجزاء مختلفة من الجسم. وقد يختلف عدد الخلايا المستمدة من كل الجنين من جزء\
    \ من الجسم إلى آخر، وغالبا ما يؤدي إلى لون الجلد الفسيفسائي المميز في إنسان الكيميرا. يمكن أن يكون الكيميرا خنثى، يتكون\
    \ من خلايا من توأم ذكر وأنثى. وفي إحدى الحالات، كشفت اختبارات الحمض النووي أن امرأة ما لم تكن أم لطفلين من أطفالها الثلاثة،\
    \ ووُجد أن الأم كيميرا، وأن الطفلين تكونا من بويضات مستمدة من خلايا توأم أمهما.\n\nالتوأم الطفيلي \n\nفي بعض الأحيان،\
    \ يفشل أحد التوأمين في التطور تماما، ويستمر في التسبب في مشاكل لتوأمه الذي ما زال على قيد الحياة. ويكون أحد الجنينين بمثابة\
    \ طفيلي يالنسبة للآخر. في بعض الأحيان، يصبح التوأم الطفيلي جزءا لا يمكن تمييزه تقريبا من التوأم الآخر، وأحيانا يحتاج ذلك\
    \ إلى علاج طبي.\n\nالتوائم المولية الجزئية \nهناك نوع نادر جدا من التوأمة الطفيلية التي يكون فيها أحد التوائم عرضة للخطر\
    \ عندما يصبح الزيجوت الأخر مسرطَن أو مولي. وهذا يعني أن الانقسام الخلوي للزيجوت المولي يستمر بصورة غير محددة، مما يؤدي\
    \ إلى نمو سرطاني يتجاوز الجنين القابل للحياة. وعادة، يحدث ذلك عندما يكون أحد التوائم إما ثلاثي الصبغيات أو ثنائي الصبغيات\
    \ التي يكون مصدرها بالكامل من الأب، مما يؤدى إلى القليل من أو عدم وجود جنين ومشيمة مسرطَنة متضخمة تشبه عنقود العنب.\n\n\
    التوأم الجَهِض \nأحيانا، تعاني المرأة من الإجهاض في وقت مبكر من الحمل، ولكن الحمل يستمر، حيث يتم إجهاض أحد التوائم ولكن\
    \ الآخر يكون قادرا على الاكتمال. هذا الحدث يشبه متلازمة التوأم المتلاشي، ولكن يحدث عادة في وقت لاحق، حيث لا يتم ارتشاف\
    \ التوأم.\n\nانخفاض وزن الولادة \nمن الشائع جدا أن يكون وزن التوائم منخفض عند الولادة. ويولد أكثر من نصف التوائم بوزن\
    \ أقل من 5.5 رطل (2.5 كجم)، في حين أن متوسط الوزن عند الولادة لطفل سليم يجب أن يكون حوالي 6-8 رطل (3-4 كجم). ويرجع ذلك\
    \ إلى حد كبير إلى أن التوائم عادة ما تولد سابقة لأوانها. يمكن أن تؤدي الولادة المبكرة وأوزان الولادة المنخفضة، وخاصة عندما\
    \ يقل الوزن عن 3.5 رطل (1.6 كجم)، إلى زيادة حدوث العديد من المشكلات المرتبطة بالصحة، مثل فقدان البصر، والسمع، والإعاقات\
    \ العقلية، والشلل الدماغي. ويتزايد احتمالية حدوث المضاعفات كلما انخفض وزن الولادة للطفل.\n\nمتلازمة نقل الدم الجنيني \n\
    \nيمكن أن تحدث متلازمة نقل الدم الجنيني في التوائم أحادية الزيجوت التي تتشارك في المشيمة. وتعني هذه الحالة أن الدم يتحول\
    \ من أحد التوائم إلى التوأم الآخر. أحد التوائم «التوأم المانح» يكون صغير الحجم ولديه فقر دم، والآخر «التوأم المتلقي» يكون\
    \ كبير الحجم ولديه كثرة في كريات الدم الحمر. وتتعرض حياة كلا التوأمين للخطر بسبب هذه الحالة.\n\nولادة جنين ميت \nتحدث\
    \ حالات الإملاص عندما يموت الجنين بعد 20 أسبوع من الحمل. وهناك نوعان من الإملاص، الموت داخل الرحم والموت أثناء الولادة.\
    \ يحدث الموت داخل الرحم عندما يموت الطفل خلال فترة متأخرة من الحمل. بينما الموت أثناء الولادة هو الأكثر شيوعا. وغالبا\
    \ ما يكون سبب الإملاص غير معروف، ولكن معدلات حدوث الإملاص أعلى في التوائم والولادات المتعددة. ويُنصح بالولادة القيصرية\
    \ أو التحريض على الولادة بعد 38 أسبوع من الحمل للتوائم، لأن خطر الإملاص يزيد بعد ذلك الوقت.\n\nإدارة الولادة \nيُنصح بمحاولة\
    \ التوليد المهبلي بين الأسبوع 37 و38 لحالات حمل التوأم الصحية التي يكون فيها رأس كلا التوأمين للأسفل. ولا تؤدي الولادة\
    \ المهبلية في هذه الحالة إلى تفاقم النتائج بالمقارنة مع العملية القيصرية. وهناك جدل حول أفضل طريقة للتوليد عندما يكون\
    \ رأس التوأم الأول للأسفل والثاني ليس كذلك. وينصح بالولادة القيصرية عندما لاتكون رأس التوأم الأول للأسفل. وتشير التقديرات\
    \ إلى أن 75٪ من حالات حمل التوائم في الولايات المتحدة يتم توليدها عن طريق العمليات القيصرية في عام 2008. في المقابل، فإن\
    \ معدل العمليات القيصرية لجميع حالات الحمل في عموم السكان يتراوح بين 14٪ و40٪. ويتم التوليد في التوائم التي تشترك في المشيمة\
    \ نفسها عند الأسبوع 36.\n\nدراسات التوائم البشرية \nتستخدم دراسات التوائم في محاولة لتحديد كم من سمة معينة تعزى إلى الوراثة\
    \ أو التأثير البيئي. وتقارن هذه الدراسات التوائم أحادية الزيجوت والثنائية الزيجوت من حيث الخصائص الطبية أو الوراثية أو\
    \ النفسية في محاولة لعزل التأثير الجيني من التأثير التخلقي والبيئي. وتسعى الدراسات للبحث عن التوائم التي يتم انفصالها\
    \ في وقت مبكر من الحياة، ونشأتها في أسر منفصلة بشكل خاص، حيث استخدمت على نطاق واسع في استكشاف الطبيعة البشرية. ويجري الآن\
    \ استكمال دراسات التوأم الكلاسيكية مع دراسات الوراثة الجزيئية التي تحدد جينات الفرد.\n\nالتوأمة غير الاعتيادية \nفي حالات\
    \ نادرة بين التوائم ثنائية الزيجوت، يتم إخصاب البويضات في أوقات مختلفة بواسطة اثنين أو أكثر من مرات الجماع، إما في غضون\
    \ دورة طمث واحدة، أو في وقت لاحق في الحمل (حمل إضافي). ويمكن أن يؤدي ذلك إلى إمكانية حمل المرأة بتوائم أخوية من آباء مختلفين\
    \ (أي نصف الأشقاء). وتعرف هذه الظاهرة بتعدد الإخصاب مختلف الآباء. وتقدر إحدى الدراسات التي أجريت في عام 1992 أن تواتر\
    \ تعدد الإخصاب مختلف الآباء بين التوائم ثنائية الزيجوت كان حوالي 2.4 في المائة.\n\nيمكن أن تكون التوائم ثنائية الزيجوت\
    \ من الأزواج ثنائية العِرق في بعض الأحيان توائم مختلطة، والتي تظهر ملامح عرقية مختلفة. وولد أحد هؤلاء التوائم في ألمانيا\
    \ في عام 2008 لأب أبيض من ألمانيا وأم سوداء من غانا.\n\nالحمل المشترك هو نوع نادر جدا من التوائم ثنائية الزيجوت التي يزرع\
    \ فيها أحد التوائم في الرحم كالمعتاد والثاني يبقى في قناة فالوب كحمل منتبذ. ويجب التخلص من الحمل المنتبذ؛ لأنه قد يهدد\
    \ الحياة الأم. ومع ذلك، يمكن إنقاذ الحمل الموجود داخل الرحم في معظم الحالات.\n\nفي حالات نادرة للغاية بين التوائم أحادية\
    \ الزيجوت، يولد التوائم بجنس مختلف (أحدهما ذكر والآخر أنثى)؛ وذلك بسبب عيوب في الكروموسومات. حيث يمكن أن يكون هناك توأم\
    \ أحادي الزيجوت من ذكر وأنثى إذا كان الجين المسئول عن الجنس في الجنين لديه كروموسوم X إضافي (تكون البويضة المخصبة xxy)\
    \ ثم تنقسم البويضة بعد ذلك إلى xx (أنثى) وxy (ذكر). هذا أمر نادر الحدوث، ولكنه ممكن. وتُظهر السجلات أن هناك فقط 10 حالات\
    \ معروفة من هذا النوع من التوائم.\n\nاحتمالية حدوث ذلك صغيرة جدا، حيث أنه من المعروف عالميا أن الولادات المتعددة التي\
    \ لها أجناس مختلفة لا تكون أحادية الزيجوت. هناك شذوذ آخر يمكن أن يؤدي إلى التوائم أحادية الزيجوت مختلفة الأجناس يحدث إذا\
    \ تم إخصاب البويضة من قِبل الحيوان المنوي، ولكن خلال انقسام الخلايا يتضاعف كروموسوم X فقط. وينتج عن ذلك ذكر عادي (XY)\
    \ وأنثى مصابة بمتلازمة تيرنر (45,X). في هذه الحالات، على الرغم من أن التوائم تشكلت من نفس البويضة المخصبة، إلا أنهم غير\
    \ متطابقين وراثيا، لأن لديهم أشكال مختلفة من النمط النووي.\n\nالتوائم النصفية \nقد تتطور التوائم أحادية الزيجوت بشكل مختلف،\
    \ وذلك بسبب الجينات المختلفة التي يتم تفعيلها، مثل «التوائم شبه متطابقة» أو التوائم النصفية. هذه «التوائم شبه المتطابقة»\
    \ يفترض أن تحدث عندما تنقسم بويضة غير مخصبة إلى بويضتين متطابقتين ومتصلتين قابلة للإخصاب. ثم يتم تخصيب كل من البويضتين\
    \ المستنسختين من قِبل الحيوانات المنوية المختلفة، ثم تخضع البويضات المخصبة لمزيد من المضاعفات مكونة قسيم أريمي كيميري.\
    \ إذا خضع ذلك القسيم الأريمي للتوأمة بعد ذلك، سيتم تشكيل اثنين من الأجنة، لكل منها جينات أبوية مختلفة وجينات متطابقة من\
    \ الأم.\n\nتحمل الخلايا في كل جنين جينات من حيوان منوي مختلف عن الجنين الآخر منتجا الكيميرا. وقد كان يتم التكهن بهذا النموذج\
    \ حتى تم تسجيله مؤخرا في الطب الغربي.\n\nتوائم الصورة المرآتية \nتنتج توائم الصورة المرآتية عندما تنقسم البويضة المخصبة\
    \ في وقت من المرحلة الجنينية متأخر عن التوقيت العادي بحوالي 9-12 يوم. وقد يظهر هذا النوع من التوأمة خصائص عدم التناظر\
    \ المعكوس، مثل سيادة اليد المهيمنة المعكوس، أو بنية الأسنان، أو حتى الأعضاء (انقلاب وضع الأحشاء). وإذا حدث الانقسام في\
    \ وقت لاحق لهذه الفترة الزمنية، يتعرض التوائم لخطر الالتصاق. ولا يوجد أي اختبار قائم على الحمض النووي يمكنه أن يحدد ما\
    \ إذا كان التوائم في الواقع صورة مرآتية أم لا.\n\nتطور اللغة \nهناك العديد من الدراسات التي تسلط الضوء على تطور اللغة\
    \ بين التوائم بالمقارنة مع الأطفال المولودين مفردين. وقد تقاربت هذه الدراسات على فكرة أن هناك معدل أكبر من التأخير في\
    \ تطوير اللغة في التوائم مقارنة مع نظرائهم المفردين. وما زالت أسباب هذه الظاهرة موضع تساؤل. ومع ذلك، كان يعتقد أن اللغة\
    \ الخفية بين التوأم هي السبب الرئيسي. يتم تعريف الزمزمة (بالإنجليزية: Idioglossia) بأنها لغة خاصة عادة ما يتم اختراعها\
    \ من قِبل الأطفال الصغار، وتحديدا التوائم. وهناك مصطلح آخر لوصف ما يسميه بعض الناس «حديث التوأم» هو كريبتوفازيا (بالإنجليزية:\
    \ Cryptophasia) أو اللغة الخفية، وهي لغة يتم تطويرها بواسطة التوائم وهم فقط من يستطيعوا فهمها. وقد تؤدي زيادة التركيز\
    \ على التواصل بين التوأمين إلى انعزالهم عن البيئة الاجتماعية المحيطة بهم. وقد تبين أن الزمزمة نادرة الحدوث، وتحول انتباه\
    \ العلماء بعيدا عن هذه الفكرة. ومع ذلك، هناك باحثون وعلماء يقولون أن الكريبتوفازيا أو الزمزمة ليست ظاهرة نادرة. ويعمل\
    \ البحث الحالي على معرفة آثار البيئة الاجتماعية الأكثر ثراء على تحفيز تطوير لغة التوائم.\n\nحيوانات \nالتوائم شائعة في\
    \ العديد من الفصائل الحيوانية، بما في ذلك القطط، والأغنام، وابن مقرض، والباندا العملاقة، والكلاب، والغزلان، والطمارين.\
    \ وتتراوح نسبة التوأمة بين الأبقار بين 1 و4 في المائة، ويجري البحث حاليا لتحسين احتمالات التوأمة، التي يمكن أن تكون أكثر\
    \ ربحية بالنسبة للمربي إذا أمكن التغلب على المضاعفات أو إدارتها.\n\nتوائم مشهورة \n رومولوس ورموس مؤسسا روما.\n مصطفى\
    \ أمين وعلي أمين مؤسسا جريدة ومؤسسة أخبار اليوم المصرية.\n ذا الوسف مان وثري دوغ أبطال غانا وكوت ديفوار.\n حسام حسن وإبراهيم\
    \ حسن لاعبى كرة قدم منتخب مصر سابقا.\n\nانظر أيضًا \n\n توائم أحادية المشيمة\n متلازمة التوأم المتلاشي\n مواليد توائم\n\
    \ حمل إضافي\n جنين داخل جنين\n ولادات متعددة\n بطن (حيوانات)\n دراسة توأمية\n برج الجوزاء\n الشبيه\n توأمة مدن\n جون وجينفر\
    \ غيبنز\n ماريان وفيفيان براون\n\nالمصادر \n<div class=\"ltr\">\n\nتكاثر الثدييات\nتوائم\nشقيق\nعلم الحيوان\nولادة"
