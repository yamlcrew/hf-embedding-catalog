    service?
  sentences:
  - "Jane Jacobs\n\nComienzos\n\nJacobs nació Jane Butzner en Scranton, Pensilvania, la hija de Bess Robison Butzner, una\
    \ ex maestra y enfermera y John Decker Butzner, un médico. Eran una familia protestante en una ciudad fuertemente católica.​\
    \ Su hermano, John Decker Butzner, Jr., trabajó como juez en el Tribunal de Apelaciones de los Estados Unidos para el\
    \ Cuarto Circuito. Después de graduarse en la Scranton High School, trabajó durante un año como asistente no remunerada\
    \ del editor de páginas femeninas del Scranton Tribune.\n\nFormación en Nueva York\n\nEn 1935, durante la Gran Depresión,\
    \ se mudó a Nueva York con su hermana Betty. Jane Butzner tomó un gusto inmediato al Greenwich Village de Manhattan, que\
    \ no se ajustaba a la estructura de la red de la ciudad. Las hermanas pronto se mudaron allí desde Brooklyn.​\nDurante\
    \ sus primeros años en la ciudad, Jacobs ocupó una variedad de trabajos, trabajando principalmente como estenógrafa y\
    \ escritora independiente, a menudo escribiendo sobre distritos laborales de la ciudad. Estas experiencias, dijo ella\
    \ más tarde, \"... me dieron una noción más clara de lo que estaba sucediendo en la ciudad y cómo eran los negocios, cómo\
    \ era el trabajo\". Su primer trabajo fue para una revista especializada, primero como secretaria y luego como editora.\
    \ Vendió artículos en el Sunday Herald Tribune, la revista Cue y Vogue.\nEstudió en la Escuela de Estudios Generales de\
    \ la Universidad de Columbia durante dos años, tomando cursos de geología, zoología, derecho, ciencias políticas y economía.​\
    \ Acerca de la libertad de seguir estudiando a través de sus amplios intereses, dijo:\n  \"Por primera vez me gustó la\
    \ escuela y por primera vez tuve buenas notas. Esto fue casi mi perdición porque después de haber cosechado, estadísticamente,\
    \ un cierto número de créditos me convertí en propiedad del Barnard College en Columbia, y una vez que fui propiedad de\
    \ Barnard tuve que estudiar, al parecer, lo que Barnard quería que estudiara. No es lo que quería aprender. Afortunadamente,\
    \ mis notas en el instituto habían sido tan malas que Barnard decidió que no podía pertenecer a él y, por lo tanto, se\
    \ me permitió continuar eligiendo mis estudios.\"​\n\nCarrera\n\nDespués de asistir a la Escuela de Estudios Generales\
    \ de la Universidad de Columbia durante dos años, Butzner encontró un trabajo en la revista Iron Age. Su artículo de 1943\
    \ sobre el declive económico en Scranton tuvo buena acogida y llevó a la Corporación Murray a ubicar allí una fábrica\
    \ de aviones de combate. Alentada por este éxito, Butzner solicitó a la Junta de Producción de Guerra que respaldara más\
    \ operaciones en Scranton. Al experimentar la discriminación en Iron Age, también abogó por la igualdad salarial para\
    \ las mujeres y por el derecho de los trabajadores a sindicalizarse.​\n\nAmerika\n\nSe convirtió en una escritora de la\
    \ Office of War Information y luego en una reportera para Amerika, una publicación del Departamento de Estado de EE. UU.​para\
    \ distribuirla en la Unión Soviética. Mientras trabajaba allí conoció a Robert Hyde Jacobs Jr., un arquitecto educado\
    \ en Columbia que estaba diseñando aviones de combate para Grumman. Se casaron en 1944. Juntos tuvieron una hija, Burgin,\
    \ y dos hijos, James y Ned. Compraron un edificio de tres pisos en 555 Hudson St. \nJane continuó escribiendo para Amerika\
    \ después de la guerra, mientras que Robert dejó Grumman y volvió a su trabajo como arquitecto.\nLos Jacobs rechazaron\
    \ los suburbios en rápido crecimiento como \"parásitos\", y prefirieron quedarse en el Greenwich Village. Renovaron su\
    \ nueva casa, en el medio de una zona residencial y comercial mixta, y crearon un jardín en el patio trasero.​\nTrabajando\
    \ para el Departamento de Estado durante el macartismo, Jacobs recibió un cuestionario sobre sus creencias políticas y\
    \ lealtades. Jacobs era anticomunista y había abandonado el Sindicato Federal de Trabajadores por sus aparentes simpatías\
    \ comunistas. Sin embargo, ella estaba a favor de la sindicación y supuestamente apreciaba la escritura de Saul Alinsky;\
    \ por lo tanto, estaba bajo sospecha. El 25 de marzo de 1952, Jacobs dio una respuesta ahora famosa a Conrad E. Snow,\
    \ presidente de la Junta de Seguridad de Lealtad del Departamento de Estado de los Estados Unidos. En su prólogo a su\
    \ respuesta, ella dijo:\n\n   \"La otra amenaza a la seguridad de nuestra tradición, creo, se encuentra en casa. Es el\
    \ miedo actual a las ideas radicales y de las personas que las proponen. No estoy de acuerdo con los extremistas de la\
    \ izquierda o la derecha, pero creo que se les debe permitir hablar y publicar, tanto porque ellos mismos tienen, y deberían\
    \ tener, sus derechos, y una vez que sus derechos se han ido, los derechos del resto de nosotros apenas estarán seguros\
    \ ...\"​\n\nForo arquitectónico\n\nJacobs abandonó Amerika en 1952 cuando anunció que se mudaría a Washington, DC. Encontró\
    \ un trabajo bien remunerado en Architectural Forum, publicado por Henry Luce de Time Inc.​ Después de un éxito temprano\
    \ en el trabajo, Jacobs comenzó a trabajar en expedientes sobre planificación urbana y \"decadencia urbana\". En 1954,\
    \ fue elegida para cubrir un desarrollo en Filadelfia diseñado por Edmund Bacon. Aunque sus editores esperaban un informe\
    \ positivo, Jacobs criticó el proyecto de Bacon, reaccionando contra la aparente falta de atención mostrada por los afroamericanos\
    \ pobres que se vieron directamente afectados. Cuando Bacon le mostró a Jacobs ejemplos de bloques no desarrollados y\
    \ desarrollados, ella concluyó que el \"desarrollo\" parecía terminar con la vida comunitaria activa en la calle.​ Cuando\
    \ Jacobs regresó a las oficinas del Foro de Arquitectura, comenzó a cuestionar el consenso de los años 50 sobre la planificación\
    \ urbana.​\nEn 1955, Jacobs conoció a William Kirk, un pastor episcopaliano que trabajó en East Harlem. Kirk llegó a las\
    \ oficinas del Foro de Arquitectura para describir el impacto que la \"revitalización\" tuvo en East Harlem, y presentó\
    \ a Jacobs al vecindario. \nEn 1956, Jacobs pronunció una conferencia en la Universidad de Harvard, sustituyendo a Douglas\
    \ Haskell del Architectural Forum.​ Se dirigió a los principales arquitectos, urbanistas e intelectuales (incluido Lewis\
    \ Mumford), hablando sobre el tema de East Harlem. Instó a esta audiencia a \"respetar, en el más profundo sentido, fragmentos\
    \ urbanos de caos que tienen una extraña sabiduría propia que aún no está incluida en nuestro concepto de orden urbano\"\
    . Contrariamente a sus expectativas, la charla fue recibida con entusiasmo, pero también la marcó como una amenaza para\
    \ los planificadores urbanos consagrados, los propietarios de bienes raíces y los promotores. Architectural Forum imprimió\
    \ el discurso ese año, junto con fotografías de East Harlem.​\n\nFundación Rockefeller y Muerte y vida de las grandes\
    \ ciudades americanas\n\nDespués de leer el texto de su discurso de Harvard, William H. Whyte invitó a Jacobs a escribir\
    \ un artículo para la revista Fortune. El artículo resultante, \"Downtown Is for People\", apareció en una edición de\
    \ Fortune de 1958, y marcó su primera crítica pública a Robert Moses. Su postura, particularmente su crítica al Lincoln\
    \ Center, no fue popular entre los partidarios de la renovación urbana en Architectural Forum y Fortune.​ Particularmente\
    \ indignó a C. D. Jackson, el editor de Fortune, quien exigió a Whyte por teléfono: \"¿Quién es esta loca?\"​\nEl artículo\
    \ de Fortune llamó la atención de Chadbourne Gilpatric, entonces director asociado de la División de Humanidades de la\
    \ Fundación Rockefeller. [33] La fundación se había movido intensamente en temas urbanos, con un reciente premio al Instituto\
    \ de Tecnología de Massachusetts para estudios de estética urbana que culminaría en la publicación de Imagen de la ciudad\
    \ de Kevin A. Lynch.​ En mayo de 1958, Gilpatric invitó a Jacobs a comenzar a trabajar como revisor de propuestas de subvenciones.\
    \ Más adelante en ese año, la Fundación Rockefeller otorgó una subvención a Jacobs para producir un estudio crítico sobre\
    \ urbanismo y vida urbana en los EE. UU. (Desde mediados de la década de 1950 hasta mediados de la década de 1960, la\
    \ División de Humanidades de la fundación patrocinó un programa de investigación, del cual Jacobs era la beneficiaria\
    \ más conocida.) Gilpatric alentó a Jacobs a \"explorar [...] el campo del diseño urbano para buscar ideas y acciones\
    \ que puedan mejorar el pensamiento sobre cómo el diseño de ciudades podría servir mejor a la vida urbana, incluyendo\
    \ el valor cultural y humano \". Afiliada a The New School (entonces llamada The New School for Social Research), pasó\
    \ tres años realizando investigaciones y escribiendo borradores. En 1961, Random House publicó el producto de su investigación:\
    \ La muerte y la vida de las grandes ciudades de Estados Unidos.\nLa obra sigue siendo uno de los libros más influyentes\
    \ en la historia de la planificación urbanística estadounidense.​ Ella acuñó muchos términos como \"capital social\",\
    \ \"usos primarios mixtos\" y \"ojos en la calle\", que fueron adoptados profesionalmente en el diseño urbano, la sociología\
    \ y otros campos. Jacobs pintó una imagen devastadora de toda la profesión de la planificación urbana, etiquetándola de\
    \ pseudociencia. Esto provocó respuestas airadas de varios hombres ricos y poderosos. Jacobs fue criticada como una \"\
    dama militante\" y una \"ama de casa\": una aficionada que no tenía derecho a interferir con una disciplina establecida.\
    \ Su libro también fue criticado por la izquierda por dejar de lado la raza y aceptar la gentrificación.​\nEn 1962 renunció\
    \ a su puesto en Architectural Forum para convertirse en autora y madre a tiempo completo. Además de su actividad en la\
    \ política local, fue una opositora notable de la Guerra de Vietnam y marchó al Pentágono en octubre de 1967. Criticó\
    \ la construcción del World Trade Center como un desastre para el puerto de Manhattan.​\n\nLucha por el Greenwich Village\n\
    \nDurante las décadas de 1950 y 1960, el vecindario de Jacobs en Greenwich Village fue transformado por los esfuerzos\
    \ de la Ciudad y el Estado para construir viviendas (ver, por ejemplo, la lucha de Jacobs para construir West Village\
    \ Houses en lugar de grandes casas de departamentos), promotores privados, la expansión de la Universidad de Nueva York\
    \ (NYU) y los planes de renovación urbana de Robert Moses. El plan de Moses, financiado como \"eliminación de barrios\
    \ marginales\" por el Título I de la Ley de Vivienda de 1949, también exigía la demolición de varios bloques y su reemplazo\
    \ por rascacielos de alto nivel. El plan obligó a 132 familias a abandonar sus hogares y desplazó a 1.000 pequeñas empresas;\
    \ el resultado fue Washington Square Village.​\nComo parte de sus esfuerzos por revitalizar el área, Moses propuso por\
    \ primera vez la extensión de la Quinta Avenida a través del Washington Square Park en 1935. Ante la oposición de la comunidad,\
    \ Moses archivó el proyecto, pero revivió la idea en la década de 1950. Moses argumentó que la extensión de la Quinta\
    \ Avenida mejoraría el flujo de tráfico a través del vecindario y proporcionaría acceso a la autopista planeada del Bajo\
    \ Manhattan (LOMEX), que conectaría el Puente de Manhattan y el Puente de Williamsburg con el Túnel Holland.​\nEn respuesta,\
    \ la activista local Shirley Hayes creó el \"Comité para Salvar el Parque Washington Square\", una coalición de docenas\
    \ de grupos vecinales locales que se opusieron a la extensión de la carretera. Raymond S. Rubinow finalmente se hizo cargo\
    \ de la organización, cambiando su nombre a \"Comité de Emergencia Conjunto para cerrar Washington Square al tráfico\"\
    . Jacobs se había unido al comité bajo Hayes, pero tomó un papel más destacado bajo Rubinow, llegando a medios de comunicación\
    \ como como el Village Voice, que proporcionó una cobertura más comprensiva que publicaciones como el New York Times.\
    \ El comité obtuvo el apoyo de notables como Margaret Mead, Eleanor Roosevelt, Lewis Mumford, Charles Abrams y William\
    \ H. Whyte, así como Carmine De Sapio, residente de Greenwich Village e influyente líder demócrata. La participación de\
    \ De Sapio resultó decisiva. El 25 de junio de 1958, la ciudad cerró Washington Square Park al tráfico, y el comité conjunto\
    \ celebró una ceremonia de atar con cinta (en vez de cortarla).​\nLos planes para la autopista LOMEX continuaron, sin\
    \ embargo, a pesar de la creciente oposición de la comunidad en áreas como Little Italy. En la década de 1960, Jacobs\
    \ presidió el Comité Conjunto para \n detener la Autopista del Bajo Manhattan. Los periódicos como The New York Times\
    \ simpatizaban con Moses, mientras que el Village Voice recientemente creado cubría los mítines de la comunidad y estaba\
    \ contra la autopista. Jacobs continuó luchando contra la autopista cuando los planes resurgieron en 1962, 1965 y 1968,\
    \ y se convirtió en una heroína local por su oposición al proyecto.​ Fue arrestada por un oficial de policía vestido de\
    \ civil el 10 de abril de 1968, en una audiencia pública durante la cual la multitud cargó contra el escenario y destruyó\
    \ las notas del taquígrafo. Fue acusada de incitar disturbios, daños y obstrucción a la administración pública. Después\
    \ de meses de pruebas llevadas a cabo en Nueva York, su cargo se redujo a una conducta contra el orden público.​\nNueva\
    \ York: una película documental dedicó una hora de la serie a la batalla entre Moses y Jacobs. La muy crítica biografía\
    \ de Robert Caro sobre Moses, The Power Broker, da solo una breve mención a este evento pese a la fuerte influencia de\
    \ Jacobs en Caro.​​\n\nVida en Toronto\n\nPoco después de su arresto en 1968, Jacobs se mudó a Toronto, y finalmente se\
    \ estableció en 69 Albany Avenue en The Annex desde 1971 hasta su muerte en 2006. Decidió abandonar los EE. UU. en parte\
    \ porque se opuso a la guerra de Vietnam, le preocupaba el destino de sus dos hijos en edad de reclutamiento y no quería\
    \ seguir luchando contra el gobierno de la ciudad de Nueva York. Ella y su esposo eligieron Toronto porque era agradable\
    \ y ofrecían oportunidades de empleo, y se mudaron a un área de Toronto que incluía a tantos estadounidenses que evitaban\
    \ el reclutamiento que se conocía como el \"ghetto estadounidense\".​\nRápidamente se convirtió en una figura destacada\
    \ en su nueva ciudad y ayudó a detener la propuesta de Autopista Spadina. Un tema frecuente de su trabajo fue preguntar\
    \ si estamos construyendo ciudades para las personas o para los automóviles. Fue arrestada dos veces durante las manifestaciones.\
    \ También tuvo una influencia considerable en la regeneración del vecindario de St. Lawrence, un proyecto de vivienda\
    \ considerado como un gran éxito. Se convirtió en ciudadana canadiense en 1974, y más tarde le dijo al escritor James\
    \ Howard Kunstler que la doble ciudadanía no era posible en ese momento, lo que implicaba que había perdido su ciudadanía\
    \ estadounidense.​\nEn 1980, ofreció una perspectiva urbanística sobre la soberanía de Quebec en su libro The Question\
    \ of Separatism: Quebec and the Struggle over Separation. Jacobs fue defensora de una provincia de Toronto para separar\
    \ la ciudad propiamente dicha de Ontario. Jacobs dijo, \"Las ciudades, para prosperar en el siglo veintiuno, deben separarse\
    \ políticamente de sus áreas circundantes\".\nLe fue concedida Orden de Canadá en 1996 por sus escritos fundamentales\
    \ y sus comentarios que invitan a la reflexión sobre el desarrollo urbano. La sección de sociología urbana y de la comunidad\
    \ de la American Sociological Association le otorgó su premio Outstanding Lifetime Contribution en 2002. En 1997, el gobierno\
    \ de la ciudad de Toronto patrocinó una conferencia titulada \"Jane Jacobs: Ideas That Matter\", que condujo a un libro\
    \ del mismo nombre. Al final de la conferencia, se creó el Premio Jane Jacobs. Incluye un estipendio anual de 5.000 dólares\
    \ por tres años para \"honrar a los héroes anónimos originales de Toronto, mediante la búsqueda de ciudadanos que participen\
    \ en actividades que contribuyan a la vitalidad de la ciudad\".​\nJacobs nunca rehuyó expresar su apoyo político a candidatos\
    \ específicos. Se opuso a la amalgama de 1997 de las ciudades de Metro Toronto, por temor a que los vecindarios individuales\
    \ tuvieran menos poder con la nueva estructura. Respaldó a un ecologista, Tooker Gomberg, que perdió la carrera por la\
    \ alcaldía en Toronto en 2000, y fue asesor de la exitosa campaña a la alcaldía de David Miller en 2003. Durante la campaña\
    \ a la alcaldía, Jacobs ayudó a ejercer presión contra la construcción de un puente para unir el paseo marítimo de la\
    \ ciudad con el Aeropuerto del Centro de la Ciudad de Toronto (TCCA).​ Después de las elecciones, se revocó la decisión\
    \ anterior del concejo municipal de Toronto de aprobar el puente y se detuvo el proyecto de construcción del puente. TCCA\
    \ actualizó el servicio de ferry y el aeropuerto todavía está operativo en 2018.\nJacobs también participó en una lucha\
    \ contra un plan del Royal St. George's College (una escuela establecida muy cercana a la residencia de Jacobs desde hace\
    \ mucho tiempo en el distrito Annex de Toronto) para reconfigurar sus instalaciones. Jacobs sugirió no solo que se detuviera\
    \ el rediseño, sino también que la escuela fuera forzada a salir por completo del barrio. Aunque el consejo de Toronto\
    \ inicialmente rechazó los planes de la escuela, la decisión se revirtió más tarde, y la Junta Municipal de Ontario dio\
    \ el visto bueno al proyecto cuando los oponentes no lograron presentar testigos creíbles y trataron de retirarse del\
    \ caso durante la audiencia.​\nTambién influyó en la planificación urbana de Vancouver. Jacobs ha sido llamada \"la madre\
    \ del vancouverismo\",​ refiriéndose al uso de esa ciudad de su filosofía de \"densidad bien hecha\".​El renombrado arquitecto\
    \ Bing Thom describió el vancouverismo de esta manera:​\n   \"Es poner énfasis sobre el espacio público. Creo que los\
    \ habitantes de Vancouver están muy, muy orgullosos de que construyamos una ciudad que realmente tenga una enorme cantidad\
    \ de espacio en el paseo marítimo para que la gente pueda recrearse y disfrutar. Al mismo tiempo, False Creek y Coal Harbour\
    \ eran anteriormente tierras industriales que estaban muy contaminadas y degradadas. Hemos actualizado todo esto con un\
    \ nuevo desarrollo, y las personas tienen acceso al agua y a las vistas. Por consiguiente, la idea para mí es de tener\
    \ mucha gente viviendo muy cerca, mezclando los usos. Entonces, tenemos apartamentos en la parte superior de las tiendas.\
    \ En Surrey tenemos una universidad en la parte superior de un centro comercial. Esta mezcla de usos refleja a Vancouver\
    \ en términos de nuestra cultura y de cómo vivimos juntos.\"​\nJacobs murió en Toronto Western Hospital a los 89 años,\
    \ el 25 de abril de 2006, al parecer, de un derrame cerebral. Le sobrevivió un hermano, James Butzner (nacido en 2009)​;\
    \ sus dos hijos, James y Ned de Vancouver, y una hija, Burgin Jacobs; dos nietos y dos bisnietos. Tras su muerte, su familia\
    \ declaró:\n  \"Lo importante no es que haya muerto, sino que haya vivido, y que el trabajo de su vida haya influido mucho\
    \ en nuestra forma de pensar. Por favor, recuérdala leyendo sus libros e implementando sus ideas.\"​\n\nJane Jacobs Days\n\
    \nDespués de la muerte de Jacobs en abril de 2006, el alcalde de la ciudad de Nueva York, Michael Bloomberg, anunció el\
    \ Día de Jane Jacobs, celebrado el 28 de junio de 2006. La ciudad de Toronto proclamó su cumpleaños al año siguiente,\
    \ 4 de mayo de 2007, como el Jane Jacobs Day.​\n\nObras\n\nJane Jacobs pasó su vida estudiando las ciudades. Sus libros\
    \ incluyen:\n\nLa muerte y la vida de las grandes ciudades americanas\n\nEs su libro más influyente y posiblemente el\
    \ libro más influyente sobre planificación urbana y ciudades del siglo XX. Ampliamente leído tanto por profesionales de\
    \ la planificación como por el público en general, el libro es una fuerte crítica de las políticas de renovación urbana\
    \ de la década de 1950, que, según ella, destruyó comunidades y creó espacios urbanos aislados y antinaturales. Jacobs\
    \ abogó por la abolición de las leyes de zonificación y la restauración del mercado libre de solares, lo que daría como\
    \ resultado vecindarios densos de uso mixto y citó con frecuencia al Greenwich Village de la ciudad de Nueva York como\
    \ un ejemplo de una comunidad urbana vibrante.\nRobert Caro lo ha citado como la influencia más fuerte en The Power Broker,\
    \ su biografía ganadora del Pulitzer de Robert Moses, aunque Caro no menciona su nombre ni siquiera una vez en el libro\
    \ a pesar de las batallas de Jacobs con Moses sobre su propuesta Autopista del Bajo Manhattan. Se dice que Caro cortó\
    \ un capítulo sobre Jacobs debido a la longitud de su libro.​ \nMás allá de las lecciones prácticas de diseño y planificación\
    \ de la ciudad que ofrece Death and Life, los fundamentos teóricos del trabajo desafían la mentalidad del desarrollo moderno.\
    \ Jane Jacobs defiende sus posiciones con sentido común y anécdotas.\n\nLa economía de las ciudades\n\nLa tesis de este\
    \ libro es que las ciudades son los principales impulsores del desarrollo económico. Su argumento principal es que el\
    \ crecimiento económico explosivo se deriva del reemplazo de importaciones urbanas. El reemplazo de importaciones ocurre\
    \ cuando una ciudad comienza a producir bienes localmente que importó anteriormente, por ejemplo, fábricas de bicicletas\
    \ de Tokio que reemplazan a los importadores de bicicletas de Tokio en el siglo XIX. Jacobs afirma que el reemplazo de\
    \ importaciones construye infraestructura local, habilidades y producción. Jacobs también afirma que el aumento de la\
    \ producción se exporta posteriormente a otras ciudades, dando a esas otras ciudades una nueva oportunidad para participar\
    \ en la sustitución de importaciones, lo que produce un ciclo positivo de crecimiento.\nEn una entrevista con Bill Steigerwald\
    \ en Reason Magazine, Jacobs dijo que si la recuerdan por ser una gran intelectual, será recordada no por su trabajo relacionado\
    \ con la planificación urbana, sino por el descubrimiento del reemplazo de importaciones. Los críticos afirman erróneamente\
    \ que sus ideas repiten la idea de la sustitución de importaciones avanzada por estudiosos como Andre Gunder Frank. La\
    \ sustitución de importaciones era una teoría económica nacional que implicaba que si una nación sustituía sus importaciones\
    \ por producción nacional, la nación se haría más rica, mientras que la idea de Jacob se basa enteramente en las ciudades\
    \ y podría denominarse sustitución de importaciones urbanas. Sin embargo, incluso esto generaría confusión porque, en\
    \ la práctica, la sustitución de importaciones en la India y América Latina estaba subvencionada y ordenada por el gobierno,\
    \ mientras que el concepto de sustitución de importaciones de Jacobs es un proceso de descubrimiento y división del trabajo\
    \ dentro de una ciudad.​\nEn la segunda parte del libro, Jacobs argumenta que las ciudades precedieron a la agricultura.\
    \ Ella argumenta que en las ciudades el comercio de animales y granos silvestres permitió la división inicial del trabajo\
    \ necesaria para el descubrimiento de la agricultura; estos descubrimientos luego se mudaron fuera de la ciudad debido\
    \ a la competencia por la tierra. Otra interpretación de la historia, generalmente considerada contradictoria con la de\
    \ Jacobs, es apoyada por el arqueólogo marxista Vere Gordon Childe y en los últimos tiempos por otro materialista histórico\
    \ Charles Keith Maisels​ que argumentan que la agricultura precedió a las ciudades. La aparente oposición entre las teorías\
    \ de Childe y Jacobs descansa en su definición de 'ciudad', 'civilización' o 'urbana'. Childe, como otros materialistas\
    \ como Maisels o Henri Lefebvre, define \"urbano\" o \"civilización\" como sinecismo -como comunidad política monolítica,\
    \ alfabetizada, socialmente estratificada,​ mientras que, como se puede ver en La economía de las ciudades o las ciudades\
    \ y la Riqueza de las Naciones, Jacobs define la ciudad puramente en la línea de comercio geográficamente denso dando\
    \ paso al descubrimiento empresarial y mejoras posteriores en la división del trabajo. Sin los requisitos de la alfabetización,\
    \ la construcción monumental o los signos de fuerzas civiles y armadas especializadas, las \"ciudades\" pueden interpretarse\
    \ con precisión que existen miles de años antes, de cuando Childe y Maisels las colocan. Sin embargo, la definición de\
    \ Jacobs es una suposición, ya que \"ciudad\" se define simplemente como una gran ciudad o \"un gran asentamiento humano\"\
    \ que indica la permanencia. Los primeros restos de la humanidad descubiertos por los arqueólogos no nos dan más información\
    \ que la de cazadores-recolectores, ya que todavía no hay evidencia de agricultura o asentamiento, lo que implica un estilo\
    \ de vida nómada hasta que se hagan nuevos descubrimientos.​\n\nLa cuestión del separatismo: Quebec y la lucha por la\
    \ soberanía\n\nThe Question of Separatism incorporó y amplió la presentación de Jacobs de las Conferencias Massey de 1979,\
    \ tituladas Canadian Cities and Sovereignty-Association. Se publicó en 1980 y se reimprimió en 2011 con una entrevista\
    \ previamente no publicada de 2005 con Robin Philpot sobre el tema en el que evoca la relativa desaprobación de ese libro\
    \ entre sus lectores habituales. Esta fue, de hecho, la primera vez que se le solicitó que lo discutiera en una entrevista.\
    \ El columnista Richard Gwyn adelantó que aunque no la criticaban abiertamente, los lectores canadienses de habla inglesa\
    \ pensaban que no entendía cómo funcionaba la política canadiense y que no estaba siendo útil en un momento de angustia\
    \ por la unidad nacional (el referéndum de 1980 fue derrotado por un voto del 60%). La cuestión del separatismo tampoco\
    \ se mencionó en la bibliografía de su obituario de 2006 en The Globe and Mail.​\nEl libro de Jacobs avanza la opinión\
    \ de que la eventual independencia de Quebec es mejor para Montreal, Toronto, el resto de Canadá y el mundo; y que tal\
    \ independencia puede lograrse pacíficamente. Como precedente, cita la secesión de Noruega de Suecia y cómo enriqueció\
    \ a ambas naciones. Se examinan los orígenes del movimiento secesionista contemporáneo en la Revolución silenciosa, junto\
    \ con la dependencia histórica de Canadá de los recursos naturales y la propiedad extranjera para su propio desarrollo\
    \ económico. Jacobs afirma que tal enfoque es colonial y, por lo tanto, retrospectivo, citando por ejemplo que Canadá\
    \ compra sus esquís y muebles de Noruega o de fábricas de propiedad noruega en Canadá, el último procedimiento es un producto\
    \ de los aranceles canadienses diseñados específicamente para fomentar tales fábricas. Las opiniones públicas relevantes\
    \ de René Lévesque, Claude Ryan, y luego el primer ministro Pierre Trudeau también se analizan críticamente. Un ejemplo\
    \ es su incapacidad para reconocer que dos monedas independientes respectivas son esenciales para el éxito de un Quebec\
    \ independiente y un Canadá resultante más pequeño, un problema que es central en su libro. Jacobs enfatiza la necesidad\
    \ de que Montreal continúe desarrollando su liderazgo de la cultura quebequense, pero que tal necesidad finalmente no\
    \ puede ser satisfecha por las crecientes tendencias de Montreal hacia el estatus de ciudad regional, tendencias que presagian\
    \ una sumisión económica, política y cultural al Toronto de habla inglesa. Tal resultado, según Jacobs, a largo plazo\
    \ condenaría la independencia de Quebec tanto como obstaculizaría el propio futuro de Canadá. Concluye con su observación\
    \ de que la equiparación popular de la secesión política con el fracaso político y económico es el resultado de la Ilustración,\
    \ que percibió la naturaleza como una fuerza para la \"estandarización, uniformidad, universalidad e inmutabilidad\".\
    \ Desde entonces, los naturalistas y sus lectores se han dado cuenta gradualmente de que la naturaleza es una fuerza para\
    \ la diversidad, y que, \"la diversidad misma es la esencia de la excelencia\". El tipo correcto de secesión, afirma Jacobs,\
    \ puede conducir al tipo correcto de diversidad.\n\nLas ciudades y la riqueza de las naciones\n\nCities and the Wealth\
    \ of Nations intenta hacer por la economía lo que The Death and Life of Great American Cities hizo por la planificación\
    \ urbana moderna, aunque no ha recibido la misma atención crítica. Comenzando con un tratamiento conciso de la economía\
    \ clásica, este libro cuestiona uno de los supuestos fundamentales de los grandes economistas. Los economistas clásicos\
    \ (y neoclásicos) consideran que el estado-nación es el principal actor en macroeconomía. Jacobs argumenta que no es el\
    \ estado-nación, sino que es la ciudad la que es el verdadero actor en este juego mundial. Reafirma la idea del reemplazo\
    \ de importaciones de su libro anterior, The Economy of Cities, mientras especulaba sobre las ramificaciones adicionales\
    \ de considerar primero a la ciudad y luego a la nación, o no.\n\nSistemas de supervivencia\n\nSistemas de supervivencia:\
    \ Un diálogo sobre los fundamentos morales del comercio y la política, se mueve fuera de la ciudad, estudiando los fundamentos\
    \ morales del trabajo. Al igual que con sus otros trabajos, utilizó un enfoque de observación. Este libro está escrito\
    \ como un diálogo platónico. Parece que ella (como lo describen los personajes de su libro) tomó recortes de periódicos\
    \ de juicios morales relacionados con el trabajo, los recopiló y ordenó para encontrar los que se ajustaban a dos patrones\
    \ de comportamiento moral que eran mutuamente excluyentes. Ella llama a estos dos patrones \"Síndrome Moral A\", o síndrome\
    \ moral comercial, y \"Síndrome Moral B\", o síndrome moral guardián. Afirma que el síndrome moral comercial es aplicable\
    \ a los dueños de negocios, científicos, agricultores y comerciantes. Del mismo modo, afirma que el síndrome moral del\
    \ guardián es aplicable al gobierno, organizaciones benéficas, cazadores-recolectores e instituciones religiosas. También\
    \ afirma que estos Síndromes Morales son fijos y no fluctúan con el tiempo.\nEs importante enfatizar que Jane Jacobs brinda\
    \ una teoría sobre la moralidad del trabajo y no sobre todas las ideas morales. Las ideas morales que no están incluidas\
    \ en sus patrones son aplicables a ambos.\nJane Jacobs continúa describiendo lo que sucede cuando estos dos patrones morales\
    \ se mezclan, mostrando los fundamentos del trabajo de la Mafia y el Comunismo, y lo que sucede cuando a la policía del\
    \ subterráneo de Nueva York se les paga bonificaciones aquí, reinterpretadas como parte de un análisis más amplio.\n\n\
    La naturaleza de las economías\n\nLa naturaleza de las economías, un diálogo entre amigos sobre la premisa: \"los seres\
    \ humanos existen por completo en la naturaleza como parte del orden natural en todos los aspectos\" (p.xx), sostiene\
    \ que los mismos principios subyacen tanto en los ecosistemas como en las economías: \"desarrollo y el codesarrollo a\
    \ través de las diferenciaciones y sus combinaciones, la expansión a través de diversos usos múltiples de la energía y\
    \ el auto-mantenimiento a través de la auto-reabastecimiento de combustible \"(p.82).\nLos personajes de Jacobs discuten\
    \ los cuatro métodos por los cuales los \"sistemas dinámicamente estables\" pueden evadir el colapso: \"bifurcaciones,\
    \ circuitos de retroalimentación positiva, controles de retroalimentación negativa y adaptaciones de emergencia\" (p.98).\
    \ Sus conversaciones también cubren la \"doble naturaleza de la aptitud para la supervivencia\" (rasgos para evitar la\
    \ destrucción del propio hábitat y el éxito en la competencia para alimentarse y reproducirse), e imprevisibilidad, incluido\
    \ el efecto mariposa caracterizado en términos de multiplicidad de variables así como la respuesta desproporcionada a\
    \ la causa y la autoorganización donde \"un sistema puede ser creado a medida que avanza\" (p.137).\nA través del diálogo,\
    \ los personajes de Jacobs exploran y examinan las similitudes entre el funcionamiento de los ecosistemas y las economías.\
    \ Los temas incluyen el desarrollo ambiental y económico, el crecimiento y la expansión, y cómo las economías y los entornos\
    \ se mantienen vivos a través del \"reabastecimiento de combustible\". Jacobs también comenta sobre la naturaleza de la\
    \ diversidad económica y biológica y su papel en el desarrollo y crecimiento de los dos tipos de sistemas.\nEl libro está\
    \ lleno de muchos ejemplos económicos y biológicos del mundo real, que ayudan a mantener el libro \"con los pies en la\
    \ tierra\" y comprensible, aunque es denso. Los conceptos están provistos de ejemplos económicos y biológicos, mostrando\
    \ su coherencia en ambos mundos.\nUna idea particularmente interesante es la creación de \"algo de la nada\", una economía\
    \ de la nada. En el mundo biológico, la energía libre se da a través de la luz solar, pero en el mundo económico, la creatividad\
    \ humana y los recursos naturales suministran esta energía libre, o al menos energía de arranque. Otra visión interesante\
    \ es la creación de diversidad económica mediante la combinación de diferentes tecnologías, por ejemplo, la máquina de\
    \ escribir y la televisión como entradas y salidas de un sistema informático: esto puede conducir a la creación de \"\
    nuevas especies de trabajo\".\n\nDark Age Ahead\n\nPublicado en 2004 por Random House, Dark Age Ahead postula el argumento\
    \ de Jacobs de que la civilización \"norteamericana\" muestra signos de un descenso en espiral comparable al colapso del\
    \ imperio romano. Su discusión se centra en \"cinco pilares de nuestra cultura de los que dependemos para mantenerse firmes\"\
    , que se pueden resumir como la familia nuclear y la comunidad; la calidad en educación; el libre pensamiento en la ciencia;\
    \ el gobierno representativo e impuestos responsables; y la responsabilidad corporativa y profesional. Como sugiere el\
    \ título del libro, el punto de vista de Jacobs es mucho más pesimista que el de sus trabajos anteriores. Sin embargo,\
    \ en la conclusión, ella admite: \"En un momento dado es difícil saber si las fuerzas de la vida cultural o la muerte\
    \ están en ascenso. Es la expansión suburbana, con sus asesinatos de comunidades y desechos de tierra, tiempo y energía,\
    \ un ¿Signo de decadencia? ¿O el creciente interés en los medios para superar la expansión es un signo de vigor y adaptabilidad\
    \ en la cultura norteamericana? Podría decirse que cualquiera de las dos afirmaciones podría resultar cierta\".​"
  - "is a 2017 action-adventure game developed and published by Nintendo for the Nintendo Switch and Wii U consoles. Breath\
    \ of the Wild is the nineteenth installment of The Legend of Zelda franchise and is set at the end of the Zelda timeline.\
    \ The player controls Link, who awakens from a hundred-year slumber to defeat Calamity Ganon and restore the kingdom of\
    \ Hyrule.\n\nSimilar to the original 1986 The Legend of Zelda game, players are given little instruction and can explore\
    \ the world freely. Tasks include collecting various items and gear to aid in objectives such as puzzle-solving or side\
    \ quests. The world is unstructured and designed to encourage exploration and experimentation, and the main story quest\
    \ can be completed in a nonlinear fashion.\n\nDevelopment of Breath of the Wild took place over five years, following\
    \ the responses from some fans who wanted a larger game world to explore. Wanting to rethink the conventions of the series,\
    \ Nintendo introduced elements such as an open world and detailed chemistry and physics engines. Monolith Soft, known\
    \ for their work on the open world Xenoblade Chronicles series, assisted in designing landscapes and topography. The game\
    \ was originally planned for release in 2015 as a Wii U exclusive but was delayed twice. Released on March 3, 2017, Breath\
    \ of the Wild was a launch game for the Nintendo Switch and the final Nintendo-published game for the Wii U. Two waves\
    \ of downloadable content were released throughout 2017 in an expansion pass.\n\nBreath of the Wild received critical\
    \ acclaim for its open-ended gameplay and attention to detail. Critics called it a landmark in open world game design,\
    \ although it received minor criticism for its technical performance at launch. It won several game of the year awards\
    \ and has since been cited as one of the greatest video games of all time. By 2021 it had sold over 27 million copies,\
    \ making it one of the best-selling video games of all time. A spin-off, Hyrule Warriors: Age of Calamity, was released\
    \ in 2020. A sequel is set for release on the Switch in 2022.\n\nGameplay\n\nBreath of the Wild is an action-adventure\
    \ game set in an open world where players are tasked with exploring the kingdom of Hyrule while controlling Link. Breath\
    \ of the Wild encourages nonlinear gameplay, which is illustrated by the game's lack of defined entrances or exits to\
    \ areas, scant instruction given to the player, and encouragement to explore freely. Breath of the Wild introduces a consistent\
    \ physics engine to the Zelda series, letting players approach problems in different ways rather than trying to find a\
    \ single solution. The game also integrates a \"chemistry engine\" that defines the physical properties of most objects\
    \ and governs how they interact with the player and one another. For example, during thunderstorms, metal objects will\
    \ attract powerful lightning strikes; during a storm, therefore, a player must be careful not to wear metal, but may also\
    \ throw metal objects at enemies to draw lightning to them. These design approaches result in a generally unstructured\
    \ and interactive world that rewards experimentation and allows for nonlinear completion of the story.\n\nAs Link, players\
    \ can perform actions such as running, climbing, swimming, and gliding with a paraglider, although Link is limited by\
    \ his stamina. Link can procure items from the environment, including weapons, food, and other resources. Unlike previous\
    \ Zelda games, weapons and shields degrade through use. Many items have multiple uses; for example, wooden weapons can\
    \ light fires, wooden shields can collect incoming enemy arrows, and shields can be used as makeshift snowboards. Players\
    \ can obtain food and materials for elixirs from hunting animals, gathering wild fruit, or collecting parts of defeated\
    \ enemies. By cooking combinations of food or materials, the player can create meals and elixirs that can replenish Link's\
    \ health and stamina, or provide temporary status bonuses such as increased strength or resistance to heat or cold. An\
    \ important tool in Link's arsenal is the \"Sheikah Slate\", which can be used to mark waypoints on the in-game map and\
    \ take pictures of materials, creatures, and enemies. These pictures are stored in an in-game compendium that can be used\
    \ to locate valuable items. The Sheikah Slate also gives the player the ability to create remote bombs, manipulate metal\
    \ objects, form ice blocks on watery surfaces, and temporarily stop objects in time. In combat, players can lock onto\
    \ targets for more precise attacks, while certain button combinations allow for advanced offensive and defensive moves.\
    \ Players may also defeat enemies without weapons, such as by rolling boulders off cliffs into enemy camps.\n\nBesides\
    \ exploration, players can undergo quests or challenges to obtain certain benefits. Activating towers and shrines will\
    \ add waypoints to the map that the player may warp to at any time. Activating towers also adds territories to the map,\
    \ although location names are not added until the player explores that area. Dotted throughout Hyrule are shrines that\
    \ contain challenges ranging from puzzles to battles against robotic opponents. Clearing shrines earns Spirit Orbs. After\
    \ earning four of these orbs, they can be traded for additional health or stamina points. When Link has at least 13 hearts,\
    \ he can reclaim the Master Sword in the Korok Forest. The Master Sword is the only unbreakable weapon in the game;  however\
    \ it can run out of energy after extended use, requiring a 10 minute recharge. Scattered across Hyrule are small puzzles\
    \ that reveal Korok Seeds, which can be traded to expand inventory size for weapons, shields, and bows. Towns serve as\
    \ hotspots for quests, sidequests, and shops selling materials and clothing. Hikers and other travelers offer sidequests,\
    \ hints, or conversation. Additionally, players can scan Amiibo figures against their controller to summon items or call\
    \ Link's horse Epona from previous Zelda games and Wolf Link from Twilight Princess.\n\nPlot\n\nBreath of the Wild takes\
    \ place at the end of the Zelda timeline in the kingdom of Hyrule. 10,000 years before the beginning of the game, the\
    \ ancient Sheikah race had developed Hyrule into an advanced civilization, protected by four enormous animalistic machines\
    \ called the Divine Beasts and an army of autonomous weapons called Guardians. When the evil Calamity Ganon appeared and\
    \ threatened Hyrule, four great warriors were given the title of Champion, and each piloted one of the Divine Beasts to\
    \ weaken Ganon while the princess with the blood of the goddess and her appointed knight fought and defeated him by sealing\
    \ him away.\n\n10,000 years later, the kingdom of Hyrule had since regressed to a medieval state. Reading their ancestors'\
    \ prophecies, the Hylians recognized the signs of Ganon's return and excavated surrounding areas to uncover the Divine\
    \ Beasts and Guardians. During this time, Princess Zelda trained vigorously to awaken the sealing magic needed to defeat\
    \ Ganon while trying to maintain her personal research. In the meantime, a knight was appointed to protect her, that being\
    \ Link, who was chosen due to his ability to wield the Master Sword, also known as the Sword that Seals the Darkness.\
    \ The champions of Hyrule's races — Daruk, warrior of the mountainous Goron; Mipha, princess of the aquatic Zora; Revali,\
    \ archer of the birdlike Rito; and Urbosa, chief of the desert-dwelling Gerudo — assembled to pilot the Divine Beasts\
    \ (Vah Rudania, Vah Ruta, Vah Medoh, and Vah Naboris, respectively) while the current Zelda and Link battled Ganon. However,\
    \ Ganon possessed the Guardians and Divine Beasts, turning them against Hyrule. King Rhoam and the Champions were killed,\
    \ the castle town was destroyed, and Link was gravely wounded while defending the Hyrulean Army's only remaining base,\
    \ Fort Hateno. Zelda took Link to safety for him to heal, hid the Master Sword in the Lost Woods under protection from\
    \ the Great Deku Tree, and used her magic to seal herself and Ganon in Hyrule Castle. This cataclysmic tragedy came to\
    \ be known through the ages as the Great Calamity.\n\n100 years after being placed in a healing chamber in the Shrine\
    \ of Resurrection, an amnesiac Link awakens in a now-ravaged Hyrule. He meets an old man, who reveals himself as the lingering\
    \ spirit of King Rhoam. Rhoam explains that Ganon, sealed in Hyrule Castle, has grown strong; he pleads for Link to defeat\
    \ Ganon before he breaks free and destroys the world.\n\nLink travels across Hyrule, returning to locations from his past\
    \ and regaining his memories. With the help of the Hyrulean races, he boards the four Divine Beasts and purges them of\
    \ Ganon's monsters, releasing the spirits of Hyrule's former champions and allowing them to pilot the Divine Beasts once\
    \ again. After obtaining the Master Sword from the Lost Woods, Link enters Hyrule Castle and defeats Ganon with the help\
    \ of the Divine Beasts and Zelda's Bow of Light. Zelda seals Ganon away, restoring peace and allowing the spirits of King\
    \ Rhoam and the champions to depart to the afterlife. Sensing their presence, Link and Zelda smile fondly.\n\nIf players\
    \ have found all 13 memories in the quest \"Captured Memories\", they unlock a secret ending in which Zelda realizes that\
    \ Hyrule must be rebuilt and that she and Link must begin the process themselves. As Link and Zelda survey Hyrule and\
    \ embark to rebuild their world, the princess confides that she may no longer possess any supernatural power, yet still\
    \ she has happily come to terms with it.\n\nDevelopment\n\nNintendo EPD, an internal division of Nintendo, developed Breath\
    \ of the Wild for the Nintendo Switch and Wii U. According to series producer Eiji Aonuma, the development team aimed\
    \ to \"rethink the conventions of Zelda\". Development started immediately upon the release of The Legend of Zelda: Skyward\
    \ Sword (2011). Aonuma received comments from players who wished to see a more interconnected map to explore the locales\
    \ between the gameplay areas. In 2013, Nintendo experimented with nonlinear gameplay in The Legend of Zelda: A Link Between\
    \ Worlds, which was a common point of praise from many outlets. At E3 2014, Aonuma said he planned to reform dungeons\
    \ and puzzles, two of the series' major gameplay elements, and redesign the game to allow players to reach the end without\
    \ progressing through the story. As Nintendo had never developed a modern open-world game on the scale of Breath of the\
    \ Wild, they looked at earlier titles to learn more about the challenges of making a modern large-scale open-world game,\
    \ specifically The Elder Scrolls V: Skyrim and Shadow of the Colossus, which had some similar climbing mechanics and whose\
    \ creator Fumito Ueda was friends with Aonuma. For the art style, the development team drew inspiration from various Japanese\
    \ anime which they had grown up watching. Series protagonist Link was redesigned for the game, with Aonuma purposely making\
    \ him more gender neutral so that players could more easily relate to him.\n\nBefore full development, the developers\
    \ designed a playable 2D prototype similar to the original Zelda to experiment with physics-based puzzles. The final game\
    \ uses a modified version of the Havok physics engine. At the 2017 Game Developers Conference, director Hidemaro Fujibayashi,\
    \ technical director Takuhiro Dohta, and art director Satoru Takizawa held a presentation titled \"Change and Constant –\
    \ Breaking Conventions with The Legend of Zelda: Breath of the Wild\", during which they demoed the prototype. Aonuma\
    \ called the physics engine in Breath of the Wild a major development for the Zelda series, saying that it \"underpins\
    \ everything in the world\" and makes things operate in a \"logical and realistic way\", allowing players to approach\
    \ puzzles and problems in different ways. He expanded on the difficulty in developing this system, recalling how one day\
    \ during development he entered an area in the game and found that all the objects had been blown away by the wind. As\
    \ previous Zelda games increased the amount of actions Link could perform, the development team realized that having too\
    \ many actions would complicate the controls, so instead of adding more actions, they increased the number of events the\
    \ player could interact with in the world.\n\nThe game was built and demonstrated with touchscreen features for the Wii\
    \ U, but the developers found that \"looking back and forth between the Gamepad and the screen\" distracted from the game.\
    \ The features were removed when the game moved to tandem development across the Switch and Wii U. The Wii U GamePad also\
    \ affected animation; although Link is canonically left-handed, he is right-handed in the game to match the GamePad's\
    \ control scheme, which has its sword-swinging buttons on its right side. The Switch version performs better than the\
    \ Wii U release when docked to a television, although when undocked, both run at the same resolution. The Switch version\
    \ also has higher-quality environmental sounds. Aonuma stated that the art design was inspired by gouache and en plein\
    \ air art to help identify the vast world. Takizawa has also cited the Jōmon period as an inspiration for the ancient\
    \ Sheikah technology and architecture that is found in the game, due to the mystery surrounding the period. The game's\
    \ landscape was based on locations in and around Kyoto, the hometown of game director Hidemaro Fujibayashi, and was partially\
    \ designed by Monolith Soft, who assisted with topographical level design. The game's initial area was made a plateau\
    \ so that players can see the world's expansive environments.\n\nBreath of the Wild was the first main Zelda game to use\
    \ voice acting in cutscenes, although Link remains a silent protagonist. Aonuma was affected by the first time he heard\
    \ a character with a human voice in-game, and wanted to leave a similar impression on players. The team decided to record\
    \ voice-overs for all cutscenes instead of only the key scenes, as originally planned. Nintendo provided voice-overs and\
    \ subtitles in eight languages. Initially, players were not able to mix and match the languages of voices and subtitles;\
    \ however, Nintendo released an update in May 2017 that allowed players to choose the voice-over language. After five\
    \ years of development, the game went gold on February 3, 2017, with Nintendo holding a wrap party to celebrate. Coinciding\
    \ with the game's launch in Taiwan and South Korea in early 2018, Nintendo introduced a patch worldwide adding traditional\
    \ and simplified Chinese and Korean translations for the Nintendo Switch version.\n\nThe original score was composed by\
    \ Manaka Kataoka, Yasuaki Iwata, and Hajime Wakai. Kataoka and Wakai had previously worked on the Zelda games Spirit Tracks\
    \ and The Wind Waker respectively. The soundtrack was primarily written and performed on a piano, with a focus on ambient\
    \ music and sounds rather than melodic and upbeat music as seen in previous Zelda games. According to Wakai, this helped\
    \ add \"authenticity\" to the environments and was taken on as a challenge by the rest of the sound team.\n\nRelease\n\
    \nAonuma originally teased the game for the Wii U in January 2013 during a Nintendo Direct presentation. The game, he\
    \ continued, would challenge the series' conventions, such as the requirement that players complete dungeons in a set\
    \ order. The next year, Nintendo introduced the game's high-definition, cel-shaded visual style with in-game footage at\
    \ its E3 2014 press event. Once planned for release in 2015, the game was delayed early in the year and did not show at\
    \ that year's E3. Zelda series creator Shigeru Miyamoto reaffirmed that the game was still set for release on the Wii\
    \ U, despite the development of Nintendo's next console, the Nintendo Switch. The game was delayed again in April 2016\
    \ due to problems with its physics engine. Nintendo let attendees play the game's Wii U version at E3 2016, where they\
    \ also announced its subtitle, Breath of the Wild. CNET said that the showing would \"take your breath away\", and Breath\
    \ of the Wild was the most talked-about E3 2016 game on social media according to Brandwatch, a social media monitoring\
    \ platform. It was also listed among the best games at E3 by Eurogamer, GameSpot, and GamesRadar+. At a Nintendo presentation\
    \ in January 2017, a trailer was shown announcing that the game would be released as a launch game for the Switch.\n\n\
    Breath of the Wild launched for both the Wii U and Switch on March 3, 2017. It was the last Nintendo game released for\
    \ the Wii U. The Switch version was available in limited \"Special Edition\" and \"Master Edition\" bundles, which both\
    \ included a Sheikah Eye coin, a Calamity Ganon tapestry with world map, a soundtrack CD, and a themed carrying case for\
    \ the Switch. The Master Edition also included a figurine based on the Master Sword. An \"Explorer's Edition\" was released\
    \ for the Switch on November 23, 2017, containing a two-sided map and a 100-page book of story information. In Europe,\
    \ the game used unique packing artwork. A five-disc, 211-track soundtrack was released in Japan on April 25, 2018.\n\n\
    Downloadable content \nOn June 30, 2017, Nintendo released a \"season pass\" for two bundled downloadable content (DLC):\
    \ The Master Trials and The Champions' Ballad. The Master Trials adds gameplay modes, features, and items. In the Trial\
    \ of the Sword challenge, the player faces three trials, consisting of twelve, sixteen, and twenty-three rooms respectively.\
    \ Each room is full of enemies which the player must defeat before proceeding. Every room must be completed before the\
    \ player can claim their reward. The player begins with no equipment and will lose all progress if they receive a game\
    \ over. At the end of each trial the player's Master Sword has its attack power upgraded by ten points and the blue sheen\
    \ of its blade grows slightly. By the end of the third trial, the Master Sword will have doubled in attack power and will\
    \ glow blue. The pack also adds an option to play the game at a higher difficulty level, called \"Master Mode\", which\
    \ adds faster rank leveling and raises the ranks of enemies by 1. The enemies are more perceptive when Link sneaks near\
    \ them and slowly regenerate health in battle. New floating platforms throughout the land offer enemies to battle and\
    \ treasure as a reward. The Hero's Path feature draws the player's path on the game's map, designed to help players determine\
    \ places they have not visited. The player can also find the hidden Travel Medallion to save Link's current position as\
    \ a single waypoint to which the player can transport Link at any time. New items include the Korok Mask, which alerts\
    \ the player when a Korok is nearby, and other themed cosmetics related to previous Zelda games.\n\nThe Champions' Ballad\
    \ was released on December 7, 2017. It added a new dungeon, additional story content, new gear, and additional challenges,\
    \ as well as the Master Cycle Zero, a motorcycle-like vehicle that Link can ride upon completing the quest line.\n\nA\
    \ \"Complete Edition\" containing all DLC on the game card was released in Japan on October 8, 2021.\n\nReception\n\n\
    Breath of the Wild was released to critical acclaim, with many calling the game a masterpiece and one of the greatest\
    \ video games of all time. On the review aggregator Metacritic, Breath of the Wild was the highest-rated game of 2017\
    \ and holds the largest number of perfect reviews of any game from any year. Industry publications including IGN, GameSpot,\
    \ Polygon, Entertainment Weekly, Eurogamer, Electronic Gaming Monthly, GamesRadar+, and Game Informer ranked Breath of\
    \ the Wild the best game of 2017. According to Metacritic, Breath of the Wild topped 18 lists of the decade's best games,\
    \ more than any other game of the 2010s.\n\nThe open-world gameplay received praise. Jose Otero of IGN described it as\
    \ \"a masterclass in open-world design\" and \"a wonderful sandbox full of mystery, dangling dozens upon dozens of tantalizing\
    \ things in front of you that just beg to be explored\". GameSpot called it the most impressive game Nintendo had made,\
    \ writing that it \"takes designs and mechanics perfected in other games and reworks them for its own purposes to create\
    \ something wholly new, but also something that still feels quintessentially like a Zelda game ... It's both a return\
    \ to form and a leap into uncharted territory, and it exceeds expectations on both fronts.\" Edge wrote that the game\
    \ world was \"an absolute, and unremitting, pleasure to get lost in\" and that \"the magic of being given all the tools\
    \ in the opening hour is the knowledge that the solution to any problem is already at your disposal, and you can always\
    \ change tack\". According to Digital Trends, the ability to climb any surface and glide across the map gave players freedom\
    \ of movement that \"broke the genre open, pushing developers to rethink how players interact with the world\" and \"\
    putting extra thought into vertical design.\" In contrast to \"Ubisoft-style\" games that filled the game's map with points\
    \ of interests and objectives, Breath of the Wilds free-form exploration encourage players to set their own objectives,\
    \ marking the map with discoveries that serve as \"a record of what players have accomplished.\"\n\nAccording to Kyle\
    \ Orland of Ars Technica, \"after spending a week utterly immersed in Nintendo's open-world reimagining of the tried-and-true\
    \ Zelda formula, it's hard to return to the more formulaic entries of the franchise's past\". Journalists commented on\
    \ unexpected interactions between game elements, with serendipitous moments proving popular on social media. Chris Plante\
    \ of The Verge predicted that whereas prior open-world games tended to feature prescribed challenges, Zelda would influence\
    \ a new generation of games with open-ended problem-solving. Digital Trends wrote that the game's level of experimentation\
    \ allowed players to interact with and exploit the environment in creative ways, resulting in various \"tricks\" still\
    \ discovered years after release.\n\nReviewers lauded the sense of detail and immersion. Kotaku recommended turning off\
    \ UI elements in praise of the indirect cues that contextually indicate the same information, such as Link shivering in\
    \ the cold or waypoints appearing when using the scope. Reviewers also commented on the unexpected permutations of interactions\
    \ between Link, villagers, pets, and enemies, many of which were shared widely on social media. A tribute to former Nintendo\
    \ president Satoru Iwata, who died during development, also attracted praise.\n\nJim Sterling was more critical than most,\
    \ giving Breath of the Wild a 7/10 score. They criticized the difficulty, weapon durability, and level design, but praised\
    \ the open world and variety of content. Other criticism focused on the unstable frame rate and the low resolution of\
    \ 900p; updates addressed some of these problems.\n\nIn a 2021 poll conducted by TV Asahi, polling over 50,000 Japanese\
    \ users, Breath of the Wild was voted the best console game of all time, above Dragon Quest V at number two.\n\nIn 2021,\
    \ IGN listed Breath of the Wild as #1 in their list of top 100 games of all time.\n\nSales\nBreath of the Wild broke sales\
    \ records for a Nintendo launch game in multiple regions. In Japan, the Switch and Wii U versions sold a combined 230,000\
    \ copies in the first week of release, with the Switch version becoming the top-selling game released that week. In the\
    \ UK, Breath of the Wild was the second-bestselling retail game its week of release behind Horizon Zero Dawn, and became\
    \ the third-bestselling Zelda game behind Wind Waker and Twilight Princess. In the United States, Breath of the Wild was\
    \ the second-bestselling video game during its month of release behind Tom Clancy's Ghost Recon Wildlands. Nintendo reported\
    \ that Breath of the Wild sold more than one million copies in the US that month, 925,000 of which were for Switch – a\
    \ 100% attach rate. In April 2017, Nintendo reported it had sold 3.84 million copies of Breath of the Wild worldwide by\
    \ the end of March, 1.08 million for Wii U and 2.76 million for Switch, surpassing the Switch's global sales of 2.74 million\
    \ for the same period. Nintendo president Tatsumi Kimishima said that the attach rate of Breath of the Wild to the Switch\
    \ was \"unprecedented\". By March 2019, the game sold 14.27 million copies worldwide, 12.77 on the Switch and 1.61 on\
    \ the Wii U, making Breath of the Wild the best-selling game in the franchise. Total sales for the Switch version reached\
    \ 25.80  million by December 2021. It has sold 1.69 million copies on the Wii U.\n\nAwards\n\nFollowing its demonstration\
    \ at E3 2016, Breath of the Wild received several accolades from the Game Critics Awards and from publications such as\
    \ IGN and Destructoid. It was listed among the best games at E3 by Eurogamer, GameSpot, and GamesRadar+. In late 2016,\
    \ Breath of the Wild received two awards at Gamescom, and won the award for Most Anticipated Game at The Game Awards 2016.\n\
    \nAfter its release, Breath of the Wild won multiple awards at The Game Awards 2017, including Game of the Year, Best\
    \ Game Direction, and Best Action/Adventure Game, and was nominated for Best Art Direction, Best Score/Music, and Best\
    \ Audio Design. At the 2018 21st Annual D.I.C.E. Awards, it won Game of the Year among other awards.\n\nLegacy \n\nShortly\
    \ after Breath of the Wild release, journalists and video game industry figures discussed how it would influence future\
    \ open-world games and the Zelda series. Benjamin Plich, designer of Assassin's Creed: Unity and For Honor, said that\
    \ he believed developers would take inspiration from its focus on experimental and emergent gameplay, such as \"the ability\
    \ to experiment with things more freely, in an open way\" and having \"a powerful sense of autonomy and experimentation\
    \ with the environment and the tools at their disposal.\" Damien Monnier, designer of The Witcher 3: Wild Hunt, said Breath\
    \ of the Wild \"managed to bring classic open world mechanics together while not relying on them to guide the player through\
    \ its world,\" encouraging players to \"go and explore it because you wonder what's out there, not because a loot icon\
    \ tells you to.\" Its \"reactive physics\" sandbox design was \"a revelation for the open world genre at large\" according\
    \ to Screen Rant, and the game was noted for its experimental chemistry engine, emphasizing chemistry as much as physics.\
    \ PC Gamer wrote that the game \"[set] a standard the rest of the genre should live by.\"\n\nIn the years since its release,\
    \ multiple games and developers have cited Breath of the Wild as an inspiration. These include Genshin Impact, Ghost of\
    \ Tsushima, Immortals: Fenyx Rising, Telling Lies, Halo Infinite, and Elden Ring. Similarities have also been noted between\
    \ Breath of the Wild and other open world titles since its launch, including Pokemon Legends: Arceus, Sonic Frontiers\
    \  and Horizon: Forbidden West. According to Digital Trends, Breath of the Wild has become a popular point of comparison\
    \ among open world games, \"approaching “It’s the Dark Souls of…” levels of cliché.\"\n\nThe game's success sparked increased\
    \ interest in the Wii U emulator Cemu, as the Cemu developers rapidly updated the software to run the game at a steady\
    \ frame rate within weeks of release.\n\nIn September 2020, Nintendo announced Hyrule Warriors: Age of Calamity, a hack\
    \ and slash game in the style of Dynasty Warriors series, following 2014's Hyrule Warriors. Age of Calamity is a spin-off\
    \ of Breath of the Wild, with the story set 100 years before. The game was released on November 20, 2020, on the Nintendo\
    \ Switch.\n\nSequel \n\nAn untitled sequel was announced at E3 2019 for the Switch. It was conceived during planning for\
    \ Breath of the Wild DLC; the team came up with too many ideas, some of which could not be implemented due to technical\
    \ constraints, so they decided to use their ideas for a new game. According to Aonuma, the sequel will build atop the\
    \ original's world with a new story and gameplay elements, and is inspired in part by Red Dead Redemption 2. Fujibayashi\
    \ will reprise his role as director. It was announced at E3 2021 that the game would be released in 2022 and that players\
    \ will be able to explore the sky of Hyrule with new mechanics.\n\nExplanatory notes\n\nReferences\n\nExternal links \n\
    \ \n \n \n\n2017 video games\nAction-adventure games\nAIAS Game of the Year winners\nNintendo Entertainment Planning &\
    \ Development games\nNintendo games\nNintendo Switch games\nOpen-world video games\nPost-apocalyptic video games\nFantasy\
    \ video games\nHigh fantasy video games\nSingle-player video games\nBreath of the Wild\nVideo games about amnesia\nVideo\
    \ games developed in Japan\nVideo games that use Amiibo figurines\nVideo games using Havok\nVideo games with alternate\
    \ endings\nVideo games with cel-shaded animation\nVideo games with downloadable content\nWii U eShop games\nWii U games"
  - "Joshua Lawrence Chamberlain (born Lawrence Joshua Chamberlain, September 8, 1828February 24, 1914) was an American college\
    \ professor from Maine who volunteered during the American Civil War to join the Union Army. He became a highly respected\
    \ and decorated Union officer, reaching the rank of brigadier general (and brevet major general). He is best known for\
    \ his gallantry at the Battle of Gettysburg, for which he was awarded the Medal of Honor.\n\nChamberlain was commissioned\
    \ a lieutenant colonel in the 20th Maine Volunteer Infantry Regiment in 1862, and fought at the Battle of Fredericksburg.\
    \ He became commander of the regiment in June 1863 when losses at the Battle of Chancellorsville elevated the original\
    \ commander, Colonel Adelbert Ames, to brigade command. During the second day's fighting at Gettysburg on July 2, Chamberlain's\
    \ regiment occupied the extreme left of the Union lines at Little Round Top. Chamberlain's men withstood repeated assaults\
    \ from the 15th Alabama Infantry Regiment and finally drove the Confederates away with a downhill bayonet charge. Chamberlain\
    \ was severely wounded while commanding a brigade during the Second Battle of Petersburg in June 1864, and was given what\
    \ was intended to be a deathbed promotion to brigadier general. In April 1865, he fought at the Battle of Five Forks and\
    \ was given the honor of commanding the Union troops at the surrender ceremony for the infantry of Robert E. Lee's Army\
    \ at Appomattox Court House, Virginia.\n\nAfter the war, he entered politics as a Republican and served four one-year\
    \ terms of office as the 32nd Governor of Maine from 1867 to 1871. After leaving office, he returned to his alma mater,\
    \ Bowdoin College, serving as its president until 1883. He died in 1914 at age 85 due to complications from the wound\
    \ that he received at Petersburg.\n\nEarly life and education\nChamberlain was born in Brewer, Maine, the son of Sarah\
    \ Dupee (née Brastow) and Joshua Chamberlain, on September 8, 1828.  Chamberlain was of English ancestry and could trace\
    \ his family line back to twelfth-century England, during the reign of King Stephen. Chamberlain's great-grandfather Ebenezer,\
    \ was a New Hampshire soldier in the French and Indian War, and the American Revolutionary War. Chamberlain's grandfather\
    \ Joshua, was a ship builder, and colonel during the War of 1812, before moving his family to a Brewer farm in 1817. Chamberlain's\
    \ father Joshua served as a lieutenant-colonel in the Aroostook War.\n\nChamberlain was the first of five children.  His\
    \ father named him after James Lawrence, and favored a military career for his son, while Chamberlain's mother wanted\
    \ him to become a minister. Chamberlain became a member of the Congregational Church in Brewer in the mid-1840s, and attended\
    \ Major Whiting's military academy in Ellsworth.  Chamberlain then taught himself Greek so he could be admitted to Bowdoin\
    \ College in 1848. At college, Chamberlain was a member of the Peucinian Society, Phi Beta Kappa, and the Alpha Delta\
    \ Phi fraternity. He taught Sunday school in Brunswick during his freshman and sophomore years, and led the choir at the\
    \ Congregational Church-First Parish Church during his Junior and Senior years. Chamberlain graduated in 1852, then entered\
    \ the Bangor Theological Seminary for three years of study.  Besides studying in Latin and German, Chamberlain eventually\
    \ mastered French, Arabic, Hebrew and Syriac.\n\nOn 7 December 1855, Chamberlain married Fanny Adams, cousin and adopted\
    \ daughter of a local clergyman.  Their first child was a girl named Grace Dupee, born on 16 October 1856.  Their son\
    \ Harold Wylls was born on 10 October 1858.  A second and fourth child died early. In the fall of 1855, Chamberlain returned\
    \ to Bowdoin, and began a career in education, first as an instructor in logic and natural theology, then as professor\
    \ of rhetoric and oratory. He eventually went on to teach every subject in the curriculum with the exception of science\
    \ and mathematics. In 1861 he was appointed professor of modern languages, which he held until 1865.\n\nAmerican Civil\
    \ War\n\nEarly career\n\nAt the beginning of the American Civil War, Chamberlain believed the Union needed to be supported\
    \ against the Confederacy by all those willing. On several occasions, Chamberlain spoke freely of his beliefs during his\
    \ class, urging students to follow their hearts in regards to the war while maintaining that the cause was just. Of his\
    \ desire to serve in the War, he wrote to Maine's Governor Israel Washburn, Jr., \"I fear, this war, so costly of blood\
    \ and treasure, will not cease until men of the North are willing to leave good positions, and sacrifice the dearest personal\
    \ interests, to rescue our country from desolation, and defend the national existence against treachery.\" Many faculty\
    \ at Bowdoin did not feel his enthusiasm for various reasons and Chamberlain was subsequently granted a leave of absence\
    \ (supposedly to study languages for two years in Europe). He then promptly enlisted unbeknownst to those at Bowdoin and\
    \ his family. Offered the colonelcy of the 20th Maine Regiment, he declined, according to his biographer, John J. Pullen,\
    \ preferring to \"start a little lower and learn the business first.\" He was appointed lieutenant colonel of the regiment\
    \ on August 8, 1862, under the command of Col. Adelbert Ames. The 20th was assigned to the 3rd Brigade, 1st Division,\
    \ V Corps in the Union Army of the Potomac.  One of Chamberlain's younger brothers, Thomas Chamberlain, was also an officer\
    \ of the 20th Maine, and another, John Chamberlain, visited the regiment at Gettysburg as a member of the U.S. Christian\
    \ Commission until appointed as a chaplain in another Maine Volunteer regiment.\nThe 20th Maine fought at the Battle of\
    \ Fredericksburg, suffering relatively small numbers of casualties in the assaults on Marye's Heights, but were forced\
    \ to spend a miserable night on the freezing battlefield among the many wounded from other regiments. Chamberlain chronicled\
    \ this night well in his diary and went to great length discussing his having to use bodies of the fallen for shelter\
    \ and a pillow while listening to the bullets zip into the corpses.\nThe 20th missed the Battle of Chancellorsville in\
    \ May 1863 due to an outbreak of smallpox in their ranks (which was caused by an errant smallpox vaccine), keeping them\
    \ on guard duty in the rear. Chamberlain was promoted to colonel of the regiment in June 1863 upon the promotion of Ames.\n\
    \nBattle of Gettysburg\n\nChamberlain became most famous for his achievements during the Battle of Gettysburg. On July\
    \ 2, the second day of the battle, Union forces were recovering from initial setbacks and hastily regrouping into defensive\
    \ positions on a line of hills south of the town. Sensing the momentary vulnerability of the Union forces, the Confederates\
    \ began an attack against the Union left flank. Chamberlain's brigade, commanded by Col. Strong Vincent, was sent to defend\
    \ Little Round Top by the army's Chief of Engineers, Brig. Gen. Gouverneur K. Warren. Chamberlain found himself and the\
    \ 20th Maine at the far left end of the entire Union line. He quickly understood the strategic significance of the small\
    \ hill, and the need for the 20th Maine to hold the Union left at all costs. The men from Maine waited until troops from\
    \ the 15th Alabama Infantry Regiment, commanded by Col. William C. Oates, charged up the hill, attempting to flank the\
    \ Union position. Time and time again the Confederates struck, until the 20th Maine was almost doubled back upon itself.\
    \ With many casualties and ammunition running low, Col. Chamberlain recognized the dire circumstances and ordered his\
    \ left wing (which was now looking southeast, compared to the rest of the regiment, which was facing west) to initiate\
    \ a bayonet charge. From his report of the day: \"At that crisis, I ordered the bayonet. The word was enough.\" While\
    \ battlefield conditions make it unlikely that many men heard Chamberlain's order, most historians believe he initiated\
    \ the charge.\n\nThe 20th Maine charged down the hill, with the left wing wheeling continually to make the charging line\
    \ swing like a hinge, thus creating a simultaneous frontal assault and flanking maneuver, capturing 101 of the Confederate\
    \ soldiers and successfully saving the flank. This version of the battle was popularized by the book The Killer Angels\
    \ and the movie Gettysburg. Chamberlain sustained one slight wound in the battle, one when a shot hit his sword scabbard\
    \ and bruised his thigh. Chamberlain also personally took a Confederate prisoner with his saber during the charge. After\
    \ initiating the maneuver, he came upon a Confederate officer wielding a revolver who quickly fired, narrowly missing\
    \ his face. Chamberlain remained steadfast, and with his sword at the officer's throat accepted the man's arms and surrender.\
    \ The pistol Chamberlain captured at Gettysburg can still be seen on display in the Civil War exhibit of the Maine State\
    \ Museum. For his tenacity at defending Little Round Top, he was known by the sobriquet Lion of the Round Top. Prior to\
    \ the battle, Chamberlain was quite ill, developing malaria and dysentery. Later, due to this illness, he was taken off\
    \ active duty until he recovered.\n\nFor his \"daring heroism and great tenacity in holding his position on the Little\
    \ Round Top against repeated assaults, and carrying the advance position on the Great Round Top\", Chamberlain was awarded\
    \ the Medal of Honor.\n\nMedal of Honor citation\n\nSiege of Petersburg\n\nIn April 1864, Chamberlain returned to the\
    \ Army of the Potomac and was promoted to brigade commander shortly before the Siege of Petersburg and given command of\
    \ the 1st Brigade, First Division, V Corps. In a major action on June 18, during the Second Battle of Petersburg, Chamberlain\
    \ was shot through the right hip and groin, the bullet exiting his left hip. Despite the injury, Chamberlain withdrew\
    \ his sword and stuck it into the ground in order to keep himself upright to dissuade the growing resolve for retreat.\
    \ He stood upright for several minutes until he collapsed and lay unconscious from loss of blood. The wound was considered\
    \ mortal by the division's surgeon, who predicted he would perish; Chamberlain's incorrectly recorded death in battle\
    \ was reported in the Maine newspapers, and Lt. Gen. Ulysses S. Grant gave Chamberlain a battlefield promotion to the\
    \ rank of brigadier general after receiving an urgent recommendation on June 19 from corps commander Maj. Gen. Gouverneur\
    \ K. Warren: \"He has been recommended for promotion for gallant and efficient conduct on previous occasion and yesterday\
    \ led his brigade against the enemy under most destructive fire. He expresses the wish that he may receive the recognition\
    \ of his services by promotion before he dies for the gratification of his family and friends.\" Not expected to live,\
    \ Chamberlain displayed surprising will and courage, and with the support of his brother Tom, was back in command by November.\
    \ Although many, including his wife Fanny, urged Chamberlain to resign, he was determined to serve through the end of\
    \ the war.\n\nIn early 1865, Chamberlain regained command of the 1st Brigade of the 1st Division of V Corps, and he continued\
    \ to act with courage and resolve. On March 29, 1865, his brigade participated in a major skirmish on the Quaker Road\
    \ during Grant's final advance that would finish the war. Despite losses, another wound (in the left arm and chest that\
    \ almost caused amputation), and nearly being captured, Chamberlain was successful and brevetted to the rank of major\
    \ general by President Abraham Lincoln. Chamberlain gained the name \"Bloody Chamberlain\" at Quaker Road. Chamberlain\
    \ kept a Bible and framed picture of his wife in his left front \"chest\" pocket. When a Confederate shot at Chamberlain,\
    \ the bullet went through his horse's neck, hit the picture frame, entered under Chamberlain's skin in the front of his\
    \ chest, traveled around his body under the skin along the rib, and exited his back. To all observers Union and Confederate,\
    \ it appeared that he was shot through his chest. He continued to encourage his men to attack.\n\nAppomattox\n\nOn the\
    \ morning of April 9, 1865, Chamberlain learned of the desire by General Robert E. Lee to surrender the Army of Northern\
    \ Virginia when a Confederate staff officer approached him under a flag of truce. \"Sir,\" he reported to Chamberlain,\
    \ \"I am from General Gordon. General Lee desires a cessation of hostilities until he can hear from General Grant as to\
    \ the proposed surrender.\" The next day, Chamberlain was summoned to Union headquarters where Maj. Gen. Charles Griffin\
    \ informed him that he had been selected to preside over the parade of the Confederate infantry as part of their formal\
    \ surrender at Appomattox Court House on April 12.\n\nChamberlain was thus responsible for one of the most poignant scenes\
    \ of the American Civil War. As the Confederate soldiers marched down the road to surrender their arms and colors, Chamberlain,\
    \ on his own initiative, ordered his men to come to attention and \"carry arms\" as a show of respect. In memoirs written\
    \ forty years after the event, Chamberlain described what happened next:\n\nChamberlain stated that his salute to the\
    \ Confederate soldiers was unpopular with many Unionists, but he defended his action in his posthumously published 1915\
    \ memoir The Passing of the Armies. Many years later, Gordon, in his own memoirs, called Chamberlain \"one of the knightliest\
    \ soldiers of the Federal Army.\" Gordon never mentioned the anecdote until after he read Chamberlain's account, more\
    \ than 40 years later.\n\nIn his book Hymns of the Republic: The Story of the Final Year of the American Civil War, S.\
    \ C. Gwynne states that this particular account is \"one of the most cherished of the bogus Appomattox stories\", claiming\
    \ that \"there is no convincing evidence that it ever happened\" and that \"none of the thirty thousand other people who\
    \ saw the surrender noted any such event\" (p. 298). \"The source was Chamberlain, a true hero and, also, in subsequent\
    \ years, one of the great embellishers of the war. His memoirs are an adjectival orgy, often reflecting the world as he\
    \ wanted it to be instead of the way it was. For one thing, he did not command the troops at the ceremony, as he claimed,\
    \ and thus couldn’t order the men to salute. His story, moreover, changed significantly over the years.\" Gwynne also\
    \ states that \"Its staying power was mostly rooted in the fact that Gordon never refuted it. The rebel general apparently\
    \ liked it, and it reflected well on him, as the time went by Gordon added his own liberal embellishments, including the\
    \ suggestion that Lee himself had led the Army through town. The two generals would clearly have preferred this distinctly\
    \ Walter Scott-like sequence, described in countless books and memoirs, to the decidedly less romantic one that actually\
    \ took place.\" Gywnne's cited reference for this disclosure is Lee's Last Retreat by William Marvel (pp. 194–95).\n\n\
    In all, Chamberlain served in 20 battles and numerous skirmishes, was cited for bravery four times, had six horses shot\
    \ from under him, and was wounded six times.\n\nPost-war service\n\n \nChamberlain left the U.S. Army soon after the war\
    \ ended, going back to his home state of Maine. Due to his immense popularity, he served as Governor of Maine for four\
    \ one-year terms after he won election as a Republican. His victory in 1866 set the record for the most votes and the\
    \ highest percentage for any Maine governor by that time. He would break his own record in 1868. During his time in office,\
    \ he was attacked by those angered by his support for capital punishment and by his refusal to create a special police\
    \ force to enforce the prohibition of alcohol.\n\nAfter leaving political office, he returned to Bowdoin College. He was\
    \ originally offered the presidency of the new state university in Orono, but declined, hoping for the same position at\
    \ his alma mater. That came in 1871, he was appointed president of Bowdoin and remained in that position until 1883, when\
    \ he was forced to resign because of ill health from his war wounds. He also served as an ex-officio trustee of nearby\
    \ Bates College from 1867 to 1871.\n\nIn January 1880, there was a dispute about who was the newly elected governor of\
    \ Maine, and the Maine State House was occupied by a band of armed men. The outgoing governor, Alonzo Garcelon, summoned\
    \ Chamberlain, the commander of the Maine Militia, to take charge. Chamberlain sent home the armed men, and arranged for\
    \ the Augusta police to keep control. He stayed in the State House most of the twelve-day period until the Maine Supreme\
    \ Judicial Court's decision on the election results was known. During this time, there were threats of assassination and\
    \ kidnapping, and on one occasion, he went outside to face down a crowd of 25–30 men intending to kill him, and both sides\
    \ offered bribes to appoint him a United States senator. Having gratified neither side in the dispute, he did not become\
    \ a senator, and his career in state politics ended.\n\nLater life\nAfter resigning from Bowdoin in 1883, he went to New\
    \ York City to practice law. Chamberlain served as Surveyor of the Port of Portland, Maine, a federal appointment, and\
    \ engaged in business activities, including real estate dealings in Florida (1885) and a college of art in New York, as\
    \ well as hotels. He traveled to the West Coast to work on railroad building and public improvements. From the time of\
    \ his serious wound in 1864 until his death, he was forced to wear an early form of a catheter with a bag and underwent\
    \ six operations to try to correct the original wound and stop the fevers and infections that plagued him, without success.\n\
    \nIn 1893, 30 years after the battle that made the 20th Maine famous, Chamberlain was awarded the Medal of Honor for his\
    \ actions at Gettysburg. The citation commends him for his \"Daring heroism and great tenacity in holding his position\
    \ on the Little Round Top against repeated assaults, and carrying the advance position on the Great Round Top.\" As in\
    \ many other Civil War actions, controversy arose when one of his subordinate officers stated that Chamberlain never actually\
    \ ordered a charge at Gettysburg. The claim never seriously affected Chamberlain's fame or notability however. This original\
    \ medal was lost, and later rediscovered in 2013, and donated to the Pejepscot Historical Society in Brunswick, Maine.\
    \ A second, redesigned medal issued in 1904 is currently housed at Bowdoin College.\n[Note: In 1898, Chamberlain at the\
    \ age of 70 and afflicted with his multiple Civil War wound disabilities, offered his services to the nation again volunteering\
    \ to command US Army forces in the Spanish American War. Despite persistent efforts with Acting Secretary Alger in the\
    \ War Department and the President he was denied the opportunity due to his health issues. Ironically, his principal opponent\
    \ at Gettysburg, former Colonel William C. Oates CSA (15th Alabama Regiment), was appointed in his place as a Brigadier\
    \ General of US Volunteers.]\n\nIn 1905, Chamberlain became a founding member of the Maine Institution for the Blind,\
    \ in Portland, now called The Iris Network. Chamberlain's wife herself was visually impaired, which led him to serve on\
    \ the organization's first board of directors.\n\nBeginning with his first election as governor of Maine and continuing\
    \ to the end of his life, Chamberlain was active in the Grand Army of the Republic. Despite continual pain and discomfort\
    \ from his wounds of 1864, he made many return visits to Gettysburg and delivered speeches at soldiers' reunions. He made\
    \ his last known visit on May 16 and 17, 1913, while involved in planning the 50th anniversary reunion. Because of deteriorating\
    \ health, he was unable to attend the reunion less than two months later.\n\nDeath\nChamberlain died of his lingering\
    \ wartime wounds in 1914 in Portland, Maine, at the age of eighty-five. He is interred at Pine Grove Cemetery in Brunswick,\
    \ Maine. Beside him as he died was Dr. Abner O. Shaw of Portland, one of the two surgeons who had operated on him in Petersburg\
    \ 50 years previously. A full study of his medical history strongly suggests that it was complications from the wound\
    \ suffered at Petersburg that resulted in his death. He was the last Civil War veteran to die as a result of wounds from\
    \ the war and considered by some the last casualty of the war.\n\nLegacy\n\nChamberlain's home, located across Maine Street\
    \ from the Bowdoin College campus, is now the Joshua L. Chamberlain Museum and is owned by the Pejepscot Historical Society,\
    \ which maintains an extensive research collection on Chamberlain. Memorabilia on display include the minié ball that\
    \ almost ended his life at Petersburg, his original Medal of Honor, and Don Troiani's original painting of the charge\
    \ at Little Round Top. Tours of the home are conducted by volunteer docents from late May until mid-October.\n\nUS Route\
    \ 1A is carried across the Penobscot River between Bangor and Brewer, Maine by the Joshua Chamberlain Bridge, a two-lane\
    \ steel plate girder bridge opened on November 11, 1954.\n\nThe village of Chamberlain, Maine, in the town of Bristol,\
    \ is named for him.\n\nMedal of Honor\nIn September 2013, the original Medal of Honor awarded to Chamberlain in 1893 was\
    \ donated to the Pejepscot Historical Society, which owns the Joshua L. Chamberlain Museum in Brunswick, after being authenticated\
    \ by the Maine State Museum, the Library of Congress, the Smithsonian Institution, and the Awards and Decorations Branch\
    \ of the Department of the Army. The donor, who chose to remain anonymous, found it in the back of a book bought during\
    \ a church sale at the First Parish Church in Duxbury, Massachusetts; Chamberlain's granddaughter Rosamond Allen, his\
    \ last surviving descendant, had donated her estate to that church upon her death in 2000. Chamberlain's alma mater of\
    \ Bowdoin College has a 1904 Medal of Honor belonging to Chamberlain in its possession. The original 1893 medal is on\
    \ display at the Chamberlain Museum.\n\nBibliography\n\n Maine, Her Place in History, his speech at the Centennial Exhibition\
    \ (1877)\n Ethics and Politics of the Spanish War (1898)\n Universities and Their Sons, editor (1898)\n Property: Its\
    \ Office and Sanction (1900)\n De Monts and Acadia (1904)\n Ruling Powers in History (1905)\n The Passing of the Armies\
    \ (1915)\nA special edition of his Paris report on \"Education in Europe\" was published by the United States government\
    \ (Washington, 1879).\n\nCommand history\nLieutenant Colonel (second in command under Adelbert Ames), 20th Maine (August\
    \ 8, 1862)\nColonel, commanding 20th Maine (May 20, 1863)\nCommanding 3rd Brigade, 1st Division, V Corps (August 26 –\
    \ November 19, 1863)\nCommanding 1st Brigade (June 6–18, 1864)\nBrigadier General of Volunteers (June 18, 1864)\nCommanding\
    \ 1st Brigade (November 19, 1864 – January 5, 1865)\nCommanding 1st Brigade (February 27 – April 11, 1865)\nBrevet Major\
    \ General of Volunteers (March 29, 1865)\nCommanding 1st Division (April 20 – June 28, 1865)\nCommanding 1st Brigade,\
    \ 3rd Division, Wright's Provisional Corps, Middle Department (June 28 – July, 1865)\nMustered out of volunteer service\
    \ (January 15, 1866)\n\nIn popular culture\nChamberlain emerged as a key character in Michael Shaara's Pulitzer Prize–winning\
    \ historical novel about Gettysburg, The Killer Angels (1974), and in a prequel novel by his son, Jeff Shaara, Gods and\
    \ Generals (1996). Chamberlain is portrayed by actor Jeff Daniels in the films Gettysburg (1993) and Gods and Generals\
    \ (2003), based on the books. His portrayal in these books and films significantly enhanced Chamberlain's reputation in\
    \ the general public, making him into a more popular and well known figure.\n\nTom Eishen's historical novel Courage on\
    \ Little Round Top is a detailed look at Chamberlain as well as Robert Wicker, the young Confederate officer who fired\
    \ his pistol at Chamberlain's head during the 20th Maine's historic charge down Little Round Top.\n\nKen Burns's 1990\
    \ nine-part PBS film The Civil War featured Chamberlain prominently.\n\nSteve Earle's song \"Dixieland\" from his album\
    \ The Mountain refers to Chamberlain and the Battle of Gettysburg:\n\nThe book The Lost Regiment and the subsequent series\
    \ by author William R. Forstchen chronicle the adventures of the \"35th Maine\", a Union regiment from Maine having been\
    \ transported to an alien planet. The regiment was based on the 20th Maine, with the main character and commander of the\
    \ regiment, Andrew Lawrence Keane, also being a college professor.\n\nIn the alternate history 2003 novel Gettysburg:\
    \ A Novel of the Civil War, written by Forstchen and Newt Gingrich, Chamberlain is featured as a character.  In the book,\
    \ an alternate history of the Civil War, Chamberlain makes a heroic stand similar to the real life battle on Little Round\
    \ Top.  Unlike in real life, Chamberlain is overwhelmed, wounded, and forced to surrender, but he survives and returns\
    \ in the third book of the series, Never Call Retreat (2005).\n\nA musical, Chamberlain: A Civil War Romance, with book\
    \ and lyrics by Sarah Knapp and music by Steven M. Alper was commissioned by Maine State Music Theatre in 1993 and received\
    \ its premiere at that theatre in July, 1996. That production starred Mark Jacoby as Chamberlain and Sarah Knapp as Fannie\
    \ Chamberlain. It was revived in a revised form by Maine State in 2014. According to its bookwriter, the musical is \"\
    an exploration of the perennial conflict between public duty and private devotion. This musical ... not only celebrates\
    \ a great Civil War hero, but also examines a universal theme: How a person's sense of duty and destiny affect his personal\
    \ life.\"\n\nAnother Forstchen work, \"A Hard Day For Mother\", is a short story from the first volume in the variety\
    \ anthology series Alternate Generals edited by Harry Turtledove. That work is based on the premise of: \"what if Chamberlain\
    \ was on the Confederate side at Gettysburg?\" The story assumes that a decade before the outbreak of the Civil War Chamberlain\
    \ had taken a teaching job at a Virginia military academy and developed a love for the state of Virginia; that with the\
    \ outbreak of war he joined the Confederate side under Robert E. Lee; that in Gettysburg he gained the Little Round Top\
    \ for the Confederacy, fighting against his own brother Tom commanding the 20th Maine; that thereby Chamberlain won the\
    \ battle and the entire war for the Confederacy; that he later remained in the independent Confederacy and was eventually\
    \ elected its President; and that his reconciliatory attitude towards the North led to Confederacy and the United States\
    \ eventually holding referendums and freely deciding to re-unite in 1914, following Chamberlain's death.\n\nOn the Showtime\
    \ TV series Homeland, the character Nicholas Brody tells his family the story of Chamberlain, encouraging them to emulate\
    \ him.\n\nIn the song \"Ballad of the 20th Maine\" by The Ghost of Paul Revere (Maine's official state ballad):\nThe book\
    \ Percy Jackson and the Sea Of Monsters by author Rick Riordan hints at Chamberlain being a demigod, stating that he single-handedly\
    \ changed the course of the civil war.\n\nSee also\n\n List of Medal of Honor recipients for the Battle of Gettysburg\n\
    \ List of American Civil War Medal of Honor recipients: A–F\n List of American Civil War generals (Union)\n\nReferences\n\
    \nCitations\n\nGeneral references\n\nFurther reading\n\n Rasbach, Dennis A. Joshua Lawrence Chamberlain and the Petersburg\
    \ Campaign: His Supposed Charge from Fort Hell, his Near-Mortal Wound, and a Civil War Myth Reconsidered. El Dorado Hills,\
    \ CA: Savas Beatie, 2016. .\n\nExternal links\n\n Joshua Chamberlain Seeks Assistance for Jaffa Adams Colonists, 1867\
    \ Shapell Manuscript Foundation\n Joshua Lawrence Chamberlain Digital Archive at Bowdoin College\n Chamberlain-Adams Family\
    \ Papers. Schlesinger Library, Radcliffe Institute, Harvard University.\n www.joshualawrencechamberlain.com A collection\
    \ of primary resources\n Index to Joshua Lawrence Chamberlain's Pages\n Joshua Lawrence Chamberlain Biography\n Joshua\
    \ Chamberlain: Maine's Favorite Son\n Tribute to Major General Joshua Lawrence Chamberlain\n Joshua L. Chamberlain, a\
    \ Biographical Essay\n Medal of Honor recipients on Film\n Joshua L. Chamberlain Museum in Brunswick, Maine Managed by\
    \ the Pejepscot Historical Society\n The Iris Network (formerly the Maine Institution for the Blind)\n \n\n1828 births\n\
    1914 deaths\n19th-century American politicians\nBusinesspeople from Maine\nAmerican Civil War recipients of the Medal\
    \ of Honor\nAmerican Congregationalists\nEducators from Maine\nBangor Theological Seminary alumni\nBowdoin College alumni\n\
    Bowdoin College faculty\nGovernors of Maine\nHistorians of the American Civil War\nMaine Republicans\nPeople from Brewer,\
    \ Maine\nPeople of Maine in the American Civil War\nPoliticians from Bangor, Maine\nPoliticians from Portland, Maine\n\
    Presidents of Bowdoin College\nRepublican Party state governors of the United States\nUnion Army generals\nUnited States\
    \ Army Medal of Honor recipients\nWriters from Brunswick, Maine\nMilitary personnel from Maine\nBurials at Pine Grove\
    \ Cemetery (Brunswick, Maine)\nAmerican people of English descent\n19th-century American businesspeople"
- source_sentence: whey e la caseina hanno lo stesso effetto sulla sintesi proteica muscolare nonostante le differenze nei
    livelli di insulina e nelle concentrazioni di aminoacidi?
  sentences:
  - "In informatica, la clip art (lett.: ritaglio di illustrazione) è un'immagine pre-generata. Il nome si riferisce a delle\
    \ immagini utilizzate per illustrare qualsiasi argomento. Oggi, la clip art è ampiamente utilizzata in progetti sia personali\
    \ che commerciali, che vanno dai biglietti di auguri fatti in casa a relazioni e presentazioni di progetti. Generalmente\
    \ si tratta di immagini fatte a mano o con programmi di grafica e non include la fotografia. Gran parte si tratta di grafica\
    \ vettoriale, per esempio file tipo svg, perché facilmente deformabili nelle dimensioni volute dall'utilizzatore e meno\
    \ pesanti. Sono reperibili intere raccolte di Clip art, sia libere che commerciali.\n\nStoria\n\nAnni '70 \nPrima dei\
    \ personal computer, le clip art erano ampiamente utilizzate nell'industria editoriale e create a mano da disegnatori.\
    \ Erano strettamente associate al processo di incollaggio meccanico per il layout delle pagine. Ciò era un processo lungo\
    \ e faticoso e ha comportato una grande attenzione ai dettagli. La crenatura del documento (lo spazio tra le lettere)\
    \ e l'interlinea (lo spazio tra le righe) erano misurate con un righello.\n\nUna pagina completata e pronta è stata definita\
    \ \"meccanica\". La grafica aggiunta alle pagine doveva essere \"ritagliata\". Quindi il progetto era attaccato alla pagina\
    \ meccanica con cemento di gomma o altro adesivo semipermanente. Infine, la pagina meccanica veniva fotografata per creare\
    \ un negativo per ogni lastra di stampa.\n\nAnni '80 \nProdotto da VCN, ExecuVision è stato tra i primi software di presentazione\
    \ disponibili in commercio. Il software è stato progettato per il PC IBM e fornito con la prima libreria di clip art disegnate\
    \ professionalmente.\n\nClip art aggiuntive possono essere caricate nel software da floppy disk separati. All'epoca ogni\
    \ disco aggiuntivo costava circa 90 dollari.\n\nMacPaint (il primo programma di disegno basato su interfaccia grafica\
    \ disponibile su Macintosh) è stato importante nella storia delle clip art perché ha fornito un modo semplice per crearle.\n\
    \nLe clipart diventarono modelli preimpostati che gli artisti potevano prendere e manipolare per creare nuove opere d'arte.\n\
    \nMacPaint richiedeva un Apple Macintosh, che era proibitivo per la maggior parte dei consumatori. Tuttavia, il computer\
    \ ha avuto successo nei mercati del desktop publishing e dell'istruzione.\n\nChiunque con MacPaint poteva produrre per\
    \ la prima volta, vendere e utilizzare clip art in formati bitmap. Ciò portò a un intero settore commerciale basato sulla\
    \ creazione e vendita di clip art digitali. Ciò include i primi pionieri degni di nota come T/Maker Company e Compuset.\n\
    \nNel 1985, quando Aldus ha rilasciato Page Maker 5 per il desktop publishing, le clip art si sono diffuse molto. Aldus\
    \ ha permesso all'utente domestico di produrre pubblicazioni di qualità professionale, che hanno reso le clip art molto\
    \ popolari e molto richieste. Le persone hanno iniziato a produrre in casa e anche senza particolari competenze artistiche\
    \ materiale come presentazioni aziendali, newsletter, inviti e opuscoli. Tale tecnologia ha consentito design semplici\
    \ e colori di base.\n\nNel 1986 Adobe ha introdotto Illustrator per Macintosh. Tale software è degno di nota in quanto\
    \ ha introdotto l'editing grafico basato su vettori.\n\nIn precedenza le clip art erano disponibili in formato bitmap\
    \ o raster. Le immagini bitmap vengono create da una grande griglia di pixel multicolori. Ciò portava a una qualità degradata\
    \ a dimensioni maggiori, nel caso cioè l'immagine venisse ingrandita.\n\nLa grafica vettoriale infatti utilizza i dati\
    \ geometrici per determinare come vengono disegnate le forme. Ciò consente di ridimensionare la grafica in base alle esigenze\
    \ senza perdita di qualità.\n\nAnni '90 \n\nLa maggior parte degli editori si allontanò dall'incollaggio meccanico all'inizio\
    \ degli anni '90. I software di desktop publishing come Adobe Indesign o QuarkXPress hanno reso la progettazione di stampa\
    \ molto meno faticosa e macchinosa. Diminuì il numero necessario di persone per impaginare e si ridusse il tempo per farlo.\n\
    \nNegli anni '90 i CD-ROM iniziarono a sostituire i floppy disk come metodo per installare software sui personal computer.\
    \ I CD potevano contenere centinaia di volte più dati dei floppy disk. Molte clipart infatti iniziarono ad essere distribuite\
    \ su CD.\n\nAnche T/Maker, che ha costruito la sua attività sulla vendita di piccoli pacchetti di clip art di alta qualità,\
    \ è entrata nel mercato delle clip art di volume. Nel 1995 è diventato l'editore esclusivo di oltre 500.000 immagini prive\
    \ di copyright, per creare quella che sarebbe stata, all'epoca, una delle più grandi librerie di clip art del mondo.\n\
    \nTuttavia, l'aumento dello stoccaggio ha avuto alcuni effetti interessanti sul settore. Ai tempi dei floppy disk, le\
    \ aziende si concentravano sulla produzione di alcuni set di alta qualità con un certo aspetto stilizzato.\n\nCiò è cambiato\
    \ con l'introduzione dei CD. Durante questo periodo le aziende iniziarono a commercializzare clipart dando più importanza\
    \ alla quantità di illustrazioni rispetto alla loro qualità. Avere una libreria di immagini per ogni occasione, anche\
    \ se non professionali, diventò una proposta commerciale più preziosa rispetto ad avere poche clipart ben realizzate.\n\
    \nA metà degli anni '90 Microsoft iniziò a raggruppare clip art con diversi prodotti, in particolare la versione 1996\
    \ di Microsoft Word 6.0. Questa versione di Word è stata fornita in bundle (una directory che raggruppa un eseguibile\
    \ e le relative risorse in una struttura standardizzata) con 82 diversi elementi grafici di clip art, gratuiti per chiunque\
    \ avesse acquistato Word.\n\nMicrosoft amplierà la libreria a più di 140.000 clipart negli anni successivi al rilascio\
    \ di Word 6.0.\n\nAnni 2000 \nLa crescita di Internet ha ulteriormente diversificato il modello di distribuzione delle\
    \ clip art. Invece di acquistare CD pieni di immagini, iniziarono ad apparire online grandi librerie di clipart scaricabili.\
    \ In particolare apparvero iclipart.com e graphicsfactory.com, che sono state tra le prime librerie online.\n\nLe librerie\
    \ Internet fornivano altre due opzioni di licenza. Si poteva acquistare una singola licenza o pagare un abbonamento, che\
    \ dava agli utenti accesso illimitato all'intera libreria di immagini.\n\nNon passò però molto tempo prima che le librerie\
    \ di clip art completamente gratuite iniziassero ad apparire.\n\nAnni 2010 \nIl 1º dicembre 2014 Microsoft ha pubblicato\
    \ un breve post sul blog in cui annunciava la chiusura della libreria di clip art di Office.com:La libreria di clip art\
    \ e immagini di Office.com ha chiuso. I clienti possono comunque aggiungere immagini ai propri documenti, presentazioni\
    \ e altri file che hanno salvato sui propri dispositivi (telefoni, tablet e PC), OneDrive e SharePoint. I clienti hanno\
    \ anche la possibilità di aggiungere immagini ai propri documenti utilizzando Bing Image Search.\n\nBing Image Search\
    \ utilizza un filtro del copyright basato sul sistema di licenza Creative Commons. I risultati restituiti sono immagini\
    \ contrassegnate con licenze Creative Commons. Viene fornito un collegamento alla fonte dell'immagine, che dovresti utilizzare\
    \ per esaminare la fonte dell'immagine e la licenza applicabile per determinare se il tuo utilizzo sarà conforme alla\
    \ licenza. (Le impostazioni possono essere modificate per mostrare tutti i risultati Web per visualizzare più immagini.)\
    \ Tuttavia, sei responsabile del rispetto dei diritti degli altri, incluso il copyright.\n\n—Doug Thomas\n\nGalleria d'immagini\n\
    \nNote\n\nBibliografia \n Amanda Zantal-Wiener, Clip Art Through the Years: A Nostalgic Look Back, Hubspot Blog, 2017\n\
    \ Megan Garber, A Eulogy to Clip Art, in Clip Art, The Atlantic, 2014\n Melissa Jensen-Stewart, Adobe Systems Inc., 2012\n\
    \ David Brock, Slide Logic: The Emergence of Presentation Software and the Prehistory of PowerPoint, Computer History\
    \ Museum, 2016\n\nAltri progetti\n\nCollegamenti esterni \n \n \n\nTerminologia informatica"
  - "La caseina è una famiglia di fosfoproteine che si trova principalmente nel latte fresco e ne costituisce la prima fonte\
    \ di proteine per abbondanza: circa i tre quarti di tutte le proteine del latte appartengono a questa famiglia.\n\nStruttura\
    \ \nLe caseine sono proteine coniugate, cioè proteine legate ad altre molecole, in questo caso a fosforo sotto forma di\
    \ acido fosforico esterificato. Questi gruppi fosforici sono importanti sia per la struttura della proteina, sia per la\
    \ sua proposta funzione. Infatti questo gruppo, caricato negativamente, è in grado di legare ioni calcio e magnesio, da\
    \ cui la supposta funzione di questa proteina, cioè quella di carrier, di trasportatore di calcio minerale. Sono anche\
    \ quasi tutte piuttosto idrofobiche.\n\nLa conformazione delle caseine è simile a quella delle proteine denaturate a causa\
    \ della presenza di un alto numero di residui dell'amminoacido prolina che impedisce alla proteina di ripiegarsi per formare\
    \ strutture più ordinate; inoltre le caseine non possiedono ponti disolfuro (vedi cisteina) in grado anch'essi di conferire\
    \ alla proteina una struttura più ordinata.\n\nAd eccezione della K-caseina le caseine sono proteine idrofobiche, per\
    \ cui in una soluzione acquosa, come per esempio il latte, tendono ad unirsi formando micelle dove vengono intrappolate\
    \ diverse sostanze, tra cui appunto il calcio minerale, diversi enzimi ed altro ancora. Non è ancora ben chiaro come queste\
    \ micelle siano strutturate, ma forse sono costituite all'interno dalle varie caseine idrofobiche circondate da uno strato\
    \ di κ-caseina (idrofila). Al loro interno le micelle si suppone vengano tenute assieme da diversi meccanismi tra cui\
    \ ponti di calcio, interazioni idrofobiche e legami idrogeno.\n\nProprietà\nLa mancanza di una struttura terziaria della\
    \ proteina è la responsabile per la sua stabilità termica: non può essere denaturata al di sotto del punto d'ebollizione\
    \ poiché non c'è una struttura da denaturare. Sempre a causa di ciò molti dei residui idrofobici sono esposti all'esterno\
    \ della proteina e quindi in grado di associarsi ad altri residui di altre caseine, costituendo dei complessi colloidali\
    \ piuttosto grandi ed insolubili in acqua. Questi complessi possono però precipitare in ambiente acido (il loro punto\
    \ isoelettrico è a pH 4,6) e in seguito all'addizione di caglio.\n\nClassificazione \nCi sono 4 gruppi principali di caseine\
    \ che possono essere distinte in base alla distribuzione delle cariche e alla sensitività di precipitazione in seguito\
    \ all'addizione di calcio:\n α(s1)-caseina: costituita da due zone altamente idrofobiche separate da una regione polare\
    \ (idrofila) contenente 7 degli 8 gruppi fosfati; può precipitare anche con bassi livelli di calcio\n α(s2)-caseina: tutti\
    \ gli amminoacidi sono concentrati alle estremità della proteina, in grado di precipitare anch'essa con basse quantità\
    \ di calcio\n β-caseina: possiede l'estremità amino-terminale fortemente polare, mentre il resto è apolare (idrofobico):\
    \ in questo senso assomiglia ad un detergente. Richiede livelli medi di calcio per precipitare\n κ-caseina: l'unica delle\
    \ caseine ad essere idrofila (e per questo richiede un'elevata quantità di calcio per precipitare). Stabilizza le altre\
    \ caseine; una sua idrolisi rimuove questa abilità e porta alla coagulazione (precipitazione) della caseina.\n  gamma\
    \ caseina: prodotta dalla proteolisi post-secretoria a carico della beta-caseina ad opera della plasmina, una proteasi\
    \ del latte.\n\nCoagulazione \nPer coagulazione si intende la precipitazione delle caseine, la separazione del siero e\
    \ la formazione della cagliata, la base per produrre qualunque tipo di formaggio. Questo può avvenire grazie all'acidità,\
    \ alla temperatura, ai sali minerali presenti nel latte e all'aggiunta di caglio. Ci sono 2 modi per far avvenire la coagulazione:\
    \ via acidificazione e via aggiunta di caglio.\n Acidificazione: a pH normale del latte (6,5-6,7) i gruppi fosfato sono\
    \ tutti deprotonati, cioè possiedono una carica negativa che impedisce che i vari ammassi si uniscano tra loro diventando\
    \ ancora più grandi. Abbassando il pH alcuni dei gruppi fosfato vengono protonati finché a un pH di 4,6 si raggiunge il\
    \ punto isoelettrico della caseina. A questo pH la carica netta diventa zero ed i vari ammassi tendono a raggrupparsi\
    \ tra loro formando dei legami ionici. Allo stesso modo i minerali intrappolati all'interno di questi ammassi, che ne\
    \ garantivano una certa stabilità, in seguito all'acidificazione diventano solubili. Come conseguenza si ha la precipitazione\
    \ di tali ammassi.\n Coagulazione enzimatica: è un processo a tre stadi che inizia con l'aggiunta di caglio al latte.\
    \ Il caglio, isolato dallo stomaco di ruminanti, contiene vari enzimi, tra cui la chimosina, in grado di idrolizzare (spezzare\
    \ in due) la κ-caseina, la responsabile della stabilità degli ammassi di caseina. A causa di ciò e di una diminuzione\
    \ di pH, nel secondo stadio della coagulazione le micelle si aggregano. Questo processo è favorito dagli ioni calcio presenti\
    \ che fanno da ponti tra questi ammassi legandoli tra loro. Questa aggregazione viene anche favorita dai legami idrofobici\
    \ che si vengono a instaurare tra le micelle. La temperatura è un parametro importante durante tutto il processo. Aumentandola\
    \ a circa  le reazioni avvengono più velocemente. Nel terzo stadio si ha un riarrangiamento di questi ammassi ed inizia\
    \ la cagliatura. A differenza della coagulazione per acidificazione, in questo caso il coagulo conserva tutti i sali di\
    \ calcio.\n\nAggregazione della caseina avviene anche portando la temperatura oltre il livello di ebollizione del latte\
    \ a causa della modifica delle proprietà del latte (tra cui la formazione di acidi e il rilascio di anidride carbonica).\n\
    \nSupplemento proteico\nLa caseina viene largamente utilizzata in ambito di integrazione proteica per consentire un aumento\
    \ della massa muscolare da parte degli atleti. Come le proteine del siero di latte (whey), la caseina è ottenuta dal latte\
    \ vaccino. A differenza delle whey, i cui amminoacidi nel flusso sanguigno vengono immessi molto rapidamente, la caseina\
    \ causa l'effetto opposto. Fondamentalmente la caseina è per definizione la proteina ad assorbimento lento sul mercato.\
    \ Una proprietà interessante legata alle sue capacità di formare un gel o coagulo nello stomaco, che lo rende molto efficiente\
    \ in termini di apporto di sostanze nutritive. Il coagulo è in grado di fornire un rilascio lento e sostenuto di amminoacidi\
    \ nel flusso sanguigno, che può durare per diverse ore. Questa caratteristica è ritenuta molto importante per mantenere\
    \ uno stato anabolico e anti-catabolico sul tessuto muscolare per tempi relativamente lunghi, laddove le proteine del\
    \ siero favoriscono una maggiore sintesi proteica, ma non sono in grado di limitare il catabolismo proteico. In questo\
    \ modo favorisce una maggiore ritenzione di azoto e di utilizzo da parte del corpo. Grazie alle sue proprietà di lento\
    \ assorbimento, la caseina è ampiamente utilizzata tra i pasti e prima di coricarsi da parte dei bodybuilder per mantenere\
    \ lo stato anabolico sul tessuto muscolare. Recenti evidenze scientifiche infatti riconoscono l'utilità del pasto proteico\
    \ a base di caseina poco prima di coricarsi per stimolare la sintesi proteica muscolare e migliorare il bilancio proteico\
    \ durante il periodo di recupero notturno post-allenamento. Altri studi recenti riconoscono che un pasto assunto poco\
    \ prima di coricarsi, soprattutto se a base di proteine, provoca effetti favorevoli sul metabolismo e sul dispendio energetico\
    \ a riposo la mattina successiva. Come le whey e altre fonti proteiche animali, la caseina contiene tutti gli amminoacidi\
    \ essenziali nella giusta proporzione risultando in un ottimo profilo amminoacidico, favorevole e adatto alla crescita\
    \ muscolare. È stato riscontrato che il rilascio di amminoacidi da parte della caseina possa durare fino a sette ore.\n\
    \nBenefici per la crescita muscolare\nDi seguito elencate alcune proprietà generali delle proteine alimentari:\n\n forniscono\
    \ i substrati necessari per la sintesi proteica;\n favoriscono il recupero muscolare a seguito dell'attività fisica;\n\
    \ fungono da substrato per la gluconeogenesi (produzione di energia a partire da precursori non glucidici, come gli amminoacidi;\
    \ un processo importante nel digiuno prolungato e nell'attività fisica di durata);\n stimolano la sintesi proteica e favoriscono\
    \ la crescita muscolare;\n favoriscono il manifestarsi di un profilo ormonale adatto alla crescita muscolare e dimagrimento\
    \ (GH/IGF-1, testosterone, insulina, glucagone, catecolammine, tiroidei);\n\nLe caseine in aggiunta presentano alcune\
    \ caratteristiche peculiari:\n presentano un elevato valore biologico (VB);\n determinano un lento rilascio amminoacidico\
    \ che può superare le 7 ore;\n hanno dunque un bassissimo indice insulinico (II);\n non esibiscono particolari proprietà\
    \ sullo stimolo dell'insulina, al contrario delle whey;\n diversamente dalle whey, inducono un forte stimolo della secrezione\
    \ endogena del IGF-1, ormone dalle note proprietà anaboliche sul tessuto muscolare;\n contengono quantità maggiori di\
    \ glutammina, arginina e fenilalanina rispetto alle whey;\n includono anche una lunga lista di enzimi, ormoni proteici\
    \ e fattori di crescita;\n sono le più adatte a contrastare il catabolismo proteico (proteolisi) al contrario delle whey,\
    \ o altre proteine a rapida assimilazione;\n determinano uno stimolo anabolico generalmente inferiore se comparato alle\
    \ whey protein;\n\nPrincipali tipologie\nLa caseina è estratta dal latte mediante ultrafiltrazione, senza l'utilizzo di\
    \ sostanze chimiche. Questo processo incrementa la quantità di peptidi del latte bioattivi che supportano la funzione\
    \ immunitaria e favoriscono la crescita muscolare. Esistono essenzialmente quattro tipologie di caseina:\n\n Caseina micellare\
    \ (MC): è la caseina nativa nella sua forma naturale.\n Caseinato di calcio (CC): ottenuta dall'aggiunta di calcio alla\
    \ caseina, è la più solubile ed economica.\n Caseina idrolizzata (HC): caseina sottoposta al processo di idrolisi, che\
    \ rende la proteina a rapida assimilazione.\n Isolato delle proteine del latte: un composto che rispetta la proporzione\
    \ proteica presente nel latte vaccino, con l'80% di caseina e il 20% di siero del latte.\n\nCaseina micellare (MC)\nLa\
    \ caseina micellare (MC, Micellar casein) è la forma naturale nativa della caseina. Viene prodotta separando le proteine\
    \ della caseina contenute nel latte da lattosio, lipidi e proteine del siero mediante processi di filtraggio, ovvero ultrafiltrazione\
    \ e microfiltrazione. Il procedimento di ultrafiltrazione si avvale delle pressione per separare le proteine dagli altri\
    \ componenti del latte attraverso una membrana porosa. La microfiltrazione è un procedimento di filtraggio a basse temperature\
    \ mediante filtri in ceramica; elimina grassi che l'ultrafiltrazione non riesce a separare e non denatura le proteine\
    \ della caseina. Dopo questo processo di reidratazione consente di riformare le micelle. Il prodotto risulta meno solubile\
    \ nei liquidi ed è il tipo di proteine della caseina a digestione più lenta. La caseina micellare mantiene intatto l'intero\
    \ spettro delle funzioni biologiche delle proteine del latte grazie ai trattamenti di filtrazione, al contrario di altri\
    \ tipi di caseina, come il caseinato.\n\nCaseinato di calcio (CC)\nChiamato anche calcio caseinato (CC, Calcium caseinate),\
    \ o semplicemente caseinato, e spesso confuso con la caseina micellare, viene ottenuto aggiungendo calcio alle proteine\
    \ della caseina. Contiene mediamente oltre il 90% di proteine ed è la forma di caseina maggiormente solubile. Si scioglie\
    \ molto più facilmente nei liquidi, senza formare grumi. La maggior solubilità implica minore aggregazione nello stomaco\
    \ e digestione più rapida rispetto alla caseina micellare, e si rivela meno biodisponibile di quest'ultima. Ha un più\
    \ alto contenuto di arginina e triptofano.\n\nIl caseinato, che è ottenuto modificando il pH della caseina acida verso\
    \ un livello più neutrale usando una sostanza alcalina. Quando si utilizza un acido o il calore per separare la caseina\
    \ dal latte, la struttura della micella viene modificata rendendola meno attiva a livello biologico e meno digeribile.\
    \ Il caseinato viene prodotto in genere facendo prima precipitare la caseina tramite l'utilizzo di un acido o del calore.\
    \ La caseina, che non è solubile in acqua, viene resa maggiormente solubile attraverso una reazione con una base inorganica\
    \ forte come l'idrossido di calcio. Il caseinato possiede certamente un contenuto di amminoacidi simile a quello della\
    \ caseina, ma le sue micelle sono danneggiate; non solo vengono alterate la digeribilità e la produzione di frazioni digestive\
    \ biologicamente attive, ma il composto viene anche privato dei minerali chelati in esso contenuti naturalmente.\n\nAlcune\
    \ forme di caseinato sono dotate di maggiore viscosità rallentando la digestione, ma il loro contenuto peptidico biologicamente\
    \ attivo potrebbe essere comunque compromesso.\n\nCaseina idrolizzata (HC)\nLa caseina idrolizzata (HC, Hydrolized Casein)\
    \ è derivata dall'idrolisi, un processo artificiale di digestione enzimatica che prevede la scissione dei legami delle\
    \ proteine rendendole molecole di dimensioni più piccole, dette peptidi (in particolare oligopeptidi), che vengono digerite\
    \ ed assorbite più velocemente. Questo processo rende la caseina simile alla proteina del siero idrolizzata (WPH), differendo\
    \ da quest'ultima essenzialmente nel profilo amminoacidico. La forma idrolizzata di caseina prende il nome commerciale\
    \ di PeptoPro, un marchio registrato che ne detiene il brevetto.\n\nAnche l'ingestione dell'idrolizzato di caseina, così\
    \ come l'idrolizzato del siero, si traduce in una digestione e assimilazione intestinale molto più rapida, aumentando\
    \ la disponibilità di amminoacidi e la sintesi proteica.. Tuttavia alcuni studi hanno rilevato che l'assimilazione più\
    \ rapida della caseina idrolizzata non risulti necessariamente superiore per l'anabolismo muscolare. Da questa ricerca\
    \ è risultato che la caseina idrolizzata viene digerita meno, viene ossidata per produrre energia in misura maggiore,\
    \ e viene utilizzata dall'intestino in misura maggiore rispetto alla caseina intatta. Il risultato finale, secondo questi\
    \ studi, è che la caseina idrolizzata fornisce meno amminoacidi al muscolo scheletrico dopo l'ingestione rispetto alla\
    \ caseina intatta.\n\nProteine del latte\nLe proteine del latte, talvolta nominate isolato delle proteine del latte, proteine\
    \ totali del latte, o proteine complete del latte, sono composte per l'80% da caseina e per il 20% da proteine del siero.\
    \ Il vantaggio delle proteine del latte è quello di unire le proprietà della caseina a quelle della proteina del siero.\
    \ Grazie a questa peculiarità, si ottiene da una parte il veloce afflusso di amminoacidi nel sangue con un marcato effetto\
    \ anabolico e insulinotropico, dall'altra avviene un rilascio lento e sostenuto di amminoacidi derivanti dalla caseina,\
    \ importanti per contrastare il catabolismo proteico e favorire una presenza di amminoacidi nel sangue prolungata.\n\n\
    Da quanto emerge dalla ricerca scientifica, molti studi confermano che l'assunzione di whey o di caseina nel post-allenamento,\
    \ determinino simili livelli di sintesi proteica del muscolo scheletrico, nonostante le differenze temporali nell'assimilazione\
    \ e concentrazione di amminoacidi nel sangue.\n\nUn dato interessante che mette in risalto le proprietà delle proteine\
    \ complete del latte proviene ancora dalla ricerca scientifica: Kersick et al. (2006) esaminarono gli effetti della supplementazione\
    \ di proteine del siero sulla composizione corporea, forza muscolare, resistenza muscolare e la capacità anaerobica nel\
    \ corso di 10 settimane di allenamento di resistenza su 36 uomini allenati. Questi vennero suddivisi in tre gruppi ai\
    \ quali vennero somministrati, prima della sessione di allenamento, rispettivamente, un placebo a base di carboidrati,\
    \ whey+caseina, whey+BCAA+glutammina. Il maggior aumento della massa magra era stato ottenuto dal gruppo che assumeva\
    \ whey+caseina.\n\nLacroix et al. (2006), comparando le whey, caseina micellare, e proteine del latte complete, conclusero\
    \ che, nonostante l'indice PDCAAS elevato, le whey garantiscono un tasso di disponibilità di amminoacidi troppo rapido\
    \ per sostenere la richiesta anabolica durante il periodo post-prandiale. Le proteine complete del latte presentavano\
    \ le migliori qualità nutrizionali, il che suggerisce l'effetto vantaggioso del connubio tra whey e caseine.\n\nSembra\
    \ che il connubio di caseine e proteine del siero, presente anche nelle proteine totali del latte, favorisca migliori\
    \ effetti sull'anabolismo e sulla contemporanea inibizione del catabolismo proteico, laddove le sole whey non si rivelano\
    \ utili a inibire il catabolismo, mentre le caseine indurrebbero un'inferiore sintesi proteica.\n\nStudi clinici\nA causa\
    \ delle differenze nei tempi di assimilazione tra le componenti delle proteine del latte rappresentate dal siero del latte\
    \ e dalla caseina, alcuni studi hanno concluso che le proteine del siero fossero meglio adatte ad essere assunte nel post-allenamento,\
    \ quando è richiesto un maggiore e più rapido incremento del livelli di amminoacidi nel sangue. Tuttavia, alcune ricerche\
    \ hanno mostrato che l'assunzione di caseina o whey a seguito dell'esercizio favorivano allo stesso modo la sintesi proteica\
    \ muscolare, nonostante le differenze temporali nei livelli di insulina e nelle concentrazioni di aminoacidi.\n\nLacroix\
    \ et al. (2006), comparando le whey, caseina micellare, e proteine del latte complete, concludono che, nonostante l'indice\
    \ PDCAAS elevato, le whey garantiscono un tasso di disponibilità di amminoacidi troppo rapido per sostenere la richiesta\
    \ anabolica durante il periodo post-prandiale. Le proteine complete del latte presentavano le migliori qualità nutrizionali,\
    \ che suggerisce l'effetto vantaggioso del connubio tra whey e caseine.\n\nNello stesso anno Cribb e colleghi compararono\
    \ i diversi effetti delle whey isolate idrolizzate (WPH) con la caseina sullo sviluppo della forza e composizione corporea\
    \ ottenuti tramite un allenamento di resistenza di 10 settimane su 13 bodybuilder amatori. Il gruppo che assumeva proteine\
    \ isolate idrolizzate del siero mostrò un aumento significativo della massa magra, una maggiore diminuzione della massa\
    \ grassa, e un maggior aumento della forza, rispetto al gruppo che assumeva caseina.\n\nNel 2007 Miura conclude che una\
    \ dieta a base di caseina sui ratti porta ad una maggiore concentrazione plasmatica di IGF-1 rispetto ad una dieta a base\
    \ di proteine della soia o priva di proteine.\n\nTang et al. (2009), analizzarono gli effetti sulla sintesi proteica muscolare\
    \ delle whey idrolizzate, proteine della soia, e caseina micellare. La sintesi proteica nella gamba, da non allenata,\
    \ era più alta dopo l'ingestione di proteine veloci (WPH e soia), e più bassa dopo l'assunzione di quelle lente (caseina\
    \ micellare). La proteosintesi indotta dalle WPH era più alta di circa il 93% rispetto alla caseina, e del 18% rispetto\
    \ alla soia. Dopo l'allenamento, la sintesi proteica era maggiore di circa il 122% rispetto alla caseina, e del 31% rispetto\
    \ alla soia. Conclusero che lo stimolo della sintesi proteica indotta dal cibo nei giovani adulti è maggiore a seguito\
    \ dell'ingestione di proteine del siero idrolizzato o della soia rispetto alla caseina, sia in stato di riposo che dopo\
    \ l'esercizio di resistenza; inoltre, nonostante WPH e soia risultino entrambe rapide, le WPH stimolano la sintesi proteica\
    \ più delle proteine della soia dopo un allenamento di resistenza.\n\nHoppe et al. (2009) vollero capire quale componente\
    \ del latte stimolasse la crescita. Vennero esaminati gli effetti delle due principali componenti proteiche (whey e caseine),\
    \ e minerali (calcio e fosforo) del latte su 57 ragazzi di otto anni. Risultò che non vi erano interazioni tra le componenti\
    \ proteiche e minerali. Nel gruppo che assumeva caseina, avveniva un incremento del 15% di IGF-1, mentre non avveniva\
    \ nessun cambiamento nella secrezioni insulina. Nel gruppo che assumeva proteine del siero, l'insulina aumentava del 21%,\
    \ senza alcun influsso sul IGF-1. Non avveniva nessun effetto indipendente di un alto introito di minerali del latte su\
    \ insulina e IGF-1. Si concluse che le principali frazioni proteiche del latte (whey e caseine) mostrano importanti, ma\
    \ diversi effetti che promuovono la crescita, aumentando i livelli a digiuno di insulina (per il siero di latte) e IGF-1\
    \ (per la caseina).\n\nProteine \"veloci e lente\"\nLe caseine sono note per le loro proprietà sul lento assorbimento.\
    \ L'espressione slow proteins venne applicata alle caseine a partire dalla fine degli anni novanta, quando, uno studio\
    \ in particolare (Boirie et al. 1997), volle esaminare le differenze tra la proteina del siero del latte e della caseina.\
    \ La ricerca mostra che a seguito del consumo di caseina, si raggiunge il picco di amminoacidi nel sangue e della sintesi\
    \ proteica tra le 3 e le 4 ore. Il rilascio totale di amminoacidi nel circolo ematico, tuttavia, può durare fino a 7 ore\
    \ dopo la sua ingestione.\n\nNel 1997 il francese Yves Boirie e la sua squadra, tramite il famoso studio Slow and fast\
    \ dietary proteins differently modulate postprandial protein accretion, stabilirono per la prima volta il nominativo di\
    \ proteine a \"lenta e rapida assimilazione\", comparando la proteina del siero del latte alla caseina. Questa ricerca\
    \ mostrò che, se comparato alla caseina micellare, il siero causava un incremento più breve ma più elevato di amminoacidi\
    \ nel sangue, e favoriva un incremento della proteosintesi (sintesi proteica) del 68%, rispetto al 31% della caseina.\
    \ Per contro, il catabolismo proteico era ridotto del 34% dopo l'ingestione di caseine, ma non dopo l'ingestione di whey.\
    \ Dopo 7 ore, il livello di ossidazione di leucina era più basso dopo l'ingestione di caseina, nonostante lo stesso introito\
    \ dell'amminoacido. Si concluse che la velocità di digestione delle proteine e l'assorbimento degli aminoacidi da parte\
    \ dell'intestino ha un effetto importante sul complesso anabolismo proteico dopo un pasto. In analogia con il metabolismo\
    \ dei carboidrati, le proteine ad assorbimento lento e veloce modulano la risposta metabolica postprandiale.. Questo loro\
    \ effetto sull'insulina poteva essere contemplato da un parametro che all'epoca stava iniziando ad essere diffuso tra\
    \ alcuni ricercatori, ovvero l'indice insulinico, un metodo che, in analogia con l'indice glicemico, misurava la velocità\
    \ di innalzamento dell'insulinemia piuttosto che della glicemia. Le whey mostravano dunque una grande capacità di elevare\
    \ i livelli di insulina, presentando un alto indice insulinico, ben superiore alla caseina.\n\nIn sintesi lo studioso\
    \ Yves Boirie, concludeva che:\n\n le proteine del siero del latte non hanno proprietà anticataboliche;\n la caseina ha\
    \ proprietà di inibizione del catabolismo proteico;\n il siero stimola maggiormente la sintesi proteica rispetto alla\
    \ caseina;\n le whey inducono una maggiore e più rapida concentrazione di aminoacidi nel sangue al contrario della caseina\
    \ (alto indice insulinico);\n la combinazione di whey+caseina può apportare il massimo dei benefici in quanto a anabolismo\
    \ e contemporanea inibizione del catabolismo muscolare;\n\nAllergie \n\nLa caseina rappresenta la principale causa di\
    \ allergia alimentare al latte. Questa forma di allergia è più frequente nei primi anni di vita e tende poi a scomparire\
    \ con l'età anche se può talvolta portare anche a gravi forme di shock anafilattico ed è una forma di allergia difficile\
    \ da controllare, poiché il latte, o la caseina stessa, è presente in moltissimi alimenti. Lo zucchero lattosio può anch'esso\
    \ provocare disturbi, come la intolleranza al lattosio, una intolleranza alimentare presente principalmente nell'età adulta.\n\
    \nAltri usi della caseina \nOltre ad essere consumata nel latte e nei prodotti derivati, la caseina è utilizzata come\
    \ ingrediente in alcuni prodotti alimentari, e deve essere segnalata sull'etichetta per permettere agli individui allergici\
    \ al latte di evitarla. Inoltre può essere utilizzata come ausiliario nella fabbricazione del vino.La caseina viene inoltre\
    \ impiegata nella preparazione di adesivi, guaine protettive, tessuti e in molti altri prodotti. Viene usata anche come\
    \ legante nella pittura a tempera e a questo scopo è stata intensivamente usata dai pittori del '400. Nella prassi del\
    \ restauro tradizionale la caseina veniva usata per dipinti murali, legno, pietra e cartae trovò largo uso a cavallo tra\
    \ il Settecento e l'Ottocento nella fase d'incollaggio della pellicola pittorica su un nuovo supporto a seguito del trasporto\
    \ del colore da un supporto degradato a uno nuovo, preferendola alla colla a caldo che per molti addetti ai lavori dell'epoca\
    \ rendeva irreversibile l'operazione e alterare i colori. Un altro uso della caseina, condensata con la formaldeide, è\
    \ quello di formare una sostanza solida, galalite, che può essere lavorata e utilizzata nella produzione di bottoni, pettini\
    \ e perfino le coperture dei tasti bianchi nel pianoforte. Dal 1937 la caseina è utilizzata per la produzione di una fibra\
    \ tessile che nell'Italia autarchica assunse il nome di lanital (utilizzato come surrogato della lana da parte della società\
    \ Snia Viscosa); attualmente la \"fibra di latte\" è utilizzata nella la produzione di un filato particolarmente morbido,\
    \ traspirante, assorbente e adatto ai bambini e ai capi di biancheria intima, usato sia per la produzione di capi finiti\
    \ che nell'aguglieria.\n\nNote\n\nBibliografia\n\nVoci correlate\n\n Siero di latte\n Proteine del siero del latte\n Latte\n\
    \ Proteine della soia\n Proteine dell'uovo\n Proteine\n Peptide\n Dipeptide\n Tripeptidi\n Oligopeptidi\n Polipeptide\n\
    \ Amminoacido\n Amminoacidi essenziali\n Amminoacidi ramificati\n Amminoacidi insulinogenici\n Amminoacidi glucogenetici\n\
    \ Amminoacidi chetogenici\n Indice insulinico\n Carico insulinico\n Integratore alimentare\n Alimentazione\n Nutrizione\n\
    \ Culturismo\n Fitness (sport)\n Integrazione nel culturismo\n Micella caseinica\n\nAltri progetti\n\nCollegamenti esterni\
    \ \n \n\nProteine\nLatte\nDietetica\nChimica degli alimenti\nIntegrazioni per il culturismo"
  - "Casados con hijos (Argentina)\n\nInformación general\n\nEn enero de 2005 comenzaron las grabaciones y el 12 de abril\
    \ salió por la pantalla de Telefe con una medición de 28.9 puntos de índice de audiencia en su primer capítulo. Sin embargo,\
    \ la audiencia, no pudo mantenerse, y las mediciones se mantuvieron en un promedio de 18 puntos,​ habiendo alcanzado una\
    \ cifra mínima de 7.7 puntos. Tras haber emigrado por diferentes horarios —23:00, 22:30, 20:00, 21:00—, la audiencia de\
    \ las repeticiones de la primera temporada lograron superar a las emisiones originales,​ convirtiéndolo en uno de los\
    \ programas más vistos de 2005 y 2006.\nEl éxito de los capítulos ya emitidos obligó a la televisora a realizar una segunda\
    \ temporada.​ Titulada Casados con hijos 2, se estrenó el 14 de agosto de 2006, a las 21:30 (UTC-3), alcanzando una media\
    \ de 33.3 puntos de índice de audiencia, siendo uno de los envíos de ficción de mayor audiencia del año.​ La serie, en\
    \ total, cuenta con 212 episodios, 137 capítulos en su primera temporada y 75 capítulos en la segunda.\nEl éxito de la\
    \ serie trascendió las fronteras de Argentina, siendo también emitida por canales locales en Uruguay (donde también consiguió\
    \ ser una de las series más vistas), en Paraguay, Perú​ y Rumania. En este último país, transmitida bajo el nombre de\
    \ Familia Argento.\nLa comedia se ha convertido en un gran clásico de la televisión de este país, y Telefe lo repite​\
    \ desde 2007 hasta la actualidad, emitiendo episodios al azar con un moderado número de audiencia, tanto en la primera\
    \ tarde, como en el prime time.\n\nFuncionamiento del programa\n\nUn aspecto de la serie es que se basa especialmente\
    \ en la realización de diálogos cómicos, predominando así el diálogo y no la acción, por ello posee guiones elaborados\
    \ y diálogos pensados y bien estructurados. Principalmente los diálogos más trabajados y humorísticos son los de Pepe,\
    \ Coqui y María Elena. Otra característica de la serie es la utilización de risas y expresiones de fondo que acompañan\
    \ los chistes y los comentarios que se hacen, esto acentúa en gran medida la carga emocional de las situaciones.\nSe utiliza\
    \ principalmente el corte como método de transición entre planos, porque es la forma más común de hacer una transición\
    \ en el desarrollo de la escena, aunque cuando se cambia de escena se puede notar que se utiliza la superposición rápida\
    \ de personajes y la transición rápida al otro escenario, esto se hace para evitar que la serie se vuelva monótona y la\
    \ haga algo pesada. En la presentación del programa se utiliza el barrido como método práctico y dinámico en una presentación\
    \ de personajes acompañado de música.\nCuando se aplican los cortes es muy frecuente el corte de continuidad, principalmente\
    \ porque en la serie hay más diálogos que acción, sin embargo, hay ciertas ocasiones en que se puede ver que se aplican\
    \ cortes relacionales, como por ejemplo, cuando un personaje se dirige a la puerta que va a la cocina desde la sala principal,\
    \ corta, y aparece entrando en la cocina.\n\nPersonajes principales\n\nEn Casados con hijos tienen lugar las aventuras\
    \ de los seis personajes principales y el entorno que los nuclea dentro del barrio de Bajo Flores, en la capital argentina.\
    \ Pepe, Moni, Paola, Coqui y el perro Fatiga (interpretado por la perra Violeta), forman parte de la familia Argento.\
    \ Sus vecinos son, en tanto, una pareja de bancarios recién casados, llamados Dardo y María Elena Fuseneco.\n\nJosé \"\
    Pepe\" Argento (Guillermo Francella)\n\nEl protagonista, un hombre disgustado con la vida que le tocó y cansado de su\
    \ familia, la cual provoca la mayoría de sus pesares. Pepe trabaja como empleado en una zapatería en un centro comercial,\
    \ con un sueldo exageradamente bajo, conviviendo con sus —según él— molestas clientas. Es hincha del cuadro de fútbol\
    \ Racing Club, siendo el fútbol una pasión para él. Cada vez que llega de la zapatería le cuenta a su familia anécdotas\
    \ que le ocurrieron en el trabajo (tratándose siempre de gordas), y ellos detestan tener que escucharlas.\nEn el pasado\
    \ era la promesa de Racing y estuvo a punto de debutar en Primera División, hasta que su novia y futura mujer, interrumpió\
    \ en el estadio en medio de la cancha para confesarle que estaba embarazada (todo eso era una mentira), lo que obligó\
    \ a Pepe a irse con ella del estadio, y a retirarse del fútbol para siempre. Después de eso se casó con Moni, tuvo dos\
    \ hijos llamados Coqui y Paola, y desde ahí su vida se convirtió en un infierno.\nPepe es una persona muy maleducada y\
    \ muy insensible, no piensa en nadie más que en sí mismo. Es muy mezquino y egoísta, no escucha ni le pone atención a\
    \ nadie, tampoco hace caso a veces. También es vanidoso, en algunos episodios presume ser alguien grande (siendo que en\
    \ realidad no lo es) cuando está haciendo un labor que lo emociona mucho. También es muy machista y pesimista, cree que\
    \ la mujer le arruina la vida al hombre al casarse y le destruye la vida y sus sueños para siempre. Esta actitud se debe\
    \ a que Pepe (como un trauma para él) se casó con Moni y esta le arruinó la vida durante 20 años.\nPepe siempre tiene\
    \ mala suerte, nunca nada le sale bien. En casi todos los capítulos siempre tiene como objetivo lograr algo que lo favorezca\
    \ (como reemplazar al Chevy por un auto mejor, ganar dinero, lograr un buen negocio, ganar un juego o un partido, ser\
    \ famoso, etc), pero siempre fracasa por culpa de la intromisión de los personajes (ya sea por accidente o por propia\
    \ voluntad). No importa de que modo lo intente y cuantas veces lo haga, las cosas siempre le salen todo lo contrario a\
    \ como él las espera.\nLe importa mucho lo comercial y hace cualquier cosa para conseguirlo. Siempre les roba objetos\
    \ ajenos a sus vecinos a Dardo y María Elena debido a que no cuenta con el dinero suficiente para comprarse sus propios\
    \ objetos por su bajo salario (además su familia se lo gasta todo muy a diario). También hay veces que hace esto pidiéndolos\
    \ prestados, para después quedarse con ellos y no devolverlos nunca. Su familia también roba al mismo estilo que él.\n\
    Pepe busca siempre ser reconocido u homenajeado por sus vecinos pero desafortunadamente nunca nadie logra reconocerlo,\
    \ como por ejemplo con frecuencia en varios capítulos la gente confunde su nombre Pepe por \"Pepo\" o \"Pipo\" o el apellido\
    \ Argento por \"Argenti\". Generalmente su personaje tiene una idea pesimista de la vida y trata de la misma manera a\
    \ todos los personajes de la serie, principalmente a María Elena y a Moni.\nMuchas veces este personaje utiliza monólogos\
    \ cómicos o frases de la vida o de otros temas en los lapsos que se encuentra solo o cuando se dirige hacia algún objetivo,\
    \ como abrir la puerta, etc. Francella se caracteriza en este personaje por su propia improvisación.\n\nMónica \"Moni\"\
    \ Potrelli de Argento (Florencia Peña)\n\nEs la esposa de Pepe y madre de Coqui y Paola. Moni es la representación de\
    \ una ama de casa algo incompetente, torpe, extravagante e insatisfecha sexualmente por su marido. Siempre va exageradamente\
    \ maquillada, lleva pulseras y collares y viste ropas holgadas de colores brillantes. Posee una enmarañada y prominente\
    \ cabellera rubia (motivo que Pepe suele burlar). Moni tiene entre 38 y 40 años de edad.\nNo se encarga de la limpieza\
    \ de la casa ni de comprar comida y gusta de pasar toda la tarde (y en ocasiones todo el día) mirando telenovelas o programas\
    \ de teleoferta sentada en el sillón (cosa que Pepe y María Elena suelen criticar diariamente), hablando con su madre\
    \ por teléfono y tomando mate (sin mencionar que no trabaja). También es una fanática de Susana Giménez y de su programa,\
    \ que no se pierde nunca.\nMoni es un desastre cocinando, siempre le sale mal todo lo que cocina con un sabor y un olor\
    \ terriblemente feo (dejando a cualquiera que la pruebe con un dolor de estómago, e incluso llegó a dejar a Pepe ciego\
    \ en el capítulo Atrapados sin salida), lo que critican mucho su familia. A veces en un episodio siempre le promete a\
    \ Pepe cocinarle una rica comida, pero al final de este se puede notar que no cocinó absolutamente nada sin siquiera intentarlo,\
    \ siendo esto producto de la vagancia de Moni.\nMoni siempre quiere tener sexo con su marido, algo que Pepe siempre se\
    \ niega a hacer debido al poco interés y el odio que tiene en su esposa. Y si es que ellos tienen sexo no duran ni medio\
    \ minuto (o tres minutos como mínimo) a causa de que Pepe nunca quiere ni tampoco tiene ganas por lo mencionado anteriormente,\
    \ por eso es que Moni siempre esta insatisfecha y a cada rato le pide sexo a su marido (e incluso en los momentos más\
    \ inoportunos).\nEste personaje utiliza varios clichés con frecuencia, como \"¡Ay Pepe!\", \"¡Cafecitooo...!\" (cuando\
    \ acaba de meter la pata), o se refiere a sus hijos como \"Chiquitos\" o \"Pedazos de mierrr...\". Al contrario que Pepe,\
    \ los diálogos de Moni suelen ser rápidos, atolondrados, ingeniosos y sarcásticos.\nAdemás, el personaje demuestra tenerle\
    \ cierta envidia al matrimonio de sus vecinos Dardo y María Elena, especialmente por la satisfacción sexual de la que\
    \ suelen presumir. Moni se muestra frustrada por la falta de atención que demuestra su marido hacia ella.\nTiene un vocabulario\
    \ grotesco y da un aspecto de torpeza e incompetencia. Sin embargo, esto varía de una temporada a la otra, rebajando su\
    \ habla vulgar en la segunda temporada. El apellido de soltera de Moni es Potrelli, es oriunda de Tostado, Santa Fe y\
    \ cumple años el 12 de mayo (ella lo dice en el capítulo La separación: parte 1).\n\nMaría Elena Caradagián de Fuseneco\
    \ (Érica Rivas)\n\nMaría Elena, de aproximadamente 30 años, es la reciente esposa de Dardo Fuseneco y hace poco se mudó\
    \ junto con él al lado de la casa de los Argento.\nSu particular obsesión por Dardo la lleva a estar constantemente tras\
    \ él y suele presumir mucho frente a los Argento su buena relación con éste.\nEs presumida, altanera y suele destacar\
    \ las cosas que tiene o en las que es superior frente a las demás personas. Tiene una personalidad muy explosiva e inestable,\
    \ por lo que suele aparecer de un momento a otro un ataque de histeria, se sale de quicio y comienza a gritar deliberadamente,\
    \ demostrando una tendencia homicida.\nUtiliza frecuentemente vestimentas prolijas y de colores muy claros o muy oscuros,\
    \ a veces aparece utilizando algún complemento extra de su vestimenta como un sombrero. Los planos que se utilizan para\
    \ este personaje son plano corto y plano largo, por las mismas razones que los demás personajes.\nMaría Elena es supuestamente\
    \ amiga de Moni, aunque muchas veces presume ante ella su matrimonio y su vida lo que genera muchas veces discusiones\
    \ entre ellas, Moni suele llamarla Yegua.\nMaría Elena odia a Pepe con toda su alma, suele mantener constantemente peleas\
    \ con él por sus diferencias. Pepe demuestra constantemente un desprecio muy grande hacia ella, quien suele responder\
    \ casi siempre con diálogos finos y rebuscados insultándolos, hasta que suele darse un estallido de histeria de este personaje.\
    \ Esto suele suceder muchas veces en la serie porque constituye una clave cómica, y lo hace casi siempre exasperada por\
    \ las constantes burlas o comentarios de Pepe en contra de ella (como \"cara de galleta de campo\", \"cara de cartel de\
    \ no estacionar\" \"carita de tapa de inodoro\", \"cara de tapa de empanada\", \"cara de escarapela\", entre muchos otros)\
    \ o su matrimonio.\nSus acciones y pensamientos tienden a ser feministas, y en muchos casos tiende a degradar al hombre,\
    \ al contrario de lo que hace Pepe, que ve a la mujer como inferior al hombre.\nAlgo que cabe destacar de María Elena\
    \ es que presenta un desorden mental bastante importante, la clara prueba de esto es que a partir del séptimo capítulo\
    \ de la segunda temporada, esta tenía una supuesta hija a la cual ella llamaba «La Nena» (esto puede ser interpretado\
    \ como una forma de desahogo ante una posible infertilidad por parte de ella, ya que a pesar de tener una vida sexualmente\
    \ activa con Dardo, nunca tuvieron hijos). Además de ser un tanto alcohólica.\nSupuestamente su sueño más grande es irse\
    \ a vivir a cualquier lugar con tal de estar lejos de los Argento, porque según menciona en un capítulo ella vive al lado\
    \ del infierno y sólo los separa una medianera.\n\nDardo Américo Fuseneco (Marcelo de Bellis)\n\nVecino de la familia\
    \ Argento. Tiene más de 40 años (esto se confirma en un sueño de Pepe en la primera temporada), y junto con su esposa\
    \ se mudaron a la casa vecina hacia poco tiempo. Este personaje pronto estableció una relación amistosa con Pepe y siempre\
    \ actúa como fiel amigo de éste, tanto que hasta a veces, ignora a su esposa por prestarle atención o ayudar a su amigo.\n\
    Vive con su esposa María Elena en la casa vecina a los Argento, en algunas oportunidades se muestra su casa, no tiene\
    \ hijos y mantiene un matrimonio muy bueno con su mujer y son afectivamente muy apegados.\nMuchas veces este personaje\
    \ se muestra un tanto crédulo e ingenuo, casi siempre resultando convencido de hacer ciertas cosas inducidas por Pepe,\
    \ quien resulta ser un tanto manipulador de su amigo. Y al final termina metiendo en graves problemas a Dardo cuando algo\
    \ que Pepe planea sale mal (como normalmente suele pasar). Esa es una de las razones de porque la relación entre Pepe\
    \ y Dardo se rompe, aunque siempre se terminan reconciliando.\nEl aspecto de este personaje es, alto, musculoso (se destaca\
    \ mucho su físico en la serie), pelo negro un corto y regularmente despeinado y utiliza ropas de una persona de clase\
    \ media alta, como camisas, pantalones buenos y bien vestido, aparece con un reloj de aspecto caro. Los colores utilizados\
    \ para este personaje varían entre claros y oscuros, aunque generalmente son colores claros los que se utilizan.\nDemuestra\
    \ ser inteligente y bien instruido, utiliza un vocabulario muy firme y serio.\nEn su pasado, antes de conocer a María\
    \ Elena, Dardo solía mantener relaciones con mujeres muy deliberadamente. Esto afecta la relación de Dardo con su esposa,\
    \ por lo que además es muy hablado por Pepe cuando ambos se encuentran juntos.\nEn la mitad de la primera temporada, Dardo\
    \ se ausenta un tiempo; marchándose con prostitutas (llamados \"gatos\" por los personajes de la serie). En ese momento\
    \ siempre aparecía de incógnito, vestido de empanada, disfrazado, etc. En ese entonces María Elena está consternada, se\
    \ vuelve más loca y emotiva; y lo busca por todos lados. Se descubren varias de sus situaciones, como la \"Pantera Negra\"\
    \ o \"la mimosa\".\nFinalmente vuelve a su casa, y continua normalmente su vida, luego de que su esposa lo perdonara.\
    \ Un detalle que se muestra en algunos capítulos es que Dardo siente atracción sexual hacia Mónica (sobre todo a su exuberante\
    \ busto), pero no se atreve a nada por su amistad a Pepe.\n\nAlfio \"Coqui\" Argento (Darío Lopilato)\n\nEs un adolescente\
    \ de 17 años en la primera temporada y 18 en la segunda. Su verdadero nombre, pocas veces comentado, es Alfio, que debe\
    \ portar en \"honor\" a Alfio Basile (ex jugador y entrenador de Racing Club), lo que demuestra el fanatismo de su padre\
    \ por el fútbol. Se muestra como un adolescente tipo en su aspecto físico pero su personalidad es bastante exagerada,\
    \ mostrándose completamente como un descerebrado, aunque en muchas oportunidades ha dicho alguna frase inteligente principalmente\
    \ delante de su hermana, principalmente en la primera temporada, ya que en la segunda quisieron resaltar más su torpeza.\
    \ Aparece frecuentemente vestido con ropas oscuras y un collar, esto es para diferenciarlo del resto de los personajes.\
    \ Su vocabulario es torpe y precipitado, la mayoría de las veces habla de una manera infantil, y prácticamente no utiliza\
    \ un vocabulario grosero. Este personaje tiene una muletilla hacia los padres, utilizando la frase característica cuando\
    \ se dirige a ellos de “papucho” o “mamucha”. Se le asigna a este personaje una forma de ser infantil pero que a la vez\
    \ se muestra con grandes intenciones de tener pareja, aunque no lo puede conseguir debido a que es rechazado. Frecuentemente\
    \ se muestra exaltado frente a la aparición en algún lugar de mujeres actuando de manera atontada frente a esta situación.\n\
    Muchas veces intentó acercarse a María Elena, fracasando en el intento. A pesar de ser rechazado por las mujeres, Coqui\
    \ llegó a tener relaciones sexuales con al menos dos de ellas, la novia de su primo Jaime y Barbara Bush (la hija del\
    \ expresidente de Estados Unidos George W. Bush). Es probable que Coqui haya tenido más de dos relaciones sexuales, aunque\
    \ esto nunca es confirmado por los personajes en la serie, tal vez por su poca experiencia sexual con respecto a los demás\
    \ personajes (ejemplos, al final del episodio El debut y despedida de Coqui, Coqui comienza a intimar con la nueva novia\
    \ de su primo Jaime, repitiéndose la misma historia que el episodio anterior; o en el capítulo Como bola sin manija. donde\
    \ se muestra mediante flashback que Coqui gastó el dinero destinado a clases de pool, en un jacuzzi con dos mujeres).\
    \ Su apodo \"Coqui\" es un diminutivo para \"Coco\" (el apodo de Alfio Basile, por el que lleva su nombre).\n\nPaola Argento\
    \ (Luisana Lopilato)\n\nEs una joven de 18 años en la primera temporada y 19 en la segunda. El personaje de Paola aparece\
    \ pocas veces en comparación a los demás personajes. La ropa que utiliza es muy variada en cuanto a forma y color, aunque\
    \ frecuentemente aparece vestida con polleras cortas y remeras generalmente de colores claros.\nEs la integrante más torpe\
    \ de la familia Argento, es una retrasada mental y demuestra tener mucha falta de tacto y muy poca sabiduría hacia las\
    \ cosas (tanto indisciplinariamente, como su vocabulario grotesco), tampoco sabe escribir, decir o leer bien la mayoría\
    \ de las palabras. Su torpeza la ha llegado a meter en problemas a ella o cualquiera que la rodea. Usualmente la llaman\
    \ «tarada».\nA veces, se muestra bastante despierta, en relación a la mayoría de las situaciones, cuando entabla algún\
    \ tipo de discusión con el hermano, en que, la mayoría de las veces, ella aparece como superior a él y con mayor experiencia\
    \ de vida, principalmente en el ámbito sexual, sin embargo presenta cierta candidez en aquello que más le atrae: el sexo.\n\
    En la segunda temporada no se la ve mucho debido a que Lopilato estuvo grabando la telenovela Alma pirata, repentinamente\
    \ aparece sobre los finales causando la sorpresa del público y de su padre. Esta ausencia, en un principio se disimula\
    \ diciendo que se fue a una escuela de modelos, pero más adelante Pepe se ríe de eso y agrega «Está en una escuela modelos\
    \ (una boludez tengo que decir)» o «La nena no está, no me la traen nunca» o «me dicen que hoy viene la nena, pero después\
    \ nada».\n\nJuan José González Mendoza (enlace roto disponible en Internet Archive; véase el historial y la última versión).\
    \ (Juanjo)\n\nJuan José interpretó el papel secundario de un bebé, el cual apareció varias veces en diferentes episodios\
    \ de la serie.\n\nFatiga (Violeta, la perra)\n\nEste personaje fue interpretado por una perra, llamada Violeta, dato que\
    \ recién se dio a conocer durante la segunda temporada. Fatiga es el perro de la familia, la misma fue incrementándose\
    \ de a poco a lo largo de la tira. De pelaje beige y contextura grande, generalmente aparece echado en algún lugar, prioritariamente\
    \ en el vetusto sillón preferido de la familia, sin hacer nada.\nEn el capítulo «Todos los perros van al cielo» se descubre\
    \ que es propiedad de Coqui. Fue muchas veces compañero de Pepe y Coqui cuando ellos realizaban diálogos solo en la sala,\
    \ hablándole como a un amigo y haciendo reflexiones sobre su vida.\nFatiga hace honor a su nombre, teniendo en sus escenas\
    \ una actitud completamente cansada, desganada y poco atenta, jamás haciendo prácticamente nada y permaneciendo echado\
    \ en sillones o almohadones en el piso la mayor parte del tiempo. María Elena lo odia porque siempre le defeca en su propio\
    \ jardín.\nSu interpretación recayó en la perra Violeta, de ninguna raza, o mejor dicho, puro perro. Era hermana melliza\
    \ del perro Betún,​ también actor, de interpretaciones reconocidas como en Los Simuladores, o del premiado corto Más que\
    \ el mundo, del realizador Lautaro Núñez de Arco.​\nEl viernes 12 de octubre de 2007, Violeta sufrió un grave accidente\
    \ que le ocasionó la muerte. Todo sucedió cuando sus amos decidieron dejarla en el hogar familiar y no llevarla con ellos\
    \ tal como solían hacerlo. Al parecer, la señora que realiza tareas domésticas abrió para ventilar y fue en ese momento\
    \ que huyó por la ventana hacia su trágico final. «A la noche seguía sin aparecer y la encontramos a un costado de la\
    \ Panamericana», se lamentó Montenegro, que sospecha que Fatiga pudo confundir el auto de sus dueños y salir así a la\
    \ ruta.\n\n \n\n  \n«Fatiga tiene el mismo criterio que todos los personajes de la tira. Este animal sólo podría ser de\
    \ la familia Argento».\n\n \nGuillermo Francella, en una entrevista del diario Clarín.​\n\n\"Lalo\" (Manuel Wirtz)\n\n\
    Es amigo de Pepe. Aparece en no más de 10 capítulos en toda la serie. No se dijo nunca en la serie su verdadero nombre\
    \ ni su apellido. Casualmente el actor que lo interpreta participó en Poné a Francella, serie protagonizada por el actor\
    \ de ese apellido, también protagonista de esta serie. Es compañero de trabajo de Pepe en la zapatería. Forma parte del\
    \ grupo de amigos de Pepe y Dardo, que a veces juegan al truco o van a los casinos.\n\nComparación entre la primera y\
    \ la segunda temporada\n\nAl finalizar la grabación de la primera temporada, los episodios no alcanzaban el índice de\
    \ audiencia' esperado. En las repeticiones, la serie se volvió famosa y aclamada por el público. Es por esto que luego\
    \ de casi un año de las repeticiones (en la mayoría de los casos vista por primera vez por el público), se vio la necesidad\
    \ de comenzar una segunda temporada. El decorado de la serie había sido desarmado y retirado del lugar, ya que allí se\
    \ grababan otras series. Se tuvo que volver a armar la ambientación del decorado y volver a reunir al elenco.\nEn el primer\
    \ capítulo de la segunda temporada, cuando Pepe vuelve de la Copa Mundial de la FIFA 2006 en Alemania, cuenta la historia\
    \ vivida, y al ver el nuevo decorado, parecido al original pero no en su totalidad, agrega: \"¿No encontraron el decorado\
    \ del año anterior?\".\nCuando comenzó la serie, ésta tenía muchas características que cuando se empezó a filmar la segunda\
    \ parte, se modificaron para corregir ciertos aspectos, renovar el contenido, adaptarse a la situación y redefinir objetivos.\n\
    En el aspecto del decorado se ha modificado principalmente el tono de los colores utilizados, por ejemplo, se ha pasado\
    \ de utilizar un color un tanto opaco a otro color más claro que le da mucha más profundidad al escenario en la sala principal.\n\
    El aspecto en la segunda temporada de los escenarios es más prolijo y se define totalmente como una casa de clase media\
    \ acomodada, estableciéndose una gran diferencia entre lo que se ve y lo que se dice, también lo que fue mejorado fue\
    \ la producción del programa, en la primera temporada se podía ver hasta los micrófonos arriba cosa que en la segunda\
    \ temporada no pasaba.\nEn cuanto a lo técnico, la relación de aspecto de la primera temporada era de 4:3, cambiado en\
    \ la segunda por una proporción de 16:10.\nEn la forma de ser los personajes ha cambiado en gran aspecto el personaje\
    \ de Pepe: en la primera temporada se notaba que discriminaban y degradaban mucho a la mujer, principalmente a su esposa-madre,\
    \ y utilizaban muy frecuentemente malas palabras. En la segunda temporada esto se modificó haciendo que Pepe no fueran\
    \ tan agresivo hacia la mujer y que no insultara tanto.\nEn otro aspecto que el personaje de Pepe cambió fue en que en\
    \ la primera temporada tenía con frecuencia un aspecto que se acercaba a una persona de clase media baja y en la temporada\
    \ 2 el aspecto en cuanto a la vestimenta principalmente cambió a mostrarse como una persona de clase media.\nMoni en la\
    \ segunda temporada, junto con el cambio en la personalidad de Pepe, comenzó a imponerse un poco más él.\nUna modificación\
    \ que no fue significativa pero que marcó un cambio entre las dos temporadas es el de la introducción. En la primera temporada\
    \ ésta era una secuencia de presentación de personajes a través de su aparición en forma de caricatura, una forma clásica\
    \ que se utiliza en las sitcom estadounidenses. Esta presentación fue realizada por el estudio Boogieman Media. En la\
    \ segunda temporada se ha hecho la presentación de personajes haciendo una secuencia de partes de capítulos que los presentan.\n\
    Por otro lado el personaje de Dardo cambió en cierta manera, ya que en la primera temporada daba el aspecto de ser un\
    \ hombre muy serio, en la segunda temporada paso a tener una actitud más cómica y liberada. Esto se debe a una readaptación\
    \ que tuvo que hacerse de este personaje debido a un cambio de actores que hubo en la serie original estadounidense que\
    \ interpretaban el mismo papel.\nMaría Elena presenta nuevas locuras en su mente, entre ellas \"la Nena\" (su nueva hija\
    \ imaginaria), además de su corte de pelo, que en la primera temporada era más corto \"casquito\" (según Pepe), y en la\
    \ segunda es un poco más largo.\nOtro aspecto que, si bien pasó desapercibido para muchos, fue importante. En la primera\
    \ temporada, casi todos los capítulos respetaron el guion original de la serie estadounidense Married... with children,\
    \ mientras que en la segunda temporada se produjeron varios cambios, incluso mezclándose contenidos de varios episodios\
    \ originales en uno solo, o reconstruyendo los guiones para lograr una historia más adaptada al humor local.\n\nÚltimo\
    \ capítulo\n\nEl último capítulo de la sitcom fue transmitido por Telefe el día 28 de diciembre de 2006, y promedió un\
    \ total de 29.2 puntos de rating,​ superando a Sos mi vida, una comedia de eltrece, que marcó 25.5 puntos. Como algunas\
    \ ediciones especiales, esta vez el programa tuvo público en vivo.\nComenzando el episodio, Pepe baja rápidamente por\
    \ las escaleras cuando escucha el timbre. Eran sus vecinos, los Fuseneco, quienes destacan que en la casa de Pepe los\
    \ muebles están tapados con sábanas, típico de mudanzas. Entonces ahí bajan Moni, Paola y Coqui, cantando «Presente» de\
    \ Vox Dei y les transmiten a sus vecinos que se iban a mudar a una chacra en Santa Fe, cerca de donde vive la madre de\
    \ Moni. En alusión a esto, empiezan un brindis de despedida y María Elena, se alegra. Tras destacar que no los quería\
    \ ver más, los Argento se abrazan y le gritan: «¡Mentira!». Los Argento hicieron esta broma para el Día de los Inocentes,\
    \ pero en realidad el día de los inocentes era dentro de una semana, y ellos se justificaron diciendo que no podían esperar;\
    \ Dardo se alegra bastante al darse cuenta de la broma, mientras que María Elena se espanta y se desmaya.\nA la noche,\
    \ Pepe organizó una picada para sus vecinos, los cuales fueron a lo de los Argento. En un momento, a Dardo le suena el\
    \ celular, era el gerente del banco en el cual él y su esposa trabajan, y les comunica que fueron sorteados para ir a\
    \ trabajar en una sucursal del banco en París, Francia. Cuando Dardo les comunica a los Argento, ellos no le creen, y\
    \ hacen referencia a una supuesta venganza por la broma que le hicieron, pero Dardo se olvida el celular en la casa de\
    \ los Argento y recibe una llamada de su Gerente que Pepe atiende, confirmándole la hora del viaje.\nAl día siguiente,\
    \ entre lágrimas y despedidas, Pepe y Moni se despiden de ellos, mientras que Coqui y Paola los acompañan a Ezeiza. Después\
    \ de despedirlos, entran a la casa los nuevos vecinos, que resultan ser Pablo Echarri, junto a Mariela Fernández. Se da\
    \ un diálogo introductorio igual al del primer capítulo de la serie, en el cual se presentaron los Argento y los Fuseneco,\
    \ por lo que denota que los nuevos vecinos son iguales a los anteriores.\n\nRumores sobre una tercera temporada\n\nTras\
    \ varios rumores de una posible tercera temporada,​ Francella comentó: \"Es verdad que yo no quiero volver a hacerlo.\
    \ No hay más capítulos para adaptar y eso impide hacerlo de nuevo\".​ Más tarde, mientras dialogaba con Rodrigo Lussich\
    \ de la Radio 10 de Buenos Aires, aseguró que \"repetir esquemas me parece que no da. Yo creo que hay que dejarlo. Fueron\
    \ dos años maravillosos\".​ Por su parte, Florencia Peña declaró que no volvería para una tercera temporada, comentó:\
    \ \"Creo que a Guillermo también le pasa, es que decidimos no seguir con esta serie porque son personajes tan fuertes\
    \ y nosotros somos actores curiosos que necesitamos ir superando nuestra marca y sentíamos que si nos quedábamos ahí\"\
    .​ Mientras tanto, Marcelo de Bellis dijo: \"Guillermo Francella está a punto de firmar con Telefe\". \nSin embargo, Francella\
    \ se encargó de desmentir este comentario.​ Por su parte Érica Rivas comentó: \"Hoy no tengo nada mejor para ofrecer en\
    \ televisión, así que me parece maravilloso que sigan pasándolo, me gustaría que pudiéramos hacer muchos más capítulos\
    \ y que hubiera más para mostrar\".​\nHacia fines de 2018, Francella y de Bellis afirmaron que se encontraban proyectando\
    \ el regreso de la serie en una versión teatral hacia 2019. Por motivos de compromisos laborales de Florencia Peña, el\
    \ proyecto no se concretó. Finalmente, el 2 de agosto de 2019 se confirmó que los integrantes de la serie firmaron un\
    \ contrato para el regreso de Casados Con Hijos. La serie volverá como obra de teatro en los meses de junio, julio y agosto\
    \ de 2020, en el teatro Gran Rex de Buenos Aires.​ ​"
- source_sentence: '안녕하세요! 저는 호기심 많은 AI 비서입니다. 위의 글을 바탕으로 구체적이고 가치 있는 질문을 하나 생성해 드리겠습니다.


    "안녕하세요, 安倍なつみ의 공연 일정을 보면 2009년부터 2014년까지 매년 생일을 기념하는 라이브 공연을 개최했습니다. 이러한 생일 라이브 공연이 그녀에게 어떤 의미를 가지고 있는지 알 수 있을까요?"'
  sentences:
  - "La herejía de Horus (novelas)\n\nTrasfondo histórico\n\n\"... En cuanto el Emperador de la Humanidad se retira a Terra,\
    \ decide dejar todos sus ejércitos a cargo de su hijo favorito, el primarca Horus Lupercal. Éste continúa la labor de\
    \ su padre, la famosa Gran Cruzada​ (la unificación de todos los planetas de la galaxia mediante la pacificación o la\
    \ aniquilación de las razas y así restaurar el Imperio del Hombre utilizando la Verdad Imperial creada por el Emperador,\
    \ tras la Era de los Conflictos), ​ con la ayuda, y bajo su mando por supuesto, de sus otros hermanos primarcas y sus\
    \ respectivas legiones, y el apoyo de las legiones titánicas situadas en Marte. Ascendido a Señor de la Guerra, y con\
    \ el apoyo de su legión, los Lobos Lunares, ahora bautizados Hijos de Horus, es corrompido por el mal a causa de una serie\
    \ de acontecimientos provocados por los Dioses del Caos, provenientes del universo psíquico de la Disformidad, y decide\
    \ traicionar al Emperador. Ingeniándoselas para poner de su lado a ocho de sus diecisiete hermanos, y con el apoyo descontrolado\
    \ de las fuerzas del Caos, pone en marcha un plan de destrucción muy elaborado. El objetivo final es derrotar al Emperador\
    \ en su Trono Dorado y conquistar Terra. Para conseguirlo, deberá abrirse camino hasta su padre, manteniendo a los hermanos\
    \ leales a él ocupados en batallas contras los hermanos leales al Emperador, en diversos puntos estratégicos de la galaxia\
    \ conocida ...\"\nLa Herejía de Horus transcurre en el milenio 31, diez mil años antes del actual Warhammer 40.000, y\
    \ es un pilar fundamental en la historia de éste. Las novelas dan a conocer al máximo detalle todo lo que pasó durante\
    \ los siete años que duró la herejía. Incluso algunas de las novelas también dan a conocer detalles de algunas guerras\
    \ que fueron antes de la herejía. En la serie descubriremos detalles de todas las legiones con sus primarcas y todas las\
    \ acciones que llevaron a cabo por la galaxia. También descubriremos detalles del propio Emperador y los ejércitos que\
    \ le rodean, situados en Terra, y de las legiones titánicas del Mechanicum, situados en Marte. Incluso, y no menos importante,\
    \ descubriremos al Caos y todo lo que éste conlleva. Veremos como un día todos eran hermanos que luchaban por una misma\
    \ causa y como después se dividieron en dos grupos, dando a conocer el nombre de las Legiones Traidoras (leales a Horus)\
    \ y las Legiones leales al Emperador.\n\nResumen de la trama\n\nAl ser una saga muy extensa, es muy difícil poder hacer\
    \ un resumen detallado de lo que ocurre en cada libro, ya que no sigue el típico esquema que podríamos encontrar en una\
    \ novela, sea de un solo tomo como de varios que formen una trilogía. Para crear el resumen de la trama se tiene que ir\
    \ tomando los detalles principales de cada novela que vayan dando forma a la historia principal.\n\nIntroducción\n\nSiete\
    \ años de intensa guerra separan a Horus, Señor de la Guerra, de su padre, el Emperador de la Humanidad. Siete años de\
    \ herejía... Todo comienza en el planeta Isstvan III, donde Horus y la legión traidora de los Hijos de Horus, con la ayuda\
    \ de las legiones, ahora leales a él, de los Hijos del Emperador, la Guardia de la Muerte y los Devoradores de Mundos,\
    \ bajo el liderazgo de los primarcas Fulgrim, Mortarion y Angron respectivamente, y de la fuerza titánica del Mechanicum\
    \ Oscuro, se deshacen de todos aquellos marines espaciales que creen que no aceptarán la traición de Horus, dentro de\
    \ sus propias legiones, lanzando unas bombas víricas llamadas Devoradores de Vidas. Este primer enfrentamiento es conocido\
    \ como la Atrocidad de Isstvan III.​ Una vez eliminados, pero no sin antes, cometer el error de dejar escapar a unos de\
    \ los capitanes de la Guardia de la Muerte llamado Nathaniel Garro robando la fragata Eisenstein y huyendo a través de\
    \ la Disformidad dirección a Terra para avisar de la traición al Emperador, al enterarse de ésta, y del error de Fulgrim\
    \ al intentar convencer a su hermano primarca Ferrus Manus, de la legión de los Manos de Hierro, de apoyar a Horus y fracasar\
    \ en su cometido, el siguiente paso del Señor de la Guerra es trasladar a sus ejércitos al planeta Isstvan V, a la espera\
    \ de que se produzca la mayor masacre entre legiones y hermanos. En cuanto aparecen y desembarcan los Manos de Hierro,\
    \ los Salamandras y la Guardia del Cuervo, bajo el liderazgo de los primarcas Ferrus Manus, Vulkan y Corvus Corax respectivamente,\
    \ se inicia lo que es conocido como la Masacre del Desembarco de Isstvan V,​ una batalla brutal donde las cuatro legiones\
    \ traidoras ya posicionadas, y con la ayuda de cuatro legiones más, que aparecen más tarde, los Amos de la Noche, los\
    \ Guerreros de Hierro, los Portadores de la Palabra y la Legíon Alfa, bajo el liderazgo de los primarcas Konrad Curze,\
    \ Perturabo, Lorgar Aureliano y Alpharius respectivamente, con órdenes de Terra para destruir al traidor, y que por sorpresa\
    \ de Ferrus, Vulkan y Corax descubren que en vez de recibir ayuda, también han traicionado al Emperador, menguan hasta\
    \ casi la total extinción las tres legiones leales, dejando a un Ferrus Manus decapitado por Fulgrim, éste ya casi consumido\
    \ totalmente por las fuerzas del Caos, un Corax casi muerto que huye del campo de batalla con lo poco que le queda de\
    \ su legión, y un Vulkan que, dado por desaparecido por sus marines, es atrapado y encarcelado por Konrad Curze.\nPero...\
    \ ¿dónde estaban los ángeles oscuros, los ángeles sangrientos, los lobos espaciales, los mil hijos, los puños imperiales,\
    \ los ultramarines y los cicatrices blancas? Horus Lupercal, considerado como uno de los mejores estrategas de todos los\
    \ tiempos, lo tuvo todo muy bien planeado.\n\nArcos de la historia\n\nLa Herejía de Horus implica a muchísimos personajes\
    \ en muchos lugares con muchas guerras durante muchos años. Es tan grande la extensión de la historia que los autores\
    \ han decidido crear una serie bastante compleja compuesta por novelas que, aunque sí es verdad que mantienen una línea\
    \ temporal de principio a fin, no mantienen relación una detrás de otra. Solamente las tres primeras novelas se consideran\
    \ la trilogía principal de la serie. A partir de ahí, es donde las novelas van saltando de un lado a otro para cubrir\
    \ todos los detalles de la trama, narrando historias independientes con finales abiertos, en el cual, la historia de una\
    \ novela pueda estar ocurriendo antes, durante o después que la historia de la siguiente novela, y posteriormente, encontrarnos\
    \ con otras novelas que cuenten historias relacionadas con anteriores novelas, creando así varios arcos narrativos. También\
    \ nos encontraremos con algunas novelas presentadas en forma de antologías, donde veremos relatos cortos, dando detalles\
    \ de personajes, lugares, acciones, etc... pero situando cada relato en diferentes momentos temporales durante la herejía,\
    \ o, en una misma antología una recopilación de relatos unidos entre sí para crear una sola historia, que a su vez, pertenezca\
    \ a uno de los arcos narrativos, o a varios.\nA continuación, se mostrará las novelas pertenecientes a cada arco narrativo:​\n\
    \n01. HORUS, SEÑOR DE LA GUERRA: las semillas de la herejía\n\nEstamos en el trigésimo primer milenio. Bajo la benévola\
    \ autoridad del Emperador Inmortal, el Imperio de la Humanidad se ha extendido por la galaxia en una era dorada de descubrimientos\
    \ y conquistas. Pero ahora, en la víspera de la victoria, el Emperador deja el frente y confía la Gran Cruzada a su hijo\
    \ favorito, Horus. Ascendido a señor de la guerra, ¿podrá el idealista Horus llevar a cabo el grandioso plan del Emperador,\
    \ o acaso este ascenso sembrará las semillas de la herejía entre sus hermanos?\nEl libro se divide en tres partes: 1)\
    \ Los engañados. 2) La hermandad en el país de la arañas. 3) El espantoso sagitarium.\n\n02. FALSOS DIOSES: las raíces\
    \ de la herejía\n\nLa Gran Cruzada que ha llevado a los hombres a través de las estrellas continúa. El Emperador de la\
    \ Humanidad ha entregado el mando a su hijo favorito, el señor de la guerra Horus. Sin embargo, no todo va bien en los\
    \ ejércitos del Imperio. Horus todavía sigue sufriendo los celos y el resentimiento de sus hermanos primarcas, y además,\
    \ cuando resulte herido en combate en el planeta Davin, deberá enfrentarse a sus propios demonios interiores. Ante todas\
    \ las tentaciones que el Caos le ofrece, ¿podrá el debilitado Horus resistirse?\nEl libro se divide en cuatro partes:\
    \ 1) El traidor. 2) Luna de plaga. 3) La casa de los falsos dioses. 4) El final de la cruzada.\n\n03. LA GALAXIA EN LLAMAS:\
    \ la herejía revelada\n\nEl señor de la guerra Horus se ha recuperado de sus terribles heridas y encabeza a las triunfantes\
    \ fuerzas imperiales contra el mundo rebelde de Isstvan III. Sin embargo, aunque los rebeldes son aplastados con rapidez,\
    \ la traición de Horus queda revelada cuando ordena que arrasen el planeta con bombas víricas y los marines espaciales\
    \ se vuelven contra sus hermanos de batalla en un combate de inimaginable ferocidad.\nEl libro se divide en tres partes:\
    \ 1) Cuchillos largos. 2) La ciudad coral. 3) Hermanos.\n\n04. LA HUIDA DE LA EISENSTEIN: la herejía se extiende\n\nDespués\
    \ de ser testigo de la tremenda matanza sufrida por las fuerzas imperiales en Isstvan III, el capitán Garro de la Guardia\
    \ de la Muerte se apodera de una nave y pone rumbo hacia Terra para advertir al Emperador de la traición de Horus. Sin\
    \ embargo, la fugitiva Eisenstein resulta dañada por los disparos enemigos y queda a la deriva en el espacio disforme,\
    \ los dominios de los Poderes Siniestros. ¿Podrán Garro y sus guerreros sobrevivir al Caos y llevar su advertencia hasta\
    \ el Emperador antes de que los planes de Horus se cumplan?\nEl libro se divide en tres partes: 1) La estrella cegada.\
    \ 2) Un juramento roto. 3) Indemne.\n\n05. FULGRIM: visiones de la traición\n\nEstamos en el trigésimo primer milenio,\
    \ y la humanidad se encuentra en la cima de su poder. La Gran Cruzada, bajo la dirección del señor de la guerra Horus,\
    \ continúa su marcha imparable. Mientras tanto, Fulgrim, primarca de los Hijos del Emperador, dirige a sus guerreros a\
    \ un combate contra unos viles enemigos alienígenas. De la sangre derramada en esta campaña surgirá la semilla que conducirá\
    \ a esta orgullosa legión a la traición y los llevará al más siniestro de los caminos de la corrupción.\nEl libro se divide\
    \ en cinco partes: 1) El guerrero perfecto. 2) El fénix y la gorgona. 3) Visiones de traición. 4) El umbral. 5) El último\
    \ fénix.\n\n06. EL DESCENSO DE LOS ÁNGELES: lealtad y honor\n\nEl Emperador se reúne con uno de sus hijos perdidos, el\
    \ primarca Lion El´Jonson, cuando la flota imperial redescubre el planeta Caliban. En el momento que los Ángeles Oscuros,\
    \ tanto los nuevos como los antiguos, se unen a la Gran Cruzada, se pone en marcha una cadena de acontecimientos que cambiarán\
    \ para siempre Caliban, a sus habitantes y a la legión.\nEl libro se divide en cuatro partes: 1) Caliban. 2) La bestia.\
    \ 3) Imperio. 4) La cruzada.\n\n07. LEGIÓN: secretos y mentiras\n\nSe avecina una gran guerra, un enfrentamiento que devorará\
    \ al Imperio de la Humanidad. Los marines espaciales de la Legión Alfa, la última y más hermética de toda la hermandad\
    \ de los Adeptus Astartes, llegan a un mundo enemigo para apoyar al Ejército Imperial en su campaña de pacificación y\
    \ en su lucha contra unas fuerzas enigmáticas y sobrenaturales. Pero, ¿qué es lo que impulsa los actos de la Legión Alfa?\
    \ ¿Se puede confiar en ellos? ¿Qué bando escogerán cuando comience la Gran Guerra?\nEl libro se divide en dos partes:\
    \ 1) Verano reptiliano. 2) El lugar de paso.\n\n08. BATALLA POR EL ABISMO: mi hermano, mi enemigo\n\nLa traición de Horus\
    \ ya es conocida por todos, y ha llegado el momento de que sean puestos a prueba. Cuando el Señor de la Guerra despliega\
    \ abiertamente sus fuerzas, llega a conocimiento de los Astartes leales que los Portadores de la Palabra han enviado una\
    \ flota contra Ultramar, el hogar de los Ultramarines. A menos que logren interceptarla y destruirla, es muy posible que\
    \ los Ultramarines sufran un daño del que jamás sean capaces de recuperarse.\n\n09. MECHANICUM: la guerra estalla en marte\n\
    \nLas llamas de la traición se extienden por todo el Imperio. Horus moviliza a todas las fuerzas que le son leales y planea\
    \ sublevar o destruir a todas aquellas que se atrevan a enfrentarse a él. Se está librando una batalla por el corazón\
    \ y el alma de todas las fuerzas imperiales: los Astartes, el Ejército Imperial, las legiones de titanes, y muchas más.\n\
    El libro se divide en tres partes:\n\n10. CUENTOS DE LA HEREJÍA\n\nEstamos en el trigésimo primer milenio y la raza humana\
    \ se ha diseminado por toda la galaxia. Cuando Horus, Señor de la Guerra, se rebeló contra el Emperador, la subsiguiente\
    \ guerra civil estuvo a punto de destrozar el Imperio. La guerra desgarró los mundos y enfrentó a los Astartes contra\
    \ sus hermanos de batalla en una lucha donde la muerte fue la única en salir victoriosa. Esta edición recoge relatos de\
    \ heroísmo y tragedia que tuvieron lugar durante esta época turbulenta. Son los siguientes:\nJuegos de sangre - Lobos\
    \ a las puertas - Peones de la Tormenta - La voz - La llamada de Lion - La última Iglesia - Después de Desh'ea\n\n11.\
    \ LOS ANGELES CAÍDOS: engaño y traición\n\nLa Gran Cruzada parece haber alcanzado un punto muerto durante el cual los\
    \ primarcas y sus legiones deciden de qué lado descansará su lealtad, si del lado del Emperador o del lado de Horus el\
    \ señor de la Guerra.\nLos Ángeles Oscuros serán puestos a prueba tanto en el espacio exterior como en su propia patria,\
    \ Caliban. Mientras su planeta se esfuerza por liberarse del gobierno de las leyes del Imperio, una guerra civil estalla\
    \ en su interior. Las esperanzas están puestas en Los Ángeles Oscuros que se verán inmersos en un sangriento conflicto\
    \ en el que todo lo que conocen y en lo que confían quedará en entredicho.\n\n12. LOS MIL HIJOS: todo acaba en cenizas\n\
    \nLa Gran Cruzada vive un momento decisivo y los Mil Hijos luchan con entrega y lealtad. Sin embargo, el Imperio recela\
    \ de la Legión de Magnus el Rojo a causa de sus métodos arcanos. Temido por aquellos a quienes ha jurado proteger, Magnus\
    \ es llamado al planeta Nikaea para defenderse de las acusaciones de brujería. No obstante, cuando el desventurado primarca\
    \ tiene visiones que predicen la traición de Horus, decide avisar al Emperador mediante poderes prohibidos, y el Señor\
    \ de la Humanidad envía a Leman Russ, primarca de los Lobos Espaciales, a atacar Próspero, el planeta de los Mil Hijos.\
    \ Pero Magnus ha visto más allá de la traición del Señor de la Guerra y estas revelaciones decidirán el destino de su\
    \ Legión para siempre.\n\n13. Némesis\n\nDos años después de la horrorosa matanza de Isstvan IV, Horus le declara abiertamente\
    \ la guerra al Imperio. Pero en las sombras del Palacio del Emperador un grupo de sujetos poderosos se reúne. Su plan\
    \ es enviar un equipo de asesinos que ejecute al Architraidor Horus y así acabar con la guerra por el dominio de la galaxia\
    \ antes de que ni siquiera comience. Lo que no saben es que Horus y sus aliados ya han iniciado su propio plan, igual\
    \ de siniestro, para acabar con el Emperador.\n\n14. El primer hereje\n\nEn medio de la guerra galáctica que supone la\
    \ Gran Cruzada, el Emperador desaprueba el culto que le rinden los Portadores de la Palabra. Angustiados por semejante\
    \ reproche, Lorgar y su legión emprenden un nuevo camino y arrasan un planeta tras otro.\nAunque lo que realmente buscan\
    \ es iluminar el Imperio, la corrupción del Caos se apodera de ellos y comienza su camino hacia la maldición. Sin que\
    \ los Portadores de la Palabra lo sepan, su búsqueda de la verdad alberga las mismísimas raíces de la herejía…\n\n15.\
    \ Próspero en llamas\n\nEl Emperador está furioso. Magnus el Rojo, primarca de la legión de los Mil Hijos, ha cometido\
    \ un error de proporciones catastróficas y ha puesto en peligro a la propia Terra. Al Señor de la Humanidad no le queda\
    \ más remedio que encargarle al primarca de los Lobos Espaciales, Leman Russ, la misión de apresar a su hermano en el\
    \ planeta Prospero, el lugar de origen de los Mil Hijos. \nNo será fácil someter al Planeta de los Hechiceros a la voluntad\
    \ del Emperador, pero tampoco detener a Russ y a sus Lobos Espaciales. Con el corazón poseído por la ira, el Rey Lobo\
    \ está decidido a llevar a Magnus ante la justicia del Emperador. Los acontecimientos que decidirán el destino de Prospero\
    \ se desatan.\n\n16. La era de la oscuridad\n\nLa Era de la Oscuridad nos narra una serie de historias acontecidas después\
    \ de la traición de Isstvan V. Horus comienza su campaña contra el Emperador, una guerra a escala galáctica que tiene\
    \ como objetivo final Terra. Pero el camino que lleva al enfrentamiento entre padre e hijo es muy largo: siete años llenos\
    \ de secretos y de silencios, de planes y de proyectos. Los años más oscuros de la Herejía de Horus están a punto de ser\
    \ desvelados.\n\n17. Los Muertos Exiliados\n\nLa galaxia arde envuelta en llamas. Los primarcas leales al Emperador se\
    \ preparan para enfrentarse al Señor de la Guerra Horus y a las legiones traidoras en la arena negra de Isstvan. Una época\
    \ tan oscura sólo puede ser el anuncio de nuevos sucesos terribles que están por ocurrir. El astrópata Kai Zulane descubre\
    \ sin querer un secreto capaz de alterar el rumbo de la guerra, y tiene que huir.\nSe lanza junto a una misteriosa banda\
    \ de renegados al letal submundo de Terra, donde aquellos en los que antaño confiaba le dan caza como si fuera un criminal.\
    \ Ante la traición, Kai debe decidir a quién jurará lealtad, y si enterrar o no para siempre algunas verdades.\n\n18.\
    \ El Asedio de Deliverance\n\nCorax y los pocos guerreros supervivientes de la Guardia del Cuervo escapan de la matanza\
    \ de Isstvan V mientras la Herejía de Horus divide al Imperio. Los castigados marines espaciales se recuperan de sus heridas\
    \ y se esfuerzan por volver al combate cuanto antes. Corax, regresa destrozado a Terra en busca de la ayuda de su padre,\
    \ el Emperador de la Humanidad. Éste le revela un antiguo secreto, y así Corax comienza la reconstrucción de la Guardia\
    \ del Cuervo y planea la venganza contra sus traicioneros hermanos primarcas. Pero la misteriosa Legión Alfa ha conseguido\
    \ infiltrarse entre los supervivientes y pretende destruir la Guardia del Cuervo antes de que pueda recuperarse y amenazar\
    \ los planes de Horus.\n\n19. La Batalla de Calth\n\nSin saber la extensión de la Herejía, Roboute Guilliman cumple las\
    \ órdenes cada vez más crípticas del Señor de la Guerra y regresa a Ultramar para reclutar a su legión y combatir a los\
    \ orkos que se reúnen en el sistema Veridian. Sin previo aviso, los supuestos aliados de la legión de los Portadores de\
    \ la Palabra invaden Calth, donde dispersan la flota de los Ultramarines y aniquilan a todos los que se encuentran en\
    \ su camino. Guilliman confirma sus peores sospechas: Lorgar está decidido a acabar de una vez por todas con la terrible\
    \ rivalidad que hay entre ellos. Y cuando los traidores invocan a las infectas hordas de demonios y a todas las fuerzas\
    \ del Caos, los Ultramarines se ven abocados a una lucha en la que ninguno de los bandos podrá vencer.\n\n20. Los primarcas\n\
    \nCreados a imagen y semejanza del Emperador, los Primarcas se creyeron los príncipes del universo durante mucho tiempo.\
    \ Dirigieron a las legiones de Marines Espaciales en una gloriosa conquista de la galaxia, y ningún enemigo del imperio\
    \ fue capaz de resistírseles. Pero incluido en el seno de una hermandad tan legendaria, las semillas de la discordia han\
    \ sido sembradas hace tiempo, mucho antes de que el traicionero Señor de la Guerra, Horus, proclamase su gran herejía.\n\
    \n21. Signus Prime\n\nDesde los comienzos de la Gran Cruzada, Sanguinius, el angélico Primarca de la IX Legión, fue uno\
    \ de los más leales y cercanos aliados de Horus. Pero los Ángeles Sangrientos llevan mucho tiempo ocultando su naturaleza\
    \ secreta al resto del Imperio, y cuando el Señor de la Guerra deja caer que su salvación podría encontrarse en las ruinas\
    \ de un mundo conquistado, los hijos de Sanguinius caen en la trampa y se dirigen a él a toda prisa. Ahora, cuando se\
    \ hace evidente la mano del traidor, los Ángeles Sangrientos deben enfrentarse a los ejércitos del Caos, surgidos de la\
    \ Disformidad, y a sus propios demonios personales, en las desoladas llanuras de Signus Prime.\n\n22. Sombras de traición\n\
    \nDesde los campos de batalla de Phall e Isstvan hasta las sombras de la propia Terra, la mayor guerra de la historia\
    \ de la humanidad se recrudece. Mientras las legiones traidoras continúan aterrorizando la galaxia, la defensa del Palacio\
    \ Imperial se prepara. El inevitable encuentro final entre Horus y el Emperador cada vez está más cerca.\n\n23. Angel\
    \ Exterminatus\n\nPerturabo, el maestro de los asedios y el aniquilador de Olympia, ha estado largo tiempo a la sombra\
    \ de sus otros hermanos primarcas, frustrado por las obligaciones cotidianas e ignominiosas que suelen ser responsabilidad\
    \ de la IV Legión. Cuando Fulgrim le ofrece la oportunidad de dirigir una expedición para buscar armamento antiguo y perdido\
    \ de los xenos, los Guerreros de Hierro y los Hijos del Emperador se unen para adentrarse en el corazón del enorme torbellino\
    \ de estrellas que acecha los sueños de Perturabo. Perseguidos por los supervivientes vengativos de Isstvan V y por los\
    \ retornados de un mundo Eldar extinto, deben darse prisa si quieren liberar el poder devastador del Angel Exterminatus.\n\
    \n24. Traidor\n\nLa Cruzada de las Sombras ha comenzado. Mientras los Ultramarines se tambalean tras el ataque sorpresa\
    \ de Kor Phaeron en Calth, Lorgar dirige al resto de los Portadores de la Palabra al corazón del reino de Ultramar. Sus\
    \ dudosos aliados, Angron y los Devoradores de Mundos, aparentemente ciegos al auténtico objetivo de la misión, prefieren\
    \ seguir saqueando cada nueva civilización que encuentran. Pero Lorgar, que en otro tiempo hubiera castigado a su hermano\
    \ descarriado, ahora solo parece alentar el frenético derramamiento de sangre. Arderán mundos, las legiones se enfrentarán\
    \ y un Primarca caerá... El destino de toda la galaxia pende de un hilo.\n\n25. La marca de Calth\n\nLa Herejía ha llegado\
    \ a Calth sin avisar. En pocas horas de combate, los orgullosos guerreros de la XIII Legión, los Ultramarines de Guilliman,\
    \ fueron aplastados por la traición de sus otrora hermanos de la XVII. Ahora, con el planeta a merced de las erupciones\
    \ solares de la estrella herida de Veridian, los supervivientes deben enfrentarse a los Portadores de la Palabra restantes\
    \ y a sus impíos aliados o a un destino fatal en los sombríos refugios arcológicos que hay bajo la superficie del planeta.\n\
    \n26. Vulkan vive\n\nDespués de la masacre de Isstvan V, los supervivientes de la legión de los Salamandras buscan sin\
    \ éxito a su primarca caído sin saber que, aunque desearía estar muerto, Vulkan aún vive… y se pudre en una celda para\
    \ diversión de su cruel carcelero, su hermano Konrad Curze. Mientras sufre las numerosas e infernales torturas diseñadas\
    \ para quebrar su cuerpo y espíritu, Vulkan es testigo de hasta dónde puede llegar la depravación del Acechante Nocturno\
    \ y descubre algo que podría cambiar el curso de la guerra.\n\n27. El imperio olvidado\n\nEn la Franja Este, el reino\
    \ de Ultramar resiste en solitario. Tras sufrir el ataque de los Portadores de la Palabra en Calth y la subsiguiente Cruzada\
    \ de las Sombras contra los Quinientos Mundos, el primarca de los Ultramarines, Roboute Guilliman, llama a todas las fuerzas\
    \ leales a Macragge con la visión de un nuevo futuro para la humanidad. La creciente llegada de fugitivos de la guerra\
    \ que ya ha envuelto al resto de la galaxia hace imposible distinguir entre amigos y enemigos. Aislado de Terra por temibles\
    \ tormentas disformes, ¿planea Guilliman llevar a cabo un pulso de poder para rivalizar incluso con el Señor de la Guerra\
    \ renegado Horus?\n\n28. Cicatrices\n\nDe todas las Legiones Astartes, los White Scars de Jaghatai Khan siguen siendo\
    \ los más enigmáticos y escurridizos. Nacidos en una civilización que premia el honor, la velocidad y una lealtad absoluta,\
    \ sigue sin estar claro de qué lado se decantan a pesar de que la galaxia está siendo destruida por la traición de Horus\
    \ y de que ambos bandos cuentan con ellos entre sus potenciales aliados en la guerra que está por venir. Sin embargo,\
    \ cuando la Alpha Legion lance un ataque simultáneo e inexplicable contra los White Scars y los Space Wolves, Khan deberá\
    \ decidir de una vez por todas si apoyará al emperador, al señor de la guerra… o a ninguno de ellos.\n\n29. Espíritu vengativo\n\
    \nMientras los aliados de Horus libran batallas en mil frentes diferentes, la XVI Legion desciende sobre el Mundo Caballero\
    \ de Molech, uno de los principales baluartes del Ejército Imperial. Las fuerzas leales al Emperador se preparan para\
    \ hacer frente al Señor de la Guerra, pero ¿qué puede haber llevado a Horus a atacar un planeta tan bien defendido y qué\
    \ estará dispuesto a sacrificar para cumplir su oscuro destino?\n\n30. La condenación de Pythos\n\nTras el desastre de\
    \ la Masacre del Desembarco de Isstvan V, un ejército maltrecho y menguado de Iron Hands, Raven Guard y Salamanders se\
    \ reagrupa en un mundo muerto aparentemente insignificante. Mientras rechazan los ataques de toda clase de criaturas monstruosas,\
    \ estos aliados a regañadientes hallan la esperanza en los refugiados humanos que huyen de la creciente guerra y han quedado\
    \ a la deriva en las mareas de la disformidad. Pero mientras los Space Marines crean un refugio en las junglas de Pythos,\
    \ aparece una oscuridad que amenaza con consumirlos a todos\n\n31. Legados de traición\n\nDe los mayores conflictos surgen\
    \ los verdaderos héroes. Con la galaxia en llamas y una guerra de inimaginable magnitud arrasando el Imperio, los defensores\
    \ de la luz y de la oscuridad se aventuran en innumerables campos de batalla al servicio de sus capitanes. No buscan fama\
    \ o riqueza, sino enfrentarse a su destino.\n\n32. Fuego Letal\n\nAunque Vulkan permanece en estasis bajo la Fortaleza\
    \ de Hera, muchos de sus hijos se niegan a creer que esté realmente muerto. Después de un rescate casi milagroso por parte\
    \ de los Ultramarines, Artellus Numeon, antiguo capitán de la Guardia Pira, insta a los otros Salamandras de Macragge\
    \ a abandonar el Imperium Secundus y devolver el cuerpo de su Primarca al mundo natal de Nocturne, donde renacerá en las\
    \ llamas del Monte del Fuego Letal. \nPero las dudas y temores por el futuro de la Legión no dejan de acosar a Numeon.\
    \ Mientras tanto, sus enemigos tratan de hacerse con nuevos destinos…\n\n33. La guerra sin fin\n\nLa visión del Emperador\
    \ de una humanidad en su cénit se ha desmoronado. La Gran Cruzada ya no es sino un recuerdo lejano. El sueño de la Unidad\
    \ se ha desvanecido. Pero ahora que la rebelión de Horus se extiende a todos los rincones del Imperio y la guerra devora\
    \ mundos y sistemas nuevos casi a diario, hay quienes se preguntan: ¿acaso las señales estaban ante nuestros ojos desde\
    \ el principio?\n\n34. Pharos\n\nCon el noble emperador Sanguinius gobernando desde Macragge, el Imperium Secundus se\
    \ erige como un faro de esperanza solitario aun cuando las fuerzas del Señor de la Guerra continúan asolando el resto\
    \ de la galaxia. Roboute Guilliman, todavía señor de Ultramar, ha convencido a su hermano de que Terra ha sucumbido y\
    \ de que el misterioso Monte Pharos, ubicado en Sotha, es ahora la clave del futuro de la humanidad. No obstante, los\
    \ Night Lords, los hijos crueles y despiadados de Konrad Curze, han estado vigilando desde las sombras y se han estado\
    \ preparando para lanzar un ataque largo tiempo planeado sobre el mismísimo Pharos…\n\n35. El ojo de Terra\n\nLa galaxia\
    \ arde bajo el mando de Horus y a cada instante que pasa se pierden un billón de vidas más, pero no siempre fue así. Tiempo\
    \ ha, el título de Señor de la Guerra era sinónimo de honor, de lealtad y de máximo orgullo entre las fuerzas de las legiones\
    \ de los Space Marines. Pero tal vez, si seguimos las infinitas líneas del destino y la resistencia ya tejidas en torno\
    \ a los primarcas y a sus hijos, podamos llegar a comprender el rencor que puede corroer hasta el alma más férrea..."
  - "《대전통편》(大典通編)은 《경국대전》과 《속대전》 및 그 이후에 임금이 내린 교명과 현행 법령을 증보하여 편찬한 조선의 법전으로, 현존하는 책은 6권 5책으로 된 인쇄본. 목판본. 장서각도서이다.《경국대전》의\
    \ 예에 따라 서술하고, 경국대전의 본문에는 원(原), 속대전의 본문에는 속(續), 새로 증보한 것에는 증(增) 자를 음각(陰刻)해 넣어 서로 구별하였다.\n\n1785년(정조 9) '경국대전', '속대전' 및\
    \ 그 뒤의 법령을 통합하여 김치인 등이 왕명에 따라 편찬한 통일법전. 1784년 찬집청을 설치하여 김노진 등이 편찬하여 1786년부터 시행되었다.\n\n편찬/발간 경위 \n\n조선시대 법전은 ≪경국대전≫과 ≪속대전≫\
    \ 두 책으로 되었으나, 그 밖에도 ≪오례의 五禮儀≫ 등 법전과 같은 효력이 있는 전서들이 나뉘어 있어 법제 운용에 불편이 많았다.\n\n1781년 2월 당시의 법전을 통합하기로 결정하고, 1784년 찬집청을 설치하였다.\
    \ 이어서 김노진(金魯鎭)·엄숙(嚴璹)·정창순(鄭昌順)을 찬집당상(纂輯堂上), 이가환(李家煥)을 찬집낭청(纂輯郎廳)으로 임명, 편찬에 착수하였다.\n\n찬집당상들은 업무를 분담하고 각자의 작업분을 대신들과 상의해\
    \ 초고를 완성한 뒤, 각 전(典)별로 모두 정조의 결재를 거쳤다.\n\n정조는 이를 다시 전임과 현임의 대신들에게 재검토하게 하였다. 또, 각 전마다 당해 판서에게 축조 교정(逐條校正)하도록 하였다. 이 일의\
    \ 총재(總裁)로는 일찍이 ≪속대전≫ 편찬을 주관한 김재로(金在魯)의 아들 김치인(金致仁)을 임명하였다.\n\n교정 실무자로 이가환·신대계(申大季)를 임명해 교정을 마친 뒤, 이복원(李福源)의 서문, 김치인의 전문(箋文)을\
    \ 첨부하였다.\n\n1785년 6월 15일 목판본 인쇄에 들어가 그 해 9월 6일 220부의 인쇄를 마쳤다. 이 때 감인관(監印官)으로는 정창성(鄭昌聖)·이가환·이덕무(李德懋)·유득공(柳得恭)·박제가(朴齊家)\
    \ 등 규장각검서관들이 맡았다. 또한, 지방 관아에 보낼 것은 각 감영에서 별도로 번각(翻刻), 배포하도록 하여 1786년 1월 1일부터 시행되었다.\n\n내용 \n\n6전(六典)의 조문은 ≪경국대전≫을 맨 앞에,\
    \ ≪속대전≫을 그 다음에, 그리고 그 뒤의 법령 순으로 수록하고 각각 ‘원(原)’·‘속(續)’·‘증(增)’자로 표시하였다. 또한 종래 횡조로 되었던 것을 모두 종조로 바꾸었다.\n\n특히, 조종성헌존중(祖宗成憲尊重)의\
    \ 대 원칙에 따라 ≪경국대전≫이나 ≪속대전≫의 조문 중에서 공식적으로 폐지된 조문은 ‘금폐(今廢)’라고 표시하였다.\n\n그리고 숫자나 명칭이 뒤바뀌거나 오류가 명백한 것만 바로잡는 것 외에 ≪경국대전≫과 ≪속대전≫의\
    \ 조문은 그대로 수록하였다.\n\n≪대전통편≫에는 이전(吏典) 212개조, 호전(戶典) 73개조, 예전(禮典) 101개조, 병전(兵典) 265개조, 형전(刑典) 60개조, 공전(工典) 12개조 등 도합 723개\
    \ 조문이 그 전의 법전에 추가되었다.\n\n≪대전통편≫의 편찬으로 ≪경국대전≫ 이후 300년만에 새로운 통일 법전이 이룩되었다. 1865년(고종 2) 9월의 조선시대 최후의 법전인 ≪대전회통≫은 ≪대전통편≫을\
    \ 약간 증보한 것에 지나지 않았다.\n\n참고 문헌 \n『정조실록』\n『순조실록』\n\n같이 보기 \n 경국대전\n 속대전\n 대전회통\n\n조선의 법전\n1785년 책"
  - "아베 나츠미(, 1981년 8월 10일 ~ )는 일본 홋카이도 무로란시 출신의 가수이자 배우로, 모닝구무스메의 옛 멤버이면서 첫 메인 싱어였다. 업프런트 크리에이트(업프런트 그룹)에 소속하고 있으며, 다른 소속사에서\
    \ 가수로 활동중인 아베 아사미와는 친자매로 그녀의 언니이다.\n\n소개 \n아베 나츠미는 1981년 8월 10일에 태어났다. 그 당시 나쓰미의 친어머니가 감상한 텔레비전 드라마인 “조금 제멋대로”의 등장인물중\
    \ 주인공인 아자이 나쓰미의 이름을 원본으로 하여 이름이 지어졌다. 가수의 길을 걷고자 결심하게 된 계기는 중학교 시절에 이지메를 겪고 침울해져 있을 때 들은 라디오를 통해 흘러나온 쥬디 앤 마리의 어릴적부터()를\
    \ 들은 것이다. 그 후, 재학 중이던 홋카이도 노보리벳쓰 고등학교를 자퇴하고 1997년 오디션에 참가하지만 우승하지 못했다. 대신 함께 최종예선까지 오른 나카자와 유코, 이이다 카오리, 후쿠다 아스카와 함께 모닝구무스메를\
    \ 결성하였고 이듬해 1998년 1월 28일에 성공적으로 메이저 데뷰를 마쳤다. 같은 해 제40회 일본 레코드대상을 수상하고 NHK 홍백가합전에 출현하였다.\n\n2000년 영화 핀치 런너에서 처음으로 배우로서\
    \ 다른 멤버들과 함께 주연을 맡았고, 처음으로 크라시에 홀딩스의 샴푸 SALA의 광고에도 출연하였다. 이듬해 2001년에는 텔레비전 드라마 무카이 아라다의 동물일기 ~애견 로시난테의 재난~에서 엔도 하루나를 연기하여\
    \ 드라마 배우로도 데뷰하였다.\n\n2003년 모닝구무스메를 반으로 나눈 2개의 하위 그룹 중 모닝구무스메 사쿠라구미의 초대 리더를 맡았다. 7월 27일에 있었던 헬로! 프로젝트의 겨울 공연 중 층쿠에 의해 모닝구무스메에서의\
    \ 졸업(=탈퇴)를 발표하고 8월 13일 싱글 음반 “22歳の私”를 출시하고 솔로로 데뷰를 마쳤다. 이듬해 2004년 1월 25일, 겨울 투어를 끝으로 정식으로 무닝구무스메를 졸업함과 동시에 모닝구무스메 사쿠라구미\
    \ 또한 탈퇴하였다. 2월에 처음으로 뮤지컬 “오카에리”와 4월에 방영된 텔레비전 드라마 “강아지의 왈츠”에서도 주연 배우로서 연기하였다. 헬로! 프로젝트의 2번째 연말 특별 그룹으로서 결성된 노치우라 나츠미에\
    \ 고토 마키, 마츠우라 아야와 함께 발탁되어 활동하였다.\n\n2005년 3번째 연말 특별 그룹인 데프.디바의 멤버로 고토 마키, 이시카와 리카, 마츠우라 아야와 함께 밭탁된다. Gyao의 인터넷 배급 드라마\
    \ “소중한 것”에서 무라다 센을 연기하였고, 센의 이름으로 주제가인 다카라노모를 불렀다.\n\n2006년, 후지테레비의 특별 드라마인 더 히트 퍼레이드 ~예능계를 바꾼 사내 · 와타나베 신 이야기~에서 1958년부터\
    \ 1975년까지 활동한 더 피넛츠의 이토 에미를, 여동생인 아베 아사미는 이토 유미를 연기하였는데, 이것은 처음으로 자매가 함께 연기한 드라마이다. 그리고 두 번째로 만화를 원작으로 한 뮤지컬 리본의 기사에서\
    \ 프란츠 왕자의 역할을 맡아 연기하였다.\n\n2007년 모닝구무스메 탄생 10년 기념대의 멤버로 이이다 카오리, 고토 마키, 니이가키 리사, 쿠스미 코하루와 함께 발탁되었다. 같은 해 10월 7일, 쇼핑하기\
    \ 위해 나서던 중 지나가던 모터바이크를 보지 못하고 치는 교통사고를 일으켰다. 피해자가 허리와 우측 무릎에 가벼운 상처만을 입었고, 도쿄 지방 경찰청으로부터 자동차 운전 과실상해 및 도로교통법 위반으로 서류송검\
    \ 처리되었다.\n\n인물 / 에피소드 \n자타공인 \"궁극의 동안\"의 소유자. 한국의 인기 배우 최진실과 외모가 비슷한 것으로 유명하다. \"나츠미\"란 이름의 유래는, \"조금 내 맘대로\"라는 드라마에 아베의\
    \ 어머니가 감동, 모모이 카오리가 연기한 주인공 아자이 나츠미란 이름을 따 자신의 딸에게 붙인 것이다. 참고삼아 이 드라마는 1979년 10월 13일부터 1980년 3월 29일까지 매주 토요일 밤 9시부터 니혼테레비\
    \ 계열에서 방송된 것으로, 아베가 주연한 \"강아지의 왈츠\"와 같은 토요 그랜드 극장축에 해당한다.\n\n취미를 \"웃는 것\"이라고 쓰는 등, 웃는 얼굴이 인상적인 여성이다. 잠자는 모습이 흉해, 헬로! 프로젝트\
    \ 멤버들로부터 자주 지적당한다. 이 점은 본인도 인정하고 있다. 사투리를 아직도 고치지 못해, 방송중에도 텐션이 높아지면 \"~했드래요\" 등의 발언을 해버리는 경우가 있다. 아베와 오랫동안 알고 지낸 나카자와\
    \ 유코에 의하면, 아베가 방언을 쓰는 때는 \"일을 잊어버리고 있는 순간\"이라고 한다. 요리가 특기로, 헬로! 프로젝트 멤버들로부터 곧잘 \"엄마가 되어 주면 좋겠다\"란 소리를 듣는다. 아이들을 좋아하며,\
    \ 고단샤의 유아 잡지 \"친구들\"이나 \"틴틴 TOWN!\"에서 노래 언니를 담당했을 정도이다.\n\n모닝구무스메。재적시에는 후배와 놀거나 할 경우, 후배보다도 더 푹 빠져 뛰놀곤 하는 일이 많았다고 \"하로!\
    \ 모닝구。\"에서 후배들에게 폭로당했다. 반 년에 한 번 있는 \"CDTV・연인으로 삼고 싶은 아티스트 랭킹\"에서 전인미답의 V7을 달성했다. 현재도 베스트 10의 단골이다.\n\ntvk(TV 카나가와)의 인기\
    \ 방송 \"사쿠사쿠\"의 캐릭터 \"시라이 빈센트\"를 좋아한다. 같은 방송국의 토크쇼 \"심해어\"에서 \"사쿠사쿠\"팬을 의미하는 \"사쿠사커\"임을 공언하고 있다(2006년 9월 29일 방송에서). 이것이\
    \ 훗날 \"사쿠사쿠\"에서도 화제가 되어, 나카무라 유우를 필두로 하는 출연자(특히 흑막)가 몹시 기뻐했다 한다.\n\n헬로! 프로젝트 내의 교우관계 \n헬로! 프로젝트 내에서는 야구치 마리와 사이가 좋다. \"\
    웃음을 터트리는 포인트가 같다\"는 이유에서라고 한다. 그 외, 아베와는 같은 모닝구무스메。 오리지널 멤버인 나카자와 유코, 이이다 카오리 및 야구치와 같은 2기 멤버의 야스다 케이와는 모닝구무스메。에서 고락을\
    \ 함께한 \"무엇과도 바꿀 수 없는 멤버\"로 현재도 친교가 두텁다. 나카자와는 2008년 8월 10일에 개최된 아베의 생일기념 콘서트에도 축하하기 위해 참가했다.\n\n쯔지 노조미, 카고 아이에게는 동생처럼\
    \ 대하는 경우가 많다. 이 두 사람의 이야기를 하는 것만으로도 \"이유없이 덥썩! 껴안고 싶어진다.\", \"헬로!에는 어린 애들이라던가도 많지만, 쯔지, 카고만은 특별\"이라고 본인도 언급하고 있다. 분카 방송\
    \ \"에어모니。\"에서는, 쯔지 본인이 에어모니。에 출현하지 않았음에도 불구하고 쯔지의 이야기를 곧잘 하곤 했다. 쯔지는 아베를 \"나찌미\"라고 부르며 잘 따른다. 쯔지 이외에도, 니이가키 리사, 카메이 에리,\
    \ 후쿠다 카논 등, 그녀의 영향을 크게 받은 \"여동생 격\"이 많다.\n\nYUKI \n본인 말로는, 가수를 지망하게 된 계기는 \"중학생 시절 왕따를 당해 낙심하고 있던 때, 라디오에서 쥬디 앤 마리의 곡\
    \ '어린 시절부터'를 들은 것\"이라 한다. 현재도 가수 지망의 계기가 된 YUKI (쥬디 앤 마리의 전 보컬)를 존경하고 있다. 본인은 그녀를 쨩을 붙여 부르고 있다.\n\n약력 \n1981년\n 8월 10일\
    \ - 모닝구무스메。의 동기 멤버 이이다 카오리와 이틀 차이(이이다 쪽이 빠름)로 홋카이도 무로란시의 같은 산부인과에서 태어났다. 같은 신생아실에 있었다고 한다.\n1997년\n 테레비도쿄의 오디션 방송 \"ASAYAN\"\
