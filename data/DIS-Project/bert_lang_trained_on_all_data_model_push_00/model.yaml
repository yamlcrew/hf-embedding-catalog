      \ 2016 Lcl Guillaume Dujon \n 2019 Lcl Jérôme Clée\n\nHistorique des garnisons, campagnes et batailles\n\n1841 à 1852\
      \ \nLe  Régiment étranger ( RE) est créé en Algérie le  à partir des trois premiers bataillons de la Légion.\n\nAu ,\
      \ le  RE, sous le commandement du colonel Émile Mellinet, est en garnison à Oran en Algérie.\n\nSecond Empire \nLe ,\
