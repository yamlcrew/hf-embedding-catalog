    sentences:
    - "In informatica, la clip art (lett.: ritaglio di illustrazione) è un'immagine pre-generata. Il nome si riferisce a delle\
      \ immagini utilizzate per illustrare qualsiasi argomento. Oggi, la clip art è ampiamente utilizzata in progetti sia\
      \ personali che commerciali, che vanno dai biglietti di auguri fatti in casa a relazioni e presentazioni di progetti.\
      \ Generalmente si tratta di immagini fatte a mano o con programmi di grafica e non include la fotografia. Gran parte\
      \ si tratta di grafica vettoriale, per esempio file tipo svg, perché facilmente deformabili nelle dimensioni volute\
      \ dall'utilizzatore e meno pesanti. Sono reperibili intere raccolte di Clip art, sia libere che commerciali.\n\nStoria\n\
      \nAnni '70 \nPrima dei personal computer, le clip art erano ampiamente utilizzate nell'industria editoriale e create\
      \ a mano da disegnatori. Erano strettamente associate al processo di incollaggio meccanico per il layout delle pagine.\
      \ Ciò era un processo lungo e faticoso e ha comportato una grande attenzione ai dettagli. La crenatura del documento\
      \ (lo spazio tra le lettere) e l'interlinea (lo spazio tra le righe) erano misurate con un righello.\n\nUna pagina completata\
      \ e pronta è stata definita \"meccanica\". La grafica aggiunta alle pagine doveva essere \"ritagliata\". Quindi il progetto\
      \ era attaccato alla pagina meccanica con cemento di gomma o altro adesivo semipermanente. Infine, la pagina meccanica\
      \ veniva fotografata per creare un negativo per ogni lastra di stampa.\n\nAnni '80 \nProdotto da VCN, ExecuVision è\
      \ stato tra i primi software di presentazione disponibili in commercio. Il software è stato progettato per il PC IBM\
      \ e fornito con la prima libreria di clip art disegnate professionalmente.\n\nClip art aggiuntive possono essere caricate\
      \ nel software da floppy disk separati. All'epoca ogni disco aggiuntivo costava circa 90 dollari.\n\nMacPaint (il primo\
      \ programma di disegno basato su interfaccia grafica disponibile su Macintosh) è stato importante nella storia delle\
      \ clip art perché ha fornito un modo semplice per crearle.\n\nLe clipart diventarono modelli preimpostati che gli artisti\
      \ potevano prendere e manipolare per creare nuove opere d'arte.\n\nMacPaint richiedeva un Apple Macintosh, che era proibitivo\
      \ per la maggior parte dei consumatori. Tuttavia, il computer ha avuto successo nei mercati del desktop publishing e\
      \ dell'istruzione.\n\nChiunque con MacPaint poteva produrre per la prima volta, vendere e utilizzare clip art in formati\
      \ bitmap. Ciò portò a un intero settore commerciale basato sulla creazione e vendita di clip art digitali. Ciò include\
      \ i primi pionieri degni di nota come T/Maker Company e Compuset.\n\nNel 1985, quando Aldus ha rilasciato Page Maker\
      \ 5 per il desktop publishing, le clip art si sono diffuse molto. Aldus ha permesso all'utente domestico di produrre\
      \ pubblicazioni di qualità professionale, che hanno reso le clip art molto popolari e molto richieste. Le persone hanno\
      \ iniziato a produrre in casa e anche senza particolari competenze artistiche materiale come presentazioni aziendali,\
      \ newsletter, inviti e opuscoli. Tale tecnologia ha consentito design semplici e colori di base.\n\nNel 1986 Adobe ha\
      \ introdotto Illustrator per Macintosh. Tale software è degno di nota in quanto ha introdotto l'editing grafico basato\
      \ su vettori.\n\nIn precedenza le clip art erano disponibili in formato bitmap o raster. Le immagini bitmap vengono\
      \ create da una grande griglia di pixel multicolori. Ciò portava a una qualità degradata a dimensioni maggiori, nel\
      \ caso cioè l'immagine venisse ingrandita.\n\nLa grafica vettoriale infatti utilizza i dati geometrici per determinare\
      \ come vengono disegnate le forme. Ciò consente di ridimensionare la grafica in base alle esigenze senza perdita di\
      \ qualità.\n\nAnni '90 \n\nLa maggior parte degli editori si allontanò dall'incollaggio meccanico all'inizio degli anni\
      \ '90. I software di desktop publishing come Adobe Indesign o QuarkXPress hanno reso la progettazione di stampa molto\
      \ meno faticosa e macchinosa. Diminuì il numero necessario di persone per impaginare e si ridusse il tempo per farlo.\n\
      \nNegli anni '90 i CD-ROM iniziarono a sostituire i floppy disk come metodo per installare software sui personal computer.\
      \ I CD potevano contenere centinaia di volte più dati dei floppy disk. Molte clipart infatti iniziarono ad essere distribuite\
      \ su CD.\n\nAnche T/Maker, che ha costruito la sua attività sulla vendita di piccoli pacchetti di clip art di alta qualità,\
      \ è entrata nel mercato delle clip art di volume. Nel 1995 è diventato l'editore esclusivo di oltre 500.000 immagini\
      \ prive di copyright, per creare quella che sarebbe stata, all'epoca, una delle più grandi librerie di clip art del\
      \ mondo.\n\nTuttavia, l'aumento dello stoccaggio ha avuto alcuni effetti interessanti sul settore. Ai tempi dei floppy\
      \ disk, le aziende si concentravano sulla produzione di alcuni set di alta qualità con un certo aspetto stilizzato.\n\
      \nCiò è cambiato con l'introduzione dei CD. Durante questo periodo le aziende iniziarono a commercializzare clipart\
      \ dando più importanza alla quantità di illustrazioni rispetto alla loro qualità. Avere una libreria di immagini per\
      \ ogni occasione, anche se non professionali, diventò una proposta commerciale più preziosa rispetto ad avere poche\
      \ clipart ben realizzate.\n\nA metà degli anni '90 Microsoft iniziò a raggruppare clip art con diversi prodotti, in\
      \ particolare la versione 1996 di Microsoft Word 6.0. Questa versione di Word è stata fornita in bundle (una directory\
      \ che raggruppa un eseguibile e le relative risorse in una struttura standardizzata) con 82 diversi elementi grafici\
      \ di clip art, gratuiti per chiunque avesse acquistato Word.\n\nMicrosoft amplierà la libreria a più di 140.000 clipart\
      \ negli anni successivi al rilascio di Word 6.0.\n\nAnni 2000 \nLa crescita di Internet ha ulteriormente diversificato\
      \ il modello di distribuzione delle clip art. Invece di acquistare CD pieni di immagini, iniziarono ad apparire online\
      \ grandi librerie di clipart scaricabili. In particolare apparvero iclipart.com e graphicsfactory.com, che sono state\
      \ tra le prime librerie online.\n\nLe librerie Internet fornivano altre due opzioni di licenza. Si poteva acquistare\
      \ una singola licenza o pagare un abbonamento, che dava agli utenti accesso illimitato all'intera libreria di immagini.\n\
      \nNon passò però molto tempo prima che le librerie di clip art completamente gratuite iniziassero ad apparire.\n\nAnni\
      \ 2010 \nIl 1º dicembre 2014 Microsoft ha pubblicato un breve post sul blog in cui annunciava la chiusura della libreria\
      \ di clip art di Office.com:La libreria di clip art e immagini di Office.com ha chiuso. I clienti possono comunque aggiungere\
      \ immagini ai propri documenti, presentazioni e altri file che hanno salvato sui propri dispositivi (telefoni, tablet\
      \ e PC), OneDrive e SharePoint. I clienti hanno anche la possibilità di aggiungere immagini ai propri documenti utilizzando\
      \ Bing Image Search.\n\nBing Image Search utilizza un filtro del copyright basato sul sistema di licenza Creative Commons.\
      \ I risultati restituiti sono immagini contrassegnate con licenze Creative Commons. Viene fornito un collegamento alla\
      \ fonte dell'immagine, che dovresti utilizzare per esaminare la fonte dell'immagine e la licenza applicabile per determinare\
      \ se il tuo utilizzo sarà conforme alla licenza. (Le impostazioni possono essere modificate per mostrare tutti i risultati\
      \ Web per visualizzare più immagini.) Tuttavia, sei responsabile del rispetto dei diritti degli altri, incluso il copyright.\n\
      \n—Doug Thomas\n\nGalleria d'immagini\n\nNote\n\nBibliografia \n Amanda Zantal-Wiener, Clip Art Through the Years: A\
      \ Nostalgic Look Back, Hubspot Blog, 2017\n Megan Garber, A Eulogy to Clip Art, in Clip Art, The Atlantic, 2014\n Melissa\
      \ Jensen-Stewart, Adobe Systems Inc., 2012\n David Brock, Slide Logic: The Emergence of Presentation Software and the\
      \ Prehistory of PowerPoint, Computer History Museum, 2016\n\nAltri progetti\n\nCollegamenti esterni \n \n \n\nTerminologia\
      \ informatica"
    - "La caseina è una famiglia di fosfoproteine che si trova principalmente nel latte fresco e ne costituisce la prima fonte\
      \ di proteine per abbondanza: circa i tre quarti di tutte le proteine del latte appartengono a questa famiglia.\n\n\
      Struttura \nLe caseine sono proteine coniugate, cioè proteine legate ad altre molecole, in questo caso a fosforo sotto\
      \ forma di acido fosforico esterificato. Questi gruppi fosforici sono importanti sia per la struttura della proteina,\
      \ sia per la sua proposta funzione. Infatti questo gruppo, caricato negativamente, è in grado di legare ioni calcio\
      \ e magnesio, da cui la supposta funzione di questa proteina, cioè quella di carrier, di trasportatore di calcio minerale.\
      \ Sono anche quasi tutte piuttosto idrofobiche.\n\nLa conformazione delle caseine è simile a quella delle proteine denaturate\
      \ a causa della presenza di un alto numero di residui dell'amminoacido prolina che impedisce alla proteina di ripiegarsi\
      \ per formare strutture più ordinate; inoltre le caseine non possiedono ponti disolfuro (vedi cisteina) in grado anch'essi\
      \ di conferire alla proteina una struttura più ordinata.\n\nAd eccezione della K-caseina le caseine sono proteine idrofobiche,\
      \ per cui in una soluzione acquosa, come per esempio il latte, tendono ad unirsi formando micelle dove vengono intrappolate\
      \ diverse sostanze, tra cui appunto il calcio minerale, diversi enzimi ed altro ancora. Non è ancora ben chiaro come\
      \ queste micelle siano strutturate, ma forse sono costituite all'interno dalle varie caseine idrofobiche circondate\
      \ da uno strato di κ-caseina (idrofila). Al loro interno le micelle si suppone vengano tenute assieme da diversi meccanismi\
      \ tra cui ponti di calcio, interazioni idrofobiche e legami idrogeno.\n\nProprietà\nLa mancanza di una struttura terziaria\
      \ della proteina è la responsabile per la sua stabilità termica: non può essere denaturata al di sotto del punto d'ebollizione\
      \ poiché non c'è una struttura da denaturare. Sempre a causa di ciò molti dei residui idrofobici sono esposti all'esterno\
      \ della proteina e quindi in grado di associarsi ad altri residui di altre caseine, costituendo dei complessi colloidali\
      \ piuttosto grandi ed insolubili in acqua. Questi complessi possono però precipitare in ambiente acido (il loro punto\
      \ isoelettrico è a pH 4,6) e in seguito all'addizione di caglio.\n\nClassificazione \nCi sono 4 gruppi principali di\
      \ caseine che possono essere distinte in base alla distribuzione delle cariche e alla sensitività di precipitazione\
      \ in seguito all'addizione di calcio:\n α(s1)-caseina: costituita da due zone altamente idrofobiche separate da una\
      \ regione polare (idrofila) contenente 7 degli 8 gruppi fosfati; può precipitare anche con bassi livelli di calcio\n\
      \ α(s2)-caseina: tutti gli amminoacidi sono concentrati alle estremità della proteina, in grado di precipitare anch'essa\
      \ con basse quantità di calcio\n β-caseina: possiede l'estremità amino-terminale fortemente polare, mentre il resto\
      \ è apolare (idrofobico): in questo senso assomiglia ad un detergente. Richiede livelli medi di calcio per precipitare\n\
      \ κ-caseina: l'unica delle caseine ad essere idrofila (e per questo richiede un'elevata quantità di calcio per precipitare).\
      \ Stabilizza le altre caseine; una sua idrolisi rimuove questa abilità e porta alla coagulazione (precipitazione) della\
      \ caseina.\n  gamma caseina: prodotta dalla proteolisi post-secretoria a carico della beta-caseina ad opera della plasmina,\
      \ una proteasi del latte.\n\nCoagulazione \nPer coagulazione si intende la precipitazione delle caseine, la separazione\
      \ del siero e la formazione della cagliata, la base per produrre qualunque tipo di formaggio. Questo può avvenire grazie\
      \ all'acidità, alla temperatura, ai sali minerali presenti nel latte e all'aggiunta di caglio. Ci sono 2 modi per far\
      \ avvenire la coagulazione: via acidificazione e via aggiunta di caglio.\n Acidificazione: a pH normale del latte (6,5-6,7)\
      \ i gruppi fosfato sono tutti deprotonati, cioè possiedono una carica negativa che impedisce che i vari ammassi si uniscano\
      \ tra loro diventando ancora più grandi. Abbassando il pH alcuni dei gruppi fosfato vengono protonati finché a un pH\
      \ di 4,6 si raggiunge il punto isoelettrico della caseina. A questo pH la carica netta diventa zero ed i vari ammassi\
      \ tendono a raggrupparsi tra loro formando dei legami ionici. Allo stesso modo i minerali intrappolati all'interno di\
      \ questi ammassi, che ne garantivano una certa stabilità, in seguito all'acidificazione diventano solubili. Come conseguenza\
      \ si ha la precipitazione di tali ammassi.\n Coagulazione enzimatica: è un processo a tre stadi che inizia con l'aggiunta\
      \ di caglio al latte. Il caglio, isolato dallo stomaco di ruminanti, contiene vari enzimi, tra cui la chimosina, in\
      \ grado di idrolizzare (spezzare in due) la κ-caseina, la responsabile della stabilità degli ammassi di caseina. A causa\
      \ di ciò e di una diminuzione di pH, nel secondo stadio della coagulazione le micelle si aggregano. Questo processo\
      \ è favorito dagli ioni calcio presenti che fanno da ponti tra questi ammassi legandoli tra loro. Questa aggregazione\
      \ viene anche favorita dai legami idrofobici che si vengono a instaurare tra le micelle. La temperatura è un parametro\
      \ importante durante tutto il processo. Aumentandola a circa  le reazioni avvengono più velocemente. Nel terzo stadio\
      \ si ha un riarrangiamento di questi ammassi ed inizia la cagliatura. A differenza della coagulazione per acidificazione,\
      \ in questo caso il coagulo conserva tutti i sali di calcio.\n\nAggregazione della caseina avviene anche portando la\
      \ temperatura oltre il livello di ebollizione del latte a causa della modifica delle proprietà del latte (tra cui la\
      \ formazione di acidi e il rilascio di anidride carbonica).\n\nSupplemento proteico\nLa caseina viene largamente utilizzata\
      \ in ambito di integrazione proteica per consentire un aumento della massa muscolare da parte degli atleti. Come le\
      \ proteine del siero di latte (whey), la caseina è ottenuta dal latte vaccino. A differenza delle whey, i cui amminoacidi\
      \ nel flusso sanguigno vengono immessi molto rapidamente, la caseina causa l'effetto opposto. Fondamentalmente la caseina\
      \ è per definizione la proteina ad assorbimento lento sul mercato. Una proprietà interessante legata alle sue capacità\
      \ di formare un gel o coagulo nello stomaco, che lo rende molto efficiente in termini di apporto di sostanze nutritive.\
      \ Il coagulo è in grado di fornire un rilascio lento e sostenuto di amminoacidi nel flusso sanguigno, che può durare\
      \ per diverse ore. Questa caratteristica è ritenuta molto importante per mantenere uno stato anabolico e anti-catabolico\
      \ sul tessuto muscolare per tempi relativamente lunghi, laddove le proteine del siero favoriscono una maggiore sintesi\
      \ proteica, ma non sono in grado di limitare il catabolismo proteico. In questo modo favorisce una maggiore ritenzione\
      \ di azoto e di utilizzo da parte del corpo. Grazie alle sue proprietà di lento assorbimento, la caseina è ampiamente\
      \ utilizzata tra i pasti e prima di coricarsi da parte dei bodybuilder per mantenere lo stato anabolico sul tessuto\
      \ muscolare. Recenti evidenze scientifiche infatti riconoscono l'utilità del pasto proteico a base di caseina poco prima\
      \ di coricarsi per stimolare la sintesi proteica muscolare e migliorare il bilancio proteico durante il periodo di recupero\
      \ notturno post-allenamento. Altri studi recenti riconoscono che un pasto assunto poco prima di coricarsi, soprattutto\
      \ se a base di proteine, provoca effetti favorevoli sul metabolismo e sul dispendio energetico a riposo la mattina successiva.\
      \ Come le whey e altre fonti proteiche animali, la caseina contiene tutti gli amminoacidi essenziali nella giusta proporzione\
      \ risultando in un ottimo profilo amminoacidico, favorevole e adatto alla crescita muscolare. È stato riscontrato che\
      \ il rilascio di amminoacidi da parte della caseina possa durare fino a sette ore.\n\nBenefici per la crescita muscolare\n\
      Di seguito elencate alcune proprietà generali delle proteine alimentari:\n\n forniscono i substrati necessari per la\
      \ sintesi proteica;\n favoriscono il recupero muscolare a seguito dell'attività fisica;\n fungono da substrato per la\
      \ gluconeogenesi (produzione di energia a partire da precursori non glucidici, come gli amminoacidi; un processo importante\
      \ nel digiuno prolungato e nell'attività fisica di durata);\n stimolano la sintesi proteica e favoriscono la crescita\
      \ muscolare;\n favoriscono il manifestarsi di un profilo ormonale adatto alla crescita muscolare e dimagrimento (GH/IGF-1,\
      \ testosterone, insulina, glucagone, catecolammine, tiroidei);\n\nLe caseine in aggiunta presentano alcune caratteristiche\
      \ peculiari:\n presentano un elevato valore biologico (VB);\n determinano un lento rilascio amminoacidico che può superare\
      \ le 7 ore;\n hanno dunque un bassissimo indice insulinico (II);\n non esibiscono particolari proprietà sullo stimolo\
      \ dell'insulina, al contrario delle whey;\n diversamente dalle whey, inducono un forte stimolo della secrezione endogena\
      \ del IGF-1, ormone dalle note proprietà anaboliche sul tessuto muscolare;\n contengono quantità maggiori di glutammina,\
      \ arginina e fenilalanina rispetto alle whey;\n includono anche una lunga lista di enzimi, ormoni proteici e fattori\
      \ di crescita;\n sono le più adatte a contrastare il catabolismo proteico (proteolisi) al contrario delle whey, o altre\
      \ proteine a rapida assimilazione;\n determinano uno stimolo anabolico generalmente inferiore se comparato alle whey\
      \ protein;\n\nPrincipali tipologie\nLa caseina è estratta dal latte mediante ultrafiltrazione, senza l'utilizzo di sostanze\
      \ chimiche. Questo processo incrementa la quantità di peptidi del latte bioattivi che supportano la funzione immunitaria\
      \ e favoriscono la crescita muscolare. Esistono essenzialmente quattro tipologie di caseina:\n\n Caseina micellare (MC):\
      \ è la caseina nativa nella sua forma naturale.\n Caseinato di calcio (CC): ottenuta dall'aggiunta di calcio alla caseina,\
      \ è la più solubile ed economica.\n Caseina idrolizzata (HC): caseina sottoposta al processo di idrolisi, che rende\
      \ la proteina a rapida assimilazione.\n Isolato delle proteine del latte: un composto che rispetta la proporzione proteica\
      \ presente nel latte vaccino, con l'80% di caseina e il 20% di siero del latte.\n\nCaseina micellare (MC)\nLa caseina\
      \ micellare (MC, Micellar casein) è la forma naturale nativa della caseina. Viene prodotta separando le proteine della\
      \ caseina contenute nel latte da lattosio, lipidi e proteine del siero mediante processi di filtraggio, ovvero ultrafiltrazione\
      \ e microfiltrazione. Il procedimento di ultrafiltrazione si avvale delle pressione per separare le proteine dagli altri\
      \ componenti del latte attraverso una membrana porosa. La microfiltrazione è un procedimento di filtraggio a basse temperature\
      \ mediante filtri in ceramica; elimina grassi che l'ultrafiltrazione non riesce a separare e non denatura le proteine\
      \ della caseina. Dopo questo processo di reidratazione consente di riformare le micelle. Il prodotto risulta meno solubile\
      \ nei liquidi ed è il tipo di proteine della caseina a digestione più lenta. La caseina micellare mantiene intatto l'intero\
      \ spettro delle funzioni biologiche delle proteine del latte grazie ai trattamenti di filtrazione, al contrario di altri\
      \ tipi di caseina, come il caseinato.\n\nCaseinato di calcio (CC)\nChiamato anche calcio caseinato (CC, Calcium caseinate),\
      \ o semplicemente caseinato, e spesso confuso con la caseina micellare, viene ottenuto aggiungendo calcio alle proteine\
      \ della caseina. Contiene mediamente oltre il 90% di proteine ed è la forma di caseina maggiormente solubile. Si scioglie\
      \ molto più facilmente nei liquidi, senza formare grumi. La maggior solubilità implica minore aggregazione nello stomaco\
      \ e digestione più rapida rispetto alla caseina micellare, e si rivela meno biodisponibile di quest'ultima. Ha un più\
      \ alto contenuto di arginina e triptofano.\n\nIl caseinato, che è ottenuto modificando il pH della caseina acida verso\
      \ un livello più neutrale usando una sostanza alcalina. Quando si utilizza un acido o il calore per separare la caseina\
      \ dal latte, la struttura della micella viene modificata rendendola meno attiva a livello biologico e meno digeribile.\
      \ Il caseinato viene prodotto in genere facendo prima precipitare la caseina tramite l'utilizzo di un acido o del calore.\
      \ La caseina, che non è solubile in acqua, viene resa maggiormente solubile attraverso una reazione con una base inorganica\
      \ forte come l'idrossido di calcio. Il caseinato possiede certamente un contenuto di amminoacidi simile a quello della\
      \ caseina, ma le sue micelle sono danneggiate; non solo vengono alterate la digeribilità e la produzione di frazioni\
      \ digestive biologicamente attive, ma il composto viene anche privato dei minerali chelati in esso contenuti naturalmente.\n\
      \nAlcune forme di caseinato sono dotate di maggiore viscosità rallentando la digestione, ma il loro contenuto peptidico\
      \ biologicamente attivo potrebbe essere comunque compromesso.\n\nCaseina idrolizzata (HC)\nLa caseina idrolizzata (HC,\
      \ Hydrolized Casein) è derivata dall'idrolisi, un processo artificiale di digestione enzimatica che prevede la scissione\
      \ dei legami delle proteine rendendole molecole di dimensioni più piccole, dette peptidi (in particolare oligopeptidi),\
      \ che vengono digerite ed assorbite più velocemente. Questo processo rende la caseina simile alla proteina del siero\
      \ idrolizzata (WPH), differendo da quest'ultima essenzialmente nel profilo amminoacidico. La forma idrolizzata di caseina\
      \ prende il nome commerciale di PeptoPro, un marchio registrato che ne detiene il brevetto.\n\nAnche l'ingestione dell'idrolizzato\
      \ di caseina, così come l'idrolizzato del siero, si traduce in una digestione e assimilazione intestinale molto più\
      \ rapida, aumentando la disponibilità di amminoacidi e la sintesi proteica.. Tuttavia alcuni studi hanno rilevato che\
      \ l'assimilazione più rapida della caseina idrolizzata non risulti necessariamente superiore per l'anabolismo muscolare.\
      \ Da questa ricerca è risultato che la caseina idrolizzata viene digerita meno, viene ossidata per produrre energia\
      \ in misura maggiore, e viene utilizzata dall'intestino in misura maggiore rispetto alla caseina intatta. Il risultato\
      \ finale, secondo questi studi, è che la caseina idrolizzata fornisce meno amminoacidi al muscolo scheletrico dopo l'ingestione\
      \ rispetto alla caseina intatta.\n\nProteine del latte\nLe proteine del latte, talvolta nominate isolato delle proteine\
      \ del latte, proteine totali del latte, o proteine complete del latte, sono composte per l'80% da caseina e per il 20%\
      \ da proteine del siero. Il vantaggio delle proteine del latte è quello di unire le proprietà della caseina a quelle\
      \ della proteina del siero. Grazie a questa peculiarità, si ottiene da una parte il veloce afflusso di amminoacidi nel\
      \ sangue con un marcato effetto anabolico e insulinotropico, dall'altra avviene un rilascio lento e sostenuto di amminoacidi\
      \ derivanti dalla caseina, importanti per contrastare il catabolismo proteico e favorire una presenza di amminoacidi\
      \ nel sangue prolungata.\n\nDa quanto emerge dalla ricerca scientifica, molti studi confermano che l'assunzione di whey\
      \ o di caseina nel post-allenamento, determinino simili livelli di sintesi proteica del muscolo scheletrico, nonostante\
      \ le differenze temporali nell'assimilazione e concentrazione di amminoacidi nel sangue.\n\nUn dato interessante che\
      \ mette in risalto le proprietà delle proteine complete del latte proviene ancora dalla ricerca scientifica: Kersick\
      \ et al. (2006) esaminarono gli effetti della supplementazione di proteine del siero sulla composizione corporea, forza\
      \ muscolare, resistenza muscolare e la capacità anaerobica nel corso di 10 settimane di allenamento di resistenza su\
      \ 36 uomini allenati. Questi vennero suddivisi in tre gruppi ai quali vennero somministrati, prima della sessione di\
      \ allenamento, rispettivamente, un placebo a base di carboidrati, whey+caseina, whey+BCAA+glutammina. Il maggior aumento\
      \ della massa magra era stato ottenuto dal gruppo che assumeva whey+caseina.\n\nLacroix et al. (2006), comparando le\
      \ whey, caseina micellare, e proteine del latte complete, conclusero che, nonostante l'indice PDCAAS elevato, le whey\
      \ garantiscono un tasso di disponibilità di amminoacidi troppo rapido per sostenere la richiesta anabolica durante il\
      \ periodo post-prandiale. Le proteine complete del latte presentavano le migliori qualità nutrizionali, il che suggerisce\
      \ l'effetto vantaggioso del connubio tra whey e caseine.\n\nSembra che il connubio di caseine e proteine del siero,\
      \ presente anche nelle proteine totali del latte, favorisca migliori effetti sull'anabolismo e sulla contemporanea inibizione\
      \ del catabolismo proteico, laddove le sole whey non si rivelano utili a inibire il catabolismo, mentre le caseine indurrebbero\
      \ un'inferiore sintesi proteica.\n\nStudi clinici\nA causa delle differenze nei tempi di assimilazione tra le componenti\
      \ delle proteine del latte rappresentate dal siero del latte e dalla caseina, alcuni studi hanno concluso che le proteine\
      \ del siero fossero meglio adatte ad essere assunte nel post-allenamento, quando è richiesto un maggiore e più rapido\
      \ incremento del livelli di amminoacidi nel sangue. Tuttavia, alcune ricerche hanno mostrato che l'assunzione di caseina\
      \ o whey a seguito dell'esercizio favorivano allo stesso modo la sintesi proteica muscolare, nonostante le differenze\
      \ temporali nei livelli di insulina e nelle concentrazioni di aminoacidi.\n\nLacroix et al. (2006), comparando le whey,\
      \ caseina micellare, e proteine del latte complete, concludono che, nonostante l'indice PDCAAS elevato, le whey garantiscono\
      \ un tasso di disponibilità di amminoacidi troppo rapido per sostenere la richiesta anabolica durante il periodo post-prandiale.\
      \ Le proteine complete del latte presentavano le migliori qualità nutrizionali, che suggerisce l'effetto vantaggioso\
      \ del connubio tra whey e caseine.\n\nNello stesso anno Cribb e colleghi compararono i diversi effetti delle whey isolate\
      \ idrolizzate (WPH) con la caseina sullo sviluppo della forza e composizione corporea ottenuti tramite un allenamento\
      \ di resistenza di 10 settimane su 13 bodybuilder amatori. Il gruppo che assumeva proteine isolate idrolizzate del siero\
      \ mostrò un aumento significativo della massa magra, una maggiore diminuzione della massa grassa, e un maggior aumento\
      \ della forza, rispetto al gruppo che assumeva caseina.\n\nNel 2007 Miura conclude che una dieta a base di caseina sui\
      \ ratti porta ad una maggiore concentrazione plasmatica di IGF-1 rispetto ad una dieta a base di proteine della soia\
      \ o priva di proteine.\n\nTang et al. (2009), analizzarono gli effetti sulla sintesi proteica muscolare delle whey idrolizzate,\
      \ proteine della soia, e caseina micellare. La sintesi proteica nella gamba, da non allenata, era più alta dopo l'ingestione\
      \ di proteine veloci (WPH e soia), e più bassa dopo l'assunzione di quelle lente (caseina micellare). La proteosintesi\
      \ indotta dalle WPH era più alta di circa il 93% rispetto alla caseina, e del 18% rispetto alla soia. Dopo l'allenamento,\
      \ la sintesi proteica era maggiore di circa il 122% rispetto alla caseina, e del 31% rispetto alla soia. Conclusero\
      \ che lo stimolo della sintesi proteica indotta dal cibo nei giovani adulti è maggiore a seguito dell'ingestione di\
      \ proteine del siero idrolizzato o della soia rispetto alla caseina, sia in stato di riposo che dopo l'esercizio di\
      \ resistenza; inoltre, nonostante WPH e soia risultino entrambe rapide, le WPH stimolano la sintesi proteica più delle\
      \ proteine della soia dopo un allenamento di resistenza.\n\nHoppe et al. (2009) vollero capire quale componente del\
      \ latte stimolasse la crescita. Vennero esaminati gli effetti delle due principali componenti proteiche (whey e caseine),\
      \ e minerali (calcio e fosforo) del latte su 57 ragazzi di otto anni. Risultò che non vi erano interazioni tra le componenti\
      \ proteiche e minerali. Nel gruppo che assumeva caseina, avveniva un incremento del 15% di IGF-1, mentre non avveniva\
      \ nessun cambiamento nella secrezioni insulina. Nel gruppo che assumeva proteine del siero, l'insulina aumentava del\
      \ 21%, senza alcun influsso sul IGF-1. Non avveniva nessun effetto indipendente di un alto introito di minerali del\
      \ latte su insulina e IGF-1. Si concluse che le principali frazioni proteiche del latte (whey e caseine) mostrano importanti,\
      \ ma diversi effetti che promuovono la crescita, aumentando i livelli a digiuno di insulina (per il siero di latte)\
      \ e IGF-1 (per la caseina).\n\nProteine \"veloci e lente\"\nLe caseine sono note per le loro proprietà sul lento assorbimento.\
      \ L'espressione slow proteins venne applicata alle caseine a partire dalla fine degli anni novanta, quando, uno studio\
      \ in particolare (Boirie et al. 1997), volle esaminare le differenze tra la proteina del siero del latte e della caseina.\
      \ La ricerca mostra che a seguito del consumo di caseina, si raggiunge il picco di amminoacidi nel sangue e della sintesi\
      \ proteica tra le 3 e le 4 ore. Il rilascio totale di amminoacidi nel circolo ematico, tuttavia, può durare fino a 7\
      \ ore dopo la sua ingestione.\n\nNel 1997 il francese Yves Boirie e la sua squadra, tramite il famoso studio Slow and\
      \ fast dietary proteins differently modulate postprandial protein accretion, stabilirono per la prima volta il nominativo\
      \ di proteine a \"lenta e rapida assimilazione\", comparando la proteina del siero del latte alla caseina. Questa ricerca\
      \ mostrò che, se comparato alla caseina micellare, il siero causava un incremento più breve ma più elevato di amminoacidi\
      \ nel sangue, e favoriva un incremento della proteosintesi (sintesi proteica) del 68%, rispetto al 31% della caseina.\
      \ Per contro, il catabolismo proteico era ridotto del 34% dopo l'ingestione di caseine, ma non dopo l'ingestione di\
      \ whey. Dopo 7 ore, il livello di ossidazione di leucina era più basso dopo l'ingestione di caseina, nonostante lo stesso\
      \ introito dell'amminoacido. Si concluse che la velocità di digestione delle proteine e l'assorbimento degli aminoacidi\
      \ da parte dell'intestino ha un effetto importante sul complesso anabolismo proteico dopo un pasto. In analogia con\
      \ il metabolismo dei carboidrati, le proteine ad assorbimento lento e veloce modulano la risposta metabolica postprandiale..\
      \ Questo loro effetto sull'insulina poteva essere contemplato da un parametro che all'epoca stava iniziando ad essere\
      \ diffuso tra alcuni ricercatori, ovvero l'indice insulinico, un metodo che, in analogia con l'indice glicemico, misurava\
      \ la velocità di innalzamento dell'insulinemia piuttosto che della glicemia. Le whey mostravano dunque una grande capacità\
      \ di elevare i livelli di insulina, presentando un alto indice insulinico, ben superiore alla caseina.\n\nIn sintesi\
      \ lo studioso Yves Boirie, concludeva che:\n\n le proteine del siero del latte non hanno proprietà anticataboliche;\n\
      \ la caseina ha proprietà di inibizione del catabolismo proteico;\n il siero stimola maggiormente la sintesi proteica\
      \ rispetto alla caseina;\n le whey inducono una maggiore e più rapida concentrazione di aminoacidi nel sangue al contrario\
      \ della caseina (alto indice insulinico);\n la combinazione di whey+caseina può apportare il massimo dei benefici in\
      \ quanto a anabolismo e contemporanea inibizione del catabolismo muscolare;\n\nAllergie \n\nLa caseina rappresenta la\
      \ principale causa di allergia alimentare al latte. Questa forma di allergia è più frequente nei primi anni di vita\
      \ e tende poi a scomparire con l'età anche se può talvolta portare anche a gravi forme di shock anafilattico ed è una\
      \ forma di allergia difficile da controllare, poiché il latte, o la caseina stessa, è presente in moltissimi alimenti.\
      \ Lo zucchero lattosio può anch'esso provocare disturbi, come la intolleranza al lattosio, una intolleranza alimentare\
      \ presente principalmente nell'età adulta.\n\nAltri usi della caseina \nOltre ad essere consumata nel latte e nei prodotti\
      \ derivati, la caseina è utilizzata come ingrediente in alcuni prodotti alimentari, e deve essere segnalata sull'etichetta\
      \ per permettere agli individui allergici al latte di evitarla. Inoltre può essere utilizzata come ausiliario nella\
      \ fabbricazione del vino.La caseina viene inoltre impiegata nella preparazione di adesivi, guaine protettive, tessuti\
      \ e in molti altri prodotti. Viene usata anche come legante nella pittura a tempera e a questo scopo è stata intensivamente\
      \ usata dai pittori del '400. Nella prassi del restauro tradizionale la caseina veniva usata per dipinti murali, legno,\
      \ pietra e cartae trovò largo uso a cavallo tra il Settecento e l'Ottocento nella fase d'incollaggio della pellicola\
      \ pittorica su un nuovo supporto a seguito del trasporto del colore da un supporto degradato a uno nuovo, preferendola\
      \ alla colla a caldo che per molti addetti ai lavori dell'epoca rendeva irreversibile l'operazione e alterare i colori.\
      \ Un altro uso della caseina, condensata con la formaldeide, è quello di formare una sostanza solida, galalite, che\
      \ può essere lavorata e utilizzata nella produzione di bottoni, pettini e perfino le coperture dei tasti bianchi nel\
      \ pianoforte. Dal 1937 la caseina è utilizzata per la produzione di una fibra tessile che nell'Italia autarchica assunse\
      \ il nome di lanital (utilizzato come surrogato della lana da parte della società Snia Viscosa); attualmente la \"fibra\
      \ di latte\" è utilizzata nella la produzione di un filato particolarmente morbido, traspirante, assorbente e adatto\
      \ ai bambini e ai capi di biancheria intima, usato sia per la produzione di capi finiti che nell'aguglieria.\n\nNote\n\
      \nBibliografia\n\nVoci correlate\n\n Siero di latte\n Proteine del siero del latte\n Latte\n Proteine della soia\n Proteine\
      \ dell'uovo\n Proteine\n Peptide\n Dipeptide\n Tripeptidi\n Oligopeptidi\n Polipeptide\n Amminoacido\n Amminoacidi essenziali\n\
      \ Amminoacidi ramificati\n Amminoacidi insulinogenici\n Amminoacidi glucogenetici\n Amminoacidi chetogenici\n Indice\
      \ insulinico\n Carico insulinico\n Integratore alimentare\n Alimentazione\n Nutrizione\n Culturismo\n Fitness (sport)\n\
      \ Integrazione nel culturismo\n Micella caseinica\n\nAltri progetti\n\nCollegamenti esterni \n \n\nProteine\nLatte\n\
      Dietetica\nChimica degli alimenti\nIntegrazioni per il culturismo"
    - "Casados con hijos (Argentina)\n\nInformación general\n\nEn enero de 2005 comenzaron las grabaciones y el 12 de abril\
      \ salió por la pantalla de Telefe con una medición de 28.9 puntos de índice de audiencia en su primer capítulo. Sin\
      \ embargo, la audiencia, no pudo mantenerse, y las mediciones se mantuvieron en un promedio de 18 puntos,​ habiendo\
      \ alcanzado una cifra mínima de 7.7 puntos. Tras haber emigrado por diferentes horarios —23:00, 22:30, 20:00, 21:00—,\
      \ la audiencia de las repeticiones de la primera temporada lograron superar a las emisiones originales,​ convirtiéndolo\
      \ en uno de los programas más vistos de 2005 y 2006.\nEl éxito de los capítulos ya emitidos obligó a la televisora a\
      \ realizar una segunda temporada.​ Titulada Casados con hijos 2, se estrenó el 14 de agosto de 2006, a las 21:30 (UTC-3),\
      \ alcanzando una media de 33.3 puntos de índice de audiencia, siendo uno de los envíos de ficción de mayor audiencia\
      \ del año.​ La serie, en total, cuenta con 212 episodios, 137 capítulos en su primera temporada y 75 capítulos en la\
      \ segunda.\nEl éxito de la serie trascendió las fronteras de Argentina, siendo también emitida por canales locales en\
      \ Uruguay (donde también consiguió ser una de las series más vistas), en Paraguay, Perú​ y Rumania. En este último país,\
      \ transmitida bajo el nombre de Familia Argento.\nLa comedia se ha convertido en un gran clásico de la televisión de\
      \ este país, y Telefe lo repite​ desde 2007 hasta la actualidad, emitiendo episodios al azar con un moderado número\
      \ de audiencia, tanto en la primera tarde, como en el prime time.\n\nFuncionamiento del programa\n\nUn aspecto de la\
      \ serie es que se basa especialmente en la realización de diálogos cómicos, predominando así el diálogo y no la acción,\
      \ por ello posee guiones elaborados y diálogos pensados y bien estructurados. Principalmente los diálogos más trabajados\
      \ y humorísticos son los de Pepe, Coqui y María Elena. Otra característica de la serie es la utilización de risas y\
      \ expresiones de fondo que acompañan los chistes y los comentarios que se hacen, esto acentúa en gran medida la carga\
      \ emocional de las situaciones.\nSe utiliza principalmente el corte como método de transición entre planos, porque es\
      \ la forma más común de hacer una transición en el desarrollo de la escena, aunque cuando se cambia de escena se puede\
      \ notar que se utiliza la superposición rápida de personajes y la transición rápida al otro escenario, esto se hace\
      \ para evitar que la serie se vuelva monótona y la haga algo pesada. En la presentación del programa se utiliza el barrido\
      \ como método práctico y dinámico en una presentación de personajes acompañado de música.\nCuando se aplican los cortes\
      \ es muy frecuente el corte de continuidad, principalmente porque en la serie hay más diálogos que acción, sin embargo,\
      \ hay ciertas ocasiones en que se puede ver que se aplican cortes relacionales, como por ejemplo, cuando un personaje\
      \ se dirige a la puerta que va a la cocina desde la sala principal, corta, y aparece entrando en la cocina.\n\nPersonajes\
      \ principales\n\nEn Casados con hijos tienen lugar las aventuras de los seis personajes principales y el entorno que\
      \ los nuclea dentro del barrio de Bajo Flores, en la capital argentina. Pepe, Moni, Paola, Coqui y el perro Fatiga (interpretado\
      \ por la perra Violeta), forman parte de la familia Argento. Sus vecinos son, en tanto, una pareja de bancarios recién\
      \ casados, llamados Dardo y María Elena Fuseneco.\n\nJosé \"Pepe\" Argento (Guillermo Francella)\n\nEl protagonista,\
      \ un hombre disgustado con la vida que le tocó y cansado de su familia, la cual provoca la mayoría de sus pesares. Pepe\
      \ trabaja como empleado en una zapatería en un centro comercial, con un sueldo exageradamente bajo, conviviendo con\
      \ sus —según él— molestas clientas. Es hincha del cuadro de fútbol Racing Club, siendo el fútbol una pasión para él.\
      \ Cada vez que llega de la zapatería le cuenta a su familia anécdotas que le ocurrieron en el trabajo (tratándose siempre\
      \ de gordas), y ellos detestan tener que escucharlas.\nEn el pasado era la promesa de Racing y estuvo a punto de debutar\
      \ en Primera División, hasta que su novia y futura mujer, interrumpió en el estadio en medio de la cancha para confesarle\
      \ que estaba embarazada (todo eso era una mentira), lo que obligó a Pepe a irse con ella del estadio, y a retirarse\
      \ del fútbol para siempre. Después de eso se casó con Moni, tuvo dos hijos llamados Coqui y Paola, y desde ahí su vida\
      \ se convirtió en un infierno.\nPepe es una persona muy maleducada y muy insensible, no piensa en nadie más que en sí\
      \ mismo. Es muy mezquino y egoísta, no escucha ni le pone atención a nadie, tampoco hace caso a veces. También es vanidoso,\
      \ en algunos episodios presume ser alguien grande (siendo que en realidad no lo es) cuando está haciendo un labor que\
      \ lo emociona mucho. También es muy machista y pesimista, cree que la mujer le arruina la vida al hombre al casarse\
      \ y le destruye la vida y sus sueños para siempre. Esta actitud se debe a que Pepe (como un trauma para él) se casó\
      \ con Moni y esta le arruinó la vida durante 20 años.\nPepe siempre tiene mala suerte, nunca nada le sale bien. En casi\
      \ todos los capítulos siempre tiene como objetivo lograr algo que lo favorezca (como reemplazar al Chevy por un auto\
      \ mejor, ganar dinero, lograr un buen negocio, ganar un juego o un partido, ser famoso, etc), pero siempre fracasa por\
      \ culpa de la intromisión de los personajes (ya sea por accidente o por propia voluntad). No importa de que modo lo\
      \ intente y cuantas veces lo haga, las cosas siempre le salen todo lo contrario a como él las espera.\nLe importa mucho\
      \ lo comercial y hace cualquier cosa para conseguirlo. Siempre les roba objetos ajenos a sus vecinos a Dardo y María\
      \ Elena debido a que no cuenta con el dinero suficiente para comprarse sus propios objetos por su bajo salario (además\
      \ su familia se lo gasta todo muy a diario). También hay veces que hace esto pidiéndolos prestados, para después quedarse\
      \ con ellos y no devolverlos nunca. Su familia también roba al mismo estilo que él.\nPepe busca siempre ser reconocido\
      \ u homenajeado por sus vecinos pero desafortunadamente nunca nadie logra reconocerlo, como por ejemplo con frecuencia\
      \ en varios capítulos la gente confunde su nombre Pepe por \"Pepo\" o \"Pipo\" o el apellido Argento por \"Argenti\"\
      . Generalmente su personaje tiene una idea pesimista de la vida y trata de la misma manera a todos los personajes de\
      \ la serie, principalmente a María Elena y a Moni.\nMuchas veces este personaje utiliza monólogos cómicos o frases de\
      \ la vida o de otros temas en los lapsos que se encuentra solo o cuando se dirige hacia algún objetivo, como abrir la\
      \ puerta, etc. Francella se caracteriza en este personaje por su propia improvisación.\n\nMónica \"Moni\" Potrelli de\
      \ Argento (Florencia Peña)\n\nEs la esposa de Pepe y madre de Coqui y Paola. Moni es la representación de una ama de\
      \ casa algo incompetente, torpe, extravagante e insatisfecha sexualmente por su marido. Siempre va exageradamente maquillada,\
      \ lleva pulseras y collares y viste ropas holgadas de colores brillantes. Posee una enmarañada y prominente cabellera\
      \ rubia (motivo que Pepe suele burlar). Moni tiene entre 38 y 40 años de edad.\nNo se encarga de la limpieza de la casa\
      \ ni de comprar comida y gusta de pasar toda la tarde (y en ocasiones todo el día) mirando telenovelas o programas de\
      \ teleoferta sentada en el sillón (cosa que Pepe y María Elena suelen criticar diariamente), hablando con su madre por\
      \ teléfono y tomando mate (sin mencionar que no trabaja). También es una fanática de Susana Giménez y de su programa,\
      \ que no se pierde nunca.\nMoni es un desastre cocinando, siempre le sale mal todo lo que cocina con un sabor y un olor\
      \ terriblemente feo (dejando a cualquiera que la pruebe con un dolor de estómago, e incluso llegó a dejar a Pepe ciego\
      \ en el capítulo Atrapados sin salida), lo que critican mucho su familia. A veces en un episodio siempre le promete\
      \ a Pepe cocinarle una rica comida, pero al final de este se puede notar que no cocinó absolutamente nada sin siquiera\
      \ intentarlo, siendo esto producto de la vagancia de Moni.\nMoni siempre quiere tener sexo con su marido, algo que Pepe\
      \ siempre se niega a hacer debido al poco interés y el odio que tiene en su esposa. Y si es que ellos tienen sexo no\
      \ duran ni medio minuto (o tres minutos como mínimo) a causa de que Pepe nunca quiere ni tampoco tiene ganas por lo\
      \ mencionado anteriormente, por eso es que Moni siempre esta insatisfecha y a cada rato le pide sexo a su marido (e\
      \ incluso en los momentos más inoportunos).\nEste personaje utiliza varios clichés con frecuencia, como \"¡Ay Pepe!\"\
      , \"¡Cafecitooo...!\" (cuando acaba de meter la pata), o se refiere a sus hijos como \"Chiquitos\" o \"Pedazos de mierrr...\"\
      . Al contrario que Pepe, los diálogos de Moni suelen ser rápidos, atolondrados, ingeniosos y sarcásticos.\nAdemás, el\
      \ personaje demuestra tenerle cierta envidia al matrimonio de sus vecinos Dardo y María Elena, especialmente por la\
      \ satisfacción sexual de la que suelen presumir. Moni se muestra frustrada por la falta de atención que demuestra su\
      \ marido hacia ella.\nTiene un vocabulario grotesco y da un aspecto de torpeza e incompetencia. Sin embargo, esto varía\
      \ de una temporada a la otra, rebajando su habla vulgar en la segunda temporada. El apellido de soltera de Moni es Potrelli,\
      \ es oriunda de Tostado, Santa Fe y cumple años el 12 de mayo (ella lo dice en el capítulo La separación: parte 1).\n\
      \nMaría Elena Caradagián de Fuseneco (Érica Rivas)\n\nMaría Elena, de aproximadamente 30 años, es la reciente esposa\
      \ de Dardo Fuseneco y hace poco se mudó junto con él al lado de la casa de los Argento.\nSu particular obsesión por\
      \ Dardo la lleva a estar constantemente tras él y suele presumir mucho frente a los Argento su buena relación con éste.\n\
      Es presumida, altanera y suele destacar las cosas que tiene o en las que es superior frente a las demás personas. Tiene\
      \ una personalidad muy explosiva e inestable, por lo que suele aparecer de un momento a otro un ataque de histeria,\
      \ se sale de quicio y comienza a gritar deliberadamente, demostrando una tendencia homicida.\nUtiliza frecuentemente\
      \ vestimentas prolijas y de colores muy claros o muy oscuros, a veces aparece utilizando algún complemento extra de\
      \ su vestimenta como un sombrero. Los planos que se utilizan para este personaje son plano corto y plano largo, por\
      \ las mismas razones que los demás personajes.\nMaría Elena es supuestamente amiga de Moni, aunque muchas veces presume\
      \ ante ella su matrimonio y su vida lo que genera muchas veces discusiones entre ellas, Moni suele llamarla Yegua.\n\
      María Elena odia a Pepe con toda su alma, suele mantener constantemente peleas con él por sus diferencias. Pepe demuestra\
      \ constantemente un desprecio muy grande hacia ella, quien suele responder casi siempre con diálogos finos y rebuscados\
      \ insultándolos, hasta que suele darse un estallido de histeria de este personaje. Esto suele suceder muchas veces en\
      \ la serie porque constituye una clave cómica, y lo hace casi siempre exasperada por las constantes burlas o comentarios\
      \ de Pepe en contra de ella (como \"cara de galleta de campo\", \"cara de cartel de no estacionar\" \"carita de tapa\
      \ de inodoro\", \"cara de tapa de empanada\", \"cara de escarapela\", entre muchos otros) o su matrimonio.\nSus acciones\
      \ y pensamientos tienden a ser feministas, y en muchos casos tiende a degradar al hombre, al contrario de lo que hace\
      \ Pepe, que ve a la mujer como inferior al hombre.\nAlgo que cabe destacar de María Elena es que presenta un desorden\
      \ mental bastante importante, la clara prueba de esto es que a partir del séptimo capítulo de la segunda temporada,\
      \ esta tenía una supuesta hija a la cual ella llamaba «La Nena» (esto puede ser interpretado como una forma de desahogo\
      \ ante una posible infertilidad por parte de ella, ya que a pesar de tener una vida sexualmente activa con Dardo, nunca\
      \ tuvieron hijos). Además de ser un tanto alcohólica.\nSupuestamente su sueño más grande es irse a vivir a cualquier\
      \ lugar con tal de estar lejos de los Argento, porque según menciona en un capítulo ella vive al lado del infierno y\
      \ sólo los separa una medianera.\n\nDardo Américo Fuseneco (Marcelo de Bellis)\n\nVecino de la familia Argento. Tiene\
      \ más de 40 años (esto se confirma en un sueño de Pepe en la primera temporada), y junto con su esposa se mudaron a\
      \ la casa vecina hacia poco tiempo. Este personaje pronto estableció una relación amistosa con Pepe y siempre actúa\
      \ como fiel amigo de éste, tanto que hasta a veces, ignora a su esposa por prestarle atención o ayudar a su amigo.\n\
      Vive con su esposa María Elena en la casa vecina a los Argento, en algunas oportunidades se muestra su casa, no tiene\
      \ hijos y mantiene un matrimonio muy bueno con su mujer y son afectivamente muy apegados.\nMuchas veces este personaje\
      \ se muestra un tanto crédulo e ingenuo, casi siempre resultando convencido de hacer ciertas cosas inducidas por Pepe,\
      \ quien resulta ser un tanto manipulador de su amigo. Y al final termina metiendo en graves problemas a Dardo cuando\
      \ algo que Pepe planea sale mal (como normalmente suele pasar). Esa es una de las razones de porque la relación entre\
      \ Pepe y Dardo se rompe, aunque siempre se terminan reconciliando.\nEl aspecto de este personaje es, alto, musculoso\
      \ (se destaca mucho su físico en la serie), pelo negro un corto y regularmente despeinado y utiliza ropas de una persona\
      \ de clase media alta, como camisas, pantalones buenos y bien vestido, aparece con un reloj de aspecto caro. Los colores\
      \ utilizados para este personaje varían entre claros y oscuros, aunque generalmente son colores claros los que se utilizan.\n\
      Demuestra ser inteligente y bien instruido, utiliza un vocabulario muy firme y serio.\nEn su pasado, antes de conocer\
      \ a María Elena, Dardo solía mantener relaciones con mujeres muy deliberadamente. Esto afecta la relación de Dardo con\
      \ su esposa, por lo que además es muy hablado por Pepe cuando ambos se encuentran juntos.\nEn la mitad de la primera\
      \ temporada, Dardo se ausenta un tiempo; marchándose con prostitutas (llamados \"gatos\" por los personajes de la serie).\
      \ En ese momento siempre aparecía de incógnito, vestido de empanada, disfrazado, etc. En ese entonces María Elena está\
      \ consternada, se vuelve más loca y emotiva; y lo busca por todos lados. Se descubren varias de sus situaciones, como\
      \ la \"Pantera Negra\" o \"la mimosa\".\nFinalmente vuelve a su casa, y continua normalmente su vida, luego de que su\
      \ esposa lo perdonara. Un detalle que se muestra en algunos capítulos es que Dardo siente atracción sexual hacia Mónica\
      \ (sobre todo a su exuberante busto), pero no se atreve a nada por su amistad a Pepe.\n\nAlfio \"Coqui\" Argento (Darío\
      \ Lopilato)\n\nEs un adolescente de 17 años en la primera temporada y 18 en la segunda. Su verdadero nombre, pocas veces\
      \ comentado, es Alfio, que debe portar en \"honor\" a Alfio Basile (ex jugador y entrenador de Racing Club), lo que\
      \ demuestra el fanatismo de su padre por el fútbol. Se muestra como un adolescente tipo en su aspecto físico pero su\
      \ personalidad es bastante exagerada, mostrándose completamente como un descerebrado, aunque en muchas oportunidades\
      \ ha dicho alguna frase inteligente principalmente delante de su hermana, principalmente en la primera temporada, ya\
      \ que en la segunda quisieron resaltar más su torpeza. Aparece frecuentemente vestido con ropas oscuras y un collar,\
      \ esto es para diferenciarlo del resto de los personajes. Su vocabulario es torpe y precipitado, la mayoría de las veces\
      \ habla de una manera infantil, y prácticamente no utiliza un vocabulario grosero. Este personaje tiene una muletilla\
      \ hacia los padres, utilizando la frase característica cuando se dirige a ellos de “papucho” o “mamucha”. Se le asigna\
      \ a este personaje una forma de ser infantil pero que a la vez se muestra con grandes intenciones de tener pareja, aunque\
      \ no lo puede conseguir debido a que es rechazado. Frecuentemente se muestra exaltado frente a la aparición en algún\
      \ lugar de mujeres actuando de manera atontada frente a esta situación.\nMuchas veces intentó acercarse a María Elena,\
      \ fracasando en el intento. A pesar de ser rechazado por las mujeres, Coqui llegó a tener relaciones sexuales con al\
      \ menos dos de ellas, la novia de su primo Jaime y Barbara Bush (la hija del expresidente de Estados Unidos George W.\
      \ Bush). Es probable que Coqui haya tenido más de dos relaciones sexuales, aunque esto nunca es confirmado por los personajes\
      \ en la serie, tal vez por su poca experiencia sexual con respecto a los demás personajes (ejemplos, al final del episodio\
      \ El debut y despedida de Coqui, Coqui comienza a intimar con la nueva novia de su primo Jaime, repitiéndose la misma\
      \ historia que el episodio anterior; o en el capítulo Como bola sin manija. donde se muestra mediante flashback que\
      \ Coqui gastó el dinero destinado a clases de pool, en un jacuzzi con dos mujeres). Su apodo \"Coqui\" es un diminutivo\
      \ para \"Coco\" (el apodo de Alfio Basile, por el que lleva su nombre).\n\nPaola Argento (Luisana Lopilato)\n\nEs una\
      \ joven de 18 años en la primera temporada y 19 en la segunda. El personaje de Paola aparece pocas veces en comparación\
      \ a los demás personajes. La ropa que utiliza es muy variada en cuanto a forma y color, aunque frecuentemente aparece\
      \ vestida con polleras cortas y remeras generalmente de colores claros.\nEs la integrante más torpe de la familia Argento,\
      \ es una retrasada mental y demuestra tener mucha falta de tacto y muy poca sabiduría hacia las cosas (tanto indisciplinariamente,\
      \ como su vocabulario grotesco), tampoco sabe escribir, decir o leer bien la mayoría de las palabras. Su torpeza la\
      \ ha llegado a meter en problemas a ella o cualquiera que la rodea. Usualmente la llaman «tarada».\nA veces, se muestra\
      \ bastante despierta, en relación a la mayoría de las situaciones, cuando entabla algún tipo de discusión con el hermano,\
      \ en que, la mayoría de las veces, ella aparece como superior a él y con mayor experiencia de vida, principalmente en\
      \ el ámbito sexual, sin embargo presenta cierta candidez en aquello que más le atrae: el sexo.\nEn la segunda temporada\
      \ no se la ve mucho debido a que Lopilato estuvo grabando la telenovela Alma pirata, repentinamente aparece sobre los\
      \ finales causando la sorpresa del público y de su padre. Esta ausencia, en un principio se disimula diciendo que se\
      \ fue a una escuela de modelos, pero más adelante Pepe se ríe de eso y agrega «Está en una escuela modelos (una boludez\
      \ tengo que decir)» o «La nena no está, no me la traen nunca» o «me dicen que hoy viene la nena, pero después nada».\n\
      \nJuan José González Mendoza (enlace roto disponible en Internet Archive; véase el historial y la última versión). (Juanjo)\n\
      \nJuan José interpretó el papel secundario de un bebé, el cual apareció varias veces en diferentes episodios de la serie.\n\
      \nFatiga (Violeta, la perra)\n\nEste personaje fue interpretado por una perra, llamada Violeta, dato que recién se dio\
      \ a conocer durante la segunda temporada. Fatiga es el perro de la familia, la misma fue incrementándose de a poco a\
      \ lo largo de la tira. De pelaje beige y contextura grande, generalmente aparece echado en algún lugar, prioritariamente\
      \ en el vetusto sillón preferido de la familia, sin hacer nada.\nEn el capítulo «Todos los perros van al cielo» se descubre\
      \ que es propiedad de Coqui. Fue muchas veces compañero de Pepe y Coqui cuando ellos realizaban diálogos solo en la\
      \ sala, hablándole como a un amigo y haciendo reflexiones sobre su vida.\nFatiga hace honor a su nombre, teniendo en\
      \ sus escenas una actitud completamente cansada, desganada y poco atenta, jamás haciendo prácticamente nada y permaneciendo\
      \ echado en sillones o almohadones en el piso la mayor parte del tiempo. María Elena lo odia porque siempre le defeca\
      \ en su propio jardín.\nSu interpretación recayó en la perra Violeta, de ninguna raza, o mejor dicho, puro perro. Era\
      \ hermana melliza del perro Betún,​ también actor, de interpretaciones reconocidas como en Los Simuladores, o del premiado\
      \ corto Más que el mundo, del realizador Lautaro Núñez de Arco.​\nEl viernes 12 de octubre de 2007, Violeta sufrió un\
      \ grave accidente que le ocasionó la muerte. Todo sucedió cuando sus amos decidieron dejarla en el hogar familiar y\
      \ no llevarla con ellos tal como solían hacerlo. Al parecer, la señora que realiza tareas domésticas abrió para ventilar\
      \ y fue en ese momento que huyó por la ventana hacia su trágico final. «A la noche seguía sin aparecer y la encontramos\
      \ a un costado de la Panamericana», se lamentó Montenegro, que sospecha que Fatiga pudo confundir el auto de sus dueños\
      \ y salir así a la ruta.\n\n \n\n  \n«Fatiga tiene el mismo criterio que todos los personajes de la tira. Este animal\
      \ sólo podría ser de la familia Argento».\n\n \nGuillermo Francella, en una entrevista del diario Clarín.​\n\n\"Lalo\"\
      \ (Manuel Wirtz)\n\nEs amigo de Pepe. Aparece en no más de 10 capítulos en toda la serie. No se dijo nunca en la serie\
      \ su verdadero nombre ni su apellido. Casualmente el actor que lo interpreta participó en Poné a Francella, serie protagonizada\
      \ por el actor de ese apellido, también protagonista de esta serie. Es compañero de trabajo de Pepe en la zapatería.\
      \ Forma parte del grupo de amigos de Pepe y Dardo, que a veces juegan al truco o van a los casinos.\n\nComparación entre\
      \ la primera y la segunda temporada\n\nAl finalizar la grabación de la primera temporada, los episodios no alcanzaban\
      \ el índice de audiencia' esperado. En las repeticiones, la serie se volvió famosa y aclamada por el público. Es por\
      \ esto que luego de casi un año de las repeticiones (en la mayoría de los casos vista por primera vez por el público),\
      \ se vio la necesidad de comenzar una segunda temporada. El decorado de la serie había sido desarmado y retirado del\
      \ lugar, ya que allí se grababan otras series. Se tuvo que volver a armar la ambientación del decorado y volver a reunir\
      \ al elenco.\nEn el primer capítulo de la segunda temporada, cuando Pepe vuelve de la Copa Mundial de la FIFA 2006 en\
      \ Alemania, cuenta la historia vivida, y al ver el nuevo decorado, parecido al original pero no en su totalidad, agrega:\
      \ \"¿No encontraron el decorado del año anterior?\".\nCuando comenzó la serie, ésta tenía muchas características que\
      \ cuando se empezó a filmar la segunda parte, se modificaron para corregir ciertos aspectos, renovar el contenido, adaptarse\
      \ a la situación y redefinir objetivos.\nEn el aspecto del decorado se ha modificado principalmente el tono de los colores\
      \ utilizados, por ejemplo, se ha pasado de utilizar un color un tanto opaco a otro color más claro que le da mucha más\
      \ profundidad al escenario en la sala principal.\nEl aspecto en la segunda temporada de los escenarios es más prolijo\
      \ y se define totalmente como una casa de clase media acomodada, estableciéndose una gran diferencia entre lo que se\
      \ ve y lo que se dice, también lo que fue mejorado fue la producción del programa, en la primera temporada se podía\
      \ ver hasta los micrófonos arriba cosa que en la segunda temporada no pasaba.\nEn cuanto a lo técnico, la relación de\
      \ aspecto de la primera temporada era de 4:3, cambiado en la segunda por una proporción de 16:10.\nEn la forma de ser\
      \ los personajes ha cambiado en gran aspecto el personaje de Pepe: en la primera temporada se notaba que discriminaban\
      \ y degradaban mucho a la mujer, principalmente a su esposa-madre, y utilizaban muy frecuentemente malas palabras. En\
      \ la segunda temporada esto se modificó haciendo que Pepe no fueran tan agresivo hacia la mujer y que no insultara tanto.\n\
      En otro aspecto que el personaje de Pepe cambió fue en que en la primera temporada tenía con frecuencia un aspecto que\
      \ se acercaba a una persona de clase media baja y en la temporada 2 el aspecto en cuanto a la vestimenta principalmente\
      \ cambió a mostrarse como una persona de clase media.\nMoni en la segunda temporada, junto con el cambio en la personalidad\
      \ de Pepe, comenzó a imponerse un poco más él.\nUna modificación que no fue significativa pero que marcó un cambio entre\
      \ las dos temporadas es el de la introducción. En la primera temporada ésta era una secuencia de presentación de personajes\
      \ a través de su aparición en forma de caricatura, una forma clásica que se utiliza en las sitcom estadounidenses. Esta\
      \ presentación fue realizada por el estudio Boogieman Media. En la segunda temporada se ha hecho la presentación de\
      \ personajes haciendo una secuencia de partes de capítulos que los presentan.\nPor otro lado el personaje de Dardo cambió\
      \ en cierta manera, ya que en la primera temporada daba el aspecto de ser un hombre muy serio, en la segunda temporada\
      \ paso a tener una actitud más cómica y liberada. Esto se debe a una readaptación que tuvo que hacerse de este personaje\
      \ debido a un cambio de actores que hubo en la serie original estadounidense que interpretaban el mismo papel.\nMaría\
      \ Elena presenta nuevas locuras en su mente, entre ellas \"la Nena\" (su nueva hija imaginaria), además de su corte\
      \ de pelo, que en la primera temporada era más corto \"casquito\" (según Pepe), y en la segunda es un poco más largo.\n\
      Otro aspecto que, si bien pasó desapercibido para muchos, fue importante. En la primera temporada, casi todos los capítulos\
      \ respetaron el guion original de la serie estadounidense Married... with children, mientras que en la segunda temporada\
      \ se produjeron varios cambios, incluso mezclándose contenidos de varios episodios originales en uno solo, o reconstruyendo\
      \ los guiones para lograr una historia más adaptada al humor local.\n\nÚltimo capítulo\n\nEl último capítulo de la sitcom\
      \ fue transmitido por Telefe el día 28 de diciembre de 2006, y promedió un total de 29.2 puntos de rating,​ superando\
      \ a Sos mi vida, una comedia de eltrece, que marcó 25.5 puntos. Como algunas ediciones especiales, esta vez el programa\
      \ tuvo público en vivo.\nComenzando el episodio, Pepe baja rápidamente por las escaleras cuando escucha el timbre. Eran\
      \ sus vecinos, los Fuseneco, quienes destacan que en la casa de Pepe los muebles están tapados con sábanas, típico de\
      \ mudanzas. Entonces ahí bajan Moni, Paola y Coqui, cantando «Presente» de Vox Dei y les transmiten a sus vecinos que\
      \ se iban a mudar a una chacra en Santa Fe, cerca de donde vive la madre de Moni. En alusión a esto, empiezan un brindis\
      \ de despedida y María Elena, se alegra. Tras destacar que no los quería ver más, los Argento se abrazan y le gritan:\
      \ «¡Mentira!». Los Argento hicieron esta broma para el Día de los Inocentes, pero en realidad el día de los inocentes\
      \ era dentro de una semana, y ellos se justificaron diciendo que no podían esperar; Dardo se alegra bastante al darse\
      \ cuenta de la broma, mientras que María Elena se espanta y se desmaya.\nA la noche, Pepe organizó una picada para sus\
      \ vecinos, los cuales fueron a lo de los Argento. En un momento, a Dardo le suena el celular, era el gerente del banco\
      \ en el cual él y su esposa trabajan, y les comunica que fueron sorteados para ir a trabajar en una sucursal del banco\
      \ en París, Francia. Cuando Dardo les comunica a los Argento, ellos no le creen, y hacen referencia a una supuesta venganza\
      \ por la broma que le hicieron, pero Dardo se olvida el celular en la casa de los Argento y recibe una llamada de su\
      \ Gerente que Pepe atiende, confirmándole la hora del viaje.\nAl día siguiente, entre lágrimas y despedidas, Pepe y\
      \ Moni se despiden de ellos, mientras que Coqui y Paola los acompañan a Ezeiza. Después de despedirlos, entran a la\
      \ casa los nuevos vecinos, que resultan ser Pablo Echarri, junto a Mariela Fernández. Se da un diálogo introductorio\
      \ igual al del primer capítulo de la serie, en el cual se presentaron los Argento y los Fuseneco, por lo que denota\
      \ que los nuevos vecinos son iguales a los anteriores.\n\nRumores sobre una tercera temporada\n\nTras varios rumores\
      \ de una posible tercera temporada,​ Francella comentó: \"Es verdad que yo no quiero volver a hacerlo. No hay más capítulos\
      \ para adaptar y eso impide hacerlo de nuevo\".​ Más tarde, mientras dialogaba con Rodrigo Lussich de la Radio 10 de\
      \ Buenos Aires, aseguró que \"repetir esquemas me parece que no da. Yo creo que hay que dejarlo. Fueron dos años maravillosos\"\
      .​ Por su parte, Florencia Peña declaró que no volvería para una tercera temporada, comentó: \"Creo que a Guillermo\
      \ también le pasa, es que decidimos no seguir con esta serie porque son personajes tan fuertes y nosotros somos actores\
      \ curiosos que necesitamos ir superando nuestra marca y sentíamos que si nos quedábamos ahí\".​ Mientras tanto, Marcelo\
      \ de Bellis dijo: \"Guillermo Francella está a punto de firmar con Telefe\". \nSin embargo, Francella se encargó de\
      \ desmentir este comentario.​ Por su parte Érica Rivas comentó: \"Hoy no tengo nada mejor para ofrecer en televisión,\
      \ así que me parece maravilloso que sigan pasándolo, me gustaría que pudiéramos hacer muchos más capítulos y que hubiera\
      \ más para mostrar\".​\nHacia fines de 2018, Francella y de Bellis afirmaron que se encontraban proyectando el regreso\
      \ de la serie en una versión teatral hacia 2019. Por motivos de compromisos laborales de Florencia Peña, el proyecto\
      \ no se concretó. Finalmente, el 2 de agosto de 2019 se confirmó que los integrantes de la serie firmaron un contrato\
      \ para el regreso de Casados Con Hijos. La serie volverá como obra de teatro en los meses de junio, julio y agosto de\
      \ 2020, en el teatro Gran Rex de Buenos Aires.​ ​"
  - source_sentence: '안녕하세요! 저는 호기심 많은 AI 비서입니다. 위의 글을 바탕으로 구체적이고 가치 있는 질문을 하나 생성해 드리겠습니다.


      "안녕하세요, 安倍なつみ의 공연 일정을 보면 2009년부터 2014년까지 매년 생일을 기념하는 라이브 공연을 개최했습니다. 이러한 생일 라이브 공연이 그녀에게 어떤 의미를 가지고 있는지 알 수 있을까요?"'
    sentences:
    - "La herejía de Horus (novelas)\n\nTrasfondo histórico\n\n\"... En cuanto el Emperador de la Humanidad se retira a Terra,\
      \ decide dejar todos sus ejércitos a cargo de su hijo favorito, el primarca Horus Lupercal. Éste continúa la labor de\
      \ su padre, la famosa Gran Cruzada​ (la unificación de todos los planetas de la galaxia mediante la pacificación o la\
      \ aniquilación de las razas y así restaurar el Imperio del Hombre utilizando la Verdad Imperial creada por el Emperador,\
      \ tras la Era de los Conflictos), ​ con la ayuda, y bajo su mando por supuesto, de sus otros hermanos primarcas y sus\
      \ respectivas legiones, y el apoyo de las legiones titánicas situadas en Marte. Ascendido a Señor de la Guerra, y con\
      \ el apoyo de su legión, los Lobos Lunares, ahora bautizados Hijos de Horus, es corrompido por el mal a causa de una\
      \ serie de acontecimientos provocados por los Dioses del Caos, provenientes del universo psíquico de la Disformidad,\
      \ y decide traicionar al Emperador. Ingeniándoselas para poner de su lado a ocho de sus diecisiete hermanos, y con el\
      \ apoyo descontrolado de las fuerzas del Caos, pone en marcha un plan de destrucción muy elaborado. El objetivo final\
      \ es derrotar al Emperador en su Trono Dorado y conquistar Terra. Para conseguirlo, deberá abrirse camino hasta su padre,\
      \ manteniendo a los hermanos leales a él ocupados en batallas contras los hermanos leales al Emperador, en diversos\
      \ puntos estratégicos de la galaxia conocida ...\"\nLa Herejía de Horus transcurre en el milenio 31, diez mil años antes\
      \ del actual Warhammer 40.000, y es un pilar fundamental en la historia de éste. Las novelas dan a conocer al máximo\
      \ detalle todo lo que pasó durante los siete años que duró la herejía. Incluso algunas de las novelas también dan a\
      \ conocer detalles de algunas guerras que fueron antes de la herejía. En la serie descubriremos detalles de todas las\
      \ legiones con sus primarcas y todas las acciones que llevaron a cabo por la galaxia. También descubriremos detalles\
      \ del propio Emperador y los ejércitos que le rodean, situados en Terra, y de las legiones titánicas del Mechanicum,\
      \ situados en Marte. Incluso, y no menos importante, descubriremos al Caos y todo lo que éste conlleva. Veremos como\
      \ un día todos eran hermanos que luchaban por una misma causa y como después se dividieron en dos grupos, dando a conocer\
      \ el nombre de las Legiones Traidoras (leales a Horus) y las Legiones leales al Emperador.\n\nResumen de la trama\n\n\
      Al ser una saga muy extensa, es muy difícil poder hacer un resumen detallado de lo que ocurre en cada libro, ya que\
      \ no sigue el típico esquema que podríamos encontrar en una novela, sea de un solo tomo como de varios que formen una\
      \ trilogía. Para crear el resumen de la trama se tiene que ir tomando los detalles principales de cada novela que vayan\
      \ dando forma a la historia principal.\n\nIntroducción\n\nSiete años de intensa guerra separan a Horus, Señor de la\
      \ Guerra, de su padre, el Emperador de la Humanidad. Siete años de herejía... Todo comienza en el planeta Isstvan III,\
      \ donde Horus y la legión traidora de los Hijos de Horus, con la ayuda de las legiones, ahora leales a él, de los Hijos\
      \ del Emperador, la Guardia de la Muerte y los Devoradores de Mundos, bajo el liderazgo de los primarcas Fulgrim, Mortarion\
      \ y Angron respectivamente, y de la fuerza titánica del Mechanicum Oscuro, se deshacen de todos aquellos marines espaciales\
      \ que creen que no aceptarán la traición de Horus, dentro de sus propias legiones, lanzando unas bombas víricas llamadas\
      \ Devoradores de Vidas. Este primer enfrentamiento es conocido como la Atrocidad de Isstvan III.​ Una vez eliminados,\
      \ pero no sin antes, cometer el error de dejar escapar a unos de los capitanes de la Guardia de la Muerte llamado Nathaniel\
      \ Garro robando la fragata Eisenstein y huyendo a través de la Disformidad dirección a Terra para avisar de la traición\
      \ al Emperador, al enterarse de ésta, y del error de Fulgrim al intentar convencer a su hermano primarca Ferrus Manus,\
      \ de la legión de los Manos de Hierro, de apoyar a Horus y fracasar en su cometido, el siguiente paso del Señor de la\
      \ Guerra es trasladar a sus ejércitos al planeta Isstvan V, a la espera de que se produzca la mayor masacre entre legiones\
      \ y hermanos. En cuanto aparecen y desembarcan los Manos de Hierro, los Salamandras y la Guardia del Cuervo, bajo el\
      \ liderazgo de los primarcas Ferrus Manus, Vulkan y Corvus Corax respectivamente, se inicia lo que es conocido como\
      \ la Masacre del Desembarco de Isstvan V,​ una batalla brutal donde las cuatro legiones traidoras ya posicionadas, y\
      \ con la ayuda de cuatro legiones más, que aparecen más tarde, los Amos de la Noche, los Guerreros de Hierro, los Portadores\
      \ de la Palabra y la Legíon Alfa, bajo el liderazgo de los primarcas Konrad Curze, Perturabo, Lorgar Aureliano y Alpharius\
      \ respectivamente, con órdenes de Terra para destruir al traidor, y que por sorpresa de Ferrus, Vulkan y Corax descubren\
      \ que en vez de recibir ayuda, también han traicionado al Emperador, menguan hasta casi la total extinción las tres\
      \ legiones leales, dejando a un Ferrus Manus decapitado por Fulgrim, éste ya casi consumido totalmente por las fuerzas\
      \ del Caos, un Corax casi muerto que huye del campo de batalla con lo poco que le queda de su legión, y un Vulkan que,\
      \ dado por desaparecido por sus marines, es atrapado y encarcelado por Konrad Curze.\nPero... ¿dónde estaban los ángeles\
      \ oscuros, los ángeles sangrientos, los lobos espaciales, los mil hijos, los puños imperiales, los ultramarines y los\
      \ cicatrices blancas? Horus Lupercal, considerado como uno de los mejores estrategas de todos los tiempos, lo tuvo todo\
      \ muy bien planeado.\n\nArcos de la historia\n\nLa Herejía de Horus implica a muchísimos personajes en muchos lugares\
      \ con muchas guerras durante muchos años. Es tan grande la extensión de la historia que los autores han decidido crear\
      \ una serie bastante compleja compuesta por novelas que, aunque sí es verdad que mantienen una línea temporal de principio\
      \ a fin, no mantienen relación una detrás de otra. Solamente las tres primeras novelas se consideran la trilogía principal\
      \ de la serie. A partir de ahí, es donde las novelas van saltando de un lado a otro para cubrir todos los detalles de\
      \ la trama, narrando historias independientes con finales abiertos, en el cual, la historia de una novela pueda estar\
      \ ocurriendo antes, durante o después que la historia de la siguiente novela, y posteriormente, encontrarnos con otras\
      \ novelas que cuenten historias relacionadas con anteriores novelas, creando así varios arcos narrativos. También nos\
      \ encontraremos con algunas novelas presentadas en forma de antologías, donde veremos relatos cortos, dando detalles\
      \ de personajes, lugares, acciones, etc... pero situando cada relato en diferentes momentos temporales durante la herejía,\
      \ o, en una misma antología una recopilación de relatos unidos entre sí para crear una sola historia, que a su vez,\
      \ pertenezca a uno de los arcos narrativos, o a varios.\nA continuación, se mostrará las novelas pertenecientes a cada\
      \ arco narrativo:​\n\n01. HORUS, SEÑOR DE LA GUERRA: las semillas de la herejía\n\nEstamos en el trigésimo primer milenio.\
      \ Bajo la benévola autoridad del Emperador Inmortal, el Imperio de la Humanidad se ha extendido por la galaxia en una\
      \ era dorada de descubrimientos y conquistas. Pero ahora, en la víspera de la victoria, el Emperador deja el frente\
      \ y confía la Gran Cruzada a su hijo favorito, Horus. Ascendido a señor de la guerra, ¿podrá el idealista Horus llevar\
      \ a cabo el grandioso plan del Emperador, o acaso este ascenso sembrará las semillas de la herejía entre sus hermanos?\n\
      El libro se divide en tres partes: 1) Los engañados. 2) La hermandad en el país de la arañas. 3) El espantoso sagitarium.\n\
      \n02. FALSOS DIOSES: las raíces de la herejía\n\nLa Gran Cruzada que ha llevado a los hombres a través de las estrellas\
      \ continúa. El Emperador de la Humanidad ha entregado el mando a su hijo favorito, el señor de la guerra Horus. Sin\
      \ embargo, no todo va bien en los ejércitos del Imperio. Horus todavía sigue sufriendo los celos y el resentimiento\
      \ de sus hermanos primarcas, y además, cuando resulte herido en combate en el planeta Davin, deberá enfrentarse a sus\
      \ propios demonios interiores. Ante todas las tentaciones que el Caos le ofrece, ¿podrá el debilitado Horus resistirse?\n\
      El libro se divide en cuatro partes: 1) El traidor. 2) Luna de plaga. 3) La casa de los falsos dioses. 4) El final de\
      \ la cruzada.\n\n03. LA GALAXIA EN LLAMAS: la herejía revelada\n\nEl señor de la guerra Horus se ha recuperado de sus\
      \ terribles heridas y encabeza a las triunfantes fuerzas imperiales contra el mundo rebelde de Isstvan III. Sin embargo,\
      \ aunque los rebeldes son aplastados con rapidez, la traición de Horus queda revelada cuando ordena que arrasen el planeta\
      \ con bombas víricas y los marines espaciales se vuelven contra sus hermanos de batalla en un combate de inimaginable\
      \ ferocidad.\nEl libro se divide en tres partes: 1) Cuchillos largos. 2) La ciudad coral. 3) Hermanos.\n\n04. LA HUIDA\
      \ DE LA EISENSTEIN: la herejía se extiende\n\nDespués de ser testigo de la tremenda matanza sufrida por las fuerzas\
      \ imperiales en Isstvan III, el capitán Garro de la Guardia de la Muerte se apodera de una nave y pone rumbo hacia Terra\
      \ para advertir al Emperador de la traición de Horus. Sin embargo, la fugitiva Eisenstein resulta dañada por los disparos\
      \ enemigos y queda a la deriva en el espacio disforme, los dominios de los Poderes Siniestros. ¿Podrán Garro y sus guerreros\
      \ sobrevivir al Caos y llevar su advertencia hasta el Emperador antes de que los planes de Horus se cumplan?\nEl libro\
      \ se divide en tres partes: 1) La estrella cegada. 2) Un juramento roto. 3) Indemne.\n\n05. FULGRIM: visiones de la\
      \ traición\n\nEstamos en el trigésimo primer milenio, y la humanidad se encuentra en la cima de su poder. La Gran Cruzada,\
      \ bajo la dirección del señor de la guerra Horus, continúa su marcha imparable. Mientras tanto, Fulgrim, primarca de\
      \ los Hijos del Emperador, dirige a sus guerreros a un combate contra unos viles enemigos alienígenas. De la sangre\
      \ derramada en esta campaña surgirá la semilla que conducirá a esta orgullosa legión a la traición y los llevará al\
      \ más siniestro de los caminos de la corrupción.\nEl libro se divide en cinco partes: 1) El guerrero perfecto. 2) El\
      \ fénix y la gorgona. 3) Visiones de traición. 4) El umbral. 5) El último fénix.\n\n06. EL DESCENSO DE LOS ÁNGELES:\
      \ lealtad y honor\n\nEl Emperador se reúne con uno de sus hijos perdidos, el primarca Lion El´Jonson, cuando la flota\
      \ imperial redescubre el planeta Caliban. En el momento que los Ángeles Oscuros, tanto los nuevos como los antiguos,\
      \ se unen a la Gran Cruzada, se pone en marcha una cadena de acontecimientos que cambiarán para siempre Caliban, a sus\
      \ habitantes y a la legión.\nEl libro se divide en cuatro partes: 1) Caliban. 2) La bestia. 3) Imperio. 4) La cruzada.\n\
      \n07. LEGIÓN: secretos y mentiras\n\nSe avecina una gran guerra, un enfrentamiento que devorará al Imperio de la Humanidad.\
      \ Los marines espaciales de la Legión Alfa, la última y más hermética de toda la hermandad de los Adeptus Astartes,\
      \ llegan a un mundo enemigo para apoyar al Ejército Imperial en su campaña de pacificación y en su lucha contra unas\
      \ fuerzas enigmáticas y sobrenaturales. Pero, ¿qué es lo que impulsa los actos de la Legión Alfa? ¿Se puede confiar\
      \ en ellos? ¿Qué bando escogerán cuando comience la Gran Guerra?\nEl libro se divide en dos partes: 1) Verano reptiliano.\
      \ 2) El lugar de paso.\n\n08. BATALLA POR EL ABISMO: mi hermano, mi enemigo\n\nLa traición de Horus ya es conocida por\
      \ todos, y ha llegado el momento de que sean puestos a prueba. Cuando el Señor de la Guerra despliega abiertamente sus\
      \ fuerzas, llega a conocimiento de los Astartes leales que los Portadores de la Palabra han enviado una flota contra\
      \ Ultramar, el hogar de los Ultramarines. A menos que logren interceptarla y destruirla, es muy posible que los Ultramarines\
      \ sufran un daño del que jamás sean capaces de recuperarse.\n\n09. MECHANICUM: la guerra estalla en marte\n\nLas llamas\
      \ de la traición se extienden por todo el Imperio. Horus moviliza a todas las fuerzas que le son leales y planea sublevar\
      \ o destruir a todas aquellas que se atrevan a enfrentarse a él. Se está librando una batalla por el corazón y el alma\
      \ de todas las fuerzas imperiales: los Astartes, el Ejército Imperial, las legiones de titanes, y muchas más.\nEl libro\
      \ se divide en tres partes:\n\n10. CUENTOS DE LA HEREJÍA\n\nEstamos en el trigésimo primer milenio y la raza humana\
      \ se ha diseminado por toda la galaxia. Cuando Horus, Señor de la Guerra, se rebeló contra el Emperador, la subsiguiente\
      \ guerra civil estuvo a punto de destrozar el Imperio. La guerra desgarró los mundos y enfrentó a los Astartes contra\
      \ sus hermanos de batalla en una lucha donde la muerte fue la única en salir victoriosa. Esta edición recoge relatos\
      \ de heroísmo y tragedia que tuvieron lugar durante esta época turbulenta. Son los siguientes:\nJuegos de sangre - Lobos\
      \ a las puertas - Peones de la Tormenta - La voz - La llamada de Lion - La última Iglesia - Después de Desh'ea\n\n11.\
      \ LOS ANGELES CAÍDOS: engaño y traición\n\nLa Gran Cruzada parece haber alcanzado un punto muerto durante el cual los\
      \ primarcas y sus legiones deciden de qué lado descansará su lealtad, si del lado del Emperador o del lado de Horus\
      \ el señor de la Guerra.\nLos Ángeles Oscuros serán puestos a prueba tanto en el espacio exterior como en su propia\
      \ patria, Caliban. Mientras su planeta se esfuerza por liberarse del gobierno de las leyes del Imperio, una guerra civil\
      \ estalla en su interior. Las esperanzas están puestas en Los Ángeles Oscuros que se verán inmersos en un sangriento\
      \ conflicto en el que todo lo que conocen y en lo que confían quedará en entredicho.\n\n12. LOS MIL HIJOS: todo acaba\
      \ en cenizas\n\nLa Gran Cruzada vive un momento decisivo y los Mil Hijos luchan con entrega y lealtad. Sin embargo,\
      \ el Imperio recela de la Legión de Magnus el Rojo a causa de sus métodos arcanos. Temido por aquellos a quienes ha\
      \ jurado proteger, Magnus es llamado al planeta Nikaea para defenderse de las acusaciones de brujería. No obstante,\
      \ cuando el desventurado primarca tiene visiones que predicen la traición de Horus, decide avisar al Emperador mediante\
      \ poderes prohibidos, y el Señor de la Humanidad envía a Leman Russ, primarca de los Lobos Espaciales, a atacar Próspero,\
      \ el planeta de los Mil Hijos. Pero Magnus ha visto más allá de la traición del Señor de la Guerra y estas revelaciones\
      \ decidirán el destino de su Legión para siempre.\n\n13. Némesis\n\nDos años después de la horrorosa matanza de Isstvan\
      \ IV, Horus le declara abiertamente la guerra al Imperio. Pero en las sombras del Palacio del Emperador un grupo de\
      \ sujetos poderosos se reúne. Su plan es enviar un equipo de asesinos que ejecute al Architraidor Horus y así acabar\
      \ con la guerra por el dominio de la galaxia antes de que ni siquiera comience. Lo que no saben es que Horus y sus aliados\
      \ ya han iniciado su propio plan, igual de siniestro, para acabar con el Emperador.\n\n14. El primer hereje\n\nEn medio\
      \ de la guerra galáctica que supone la Gran Cruzada, el Emperador desaprueba el culto que le rinden los Portadores de\
      \ la Palabra. Angustiados por semejante reproche, Lorgar y su legión emprenden un nuevo camino y arrasan un planeta\
      \ tras otro.\nAunque lo que realmente buscan es iluminar el Imperio, la corrupción del Caos se apodera de ellos y comienza\
      \ su camino hacia la maldición. Sin que los Portadores de la Palabra lo sepan, su búsqueda de la verdad alberga las\
      \ mismísimas raíces de la herejía…\n\n15. Próspero en llamas\n\nEl Emperador está furioso. Magnus el Rojo, primarca\
      \ de la legión de los Mil Hijos, ha cometido un error de proporciones catastróficas y ha puesto en peligro a la propia\
      \ Terra. Al Señor de la Humanidad no le queda más remedio que encargarle al primarca de los Lobos Espaciales, Leman\
      \ Russ, la misión de apresar a su hermano en el planeta Prospero, el lugar de origen de los Mil Hijos. \nNo será fácil\
      \ someter al Planeta de los Hechiceros a la voluntad del Emperador, pero tampoco detener a Russ y a sus Lobos Espaciales.\
      \ Con el corazón poseído por la ira, el Rey Lobo está decidido a llevar a Magnus ante la justicia del Emperador. Los\
      \ acontecimientos que decidirán el destino de Prospero se desatan.\n\n16. La era de la oscuridad\n\nLa Era de la Oscuridad\
      \ nos narra una serie de historias acontecidas después de la traición de Isstvan V. Horus comienza su campaña contra\
      \ el Emperador, una guerra a escala galáctica que tiene como objetivo final Terra. Pero el camino que lleva al enfrentamiento\
      \ entre padre e hijo es muy largo: siete años llenos de secretos y de silencios, de planes y de proyectos. Los años\
      \ más oscuros de la Herejía de Horus están a punto de ser desvelados.\n\n17. Los Muertos Exiliados\n\nLa galaxia arde\
      \ envuelta en llamas. Los primarcas leales al Emperador se preparan para enfrentarse al Señor de la Guerra Horus y a\
      \ las legiones traidoras en la arena negra de Isstvan. Una época tan oscura sólo puede ser el anuncio de nuevos sucesos\
      \ terribles que están por ocurrir. El astrópata Kai Zulane descubre sin querer un secreto capaz de alterar el rumbo\
      \ de la guerra, y tiene que huir.\nSe lanza junto a una misteriosa banda de renegados al letal submundo de Terra, donde\
      \ aquellos en los que antaño confiaba le dan caza como si fuera un criminal. Ante la traición, Kai debe decidir a quién\
      \ jurará lealtad, y si enterrar o no para siempre algunas verdades.\n\n18. El Asedio de Deliverance\n\nCorax y los pocos\
      \ guerreros supervivientes de la Guardia del Cuervo escapan de la matanza de Isstvan V mientras la Herejía de Horus\
      \ divide al Imperio. Los castigados marines espaciales se recuperan de sus heridas y se esfuerzan por volver al combate\
      \ cuanto antes. Corax, regresa destrozado a Terra en busca de la ayuda de su padre, el Emperador de la Humanidad. Éste\
      \ le revela un antiguo secreto, y así Corax comienza la reconstrucción de la Guardia del Cuervo y planea la venganza\
      \ contra sus traicioneros hermanos primarcas. Pero la misteriosa Legión Alfa ha conseguido infiltrarse entre los supervivientes\
      \ y pretende destruir la Guardia del Cuervo antes de que pueda recuperarse y amenazar los planes de Horus.\n\n19. La\
      \ Batalla de Calth\n\nSin saber la extensión de la Herejía, Roboute Guilliman cumple las órdenes cada vez más crípticas\
      \ del Señor de la Guerra y regresa a Ultramar para reclutar a su legión y combatir a los orkos que se reúnen en el sistema\
      \ Veridian. Sin previo aviso, los supuestos aliados de la legión de los Portadores de la Palabra invaden Calth, donde\
      \ dispersan la flota de los Ultramarines y aniquilan a todos los que se encuentran en su camino. Guilliman confirma\
      \ sus peores sospechas: Lorgar está decidido a acabar de una vez por todas con la terrible rivalidad que hay entre ellos.\
      \ Y cuando los traidores invocan a las infectas hordas de demonios y a todas las fuerzas del Caos, los Ultramarines\
      \ se ven abocados a una lucha en la que ninguno de los bandos podrá vencer.\n\n20. Los primarcas\n\nCreados a imagen\
      \ y semejanza del Emperador, los Primarcas se creyeron los príncipes del universo durante mucho tiempo. Dirigieron a\
      \ las legiones de Marines Espaciales en una gloriosa conquista de la galaxia, y ningún enemigo del imperio fue capaz\
      \ de resistírseles. Pero incluido en el seno de una hermandad tan legendaria, las semillas de la discordia han sido\
      \ sembradas hace tiempo, mucho antes de que el traicionero Señor de la Guerra, Horus, proclamase su gran herejía.\n\n\
      21. Signus Prime\n\nDesde los comienzos de la Gran Cruzada, Sanguinius, el angélico Primarca de la IX Legión, fue uno\
      \ de los más leales y cercanos aliados de Horus. Pero los Ángeles Sangrientos llevan mucho tiempo ocultando su naturaleza\
      \ secreta al resto del Imperio, y cuando el Señor de la Guerra deja caer que su salvación podría encontrarse en las\
      \ ruinas de un mundo conquistado, los hijos de Sanguinius caen en la trampa y se dirigen a él a toda prisa. Ahora, cuando\
      \ se hace evidente la mano del traidor, los Ángeles Sangrientos deben enfrentarse a los ejércitos del Caos, surgidos\
      \ de la Disformidad, y a sus propios demonios personales, en las desoladas llanuras de Signus Prime.\n\n22. Sombras\
      \ de traición\n\nDesde los campos de batalla de Phall e Isstvan hasta las sombras de la propia Terra, la mayor guerra\
      \ de la historia de la humanidad se recrudece. Mientras las legiones traidoras continúan aterrorizando la galaxia, la\
      \ defensa del Palacio Imperial se prepara. El inevitable encuentro final entre Horus y el Emperador cada vez está más\
      \ cerca.\n\n23. Angel Exterminatus\n\nPerturabo, el maestro de los asedios y el aniquilador de Olympia, ha estado largo\
      \ tiempo a la sombra de sus otros hermanos primarcas, frustrado por las obligaciones cotidianas e ignominiosas que suelen\
      \ ser responsabilidad de la IV Legión. Cuando Fulgrim le ofrece la oportunidad de dirigir una expedición para buscar\
      \ armamento antiguo y perdido de los xenos, los Guerreros de Hierro y los Hijos del Emperador se unen para adentrarse\
      \ en el corazón del enorme torbellino de estrellas que acecha los sueños de Perturabo. Perseguidos por los supervivientes\
      \ vengativos de Isstvan V y por los retornados de un mundo Eldar extinto, deben darse prisa si quieren liberar el poder\
      \ devastador del Angel Exterminatus.\n\n24. Traidor\n\nLa Cruzada de las Sombras ha comenzado. Mientras los Ultramarines\
      \ se tambalean tras el ataque sorpresa de Kor Phaeron en Calth, Lorgar dirige al resto de los Portadores de la Palabra\
      \ al corazón del reino de Ultramar. Sus dudosos aliados, Angron y los Devoradores de Mundos, aparentemente ciegos al\
      \ auténtico objetivo de la misión, prefieren seguir saqueando cada nueva civilización que encuentran. Pero Lorgar, que\
      \ en otro tiempo hubiera castigado a su hermano descarriado, ahora solo parece alentar el frenético derramamiento de\
      \ sangre. Arderán mundos, las legiones se enfrentarán y un Primarca caerá... El destino de toda la galaxia pende de\
      \ un hilo.\n\n25. La marca de Calth\n\nLa Herejía ha llegado a Calth sin avisar. En pocas horas de combate, los orgullosos\
      \ guerreros de la XIII Legión, los Ultramarines de Guilliman, fueron aplastados por la traición de sus otrora hermanos\
      \ de la XVII. Ahora, con el planeta a merced de las erupciones solares de la estrella herida de Veridian, los supervivientes\
      \ deben enfrentarse a los Portadores de la Palabra restantes y a sus impíos aliados o a un destino fatal en los sombríos\
      \ refugios arcológicos que hay bajo la superficie del planeta.\n\n26. Vulkan vive\n\nDespués de la masacre de Isstvan\
      \ V, los supervivientes de la legión de los Salamandras buscan sin éxito a su primarca caído sin saber que, aunque desearía\
      \ estar muerto, Vulkan aún vive… y se pudre en una celda para diversión de su cruel carcelero, su hermano Konrad Curze.\
      \ Mientras sufre las numerosas e infernales torturas diseñadas para quebrar su cuerpo y espíritu, Vulkan es testigo\
      \ de hasta dónde puede llegar la depravación del Acechante Nocturno y descubre algo que podría cambiar el curso de la\
      \ guerra.\n\n27. El imperio olvidado\n\nEn la Franja Este, el reino de Ultramar resiste en solitario. Tras sufrir el\
      \ ataque de los Portadores de la Palabra en Calth y la subsiguiente Cruzada de las Sombras contra los Quinientos Mundos,\
      \ el primarca de los Ultramarines, Roboute Guilliman, llama a todas las fuerzas leales a Macragge con la visión de un\
      \ nuevo futuro para la humanidad. La creciente llegada de fugitivos de la guerra que ya ha envuelto al resto de la galaxia\
      \ hace imposible distinguir entre amigos y enemigos. Aislado de Terra por temibles tormentas disformes, ¿planea Guilliman\
      \ llevar a cabo un pulso de poder para rivalizar incluso con el Señor de la Guerra renegado Horus?\n\n28. Cicatrices\n\
      \nDe todas las Legiones Astartes, los White Scars de Jaghatai Khan siguen siendo los más enigmáticos y escurridizos.\
      \ Nacidos en una civilización que premia el honor, la velocidad y una lealtad absoluta, sigue sin estar claro de qué\
      \ lado se decantan a pesar de que la galaxia está siendo destruida por la traición de Horus y de que ambos bandos cuentan\
      \ con ellos entre sus potenciales aliados en la guerra que está por venir. Sin embargo, cuando la Alpha Legion lance\
      \ un ataque simultáneo e inexplicable contra los White Scars y los Space Wolves, Khan deberá decidir de una vez por\
      \ todas si apoyará al emperador, al señor de la guerra… o a ninguno de ellos.\n\n29. Espíritu vengativo\n\nMientras\
      \ los aliados de Horus libran batallas en mil frentes diferentes, la XVI Legion desciende sobre el Mundo Caballero de\
      \ Molech, uno de los principales baluartes del Ejército Imperial. Las fuerzas leales al Emperador se preparan para hacer\
      \ frente al Señor de la Guerra, pero ¿qué puede haber llevado a Horus a atacar un planeta tan bien defendido y qué estará\
      \ dispuesto a sacrificar para cumplir su oscuro destino?\n\n30. La condenación de Pythos\n\nTras el desastre de la Masacre\
      \ del Desembarco de Isstvan V, un ejército maltrecho y menguado de Iron Hands, Raven Guard y Salamanders se reagrupa\
      \ en un mundo muerto aparentemente insignificante. Mientras rechazan los ataques de toda clase de criaturas monstruosas,\
      \ estos aliados a regañadientes hallan la esperanza en los refugiados humanos que huyen de la creciente guerra y han\
      \ quedado a la deriva en las mareas de la disformidad. Pero mientras los Space Marines crean un refugio en las junglas\
      \ de Pythos, aparece una oscuridad que amenaza con consumirlos a todos\n\n31. Legados de traición\n\nDe los mayores\
      \ conflictos surgen los verdaderos héroes. Con la galaxia en llamas y una guerra de inimaginable magnitud arrasando\
      \ el Imperio, los defensores de la luz y de la oscuridad se aventuran en innumerables campos de batalla al servicio\
      \ de sus capitanes. No buscan fama o riqueza, sino enfrentarse a su destino.\n\n32. Fuego Letal\n\nAunque Vulkan permanece\
      \ en estasis bajo la Fortaleza de Hera, muchos de sus hijos se niegan a creer que esté realmente muerto. Después de\
      \ un rescate casi milagroso por parte de los Ultramarines, Artellus Numeon, antiguo capitán de la Guardia Pira, insta\
      \ a los otros Salamandras de Macragge a abandonar el Imperium Secundus y devolver el cuerpo de su Primarca al mundo\
      \ natal de Nocturne, donde renacerá en las llamas del Monte del Fuego Letal. \nPero las dudas y temores por el futuro\
      \ de la Legión no dejan de acosar a Numeon. Mientras tanto, sus enemigos tratan de hacerse con nuevos destinos…\n\n\
      33. La guerra sin fin\n\nLa visión del Emperador de una humanidad en su cénit se ha desmoronado. La Gran Cruzada ya\
      \ no es sino un recuerdo lejano. El sueño de la Unidad se ha desvanecido. Pero ahora que la rebelión de Horus se extiende\
      \ a todos los rincones del Imperio y la guerra devora mundos y sistemas nuevos casi a diario, hay quienes se preguntan:\
      \ ¿acaso las señales estaban ante nuestros ojos desde el principio?\n\n34. Pharos\n\nCon el noble emperador Sanguinius\
      \ gobernando desde Macragge, el Imperium Secundus se erige como un faro de esperanza solitario aun cuando las fuerzas\
      \ del Señor de la Guerra continúan asolando el resto de la galaxia. Roboute Guilliman, todavía señor de Ultramar, ha\
      \ convencido a su hermano de que Terra ha sucumbido y de que el misterioso Monte Pharos, ubicado en Sotha, es ahora\
      \ la clave del futuro de la humanidad. No obstante, los Night Lords, los hijos crueles y despiadados de Konrad Curze,\
      \ han estado vigilando desde las sombras y se han estado preparando para lanzar un ataque largo tiempo planeado sobre\
      \ el mismísimo Pharos…\n\n35. El ojo de Terra\n\nLa galaxia arde bajo el mando de Horus y a cada instante que pasa se\
      \ pierden un billón de vidas más, pero no siempre fue así. Tiempo ha, el título de Señor de la Guerra era sinónimo de\
