    - "《대전통편》(大典通編)은 《경국대전》과 《속대전》 및 그 이후에 임금이 내린 교명과 현행 법령을 증보하여 편찬한 조선의 법전으로, 현존하는 책은 6권 5책으로 된 인쇄본. 목판본. 장서각도서이다.《경국대전》의\
      \ 예에 따라 서술하고, 경국대전의 본문에는 원(原), 속대전의 본문에는 속(續), 새로 증보한 것에는 증(增) 자를 음각(陰刻)해 넣어 서로 구별하였다.\n\n1785년(정조 9) '경국대전', '속대전'\
      \ 및 그 뒤의 법령을 통합하여 김치인 등이 왕명에 따라 편찬한 통일법전. 1784년 찬집청을 설치하여 김노진 등이 편찬하여 1786년부터 시행되었다.\n\n편찬/발간 경위 \n\n조선시대 법전은 ≪경국대전≫과\
      \ ≪속대전≫ 두 책으로 되었으나, 그 밖에도 ≪오례의 五禮儀≫ 등 법전과 같은 효력이 있는 전서들이 나뉘어 있어 법제 운용에 불편이 많았다.\n\n1781년 2월 당시의 법전을 통합하기로 결정하고, 1784년\
      \ 찬집청을 설치하였다. 이어서 김노진(金魯鎭)·엄숙(嚴璹)·정창순(鄭昌順)을 찬집당상(纂輯堂上), 이가환(李家煥)을 찬집낭청(纂輯郎廳)으로 임명, 편찬에 착수하였다.\n\n찬집당상들은 업무를 분담하고 각자의\
      \ 작업분을 대신들과 상의해 초고를 완성한 뒤, 각 전(典)별로 모두 정조의 결재를 거쳤다.\n\n정조는 이를 다시 전임과 현임의 대신들에게 재검토하게 하였다. 또, 각 전마다 당해 판서에게 축조 교정(逐條校正)하도록\
      \ 하였다. 이 일의 총재(總裁)로는 일찍이 ≪속대전≫ 편찬을 주관한 김재로(金在魯)의 아들 김치인(金致仁)을 임명하였다.\n\n교정 실무자로 이가환·신대계(申大季)를 임명해 교정을 마친 뒤, 이복원(李福源)의\
      \ 서문, 김치인의 전문(箋文)을 첨부하였다.\n\n1785년 6월 15일 목판본 인쇄에 들어가 그 해 9월 6일 220부의 인쇄를 마쳤다. 이 때 감인관(監印官)으로는 정창성(鄭昌聖)·이가환·이덕무(李德懋)·유득공(柳得恭)·박제가(朴齊家)\
      \ 등 규장각검서관들이 맡았다. 또한, 지방 관아에 보낼 것은 각 감영에서 별도로 번각(翻刻), 배포하도록 하여 1786년 1월 1일부터 시행되었다.\n\n내용 \n\n6전(六典)의 조문은 ≪경국대전≫을 맨\
      \ 앞에, ≪속대전≫을 그 다음에, 그리고 그 뒤의 법령 순으로 수록하고 각각 ‘원(原)’·‘속(續)’·‘증(增)’자로 표시하였다. 또한 종래 횡조로 되었던 것을 모두 종조로 바꾸었다.\n\n특히, 조종성헌존중(祖宗成憲尊重)의\
      \ 대 원칙에 따라 ≪경국대전≫이나 ≪속대전≫의 조문 중에서 공식적으로 폐지된 조문은 ‘금폐(今廢)’라고 표시하였다.\n\n그리고 숫자나 명칭이 뒤바뀌거나 오류가 명백한 것만 바로잡는 것 외에 ≪경국대전≫과\
      \ ≪속대전≫의 조문은 그대로 수록하였다.\n\n≪대전통편≫에는 이전(吏典) 212개조, 호전(戶典) 73개조, 예전(禮典) 101개조, 병전(兵典) 265개조, 형전(刑典) 60개조, 공전(工典) 12개조\
      \ 등 도합 723개 조문이 그 전의 법전에 추가되었다.\n\n≪대전통편≫의 편찬으로 ≪경국대전≫ 이후 300년만에 새로운 통일 법전이 이룩되었다. 1865년(고종 2) 9월의 조선시대 최후의 법전인 ≪대전회통≫은\
      \ ≪대전통편≫을 약간 증보한 것에 지나지 않았다.\n\n참고 문헌 \n『정조실록』\n『순조실록』\n\n같이 보기 \n 경국대전\n 속대전\n 대전회통\n\n조선의 법전\n1785년 책"
    - "아베 나츠미(, 1981년 8월 10일 ~ )는 일본 홋카이도 무로란시 출신의 가수이자 배우로, 모닝구무스메의 옛 멤버이면서 첫 메인 싱어였다. 업프런트 크리에이트(업프런트 그룹)에 소속하고 있으며, 다른\
      \ 소속사에서 가수로 활동중인 아베 아사미와는 친자매로 그녀의 언니이다.\n\n소개 \n아베 나츠미는 1981년 8월 10일에 태어났다. 그 당시 나쓰미의 친어머니가 감상한 텔레비전 드라마인 “조금 제멋대로”의\
      \ 등장인물중 주인공인 아자이 나쓰미의 이름을 원본으로 하여 이름이 지어졌다. 가수의 길을 걷고자 결심하게 된 계기는 중학교 시절에 이지메를 겪고 침울해져 있을 때 들은 라디오를 통해 흘러나온 쥬디 앤 마리의\
      \ 어릴적부터()를 들은 것이다. 그 후, 재학 중이던 홋카이도 노보리벳쓰 고등학교를 자퇴하고 1997년 오디션에 참가하지만 우승하지 못했다. 대신 함께 최종예선까지 오른 나카자와 유코, 이이다 카오리, 후쿠다\
      \ 아스카와 함께 모닝구무스메를 결성하였고 이듬해 1998년 1월 28일에 성공적으로 메이저 데뷰를 마쳤다. 같은 해 제40회 일본 레코드대상을 수상하고 NHK 홍백가합전에 출현하였다.\n\n2000년 영화\
      \ 핀치 런너에서 처음으로 배우로서 다른 멤버들과 함께 주연을 맡았고, 처음으로 크라시에 홀딩스의 샴푸 SALA의 광고에도 출연하였다. 이듬해 2001년에는 텔레비전 드라마 무카이 아라다의 동물일기 ~애견 로시난테의\
      \ 재난~에서 엔도 하루나를 연기하여 드라마 배우로도 데뷰하였다.\n\n2003년 모닝구무스메를 반으로 나눈 2개의 하위 그룹 중 모닝구무스메 사쿠라구미의 초대 리더를 맡았다. 7월 27일에 있었던 헬로! 프로젝트의\
      \ 겨울 공연 중 층쿠에 의해 모닝구무스메에서의 졸업(=탈퇴)를 발표하고 8월 13일 싱글 음반 “22歳の私”를 출시하고 솔로로 데뷰를 마쳤다. 이듬해 2004년 1월 25일, 겨울 투어를 끝으로 정식으로 무닝구무스메를\
      \ 졸업함과 동시에 모닝구무스메 사쿠라구미 또한 탈퇴하였다. 2월에 처음으로 뮤지컬 “오카에리”와 4월에 방영된 텔레비전 드라마 “강아지의 왈츠”에서도 주연 배우로서 연기하였다. 헬로! 프로젝트의 2번째 연말\
      \ 특별 그룹으로서 결성된 노치우라 나츠미에 고토 마키, 마츠우라 아야와 함께 발탁되어 활동하였다.\n\n2005년 3번째 연말 특별 그룹인 데프.디바의 멤버로 고토 마키, 이시카와 리카, 마츠우라 아야와 함께\
      \ 밭탁된다. Gyao의 인터넷 배급 드라마 “소중한 것”에서 무라다 센을 연기하였고, 센의 이름으로 주제가인 다카라노모를 불렀다.\n\n2006년, 후지테레비의 특별 드라마인 더 히트 퍼레이드 ~예능계를 바꾼\
