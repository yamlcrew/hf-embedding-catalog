      Le  REI cesse d'exister le . Ses missions sont assurées par le DCRE à Bel-Abbès.\n\nGuerre d'Indochine \nLe  Régiment\
      \ étranger renaît le . il participe au travers d'unités de combat spécialisées aux opérations que la Légion va mener\
