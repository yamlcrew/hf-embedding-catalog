    \ 2012 Lcl Damien de Besombes      \n 2014 Col Remy Rousseau\n 2016 Lcl Guillaume Dujon \n 2019 Lcl Jérôme Clée\n\nHistorique\
    \ des garnisons, campagnes et batailles\n\n1841 à 1852 \nLe  Régiment étranger ( RE) est créé en Algérie le  à partir\
    \ des trois premiers bataillons de la Légion.\n\nAu , le  RE, sous le commandement du colonel Émile Mellinet, est en garnison\
    \ à Oran en Algérie.\n\nSecond Empire \nLe , il reçoit son drapeau \"l'Empereur Napoléon III au  Etranger\" avant de partir\
    \ faire campagne en Kabylie. \n\nIl participe d'abord à la pacification de l'Algérie puis est acheminé en Crimée (1853-1856)\
    \ où il forme une brigade avec son régiment frère, le  RE, au sein de la . Il participe à la bataille de l'Alma et au\
    \ siège de Sébastopol. Son chef de corps, le colonel Vienot, est tué au combat le . Le , les ouvrages blancs sont enlevés.\
    \ Enfin, il participe à la prise de la tour de Malakoff le .\n\nLe régiment participe ensuite à la campagne d'Italie en\
    \ 1859, au sein de la  d'infanterie du  d'armée (Mac Mahon), et s'illustre lors de la bataille de Magenta. il rentre triomphalement\
    \ dan Milan libérée le .\n\nÀ son retour en Algérie, il est licencié le  par décret impérial. Ses effectifs sont reversés\
    \ au  Etranger qui change d'appellation le  et devient le Régiment étranger.\n\n1861-1867 : expédition du Mexique. Le\
    \ régiment arrive au Mexique le  et débarque le  à Veracruz. Sa  se couvre de gloire en se sacrifiant lors de la Bataille\
    \ de Camerone le . Les  et  participent au siège d'Oaxaca qui capitule en . Le  perd le   au combat de Santa Isabel. Le\
    \  de la même année, le régiment quitte le Mexique.\n\nLors de la Guerre de 1870-1871, la Légion est tardivement engagée.\
    \ C'est fin  que le régiment est intégré dans le  (, ) et se trouve engagé vers Orléans (ou le régiment refuse par 3 fois\
