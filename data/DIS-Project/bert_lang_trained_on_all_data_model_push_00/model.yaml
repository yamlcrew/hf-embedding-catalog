    Ce premier insigne du  REI (1950-1955) reprend la symbolique de la Légion étrangère avec la grenade à sept flamme et les\
    \ couleurs vert et rouge. Le numéro du régiment est indiqué dans la bombe tandis que le globe rappelle celui du monument\
    \ aux morts de la Légion étrangère à Sidi Bel Abbès.\n\nL'insigne actuel du  RE reprend la symbolique du ruban de la médaille\
    \ commémorative de l'expédition du Mexique créée en 1863. Cet insigne était initialement destiné à la  du  étranger (1936).\
    \ Il devient en 1950, l'insigne du GALE (groupement autonome de la Légion étrangère) puis enfin en 1955 celui du  RE.\n\
    \nIl s'agit d'un losange blanc sur lequel figurent les armes du Mexique (un circaète noir tenant dans ses serres un serpent\
    \ vert) et une croix de Saint-André aux couleurs de la Légion et du Mexique (le vert et le rouge).\n\nCette symbolique\
    \ du Mexique serait elle-même héritée d'une légende Aztèque concernant la fondation de Tenochtitlan. La croix est d'ailleurs\
    \ présente sur le Codex de Mendoza (Cf. article sur les Armoiries du Mexique).\n\nDrapeau \n\nLes noms des campagnes suivantes\
    \ s'inscrivent en lettres d'or sur le drapeau:\n\n Sébastopol 1855\n Kabylie 1857\n Magenta 1859\n Camerone 1863\n Extrême-Orient\
    \ 1884-1885\n Dahomey-Maroc 1892-1907-1925\n Madagascar 1895-1905\n Orient 1915-1917\n AFN 1952-1962\n\nChant \nNous sommes\
    \ tous des volontaires\n\nNous marchons gaiement en cadence,\nMalgré le vent, malgré la pluie,\nLes meilleurs soldats\
    \ de la France,\nsont là devant vous les voici.\n\n(Refrain)\nNous sommes tous des volontaires,\nLes gars du  Étranger,\n\
    Notre devise est légendaire,\nHonneur, fidélité-fidélité,\nMarchons Légionnaires,\nDans la boue, dans le sable brûlant,\n\
