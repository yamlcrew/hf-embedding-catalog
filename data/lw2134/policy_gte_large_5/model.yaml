  sentences:
  - "APPENDIX\n• OSTP conducted meetings with a variety of stakeholders in the private sector and civil society. Some of these\n\
    meetings were specifically focused on providing ideas related to the development of the Blueprint for an AI\nBill of Rights\
    \ while others provided useful general context on the positive use cases, potential harms, and/or\noversight possibilities\
    \ for these technologies. Participants in these conversations from the private sector and\ncivil society included:\nAdobe\
    \ \nAmerican Civil Liberties Union (ACLU) The Aspen Commission on Information Disorder The Awood Center The Australian\
    \ Human Rights Commission Biometrics Institute The Brookings Institute BSA | The Software Alliance Cantellus Group Center\
    \ for American Progress Center for Democracy and Technology Center on Privacy and Technology at Georgetown Law Christiana\
    \ Care Color of Change Coworker Data Robot Data Trust Alliance Data and Society Research Institute Deepmind EdSAFE AI\
    \ Alliance Electronic Privacy Information Center (EPIC) Encode Justice Equal AI Google Hitachi's AI Policy Committee The\
    \ Innocence Project Institute of Electrical and Electronics Engineers (IEEE) Intuit Lawyers Committee for Civil Rights\
    \ Under Law Legal Aid Society The Leadership Conference on Civil and Human Rights Meta Microsoft The MIT AI Policy Forum\
    \ Movement Alliance Project The National Association of Criminal Defense Lawyers O’Neil Risk Consulting & Algorithmic\
    \ Auditing The Partnership on AI Pinterest The Plaintext Group pymetrics SAP The Security Industry Association Software\
    \ and Information Industry Association (SIIA) Special Competitive Studies Project Thorn United for Respect University\
    \ of California at Berkeley Citris Policy Lab University of California at Berkeley Labor Center Unfinished/Project Liberty\
