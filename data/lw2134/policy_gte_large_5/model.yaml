  - "NOTICE & \nEXPLANATION \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe expectations for automated systems are meant\
    \ to serve as a blueprint for the development of additional \ntechnical standards and practices that are tailored for\
    \ particular sectors and contexts. \nTailored to the level of risk. An assessment should be done to determine the level\
    \ of risk of the auto -\nmated system. In settings where the consequences are high as determined by a risk assessment,\
    \ or extensive \noversight is expected (e.g., in criminal justice or some public sector settings), explanatory mechanisms\
    \ should be built into the system design so that the system’s full behavior can be explained in advance (i.e., only fully\
    \ transparent models should be used), rather than as an after-the-decision interpretation. In other settings, the extent\
    \ of explanation provided should be tailored to the risk level. \nValid. The explanation provided by a system should accurately\
    \ reflect the factors and the influences that led \nto a particular decision, and should be meaningful for the particular\
    \ customization based on purpose, target, and level of risk. While approximation and simplification may be necessary for\
    \ the system to succeed based on the explanatory purpose and target of the explanation, or to account for the risk of\
    \ fraud or other concerns related to revealing decision-making information, such simplifications should be done in a scientifically\
    \ supportable way. Where appropriate based on the explanatory system, error ranges for the explanation should be calculated\
    \ and included in the explanation, with the choice of presentation of such information balanced with usability and overall\
    \ interface complexity concerns. \nDemonstrate protections for notice and explanation \nReporting. Summary reporting should\
    \ document the determinations made based on the above consider -\nations, including: the responsible entities for accountability\
    \ purposes; the goal and use cases for the system, identified users, and impacted populations; the assessment of notice\
    \ clarity and timeliness; the assessment of the explanation's validity and accessibility; the assessment of the level\
    \ of risk; and the account and assessment of how explanations are tailored, including to the purpose, the recipient of\
    \ the explanation, and the level of risk. Individualized profile information should be made readily available to the greatest\
    \ extent possible that includes explanations for any system impacts or inferences. Reporting should be provided in a clear\
    \ plain language and machine-readable manner. \n44"
