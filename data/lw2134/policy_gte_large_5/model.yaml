  - "3 the abuse, misuse, and unsafe repurposing by humans (adversarial or not ), and  others result \nfrom interactions between\
    \ a human and an AI system.   \n• Time  scale: GAI risks  may materialize  abruptly or  across extended periods . Example\
    \ s include \nimmediate  (and/or prolonged) emotional harm  and potential risks to physical safety  due to the \ndistribution\
    \ of harmful deepfake images , or the lo ng-term eﬀect of disinformation on soci etal \ntrust in public  institutions\
    \ . \nThe presence of risks  and where they fall along the dimensions above will vary depending on the \ncharacteristics\
    \ of the GAI model , system, or use case at hand. These characteristics include but are not \nlimited to GAI model or\
    \ system architecture, training mechanisms  and libraries , data types  used for \ntraining or ﬁne -tuning , levels of\
    \ model access or availability of model weights,  and application or use \ncase context. \nOrganizations may choose to\
    \ tailor how they measure  GAI risks  based on  these characteristics . They may \nadditionally wish to  allocate risk\
    \ management resources relative to the severity and likelihood of \nnegative impact s, including where and how these risks\
    \ manifest , and their direct and material impacts  \nharms in the context of GAI use. Mitigations for model or system\
    \  level risks may diﬀer from mitigations  \nfor use-case or ecosystem level risks.  \nImportantly, some GAI risks are\
    \ un known , and are therefore diﬃcult to properly scope or evaluate given  \nthe uncertaint y about potential GAI scale,\
    \ complexity, and capabilities. Other risks may be known but  \ndiﬃcult to estimate  given the wide range of GAI stakeholders,\
    \ uses, inputs, and outputs . Challenges  with \nrisk estimation are aggravated by a lack of visibility into GAI training\
    \ data, and the generally immature \nstate of the science of AI measurement and safety  today . This document focuses\
    \ on risks for which there \nis an existing empirical evidence base at the time this proﬁle was written ; for example,\
    \  speculative risks \nthat may potentially arise in more advanced, future GAI systems are not considered . Future updates\
    \ may \nincorporate additional risks or provide further details on the risks identiﬁed below.  \nTo guide organizations\
    \ in identifying and managing GAI risks, a set of risks unique to or exacerbated by \nthe development and use of GAI are\
    \ deﬁned below.5 Each risk is  labeled according to  the outcome , \nobject,  or source of the risk  (i.e., some are risks\
    \ “to ” a subject  or domain  and others are  risks  “of” or \n“from” an issue or  theme ). These risks provide a lens\
    \  through which organizations can frame and execute \nrisk management eﬀorts.  To help streamline risk management eﬀorts,\
    \ each risk is mapped in Section 3  \n(as well as in tables in Appendix B)  to relevant Trustworthy AI Characteristics\
    \  identiﬁed in the AI RMF .  \n \n \n5 These risks can be further categorized by organizations depending on their unique\
    \ approaches to risk deﬁnition \nand management. One possible way to further categorize these risks, derived in part from\
    \ the UK’s International \nScientiﬁc Report on the Safety of Advanced AI , could be: 1 ) Technical / Model risks (or risk\
    \ from malfunction): \nConfabulation; Dangerous or Violent Recommendations; Data Privacy; Value Chain and Component Integration;\
    \ \nHarmful Bias, and Homogenization ; 2) Misuse by humans (or malicious use):  CBRN Information  or Capabilities ; \n\
    Data Privacy; Human -AI Conﬁguration; Obscene, Degrading, and/or Abusive Content; Information Integrity;  \nInformation\
    \ Security; 3) Ecosystem / societal risks (or systemic risks) : Data Privacy; Environmental; Intellectual \nProperty .\
    \ We also note that some risks are cross -cutting between these categories."
