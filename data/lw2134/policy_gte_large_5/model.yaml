    \ Worker ResourceCenterWaymap\n62"
  - "This white paper recognizes that national security (which includes certain law enforcement and \nhomeland security activities)\
    \ and defense activities are of increased sensitivity and interest to our nation’s \nadversaries and are often subject\
    \ to special requirements, such as those governing classified information and \nother protected data. Such activities\
    \ require alternative, compatible safeguards through existing policies that \ngovern automated systems and AI, such as\
    \ the Department of Defense (DOD) AI Ethical Principles and \nResponsible AI Implementation Pathway and the Intelligence\
    \ Community (IC) AI Ethics Principles and \nFramework. The implementation of these policies to national security and defense\
    \ activities can be informed by \nthe Blueprint for an AI Bill of Rights where feasible. \nThe Blueprint for an AI Bill\
