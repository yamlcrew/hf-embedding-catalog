    - "SAFE AND EFFECTIVE \nSYSTEMS \nWHY THIS PRINCIPLE IS IMPORTANT\nThis section provides a brief summary of the problems\
      \ which the principle seeks to address and protect \nagainst, including illustrative examples. \n• AI-enabled “nudification”\
      \ technology that creates images where people appear to be nude—including apps that\nenable non-technical users to create\
      \ or alter images of individuals without their consent—has proliferated at an\nalarming rate. Such technology is becoming\
      \ a common form of image-based abuse that disproportionately\nimpacts women. As these tools become more sophisticated,\
      \ they are producing altered images that are increasing -\nly realistic and are difficult for both humans and AI to\
      \ detect as inauthentic. Regardless of authenticit y, the expe -\nrience of harm to victims of non-consensual intimate\
      \ images can be devastatingly real—affecting their personal\nand professional lives, and impacting their mental and\
      \ physical health.10\n• A company installed AI-powered cameras in its delivery vans in order to evaluate the road safety\
      \ habits of its driv -\ners, but the system incorrectly penalized drivers when other cars cut them off or when other\
      \ events beyond\ntheir control took place on the road. As a result, drivers were incorrectly ineligible to receive a\
      \ bonus.11\n17"
    - "NOTICE & \nEXPLANATION \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe expectations for automated systems are meant\
      \ to serve as a blueprint for the development of additional \ntechnical standards and practices that are tailored for\
      \ particular sectors and contexts. \nTailored to the level of risk. An assessment should be done to determine the level\
      \ of risk of the auto -\nmated system. In settings where the consequences are high as determined by a risk assessment,\
      \ or extensive \noversight is expected (e.g., in criminal justice or some public sector settings), explanatory mechanisms\
      \ should be built into the system design so that the system’s full behavior can be explained in advance (i.e., only\
      \ fully transparent models should be used), rather than as an after-the-decision interpretation. In other settings,\
      \ the extent of explanation provided should be tailored to the risk level. \nValid. The explanation provided by a system\
      \ should accurately reflect the factors and the influences that led \nto a particular decision, and should be meaningful\
      \ for the particular customization based on purpose, target, and level of risk. While approximation and simplification\
      \ may be necessary for the system to succeed based on the explanatory purpose and target of the explanation, or to account\
      \ for the risk of fraud or other concerns related to revealing decision-making information, such simplifications should\
      \ be done in a scientifically supportable way. Where appropriate based on the explanatory system, error ranges for the\
      \ explanation should be calculated and included in the explanation, with the choice of presentation of such information\
      \ balanced with usability and overall interface complexity concerns. \nDemonstrate protections for notice and explanation\
      \ \nReporting. Summary reporting should document the determinations made based on the above consider -\nations, including:\
      \ the responsible entities for accountability purposes; the goal and use cases for the system, identified users, and\
      \ impacted populations; the assessment of notice clarity and timeliness; the assessment of the explanation's validity\
      \ and accessibility; the assessment of the level of risk; and the account and assessment of how explanations are tailored,\
      \ including to the purpose, the recipient of the explanation, and the level of risk. Individualized profile information\
      \ should be made readily available to the greatest extent possible that includes explanations for any system impacts\
      \ or inferences. Reporting should be provided in a clear plain language and machine-readable manner. \n44"
  - source_sentence: How does the document aim to bridge the gap between theoretical principles and practical applications
      in the context of AI rights?
    sentences:
    - "FROM \nPRINCIPLES \nTO PRACTICE \nA T ECHINCAL COMPANION TO\nTHE Blueprint for an \nAI B ILL OF RIGHTS\n12"
    - "3 the abuse, misuse, and unsafe repurposing by humans (adversarial or not ), and  others result \nfrom interactions\
      \ between a human and an AI system.   \n• Time  scale: GAI risks  may materialize  abruptly or  across extended periods\
      \ . Example s include \nimmediate  (and/or prolonged) emotional harm  and potential risks to physical safety  due to\
      \ the \ndistribution of harmful deepfake images , or the lo ng-term eﬀect of disinformation on soci etal \ntrust in\
      \ public  institutions . \nThe presence of risks  and where they fall along the dimensions above will vary depending\
      \ on the \ncharacteristics of the GAI model , system, or use case at hand. These characteristics include but are not\
      \ \nlimited to GAI model or system architecture, training mechanisms  and libraries , data types  used for \ntraining\
      \ or ﬁne -tuning , levels of model access or availability of model weights,  and application or use \ncase context.\
      \ \nOrganizations may choose to tailor how they measure  GAI risks  based on  these characteristics . They may \nadditionally\
      \ wish to  allocate risk management resources relative to the severity and likelihood of \nnegative impact s, including\
      \ where and how these risks manifest , and their direct and material impacts  \nharms in the context of GAI use. Mitigations\
      \ for model or system  level risks may diﬀer from mitigations  \nfor use-case or ecosystem level risks.  \nImportantly,\
      \ some GAI risks are un known , and are therefore diﬃcult to properly scope or evaluate given  \nthe uncertaint y about\
      \ potential GAI scale, complexity, and capabilities. Other risks may be known but  \ndiﬃcult to estimate  given the\
      \ wide range of GAI stakeholders, uses, inputs, and outputs . Challenges  with \nrisk estimation are aggravated by a\
      \ lack of visibility into GAI training data, and the generally immature \nstate of the science of AI measurement and\
      \ safety  today . This document focuses on risks for which there \nis an existing empirical evidence base at the time\
      \ this proﬁle was written ; for example,  speculative risks \nthat may potentially arise in more advanced, future GAI\
      \ systems are not considered . Future updates may \nincorporate additional risks or provide further details on the risks\
      \ identiﬁed below.  \nTo guide organizations in identifying and managing GAI risks, a set of risks unique to or exacerbated\
      \ by \nthe development and use of GAI are deﬁned below.5 Each risk is  labeled according to  the outcome , \nobject,\
      \  or source of the risk  (i.e., some are risks “to ” a subject  or domain  and others are  risks  “of” or \n“from”\
      \ an issue or  theme ). These risks provide a lens  through which organizations can frame and execute \nrisk management\
      \ eﬀorts.  To help streamline risk management eﬀorts, each risk is mapped in Section 3  \n(as well as in tables in Appendix\
      \ B)  to relevant Trustworthy AI Characteristics  identiﬁed in the AI RMF .  \n \n \n5 These risks can be further categorized\
      \ by organizations depending on their unique approaches to risk deﬁnition \nand management. One possible way to further\
      \ categorize these risks, derived in part from the UK’s International \nScientiﬁc Report on the Safety of Advanced AI\
      \ , could be: 1 ) Technical / Model risks (or risk from malfunction): \nConfabulation; Dangerous or Violent Recommendations;\
      \ Data Privacy; Value Chain and Component Integration; \nHarmful Bias, and Homogenization ; 2) Misuse by humans (or\
      \ malicious use):  CBRN Information  or Capabilities ; \nData Privacy; Human -AI Conﬁguration; Obscene, Degrading, and/or\
      \ Abusive Content; Information Integrity;  \nInformation Security; 3) Ecosystem / societal risks (or systemic risks)\
      \ : Data Privacy; Environmental; Intellectual \nProperty . We also note that some risks are cross -cutting between these\
      \ categories."
    - "5 operations , or other cyberattacks ; increas ed attack surface  for targeted cyberattacks , which may \ncompromise\
      \ a system’s availability or the conﬁdentiality or integrity of training data, code, or \nmodel weights.   \n10. Intellectual\
      \ Property:  Eased production or replication  of alleged  copyrighted, trademarked, or \nlicensed content without authorization\
      \  (possibly in situations which do not fall under fair use ); \neased exposure of trade secrets;  or plagiari sm or\
      \ illegal replication .  \n11. Obscen e, Degrading, and/or A busive Content : Eased production of and access to obscene\
      \ , \ndegrading, and/or abusive  imagery  which can cause harm , including synthetic child sexual abuse \nmaterial (CSAM)\
      \ , and nonconsensual intimate images (NCII) of adults . \n12. Value Chain and Component Integration : Non-transparent\
      \ or untraceable  integration of \nupstream third- party components, including data that has been improperly obtained\
      \ or not \nprocessed and cleaned due to increased automation from GAI; improper supplier vetting across \nthe AI lifecycle\
      \ ; or other issues that diminish transparency or accountability for downstream \nusers.  \n2.1. CBRN Information or\
      \ Capabilities  \nIn the future, GAI may enable malicious actors to more easily  access CBRN  weapons and/or relevant\
      \ \nknowledge, information , materials, tools, or technologies that could be misused  to assist in the design, \ndevelopment,\
      \ production, or use of CBRN weapons or other dangerous materials  or agents . While \nrelevant biological and chemical\
      \ threat knowledge and information is often  publicly accessible , LLMs  \ncould facilitate its analysis or synthesis\
      \ , particularly by individuals  without formal scientiﬁc training  or \nexpertise.  \nRecent research on this topic\
      \ found that LLM outputs regarding biological threat creation  and attack \nplanning  pr ovided minima l assistance\
      \  beyond traditional search engine queries, suggesting that state -of-\nthe-art LLMs at the time these studies were\
      \ conducted do not substantially  increase the operational \nlikelihood of such an attack.  The physical synthesis development,\
      \ production, and use of chemical or \nbiological agents will continue to require both applicable expertise and supporting\
      \ materials and \ninfrastructure . The impact of GAI on chemical or biological agent misuse will depend on  what the\
      \  key \nbarriers  for malicious actors  are (e.g., whether information access is one such barrier ), and how well GAI\
      \ \ncan help actors  address those barriers .  \nFurthermore , chemical and biological design tools  (BDTs)  – highly\
      \ specialized AI systems  trained on \nscientiﬁc data that aid in chemical and biological design – may augment  design\
      \ capabilities in chemistry \nand biology beyond what text -based LLMs are able to provide . As these models become\
      \ more \neﬃcacious , including for beneﬁcial uses, it will be important to assess their potential to be used for \n\
      harm, such as the ideation and design of novel harmful chemical or biological agents .  \nWhile some of these described\
      \ capabilities  lie beyond the reach  of existing GAI tools, ongoing \nassessments of this risk would be enhanced by\
      \ monitoring both  the ability of  AI tools  to facilitate CBRN \nweapons planning and GAI systems’  connection or access\
      \ to relevant data and tools . \nTrustworthy AI Characteristic : Safe , Explainable and Interpretable"
  - source_sentence: What are the key components that should be included in the ongoing monitoring procedures for automated
      systems to ensure their performance remains acceptable over time?
    sentences:
    - "AI B ILL OF RIGHTS\nFFECTIVE  SYSTEMS\nineffective systems. Automated systems should be \ncommunities, stakeholders,\
      \ and domain experts to identify \nSystems should undergo pre-deployment testing, risk \nthat demonstrate they are safe\
      \ and effective based on \nincluding those beyond the intended use, and adherence to \nprotective measures should include\
      \ the possibility of not \nAutomated systems should not be designed with an intent \nreasonably foreseeable possibility\
      \ of endangering your safety or the safety of your communit y. They should \nstemming from unintended, yet foreseeable,\
      \ uses or \n   \n \n  \n \n SECTION  TITLE\nBLUEPRINT FOR AN\nSAFE AND E \nYou should be protected from unsafe or \n\
      developed with consultation from diverse \nconcerns, risks, and potential impacts of the system. \nidentification and\
      \ mitigation, and ongoing monitoring \ntheir intended use, mitigation of unsafe outcomes \ndomain-specific standards.\
      \ Outcomes of these \ndeploying the system or removing a system from use. \nor \nbe designed to proactively protect\
      \ you from harms \nimpacts of automated systems. You should be protected from inappropriate or irrelevant data use in\
      \ the \ndesign, development, and deployment of automated systems, and from the compounded harm of its reuse. \nIndependent\
      \ evaluation and reporting that confirms that the system is safe and effective, including reporting of \nsteps taken\
      \ to mitigate potential harms, should be performed and the results made public whenever possible. \nALGORITHMIC DISCRIMINATION\
      \ P ROTECTIONS\nYou should not face discrimination by algorithms and systems should be used and designed in \nan equitable\
      \ way.  Algorithmic  discrimination occurs when automated systems contribute to unjustified \ndifferent treatment or\
      \ impacts disfavoring people based on their race, color, ethnicity, sex (including \npregnancy, childbirth, and related\
      \ medical conditions, gender identity, intersex status, and sexual \norientation), religion, age, national origin, disability,\
      \ veteran status, genetic information, or any other \nclassification protected by law. Depending on the specific circumstances,\
      \ such algorithmic  discrimination \nmay violate legal protections. Designers, developers, and deployers of automated\
      \ systems should take \nproactive and continuous measures to protect individuals and communities from algorithmic \n\
      discrimination and to use and design systems in an equitable way. This protection should include proactive \nequity\
      \ assessments as part of the system design, use of representative data and protection against proxies \nfor demographic\
      \ features, ensuring accessibility for people with disabilities in design and development, \npre-deployment and ongoing\
      \ disparity testing and mitigation, and clear organizational oversight. Independent \nevaluation and plain language\
      \ reporting in the form of an algorithmic impact assessment, including \ndisparity testing results and mitigation information,\
      \ should be performed and made public whenever \npossible to confirm these protections. \n5"
    - "DATA PRIVACY \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe expectations for automated systems are meant to serve\
      \ as a blueprint for the development of additional \ntechnical standards and practices that are tailored for particular\
      \ sectors and contexts. \nIn addition to the privacy expectations above for general non-sensitive data, any system collecting,\
      \ using, shar-\ning, or storing sensitive data should meet the expectations belo w. Depending on the technological use\
      \ case and \nbased on an ethical assessment, consent for sensitive data may need to be acquired from a guardian and/or\
      \ child. \nProvide enhanced protections for data related to sensitive domains \nNecessar y function s only . Sensitive\
      \ data should only be used for functions strictly necessary for that \ndomain or for functions that are required for\
      \ administrative reasons (e.g., school attendance records), unless \nconsent is acquired, if appropriate, and the additional\
      \ expectations in this section are met. Consent for non-\nnecessary functions should be optional, i.e., should not be\
      \ required, incentivized, or coerced in order to \nreceive opportunities or access to services. In cases where data\
      \ is provided to an entity (e.g., health insurance \ncompany) in order to facilitate payment for such a need, that data\
      \ should only be used for that purpose. \nEthical review and use prohibitions. Any use of sensitive data or decision\
      \ process based in part on sensi-\ntive data that might limit rights, opportunities, or access, whether the decision\
      \ is automated or not, should go \nthrough a thorough ethical review and monitoring, both in advance and by periodic\
      \ review (e.g., via an indepen-\ndent ethics committee or similarly robust process). In some cases, this ethical review\
      \ may determine that data \nshould not be used or shared for specific uses even with consent. Some novel uses of automated\
      \ systems in this \ncontext, where the algorithm is dynamically developing and where the science behind the use case\
      \ is not well \nestablished, may also count as human subject experimentation, and require special review under organizational\
      \ \ncompliance bodies applying medical, scientific, and academic human subject experimentation ethics rules and \ngovernance\
      \ procedures. \nData  quality. In sensitive domains, entities should be especially careful to maintain the quality of\
      \ data to \navoid adverse consequences arising from decision-making based on flawed or inaccurate data. Such care is\
      \ \nnecessary in a fragmented, complex data ecosystem and for datasets that have limited access such as for fraud \n\
      prevention and law enforcement. It should be not left solely to individuals to carry the burden of reviewing and \n\
      correcting data. Entities should conduct regula r, independent audits and take prompt corrective measures to \nmaintain\
      \ accurate, timel y, and complete data. \nLimit access  to sensitive  data  and derived data. Sensitive data and derived\
      \ data should not be sold, \nshared, or made public as part of data brokerage or other agreements. Sensitive data includes\
      \ data that can be \nused to infer sensitive information; even systems that are not directly marketed as sensitive domain\
      \ technologies \nare expected to keep sensitive data private. Access to such data should be limited based on necessity\
      \ and based \non a principle of local control, such that those individuals closest to the data subject have more access\
      \ while \nthose who are less proximate do not (e.g., a teacher has access to their students’ daily progress data while\
      \ a \nsuperintendent does not). \nReporting.  In addition to the reporting on data privacy (as listed above for non-sensitive\
      \ data), entities devel-\noping technologies related to a sensitive domain and those collecting, using, storing, or\
      \ sharing sensitive data \nshould, whenever appropriate, regularly provide public reports describing: any data security\
      \ lapses or breaches \nthat resulted in sensitive data leaks; the numbe r, type, and outcomes of ethical pre-reviews\
      \ undertaken; a \ndescription of any data sold, shared, or made public, and how that data was assessed to determine\
      \ it did not pres-\nent a sensitive data risk; and ongoing risk identification and management procedures, and any mitigation\
      \ added \nbased on these procedures. Reporting should be provided in a clear and machine-readable manne r. \n38"
    - "SAFE AND EFFECTIVE \nSYSTEMS \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe expectations for automated systems\
      \ are meant to serve as a blueprint for the development of additional \ntechnical standards and practices that are tailored\
      \ for particular sectors and contexts. \nOngoing monitoring. Automated systems should have ongoing monitoring procedures,\
      \ including recalibra -\ntion procedures, in place to ensure that their performance does not fall below an acceptable\
      \ level over time, \nbased on changing real-world conditions or deployment contexts, post-deployment modification, or\
      \ unexpect -\ned conditions. This ongoing monitoring should include continuous evaluation of performance metrics and\
      \ harm assessments, updates of any systems, and retraining of any machine learning models as necessary, as well as ensuring\
      \ that fallback mechanisms are in place to allow reversion to a previously working system. Monitor\n-\ning should take\
      \ into account the performance of both technical system components (the algorithm as well as any hardware components,\
      \ data inputs, etc.) and human operators. It should include mechanisms for testing the actual accuracy of any predictions\
      \ or recommendations generated by a system, not just a human operator’s determination of their accuracy. Ongoing monitoring\
      \ procedures should include manual, human-led monitor\n-\ning as a check in the event there are shortcomings in automated\
      \ monitoring systems. These monitoring proce -\ndures should be in place for the lifespan of the deployed automated\
      \ system. \nClear organizational oversight. Entities responsible for the development or use of automated systems should\
      \ lay out clear governance structures and procedures.  This includes clearly-stated governance proce\n-\ndures before\
      \ deploying the system, as well as responsibility of specific individuals or entities to oversee ongoing assessment\
      \ and mitigation. Organizational stakeholders including those with oversight of the business process or operation being\
      \ automated, as well as other organizational divisions that may be affected due to the use of the system, should be\
      \ involved in establishing governance procedures. Responsibility should rest high enough in the organization that decisions\
      \ about resources, mitigation, incident response, and potential rollback can be made promptly, with sufficient weight\
      \ given to risk mitigation objectives against competing concerns. Those holding this responsibility should be made aware\
      \ of any use cases with the potential for meaningful impact on people’s rights, opportunities, or access as determined\
      \ based on risk identification procedures.  In some cases, it may be appropriate for an independent ethics review to\
      \ be conducted before deployment. \nAvoid inappropriate, low-quality, or irrelevant data use and the compounded harm\
      \ of its reuse \nRelevant and high-quality data. Data used as part of any automated system’s creation, evaluation, or\
      \ \ndeployment should be relevant, of high quality, and tailored to the task at hand. Relevancy should be \nestablished\
      \ based on research-backed demonstration of the causal influence of the data to the specific use case \nor justified\
      \ more generally based on a reasonable expectation of usefulness in the domain and/or for the \nsystem design or ongoing\
      \ development. Relevance of data should not be established solely by appealing to \nits historical connection to the\
      \ outcome. High quality and tailored data should be representative of the task at \nhand and errors from data entry\
      \ or other sources should be measured and limited. Any data used as the target \nof a prediction process should receive\
      \ particular attention to the quality and validity of the predicted outcome \nor label to ensure the goal of the automated\
      \ system is appropriately identified and measured. Additionally , \njustification should be documented for each data\
      \ attribute and source to explain why it is appropriate to use \nthat data to inform the results of the automated system\
      \ and why such use will not violate any applicable laws. \nIn cases of high-dimensional and/or derived attributes, such\
      \ justifications can be provided as overall \ndescriptions of the attribute generation process and appropriateness.\
      \ \n19"
  - source_sentence: What are the key principles and frameworks mentioned in the white paper that govern the implementation
      of AI in national security and defense activities?
    sentences:
    - "APPENDIX\n• OSTP conducted meetings with a variety of stakeholders in the private sector and civil society. Some of\
      \ these\nmeetings were specifically focused on providing ideas related to the development of the Blueprint for an AI\n\
      Bill of Rights while others provided useful general context on the positive use cases, potential harms, and/or\noversight\
      \ possibilities for these technologies. Participants in these conversations from the private sector and\ncivil society\
      \ included:\nAdobe \nAmerican Civil Liberties Union (ACLU) The Aspen Commission on Information Disorder The Awood Center\
      \ The Australian Human Rights Commission Biometrics Institute The Brookings Institute BSA | The Software Alliance Cantellus\
      \ Group Center for American Progress Center for Democracy and Technology Center on Privacy and Technology at Georgetown\
      \ Law Christiana Care Color of Change Coworker Data Robot Data Trust Alliance Data and Society Research Institute Deepmind\
      \ EdSAFE AI Alliance Electronic Privacy Information Center (EPIC) Encode Justice Equal AI Google Hitachi's AI Policy\
      \ Committee The Innocence Project Institute of Electrical and Electronics Engineers (IEEE) Intuit Lawyers Committee\
      \ for Civil Rights Under Law Legal Aid Society The Leadership Conference on Civil and Human Rights Meta Microsoft The\
      \ MIT AI Policy Forum Movement Alliance Project The National Association of Criminal Defense Lawyers O’Neil Risk Consulting\
      \ & Algorithmic Auditing The Partnership on AI Pinterest The Plaintext Group pymetrics SAP The Security Industry Association\
      \ Software and Information Industry Association (SIIA) Special Competitive Studies Project Thorn United for Respect\
      \ University of California at Berkeley Citris Policy Lab University of California at Berkeley Labor Center Unfinished/Project\
      \ Liberty Upturn US Chamber of Commerce US Chamber of Commerce Technology Engagement Center \nA.I. Working Group\nVibrent\
      \ HealthWarehouse Worker ResourceCenterWaymap\n62"
    - "This white paper recognizes that national security (which includes certain law enforcement and \nhomeland security\
      \ activities) and defense activities are of increased sensitivity and interest to our nation’s \nadversaries and are\
      \ often subject to special requirements, such as those governing classified information and \nother protected data.\
      \ Such activities require alternative, compatible safeguards through existing policies that \ngovern automated systems\
      \ and AI, such as the Department of Defense (DOD) AI Ethical Principles and \nResponsible AI Implementation Pathway\
      \ and the Intelligence Community (IC) AI Ethics Principles and \nFramework. The implementation of these policies to\
      \ national security and defense activities can be informed by \nthe Blueprint for an AI Bill of Rights where feasible.\
      \ \nThe Blueprint for an AI Bill of Rights is not intended to, and does not, create any legal right, benefit, or \n\
      defense, substantive or procedural, enforceable at law or in equity by any party against the United States, its \ndepartments,\
      \ agencies, or entities, its officers, employees, or agents, or any other person, nor does it constitute a \nwaiver\
      \ of sovereign immunity. \nCopyright Information \nThis document is a work of the United States Government and is in\
      \ the public domain (see 17 U.S.C. §105). \n2"
