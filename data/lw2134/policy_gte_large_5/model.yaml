  - "DATA PRIVACY \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe expectations for automated systems are meant to serve\
    \ as a blueprint for the development of additional \ntechnical standards and practices that are tailored for particular\
    \ sectors and contexts. \nIn addition to the privacy expectations above for general non-sensitive data, any system collecting,\
    \ using, shar-\ning, or storing sensitive data should meet the expectations belo w. Depending on the technological use\
    \ case and \nbased on an ethical assessment, consent for sensitive data may need to be acquired from a guardian and/or\
    \ child. \nProvide enhanced protections for data related to sensitive domains \nNecessar y function s only . Sensitive\
    \ data should only be used for functions strictly necessary for that \ndomain or for functions that are required for administrative\
    \ reasons (e.g., school attendance records), unless \nconsent is acquired, if appropriate, and the additional expectations\
    \ in this section are met. Consent for non-\nnecessary functions should be optional, i.e., should not be required, incentivized,\
    \ or coerced in order to \nreceive opportunities or access to services. In cases where data is provided to an entity (e.g.,\
    \ health insurance \ncompany) in order to facilitate payment for such a need, that data should only be used for that purpose.\
    \ \nEthical review and use prohibitions. Any use of sensitive data or decision process based in part on sensi-\ntive data\
    \ that might limit rights, opportunities, or access, whether the decision is automated or not, should go \nthrough a thorough\
    \ ethical review and monitoring, both in advance and by periodic review (e.g., via an indepen-\ndent ethics committee\
    \ or similarly robust process). In some cases, this ethical review may determine that data \nshould not be used or shared\
    \ for specific uses even with consent. Some novel uses of automated systems in this \ncontext, where the algorithm is\
    \ dynamically developing and where the science behind the use case is not well \nestablished, may also count as human\
    \ subject experimentation, and require special review under organizational \ncompliance bodies applying medical, scientific,\
    \ and academic human subject experimentation ethics rules and \ngovernance procedures. \nData  quality. In sensitive domains,\
    \ entities should be especially careful to maintain the quality of data to \navoid adverse consequences arising from decision-making\
    \ based on flawed or inaccurate data. Such care is \nnecessary in a fragmented, complex data ecosystem and for datasets\
    \ that have limited access such as for fraud \nprevention and law enforcement. It should be not left solely to individuals\
    \ to carry the burden of reviewing and \ncorrecting data. Entities should conduct regula r, independent audits and take\
    \ prompt corrective measures to \nmaintain accurate, timel y, and complete data. \nLimit access  to sensitive  data  and\
    \ derived data. Sensitive data and derived data should not be sold, \nshared, or made public as part of data brokerage\
    \ or other agreements. Sensitive data includes data that can be \nused to infer sensitive information; even systems that\
    \ are not directly marketed as sensitive domain technologies \nare expected to keep sensitive data private. Access to\
    \ such data should be limited based on necessity and based \non a principle of local control, such that those individuals\
    \ closest to the data subject have more access while \nthose who are less proximate do not (e.g., a teacher has access\
    \ to their students’ daily progress data while a \nsuperintendent does not). \nReporting.  In addition to the reporting\
    \ on data privacy (as listed above for non-sensitive data), entities devel-\noping technologies related to a sensitive\
    \ domain and those collecting, using, storing, or sharing sensitive data \nshould, whenever appropriate, regularly provide\
    \ public reports describing: any data security lapses or breaches \nthat resulted in sensitive data leaks; the numbe r,\
    \ type, and outcomes of ethical pre-reviews undertaken; a \ndescription of any data sold, shared, or made public, and\
    \ how that data was assessed to determine it did not pres-\nent a sensitive data risk; and ongoing risk identification\
    \ and management procedures, and any mitigation added \nbased on these procedures. Reporting should be provided in a clear\
    \ and machine-readable manne r. \n38"
  - "SAFE AND EFFECTIVE \nSYSTEMS \nWHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe expectations for automated systems are\
    \ meant to serve as a blueprint for the development of additional \ntechnical standards and practices that are tailored\
    \ for particular sectors and contexts. \nOngoing monitoring. Automated systems should have ongoing monitoring procedures,\
    \ including recalibra -\ntion procedures, in place to ensure that their performance does not fall below an acceptable\
    \ level over time, \nbased on changing real-world conditions or deployment contexts, post-deployment modification, or\
    \ unexpect -\ned conditions. This ongoing monitoring should include continuous evaluation of performance metrics and harm\
    \ assessments, updates of any systems, and retraining of any machine learning models as necessary, as well as ensuring\
    \ that fallback mechanisms are in place to allow reversion to a previously working system. Monitor\n-\ning should take\
    \ into account the performance of both technical system components (the algorithm as well as any hardware components,\
    \ data inputs, etc.) and human operators. It should include mechanisms for testing the actual accuracy of any predictions\
    \ or recommendations generated by a system, not just a human operator’s determination of their accuracy. Ongoing monitoring\
    \ procedures should include manual, human-led monitor\n-\ning as a check in the event there are shortcomings in automated\
    \ monitoring systems. These monitoring proce -\ndures should be in place for the lifespan of the deployed automated system.\
    \ \nClear organizational oversight. Entities responsible for the development or use of automated systems should lay out\
    \ clear governance structures and procedures.  This includes clearly-stated governance proce\n-\ndures before deploying\
    \ the system, as well as responsibility of specific individuals or entities to oversee ongoing assessment and mitigation.\
    \ Organizational stakeholders including those with oversight of the business process or operation being automated, as\
    \ well as other organizational divisions that may be affected due to the use of the system, should be involved in establishing\
    \ governance procedures. Responsibility should rest high enough in the organization that decisions about resources, mitigation,\
    \ incident response, and potential rollback can be made promptly, with sufficient weight given to risk mitigation objectives\
    \ against competing concerns. Those holding this responsibility should be made aware of any use cases with the potential\
    \ for meaningful impact on people’s rights, opportunities, or access as determined based on risk identification procedures.\
    \  In some cases, it may be appropriate for an independent ethics review to be conducted before deployment. \nAvoid inappropriate,\
    \ low-quality, or irrelevant data use and the compounded harm of its reuse \nRelevant and high-quality data. Data used\
    \ as part of any automated system’s creation, evaluation, or \ndeployment should be relevant, of high quality, and tailored\
    \ to the task at hand. Relevancy should be \nestablished based on research-backed demonstration of the causal influence\
    \ of the data to the specific use case \nor justified more generally based on a reasonable expectation of usefulness in\
    \ the domain and/or for the \nsystem design or ongoing development. Relevance of data should not be established solely\
    \ by appealing to \nits historical connection to the outcome. High quality and tailored data should be representative\
    \ of the task at \nhand and errors from data entry or other sources should be measured and limited. Any data used as the\
    \ target \nof a prediction process should receive particular attention to the quality and validity of the predicted outcome\
    \ \nor label to ensure the goal of the automated system is appropriately identified and measured. Additionally , \njustification\
    \ should be documented for each data attribute and source to explain why it is appropriate to use \nthat data to inform\
    \ the results of the automated system and why such use will not violate any applicable laws. \nIn cases of high-dimensional\
    \ and/or derived attributes, such justifications can be provided as overall \ndescriptions of the attribute generation\
    \ process and appropriateness. \n19"
