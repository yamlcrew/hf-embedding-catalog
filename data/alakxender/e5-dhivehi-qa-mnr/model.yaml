- source_sentence: 'query: ދިވެހިރާއްޖޭގައި އޮންނަންވާނީ ކޮން ދީނެއް؟'
  sentences:
  - 'passage: އަޅުގަނޑުމެން އެންމެން ގަބޫލުކުރޭ، ދިވެހިރާއްޖޭގައި އޮންނަންވާނީ އިސްލާމްދީންކަން. އަޅުގަނޑުމެން އެންމެން ގަބޫލުކުރޭ،
    އެހެން ދީންތަކަށް ޖާގަދޭން ނުޖެހޭކަން.'
  - 'passage: ރަށުގައި މިހާރަށްވުރެ ގިނައިން ދިވެހި ރުކާއި، ބަނބުކެޔޮ، ފަތްކެޔޮ، ރޯމިރުސް، ބަށި، ފަޅޯފަދަ ރަށުގައި ހެދޭ ބާވަތްތައް
    އިންދައި ހެއްދުމުގެ މަސައްކަތްތައްވެސް އިތުރުކުރެވިދާނެ ކަމަށް ރަށުގެ ވެރިންގެ ފަރާތުން އަޅުގަނޑަށް އެނގިފައި އެބައޮތް.'
  - 'passage: އޭގެކުރިން އިބްތިހާލްގެ މަންމަ އާފިޔާ މުހައްމަދަށް ޖިންސީ ގޯނާ ކުރިކަމުގެ ތުހުމަތު ވެސް ރައޫފްގެ މައްޗަށް ކުރެވިގެން،
    އެ މައްސަލާގައި އޭނާގެ މައްޗަށް ދައުވާކުރަން ޕްރޮސެކިއުޓާ ޖެނެރަލްގެ އޮފީހަށް ފޮނުވި އެވެ. އެކަމަކު އެ މައްސަލާގައި މިހާތަނަށް
    ދައުވާއެއް ނުއުފުލަ އެވެ.'
- source_sentence: 'query: އައްސުލްޠާން މުޙައްމަދު ޝަމްސުއްދީން (3) އަރުވައިލައްވައިފައި ހުންނަވަނިކޮށް މާލެ ގެންނެވީ ކޮން
    ތާރީޚެއްގައި؟'
  sentences:
  - 'passage: އައްސުލްޠާން މުޙައްމަދު ޝަމްސުއްދީން (3) އަރުވައިލެއްވުމަށްފަހު، އެމަނިކުފާނު އަނބުރާ މާލެ ގެންނެވީ 17 ޖުލައި
    1946 ގައެވެ. އެމަނިކުފާނު އަރުވައިލައްވާފައި ހުންނެވި މުއްދަތުގައި ރާއްޖޭގެ ކަންތައްތައް ބަލަހައްޓަވަމުން ގެންދެވީ ވަގުތީ
    ސަރުކާރަކުންނެވެ.'
  - 'passage: "ސިއްހީ ހިދުމަތުގެ ފަންނީ މަސައްކަތްތެރިން" ނުވަތަ "ސިއްހީ މަސައްކަތްތެރިން" ކަމަށް ބުނެފައި އެވަނީ، ސިއްހީ
    ހިދުމަތުގެ ފަންނީ މަސައްކަތްތެރިންގެ ތެރޭގައި ހިމެނޭ މެޑިކަލް ޕްރެކްޓިށަނަރުންނާއި، ނަރުހުންނާއި، އެލައިޑް ހެލްތު ޕްރޮފެށަނަލުންނަށެވެ.
    އާންމު ސިއްހަތުގެ ކުއްލި ނުރައްކަލުގެ ގާނޫނު (ގާނޫނު ނަންބަރު 20/2020) ގެ 13 ވަނަ މާއްދާގެ (ނ) ގެ (1)'
  - 'passage: "އަނިޔާ" ކަމަށް ބުނެފައި އެވަނީ، ޖިސްމާނީގޮތުން ނުވަތަ މާއްދީގޮތުން ނުވަތަ މީހެއްގެ ފުރާނައަށް ނުވަތަ ހަށިގަނޑަށް
    ގެއްލުމެއް ނުވަތަ ހާނިއްކައެއް ދިނުމަށެވެ. ނުވަތަ ނަފްސާނީ ދުޅަހެޔޮކަމަށް އުނިކަމެއް ދިނުމަށެވެ. ގާނޫނު ނަންބަރު 17/2014
    (ޖިންސީ ކުށުގެ ގާނޫނު) ގެ 69 ވަނަ މާއްދާ ގެ (ރ)'
- source_sentence: 'query: އެއަރޕޯޓް އަނބުރާ ހޯދަން ކިތައް މިލިއަން ޑޮލަރު ޚަރަދުކުރިތޯ؟'
  sentences:
  - 'passage: ވޭތުވެދިޔަ ހަފްތާގައި ވޯކަރސް ޑިމޮކްރެޓިކް ކޮންގްރެސް (ޑަބްލިޔު.ޑީ.ސީ) ގެ މެންބަރުން ރައީސުލްޖުމްހޫރިއްޔާއާ
    ބައްދަލުކުރިއެވެ. މި ބައްދަލުވުމުގައި އެ ބޭފުޅުން ވަނީ އެތައް ކަމެއްގެ ކަންބޮޑުވުން ފާޅުކުރައްވާފައެވެ. ޚާއްޞަކޮށް އެ
    ބޭފުޅުންނަށް ލިބެންޖެހޭ އިނާޔަތްތަކާއި ރަމަޟާން މަހުގެ އިނާޔަތް ނުލިބޭތީ ވަރަށް ބޮޑަށް ކަންބޮޑުވުން ފާޅުކުރެއްވިއެވެ.
    މި ބައްދަލުވުމުގައި އެހެނިހެން ކަންތައްތަކާ ބެހޭގޮތުންވެސް މަޝްވަރާކުރެވުނެވެ.'
  - 'passage: އެއަރޕޯޓް 78 މިލިއަން ޑޮލަރަށް ވިއްކާލާފައި، އަނބުރާ ހޯދަން 320 މިލިއަން ޑޮލަރު ސަރުކާރުން ޚަރަދު ކޮށްފައިވެއެވެ.'
  - 'passage: މިހާރު ރާއްޖޭގައި އިންޖީނު ބެހެއްޓި އެއްހާސް ދުއިސައްތަ މަސްދޯނި އެބަހުރި. އޭގެތެރެއިން އެވްރެޖްކޮށް ދުވާލެއްގެ
    މައްޗަށް މަހަށް ފުރާ ކަމަށްވަނީ ގާތްގަނޑަކަށް ދުއިސައްތަ ދޯނި.'
- source_sentence: 'query: އެވޯޑު ދޭން ހަމަޖެހިފައިވަނީ ކޮން ކެޓަގަރީތަކަކުން؟'
  sentences:
  - 'passage: ކަންކަމާ ކުރިމަތިލާން ނުކެރުމަކީ، އިންސާނުންގެ ކިބައިގައި ހުންނަ ބަލިކަށި ސިފައެކެވެ. މި ސިފައިގެ ސަބަބުން،
    ކާމިޔާބު އޮންނާނީ، އޭނާގެ ނަޒަރުން ރެކި، މާ ދުރުގައި ބޮނދައެވެ.'
  - 'passage: "ނޭދެވޭ އަމަލު" ކަމަށް ބުނެފައި އެވަނީ، ވިސްލްބްލޯކުރާ ފަރާތްތައް ރައްކާތެރިކުރުމުގެ ގާނޫނު (ގާނޫނު ނަންބަރު
    16/2019) ގެ 3 ވަނަ މާއްދާގައި ތަފްސީލުކޮށްފައިވާ ފަދަ ކޮންމެ އަމަލެކެވެ. ވިސްލްބްލޯކުރާ ފަރާތްތައް ރައްކާތެރިކުރުމުގެ
    ގާނޫނު (ގާނޫނު ނަންބަރު 16/2019) ގެ 31 ވަނަ މާއްދާގެ (ދ)'
  - 'passage: މިދިޔަ އަހަރު ނޫސްވެރިކަމުގައި ނޫސްވެރިން ކޮށްފައިވާ މަސައްކަތްތަކަށް ބަލައިގެން ތިން ކެޓަގަރީއަކުން އެ އެވޯޑު
    ދޭން ހަމަޖައްސާފައިވާ ކަމަށް ވެސް އޭނާ ވިދާޅުވި އެވެ. އޭގެ ތެރޭގައި ހިމެނެނީ ޓީވީ އާއި ރޭޑިއޯ އަދި ނޫސް މަޖައްލާތަކުންނެވެ.'
- source_sentence: 'query: އަކްރަމުގެ ދިރިއުޅުމަށް އައި ބަދަލުތަކަކީ ކޮބައިތޯ؟'
  sentences:
  - 'passage: ދިވެހިރާއްޖޭގެ އެންމެ ނަންހިނގާފައިވާ ޤާޟީންގެ ތެރެއިން އެއް ބޭކަލެއް ކަމުގައިވާ އަލްޤާޟީ ޙަސަން ތާޖުއްދީން
    އަވަހާރަވުމުން، އެ މަރުޙޫމްގެ ހަށިކޮޅު ވަނީ މާލޭގެ ހުކުރު މިސްކިތުގައި ފަސްދާނުލެވިފައެވެ. އެ މިސްކިތަކީ ރާއްޖޭގެ އެންމެ
    ގިނަ ޢިލްމުވެރިން ފަސްދާނުލެވިފައިވާ ތަންތަނުގެ ތެރެއިން އެއް ތަނެވެ.'
  - 'passage: ސިވިލް ސަރވިސްގެ މުވައްޒަފުން މަޢުލޫމާތު ހާމަކުރުމުގައި ޢަމަލުކުރަންވާނީ ތިރީގައިވާ އުޞޫލުތަކުގެ މަތިންނެވެ.
    ޤާނޫނާ ގަވާއިދާ އެއްގޮތްވާގޮތުގެމަތިން، މަޢުލޫމާތު ދޭންޖެހޭ ކޮންމެ ޙާލަތެއްގައި ތެދު މަޢުލޫމާތު ދިނުން.'
  - 'passage: މިގޮތުގެމަތިން އަކްރަމަށް ލިބުނު ޖަވާހިރުތައް ވިއްކައި، ލިބުނު ގިނަގުނަ ފައިސާއިން ޖަވާހިރުގެ ވިޔަފާރިފަށައި،
    ބައްޕައެކޭ އެއްފަދައިން މަޝްހޫރު ވިޔަފާރިވެރިއަކަށް ވެއްޖެއެވެ. އަދި އަކްރަމާއި ޢާއިލާގެ ދިރިއުޅުން ކުރިއެކޭވެސް އެއްފަދަ
    ތަނަވަސް ދިރިއުޅުމަކަށް ބަދަލުވެގެން ހިނގައްޖެއެވެ.'
