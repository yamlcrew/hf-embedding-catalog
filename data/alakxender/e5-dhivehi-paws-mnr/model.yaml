widgetData:
- source_sentence: 'query: ނަމަވެސް ފާޑުކިޔުންތެރިން ބުނަމުން ދިޔައީ ޕާޝިންގ އަށް ކޮމާންޑް ކުރަނީ ސަފުތަކުގެ މާ ފަހަތުގައި
    ކަމަށާއި ފާޑުކިޔާފައިވަނީ އަމިއްލައަށް ސިފައިން ހަނގުރާމައަށް ގެންދިޔަ ކޮމާންޑަރުންނަށް ކަމަށެވެ .'
  sentences:
  - 'query: ފުރަތަމަ ރެކޯޑް ކުރީ ލޮރެއިން ކޯޕްލެންޑް 1954 ވަނަ އަހަރު އޭގެ ފަހުން އޭ ކުޝްކޭ އާއި ޖޭ އެވެ .'
  - 'query: ނަމަވެސް ފާޑުކިޔުންތެރިން ބުނަމުން ދިޔައީ ޕާޝިންގް ލީޑް ކުރަމުން ދިޔައީ ލައިންތަކުގެ ވަރަށް ފަހަތުން ކަމަށާއި
    ހަނގުރާމައިގެ ތެރެއަށް ސިފައިން އަމިއްލައަށް ކޮމާންޑް ކުރާ ކޮމާންޑަރުންނަށް ފާޑުކިޔާ ކަމަށެވެ .'
  - 'query: ގްރާޒް އިން ފަލްސަފާ ކިޔަވައި ވިއެނާ އާއި ޕަޑޫއާ އިން މެޑިސިން ކިޔަވައި ވިދާޅުވި އެވެ .'
- source_sentence: 'query: ރަންޖިތު ސިންގް ( ރޯހްތާސް ) އަށް ހިނގާފައި ގޮސް އެތަނުން ( ރަވަލްޕިންޑީ ) އަށް ގޮސް ( ސަރައި ކަލާ
    ) މެދުވެރިކޮށް ސިރިކޯޓަށް އާދެވުނެވެ .'
  sentences:
  - 'query: ރަންޖިތު ސިންގް ހިނގައިގަތީ ( ރޯހްތާސް ) އަށް , އެތަނުން ރަވަލްޕިންޑީ އަށް އަދި ( ސަރައި ކަލާ ) މެދުވެރިކޮށް ސިރިކޯޓަށް
    .'
  - 'query: ޖުއާން ކޮލޮމަރ އޭނާގެ މަސައްކަތްތައް ޝާއިޢުކުރައްވަނީ ސްވިޒަލޭންޑްގެ އެޑިޝަންސް ބިމް އާއި އެޑިޓޯރިއަލް ޕައިލްސް
    އާއި ޓްރިޓޯ އަދި ސްޕެއިންގެ ރިވެރާ އެޑިޓަރުންނާ އެކުގައެވެ .'
  - 'query: އޭނާ އުފަންވެވަޑައިގަތީ އޮކްޓޯބަރ 23 , 1806 ގައި ނިއުޔޯކުގެ އީސްޓް ބްރޯޑްވޭ އަށެވެ .'
- source_sentence: 'query: އައިޑީޖީސީ ހޯލްޑިންގގެ މައިގަނޑު އިންވެސްޓްމަންޓް ޕްރޮގްރާމްގެ ދަށުން 2011 ވަނަ އަހަރަށް ކޮންސޮލިޑޭޓް
    ކުރެވިފައިވާ މަޝްރޫޢުތަކަކީ ތިރީގައި މިވާ މަޝްރޫޢުތަކެވެ.'
  sentences:
  - 'query: އައިޑީޖީސީ ހޯލްޑިންގެ މައިގަނޑު އިންވެސްޓްމަންޓް ޕްރޮގްރާމްގެ ދަށުން 2011 ވަނަ އަހަރަށް ކޮންސޮލިޑޭޓް ކުރެވިފައިވާ
    މަޝްރޫއުތަކަކީ ތިރީގައި މިވާ މަޝްރޫއުތަކެވެ.'
  - 'query: އެ ޓީމުން ވަނީ 2011 ވަނަ އަހަރުގެ ފަހު އަހަރުތަކުގައި ހަވާއީ , ރަޓްޖާސް , އަޔަވާ , މިސިސިޕީ ސްޓޭޓް , ނެބްރަސްކާ
    , ކޮނެކްޓިކަޓް , ސައިރަކިއުސް އަދި ޕިޓްސްބާގް ފަދަ ޓީމުތަކާ ކުޅެފަ އެވެ .'
  - 'query: ހަނގުރާމައިގެ އެންމެ ފަހު ދުވަސްތަކާ ހަމައަށް އާޖެންޓީނާ ސަރުކާރުން ނިއުޓްރަލް ނަމަވެސް 1945 ވަނަ އަހަރު ވިޗީ
    އާއި ފްރާންސް އާއި ބެލްޖިއަމް އަދި ޖަރުމަނުން ފިލައިގެން ދިޔަ ނާޒީ ލީޑަރުން ވަދެވަޑައިގަތުމަށް މަޑުމަޑުން ތަޙައްމަލު ކުރިއެވެ
    .'
- source_sentence: 'query: ނަމަވެސް މައިލްޑް ވާޝަން ދޫކޮށްލީ އަސްލު އެޑިޝަންގެ ފަރާތުންނެވެ .'
  sentences:
  - 'query: ރޮނީ ފީލްޑްސް އެންބީއޭގައި ވެސް އަދި އެންސީއޭއޭގައި ވެސް އެންމެ މެޗެއް ނުކުޅެ އެވެ .'
  - 'query: ނަމަވެސް އޭގެ މަޑު ވަރޝަން ދޫކޮށްލީ އަސްލު އެޑިޝަންގެ ފަރާތުންނެވެ .'
  - 'query: 2007 ވަނަ އަހަރު މަތީ ފިޝަރ އެއް އަހަރު ދުވަހު އުޅުމަށްފަހު މި ބޭންޑާ ގުޅުނުއިރު، ޖެންސް ރަމޮން ވަކިވިއެވެ .'
- source_sentence: 'query: މި މާނަ ތިރީގައިވާ ގޮތަށް އެއްވެސް ( ސްޓޭންޑަރޑް ނުވަތަ ނޮން ސްޓޭންޑަރޑް ) ނުކުތާއަކަށް ފުޅާކުރެވިދާނެއެވެ
    :'
  sentences:
  - 'query: ޑޮންގް ޒާއޯ އަކީ `` ޝިއޯލިއަން '''' އެއް ކަމަށާއި އޭނާގެ ފުރަތަމަ އަހަރުތަކުގައި ހަނގުރާމަވެރިޔާ ޔުއާން ޝާއޯގެ
    ދަށުން ޑިސްޓްރިކްޓް އޮފިޝަލްގެ މަގާމު އަދާކުރެއްވުމުގެ ކުރިން އޭނާ ވަނީ އަސްކަރީ ލަފާދޭ މީހަކަށް ޕްރޮމޯޓްވެފަ އެވެ .'
  - 'query: ނަރެޓިވްގައި ދެން އަންނަ ސީޒަނާއި މިހާރުގެ ސީޒަނާ ދެމެދު އަޅުގަނޑުމެންނަށް އެނގުނީ ގުއިޑޯ މަރުވެފައިވަނީ ކާރު
    އެކްސިޑެންޓެއްގެ ސަބަބުން ކަމަށެވެ .'
  - 'query: އެ މާނަ އަމިއްލައަށް ފުޅާކުރެވޭ ( ސްޓޭންޑަރޑް ނުވަތަ ނޮން ސްޓޭންޑަރޑް ) ޕޮއިންޓްތަކަށް ތިރީގައިވާ ގޮތަށް ފުޅާކުރެވިދާނެއެވެ
    :'
