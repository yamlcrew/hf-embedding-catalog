      ގޮތުގަ އެވެ. "މަރަން ނޫނީ ބޮލަކު ނުޖަހާނެ" ކަމަށް އޭނާ ބުންޏެވެ. ފުލުހުންނަކަށް މިހާރު އޭނާ އިތުބާރެއް ނުކުރެ އެވެ.
      "[އެ ދުވަހަށް ފަހު] ޕޮލިހުން ފެނުނަސް ރުޅިގަދެވޭ. ދަރިން ވެސް ޕޮލިހުން ފެނުނަސް ރުޅިގަދަވޭ،" ފަސް ކުދިންގެ ބައްޕަގެ
      ނަފުރަތު ކިޔައިދިނެވެ. ފެބްރުއަރީ 8 ގައި އަނިޔާކުރި 29 ފުލުހެއްގެ މައްސަލަ ޕޮލިސް އިންޓެގްރިޓީ ކޮމިޝަނުން ދަނީ ބަލަމުންނެވެ.
      ނަމަވެސް އެ އަނިޔާވެރި އަމަލުތައް ހިންގިތާ އެއް އަހަރު ވާއިރު، ޒުބައިރު ހުރީ އިންސާފެއް ނުލިބި ކަމަށް އޭނާ ގަބޫލުކުރެ
