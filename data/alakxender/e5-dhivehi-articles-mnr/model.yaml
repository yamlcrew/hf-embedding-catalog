      ކުށުގެ ތުހުމަތުގައި ހައްޔަރުކުރެވޭ މީހުން، މުޖުތަމައުގެ ރައްކާތެރިކަމަށްޓަކައި ޝަރީއަތް ނިމެންދެން ބަންދުގައި ބެހެއްޓުމަށް
      ވެސް ހުށަހަޅާފައިވާނެ ކަމަށް އޭނާ ވިދާޅުވި އެވެ. އަދި އެފަދަ މައްސަލަތަކުގައި ހެކި ވަޒަންކުރުމާ ގުޅޭ ތަފްސީލް ހިމަނާފައިވާނެ
      ކަމަށް ވިދާޅުވި އެވެ. އަނިލް ވިދާޅުވީ ކުށެއްގެ ތުހުމަތުގައި ހައްޔަރުކުރާ މީހުންގެ ތަހުގީގު ލަސްވުމާއި ޝަރީއަތަށް ހުށަހެޅުން
      އަދި އެ މައްސަލައެއްގެ ޝަރީއަތް ދިގުލައިގެން ދިއުމަކީ މުޖުތަމައުގެ ކަންބޮޑުވުން އޮންނަ މައްސަލައެއް ކަމަށެވެ. މިހާރު
      ހުށަހެޅި އިސްލާހުތަކުން އެ ކަންބޮޑުވުންތަކަށް ވެސް ލުޔެއް ލިބިގެންދާނެ ކަމަށް ވިދާޅުވި އެވެ. ބަންޑާރަ ނައިބު ވިދާޅުވި
      ގޮތުގައި ބޮޑެތި ކުށްތަކުގައި ހައްޔަރުކުރާތާ 15 ދުވަހުގެ ތެރޭގައި މީހެއްގެ މައްސަލަ ޝަރީއަތަށް ހުށަހަޅަން ޖެހޭނެ ކަމަށް
      އިސްލާހުގައި ވާނީ ހިމަނައިފަ އެވެ. އަދި ޝަރީއަތަށް ހުށަހަޅާތާ މަސް ދުވަހުގެ ތެރޭގައި ޝަރީއަތް ނިންމަންވާނެ ކަމަށް ވެސް
      އިސްލާހު ހުށަހަޅާފައިވާނެ ކަމަށް ބަންޑާރަ ނައިބު ވިދާޅުވި އެވެ. އެކަމަކު އޭގެ ތެރޭގައި އިސްތިސްނާ ހާލަތްތައް ވަނީ ހިމަނައިފަ
      އެވެ. އަނިލް ވިދާޅުވީ ގާނޫނުގައި ކުށެއް ކަމުގައި ކުރިން ކަނޑައަޅާފައި ވަނީ ތޫނު ހަތިޔާރު ގެންގުޅުމާއި އަތުގައި ބެހެއްޓުމާއި
      ބިރުދެއްކުން އެކަނި ކަމަށެވެ. ތޫނު ހަތިޔާރެއް ބޭނުންކޮށްގެން ހަމަލާދިނުމާ ގުޅިގެން ދިމާވާ ކަންކަމުގެ ތެރޭގައި މީހަކު
      މަރުވުމާއި ގުނަވަނެއް ނެތިގެން ދިއުމުން ދައުވާ ކުރަނީ ގާނޫނުލް އުގޫބާތުގެ ދަށުން ކަމަށްވާތީ އެކަމަށް ދެވޭ އަދަބުތަކާއި
      ތަހުގީގު މަރުހަލާ އާއި ޝަރީއަތް ހިންގުމުގެ މަރުހަލާގައި ދިމާވާ ގޮންޖެހުންތައް ބޮޑު ކަމަށް ވެސް އޭނާ ވިދާޅުވި އެވެ. "ގާނޫނަށް
      އިސްލާހުތައް ގެނައީ މިކަންކަމަށް ރިއާޔަތްކޮށް. އޭގެ ތެރޭގައި ތޫނު ހަތިޔާރު ބޭނުންކޮށްގެން މީހަކު މަރާލުމުގެ ކުށް ކަނޑައަޅައި،
      އެ ކުށަށް އަދަބު ކަނޑައަޅައި، މީހަކު ތޫނު ހަތިޔާރު ބޭނުންކޮށްގެން މާރާމާރީ ހިންގުމުގެ ސަބަބުން މީހަކު މަރުވެއްޖެ ނަމަ
      ދޭން ޖެހޭ ކުށް ކަނޑައަޅައި އެކަމުގެ އަދަބު ވެސް ވާނީ ކަނޑައަޅާފައި،" އަނިލް ވިދާޅުވި އެވެ. އޭނާ ވިދާޅުވި ގޮތުގައި މާރާމާރީ
      ހިންގައިގެން މީހެއްގެ ގުނަވަނެއް ނެތިގެން ހިނގައްޖެ ނަމަ، ދޭނެ އަދަބު ވެސް ވަނީ އިސްލާހުތަކުގައި ވަނީ ހިމަނައިފަ އެވެ.
      އަދި ތޫނު ހަތިޔާރެއް ބޭނުންކޮށްގެން މާރާމާރީ ހިންގުމަކީ ވެސް ކުށެއް ކަމުގައި އާ އިސްލާހުތަކުގައި ވަނީ ކަނޑައަޅައިފަ
      އެވެ. ބަންޑާރަ ނައިބު ވިދާޅުވި ގޮތުގައި އަދަބުތަކުގެ މިންގަނޑުގެ ތެރޭގައި ހަތް އަހަރުގެ ޖަލު ހުކުމުން ފެށިގެން މަރުގެ
      ހުކުމް ތަންފީޒުކުރުމާ ހަމައަށް ވަނީ ކަނޑައަޅައިފަ އެވެ. "އެ ކުށެއްގެ ބާވަތުން އެ ކުށަކަށް، 7 އަހަރު 10 އަހަރު 15 އަހަރު
      20 އަހަރު ކަނޑައަޅާފައިވާނެ،" އަނިލް ވިދާޅުވި އެވެ. ބަންޑާރަ ނައިބު ވިދާޅުވި ގޮތުގައި ޖިނާއީ އިޖުރާތާއި ހެއްކާ ބެހޭ
      ބިލް ވެސް ވަރަށް އަވަހަށް މަޖިލީހަށް ފޮނުވާނެ އެވެ.'
    - "passage: ބޭންކު އޮފް މޯލްޑިވްސް (ބީއެމްއެލް) ގެ ބީއެމްއެލް އިސްލާމިކުގެ 10 ވަނަ އަހަރީ ދުވަސް ފާހަގަ ކުރުމުގެ ގޮތުން،\
      \ އެ ބޭންކުގެ 10 ކަސްޓަމަރަކަށް ހައްޖު ދަތުރު ލިބޭ ހާއްސަ ޕްރޮމޯޝަނެއް ފަށައިފި އެވެ.   \n\nމި ޕްރޮމޯޝަނުގައި، ބީއެމްއެލް\
      \ އިސްލާމިކްގެ ހިދުމަތްތައް މިހާރު ބޭނުން ކުރަމުންދާ ކަސްޓަމަރުންނާއި، އަލަށް ހިދުމަތް ބޭނުންކުރަން ފަށާ ކަސްޓަމަރުންގެ\
      \ ތެރެއިން ފައިނޭންސިން ފެސިލިޓީއެއް ބޭނުންކުރަމުންދާ ކަސްޓަމަރުންނާއި، މުސާރަ ޖަމާކުރާ ކަސްޓަމަރުންގެ އިތުރުން ޖެނެރަލް\
      \ އިންވެސްޓްމެންޓް އެކައުންޓް ނުވަތަ އިސްލާމިކް ކްރެޑިޓް ކާޑު ބޭނުންކުރާ ކަސްޓަމަރުންނަށް ބައިވެރިވެވޭނެ އެވެ.\n\nމި\
      \ ޕްރޮމޯޝަންގެ ހައްޖު ދަތުރުތަކުގެ ހުރިހާ ހަރަދުތަކެއް ބީއެމްއެލްއިން ފޯރުކޮށްދޭނެ ކަމަށާއި މި ޕްރޮމޯޝަން ކުރިއަށް ދާނީ\
      \ މި އަހަރުގެ ނޮވެންބަރު މަހުގެ ނިޔަލަށް ކަމަށް ބީއެމްއެލް އިން ބުނެފައިވެއެވެ. \n\n10 ކަސްޓަމަރަކަށް ހައްޖު ދަތުރު\
      \ ލިބޭ ހާއްސަ ޕްރޮމޯޝަނެއް ބީއެމްއެލް އިސްލާމިކުގެ 10 ވަނަ އަހަރީ ދުވަސް ފާހަގަ ކުރުމުގެ ގޮތުން ފަށާފައިވާއިރު ހަމަ\
      \ އެދުވަހާ ގުޅުވައިގެން ތިން އަތޮޅެއްގައި ހިންގަމުން އައި ބީއެމްއެލްގެ ބްރާންޗްތައް ވަނީ ރީބްރޭންޑްކޮށްފައެވެ."
  - source_sentence: 'query: އިންޑިއާ ހައިކޮމިޝަނާއި ޓޫއޮފް އަސް ގުޅިގެން މިރޭ އޮލިމްޕަސް ބެކްޔާޑުގައި މިއުޒިކް ޝޯއެއް'
    sentences:
    - 'passage: ޖަޕާނުގެ ސަގާފީ ނެށުންތައް ދިވެހިންނަށް ދައްކާލުމަށް ބުރާސްފަތި ދުވަހުގެ ރޭ ހާއްސަ ޝޯއެއް ބާއްވާ ގޮތަށް ހަމަޖައްސައިފި
      އެވެ.ޖަޕާނުގެ ސަރުކާރާ ގުޅިގެން އެ ޝޯ އިންތިޒާމް ކުރަމުން އަންނަ ޖަޕާން އޯވަސީސް ކޯޕަރޭޝަން ވޮލަންޓިއާސް( ޖޭއޯސީވީ)
      ޖަމިއްޔާ އިން ވާހަކަ ދެއްކެވި އޮފިޝަލަކު މިއަދު ވިދާޅުވި ގޮތުގައި ބުރާސްފަތި ދުވަހުގެ ރޭ  30: 8 އިން  00: 11 އަށް ތާޖުއްދީން
      ސްކޫލުގައި ބާއްވާ އެ ޝޯގައި ޖަޕާނުގެ ތަފާތު ވައްތަރުތަކުގެ ސަގާފީ ނެށުންތަކުގެ އިތުރުން ދިވެހި ޑްރާމާތައް ވެސް ޖަޕާނުގެ
      އެ ޑާންސް ގްރޫޕުން ހުށަހަޅައިދޭނެ އެވެ. ހުރިހާ އުމުރުފުރައަކަށް ހިލޭ ވަދެވޭގޮތަށް ބާއްވާ އެ ޝޯއަކީ ޖަޕާނުގެ ޑާންސްތައް
      ދިވެހިން އަހުލުވެރިކުރުމުގެ އިތުރަށް ރަހުމަތްތެރިކަން ބަދަހި ކުރުމަށް ބާއްވާ ޝޯއެއް ކަމަށް ވެސް އޭނާ ވިދާޅުވި އެވެ.މީގެ
      އިތުރަށް އެ ޝޯ ބާއްވާނީ ހާއްސަކޮށް ކުޑަކުދިންނަށް ވެސް ބައިވެރިވެވޭ ގޮތަށް ކަމަށް އޭނާ ވިދާޅުވި އެވެ. އެ ޝޯގައި ޖަޕާނުގެ
      ސަގާފީ ޑާންސްތަކުގެ އިތުރަށް އެ ގައުމުގެ ކެއުންތައް ވެސް ހުންނާ ކަމަށް އެ ޖަމިއްޔާ އިން ބުންޏެވެ.މީގެ އަހަރުތަކެއް ކުރިން
      އުފައްދައިފައިވާ ޖޭއޯސީވީ ޖަމިއްޔާ އަކީ ޖަޕާނު ސަރުކާރުގެ އެކި ޕްރޮގްރާމްތައް އެކިގައުމުތަކުގައި ހިންގައިދޭ ޖަމިއްޔާއެކެވެ.
      އެކި ގައުމުތަކުގައި އެ ޖަމިއްޔާގެ މީހުން ވޮލަންޓިއާކޮށް މަސައްކަތްތައް ރާވައި ހިންގަމުން ދެ އެވެ.'
    - "passage: މޯލްޑިވިއަން ޑިމޮކްރެޓިކް ޕާޓީ (އެމްޑީޕީ) ގެ ރިޔާސީ ޕްރައިމަރީގައި ވާދަ ކުރެއްވުމަށް އަދިވެސް ގަސްދު ކުރައްވާ\
      \ ކަމަށް އެ ޕާޓީގެ ޗެއާޕާސަން ފައްޔާޒް އިސްމާއިލް މިއަދު ވިދާޅުވެއްޖެ އެވެ.  \n\nއެމްޑީޕީން ބޭއްވި ނޫސްވެރިންގެ ބައްދަލުވުމުގައި\
      \ ފައްޔާޒް ވިދާޅުވީ ރިޔާސީ ޕްރައިމަރީގައި ވާދަކުރެއްވުމުގެ ޝައުގުވެރިކަން ފާޅުކުރެއްވީ ގައުމީ މަޖިލީހުގައި ކަމަށެވެ.\
      \ އެގޮތުން އެ ޝައުގުވެރިކަން އަދިވެސް ހުންނެވި ކަމަށާއި ޕްރައިމަރީގައި ވާދަކުރައްވާނެ ކަމަށް އޭނާ ވިދާޅުވި އެވެ. \n\n\
      \"ފުރަތަމަ ކަމަކަށް އަޅުގަނޑު ތި ވިދާޅުވާ އިއުލާން ކުރައްވާ ކަމަކީ އަޅުގަނޑުމެންގެ ގައުމީ މަޖިލީހުގައި ހިއްސާކޮށްލި\
      \ ހިޔާލެއް އެނގޭތޯ. އެގޮތުގައި އަދިވެސް މިހުރީ. ﷲ އިރާދަކުރެއްވިއްޔާ، ދުނިޔޭގައި ހުރިއްޔާ [ވާދަ] ކުރާނަން،\" ފައްޔާޒް\
      \ ވިދާޅުވި އެވެ. \n\nފައްޔާޒް ވިދާޅުވީ ޕާޓީގެ އެންމެ އިސް މީހެއްގެ ގޮތުގައި ހުންނަވައި ރިޔާސީ ޕްރައިމަރީގައި ވާދަކުރައްވާކަން\
      \ އިއުލާން ކުރެއްވުމާ ގުޅިގެން ޕާޓީ ތެރެއިން މިހާތަނަށް އެއްވެސް ގޮންޖެހުމެއް ކުރިމަތި ނުވާ ކަމަށެވެ. \n\n\"ތި ވިދާޅުވާހެން\
      \ އަޅުގަނޑު އެކަނި ކަންނޭނގެ ހާމަކަން ބޮޑު ގޮތަކަށް އިއުލާން ކޮށްގެން މިއުޅެނީ އެނގޭތޯ. އެހެންވީމާ އަދިއެއް އަޅުގަނޑަކަށެއް\
      \ އެކަމުގައި ގޮންޖެހުމެއް ނެތޭ ދެންނެވޭނީ،\" އޭނާ ވިދާޅުވި އެވެ. \n\nމީގެ ހަތަރު އަހަރު ފަހުން 2028 ގައި އޮންނަ ރިޔާސީ\
      \ އިންތިހާބަށް އެމްޑީޕީން ބާއްވާ ރިޔާސީ ޕްރައިމަރީގައި، 2023 ގައި އޮތް ޕްރައިމަރީގައި ހިނގައިދިޔަ ފަދަ ކަމެއް ހިނގައިދާނެ\
      \ ކަމަށް ގަބޫލު ނުކުރައްވާ ކަމަށް ވެސް ފައްޔާޒް ވިދާޅުވި އެވެ. \n\nމީގެއިތުރުން ފައްޔާޒް ވިދާޅުވީ އެމްޑީޕީގެ ރިޔާސީ\
      \ ޕްރައިމަރީގައި އެމްޑީޕީގެ މެންބަރުންގެ އިތުބާރު ލިބިފައިވާ މީހަކަށް ޖާގަ ލިބި، އެމީހެއްގެ ފަހަތަށް އެންމެން އަރާނެ\
      \ ކަމަށެވެ. \n\nފައްޔާޒްގެ އިތުރުން އެމްޑީޕީގެ ރިޔާސީ ޕްރައިމަރީގައި ވާދަކުރައްވާކަން އިއުލާން ކުރެއްވީ ކުރީގެ ރައީސް\
      \ އިބްރާހިމް މުހައްމަދު ސޯލިހު އެކަންޏެވެ. ކުރީގެ ރައީސް މުހައްމަދު ނަޝީދު ވެސް ވަނީ ރިޔާސީ އިންތިހާބުގައި ވާދަކުރެއްވުމާ\
      \ މެދު ބައެއް ގާތް ބޭފުޅުންގެ ހިޔާލު ހޯއްދަވައިފަ އެވެ."
    - 'passage: ރާއްޖޭގައި ހުންނަ އިންޑިއާ ހައިކޮމިޝަނާއި ރާއްޖޭގެ ބޭންޑު "ޓޫއޮފް އަސް" ގުޅިގެން މިރޭ އޮލިމްޕަސް ބެކްޔާޑުގައި
