    އަނިލް ވިދާޅުވި އެވެ. އޭނާ ވިދާޅުވި ގޮތުގައި މާރާމާރީ ހިންގައިގެން މީހެއްގެ ގުނަވަނެއް ނެތިގެން ހިނގައްޖެ ނަމަ، ދޭނެ އަދަބު
