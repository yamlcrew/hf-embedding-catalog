      އިދާރާގައެވެ.


      މި ބައްދަލުކުރެއްވުމުގައި ކައުންސިލުން ވަނީ ގޮނޑުދޮށް ހިމާޔަތްކޮށްދެއްވުމަށް އެދިވަޑައިގެންފައެވެ. އަދި ކުޅިވަރުގެ ދާއިރާ
