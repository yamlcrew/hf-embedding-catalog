  - 'passage: ބިރުދެއްކުމާއި ނުރައްކާތެރި ހަތިޔާރު ގެންގުޅުން މަނާކުރުމުގެ ގާނޫނަށް ހުށަހެޅި އިސްލާހުތަކުގައި، ކުށްކުރާ މީހުންނަށް
