    ގިނަ އަދަދެއްގެ ބަޔަކު ނުކުތުން ވީ ބޮޑު ޝޮކަކަށެވެ. އަދި ފުލުހުންގެ ބޮޑު ދައުރެއް އޮވެގެން ނަޝީދުގެ ސަރުކާރު ބަދަލުވިއިރު،
    އޭގެ އެއް ދުވަސް ފަހުން އެމްޑީޕީން މަގުމައްޗަށް ނުކުތުމަކީ ފުލުހުންނަށް ކެތްކުރެވޭ ވަރުގެ ކަމަކަށް ވެސް ނުވި އެވެ. ފެބްރުއަރީ
    8 ގައި ފެނުނީ އެކަމެވެ. އެދުވަހު ޖުމްހޫރީ މައިދާން ކައިރި އަށް މީހުން އެއްވުމާ އެކު ފުލުހުން ކަރުނަ ގޭސްޖަހައި ރޫޅާލި
    އެވެ. އޭގެ ކުރީގެ އެއްވުންތަކާއި މުޒާހަރާތަކާ ހިލާފަށް އަދި އެހާތަނަށް ފުލުހުންގެ ފަރާތުން ފެނިފައި ނެތްވަރުގެ ބޮޑެތި
    އަނިޔާތައް އެ ދުވަހު ފެނުނެވެ. އެތައް ބައެއްގެ ބޮލުގައި މުގުރުން ޖަހައި ޒަހަމްކޮށްލި އެވެ. އަތުނެޖުނު މީހެއްގެ ޖެހުނު
    ތަނެއްގައި ތެޅި އެވެ. އޭގެ ތެރޭގައި ކުރީގެ ރައީސް ނަޝީދާއި މަޖިލީހުގެ މެމްބަރުން ވެސް ހިމެނެ އެވެ. އެއީ ތާރީހުގައި ދިވެހި
    ފުލުހުން، ރައްޔިތުންނަށް އެންމެ ބޮޑު ޖިސްމާނީ އަނިޔާއެއް ދިން ދުވަސް ވެސްމެ އެވެ. އެ ދުވަހުގެ އެއްވުމުގައި ޒުބައިރު އިށީނދެލައިގެން
    އިނީ އެމްއެމްއޭ ކައިރީގައި ހުރި ސައިކަލެއްގެ މަތީގަ އެވެ. އެ ތަނުގައި އޭނާ އިންދައި އެއްވުން ރޫޅާލައި މީހުންނަށް އަނިޔާކުރަން
    ފެށި އެވެ. އޭނާގެ ބޮލަށް ކުއްލިއަކަށް މުގުރު އެރީ ފުރަގަހުންނެވެ. "ސައިކަލެއްގެ މަތީގައި މަށާއި އެހެން ކުއްޖަކާ އިށީނދެލައިގެން
    ތިއްބާ ފުރަގަހުން އައިސް ޖެހީ. ފުރަގަހުން އައިސް ޖެހީމާ ތެދުވެގެން ދުއްވައިގަތީމާ ވެއްޓުނީ، ވެއްޓުނިމާ އަނެއްކާ ދެ ޕޮލިހުން
    ވެގެން ނަގައި ކޮޅަށް ބަހައްޓާފައި އަނެއްކާ ޖަހަން އުޅުނީމާ މިހެން [ދެ އަތް ބޮލުގައި އަޅައި ދައްކާލަމުން] ހަދާފައި އަތް
    އެޅުނީ. ބޭ އިހްތިޔާރުގައި އެޅުނީ. އެޅުނީމަ ވީ ގޮތަކީ އިނގިލިތައް ދިޔައީ. އިނގިލިތައް ގޮސްގެން ވެސް މަ ދުނިޔާގައި މިހުރީ
    އަތް އެޅުނީމާ،" ޒުބައިރު ބުންޏެވެ. އެ ހަމަލާގައި އޭނާގެ ބޮލުން ފަސް އިންޗި ތަނެއް ފެޅުނެވެ. ވައަތުގެ ޝަހާދަތް އިނގިއްޔާއި
    މެދު އިނގިލި ބުރިވި އެވެ. އެ ދުވަހު ރުޅިގަދަވެފައި ތިބި ފުލުހުންގެ ކިބައިން ސަލާމަތް ވެގެން ޒުބައިރު ދަނިކޮށް، އެމްޑީޕީގެ
    ގައުމީ މަޖިލީހުގެ މެމްބަރު ދޮން ބިލެތް އަހްމަދު ހަލީމާ ދިމާވެގެން އެހީ އަށް އެދުނެވެ. އަހްމަދު ހަލީމާ އެކު ހޮސްޕިޓަލަށް
    ދާން އުޅެނިކޮށް، އޭނާ އަށް ލިބިފައިވާ ޒަހަމްތައް ބޭރުގެ ކެމެރާ މަނަކަށް ފެނިގެން ކެމެރާ ކުރަން ފެށި އެވެ. އެ މަންޒަރު
    ފުލުހުންނަށް ފެނުނެވެ. އެއާއެކު ދުވެފައި އައިސް އޭނާ ދަމާފައި ގެންދިޔަ އެވެ. އޭރު އޭނާގެ ބޮލުންނާއި އަތުން ފައިބަމުން
    ދިޔަ އެވެ. އެހެންވެ ލޭ ހުސްވެގެން މަރުވެދާނެ ކަމަށް ވެސް އޭނާ ހީކުރި އެވެ. "[ފުލުހުން] ދާން ފެށީމާ މަ ބުނީ މަގޭ ގައިން
    ލޭ ފައިބާ ހުސްވަނީއޭ. މަ ގެންދާށޭ އަވަހަށް ހޮސްޕިޓަލަށް،" ލޮލުން ކަރުނަ އުފެއްދި ހަނދާންތައް ކިޔައިދެމުން، އުނދަގުލުން
    އޭނާ ބުންޏެވެ. ހޮސްޕިޓަލަށް ގެންދިއުމަށް ވެހިކަލަކަށް އެރުވިކަން އޭނާ އެނގެ އެވެ. އެއަށް ފަހު ހޭނެތުނެވެ. ހޭއެރީ އޭޑީކޭ
    ހޮސްޕިޓަލްގައި ފަރުވާ ދެމުން ދަނިކޮށެވެ. އަދި އިނގިލި ބުރިވެފައިވާކަން އެނގުނީ ވެސް އެ ހިސާބުންނެވެ. އޭނާގެ ބުރިވި ދެ
    އިނގިލި ގުޅުވުމަށްޓަކައި ތިން ގަޑިއިރުގެ އޮޕަރޭޝަނެއް ކުރި އެވެ. އެ ޒަހަމްގެ ފާރުތައް ހިކިފައި ހުއްޓަސް، ދެ އިނގިލި ރަނގަޅަށް
    ހަރަކާތެއް ނުކުރެވެ އެވެ. ނިޔަފައްޗެއް ވެސް ނެތެވެ. އިނގިލިން އައްސިކަމެއް ނުފިލަ އެވެ. އެ ދެ އިނގިލިން އެއްޗެއްގައި ނުހިފޭއިރު،
    ގައިގެ ތަނެއް ހިރުވާލަން ވެސް އުނދަގޫ ކަމަށް ޒުބައިރު ބުންޏެވެ. އެ ނުކުޅެދުންތެރިކަމުގެ ސަބަބުން އިބްރާހިމް ނާސިރު އިންޓަނޭޝަނަލް
    އެއާޕޯޓްގައި ވަޒީފާ އަދާކުރަން ވެސް ދަތިވި އެވެ. އެއާޕޯޓްގައި ބެގޭޖް އުފުލާ މީހަކަށް އުޅުނު ޒުބައިރުގެ އެ ނުކުޅެދުންތެރިކަމާ
    ހެދި ޖީއެމްއާރުން އޭނާގެ ވަޒީފާ ބަދަލުކުރި އެވެ. ސޯޅަ އަހަރު އެއާޕޯޓްގައި އުޅެފައިވާ ޒުބައިރު ވަޒީފާ އިން ވަކިނުކޮށް،
    އެއްޗެހި އުފުލަން ނުޖެހޭ މަގާމަކަށް ބަދަލުކުރުމަކީ ލިބުނު ރަހްމަތެއް ކަމަށް އޭނާ ބުންޏެވެ. ޒުބައިރު ބުނާ ގޮތުގައި އޭނާގެ
    ބޮލަށް އެދުވަހު ލިބުނު އަނިޔާ އަށް ފަހު ބޮލުގެ ތަދު ވެސް ފިލައިގެނެއް ނުދެ އެވެ. އެ ދުވަހު ފުލުހުން މުގުރުން ބޮލުގައި
    ޖަހައި ޒަހަމްކުރުމުން، އެކަން އޭނާ ސިފަކުރަނީ މަރުގެ ހަމަލާއެއްގެ ގޮތުގަ އެވެ. "މަރަން ނޫނީ ބޮލަކު ނުޖަހާނެ" ކަމަށް އޭނާ
    ބުންޏެވެ. ފުލުހުންނަކަށް މިހާރު އޭނާ އިތުބާރެއް ނުކުރެ އެވެ. "[އެ ދުވަހަށް ފަހު] ޕޮލިހުން ފެނުނަސް ރުޅިގަދެވޭ. ދަރިން
    ވެސް ޕޮލިހުން ފެނުނަސް ރުޅިގަދަވޭ،" ފަސް ކުދިންގެ ބައްޕަގެ ނަފުރަތު ކިޔައިދިނެވެ. ފެބްރުއަރީ 8 ގައި އަނިޔާކުރި 29 ފުލުހެއްގެ
    މައްސަލަ ޕޮލިސް އިންޓެގްރިޓީ ކޮމިޝަނުން ދަނީ ބަލަމުންނެވެ. ނަމަވެސް އެ އަނިޔާވެރި އަމަލުތައް ހިންގިތާ އެއް އަހަރު ވާއިރު،
