    ކަމަށް ހައި ކޯޓުގެ ރެޖިސްޓްރާ އަންގާފައިވާ ކަމަށެވެ. އަދި އެ މައްސަލަ ފުރަތަމަ މަރުހަލާ އިން ބަލަންޖެހޭނީ ދަށު ކޯޓަކުން
    ކަމަށް ރެޖިސްޓްރާގެ ނިންމުމުގައިވާތީ އެ މައްސަލަ މާދަމާ ދަށު ކޯޓަށް ހުށަހަޅާނެ ކަމަށް ނޫރުބާން ވިދާޅުވި އެވެ." ދަށު ކޯޓަކީ
    ސިވިލް ކޯޓު ކަމަށްވާތީ މާދަމާ އަޅުގަނޑުމެން އެ މައްސަލަ އެ ކޯޓަށް ހުށަހަޅާނަން" ނޫރުބާން ވިދާޅުވި އެވެ.ހައި ކޯޓުގެ ގަވާއިދު
    އޮންނަ ގޮތުން އެ ކޯޓުގެ ރެޖިސްޓްރާ ނިންމާ ނިންމުމަކާ މެދު ހިތްހަމަނުޖެހޭ ނަމަ އެ ނިންމުން ރިވިއުކޮށް ދިނުމަށް އެދި އެ
    ކޯޓުގެ ފަނޑިޔާރުންގެ މަޖިލީހަށް ހުށަހެޅިދާނެ އެވެ.އަލްހާން ވިދާޅުވެފައިވާ ގޮތުގައި އެމްޑީޕީގެ ޕްރައިމަރީ ސައްހަ ނޫން ކަމަށާއި
    އެ މައްސަލަ އެމްޑީޕީގެ އެތެރޭގެ ގުނަވަންތަކުން އެކަށީގެންވާ މިންވަރަށް ބަލާފައިނުވާ ކަމަށެވެ. އެގޮތުން އެ ޕްރައިމަރީގައި
    އެހެން ޕާޓީތަކުގެ 130 މީހަކު ވޯޓުލާފައިވާ ކަމަށާއި ވޯޓު ލިސްޓުގައި ވެސް މައްސަލަ އުޅޭ ކަމަށް އަލްހާން ވަނީ ވިދާޅުވެފަ
    އެވެ.ފޭދޫ ދާއިރާގެ ޕްރައިމަރީ ނިހާދު ކާމިޔާބުކުރީ 316 ވޯޓާ އެކުގަ އެވެ. އަލްހާނަށް ލިބިވަޑައިގަތީ 154 ވޯޓެވެ.އަލްހާންގެ
    ބުރަކަށްޓައް ވަޅި ހެރުމުގެ ސަބަބުން އޭނާގެ މައިބަދަ އަށް ލިބުނު ގެއްލުންތަކުގައި އޭނާގެ ކަނާތު ފައިގެ ވާގި ވަނީ ގޮސްފަ
    އެވެ. ނަމަވެސް ލަންކާގައި އޭނާ އަށް ފަރުވާދެމުން އަންނައިރު މިހާރު ހާލު ރަނގަޅުވަމުން އަންނަ ކަމަށް އާއިލާ އިން ވަނީ ބުނެފަ
    އެވެ.'
  - "passage: ކުރިއަށް އޮތް ރަމަޟާން މަހަށް ބޭނުންވާ މުދާ ދަތިކަމެއްނެތި ރައްޔިތުންނަށް ފޯރުކޮށްދިނުމަށްޓަކައި ސްޓޭޓް ޓްރޭޑިންގ\
    \ އޯގަނައިޒޭޝަން (އެސްޓީއޯ) އިން ދުރާލާ ތައްޔާރުވަމުންދާ ކަމަށް އެ ކުންފުނީގެ ސީއީއޯ އަދި މެނޭޖިންގ ޑިރެކްޓަރ ޝިމާދު އިބްރާހިމް\
    \ ވިދާޅުވެއްޖެއެވެ.\n\r\nމިކަމާ ގުޅޭގޮތުން ސޯޝަލް މީޑިއާގައި ހިއްސާކުރެއްވި ޕޯސްޓެއްގައި ޝިމާދު ވިދާޅުވި ގޮތުގައި، ބާޒާރުގައި\
    \ އަގު މައްޗަށް ދާ ބާވަތްތައް ދެނެގަތުމަށްޓަކައި ދުވަހުން ދުވަހަށް ބާޒާރުގެ އަގުތައް މޮނިޓަރ ކުރަމުން ގެންދެއެވެ. އަދި\
    \ މިހާރުވެސް އެސްޓީއޯއިން ގެންނަ މުދަލުގެ ތެރެއިން ލުނބޯގެ ފުރަތަމަ ޝިޕްމަންޓް ވަނީ ލިބިފައެވެ.\n\r\n\"ރަމަޟާން މަހަށް\
    \ ބޭނުންވާ މުދާ ދަތިކަމެއްނެތި ލިބޭނެ އިންތިޒާމު ހަމަޖެއްސުމަށް ދުރާލާ ތައްޔާރުވަމުން މި ގެންދަނީ. އަޅުގަނޑުމެން ވަރަށް\
    \ ބޮޑަށް ސަމާލުކަން ދެނީ ބާޒާރުގައި އަގު މައްޗަށް ދާކަމަށް ފާހަގަކުރެވޭ ތަކެއްޗަށް،\" ޝިމާދު ވިދާޅުވިއެވެ.\n\r\nއެސްޓީއޯއިން\
    \ އިތުރަށް ހާމަކުރެއްވި ގޮތުގައި، ރަމަޟާން މަހުގައި ޑިމާންޑު އިތުރުވާ ބައެއް ކާބޯތަކެތި ބާޒާރަށް ނެރެވޭނެ އިންތިޒާމުތައްވެސް\
    \ ވަނީ ހަމަޖެހިފައެވެ.\n\r\nމިކަމުގެ ސަބަބުން ރަމަޟާން މަހު ރައްޔިތުންނަށް ކާބޯތަކެތި ހެޔޮ އަގުގައި ލިބިގެންދާނެ ކަމަށްއުންމީދު\
    \ ކުރައްވައެވެ."
