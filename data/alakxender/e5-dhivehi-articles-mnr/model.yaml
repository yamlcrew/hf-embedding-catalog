  - source_sentence: 'query: ޑިންގީއެއްގައި ގައްދޫއިން ފުރި 75 އަހަރުގެ މީހަކު ގެއްލިގެން ހޯދަނީ'
    sentences:
    - 'passage: ޑިންގީއެއްގައި ގދ. ގައްދޫއިން އެ އަތޮޅު ގަމަށް ދަތުރުކުރި 75 އަހަރުގެ ދިވެހި ފިރިހެނަކު ގެއްލިގެން ހޯދަން
      ފަށައިފިއެވެ.  ފުލުހުން ބުނީ އެ މީހާ ގައްދޫއިން ފުރީ މިއަދު ހެނދުނު 09:30 ހާއިރު ކަމަށާއި، އޭނާގެ ހިލަމެއް ނުވެގެން
      ފުލުހަށް އެ ކަމުގެ ރިޕޯޓު ލިބިފައިވަނީ މިއަދު ހަވީރު 17:05ގައި ކަމަށެވެ.  މިހާތަނަށް ބެލިބެލުމުން، ހެނދުނު 11:15ހާއިރު،
      އެ މީހާ ގަމުން ފުރި ކަމުގެ މައުލޫމާތު ލިބިފައިވާ ކަމަށް ފުލުހުން ބުންޏެވެ.  އޭނާ އެންމެ ފަހުން ފެނުނުއިރު، ލައިގެން
      ހުރީ ނޫ ކުލައިގެ އަތްކުރު ގަމީހަކާއި ކަޅު ކުލައިގެ ސޯޓެއް ކަމަށް ފުލުހުން ބުންޏެވެ.  އެ މީހާ ހޯދުމަށް ކުރަމުންދާ މަސައްކަތުގެ
      ތެރެއިން، އެމްއެންޑީއެފް ސައުތު ރީޖަން ކޯސްޓް ގާޑުން، ކަނޑުގެ ސަރަހައްދު ބެލުމުގެ މަސައްކަތްދަނީ ކުރަމުންނެވެ. އަދި
      ގަމާއި ގަން ކައިރީ ފަޅުތައް ވެސް ބަލަމުންދާ ކަމަށާއި، މި މައްސަލަ ތަހުގީގު ކުރަމުންދާ ކަމަށް ފުލުހުން ވަނީ ބުނެފައެވެ.  އެކަނި
      މަހަށް ގޮސް އުޅުމުގެ ތެރެއިން ވެސް ބައެއް މީހުން ގެއްލޭ މައްސަލަތައް މަދުމަދުން ފެންމަތިވެއެވެ.  ގދ. ގަމަކީ ގައްދޫގެ
      އިހްތިސާސުގެ ތެރޭގައި ހިމެނޭ ފަޅުރަށެކެވެ. އަދި އެ ރަށަކީ ގުދުރަތީ ގޮތުން ރާއްޖޭގައި އުފެދިފައި އޮތް ދެވަނައަށް އެންމެ
      ބޮޑު ރަށެވެ.'
    - "passage: މި އަހަރު ހައްޖަށް ދާ މީހުންނަށް ލުއި ފަސޭހަ ކޮށްދިނުމަށް، ބޭންކް އޮފް މޯލްޑިވްސް (ބީއެމްއެލް) ގެ ޑެބިޓު ކާޑުތަކުން\
      \ މިހާރު ލިބޭ 250 ޑޮލަރުގެ އިތުރުން 1،750 އެމެރިކާ ޑޮލަރު ދިނުމަށް ސަރުކާރުން ނިންމައިފި އެވެ.  \n\nރައީސް ޑރ. މުހައްމަދު\
      \ މުއިއްޒު އެކްސް ގައި ކުރެއްވި ޕޯސްޓެއްގައި ވިދާޅުވީ ބޭންކުގެ ރަސްމީ ރޭޓުގައި ޑޮލަރު ހޯދުމަށް ލުއިކޮށްދިނުމަށް 1،750\
      \ ޑޮލަރު އިތުރަށް ނެގޭ ގޮތް ހަމަޖައްސައިދޭން ބީއެމްއެލް އަށް އަންގާފައިވާ ކަމަށެވެ. \n\n\"ރަސްމީ ރޭޓުގައި ޑޮލަރު ހޯދުމުގައި\
      \ ލުއި ފަސޭހަ ހައްލެއް ހަމަޖައްސައިދިނުމުގެ ގޮތުން، ކޮންމެ ހައްޖު ވެރިއެއްގެ ބޭންކް އޮފް މޯލްޑިވްސް ޑެބިޓް ކާޑަށް، މިހާރު\
      \ އޮންނަ ޑޮލަރުގެ ލިމިޓުގެ އިތުރުން 1750 އެމެރިކާ ޑޮލަރުގެ ލިމިޓެއް ހަމަޖައްސައި ދިނުމަށް ބޭންކް އޮފް މޯލްޑިވްސް ގައި\
      \ އެދެފިން،\" ރައީސް ވިދާޅުވި އެވެ. \n\nދިވެހިންގެ ބޭންކުގެ ގޮތުގައި ބީއެމްއެލްއިން ކުރަމުންގެންދާ މަސައްކަތަށް އެ ބޭންކަށް\
      \ ރައީސް މުއިއްޒު ވަނީ ޝުކުރު އަދާކޮށްފަ އެވެ. \n\nމިދިޔަ ރޯދަ މަހާއި ޝައްވާލު މަހުގެ ފުރަތަމަ ހަ ދުވަހު އުމްރާއަށްދާ\
      \ ބީއެމްއެލްގެ ކަސްޓަމަރުންގެ ޑެބިޓް ކާޑުގެ ލިމިޓް 1،500 އަށް އިތުރުކޮށްފައިވެ އެވެ. \n\nމީގެ އިތުރުން ރާއްޖެއިން ބޭރުގައި\
      \ ކިޔަވާ ދިވެހި ދަރިވަރުންގެ ތެރެއިން ކާޑު ލިމިޓް 1،200 ޑޮލަރަށް ބޮޑު ކުރަން ބޭނުންވާ ދަރިވަރުންނަށް ޕޯޓަލްއެއް މެދުވެރިކޮށް\
      \ އެ ފުރުސަތު ބީއެމްއެލް އިން މިދިޔަ އަހަރުގެ ނޮވެމްބަރު މަހު ހުޅުވާލި އެވެ."
    - "passage: ސްޓޭޓް ޓްރޭޑިން އޮގަނައިޒޭޝަން (އެސްޓީއޯ) އިން ވިއްކާ ޕެޓްރޯލްގެ އަގުހެޔޮކޮށްފި އެވެ. \n\nރާއްޖެއަށް އެންމެ\
      \ ގިނައިން ތެޔޮ އެތެރެކޮށް ވިއްކާ ސަރުކާރުގެ މެޖޯރިޓީ ހިއްސާ އޮތް، އެސްޓީއޯއިން ބުނީ އެ ކުންފުނީގެ ސަބްސިޑިއަރީ ކުންފުނި،\
      \ ފިއުލް ސަޕްލައި މޯލްޑިވްސް (އެފްއެސްއެމް)ގެ ޝެޑްތަކުން މިއަދުން ފެށިގެން ޕެޓްރޯލް ލީޓަރެއް ވިއްކާނީ 13:50ރ. އަށް ކަމަށެވެ.\
      \ \n\nކުރިން ވިއްކީ ޕެޓްރޯލް ލީޓަރެއް 13.98ރ. އެވެ. އެހެންވެ، މިހާރު މިވަނީ 48 ލާރި ހެޔޮވެފަ އެވެ. \n\nޕެޓްރޯލް ހަގުހެޔޮ\
      \ ކުރި ނަމަވެސް ޑީސަލްގެ އަގަށް ބަދަލެއް ނުގެނެ އެވެ. ޑީސަލް ލީޓަރެއް ހުރީ 13.92ރ.  އަށެވެ. \n\nމީގެ ކުރިން ތެލުގެ އަގު\
      \ ހެޔޮކުރީ މިދިޔަ އަހަރުގެ މެއި މަހު އެވެ."
  - source_sentence: 'query: ރައީސުލްޖުމްހޫރިއްޔާ އދ. ހަންޏާމީދޫ ކައުންސިލާއި، އ.ތ.މ ކޮމިޓީގެ މެންބަރުންނާ ބައްދަލުކުރައްވައި
      އެރަށުގެ ތަރައްޤީއަށް ބޭނުންވާ ކަންކަމާގުޅޭގޮތުން މަޝްވަރާކުރައްވައިފި'
    sentences:
    - 'passage: ފޭސްބުކަށް ވަންނަ ކޮންމެ ފަހަރަކު ކުޑަކުދިންގެ ފޮޓޯތަކުން ފީޑް ފުރިފައި އޮންނަނީ އިއްތިފާގަކުން ނޫނެވެ. އެއީ
      ފޭސްބުކްގައި މައިންގެ ހަރަކާތްތެރިކަން އިތުރުވުމުން ވެގެން އުޅޭ ގޮތެކެވެ. ދިރާސާއަކުން ދައްކަނީ ފޭސްބުކްގައި އެންމެ
      ހަރަކާތްތެރި އެއް ބަޔަކީ މައިން ކަމަށެވެ. އަދި މި ހަރަކާތްތެރިކަން ކިރިޔާ ފެށުނީ ކަމަށާއި ކުރިއަށް އޮތް ތަނުގައި މިކަން
      އަދި މާބޮޑުވާ ކަމަށް ވެސް ދިރާސާގައި ލަފާކޮށްފައިވެ އެވެ. ޕިއު  ރީސާޗް ސެންޓަރުގެ ދިރާސާއެއްގައި ބުނެފައި ވަނީ މަޔަކަށް
      ވުމުން ފޭސްބުކް ބޭނުންކުރުން އާންމުވާ ކަމަށެވެ. އާއިލާ އާއި ރައްޓެހިންނާ އެކު ގުޅުން ދެމެހެއްޓުމުގެ ޝައުގުވެރިކަން މަޔަކަށް
      ވުމުން އިތުރުވާ ކަމަށާއި އެހެންވެ ވަރަށް ގިނަގިނައިން ފޭސްބުކަށް ލޮގިން ވުމަކީ މައިންގެ ކިބައިން ފާހަގަވެފައިވާ ކަމެއް
      ކަމަށް ދިރާސާގައި ބުނެފައިވެ އެވެ. "މައިން ފޭސްބުކް ބޭނުންކުރުން ވަނީ ވަރަށް ބޮޑަށް އިތުރުވެފައި. އެއީ އާއިލާ އާއި އެކުވެރިންގެ
      ފަރާތުން ދިރިއުމަށް އެހީތެރިކަމާއި އެއްބާރުލުން ހޯދުމުގެ ވިސްނުމާ އެކު،" ދިރާސާގައި ބުނެފައިވެ އެވެ. މައިންގެ އިތުރުން
      ބަފައިން ވެސް އެކުވެރިކަމާއި އާއިލީ ގުޅުންތައް ދެމެހެއްޓުމަށް ފޭސްބުކް ބޭނުންކުރުން އިތުރުވެފައިވާ ކަމަށާއި އެކަމަކު
      އަންހެނުންގެ ނިސްބަތް ވަރަށް މަތި ކަމަށް ދިރާސާގައިވެ އެވެ. އެގޮތުން މައިންގެ ތެރެއިން 81 ޕަސެންޓް މީހުން ފޭސްބުކް އާންމުކޮށް
      ބޭނުންކުރާއިރު ބަފައިންގެ މެދުގައި މި ނިސްބަތް ހުރީ 66 ޕަސެންޓުގަ އެވެ. ފޭސްބުކް ބޭނުންކުރާ މައިންގެ އަދަދު ގިނަވުމުން
      އަދި ނިމުނީއެއް ނޫނެވެ. ފޭސްބުކްގައި އެ މީހުންގެ ހަރަކާތްތެރިކަން ވެސް އިތުރީ އެވެ. މައިންގެ ތެރެއިން ތިން ބައިކުޅަ
      އެއްބައި މީހުން ބުނެފައި ވަނީ "އާންމުކޮށް" އަދި "ބައެއް ފަހަރު" ފޭސްބުކަށް ލޮގިންވާ ކަމަށެވެ. މަޔަކު ފޭސްބުކް ބޭނުންކުރާ
      ނަމަ އެންމެ އާންމު ކަމަކީ މައިވަންތަ ކަމުގެ ލޯބި ފާޅުކުރުމެވެ. އަދި ފޭސްބުކްގައި ހުންނަ ލިޔުންތަކާއި ފޮޓޯތަކަށް ލައިވް
      ވުމާއި ކޮމެންޓްކުރުން ފަދަ ކަންކަން ވެސް އެންމެ ގިނައިން ކުރަނީ މައިން ކަމަށް ދިރާސާ އިން ހާމަވެފައިވެ އެވެ. އަދި ފޭސްބުކް
      މެދުވެރިކޮށް ލިބޭ މައުލޫމާތެއް ދަރިން ބެލުމުގައި ބޭނުންކުރުމުގެ ފުރުސަތު ވެސް ބަފައިންނަށް ބޮޑީ މައިންނަށް ކަމަށް ބުނެފައިވެ
      އެވެ.'
    - 'passage: މަދަނަ އަށް ވުރެ ރަނގަޅު ހިދުމަތްތަކަކާ އެކު، އަންނަ ޖެނުއަރީ  1 އިން ފެށިގެން  100،000ރ. ގެ ބޭސް ފަރުވާކުރެވޭނެ
      އިންޝުއަރެންސް ޕެކޭޖެއް ކޮންމެ ރައްޔިތަކަށް ލިބޭނެ ކަމަށް ކަމަށް ނެޝެނަލް ސޯޝަލް ޕްރޮޓެކްޝަން އޭޖެންސީ (އެންސްޕާ) ހިންގެވުމާ
      ހަވާލުވެ ހުންނެވި ހެލްތު މިނިސްޓްރީގެ ސްޓޭޓް މިނިސްޓަރު އިބްރާހިމް ވަހީދު މިއަދު ވިދާޅުވެއްޖެ އެވެ.އަންނަ އަހަރަށް ލަފާކުރާ  14
