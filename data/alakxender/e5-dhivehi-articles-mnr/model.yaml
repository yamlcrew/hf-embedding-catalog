      ދުވަހެކެވެ. އޭގެ އެއް ދުވަސް ކުރިން، އޭރުގެ ރައީސް މުހައްމަދު ނަޝީދު އިސްތިއުފާ ދެއްވީ މަޖުބޫރީ ހާލަތުގައި ކަމަށާއި
