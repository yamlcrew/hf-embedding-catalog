  sentences:
  - 'passage: ގދ. ތިނަދު އަށް އުފަން މުހައްމަދު ޒުބައިރަށް މިދިޔަ އަހަރުގެ ފެބްރުއަރީ 8، ސިފަކުރެވެނީ ދިވެހިންނާ ދެކޮޅަށް
