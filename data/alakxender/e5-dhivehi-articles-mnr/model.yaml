      ދިވެހި ލަވަތައް ލައިވްކޮށް ހުށަހަޅައިދޭނެއެވެ.  މި ހަފްލާގައި ދިވެހިރާއްޖެއަށް ކަނޑައަޅުއްވާފައި ހުންނަވާ އިންޑިއާގެ
      ހައި ކޮމިޝަނަރު ޖީ. ބަލަސުބްރަމާނިއަން ބައިވެރިވެވަޑައިގަންނަވާނެއެވެ.  ބެޓްލް އޮފް ދަ ބޭންޑްސް އިންޓަނޭޝަނަލްއިން ހޯދި
      ތާރީޚީ ކާމިޔާބީއާއެކު، ޓޫ އޮފް އަސްއިން އަންނަނީ ރާއްޖޭގެ އިތުރުން ބައިނަލްއަގުވާމީ ގޮތުން ވެސް މަޝްހޫރުކަން ހޯދައި،
