      \ އޯގަނައިޒޭޝަން (އެސްޓީއޯ) އިން ދުރާލާ ތައްޔާރުވަމުންދާ ކަމަށް އެ ކުންފުނީގެ ސީއީއޯ އަދި މެނޭޖިންގ ޑިރެކްޓަރ ޝިމާދު\
      \ އިބްރާހިމް ވިދާޅުވެއްޖެއެވެ.\n\r\nމިކަމާ ގުޅޭގޮތުން ސޯޝަލް މީޑިއާގައި ހިއްސާކުރެއްވި ޕޯސްޓެއްގައި ޝިމާދު ވިދާޅުވި\
      \ ގޮތުގައި، ބާޒާރުގައި އަގު މައްޗަށް ދާ ބާވަތްތައް ދެނެގަތުމަށްޓަކައި ދުވަހުން ދުވަހަށް ބާޒާރުގެ އަގުތައް މޮނިޓަރ ކުރަމުން\
      \ ގެންދެއެވެ. އަދި މިހާރުވެސް އެސްޓީއޯއިން ގެންނަ މުދަލުގެ ތެރެއިން ލުނބޯގެ ފުރަތަމަ ޝިޕްމަންޓް ވަނީ ލިބިފައެވެ.\n\r\
      \n\"ރަމަޟާން މަހަށް ބޭނުންވާ މުދާ ދަތިކަމެއްނެތި ލިބޭނެ އިންތިޒާމު ހަމަޖެއްސުމަށް ދުރާލާ ތައްޔާރުވަމުން މި ގެންދަނީ.\
      \ އަޅުގަނޑުމެން ވަރަށް ބޮޑަށް ސަމާލުކަން ދެނީ ބާޒާރުގައި އަގު މައްޗަށް ދާކަމަށް ފާހަގަކުރެވޭ ތަކެއްޗަށް،\" ޝިމާދު ވިދާޅުވިއެވެ.\n\
      \r\nއެސްޓީއޯއިން އިތުރަށް ހާމަކުރެއްވި ގޮތުގައި، ރަމަޟާން މަހުގައި ޑިމާންޑު އިތުރުވާ ބައެއް ކާބޯތަކެތި ބާޒާރަށް ނެރެވޭނެ\
      \ އިންތިޒާމުތައްވެސް ވަނީ ހަމަޖެހިފައެވެ.\n\r\nމިކަމުގެ ސަބަބުން ރަމަޟާން މަހު ރައްޔިތުންނަށް ކާބޯތަކެތި ހެޔޮ އަގުގައި\
      \ ލިބިގެންދާނެ ކަމަށްއުންމީދު ކުރައްވައެވެ."
