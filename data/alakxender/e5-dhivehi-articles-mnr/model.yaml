      އެވެ. "[ފުލުހުން] ދާން ފެށީމާ މަ ބުނީ މަގޭ ގައިން ލޭ ފައިބާ ހުސްވަނީއޭ. މަ ގެންދާށޭ އަވަހަށް ހޮސްޕިޓަލަށް،" ލޮލުން ކަރުނަ
