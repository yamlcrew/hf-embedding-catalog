      ދިން އަނިޔާގެ ސަބަބުންނެވެ. އެ ދުވަހުގެ އެންމެ ބޮޑު އަނިޔާއެއް ލިބުނީ ވެސް އޭނާ އަށެވެ. ފުލުހުންގެ މުގުރުން ޖަހުމުގެ
