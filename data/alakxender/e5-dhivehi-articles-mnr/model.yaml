      އެނގެ އެވެ. އެއަށް ފަހު ހޭނެތުނެވެ. ހޭއެރީ އޭޑީކޭ ހޮސްޕިޓަލްގައި ފަރުވާ ދެމުން ދަނިކޮށެވެ. އަދި އިނގިލި ބުރިވެފައިވާކަން
      އެނގުނީ ވެސް އެ ހިސާބުންނެވެ. އޭނާގެ ބުރިވި ދެ އިނގިލި ގުޅުވުމަށްޓަކައި ތިން ގަޑިއިރުގެ އޮޕަރޭޝަނެއް ކުރި އެވެ. އެ ޒަހަމްގެ
