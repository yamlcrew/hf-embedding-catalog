  - source_sentence: 'query: 16 އަހަރަށް ފަހު އަލީ އުމަރު ފުޓްބޯޅަ ކުޅުން ހުއްޓާލައިފި'
    sentences:
    - 'passage: ރާއްޖޭގެ ފުޓްބޯޅައިގެ ތާރީހު ދުށް އެންމެ މޮޅު އެއް ފޯވާޑް އަލީ އުމަރު 16 އަހަރަށް ފަހު ފުޓްބޯޅަ ކުޅުން ހުއްޓާލައިފި
      އެވެ. މިދިޔަ ސީޒަނުގެ ހުރިހާ މުބާރާތެއް ނިއު ރޭޑިއަންޓަށް ކާމިޔާބުކޮށްދީ އޭއެފްސީ ކަޕުގެ ކުއާޓާ ފައިނަލުން ޖާގަ ހޯދައިދިނުމުގައި
      މުހިއްމު ދައުރެއް އަދާކުރި އުމުރުން 32 އަހަރުގެ ކުޅުންތެރިޔާ ކުޅުން ހުއްޓާލިކަން އިއުލާންކުރީ މިރޭ އެ ކްލަބުން ބޭއްވި
      ''ނިއު ރޭޑިއަންޓް ނައިޓް'' ގަ އެވެ. މިރޭގެ ހަފުލާގައި އަލީ އުމަރުގެ ޖާޒީ ވަނީ ކްލަބުގެ ޗެއާމަން އަލީ ވަހީދު (ބަލަކް)
