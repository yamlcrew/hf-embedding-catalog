    ބޭއްވުމަށް ފަހު، އެކި ދުވަސް މަތިން ދޫނިދު އާއި ހުޅުމާލޭގައި ވަނީ އަންދާލައިފަ އެވެ.އަރިއަތޮޅު ގަންގެހި ރިސޯޓު ކައިރީގައި
    އޮންނަ މާވަރު ފަޅުތެރެ އިން ދޮޅު ޓަނަށް ވުރެ ގިނަ މަސްތުވާތަކެތި ފެނިފައި ވަނީ އިއްސާއި ހުއިފިލަނޑާ ނަގަން އުޅުނު ކ. ދިއްފުށީ
