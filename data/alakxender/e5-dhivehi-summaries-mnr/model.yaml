      ކޮމިޝަނަރ އޮފް ޕޮލިސް އަލީ ޝުޖާޢު ނޫސްވެރިންނަށް މަޢުލޫމާތު ދެއްވަމުން ވިދާޅުވީ ސްރީލަންކާގެ މަސް ބޯޓު އަތުލައިގަތީ
