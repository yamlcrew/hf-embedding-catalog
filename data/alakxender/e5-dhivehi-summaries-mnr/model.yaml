  - source_sentence: 'query: މި ކާޑުތައް ބޭނުންކޮށްގެން ކޮށްފައިވާ މުއާމަލާތްތަކުގެ އަގު އުޅެނީ އެއްލައްކަ ފަސްސަތޭކަ ހާސް
      ރުފިޔާ އާއި ދެމެދުގެ އަދަދުތަކުގަ އެވެ. އަދި ވަގަށް ނެގިތަކެތީގައި އިލެކްޓްރޯނިކް ސާމާނުތަކާއި، ގަހަނާއާއި އެހެންވެސް
