      \ ވިދާޅުވީ މި މައްސަލާގައި ރިސޯޓްގެ މެނޭޖްމަންޓާ މަޝްވަރާކޮށްފައިވާ ކަމަށެވެ. އެހެންނަމަވެސް ހަޅުތާލު ކުރަމުންދާ މުވައްޒަފުންނާ\
      \ މެދު އަދިވެސް ގޮތެއް ނިންމާފައި ނުވާ ކަމަށް ރިސޯޓުގެ ޖެނެރަލް މެނޭޖަރު ވެސް ވިދާޅުވި ކަމަށް މައުރޫފް ވިދާޅުވި އެވެ.ރާއްޖޭގައި\
      \ ހަދާފައިވާ އެންމެ ފެންވަރު މަތީ އެއް ރިސޯޓްގެ  150 ދިވެހި މުވައްޒަފުން ހަޅުތާލުގައި މިހާރު ބައިވެރިވަމުން އަންނަ ކަމަށް\
      \ ބެލެވެ އެވެ.\"މިކަން ފުރަތަމަ ހިނގި އިރު ޖީއެމް ނުވެސް ނެތް. އެހެންނަމަވެސް މިހާރު ޖީއެމް ވަޑައިގަތުމުން މިކަމާ ބެހޭ\
      \ ގޮތުން ވާހަކަ ދެއްކީމަ ވިދާޅުވީ އެއްވެސް ޑިސިޝަނެއް މެނޭޖްމަންޓުން އަދިވެސް ނަގާފައިނުވާ ކަމަށް،\" މައުރޫފް ވިދާޅުވި\
      \ އެވެ. \"އެހެންނަމަވެސް މިއަދުގެ ވަގުތެއްގައި އިތުރަށް މަޝްވަރާ ކުރައްވާނެ ކަމަށް ޖީއެމް ވިދާޅުވި.\"މައުރޫފް ވިދާޅުވީ\
      \ މުވައްޒަފުންގެ ހައްގުތައް ނުލިބެނީސް ހަޅުތާލު ހުއްޓާ ނުލައި ކުރިއަށް ގެންދާނެ ކަމަށެވެ. އެހެންނަމަވެސް މި މައްސަލަ\
      \ ވަޒީފާއާ ބެހޭ ޓްރިބިއުނަލް އަށް ހުށަހަޅާފައި ނުވާ ކަމަށް އޭނާ ވިދާޅުވި އެވެ.\"އެތަނަށް އަދި އަޅުގަނޑުމެން މި މައްސަލަ\
      \ ހުށަހަޅާފައެއް ނެތް. އެތަނަށް މައްސަލަތައް ހުށަހެޅުމުން ވަރަށް ދިގު ޕްރޮސީޖާއެއްގެ ތެރެއިން ނިންމަން ނަގަނީ،\" އޭނާ\
      \ ވިދާޅުވި އެވެ. \"އެހެންވެ އައްޑޫގައި ތިބި މުވައްޒަފުންތަކެއް ޓްރިބިއުނަލް އަށް ހުށަހަޅައިގެން ކުރިއަށް ގެންދިއުމަކީ\
      \ ވެސް ފަސޭހަ ކަމެއް ނޫން. އެހެންވެ މުވައްޒަފުންގެ ހައްގު ހޯދުމަށް އެ މީހުން ހަޅުތާލު ކުރަމުން ގެންދާނެ.\"ވިލިނގިލި\
      \ ރިސޯޓުގެ ހަތަރު މުވައްޒަފަކު ވަޒީފާ އިން ވަކިކޮށްފައި ވަނީ އެ ރިސޯޓުގެ ކޮޓަރިއެއްގައި ހުރި ވަސީލަތްތަކެއް ގަވާއިދާ\
      \ ހިލާފަށް ބޭނުން ކުރާ ކަމަށް ބުނެ މިދިޔަ ބުދަ ދުވަހު އެވެ. ގިނަ އަދަދެއްގެ މުވައްޒަފުން ހަޅުތާލަކަށް ނިކުތީ އެ ހަތަރު\
      \ މުވައްޒަފުން ވަޒީފާ އިން ވަކިކުރީ ގަވާއިދާ ހިލާފަށް ކަމަށް ބަލައިގެންނެވެ. \tވިލިނގިލި ރިސޯޓް އެންޑް ސްޕާގެ ކޮމިއުނިކޭޝަން\
      \ މެނޭޖަރު ލެސްލީ ގާޝިއާ މިއަދު ވިދާޅުވީ މުވައްޒަފުންނާއި މެނޭޖްމަންޓާ ދެމެދު އުފެދިފައިވާ މައްސަލަތައް ހައްލު ކުރުމަށް\
      \ މަސައްކަތް ކުރަމުން އަންނަ ކަމަށެވެ. އެގޮތުން ދެކުނު ޕްރޮވިންސް އޮފީހާއި ޓީމާ މަޝްވަރާކޮށްގެން ހައްލެއް ހޯދުމަށް މަސައްކަތް\
      \ ކުރައްވާ ކަމަށް ވެސް އޭނާ ވިދާޅުވި އެވެ. އޭގެ އިތުރު ތަފުސީލެއް އޭނާ ނުދެއްވަ އެވެ."
  - source_sentence: 'query: މިމަހުގެ ކުރީކޮޅުން ފެށިގެން ރައްޔިތުންގެ މަޖިލިސް ޖަލްސާތައް ބާއްވަމުން އަންނައިރު، މިއަދު ބޭއްވި
      ވޯޓުގައި 57 މެންބަރުންގެ އަޣުލަބިއްޔަތުން ފާސްކުރި އެ ގަރާރަށް އިދިކޮޅު ފަރާތްތަކުން ދެކޮޅެއް ނަހަދައެވެ.'
    sentences:
    - 'passage: މާލޭގެ ގެއަކުން ވަގަށްނަގާފައިވާކަމަށް ބެލެވޭ އިލެކްޓްރޯނިކް ސާމާނުތަކެއް ފުލުހުން ހޯދައި ތިން މީހަކު މިއަދު
      ހައްޔަރުކޮށްފި އެވެ.މިއަދު ހެނދުނު ފުލުހުންނަށް ލިބުނުމައުލޫމާތަކާއި ގުޅިގެން މި މައްސަލައިގައި ހައްޔަރުކުރި މީހުން
      ދިރިއުޅެމުން ދިޔަ ތަންތަން ބަލާ ފާސްކުރުމުގެތެރޭގައި ހ. ބެރެބެދިމާގެއާގެ އިން ވަގަށް ނަގާފައިވާ ލެޕްޓޮޕަކާއި ދެ ފޯނު
      ވަނީފުލުހުން ހޯދައިފާ ކަމަށް ފުލުސް އޮފީހުން ބުންޏެވެ.މި  މައްސަލައާ ގުޅިގެން ހައްޔަރުކޮށްފައި ވަނީ ގއ.ވިލިގިލި ހަނދުވަރީގެ
      މިޔާދު އަހުމަދު، 33، އާއި ހ. ސީރާޒް އިބްރާހީމްޝާހް، 33، އާއި މ. ސޭބޫގެ މުހައްމަދު ފާރިޝް، 27، އެވެ.ވަގަށް ނެގި ތަކެތިވެރިފަރާތާ
      ހަވާލުކުރުމުގެ މަސައްކަތް ދަނީ ކުރަމުން ކަމަށާއި މި މައްސަލަ ފުލުހުން ތަހުގީގުކުރަމުން އަންނަ ކަމަށް ވެސް ފުލުސް އޮފީހުގެ
      ބަޔާނެއްގައިވެ އެވެ.'
    - 'passage: ރާއްޖޭގެ ވެރިކަން ކުރުމުގެ މާ ބޮޑު ޝައުގުވެރިކަމެއް މިވަގުތު ނެތް ކަމަށާއި 2028 ގެ ރިޔާސީ އިންތިހާބުގައި އޭނާ
      ވާދަކުރުމާ މެދު ގޮތެއް ނިންމުމުގެ ބާރު އޮތީ ރައްޔިތުންގެ އަތް މަތީގައި ކަމަށް މީދޫ ދާއިރާގެ މެންބަރު އަދި މޯލްޑިވްސް
      ޑިވެލޮޕްމަންޓު އެލަޔަންސް (އެމްޑީއޭ) ލީޑަރު އަހްމަދު ސިޔާމް މުހައްމަދު ވިދާޅުވެއްޖެ އެވެ.

      "ރާއްްޖެ ޓީވީ" އަށް ދެއްވި ހާއްސަ އިންޓަވިއުއެއްގައި ވެރިކަން ކުރަން ބޭނުންވެއްޖެ ނަމަ އެކަން ކާމިޔާބު ކުރާނެ ކަމުގެ
      ޔަގީންކަން ސިޔާމް މިއަދު ދެއްވި އެވެ. މިހާތަނަށް ކާމިޔާބު ނުވާ އެއްވެސް ސިޔާސީ ކެމްޕޭނެއް ނުކުރައްވާ ކަމަށް މީދޫ ދާއިރާގެ
      ގޮނޑި އެންމެ ގިނަ ދައުރުގައި ފުރުއްވި މެންބަރު ވިދާޅުވި އެވެ.

      "ތި ވާހަކައިގައި އަޅުގަނޑު ދަންނަވާނީ އެއީ ރައްޔިތުން ނިންމާ އެއްޗެއް ދެއްތޯ. ރައްޔިތުން ނިންމަންވީ މިސާލަކަށް އަހްމަދު
      ސިޔާމް ތިމަންނަމެންގެ މި ގައުމު ހިންގައިދޭށޭ ފަސް އަހަރު. އިރާދު ކުރެއްވިއްޔާ އަޅުގަނޑު އެކަން ކޮށްދޭނަން. ދިވެހިރާއްޖޭގެ
      ރައްޔިތުންނަށް އެއްވެސް ޒަމާނަކު ނުފެންނަ ވަރަކަށް ވާ ވަރަށް މަތީ ތަރައްގީ ގެނެސްދޭނަން އަޅުގަނޑު," ސިޔާމް ވިދާޅުވި
      އެވެ.

      ރާއްޖޭގެ އެންމެ މުހިންމު ދެ މިނިވަން މުއައްސަސާ ކަމަށްވާ އިލެކްޝަންސް ކޮމިޝަން (އީސީ) އާއި އެންޓި ކޮރަޕްޝަން ކޮމިޝަން
      (އޭސީސީ) ގެ މައްޗަށް ރައީސުލްޖުމްހޫރިއްޔާގެ ފުރިހަމަ ބާރު އޮންނަ ގޮތަށް ދާދިފަހުން ގާނޫނުތައް ވަނީ ބަދަލުކޮށްފަ އެވެ.
      މިހާރު އެ ކޮމިޝަންތަކުގެ ރައީސް އާއި ނައިބު ރައީސް އައްޔަނު ކުރައްވާނީ ރައީސް ޑރ. މުހައްމަދު މުއިއްޒު އެވެ.

      އެ ކަމަށް އިޝާރާތް ކުރައްވައި ސިޔާމް ވިދާޅުވީ މިނިވަން މުސްތަގިއްލު ކޮމިޝަންތައް ކަމަށް ކަނޑައަޅާފައިވާ ތަންތަން ހިނގަން
      ޖެހޭނީ މިނިވަންކަމާއެކު ކަމަށެވެ. އެއްވެސް އިރަކު މިނިވަންކޮށް އެ ތަންތަން ހިނގާ ކަމަށް ދެކެވަޑައިނުގަންނަވާ ކަމަށް
      ސިޔާމް ވިދާޅުވި އެވެ.

      "މި ހިނގައިދާ ހުރިހާ ވައްކަންތަކާއި, ސަރުކާރުގެ ތެރެއިން ފޭދިގެންދާ އެތައް ބިލިއަން ރުފިޔާއަކަށް ވާނުވާއެއް ނޭނގޭ ހުރިހާ
      ކޮމިޝަންތައް އޮންނައިރު ވެސް. މިހާރު އޮންނަ ގޮތުން އިންޑެޕެންޑެންޓެއް ނޫން އޮންނަ ގޮތެއް. ރައްޔިތުންގެ މަޖިިލީހަށް ފެންނަ
      ގޮތަކަށް އެކަން ކުރަން އޮންނަނީ. މަޖިލީހުގެ މެޖޯރިޓީ އޮންނަ ފަރާތަކަށް ނޫންތޯ އޭތި ދެވޭނީ. އެހެންވީމާ މެޖޯރިޓީ އޮންނަ
      ފަރާތަކަށް އޭނާ އެބަ ޖެހޭ ތައުބާވާން," ސިޔާމް ވިދާޅުވި އެވެ.

      މިވަގުތު އޮތް ޑިމޮކްރަޓިކް ނިޒާމުގައި މާ ބޮޑު ހާމަކަމެއް އޮތް ކަމަށް ދެކެވަޑައިނުގަންނަވާ ކަމަށް ވެސް ސިޔާމް ވިދާޅުވި
      އެވެ. އަދި, ނިޒާމީ ބޮޑެތި ބަދަލުތަކެއް ގެންނަން ޖެހޭ ކަމަށް ވިދާޅުވެ ސިޔާމް ފާހަގަކުރެއްވީ ސްވިޒަލޭންޑުގެ އޮންނަ ނިޒާމުގެ
      ވާހަކަ އެވެ.

      މިފަދަ ވާހަކަތަކެއް ދެއްކެވިއިރު، ސިޔާމް ހުންނެވީ މި ސަރުކާރާއި ރައީސް ޑރ. މުހައްމަދު މުއިއްޒުއާއެކު މަސައްކަތް ކުރައްވާ
      ލީޑަރެއްގެ ގޮތުގަ އެވެ. މަޖިލީހުގައި ވެސް އެމްޑީއޭއިން މަސައްކަތް ކުރައްވަނީ ސަރުކާރާ އެއްކޮޅަށެވެ. އަދި، މި ސަރުކާރުގެ
      ސިޔާސީ ގިނަ މަގާމުތަކުގައިވެސް އެމްޑީއޭގެ އިސް އޮފިޝަލުން އެބަތިއްބެވެ.'
    - 'passage: 16: 13ރައްޔިތުންގެ ޚާއްސަ މަޖިލީހުގެ ރައީސް އައްބާސް އިބްރާހީމްގެ މައްޗަށް އިތުބާރު ނެތްކަމަށް ހުށަހެޅިފައިވާ
      މައްސަލައާ މެދު ބަހުސްކުރުމަށް ބޭއްވި ޖަލްސާގައި އިތުބާރުނެތްކަމަށް ފާހެއް ނުވިއެވެ. އިތުބާރު ނެތްކަމަށް ވޯޓް ދެއްވީ  49
      މެމްބަރުންނެވެ.ހެނދުނު  02: 9 ގައި ފެށި މި ޖަލްސާގެ ރިއާސަތުގައި އިންނެވީ ޚާއްސަ މަޖިލީހުގެ ނާއިބު ރައީސް އަލްއުސްތާޒް
      ޝާހީން ހަމީދެވެ. ރައްޔިތުންގެ މަޖިލިސް ކުރާ ގެއިން މައުލޫމާތު ދެއްވި ގޮތުގައި މި ޖަލްސާ ފެށުނު އިރު ތިއްބެވީ ޖުމްލަ  79
      މެންބަރުންނެވެ.މިއަދުގެ ޖަލްސާއަކީ އައްބާސްގެ އިތުބާރު ނެތް ކަމަށް މަޖިލީހުގެ  26 މެމްބަރަކު ސޮއިކުރައްވައި މި މަހުގެ  9
      ވަނަ ދުވަހު ހުށަހަޅުއްވާފައިވާ މައްސަލައާ ގުޅިގެން ބާއްވާ ޖަލްސާއެކެވެ. އައްބާސް އިބްރާހީމްގެ މައްޗަށް އިތުބާރު ނެތް
      ކަމަށް އެންމެ ފުރަތަމަ ހުށަހަޅުއްވާފައިވަނީ،  2006 މާޗް  6 ވަނަ ދުވަހު އެވެ. އެ މައްސަލައާ މެދު  2006 މާޗް މަހު  27
      ވަނަ ދުވަހު ބޭއްވި ޖަލްސާގައި އައްބާސްގެ މައްޗަށް އިތުބާރު ނެތް ކަމަށް ވޯޓު ދެއްވީ އެންމެ  24 މެންބަރުންނެވެ. އިތުބާރު
      އޮތް ކަމަށް  54 މެންބަރުން ވޯޓު ދެއްވުމުން، އައްބާސްގެ މައްޗަށް އިތުބާރު ނެތް ކަމަށް ފާހެއް ނުވި އެވެ.ހާއްސަ މަޖިލީހުން
      މައްސަލައެއް ފާސްވަނީ މަދުވެގެން  57 ވޯޓް ލިބިގެންނެވެ.'
  - source_sentence: 'query: މޯލްޑިވްސް އެމްއެންޑީއެފް ކޯސްޓް ގާޑުން ހޮނިހިރު ދުވަހުގެ ރޭ ސްރީލަންކާގެ މަސްބޯޓެއް އަތުލައިގަތެވެ.
      ބޯޓުގައި 344 ކިލޯގެ ކްރިސްޓަލް މެތާއި 124.6 ކިލޯ ކޮކެއިން ފެނުނެވެ. ބޯޓުގައި ތިބި 5 ފަޅުވެރިން އެންމެން ވެސް ސްރީލަންކާގެ
      ފިރިހެނުން ކަމަށް ފުލުހުން މަޢުލޫމާތު ދިނެވެ.'
    sentences:
    - 'passage: "އަޅުގަނޑު ގަސްތުކުރަން މި ޕާޓީގެ މެންބަޝިޕް ޑްރައިވެއް، މެންބަރުން އިތުރުކުރުމުގެ ހާއްސަ މަސައްކަތެއް އަޅުގަނޑު
      ފަށައިގެން ކުރިއަށް އޮތް މަސްދުވަހުގެ ތެރޭގައި މި ޕާޓީ އަށް މީހުން ގެނައުމުގެ މަސައްކަތްކުރަން. އަޅުގަނޑާ އެކު އަޅުގަނޑާ
      ވަރަށް އެކުގައި މަސައްކަތްކުރާ ވަރަށް ގިނަ އިލްމީ، ހިންގުންތެރި، ޒުވާން ބޭފުޅުންތަކެއް މިހާރު ވެސް ގުޅިފައިވާ ކަމުގެ
      ޔަގީން ތިޔަ ބޭފުޅުންނަށް އަރުވަން،" މިދިޔަ ހުކުރު ދުވަހުގެ ރޭ ކާނިވާ ސަރަހައްދުގައި ބޭއްވި ބިޔަ ޖަލްސާގައި އެ ޕާޓީގެ
      އާ މެންބަރު އަދި މަޖިލީހުގެ ރައީސް އަބްދުﷲ ޝާހިދު ވައުދުވެ ވަޑައިގެންނެވި އެވެ.އެތައް ހާސް ބަޔަކު ބައިވެރިވި އެ ޖަލްސާގައި
      ވާހަކަ ދައްކަވަމުން ކެޔޮދޫ ދާއިރާގެ މެންބަރު ޝާހިދު ވިދާޅުވީ އެ މަނިކުފާނު އެމްޑީޕީއާ ގުޅިވައިގަތުމުން ވަރަށް ގިނަ ބަޔަކު
      މަރުހަބާ ކިޔާފައިވާ ކަމަށާއި އަދި އެ މަނިކުފާނާ އެކު އެ ޕާޓީއާ ގުޅޭނެ ކަމުގެ ޔަގީންކަން ދީފައިވާ ކަމަށެވެ. ޑީއާރުޕީ
      ދޫކުރައްވައި މިދިޔަ ހަފުތާގައި އެމްޑީޕީއާ ގުޅިވަޑައިގެންނެވި ޝާހިދު އެ ރޭ ކުރެއްވި ވައުދާ އެކު އެ މަނިކުފާނު މިހާރު
      ވެސް ވަނީ އެ ޕާޓީ އަށް މީހުން އިތުރުކުރެއްވުމަށް މަސައްކަތްތައް ފައްޓަވައިފަ އެވެ. ހަފުތާ ބަންދުގައި ލަންކާ އަށް ކުރެއްވި
      ދަތުރުފުޅުގައި ވެސް އެ މަނިކުފާނު ވަނީ އެ ޕާޓީ އަށް މެންބަރުންތަކެއް ވައްދައިފަ އެވެ. ސޯޝަލް މީޑިއާގައި އެ ފޮޓޯތައް
      މިހާރު އާންމުވެފައިވާ އިރު އެ މަނިކުފާނު ވިދާޅުވެފައި ވަނީ ގިނަ އަދަދެއްގެ މެންބަރުންތަކެއް އެ މަނިކުފާނާ އެކު އެމްޑީޕީއާ
      ގުޅޭނެ ކަމަށެވެ."އަޅުގަނޑު މިއަދު މިހުރީ އެމްޑީޕީގެ މެންބަރުންނާ އެކު ރާއްޖޭގެ ރައްޔިތުންނަށް ހެޔޮ ގޮތްތައް ހޯދައިދިނުމަށް
      ކުރެވެން ހުރި ހުރިހާ މަސައްކަތްތަކެއް ކުރުމަށް އާކުރަމުން،" އެމްޑީޕީގެ ޕޯޑިއަމްގައި ފުރަތަމަ ފަހަރަށް ވާހަކަ ދައްކަވަމުން
      ޝާހިދު ވިދާޅުވި އެވެ.އެމްޑީޕީން ބުނީ ޝާހިދު ލަންކާ އަށް ކުރެއްވި ދަތުރުފުޅުގައި ސޮއިކުރެއްވި މެންބަރުންނަކީ އެ މަނިކުފާނު
      ވިދާޅުވި އެއް މަސް ދުވަހުގެ މަސައްކަތުގެ ފެށުން ކަމަށާއި މި މަސައްކަތުގެ ތެރެއިން ގިނަ މެންބަރުންތަކެއް އެ ޕާޓީއާ ގުޅޭނެ
      ކަމުގެ ޔަގީންކަން އެބަ އޮތް ކަމަށެވެ.'
    - 'passage: އއ. މާވަރު ފަޅުތެރެއިން  2006 ވަނަ އަހަރު ފެނުނު  1.6 ޓަނުގެ މަސްތުވާތަކެތީގެ ތެރެއިން ތަހުގީގަށް އެއް ޕެކެޓް
      ބޭއްވުމަށް ފަހު އެ ހުރިހާ ތަކެއްޗެއް ވެސް އަންދާލާފައި ވަނީ ވަރަށް ފާޅުކަންބޮޑު ގޮތެއްގައި ކަމަށް ފުލުސް އޮފީހުން ބުނެފި
      އެވެ.ފުލުހުންގެ ބެލުމުގެ ދަށުގައި ހުރި އެ މަސްތުވާތަކެއްޗަށް ވީ ނުވީއެއް ނޭނގޭ ކަމަށް އާއްމު ބައެއް ފަރާތްތަކުންނާއި
      ރައްޔިތުންގެ މަޖިލީހުގެ ޖަލްސާއެއްގައި މެމްބަރަކު ވެސް ވިދާޅުވުމާ ގުޅިގެން ފުލުހުން ނެރުނު ނޫސް ބަޔާނެއްގައި ވަނީ އެތަކެތި
      ނައްތާލާފައި ވަނީ އެކި ދުވަސް މަތިން މަސްތުވާތަކެތި އަންދާލުމާ ބެހޭ ކޮމެޓީގެ ބެލުމުގެ ދަށުން ނޫސްވެރިންގެ ވެސް ހާޒިރުގައި
      ކަމަށެވެ.އެ ބަޔާނުގައިވާ ގޮތުގައި ދޮޅު ޓަނަށް ވުރެ ގިނަ މަސްތުވާތަކެތީގެ ތެރޭގައި ހިމެނޭ  1697 ޕެކެޓްގެ ތެރެއިން އެއް
      ޕެކެޓް ތަހުގީގަށް ބޭއްވުމަށް ފަހު، އެކި ދުވަސް މަތިން ދޫނިދު އާއި ހުޅުމާލޭގައި ވަނީ އަންދާލައިފަ އެވެ.އަރިއަތޮޅު ގަންގެހި
