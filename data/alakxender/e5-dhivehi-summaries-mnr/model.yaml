    ހުރެ ބުންޏެވެ.އިމާދު ބުނި ގޮތުގައި އަލީ ލަރީފުގެ ހަށިގަނޑު ނަގައިގެން އެންމެ ފުރަތަމަ ގެންދިޔައީ އދ. މާމިިގިލީ ސިއްހީ
    މަރުކަޒަށް ދެއްކުމަށެވެ. ނަމަވެސް އެ މަރުކަޒުން ބުނި ގޮތުގައި ސަން އަައިލެންޑް ރިސޯޓް ކައިރިން މަރުވި މީހާގެ ހަށިގަނޑު
