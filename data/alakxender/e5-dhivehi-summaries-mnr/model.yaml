  - 'passage: ރާއްޖޭގެ ސަރަހައްދުގައި ޤަވާއިދާއި ޙިލާފަށް އުޅެމުން ދަނިކޮށް އަތުލައިގަތް ސްރީލަންކާގެ މަސް ބޯޓުގައި 344 ކިލޯގެ
    ކްރިސްޓަލް މެތު އަދި 124.6 ކިލޯ ކޮކެއިން ހުރި ކަމަށް ފުލުހުން ބުނެފިއެވެ.

    މި ބޯޓު އަތުލައިގެންފައި ވަނީ ހޮނިހިރު ދުވަހުގެ ރޭގެ ވަގުތެއްގައި އެމްއެންޑީއެފްގެ ކޯސްޓް ގާޑުންނެވެ.

    ފުލުހުން ހާމަކޮށްފައިވާ ގޮތުގައި ކުޅުދުއްފުށީ ސިޓީގެ ފުލުހުންނާއި އެމްއެންޑީއެފް ކޯސްޓު ގާޑުން އާދީއްތަ ދުވަހުގެ ހެނދުނު
    ބޯޓު ބަލައި ފާސްކޮށް ބޯޓު ކުޅުދުއްފުށީ ބަނދަރަށް ގެންގޮސްފައިވާ ކަމަށެވެ.

    ކޮމިޝަނަރ އޮފް ޕޮލިސް އަލީ ޝުޖާޢު ނޫސްވެރިންނަށް މަޢުލޫމާތު ދެއްވަމުން ވިދާޅުވީ ސްރީލަންކާގެ މަސް ބޯޓު އަތުލައިގަތީ ހޮނިހިރު
    ދުވަހުގެ ރޭ ދަންވަރު 12:45 ހާއިރު މަކުނުދޫ ބޭރުން ކަމަށެވެ.

    "އަށެންޕުތަ" ނަމަކަށް ކިޔާ އެ ބޯޓު އަތުލައިގަތް އިރު، ބޯޓުގައި ތިބީ 5 ފަޅުވެރިން ކަމަށާއި އެ އެންމެންނަކީ ވެސް ސްރީލަންކާގެ
    ފިރިހެނުން ކަމަށް ފުލުހުން ބުނެފައިވެއެވެ.'
