    sentences:
    - 'passage: ކްރެޑިޓް ކާޑު އަމިއްލަ އަށް ހަދައިގެން ޖުމްލަ  3.5 މިލިއަން ރުފިޔާގެ މުދާ ވަގަށް ގަނެފައިވާ ތިން ދިވެއްސަކާއި
      އެކަމުގެ އަޑީގައި ހުރި މެލޭޝިޔާ މީހަކު މޯލްޑިވްސް ޕޮލިސް ސާވިސް އިން ހައްޔަރުކޮށްފި އެވެ.މޯލްޑިވްސް ޕޮލިސް ސާވިސްގައި
      މިއަދު ބޭއްވި ނޫސް ކޮންފަރެންސެއްގައި ކްރިމިނަލް އިންވެސްޓިގޭޓިވް ޑިޕާޓްމަންޓުގެ ކޮމާޝަލް ކްރައިމް ޔުނިޓްގެ ހެޑް އިންސްޕެކްޓާ
      އިސްމާއިލް އަތީފް ވިދާޅުވީ ރާއްޖޭގައި ވަގު ކްރެޑިޓް ކާޑު ބޭނުންކޮށްގެން މިހާތަނަށް ކުރި އެންމެ ބޮޑު ވައްކަމުގައި ބައިވެރިވެފައިވާ
      ތިން ދިވެހިންނާއި މެލޭޝިޔާގެ މީހަކު ހައްޔަރުކުރީ، މިދިޔަ އަހަރުގެ ސެޕްޓެމްބަރު މަހުން ފެށިގެން ބަލަމުން ދިޔަ މައްސަލައެއްގައި
      މިދިޔަ މަހުގެ  25 ވަނަ ދުވަހު ކަމަށެވެ. މި މައްސަލާގައި މިހާތަނަށް ހައްޔަރު ކުރި މީހުންގެ ތެރޭގައި ހިމެނެނީ ހ. ނޫރަންމާގެއާގޭ
      މުހައްމަދު ޝަފްރާޒް،  ،28 ގދ. ތިނަދޫ އޮޅުތެރޭގެ މުހައްމަދު ތަމްދީން،  ،21 ހ. ސެނާ އަހުމަދު ސާދު،  ،22 އަދި މެލޭޝިޔާގެ
      ރައްޔިތެއް ކަމަށްވާ ތަކިޔުއްދީން ބިން ހާޝިމް،  33 އެވެ. މިމައްސަލާގައި މެލޭސިޔާގައި ދިރިއުޅޭ މެލޭޝިޔާގެ ތިން މީހަކާއި
      ސްރީލަންކާގެ ދެމީހަކު ހޯދަމުން ގެންދާ ކަމަށް ވެސް އޭނާ ވިދާޅުވި އެވެ."މިއީ ދިވެހި ރާއްޖޭގައި މިހާތަނަށް ނުހިނގާވަރުގެ
      ބޮޑު ފްރޯޑް ކޭސްހެއް. ވަގު ކްރެޑިޓް ކާޑް ބޭނުންކޮށްގެން ވަރަށް ގިނަ ތަންތަނުން ވަރަށް ބޮޑެތި ވިޔަފާރިތައް ވަނީ ކޮށްފައި.
      ޖުމްލަ އަދަދެއް ކަމަށް އަންދާޒާ ކުރެވެނީ  3.5 މިލިއަން ރުފިޔާ،" އޭނާ ވިދާޅުވި އެވެ.އަތީފް ވިދާޅުވި ގޮތުގައި މާލޭގެ ތަފާތު
      ފިހާރަތަކުން ވަގު ކާޑު ބޭނުންކޮށްގެން ކުރި ވިޔަފާރީގައި  80 ވަގު ކާޑު ބޭނުންކޮށްފައިވާ ކަމަށް މިހާތަނަށް މައުލޫމާތު
      ލިބިފައިވެ އެވެ. މި ކާޑުތައް ބޭނުންކޮށްގެން ކުރި ވިޔަފާރީގައި ކޮންމެ މުއާމަލާތެއްގައިހެން ގާތްގަނޑަކަށް އެއްލަންކަ އާއި
      ދެއްކަ ރުފިޔާގެ ވިޔަފާރި ކޮށްފައިވާ ކަމަށް އޭނާ ވިދާޅުވި އެވެ. އޭގެ ތެރޭގައި އަގު ބޮޑެތި ހުރިހާ ބާވަތެއްގެ މުދާ ހިމެނޭ
      ކަމަށް ވެސް އޭނާ ވިދާޅުވި އެވެ.އަތީފު ވިދާޅުވި ގޮތުގައި މި މައްސަލަ ހިނގާފައިވާ ގޮތަށް ބަލާއިރު، މި ކަމުގައި އިސް ދައުރެއް
      އަދާކޮށްފައިވާ ކަމަށް ބެލެވެނީ ކްރެޑިޓް ކާޑު އުފައްދާ ފެކްޓަރީއެއްގައި ޓެކްނީޝަނެއްގެ ވަޒީފާ ކުރިން އަދާކޮށްފައިވާ މީހެއް
      ކަމަށް ބެލެވޭ މެލޭޝިޔާ މީހާ އެވެ. އަތީފު ވިދާޅުވި ގޮތުގައި މި މައްސަލާގައި ދިވެހިން ބައިވެރިވެފައިވާ ކަމަށް ބެލެވެނީ
      އެނާގެ އެހީތެރިންގެ ގޮތުގަ އެވެ. މެލޭޝިޔާ މީހާ ރާއްޖެއިން ހައްޔަރުކުރީ ޓޫރިސްޓު ވިސާގައި މާލޭގައި ހުއްޓަ އެވެ."މެލޭޝިޔާ
      މީހާ އަކީ ފުންނާބު އުސް މީހެއް ކަމަށް އެނގިފައި އޮތީ. އޭނަ ދިން މައުލޫމާތުގެ އަލީގައި ދިވެހިން ވެސް މަސައްކަތް ކުރަމުން
