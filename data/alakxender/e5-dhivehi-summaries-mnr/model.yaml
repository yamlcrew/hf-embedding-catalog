- source_sentence: 'query: މިމަހުގެ ކުރީކޮޅުން ފެށިގެން ރައްޔިތުންގެ މަޖިލިސް ޖަލްސާތައް ބާއްވަމުން އަންނައިރު، މިއަދު ބޭއްވި
    ވޯޓުގައި 57 މެންބަރުންގެ އަޣުލަބިއްޔަތުން ފާސްކުރި އެ ގަރާރަށް އިދިކޮޅު ފަރާތްތަކުން ދެކޮޅެއް ނަހަދައެވެ.'
  sentences:
  - 'passage: މާލޭގެ ގެއަކުން ވަގަށްނަގާފައިވާކަމަށް ބެލެވޭ އިލެކްޓްރޯނިކް ސާމާނުތަކެއް ފުލުހުން ހޯދައި ތިން މީހަކު މިއަދު
    ހައްޔަރުކޮށްފި އެވެ.މިއަދު ހެނދުނު ފުލުހުންނަށް ލިބުނުމައުލޫމާތަކާއި ގުޅިގެން މި މައްސަލައިގައި ހައްޔަރުކުރި މީހުން ދިރިއުޅެމުން
    ދިޔަ ތަންތަން ބަލާ ފާސްކުރުމުގެތެރޭގައި ހ. ބެރެބެދިމާގެއާގެ އިން ވަގަށް ނަގާފައިވާ ލެޕްޓޮޕަކާއި ދެ ފޯނު ވަނީފުލުހުން ހޯދައިފާ
    ކަމަށް ފުލުސް އޮފީހުން ބުންޏެވެ.މި  މައްސަލައާ ގުޅިގެން ހައްޔަރުކޮށްފައި ވަނީ ގއ.ވިލިގިލި ހަނދުވަރީގެ މިޔާދު އަހުމަދު،
    33، އާއި ހ. ސީރާޒް އިބްރާހީމްޝާހް، 33، އާއި މ. ސޭބޫގެ މުހައްމަދު ފާރިޝް، 27، އެވެ.ވަގަށް ނެގި ތަކެތިވެރިފަރާތާ ހަވާލުކުރުމުގެ
    މަސައްކަތް ދަނީ ކުރަމުން ކަމަށާއި މި މައްސަލަ ފުލުހުން ތަހުގީގުކުރަމުން އަންނަ ކަމަށް ވެސް ފުލުސް އޮފީހުގެ ބަޔާނެއްގައިވެ
    އެވެ.'
  - 'passage: ރާއްޖޭގެ ވެރިކަން ކުރުމުގެ މާ ބޮޑު ޝައުގުވެރިކަމެއް މިވަގުތު ނެތް ކަމަށާއި 2028 ގެ ރިޔާސީ އިންތިހާބުގައި އޭނާ
    ވާދަކުރުމާ މެދު ގޮތެއް ނިންމުމުގެ ބާރު އޮތީ ރައްޔިތުންގެ އަތް މަތީގައި ކަމަށް މީދޫ ދާއިރާގެ މެންބަރު އަދި މޯލްޑިވްސް ޑިވެލޮޕްމަންޓު
    އެލަޔަންސް (އެމްޑީއޭ) ލީޑަރު އަހްމަދު ސިޔާމް މުހައްމަދު ވިދާޅުވެއްޖެ އެވެ.

    "ރާއްްޖެ ޓީވީ" އަށް ދެއްވި ހާއްސަ އިންޓަވިއުއެއްގައި ވެރިކަން ކުރަން ބޭނުންވެއްޖެ ނަމަ އެކަން ކާމިޔާބު ކުރާނެ ކަމުގެ ޔަގީންކަން
    ސިޔާމް މިއަދު ދެއްވި އެވެ. މިހާތަނަށް ކާމިޔާބު ނުވާ އެއްވެސް ސިޔާސީ ކެމްޕޭނެއް ނުކުރައްވާ ކަމަށް މީދޫ ދާއިރާގެ ގޮނޑި އެންމެ
    ގިނަ ދައުރުގައި ފުރުއްވި މެންބަރު ވިދާޅުވި އެވެ.

    "ތި ވާހަކައިގައި އަޅުގަނޑު ދަންނަވާނީ އެއީ ރައްޔިތުން ނިންމާ އެއްޗެއް ދެއްތޯ. ރައްޔިތުން ނިންމަންވީ މިސާލަކަށް އަހްމަދު
    ސިޔާމް ތިމަންނަމެންގެ މި ގައުމު ހިންގައިދޭށޭ ފަސް އަހަރު. އިރާދު ކުރެއްވިއްޔާ އަޅުގަނޑު އެކަން ކޮށްދޭނަން. ދިވެހިރާއްޖޭގެ
    ރައްޔިތުންނަށް އެއްވެސް ޒަމާނަކު ނުފެންނަ ވަރަކަށް ވާ ވަރަށް މަތީ ތަރައްގީ ގެނެސްދޭނަން އަޅުގަނޑު," ސިޔާމް ވިދާޅުވި އެވެ.

    ރާއްޖޭގެ އެންމެ މުހިންމު ދެ މިނިވަން މުއައްސަސާ ކަމަށްވާ އިލެކްޝަންސް ކޮމިޝަން (އީސީ) އާއި އެންޓި ކޮރަޕްޝަން ކޮމިޝަން
    (އޭސީސީ) ގެ މައްޗަށް ރައީސުލްޖުމްހޫރިއްޔާގެ ފުރިހަމަ ބާރު އޮންނަ ގޮތަށް ދާދިފަހުން ގާނޫނުތައް ވަނީ ބަދަލުކޮށްފަ އެވެ.
    މިހާރު އެ ކޮމިޝަންތަކުގެ ރައީސް އާއި ނައިބު ރައީސް އައްޔަނު ކުރައްވާނީ ރައީސް ޑރ. މުހައްމަދު މުއިއްޒު އެވެ.

    އެ ކަމަށް އިޝާރާތް ކުރައްވައި ސިޔާމް ވިދާޅުވީ މިނިވަން މުސްތަގިއްލު ކޮމިޝަންތައް ކަމަށް ކަނޑައަޅާފައިވާ ތަންތަން ހިނގަން
    ޖެހޭނީ މިނިވަންކަމާއެކު ކަމަށެވެ. އެއްވެސް އިރަކު މިނިވަންކޮށް އެ ތަންތަން ހިނގާ ކަމަށް ދެކެވަޑައިނުގަންނަވާ ކަމަށް ސިޔާމް
    ވިދާޅުވި އެވެ.

    "މި ހިނގައިދާ ހުރިހާ ވައްކަންތަކާއި, ސަރުކާރުގެ ތެރެއިން ފޭދިގެންދާ އެތައް ބިލިއަން ރުފިޔާއަކަށް ވާނުވާއެއް ނޭނގޭ ހުރިހާ
    ކޮމިޝަންތައް އޮންނައިރު ވެސް. މިހާރު އޮންނަ ގޮތުން އިންޑެޕެންޑެންޓެއް ނޫން އޮންނަ ގޮތެއް. ރައްޔިތުންގެ މަޖިިލީހަށް ފެންނަ
    ގޮތަކަށް އެކަން ކުރަން އޮންނަނީ. މަޖިލީހުގެ މެޖޯރިޓީ އޮންނަ ފަރާތަކަށް ނޫންތޯ އޭތި ދެވޭނީ. އެހެންވީމާ މެޖޯރިޓީ އޮންނަ
    ފަރާތަކަށް އޭނާ އެބަ ޖެހޭ ތައުބާވާން," ސިޔާމް ވިދާޅުވި އެވެ.

    މިވަގުތު އޮތް ޑިމޮކްރަޓިކް ނިޒާމުގައި މާ ބޮޑު ހާމަކަމެއް އޮތް ކަމަށް ދެކެވަޑައިނުގަންނަވާ ކަމަށް ވެސް ސިޔާމް ވިދާޅުވި
    އެވެ. އަދި, ނިޒާމީ ބޮޑެތި ބަދަލުތަކެއް ގެންނަން ޖެހޭ ކަމަށް ވިދާޅުވެ ސިޔާމް ފާހަގަކުރެއްވީ ސްވިޒަލޭންޑުގެ އޮންނަ ނިޒާމުގެ
    ވާހަކަ އެވެ.

    މިފަދަ ވާހަކަތަކެއް ދެއްކެވިއިރު، ސިޔާމް ހުންނެވީ މި ސަރުކާރާއި ރައީސް ޑރ. މުހައްމަދު މުއިއްޒުއާއެކު މަސައްކަތް ކުރައްވާ
    ލީޑަރެއްގެ ގޮތުގަ އެވެ. މަޖިލީހުގައި ވެސް އެމްޑީއޭއިން މަސައްކަތް ކުރައްވަނީ ސަރުކާރާ އެއްކޮޅަށެވެ. އަދި، މި ސަރުކާރުގެ
