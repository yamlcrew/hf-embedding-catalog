      ވެސް ނާރާނެ، އަޅުގަނޑު ކޮށްފައި ނުކުރާނެ ކަންކަމެއް،" ރައީސް ނަޝީދު ވިދާޅުވި އެވެ.ރައީސް އެ މޭރުމުން ވާހަކަ ދެއްކެވި
      ނަމަވެސް، އެ މަނިކުފާނު ދެކެ ބަޔަކު ކިތަންމެ ރުޅި އަޔަސް ކޯފާވެވަޑައިނުގަންނަވާނެ ކަމަށާއި ކިތަންމެ ބަޔަކު ނަފްރަތު
      ކުރިޔަސް އެ މަނިކުފާނު އެ ބަޔަކާ ދުރަށް ޖެހިވަޑައި ނުގަންނަވާނެ ކަމަށް ވެސް އެ ބައްދަލުވުމުގައި ރައީސް ވިދާޅުވި އެވެ.އަލިފުށީ
      ރައްޔިތުންނާ ބައްދަލުކުރައްވައި ރައީސް ދެއްކެވި މި ވާހަކަފުޅުވަނީ ރައީސް އޮފީހުގެ ވެބްސައިޓް، ޕްރެޒިޑެންސީމޯލްޑިވްސް
