    ކަމެއް އަދި ކަށަވަރެއް ނުވޭ. މިއަދު ނޫނީ މި ރޭގެ ވަގުތެއްްގައި ފުރޭތޯ އަޅުގަނޑުމެން މި ބަލަނީ،" އައިޖީއެމްއެޗްގައި ހުރެ
    މުހައްމަދު ބުންޏެވެ.އޭނާ ބުނީ ހިތަދޫ ރީޖަނަލް ހޮސްޕިޓަލްގައި ފަރުވާ ދިނުމަށް ފަހު، ސަައްމާހް މާލެ ގެނެސް ފަރުވާ ދޭން ފެށި
    ނަމަވެސް ހާލަތަށް މާ ބޮޑު ކުރިއެރުމެއް ނާންނަ ކަމަށެވެ."ގެނައި އިރު ހެއެއް ނެތް. އެކަމަކު މިހާރު ހޭ އެބަހުރި،" މުހައްމަދު
    ބުންޏެވެ. "އޭނާގެ ހާލަތަށް މާ ބޮޑު ކުރިއެރުމެއް އައިސްފައެއް ނެތް. ޑޮކްޓަރު ވިދާޅުވީ ބޮލަށް ގެއްލުންވެފައި ހުރުމުން ހޭ
    އެރުން ކުޑަވަނީ ކަމަށް."މުހައްމަދު އަދި ބުނީ ސައްމާހުގެ ބޯ ފަޅައިގެން ގޮސް، ސިކުނޑި އަަށް ލޭ އެޅުން ފިޔަވައި އިތުރު ބޮޑު
    އަނިޔާއެއް ލިބިފައި ނުވާ ކަމަށެވެ."ﷲގެ އިރާދަފުޅުން ދަރިފުޅުގެ ބޮލަށް ލިބުނު ގެއްލުން ފިޔަވައި ތަނެއް ބިންދައިގެން ދިއުން
    ކަހަލަ އިތުރު ބޮޑު އަނިޔާއެއްވެފައެއް ނެތް،" މުހައްމަދު ބުންޏެވެ.ސައްމާހް އެކްސިޑެންޓްވީ އޭނާ އާއި ހިތަދޫ ޗަރުކޭސީގޭ މަމްދޫން
    އަހުމަދު އަލިދީދީ، 22، އާ ދެ މީހުން ސައިކަލްގައި ދަނިކޮށް ފޭދޫ ބޮޑު މަގުގަ އެވެ. އެ ރޭ ދަންވަރު އެ މީހުން ދިޔައީ ހިތަދޫން
    ގަމަށް ކަމަށް މަމްދޫންގެ އާއިލާ ބުނެފައިވެ އެވެ.އެ ހާދިސާ ހިނގީ އެ މީހުން ދުއްވާފައި ދިޔަ ސައިކަލް ކާރެއްގެ ކުރިއަށް އަރަން
    އުޅެނިކޮށް، ކޮންޓްރޯލް ނުވެ ގޮސް ފާރެއްގައި ޖެހިގެންނެވެ.މި ހާދިސާގައި މަމްދޫނަށް ހިތަދޫ ރީޖަނަލް ހޮސްޕިޓަލުގައި ފަރުވާ
    ދެމުން ދަނިކޮށް ވަނީ މަރުވެފަ އެވެ.'
  - "passage: ޝަންގްރިއްލާ އިން އައްޑު އަތޮޅުގައި ހިންގަމުން އަންނަ ވިލިނގިލި ރިސޯޓުގެ ވަޒީފާ އިން ގަވައިދާ ހިލާފަށް ހަތަރު\
    \ މުވައްޒަފަކު ވަކިކޮށްފައިވާ ކަމަށް ބުނެ ހަޅުތާލުކުރަމުން ގެންދާ އެ ރިސޯޓުގެ ގިނަ އަދަދެއްގެ ދިވެހި މުވައްޒަފުންނާ މެދު\
    \ މެނޭޖްމަންޓުން އަދިވެސް ވަކި ގޮތެއް ނުނިންމާ ކަމަށް ޓޫރިޒަމް އެމްޕްލޯއި އެސޯސިއޭޝަން އޮފް މޯލްޑިވްސް (ޓީމް) އިން މިއަދު\
    \ ބުނެފި އެވެ.ސ. ފޭދޫ ބަނދަރުގައި ތިބެގެން ހުކުރު ދުވަހު ހެނދުނުން ފެށިގެން ހަލުތާލު ކުރަމުންދާ މުވައްޒަފުންނާ މިއަދުން\
    \ ފެށިގެން ޓީމުގެ ނައިބް ރައީސް މައުރޫފް ޒާކިރު ވެސް ގެންދަވަނީ ބައިވެރިވެވަޑައިގަންނަވަމުންނެވެ.\"ގަވައިދާ ހިލާފަށް މުވައްޒަފުންތަކެއް\
    \ ވަކި ކުރުމާ ގުޅިގެން، އިތުރު މުވައްޒަފުންތަކެއް ހަޅުތާލު ކުރަން ފެށުމުން އެ މީހުން ވެސް ވަޒީފާ އިން ވަކިކޮށްފައިވާ ކަމަށް\
    \ ބުނެ ފުލުހުން ގެންގޮސް ރަށުން ބޭރުކޮށްލާފައިވާ އިރު މިއީ ގާނޫނުއަސާސީގެ ދަށުން ވެސް ކުރެވޭނެ ކަމެއް ނޫން،\" މައުރޫފް\
    \ ވިދާޅުވި އެވެ.އޭނާ ވިދާޅުވި ގޮތުގައި ހައްގުތަކެއް ހޯދުމަށް ހަޅުތާލުކުރަމުން ދަނިކޮށް ވަޒީފާ އިން ވަކިކުރި ކަމަކަށް މެނޭޖްމަންޓަކަށް\
    \ ނޭންގޭނެ އެވެ. އަދި މުވައްޒަފުންނާ މެދު ފިޔަވަޅެއް އަޅައިފިއްޔާ އެކަން ރަސްމީކޮށް ލިއުމުން އަންގަން ޖެހޭނެ ކަމަށް ވެސް\
    \ މައުރޫފް ވިދާޅުވި އެވެ.\"އެހެންނަމަވެސް ހަޅުތާލު ކުރަމުން ދާ މުވައްޒަފުންނާ ދޭތެރޭ އެޅި ފިޔަވަޅެއް މިހާތަނަށް ލިއުމަކުން\
    \ އަންގާފައެއް ނެތް. އަޅުގަނޑުމެން މި ގެންދަނީ ލޭބާ ރިލޭޝަންއޮތޯރިޓީ އަށް ވެސް މިކަން ހުށަހަޅައިގެން މެނޭޖްމަންޓުގެ ފަރާތުން\
    \ ލިއުމެއް ހޯދުމަށް މަސައްކަތް ކުރަމުން،\" އޭނާ ވިދާޅުވި އެވެ.މައުރޫފް ވިދާޅުވީ މި މައްސަލާގައި ރިސޯޓްގެ މެނޭޖްމަންޓާ\
    \ މަޝްވަރާކޮށްފައިވާ ކަމަށެވެ. އެހެންނަމަވެސް ހަޅުތާލު ކުރަމުންދާ މުވައްޒަފުންނާ މެދު އަދިވެސް ގޮތެއް ނިންމާފައި ނުވާ\
    \ ކަމަށް ރިސޯޓުގެ ޖެނެރަލް މެނޭޖަރު ވެސް ވިދާޅުވި ކަމަށް މައުރޫފް ވިދާޅުވި އެވެ.ރާއްޖޭގައި ހަދާފައިވާ އެންމެ ފެންވަރު\
    \ މަތީ އެއް ރިސޯޓްގެ  150 ދިވެހި މުވައްޒަފުން ހަޅުތާލުގައި މިހާރު ބައިވެރިވަމުން އަންނަ ކަމަށް ބެލެވެ އެވެ.\"މިކަން ފުރަތަމަ\
    \ ހިނގި އިރު ޖީއެމް ނުވެސް ނެތް. އެހެންނަމަވެސް މިހާރު ޖީއެމް ވަޑައިގަތުމުން މިކަމާ ބެހޭ ގޮތުން ވާހަކަ ދެއްކީމަ ވިދާޅުވީ\
    \ އެއްވެސް ޑިސިޝަނެއް މެނޭޖްމަންޓުން އަދިވެސް ނަގާފައިނުވާ ކަމަށް،\" މައުރޫފް ވިދާޅުވި އެވެ. \"އެހެންނަމަވެސް މިއަދުގެ\
    \ ވަގުތެއްގައި އިތުރަށް މަޝްވަރާ ކުރައްވާނެ ކަމަށް ޖީއެމް ވިދާޅުވި.\"މައުރޫފް ވިދާޅުވީ މުވައްޒަފުންގެ ހައްގުތައް ނުލިބެނީސް\
    \ ހަޅުތާލު ހުއްޓާ ނުލައި ކުރިއަށް ގެންދާނެ ކަމަށެވެ. އެހެންނަމަވެސް މި މައްސަލަ ވަޒީފާއާ ބެހޭ ޓްރިބިއުނަލް އަށް ހުށަހަޅާފައި\
    \ ނުވާ ކަމަށް އޭނާ ވިދާޅުވި އެވެ.\"އެތަނަށް އަދި އަޅުގަނޑުމެން މި މައްސަލަ ހުށަހަޅާފައެއް ނެތް. އެތަނަށް މައްސަލަތައް\
    \ ހުށަހެޅުމުން ވަރަށް ދިގު ޕްރޮސީޖާއެއްގެ ތެރެއިން ނިންމަން ނަގަނީ،\" އޭނާ ވިދާޅުވި އެވެ. \"އެހެންވެ އައްޑޫގައި ތިބި މުވައްޒަފުންތަކެއް\
    \ ޓްރިބިއުނަލް އަށް ހުށަހަޅައިގެން ކުރިއަށް ގެންދިއުމަކީ ވެސް ފަސޭހަ ކަމެއް ނޫން. އެހެންވެ މުވައްޒަފުންގެ ހައްގު ހޯދުމަށް\
    \ އެ މީހުން ހަޅުތާލު ކުރަމުން ގެންދާނެ.\"ވިލިނގިލި ރިސޯޓުގެ ހަތަރު މުވައްޒަފަކު ވަޒީފާ އިން ވަކިކޮށްފައި ވަނީ އެ ރިސޯޓުގެ\
    \ ކޮޓަރިއެއްގައި ހުރި ވަސީލަތްތަކެއް ގަވާއިދާ ހިލާފަށް ބޭނުން ކުރާ ކަމަށް ބުނެ މިދިޔަ ބުދަ ދުވަހު އެވެ. ގިނަ އަދަދެއްގެ\
    \ މުވައްޒަފުން ހަޅުތާލަކަށް ނިކުތީ އެ ހަތަރު މުވައްޒަފުން ވަޒީފާ އިން ވަކިކުރީ ގަވާއިދާ ހިލާފަށް ކަމަށް ބަލައިގެންނެވެ.\
    \ \tވިލިނގިލި ރިސޯޓް އެންޑް ސްޕާގެ ކޮމިއުނިކޭޝަން މެނޭޖަރު ލެސްލީ ގާޝިއާ މިއަދު ވިދާޅުވީ މުވައްޒަފުންނާއި މެނޭޖްމަންޓާ\
    \ ދެމެދު އުފެދިފައިވާ މައްސަލަތައް ހައްލު ކުރުމަށް މަސައްކަތް ކުރަމުން އަންނަ ކަމަށެވެ. އެގޮތުން ދެކުނު ޕްރޮވިންސް އޮފީހާއި\
    \ ޓީމާ މަޝްވަރާކޮށްގެން ހައްލެއް ހޯދުމަށް މަސައްކަތް ކުރައްވާ ކަމަށް ވެސް އޭނާ ވިދާޅުވި އެވެ. އޭގެ އިތުރު ތަފުސީލެއް އޭނާ\
