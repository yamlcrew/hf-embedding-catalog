    އަޑި ބަލައި އަލީ ލަރީފް ފެނޭތޯ ހޯދީ އެވެ."އަލީ ލަރީފް ނެތްކަން އެނގުނުތާ ފަސް ވަރަކަށް މިނެޓް ތެރޭގައި އެ ތިންކުދިން ވެގެން
