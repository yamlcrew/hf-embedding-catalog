      ނަގަން އުޅުނު ކ. ދިއްފުށީ ދޯންޏެއްގެ ބަޔަކަށެވެ.'
    - 'passage: ރާއްޖޭގެ ސަރަހައްދުގައި ޤަވާއިދާއި ޙިލާފަށް އުޅެމުން ދަނިކޮށް އަތުލައިގަތް ސްރީލަންކާގެ މަސް ބޯޓުގައި 344
