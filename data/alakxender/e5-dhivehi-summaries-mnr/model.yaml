      މީހުންނަށް ހަދިޔާގެ ގޮތުގައި ލިބިފައިވާ މުދަލެވެ. މި މައްސަލާގައި ބައިވެރިވެ ހޯދަމުން ގެންދާ ފަސް މީހުންނާ ބެހޭ އިތުރު
      މައުލޫމާތެއް ފުލުހުން ނުދެ އެވެ.ފުލުސް އޮފީހުން ބުނި ގޮތުގައި މި މައްސަލަ ބެލުމުގައި ބޭންކް އޮފް މޯލްޑިވްސް އާއި ސިޕްރިޔާ
      ޕްރައިވެޓް ލިމިޓެޑްގެ އެހީ ވެސް ވަނީ ލިބިފަ އެވެ. އަދި މި މައްސަލާގައި މެލޭޝިޔާގެ ފުލުހުންގެ އެހީ އާއި ސިންގަޕޫރުގައި
      ހުންނަ ވިސާ ކާޑު ސެންޓަރުގެ އެހީ ވެސް ހޯދަމުން ގެއްދާ ކަމަށް އޭނާ ވިދާޅުވި އެވެ.އަތީފު ވިދާޅުވި ގޮތުގައި މި ވައްކަމުގައި
      ވިޔަފާރިކޮށްފައިވާ ބައެއް ފިހާރަތަކުން މި މައްސަލަ ވަނީ ބޭންކް އޮފް މޯލްޑިވްސް މެދުވެރިކޮށް ހުށަހަޅައިފަ އެވެ. ފުލުހުން
      ބުނީ މި މައްސަލައިގެ ދައުވާ އުފުލާ ހަގީގީ ފަރާތްތަކަށް ވާނީ ވަގަށް އުފައްދާފައިވާ ކާޑުތަކުގެ އަސްލު ވެރިފަރާތްތައް ކަމަށެވެ.'
  - source_sentence: 'query: ނިޔަފަރި އަތިރީގޭ، 20 އަހަރުގެ ޢަލީ ލަތީފް މަރުވެފައި އޮއްވާ އިއްޔެ ހަވީރު ސަން އައިލެންޑް ރިސޯޓުގެ
      ކައިރިން ފެނިފައިވެ އެވެ.'
    sentences:
    - 'passage: ވައިބާ އެކައުންޓް ހެކްކޮށްގެން މަކާރައި ހީލަތުން މީހެއްގެ އަތުން ފައިސާ ހޯދި ކަމުގެ ތުހުމަތު ސޯޝަލް މީޑިއާގައި
      ކުރަމުންދަނިކޮށް އެކަން ފުލުހުން ދޮގުކޮށްފި އެވެ.

      އިއްޔެ ރެއިން ފެށިގެން ސޯޝަލް މީޑިއާގައި ދައުރުވަމުންދާ ޕޯސްޓެއްގައިވާ ގޮތުން މީހެއްގެ ވައިބާ އެކައުންޓް ހެކްކޮށްގެން
      ފައިސާ ފޭރުނު ކަމަށް ބުނާ މައްސަލައިގައި ފުލުހެއް ވެސް ހިމެނެ އެވެ. އަދި އެކަމުގެ ތުހުމަތުކުރާ ފުލުސް މީހާގެ ފޮޓޯއެއް
      ވެސް ދައުރުކުރި އެވެ.

      އެކަމާ ގުޅިގެން ފުލުހުން ނެރުނު ބަޔާނެއްގައި ބުނީ، އެ މައްސަލައަކީ މީހެއްގެ ވައިބާ އެކައުންޓް ކޮމްޕްރޮމައިޒް ކޮށްގެން
      އެ މީހާ ދަންނަ މީހުންނަށް މެސެޖްކޮށް އޮޅުވާލައިގެން ފައިސާ ހޯދާފައިވާ މައްސަލައެއް ކަމަށެވެ. އެ މައްސަލައާ ގުޅުންހުރި
      އިތުރު ތިން މައްސަލައެއް ވެސް ބަލަމުންދާ ކަމަށް ފުލުހުން ބުންޏެވެ.

      ފުލުހުން ބުނީ މައްސަލަ ހުށަހެޅުމާ އެކު ތަހުގީގުގެ ތެރެއިން އަޅަން ޖެހޭ ފިޔަވަޅުތައް އަޅައި، ވައިބާ އެކައުންޓް ރިކަވާކޮށް
      އެ އެކައުންޓްގެ ވެރިފަރާތުގެ ބާރުގެ ދަށަށް އެކައުންޓް ގެންގޮސްފައިވާ ކަމަށެެވެ. އަދި ތިން މީހެއްގެ އަތުން އޮޅުވާލައިގެން
      ހޯދި ޖުމްލަ 10،100ރ. އީމެއިލް އަދި ބޭންކް އެކައުންޓް ކޮމްޕްރޮމައިޒް ވެފައިވާ އެކައުންޓަށް ޖަމާކޮށްފައިވާ ކަމަށާއި އެ
      ފައިސާގެ ތެރެއިން 5،600ރ. ފައިސާ ދައުރުވެފައިވާ އެކައުންޓްތަކުގެ ތެރެެއިން އެކައުންޓެއްގައި ހޯލްޑް ކުރެވިފައިވާ ކަމަށް
      ފުލުހުން ބުނެ އެވެ.

      "މި މައްސަލައިގެ ތަހުގީގުގައި މިހާތަނަށް ފުލުހެއްގެ އެއްވެސް ބައިވެރިވުމެއް އަދި ތުހުމަތުކުރެވިދާނެ އެއްވެސް ކަމެއް
      ފާހަގަކުރެވިފައެއް ނުވެ އެވެ،" އެ ބަޔާނުގައި ބުންޏެވެ.

      ފުލުހުން ބުނި ގޮތުގައި ތަހުގީގުގެ އެެއްވެސް ހިސާބެއްގައި ފުލުހެއްގެ ބައިވެރިވުން އޮތް ކަމަށް ފާހަގަކުރެވިއްޖެ ނަމަ،
      ފިޔަވަޅު އަޅާނެ އެވެ.

      އެ މައްސަލާގައި ފުލުހެއްގެ ބައިވެރިވުމެއް އޮތްކަން މިހާތަނަށް ފާހަގަނުކުރެވުނަސް، އޮޅުވާލައިގެން ހޯދި ފައިސާ ދައުރުކުރުމުގައި
      ބޭނުންކުރި އެއް ބޭންކް އެކައުންޓަކީ ފުލުހެއްގެ އަނބިމީހާގެ ބޭންކް އެކައުންޓް ކަމަށާއި އެ އެކައުންޓަކީ އަންހެން މީހާގެ
      އީމެއިލް އާއި ބޭންކް އެކައުންޓް ކޮމްޕްރޮމައިޒްކޮށްގެން އެހެން ބައެއްގެ ބާރުގެ ދަށަށް ގެންގޮސްފައިވާ އެކައުންޓެއް ކަމަށް
      ވެސް ފުލުހުން ބުންޏެވެ.

      އެ މައްސަލަ ބަލަމުންދަނީ ފުލުހުންގެ އިކޮނޮމިކް ކްރައިމް ޑިޕާޓްމެންޓުންނެވެ. އެ މައްސަލާގައި މަކަރާއި ހީލަތުން ހޯދާފައިވާ
      ފައިސާގެ ތެރެއިން ރިކަވާ ނުކުރެވި ހުރި ފައިސާ ރިކަވާ ކުރުމުގެ މަސައްކަތް ދަނީ ކުރަމުންނެވެ.

      އެ ބަޔާނުގައި ފުލުހުން ވަނީ ފުލުހުންގެ ހިދުމަތުގެ ނަން ކިލަނބުވާ ގޮތަށް މައުލޫމާތު ފަތުރަމުންދާތީ ކަންބޮޑުވުން ފާޅުކޮށްފަ
      އެވެ.'
    - 'passage: ގައުމީ އެއާލައިން، މޯލްޑިވިއަން ހިންގާ އައިލެންޑް އޭވިއޭޝަނުން މޯލްޑިވްސް އެއާޕޯޓްސް ކޮމްޕެނީ ލިމިޓެޑް (އެމްއޭސީއެލް)
      އަށް ނުދައްކާ ހުރި ފައިސާގެ އަދަދު 1.12 ބިލިއަން ރުފިޔާއަށް އަރާ ކަމަށް އެމްއޭސީއެލް އިން ބުނެފި އެވެ.

      އެމްއޭސީއެލްގެ މާލީ ހާލަތު ދެނެގަތުމަށް ރައްޔިތުންގެ މަޖިލީހުގެ އެސްއޯއީ ކޮމެޓީގެ ސަބް ކޮމިޓީއަކުން މިއަދު ވަނީ އެ ކުންފުނީގެ
      ވެރިން ހާޒިރުކޮށްފަ އެވެ.

      އެ ބައްދަލުވުމުގައި ކުންފުނީގެ މާލީ ހާލަތާ ގުޅޭގޮތުން ވާހަކަ ދައްކަވަމުން، މެނޭޖިން ޑިރެކްޓަރު އިބްރާހިމް ޝަރީފު ވިދާޅުވީ
      އާންމު ގޮތެއްގައި އެމްއޭސީއެލް އަކީ ކޭޝްކޮށް ވިޔަފާރިކުރާ ކުންފުންޏެއް ކަމަށާއި މާލީ ދަތިތަކާ ދުރު ފައިދާ ނެރެދޭ ކުންފުންޏެއް
      ކަމަށެވެ.

      ނަމަވެސް، އެ ކުންފުންޏަށް މާލީ ގޮތުން ދިމާވާ އެންމެ ބޮޑު ގޮންޖެހުމަކީ ސަރުކާރުގެ އެހެން ކުންފުނިތަކުން ދައްކަންޖެހޭ
      ފައިސާ ނުދައްކާ ލަސްވުން ކަން އޭނާ ފާހަގަކުރެއްވި އެވެ. އަދި، މިކަމުގެ ނަތީޖާއަކީ ކެޕިޓަލް ހަރަދުތައް ބެލެހެއްޓުމަށް
      ލޯނުތައް ނަގަން ޖެހުން ކަމަށްވެސް ޝަރީފު ވިދާޅުވި އެވެ.

      "ހުރިހާ އެސްއޯއީސް ތަކެއް ނޫން. ހާއްސަކޮށް އައިލެންޑް އޭވިއޭޝަނުން 1.12 ބިލިއަން ރުފިޔާ އެބަހުރި އަންނަން އެމްއޭސީއެލް
      އަށް މިހާރުވެސް. އެއީ ގާތްގަނޑަކަށް އަހަރަކު 78 މިލިއަން ރުފިޔާގެ ޑިސްކައުންޓު ދޭއިރުވެސް 1.12 ބިލިއަން ރުފިޔާ އަޅުގަނޑުމެންނަށް
      އެބައޮތް އެބޭފުޅުން ދޭން."

      އަދި، މިކަން ހައްލުވެއްޖެނަމަ ކުންފުންޏަށް ދިމާވެފައިވާ މާލީ މައްސަލަތަކެއް ލުޔެއް ލިބޭނެކަން ވެސް، މިދިޔަ އަހަރު އެމްއޭސީއެލް
      ހިންގުމާ ހަވާލުވި ޝަރީފު ވިދާޅުވި އެވެ.

      މިއަދުގެ ބައްދަލުވުމުގައި ޝަރީފު ވަނީ އެމްއޭސީއެލް އިން މިދިޔަ އަހަރު އައިލެންޑް އޭވިއޭޝަނަށް ދިން ޑިސްކައުންޓުތަކުގެ
      ތަފުސީލުވެސް ހިއްސާކޮށްފަ އެވެ.

      އޭގެ ތެރޭގައި ހިމެނެނީ ތެލުން ދިން 38.77 މިލިއަނުގެ ޑިސްކައުންޓާއި ޑޮމެސްޓިކް ގްރައުންޑް ހޭންޑްލިން އިން ދިން 12.73
      މިލިއަނުގެ ޑިސްކައުންޓު، އަދި ގްރައުންޑު ޕަވާ ޔުނިޓުން ދިން 11.39 މިލިއަނުގެ ޑިސްކައުންޓުގެ އިތުރުން ޕާކް ކުރުމަށް ދިން
      9.7 މިލިއަން ރުފިޔާގެ ޑިސްކައުންޓެވެ.

      އެމްއޭސީއެލް އަކީ މިވަގުތު ސަރުކާރު ކުންފުނިތަކުގެ ތެރެއިން އެންމެ ބޮޑު ފައިދާއެއްގައި ހިންގާ އެއް ކުންފުންޏެވެ. އެގޮތުން
      މިދިޔަ އަހަރު އެކަނިވެސް އެ ކުންފުނިން  ފައިދާގެ ގޮތުގައި 1.1 ބިލިއަން ރުފިޔާ ހޯދި އެވެ.

      ނަމަވެސް، އައިލެންޑް އޭވިއޭޝަން އަކީ މާލީ ގޮތުން އެންމެ ގޯސް ހާލަތުގައި އޮތް ސަރުކާރުގެ އެއް ކުންފުންޏެވެ. އެ ކުންފުންޏަށް
      މިދިޔަ އަހަރު އެކަނިވެސް 71 މިލިއަން ރުފިޔާގެ ގެއްލުންވި އެވެ.'
    - 'passage: ސަން އައިލެންޑް ރިސޯޓް ކައިރި އަށް ސްނޯކްލިން އަށް ގޮސް އުޅުނު ޅ. ނައިފަރު، އަތިރީގޭ އަލީ ލަރީފް މަރުވެގެން
      މިރޭ  35: 8 ގައި މާލެ ގެނެސްފި އެވެ.އެ ރިސޯޓްގެ ޑައިވިންގް ޑައިރެކްޓަރު ހުސައިން ރަޝީދު ބުނި ގޮތުގައި އަލީ ލަރީފަކީ
      އެ ރިސޯޓުން ހިންގި ޑައިވިން ކޯހެއްގެ ބައިވެރިއެކެވެ. އޭނާ ނިޔާވީ މިއަދަކީ ކޯހުގެ ޗުއްޓީ ދުވަހަކަށް ވުމުން، ކޯހުގެ އިތުރު
      ތިން ބައިވެރިއަކާ އެކު އެ ރިސޯޓްގެ ފާލަން ކައިރި އަށް ސްނޯކްލިން އަށް ގޮސް އުޅެނިކޮށެވެ."އެ ހަތަރު ކުދިން އެކުގައި ސްނޯކްލިން
      އަށް ގޮސް އުޅުނީ. އެ ކުދިން ތިބީ ރަށުގެ އުތުރު ފަރާތުގައި އޮންނަ ފާލަން ކައިރީގައި."ހުސައިން ރަޝީދު ބުނި ގޮތުގައި އުމުރުން  24
      އަހަރުގެ އަލީ ލަރީފް މަރުވި ކަން އެނގުނީ، އެ ހަތަރު ކުދިން އެކުގައި ސްނޯކްލިން އަށް ގޮސް އުޅުމަށް ފަހު އޭގެ ތެރެއިން
      ތިން ކުދިން މައްޗަށް އެރި ވަގުތު، އަލީ ލަރީފް ނެތްކަން ފާހަގަކުރެވުމުންނެވެ. އެ ވަގުތު އެ ތިން ކުދިން އެ ސަރަހައްދުގެ
      މޫދު އަޑި ބަލައި އަލީ ލަރީފް ފެނޭތޯ ހޯދީ އެވެ."އަލީ ލަރީފް ނެތްކަން އެނގުނުތާ ފަސް ވަރަކަށް މިނެޓް ތެރޭގައި އެ ތިންކުދިން
      ވެގެން އޭނާ ހޯދައިފި. ދެން އޭނާ ނަގައިގެން އަޅުގަނޑުމެން މާލެ އަށް ދެންމެ މި ގެނައީ،" ހުސައިން ރަޝީދު ބުންޏެވެ.ޅ. ނައިފަރު
      އަތިރީގެ މުހައްމަދު އަބްދުލް ގާދިރު އާއި އާމިރާ މުހައްމަދުގެ ދަރިފުޅު އަލީ ލަރީފާ ބެހޭ ގޮތުން އޭނާގެ ބޮޑު ބޭބެ އިމާދު
      އަބްދުލް ގާދިރު ބުނީ، އަލީ ލަރީފު ޑައިވިން ކޯހެއްގައި ސަން އައިލޭންޑް ރިސޯޓަށް ދިޔައީ މީގެ މަހެއްހާ ދުވަސް ކުރިން ކަމަށެވެ.އަލީ
      ލަރީފުގެ ބޮޑު ބޭބެ ބުނި ގޮތުގައި އަލީ ލަރީފު މަރުވެފައި އޮއްވައި ފެނުނީ އެ ކުދިން ސްނޯކްލިން އަށް ގޮސް އުޅުނު ހިސާބުގެ
      ގާތްގަނޑަކަށް  19 ވަރަކަށް މީޓަރު ފުނުންނެވެ. އަދި އަލީ ލަރީފު ނެގި އިރު އޮތީ މަރުވެފައި ކަމަށް، އޭނާއާ އެކު ސްނޯކްލިން
      އަށް ދިޔަ އަނެއް ކުދިންނާ ހަވާލާދީ ބޮޑު ބޭބެ ބުންޏެވެ."އަޅުގަނޑަށް އެނގިފައިވާ ގޮތުން އަލީ ލަރީފު މަރުވި ހާދިސާ ހިނގީ
      މިއަދު ހަވީރު  15: 4 ހާ އިރު. އެ ރިސޯޓުގެ އެހީގައި އަލީ ލަރީފުގެ ހަށިގަނޑު މާލެ ގެނެވުނީ މިރޭ  35: 8 ހާ އިރު."އޭނާ ބުނި
      ގޮތުގައި ޑޮކްޓަރުން ބަލައި އަލީ ލަރީފުގެ މަރު ސާބިތުކުރިހާ އަވަހަކަށް ޖަނާޒާގެ ކަންތައް ކުރިއަށް ގެންދާނެ އެވެ. "އަދި
      މި އުޅެނީ އޭނާގެ މަރު ސާބިތުކުރާ ޑޮކްޓަރު ނައިސްގެން،" މިރޭ  25: 10 ގައި އަލީ ލަރީފުގެ ބޮޑު ބޭބެ، އައި.ޖީ.އެމް.އެޗް
      ހޮސްޕިޓަލުގައި ހުރެ ބުންޏެވެ.އިމާދު ބުނި ގޮތުގައި އަލީ ލަރީފުގެ ހަށިގަނޑު ނަގައިގެން އެންމެ ފުރަތަމަ ގެންދިޔައީ އދ.
      މާމިިގިލީ ސިއްހީ މަރުކަޒަށް ދެއްކުމަށެވެ. ނަމަވެސް އެ މަރުކަޒުން ބުނި ގޮތުގައި ސަން އަައިލެންޑް ރިސޯޓް ކައިރިން މަރުވި
      މީހާގެ ހަށިގަނޑު އެ ރަށަށް ގެނައުމަށް ފަހު މަރުކަޒަށް ނުގެނެސް އެ ދޯނިން ސީދާ ގެންދިޔައީ މާލެއަށެވެ.'
  - source_sentence: 'query: އިއްޔެ ހަވީރު ފެދުގައި ހިނގި އެކްސިޑެންޓެއްގައި ޒަހަމްވި 20 އަހަރުގެ އަހްމަދު ސަމާގެ ފަރުވާއަށް
      ޗެންނާއީ އަށް ފޮނުވާފައިވޭ. އޭނާގެ އާއިލާއިން ބުނި ގޮތުގައި އެ މީހުން އޭނާ ބޭރު ގައުމަކަށް ގެންދިއުމަށް ތައްޔާރުވަމުން
      ދިޔައެވެ. "އަހަރެމެން މަސައްކަތް ކުރަމުން މިދަނީ ވީހާވެސް އަވަހަކަށް އޭނާ ހޮސްޕިޓަލުން ނެރެން،" އޭނާގެ ބައްޕަ މުޙައްމަދު
      ވިދާޅުވިއެވެ.'
    sentences:
    - 'passage: ސަރުކާރު ހިންގާ އެމްޑީޕީގެ މެމްބަރަކު ކަމަކަށް އެދި އުނދަގޫކޮށްފި ނަމަ އޭނާ ބުނާ ކަންތައް ކޮށްދެއްވާނެ ކަމަށާއި
