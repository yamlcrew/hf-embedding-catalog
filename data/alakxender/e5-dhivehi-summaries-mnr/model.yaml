    ވިދާޅުވިއެވެ.'
  sentences:
  - 'passage: ސަރުކާރު ހިންގާ އެމްޑީޕީގެ މެމްބަރަކު ކަމަކަށް އެދި އުނދަގޫކޮށްފި ނަމަ އޭނާ ބުނާ ކަންތައް ކޮށްދެއްވާނެ ކަމަށާއި
    އެ ކަމަކު އެހެން ޕާޓީއެއްގެ މެމްބަރަކު އުނދަގޫކޮށްފި ނަމަ، ރައީސް މުހައްމަދު ނަޝީދުގެ ނުލަފާކަން ރީތިކޮށް ފެނިގެންދާނެ
    ކަމަށް އެ މަނިކުފާނު ވިދާޅުވެއްޖެ އެވެ.މި މަހުގެ  17 ވަނަ ދުވަހު ރ. އަލިފުއްޓަށް ވަޑައިގެން އެ ރަށުގެ ރައްޔިތުންނާ ބައްދަލުކުރައްވައި
    ދެއްކެވި ވާހަކަފުޅުގައި ރައީސް ވިދާޅުވެފައިވަނީ އެ މަނިކުފާނު ކުރައްވާފައި ނުކުރައްވާނެ ކަމެއް "ތިޔައިން ބޭފުޅަކު އަދި
    ހިތަކަށް ވެސް ނާރާނެ" ކަމަށެވެ. އަދި ރައީސް ވިދާޅުވީ ކޮންމެ ކަމެއްގައި ވެސް ރައްޔިތުންގެ ހަގީގީ ބާރު އެ މަނިކުފާނުގެ މައްޗަށް
    ފޯރާނީ ރައްޔިތުންގެ މަޖިލީސް މެދުވެރިކޮށް ކަމަށެވެ."ކޮންމެ ކަމެއް ވެސް ތިޔަ ބޭފުޅުންގެ ހަގީގީ ބާރު އަޅުގަނޑުގެ މައްޗަށް
    ފޯރާނީ މަޖިލިސް މެދުވެރިކޮށްގެން. ތިޔަ ބޭފުޅުންގެ މެމްބަރު އަޅުގަނޑަށް މުހިންމުވާނީ. އަޅުގަނޑުގެ ޕާޓީގެ މެމްބަރެއް އަޅުގަނޑަށް
    އުނދަގޫކުރީމާ އޭނާ ބުނާ ކަންތައް އަޅުގަނޑު ކޮށްދޭނަން. އެހެން ޕާޓީއެއްގެ މެމްބަރެއް އަޅުގަނޑަށް އުނދަގޫކުރީމާ އަޅުގަނޑުގެ
    ނުލަފާކަން ރީތިކޮށް ފެނިގެންދާނެ. އެއްގޮތަކަށް ވެސް ހީފުޅު ނުކުރައްވާތި، ތިޔަ އިން ބޭފުޅަކު އަދި ހިތަކަށް ވެސް ނާރާނެ،
