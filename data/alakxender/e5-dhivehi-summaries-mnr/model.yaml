      ހަމަ ގައިމު ވެސް ބޭނުމެއް ނޫން، އިންތިހާބެއް އަންނާތީވެ، އެކަމާ އަޅުވައި، ތިޔަ ބޭފުޅުންގެ ލޮލުގައި އަނދުނެއް އަޅުވާކަށް.
      އަޅުގަނޑުމެންނެއް، މި ސަރުކާރަކުންނެއް ބޭނުމެއް ނޫން، އާދައިގެ ބަހުން ދަންނަވަންޏާ، ތިޔަ ބޭފުޅުން ދަޅަ ހައްދާކަށް ]ދައްކާކަށް[.
      އަޅުގަނޑުމެންނަށް އެނގޭ ރައްޔިތުން ކަންކަމަށް ބޭނުންވެފައި ތިބޭ މިންވަރު، ތިއްބަވާ މިންވަރު. އަދި އަޅުގަނޑުމެންނަށް
      ވިސްނޭ އެ ކަންކަން މިހާރުން މިހާރަށް ކުރަން ވެސް ޖެހޭކަން. އަދި ކޮށްދޭނަމޭ ބުނީމާ އެ ކަމުގެ ހިތްހަމަޖެހުން ރައްޔިތުންނަށް
      ވެސް ލިބޭނެކަން. އަޅުގަނޑަށް އިތުރަށް އެނގޭ އެއްޗަކީ ކުޑަ މިންވަރަކަށް ވެސް ތިމާގެ އަދި މި ސަރުކާރުގެ ގަދަރާއި އިއްޒަތް
      ހިފަހައްޓަން ބޭނުމިއްޔާ ހުސް ވާހަކައެއް އަޅުގަނޑުމެން ދައްކައިގެން ނުވާނެކަން. އެހެންވީމަ އަޅުގަނޑެއް ނުދައްކަން ހުސް
