  sentences:
  - "public static List<DockerImage> getDockerImagesFromAgents(final int buildInfoId, TaskListener listener) throws IOException,\
    \ InterruptedException {\n        List<DockerImage> dockerImages = new ArrayList<DockerImage>();\n\n        // Collect\
    \ images from the master:\n        dockerImages.addAll(getAndDiscardImagesByBuildId(buildInfoId));\n\n        // Collect\
    \ images from all the agents:\n        List<Node> nodes = Jenkins.getInstance().getNodes();\n        for (Node node :\
    \ nodes) {\n            if (node == null || node.getChannel() == null) {\n                continue;\n            }\n \
    \           try {\n                List<DockerImage> partialDockerImages = node.getChannel().call(new MasterToSlaveCallable<List<DockerImage>,\
    \ IOException>() {\n                    public List<DockerImage> call() throws IOException {\n                       \
    \ List<DockerImage> dockerImages = new ArrayList<DockerImage>();\n                        dockerImages.addAll(getAndDiscardImagesByBuildId(buildInfoId));\n\
    \                        return dockerImages;\n                    }\n                });\n                dockerImages.addAll(partialDockerImages);\n\
    \            } catch (Exception e) {\n                listener.getLogger().println(\"Could not collect docker images from\
    \ Jenkins node '\" + node.getDisplayName() + \"' due to: \" + e.getMessage());\n            }\n        }\n        return\
    \ dockerImages;\n    }"
  - "public function findUnitByStart(Token $token) {\n\t\tforeach ($this->collection as $unit) {\n\t\t\tif ($unit->start ===\
    \ $token) {\n\t\t\t\treturn $unit;\n\t\t\t}\n\t\t}\n\n\t\treturn null;\n\t}"
  - "function (array) {\n            var self = this,\n                deferred = new Deferred(),\n                fulfilled\
    \ = 0,\n                length,\n                results = [],\n                hasError = false;\n\n            if (!isArray(array))\
    \ {\n                array = slice.call(arguments);\n            }\n            length = array.length;\n\n           \
    \ if (length === 0) {\n                deferred.emitSuccess(results);\n            } else {\n                array.forEach(function\
    \ (promise, index) {\n\n                    self.when(promise,\n                        //Success\n                  \
    \      function (value) {\n                            results[index] = value;\n                            fulfilled\
    \ += 1;\n                            if (fulfilled === length) {\n\n                                if (hasError) {\n\
    \                                    deferred.emitError(results);\n                                } else {\n        \
    \                            deferred.emitSuccess(results);\n                                }\n                     \
    \       }\n                        },\n                        //Error\n                        function (error) {\n \
    \                           results[index] = error;\n                            hasError = true;\n                  \
    \          fulfilled += 1;\n                            if (fulfilled === length) {\n                                deferred.emitError(results);\n\
    \                            }\n                        }\n                    );\n                });\n            }\n\
    \            return deferred.getPromise();\n        }"
