      bu hafta bitmesini ama muhalefetin itirazı süreci uzatacak olursa bir dahaki hafta bitmesini öngörüyoruz" diye konuştu.  Muhalefetin,
      teklifi "Cumhurbaşkanı''na ekstra yetki veriliyor" şeklinde eleştirdiğini anımsatan Turan, bu itirazın haklı olmadığını
      dile getirdi. Bu yetkinin 1970''ten beri Bakanlar Kurulu''nda olduğunu aktaran Turan, artık Bakanlar Kurulu olmadığı
      ve yürütmeyi cumhurbaşkanı temsil ettiği için Bakanlar Kurulu''nun yetkilerinin cumhurbaşkanına verildiğine dikkati
      çekti. "Zaten olan bir yetkinin devamından bahsediyoruz, yeni bir yetki yok" diyen Turan, teklifi Meclis''ten uzlaşı
      ve anlaşmayla geçirmeyi planladıklarını, bu nedenle konuyu tartışacaklarını vurguladı. Turan, teklifin her partinin
      ortak kanaatiyle geçmesini istediklerinin belirterek, sözlerini şöyle sürdürdü: "Niyetimiz, Askeralma Kanunu Teklifi''ni
      bu hafta bitirmek. Bitmezse haftaya biter. Cumhurbaşkanımızın açıkladığı bir yargı paketi, strateji belgesi vardı. Bununla
      ilgili vekillerimiz çalışıyorlar, teklifi hazırlıyorlar. Teklif belli bir aşamaya gelir olgunlaşırsa onu da bu haftaya
      yetiştirip, bir sonraki haftaya vermeyi ümit ediyoruz.Askerlikten sonra yargı paketini görüşmeyi istiyoruz, niyetimiz
      o. Bunlar kesin değil daha. Teklif, bu hafta gelirse haftaya görüşürüz, askerlik biterse tabii. Teklifi büyük oranla
