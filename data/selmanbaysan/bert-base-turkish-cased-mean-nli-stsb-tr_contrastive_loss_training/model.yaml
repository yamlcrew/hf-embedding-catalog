  - source_sentence: “Kendilerine güveniyorlarsa teklifimi kabul etsinler, her şey ortaya çıksın!”
    sentences:
    - 'CHP Balıkesir Milletvekili ve Parti Meclisi Üyesi Mehmet Tüm, Cumhurbaşkanı ve Başbakanın örtülü ödenek harcamalarında
      bir yıllık ödeneği 8 ayda bitirdiğini belirtti ve örtülü ödeneğin TBMM tarafından denetlenmesi için kanun teklifi verdi.
      Maliye Bakanlığının açıkladığı Ocak-Ağustos dönemi bütçe gerçekleşme sonuçlarına göre, Cumhurbaşkanı Tayyip Erdoğan
      ile Başbakan Binali Yıldırım''ın kullanma yetkisinde örtülü ödenekten bu yılın ilk 8 ayında yapılan toplam harcama geçen
      yıla göre yüzde 60,7 oranında artarak 1 milyar 319 milyon liradan, 2 milyar 121 milyona liraya yükseldi. Tayyip Erdoğan’ın
      başbakanlığı ve cumhurbaşkanlığı döneminde kırdığı harcama rekorlara dikkat çeken CHP’li Tüm, şu açıklamalarda bulundu:
      “Örtülü ödenek harcamaları geçen yıla göre yüzde 60,7 oranında artarak 1 milyar 319 milyon liradan 2 milyar 121 milyon
      liraya yükseldi. Bu hızla giderse harcamalar yeni bir rekorla 3 milyar TL’yi de geçmiş olacak. Maliye Bakanlığının verileri
      dikkate alındığında, bu rakamların TBMM, MİT ve birçok bakanlığın bütçesini geçtiğini görüyoruz. Saray rejimi, asgari
      ücrete yılda %5 zammı çok görürken, kendi örtülü ödeneğinde %65 artış yapmayı her şeyden daha zaruri görüyor. Ödeneklerdeki
      bu artış, halkın parasının açık ve net bir şekilde israf edilmesidir. Devlet bütçesini kimse babasının çiftliği değildir.
      AKP Genel Başkanı ve yöneticilerinin ne için harcadığını bilmediğimiz bu paraların denetimi şeffaf bir şekilde yapılmalıdır.
      Eğer AKP’li vekiller bu konuda kendilerine güveniyorlarsa verdiğim kanun teklifini kabul etsinler ve her şey açık ve
      şeffaf bir şekilde ortaya çıksın.” CHP’li Mehmet Tüm, TBMM Başkanlığına sunduğu kanun teklifinde örtülü ödenek harcamalarının
      Meclis''te kurulacak bir komisyonla denetlenmesini ve harcamaların toplam bütçe harcamalarının binde ikisini aşmayacak
      şekilde sınırlandırılmasını istedi. İşte CHP’li Tüm’ün örtülü ödeneği denetimine ilişkin kanun teklifi:  10/12/2003
      tarihli ve 5018 sayılı Kamu Malî Yönetimi ve Kontrol Kanununun 24’üncü Maddesinde yer alan “binde beşini” ibaresi “binde
      ikisini” olarak değiştirilmiştir.  10/12/2003 tarihli ve 5018 sayılı Kamu Malî Yönetimi ve Kontrol Kanununa aşağıdaki
      ek madde eklenmiştir:  Bu kanunun 24’üncü Maddesi hükümlerine göre Cumhurbaşkanlığı ve Başbakanlık bütçelerine konulan
      örtülü ödeneklerin harcama sonrası denetimi, Türkiye Büyük Millet Meclisi’nde bulunan siyasi parti gruplarının güçleri
      oranında temsil edileceği bir komisyon marifetiyle yapılır. Komisyon tarafından yapılan denetim sonrası Türkiye Büyük
      Millet Meclisi Başkanlığına sunulmak üzere bir rapor hazırlanır. Başkanlık, bu raporu Sayıştay Uygunluk Bildirimi ile
      birlikte Plan ve Bütçe Komisyonuna havale eder. Denetim raporu Plan ve Bütçe Komisyonunun kapalı oturumunda görüşülür.
      Komisyon üyeleri üçte iki çoğunlukla alınacak kararla, raporun bazı kısımlarına ilişkin ayrıntıların açıklanmasına gizlilik
      kuralları getirebilir.”  Bu Kanun yayımı tarihinde yürürlüğe girer.  Bu Kanun hükümlerini Bakanlar Kurulu yürütür.​'
