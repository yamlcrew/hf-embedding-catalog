  sentences:
  - Bir televizyon kanalında gündeme ilişkin değerlendirmelerde bulunan Devlet Bakanı ve Başbakan Yardımcısı Bülent Arınç,
    İnegöl ve Dörtyol'da yaşanan olayları üzüntüyle karşıladıklarını, tahrikler ve tertipler sonucu yaşanan bu tür olaylarda
    halkın sağduyulu olması, siyasetçilerin de kullandıkları dile özen göstermesi gerektiğini söyledi.  Arınç, kolluk güçlerinin
    bu tür olayları bastıracak, sebebiyet verenleri yargıya teslim edecek güçte olduğunu vurguladı.  Olaylarla ilgili bir
    istihbarat zafiyeti olup olmadığının, İçişleri Bakanlığının yapacağı araştırma sonucunda ortaya çıkacağını ifade eden
    Arınç, ''olayların somut sebebi şudur'' demenin şu sırada mümkün olmadığını, konuyla ilgili araştırma derinleştikçe tahrikçilerin
    ve olayları yönlendirenlerin belirleneceğini bildirdi.  ''MHP'nin bölgeye heyet gönderecek olması tansiyonu yükseltir''
    mi sorusu üzerine, dün bir TV kanalında BDP'nin bölgeye bir heyet göndermesini ''yangına benzin dökmek olarak'' tanımladığını
    hatırlatan Arınç, sözlerini şöyle sürdürdü;  ''Zaten şehrin valisi girişleri yasakladı. BDP ile yapılan görüşmelerde de
    onlar anlayış gösterdi. Eleştirdiler, ama itiraz etmediler veya direnmediler. Onlar da sanıyorum hassasiyetleri görmüş
    olmalılar. Eğer MHP'liler de aynı amaçla yola çıkıyor, Dörtyol'da tansiyonu yükseltebilecek bir olayın içine gidiyorlarsa,
    ki bence bugünlerde bunu yapmamalılar, vazgeçmelerini tavsiye ederim.  Çünkü MHP'lilerin olaylara şu veya bu şekilde karışmaları
    -tahrikçi olmasa bile milliyetçi duygularla ortada bir yanlışlık var- ve bu yanlışlığa müdahale etmek için sokaklara çıkmışlarsa
    -şüphesiz bir iki ay önce İskenderun'a yakın bir yerde bir kışlamızı basarak 6 askerin şehit olmasına yol açmışlardı-
    bu olayların acısı henüz unutulmamışken, şimdi bu tür olayların hemen arkasında ve akabinde orada boy göstermelerinin,
    meydan okumalarının olumlu katkısı olmaz diye düşünüyorum.  Gidenler şüphesiz sukunet çağrısında bulunacak ve olayları
    yatıştırmaya çalışacaklardır, ama BDP'lilerin girmesi tahrik unsuru olarak görülmüş ve yasaklanmışken bunun anti tezi
    olarak bir başka siyasi grubun 'bak onlar giremedi ama biz girdik, onlar yasaklandı ama biz yasaklanmadık, onlar Türkiye
    için tehlike ama biz bu çerçeveden meseleye bakıyoruz' demeleri de karşı tarafı da harekete geçirecek görünüyor.''  Arınç,
    Başbakan Recep Tayyip Erdoğan'ın yarın Hatay'da yapacağı mitingin önemine dikkati çekerek, Başbakan Erdoğan'ın ''birlik
    beraberlik, kardeşlik mesajları vereceğini, tahriklere yol açacak hadiselerden kaçınılmasını tavsiye edeceğini dile getirdi.  Şemdinli'de
    dün yaşanan olaylarda küçük çocukların ön planda olduğunun hatırlatılması, ''Taş Atan Çocuklar'' la ilgili yasal düzenlemenin
    ardından bu durumu nasıl değerlendirdiğinin sorulması üzerine Arınç, PKK terör örgütünün kadın ve çocukların önde olduğu
    eylemlerle bir mağduriyet yaratmaya çalıştığına işaret etti.  ''Aldatılmaya, kandırılmaya müsait yaştaki çocukların örgütün
    elinde bir oyuncak haline gelmesi, bizim yaptığımız düzenlemenin ne kadar doğru ve haklı olduğunu da gösteriyor. Çocuklara
    sahip çıkmak açısından çok iyi bir düzenleme yaptık'' diyen Arınç, bundan pişman olacak bir noktada bulunmadıklarını ifade
    etti.  PKK'nın çocukları çok kötü bir şekilde kullandığına işaret eden Arınç, ''Barış ve demokrasi partisi ismi gibi bu
    olaylara engel olmaya çalışmalı. Buna rağmen örgütün kullanması karşısında da yine halkımızın 'hayır biz çocuklarımıza
    sahip olacağız' diyerek ciddi bir direnç göstermesi lazım'' diye konuştu.
  - Söz konusu 8 köprülü kavşağın, 20 Şubat'ta Başbakan Tayyip Erdoğan'ın da katılması beklenen tören ile hizmete alınması
    planlanıyor.  Açıklamaya göre, TOKİ, İstanbul'a inşa ettiği toplu konut alanlarında ulaşımı kolaylaştırmak için 8 ayrı
    bölgede köprü, kavşak ve bağlantı yolu yaptı. Ataşehir toplu konut alanına bağlantıyı sağlayan 2, Başakşehir Ispartakule
    toplu konut alanına bağlantıyı sağlayan 1 ve Halkalı toplu konut alanlarına bağlantıyı sağlayan 5 ayrı köprülü kavşak,
    Başbakan Recep Tayyip Erdoğan'ın da katılması beklenen, 20 Şubat'ta yapılacak törenle hizmete açılacak.
  - Bir lisede iki öğrenci grubu arasında başlayan tartışma kısa sürede kavgaya dönüştü. Kavganın büyümesi üzerine, okul yönetimi,
    durumu polise bildirdi.  Polis ekipleri, öğrencileri ayırmakta zorlanınca, biber gazı kullandı. Okulun bahçesinden çıkarak
    sokak aralarına kaçan öğrenciler, polise taşlı saldırıda bulundu.  Yaşanan kovalamaca sonucunda bazı öğrenciler gözaltına
    alındı. Bu arada, gazdan etkilenen öğrenciler, olay yerine çağrılan ambulanslarla Silopi Devlet Hastanesi’ne kaldırıldı.  İlçe
    Milli Eğitim Müdürü Sait Uysal, yaşanan kavga olayıyla ilgili olarak, ''Kavganın sebebini henüz öğrenemedik. Öğrenciler
    arasında çıkan kavga bütün okula yayıldı. Biber gazından etkilenen öğrenciler, ambulanslarla Silopi Devlet Hastanesi'ne
    götürüldü'' dedi.  Kavga nedeniyle eğitime yarım gün ara verildiği bildirildi.
- source_sentence: Obezite, kalp krizinden koruyor olabilir mi? İngiltere'de bilim dünyası bu soruya yanıt arıyor. Araştırmalara
    göre, damarlardaki fazla yağ, belli bir seviyenin üstündeyken, kalbi koruyucu etki yapabiliyor.
  sentences:
  - 'CHP Genel Başkanı Kemal Kılıçdaroğlu, referandum sonuçlarının ardından yaptığı açıklamada “Koşullar eşit olmamasına karşın
    elimizden gelen her türlü çabayı gösterdik” diyerek, YSK’nin mühürsüz zarf ve pusulaların geçerli sayılması yönündeki
    kararına tepki gösterdi. Kılıçdaroğlu, “YSK, üzülerek ifade edeyim, bu referandumu tartışmalı hale getirdi. Maç yapılırken
    maçın ortasında kural değişmez” dedi. Kılıçdaroğlu’nun, sonuçların ardından akşam saatlerinde CHP Genel Merkezi’ne gelerek
    kurmaylarıyla değerlendirmede bulunduğu öğrenildi. Daha sonra bir basın toplantısı düzenleyen Kılıçdaroğlu, “Eşit olmayan
    koşullarda bir referandum gerçekleştirdik. Bunu herkes biliyor. Biz de koşullar eşit olmamasına karşın demokrasiye sahip
    çıkmak için elimizden gelen her türlü çabayı gösterdik. Bu çabayı hukuk zemininde kalarak gösterdik. Eveti savunanlar
    hukukun dışına çıktılar, biz özenle hukuk kurallarının içerisinde çaba harcadık” dedi. “Anayasalar birer toplumsal uzlaşma
    belgesidir” diyen Kılıçdaroğlu, “Bu referandum bir gerçeği ortaya çıkardı. Toplumun en az yüzde 50’si buna hayır diyor.
    Dolayısıyla bu anayasa değişikliği ve onun oluşturduğu bütün anayasa bir anlamda bir toplumsal uzlaşma belgesi olması
    niteliğini büyük ölçüde yitirmiş durumda. Daha önemlisi bu gerçek önümüzde dururken siyaset kurumuna bir görev düşüyor.
    Anayasayı bir toplumsal uzlaşma belgesi haline dönüştürmek” diye konuştu. YSK’nin mühürsüz zarf ve pusulaların geçerli
    sayılması kararıyla referandumu tartışmalı hale getirdiğini belirten Kılıçdaroğlu, şöyle konuştu: “YSK, üzülerek ifade
    edeyim, bu referandumu tartışmalı hale getirdi. Hiçbir tartışmaya yer vermeyecek şekilde size ilgili yasayı okuyorum.
    Seçim Kanunu’nun 98’inci maddesi: Üzerinde ilçe seçim kurulu ve sandık kurulu mührü olmayan zarflar geçersiz sayılır.
    TBMM’den geçen seçim kanunu ve onun 98’inci maddesi söylüyor. Ama YSK bu zarfları kabul etti. Niçin? Seçim Kanunu’nun
    108’inci maddesi. Arkasında sandık kurulu mührü bulunmayan pusula geçersizdir. Hiçbir kurum kendisini parlamentonun üstünde
    göremez. İktidar partisinin itirazı üzerine bunu geçerli sayıyorsunuz. Maç yapılırken maçın ortasında kural değişmez arkadaşlar.
    YSK, maçın ortasında üstelik zarflar açıldıktan sonra kuralları değiştiriyor. Bunu doğru bulmuyoruz, asla kabul etmiyoruz.
    Milletin kararına saygılıyız ama YSK gölge düşürdü. Hukuksal açıdan da kamu vicdanı açısından da referandumun meşruiyetini
    tartışmalı hale getirdiler. Bunu asla doğru bulmuyoruz. Bunu sonuna kadar takip edeceğiz.”'
  - Ege Üniversitesi Spor Bilimleri Fakültesi Öğretim Görevlisi Uzman , obezitenin nedenlerini "Obezite harcanandan daha fazla
    enerji alınması sonucu, vücutta aşırı miktarda yağ dokusunun olması sebebiyle gelişen,  genetik ve çevresel etkileşimli,
    sağlıklı yaşam adına ciddi ve kronik sorunlara neden olabilen ve oluşum nedeni çok sayıda faktöre bağlı, medikal tedaviye
    ihtiyaç duyulan metabolik bir sağlık problemidir" şeklinde anlattı.     nin risk faktörleri arasında birçok etkenin olduğunu
    belirten Oral, "Obezitenin en önemli risk faktörleri arasında özellikle genetik yatkınlık, fiziksel aktivitede azalma,
    beslenme alışkanlıkları, yaş, cinsiyet, eğitim düzeyi, evlilik, doğum sayısı gibi faktörler göze çarpıyor. Erişkin ve
    çocuk obezitesi tüm dünyada ama özellikle gelişmekte olan ülkelerde hızla yayılıyor. Ülkemizde toplumun yaklaşık olarak
    yüzde 35’inden fazlası obezite problemiyle karşı karşıya kalıyor. Hatta bu oran erkeklerde yüzde 7.9, kadınlar da yüzde 
    23.4" diye konuştu.    Obezitenin başka hastalıklara da davetiye çıkardığını vurgulayan Dr. Oral, "Birçok kronik hastalığın
    obezite ile yakından ilişkili olduğu biliniyor. Ayrıca Dünya Sağlık Örgütü, obeziteyi en riskli 10 hastalıktan biri olarak
    kabul ediyor. Bu konuda yürütülen son araştırmalarda kanserle yakın ilgisi olduğu da belirlenmiştir" dedi.      Obeziteden
    korunma yolları hakkında da bilgi veren Oral, "Sağlıklı yaşam ve obezite kökenli hastalıkların önlenmesinde en akılcı
    önlem, dengeli ve yeterli bir beslenme alışkanlığıyla birlikte, haftada 3 gün 30 dakika yavaş yürüyüşle başlayıp haftada
    5 gün 45 dakika tempolu yürüyüşler önem taşıyor. Bu tip bir fiziksel aktivite sağlıklı beslenmeye ek olarak 100- 200 kalorilik
    bir kayıp sağlar. Uzun süreli fiziksel aktivite için, her gün 30 dakika   alışkanlığının kazanılması, obezitenin önlem
    ve tedavisinde olumlu sonuçlar verdiği gözden uzak tutulmamalıdır. Sonuç olarak, sağlıklı bir toplum için sağlıklı beslenme
    alışkanlığının yanı sıra, fiziksel aktivitenin tüm bireyler için yaşamsal önem ve anlam taşımakta olduğunu tekrar hatırlamak
    ve bu konuda farkındalığı arttırabilmek için ‘Dünya Obezite Günü’ güzel bir şans olarak değerlendirilmeli" dedi.
  - 'AK Parti Grup Başkanvekili Bülent Turan, Meclis''te basın mensuplarıyla bir araya gelerek, gündeme ilişkin değerlendirmelerde
    bulundu. Genel Kurul''da bu hafta Askeralma Kanunu Teklifi''nin görüşüleceğini ve tüm muhalefet partilerin grup başkanvekillerini
    bugün arayarak sürece ilişkin bilgi verdiğini anlatan Turan, AK Parti''nin yarın yapacağı kapalı grup toplantısında da
    Milli Savunma Komisyon Başkanı İsmet Yılmaz''ın milletvekillerini bilgilendireceğini ifade etti. Muhalefet partilerinin
    bazı maddelere ilişkin değişiklik taleplerinin olduğunu anımsatan Turan, bu kapsamda teklifi tekrar gözden geçirdiklerini,
    paydaşlarla görüştüklerini aktardı. Teklifin, tarafların görüşü alınarak hazırlandığını söyleyen Turan, "Teklifin görüşmelerinin
    bu hafta bitmesini ama muhalefetin itirazı süreci uzatacak olursa bir dahaki hafta bitmesini öngörüyoruz" diye konuştu.  Muhalefetin,
    teklifi "Cumhurbaşkanı''na ekstra yetki veriliyor" şeklinde eleştirdiğini anımsatan Turan, bu itirazın haklı olmadığını
    dile getirdi. Bu yetkinin 1970''ten beri Bakanlar Kurulu''nda olduğunu aktaran Turan, artık Bakanlar Kurulu olmadığı ve
    yürütmeyi cumhurbaşkanı temsil ettiği için Bakanlar Kurulu''nun yetkilerinin cumhurbaşkanına verildiğine dikkati çekti.
    "Zaten olan bir yetkinin devamından bahsediyoruz, yeni bir yetki yok" diyen Turan, teklifi Meclis''ten uzlaşı ve anlaşmayla
    geçirmeyi planladıklarını, bu nedenle konuyu tartışacaklarını vurguladı. Turan, teklifin her partinin ortak kanaatiyle
    geçmesini istediklerinin belirterek, sözlerini şöyle sürdürdü: "Niyetimiz, Askeralma Kanunu Teklifi''ni bu hafta bitirmek.
    Bitmezse haftaya biter. Cumhurbaşkanımızın açıkladığı bir yargı paketi, strateji belgesi vardı. Bununla ilgili vekillerimiz
    çalışıyorlar, teklifi hazırlıyorlar. Teklif belli bir aşamaya gelir olgunlaşırsa onu da bu haftaya yetiştirip, bir sonraki
    haftaya vermeyi ümit ediyoruz.Askerlikten sonra yargı paketini görüşmeyi istiyoruz, niyetimiz o. Bunlar kesin değil daha.
    Teklif, bu hafta gelirse haftaya görüşürüz, askerlik biterse tabii. Teklifi büyük oranla olgunlaştırdık, bugün yarın Meclis''e
    gönderebilirsek komisyon görüşme takvimini takdir edecektir. Bu dediğim minvalde takvim devam ederse bir dahaki haftaya
    askerlik biterse Genel Kurul''da görüşürüz olmazsa haftaya. Çalışıyoruz. Belli bir olgunluğa eriştikten sonra Meclis''e
    vereceğiz." Yeni askerlik sisteminin yasalaşmasıyla askerlik süresinin kısalacağı ve çok sayıda askerin terhis olacağı,
    bu durumun güvenlik riski doğuracağına ilişkin yorumlar hatırlatılarak değerlendirmesi sorulan Turan, "Paydaşlar, bunun
    Türkiye''nin, askerin, ordunun güvenliği için sorun olmayacağı kanaatinde. Biz de bu kanaate olumlu yaklaşıyoruz. Genel
    Kurul''un takdiri baş tacı, Meclis her zaman bunları revize etme hakkına sahip ama şu an kanun yürürlüğe girdikten sonra
    6 ayını bitiren askerlerimizin terhis olmasını öngörüyoruz." diye konuştu. Bülent Turan, Askeralma Kanunu Teklifi''ne
    ilişkin muhalefetten öneri gelip gelmediğinin sorulması üzerine, "Arkadaşlarımız bayram öncesi görüştü, bazı öneriler
    var. Bugün bir daha görüşüyorlar" dedi. "27 yaşındaki bir genç de 35-36 yaşında üniversitede hocalık yapan bir genç de
    bedelli askerliğe başvurabilecek. Yaşı büyük olana öncelik verilmesine ilişkin yorumları nasıl değerlendiriyorsunuz "
    sorusuna Turan, "Bu, tartışılan bir konu. Bugün yarın belli olacak. Konuşuyoruz, görüşüyoruz" cevabını verdi. "Meclis,
    23 Haziran seçimine kadar açık olacak mı?" sorusu üzerine Turan, şunları söyledi: "İstanbul seçimleri Türkiye için çok
    önemli ancak bir yerel seçim. Meclis''in takvimini, gündemini İstanbul seçimine göre planlıyor olmak doğru olmaz. Türkiye,
    demokratik kültürüyle her türlü seçimi aşacak, yapacak kabiliyeti olan bir ülke. Meclis çalışmalarının İstanbul seçimine
    göre endekslemeyi doğru bulmayız. Halkımızın bizden beklentisi olan kanunlar var. Seçime kadar Meclis''in çalışmasını
    öngörüyoruz." Cumhur İttifakı Adayı Binali Yıldırım ve Millet İttifakı Adayı Ekrem İmamoğlu''nun 16 Haziran''da canlı
    yayında bir araya geleceği hatırlatılarak değerlendirmesi sorulan Turan, "Türkiye''nin çoktan beri beklediği bu tartışma
    zemininin hayat bulması kıymetli bir yaklaşım. Hem CHP adayının hem de Sayın Yıldırım''ın konuya olumlu yaklaşmasını takdire
    şayan buluyorum" ifadesini kullandı. Yıldırım''ın, canlı yayının öz güvenle "en muhalif" diye düşünülen Uğur Dündar''ın
    moderatörlüğünde yapılmasını talep etmesinin kıymetli olduğuna dikkati çeken Turan, şunları kaydetti: "Burada kimin kazandığından
    çok kimin kaybettiği sorusu öne çıktı. Uğur Dündar gibi yaşını başını almış, sözüm ona duayen gazeteci keşke böyle bir
    sorumluluktan kaçmamış olsaydı. Çünkü özellikle 28 Şubat yıllarında nasıl taraflı gazetecilik yaptığı, çocukları siyasal
    olarak istismar ettiği, farklı görüntüleri değerlendirdiği, hep bunlar bizi üzen habercilik anlayışıydı. Bunları belki
    telafi etme imkanı olabilirdi. Ahiri ömründe iki farklı partinin, iki kıymetli adayının çıkıp onun öncülüğünde tartışma
    imkanı bulması çok kıymetliydi ama bunu reddetti. Ben bunu eline geçen tarihi fırsatın heba edilmesi olarak düşünüyorum.
    Gerekçelerini izah etti ama bence kendisinden başka kimse inanmadı. Neden vazgeçtiğini kamuoyuna açıklamak zorunda olduğunu
    düşünüyorum."'
- source_sentence: Antalya'da rahatsızlanan 20'den fazla asker hastaneye kaldırıldı.
  sentences:
  - Hatay'da, gazeteci olduklarını iddia eden 4 Rus, askeri güvenlik bölgesinde çekim yaparken yakalandı. Alınan bilgiye göre,
    askeri bölgede çekim yapan 4 Rus vatandaşı, güvenlik güçlerince gözaltına alındı. İfadelerinde gazeteci olduklarını belirten
    4 Rus, gerekli evraklara sahip olmadıkları için yasal işlemlerin ardından sınır dışı edildi.
  - "Kulübün resmi sitesinden yapılan açıklamada Mehmet Özdilek ve ekibine teşekkür edilirken, şu ifadelere yer verildi:\r\
    \n \"Ligde son haftalarda istediği sonuç ve puanları alamayan ekibimizde, Teknik Direktör Mehmet Özdilek ile Yönetim Kurulu\
    \ arasında yapılan görüşmenin ardından karşılıklı anlaşma ile yollarımız ayrıldı. Özdilek ve yardımcılarına birlikte olduğumuz\
    \ süreçte gösterdikleri emeklere teşekkür ediyor bundan sonraki çalışma hayatlarında başarılar diliyoruz.\""
  - Hatay'ın Altınözü ilçesine bağlı Karbeyaz Mahallesi sınır bölgesi içerisinde nöbet değişimi için göreve çıkan askeri araç
    şarampole devrildi. Kazada yaralanan 19 asker olay yerine çağrılan ambulanslarla Antakya'daki çeşitli hastanelere kaldırılarak
    tedavi altına alındı. Askerlerin sağlık durumlarının iyi olduğu öğrenildi.
- source_sentence: Rusya Devlet Başkanı Vladimir Putin, "Türk yönetimi, uçağımızı düşürdü ve büyük bir hata yaptı. Dahası,
    korudukları kişiler de karadan pilotumuza ateş açtı. Bu askeri suç karşısında verdiğimiz yanıt, ihtiyatlı olmaktan da
    öteydi" dedi.
  sentences:
  - ''' Rusya Halk Cephesi 1. Bölgelerarası Forumu''nda konuşan Rus lider, Türkiye''ye yönelik önlemlerin inşaat alanında
    yürürlükte olan anlaşmaları etkilemeyeceğini belirterek, Türkiye''ye inşaat sektöründe getirilen yaptırımların ardından
    Rusya''da 87 bin kişilik istihdam kontenjanının açılacağını kaydetti. Putin, şöyle konuştu: "Şu anda 300 Türk şirketinin
    Rusya''da sözleşmeleri bulunuyor. Bunların toplam tutarı yaklaşık 50 milyar dolar. Mevcut sözleşmeleri feshetmeme kararı
    aldık. Çünkü bu sadece Türk iktidarının eylemine verilmiş bir yanıt olmayacak, biz de bundan zarar görebiliriz. Ancak
    bundan sonra Türk şirketleriyle yeni anlaşma imzalamayacağız." Rusya Devlet Başkanı''nın gündeminde Suriye''deki terörle
    mücadele çalışmaları da vardı. Putin, "Terörle mücadelede dikkatli ancak güçlü bir şekilde hareket edeceğiz. Verdiğiniz
    destek için sizlere ve gösterdikleri çabalar için Rus askerlerine teşekkür ediyorum" dedi.'
  - Bordo-mavili takımın başkanı Muharrem Usta, Galatasaray'dan Çin ekibi Pekin Guoan'a transfer olan Burak Yılmaz'a teşekkür
    mesajı yayınladı. Usta mesajında, "Burak Yılmaz... Yolun açık olsun, dönmek istersen Trabzonspor'un kapısı sana her zaman
    açık olacak. Her şey için teşekkürler" dedi. 8 milyon Euro karşılığında Çin'e giden Burak sözleşmesindeki yüzde 25'lik
    opsiyon sayesinde bu transferle Trabzonspor'a da 2 milyon Euro daha kazandırmıştı.
  - Habertürk’ün “Duran tavuk” başlığıyla gündeme getirdiği ve tavuk üretimini yüzde 80 azaltan üreticiler ile firmaların
    sözleşme krizini aşma çabaları sürerken, Türkiye Kanatlı Hayvan Eti Yetiştiricileri Merkez Birliği (TÜKEBİR) büyük bir
    entegre tesis almak için harekete geçti. Daha önce kapanan bir entegre tesisin sahibiyle görüşmeler başladı. Sakarya Kanatlı
    Hayvan Eti Yetiştiricileri Birliği Başkan Yardımcısı İrfan Sarı, tesiste incelemelerde bulundu. Tesis, çift vardiyada
    günlük 160 bin piliç kesimi yapabilecek ve yaklaşık 350 tonluk piliç eti üretilecek. Gazete Habertürk'ten Ramiz Kaan Oktar'ın
    haberine göre Doğu Marmara Bölgesi’ndeki tüm üreticiler dilediklerinde buraya piliç verebilecek. Bölgesel üretimin en
    fazla yüzde 35’i bu tesise alınacak. Sistemde kapasite artırımı üretim anlamında maksimum yüzde 25 oranında olabilecek.
    Eğer bu artış yetersiz gelirse yeni bir tesis alımı ya da yapımı söz konusu olacak. Sakarya Kanatlı Hayvan Eti Yetiştiricileri
    Birliği Başkanı İrfan Demiray, “Eğer firmalarla sözleşme istediğimiz şekilde imzalanamazsa kendi tesisimiz hazır olacak.
    Vatandaşımız direkt üreticiden ürün alabilecek” dedi.
