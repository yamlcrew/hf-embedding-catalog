  - 'MHP Genel Başkanı Devlet Bahçeli, partisinin grup toplantısında konuşma yaptı.  Devlet Bahçeli, CHP''den gelen "Hakikat
    Komisyonu kurulsun" önerisine de sert tepki gösterdi.  AK Parti ve CHP''nin birlikte hareket ettiğini savunan Bahçeli,
    şunları söyledi: "İkisinin de kafasında İmralı canisinin affı vardır. Başbakan Erdoğan''ın değişken sözleri ve CHP lderinin
    sözleri birebir örtüşmektedir. Hakikat Komisyonu''nun kurulmasıyla ilgili CHP önerisini milletimizi büyük bir kaygıyla
    beklemektedir. TSK da terör örgütü de silah bıraksın diyen bir CHP zihniyeti nasıl Atatürk''ün kurduğu bir parti olabilir?
    Bundan sonra CHP ne diyecektir. AKP''nin izinden yürüyen CHP''nin kabullerden saptığı, üniter devlet yapısını fantazi
    olarak görmektedirler.  Önde kavga ederken arkada Türkiye''nin gizli planlarını yapmaktadırlar. Türkiye''nin temellerinden
    oynama yaparak kaynaşma yapacağını sananlar milletimizden en sert cevabı alacağından kuşkumuz yoktur."'
