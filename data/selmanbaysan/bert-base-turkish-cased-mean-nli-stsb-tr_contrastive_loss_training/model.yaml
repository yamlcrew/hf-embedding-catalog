    sentences:
    - ''' Rusya Halk Cephesi 1. Bölgelerarası Forumu''nda konuşan Rus lider, Türkiye''ye yönelik önlemlerin inşaat alanında
      yürürlükte olan anlaşmaları etkilemeyeceğini belirterek, Türkiye''ye inşaat sektöründe getirilen yaptırımların ardından
      Rusya''da 87 bin kişilik istihdam kontenjanının açılacağını kaydetti. Putin, şöyle konuştu: "Şu anda 300 Türk şirketinin
      Rusya''da sözleşmeleri bulunuyor. Bunların toplam tutarı yaklaşık 50 milyar dolar. Mevcut sözleşmeleri feshetmeme kararı
      aldık. Çünkü bu sadece Türk iktidarının eylemine verilmiş bir yanıt olmayacak, biz de bundan zarar görebiliriz. Ancak
      bundan sonra Türk şirketleriyle yeni anlaşma imzalamayacağız." Rusya Devlet Başkanı''nın gündeminde Suriye''deki terörle
      mücadele çalışmaları da vardı. Putin, "Terörle mücadelede dikkatli ancak güçlü bir şekilde hareket edeceğiz. Verdiğiniz
      destek için sizlere ve gösterdikleri çabalar için Rus askerlerine teşekkür ediyorum" dedi.'
    - Bordo-mavili takımın başkanı Muharrem Usta, Galatasaray'dan Çin ekibi Pekin Guoan'a transfer olan Burak Yılmaz'a teşekkür
      mesajı yayınladı. Usta mesajında, "Burak Yılmaz... Yolun açık olsun, dönmek istersen Trabzonspor'un kapısı sana her
      zaman açık olacak. Her şey için teşekkürler" dedi. 8 milyon Euro karşılığında Çin'e giden Burak sözleşmesindeki yüzde
      25'lik opsiyon sayesinde bu transferle Trabzonspor'a da 2 milyon Euro daha kazandırmıştı.
    - Habertürk’ün “Duran tavuk” başlığıyla gündeme getirdiği ve tavuk üretimini yüzde 80 azaltan üreticiler ile firmaların
      sözleşme krizini aşma çabaları sürerken, Türkiye Kanatlı Hayvan Eti Yetiştiricileri Merkez Birliği (TÜKEBİR) büyük bir
      entegre tesis almak için harekete geçti. Daha önce kapanan bir entegre tesisin sahibiyle görüşmeler başladı. Sakarya
      Kanatlı Hayvan Eti Yetiştiricileri Birliği Başkan Yardımcısı İrfan Sarı, tesiste incelemelerde bulundu. Tesis, çift
      vardiyada günlük 160 bin piliç kesimi yapabilecek ve yaklaşık 350 tonluk piliç eti üretilecek. Gazete Habertürk'ten
      Ramiz Kaan Oktar'ın haberine göre Doğu Marmara Bölgesi’ndeki tüm üreticiler dilediklerinde buraya piliç verebilecek.
      Bölgesel üretimin en fazla yüzde 35’i bu tesise alınacak. Sistemde kapasite artırımı üretim anlamında maksimum yüzde
      25 oranında olabilecek. Eğer bu artış yetersiz gelirse yeni bir tesis alımı ya da yapımı söz konusu olacak. Sakarya
      Kanatlı Hayvan Eti Yetiştiricileri Birliği Başkanı İrfan Demiray, “Eğer firmalarla sözleşme istediğimiz şekilde imzalanamazsa
      kendi tesisimiz hazır olacak. Vatandaşımız direkt üreticiden ürün alabilecek” dedi.
