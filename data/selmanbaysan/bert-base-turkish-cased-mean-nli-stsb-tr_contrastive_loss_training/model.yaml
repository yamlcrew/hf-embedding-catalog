      takvim devam ederse bir dahaki haftaya askerlik biterse Genel Kurul''da görüşürüz olmazsa haftaya. Çalışıyoruz. Belli
      bir olgunluğa eriştikten sonra Meclis''e vereceğiz." Yeni askerlik sisteminin yasalaşmasıyla askerlik süresinin kısalacağı
      ve çok sayıda askerin terhis olacağı, bu durumun güvenlik riski doğuracağına ilişkin yorumlar hatırlatılarak değerlendirmesi
      sorulan Turan, "Paydaşlar, bunun Türkiye''nin, askerin, ordunun güvenliği için sorun olmayacağı kanaatinde. Biz de bu
      kanaate olumlu yaklaşıyoruz. Genel Kurul''un takdiri baş tacı, Meclis her zaman bunları revize etme hakkına sahip ama
      şu an kanun yürürlüğe girdikten sonra 6 ayını bitiren askerlerimizin terhis olmasını öngörüyoruz." diye konuştu. Bülent
      Turan, Askeralma Kanunu Teklifi''ne ilişkin muhalefetten öneri gelip gelmediğinin sorulması üzerine, "Arkadaşlarımız
      bayram öncesi görüştü, bazı öneriler var. Bugün bir daha görüşüyorlar" dedi. "27 yaşındaki bir genç de 35-36 yaşında
      üniversitede hocalık yapan bir genç de bedelli askerliğe başvurabilecek. Yaşı büyük olana öncelik verilmesine ilişkin
      yorumları nasıl değerlendiriyorsunuz " sorusuna Turan, "Bu, tartışılan bir konu. Bugün yarın belli olacak. Konuşuyoruz,
      görüşüyoruz" cevabını verdi. "Meclis, 23 Haziran seçimine kadar açık olacak mı?" sorusu üzerine Turan, şunları söyledi:
      "İstanbul seçimleri Türkiye için çok önemli ancak bir yerel seçim. Meclis''in takvimini, gündemini İstanbul seçimine
      göre planlıyor olmak doğru olmaz. Türkiye, demokratik kültürüyle her türlü seçimi aşacak, yapacak kabiliyeti olan bir
      ülke. Meclis çalışmalarının İstanbul seçimine göre endekslemeyi doğru bulmayız. Halkımızın bizden beklentisi olan kanunlar
      var. Seçime kadar Meclis''in çalışmasını öngörüyoruz." Cumhur İttifakı Adayı Binali Yıldırım ve Millet İttifakı Adayı
      Ekrem İmamoğlu''nun 16 Haziran''da canlı yayında bir araya geleceği hatırlatılarak değerlendirmesi sorulan Turan, "Türkiye''nin
      çoktan beri beklediği bu tartışma zemininin hayat bulması kıymetli bir yaklaşım. Hem CHP adayının hem de Sayın Yıldırım''ın
      konuya olumlu yaklaşmasını takdire şayan buluyorum" ifadesini kullandı. Yıldırım''ın, canlı yayının öz güvenle "en muhalif"
      diye düşünülen Uğur Dündar''ın moderatörlüğünde yapılmasını talep etmesinin kıymetli olduğuna dikkati çeken Turan, şunları
      kaydetti: "Burada kimin kazandığından çok kimin kaybettiği sorusu öne çıktı. Uğur Dündar gibi yaşını başını almış, sözüm
