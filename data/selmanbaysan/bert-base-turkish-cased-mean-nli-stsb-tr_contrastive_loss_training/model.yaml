    sentences:
    - 'CHP Genel Başkanı Kemal Kılıçdaroğlu, referandum sonuçlarının ardından yaptığı açıklamada “Koşullar eşit olmamasına
      karşın elimizden gelen her türlü çabayı gösterdik” diyerek, YSK’nin mühürsüz zarf ve pusulaların geçerli sayılması yönündeki
      kararına tepki gösterdi. Kılıçdaroğlu, “YSK, üzülerek ifade edeyim, bu referandumu tartışmalı hale getirdi. Maç yapılırken
      maçın ortasında kural değişmez” dedi. Kılıçdaroğlu’nun, sonuçların ardından akşam saatlerinde CHP Genel Merkezi’ne gelerek
      kurmaylarıyla değerlendirmede bulunduğu öğrenildi. Daha sonra bir basın toplantısı düzenleyen Kılıçdaroğlu, “Eşit olmayan
      koşullarda bir referandum gerçekleştirdik. Bunu herkes biliyor. Biz de koşullar eşit olmamasına karşın demokrasiye sahip
      çıkmak için elimizden gelen her türlü çabayı gösterdik. Bu çabayı hukuk zemininde kalarak gösterdik. Eveti savunanlar
      hukukun dışına çıktılar, biz özenle hukuk kurallarının içerisinde çaba harcadık” dedi. “Anayasalar birer toplumsal uzlaşma
      belgesidir” diyen Kılıçdaroğlu, “Bu referandum bir gerçeği ortaya çıkardı. Toplumun en az yüzde 50’si buna hayır diyor.
      Dolayısıyla bu anayasa değişikliği ve onun oluşturduğu bütün anayasa bir anlamda bir toplumsal uzlaşma belgesi olması
      niteliğini büyük ölçüde yitirmiş durumda. Daha önemlisi bu gerçek önümüzde dururken siyaset kurumuna bir görev düşüyor.
      Anayasayı bir toplumsal uzlaşma belgesi haline dönüştürmek” diye konuştu. YSK’nin mühürsüz zarf ve pusulaların geçerli
      sayılması kararıyla referandumu tartışmalı hale getirdiğini belirten Kılıçdaroğlu, şöyle konuştu: “YSK, üzülerek ifade
      edeyim, bu referandumu tartışmalı hale getirdi. Hiçbir tartışmaya yer vermeyecek şekilde size ilgili yasayı okuyorum.
      Seçim Kanunu’nun 98’inci maddesi: Üzerinde ilçe seçim kurulu ve sandık kurulu mührü olmayan zarflar geçersiz sayılır.
      TBMM’den geçen seçim kanunu ve onun 98’inci maddesi söylüyor. Ama YSK bu zarfları kabul etti. Niçin? Seçim Kanunu’nun
      108’inci maddesi. Arkasında sandık kurulu mührü bulunmayan pusula geçersizdir. Hiçbir kurum kendisini parlamentonun
      üstünde göremez. İktidar partisinin itirazı üzerine bunu geçerli sayıyorsunuz. Maç yapılırken maçın ortasında kural
      değişmez arkadaşlar. YSK, maçın ortasında üstelik zarflar açıldıktan sonra kuralları değiştiriyor. Bunu doğru bulmuyoruz,
      asla kabul etmiyoruz. Milletin kararına saygılıyız ama YSK gölge düşürdü. Hukuksal açıdan da kamu vicdanı açısından
      da referandumun meşruiyetini tartışmalı hale getirdiler. Bunu asla doğru bulmuyoruz. Bunu sonuna kadar takip edeceğiz.”'
    - Ege Üniversitesi Spor Bilimleri Fakültesi Öğretim Görevlisi Uzman , obezitenin nedenlerini "Obezite harcanandan daha
      fazla enerji alınması sonucu, vücutta aşırı miktarda yağ dokusunun olması sebebiyle gelişen,  genetik ve çevresel etkileşimli,
      sağlıklı yaşam adına ciddi ve kronik sorunlara neden olabilen ve oluşum nedeni çok sayıda faktöre bağlı, medikal tedaviye
      ihtiyaç duyulan metabolik bir sağlık problemidir" şeklinde anlattı.     nin risk faktörleri arasında birçok etkenin
      olduğunu belirten Oral, "Obezitenin en önemli risk faktörleri arasında özellikle genetik yatkınlık, fiziksel aktivitede
      azalma, beslenme alışkanlıkları, yaş, cinsiyet, eğitim düzeyi, evlilik, doğum sayısı gibi faktörler göze çarpıyor. Erişkin
      ve çocuk obezitesi tüm dünyada ama özellikle gelişmekte olan ülkelerde hızla yayılıyor. Ülkemizde toplumun yaklaşık
      olarak yüzde 35’inden fazlası obezite problemiyle karşı karşıya kalıyor. Hatta bu oran erkeklerde yüzde 7.9, kadınlar
      da yüzde  23.4" diye konuştu.    Obezitenin başka hastalıklara da davetiye çıkardığını vurgulayan Dr. Oral, "Birçok
      kronik hastalığın obezite ile yakından ilişkili olduğu biliniyor. Ayrıca Dünya Sağlık Örgütü, obeziteyi en riskli 10
      hastalıktan biri olarak kabul ediyor. Bu konuda yürütülen son araştırmalarda kanserle yakın ilgisi olduğu da belirlenmiştir"
      dedi.      Obeziteden korunma yolları hakkında da bilgi veren Oral, "Sağlıklı yaşam ve obezite kökenli hastalıkların
      önlenmesinde en akılcı önlem, dengeli ve yeterli bir beslenme alışkanlığıyla birlikte, haftada 3 gün 30 dakika yavaş
      yürüyüşle başlayıp haftada 5 gün 45 dakika tempolu yürüyüşler önem taşıyor. Bu tip bir fiziksel aktivite sağlıklı beslenmeye
      ek olarak 100- 200 kalorilik bir kayıp sağlar. Uzun süreli fiziksel aktivite için, her gün 30 dakika   alışkanlığının
      kazanılması, obezitenin önlem ve tedavisinde olumlu sonuçlar verdiği gözden uzak tutulmamalıdır. Sonuç olarak, sağlıklı
      bir toplum için sağlıklı beslenme alışkanlığının yanı sıra, fiziksel aktivitenin tüm bireyler için yaşamsal önem ve
      anlam taşımakta olduğunu tekrar hatırlamak ve bu konuda farkındalığı arttırabilmek için ‘Dünya Obezite Günü’ güzel bir
      şans olarak değerlendirilmeli" dedi.
    - 'AK Parti Grup Başkanvekili Bülent Turan, Meclis''te basın mensuplarıyla bir araya gelerek, gündeme ilişkin değerlendirmelerde
      bulundu. Genel Kurul''da bu hafta Askeralma Kanunu Teklifi''nin görüşüleceğini ve tüm muhalefet partilerin grup başkanvekillerini
