  sentences:
  - 'Komut dosyasının yürütülmesi sırasında kullanıcı girişine dayalı koşullu mantığı uygulayan bir BASH işlevi şablonu:


    `` Bash

    update_low_dental_hygiene () {

    # Rıza için istekli kullanıcı

    -p "Düşük diş hijyeni güncelleme izni veriyor musunuz? [Y/N]"


    Case $ rızası

    y | y)

    Echo "Güncelleme ..."


    # Güncellemeleri burada gerçekleştirin ...


    ;;


    n | n)

    Echo "İşlem İptal edildi."

    Dönüş 1

    ;;


    *)

    Echo "Geçersiz Seçenek Seçildi."

    Dönüş 1

    ;;

    ESAC

    }

    ``

    Bu örnekte, herhangi bir güncelleme yapmadan önce kullanıcıyı rızalarını istemek için `` okuma '''' kullanırız.Kullanıcı
    tarafından girilen değer `` $ onay '''' değişkeninde saklanır.Daha sonra, kullanıcının yanıtını değerlendirmek ve uygun
    önlemleri almak için bir dizi ``/`başka '''' ifadeleri (parantez yerine` [[]] `` kullanarak) kullanırız.Kullanıcı rızası
    verirse (`$ cisent = ''y''`), istenen güncellemeleri ilk` `eco` gövdesinde gerçekleştirebiliriz.Eğer rızayı reddederlerse
    (`$ consent = ''n''`), bir mesaj görüntüler ve` return` anahtar kelimesini kullanarak sıfır olmayan bir durum koduyla
    işlevden çıkarız.'
