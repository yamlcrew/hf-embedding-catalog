widgetData:
- source_sentence: What is the anticipated total capital investment range for fiscal year 2024 related to property and equipment?
  sentences:
  - Apollo, which we began offering as a commercial solution in 2021, is a cloud-agnostic, single control layer that coordinates
    ongoing delivery of new features, security updates, and platform configurations, helping to ensure the continuous operation
    of critical systems.
  - During fiscal year 2024, we expect to use our existing cash and cash equivalents, our marketable securities, and the cash
    generated by our operations to fund our capital investments of approximately $1.10 billion to $1.30 billion related to
    property and equipment.
  - Joseph F. Wayland was appointed as General Counsel and Secretary of Chubb Limited in July 2013.
- source_sentence: What was the effective price per share of class A common stock for fiscal 2023 under the U.S. retrospective
    responsibility plan?
  sentences:
  - We operated 692 gas stations at the end of 2023.
  - The effective price per share for class A common stock under the U.S. retrospective responsibility plan for fiscal 2023
    was $221.33, calculated using the weighted-average price based on the volume-weighted average price during the pricing
    period.
  - For a description of our material pending legal proceedings, see Legal Matters in Array 10 of the Notes to Consolidated
    Financial Statements included in Part II, Item 8 of this Annual Report on...
- source_sentence: What financial challenge did the company face in 2017 and how did it impact them legally?
  sentences:
  - In 2017, we experienced a material cybersecurity incident following a criminal attack on our systems that involved the
    theft of personal information of consumers. As a result of the 2017 cybersecurity incident, we were subject to proceedings
    and investigations.
  - The overall net effect on our gross margin from inventory provisions and sales of items previously written down was an
    unfavorable impact of 7.5% in fiscal year 2023 and 0.9% in fiscal year 2022.
  - The adjusted after-tax return on invested capital (ROIC) is computed by dividing the after-tax operating profit, excluding
    rent expenses, by the total invested capital which factors in the capitalization of operating leases.
- source_sentence: What is the title of Item 8 in the document?
  sentences:
  - Research and development expenses for fiscal year 2023 increased by $142 million over the previous fiscal year.
  - As of January 28, 2023, the company was authorized to issue up to 10,000,000 preferred shares, each with a par value of
    $0.01. However, there were no preferred shares issued and outstanding as of January 28, 2023 and the previous year as
    well.
  - Item 8 of the document is titled 'Financial Statements and Supplementary Data'.
- source_sentence: How many shares were outstanding at the beginning of 2023 and what was their aggregate intrinsic value?
  sentences:
  - At the beginning of 2023, there were 355 shares outstanding with an aggregate intrinsic value of $142,916.
  - In IBM’s 2023 Annual Report to Stockholders, the Financial Statements and Supplementary Data are included on pages 44
    through 121.
  - Privacy and data protection regulations affect operations by dictating how data is used and handled, impacting product
    offering and operation.
