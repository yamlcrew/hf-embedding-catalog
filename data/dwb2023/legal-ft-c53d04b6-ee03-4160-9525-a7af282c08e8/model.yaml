widgetData:
- source_sentence: How does the size of DeepSeek v3 compare to Meta’s Llama 31 405B model?
  sentences:
  - 'Terminology aside, I remain skeptical as to their utility based, once again, on the challenge of gullibility. LLMs believe
    anything you tell them. Any systems that attempts to make meaningful decisions on your behalf will run into the same roadblock:
    how good is a travel agent, or a digital assistant, or even a research tool if it can’t distinguish truth from fiction?

    Just the other day Google Search was caught serving up an entirely fake description of the non-existant movie “Encanto
    2”. It turned out to be summarizing an imagined movie listing from a fan fiction wiki.'
  - 'DeepSeek v3 is a huge 685B parameter model—one of the largest openly licensed models currently available, significantly
    bigger than the largest of Meta’s Llama series, Llama 3.1 405B.

    Benchmarks put it up there with Claude 3.5 Sonnet. Vibe benchmarks (aka the Chatbot Arena) currently rank it 7th, just
    behind the Gemini 2.0 and OpenAI 4o/o1 models. This is by far the highest ranking openly licensed model.

    The really impressive thing about DeepSeek v3 is the training cost. The model was trained on 2,788,000 H800 GPU hours
    at an estimated cost of $5,576,000. Llama 3.1 405B trained 30,840,000 GPU hours—11x that used by DeepSeek v3, for a model
    that benchmarks slightly worse.'
  - 'Against this photo of butterflies at the California Academy of Sciences:



    A shallow dish, likely a hummingbird or butterfly feeder, is red.  Pieces of orange slices of fruit are visible inside
    the dish.

    Two butterflies are positioned in the feeder, one is a dark brown/black butterfly with white/cream-colored markings.  The
    other is a large, brown butterfly with patterns of lighter brown, beige, and black markings, including prominent eye spots.
    The larger brown butterfly appears to be feeding on the fruit.'
- source_sentence: How does the author compare the difficulty of training an LLM to another complex task?
  sentences:
  - '“Agents” still haven’t really happened yet

    I find the term “agents” extremely frustrating. It lacks a single, clear and widely understood meaning... but the people
    who use the term never seem to acknowledge that.

    If you tell me that you are building “agents”, you’ve conveyed almost no information to me at all. Without reading your
    mind I have no way of telling which of the dozens of possible definitions you are talking about.'
  - 'So training an LLM still isn’t something a hobbyist can afford, but it’s no longer the sole domain of the super-rich.
    I like to compare the difficulty of training an LLM to that of building a suspension bridge—not trivial, but hundreds
    of countries around the world have figured out how to do it. (Correction: Wikipedia’s Suspension bridges by country category
    lists 44 countries).

    You can run LLMs on your own devices

    In January of this year, I thought it would be years before I could run a useful LLM on my own computer. GPT-3 and 3.5
    were pretty much the only games in town, and I thought that even if the model weights were available it would take a $10,000+
    server to run them.'
  - 'This prompt-driven custom interface feature is so powerful and easy to build (once you’ve figured out the gnarly details
    of browser sandboxing) that I expect it to show up as a feature in a wide range of products in 2025.

    Universal access to the best models lasted for just a few short months

    For a few short months this year all three of the best available models—GPT-4o, Claude 3.5 Sonnet and Gemini 1.5 Pro—were
    freely available to most of the world.'
- source_sentence: What is the new approach to scaling models mentioned in the context?
  sentences:
  - 'So far, I think they’re a net positive. I’ve used them on a personal level to improve my productivity (and entertain
    myself) in all sorts of different ways. I think people who learn how to use them effectively can gain a significant boost
    to their quality of life.

    A lot of people are yet to be sold on their value! Some think their negatives outweigh their positives, some think they
    are all hot air, and some even think they represent an existential threat to humanity.

    They’re actually quite easy to build

    The most surprising thing we’ve learned about LLMs this year is that they’re actually quite easy to build.'
  - 'The biggest innovation here is that it opens up a new way to scale a model: instead of improving model performance purely
    through additional compute at training time, models can now take on harder problems by spending more compute on inference.

    The sequel to o1, o3 (they skipped “o2” for European trademark reasons) was announced on 20th December with an impressive
    result against the ARC-AGI benchmark, albeit one that likely involved more than $1,000,000 of compute time expense!

    o3 is expected to ship in January. I doubt many people have real-world problems that would benefit from that level of
    compute expenditure—I certainly don’t!—but it appears to be a genuine next step in LLM architecture for taking on much
    harder problems.'
  - 'Language Models are gullible. They “believe” what we tell them—what’s in their training data, then what’s in the fine-tuning
    data, then what’s in the prompt.

    In order to be useful tools for us, we need them to believe what we feed them!

    But it turns out a lot of the things we want to build need them not to be gullible.

    Everyone wants an AI personal assistant. If you hired a real-world personal assistant who believed everything that anyone
    told them, you would quickly find that their ability to positively impact your life was severely limited.'
- source_sentence: When was Anthropic’s Claude 3 series initially launched?
  sentences:
  - 'Prompt injection is a natural consequence of this gulibility. I’ve seen precious little progress on tackling that problem
    in 2024, and we’ve been talking about it since September 2022.

    I’m beginning to see the most popular idea of “agents” as dependent on AGI itself. A model that’s robust against gulliblity
    is a very tall order indeed.

    Evals really matter

    Anthropic’s Amanda Askell (responsible for much of the work behind Claude’s Character):'
  - 'A year ago, the only organization that had released a generally useful LLM was OpenAI. We’ve now seen better-than-GPT-3
    class models produced by Anthropic, Mistral, Google, Meta, EleutherAI, Stability AI, TII in Abu Dhabi (Falcon), Microsoft
    Research, xAI, Replit, Baidu and a bunch of other organizations.

    The training cost (hardware and electricity) is still significant—initially millions of dollars, but that seems to have
    dropped to the tens of thousands already. Microsoft’s Phi-2 claims to have used “14 days on 96 A100 GPUs”, which works
    out at around $35,000 using current Lambda pricing.'
  - 'Getting back to models that beat GPT-4: Anthropic’s Claude 3 series launched in March, and Claude 3 Opus quickly became
    my new favourite daily-driver. They upped the ante even more in June with the launch of Claude 3.5 Sonnet—a model that
    is still my favourite six months later (though it got a significant upgrade on October 22, confusingly keeping the same
    3.5 version number. Anthropic fans have since taken to calling it Claude 3.6).'
- source_sentence: Why might fine-tuning an existing LLM be more accessible to hobbyists than training one from scratch?
  sentences:
  - 'I run a bunch of them on my laptop. I run Mistral 7B (a surprisingly great model) on my iPhone. You can install several
    different apps to get your own, local, completely private LLM. My own LLM project provides a CLI tool for running an array
    of different models via plugins.

    You can even run them entirely in your browser using WebAssembly and the latest Chrome!

    Hobbyists can build their own fine-tuned models

    I said earlier that building an LLM was still out of reach of hobbyists. That may be true for training from scratch, but
    fine-tuning one of those models is another matter entirely.'
  - 'Intuitively, one would expect that systems this powerful would take millions of lines of complex code. Instead, it turns
    out a few hundred lines of Python is genuinely enough to train a basic version!

    What matters most is the training  data. You need a lot of data to make these things work, and the quantity and quality
    of the training data appears to be the most important factor in how good the resulting model is.

    If you can gather the right data, and afford to pay for the GPUs to train it, you can build an LLM.'
  - 'Nothing yet from Anthropic or Meta but I would be very surprised if they don’t have their own inference-scaling models
    in the works. Meta published a relevant paper Training Large Language Models to Reason in a Continuous Latent Space in
    December.

    Was the best currently available LLM trained in China for less than $6m?

    Not quite, but almost! It does make for a great attention-grabbing headline.

    The big news to end the year was the release of DeepSeek v3—dropped on Hugging Face on Christmas Day without so much as
    a README file, then followed by documentation and a paper the day after that.'
