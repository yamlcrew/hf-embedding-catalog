    40.5k

    49.2k



    How to implement Q&A against your documentation with GPT3, embeddings and Datasette

    37.3k

    44.9k



    Lawyer cites fake cases invented by ChatGPT, judge is not amused

    37.1k

    47.4k'
  - 'OpenAI are not the only game in town here. Google released their first entrant in the category, gemini-2.0-flash-thinking-exp,
    on December 19th.

    Alibaba’s Qwen team released their QwQ model on November 28th—under an Apache 2.0 license, and that one I could run on
    my own machine. They followed that up with a vision reasoning model called QvQ on December 24th, which I also ran locally.

    DeepSeek made their DeepSeek-R1-Lite-Preview model available to try out through their chat interface on November 20th.

    To understand more about inference scaling I recommend Is AI progress slowing down? by Arvind Narayanan and Sayash Kapoor.'
  - 'Against this photo of butterflies at the California Academy of Sciences:



    A shallow dish, likely a hummingbird or butterfly feeder, is red.  Pieces of orange slices of fruit are visible inside
    the dish.

    Two butterflies are positioned in the feeder, one is a dark brown/black butterfly with white/cream-colored markings.  The
    other is a large, brown butterfly with patterns of lighter brown, beige, and black markings, including prominent eye spots.
    The larger brown butterfly appears to be feeding on the fruit.'
- source_sentence: How does the 2024 review of Large Language Models build upon the insights from the 2023 review?
  sentences:
  - 'Law is not ethics. Is it OK to train models on people’s content without their permission, when those models will then
    be used in ways that compete with those people?

    As the quality of results produced by AI models has increased over the year, these questions have become even more pressing.

    The impact on human society in terms of these models is already huge, if difficult to objectively measure.

    People have certainly lost work to them—anecdotally, I’ve seen this for copywriters, artists and translators.

    There are a great deal of untold stories here. I’m hoping 2024 sees significant amounts of dedicated journalism on this
    topic.

    My blog in 2023

    Here’s a tag cloud for content I posted to my blog in 2023 (generated using Django SQL Dashboard):'
  - 'The GPT-4 barrier was comprehensively broken

    In my December 2023 review I wrote about how We don’t yet know how to build GPT-4—OpenAI’s best model was almost a year
    old at that point, yet no other AI lab had produced anything better. What did OpenAI know that the rest of us didn’t?

    I’m relieved that this has changed completely in the past twelve months. 18 organizations now have models on the Chatbot
    Arena Leaderboard that rank higher than the original GPT-4 from March 2023 (GPT-4-0314 on the board)—70 models in total.'
  - 'Things we learned about LLMs in 2024






















    Simon Willison’s Weblog

    Subscribe







    Things we learned about LLMs in 2024

    31st December 2024

    A lot has happened in the world of Large Language Models over the course of 2024. Here’s a review of things we figured
    out about the field in the past twelve months, plus my attempt at identifying key themes and pivotal moments.

    This is a sequel to my review of 2023.

    In this article:'
- source_sentence: What is the challenge in building AI personal assistants based on the gullibility of language models?
  sentences:
  - 'Language Models are gullible. They “believe” what we tell them—what’s in their training data, then what’s in the fine-tuning
    data, then what’s in the prompt.

    In order to be useful tools for us, we need them to believe what we feed them!

    But it turns out a lot of the things we want to build need them not to be gullible.

    Everyone wants an AI personal assistant. If you hired a real-world personal assistant who believed everything that anyone
    told them, you would quickly find that their ability to positively impact your life was severely limited.'
  - 'Large Language Models

    They’re actually quite easy to build

    You can run LLMs on your own devices

    Hobbyists can build their own fine-tuned models

    We don’t yet know how to build GPT-4

    Vibes Based Development

    LLMs are really smart, and also really, really dumb

    Gullibility is the biggest unsolved problem

    Code may be the best application

    The ethics of this space remain diabolically complex

    My blog in 2023'
  - 'These price drops are driven by two factors: increased competition and increased efficiency. The efficiency thing is
    really important for everyone who is concerned about the environmental impact of LLMs. These price drops tie directly
    to how much energy is being used for running prompts.

    There’s still plenty to worry about with respect to the environmental impact of the great AI datacenter buildout, but
    a lot of the concerns over the energy cost of individual prompts are no longer credible.

    Here’s a fun napkin calculation: how much would it cost to generate short descriptions of every one of the 68,000 photos
    in my personal photo library using Google’s Gemini 1.5 Flash 8B (released in October), their cheapest model?'
