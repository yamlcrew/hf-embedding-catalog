widgetData:
- source_sentence: Why does the author recommend reading the first few pages of the 69-page PDF document related to the lawsuit?
  sentences:
  - 'We don’t yet know how to build GPT-4

    Frustratingly, despite the enormous leaps ahead we’ve had this year, we are yet to see an alternative model that’s better
    than GPT-4.

    OpenAI released GPT-4 in March, though it later turned out we had a sneak peak of it in February when Microsoft used it
    as part of the new Bing.

    This may well change in the next few weeks: Google’s Gemini Ultra has big claims, but isn’t yet available for us to try
    out.

    The team behind Mistral are working to beat GPT-4 as well, and their track record is already extremely strong considering
    their first public model only came out in September, and they’ve released two significant improvements since then.'
  - 'Just this week, the New York Times launched a landmark lawsuit against OpenAI and Microsoft over this issue. The 69 page
    PDF is genuinely worth reading—especially the first few pages, which lay out the issues in a way that’s surprisingly easy
    to follow. The rest of the document includes some of the clearest explanations of what LLMs are, how they work and how
    they are built that I’ve read anywhere.

    The legal arguments here are complex. I’m not a lawyer, but I don’t think this one will be easily decided. Whichever way
    it goes, I expect this case to have a profound impact on how this technology develops in the future.'
  - 'Nothing yet from Anthropic or Meta but I would be very surprised if they don’t have their own inference-scaling models
    in the works. Meta published a relevant paper Training Large Language Models to Reason in a Continuous Latent Space in
    December.

    Was the best currently available LLM trained in China for less than $6m?

    Not quite, but almost! It does make for a great attention-grabbing headline.

    The big news to end the year was the release of DeepSeek v3—dropped on Hugging Face on Christmas Day without so much as
    a README file, then followed by documentation and a paper the day after that.'
- source_sentence: Why does the author find the term “agents” frustrating?
  sentences:
  - 'Qwen2.5-Coder-32B is an LLM that can code well that runs on my Mac talks about Qwen2.5-Coder-32B in November—an Apache
    2.0 licensed model!


    I can now run a GPT-4 class model on my laptop talks about running Meta’s Llama 3.3 70B (released in December)'
  - '“Agents” still haven’t really happened yet

    I find the term “agents” extremely frustrating. It lacks a single, clear and widely understood meaning... but the people
    who use the term never seem to acknowledge that.

    If you tell me that you are building “agents”, you’ve conveyed almost no information to me at all. Without reading your
    mind I have no way of telling which of the dozens of possible definitions you are talking about.'
  - 'Terminology aside, I remain skeptical as to their utility based, once again, on the challenge of gullibility. LLMs believe
    anything you tell them. Any systems that attempts to make meaningful decisions on your behalf will run into the same roadblock:
    how good is a travel agent, or a digital assistant, or even a research tool if it can’t distinguish truth from fiction?

    Just the other day Google Search was caught serving up an entirely fake description of the non-existant movie “Encanto
    2”. It turned out to be summarizing an imagined movie listing from a fan fiction wiki.'
