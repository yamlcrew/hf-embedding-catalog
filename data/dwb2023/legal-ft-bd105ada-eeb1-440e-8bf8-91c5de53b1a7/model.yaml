widgetData:
- source_sentence: What is the most important factor in determining the quality of a trained model according to the context?
  sentences:
  - 'The GPT-4 barrier was comprehensively broken

    Some of those GPT-4 models run on my laptop

    LLM prices crashed, thanks to competition and increased efficiency

    Multimodal vision is common, audio and video are starting to emerge

    Voice and live camera mode are science fiction come to life

    Prompt driven app generation is a commodity already

    Universal access to the best models lasted for just a few short months

    “Agents” still haven’t really happened yet

    Evals really matter

    Apple Intelligence is bad, Apple’s MLX library is excellent

    The rise of inference-scaling “reasoning” models

    Was the best currently available LLM trained in China for less than $6m?

    The environmental impact got better

    The environmental impact got much, much worse'
  - 'Intuitively, one would expect that systems this powerful would take millions of lines of complex code. Instead, it turns
    out a few hundred lines of Python is genuinely enough to train a basic version!

    What matters most is the training  data. You need a lot of data to make these things work, and the quantity and quality
    of the training data appears to be the most important factor in how good the resulting model is.

    If you can gather the right data, and afford to pay for the GPUs to train it, you can build an LLM.'
  - 'DeepSeek v3 is a huge 685B parameter model—one of the largest openly licensed models currently available, significantly
    bigger than the largest of Meta’s Llama series, Llama 3.1 405B.

    Benchmarks put it up there with Claude 3.5 Sonnet. Vibe benchmarks (aka the Chatbot Arena) currently rank it 7th, just
    behind the Gemini 2.0 and OpenAI 4o/o1 models. This is by far the highest ranking openly licensed model.

    The really impressive thing about DeepSeek v3 is the training cost. The model was trained on 2,788,000 H800 GPU hours
    at an estimated cost of $5,576,000. Llama 3.1 405B trained 30,840,000 GPU hours—11x that used by DeepSeek v3, for a model
    that benchmarks slightly worse.'
- source_sentence: Which company released the QwQ model under an Apache 20 license?
  sentences:
  - 'There’s now a fascinating ecosystem of people training their own models on top of these foundations, publishing those
    models, building fine-tuning datasets and sharing those too.

    The Hugging Face Open LLM Leaderboard is one place that tracks these. I can’t even attempt to count them, and any count
    would be out-of-date within a few hours.

    The best overall openly licensed LLM at any time is rarely a foundation model: instead, it’s whichever fine-tuned community
    model has most recently discovered the best combination of fine-tuning data.

    This is a huge advantage for open over closed models: the closed, hosted models don’t have thousands of researchers and
    hobbyists around the world collaborating and competing to improve them.'
  - 'OpenAI are not the only game in town here. Google released their first entrant in the category, gemini-2.0-flash-thinking-exp,
    on December 19th.

    Alibaba’s Qwen team released their QwQ model on November 28th—under an Apache 2.0 license, and that one I could run on
    my own machine. They followed that up with a vision reasoning model called QvQ on December 24th, which I also ran locally.

    DeepSeek made their DeepSeek-R1-Lite-Preview model available to try out through their chat interface on November 20th.

    To understand more about inference scaling I recommend Is AI progress slowing down? by Arvind Narayanan and Sayash Kapoor.'
  - The most recent twist, again from December (December was a lot) is live video. ChatGPT voice mode now provides the option
    to share your camera feed with the model and talk about what you can see in real time. Google Gemini have a preview of
    the same feature, which they managed to ship the day before ChatGPT did.
- source_sentence: When was GPT-4 officially released by OpenAI?
  sentences:
  - 'Then in February, Meta released Llama. And a few weeks later in March, Georgi Gerganov released code that got it working
    on a MacBook.

    I wrote about how Large language models are having their Stable Diffusion moment, and with hindsight that was a very good
    call!

    This unleashed a whirlwind of innovation, which was accelerated further in July when Meta released Llama 2—an improved
    version which, crucially, included permission for commercial use.

    Today there are literally thousands of LLMs that can be run locally, on all manner of different devices.'
  - 'We don’t yet know how to build GPT-4

    Frustratingly, despite the enormous leaps ahead we’ve had this year, we are yet to see an alternative model that’s better
    than GPT-4.

    OpenAI released GPT-4 in March, though it later turned out we had a sneak peak of it in February when Microsoft used it
    as part of the new Bing.

    This may well change in the next few weeks: Google’s Gemini Ultra has big claims, but isn’t yet available for us to try
    out.

    The team behind Mistral are working to beat GPT-4 as well, and their track record is already extremely strong considering
    their first public model only came out in September, and they’ve released two significant improvements since then.'
  - 'Nothing yet from Anthropic or Meta but I would be very surprised if they don’t have their own inference-scaling models
    in the works. Meta published a relevant paper Training Large Language Models to Reason in a Continuous Latent Space in
    December.

    Was the best currently available LLM trained in China for less than $6m?

    Not quite, but almost! It does make for a great attention-grabbing headline.

    The big news to end the year was the release of DeepSeek v3—dropped on Hugging Face on Christmas Day without so much as
    a README file, then followed by documentation and a paper the day after that.'
- source_sentence: What are some ways mentioned to run local, private large language models (LLMs) on personal devices?
  sentences:
  - 'So training an LLM still isn’t something a hobbyist can afford, but it’s no longer the sole domain of the super-rich.
    I like to compare the difficulty of training an LLM to that of building a suspension bridge—not trivial, but hundreds
    of countries around the world have figured out how to do it. (Correction: Wikipedia’s Suspension bridges by country category
    lists 44 countries).

    You can run LLMs on your own devices

    In January of this year, I thought it would be years before I could run a useful LLM on my own computer. GPT-3 and 3.5
    were pretty much the only games in town, and I thought that even if the model weights were available it would take a $10,000+
    server to run them.'
  - 'DeepSeek v3 is a huge 685B parameter model—one of the largest openly licensed models currently available, significantly
    bigger than the largest of Meta’s Llama series, Llama 3.1 405B.

    Benchmarks put it up there with Claude 3.5 Sonnet. Vibe benchmarks (aka the Chatbot Arena) currently rank it 7th, just
    behind the Gemini 2.0 and OpenAI 4o/o1 models. This is by far the highest ranking openly licensed model.

    The really impressive thing about DeepSeek v3 is the training cost. The model was trained on 2,788,000 H800 GPU hours
    at an estimated cost of $5,576,000. Llama 3.1 405B trained 30,840,000 GPU hours—11x that used by DeepSeek v3, for a model
    that benchmarks slightly worse.'
  - 'I run a bunch of them on my laptop. I run Mistral 7B (a surprisingly great model) on my iPhone. You can install several
    different apps to get your own, local, completely private LLM. My own LLM project provides a CLI tool for running an array
    of different models via plugins.

    You can even run them entirely in your browser using WebAssembly and the latest Chrome!

    Hobbyists can build their own fine-tuned models

    I said earlier that building an LLM was still out of reach of hobbyists. That may be true for training from scratch, but
    fine-tuning one of those models is another matter entirely.'
- source_sentence: How can LLMs like Claude create full interactive applications using web technologies in a single prompt?
  sentences:
  - 'We already knew LLMs were spookily good at writing code. If you prompt them right, it turns out they can build you a
    full interactive application using HTML, CSS and JavaScript (and tools like React if you wire up some extra supporting
    build mechanisms)—often in a single prompt.

    Anthropic kicked this idea into high gear when they released Claude Artifacts, a groundbreaking new feature that was initially
    slightly lost in the noise due to being described half way through their announcement of the incredible Claude 3.5 Sonnet.

    With Artifacts, Claude can write you an on-demand interactive application and then let you use it directly inside the
    Claude interface.

    Here’s my Extract URLs app, entirely generated by Claude:'
  - 'Language Models are gullible. They “believe” what we tell them—what’s in their training data, then what’s in the fine-tuning
    data, then what’s in the prompt.

    In order to be useful tools for us, we need them to believe what we feed them!

    But it turns out a lot of the things we want to build need them not to be gullible.

    Everyone wants an AI personal assistant. If you hired a real-world personal assistant who believed everything that anyone
    told them, you would quickly find that their ability to positively impact your life was severely limited.'
  - 'An interesting point of comparison here could be the way railways rolled out around the world in the 1800s. Constructing
    these required enormous investments and had a massive environmental impact, and many of the lines that were built turned
    out to be unnecessary—sometimes multiple lines from different companies serving the exact same routes!

    The resulting bubbles contributed to several financial crashes, see Wikipedia for Panic of 1873, Panic of 1893, Panic
    of 1901 and the UK’s Railway Mania. They left us with a lot of useful infrastructure and a great deal of bankruptcies
    and environmental damage.

    The year of slop'
