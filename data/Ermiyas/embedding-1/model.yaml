  - source_sentence: " Looking for regtech/ fintech regulation industry members to take part in a webinar on Entity Centric\
      \ AML.\n\nThe webinar is about the need to take a broader look at activity and behaviour when assessing suspicion. The\
      \ way to do this is to focus on the subject entity and not on the individual events/ transactions which have occurred.\
      \ We call this Entity Centric AML, by taking a more contextual view, taking into account all information on the entity,\
      \ from both internal and external data sources, suspicious activity for each entity can be more clearly defined and\
      \ therefore monitored for and detected on.\n \nDiscussion points:\nDo we need to take a different approach?\nWhat is\
      \ an Entity Centric approach\nWhat are the benefits of this approach\nHow do we achieve this approach?\n\nLooking for\
      \ speaker suggestions, get in touch with any questions etc\n  |  Fintech/regtech industry member or AML expert for Entity\
      \ Centric AML Webinar "
