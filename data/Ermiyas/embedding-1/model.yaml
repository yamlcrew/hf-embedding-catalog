- source_sentence: ' Hi there, I''m writing a piece about a worker who shared a post on Reddit questioning "What is a polite
    and professional way to explain to my employer that since they''ve decided to cut our salary by 60%, that I''ll only be
    completing 40% of all assigned tasks from now on?" Read the full context of the story here at https://www.reddit.com/r/antiwork/comments/10oaben/what_is_a_polite_and_professional_way_to_explain/
    OR pasted below:


    READER POST BEGINS


    My employers have decided that since we''re transitioning into a new company, they deserve raises since they''ll be doing
    twice the amount of work. I work for a pretty small non-profit, having said that ALL OF US have had to do twice the amount
    of work we signed on for. I''m only contracted to work 40 hours of work a week, but recently I''ve had to work 60 hours
    a week and have even been called in for work ON MY DAYS OFF. But in spite of all of that, my employer has announced that
    the rest of us will be losing vision and dental benefits and be required to pay for health insurance out of pocket. Oh,
    and because we need to save money for the new company, thw rest of us will be getting pay cuts.


    READER POST ENDS


    It would be great if a career expert or life coach can share comment on whether the employee is approaching the situation
    in the best way. Could they be risking getting fired? Would this sort of tactic be effective in getting the employer to
    respond in a way that benefits the worker?  Be great to get any brief comments (200 or so words at max)  |  Career Expert
    or Life Coach Needed for Comment on Employee Doing Only 40% of Their Work After 60% Pay Cut '
  sentences:
  - 'Hi Sydney, In response to your recent query regarding co-parenting apps, I''d like to offer the insights below from New
    York family law attorney Atty Bruggemann, Esq., partner at Dimopoulos Bruggemann P.C. (www.dimolaw.com). Atty specializes
    in child custody, support and co-parenting matters and would be happy to offer her perspective. Please see below for her
    thoughts: The benefits of co-parenting apps: Co-parenting apps have been on the rise given the increase in co-parenting
    or shared custody arrangements awarded by the courts even when the parents involved fail to communicate effectively. While
    the failure of parents to get along and communicate has historically been seen as a barrier to a shared custody arrangement
    for a multitude of reasons, courts are now willing to take a chance on these arrangements. With the advancement of technology
    there is now the ability to control communications and the abuse that can come along with having full access through social
    media, text messaging, emails, and apps. These apps consolidate all the mediums of communication into one and allow parents
    to trust the communications, calendars, and financial aspects of their relationship. The apps accomplish several things
    to help parents in difficult co-parenting situations: - Tracking communications in one place. Often keeping texts, emails,
    and other communications become difficult when all mediums are permitted to be used. All communications, receipts, scheduling
    happens in one place in these apps and helps to consolidate communications. - Accountability. During the custody litigation
    everyone is on their best behavior. Many issues arise post judgment because people begin to take matters into their own
    hands. These apps save all communications and the communications cannot be edited. These apps create that sense of eyes
    on the behavior of the parents. Further, all communications can be downloaded and saved to provide as evidence should
    the parents needs to go back to court on any issues. - Cuts down on harassing communications by not giving each parent
    full and unfettered access to one another. Often there is a prohibition from contacting one another outside the app unless
    a third party is copied, such as a doctor or a teacher. Conversely, also stops phone call and text blocking or claims
    that one parent did not receive a communication. - Calendaring: There can be no confusion on when the children are with
    each parent and when the vacation schedules are if the parents put the regular and vacation/holiday schedules in the app
    calendar function. - Expense tracking: Many of the apps have the capability to track expenses for the parents and record
    payments. This helps to cut down on back-and-forth communications about who owes what and when the goal of the apps is
    to organize and streamline interactions between parties who have proven they cannot communicate effectively. While these
    apps cannot solve all issues between parents, they can help to keep parents focused on the most important issue, the wellbeing
    of their children. Here''s some background on Atty: Atty Bruggemann, Esq. has handled some of the most intricate divorce
    cases on record. With over fourteen years of experience, she has established herself as a trusted authority, providing
    strategic counsel and innovative solutions when matters seem insurmountable. Ms. Bruggemann specializes in navigating
    complex matrimonial cases involving high-net-worth individuals, professional athletes, and celebrities, consistently securing
    favorable outcomes that serve her clients'' best interests. Ms. Bruggemann’s extensive knowledge and skill in child custody
    and support matters ensures compassionate advocacy. While she prioritizes amicable resolutions, Ms. Bruggemann has a proven
    track record of success in highly contentious custody disputes and is prepared to vigorously litigate when necessary to
    safeguard the best interest of the children involved. Her expertise further extends to the drafting and negotiation of
    prenuptial, postnuptial, separation, and settlement agreements. Clients frequently call on her for advice when contemplating
    a divorce, preparing for mediation, and for second opinions on their matters. Recognized by Top Women Attorneys in New
    York and Super Lawyers’ Rising Stars, Ms. Bruggemann has published articles in The New York Law Journal and New York Family
    Law Monthly. She is a member of the American Bar Association and the New York State Bar Association. Ms. Bruggemann received
    a B.A. from Emerson College, cum laude, and a J.D. from New York Law School, cum laude. She is admitted to practice law
    in New York. Thank you for your consideration. Best, Kelly Lee Co-Communications (585) 764-4661 (cell) klee@cocommunications.com'
  - 'Hi Lindsay, Here''s a real estate investment story that your readers may find interesting. I''m a pharmacist by profession,
    so when I started investing in real estate I didn''t know what to look for in a property – or what to avoid. The first
    investment property I ever bought was a 100-year-old house. It was cheap, and I thought I had snagged a great deal. But
    I soon realized I had gotten myself into a project that needed a lot more than I had originally bargained for. Between
    the broken pipes and the rat and flea infestations, my new property needed $40,000 in repairs and improvements. But here
    are a few things I learned from that first investment: 1. Always vet a property before buying it. If you uncover problems
    that aren''t deal breakers, you''ll be in a much better position to negotiate the sale price if you know what''s wrong
    and how much repairs would cost. 2. Invest in properties that are big enough to allow you to maximize the number of bedrooms
    and bathrooms. That way, you can rent out individual rooms to college students and end up earning a lot more for the same
    property (versus renting the entire house to one person) 3. Expensive mistakes can help you if you take the time to learn
    from them. That''s what I did, and it''s helped me invest in properties that offer a high ROI. Despite that early investment
    mistake, I chose to keep going. And now, I can choose to retire thanks to my investment portfolio – even though I''m still
    in my early thirties. Please let me know if you''d like to hear more. Website: https://www.newbierealestateinvesting.com/
    Warmly, Ryan'
  - It is difficult to comment on the situation without knowing the specific details of the manager in question. However,
    in general, it is not recommended to approach a request for a raise or better benefits in a confrontational or ultimatum-style
    manner, as this can create tension and negatively affect the employee's relationship with their employer. It can also
    risk the employee being seen as difficult or unreasonable, which could result in negative consequences such as not receiving
    the desired raise or even being fired. A better approach would be to schedule a meeting with the employer and have an
    open and honest conversation about the employee's contribution to the company, their career goals, and their reasons for
    requesting a raise or better benefits. The employee can present data, such as market research or their performance metrics,
    to support their request and show their value to the company. It's important to remember that the outcome of these discussions
    is not always guaranteed, and the employer may not be able to meet the employee's request. However, approaching the situation
    in a professional and solution-focused manner can increase the chances of reaching a mutually beneficial agreement and
    maintaining a positive relationship with the employer.
