  - Hi there! Longtime insurance product manager now insurance agent here. Lots of thoughts on gap insurance! Kate Terry,
    CEO, Surround Insurance Cars have gotten a lot more expensive over the past few years, and as a result, people are taking
    out longer auto loans so they can afford the monthly payment on a new car. However, this comes with a risk - new cars
    depreciate rapidly. By the end of the first year of ownership, a car may be worth 20% less than what you paid for it.
    Unfortunately, if you have long car loan, say 72 or 84 months, the balance on your loan may be more than your car is worth.
    If you total it in a car crash, you still owe the loan, even though you no longer have a driveable car, and you probably
    need to buy a new car as well. This situation is what gap insurance prevents. Gap insurance, which you can get through
    your auto insurance company or sometimes from the dealer, pays out the difference between your loan balance and the actual
    cash value of your car, minus the deductible on your insurance policy. That lets you pay off your auto loan and just focus
    on finding a new car. Gap insurance will usually cost you under $100/year if you add it to your car insurance. You'll
    probably have to maintain full coverage on your car as well, which is comprehensive and collision coverage in addition
    to liability. Most lenders require full coverage anyway, though, so this isn't really an additional requirement. And you
    should pay attention to any limitations on payouts. Sometimes, there are limits to how large a gap will be covered, so
    you'll want to take that into account.
