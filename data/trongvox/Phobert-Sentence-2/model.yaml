widgetData:
- source_sentence: "Beefsteak 123 la mot dia chi ban banh mi chao, beefsteak cuc ngon tai Can Tho ma ban nen mot gan ghe den.\
    \ Khong gian quan rong rai, sach se, phuc vu nhanh nhen, gia ca hop ly. Banh mi chao duong Nguyen Van Troi noi tieng ban\
    \ banh mi thom ngon, chat luong. Banh mi tai day chia ra lam 2 phan: co thit bo ma khong thit bo.\n\nQuan Beefsteak 123\
    \ la mot dia diem ly tuong cho nhung nguoi yeu thich thit bo va cac mon an ngon khac. Quan noi tieng voi su ket hop tuyet\
    \ voi giua thit bo, pate va trung op la. Neu ban muon thu nhung mon khac, quan cung co san xuc xich, ca moi, cha lua va\
    \ xiu mai. Menu cua quan duoc chia thanh tung phan da duoc ket hop san de ban de dang lua chon. Vi du nhu bo op la pate\
    \ xuc xich hoac bo op la pate cha lua. Ban cung co the tao ra cac to hop rieng cua rieng minh nhu op la ca moi xiu mai.Mot\
    \ dieu dac biet khi den quan la khi ban goi mot phan, ban se duoc tang mien phi mot dia xa lach tron. Day la cach hoan\
    \ hao de ket hop khau vi cua ban voi cac loai rau song tuoi ngon.Voi khong gian thoai mai va phuc vu nhanh chong, quan\
    \ Beefsteak 123 mang den cho ban trai nghiem am thuc doc dao va ngon mieng. Hay ghe tham quan de thuong thuc nhung mon\
    \ an tuyet voi nay!\n\nTHONG TIN LIEN HE:\nDia chi: 9B Nguyen Van Troi, Phuong Xuan Khanh, Can Tho\nDien thoai: 0907 713\
    \ 458\nGio mo cua: 06:00 - 14:00\nGia tham khao: 20.000d - 40.000d\nFanpage: https://www.facebook.com/Beefsteak-123-143170999350605/\n\
    \n Goi dien"
  sentences:
  - Beefsteak 123 - Nguyen Van Troi
  - Pho Ngon 37
  - Khong tra no hay chi tien ngay Tet
- source_sentence: 'KCC - Pho & Com Ga Xoi Mam la quan an duoc nhieu nguoi yeu thich tai so 6 Ton That Thuyet, Nam Tu Liem,
    Ha Noi. Noi day voi khong gian am cung, rat thich hop cho nhung bua an ben ban be, dong nghiep. Day la quan duoc nhieu
    thuc khach danh gia cao ca dich vu lan chat luong do an. Den voi KCC - Pho & Com Ga Xoi Mam ngoai pho la mon duoc yeu
    thich nhat ra, quan con co vo so cac mon an hap dan nhu: com rang dui ga xoi mam, com rang dua bo, com rang cai bo, pho
    xao bo, com nong dui ga xoi mam, mi xao bo, com nong cai bo, com nong dua bo. Doc va la tu nhung hat com gion rum, cung
    voi do la huong vi cua nuoc sot dac trung va bi truyen ngam sau vao tan ben trong.


    Cac mon nay tuy binh di trong cach che bien nhung mang lai huong vi am thuc manh me, du de lam to mo bat cu thuc khach
    nao khi thuong thuc. KCC - Pho & Com Ga Xoi Mam cam ket mang den cho nguoi tieu dung nhung san pham ngon an toan, co loi
    cho suc khoe voi gia rat hop ly. Ban dang o Ton That Thuyet, Ha Noi va dang ban khoan khong biet dia chi an pho nao ngon
    thi hay ghe ngay quan an KCC nhe!


    THONG TIN LIEN HE:  Dia chi:  6 Ton That Thuyet, Nam Tu Liem, Ha Noi Gio mo cua:  06:00 - 14:00 | 17:30 - 22:00

    Dat mua ngay'
  sentences:
  - Nem Nuong Hai Anh
  - Ca basa kho thom
  - KCC - Pho & Com Ga Xoi Mam
- source_sentence: Banh canh ca loc duoc lam tu bot gao va ca loc. Bot gao sau khi duoc can mong thanh soi vua an thi duoc
    tha vao noi nuoc luoc Ca loc go lay phan thit, uop chut gia vi cho dam vi. Phan xuong ca khong bi bo di ma duoc giu lai
    gia nhuyen, loc lay phan nuoc ca roi do vao phan nuoc dung. Mon banh canh ca loc ngon nhat la khi an con nong, vua chan
    vua hup vua xuyt xoa cai vi cay nong. Neu an trong ngay dong thi qua tuyet voi roi phai khong nao. Mot to banh canh ca
    loc chi co gia khoang 30.000 dong thoi cac ban nhe.
  sentences:
  - Banh canh ca loc
  - Bun oc, bun oc chan
  - Nha hang Trung Duong Marina
- source_sentence: 'Nguyen lieu:Bap chuoi 1 cai Chanh 1 trai Bot chien gion 75 gr Dau an 100 ml Nuoc mam 3 muong canh Bot
    ngot 1 muong ca phe Tuong ot 1 muong canh Duong 1 muong canh Ot bot 1 muong ca pheCach che bien:So che bap chuoi: Dung
    tay tach bap chuoi thanh nhung cong nho, sau do ngam bap chuoi vao trong thau nuoc chanh pha loang de giup bap chuoi khong
    bi tham den. Tiep tuc go bo nhuy trong bap chuoi roi rua sach lai voi nuoc.Nhung bot va chien bap chuoi: Bap chuoi sau
    khi tach roi va rua sach ban cho bap chuoi ra to, do vao 75gr bot chien gion, dao deu cho bot tham vao bap chuoi. Bac
    chao len bep cung voi 100ml dau an dun soi (luong dau ngap bap chuoi), sau do cho bap chuoi da ao bot vao chien tren lua
    vua khoang 5 - 10 phut cho bap chuoi chin vang deu thi vot ra de rao dau.Lam bap chuoi chien nuoc mam: Bac mot cai chao
    khac cho vao 10ml dau an (tan dung luong dau con du khi chien bap chuoi), roi cho vao 3 muong canh nuoc mam, 1 muong ca
    phe bot ngot, 1 muong canh tuong ot, 1 muong canh duong, 1 muong ca phe ot bot khuay tan hon hop cho sanh vang lai khoang
    3 phut tren lua vua. Cuoi cung ban cho bap chuoi da chien vang vao dao deu them 3 phut roi tat bep.Thanh pham: Bap chuoi
    gion rum hoa quyen voi vi man man ngot ngot cua nuoc mam, an kem com trang se cuc ki ngon mieng day. Mon an vo cung de
    lam nay se khien gia dinh ban tam tac khen ngon.'
  sentences:
  - Nha Hang Ca Hoi Song Nhi
  - Com nhoi thit hap ot chuong
  - Hoa chuoi chien nuoc mam
- source_sentence: "Noi tieng ve do lau doi va huong vi mon an nay o Ha Noi thi phai ke den hang Banh Duc Nong Thanh Tung.\
    \ Banh o day hap dan o do deo dai cua bot, thit nam du day va nem nem vua mieng. Khi phuc vu, mon an nong sot toa ra mui\
    \ huong thom lung tu bot, hanh phi, nuoc mam. Mon banh duc o day duoc chan ngap nuoc mam pha loang vi ngot, hoi man man,\
    \ co thit bam voi nam meo va rat nhieu hanh kho da phi vang.Mon banh duc o Banh Duc Nong Thanh Tung duoc chan ngap nuoc\
    \ mam pha loang vi ngot, hoi man man, co thit bam voi nam meo va rat nhieu hanh kho da phi vang. Cach an nay hoi giong\
    \ voi mon banh gio chan nuoc mam thit bam o quan pho chua Lang Son gan cho Ban Co. La mon qua an nhe nhang, vua du lung\
    \ lung bung, co ve dan da nen rat nhieu nguoi them them, nho nho. Banh duc nong Ha Noi o day khong bi pha them bot dau\
    \ xanh nen van giu nguyen duoc huong vi dac trung. Dac biet, phan nhan con duoc tron them mot it cu dau xao tren ngon\
    \ lua lon nen giu duoc do ngot gion.THONG TIN LIEN HE:Dia chi: 112 Truong Dinh, Quan Hai Ba Trung, Ha NoiGio mo cua: 10:00\
    \ - 21:00Dia diem chat luong: 4.7/5 (14 danh gia tren Google)\n Chi duong Danh gia Google"
  sentences:
  - Banh Duc
  - Let's Eat Buffet
  - Banh bi do
