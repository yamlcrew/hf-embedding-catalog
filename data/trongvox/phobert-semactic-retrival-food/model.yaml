widgetData:
- source_sentence: Banh gai Tu Tru hay banh gai lang Mia la loai banh dac san cua lang Mia, xa Tho Dien, huyen Tho Xuan. Nguyen
    lieu banh gai chia thanh hai phan gom vo va nhan. Trong do, vo chi gom gao nep va la gai con phan nhan co mo lon, dau
    xanh, dua va hat sen. Banh gai duoc goi bang la chuoi kho, hap chin trong vong 2 gio. Chiec banh gai dat chuan phai min
    va thom ngon, co vi deo thom cua la gai va gao nep. Huong thom cua dau chuoi, vi ngot cua mat mia, mui thom thanh diu
    cua dau, vi beo ngay cua thit luon hap dan nguoi an.Tat ca tao nen nhung chiec banh gai thom ngon dam hon xu Thanh.
  sentences:
  - Gà nấu măng chua
  - Trung tâm EZcooking
  - Bánh gai Tứ Trụ.
- source_sentence: "Ở Hải Phòng, nhắc đến cháo là bạn sẽ được review ngay đến địa điểm Cháo cay Trần Bình Trọng - một quán\
    \ khá nổi và để lại ấn tượng tốt cho nhiều người. Nếu bạn là tín đồ mê ăn cay thì đây sẽ là lựa chọn xuất sắc dành cho\
    \ bạn, là món cháo mà không nơi nào có thể có, nếu bạn đam mê cảm giác cay tê lưỡi thì bạn không nên bỏ lỡ địa điểm này.\n\
    \nĐúng như tên gọi của món ăn là cháo cay, nên điểm đầu tiên đặc biệt của món ăn này chính là vị cay. Cháo cay Trần Bình\
    \ Trọng nổi tiếng vì rất cay. Nếu bạn là người có niềm đam mê với đồ cay nóng thì đây chính là một địa chỉ để đời cho\
    \ bạn. Khác với món cháo thông thường, cháo cay là món được nấu từ bột gạo xay nhuyễn. Nước dùng để nấu cháo là loại nước\
    \ xương được hầm kỹ, và được nêm nếm gia vị sao cho vừa ăn.\n\nĐến với quán, bạn sẽ có đa dạng lựa chọn từ cháo sườn,\
    \ cháo trai, cháo lươn,... với hương vị độc đáo và thơm ngon. Cháo được nấu sền sệt, không bị loãng quá mà cũng không\
    \ hề đặc, nêm vừa miệng được ăn kèm cùng quẩy giòn giòn.\n\nTHÔNG TIN LIÊN HỆ:\nĐịa chỉ: 17 Trần Bình Trọng, Hồng Bàng,\
    \ Hải Phòng.\nĐiện thoại: 0912 319 466\nGiờ mở cửa: 16:00 - 21:00Giá trung bình: 15.000 đồng - 25.000 đồng\n Chỉ đường\
    \  Gọi điện  Mua ngay"
  sentences:
  - Quán Cháo cay - Trần Bình Trọng
  - Canh bò hầm rau củ
  - Trái cây chua
- source_sentence: Tamago Onsen là món trứng được nấu bằng cách sử dụng những nguồn suối nước nóng tự nhiên ở Nhật Bản (ở
    Nhật, người ta gọi suối nước nóng là onsen). Quá trình chế biến thường diễn ra trong một khoảng thời gian khá dài nên
    món trứng thành phẩm giống như một miếng bánh mềm mịn. Tamago Onsen thường được phục vụ với một vài món đồ ăn kèm và nước
    tương. Thực ra, onsen tamago gần giống như món trứng trần ở nhiều nước. Nhưng điều làm thực khách cảm thấy thu hút ở món
    ăn này đó là sự cầu kì của nó, khi người Nhật sử dụng nước từ các con suối nước nóng để chế biến món trứng.
  sentences:
  - Dưa cải muối
  - Cách nấu lẩu kim chi cá hồi
  - Quán Dương
- source_sentence: 'Thuong bi nham lan voi goi cuon, bo bia lai co cach che bien cau ky hon doi chut. Von la mon an cua nguoi
    Hoa, theo nam thang, bo bia Sai Gon dan co nhieu bien doi, nhung xoay quanh van la 5 loai nguyen lieu chinh: lap xuong,
    tep kho, trung vit, cu san cat soi, xa lach va duoc cuon ben ngoai bang mot lop banh trang mong, cham voi nuoc tuong dac
    che.Gia tham khao: 5000 dong'
  sentences:
  - Bánh Xèo 46A Đinh Công Tráng
  - Món canh rong biển
  - Vựa Cua Biển Út Kiệt
- source_sentence: 'Nguyên liệu: Cho 3 người

    Cá mút đá 1 kg Ớt 1 muỗng canhLá chanh 20 gr Hành tím băm 2 muỗng cà phê Sa tế 2 muỗng canhDụng cụ thực hiện: Bếp nướng
    điện, tô, muỗng, dao,...


    Cách làm Cá mút đá nướng sa tế:

    Sơ chế cá mút đá:

    Dùng một vật nhọn giữ cố định đầu của cá mút đá, sau đó dùng dao rạch phần bụng và loại bỏ hết phần ruột của cá ra.Tiếp
    theo dùng dao lóc thịt và bỏ phần da nhờn của cá đi. Tùy theo món ăn và kích thước cá mà chúng ta sẽ cắt thành những đoạn
    vừa ăn. Bên cạnh đó, bạn có thể mua cá mút đá chế biến sẵn và được giữ đông, chúng vẫn giữ được hương vị, độ tươi ngon.
    Đây là cách dễ dàng nhất bạn không phải tốn công chế biến cá mút đá. Mua về chỉ cần cắt nhỏ, ướp gia vị là có thể nấu
    được ngay.

    Cách sơ chế cá sạch, hết nhớt

    Cách 1: bạn hãy lấy giấm tưới lên thân cá, chờ trong vài phút để nhớt trên thân cá đông lại, lúc này bạn có thể dễ dàng
    dùng dao cạo hết lớp nhớt đã đông này đi đấy.Cách 2: sau khi mua cá về, dùng nước nóng già đổ lên thân cá. Chú ý không
    được để nước sôi vì sẽ làm tróc da và làm chín lớp cá bên ngoài đấy. Sau khi đổ đợi lớp nhớt đông lại và dùng dao cạo
    lớp nhớt đi sau đó rửa sạch. Để đảm bảo cá sạch nhớt, sau khi cạo cũng nên rửa lại bằng giấm hay chanh.Chú ý: Để loại
    bỏ nhớt, mùi tanh của cá do tiết thừa còn đọng lại khi bạn làm thịt cá, sau khi chế biến thịt thì bạn hãy rửa thật kĩ,
    đặc biệt là phần bụng và xương sống cá để loại bỏ máu đọng lại. Bằng cách như vậy thì cá của bạn sẽ bớt đi mùi tanh rất
    nhiều đấy!

    Ướp cá:

    Cho cá vào tô cùng với 1 muỗng canh ớt, 20gr lá chanh, 2 muỗng cà phê hành tím băm và 2 muỗng canh sa tế. Dùng tay trộn
    đều cho cá thấm đều gia vị, sau đó ướp trong 15 phút.

    Nướng cá:

    Cho cá lên bếp nướng điện hoặc lên dĩa nướng với than, nướng đến khi cá vừa chín tới, không nướng quá chín làm cá khô,
    mất đi độ ngon của món ăn.

    Thành phẩm: Thịt cá dai dai, gia vị đậm đà, cay cay của sa tế, nhất định sẽ gây ấn tượng cho cả gia đình bạn đấy!'
  sentences:
  - Cá mút đá (cá ninja) nướng sa tế
  - Bánh Canh Hải Sản Mụ Nị
  - Miến xào chả cá
