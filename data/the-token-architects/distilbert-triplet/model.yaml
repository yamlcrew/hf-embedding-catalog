- source_sentence: at the county level of government in california power is held by
  sentences:
  - '"Hunger Strike" was written by vocalist Chris Cornell. It features a duet between Cornell and vocalist Eddie Vedder.
    Cornell was having trouble with the vocals at practice, when Vedder stepped in. Cornell later said "he sang half of that
    song not even knowing that I''d wanted the part to be there and he sang it exactly the way I was thinking about doing
    it, just instinctively." "Hunger Strike" became Temple of the Dog''s breakout single; it was also Vedder''s first featured
    vocal on a record.'
  - On January 4, 1850, the California constitutional committee recommended the formation of 18 counties. They were Benicia,
    Butte, Fremont, Los Angeles, Mariposa, Monterey, Mount Diablo, Oro, Redding, Sacramento, San Diego, San Francisco, San
    Joaquin, San Jose, San Luis Obispo, Santa Barbara, Sonoma, and Sutter. On April 22, the counties of Branciforte, Calaveras,
    Coloma, Colusi, Marin, Mendocino, Napa, Trinity, and Yuba were added. Benicia was renamed Solano, Coloma to El Dorado,
    Fremont to Yolo, Mt. Diablo to Contra Costa, San Jose to Santa Clara, Oro to Tuolumne, and Redding to Shasta. One of the
    first state legislative acts regarding counties was to rename Branciforte County to Santa Cruz, Colusi to Colusa, and
    Yola to Yolo. The last county in California to be established is Imperial County on August 7, 1907.
  - The basic political subdivision of California are the 58 counties. The county government provides countywide services
    such as law enforcement, jails, elections and voter registration, vital records, property assessment and records, tax
    collection, public health, health care, social services, libraries, flood control, fire protection, animal control, agricultural
    regulations, building inspections, ambulance services, and education departments in charge of maintaining statewide standards.
    In addition the county serves as the local government for all unincorporated areas (those areas not within any incorporated
    city), providing services such as police, parks, street maintenance, land use regulations, zoning, and waste disposal.
    Counties have taxing and police powers. Counties may promulgate ordinances which are usually codified in a county code,
    and violations of the ordinances are misdemeanor crimes unless otherwise specified as an infraction.
- source_sentence: where does an eye for an eye come from
  sentences:
  - 'In the Torah We prescribed for them a life for a life, an eye for an eye, a nose for a nose, an ear for an ear, a tooth
    for a tooth, an equal wound for a wound: if anyone forgoes this out of charity, it will serve as atonement for his bad
    deeds. Those who do not judge according to what God has revealed are doing grave wrong. (Qurʾān, 5:45 )'
  - 'Zhu De (Chu Teh; Chinese: 朱德; pinyin: Zhū Dé; pronounced [ʈʂú tɤ̌]; 1 December 1886 – 6 July 1976) was a Chinese general,
    warlord, politician, revolutionary and one of the pioneers of the Communist Party of China. Born poor in 1886 in Sichuan,
    he was adopted by a wealthy uncle at age nine; this prosperity provided him a superior early education that led to his
    admission into a military academy. After his time at the academy, he joined a rebel army and soon became a warlord. It
    was after this period that he adopted communism. He ascended through the ranks of the Chinese Red Army as it closed in
    on securing the nation. By the time China was under Mao''s control, Zhu was a high-ranking official within the Communist
    Party of China. He served as Commander-in-Chief of the Eighth Route Army during the Second Sino-Japanese War. In 1955
    he became one of the Ten Marshals of the People''s Liberation Army, of which he is regarded as the principal founder.
    Zhu remained a prominent political figure until his death in 1976. As the chairman of the Standing Committee of the National
    People''s Congress from 1975-76, Zhu was the head of state of the People''s Republic of China.'
  - The principle is found in Babylonian Law. If it is surmised that in societies not bound by the rule of law, if a person
    was hurt, then the injured person (or their relative) would take vengeful retribution on the person who caused the injury.
    The retribution might be worse than the crime, perhaps even death. Babylonian law put a limit on such actions, restricting
    the retribution to be no worse than the crime, as long as victim and offender occupied the same status in society. As
    with blasphemy or lèse-majesté (crimes against a god or a monarch), crimes against one's social betters were punished
    more severely.
- source_sentence: basic units of sound in a language are called
  sentences:
  - A phoneme (/ˈfoʊniːm/) is one of the units of sound (or gesture in the case of sign languages, see chereme) that distinguish
    one word from another in a particular language. For example, in most dialects of English, the sound patterns /θɪn/ (thin)
    and /dɪn/ (din) are two separate words distinguished by the substitution of one phoneme, /θ/, for another phoneme, /d/.
    (Two words like this that differ in meaning through a contrast of a single phoneme form what is called a minimal pair).
    In many other languages these would be interpreted as exactly the same set of phonemes (i.e. /θ/ and /d/ would be considered
    the same).
  - 'Heritable traits are known to be passed from one generation to the next via DNA, a molecule that encodes genetic information.
    DNA is a long polymer that incorporates four types of bases, which are interchangeable. The sequence of bases along a
    particular DNA molecule specifies the genetic information: this is comparable to a sequence of letters spelling out a
    passage of text. Before a cell divides through mitosis, the DNA is copied, so that each of the resulting two cells will
    inherit the DNA sequence. A portion of a DNA molecule that specifies a single functional unit is called a gene; different
    genes have different sequences of bases. Within cells, the long strands of DNA form condensed structures called chromosomes.
    Organisms inherit genetic material from their parents in the form of homologous chromosomes, containing a unique combination
    of DNA sequences that code for genes. The specific location of a DNA sequence within a chromosome is known as a locus.
    If the DNA sequence at a particular locus varies between individuals, the different forms of this sequence are called
    alleles. DNA sequences can change through mutations, producing new alleles. If a mutation occurs within a gene, the new
    allele may affect the trait that the gene controls, altering the phenotype of the organism.'
  - 'However, the absence of minimal pairs for a given pair of phones does not always mean that they belong to the same phoneme:
    they may be too dissimilar phonetically for it to be likely that speakers perceive them as the same sound. For example,
    English has no minimal pair for the sounds [h] (as in hat) and [ŋ] (as in bang), and the fact that they can be shown to
    be in complementary distribution could be used to argue for their being allophones of the same phoneme. However, they
    are so dissimilar phonetically that they are considered separate phonemes.'
- source_sentence: when did the smithsonian air and space museum open
  sentences:
  - Chicago the first aircraft to fly around the world
  - The National Air and Space Museum of the Smithsonian Institution, also called the NASM, is a museum in Washington, D.C..
    It was established in 1946 as the National Air Museum and opened its main building on the National Mall near L'Enfant
    Plaza in 1976. In 2016, the museum saw approximately 7.5 million visitors, making it the second most visited museum in
    the world, and the most visited museum in the United States.  The museum contains the Apollo 11 command module, the Friendship
    7 capsule which was flown by John Glenn, Charles Lindbergh's Spirit of St. Louis, the Bell X-1 which broke the sound barrier,
    and the Wright brothers' plane near the entrance.
  - '"All About That Bass" is the debut single by American singer and songwriter Meghan Trainor. Released by Epic Records
    on June 30, 2014, it was recorded for her 2014 debut EP and her 2015 studio album, both named Title. Trainor co-wrote
    "All About That Bass" with its producer Kevin Kadish; it is a bubblegum pop/doo-wop and retro-R&B song that draws influences
    from various musical genres including hip hop, country, soul and rock and roll. Lyrically, it discusses positive body
    image.'
- source_sentence: where is the name jason in the bible
  sentences:
  - The literary source (hagiographic legend) of the life of Jason and Sosipater was newly edited and translated by B. Kindt
    as appendix to "La version longue du récit légendaire de l'évangelisation de Corfou par les saints Jason and Sosipatre,"
    Analecta Bollandiana 116 (1998) 259–295.
  - Queen Elizabeth II became the longest-reigning British monarch on 9 September 2015 when she surpassed the reign of her
    great-great-grandmother Victoria. On 6 February 2017 she became the first British monarch to celebrate a Sapphire Jubilee,
    commemorating 65 years on the throne.
  - Jason of Thessalonica was a Jewish convert and early Christian believer mentioned in the New Testament in Acts 17:5-9
    and Romans 16:21. According to tradition, Jason is numbered among the Seventy Disciples.[citation needed]
