widgetData:
- source_sentence: 이번 시행령은 지난 5월 19일 개정된 ‘보험업법’의 개정사항을 반영한 것으로 금리인하요구권 미고지시 과태료 부과대상이 ‘보험회사의 발기인 등’에서 ‘보험회사’로 변경됐다.
  sentences:
  - 시행령은 5월 19일 개정된 '보험업법' 개정을 반영하고 있으며, 금리 인하 요구권 과징금 고시 대상이 '보험사 추진자 등'에서 '보험사'로 바뀌었습니다.
  - 번개칠 때는 뛰지 말자.
  - 어제 설정해둔 알람은 언제 울리게 되어있는데?
- source_sentence: 그녀는 지속적으로 나에게 그녀가 만든 새로운 규칙을 매일 매일 이메일로 보냈다.
  sentences:
  - 다만 밤에도 동네에 사람이 많더라구요.
  - 우선, 런던에서는 가격이 저렴하고 깔끔하고 좋은 방입니다.
  - 그녀는 자신이 만든 새로운 규칙을 매일 끊임없이 제게 이메일로 보냈습니다.
- source_sentence: 메시지에 대한 빠른 피드이 좋았습니다.
  sentences:
  - 다만 엘레베이터가 없는 3층같은 2층이니 짐 많으신 분들은 참고하세요.
  - 메시지 속보 잘 들었습니다.
  - 바다가 방에서도 보이는 멋진 아름다운 집입니다
- source_sentence: 탄소중립이란 온실가스 배출량을 최대한 줄이고 나머지 배출량은 산림 등 흡수량으로 상쇄, 순배출량이 0(Net-zero)이 되는 경우를 의미한다.
  sentences:
  - 이와 함께 정류장 내 사전요금지불시스템을 도입하고 차량과 정류장에 냉·난방 시설, 와이파이(Wi-Fi), 위치정보 표시서비스 등 이용객 편의서비스도 제공한다.
  - 위치의 편의성을 생각하신다면 베스트 장소입니다.
  - 심평원과 질병관리본부로부터 수집된 19개의 임상기록이 국내외 연구자들에게 공개될 예정입니다.
- source_sentence: 1월 말 터진 코로나19 사태로 남대문시장은 직격탄을 맞았다.
  sentences:
  - 어느 분야 할 것 없이 그야말로 직격탄을 맞았다.
  - 그 외엔 위치, 가격, 시설 모두 만족이요!
  - 번개 칠 때 뛰지 말라고 했지.
