    shaping the loaf is essential for even baking in the oven.
- source_sentence: What is the significance of Akshaywat?
  sentences:
  - Akshaywat, or the "immortal banyan tree," is a spiritually significant site in Prayagraj, especially during the Kumbh
    Mela. Symbolizing immortality and eternal life, the tree is believed to possess divine qualities that remain unaffected
    by creation and destruction cycles. Mythologically, it is associated with Lord Brahma, who is said to have performed a
    sacrificial ritual under it, and Lord Vishnu, who is believed to have blessed devotees there. Akshaywat is also a sacred
    spot for performing Pind Daan, rituals for deceased ancestors, thought to help achieve Moksha (liberation). As a center
    of spiritual wisdom and pilgrimage for thousands of years, it continues to be a powerful symbol of divine blessings and
    spiritual strength for Hindu devotees.
  - 'What are the must-visit spiritual sites near Sangam?

    The Sangam area, where the Ganga, Yamuna, and the mystical Saraswati rivers converge, is surrounded by revered spiritual
    sites:


    Bade Hanumanji Temple:Bade Hanumanji Temple, also known as Lete Hanuman Mandir, is a unique and revered Hindu shrine located
    near the Sangam in Prayagraj. This temple is distinctive for its reclining idol of Lord Hanuman, a one-of-a-kind depiction
    of the deity. Each year, during the monsoon floods, the Ganga river rises to gently wash over the feet of Lord Hanuman—a
    sacred ritual believed to be a divine blessing


    Patalpuri Temple and Akshayavat Tree: Located within the Allahabad Fort, the ancient Patalpuri Temple is known for the
    Akshayavat (Indestructible Banyan Tree), considered sacred and a symbol of immortality.


    Mankameshwar Temple: A dedicated Shiva temple located near the Sangam, known for its serene atmosphere and the belief
    that prayers here fulfill desires.'
  - The uniqueness of brightly colored seashells lies in their mesmerizing patterns. Found along coastlines worldwide, these
    intricate formations tell stories of marine life and geological processes. Each shell serves as a protective covering,
    shielding the delicate organisms within from predators and environmental threats. Fishermen and beachcombers alike often
    treasure these natural artifacts, using them for decoration or as tools in crafting. The vibrant hues seen in shells,
    ranging from deep blues to vivid oranges, result from pigments produced by the mollusks themselves, influenced by their
    habitat and diet. Collecting seashells can foster a deep appreciation for marine ecosystems and the roles different species
    play within them, reminding us of the intricate balance of nature.
- source_sentence: Allahabad Junction ka matlab
  sentences:
  - 'Where is Anand Bhavan Museum located?

    Anand Bhawan is located on Jawaharlal Nehru Road, about 5 km from Allahabad Junction Railway Station, Prayagraj, Uttar
    Pradesh.'
  - Aartis are performed both in the mornings and evenings on the riverbanks in Prayagraj to honor the divine presence of
    the sacred rivers—Ganga, Yamuna, and mythical Saraswati—and to seek their blessings.  \n The morning Aarti symbolizes
    the beginning of a new day, invoking the divine to bestow grace, protection, and spiritual strength upon the devotees.  \n
    The evening Aarti serves as a ritual of gratitude, marking the end of the day by thanking the deities for their blessings
    and guidance.
  - 'Where is Khusro Bagh located?

    The garden is located approximately 3 km from Allahabad Junction Railway Station, making it easily accessible by local
    transport. The address is near the Lukarganj area, Allahabad, Uttar Pradesh.'
- source_sentence: Do E-Rickshaws have a maximum passenger limit, and what is it?
  sentences:
  - The ancient art of glassblowing dates back thousands of years. This intricate craft requires skill and precision, resulting
    in beautiful works that can be functional or decorative. From vases to intricate sculptures, the possibilities are endless.
  - E-Rickshaws have a maximum passenger limit of 4 people. It is important not to exceed this limit to ensure safety.
  - No, shuttle buses will not have dedicated volunteers specifically, but for assistance, you can reach out to the nearest
    information center.
- source_sentence: Tourists visit reason
  sentences:
  - 'What attractions are closest to the city center?

    Near the city center, you’ll find several attractions within a short distance. Anand Bhavan and Swaraj Bhavan are centrally
    located and offer insights into the Nehru family and India’s freedom movement. All Saints’ Cathedral, a magnificent Gothic-style
    church also known as the “Patthar Girja,” is located in Civil Lines and is one of Prayagraj''s architectural gems. Company
    Bagh, a peaceful park, is also close by and ideal for a quiet stroll. Chandrashekhar Azad Park and Khusro Bagh are both
    centrally located as well, providing green spaces along with historical importance.'
  - "When and where was the last Kumbh held?\n The last Mahakumbh was held in Haridwar in 2021."
  - 'What is All Saints Cathedral, and why is it architecturally significant?

    All Saints Cathedral, locally known as Patthar Girja (Stone Church), is a renowned Anglican Christian Church located on
    M.G. Marg, Allahabad. Built in the late 19th century, it is one of the most beautiful and architecturally significant
    churches in Uttar Pradesh, attracting both tourists and pilgrims.'
