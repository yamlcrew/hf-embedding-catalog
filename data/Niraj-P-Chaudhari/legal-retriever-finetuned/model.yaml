widgetData:
- source_sentence: What is the punishment mentioned in the third instance?
  sentences:
  - 'question: What happens when a law made by the legislature of a state, which contradicts an earlier law by parliament
    or an existing law, receives the president''s assent after being reserved for his consideration?

    answer: The law so made by the Legislature of such State shall prevail in that State.'
  - 'question: What is the punishment mentioned in the third instance?

    answer: Imprisonment for 2 years, or fine, or both.'
  - 'question: What does it mean when any movable property or goods or any case, package or other receptacle containing movable
    property or goods is marked, or a case, package or other receptacle having any mark thereon is used, in a manner reasonably
    calculated to cause it to be believed that the property or goods so marked, or any property or goods contained in any
    such receptacle so marked, belong to a person to whom they do not belong?

    answer: This is defined as using a false property mark.'
- source_sentence: What happens to the affidavit mentioned in this section?
  sentences:
  - 'question: What happens to the affidavit mentioned in this section?

    answer: The affidavit mentioned in this section may be attached to the duplicate of the summons and returned to the Court.'
  - 'question: What is the punishment for assault or criminal force in attempt to commit theft of property carried by a person?

    answer: Punished with imprisonment of either description for a term which may extend to two years, or with fine, or with
    both.'
  - 'question: What is the first illustration of murder in the text?

    answer: A shoots Z with the intention of killing him. Z dies in consequence. A commits murder.'
- source_sentence: What does an officer need to do when required to arrest someone without a warrant?
  sentences:
  - 'question: What may a magistrate order if someone is carrying on a trade or occupation that is causing a nuisance?

    answer: The Magistrate may make a conditional order requiring the person to desist from carrying on, or to remove or regulate
    in such manner as may be directed, such trade or occupation, or to remove such goods or merchandise, or to regulate the
    keeping thereof in such manner as may be directed.'
  - 'question: What does the offense 296 relate to?

    answer: Causing a disturbance to an assembly engaged in religious worship.'
  - 'question: What does an officer need to do when required to arrest someone without a warrant?

    answer: The officer needs to deliver to the officer required to make the arrest an order in writing, specifying the person
    to be arrested and the offence or other cause for which the arrest is to be made. The officer is also required to notify
    the person to be arrested the substance of the order and, if so required by such person, shall show him the order.'
- source_sentence: What is the duty of the court during the process of working out a satisfactory disposition of the case?
  sentences:
  - 'question: What is the process for an amendment that seeks to change certain articles or chapters of the constitution
    before it is presented to the president for assent?

    answer: The amendment requires to be ratified by the Legislatures of not less than one-half of the States by resolutions
    to that effect passed by those Legislatures.'
  - 'question: How long can the extension of the holding of elections last during a proclamation of emergency?

    answer: Not extending beyond a period of six months after the Proclamation has ceased to operate'
  - 'question: What is the duty of the court during the process of working out a satisfactory disposition of the case?

    answer: The duty of the Court is to ensure that the entire process is completed voluntarily by the parties participating
    in the meeting.'
- source_sentence: What happens after fifteen years from the commencement of the constitution according to article 120 clause
    2?
  sentences:
  - 'question: Where is the new amount to be paid one thousand and five hundred rupees according to sub-section (1) of section
    125 of the principal act?

    answer: The new amount to be paid is one thousand and five hundred rupees in West Bengal.'
  - 'question: In legal terms, what kind of cases or offences does the police need a warrant to make an arrest for?

    answer: The police need a warrant to make an arrest for non-cognizable cases or offences, which are not serious in nature.'
  - 'question: What happens after fifteen years from the commencement of the constitution according to article 120 clause
    2?

    answer: This article shall have effect as if the words ''or in English'' were omitted therefrom.'
