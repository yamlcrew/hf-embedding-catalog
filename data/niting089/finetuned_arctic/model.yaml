widgetData:
- source_sentence: How does the Blueprint for an AI Bill of Rights aim to protect the rights of the American public?
  sentences:
  - "and use prohibitions. You and your communities should be free from unchecked surveillance; surveillance \ntechnologies\
    \ should be subject to heightened oversight that includes at least pre-deployment assessment of their \npotential harms\
    \ and scope limits to protect privacy and civil liberties. Continuous surveillance and monitoring"
  - "steps to move these principles into practice and promote common approaches that allow technological \ninnovation to flourish\
    \ while protecting people from harm. \n9"
  - "ABOUT THIS FRAMEWORK­­­­­\nThe Blueprint for an AI Bill of Rights is a set of five principles and associated practices\
    \ to help guide the \ndesign, use, and deployment of automated systems to protect the rights of the American public in\
    \ the age of \nartificial intel-ligence. Developed through extensive consultation with the American public, these principles\
    \ are"
- source_sentence: How can organizations monitor the impact of proxy features on algorithmic discrimination?
  sentences:
  - "sociodemographic variables that adjust or “correct” the algorithm’s output on the basis of a patient’s race or\nethnicity,\
    \ which can lead to race-based health inequities.47\n25\nAlgorithmic \nDiscrimination \nProtections"
  - "proxy; if needed, it may be possible to identify alternative attributes that can be used instead. At a minimum, \norganizations\
    \ should ensure a proxy feature is not given undue weight and should monitor the system closely \nfor any resulting algorithmic\
    \ discrimination.   \n26\nAlgorithmic \nDiscrimination \nProtections"
  - "velopment, and deployment of automated systems, and from the \ncompounded harm of its reuse. Independent evaluation and\
    \ report­\ning that confirms that the system is safe and effective, including re­\nporting of steps taken to mitigate\
    \ potential harms, should be per­\nformed and the results made public whenever possible. \n15"
- source_sentence: What measures can be taken to ensure that AI systems are designed to be accessible for people with disabilities?
  sentences:
  - "potential for meaningful impact on people’s rights, opportunities, or access and include those to impacted \ncommunities\
    \ that may not be direct users of the automated system, risks resulting from purposeful misuse of \nthe system, and other\
    \ concerns identified via the consultation process. Assessment and, where possible, mea­"
  - "and as a lifecycle minimum performance standard. Decision possibilities resulting from performance testing \nshould include\
    \ the possibility of not deploying the system. \nRisk identification and mitigation. Before deployment, and in a proactive\
    \ and ongoing manner, poten­\ntial risks of the automated system should be identified and mitigated. Identified risks\
    \ should focus on the"
  - "individuals \nand \ncommunities \nfrom algorithmic \ndiscrimination and to use and design systems in an equitable way.\
    \ This protection should include proactive \nequity assessments as part of the system design, use of representative data\
    \ and protection against proxies \nfor demographic features, ensuring accessibility for people with disabilities in design\
    \ and development,"
- source_sentence: 'How should organizations address concerns raised during public consultations regarding AI data processing
    and interpretation?  '
  sentences:
  - "and testing and evaluation of AI technologies and systems. It is expected to be released in the winter of 2022-23. \n\
    21"
  - "provide guidance whenever automated systems can meaningfully impact the public’s rights, opportunities, \nor access to\
    \ critical needs. \n3"
  - "learning models or for other purposes, including how data sources were processed and interpreted, a \nsummary of what\
    \ data might be missing, incomplete, or erroneous, and data relevancy justifications; the \nresults of public consultation\
    \ such as concerns raised and any decisions made due to these concerns; risk"
- source_sentence: What role do ethical considerations play in the development and implementation of automated systems?
  sentences:
  - "tial to meaningfully impact rights, opportunities, or access. Additionally, this framework does not analyze or \ntake\
    \ a position on legislative and regulatory proposals in municipal, state, and federal government, or those in \nother\
    \ countries. \nWe have seen modest progress in recent years, with some state and local governments responding to these\
    \ prob­"
  - '•

    Searches for “Black girls,” “Asian girls,” or “Latina girls” return predominantly39 sexualized content, rather

    than role models, toys, or activities.40 Some search engines have been working to reduce the prevalence of

    these results, but the problem remains.41

    •

    Advertisement delivery systems that predict who is most likely to click on a job advertisement end up deliv-'
  - "particularly relevant to automated systems, without articulating a specific set of FIPPs or scoping \napplicability or\
    \ the interests served to a single particular domain, like privacy, civil rights and civil liberties, \nethics, or risk\
    \ management. The Technical Companion builds on this prior work to provide practical next"
