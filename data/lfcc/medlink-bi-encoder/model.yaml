  widget:
  - source_sentence: A ascite quilosa é uma manifestação rara com um amplo diagnóstico diferencial. No adulto está sobretudo
      associada a casos de trauma, iatrogenia, neoplasias, doença hepática crónica e infeções micobacterianas. Os autores
      descrevem um caso raro de ascite quilosa como forma de apresentação de pericardite constritiva.
    sentences:
    - Um derrame pleuro-pericárdico acompanhado de febre geralmente sugere uma etiologia infecciosa. Quando episódios recorrentes
      ocorrem, sem isolamento de agente microbiológico, deve-se suspeitar de síndrome febril periódico, sendo a Febre Mediterrânea
      Familiar a mais frequente deste grupo. Febre Mediterrânea Familiar é uma doença autossómica recessiva, causada por mutações
      no gene MEFV e caracterizada por ataques recorrentes de febre e serosite. Os primeiros sintomas geralmente manifestam-se
      antes dos 20 anos de idade, sendo a dor abdominal o sintoma mais frequente. Neste artigo, iremos apresentar um caso
      de polisserosite febril recidivante como uma apresentação incomum de Febre Mediterrânea Familiar.
    - A pericardite constritiva (PC) consiste num compromisso da função cardíaca diastólica causado por um pericárdio fibrótico,
      inflamado ou calcificado, geralmente espessado. Os autores apresentam um caso de doente com polisserosite, cuja extensa
      investigação diagnóstica inicial, incluindo o ecocardiograma com doppler (ED) e a tomografia axial computorizada (TAC),
      não permitiram esclarecer a etiologia dos derrames, tendo o doente mantido ascite refractária apesar do tratamento médico.
      O gradiente sero-ascítico de albumina ≥ 1,1g/dL, o valor de proteínas no líquido ascítico > 2,5g/dL, o ingurgitamento
      jugular, bem como os antecedentes de derrames pericárdicos, levantaram a suspeita de PC. O diagnóstico foi apoiado pelo
      ED e pela TAC subsequentes e confirmado por cateterismo cardíaco. Perante um doente com polisserosite, a investigação
      diagnóstica deve ser orientada pelo exame citoquímico dos líquidos serosos. A PC é uma causa rara de ascite recorrente
      e estabelecer o diagnóstico constitui um desafio, sendo necessário um elevado índice de suspeição.
    - A Síndrome de Felty (SF) é caracterizada pela tríade artrite reumatóide (AR), neutropenia e esplenomegalia. É uma manifestação
      extra-articular rara da AR, presente em menos de 3% dos doentes, sendo mais frequente em mulheres e entre a 5ª e a 7ª
      décadas de vida. Na maioria dos casos surge, pelo menos, 10 anos após o diagnóstico da AR e associa-se a outras manifestações
      extra-articulares como vasculite, serosite ou adenopatias. Descrevemos um caso de uma mulher de 69 anos que se apresenta
      na consulta com neutropenia grave e sem qualquer outra sintomatologia acompanhante. Da investigação etiológica apurou-se
      altos títulos de fator reumatóide e Anti-CCP, associados a esplenomegalia, tendo sido feito o diagnóstico de SF, como
      apresentação inaugural de AR. Descrevemos este caso para realçar a importância da exclusão de causa auto-imune perante
      um doente com neutropenia ainda que sem clínica de artrite ou sinovite.
  - source_sentence: Os autores apresentam o caso de uma doente, 38 anos, sem antecedentes, admitida para investigação de
      derrame pleural. Toracocentese revelou hemotórax com exames bacteriológico, micobacteriológico e anatomo-patológico
      negativos. TAC toraco-abdomino-pélvico sugestiva de carcinomatose peritoneal, sem identificação de neoplasia primária.
      Biópsia de lesão superficial a nível pélvico compatível com endometriose. Laparoscopia diagnóstica com biopsia de lesões
      peritoneais também compatíveis com endometriose. Perante anatomia patológica e reaparecimento do derrame com novo ciclo
      menstrual admitiu-se endometriose torácica, tendo iniciado terapêutica supressora hormonal com resolução da sintomatologia.
      Os autores apresentam o caso clínico pela raridade e desafio diagnóstico que representa. A endometriose pulmonar caracteriza-se
      por tecido endometrial no parenquima pulmonar ou pleura e manifesta-se por pneumotorax, hemotorax ou hemoptises cíclicas
      catameniais. Os exames complementares são inespecíficos e o diagnóstico de exclusão, tendo em conta a história clínica
      e a natureza catamenial dos sintomas. O tratamento consiste inicialmente na supressão hormonal podendo necessitar de
      cirurgia.
    sentences:
    - Mulher de 64 anos, com antecedentes de Síndrome de Sjögren primário, recorre ao serviço de urgência por epigastralgias,
      vómitos, icterícia, colúria, acolia, prurido, anorexia e perda ponderal com 2 semanas de evolução. Objetivamente com
      dor à palpação no hipocôndrio direito e icterícia. Ecografia abdominal com dilatação das vias biliares intra e extra-hepáticas
      e tomografia computorizada e ressonância magnética com globosidade da área cefálica do pâncreas, lesões nodulares renais
      bilaterais, heterogeneidade do útero, nódulo da supra-renal e micronódulos pulmonares. Foi realizada biopsia renal guiada
      por TC que revelou linfoma não Hogdkin difuso de células B com elevado índice proliferativo. Estudo complementado por
      ecoendoscopia e CPRE confirmou envolvimento duodenal e papilar, condicionando estenose do terço distal da via biliar
      principal. Apresentamos este caso pela forma de apresentação rara com icterícia obstrutiva em doente com linfoma multifocal,
      de envolvimento extranodal exclusivo. O diagnóstico precoce e estadiamento célere são fatores determinantes no prognóstico.
    - Os autores apresentam o caso de uma paciente com síndrome de Klippel-Trenaunay, um síndrome neurocutâneo raro, de etiologia
      não esclarecida, que se caracteriza pela tríade clínica de hemangiomas cutâneos, insuficiência venosa e hipertrofia
      dos tecidos moles. A dor é o sintoma mais frequente relacionada com a insuficiência venosa crónica do membro afectado
      , mas poderão surgir complicações decorrentes da hipertrofia óssea e do aparecimento de malformações vasculares noutros
      locais.
    - Numerosas terapêuticas foram propostas na síndrome de secreção inadequada de hormona antidiurética (SIADH) refractária
      à restrição hídrica e dieta hipersalina, existindo raros casos descritos de SIADH de origem neurológica em que foi conseguido
      um controlo a longo prazo com fenitoína. Um homem de 48 anos, raça caucasiana, com antecedentes de etilismo crónico
      e história recente de traumatismo craniano com fractura do rochedo temporal direito é encaminhado ao Serviço de Urgência(SU)
      por crise convulsiva não presenciada e quadro confusional. Ao exame objectivo, o doente apresentava-se prostrado, desorientado
      e com períodos de agitação, sem sinais de depleção de volume. O restante exame físico e neurológico não revelou alterações
      relevantes. À admissão destacavam-se, analiticamente, níveis séricos de sódio de 120 mEq/l e, imagiologicamente, a tomografia
      crânio-encefálica revelou-se sobreponível a estudos anteriores. Outros exames complementares realizados, no SU, não
      mostraram alterações. Durante o internamento a abordagem diagnóstica permitiu o diagnóstico de SIADH, como complicação
      de uma fractura da base do crânio. Apesar da instituição de restrição hídrica e dieta hipersalina, o doente manteve
      o quadro confusional e hiponatrémia refractários. Face à etiologia da SIADH iniciou-se terapêutica com fenitoína conseguindo-se
      uma melhoria mantida do quadro clínico e atingimento de níveis normonatrémicos.
  - source_sentence: A hiponatremia é a alteração eletrolítica mais frequente na prática clínica hospitalar. Sendo muitas
      vezes devido a perdas ou iatrogenia farmacológica. A insuficiência primária da supra-renal é uma causa rara deste distúrbio
      e está muitas vezes relacionada com destruição auto-imune da glândula. Esta cursa, na maioria das vezes, com sintomas
      inespecíficos e de desenvolvimento insidioso. Por vezes os doentes não apresentam a tríade clássica de hipotensão, hiponatrémia
      e hiperpigmentação o que torna difícil o seu diagnóstico precoce. O diagnóstico correto e atempado permite oferecer
      ao doente um tratamento simples e crucial para a sua sobrevivência
    sentences:
    - Homem de 67 anos, internado no Serviço de Medicina por Pneumonia. Antecedentes de miocardiopatia dilatada, fibrilhação
      auricular, hipertensão arterial, alcoolismo crónico (80g/dia) e caquexia. No decurso do internamento desenvolveu um
      quadro de diminuição da força muscular de forma progressiva com tetraparésia grave, atrofia muscular de predomínio esquerdo,
      espasticidade e hiperreflexia dos membros inferiores. Analiticamente apresentava elevação dos parâmetros de colestase
      hepática, ionograma seriado com hiponatrémia discreta 132-135mEq/L, potássio, cloro, cálcio, fósforo e magnésio normais.
      Sem défice de vitamina B12 ou ácido fólico. Tomografia Computorizada Crânio-Encefálica sem alterações de natureza vascular
      ou expansiva. Punção lombar com análise do líquido cefalorraquídeo sem alterações. Serologias virais e bacterianas negativas.
      Eletromiograma sem lesão nervosa periférica. Foi então pedida Ressonância Magnética Crânio-Encefálica e Cervical para
      exclusão de lesão desmielinizante cervical alta ou do tronco cerebral, tendo-se verificado hipersinal em T2 a nível
      da ponte característica da Mielinólise Central Pontina.
    - A Doença de Still é uma doença auto-inflamatória rara, sendo um dos diagnósticos diferenciais de febre de origem indeterminada.
      A apresentação típica inclui febre, rash evanescente e artrite acompanhada de valores desproporcionalmente elevados
      de ferritina. Apresentamos um caso de diagnóstico particularmente difícil numa mulher de 44 anos com envolvimento cutâneo,
      articular e pulmonar, na qual os valores de ferritina estavam apenas moderadamente elevados, mas a sua forma glicosilada
      significativamente reduzida. No decorrer da investigação foi identificada doença celíaca concomitante, com défice de
      ferro profundo, que apontou para uma possível alteração no mecanismo de produção de ferritina na presença de um estímulo
      inflamatório. Este caso sublinha a relevância da ferritina glicosilada como marcador mais fiável na investigação de
      casos onde a Doença de Still é suspeita.
    - Resumo Os linfomas que envolvem o colo do útero são muito raros. Relatamos o caso de uma mulher de 71 anos apresentando
      sintomas de diverticulite, com vários achados imagiológicos incidentais sugerindo uma doença linfoproliferativa e uma
      grande massa no colo do útero. A biópsia profunda do colo do útero diagnosticou um linfoma difuso de grandes células
      B envolvendo o colo do útero, provável transformação de um linfoma de zona marginal. A doente está atualmente em tratamento
      com rituximab, ciclofosfamida, doxorrubicina, vincristina e predisolona e metotrexato em altas doses para profilaxia
      de envolvimento do sistema nervoso central. Para diagnosticar com precisão um linfoma não-Hodgkin do colo do útero,
      a equipa médica deve estar atenta a esta hipótese diagnóstica clínica, a fim de proporcionar as melhores condições para
      a investigação, como biópsia profunda do colo do útero e estudos histológicos e imuno-histoquímicos da amostra.
  - source_sentence: A Arterite de Takayasu é uma doença inflamatória crónica dos grandes vasos, que envolve a artéria aorta
      e os seus ramos principais, e afecta predominantemente mulheres com idade inferior a 40 anos. A clínica é inespecífica
      e varia com o local anatómico envolvido, pelo que é necessário um elevado índice de suspeição clínica para que seja
      realizado o seu diagnóstico. O acidente vascular cerebral tem uma prevalência de cerca de 10 a 20% no decurso da doença
      e influencia de forma negativa o seu prognóstico. O acidente vascular cerebral hemorrágico como manifestação da Arterite
      de Takayasu é raro. Apresentamos o caso de uma doente jovem que se apresenta com uma hemorragia cerebral, cuja investigação
      etiológica culminou no diagnóstico de Arterite de Takayasu. A importância desde caso clínico prende-se com a escassez
      de casos publicados na literatura, uma vez que retrata uma patologia rara, com uma apresentação inicial invulgar.
    sentences:
    - Resumo Aproximadamente 5%-10% dos acidentes vasculares cerebrais (AVC) criptogénicos têm uma neoplasia subjacente. A
      parésia do nervo abducente em doentes com neoplasia encontra-se geralmente relacionada com compressão tumoral, hipertensão
      intracraniana ou metastização. Os autores reportam um caso de um doente com 65 anoscom AVC multiterritório que se apresentou
      com uma parésia do sexto nervo unilateral e isolada cuja etiologia foi extensamente estudada. Admitiu-se o diagnóstico
      final de síndrome paraneoplásico, que foi a apresentação inicial de um carcinoma gástrico oculto provavelmente relacionado
      com a hipercoagulabilidade associada à malignidade. Este caso enfatiza a importância de considerar um estudoadicional
      em casos selecionados de AVC criptogénico ou parésia do abducente.
    - As encefalites virais são entidades raras, mas que, pelas suas implicações diagnósticas, terapêuticas e prognósticas,
      não podem deixar de ser consideradas em qualquer doente que se apresente com sintomas psiquiátricos, alteração do estado
      de consciência, convulsões ou coma sem causa evidente. O presente caso diz respeito a um doente com sintomas psicóticos
      e um estado confusional com duas semanas de evolução. À admissão, apresentava-se subfebril, com flutuação do nível de
      consciência. O estudo analítico e TAC crânio-encefálica não mostraram alterações de relevo, tendo realizado punção lombar
      cujo exame citoquímico e exame bacteriológico se mostravam igualmente inalterados. Por suspeita mantida de encefalite
      viral e não sendo possível excluir causa herpética, foi iniciada terapêutica empírica com aciclovir. A PCR do vírus
      Epstein-Barr (EBV) no líquor foi positiva, permitindo assim o diagnóstico raro de uma encefalite a EBV num doente idoso
      e imunocompetente, tendo-se verificado resolução completa do quadro clínico.
    - A abordagem da febre é sem dúvida uma das artes da Medicina. A doença de Still no adulto (DSA) é uma patologia inflamatória
      sistémica de baixa incidência e etiologia desconhecida. Pela inespecificidade clínica e laboratorial, é um diagnóstico
      de exclusão. Os autores descrevem o caso de homem de 32 anos com a tríade de febre, oligoartralgia e exantema cutâneo
      evanescente, cuja marcha diagnóstica minuciosa culminou no diagnóstico de DSA, apresentando hiperferritinémia sérica
      dez vezes superior ao normal. Relembra-se a importância da DSA como causa de síndrome febril arrastado, cujo diagnóstico,
      atendendo à ausência de marcadores patognomónicos, pode passar despercebido.
  - source_sentence: A síndrome da Secreção Inapropriada da Hormona Antidiurética (SIADH) é uma das causas de hiponatremia
      euvolémica. A hidrocefalia de pressão normal (HPN) pode ser uma causa neurológica para SIADH e o seu diagnóstico e correção
      são fundamentais para a normalização dos níveis de sódio. Relatamos o caso de uma mulher de 67 anos, com hiponatremia
      crónica, marcha de base alargada, urgência miccional e sensação de perda de memória, sem evidência de sobrecarga hídrica
      ou desidratação. O estudo complementar revelou osmolaridade sérica normal, osmolaridade urinária elevada, sódio urinário
      elevado. Após restrição hídrica, houve melhoria da hiponatremia. Imagiologicamente documentou-se presença de membrana
      aqueductal causando obstrução ao fluxo do líquido cefalorraquidiano. O diagnóstico de SIADH em contexto de HPN foi presumido.
      Após correção cirúrgica houve resolução completa da hiponatremia. Hoje sabe-se que existem formas secundárias raras
      de HPN, sendo estas causadas por estenose ou obstrução aqueductal, como relatado no caso apresentado.
    sentences:
    - Define-se lesão hepática induzida por um fármaco como uma lesão hepática que, após exclusão de outras potenciais etiologias,
      se assume como secundária a um fármaco, produto de ervanária ou xenobiótico, e que resulta em alterações da enzimologia
      hepática ou disfunção hepática clinicamente evidente. Os autores descrevem o caso de um homem de 87 anos internado para
      estudo etiológico de uma lesão hepática de padrão colestático. Após estudo alargado, foi colocada como hipótese etiológica
      mais provável uma iatrogenia farmacológica, posteriormente corroborada por biópsia hepática, sendo a Espironolactona
      assumida como o agente causal mais provável, atendendo ao quadro clínico e aos achados histopatológicos. Estão descritos
      alguns casos de lesão hepática induzida pela Espironolactona, quando usada em doses de 50 e 100 mg/dia. Os autores relatam
      um caso raro que ocorreu num doente que se encontrava sob Espironolactona na dose de 25 mg/dia.
    - Resumo A ceftriaxona, um dos antibióticos mais frequentementeutilizados na prática clínica, tem como efeito adverso,
      raro epotencialmente grave, a agranulocitose. Reportamos um caso de uma mulher de 85 anos em esquema terapêutico prolongado
      com ceftriaxona para endocardite por Streptococcus bovis, que desenvolve agranulocitose ao 25º dia de antibioterapia,
      com nadir de contagem absoluta de neutrófilos de 0/uL. Outras causas potenciais foram excluídas. A terapêutica antibiótica
      foi alterada para amoxicilina/ácido clavulânico e realizou ciclo de fator estimulador de colónias de granulócitos, com
      resolução da neutropenia após 3 dias. Queremos destacar este efeito adverso raro com o uso prolongado da ceftriaxona,salientando
      a necessidade de monitorização regulardas contagens de leucócitos. O tratamento desta condiçãopassa pela suspensão do
      agente causal e o uso transitório de factor estimulador de colónias de granulócitos até resolução da neutropenia.
    - A síndrome de secreção inapropriada da hormona anti-diurética (SIADH) é uma causa frequente de hiponatrémia, sendo um
      diagnóstico de exclusão. Quando associada à infeção pelo vírus varicella zoster é mais frequente na sua forma disseminada.
      Os autores descrevem o caso de uma mulher de 83 anos, com quadro com 7 dias de evolução de síndrome confusional flutuante,
      desorientação temporo-espacial e tonturas. Medicada com brivudina, aciclovir tópico e ofloxacina gotas para tratamento
      de herpes zóster com atingimento dos ramos oftálmico e mandibular do nervo trigémeo. À admissão, com hiponatrémia de
      128mmol/L. Excluídas outras causas, assumiu-se o diagnóstico de SIADH associado a infeção por herpes. O caso descrito
      sugere uma relação causal entre a reactivação por VZV e a SIADH sintomática. A favor, temos a resolução completa da
      hiponatrémia a acompanhar a melhoria clínica. O presente caso torna-se importante por se tratar de uma entidade rara,
      pouco conhecida e subdiagnosticada, mas com efeitos clínicos importantes.
