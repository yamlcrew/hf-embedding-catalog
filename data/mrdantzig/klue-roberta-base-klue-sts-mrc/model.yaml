      어깨와 허리를 굽히고 걷는 등 잘못된 자세로 걷는 사람이 많다”며 “몸의 균형이 깨지면 거북목, 허리디스크 등 질병에 걸리게 된다”고 설명했다.사용자 고유의 걸음걸이 패턴을 분석해 스마트폰 비밀번호 잠금 해제가
