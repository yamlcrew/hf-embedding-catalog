    - ‘직토 워크’는 시선의 위치, 어깨균형, 구부린 팔의 각도, 걸음속도 등 네 가지 보행습관을 측정해 걸음걸이를 교정하는 웨어러블(착용형) 밴드다. 지난해 5월 LG전자, 신한금융투자, SK텔레콤 등 서로 다른
