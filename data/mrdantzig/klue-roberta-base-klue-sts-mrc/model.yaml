    포포인츠 바이 쉐라톤 서울역, 포포인츠 바이 쉐라톤 서울 구로, 목시 서울 인사동, 페어필드 바이 메리어트 부산 송도 비치 까지 총 22개다. 그 외 호텔별 상세 혜택 확인 및 예약은 홈페이지를 통해 가능하다.
