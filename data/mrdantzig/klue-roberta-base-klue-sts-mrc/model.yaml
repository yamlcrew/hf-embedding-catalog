- source_sentence: 참호 속에 무기와 장비를 버리고 도주한 집단은?
  sentences:
  - 이집트로 이어지는 해안 도로는 1개의 사단만이 방어할 수 있었으며 엘 아뎀 요새와 남아있는 영국 기갑군 잔병들에 의해서만 출입이 가능했다. 이러한 임무는 남아프리카 연방군에게도 할당되었다. 제50사단은 동쪽에서
    싸우는 대안으로 좌측을 선택하여 독일 기갑 사단의 편제를 통과하거나 이탈리아 기갑사단 주위로 긴 방어선을 형성하는 것을 목표로 했다. 그들 모두를 파괴하는 것은 거의 불가능했는데, 그 이유는 사단은 혼성 부대로
    이루어져 있었기 때문이다. 제5이스트요크셔와 제9더럼경보병부대가 형성한 교두보를 담당하여 이탈리아 전선으로 진입하는 것이 그들의 임무였다. 혼란과 혼돈 속에서 혼성 부대는 독일군이 장악한 동쪽보다 남쪽으로 이동하여
    이집트 국경인 마델레나 요새로 이동했다. text=교두보에 있었던 적은 독일군 포병이 지원하는 이탈리아 군이었다. 그들은 기습으로 매우 놀란 것 같았다. 그들이 전 사단이 그들의 전선을 곧바로 통과하는 것을 깨달았는데
    밤이 되기 전이었다. 몇몇 차량은 지뢰로 파괴되고, 다른 차량들은 불에 탔지만, 우리의 모든 사단은 적은 사상자를 냈고, 공격대대도 그들의 임무를 성공적으로 마쳤다. 보병은 마차에 탔고, 이탈리아군은 참호에 그들의
    무기와 장비를 남겨둔 채 도망갔다. 더럼경보병여단의 제9대대와 제6대대의 소규모 부대는 제69여단 요새 뒤에서 주둔한 이후 해안도로를 따라 후퇴하면서 이탈리아 군인들이 돌파를 알리는 것을 보았다. 독일군 포병 및
    보병과 남아프리카 공화국 보호부대의 실수로 공격을 받기는 했으나 혼성 부대는 독일군을 돌파하며 포로까지 잡았다. 6월 17일에서 18일까지 이들은 비르 엘 타라타에서 재집결했다.
  - 최근 소셜네트워크서비스(SNS) 상에서 최대 화제는 해태제과의 ‘대박과자’ 허니버터칩이다. ‘두 시간째 편의점을 돌아다녔는데 허니버터칩 있는 곳이 없었다’, ‘사재기하는 사람들 때문에 편의점 직원들이 허니버터칩을
    숨겨놓고 판다’ 등 허니버터칩에 대한 글이 폭발적으로 올라오고 있다. 가수 강민경과 배우 소유진 등이 SNS에서 이 제품을 언급한 것도 인기몰이에 보탬이 됐다.SNS 트렌드를 분석하는 AK몰 SNS마케팅팀에 따르면
    이달 들어 19일까지 SNS에서 허니버터칩이 언급된 횟수는 총 2만2942건으로 집계됐다. 스낵류에 대한 언급량으로는 올 들어 최대다. 같은 기간 매출도 급증했다. 허니버터칩은 지난 8월 출시 이후 100일 만에
    100억원어치가 판매됐고, 특히 최근 열흘간 53억원어치가 팔려나갔다. 상당수 편의점에서 품절 사태를 빚기도 했다.SNS, 기업엔 ‘양날의 검’허니버터칩의 대박을 계기로 SNS의 파괴력이 재조명되고 있다. 긍정적인
    내용이 재생산되면 매출이 급증하지만, 부정적인 이슈가 퍼질 때는 회사가 휘청거리기도 한다. 이처럼 SNS가 ‘양날의 검’으로 작용하자 이를 어떻게 활용할지에 대한 업체들의 고민도 깊어지고 있다.롯데제과도 SNS를
    통해 히트 상품을 냈다. 지난해 12월 출시한 캐러멜 말랑카우는 첫달 3억원의 매출을 올리는 데 그쳤지만, 올 들어 SNS 이용자들이 제품을 구워먹는 레시피를 소개하면서 월매출 30억원대로 10배나 뛰었다.석촌호수에
    전시했던 러버덕은 초기 바람이 빠지는 사고가 SNS를 타고 소개되면서 관련 상품 매출이 크게 늘었다. 11번가에 따르면 지난달 14일부터 이달 18일까지 러버덕 관련 상품의 매출은 전년 동기 대비 420% 증가했다.마케팅
    주도권, 제조업체서 소비자로기업 마케팅 관계자들은 최근의 SNS 성공사례를 보면서 마케팅의 주도권이 제조 업체가 아닌 소비자로 넘어갔다고 분석하고 있다. 롯데제과 마케팅팀 관계자는 “제품 기획 당시엔 상상도 못했던
    구워먹는 레시피가 인기를 끌자 현업에서는 오히려 당황했다”며 “마케팅에만 기대지 말고 초심으로 돌아가 제품의 품질에 집중하는 것이 중요하다는 메시지를 얻고 있다”고 말했다.SNS의 파급력은 해외 판매에서도 영향을
    미치고 있다. 화장품업체 잇츠스킨의 달팽이 크림 ‘프레스티지 끄렘 데스까르고’는 중국의 대표 SNS인 웨이보에 가격 대비 성능이 우수한 것으로 소개되면서 판매가 급증했다. 지난해 1년간 70만개가 판매됐던 이 제품은
    지난달까지 440만개가 팔렸다.반면 SNS를 통한 부정적 여론 확산을 막지 못해 피해를 본 곳도 있다. 올여름 악취논란에 시달렸던 오비맥주가 대표적이다. SNS상에서 ‘카스맥주에서 소독약 냄새가 난다’는 소문이
    퍼진 것이 발단이 됐다. ‘가임기 여성은 마시면 위험하다’는 괴담까지 나돌았다.이후 오비맥주가 관련 내용에 대해 해명하고 식품의약품안전처가 ‘문제가 없다’는 조사 결과를 밝혔지만, 상황은 쉽게 나아지지 않았다.
    한 대형마트에서 한때 30%포인트 이상 벌어졌던 2위 하이트진로와의 격차는 논란 이후 한 자릿수대까지 좁혀지기도 했다. 20일 장인수 사장이 경영 일선에서 물러난 것도 SNS상에 촉발된 소독약 냄새 논란에 제대로
    대응하지 못한 데 대한 문책성 인사로 업계는 보고 있다.롯데백화점 중국인 블로거 초청
  - '《다키스트 던전》(Darkest Dungeon)은 레드훅 스튜디오에서 제작한 인디 로그류 게임이다. 플레이어의 부자 친척이 영지의 오래된 비밀을 발굴하다 그 끔찍한 진실에 의해 미쳐 사망하고, 재산을 상속받은
    플레이어는 영지의 비밀을 풀고 가문을 다시 일으키기 위하여 영지 주변의 던전들을 탐험하게 된다.


    게임은 기본적으로 횡스크롤 턴제 로그류 게임이며, 고딕소설적 전통을 따르고 있다. 플레이어는 짐마차를 통해 오는 영웅 캐릭터들을 고용해서 던전들을 탐험하며, 플레이어는 캐릭터로써 직접 탐험하는 것 대신 영웅들에게
    명령을 내릴 수 있다. 영웅 캐릭터의 종류에는 총 15개가 있으며, 각 영웅의 종류마다 능력치와 특징, 사용할 수 있는 기술 등이 다르다.


    던전에 진입하기 위한 영웅들의 파티는 총 4명으로 구성되며 각 캐릭터들이 자리한 위치마다 사용할 수 있는 기술이 제한되어 있으므로 각 캐릭터의 특성을 잘 파악하고 정확한 열에 세우는 것이 중요하다.


    이 게임이 다른 롤플레잉과 구분되는 가장 큰 특징은 "스트레스" 요소의 도입이다. 불이 어두워지거나 적에게 치명타를 맞는 등 여러가지 부정적인 상황을 마주하면 영웅들은 스트레스를 받게 되며, 그 수치가 100에
    달하면 캐릭터는 고통(Affliction) 상태에 들게 된다. 이 때 낮은 확률로 고통을 이겨내면 긍정적 능력을 얻을 수도 있지만, 대부분 좌절하고 피해망상, 절망, 공포, 피학증 등 부정적 능력이 발현된다.'
- source_sentence: 나머지 요금을 제외하고 자비로 지급해야 하는 요금은 무엇인가?
  sentences:
  - '경주 방식은 시즌마다 조금씩 다를 수 있지만 일반적으로 다음과 같다.


    전체 경주는 대략 12구간으로 구성되어 있다. 보통 이동 경로는 미국에서 출발하여 세계를 일주한 후에 다시 미국으로 돌아오는 순이다. 구간에는 탈락 구간과 비탈락구간이 있다. 탈락 구간은 구간 결승선(휴게소)에
    마지막으로 도착하는 팀을 탈락시키는 구간이며, 비탈락 구간은 탈락 대신에 다음 구간에서 추가로 벌칙(과속 방지)을 수행해야 하는 구간이다. 해당 구간이 탈락구간인지 아닌지는 방송 제작 전에 결정되며 각 팀에게 주어지는
    과제에는 "탈락할 수도 있다"라고만 알려주어 각 팀은 결승선에 도착하여 진행자가 알려줄 때까지 탈락구간 여부를 알 수 없다. 각 팀은 경주하는 동안 다음 목적지로 가기 위해 프로그램에서 제시하는 과제를 수행해야
    하는데 주어진 실마리를 이용해 외국에서 스스로 탐색하고 현지인과 소통하며 프로그램에서 주는 한정된 자금으로 비행기, 기차, 배, 택시, 버스 등 대중 교통 수단 이용을 위해 경쟁한다. 단, 비행기 요금만은 제작진에서
    지급하고 나머지 요금은 각 구간 출반 전에 주는 자금으로 지급해야 한다. 이렇게 하여 맨 마지막 구간에서는 최종 3팀이 남아서 최종 구간 결승선에 맨 먼저 도착하기 위해 경쟁한다.'
  - '9월 13일 아테네 군은 부상병을 남겨두고, 시신도 매장하지 않은 채 야영지를 떠났다. 생존자는 비전투원을 포함하여 40,000명이며, 환자 일부도 갈 수 있는 곳까지 기어서라도 쫓아갔다. 탈출 과정에서, 아나포스
    강을 지키고 있던 소규모 시라쿠사 군에게 승리했지만, 시라쿠사 군 기병과 경보병이 괴롭힘 공격을 계속했다.


    에리네우스 강 근처에서 데모스테네스와 니키아스는 헤어졌지만, 데모스테네스는 시라쿠사 군의 공격에 사병 6,000명과 함께 항복했다. 나머지 병력은 니키아스와 함께 아시나루스 강으로 향했지만, 강이 가까워지면 군인은
    식수를 구하면서 혼란이 생겼다. 어떤 이는 짓밟혀 압사하고, 병사들끼리의 싸움도 있었다. 강 건너편에서 시라쿠사 병이 기다리고 있었고, 아테네 병력은 대부분 학살되어 버렸다. 사망자 수를 기준으로 한다면 이 원정에서
    최대의 패배였다. 니키아스는 기원전 421년의 평화조약에서 그가 한 역할을 스파르타가 기억할 것을 기대하고, 개인적으로 길리포스에게 항복했다. 몇몇 병사만 카타나에 도착할 수 있었다.


    포로 수는 7,000명에 달했고, 시라쿠사이에 가까운 채석장으로 보내졌다. 이러한 많은 포로를 수용할만한 장소가 달리 없었기 때문이다. 길리포스의 명령과는 반대로, 데모스테네스와 니키아스는 처형되었다. 나머지도
    열악한 환경에 10주 동안 노출되어 있었고, 아테네 사람 이외에는 노예로 팔렸다. 아테네 사람들은 채석장에 방치해 두었고, 질병과 기아로 서서히 죽어 갔다. 소수의 생존자만 살아서 아테네에 도착하여 이 비극적인
    보고를 전해주었다.'
  - "이오에 대한 탐사\n 이오의 발견을 최초로 공표한 사람은 갈릴레오 갈릴레이로, 1610년 1월 7일 파도바 대학교에서 20배율 굴절 망원경을 사용하여 관측했다. 그러나 이 관측에서 갈릴레이는 망원경의 성능이 낮았던\
    \ 탓에 이오와 유로파를 하나의 천체로 인지했고, 둘을 하나의 광점으로 기록했다. 바로 다음날 1610년 1월 8일 갈릴레이는 목성계를 다시 관측하여 이오가 유로파와 분리된 천체임을 알아냈다.(국제 천문 연맹은\
    \ 이 날을 이오가 발견된 날로 인정한다.) 갈릴레이는 1610년 3월 이오와 나머지 목성의 위성들의 발견 사실을 Sidereus Nuncius 제목으로 출판했다. 시몬 마리우스는 1614년 그가 출판한 저작 Mundus\
    \ Jovialis에서 본인이 이오를 포함한 목성의 위성들을 갈릴레이의 발견일보다 일 주일 먼저 1609년에 발견했다고 주장했다. 갈릴레이는 이 주장을 의심했고 마리우스가 자신의 발견을 표절한 것으로 취급하여 무시했다.\
    \ 사실 마리우스의 최초 발견일인 1609년 12월 29일은 율리우스력으로 이는 갈릴레이가 사용한 그레고리력으로는 1610년 1월 8일에 해당된다. 둘의 발견일은 같지만 마리우스보다 먼저 발견을 공표한 갈릴레이가\
    \ 이오의 발견자로 인정받는다. \n\n이후 250년동안 이오는 천문학자들의 망원경 속에서 잘 알려지지 않은, 5등급 밝기의 광점으로 남아 있었다. 17세기에 이오를 포함한 갈릴레이 위성들은 경도를 정하거나, 케플러의\
    \ 행성 운동 법칙을 검증하는 데 이용되거나, 목성과 지구 사이 빛이 도달하는 데 걸리는 시간을 재는 등 여러 연구 목적으로 활용되었다 카시니 외 여러 천문학자들이 만든 천체력에 기반하여 피에르시몽 라플라스는 이오,\
    \ 유로파, 가니메데의 궤도 공명을 설명하는 수학 이론을 만들었다 이 공명은 훗날 세 위성의 지질학 연구에 지대한 영향을 끼치게 된다.\n\n19세기 말에서 20세기에 이르러 천문학자들은 향상된 망원경 기술력 덕분에\
    \ 이오 표면의 거대한 특징들을 분해하여(이는 분명한 물체로 식별한다는 뜻임) 관측할 수 있게 되었다. 1890년대에 에드워드 바나드는 최초로 이오의 적도와 극 지역 둘의 밝기에 차이가 있음을 발견했다. 바나드는\
    \ 이 밝기 차이의 원인이 본인이 애초 제기했던 이오가 두 개의 별개 천체라든가 또는 당시 동료 천문학자였던 에드워드 피커링의 주장대로 이오가 계란모양으로 생겼기 때문이 아니라, 두 지역이 서로 색채 및 알베도가\
    \ 다르기 때문이라고 정확히 지적했다. 이후 망원경 관측으로 뚜렷하게 적갈색 빛을 내는 이오 극지대와 적도의 황백색 띠 구조를 확인했다. \n\n20세기 중반 망원경 관측으로 평범하지 않은 이오 외관의 실마리가\
    \ 풀리기 시작했다. 분광기를 이용한 관측 결과 이오 표면에 물은 없으며(물은 다른 갈릴레이 위성에는 풍부하게 존재한다.) 대신 나트륨의 소금과 황으로 이루어진 증발 물질들이 표면을 뒤덮고 있는 것으로 추측했다.\
    \ 라디오 망원경 관측으로 데카미터 파장 폭발이 이오의 공전 주기와 연관이 있음을 확인, 이오가 목성 자기장에 미치는 영향을 밝혀냈다."
- source_sentence: 베스킨라빈스 레디팩이 기존 가입자에게 무료가 되는 날은 언제인가?
  sentences:
  - “박카스는 올해 ‘29초영화제’ 후원사로 참여하게 됐습니다. 박카스 50주년을 맞아 진행한 지난해 영화제의 반응이 정말 뜨거웠거든요. 작년 수상작은 실제 광고 소재로 사용됐습니다.”최호진 동아제약 홍보이사(사진)는
    13일 박카스가 지난해에 이어 올해에도 영화제 후원사로 참여하게 된 이유에 대해 “대중들이 직접 영화를 만들면서 관심사를 공유할 수 있다는 점을 긍정적으로 평가했다”고 설명했다.그는 “이번 영화제의 주제는 지난해와
    마찬가지로 ‘대한민국에서 OOO로 산다는 것’이었는데 내년에는 다양하게 바꿔볼 예정”이라고 덧붙였다. 최 이사는 지난해 행사를 통해 영화에 대한 대중들의 높은 관심을 실감했다고 했다. “29초영화제 사상 지난해에
    가장 많은 1500여편의 출품작을 받았다고 들었어요. 지인들을 통해서도 ‘29초영화제’ 사이트에 가면 광고에 활용할 만한 재미있는 소재가 많다는 이야기를 들었습니다.”이번 출품작 심사에 참여한 그는 작품의 질보다는
    톡톡 튀는 아이디어가 있는지를 더 눈여겨봤다. 최 이사는 “29초란 짧은 시간 안에 위트, 유머, 반전 등이 잘 녹아 있는지 살폈고, 박카스 광고처럼 대중의 피로를 풀어줄 수 있는 출품작에 좋은 점수를 줬다”고
    설명했다.그는 또 “이제는 영화를 전공하지 않은 일반인도 스마트폰을 통해 영상을 찍을 수 있기 때문에 꼭 전문가가 아니더라도 아마추어 영화를 찍을 수 있는 시대가 됐다”며 “이번 기회를 통해 영화를 좋아하는 분들이
    취미나 소질을 살려 실력을 발휘했으면 좋겠다”고 했다. 이어 “감독을 꿈꾸지 않더라도 자신만의 창작품을 만드는 과정을 통해 즐거움을 발견할 수 있을 것”이라고 말했다.그는 ‘29초영화’를 시에 비유했다. “29초영화는
    단편영화와 비교하면 시 소설과 같습니다. 광고처럼 짧은 시간 안에 압축적인 느낌을 전달해야 합니다. 영화적 요소와 인생에 대한 메시지도 담을 수 있습니다.”
  - SRT 운영사 SR(대표이사 권태명)은 SRT를 타고 갈 수 있는 다양한 여행지를 SNS에 소개하고, SRT 승차권 할인쿠폰을 증정하는 ‘SRTPlay 언택트 힐링 여행지 추천 이벤트’를 12월 말까지 진행한다.
    코로나19 영향으로 많은 사람이 방문하는 여행지보다는 한적한 숨은 여행지가 인기인 가운데, 여행지 추천을 위해 선발된 ‘SRTPlay 파트너’ 5명이 SRT를 타고 직접 방문한 여행 일정, 맛집 등 생생한 체험기를
    ‘SRTPlay 공식 인스타그램’에 소개하고 있다. SRTPlay 파트너가 소개하는 컨텐츠에 기재된 할인코드를 SRTPlay 카카오톡 채널에 입력하면 할인 쿠폰을 받을 수 있다. 쿠폰은 매월 선착순 2천명에게 지급되며,
    상세한 정보는 ‘SRTPlay 공식 인스타그램’에서 확인할 수 있다. 최덕율 SR 영업본부장은 “신개념 예매 서비스 플랫폼인 SRTPlay를 통한 생생한 정보 제공으로, 보다 안전하고 편리한 기차여행이 되길 바란다.”라며,
    “SR은 고객에게 차별화된 경험을 제공하기 위해 지속적으로 노력하겠다.”라고 밝혔다. SRTPlay는 SRT 승차권뿐만 아니라 모바일쿠폰, 국내여행보험, 식음료, 여행상품 등을 복합적으로 구매할 수 있는 새로운
    형태의 서비스 제공 예매 플랫폼이다. SR이 중소기업 상생을 위한 협력이익 공유제 사업으로 벤처기업 이네이블(대표이사 남욱)과 공동으로 운영하고 있다.
  - KT(대표이사 구현모)는 1만 가입자 돌파를 기념해 1일부터 신규 가입자를 대상으로 배스킨라빈스 레디팩을 무료로 제공하는 이벤트를 진행한다. KT가 업계 1위 스냅스와 제휴해 선보인 포토북은 월정액 5천원의 이용료로
    매월 한 권의 포토북을 직접 제작해 받아보는 구독형 서비스다. 포토북은 올레tv를 통해서도 함께 볼 수 있어 소중한 사람과 추억을 나누는 대표 서비스로 자리잡고 있다. KT 포토북 고객들이 가장 많이 제작한 테마는
    가족사진으로 전체의 60%를 차지한다. 특히, 자녀의 성장과정을 간직하려는 3040 여성 고객을 중심으로 높은 호응을 얻고 있다. 손주들이 성장하는 모습을 함께 보고 싶은 할아버지, 할머니를 위해 디지털 포토북을
    공유하는 경우도 지속 증가해 올레tv를 보유한 포토북 고객의 약 30%가 해당 서비스를 이용하고 있는 것으로도 나타났다. 연인, 반려동물, 여행, 취미 등 다양한 테마의 포토북을 찾는 고객들도 지속 증가하고 있다.
    KT는 가입자 1만명 돌파를 기념해 1일부터 14일까지 2주간 신규가입 이벤트를 진행한다. 포토북을 새로 가입하는 고객 전원에게 배스킨라빈스 레디팩(9,200원 상당) 쿠폰을 증정하는 이벤트다. KT 멤버십앱이나
    KT닷컴 홈페이지를 통해 포토북 가입 및 이벤트 참여를 하면, 12월까지 가입 유지한 고객에게 쿠폰이 일괄 지급된다. KT는 포토북 고객들의 다양한 요구에 맞춰 상품을 다각화하는 등 가입자 확대에 나선다는 계획이다.
    이를 위해 지난달부터는 VIP 초이스 혜택으로 2만원 상당의 프리미엄 포토북을 제작할 수 있는 상품을 선보인 바 있다. 이달부터는 월 한 권 이상의 포토북 제작을 원하는 고객들이 추가로 앨범을 제작할 수 있도록
    선불권(3회권, 6회권, 12회권) 상품도 출시할 예정이다. KT 무선서비스담당 성은미 상무는 “포토북이 포스트 코로나 시대에 가족, 연인 등 소중한 사람들과 마음을 전하는 매개로 자리잡고 있다”며 “고객의 목소리에
    지속적으로 귀를 기울여 포토북을 고객이 쉽고 편하게 사용할 수 있는 서비스가 될 수 있도록 발전시키겠다”고 밝혔다.
- source_sentence: 올해 예산의 크기는 얼마인가?
  sentences:
  - 386조4000억원 규모의 내년도 예산안이 국회를 통과했다. 여야는 예산안 법정처리 시한인 2일 자정을 넘겨 정부안에서 3조8000억원을 감액하는 대신 3조5000억원을 증액한 수정안을 본회의에서 처리했다. ▶관련기사
    A4, 5, 6면내년 예산 규모는 올해(375조4000억원)보다 11조원(2.93%)가량 늘어났다. 주요 삭감 예산은 일반·지방행정 분야와 국방 분야 각각 1조3584억원과 1543억원, 예비비 1500억원 등이다.
    증액 예산은 사회복지 4732억원, 교통·물류 3868억원, 산업·중소기업·에너지 1644억원 등이다.누리과정(만 3~5세 무상교육) 예산은 예비비에서 3000억원을 우회 지원하도록 했다. 순삭감액은 지난해 6000억원에
    못 미치는 규모로 내년 총선을 앞두고 의원들의 증액 요구가 빗발쳤기 때문이라고 국회 관계자는 말했다. 이 관계자는 “지역 민원예산이 증액분의 상당 부분을 차지하며, 사상 최대 규모일 것”이라고 말했다.여야는 이날
    본회의에서 예산안과 함께 예산부수법안 15건도 처리했다. 또 여야가 예산안과 연계해 함께 처리하기로 합의했던 관광진흥법 등 5개 법안도 진통 끝에 국회 문턱을 넘었다.
  - "옌바이는 면적이 6899.5km²이고, 홍강은 지방을 통과한다. 옌바이는 험준한 산악 풍경과 계곡의 푸른 논밭으로 특징지어지는 산악 지방이다. 호앙리엔선 산맥은 지방을 관통한다. 홍강(혹은 타오 강)과 짜이강이\
    \ 그 지방을 흐른다. 이 강들은 중국 윈난에서 발원한다. 옌바이성의 이 두 강줄기에 의해 만들어진 계곡은 울퉁불퉁한 영토지만 비옥하다. 무옹로 평원은 옌바이성의 곡창지대이다. \n\n지형은 동쪽에서 서쪽으로,\
    \ 남쪽에서 북으로 솟아 있어 가파르다. 평균 고도는 해발 약 600m이다. 홍강 유역의 좌안과 홍강의 높은 우안에 있는 저지대와 홍강과 다강 사이의 고원에는 산이 많다. 두 개의 주요 강인 홍강과 다강 외에,\
    \ 이 지방에는 약 200개의 운하, 작은 개울, 큰 호수, 늪이 있다. 탁바 호수는 234km²의 면적과 1,331개의 섬과 언덕을 가진 인공호수도 옌바이성에 위치해 있다. 30억~39억 입방미터의 용수를 보유하고\
    \ 있으며, 당초의 의도는 베트남 최초의 대규모 수력 발전 사업 중 하나인 탁바 수력발전소를 가동하는 것이었다. 수천 개의 언덕과 섬에는 훔, 꺼우꾸오이, 박싸를 포함한 많은 동굴이 있다. 탁바 사원은 호수 지역에\
    \ 위치해 있다. 탁바호는 그 지방의 서부 지역의 기후 패턴을 덥고 건조한 상태에서 적당한 상태로 바꾸었다."
  - 개성공단이 3개월째 잠정폐쇄 상태에 접어든 가운데 입주기업들이 신고한 피해금액이 1조566억원인 것으로 확인됐다. 이 가운데 증빙자료를 통해 객관적으로 확인된 피해 금액은 7067억원인 것으로 조사됐다. 통일부는
    25일 이 같은 내용의 개성공단 입주기업 실태조사 결과를 발표했다. 정부가 지난달 1일부터 이달 7일까지 실시한 실태조사에는 총 신고대상 296개 업체 가운데 234곳이 참여했다. 한국전력, 수자원공사, 우리은행,
    현대아산 등 유관기관 10곳은 조사대상에서 제외됐다.피해신고액 가운데 개성공단 내 토지, 건물, 건물 내 설비 등 현지투자액이 5437억원으로 가장 많았다. 이 가운데 4175억원이 증빙자료를 통해 확인됐다. 개성공단
    폐쇄로 반출되지 못하고 있는 입주기업의 원부자재·완제품의 피해규모는 총 1937억원으로 신고됐다. 이 가운데 증빙자료를 통해 확인된 금액은 984억원이라고 정부는 밝혔다. 이번 조사를 맡은 안진회계법인 담당자는
    “기업들이 완제품의 판매가 기준으로 보고한 경우도 있고 재고자산에 대한 증빙자료를 내지 않아 구체적으로 확인되지 않은 금액이 있어 차액이 발생한 것”이라고 말했다. 피해구제를 위해 기업들은 금융분야 지원대책을 가장
    많이 희망하는 것으로 조사됐다. 구체적으로는 남북경협보험 확대 적용과 남북협력기금을 포함한 특별금융지원 확대 등을 희망하는 업체가 많았다. 통일부 당국자는 “대출 형식보다는 무상지원이 필요하다는 입주기업들의 요구가
    있지만 제도적 틀 내에서 정부가 무상지원할 근거가 없다”며 “이번 실태조사를 통해 제도적 틀 내에서 금융지원을 하기 위해 피해규모를 파악했다는 데 의의가 있다”고 설명했다. 정부는 이번 실태조사 결과를 바탕으로
    관계부처와 협의를 통해 추가적인 지원방안을 마련한다는 방침이다.
