- source_sentence: 직토워크가 잘못된 자세의 걸음을 측정하는 기준은?
  sentences:
  - 이번 주말부터 전국에 30도를 웃도는 초여름 날씨가 다시 찾아올 전망이다.기상청은 전국이 고기압의 가장자리에 들어 대기가 안정되면서 이번 주말부터 맑고 무더운 날씨가 1주일가량 이어지겠다고 13일 예보했다. 최근
    나흘새 서울 등 수도권엔 대기 불안정으로 인해 소나기 및 우박이 곳곳에 떨어졌다. 지난 10일 경기 고양시에선 기상 관측 이래 육지에선 처음으로 토네이도(용오름)가 발생해 수십여채의 비닐하우스가 파손되기도 했다.허진호
    기상청 통보관은 “대기 상층의 찬 공기와 지면가열에 따른 하층의 따뜻한 공기가 만나 강한 대기불안정이 형성되면서 곳곳에 소나기가 내렸다”며 “이번 주말부터는 상층의 공기 흐름이 원활해 대기불안정이 발생할 가능성은
    낮다”고 내다봤다.토요일인 14일 서울의 낮 최고기온은 29도에 달하는 등 전국 대부분 지역이 30도를 웃돌 전망이다. 일요일인 15일에도 맑은 날씨를 보이면서 서울의 기온은 29도를 기록하겠다. 무덥고 맑은 날씨는
    다음주 주말까지 이어질 전망이다.무더위를 식혀줄 장마는 평년과 비슷한 이달 말부터 남부지방을 시작으로 찾아올 전망이다. 민간 최대 기상업체인 케이웨더는 오는 23일 남부지방을 시작으로 25일께 중부지방에 장마가
    찾아올 것으로 내다봤다. 이번 여름철엔 기록적인 폭우가 찾아올 가능성도 점쳐진다. 반기성 케이웨더 예보센터장은 “엘니뇨 현상으로 북태평양 고기압이 발달하지 못하는 대신 찬 오호츠크해 고기압이 예년에 비해 세력이
    강할 전망”이라며 “찬 공기과 더운 공기가 만나 대기불안정이 발생, 한반도에 폭우가 자주 내릴 것”이라고 내다봤다.
  - ‘직토 워크’는 시선의 위치, 어깨균형, 구부린 팔의 각도, 걸음속도 등 네 가지 보행습관을 측정해 걸음걸이를 교정하는 웨어러블(착용형) 밴드다. 지난해 5월 LG전자, 신한금융투자, SK텔레콤 등 서로 다른 대기업을
    다니던 세 명의 공동 창업자가 뭉쳐 설립한 직토는 11월 미국 최대 크라우딩 펀드 사이트 ‘킥스타터’에서 16만달러(약 1억8000만원)의 투자를 유치하며 주목받기 시작했다.○잘못된 걸음걸이 ‘경고’미국 퍼듀대
    선후배인 김경태 대표와 서한석 최고재무책임자(CFO)가 창업을 준비하던 중 KAIST 출신 김성현 최고기술책임자(CTO)가 합류하면서 본격적으로 직토가 결성됐다. 직토는 ‘곧을 직(直)’과 ‘말할 토(吐)’를 합친
    말로, ‘기술을 통해 사람에게 직언하겠다’는 의미라고 한다.직토가 개발한 직토 워크는 고개를 숙이고 어깨를 축 늘어뜨리고 천천히 터벅터벅 걷는 등 잘못된 자세로 2분 이상 걸을 경우 사용자에게 진동과 아이콘으로
    알려주는 웨어러블 밴드다. 걷다 보면 자연스럽게 팔도 함께 움직이게 되는데 팔의 움직임을 분석해 발걸음의 모양, 걸음 주기·방향 등을 측정할 수 있다는 것이다. 예를 들어 팔이 몸의 바깥쪽으로 움직인다면 팔자걸음을
    걷고 있을 확률이 높고, 팔이 안쪽으로 굽는다면 구부정한 자세로 걷고 있다고 분석하는 식이다. 어깨·허리·골반의 뒤틀림 등 체형 비대칭도 분석한다. 김 대표는 “무의식적으로 휴대폰을 보면서 걷거나 구부정하게 어깨와
    허리를 굽히고 걷는 등 잘못된 자세로 걷는 사람이 많다”며 “몸의 균형이 깨지면 거북목, 허리디스크 등 질병에 걸리게 된다”고 설명했다.사용자 고유의 걸음걸이 패턴을 분석해 스마트폰 비밀번호 잠금 해제가 가능한
    생체인증, 전화·메시지 알람 기능 등도 있다. 김 대표는 “팔찌 등 다른 액세서리와 함께 착용해도 잘 어울리도록 디자인에도 신경썼다”고 말했다.○건강관리 웨어러블 기기직토는 최근 인터넷 생명보험회사인 교보라이프플래닛과
    전략적 제휴도 맺었다. 공동 프로모션과 홍보물 제작, 소셜네트워크서비스(SNS) 채널 연계 등 다양한 활동을 추진할 계획이다. 국내에선 웨어러블 기기를 만드는 스타트업(신생 벤처기업)과 보험사의 첫 협업사례다.
    미국 웨어러블 밴드 제조업체인 핏빗이 바이탤리티그룹, 존 핸콕 등 보험사와 연계해 보험상품을 출시한 바 있다. 운동량을 측정하는 웨어러블 밴드를 지원하고 보험가입자가 운동량을 늘릴 경우 보험료 인하 등의 혜택을
    주는 상품 등을 개발한 것이다.김 대표는 “손목, 팔의 움직임을 통해 다양한 행동 양식을 분석할 수 있다”며 “걸음걸이뿐 아니라 운동, 운전, 식사 등 사용자의 행위를 분석해 건강관리에 활용할 수 있을 것”이라고
    말했다.지난달 13일부터 선주문량 3000대를 포함해 1만대 양산에 들어간 직토는 최근 선주문부터 순차적으로 배송을 시작했다. 가격은 17만9000원이다. 5일부터 오는 16일까지 온라인쇼핑몰 G마켓에서 주문하면
    할인된 가격(16만9000원)에 구입할 수 있다.
