  widget:
  - source_sentence: 직토워크가 잘못된 자세의 걸음을 측정하는 기준은?
    sentences:
    - 이번 주말부터 전국에 30도를 웃도는 초여름 날씨가 다시 찾아올 전망이다.기상청은 전국이 고기압의 가장자리에 들어 대기가 안정되면서 이번 주말부터 맑고 무더운 날씨가 1주일가량 이어지겠다고 13일 예보했다.
      최근 나흘새 서울 등 수도권엔 대기 불안정으로 인해 소나기 및 우박이 곳곳에 떨어졌다. 지난 10일 경기 고양시에선 기상 관측 이래 육지에선 처음으로 토네이도(용오름)가 발생해 수십여채의 비닐하우스가 파손되기도
      했다.허진호 기상청 통보관은 “대기 상층의 찬 공기와 지면가열에 따른 하층의 따뜻한 공기가 만나 강한 대기불안정이 형성되면서 곳곳에 소나기가 내렸다”며 “이번 주말부터는 상층의 공기 흐름이 원활해 대기불안정이
      발생할 가능성은 낮다”고 내다봤다.토요일인 14일 서울의 낮 최고기온은 29도에 달하는 등 전국 대부분 지역이 30도를 웃돌 전망이다. 일요일인 15일에도 맑은 날씨를 보이면서 서울의 기온은 29도를 기록하겠다.
      무덥고 맑은 날씨는 다음주 주말까지 이어질 전망이다.무더위를 식혀줄 장마는 평년과 비슷한 이달 말부터 남부지방을 시작으로 찾아올 전망이다. 민간 최대 기상업체인 케이웨더는 오는 23일 남부지방을 시작으로 25일께
