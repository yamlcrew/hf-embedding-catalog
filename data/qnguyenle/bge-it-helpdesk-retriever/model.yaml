      Troubleshooting PKCS certificate deployment in Intune

      Feedback

      Summarize this article for me

      This article gives troubleshooting guidance for several common issues when deploying Public Key Cryptography Standards
      (PKCS) certificates in Microsoft Intune. Before troubleshooting, ensure you''ve completed the following tasks, as explained
      in

      Configure and use PKCS certificates with Intune

      :

      Review the

      requirements for using PKCS certificate profiles

      .

      Export the root certificate from the Enterprise Certification Authority (CA).

      Configure certificate templates on the certification authority.

      Install and configure the Intune Certificate Connector.

      Create and deploy a trusted certificate profile to deploy the root certificate.

      Create and deploy a PKCS certificate profile.

      The most common source of problems for PKCS certificate profiles has been with the configuration of the PKCS certificate
      profile. Review the profiles configuration and look for typos in server names or fully qualified domain names (FQDNs),
      and confirm the

      Certificate Authority

      and

      Certificate Authority Name

      are correct.

      Certification Authority

      : The internal FQDN of the Certificate Authority computer. For example, server1.domain.local.

      Certification Authority Name

      : The Certificate Authority Name as displayed in the certification authority MMC. Look under

      Certification Authority (Local)

      You can use the

      certutil command-line program

      on the CA to confirm the correct name for the Certification Authority and Certification Authority Name.

