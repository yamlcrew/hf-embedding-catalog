    Teams doesn''t automatically update

    Applies to: Microsoft Teams

    Feedback

    Summarize this article for me

    Summary

    More than one reason can prevent Microsoft Teams from automatically updating:

    When Microsoft Teams is installed to the Program Files folder (such as by using installation scripts) rather than to the
    default location, the client won''t automatically update when new versions are available.

    Microsoft Teams will update only when Teams is idle. If a user powers off the computer when finished using Teams, Teams
    will have no way to run the update process.

    Users need to be signed in for updates to be downloaded.

    Note

    If you find some features are missing, it''s because Teams isn''t updated.

    Workaround

    To make sure Teams automatically updates, install the application in the default location:

    user\Appdata

    .

    To force Microsoft Teams to check and install updates, select your avatar in the upper-right corner of Teams, and then
    select

    Check for updates

    . This will cause Microsoft Teams to check for updates.

    More information

    For more information about Teams update process, see

    Teams update process

    .

    For more information about how to update the Teams desktop app on Virtual Desktop Infrastructure (VDI), see

    Install or update the Teams desktop app on VDI

    .

    Still need help? Go to

    Microsoft Community

    .

