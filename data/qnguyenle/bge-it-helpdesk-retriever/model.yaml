    Troubleshooting policies and profiles in Microsoft Intune

    Feedback

    Summarize this article for me

    This article provides troubleshooting guidance for common issues related to policies and configuration profiles in Microsoft
    Intune. including instructions on how to use the built-in Intune troubleshooting feature.

    Use the built-in Troubleshoot pane

    You can use the built-in troubleshooting feature to review different compliance and configuration statuses.

    In the

    Microsoft Intune admin center

    , select

    Troubleshooting + support

    >

    Troubleshoot

    .

    Choose

    Select user

    > select the user having an issue >

    Select

    .

    Confirm that

    Intune license

    shows the green check:

    Helpful links

    :

    Assign licenses so users can enroll devices

    Add users to Intune

    Under

    Devices

    , find the device having an issue. Review the different columns:

    Managed

    : For a device to receive compliance or configuration policies, this property must show

    MDM

    or

    EAS/MDM

    .

    If

    Managed

    isn''t set to

    MDM

    or

    EAS/MDM

    , then the device isn''t enrolled. It doesn''t receive compliance or configuration policies until it''s enrolled.

    App protection policies (mobile application management) don''t require devices to be enrolled. For more information, see

    create and assign app protection policies

    .

    Microsoft Entra join Type

    : Should be set to

    Workplace

    or

    AzureAD

    .

    If this column is

    Not Registered

    , there may be an issue with enrollment. Typically, unenrolling and re-enrolling the device resolves this state.

