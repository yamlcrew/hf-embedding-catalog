    Remote Procedure Call (RPC) error troubleshooting guidance

    Applies to:

    Supported versions of Windows Client

    Feedback

    Summarize this article for me

    Summary

    Many programs and services (for example, Active Directory replication and Microsoft Management Console (MMC)) use the
    Remote Procedure Call (RPC) protocol to communicate across a network. When RPC communication fails, you might see errors
    such as "The RPC server is unavailable." The following image shows an example of an RPC error.

    To help you diagnose and fix RPC connectivity issues, this article helps you understand how RPC works and how common issues
    occur. It provides step-by-step guidance to help you fix common issues. It also introduces tools that you can use to identify
    and fix RPC issues that''re specific to your network topology.

    RPC protocol basics

    To begin, there are several important terms to understand:

    Endpoint mapper (EPM)

    : A service that listens on the server and guides client apps to server apps by using port and UUID information. The service
    is a part of the RPC subsystem that resolves dynamic endpoints in response to client requests. In some cases, it dynamically
    assigns endpoints to servers.

    Tower

    : Describes the RPC protocol to enable the client and server to negotiate a connection.

    Floors

    : The layers of contents within a tower that contain specific data, such as ports, IP addresses, and identifiers.

    UUID

    : A well-known GUID that identifies an RPC application. During troubleshooting, you can use the UUID to track the RPC
    conversations of a single type of application (among the many types that occur on a single computer at one time).

    Opnum

    : Identifies a function that the client '
