    Certificates

    , choose

    Computer account

    >

    Next

    , and select

    Local Computer

    .

    Double-click

    Certificates (Local computer)

    and choose

    Personal

    >

    Certificates

    .

    Look for the Intune cert issued by Sc_Online_Issuing, and delete it, if present.

    If the following registry key exists, delete it:

    HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\OnlineManagement

