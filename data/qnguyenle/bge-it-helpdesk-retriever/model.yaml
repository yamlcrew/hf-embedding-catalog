      Microsoft Teams Rooms Pro Management portal

      have an automatic remediation process to delete known cleanable files and optimize disk usage. If the remediation can''t
      free up enough space to ease the problem, additional diagnostic insights are provided (as a list of the largest folders)
      to help you follow up.

      You can also try the following options:

      Use the Disk Cleanup tool to delete unnecessary files.

      Reduce the size of the WinSxS folder

      by running the following command in an elevated Command Prompt window:

      DISM /ONLINE /CLEANUP-IMAGE /STARTCOMPONENTCLEANUP /RESETBASE

      Verify date and time on the device

      Make sure that the date and time settings are correct, and that the time offset is within two minutes. If you use an
      NTP server, select a reliable server.

