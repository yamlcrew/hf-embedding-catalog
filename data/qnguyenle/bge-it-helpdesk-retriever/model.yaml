      Missing Windows Installer cache requires a computer rebuild

      Applies to:

      Supported versions of Windows Client

      Feedback

      Summarize this article for me

      This article discusses how to restore missing Windows Installer cache files.

      Original KB number:

      2667628

      Summary

      The Windows Installer Cache is used to store important files for applications that are installed by using Windows Installer.
      By default, this cache is located in the c:\windows\installer folder, and it should not be deleted. If the installer
      cache is compromised, you may not immediately see problems until you take an action such as uninstalling, repairing,
      or updating a product.

      When a product is installed by using the Windows Installer, important files are stored in the Windows Installer cache
      that are required for uninstalling and updating applications. Missing files cannot be copied between computers because
      the files are unique.

      More information

      If application files are missing from the Windows Installer Cache, ask the vendor or support team for the application
      about the missing files. You must follow the procedures or steps recommended by the application vendor to restore the
      files. In some cases, you may have to rebuild the operating system and reinstall the application to fix the problem.

      Windows support engineers cannot help you recover missing application files from the Windows Installer cache.

      If the missing installer cache files are SQL Server files, see

      How to restore the missing Windows Installer cache files and resolve problems that occur during a SQL Server update

      .

      If the missing installer cache files are Microsoft Office or SharePoint files, follow the instructions in the followi'
