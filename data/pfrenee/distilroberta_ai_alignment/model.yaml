    - 'requirements gathering to recommend SAP solutions that drive data-driven decision-making and operational efficiency.


      Client Engagement And Advisory


      Build and maintain robust client relationships, serving as a trusted advisor on SAP Analytics capabilities and industry
      best practices.Address client challenges by aligning SAP Analytics solutions with their strategic goals, enhancing their
      analytical capabilities and reporting functions.


      Project Leadership And Management


      Oversee SAP Analytics implementation projects, ensuring timely delivery within scope and budget.Lead and inspire cross-functional
      teams, promoting collaboration and innovation to meet and exceed project objectives.


      Risk Management And Quality Assurance


      Proactively identify and address potential project risks, developing strategies to mitigate them and ensure project
      success.Uphold the highest standards of quality for all project deliverables, ensuring they meet Argano’s expectations
      and client requirements.


      Change Management And Training


      Facilitate effective change management processes associated with the implementation of SAP Analytics solutions, minimizing
      business disruption.Design and conduct comprehensive training sessions to empower clients with the knowledge and skills
      to leverage SAP Analytics solutions fully.


      Thought Leadership And Innovation


      Maintain up-to-date knowledge of the latest SAP Analytics developments, trends, and best practices, positioning Argano
      as a thought leader in the field.Foster a culture of continuous improvement by sharing insights and best practices with
      clients and internal teams.


      Minimum And/or Preferred Qualifications


      Education: Bachelor''s or master''s degree in Business Administration, Computer Science, Information Systems, Engineering,
      or a related field.Experience: Minimum of 5+ years in SAP consulting, with extensive experience in SAP Analytics Suite
      (which includes native SAP products, Google, Azure, AWS, and other cloud vendor products for SAP customers), SAP Analytics
      Cloud (SAC), SAP Datasphere/Data Warehousing Cloud, SAP Embedded Modeling.Certifications: SAP certifications in Analytics,
      SAC, Datasphere/DWC, or related areas are highly regarded.Skills:Profound expertise in SAP Analytics, SAP Analytics
      Suite (which includes native SAP products, Google, Azure, AWS, and other cloud vendor products for SAP customers), SAP
      Analytics Cloud (SAC), SAP Datasphere/Data Warehousing Cloud, SAP Embedded Modeling.Exceptional project management and
      leadership skills, capable of guiding teams through complex implementations.Excellent client engagement and communication
      skills, adept at establishing trust and acting as a strategic advisor.Strong capabilities in risk management, quality
      assurance, and change management.Travel required depending on the project.

      This position offers a unique chance to make a significant impact on our clients'' success and to contribute to the
      growth and prestige of Argano as a global leader in digital consultancy. If you are a seasoned expert in SAP Data &
      Analytics with a passion for digital transformation and a proven track record of delivering results, we invite you to
      join our dynamic team.


      About Us


      Argano is the first of its kind: a digital consultancy totally immersed in high-performance operations. We steward enterprises
