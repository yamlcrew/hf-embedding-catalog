      unlock commercial innovation, and drive optimal efficiency and growth.


      Argano is an equal-opportunity employer. All applicants will be considered for employment without regard to race, color,
      religion, sex, sexual orientation, gender identity, national origin, veteran status, or disability status.'
    - 'experience in the industries we serve, and to partner with diverse teams of passionate, enterprising SVBers, dedicated
      to an inclusive approach to helping them grow and succeed at every stage of their business.


      Join us at SVB and be part of bringing our clients'' world-changing ideas to life. At SVB, we have the opportunity to
      grow and collectively make an impact by supporting the innovative clients and communities SVB serves. We pride ourselves
      in having both a diverse client roster and an equally diverse and inclusive organization. And we work diligently to
      encourage all with different ways of thinking, different ways of working, and especially those traditionally underrepresented
      in technology and financial services, to apply.


      Responsibilities


      SVB’s Foreign Exchange business is one of the largest FX providers to the Innovation economy. We support the transactional
      and risk management needs of our fast-growing clients as they expand and do business internationally.


      Located close to one of our Hubs in SF, NYC or Raleigh and reporting to the Managing Director of FX Strategy, this Business
      Data Analyst will be an integral part of the Product Strategy and Business Management team, supporting and driving the
      insights that will be used to formulate, drive and validate our strategic and business effectiveness.


       


      You will take part in complex, multi-disciplinary projects to further enable the Product, Trading and Sales teams. You
      will be a fast learner who is comfortable in the weeds with analytics and data manipulation whilst developing the story
      for leadership.


      This role would be a great fit for a creative, curious and energetic individual and offers the right candidate the opportunity
      to grow while creating significant business value by continuously improving business intelligence/reporting, processes,
      procedures, and workflow.


      The ideal candidate will have 3-5 yrs experience in Financial Services or Fintech, preferably with FX, Trading or Cross
      Border Payment experience.


       


      requirements.Become familiar with the evolving FX, Fintech and Banking landscape to overlay industry insights.Drive
      continued evolution of our business analytics/data framework in order to inform MI and product evaluation.Assist with
      maintenance and accuracy of company data within SVB’s data repositories.


      Qualifications


      Basic Requirements:


      BS/BA Degree – preferably in a quantitative discipline (e.g., Economics, Mathematics, Statistics) or a HS Diploma or
      GED with equivalent work experience3-5 years’ experience in financial services or fintech, ideally within FX or Cross
      Border Payments


      Preferred Requirements:


      Strong attention to detail with an eye for data governance and compliance


      Aptitude for framing business questions in analytic terms and translating requirements into useful datasets and analyses
