    640 durch Einspielen von Perforce-Sourcen. Test C und C++ Precompiler -Programme. Testen Datenbankfuntionalitäten über
    SAP-CCMS und DB bzw. SAP-Laufzeitparameter (Shared Memory etc.). Installieren und testen von diversen SAP Komponenten
    SAP R/3 4.6D, SAP Kernel 620 und 640 unter Linux/zLinux 2.4 und 2.6 (64 Bit-Adressierung) mit verschiedenen Datenbanksystemen
    als Database-Server (Oracle, DB2 und MaxDB). Testen SAP-Transaktionen mit CATT (SAP computer aided test tool) und anpassen
    von Python und Perl Schnittstellen. AIX 5.33, z/OS, SAP R/3 4.6D, WAS 6.20/6.40, DB2 V8.1, vi, K-Shell, C-Shell, bash,
    ICLI, FTP, Smitty, TSO/ISPF, JCL, SAPSERV, AIX VG-PP-LP, yank, MaxDB 7.5, Linux/zLinux 2.4/2.6, C, C++, Python, Perl Teamarbeit
    3 Mitarbeiter. [SEP]'
