- source_sentence: elobixibat monohidrat itu obat buat sembelit kronis kan?
  sentences:
  - 'Elobixibat Monohidrat adalah Elobixibat monohidrat atau elobixibat monohydrate adalah obat golongan penghambat transporter
    asam empedu yang digunakan untuk mengatasi sembelit kronis. Elobixibat monohidrat termasuk obat keras yang diperoleh dengan
    resep dan anjuran dokter.. Elobixibat monohidrat digunakan untuk mengatasi sembelit kronis. Elobixibat monohidrat bekerja
    dengan menghambat penyerapan kembali asam empedu di usus, sehingga meningkatkan pengeluaran cairan ke dalam usus dan motilitas
    usus. Hal ini menyebabkan pergerakan usus semakin cepat dan melembutkan feses, sehingga proses buang air besar menjadi
    lebih lancar.. Elobixibat monohidrat tersedia dalam bentuk tablet salut selaput, umumnya dikonsumsi saat perut kosong
    sebelum makan. Minumlah pada waktu yang sama setiap harinya. Pastikan untuk minum semua obat yang diresepkan oleh dokter
    Anda sesuai jadwal yang ditentukan. Jangan menghentikan minum obat tanpa konsultasi dokter terlebih dahulu dan patuhilah
    jadwal kontrol rutin Anda. Ikuti aturan minum obat sesuai petunjuk dokter yang tertera pada label resep dengan teliti.
    Jika merasa petunjuk atau aturan pakai kurang jelas, minta dokter atau apoteker untuk menjelaskannya secara lengkap. Selalu
    beritahukan dokter atau apoteker Anda bila Anda sedang hamil atau menyusui. Jika Anda lupa minum elobixibat monohidrat,
    segera minum dosis yang terlewat begitu Anda ingat. Namun, jika sudah mendekati waktu minum obat berikutnya, abaikan dosis
    yang terlewat dan kembalilah ke jadwal normal. Jangan menggandakan dosis dalam kondisi apa pun.. Sebelum menerima pengobatan
    dengan elobixibat monohidrat, informasikan kepada dokter jika Anda memiliki kondisi berikut: Memiliki riwayat alergi elobixibat
    monohidrat atau obat sejenis lainnya. Memiliki riwayat obstruksi saluran cerna yang berhubungan dengan tumor atau hernia..
    Elobixibat monohidrat dapat menimbulkan risiko efek samping. Konsultasikan dengan dokter atau apoteker jika Anda mengalami
    efek samping akibat elobixibat monohidrat seperti berikut. Gangguan sistem pencernaan: Sakit perut, diare, mual, dan ketidanyamanan
    pada perut. Gangguan sistem saraf: Pusing dan sakit kepala. Gangguan lain: Gejala hot flush (sensasi panas mendadak di
    wajah/leher). Beberapa efek samping yang ditimbulkan elobixibat monohidrat mungkin memerlukan pertolongan medis yang segera.
    Jika Anda mengalami gejala di bawah ini, segera hubungi dokter. Reaksi alergi: Ruam atau gatal, dada sesak, kesulitan
    bernapas, dan pembengkakan pada wajah, tangan, mulut, atau tenggorokan. Gangguan fungsi hati: Mata atau kulit menguning.
    Gangguan sistem pencernaan: Tinja lunak dan kembung. Gangguan otot, sendi, dan tulang: Nyeri otot. Jika Anda mengalami
    efek samping lain yang mengganggu atau tidak kunjung sembuh, segera hubungi dokter.. Beberapa obat dapat memengaruhi cara
    kerja elobixibat monohidrat. Beri tahu dokter bila Anda menggunakan obat-obatan di bawah ini selama menggunakan elobixibat
    monohidrat. Antasida: Antasida dengan kandungan aluminium dan sukralfat. Obat kolesterol: Kolestiramin. Obat gangguan
    kardiovaskular: Digoksin. Obat pengencer darah: Dabigatran. Anestesi dan obat persiapan operasi: Midazolam. Lainnya: Asam
    ursodeoksikolat. Daftar obat ini belum mencakup semua obat yang mungkin berinteraksi dengan elobixibat monohidrat. Beri
    tahu dokter atau apoteker Anda jika Anda mengonsumsi obat lain, termasuk obat herbal seperti obat tradisional Tiongkok
    ( traditional Chinese medicine ), suplemen, dan obat yang Anda beli tanpa resep dokter lainnya.. Kategori Kehamilan MDX
    Kelas Terapi Laksatif, Pencahar. Merek Dagang* Goofice *Merek obat-obatan yang disebutkan mungkin tidak tersedia di Indonesia.
    Diskusikan dengan dokter atau apoteker terkait alternatif obat yang tersedia dan sesuai dengan kebutuhan medis Anda.'
