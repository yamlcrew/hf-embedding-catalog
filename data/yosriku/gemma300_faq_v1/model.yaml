      berikutnya, abaikan dosis yang terlewat dan kembalilah ke jadwal normal. Jangan menggandakan dosis dalam kondisi apa
      pun.. Sebelum menerima pengobatan dengan elobixibat monohidrat, informasikan kepada dokter jika Anda memiliki kondisi
      berikut: Memiliki riwayat alergi elobixibat monohidrat atau obat sejenis lainnya. Memiliki riwayat obstruksi saluran
      cerna yang berhubungan dengan tumor atau hernia.. Elobixibat monohidrat dapat menimbulkan risiko efek samping. Konsultasikan
