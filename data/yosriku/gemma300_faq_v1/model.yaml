      dahulu dan patuhilah jadwal kontrol rutin Anda. Ikuti aturan minum obat sesuai petunjuk dokter yang tertera pada label
      resep dengan teliti. Jika merasa petunjuk atau aturan pakai kurang jelas, minta dokter atau apoteker untuk menjelaskannya
      secara lengkap. Selalu beritahukan dokter atau apoteker Anda bila Anda sedang hamil atau menyusui. Jika Anda lupa minum
