      Apa itu Flu (Influenz
    - 'Polimiksin B adalah Polimiksin B adalah antibiotik golongan polipeptida yang bekerja secara sistemik (luas) untuk mengatasi
      dan membantu mencegah infeksi yang disebabkan oleh bakteri. Polimiksin B biasanya dikombinasikan dengan bacitracin atau
      neomycin . Polimikson B termasuk obat keras yang penggunaannya harus dengan resep dokter.. Polimiksin B tersedia dalam
      kombinasi dengan zat aktif lain yang digunakan untuk mengatasi infeksi dan inflamasi pada mata, telinga, atau kulit.
      dan infeksi lainnya sesuai rekomendasi dokter. Polimiksin B bekerja dengan cara merusak dinding sel bakteri sehingga
      menghentikan pertumbuhan bakteri.. Penggunaan polimiksin B tersedia dalam sediaan kombinasi dengan obat lain dalam bentuk
      sediaan salep topikal, tetes mata, salep mata, dan tetes telinga. Jika Anda diresepkan bentuk sedian salep, pastikan
      Anda membersihkan area kulit yang akan dioleskan terlebih dahulu, lalu dioleskan pada bagian kulit yang sakit secara
      tipis-tipis. Jika Anda mendapat obat dalam bentuk sediaan tetes mata, lakukan langkah-langkah di bawah ini. Cuci tangan
      terlebih dahulu sebelum menyentuh mata dan menggunakan obat tetes mata. Bersihkan mata sebelum menggunakan obat tetes
      mata. Gunakan kapas bersih atau tisu lembut untuk membersihkan kotoran atau lendir di sekitar mata. Apabila menggunakan
      lensa kontak, lepaskan lensa kontak terlebih dahulu, kecuali jika dokter menyarankan Anda untuk membiarkannya tetap
      terpasang selama menggunakan obat. Kocok obat tetes mata terlebih dahulu. Buka tutup obat tetes mata. Namun, hindari
      menyentuh bagian ujung botolnya. Sebab, hal tersebut berisiko menyebabkan kontaminasi pada obat tetes mata. Dongakkan
      kepala ke atas. Gunakan salah satu tangan untuk menarik kelopak mata bagian bawah dan arahkan tatapan mata ke atas.
      Arahkan bagian ujung botol obat tepat di atas kelopak mata bagian bawah. Pastikan bagian ujung botol obat tetes mata
      tidak menyentuh mata ataupun kelopak mata secara langsung. Tekan botol obat secara perlahan dan biarkan tetesan cairan
      obat masuk ke dalam mata. Pejamkan mata, kemudian, tekan lembut sudut mata yang terletak di antara kelopak mata dan
      hidung selama 1–2 menit. Hal ini bertujuan untuk membantu obat agar dapat  diserap dengan baik oleh mata, bukan mengalir
      ke saluran hidung. Jika ada tetesan cairan obat yang keluar, gunakan tisu bersih untuk menyekanya dari kelopak mata
      yang tertutup. Jika diperlukan, ulangi langkah-langkah di atas pada sisi mata lainnya. Terakhir, cuci tangan menggunakan
      sabun dan air mengalir. Sedangkan apabila Anda diresepkan bentuk sediaan salep mata, ikuti langkah-langkah berikut.
      Cuci tangan sebelum dan sesudah mengaplikasikan obat. Pegang ujung tube di dekat mata Anda dengan tangan satunya. Hindari
      kontak antara ujung tube ke mata atau jari Anda. Tekan tube dan keluarkan obat ke dalam saku di antara kelopak mata
      bawah dan bola mata. Tutup mata Anda selama 1 hingga 2 menit. Bersihkan ujung tube dengan tisu bersih dan tutup tabung
      dengan rapat. Namun jika Anda mendapat resep obat tetes telinga, Anda dapat mengikuti langkah berikut. Pastikan obat
      tetes telinga berada pada suhu normal tubuh. Jika suhu obat tetes telinga terasa dingin, pasien dapat memegang botol
      obat tetes telinga atau memasukkannya ke dalam saku pakaian selama beberapa menit. Kocok botol obat terlebih dahulu
      sebelum digunakan, terutama jika tertera label “kocok dahulu” pada kemasan obat tetes telinga. Mencuci tangan dengan
      sabun dan air mengalir sebelum mulai menggunakan obat tetes telinga. Posisikan badan berbaring miring ke samping hingga
      telinga yang akan diberikan obat menghadap ke atas. Untuk anak-anak, arahkan si kecil berbaring menyamping atau biarkan
      kepalanya berada di pangkuan Anda. Pastikan saluran telinga terlihat dalam posisi lurus sehingga obat tetes telinga
      bisa menjangkau bagian yang perlu ditangani. Tarik bagian atas telinga ke atas dan ke bawah. Untuk anak berusia di bawah
      3 tahun, orang tua dapat menarik bagian atas telinga ke bawah dan ke belakang. Pegang pipet obat tetes telinga di bagian
      atas telinga. Pastikan pipet tidak menyentuh telinga. Kemudian, Anda bisa meneteskan obat tetes telinga dari pipet tersebut
      sesuai dengan dosis yang dianjurkan oleh dokter. Letakkan kembali pipet ke dalam botol obat tetes telinga dan pastikan
      pipet tersebut tidak bersentuhan dengan apa pun agar tidak terkontaminasi. Tetaplah berada dalam posisi yang sama selama
      3–5 menit untuk memastikan obat tetes telinga mengalir turun ke saluran telinga. Menggerakkan telinga atau menekan daun
      telinga secara perlahan juga bisa membantu. Jika harus menggunakan obat tetes telinga di kedua sisi, tunggulah selama
      5–10 menit sebelum meneteskan obat tersebut di sisi telinga lainnya. Hal ini bertujuan memastikan obat pada saluran
      telinga pertama memiliki waktu yang cukup untuk bekerja secara optimal. Ikuti aturan pakai obat sesuai petunjuk dokter
      yang tertera pada label resep dengan teliti. Jika merasa petunjuk atau aturan pakai kurang jelas, minta dokter atau
      apoteker untuk menjelaskannya secara lengkap. Selalu beritahukan dokter atau apoteker Anda bila Anda sedang hamil atau
      menyusui. Agar polimiksin B bekerja maksimal, pastikan Anda menggunakannya secara teratur pada waktu yang sama setiap
      hari. Selesaikan atau habiskan pengobatan polimiksin B sesuai dengan rekomendasi dokter, meski gejala sudah hilang.
      Lanjutkan pengobatan hingga jangka waktu penggunaan antibiotik selesai atau obat yang diresepkan dokter habis agar terhindar
      dari resistensi antibiotik (menurunnya kemampuan obat dalam membunuh bakteri). Jika Anda lupa menggunakan polimiksin
      B, segera gunakan dosis yang terlewat begitu Anda ingat. Namun apabila sudah mendekati waktu pakai obat berikutnya,
      abaikan dosis yang terlewat tadi dan kembali ke jadwal dosis normal. Jangan menggandakan dosis dalam kondisi apa pun..
      Sebelum menggunakan polimiksin B, informasikan kepada dokter atau apoteker jika Anda memiliki riwayat alergi terhadap
      polimiksin B atau bahan yang terkandung di dalamnya.. Polimiksin dapat menimbulkan risiko efek samping. Konsultasikan
      kepada dokter bila Anda mengalami efek samping akibat polimiksin B topikal seperti berikut. Gangguan kulit: Gatal, ruam,
      iritasi, sensasi perih atau terbakar, kemerahan, atau kekeringan pada kulit. Sedangkan polimiksin B tetes atau salep
      mata dapat menimbulkan risiko efek samping seperti berikut. Gangguan mata: Gatal, iritasi, kemerahan, atau pembengkakan
      pada mata. Sedian polimiksin B tetes telinga mungkin menimbulkan risiko efek samping di bawah ini. Gangguan telinga:
      Sensasi terbakar atau perih pada telinga. Beberapa efek samping yang ditimbulkan polimiksin B mungkin membutuhkan pertolongan
      medis yang segera. Jika Anda mengalami gejala di bawah ini setelah penggunaan polimiksin B, segera hubungi dokter. Reaksi
      alergi: Gatal atau ruam, dada sesak, kesulitan bernapas, dan pembengkakan pada wajah, tangan, mulut, atau tenggorokan.
      Jika terdapat efek samping lain yang tak kunjung membaik selama menggunakan obat ini, segera hubungi dokter.. Obat yang
      digunakan pada kulit, mata, atau telinga umumnya tidak dipengaruhi oleh obat lain. Beri tahu dokter atau apoteker jika
      Anda mengonsumsi obat lain, termasuk obat herbal seperti obat tradisional Tiongkok ( traditional Chinese medicine ),
      suplemen, dan obat yang Anda beli tanpa resep dokter lainnya. Pastikan untuk memberitahu dokter jika Anda menggunakan
      krim, salep, losion, atau obat lainnya pada bagian kulit yang terkena. Hindari penggunaan kosmetik atau produk perawatan
      kulit lainnya pada bagian kulit yang terkena.. Sediaan tetes mata dan tetes telinga yang telah dibuka memiliki batas
      waktu penggunaan obat ( beyond use date atau BUD), yang berbeda dengan tanggal kadaluarsa obat ( expired date ). Selalu
      periksa rekomendasi manufaktur dari produk yang Anda gunakan, atau tanyakan kepada apoteker Anda terkait penyimpanan
      dan pembuangan obat. Kategori Kehamilan C Kelas Terapi Antibiotik Lain; Antiinfeksi & Antiseptik Mata; Antiinfeksi &
      Antiseptik Telinga. Merek Dagang* Inmatrol (kombinasi dengan neomisin dan deksametason), Spectron (kombinasi dengan
      neomisin), Alletrol Compositum Forte (kombinasi dengan deksametason dan neomisin), Otopain (kombinasi dengan neomisin,
      fludrokortison, dan lidokain), Liposin (kombinasi dengan basitrasin, neomisin, dan lidokain), Enbatic Plus (kombinasi
      dengan neomisin dan basitrasin), Tigalin (kombinasi dengan basitrasin dan neomisin), dll. *Merek obat-obatan yang disebutkan
      mungkin tidak tersedia di Indonesia. Diskusikan dengan dokter atau apoteker terkait alternatif obat yang tersedia dan
      sesuai dengan kebutuhan medis Anda.'
