  - "Paket: CT Scan Tulang Belakang Bawah Dan Ekor/Lumbosacral (Non Kontras), Deskripsi: CT Scan Tulang Belakang Bawah dan\
    \ Ekor/Lumbosacral (Non Kontras) adalah pemeriksaan pada tulang belakang bagian lumbal hingga sakral serta tulang ekor\
    \ untuk melihat struktur tulang, sendi, dan jaringan sekitarnya.\n\nJika Anda ragu akan pemeriksaan yang hendak dijalani,\
    \ konsultasikan kondisi Anda kepada dokter terkait untuk mendapatkan rujukan/saran pemeriksaan yang tepat.\n\nManfaat\
    \ Pemeriksaan:\n\n\\- Mendeteksi kelainan pada tulang belakang bagian bawah dan ekor seperti fraktur, degenerasi, atau\
    \ tumor.  \n\\- Mendiagnosis penyebab nyeri punggung bawah dan tulang ekor seperti HNP (hernia nucleus pulposus) atau\
