    - 'Vaksin Influenza adalah Vaksin influenza atau influenza vaccine adalah vaksin yang digunakan untuk melindungi seseorang
      dari penyakit flu akibat virus influenza. Vaksin influenza juga dikenal sebagai vaksin flu. Vaksin influenza adalah
      imunisasi sebagai upaya kesehatan preventif untuk menekan penyebaran atau keparahan penyakit infeksi. Pemberian vaksin
      hanya dapat dilakukan oleh dokter atau tenaga medis lainnya di fasilitas pelayanan kesehatan.. Vaksin influenza digunakan
      untuk mencegah virus influenza sebagai langkah pencegahan penyakit flu dan komplikasinya. Antibodi yang dibentuk vaksin
      influenza akan memberikan perlindungan terhadap virus influenza. Vaksin influenza diberikan dapat diberikan mulai anak
      saat berusia 6 sampai 23 bulan, dilanjutkan dengan pemberian vaksin tiap tahun ketika memasuki usia 18 bulan hingga
      18 tahun. Setelah itu, vaksin influenza diulang setiap tahunnya untuk menjaga daya proteksi vaksin terhadap virus. Perhatikan
      jadwal vaksinasi yang dianjurkan oleh Ikatan Dokter Anak Indonesia (untuk anak) dan Perhimpunan Dokter Spesialis Penyakit
      Dalam Indonesia (untuk dewasa).. Vaksin influenza tersedia dalam bentuk injeksi dan hanya dapat diberikan oleh dokter
      atau tenaga medis profesional lainnya di fasilitas pelayanan kesehatan. Pastikan Anda memperoleh vaksinasi sesuai jadwal
      vaksin agar Anda tidak melewatkan vaksinasi apapun. Jika Anda melewatkan jadwal vaksinasi, beri tahu dokter atau perawat
      Anda, agar Anda mendapatkan jadwal pengganti sesegera mungkin.. Sebelum memperoleh vaksin influenza, informasikan pada
      dokter atau tenaga medis lainnya jika Anda memiliki riwayat alergi terhadap vaksin influenza dan golongan obat atau
      vaksin sejenis.. Vaksin Influenza dapat menimbulkan risiko efek samping. Konsultasikan kepada dokter bila Anda mengalami
      efek samping akibat vaksin influenza seperti berikut. Gangguan sistem pencernaan: Diare atau hilangnya nafsu makan.
      Gangguan pada area suntik: Kemerahan, nyeri, pembengkakan, atau sebuah benjolan pada tempat obat disuntikkan. Beberapa
      efek samping yang ditimbulkan vaksin influenza mungkin membutuhkan pertolongan medis yang segera. Jika Anda mengalami
      gejala di bawah ini, segera hubungi dokter. Reaksi alergi: Gatal atau ruam, dada sesak, kesulitan bernapas, dan pembengkakan
      pada wajah, tangan, mulut, atau tenggorokan. Gangguan sistem saraf: Sakit kepala, pusing, dan kejang. Gangguan otot,
      sendi, dan tulang: Nyeri otot atau sendi dan kelemahan pada otot. Jika terdapat efek samping lain yang tak kunjung membaik
      selama menerima vaksin influenza, segera hubungi dokter.. Beberapa obat-obatan dapat mempengaruhi cara kerja vaksin
      influenza. Beri tahu dokter Anda bila Anda menggunakan obat-obatan di bawah ini sebelum menerima vaksin influenza. Imunosupresan:
      Azatioprin, adalimumab, tocilizumab, ocrelizumab, dan golimumab. Daftar obat ini belum mencakup semua obat yang mungkin
      berinteraksi dengan vaksin influenza. Beri tahu dokter atau apoteker Anda, jika Anda mengonsumsi obat lain, termasuk
      obat herbal seperti obat tradisional Tiongkok ( traditional Chinese medicine ), suplemen, dan obat yang Anda beli tanpa
      resep dokter lainnya.. Kategori Kehamilan B Kelas Terapi Vaksin, Antisera, dan Imunologikal. Merek Dagang* Flubio, Influvac,
      Fluarix, Vaxigrip, Fluquadri, dll. *Merek obat-obatan yang disebutkan mungkin tidak tersedia di Indonesia. Diskusikan
      dengan dokter atau apoteker terkait alternatif obat yang tersedia dan sesuai dengan kebutuhan medis Anda.'
