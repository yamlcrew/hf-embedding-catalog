    - 'Metoksi Polietilen Glikol-Epoetin Beta adalah Metoksi polietilen glikol-epoetin beta atau methoxy polyethylene glycol-epoetin
      beta adalah obat golongan agen perangsang eritropoiesis ( erythropoiesis stimulating agent /ESA) yang digunakan untuk
      mengobati anemia akibat penyakit ginjal kronis. Metoksi polietilen glikol-epoetin beta termasuk obat keras yang penggunaannya
      harus dengan resep dokter.. Metoksi polietilen glikol-epoetin beta digunakan untuk mengobati anemia (kekurangan sel
      darah merah dalam tubuh) yang disebabkan oleh penyakit ginjal kronis. Metoksi polietilen glikol-epoetin beta bekerja
      dengan merangsang sumsum tulang untuk memproduksi lebih banyak sel darah merah, sehingga membantu memulihkan kondisi
      anemia dan mengurangi kebutuhan transfusi darah. Metoksi polietilen glikol-epoetin beta juga dapat digunakan untuk kondisi
      medis lain sesuai rekomendasi dokter.. Metoksi polietilen glikol-epoetin beta tersedia dalam bentuk sediaan cairan injeksi
      yang hanya dapat diberikan oleh dokter atau tenaga medis profesional lainnya. Selalu ikuti panduan dokter atau perawat
      Anda sebelum menjalani tindakan dengan metoksi polietilen glikol-epoetin beta. Jika Anda memiliki pertanyaan lebih lanjut
      seputar tindakan injeksi, segera konsultasikan dengan dokter atau perawat Anda.. Sebelum menggunakan metoksi polietilen
      glikol-epoetin beta, informasikan kepada dokter jika Anda memiliki kondisi berikut. Memiliki riwayat alergi terhadap
      metoksi polietilen glikol-epoetin beta atau golongan obat sejenis, seperti epoetin alfa atau darbepoetin alfa. Memiliki
      riwayat aplasia sel darah merah murni ( pure red cell aplasia /PRCA), yaitu kelainan darah langka dimana sumsum tulang
      gagal memproduksi jumlah sel darah merah yang normal.. Metoksi polietilen glikol-epoetin beta dapat menimbulkan risiko
      efek samping. Konsultasikan dengan dokter jika Anda mengalami efek samping akibat metoksi polietilen glikol-epoetin
      beta seperti berikut. Gangguan sistem saraf: Sakit kepala ringan. Gangguan sistem pencernaan: Muntah dan diare. Gangguan
      otot, sendi, dan tulang: Nyeri punggung atau otot. Beberapa efek samping yang ditimbulkan metoksi polietilen glikol-epoetin
      beta mungkin memerlukan pertolongan medis yang segera. Jika Anda mengalami gejala di bawah ini, segera hubungi dokter.
      Reaksi alergi: Ruam atau gatal, dada sesak, kesulitan bernapas, dan pembengkakan pada wajah, tangan, mulut, atau tenggorokan.
      Gangguan kulit: Sindrom Stevens-Johnson dengan gejala berupa ruam dengan kulit yang mengelupas, melepuh, atau merah.
      Gangguan kardiovaskular: Nyeri dada yang dapat menjalar dan gejala edema, seperti pembengkakan pada tangan, kaki, atau
      pergelangan kaki. Gangguan sistem saraf: Pusing, rasa ringan pada kepala, sakit kepala yang mendadak atau parah, gangguan
      melihat, berbicara, atau berjalan, dan kejang. Gangguan lain: Pembengkakan pada tungkai bawah. Jika terdapat efek samping
      lain yang tidak kunjung membaik selama menggunakan metoksi polietilen glikol-epoetin beta, segera hubungi dokter.. Belum
      diketahui adanya interaksi antara metoksi polietilen glikol-epoetin beta dengan obat atau suplemen lain yang dapat memperburuk
      kondisi kesehatan jika dikonsumsi secara bersamaan. Namun, selalu beri tahu dokter dan apoteker jika Anda mengonsumsi
      obat lain yang dibeli dengan atau tanpa resep dokter, termasuk obat herbal, vitamin, atau suplemen lainnya. Selain obat-obatan,
      beberapa makanan atau minuman juga dapat memengaruhi cara kerja metoksi polietilen glikol-epoetin beta. Hindari mengonsumsi
      alkohol selama pengobatan dengan metoksi polietilen glikol-epoetin beta.. Kategori Kehamilan C Kelas Terapi Obat Hematopoietik.
      Merek Dagang* Mircera. *Merek obat-obatan yang disebutkan mungkin tidak tersedia di Indonesia. Diskusikan dengan dokter
      atau apoteker terkait alternatif obat yang tersedia dan sesuai dengan kebutuhan medis Anda.'
