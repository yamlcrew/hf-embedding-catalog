  - 'Metoksi Polietilen Glikol-Epoetin Beta adalah Metoksi polietilen glikol-epoetin beta atau methoxy polyethylene glycol-epoetin
    beta adalah obat golongan agen perangsang eritropoiesis ( erythropoiesis stimulating agent /ESA) yang digunakan untuk
    mengobati anemia akibat penyakit ginjal kronis. Metoksi polietilen glikol-epoetin beta termasuk obat keras yang penggunaannya
    harus dengan resep dokter.. Metoksi polietilen glikol-epoetin beta digunakan untuk mengobati anemia (kekurangan sel darah
    merah dalam tubuh) yang disebabkan oleh penyakit ginjal kronis. Metoksi polietilen glikol-epoetin beta bekerja dengan
    merangsang sumsum tulang untuk memproduksi lebih banyak sel darah merah, sehingga membantu memulihkan kondisi anemia dan
    mengurangi kebutuhan transfusi darah. Metoksi polietilen glikol-epoetin beta juga dapat digunakan untuk kondisi medis
    lain sesuai rekomendasi dokter.. Metoksi polietilen glikol-epoetin beta tersedia dalam bentuk sediaan cairan injeksi yang
    hanya dapat diberikan oleh dokter atau tenaga medis profesional lainnya. Selalu ikuti panduan dokter atau perawat Anda
    sebelum menjalani tindakan dengan metoksi polietilen glikol-epoetin beta. Jika Anda memiliki pertanyaan lebih lanjut seputar
    tindakan injeksi, segera konsultasikan dengan dokter atau perawat Anda.. Sebelum menggunakan metoksi polietilen glikol-epoetin
    beta, informasikan kepada dokter jika Anda memiliki kondisi berikut. Memiliki riwayat alergi terhadap metoksi polietilen
    glikol-epoetin beta atau golongan obat sejenis, seperti epoetin alfa atau darbepoetin alfa. Memiliki riwayat aplasia sel
    darah merah murni ( pure red cell aplasia /PRCA), yaitu kelainan darah langka dimana sumsum tulang gagal memproduksi jumlah
    sel darah merah yang normal.. Metoksi polietilen glikol-epoetin beta dapat menimbulkan risiko efek samping. Konsultasikan
    dengan dokter jika Anda mengalami efek samping akibat metoksi polietilen glikol-epoetin beta seperti berikut. Gangguan
    sistem saraf: Sakit kepala ringan. Gangguan sistem pencernaan: Muntah dan diare. Gangguan otot, sendi, dan tulang: Nyeri
    punggung atau otot. Beberapa efek samping yang ditimbulkan metoksi polietilen glikol-epoetin beta mungkin memerlukan pertolongan
    medis yang segera. Jika Anda mengalami gejala di bawah ini, segera hubungi dokter. Reaksi alergi: Ruam atau gatal, dada
    sesak, kesulitan bernapas, dan pembengkakan pada wajah, tangan, mulut, atau tenggorokan. Gangguan kulit: Sindrom Stevens-Johnson
    dengan gejala berupa ruam dengan kulit yang mengelupas, melepuh, atau merah. Gangguan kardiovaskular: Nyeri dada yang
    dapat menjalar dan gejala edema, seperti pembengkakan pada tangan, kaki, atau pergelangan kaki. Gangguan sistem saraf:
    Pusing, rasa ringan pada kepala, sakit kepala yang mendadak atau parah, gangguan melihat, berbicara, atau berjalan, dan
    kejang. Gangguan lain: Pembengkakan pada tungkai bawah. Jika terdapat efek samping lain yang tidak kunjung membaik selama
    menggunakan metoksi polietilen glikol-epoetin beta, segera hubungi dokter.. Belum diketahui adanya interaksi antara metoksi
    polietilen glikol-epoetin beta dengan obat atau suplemen lain yang dapat memperburuk kondisi kesehatan jika dikonsumsi
    secara bersamaan. Namun, selalu beri tahu dokter dan apoteker jika Anda mengonsumsi obat lain yang dibeli dengan atau
    tanpa resep dokter, termasuk obat herbal, vitamin, atau suplemen lainnya. Selain obat-obatan, beberapa makanan atau minuman
    juga dapat memengaruhi cara kerja metoksi polietilen glikol-epoetin beta. Hindari mengonsumsi alkohol selama pengobatan
    dengan metoksi polietilen glikol-epoetin beta.. Kategori Kehamilan C Kelas Terapi Obat Hematopoietik. Merek Dagang* Mircera.
    *Merek obat-obatan yang disebutkan mungkin tidak tersedia di Indonesia. Diskusikan dengan dokter atau apoteker terkait
    alternatif obat yang tersedia dan sesuai dengan kebutuhan medis Anda.'
- source_sentence: Vaksin influenza itu buat cegah flu ya?
  sentences:
  - Penyebab Aritmia Jenis Aritmia Gejala dan Komplikasi Aritmia Manajemen Terapi Aritmia 1. Obat-Obatan 2. Ablasi 3. Alat
    Pacu Jantung 4. ICD (Implantable Cardioverter-Defribilator) Pencegahan Aritmia Aritmia adalah sebuah kondisi gangguan
    pada irama detak jantung, dapat teratur maupun tidak teratur, bisa terlalu cepat atau bahkan lebih lambat. Kondisi ini
    akan menganggu apabila terjadi secara terus menerus. Kelainan ini bisa terjadi pada kondisi jantung sehat maupun dengan
    latar belakang kelainan
  - 'Vaksin Influenza adalah Vaksin influenza atau influenza vaccine adalah vaksin yang digunakan untuk melindungi seseorang
    dari penyakit flu akibat virus influenza. Vaksin influenza juga dikenal sebagai vaksin flu. Vaksin influenza adalah imunisasi
    sebagai upaya kesehatan preventif untuk menekan penyebaran atau keparahan penyakit infeksi. Pemberian vaksin hanya dapat
    dilakukan oleh dokter atau tenaga medis lainnya di fasilitas pelayanan kesehatan.. Vaksin influenza digunakan untuk mencegah
    virus influenza sebagai langkah pencegahan penyakit flu dan komplikasinya. Antibodi yang dibentuk vaksin influenza akan
    memberikan perlindungan terhadap virus influenza. Vaksin influenza diberikan dapat diberikan mulai anak saat berusia 6
    sampai 23 bulan, dilanjutkan dengan pemberian vaksin tiap tahun ketika memasuki usia 18 bulan hingga 18 tahun. Setelah
    itu, vaksin influenza diulang setiap tahunnya untuk menjaga daya proteksi vaksin terhadap virus. Perhatikan jadwal vaksinasi
    yang dianjurkan oleh Ikatan Dokter Anak Indonesia (untuk anak) dan Perhimpunan Dokter Spesialis Penyakit Dalam Indonesia
    (untuk dewasa).. Vaksin influenza tersedia dalam bentuk injeksi dan hanya dapat diberikan oleh dokter atau tenaga medis
    profesional lainnya di fasilitas pelayanan kesehatan. Pastikan Anda memperoleh vaksinasi sesuai jadwal vaksin agar Anda
    tidak melewatkan vaksinasi apapun. Jika Anda melewatkan jadwal vaksinasi, beri tahu dokter atau perawat Anda, agar Anda
    mendapatkan jadwal pengganti sesegera mungkin.. Sebelum memperoleh vaksin influenza, informasikan pada dokter atau tenaga
    medis lainnya jika Anda memiliki riwayat alergi terhadap vaksin influenza dan golongan obat atau vaksin sejenis.. Vaksin
    Influenza dapat menimbulkan risiko efek samping. Konsultasikan kepada dokter bila Anda mengalami efek samping akibat vaksin
    influenza seperti berikut. Gangguan sistem pencernaan: Diare atau hilangnya nafsu makan. Gangguan pada area suntik: Kemerahan,
    nyeri, pembengkakan, atau sebuah benjolan pada tempat obat disuntikkan. Beberapa efek samping yang ditimbulkan vaksin
    influenza mungkin membutuhkan pertolongan medis yang segera. Jika Anda mengalami gejala di bawah ini, segera hubungi dokter.
    Reaksi alergi: Gatal atau ruam, dada sesak, kesulitan bernapas, dan pembengkakan pada wajah, tangan, mulut, atau tenggorokan.
    Gangguan sistem saraf: Sakit kepala, pusing, dan kejang. Gangguan otot, sendi, dan tulang: Nyeri otot atau sendi dan kelemahan
    pada otot. Jika terdapat efek samping lain yang tak kunjung membaik selama menerima vaksin influenza, segera hubungi dokter..
    Beberapa obat-obatan dapat mempengaruhi cara kerja vaksin influenza. Beri tahu dokter Anda bila Anda menggunakan obat-obatan
    di bawah ini sebelum menerima vaksin influenza. Imunosupresan: Azatioprin, adalimumab, tocilizumab, ocrelizumab, dan golimumab.
    Daftar obat ini belum mencakup semua obat yang mungkin berinteraksi dengan vaksin influenza. Beri tahu dokter atau apoteker
    Anda, jika Anda mengonsumsi obat lain, termasuk obat herbal seperti obat tradisional Tiongkok ( traditional Chinese medicine
    ), suplemen, dan obat yang Anda beli tanpa resep dokter lainnya.. Kategori Kehamilan B Kelas Terapi Vaksin, Antisera,
    dan Imunologikal. Merek Dagang* Flubio, Influvac, Fluarix, Vaxigrip, Fluquadri, dll. *Merek obat-obatan yang disebutkan
    mungkin tidak tersedia di Indonesia. Diskusikan dengan dokter atau apoteker terkait alternatif obat yang tersedia dan
    sesuai dengan kebutuhan medis Anda.'
