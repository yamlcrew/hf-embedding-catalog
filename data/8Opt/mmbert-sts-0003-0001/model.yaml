    một con đường sau một ngày mưa mùa hè, nhỏ như nó là khi nó được thành lập bởi 27 gia đình da đen trong những năm 1880.'
  - Một con mèo chơi với một chai nhỏ.
- source_sentence: Bom tự sát tấn công quân đội Ai Cập ở Sinai, giết chết 6 người
  sentences:
  - '"Satyrs không tồn tại" - tốt thôi.'
  - Bom tự sát tấn công quân đội Ai Cập ở Sinai, 4 người thiệt mạng
  - Người phụ nữ đang cắt thịt
- source_sentence: Chi phí chăm sóc trẻ em tăng gần 6%
  sentences:
  - Chăm sóc trẻ em 'tiêu tốn 15.000 bảng mỗi năm'
  - Một con chó đang chạy lên đồi
  - Không có con chó nào đuổi theo quả bóng trong cỏ.
