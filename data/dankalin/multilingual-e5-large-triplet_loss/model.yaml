- source_sentence: Какое значение апертуры миграции было использовано?
  sentences:
  - коэффициентов взаимной корреляции позволяют использовать полученные зависимости для построения карт ФЕС (в частности –
    карт значений эффективных толщин ) (Граф
  - Миграция выполнялась с использованием программы TIKIM до суммирования во временной области по классам удалений. Апертура
    миграции составила 3000 м
  - Предварительно с помощью модуля DINAT проводилась оценка углов падения для расчета AVO-атрибутов (рис. 3.6.1). Данные
    содержат углы падения до 46 для неокомских и 40 для ачимовских отложений
