- source_sentence: Какая методика структурных построений была использована при построении структурных планов по отражающим
    горизонтам юрского комплекса?
  sentences:
  - На юге и юго-востоке под эрозионной поверхностью подошвы юрского комплекса регистрируются крутопадающие волновые пакеты
    (Рис. 3.81). С целью получения более достоверных структурных построений корреляция преимущественного большинства ОГ выполнена
    по фазовым переходам. Горизонты М и НБВ2 прослежены по положительному экстремуму отражения, горизонт Б – по отрицательному.
    Временные и структурные поверхности ОГ использовались для палеоизохронных и палеоструктурных построений и для создания
    опорных трендовых моделей при выполнении инверсионных преобразований. 3.2.3
