      Triệu chứng đau từ nhẹ đến vừa như: Đau đầu, đau răng, đau bụng kinh, đau do thấp khớp, nhức mỏi cơ, cảm cúm. Hạ sốt
      trong các chứng sốt do cảm cúm hoặc do các chứng nhiễm trùng đường hô hấp.'
    - "Mô tả ngắn:\nTaniki 80  chứa  Cao bạch quả  (Ginkgo biloba extract) 80mg do  Công ty TNHH SX-TM Dược phẩm NIC (NIC\
      \ pharm) , Việt Nam sản xuất. Taniki 80 được chỉ định dùng trong các trường hợp suy tuần hoàn, phòng ngừa và làm chậm\
      \ quá trình tiến triển của bệnh Alzheimer, điều trị chứng đau cách hồi của bệnh tắc động mạch chi dưới mãn tính (giai\
      \ đoạn II), cải thiện  hội chứng Raynaud . \n Thuốc có quy cách đóng gói gồm hộp 10 vỉ x 10 viên nén bao phim.\nThành\
