widgetData:
- source_sentence: "task: classification | query: Cà phê tình phố núi\r\nỞ Đà Lạt có nhiều quán cà phê mà khách đến không\
    \ phải để uống nước. Họ vào đây là để tâm tình với người yêu, thậm chí sẽ tiếp đón tận tình, hết \"cô đơn\" nếu đi một\
    \ mình&\r\n\"Tình chính quy\" được dùng để ám chỉ những cặp tình nhân tìm quán cà phê để tâm tình. Ngòai bãi xe của quán\
    \ cà phê Tây Hồ trên đường Bà Huyện Thanh Quan có đến gần 70 xe gắn máy, nhưng bên trong quán không thấy một bóng người\
    \ nào. Trong bóng tối lờ mờ, người dẫn đường vén một bức màn để khách bước vào một căn phòng nhỏ. Sau khi gọi ly cà phê\
    \ và ly nước trái cây, khách hoàn toàn tự do. Ánh sáng không thể nào chui lọt vào những phòng rộng chừng 3m2 như thế này\
    \ với một chiếc bàn con và một cái ghế bành dài hơn 1m. Bức tường ngăn là tấm ván gỗ mỏng, không ngăn được những tiếng\
    \ thở hổn hển trong phòng."
  sentences:
