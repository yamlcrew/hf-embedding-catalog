- source_sentence: 'task: classification | query: Tổng thống Joe Biden (phía sau) và Thái tử Ả Rập Saudi Mohammed bin Salman
    (phía trước) đến chụp ảnh gia đình ở Jeddah, Ả Rập Saudi vào ngày 16 tháng 7 năm 2022.MANDEL NGAN/POOL/AFP qua Getty ImagesMối
    quan hệ giữa Mỹ và Ả Rập Saudi đang xấu đi. Nhà cai trị Ả Rập Saudi Mohammed bin Salman muốn khẳng định mình trên trường
    quốc tế. Ông đã làm bẽ mặt chính quyền Biden bằng cách hủy bỏ một thỏa thuận dầu mỏ bí mật. Tuần này, một cuộc tranh cãi
    ngoại giao giữa Mỹ và Ả Rập Saudi đã biến thành chuyện nhỏ nhặt gọi tên, một dấu hiệu công khai về tình trạng tồi tệ của
    mối quan hệ giữa hai nước. Cuộc trao đổi, được thúc đẩy bởi tranh chấp về sản xuất dầu, là một đòn giáng mạnh hơn vào
    một liên minh mà trong nhiều thập kỷ đã được đánh dấu bằng khả năng dự đoán: Mỹ cung cấp vũ khí và an ninh cho Saudis,
    và đổi lại có được'
  sentences:
  - Thời sự
  - cử đại diện đi họp
  - Sự tham gia của Mỹ vào các xung đột nước ngoài
