- source_sentence: 'task: sentence similarity | query: Cho dù bạn đang gia hạn bảo hiểm hiện tại, là người mới đủ tiêu chuẩn
    hay là người mới học lái xe, nếu bạn mua một chiếc xe được xếp hạng bảo hiểm ô tô nhóm 1 thì phí bảo hiểm của bạn sẽ thấp
    nhất có thể đối với bất kỳ loại ô tô nào có sẵn ở Vương quốc Anh.'
  sentences:
  - Bảo hiểm ô tô nhóm 1 ở Anh
  - Du lịch Việt Nam
  - đồng đảng với lũ kẻ cướp
- source_sentence: 'task: sentence similarity | query: chốc và lở; bệnh ngoài da nói chung do vi trùng gây nên, làm thành
    những mụn mủ, thường gây đau đớn và ngứa ngáy khó chịu, khi khỏi không để lại sẹo'
  sentences:
  - chốc lở đầy người
  - Người khổng lồ công nghệ
  - Giao dịch và đầu cơ tiền điện tử
- source_sentence: 'task: classification | query: Từ 3/2021 nay, Công an tỉnh Bình Dương tiếp 1,5 triệu hồ sơ đề nghị cấp,
    đổi, thẻ CCCD. Công an tỉnh phối hợp bưu điện 1,1 triệu thẻ dân. Hiện nay, bưu điện tỉnh 33.500 thẻ tải dân. Trường hợp
    thẻ trình đi CCCD, dân cung thông tin, giấy tờ cá nhân xác, trùng khớp sai lệch liệu dân cư hệ thống (sai địa chỉ, điện
    thoại, thay đối địa trú...) công an thời gian xác minh, bổ sung, chỉnh sửa, đối dân tạm trú. Cụ thể, đầu 2022 nay, 300.000
    hồ sơ CCCD tạm trú chậm tiến độ sai sót thông tin, 11.000 trường hợp sai sót hạn 6 Bộ Công an xóa liệu, buộc mời dân lại.
    Hiện nay, Công an tỉnh đạo đơn vị, địa phương phối hợp bưu điện tỉnh bưu điện địa phương nhanh chóng tất thẻ CCCD tồn
    đọng dân.'
  sentences:
  - chuối chín cây
  - xây dựng các làng xô viết ở nông thôn
  - Pháp luật
- source_sentence: 'task: classification | query: Rượu vang không chỉ là thức uống sang trọng trong các bữa tiệc mà còn là
    nguyên liệu tuyệt vời trong nấu ăn, đặc biệt là trong ẩm thực Việt Nam. Với một chút sáng tạo, bạn có thể kết hợp rượu
    vang đỏ hoặc rượu vang trắng vào nhiều món ăn Việt Nam truyền thống để tăng hương vị, khử mùi tanh và tạo chiều sâu cho
    món ăn.'
  sentences:
  - cuộc so găng giữa hai võ sĩ
  - Ẩm thực địa phương
  - Khoa học
- source_sentence: 'task: classification | query: Một thoáng Bách khoa'
  sentences:
  - năm nay trúng mùa lúa nhưng giá lại bèo quá!
  - Music
  - Khoa học
