widgetData:
- source_sentence: 'task: classification | query: Trong bài viết này chúng ta sẽ thảo luận: Lợi ích của năng lượng mặt trời
    trong trường học. Năng lượng mặt trời là nguồn tài nguyên đầy hứa hẹn và có giá trị cao cho tương lai, với xu hướng sử
    dụng loại năng lượng này ngày càng tăng, một số trường học đang tìm cách sử dụng nguồn năng lượng này hiệu quả hơn. Câu
    hỏi đặt ra là tại sao các trường học lại tìm kiếm sự chuyển đổi này? và làm thế nào năng lượng mặt trời có thể được sử
    dụng trong trường học? Năm 2020, Hoa Kỳ đã ghi nhận tổng cộng 7300 k-12 trường học sử dụng tấm pin mặt trời để tạo ra
    điện, với mức tăng trưởng hàng năm là 24% từ năm 2017 đến năm 2020. Việc lắp đặt tấm pin mặt trời trong trường học có
    thể giúp: Giúp các học khu giảm chi phí hóa đơn tiền điện. Mang lại một môi trường sạch sẽ cho học sinh. Nâng cao nhận
    thức về năng lượng tái tạo. Tận d'
  sentences:
  - trông người đã thấy hãm tài
  - Sức khỏe - Đời sống
  - Khoa học môi trường
- source_sentence: "task: classification | query: Vitaco chuẩn bị bán gần 19 triệu cổ phần\r\nNgày 9/12 tới, Công ty Vận tải\
    \ Xăng dầu (Vitaco) tổ chức bán đấu giá gần 19 triệu cổ phần qua Trung tâm giao dịch chứng khoán TP HCM và Hà Nội, với\
    \ giá khởi điểm 10.200 đồng/cổ phần.\r\nTheo Trung tâm giao dịch chứng khoán TP HCM, các pháp nhân, thể nhân có nhu cầu\
    \ tham gia mua cổ phần của Vitaco phải nộp hồ sơ đăng ký theo mẫu và đúng thời hạn. Số lượng cổ phần đăng ký mua tối thiểu\
    \ là 500. Mệnh giá 10.000 đồng/cổ phần.\r\nCông ty Vận tải Xăng dầu Vitaco, có trụ sở chính tại số 12 đường Lê Duẩn, quận\
    \ 1, TP HCM. Vốn điều lệ của Vitaco hiện nay là 400 tỷ đồng. Vitaco kinh doanh các sản phẩm xăng dầu bằng đường biển,\
    \ ngoại thương, cung ứng vật tư, đại lý tàu biển, vệ sinh... và dịch vụ môi giới hàng hải."
  sentences:
  - Kinh doanh quốc tế
  - Chứng khoán
  - bặm miệng lại
- source_sentence: "task: classification | query: Nhật Bản học tập kinh nghiệm điều trị cúm gia cầm của VN\r\nTrung tâm Y\
    \ tế Quốc tế Nhật Bản đã quyết định hợp tác với Bệnh viện Bạch Mai (Hà Nội) về chẩn đoán và điều trị cho các bệnh nhân\
    \ nhiễm virút cúm gia cầm thông qua truyền hình trực tiếp trên Internet, đồng thời cử các bác sĩ, chuyên gia y tế đến\
    \ thực tập tại bệnh viện Bạch Mai. Nhằm đối phó với dịch cúm gia cầm thể mới, Trung tâm Y tế Quốc tế Nhật Bản được chỉ\
    \ định là nơi chuyên chữa trị cho các bệnh nhân nhiễm virút cúm gia cầm. Tuy có nhiều trang thiết bị hiện đại, nhưng nhân\
    \ viên của Trung tâm vẫn còn thiếu kinh nghiệm thực tế. Thông qua hợp tác với bệnh viện Bạch Mai, Trung tâm hy vọng sẽ\
    \ đào tạo được một đội ngũ nhân viên có kinh nghiệm thực tế, có thể xử lý nhanh khi Nhật Bản có nhiều người bị nhiễm virút\
    \ cúm gia cầm."
  sentences:
  - Cúm gà
  - phục hồi lại nguyên trạng
  - '"Mỗi lần nắng mới hắt bên song, Xao xác, gà trưa gáy não nùng."'
- source_sentence: 'task: sentence similarity | query: phần nước đậm đặc, tinh tuý nhất do vắt, ép, ngâm hoặc nấu lần đầu
    mà có'
  sentences:
  - Giải trí; Âm nhạc
  - tóc bỏ lơi
  - nước cốt trầu
- source_sentence: 'task: sentence similarity | query: tập hợp 500 tờ giấy hay 20 thếp giấy, làm thành đơn vị để tính số lượng
    giấy'
  sentences:
  - bầu không khí nặng nề
  - Tổ chức toàn cầu
  - in hết hai ram giấy
