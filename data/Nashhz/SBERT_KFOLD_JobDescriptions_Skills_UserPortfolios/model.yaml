widgetData:
- source_sentence: Hello, I am Redoan Ahmad I'm a professional Graphic Designer who finds great joy in creating assets that
    not only meet the expectations of my clients, but exceed them and add to what has become a delightful portfolio of my
    work. I am an expert in the field, and specialize in many different aspects of design work, including but not limited
    to + Logos + Flyers + Brochures + Banners + Icons + Business card + Branding As you can see, I take on projects involving
    a plethora of different visual assets. I use the Adobe Suite Programs to create and perfect everything I make, both for
    my clients and on my own time, so I'm incredibly adept at
  sentences:
  - I'm in search of a designer who can help craft a unique and engaging digital portfolio for my company. The desired style
    of the portfolio is creative and artistic, so I'm looking for someone who can think outside the box and design a portfolio
    that truly stands out. Key components of the portfolio will include - Client testimonials These will need to be presented
    in an appealing way that showcases our strong relationships and positive feedback from our clients. - Project case studies
    I want to highlight some of our best work. This will require a designer who can help distill complex projects into easy-to-understand
    and visually appealing presentations. Ideal candidates for this project should be experienced in creating digital portfolios
    and have a strong design background. They should be able to demonstrate a flexible and creative design approach, with
    a portfolio that reflects a 'creative and artistic' style. Good communication skills are a must, as we will need to collaborate
    closely to ensure the final product meets our expectations.
  - I need a proficient developer who can replicate a Forex trading software for me. The software needs to include - Real-time
    data feed The software should provide up-to-the-minute information about the forex market. - Automated trading I want
    the software to have a feature that allows for trading without human intervention, based on pre-set parameters or algorithms.
    The final product needs to be compatible with Windows. Ideal candidates for this project should have substantial experience
    in creating or replicating trading software, particularly in the Forex sector. Knowledge of real-time data processing
    and automated trading systems is crucial. Please ensure your bid reflects your expertise in this field.
  - I'm seeking a talented graphic designer to assist with a short project. The tasks will include designing a logo, banners,
    and screenshots, as well as a favicon for our website, app stores, and social media platforms.
- source_sentence: Hello I am a skilled graphic designer, my designs are creative and based on modern strategies. The ones
    I create express the customer's brand language and make multiple connections with the audience. I am interested in engineering
    and through my work I try to meet customer requirements and expectations.. I am an experienced graphic designer who loves
    to create modern and unique designs. I specialize in personal calling and branding projects.!!
  sentences:
  - I'm seeking a talented graphic designer who can create engaging and visually appealing designs for my marketing materials,
    specifically for flyers and business cards. Ideally, the freelancer should have a keen understanding of design principles
    and be able to create designs that will capture attention and convey my brand message effectively. Skills and experience
    needed - Proficient in graphic design software such as Adobe Illustrator, Photoshop, etc. - Creative and innovative thinker
    - Strong understanding of design principles - Experience in designing marketing materials - Excellent communication skills
  - I'm looking for a skilled web application developer proficient in NodeJSTypescriptVue 3 to help me build an interactive
    web application. The main features of this project would include - Utilizing the Vue 3 Framework Prior experience in Vue.js
    is a must. Understanding of its core concepts and features is essential to deliver a high-quality application. - Payment
    Gateway Integration The application will require integration with a payment gateway such as Stripe or PayPal. Experience
    with these platforms is highly desirable. - User Authentication Clerk - Flexible Design The application should be able
    to accommodate future expansions or modifications, so a flexible design and coding approach is key. The main technologies
    that application will use are - NodeJSExpressTypescriptPrisma - Vue 3ShadCNTailwind CSS I have a detailed specification
    which I will share with those selected to be shortlisted. To be considered for this project 1. A brief summary of your
    experience in the core technologies I want to use for the App. 2. Please provide links for any projects which use Node
    JSExpressPrisma and Vue 3 If you have any further questions please reach out.
  - I'm in need of a talented graphic designer to create website graphics for my project. This includes designing banner images,
    icons, and infographics. Ideal Skills - Proficiency in graphic design software Adobe Illustrator, Photoshop, etc. - Strong
    portfolio of website graphics - Experience with designing for social media and ad campaigns Please note, the banner images
    will be used on the homepage, social media, and ad campaigns. A deep understanding of how to create engaging and impactful
    designs for these platforms is crucial.
- source_sentence: PHP Codeigniter Laravel Google Ads API - PHPPython Google AppsAds Script Bing Ads API Twitter API TikTok
    API FB API Google APIs GitHub login to view URL LinkedIn Profile login to view URL
  sentences:
  - I need a structural engineer to provide detailed engineering plans for a residential building. Specific Requirements -
    Foundation plans - Framing plans - Roof structure details Additionally, I need - Copies of the structural engineering
    details, including piers and footings. - A reference site classification report with a copy of the report provided. Ideal
    candidates should have - Extensive experience in structural engineering for residential buildings. - Ability to interpret
    and work from existing architectural plans. - Strong communication skills to provide necessary documentation clearly.
  - I'm looking for a talented web developer with a strong background in Shopify to create a robust e-commerce website for
    selling electronics and gadgets. Key Requirements - Expertise in Shopify You should have a deep understanding of the platform
    to build an effective, secure and user-friendly online store. - E-commerce Development Experience in creating e-commerce
    websites is essential. You will need to implement features that facilitate seamless shopping experiences. - Understanding
    of Electronics A knowledge of the electronics industry will be a plus, as it will help in designing the website Please
    note, this project does not include the add-on features such as product reviews, discount codes or customer account creation,
    but these may be discussed further down the line.
  - I'm looking for a professional with experience in WebSocket and Laravel to integrate Twilio and login to view URL into
    my Laravel Blade website. The primary function of Twilio will be enabling voice calls on the website. Key Tasks - Implement
    Twilio for voice call functionality on the website. - Integrate login to view URL's Natural Language Processing NLP capabilities
    into the site. Ideal Candidate - Proficient in Laravel and Blade. - Extensive experience with Twilio and Vapi.ai. - Strong
    knowledge of WebSocket. - Ability to implement NLP features effectively.
- source_sentence: I have 6-year experience as a Web Designer and WordPress Designer. 100+ completed projects. My Top Skills
    - HTML, CSS, Bootstrap 3 4 5 - Admin Dashboard - Email Template within 2 to 3 hours - Web Design - HTML5, CSS3 Canvas,
    SVG - PSD, FIGMA, ZEPLIN, XD, image, pdf to HTML, CSS Conversion - PSD, FIGMA, ZEPLIN, XD, image, pdf to Bootstrap Conversion
    - Animation, Slider - Fix Tailwind CSS - Photoshop intermediate - Adobe XD Mobile App any changes intermediate
  sentences:
  - I'm seeking a talented web developer with a keen eye for 3D design to revamp our current website. The job involves a complete
    overhaul of the website's layout, user interface, and 3D images. Key Requirements - Proficiency in 3D design You should
    be adept at enhancing textures, improving lighting, and updating models for a more engaging and visually striking website.
    - WordPress Expertise The new design should be compatible with WordPress, so prior experience with this platform is a
    must. Responsibilities - Redesign the website layout and user interface to improve overall user experience. - Update all
    existing 3D images, enhancing them with improved textures and lighting. - Ensure the website is fully functional on the
    WordPress platform. Ideal Candidate - A creative thinker with a strong background in both web development and 3D design.
    - Prior experience with WordPress and a portfolio that showcases your skills in revamping websites. - Excellent communication
    skills to ensure smooth collaboration and understanding of my vision for the project. I'd love to hear from you if you're
    confident in your ability to take on this project. Please include relevant samples of your past work in your application.
    Experience with Fancy Product Designer for customisations must be on time samples of what I want login to view URL login
    to view URL login to view URL
  - I'm looking for a skilled web developer experienced in web scraping to create a web scraper for me. Key Requirements -
    The scraper should be able to extract product prices from Amazon. Ideal Skills and Experience - Proficiency in Python
    and libraries like BeautifulSoup and Scrapy. - Previous experience scraping data from Amazon is a plus. - Strong understanding
    of web scraping ethics and legal considerations. Please include in your proposal examples of similar projects you've completed.
  - I'm looking for an expert mobile app developer who can create a comprehensive e-commerce app for both iOS and Android
    platforms. Key Features - User-friendly interface - Secure payment gateway - Real-time inventory updates - Customer review
    and rating system - Push notifications for sales and offers Ideal Skills - Proficiency in cross-platform mobile app development
    - Experience in e-commerce app development - Knowledge of UIUX design principles - Understanding of secure payment integration
    - Familiarity with inventory management systems Your expertise will help me reach my goal of launching a top-tier e-commerce
    app. Please provide your portfolio showcasing similar projects you've completed in the past.
- source_sentence: I have 15+ years experiences with web development, machine learning engineering and product development.
    I also have 5+ years experiences with team management for developing new product and maintaining old products.
  sentences:
  - I'm starting a web development company and need a senior WordPress developer who is proficient in PHP, JavaScript, HTML,
    and CSS. This role will require working closely with my designer to customize websites. Key Responsibilities - Custom
    theme development - Communicating with the Designer - Optimising websites for performance - Ongoing website maintenance
    The ideal candidate should - Have expert-level experience with custom theme development - Be eager to learn and adapt
    - Have a solid track record with WordPress - Know the pain points of WordPress and how to solve them - Benefit Experience
    with SEO Collaboration - We will be using TrelloWhatsappTeams for project management and collaboration tasks. Your ability
    to work as part of a team and communicate effectively will be crucial for our success. A passion for web development and
    a desire to be part of a growing company will make this a rewarding opportunity.
  - Job Title Freelance Graphic Designer Monthly Deliverables Minimum 30 Creative Designs Budget 10,000 Month Job Description
    We are seeking a Freelance Graphic Designer to create high-quality and creative visuals for our projects monthly. The
    ideal candidate will have experience designing a wide range of materials, including images for digital platforms, brochures,
    banners, PDFs, and other print-ready files. This remote freelance role is expected to deliver 30 designs per month. If
    you're passionate about visual design and can consistently meet deadlines with high-quality work, we'd love to hear from
    you! Key Responsibilities Create 30+ designs per month, including - Social media graphics - Flyers, brochures, and pamphlets
    - PDF print files - Flex banners and large-scale designs Design for multiple formats Digital websocial media and print
    brochures, banners, etc.. - Collaborate with stakeholders to ensure designs align with the brand and project goals. -
    Make revisions and adjustments based on feedback. - Prepare print-ready files with accurate specifications. --- Required
    Skills - Proficiency in Adobe Creative Suite Photoshop, Illustrator, InDesign or equivalent tools. - Strong understanding
    of layout, typography, and color theory, - Experience in designing for both digital and print mediums. - Knowledge of
    print specifications and formats CMYK, DPI, bleed, etc.. - Ability to work independently and deliver within deadlines.
    --- Preferred Qualifications - Prior experience as a freelance designer or working in an agency setting. - Experience
    with branding projects - Strong portfolio showcasing past work. --- Compensation - 10,000 per month for a minimum of 30
    imagesdesigns - Additional designs or complex projects may be compensated separately based on agreement. --- How to Apply
    Interested candidates should submit their portfolios and CVs this platform Please include samples of - Social media posts
    or marketing graphics - Print designs like brochures or banners - Any other relevant design work --- Additional Information
    - This is a remote freelance opportunity. - Payments will be made monthly upon submission and approval of deliverables.
    - Long-term collaboration opportunities available based on performance.
  - Seeking a talented content writer to create engaging and SEO-friendly articles across diverse markets. The candidate should
    possess strong expertise in producing content that not only resonates with readers but also performs well in search engine
    rankings. Please submit samples of your past work where you have successfully balanced keyword integration with compelling
    content.
