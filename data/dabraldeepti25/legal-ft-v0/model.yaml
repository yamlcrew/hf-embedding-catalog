widgetData:
- source_sentence: How much has the cost of using OpenAI's most expensive model changed compared to the previous pricing?
  sentences:
  - Synthetic data as a substantial component of pretraining is becoming increasingly common, and the Phi series of models
    has consistently emphasized the importance of synthetic data. Rather than serving as a cheap substitute for organic data,
    synthetic data has several direct advantages over organic data.
  - 'Here’s the rest of the transcript. It’s bland and generic, but my phone can pitch bland and generic Christmas movies
    to Netflix now!

    LLM prices crashed, thanks to competition and increased efficiency

    The past twelve months have seen a dramatic collapse in the cost of running a prompt through the top tier hosted LLMs.

    In December 2023 (here’s the Internet Archive for the OpenAI pricing page) OpenAI were charging $30/million input tokens
    for GPT-4, $10/mTok for the then-new GPT-4 Turbo and $1/mTok for GPT-3.5 Turbo.

    Today $30/mTok gets you OpenAI’s most expensive model, o1. GPT-4o is $2.50 (12x cheaper than GPT-4) and GPT-4o mini is
    $0.15/mTok—nearly 7x cheaper than GPT-3.5 and massively more capable.'
  - 'Then there’s the rest. If you browse the Chatbot Arena leaderboard today—still the most useful single place to get a
    vibes-based evaluation of models—you’ll see that GPT-4-0314 has fallen to around 70th place. The 18 organizations with
    higher scoring models are Google, OpenAI, Alibaba, Anthropic, Meta, Reka AI, 01 AI, Amazon, Cohere, DeepSeek, Nvidia,
    Mistral, NexusFlow, Zhipu AI, xAI, AI21 Labs, Princeton and Tencent.

    Training a GPT-4 beating model was a huge deal in 2023. In 2024 it’s an achievement that isn’t even particularly notable,
    though I personally still celebrate any time a new organization joins that list.

    Some of those GPT-4 models run on my laptop'
- source_sentence: What are some potential consequences of making decisions based on hype and misinformation?
  sentences:
  - 'The GPT-4 barrier was comprehensively broken

    In my December 2023 review I wrote about how We don’t yet know how to build GPT-4—OpenAI’s best model was almost a year
    old at that point, yet no other AI lab had produced anything better. What did OpenAI know that the rest of us didn’t?

    I’m relieved that this has changed completely in the past twelve months. 18 organizations now have models on the Chatbot
    Arena Leaderboard that rank higher than the original GPT-4 from March 2023 (GPT-4-0314 on the board)—70 models in total.'
  - 'I like people who are skeptical of this stuff. The hype has been deafening for more than two years now, and there are
    enormous quantities of snake oil and misinformation out there. A lot of very bad decisions are being made based on that
    hype. Being critical is a virtue.

    If we want people with decision-making authority to make good decisions about how to apply these tools we first need to
    acknowledge that there ARE good applications, and then help explain how to put those into practice while avoiding the
    many unintiutive traps.

    (If you still don’t think there are any good applications at all I’m not sure why you made it to this point in the article!)'
  - '17th: AI for Data Journalism: demonstrating what we can do with this stuff right now


    22nd: Options for accessing Llama 3 from the terminal using LLM




    May


    8th: Slop is the new name for unwanted AI-generated content


    15th: ChatGPT in “4o” mode is not running the new features yet


    29th: Training is not the same as chatting: ChatGPT and other LLMs don’t remember everything you say




    June


    6th: Accidental prompt injection against RAG applications


    10th: Thoughts on the WWDC 2024 keynote on Apple Intelligence


    17th: Language models on the command-line


    21st: Building search-based RAG using Claude, Datasette and Val Town


    27th: Open challenges for AI engineering




    July


    14th: Imitation Intelligence, my keynote for PyCon US 2024'
- source_sentence: What advancements have been made in multimodal vision and audio/video capabilities in LLMs?
  sentences:
  - 'The year of slop

    2024 was the year that the word "slop" became a term of art. I wrote about this in May, expanding on this tweet by @deepfates:'
  - 'The GPT-4 barrier was comprehensively broken

    Some of those GPT-4 models run on my laptop

    LLM prices crashed, thanks to competition and increased efficiency

    Multimodal vision is common, audio and video are starting to emerge

    Voice and live camera mode are science fiction come to life

    Prompt driven app generation is a commodity already

    Universal access to the best models lasted for just a few short months

    “Agents” still haven’t really happened yet

    Evals really matter

    Apple Intelligence is bad, Apple’s MLX library is excellent

    The rise of inference-scaling “reasoning” models

    Was the best currently available LLM trained in China for less than $6m?

    The environmental impact got better

    The environmental impact got much, much worse'
  - "Posted 31st December 2024 at 6:07 pm · Follow me on Mastodon or Twitter or subscribe to my newsletter\n\n\nMore recent\
    \ articles\n\nLLM 0.22, the annotated release notes - 17th February 2025\nRun LLMs on macOS using llm-mlx and Apple's\
    \ MLX framework - 15th February 2025\nURL-addressable Pyodide Python environments - 13th February 2025\n\n\n \n\n\nThis\
    \ is Things we learned about LLMs in 2024 by Simon Willison, posted on 31st December 2024.\n\nPart of series LLMs annual\
    \ review\n\nStuff we figured out about AI in 2023 - Dec. 31, 2023, 11:59 p.m. \nThings we learned about LLMs in 2024 -\
    \ Dec. 31, 2024, 6:07 p.m. \n\n\n\n            google\n            347\n\n\n            ai\n            1100\n\n\n   \
    \         openai\n            257"
- source_sentence: When did the author first run a large language model on their laptop?
  sentences:
  - '24th: Notes on the new Claude analysis JavaScript code execution tool


    27th: Run a prompt to generate and execute jq programs using llm-jq


    29th: You can now run prompts against images, audio and video in your terminal using LLM


    30th: W̶e̶e̶k̶n̶o̶t̶e̶s̶  Monthnotes for October




    November


    4th: Claude 3.5 Haiku


    7th: Project: VERDAD—tracking misinformation in radio broadcasts using Gemini 1.5


    12th: Qwen2.5-Coder-32B is an LLM that can code well that runs on my Mac


    19th: Notes from Bing Chat—Our First Encounter With Manipulative AI


    25th: Ask questions of SQLite databases and CSV/JSON files in your terminal




    December


    4th: First impressions of the new Amazon Nova LLMs (via a new llm-bedrock plugin)


    7th: Prompts.js'
  - '260 input tokens, 92 output tokens. Cost approximately 0.0024 cents (that’s less than a 400th of a cent).

    This increase in efficiency and reduction in price is my single favourite trend from 2024. I want the utility of LLMs
    at a fraction of the energy cost and it looks like that’s what we’re getting.

    Multimodal vision is common, audio and video are starting to emerge

    My butterfly example above illustrates another key trend from 2024: the rise of multi-modal LLMs.

    A year ago the single most notable example of these was GPT-4 Vision, released at OpenAI’s DevDay in November 2023. Google’s
    multi-modal Gemini 1.0 was announced on December 7th 2023 so it also (just) makes it into the 2023 window.'
  - 'My personal laptop is a 64GB M2 MacBook Pro from 2023. It’s a powerful machine, but it’s also nearly two years old now—and
    crucially it’s the same laptop I’ve been using ever since I first ran an LLM on my computer back in March 2023 (see Large
    language models are having their Stable Diffusion moment).

    That same laptop that could just about run a GPT-3-class model in March last year has now run multiple GPT-4 class models!
    Some of my notes on that:'
- source_sentence: What notable development in LLM technology occurred in the final quarter of 2024?
  sentences:
  - 'Now that those features are rolling out they’re pretty weak. As an LLM power-user I know what these models are capable
    of, and Apple’s LLM features offer a pale imitation of what a frontier LLM can do. Instead we’re getting notification
    summaries that misrepresent news headlines and writing assistant tools that I’ve not found useful at all. Genmoji are
    kind of fun though.

    The rise of inference-scaling “reasoning” models

    The most interesting development in the final quarter of 2024 was the introduction of a new shape of LLM, exemplified
    by OpenAI’s o1 models—initially released as o1-preview and o1-mini on September 12th.'
  - 'The year of slop

    Synthetic training data works great

    LLMs somehow got even harder to use

    Knowledge is incredibly unevenly distributed

    LLMs need better criticism

    Everything tagged “llms” on my blog in 2024'
  - 'Prompt injection is a natural consequence of this gulibility. I’ve seen precious little progress on tackling that problem
    in 2024, and we’ve been talking about it since September 2022.

    I’m beginning to see the most popular idea of “agents” as dependent on AGI itself. A model that’s robust against gulliblity
    is a very tall order indeed.

    Evals really matter

    Anthropic’s Amanda Askell (responsible for much of the work behind Claude’s Character):'
