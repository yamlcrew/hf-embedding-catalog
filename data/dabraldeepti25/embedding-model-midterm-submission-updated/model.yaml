  - "Destination Guide: London\n        \n        Overview and Cultural Context:\n        thumb|260px|Historical Routemaster\
    \ double-decker bus outside St Paul's cathedral\nNoisy, vibrant and truly multicultural, ''' London''' is a megalopolis\
