    بِمَا كَانُوا يَفْسُقُونَ
  - 'De ki, Allah''a ve Peygamber''e itaat edin! Eğer aksine giderlerse, şüphe yok ki Allah kâfirleri sevmez. 31- De ki: “Eğer
    Allah’ı seviyorsanız Bana uyun ki Allah da sizi sevsin ve günahlarınızı bağışlasın. Allah Ğafurdur, Rahimdir.” 32- De
    ki: “Allah’a ve Rasûl’e itaat edin.” Eğer yüz çevirirlerse bilsinler ki Allah kâfirleri sevmez. 31. Bu âyet Allah’ı gerçek
    anlamı ile sevenler ile bunu mücerred bir iddia olarak ileri sürenlerin kendisi vasıtası ile bilinip ayırt edildiği bir
    ölçüdür. Zira Allah’ı sevmenin alâmeti Muhammed sallallahu aleyhi ve sellem’e tabi olmaktır. Yüce Allah O’na ve O’nun
    dave'
  - 'Derken (Firavun ve adamları) güneş doğmuştu ki, onların ardına düştüler. İki topluluk birbirini görünce, Musa''nın adamları
    "Eyvah, yakalandık! dediler. Musa: "Hayır, aslâ! dedi, Rabbim şüphesiz benimledir, bana yolunu gösterecektir." Bunun üzerine
    Musa''ya "Vur asân ile denize" diye vahyettik; vurunca bir infilak etti, her bölük koca bir dağ gibi oluverdi, Ötekilerini
    de buraya yanaştırıvermiştik. Musa ve beraberindekilerin hepsini kurtardık, Sonra da ötekileri suda boğduk. Şüphesiz bunda
    bir âyet (ibret) vardır; ama çokları iman etmiş değillerdir. Ve şüphesiz, işte o Rabbin, mutlak galip ve engin merhamet
    sahibidir.'
