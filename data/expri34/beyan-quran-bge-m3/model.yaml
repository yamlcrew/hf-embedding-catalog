- source_sentence: كُلُّ نَفْسٍ بِمَا كَسَبَتْ رَهِينَةٌ
  sentences:
  - Ey iman edenler! Belli bir vade ile karşılıklı borç alış verişinde bulunduğunuz vakit onu yazın. Hem aranızda doğruluğuyla
    tanınmış yazı bilen biri yazsın. Yazı bilen biri, Allah'ın, kendisine öğrettiği gibi yazmaktan kaçınmasın da yazsın. Bir
    de hak kendi üzerinde olan adam söyleyip yazdırsın ve herbiri yazarken Rabbi olan Allah'dan korksun da haktan birşey eksiltmesin.
    Şayet borçlu bir bunak veya küçük bir çocuk veya söyleyip yazdıramıyacak durumda biri ise velisi doğrusunu söyleyip yazdırsın.
    Erkeklerinizden hazırda olan iki kişiyi şahit de yapın. Şayet iki tane erkek hazırda yoksa, o zaman doğruluğuna güvendiğiniz
    şahitlerden bir erkekle iki kadın ki, birisi unutunca, öbürü hatırlatsın, şahitler de çağırıldıklarında kaçınmasınlar;
    siz yazanlar da az olmuş, çok olmuş, onu vadesine kadar yazmaktan usanmayın. Bu, Allah katında adalete daha uygun olduğu
    gibi; hem şahitlik için daha sağlam, hem şüpheye düşmemeniz için daha elverişlidir. Meğer ki, aranızda hemen devredeceğiniz
    bir ticaret olsun, o zaman bunu yazmamanızda sizin için bir sakınca yoktur. Alım satım yaptığınız vakit de yine şahit
    tutun. Ayrıca ne yazan, ne de şahitlik eden bir zarar görmesin. Eğer onlara zarar verirseniz, o işte mutlaka size dokunacak
    bir günah olur. Üstelik Allah'dan korkun. Allah size ayrıntılarıyla öğretiyor ve Allah her şeyi bilir.
  - لِيَجْزِيَهُمُ اللَّهُ أَحْسَنَ مَا عَمِلُوا وَيَزِيدَهُمْ مِنْ فَضْلِهِ ۗ وَاللَّهُ يَرْزُقُ مَنْ يَشَاءُ بِغَيْرِ حِسَابٍ
  - Her nefis kendi kazancına bağlıdır.
