  - 'A toast to vintage reserve at The Yeatman in Porto

    Imagine waking up each day to the fruity aromas of a Ruby Reserva in the birthplace of Port Wine. The city of Porto is
    not only the home of Portuguese shipbuilding and fortified wines, it is the fascinating home of The Yeatman, a luxury
    hotel. Located in Vila Nova de Gaia, The Yeatman represents every aspect of Porto, from its merchant sailing history to
    its refreshing Portuguese culture and highly renowned varietals of Port.

    The Yeatman affords guests extreme lavishness accompanied by the highest quality hospitality through each of its 82 guest
    rooms and suites. Each guest space is incredibly spacious and affords views from the individual private terraces, overlooking
    the River Douro. The crown jewel of The Yeatman, the Bacchus Suite, expresses true indulgence in every appointment and
    accoutrements. Bask by the large fireplace in the conservatory or soak in the copper Jacuzzi tub while you become mesmerized
    by the views of the Port at night.

    Sipping Port by the Port

    If merchant trading is considered the body of Porto, food and wine are surely considered its heart and soul. At The Yeatman,
    culinary delights are integral to their hospitality philosophy. Guests have the immense privilege of tasting Michelin
    Star quality fare, paired with the finest wines, at the gastronomic restaurant. With an ever present focus on local produce
    and seafood from the port itself, the restaurant provides tasting menus designed to engage the senses and the spirit.

    Proving that true indulgence requires a total body experience, The Yeatman offers guests resplendent serenity at the Caudlie
    Vinotherapie Spa. Choosing from the many elite spa treatments may be a tougher decision than choosing your favourite wine.
    Fortunately, the spa therapists are fully equipped to guide you through their extensive spa menu. Experience a decadent
    Barrel Bath or Pulp Friction Massage with Fresh Grapes, then luxuriate in the hammam or indoor panoramic infinity pool.

    Vino is a Way of Life

    The Yeatman is a true wine hotel. Being situated in the Port Capital of the world transforms The Yeatman into a destination
    for wine lovers of all ages and levels of expertise. Not only will you find wine as the congruent theme throughout the
    property and accommodations, you will also discover the extensive wine cellar. Partnered with local Portuguese wineries,
    The Yeatman has the extreme pleasure of offering guests tasting and seminars relating to wine, as well as wine dinners
    which educated and expand the palette.

    Inclusive destination options are always on tap at The Yeatman. Guests will delight in the Spring and Summer Programmes,
    the Douro Experience, or the Spa Special Offers. For a superior quality, romantic getaway, experience the refinement and
    nuances of the Bacchus Suite Romantic Programme. Perfect for honeymooning couples, or couples who simply wish to reconnect
    in luxury, this package will provide every last detail to make the experience completely memorable.

    Port Wine is to Porto what excellence is to The Yeatman. A unique opportunity to enlighten your body and soul to the benefits
    of Port awaits each guest.'
