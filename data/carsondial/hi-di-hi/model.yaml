    - 'Readers of the Good Hotel Guide favour hotels that offer a glimpse of French life, preferably at places popular with
      locals and, whisper it, without many other British guests. This is a selection, from the 2005 Continental Europe edition,
      published last week, of individually owned and run hotels that offer those unique French values of bonhomie, good value
      and seriously good food.

      All the quotations here are from contemporary reader reports; the prices are in euros (€10=£7) for a room; dinner, bed
      and breakfast rates (D,B&B) are quoted, where appropriate, per person. Some hotels which open seasonally have yet to
      quote their 2005 prices.

      Pieds dans l''eau

      The French love of beach holidays is celebrated in hotels and resorts that avoid the kiss-me-quick brigade. But avoid
      August when all of France goes on holiday. Here are five hotels where you can dip your toes in the sea.

      1. Hôtel des Pins (See map below)

      L''Amélie-sur-Mer, Gironde (00 33 5 5673 2727; hotel-des-pins.com)

      On the outskirts of Soulac, a ''proper little seaside town'' on the Médoc peninsula, this white-fronted Logis de France
      is well run by the Moulin family, who have ''a fine sense of humour and an excellent staff''. Monsieur presents a demi-pension
      menu at breakfast; seafood is the speciality of the busy restaurant (with its huge fish tank); and a fine selection
      of Bordeaux wines is available. There is a large garden and a vast sandy beach is nearby (bring your own deckchair).

      The cost Rooms €40-€82, breakfast €6.50-€7.50, D,B&B €59-€68pp.

      2. Hôtel Restaurant L''Océan

      Le Bois-Plage-en-Ré, Île de Ré, Charente-Maritime (00 33 5 4609 2307; re-hotel-ocean.com)

      Advance booking is essential for Noël and Martine Bourdet''s two-star Logis de France. Just 500 metres from a prime
      stretch of sand, in ''a pretty, sleepy village'', it has ''seaside ambience and rural charm''. Public rooms have muted
      colours, wood panelling, Lloyd Loom chairs, and paintings by local artists. Bedrooms, with curved doors, gingham curtains,
      have beach hut-style wardrobes. Chef Yoann Leraut''s menus centre on fresh fish, simply prepared.

      The cost Rooms €70-€150. Breakfast €10. D,B&B €66-€150pp.

      3. Le Richelieu

      La Flotte, Île de Ré, Charente-Maritime (00 33 5 4609 6070; hotel-le-richelieu.com)

      On the north side of the Île de Ré, the Gendre family''s ''very fine'', modern, white hotel (Relais & Chteaux) is thought
      ''expensive, but worth every penny''. The public rooms have some ''splendid'' stained glass, notably a depiction of
      Richelieu. Chef Dominique Bourgeois has a Michelin star for his ''wonderful'' cooking (try the trilogie de St-Jacques)
      served in a panoramic dining room. The gardens are lovely; the swimming pool is large. The beach is across the road.

      The costRooms €125, suite €370. Breakfast €20. D,B&B €125-€325pp.

      4. Hôtel Le Mur du Roy

      Penvins, Morbihan, Brittany (00 33 2 9767 3408; lemurduroy.com)

      The setting of the Boyère family''s modern hotel, on the Rhuys peninsula in southern Brittany, is ''splendid'': ''A
      rough lawn leads to the sandy, rocky, sea-weedy beach.'' Many of the ''small, plain'' rooms face the sea, as do the
      sunny dining areas. Monsieur''s cooking, specialising in fruits de mer, is ''accomplished'', menus are ''perfectly balanced'',
      and ''service was faultless''. ''Excellent value, highly recommended.''

      The cost Rooms €57. Breakfast €10. D,B&B €35 added per person.

      5. Hôtel de la Plage

      Ste-Anne-la-Palud, Finistère, Brittany (00 33 2 9892 5012; plage.com)

      Beside a huge, secluded sandy beach in northern Brittany, this upmarket beach hotel (Relais & Chteaux) is run ''with
      panache'' by its owners, Anne and Jean Milliau Le Coz. The food is ''sublime'' (Hervé Pachoud, ''who enjoys strong flavours'',
      has a Michelin star); residents are served in a spectacular tiered conservatory dining room; and children are welcome.

      The cost Room €87-€290, suite €220-€300. Breakfast €16. D,B&B €147.50-€215pp.

      La Vie du Chateau

      The great French chateau hotels might be daunting, but there are some fine buildings run with a more relaxed style by
      their French owners.

      6. Château de Vault de Lugny

      Avallon, Yonne (00 33 3 8634 0786; ila-chateau.com/lugny)

      This Burgundian chateau was built in the 12th century, demolished in the 15th, and restored by the present owners, the
      Audan family, in the 20th. Dinner is served in the refectory, with all guests at one long table; regional specialities
      are featured, with vegetables, fruit, eggs and jam from the premises, ''but we do not eat our chickens or ducks since
      we regard them as our pets''. Superbly furnished rooms are individually designed.

      The cost Rooms: double €160-€290, suite €350-€460. Breakfast €5-€10. D,B&B €45 added per person.

      7. Château d''Igé

      Igé, Saône-et-Loire (00 33 3 8533 3399; chateaudige.com)

      ''With its thick, honey-coloured stone walls, it looks every inch a medieval manor house,'' reported our inspector.
      Owned by Françoise Germond Lieury, ''a very sympathetic hostess'', this 13th-century chateau stands in wooded grounds
      in a small village in the Mconais wine region. ''At dinner and breakfast, Madame came to each table, chatting with guests
      - so nice.'' Food is thought ''good, if a little fussy''. The suites in the turrets, with their circular rooms, are
      particularly attractive.

      The cost Rooms €95-€144, suites €175-€210. Breakfast €14. D,B&B €50 added per person.

      8. Château de Lalande

      Razac-sur-L''Isle, Dordogne (00 33 5 5354 5230; chateau-lalande-perigord.com)

      Between Bordeaux and the Dordogne, this small chateau, ''with slightly faded elegance'', is a modestly priced hotel-restaurant
      (Logis de France), run by owners Louis and Michèle Sicard. Chef Louis Sicard offers traditional dishes of the Périgord
      and of his native Provence. ''A really excellent, good-value meal; a wide-ranging, inexpensive wine list. The dining
      room was almost full, in midweek, and families with babies were well treated.''

      The cost Rooms €53-€83, suites €90-€150. Breakfast €7. D,B&B €60-€75pp.

      9. Manoir de Ponsay

      Chantonnay, St-Mars-des-Prés, Vendée (00 33 2 5146 9671; chateaux-france.com)

      The de Ponsay family, who have owned this 15th-century, red-brick chateau since 1644, welcome paying guests these days
      and our inspectors enjoyed the ''family feel'' with meals often served communally. The delightful rooms have a modern
      bathroom. ''A haven of rural peace and quiet'', the place has great charm. ''The two fox terriers are well behaved;
      one of them took us for a walk.''

      The cost Rooms €58-€105, suites €110. Breakfast €9. Set dinner (by arrangement) €32, including wine, coffee.

      10. Château de Trigance

      Trigance, Var (00 33 4 9476 9118)

      The welcome is ''warm and genuine'' at this former 10th-century fortress, near the awesome Gorges du Verdon; it is owned
      by the family of Claude Thomas; his ''charming'' son manages. It has sensational views from the battlements where an
      excellent breakfast and aperitifs are served. You ''need the agility of a mountain goat'' to reach the bedrooms along
      a wooden gangplank above a steep drop.

      The cost Rooms €105-€165, suites €185. Breakfast €13. D,B&B: double €201-€261, suite €281. Set meals €25-€65.

      Why settle for an anonymous hotel in the French capital when you can enjoy authentic Parisian character. Here are five
      hotels, of varying price, our readers particularly like.

      11. Hôtel d''Aubusson

      33 rue Dauphine, 6th arrondissement (00 33 1 4329 4343; aubusson-paris-hotel.com)

      Combining ''warmth and tradition with modern comforts'', this 17th-century mansion is within easy walking distance (via
      Pont Neuf) of the Louvre and Notre Dame. Bedrooms are ''comfortable, not OTT, with traditional French flowered fabrics
      and soothing shades of beige''. At weekends, when there is jazz in the cocktail bar, you should ask for a room at the
      back.

      The cost Rooms €270-€425. Breakfast €23.

      12. Hôtel Chopin

      10 boulevard Montmartre, 9th arrondissement (00 33 1 4770 5810)

      Philippe Bidal''s modest hotel (a listed historic monument) stands at the end of a glass-roofed, 19th-century arcade.
      It has been open for business every day since 1846. Many bedrooms and bathrooms are small, but it is liked for its ''cheerful
      staff'', ''faded elegance'' and ''value for money''. Idiosyncrasies include creaky lifts and antiquated plumbing.

      The cost Rooms €58-€86. Breakfast €7.

      13. Hôtel des Grands Hommes

      17 place du Panthéon, 5th arrondissement (00 33 1 4634 1960; hoteldesgrandshommes.com)

      Named after the ''great men'' entombed in the Panthéon opposite, this converted town house claims to be the birthplace
      of surrealism: many surrealist writers and painters stayed here. Furnished in ''high empire neo-classical style'', it
      is ''great fun''. From the top-floor rooms you can see Sacré-Cur. Breakfast, in a small vaulted cellar, is a buffet,
      or it can be brought to the room.

      The cost Rooms €90-€223, suites €180-€446. Breakfast €12.

      14. Relais du Louvre

      19 rue des Prêtres-St-Germain-l''Auxerrois, 1st arrondissement (00 33 1 4041 9642; relaisdulouvre.com)

      Puccini set La Bohème in this elegant 18th-century building, in a small street opposite the Louvre. Owned by Roger Thiery,''modern
      comfort accompanies ancient grace''. ''Everything on a small scale; our small bedroom, with small bathroom, was reached
      by a tiny lift.''

      The cost Rooms: single €99-€128, double €145-€180, suite €205-€244. Breakfast €10.

      15. Hôtel de Varenne

      44 rue de Bourgogne, 7th arrondissement (00 33 1 4551 4555; hoteldevarenne.com)

      Close to the Invalides and the Rodin museum, this hotel has been extensively renovated in Louis XVI and Empire style
      by new owner Jean-Marc Pommier. ''The rooms are comfortable and clean; bathrooms are spacious.'' Most face the ''quiet,
      lovely'' courtyard with its creepers, bushes and flowers. Continental breakfast is served until midday and can be taken
      in bed or in the courtyard in summer.

      The cost Rooms €117-€147. Breakfast €9; winter offer (to 28 February) €99-€129, including breakfast.

      Cuisine du terroir

      French travellers place a high premium on the pleasures of the table. You will often find that the food punches above
      its weight in modest country establishments. Particular pleasure is taken in regional cooking styles and produce. Here
      are five places you can expect memorable cuisine.

      16. Hôtel Chilo

      Barcus, Pyrénées-Atlantiques (00 33 5 5928 9079; hotel-chilo.com)

      South-west of Pau, in a tiny village on the edge of the Pays Basque, this old inn has been turned into a smart restaurant-with-rooms
      by owner/chef Pierre Chilo. Bedrooms and bathrooms vary in size: the cheaper annexe rooms are said to be ''basic''.
      But Guide readers love the ''excellent'' regional cuisine served in a néo-rustique dining room; dishes like brochette
      de chipirons et gambas (brochette of squid and prawns) and crépinette d''agneau aux pieds de porc et champignons sauvages
      (crepinette of lamb with pig''s trotters and wild mushrooms). Remarkable value, too.

      The cost Rooms €46-€85, suite €120-€140. Breakfast €8-€10. D,B&B €59-€108pp.

      17. Chez La Rose

      Juliénas, Rhône (00 33 4 7404 4120; chez-la-rose.fr)

      In a wine village in the Beaujolais, this restaurant-with-rooms is run by its owners, Sylvette Alizer (''she has a lively
      presence'') and her husband, Bertrand. He has a Michelin Bib Gourmand for his '' cuisine du terroir soignée ''. The
      restaurant is always bursting at the seams with a French/European clientele enjoying ''excellent'' food; perhaps dos
      de saumon sauce ciboulette (salmon filet with chive sauce); coq au vin de Juliénas; cassis (blackcurrant) sorbet; figues
      rôties et glace basilique (roasted figs with basil ice cream). Spacious modern suites are in a pavilion; simpler double
      rooms in an auberge down the road.

      The cost Rooms €60-€70, suite €68-€150. Breakfast €10. D,B&B €55-€100pp.

      18. L''Auberge de l''Âtre

      Les Lavaults, Yonne (00 33 3 8632 2079; auberge-de-latre.com)

      In a village in the Morvan national park, this is a restaurant-with-rooms for mushroom enthusiasts. The owners, chef/patron
      Francis Salamolard and his wife, Odile, are charming, say fans: He is '' fou de champignons '' (mad about mushrooms):
      fricassée of mushrooms is a speciality, and each bedroom is named after a species of mushroom. Sunday lunch is popular
      with discerning French families. Bedrooms are ''modern rustic'', ''large, well decorated, well kept''. The cooking earns
      a Michelin star but the prices remain reasonable.

      The cost Rooms: single €38-€58, double €69-€91. Breakfast €8.50. D,B&B €84pp.

      19. Hôtel La Reconce et Restaurant de la Poste

      Poisson, Saône-et-Loire (00 33 3 8581 1072)

      In south-west Burgundy, this Charolais house is now a restaurant-with-rooms (Relais du Silence). Run by owner/chef Jean
      Noël Dauvergne and his wife, Denise, it ''exemplifies all that is good about France'' at modest prices. Locals flock
      for the cuisine du terroir, perhaps carpaccio de buf, julienne de céleri et gingembre (celery and ginger salad); daurade
      (sea bream) à la plancha. Burgundies are at fair prices. The small bedrooms, in a separate building, are modern and
      well designed.

      The cost Rooms: single €54, double €76, suite €120. Breakfast €11. Set meals €25-€75.

      20. Hôtel du Midi-Papillon

      St-Jean-du-Bruel, Aveyron (00 33 5 6562 2604)

      For more than 150 years, four generations of Papillons have owned and run this former relais de poste (now Logis de
      France). It stands by a humpbacked medieval bridge in an old village on the River Dourbie, in the western Cevennes.
      Jean-Michel and Maryse Papillon preside. His cuisine du terroir ''gets better and better''. He raises his own chickens,
      makes charcuterie from local pork and jams from the fruit in his garden. The best bedrooms have ''delightful views of
      the river''.

      The cost Rooms: single €16.10-€34.50, double €31.90-€35.50, suite €57.50. Breakfast €4.80. D,B&B €20.60-€22.10 added
      per person.

      Where the French holiday

      Johnny Depp and Vanessa Paradis

      Johnny believes the Provençal farm he shares with Vanessa Paradis is a much better place to rear their children than
      Los Angeles. Depp has been spotted at the Carlton Inter-Continental (0800 028 9387; intercontinental.com), in Cannes.
      Kirker Holidays (0870 112 3333; kirkerholidays.com) offers a two-night stay at the Carlton from £454pp.

      The star of Betty Blue took time off to visit the historical collection of wooden beach chalets, built on stilts in
      1850s at Gruissan Plage, Languedoc.

      Lagrange Holidays (020 7371 6111; lagrange-holidays.co.uk) has apartments in Gruissan, one for six costs from £583 in
      July including return ferry crossing for a car.'
