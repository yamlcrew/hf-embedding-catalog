    While you''re there

    Rennes is the capital of Brittany region in France. The city of Rennes can be reached by the high speed TGV from Paris
    in 2 short hours. Rennes is the perfect base to visit other towns of Brittany, namely the Mont Saint-Michel and Saint-Malo.
    The city of Rennes is a dynamic city with over 50,000 students. The city has a rich architectural heritage, convivial
    restaurants and quality shops. When in Rennes, check street posters to track down a fest-noz – a time-honoured ball where
    generations meet to dance to traditional music and to drink and snack on authentic French delicacies. Take a night out
    to enjoy one of these rather than a nightclub and you’ll experience the real Rennes.

    In the historic centre, explore the narrow, winding streets. You’ll discover colourful half-timbered houses dating back
    to the 15th century, the Cathedral Saint-Pierre and the city’s defensive heritage. In Place des Lices, is held the second
    largest food market in France every Saturday. Other notable landmarksin Rennes are: the two royal squares, the City Hall
    designed by Gabriel, the architect of Louis XV, the Parliament of Brittany, the Champs Libres Centre designed by Christian
    de Portzamparc, the Museum of Fine Arts, the Jardin du Thabor considered as one of the most beautiful French gardens,
    and the Saint-Georges swimming pool with mosaics designed by Odorico.

    In Rennes you are most likely to have a taste of local specialities such as galettes and crêpes, pâtés, parlementins (pastries)
    and cider. If you are an amateur of fine cuisine, don’t miss the Festival Gourmand.

    Rennes has plenty of markets to keep your roving eye occupied. Every Saturday the central food market in the Place des
    Lices near the Medieval Quarter sells huge varieties of French specialties. For good value clothes, games and make-up
    visit the Galleries Lafayette Mall. Between Place Sainte Anne and Place de la Mairie, there are numerous pedestrian street,
    ideal to shop.

    Office de tourisme de Rennes

    11, rue Saint-Yves, 35064 RENNES CEDEX

    Tel: +33 (0)2 99 67 11 11

    The city’s tourist office has a helpful personnel, insider information and tips as well as handy maps and brochures. The
    city’s tourist office also arranges tours and excursions and is a focal point for local accommodation.

    Trains are a convenient way of reaching many towns and cities throughout Europe. The majority of cities in Europe have
    a minimum of one train station, while larger, more populated cities have two or more stations. Train stations, in general,
