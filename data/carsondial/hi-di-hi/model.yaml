    sentences:
    - 'Rose above expectations we had especially given it is a hostel and so cheap. Our balcony was lovely and definitely
      the best asset to the room. In addition everything was very cleanans the beds were very comfy. The hostel is far enough
      from the strip to guarantee some privacy and peace yet still has a very central positioning - and only a 2 minute walk
      frohtge beach.Only downsides - would have liked a fridge as standard inatead of having to pay (which as students we
      did not) and we had no ceiling fan, just a portable one that smelt slightly of burnt when left on.. Air conditioning
      would have been better as we had to sleep with the door open, got bitten , and because jakiton is next to the ''magaluf
      lively'' loud booming music from 9am was annoying. In addition although to owner was lovely i only saw her when we checked
      in. No personnel were ever there... It was an odd and slighly impersonal experience. We needed to ask her abour airport
      transfer times prices etc but she was nowhere to be found. Also cleaning staff incredibly grumpy.. Suggesting we were
      harbouring a third guest undercover, telling us off for having food in the room (despite the hostel clearly being non
      inclusive and us being students..) and generally goving a negative vibe as if we were in the wrong the whole time. On
      the whole a positive experience with great value for money, and would stay here again although would hope to see a fridge
      without having to pay..

      magalu from London, UK

      This hostal is located in Calvia (Magaluf), close to the beach, Palma Nova Beach, Golf Fantasia, and Pirates Adventure
      Show …More'
    - 'Summer is a time for exploration. Here are five places where you can find a new adventure:

      1 Learn about life in Cuba. With a strong focus on lifelong learning, Road Scholar educational adventures provide multigenerational
      travel opportunities in 50 states and 150 countries around the world. Now, you can travel to Cuba, where you’ll have
      the opportunity to meet with local community leaders, artists and local families to discuss the changes under way. Crafted
      for children 9 and older, and their adult family members, you’ll also visit local landmarks and sample local dance,
      music and cuisine.

      Contact: 1-800-454-5768; roadscholar.org

      2 Head south to ski. Consider trading ho-hum summer heat for the thrill of South American high country. From June through
      October, you can access premier powder in Chile and Argentina. The pros from U.S.-based Powder Quest can help you choose
      from snow ski tours, instruction-based outings and snowboard adventures in pristine mountain environments. There are
      also cat-skiing and heli-skiing options to provide a dual altitude and adrenaline fix.

      Contact: 1-888-565-7158; powderquest.com

      3 Dive the Great Blue Hole, Ambergris Caye, Belize. Scuba enthusiasts are eager to dive this large submarine sinkhole
      once explored by Jacques Cousteau. Located near the center of Lighthouse Reef, the Great Blue Hole is part of the large
      Belize Barrier Reef Reserve System, a World Heritage site. Experienced divers have the opportunity to see remarkable
      limestone formations as well as several species of shark in the crystal waters. The dive destination is 60 miles from
      Ambergris Caye; working with an experienced and reputable outfitter is essential. Las Terrazas Resort is a family-friendly
      condo-style hotel adjacent to the White Sands Dive Shop, where Professional Association of Diving Instructors-certified
      owner Elbert Greer will ensure your dive experience is top-notch.

      Contact: lasterrazasresort.com; whitesandsdiveshop.com; travelbelize.org

      4 Visit a castle, County Mayo, Ireland. Ashford Castle, built in the 13th century on the banks of the Lough Corrib and
      the River Cong, was once a monastery and later served as the Guinness family home.

      Check in with children 2 and younger and you’ll find a teddy bear and a full supply of baby care items waiting. Older
      children have their own bathrobes to get cozy after a day spent exploring the spacious grounds. Go for a private Hawk
      Walk, ride horses or learn the history of falconry with on-site experts. Plan to fly-fish for brown trout and salmon
      with Orvis-endorsed guides.

      Contact: ashford.ie; discoverireland.com

      5 Relax on the Long Beach Peninsula, Wash. A longtime favorite family beach destination, Washington’s Long Beach Peninsula
      is known for its lodging options, great birding, digging for razor clams, fishing and kite-flying.

      It’s also known for beach-driving. You can ride horses on the beach, go whale watching, enjoy area festivals and hike
      nearby trails.

      Contact: 1-800-451-2542; funbeach.com

      Lynn O’Rourke Hayes is the editor of FamilyTravel.com.'
    - 'In July, my husband and I went on our honeymoon in Negril, Jamaica. After scouring review sites, we decided on The
      Caves as our all-inclusive honeymoon destination.

      About The Caves: Situated among the cliffs in Negril, The Caves is a small resort with just 12 rooms. The rooms are
      spread out over 2 acres of lush plant life in a lovely labyrinth that fuels the seclusion of the property grounds. Among
      the highlights of the landscape are several cliffs to jump off into the clear blue waters. For those wanting to ease
      into the cliff jumps, there is a 10 foot jump, 20 foot jump and finally a 30 foot jump. For the especially brave, there
      is a jump into the blue hole- which is a short jump, but directly into a cave.

      Rooms: When I booked the hotel, the only option available was a ground floor- single room. As I later discovered, there
      are several rooms where a small cottage contained two rooms (top floor and bottom floor are separate hotel rooms). Unfortunately,
      when booking these rooms you are not given an option to select which room you prefer. With only twelve rooms, it is
      easy to find specific room reviews online. In addition to the single rooms, other rooms included the entire cottage
      served as one hotel room with a master bedroom on the second floor and living and/or dining space below. Finally, there
      is a larger 4 room house in the back of the property. Without personally checking out all the rooms, I can only comment
      on a few:

      - Blue Dolphin: This is the room we were in for our 7 night stay. It is a ground floor single room near the dinner dining/lounge
      area. From our porch, through the luscious greenery was a spectacular ocean view. There is a separate room right above
      in this cottage, but we never had any issues with noise. The room felt more secluded than some of the other rooms and
      I would recommend it for any future guests.

      - Blue Hole: This is a two story cottage right next to the Blue Hole jumping point. One of the guests who stayed in
      this room did mention the slight distraction of guests enjoying the nearby cliff jump.

      - Moon Shadow: A two story two bedroom cottage near the blue gazebo. Everyone who stayed in this room seemed to really
      like it. There is a separate bar/dining area downstairs and also features a private outdoor shower.

      Service: All of the room rates are all-inclusive, which is true to the term. All meals are included and there is unlimited
      access to the bar for Red Stripes or specialty cocktail drinks. It is important to note that the cocktails are all made-to-order
      (no pre-made mixes are used). Each bartender has their own style and usually there is a specialty drink of the day created
      by a different bartender. In the rooms, there is also a fridge which is restocked daily with water, sodas and Red Stripes.

      I’ve written a separate post on the delicious food we enjoyed at The Caves: The Caves in Negril, Jamaica: Food Review

      Spa: There is also a spa onsite offering a wide variety of services- facials using Aveda products, several types of
      massages, and more. Another couple raved about a coffee scrub they had on the final day of their vacation that felt
      extremely detoxing and invigorating. My husband and I opted for an hour long couples massage. The gazebo where the spa
      services are provided overlooks the crystal blue water and provides the most tranquil setting for any spa. (Services
      should always be booked in advance and are not included in the all-inclusive price.)

      Cave Dinner: This dinner is another option for guests is to book an extra special treat during their stay at The Caves.
      We were fortunate enough to book our dinner on an evening when it was much cooler in the Caves than usual. (Many guests
      complained of the humidity within the caves in the evening and the hotel staff even sets up a fan.) Walking down the
      stairs to the cave for dinner immediately filled me with excitement. The crashing waves created a blissful ambiance
      that was amplified by the dozens of candles setup to light the cave for our dinner. It was the most romantic setting
      one could ever imagine and of course, the meal was spectacular.

      Overall our honeymoon was more perfect than we could ever imagine. Even though we stayed for 7 nights, there were several
      activities (snorkeling, fishing, kayaking, etc) that we did not partake in as we chose to simply relax, take in some
      sun and all of the natural beauties within The Caves. I’m all for visiting different parts of the world or trying out
      new hotels and resorts if I repeat a travel destination, but I think we will have to put The Caves on our repeat list-
      after all, it was our honeymoon destination!

      More pictures below. Happy travels everyone!'
