  - 'Rose above expectations we had especially given it is a hostel and so cheap. Our balcony was lovely and definitely the
    best asset to the room. In addition everything was very cleanans the beds were very comfy. The hostel is far enough from
    the strip to guarantee some privacy and peace yet still has a very central positioning - and only a 2 minute walk frohtge
    beach.Only downsides - would have liked a fridge as standard inatead of having to pay (which as students we did not) and
    we had no ceiling fan, just a portable one that smelt slightly of burnt when left on.. Air conditioning would have been
    better as we had to sleep with the door open, got bitten , and because jakiton is next to the ''magaluf lively'' loud
    booming music from 9am was annoying. In addition although to owner was lovely i only saw her when we checked in. No personnel
    were ever there... It was an odd and slighly impersonal experience. We needed to ask her abour airport transfer times
    prices etc but she was nowhere to be found. Also cleaning staff incredibly grumpy.. Suggesting we were harbouring a third
    guest undercover, telling us off for having food in the room (despite the hostel clearly being non inclusive and us being
    students..) and generally goving a negative vibe as if we were in the wrong the whole time. On the whole a positive experience
    with great value for money, and would stay here again although would hope to see a fridge without having to pay..

    magalu from London, UK

    This hostal is located in Calvia (Magaluf), close to the beach, Palma Nova Beach, Golf Fantasia, and Pirates Adventure
