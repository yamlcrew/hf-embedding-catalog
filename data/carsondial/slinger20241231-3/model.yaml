  - 'How to Market & Sell a New Product

    Even if a company’s new product has significant competitive advantages, introducing it to the marketplace is extremely
    challenging. Customers need to be educated about the product’s uses and benefits, which requires an investment of both
    time and money. Many smaller companies with limited financial resources must think of creative, low cost methods of marketing
    their product.

    Identify your initial target markets--the groups of customers who are most likely to purchase the product or the easiest
    to reach with the marketing and promotion resources the company has available. Consider segmenting your market by geographic
    region and concentrating your resources on the region with the largest number of target customers and the weakest competition.

    Create a marketing budget for the next twelve months. Be realistic about what you will be able to spend on marketing and
    still cover the company’s other expenses, such as facilities costs and payroll. Allocate your financial resources so you
    can test-market your product with various strategies rather than putting all the money into one category, such as selling
    at trade shows.

    Determine the most powerful attributes of your product and showcase these in your marketing messages in each type of media
    you select. Look at what is truly unique, different and better about your product. You need to craft a message that sets
    your product apart from others currently available and attracts attention from target customers.

    Select distribution channels that give you the fastest access to customers. A consumer product manufacturer may find that
    it has difficulty getting large chain stores to stock its new, untested product. The company could reach out to customers
    with direct-response marketing--selling the product on TV infomercials. When the product becomes popular, the company
    will have a better chance of generating interest from large retailers.

    Choose an entry level price-point that is competitive--close to what your competitors are selling their product for. Don’t
    deeply discount the product in order to attract customers. Let the product’s attributes drive sales, not just price.

    Take advantage of low cost mass marketing through the Internet. Develop a website that presents the product, and your
    company, in an exciting way. Make it easy for the customer to buy the product by listing on your website all the places
    it is available. Obtain testimonials from satisfied customers and publish these on your website.

    Harness the power of publicity. Contact the business reporter at your local newspaper and tell her about the product.
    Craft an interesting press release that talks about how the product came to be, where you got the original idea for the
    product and why you thought it would be a winner.

    - Don’t panic if initial sales results from your marketing campaign are lower than expected. Some products take more time
    to gain customer awareness. You may need to fine-tune your marketing message and strategies, but don’t assume your product
    is a failure. Perseverance is important when introducing a new product.

    - Use every means possible to get the product in front of the customer. A manufacturer of grilling spices could give away
    product samples at gourmet food fairs or barbecue competitions. He could hand out order forms and product literature and
    tell these potential customers the many uses of the product.

    - Thomas Northcut/Lifesize/Getty Images'
