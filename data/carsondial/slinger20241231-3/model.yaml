  - 'What Does the Recent Cryptocurrency Exchange Hack Mean for Crypto Cyber Security?

    One of the largest cryptocurrency exchanges in Korea, Coinrail, was hacked in June. While Coinrail did not release an
    official figure for the stolen coins, The Guardian estimates that at least £27.8m worth of digital funds are now lost
    forever.

    The immediate result of the hacking was the mass selling of Bitcoins by investors, which led to the cryptocurrency dropping
    in price by 10%. Just an hour after the Coinrail confirmed the attack, Bitcoin lost £372 and settled at £4,955.

    A week after the attack, investors are still bearish towards Bitcoin. CNBC confirms that this downward spiral is due to
    the massive losses that Coinrail incurred from the hacking.

    The latest attack highlights the vulnerability of cryptocurrencies even if the blockchain technology is technically tamperproof.

    String of successful hackings

    This isn’t the first time that the cryptocurrency market has experienced a major hack. Japan’s online exchange Coincheck
    was hacked in January and £373 million worth of coins were stolen. In the following month, Italy’s Bitgrail was also hacked
    and lost £149 million worth of cryptocurrency. In April, Coinsecure reported that £2.47 million worth of Bitcoin was stolen.

    South Korea’s Youbit was also hacked twice, which led to its bankruptcy in December 2017.

    Coinrail is a fairly small exchange with roughly £2 million in daily trading volume. A representative of the Korea Blockchain
    Industry Association blames the lower security standards of small-scale online exchange operations that led to the hacking.

    How were the attacks carried out?

    The blockchain technology is supposed to be very secure, which is why the prices of Bitcoin soared over the past few years.
    Apart from astronomical prices, Bitcoin’s success gave birth to numerous cryptocurrency-based investment vehicles such
    as CME group’s Bitcoin Futures, which allows investors to purchase Bitcoin at a later date. Bitcoin Spreads also materialised,
    which allow investors to track the prices of Bitcoin. Nadex points out that Bitcoin Spreads allow investors to take short-term
    positions on Bitcoin’s price, which means they don’t need to buy actual cryptocurrencies to make a trade. As Bitcoin continues
    to grow, newer investment vehicles are born, and there’s no end in sight as to when Bitcoin’s popularity will cease.

    As investment vehicles like Bitcoin Spreads aren’t prone to theft, because investors are trading on the price of the cryptocurrency,
    the problem lies on actual Bitcoins themselves. Because blockchain is generally tamperproof, hackers try to find approaches
    to circumvent the technology’s security, and find weaker spots to carry out their attacks.

    In the same article by The Guardian, Naeem Aslam of ThinkMarkets said that the loose regulatory control of Bitcoin is
    one of the reasons why exchanges are being hacked. Aslam’s assumptions are backed by a blog post by Crossmatch, which
    details 5 ways on how hackers steal information from online exchanges. One of the stated reasons is cryptocurrency code
    vulnerabilities, which allows hackers to manipulate transactions at code-level in a Decentralised Autonomous Organisation
    (DAO). When there’s no high-grade security and regular security upgrades, exchanges are vulnerable to code manipulation,
    transaction malleability, phishing scams, and many others.

    The future of cryptocurrency security

    After the string of attacks to online exchanges, cryptocurrency developers are now scrambling to make security tougher.
    MIT Technology Review states that one of the solutions is the use of a multisignature address, which requires transactions
    to be activated with more than one cryptographic key. While it isn’t a perfect security system for cryptocurrency, it
    at least makes the hacking a little bit harder. With multisignature, hackers would need to steal information from multiple
    targets before a transaction can be made. An attack against a multisignature address is difficult, giving cryptocurrency
    owners time to regularly update their credentials and avoid hacking activity.

    Since cryptocurrency markets are deregulated, implementing multisignature address to all online exchanges will take time.
    As previously mentioned, Coinrail is a small-scale online exchange that has no high-grade security, and this may be the
    case for other online exchanges around the world.

    For the past year the eyes of the world have been on how quickly Bitcoin has evolved to become a dominant part of world
    finance. Now the world will be watching to see how well the cryptocurrency can protect itself from future attacks. The
    survival of cryptocurrency depends on the industry’s response to these attacks.'
  - 'Wall Street Journal doesn''t have exhaustive navigation items on their Health Blog but just top topics, which are their
    top tags. In what cases does this make sense to do?

    You''ll notice that the Wall Street Journal provides a Search utility in addition to tags and most popular content. They
    are providing multiple methods for users to find content.

    For dynamic content sites, the only navigation design that could possibly hope to hold up over time is a combination of
    search, index by date, tags and most-popular pages, which is what you see on blogs and sites like Stack Exchange.

    It pays to support the user''s own subjective sense that they are able to find what they are looking for, no matter what
    navigation model is used, either now or in the future. As Melguizo, vanOostendorp & Juvin found in "Predicting and Solving
    Web Navigation Problems", users who report feeling lost in a site perform worse on information retrieval tasks. Providing
    multiple methods to find content contributes to better orientation, which increases user''s confidence that they will
    find what they''re looking for.

    From the information point of view, list of categories has two dimentions, while top categories are just limited one dimentional
    element, which lead to information loss for a user. Take into account temporal stability of each solution. The rules of
    top category selection is hidden, too.

    Content categories are used not only as navigational element, but as a "table of contents", too. The number of posts within
    each category represents the blog specificity for a user. Also width (category amount) and deepth (# of posts within each
    category) of categories could be used for author''s assessment as a specialist in some fields. This adds third dimention
    to the list of categories.

    So even having Top posts, Search and other supporting tools, it''s better to keep list of categories.

    Conserning WSJ Health Blog, it''s a great example of the case when designer shouldn''t just copy big company''s solution
    without its critical analysis.

    Actually, I''d say they have confusing navigation. They do have categories below the fold. But:

    I think that for the purpose of providing good navigation a mix of Tags and Categories is a good idea, but it merely depends
    on your users.

    Pros and Cons: Categories and Tags

    When to Use Each?

    Imagine a blog, it puts on top every new article for readers to consume. When that article becomes old, it''s only findable
    through a search engine, tag navigation, category navigation and pagination.

    Using all of the way above increases the chances of your article to be findable.

    You can define the purpose of categories by creating different audiences for your blog. (Like a newspaper; entertainment,
    financial, sports, etc.)

    You can define tags specific to the article''s actors. Articles containing a last name might trigger the different results
    from different categories, but the category the belong to provides more context to the user. My last name might be found
    for example in the sports world as well as in the art world. But if somebody is looking for me specifically, they might
    know that i''m more likely to appear in the art world than in the sports one. Does this make sense?

    Hence if your audience''s niche is only one, the way to go is tags; But if you cover different audiences segmenting by
    categories also makes sense.

    Beware however, that if for example, an article failed to have a category or tag, then it''s only available through pagination
    or search, which might be annoying for some people..

    Hope this helps.

    Two factors come to mind:

    If you scroll down the page a bit you''ll see they they also list 20 "Categories" for users to choose from, so they aren''t
    just using "Top Topics" for their navigation.

    That said, it makes sense to feature popular or trending content up front because you know a large chunk of your traffic
    is going to be interested in it. This will take care of a lot of people without them having to dig.

    Unfortunately the difference between their Topics (sometimes also referred to as ''tags'') and Categories is not clear,
    and sometimes they use the same term in both, which is confusing.'
