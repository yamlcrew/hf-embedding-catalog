- source_sentence: '1. проверить , запущен ли процесс fox. Если запущен, закрыть

    2. открыть страницу в браузере. Адрес: avito.ru. Если будут напоминания для пользователя — согласится на все.

    3. навести мышь на меню Каталоги, дождаться появления подменю и навести мышь на меню «каталог автомобилей». Кликнуть мышкой

    4. найти все слова, которые выделены тэгом <h3>. Из списка сделать словарь, ключ - текст, значение — другие параметры
    в тэге.

    5. преобразовать словарь в датафрейм

    6. сгруппировать данные датафрейма. Если есть повторы в ключах, сделать один ключ, но с объединенным значением

    7. выгрузить датафрем обратно в словарь.

    8. Отправить сообщение в whatsapp об удачном завершении процесса'
  sentences:
  - 'Уведомление пользователя. describe: Выводит на экран всплывающее окно с указанным текстом. Приостанавливает работу алгаритма
    до нажатия ''ok''. Окно закрывается по нажатию кнопки ''ok''..Блок выводит на экран всплывающее окно с указанным текстом.
    Окно закрывается по нажатию кнопки ‘Закрыть’. Выполнение алгоритма приостанавливается во время отображения уведомления.
    Чтобы скопировать содержимое уведомления, необходимо нажать кнопку “Скопировать”..Показать сообщений пользователю. Показывает
    в отдельном окне.'
  - "Добавить строку в DataFrame. describe: Добавляет строку в dataframe по номеру..Блок позволяет добавить, перезаписать\
    \ и удалить строку в DataFrame. При этом необходимо указать сам DataFrame, строку для добавления/перезаписи и номер позиции..поскольку\
    \  DataFrame (датафрейм) это таблица, к ней можно добавить строчку, удалить строчку или изменить строчку\nПри добавлении\
    \ строки в датафрейм, нужно указать в какое место ее нужно поместить. \nПри удалении строки тоже нужно указать номер удаляемой\
    \ строки.\nИ при изменении строки тоже указывается номер строки\nПри добавлении или изменении строки указывается список\
    \ значений всех колонок\nПример\nДобавить строку в датафрейм dataframe\nУдалить строку из таблицы\nИзменить строку в датафрейме"
  - 'Запущен ли процесс. describe: Проверяет, запущен ли указанный процесс. Если хотя бы один экземпляр процесса запущен,
    то вернет True, иначе - False..Блок проверяет, запущен ли указанный процесс. Если хотя бы один экземпляр процесса запущен,
    то вернет “истина”, иначе вернет “ложь”.."Запущен ли процесс" — это вопрос, касающийся текущего состояния процесса в операционной
    системе, обозначающий его активность или присутствие в системе. Процесс считается запущенным, если он был инициирован
    и выполняется в данный момент времени. Для проверки, запущен ли процесс, операционная система использует таблицы процессов,
    где каждый процесс имеет свой уникальный идентификатор (PID) и информацию о его статусе. Когда процесс находится в активном
    состоянии, он использует ресурсы системы, такие как CPU и память, для выполнения своих задач. Проверку статуса процесса
    можно осуществить с помощью различных инструментов, например, с помощью командной строки или графических интерфейсов,
    отображающих активные процессы.'
- source_sentence: "1. открыть Excel\n2. перейти на страницу «Итого»\n3. переместиться на кнопку «Стрелка вправо»\n4. прокрутить\
    \ колесико мышки ровно 4 секунды, со скоростью 30 пикселей в секунду\n5. дальше выбор. Если в центре экрана видна печать\
    \ NASA (пример есть в файле nasa.logo), то в переменную param записать Истина\n6. если в ровно в центре экрана нет печати\
    \ NASA, то в переменную param записать None (не путать с ложь)\n7. если в переменной param записано None, найти в папке\
    \ dir файл Roscosmos.data.\n8. открыть , прочитать все строки. Преобразовать строки в таблицу. Поставить фильтр на первой\
    \ колонке , равенство, Роскосомос. \n9. полученную таблицу распечатать на принтере Printer1"
  sentences:
  - 'Удалить дубликаты. describe: Удаляет повторяющиеся элементы списка. Возвращает список уникальных элементов..Блок удаляет
    повторяющиеся элементы списка, возвращает список уникальных элементов..Аналог функции  list(set()) в python. Удаляет дубли.
    Сначала делаем множество, где одинаковые элементы объединяются, а потом из множества делаем список

    Примеры:

    Удалить дубли

    Получить уникальные значение'
  - "Фильтровать табличные данные. describe: Фильтрует табличные данные по указанному столбцу и операции..Блок позволяет Фильтровать\
    \ табличные данные. Необходимо указать:Таблицу - Путь к файлу или DataFrame источника данных;Столбец или список столбцов\
    \ - Столбец или список столбцов для фильтрации;Операция - Операция сравнения для фильтрации;Значение - Значение или список\
    \ значений для фильтрации;Движок обработки данных - Определяет способ использования ресурсов процессора при обработке\
    \ таблиц.Для визуальной работы с данными, кликните по кнопке:Визуализация данныхФорма визуализации данных - встроенный\
    \ инструмент Puzzle RPA, который позволяет загружать и просматривать различные наборы данных..датафрейм, как таблица,\
    \ может быть использован для быстрой фильтрации. Можем наложить отбор на любую колонку и посмотреть что останется\nЗначение\
    \ в колонке , на которую накладывается отбор может проверяться на:\nРавенству какому либо значению\nНе равенству\nНа меньше\n\
    Больше\nЕсли в колонке есть пустые значение\nНаоборот, выбрать те, где заполнено \nВ списке значений\nПримеры\nОтфильтровать\
    \ данные по колонке\nОставить только те строки, где..\nНаложить отбор на датафрейм"
  - 'Изменить порядок. describe: Блок меняет порядок списка на обратный..Инвертирует строку. Последний символ становится первым.
    А первый последним.

    Например

    Инвертировать строку «полисад». Ответ «дасилоп».'
- source_sentence: Скопировать число в файле Excel в столбце "Количество в граммах". Извлечь данные из буфера обмена и выполнить
    деление этого числа на 1000. Вызвать через командную строку калькулятор и на калькуляторе возвести в квадрат результат
    деления
  sentences:
  - 'Прочитать письма. describe: Считывает письма электронной почты с указанными параметрами..Блок позволяет прочитать письма
    по IMAP.Требуется указать:Данные почтового аккаунта, который будет прочитан;Адрес сервера;Папку для сохранения вложений
    из писем.Дополнительно нажатием на “+” можно добавлять следующие параметры:Дату, с которой получать сообщения;Дату, до
    которой получать сообщения;Отправителя;Получателя;Тему сообщения;Тело сообщения;Подстроку в теме или теле сообщения;ID-сообщения;Наличие
    вложения;Наличие флага;Получить только не прочитанные;Отметить сообщение прочитанным;Отметить сообщение флагом.Некоторые
    почтовые сервисы не поддерживают работу всех фильтров..процесс получения и отображения содержания электронного письма,
    отправленного через почтовую службу, в почтовом клиенте или веб-интерфейсе. Он включает в себя доступ к почтовому ящику,
    выбор конкретного письма и его открытие для просмотра. При этом письма могут содержать текст, вложенные файлы, изображения
    и ссылки, которые пользователь может просмотреть. Во время чтения письма происходит декодирование и отображение данных,
    полученных с почтового сервера. Этот процесс может быть выполнен как на компьютере, так и на мобильных устройствах через
    специализированные приложения или веб-сайты'
  - 'Остановить секундомер. describe: Останавливет секундомер и сохраняет результат в переменню.Блок останавливает секундомер
    и сохраняет результат в переменную. Единица измерения времени - секунды..действие, заключающееся в прекращении отсчёта
    времени, фиксируемого устройством, предназначенным для измерения интервалов времени. Обычно, секундомер активируется нажатием
    кнопки, и его остановка происходит также нажатием на соответствующую кнопку или команду. После остановки секундомер фиксирует
    текущий результат в виде времени, прошедшего с начала отсчёта. Остановка может быть выполнена вручную или автоматически,
    в зависимости от типа устройства. После остановки можно записать результат или повторить отсчёт времени, начиная новый
    цикл'
  - 'Арифметические операции. describe: В блоке есть два паза для добавления чисел, кликнув по текущему условию, можно выбрать
    операцию, которую требуется произвести с числами. Блок имеет выпадающее меню. Клик по символу раскрывающегося списка открывает
    следующее меню:В меню представлены следующие опции:+ -возвращает сумму двух чисел;-- возвращает разность двух чисел;×-
    возвращает произведение двух чисел;÷ -возвращает частное от деления первого числа на второе;^- возвращает первое число,
    возведенное в степень второго..Нужен для

    Сложения (+)

    Вычитания (-)

    Умножения (*)

    Деления (/)

    Возведение в степень (^)

    двух чисел.

    Например:

    Сложить два числа

    Найти остаток

    5*9 = 45

    1-8=-7

    2:2 = 1

    Увеличить число на 8'
- source_sentence: '1. подключиться к базе данных Postgres. Параметры подключение взять из глобальных переменных

    2. таблица Date, выбрать все даты прошлого года (list1)

    3. таблица Numbers, выбрать все числа, которые не делятся на 2 (list2)

    4. все даты в list1 преобразовать в строки в формате YyYy:Dd:Hhhh

    5. для всех чисел list2 найти остаток от деления на 5.

    6. объединить оба списка в один list3. Сохранить список в текстовый файл file.txt

    7. проверить, если логин пароль для доступа на сайт my_fork.fr

    8. если нет, то добавить с логином ME паролем 123dfg

    9. загрузить file.txt на сайт my_fork.fr'
  sentences:
  - 'Сделать скриншот. describe: Сохраняет в файл скриншот всего экрана..Блок сохраняет в файл скриншот всего экрана. Требуется
    указать путь к файлу с указанием названия и расширения файла (.png). Файл будет создан автоматически по указанному пути..процесс
    создания цифровой копии изображения или изображения и текста, отображаемых на экране компьютера или другого устройства,
    такого как смартфон или планшет. Эта операция позволяет сохранить текущее состояние дисплея в виде файла, который может
    быть использован для различных целей, включая демонстрацию ошибок программного обеспечения, сохранение важной информации
    или обмен изображениями через интернет. Скриншоты обычно сохраняются в форматах изображений, таких как PNG, JPEG или BMP.
    Для создания скриншота используются встроенные средства операционной системы, специализированное программное обеспечение
    или горячие клавиши на клавиатуре. Полученные скриншоты могут быть редактированы с помощью графических редакторов для
    выделения важных элементов или добавления комментариев перед тем, как их использовать'
  - 'Триггер по письму. describe: Ждет появления определенного сообщения в электронной почте..Блок ожидает появление определенного
    письма в электронной почте.Требуется указать:Данные почтового аккаунта, который будет прочитан;Адрес сервера;Время ожидания.Дополнительно
    нажатием на “+” можно добавлять следующие параметры:Отправителя;Получателя;Тему сообщения;Тело сообщения;Подстроку в теме
    или теле сообщения;Наличие вложения;Отметить сообщение прочитанным;Отметить сообщение флагом.Некоторые почтовые сервисы
    не поддерживают работу всех фильтров..автоматическое событие или условие, которое активируется при получении нового письма
    на электронную почту. Этот триггер может быть настроен для различных действий, например, отправки уведомлений, переноса
    письма в определённую папку или запуска скрипта. Он работает на основе заданных критериев, таких как отправитель, тема
    письма или ключевые слова в содержимом. Триггер может быть реализован в почтовых клиентах или с помощью серверных автоматизаций,
    например, через API почтовых сервисов. Основной целью является автоматизация обработки входящих сообщений без необходимости
    вручную отслеживать каждое письмо'
  - 'Остаток от деления. describe: Блок возвращает остаток от деления двух чисел..Математическая операция , которая получает
    остаток от деления двух чисел

    В python это операция %.

    Например

    Найти остаток от деления 15 на 3. Ответ 0

    Найти остаток от деления 15 на 10. Ответ 5'
- source_sentence: с помощью bash скрипта узнать все рабочие процессы. В цикле начать их обходить. Если процесс начинается
    на цифру, то остановить его. В файле delete_processes.txt дописать имя закрытого процесса
  sentences:
  - 'Переключиться на процесс. describe: Блок позволяет подключиться к запущенному процессу «1С», для дальнейшего взаимодействия
    с программой..Если толстый клиент 1с открыт, но был свернут, этот блок может вернуть в фокус 1с предприятие. '
  - 'Дописать в файл. describe: Дописывает текст в конец указанного текстового или json-файла..Блок дописывает текст в конец
    указанного текстового или json-файла..В конец текстового файла с расширением txt или json дописать текст

    Примеры

    Добавить в текстовый файл

    Дописать текст в файл'
  - 'Прочитать из Word. describe: Считывает содержимое указанного документа Word. Возвращает считанные данные в виде строки..Блок
    считывает содержимое указанного файла Word, Поддерживаемый формат файла - docx. Возвращает строку, в строке содержатся
    данные форматирования..ворд это текстовый документ, с возможностью форматирования текста. Этот текст можно прочитать в
    переменную и потом обрабатывать текст. Укажите путь к word файлу и файл будет прочитан

    Примеры

    Прочитать ворд

    Получить текст из word файла'
