widgetData:
- source_sentence: "VCH qualifies as a service-disabled veteran-owned small business and is an actual offeror on the \nSDVOSB\
    \ Pool Solicitation under the Polaris Program.  VCH Compl. ¶¶ 2, 5.  Both SHS and VCH \nalso claim to be prospective offerors\
    \ on the SB Pool Solicitation.  SHS Compl. ¶ 5; VCH Compl. \n¶ 5.  Both SHS and VCH state they have prepared, but not\
    \ yet formally submitted, proposals in"
  sentences:
  - What type of request must be submitted according to the information security procedures?
  - On which solicitation is VCH an actual offeror?
  - According to which U.S. Code section is the term 'infrastructure security information' defined?
- source_sentence: "Count Nine in No. 11-444: May 13, 2010 FOIA Request to the CIA \nFirst, the CIA refused to process the\
    \ plaintiff’s FOIA request which sought “a \nrepresentative sample of [CIA] analytical reports and memoranda presenting\
    \ psychological \nanalyses or profiles of foreign government officials, terrorist leaders, international criminals,"
  sentences:
  - Under what section were 'Regional Boards' considered 'agencies'?
  - What is the count number associated with the May 13, 2010 FOIA Request to the CIA?
  - What type of contracts does FAR 37.102(a) most prefer?
- source_sentence: "records referencing FOIA and Privacy Act requests submitted by [ten listed parties] that contain \nremarks,\
    \ comments, notes, explanations, etc. made by CIA personnel or contractors about the \nprocessing of these requests (and\
    \ appeals, if appropriate), the invocations of exemptions, or \nrelated matters.”  See Decl. of Martha M. Lutz (Sept.\
    \ 26, 2012) (“Third Lutz Decl.”) Ex. A at 1,"
  sentences:
  - What is mentioned as possibly contradicting the defendant's statement?
  - On what date is the document 'Third Lutz Decl.' declared?
  - What does the plaintiff argue regarding the phrase 'on notice'?
- source_sentence: "“[a]gencies shall evaluate all proposals in accordance with 15.305(a), and, if discussions are to be \n\
    conducted, establish the competitive range.  Based on the ratings of each proposal against all \nevaluation criteria,\
    \ the contracting officer shall establish a competitive range comprised of all of \nthe most highly rated proposals .\
    \ . . .”  FAR 15.306(c)(1) (emphasis added).  This last provision"
  sentences:
  - Who establishes the competitive range based on proposal ratings?
  - What type of basis are the services to be acquired on?
  - What is the source of the statement quoted about the agencies and advisory committees?
- source_sentence: "for a specific procurement through separate joint ventures with different protégés.”  Id.  The SBA \n\
    underscored this purpose by highlighting that in acquiring a second protégé, the mentor “has \nalready assured SBA that\
    \ the two protégés would not be competitors.  If the two mentor-protégé \nrelationships were approved in the same [North\
    \ American Industry Classification System] code,"
  sentences:
  - Where can the details of the CIA's framing of the plaintiff's injury be found?
  - What is the context of the mentor-protégé relationships mentioned?
  - What requirement does the FOIA have regarding the release of segregable portions of a record?
