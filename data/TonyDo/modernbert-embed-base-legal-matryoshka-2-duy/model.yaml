widgetData:
- source_sentence: "Exemption 2 “are internal training documents containing the procedures and guidelines utilized \nby CIA\
    \ officers in processing FOIA and Privacy Act requests.”  Third Lutz Decl. ¶ 31.  The \nplaintiff concedes that “the withheld\
    \ records . . . technically pertain to personnel, in that they are \ninstructions for personnel to follow.”  Pl.’s First\
    \ 445 Opp’n at 9.  The plaintiff nevertheless"
  sentences:
  - What is the case number associated with the legal case?
  - What does the plaintiff concede about the withheld records?
  - When did the plaintiff narrow its processing notes requests to the DIA and the ODNI?
- source_sentence: "¶ 15. If plaintiff did not file a response, that makes the need for a transcript even more clear. The\
    \ trial \ncourt’s order stated that it was fully advised. By process of elimination, the only place that would reflect\
    \ \nwhat the court was fully advised of, if no response was filed, would be in a transcript or bystander’s \nreport. \
    \ \n \n- 10 - \n \n¶ 43 \n \nJUSTICE HYMAN, specially concurring: \n¶ 44"
  sentences:
  - On what date did the reported milestone occur?
  - What did the trial court's order state?
  - What event occurred after the person sat back?
- source_sentence: "addressed in the context of the pending motion for summary judgment in [No. 11-444].”  Id. \nUnfortunately,\
    \ the electronic records issue cannot be “more efficiently addressed in the \ncontext of the pending motion for summary\
    \ judgment in [No. 11-444].”  See id.  As discussed \nabove, the CIA has not specifically addressed that issue in moving\
    \ for summary judgment in No."
  sentences:
  - How is the 'Argument' section of the defendant's motion divided?
  - In moving for summary judgment in No. 11-444, what has the CIA not specifically addressed?
  - What is the purpose of photographs being admissible in court?
- source_sentence: "disclosed information. \nThe CIA justifies its withholding of information under FOIA Exemption 1 by stating,\
    \ \ninter alia, that “the documents at issue implicate intelligence activities.”  See Second Lutz Decl. \n¶ 28.  Specifically,\
    \ “the withheld information would reveal the Agency’s presence in certain"
  sentences:
  - What is one reason the CIA gives for withholding information?
  - Which legal provisions are often invoked together?
  - What section is the Commission not considered an agency under?
- source_sentence: "time-and-materials contracts, contrary to Plaintiffs’ position.  See Cross-MJAR at 56.  The \ninclusion\
    \ of these terms in the statute is not inconsistent with Plaintiffs’ interpretation that “based \non hourly rates” references\
    \ time-and-materials and labor-hour contracts.  Both “delivery order” \nand “cost” are used throughout FAR Subpart 16.6\
    \ to prescribe the requirements for time-and-"
  sentences:
  - What do SHS and VCH MJAR both state about the Agency's evaluation of protégés?
  - What do Plaintiffs argue the phrase 'based on hourly rates' references?
  - What does Defs.’ Mem. reference in terms of page numbers?
