widgetData:
- source_sentence: What is the significance of the tables 6.1.6.2.5-1 and 6.1.6.2.6-1 in the context of the Namf_Communication
    Service API?
  sentences:
  - The 'notifId' attribute in the PolicyDataSubscription type serves as a Notification Correlation ID assigned by the NF
    service consumer. It is included when the 'ConditionalSubscriptionwithPartialNotification' or the 'ConditionalSubscriptionWithExcludeNotification'
    feature is supported. This ID is used to correlate notifications with the specific subscription request, ensuring that
    the NF service consumer can track and manage notifications effectively.
  - The 'sessRuleReports' attribute in the 'ErrorReport' type is specifically used to report failures related to session rules,
    whereas the 'ruleReports' attribute reports failures related to PCC rules. 'sessRuleReports' contains an array of 'SessionRuleReport'
    objects, which provide details about the session rule failures. Like 'ruleReports', it is optional and can have one or
    more entries (cardinality 1..N).
  - Tables 6.1.6.2.5-1 and 6.1.6.2.6-1 are significant in the Namf_Communication Service API as they provide the definitions
    for the types 'AssignEbiData' and 'AssignedEbiData', respectively. These tables outline the structure, attributes, and
    possibly the constraints or rules associated with these data types, which are essential for understanding and implementing
    the API's functionality related to EBI assignment and management.
- source_sentence: What document defines the basic principles for online charging, and where is this information referenced?
  sentences:
  - The UDM (Unified Data Management) returns the Ranging and Sidelink Positioning Subscription Data for the UE (User Equipment)
    identified by the supi (Subscription Permanent Identifier). This data is retrieved using the GET method, which supports
    the URI query parameters outlined in table 6.1.3.37.3.1-1.
  - The Nsmf_PDUSession_SMContextStatusNotify service operation is used by the SMF (Session Management Function) to notify
    its consumers about the status of an SM (Session Management) context related to a PDU (Packet Data Unit) Session. In the
    context of I-SMF (Intermediate SMF) context transfer, this service operation is used to indicate the transfer of the SM
    context to a new I-SMF or SMF set. It also allows the SMF to update the SMF-derived CN (Core Network) assisted RAN (Radio
    Access Network) parameters tuning in the AMF (Access and Mobility Management Function). Additionally, it can report DDN
    (Downlink Data Notification) failures and provide target DNAI (Data Network Access Identifier) information for the current
    or next PDU session.
  - The basic principles for online charging are defined in TS 32.240 [1]. This information is referenced in section 5.2.1
    of the document, which is part of the '5.2 Online charging scenario' chapter.
- source_sentence: What are the possible values for the 'ReportingLevel' enumeration, and what do they indicate?
  sentences:
  - If protected User Plane (UP) messages reach the SN before the SN has received the SN Counter value in the SN Reconfiguration
    Complete message, the SN chooses the first unused KSN key of the UE to establish the security association. This ensures
    that communication can proceed securely even if the SN Counter value has not yet been received. Once the SN Counter value
    is received, the SN verifies it to ensure there is no KSN mismatch.
  - 'The ''ReportingLevel'' enumeration has three possible values: ''SER_ID_LEVEL'', ''RAT_GR_LEVEL'', and ''SPON_CON_LEVEL''.
    ''SER_ID_LEVEL'' indicates that usage should be reported at the service ID and rating group combination level. ''RAT_GR_LEVEL''
    indicates that usage should be reported at the rating group level. ''SPON_CON_LEVEL'' indicates that usage should be reported
    at the sponsor identity and rating group combination level. These levels help in categorizing and reporting usage data
    based on different granularities.'
  - Structured data types in the Nudr_GroupIDmap Service API are more complex than simple data types. While simple data types
    represent single values like integers or strings, structured data types are composed of multiple simple data types or
    other structured data types, forming a more complex data structure. For example, a structured data type might represent
    a user profile containing fields for name, age, and address, each of which could be a simple data type. This allows for
    the representation of more intricate and hierarchical data within the API.
- source_sentence: What is the purpose of the Intermediate Spending Limit Report Request procedure described in the document?
  sentences:
  - The Resource URI variables defined in table 6.1.3.8.2-1 for the 'sm-data' resource serve to dynamically construct the
    URI based on specific parameters. These variables include {apiRoot}, <apiVersion>, and {supi}. The {apiRoot} variable
    specifies the base URL of the API, <apiVersion> indicates the version of the API to be used, and {supi} represents the
    Subscription Permanent Identifier, which is used to uniquely identify the subscriber. These variables ensure that the
    URI is correctly formatted and points to the appropriate resource for the given subscriber and API version.
  - The purpose of the Intermediate Spending Limit Report Request procedure is to allow the PCF (Policy Control Function)
    to request the status of additional policy counters available at the CHF (Charging Function) or to remove the request
    for the status of policy counters. The PCF can modify the list of subscribed policy counters based on its policy decisions,
    and the CHF responds by providing the policy counter status, optionally including pending statuses and their activation
    times, for the requested policy counters.
  - When ABC online charging is employed, the TDF uses Debit / Reserve Units Request[Initial], update, or termination to convey
    charging information related to the detected application traffic. The OCS responds with Debit / Reserve Units Response,
    which includes quotas for rating groups or instructions on handling the application traffic (e.g., terminate, continue,
    reroute). The TDF must request a quota before service delivery. If only certain quotas are authorized by the OCS (e.g.,
    due to insufficient credit), the rating groups without authorized quotas are handled according to the received Result
    Code value. The quota supervision mechanism is further described in TS 32.299 [50].
- source_sentence: What types of data structures are supported by the GET request body on the resource described in table
    5.2.11.3.4-2, and how do they influence the request?
  sentences:
  - In Direct Communication mode, the NF Service consumer can subscribe to status change notifications of NF instances from
    the NRF. If the NF Service consumer is notified by the NRF or detects by itself (e.g., through a lack of response to a
    request) that the NF producer instance is no longer available, it selects another available NF producer instance within
    the same NF Set. In Indirect Communication mode, the SCP or NF Service consumer may also subscribe to status change notifications
    from the NRF and select another NF producer instance within the same NF Set if the original instance serving the UE becomes
    unavailable. The specific implementation details of how the SCP detects the unavailability of an NF producer instance
    are left to the implementation.
  - The data structures supported by the GET request body on the resource are detailed in table 5.2.11.3.4-2. These structures
    define the format and content of the data that can be sent in the request body. They might include fields such as 'filterCriteria',
    'sortOrder', or 'pagination', which influence how the server processes the request and returns the appropriate data.
  - 'The specific triggers on the Ro interface that can lead to the termination of the IMS service include: 1) Reception of
    an unsuccessful Operation Result different from DIAMETER_CREDIT_CONTROL_NOT_APPLICABLE in the Debit/Reserve Units Response
    message. 2) Reception of an unsuccessful Result Code different from DIAMETER_CREDIT_CONTROL_NOT_APPLICABLE within the
    multiple units operation in the Debit/Reserve Units Response message when only one instance of the multiple units operation
    field is used. 3) Execution of the termination action procedure as defined in TS 32.299 when only one instance of the
    Multiple Unit Operation field is used. 4) Execution of the failure handling procedures when the Failure Action is set
    to ''Terminate'' or ''Retry & Terminate''. 5) Reception in the IMS-GWF of an Abort-Session-Request message from OCS.'
