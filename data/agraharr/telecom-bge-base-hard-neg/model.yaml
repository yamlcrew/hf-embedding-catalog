widgetData:
- source_sentence: What does DM-RS stand for?
  sentences:
  - In a groupcast scenario, a TX UE restarts its SL inactivity timer for the specific destination L2 ID whenever it receives
    new data directed to that same destination L2 ID. This mechanism ensures that the allowable transmission time is accurately
    determined based on the most recent data received. The RX UE, on the other hand, maintains a SL inactivity timer for each
    destination L2 ID and selects the largest timer value when multiple timers associated with different QoS profiles are
    configured. This coordination between TX and RX UEs helps maintain effective communication and manage resource allocation
    efficiently in groupcast transmissions.<|im_end|>
  - For a UE to identify and report the CGI of a known NR target cell while in RRC_CONNECTED state, it must be configured
    for SA operation mode. The UE shall identify and report the CGI when prompted by the network through the reportCGI command.
    It will receive one cell indication through *cellForWhichToReportCGI* for this purpose. The UE may utilize autonomous
    gaps in both downlink and uplink to receive the MIB and SIB1 messages, unless *useAutonomousGaps* is set to false. The
    identification of the CGI must be completed within a specific time frame, denoted as T~identify_CGI_redcap~, which is
    derived from the time taken to acquire the MIB and SIB1 messages. Furthermore, during this identification period, the
    UE must meet certain interruption requirements and ensure that it can detect the necessary signals under specified conditions.
    This process is crucial for maintaining connectivity and ensuring accurate cell identification in the network.<|im_end|>
  - Demodulation Reference Signal
- source_sentence: Why is the IAB-MT expected to have better adjacent carrier selectivity compared to UE ACS?
  sentences:
  - The AWGN generator must be adjusted based on the subcarrier spacing and channel bandwidth as defined in table 8.3.4.4.2-1.
    For instance, if the subcarrier spacing is set to 15 kHz with a channel bandwidth of 5 MHz, the AWGN power level should
    be set to -83.5 dBm for 4.5 MHz. It's important to note that the AWGN level includes a default offset of 16 dB, which
    can be reduced within a range of 0 dB to 16 dB if necessary for testing. However, adjusting the AWGN level does not affect
    the validity of the test, as it only reduces the effective baseband SNR level.<|im_end|>
  - IAB-MT is expected to have better adjacent carrier selectivity than User Equipment (UE) ACS primarily due to the limited
    physical separation distance between the IAB-MT and the aggressor Base Station (BS). This closer proximity allows for
    improved filtering and selectivity, reducing the interference from adjacent carriers. Additionally, the general characteristic
    of BS having higher ACS selectivity compared to UE supports the suitability of applying BS-type ACS numbers to IAB-MT.<|im_end|>
  - The gain limits specified in tables 6.4.2-1 and 6.4.2-2 are critical for ensuring that the gain outside the passband does
    not exceed predefined maximum levels. These limits help to minimize interference with adjacent channels and maintain the
    integrity of communication systems. The tables categorize the maximum allowable gain based on the frequency offset from
    the outer channel edge frequency of the passband. For frequencies below 2496 MHz, the gain limits range from 60 dB to
    35 dB depending on the offset, while for frequencies above 2496 MHz, the limits similarly range from 60 dB to 35 dB. Adhering
    to these limits is essential for compliance with regulatory standards and the overall performance of the communication
    system.<|im_end|>
- source_sentence: Which frequency bands are supported by LTE-U?
  sentences:
  - The cloud server trains a global model by aggregating local models partially-trained by each end devices
  - During the test procedure, EIRP is measured for two orthogonal polarizations, denoted as p1 and p2. The total radiated
    transmit power for a particular beam direction pair is then calculated using the formula EIRP = EIRP~p1~ + EIRP~p2~. This
    calculation allows for the assessment of the satellite's performance in terms of power output across the specified polarization
    states, which is crucial for understanding its operational capabilities.<|im_end|>
  - 5150-5250 MHz and 5725-5850 MHZ
- source_sentence: What is the maximum occupied bandwidth requirement for a component carrier in inter-band carrier aggregation?
  sentences:
  - 'Table 6.7.2-5b: Channel model parameters for Suburban Scenario (LOS) in Ka band  The table presents various large-scale
    parameters for different scenarios in a suburban setting at various angles. Parameters include delay spread, AOD and AOA
    spread, ZSA and ZSD spread, shadow fading, K-factor, cross-correlations, delay scaling parameter, XPR, number of clusters,
    rays per cluster, and correlation distances in the horizontal plane. Different values are provided for each parameter
    at different angles. Keywords: large-scale parameters, suburban, delay spread, AOD, AOA, ZSA, ZSD, shadow fading, K-factor,
    cross-correlations, XPR, clusters, rays, correlation distances.'
  - In inter-band carrier aggregation scenarios, the occupied bandwidth for each component carrier must be less than the channel
    bandwidth specified in Table 6.5.1-1. This requirement is crucial to prevent interference and ensure that the transmission
    remains within the regulatory limits set for each NR band. By maintaining the occupied bandwidth below the prescribed
    channel bandwidth, the system can optimize performance and minimize potential overlaps with adjacent channels, thereby
    enhancing overall network efficiency and reliability.<|im_end|>
  - The primary objective of the test procedure is to verify that the TMGI (Temporary Multicast Group Identity) assigned to
    a multicast MBS (Multimedia Broadcast/Multicast Service) session is valid and that the associated MRB (Media Resource
    Block) can be successfully received by the User Equipment (UE) participating in that multicast session. This ensures that
    the multicast services can be delivered effectively and that the UE can access the necessary resources for proper functioning
    within the multicast framework.<|im_end|>
- source_sentence: What are the minimum conformance requirements for the event-triggered reporting tests outlined in this
    specification?
  sentences:
  - The minimum conformance requirements for the event-triggered reporting tests are specified in clause 10.4.1.0 of the relevant
    technical specification. These requirements ensure that the UE meets the necessary performance standards when conducting
    tests related to event-triggered reporting. The reference document for these requirements is TS 38.133, specifically clause
    A.10.4.1.3, which outlines the detailed criteria and parameters that the UE must fulfill during testing. This includes
    aspects such as measurement reporting delays, the rate of correct event observations, and the handling of specific measurement
    quantities across different test scenarios. Meeting these requirements is essential for compliance and interoperability
    within the network.<|im_end|>
  - 3. Utilizing geo-redundancy and Data Center Zones.
  - When a User Equipment (UE) is in Automatic network selection mode and is switched on or returns to coverage, it must not
    select a CAG cell if the CAG-ID of that cell is not present in the Allowed CAG list. This requirement ensures that the
    UE adheres strictly to the CAG (Cell Access Group) policies in place, which are designed to control access to specific
    network resources. By preventing the selection of unauthorized CAG cells, the system maintains network integrity and security,
    ensuring that only authorized users can access certain network services. Therefore, the UE will ignore any CAG cells that
    are not permitted based on its configuration.<|im_end|>
