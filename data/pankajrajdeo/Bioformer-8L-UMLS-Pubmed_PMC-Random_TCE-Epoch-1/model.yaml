- source_sentence: Experimental studies on the geometrical characteristics determining the system behavior of surface tension
    autooscillations.
  sentences:
  - Autooscillation of the surface tension is a phenomenon related to Marangoni instability periodically arising and fading
    by dissolution of a surfactant droplet under a water-air interface. A detailed experimental investigation was performed
    to clear up the influence of the system geometry on development and characteristics of autooscillations. It was found
    that the aspect ratio is an additional dimensionless parameter that determines the system behavior equally to the Marangoni
    number. The influence of the cell diameter, capillary immersion depth, and droplet radius on the autooscillation period
    and amplitude was studied as well.
  - Genome-wide methylation profiling is used in breast cancer (BC) studies, because DNA methylation is a crucial epigenetic
    regulator of gene expression, involved in many diseases including BC. We investigated genome-wide methylation profiles
    in both canine mammary tumor (CMT) tissues and peripheral blood mononuclear cells (PBMCs) using reduced representation
    bisulfite sequencing (RRBS) and found unique CMT-enriched methylation signatures. A total of 2.2–4.2 million cytosine–phosphate–guanine
    (CpG) sites were analyzed in both CMT tissues and PBMCs, which included 40,000 and 28,000 differentially methylated regions
    (DMRs) associated with 341 and 247 promoters of differentially methylated genes (DMGs) in CMT tissues and PBMCs, respectively.
    Genes related to apoptosis and ion transmembrane transport were hypermethylated, but cell proliferation and oncogene were
    hypomethylated in tumor tissues. Gene ontology analysis using DMGs in PBMCs revealed significant methylation changes in
    the subset of immune cells and host defense system-related genes, especially chemokine signaling pathway-related genes.
    Moreover, a number of CMT tissue-enriched DMRs were identified from the promoter regions of various microRNAs (miRNAs),
    including cfa-mir-96 and cfa-mir-149, which were reported as cancer-associated miRNAs in humans. We also identified novel
    miRNAs associated with CMT which can be candidates for new miRNAs associated with human BC. This study may provide new
    insight for a better understanding of aberrant methylation associated with both human BC and CMT, as well as possible
    targets for methylation-based BC diagnostic markers.
  - Urine estrogens were measured in 46 women students, ages 15-18, at a middle-class high school in Athens and in 40 women
    of the same age residing at one of three orphanages in the same city. The lower socioeconomic status (SES) of the latter
    group was documented by their lower mean height (by 5.2 cm) and weight (by 5.3 kg) relative to the high school students.
    Both in follicular and luteal phases of the menstrual cycle, the women with lower SES had 50% higher estriol ratios (ratio
    of the concentration of estriol to the sum of the concentrations of estrone and estradiol). In luteal specimens the concentration
    of all three major estrogens was higher in the group with low SES than in the women in the other group, but the concentration
    of estriol was most increased. There was also an indication of less frequent anovular cycles among the women with low
    SES. These findings are consistent with hypotheses linking either the estriol ratio or the frequency of anovular cycles
    to breast cancer risk.
- source_sentence: Iatrogenic superior vena cava syndrome treated with streptokinase.
  sentences:
  - The literature tells us that reflection offers a means to evaluate practice and to identify learning from our practice
    experiences. The following description of a practice incident will be discussed loosely in the light of Rolfe's 'Model
    of Nursing Praxis' as a means of exploring the theoretical exercise of 'reflection' within a proposed theoretical framework.
    It is hoped that the exercise will help to achieve some of the suggested positive endpoints of reflection, and provide
    insight and learning on an incident that was particularly powerful on both a personal and a professional level.
  - 'BACKGROUND: This study reported height prediction and longitudinal growth changes in Chinese pediatric patients with
    acute myeloid leukemia (AML) during and after treatment and their associations with outcomes. METHODS: Changes in 88 children
    with AML in percentages according to the growth percentile curve for Chinese boys/girls aged 2-18/0-2 years for body mass
    index (BMI), height, and weight from the time of diagnosis to 2 years off therapy were evaluated. The outcomes of AML
    were compared among patients with different BMI levels. RESULTS: The proportion of underweight children (weight < 5th
    percentile) increased significantly from the initial diagnosis to the end of consolidation treatment. The proportion of
    patients with low BMI (BMI < 5th percentile) was highest (23.08%) during the consolidation phase, and no children were
    underweight, but 20% were overweight (BMI > 75th percentile) after 2 years of drug withdrawal. Unhealthy BMI at the initial
    diagnosis and during intensive chemotherapy leads to poorer outcomes. For height, all patients were in the range of genetic
    height predicted based on their parents'' height at final follow-up. CONCLUSIONS: Physicians should pay more attention
    to the changes in height and weight of children with AML at these crucial treatment stages and intervene in time.'
  - The development of an iatrogenic superior vena cava syndrome secondary to a thrombosis from an indwelling Hickman catheter
    in a patient with ovarian carcinoma is presented. The patient was treated with a combination of streptokinase and heparin
    with successful and dramatic results. Streptokinase appears to be highly effective in the treatment of iatrogenic superior
    vena cava syndrome from Hickman catheters. It appears that the Hickman catheter may be safely left in situ post-treatment.
- source_sentence: Cesarean delivery in a parturient with syringomyelia and worsening neurological symptoms.
  sentences:
  - A parturient presented at 35 weeks' gestation with worsening neurological symptoms caused by syringomyelia. She underwent
    urgent cesarean delivery. The etiology and anesthetic considerations for an obstetrical patient with syringomyelia are
    discussed.
  - Attachment of enterotoxigenic Escherichia coli to the human gut is considered an important early step in infection that
    leads to diarrhea. This attachment is mediated by pili, which belong to a limited number of serologically distinguishable
    types. Many of these pili require the product of rns, or a closely related gene, for their expression. We have located
    the major promoter for rns and found that although its sequence diverges significantly from a sigma-70 promoter consensus
    sequence, it is very strong. Transcription of rns is negatively regulated both at a region upstream of this promoter and
    at a region internal to the rns open reading frame. In addition, rns positively regulates its own transcription, probably
    by counteracting these two negative effects.
  - 'Purpose: Research exploring how places shape and interact with the lives of aging adults must be grounded in the places
    where aging adults live and participate. Combined participatory geospatial and qualitative methods have the potential
    to illuminate the complex processes enacted between person and place to create much-needed knowledge in this area. The
    purpose of this scoping review was to identify methods that can be used to study person-place relationships among aging
    adults and their neighborhoods by determining the extent and nature of research with aging adults that combines qualitative
    methods with participatory geospatial methods. Design and Methods: A systematic search of nine databases identified 1,965
    articles published from 1995 to late 2015. We extracted data and assessed whether the geospatial and qualitative methods
    were supported by a specified methodology, the methods of data analysis, and the extent of integration of geospatial and
    qualitative methods. Results: Fifteen studies were included and used the photovoice method, global positioning system
    tracking plus interview, or go-along interviews. Most included articles provided sufficient detail about data collection
    methods, yet limited detail about methodologies supporting the study designs and/or data analysis. Implications: Approaches
    that combine participatory geospatial and qualitative methods are beginning to emerge in the aging literature. By more
    explicitly grounding studies in a methodology, better integrating different types of data during analysis, and reflecting
    on methods as they are applied, these methods can be further developed and utilized to provide crucial place-based knowledge
    that can support aging adults'' health, well-being, engagement, and participation.'
- source_sentence: Development of an in vitro regeneration system from immature inflorescences and CRISPR/Cas9-mediated gene
    editing in sudangrass.
  sentences:
  - HIV envelope protein (Env) is the sole target of broadly neutralizing antibodies (BNAbs) that are capable of neutralizing
    diverse strains of HIV. While BNAbs develop spontaneously in a subset of HIV-infected patients, efforts to design an envelope
    protein-based immunogen to elicit broadly neutralizing antibody responses have so far been unsuccessful. It is hypothesized
    that a primary barrier to eliciting BNAbs is the fact that HIV envelope proteins bind poorly to the germline-encoded unmutated
    common ancestor (UCA) precursors to BNAbs. To identify variant forms of Env with increased affinities for the UCA forms
    of BNAbs 4E10 and 10E8, which target the Membrane Proximal External Region (MPER) of Env, libraries of randomly mutated
    Env variants were expressed in a yeast surface display system and screened using fluorescence activated cell sorting for
    cells displaying variants with enhanced abilities to bind the UCA antibodies. Based on analyses of individual clones obtained
    from the screen and on next-generation sequencing of sorted libraries, distinct but partially overlapping sets of amino
    acid substitutions conferring enhanced UCA antibody binding were identified. These were particularly enriched in substitutions
    of arginine for highly conserved tryptophan residues. The UCA-binding variants also generally exhibited enhanced binding
    to the mature forms of anti-MPER antibodies. Mapping of the identified substitutions into available structures of Env
    suggest that they may act by destabilizing both the initial pre-fusion conformation and the six-helix bundle involved
    in fusion of the viral and cell membranes, as well as providing new or expanded epitopes with increased accessibility
    for the UCA antibodies.
  - 'BACKGROUND: Sudangrass (Sorghum sudanense) is a major biomass producer for livestock feed and biofuel in many countries.
    It has a wide range of adaptations for growing on marginal lands under biotic and abiotic stresses. The immature inflorescence
    is an explant with high embryogenic competence and is frequently used to regenerate different sorghum cultivars. Caffeic
    acid O-methyl transferase (COMT) is a key enzyme in the lignin biosynthesis pathway, which limits ruminant digestion of
    forage cell walls and is a crucial barrier in the conversion of plant biomass to bioethanol. Genome editing by CRISPR/Cas9-mediated
    mutagenesis without a transgenic footprint will accelerate the improvement and facilitate regulatory approval and commercialization
    of biotech crops. METHODS AND RESULTS: We report the overcome of the recalcitrance in sudangrass transformation and regeneration
    in order to use genome editing technique. Hence, an efficient regeneration system has been established to induce somatic
    embryogenesis from the immature inflorescence of two sudangrass cultivars on four MS-based media supplemented with different
    components. Our results indicate an interaction between genotype and medium composition. The combination of Giza-1 cultivar
    and M4 medium produces the maximum frequency of embryogenic calli of 80% and subsequent regeneration efficiency of 22.6%.
    Precise mutagenesis of the COMT gene is executed using the CRISPR/Cas9 system with the potential to reduce lignin content
    and enhance forage and biomass quality in sudangrass. CONCLUSION: A reliable regeneration and transformation system has
    been established for sudangrass using immature inflorescence, and the CRISPR/Cas9 system has demonstrated a promising
    technology for genome editing. The outcomes of this research will pave the road for further improvement of various sorghum
    genotypes to meet the global demand for food, feed, and biofuels, achieving sustainable development goals (SDGs).'
  - 'The synthesis of an extracellular matrix containing long (approximately mm in length) collagen fibrils is fundamental
    to the normal morphogenesis of animal tissues. In this study we have direct evidence that fibroblasts synthesise transient
    early fibril intermediates (approximately 1 micrometer in length) that interact by tip-to-tip fusion to generate long
    fibrils seen in older tissues. Examination of early collagen fibrils from tendon showed that two types of early fibrils
    occur: unipolar fibrils (with carboxyl (C) and amino (N) ends) and bipolar fibrils (with two N-ends). End-to-end fusion
    requires the C-end of a unipolar fibril. Proteoglycans coated the shafts of the fibrils but not the tips. In the absence
    of proteoglycans the fibrils aggregated by side-to-side interactions. Therefore, proteoglycans promote tip-to-tip fusion
    and inhibit side-to-side fusion. This distribution of proteoglycan along the fibril required co-assembly of collagen and
    proteoglycan prior to fibril assembly. The study showed that collagen fibrillogenesis is a hierarchical process that depends
    on the unique structure of unipolar fibrils and a novel function of proteoglycans.'
