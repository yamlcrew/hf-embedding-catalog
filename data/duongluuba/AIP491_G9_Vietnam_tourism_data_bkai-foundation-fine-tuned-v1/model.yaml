widgetData:
- source_sentence: 'query: Bánh canh chả cá ở Bình Thạnh có những đặc điểm gì khiến bạn không thể bỏ qua khi thưởng thức?'
  sentences:
  - 'passage: Vũng Tàu có nhiều di tích thắng cảnh như Hải đăng Vũng Tàu cao 18m, chiếu xa tới 35 hải lý, Niết bàn tịnh xá
    (chùa Phật nằm) với pho tượng Phật Thích ca nằm nghiêng dài 12m trên bệ cao 2,5m, Tượng chúa Jêsus giang tay cao 32m trên
    Núi Nhỏ; dinh thự Bạch Dinh và chùa Thích Ca Phật Đài trên Núi Lớn; di tích Nhà lớn Long Sơn trên xã đảo Long Sơn. Vũng
    Tàu có những bãi biển lý tưởng để nghỉ mát mà thiên nhiên đã ban tặng như: Bãi Sau (Thùy Dương), Bãi Trước (Tầm Dương),
    Bãi Dâu (Phương Thảo), Bãi Dứa (Hương Phong). Vũng Tàu không có mùa đông, do vậy các khu nghỉ mát có thể hoạt động quanh
    năm. Ngoài thế mạnh về du lịch, Vũng Tàu còn có thế mạnh phát triển dầu khí.'
  - 'passage: Top 5 món ăn gây thương nhớ ở phố cổ – Du lịch Hội An: Hội An từng là thương cảng sầm uất trong quá khứ, đến
    nay phố cổ vẫn giữ được những tinh hoa từ hàng trăm năm trước. Cùng điểm qua 5 món ăn tinh túy nhất mà du khách phải trải
    nghiệm khi du lịch Hội An! Xem thêm:Du lịch Hội An Vẻ đẹp lung linh khi đêm về ở Hội An. “Ai qua phố cổ Hội An, Ghé thăm
    Phúc Kiến mà ăn cao lầu.” Có tên gọi cao lầu thực ra là vì món ăn này hay được bày bán trên tầng hai và sân thượng của
    nhà hàng. Cũng là món ăn thuộc họ nhà bún, tuy nhiên món bún cao lầu có phần khác biệt hơn so với phở, mì quảng…'
  - 'passage: Bánh canh chả cá – Xô Viết Nghệ Tĩnh Và cuối cùng, đừng quên bánh canh chả cá – “đứa con” của dải đất miền Trung
    lặn lội vào chốn Sài Thành để khẳng định tên tuổi. Bạn sẽ hoàn toàn bị chinh phục khi tô bánh canh chả cá nóng hổi được
    dọn ra: nước dùng trong vắt điểm xuyết bởi váng mỡ từ chả cá và màu xanh của hành lá. Nhớ thêm thật nhiều ớt để vị cay
    xè làm cho buổi trải nghiệm ẩm thực Bình Thạnh của bạn thêm “đáng nhớ” nhé. Theo Yan.vn Xem thêm các bài viết: Những điểm
    ăn vặt đường phố ở Sài Gòn 10.000 đồng ăn gì ở 3 thành phố lớn. Bạn đã thử 5 món mới đang ‘gây sốt’ ở Sài Gòn chưa.'
- source_sentence: 'query: Chợ đêm Hòa Khánh ở Đà Nẵng có những món ăn vặt nào được nhiều khách du lịch yêu thích?'
  sentences:
  - 'passage: Ốc mình tròn, hơi dẹp, to bằng ngón tay cái, sống chui rúc trong các hang hốc, khe núi và dưới các gốc cây,
    nhiều nhất là ở các bụi chuối nên còn gọi là ốc chuối. Các tay sành điệu ẩm thực chỉ mới phát hiện loài ốc này độ vài
    ba năm nay. Ốc núi con nào cũng mập mạp, thịt giòn, vị ngọt, thơm ngon độc đáo, tuyệt đối không có mùi tanh và mùi bùn,
    ít có loài ốc nào qua mặt nổi. Mặc dù thịt ốc ngon nhưng muốn thưởng thức, khách du lịch phải quen biết cư dân vùng núi
    Cấm và đặt cọc trước vài ba ngày mới có thể thỏa mãn lòng mong ước.'
  - 'passage: Người dân thường sử dụng dấm được nuôi bằng trái ổi chín vốn có rất nhiều tại vùng này, nêm thêm ít muối và
    đường để mang hương vị chua thanh đậm đà cho món gỏi này. Gỏi cá trích được ăn kèm với bánh tráng, các loại rau sống và
    chén nước chấm đậm đà. Ăn gỏi cá trích không thể thiếu chén nước chấm được làm từ ớt, tỏi và đậu phộng rang…. vừa có hương
    vị cay nồng vừa đậm đà vừa miệng. Sau khi chuẩn bị xong các nguyên liệu, gỏi được dọn ra bàn và ăn kèm với rau sống cuốn
    bánh tráng. Ngoài hai món ăn kể trên, ở đây còn có các món ốc, cá nướng cũng rất ngon và lạ miệng.'
  - 'passage: Chợ đêm Hòa Khánh Khu quầy hàng bán từ xế chiều đến tối khuya bên cạnh chợ chính Hòa Khánh được mở ra khoảng
    10 năm nay, ban đầu chủ yếu phục vụ sinh viên gần đó. Dần dần, đây cũng là nơi được khách du lịch tìm đến để thưởng thức
    ẩm thực khuya của Đà Nẵng. Các món chủ yếu là đồ ăn vặt như xiên nướng, xắp xắp (gỏi khô bò), trứng cút lộn xào me, bánh
    tráng nướng, các loại chè, sinh tố với giá được cho là rẻ hơn nhiều so với các chợ khác.'
- source_sentence: 'query: Bạn có thể cho biết địa chỉ và giờ mở cửa của NGHIA Cafe ở thành phố Huế không?'
  sentences:
  - 'passage: Những hoa văn, họa tiết, phù điêu của Việt Nam trên nền mái vòm được khéo léo dung hòa theo kiến trúc Gothic
    kiểu lâu đài của phương Tây. Tạo nên tổng thể độc đáo. Điêu khắc tỉ mỉ từng chi tiết. vn vn Chùa Cổ Lễlưu giữ báu vật
    giá trị là quả chuông cổ lớn nhất Việt Nam. Có tên gọi là Đại Hồng Chung, được đúc vào năm 1936. Cao 4m20, đường kính
    2m03 và nặng 9 tấn đặt giữa hồ nước trước tòa Chính Cung. Quá trình đúc chuông thời xưa hoàn toàn bằng thủ công, nên đòi
    hỏi rất nhiều công sức và sự tỉ mỉ, cẩn thận khi thực hiện. Thời điểm bấy giờ, để đề phòng sự phá hoại của giặc, nhân
    dân trong vùng đã đem dìm quả chuông xuống hồ.'
  - 'passage: 000 – 350.000VNĐ 4. Quán ăn vặt Bánh Cống Phú Quốc Bánh CốngPhú Quốcđược làm từ bột gạo được nhồi cùng nhân
    thịt tôm tẩm ướp gia vị đầy đủ, phía trên còn có một con tôm trông vô cùng tươi ngon hấp dẫn. Bánh vàng giòn ăn kèm rau
    sống chấm với nước mắm chua ngọt sẽ khiến bạn không quên được hương vị này đấy nhé. 000VNĐ/cái 5. Bánh xèo Đại Đức Bột
    bánh được pha cùng nước cốt dừa nên có vị bùi thơm, bánh vừa giòn vừa nóng, cắn một miếng nghe tiếng “rùm rụp” thật khiến
    thực khách phải mê mẩn với món bánh xèo hải sản này, bên trong hải sản tươi sống ăn kèm bánh, cuốn chút rau chấm nước
    mắm chua ngọt thì không còn gì để bàn. joyn 000 – 30.000VNĐ 6.'
  - 'passage: Đa dạng đồ uống Không gian vintage ở NGHIA Cafe Địa chỉ:Tầng 5, toà nhà 18 Lê Lợi, quận Thuận Hoá, thành phố
    Huế (ngã tư cầu Phú Xuân). Giờ mở cửa: 6:30 AM–10:30 PM. Giá tham khảo: 25.000 – 60.000 VNĐ. Quán nằm trên tầng cao, bạn
    có thể phóng tầm mắt ngắm nhìn toàn cảnh thành phố Huế và dòng sông Hương thơ mộng.The TIME Coffeesở hữu không gian hiện
    đại, thoáng đãng, rất thích hợp để ngắm hoàng hôn và tận hưởng những buổi tối lãng mạn. View từ tầng cao của The TIME
    Coffee Địa chỉ: 131 Nguyễn Sinh Cung, Vỹ Dạ, thành phố Huế. Giờ mở cửa: 6:30 AM–10 PM. Giá tham khảo: 30.000 – 70.000
    VNĐ. Nếu bạn muốn tìm một quán café mang đậm phong cách cung đình Huế thì Café Vỹ Dạ Xưa là điểm đến lý tưởng.'
- source_sentence: 'query: Tại sao không nên tự ý hái lá ngón khi đến Mường So dù có thể phân biệt được lá ngón độc và không
    độc?'
  sentences:
  - 'passage: Ngoài giá trị kết hợp giữa hai lối kiến trúc Đông - Tây, ngôi nhà còn nổi tiếng bởi liên quan tới cuộc tình
    không biên giới của một cô gái Pháp và chàng công tử người Việt gốc Hoa giàu có những năm đầu thế kỷ 20, chủ nhân ngôi
    nhà. Chuyện tình cũng chính là nội dung tác phẩm văn học Người tình (L’Amant), từng được dựng thành phim, và quay tại
    chính ngôi nhà này.'
  - 'passage: Xin cảnh báo là dù cho đặc điểm của hai loại lá ngón độc và không độc này cũng khá dễ nhận biết, nhưng nếu có
    dịp về Mường So cũng đừng nên tự tiện đi tìm hái về nấu ăn nhé. Điều này không được khuyến khích vì rõ ràng, chỉ cần nhầm
    một chút thôi là cái chết sẽ đến gần trước khi được thưởng thức món đặc sản có một không hai này đấy! Theo Afamily Xem
    thêm bài viết: Vượt suối, băng rừng chinh phục Putaleng mùa núi nở hoa Hành trình chinh phục ‘người con gái’ của núi rừng
    Tây Bắc: Bạch Mộc Lương Tử Vẻ kỳ vĩ ở nơi sông Đà chảy vào đất Việt *** Tham khảo:Cẩm nang du lịch'
  - 'passage: Celina là nơi sự đơn giản của thiên nhiên đáp ứng dịch vụ sang trọng. Từ thời điểm bạn đến sảnh khách sạn, đội
    ngũ nhân viên niềm nở sẽ giúp bạn bắt đầu một kỳ nghỉ thư giãn khidu lịch Quảng Bình. Phòng ngủ ấm cúng Khu nghỉ mang
    đến không gian riêng tư cho những ai đang tìm kiếm một nơi tạm thoát khỏi lối sống thường ngày. Bên cạnh đó, nơi đây còn
    cung cấp các tiện nghi và dịch vụ nghỉ dưỡng hiện đại. Giúp kỳ nghỉ của bạn vừa thư giãn, vừa thú vị. Với trung tâm thể
    thao, câu lạc bộ trẻ em, bể bơi ngoài trời, sân quần vợt, karaoke, bida, hệ thống nhà hàng – bar, dịch vụ spa và tổ chức
    sự kiện.'
- source_sentence: 'query: Cách chế biến hạt đác rim đường phèn như thế nào để giữ được độ giòn và vị ngọt thanh?'
  sentences:
  - 'passage: Các món ăn từ hạt đác dưới đây khá dễ chế biến và giải nhiệt rất tốt trong mùa hè. Hạt đác rim đường phèn Lựa
    hạt non và nấu đủ độ sẽ cho thành phẩm vừa dẻo, vừa giòn, quyện đường phèn nên ngọt thanh, bỏ thêm đá hoặc sữa chua vào
    ăn rất mát. com Cách phổ biến và đơn giản nhất để thưởng thức hạt đác là rim đường phèn. Hạt đác được rửa nhiều lần cho
    sạch, chần vào nước nóng già, nấu cho đến khi sôi lại khoảng năm phút thì vớt ra, xả với nước lạnh để không mất đi độ
    giòn. Mang phần hạt đác đã sơ chế này ngâm với đường phèn khoảng nửa tiếng cho thấm ngọt rồi rim trên chảo lớn, không
    cần thêm nước, đến khi đường sóng sánh, hạt đác có màu trong là hoàn thành.'
  - 'passage: Top 5 khách sạn, resort phù hợp cho dịp lễ hội pháo hoa quốc tế Đà Nẵng 2025: Top 5 khách sạn, resort sau sẽ
    là lựa chọn lý tưởng cho bạn thưởng trọn không khí sôi động vào dịp lễ hội pháo hoa quốc tế Đà Nẵng 2025. Xem thêm:Du
    lịch Đà Nẵng Với chủ đề “Đà Nẵng – Kỷ Nguyên Mới”,lễ hội pháo hoa quốc tế Đà Nẵng2025(DIFF 2025) hứa hẹn sẽ mang đến du
    khách những màn trình diễn mãn nhãn rực sáng trên bầu trời đêm. Và top 5 combo khách sạn, resort sẽ là gợi ý từ để bạn
    tham khảo nếu đang có kế hoạch cho kỳ nghỉ đến với thành phố biển trong mùa lễ hội.'
  - 'passage: Vườn quốc gia Ba Vì. Với diện tích gần 11.000 ha, vườn quốc gia Ba Vì được coi là "lá phổi xanh" phía Tây thủ
    đô Hà Nội. Tại vườn quốc gia có các địa điểm tham quan như nhà thờ cổ bỏ hoang, phủ kín rêu phong mang vẻ huyền bí, hay
    nhà kính xương rồng. Cũng như , hay , người Pháp xây dựng ở Ba Vì nhiều biệt thự nghỉ dưỡng ở cốt 400, 600 và 1.000. Chỉ
    khác là chúng đã bị tàn phá theo thăng trầm thời gian cùng thời cuộc. Bởi thế, du khách sẽ ngỡ ngàng trước những nền móng
    kiến trúc từ hàng trăm năm trước khi đi sâu vào trong rừng. Những khu nghỉ dưỡng, những bếp lò, những bức tường, tất cả
    đều được bao phủ bởi cây rừng và sương núi.'
