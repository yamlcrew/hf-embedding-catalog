widgetData:
- source_sentence: 또한 젊은 무슬림 인 구가 점차 증가함에 따라 2030년에는 전 세계 청년층(15-29세)인구 중 무슬림 이 29%를 차지하게 되어 전 세계적으로 젊은 소비자 시장 비중이 커지는 효과
    가 나타날 것으로 전망 된다.
  sentences:
  - 참가를 원하는 경우 대한상의 소통 플랫폼 홈페이지(sotong.korcham.net)를 통해 아이디어 제목과 내용, 제안 이유, 기대 효과 등을 담아 제출하면 된다.
  - ② 제1항의 변상금 부과ㆍ징수에 이의가 있는 점유자는 규칙에서 정하는 서식에 따라 변상금 사전 통지에 대한 의견서를 제출할 수 있다.
  - 젊은 무슬림 인 구가 점차 증가함에 따라 2030년에는 전 세계 청년층인구 중 무슬림 이 29%를 차지하게 되어 전 세계적으로 젊은 소비자 시장 비중이 커지는 효과 가 나타날 것으로 전망 된다.
- source_sentence: 13일 LG전자에 따르면 최근 아르헨티나, 콜롬비아, 페루, 칠레 등 중남미 4개국에 LG 채널 서비스가 추가로 출시됐다.
  sentences:
  - ② 법 제16조 제1항에 따른 결정이나 법 제17조에 따른 경정을 하는 경우의 납세지는 그 결정 또는 경정일 현재를 기준으로 한다.
  - 외국인투자의 다양한 수요를 반영할 수 있도록 유연한 공간, 기능, 유형의 외국인투자유치 구역 조성
  - 13일 LG전자에 따르면 최근 아르헨티나, 콜롬비아, 페루, 칠레 등 중남미 4개국에 LG 채널 서비스가 추가로 출시됐다.
- source_sentence: '- 외부감사인이 감사종료 후 당해 법인에 제출하는 감사보고서 상의 재무제표는 당해 법인의 주주총회의 승인 절차를 거쳐 확정된 재무제표가 아니므로 승인 과정에서 변경될 수 있습니다.'
  sentences:
  - 외부감사인이 감사종료 후 당해 법인에 제출하는 감사보고서 상의 재무제표는 당해 법인의 주주총회의 승인 절차를 거쳐 확정된 재무제표가 아니므로 승인 과정에서 변경될 수 있습니다.
  - 제3항에 따른 금융위원회의 요구에 따르지 아니하거나 그 이행을 게을리하는 경우.
  - 은성수 금융위원장이 이날 국회 정무위원회 전체회의에서 가상화폐 투자의 위험성에 대해 경고한 데 이어 별도 자료를 낸 것이다.
- source_sentence: ③ 시장은 주민이 도시관리계획 입안을 제안한 도시관리계획안에 대하여는 반영할 것인지 여부를 결정함에 있어 필요한 경우에는 안동시도시계획위원회의 자문을 거칠 수 있으며, 자문결과 보완사항에
    대하여는 제안자의 의견을 들어 입안할 수 있다.
  sentences:
  - 지금 이후로도 언제든지 귀하께 더욱 봉사할 수 있다면 가능한 어떤 방법으로라도 귀하를 도와드리는 것을 무한의 영예라고 생각합니다.
  - ③ 시장은 주민이 도시관리계획 입안을 제안한 도시관리계획안에 대하여는 반영할 것인지 여부를 결정함에 있어 필요한 경우에는 안동시도시계획위원회의 자문을 거칠 수 있으며, 자문결과 보완사항에 대하여는 제안자의 의견을
    들어 입안할 수 있다.
  - 당사는 보고서 제출일 현재 16개의 계열회사가 있으며, 그 내역은 다음과 같습니다.
- source_sentence: 연차주주총회는 이 투자회사의 등록사무소나 총회 소집 통지서에 기재되는 룩셈부르크의 다른 장소에서 개최됩니다.
  sentences:
  - ② 국제거래에 대해서는 「소득세법」 제41조와 「법인세법」 제52조를 적용하지 아니한다.
  - 이날 유가는 유럽연합(EU)이 전날 브뤼셀에서 회의를 열고 러시아산 원유 수입을 부분 금지하는 데 합의했다고 밝히면서 장중 120달러에 육박한 수준까지 치솟았다.
  - 연차주주총회는 이 투자회사의 등록사무소나 총회 소집 통지서에 기재되는 룩셈부르크의 다른 장소에서 개최됩니다.
