widgetData:
- source_sentence: 부모님 결혼기념일이 어떻게 되니?
  sentences:
  - 혹시 할머니 칠순 잔치가 이번달인지 다음달인지 알고 있으십니까?
  - 만약에 약속을 바꾸시려면 당일에 말하지 말고 하루 전에 알려주세요.
  - 학교 성적표는 등기 외 수단으로 받아
- source_sentence: 교육 수준은 최고지만, 공동체와 환경, 일과 삶의 균형은 하위권입니다.
  sentences:
  - 바다에서 무리하지 말고 일기예보 청취해요.
  - 그리고 사진 좋아하시는 분들에게는 천국일 거에요.
  - 중소기업은 우리 경제의 뿌리이며 중심입니다.
- source_sentence: 숙소는 침사추이보다 몽콕에 잡는게 더 좋은것같아요.
  sentences:
  - 올해 ‘창업기획자’ 등록제도가 도입된지 4년 만에 300개사를 돌파했다.
  - 저는 침사추이보다는 몽콕에 머무는 것이 더 낫다고 생각해요.
  - 두 개 방 모두에서 누우면 에펠탑이 보입니다!
- source_sentence: 메일을 보냈을 때, 교수님과 조교님 중 누가 더 답을 잘해주시지?
  sentences:
  - 와디즈의 광고메일과 텀블벅 꺼가 어떤 차이가 있나요?
  - 거실 화장실  침실 어디에서도 아름다운 뷰를 보실 수 있어요
  - 숙소위치나 호스트분의 신속한 응답 정말 좋았습니다.
- source_sentence: 학회랑 저널 홍보 메일 중 더 잦은 빈도로 오는 메일은?
  sentences:
  - 바로 엑셀파일을 지메일에서 읽는 방법 좀 알려주겠니?
  - 궁금합니다. 강원영동지역에 비 오는 날이.
  - 주방에도 사용할수 있는 도구들이 많습니다.
