widgetData:
- source_sentence: Hallazgos clínicos de la sífilis terciaria
  sentences:
  - Alteración congénita del metabolismo de la bilirrubina que produce hiperbilirrubinemia no conjugada Síndrome de Gilbert
    (por lo general no mayor a 5 mg/dL) y síndrome de Cigler-Najjar
  - ¿Cuál es la etiología del liquen plano? El liquen plano es una enfermedad autoinmunitaria de tipo inflamatorio. Algunos
    antígenos asociados con esta patología son la radiación ultravíoleta, la infección por virus de la hepatitis B y C, la
    presencia de amalgamas y metales como el oro o el mercurio en piezas dentales y múltiples fármacos. Se ha encontrado asociación
    del liquen plano con otras patologías autoinmunitarias como el vitiligo, la diabetes mellitus, la cirrosis biliar primaria,
    la enfermedad inflama
  - Hallazgos clínicos de la sífilis terciaria ·         Tabes dorsalis  ·         Debilidad general  ·         Gomas  ·         Pupila
    de Argyll Robertson  ·         Aortitis  ·         Aneurismas de raíz aórtica
- source_sentence: ¿Cuál es el papel de los antibióticos en el paciente gran quemado?
  sentences:
  - ¿Cuál es el papel de los antibióticos en el paciente gran quemado? Los antibióticos no se recomiendan de manera rutinaria,
    ya que en estudios se ha demostrado que la incidencia de infecciones disminuye con desbridamiento e injerto y no con antibióticos.
  - Características del tumor trofoblástico maligno de mal pronóstico Metástasis a distancia, con la localización más frecuente
    en el cerebro o hígado. Entre otros factores de mal pronóstico se encuentra el nivel de gonadotropina coriónica humana
    > 40,000, > 4 meses desde el último embarazo, embarazo a término. La tasa de curación es de 65%.
  - Alteraciones electrocardiográficas de la hipertrofia auricular izquierda P bimodal (P mitrale) >120 ms en la derivación
    II
- source_sentence: ¿Cuál es la diferencia entre una apnea obstructiva y una central?
  sentences:
  - ¿Cuál es la diferencia entre una apnea obstructiva y una central? En la obstructiva existen movimientos toracoabdominales
    y en la central no.
  - Tratamiento que con mayor eficacia reduce el riesgo de neuralgia posherpética Administración de aciclovir
  - Tratamiento del síndrome premenstrual • Inhibidores de la recaptura de serotonina  • Drospirenona/etinilestradiol  • Espironolactona  •
    Piridoxina
- source_sentence: Medio para el cultivo de bacterias entéricas
  sentences:
  - ¿Cuáles son las manifestaciones extrahepáticas de la hepatitis B? Exantema, artralgias y artritis, poliarteritis nodosa
    con complejos inmunitarios que contienen AgsVHB y AgeVHB en las lesiones vasculares, glomerulopatía por complejos inmunitarios
    con los mismos antígenos; manifestaciones neurológicas (polineuropatía, convulsiones y síndrome de Guillain-Barré).Este
    virus se considera oncogén (el ADN se integra al hepatocito) y el paciente puede desarrollar carcinoma hepatocelular,
    con o sin cirrosis.
  - Sintomatología asociada con la oclusión de la arteria cerebral media • Afasia (en caso de oclusión de la arteria del lado
    del hemisferio dominante).  • Síndrome de negación (en caso de oclusión de la arteria del hemisferio no dominante).  •
    Paresia contralateral en cara y brazo.  • Pérdida sensorial contralateral en cara y brazo. Desviación de la mirada hacia
    el lado de la lesión.  • Hemianopsia homónima.
  - Medio para el cultivo de bacterias entéricas Los dos medios diferenciales son el MacConkey y el eosina azul de metileno
- source_sentence: ¿Está indicado el uso de quelantes?
  sentences:
  - ¿Quiénes están en riesgo de infección por Erysipelothrix? La infección en humanos por lo general es secundaria a riesgo
    exposicional. Los principales expuestos son carniceros, pescadores, trabajadores de acuario, granjeros y veterinarios.
  - ¿Está indicado el uso de quelantes? La quelación mediante dimercaprol (BAL), succimero, DMPS o D-penicilamina está indicada
    en intoxicación por mercurio inorgánico, sólo la D-penicilamina es útil para los compuestos orgánicos ya que otros quelantes
    pueden potenciar la toxicidad del mercurio.
  - ¿Cómo se realiza el diagnóstico de lipoma? El ultrasonido y la TAC de cuello demuestran lesiones hipodensas. La RM en
    Tl para lesiones profundas muestra hiperintensidad.
