  - 'Book: 5, Chapter: 3

    Passage: A pungent smell of rotting rubbish came from the pile of bulging bin-bags just inside the broken gate. "Here,"
    Moody muttered, thrusting a piece of parchment toward Harry''s Disillusioned hand and holding his lit wand close to it,
