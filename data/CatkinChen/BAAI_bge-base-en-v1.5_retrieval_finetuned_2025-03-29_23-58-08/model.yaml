- source_sentence: What is the name of the Triwizard Tournament's first task creature?
  sentences:
  - 'Book: 3, Chapter: 10

    Passage: "Come in here. ..."

    He nodded toward an empty classroom to the left of the one-eyed statue. Harry followed Fred and George inside. George
    closed the door quietly and then turned, beaming, to look at Harry. "Early Christmas present for you, Harry," he said.
    Fred pulled something from inside his cloak with a flourish and laid it on one of the desks. It was a large, square, very
    worn piece of parchment with nothing written on it. Harry, suspecting one of Fred and George''s jokes, stared at it. "What''s
    that supposed to be?" "This, Harry, is the secret of our success," said George, patting the parchment fondly. "It''s a
    wrench, giving it to you," said Fred, "but we decided last night, your need''s greater than ours." "Anyway, we know it
    by heart," said George. "We bequeath it to you. We don''t really need it anymore." "And what do I need with a bit of old
    parchment?" said Harry. "A bit of old parchment!" said Fred, closing his eyes with a grimace as though Harry had mortally
    offended him. "Explain, George." "Well ... when we were in our first year, Harry - young, carefree, and innocent -"

    Harry snorted. He doubted whether Fred and George had ever been innocent. "- well, more innocent than we are now - we
    got into a spot of bother with Filch." "We let off a Dungbomb in the corridor and it upset him for some reason -"

    "So he hauled us off to his office and started threatening us with the usual -"

    "- detention -"

    "- disembowelment -"

    "- and we couldn''t help noticing a drawer in one of his filing cabinets marked Confiscated and Highly Dangerous." "Don''t
    tell me -" said Harry, starting to grin. "Well, what would you''ve done?" said Fred. "George caused a diversion by dropping
    another Dungbomb, I whipped the drawer open, and grabbed - this." "It''s not as bad as it sounds, you know," said George.
    "We don''t reckon Filch ever found out how to work it.'
  - 'Book: 4, Chapter: 20

    Passage: "My bag just split ... brand-new and all ..."

    "Cedric," said Harry, "the first task is dragons." "What?" said Cedric, looking up. "Dragons," said Harry, speaking quickly,
    in case Professor Flitwick came out to see where Cedric had got to. "They''ve got four, one for each of us, and we''ve
    got to get past them." Cedric stared at him. Harry saw some of the panic he''d been feeling since Saturday night flickering
    in Cedric''s gray eyes. "Are you sure?" Cedric said in a hushed voice.'
  - 'Book: 5, Chapter: 38

    Passage: "Oh, I think it is," growled Moody, who had limped a little closer. "That''ll be them, will it, Potter?" He pointed
    with his thumb over his shoulder; his magical eye was evidently peering through the back of his head and his bowler hat.
    Harry leaned an inch or so to the left to see where Mad-Eye was pointing and there, sure enough, were the three Dursleys,
    who looked positively appalled to see Harry''s reception committee. "Ah, Harry!" said Mr. Weasley, turning from Hermione''s
    parents, whom he had been greeting enthusiastically, and who were taking it in turns to hug Hermione. "Well - shall we
    do it, then?" "Yeah, I reckon so, Arthur," said Moody. He and Mr. Weasley took the lead across the station toward the
    place where the Dursleys stood, apparently rooted to the floor. Hermione disengaged herself gently from her mother to
    join the group.'
- source_sentence: What creature does Harry fight in the Chamber of Secrets?
  sentences:
  - 'Book: 6, Chapter: 6

    Passage: asked Bill, who was being plied with wine by Fleur. "The man who ran -"

    "- the ice-cream place in Diagon Alley?" Harry interrupted, with an unpleasant, hollow sensation in the pit of his stomach.
    "He used to give me free ice creams. What''s happened to him?" "Dragged off, by the look of his place." "Why?" asked Ron,
    while Mrs. Weasley pointedly glared at Bill. "Who knows? He must''ve upset them somehow.'
  - 'Book: 7, Chapter: 25

    Passage: Harry had an ominous feeling now; he wondered whether Bill guessed more than he was letting on. "All I am saying,"
    said Bill, setting his hand on the door back into the sitting room, "is to be very careful what you promise goblins, Harry.
    It would be less dangerous to break into Gringotts than to renege on a promise to a goblin." "Right," said Harry as Bill
    opened the door, "yeah. Thanks. I''ll bear that in mind." As he followed Bill back to the others a wry thought came to
    him, born no doubt of the wine he had drunk. He seemed set on course to become just as reckless a godfather to Teddy Lupin
    as Sirius Black had been to him.'
  - 'Book: 2, Chapter: 16

    Passage: Harry smoothed it out eagerly and Ron leaned close to read it, too. Of the many fearsome beasts and monsters
    that roam our land, there is none more curious or more deadly than the Basilisk, known also as the King of Serpents. This
    snake, which may reach gigantic size and live many hundreds of years, is born from a chicken''s egg, hatched beneath a
    toad. Its methods of killing are most wondrous, for aside from its deadly and venomous fangs, the Basilisk has a murderous
    stare, and all who are fixed with the beam of its eye shall suffer instant death. Spiders flee before the Basilisk, for
    it is their mortal enemy, and the Basilisk flees only from the crowing of the rooster, which is fatal to it. And beneath
    this, a single word had been written, in a hand Harry recognized as Hermione''s. Pipes. It was as though somebody had
    just flicked a light on in his brain. "Ron," he breathed. "This is it. This is the answer.'
- source_sentence: What is the name of the magical creature that sings underwater?
  sentences:
  - 'Book: 6, Chapter: 30

    Passage: He wondered whether Scrimgeour or any of these important people were really sorry that Dumbledore was dead. But
    then he heard music, strange, otherworldly music, and he forgot his dislike of the Ministry in looking around for the
    source of it. He was not the only one: Many heads were turning, searching, a little alarmed. "In there," whispered Ginny
    in Harry''s ear. And he saw them in the clear green sunlit water, inches below the surface, reminding him horribly of
    the Inferi: a chorus of merpeople singing in a strange language he did not understand, their pallid faces rippling, their
    purplish hair flowing all around them. The music made the hair on Harry''s neck stand up, and yet it was not unpleasant.'
  - 'Book: 6, Chapter: 29

    Passage: We can arrange transport home afterward." "Seconded," barked Professor Sprout. "I suppose ... yes ..." said Slughorn
    in a rather agitated voice, while Hagrid let out a strangled sob of assent. "He''s coming," said Professor McGonagall
    suddenly, gazing down into the grounds. "The Minister ... and by the looks of it, he''s brought a delegation ..."

    "Can I leave, Professor?" said Harry at once. He had no desire at all to see, or be interrogated by, Rufus Scrimgeour
    tonight. "You may," said Professor McGonagall. "And quickly."'
