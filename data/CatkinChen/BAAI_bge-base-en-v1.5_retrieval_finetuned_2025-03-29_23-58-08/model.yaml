- source_sentence: Who is the matron of the Hogwarts hospital wing?
  sentences:
  - 'Book: 6, Chapter: 8

    Passage: "Draco Malfoy," said Harry bitterly. "Thanks for ... well ..."

    "No problem," said Tonks, without smiling. From what Harry could see in the darkness, she was as mousy-haired and miserable-looking
    as she had been when he had met her at the Burrow. "I can fix your nose if you stand still." Harry did not think much
    of this idea; he had been intending to visit Madam Pomfrey, the matron, in whom he had a little more confidence when it
    came to Healing Spells, but it seemed rude to say this, so he stayed stock-still and closed his eyes. "Episkey," said
    Tonks. Harry''s nose felt very hot, and then very cold. He raised a hand and felt it gingerly. It seemed to be mended.'
  - 'Book: 3, Chapter: 14

    Passage: "So how about it?" Ron said to Harry as though there had been no interruption. "Come on, last time we went you
    didn''t see anything. You haven''t even been inside Zonko''s yet!" Harry looked around to check that Hermione was well
    out of earshot. "Okay," he said. "But I''m taking the Invisibility Cloak this time." On Saturday morning, Harry packed
    his Invisibility Cloak in his bag, slipped the Marauder''s Map into his pocket, and went down to breakfast with everyone
    else. Hermione kept shooting suspicious looks down the table at him, but he avoided her eye and was careful to let her
    see him walking back up the marble staircase in the entrance hall as everybody else proceeded to the front doors.

    " ''Bye!" Harry called to Ron. "See you when you get back!" Ron grinned and winked.'
  - 'Book: 4, Chapter: 7

    Passage: He was always touchy about the fact that Harry, who had inherited a small fortune from his parents, had much
    more money than he did. "You won''t be getting anything for Christmas," Harry told him, thrusting Omnioculars into his
    and Hermione''s hands. "For about ten years, mind." "Fair enough," said Ron, grinning. "Oooh, thanks, Harry," said Hermione.
    "And I''ll get us some programs, look -"

    Their money bags considerably lighter, they went back to the tents. Bill, Charlie, and Ginny were all sporting green rosettes
    too, and Mr. Weasley was carrying an Irish flag. Fred and George had no souvenirs as they had given Bagman all their gold.
    And then a deep, booming gong sounded somewhere beyond the woods, and at once, green and red lanterns blazed into life
    in the trees, lighting a path to the field. "It''s time!" said Mr. Weasley, looking as excited as any of them. "Come on,
    let''s go!"'
