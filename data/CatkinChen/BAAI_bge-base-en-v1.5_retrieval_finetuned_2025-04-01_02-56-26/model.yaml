  - 'Book: 2, Chapter: 18

    Passage: I taught him myself, fifty years ago, at Hogwarts. He disappeared after leaving the school ... traveled far and
    wide ... sank so deeply into the Dark Arts, consorted with the very worst of our kind, underwent so many dangerous, magical
    transformations, that when he resurfaced as Lord Voldemort, he was barely recognizable. Hardly anyone connected Lord Voldemort
    with the clever, handsome boy who was once Head Boy here." "But, Ginny," said Mrs. Weasley. "What''s our Ginny got to
    do with - with - him?" "His d-diary!" Ginny sobbed. "I''ve b-been writing in it, and he''s been w-writing back all year
    -"

    "Ginny!" said Mr. Weasley, flabbergasted. "Haven''t I taught you anything? What have I always told you? Never trust anything
    that can think for itself if you can''t see where it keeps its brain. Why didn''t you show the diary to me, or your mother?'
- source_sentence: What is the name of the spell that reveals hidden objects?
  sentences:
  - 'Book: 4, Chapter: 35

    Passage: She came to investigate. She heard enough to guess who was hiding under the Invisibility Cloak. My father arrived
    home. She confronted him. He put a very powerful Memory Charm on her to make her forget what she''d found out. Too powerful.
    He said it damaged her memory permanently."'
  - 'Book: 6, Chapter: 9

    Passage: "Did I hear right? You''ve been taking orders from something someone wrote in a book, Harry?" She looked alarmed
    and angry. Harry knew what was on her mind at once. "It''s nothing," he said reassuringly, lowering his voice. "It''s
    not like, you know, Riddle''s diary. It''s just an old textbook someone''s scribbled on." "But you''re doing what it says?"
    "I just tried a few of the tips written in the margins, honestly, Ginny, there''s nothing funny -"

    "Ginny''s got a point," said Hermione, perking up at once. "We ought to check that there''s nothing odd about it. I mean,
    all these funny instructions, who knows?" "Hey!" said Harry indignantly, as she pulled his copy of Advanced Potion-Making
    out of his bag and raised her wand. "Specialis Revelio!" she said, rapping it smartly on the front cover. Nothing whatsoever
    happened. The book simply lay there, looking old and dirty and dog-eared. "Finished?"'
  - 'Book: 7, Chapter: 14

    Passage: However, in the few moments it took for Ron to give a low groan and Harry to start crawling toward him, he realized
    that this was not the Forbidden Forest: The trees looked younger, they were more widely spaced, the ground clearer. He
    met Hermione, also on her hands and knees, at Ron''s head. The moment his eyes fell upon Ron, all other concerns fled
    Harry''s mind, for blood drenched the whole of Ron''s left side and his face stood out, grayish-white, against the leaf-strewn
    earth. The Polyjuice Potion was wearing off now: Ron was halfway between Cattermole and himself in appearance, his hair
    turning redder and redder as his face drained of the little color it had left. "What''s happened to him?" "Splinched,"
    said Hermione, her fingers already busy at Ron''s sleeve, where the blood was wettest and darkest. Harry watched, horrified,
    as she tore open Ron''s shirt. He had always thought of Splinching as something comical, but this ... His insides crawled
    unpleasantly as Hermione laid bare Ron''s upper arm, where a great chunk of flesh was missing, scooped cleanly away as
    though by a knife. "Harry, quickly, in my bag, there''s a small bottle labeled ''Essence of Dittany'' -"

    "Bag - right -"

    Harry sped to the place where Hermione had landed, seized the tiny beaded bag, and thrust his hand inside it. At once,
    object after object began presenting itself to his touch: He felt the leather spines of books, woolly sleeves of jumpers,
    heels of shoes -

    "Quickly!" He grabbed his wand from the ground and pointed it into the depths of the magical bag. "Accio Dittany!" A small
    brown bottle zoomed out of the bag; he caught it and hastened back to Hermione and Ron, whose eyes were now half-closed,
    strips of white eyeball all that were visible between his lids. "He''s fainted," said Hermione, who was also rather pale;
    she no longer looked like Mafalda, though her hair was still gray in places. "Unstopper it for me, Harry, my hands are
    shaking." Harry wrenched the stopper off the little bottle, Hermione took it and poured three drops of the potion onto
    the bleeding wound. Greenish smoke billowed upward and when it had cleared, Harry saw that the bleeding had stopped. The
    wound now looked several days old; new skin stretched over what had just been open flesh. "Wow," said Harry. "It''s all
    I feel safe doing," said Hermione shakily. "There are spells that would put him completely right, but I daren''t try in
    case I do them wrong and cause more damage. ... He''s lost so much blood already. ..."

    "How did he get hurt? I mean" - Harry shook his head, trying to clear it, to make sense of whatever had just taken place
    - "why are we here?'
- source_sentence: What is the name of the house-elf who warns Harry not to return to Hogwarts?
  sentences:
  - 'Book: 5, Chapter: 10

    Passage: The Stinksap vanished. "Sorry," said Neville again, in a small voice. Ron and Hermione did not turn up for nearly
    an hour, by which time the food trolley had already gone by. Harry, Ginny, and Neville had finished their Pumpkin Pasties
    and were busy swapping Chocolate Frog cards when the compartment door slid open and they walked in, accompanied by Crookshanks
    and a shrilly hooting Pigwidgeon in his cage. "I''m starving," said Ron, stowing Pigwidgeon next to Hedwig, grabbing a
    Chocolate Frog from Harry and throwing himself into the seat next to him. He ripped open the wrapper, bit off the Frog''s
    head, and leaned back with his eyes closed as though he had had a very exhausting morning. "Well, there are two fifth-year
    prefects from each House," said Hermione, looking thoroughly disgruntled as she took her seat. "Boy and girl from each."
    "And guess who''s a Slytherin prefect?" said Ron, still with his eyes closed. "Malfoy," replied Harry at once, his worst
    fear confirmed.

    " ''Course," said Ron bitterly, stuffing the rest of the Frog into his mouth and taking another. "And that complete cow
    Pansy Parkinson," said Hermione viciously. "How she got to be a prefect when she''s thicker than a concussed troll ..."

    "Who''s Hufflepuff?" Harry asked. "Ernie Macmillan and Hannah Abbott," said Ron thickly. "And Anthony Goldstein and Padma
    Patil for Ravenclaw," said Hermione. "You went to the Yule Ball with Padma Patil," said a vague voice.'
  - 'Book: 2, Chapter: 2

    Passage: "Dobby, sir. Just Dobby. Dobby the house-elf," said the creature. "Oh - really?" said Harry. "Er - I don''t want
    to be rude or anything, but - this isn''t a great time for me to have a house-elf in my bedroom." Aunt Petunia''s high,
    false laugh sounded from the living room. The elf hung his head.'
  - 'Book: 2, Chapter: 3

    Passage: There was a long, shocked silence when he had finished. "Very fishy," said Fred finally. "Definitely dodgy,"
    agreed George. "So he wouldn''t even tell you who''s supposed to be plotting all this stuff?" "I don''t think he could,"
    said Harry. "I told you, every time he got close to letting something slip, he started banging his head against the wall."
    He saw Fred and George look at each other. "What, you think he was lying to me?" said Harry. "Well," said Fred, "put it
    this way - house-elves have got powerful magic of their own, but they can''t usually use it without their master''s permission.
    I reckon old Dobby was sent to stop you coming back to Hogwarts. Someone''s idea of a joke.'
- source_sentence: Who is the conductor of the Knight Bus?
  sentences:
  - 'Book: 6, Chapter: 11

    Passage: said Harry, startled.

    " ''Stanley Shunpike, conductor on the popular Wizarding conveyance the Knight Bus, has been arrested on suspicion of
    Death Eater activity. Mr. Shunpike, 21, was taken into custody late last night after a raid on his Clapham home ...''
    "

    "Stan Shunpike, a Death Eater?" said Harry, remembering the spotty youth he had first met three years before. "No way!"
    "He might have been put under the Imperius Curse," said Ron reasonably. "You never can tell." "It doesn''t look like it,"
    said Hermione, who was still reading.'
  - 'Book: 2, Chapter: 17

    Passage: Then, without thinking, without considering, as though he had meant to do it all along, Harry seized the basilisk
    fang on the floor next to him and plunged it straight into the heart of the book. There was a long, dreadful, piercing
    scream. Ink spurted out of the diary in torrents, streaming over Harry''s hands, flooding the floor. Riddle was writhing
    and twisting, screaming and flailing and then -

    He had gone. Harry''s wand fell to the floor with a clatter and there was silence.'
  - 'Book: 3, Chapter: 3

    Passage: They belonged, as Harry saw when he raised his head, to a triple-decker, violently purple bus, which had appeared
    out of thin air. Gold lettering over the windshield spelled The Knight Bus. For a split second, Harry wondered if he had
    been knocked silly by his fall. Then a conductor in a purple uniform leapt out of the bus and began to speak loudly to
    the night. "Welcome to the Knight Bus, emergency transport for the stranded witch or wizard. Just stick out your wand
    hand, step on board, and we can take you anywhere you want to go. My name is Stan Shunpike, and I will be your conductor
    this eve -"

    The conductor stopped abruptly. He had just caught sight of Harry, who was still sitting on the ground. Harry snatched
    up his wand again and scrambled to his feet. Close up, he saw that Stan Shunpike was only a few years older than he was,
    eighteen or nineteen at most, with large, protruding ears and quite a few pimples. "What were you doin'' down there?"
    said Stan, dropping his professional manner.'
- source_sentence: What is the name of the charm that creates a shield?
  sentences:
  - 'Book: 7, Chapter: 36

    Passage: screamed Mrs. Weasley. Bellatrix laughed, the same exhilarated laugh her cousin Sirius had given as he toppled
    backward through the veil, and suddenly Harry knew what was going to happen before it did. Molly''s curse soared beneath
    Bellatrix''s outstretched arm and hit her squarely in the chest, directly over her heart. Bellatrix''s gloating smile
    froze, her eyes seemed to bulge: For the tiniest space of time she knew what had happened, and then she toppled, and the
    watching crowd roared, and Voldemort screamed. Harry felt as though he turned in slow motion; he saw McGonagall, Kingsley,
    and Slughorn blasted backward, flailing and writhing through the air, as Voldemort''s fury at the fall of his last, best
    lieutenant exploded with the force of a bomb. Voldemort raised his wand and directed it at Molly Weasley. "Protego!" roared
    Harry, and the Shield Charm expanded in the middle of the Hall, and Voldemort stared around for the source as Harry pulled
    off the Invisibility Cloak at last. The yell of shock, the cheers, the screams on every side of "Harry!" "HE''S ALIVE!"
    were stifled at once. The crowd was afraid, and silence fell abruptly and completely as Voldemort and Harry looked at
    each other, and began, at the same moment, to circle each other. "I don''t want anyone else to try to help," Harry said
    loudly, and in the total silence his voice carried like a trumpet call.'
  - 'Book: 3, Chapter: 12

    Passage: It''s the nearest we''ll get to a real dementor. The boggart will turn into a dementor when he sees you, so we''ll
    be able to practice on him. I can store him in my office when we''re not using him; there''s a cupboard under my desk
    he''ll like." "Okay," said Harry, trying to sound as though he wasn''t apprehensive at all and merely glad that Lupin
    had found such a good substitute for a real dementor. "So ..." Professor Lupin had taken out his own wand, and indicated
    that Harry should do the same. "The spell I am going to try and teach you is highly advanced magic, Harry - well beyond
    Ordinary Wizarding Level. It is called the Patronus Charm." "How does it work?" said Harry nervously. "Well, when it works
    correctly, it conjures up a Patronus," said Lupin, "which is a kind of anti-dementor - a guardian that acts as a shield
    between you and the dementor." Harry had a sudden vision of himself crouching behind a Hagrid-sized figure holding a large
    club. Professor Lupin continued, "The Patronus is a kind of positive force, a projection of the very things that the dementor
    feeds upon - hope, happiness, the desire to survive - but it cannot feel despair, as real humans can, so the dementors
    can''t hurt it. But I must warn you, Harry, that the charm might be too advanced for you. Many qualified wizards have
    difficulty with it." "What does a Patronus look like?" said Harry curiously.'
  - 'Book: 6, Chapter: 27

    Passage: So tell me, while we wait for your friends ... how did you smuggle them in here? It seems to have taken you a
    long time to work out how to do it." Malfoy looked as though he was fighting down the urge to shout, or to vomit. He gulped
    and took several deep breaths, glaring at Dumbledore, his wand pointing directly at the latter''s heart. Then, as though
    he could not help himself, he said, "I had to mend that broken Vanishing Cabinet that no one''s used for years. The one
    Montague got lost in last year." "Aaaah." Dumbledore''s sigh was half a groan. He closed his eyes for a moment. "That
    was clever. ... There is a pair, I take it?" "In Borgin and Burkes," said Malfoy, "and they make a kind of passage between
    them. Montague told me that when he was stuck in the Hogwarts one, he was trapped in limbo but sometimes he could hear
    what was going on at school, and sometimes what was going on in the shop, as if the cabinet was traveling between them,
    but he couldn''t make anyone hear him.'
