    - 'Book: 3, Chapter: 3

      Passage: They belonged, as Harry saw when he raised his head, to a triple-decker, violently purple bus, which had appeared
      out of thin air. Gold lettering over the windshield spelled The Knight Bus. For a split second, Harry wondered if he
      had been knocked silly by his fall. Then a conductor in a purple uniform leapt out of the bus and began to speak loudly
      to the night. "Welcome to the Knight Bus, emergency transport for the stranded witch or wizard. Just stick out your
      wand hand, step on board, and we can take you anywhere you want to go. My name is Stan Shunpike, and I will be your
      conductor this eve -"

      The conductor stopped abruptly. He had just caught sight of Harry, who was still sitting on the ground. Harry snatched
      up his wand again and scrambled to his feet. Close up, he saw that Stan Shunpike was only a few years older than he
      was, eighteen or nineteen at most, with large, protruding ears and quite a few pimples. "What were you doin'' down there?"
      said Stan, dropping his professional manner.'
  - source_sentence: What is the name of the charm that creates a shield?
    sentences:
    - 'Book: 7, Chapter: 36

      Passage: screamed Mrs. Weasley. Bellatrix laughed, the same exhilarated laugh her cousin Sirius had given as he toppled
      backward through the veil, and suddenly Harry knew what was going to happen before it did. Molly''s curse soared beneath
      Bellatrix''s outstretched arm and hit her squarely in the chest, directly over her heart. Bellatrix''s gloating smile
      froze, her eyes seemed to bulge: For the tiniest space of time she knew what had happened, and then she toppled, and
      the watching crowd roared, and Voldemort screamed. Harry felt as though he turned in slow motion; he saw McGonagall,
      Kingsley, and Slughorn blasted backward, flailing and writhing through the air, as Voldemort''s fury at the fall of
      his last, best lieutenant exploded with the force of a bomb. Voldemort raised his wand and directed it at Molly Weasley.
      "Protego!" roared Harry, and the Shield Charm expanded in the middle of the Hall, and Voldemort stared around for the
      source as Harry pulled off the Invisibility Cloak at last. The yell of shock, the cheers, the screams on every side
      of "Harry!" "HE''S ALIVE!" were stifled at once. The crowd was afraid, and silence fell abruptly and completely as Voldemort
      and Harry looked at each other, and began, at the same moment, to circle each other. "I don''t want anyone else to try
      to help," Harry said loudly, and in the total silence his voice carried like a trumpet call.'
    - 'Book: 3, Chapter: 12

      Passage: It''s the nearest we''ll get to a real dementor. The boggart will turn into a dementor when he sees you, so
      we''ll be able to practice on him. I can store him in my office when we''re not using him; there''s a cupboard under
      my desk he''ll like." "Okay," said Harry, trying to sound as though he wasn''t apprehensive at all and merely glad that
      Lupin had found such a good substitute for a real dementor. "So ..." Professor Lupin had taken out his own wand, and
      indicated that Harry should do the same. "The spell I am going to try and teach you is highly advanced magic, Harry
      - well beyond Ordinary Wizarding Level. It is called the Patronus Charm." "How does it work?" said Harry nervously.
      "Well, when it works correctly, it conjures up a Patronus," said Lupin, "which is a kind of anti-dementor - a guardian
      that acts as a shield between you and the dementor." Harry had a sudden vision of himself crouching behind a Hagrid-sized
      figure holding a large club. Professor Lupin continued, "The Patronus is a kind of positive force, a projection of the
      very things that the dementor feeds upon - hope, happiness, the desire to survive - but it cannot feel despair, as real
      humans can, so the dementors can''t hurt it. But I must warn you, Harry, that the charm might be too advanced for you.
      Many qualified wizards have difficulty with it." "What does a Patronus look like?" said Harry curiously.'
    - 'Book: 6, Chapter: 27

      Passage: So tell me, while we wait for your friends ... how did you smuggle them in here? It seems to have taken you
      a long time to work out how to do it." Malfoy looked as though he was fighting down the urge to shout, or to vomit.
      He gulped and took several deep breaths, glaring at Dumbledore, his wand pointing directly at the latter''s heart. Then,
      as though he could not help himself, he said, "I had to mend that broken Vanishing Cabinet that no one''s used for years.
      The one Montague got lost in last year." "Aaaah." Dumbledore''s sigh was half a groan. He closed his eyes for a moment.
      "That was clever. ... There is a pair, I take it?" "In Borgin and Burkes," said Malfoy, "and they make a kind of passage
      between them. Montague told me that when he was stuck in the Hogwarts one, he was trapped in limbo but sometimes he
      could hear what was going on at school, and sometimes what was going on in the shop, as if the cabinet was traveling
      between them, but he couldn''t make anyone hear him.'
