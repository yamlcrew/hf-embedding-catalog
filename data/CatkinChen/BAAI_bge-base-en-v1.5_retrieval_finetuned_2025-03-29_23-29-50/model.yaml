  - 'Book: 5, Chapter: 35

    Passage: Harry saw Sirius duck Bellatrix''s jet of red light: He was laughing at her. "Come on, you can do better than
    that!" he yelled, his voice echoing around the cavernous room. The second jet of light hit him squarely on the chest.
    The laughter had not quite died from his face, but his eyes widened in shock.'
  - 'Book: 6, Chapter: 5

    Passage: "Harry, oh, Harry ..."

    She sat down on the edge of his bed again. "We wondered, after we got back from the Ministry ... Obviously, we didn''t
    want to say anything to you, but from what Lucius Malfoy said about the prophecy, how it was about you and Voldemort,
    well, we thought it might be something like this. ... Oh, Harry ..." She stared at him, then whispered, "Are you scared?"
    "Not as much as I was," said Harry. "When I first heard it, I was ... but now, it seems as though I always knew I''d have
    to face him in the end. ..."

    "When we heard Dumbledore was collecting you in person, we thought he might be telling you something or showing you something
    to do with the prophecy," said Ron eagerly. "And we were kind of right, weren''t we? He wouldn''t be giving you lessons
    if he thought you were a goner, wouldn''t waste his time - he must think you''ve got a chance!" "That''s true," said Hermione.
    "I wonder what he''ll teach you, Harry?'
- source_sentence: Who is the first student to be Sorted into Slytherin in Harry’s year?
  sentences:
  - 'Book: 5, Chapter: 37

    Passage: Harry snarled. "He threw me out of his office!" "I am aware of it," said Dumbledore heavily. "I have already
    said that it was a mistake for me not to teach you myself, though I was sure, at the time, that nothing could have been
    more dangerous than to open your mind even further to Voldemort while in my presence -"

    "Snape made it worse, my scar always hurt worse after lessons with him -" Harry remembered Ron''s thoughts on the subject
    and plunged on. "How do you know he wasn''t trying to soften me up for Voldemort, make it easier for him to get inside
    my -"

    "I trust Severus Snape," said Dumbledore simply. "But I forgot - another old man''s mistake - that some wounds run too
    deep for the healing.'
  - 'Book: 1, Chapter: 7

    Passage: When Neville Longbottom, the boy who kept losing his toad, was called, he fell over on his way to the stool.
    The hat took a long time to decide with Neville. When it finally shouted, "GRYFFINDOR," Neville ran off still wearing
    it, and had to jog back amid gales of laughter to give it to "MacDougal, Morag." Malfoy swaggered forward when his name
    was called and got his wish at once: the hat had barely touched his head when it screamed, "SLYTHERIN!" Malfoy went to
    join his friends Crabbe and Goyle, looking pleased with himself. There weren''t many people left now. "Moon" ... , "Nott"
    ... , "Parkinson" ... , then a pair of twin girls, "Patil" and "Patil" ... , then "Perks, Sally-Anne" ... , and then,
    at last -

    "Potter, Harry!" As Harry stepped forward, whispers suddenly broke out like little hissing fires all over the hall.'
