    ... The sword of Gryffindor was lying at the bottom of the forest pool.'
- source_sentence: Who is Harry's first Defense Against the Dark Arts teacher?
  sentences:
  - 'Book: 3, Chapter: 1

    Passage: Harry picked up the clipping, smoothed it out, and read:

    MINISTRY OF MAGIC EMPLOYEE

    SCOOPS GRAND PRIZE

    Arthur Weasley, Head of the Misuse of Muggle Artifacts Office at the Ministry of Magic, has won the annual Daily Prophet
    Grand Prize Galleon Draw. A delighted Mr. Weasley told the Daily Prophet, "We will be spending the gold on a summer holiday
    in Egypt, where our eldest son, Bill, works as a curse breaker for Gringotts Wizarding Bank." The Weasley family will
    be spending a month in Egypt, returning for the start of the new school year at Hogwarts, which five of the Weasley children
    currently attend. Harry scanned the moving photograph, and a grin spread across his face as he saw all nine of the Weasleys
    waving furiously at him, standing in front of a large pyramid. Plump little Mrs. Weasley; tall, balding Mr. Weasley; six
    sons; and one daughter, all (though the black-and-white picture didn''t show it) with flaming-red hair.'
  - 'Book: 1, Chapter: 5

    Passage: "Professor Quirrell!" said Hagrid. "Harry, Professor Quirrell will be one of your teachers at Hogwarts." "P-P-Potter,"
    stammered Professor Quirrell, grasping Harry''s hand, "c-can''t t-tell you how p-pleased I am to meet you." "What sort
    of magic do you teach, Professor Quirrell?" "D-Defense Against the D-D-Dark Arts," muttered Professor Quirrell, as though
    he''d rather not think about it. "N-not that you n-need it, eh, P-P-Potter?" He laughed nervously. "You''ll be g-getting
    all your equipment, I suppose? I''ve g-got to p-pick up a new b-book on vampires, m-myself." He looked terrified at the
    very thought. But the others wouldn''t let Professor Quirrell keep Harry to himself. It took almost ten minutes to get
    away from them all. At last, Hagrid managed to make himself heard over the babble.'
  - 'Book: 3, Chapter: 17

    Passage: But Harry had just seen - slinking toward them, his body low to the ground, wide yellow eyes glinting eerily
    in the darkness - Crookshanks. Whether he could see them or was following the sound of Scabbers''s squeaks, Harry couldn''t
    tell. "Crookshanks!" Hermione moaned. "No, go away, Crookshanks! Go away!" But the cat was getting nearer -

    "Scabbers - NO!" Too late - the rat had slipped between Ron''s clutching fingers, hit the ground, and scampered away.
    In one bound, Crookshanks sprang after him, and before Harry or Hermione could stop him, Ron had thrown the Invisibility
    Cloak off himself and pelted away into the darkness. "Ron!" Hermione moaned. She and Harry looked at each other, then
    followed at a sprint; it was impossible to run full out under the cloak; they pulled it off and it streamed behind them
    like a banner as they hurtled after Ron; they could hear his feet thundering along ahead and his shouts at Crookshanks.
    "Get away from him - get away - Scabbers, come here -"

    There was a loud thud. "Gotcha!'
- source_sentence: What is the name of the spell that causes the front teeth to elongate at an alarming rate?
  sentences:
  - 'Book: 5, Chapter: 8

    Passage: Harry glanced sideways at Dumbledore, seeking reassurance; he was not at all sure that Dumbledore was right in
    telling the Wizengamot, in effect, that it was about time they made a decision. Again, however, Dumbledore seemed oblivious
    to Harry''s attempt to catch his eye. He continued to look up at the benches where the entire Wizengamot had fallen into
    urgent, whispered conversations. Harry looked at his feet. His heart, which seemed to have swollen to an unnatural size,
    was thumping loudly under his ribs. He had expected the hearing to last longer than this. He was not at all sure that
    he had made a good impression. He had not really said very much. He ought to have explained more fully about the dementors,
    about how he had fallen over, about how both he and Dudley had nearly been kissed. ...

    Twice he looked up at Fudge and opened his mouth to speak, but his swollen heart was now constricting his air passages
    and both times he merely took a deep breath and looked back at his shoes. Then the whispering stopped.'
  - 'Book: 7, Chapter: 21

    Passage: "We all know that there are such things as Invisibility Cloaks. They are rare, but they exist. But -"

    "Ah, but the Third Hallow is a true Cloak of Invisibility, Miss Granger! I mean to say, it is not a traveling cloak imbued
    with a Disillusionment Charm, or carrying a Bedazzling Hex, or else woven from Demiguise hair, which will hide one initially
    but fade with the years until it turns opaque. We are talking about a cloak that really and truly renders the wearer completely
    invisible, and endures eternally, giving constant and impenetrable concealment, no matter what spells are cast at it.
    How many cloaks have you ever seen like that, Miss Granger?" Hermione opened her mouth to answer, then closed it again,
    looking more confused than ever.'
  - 'Book: 4, Chapter: 18

    Passage: People all around them scrambled out of the way, backing down the corridor. "Harry!" Hermione said warningly.
    "Go on, then, Potter," Malfoy said quietly, drawing out his own wand. "Moody''s not here to look after you now - do it,
    if you''ve got the guts -"

    For a split second, they looked into each other''s eyes, then, at exactly the same time, both acted. "Furnunculus!" Harry
    yelled. "Densaugeo!" screamed Malfoy. Jets of light shot from both wands, hit each other in midair, and ricocheted off
    at angles - Harry''s hit Goyle in the face, and Malfoy''s hit Hermione. Goyle bellowed and put his hands to his nose,
    where great ugly boils were springing up - Hermione, whimpering in panic, was clutching her mouth. "Hermione!"'
- source_sentence: Who is the leader of the Order of the Phoenix?
  sentences:
  - 'Book: 7, Chapter: 2

    Passage: The only things left out of place were today''s Daily Prophet, still lying on the bed, and on top of it, the
    piece of broken mirror. Harry moved across the room, slid the mirror fragment off today''s Prophet, and unfolded the newspaper.
    He had merely glanced at the headline when he had taken the rolled-up paper from the delivery owl early that morning and
    thrown it aside, after noting that it said nothing about Voldemort. Harry was sure that the Ministry was leaning on the
    Prophet to suppress news about Voldemort. It was only now, therefore, that he saw what he had missed. Across the bottom
    half of the front page a smaller headline was set over a picture of Dumbledore striding along looking harried:

    DUMBLEDORE - THE TRUTH AT LAST? Coming next week, the shocking story of the flawed genius considered by many to be the
    greatest wizard of his generation. Stripping away the popular image of serene, silver-bearded wisdom, Rita Skeeter reveals
    the disturbed childhood, the lawless youth, the lifelong feuds, and the guilty secrets that Dumbledore carried to his
    grave. WHY was the man tipped to be Minister of Magic content to remain a mere headmaster? WHAT was the real purpose of
    the secret organization known as the Order of the Phoenix? HOW did Dumbledore really meet his end? The answers to these
    and many more questions are explored in the explosive new biography, The Life and Lies of Albus Dumbledore, by Rita Skeeter,
    exclusively interviewed by Betty Braithwaite, page 13, inside.'
  - 'Book: 6, Chapter: 8

    Passage: "Really?" said Harry, taking care not to catch Ron''s eye; the last time he had met Hagrid''s half-brother, a
    vicious giant with a talent for ripping up trees by the roots, his vocabulary had comprised five words, two of which he
    was unable to pronounce properly. "Oh yeah, he''s really come on," said Hagrid proudly. "Yeh''ll be amazed. I''m thinkin''
    o'' trainin'' him up as me assistant." Ron snorted loudly, but managed to pass it off as a violent sneeze.'
  - 'Book: 4, Chapter: 6

    Passage: "Don''t you lie to me!" Mrs. Weasley pointed her wand at George''s pocket and said, "Accio!" Several small, brightly
    colored objects zoomed out of George''s pocket; he made a grab for them but missed, and they sped right into Mrs. Weasley''s
    outstretched hand. "We told you to destroy them!" said Mrs. Weasley furiously, holding up what were unmistakably more
    Ton-Tongue Toffees. "We told you to get rid of the lot! Empty your pockets, go on, both of you!" It was an unpleasant
    scene; the twins had evidently been trying to smuggle as many toffees out of the house as possible, and it was only by
    using her Summoning Charm that Mrs. Weasley managed to find them all. "Accio! Accio!'
