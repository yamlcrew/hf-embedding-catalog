widgetData:
- source_sentence: Who is the oldest Weasley sibling?
  sentences:
  - 'Book: 3, Chapter: 1

    Passage: Harry picked up the clipping, smoothed it out, and read:

    MINISTRY OF MAGIC EMPLOYEE

    SCOOPS GRAND PRIZE

    Arthur Weasley, Head of the Misuse of Muggle Artifacts Office at the Ministry of Magic, has won the annual Daily Prophet
    Grand Prize Galleon Draw. A delighted Mr. Weasley told the Daily Prophet, "We will be spending the gold on a summer holiday
    in Egypt, where our eldest son, Bill, works as a curse breaker for Gringotts Wizarding Bank." The Weasley family will
    be spending a month in Egypt, returning for the start of the new school year at Hogwarts, which five of the Weasley children
    currently attend. Harry scanned the moving photograph, and a grin spread across his face as he saw all nine of the Weasleys
    waving furiously at him, standing in front of a large pyramid. Plump little Mrs. Weasley; tall, balding Mr. Weasley; six
    sons; and one daughter, all (though the black-and-white picture didn''t show it) with flaming-red hair.'
  - 'Book: 6, Chapter: 27

    Passage: For the first time, Dumbledore was pleading. Snape said nothing, but walked forward and pushed Malfoy roughly
    out of the way. The three Death Eaters fell back without a word. Even the werewolf seemed cowed. Snape gazed for a moment
    at Dumbledore, and there was revulsion and hatred etched in the harsh lines of his face. "Severus ... please ..."

    Snape raised his wand and pointed it directly at Dumbledore. "Avada Kedavra!" A jet of green light shot from the end of
    Snape''s wand and hit Dumbledore squarely in the chest. Harry''s scream of horror never left him; silent and unmoving,
    he was forced to watch as Dumbledore was blasted into the air. For a split second, he seemed to hang suspended beneath
    the shining skull, and then he fell slowly backward, like a great rag doll, over the battlements and out of sight.'
  - 'Book: 5, Chapter: 37

    Passage: "And what brings you here in the early hours of the morning?" said Phineas. "This office is supposed to be barred
    to all but the rightful headmaster. Or has Dumbledore sent you here? Oh, don''t tell me ..." He gave another shuddering
    yawn. "Another message for my worthless great-great-grandson?" Harry could not speak. Phineas Nigellus did not know that
    Sirius was dead, but Harry could not tell him.'
- source_sentence: Who is the Hufflepuff boy who dies in the Triwizard Tournament?
  sentences:
  - 'Book: 1, Chapter: 1

    Passage: About why he''s disappeared? About what finally stopped him?" It seemed that Professor McGonagall had reached
    the point she was most anxious to discuss, the real reason she had been waiting on a cold, hard wall all day, for neither
    as a cat nor as a woman had she fixed Dumbledore with such a piercing stare as she did now. It was plain that whatever
    "everyone" was saying, she was not going to believe it until Dumbledore told her it was true. Dumbledore, however, was
    choosing another lemon drop and did not answer.'
  - 'Book: 4, Chapter: 37

    Passage: I think that you have the right, therefore, to know exactly how it came about." Harry raised his head and stared
    at Dumbledore. "Cedric Diggory was murdered by Lord Voldemort." A panicked whisper swept the Great Hall. People were staring
    at Dumbledore in disbelief, in horror.'
  - 'Book: 1, Chapter: 8

    Passage: Three times a week they went out to the greenhouses behind the castle to study Herbology, with a dumpy little
    witch called Professor Sprout, where they learned how to take care of all the strange plants and fungi, and found out
    what they were used for. Easily the most boring class was History of Magic, which was the only one taught by a ghost.
    Professor Binns had been very old indeed when he had fallen asleep in front of the staff room fire and got up next morning
    to teach, leaving his body behind him. Binns droned on and on while they scribbled down names and dates, and got Emeric
    the Evil and Uric the Oddball mixed up. Professor Flitwick, the Charms teacher, was a tiny little wizard who had to stand
    on a pile of books to see over his desk. At the start of their first class he took the roll call, and when he reached
    Harry''s name he gave an excited squeak and toppled out of sight. Professor McGonagall was again different.'
- source_sentence: Who is the charms master who helps with the Triwizard Tournament?
  sentences:
  - 'Book: 1, Chapter: 6

    Passage: "The thing is - the thing is, I don''t know how to -"

    "How to get onto the platform?" she said kindly, and Harry nodded. "Not to worry," she said. "All you have to do is walk
    straight at the barrier between platforms nine and ten. Don''t stop and don''t be scared you''ll crash into it, that''s
    very important. Best do it at a bit of a run if you''re nervous.'
  - 'Book: 7, Chapter: 30

    Passage: "Professor," Harry said, approaching the little Charms master, "Professor, I''m sorry to interrupt, but this
    is important. Have you got any idea where the diadem of Ravenclaw is?" "- Protego Horribilis - the diadem of Ravenclaw?"
    squeaked Flitwick. "A little extra wisdom never goes amiss, Potter, but I hardly think it would be much use in this situation!"
    "I only meant - do you know where it is? Have you ever seen it?" "Seen it? Nobody has seen it in living memory! Long since
    lost, boy!" Harry felt a mixture of desperate disappointment and panic. What, then, was the Horcrux? "We shall meet you
    and your Ravenclaws in the Great Hall, Filius!"'
  - 'Book: 5, Chapter: 11

    Passage: Said Slytherin, "We''ll teach just those

    Whose ancestry is purest." Said Ravenclaw, "We''ll teach those whose

    Intelligence is surest." Said Gryffindor, "We''ll teach all those

    With brave deeds to their name,"

    Said Hufflepuff, "I''ll teach the lot,

    And treat them just the same." These differences caused little strife

    When first they came to light,

    For each of the four founders had

    A House in which they might

    Take only those they wanted, so,

    For instance, Slytherin

    Took only pure-blood wizards

    Of great cunning, just like him,

    And only those of sharpest mind

    Were taught by Ravenclaw

    While the bravest and the boldest

    Went to daring Gryffindor. Good Hufflepuff she took the rest,

    And taught them all she knew,

    Thus the Houses and their founders

    Retained friendships firm and true. So Hogwarts worked in harmony

    For several happy years,

    But then discord crept among us

    Feeding on our faults and fears. The Houses that, like pillars four,

    Had once held up our school,

    Now turned upon each other and,

    Divided, sought to rule. And for a while it seemed the school

    Must meet an early end,

    What with dueling and with fighting

    And the clash of friend on friend

    And at last there came a morning

    When old Slytherin departed

    And though the fighting then died out

    He left us quite downhearted. And never since the founders four

    Were whittled down to three

    Have the Houses been united

    As they once were meant to be. And now the Sorting Hat is here

    And you all know the score:

    I sort you into Houses

    Because that is what I''m for,

    But this year I''ll go further,

    Listen closely to my song:

    Though condemned I am to split you

    Still I worry that it''s wrong,

    Though I must fulfill my duty

    And must quarter every year

    Still I wonder whether sorting

    May not bring the end I fear. Oh, know the perils, read the signs,

    The warning history shows,

    For our Hogwarts is in danger

    From external, deadly foes

    And we must unite inside her

    Or we''ll crumble from within. I have told you, I have warned you. ...

    Let the Sorting now begin. The hat became motionless once more; applause broke out, though it was punctured, for the first
    time in Harry''s memory, with muttering and whispers. All across the Great Hall students were exchanging remarks with
    their neighbors and Harry, clapping along with everyone else, knew exactly what they were talking about.'
- source_sentence: What is the name of the spell that conjures a Patronus?
  sentences:
  - 'Book: 7, Chapter: 33

    Passage: He opened his mouth, but closed it without speaking. "I can''t pretend anymore. You''ve chosen your way, I''ve
    chosen mine." "No - listen, I didn''t mean -"

    "- to call me Mudblood? But you call everyone of my birth Mudblood, Severus. Why should I be any different?"'
  - 'Book: 5, Chapter: 22

    Passage: cried a frail-looking old wizard whom Harry recognized as Dumbledore''s predecessor, Armando Dippet. "Shame on
    you, Phineas!" "Shall I persuade him, Dumbledore?" called a gimlet-eyed witch, raising an unusually thick wand that looked
    not unlike a birch rod. "Oh, very well," said the wizard called Phineas, eyeing this wand slightly apprehensively, "though
    he may well have destroyed my picture by now, he''s done most of the family -"

    "Sirius knows not to destroy your portrait," said Dumbledore, and Harry realized immediately where he had heard Phineas''s
    voice before: issuing from the apparently empty frame in his bedroom in Grimmauld Place. "You are to give him the message
    that Arthur Weasley has been gravely injured and that his wife, children, and Harry Potter will be arriving at his house
    shortly. Do you understand?" "Arthur Weasley, injured, wife and children and Harry Potter coming to stay," recited Phineas
    in a bored voice. "Yes, yes ... very well. ..."

    He sloped away into the frame of the portrait and disappeared from view at the very moment that the study door opened
    again. Fred, George, and Ginny were ushered inside by Professor McGonagall, all three of them looking disheveled and shocked,
    still in their night things. "Harry - what''s going on?" asked Ginny, who looked frightened. "Professor McGonagall says
    you saw Dad hurt -"

    "Your father has been injured in the course of his work for the Order of the Phoenix," said Dumbledore before Harry could
    speak. "He has been taken to St. Mungo''s Hospital for Magical Maladies and Injuries. I am sending you back to Sirius''s
    house, which is much more convenient for the hospital than the Burrow.'
  - 'Book: 3, Chapter: 12

    Passage: "Each one is unique to the wizard who conjures it." "And how do you conjure it?" "With an incantation, which
    will work only if you are concentrating, with all your might, on a single, very happy memory." Harry cast his mind about
    for a happy memory. Certainly, nothing that had happened to him at the Dursleys'' was going to do. Finally, he settled
    on the moment when he had first ridden a broomstick. "Right," he said, trying to recall as exactly as possible the wonderful,
    soaring sensation of his stomach. "The incantation is this -" Lupin cleared his throat.'
- source_sentence: Which Hogwarts house does Harry get sorted into?
  sentences:
  - 'Book: 1, Chapter: 7

    Passage: "Are you sure? You could be great, you know, its all here in your head, and Slytherin will help you on the way
    to greatness, no doubt about that - no? Well, if you''re sure - better be GRYFFINDOR!" Harry heard the hat shout the last
    word to the whole hall. He took off the hat and walked shakily toward the Gryffindor table. He was so relieved to have
    been chosen and not put in Slytherin, he hardly noticed that he was getting the loudest cheer yet.'
  - 'Book: 4, Chapter: 9

    Passage: "So," said Mr. Diggory with a kind of savage triumph, looking down upon Winky, who was still shaking convulsively.
    "I is not doing it!" she squealed, her eyes rolling in terror. "I is not, I is not, I is not knowing how! I is a good
    elf, I isn''t using wands, I isn''t knowing how!" "You''ve been caught red-handed, elf!" Mr. Diggory roared.'
  - 'Book: 5, Chapter: 27

    Passage: "I''ll bet you wish you hadn''t given up Divination now, don''t you, Hermione?" asked Parvati, smirking. It was
    breakfast time a few days after the sacking of Professor Trelawney, and Parvati was curling her eyelashes around her wand
    and examining the effect in the back of her spoon. They were to have their first lesson with Firenze that morning. "Not
    really," said Hermione indifferently, who was reading the Daily Prophet.'
