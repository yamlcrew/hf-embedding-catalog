- source_sentence: What rate limiting parameters does RFOpenAIAPIModelConfig provide, and why are they needed?
  sentences:
  - "  :param rpm_limit: Rate limit for requests per minute to the OpenAI API. Used for throttling to avoid exceeding Open\
    \ AI API quotas. Check the rate limit published by Open AI for details on your tier and the latest per-model limits on\
    \ `this page <https://platform.openai.com/docs/guides/rate-limits>`__.\n  :type rpm_limit: int\n\n  :param tpm_limit:\
    \ Rate limit for tokens per minute to the OpenAI API. Used for throttling to avoid exceeding API quotas. See the rate\
    \ limit page above for details.\n  :type tpm_limit: int"
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
  - "Stop\n----\n\nThis IC Op earmarks a run to be stopped at the end of its current chunk. \nIt will still be alive but it\
    \ will not use any GPU resources from the next chunk. \nYou will still see its minibatch-level plots advancing for the\
    \ current chunk. \nYou cannot stop an already stopped or deleted run. \n\n\n.. raw:: html\n\n    <img src=\"_static/icop-stop2.png\"\
    \ alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\
    \    <img src=\"_static/icop-stop.png\" alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"\
    this.requestFullscreen()\">\n"
- source_sentence: What Python version does RapidFire AI require, and what command can you run to diagnose installation issues?
  sentences:
  - "  RapidFire AI requires Python 3.12+. Verify your shell's ``python3`` is 3.12 before creating/activating the venv.\n\n\
    Quick diagnostics\n-----------------\n\nIf you encounter any error, run the doctor command to get a complete diagnostic\
    \ report (Python env, relevant packages, GPU/CUDA, and key environment variables):\n\n.. code-block:: bash\n\n   rapidfireai\
    \ doctor\n"
  - "Compute Metrics Function\n------\n\nOptional user-provided function specifying custom evaluation metrics based on the\
    \ generated \noutputs and ground truth.\n\nIt is passed to the :code:`compute_metrics` argument of :class:`RFModelConfig`.\
    \ \nAlso read: :doc:`the LoRA and Model Configs page</models>`.\nYou can create multiple variants of these functions and\
    \ pass them all as a single \n:code:`List` to your :class:`RFModelConfig` to create a multi-config specification.\n\n\
    This function is invoked by the underlying HF trainer at a cadence controlled by the \n:code:`eval_strategy` and :code:`eval_steps`\
    \ arguments.\nAlso read: :doc:`the Trainer Configs page</trainers>`.\n\n.. py:function:: fit.compute_metrics_fn(eval_preds:\
    \ Tuple) -> Dict[str, float]\n\n   :param eval_preds: Tuple containing generated predictions and ground truth labels from\
    \ the eval dataset.\n   :type eval_preds: Tuple[List[str], List[str]]\n\n   :return: Dictionary with user-defined metrics\
    \ with names keys and numbers as values\n   :rtype: Dict[str, float]\n\n\n**Example:**\n\n.. code-block:: python\n\n\t\
    # From the SFT tutorial notebook\n\tdef sample_compute_metrics(eval_preds):  \n\t\t\"\"\"Optional function to compute\
    \ eval metrics based on predictions and labels\"\"\"\n\t\tpredictions, labels = eval_preds\n\n\t\t# Standard text-based\
    \ eval metrics: Rouge and BLEU\n\t\timport evaluate\n\t\trouge = evaluate.load(\"rouge\")\n\t\tbleu = evaluate.load(\"\
    bleu\")\n\n\t\trouge_output = rouge.compute(predictions=predictions, references=labels, use_stemmer=True)\n\t\trouge_l\
    \ = rouge_output[\"rougeL\"]\n\t\tbleu_output = bleu.compute(predictions=predictions, references=labels)\n\t\tbleu_score\
    \ = bleu_output[\"bleu\"]\n\n\t\treturn {\"rougeL\": round(rouge_l, 4), \"bleu\": round(bleu_score, 4)}"
  - "Why Not Just Downsample Data?\n------------\n\nAt first glance, one might consider running multi-config comparisons by\
    \ downsampling data for \nquick estimates, then running promising configs on full data. While common, this approach is\
    \ \noften misleading and cumbersome.\n\nA single downsample introduces variance from one static snapshot, potentially\
    \ leading to wrong \nconclusions, especially with overfitting-prone LLMs/DL models. It requires manual checkpoint \nmanagement,\
    \ adding tedious file work. You also do not get dynamic control (stop, resume, clone-modify),\nor you must reimplement\
    \ such tricky operations, taking time away from your AI application work.\n\nRapidFire AI takes such practical heuristics\
    \ to their logical conclusion with shard-based \nadaptive multi-config execution with dynamic experiment control. This\
    \ offers you maximum power \nand flexibility for AI development without extra DevOps grunt work, i.e., *rapid experimentation*.\n\
    \nThe above said, note that downsampling is *complementary* to rapid experimentation--feel free \ndo both! The adaptive\
    \ execution can operate on your downsampled dataset all the same."
- source_sentence: What must the create_model_fn return, and when is it invoked by RapidFire AI?
  sentences:
  - "The main \"Experiments\" page on the dashboard has 4 main tabs: \n\n* Table\n\n* Chart\n\n* Experiment Log\n\n* Interactive\
    \ Control (IC) Log\n\n\nThe screenshot below shows the \"Table\" view of an experiment with all its runs. \nEach run represents\
    \ one model with one set of config knob values, which is standard dashboard semantics.\n\n\n.. raw:: html\n\n    <img\
    \ src=\"_static/mlflow-1-table.png\" alt=\"Table view of runs metadata\" \n         style=\"cursor: zoom-in; max-width:\
    \ 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nMetrics Plots\n----\n\nThe screenshot below shows the \"Chart\" view\
    \ of an experiment with all its runs. \nEach plot corresponds to a metric, spanning :code:`loss` on the training set and\
    \ evaluation set, \nas well all named metrics returned in your :func:`compute_metrics()` function in the trainer config.\n\
    \nWe call attention to 3 key aspects of the visualizations here: \n\n* The x-axis \"Step\" for the mini batch-level plots\
    \ represents absolute number of minibatches seen by that run. So, if the :code:`batch_size` is different for different\
    \ runs in your experiment, they will take different numbers of steps and the curves will not line up till the end. This\
    \ is not a bug but the expected correct behavior.\n\n* The x-axis \"Step\" for the epoch-level plots represents absolute\
    \ number of epochs seen by that run. So, if the :code:`epochs` is different for different runs in your experiment, they\
    \ will take different numbers of steps again as above.\n\n* Please refresh the browser page to get RapidFire AI's metrics\
    \ reader to pull the latest data entries from the metrics files.\n\n.. raw:: html\n\n    <img src=\"_static/mlflow-2-chart.png\"\
    \ alt=\"Metrics plots on dashboard\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\"\
    >\n\n\nThe dashboard picks some default colors for all runs, but you can change their colors by \nclicking the \"color\
    \ circle\" next to the run number in the \"Run Name\" column. \nA color palette will pop up as shown in the screenshot\
    \ below.\n\n.. raw:: html\n\n    <img src=\"_static/mlflow-3-colors.png\" alt=\"Change colors of runs\" \n         style=\"\
    cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nMessage Logs\n------\n\nThere are two continually\
    \ appending message logs on the third and fourth tabs: \"Experiment Log\" and \n\"Interactive Control Log\", respectively.\
    \ \nAll operations you run with RapidFire AI's API will be displayed on the former. \nThe latter will specifically display\
    \ all the Interactive Control (IC) operations you do via the IC Ops \npanels, as shown on the screenshot below.\n\n\n\
    .. raw:: html\n\n    <img src=\"_static/mlflow-4-log.png\" alt=\"Logs on dashboard\" \n         style=\"cursor: zoom-in;\
    \ max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nThe full experiment log will also be available as a text\
    \ file saved on your local directory under the name \"rapidfire.log\"."
  - "Confidence Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly\
    \ randomly**, i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies to\
    \ calculate confidence intervals for projected estimates of metrics. \nYou can indicate the confidence level (we recommend\
    \ 95%) and whether to perform \"finite population correction\" (FPC) or not. \nThese values can be specified under the\
    \ key :code:`\"online_strategy_kwargs\"` in your config dictionary as illustrated below.\n\n.. code-block:: python\n\n\
    \    # Based on FiQA RAG tutorial use case\n    \"online_strategy_kwargs\": {\n        \"strategy_name\": \"normal\",\n\
    \        \"confidence_level\": 0.95,\n        \"use_fpc\": True,\n    },\n\nNotation \n^^^^^^^\n\n* :math:`N` = Total\
    \ population size (total number of queries in eval set)\n* :math:`n` = Sample size (number of queries processed so far)\n\
    * :math:`\\hat{p}` = Observed sample proportion or average for an algebraic metric\n* :math:`\\bar{X}` = Sample mean for\
    \ a distributive metric\n* :math:`\\widehat{T}` = Estimated population total for a distributive metric\n* :math:`\\text{Var}(\\\
    widehat{T})` = Variance of the above estimated population total\n* :math:`\\text{SE}` = Standard error (measure of estimate\
    \ uncertainty)\n* :math:`\\text{CI}` = Confidence interval\n* :math:`z` = Z-score for confidence level (1.96 for 95% confidence;\
    \ used in Normal and Wilson)\n* :math:`\\alpha` = Significance level (0.05 for 95% confidence)\n* :math:`n_{\\text{eff}}`\
    \ = Effective sample size (adjusted for FPC in Wilson)\n* :math:`a, b` = Lower and upper bounds of metric value range\n\
    * :math:`R` = Range width, :math:`R = b - a`\n* :math:`\\varepsilon` = Margin of error (half-width of confidence interval\
    \ for Hoeffding)\n* :math:`\\varepsilon_{\\bar{X}}` = Margin of error for sample mean (Hoeffding distributive)\n* :math:`\\\
    text{FPC}` = Finite population correction factor\n\n\nFinite Population Correction (FPC)\n^^^^^^^^^^^^^^^^^^^^^^\n\nWhen\
    \ sampling without replacement from finite populations, enabling FPC \nmultiplies the standard error (SE) by :math:`\\\
    text{FPC} = \\sqrt{(N-n)/(N-1)}` \nwhere :math:`N` is population size and :math:`n` is sample size.\n\n"
  - "Create Model Function\n------\n\nMandatory user-provided function to create HuggingFace model and tokenizer objects based\
    \ on the  \nmodel type(s) and name(s) given in the :code:`RFModelConfig` and multi-config specification. \nAlso read :doc:`the\
    \ LoRA and Model Configs page</models>`.\nA model can be imported from the Hugging Face model hub or read from a local\
    \ checkpoint file. \n\nIt is passed to :func:`run_fit()` directly. Also read :doc:`the Experiment page</experiment>`.\n\
    \nThis function is invoked when a trainer object is created for each run. \n\n\n.. py:function:: create_model_fn(model_config:\
    \ Dict[str, Any]) -> Tuple[transformers.PreTrainedModel, transformers.PreTrainedTokenizer]\n\n  :param model_config: Dictionary\
    \ injected by RapidFire AI into this user-defined function with all key-value pairs for one model config output by the\
    \ config-group generator.\n  :type model_config: Dict[str, Any]\n\n  :return: Tuple containing the initialized Hugging\
    \ Face model (e.g., ``AutoModelForCausalLM``, ``AutoModelForSequenceClassification``) and tokenizer (e.g., ``AutoTokenizer``,\
    \ ``PreTrainedTokenizer``) objects\n  :rtype: Tuple[transformers.PreTrainedModel, transformers.PreTrainedTokenizer]\n\n\
    \n**Example:**\n\n.. code-block:: python\n\n\t# From the SFT tutorial notebook\n\tdef sample_create_model(model_config):\n\
    \    \t\"\"\"Function to create model object for any given config; must return tuple of (model, tokenizer)\"\"\"\n\t\t\
    from transformers import AutoModelForCausalLM, AutoTokenizer, AutoModelForSeq2SeqLM, AutoModelForMaskedLM\n\t\t\n\t\t\
    model_name = model_config[\"model_name\"]\n\t\tmodel_type = model_config[\"model_type\"]\n\t\tmodel_kwargs = model_config[\"\
    model_kwargs\"]\n\t\t\n\t\tif model_type == \"causal_lm\":\n\t\t\tmodel = AutoModelForCausalLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"seq2seq_lm\":\n\t\t\tmodel = AutoModelForSeq2SeqLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"masked_lm\":\n\t\t\tmodel = AutoModelForMaskedLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"custom\":\n            # Handle custom model loading logic, e.g., loading\
    \ your own checkpoints\n            # model = ... \n\t\t\tpass\n\t\telse:\n\t\t\t# Default to causal LM\n\t\t\tmodel =\
    \ AutoModelForCausalLM.from_pretrained(model_name, **model_kwargs)\n\n\t\ttokenizer = AutoTokenizer.from_pretrained(model_name)\n\
    \n\t\treturn (model,tokenizer)"
- source_sentence: What are all the parameters accepted by the RFOpenAIAPIModelConfig class, and what does each one configure?
  sentences:
  - "Port conflicts (services already running)\n----------------------------------------\n\nIf you encounter port conflicts,\
    \ you can kill existing processes.\n\n.. code-block:: bash\n\n   lsof -t -i:8852 | xargs kill -9  # mlflow\n   lsof -t\
    \ -i:8851 | xargs kill -9  # dispatcher\n   lsof -t -i:8853 | xargs kill -9  # frontend server\n\nSelect specific GPU(s)\
    \ to use\n-----------------------------\n\nSet the ``CUDA_VISIBLE_DEVICES`` environment variable BEFORE running ``rapidfireai\
    \ start`` to control which GPU(s) RapidFire can see and use.\n\n.. code-block:: bash\n\n   export CUDA_VISIBLE_DEVICES=2\
    \   # use GPU index 2 only\n   rapidfireai start\n\nMultiple GPUs (example: GPUs 0 and 2):\n\n.. code-block:: bash\n\n\
    \   export CUDA_VISIBLE_DEVICES=0,2\n   rapidfireai start\n\nFrom a Python script (set before importing/starting RapidFire):\n\
    \n.. code-block:: python\n\n   import os\n   os.environ[\"CUDA_VISIBLE_DEVICES\"] = \"2\"\n   # then start your RapidFire\
    \ workflow\n"
  - "As of this writing, we support 4 IC Ops: **Stop**, **Resume**, **Clone-Modify**, and **Delete**. \nWe explain each shortly\
    \ below.\n\nAll IC Ops on a run are queued by the system and **executed at a chunk boundary** for that run. \nThis avoids\
    \ potentially non-deterministic or other inconsistent behaviors during concurrent run execution.\nNote that different\
    \ runs might reach their chunk boundary at different points in time. \nTo control the number of chunks, set :code:`num_chunks`\
    \ during :func:`run_fit()`; \nmore details :doc:`on the Experiment docs page </experiments>`.\n\nIC ops can be invoked\
    \ as intermittently as you want during a long-running :func:`run_fit()`. \nSo, you can launch, say, 16 configs in one\
    \ go (even on a 4-GPU machine), check in after a few chunks,  \nand stop bottom 80% of the runs. You can let the top performers\
    \ continue for longer. Then you can \nclone and modify some to add new finer grained runs and warm start their parameters.\
    \ And so on.\n\nUnder the hood, RapidFire AI automatically adjusts the apportioning of the GPUs among all ongoing \nruns\
    \ to ensure maximal GPU utilization.\n\n\n\n\nStop\n----\n\nThis IC Op earmarks a run to be stopped at the end of its\
    \ current chunk. \nIt will still be alive but it will not use any GPU resources from the next chunk. \nYou will still\
    \ see its minibatch-level plots advancing for the current chunk. \nYou cannot stop an already stopped or deleted run.\
    \ \n\n\n.. raw:: html\n\n    <img src=\"_static/icop-stop2.png\" alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in;\
    \ max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-stop.png\" alt=\"IC Op Stop\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nResume\n-----\n\n\
    This IC Op is applicable only to a previously stopped run. \nIt earmarks this run to be resumed from the next chunk onward,\
    \ when it will be added to the mix of \nongoing runs and assigned GPU(s) automatically. \nYou cannot resume an already\
    \ resumed or deleted run.\n\n\n\nClone-Modify\n----\n\nThis is a powerful IC Op that is applicable to any ongoing, stopped,\
    \ or resumed run. \nIt allows you to add \"clones\" of a chosen run, called the \"parent\" run, during a :func:`run_fit()`.\
    \ \nThe IC Op panel displays an editable text box with the full knob config dictionary of the parent. \n\nEdit any knobs,\
    \ e.g., learning rate, LoRA rank, or even base model as if you are injecting \nthat new run config from code, except this\
    \ is done conveniently from the metrics dashboard itself. \nAs of this writing, we only support providing a single config\
    \ for this IC Op.\nSoon we will support providing a config-group generator such as :code:`RFGridSearch()` or\n:code:`RFRandomSearch()`\
    \ as well in the IC Op panel itself akin to the launching code.\n\nYou can also **warm-start** a clone using its parent's\
    \ weights if you'd like. \nWarm-started clones inherit their parent's learning behavior so far and thus, they can reach\
    \ better \neval metrics faster. \nNote that warm starting is only allowed if the clones have *identical* neural architecture\
    \ as the \nparent, including LoRA adapters; otherwise, it will error out.\n\nWhen you are ready with your clone's config,\
    \ click \"Submit\" to execute this IC Op.\n\n\n.. raw:: html\n\n    <img src=\"_static/icop-clone2.png\" alt=\"IC Op Clone-Modify\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-clone.png\"\
    \ alt=\"IC Op Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\"\
    >\n\n\nClones will automatically appear on the plots from the next chunk onward; just refresh the page. \nRapidFire AI's\
    \ adaptive scheduler automatically reapportions GPUs across all runs, including clones.\nSo, do not need to worry about\
    \ manually splitting GPUs across models, juggling new processes, etc.\nClones are treated just like any other run; so,\
    \ you can clone that clone later with IC Ops again.\n\nYou can submit multiple Clone-Modify ops on the same run or different\
    \ runs whenever you want. \nThey will get queued up and all clones will start together at the next chunk boundary. \n\n\
    Clone-Modify combined with Stop enables you to turbocharge how you leverage your intuition about your \nAI use case, dataset,\
    \ models, and eval metrics to dramatically cut down time to reaching much better \neval metrics even within a single experiment.\n\
    \n\n\nDelete\n----\n\nThis IC Op earmarks the run to be deleted from the next chunk onward. \nOn the chart, you will see\
    \ its curves vanish almost immediately. \nYou cannot do any further IC Ops on a deleted run because it will not be visible.\
    \ \nNote that although a deleted run vanishes from the plots, its model checkpoints are still part of \nthe artifacts\
    \ of that experiment so that you have post-hoc audibility.\n"
  - "RFOpenAIAPIModelConfig\n------\n\nThis is a wrapper around OpenAI's API client config and chat completion parameters.\
    \ \nThe full list of their arguments are available on `this page <https://platform.openai.com/docs/api-reference/chat/create>`__.\n\
    \nThe difference here is that the individual arguments (knobs) can be :class:`List` valued or \n:class:`Range` valued\
    \ in an :class:`RFOpenAIAPIModelConfig`. \nThat is how you can specify a base set of knob combinations from which a config\
    \ group can \nbe produced. Also read :doc:`the Multi-Config Specification page</configs>`.\n\n.. py:class:: RFOpenAIAPIModelConfig\n\
    \n  :param client_config: A dictionary necessary for initializing the AsyncOpenAI client. All knobs given in this dictionary\
    \ are simply passed to the AsyncOpenAI client as is. We recommend listing at least the following knobs.\n  \n    * :code:`\"\
    api_key\"`: Your OpenAI API key for authentication. Note that we are NOT able to provide a publicly visible API key.\n\
    \    * :code:`\"max_retries\"`: Maximum number of retry attempts for failed API calls. Default is 2.\n    * :code:`\"\
    timeout\"`: Request timeout in seconds. Optional.\n    \n  :type client_config: dict[str, Any]\n\n  :param model_config:\
    \ A dictionary to control the chat completion behavior with OpenAI's Chat Completions API. All knobs given in this dictionary\
    \ are simply passed to the OpenAI API as is. The API will use its defaults for unspecified knobs. We recommend listing\
    \ at least the following knobs.\n\n    * :code:`\"model\"`: Name of the OpenAI model to use, e.g., \"gpt-5-mini\".\n \
    \   * :code:`\"temperature\"`: What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the\
    \ output more random, while lower values like 0.2 will make it more focused and deterministic. OpenAI recommends altering\
    \ this or :code:`\"top_p\"` but not both.\n    * :code:`\"max_completion_tokens\"`: Upper bound for the number of tokens\
    \ that can be generated for a completion, including visible output tokens and reasoning tokens.\n    * :code:`\"reasoning_effort\"\
    `: Constrains effort for reasoning models. Currently supported values are \"minimal\", \"low\", \"medium\", and \"high\"\
    . Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response. The gpt-5-pro\
    \ model defaults to (and only supports) \"high\" reasoning effort.\n\t* :code:`\"top_p\"`: Alternative to temperature-based\
    \ sampling called nucleus sampling. The model considers the results of the tokens with top_p probability mass. So 0.1\
    \ means only the tokens comprising the top 10% probability mass are considered. OpenAI recommends altering this or :code:`\"\
    temperature\"` but not both.\n\n  :type model_config: dict[str, Any]\n\n  :param rpm_limit: Rate limit for requests per\
    \ minute to the OpenAI API. Used for throttling to avoid exceeding Open AI API quotas. Check the rate limit published\
    \ by Open AI for details on your tier and the latest per-model limits on `this page <https://platform.openai.com/docs/guides/rate-limits>`__.\n\
    \  :type rpm_limit: int\n\n  :param tpm_limit: Rate limit for tokens per minute to the OpenAI API. Used for throttling\
    \ to avoid exceeding API quotas. See the rate limit page above for details.\n  :type tpm_limit: int\n\n  :param rag: An\
    \ instance of a RapidFire AI RAG pipeline spec. Also read :doc:`the API: RFLangChainRagSpec page </ragspecs>`.\n  :type\
    \ rag: RFLangChainRagSpec\n\n  :param prompt_manager: An instance of a RapidFire AI PromptManager. Also read :doc:`the\
    \ API: Prompt Manager and Other Eval Config Knobs page </promptothers>`.\n  :type prompt_manager: PromptManager\n\n  ..\
    \ seealso::\n     - `OpenAI Chat Completions API Reference <https://platform.openai.com/docs/api-reference/chat/create>`_\n\
    \     - `OpenAI Python Client Documentation <https://github.com/openai/openai-python>`_\n     - :doc:`API: RFLangChainRagSpec\
    \ </ragspecs>`\n     - :doc:`API: Prompt Manager and Other Eval Config Knobs page </promptothers>`\n\n\n**Example:**\n\
    \n.. code-block:: python\n\n\t# Based on GSM8K chatbot tutorial notebook; specify your OPENAI_API_KEY beforehand\n\topenai_config1\
    \ = RFOpenAIAPIModelConfig(\n\t\tclient_config={\"api_key\": OPENAI_API_KEY, \"max_retries\": 2},\n\t\tmodel_config={\n\
    \t\t\t\"model\": \"gpt-5-mini\",\n\t\t\t\"max_completion_tokens\": 1024,\n\t\t\t\"reasoning_effort\": \"medium\", \n\t\
    \t},\n\t\trpm_limit=500,\n\t\ttpm_limit=500_000,\n\t\trag=None,\n\t\tprompt_manager=fewshot_prompt_manager,\n\t)\t"
