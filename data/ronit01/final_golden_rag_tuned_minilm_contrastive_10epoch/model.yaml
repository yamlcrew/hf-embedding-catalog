- source_sentence: How does the compute_metrics function differ between the run_fit() (training) pipeline and the run_evals()
    pipeline in terms of its signature, invocation timing, and what it receives as input?
  sentences:
  - "API: User-Provided Functions for Run Evals\n===============\n\nUsers can provide the following custom functions as part\
    \ of their eval config to be used in :func:`run_evals()`.\nNote that each leaf config can have its own set of functions\
    \ for all of these.\n\n\nPreprocess Function\n-------------------\n\nMandatory user-provided function to prepare the inputs\
    \ to be given to the generator model. \nIt is invoked for each batch during the evaluation process before generation.\n\
    Pass it directly to the :code:`preprocess_fn` key in your eval config dictionary.\n\nThe system injects into this function\
    \ the batch data, as well as the RAG spec and \nthe prompt manager of an individual leaf config.\n\n\n.. py:function::\
    \ preprocess_fn(batch: dict[str, list], rag: RFLangChainRagSpec, prompt_manager: RFPromptManager) -> dict[str, list]\n\
    \n   :param batch: Dictionary with a batch of examples with dataset field names as keys and lists as values"
  - "Postprocess Function\n--------------------\n\nOptional user-provided function to postprocess a batch of examples and\
    \ their respective generated outputs, \nwhich is injected into this function by the system. \nThis is useful for, say,\
    \ extracting structured information from generations, adding ground truth data, \nor performing any transformations needed\
    \ before computing metrics.\n\nIt is invoked for each batch during the evaluation process after generation and before\
    \ metric computation.\nPass it directly to the :code:`postprocess_fn` key in your eval config dictionary.\n\n\n.. py:function::\
    \ postprocess_fn(batch: dict[str, list]) -> dict[str, list]\n\n   :param batch: Dictionary containing a batch of examples,\
    \ including their respective generated outputs under the reserved key :code:`\"generated_text\"`.\n   :type batch: dict[str,\
    \ list]\n\n   :return: Dictionary containing the postprocessed batch with any new or modified keys\n   :rtype: dict[str,\
    \ list]\n"
  - "Follow these steps to install RapidFire AI on your local machine or remote/cloud instance for complete functionality\
    \ without limitations.\n\n\nStep 1: Install dependencies and package\n-----------------------\n\nObtain the RapidFire\
    \ AI OSS package from pypi (includes all dependencies) and ensure it is installed correctly.\n\n.. important::\n\n  Requires\
    \ Python 3.12+. Ensure that ``python3`` resolves to Python 3.12 before creating the venv.\n\n.. code-block:: bash\n\n\
    \   python3 --version  # must be 3.12.x\n   python3 -m venv .venv\n   source .venv/bin/activate\n\n   pip install rapidfireai\n\
    \n   rapidfireai --version\n   # Verify it prints the following:\n   # RapidFire AI 0.14.0\n\nProvide your Hugging Face\
    \ account token to access the gated Llama and Mistral models \nshowcased in the tutorial notebooks. \nIf you do not have\
    \ such a token, you have two options:\n\n* Switch the :code:`model_name` in the tutorial notebook to a non-gated model\
    \ from Hugging Face. Then proceed to Step 2.\n\n* Create a Hugging Face token `as explained here <https://huggingface.co/docs/hub/en/security-tokens>`_.\
    \ Then request access on the following gated models' Hugging Face pages:\n\n  * `mistralai/Mistral-7B-Instruct-v0.3 <https://huggingface.co/mistralai/Mistral-7B-Instruct-v0.3>`_\n\
    \  * `meta-llama/Llama-3.1-8B-Instruct <https://huggingface.co/meta-llama/Llama-3.1-8B-Instruct>`_\n  * `meta-llama/Llama-3.2-1B-Instruct\
    \ <https://huggingface.co/meta-llama/Llama-3.2-1B-Instruct>`_\n  \n  Headsup: the approval for the Llama models may take\
    \ a few hours. Then provide your HF token in the same venv.\n\n.. code-block:: bash\n\n   source .venv/bin/activate\n\
    \   pip install \"huggingface-hub[cli]\"\n\n   # Replace YOUR_TOKEN with your actual HF token\n   # https://huggingface.co/docs/hub/en/security-tokens\n\
    \   hf auth login --token YOUR_TOKEN\n\n   # Due to current issue: https://github.com/huggingface/xet-core/issues/527\n\
    \   pip uninstall -y hf-xet\n\n\nFeel free to ask us on Discord if you need any help with accessing gated Hugging Face\
    \ models. Unfortunately, we are not allowed to provide a publicly visible token here for your use due to Hugging Face's\
    \ policies."
- source_sentence: What rate limiting parameters does RFOpenAIAPIModelConfig provide, and why are they needed?
  sentences:
  - "Eval Accumulate Metrics Function\n----------------------------\n\nOptional user-provided function to aggregate algebraic\
    \ eval metrics across all batches of the data. \nIf this function is not provided, all metrics returned by :func:`eval.compute_metrics_fn()`\
    \ \nwill be assumed to be distributive (i.e., summed across batches) by default. Use this function \nwhen metrics require\
    \ (weighted) averaging or other custom dataset-wide aggregation logic.\n\nIt is invoked once at the very end of the evaluation\
    \ process after all batches have been processed.\nPass it directly to the :code:`accumulate_metrics_fn` key in your eval\
    \ config dictionary.\n\n\n.. py:function:: eval.accumulate_metrics_fn(aggregated_metrics: dict[str, list[dict[str, Any]]])\
    \ -> dict[str, dict[str, Any]]\n\n   :param aggregated_metrics: Dictionary with a metric's name as key and a list of per-batch\
    \ metric dictionaries as values from across all data batches. Inside each value dictionary, at least the reserved key\
    \ :code:`\"value\"` will exist that was returned by your :code:`eval_compute_metrics_fn` function.\n   :type aggregated_metrics:\
    \ dict[str, list[dict[str, Any]]]\n\n   :return: Dictionary with a metric's name as key and a dictionary as value. The\
    \ value dictionary can have these keys:\n   \n      * :code:`\"value\"` (required): The metric's value over the whole\
    \ dataset.\n      * :code:`\"is_algebraic\"` (optional): Boolean indicating if the metric is algebraic.\n      * :code:`\"\
    is_distributive\"` (optional): Boolean indicating if the metric is distributive.\n      * :code:`\"value_range\"` (optional):\
    \ 2-tuple of floats specifying the metric's range min and max.\n      \n      For online aggregation support, see :doc:`the\
    \ Online Aggregation for Evals page</onlineagg>`.\n\n   :rtype: dict[str, dict[str, Any]]\n\n\n**Example:**\n\n.. code-block::\
    \ python\n\n    # Example 1 from GSM8K use case: Weighted aggregation for accuracy computation\n    def sample_accumulate_metrics_fn(aggregated_metrics:\
    \ dict[str, list]) -> dict[str, dict[str, Any]]:\n        \"\"\"Function to accumulate eval metrics across all batches\"\
    \"\"\n\n        correct = sum(m.get(\"value\", 0) for m in aggregated_metrics.get(\"Correct\", [{}]))\n        total =\
    \ sum(m.get(\"value\", 0) for m in aggregated_metrics.get(\"Total\", [{}]))\n        accuracy = correct / total if total\
    \ > 0 else 0\n        return {\n            \"Total\": {\"value\": total},\n            \"Correct\": {\n             \
    \   \"value\": correct,\n                \"is_distributive\": True,\n                \"value_range\": (0, 1),\n      \
    \      },\n            \"Accuracy\": {\n                \"value\": accuracy,\n                \"is_algebraic\": True,\n\
    \                \"value_range\": (0, 1),\n            },\n        }"
  - "Eval Accumulate Metrics Function\n----------------------------\n\nOptional user-provided function to aggregate algebraic\
    \ eval metrics across all batches of the data. \nIf this function is not provided, all metrics returned by :func:`eval.compute_metrics_fn()`\
    \ \nwill be assumed to be distributive (i.e., summed across batches) by default. Use this function \nwhen metrics require\
    \ (weighted) averaging or other custom dataset-wide aggregation logic.\n\nIt is invoked once at the very end of the evaluation\
    \ process after all batches have been processed.\nPass it directly to the :code:`accumulate_metrics_fn` key in your eval\
    \ config dictionary.\n\n\n.. py:function:: eval.accumulate_metrics_fn(aggregated_metrics: dict[str, list[dict[str, Any]]])\
    \ -> dict[str, dict[str, Any]]\n\n   :param aggregated_metrics: Dictionary with a metric's name as key and a list of per-batch\
    \ metric dictionaries as values from across all data batches. Inside each value dictionary, at least the reserved key\
    \ :code:`\"value\"` will exist that was returned by your :code:`eval_compute_metrics_fn` function.\n   :type aggregated_metrics:\
    \ dict[str, list[dict[str, Any]]]\n\n   :return: Dictionary with a metric's name as key and a dictionary as value. The\
    \ value dictionary can have these keys:\n   \n      * :code:`\"value\"` (required): The metric's value over the whole\
    \ dataset.\n      * :code:`\"is_algebraic\"` (optional): Boolean indicating if the metric is algebraic.\n      * :code:`\"\
    is_distributive\"` (optional): Boolean indicating if the metric is distributive.\n      * :code:`\"value_range\"` (optional):\
    \ 2-tuple of floats specifying the metric's range min and max.\n      \n      For online aggregation support, see :doc:`the\
    \ Online Aggregation for Evals page</onlineagg>`.\n\n   :rtype: dict[str, dict[str, Any]]"
  - "    :param search_cfg: The search algorithm type and its kwargs to use for retrieval of vectors/chunks, provided as a\
    \ single dictionary. Must include a key :code:`\"type\"` with one of the following three options listed as value; default\
    \ is :code:`\"similarity\"`.\n\n      * :code:`\"similarity\"`: Standard cosine similarity search.\n      * :code:`\"\
    similarity_score_threshold\"`: Similarity search with minimum score threshold (SST).\n      * :code:`\"mmr\"`: Maximum\
    \ Marginal Relevance (MMR) search for diversity.\n\n      Additional parameters for search configuration depend on the\
    \ type; the keys can include the following:\n\n      * :code:`\"k\"`: Number of documents to retrieve. Default is 5.\n\
    \      * :code:`\"filter\"`: Optional filter criteria function for search results.\n      * :code:`\"score_threshold\"\
    `: Only for SST. Minimum similarity score threshold. \n      * :code:`\"fetch_k\"`: Only for MMR. Number of documents\
    \ to fetch before MMR reranking. Default is 20.\n      * :code:`\"lambda_mult\"`: Only for MMR. Diversity parameter for\
    \ MMR balancing relevance vs. diversity. Default is 0.5.\n    :type search_cfg: dict, optional"
