- source_sentence: How does RFPromptManager select few-shot examples for each input query?
  sentences:
  - "As of this writing, we support 4 IC Ops: **Stop**, **Resume**, **Clone-Modify**, and **Delete**. \nWe explain each shortly\
    \ below.\n\nAll IC Ops on a run are queued by the system and **executed at a chunk boundary** for that run. \nThis avoids\
    \ potentially non-deterministic or other inconsistent behaviors during concurrent run execution.\nNote that different\
    \ runs might reach their chunk boundary at different points in time. \nTo control the number of chunks, set :code:`num_chunks`\
    \ during :func:`run_fit()`; \nmore details :doc:`on the Experiment docs page </experiments>`.\n\nIC ops can be invoked\
    \ as intermittently as you want during a long-running :func:`run_fit()`. \nSo, you can launch, say, 16 configs in one\
    \ go (even on a 4-GPU machine), check in after a few chunks,  \nand stop bottom 80% of the runs. You can let the top performers\
    \ continue for longer. Then you can \nclone and modify some to add new finer grained runs and warm start their parameters.\
    \ And so on.\n\nUnder the hood, RapidFire AI automatically adjusts the apportioning of the GPUs among all ongoing \nruns\
    \ to ensure maximal GPU utilization.\n\n\n\n\nStop\n----\n\nThis IC Op earmarks a run to be stopped at the end of its\
    \ current chunk. \nIt will still be alive but it will not use any GPU resources from the next chunk. \nYou will still\
    \ see its minibatch-level plots advancing for the current chunk. \nYou cannot stop an already stopped or deleted run.\
    \ \n\n\n.. raw:: html\n\n    <img src=\"_static/icop-stop2.png\" alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in;\
    \ max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-stop.png\" alt=\"IC Op Stop\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nResume\n-----\n\n\
    This IC Op is applicable only to a previously stopped run. \nIt earmarks this run to be resumed from the next chunk onward,\
    \ when it will be added to the mix of \nongoing runs and assigned GPU(s) automatically. \nYou cannot resume an already\
    \ resumed or deleted run.\n\n\n\nClone-Modify\n----\n\nThis is a powerful IC Op that is applicable to any ongoing, stopped,\
    \ or resumed run. \nIt allows you to add \"clones\" of a chosen run, called the \"parent\" run, during a :func:`run_fit()`.\
    \ \nThe IC Op panel displays an editable text box with the full knob config dictionary of the parent. \n\nEdit any knobs,\
    \ e.g., learning rate, LoRA rank, or even base model as if you are injecting \nthat new run config from code, except this\
    \ is done conveniently from the metrics dashboard itself. \nAs of this writing, we only support providing a single config\
    \ for this IC Op.\nSoon we will support providing a config-group generator such as :code:`RFGridSearch()` or\n:code:`RFRandomSearch()`\
    \ as well in the IC Op panel itself akin to the launching code.\n\nYou can also **warm-start** a clone using its parent's\
    \ weights if you'd like. \nWarm-started clones inherit their parent's learning behavior so far and thus, they can reach\
    \ better \neval metrics faster. \nNote that warm starting is only allowed if the clones have *identical* neural architecture\
    \ as the \nparent, including LoRA adapters; otherwise, it will error out.\n\nWhen you are ready with your clone's config,\
    \ click \"Submit\" to execute this IC Op.\n\n\n.. raw:: html\n\n    <img src=\"_static/icop-clone2.png\" alt=\"IC Op Clone-Modify\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-clone.png\"\
    \ alt=\"IC Op Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\"\
    >\n\n\nClones will automatically appear on the plots from the next chunk onward; just refresh the page. \nRapidFire AI's\
    \ adaptive scheduler automatically reapportions GPUs across all runs, including clones.\nSo, do not need to worry about\
    \ manually splitting GPUs across models, juggling new processes, etc.\nClones are treated just like any other run; so,\
    \ you can clone that clone later with IC Ops again.\n\nYou can submit multiple Clone-Modify ops on the same run or different\
    \ runs whenever you want. \nThey will get queued up and all clones will start together at the next chunk boundary. \n\n\
    Clone-Modify combined with Stop enables you to turbocharge how you leverage your intuition about your \nAI use case, dataset,\
    \ models, and eval metrics to dramatically cut down time to reaching much better \neval metrics even within a single experiment.\n\
    \n\n\nDelete\n----\n\nThis IC Op earmarks the run to be deleted from the next chunk onward. \nOn the chart, you will see\
    \ its curves vanish almost immediately. \nYou cannot do any further IC Ops on a deleted run because it will not be visible.\
    \ \nNote that although a deleted run vanishes from the plots, its model checkpoints are still part of \nthe artifacts\
    \ of that experiment so that you have post-hoc audibility.\n"
  - "Task, Dataset, and Prompt\n-------\n\nThis tutorial shows Supervised Fine-Tuning (SFT) for creating a customer support\
    \ Q&A chatbot.\n\nIt uses the \"Bitext customer support\" dataset; \n`see its details on Hugging Face <https://huggingface.co/datasets/bitext/Bitext-customer-support-llm-chatbot-training-dataset>`__.\
    \ \nWe use a sample of 5,000 training examples and 200 evaluation examples for tractable demo runtimes.\n\nThe prompt\
    \ format includes a system message defining the assistant as \"helpful and friendly customer \nsupport\" with user instructions\
    \ and assistant responses\n\n\nModel, Adapter, and Trainer Knobs\n-------\n\nWe compare 2 base model architectures: Llama-3.1-8B-Instruct\
    \ and Mistral-7B-Instruct-v0.3. \nThe lite version uses only one: TinyLlama-1.1B-Chat-v1.0.\n\nThere are 2 different LoRA\
    \ adapter configurations: a low-capacity adapter (rank 16; 8 for lite) targeting \nonly 2 modules and a high-capacity\
    \ adapter (rank 128; 32 for lite) targeting 4 modules.\n\nAll other knobs are fixed across all configs. Thus, there are\
    \ a total of 4 combinations, \nall launched with a simple grid search."
  - "This class wraps around some LangChain APIs to manage dynamic few-shot example selection. It provides semantic \nsimilarity-based\
    \ example selection to construct prompts with the most relevant examples for each input query.\n\nThe individual arguments\
    \ (knobs) can be :class:`List` valued or :class:`Range` valued in an :class:`RFPromptManager`. \nThat is how you can specify\
    \ a base set of knob combinations from which a config group can be produced. \nAlso read :doc:`the Multi-Config Specification\
    \ page</configs>`.\n\n.. py:class:: RFPromptManager\n\n  :param instructions: The main instructions for the prompt that\
    \ guide the generator's behavior. This sets the overall task description and role for the assistant. Either this or :code:`instructions_file_path`\
    \ must be provided.\n  :type instructions: str, optional\n\n  :param instructions_file_path: Path to a file containing\
    \ the instructions. Use this as an alternative to the :code:`instructions` parameter for loading instructions from a file,\
    \ say, if they are very long.\n  :type instructions_file_path: str, optional\n\n  :param examples: A list of example dictionaries\
    \ for few-shot learning. Each example should be a dictionary with keys matching the expected input-output format (e.g.,\
    \ \"question\" and \"answer\").\n  :type examples: list[dict[str, str]], optional\n\n\n  :param embedding_cfg: The embedding\
    \ class and its kwargs to use for computing semantic similarity between examples and queries, provided as a single dictionary.\
    \ Must include a key :code:`\"class\"` with the class itself as value, not an instance. Options for the class include\
    \ :class:`HuggingFaceEmbeddings` and :class:`OpenAIEmbeddings`. The kwargs that follow must contain all parameters needed\
    \ to initialize the embedding class; required parameters vary by embedding class. For example, :class:`HuggingFaceEmbeddings`\
    \ needs :code:`model_name`, :code:`model_kwargs` and :code:`device`, while :class:`OpenAIEmbeddings` needs :code:`\"model\"\
    ` and :code:`\"api_key\"`.\n  :type embedding_cfg: dict[str, Any], optional\n\n\n  :param example_selector_cls: The example\
    \ selector class that determines how to choose relevant examples based on the input query. Must be either :code:`SemanticSimilarityExampleSelector`\
    \ or :code:`MaxMarginalRelevanceExampleSelector` (for diversity) from LangChain.\n  :type example_selector_cls: type[MaxMarginalRelevanceExampleSelector\
    \ | SemanticSimilarityExampleSelector], optional\n\n  :param example_prompt_template: A LangChain :code:`PromptTemplate`\
    \ that defines how to format each example. Should specify :code:`input_variables` and a :code:`template` string with placeholders\
    \ matching the keys in the examples dictionaries.\n  :type example_prompt_template: PromptTemplate, optional\n\n  :param\
    \ k: Number of most similar or diverse examples to retrieve and include in the prompt for each query. Default is 3.\n\
    \  :type k: int, optional"
- source_sentence: How does the GSM8K tutorial configure its few-shot prompting pipeline, and how many total config combinations
    does it produce?
  sentences:
  - "Why Not Just Downsample Data?\n------------\n\nAt first glance, one might consider running multi-config comparisons by\
    \ downsampling data for \nquick estimates, then running promising configs on full data. While common, this approach is\
    \ \noften misleading and cumbersome.\n\nA single downsample introduces variance from one static snapshot, potentially\
    \ leading to wrong \nconclusions, especially with overfitting-prone LLMs/DL models. It requires manual checkpoint \nmanagement,\
    \ adding tedious file work. You also do not get dynamic control (stop, resume, clone-modify),\nor you must reimplement\
    \ such tricky operations, taking time away from your AI application work.\n\nRapidFire AI takes such practical heuristics\
    \ to their logical conclusion with shard-based \nadaptive multi-config execution with dynamic experiment control. This\
    \ offers you maximum power \nand flexibility for AI development without extra DevOps grunt work, i.e., *rapid experimentation*.\n\
    \nThe above said, note that downsampling is *complementary* to rapid experimentation--feel free \ndo both! The adaptive\
    \ execution can operate on your downsampled dataset all the same."
  - "Stop\n----\n\nThis IC Op earmarks a run to be stopped at the end of its current chunk. \nIt will still be alive but it\
    \ will not use any GPU resources from the next chunk. \nYou will still see its minibatch-level plots advancing for the\
    \ current chunk. \nYou cannot stop an already stopped or deleted run. \n\n\n.. raw:: html\n\n    <img src=\"_static/icop-stop2.png\"\
    \ alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\
    \    <img src=\"_static/icop-stop.png\" alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"\
    this.requestFullscreen()\">\n"
  - "Why Not Just Downsample?\n------------------------\n\nOne might wonder why downsampling the eval set does not suffice\
    \ here. \n:doc:`As also explained on this page</difference>`, downsampling alone has \nsignificant disadvantages compared\
    \ to the approach offered by RapidFire AI. \n\nFirst, you have to decide a downsample size upfront, which is not trivial\
    \ if your\neval metrics have high variance across examples. Point estimates without confidence \nintervals can give false\
    \ confidence in a sample. You can resample manually \nover and over, but that adds manual grunt work of juggling separate\
    \ samples/files. \nFinally, downsampling alone does not offer you the power of IC Ops and automated \nparallelization\
    \ to try new configs on the fly--you'd have reimplement those manually.\n\nRapidFire AI's online aggregation approach\
    \ with IC Ops avoids all the above issues,\nwhile also being **complementary** to downsampling, i.e., you can use both\
    \ in \nconjunction for even lower runtimes/costs."
- source_sentence: How do the Stop and Delete IC Ops compare in terms of their effects on a run's state, visibility on the
    dashboard, resource usage, artifact preservation, and what further IC Ops can be performed on the run afterward?
  sentences:
  - "The crux of RapidFire AI's difference is in its *adaptive execution engine*: it enables \"interruptible\"\nexecution\
    \ of configurations across GPUs/CPUs. To do so, it first shards the training and/or evaluation \ndataset randomly into\
    \ \"chunks\" (also called \"shards\").\nThen instead of waiting for a run to see the whole dataset for all epochs (for\
    \ SFT/RFT) or for full \neval metrics calculation (for RAG evals), RapidFire AI schedules all runs on *one shard at a\
    \ time*, \nand then cycles through all shards.\n\nSuppose you have only 1 GPU, say an A100 or H100, and you want to run\
    \ SFT on a Llama model. \nCurrent tools force you to run one config after another *sequentially* as shown in the (simplified)\
    \ illustration below. \nIn contrast, by operating on shards, RapidFire AI offers a far more concurrent learning experience\
    \ by \nautomatically *swapping* adapters (and base models, if needed) across GPU(s) and DRAM. \nIt does this via efficient\
    \ shared memory-based caching mechanisms that can spill to disk when needed.\n\n.. image:: /images/gantt-1gpu.png\n  \
    \ :width: 800px\n\nIn the above figure, all 3 model configs are shown for 1 epoch. RapidFire AI is set to use 4 chunks.\n\
    So, before model config 3 (M3) even starts in the sequential approach, RapidFire AI already shows you \nthe learning behaviors\
    \ of all 3 configs on the first 2-3 chunks. \nThe overhead of swapping, represented by the thin gray box, is minimal,\
    \ less than 5% of the runtime,\nas per our measurements--thanks to our new efficient memory management techniques.\n\n\
    For inference evals for RAG/context engineering, such sharded execution means RapidFire AI surfaces eval metrics \nsooner\
    \ based on a statistical technique known as *online aggregation* from the database systems literature.\nBasically, see\
    \ estimated values and confidence intervals for all eval metrics in real time as the shards \nget processed, ultimately\
    \ converging to the exact metrics on the full dataset."
