- source_sentence: What is RapidFire AI, and what three-way communication does it establish?
  sentences:
  - "Eval Accumulate Metrics Function\n----------------------------\n\nOptional user-provided function to aggregate algebraic\
    \ eval metrics across all batches of the data. \nIf this function is not provided, all metrics returned by :func:`eval.compute_metrics_fn()`\
    \ \nwill be assumed to be distributive (i.e., summed across batches) by default. Use this function \nwhen metrics require\
    \ (weighted) averaging or other custom dataset-wide aggregation logic.\n\nIt is invoked once at the very end of the evaluation\
    \ process after all batches have been processed.\nPass it directly to the :code:`accumulate_metrics_fn` key in your eval\
    \ config dictionary.\n\n\n.. py:function:: eval.accumulate_metrics_fn(aggregated_metrics: dict[str, list[dict[str, Any]]])\
    \ -> dict[str, dict[str, Any]]\n\n   :param aggregated_metrics: Dictionary with a metric's name as key and a list of per-batch\
    \ metric dictionaries as values from across all data batches. Inside each value dictionary, at least the reserved key\
    \ :code:`\"value\"` will exist that was returned by your :code:`eval_compute_metrics_fn` function.\n   :type aggregated_metrics:\
    \ dict[str, list[dict[str, Any]]]\n\n   :return: Dictionary with a metric's name as key and a dictionary as value. The\
    \ value dictionary can have these keys:\n   \n      * :code:`\"value\"` (required): The metric's value over the whole\
    \ dataset.\n      * :code:`\"is_algebraic\"` (optional): Boolean indicating if the metric is algebraic.\n      * :code:`\"\
    is_distributive\"` (optional): Boolean indicating if the metric is distributive.\n      * :code:`\"value_range\"` (optional):\
    \ 2-tuple of floats specifying the metric's range min and max.\n      \n      For online aggregation support, see :doc:`the\
    \ Online Aggregation for Evals page</onlineagg>`.\n\n   :rtype: dict[str, dict[str, Any]]\n\n\n**Example:**\n\n.. code-block::\
    \ python\n\n    # Example 1 from GSM8K use case: Weighted aggregation for accuracy computation\n    def sample_accumulate_metrics_fn(aggregated_metrics:\
    \ dict[str, list]) -> dict[str, dict[str, Any]]:\n        \"\"\"Function to accumulate eval metrics across all batches\"\
    \"\"\n\n        correct = sum(m.get(\"value\", 0) for m in aggregated_metrics.get(\"Correct\", [{}]))\n        total =\
    \ sum(m.get(\"value\", 0) for m in aggregated_metrics.get(\"Total\", [{}]))\n        accuracy = correct / total if total\
    \ > 0 else 0\n        return {\n            \"Total\": {\"value\": total},\n            \"Correct\": {\n             \
    \   \"value\": correct,\n                \"is_distributive\": True,\n                \"value_range\": (0, 1),\n      \
    \      },\n            \"Accuracy\": {\n                \"value\": accuracy,\n                \"is_algebraic\": True,\n\
    \                \"value_range\": (0, 1),\n            },\n        }"
  - "RFSFTConfig\n------\n\nThis is a wrapper around :class:`SFTConfig` in HF TRL. \nThe full signature and list of arguments\
    \ are available on `this page \n<https://huggingface.co/docs/trl/sft_trainer#trl.SFTConfig>`__.\n\nThe only difference\
    \ here is that the individual arguments (knobs) can be :class:`List` valued \nor :class:`Range` valued in :class:`RFSFTConfig`.\
    \ \nThat is how you can specify a base set of knob combinations from which a config group can be \nproduced. Also read\
    \ :doc:`the Multi-Config Specification page</configs>`.\nOther than the multi-config specification, this class preserves\
    \ all semantics of Hugging Face's \nSFT trainer under the hood. \n\n\n**Examples:**\n\n.. code-block:: python\n\n\t# From\
    \ the SFT tutorial notebook\n\tRFSFTConfig(\n\t\tlearning_rate=2e-4,\n\t\tlr_scheduler_type = \"linear\",\n\t\tper_device_train_batch_size=4,\n\
    \t\tper_device_eval_batch_size=8,\n\t\tgradient_accumulation_steps=4,\n\t\tnum_train_epochs=2,\n\t\tlogging_steps=5,\n\
    \t\teval_strategy=\"steps\",\n\t\teval_steps=25,\n\t\tfp16=True,\n\t\tsave_strategy=\"epoch\",\n\t)\n\n\t# Two knobs have\
    \ list values here\n\tRFSFTConfig(\n\t\tlearning_rate=List([2e-4, 1e-5]),\n\t\tlr_scheduler_type=List([\"linear\", \"\
    cosine\"]),\n\t\tper_device_train_batch_size=4,\n\t\tgradient_accumulation_steps=4,\n\t\tper_device_eval_batch_size=8,\n\
    \t\tnum_train_epochs=2,\n\t\tlogging_steps=5,\n\t\teval_strategy=\"steps\",\n\t\teval_steps=25,\n\t\tfp16=True,\n\t\t\
    save_strategy=\"epoch\",\n\t)\n\n\nFor larger LLMs that do not fit on a single GPU and need cross-GPU model partitioning\
    \ (within a machine) to fit in aggregate GPU memory, specify the FSDP configuration to apply with its usual settings given\
    \ a dictionary as illustrated below.\n\n\n**Examples:**\n\n.. code-block:: python\n\n\t# From the SFT FSDP Large tutorial\
    \ notebook\n\tRFSFTConfig(\n\t\t...\n\t\tfsdp=\"full_shard auto_wrap\",\n        fsdp_config={\n\t\t\t\"backward_prefetch\"\
    : \"backward_pre\",\n\t\t\t\"forward_prefetch\": False,\n\t\t\t\"use_orig_params\": False,\n\t\t\t\"cpu_ram_efficient_loading\"\
    : True,\n\t\t\t\"offload_params\": False,\n\t\t\t\"sync_module_states\": True,\n\t\t\t\"limit_all_gathers\": True,\n\t\
    \t\t\"sharding_strategy\": \"FULL_SHARD\",\n\t\t\t\"auto_wrap_policy\": \"TRANSFORMER_BASED_WRAP\"\n\t\t}\n\t)\n\n\t#\
    \ From the SFT FSDP Lite tutorial notebook\n\tRFSFTConfig(\n\t\t...\n\t\tfsdp=\"full_shard auto_wrap\",\n        fsdp_config={\n\
    \t\t\t\"backward_prefetch\": \"backward_pre\",\n\t\t\t\"forward_prefetch\": True,\n\t\t\t\"use_orig_params\": False,\n\
    \t\t\t\"cpu_ram_efficient_loading\": True,\n\t\t\t\"offload_params\": True,\n\t\t\t\"sync_module_states\": True,\n\t\t\
    \t\"limit_all_gathers\": True,\n\t\t\t\"sharding_strategy\": \"FULL_SHARD\",\n\t\t\t\"auto_wrap_policy\": \"TRANSFORMER_BASED_WRAP\"\
    \n\t\t}\n\t)"
  - "RapidFire AI is a new AI experiment execution framework that transforms your LLM pipeline customization \nfrom slow,\
    \ sequential processes into rapid, intelligent workflows with hyperparallelized execution, \ndynamic real-time experiment\
    \ control, and automatic backend optimization.\n\nFor *RAG and context engineering evals*, start here: :doc:`Install and\
    \ Get Started: RAG and Context Engineering</walkthroughrag>`.\n\nFor *SFT and RFT/post-training workflows*, start here:\
    \ :doc:`Install and Get Started: SFT/RFT</walkthroughft>`.\n\n\nRapidFire AI is the first system of its kind to establish\
    \ live three-way communication between the IDE\nwhere the experiment is launched, a metrics display/control dashboard,\
    \ and a multi-core/multi-GPU execution backend.\n\n.. image:: /images/rf-usage.png\n   :width: 800px\n\nJust pip install\
    \ the :code:`rapidfireai` OSS package. It works on a CPU-only machine, a single-GPU machine, \nor a multi-GPU machine.\
    \ Note that for RAG/context engineering with only closed model APIs, GPUs are not needed. "
- source_sentence: Why does RapidFire AI argue that simply downsampling the evaluation data is insufficient compared to its
    online aggregation approach?
  sentences:
  - "  :param sampling_params: A dictionary with key-value pairs to control the sampling behavior during text generation by\
    \ vLLM with a self-hosted LLM. All knobs given in this dictionary are simply passed to vLLM as is. vLLM will use its defaults\
    \ for unspecified knobs. We recommend listing at least the following knobs.\n\n    * :code:`\"temperature\"`: Float that\
    \ controls the randomness of the sampling. Lower values make the model more deterministic, while higher values make the\
    \ model more random. 0.0 means greedy sampling. Default is 1.0.\n    * :code:`\"top_p\"`: Float that controls the cumulative\
    \ probability of the top tokens to consider. Must be in (0, 1]. Set to 1 to consider all tokens. Default is 1.0.\n   \
    \ * :code:`\"max_tokens\"`: Maximum number of tokens to generate per output sequence. \n\n  :type sampling_params: dict[str,\
    \ Any]"
  - "\nRapidFire AI transforms the status quo by adapting the powerful idea of **online aggregation** \nfrom database systems\
    \ research to LLM evals. \nOur adaptive execution engine, :doc:`as described on this page</difference>`, automatically\
    \ \nshards the data and processes multiple configs in parallel, one shard at a time, with \nefficient swapping techniques.\n\
    \nThis means you get **running metric estimates with confidence intervals** in real time. \nSo, you can confidently stop\
    \ poor configs earlier, clone better configs on the fly, and \nperform more informed exploration to reach much better\
    \ eval metrics in much less time.\n\n\nExample: Traditional Batch Evals vs. RapidFire AI\n-------\n\nFor instance, suppose\
    \ you have an evals set with 400 queries. You decide to compare, say, \n4 RAG configs in one go with RapidFire AI with\
    \ number of shards set to 8. The illustration\nbelow contrasts traditional batch evals vs. RapidFire AI's approach for\
    \ a simple eval metric.\n\n.. list-table::\n   :widths: 50 50\n   :class: side-by-side\n\n   * - .. figure:: /images/rag-eval-online1.png\n\
    \          :width: 100%\n          :alt: Online aggregation for evals with RapidFire AI and IC Ops.\n\n     - .. figure::\
    \ /images/rag-eval-online2.png\n          :width: 100%\n          :alt: Online aggregation for evals with RapidFire AI\
    \ and IC Ops.\n\n\nAll configs are executed on the first 1/8th of the data (50 examples), with \ntheir **incrementally\
    \ computed** eval metrics shown in real time with confidence intervals. \nIn the figure, the 3 worst configs are stopped,\
    \ while the best is cloned to add 2 new variants. \nThe 3 running configs now continue on the second 1/8th of the data\
    \ (cumulatively, \n100 examples), and so on.\nOne clone is then stopped halfway through the aggregation, while the other\
    \ two run to completion. \nUltimately, the other clone ends up being the best config overall.\n\nNote that the confidence\
    \ intervals shown will keep narrowing as configs see more shards, converging \nto zero when 100% of the data is seen,\
    \ i.e., the metrics become exact point estimates.\nOverall, compared to sequential batch evals in which the original 4\
    \ configs all run to completion, \nRapidFire AI enables you to explore more configs in less time, while reaching better\
    \ eval metrics.\n\n\n\nTypes of Metrics\n-----------------------\n\nWe support 2 types of metrics based on their aggregation\
    \ semantics: \n\n* **Distributive Metrics:** These are purely additive over a given set of data points. \n  \n  Examples:\
    \ *count* of number of correct predictions; *sum* of output token lengths across queries.\n\n* **Algebraic Metrics:**\
    \ These are averages or proportions over a given set of data points. They can be decomposed into components that are individually\
    \ distributive. \n  \n  Examples: *precision*, which counts number of correct predictions and total number of data points\
    \ separately and then divides them; *mean rouge-1*, which averages per-example rouge-1 values that assesses overlap of\
    \ tokens between generated text and ground truth text.\n\nWhen you define an eval metric via :func:`evals.compute_metrics_fn()`\
    \ and :func:`evals.accumulate_metrics_fn()`, \nyou must specify their type (algebraic or distributive) and value range\
    \ as illustrated below. \nFor metrics without a type defined, they will be displayed *as is*, i.e., without projected\
    \ \nestimates or confidence intervals.\n\n.. code-block:: python\n\n    # Based on GSM8K tutorial use case\n    metrics\
    \ = {\n        \"Total\": {\"value\": total},\n        \"Correct\": {\n            \"value\": correct,\n            \"\
    is_distributive\": True,\n            \"value_range\": (0, 1),\n        },\n        \"Accuracy\": {\n            \"value\"\
    : accuracy,\n            \"is_algebraic\": True,\n            \"value_range\": (0, 1),\n        },\n    }\n\nConfidence\
    \ Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly randomly**,\
    \ i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies to calculate confidence\
    \ intervals for projected estimates of metrics. \nYou can indicate the confidence level (we recommend 95%) and whether\
    \ to perform \"finite population correction\" (FPC) or not. \nThese values can be specified under the key :code:`\"online_strategy_kwargs\"\
    ` in your config dictionary as illustrated below.\n\n.. code-block:: python\n\n    # Based on FiQA RAG tutorial use case\n\
    \    \"online_strategy_kwargs\": {\n        \"strategy_name\": \"normal\",\n        \"confidence_level\": 0.95,\n    \
    \    \"use_fpc\": True,\n    },\n\nNotation \n^^^^^^^\n\n* :math:`N` = Total population size (total number of queries\
    \ in eval set)\n* :math:`n` = Sample size (number of queries processed so far)\n* :math:`\\hat{p}` = Observed sample proportion\
    \ or average for an algebraic metric\n* :math:`\\bar{X}` = Sample mean for a distributive metric\n* :math:`\\widehat{T}`\
    \ = Estimated population total for a distributive metric\n* :math:`\\text{Var}(\\widehat{T})` = Variance of the above\
    \ estimated population total\n* :math:`\\text{SE}` = Standard error (measure of estimate uncertainty)\n* :math:`\\text{CI}`\
    \ = Confidence interval\n* :math:`z` = Z-score for confidence level (1.96 for 95% confidence; used in Normal and Wilson)\n\
    * :math:`\\alpha` = Significance level (0.05 for 95% confidence)\n* :math:`n_{\\text{eff}}` = Effective sample size (adjusted\
    \ for FPC in Wilson)\n* :math:`a, b` = Lower and upper bounds of metric value range\n* :math:`R` = Range width, :math:`R\
    \ = b - a`\n* :math:`\\varepsilon` = Margin of error (half-width of confidence interval for Hoeffding)\n* :math:`\\varepsilon_{\\\
    bar{X}}` = Margin of error for sample mean (Hoeffding distributive)\n* :math:`\\text{FPC}` = Finite population correction\
    \ factor\n\n\nFinite Population Correction (FPC)\n^^^^^^^^^^^^^^^^^^^^^^\n\nWhen sampling without replacement from finite\
    \ populations, enabling FPC \nmultiplies the standard error (SE) by :math:`\\text{FPC} = \\sqrt{(N-n)/(N-1)}` \nwhere\
    \ :math:`N` is population size and :math:`n` is sample size.\n\n\nNormal Approximation\n^^^^^^^^^^^^^^^^^^^\n\nThis is\
    \ the default strategy, and it uses the Central Limit Theorem. \nIt is suitable for most cases with non-trivial sample\
    \ sizes (n > 30). \nIt provides tight intervals when the statistical assumptions hold.\n\n* For algebraic metrics:\n\n\
    .. math::\n\n   \\text{SE}_{\\hat{p}} = \\sqrt{\\frac{\\hat{p}(1-\\hat{p})}{n}} \\times \\text{FPC}\n\n   \\text{CI} =\
    \ \\hat{p} \\pm 1.96 \\cdot \\text{SE}_{\\hat{p}}\n\n\n* For distributive metrics: \n\nEstimate population total :math:`\\\
    widehat{T} = N\\bar{X}` with \nvariance :math:`\\text{Var}(\\widehat{T}) = N^2 \\cdot \\bar{X}(1-\\bar{X})/n` (FPC-adjusted).\n\
    \n\nWilson Score\n^^^^^^^^^^^\n\nThis strategy is better for small sample sizes or metrics near 0/1 boundaries. \nIt is\
    \ more robust than Normal Approximation for extreme proportions. \n\n* For algebraic metrics:\n\n.. math::\n\n   \\text{center}\
    \ = \\frac{\\hat{p} + z^2/(2n_{\\text{eff}})}{1 + z^2/n_{\\text{eff}}}\n\n   \\text{margin} = \\frac{z\\sqrt{\\hat{p}(1-\\\
    hat{p})/n_{\\text{eff}} + z^2/(4n_{\\text{eff}}^2)}}{1 + z^2/n_{\\text{eff}}}\n\nwhere :math:`n_{\\text{eff}} = n/\\text{FPC}^2`\
    \ when using FPC. \nThe Wilson confidence interval is then :math:`[\\text{center} - \\text{margin}, \\text{center} + \\\
    text{margin}]`,\nclamped to [0, 1].\n\n* For distributive metrics, this falls back to Normal Approximation. \n\n\n\nHoeffding\
    \ Bounds\n^^^^^^^^^^^\n\nThis strategy is best for maximum safety (guaranteed coverage). It makes no distributional assumptions,\
    \ \nbut that also means its intervals are typically quite loose.\n\n.. math::\n\n   \\varepsilon = (b-a)\\sqrt{\\frac{\\\
    ln(2/\\alpha)}{2n}} \\times \\text{FPC}\n\n   \\text{CI} = [\\hat{p} - \\varepsilon, \\hat{p} + \\varepsilon]\n\nFor distributive\
    \ metrics with range :math:`R=b-a`, it computes :math:`\\varepsilon_{\\bar{X}} = R\\sqrt{\\ln(2/\\alpha)/(2n)}` \nand\
    \ then scales to population total."
  - "Clone-Modify\n----\n\nThis is a powerful IC Op that is applicable to any ongoing, stopped, or resumed run. \nIt allows\
    \ you to add \"clones\" of a chosen run, called the \"parent\" run, during a :func:`run_fit()`. \nThe IC Op panel displays\
    \ an editable text box with the full knob config dictionary of the parent. \n\nEdit any knobs, e.g., learning rate, LoRA\
    \ rank, or even base model as if you are injecting \nthat new run config from code, except this is done conveniently from\
    \ the metrics dashboard itself. \nAs of this writing, we only support providing a single config for this IC Op.\nSoon\
    \ we will support providing a config-group generator such as :code:`RFGridSearch()` or\n:code:`RFRandomSearch()` as well\
    \ in the IC Op panel itself akin to the launching code.\n\nYou can also **warm-start** a clone using its parent's weights\
    \ if you'd like. \nWarm-started clones inherit their parent's learning behavior so far and thus, they can reach better\
    \ \neval metrics faster. \nNote that warm starting is only allowed if the clones have *identical* neural architecture\
    \ as the \nparent, including LoRA adapters; otherwise, it will error out.\n\nWhen you are ready with your clone's config,\
    \ click \"Submit\" to execute this IC Op.\n\n\n.. raw:: html\n\n    <img src=\"_static/icop-clone2.png\" alt=\"IC Op Clone-Modify\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-clone.png\"\
    \ alt=\"IC Op Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\"\
    >\n\n\nClones will automatically appear on the plots from the next chunk onward; just refresh the page. \nRapidFire AI's\
    \ adaptive scheduler automatically reapportions GPUs across all runs, including clones.\nSo, do not need to worry about\
    \ manually splitting GPUs across models, juggling new processes, etc.\nClones are treated just like any other run; so,\
    \ you can clone that clone later with IC Ops again.\n\nYou can submit multiple Clone-Modify ops on the same run or different\
    \ runs whenever you want. \nThey will get queued up and all clones will start together at the next chunk boundary. \n\n\
    Clone-Modify combined with Stop enables you to turbocharge how you leverage your intuition about your \nAI use case, dataset,\
    \ models, and eval metrics to dramatically cut down time to reaching much better \neval metrics even within a single experiment."
- source_sentence: What user-provided functions can be included in an eval config for run_evals(), and which are mandatory
    vs. optional?
  sentences:
  - "We currently support two common config group generators: :func:`RFGridSearch()` for grid search \nand :func:`RFRandomSearch()`\
    \ for random search. \n\nMore support for AutoML heuristics such as SHA, HyperOpt, as well as an integration with \nthe\
    \ popular AutoML library Optuna are coming soon. \nLikewise for RAG/context engineering, we also plan to support the AutoML\
    \ heuristic syftr.\n\n\n.. py:function:: RFGridSearch(configs: Dict[str, Any] | List[Dict[str, Any]], trainer_type: str\
    \ = \"SFT\" | \"DPO\" | \"GRPO\" | None)\n\n\t:param configs: A config dictionary with :func:`List()` for at least one\
    \ knob; can be a list of such config dictionaries too.\n\t:type configs: Dict[str, Any] | List[Dict[str, Any]]\n\n\t:param\
    \ trainer_type: The fine-tuning/post-training control flow to use: \"SFT\", \"DPO\", or \"GRPO\". Skip this argument for\
    \ :func:`run_evals()`.\n\t:type trainer_type: str, optional \n\n\n.. py:function:: RFRandomSearch(configs: Dict[str, Any],\
    \ trainer_type: str = \"SFT\" | \"DPO\" | \"GRPO\" | None, num_runs: int, seed: int = 42)\n\n\t:param configs: A config\
    \ dictionary with :func:`List()` or :func:`Range()` for at least one knob.\n\t:type configs: Dict[str, Any]\n\n\t:param\
    \ trainer_type: The fine-tuning/post-training control flow to use: \"SFT\", \"DPO\", or \"GRPO\". Skip this argument for\
    \ :func:`run_evals()`.\n\t:type trainer_type: str, optional\n\n\t:param num_runs: Number of runs (full combinations of\
    \ knob values) to sample in total.\n\t:type num_runs: int\n\n\t:param seed: Seed for random sampling of knob values to\
    \ construct combinations. Default is 42.\n\t:type seed: int, optional \n\n\n**Notes:**\n\nFor :func:`RFGridSearch()`,\
    \ each knob can have either a single value or a :func:`List()` of values but no knob \nshould have :func:`Range()` of\
    \ values; otherwise, it will error out.\n\nFor :func:`RFRandomSearch()`, each knob can have either a single value, or\
    \ a :func:`List()` of values, or a \n :func:`Range()` of values. The semantics of sampling are independently-identically-distributed\
    \ (IID), i.e.,\nwe uniformly randomly pick a value from each discrete set and from each continuous set to construct the\
    \ \nknob combination for one run. \nThen we repeat that sampling process in an IID way to accumulate :code:`num_runs`\
    \ distinct combinations.\n\nNote that the return types of the config group generators are internal to RapidFire AI and\
    \ they are usable only \nwithin the context of :func:`run_fit()` or :func:`run_evals()` in the :class:`Experiment` class."
  - "RapidFire AI offers a browser-based dashboard to automatically visualize all ML metrics and lets \nyou control runs on\
    \ the fly from there. \nOur current default dashboard is a fork of the popular OSS tool `MLflow <https://mlflow.org/>`__,\
    \ \nand it inherits much of MLflow's native features.\nThe dashboard URI is printed when the rapidfireai server is started;\
    \ open it in a browser. \n\nAs of this writing, apart from MLflow, RapidFire AI also supports \n`TensorBoard  <https://www.tensorflow.org/tensorboard>`__\n\
    and `Trackio <https://huggingface.co/docs/trackio/en/index>`__\nfor logging metrics plots. \nSpecify any one, two, or\
    \ all three dashboards to use with the following server start argument. \n\n.. code-block:: bash\n\n   rapidfireai start\
    \ --tracking-backends [mlflow | tensorboard | trackio]\n\nAlternatively, set the dashboard using its environment variable\
    \ as below in your python code/notebook:\n\n.. code-block:: python\n\n   os.environ[\"RF_MLFLOW_ENABLED\"] = \"true\"\n\
    \   os.environ[\"RF_TENSORBOARD_ENABLED\"] = \"true\"\n   os.environ[\"RF_TRACKIO_ENABLED\"] = \"true\"\n\nSupport for\
    \ other popular dashboards such as Weights & Biases and CometML is coming soon. \nThe rest of this section explains the\
    \ new features of our MLflow-fork dashboard.\nNote that these new features are not yet available on the other dashboards."
  - "  :param sampling_params: A dictionary with key-value pairs to control the sampling behavior during text generation by\
    \ vLLM with a self-hosted LLM. All knobs given in this dictionary are simply passed to vLLM as is. vLLM will use its defaults\
    \ for unspecified knobs. We recommend listing at least the following knobs.\n\n    * :code:`\"temperature\"`: Float that\
    \ controls the randomness of the sampling. Lower values make the model more deterministic, while higher values make the\
    \ model more random. 0.0 means greedy sampling. Default is 1.0.\n    * :code:`\"top_p\"`: Float that controls the cumulative\
    \ probability of the top tokens to consider. Must be in (0, 1]. Set to 1 to consider all tokens. Default is 1.0.\n   \
    \ * :code:`\"max_tokens\"`: Maximum number of tokens to generate per output sequence. \n\n  :type sampling_params: dict[str,\
    \ Any]"
- source_sentence: What dashboards does RapidFire AI support for logging metrics, and how do you specify which ones to use?
  sentences:
  - "As of this writing, we support 4 IC Ops: **Stop**, **Resume**, **Clone-Modify**, and **Delete**. \nWe explain each shortly\
    \ below.\n\nAll IC Ops on a run are queued by the system and **executed at a chunk boundary** for that run. \nThis avoids\
    \ potentially non-deterministic or other inconsistent behaviors during concurrent run execution.\nNote that different\
    \ runs might reach their chunk boundary at different points in time. \nTo control the number of chunks, set :code:`num_chunks`\
    \ during :func:`run_fit()`; \nmore details :doc:`on the Experiment docs page </experiments>`.\n\nIC ops can be invoked\
    \ as intermittently as you want during a long-running :func:`run_fit()`. \nSo, you can launch, say, 16 configs in one\
    \ go (even on a 4-GPU machine), check in after a few chunks,  \nand stop bottom 80% of the runs. You can let the top performers\
    \ continue for longer. Then you can \nclone and modify some to add new finer grained runs and warm start their parameters.\
    \ And so on.\n\nUnder the hood, RapidFire AI automatically adjusts the apportioning of the GPUs among all ongoing \nruns\
    \ to ensure maximal GPU utilization.\n\n\n\n\nStop\n----\n\nThis IC Op earmarks a run to be stopped at the end of its\
    \ current chunk. \nIt will still be alive but it will not use any GPU resources from the next chunk. \nYou will still\
    \ see its minibatch-level plots advancing for the current chunk. \nYou cannot stop an already stopped or deleted run.\
    \ \n\n\n.. raw:: html\n\n    <img src=\"_static/icop-stop2.png\" alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in;\
    \ max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-stop.png\" alt=\"IC Op Stop\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nResume\n-----\n\n\
    This IC Op is applicable only to a previously stopped run. \nIt earmarks this run to be resumed from the next chunk onward,\
    \ when it will be added to the mix of \nongoing runs and assigned GPU(s) automatically. \nYou cannot resume an already\
    \ resumed or deleted run.\n\n\n\nClone-Modify\n----\n\nThis is a powerful IC Op that is applicable to any ongoing, stopped,\
    \ or resumed run. \nIt allows you to add \"clones\" of a chosen run, called the \"parent\" run, during a :func:`run_fit()`.\
    \ \nThe IC Op panel displays an editable text box with the full knob config dictionary of the parent. \n\nEdit any knobs,\
    \ e.g., learning rate, LoRA rank, or even base model as if you are injecting \nthat new run config from code, except this\
    \ is done conveniently from the metrics dashboard itself. \nAs of this writing, we only support providing a single config\
    \ for this IC Op.\nSoon we will support providing a config-group generator such as :code:`RFGridSearch()` or\n:code:`RFRandomSearch()`\
    \ as well in the IC Op panel itself akin to the launching code.\n\nYou can also **warm-start** a clone using its parent's\
    \ weights if you'd like. \nWarm-started clones inherit their parent's learning behavior so far and thus, they can reach\
    \ better \neval metrics faster. \nNote that warm starting is only allowed if the clones have *identical* neural architecture\
    \ as the \nparent, including LoRA adapters; otherwise, it will error out.\n\nWhen you are ready with your clone's config,\
    \ click \"Submit\" to execute this IC Op.\n\n\n.. raw:: html\n\n    <img src=\"_static/icop-clone2.png\" alt=\"IC Op Clone-Modify\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-clone.png\"\
    \ alt=\"IC Op Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\"\
    >\n\n\nClones will automatically appear on the plots from the next chunk onward; just refresh the page. \nRapidFire AI's\
    \ adaptive scheduler automatically reapportions GPUs across all runs, including clones.\nSo, do not need to worry about\
    \ manually splitting GPUs across models, juggling new processes, etc.\nClones are treated just like any other run; so,\
    \ you can clone that clone later with IC Ops again.\n\nYou can submit multiple Clone-Modify ops on the same run or different\
    \ runs whenever you want. \nThey will get queued up and all clones will start together at the next chunk boundary. \n\n\
    Clone-Modify combined with Stop enables you to turbocharge how you leverage your intuition about your \nAI use case, dataset,\
    \ models, and eval metrics to dramatically cut down time to reaching much better \neval metrics even within a single experiment.\n\
    \n\n\nDelete\n----\n\nThis IC Op earmarks the run to be deleted from the next chunk onward. \nOn the chart, you will see\
    \ its curves vanish almost immediately. \nYou cannot do any further IC Ops on a deleted run because it will not be visible.\
    \ \nNote that although a deleted run vanishes from the plots, its model checkpoints are still part of \nthe artifacts\
    \ of that experiment so that you have post-hoc audibility.\n"
  - "We currently support two common knob set generators: :func:`List()` for a discrete \nset of values and :func:`Range()`\
    \ for sampling from a continuous value interval.\n\n\n.. py:function:: List(values: List[Any])\n\n\t:param values: List\
    \ of discrete values for a knob; all values must be the same python data type.\n\t:type values: List[Any]\n\n\n.. py:function::\
    \ Range(start: int | float, end: int | float, dtype: str = \"int\" | \"float\")\n\n\t:param start: Lower bound of range\
    \ interval.\n\t:type start: int | float\n\n\t:param end: Upper bound of range interval.\n\t:type end: int | float\n\n\t\
    :param dtype: Data type of value to be sampled, either :code:`\"int\"` or :code:`\"float\"`.\n\t:type dtype: str\n\n\n\
    **Notes:**\n\nAs of this writing, :func:`Range()` performs uniform sampling within the given interval. \nWe plan to continue\
    \ expanding this API and add more functionality on this front based on feedback."
  - "RapidFire AI offers a browser-based dashboard to automatically visualize all ML metrics and lets \nyou control runs on\
    \ the fly from there. \nOur current default dashboard is a fork of the popular OSS tool `MLflow <https://mlflow.org/>`__,\
    \ \nand it inherits much of MLflow's native features.\nThe dashboard URI is printed when the rapidfireai server is started;\
    \ open it in a browser. \n\nAs of this writing, apart from MLflow, RapidFire AI also supports \n`TensorBoard  <https://www.tensorflow.org/tensorboard>`__\n\
    and `Trackio <https://huggingface.co/docs/trackio/en/index>`__\nfor logging metrics plots. \nSpecify any one, two, or\
    \ all three dashboards to use with the following server start argument. \n\n.. code-block:: bash\n\n   rapidfireai start\
    \ --tracking-backends [mlflow | tensorboard | trackio]\n\nAlternatively, set the dashboard using its environment variable\
    \ as below in your python code/notebook:\n\n.. code-block:: python\n\n   os.environ[\"RF_MLFLOW_ENABLED\"] = \"true\"\n\
    \   os.environ[\"RF_TENSORBOARD_ENABLED\"] = \"true\"\n   os.environ[\"RF_TRACKIO_ENABLED\"] = \"true\"\n\nSupport for\
    \ other popular dashboards such as Weights & Biases and CometML is coming soon. \nThe rest of this section explains the\
    \ new features of our MLflow-fork dashboard.\nNote that these new features are not yet available on the other dashboards."
- source_sentence: What rate limiting parameters does RFOpenAIAPIModelConfig provide, and why are they needed?
  sentences:
  - "\nRapidFire AI transforms the status quo by adapting the powerful idea of **online aggregation** \nfrom database systems\
    \ research to LLM evals. \nOur adaptive execution engine, :doc:`as described on this page</difference>`, automatically\
    \ \nshards the data and processes multiple configs in parallel, one shard at a time, with \nefficient swapping techniques.\n\
    \nThis means you get **running metric estimates with confidence intervals** in real time. \nSo, you can confidently stop\
    \ poor configs earlier, clone better configs on the fly, and \nperform more informed exploration to reach much better\
    \ eval metrics in much less time.\n\n\nExample: Traditional Batch Evals vs. RapidFire AI\n-------\n\nFor instance, suppose\
    \ you have an evals set with 400 queries. You decide to compare, say, \n4 RAG configs in one go with RapidFire AI with\
    \ number of shards set to 8. The illustration\nbelow contrasts traditional batch evals vs. RapidFire AI's approach for\
    \ a simple eval metric.\n\n.. list-table::\n   :widths: 50 50\n   :class: side-by-side\n\n   * - .. figure:: /images/rag-eval-online1.png\n\
    \          :width: 100%\n          :alt: Online aggregation for evals with RapidFire AI and IC Ops.\n\n     - .. figure::\
    \ /images/rag-eval-online2.png\n          :width: 100%\n          :alt: Online aggregation for evals with RapidFire AI\
    \ and IC Ops.\n\n\nAll configs are executed on the first 1/8th of the data (50 examples), with \ntheir **incrementally\
    \ computed** eval metrics shown in real time with confidence intervals. \nIn the figure, the 3 worst configs are stopped,\
    \ while the best is cloned to add 2 new variants. \nThe 3 running configs now continue on the second 1/8th of the data\
    \ (cumulatively, \n100 examples), and so on.\nOne clone is then stopped halfway through the aggregation, while the other\
    \ two run to completion. \nUltimately, the other clone ends up being the best config overall.\n\nNote that the confidence\
    \ intervals shown will keep narrowing as configs see more shards, converging \nto zero when 100% of the data is seen,\
    \ i.e., the metrics become exact point estimates.\nOverall, compared to sequential batch evals in which the original 4\
    \ configs all run to completion, \nRapidFire AI enables you to explore more configs in less time, while reaching better\
    \ eval metrics.\n\n\n\nTypes of Metrics\n-----------------------\n\nWe support 2 types of metrics based on their aggregation\
    \ semantics: \n\n* **Distributive Metrics:** These are purely additive over a given set of data points. \n  \n  Examples:\
    \ *count* of number of correct predictions; *sum* of output token lengths across queries.\n\n* **Algebraic Metrics:**\
    \ These are averages or proportions over a given set of data points. They can be decomposed into components that are individually\
    \ distributive. \n  \n  Examples: *precision*, which counts number of correct predictions and total number of data points\
    \ separately and then divides them; *mean rouge-1*, which averages per-example rouge-1 values that assesses overlap of\
    \ tokens between generated text and ground truth text.\n\nWhen you define an eval metric via :func:`evals.compute_metrics_fn()`\
    \ and :func:`evals.accumulate_metrics_fn()`, \nyou must specify their type (algebraic or distributive) and value range\
    \ as illustrated below. \nFor metrics without a type defined, they will be displayed *as is*, i.e., without projected\
    \ \nestimates or confidence intervals.\n\n.. code-block:: python\n\n    # Based on GSM8K tutorial use case\n    metrics\
    \ = {\n        \"Total\": {\"value\": total},\n        \"Correct\": {\n            \"value\": correct,\n            \"\
    is_distributive\": True,\n            \"value_range\": (0, 1),\n        },\n        \"Accuracy\": {\n            \"value\"\
    : accuracy,\n            \"is_algebraic\": True,\n            \"value_range\": (0, 1),\n        },\n    }\n\nConfidence\
    \ Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly randomly**,\
    \ i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies to calculate confidence\
    \ intervals for projected estimates of metrics. \nYou can indicate the confidence level (we recommend 95%) and whether\
    \ to perform \"finite population correction\" (FPC) or not. \nThese values can be specified under the key :code:`\"online_strategy_kwargs\"\
    ` in your config dictionary as illustrated below.\n\n.. code-block:: python\n\n    # Based on FiQA RAG tutorial use case\n\
    \    \"online_strategy_kwargs\": {\n        \"strategy_name\": \"normal\",\n        \"confidence_level\": 0.95,\n    \
    \    \"use_fpc\": True,\n    },\n\nNotation \n^^^^^^^\n\n* :math:`N` = Total population size (total number of queries\
    \ in eval set)\n* :math:`n` = Sample size (number of queries processed so far)\n* :math:`\\hat{p}` = Observed sample proportion\
    \ or average for an algebraic metric\n* :math:`\\bar{X}` = Sample mean for a distributive metric\n* :math:`\\widehat{T}`\
    \ = Estimated population total for a distributive metric\n* :math:`\\text{Var}(\\widehat{T})` = Variance of the above\
    \ estimated population total\n* :math:`\\text{SE}` = Standard error (measure of estimate uncertainty)\n* :math:`\\text{CI}`\
    \ = Confidence interval\n* :math:`z` = Z-score for confidence level (1.96 for 95% confidence; used in Normal and Wilson)\n\
    * :math:`\\alpha` = Significance level (0.05 for 95% confidence)\n* :math:`n_{\\text{eff}}` = Effective sample size (adjusted\
    \ for FPC in Wilson)\n* :math:`a, b` = Lower and upper bounds of metric value range\n* :math:`R` = Range width, :math:`R\
    \ = b - a`\n* :math:`\\varepsilon` = Margin of error (half-width of confidence interval for Hoeffding)\n* :math:`\\varepsilon_{\\\
    bar{X}}` = Margin of error for sample mean (Hoeffding distributive)\n* :math:`\\text{FPC}` = Finite population correction\
    \ factor\n\n\nFinite Population Correction (FPC)\n^^^^^^^^^^^^^^^^^^^^^^\n\nWhen sampling without replacement from finite\
    \ populations, enabling FPC \nmultiplies the standard error (SE) by :math:`\\text{FPC} = \\sqrt{(N-n)/(N-1)}` \nwhere\
    \ :math:`N` is population size and :math:`n` is sample size.\n\n\nNormal Approximation\n^^^^^^^^^^^^^^^^^^^\n\nThis is\
    \ the default strategy, and it uses the Central Limit Theorem. \nIt is suitable for most cases with non-trivial sample\
    \ sizes (n > 30). \nIt provides tight intervals when the statistical assumptions hold.\n\n* For algebraic metrics:\n\n\
    .. math::\n\n   \\text{SE}_{\\hat{p}} = \\sqrt{\\frac{\\hat{p}(1-\\hat{p})}{n}} \\times \\text{FPC}\n\n   \\text{CI} =\
    \ \\hat{p} \\pm 1.96 \\cdot \\text{SE}_{\\hat{p}}\n\n\n* For distributive metrics: \n\nEstimate population total :math:`\\\
    widehat{T} = N\\bar{X}` with \nvariance :math:`\\text{Var}(\\widehat{T}) = N^2 \\cdot \\bar{X}(1-\\bar{X})/n` (FPC-adjusted).\n\
    \n\nWilson Score\n^^^^^^^^^^^\n\nThis strategy is better for small sample sizes or metrics near 0/1 boundaries. \nIt is\
    \ more robust than Normal Approximation for extreme proportions. \n\n* For algebraic metrics:\n\n.. math::\n\n   \\text{center}\
    \ = \\frac{\\hat{p} + z^2/(2n_{\\text{eff}})}{1 + z^2/n_{\\text{eff}}}\n\n   \\text{margin} = \\frac{z\\sqrt{\\hat{p}(1-\\\
    hat{p})/n_{\\text{eff}} + z^2/(4n_{\\text{eff}}^2)}}{1 + z^2/n_{\\text{eff}}}\n\nwhere :math:`n_{\\text{eff}} = n/\\text{FPC}^2`\
    \ when using FPC. \nThe Wilson confidence interval is then :math:`[\\text{center} - \\text{margin}, \\text{center} + \\\
    text{margin}]`,\nclamped to [0, 1].\n\n* For distributive metrics, this falls back to Normal Approximation. \n\n\n\nHoeffding\
    \ Bounds\n^^^^^^^^^^^\n\nThis strategy is best for maximum safety (guaranteed coverage). It makes no distributional assumptions,\
    \ \nbut that also means its intervals are typically quite loose.\n\n.. math::\n\n   \\varepsilon = (b-a)\\sqrt{\\frac{\\\
    ln(2/\\alpha)}{2n}} \\times \\text{FPC}\n\n   \\text{CI} = [\\hat{p} - \\varepsilon, \\hat{p} + \\varepsilon]\n\nFor distributive\
    \ metrics with range :math:`R=b-a`, it computes :math:`\\varepsilon_{\\bar{X}} = R\\sqrt{\\ln(2/\\alpha)/(2n)}` \nand\
    \ then scales to population total."
  - "Compute Metrics Function\n------\n\nOptional user-provided function specifying custom evaluation metrics based on the\
    \ generated \noutputs and ground truth.\n\nIt is passed to the :code:`compute_metrics` argument of :class:`RFModelConfig`.\
    \ \nAlso read: :doc:`the LoRA and Model Configs page</models>`.\nYou can create multiple variants of these functions and\
    \ pass them all as a single \n:code:`List` to your :class:`RFModelConfig` to create a multi-config specification.\n\n\
    This function is invoked by the underlying HF trainer at a cadence controlled by the \n:code:`eval_strategy` and :code:`eval_steps`\
    \ arguments.\nAlso read: :doc:`the Trainer Configs page</trainers>`.\n\n.. py:function:: fit.compute_metrics_fn(eval_preds:\
    \ Tuple) -> Dict[str, float]\n\n   :param eval_preds: Tuple containing generated predictions and ground truth labels from\
    \ the eval dataset.\n   :type eval_preds: Tuple[List[str], List[str]]\n\n   :return: Dictionary with user-defined metrics\
    \ with names keys and numbers as values\n   :rtype: Dict[str, float]\n\n\n**Example:**\n\n.. code-block:: python\n\n\t\
    # From the SFT tutorial notebook\n\tdef sample_compute_metrics(eval_preds):  \n\t\t\"\"\"Optional function to compute\
    \ eval metrics based on predictions and labels\"\"\"\n\t\tpredictions, labels = eval_preds\n\n\t\t# Standard text-based\
    \ eval metrics: Rouge and BLEU\n\t\timport evaluate\n\t\trouge = evaluate.load(\"rouge\")\n\t\tbleu = evaluate.load(\"\
    bleu\")\n\n\t\trouge_output = rouge.compute(predictions=predictions, references=labels, use_stemmer=True)\n\t\trouge_l\
    \ = rouge_output[\"rougeL\"]\n\t\tbleu_output = bleu.compute(predictions=predictions, references=labels)\n\t\tbleu_score\
    \ = bleu_output[\"bleu\"]\n\n\t\treturn {\"rougeL\": round(rouge_l, 4), \"bleu\": round(bleu_score, 4)}"
  - "The main \"Experiments\" page on the dashboard has 4 main tabs: \n\n* Table\n\n* Chart\n\n* Experiment Log\n\n* Interactive\
    \ Control (IC) Log\n\n\nThe screenshot below shows the \"Table\" view of an experiment with all its runs. \nEach run represents\
    \ one model with one set of config knob values, which is standard dashboard semantics.\n\n\n.. raw:: html\n\n    <img\
    \ src=\"_static/mlflow-1-table.png\" alt=\"Table view of runs metadata\" \n         style=\"cursor: zoom-in; max-width:\
    \ 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nMetrics Plots\n----\n\nThe screenshot below shows the \"Chart\" view\
    \ of an experiment with all its runs. \nEach plot corresponds to a metric, spanning :code:`loss` on the training set and\
    \ evaluation set, \nas well all named metrics returned in your :func:`compute_metrics()` function in the trainer config.\n\
    \nWe call attention to 3 key aspects of the visualizations here: \n\n* The x-axis \"Step\" for the mini batch-level plots\
    \ represents absolute number of minibatches seen by that run. So, if the :code:`batch_size` is different for different\
    \ runs in your experiment, they will take different numbers of steps and the curves will not line up till the end. This\
    \ is not a bug but the expected correct behavior.\n\n* The x-axis \"Step\" for the epoch-level plots represents absolute\
    \ number of epochs seen by that run. So, if the :code:`epochs` is different for different runs in your experiment, they\
    \ will take different numbers of steps again as above.\n\n* Please refresh the browser page to get RapidFire AI's metrics\
    \ reader to pull the latest data entries from the metrics files.\n\n.. raw:: html\n\n    <img src=\"_static/mlflow-2-chart.png\"\
    \ alt=\"Metrics plots on dashboard\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\"\
    >\n\n\nThe dashboard picks some default colors for all runs, but you can change their colors by \nclicking the \"color\
    \ circle\" next to the run number in the \"Run Name\" column. \nA color palette will pop up as shown in the screenshot\
    \ below.\n\n.. raw:: html\n\n    <img src=\"_static/mlflow-3-colors.png\" alt=\"Change colors of runs\" \n         style=\"\
    cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nMessage Logs\n------\n\nThere are two continually\
    \ appending message logs on the third and fourth tabs: \"Experiment Log\" and \n\"Interactive Control Log\", respectively.\
    \ \nAll operations you run with RapidFire AI's API will be displayed on the former. \nThe latter will specifically display\
    \ all the Interactive Control (IC) operations you do via the IC Ops \npanels, as shown on the screenshot below.\n\n\n\
    .. raw:: html\n\n    <img src=\"_static/mlflow-4-log.png\" alt=\"Logs on dashboard\" \n         style=\"cursor: zoom-in;\
    \ max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nThe full experiment log will also be available as a text\
    \ file saved on your local directory under the name \"rapidfire.log\"."
