- source_sentence: How do the Stop and Delete IC Ops compare in terms of their effects on a run's state, visibility on the
    dashboard, resource usage, artifact preservation, and what further IC Ops can be performed on the run afterward?
  sentences:
  - "RapidFire AI is a new AI experiment execution framework that transforms your LLM pipeline customization \nfrom slow,\
    \ sequential processes into rapid, intelligent workflows with hyperparallelized execution, \ndynamic real-time experiment\
    \ control, and automatic backend optimization.\n\nFor *RAG and context engineering evals*, start here: :doc:`Install and\
    \ Get Started: RAG and Context Engineering</walkthroughrag>`.\n\nFor *SFT and RFT/post-training workflows*, start here:\
    \ :doc:`Install and Get Started: SFT/RFT</walkthroughft>`.\n\n\nRapidFire AI is the first system of its kind to establish\
    \ live three-way communication between the IDE\nwhere the experiment is launched, a metrics display/control dashboard,\
    \ and a multi-core/multi-GPU execution backend.\n\n.. image:: /images/rf-usage.png\n   :width: 800px\n\nJust pip install\
    \ the :code:`rapidfireai` OSS package. It works on a CPU-only machine, a single-GPU machine, \nor a multi-GPU machine.\
    \ Note that for RAG/context engineering with only closed model APIs, GPUs are not needed. "
  - "Resume\n-----\n\nThis IC Op is applicable only to a previously stopped run. \nIt earmarks this run to be resumed from\
    \ the next chunk onward, when it will be added to the mix of \nongoing runs and assigned GPU(s) automatically. \nYou cannot\
    \ resume an already resumed or deleted run."
  - "The crux of RapidFire AI's difference is in its *adaptive execution engine*: it enables \"interruptible\"\nexecution\
    \ of configurations across GPUs/CPUs. To do so, it first shards the training and/or evaluation \ndataset randomly into\
    \ \"chunks\" (also called \"shards\").\nThen instead of waiting for a run to see the whole dataset for all epochs (for\
    \ SFT/RFT) or for full \neval metrics calculation (for RAG evals), RapidFire AI schedules all runs on *one shard at a\
    \ time*, \nand then cycles through all shards.\n\nSuppose you have only 1 GPU, say an A100 or H100, and you want to run\
    \ SFT on a Llama model. \nCurrent tools force you to run one config after another *sequentially* as shown in the (simplified)\
    \ illustration below. \nIn contrast, by operating on shards, RapidFire AI offers a far more concurrent learning experience\
    \ by \nautomatically *swapping* adapters (and base models, if needed) across GPU(s) and DRAM. \nIt does this via efficient\
    \ shared memory-based caching mechanisms that can spill to disk when needed.\n\n.. image:: /images/gantt-1gpu.png\n  \
    \ :width: 800px\n\nIn the above figure, all 3 model configs are shown for 1 epoch. RapidFire AI is set to use 4 chunks.\n\
    So, before model config 3 (M3) even starts in the sequential approach, RapidFire AI already shows you \nthe learning behaviors\
    \ of all 3 configs on the first 2-3 chunks. \nThe overhead of swapping, represented by the thin gray box, is minimal,\
    \ less than 5% of the runtime,\nas per our measurements--thanks to our new efficient memory management techniques.\n\n\
    For inference evals for RAG/context engineering, such sharded execution means RapidFire AI surfaces eval metrics \nsooner\
    \ based on a statistical technique known as *online aggregation* from the database systems literature.\nBasically, see\
    \ estimated values and confidence intervals for all eval metrics in real time as the shards \nget processed, ultimately\
    \ converging to the exact metrics on the full dataset."
- source_sentence: What user-provided functions can be included in an eval config for run_evals(), and which are mandatory
    vs. optional?
  sentences:
  - "Eval Compute Metrics Function\n-------------------------\n\nMandatory user-provided function to compute eval metrics\
    \ on a given batch of (postprocessed) examples, \nwhich is injected by the system. \nIt should return metrics computed\
    \ over the batch as a whole. \n\nIt is invoked for each batch during the evaluation process after generation and postprocessing\
    \ (if applicable). \nPass it directly to the :code:`compute_metrics_fn` key in your eval config dictionary.\n\n\n.. py:function::\
    \ eval.compute_metrics_fn(batch: dict[str, list]) -> dict[str, dict[str, Any]]\n\n   :param batch: Dictionary containing\
    \ a batch of examples, including all preprocessed fields, generated outputs, and any postprocessed fields\n   :type batch:\
    \ dict[str, list]\n\n   :return: Dictionary with a metric's name as key and a dictionary as value inside which a reserved\
    \ key :code:`\"value\"` must exist with that corresponding metric's value over this batch of examples.\n   :rtype: dict[str,\
    \ dict[str, Any]]\n"
  - "Stop\n----\n\nThis IC Op earmarks a run to be stopped at the end of its current chunk. \nIt will still be alive but it\
    \ will not use any GPU resources from the next chunk. \nYou will still see its minibatch-level plots advancing for the\
    \ current chunk. \nYou cannot stop an already stopped or deleted run. \n\n\n.. raw:: html\n\n    <img src=\"_static/icop-stop2.png\"\
    \ alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\
    \    <img src=\"_static/icop-stop.png\" alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"\
    this.requestFullscreen()\">\n"
  - "    :param search_cfg: The search algorithm type and its kwargs to use for retrieval of vectors/chunks, provided as a\
    \ single dictionary. Must include a key :code:`\"type\"` with one of the following three options listed as value; default\
    \ is :code:`\"similarity\"`.\n\n      * :code:`\"similarity\"`: Standard cosine similarity search.\n      * :code:`\"\
    similarity_score_threshold\"`: Similarity search with minimum score threshold (SST).\n      * :code:`\"mmr\"`: Maximum\
    \ Marginal Relevance (MMR) search for diversity.\n\n      Additional parameters for search configuration depend on the\
    \ type; the keys can include the following:\n\n      * :code:`\"k\"`: Number of documents to retrieve. Default is 5.\n\
    \      * :code:`\"filter\"`: Optional filter criteria function for search results.\n      * :code:`\"score_threshold\"\
    `: Only for SST. Minimum similarity score threshold. \n      * :code:`\"fetch_k\"`: Only for MMR. Number of documents\
    \ to fetch before MMR reranking. Default is 20.\n      * :code:`\"lambda_mult\"`: Only for MMR. Diversity parameter for\
    \ MMR balancing relevance vs. diversity. Default is 0.5.\n    :type search_cfg: dict, optional"
- source_sentence: How does the Finite Population Correction (FPC) factor work in RapidFire AI's online aggregation for evals,
    and why is it relevant given how data points are assigned to shards?
  sentences:
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
  - "We currently support two common knob set generators: :func:`List()` for a discrete \nset of values and :func:`Range()`\
    \ for sampling from a continuous value interval.\n\n\n.. py:function:: List(values: List[Any])\n\n\t:param values: List\
    \ of discrete values for a knob; all values must be the same python data type.\n\t:type values: List[Any]\n\n\n.. py:function::\
    \ Range(start: int | float, end: int | float, dtype: str = \"int\" | \"float\")\n\n\t:param start: Lower bound of range\
    \ interval.\n\t:type start: int | float\n\n\t:param end: Upper bound of range interval.\n\t:type end: int | float\n\n\t\
    :param dtype: Data type of value to be sampled, either :code:`\"int\"` or :code:`\"float\"`.\n\t:type dtype: str\n\n\n\
    **Notes:**\n\nAs of this writing, :func:`Range()` performs uniform sampling within the given interval. \nWe plan to continue\
    \ expanding this API and add more functionality on this front based on feedback."
  - "Note that if you plan to use only OpenAI APIs and not self-hosted models (for embedding or generation), you do NOT need\
    \ GPUs on your machine. \nBut you must provide a valid OpenAI API key via a config argument as shown in the GSM8K and\
    \ SciFact tutorial notebooks.\n\n\nStep 1: Install dependencies and package\n-----------------------\n\nObtain the RapidFire\
    \ AI OSS package from pypi (includes all dependencies) and ensure it is installed correctly.\n\n.. important::\n\n  Requires\
    \ Python 3.12+. Ensure that ``python3`` resolves to Python 3.12 before creating the venv.\n\n.. code-block:: bash\n\n\
    \   python3 --version  # must be 3.12.x\n   python3 -m venv .venv\n   source .venv/bin/activate\n\n   pip install rapidfireai\n\
    \n   rapidfireai --version\n   # Verify it prints the following:\n   # RapidFire AI 0..14.0\n\n   # Due to current issue:\
    \ https://github.com/huggingface/xet-core/issues/527\n   pip uninstall -y hf-xet\n\n\nThe tutorial notebooks for RAG evals\
    \ do not use any gated models from Hugging Face.\nIf you want to access gated models, provide your Hugging Face account\
    \ token.\nFor more details on that, :doc:`see Step 1 here</walkthroughft>`.\n\n\nStep 2: Initialize and start RapidFire\
    \ AI server\n------------\n\nRun the following commands to initialize rapidfireai to use the correct dependencies for\
    \ RAG evals:\n\n.. code-block:: bash\n\n   rapidfireai init --evals\n   # It will install specific dependencies and initialize\
    \ rapidfireai for RAG evals\n\n\n.. note::\n  You need to run init **only once** for a new venv or when switching GPU(s)\
    \ on your machine. You do NOT need to run it after a reboot or for a new terminal tab.\n\n\nNext start RapidFire AI services:\
    \ the frontend with the ML metrics dashboard and the API server. \nThe frontend URL shown below can be opened on your\
    \ local browser.\n\n.. code-block:: bash\n\n   rapidfireai start\n   # It should print about 50 lines, including the following:\n\
    \   # ...\n   # RapidFire Frontend is ready\n   # Open your browser and navigate to: http://0.0.0.0:8853\n   # ...\n \
    \  # Press Ctrl+C to stop all services\n\n.. important::\n\n  Do NOT proceed until the start is successful with \"Available\
    \ endpoints\" printed as above. Leave this terminal running while you work through the tutorial notebooks. \n\n\nIf you\
    \ close the terminal in which you started rapidfireai or if you rebooted your machine, \njust start rapidfireai again\
    \ with the above command.\n\nIf the start command fails for whatever reason, wait for half a minute and rerun it.\nFor\
    \ diagnostics and common fixes (including Linux/macOS and Windows steps), see :doc:`Troubleshooting </troubleshooting>`.\n\
    \n.. note::\n  For RAG/context engineering experiments with :func:`run_evals()`, starting the server is **optional** and\
    \ only needed if you want to see results on the ML metrics dashboard too. Just as results are shown in an in-notebook\
    \ table too, IC Ops panel can be displayed in the notebook too, as illustrated below (Steps 5 and 6)."
- source_sentence: What dashboards does RapidFire AI support for logging metrics, and how do you specify which ones to use?
  sentences:
  - "RapidFire AI transforms the status quo by adapting the powerful idea of **online aggregation** \nfrom database systems\
    \ research to LLM evals. \nOur adaptive execution engine, :doc:`as described on this page</difference>`, automatically\
    \ \nshards the data and processes multiple configs in parallel, one shard at a time, with \nefficient swapping techniques.\n\
    \nThis means you get **running metric estimates with confidence intervals** in real time. \nSo, you can confidently stop\
    \ poor configs earlier, clone better configs on the fly, and \nperform more informed exploration to reach much better\
    \ eval metrics in much less time.\n\n\nExample: Traditional Batch Evals vs. RapidFire AI\n-------\n\nFor instance, suppose\
    \ you have an evals set with 400 queries. You decide to compare, say, \n4 RAG configs in one go with RapidFire AI with\
    \ number of shards set to 8. The illustration\nbelow contrasts traditional batch evals vs. RapidFire AI's approach for\
    \ a simple eval metric.\n\n.. list-table::\n   :widths: 50 50\n   :class: side-by-side\n\n   * - .. figure:: /images/rag-eval-online1.png\n\
    \          :width: 100%\n          :alt: Online aggregation for evals with RapidFire AI and IC Ops.\n\n     - .. figure::\
    \ /images/rag-eval-online2.png\n          :width: 100%\n          :alt: Online aggregation for evals with RapidFire AI\
    \ and IC Ops.\n\n\nAll configs are executed on the first 1/8th of the data (50 examples), with \ntheir **incrementally\
    \ computed** eval metrics shown in real time with confidence intervals. \nIn the figure, the 3 worst configs are stopped,\
    \ while the best is cloned to add 2 new variants. \nThe 3 running configs now continue on the second 1/8th of the data\
    \ (cumulatively, \n100 examples), and so on.\nOne clone is then stopped halfway through the aggregation, while the other\
    \ two run to completion. \nUltimately, the other clone ends up being the best config overall.\n\nNote that the confidence\
    \ intervals shown will keep narrowing as configs see more shards, converging \nto zero when 100% of the data is seen,\
    \ i.e., the metrics become exact point estimates.\nOverall, compared to sequential batch evals in which the original 4\
    \ configs all run to completion, \nRapidFire AI enables you to explore more configs in less time, while reaching better\
    \ eval metrics.\n\n\n\nTypes of Metrics\n-----------------------\n\nWe support 2 types of metrics based on their aggregation\
    \ semantics: \n\n* **Distributive Metrics:** These are purely additive over a given set of data points. \n  \n  Examples:\
    \ *count* of number of correct predictions; *sum* of output token lengths across queries.\n\n* **Algebraic Metrics:**\
    \ These are averages or proportions over a given set of data points. They can be decomposed into components that are individually\
    \ distributive. \n  \n  Examples: *precision*, which counts number of correct predictions and total number of data points\
    \ separately and then divides them; *mean rouge-1*, which averages per-example rouge-1 values that assesses overlap of\
    \ tokens between generated text and ground truth text.\n\nWhen you define an eval metric via :func:`evals.compute_metrics_fn()`\
    \ and :func:`evals.accumulate_metrics_fn()`, \nyou must specify their type (algebraic or distributive) and value range\
    \ as illustrated below. \nFor metrics without a type defined, they will be displayed *as is*, i.e., without projected\
    \ \nestimates or confidence intervals.\n\n.. code-block:: python\n\n    # Based on GSM8K tutorial use case\n    metrics\
    \ = {\n        \"Total\": {\"value\": total},\n        \"Correct\": {\n            \"value\": correct,\n            \"\
    is_distributive\": True,\n            \"value_range\": (0, 1),\n        },\n        \"Accuracy\": {\n            \"value\"\
    : accuracy,\n            \"is_algebraic\": True,\n            \"value_range\": (0, 1),\n        },\n    }\n\nConfidence\
    \ Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly randomly**,\
    \ i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies to calculate confidence\
    \ intervals for projected estimates of metrics. \nYou can indicate the confidence level (we recommend 95%) and whether\
    \ to perform \"finite population correction\" (FPC) or not. \nThese values can be specified under the key :code:`\"online_strategy_kwargs\"\
    ` in your config dictionary as illustrated below.\n\n.. code-block:: python\n\n    # Based on FiQA RAG tutorial use case\n\
    \    \"online_strategy_kwargs\": {\n        \"strategy_name\": \"normal\",\n        \"confidence_level\": 0.95,\n    \
    \    \"use_fpc\": True,\n    },\n\nNotation \n^^^^^^^\n\n* :math:`N` = Total population size (total number of queries\
    \ in eval set)\n* :math:`n` = Sample size (number of queries processed so far)\n* :math:`\\hat{p}` = Observed sample proportion\
    \ or average for an algebraic metric\n* :math:`\\bar{X}` = Sample mean for a distributive metric\n* :math:`\\widehat{T}`\
    \ = Estimated population total for a distributive metric\n* :math:`\\text{Var}(\\widehat{T})` = Variance of the above\
    \ estimated population total\n* :math:`\\text{SE}` = Standard error (measure of estimate uncertainty)\n* :math:`\\text{CI}`\
    \ = Confidence interval\n* :math:`z` = Z-score for confidence level (1.96 for 95% confidence; used in Normal and Wilson)\n\
    * :math:`\\alpha` = Significance level (0.05 for 95% confidence)\n* :math:`n_{\\text{eff}}` = Effective sample size (adjusted\
    \ for FPC in Wilson)\n* :math:`a, b` = Lower and upper bounds of metric value range\n* :math:`R` = Range width, :math:`R\
    \ = b - a`\n* :math:`\\varepsilon` = Margin of error (half-width of confidence interval for Hoeffding)\n* :math:`\\varepsilon_{\\\
    bar{X}}` = Margin of error for sample mean (Hoeffding distributive)\n* :math:`\\text{FPC}` = Finite population correction\
    \ factor\n\n\nFinite Population Correction (FPC)\n^^^^^^^^^^^^^^^^^^^^^^\n\nWhen sampling without replacement from finite\
    \ populations, enabling FPC \nmultiplies the standard error (SE) by :math:`\\text{FPC} = \\sqrt{(N-n)/(N-1)}` \nwhere\
    \ :math:`N` is population size and :math:`n` is sample size.\n\n\nNormal Approximation\n^^^^^^^^^^^^^^^^^^^\n\nThis is\
    \ the default strategy, and it uses the Central Limit Theorem. \nIt is suitable for most cases with non-trivial sample\
    \ sizes (n > 30). \nIt provides tight intervals when the statistical assumptions hold.\n\n* For algebraic metrics:\n\n\
    .. math::\n\n   \\text{SE}_{\\hat{p}} = \\sqrt{\\frac{\\hat{p}(1-\\hat{p})}{n}} \\times \\text{FPC}\n\n   \\text{CI} =\
    \ \\hat{p} \\pm 1.96 \\cdot \\text{SE}_{\\hat{p}}\n\n\n* For distributive metrics: \n\nEstimate population total :math:`\\\
    widehat{T} = N\\bar{X}` with \nvariance :math:`\\text{Var}(\\widehat{T}) = N^2 \\cdot \\bar{X}(1-\\bar{X})/n` (FPC-adjusted).\n\
    \n\nWilson Score\n^^^^^^^^^^^\n\nThis strategy is better for small sample sizes or metrics near 0/1 boundaries. \nIt is\
    \ more robust than Normal Approximation for extreme proportions. \n\n* For algebraic metrics:\n\n.. math::\n\n   \\text{center}\
    \ = \\frac{\\hat{p} + z^2/(2n_{\\text{eff}})}{1 + z^2/n_{\\text{eff}}}\n\n   \\text{margin} = \\frac{z\\sqrt{\\hat{p}(1-\\\
    hat{p})/n_{\\text{eff}} + z^2/(4n_{\\text{eff}}^2)}}{1 + z^2/n_{\\text{eff}}}\n\nwhere :math:`n_{\\text{eff}} = n/\\text{FPC}^2`\
    \ when using FPC. \nThe Wilson confidence interval is then :math:`[\\text{center} - \\text{margin}, \\text{center} + \\\
    text{margin}]`,\nclamped to [0, 1].\n\n* For distributive metrics, this falls back to Normal Approximation. \n\n\n\nHoeffding\
    \ Bounds\n^^^^^^^^^^^\n\nThis strategy is best for maximum safety (guaranteed coverage). It makes no distributional assumptions,\
    \ \nbut that also means its intervals are typically quite loose.\n\n.. math::\n\n   \\varepsilon = (b-a)\\sqrt{\\frac{\\\
    ln(2/\\alpha)}{2n}} \\times \\text{FPC}\n\n   \\text{CI} = [\\hat{p} - \\varepsilon, \\hat{p} + \\varepsilon]\n\nFor distributive\
    \ metrics with range :math:`R=b-a`, it computes :math:`\\varepsilon_{\\bar{X}} = R\\sqrt{\\ln(2/\\alpha)/(2n)}` \nand\
    \ then scales to population total.\n"
  - "API: User-Provided Functions for Run Evals\n===============\n\nUsers can provide the following custom functions as part\
    \ of their eval config to be used in :func:`run_evals()`.\nNote that each leaf config can have its own set of functions\
    \ for all of these.\n\n\nPreprocess Function\n-------------------\n\nMandatory user-provided function to prepare the inputs\
    \ to be given to the generator model. \nIt is invoked for each batch during the evaluation process before generation.\n\
    Pass it directly to the :code:`preprocess_fn` key in your eval config dictionary.\n\nThe system injects into this function\
    \ the batch data, as well as the RAG spec and \nthe prompt manager of an individual leaf config.\n\n\n.. py:function::\
    \ preprocess_fn(batch: dict[str, list], rag: RFLangChainRagSpec, prompt_manager: RFPromptManager) -> dict[str, list]\n\
    \n   :param batch: Dictionary with a batch of examples with dataset field names as keys and lists as values"
  - "RapidFire AI offers a browser-based dashboard to automatically visualize all ML metrics and lets \nyou control runs on\
    \ the fly from there. \nOur current default dashboard is a fork of the popular OSS tool `MLflow <https://mlflow.org/>`__,\
    \ \nand it inherits much of MLflow's native features.\nThe dashboard URI is printed when the rapidfireai server is started;\
    \ open it in a browser. \n\nAs of this writing, apart from MLflow, RapidFire AI also supports \n`TensorBoard  <https://www.tensorflow.org/tensorboard>`__\n\
    and `Trackio <https://huggingface.co/docs/trackio/en/index>`__\nfor logging metrics plots. \nSpecify any one, two, or\
    \ all three dashboards to use with the following server start argument. \n\n.. code-block:: bash\n\n   rapidfireai start\
    \ --tracking-backends [mlflow | tensorboard | trackio]\n\nAlternatively, set the dashboard using its environment variable\
    \ as below in your python code/notebook:\n\n.. code-block:: python\n\n   os.environ[\"RF_MLFLOW_ENABLED\"] = \"true\"\n\
    \   os.environ[\"RF_TENSORBOARD_ENABLED\"] = \"true\"\n   os.environ[\"RF_TRACKIO_ENABLED\"] = \"true\"\n\nSupport for\
    \ other popular dashboards such as Weights & Biases and CometML is coming soon. \nThe rest of this section explains the\
    \ new features of our MLflow-fork dashboard.\nNote that these new features are not yet available on the other dashboards."
- source_sentence: What RAG components and configuration knobs does the SciFact tutorial use for scientific claim verification?
  sentences:
  - "Clone-Modify\n----\n\nThis is a powerful IC Op that is applicable to any ongoing, stopped, or resumed run. \nIt allows\
    \ you to add \"clones\" of a chosen run, called the \"parent\" run, during a :func:`run_fit()`. \nThe IC Op panel displays\
    \ an editable text box with the full knob config dictionary of the parent. \n\nEdit any knobs, e.g., learning rate, LoRA\
    \ rank, or even base model as if you are injecting \nthat new run config from code, except this is done conveniently from\
    \ the metrics dashboard itself. \nAs of this writing, we only support providing a single config for this IC Op.\nSoon\
    \ we will support providing a config-group generator such as :code:`RFGridSearch()` or\n:code:`RFRandomSearch()` as well\
    \ in the IC Op panel itself akin to the launching code.\n\nYou can also **warm-start** a clone using its parent's weights\
    \ if you'd like. \nWarm-started clones inherit their parent's learning behavior so far and thus, they can reach better\
    \ \neval metrics faster. \nNote that warm starting is only allowed if the clones have *identical* neural architecture\
    \ as the \nparent, including LoRA adapters; otherwise, it will error out.\n\nWhen you are ready with your clone's config,\
    \ click \"Submit\" to execute this IC Op.\n\n\n.. raw:: html\n\n    <img src=\"_static/icop-clone2.png\" alt=\"IC Op Clone-Modify\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-clone.png\"\
    \ alt=\"IC Op Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\"\
    >\n\n\nClones will automatically appear on the plots from the next chunk onward; just refresh the page. \nRapidFire AI's\
    \ adaptive scheduler automatically reapportions GPUs across all runs, including clones.\nSo, do not need to worry about\
    \ manually splitting GPUs across models, juggling new processes, etc.\nClones are treated just like any other run; so,\
    \ you can clone that clone later with IC Ops again.\n\nYou can submit multiple Clone-Modify ops on the same run or different\
    \ runs whenever you want. \nThey will get queued up and all clones will start together at the next chunk boundary. \n\n\
    Clone-Modify combined with Stop enables you to turbocharge how you leverage your intuition about your \nAI use case, dataset,\
    \ models, and eval metrics to dramatically cut down time to reaching much better \neval metrics even within a single experiment."
  - "Port conflicts (services already running)\n----------------------------------------\n\nIf you encounter port conflicts,\
    \ you can kill existing processes.\n\n.. code-block:: bash\n\n   lsof -t -i:8852 | xargs kill -9  # mlflow\n   lsof -t\
    \ -i:8851 | xargs kill -9  # dispatcher\n   lsof -t -i:8853 | xargs kill -9  # frontend server\n\nSelect specific GPU(s)\
    \ to use\n-----------------------------\n\nSet the ``CUDA_VISIBLE_DEVICES`` environment variable BEFORE running ``rapidfireai\
    \ start`` to control which GPU(s) RapidFire can see and use.\n\n.. code-block:: bash\n\n   export CUDA_VISIBLE_DEVICES=2\
    \   # use GPU index 2 only\n   rapidfireai start\n\nMultiple GPUs (example: GPUs 0 and 2):\n\n.. code-block:: bash\n\n\
    \   export CUDA_VISIBLE_DEVICES=0,2\n   rapidfireai start\n\nFrom a Python script (set before importing/starting RapidFire):\n\
    \n.. code-block:: python\n\n   import os\n   os.environ[\"CUDA_VISIBLE_DEVICES\"] = \"2\"\n   # then start your RapidFire\
    \ workflow\n"
  - "This use case notebook features an all-closed model API workflow, with Open AI calls used for both embedding for generation.\
    \ So, you do not need a GPU to run this notebook.\n\n\nTask, Dataset, and Prompt\n-------\n\nThis tutorial shows Retrieval-Augmented\
    \ Generation (RAG) for verifying scientific claims against evidence.\n\nIt uses the \"SciFact\" dataset from the BEIR\
    \ benchmark; \n`see its details here <https://github.com/allenai/scifact>`__. \nThe dataset contains scientific claims\
    \ that must be labeled as SUPPORT, CONTRADICT, or NOINFO based on retrieved evidence.\n\nThe prompt format includes system\
    \ instructions defining the verification task with an example, \nretrieved evidence documents with titles, and the scientific\
    \ claim to verify.\n\n\nModel, RAG Components, and Configuration Knobs\n-------\n\nWe compare 2 generator models via OpenAI\
    \ API: gpt-5-mini and gpt-4o.\n\nThere are 2 different retrieval/search strategies: similarity search and maximum marginal\
    \ relevance (MMR).\n\nThe RAG pipeline uses:\n\n- **Embeddings**: OpenAI text-embedding-3-small.\n- **Vector Store**:\
    \ FAISS with CPU-based exact search, i.e., no ANN approximation.\n- **Chunking**: 512-token chunks with 32-token overlap\
    \ using recursive character splitting with tiktoken encoding.\n- **Retrieval**: Top-15 initial retrieval.\n- **Reranking**:\
    \ cross-encoder/ms-marco-MiniLM-L6-v2 with top-5 final documents.\n- **Document Template**: Custom template including\
    \ document titles with content.\n\nAll other knobs are fixed across all configs. Thus, there are a total of 4 combinations\
    \ launched \nwith a simple grid search: 2 generator models x 2 search strategies."
model-index: null
config:
  architectures:
  - BertModel
  model_type: bert
  tokenizer_config:
    cls_token: '[CLS]'
    mask_token: '[MASK]'
    pad_token: '[PAD]'
    sep_token: '[SEP]'
    unk_token: '[UNK]'
cardData:
  tags:
  - sentence-transformers
  - sentence-similarity
  - feature-extraction
