- source_sentence: What is the recommended approach if you run out of storage space while experimenting with many LLMs?
  sentences:
  - "Other Eval Config Knobs\n------\n\nFinally, apart from the Generator, the following knobs can also be included in your\
    \ eval config dictionary. Each of \nthese can also be a knob set generator, viz., :func:`List()` for a discrete and :func:`Range()`\
    \ for continuous knobs.\n\nFor more details on the four user-given functions listed below, see :doc:`the API: User-Provided\
    \ Functions for Run Evals page</evalsfunctions>`.\n\nFor more details on the semantics of the online aggregation strategy\
    \ arguments listed below, see :doc:`the Online Aggregation for Evals page</onlineagg>`.\n\n\n**batch_size** : int\n\t\
    Number of examples to process in one batch for GPU efficiency (if applicable)\n\n**preprocess_fn** : Callable\n\tUser-given\
    \ function to preprocess a batch of examples; an eval config's RagSpec and PromptManager are input by the system\n\n**postprocess_fn**\
    \ : Callable, optional\n\tUser-given function to postprocess a batch of examples and generations; a single cfg is passed\
    \ as input by the system\n\n**compute_metrics_fn** : Callable\n\tUser-given evaluation function to compute eval metrics\
    \ per batch\n\n**accumulate_metrics_fn** : Callable, optional\n\tUser-given evaluation function to aggregate algebraic\
    \ eval metrics across batches. If this is not given, all metrics provided in :code:`eval_compute_metrics_fn` will be assumed\
    \ to be distributive by default.\n\n**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online\
    \ aggregation strategy. The dictionary must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must\
    \ be :code:`\"normal\"`, :code:`\"wilson\"`, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence\
    \ level for confidence intervals on metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool)\
    \ - Whether to apply finite population correction. Default is :code:`True`."
  - "Follow these steps to install RapidFire AI on your local machine or remote/cloud instance for complete functionality\
    \ without limitations.\n\n\nStep 1: Install dependencies and package\n-----------------------\n\nObtain the RapidFire\
    \ AI OSS package from pypi (includes all dependencies) and ensure it is installed correctly.\n\n.. important::\n\n  Requires\
    \ Python 3.12+. Ensure that ``python3`` resolves to Python 3.12 before creating the venv.\n\n.. code-block:: bash\n\n\
    \   python3 --version  # must be 3.12.x\n   python3 -m venv .venv\n   source .venv/bin/activate\n\n   pip install rapidfireai\n\
    \n   rapidfireai --version\n   # Verify it prints the following:\n   # RapidFire AI 0.14.0\n\nProvide your Hugging Face\
    \ account token to access the gated Llama and Mistral models \nshowcased in the tutorial notebooks. \nIf you do not have\
    \ such a token, you have two options:\n\n* Switch the :code:`model_name` in the tutorial notebook to a non-gated model\
    \ from Hugging Face. Then proceed to Step 2.\n\n* Create a Hugging Face token `as explained here <https://huggingface.co/docs/hub/en/security-tokens>`_.\
    \ Then request access on the following gated models' Hugging Face pages:\n\n  * `mistralai/Mistral-7B-Instruct-v0.3 <https://huggingface.co/mistralai/Mistral-7B-Instruct-v0.3>`_\n\
    \  * `meta-llama/Llama-3.1-8B-Instruct <https://huggingface.co/meta-llama/Llama-3.1-8B-Instruct>`_\n  * `meta-llama/Llama-3.2-1B-Instruct\
    \ <https://huggingface.co/meta-llama/Llama-3.2-1B-Instruct>`_\n  \n  Headsup: the approval for the Llama models may take\
    \ a few hours. Then provide your HF token in the same venv.\n\n.. code-block:: bash\n\n   source .venv/bin/activate\n\
    \   pip install \"huggingface-hub[cli]\"\n\n   # Replace YOUR_TOKEN with your actual HF token\n   # https://huggingface.co/docs/hub/en/security-tokens\n\
    \   hf auth login --token YOUR_TOKEN\n\n   # Due to current issue: https://github.com/huggingface/xet-core/issues/527\n\
    \   pip uninstall -y hf-xet\n\n\nFeel free to ask us on Discord if you need any help with accessing gated Hugging Face\
    \ models. Unfortunately, we are not allowed to provide a publicly visible token here for your use due to Hugging Face's\
    \ policies."
  - "When using only closed model APIs such as OpenAI, RapidFire AI's scheduler automatically \noptimizes how CPU cores and\
    \ the token rate limits are apportioned across configs. \nThis will help avoid wastage of token spend on unproductive\
    \ RAG configs and help you \nredirect the spend to more productive RAG configs in real time."
- source_sentence: What is the difference between distributive and algebraic metrics in RapidFire AI's online aggregation
    for evals?
  sentences:
  - "This use case notebook features an all-closed model API workflow, with Open AI calls used for both embedding for generation.\
    \ So, you do not need a GPU to run this notebook.\n\n\nTask, Dataset, and Prompt\n-------\n\nThis tutorial shows Retrieval-Augmented\
    \ Generation (RAG) for verifying scientific claims against evidence.\n\nIt uses the \"SciFact\" dataset from the BEIR\
    \ benchmark; \n`see its details here <https://github.com/allenai/scifact>`__. \nThe dataset contains scientific claims\
    \ that must be labeled as SUPPORT, CONTRADICT, or NOINFO based on retrieved evidence.\n\nThe prompt format includes system\
    \ instructions defining the verification task with an example, \nretrieved evidence documents with titles, and the scientific\
    \ claim to verify.\n\n\nModel, RAG Components, and Configuration Knobs\n-------\n\nWe compare 2 generator models via OpenAI\
    \ API: gpt-5-mini and gpt-4o.\n\nThere are 2 different retrieval/search strategies: similarity search and maximum marginal\
    \ relevance (MMR).\n\nThe RAG pipeline uses:\n\n- **Embeddings**: OpenAI text-embedding-3-small.\n- **Vector Store**:\
    \ FAISS with CPU-based exact search, i.e., no ANN approximation.\n- **Chunking**: 512-token chunks with 32-token overlap\
    \ using recursive character splitting with tiktoken encoding.\n- **Retrieval**: Top-15 initial retrieval.\n- **Reranking**:\
    \ cross-encoder/ms-marco-MiniLM-L6-v2 with top-5 final documents.\n- **Document Template**: Custom template including\
    \ document titles with content.\n\nAll other knobs are fixed across all configs. Thus, there are a total of 4 combinations\
    \ launched \nwith a simple grid search: 2 generator models x 2 search strategies."
  - "Types of Metrics\n-----------------------\n\nWe support 2 types of metrics based on their aggregation semantics: \n\n\
    * **Distributive Metrics:** These are purely additive over a given set of data points. \n  \n  Examples: *count* of number\
    \ of correct predictions; *sum* of output token lengths across queries.\n\n* **Algebraic Metrics:** These are averages\
    \ or proportions over a given set of data points. They can be decomposed into components that are individually distributive.\
    \ \n  \n  Examples: *precision*, which counts number of correct predictions and total number of data points separately\
    \ and then divides them; *mean rouge-1*, which averages per-example rouge-1 values that assesses overlap of tokens between\
    \ generated text and ground truth text.\n\nWhen you define an eval metric via :func:`evals.compute_metrics_fn()` and :func:`evals.accumulate_metrics_fn()`,\
    \ \nyou must specify their type (algebraic or distributive) and value range as illustrated below. \nFor metrics without\
    \ a type defined, they will be displayed *as is*, i.e., without projected \nestimates or confidence intervals."
  - "Multi-GPU Model Partitioning with FSDP\n-------\n\nRapidFire AI supports automated large model partitioning across GPUs\
    \ (on the same machine) via PyTorch's native FSDP. \nProvide the relevant FSDP deatils in a config knob, optionally along\
    \ with the number of GPUs to use for that run. \nThe following notebooks showcase the use of FSDP for SFT with the corresponding\
    \ LLMs:\n\n* FSDP Lite with base model TinyLlama-1.1B-Chat-v1.0. Needs at least 2x A10 GPUs or equivalent (48 GB total\
    \ HBM) to work. `View on GitHub <https://github.com/RapidFireAI/rapidfireai/blob/main/tutorial_notebooks/fine-tuning/rf-tutorial-sft-chatqa-fsdp-lite.ipynb>`__\n\
    \n* FSDP Regular with base model Qwen3-32B. Needs at least 4x A10 GPUs or equivalent (96 GB total HBM) to work. `View\
    \ on GitHub <https://github.com/RapidFireAI/rapidfireai/blob/main/tutorial_notebooks/fine-tuning/rf-tutorial-sft-chatqa.ipynb>`__\n\
    \n* FSDP Large with base model Llama-3-70B-Instruct. Needs at least 8x A10 GPUs or equivalent (192 GB total HBM) to work.\
    \ `View on GitHub <https://github.com/RapidFireAI/rapidfireai/blob/main/tutorial_notebooks/fine-tuning/rf-tutorial-sft-chatqa-fsdp-large.ipynb>`__\n\
    \n.. important::\n  Although the above FSDP tutorial notebooks can work on cheap A10 GPUs, we highly recommend using at\
    \ least A100s or later GPUs with NVLink support for reasonable runtimes.\n"
- source_sentence: What three vector store backends does RapidFire AI support and what modes of operation do they offer?
  sentences:
  - "RapidFire AI also supports external persistent vector stores beyond the default in-memory FAISS.\nThis allows you to\
    \ scale to larger corpora, persist indexes across runs and experiments, and leverage managed vector DBMS services.\nAs\
    \ of this writing, **Pinecone** (hosted serverless or pod-based) and **PostgreSQL PGVector** (self-hosted or managed)\
    \ are supported.\n\nEach external store supports three modes of operation:\n\n- **Create mode:** Build a new index from\
    \ base documents from within RapidFire AI itself and use it for RAG.\n- **Read mode:** Retrieve from a pre-existing index\
    \ and use it for RAG. \n- **Update mode:** Add new content to an existing index from additional base documents from within\
    \ RapidFire AI itself and use it for RAG. \n\nSee the :doc:`API: LangChain RAG Spec page</ragspecs>` for more details\
    \ on how to specify these external vector stores."
  - "RapidFire AI offers a browser-based dashboard to automatically visualize all ML metrics and lets \nyou control runs on\
    \ the fly from there. \nOur current default dashboard is a fork of the popular OSS tool `MLflow <https://mlflow.org/>`__,\
    \ \nand it inherits much of MLflow's native features.\nThe dashboard URI is printed when the rapidfireai server is started;\
    \ open it in a browser. \n\nAs of this writing, apart from MLflow, RapidFire AI also supports \n`TensorBoard  <https://www.tensorflow.org/tensorboard>`__\n\
    and `Trackio <https://huggingface.co/docs/trackio/en/index>`__\nfor logging metrics plots. \nSpecify any one, two, or\
    \ all three dashboards to use with the following server start argument. \n\n.. code-block:: bash\n\n   rapidfireai start\
    \ --tracking-backends [mlflow | tensorboard | trackio]\n\nAlternatively, set the dashboard using its environment variable\
    \ as below in your python code/notebook:\n\n.. code-block:: python\n\n   os.environ[\"RF_MLFLOW_ENABLED\"] = \"true\"\n\
    \   os.environ[\"RF_TENSORBOARD_ENABLED\"] = \"true\"\n   os.environ[\"RF_TRACKIO_ENABLED\"] = \"true\"\n\nSupport for\
    \ other popular dashboards such as Weights & Biases and CometML is coming soon. \nThe rest of this section explains the\
    \ new features of our MLflow-fork dashboard.\nNote that these new features are not yet available on the other dashboards."
  - ".. py:function:: __init__(self, experiment_name: str, mode: str = \"fit\", experiments_path: str = \"./rapidfire_experiments\"\
    ) -> None\n\n\t:param experiment_name: Unique name for this experiment\n\t:type experiment_name: str\n\t\n\t:param mode:\
    \ Mode of this experiment, either :code:`\"fit\"` or :code:`\"eval\"`; default is :code:`\"fit\"`\n\t:type mode: str\n\
    \t\n\t:param experiments_path: Path to a folder to store this experiment's artifacts. Default is ``\"./rapidfire_experiments\"\
    ``)\n\t:type experiments_path: str, optional \n\n\t:return: None\n\t:rtype: None"
