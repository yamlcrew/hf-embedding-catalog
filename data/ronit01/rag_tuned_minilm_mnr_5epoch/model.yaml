  - loss:MultipleNegativesRankingLoss
  base_model: sentence-transformers/all-MiniLM-L6-v2
  widget:
  - source_sentence: How does RapidFire AI's adaptive execution engine differ from traditional sequential execution for multi-config
      experiments?
    sentences:
    - "Why Not Just Downsample?\n------------------------\n\nOne might wonder why downsampling the eval set does not suffice\
      \ here. \n:doc:`As also explained on this page</difference>`, downsampling alone has \nsignificant disadvantages compared\
      \ to the approach offered by RapidFire AI. \n\nFirst, you have to decide a downsample size upfront, which is not trivial\
      \ if your\neval metrics have high variance across examples. Point estimates without confidence \nintervals can give\
      \ false confidence in a sample. You can resample manually \nover and over, but that adds manual grunt work of juggling\
      \ separate samples/files. \nFinally, downsampling alone does not offer you the power of IC Ops and automated \nparallelization\
      \ to try new configs on the fly--you'd have reimplement those manually.\n\nRapidFire AI's online aggregation approach\
      \ with IC Ops avoids all the above issues,\nwhile also being **complementary** to downsampling, i.e., you can use both\
      \ in \nconjunction for even lower runtimes/costs."
    - "The crux of RapidFire AI's difference is in its *adaptive execution engine*: it enables \"interruptible\"\nexecution\
      \ of configurations across GPUs/CPUs. To do so, it first shards the training and/or evaluation \ndataset randomly into\
      \ \"chunks\" (also called \"shards\").\nThen instead of waiting for a run to see the whole dataset for all epochs (for\
      \ SFT/RFT) or for full \neval metrics calculation (for RAG evals), RapidFire AI schedules all runs on *one shard at\
      \ a time*, \nand then cycles through all shards.\n\nSuppose you have only 1 GPU, say an A100 or H100, and you want to\
      \ run SFT on a Llama model. \nCurrent tools force you to run one config after another *sequentially* as shown in the\
      \ (simplified) illustration below. \nIn contrast, by operating on shards, RapidFire AI offers a far more concurrent\
      \ learning experience by \nautomatically *swapping* adapters (and base models, if needed) across GPU(s) and DRAM. \n\
      It does this via efficient shared memory-based caching mechanisms that can spill to disk when needed.\n\n.. image::\
      \ /images/gantt-1gpu.png\n   :width: 800px\n\nIn the above figure, all 3 model configs are shown for 1 epoch. RapidFire\
      \ AI is set to use 4 chunks.\nSo, before model config 3 (M3) even starts in the sequential approach, RapidFire AI already\
      \ shows you \nthe learning behaviors of all 3 configs on the first 2-3 chunks. \nThe overhead of swapping, represented\
      \ by the thin gray box, is minimal, less than 5% of the runtime,\nas per our measurements--thanks to our new efficient\
      \ memory management techniques.\n\nFor inference evals for RAG/context engineering, such sharded execution means RapidFire\
      \ AI surfaces eval metrics \nsooner based on a statistical technique known as *online aggregation* from the database\
      \ systems literature.\nBasically, see estimated values and confidence intervals for all eval metrics in real time as\
      \ the shards \nget processed, ultimately converging to the exact metrics on the full dataset."
    - "Delete\n----\n\nThis IC Op earmarks the run to be deleted from the next chunk onward. \nOn the chart, you will see\
      \ its curves vanish almost immediately. \nYou cannot do any further IC Ops on a deleted run because it will not be visible.\
      \ \nNote that although a deleted run vanishes from the plots, its model checkpoints are still part of \nthe artifacts\
      \ of that experiment so that you have post-hoc audibility.\n"
  - source_sentence: How does RFPromptManager select few-shot examples for each input query?
    sentences:
    - "This class wraps around some LangChain APIs to manage dynamic few-shot example selection. It provides semantic \nsimilarity-based\
      \ example selection to construct prompts with the most relevant examples for each input query.\n\nThe individual arguments\
      \ (knobs) can be :class:`List` valued or :class:`Range` valued in an :class:`RFPromptManager`. \nThat is how you can\
      \ specify a base set of knob combinations from which a config group can be produced. \nAlso read :doc:`the Multi-Config\
      \ Specification page</configs>`.\n\n.. py:class:: RFPromptManager\n\n  :param instructions: The main instructions for\
      \ the prompt that guide the generator's behavior. This sets the overall task description and role for the assistant.\
      \ Either this or :code:`instructions_file_path` must be provided.\n  :type instructions: str, optional\n\n  :param instructions_file_path:\
      \ Path to a file containing the instructions. Use this as an alternative to the :code:`instructions` parameter for loading\
      \ instructions from a file, say, if they are very long.\n  :type instructions_file_path: str, optional\n\n  :param examples:\
      \ A list of example dictionaries for few-shot learning. Each example should be a dictionary with keys matching the expected\
      \ input-output format (e.g., \"question\" and \"answer\").\n  :type examples: list[dict[str, str]], optional\n\n\n \
      \ :param embedding_cfg: The embedding class and its kwargs to use for computing semantic similarity between examples\
      \ and queries, provided as a single dictionary. Must include a key :code:`\"class\"` with the class itself as value,\
      \ not an instance. Options for the class include :class:`HuggingFaceEmbeddings` and :class:`OpenAIEmbeddings`. The kwargs\
      \ that follow must contain all parameters needed to initialize the embedding class; required parameters vary by embedding\
      \ class. For example, :class:`HuggingFaceEmbeddings` needs :code:`model_name`, :code:`model_kwargs` and :code:`device`,\
      \ while :class:`OpenAIEmbeddings` needs :code:`\"model\"` and :code:`\"api_key\"`.\n  :type embedding_cfg: dict[str,\
      \ Any], optional\n\n\n  :param example_selector_cls: The example selector class that determines how to choose relevant\
      \ examples based on the input query. Must be either :code:`SemanticSimilarityExampleSelector` or :code:`MaxMarginalRelevanceExampleSelector`\
      \ (for diversity) from LangChain.\n  :type example_selector_cls: type[MaxMarginalRelevanceExampleSelector | SemanticSimilarityExampleSelector],\
      \ optional\n\n  :param example_prompt_template: A LangChain :code:`PromptTemplate` that defines how to format each example.\
      \ Should specify :code:`input_variables` and a :code:`template` string with placeholders matching the keys in the examples\
      \ dictionaries.\n  :type example_prompt_template: PromptTemplate, optional\n\n  :param k: Number of most similar or\
      \ diverse examples to retrieve and include in the prompt for each query. Default is 3.\n  :type k: int, optional"
    - "We currently support two common config group generators: :func:`RFGridSearch()` for grid search \nand :func:`RFRandomSearch()`\
      \ for random search. \n\nMore support for AutoML heuristics such as SHA, HyperOpt, as well as an integration with \n\
      the popular AutoML library Optuna are coming soon. \nLikewise for RAG/context engineering, we also plan to support the\
      \ AutoML heuristic syftr.\n\n\n.. py:function:: RFGridSearch(configs: Dict[str, Any] | List[Dict[str, Any]], trainer_type:\
      \ str = \"SFT\" | \"DPO\" | \"GRPO\" | None)\n\n\t:param configs: A config dictionary with :func:`List()` for at least\
      \ one knob; can be a list of such config dictionaries too.\n\t:type configs: Dict[str, Any] | List[Dict[str, Any]]\n\
      \n\t:param trainer_type: The fine-tuning/post-training control flow to use: \"SFT\", \"DPO\", or \"GRPO\". Skip this\
      \ argument for :func:`run_evals()`.\n\t:type trainer_type: str, optional \n\n\n.. py:function:: RFRandomSearch(configs:\
      \ Dict[str, Any], trainer_type: str = \"SFT\" | \"DPO\" | \"GRPO\" | None, num_runs: int, seed: int = 42)\n\n\t:param\
      \ configs: A config dictionary with :func:`List()` or :func:`Range()` for at least one knob.\n\t:type configs: Dict[str,\
      \ Any]\n\n\t:param trainer_type: The fine-tuning/post-training control flow to use: \"SFT\", \"DPO\", or \"GRPO\". Skip\
      \ this argument for :func:`run_evals()`.\n\t:type trainer_type: str, optional\n\n\t:param num_runs: Number of runs (full\
      \ combinations of knob values) to sample in total.\n\t:type num_runs: int\n\n\t:param seed: Seed for random sampling\
      \ of knob values to construct combinations. Default is 42.\n\t:type seed: int, optional \n\n\n**Notes:**\n\nFor :func:`RFGridSearch()`,\
      \ each knob can have either a single value or a :func:`List()` of values but no knob \nshould have :func:`Range()` of\
      \ values; otherwise, it will error out.\n\nFor :func:`RFRandomSearch()`, each knob can have either a single value, or\
      \ a :func:`List()` of values, or a \n :func:`Range()` of values. The semantics of sampling are independently-identically-distributed\
      \ (IID), i.e.,\nwe uniformly randomly pick a value from each discrete set and from each continuous set to construct\
      \ the \nknob combination for one run. \nThen we repeat that sampling process in an IID way to accumulate :code:`num_runs`\
      \ distinct combinations.\n\nNote that the return types of the config group generators are internal to RapidFire AI and\
      \ they are usable only \nwithin the context of :func:`run_fit()` or :func:`run_evals()` in the :class:`Experiment` class."
    - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
      \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"\
      wilson\"`, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals\
      \ on metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
      \ correction. Default is :code:`True`."
  - source_sentence: How does the Finite Population Correction (FPC) factor work in RapidFire AI's online aggregation for
      evals, and why is it relevant given how data points are assigned to shards?
    sentences:
    - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
      \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"\
      wilson\"`, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals\
      \ on metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
      \ correction. Default is :code:`True`."
    - "Create Model Function\n------\n\nMandatory user-provided function to create HuggingFace model and tokenizer objects\
      \ based on the  \nmodel type(s) and name(s) given in the :code:`RFModelConfig` and multi-config specification. \nAlso\
      \ read :doc:`the LoRA and Model Configs page</models>`.\nA model can be imported from the Hugging Face model hub or\
      \ read from a local checkpoint file. \n\nIt is passed to :func:`run_fit()` directly. Also read :doc:`the Experiment\
      \ page</experiment>`.\n\nThis function is invoked when a trainer object is created for each run. \n\n\n.. py:function::\
      \ create_model_fn(model_config: Dict[str, Any]) -> Tuple[transformers.PreTrainedModel, transformers.PreTrainedTokenizer]\n\
      \n  :param model_config: Dictionary injected by RapidFire AI into this user-defined function with all key-value pairs\
      \ for one model config output by the config-group generator.\n  :type model_config: Dict[str, Any]\n\n  :return: Tuple\
      \ containing the initialized Hugging Face model (e.g., ``AutoModelForCausalLM``, ``AutoModelForSequenceClassification``)\
      \ and tokenizer (e.g., ``AutoTokenizer``, ``PreTrainedTokenizer``) objects\n  :rtype: Tuple[transformers.PreTrainedModel,\
      \ transformers.PreTrainedTokenizer]\n\n\n**Example:**\n\n.. code-block:: python\n\n\t# From the SFT tutorial notebook\n\
      \tdef sample_create_model(model_config):\n    \t\"\"\"Function to create model object for any given config; must return\
      \ tuple of (model, tokenizer)\"\"\"\n\t\tfrom transformers import AutoModelForCausalLM, AutoTokenizer, AutoModelForSeq2SeqLM,\
      \ AutoModelForMaskedLM\n\t\t\n\t\tmodel_name = model_config[\"model_name\"]\n\t\tmodel_type = model_config[\"model_type\"\
      ]\n\t\tmodel_kwargs = model_config[\"model_kwargs\"]\n\t\t\n\t\tif model_type == \"causal_lm\":\n\t\t\tmodel = AutoModelForCausalLM.from_pretrained(model_name,\
      \ **model_kwargs)\n\t\telif model_type == \"seq2seq_lm\":\n\t\t\tmodel = AutoModelForSeq2SeqLM.from_pretrained(model_name,\
      \ **model_kwargs)\n\t\telif model_type == \"masked_lm\":\n\t\t\tmodel = AutoModelForMaskedLM.from_pretrained(model_name,\
      \ **model_kwargs)\n\t\telif model_type == \"custom\":\n            # Handle custom model loading logic, e.g., loading\
      \ your own checkpoints\n            # model = ... \n\t\t\tpass\n\t\telse:\n\t\t\t# Default to causal LM\n\t\t\tmodel\
      \ = AutoModelForCausalLM.from_pretrained(model_name, **model_kwargs)\n\n\t\ttokenizer = AutoTokenizer.from_pretrained(model_name)\n\
      \n\t\treturn (model,tokenizer)"
    - "The crux of RapidFire AI's difference is in its *adaptive execution engine*: it enables \"interruptible\"\nexecution\
      \ of configurations across GPUs/CPUs. To do so, it first shards the training and/or evaluation \ndataset randomly into\
      \ \"chunks\" (also called \"shards\").\nThen instead of waiting for a run to see the whole dataset for all epochs (for\
      \ SFT/RFT) or for full \neval metrics calculation (for RAG evals), RapidFire AI schedules all runs on *one shard at\
      \ a time*, \nand then cycles through all shards.\n\nSuppose you have only 1 GPU, say an A100 or H100, and you want to\
      \ run SFT on a Llama model. \nCurrent tools force you to run one config after another *sequentially* as shown in the\
      \ (simplified) illustration below. \nIn contrast, by operating on shards, RapidFire AI offers a far more concurrent\
      \ learning experience by \nautomatically *swapping* adapters (and base models, if needed) across GPU(s) and DRAM. \n\
      It does this via efficient shared memory-based caching mechanisms that can spill to disk when needed.\n\n.. image::\
      \ /images/gantt-1gpu.png\n   :width: 800px\n\nIn the above figure, all 3 model configs are shown for 1 epoch. RapidFire\
      \ AI is set to use 4 chunks.\nSo, before model config 3 (M3) even starts in the sequential approach, RapidFire AI already\
      \ shows you \nthe learning behaviors of all 3 configs on the first 2-3 chunks. \nThe overhead of swapping, represented\
      \ by the thin gray box, is minimal, less than 5% of the runtime,\nas per our measurements--thanks to our new efficient\
      \ memory management techniques.\n\nFor inference evals for RAG/context engineering, such sharded execution means RapidFire\
      \ AI surfaces eval metrics \nsooner based on a statistical technique known as *online aggregation* from the database\
      \ systems literature.\nBasically, see estimated values and confidence intervals for all eval metrics in real time as\
      \ the shards \nget processed, ultimately converging to the exact metrics on the full dataset."
  - source_sentence: What are the two knob set generators currently supported by RapidFire AI for creating multi-config specifications?
    sentences:
    - "RFModelConfig \n------\n\nThis is a core class in the RapidFire AI API that abstracts multiple Hugging Face APIs under\
      \ the \nhood to simplify and unify all model-related specifications. In particular, it unifies model \nloading, training\
      \ configurations, and LoRA settings into one class. \n\nIt gives you flexibility to try out variations of LoRA adapter\
      \ structures, training arguments for \nmultiple control flows (SFT, DPO, and GRPO), formatting and metrics functions,\
      \ and generation specifics. \n\nSome of the arguments (knobs) here can also be :class:`List` valued or :class:`Range`\
      \ valued depending \non its data type, as explained below. All this helps form the base set of knob combinations from\
      \ which \na config group can be produced. Also read :doc:`the Multi-Config Specification page</configs>`.\n\n\n.. py:class::\
      \ RFModelConfig\n\n  :param model_name: Model identifier for use with Hugging Face's :code:`AutoModel.from_pretrained()`.\
      \ Can be a Hugging Face model hub name (e.g., ``\"Qwen/Qwen2.5-7B-Instruct\"``) or local path to a checkpoint.\n  :type\
      \ model_name: str\n\n  :param tokenizer: Hugging Face Tokenizer identifier, typically same as :code:`model_name` string\
      \ but can be different.\n  :type tokenizer: str, optional\n\n  :param tokenizer_kwargs: Additional keyword arguments\
      \ passed to tokenizer's :code:`from_pretrained()` method (e.g., :code:`padding_side`, :code:`truncation`, and :code:`model_max_length`).\n\
      \  :type tokenizer_kwargs: Dict[str, Any], optional\n\n  :param formatting_func: Custom user-given data preprocessing\
      \ function for preparing a single example with system prompt, roles, etc. Can be a :class:`List` for multi-config.\n\
      \  :type formatting_func: Callable | :class:`List` of Callable, optional\n\n  :param compute_metrics: Custom user-given\
      \ evaluation function passed to Hugging Face's :code:`Trainer.compute_metrics` for use during evaluation phases. Can\
      \ be a :class:`List` for multi-config.\n  :type compute_metrics: Callable | :class:`List` of Callable, optional\n\n\
      \  :param peft_config: RFLoraConfig as described above; thin wrapper around :code:`peft.LoraConfig` for LoRA fine-tuning.\
      \ Can be a :class:`List` for multi-config.\n  :type peft_config: RFLoraConfig | :class:`List` of RFLoraConfig, optional\n\
      \n  :param training_args: RF trainer configuration object specifying the training flow and its parameters. Also read\
      \ :doc:`the Trainer Configs page</trainers>`.\n  :type training_args: :class:`RFSFTConfig`  | :class:`RFDPOConfig` \
      \ | :class:`RFGRPOConfig`\n\n  :param model_type: Custom user-defined string to identify model type inside your :code:`create_model_fn()`\
      \ given to :func:`run_fit()`; default: ``\"causal_lm\"``\n  :type model_type: str, optional\n\n  :param model_kwargs:\
      \ Additional parameters for model initialization, passed to :code:`AutoModel.from_pretrained()` (e.g., :code:`torch_dtype`,\
      \ :code:`device_map`, :code:`trust_remote_code`).\n  :type model_kwargs: Dict[str, Any], optional\n\n  :param ref_model_name:\
      \ For DPO and GRPO only; akin to :code:`model_name` above but for the frozen reference model.\n  :type ref_model_name:\
      \ str, optional\n\n  :param ref_model_type: For DPO and GRPO only; akin :code:`model_type` above but for the frozen\
      \ reference model.\n  :type ref_model_type: str, optional\n\n  :param ref_model_kwargs: For DPO and GRPO only; akin\
      \ :code:`model_kwargs` above but for the frozen reference model.\n  :type ref_model_kwargs: Dict[str, Any], optional\n\
      \n  :param reward_funcs: Reward functions for evaluating generated outputs during training (mainly for GRPO but can\
      \ be used for DPO too). Can be a :class:`List` for multi-config.\n  :type reward_funcs: Callable | [Callable] | :class:`List`\
      \ of Callable | :class:`List` of [Callable], optional\n\n  :param generation_config: Arguments for text generation passed\
      \ to :code:`model.generate()` (e.g., :code:`max_new_tokens`, :code:`temperature`, :code:`top_p`).\n  :type generation_config:\
      \ Dict[str, Any], optional\n\n  :param num_gpus: Number of GPUs to use for each run/config produced from this :code:`RFModelConfig`.\
      \ Can skip this and specify :code:`num_gpus` in :func:`run_fit()` if all runs must use same number of GPUs.\n  :type\
      \ num_gpus: int, optional\n\n  .. seealso::\n     - :doc:`Hugging Face Transformers documentation <https://huggingface.co/docs/transformers/>`\n\
      \     - :doc:`Hugging Face PEFT library documentation <https://huggingface.co/docs/peft/>`\n     - :class:`RFSFTConfig`,\
      \ :class:`RFDPOConfig`, :class:`RFGRPOConfig` for training argument configurations\n\n\n**Examples:**\n\n.. code-block::\
      \ python\n\n    # Based on the SFT tutorial notebook\n    RFModelConfig(\n        model_name=\"meta-llama/Llama-3.1-8B-Instruct\"\
      ,\n        peft_config=rfloraconfig1,\n        training_args=rfsftconfig1,\n        model_type=\"causal_lm\",\n    \
      \    model_kwargs={\"device_map\": \"auto\", \"torch_dtype\": \"auto\",\"use_cache\":False},\n        formatting_func=sample_formatting_function,\n\
      \        compute_metrics=sample_compute_metrics, \n        generation_config = {\n            \"max_new_tokens\": 256,\
      \ \"temperature\": 0.6, \"top_p\": 0.9, \n            \"top_k\": 40, \"repetition_penalty\": 1.18,\n        }\n    )\n\
      \n    # Based on the GRPO tutorial notebook\n    RFModelConfig(\n        model_name=\"Qwen/Qwen2.5-7B-Instruct\",\n\
      \        peft_config=rfloraconfig,\n        training_args=rfgrpoconfig1,\n        formatting_func=sample_formatting_function,\n\
      \        reward_funcs=reward_funcs,\n        model_kwargs={\"load_in_4bit\": True, \"device_map\": \"auto\", \"torch_dtype\"\
      : \"auto\", \"use_cache\": False},\n        tokenizer_kwargs={\"model_max_length\": 2048, \"padding_side\": \"left\"\
      , \"truncation\": True}\n    )\n\n**Notes:**\n\nNote that one :class:`RFModelConfig` object can have only one base model\
      \ configuration and \none training control flow arguments dictionary. \nBut you can specify a :class:`List` of PEFT\
      \ configs, formatting functions, eval metrics \nfunctions, and reward functions list as part of your multi-config specification.\n"
    - "Why Not Just Downsample Data?\n------------\n\nAt first glance, one might consider running multi-config comparisons\
      \ by downsampling data for \nquick estimates, then running promising configs on full data. While common, this approach\
      \ is \noften misleading and cumbersome.\n\nA single downsample introduces variance from one static snapshot, potentially\
      \ leading to wrong \nconclusions, especially with overfitting-prone LLMs/DL models. It requires manual checkpoint \n\
      management, adding tedious file work. You also do not get dynamic control (stop, resume, clone-modify),\nor you must\
      \ reimplement such tricky operations, taking time away from your AI application work.\n\nRapidFire AI takes such practical\
      \ heuristics to their logical conclusion with shard-based \nadaptive multi-config execution with dynamic experiment\
      \ control. This offers you maximum power \nand flexibility for AI development without extra DevOps grunt work, i.e.,\
      \ *rapid experimentation*.\n\nThe above said, note that downsampling is *complementary* to rapid experimentation--feel\
      \ free \ndo both! The adaptive execution can operate on your downsampled dataset all the same."
    - "We currently support two common knob set generators: :func:`List()` for a discrete \nset of values and :func:`Range()`\
      \ for sampling from a continuous value interval.\n\n\n.. py:function:: List(values: List[Any])\n\n\t:param values: List\
      \ of discrete values for a knob; all values must be the same python data type.\n\t:type values: List[Any]\n\n\n.. py:function::\
      \ Range(start: int | float, end: int | float, dtype: str = \"int\" | \"float\")\n\n\t:param start: Lower bound of range\
      \ interval.\n\t:type start: int | float\n\n\t:param end: Upper bound of range interval.\n\t:type end: int | float\n\n\
      \t:param dtype: Data type of value to be sampled, either :code:`\"int\"` or :code:`\"float\"`.\n\t:type dtype: str\n\
      \n\n**Notes:**\n\nAs of this writing, :func:`Range()` performs uniform sampling within the given interval. \nWe plan\
      \ to continue expanding this API and add more functionality on this front based on feedback."
  - source_sentence: How do you install and initialize RapidFire AI for fine-tuning workflows, and what steps are required
      to access gated Hugging Face models?
    sentences:
    - "Clone-Modify\n----\n\nThis is a powerful IC Op that is applicable to any ongoing, stopped, or resumed run. \nIt allows\
      \ you to add \"clones\" of a chosen run, called the \"parent\" run, during a :func:`run_fit()`. \nThe IC Op panel displays\
      \ an editable text box with the full knob config dictionary of the parent. \n\nEdit any knobs, e.g., learning rate,\
      \ LoRA rank, or even base model as if you are injecting \nthat new run config from code, except this is done conveniently\
      \ from the metrics dashboard itself. \nAs of this writing, we only support providing a single config for this IC Op.\n\
      Soon we will support providing a config-group generator such as :code:`RFGridSearch()` or\n:code:`RFRandomSearch()`\
      \ as well in the IC Op panel itself akin to the launching code.\n\nYou can also **warm-start** a clone using its parent's\
      \ weights if you'd like. \nWarm-started clones inherit their parent's learning behavior so far and thus, they can reach\
      \ better \neval metrics faster. \nNote that warm starting is only allowed if the clones have *identical* neural architecture\
      \ as the \nparent, including LoRA adapters; otherwise, it will error out.\n\nWhen you are ready with your clone's config,\
      \ click \"Submit\" to execute this IC Op.\n\n\n.. raw:: html\n\n    <img src=\"_static/icop-clone2.png\" alt=\"IC Op\
      \ Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n  \
      \  <img src=\"_static/icop-clone.png\" alt=\"IC Op Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\"\
      \ onclick=\"this.requestFullscreen()\">\n\n\nClones will automatically appear on the plots from the next chunk onward;\
      \ just refresh the page. \nRapidFire AI's adaptive scheduler automatically reapportions GPUs across all runs, including\
      \ clones.\nSo, do not need to worry about manually splitting GPUs across models, juggling new processes, etc.\nClones\
      \ are treated just like any other run; so, you can clone that clone later with IC Ops again.\n\nYou can submit multiple\
      \ Clone-Modify ops on the same run or different runs whenever you want. \nThey will get queued up and all clones will\
      \ start together at the next chunk boundary. \n\nClone-Modify combined with Stop enables you to turbocharge how you\
      \ leverage your intuition about your \nAI use case, dataset, models, and eval metrics to dramatically cut down time\
      \ to reaching much better \neval metrics even within a single experiment."
    - "\nRapidFire AI transforms the status quo by adapting the powerful idea of **online aggregation** \nfrom database systems\
      \ research to LLM evals. \nOur adaptive execution engine, :doc:`as described on this page</difference>`, automatically\
      \ \nshards the data and processes multiple configs in parallel, one shard at a time, with \nefficient swapping techniques.\n\
      \nThis means you get **running metric estimates with confidence intervals** in real time. \nSo, you can confidently\
      \ stop poor configs earlier, clone better configs on the fly, and \nperform more informed exploration to reach much\
      \ better eval metrics in much less time.\n\n\nExample: Traditional Batch Evals vs. RapidFire AI\n-------\n\nFor instance,\
      \ suppose you have an evals set with 400 queries. You decide to compare, say, \n4 RAG configs in one go with RapidFire\
      \ AI with number of shards set to 8. The illustration\nbelow contrasts traditional batch evals vs. RapidFire AI's approach\
      \ for a simple eval metric.\n\n.. list-table::\n   :widths: 50 50\n   :class: side-by-side\n\n   * - .. figure:: /images/rag-eval-online1.png\n\
      \          :width: 100%\n          :alt: Online aggregation for evals with RapidFire AI and IC Ops.\n\n     - .. figure::\
      \ /images/rag-eval-online2.png\n          :width: 100%\n          :alt: Online aggregation for evals with RapidFire\
      \ AI and IC Ops.\n\n\nAll configs are executed on the first 1/8th of the data (50 examples), with \ntheir **incrementally\
      \ computed** eval metrics shown in real time with confidence intervals. \nIn the figure, the 3 worst configs are stopped,\
      \ while the best is cloned to add 2 new variants. \nThe 3 running configs now continue on the second 1/8th of the data\
      \ (cumulatively, \n100 examples), and so on.\nOne clone is then stopped halfway through the aggregation, while the other\
      \ two run to completion. \nUltimately, the other clone ends up being the best config overall.\n\nNote that the confidence\
      \ intervals shown will keep narrowing as configs see more shards, converging \nto zero when 100% of the data is seen,\
      \ i.e., the metrics become exact point estimates.\nOverall, compared to sequential batch evals in which the original\
      \ 4 configs all run to completion, \nRapidFire AI enables you to explore more configs in less time, while reaching better\
      \ eval metrics.\n\n\n\nTypes of Metrics\n-----------------------\n\nWe support 2 types of metrics based on their aggregation\
      \ semantics: \n\n* **Distributive Metrics:** These are purely additive over a given set of data points. \n  \n  Examples:\
      \ *count* of number of correct predictions; *sum* of output token lengths across queries.\n\n* **Algebraic Metrics:**\
      \ These are averages or proportions over a given set of data points. They can be decomposed into components that are\
      \ individually distributive. \n  \n  Examples: *precision*, which counts number of correct predictions and total number\
      \ of data points separately and then divides them; *mean rouge-1*, which averages per-example rouge-1 values that assesses\
      \ overlap of tokens between generated text and ground truth text.\n\nWhen you define an eval metric via :func:`evals.compute_metrics_fn()`\
      \ and :func:`evals.accumulate_metrics_fn()`, \nyou must specify their type (algebraic or distributive) and value range\
      \ as illustrated below. \nFor metrics without a type defined, they will be displayed *as is*, i.e., without projected\
      \ \nestimates or confidence intervals.\n\n.. code-block:: python\n\n    # Based on GSM8K tutorial use case\n    metrics\
      \ = {\n        \"Total\": {\"value\": total},\n        \"Correct\": {\n            \"value\": correct,\n           \
      \ \"is_distributive\": True,\n            \"value_range\": (0, 1),\n        },\n        \"Accuracy\": {\n          \
      \  \"value\": accuracy,\n            \"is_algebraic\": True,\n            \"value_range\": (0, 1),\n        },\n   \
      \ }\n\nConfidence Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly\
      \ randomly**, i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies\
      \ to calculate confidence intervals for projected estimates of metrics. \nYou can indicate the confidence level (we\
      \ recommend 95%) and whether to perform \"finite population correction\" (FPC) or not. \nThese values can be specified\
      \ under the key :code:`\"online_strategy_kwargs\"` in your config dictionary as illustrated below.\n\n.. code-block::\
      \ python\n\n    # Based on FiQA RAG tutorial use case\n    \"online_strategy_kwargs\": {\n        \"strategy_name\"\
      : \"normal\",\n        \"confidence_level\": 0.95,\n        \"use_fpc\": True,\n    },\n\nNotation \n^^^^^^^\n\n* :math:`N`\
      \ = Total population size (total number of queries in eval set)\n* :math:`n` = Sample size (number of queries processed\
      \ so far)\n* :math:`\\hat{p}` = Observed sample proportion or average for an algebraic metric\n* :math:`\\bar{X}` =\
      \ Sample mean for a distributive metric\n* :math:`\\widehat{T}` = Estimated population total for a distributive metric\n\
      * :math:`\\text{Var}(\\widehat{T})` = Variance of the above estimated population total\n* :math:`\\text{SE}` = Standard\
      \ error (measure of estimate uncertainty)\n* :math:`\\text{CI}` = Confidence interval\n* :math:`z` = Z-score for confidence\
      \ level (1.96 for 95% confidence; used in Normal and Wilson)\n* :math:`\\alpha` = Significance level (0.05 for 95% confidence)\n\
      * :math:`n_{\\text{eff}}` = Effective sample size (adjusted for FPC in Wilson)\n* :math:`a, b` = Lower and upper bounds\
      \ of metric value range\n* :math:`R` = Range width, :math:`R = b - a`\n* :math:`\\varepsilon` = Margin of error (half-width\
      \ of confidence interval for Hoeffding)\n* :math:`\\varepsilon_{\\bar{X}}` = Margin of error for sample mean (Hoeffding\
      \ distributive)\n* :math:`\\text{FPC}` = Finite population correction factor\n\n\nFinite Population Correction (FPC)\n\
      ^^^^^^^^^^^^^^^^^^^^^^\n\nWhen sampling without replacement from finite populations, enabling FPC \nmultiplies the standard\
      \ error (SE) by :math:`\\text{FPC} = \\sqrt{(N-n)/(N-1)}` \nwhere :math:`N` is population size and :math:`n` is sample\
      \ size.\n\n\nNormal Approximation\n^^^^^^^^^^^^^^^^^^^\n\nThis is the default strategy, and it uses the Central Limit\
      \ Theorem. \nIt is suitable for most cases with non-trivial sample sizes (n > 30). \nIt provides tight intervals when\
      \ the statistical assumptions hold.\n\n* For algebraic metrics:\n\n.. math::\n\n   \\text{SE}_{\\hat{p}} = \\sqrt{\\\
      frac{\\hat{p}(1-\\hat{p})}{n}} \\times \\text{FPC}\n\n   \\text{CI} = \\hat{p} \\pm 1.96 \\cdot \\text{SE}_{\\hat{p}}\n\
      \n\n* For distributive metrics: \n\nEstimate population total :math:`\\widehat{T} = N\\bar{X}` with \nvariance :math:`\\\
      text{Var}(\\widehat{T}) = N^2 \\cdot \\bar{X}(1-\\bar{X})/n` (FPC-adjusted).\n\n\nWilson Score\n^^^^^^^^^^^\n\nThis\
      \ strategy is better for small sample sizes or metrics near 0/1 boundaries. \nIt is more robust than Normal Approximation\
      \ for extreme proportions. \n\n* For algebraic metrics:\n\n.. math::\n\n   \\text{center} = \\frac{\\hat{p} + z^2/(2n_{\\\
      text{eff}})}{1 + z^2/n_{\\text{eff}}}\n\n   \\text{margin} = \\frac{z\\sqrt{\\hat{p}(1-\\hat{p})/n_{\\text{eff}} + z^2/(4n_{\\\
      text{eff}}^2)}}{1 + z^2/n_{\\text{eff}}}\n\nwhere :math:`n_{\\text{eff}} = n/\\text{FPC}^2` when using FPC. \nThe Wilson\
      \ confidence interval is then :math:`[\\text{center} - \\text{margin}, \\text{center} + \\text{margin}]`,\nclamped to\
      \ [0, 1].\n\n* For distributive metrics, this falls back to Normal Approximation. \n\n\n\nHoeffding Bounds\n^^^^^^^^^^^\n\
      \nThis strategy is best for maximum safety (guaranteed coverage). It makes no distributional assumptions, \nbut that\
      \ also means its intervals are typically quite loose.\n\n.. math::\n\n   \\varepsilon = (b-a)\\sqrt{\\frac{\\ln(2/\\\
      alpha)}{2n}} \\times \\text{FPC}\n\n   \\text{CI} = [\\hat{p} - \\varepsilon, \\hat{p} + \\varepsilon]\n\nFor distributive\
      \ metrics with range :math:`R=b-a`, it computes :math:`\\varepsilon_{\\bar{X}} = R\\sqrt{\\ln(2/\\alpha)/(2n)}` \nand\
      \ then scales to population total."
    - "Follow these steps to install RapidFire AI on your local machine or remote/cloud instance for complete functionality\
      \ without limitations.\n\n\nStep 1: Install dependencies and package\n-----------------------\n\nObtain the RapidFire\
      \ AI OSS package from pypi (includes all dependencies) and ensure it is installed correctly.\n\n.. important::\n\n \
      \ Requires Python 3.12+. Ensure that ``python3`` resolves to Python 3.12 before creating the venv.\n\n.. code-block::\
      \ bash\n\n   python3 --version  # must be 3.12.x\n   python3 -m venv .venv\n   source .venv/bin/activate\n\n   pip install\
      \ rapidfireai\n\n   rapidfireai --version\n   # Verify it prints the following:\n   # RapidFire AI 0.14.0\n\nProvide\
      \ your Hugging Face account token to access the gated Llama and Mistral models \nshowcased in the tutorial notebooks.\
      \ \nIf you do not have such a token, you have two options:\n\n* Switch the :code:`model_name` in the tutorial notebook\
      \ to a non-gated model from Hugging Face. Then proceed to Step 2.\n\n* Create a Hugging Face token `as explained here\
      \ <https://huggingface.co/docs/hub/en/security-tokens>`_. Then request access on the following gated models' Hugging\
      \ Face pages:\n\n  * `mistralai/Mistral-7B-Instruct-v0.3 <https://huggingface.co/mistralai/Mistral-7B-Instruct-v0.3>`_\n\
      \  * `meta-llama/Llama-3.1-8B-Instruct <https://huggingface.co/meta-llama/Llama-3.1-8B-Instruct>`_\n  * `meta-llama/Llama-3.2-1B-Instruct\
      \ <https://huggingface.co/meta-llama/Llama-3.2-1B-Instruct>`_\n  \n  Headsup: the approval for the Llama models may\
      \ take a few hours. Then provide your HF token in the same venv.\n\n.. code-block:: bash\n\n   source .venv/bin/activate\n\
      \   pip install \"huggingface-hub[cli]\"\n\n   # Replace YOUR_TOKEN with your actual HF token\n   # https://huggingface.co/docs/hub/en/security-tokens\n\
      \   hf auth login --token YOUR_TOKEN\n\n   # Due to current issue: https://github.com/huggingface/xet-core/issues/527\n\
      \   pip uninstall -y hf-xet\n\n\nFeel free to ask us on Discord if you need any help with accessing gated Hugging Face\
      \ models. Unfortunately, we are not allowed to provide a publicly visible token here for your use due to Hugging Face's\
      \ policies."
