- source_sentence: How do the Stop and Delete IC Ops compare in terms of their effects on a run's state, visibility on the
    dashboard, resource usage, artifact preservation, and what further IC Ops can be performed on the run afterward?
  sentences:
  - "Postprocess Function\n--------------------\n\nOptional user-provided function to postprocess a batch of examples and\
    \ their respective generated outputs, \nwhich is injected into this function by the system. \nThis is useful for, say,\
    \ extracting structured information from generations, adding ground truth data, \nor performing any transformations needed\
    \ before computing metrics.\n\nIt is invoked for each batch during the evaluation process after generation and before\
    \ metric computation.\nPass it directly to the :code:`postprocess_fn` key in your eval config dictionary.\n\n\n.. py:function::\
    \ postprocess_fn(batch: dict[str, list]) -> dict[str, list]\n\n   :param batch: Dictionary containing a batch of examples,\
    \ including their respective generated outputs under the reserved key :code:`\"generated_text\"`.\n   :type batch: dict[str,\
    \ list]\n\n   :return: Dictionary containing the postprocessed batch with any new or modified keys\n   :rtype: dict[str,\
    \ list]\n"
  - "Eval Compute Metrics Function\n-------------------------\n\nMandatory user-provided function to compute eval metrics\
    \ on a given batch of (postprocessed) examples, \nwhich is injected by the system. \nIt should return metrics computed\
    \ over the batch as a whole. \n\nIt is invoked for each batch during the evaluation process after generation and postprocessing\
    \ (if applicable). \nPass it directly to the :code:`compute_metrics_fn` key in your eval config dictionary.\n\n\n.. py:function::\
    \ eval.compute_metrics_fn(batch: dict[str, list]) -> dict[str, dict[str, Any]]\n\n   :param batch: Dictionary containing\
    \ a batch of examples, including all preprocessed fields, generated outputs, and any postprocessed fields\n   :type batch:\
    \ dict[str, list]\n\n   :return: Dictionary with a metric's name as key and a dictionary as value inside which a reserved\
    \ key :code:`\"value\"` must exist with that corresponding metric's value over this batch of examples.\n   :rtype: dict[str,\
    \ dict[str, Any]]\n\n\n**Example:**\n\n.. code-block:: python\n\n    # Example 1 from FiQA use case: Metrics on retrieval\
    \ accuracy\n    def sample_compute_metrics_fn(batch: Dict[str, list]) -> Dict[str, Dict[str, Any]]:\n\t\t\"\"\"Function\
    \ to compute all eval metrics based on retrievals and/or generations\"\"\"\n\n\t\ttrue_positives, precisions, recalls,\
    \ f1_scores, ndcgs, rrs = 0, [], [], [], [], []\n\t\ttotal_queries = len(batch[\"query\"])\n\n\t\tfor pred, gt in zip(batch[\"\
    retrieved_documents\"], batch[\"ground_truth_documents\"]):\n\t\t\texpected_set = set(gt)\n\t\t\tretrieved_set = set(pred)\n\
    \n\t\t\ttrue_positives = len(expected_set.intersection(retrieved_set))\n\t\t\tprecision = true_positives / len(retrieved_set)\
    \ if len(retrieved_set) > 0 else 0\n\t\t\trecall = true_positives / len(expected_set) if len(expected_set) > 0 else 0\n\
    \t\t\tf1 = (\n\t\t\t\t2 * precision * recall / (precision + recall)\n\t\t\t\tif (precision + recall) > 0\n\t\t\t\telse\
    \ 0\n\t\t\t)\n\n\t\t\tprecisions.append(precision)\n\t\t\trecalls.append(recall)\n\t\t\tf1_scores.append(f1)\n\t\t\tndcgs.append(compute_ndcg_at_k(retrieved_set,\
    \ expected_set, k=5))\n\t\t\trrs.append(compute_rr(retrieved_set, expected_set))\n\n\t\treturn {\n\t\t\t\"Total\": {\"\
    value\": total_queries},\n\t\t\t\"Precision\": {\"value\": sum(precisions) / total_queries},\n\t\t\t\"Recall\": {\"value\"\
    : sum(recalls) / total_queries},\n\t\t\t\"F1 Score\": {\"value\": sum(f1_scores) / total_queries},\n\t\t\t\"NDCG@5\":\
    \ {\"value\": sum(ndcgs) / total_queries},\n\t\t\t\"MRR\": {\"value\": sum(rrs) / total_queries},\n\t\t}\n\n.. code-block::\
    \ python\n\n    # Example 2 from GSM8K use case: Direct answer correctness check\n    def sample_compute_metrics_fn(batch:\
    \ dict[str, list]) -> dict[str, dict[str, Any]]:\n        \"\"\"Function to compute all eval metrics based on retrievals\
    \ and/or generations\"\"\"\n\n        correct = sum(\n            1\n            for pred, gt in zip(batch[\"model_answer\"\
    ], batch[\"ground_truth\"])\n            if pred == gt\n        )\n        total = len(batch[\"model_answer\"])\n    \
    \    return {\n            \"Correct\": {\"value\": correct},\n            \"Total\": {\"value\": total},\n        }"
  - "Confidence Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly\
    \ randomly**, i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies to\
    \ calculate confidence intervals for projected estimates of metrics. \nYou can indicate the confidence level (we recommend\
    \ 95%) and whether to perform \"finite population correction\" (FPC) or not. \nThese values can be specified under the\
    \ key :code:`\"online_strategy_kwargs\"` in your config dictionary as illustrated below.\n\n.. code-block:: python\n\n\
    \    # Based on FiQA RAG tutorial use case\n    \"online_strategy_kwargs\": {\n        \"strategy_name\": \"normal\",\n\
    \        \"confidence_level\": 0.95,\n        \"use_fpc\": True,\n    },\n\nNotation \n^^^^^^^\n\n* :math:`N` = Total\
    \ population size (total number of queries in eval set)\n* :math:`n` = Sample size (number of queries processed so far)\n\
    * :math:`\\hat{p}` = Observed sample proportion or average for an algebraic metric\n* :math:`\\bar{X}` = Sample mean for\
    \ a distributive metric\n* :math:`\\widehat{T}` = Estimated population total for a distributive metric\n* :math:`\\text{Var}(\\\
    widehat{T})` = Variance of the above estimated population total\n* :math:`\\text{SE}` = Standard error (measure of estimate\
    \ uncertainty)\n* :math:`\\text{CI}` = Confidence interval\n* :math:`z` = Z-score for confidence level (1.96 for 95% confidence;\
    \ used in Normal and Wilson)\n* :math:`\\alpha` = Significance level (0.05 for 95% confidence)\n* :math:`n_{\\text{eff}}`\
    \ = Effective sample size (adjusted for FPC in Wilson)\n* :math:`a, b` = Lower and upper bounds of metric value range\n\
    * :math:`R` = Range width, :math:`R = b - a`\n* :math:`\\varepsilon` = Margin of error (half-width of confidence interval\
    \ for Hoeffding)\n* :math:`\\varepsilon_{\\bar{X}}` = Margin of error for sample mean (Hoeffding distributive)\n* :math:`\\\
    text{FPC}` = Finite population correction factor\n\n\nFinite Population Correction (FPC)\n^^^^^^^^^^^^^^^^^^^^^^\n\nWhen\
    \ sampling without replacement from finite populations, enabling FPC \nmultiplies the standard error (SE) by :math:`\\\
    text{FPC} = \\sqrt{(N-n)/(N-1)}` \nwhere :math:`N` is population size and :math:`n` is sample size.\n\n"
- source_sentence: What are the four Interactive Control (IC) Operations supported by RapidFire AI?
  sentences:
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
  - "RFOpenAIAPIModelConfig\n------\n\nThis is a wrapper around OpenAI's API client config and chat completion parameters.\
    \ \nThe full list of their arguments are available on `this page <https://platform.openai.com/docs/api-reference/chat/create>`__.\n\
    \nThe difference here is that the individual arguments (knobs) can be :class:`List` valued or \n:class:`Range` valued\
    \ in an :class:`RFOpenAIAPIModelConfig`. \nThat is how you can specify a base set of knob combinations from which a config\
    \ group can \nbe produced. Also read :doc:`the Multi-Config Specification page</configs>`.\n\n.. py:class:: RFOpenAIAPIModelConfig\n\
    \n  :param client_config: A dictionary necessary for initializing the AsyncOpenAI client. All knobs given in this dictionary\
    \ are simply passed to the AsyncOpenAI client as is. We recommend listing at least the following knobs.\n  \n    * :code:`\"\
    api_key\"`: Your OpenAI API key for authentication. Note that we are NOT able to provide a publicly visible API key.\n\
    \    * :code:`\"max_retries\"`: Maximum number of retry attempts for failed API calls. Default is 2.\n    * :code:`\"\
    timeout\"`: Request timeout in seconds. Optional.\n    \n  :type client_config: dict[str, Any]\n\n  :param model_config:\
    \ A dictionary to control the chat completion behavior with OpenAI's Chat Completions API. All knobs given in this dictionary\
    \ are simply passed to the OpenAI API as is. The API will use its defaults for unspecified knobs. We recommend listing\
    \ at least the following knobs.\n\n    * :code:`\"model\"`: Name of the OpenAI model to use, e.g., \"gpt-5-mini\".\n \
    \   * :code:`\"temperature\"`: What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the\
    \ output more random, while lower values like 0.2 will make it more focused and deterministic. OpenAI recommends altering\
    \ this or :code:`\"top_p\"` but not both.\n    * :code:`\"max_completion_tokens\"`: Upper bound for the number of tokens\
    \ that can be generated for a completion, including visible output tokens and reasoning tokens.\n    * :code:`\"reasoning_effort\"\
    `: Constrains effort for reasoning models. Currently supported values are \"minimal\", \"low\", \"medium\", and \"high\"\
    . Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response. The gpt-5-pro\
    \ model defaults to (and only supports) \"high\" reasoning effort.\n\t* :code:`\"top_p\"`: Alternative to temperature-based\
    \ sampling called nucleus sampling. The model considers the results of the tokens with top_p probability mass. So 0.1\
    \ means only the tokens comprising the top 10% probability mass are considered. OpenAI recommends altering this or :code:`\"\
    temperature\"` but not both.\n\n  :type model_config: dict[str, Any]\n\n  :param rpm_limit: Rate limit for requests per\
    \ minute to the OpenAI API. Used for throttling to avoid exceeding Open AI API quotas. Check the rate limit published\
    \ by Open AI for details on your tier and the latest per-model limits on `this page <https://platform.openai.com/docs/guides/rate-limits>`__.\n\
    \  :type rpm_limit: int\n\n  :param tpm_limit: Rate limit for tokens per minute to the OpenAI API. Used for throttling\
    \ to avoid exceeding API quotas. See the rate limit page above for details.\n  :type tpm_limit: int\n\n  :param rag: An\
    \ instance of a RapidFire AI RAG pipeline spec. Also read :doc:`the API: RFLangChainRagSpec page </ragspecs>`.\n  :type\
    \ rag: RFLangChainRagSpec\n\n  :param prompt_manager: An instance of a RapidFire AI PromptManager. Also read :doc:`the\
    \ API: Prompt Manager and Other Eval Config Knobs page </promptothers>`.\n  :type prompt_manager: PromptManager\n\n  ..\
    \ seealso::\n     - `OpenAI Chat Completions API Reference <https://platform.openai.com/docs/api-reference/chat/create>`_\n\
    \     - `OpenAI Python Client Documentation <https://github.com/openai/openai-python>`_\n     - :doc:`API: RFLangChainRagSpec\
    \ </ragspecs>`\n     - :doc:`API: Prompt Manager and Other Eval Config Knobs page </promptothers>`\n\n\n**Example:**\n\
    \n.. code-block:: python\n\n\t# Based on GSM8K chatbot tutorial notebook; specify your OPENAI_API_KEY beforehand\n\topenai_config1\
    \ = RFOpenAIAPIModelConfig(\n\t\tclient_config={\"api_key\": OPENAI_API_KEY, \"max_retries\": 2},\n\t\tmodel_config={\n\
    \t\t\t\"model\": \"gpt-5-mini\",\n\t\t\t\"max_completion_tokens\": 1024,\n\t\t\t\"reasoning_effort\": \"medium\", \n\t\
    \t},\n\t\trpm_limit=500,\n\t\ttpm_limit=500_000,\n\t\trag=None,\n\t\tprompt_manager=fewshot_prompt_manager,\n\t)\t"
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
- source_sentence: How does RapidFire AI's adaptive execution engine differ from traditional sequential execution for multi-config
    experiments?
  sentences:
  - "The crux of RapidFire AI's difference is in its *adaptive execution engine*: it enables \"interruptible\"\nexecution\
    \ of configurations across GPUs/CPUs. To do so, it first shards the training and/or evaluation \ndataset randomly into\
    \ \"chunks\" (also called \"shards\").\nThen instead of waiting for a run to see the whole dataset for all epochs (for\
    \ SFT/RFT) or for full \neval metrics calculation (for RAG evals), RapidFire AI schedules all runs on *one shard at a\
    \ time*, \nand then cycles through all shards.\n\nSuppose you have only 1 GPU, say an A100 or H100, and you want to run\
    \ SFT on a Llama model. \nCurrent tools force you to run one config after another *sequentially* as shown in the (simplified)\
    \ illustration below. \nIn contrast, by operating on shards, RapidFire AI offers a far more concurrent learning experience\
    \ by \nautomatically *swapping* adapters (and base models, if needed) across GPU(s) and DRAM. \nIt does this via efficient\
    \ shared memory-based caching mechanisms that can spill to disk when needed.\n\n.. image:: /images/gantt-1gpu.png\n  \
    \ :width: 800px\n\nIn the above figure, all 3 model configs are shown for 1 epoch. RapidFire AI is set to use 4 chunks.\n\
    So, before model config 3 (M3) even starts in the sequential approach, RapidFire AI already shows you \nthe learning behaviors\
    \ of all 3 configs on the first 2-3 chunks. \nThe overhead of swapping, represented by the thin gray box, is minimal,\
    \ less than 5% of the runtime,\nas per our measurements--thanks to our new efficient memory management techniques.\n\n\
    For inference evals for RAG/context engineering, such sharded execution means RapidFire AI surfaces eval metrics \nsooner\
    \ based on a statistical technique known as *online aggregation* from the database systems literature.\nBasically, see\
    \ estimated values and confidence intervals for all eval metrics in real time as the shards \nget processed, ultimately\
    \ converging to the exact metrics on the full dataset."
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
- source_sentence: What are the two knob set generators currently supported by RapidFire AI for creating multi-config specifications?
  sentences:
  - "Compute Metrics Function\n------\n\nOptional user-provided function specifying custom evaluation metrics based on the\
    \ generated \noutputs and ground truth.\n\nIt is passed to the :code:`compute_metrics` argument of :class:`RFModelConfig`.\
    \ \nAlso read: :doc:`the LoRA and Model Configs page</models>`.\nYou can create multiple variants of these functions and\
    \ pass them all as a single \n:code:`List` to your :class:`RFModelConfig` to create a multi-config specification.\n\n\
    This function is invoked by the underlying HF trainer at a cadence controlled by the \n:code:`eval_strategy` and :code:`eval_steps`\
    \ arguments.\nAlso read: :doc:`the Trainer Configs page</trainers>`.\n\n.. py:function:: fit.compute_metrics_fn(eval_preds:\
    \ Tuple) -> Dict[str, float]\n\n   :param eval_preds: Tuple containing generated predictions and ground truth labels from\
    \ the eval dataset.\n   :type eval_preds: Tuple[List[str], List[str]]\n\n   :return: Dictionary with user-defined metrics\
    \ with names keys and numbers as values\n   :rtype: Dict[str, float]\n\n\n**Example:**\n\n.. code-block:: python\n\n\t\
    # From the SFT tutorial notebook\n\tdef sample_compute_metrics(eval_preds):  \n\t\t\"\"\"Optional function to compute\
    \ eval metrics based on predictions and labels\"\"\"\n\t\tpredictions, labels = eval_preds\n\n\t\t# Standard text-based\
    \ eval metrics: Rouge and BLEU\n\t\timport evaluate\n\t\trouge = evaluate.load(\"rouge\")\n\t\tbleu = evaluate.load(\"\
    bleu\")\n\n\t\trouge_output = rouge.compute(predictions=predictions, references=labels, use_stemmer=True)\n\t\trouge_l\
    \ = rouge_output[\"rougeL\"]\n\t\tbleu_output = bleu.compute(predictions=predictions, references=labels)\n\t\tbleu_score\
    \ = bleu_output[\"bleu\"]\n\n\t\treturn {\"rougeL\": round(rouge_l, 4), \"bleu\": round(bleu_score, 4)}"
  - "We currently support two common knob set generators: :func:`List()` for a discrete \nset of values and :func:`Range()`\
    \ for sampling from a continuous value interval.\n\n\n.. py:function:: List(values: List[Any])\n\n\t:param values: List\
    \ of discrete values for a knob; all values must be the same python data type.\n\t:type values: List[Any]\n\n\n.. py:function::\
    \ Range(start: int | float, end: int | float, dtype: str = \"int\" | \"float\")\n\n\t:param start: Lower bound of range\
    \ interval.\n\t:type start: int | float\n\n\t:param end: Upper bound of range interval.\n\t:type end: int | float\n\n\t\
    :param dtype: Data type of value to be sampled, either :code:`\"int\"` or :code:`\"float\"`.\n\t:type dtype: str\n\n\n\
    **Notes:**\n\nAs of this writing, :func:`Range()` performs uniform sampling within the given interval. \nWe plan to continue\
    \ expanding this API and add more functionality on this front based on feedback."
  - "RapidFire AI offers a browser-based dashboard to automatically visualize all ML metrics and lets \nyou control runs on\
    \ the fly from there. \nOur current default dashboard is a fork of the popular OSS tool `MLflow <https://mlflow.org/>`__,\
    \ \nand it inherits much of MLflow's native features.\nThe dashboard URI is printed when the rapidfireai server is started;\
    \ open it in a browser. \n\nAs of this writing, apart from MLflow, RapidFire AI also supports \n`TensorBoard  <https://www.tensorflow.org/tensorboard>`__\n\
    and `Trackio <https://huggingface.co/docs/trackio/en/index>`__\nfor logging metrics plots. \nSpecify any one, two, or\
    \ all three dashboards to use with the following server start argument. \n\n.. code-block:: bash\n\n   rapidfireai start\
    \ --tracking-backends [mlflow | tensorboard | trackio]\n\nAlternatively, set the dashboard using its environment variable\
    \ as below in your python code/notebook:\n\n.. code-block:: python\n\n   os.environ[\"RF_MLFLOW_ENABLED\"] = \"true\"\n\
    \   os.environ[\"RF_TENSORBOARD_ENABLED\"] = \"true\"\n   os.environ[\"RF_TRACKIO_ENABLED\"] = \"true\"\n\nSupport for\
    \ other popular dashboards such as Weights & Biases and CometML is coming soon. \nThe rest of this section explains the\
    \ new features of our MLflow-fork dashboard.\nNote that these new features are not yet available on the other dashboards."
