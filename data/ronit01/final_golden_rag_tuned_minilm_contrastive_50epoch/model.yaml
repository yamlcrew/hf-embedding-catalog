- source_sentence: How does RapidFire AI's adaptive execution engine differ from traditional sequential execution for multi-config
    experiments?
  sentences:
  - "Eval Compute Metrics Function\n-------------------------\n\nMandatory user-provided function to compute eval metrics\
    \ on a given batch of (postprocessed) examples, \nwhich is injected by the system. \nIt should return metrics computed\
    \ over the batch as a whole. \n\nIt is invoked for each batch during the evaluation process after generation and postprocessing\
    \ (if applicable). \nPass it directly to the :code:`compute_metrics_fn` key in your eval config dictionary.\n\n\n.. py:function::\
    \ eval.compute_metrics_fn(batch: dict[str, list]) -> dict[str, dict[str, Any]]\n\n   :param batch: Dictionary containing\
    \ a batch of examples, including all preprocessed fields, generated outputs, and any postprocessed fields\n   :type batch:\
    \ dict[str, list]\n\n   :return: Dictionary with a metric's name as key and a dictionary as value inside which a reserved\
    \ key :code:`\"value\"` must exist with that corresponding metric's value over this batch of examples.\n   :rtype: dict[str,\
    \ dict[str, Any]]\n"
  - "As of this writing, we support 4 IC Ops: **Stop**, **Resume**, **Clone-Modify**, and **Delete**. \nWe explain each shortly\
    \ below.\n\nAll IC Ops on a run are queued by the system and **executed at a chunk boundary** for that run. \nThis avoids\
    \ potentially non-deterministic or other inconsistent behaviors during concurrent run execution.\nNote that different\
    \ runs might reach their chunk boundary at different points in time. \nTo control the number of chunks, set :code:`num_chunks`\
    \ during :func:`run_fit()`; \nmore details :doc:`on the Experiment docs page </experiments>`.\n\nIC ops can be invoked\
    \ as intermittently as you want during a long-running :func:`run_fit()`. \nSo, you can launch, say, 16 configs in one\
    \ go (even on a 4-GPU machine), check in after a few chunks,  \nand stop bottom 80% of the runs. You can let the top performers\
    \ continue for longer. Then you can \nclone and modify some to add new finer grained runs and warm start their parameters.\
    \ And so on.\n\nUnder the hood, RapidFire AI automatically adjusts the apportioning of the GPUs among all ongoing \nruns\
    \ to ensure maximal GPU utilization.\n\n\n\n\nStop\n----\n\nThis IC Op earmarks a run to be stopped at the end of its\
    \ current chunk. \nIt will still be alive but it will not use any GPU resources from the next chunk. \nYou will still\
    \ see its minibatch-level plots advancing for the current chunk. \nYou cannot stop an already stopped or deleted run.\
    \ \n\n\n.. raw:: html\n\n    <img src=\"_static/icop-stop2.png\" alt=\"IC Op Stop\" \n         style=\"cursor: zoom-in;\
    \ max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-stop.png\" alt=\"IC Op Stop\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\nResume\n-----\n\n\
    This IC Op is applicable only to a previously stopped run. \nIt earmarks this run to be resumed from the next chunk onward,\
    \ when it will be added to the mix of \nongoing runs and assigned GPU(s) automatically. \nYou cannot resume an already\
    \ resumed or deleted run.\n\n\n\nClone-Modify\n----\n\nThis is a powerful IC Op that is applicable to any ongoing, stopped,\
    \ or resumed run. \nIt allows you to add \"clones\" of a chosen run, called the \"parent\" run, during a :func:`run_fit()`.\
    \ \nThe IC Op panel displays an editable text box with the full knob config dictionary of the parent. \n\nEdit any knobs,\
    \ e.g., learning rate, LoRA rank, or even base model as if you are injecting \nthat new run config from code, except this\
    \ is done conveniently from the metrics dashboard itself. \nAs of this writing, we only support providing a single config\
    \ for this IC Op.\nSoon we will support providing a config-group generator such as :code:`RFGridSearch()` or\n:code:`RFRandomSearch()`\
    \ as well in the IC Op panel itself akin to the launching code.\n\nYou can also **warm-start** a clone using its parent's\
    \ weights if you'd like. \nWarm-started clones inherit their parent's learning behavior so far and thus, they can reach\
    \ better \neval metrics faster. \nNote that warm starting is only allowed if the clones have *identical* neural architecture\
    \ as the \nparent, including LoRA adapters; otherwise, it will error out.\n\nWhen you are ready with your clone's config,\
    \ click \"Submit\" to execute this IC Op.\n\n\n.. raw:: html\n\n    <img src=\"_static/icop-clone2.png\" alt=\"IC Op Clone-Modify\"\
    \ \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n    <img src=\"_static/icop-clone.png\"\
    \ alt=\"IC Op Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\"\
    >\n\n\nClones will automatically appear on the plots from the next chunk onward; just refresh the page. \nRapidFire AI's\
    \ adaptive scheduler automatically reapportions GPUs across all runs, including clones.\nSo, do not need to worry about\
    \ manually splitting GPUs across models, juggling new processes, etc.\nClones are treated just like any other run; so,\
    \ you can clone that clone later with IC Ops again.\n\nYou can submit multiple Clone-Modify ops on the same run or different\
    \ runs whenever you want. \nThey will get queued up and all clones will start together at the next chunk boundary. \n\n\
    Clone-Modify combined with Stop enables you to turbocharge how you leverage your intuition about your \nAI use case, dataset,\
    \ models, and eval metrics to dramatically cut down time to reaching much better \neval metrics even within a single experiment.\n\
    \n\n\nDelete\n----\n\nThis IC Op earmarks the run to be deleted from the next chunk onward. \nOn the chart, you will see\
    \ its curves vanish almost immediately. \nYou cannot do any further IC Ops on a deleted run because it will not be visible.\
    \ \nNote that although a deleted run vanishes from the plots, its model checkpoints are still part of \nthe artifacts\
    \ of that experiment so that you have post-hoc audibility.\n"
