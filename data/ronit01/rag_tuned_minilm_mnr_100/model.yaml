- source_sentence: What is the recommended approach if you run out of storage space while experimenting with many LLMs?
  sentences:
  - ".. py:function:: __init__(self, experiment_name: str, mode: str = \"fit\", experiments_path: str = \"./rapidfire_experiments\"\
    ) -> None\n\n\t:param experiment_name: Unique name for this experiment\n\t:type experiment_name: str\n\t\n\t:param mode:\
    \ Mode of this experiment, either :code:`\"fit\"` or :code:`\"eval\"`; default is :code:`\"fit\"`\n\t:type mode: str\n\
    \t\n\t:param experiments_path: Path to a folder to store this experiment's artifacts. Default is ``\"./rapidfire_experiments\"\
    ``)\n\t:type experiments_path: str, optional \n\n\t:return: None\n\t:rtype: None"
  - "Recovering Storage Space\n-------\n\nIf you run out of storage space on your machine due to experimenting with lots of\
    \ LLMs, we \nrecommend clearing out the \".cache\" folder on your home directory that is created by \nHugging Face to\
    \ import the base models. \nOne experiment's imported models are not needed for another; so, it is safe to delete them.\n\
    \nIf you want to reclaim even more space, look at the artifacts from your experiments and \neither delete some of the\
    \ files or move them to other/remote storage. \nNote that when you use LoRA adapters, RapidFire AI saves only the trained\
    \ adapters in the \ncheckpoints of the runs, not the base models."
  - "Multi-GPU Model Partitioning with FSDP\n-------\n\nRapidFire AI supports automated large model partitioning across GPUs\
    \ (on the same machine) via PyTorch's native FSDP. \nProvide the relevant FSDP deatils in a config knob, optionally along\
    \ with the number of GPUs to use for that run. \nThe following notebooks showcase the use of FSDP for SFT with the corresponding\
    \ LLMs:\n\n* FSDP Lite with base model TinyLlama-1.1B-Chat-v1.0. Needs at least 2x A10 GPUs or equivalent (48 GB total\
    \ HBM) to work. `View on GitHub <https://github.com/RapidFireAI/rapidfireai/blob/main/tutorial_notebooks/fine-tuning/rf-tutorial-sft-chatqa-fsdp-lite.ipynb>`__\n\
    \n* FSDP Regular with base model Qwen3-32B. Needs at least 4x A10 GPUs or equivalent (96 GB total HBM) to work. `View\
    \ on GitHub <https://github.com/RapidFireAI/rapidfireai/blob/main/tutorial_notebooks/fine-tuning/rf-tutorial-sft-chatqa.ipynb>`__\n\
    \n* FSDP Large with base model Llama-3-70B-Instruct. Needs at least 8x A10 GPUs or equivalent (192 GB total HBM) to work.\
    \ `View on GitHub <https://github.com/RapidFireAI/rapidfireai/blob/main/tutorial_notebooks/fine-tuning/rf-tutorial-sft-chatqa-fsdp-large.ipynb>`__\n\
    \n.. important::\n  Although the above FSDP tutorial notebooks can work on cheap A10 GPUs, we highly recommend using at\
    \ least A100s or later GPUs with NVLink support for reasonable runtimes.\n"
- source_sentence: What is the difference between distributive and algebraic metrics in RapidFire AI's online aggregation
    for evals?
  sentences:
  - "This use case notebook features an hybrid workflow spanning a self-hosted open LLM for embeddings and an Open AI call\
    \ for generation. \n\n\nTask, Dataset, and Prompt\n-------\n\nThis tutorial shows few-shot prompting as part of context\
    \ engineering for solving grade school math word problems.\n\nIt uses the \"GSM8K\" dataset; \n`see its details here <https://huggingface.co/datasets/openai/gsm8k>`__.\
    \ \nThe dataset contains grade school math word problems requiring multi-step reasoning.\n\nThe prompt format includes\
    \ system instructions defining the assistant as a math problem solver, \nsemantically selected few-shot examples, and\
    \ the target question to solve.\n\n\nModel, Few-Shot Selection, and Configuration Knobs\n-------\n\nWe compare 2 generator\
    \ models via OpenAI API: gpt-5-mini and gpt-4o.\n\nThere are 2 different reasoning effort levels for the first model only:\
    \ medium and high.\n\nThe few-shot prompting pipeline uses:\n\n- **Example Selection**: Semantic similarity-based selection\
    \ using sentence-transformers/all-MiniLM-L6-v2 embeddings.\n- **Example Pool**: 10 hand-crafted examples covering diverse\
    \ problem types.\n- **Few-Shot k Values**: 2 different values: 3 and 5 examples per prompt.\n- **Prompt Template**: Chain-of-thought\
    \ style with step-by-step reasoning and final answer after \"####\".\n\nAll other knobs are fixed across all configs.\
    \ Thus, there are a total of 6 combinations launched \nwith a union of two grids across generator, reasoning effort levels,\
    \ and few-shot k values: 1 x 1 x 2 + 1 x 2 x 2 = 6."
  - "Types of Metrics\n-----------------------\n\nWe support 2 types of metrics based on their aggregation semantics: \n\n\
    * **Distributive Metrics:** These are purely additive over a given set of data points. \n  \n  Examples: *count* of number\
    \ of correct predictions; *sum* of output token lengths across queries.\n\n* **Algebraic Metrics:** These are averages\
    \ or proportions over a given set of data points. They can be decomposed into components that are individually distributive.\
    \ \n  \n  Examples: *precision*, which counts number of correct predictions and total number of data points separately\
    \ and then divides them; *mean rouge-1*, which averages per-example rouge-1 values that assesses overlap of tokens between\
    \ generated text and ground truth text.\n\nWhen you define an eval metric via :func:`evals.compute_metrics_fn()` and :func:`evals.accumulate_metrics_fn()`,\
    \ \nyou must specify their type (algebraic or distributive) and value range as illustrated below. \nFor metrics without\
    \ a type defined, they will be displayed *as is*, i.e., without projected \nestimates or confidence intervals."
  - "ImportError in between Experiments\n------\n\nIf you run multiple experiments back to back from the same notebook/IDE\
    \ session, you might \nsee the following error appear occasionally: \n\n.. code-block:: python\n\n   ImportError: cannot\
    \ import name 'GenerationMixin' from 'transformers.generation'\n\nThis is caused by stray Python processes from the previous\
    \ experiment not ending properly. \nIf you see this error, we recommend the following steps:\n\n* Run the command :code:`ps\
    \ - ef | grep python`, look for \"multiprocessing.spawn\"/\"defunct\" processes, and kill if there are any with command\
    \ :code:`kill -9 [PID]`.\n\n* Wait for about 2 minutes regardless of whether there are processes to kill as above.\n\n\
    * Restart the kernel and then proceed with your new experiment."
- source_sentence: What is the purpose of the accumulate_metrics_fn in the evals pipeline, and what happens if it is not provided?
  sentences:
  - "Eval Accumulate Metrics Function\n----------------------------\n\nOptional user-provided function to aggregate algebraic\
    \ eval metrics across all batches of the data. \nIf this function is not provided, all metrics returned by :func:`eval.compute_metrics_fn()`\
    \ \nwill be assumed to be distributive (i.e., summed across batches) by default. Use this function \nwhen metrics require\
    \ (weighted) averaging or other custom dataset-wide aggregation logic.\n\nIt is invoked once at the very end of the evaluation\
    \ process after all batches have been processed.\nPass it directly to the :code:`accumulate_metrics_fn` key in your eval\
    \ config dictionary.\n\n\n.. py:function:: eval.accumulate_metrics_fn(aggregated_metrics: dict[str, list[dict[str, Any]]])\
    \ -> dict[str, dict[str, Any]]\n\n   :param aggregated_metrics: Dictionary with a metric's name as key and a list of per-batch\
    \ metric dictionaries as values from across all data batches. Inside each value dictionary, at least the reserved key\
    \ :code:`\"value\"` will exist that was returned by your :code:`eval_compute_metrics_fn` function.\n   :type aggregated_metrics:\
    \ dict[str, list[dict[str, Any]]]\n\n   :return: Dictionary with a metric's name as key and a dictionary as value. The\
    \ value dictionary can have these keys:\n   \n      * :code:`\"value\"` (required): The metric's value over the whole\
    \ dataset.\n      * :code:`\"is_algebraic\"` (optional): Boolean indicating if the metric is algebraic.\n      * :code:`\"\
    is_distributive\"` (optional): Boolean indicating if the metric is distributive.\n      * :code:`\"value_range\"` (optional):\
    \ 2-tuple of floats specifying the metric's range min and max.\n      \n      For online aggregation support, see :doc:`the\
    \ Online Aggregation for Evals page</onlineagg>`.\n\n   :rtype: dict[str, dict[str, Any]]"
  - This use case notebook features an all-closed model API workflow, with Open AI calls used for both embedding for generation.
    So, you do not need a GPU to run this notebook.
  - "RapidFire AI is a new AI experiment execution framework that transforms your LLM pipeline customization \nfrom slow,\
    \ sequential processes into rapid, intelligent workflows with hyperparallelized execution, \ndynamic real-time experiment\
    \ control, and automatic backend optimization.\n\nFor *RAG and context engineering evals*, start here: :doc:`Install and\
    \ Get Started: RAG and Context Engineering</walkthroughrag>`.\n\nFor *SFT and RFT/post-training workflows*, start here:\
    \ :doc:`Install and Get Started: SFT/RFT</walkthroughft>`.\n\n\nRapidFire AI is the first system of its kind to establish\
    \ live three-way communication between the IDE\nwhere the experiment is launched, a metrics display/control dashboard,\
    \ and a multi-core/multi-GPU execution backend.\n\n.. image:: /images/rf-usage.png\n   :width: 800px\n\nJust pip install\
    \ the :code:`rapidfireai` OSS package. It works on a CPU-only machine, a single-GPU machine, \nor a multi-GPU machine.\
    \ Note that for RAG/context engineering with only closed model APIs, GPUs are not needed. "
- source_sentence: How does RapidFire AI's document_template work in RFLangChainRagSpec, and what is the default template
    behavior?
  sentences:
  - "Follow these steps to install RapidFire AI on your local machine or remote/cloud instance for complete functionality\
    \ without limitations.\n\n\nStep 1: Install dependencies and package\n-----------------------\n\nObtain the RapidFire\
    \ AI OSS package from pypi (includes all dependencies) and ensure it is installed correctly.\n\n.. important::\n\n  Requires\
    \ Python 3.12+. Ensure that ``python3`` resolves to Python 3.12 before creating the venv.\n\n.. code-block:: bash\n\n\
    \   python3 --version  # must be 3.12.x\n   python3 -m venv .venv\n   source .venv/bin/activate\n\n   pip install rapidfireai\n\
    \n   rapidfireai --version\n   # Verify it prints the following:\n   # RapidFire AI 0.14.0\n\nProvide your Hugging Face\
    \ account token to access the gated Llama and Mistral models \nshowcased in the tutorial notebooks. \nIf you do not have\
    \ such a token, you have two options:\n\n* Switch the :code:`model_name` in the tutorial notebook to a non-gated model\
    \ from Hugging Face. Then proceed to Step 2.\n\n* Create a Hugging Face token `as explained here <https://huggingface.co/docs/hub/en/security-tokens>`_.\
    \ Then request access on the following gated models' Hugging Face pages:\n\n  * `mistralai/Mistral-7B-Instruct-v0.3 <https://huggingface.co/mistralai/Mistral-7B-Instruct-v0.3>`_\n\
    \  * `meta-llama/Llama-3.1-8B-Instruct <https://huggingface.co/meta-llama/Llama-3.1-8B-Instruct>`_\n  * `meta-llama/Llama-3.2-1B-Instruct\
    \ <https://huggingface.co/meta-llama/Llama-3.2-1B-Instruct>`_\n  \n  Headsup: the approval for the Llama models may take\
    \ a few hours. Then provide your HF token in the same venv.\n\n.. code-block:: bash\n\n   source .venv/bin/activate\n\
    \   pip install \"huggingface-hub[cli]\"\n\n   # Replace YOUR_TOKEN with your actual HF token\n   # https://huggingface.co/docs/hub/en/security-tokens\n\
    \   hf auth login --token YOUR_TOKEN\n\n   # Due to current issue: https://github.com/huggingface/xet-core/issues/527\n\
    \   pip uninstall -y hf-xet\n\n\nFeel free to ask us on Discord if you need any help with accessing gated Hugging Face\
    \ models. Unfortunately, we are not allowed to provide a publicly visible token here for your use due to Hugging Face's\
    \ policies."
  - "Config Dictionary\n-----\n\nA dictionary of key-value pairs that specify a full model training configuration. \nA knob's\
    \ value can be a singleton or set-valued (:class:`List` or :class:`Range`). \nA dictionary with set-valued knobs be fed\
    \ to a config-group generator method. \nA single combination of knob values in this dictionary is called a \"leaf\" config.\
    \ \nRapidFire AI instantiates one run per leaf config, and its values are injected via the \n:code:`model_config` argument\
    \ to your :func:`create_model_fn()` function.\n\nRead more here: :doc:`API: Multi-Config Specification</configs>`.\n"
  - "    :param document_template: Optional function to format each retrieved chunk for context injection into prompts. Should\
    \ accept a single LangChain :class:`Document` object and return a formatted string. Multiple documents are separated by\
    \ double newlines when serialized. If not provided, the following default template is used:\n \n        .. code-block::\
    \ python\n \n            def default_template(doc: Document) -> str:\n                \"\"\"Default document formatting\
    \ template.\"\"\"\n                metadata = \"; \".join([f\"{k}: {v}\" for k, v in doc.metadata.items()])\n        \
    \        return f\"{metadata}:\\n{doc.page_content}\"\n \n        You can provide a custom template to control what metadata\
    \ fields are included and how the content is formatted. For example, to include only a specific metadata field:\n \n \
    \       .. code-block:: python\n \n            def sample_template(doc: Document) -> str:\n                doc_source\
    \ = doc.metadata.get(\"source\", \"\")\n                return f\"Document Source: {doc_source}:\\nContent: {doc.page_content}\"\
    \n \n        Or for a dataset like SciFact where documents have a :code:`\"title\"` metadata field ingested via :code:`metadata_func`\
    \ in the document loader:\n \n        .. code-block:: python\n \n            def custom_template(doc: Document) -> str:\n\
    \                return f\"{doc.metadata['title']}: {doc.page_content}\"\n \n    :type document_template: Callable[[Document],\
    \ str], optional"
- source_sentence: What must the create_model_fn return, and when is it invoked by RapidFire AI?
  sentences:
  - "RapidFire AI also supports external persistent vector stores beyond the default in-memory FAISS.\nThis allows you to\
    \ scale to larger corpora, persist indexes across runs and experiments, and leverage managed vector DBMS services.\nAs\
    \ of this writing, **Pinecone** (hosted serverless or pod-based) and **PostgreSQL PGVector** (self-hosted or managed)\
    \ are supported.\n\nEach external store supports three modes of operation:\n\n- **Create mode:** Build a new index from\
    \ base documents from within RapidFire AI itself and use it for RAG.\n- **Read mode:** Retrieve from a pre-existing index\
    \ and use it for RAG. \n- **Update mode:** Add new content to an existing index from additional base documents from within\
    \ RapidFire AI itself and use it for RAG. \n\nSee the :doc:`API: LangChain RAG Spec page</ragspecs>` for more details\
    \ on how to specify these external vector stores."
  - "We currently support two common config group generators: :func:`RFGridSearch()` for grid search \nand :func:`RFRandomSearch()`\
    \ for random search. \n\nMore support for AutoML heuristics such as SHA, HyperOpt, as well as an integration with \nthe\
    \ popular AutoML library Optuna are coming soon. \nLikewise for RAG/context engineering, we also plan to support the AutoML\
    \ heuristic syftr.\n\n\n.. py:function:: RFGridSearch(configs: Dict[str, Any] | List[Dict[str, Any]], trainer_type: str\
    \ = \"SFT\" | \"DPO\" | \"GRPO\" | None)\n\n\t:param configs: A config dictionary with :func:`List()` for at least one\
    \ knob; can be a list of such config dictionaries too.\n\t:type configs: Dict[str, Any] | List[Dict[str, Any]]\n\n\t:param\
    \ trainer_type: The fine-tuning/post-training control flow to use: \"SFT\", \"DPO\", or \"GRPO\". Skip this argument for\
    \ :func:`run_evals()`.\n\t:type trainer_type: str, optional \n\n\n.. py:function:: RFRandomSearch(configs: Dict[str, Any],\
    \ trainer_type: str = \"SFT\" | \"DPO\" | \"GRPO\" | None, num_runs: int, seed: int = 42)\n\n\t:param configs: A config\
    \ dictionary with :func:`List()` or :func:`Range()` for at least one knob.\n\t:type configs: Dict[str, Any]\n\n\t:param\
    \ trainer_type: The fine-tuning/post-training control flow to use: \"SFT\", \"DPO\", or \"GRPO\". Skip this argument for\
    \ :func:`run_evals()`.\n\t:type trainer_type: str, optional\n\n\t:param num_runs: Number of runs (full combinations of\
    \ knob values) to sample in total.\n\t:type num_runs: int\n\n\t:param seed: Seed for random sampling of knob values to\
    \ construct combinations. Default is 42.\n\t:type seed: int, optional \n\n\n**Notes:**\n\nFor :func:`RFGridSearch()`,\
    \ each knob can have either a single value or a :func:`List()` of values but no knob \nshould have :func:`Range()` of\
    \ values; otherwise, it will error out.\n\nFor :func:`RFRandomSearch()`, each knob can have either a single value, or\
    \ a :func:`List()` of values, or a \n :func:`Range()` of values. The semantics of sampling are independently-identically-distributed\
    \ (IID), i.e.,\nwe uniformly randomly pick a value from each discrete set and from each continuous set to construct the\
    \ \nknob combination for one run. \nThen we repeat that sampling process in an IID way to accumulate :code:`num_runs`\
    \ distinct combinations.\n\nNote that the return types of the config group generators are internal to RapidFire AI and\
    \ they are usable only \nwithin the context of :func:`run_fit()` or :func:`run_evals()` in the :class:`Experiment` class."
  - "Create Model Function\n------\n\nMandatory user-provided function to create HuggingFace model and tokenizer objects based\
    \ on the  \nmodel type(s) and name(s) given in the :code:`RFModelConfig` and multi-config specification. \nAlso read :doc:`the\
    \ LoRA and Model Configs page</models>`.\nA model can be imported from the Hugging Face model hub or read from a local\
    \ checkpoint file. \n\nIt is passed to :func:`run_fit()` directly. Also read :doc:`the Experiment page</experiment>`.\n\
    \nThis function is invoked when a trainer object is created for each run. \n\n\n.. py:function:: create_model_fn(model_config:\
    \ Dict[str, Any]) -> Tuple[transformers.PreTrainedModel, transformers.PreTrainedTokenizer]\n\n  :param model_config: Dictionary\
    \ injected by RapidFire AI into this user-defined function with all key-value pairs for one model config output by the\
    \ config-group generator.\n  :type model_config: Dict[str, Any]\n\n  :return: Tuple containing the initialized Hugging\
    \ Face model (e.g., ``AutoModelForCausalLM``, ``AutoModelForSequenceClassification``) and tokenizer (e.g., ``AutoTokenizer``,\
    \ ``PreTrainedTokenizer``) objects\n  :rtype: Tuple[transformers.PreTrainedModel, transformers.PreTrainedTokenizer]\n\n\
    \n**Example:**\n\n.. code-block:: python\n\n\t# From the SFT tutorial notebook\n\tdef sample_create_model(model_config):\n\
    \    \t\"\"\"Function to create model object for any given config; must return tuple of (model, tokenizer)\"\"\"\n\t\t\
    from transformers import AutoModelForCausalLM, AutoTokenizer, AutoModelForSeq2SeqLM, AutoModelForMaskedLM\n\t\t\n\t\t\
    model_name = model_config[\"model_name\"]\n\t\tmodel_type = model_config[\"model_type\"]\n\t\tmodel_kwargs = model_config[\"\
    model_kwargs\"]\n\t\t\n\t\tif model_type == \"causal_lm\":\n\t\t\tmodel = AutoModelForCausalLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"seq2seq_lm\":\n\t\t\tmodel = AutoModelForSeq2SeqLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"masked_lm\":\n\t\t\tmodel = AutoModelForMaskedLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"custom\":\n            # Handle custom model loading logic, e.g., loading\
    \ your own checkpoints\n            # model = ... \n\t\t\tpass\n\t\telse:\n\t\t\t# Default to causal LM\n\t\t\tmodel =\
    \ AutoModelForCausalLM.from_pretrained(model_name, **model_kwargs)\n\n\t\ttokenizer = AutoTokenizer.from_pretrained(model_name)\n\
    \n\t\treturn (model,tokenizer)"
