      \n \n        Or for a dataset like SciFact where documents have a :code:`\"title\"` metadata field ingested via :code:`metadata_func`\
      \ in the document loader:\n \n        .. code-block:: python\n \n            def custom_template(doc: Document) -> str:\n\
      \                return f\"{doc.metadata['title']}: {doc.page_content}\"\n \n    :type document_template: Callable[[Document],\
      \ str], optional"
    - "Recovering Storage Space\n-------\n\nIf you run out of storage space on your machine due to experimenting with lots\
      \ of LLMs, we \nrecommend clearing out the \".cache\" folder on your home directory that is created by \nHugging Face\
      \ to import the base models. \nOne experiment's imported models are not needed for another; so, it is safe to delete\
      \ them.\n\nIf you want to reclaim even more space, look at the artifacts from your experiments and \neither delete some\
      \ of the files or move them to other/remote storage. \nNote that when you use LoRA adapters, RapidFire AI saves only\
      \ the trained adapters in the \ncheckpoints of the runs, not the base models."
    - ".. py:function:: get_runs_info(self) -> pd.DataFrame:\n\n\t:return: A DataFrame with the following columns: run_id,\
      \ status, mlflow_run_id, completed_steps, total_steps, start_chunk_id, num_chunks_visited_curr_epoch, num_epochs_completed,\
      \ error, source, ended_by, warm_started_from, config (full config dictionary)\n\n\t:rtype: pandas.DataFrame"
  - source_sentence: What are the three use case tutorials provided for RAG and context engineering, and what type of workflow
      does each demonstrate?
    sentences:
    - "Reward Functions\n------\n\nUser-provided reward function(s) needed for GRPO. You can create as many reward functions\
      \ as you \nlike with custom names.\n\nA list of such functions is passed to the :code:`reward_funcs` argument of :class:`RFModelConfig`.\
      \ \nAlso read: :doc:`the LoRA and Model Configs page</models>`.\nYou can create multiple variants of this list with\
      \ different subsets of functions and pass them \nall as a single :code:`List` to your :class:`RFModelConfig` to create\
      \ a multi-config specification.\n\nThese functions are invoked by the underlying HF trainer on the generated outputs\
      \ on the fly.\n\n\n.. py:function:: reward_function(prompts, completions, completions_ids, trainer_state, **kwargs)\
      \ -> List[float]\n\n\t:param prompts: List of input prompts that produced the completions.\n\t:type prompts: List[str]\
      \ | List[List[Dict[str, str]]]\n\n\t:param completions: List of generated completions corresponding to above prompts.\n\
      \t:type completions: List[str] | List[List[Dict[str, str]]]\n\n\t:param completions_ids: List of tokenized completions\
      \ (token IDs) corresponding to each completion.\n\t:type completions_ids: List[List[int]]\n\n\t:param trainer_state:\
      \ Current state of the trainer. Useful for implementing dynamic reward functions like curriculum learning where rewards\
      \ adjust based on training progress.\n\t:type trainer_state: transformers.TrainerState\n\n\t:param kwargs: Additional\
      \ keyword arguments containing all dataset columns (except \"prompt\"). For example, if the dataset contains a \"ground_truth\"\
      \ column, it will be passed as a keyword argument.\n\t:type kwargs: Any\n\n\t:return: List of reward scores, one per\
      \ single completion.\n\t:rtype: List[float] | None\n\n\n**Examples:**\n\n.. code-block:: python\n\n    # From the GRPO\
      \ tutorial notebook\n    def correctness_reward_func(prompts, completions, answer, **kwargs) -> list[float]:\n\n   \
      \     def extract_xml_answer(text: str) -> str:\n            answer = text.split(\"<answer>\")[-1]\n            answer\
      \ = answer.split(\"</answer>\")[0]\n            return answer.strip()\n\n        responses = [completion[0]['content']\
      \ for completion in completions]\n        q = prompts[0][-1]['content']\n        extracted_responses = [extract_xml_answer(r)\
      \ for r in responses]\n        # x('-'*20, f\"Question:\\n{q}\", f\"\\nAnswer:\\n{answer[0]}\", f\"\\nResponse:\\n{responses[0]}\"\
      , f\"\\nExtracted:\\n{extracted_responses[0]}\")\n        return [2.0 if r == a else 0.0 for r, a in zip(extracted_responses,\
      \ answer)]\n\n    def strict_format_reward_func(completions, **kwargs) -> list[float]:\n        \"\"\"Reward function\
      \ that checks if the completion has a specific format.\"\"\"\n        import re\n        pattern = r\"^<reasoning>\\\
      n.*?\\n</reasoning>\\n<answer>\\n.*?\\n</answer>\\n$\"\n        responses = [completion[0][\"content\"] for completion\
      \ in completions]\n        matches = [re.match(pattern, r) for r in responses]\n        return [0.5 if match else 0.0\
      \ for match in matches]\n\n**Notes:**\n\nNote that TRL injects into a reward function lists of prompts, completions,\
      \ completion IDs, and trainer \nstate as keyword arguments. You can use only a subset of these in your reward function\
      \ signature as \nlong as you include :code:`**kwargs`, as shown in the second example above.\n\nDepending on the dataset\
      \ format, :code:`prompts` and :code:`completions` will be either lists of \nstrings (standard format) or lists of message\
      \ dictionaries (conversational format). \nStandard format is usually common for text completion tasks, simple Q&A, code\
      \ generation, and \nmathematical reasoning.\nConversational format is needed for multi-turn conversations, chat models\
      \ with system prompts, \nrole-playing scenarios, and complex dialogue systems.\nMake sure your reward function can handle\
      \ both cases if you dataset includes both types.\n\nThe return type of every reward function must be a list of floats,\
      \ one per completion. \nIt can also return :code:`None` for examples when the reward function is not applicable, \n\
      which is useful for multi-task training. "
    - "Why Not Just Downsample Data?\n------------\n\nAt first glance, one might consider running multi-config comparisons\
      \ by downsampling data for \nquick estimates, then running promising configs on full data. While common, this approach\
      \ is \noften misleading and cumbersome.\n\nA single downsample introduces variance from one static snapshot, potentially\
      \ leading to wrong \nconclusions, especially with overfitting-prone LLMs/DL models. It requires manual checkpoint \n\
      management, adding tedious file work. You also do not get dynamic control (stop, resume, clone-modify),\nor you must\
      \ reimplement such tricky operations, taking time away from your AI application work.\n\nRapidFire AI takes such practical\
      \ heuristics to their logical conclusion with shard-based \nadaptive multi-config execution with dynamic experiment\
      \ control. This offers you maximum power \nand flexibility for AI development without extra DevOps grunt work, i.e.,\
      \ *rapid experimentation*.\n\nThe above said, note that downsampling is *complementary* to rapid experimentation--feel\
      \ free \ndo both! The adaptive execution can operate on your downsampled dataset all the same."
    - "We currently support two common config group generators: :func:`RFGridSearch()` for grid search \nand :func:`RFRandomSearch()`\
      \ for random search. \n\nMore support for AutoML heuristics such as SHA, HyperOpt, as well as an integration with \n\
      the popular AutoML library Optuna are coming soon. \nLikewise for RAG/context engineering, we also plan to support the\
      \ AutoML heuristic syftr.\n\n\n.. py:function:: RFGridSearch(configs: Dict[str, Any] | List[Dict[str, Any]], trainer_type:\
      \ str = \"SFT\" | \"DPO\" | \"GRPO\" | None)\n\n\t:param configs: A config dictionary with :func:`List()` for at least\
      \ one knob; can be a list of such config dictionaries too.\n\t:type configs: Dict[str, Any] | List[Dict[str, Any]]\n\
      \n\t:param trainer_type: The fine-tuning/post-training control flow to use: \"SFT\", \"DPO\", or \"GRPO\". Skip this\
      \ argument for :func:`run_evals()`.\n\t:type trainer_type: str, optional \n\n\n.. py:function:: RFRandomSearch(configs:\
      \ Dict[str, Any], trainer_type: str = \"SFT\" | \"DPO\" | \"GRPO\" | None, num_runs: int, seed: int = 42)\n\n\t:param\
      \ configs: A config dictionary with :func:`List()` or :func:`Range()` for at least one knob.\n\t:type configs: Dict[str,\
      \ Any]\n\n\t:param trainer_type: The fine-tuning/post-training control flow to use: \"SFT\", \"DPO\", or \"GRPO\". Skip\
      \ this argument for :func:`run_evals()`.\n\t:type trainer_type: str, optional\n\n\t:param num_runs: Number of runs (full\
      \ combinations of knob values) to sample in total.\n\t:type num_runs: int\n\n\t:param seed: Seed for random sampling\
      \ of knob values to construct combinations. Default is 42.\n\t:type seed: int, optional \n\n\n**Notes:**\n\nFor :func:`RFGridSearch()`,\
      \ each knob can have either a single value or a :func:`List()` of values but no knob \nshould have :func:`Range()` of\
      \ values; otherwise, it will error out.\n\nFor :func:`RFRandomSearch()`, each knob can have either a single value, or\
      \ a :func:`List()` of values, or a \n :func:`Range()` of values. The semantics of sampling are independently-identically-distributed\
      \ (IID), i.e.,\nwe uniformly randomly pick a value from each discrete set and from each continuous set to construct\
      \ the \nknob combination for one run. \nThen we repeat that sampling process in an IID way to accumulate :code:`num_runs`\
      \ distinct combinations.\n\nNote that the return types of the config group generators are internal to RapidFire AI and\
      \ they are usable only \nwithin the context of :func:`run_fit()` or :func:`run_evals()` in the :class:`Experiment` class."
  - source_sentence: What are the five reward functions used in the GRPO tutorial for mathematical reasoning, and what does
      each one reward?
    sentences:
    - 'This use case notebook features an hybrid workflow spanning a self-hosted open LLM for embeddings and an Open AI call
      for generation. '
    - "Run\n-----\n\nA central concept in RapidFire AI representing a single combination of configuration knob values\nfor\
      \ a model trained with :func:`run_fit()`. \nIt is the same concept as in ML metrics dashboards such as MLflow and Weights\
      \ & Biases. \nRapidFire AI assigns each run a unique integer :code:`run_id` within an experiment.\n\nRead more here:\
      \ :doc:`API: Experiment</experiment>` and :doc:`ML Metrics Dashboard</dashboard>`."
    - "Eval Accumulate Metrics Function\n----------------------------\n\nOptional user-provided function to aggregate algebraic\
      \ eval metrics across all batches of the data. \nIf this function is not provided, all metrics returned by :func:`eval.compute_metrics_fn()`\
      \ \nwill be assumed to be distributive (i.e., summed across batches) by default. Use this function \nwhen metrics require\
      \ (weighted) averaging or other custom dataset-wide aggregation logic.\n\nIt is invoked once at the very end of the\
      \ evaluation process after all batches have been processed.\nPass it directly to the :code:`accumulate_metrics_fn` key\
      \ in your eval config dictionary.\n\n\n.. py:function:: eval.accumulate_metrics_fn(aggregated_metrics: dict[str, list[dict[str,\
      \ Any]]]) -> dict[str, dict[str, Any]]\n\n   :param aggregated_metrics: Dictionary with a metric's name as key and a\
      \ list of per-batch metric dictionaries as values from across all data batches. Inside each value dictionary, at least\
      \ the reserved key :code:`\"value\"` will exist that was returned by your :code:`eval_compute_metrics_fn` function.\n\
      \   :type aggregated_metrics: dict[str, list[dict[str, Any]]]\n\n   :return: Dictionary with a metric's name as key\
      \ and a dictionary as value. The value dictionary can have these keys:\n   \n      * :code:`\"value\"` (required): The\
      \ metric's value over the whole dataset.\n      * :code:`\"is_algebraic\"` (optional): Boolean indicating if the metric\
      \ is algebraic.\n      * :code:`\"is_distributive\"` (optional): Boolean indicating if the metric is distributive.\n\
      \      * :code:`\"value_range\"` (optional): 2-tuple of floats specifying the metric's range min and max.\n      \n\
      \      For online aggregation support, see :doc:`the Online Aggregation for Evals page</onlineagg>`.\n\n   :rtype: dict[str,\
      \ dict[str, Any]]"
  - source_sentence: What is a 'leaf config' in RapidFire AI terminology, and how does it relate to runs?
    sentences:
    - "For RAG and Context Engineering\n------\n\nWe have one use case example each for an all-local model, all-OpenAI, and\
      \ a hybrid workflow: \nFiQA RAG Q&A chatbot, SciFact RAG for scientific claim verification, and \nGSM8K few-shot/context\
      \ engineering for math reasoning, respectively.\nThis set will expand over time to more examples based on community\
      \ inputs."
    - "Postprocess Function\n--------------------\n\nOptional user-provided function to postprocess a batch of examples and\
      \ their respective generated outputs, \nwhich is injected into this function by the system. \nThis is useful for, say,\
      \ extracting structured information from generations, adding ground truth data, \nor performing any transformations\
      \ needed before computing metrics.\n\nIt is invoked for each batch during the evaluation process after generation and\
      \ before metric computation.\nPass it directly to the :code:`postprocess_fn` key in your eval config dictionary.\n\n\
      \n.. py:function:: postprocess_fn(batch: dict[str, list]) -> dict[str, list]\n\n   :param batch: Dictionary containing\
      \ a batch of examples, including their respective generated outputs under the reserved key :code:`\"generated_text\"\
      `.\n   :type batch: dict[str, list]\n\n   :return: Dictionary containing the postprocessed batch with any new or modified\
      \ keys\n   :rtype: dict[str, list]\n\n\n**Examples:**\n\n.. code-block:: python\n\n    # Example 1 from FiQA use case:\
      \ Adding ground truth documents for retrieval evaluation\n    def sample_postprocess_fn(batch: dict[str, list]) -> dict[str,\
      \ list]:\n        \"\"\"Function to postprocess outputs produced by generator model\"\"\"\n\n        batch[\"ground_truth_documents\"\
      ] = [\n            qrels[qrels[\"query_id\"] == query_id][\"corpus_id\"].tolist()\n            for query_id in batch[\"\
      query_id\"]\n        ]\n        return batch\n\n.. code-block:: python\n\n    # Example 2 from SciFact use case: Extracting\
      \ structured answers from generated text\n    def extract_solution(answer):\n\t\tsolution = re.search(r\"####\\s*(SUPPORT|CONTRADICT|NOINFO)\"\
      , answer, re.IGNORECASE)\n\t\tif solution is None:\n\t\t\treturn \"INVALID\"\n\t\treturn solution.group(1).upper()\n\
      \n    def sample_postprocess_fn(batch: dict[str, list]) -> dict[str, list]:\n\t\t\"\"\"Function to postprocess outputs\
      \ produced by generator model\"\"\"\n\n\t\tbatch[\"ground_truth_documents\"] = [\n\t\t\tqrels[qrels[\"query_id\"] ==\
      \ query_id][\"corpus_id\"].tolist()\n\t\t\tfor query_id in batch[\"query_id\"]\n\t\t]\n\t\tbatch[\"answer\"] = [extract_solution(answer)\
      \ for answer in batch[\"generated_text\"]]\n\t\treturn batch"
    - "This class wraps around some LangChain APIs to manage dynamic few-shot example selection. It provides semantic \nsimilarity-based\
      \ example selection to construct prompts with the most relevant examples for each input query.\n\nThe individual arguments\
      \ (knobs) can be :class:`List` valued or :class:`Range` valued in an :class:`RFPromptManager`. \nThat is how you can\
      \ specify a base set of knob combinations from which a config group can be produced. \nAlso read :doc:`the Multi-Config\
      \ Specification page</configs>`.\n\n.. py:class:: RFPromptManager\n\n  :param instructions: The main instructions for\
      \ the prompt that guide the generator's behavior. This sets the overall task description and role for the assistant.\
      \ Either this or :code:`instructions_file_path` must be provided.\n  :type instructions: str, optional\n\n  :param instructions_file_path:\
      \ Path to a file containing the instructions. Use this as an alternative to the :code:`instructions` parameter for loading\
      \ instructions from a file, say, if they are very long.\n  :type instructions_file_path: str, optional\n\n  :param examples:\
      \ A list of example dictionaries for few-shot learning. Each example should be a dictionary with keys matching the expected\
      \ input-output format (e.g., \"question\" and \"answer\").\n  :type examples: list[dict[str, str]], optional\n\n\n \
      \ :param embedding_cfg: The embedding class and its kwargs to use for computing semantic similarity between examples\
      \ and queries, provided as a single dictionary. Must include a key :code:`\"class\"` with the class itself as value,\
      \ not an instance. Options for the class include :class:`HuggingFaceEmbeddings` and :class:`OpenAIEmbeddings`. The kwargs\
      \ that follow must contain all parameters needed to initialize the embedding class; required parameters vary by embedding\
      \ class. For example, :class:`HuggingFaceEmbeddings` needs :code:`model_name`, :code:`model_kwargs` and :code:`device`,\
      \ while :class:`OpenAIEmbeddings` needs :code:`\"model\"` and :code:`\"api_key\"`.\n  :type embedding_cfg: dict[str,\
      \ Any], optional\n\n\n  :param example_selector_cls: The example selector class that determines how to choose relevant\
      \ examples based on the input query. Must be either :code:`SemanticSimilarityExampleSelector` or :code:`MaxMarginalRelevanceExampleSelector`\
      \ (for diversity) from LangChain.\n  :type example_selector_cls: type[MaxMarginalRelevanceExampleSelector | SemanticSimilarityExampleSelector],\
      \ optional\n\n  :param example_prompt_template: A LangChain :code:`PromptTemplate` that defines how to format each example.\
      \ Should specify :code:`input_variables` and a :code:`template` string with placeholders matching the keys in the examples\
      \ dictionaries.\n  :type example_prompt_template: PromptTemplate, optional\n\n  :param k: Number of most similar or\
      \ diverse examples to retrieve and include in the prompt for each query. Default is 3.\n  :type k: int, optional"
  - source_sentence: What are the two knob set generators currently supported by RapidFire AI for creating multi-config specifications?
    sentences:
    - "We currently support two common knob set generators: :func:`List()` for a discrete \nset of values and :func:`Range()`\
      \ for sampling from a continuous value interval.\n\n\n.. py:function:: List(values: List[Any])\n\n\t:param values: List\
      \ of discrete values for a knob; all values must be the same python data type.\n\t:type values: List[Any]\n\n\n.. py:function::\
      \ Range(start: int | float, end: int | float, dtype: str = \"int\" | \"float\")\n\n\t:param start: Lower bound of range\
      \ interval.\n\t:type start: int | float\n\n\t:param end: Upper bound of range interval.\n\t:type end: int | float\n\n\
      \t:param dtype: Data type of value to be sampled, either :code:`\"int\"` or :code:`\"float\"`.\n\t:type dtype: str\n\
      \n\n**Notes:**\n\nAs of this writing, :func:`Range()` performs uniform sampling within the given interval. \nWe plan\
      \ to continue expanding this API and add more functionality on this front based on feedback."
    - "ImportError in between Experiments\n------\n\nIf you run multiple experiments back to back from the same notebook/IDE\
      \ session, you might \nsee the following error appear occasionally: \n\n.. code-block:: python\n\n   ImportError: cannot\
      \ import name 'GenerationMixin' from 'transformers.generation'\n\nThis is caused by stray Python processes from the\
      \ previous experiment not ending properly. \nIf you see this error, we recommend the following steps:\n\n* Run the command\
      \ :code:`ps - ef | grep python`, look for \"multiprocessing.spawn\"/\"defunct\" processes, and kill if there are any\
      \ with command :code:`kill -9 [PID]`.\n\n* Wait for about 2 minutes regardless of whether there are processes to kill\
      \ as above.\n\n* Restart the kernel and then proceed with your new experiment."
    - "Note that if you plan to use only OpenAI APIs and not self-hosted models (for embedding or generation), you do NOT\
      \ need GPUs on your machine. \nBut you must provide a valid OpenAI API key via a config argument as shown in the GSM8K\
      \ and SciFact tutorial notebooks.\n\n\nStep 1: Install dependencies and package\n-----------------------\n\nObtain the\
      \ RapidFire AI OSS package from pypi (includes all dependencies) and ensure it is installed correctly.\n\n.. important::\n\
      \n  Requires Python 3.12+. Ensure that ``python3`` resolves to Python 3.12 before creating the venv.\n\n.. code-block::\
      \ bash\n\n   python3 --version  # must be 3.12.x\n   python3 -m venv .venv\n   source .venv/bin/activate\n\n   pip install\
      \ rapidfireai\n\n   rapidfireai --version\n   # Verify it prints the following:\n   # RapidFire AI 0..14.0\n\n   # Due\
      \ to current issue: https://github.com/huggingface/xet-core/issues/527\n   pip uninstall -y hf-xet\n\n\nThe tutorial\
      \ notebooks for RAG evals do not use any gated models from Hugging Face.\nIf you want to access gated models, provide\
      \ your Hugging Face account token.\nFor more details on that, :doc:`see Step 1 here</walkthroughft>`.\n\n\nStep 2: Initialize\
      \ and start RapidFire AI server\n------------\n\nRun the following commands to initialize rapidfireai to use the correct\
      \ dependencies for RAG evals:\n\n.. code-block:: bash\n\n   rapidfireai init --evals\n   # It will install specific\
      \ dependencies and initialize rapidfireai for RAG evals\n\n\n.. note::\n  You need to run init **only once** for a new\
      \ venv or when switching GPU(s) on your machine. You do NOT need to run it after a reboot or for a new terminal tab.\n\
      \n\nNext start RapidFire AI services: the frontend with the ML metrics dashboard and the API server. \nThe frontend\
      \ URL shown below can be opened on your local browser.\n\n.. code-block:: bash\n\n   rapidfireai start\n   # It should\
      \ print about 50 lines, including the following:\n   # ...\n   # RapidFire Frontend is ready\n   # Open your browser\
      \ and navigate to: http://0.0.0.0:8853\n   # ...\n   # Press Ctrl+C to stop all services\n\n.. important::\n\n  Do NOT\
      \ proceed until the start is successful with \"Available endpoints\" printed as above. Leave this terminal running while\
      \ you work through the tutorial notebooks. \n\n\nIf you close the terminal in which you started rapidfireai or if you\
      \ rebooted your machine, \njust start rapidfireai again with the above command.\n\nIf the start command fails for whatever\
      \ reason, wait for half a minute and rerun it.\nFor diagnostics and common fixes (including Linux/macOS and Windows\
      \ steps), see :doc:`Troubleshooting </troubleshooting>`.\n\n.. note::\n  For RAG/context engineering experiments with\
      \ :func:`run_evals()`, starting the server is **optional** and only needed if you want to see results on the ML metrics\
      \ dashboard too. Just as results are shown in an in-notebook table too, IC Ops panel can be displayed in the notebook\
      \ too, as illustrated below (Steps 5 and 6)."
