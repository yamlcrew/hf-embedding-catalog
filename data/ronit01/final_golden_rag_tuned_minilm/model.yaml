- source_sentence: How do the Stop and Delete IC Ops compare in terms of their effects on a run's state, visibility on the
    dashboard, resource usage, artifact preservation, and what further IC Ops can be performed on the run afterward?
  sentences:
  - "API: User-Provided Functions for Run Evals\n===============\n\nUsers can provide the following custom functions as part\
    \ of their eval config to be used in :func:`run_evals()`.\nNote that each leaf config can have its own set of functions\
    \ for all of these.\n\n\nPreprocess Function\n-------------------\n\nMandatory user-provided function to prepare the inputs\
    \ to be given to the generator model. \nIt is invoked for each batch during the evaluation process before generation.\n\
    Pass it directly to the :code:`preprocess_fn` key in your eval config dictionary.\n\nThe system injects into this function\
    \ the batch data, as well as the RAG spec and \nthe prompt manager of an individual leaf config.\n\n\n.. py:function::\
    \ preprocess_fn(batch: dict[str, list], rag: RFLangChainRagSpec, prompt_manager: RFPromptManager) -> dict[str, list]\n\
    \n   :param batch: Dictionary with a batch of examples with dataset field names as keys and lists as values"
  - "Delete\n----\n\nThis IC Op earmarks the run to be deleted from the next chunk onward. \nOn the chart, you will see its\
    \ curves vanish almost immediately. \nYou cannot do any further IC Ops on a deleted run because it will not be visible.\
    \ \nNote that although a deleted run vanishes from the plots, its model checkpoints are still part of \nthe artifacts\
    \ of that experiment so that you have post-hoc audibility.\n"
  - "Formatting Function\n------\n\nOptional user-provided function to format each example (row) of the dataset to construct\
    \ \nthe prompt and completion with relevant roles and system prompt as expected by your model. \nApart from adding the\
    \ system prompt, for conversational data it should format the user \ninstruction and assistant responses as separate message\
    \ dictionary entries.\n\nIt is passed to the :code:`formatting_func` argument of :class:`RFModelConfig`. \nAlso read:\
    \ :doc:`the LoRA and Model Configs page</models>`.\nYou can create multiple variants of these functions and pass them\
    \ all as a single \n:code:`List` to your :class:`RFModelConfig` to create a multi-config specification.\n\nThis function\
    \ is invoked by the underlying HF trainer on all examples of the train dataset \nand (if given) eval dataset on the fly.\n\
    \n\n.. py:function:: sample_formatting_fn(row: Dict[str, Any]) -> Dict[str, List[Dict[str, str]]]\n\n   :param row: Dictionary\
    \ containing a single data example with keys like \"instruction\" and \"response\"\n   :type row: Dict[str, Any]\n\n \
    \  :return: Dictionary with \"prompt\" and \"completion\" keys, each containing a list of chat messages with \"role\"\
    \ and \"content\" fields\n   :rtype: Dict[str, List[Dict[str, str]]]\n\n\n**Example:**\n\n.. code-block:: python\n\n\t\
    # From the SFT tutorial notebook\n\tdef sample_formatting_function(row):\n\t\t\"\"\"Function to preprocess each row from\
    \ dataset\"\"\"\n\t\t# Special tokens for formatting\n\t\tSYSTEM_PROMPT = \"You are a helpful and friendly customer support\
    \ assistant. Please answer the user's query to the best of your ability.\"\n\t\treturn {\n\t\t\t\"prompt\": [\n\t\t\t\t\
    {\"role\": \"system\", \"content\": SYSTEM_PROMPT},\n\t\t\t\t{\"role\": \"user\", \"content\": row[\"instruction\"]},\n\
    \t\t\t],\n\t\t\t\"completion\": [\n\t\t\t\t{\"role\": \"assistant\", \"content\": row[\"response\"]}\n\t\t\t]\n\t\t}"
- source_sentence: How do you set up and run an SFT fine-tuning experiment from scratch using RapidFire AI's full installation,
    from installing the package through launching training and monitoring results?
  sentences:
  - "Resume\n-----\n\nThis IC Op is applicable only to a previously stopped run. \nIt earmarks this run to be resumed from\
    \ the next chunk onward, when it will be added to the mix of \nongoing runs and assigned GPU(s) automatically. \nYou cannot\
    \ resume an already resumed or deleted run."
  - "Confidence Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly\
    \ randomly**, i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies to\
    \ calculate confidence intervals for projected estimates of metrics. \nYou can indicate the confidence level (we recommend\
    \ 95%) and whether to perform \"finite population correction\" (FPC) or not. \nThese values can be specified under the\
    \ key :code:`\"online_strategy_kwargs\"` in your config dictionary as illustrated below.\n\n.. code-block:: python\n\n\
    \    # Based on FiQA RAG tutorial use case\n    \"online_strategy_kwargs\": {\n        \"strategy_name\": \"normal\",\n\
    \        \"confidence_level\": 0.95,\n        \"use_fpc\": True,\n    },\n\nNotation \n^^^^^^^\n\n* :math:`N` = Total\
    \ population size (total number of queries in eval set)\n* :math:`n` = Sample size (number of queries processed so far)\n\
    * :math:`\\hat{p}` = Observed sample proportion or average for an algebraic metric\n* :math:`\\bar{X}` = Sample mean for\
    \ a distributive metric\n* :math:`\\widehat{T}` = Estimated population total for a distributive metric\n* :math:`\\text{Var}(\\\
    widehat{T})` = Variance of the above estimated population total\n* :math:`\\text{SE}` = Standard error (measure of estimate\
    \ uncertainty)\n* :math:`\\text{CI}` = Confidence interval\n* :math:`z` = Z-score for confidence level (1.96 for 95% confidence;\
    \ used in Normal and Wilson)\n* :math:`\\alpha` = Significance level (0.05 for 95% confidence)\n* :math:`n_{\\text{eff}}`\
    \ = Effective sample size (adjusted for FPC in Wilson)\n* :math:`a, b` = Lower and upper bounds of metric value range\n\
    * :math:`R` = Range width, :math:`R = b - a`\n* :math:`\\varepsilon` = Margin of error (half-width of confidence interval\
    \ for Hoeffding)\n* :math:`\\varepsilon_{\\bar{X}}` = Margin of error for sample mean (Hoeffding distributive)\n* :math:`\\\
    text{FPC}` = Finite population correction factor\n\n\nFinite Population Correction (FPC)\n^^^^^^^^^^^^^^^^^^^^^^\n\nWhen\
    \ sampling without replacement from finite populations, enabling FPC \nmultiplies the standard error (SE) by :math:`\\\
    text{FPC} = \\sqrt{(N-n)/(N-1)}` \nwhere :math:`N` is population size and :math:`n` is sample size.\n\n"
  - "Step 4: Run the notebook cells\n-------\n\nRun the cells *one by one* as shown in the above videos. Wait for a cell to\
    \ finish before running the next.\n\n* Imports\n* Load dataset and specify train and eval partitions\n\n  If you want\
    \ to run the notebook faster for demo purposes, downsample the data further as per your wish. Here are some suggested\
    \ reductions. You can also reduce effective batch size by reducing either or both of :code:`per_device_train_batch_size`\
    \ and :code:`gradient_accumulation_steps` in the trainer configs.\n\n  * SFT notebook: \n     .. code-block:: python\n\
    \n        train_dataset=dataset[\"train\"].select(range(128)) # 128 instead of 5000\n        eval_dataset=dataset[\"train\"\
    ].select(range(5000,5032)) # 5032 instead of 5200\n\n  * DPO notebook: \n     .. code-block:: python\n\n        select(range(128))\
    \ # 128 instead of 500\n\n  * GRPO notebook: \n     .. code-block:: python\n\n        train_dataset = get_gsm8k_questions(split=\"\
    train\").select(range(128)) # 128 instead of 5000\n        eval_dataset = get_gsm8k_questions(split=\"test\").select(range(32))\
    \ # 32 instead of 100\n\n* Define example processing function\n\n* Create named RF experiment \n\n* Define custom eval\
    \ metrics function\n\n* Define multi-config knobs for model, LoRA, and SFT Trainer using RapidFire AI wrapper APIs\n\n\
    * Define model creation function for all model types across configs\n\n* Generate config group you want to compare in\
    \ one go\n\n* Launch multi-config training; adjust :code:`num_chunks` as per desired concurrency (see `Run Fit <experiment.html#run-fit>`__\
    \ for details)\n\n  .. code-block:: python\n\n     # Launch training of all configs in the config_group with swap granularity\
    \ of 4 chunks\n     experiment.run_fit(config_group, sample_create_model, train_dataset, eval_dataset, num_chunks=4, seed=42)\n\
    \n  Note that in the same experiment, you can run as many :func:`run_fit()` as you want. All their runs will be superimposed\
    \ on the same plots on the dashboard.\n"
