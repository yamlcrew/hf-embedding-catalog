      Also read: :doc:`the LoRA and Model Configs page</models>`.\nYou can create multiple variants of these functions and\
      \ pass them all as a single \n:code:`List` to your :class:`RFModelConfig` to create a multi-config specification.\n\n\
      This function is invoked by the underlying HF trainer on all examples of the train dataset \nand (if given) eval dataset\
      \ on the fly.\n\n\n.. py:function:: sample_formatting_fn(row: Dict[str, Any]) -> Dict[str, List[Dict[str, str]]]\n\n\
      \   :param row: Dictionary containing a single data example with keys like \"instruction\" and \"response\"\n   :type\
      \ row: Dict[str, Any]\n\n   :return: Dictionary with \"prompt\" and \"completion\" keys, each containing a list of chat\
      \ messages with \"role\" and \"content\" fields\n   :rtype: Dict[str, List[Dict[str, str]]]\n\n\n**Example:**\n\n..\
      \ code-block:: python\n\n\t# From the SFT tutorial notebook\n\tdef sample_formatting_function(row):\n\t\t\"\"\"Function\
      \ to preprocess each row from dataset\"\"\"\n\t\t# Special tokens for formatting\n\t\tSYSTEM_PROMPT = \"You are a helpful\
      \ and friendly customer support assistant. Please answer the user's query to the best of your ability.\"\n\t\treturn\
      \ {\n\t\t\t\"prompt\": [\n\t\t\t\t{\"role\": \"system\", \"content\": SYSTEM_PROMPT},\n\t\t\t\t{\"role\": \"user\",\
      \ \"content\": row[\"instruction\"]},\n\t\t\t],\n\t\t\t\"completion\": [\n\t\t\t\t{\"role\": \"assistant\", \"content\"\
      : row[\"response\"]}\n\t\t\t]\n\t\t}"
  - source_sentence: How do you set up and run an SFT fine-tuning experiment from scratch using RapidFire AI's full installation,
      from installing the package through launching training and monitoring results?
    sentences:
    - "Resume\n-----\n\nThis IC Op is applicable only to a previously stopped run. \nIt earmarks this run to be resumed from\
      \ the next chunk onward, when it will be added to the mix of \nongoing runs and assigned GPU(s) automatically. \nYou\
      \ cannot resume an already resumed or deleted run."
    - "Confidence Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly\
      \ randomly**, i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies\
      \ to calculate confidence intervals for projected estimates of metrics. \nYou can indicate the confidence level (we\
      \ recommend 95%) and whether to perform \"finite population correction\" (FPC) or not. \nThese values can be specified\
      \ under the key :code:`\"online_strategy_kwargs\"` in your config dictionary as illustrated below.\n\n.. code-block::\
      \ python\n\n    # Based on FiQA RAG tutorial use case\n    \"online_strategy_kwargs\": {\n        \"strategy_name\"\
      : \"normal\",\n        \"confidence_level\": 0.95,\n        \"use_fpc\": True,\n    },\n\nNotation \n^^^^^^^\n\n* :math:`N`\
      \ = Total population size (total number of queries in eval set)\n* :math:`n` = Sample size (number of queries processed\
      \ so far)\n* :math:`\\hat{p}` = Observed sample proportion or average for an algebraic metric\n* :math:`\\bar{X}` =\
      \ Sample mean for a distributive metric\n* :math:`\\widehat{T}` = Estimated population total for a distributive metric\n\
      * :math:`\\text{Var}(\\widehat{T})` = Variance of the above estimated population total\n* :math:`\\text{SE}` = Standard\
      \ error (measure of estimate uncertainty)\n* :math:`\\text{CI}` = Confidence interval\n* :math:`z` = Z-score for confidence\
      \ level (1.96 for 95% confidence; used in Normal and Wilson)\n* :math:`\\alpha` = Significance level (0.05 for 95% confidence)\n\
      * :math:`n_{\\text{eff}}` = Effective sample size (adjusted for FPC in Wilson)\n* :math:`a, b` = Lower and upper bounds\
      \ of metric value range\n* :math:`R` = Range width, :math:`R = b - a`\n* :math:`\\varepsilon` = Margin of error (half-width\
      \ of confidence interval for Hoeffding)\n* :math:`\\varepsilon_{\\bar{X}}` = Margin of error for sample mean (Hoeffding\
      \ distributive)\n* :math:`\\text{FPC}` = Finite population correction factor\n\n\nFinite Population Correction (FPC)\n\
      ^^^^^^^^^^^^^^^^^^^^^^\n\nWhen sampling without replacement from finite populations, enabling FPC \nmultiplies the standard\
      \ error (SE) by :math:`\\text{FPC} = \\sqrt{(N-n)/(N-1)}` \nwhere :math:`N` is population size and :math:`n` is sample\
      \ size.\n\n"
    - "Step 4: Run the notebook cells\n-------\n\nRun the cells *one by one* as shown in the above videos. Wait for a cell\
      \ to finish before running the next.\n\n* Imports\n* Load dataset and specify train and eval partitions\n\n  If you\
      \ want to run the notebook faster for demo purposes, downsample the data further as per your wish. Here are some suggested\
      \ reductions. You can also reduce effective batch size by reducing either or both of :code:`per_device_train_batch_size`\
      \ and :code:`gradient_accumulation_steps` in the trainer configs.\n\n  * SFT notebook: \n     .. code-block:: python\n\
      \n        train_dataset=dataset[\"train\"].select(range(128)) # 128 instead of 5000\n        eval_dataset=dataset[\"\
      train\"].select(range(5000,5032)) # 5032 instead of 5200\n\n  * DPO notebook: \n     .. code-block:: python\n\n    \
      \    select(range(128)) # 128 instead of 500\n\n  * GRPO notebook: \n     .. code-block:: python\n\n        train_dataset\
      \ = get_gsm8k_questions(split=\"train\").select(range(128)) # 128 instead of 5000\n        eval_dataset = get_gsm8k_questions(split=\"\
      test\").select(range(32)) # 32 instead of 100\n\n* Define example processing function\n\n* Create named RF experiment\
      \ \n\n* Define custom eval metrics function\n\n* Define multi-config knobs for model, LoRA, and SFT Trainer using RapidFire\
      \ AI wrapper APIs\n\n* Define model creation function for all model types across configs\n\n* Generate config group\
      \ you want to compare in one go\n\n* Launch multi-config training; adjust :code:`num_chunks` as per desired concurrency\
      \ (see `Run Fit <experiment.html#run-fit>`__ for details)\n\n  .. code-block:: python\n\n     # Launch training of all\
      \ configs in the config_group with swap granularity of 4 chunks\n     experiment.run_fit(config_group, sample_create_model,\
      \ train_dataset, eval_dataset, num_chunks=4, seed=42)\n\n  Note that in the same experiment, you can run as many :func:`run_fit()`\
      \ as you want. All their runs will be superimposed on the same plots on the dashboard.\n"
  - source_sentence: How do you set up and run an SFT fine-tuning experiment from scratch using RapidFire AI's full installation,
      from installing the package through launching training and monitoring results?
    sentences:
    - "Formatting Function\n------\n\nOptional user-provided function to format each example (row) of the dataset to construct\
      \ \nthe prompt and completion with relevant roles and system prompt as expected by your model. \nApart from adding the\
      \ system prompt, for conversational data it should format the user \ninstruction and assistant responses as separate\
      \ message dictionary entries.\n\nIt is passed to the :code:`formatting_func` argument of :class:`RFModelConfig`. \n\
      Also read: :doc:`the LoRA and Model Configs page</models>`.\nYou can create multiple variants of these functions and\
      \ pass them all as a single \n:code:`List` to your :class:`RFModelConfig` to create a multi-config specification.\n\n\
      This function is invoked by the underlying HF trainer on all examples of the train dataset \nand (if given) eval dataset\
      \ on the fly.\n\n\n.. py:function:: sample_formatting_fn(row: Dict[str, Any]) -> Dict[str, List[Dict[str, str]]]\n\n\
      \   :param row: Dictionary containing a single data example with keys like \"instruction\" and \"response\"\n   :type\
      \ row: Dict[str, Any]\n\n   :return: Dictionary with \"prompt\" and \"completion\" keys, each containing a list of chat\
      \ messages with \"role\" and \"content\" fields\n   :rtype: Dict[str, List[Dict[str, str]]]\n\n\n**Example:**\n\n..\
      \ code-block:: python\n\n\t# From the SFT tutorial notebook\n\tdef sample_formatting_function(row):\n\t\t\"\"\"Function\
      \ to preprocess each row from dataset\"\"\"\n\t\t# Special tokens for formatting\n\t\tSYSTEM_PROMPT = \"You are a helpful\
      \ and friendly customer support assistant. Please answer the user's query to the best of your ability.\"\n\t\treturn\
      \ {\n\t\t\t\"prompt\": [\n\t\t\t\t{\"role\": \"system\", \"content\": SYSTEM_PROMPT},\n\t\t\t\t{\"role\": \"user\",\
      \ \"content\": row[\"instruction\"]},\n\t\t\t],\n\t\t\t\"completion\": [\n\t\t\t\t{\"role\": \"assistant\", \"content\"\
      : row[\"response\"]}\n\t\t\t]\n\t\t}"
    - "Port conflicts (services already running)\n----------------------------------------\n\nIf you encounter port conflicts,\
      \ you can kill existing processes.\n\n.. code-block:: bash\n\n   lsof -t -i:8852 | xargs kill -9  # mlflow\n   lsof\
      \ -t -i:8851 | xargs kill -9  # dispatcher\n   lsof -t -i:8853 | xargs kill -9  # frontend server\n\nSelect specific\
      \ GPU(s) to use\n-----------------------------\n\nSet the ``CUDA_VISIBLE_DEVICES`` environment variable BEFORE running\
      \ ``rapidfireai start`` to control which GPU(s) RapidFire can see and use.\n\n.. code-block:: bash\n\n   export CUDA_VISIBLE_DEVICES=2\
      \   # use GPU index 2 only\n   rapidfireai start\n\nMultiple GPUs (example: GPUs 0 and 2):\n\n.. code-block:: bash\n\
      \n   export CUDA_VISIBLE_DEVICES=0,2\n   rapidfireai start\n\nFrom a Python script (set before importing/starting RapidFire):\n\
      \n.. code-block:: python\n\n   import os\n   os.environ[\"CUDA_VISIBLE_DEVICES\"] = \"2\"\n   # then start your RapidFire\
      \ workflow\n"
    - "Confidence Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly\
      \ randomly**, i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies\
      \ to calculate confidence intervals for projected estimates of metrics. \nYou can indicate the confidence level (we\
      \ recommend 95%) and whether to perform \"finite population correction\" (FPC) or not. \nThese values can be specified\
      \ under the key :code:`\"online_strategy_kwargs\"` in your config dictionary as illustrated below.\n\n.. code-block::\
      \ python\n\n    # Based on FiQA RAG tutorial use case\n    \"online_strategy_kwargs\": {\n        \"strategy_name\"\
      : \"normal\",\n        \"confidence_level\": 0.95,\n        \"use_fpc\": True,\n    },"
  - source_sentence: What are all the Experiment class methods (experiment ops) provided by RapidFire AI, and what does each
      one do?
    sentences:
    - "Preprocess Function\n-------------------\n\nMandatory user-provided function to prepare the inputs to be given to the\
      \ generator model. \nIt is invoked for each batch during the evaluation process before generation.\nPass it directly\
      \ to the :code:`preprocess_fn` key in your eval config dictionary.\n\nThe system injects into this function the batch\
      \ data, as well as the RAG spec and \nthe prompt manager of an individual leaf config.\n\n\n.. py:function:: preprocess_fn(batch:\
      \ dict[str, list], rag: RFLangChainRagSpec, prompt_manager: RFPromptManager) -> dict[str, list]\n\n   :param batch:\
      \ Dictionary with a batch of examples with dataset field names as keys and lists as values\n   :type batch: dict[str,\
      \ list]\n\n   :param rag: RAG specification object for document chunk retrieval and context serialization\n   :type\
      \ rag: RFLangChainRagSpec\n\n   :param prompt_manager: Prompt manager object for handling instructions and few-shot\
      \ examples\n   :type prompt_manager: RFPromptManager\n\n   :return: Dictionary with the preprocessed batch. It must\
      \ have a reserved key :code:`\"prompts\"` for the fully formatted prompts for the generator. Other key-value pairs from\
      \ the original batch can also be copied over if you want.\n   :rtype: dict[str, list]\n\n\n**Examples:**\n\n.. code-block::\
      \ python\n\n    # Example 1 from FiQA use case: RAG-based preprocessing with document chunk retrieval\n    # This example\
      \ demonstrates how metadata fields ingested via metadata_func in the\n    # document loader (e.g., \"corpus_id\") are\
      \ accessible on each Document object's\n    # .metadata dict after retrieval, enabling retrieval evaluation.\n    def\
      \ sample_preprocess_fn(batch: dict[str, list], rag: RFLangChainRagSpec, prompt_manager: RFPromptManager) -> dict[str,\
      \ list]:\n\t\t\"\"\"Function to prepare the final inputs given to the generator model\"\"\"\n \n\t\tINSTRUCTIONS = \"\
      Utilize your financial knowledge, give your answer or opinion to the input question or subject matter.\"\n \n\t\t# Perform\
      \ batched retrieval over all queries; returns a list of lists of k documents per query\n\t\tall_context = rag.get_context(batch_queries=batch[\"\
      query\"], serialize=False)\n \n\t\t# Extract the retrieved document ids from the context.\n\t\t# The \"corpus_id\" metadata\
      \ field was ingested via metadata_func in the document loader\n\t\t# (see RFLangChainRagSpec examples) and is now accessible\
      \ on each Document object.\n\t\tretrieved_documents = [\n\t\t\t[doc.metadata[\"corpus_id\"] for doc in docs] for docs\
      \ in all_context\n\t\t]\n \n\t\t# Serialize the retrieved documents into a single string per query using the document_template.\n\
      \t\t# If a custom document_template was provided in the RAG spec (e.g., to include title metadata),\n\t\t# it is applied\
      \ here; otherwise the default \"metadata:\\ncontent\" template is used.\n\t\tserialized_context = rag.serialize_documents(all_context)\n\
      \t\tbatch[\"query_id\"] = [int(query_id) for query_id in batch[\"query_id\"]]\n \n\t\t# Each batch to contain conversational\
      \ prompt, retrieved documents, and original 'query_id', 'query', 'metadata'\n\t\treturn {\n\t\t\t\"prompts\": [\n\t\t\
      \t\t[\n\t\t\t\t\t{\"role\": \"system\", \"content\": INSTRUCTIONS},\n\t\t\t\t\t{\n\t\t\t\t\t\t\"role\": \"user\",\n\t\
      \t\t\t\t\t\"content\": f\"Here is some relevant context:\\n{context}. \\nNow answer the following question using the\
      \ context provided earlier:\\n{question}\",\n\t\t\t\t\t},\n\t\t\t\t]\n\t\t\t\tfor question, context in zip(batch[\"\
      query\"], serialized_context)\n\t\t\t],\n\t\t\t\"retrieved_documents\": retrieved_documents,\n\t\t\t**batch,\n\t\t}\n\
      \n.. code-block:: python\n\n    # Example 2 from GSM8K use case: Few-shot learning preprocessing without RAG\n    def\
      \ sample_preprocess_fn(batch: dict[str, list], rag: RFLangChainRagSpec, prompt_manager: RFPromptManager) -> dict[str,\
      \ list]:\n\t\t\"\"\"Function to prepare the final inputs given to the generator model\"\"\"\n\n\t\treturn {\n\t\t\t\"\
      prompts\": [\n\t\t\t\t[\n\t\t\t\t\t{\"role\": \"system\", \"content\": prompt_manager.get_instructions()},\n\t\t\t\t\
      \t{\n\t\t\t\t\t\t\"role\": \"user\",\n\t\t\t\t\t\t\"content\": f\"Here are some examples: \\n{examples}. \\nNow answer\
      \ the following question:\\n{question}\",\n\t\t\t\t\t},\n\t\t\t\t]\n\t\t\t\tfor question, examples in zip(\n\t\t\t\t\
      \tbatch[\"question\"],\n\t\t\t\t\tprompt_manager.get_fewshot_examples(user_queries=batch[\"question\"]),\n\t\t\t\t)\n\
      \t\t\t],\n\t\t\t**batch,\n\t\t}"
    - "SciFact: RAG for Scientific Claim Verification\n=======================\n\nPlease check out the tutorial notebook on\
      \ the link below. Right click on the GitHub link to save that file locally.\n\nRAG for scientific claim verification:\
      \ `View on GitHub <https://github.com/RapidFireAI/rapidfireai/blob/main/tutorial_notebooks/rag-contexteng/rf-tutorial-scifact-full-evaluation.ipynb>`__.\
      \ \n\nThis use case notebook features an all-closed model API workflow, with Open AI calls used for both embedding for\
      \ generation. So, you do not need a GPU to run this notebook.\n\n\nTask, Dataset, and Prompt\n-------\n\nThis tutorial\
      \ shows Retrieval-Augmented Generation (RAG) for verifying scientific claims against evidence.\n\nIt uses the \"SciFact\"\
      \ dataset from the BEIR benchmark; \n`see its details here <https://github.com/allenai/scifact>`__. \nThe dataset contains\
      \ scientific claims that must be labeled as SUPPORT, CONTRADICT, or NOINFO based on retrieved evidence.\n\nThe prompt\
      \ format includes system instructions defining the verification task with an example, \nretrieved evidence documents\
      \ with titles, and the scientific claim to verify.\n\n\nModel, RAG Components, and Configuration Knobs\n-------\n\n\
      We compare 2 generator models via OpenAI API: gpt-5-mini and gpt-4o.\n\nThere are 2 different retrieval/search strategies:\
      \ similarity search and maximum marginal relevance (MMR).\n\nThe RAG pipeline uses:\n\n- **Embeddings**: OpenAI text-embedding-3-small.\n\
      - **Vector Store**: FAISS with CPU-based exact search, i.e., no ANN approximation.\n- **Chunking**: 512-token chunks\
      \ with 32-token overlap using recursive character splitting with tiktoken encoding.\n- **Retrieval**: Top-15 initial\
      \ retrieval.\n- **Reranking**: cross-encoder/ms-marco-MiniLM-L6-v2 with top-5 final documents.\n- **Document Template**:\
      \ Custom template including document titles with content.\n\nAll other knobs are fixed across all configs. Thus, there\
      \ are a total of 4 combinations launched \nwith a simple grid search: 2 generator models x 2 search strategies."
    - "    :param vector_store_cfg: The vector store type and args to store and possibly index embedding vectors for retrieval,\
      \ provided as a single dictionary. \n    \n        - :code:`\"type\"`: The type of vector store to use. Must be one\
      \ of :code:`\"faiss\"`, :code:`\"pgvector\"`, or :code:`\"pinecone\"`. Required.\n        - :code:`\"batch_size\"`:\
      \ Number of vectors per insert batch. Applies to all 3 types of stores. Optional; default is 128."
  - source_sentence: How do you set up and run an SFT fine-tuning experiment from scratch using RapidFire AI's full installation,
      from installing the package through launching training and monitoring results?
    sentences:
    - '`see its details on Hugging Face <https://huggingface.co/datasets/trl-lib/ultrafeedback_binarized>`__.

      We use a sample of 500 training examples for tractable demo runtimes. '
    - "End\n-------\n\nEnd the current experiment to clear out relevant system state and allow you to move on to a new experiment.\
      \ \nPlease do *not* run this when a :func:`run_fit()` is still running. \n\n.. py:function:: end(self) -> None\n\n\t\
      :return: None\n\t:rtype: None\n"
    - "Normal Approximation\n^^^^^^^^^^^^^^^^^^^\n\nThis is the default strategy, and it uses the Central Limit Theorem. \n\
      It is suitable for most cases with non-trivial sample sizes (n > 30). \nIt provides tight intervals when the statistical\
      \ assumptions hold.\n\n* For algebraic metrics:\n\n.. math::\n\n   \\text{SE}_{\\hat{p}} = \\sqrt{\\frac{\\hat{p}(1-\\\
      hat{p})}{n}} \\times \\text{FPC}\n\n   \\text{CI} = \\hat{p} \\pm 1.96 \\cdot \\text{SE}_{\\hat{p}}\n\n\n* For distributive\
      \ metrics: \n\nEstimate population total :math:`\\widehat{T} = N\\bar{X}` with \nvariance :math:`\\text{Var}(\\widehat{T})\
      \ = N^2 \\cdot \\bar{X}(1-\\bar{X})/n` (FPC-adjusted).\n\n\nWilson Score\n^^^^^^^^^^^\n\nThis strategy is better for\
      \ small sample sizes or metrics near 0/1 boundaries. \nIt is more robust than Normal Approximation for extreme proportions.\
      \ \n\n* For algebraic metrics:\n\n.. math::\n\n   \\text{center} = \\frac{\\hat{p} + z^2/(2n_{\\text{eff}})}{1 + z^2/n_{\\\
      text{eff}}}\n\n   \\text{margin} = \\frac{z\\sqrt{\\hat{p}(1-\\hat{p})/n_{\\text{eff}} + z^2/(4n_{\\text{eff}}^2)}}{1\
      \ + z^2/n_{\\text{eff}}}\n\nwhere :math:`n_{\\text{eff}} = n/\\text{FPC}^2` when using FPC. \nThe Wilson confidence\
      \ interval is then :math:`[\\text{center} - \\text{margin}, \\text{center} + \\text{margin}]`,\nclamped to [0, 1].\n\
      \n* For distributive metrics, this falls back to Normal Approximation. "
