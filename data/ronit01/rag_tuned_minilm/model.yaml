  sentences:
  - "Note that if you plan to use only OpenAI APIs and not self-hosted models (for embedding or generation), you do NOT need\
    \ GPUs on your machine. \nBut you must provide a valid OpenAI API key via a config argument as shown in the GSM8K and\
    \ SciFact tutorial notebooks.\n\n\nStep 1: Install dependencies and package\n-----------------------\n\nObtain the RapidFire\
    \ AI OSS package from pypi (includes all dependencies) and ensure it is installed correctly.\n\n.. important::\n\n  Requires\
    \ Python 3.12+. Ensure that ``python3`` resolves to Python 3.12 before creating the venv.\n\n.. code-block:: bash\n\n\
    \   python3 --version  # must be 3.12.x\n   python3 -m venv .venv\n   source .venv/bin/activate\n\n   pip install rapidfireai\n\
    \n   rapidfireai --version\n   # Verify it prints the following:\n   # RapidFire AI 0..14.0\n\n   # Due to current issue:\
    \ https://github.com/huggingface/xet-core/issues/527\n   pip uninstall -y hf-xet\n\n\nThe tutorial notebooks for RAG evals\
    \ do not use any gated models from Hugging Face.\nIf you want to access gated models, provide your Hugging Face account\
    \ token.\nFor more details on that, :doc:`see Step 1 here</walkthroughft>`.\n\n\nStep 2: Initialize and start RapidFire\
    \ AI server\n------------\n\nRun the following commands to initialize rapidfireai to use the correct dependencies for\
    \ RAG evals:\n\n.. code-block:: bash\n\n   rapidfireai init --evals\n   # It will install specific dependencies and initialize\
    \ rapidfireai for RAG evals\n\n\n.. note::\n  You need to run init **only once** for a new venv or when switching GPU(s)\
    \ on your machine. You do NOT need to run it after a reboot or for a new terminal tab.\n\n\nNext start RapidFire AI services:\
    \ the frontend with the ML metrics dashboard and the API server. \nThe frontend URL shown below can be opened on your\
    \ local browser.\n\n.. code-block:: bash\n\n   rapidfireai start\n   # It should print about 50 lines, including the following:\n\
    \   # ...\n   # RapidFire Frontend is ready\n   # Open your browser and navigate to: http://0.0.0.0:8853\n   # ...\n \
    \  # Press Ctrl+C to stop all services\n\n.. important::\n\n  Do NOT proceed until the start is successful with \"Available\
    \ endpoints\" printed as above. Leave this terminal running while you work through the tutorial notebooks. \n\n\nIf you\
    \ close the terminal in which you started rapidfireai or if you rebooted your machine, \njust start rapidfireai again\
    \ with the above command.\n\nIf the start command fails for whatever reason, wait for half a minute and rerun it.\nFor\
    \ diagnostics and common fixes (including Linux/macOS and Windows steps), see :doc:`Troubleshooting </troubleshooting>`.\n\
    \n.. note::\n  For RAG/context engineering experiments with :func:`run_evals()`, starting the server is **optional** and\
    \ only needed if you want to see results on the ML metrics dashboard too. Just as results are shown in an in-notebook\
    \ table too, IC Ops panel can be displayed in the notebook too, as illustrated below (Steps 5 and 6)."
  - "RFDPOConfig\n------\n\nThis is a wrapper around :class:`DPOConfig` in HF TRL. \nThe full signature and list of arguments\
    \ are available on `this page \n<https://huggingface.co/docs/trl/dpo_trainer#trl.DPOConfig>`__.\n\nAgain, the only difference\
    \ here is that the individual arguments (knobs) can be :class:`List` \nvalued or :class:`Range` valued in :class:`RFDPOConfig`.\
    \ \nThat is how you can specify a base set of knob combinations from which a config group can \nbe produced. Also read\
    \ :doc:`the Multi-Config Specification page</configs>`.\nOther than the multi-config specification, this class preserves\
    \ all semantics of \nHugging Face's DPO trainer under the hood. \n\n\n**Example:**\n\n.. code-block:: python\n\n\t# Based\
    \ on the DPO tutorial notebook; one knob has list of values\n\tbase_dpo_config = RFDPOConfig(\n\t\tmodel_adapter_name=\"\
    default\",\n\t\tref_adapter_name=\"reference\",\n\t\tforce_use_ref_model=False, \n\t\tloss_type=\"sigmoid\",\n\t\tbeta=List([0.1,0.001]),\
    \ \n\t\tmax_prompt_length=1024,\n\t\tmax_completion_length=1024,\n\t\tmax_length=2048, \n\t\tper_device_train_batch_size=2,\n\
    \t\tgradient_accumulation_steps=4,\n\t\tlearning_rate=5e-6, \n\t\twarmup_ratio=0.1,\n\t\tweight_decay=0,\n\t\tlr_scheduler_type=\"\
    linear\",\n\t\toptim=\"adamw_8bit\",\n\t\tnum_train_epochs=1, \n\t\tlogging_strategy=\"steps\",\n\t\tlogging_steps=1,\n\
    \t\tbf16=True,\n\t\tsave_strategy=\"epoch\",\n\t)\n\n\nJust like for SFT, you can specify an FSDP configuration for DPO\
    \ too for larger LLMs that need cross-GPU partitioning (within a machine).\n\n**Example:**\n\n.. code-block:: python\n\
    \n\t# From the DPO FSDP Lite notebook\n\tbase_dpo_config_lite = RFDPOConfig(\n\t\t...\n\t\tfsdp=\"full_shard auto_wrap\"\
    ,\n\t\tfsdp_config={\n\t\t\t\"backward_prefetch\": \"backward_pre\",\n\t\t\t\"forward_prefetch\": True,\n\t\t\t\"use_orig_params\"\
    : False,\n\t\t\t\"cpu_ram_efficient_loading\": True,\n\t\t\t\"offload_params\": False,\n\t\t\t\"sync_module_states\":\
    \ True,\n\t\t\t\"min_num_params\": 1000000,\n\t\t\t\"limit_all_gathers\": True,\n\t\t\t\"sharding_strategy\": \"FULL_SHARD\"\
    ,\n\t\t\t\"auto_wrap_policy\": \"TRANSFORMER_BASED_WRAP\",\n\t\t\t\"activation_checkpointing\":False\n\t\t}\n\t)\n\n\n\
    RFGRPOConfig\n------\n\nThis is a wrapper around :class:`GRPOConfig` in HF TRL. \nThe full signature and list of arguments\
    \ are available on `this page \n<https://huggingface.co/docs/trl/grpo_trainer#trl.GRPOConfig>`__.\n\nAgain, the only difference\
    \ here is that the individual arguments (knobs) can be :class:`List` \nvalued or :class:`Range` valued in :class:`RFGROConfig`.\
    \ \nThat is how you can specify a base set of knob combinations from which a config group can \nbe produced. Also read\
    \ :doc:`the Multi-Config Specification page</configs>`.\nOther than the multi-config specification, this class preserves\
    \ all semantics of \nHugging Face's GRPO trainer under the hood. \n\n**Example:**\n\n.. code-block:: python\n\n\t# Based\
    \ on the GRPO tutorial notebook\n\tRFGRPOConfig(\n\t\tlearning_rate=5e-6,\n\t\twarmup_ratio=0.1,\n\t\tweight_decay=0.1,\n\
    \t\tmax_grad_norm=0.1,\n\t\tadam_beta1=0.9,\n\t\tadam_beta2=0.99,\n\t\tlr_scheduler_type = \"linear\",\n\t\tper_device_train_batch_size=4,\n\
    \t\tgradient_accumulation_steps=4,\n\t\tnum_generations=8,\n\t\toptim =\"adamw_8bit\",\n\t\tnum_train_epochs=2,\n\t\t\
    max_prompt_length=1024,\n\t\tmax_completion_length=1024,\n\t\tlogging_steps=2,\n\t\teval_steps=5,\n\t)\n\n.. note::\n\
    \  As of this writing, out-of-the-box support for FSDP for GRPO is still in the works. Watch this space for updates."
  - "For RAG and Context Engineering\n------\n\nWe have one use case example each for an all-local model, all-OpenAI, and\
    \ a hybrid workflow: \nFiQA RAG Q&A chatbot, SciFact RAG for scientific claim verification, and \nGSM8K few-shot/context\
    \ engineering for math reasoning, respectively.\nThis set will expand over time to more examples based on community inputs."
- source_sentence: How does RapidFire AI's adaptive execution engine differ from traditional sequential execution for multi-config
    experiments?
  sentences:
  - ".. py:function:: __init__(self, experiment_name: str, mode: str = \"fit\", experiments_path: str = \"./rapidfire_experiments\"\
    ) -> None\n\n\t:param experiment_name: Unique name for this experiment\n\t:type experiment_name: str\n\t\n\t:param mode:\
    \ Mode of this experiment, either :code:`\"fit\"` or :code:`\"eval\"`; default is :code:`\"fit\"`\n\t:type mode: str\n\
    \t\n\t:param experiments_path: Path to a folder to store this experiment's artifacts. Default is ``\"./rapidfire_experiments\"\
    ``)\n\t:type experiments_path: str, optional \n\n\t:return: None\n\t:rtype: None"
  - "Reward Functions\n------\n\nUser-provided reward function(s) needed for GRPO. You can create as many reward functions\
    \ as you \nlike with custom names.\n\nA list of such functions is passed to the :code:`reward_funcs` argument of :class:`RFModelConfig`.\
    \ \nAlso read: :doc:`the LoRA and Model Configs page</models>`.\nYou can create multiple variants of this list with different\
    \ subsets of functions and pass them \nall as a single :code:`List` to your :class:`RFModelConfig` to create a multi-config\
    \ specification.\n\nThese functions are invoked by the underlying HF trainer on the generated outputs on the fly.\n\n\n\
    .. py:function:: reward_function(prompts, completions, completions_ids, trainer_state, **kwargs) -> List[float]\n\n\t\
    :param prompts: List of input prompts that produced the completions.\n\t:type prompts: List[str] | List[List[Dict[str,\
    \ str]]]\n\n\t:param completions: List of generated completions corresponding to above prompts.\n\t:type completions:\
    \ List[str] | List[List[Dict[str, str]]]\n\n\t:param completions_ids: List of tokenized completions (token IDs) corresponding\
    \ to each completion.\n\t:type completions_ids: List[List[int]]\n\n\t:param trainer_state: Current state of the trainer.\
    \ Useful for implementing dynamic reward functions like curriculum learning where rewards adjust based on training progress.\n\
    \t:type trainer_state: transformers.TrainerState\n\n\t:param kwargs: Additional keyword arguments containing all dataset\
    \ columns (except \"prompt\"). For example, if the dataset contains a \"ground_truth\" column, it will be passed as a\
    \ keyword argument.\n\t:type kwargs: Any\n\n\t:return: List of reward scores, one per single completion.\n\t:rtype: List[float]\
    \ | None\n\n\n**Examples:**\n\n.. code-block:: python\n\n    # From the GRPO tutorial notebook\n    def correctness_reward_func(prompts,\
    \ completions, answer, **kwargs) -> list[float]:\n\n        def extract_xml_answer(text: str) -> str:\n            answer\
    \ = text.split(\"<answer>\")[-1]\n            answer = answer.split(\"</answer>\")[0]\n            return answer.strip()\n\
    \n        responses = [completion[0]['content'] for completion in completions]\n        q = prompts[0][-1]['content']\n\
    \        extracted_responses = [extract_xml_answer(r) for r in responses]\n        # x('-'*20, f\"Question:\\n{q}\", f\"\
    \\nAnswer:\\n{answer[0]}\", f\"\\nResponse:\\n{responses[0]}\", f\"\\nExtracted:\\n{extracted_responses[0]}\")\n     \
    \   return [2.0 if r == a else 0.0 for r, a in zip(extracted_responses, answer)]\n\n    def strict_format_reward_func(completions,\
    \ **kwargs) -> list[float]:\n        \"\"\"Reward function that checks if the completion has a specific format.\"\"\"\n\
    \        import re\n        pattern = r\"^<reasoning>\\n.*?\\n</reasoning>\\n<answer>\\n.*?\\n</answer>\\n$\"\n      \
    \  responses = [completion[0][\"content\"] for completion in completions]\n        matches = [re.match(pattern, r) for\
    \ r in responses]\n        return [0.5 if match else 0.0 for match in matches]\n\n**Notes:**\n\nNote that TRL injects\
    \ into a reward function lists of prompts, completions, completion IDs, and trainer \nstate as keyword arguments. You\
    \ can use only a subset of these in your reward function signature as \nlong as you include :code:`**kwargs`, as shown\
    \ in the second example above.\n\nDepending on the dataset format, :code:`prompts` and :code:`completions` will be either\
    \ lists of \nstrings (standard format) or lists of message dictionaries (conversational format). \nStandard format is\
    \ usually common for text completion tasks, simple Q&A, code generation, and \nmathematical reasoning.\nConversational\
    \ format is needed for multi-turn conversations, chat models with system prompts, \nrole-playing scenarios, and complex\
    \ dialogue systems.\nMake sure your reward function can handle both cases if you dataset includes both types.\n\nThe return\
    \ type of every reward function must be a list of floats, one per completion. \nIt can also return :code:`None` for examples\
    \ when the reward function is not applicable, \nwhich is useful for multi-task training. "
  - "This use case notebook features an hybrid workflow spanning a self-hosted open LLM for embeddings and an Open AI call\
    \ for generation. \n\n\nTask, Dataset, and Prompt\n-------\n\nThis tutorial shows few-shot prompting as part of context\
    \ engineering for solving grade school math word problems.\n\nIt uses the \"GSM8K\" dataset; \n`see its details here <https://huggingface.co/datasets/openai/gsm8k>`__.\
    \ \nThe dataset contains grade school math word problems requiring multi-step reasoning.\n\nThe prompt format includes\
    \ system instructions defining the assistant as a math problem solver, \nsemantically selected few-shot examples, and\
    \ the target question to solve.\n\n\nModel, Few-Shot Selection, and Configuration Knobs\n-------\n\nWe compare 2 generator\
    \ models via OpenAI API: gpt-5-mini and gpt-4o.\n\nThere are 2 different reasoning effort levels for the first model only:\
    \ medium and high.\n\nThe few-shot prompting pipeline uses:\n\n- **Example Selection**: Semantic similarity-based selection\
    \ using sentence-transformers/all-MiniLM-L6-v2 embeddings.\n- **Example Pool**: 10 hand-crafted examples covering diverse\
    \ problem types.\n- **Few-Shot k Values**: 2 different values: 3 and 5 examples per prompt.\n- **Prompt Template**: Chain-of-thought\
    \ style with step-by-step reasoning and final answer after \"####\".\n\nAll other knobs are fixed across all configs.\
    \ Thus, there are a total of 6 combinations launched \nwith a union of two grids across generator, reasoning effort levels,\
    \ and few-shot k values: 1 x 1 x 2 + 1 x 2 x 2 = 6."
- source_sentence: What are the two knob set generators currently supported by RapidFire AI for creating multi-config specifications?
  sentences:
  - "ImportError in between Experiments\n------\n\nIf you run multiple experiments back to back from the same notebook/IDE\
    \ session, you might \nsee the following error appear occasionally: \n\n.. code-block:: python\n\n   ImportError: cannot\
    \ import name 'GenerationMixin' from 'transformers.generation'\n\nThis is caused by stray Python processes from the previous\
    \ experiment not ending properly. \nIf you see this error, we recommend the following steps:\n\n* Run the command :code:`ps\
    \ - ef | grep python`, look for \"multiprocessing.spawn\"/\"defunct\" processes, and kill if there are any with command\
    \ :code:`kill -9 [PID]`.\n\n* Wait for about 2 minutes regardless of whether there are processes to kill as above.\n\n\
    * Restart the kernel and then proceed with your new experiment."
  - "ImportError in between Experiments\n------\n\nIf you run multiple experiments back to back from the same notebook/IDE\
    \ session, you might \nsee the following error appear occasionally: \n\n.. code-block:: python\n\n   ImportError: cannot\
    \ import name 'GenerationMixin' from 'transformers.generation'\n\nThis is caused by stray Python processes from the previous\
    \ experiment not ending properly. \nIf you see this error, we recommend the following steps:\n\n* Run the command :code:`ps\
    \ - ef | grep python`, look for \"multiprocessing.spawn\"/\"defunct\" processes, and kill if there are any with command\
    \ :code:`kill -9 [PID]`.\n\n* Wait for about 2 minutes regardless of whether there are processes to kill as above.\n\n\
    * Restart the kernel and then proceed with your new experiment."
