- source_sentence: How do you set up and run an SFT fine-tuning experiment from scratch using RapidFire AI's full installation,
    from installing the package through launching training and monitoring results?
  sentences:
  - "Step 4: Run the notebook cells\n-------\n\nRun the cells *one by one* as shown in the above videos. Wait for a cell to\
    \ finish before running the next.\n\n* Imports\n* Load dataset and specify train and eval partitions\n\n  If you want\
    \ to run the notebook faster for demo purposes, downsample the data further as per your wish. Here are some suggested\
    \ reductions. You can also reduce effective batch size by reducing either or both of :code:`per_device_train_batch_size`\
    \ and :code:`gradient_accumulation_steps` in the trainer configs.\n\n  * SFT notebook: \n     .. code-block:: python\n\
    \n        train_dataset=dataset[\"train\"].select(range(128)) # 128 instead of 5000\n        eval_dataset=dataset[\"train\"\
    ].select(range(5000,5032)) # 5032 instead of 5200\n\n  * DPO notebook: \n     .. code-block:: python\n\n        select(range(128))\
    \ # 128 instead of 500\n\n  * GRPO notebook: \n     .. code-block:: python\n\n        train_dataset = get_gsm8k_questions(split=\"\
    train\").select(range(128)) # 128 instead of 5000\n        eval_dataset = get_gsm8k_questions(split=\"test\").select(range(32))\
    \ # 32 instead of 100\n\n* Define example processing function\n\n* Create named RF experiment \n\n* Define custom eval\
    \ metrics function\n\n* Define multi-config knobs for model, LoRA, and SFT Trainer using RapidFire AI wrapper APIs\n\n\
    * Define model creation function for all model types across configs\n\n* Generate config group you want to compare in\
    \ one go\n\n* Launch multi-config training; adjust :code:`num_chunks` as per desired concurrency (see `Run Fit <experiment.html#run-fit>`__\
    \ for details)\n\n  .. code-block:: python\n\n     # Launch training of all configs in the config_group with swap granularity\
    \ of 4 chunks\n     experiment.run_fit(config_group, sample_create_model, train_dataset, eval_dataset, num_chunks=4, seed=42)\n\
    \n  Note that in the same experiment, you can run as many :func:`run_fit()` as you want. All their runs will be superimposed\
    \ on the same plots on the dashboard.\n"
  - "RFOpenAIAPIModelConfig\n------\n\nThis is a wrapper around OpenAI's API client config and chat completion parameters.\
    \ \nThe full list of their arguments are available on `this page <https://platform.openai.com/docs/api-reference/chat/create>`__.\n\
    \nThe difference here is that the individual arguments (knobs) can be :class:`List` valued or \n:class:`Range` valued\
    \ in an :class:`RFOpenAIAPIModelConfig`. \nThat is how you can specify a base set of knob combinations from which a config\
    \ group can \nbe produced. Also read :doc:`the Multi-Config Specification page</configs>`.\n\n.. py:class:: RFOpenAIAPIModelConfig\n\
    \n  :param client_config: A dictionary necessary for initializing the AsyncOpenAI client. All knobs given in this dictionary\
    \ are simply passed to the AsyncOpenAI client as is. We recommend listing at least the following knobs.\n  \n    * :code:`\"\
    api_key\"`: Your OpenAI API key for authentication. Note that we are NOT able to provide a publicly visible API key.\n\
    \    * :code:`\"max_retries\"`: Maximum number of retry attempts for failed API calls. Default is 2.\n    * :code:`\"\
    timeout\"`: Request timeout in seconds. Optional.\n    \n  :type client_config: dict[str, Any]\n\n  :param model_config:\
    \ A dictionary to control the chat completion behavior with OpenAI's Chat Completions API. All knobs given in this dictionary\
    \ are simply passed to the OpenAI API as is. The API will use its defaults for unspecified knobs. We recommend listing\
    \ at least the following knobs.\n\n    * :code:`\"model\"`: Name of the OpenAI model to use, e.g., \"gpt-5-mini\".\n \
    \   * :code:`\"temperature\"`: What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the\
    \ output more random, while lower values like 0.2 will make it more focused and deterministic. OpenAI recommends altering\
    \ this or :code:`\"top_p\"` but not both.\n    * :code:`\"max_completion_tokens\"`: Upper bound for the number of tokens\
    \ that can be generated for a completion, including visible output tokens and reasoning tokens.\n    * :code:`\"reasoning_effort\"\
    `: Constrains effort for reasoning models. Currently supported values are \"minimal\", \"low\", \"medium\", and \"high\"\
    . Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response. The gpt-5-pro\
    \ model defaults to (and only supports) \"high\" reasoning effort.\n\t* :code:`\"top_p\"`: Alternative to temperature-based\
    \ sampling called nucleus sampling. The model considers the results of the tokens with top_p probability mass. So 0.1\
    \ means only the tokens comprising the top 10% probability mass are considered. OpenAI recommends altering this or :code:`\"\
    temperature\"` but not both.\n\n  :type model_config: dict[str, Any]\n\n  :param rpm_limit: Rate limit for requests per\
    \ minute to the OpenAI API. Used for throttling to avoid exceeding Open AI API quotas. Check the rate limit published\
    \ by Open AI for details on your tier and the latest per-model limits on `this page <https://platform.openai.com/docs/guides/rate-limits>`__.\n\
    \  :type rpm_limit: int\n\n  :param tpm_limit: Rate limit for tokens per minute to the OpenAI API. Used for throttling\
    \ to avoid exceeding API quotas. See the rate limit page above for details.\n  :type tpm_limit: int\n\n  :param rag: An\
    \ instance of a RapidFire AI RAG pipeline spec. Also read :doc:`the API: RFLangChainRagSpec page </ragspecs>`.\n  :type\
    \ rag: RFLangChainRagSpec\n\n  :param prompt_manager: An instance of a RapidFire AI PromptManager. Also read :doc:`the\
    \ API: Prompt Manager and Other Eval Config Knobs page </promptothers>`.\n  :type prompt_manager: PromptManager\n\n  ..\
    \ seealso::\n     - `OpenAI Chat Completions API Reference <https://platform.openai.com/docs/api-reference/chat/create>`_\n\
    \     - `OpenAI Python Client Documentation <https://github.com/openai/openai-python>`_\n     - :doc:`API: RFLangChainRagSpec\
    \ </ragspecs>`\n     - :doc:`API: Prompt Manager and Other Eval Config Knobs page </promptothers>`\n\n\n**Example:**\n\
    \n.. code-block:: python\n\n\t# Based on GSM8K chatbot tutorial notebook; specify your OPENAI_API_KEY beforehand\n\topenai_config1\
    \ = RFOpenAIAPIModelConfig(\n\t\tclient_config={\"api_key\": OPENAI_API_KEY, \"max_retries\": 2},\n\t\tmodel_config={\n\
    \t\t\t\"model\": \"gpt-5-mini\",\n\t\t\t\"max_completion_tokens\": 1024,\n\t\t\t\"reasoning_effort\": \"medium\", \n\t\
    \t},\n\t\trpm_limit=500,\n\t\ttpm_limit=500_000,\n\t\trag=None,\n\t\tprompt_manager=fewshot_prompt_manager,\n\t)\t"
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
- source_sentence: What is the default value of the text_key metadata field name used to store raw text content in Pinecone
    vector store configurations?
  sentences:
  - "Experiment Constructor \n------\n\nConstructor to instantiate a new experiment. \n\n.. py:function:: __init__(self, experiment_name:\
    \ str, mode: str = \"fit\", experiments_path: str = \"./rapidfire_experiments\") -> None\n\n\t:param experiment_name:\
    \ Unique name for this experiment\n\t:type experiment_name: str\n\t\n\t:param mode: Mode of this experiment, either :code:`\"\
    fit\"` or :code:`\"eval\"`; default is :code:`\"fit\"`\n\t:type mode: str\n\t\n\t:param experiments_path: Path to a folder\
    \ to store this experiment's artifacts. Default is ``\"./rapidfire_experiments\"``)\n\t:type experiments_path: str, optional\
    \ \n\n\t:return: None\n\t:rtype: None\n"
  - "End\n-------\n\nEnd the current experiment to clear out relevant system state and allow you to move on to a new experiment.\
    \ \nPlease do *not* run this when a :func:`run_fit()` is still running. \n\n.. py:function:: end(self) -> None\n\n\t:return:\
    \ None\n\t:rtype: None\n"
  - "Create Model Function\n------\n\nMandatory user-provided function to create HuggingFace model and tokenizer objects based\
    \ on the  \nmodel type(s) and name(s) given in the :code:`RFModelConfig` and multi-config specification. \nAlso read :doc:`the\
    \ LoRA and Model Configs page</models>`.\nA model can be imported from the Hugging Face model hub or read from a local\
    \ checkpoint file. \n\nIt is passed to :func:`run_fit()` directly. Also read :doc:`the Experiment page</experiment>`.\n\
    \nThis function is invoked when a trainer object is created for each run. \n\n\n.. py:function:: create_model_fn(model_config:\
    \ Dict[str, Any]) -> Tuple[transformers.PreTrainedModel, transformers.PreTrainedTokenizer]\n\n  :param model_config: Dictionary\
    \ injected by RapidFire AI into this user-defined function with all key-value pairs for one model config output by the\
    \ config-group generator.\n  :type model_config: Dict[str, Any]\n\n  :return: Tuple containing the initialized Hugging\
    \ Face model (e.g., ``AutoModelForCausalLM``, ``AutoModelForSequenceClassification``) and tokenizer (e.g., ``AutoTokenizer``,\
    \ ``PreTrainedTokenizer``) objects\n  :rtype: Tuple[transformers.PreTrainedModel, transformers.PreTrainedTokenizer]\n\n\
    \n**Example:**\n\n.. code-block:: python\n\n\t# From the SFT tutorial notebook\n\tdef sample_create_model(model_config):\n\
    \    \t\"\"\"Function to create model object for any given config; must return tuple of (model, tokenizer)\"\"\"\n\t\t\
    from transformers import AutoModelForCausalLM, AutoTokenizer, AutoModelForSeq2SeqLM, AutoModelForMaskedLM\n\t\t\n\t\t\
    model_name = model_config[\"model_name\"]\n\t\tmodel_type = model_config[\"model_type\"]\n\t\tmodel_kwargs = model_config[\"\
    model_kwargs\"]\n\t\t\n\t\tif model_type == \"causal_lm\":\n\t\t\tmodel = AutoModelForCausalLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"seq2seq_lm\":\n\t\t\tmodel = AutoModelForSeq2SeqLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"masked_lm\":\n\t\t\tmodel = AutoModelForMaskedLM.from_pretrained(model_name,\
    \ **model_kwargs)\n\t\telif model_type == \"custom\":\n            # Handle custom model loading logic, e.g., loading\
    \ your own checkpoints\n            # model = ... \n\t\t\tpass\n\t\telse:\n\t\t\t# Default to causal LM\n\t\t\tmodel =\
    \ AutoModelForCausalLM.from_pretrained(model_name, **model_kwargs)\n\n\t\ttokenizer = AutoTokenizer.from_pretrained(model_name)\n\
    \n\t\treturn (model,tokenizer)"
- source_sentence: How does the compute_metrics function differ between the run_fit() (training) pipeline and the run_evals()
    pipeline in terms of its signature, invocation timing, and what it receives as input?
  sentences:
  - "Run Evals\n------\n\nThe main function to launch LLM evaluation (evals), including with optional RAG, for a given config\
    \ group in one go. \nSee :doc:`the Multi-Config Specification page</configs>` for more details on how to construct a config\
    \ group. \n\n\n.. py:function:: run_evals(self, config_group: Any, dataset: Dataset, num_shards: int=4, num_actors: int,\
    \ seed: int=42) -> dict[int, tuple[dict, dict]]:\n\n\t:param config_group: Single evals config knob dictionary, a generated\
    \ config group, or a :code:`list` of configs or config groups\n\t:type config_group: Evals config-group or list as described\
    \ in :doc:`the Multi-Config Specification page</configs>`\n\n\t:param dataset: Evaluation dataset to measure eval metrics\n\
    \t:type dataset: Dataset\n\n\t:param num_shards: Number of logical splits of data to control degree of concurrency for\
    \ multi-config execution (recommended: at least 4)\n\t:type num_shards: int\n\n\t:param num_actors: Number of parallel\
    \ worker processes per machine to control degree of concurrency; (default: number of GPUs); (recommended max 16, if machine\
    \ has no GPUs)\n\t:type num_actors: int, optional\n\n\t:param seed: Seed to control randomness for online aggregation\
    \ (default: 42)\n\t:type seed: int, optional\n\n\t:return: Dictionary with a key being run/config ID and a value being\
    \ a 2-tuple with a dictionary each for all aggregated metrics and all cumulative metrics\n\t:rtype: dict[int, tuple[dict,\
    \ dict]]\n\n**Example:**\n\n.. code-block:: python\n\n\t# Based on FiQA RAG chatbot tutorial notebook\n\t>>> experiment.run_evals(configs=config_group,\
    \ dataset=fiqa_dataset, num_shards=4, num_actors=8, seed=42)\n\tStarted 8 actor processes ...\n\n**Notes:**\n\nThis method\
    \ auto-generates the ML metrics as per user specification and lists them in an auto-updated table \nshown on the notebook\
    \ itself (and soon, on the ML metrics dashboard also).\nAlongside the metrics table, the Interactive Control (IC) Ops\
    \ panel will also appear on the notebook itself.\nNote that :func:`run_evals()` must be actively running for you to be\
    \ able to use IC Ops.\n\nWithin an experiment, you can rerun :func:`run_evals()` as many times as you want. All of them\
    \ \nwill be overlaid on the same plots on the ML metrics dashboard.\n\nThe :code:`config_group` argument allows you to\
    \ construct various knob combinations for inference pipelines \nand launch them in one go. These pipelines can involve\
    \ LLMs running on your GPUs, or OpenAI API calls, or both. \n\nJust like with :func:`run_fit()` above, you can provide\
    \ a single config dictionary, a :code:`list` of config \ndictionaries, a config group generator output (:func:`RFGridSearch()`\
    \ or :func:`RFRandomSearch()` for now), \nor even a :code:`list` with mix of configs or config group generator outputs\
    \ as its elements.\nPlease see the :doc:`the Multi-Config Specification page</search>` for more details. \n\nThe :code:`num_shards`\
    \ argument is identical to the :code:`num_chunks` argument of :func:`run_fit()` above. \nThat is, it let you balance the\
    \ degree of concurrency for cross-config comparisons against the (minor) \nextra swapping overhead incurred. Again, we\
    \ recommend at least 4, which means you will see results being \nupdated for all runs on 1/4th of the data at a time.\n\
    \nUnlike :func:`run_fit()`, this function does have a return value. In particular, it will return a dictionary \nwith\
    \ the run/config ID as the key. The value is a 2-tuple with a dictionary each for all aggregated metrics \nand all cumulative\
    \ metrics."
  - "Port conflicts (services already running)\n----------------------------------------\n\nIf you encounter port conflicts,\
    \ you can kill existing processes.\n\n.. code-block:: bash\n\n   lsof -t -i:8852 | xargs kill -9  # mlflow\n   lsof -t\
    \ -i:8851 | xargs kill -9  # dispatcher\n   lsof -t -i:8853 | xargs kill -9  # frontend server\n\nSelect specific GPU(s)\
    \ to use\n-----------------------------\n\nSet the ``CUDA_VISIBLE_DEVICES`` environment variable BEFORE running ``rapidfireai\
    \ start`` to control which GPU(s) RapidFire can see and use.\n\n.. code-block:: bash\n\n   export CUDA_VISIBLE_DEVICES=2\
    \   # use GPU index 2 only\n   rapidfireai start\n\nMultiple GPUs (example: GPUs 0 and 2):\n\n.. code-block:: bash\n\n\
    \   export CUDA_VISIBLE_DEVICES=0,2\n   rapidfireai start\n\nFrom a Python script (set before importing/starting RapidFire):\n\
    \n.. code-block:: python\n\n   import os\n   os.environ[\"CUDA_VISIBLE_DEVICES\"] = \"2\"\n   # then start your RapidFire\
    \ workflow\n"
  - "API: User-Provided Functions for Run Evals\n===============\n\nUsers can provide the following custom functions as part\
    \ of their eval config to be used in :func:`run_evals()`.\nNote that each leaf config can have its own set of functions\
    \ for all of these.\n\n\nPreprocess Function\n-------------------\n\nMandatory user-provided function to prepare the inputs\
    \ to be given to the generator model. \nIt is invoked for each batch during the evaluation process before generation.\n\
    Pass it directly to the :code:`preprocess_fn` key in your eval config dictionary.\n\nThe system injects into this function\
    \ the batch data, as well as the RAG spec and \nthe prompt manager of an individual leaf config.\n\n\n.. py:function::\
    \ preprocess_fn(batch: dict[str, list], rag: RFLangChainRagSpec, prompt_manager: RFPromptManager) -> dict[str, list]\n\
    \n   :param batch: Dictionary with a batch of examples with dataset field names as keys and lists as values"
- source_sentence: How do you set up and run an SFT fine-tuning experiment from scratch using RapidFire AI's full installation,
    from installing the package through launching training and monitoring results?
  sentences:
  - '`see its details on Hugging Face <https://huggingface.co/datasets/trl-lib/ultrafeedback_binarized>`__.

    We use a sample of 500 training examples for tractable demo runtimes. '
  - "Step 2: Start RapidFire AI server\n------------\n\nRun the following command to initialize rapidfireai to use the correct\
    \ dependencies:\n\n.. code-block:: bash\n\n   rapidfireai init\n   # It will install specific dependencies and initialize\
    \ rapidfireai\n\n.. note::\n  You need to run init *only once* for a new venv or when switching GPU(s) on your machine.\
    \ You do NOT need to run it after a reboot, start/stop of rapidfireai, or for a new terminal.\n\n\nNext start RapidFire\
    \ AI services: the frontend with the ML metrics dashboard and the API server. \nThe frontend URL shown below can be opened\
    \ on your local browser.\n\n.. code-block:: bash\n\n   rapidfireai start\n   # It should print about 50 lines, including\
    \ the following:\n   # ...\n   # RapidFire Frontend is ready\n   # Open your browser and navigate to: http://0.0.0.0:8853\n\
    \   # ...\n   # Press Ctrl+C to stop all services\n\n.. important::\n\n  Do NOT proceed until the start is successful\
    \ with \"Available endpoints\" printed as above. Leave this terminal running while you work through the tutorial notebooks.\
    \ \n  \nIf you close the terminal in which you started rapidfireai or if you rebooted your machine, \njust start rapidfireai\
    \ again with the above command.\n\nIf the start command fails for whatever reason, wait for half a minute and rerun it.\n\
    For diagnostics and common fixes (including Linux/macOS and Windows steps), see :doc:`Troubleshooting </troubleshooting>`."
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
- source_sentence: How does RapidFire AI's shard-based adaptive execution engine enable online aggregation of eval metrics
    with confidence intervals, and what specific mathematical strategies are available for computing those intervals?
  sentences:
  - "**online_strategy_kwargs** : dict[str, Any], optional\n\tParameters for evals online aggregation strategy. The dictionary\
    \ must include the following keys:\n\t\n\t* :code:`\"strategy_name\"` (str) - Must be :code:`\"normal\"`, :code:`\"wilson\"\
    `, or :code:`\"hoeffding\"`.\n\t* :code:`\"confidence_level\"` (float) - Confidence level for confidence intervals on\
    \ metrics. Must be in [0,1]. Default is 0.95 (95%).\n\t* :code:`\"use_fpc\"` (bool) - Whether to apply finite population\
    \ correction. Default is :code:`True`."
  - "Step 5: Monitor training behaviors on ML metrics dashboard\n--------\n\n.. raw:: html\n\n    <img src=\"_static/step7.png\"\
    \ alt=\"Monitor training behaviors on ML metrics dashboard\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"\
    this.requestFullscreen()\">\n\n\nStep 6: Interactive Control (IC) Ops: Stop, Clone-Modify; check their results \n-----\n\
    \n.. raw:: html\n\n    <img src=\"_static/icop-stop.png\" alt=\"IC Op: Stop\" \n         style=\"cursor: zoom-in; max-width:\
    \ 100%;\" onclick=\"this.requestFullscreen()\">\n\n\n.. raw:: html\n\n    <img src=\"_static/icop-clone.png\" alt=\"IC\
    \ Op: Clone-Modify\" \n         style=\"cursor: zoom-in; max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n\n\n\
    .. raw:: html\n\n    <img src=\"_static/step10.png\" alt=\"IC Op results on dashboard\" \n         style=\"cursor: zoom-in;\
    \ max-width: 100%;\" onclick=\"this.requestFullscreen()\">\n"
  - "Confidence Intervals\n--------------------\n\nThe data points in the evals dataset are **assigned to shards uniformly\
    \ randomly**, i.e., \nRapidFire AI performs sampling without replacement. \nBased on that, it supports 3 strategies to\
    \ calculate confidence intervals for projected estimates of metrics. \nYou can indicate the confidence level (we recommend\
    \ 95%) and whether to perform \"finite population correction\" (FPC) or not. \nThese values can be specified under the\
    \ key :code:`\"online_strategy_kwargs\"` in your config dictionary as illustrated below.\n\n.. code-block:: python\n\n\
    \    # Based on FiQA RAG tutorial use case\n    \"online_strategy_kwargs\": {\n        \"strategy_name\": \"normal\",\n\
    \        \"confidence_level\": 0.95,\n        \"use_fpc\": True,\n    },"
