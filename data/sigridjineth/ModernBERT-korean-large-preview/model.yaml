widgetData:
- source_sentence: 나, 가스불, 찻물, 올리다
  sentences:
  - 나는 가스불에 꽃을 넣은 찻물을 올렸다.
  - 과제수행 기간중에 연구 현장에 대해 정기점검을 실시하고, 과제 수행 종료 후에도 일정한 안전조치를 이행하도록 규정한다.
  - 고기, 상추, 밥, 나, 올리다
- source_sentence: 파란색 데님 재킷을 입은 여성과 검은색 코트를 입은 여성이 일본 식당 앞에 서 있다.
  sentences:
  - 복합 도금된 시편의 표면과 조성은 전계방출 주사전자현미경(field emission scanning electron microscopy,FESEM)과 에너지 분산형 X-선 분광기(energy dispersivespectroscopy,
    EDS)를 이용하여 분석하였다.
  - 재킷을 입은 두 여자가 식당 밖에 서 있다.
  - 두 여자가 식당 밖에서 음식을 먹는다
- source_sentence: 한 남자가 암벽을 오르고 다른 남자가 아래에 있다.
  sentences:
  - 남자가 암벽을 기어오르다
  - 담당 공무원들은 보호 관찰 대상자를 정기적으로 상담을 했다.
  - 한 남자가 암벽에 오른다.
- source_sentence: 골목, 동네, 동, 나누다, 크다, 서
  sentences:
  - 큰 골목이 우리 동네를 동과 서로 나눠 놓았다.
  - 내 아내는 몸에 좋은 음식을 항상 만들어 주었다.
  - 골목, 많다, 공간, 놀이, 골목
- source_sentence: 한 소녀가 자전거를 타고 있고 모든 사람들이 도시에서 그녀에게 달려들고 있다.
  sentences:
  - 소녀는 자전거를 탄다
  - 소녀가 자전거를 타고 있다.
  - 그리고 특수한 소재의 광섬유를 이용한 온도센서는 감도가 고정되는 단점이 있고, 간섭계형 온도센서는 높은 감도의 장점을 가지지만, 2차 코팅이 이루어지지 않은 광섬유 센서나 팁기반 광섬유 센서는 일반적으로 클래드를
    제거하여 융착(splicing)을 하기 때문에 취급상에 불편함과 파손되기 쉬운 단점을 가지고 있다.
