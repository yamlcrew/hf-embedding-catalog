widgetData:
- source_sentence: 'Chào bác sĩ,

    Em hay bị đau đầu chóng mặt, đi chụp cộng hưởng từ, bác sĩ kết luận bị thoái hóa chất trắng ở thái dương đỉnh đầu. Xin
    hỏi bác sĩ thoái hóa chất trắng có phải bệnh lý nguy hiểm không? Cảm ơn bác sĩ tư vấn.'
  sentences:
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Theo thông tin bạn cung cấp, bạn có thể đang có triệu chứng của trầm cảm, bạn cần được thăm khám với bác sĩ chuyên khoa
    Tâm lý để được chẩn đoán và có kế hoạch điều trị phù hợp (tâm lý liệu pháp, kết hợp dùng thuốc...) càng sớm càng tốt.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ giải đáp như sau:

    Thông thường thoái hóa chất trắng nhỏ không phải bệnh lý gì nghiêm trọng, và nó cũng không phải là nguyên nhân gây ra
    đau đầu, chóng mặt. Các bệnh lý thoái hóa chất trắng thật sự thường có diện tổn thương lớn trên phim chụp sọ não và triệu
    chứng nặng nề hơn, ví dụ như sa sút trí tuệ, yếu vận động chân tay. Như trường hợp của em có lẽ thoái hóa chất trắng chỉ
    là một hình ảnh tình cờ phát hiện ra khi chụp MRI sọ não, và không có ý nghĩa bệnh lý. Tuy nhiên, nếu đau đầu chóng mặt
    của bạn kéo dài và chưa cải thiện thì bạn nên đi khám lại chuyên khoa Thần kinh để điều trị.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Hiện tại bạn không sốt, chỗ tổn thương mẩn đỏ không sưng tấy thì mẩn đỏ sẽ dần dần tự hết.

    Trân trọng!'
- source_sentence: 'Chào bác sĩ,

    Ngày trước, em bị ngã có va răng vào vật cứng. Sau một thời gian, giờ răng em bị sưng và chảy mủ lợi. Vậy bác sĩ cho em
    hỏi sưng kèm chảy mủ lợi sau té đập răng phải làm sao? Em cảm ơn bác sĩ.'
  sentences:
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Bạn bị té đập răng bị sưng, chảy mủ lợi thì bạn nên đến phòng khám Răng hàm mặt bệnh viện để được chụp phim X - quang
    răng, thăm khám, tư vấn và điều trị, không nên tự điều trị tại nhà.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Bại não là tổn thương não không tiến triển, gây nên bởi các yếu tố nguy cơ xảy ra ở giai đoạn trước sinh, trong khi sinh
    và sau sinh đến 5 tuổi. Trong đó bại não thể múa vờn chiếm tỷ lệ 10 - 15% trong tổng số trẻ bại não và thường gặp ở trẻ
    trai nhiều hơn trẻ gái.

    Bạn cần tiến hành tập luyện điều hợp, phối hợp sử dụng tay mắt, uống thuốc kiểm soát,...Bạn cần đi khám đánh giá để bác
    sĩ tư vấn được tốt hơn.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Bướu nhân tuyến giáp là các khối nhân đặc hoặc phối hợp giữa thành phần đặc và dịch được hình thành trong tuyến giáp.
    Bướu nhân tuyến giáp có thể lành tính hoặc ác tính. Trường hợp của bạn đã được chọc tế bào cho kết quả lành tính như vậy
    hướng quản lý và điều trị sẽ như sau :

    Với nhân có kích thước < 2cm, không gây triệu chứng vùng cổ như nuốt nghẹn, nuốt vướng, hoặc đau vùng phía trước cổ,...
    thì bạn có thể tiếp tục theo dõi định kỳ 6 tháng - 1 năm 1 lần mà chưa cần điều trị hay can thiệp gì.

    Với nhân tuyến giáp có kích thước > 2cm kèm các triệu chứng vùng cổ như trên, bạn có thể điều trị bằng phương pháp đốt
    sóng cao tần. Đốt nhân tuyến giáp bằng sóng cao tần là phương pháp hủy khối u bằng nhiệt gây ra đồng âm sự ma sát của
    các ion trong mô dưới tác động của dòng điện xoay chiều có tần số cao.

    Đốt sóng cao tần điều trị bướu nhân tuyến giáp là phương pháp điều trị có độ an toàn cao, do không phải rạch da xâm lấn,
    đồng thời cũng không cần gây mê nên quá trình theo dõi và tái khám sau khi thực hiện cũng đơn giản hơn. Sau khi quy trình
    kết thúc bệnh nhân chỉ cần nằm lại theo dõi từ 30 phút đến 1 tiếng, sau đó có thể xuất viện và sinh hoạt bình thường mà
    không cần kiêng cữ.

    Bạn nên đi khám ở cơ sở chuyên khoa để để được bác sĩ theo dõi và đánh giá kỹ tình trạng nhân tuyến giáp và đưa ra lời
    khuyên hợp lý.

    Trân trọng!'
- source_sentence: 'Chào bác sĩ,

    Em bị ung thư thanh quản - đã phẫu thuật cắt thanh quản toàn phần, hạ họng. Vậy bác sĩ cho em hỏi sau phẫu thuật cắt thanh
    quản - hạ họng có thể lắp van phát âm không? Em cảm ơn.'
  sentences:
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Bạn bị tiểu buốt và ra máu, đây là triệu chứng của bệnh nhiễm trùng đường tiểu gợi ý bệnh viêm bàng quang xuất huyết.
    Nhiễm trùng đường tiểu là bệnh lý hay gặp ở phụ nữ, do cấu trúc giải phẫu niệu quản ngắn, gần vùng hậu môn.

    Việc điều trị nhiễm trùng đường tiểu cũng đơn giản, chủ yếu là kháng sinh, và điều trị nguyên nhân. Tuy nhiên, nếu không
    điều trị tích cực, nhiễm trùng có thể lan lên từ bàng quang lên thận gây viêm thận bể thận, bệnh cảnh sẽ năng lên.

    Do vậy, người bệnh phải đi khám sớm, để bác sĩ chuyên khoa nội tiết niệu khám xét, cần thiết làm các xét nghiệm máu, nước
    tiểu, siêu âm, hoặc cần thiết cấy vi khuẩn, để có hướng chọn lựa kháng sinh cho điều trị. Bạn nên uống nhiều nước trong
    ngày, vệ sinh sính dục tốt, tránh nín tiểu.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Trường hợp của bạn đã phẫu thuật cắt thanh quản - hạ họng, việc lắp van phát âm sẽ góp phần cải thiện việc phát âm nhằm
    thuận lợi trong giao tiếp.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Bệnh gai đen có biểu hiện là mảng da đen và bề mặt da có gai màu đen, các vị trí hay bị là quanh cổ, hố nách, bẹn. Bệnh
    gai đen có thể là bệnh da thông thường hay còn là biểu hiện ngoài da của bệnh ung thư các nội tạng. Bạn cần đi khám, để
    được bác sĩ chỉ định xét nghiệm và điều trị.

    Trân trọng!'
- source_sentence: 'Chào bác sĩ,

    Em bị mất 02 răng số 6 hàm dưới (cả bên trái và phải) đã hơn 10 năm (xương răng có tiêu biến và răng đối diện ở hàm trên
    có dài ra do khoảng trống này). Hiện tại em muốn lấp 02 răng đã mất nhưng không biết là cần cấy ghép implant hay có thể
    niềng kéo các răng khác lấp vào khoảng trống hay không? Bác sĩ cho em hỏi phải làm sao để lấp khoảng trống do mất 2 răng
    số 6 hàm dưới?(Em không muốn dùng bắc cầu vì sợ gây suy yếu răng khác và cũng không có hiệu quả tốt về lâu dài). Trong
    trường hợp có thể niềng đế lấp, vậy có gây ra lệch khớp cắn hay thay đổi xấu cho hình dạng khuôn mặt không ạ? Em xin cảm
    ơn và rất mong nhận được lời tư vấn của quý bác sĩ.'
  sentences:
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Theo các chuyên gia tiết niệu thì 70 - 80% sỏi thận < 5mm có thể di chuyển dần từ thận xuống niệu quản, bàng quang ra
    ngoài và được bào mòn tự nhiên. Những sỏi từ 5 - 10 mm, khả năng đào thải tự nhiên 50%. Do vậy, bạn cần điều trị nội khoa
    tích cực để trục xuất những viên sỏi này tránh biến chứng.

    Như vậy, trường hợp sỏi của bạn có thể điều trị nội khoa. Những biện pháp điều trị như:

    Lợi tiểu để bào mòn sỏi giúp đào thải sỏi tự nhiên

    Thuốc giãn cơ trơn niệu quản

    Thuốc giảm đau, kháng khuẩn nếu có dấu hiệu nhiễm khuẩn

    Uống nhiều nước trong ngày

    Bạn nên đến bệnh viện như AI-Doctor, khám chuyên khoa Ngoại Tiết niệu để khám xét, cần thiết làm một số xét nghiệm để
    đánh giá cho việc điều trị. Nếu điều trị nội thất bại, có thế nội soi lấy sỏi, bạn nên điều trị sớm, ngăn ngừa các biến
    chứng xảy ra, nhất là ảnh hưởng đến chức năng thận,...

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Bạn cần đến viện để được khám trực tiếp. Bác sĩ sẽ đánh giá những yếu tố sau:

    Mức độ xô lệch của các răng bên cạnh.

    Độ mọc dài ra của răng 6 hàm trên

    Mức độ tiêu xương và chất lượng xương của vùng mất răng.

    Dựa vào đó, bác sĩ sẽ đưa ra chỉ định hợp lý. Tùy vào mức độ thay đổi vị trí của các răng, các phương pháp từ đơn giản
    đến phức tạp có thể là:

    Cấy ghép implant răng 6 dưới.

    Nắn chỉnh bao gồm chỉnh thẳng trục các răng bên cạnh và đánh lún răng 6 trên. Sau đó cấy ghép implant răng 6 dưới.

    Trường hợp các răng bên cạnh bị xô lệch và răng 6 trên mọc dài xuống ở mức độ quá nhiều thì có thể xem xét đến việc nhổ
    các răng nói trên để tạo khoảng cho việc cấy ghép implant.

    Trường hợp xương vùng mất răng không đủ hoặc chất lượng xương kém thì có thể phải ghép xương để cấy implant răng 6 dưới.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Nhiễm trùng đường tiểu là bệnh hay gặp, nguyên nhân là do vi khuẩn xâm nhập vào đường niệu đạo vào bàng quang, gây ra
    những triệu chứng tiểu rắt, tiểu buốt, nước tiểu đục có khi có máu, có thể đa vùng hạ vị . Có nhiều yếu tố nguy cơ tạo
    điều kiện cho nhiễm trùng đường tiểu như cấu tạo niệu đạo ngắn ở phụ nữ, do sỏi thận, u xơ tiền liệt, bệnh đái đường,....

    Bệnh nhiễm trùng đường tiểu là bệnh chữa khỏi hoàn toàn, tuy nhiên nếu không điều trị, hoặc điều trị không đầy đủ có thể
    làm cho vi khuẩn xâm nhập lên trên gây viêm thận bể thận, nặng hơn gây nhiễm trùng huyết.

    Trường hợp của bạn có các triệu chứng của nhiễm trùng đường tiểu, kéo dài 3 tháng, uống nhiều thuốc kháng sinh, có thể
    do chưa điều trị tích cực, bác sĩ khuyên bạn nên đến khám cơ sở y tế như bệnh viện. Bạn nên khám chuyên khoa nội hoặc
    ngoại tiết niệu, bác sĩ sẽ thăm khám, cần thiết làm các xét nghiệm máu, nước tiểu, siêu âm, CT, cấy nước tiểu , nhằm xác
    định bệnh và các yếu tố nguy cơ để có hướng điều trị tích cực.

    Trân trọng!'
- source_sentence: 'Chào bác sĩ,

    Em bị viêm tai thanh dịch. Vậy bác sĩ cho em hỏi viêm tai thanh dịch có thể điều trị được không? Bệnh này có tự hết không
    hay bắt buộc phải uống thuốc mỗi lần bị viêm? Em cảm ơn bác sĩ.'
  sentences:
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Khó thở không phải là bệnh mà nó là triệu chứng bệnh phổ biến liên quan đến vấn đề sức khỏe nghiêm trọng. Biểu hiện này
    tồn tại dưới dạng cấp tính hoặc mãn tính. Khó thở có thể là triệu chứng của nhiều bệnh lý hô hấp, tim mạch hoặc ở 1 số
    cơ quan khác và cũng không loại trừ nguyên nhân rối loạn lo âu tổng quát.

    Bạn cần đi khám bác sĩ để được tầm soát những nguyên nhân bệnh gây nên tình trạng khó thở để được điều trị hiệu quả.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Viêm tai thanh dịch là bệnh lý liên quan đến chức năng thông thoáng của vòi tai (là ống nối thông từ mũi tới tai). Đây
    là bệnh lý lành tính tuy nhiên việc điều trị cần phải theo dõi sát trong thời gian 1 - 3 tháng vì dịch ở trong tai tiêu
    chậm, đặc biệt ở người hút thuốc lá hoặc có tiền sử bệnh mũi.

    Vì vậy, bạn nên đến thăm khám để nhân được kế hoạch điều trị và theo dõi cho dứt điểm tình trạng ứ dịch trong tai.

    Trân trọng!'
  - 'Chào bạn,

    Để trả lời câu hỏi trên, bác sĩ xin giải đáp như sau:

    Khô miệng, khát nước và tiểu nhiều là các triệu chứng hay gặp của tiểu đường nhưng cũng có thể là triệu chứng của các
    bệnh khác như cường giáp,... Bạn nên đến khám để làm các xét nghiệm xác định nguyên nhân của khát nước tiểu nhiều.

    Trân trọng!'
