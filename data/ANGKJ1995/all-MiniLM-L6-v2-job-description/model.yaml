widgetData:
- source_sentence: Well driller/borer and related mining worker operates, assembles and monitors machines for cutting channels
    in a mine workface or for the drilling and sinking of wells, extraction of ore, liquids and gases or for a variety of
    other purposes.
  sentences:
  - Prepare detailed drawings of architectural and structural features of buildings or drawings and topographical relief maps
    used in civil engineering projects, such as highways, bridges, and public works. Use knowledge of building materials,
    engineering practices, and mathematics to complete drawings.
  - Operate self-propelled mining machines that rip coal, metal and nonmetal ores, rock, stone, or sand from the mine face
    and load it onto conveyors, shuttle cars, or trucks in a continuous operation.
  - Conduct investigations related to suspected violations of federal, state, or local laws to prevent or solve crimes.
- source_sentence: Van driver drives a van to pick up and deliver non-mail documents and parcels.
  sentences:
  - Drive a light vehicle, such as a truck or van, with a capacity of less than 26,001 pounds Gross Vehicle Weight (GVW),
    primarily to pick up merchandise or packages from a distribution center and deliver. May load and unload vehicle.
  - Plan, direct, or coordinate human resources activities and staff of an organization.
  - Devise methods to improve oil and gas extraction and production and determine the need for new or modified tool designs.
    Oversee drilling and offer technical advice.
- source_sentence: Library officer assists librarians by helping readers in the use of library catalogues, databases, and
    indexes to locate books and other materials. He/she also compiles records, sorts and shelves books or other media, removes
    or repairs damaged books or other media, registers patrons and checks materials in and out of the circulation process.
    He/she replaces materials in shelving areas.
  sentences:
  - Assist librarians by helping readers in the use of library catalogs, databases, and indexes to locate books and other
    materials; and by answering questions that require only brief consultation of standard reference. Compile records; sort
    and shelve books or other media; remove or repair damaged books or other media; register patrons; and check materials
    in and out of the circulation process. Replace materials in shelving area (stacks) or files. Includes bookmobile drivers
    who assist with providing services in mobile libraries.
  - Perform engineering duties in planning and designing tools, engines, machines, and other mechanically functioning equipment.
    Oversee installation, operation, maintenance, and repair of equipment such as centralized heat, gas, water, and steam
    systems.
  - Perform a variety of food preparation duties other than cooking, such as preparing cold foods and shellfish, slicing meat,
    and brewing coffee or tea.
- source_sentence: Pre-press trades worker proofs, formats, sets and composes text and graphics into a form suitable for use
    in various printing processes and representation in other visual media.
  sentences:
  - Directly supervise and coordinate activities of workers engaged in landscaping or groundskeeping activities. Work may
    involve reviewing contracts to ascertain service, machine, and workforce requirements; answering inquiries from potential
    customers regarding methods, material, and price ranges; and preparing estimates according to labor, material, and machine
    costs.
  - Plan, direct, or coordinate transportation, storage, or distribution activities in accordance with organizational policies
    and applicable government laws or regulations. Includes logistics managers.
  - Engrave or etch metal, wood, rubber, or other materials. Includes such workers as etcher-circuit processors, pantograph
    engravers, and silk screen etchers.
- source_sentence: Composer/Orchestrator writes musical compositions such as symphonies, sonatas or operas. He/she translates
    compositions into standard musical signs and symbols on scored music paper. He/she may write words to accompany music.
    He/she adapts melodies to suit the type and style of orchestras or bands and to produce various kinds of effects. He/she
    determines instruments to be employed, writes musical scores to produce the desired musical effect, rewrites music written
    for one instrument or purpose into suitable forms for other instruments or purposes.
  sentences:
  - Evaluate materials and develop machinery and processes to manufacture materials for use in products that must meet specialized
    design and performance specifications. Develop new uses for known materials. Includes those engineers working with composite
    materials or specializing in one type of material, such as graphite, metal and metal alloys, ceramics and glass, plastics
    and polymers, and naturally occurring materials. Includes metallurgists and metallurgical engineers, ceramic engineers,
    and welding engineers.
  - Plan, direct, or coordinate the actual distribution or movement of a product or service to the customer. Coordinate sales
    distribution by establishing sales territories, quotas, and goals and establish training programs for sales representatives.
    Analyze sales statistics gathered by staff to determine sales potential and inventory requirements and monitor the preferences
    of customers.
  - Conduct, direct, plan, and lead instrumental or vocal performances by musical artists or groups, such as orchestras, bands,
    choirs, and glee clubs; or create original works of music.
