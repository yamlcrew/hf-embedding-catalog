widgetData:
- source_sentence: Which is easier, pushing or pulling?
  sentences:
  - 'In which case is more effort needed: when you push or when you pull? We have a common experience that man tends to first
    push anything. How it is justified and what are the reasons behind this?'
  - Im mostly curious, but why arent network interfaces in /dev? Are there any other kinds of devices that aren't represented
    as a node under /dev?
  - 'A and B are in a lift. The mass of the lift is 250kg. As it moves upward, the floor of the lift exerts a force of 678N
    and 452N on A and B, respectively. The tension in the cable of the lift is 3955N. So I drew a diagram of the lift with
    the tension, T, of 3955N and the exerting force of the floor (678+452=1130N) acting upwards, and the 250gN force acting
    downwards. I had to find the acceleration (which is upwards), so therefore did the following calculation: $F=ma$ $=> (3955+1130)-250g=250a$
    (I added those two together because [I thought] they both exert upward forces. However, I apparently took the wrong approach,
    and the statement that the "floor of the lift exerts a force on A and B of 1130N" doesn''t mean that it''s an upward force,
    but is instead a downward force, making the following the correct approach: $=> 3955-(250g+1130)=250a$ How can this be?
    Surely if something (the floor) is exerting a force on something above it (A and B) then the force exerted is an upwards
    one. How can the floor exert an downward force on something above it? Or is the question worded incorrectly? Please note
    that the reason for the simplicity is that it''s only AS Level maths.'
- source_sentence: Using \textsc{} within \section{}
  sentences:
  - '> _I am struggling with this kind of Google Apps -site, example from > Google.com -sitehere._ > > http://i.stack.imgur.com/kxbZQ.png
    I use two email-clients in Android: default Gmail -client (because it is tied to my Gmail) and K9. I am able to set up
    all Gmails to K9 but one email i.e. the firm email from the site https://www.google.com/a/firm.com (excluding ofc the
    Android-tied-gmail -account, more here). It means that I am using K9 and default Gmail-Android -program but I would like
    to have all emails under K9. Is it possible and how can do it here in the case of the Gmails targeted to firms? I think
    such gmails are called something like Google App or something like that, not sure. The firm Gmail is not accepted like
    this in K9: > Username: forname.surname > > Password: correct > > IMAP server: mail.myFirm.com > > Security type: SSL
    (always) > > Port: 993 > > Use compression on network: Mobile Wi-Fi Other If I change the IMAP -server to mail.gmail.com,
    it gets accepted but it won''t work correctly -- redirection problem. But now I am stucked why it does not accept the
    above settings?! Perhaps useful to other like-minded > 1. All emails under K9 -app? > > 2. Email-client with Sent emails
    from many emails under IMAP? > > 3. Setting up IMAP over device-swarm that has a Debian Desktop -client, > more here.
    > >'
  - Using \textsc{} within \section{} I tried \section{abc \textsc{test}} but it doesnt work. I guess there must be some simple
    way to do it. Is it impossible? Why devote my question? I dont care if the small cap is bold or not. \documentclass{article}
    \begin{document} \section{abc \textsc{test}} the above. \end{document}
  - How can I indent the paragraphs which follow a heading? \tableofcontents \pagestyle{empty} \newpage \section{intro} \setcounter{page}{1}
    \subsection{sub} First text text text text text text text text text text text text text text text text text text text
    text text text text text text text text text text text text text text text text text text text text text text text text
    text text text text text text text text text text text text text text \\ Second text text text text text text text text
    text text text text text text text text text text text text text text text text text text text text text text text text
    text text text text text text text text text text \subsection{sub} \subsection{sub} Basically thats my code and what happens
    when I generate the pdf is that where it says first no indendation appears, despite me trying to use \indent. However,
    where it says second the indentation works. Ive tried \paragraph and it doesn't help.
- source_sentence: How would I go about divorcing my spouse?
  sentences:
  - How would I go about divorcing my spouse? Hello I was wondering is there a way to divorce in Skyrim and if so, if I do
    this can I remarry? And if this isnt possible if I brutally murder my wife can I remarry? You see there is a new person
    to whom Ive fallen for, I don't think it right to go behind my wifes back. Thank you!
  - 'I have an automated invoicing web app and Im trying to build in some failsafes and a structure that will, under no circumstance,
    allow an invoice to be double charged. All things working perfectly, the scheduled task runs and everything charges as
    its supposed to. But there are a few scenarios we know of that can cause problems. Ive had a DB server go down in the
    middle of a process, which lead to a number of duplicate charges. Also if for whatever reason, the file needs to be checked
    in a browser, a developer hits refresh before the file is done processing, duplicate charges will occur. There are a few
    similar scenarios to protect against, so you can see the need for a way to handle this given the sensitivity of the transactions
    (imaging seeing your power company auto charging you twice on your bank statement). Current configuration: Query API POST
    For Transaction <!--- Parse Reply String ---> if response = 1 - Insert Into Payments - Update Invoice Amount Due - Insert
    Into Transactions - Email Accepted Notification else - Email Declined Notification Theres a few more smaller processes
    that happen between a few of these, as well as quite a few if statements but those are the heavy lifting parts. What I
    would like to learn and hear about are what would be the best way to handle safeguarding this with considering the Third
    Party API for the gateway being there? How would you break it up? One idea I had was flagging each process after it ran
    to give a record of where it was when it failed, and build out the query to handle it accordingly. Not sure how efficient
    or more likely how inefficient it would be.'
  - Resurrecting companions I killed Lydia by accident and now I want to know how to get her back...
- source_sentence: How does atmospheric pressure work?
  sentences:
  - I am not clear about how exactly the p values and t values are used. I know how to calculate them but I am not clear about
    the basic concept behind them. Any help ?
  - 'How do I interpret the results of a Breusch–Pagan test? how I can interpret the results of these two tests for heteroskedasticity?
    Breusch Pagan Godfrey heteroscedasticity test disp(Breusch Pagan Godfrey heteroscedasticity test, null is homoscedasticity
    and normality of errors) bpagan(y1,Data1) Breush-Pagan LM-statistic = 5.06292947 Chi-squared probability = 0.1672 Degrees
    of freedom = 3 White heteroscedasticity test Data4 = [ones(length(y1),1),y2,y3,y4]; results7 = ols(y1,Data4); ressq3 =
    results7.resid.^2; y3sq = y3.y3; y2sq = y2.y2; y4sq = y4.y4; y23 = y2.y3; y24 = y2.y4; y34 = y3.y4; Data5 = [ones(length(y1),1),y2,y3,y4,y23,y24,y34,y2sq,y3sq,y4sq];
    % results4 = ols(ressq3,Data5); Rsqr = results4.rsqr; disp(White test, null is homoscedasticity) Chisqr = Rsqr*length(ressq3)
    prob = chis_prb(Chisqr,.05) Chisqr = 11.2367 prob = 1.0000 • This test builds an auxiliary regression to regress the error
    terms on all independent variables and their quadratic forms and cubic forms. • Null hypothesis: homoscedasticity + prob
    = 1.0000 • Fair to reject the Null hypothesis. It does not have heteroskedasticity.'
  - If the air is flowing with the earth, as it rotates, how do we feel a breeze and strong winds at times, as everyone has
    experienced, the wind shifts as if from many directions.
- source_sentence: ANCOVA and its disturbing assumptions
  sentences:
  - 'Use of a versus an I have always been using a established. > The CPM is a established theory that explains......... But
    when reading print material, I sometimes find an established being used: > The CPM is an established theory that explains.........
    My English teacher taught me to apply a/an based on how the word sounded. Is that a/an established principle?'
  - ANCOVA and its disturbing assumptions I am testing whether prenatal smoking affects intelligence, while controlling for
    social economic status. I want to use an ANCOVA (Intelligence - DV, Prenatal smoking - IV and SES -covariate) but I carried
    out a preliminary homogenity of regression slopes but the results are significant for interaction effect which suggests
    I should not use an Ancova. I don't think I can use a regression either as I only have one IV. Any ideas?
  - ANCOVA and its disturbing assumptions I am testing whether prenatal smoking affects intelligence, while controlling for
    social economic status. I want to use an ANCOVA (Intelligence - DV, Prenatal smoking - IV and SES -covariate) but I carried
    out a preliminary homogenity of regression slopes but the results are significant for interaction effect which suggests
    I should not use an Ancova. I don't think I can use a regression either as I only have one IV. Any ideas?
