widgetData:
- source_sentence: Handling Server Response Timeouts
  sentences:
  - 'Almost every developer has to answer questions from business side like:   Why is going to take 2 days to add this simple
    contact form? When a developer estimates this task, they may divide it into steps:   * make some changes to the Database   *
    optimize DB changes for speed    * add front end HTML   * write server side code   * add validation   * add client side
    javascript    * use unit tests   * make sure SEO set-up is working   * implement email confirmation   * refactor and optimize
    the code for speed   * ... These maybe hard to explain to a non-technical person, who basically sees the whole task as
    just putting together some HTML and creating a table to store the data. To them it could be 2 hours MAX. So is there a
    better way to explain why the estimate is high to a non- developer?'
  - I always active the mobile data but sometimes it hang I need to restart for check email or other internet activity. What
    should I do? Please advice me My Phone is Sony XPERIA mini pro. I installed custom rom **CM 9.1** I think this happening
    after install custom rom
  - My HTC Desire is set up to flash its LED lamp whenever I receive an email, SMS etc. Only problem is that (without touching
    the phone) the LED stops flashing after 5 minutes or so. So if a message comes in while I'm not near my phone and I don't
    come back for more than 5 minutes, I have to turn on the screen to discover the message. I've searched through everything,
    but there seems to be no setting for this. Am I missing something, or is this by design? Is there an app for this problem?
  - 'I have a Samsung Galaxy Note N7000. An Android update was promoted. I started with the update download, but canceled
    it at 36 MB (total update size:110 mb) because of slow network. After that, whenever I try downloading it, the download
    stops at the 36 Mb(exactly at 35.88 where I had previously canceled it). Interestingly, it is the same case with app downloads
    also, from Google Play. Device: Samsung galaxy note - GT-N7000. Android version: 4.0.3 Thanks.'
  - I have a Samsung Galaxy S3 and once or twice a day I keep losing the 3G connection completely (Not even H+ / H-) and when
    I restart the phone, it works fine again. I have tried to take out the sim card and put it back in again, but No luck.
  - I am sending a huge amount of data to server. Now while I have sent the data and waiting for server response, suddenly
    my android device gets internet connection lost.   So what I used to do is, showing an alert dialog of connection lost,
    but at server side the data was already processed and it updated somewhere e.g. on any URL. But my android phone does
    not know this as it did not get response ever. How to resolve it.   Whether it could be done on server side or on android
    itself How?   How server would know that android phone is not going to listen the response?   It may be client-server
    communication optimization perspective.
- source_sentence: How Can There Be Magnetic Force Without Velocity
  sentences:
  - Is it possible to make my Samsung Galaxy Nexus connect to a USB memory stick? I have the USB Connect. How can I do that?
  - Refraction is the bending of a wave when it enters a medium where its speed is different. The refraction of light when
    it passes from a fast medium to a slow medium bends the light ray toward the normal to the boundary between the two media.
    My question is what is the fundamental reason for this refraction?is it something related to the atomic force?
  - What is a good way to think of the displacement current? Maxwell imagined it as being movements in the aether, small changed
    of electric field producing magnetic field. I don't even understand that definition-assuming there is aether. (On the
    topic of which, has aether actually been disproved? I read that even with the Michelson-Morley experiment the aether wasn't
    disproved.)
  - I am an undergraduate physics student in a university and I am looking for a good guide or a handbook with lots of questions
    and full answers in subjects such as Gauss' law and Maxwell equations to study for my test.
  - I know that Lorentz force for a charge $q$, with velocity $\vec{v}$ in magnetic field $\vec{B}$ is given by $$\vec{F}
    =q \vec{v} \times \vec{B}$$ but there will exist a frame of reference where observer move at same velocity with that of
    charge $q$, so according to him $v=0$. hence he will see no magnetic force is exerted on charge $q$. I have work on this
    problem for a while and found that the special relativity predicts equivalent electric force will acting upon charge instead.
    I want to know the relationship between this equivalent electric force and magnetic force. Thanks in advance
  - According to quantum theory,Einstein said that light waves have small packets called photons and they are said to have
    no mass and charge but having energy E=hv and they behave has both particle and wave character. And they travel with certain
    velocity. How photons have momentum and energy if they said to have no mass? Momentum = p=mv ,where m= mass v=velocity.
- source_sentence: How to check if I have a charm or cursed table?
  sentences:
  - my device is karbonn titanium s1 plus and i am jast rooted it successfully. But how to know is tgere any custom rom for
    my mobile??
  - 'Given a large group (50+) of programmers:   * All given the same problem,   * All using Test-Driven Development (TDD),   *
    All pair programming,   * All doing group-based code review, I have personally seen the wide spectrum tests that are possible
    for the same problem, even on the first test. So, if TDD is design, how do you know your TDD is optimal for the current
    problem, and how do you know it is not? Following the first test, is the approach for reviewing the consecutive tests
    any different, and if so, how?'
  - dropped phone grrr. Screen cracked, it lights up but, I can't swipe the screen. I have linked to Kies, got my Contacts
    over, But, I can't seem to find Texts/sms. Any help greatly appreciated. Sue Samsung Galaxy Fame.
  - 'I have command line access to a Linux machine which may or may not be virtualized. I want to determine what kind of virtualization
    technology it runs on, if any (VMWare, VirtualBox, KVM, OpenVZ, Xen, ). This isn''t a hostile environment: I''m not trying
    to work against a VM that is trying to disguise itself, I''m diagnosing a flaky server that I know little about. More
    precisely, I''m helping someone diagnose the issue, I''m not sitting at the helm. So I have to convey instructions like
    “copy-paste this command” and not “poke around `/proc` somewhere”. Ideally, it would be something like `lshw`: an easily-installable
    (if not preinstalled) command that does the poking around and prints out relevant information. What''s the easiest way
    of determining what virtualization technology this system may be a guest of? I''d appreciate if proposals mentioned which
    technologies (including bare hardware) can be conclusively detected and which can be conclusively eliminated. I''m mostly
    interested in Linux, but if it also works for other unices that''s nice.'
  - I bought a Spice Stellar Jazz Mi-353. It tells me that it has 116MB of RAM, but it is supposed to be 256MB. Is there a
    way to check how much RAM my device physically has before deciding to get it replaced?
  - I've heard a lot of mention of "cursed charm tables". What exactly are these and why are they considered "cursed"? Possibly
    most important, how do I avoid getting a cursed charm table?
- source_sentence: proper way to use a comma separating 3 (or more) words in a sentence
  sentences:
  - 'I would like to consistently have a comma between the journal and volume number for article references using `biblatex`
    with `biber` as the backend. Unfortunately, the punctuation between the journal and volume is not consistent. Journals
    whose last word is abbreviated have no comma between the journal and the volume, and the word "Vol." is capitalized. Journals
    whose last word is not abbreviated have a comma and the word "vol." is not capitalized. I can fix the capitalization by
    un-commenting the commented lines in the below MWE, but the comma problem is quite perplexing. Apologies if this fix is
    in an answer somewhere, but I cannot find it (or at least, I don''t know what to search for!). Current output:   [1] First
    Author. “Blah Blah 2”. In: _Am. J. Phys._ Vol. 72, no. 3 (Mar. 2004), pp. 367–375.   [2] Second Author. “Blah blah”. In:
    _Energy Fuel_ , vol. 27, no. 12 (Dec. 2013), pp. 7778–7789. Expected output:   [1] First Author. “Blah Blah 2”. In: _Am.
    J. Phys._ , vol. 72, no. 3 (Mar. 2004), pp. 367–375.   [2] Second Author. “Blah blah”. In: _Energy Fuel_ , vol. 27, no.
    12 (Dec. 2013), pp. 7778–7789. MWE:               \documentclass{article}     \usepackage{filecontents}     \usepackage[         backend=biber,         citestyle=numeric-comp,     ]{biblatex}     \addbibresource{\jobname}     %
    \DefineBibliographyStrings{english}{%         % volume = {\lowercase{v}ol\adddot}, % avoid capitalization after dots.     %
    }     \DeclareFieldFormat[article]{volume}{\bibstring{volume}\addspace #1}     \DeclareFieldFormat[article]{number}{\bibstring{number}\addspace
    #1}     \renewbibmacro*{volume+number+eid}{%       \printfield{volume}%       \setunit{\addcomma\space}%<---- was \setunit*{\adddot}%       \printfield{number}%       \setunit{\addcomma\space}%       \printfield{eid}}     \renewbibmacro*{journal+issuetitle}{%       \usebibmacro{journal}%       \setunit*{\addcomma\addspace}%<----
    was \setunit*{\addspace}%       \iffieldundef{series}         {}         {\newunit          \printfield{series}%          \setunit{\addspace}}%       \usebibmacro{volume+number+eid}%       \setunit{\addspace}%       \usebibmacro{issue+date}%       \setunit{\addcolon\space}%       \usebibmacro{issue}%       \newunit}          \begin{filecontents*}{\jobname.bib}     @article{York2004,     author
    = {Author, First},     journal = {Am. J. Phys.},     month = mar,     number = {3},     pages = {367--375},     title
    = {{Blah Blah 2}},     volume = {72},     year = {2004}     }     @article{Baumgardner2013a,     author = {Author, Second},     journal
    = {Energy Fuel},     month = dec,     number = {12},     pages = {7778--7789},     title = {{Blah blah}},     volume =
    {27},     year = {2013}     }     \end{filecontents*}          \begin{document}     \nocite{*}     \printbibliography     \end{document}'
  - '> **Possible Duplicate:**   >  Where should the comma be placed in the salutation of a letter? I was thinking today about
    comma usage and the typical first output for a beginning programmer. In the typical example you see "Hello World" but
    does proper sentence construction/comma usage rules dictate there be a comma between the greeting and the thing being
    greeted. I.e. should a proper sentence read "Hello, World"?'
  - '> **Possible Duplicate:**   >  Vim :s replace first N < g occurrences on a line In vi, how do I search and replace a
    word''s first `n` occurrences with a word, say "hello", and the next `m` occurrences with `bonjour`, and all the rest
    with `namaste`?'
  - I need to make some directory of Author name. It's easy when doing them alone. I can simply               mkdir "Mario
    Luis Garcia"      This will create one directory named "Mario Luis Garcia" But when trying do it massively with shell
    script, I failed.               for i in "Mario Luis Garcia" "etc.";         do              mkdir $i         done;      This
    will create 4 separate directories instead of 2. I tried to use `{}`, `()`to enclose the quoted text in. Doesn't work.
    How to do that?
  - For example, take the number 342. It could be written out a number of different ways when spelled out fully.   * Three
    hundred forty two   * Three hundred and forty two   * Three hundred and forty-two What is the most correct form for spelling
    out that number in full text? What is the rule for adding (or leaving out) the and? When does one use hyphens? Does the
    context matter, e.g. writing out the amount on a check vs. a news article?
  - '> **Possible Duplicate:**   >  Should I put a comma before the last item in a list? Until relatively recent times, I
    always concluded a series in this manner, eg.: "while walking through the park yesterday, I saw dogs, pigs, kangaroos,
    mountain lions, zebras and wolves. Eventually, it occurred to me that, for clarity''s sake, that is to indicate that the
    last two items mentioned are not related as a pair, I should end such a sentence as "...mountain lions, zebras, and wolves."
    I read that this use of the comma is called an "Oxford" commma. I think that the former use has just an aesthetic appeal,
    whereas the latter use has a more practical, clarifying function. I''m inclined, these days, to use the latter style.
    Is this indeed the "Oxford" comma, and, if so, is it considered correct, incorrect, or just a matter of preference? Thanks,
    -Gavin'
- source_sentence: Circle around symbol
  sentences:
  - 'I''m trying to make some good-looking numbers in a circle, using the simple command:               \textcircled{1}      However,
    the circle is misaligned vertically with the number, and look a bit sloppy: ![alt text](http://i.stack.imgur.com/V5KtM.png)
    Any suggestions how can I adjust the vertical alignment so that the numbers look more centered w.r.t to the circles? Or,
    if that''s not an option, what other ways to achieve the same results are possible? I will use those only for numbers,
    and in very few places, so manual adjustment per glyph is an option. I''m using `pdfLaTeX` with Computer Modern, if that
    matters.'
  - My girlfriend and I have been enjoying google chat and the feature that lets you know when the other person is on their
    phone indicated by a green circle vs a red circle when the phone is in sleep mode. For some unexplained reason, my phone
    now indicats her status as being red all the time even when we are talking to each other. Shey says she has not changed
    any settings, can anyone tell me how to fix this or what woudl cause this to happen?
  - '> **Possible Duplicate:**   >  How should I draw a singly/double linked list? I am currently trying to create an image
    of a linked list like this one: ![enter image description here](http://i.stack.imgur.com/Z2lw4.png) This is my current
    try: ![enter image description here](http://i.stack.imgur.com/s8aXw.png) What I miss is the dot at the start of the arrow
    and the second box for each list element. This is my try:               \documentclass{article}     \usepackage[pdftex,active,tightpage]{preview}     \setlength\PreviewBorder{2mm}          \usepackage{tikz}     \usetikzlibrary{trees,arrows,positioning,
    calc}           \tikzset{         squarecross/.style={             draw, fill=black!20, rectangle,minimum size=18pt,             inner
    sep=0pt, text=black,             path picture = {                 \draw[black]                 (path picture bounding
    box.north west) --                  (path picture bounding box.south east) --                 (path picture bounding box.south
    west) --                  (path picture bounding box.north east);             }         },         listelement/.style={             draw,
    fill=black!20, rectangle,minimum size=18pt,             inner sep=0pt, text=black,             path picture = {%                  \draw[black]                 ($(path
    picture bounding box.north west)$) --                 ($(path picture bounding box.north west)+(1,0)$) --                 ($(path
    picture bounding box.south west)+(1,0)$) --                  ($(path picture bounding box.south west)$);             }         }     }          \usetikzlibrary{trees,arrows,positioning,
    calc}          \begin{document}     \begin{preview}     \begin{tikzpicture}[font=\sffamily,very thick]     \node [listelement]
    (a) {12};     \node [listelement] (b) [right=of a] {99};     \node [listelement] (c) [right=of b] {37};     \node [squarecross]
    (d) [right=of c] {};     \draw [->] (a) -- (b);     \draw [->] (b) -- (c);     \draw [->] (c) -- (d);     \end{tikzpicture}     \end{preview}     \end{document}      How
    can I make it work? Why does the following part not work?               path picture = {%          \draw[black]         ($(path
    picture bounding box.north west)$) --         ($(path picture bounding box.north west)+(1,0)$) --         ($(path picture
    bounding box.south west)+(1,0)$) --          ($(path picture bounding box.south west)$);     }'
  - What animal is depicted in this image labelled “weefil”? ![Old woodcut labeled Weeſil](http://i.stack.imgur.com/5Fn5c.png)
  - I'm trying to use imo messenger to access my facebook chat. I remember I've been able to do it in the past but now I can't
    do it anymore. In the past, I loged on facebook through imo and then the facebook app opened, and then I could access
    facebook chat through Imo. Now when I log in imo, it opens the browser with a unusual kind of link - A kind of token.
    How can I open this token with the facebook app? I've read some stuff about how to associate files, but I've found nothing
    about these token links.
  - The network-operator name takes up that important real-estate in the top-left corner of my screen, on the left side of
    the notification bar. It takes up room that can better be used for notifications. Can the status/notification bar be hacked
    in some way to eliminate the network operator name? I've not yet seen any hack in the marketplace for this kind of thing.
    Would I have to write this myself? FYI, using Android 2.x on a UK Motorola Razr
