  sentences:
  - Maka segala hal yang dapat menghilangkan keduanya, sebisa mungkin untuk disingkirkan. Syaikh Abdul Aziz bin Marzuq ath-Thurifi
    mengatakan, “Khusyuk dan hadirnya hati merupakan ‘ruh’ dari shalat.” Dalam hadits Aisyah radhiyallahu ‘anha, Rasulullah
    shallallahu ‘alaihi wa sallam bersabda, “Jika di antara kalian ada yang ngantuk ketika shalat hendaknya dia tidur hingga
    hilang ngantuknya. Karena jika salah seorang di antara kalian tetap shalat, sedangkan ia dalam keadaan ngantuk, ia tidak
    akan tahu, mungkin ia bermaksud meminta ampun tetapi ternyata ia malah mencela dirinya sendiri.” Imam an-Nawawi menjelaskan
    kandungan hukum yang terdapat dalam hadits di atas, “Dalam hadits tersebut terdapat perintah bagi orang yang ngantuk ketika
    shalat untuk tidur sejenak atau aktivitas lainnya yang bisa menghilangkan ngantuk. Ini berlaku untuk jenis shalat secara
    umum, baik shalat wajib atau shalat nafilah, di malam hari ataupun siang hari. Ini adalah mazhab kami dan mazhab Jumhur.
    Dengan catatan, tidak keluar dari waktu shalat.” Jadi, jika memang rasa ngantuk ketika shalat itu cukup berat, sampai-sampai
    tidak sadar dengan gerakan-gerakan shalat yang ia lakukan, atau tidak sadar bacaan yang ia ucapkan, maka lebih baik ia
    menghentikan shalat kemudian tidur sejenak. Setelah rasa ngantuknya hilang, ia kembali wudhu dan shalat.Sebab, jika ngantuknya
    sampai membuat dirinya tidak sadar gerakan shalat yang dilakukan, atau tidak sadar bacaan yang ia ucapkan, maka shalatnya
    batal dan wajib diulangi.Abul Walid Al-Baji menjelaskan dalam kitab Al-Muntaqa bahwa jika ngantuk berat itu terjadi ketika
    melaksanakan shalat fardhu dan ada waktu untuk mengusir rasa kantuk kemudian masih tersisa waktu untuk shalat, atau dia
    tahu nanti aka nada orang yang membangunkannya, maka hendaknya dia
