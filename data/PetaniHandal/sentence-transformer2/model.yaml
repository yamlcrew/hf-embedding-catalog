widgetData:
- source_sentence: 'Setiap manusia saat meregang nyawa mengalami sakaratul maut sebagaimana dijelaskan dalam ayat: “Dan datanglah
    sakaratul maut dengan sebenar-benarnya. Itulah yang kamu selalu lari darinya.”Sakaratul maut berarti kesulitan dan kesukaran
    maut. Ar-Raghib dalam kitab Al-Mufradat menjelaskan, “Kata sakar adalah suatu keadaan yang menghalangi antara seseorang
    dengan dengan akalnya. Dalam penggunaannya, kata ini banyak dipakai untuk makna minuman yang memabukkan.'
  sentences:
  - 'Saat ia sakaratul maut, anaknya berkata kepadanya, “Wahai ayahku, engkau pernah mengatakan, ‘Semoga saja aku bertemu
    dengan seorang laki-laki yang berakal saat maut menjemputnya agar ia melukiskan kepadaku apa yang dilihatnya!’ sekarang,
    engkaulah orang itu. Maka ceritakanlah kepadaku!” Ayahnya menjawab, “Anakku, demi Allah, seakan-akan bagian sampingku
    berada di ranjang, seakan-akan aku bernafas dari jarum beracun, seakan-akan duri pohon ditarik dari tapak kakiku sampai
    kepala.”Kemudian ia mengucapkan sebait syair,Aduhai, andai saja sebelum hal yang telah jelas di hadapanku ini terjadi,Aku
    berada di puncak gunung sambil menggembala kambing.Baca Juga: Empat Penyebab Utama Suul KhatimahRasulullah shallallahu
    ‘alaihi wa sallam memberitahukan, bahwa sakaratul maut akan diringankan bagi orang yang mati syahid di medan perang.'
  - Ini pendapat Ibnu Umar, Malik, Abu Hanifah, dan pendapat Masyhur dari Ahmad bin Hanbal.Kedua, orang tersebut tidak perlu
    mengulang shalat Maghrib. Ini adalah pendapat Ibnu Abbas, Asy-Syafi’I, dan pendapat lain dalam mazhab Ahmad.Lebih lanjut,
    Syaikh Ibnu Taimiyah lebih menganggap shahih pendapat yang kedua. Alasan yang beliau kemukakan, Allah tidak pernah mewajibkan
    kepada hamba-Nya untuk mengulang shalat dua kali, maka bertakwalah kepada Allah semampunya. SENGAJA MENGAKHIRKAN SHALAT
    = DOSA BESARPoint yang peru diperhatikan dalam perkara ini adalah, orang yang suka mengakhirkan shalat dari waktunya tanpa
    ada udzur syar’i maka dia telah terjatuh dalam dosa besar.Sebab, melaksanakan shalat tepat waktu adalah ibdah yang hukumnya
    wajib. Syariat Islam secara tegas melarang kebiasaan mengakhirkan shalat dari waktunya, terutama shalat Ashar.
  - Perempuan Shalat Jumat di Rumah, Apa Boleh?
- source_sentence: Tidak ada riwayat satu pun dari beliau bahwa beliau menyembelih sembelihan pada waktu haji, atau Udhhiyah
    dengan selain unta, sapi atau kambing.Imam Nawawi mengatakan, “Maka syarat dibolehkannya berUdhhiyah adalah dengan binatang
    ternak, yaitu; unta, sapi dan kambing, baik semua jenis unta, semua jenis sapi atau semua jenis kambing. Tidak boleh selain
    binatang ternak, seperti banteng, zebra, dan semacamnya, baik yang jantan maupun betina, dan tidak ada perbedaaan dalam
    hal ini….
  sentences:
  - Bid’ah ini dibuat-buat para pemuka Mekah. Mereka dikenal sebagai Hums . Sementara orang-orang Arab biasa wukuf di Arafah.
    Mereka tidak diperkenankan wukuf di Muzdalifah.Maksudnya adalah saat melaksanakan thawaf, mereka tidak mau menggunakan
    baju yang pernah digunakan untuk berbuat maksiat terhadap Allah. Siapa pun, kecuali Hums, dilarang thawaf menggunakan
    baju yang sudah lama.Jika hums tidak memiliki pakaian untuk thawaf, ia thawaf dengan telanjang. Bahkan wanita juga thawaf
    dengan telanjang, hanya menutupi kemaluan dengan sesuatu. Ini dikuatkan oleh bait syair gubahan salah seorang wanita di
    antara merekaPada hari ini, sebagian diantaranya atau semuanya terlihat..Apa yang Nampak darinya tidaklah aku halalkanUntuk
    membantah kedua bid’ah ini, Allah menurunkan firman-Nya Kemudian bertolaklah kamu dari tempat bertolaknya orang-orang
    banyak dan mohonlah ampun kepada Allah; sesungguhnya Allah Maha Pengampun lagi Maha Penyayang.
  - Ini pendapat Ibnu Umar, Malik, Abu Hanifah, dan pendapat Masyhur dari Ahmad bin Hanbal.Kedua, orang tersebut tidak perlu
    mengulang shalat Maghrib. Ini adalah pendapat Ibnu Abbas, Asy-Syafi’I, dan pendapat lain dalam mazhab Ahmad.Lebih lanjut,
    Syaikh Ibnu Taimiyah lebih menganggap shahih pendapat yang kedua. Alasan yang beliau kemukakan, Allah tidak pernah mewajibkan
    kepada hamba-Nya untuk mengulang shalat dua kali, maka bertakwalah kepada Allah semampunya. SENGAJA MENGAKHIRKAN SHALAT
    = DOSA BESARPoint yang peru diperhatikan dalam perkara ini adalah, orang yang suka mengakhirkan shalat dari waktunya tanpa
    ada udzur syar’i maka dia telah terjatuh dalam dosa besar.Sebab, melaksanakan shalat tepat waktu adalah ibdah yang hukumnya
    wajib. Syariat Islam secara tegas melarang kebiasaan mengakhirkan shalat dari waktunya, terutama shalat Ashar.
  - Pembaruan Ajaran Agama di Era Jahiliyah
- source_sentence: 'Di Indonesia, masih sering didapati masjid yang menyediakan tempat shalat untuk jamaah perempuan pada
    saat shalat jumat. Sebenarnya, wajibkah perempuan shalat jumat di masjid, atau shalatnya di rumah?Shalat jumat di masjid
    secara berjamaah memang hanya diwajibkan untuk laki-laki muslim. Sedangkan perempuan muslimah tidak terbebani kewajiban
    shalat jumat di masjid. Hukum ini telah menjadi kesepakatan/ijma’ para ulama fikih. Dalilnya, hadits Thariq bin Syihab,
    bahwa Rasulullah pernah bersabda, : “Shalat jumat itu wajib bagi setiap muslim dilaksanakan secara berjamaah.'
  sentences:
  - Akhirnya shalat ini menyebar luas di masjid-masjid dan di rumah-rumah. Dan akhirnya seolah-olah shalat itu telah ditetapkan
    sebagai amalan sunnah hingga saat ini.”Kemudian Abu Bakar al-Thurthusyi bertanya kepada Abu Muhammad al-Maqdisi, “Aku
    pernah melihatmu melaksanakan shalat itu dalam sebuah jamaah shalat.” Ia pun menjawab, “Ya, Aku memohon ampun kepada Allah
    ‘Azza wa Jalla dari perbuatan itu.” Sementara itu, ada sumber lain yang menyebutkan shalat ini munculnya di Mekah. Sudah
    menjadi kebiasaan para penduduk Mekah ketika tiba malam Nishfu Sya’ban, mereka menghidupkan malam tersebut dengan Shalat
    Alfiyah di masjid, kemudian thawaf, dan membaca al-Quran hingga khatam. Mereka meyakini orang yang shalat pada malam Nishfu
    Sya’ban sebanyak seratus rekaat yang pada tiap rekaatnya membaca al-Ikhlash sepuluh kali, kemudian meminum air zam-zam,
    maka mereka akan mendapat limpahan barakah dari Allah. Dalam kaidah syar’i disebutkan, “Hukum asal amal Ibadah adalah
    haram.”Maksud dari kaidah ini, seluruh bentuk ibadah itu harus memiliki dasar hukum atau dalil yang jelas dari syariat.
  - Yaitu akad Ijab dan Qabul. Sementara Jumhur Ulama Fikih menyatakan bahwa rukun transaksi jual beli itu ada empat. Yaitu,
    Ada Penjual dan pembeli, ada Akad berbentuk Ijab Qabul, ada barang yang diperjual belikan, ada nilai jual atau harga.Atau,
    dalam istilah lain Aqid atau pihak yang melakukan akad , Ma’qud ‘Alaih atau objek yang diperjual belikan , dan Shighat
    atau pernyataan . Dalam persoalan syarat transaksi jual beli, terjadi perbedaan pendapat di kalangan para ulama mazhab.
    Menurut Mazhab Hanafi, ada 23 syarat transaksi jual beli yang harus terpenuhi. Menurut Mazhab Maliki, ada 11 syarat transaksi
    jual beli. Sementara menurut Mazhab Syafi’i, ada 22 syarat. Sedangkan Mazhab Hanafi mensyaratkan 11 syarat dalam transaksi
    jual beli. Di antara sekian banyak syarat yang menjadi ranah perbedaan pendapat tersebut, terdapat tiga syarat paling
    pokok yang disepakati oleh empat mazhab.
  - Sakaratul Maut Pasti Menghampirimu!
