    sentences:
    - Maka segala hal yang dapat menghilangkan keduanya, sebisa mungkin untuk disingkirkan. Syaikh Abdul Aziz bin Marzuq ath-Thurifi
      mengatakan, “Khusyuk dan hadirnya hati merupakan ‘ruh’ dari shalat.” Dalam hadits Aisyah radhiyallahu ‘anha, Rasulullah
      shallallahu ‘alaihi wa sallam bersabda, “Jika di antara kalian ada yang ngantuk ketika shalat hendaknya dia tidur hingga
      hilang ngantuknya. Karena jika salah seorang di antara kalian tetap shalat, sedangkan ia dalam keadaan ngantuk, ia tidak
      akan tahu, mungkin ia bermaksud meminta ampun tetapi ternyata ia malah mencela dirinya sendiri.” Imam an-Nawawi menjelaskan
      kandungan hukum yang terdapat dalam hadits di atas, “Dalam hadits tersebut terdapat perintah bagi orang yang ngantuk
      ketika shalat untuk tidur sejenak atau aktivitas lainnya yang bisa menghilangkan ngantuk. Ini berlaku untuk jenis shalat
      secara umum, baik shalat wajib atau shalat nafilah, di malam hari ataupun siang hari. Ini adalah mazhab kami dan mazhab
      Jumhur. Dengan catatan, tidak keluar dari waktu shalat.” Jadi, jika memang rasa ngantuk ketika shalat itu cukup berat,
      sampai-sampai tidak sadar dengan gerakan-gerakan shalat yang ia lakukan, atau tidak sadar bacaan yang ia ucapkan, maka
      lebih baik ia menghentikan shalat kemudian tidur sejenak. Setelah rasa ngantuknya hilang, ia kembali wudhu dan shalat.Sebab,
      jika ngantuknya sampai membuat dirinya tidak sadar gerakan shalat yang dilakukan, atau tidak sadar bacaan yang ia ucapkan,
      maka shalatnya batal dan wajib diulangi.Abul Walid Al-Baji menjelaskan dalam kitab Al-Muntaqa bahwa jika ngantuk berat
      itu terjadi ketika melaksanakan shalat fardhu dan ada waktu untuk mengusir rasa kantuk kemudian masih tersisa waktu
      untuk shalat, atau dia tahu nanti aka nada orang yang membangunkannya, maka hendaknya dia
    - Bid’ah ini dibuat-buat para pemuka Mekah. Mereka dikenal sebagai Hums . Sementara orang-orang Arab biasa wukuf di Arafah.
      Mereka tidak diperkenankan wukuf di Muzdalifah.Maksudnya adalah saat melaksanakan thawaf, mereka tidak mau menggunakan
      baju yang pernah digunakan untuk berbuat maksiat terhadap Allah. Siapa pun, kecuali Hums, dilarang thawaf menggunakan
      baju yang sudah lama.Jika hums tidak memiliki pakaian untuk thawaf, ia thawaf dengan telanjang. Bahkan wanita juga thawaf
      dengan telanjang, hanya menutupi kemaluan dengan sesuatu. Ini dikuatkan oleh bait syair gubahan salah seorang wanita
      di antara merekaPada hari ini, sebagian diantaranya atau semuanya terlihat..Apa yang Nampak darinya tidaklah aku halalkanUntuk
      membantah kedua bid’ah ini, Allah menurunkan firman-Nya Kemudian bertolaklah kamu dari tempat bertolaknya orang-orang
      banyak dan mohonlah ampun kepada Allah; sesungguhnya Allah Maha Pengampun lagi Maha Penyayang.
