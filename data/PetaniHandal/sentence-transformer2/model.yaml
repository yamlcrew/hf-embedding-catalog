  sentences:
  - 'Lalu Rasulullah shallallaahu ‘alaihi wa sallam bersabda: ‘Seandainya kalian bersuci untuk hari kalian ini.” .Dalam lafadz
    lain disebutkan, : ” “Dari Aisyah, bahwasannya ia berkata, “Dulu orang-orang merupakan pekerja keras yang tidak memiliki
    pelayan, sehingga tubuh mereka mengeluarkan bau yang tidak sedap. Dikatakanlah kepada mereka: ‘Seandainya kalian mandi
    pada hari Jumat.” Dua hadits Aisyah radhiyallahu ‘anha di atas terdapat lafadz Lau Ightasaltum, yang artinya “Jika kalian
    mandi.” Maknanya, dari segi teks, kedua hadits Aisyah radhiyallahu ‘anha di atas hanya menujukkan hukum anjuran, bukan
    hukum wajib.Memang ada sebagian ulama yang memahami hadits tersebut adalah dalil yang mendukung wajibnya mandi Jumat,
    namun hanya terbatas bagi orang-orang yang kondisi badannya ada bau menyengat akibat keringat, bukan wajib mutlak untuk
    seluruh muslim yang hendak mendatangi shalat Jumat.Di samping itu, ada banyak sekali atsar dari ulama Tabi’in yang menyatakan
    mandi Jumat itu hukumnya sunnah, seperti Atha’, asy-Sya’bi, Ibrahim an-Nakha’i, dan sebagainya. Ditambah lagi, pendapat
    ini adalah pendapat yang paling banyak dipilih oleh ulama kontemporer dan diamalkan oleh umat Islam.'
  - Yaitu akad Ijab dan Qabul. Sementara Jumhur Ulama Fikih menyatakan bahwa rukun transaksi jual beli itu ada empat. Yaitu,
