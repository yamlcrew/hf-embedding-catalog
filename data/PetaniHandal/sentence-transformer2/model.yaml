  - source_sentence: 'Di Indonesia, masih sering didapati masjid yang menyediakan tempat shalat untuk jamaah perempuan pada
      saat shalat jumat. Sebenarnya, wajibkah perempuan shalat jumat di masjid, atau shalatnya di rumah?Shalat jumat di masjid
      secara berjamaah memang hanya diwajibkan untuk laki-laki muslim. Sedangkan perempuan muslimah tidak terbebani kewajiban
      shalat jumat di masjid. Hukum ini telah menjadi kesepakatan/ijma’ para ulama fikih. Dalilnya, hadits Thariq bin Syihab,
      bahwa Rasulullah pernah bersabda, : “Shalat jumat itu wajib bagi setiap muslim dilaksanakan secara berjamaah.'
    sentences:
    - Akhirnya shalat ini menyebar luas di masjid-masjid dan di rumah-rumah. Dan akhirnya seolah-olah shalat itu telah ditetapkan
      sebagai amalan sunnah hingga saat ini.”Kemudian Abu Bakar al-Thurthusyi bertanya kepada Abu Muhammad al-Maqdisi, “Aku
      pernah melihatmu melaksanakan shalat itu dalam sebuah jamaah shalat.” Ia pun menjawab, “Ya, Aku memohon ampun kepada
      Allah ‘Azza wa Jalla dari perbuatan itu.” Sementara itu, ada sumber lain yang menyebutkan shalat ini munculnya di Mekah.
      Sudah menjadi kebiasaan para penduduk Mekah ketika tiba malam Nishfu Sya’ban, mereka menghidupkan malam tersebut dengan
      Shalat Alfiyah di masjid, kemudian thawaf, dan membaca al-Quran hingga khatam. Mereka meyakini orang yang shalat pada
      malam Nishfu Sya’ban sebanyak seratus rekaat yang pada tiap rekaatnya membaca al-Ikhlash sepuluh kali, kemudian meminum
      air zam-zam, maka mereka akan mendapat limpahan barakah dari Allah. Dalam kaidah syar’i disebutkan, “Hukum asal amal
      Ibadah adalah haram.”Maksud dari kaidah ini, seluruh bentuk ibadah itu harus memiliki dasar hukum atau dalil yang jelas
      dari syariat.
    - Yaitu akad Ijab dan Qabul. Sementara Jumhur Ulama Fikih menyatakan bahwa rukun transaksi jual beli itu ada empat. Yaitu,
      Ada Penjual dan pembeli, ada Akad berbentuk Ijab Qabul, ada barang yang diperjual belikan, ada nilai jual atau harga.Atau,
      dalam istilah lain Aqid atau pihak yang melakukan akad , Ma’qud ‘Alaih atau objek yang diperjual belikan , dan Shighat
      atau pernyataan . Dalam persoalan syarat transaksi jual beli, terjadi perbedaan pendapat di kalangan para ulama mazhab.
      Menurut Mazhab Hanafi, ada 23 syarat transaksi jual beli yang harus terpenuhi. Menurut Mazhab Maliki, ada 11 syarat
      transaksi jual beli. Sementara menurut Mazhab Syafi’i, ada 22 syarat. Sedangkan Mazhab Hanafi mensyaratkan 11 syarat
      dalam transaksi jual beli. Di antara sekian banyak syarat yang menjadi ranah perbedaan pendapat tersebut, terdapat tiga
      syarat paling pokok yang disepakati oleh empat mazhab.
    - Sakaratul Maut Pasti Menghampirimu!
  - source_sentence: 'Saat ia sakaratul maut, anaknya berkata kepadanya, “Wahai ayahku, engkau pernah mengatakan, ‘Semoga
      saja aku bertemu dengan seorang laki-laki yang berakal saat maut menjemputnya agar ia melukiskan kepadaku apa yang dilihatnya!’
      sekarang, engkaulah orang itu. Maka ceritakanlah kepadaku!” Ayahnya menjawab, “Anakku, demi Allah, seakan-akan bagian
      sampingku berada di ranjang, seakan-akan aku bernafas dari jarum beracun, seakan-akan duri pohon ditarik dari tapak
      kakiku sampai kepala.”Kemudian ia mengucapkan sebait syair,Aduhai, andai saja sebelum hal yang telah jelas di hadapanku
      ini terjadi,Aku berada di puncak gunung sambil menggembala kambing.Baca Juga: Empat Penyebab Utama Suul KhatimahRasulullah
      shallallahu ‘alaihi wa sallam memberitahukan, bahwa sakaratul maut akan diringankan bagi orang yang mati syahid di medan
      perang.'
    sentences:
    - 'Lalu Rasulullah shallallaahu ‘alaihi wa sallam bersabda: ‘Seandainya kalian bersuci untuk hari kalian ini.” .Dalam
      lafadz lain disebutkan, : ” “Dari Aisyah, bahwasannya ia berkata, “Dulu orang-orang merupakan pekerja keras yang tidak
      memiliki pelayan, sehingga tubuh mereka mengeluarkan bau yang tidak sedap. Dikatakanlah kepada mereka: ‘Seandainya kalian
      mandi pada hari Jumat.” Dua hadits Aisyah radhiyallahu ‘anha di atas terdapat lafadz Lau Ightasaltum, yang artinya “Jika
      kalian mandi.” Maknanya, dari segi teks, kedua hadits Aisyah radhiyallahu ‘anha di atas hanya menujukkan hukum anjuran,
      bukan hukum wajib.Memang ada sebagian ulama yang memahami hadits tersebut adalah dalil yang mendukung wajibnya mandi
      Jumat, namun hanya terbatas bagi orang-orang yang kondisi badannya ada bau menyengat akibat keringat, bukan wajib mutlak
      untuk seluruh muslim yang hendak mendatangi shalat Jumat.Di samping itu, ada banyak sekali atsar dari ulama Tabi’in
      yang menyatakan mandi Jumat itu hukumnya sunnah, seperti Atha’, asy-Sya’bi, Ibrahim an-Nakha’i, dan sebagainya. Ditambah
      lagi, pendapat ini adalah pendapat yang paling banyak dipilih oleh ulama kontemporer dan diamalkan oleh umat Islam.'
