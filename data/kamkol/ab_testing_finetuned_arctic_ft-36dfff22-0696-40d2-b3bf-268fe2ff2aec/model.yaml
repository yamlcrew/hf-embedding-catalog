    flawed (Ries 2011). For a big change, I suggest doing a pre-experiment betting competition on the OEC delta at different
    stages. If everyone agrees that the initial launch is going to be flat to negative, it sets the expectation that we should
    not launch it. Are people willing to sign-up that a month or two after the initial launch there will be positive value?
    That’s not long to wait. It’s humbling if the numbers are not as rosy as we expected. Maybe the strategy is not clearly
    a winner; let’s look at the data and improve things or pivot a bit before we commit to a big change. 5. We have Machine
    Learning models that optimize the user experience. They were tuned for the Control. If we were to ship the Treatment,
    they would optimize for that and the OEC would improve. Like the enabler argument, this is wishful thinking, a natural
    bias towards the new shiny object. What’s clear is that if we ship to 100%, we will never know if this argument is true
    or not, as we are losing the ability to run a controlled experiment. Could we retrain a couple of models from the Treatment
    data to see if there’s a difference in performance? 6. Consistency of the user experience. If the two experience are different
    enough, some users will suffer flipping experiences, or have different experiences on different devices. We have two variants--Control
    and Treatment—that are performing similarly, so are in a state of equipoise. From a reliability and maintenance perspective,
    it’s better to shut down the Treatment for another month until we build the great feature on top of it, as we give our
    users a consistent reliable experience until then. Remember that most ideas fail, and most large redesigns are notoriously
    difficult to get right in the first iterations: they tend to be worse or similar to the existing version. It’s a good
    idea to iterate a few times to confirm that we have indeed landed on a higher/better mountain with great opportunities
    before committing. Teams should be empowered to ship positive changes. When the OEC delta is flat, the default should
    be to challenge the team to iterate and show improvement and avoid falling into the traps shared above. Sure, there will
    be exceptions, but the default should be clear: flat implies no ship. The argument is even stronger when the OEC delta
