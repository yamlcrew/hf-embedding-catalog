- source_sentence: How does the Overall Evaluation Criterion (OEC) guide the duration of A/B experiments, and why is the alpha
    level of 0.05 considered a reasonable default in hypothesis testing for trustworthy results?
  sentences:
  - 'h t t p s : / / b i t . l y / p v a l u e M i s i n t e r p r e t a t i o n s P-value Misinterpretations – Annotated
    References Ron Kohavi Feb 28, 2024 Misinterpretation and abuse of statistical tests, confidence intervals, and statistical
    power have been decried for decades, yet remain rampant. A key problem is that there are no interpretations of these concepts
    that are at once simple, intuitive, correct, and foolproof. -- Greenland et al (2016) What will be said in this paper
    is hardly original. It is, in a certain sense, what "everybody knows." To say it "out loud" is, as it were, to assume
    the role of the child who pointed out that the emperor was really outfitted only in his underwear. -- David Bakan (1966)
    Rather than try and explain p-values, I’ll annotate some of the best references I know. In A/B Testing Intuition Busters
    (Section 3, Appendix, and newer comments), we called out vendors and book authors for misinterpreting p-values, or coming
    up with names like “confidence” for (1-p-value), which is misleading. Below are some great references to look at with
    links to downloadable PDFs. 1. Statistical Errors (2014) by Regina Nuzzo. According to ASA’s statement on p-values (below),
    the article is “one of the most highly viewed Nature articles.” On Google Scholar, it shows over 1,700 citations. Some
    excerpts a. " … surprisingly slippery nature of the P value, which is neither as reliable nor as objective as most scientists
    assume. “ b. “P values have always had critics. In their almost nine decades of existence, they have been likened to mosquitoes
    (annoying and impossible to swat away), the emperor’s new clothes (fraught with obvious problems that everyone ignores)
    and the tool of a ''sterile intellectual rake'' who ravishes science but leaves it with no progeny.” c. “The more implausible
    the hypothesis—telepathy, aliens, homeopathy—the greater the chance that an exciting finding is a false alarm, no matter
    what the P value is.” This fits in with my belief in Twyman’s Law (https://bit.ly/twymanLaw). d. “Simonsohn’s simulations
    have shown that changes in a few data-analysis decisions can increase the false-positive rate in a single study to 60%”
    e. The figure below, from the paper, makes it clear that with low success rates (priors), a p-value of 0.05 does not provide
    strong evidence against the null hypothesis, a point we made using FPR (false positive risk) in A/B Testing Intuition
    Busters . I’ve replicated the numbers, allowing you to plug your own in https://bit.ly/PvaluesToBayesPosteriors . Note
    that in our paper, we looked at the FPR of setting alpha to some value, not for a particular experiment having a given
    p-value. h t t p s : / / b i t . l y / p v a l u e M i s i n t e r p r e t a t i o n s 2. Statistical tests, P values,
    confidence intervals, and power: a guide to misinterpretations (2016) by Sander Greenland, Stephen J. Senn, Kenneth J.
    Rothman, John B. Carlin, Charles Poole, Steven N. Goodman, Douglas G. Altman. This article has over 2800 citations. According
    to ASA’s statement on p-values (below), the article “is a significant contribution to the literature about p-values and
    statistical significance.” The paper provides definitions and 25 misinterpretations of p-values, confidence intervals,
    and power. a. "Every method of statistical inference depends on a complex web of assumptions about how data were collected
    and analyzed, and how the analysis results were selected for presentation. The full set of assumptions is embodied in
    a statistical model that underpins the method. This model is a mathematical representation of data variability, and thus
    ideally would capture accurately all sources of such variability … These assumptions are often deceptively simple to write
    down mathematically, yet in practice are difficult to satisfy and verify … ” b. “ … we will adopt a more general view
    of the P value as a statistical summary of the compatibility between the observed data and what we would predict or expect
    to see if we knew the entire statistical model (all the assumptions used to compute the P value) were correct.” c. “The
    P value is then the probability that the chosen test statistic would have been at least as large as its observed value
    if every model assumption were correct, including the test hypothesis. This definition embodies a crucial point lost in
    traditional definitions: In logical terms, the P value tests all the assumptions about how the data were generated (the
    entire model), not just the targeted hypothesis it is supposed to test (such as a null hypothesis) … .include assumptions
    about the conduct of the analysis, for example that intermediate analysis results were not used to determine which analyses
    would be presented.” d. “ … a very small P value does not tell us which assumption is incorrect. For example, the P value
    may be very small because the targeted hypothesis is false; but it may instead (or in addition) be very small because
    the study protocols were violated, or because it was selected for presentation based on its small size.” h t t p s : /
    / b i t . l y / p v a l u e M i s i n t e r p r e t a t i o n s e. Misconception #1: “The P value is the probability that
    the test hypothesis is true; for example, if a test of the null hypothesis gave P = 0.01, the null hypothesis has only
    a 1 % chance of being true; if instead it gave P = 0.40, the null hypothesis has a 40 % chance of being true. No! The
    P value assumes the test hypothesis is true—it is not a hypothesis probability and may be far from any reasonable probability
    for the test hypothesis.” f. Misconception #2:'
