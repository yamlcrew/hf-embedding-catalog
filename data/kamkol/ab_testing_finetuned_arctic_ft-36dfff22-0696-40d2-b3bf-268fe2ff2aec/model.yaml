- source_sentence: How does the Johari et al. (2017) finding on multiple testing errors relate to the importance of trustworthy
    experiments in experimentation platforms as discussed by Kohavi and Vermeer?
  sentences:
  - '<2-hop>


    What Should the Primary Metric be for Experimentation Platforms? Ron Kohavi and Lukas Vermeer Initial version: 6/29/2023,
    updated 7/3/2023. Whether you’re building an experimentation platform inside a company, or you’re a vendor of such a platform,
    we claim that a great goal metric, or primary metric, to evaluate the experimentation platform team is the number of experiment
    treatments whose scorecards are trustworthy. Introduction Both of us were involved in building experimentation platforms:
    Ron Kohavi at Microsoft and Airbnb, and Lukas Vermeer at Booking.com and Vista. Our teams were both using similar metrics
    related to the number of experiments, so it was surprising to see a post by Manuel Da Costa (2023) that claimed that the
    number of tests you run is meaningless in an experimentation program, and that it is a vanity metric. Before we go into
    the details, we want to emphasize several points: 1. Trust is a fundamental requirement—tables stakes. Manuel indeed asked:
    “what good is X number of experiments if you cannot trust the data?” and we agree here. But rather than abandoning the
    metric, we believe it should be a qualified metric: trustworthy experiments. The experimentation platform should make
    it hard to make statistical mistakes, such as multiple- hypothesis testing, which the initial version of Optimizely encouraged
    (Borden 2014), an oversight that was fixed over time (Johari, et al. 2017). If you find that the computation of variance
    for key metrics was incorrect, because the variance for ratio metrics needs to be computed using the delta method, and
    it was not properly done, those analyzed experiments should not count. Focus on trustworthy experiments encourages the
    team to validate results by running A/A tests and automatically identify flaws, such as SRMs (sample-ratio-mismatch) (Fabijan,
    et al. 2019). 2. This metric is intended for the experimentation platform team, not for the clients of the experimentation
    platform (e.g., product development teams). The clients should be optimizing for their business metric, which is usually
    based on some criteria related to long-term customer and business value (e.g., conversions or revenue with some guardrails,
    customer satisfaction, repeat usage). If those teams have a well-defined OEC (Overall Evaluation Criterion), then a good
    metric for those teams could simply be the sum of the improvements to the OEC of features that were launched (launching
    usually implies that guardrails were not violated). 3. We prefer to count treatments and not experiments so that the platform
    will provide great support for A/B/n tests (e.g., A/B/C or A/B/C/D) and not just A/B. Instead of evaluating an idea or
    a design with the “best” single treatment, we want to encourage experimenters to be humble and try two or three treatments,
    and thus increase their chances of finding a superior treatment. Ghosh et. al. (2020) evaluated over 6,000 experiments
    that ran on Optimizely and wrote that “an increase in the number of treatment variants within an experiment associates
    with a 3.8% increase in the conversion rate of an experiment (p < .001). This result confirms basic intuition that more
    treatment variants increase the chance of finding higher lifts (Optimizely applies false discovery rate (FDR) control
    via the Benjamini-Hochberg procedure in the calculation of its results).”'
  - '5 Implementation architecture Implementing an experiment on a website involves three components. The ﬁrst component is
    the randomization algorithm, which is a function that maps end users to variants. The second component is the assignment
    method, which uses the output of the randomization algorithm to determine the experience that each user will see on the
    website. The third component is the data path, which captures raw observation data as the users interact with the website,
    aggregates it, applies statistics, and prepares reports of the experiment’s outcome. 5.1 Randomization algorithm Finding
    a good randomization algorithm is critical because the statistics of controlled experiments assume that each variant of
    an experiment is assigned a random sample of end users. Randomization algorithms must have the following three properties
    to support statistically correct experiments (using the methodology presented above): 1. End users must be equally likely
    to see each variant of an experiment (assuming a 50–50 split). There should be no bias toward any particular variant.
    2. Repeat assignments of a single end user must be consistent; the end user should be assigned to the same variant on
    each successive visit to the site. 123 164 R. Kohavi et al. 3. When multiple experiments are run, there must be no correlation
    between exper- iments. An end user’s assignment to a variant in one experiment must have no effect on the probability
    of being assigned to a variant in any other experiment. Randomization algorithms may optionally support the following
    two desirable properties: 4. The algorithm may support monotonic ramp-up, meaning that the percentage of users who see
    a Treatment can be slowly increased without changing the assign- ments of users who were previously assigned to that Treatment.
    Supporting this property allows the Treatment percentage to be slowly increased without impair- ing the user experience
    or damaging the validity of the experiment. 5. The algorithm may support external control, meaning that users can be manually
    forced into and out of variants. This property makes it easier to test the experi- mental site. The remainder of this
    section will only consider techniques that satisfy at least the ﬁrst three properties. 5.1.1 Pseudorandom with caching
    A standard pseudorandom number generator can be used as the randomization algorithm when coupled with a form of caching.
    A good pseudorandom number gen- erator will, by itself, satisfy the ﬁrst and third requirements of the randomization algorithm.
    We tested several popular random number generators on their ability to satisfy the ﬁrst and third requirements. We tested
    ﬁve simulated experiments against one million sequential user IDs, running chi-square tests to look for interactions.
    We found that the random number generators built into many popular languages (for example, C#) work well as long as the
    generator is seeded only once at server startup. Seeding the random number generator on each request may cause adjacent
    requests to use the same seed which may (as it did in our tests) introduce noticeable correlations between exper- iments.
    In particular, we found that the technique employed by Eric Peterson using Visual Basic (Peterson 2005) creates two-way
    interactions between experiments. To satisfy the second requirement, the algorithm must introduce state: the assign- ments
    of end users must be cached once they visit the site. The caching can be accom- plished either on the server side (by
    storing the assignments for all users in some form of database), or on the client side (by storing a user’s assignment
    in a cookie). The database approach is expensive (in hardware), and has space requirements that increase linearly with
    the number of experiments and the number of users. However, it easily satisﬁes the ﬁfth property by allowing the user
    assignment database to be modiﬁed. The cookie approach is significantly cheaper, requiring no database and costing only
    a linear amount of space in the number of experiments (this time within the user’s cookie). It will not work for users
    with cookies turned off. Both forms of this approach are difﬁcult to scale up to a large system with a large ﬂeet of servers.
    The server making the random assignment must communicate its state to all the other servers (including those used for
    backend algorithms) in order 123 Controlled experiments on the web 165 to keep assignments consistent. This sort of propagation
    is expensive and difﬁcult to implement correctly. The fourth requirement (monotonic ramp-up) is difﬁcult to implement
    using this method, and so many systems ignore the requirement altogether. Regardless of which approach is used to maintain
    state, the system would need to carefully reassign Con- trol users who visit the site after a ramp-up. The difﬁculty comes
    in determining the percentage Treatment to assign to these users so that the overall Treatment percentage reaches the
    desired value. 5.1.2 Hash and partition This method eliminates the need for caching by replacing the random number generator
    with a hash function. Unlike a random number generator, which produces randomly distributed numbers independent of any
    input, a (good) hash function produces ran- domly distributed numbers as a function of a speciﬁc input. The method works
    as follows: each user is assigned a single unique identiﬁer which is maintained either through a database or a cookie.
    Likewise, each experiment is assigned a unique iden- tiﬁer. A hash function is applied to the combination of the user
    identiﬁer and the experiment identiﬁer (e.g. by concatenating them together) to obtain an integer that is uniformly distributed
    on a range of values. The range is then partitioned, with each variant represented by a partition. The unique user identiﬁer
    may be reused across any number of experiments. This method is very sensitive to the choice of hash function. If the hash
    function has any funnels (instances where adjacent keys map to the same hash code) then the ﬁrst property (uniform distribution)
    will be violated. And if the hash function has characteristics (instances where a perturbation of the key produces a predictable
    per- turbation of the hash code), then correlations may occur between experiments. Few hash functions are sound enough
    to be used in'
