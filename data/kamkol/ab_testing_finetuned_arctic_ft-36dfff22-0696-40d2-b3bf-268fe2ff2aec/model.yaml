    the cookies are the user identifiers, this actually creates significant bias. these users (by cookie) are not representative
    of the overall population and diverge significantly on key characteristics. Unlike Intention-To-Treat studies in clinical
    trials , this is a Missing Outcome Data p roblem, and generalizations from this set of users to the overall population,
    referred to as external validity, are hard to make [19]. In this paper, we share a set of pitfalls that may undermine
    the external validity of long -term online controlled experiments. We discuss cookie stability, survivorship bi as, selection
    bias, perceived trends, side effects, and seasonality and share methodologies that can be used to partially address some
    of these issues. We believe that the insi ghts we share will apply to a wide variety of A/B/n testing scenarios , and
    that discussing and sharing mechanisms to address or workaround the pitfalls will lead to a better understanding of the
    results in long-term online controlled experiments. Our contributions in this paper include: 1. Discussion of a phenomenon
    we call cookie clobbering, which impacts cookie churn and likely impacts many web sites. While the general idea of cookie
    churn is well- known, to the best of our knowledge, this is the first time the specific issue we call cookie clobbering
    is discussed (although the term has been used to refer to cookie churn in some web resources) . We provide key statistics
    and a technique we used for several years at Bing to reduce such unintentional cookie chu rn. We believe this technique
    should be used by many sites. In the context of long -running experiments, this helps reduce loss of cookies over time,
    aiding in longitudinal studies. Unrelated to long-running experiments, this can help sites maintain longer-lasting user
    identity, useful in personalization scenarios, for example. 2. Discussion of results from a Bing experiment, similar to
    the one conducted by Google in the FLT paper . Unlike the FLT paper, however, we observed significant survivorship bias
    in this experiment. We discuss why survivorship bias is a key issue in analyzing long -term experiments which, if present,
    makes it very hard to accurately measure user learning. 3. Deep analysis of a long -running experiment that we believe
    is impacted by “ user learning,” including a comparison of several approaches to estimating the overall long -term impact.
    We discuss the issue s of selection bias and perceived trends in the context of this experiment. 4. Discussion of the
    impact of side effects and seasonalit y on the results of long -term experiments, using actual experiments from Bing and
    MSN. II. ONLINE CONTROLLED EXPERIMENTS In the online controlled experiments that we discuss here, users are randomly split
    between the variants (e.g., in an A/B test, two differ ent versions of the web site) in a persistent manner (a user receives
    the same experience in multiple visits). Users’ interactions with the site are instrumented (e.g., page views, clicks)
    and key metrics computed (e.g., clickthrough-rates, sessions/user, revenue/user, time -to- click). Statistical tests are
    used to analyze the resulting metrics. If the delta between the metric values for Treatment and Control is statistically
    significant, we conclude with high probability that the change we introduced caused the observed effect on the metric.
    See Controlled experiments on the web: survey and practical guide [20] for details.'
