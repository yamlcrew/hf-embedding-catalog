    York, NY, USA. 10 pages. https://doi.org/10.1145/3534678.3539160 1. Introduction Misinterpretation and abuse of statistical
    tests, confidence intervals, and statistical power have been decried for decades, yet remain rampant. A key problem is
    that there are no interpretations of these concepts that are at once simple, intuitive, correct, and foolproof -- Greenland
    et al (2016) A/B tests, or online c ontrolled experiments (see appendix for references), are heavily used in industry
    to evaluate implementations of ideas, with the larger companies starting over 100 experiment treatments every business
    day (Gupta, et al. 2019). While the statistics behind controlled experiments are well documented and some pitfalls were
    shared (Crook, et al. 2009, Dmitriev, Frasca, et al. 2016, Kohavi, Tang and Xu 2020, Dmitriev, Gupta, et al. 2017) , we
    see many erroneous applications and misunderstanding of the statistics, including in books, papers, and software. The
    appendix shows the impact of these misunderstood concepts in courts and legislation. The concepts we share appear intuitive
    yet hide unexpected complexities. A lthough some amount of abstraction leakage is usually unavoidable (Kluck and Vermeer
    2015) , our goal is to share these common intuition busters so that experimentation platforms can be designed to make
    it harder for experimenters to misuse them. Our contributions are as follows: • We share a c ollection of important intuition
    buster s. Some well-known commercial vendors of A/B testing software have focused on “intuitive” presentations of results,
    resulting in incorrect claims to their users instead of addressing their underlying faulty intuitions. We believe that
    these solutions exacerbate the situation, as they reinforce incorrect intuitions. • We drill deeply into one non -intuitive
    result, which to the best of our knowledge has not been studied before: the distribution of the treatment e ffect under
