  - source_sentence: How does the Overall Evaluation Criterion (OEC) guide the duration of A/B experiments, and why is the
      alpha level of 0.05 considered a reasonable default in hypothesis testing for trustworthy results?
    sentences:
    - 'h t t p s : / / b i t . l y / p v a l u e M i s i n t e r p r e t a t i o n s P-value Misinterpretations – Annotated
      References Ron Kohavi Feb 28, 2024 Misinterpretation and abuse of statistical tests, confidence intervals, and statistical
      power have been decried for decades, yet remain rampant. A key problem is that there are no interpretations of these
      concepts that are at once simple, intuitive, correct, and foolproof. -- Greenland et al (2016) What will be said in
      this paper is hardly original. It is, in a certain sense, what "everybody knows." To say it "out loud" is, as it were,
      to assume the role of the child who pointed out that the emperor was really outfitted only in his underwear. -- David
      Bakan (1966) Rather than try and explain p-values, I’ll annotate some of the best references I know. In A/B Testing
      Intuition Busters (Section 3, Appendix, and newer comments), we called out vendors and book authors for misinterpreting
      p-values, or coming up with names like “confidence” for (1-p-value), which is misleading. Below are some great references
      to look at with links to downloadable PDFs. 1. Statistical Errors (2014) by Regina Nuzzo. According to ASA’s statement
      on p-values (below), the article is “one of the most highly viewed Nature articles.” On Google Scholar, it shows over
      1,700 citations. Some excerpts a. " … surprisingly slippery nature of the P value, which is neither as reliable nor
      as objective as most scientists assume. “ b. “P values have always had critics. In their almost nine decades of existence,
      they have been likened to mosquitoes (annoying and impossible to swat away), the emperor’s new clothes (fraught with
      obvious problems that everyone ignores) and the tool of a ''sterile intellectual rake'' who ravishes science but leaves
      it with no progeny.” c. “The more implausible the hypothesis—telepathy, aliens, homeopathy—the greater the chance that
      an exciting finding is a false alarm, no matter what the P value is.” This fits in with my belief in Twyman’s Law (https://bit.ly/twymanLaw).
      d. “Simonsohn’s simulations have shown that changes in a few data-analysis decisions can increase the false-positive
      rate in a single study to 60%” e. The figure below, from the paper, makes it clear that with low success rates (priors),
      a p-value of 0.05 does not provide strong evidence against the null hypothesis, a point we made using FPR (false positive
      risk) in A/B Testing Intuition Busters . I’ve replicated the numbers, allowing you to plug your own in https://bit.ly/PvaluesToBayesPosteriors
      . Note that in our paper, we looked at the FPR of setting alpha to some value, not for a particular experiment having
      a given p-value. h t t p s : / / b i t . l y / p v a l u e M i s i n t e r p r e t a t i o n s 2. Statistical tests,
      P values, confidence intervals, and power: a guide to misinterpretations (2016) by Sander Greenland, Stephen J. Senn,
      Kenneth J. Rothman, John B. Carlin, Charles Poole, Steven N. Goodman, Douglas G. Altman. This article has over 2800
      citations. According to ASA’s statement on p-values (below), the article “is a significant contribution to the literature
      about p-values and statistical significance.” The paper provides definitions and 25 misinterpretations of p-values,
      confidence intervals, and power. a. "Every method of statistical inference depends on a complex web of assumptions about
      how data were collected and analyzed, and how the analysis results were selected for presentation. The full set of assumptions
      is embodied in a statistical model that underpins the method. This model is a mathematical representation of data variability,
      and thus ideally would capture accurately all sources of such variability … These assumptions are often deceptively
      simple to write down mathematically, yet in practice are difficult to satisfy and verify … ” b. “ … we will adopt a
      more general view of the P value as a statistical summary of the compatibility between the observed data and what we
      would predict or expect to see if we knew the entire statistical model (all the assumptions used to compute the P value)
      were correct.” c. “The P value is then the probability that the chosen test statistic would have been at least as large
      as its observed value if every model assumption were correct, including the test hypothesis. This definition embodies
      a crucial point lost in traditional definitions: In logical terms, the P value tests all the assumptions about how the
      data were generated (the entire model), not just the targeted hypothesis it is supposed to test (such as a null hypothesis)
      … .include assumptions about the conduct of the analysis, for example that intermediate analysis results were not used
      to determine which analyses would be presented.” d. “ … a very small P value does not tell us which assumption is incorrect.
      For example, the P value may be very small because the targeted hypothesis is false; but it may instead (or in addition)
      be very small because the study protocols were violated, or because it was selected for presentation based on its small
      size.” h t t p s : / / b i t . l y / p v a l u e M i s i n t e r p r e t a t i o n s e. Misconception #1: “The P value
      is the probability that the test hypothesis is true; for example, if a test of the null hypothesis gave P = 0.01, the
      null hypothesis has only a 1 % chance of being true; if instead it gave P = 0.40, the null hypothesis has a 40 % chance
      of being true. No! The P value assumes the test hypothesis is true—it is not a hypothesis probability and may be far
      from any reasonable probability for the test hypothesis.” f. Misconception #2:'
    - '<2-hop>


      #1: Stat-sig is p-value < 0.05 for Two-Tailed Tests • Despite a lot of questions about alpha=0.05 as a threshold, it
      is a great default, especially when coupled with two-tailed tests • Jonny Longden posted that “95% significance in A/B
      testing is a dumb rule” because it does not capture your appetite for risk.” I disagree. • When I share a success story
      for an idea that wins, I want it to be wrong less than 5% of the time. As we’ll see on the next slides, that requires
      lowering the alpha to 0.01 in many scenarios, and that requires running experiments much longer (with the same degree
      of power), so we lose agility. When I consider both risk & agility, 0.05 turns out to be a reasonable default • If the
      PM or the CEO believes the idea is great, how much would you trust that prior probability (and thus raise alpha)? Turns
      out very little. We are poor at assessing the value of ideas #8 © 2022 Ron Kohavi #1: Stat-sig (cont) • Medical drugs
      are evaluated in the US by the FDA using strict statistical protocols (*) • In 1962, Congress passed the Drug Amendments
      that for the first time required that new drugs be shown to be effective using the term “substantial evidence,” which
      was defined as “well-controlled investigations.” • In 1969, the FDA for the first time required the submission of a
      hypothesis, an analysis plan, and it made the threshold of 0.05 standard • The latest guidance (E9 Statistical Principles
      for Clinical Trials) states that conventionally • Type-I error should be set to 5% (Alpha = 0.05) for two-sided tests,
      and 2.5% for one-sided tests • Type-II error should be set to 10-20% (Power of 80-90%) and then they leave the door
      open to adjustments by writing Alternative values to the conventional levels of Type I and Type II error may be acceptable
      or even preferable in some cases. • In a domain where life and death decisions are made, where one could claim higher
      or lower risks for different drugs, and where expert statisticians work, they suggested a conventional default of 0.05
      and allowed for adjustments #9 (*) See a great historical account by Kennedy-Shaffer (2017) © 2022 Ron Kohavi The NP-Hard
      Analogy • In Garey and Johnson’s Computers and Intractability: A Guide to the Theory of NP-Completeness, they show this
      cartoon about a person who can’t find an efficient solution to an NP-hard problem: • My claim is similar: if the FDA
      with all its statisticians decided to default to a constant, and leave the door open to adjustments, it’s a reasonable
      decision • I’m well aligned with that thinking #10 I can''t find an efficient algorithm, but neither can all these famous
      people PC cartoon from https://www.ac.tuwien.ac.at/people/szeider/cartoon/ Not politically correct gender © 2022 Ron
      Kohavi #1: Stat-sig – 0.05 is special • The following is more of an academic reason, but worth mentioning • For sample
      sizes ≥ 20 a point estimate ± two standard errors has approximately 95% coverage for a wide variety of distributions
      - Gerald van Belle''s Statistical Rules of Thumb • The graph shows Tail probability of non-coverage of estimate ±2 standard
      errors. Curves are for exponential distribution with sample sizes 1, 2, 5, and 20. The x-axis is the standardized variable
      • This property applies to a 95% confidence interval; it does not work for example, for an 80% confidence interval •
      See post (8/2022) #11 © 2022 Ron Kohavi #1: Stat-sig False Positive Risk • The p-value is computed assuming the null
      hypothesis is true. If we can estimate the success rate for experiments in an org, we can compute the False-Positive-Risk,
      the probability that a statistically significant result is a false positive. • Here is a table of success rates in industry
      and the implied False-Positive-Risk (FPR) #12 Company / Source Success Rate FPR (alpha=0.05) FPR (alpha=0.10) Optimizely’s
      default Or one-tailed with alpha=0.05 Microsoft 33% 5.9% 11.1% Avinash Kaushik 20% 11.1% 20.0% Bing 15% 15.0% 26.2%
      Booking.com, Google Ads, Netflix 10% 22.0% 36.0% Airbnb Search 8% 26.4% 41.8% © 2022 Ron Kohavi #1: Stat-sig – Two Tailed
      Tests • When using an A/B tests, we only ship stat-sig improvements, not degradations, so why run two-tailed tests?
      • With the alpha=0.05, two-tailed really means alpha=0.025 for the improvement tail. Given the FPR rates (previous slide),
      we really want that alpha, not 0.05 • In practice, you want to detect stat-sig degradations, so you want both tails.
      They are an important signal to abort and to identify bugs. • Some might prefer a different alpha for the two tails,
      and I think it’s fine to run TOST – Two One-Sided Tests with alpha at most 0.025 for the improvement tail. See post
      (2/2022) #13 © 2022 Ron Kohavi'
