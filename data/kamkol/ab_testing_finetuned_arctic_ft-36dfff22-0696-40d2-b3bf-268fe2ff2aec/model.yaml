    #1: Stat-sig is p-value < 0.05 for Two-Tailed Tests • Despite a lot of questions about alpha=0.05 as a threshold, it is
    a great default, especially when coupled with two-tailed tests • Jonny Longden posted that “95% significance in A/B testing
    is a dumb rule” because it does not capture your appetite for risk.” I disagree. • When I share a success story for an
    idea that wins, I want it to be wrong less than 5% of the time. As we’ll see on the next slides, that requires lowering
    the alpha to 0.01 in many scenarios, and that requires running experiments much longer (with the same degree of power),
    so we lose agility. When I consider both risk & agility, 0.05 turns out to be a reasonable default • If the PM or the
    CEO believes the idea is great, how much would you trust that prior probability (and thus raise alpha)? Turns out very
    little. We are poor at assessing the value of ideas #8 © 2022 Ron Kohavi #1: Stat-sig (cont) • Medical drugs are evaluated
    in the US by the FDA using strict statistical protocols (*) • In 1962, Congress passed the Drug Amendments that for the
    first time required that new drugs be shown to be effective using the term “substantial evidence,” which was defined as
    “well-controlled investigations.” • In 1969, the FDA for the first time required the submission of a hypothesis, an analysis
    plan, and it made the threshold of 0.05 standard • The latest guidance (E9 Statistical Principles for Clinical Trials)
    states that conventionally • Type-I error should be set to 5% (Alpha = 0.05) for two-sided tests, and 2.5% for one-sided
    tests • Type-II error should be set to 10-20% (Power of 80-90%) and then they leave the door open to adjustments by writing
    Alternative values to the conventional levels of Type I and Type II error may be acceptable or even preferable in some
    cases. • In a domain where life and death decisions are made, where one could claim higher or lower risks for different
    drugs, and where expert statisticians work, they suggested a conventional default of 0.05 and allowed for adjustments
    #9 (*) See a great historical account by Kennedy-Shaffer (2017) © 2022 Ron Kohavi The NP-Hard Analogy • In Garey and Johnson’s
    Computers and Intractability: A Guide to the Theory of NP-Completeness, they show this cartoon about a person who can’t
    find an efficient solution to an NP-hard problem: • My claim is similar: if the FDA with all its statisticians decided
    to default to a constant, and leave the door open to adjustments, it’s a reasonable decision • I’m well aligned with that
    thinking #10 I can''t find an efficient algorithm, but neither can all these famous people PC cartoon from https://www.ac.tuwien.ac.at/people/szeider/cartoon/
    Not politically correct gender © 2022 Ron Kohavi #1: Stat-sig – 0.05 is special • The following is more of an academic
    reason, but worth mentioning • For sample sizes ≥ 20 a point estimate ± two standard errors has approximately 95% coverage
    for a wide variety of distributions - Gerald van Belle''s Statistical Rules of Thumb • The graph shows Tail probability
    of non-coverage of estimate ±2 standard errors. Curves are for exponential distribution with sample sizes 1, 2, 5, and
    20. The x-axis is the standardized variable • This property applies to a 95% confidence interval; it does not work for
    example, for an 80% confidence interval • See post (8/2022) #11 © 2022 Ron Kohavi #1: Stat-sig False Positive Risk • The
    p-value is computed assuming the null hypothesis is true. If we can estimate the success rate for experiments in an org,
    we can compute the False-Positive-Risk, the probability that a statistically significant result is a false positive. •
    Here is a table of success rates in industry and the implied False-Positive-Risk (FPR) #12 Company / Source Success Rate
    FPR (alpha=0.05) FPR (alpha=0.10) Optimizely’s default Or one-tailed with alpha=0.05 Microsoft 33% 5.9% 11.1% Avinash
    Kaushik 20% 11.1% 20.0% Bing 15% 15.0% 26.2% Booking.com, Google Ads, Netflix 10% 22.0% 36.0% Airbnb Search 8% 26.4% 41.8%
    © 2022 Ron Kohavi #1: Stat-sig – Two Tailed Tests • When using an A/B tests, we only ship stat-sig improvements, not degradations,
    so why run two-tailed tests? • With the alpha=0.05, two-tailed really means alpha=0.025 for the improvement tail. Given
    the FPR rates (previous slide), we really want that alpha, not 0.05 • In practice, you want to detect stat-sig degradations,
    so you want both tails. They are an important signal to abort and to identify bugs. • Some might prefer a different alpha
    for the two tails, and I think it’s fine to run TOST – Two One-Sided Tests with alpha at most 0.025 for the improvement
    tail. See post (2/2022) #13 © 2022 Ron Kohavi'
