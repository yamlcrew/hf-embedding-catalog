    We do want to mention that limited experiments are still possible. For example, a particularly successful support site
    experiment we ran involved the test of a rudimentary persona lization feature. The support.microsoft.com site contained
    a top center “Instant Answers” module with links to common support issues selected by the site editors. We tested a new
    treatment that personalized these links by the browser and operating system v ersions of the user’s HTTP header. The treatment
    performed over 50% better than t he control on the OEC of Click -through rate, without decreasing the clickthrough rate
