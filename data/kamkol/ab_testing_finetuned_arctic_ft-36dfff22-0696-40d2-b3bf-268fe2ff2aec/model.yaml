      examples show. Telemetry fidelity. Click tracking is typically done using web beacons, which is known to be lossy ,
      that is, less than 100% of clicks are properly recorded (Kohavi, Messner et al. 2010 ). If the Treatment impacts the
      loss rate, the results may appear better or worse than the actual user experience. Having a metric to assess the loss,
      such as through internal referrers to the website or through clicks that use dual logging (sometimes used in ad clicks,
      which require high fidelity), fidelity issues may be uncovered. Cache hit rates. As noted in Chapter 3 , shared resources
      can violate SUTVA (Kohavi and Longbotham 2010 ). Having metrics for shared resources, such as cache hit rates, may help
      identify unexpected factors that impact the trustworthiness of the experiment. Cookie write rate – the rate that the
      variant writes permanent (non- session) cookies. This phenomenon, dubbed cookie clobbering (Dmitriev et al. 2016 ),
      can cause severe distortion to other metrics due to browser bugs. One experiment at Bing wrote a cookie that was not
      used anywhere and set it to a random number with every search response page. The results showed massive user degradations
      in all key metrics, including sessions-per-user, queries-per-user, and revenue-per-user. Quick queries are two or more
      search queries that arrive from the same user to a search engine within one second of each other. Google and Bing have
      both observed this phenomenon, but to date have been unable to explain their cause. What we know is that some Treatments
      increase or decrease the proportion of quick queries and those results are deemed untrustworthy. 22 Leakage and Interference
      between Variants It doesn ’ t matter how beautiful your theory is, it doesn ’ t matter how smart you are. If it doesn
      ’ t agree with experiment, it ’ s wrong – Richard Feynman Why you care : In most experiment analyses, we assume that
      the behavior of each unit in the experiment is unaffected by variant assignment to other units. This is a plausible
      assumption in most practical applications. However, there are also many cases where this assumption fails. In most of
      the discussions in the book, we assume the Rubin causal model (Imbens and Rubin 2015 ), a standard framework for analyzing
      controlled experiments. In this chapter, we discuss these assumptions, scenarios where they fail, and approaches to
      address them. A key assumption made in the Rubin causal model is the Stable Unit Treatment Value Assumption (SUTVA),
      which states that the behavior of each unit in the experiment is unaffected by variant assignment to other units (Rubin
      1990 , Cox 1958 , Imbens and Rubin 2015 ) as shown in Equation 22.1 : (22.1) Y i ( z ) = Y i ( z i ) with variant assignment
      vector z = ( z 1 , z 2 , … , z n ) for all n units. This is a plausible assumption in most practical applications. For
      example, a user who likes the new checkout flow described in Chapter 2 is more likely to purchase, and that behavior
      is independent of others who are using the same eCommerce site. However, if the SUTVA assumption does not hold (see
      examples later in this chapter), the analysis results in potentially incorrect conclusions. We define interference as
      a violation of SUTVA, sometimes called spillover or leakage between the variants. There are two ways interference may
      arise: through direct or indirect connections. As an example, two units can be directly connected if they are friends
      on a social network or if they visited the same physical space at the same time. Indirect connections are connections
      that exist because of certain latent variables or shared resources, such as units in Treatment and Control that share
      the same ad campaign budget. These two categories are similar in that in both cases there is a medium that connects
      the Treatment and Control groups and allows them to interact. The medium can either be a materialized friendship connection
      on a social network or a shared advertising budget that clicks from both Treatment and Control users are billed against.
      It is important to understand the mechanism through which interference can manifest, as the best solution to address
      them can differ. To make the problems more concrete, here are examples with more detailed discussions. Examples Direct
      Connections Two units can be directly connected if they are friends on a social network or if they visited the same
      physical space at the same time. Two units that are directly connected can be separated into Treatment and Control groups
      and hence cause interference between variants. Facebook/LinkedIn . In social networks, such as Facebook or LinkedIn,
      user behavior is likely impacted by that of their social neighborhood (Eckles, Karrer and Ugander 2017 , Gui et al.
      2015 ). Users find a new social-engagement feature more valuable as more of their neighbors use it and are thus more
      likely to use it themselves. For example, from the user perspective: I am more likely to use video chat on Facebook
      if my friends use it. I am more likely to message my friends on LinkedIn if they message me. I am more likely to post
      on LinkedIn if friends in my network post on it. In an A/B experiment, this implies that if the Treatment has a significant
      impact on a user, the effect could spill over to their social circles, regardless whether the neighbors are in Treatment
      or Control. For example, a better recommendation algorithm in Treatment for the “ People You May Know ” algorithm on
      LinkedIn encourages users to send more connect invitations. However, users who receive these invitations may be in the
      Control variant and when they visit LinkedIn to accept the invitation, they may discover more people to connect with.
