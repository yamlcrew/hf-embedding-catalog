      important check for primacy and novelty effect s is to plot usage over time and see whether it ’ s increasing or decreasing.
      Take the above MSN example, the percentage of users clicking the Mail link clearly decreased over time, as shown in
      the graph in Figure 3.5 . Figure 3.5 MSN user engagement decreasing over time The standard analysis of experiments assumes
      that the Treatment effect is constant over time. This kind of trend is a red flag that indicates a violation of the
      assumptions. Such experiments need to run longer to determine when the Treatment effect stabilizes. In many cases, and
      stressed in this example, the insight is enough to declare the idea bad. This approach is simple and effective in most
      cases, but we must warn you that there are some caveats to watch out for, especially if you do run the experiment a
      long time (See Chapter 23 ). One additional option to highlight possible novelty/primacy effects is to take the users
      who appeared in the first day or two (as opposed to all users over time) and plot the treatment effect for them over
      time. Segment Differences Analyzing a metric by different segments can provide interesting insights and lead to discoveries,
      for which we sometimes invoke Twyman ’ s law and discover a flaw or new insight to help with future iterations of an
      idea. These are advanced tests with an example that you can address in the later maturity phases of your experimentation
      system. What are good segments? Here are several: Market or country: some features work better in some countries; sometimes
      an underperforming feature is the result of poor translation to another language, that is, localization. Device or platform:
      is the user interface on a browser, desktop, or mobile phone? Which mobile platform are they using: iOS or Android?
      Sometimes the browser version can help identify JavaScript bugs and incompatibilities. On mobile phones, the manufacturers
      (e.g., Samsung, Motorola) provide add-ons that can cause features to fail. Time of day and day of week: plotting effects
      over time can show interesting patterns. Users on weekends can be different in many characteristics. User type: new
      or existing, where new users are ones that joined after a date (e.g., experiment start, or perhaps a month prior). User
      account characteristics: single or shared account at Netflix, or single vs. family traveler on Airbnb. Segmented views
      are commonly used two ways: 1. Segmented view of a metric, independent of any experiment. 2. Segmented view of the Treatment
      effect for a metric, in the context of an experiment, referred to in Statistics as heterogeneous Treatment effects ,
      indicating that the Treatment effect is not homogenous or uniform across different segments. Segmented View of a Metric
      When the click-through rates on Bing mobile ads were segmented by different mobile operating systems, they were very
      different as shown in the graph in Figure 3.6 . Figure 3.6 CTRs for different mobile Operating Systems While the initial
      inclination was to form stories about the loyalty of the users and how the populations differ, an investigation uncovered
      that this was due to different click tracking methodologies used for different operating systems. There are several
      ways of tracking clicks, and they differ in fidelity (Kohavi, Messner et al. 2010 ), which leads to different loss rates.
      On iOS and Windows Phone, a redirect was used to track the clicks, that is, the click always goes to a server, is logged,
      and is then redirected to the destination. This methodology has high fidelity, but the user experience is slower. On
      Android, click tracking was done using a web beacon to indicate a click and then redirected the browser to the destination
      page. This methodology is faster for the user, but lossy; some web beacons will not make it and the link will not be
      recorded. This can explain the click-through rate (CTR) difference between iOS and Android, but why was the Windows
      Phone click-through rate so high? The investigation discovered that along with the redirect, there was a bug where user
      swipes were incorrectly recorded as a click. Bugs happen. When you see anomalous data, think of Twyman ’ s law and investigate
      the issue. Segmented View of the Treatment Effect (Heterogeneous Treatment Effect) In one experiment, a user interface
      change was made, which resulted in a very strong difference between browser segments. For almost all browser segments,
      the Treatment effect was a small positive improvement on key metrics, but for the Internet Explorer 7 segment, there
      was a strongly negative Treatment effect on key metrics. As with any strong effect (positive or negative), you should
      invoke Twyman ’ s law and drill into the cause. An investigation revealed that the JavaScript used was incompatible
      with Internet Explorer 7, causing an error that prevented users from clicking links in certain scenarios. Such insight
      is only possible when drilldowns into segments are enabled, that is, looking at the Treatment effect for different segments,
      also referred to in Statistics as Conditional Average Treatment Effects (CATEs). A good overview on Heterogenous Treatment
      Effects is available at EGAP ( 2018 ). Identifying interesting segments, or searching for interactions, can be done
      using machine learning and statistical techniques, such as Decision Trees (Athey and Imbens 2016 ) and Random Forests
      (Wager and Athey 2018 ). If you can alert the experimenter to interesting segments, you will find many interesting insights
      (but remember to correct for multiple hypothesis testing, as noted above). Getting organizations to run A/B tests is
      an important step; providing them with more information than just the overall Treatment effect gives new insights that
      help accelerate innovation. Analysis by Segments Impacted by Treatment Can Mislead It is possible to evaluate the Treatment
      effect of two mutually exhaustive and exclusive segments, and see that the OEC increases for both, yet declines overall.
      Unlike Simpson ’ s paradox (described in the next section), this is due to migration of users from one segment to another.
      For example, assume you have'
