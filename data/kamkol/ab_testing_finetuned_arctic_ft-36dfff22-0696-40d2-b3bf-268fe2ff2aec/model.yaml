    sentences:
    - 'estimates of long- term outcome. A statistical surrogate lies on the causal path between the treatment and the long
      -term outcome. It satisfies the condition that treatment and outcome are independent conditional on the statistical
      surrogate. You can use observational data and experiment data to find good surrogates. Even if no individual proxy satisfies
      the statistical surrogacy criteri on, a high- dimensional vector of proxies may collectively satisfy the surrogacy assumption
      [8]. Having a rich set of surrogates reduces the risk of affecting only a few surrogates and not the long -term outcome.
      Facebook used this approach with some success to find good surrogates of the 7-day outcome of an experiment by just
      using 2 -3-day experiment results. They used quantile regression and a gradient-boosted regression tree to rank feature
      importance. Note that there is still a risk that having too many surrogates for the long term may make this approach
      less interpretable. 4. OEC: OVERALL EVALUATION CRITERION METRIC 4.1 Problem One key benefit of evaluating new ideas
      through OCEs is that we can streamline the decision-making process and make it more objective. Without understanding
      the causal impact of an idea on customers, the decision-making process requires a lot of debat e. The proponents and
      opponents of the idea advance their arguments regarding the change only relying on their own experience, recall , and
      interpretation of certain business reports and user comments. Eventually the team leader makes a call on whether to
      ship the idea. This style of decision making is based on the HiPPO (Highest Paid Person’s Opinion) [37] and is fraught
      with many cognitive biases [2]. To help change HiPPO decisions to more objective, data-driven decisions based on the
      causal impact of an idea from customer response [5], w e recommend establishing t he OEC for all experiments on your
      product. Not all metrics computed to analyz e the results of an experiment are part of the OEC. To analyze experiment
      results, we require different types of metrics [22]. First, we need to know if the results of an experiment are trustworthy.
      A set of data quality metrics, like a sample ratio, help raise red flags on critical data quality issues. After checking
      the data quality metrics, we want to know the outcome of the experiment. Was the treatment successful and what was its
      impact? This set of metrics comprise the OEC. In addition to OEC me trics, we have found that there is a set of guardrail
      metrics which are not clearly indicative of success of the feature being tested, but metrics that we do not want to
      harm . The remaining bulk of the metrics for an experiment are diagnostic, feature or l ocal metrics. These metrics
      help you understand the source of OEC movement (or the lack of). It is hard to find a good OEC. Here are a few key properties
      [19, 24, 55] to consider. First, a good OEC must be indicative of the long-term gain in key product indicators (KPIs).
      At the very least make it directionally accurate in estimating the impact on the long- term outcome. Second, OEC must
      be hard to game and it should incentivize the right set of actions in the product team. It should not be easy to satisfy
      the OEC by doing the wrong thing. For instance, if the OEC is limited to a part or feature of the product, you may be
      able to satisfy the OEC by cannibalizing other parts or features. Third, OEC metrics must be sensitive. Most changes
      that impact the long-term outcome should also have a statistically significant movement in OEC metrics so it is practical
      to use the OEC to distinguish between good and bad changes to the product. Fourth, the cost of computing OEC metrics
      cannot be too expensive. OEC metrics must be computed for 100s of the experiments and be run on millions of users each
      and every week. Methods that involve costly computation or costly procedures like human surveys or human judges may
      not scale well. Fifth, OEC metrics must account for a diverse set of scenarios that may drive the key product goals.
      Finally, OEC should be able to accommodate new scenarios. For instance, direct answers to queries like current time
      would provide a good user experience in a search engine, but if you only base the OEC metrics on clicks, those metrics
      will miss this scenario. 4.2 Common Solutions and Challenges 4.2.1 Search vs. Discovery Measuring the success of a search
      experience in search engines has been a research subject for a long time in academia and for many products including
      Bing, Google and Yandex. It is well established that metrics, like queries per user, cannot be a good OEC because queries
      per user may go up when search ranking degrades. Sessions per user or visits per user are considered better OEC metrics
      [49]. In general there is an appreciation of focusing on HEART (Happiness, Engagement, Adoption, Retention, and Task
      success) metrics for the OEC and use PULSE (Page views, Uptime, Latency, Seven-day active users [i.e., the number of
      unique users who used the product at least once in the last week], and Earnings) metrics as your guardrail metrics [62].
      Over time, different methods have been proposed to measure HEART metrics in search engines and other goal-directed activities
      [36, 54]. It is still challenging to find metrics similar to HEART metrics to work for discovery - or browsing-related
      scenarios , like news articles shown on the Edge browser homepage, or Google mobile homepage, or Yandex homepage. The
