    results showing improvement, which we want to celebrate, are likely to be false positives! To provide intuition about
    why the FPR is so high when the success rate is low, we will use the data reported by Optimizely [34] of 12% win rate
    across 127,000 experiments. As we will show later in the paper in Section 4.4, the estimated true success rate is 9.3%,
    in line with the 10% median and mode of Table 2 in Kohavi, Deng, and Vermeer [14]. Looking at Figure 1, the dot-pattern
    (also green if viewed in color) in the first row represents the 9.3% success rate, that is, true effects that should be
    statistically significant given our sample size with 80% power. Of these, 80% will be identified as statistically significant,
    so 80%*9.3%=7.4% are denoted by a plus in the first row. Of the remaining 90.7% null effects, 5% will be statistically
    significant and positive, so 4.5% of the A/B tests will show a statistically significant result: a false positive. These
    are denoted by a plus in the second row. Of the ~12% wins (7.4%+4.5% depicted by pluses), 4.5% are false positives, so
    4.5%/(4.5% + 7.4%) = 37.8%. This surprisingly high false positive is often referred to as the base rate fallacy [35].'
  - '#3: Need over 200K Visitors in Online Experiment • Maybe you need half or double this, but do not trust online controlled
    experiments with 2,000 users • Let me start with the assumptions required for this default: • Alpha=0.05 to declare stat-sig
    (industry standard, default #1 in this talk). Lower values, which are appropriate sometimes, will result in increasing
    sample size • Power=80%. We’ll discuss power over the next few slides, but this is a minimum. Going to higher power will
    increase the sample size. • Conversion rate is 5%. Even if you’re optimizing for something else, it is very common to
    build a guardrail on conversions. Sites are typically 2%-5%. A lower number will increase the sample size • MDE (minimum
    detectable effect) is relative 5%. It is rare to see experiments improve key metrics by 5%, but we’ll be aggressive looking
    for big wins. A small MDE will increase the sample size #16 When I finally stumbled onto power analysis… it was as if
    I had died and gone to heaven -- Jacob Cohen (1990) © 2022 Ron Kohavi #3: The Sobering Math • The power formula is simple:
    • For conversions, 𝜎2 = 𝑝∗(1−𝑝)(binomial distribution). We assume p=5%, so 𝜎2 = 0.05∗0.95 • Our MDE is 5% relative, so
    𝛿 = 5%∗5%(absolute) • Plug it in, and n=121,600 per variant, or 243,200 for A/B test • 200K is therefore conservative
    minimum for these assumptions • Lower alpha, increase power, lower conversion rate, or lower the MDE, and you need a larger
    sample #17 © 2022 Ron Kohavi #3: What is Power? • Statistical power is the probability of detecting a given difference
    between the variants when there really is one • Given H0 (left) and H1 (right) separated by 𝛿 • Stat-sig is noted by the
    dark area (only the right one matters here) • The vertical lines indicate β, which is our type-II error (power= 1-β) •
    With low power, the right normal moves left and the vertical lines cover most of that distribution. You have to be “lucky”
    to get stat-sig #18 Diagram from van Belle (2011) © 2022 Ron Kohavi Winner’s Curse • A stat-sig result with low power
    has a high probability of exaggerating the actual number as follows → (Gelman and Carlin 2014) • GuessTheTest on 16 Dec
    2021, shared an example with ~80 users in each variant and 337% improvement • It had 3% power to detect even a 10% delta,
    so it is 63% likely to be a false positive and highly likely to exaggerate effect. See http://bit.ly/ABTestingIntuitionBusters
    #19 © 2022 Ron Kohavi A Visualization of Power • If the null hypothesis is true (no difference, or effect is zero), the
    distribution of p-values is uniform • Using p-value of 0.05, about 5% of the time you’ll declare something stat-sig •
    We’ll look at the p-value distribution of 10,000 experiments where the treatment has a 5% lift (relative improvement)
    #20 © 2022 Ron Kohavi Power = 3% (N=100 per variant) Delta of 1 Delta 0Delta of 2 Delta of 3 Delta of 4 With so few users,
    only a few conversion combinations are possible, hence only a few p-values are possible © 2022 Ron Kohavi Power = 3% (N=100
    per variant) cont • With small numbers, you get extreme results – winner’s curse • C had 13 conversions, T had 0 conversions
    ( -100%, p-value 0.00003) • C had 1 conversion, T had 13 conversions (+1200%, p-value 0.0001) • Average lift (absolute
    value) for stat-sig results was 271% Remember: true lift is 5%, so exaggeration factor is 54 times for average! • The
    maximum was 1200% lift, so 240 times the true value. • Wrong sign for stat-sig result: 36% of the time The truth was that
    there was a 5% lift, but we got a stat-sig negative lift! #22 © 2022 Ron Kohavi Power = ~10% (N=7,000 per variant) #23
    Looks almost uniform (remember, our goal is for p-value < 0.05) Stat-sig only ~10% of the time (vs. 5% expected if there
    was no difference) Winner’s curse: when stat-sig, exaggeration factor of 3.9 (19.3% lift) © 2022 Ron Kohavi Power = ~30%
    (N=32,000 per variant) #24 Starts to put more mass below 0.05 Winner’s curse: when stat-sig, exaggeration factor of 1.9
    (9.3% average lift) Could even get the sign wrong 0.1% of the time when stat-sig © 2022 Ron Kohavi Power = ~80% (N=122,000)
    #25 That’s the minimum we want: ~80% of the time, p-value < 0.05 Small exaggeration factor of 1.1 (5.6% average lift vs.
    real value of 5%) Never get the sign wrong when stat-sig © 2022 Ron Kohavi Power = ~90% (N=163,000) #26 Extending experiment
    from 122K users to 163K users (e.g., 34% longer) gives us great 90% power © 2022 Ron Kohavi References • Excel spreadsheet
    with the visualizations here (Nov 2022) • Low power LinkedIn post (Sept 2022) • A/B Testing Intuition Busters(Aug 2022)
    • Gelman, This is what “power = .06” looks like. Get used to it (11/2014) #27 © 2022 Ron Kohavi'
