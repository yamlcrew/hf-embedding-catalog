- source_sentence: What are the estimated monthly rates of first-party cookie deletion among U.S. Internet users according
    to comScore and Anirban Dasgupta et al.?
  sentences:
  - "Tracking on the Web: Privacy and Security Implication [23]. \nCookie deletion rates are hard to estimate.  Using a panel\
    \ \nof 400,000 home PCs, comScore estimated that 31 percent of \nU.S. Internet users cleared their first -party cookies\
    \ during a \nmonth [24].   Anirban Dasgupta etal. [25] showed similar \nlevels of cookie clearing (25% -33% monthly, depending\
    \ on \ngeography) based on the Yahoo toolbar.  Such rates imply \nthat long studies (e.g., months), where users are identified\
    \ \nbased on cookies could have a selection bi as problem – as"
  - "both directions: when we show fewer ads, users increase \nengagement, and when we show more ads, users decrease \nengagement\
    \ or abandon. If users abandon at different rates \nbetween Control and Treatment, the remaining surviving \npopulation\
    \ is different, and the conclusions can be \ncompletely wrong.  For example, the users generating the \nmost revenue may\
    \ get annoyed with more ads and abandon, \nleaving a surviving population with lower Revenue/user. \n3. Not taking into\
    \ account selection bias [34].  \n In an online longitudinal study that relies on cookies for \nidentification, there\
    \ is likely to be a significant attrition due"
  - "statistically significant changes in metrics are observed \nduring the post -period, they are assumed to be due the \n\
    exposure to the treatment, and are called the “learning effect.” \nThe authors note that due t o a number of factors (e.g.\
    \ \nresults being diluted due to cookies being an imperfect \napproximation of users) the methodology such as the one\
    \ \nabove underestimates the learning effect. They propose to use \na “fudge factor” to compensate. The FLT paper notes\
    \ that “in \npractice, we often use values of [fudge factor] between 2 and \n3 for desktop and laptop devices.”"
