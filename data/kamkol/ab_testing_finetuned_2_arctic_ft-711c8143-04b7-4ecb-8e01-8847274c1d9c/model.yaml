    \ so that \ntheir experience remains consistent for the duration of the \nexperiment, i.e., there is a mapping from each\
    \ cookie to the \nexperiment(s) variants a user is in. \nSites that require users to authenticate at the beginning of\
    \ \na session, such as e-mail sites and banks, have a known and \nstable identity.  However, many sites, including Google\
    \ and"
