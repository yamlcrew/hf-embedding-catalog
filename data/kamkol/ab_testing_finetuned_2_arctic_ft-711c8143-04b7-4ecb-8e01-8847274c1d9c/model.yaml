- source_sentence: What is the impact of side effects on the assumption that control and treatment groups are treated the
    same way after an experiment ends?
  sentences:
  - "of side effects, discussed below. \nVIII. SIDE EFFECTS \nAll discussion up to this point assumed that , once the \nexperiment\
