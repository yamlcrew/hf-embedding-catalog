- source_sentence: What factors, besides "user learning," contribute to the delta between the last and first data points on
    the chart?
  sentences:
  - "week periods.  We note that the delta between the last and the \nfirst data point on the chart is due to not only “user\
    \ learning” \nbut also other factors such as seasonality, system changes, \nand the presence of users who did not have\
    \ an opportunity to \nlearn. As the FLT paper notes, this makes it hard to estimate \nthe amount of impact due to “user\
    \ learning” in this setup.  \nSome metrics, such as Ad CTR, seem to show a trend that \nmay reflect user learning; other\
    \ metrics, however, do not \nshow trends. One should be careful when trying to infer"
