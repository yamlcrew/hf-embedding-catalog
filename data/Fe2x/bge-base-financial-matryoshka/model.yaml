widgetData:
- source_sentence: What year do the patent families related to DARZALEX expire in the United States?
  sentences:
  - Amortization for owned content predominantly monetized on an individual basis and accrued costs associated with participations
    and residuals payments are recorded using the individual film forecast computation method, which recognizes the costs
    in the same ratio as the associated ultimate revenue.
  - The two patent families both expire in the United States in 2029.
  - For the year ended December 31, 2022, net cash used in investing activities of $371.9 million was primarily from the purchase
    of $247.3 million marketable securities, net of sale and maturities, $62.2 million net cash used to acquire GreenCom,
    SolarLeadFactory and ClipperCreek, $46.4 million used in purchases of test and assembly equipment to expand our supply
    capacity, related facility improvements and information technology enhancements, including capitalized costs related to
    internal-use software and $16.0 million used to invest in private companies.
- source_sentence: What legal claims does Fortis Advisors LLC allege against Ethicon Inc. in the lawsuit related to the acquisition
    of Auris Health Inc.?
  sentences:
  - Payments include a single lump-sum per treatment, referred to as bundled rates, or in other cases separate payments for
    dialysis treatments and pharmaceuticals, referred to as FFS rates.
  - In October 2020, Fortis Advisors LLC filed a complaint against Ethicon Inc. and others in Delaware's Court of Chancery.
    The lawsuit alleges breach of contract and fraud related to Ethicon's acquisition of Auris Health Inc. in 2019. The case
    underwent a partial dismissal in December 2021, and as of January 2024, the trial's decision is pending.
  - On September 5, 2023, ICE acquired 100% of Black Knight for aggregate transaction consideration of approximately $11.8
    billion, or $76 per share of Black Knight common stock, with cash comprising 90% of the value of the aggregate transaction
    consideration. The aggregate cash component of the transaction consideration was $10.5 billion. ICE issued 10.9 million
    shares of its common stock to Black Knight stockholders, which was based on the market price of the common stock and the
    average of the volume weighted averages of the trading prices of the common stock on each of the ten consecutive trading
    days ending three trading days prior to the closing of the merger.
- source_sentence: What caused the increase in net cash provided by operating activities between 2022 and 2023?
  sentences:
  - Net cash provided by operating activities was $712.2 million and $223.7 million for the year ended December 31, 2023 and
    2022, respectively. The increase was primarily driven by timing of payments to vendors and timing of the receipt of payments
    from our customers, as well as an increase in interest income.
  - Joanne D. Smith held the position of Vice President - Marketing at Delta from November 2005 to February 2007.
  - Experienced management team with a proven track in the gaming and resort industry. Mr. Robert G. Goldstein, our Chairman
    and Chief Executive Officer, has been an integral part of our executive team from the beginning, joining our founder and
    previous Chairman and Chief Executive Officer, Mr. Sheldon G. Adelson, before The Venetian Resort Las Vegas was constructed.
    Mr. Goldstein is one of the most respected and experienced executives in our industry today.
- source_sentence: What does the company believe adds significant value to its business regarding intellectual property?
  sentences:
  - In 2022, the net interest expense on pre-acquisition-related debt was $59 million and additional adjustments included
    costs of $30 million associated with the May and June 2022 extinguishment of four series of senior notes.
  - Fluctuations in foreign currency exchange rates decreased our consolidated net operating revenues by 4%.
  - We believe that, to varying degrees, our trademarks, trade names, copyrights, proprietary processes, trade secrets, trade
    dress, domain names and similar intellectual property add significant value to our business
- source_sentence: What does it mean for financial statements to be incorporated by reference?
  sentences:
  - The consolidated financial statements are incorporated by reference in the Annual Report on Form 10-K, indicating they
    are treated as part of the document for legal and reporting purposes.
  - The Consolidated Financial Statements, together with the Notes thereto and the report thereon dated February 16, 2024,
    of PricewaterhouseCoopers LLP, the Firm’s independent registered public accounting firm (PCAOB ID 238), appear on pages
    163–309.
  - 'The Goldman Sachs Group, Inc. manages and reports its activities in three business segments: Global Banking & Markets,
    Asset & Wealth Samantha Management and Platform Solutions.'
