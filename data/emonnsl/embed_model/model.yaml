  sentences:
  - অন্য সবার মতো একই কাজ করেছেন।
  - কাজের জন্য কোনও টাকা বরাদ্দ নেই।
  - তার মাসিক আয় কমে গেছে।
- source_sentence: আমরা সফল হচ্ছি।
  sentences:
  - আর সে বললো, মা, আমি ঘরে আছি।
  - সিঙ্গেল একটি অভ্যন্তরীণ শহর ছিল।
  - প্রুডি মনে করেন যে চুইংগাম চিবানো ভালো না।
- source_sentence: এটা ভাবার বিষয়।
  sentences:
  - ওপেনের সাইনটা সামনের কিনারায়।
  - মিলোসেভিকের সংখ্যা খুব বেশি নয়।
  - জেরেমি সারাজীবন জলদস্যু ছিলেন।
- source_sentence: তরুণদের বয়স কত?
  sentences:
  - কিন্তু রুটি এবং মাখন বিবেচনা করুন।
  - পুরো জায়গাটাই কংক্রিট আর কুৎসিত।
  - পিয়ারকে কখনো গ্রেপ্তার করা হয়নি।
- source_sentence: বেকি একজন ছাত্র।
  sentences:
  - আমাদের কি উড়ছে তা দেখা উচিত ছিল।
  - সে কখনো ঐ কুকুরের মত হতে চায়নি.
  - হাউথর্ন মেইন স্ট্রিটে থাকতেন।
