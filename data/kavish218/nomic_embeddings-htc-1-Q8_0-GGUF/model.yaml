    - An epic poem is a lengthy narrative poem, ordinarily involving a time beyond living memory in which occurred the extraordinary
      doings of the extraordinary men and women who, in dealings with the gods or other superhuman forces, gave shape to the
      mortal universe for their descendants, the poet and their audience, to understand themselves as a people or nation.
    - 'A novel is a relatively long work of narrative fiction, typically written in prose and published as a book. The present
      English word for a long work of prose fiction derives from the Italian: novella for "new", "news", or "short story of
      something new", itself from the Latin: novella, a singular noun use of the neuter plural of novellus, diminutive of
      novus, meaning "new".Some novelists, including Nathaniel Hawthorne, Herman Melville, Ann Radcliffe, John Cowper Powys,
      preferred the term "romance" to describe their novels. According to Margaret Doody, the novel has "a continuous and
      comprehensive history of about two thousand years", with its origins in the Ancient Greek and Roman novel, in Chivalric
      romance, and in the tradition of the Italian renaissance novella. The ancient romance form was revived by Romanticism,
      especially the historical romances of Walter Scott and the Gothic novel. Some, including M. H. Abrams and Walter Scott,
      have argued that a novel is a fiction narrative that displays a realistic depiction of the state of a society, while
      the romance  encompasses any fictitious narrative that emphasizes marvellous or uncommon incidents.Works of fiction
      that include marvellous or uncommon incidents are also novels, including The Lord of The Rings, To Kill a Mockingbird,
      and Frankenstein. "Romances" are works of fiction whose main emphasis is on marvellous or unusual incidents, and should
      not be confused with the romance novel, a type of genre fiction that  focuses on romantic love. Murasaki Shikibu''s
      Tale of Genji, an early 11th-century Japanese text, has sometimes been described as the world''s first novel, but there
      is considerable debate over this — there were certainly long fictional works that preceded it. Spread of printed books
      in China led to the appearance of classical Chinese novels by the Ming dynasty (1368–1644). An early example from Europe
      was written in Muslim Spain by the Sufi writer Ibn Tufayl entitled Hayy ibn Yaqdhan. Later developments occurred after
      the invention of the printing press. Miguel de Cervantes, author of Don Quixote (the first part of which was published
      in 1605), is frequently cited as the first significant European novelist of the modern era. Literary historian Ian Watt,
      in The Rise of the Novel (1957), argued that the modern novel was born in the early 18th century.'
  - source_sentence: 'The Metamorphosis (German: Die Verwandlung) is a novella written by Franz Kafka which was first published
      in 1915. One of Kafka''s best-known works, The Metamorphosis tells the story of salesman Gregor Samsa, who wakes one
      morning to find himself inexplicably transformed into a huge insect (ungeheures Ungeziefer, literally "monstrous vermin")
      and subsequently struggles to adjust to this new condition. The novella has been widely discussed among literary critics,
      with differing interpretations being offered.'
    sentences:
    - 'The Statue of Liberty (Liberty Enlightening the World; French: La Liberté éclairant le monde) is a colossal neoclassical
      sculpture on Liberty Island in New York Harbor within New York City, in the United States. The copper statue, a gift
      from the people of France to the people of the United States, was designed by French sculptor Frédéric Auguste Bartholdi
      and its metal framework was built by Gustave Eiffel. The statue was dedicated on October 28, 1886. The statue is a figure
      of Libertas, a robed Roman liberty goddess. She holds a torch above her head with her right hand, and in her left hand
      carries a tabula ansata inscribed JULY IV MDCCLXXVI (July 4, 1776 in Roman numerals), the date of the U.S. Declaration
      of Independence. A broken shackle and chain lie at her feet as she walks forward, commemorating the recent national
      abolition of slavery. After its dedication, the statue became an icon of freedom and of the United States, seen as a
      symbol of welcome to immigrants arriving by sea. Bartholdi was inspired by a French law professor and politician, Édouard
      René de Laboulaye, who is said to have commented in 1865 that any monument raised to U.S. independence would properly
      be a joint project of the French and U.S. peoples. The Franco-Prussian War delayed progress until 1875, when Laboulaye
      proposed that the French finance the statue and the U.S. provide the site and build the pedestal. Bartholdi completed
      the head and the torch-bearing arm before the statue was fully designed, and these pieces were exhibited for publicity
      at international expositions. The torch-bearing arm was displayed at the Centennial Exposition in Philadelphia in 1876,
      and in Madison Square Park in Manhattan from 1876 to 1882. Fundraising proved difficult, especially for the Americans,
      and by 1885 work on the pedestal was threatened by lack of funds. Publisher Joseph Pulitzer, of the New York World,
      started a drive for donations to finish the project and attracted more than 120,000 contributors, most of whom gave
      less than a dollar. The statue was built in France, shipped overseas in crates, and assembled on the completed pedestal
      on what was then called Bedloe''s Island. The statue''s completion was marked by New York''s first ticker-tape parade
      and a dedication ceremony presided over by President Grover Cleveland. The statue was administered by the United States
      Lighthouse Board until 1901 and then by the Department of War; since 1933 it has been maintained by the National Park
      Service as part of the Statue of Liberty National Monument, and is a major tourist attraction. Public access to the
      balcony around the torch has been barred since 1916.'
    - 'Eugene Onegin (pre-reform Russian: Евгеній Онѣгинъ; post-reform Russian: Евгений Оне́гин, tr. Yevgeniy Onegin, IPA:
      [jɪvˈɡʲenʲɪj ɐˈnʲeɡʲɪn]) is a novel in verse written by Alexander Pushkin. Onegin is considered a classic of Russian
      literature, and its eponymous protagonist has served as the model for a number of Russian literary heroes (so-called
      superfluous men). It was published in serial form between 1825 and 1832. The first complete edition was published in
      1833, and the currently accepted version is based on the 1837 publication. Almost the entire work is made up of 389
      fourteen-line stanzas (5,446 lines in all) of iambic tetrameter with the unusual rhyme scheme "AbAbCCddEffEgg", where
      the uppercase letters represent feminine rhymes while the lowercase letters represent masculine rhymes. This form has
      come to be known as the "Onegin stanza" or the "Pushkin sonnet." The innovative rhyme scheme, the natural tone and diction,
      and the economical transparency of presentation all demonstrate the virtuosity which has been instrumental in proclaiming
      Pushkin as the undisputed master of Russian poetry. The story is told by a narrator (a lightly fictionalized version
      of Pushkin''s public image), whose tone is educated, worldly, and intimate. The narrator digresses at times, usually
      to expand on aspects of this social and intellectual world. This narrative style allows for a development of the characters
      and emphasizes the drama of the plot despite its relative simplicity. The book is admired for the artfulness of its
      verse narrative as well as for its exploration of life, death, love, ennui, convention, and passion.'
