  - 'The Arc de Triomphe de l''Étoile (UK: , US: , French: [aʁk də tʁijɔ̃f də letwal] (listen); lit. ''"Triumphal Arch of
    the Star"'') is one of the most famous monuments in Paris, France, standing at the western end of the Champs-Élysées at
    the centre of Place Charles de Gaulle, formerly named Place de l''Étoile—the étoile or "star" of the juncture formed by
    its twelve radiating avenues. The location of the arc and the plaza is shared between three arrondissements, 16th (south
    and west), 17th (north), and 8th (east). The Arc de Triomphe honours those who fought and died for France in the French
    Revolutionary and Napoleonic Wars, with the names of all French victories and generals inscribed on its inner and outer
    surfaces. Beneath its vault lies the Tomb of the Unknown Soldier from World War I. As the central cohesive element of
    the Axe historique (historic axis, a sequence of monuments and grand thoroughfares on a route running from the courtyard
    of the Louvre to the Grande Arche de la Défense), the Arc de Triomphe was designed by Jean Chalgrin in 1806; its iconographic
    programme pits heroically nude French youths against bearded Germanic warriors in chain mail. It set the tone for public
    monuments with triumphant patriotic messages. Inspired by the Arch of Titus in Rome, Italy, the Arc de Triomphe has an
    overall height of 50 metres (164 ft), width of 45 m (148 ft) and depth of 22 m (72 ft), while its large vault is 29.19
    m (95.8 ft) high and 14.62 m (48.0 ft) wide. The smaller transverse vaults are 18.68 m (61.3 ft) high and 8.44 m (27.7
    ft) wide. Three weeks after the Paris victory parade in 1919 (marking the end of hostilities in World War I), Charles
    Godefroy flew his Nieuport biplane under the arch''s primary vault, with the event captured on newsreel.Paris''s Arc de
    Triomphe was the tallest triumphal arch until the completion of the Monumento a la Revolución in Mexico City in 1938,
    which is 67 metres (220 ft) high. The Arch of Triumph in Pyongyang, completed in 1982, is modelled on the Arc de Triomphe
    and is slightly taller at 60 m (197 ft). La Grande Arche in La Défense near Paris is 110 metres high. Although it is not
    named an Arc de Triomphe, it has been designed on the same model and in the perspective of the Arc de Triomphe. It qualifies
    as the world''s tallest arch.'
