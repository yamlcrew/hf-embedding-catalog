  - source_sentence: 'The Basílica de la Sagrada Família (Catalan: [bəˈzilikə ðə lə səˈɣɾaðə fəˈmiljə]; Spanish: Basílica
      de la Sagrada Familia; ''Basilica of the Holy Family''), also known as the Sagrada Família, is a large unfinished Roman
      Catholic minor basilica in the Eixample district of Barcelona, Catalonia, Spain. Designed by the Spanish architect Antoni
      Gaudí (1852–1926), his work on the building is part of a UNESCO World Heritage Site. On 7 November 2010, Pope Benedict
      XVI consecrated the church and proclaimed it a minor basilica.On  19 March 1882, construction of the Sagrada Família
      began under architect Francisco de Paula del Villar. In 1883, when Villar resigned, Gaudí took over as chief architect,
      transforming the project with his architectural and engineering style, combining Gothic and curvilinear Art Nouveau
      forms. Gaudí devoted the remainder of his life to the project, and he is buried in the crypt. At the time of his death
      in 1926, less than a quarter of the project was complete.Relying solely on private donations, the Sagrada Família''s
      construction progressed slowly and was interrupted by the Spanish Civil War. In July 1936, revolutionaries set fire
      to the crypt and broke their way into the workshop, partially destroying Gaudí''s original plans, drawings and plaster
      models, which led to 16 years of work to piece together the fragments of the master model. Construction resumed to intermittent
      progress in the 1950s. Advancements in technologies such as computer aided design and computerised numerical control
      (CNC) have since enabled faster progress and construction passed the midpoint in 2010. However, some of the project''s
      greatest challenges remain, including the construction of ten more spires, each symbolising an important Biblical figure
      in the New Testament. It was anticipated that the building would be completed by 2026, the centenary of Gaudí''s death  but
      this has now been delayed due to the COVID-19 pandemic. The basilica has a long history of splitting opinion among the
      residents of Barcelona: over the initial possibility it might compete with Barcelona''s cathedral, over Gaudí''s design
      itself, over the possibility that work after Gaudí''s death disregarded his design, and the 2007 proposal to build a
      tunnel nearby as part of Spain''s high-speed rail link to France, possibly disturbing its stability. Describing the
      Sagrada Família, art critic Rainer Zerbst said "it is probably impossible to find a church building anything like it
      in the entire history of art", and Paul Goldberger describes it as "the most extraordinary personal interpretation of
      Gothic architecture since the Middle Ages". The basilica is not the cathedral church of the Archdiocese of Barcelona,
      as that title belongs to the Cathedral of the Holy Cross and Saint Eulalia.'
    sentences:
    - Moby-Dick; or, The Whale is an 1851 novel by American writer Herman Melville. The book is the sailor Ishmael's narrative
      of the obsessive quest of Ahab, captain of the whaling ship Pequod, for revenge on Moby Dick, the giant white sperm
      whale that on the ship's previous voyage bit off Ahab's leg at the knee. A contribution to the literature of the American
      Renaissance, Moby-Dick was published to mixed reviews, was a commercial failure, and was out of print at the time of
      the author's death in 1891. Its reputation as a "Great American Novel" was established only in the 20th century, after
      the centennial of its author's birth. William Faulkner said he wished he had written the book himself, and D. H. Lawrence
      called it "one of the strangest and most wonderful books in the world" and "the greatest book of the sea ever written".
      Its opening sentence, "Call me Ishmael", is among world literature's most famous.Melville began writing Moby-Dick in
      February 1850, and finished 18 months later, a year longer than he had anticipated. Melville drew on his experience
      as a common sailor from 1841 to 1844, including several years on whalers, and on wide reading in whaling literature.
      The white whale is modeled on the notoriously hard-to-catch albino whale Mocha Dick, and the book's ending is based
      on the sinking of the whaleship Essex in 1820. His literary influences include Shakespeare and the Bible. The detailed
      and realistic descriptions of whale hunting and of extracting whale oil, as well as life aboard ship among a culturally
      diverse crew, are mixed with exploration of class and social status, good and evil, and the existence of God. In addition
      to narrative prose, Melville uses styles and literary devices ranging from songs, poetry, and catalogs to Shakespearean
      stage directions, soliloquies, and asides. In August 1850, with the manuscript perhaps half finished, he met Nathaniel
      Hawthorne and was deeply moved by his Mosses from an Old Manse, which he compared to Shakespeare in its cosmic ambitions.
      This encounter may have inspired him to revise and expand Moby-Dick, which is dedicated to Hawthorne, "in token of my
      admiration for his genius". The book was first published (in three volumes) as The Whale in London in October 1851,
      and under its definitive title in a single-volume edition in New York in November. The London publisher, Richard Bentley,
      censored or changed sensitive passages; Melville made revisions as well, including a last-minute change to the title
      for the New York edition. The whale, however, appears in the text of both editions as "Moby Dick", without the hyphen.
      Reviewers in Britain were largely favorable, though some objected that the tale seemed to be told by a narrator who
      perished with the ship, as the British edition lacked the Epilogue recounting Ishmael's survival. American reviewers
      were more hostile.
    - 'The Ziggurat (or Great Ziggurat) of Ur (Sumerian: 𒂍𒋼𒅎𒅍  é-temen-ní-gùru "Etemenniguru", meaning "temple whose foundation
