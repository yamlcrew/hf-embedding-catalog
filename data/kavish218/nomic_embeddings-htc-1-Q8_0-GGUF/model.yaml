      novelist George Orwell (the pen name of Eric Arthur Blair). It was published on 8 June 1949 by Secker & Warburg as Orwell''s
      ninth and final book completed in his lifetime. Thematically, Nineteen Eighty-Four centres on the consequences of totalitarianism,
      mass surveillance, and repressive regimentation of persons by Socialist regimes. Orwell, himself a democratic socialist,
      modelled the authoritarian government in the novel after Stalinist Russia. More broadly, the novel examines the role
      of truth and facts within politics and the ways in which they are manipulated. The story takes place in an imagined
      future, the year 1984, when much of the world has fallen victim to perpetual war, omnipresent government surveillance,
      historical negationism, and propaganda. Great Britain, known as Airstrip One, has become a province of a totalitarian
      superstate named Oceania that is ruled by the Party who employ the Thought Police to persecute individuality and independent
      thinking. Big Brother, the leader of the Party, enjoys an intense cult of personality despite the fact that he may not
      even exist. The protagonist, Winston Smith, is a diligent and skillful rank-and-file worker and Outer Party member who
      secretly hates the Party and dreams of rebellion. He enters into a forbidden relationship with a colleague, Julia, and
      starts to remember what life was like before the Party came to power. Nineteen Eighty-Four has become a classic literary
      example of political and dystopian fiction. It also popularised the term "Orwellian" as an adjective, with many terms
      used in the novel entering common usage, including "Big Brother", "doublethink", "Thought Police", "thoughtcrime", "Newspeak",
      "memory hole", "2 + 2 = 5", and "proles". Time included it on its 100 best English-language novels from 1923 to 2005.
      It was placed on the Modern Library''s 100 Best Novels, reaching No. 13 on the editors'' list and No. 6 on the readers''
      list. In 2003, the novel was listed at No. 8 on The Big Read survey by the BBC. Parallels have been drawn between the
      novel''s subject matter and real life instances of totalitarianism, mass surveillance, and violations of freedom of
      expression among other themes.'
    - Othello (The Tragedy of Othello, the Moor of Venice) is a tragedy by William Shakespeare, probably written in 1603.
      The story revolves around two characters, Othello and Iago. Othello is a Moorish general in the Venetian army charged
      with the generalship of Venice on the eve of war with the Ottoman Turks over the island of Cyprus. He has just married
      Desdemona, a beautiful and wealthy Venetian, much younger than him, against the wishes of her father. Iago is Othello's
      jealous and bitter ensign who maliciously goads his master's jealousy until the usually stoic Moor kills his beloved
      wife in a fit of blind rage. Due to its enduring themes of passion, jealousy and race, Othello is still widely performed
      and has inspired numerous adaptations.
    - Fallingwater is a house designed by the architect Frank Lloyd Wright in 1939 in southwest Pennsylvania's Laurel Highlands,
      about 90 minutes from downtown Pittsburgh. The house was built partly over a waterfall on Bear Run in the Mill Run section
      of Stewart Township, Fayette County, Pennsylvania, located in the Laurel Highlands of the Allegheny Mountains. The house
      was designed as a weekend home for Liliane and Edgar J. Kaufmann, the owner of Kaufmann's Department Store. After its
      completion, Time called Fallingwater Wright's "most beautiful job" and it is listed among Smithsonian's "Life List of
      28 Places to See Before You Die." The house was designated a National Historic Landmark in 1966. In 1991, members of
      the American Institute of Architects named Fallingwater the "best all-time work of American architecture" and in 2007,
      it was ranked 29th on the list of America's Favorite Architecture according to the AIA.The house and seven other Wright
      constructions were inscribed as a World Heritage Site under the title "The 20th-Century Architecture of Frank Lloyd
      Wright" in July 2019.
  - source_sentence: A sonnet is a poetic form which originated in the Italian poetry composed at the Court of the Holy Roman
      Emperor Frederick II in Palermo, Sicily. The 13th-century poet and notary Giacomo da Lentini is credited with the sonnet's
      invention for expressing courtly love. The Sicilian School of poets who surrounded him at the Emperor's Court are credited
      with its spread. The earliest sonnets, however, no longer survive in the original Sicilian language, but only after
      being translated into Tuscan dialect. The term sonnet is derived from the Italian word sonetto (lit. "little song",
      derived from the Latin word sonus, meaning a sound). By the 13th century it signified a poem of fourteen lines that
      follows a very strict rhyme scheme and structure. According to Christopher Blum, during the Renaissance, the sonnet
      was the "choice mode of expressing romantic love." As the sonnet form has spread to languages other than Italian, however,
      conventions have changed considerably and any subject is now considered acceptable for writers of sonnets, who are sometimes
      called "sonneteers," although the term can be used derisively.
    sentences:
    - 'Medea (Ancient Greek: Μήδεια, Mēdeia) is an ancient Greek tragedy written by Euripides, based upon the myth of Jason
      and Medea and first produced in 431 BC. The plot centers on the actions of Medea, a former princess of the " kingdom
      of Colchis, and the wife of Jason; she finds her position in the Greek world threatened as Jason leaves her for a Greek
      princess of Corinth. Medea takes vengeance on Jason by murdering Jason''s new wife as well as her own children (two
      sons), after which she escapes to Athens to start a new life. Euripides'' play has been explored and interpreted by
      playwrights across the centuries and the world in a variety of ways, offering political, psychoanalytical, feminist,
      among many other original readings of Medea, Jason and the core themes of the play.Medea, with three others, earned
      Euripides third prize in the City Dionysia. Some believe that this indicates a poor reception, but "the competition
      that year was extraordinarily keen"; Sophocles, often winning first prize, came second. The play was rediscovered with
      Rome''s Augustan drama; again in the 16th-century; then remained part of the tragedic repertoire, becoming a classic
      of the Western canon, and the most frequently performed Greek tragedy in the 20th century. It experienced renewed interest
      in the feminist movement of the late 20th century, being interpreted as a nuanced and sympathetic portrayal of Medea''s
      struggle to take charge of her own life in a male-dominated world. The play holds the American Theatre Wing''s Tony
      Award record for most wins for the same female lead character, with Judith Anderson winning in 1948, Zoe Caldwell in
      1982, and Diana Rigg in 1994.'
    - 'The Ziggurat (or Great Ziggurat) of Ur (Sumerian: 𒂍𒋼𒅎𒅍  é-temen-ní-gùru "Etemenniguru", meaning "temple whose foundation
      creates aura") is a Neo-Sumerian ziggurat in what was the city of Ur near Nasiriyah, in present-day Dhi Qar Province,
      Iraq. The structure was built during the Early Bronze Age (21st century BC) but had crumbled to ruins by the 6th century
      BC of the Neo-Babylonian period, when it was restored by King Nabonidus. Its remains were excavated in the 1920s and
      1930s by Sir Leonard Woolley. Under Saddam Hussein in the 1980s, they were encased by a partial reconstruction of the
      façade and the monumental staircase. The Ziggurat of Ur is the best-preserved of those known from Iran and Iraq, besides
      the ziggurat of Dur Untash (Chogha Zanbil). It is one of three well-preserved structures of the Neo-Sumerian city of
      Ur, along with the Royal Mausolea and the Palace of Ur-Nammu (the E-hursag).'
    - Prose poetry is poetry written in prose form instead of verse form, while preserving poetic qualities such as heightened
      imagery, parataxis, and emotional effects.
  - source_sentence: A short story is a piece of prose fiction that typically can be read in one sitting and focuses on a
      self-contained incident or series of linked incidents, with the intent of evoking a single effect or mood. The short
      story is one of the oldest types of literature and has existed in the form of legends, mythic tales, folk tales, fairy
      tales, fables and anecdotes in various ancient communities across the world. The modern short story developed in the
      early 19th century.
