      walnuts, and Brazil nuts, are not nuts in a botanical sense. Common usage of the term often refers to any hard-walled,
      edible kernel as a nut. Nuts are an energy-dense and nutrient-rich food source.
    - Bellis perennis, the daisy, is a common European species of the family Asteraceae, often considered the archetypal species
      of that name. To distinguish this species from other "daisies" it is sometimes qualified as common daisy, lawn daisy
      or English daisy. Historically, it has also been widely known as bruisewort, and occasionally woundwort (although the
      common name "woundwort" is now more closely associated with the genus Stachys). B. perennis is native to western, central
      and northern Europe, including remote islands such as the Faroe Islands but has become widely naturalised in most temperate
      regions, including the Americas and Australasia.
  - source_sentence: 'Arabic music or Arab music (Arabic: الموسيقى العربية‎, romanized: al-mūsīqā al-ʿArabīyah) is the music
      of the Arab world with all its diverse music styles and genres. Arabic countries have many rich and varied styles of
      music and also many linguistic dialects, with each country and region having their own traditional music. Arabic music
      has a long history of interaction with many other regional musical styles and genres. It represents the music of all
      the peoples that make up the Arab world today, all the 22 states.'
    sentences:
    - Poland, officially the Republic of Poland, is a country located in Central Europe. It is divided into 16 administrative
      provinces, covering an area of 312,696 square kilometres (120,733 sq mi), and has a largely temperate seasonal climate.
      With a population of nearly 38.5 million people, Poland is the fifth most populous member state of the European Union.
      Poland's capital and largest metropolis is Warsaw. Other major cities include Kraków, Łódź, Wrocław, Poznań, Gdańsk,
      and Szczecin. Poland's topographically diverse territory extends from the beaches along the Baltic Sea in the north
      to the Sudetes and Carpathian Mountains in its south. The country is bordered by Lithuania and Kaliningrad Oblast of
      Russia to the northeast, Belarus and Ukraine to the east, Slovakia and the Czech Republic to the south, and Germany
      to the west.The history of human activity on Polish soil spans thousands of years. Throughout the late antiquity period
      it became extensively diverse, with various cultures and tribes settling on the vast Central European Plain. However,
      it was the Western Polans who dominated the region and gave Poland its name. The establishment of Polish statehood can
      be traced to 966, when the pagan ruler of a realm coextensive with the territory of present-day Poland embraced Christianity
      and converted to Catholicism. The Kingdom of Poland was founded in 1025, and in 1569 it cemented its longstanding political
      association with Lithuania by signing the Union of Lublin. This union formed the Polish–Lithuanian Commonwealth, one
      of the largest (over 1,000,000 square kilometres – 400,000 square miles) and most populous nations of 16th and 17th
      century Europe, with a uniquely liberal political system which adopted Europe's first modern constitution, the Constitution
      of 3 May 1791.With the passing of prominence and prosperity, the country was partitioned by neighbouring states at the
      end of the 18th century, and regained independence in 1918 with the Treaty of Versailles. After a series of territorial
      conflicts, the new multi-ethnic Poland restored its position as a key player in European politics. In September 1939,
      World War II began with the invasion of Poland by Germany, followed by the Soviets invading Poland in accordance with
      the Molotov–Ribbentrop Pact. Approximately six million Polish citizens, including three million of the country's Jews,
      perished during the course of the war. As a member of the Eastern Bloc, the Polish People's Republic proclaimed forthwith
      was a chief signatory of the Warsaw Treaty amidst global Cold War tensions. In the wake of the 1989 events, notably
      through the emergence and contributions of the Solidarity movement, the communist government was dissolved and Poland
      re-established itself as a semi-presidential democratic republic. Poland is a developed market, and a middle power.
      It has the sixth largest economy in the European Union by nominal GDP and the fifth largest by GDP (PPP). It provides
      very high standards of living, safety and economic freedom, as well as free university education and a universal health
      care system. The country has 16 UNESCO World Heritage Sites, 15 of which are cultural. Poland is a member state of the
      Schengen Area, European Union, European Economic Area, the United Nations, NATO, the OECD, the Three Seas Initiative
      and the Visegrád Group.
    - Alice's Adventures in Wonderland (commonly shortened to Alice in Wonderland) is an 1865 novel by English author Lewis
      Carroll (the pseudonym of Charles Dodgson). It tells of a young girl named Alice, who falls through a rabbit hole into
      a subterranean fantasy world populated by peculiar, anthropomorphic creatures. It is considered to be one of the best
      examples of the literary nonsense genre. The tale plays with logic, giving the story lasting popularity with adults
      as well as with children.One of the best-known and most popular works of English-language fiction, its narrative, structure,
      characters and imagery have been enormously influential in popular culture and literature, especially in the fantasy
      genre. The work has never been out of print and has been translated into at least 97 languages. Its ongoing legacy encompasses
      many adaptations for stage, screen, radio, art, ballet, theme parks, board games and video games. Carroll published
      a sequel in 1871, titled Through the Looking-Glass, and a shortened version for young children, The Nursery "Alice",
      in 1890.
    - 'In many parts of sub-Saharan Africa, the use of music is not limited to entertainment: it serves a purpose to the local
      community and helps in the conduct of daily routines. Traditional African music supplies appropriate music and dance
      for work and for religious ceremonies of birth, naming, rites of passage, marriage and funerals. The beats and sounds
      of the drum are used in communication as well as in cultural expression.African dances are largely participatory: there
      are traditionally no barriers between dancers and onlookers except with regard to spiritual, religious and initiation
      dances. Even ritual dances often have a time when spectators participate. Dances help people work, mature, praise or
      criticize members of the community, celebrate festivals and funerals, compete, recite history, proverbs and poetry and
      encounter gods. They inculcate social patterns and values. Many dances are performed by only males or females. Dances
      are often segregated by gender, reinforcing gender roles in children. Community structures such as kinship, age, and
      status are also often reinforced. To share rhythm is to form a group consciousness, to entrain with one another, to
      be part of the collective rhythm of life to which all are invited to contribute.  Yoruba dancers and drummers, for instance,
      express communal desires, values, and collective creativity. The drumming represents an underlying linguistic text that
      guides the dancing performance, allowing linguistic meaning to be expressed non-verbally. The spontaneity of these performances
      should not be confused with an improvisation that emphasizes the individual ego. The drummer''s primary duty is to preserve
      the community. Master dancers and drummers are particular about the learning of the dance exactly as taught. Children
      must learn the dance exactly as taught without variation. Improvisation or a new variation comes only after mastering
      the dance, performing, and receiving the appreciation of spectators and the sanction of village elders.The music of
      the Luo, for another example, is functional, used for ceremonial, religious, political or incidental purposes, during
      funerals (Tero buru) to praise the departed, to console the bereaved, to keep people awake at night, to express pain
      and agony and during cleansing and chasing away of spirits, during beer parties (Dudu, ohangla dance), welcoming back
      the warriors from a war, during a wrestling match (Ramogi), during courtship, in rain making  and during divination
      and healing. Work songs are performed both during communal work like building, weeding, etc. and individual work like
      pounding of cereals, winnowing.'
  - source_sentence: An emergency department (ED), also known as an accident & emergency department (A&E), emergency room
      (ER), emergency ward (EW) or casualty department, is a medical treatment facility specializing in emergency medicine,
      the acute care of patients who present without prior appointment; either by their own means or by that of an ambulance.
      The emergency department is usually found in a hospital or other primary care center. Due to the unplanned nature of
      patient attendance, the department must provide initial treatment for a broad spectrum of illnesses and injuries, some
      of which may be life-threatening and require immediate attention. In some countries, emergency departments have become
      important entry points for those without other means of access to medical care. The emergency departments of most hospitals
      operate 24 hours a day, although staffing levels may be varied in an attempt to reflect patient volume.
    sentences:
    - Typha  is a genus of about 30 species of monocotyledonous flowering plants in the family Typhaceae. These plants have
      a variety of common names, in British English as bulrush or reedmace, in American English as reed, cattail, or punks,
      in Australia as cumbungi or bulrush, in Canada as bulrush or cattail, and in New Zealand as raupo. Other taxa of plants
      may be known as bulrush, including some sedges in Scirpus and related genera. The genus is largely distributed in the
      Northern Hemisphere, where it is found in a variety of wetland habitats. The rhizomes are edible. Evidence of preserved
      starch grains on grinding stones suggests they were already eaten in Europe 30,000 years ago.
    - Nursing is a profession within the health care sector focused on the care of individuals, families, and communities
      so they may attain, maintain, or recover optimal health and quality of life. Nurses may be differentiated from other
      health care providers by their approach to patient care, training, and scope of practice. Nurses practice in many specialties
      with differing levels of prescription authority. Nurses comprise the largest component of most healthcare environments;
      but there is evidence of international shortages of qualified nurses. Many nurses provide care within the ordering scope
      of physicians, and this traditional role has shaped the public image of nurses as care providers. Nurse practitioners
      are however permitted by most jurisdictions to practice independently in a variety of settings. Since the postwar period,
      nurse education has undergone a process of diversification towards advanced and specialized credentials, and many of
      the traditional regulations and provider roles are changing.Nurses develop a plan of care, working collaboratively with
      physicians, therapists, the patient, the patient's family, and other team members that focuses on treating illness to
      improve quality of life. In the United Kingdom and the United States, advanced practice nurses, such as clinical nurse
      specialists and nurse practitioners, diagnose health problems and prescribe medications and other therapies, depending
      on individual state regulations. Nurses may help coordinate the patient care performed by other members of a multidisciplinary
      health care team such as therapists, medical practitioners, and dietitians. Nurses provide care both interdependently,
      for example, with physicians, and independently as nursing professionals.
    - A flatbread is a bread made with flour, water, and salt, and then thoroughly rolled into flattened dough. Many flatbreads
      are unleavened, although some are leavened, such as pizza and pita bread. Flatbreads range from below one millimeter
      to a few centimeters thick so that they can be easily eaten without being sliced. They can be baked in an oven, fried
      in hot oil, grilled over hot coals, cooked on a hot pan, tava, comal, or metal griddle, and eaten fresh or packaged
      and frozen for later use.
  - source_sentence: The Academy Awards, popularly known as the Oscars, are awards for artistic and technical merit in the
      film industry. They are regarded as one of the most significant and prestigious awards in the entertainment industry.
      Given annually by the Academy of Motion Picture Arts and Sciences (AMPAS), the awards are an international recognition
      of excellence in cinematic achievements, as assessed by the Academy's voting membership. The various category winners
      are awarded a copy of a golden statuette as a trophy, officially called the "Academy Award of Merit", although more
      commonly referred to by its nickname, the "Oscar". The statuette depicts a knight rendered in the Art Deco style. The
      award was originally sculpted by George Stanley from a design sketch by Cedric Gibbons. AMPAS first presented it in
      1929 at a private dinner hosted by Douglas Fairbanks in The Hollywood Roosevelt Hotel in what would become known as
      the 1st Academy Awards. The Academy Awards ceremony was first broadcast by radio in 1930 and was televised for the first
      time in 1953. It is the oldest worldwide entertainment awards ceremony and is now televised live worldwide. It is also
      the oldest of the four major annual American entertainment awards; its equivalents – the Emmy Awards for television,
      the Tony Awards for theater, and the Grammy Awards for music – are modeled after the Academy Awards. A total of 3,140
      Oscar statuettes have been awarded since its inception in 1929. They are widely cited as the most famous and prestigious
      competitive awards in the field of entertainment. The 93rd Academy Awards ceremony, honoring the best films of 2020
      and early 2021, was held on April 25, 2021, after it was postponed from its original February 28, 2021, schedule due
      to the impact of the COVID-19 pandemic on cinema. As with the two previous ceremonies, there was no host. The ceremony
      was broadcast on ABC. It took place at the Dolby Theatre in Los Angeles, California for the 19th consecutive year, along
      with satellite location taking place at the Union Station also in Los Angeles.
    sentences:
    - The clitoris ( (listen) or  (listen)) is a female sex organ present in mammals, ostriches and a limited number of other
      animals. In humans, the visible portion – the glans – is at the front junction of the labia minora (inner lips), above
      the opening of the urethra. Unlike the penis, the male homologue (equivalent) to the clitoris, it usually does not contain
      the distal portion (or opening) of the urethra and is therefore not used for urination. The clitoris also usually lacks
      a reproductive function. While few animals urinate through the clitoris or use it reproductively, the spotted hyena,
      which has an especially large clitoris, urinates, mates, and gives birth via the organ. Some other mammals, such as
      lemurs and spider monkeys, also have a large clitoris.The clitoris is the human female's most sensitive erogenous zone
      and generally the primary anatomical source of human female sexual pleasure. In humans and other mammals, it develops
      from an outgrowth in the embryo called the genital tubercle. Initially undifferentiated, the tubercle develops into
      either a penis or a clitoris during the development of the reproductive system depending on exposure to androgens (which
      are primarily male hormones). The clitoris is a complex structure, and its size and sensitivity can vary. The glans
      (head) of the human clitoris is roughly the size and shape of a pea and is estimated to have about 8,000 sensory nerve
      endings.Sexological, medical, and psychological debate have focused on the clitoris, and it has been subject to social
      constructionist analyses and studies. Such discussions range from anatomical accuracy, gender inequality, female genital
      mutilation, and orgasmic factors and their physiological explanation for the G-spot. Although, in humans, the only known
      purpose of the clitoris is to provide sexual pleasure, whether the clitoris is vestigial, an adaptation, or serves a
      reproductive function has been debated. Social perceptions of the clitoris include the significance of its role in female
      sexual pleasure, assumptions about its true size and depth, and varying beliefs regarding genital modification such
      as clitoris enlargement, clitoris piercing and clitoridectomy. Genital modification may be for aesthetic, medical or
      cultural reasons.Knowledge of the clitoris is significantly impacted by cultural perceptions of the organ. Studies suggest
      that knowledge of its existence and anatomy is scant in comparison with that of other sexual organs and that more education
      about it could help alleviate social stigmas associated with the female body and female sexual pleasure, for example,
      that the clitoris and vulva in general are visually unappealing, that female masturbation is taboo, or that men should
      be expected to master and control women's orgasms.
    - Peafowl  is a common name for three bird species in the genera Pavo and Afropavo of the family Phasianidae, the pheasants
      and their allies. Male peafowl are referred to as peacocks, and female peafowl are referred to as peahens, even though
      peafowl of either sex are often referred to colloquially as "peacocks".The two Asiatic species are the blue or Indian
      peafowl originally of the Indian subcontinent, and the green peafowl of Southeast Asia; the one African species is the
      Congo peafowl, native only to the Congo Basin. Male peafowl are known for their piercing calls and their extravagant
      plumage. The latter is especially prominent in the Asiatic species, which have an eye-spotted "tail" or "train" of covert
      feathers, which they display as part of a courtship ritual. The functions of the elaborate iridescent colouration and
      large "train" of peacocks have been the subject of extensive scientific debate. Charles Darwin suggested that they served
      to attract females, and the showy features of the males had evolved by sexual selection. More recently, Amotz Zahavi
      proposed in his handicap theory that these features acted as honest signals of the males' fitness, since less-fit males
      would be disadvantaged by the difficulty of surviving with such large and conspicuous structures.
    - 'A film festival is an organized, extended presentation of films in one or more cinemas or screening venues, usually
      in a single city or region. Increasingly, film festivals show some films outdoors. Films may be of recent date and,
      depending upon the festival''s focus, can include international and domestic releases. Some festivals focus on a specific
      filmmaker, genre of film (i.e. horror films), or subject matter (LGBTQ+ film festivals). Several film festivals focus
      solely on presenting short films of a defined maximum length. Film festivals are typically annual events. Some film
      historians, including Jerry Beck, do not consider film festivals as official releases of the film. The most prestigious
      film festivals in the world, known as the "Big Three", are: Venice,Cannes,and Berlin. The most prestigious film festivals
      in North America are Sundance and Toronto.'
  - source_sentence: Modernism is both a philosophical movement and an art movement that arose from broad transformations
      in Western society during the late 19th and early 20th centuries. The movement reflected a desire for the creation of
      new forms of art,  philosophy, and social organization which reflected the newly emerging industrial world, including
      features such as urbanization, new technologies, and war. Artists attempted to depart from traditional forms of art,
      which they considered outdated or obsolete. The poet Ezra Pound's 1934 injunction to "Make it New" was the touchstone
      of the movement's approach.  Modernist innovations included abstract art, the stream-of-consciousness novel, montage
      cinema, atonal and twelve-tone music, and divisionist painting. Modernism explicitly rejected the ideology of realism
      and made use of the works of the past by the employment of reprise, incorporation, rewriting, recapitulation, revision
      and parody. Modernism also rejected the certainty of Enlightenment thinking, and many modernists also rejected religious
      belief. A notable characteristic of modernism is self-consciousness concerning artistic and social traditions, which
      often led to experimentation with form, along with the use of techniques that drew attention to the processes and materials
      used in creating works of art.While some scholars see modernism continuing into the 21st century, others see it evolving
      into late modernism or high modernism. Postmodernism is a departure from modernism and rejects its basic assumptions.
    sentences:
    - Yucca is a genus of perennial shrubs and trees in the family Asparagaceae, subfamily Agavoideae. Its 40–50 species are
      notable for their rosettes of evergreen, tough, sword-shaped leaves and large terminal panicles of white or whitish
      flowers. They are native to the hot and dry (arid) parts of the Americas and the Caribbean. Early reports of the species
      were confused with the cassava (Manihot esculenta). Consequently, Linnaeus mistakenly derived the generic name from
      the Taíno word for the latter, yuca.
    - Postmodernism is a broad movement that developed in the mid-to-late 20th century across philosophy, the arts, architecture,
      and criticism, marking a departure from modernism. The term has been more generally applied to describe a historical
      era said to follow after modernity and the tendencies of this era.  Postmodernism is generally defined by an attitude
      of skepticism, irony, or rejection toward what it describes as the grand narratives and ideologies associated with modernism,
      often criticizing Enlightenment rationality and focusing on the role of ideology in maintaining political or economic
      power. Postmodern thinkers frequently describe knowledge claims and value systems as contingent or socially-conditioned,
      framing them as products of political, historical, or cultural discourses and hierarchies. Common targets of postmodern
      criticism include universalist ideas of objective reality, morality, truth, human nature, reason, science, language,
      and social progress. Accordingly, postmodern thought is broadly characterized by tendencies to self-consciousness, self-referentiality,
      epistemological and moral relativism, pluralism, and irreverence. Postmodern critical approaches gained popularity in
      the 1980s and 1990s, and have been adopted in a variety of academic and theoretical disciplines, including cultural
      studies, philosophy of science, economics, linguistics, architecture, feminist theory, and literary criticism, as well
      as art movements in fields such as literature, contemporary art, and music. Postmodernism is often associated with schools
      of thought such as deconstruction, post-structuralism, and institutional critique, as well as philosophers such as Jean-François
      Lyotard, Jacques Derrida, and Fredric Jameson. Criticisms of postmodernism are intellectually diverse and include arguments
      that postmodernism promotes obscurantism, is meaningless, and that it adds nothing to analytical or empirical knowledge.
    - Grouse  are a group of birds from the order Galliformes, in the family Phasianidae. Grouse are frequently assigned to
      the subfamily Tetraoninae or tribe Tetraonini (formerly the family Tetraonidae), a classification supported by mitochondrial
      DNA sequence studies, and applied by the American Ornithologists' Union, ITIS, and others. Grouse inhabit temperate
      and subarctic regions of the Northern Hemisphere, from pine forests to moorland and mountainside, from 83°N (rock ptarmigan
      in northern Greenland) to 28°N (Attwater's prairie chicken in Texas).
