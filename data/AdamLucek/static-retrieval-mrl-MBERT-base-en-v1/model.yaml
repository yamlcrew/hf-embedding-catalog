  - source_sentence: how to sign legal documents as power of attorney?
    sentences:
    - 'After the principal''s name, write “by” and then sign your own name. Under or after the signature line, indicate your
      status as POA by including any of the following identifiers: as POA, as Agent, as Attorney in Fact or as Power of Attorney.'
    - Most earthquakes occur along the edge of the oceanic and continental plates. The earth's crust (the outer layer of the
      planet) is made up of several pieces, called plates. The plates under the oceans are called oceanic plates and the rest
      are continental plates.
    - Go to System -> VDOM -> VDOM2 and select 'Delete'. This VDOM is now successfully removed from the configuration.
  - source_sentence: Reflection and scattering of spin waves by surface roughness of a ferromagnet
    sentences:
    - Abstract A detailed theory of volume spin wave reflection from the randomly rough surface of a ferromagnet is presented.
      The contribution to damping of the reflected wave is calculated. This contribution is due to the scattering of the initial
      volume wave into secondary surface and volume spin waves. The value of damping is proportional to the correlation length
      and the square of the roughness amplitude. Numerical calculations of the attenuation rate as a function of the angle
      of incidence and the ratio between the surface anisotropy and the wavenumber are provided. They yield the angle of incidence
      where the attenuation has a maximum. In analogy to optics, this angle is similar to the Brewster angle. Numerical estimations
      of damping and a comparison of its value with the ferromagnetic resonance linewidth are also made. Finally, the results
      of the calculation of the scattering of surface exchange spin waves by surface roughness are presented and discussed.
    - A review is made of current and potential future applications of composite materials in the marine environment. Reference
      is made to small boats, fishing vessels, larger passenger and cargo ships, naval vessels, high performance craft, underwater
      vehicles, and superstructures in ships and offshore platforms. Their use in the repair of steel structures is also considered.
      Problems of material selection are discussed with reference to alternative resins and reinforcements, mechanical properties,
      and durability in marine environment, as well as fire resistance and electromagnetic characteristics. Problems of structural
      design are also discussed with reference to stress analysis, fatigue and buckling failure, design of connections, and
      fabrication methods. Comparisons are made between alternative forms of hull design
    - The study aimed at identifying leopard-livestock conflict hotspots in the Khorasan Province for leopard conservation
      and management programs. Camera trappings, tracking (i.e. footprints and faeces), systematic interviews with local communities
      were used. The most suitable leopard habitats in the province are found in the southern portion of Maneh and Samalghan,
      Bojnourd, and the northern parts of Jajarm and Esfarayen Townships. Various species of leopard, wolf, wild boar and
      Indian crested porcupine were found. Leopards were found to be responsible for 10.6 % of the total conflict hotspots.
      Complaints from the local communities were mostly with regards to damages rendered by wild boar and porcupines, and
      livestock depredation by wolves. Local community awareness about compensation programs currently conducted by the Department
      of Environment Office and the introduction of livestock insurance regulations might effectively reduce and prevent leopard
      revenge killings in the region.
  - source_sentence: What aspect of faith is covered by canon law?
    sentences:
    - In Presbyterian and Reformed churches, canon law is known as "practice and procedure" or "church order", and includes
      the church's laws respecting its government, discipline, legal practice and worship.
    - During the Baroque era, keyboard music played on the harpsichord and pipe organ became increasingly popular, and the
      violin family of stringed instruments took the form generally seen today. Opera as a staged musical drama began to differentiate
      itself from earlier musical and dramatic forms, and vocal forms like the cantata and oratorio became more common. Vocalists
      began adding embellishments to melodies. Instrumental ensembles began to distinguish and standardize by size, giving
      rise to the early orchestra for larger ensembles, with chamber music being written for smaller groups of instruments
      where parts are played by individual (instead of massed) instruments. The concerto as a vehicle for solo performance
      accompanied by an orchestra became widespread, although the relationship between soloist and orchestra was relatively
      simple.
    - New York City is home to Fort Hamilton, the U.S. military's only active duty installation within the city. Established
      in 1825 in Brooklyn on the site of a small battery utilized during the American Revolution, it is one of America's longest
      serving military forts. Today Fort Hamilton serves as the headquarters of the North Atlantic Division of the United
      States Army Corps of Engineers as well as for the New York City Recruiting Battalion. It also houses the 1179th Transportation
      Brigade, the 722nd Aeromedical Staging Squadron, and a military entrance processing station. Other formerly active military
      reservations still utilized for National Guard and military training or reserve operations in the city include Fort
      Wadsworth in Staten Island and Fort Totten in Queens.
  - source_sentence: 'Attenuation of ischemia/reperfusion-induced ovarian damage in rats: does edaravone offer protection?'
    sentences:
    - In cultured rat cortical neurons, the compositions in the experimental solutions were changed to mimic the disturbance
      of homeostasis after cerebral ischemia. In vitro ischemic injury was induced by oxygen-glucose deprivation (OGD) for
      3 h and reperfusion for 12 h, and the neuron injury was evaluated by 3-(4, 5-dimethylthiazol-2yl)-2, 5-diphenyl tetrazolium
      bromide (MTT) reduction assay and lactate dehydrogenase (LDH) release. Effect of edaravone on OGD injury was observed
      in different experimental solutions.
    - Ischemia/reperfusion (I/R) injury is a major cause of acute renal failure in kidney transplantation; however, the mechanisms
      of kidney damage and repair are not yet clear. So far no treatment has been effective to prevent I/R injury. In the
      present study we evaluated the effect of erythropoetin (EPO) in I/R injury in rats. We investigated the role of bone
      marrow cells (BMC) in kidney repair and the effect of EPO on BMC recruitment.
    - This study tested, in ovariectomized rats, whether (1) adventitial activation plays a role in the vascular injury response,
      and (2) inhibition of adventitial activation and the subsequent wave of cell proliferation moving from adventitia to
      neointima contributes to the estrogen-induced attenuation of neointima formation in balloon injured carotid arteries.
    - Reperfusion injury is a vital problem in non-heart-beating donor (NHBD) organs. The sodium-hydrogen inhibitor cariporide
      is thought to improve cellular integrity after ischemia and reperfusion. Recently, we demonstrated the possibility of
      preserving hearts with in situ perfusion after circulatory death. The purpose of this study was to determine whether
      cariporide improves in situ heart protection.
    - To determine whether edaravone (MCI-186), a free radical scavenger, can reduce macular oedema and improve the visual
      acuity after arteriovenous sheathotomy in eyes with a branch retinal vein occlusion (BRVO).
    - Erythropoietin (EPO) is a hormone that is currently used to treat patients with renal failure and anaemia. However,
      it has also been shown to protect against ischaemia/reperfusion injury; this protection occurring via activation of
      the ERK 1/2 and PI3K pathways. Since we have previously shown activation of ERK 1/2 and PI3K to be important for protection
      against reperfusion-induced injury in the myocardium, this study was designed to investigate its effect in the myocardium
      using both an isolated perfused rat heart and an in vivo rat recovery model of ischaemia-reperfusion.
    - Edaravone (3-methyl-1-penyl-2-pyrazolin-5-one) is a potent free-radical scavenger and has the antioxidant ability to
      inhibit lipid peroxidation. The study aimed to examine the effect of edaravone on protecting the acute injury of human
      type II alveolar epithelial cells (A549 cells) induced by paraquat (PQ) and the change of production of reactive oxygen
      species (ROS), malondialdehyde (MDA), superoxide dismutase (SOD).
    - Twenty-eight female Sprague Dawley rats were allocated randomly to 4 groups. The sham group (group 1) was only subjected
      to catheter insertion, not to pneumoperitoneum. Group 2 received a 1 mg/kg dose of 0.9% sodium chloride by the intraperitoneal
      route for 10 min before pneumoperitoneum. Groups 3 and 4 received 6 and 12 mg/kg edaravone, respectively, by the intraperitoneal
      route for 10 min before pneumoperitoneum. After 60 min of pneumoperitoneum, the gas was deflated. Immediately after
      the reperfusion period, both ovaries were excised for histological scoring, caspase-3 immunohistochemistry and biochemical
      evaluation including glutathione (GSH) and malondialdehyde (MDA) levels. Also, total antioxidant capacity (TAC) was
      measured in plasma samples to evaluate the antioxidant effect of edaravone.
    - Erythropoietin (EPO) prevents the myocardial dysfunction induced by ischemia/reperfusion (I/R). Since I/R-induced myocardial
      dysfunction is associated with an acute inflammatory response, we assessed the anti-inflammatory properties of EPO using
      in vitro and in vivo models of I/R.
    - Adenosine, a metabolite of adenosine triphosphate degradation during ischemia, is reported to attenuate ischemia and
      reperfusion injury in several tissues. Dipyridamole is a nucleoside transport inhibitor that augments endogenous adenosine.
      In this study, we tested whether dipyridamole would attenuate hepatic I/R injury. For this purpose, dipyridamole was
      applied to a 2-hour total hepatic vascular exclusion model in dogs.
    - Reperfusion of the rat kidney has been shown to up-regulate cysteinyl leukotriene-1 receptor, an asthma-associated gene
      in human bronchioles, and increase expression of leukotriene D4. In this study, we aimed to investigate the efficacy
      of MK-571, a leukotriene D4 inhibitor, against hypersensitivity induced by kidney ischemia and reperfusion (I/R)-associated
      acute kidney injury.
    - Liver ischemia-reperfusion injury is a phenomenon presents in events like liver resections and transplantation. The
      restoration of blood flow may leads to local and systemic injury. Several techniques have been developed in order to
      avoid or ameliorate ischemia-reperfusion injury in clinical situations. The application of a stutter reperfusion after
      the ischemic event (postconditioning) could alters the hydrodynamics and stimulates endogenous mechanisms that attenuate
      the reperfusion injury. The present study was designed to evaluate the potential protective effect of postconditioning
      in a model of ischemia-reperfusion in rats.
    - Does the phytochemical compound resveratrol inhibit vascularization of endometriotic lesions?
    - Only 10% of the SAO animals survived the entire 6 h reperfusion period. In a separate set of experiments after 60 min
      of reperfusion animals were killed for histological examination and biochemical studies. Administration of TDZD-8 (1
      mg/kg i.v.) 5 min prior to the reperfusion significantly reduced the (a) fall in mean arterial blood pressure, (b) mortality
      rate, (c) infiltration of the reperfused intestine with polymorphonuclear neutrophils (MPO activity), (d) production
      of pro-inflammatory cytokines (TNF-alpha and IL-1 beta and (e) histological evidence of gut injury. Administration of
      TDZD-8 also markedly reduced the immunoreactivity of nitrotyrosine formation and the expression of ICAM-1 and P-selectin
      during reperfusion.
    - We assessed the effect of 2 weeks of treatment with 17 beta-estradiol (E, 100 micrograms.kg-1.d-1, n = 12) or placebo
      (P, n = 15) on myocardial and coronary endothelial function during the first 2 hours of reperfusion in dogs subjected
      to 15 minutes of ischemia induced by occlusion of the left anterior descending coronary artery (LAD). Our results show
      that the incidence of ventricular arrhythmias significantly decreased in E (3 of 12) compared with P (11 of 15). Systolic
      shortening, significantly depressed in P during early reperfusion, was maintained at preischemic levels in E. During
      reperfusion, the increase in LAD flow to acetylcholine, attenuated in P (60 +/- 6%), was preserved in E endothelium.
      (151 +/- 28%) and was associated with increased serum nitrite/nitrate concentration. n-Pentane in exhaled gas in vivo,
      an index of lipid peroxidation, increased significantly during early reperfusion in P (from 9.1 +/- 1.9 to 41.6 +/-
      13.0 ppb, P < .05) but not in E (23.0 +/- 6.9 ppb). In vitro, arterial segments from E generated significantly less
      superoxide anion after hypoxia/reoxygenation than those from P. Ischemic/reperfused LAD segments from E also revealed
      a better preservation of endothelium-dependent relaxation in vitro (maximum relaxation, 42 +/- 4% versus 24 +/- 4% in
      P; P < .05).
    - The aim of this article is to investigate whether administration of edaravone, a free radical scavenger, could prevent
      type 1 diabetes-induced dysfunction of nitric oxide (NO)-induced relaxation in corpus cavernosum smooth muscle in the
      rat.
    - To investigate the protective effect of melatonin on liver after intestinal ischemia-reperfusion injury in rats.
    - We studied the presence and functionality of the EPO-R in isolated rat hearts in the Langendorff set-up. Hearts were
      perfused for 20 min with 10 U/ml EPO or vehicle. Immunohistochemistry revealed the presence of the EPO-R on endothelial
      cells, fibroblasts and to a lesser extent cardiomyocytes. Furthermore, perfusion with EPO resulted in a 50% increase
      in the phosphorylated MAP kinases p42/p44. To evaluate the protective role of EPO in cardiac ischemia, we performed
      low-flow (0.6 ml/min) ischemia/reperfusion experiments in isolated rat hearts. Administration of EPO (10 U/ml) reduced
      the cellular damage by 56% (P<0.05) during reperfusion, diminished apoptosis by 15% (P<0.05) and resulted in a significantly
      improved recovery of left ventricular pressure (P=0.02) and coronary flow (P=0.01).
    - Ischaemia-reperfusion injury was exaggerated by two- to five-fold in SS and NASH compared with lean liver. Atorvastatin
      pretreatment conferred 70-90% hepatic protection in all animals. Atorvastatin increased post-ischaemic eNOS mRNA/protein
      and strikingly enhanced eNOS activity (by phospho-eNOS). It also attenuated microparticle (MP) production, NF-κB activation,
      significantly dampened post-ischaemic thromboxane B2 production, induction of TNF-α, IL-6, MIP-1a, MCP-1, GM-CSF and
      vascular cell adhesion molecule-1 (VCAM), with a resultant reduction on macrophage and polymorphonuclear neutrophil
      recruitment. Up-regulation of HMGB1 and TLR4 after IRI was marked in fatty livers; 1 h pretreatment with atorvastatin
      reduced HMGB1 and TLR4 expression in all livers.
    - Ischemia/reperfusion (I/R) injury, which is commonly seen in the field of renal surgery or transplantation, is a major
      cause of acute renal failure (ARF). The ischemic ARF in diabetic rats is much more severe than that in the normal rats
      exposed to as same ischemic time. Ischemic post-conditioning (IPO) is a phenomenon by which intermittent interruptions
      of blood flow in the early phase of reperfusion can protect organs from I/R injury. To determine whether the renal protection
      effect of IPO mediates by toll-like receptor 4 (TLR4) signaling pathway in diabetic rats.
    - To investigate the effects of resveratrol on liver ischemia/reperfusion (I/R) injury in rats.
