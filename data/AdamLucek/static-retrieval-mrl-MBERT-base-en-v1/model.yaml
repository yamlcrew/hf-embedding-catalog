    than those from P. Ischemic/reperfused LAD segments from E also revealed a better preservation of endothelium-dependent
    relaxation in vitro (maximum relaxation, 42 +/- 4% versus 24 +/- 4% in P; P < .05).
  - The aim of this article is to investigate whether administration of edaravone, a free radical scavenger, could prevent
    type 1 diabetes-induced dysfunction of nitric oxide (NO)-induced relaxation in corpus cavernosum smooth muscle in the
    rat.
  - To investigate the protective effect of melatonin on liver after intestinal ischemia-reperfusion injury in rats.
  - We studied the presence and functionality of the EPO-R in isolated rat hearts in the Langendorff set-up. Hearts were perfused
    for 20 min with 10 U/ml EPO or vehicle. Immunohistochemistry revealed the presence of the EPO-R on endothelial cells,
    fibroblasts and to a lesser extent cardiomyocytes. Furthermore, perfusion with EPO resulted in a 50% increase in the phosphorylated
    MAP kinases p42/p44. To evaluate the protective role of EPO in cardiac ischemia, we performed low-flow (0.6 ml/min) ischemia/reperfusion
