    - 'Disease-modifying treatments (DMTs), which are the foundation of multiple sclerosis (MS) care, reduce clinical exacerbations
      (relapses) and slow disease progression; however, improving quality of life (QOL) is an unmet need for many individuals
      with MS. DMTs, including interferon-beta, glatiramer acetate, natalizumab, mitoxantrone, and fingolimod, reduce the
      rate and severity of relapses, the accumulation of brain and spinal cord lesions as shown on magnetic resonance imaging
      (MRI), and disability progression. Many studies link diminished QOL with specific MS symptoms (fatigue, impaired mobility,
      spasticity, etc). Even in patients already receiving DMTs, symptoms and QOL may improve with additional agents that
      treat specific symptoms, thereby improving patient function and ability to perform activities of daily living (ADLs).
      Patients have reported that mobility impairment is one of the worst aspects of MS. Almost half of patients treated with
      DMTs reported no improvement in mobility. However, blocking the voltage-dependent potassium channels on the surface
      of demyelinated nerve fibers may improve signal conduction. Dalfampridine, a potassium channel blocker, received Food
      and Drug Administration (FDA) approval for all forms of MS specifically to improve walking, which was demonstrated by
      increased walking speed. By improving walking in some patients with MS, the effects of dalfampridine may complement
      those of DMTs and address the stated priorities of many patients.

      (Am J Manag Care. 2011;17:S146-S153)

      MS Treatment and QOL

      Improving quality of life (QOL) is an unmet need for many individuals with multiple sclerosis (MS). Disease-modifying
      treatments (DMTs), which are the foundation of MS care,1 reduce clinical exacerbations (relapses) and slow disease progression.2
      QOL improvement, although assumed with fewer relapses, has not always been well documented.

      Treatment individualization can include additional agents that treat specific symptoms, improving patient function and
      ability to perform activities of daily living (ADLs).3 Because many symptom-specific treatments are available, MS treatment
      should address QOL at every stage of disease progression.

      Actions and Safety of DMTs

      DMTs reduce the rate and severity of relapses, the accumulation of brain and spinal cord lesions as shown on magnetic
      resonance imaging (MRI), and disability progression as measured by Expanded Disability Status Scale (EDSS).2 Controlled
      clinical trials demonstrated relapse rate reductions of 28% to 68%.2 However, relatively few DMT trials documented QOL
      improvement with QOL metrics. The National Multiple Sclerosis Society (NMSS) stated that DMTs “can be looked upon as
      an investment in the future,” rather than treatment that makes patients feel better now.2 Thus, clinicians may appreciate
      the effects of DMTs while some patients on DMT therapy continue to suffer treatable symptoms, poor QOL, and sometimes,
      adverse effects (AEs).

      Interferon-beta (IFNB) is a cytokine primarily secreted by fibroblasts as part of immune response4; recombinant DNA
      technology produces therapeutic IFNB agents.5 In MS, the IFNB mechanism seems to involve immunomodulatory effects mediated
      through interactions with specific cell-surface receptors.4 Whereas IFNB-1b is injected subcutaneously every other day,
      IFNB-1a is available in forms for intramuscular (weekly) and subcutaneous (3 times/week) injection.2 Four IFNB agents
      have received Food and Drug Administration (FDA) approval for relapsing forms of MS: interferon beta-1b (Betaseron)
      in 1993, interferon beta-1a (Avonex) in 1996, interferon beta-1a (Rebif) in 2002, and interferon beta-1b (Extavia) in
      2009.2 Numerous randomized multicenter trials have demonstrated reduced rate and severity of relapses, delayed EDSS
      progression, and fewer MRI lesions with IFNB.4,5,6 Some patients develop neutralizing antibodies, potentially lessening
      efficacy over time.2,5

      The evidence for IFNB using QOL metrics is mixed. An early IFNB study incor'
