  - TREXIMET should be used with caution in patients with a history of epilepsy or conditions associated with a lowered seizure
    threshold. There have been reports of seizure following administration of sumatriptan.
  - During premarketing testing, seizures occurred in 0.9% (22/2500) of olanzapine-treated patients. There were confounding
    factors that may have contributed to the occurrence of seizures in many of these cases. Olanzapine should be used cautiously
    in patients with a history of seizures or with conditions that potentially lower the seizure threshold, e.g., Alzheimer's
    dementia. Olanzapine is not approved for the treatment of patients with Alzheimer's disease. Conditions that lower the
    seizure threshold may be more prevalent in a population of 65 years or older.
- source_sentence: How much erythromycin is in each pledget?
  sentences:
  - 'Theophylline There have been published reports suggesting that when oral erythromycin is given concurrently with theophylline
    there is a decrease in erythromycin serum concentrations of approximately 35%. The mechanism by which this interaction
    occurs is unknown. The decrease in erythromycin concentrations due to co-administration of theophylline could result in
    subtherapeutic concentrations of erythromycin. Hypotension, bradyarrhythmias, and lactic acidosis have been observed in
    patients receiving concurrent verapamil, belonging to the calcium channel blockers drug class. Concomitant administration
    of erythromycin and digoxin has been reported to result in elevated digoxin serum levels. There have been reports of increased
    anticoagulant effects when erythromycin and oral anticoagulants were used concomitantly. Increased anticoagulation effects
    due to interactions of erythromycin with oral anticoagulants may be more pronounced in the elderly. Erythromycin is a
    substrate and inhibitor of the 3A isoform subfamily of the cytochrome p450 enzyme system (CYP3A). Coadministration of
    erythromycin and a drug primarily metabolized by CYP3A may be associated with elevations in drug concentrations that could
    increase or prolong both the therapeutic and adverse effects of the concomitant drug. Dosage adjustments may be considered,
    and when possible, serum concentrations of drugs primarily metabolized by CYP3A should be monitored closely in patients
    concurrently receiving erythromycin. The following are examples of some clinically significant CYP3A based drug interactions.
    Interactions with other drugs metabolized by the CYP3A isoform are also possible. The following CYP3A based drug interactions
    have been observed with erythromycin products in post-marketing experience: Ergotamine/dihydroergotamine Post-marketing
    reports indicate that co-administration of erythromycin with ergotamine or dihydroergotamine has been associated with
    acute ergot toxicity characterized by vasospasm and ischemia of the extremities and other tissues including the central
    nervous system. Concomitant administration of erythromycin with ergotamine or dihydroergotamine is contraindicated (see
    CONTRAINDICATIONS Triazolobenzodiazepines (such as triazolam and alprazolam) and related benzodiazepines Erythromycin
    has been reported to decrease the clearance of triazolam and midazolam, and thus, may increase the pharmacologic effect
    of these benzodiazepines. HMG-CoA Reductase Inhibitors Erythromycin has been reported to increase concentrations of HMG-CoA
    reductase inhibitors (e.g., lovastatin and simvastatin). Rare reports of rhabdomyolysis have been reported in patients
    taking these drugs concomitantly. Sildenafil (Viagra) Erythromycin has been reported to increase the systemic exposure
    (AUC) of sildenafil. Reduction of sildenafil dosage should be considered. (See Viagra package insert.) There have been
    spontaneous or published reports of CYP3A based interactions of erythromycin with cyclosporine, carbamazepine, tacrolimus,
    alfentanil, disopyramide, rifabutin, quinidine, methyl-prednisolone, cilostazol, vinblastine, and bromocriptine. Concomitant
    administration of erythromycin with cisapride, pimozide, astemizole, or terfenadine is contraindicated. (See CONTRAINDICATIONS.
    In addition, there have been reports of interactions of erythromycin with drugs not thought to be metabolized by CYP3A,
    including hexobarbital, phenytoin, and valproate. Erythromycin has been reported to significantly alter the metabolism
    of the nonsedating antihistamines terfenadine and astemizole when taken concomitantly. Rare cases of serious cardiovascular
    adverse events, including electrocardiographic QT/QTc interval prolongation, cardiac arrest, torsades de pointes, and
    other ventricular arrhythmias have been observed. (See CONTRAINDICATIONS. There have been post-marketing reports of drug
    interactions when erythromycin was co-administered with cisapride, resulting in QT prolongation, cardiac arrhythmias,
    ventricular tachycardia, ventricular fibrillation, and torsades de pointes, most likely due to the inhibition of hepatic
    metabolism of cisapride by erythromycin. Fatalities have been reported. (See CONTRAINDICATIONS. Colchicine Colchicine
    is a substrate for both CYP3A4 and the efflux transporter P-glycoprotein (P-gp). Erythromycin is considered a moderate
    inhibitor of CYP3A4. A significant increase in colchicine plasma concentration is anticipated when co-administered with
    moderate CYP3A4 inhibitors such as erythromycin. If co-administration of colchicine and erythromycin is necessary, the
    starting dose of colchicine may need to be reduced, and the maximum colchicine dose should be lowered. Patients should
    be monitored for clinical symptoms of colchicine toxicity (see WARNINGS).'
  - Patients receiving furosemide should be advised that they may experience symptoms from excessive fluid and/or electrolyte
    losses. The postural hypotension that sometimes occurs can usually be managed by getting up slowly. Potassium supplements
    and/or dietary measures may be needed to control or avoid hypokalemia. Patients with diabetes mellitus should be told
    that furosemide may increase blood glucose levels and thereby affect urine glucose tests. The skin of some patients may
    be more sensitive to the effects of sunlight while taking furosemide. Hypertensive patients should avoid medications that
    may increase blood pressure, including over-the-counter products for appetite suppression and cold symptoms.
  - Each pledget is filled to contain 1 mL of Erythromycin Topical Solution USP 2%. Each mL of Erythromycin Topical Solution
    USP 2% contains 20 mg of erythromycin. Each pledget is supplied in an individual foil packet in boxes of 60. NDC 0168-0215-01.
    Store at 20°- 25°C (68°- 77°F)[See USP Controlled Room Temperature]. E. FOUGERA & CO. a division of Altana Inc. IF221501
    Remove this portion before dispensing ERYTHROMYCIN PLEDGETS, USP
