  - source_sentence: How does ramipril compare to other blood pressure medications?
    sentences:
    - 14.1 Hypertension Ramipril has been compared with other ACE inhibitors, beta-blockers, and thiazide diuretics as monotherapy
      for hypertension. It was approximately as effective as other ACE inhibitors and as atenolol. Administration of ramipril
      to patients with mild to moderate hypertension results in a reduction of both supine and standing blood pressure to
      about the same extent with no compensatory tachycardia. Symptomatic postural hypotension is infrequent, although it
      can occur in patients who are salt- and/or volume-depleted [see WARNINGS AND PRECAUTIONS ( 5.5 Use of ramipril in combination
      with thiazide diuretics gives a blood pressure lowering effect greater than that seen with either agent alone. In single-dose
      studies, doses of 5 mg to 20 mg of ramipril lowered blood pressure within 1 to 2 hours, with peak reductions achieved
      3 to 6 hours after dosing. The antihypertensive effect of a single dose persisted for 24 hours. In longer term (4 to
      12 weeks) controlled studies, once-daily doses of 2.5 mg to 10 mg were similar in their effect, lowering supine or standing
      systolic and diastolic blood pressures 24 hours after dosing by about 6/4 mmHg more than placebo. In comparisons of
      peak vs. trough effect, the trough effect represented about 50 to 60% of the peak response. In a titration study comparing
      divided (bid) vs. qd treatment, the divided regimen was superior, indicating that for some patients, the antihypertensive
      effect with once-daily dosing is not adequately maintained. In most trials, the antihypertensive effect of ramipril
      increased during the first several weeks of repeated measurements. The antihypertensive effect of ramipril has been
      shown to continue during long-term therapy for at least 2 years. Abrupt withdrawal of ramipril has not resulted in a
      rapid increase in blood pressure. Ramipril has been compared with other ACE inhibitors, beta-blockers, and thiazide
      diuretics. Ramipril was approximately as effective as other ACE inhibitors and as atenolol. In both Caucasians and Blacks,
      hydrochlorothiazide (25 or 50 mg) was significantly more effective than ramipril. Ramipril was less effective in blacks
      than in Caucasians. The effectiveness of ramipril was not influenced by age, sex, or weight. In a baseline controlled
      study of 10 patients with mild essential hypertension, blood pressure reduction was accompanied by a 15% increase in
      renal blood flow. In healthy volunteers, glomerular filtration rate was unchanged. 14.3 Heart Failure Post-Myocardial
      Infarction Ramipril was studied in the AIRE trial. This was a multinational (mainly European) 161-center, 2006-patient,
      double-blind, randomized, parallel-group study comparing ramipril to placebo in stable patients, 2 to 9 days after an
      acute myocardial infarction, who had shown clinical signs of congestive heart failure at any time after the myocardial
      infarction. Patients in severe (NYHA class IV) heart failure, patients with unstable angina, patients with heart failure
      of congenital or valvular etiology, and patients with contraindications to ACE inhibitors were all excluded. The majority
      of patients had received thrombolytic therapy at the time of the index infarction, and the average time between infarction
      and initiation of treatment was 5 days. Patients randomized to ramipril treatment were given an initial dose of 2.5
      mg twice daily. If the initial regimen caused undue hypotension, the dose was reduced to 1.25 mg, but in either event
      doses were titrated upward (as tolerated) to a target regimen (achieved in 77% of patients randomized to ramipril) of
      5 mg twice daily. Patients were then followed for an average of 15 months, with the range of follow-up between 6 and
      46 months. The use of ramipril was associated with a 27% reduction (p=0.002) in the risk of death from any cause; about
      90% of the deaths that occurred were cardiovascular, mainly sudden death. The risks of progression to severe heart failure
      and of congestive heart failure-related hospitalization were also reduced, by 23% (p=0.017) and 26% (p=0.011), respectively.
      The benefits of ramipril therapy were seen in both genders, and they were not affected by the exact timing of the initiation
      of therapy, but older patients may have had a greater benefit than those under 65. The benefits were seen in patients
      on (and not on) various concomitant medications. At the time of randomization these included aspirin (about 80% of patients),
      diuretics (about 60%), organic nitrates (about 55%), beta-blockers (about 20%), calcium channel blockers (about 15%),
      and digoxin (about 12%).
    - Ramipril capsules are indicated for the treatment of hypertension. It may be used alone or in combination with thiazide
      diuretics. In using ramipril capsules, consideration should be given to the fact that another angiotensin converting
      enzyme inhibitor, captopril, has caused agranulocytosis, particularly in patients with renal impairment or collagen-vascular
