    reactions. Patients should be monitored regularly for worsening of glucose control. Patients who have diabetes should
    follow their doctor's instructions about how often to check their blood sugar while taking olanzapine orally disintegrating
    tablets [see Warnings and Precautions ( 5.5
  - Montelukast causes inhibition of airway cysteinyl leukotriene receptors as demonstrated by the ability to inhibit bronchoconstriction
    due to inhaled LTD 4 4 The effect of montelukast sodium on eosinophils in the peripheral blood was examined in clinical
    trials. In patients with asthma aged 2 years and older who received montelukast sodium, a decrease in mean peripheral
    blood eosinophil counts ranging from 9% to 15% was noted, compared with placebo, over the double-blind treatment periods.
    In patients with seasonal allergic rhinitis aged 15 years and older who received montelukast sodium, a mean increase of
    0.2% in peripheral blood eosinophil counts was noted, compared with a mean increase of 12.5% in placebo-treated patients,
    over the double-blind treatment periods; this reflects a mean difference of 12.3% in favor of montelukast sodium. The
    relationship between these observations and the clinical benefits of montelukast noted in the clinical trials is not known
    [see Clinical Studies (14)
- source_sentence: How does ramipril compare to other blood pressure medications?
  sentences:
  - 14.1 Hypertension Ramipril has been compared with other ACE inhibitors, beta-blockers, and thiazide diuretics as monotherapy
    for hypertension. It was approximately as effective as other ACE inhibitors and as atenolol. Administration of ramipril
    to patients with mild to moderate hypertension results in a reduction of both supine and standing blood pressure to about
    the same extent with no compensatory tachycardia. Symptomatic postural hypotension is infrequent, although it can occur
    in patients who are salt- and/or volume-depleted [see WARNINGS AND PRECAUTIONS ( 5.5 Use of ramipril in combination with
    thiazide diuretics gives a blood pressure lowering effect greater than that seen with either agent alone. In single-dose
    studies, doses of 5 mg to 20 mg of ramipril lowered blood pressure within 1 to 2 hours, with peak reductions achieved
    3 to 6 hours after dosing. The antihypertensive effect of a single dose persisted for 24 hours. In longer term (4 to 12
    weeks) controlled studies, once-daily doses of 2.5 mg to 10 mg were similar in their effect, lowering supine or standing
    systolic and diastolic blood pressures 24 hours after dosing by about 6/4 mmHg more than placebo. In comparisons of peak
    vs. trough effect, the trough effect represented about 50 to 60% of the peak response. In a titration study comparing
    divided (bid) vs. qd treatment, the divided regimen was superior, indicating that for some patients, the antihypertensive
    effect with once-daily dosing is not adequately maintained. In most trials, the antihypertensive effect of ramipril increased
    during the first several weeks of repeated measurements. The antihypertensive effect of ramipril has been shown to continue
    during long-term therapy for at least 2 years. Abrupt withdrawal of ramipril has not resulted in a rapid increase in blood
    pressure. Ramipril has been compared with other ACE inhibitors, beta-blockers, and thiazide diuretics. Ramipril was approximately
    as effective as other ACE inhibitors and as atenolol. In both Caucasians and Blacks, hydrochlorothiazide (25 or 50 mg)
    was significantly more effective than ramipril. Ramipril was less effective in blacks than in Caucasians. The effectiveness
    of ramipril was not influenced by age, sex, or weight. In a baseline controlled study of 10 patients with mild essential
    hypertension, blood pressure reduction was accompanied by a 15% increase in renal blood flow. In healthy volunteers, glomerular
    filtration rate was unchanged. 14.3 Heart Failure Post-Myocardial Infarction Ramipril was studied in the AIRE trial. This
    was a multinational (mainly European) 161-center, 2006-patient, double-blind, randomized, parallel-group study comparing
    ramipril to placebo in stable patients, 2 to 9 days after an acute myocardial infarction, who had shown clinical signs
    of congestive heart failure at any time after the myocardial infarction. Patients in severe (NYHA class IV) heart failure,
    patients with unstable angina, patients with heart failure of congenital or valvular etiology, and patients with contraindications
    to ACE inhibitors were all excluded. The majority of patients had received thrombolytic therapy at the time of the index
    infarction, and the average time between infarction and initiation of treatment was 5 days. Patients randomized to ramipril
    treatment were given an initial dose of 2.5 mg twice daily. If the initial regimen caused undue hypotension, the dose
    was reduced to 1.25 mg, but in either event doses were titrated upward (as tolerated) to a target regimen (achieved in
    77% of patients randomized to ramipril) of 5 mg twice daily. Patients were then followed for an average of 15 months,
    with the range of follow-up between 6 and 46 months. The use of ramipril was associated with a 27% reduction (p=0.002)
    in the risk of death from any cause; about 90% of the deaths that occurred were cardiovascular, mainly sudden death. The
    risks of progression to severe heart failure and of congestive heart failure-related hospitalization were also reduced,
    by 23% (p=0.017) and 26% (p=0.011), respectively. The benefits of ramipril therapy were seen in both genders, and they
    were not affected by the exact timing of the initiation of therapy, but older patients may have had a greater benefit
    than those under 65. The benefits were seen in patients on (and not on) various concomitant medications. At the time of
    randomization these included aspirin (about 80% of patients), diuretics (about 60%), organic nitrates (about 55%), beta-blockers
    (about 20%), calcium channel blockers (about 15%), and digoxin (about 12%).
  - Ramipril capsules are indicated for the treatment of hypertension. It may be used alone or in combination with thiazide
    diuretics. In using ramipril capsules, consideration should be given to the fact that another angiotensin converting enzyme
    inhibitor, captopril, has caused agranulocytosis, particularly in patients with renal impairment or collagen-vascular
    disease. Available data are insufficient to show that ramipril capsules do not have a similar risk. (See WARNINGS. In
    considering use of ramipril capsules, it should be noted that in controlled trials ACE inhibitors have an effect on blood
    pressure that is less in black patients than in non-blacks. In addition, ACE inhibitors (for which adequate data are available)
    cause a higher rate of angioedema in black than in non-black patients. (See WARNINGS, Angioedema.
  - 'Disease-modifying treatments (DMTs), which are the foundation of multiple sclerosis (MS) care, reduce clinical exacerbations
    (relapses) and slow disease progression; however, improving quality of life (QOL) is an unmet need for many individuals
    with MS. DMTs, including interferon-beta, glatiramer acetate, natalizumab, mitoxantrone, and fingolimod, reduce the rate
    and severity of relapses, the accumulation of brain and spinal cord lesions as shown on magnetic resonance imaging (MRI),
    and disability progression. Many studies link diminished QOL with specific MS symptoms (fatigue, impaired mobility, spasticity,
    etc). Even in patients already receiving DMTs, symptoms and QOL may improve with additional agents that treat specific
    symptoms, thereby improving patient function and ability to perform activities of daily living (ADLs). Patients have reported
    that mobility impairment is one of the worst aspects of MS. Almost half of patients treated with DMTs reported no improvement
    in mobility. However, blocking the voltage-dependent potassium channels on the surface of demyelinated nerve fibers may
    improve signal conduction. Dalfampridine, a potassium channel blocker, received Food and Drug Administration (FDA) approval
    for all forms of MS specifically to improve walking, which was demonstrated by increased walking speed. By improving walking
    in some patients with MS, the effects of dalfampridine may complement those of DMTs and address the stated priorities
    of many patients.

    (Am J Manag Care. 2011;17:S146-S153)

    MS Treatment and QOL

    Improving quality of life (QOL) is an unmet need for many individuals with multiple sclerosis (MS). Disease-modifying
    treatments (DMTs), which are the foundation of MS care,1 reduce clinical exacerbations (relapses) and slow disease progression.2
    QOL improvement, although assumed with fewer relapses, has not always been well documented.

    Treatment individualization can include additional agents that treat specific symptoms, improving patient function and
    ability to perform activities of daily living (ADLs).3 Because many symptom-specific treatments are available, MS treatment
    should address QOL at every stage of disease progression.

    Actions and Safety of DMTs

    DMTs reduce the rate and severity of relapses, the accumulation of brain and spinal cord lesions as shown on magnetic
    resonance imaging (MRI), and disability progression as measured by Expanded Disability Status Scale (EDSS).2 Controlled
    clinical trials demonstrated relapse rate reductions of 28% to 68%.2 However, relatively few DMT trials documented QOL
    improvement with QOL metrics. The National Multiple Sclerosis Society (NMSS) stated that DMTs “can be looked upon as an
    investment in the future,” rather than treatment that makes patients feel better now.2 Thus, clinicians may appreciate
    the effects of DMTs while some patients on DMT therapy continue to suffer treatable symptoms, poor QOL, and sometimes,
    adverse effects (AEs).

    Interferon-beta (IFNB) is a cytokine primarily secreted by fibroblasts as part of immune response4; recombinant DNA technology
    produces therapeutic IFNB agents.5 In MS, the IFNB mechanism seems to involve immunomodulatory effects mediated through
    interactions with specific cell-surface receptors.4 Whereas IFNB-1b is injected subcutaneously every other day, IFNB-1a
    is available in forms for intramuscular (weekly) and subcutaneous (3 times/week) injection.2 Four IFNB agents have received
    Food and Drug Administration (FDA) approval for relapsing forms of MS: interferon beta-1b (Betaseron) in 1993, interferon
    beta-1a (Avonex) in 1996, interferon beta-1a (Rebif) in 2002, and interferon beta-1b (Extavia) in 2009.2 Numerous randomized
    multicenter trials have demonstrated reduced rate and severity of relapses, delayed EDSS progression, and fewer MRI lesions
    with IFNB.4,5,6 Some patients develop neutralizing antibodies, potentially lessening efficacy over time.2,5

    The evidence for IFNB using QOL metrics is mixed. An early IFNB study incor'
