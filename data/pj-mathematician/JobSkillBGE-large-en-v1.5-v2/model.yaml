- source_sentence: 'Bus drivers, including those operating in various sectors like public transit, intercity, private, or
    school services, need strong driving skills, knowledge of traffic laws, and the ability to operate safely in diverse conditions.
    Additionally, effective communication skills and the ability to handle passenger inquiries and emergencies are crucial.

    [''bus driver'', ''intercity bus driver'', ''private bus operator'', ''transit bus driver'', ''public service vehicle
    operator'', ''passenger driver'', ''international bus driver'', ''public bus operator'', ''touristic bus driver'', ''coach
    driver'', ''private coach driver'', ''public bus driver'', ''bus operator'', ''driver of bus'', ''bus driving operator'',
    ''schoolbus driver'']'
  sentences:
  - 'The skill of determining shreds sizes percentage in cigarettes is primarily required by tobacco processing technicians
    and quality control specialists in the cigarette manufacturing industry, who ensure that the tobacco shreds meet specific
    size and quality standards for consistent product performance.

    [''determine shreds sizes percentage in cigarettes'', ''determine shreds sizes percentage in cigarettes'', ''determine
    the shreds sizes percentage of cigarettes'', ''determine shreds size percentages in cigarettes'', ''agree shreds sizes
    percentage in cigarettes'', ''determine the shreds sizes percentage in cigarettes'', ''confirm shreds sizes percentage
    in cigarettes'', ''sort shreds sizes percentage in cigarettes'']'
  - 'Job roles such as curriculum developers, educational consultants, and instructional designers require skills like analyzing,
    evaluating, and scrutinizing curriculums to improve educational outcomes. For legislative programmes, roles including
    policy analysts, legislative aides, and compliance officers use skills to test, evaluate, and scrutinize legislative processes
    to ensure effective and efficient policy implementation.

    [''analyse curriculum'', ''test legislative programmes'', ''evaluate legislative programmes'', ''evaluate curriculum'',
    ''test curriculum'', ''investigate curriculum'', ''scrutinise curriculum'', ''analyze  curriculum'', ''scrutinise legislative
    processes'', ''investigate legislative programmes'']'
  - 'Job roles such as customer service representatives, flight attendants, and hotel concierges require a strong focus on
    passengers or customers, ensuring their needs and comfort are prioritized to provide excellent service and support.

    [''focus on passengers'', ''prioritise passengers'', ''ensure passenger prioritisation'', ''make passengers a priority'',
    ''maintain a focus on passengers'', ''ensure passengers are the priority focus'', ''ensure passengers are prioritised'',
    ''attend to passengers'', ''ensure a focus on passengers'']'
- source_sentence: 'A medical laboratory assistant, or any of its synonyms such as a biomedical laboratory assistant, requires
    strong attention to detail, proficiency in using laboratory equipment, and a foundational understanding of medical science.
    Additionally, skills in sample handling, data recording, and basic research methodologies are crucial for roles like a
    clinical research assistant or an assistant in medical laboratory.

    [''medical laboratory assistant'', ''medical laboratory research assistant'', ''biomedical laboratory assistant'', ''clinical
    research assistant'', ''assistant in medical laboratory'', ''biomedical laboratory research assistant'', ''assistant clinical
    researcher'', ''medical lab assistant'', ''assistant in biomedical laboratory'']'
  sentences:
  - 'Job roles such as automotive mechanics, fleet managers, and vehicle technicians require skills to ensure vehicle operability
    and regular maintenance, which involves diagnosing and repairing issues to keep vehicles roadworthy and operational.

    [''ensure vehicle operability'', ''keep vehicle roadworthy'', ''keep vehicle operational'', ''ensure operability of the
    vehicle'', ''ensure vehicle remains operational'', ''ensure maintenance of vehicle'', ''ensure regular vehicle maintenance'',
    ''ensure operation of the vehicle'', ''ensure operability'']'
  - 'The skill of classroom management is primarily required by teachers and educators at all levels, from kindergarten to
    higher education, to ensure a productive, safe, and organized learning environment. It involves maintaining discipline,
    organizing space and materials, and facilitating effective instruction, roles that are crucial for teaching assistants
    and substitute teachers as well.

    [''perform classroom management'', ''performing classroom management'', ''conduct classroom management'', ''practice classroom
    management'', ''carry out classroom management'', ''implement classroom management'', ''performs classroom management'']'
  - 'Job roles requiring expertise in stem cells, including embryonic and adult stem cells, typically include stem cell researchers,
    regenerative medicine scientists, and biomedical engineers who focus on the development and application of stem cell technologies
    for therapeutic purposes. Additionally, clinical researchers and medical practitioners in specialized fields such as oncology
    and hematology may utilize knowledge of stem cells for treatment and research purposes.

    [''stem cells'', ''undifferentiated biological cells'', ''embryonic stem cells'', ''development of stem cells'', ''stem
    cell'', ''adult stem cells'', ''stem cells'']'
- source_sentence: 'For roles such as ''physiotherapist'', ''neuromusculoskeletal physiotherapist'', ''osteopath'', and ''chiropractor'',
    the skills needed include a deep understanding of human anatomy and physiology, strong diagnostic skills, and the ability
    to apply manual therapy techniques to treat musculoskeletal issues. Additionally, effective communication skills are crucial
    for explaining treatments and exercises to patients, while adaptability and problem-solving skills are essential for tailoring
    treatments to individual patient needs.

    [''physiotherapist'', ''neuromusculoskeletal physiotherapist'', ''osteopath'', ''eurythmy therapist'', ''respiratory therapist'',
    ''remedial physiotherapist'', ''physiotherapist manager'', ''occupational therapist'', ''neurological physiotherapist'',
    ''occupational physiotherapist'', ''bobath physiotherapist'', ''neuromuscular physiotherapist'', ''manipulative physiotherapist'',
    ''hydrotherapist'', ''rehabilitation therapist'', ''masseuse'', ''health promotion worker'', ''cardiovascular physiotherapist'',
    ''respiratory physiotherapist'', ''chiropractor'', ''sports physiotherapist'', ''chiropractic therapist'', ''neurodevelopmental
    physiotherapist'', ''physical therapist'', ''health and well-being therapist'', ''business physiotherapist'']'
  sentences:
  - 'Job roles that require skills in dealing with emergency care situations include emergency medical technicians (EMTs),
    paramedics, and emergency room nurses or doctors, all of whom must quickly and effectively manage critical health situations
    to save lives.

    [''deal with emergency care situations'', ''deal with emergency care situation'', ''handle emergency care situation'',
    ''apply knowledge in emergency care situations'', ''handle emergency care situations'']'
  - 'Job roles such as fashion designers, stylist coordinators, and jewelry designers require the skill to distinguish and
    evaluate accessories, their differences, and applications, to ensure the right aesthetic and functional fit for their
    designs or clients. This skill is crucial for creating cohesive looks and enhancing the overall visual appeal in fashion
    and design industries.

    [''distinguish accessories'', ''evaluate accessories and their differences'', ''evaluate accessories and their application'',
    ''differentiate accessories'', ''distinguish accessories and their application'', ''distinguish differences in accessories'']'
  - 'Job roles that require expertise in curriculum objectives include educational consultants, curriculum developers, and
    instructional designers, who are tasked with creating and refining educational content and learning goals to meet specific
    educational standards and student needs. Teachers and headteachers also utilize these skills to align their teaching methods
    and materials with the set educational targets and aims.

    [''curriculum objectives'', ''curriculum objective'', ''curriculum goals'', ''curriculum targets'', ''curriculum aims'',
    ''curricula objectives'']'
- source_sentence: 'A mine surveyor, also known as a mining surveyor or mine planning surveyor, requires expertise in geomatics
    and mining engineering to accurately map and plan mine operations, ensuring safety and efficiency. They must also possess
    strong analytical skills and the ability to use specialized software for creating detailed mine plans and maintaining
    accurate records.

    [''mine surveyor'', ''mining surveyor'', ''mine operations surveyor'', ''mine plan maker'', ''mine records keeper'', ''mine
    surveyors'', ''planner of mining operations'', ''mine planning surveyor'']'
  sentences:
  - 'Job roles such as data analysts, business analysts, and financial analysts require the skill to present reports or prepare
    statistical reports, as they often need to communicate complex data insights clearly and effectively to stakeholders.

    [''present reports'', ''present a report'', ''submit presentation'', ''prepare statistical reports'']'
  - 'Job roles such as Food Safety Manager, Quality Assurance Specialist, and Public Health Inspector require the skill of
    developing food safety programs to ensure compliance with regulations and maintain high standards of food safety in various
    settings including manufacturing, retail, and public health sectors.

    [''develop food safety programmes'', ''creating food safety programmes'', ''develop programmes for food safety'', ''food
    safety programmes creating'', ''food safety programmes developing'', ''develop food safety programs'', ''food safety programme
    developing'', ''food safety programme creating'', ''create food safety programmes'', ''create programmes for food safety'',
    ''developing food safety programmes'']'
  - 'The skill of using a sander, whether it be a handheld, manual, automatic, or drywall sander, is primarily required by
    construction workers, carpenters, and drywall installers for tasks such as roughening and smoothing wall surfaces to prepare
    them for painting or finishing.

    [''use sander'', ''use handheld sander'', ''roughening of wall surfaces'', ''use drywall sander'', ''sanding of wall surfaces'',
    ''using sander'', ''sander usage'', ''use manual sander'', ''drywall sanding'', ''use automatic sander'']'
- source_sentence: 'An insulation supervisor, regardless of the specific type of insulation material or installation area,
    requires strong project management skills, knowledge of building codes and safety regulations, and expertise in insulation
    techniques to oversee the installation process effectively and ensure quality standards are met.

    [''insulation supervisor'', ''supervisor of installation of insulating materials'', ''supervisor of insulation materials
    installation'', ''supervisor of installation of insulation'', ''solid wall insulation installation supervisor'', ''insulation
    installers supervisor'', ''cavity wall insulation installation supervisor'', ''loft insulation installation supervisor'']'
  sentences:
  - 'Job roles such as Food Safety Inspector, Public Health Officer, and Environmental Health Specialist require the skill
    of taking action on food safety violations to ensure compliance with health regulations and maintain public safety standards.

    [''take action on food safety violations'', ''invoke action on food safety violations'', ''agree action on food safety
    violations'', ''pursue action on food safety violations'', ''determine action on food safety violations'']'
  - 'Job roles that require skills in operating and supervising textile printing machines include Textile Printer Operators,
    Printing Machine Technicians, and Textile Production Specialists. These roles involve setting up, running, and maintaining
    printing machinery to ensure high-quality textile printing.

    [''tend textile printing machines'', ''activate and supervise printing machines for textile material'', ''activate and
    supervise textile printing machines'', ''tend printing machines for textile'', ''tend printing machines for textile material'',
    ''care for textile printing machines'', ''operate printing machines for textile material'', ''operate textile printing
    machines'']'
  - 'The skill of installing insulation material is primarily required by job roles such as insulation workers, HVAC technicians,
    and construction specialists, who are responsible for improving energy efficiency and thermal comfort in buildings by
    correctly fitting and fixing insulation materials in various structures.

    [''install insulation material'', ''insulate structure'', ''fix insulation'', ''insulation material installation'', ''installation
    of insulation material'', ''fitting insulation'', ''insulating structure'', ''installing insulation material'', ''fixing
    insulation'', ''fit insulation'']'
