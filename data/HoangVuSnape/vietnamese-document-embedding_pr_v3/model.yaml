  - 'xiv. Khoa tiếng Nhật


    1. CHẤT LƯỢNG ĐÀO TẠO


    ĐÀO TẠO CỬ NHÂN (4 NĂM)


    2.CHẤT LƯỢNG GIẢNG VIÊN


    ĐỘI NGŨ GIẢNG VIÊN: 8


    Tiến sĩ: 1


    Thạc sĩ: 5


    Cử nhân: 2


    3. MỤC TIÊU ĐÀO TẠO


    Đào tạo cử nhân ngôn ngữ Nhật, có phẩm chất chính trị, đạo đức và sức khỏe tốt, hiểu và vận dụng các tri thức cơ bản về
    ngôn ngữ tiếng Nhật. Sau khi tốt nghiệp, người học có đủ năng lực để làm việc ở các cơ quan, tổ chức, các công ty, doanh
    nghiệp yêu cầu chuẩn về kỹ năng sử dụng tiếng Nhật đáp ứng những yêu cầu của xã hội và của nền kinh tế trong quá trình
    hội nhập quốc tế. 4. CÁC NGÀNH ĐÀO TẠO


    ĐẠI HỌC


    Cử nhân Ngôn ngữ Nhật


    xv. Khoa tiếng Hàn Quốc


    1. CHẤT LƯỢNG ĐÀO TẠO


    ĐÀO TẠO CỬ NHÂN (4 NĂM)


    TUYỂN SINH:


    2016 - 2017: 150 SV


    2017 - 2018: 195 SV


    2018 - 2019: 120 SV


    2019 - 2020: 54 SV


    2021 - 2022: 120 SV


    2022 - 2023: 88 SV


    Song ngành: 20 SV


    2. CHẤT LƯỢNG GIẢNG VIÊN


    ĐỘI NGŨ GIẢNG VIÊN: 6


    Tiến sĩ: 1


    Thạc sĩ: 4


    Cử nhân: 1


    3. MỤC TIÊU ĐÀO TẠO


    Đào tạo cử nhân ngôn ngữ Hàn Quốc, có phẩm chất chính trị, đạo đức và sức khỏe tốt, hiểu và vận dụng các tri thức cơ bản
    về ngôn ngữ tiếng Hàn Quốc - định hướng biên phiên dịch. Sau khi tốt nghiệp, người học có đủ năng lực để làm việc ở các
    cơ quan, tổ chức, các công ty, doanh nghiệp yêu cầu chuẩn về kỹ năng sử dụng tiếng Hàn Quốc đáp ứng những yêu cầu của
    xã hội và của nền kinh tế trong quá trình hội nhập quốc tế. Đào tạo cử nhân ngôn ngữ Hàn Quốc chuyên ngành Du lịch, có
    phẩm chất chính trị, đạo đức và sức khỏe tốt, hiểu và vận dụng các tri thức cơ bản về ngôn ngữ Hàn Quốc ngành Du lịch.
    Sau khi tốt nghiệp, người học có đủ năng lực để làm việc ở các cơ quan, tổ chức, các công ty, doanh nghiệp yêu cầu chuẩn
    về công việc du lịch và các công việc có liên quan đáp ứng những yêu cầu của xã hội và của nền kinh tế trong quá trình
    hội nhập quốc tế.'
