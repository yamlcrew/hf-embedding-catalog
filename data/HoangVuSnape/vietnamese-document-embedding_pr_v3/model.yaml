      2007 - 2015: 464 Cử nhân Sử - GDQP


      ĐÀO TẠO CAO HỌC (2 NĂM)


      Bắt đầu đào tạo Thạc sĩ từ 1999


      ThS Lịch sử Việt Nam và ThS Lịch sử thế giới


      TUYỂN SINH: 20 - 25 HV/năm


      2016 - 2017: 09 HV


      ĐÀO TẠO TIẾN SĨ


      Tiến sĩ Lịch sử Việt Nam


      TUYỂN SINH: 5 - 10 NCS/năm


      2017- 2018: 15 NCS


      2. CHẤT LƯỢNG GIẢNG VIÊN


      SỐ LƯỢNG GIẢNG VIÊN: 22


      SỐ LƯỢNG CHUYÊN VIÊN: 02


      PGS.TS: 01


      Tiến sĩ: 12


      Thạc sĩ: 09


      3. MỤC TIÊU ĐÀO TẠO


      Đào tạo Cử nhân Sư phạm Lịch sử đáp ứng yêu cầu về phẩm chất, năng lực đối với giáo viên Lịch sử, bao gồm: có phẩm chất
      chính trị và đạo đức nghề nghiệp, có kiến thức hệ thống, toàn diện về khoa học Lịch sử và phương pháp dạy học Lịch sử,
      có năng lực thích ứng, sáng tạo, tự bồi dưỡng phát triển chuyên môn theo yêu cầu của ngành giáo dục và của xã hội. Đào
      tạo Cử nhân Quốc tế học có phẩm chất chính trị, đạo đức tốt, có kiến thức vững chắc về ngành học để đáp ứng nhu cầu
      công tác trong các cơ quan, tổ chức chuyên về hoạt động đối ngoại của nhà nước, trong các công ty đa quốc gia hoặc các
      tổ chức phi chính phủ; đồng thời có khả năng thích ứng cao trong bối cảnh hội nhập quốc tế và khu vực.'
    - 'Kết quả được công bố trước kỳ thi tốt nghiệp THPT. Cách thức đăng ký: Thí sinh đăng ký trực tuyến thông qua hệ thống
      website của trường và nộp hồ sơ theo thông báo tuyển sinh theo quy định. 1.2 Phương thức 2: Xét tuyển kết hợp Chứng
      chỉ ngoại ngữ quốc tế và kết quả học tập/chứng chỉ năng lực quốc tế dành cho thí sinh hệ chuyên và hệ không chuyên


      Đối tượng xét tuyển: Thí sinh thuộc 1 trong 3 đối tượng sau:


      Đối tượng 1: Thí sinh thuộc hệ chuyên, lớp chuyên Toán – Tin, Lý, Hóa, Văn và Ngoại ngữ của các trường THPT trọng điểm
      quốc gia/chuyên. Đối tượng 2: Thí sinh hệ không chuyên; hoặc hệ chuyên lớp chuyên (khác với các tổ hợp môn xét tuyển
      của Nhà trường). Đối tượng 3: Thí sinh (hệ chuyên và không chuyên) có các chứng chỉ năng lực quốc tế SAT, ACT hoặc A-level.
      Lưu ý: Áp dụng cho các chương trình giảng dạy bằng tiếng Anh và các chương trình Chất lượng cao Ngôn ngữ thương mại.
      Thời gian tuyển sinh: Dự kiến từ 22/5 – 31/5/2023. Kết quả được công bố trước kỳ thi tốt nghiệp THPT. Cách thức đăng
      ký: Thí sinh đăng ký trực tuyến thông qua hệ thống website của trường và nộp hồ sơ theo thông báo tuyển sinh của Nhà
      trường. 1.3 Phương thức 3: Xét tuyển kết hợp Chứng chỉ ngoại ngữ quốc tế và kết quả thi tốt nghiệp THPT năm 2023


      Áp dụng cho: Các chương trình giảng dạy bằng tiếng Anh và Ngôn ngữ thương mại. Thời gian tuyển sinh: Dự kiến cuối tháng
      7/2023, ngay sau khi có kết quả thi tốt nghiệp THPT năm 2023. Cách thức đăng ký: Thí sinh đăng ký trực tuyến thông qua
      hệ thống website của trường và nộp hồ sơ theo thông báo tuyển sinh của Nhà trường. 1.4 Phương thức 4: Xét tuyển dựa
      trên kết quả thi tốt nghiệp THPT năm 2023


      Áp dụng cho: Các chương trình tiêu chuẩn và định hướng nghề nghiệp quốc tế.'
    - 'Ứng dụng hạt nhân: Tìm hiểu về ứng dụng năng lượng hạt nhân, y học hạt nhân, và xử lý chất thải hạt nhân trong công
      nghiệp. Kỹ thuật đo lường: Các kỹ thuật đo đạc, phân tích phóng xạ, và các ứng dụng trong nghiên cứu khoa học. Vật lý
      Y khoa


      Mã tuyển sinh: 7520403


      Tổ hợp xét tuyển: A00; A01; A02; D90


      Thông tin liên hệ:


      Địa chỉ: Trường Đại học Khoa học Tự nhiên TP.HCM, 227 Nguyễn Văn Cừ, Quận 5, TP.HCM


      Điện thoại: (028) 38 585 726


      Email: tuyensinh@hcmus.edu.vn


      Website: https://www.hcmus.edu.vn


      TỔNG QUAN CHƯƠNG TRÌNH


      Chương trình đào tạo ngành Vật lý Y khoa tại Trường Đại học Khoa học Tự nhiên TP.HCM cung cấp cho sinh viên kiến thức
      nền tảng về vật lý, sinh học và y học, đặc biệt là các ứng dụng vật lý trong y tế. Sinh viên sẽ được trang bị kiến thức
      về các thiết bị y tế như máy chụp X-quang, máy cộng hưởng từ (MRI), máy cắt lớp vi tính (CT), và các phương pháp điều
      trị bằng tia xạ. Chương trình học kết hợp lý thuyết với thực hành để sinh viên có thể ứng dụng các kiến thức trong các
      môi trường y tế thực tế. CƠ SỞ VẬT CHẤT CHẤT LƯỢNG CAO


      Trường sở hữu các phòng thí nghiệm hiện đại chuyên về vật lý y khoa, với các thiết bị y tế tiên tiến phục vụ cho việc
      học tập và nghiên cứu. Các phòng thí nghiệm này cung cấp cơ hội cho sinh viên thực hành với các thiết bị như máy chụp
      X-quang, CT, MRI và các thiết bị điều trị ung thư bằng tia xạ. CÁC ĐIỂM ĐẶC BIỆT


      Chương trình học kết hợp lý thuyết và thực hành: Sinh viên không chỉ học lý thuyết mà còn được thực hành trên các thiết
      bị y tế hiện đại trong các bệnh viện và cơ sở y tế. Liên kết với các bệnh viện và cơ sở y tế: Trường có các mối quan
      hệ hợp tác với các bệnh viện lớn, giúp sinh viên có cơ hội thực tập và nghiên cứu tại các cơ sở y tế có ứng dụng vật
      lý y khoa. Cơ hội du học và học bổng: Sinh viên có thể tham gia các chương trình trao đổi sinh viên và nhận học bổng
      du học thạc sĩ, tiến sĩ tại các trường đại học nổi tiếng trên thế giới. TRIỂN VỌNG NGHỀ NGHIỆP & CƠ HỘI VIỆC LÀM


      Sinh viên tốt nghiệp ngành Vật lý Y khoa có thể làm việc trong các lĩnh vực như:


      Các bệnh viện, phòng khám và cơ sở y tế: Vật lý gia trong các bệnh viện và phòng khám sử dụng thiết bị y tế như X-quang,
      CT, MRI, và các phương pháp điều trị tia xạ.'
  - source_sentence: Các phương thức xét tuyển vào Trường Đại học Sư phạm TP Hồ Chí Minh năm 2022 là gì?
