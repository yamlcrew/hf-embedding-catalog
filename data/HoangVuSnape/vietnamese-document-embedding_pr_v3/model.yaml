  - source_sentence: Ngành Kỹ thuật Trắc địa – Bản đồ là gì và sinh viên sẽ được trang bị những kỹ năng nào?
    sentences:
    - 'Triển vọng việc làm


      Các công ty xây dựng, nhà thầu xây dựng và các công ty tư vấn về xây dựng. Các cơ quan, tổ chức quản lý nhà nước liên
      quan đến xây dựng, phát triển hạ tầng và đô thị. Các công ty tài chính, ngân hàng và các tổ chức cho vay đầu tư vào
      các dự án xây dựng. Các công ty cung cấp dịch vụ quản lý dự án và tư vấn xây dựng. KỸ THUẬT XÂY DỰNG CÔNG TRÌNH GIAO
      THÔNG


      Thông tin tuyển sinh:


      Website: http://www.dce.hcmut.edu.vn/


      Mã tuyển sinh: 115 (Chương trình tiêu chuẩn), 215 (Chương trình giảng dạy bằng tiếng Anh)


      Ngành Kỹ thuật Xây dựng Công trình Giao thông có 01 chuyên ngành : Cầu đường. KỸ THUẬT TRẮC ĐỊA – BẢN ĐỒ


      Website: http://www.dce.hcmut.edu.vn/


      Ngành Kỹ thuật Trắc địa – Bản đồ thuộc Khoa Kỹ thuật Xây dựng. TỔNG QUAN CHƯƠNG TRÌNH


      Ngành Kỹ thuật Trắc địa – Bản đồ bao gồm Khoa học và công nghệ về việc thu thập, phân tích và biễu diễn các thông tin
      không gian (dựa trên Trái đất). Nó bao gồm những ứng dụng thú vị như định vị vệ tinh, viễn thám, trắc địa, địa chính
      và hệ thông tin địa lý. Kỹ thuật Trắc địa – Bản đồ là một trong những ngành khoa học thông tin phát triển nhanh nhất
      ở Việt Nam và khắp thế giới. Chương trình sẽ đào tạo thành những kỹ sư có tay nghề cao, có năng lực thiết kế và tổ chức
      thi công các công trình định vị chính xác cao bằng những kỹ thuật hiện đại như toàn đạc điện tử và các hệ thống định
      vị bằng vệ tinh; công trình thành lập bản đồ địa hình, địa chính và chuyên đề dưới dạng số bằng phương pháp toàn đạc,
      trắc lượng ảnh, viễn thám và biên tập; công trình thành lập và vận hành các hệ thống thông tin địa lý; các công tác
      trắc địa phục vụ xây dựng công trình.'
