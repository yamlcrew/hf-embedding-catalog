    Lĩnh vực: Kinh tế


    Địa chỉ: Số 15 Đường D5, Khu Văn Thánh Bắc, Phường 25, Quận Bình Thạnh, TP Hồ Chí Minh


    Điện thoại:


    Email:


    Website: http://cs2.ftu.edu.vn/


    Fanpage: https://www.facebook.com/ftu2hcmc/


    Lịch sử


    1962


    Ngày 20/06/1962, theo Quyết định của Thủ tướng Chính phủ, Khoa Quan hệ Quốc tế tách khỏi Trường Đại học Kinh tế - Tài
    chính để thành lập Trường Cán bộ Ngoại giao - Ngoại thương trực thuộc Bộ Ngoại giao. Trụ sở ban đầu được đặt tại làng
    Láng, tỉnh Hà Đông (nay là phường Láng Thượng, Hà Nội). 1967


    Ngày 05/08/1967, theo đề nghị của Bộ Ngoại giao và Bộ Ngoại thương, Thủ tướng Phạm Văn Đồng đã ký Quyết định số 123/CP,
    chia tách Trường Cán bộ Ngoại giao - Ngoại thương thành hai trường:


    Trường Ngoại giao (nay là Học viện Ngoại giao) trực thuộc Bộ Ngoại giao. Trường Ngoại thương thuộc Bộ Ngoại thương (nay
    là Bộ Công Thương). 1985


    Trường Đại học Ngoại thương chuyển từ Bộ Ngoại thương sang trực thuộc Bộ Đại học và Trung học Chuyên nghiệp (nay là Bộ
    Giáo dục và Đào tạo). 1993


    Ngày 16/07/1993, xuất phát từ nhu cầu đào tạo cán bộ kinh tế và kinh doanh quốc tế tại Thành phố Hồ Chí Minh và các tỉnh
    thành phía Nam, Cơ sở II Trường Đại học Ngoại thương tại TP.'
  - 'Điểm xét tuyển được làm tròn đến 02 chữ số thập phân. - Điểm xét tuyển được xác định như sau (làm tròn đến 02 chữ số
    thập phân): Điểm xét tuyển = [(ĐM1*HS môn 1+ ĐM2*HS môn 2 + ĐM3 * HS môn 3)*3]/(Tổng hệ số) + Điểm ưu tiên Khu vực + Điểm
    ưu tiên đối tượng. (*) Điểm trúng tuyển ngành Luật, Luật kinh tế: tổ hợp Văn, Sử, Địa cao hơn 1.5 điểm. (1) Ngành ngôn
    ngữ Anh, ngôn ngữ Trung Quốc, ngôn ngữ Nhật, ngôn ngữ Hàn Quốc: Ngoại ngữ nhân hệ số 2. (2) Các ngành Khoa học máy tính,
    Khoa học máy tính Chất lượng cao, Công nghệ thông tin, CTKT công trình xây dựng, CNKT công trình xây dựng Chất lượng cao,
    Quản lý xây dựng: Toán nhân hệ số 2. (3) Các ngành Chất lượng cao: Luật kinh tế, Ngôn ngữ Anh, Ngôn ngữ Trung Quốc, Quản
    trị kinh doanh, Tài chính ngân hàng, Kế toán: Ngoại ngữ hệ số 2. VII.Điểm chuẩn Trường ĐH Mở TP.HCM năm 2021 dựa vào kết
    quả học tập THPT(học bạ)


