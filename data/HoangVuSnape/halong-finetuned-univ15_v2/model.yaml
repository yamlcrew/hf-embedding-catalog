    - 'THÔNG TIN TUYỂN SINH Đại học Sư phạm Kỹ thuật TP.HCM


      . Thông tin chung


      1. Thời gian xét tuyển


      Theo lịch tuyển sinh chung của Bộ GD&ĐT và kế hoạch tuyển sinh của trường công bố cụ thể trên website. 2. Đối tượng
      tuyển sinh


      Thí sinh đã tốt nghiệp THPT. 3. Phạm vi tuyển sinh


      Tuyển sinh trong cả nước. 4. Phương thức tuyển sinh


      4.1. Phương thức xét tuyển


      Phương thức 1: Xét tuyển học bạ THPT. Phương thức 2: Xét tuyển thí sinh theo kết quả điểm thi tốt nghiệp THPT năm 2024
      theo các tổ hợp môn xét tuyển từng ngành học. Phương thức 3: Xét tuyển thẳng, ưu tiên xét tuyển thẳng. 4.2. Ngưỡng đảm
      bảo chất lượng đầu vào, điều kiện nhận ĐKXT


      Phương thức xét tuyển bằng điểm thi THPT 2024: thí sinh phải tốt nghiệp THPT và thỏa điều kiện ngưỡng đảm bảo chất lượng
      đầu vào của Trường. Thông báo ngưỡng đảm bảo sau khi thí sinh có kết quả thi THPT. Phương thức xét tuyển bằng học bạ
      THPT tốt nghiệp (tốt nghiệp THPT 2024): thí sinh tốt nghiệp THPT và điểm trung bình học bạ mỗi môn học theo tổ hợp đăng
      ký xét tuyển từ 5,0 trở lên. Hồi đồng thi tuyển uy quyền cho những thành viên thường trực Hội đồng tuyển sinh quyết
      định điểm trúng tuyển các phương thức xét. Điềm chuẩn ngành Sư phạm tiếng Anh theo các phương thức xét tuyển sớm sẽ
      được điều chỉnh khi có chỉ tiêu được giao của Bộ GD&ĐT. 4.3.'
    - '4. CÁC NGÀNH ĐÀO TẠO


      a. ĐẠI HỌC


      Cử nhân Sư phạm Tin học


      Cử nhân Công nghệ Thông tin


      b. SAU ĐẠI HỌC


      Thạc sĩ Khoa học máy tính


      vii. Khoa Vật lý


      1. CHẤT LƯỢNG ĐÀO TẠO


      ĐÀO TẠO CỬ NHÂN (4 NĂM)


      CN Sư phạm Vật lý, CN Vật lý học


      CN Sư phạm Công nghệ


      TUYỂN SINH: 100 - 150 SV


      ĐÀO TẠO CAO HỌC (2 NĂM)


      Bắt đầu đào tạo Thạc sĩ từ 1999


      ThS Lý luận và phương pháp dạy học bộ môn Vật lý


      ThS Vật Lý Nguyên tử và hạt nhân


      TUYỂN SINH: 15 - 25 HV/năm


      2. CHẤT LƯỢNG GIẢNG VIÊN


      ĐỘI NGŨ GIẢNG VIÊN: 35


      Giảng viên: 35


      Giáo sư : 1


      Phó Giáo sư Tiến sĩ: 4


      Tiến sĩ: 17


      Thạc sĩ: 10


      Cử nhân: 3


      3. MỤC TIÊU ĐÀO TẠO


      Đào tạo cử nhân Vật lý học, có phẩm chất chính trị, đạo đức và sức khỏe tốt, hiểu và vận dụng các tri thức cơ bản của
      Vật lý học theo định hướng chuyên ngành. Sau khi tốt nghiệp, người học có đủ năng lực để làm việc trong môi trường nghiên
      cứu, sản xuất kinh doanh có sử dụng kiến thức Vật lý học cũng như có thể tiếp tục theo các bậc học cao hơn. Đào tạo
      giáo viên có trình độ cử nhân Sư phạm Vật lý (hệ chính quy, chính quy địa phương, hệ chuyên tu, tại chức). Sau khi tốt
      nghiệp, người học có phẩm chất chính trị, đạo đức và sức khỏe tốt, hiểu và vận dụng các tri thức cơ bản của Vật lý học,
      lý luận và phương pháp giảng dạy Vật lý ở trường trung học. Đào tạo giáo viên dạy Công nghệ bậc Trung học cơ sở và Trung
      học phổ thông. Sau khi tốt nghiệp, người học có phẩm chất chính trị, đạo đức và sức khỏe tốt, hiểu và vận dụng các tri
      thức khoa học, công nghệ nền tảng vào trong dạy học môn Công nghệ ở trường phổ thông. Sau khi tốt nghiệp, người học
      có đủ năng lực để làm việc trong môi trường nghiên cứu, sản xuất kinh doanh có sử dụng kiến thức khoa học, công nghệ
      cũng như có thể tiếp tục theo các bậc học cao hơn.'
