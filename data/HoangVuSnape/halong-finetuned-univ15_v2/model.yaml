  - 'Đại học Kinh tế Thành phố Hồ Chí Minh (UEH)


    Đại học Kinh tế Thành phố Hồ Chí Minh (tiếng Anh: University of Economics Ho Chi Minh City – UEH), còn được gọi là Đại
    học UEH, là một đại học công lập đa ngành trực thuộc Bộ Giáo dục và Đào tạo. UEH nằm trong nhóm các trường đại học trọng
    điểm quốc gia, dẫn đầu trong đào tạo khối ngành kinh tế tại Việt Nam. UEH không chỉ là một trụ cột quan trọng trong hệ
    thống giáo dục bậc cao mà còn là trung tâm nghiên cứu các chính sách kinh tế và quản lý cho chính phủ cùng các doanh nghiệp
    lớn. UEH đã đào tạo nhiều lãnh đạo cấp cao cho các tập đoàn đa quốc gia nổi tiếng trong và ngoài nước. Lịch sử hình thành
    và phát triển


    1976: Thành lập với tên gọi Trường Đại học Kinh tế trực thuộc Bộ Đại học và Trung học chuyên nghiệp. 1996: Sáp nhập với
    hai đơn vị khác, trở thành Trường Đại học Kinh tế trực thuộc Đại học Quốc gia Thành phố Hồ Chí Minh. 2000: Tách ra khỏi
    Đại học Quốc gia Thành phố Hồ Chí Minh, trở thành Trường Đại học Kinh tế Thành phố Hồ Chí Minh trực thuộc Bộ Giáo dục
    và Đào tạo. 2021: Tái cấu trúc, thành lập các trường thành viên và định hướng phát triển thành đại học đa ngành, đa lĩnh
    vực. 2023: Chính thức chuyển đổi thành Đại học Kinh tế Thành phố Hồ Chí Minh. Cơ sở vật chất và hoạt động


    Hiện nay, UEH sở hữu: - 10 cơ sở giảng dạy tại Thành phố Hồ Chí Minh.'
  - '4. CÁC NGÀNH ĐÀO TẠO


    a. ĐẠI HỌC


    Cử nhân Sư phạm Toán học (Hệ Chính quy, Hệ Vừa làm vừa học)


    b.SAU ĐẠI HỌC


    Thạc sĩ Toán giải tích


    Thạc sĩ Đại số và Lý thuyết số


    Thạc sĩ Hình học và Tôpô


    Thạc sĩ Lý luận và Phương pháp dạy học bộ môn Toán


    Tiến sĩ Toán Giải tích


    Tiến sĩ Hình học và Tôpô


    Tiến sĩ Lý luận và Phương pháp dạy học bộ môn Toán


    c. BỒI DƯỠNG


    Chuyên đề bồi dưỡng cho giáo viên tiểu học, trung học cơ sở và trung học phổ thông về phương pháp, kĩ thuật dạy học, nội
    dung dạy học, kiểm tra, đánh giá, ứng dụng công nghệ thông tin trong dạy học,…


    vi. Khoa Công nghệ Thông tin


    1. CHẤT LƯỢNG ĐÀO TẠO


    ĐÀO TẠO CỬ NHÂN (4 NĂM)


    Sư phạm Tin học: 90 – 100 SV/năm


    Công nghệ Thông tin: 180 – 200 SV/năm


    ĐÀO TẠO CAO HỌC (2 NĂM)


    Thạc sĩ Khoa học máy tính: 15-35 HV/ năm


    2. CHẤT LƯỢNG GIẢNG VIÊN


    ĐỘI NGŨ GIẢNG VIÊN: 24


    Tiến sĩ: 9


    Thạc sĩ: 15


    3. MỤC TIÊU ĐÀO TẠO


    Đào tạo giáo viên dạy Tin học bậc phổ thông có trình độ cử nhân Sư phạm Tin học, có phẩm chất chính trị, đạo đức và sức
    khỏe tốt, hiểu và vận dụng các tri thức cơ bản của Tin học; Lý luận và phương pháp giảng dạy Tin học ở trường trung học,
    tiểu học. Sau khi tốt nghiệp, người học có đủ năng lực để giảng dạy Tin học tại các trường trung học, tiểu học và một
    số cơ sở giáo dục tương đương. Đào tạo cử nhân Công nghệ thông tin, có phẩm chất chính trị, đạo đức và sức khỏe tốt, hiểu
    và vận dụng các tri thức cơ bản về khoa học máy tính. Sau khi tốt nghiệp, người học có đủ năng lực để làm việc trong môi
    trường các cơ sở sản xuất, các viện hoặc trung tâm nghiên cứu trong lĩnh vực Công nghệ thông tin cũng như có thể tiếp
    tục theo các bậc học cao hơn.'
