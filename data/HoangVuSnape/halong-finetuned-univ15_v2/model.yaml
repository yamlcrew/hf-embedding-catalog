    phải dự thi đánh giá năng lực tiếng Anh đầu khóa bằng Hệ thống đánh giá năng lực tiếng Anh theo chuẩn quốc tế của TDTU
    để được xác nhận đủ điều kiện tiếng Anh theo học chương trình. Ngoại lệ:


    Nếu tiếng Anh chưa đạt chuẩn B2, nhưng người học vẫn muốn học chương trình liên kết đào tạo quốc tế, thì được xét vào
    chương trình dự bị tiếng Anh (liên kết quốc tế) và phải tham gia học bổ túc tiếng Anh tại TDTU cho đến khi đạt trình độ
    tương đương chuẩn nói trên để được “quyết định nhập học và công nhận là sinh viên”. Thời gian học tiếng Anh tối đa là
    2 năm và tùy năng lực đầu vào qua kết quả đánh giá đầu vào xếp lớp của TDTU. Sau thời gian học chương trình dự bị tiếng
