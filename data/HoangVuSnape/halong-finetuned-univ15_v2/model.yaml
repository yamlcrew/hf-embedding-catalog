  - source_sentence: Những điểm đặc biệt của chương trình học là gì?
    sentences:
    - 'Các phòng thí nghiệm này giúp sinh viên thực hành và nghiên cứu các phản ứng hoá học, phân tích chất lượng sản phẩm
      và môi trường. CÁC ĐIỂM ĐẶC BIỆT


      Chương trình học thực tiễn: Sinh viên có cơ hội tham gia các nghiên cứu thực tế tại các phòng thí nghiệm của trường
      và các công ty, giúp họ phát triển các kỹ năng thực hành và nghiên cứu hoá học. Môi trường học tập quốc tế: Sinh viên
      có cơ hội tham gia các chương trình trao đổi sinh viên và hợp tác nghiên cứu với các đối tác quốc tế trong lĩnh vực
      hoá học. Học bổng và cơ hội du học: Các chương trình học bổng và cơ hội du học bậc thạc sĩ, tiến sĩ tại các trường đại
      học danh tiếng trên thế giới. TRIỂN VỌNG NGHỀ NGHIỆP & CƠ HỘI VIỆC LÀM


      Sinh viên tốt nghiệp ngành Hoá học có thể làm việc trong các lĩnh vực như:


      Công nghiệp hoá chất và dược phẩm: Làm việc tại các công ty sản xuất hoá chất, dược phẩm, sản xuất vật liệu và sản phẩm
      hoá học khác. Ngành thực phẩm và bảo vệ môi trường: Nghiên cứu và phát triển các sản phẩm thực phẩm, phân tích chất
      lượng thực phẩm, và xử lý chất thải hoá học trong công nghiệp.'
    - 'Trường Đại học Ngoại Thương Cơ sở II


      Tiếng Anh: Foreign Trade University Ho Chi Minh City Campus (FTU2) Trường Đại học Ngoại Thương cơ sở II là cơ sở đào
      tạo phía Nam của Trường Đại học Ngoại thương tại Hà Nội, đại học chuyên ngành kinh tế đầu ngành tại Việt Nam và thành
      viên của Bộ Giáo dục và Đào tạo. Cơ sở này được thành lập dựa trên nhu cầu đào tạo cán bộ trong lĩnh vực kinh tế và
      kinh doanh quốc tế tại các tỉnh thành phía Nam trong giai đoạn hội nhập kinh tế quốc tế. Cơ sở được thành lập theo Quyết
      định số 1485/GD-ĐT ngày 16/07/1993 của Bộ trưởng Bộ Giáo dục và Đào tạo Việt Nam. Tên trường: Trường Đại học Ngoại thương
      (Cơ sở 2)


      Tên tiếng Anh: Foreign Trade University (FTU)


      Mã trường: NTS


      Trực thuộc: Bộ Giáo dục và Đào tạo


      Loại trường: Công lập


      Loại hình đào tạo: Đại học – Sau đại học


      Lĩnh vực: Kinh tế


      Địa chỉ: Số 15 Đường D5, Khu Văn Thánh Bắc, Phường 25, Quận Bình Thạnh, TP Hồ Chí Minh


      Điện thoại:


      Email:


      Website: http://cs2.ftu.edu.vn/


      Fanpage: https://www.facebook.com/ftu2hcmc/


      Lịch sử


      1962


      Ngày 20/06/1962, theo Quyết định của Thủ tướng Chính phủ, Khoa Quan hệ Quốc tế tách khỏi Trường Đại học Kinh tế - Tài
      chính để thành lập Trường Cán bộ Ngoại giao - Ngoại thương trực thuộc Bộ Ngoại giao. Trụ sở ban đầu được đặt tại làng
      Láng, tỉnh Hà Đông (nay là phường Láng Thượng, Hà Nội). 1967


      Ngày 05/08/1967, theo đề nghị của Bộ Ngoại giao và Bộ Ngoại thương, Thủ tướng Phạm Văn Đồng đã ký Quyết định số 123/CP,
      chia tách Trường Cán bộ Ngoại giao - Ngoại thương thành hai trường:


      Trường Ngoại giao (nay là Học viện Ngoại giao) trực thuộc Bộ Ngoại giao. Trường Ngoại thương thuộc Bộ Ngoại thương (nay
      là Bộ Công Thương). 1985


      Trường Đại học Ngoại thương chuyển từ Bộ Ngoại thương sang trực thuộc Bộ Đại học và Trung học Chuyên nghiệp (nay là
      Bộ Giáo dục và Đào tạo). 1993


      Ngày 16/07/1993, xuất phát từ nhu cầu đào tạo cán bộ kinh tế và kinh doanh quốc tế tại Thành phố Hồ Chí Minh và các
      tỉnh thành phía Nam, Cơ sở II Trường Đại học Ngoại thương tại TP.'
    - 'Điểm xét tuyển được làm tròn đến 02 chữ số thập phân. - Điểm xét tuyển được xác định như sau (làm tròn đến 02 chữ số
      thập phân): Điểm xét tuyển = [(ĐM1*HS môn 1+ ĐM2*HS môn 2 + ĐM3 * HS môn 3)*3]/(Tổng hệ số) + Điểm ưu tiên Khu vực +
      Điểm ưu tiên đối tượng. (*) Điểm trúng tuyển ngành Luật, Luật kinh tế: tổ hợp Văn, Sử, Địa cao hơn 1.5 điểm. (1) Ngành
      ngôn ngữ Anh, ngôn ngữ Trung Quốc, ngôn ngữ Nhật, ngôn ngữ Hàn Quốc: Ngoại ngữ nhân hệ số 2. (2) Các ngành Khoa học
      máy tính, Khoa học máy tính Chất lượng cao, Công nghệ thông tin, CTKT công trình xây dựng, CNKT công trình xây dựng
      Chất lượng cao, Quản lý xây dựng: Toán nhân hệ số 2. (3) Các ngành Chất lượng cao: Luật kinh tế, Ngôn ngữ Anh, Ngôn
      ngữ Trung Quốc, Quản trị kinh doanh, Tài chính ngân hàng, Kế toán: Ngoại ngữ hệ số 2. VII.Điểm chuẩn Trường ĐH Mở TP.HCM
      năm 2021 dựa vào kết quả học tập THPT(học bạ)


      i.'
  - source_sentence: Nguyên tắc xét tuyển của Trường được áp dụng như thế nào khi thí sinh đăng ký nhiều nguyện vọng hoặc
      nhiều phương thức xét tuyển?
    sentences:
    - '4. Đối với phương thức kết hợp thi tuyển và xét tuyển


      4.1. Thí sinh dự xét tuyển ngành Giáo dục Mầm non trình độ đại học


      Phải tham gia kỳ thi năng khiếu do Trường Đại học Sư phạm Thành phố Hồ Chí Minh tổ chức và có kết quả đạt từ 5,0 điểm
      trở lên;


      Đối với thí sinh xét tuyển sử dụng kết quả thi tốt nghiệp THPT năm 2024: ngưỡng điểm đảm bảo chất lượng đầu vào, điều
      kiện nhận hồ sơ đăng ký xét tuyển được thông báo chính thức sau khi Bộ Giáo dục và Đào tạo xác định ngưỡng đảm bảo chất
      lượng đầu vào đại học (căn cứ kết quả kỳ thi tốt nghiệp THPT năm 2024). Đối với thí sinh xét tuyển sử dụng kết quả học
      tập THPT: chỉ áp dụng đối với thí sinh tốt nghiệp THPT năm 2024 đồng thời phải thỏa một trong hai điều kiện sau:


      + Có học lực lớp 12 xếp loại giỏi;


      + Có điểm xét tốt nghiệp THPT từ 8,0 trở lên. 4.2. Thí sinh dự xét tuyển ngành Giáo dục Mầm non trình độ cao đẳng


      Phải tham gia kỳ thi năng khiếu do Trường Đại học Sư phạm Thành phố Hồ Chí Minh tổ chức và có kết quả đạt từ 5,0 điểm
      trở lên;


      Đối với thí sinh xét tuyển sử dụng kết quả thi tốt nghiệp THPT năm 2024: ngưỡng điểm đảm bảo chất lượng đầu vào, điều
      kiện nhận hồ sơ đăng ký xét tuyển được thông báo chính thức sau khi Bộ Giáo dục và Đào tạo xác định ngưỡng đảm bảo chất
      lượng đầu vào đại học (căn cứ kết quả kỳ thi tốt nghiệp THPT năm 2024). Đối với thí sinh xét tuyển sử dụng kết quả học
      tập THPT: chỉ áp dụng đối với thí sinh tốt nghiệp THPT năm 2024 đồng thời phải thỏa một trong hai điều kiện sau:


      + Có học lực lớp 12 xếp loại khá;


      + Có điểm xét tốt nghiệp THPT từ 6,5 trở lên. 4.3. Thí sinh dự xét tuyển ngành Giáo dục Thể chất


      Phải tham gia kỳ thi năng khiếu do Trường Đại học Sư phạm Thành phố Hồ Chí Minh tổ chức và có kết quả đạt từ 5,0 điểm
      trở lên;


      Đối với thí sinh xét tuyển sử dụng điểm thi tốt nghiệp THPT năm 2024: ngưỡng điểm đảm bảo chất lượng đầu vào, điều kiện
      nhận hồ sơ đăng ký xét tuyển được thông báo chính thức sau khi Bộ Giáo dục và Đào tạo xác định ngưỡng đảm bảo chất lượng
      đầu vào đại học (căn cứ kết quả kỳ thi tốt nghiệp THPT năm 2024);


      Đối với thí sinh xét tuyển sử dụng kết quả học tập THPT: chỉ áp dụng đối với thí sinh tốt nghiệp THPT năm 2024 đồng
      thời thỏa thêm một trong các điều kiện sau:


      + Có học lực lớp 12 xếp loại khá trở lên;


      + Có điểm xét tốt nghiệp THPT từ 6,5 trở lên;


      + Là vận động viên cấp 1, kiện tướng, vận động viên đã từng đoạt huy chương tại Hội khỏe Phù Đổng, các giải trẻ quốc
      gia và quốc tế hoặc giải vô địch quốc gia và quốc tế có điểm thi năng khiếu do trường tổ chức đạt loại xuất sắc (từ
      9,0 trở lên theo thang điểm 10,0).'
    - 'Danh mục các ngành điều kiện nộp hồ sơ xét tuyển (xem tại đây). Quy định chứng chỉ tiếng Anh quốc tế tương đương (xem
      tại đây)


      6. Xét tuyển thẳng, ưu tiên xét tuyển theo Quy chế của Bộ GD&ĐT – Mã phương thức 301: Thực hiện theo quy định của Bộ
      GD&ĐT


      7. Các lưu ý khi đăng ký NVXT và nguyên tắc xét tuyển trên hệ thống Bộ


      a. Các lưu ý khi đăng ký NVXT


      Thí sinh nên tra cứu thông tin các nguyện vọng đăng ký xét tuyển vào TDTU theo phương thức riêng tại: https://tracuuxettuyen.tdtu.edu.vn
      trước khi đăng ký nguyện vọng lên hệ thống của Bộ GD&ĐT. Số CMND/CCCD thí sinh đã đăng ký xét tuyển trên hệ thống của
      TDTU; đăng ký phương thức 4 trên hệ thống của Đại học Quốc gia TP.HCM phải trùng khớp với số CMND/CCCD sử dụng đăng
      ký tài khoản trên hệ thống của Bộ GD&ĐT. Trường hợp thí sinh đã đăng ký số CMND/CCCD không trùng khớp nhau giữa các
      hệ thống trên, thí sinh phải liên hệ với TDTU để được hỗ trợ cập nhật lại số CMND/CCCD cho trùng khớp với hệ thống của
      Bộ trước khi đăng ký nguyện vọng. Thí sinh sẽ không đủ điều kiện xét tuyển nếu không sử dụng cùng 1 số CMND/CCCD đăng
      ký giữa các hệ thống trên. Thí sinh xét tuyển vào chương trình đại học bằng tiếng Anh, chương trình liên kết quốc tế
      nhưng không nộp chứng chỉ tiếng Anh theo quy định, không dự thi năng lực tiếng Anh hoặc dự thi năng lực tiếng Anh kết
      quả không đạt nếu đủ điểm trúng tuyển sẽ trúng tuyển vào chương trình dự bị tiếng Anh. Khi thí sinh làm thủ tục nhập
      học, Nhà trường sẽ tổ chức cho thí sinh thi đánh giá năng lực tiếng Anh. Nếu kết quả thi đánh giá năng lực của thí sinh
      đạt trình độ tiếng Anh theo yêu cầu của chương trình (B1 đối với chương trình đại học bằng tiếng Anh, B2 đối với chương
      trình liên kết đào tạo quốc tế) sẽ được nhập học vào chương trình chính thức. Trường hợp chưa đạt năng lực tiếng Anh
      đầu vào, thí sinh sẽ học chương trình dự bị tiếng Anh. b. Nguyên tắc xét tuyển


      Nếu một NVXT của thí sinh đăng ký vào Trường có chọn nhiều căn cứ xét tuyển và tương ứng có nhiều phương thức xét tuyển
      (Phương thức 1, 2, 3, 4) thì Trường sẽ thực hiện việc xét tuyển theo thứ tự ưu tiên lần lượt của các phương thức như
      sau: Phương thức 1, Phương thức 3, Phương thức 4, Phương thức 2. Thí sinh có nhiều NVXT đủ điều kiện trúng tuyển thì
      chỉ được công nhận trúng tuyển và gọi nhập học theo nguyện vọng cao nhất.'
    - 'Thí sinh có thể dự thi cả 2 đợt thi năng khiếu để dùng điểm cao nhất của 2 đợt thi xét tuyển (đợt thi 1 dự kiến ngày
      15-17/08/2021; đợt thi 2 dự kiến ngày 17-20/8/2021). TDTU không nhận điểm thi năng khiếu của các Trường khác chuyển
      sang. Xem chi tiết thông báo thi năng khiếu tại https://admission.tdtu.edu.vn


      + Thí sinh thuộc đối tượng 2- đợt 2 xét tuyển vào chương trình đại học bằng tiếng Anh phải có Chứng chỉ tiếng Anh quốc
      tế tương đương IELTS 5.0 trở lên (còn thời hạn trong vòng 2 năm tính đến ngày 01/10/2021); Thí sinh không có chứng chỉ
      tiếng Anh quốc tế tương đương IELTS 5.0 trở lên còn thời hạn theo quy định của TDTU phải đăng ký dự thi Năng lực tiếng
      Anh do TDTU tổ chức (trừ ngành Ngôn ngữ Anh chỉ nhận chứng chỉ tiếng Anh quốc tế theo quy định) tại website: https://thinangkhieu.tdtu.edu.vn.'
  - source_sentence: Những đối tượng nào có thể đăng ký xét tuyển vào Đại học Sư phạm Kỹ thuật TP.HCM và cần đáp ứng các điều
      kiện gì?
    sentences:
    - 'Hồ Chí Minh được thành lập theo Quyết định số 1485/GD-ĐT. Cơ sở vật chất


      Địa chỉ: Số 15, Đường D5, Phường 25, Quận Bình Thạnh, TP. Hồ Chí Minh. Ban đầu, do chưa có cơ sở vật chất riêng, Cơ
      sở II phải thuê cơ sở của Trường Cao đẳng Kinh tế Đối ngoại. Qua thời gian, trường đã xây dựng được cơ sở mới đáp ứng
      nhu cầu giảng dạy và học tập. Diện tích khuôn viên: Gần 5.000 m². Khu vực giảng dạy chính: Sảnh A và sảnh B, đồng thời
      là nơi đặt trụ sở Ban Giám hiệu và các khoa, phòng ban quản lý. Trang thiết bị: Nhiều phòng học và phòng chức năng được
      trang bị hiện đại. Ngoài ra, trong khuôn viên còn có phân viện VJCC cơ sở TP. Hồ Chí Minh, được hỗ trợ xây dựng bởi
      nguồn vốn từ Chính phủ Nhật Bản, tương tự như phân viện tại Hà Nội. Cơ cấu tổ chức và đội ngũ cán bộ, giáo viên


      Trong thời gian đầu mới thành lập, Cơ sở II chỉ có 02 cán bộ, và hầu hết các hoạt động được chỉ đạo trực tiếp từ Cơ
      sở I tại Hà Nội. Tuy nhiên, với quy mô đào tạo ngày càng tăng, Cơ sở II đã nhanh chóng củng cố cơ cấu tổ chức và đội
      ngũ cán bộ, giáo viên. Hiện tại, Cơ sở II có hơn 100 cán bộ, giáo viên cơ hữu, công tác tại 11 Ban và 05 Bộ môn. Các
      Ban


      Ban Tổ chức - Hành chính


      Ban Kế hoạch - Tài chính


      Ban Quản lý đào tạo


      Ban Công tác chính trị & Sinh viên


