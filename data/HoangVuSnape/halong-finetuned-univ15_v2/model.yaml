  - 'Danh mục các ngành điều kiện nộp hồ sơ xét tuyển (xem tại đây). Quy định chứng chỉ tiếng Anh quốc tế tương đương (xem
    tại đây)


    6. Xét tuyển thẳng, ưu tiên xét tuyển theo Quy chế của Bộ GD&ĐT – Mã phương thức 301: Thực hiện theo quy định của Bộ GD&ĐT


    7. Các lưu ý khi đăng ký NVXT và nguyên tắc xét tuyển trên hệ thống Bộ


    a. Các lưu ý khi đăng ký NVXT


    Thí sinh nên tra cứu thông tin các nguyện vọng đăng ký xét tuyển vào TDTU theo phương thức riêng tại: https://tracuuxettuyen.tdtu.edu.vn
    trước khi đăng ký nguyện vọng lên hệ thống của Bộ GD&ĐT. Số CMND/CCCD thí sinh đã đăng ký xét tuyển trên hệ thống của
    TDTU; đăng ký phương thức 4 trên hệ thống của Đại học Quốc gia TP.HCM phải trùng khớp với số CMND/CCCD sử dụng đăng ký
    tài khoản trên hệ thống của Bộ GD&ĐT. Trường hợp thí sinh đã đăng ký số CMND/CCCD không trùng khớp nhau giữa các hệ thống
    trên, thí sinh phải liên hệ với TDTU để được hỗ trợ cập nhật lại số CMND/CCCD cho trùng khớp với hệ thống của Bộ trước
    khi đăng ký nguyện vọng. Thí sinh sẽ không đủ điều kiện xét tuyển nếu không sử dụng cùng 1 số CMND/CCCD đăng ký giữa các
    hệ thống trên. Thí sinh xét tuyển vào chương trình đại học bằng tiếng Anh, chương trình liên kết quốc tế nhưng không nộp
    chứng chỉ tiếng Anh theo quy định, không dự thi năng lực tiếng Anh hoặc dự thi năng lực tiếng Anh kết quả không đạt nếu
    đủ điểm trúng tuyển sẽ trúng tuyển vào chương trình dự bị tiếng Anh. Khi thí sinh làm thủ tục nhập học, Nhà trường sẽ
    tổ chức cho thí sinh thi đánh giá năng lực tiếng Anh. Nếu kết quả thi đánh giá năng lực của thí sinh đạt trình độ tiếng
    Anh theo yêu cầu của chương trình (B1 đối với chương trình đại học bằng tiếng Anh, B2 đối với chương trình liên kết đào
    tạo quốc tế) sẽ được nhập học vào chương trình chính thức. Trường hợp chưa đạt năng lực tiếng Anh đầu vào, thí sinh sẽ
    học chương trình dự bị tiếng Anh. b. Nguyên tắc xét tuyển


    Nếu một NVXT của thí sinh đăng ký vào Trường có chọn nhiều căn cứ xét tuyển và tương ứng có nhiều phương thức xét tuyển
    (Phương thức 1, 2, 3, 4) thì Trường sẽ thực hiện việc xét tuyển theo thứ tự ưu tiên lần lượt của các phương thức như sau:
    Phương thức 1, Phương thức 3, Phương thức 4, Phương thức 2. Thí sinh có nhiều NVXT đủ điều kiện trúng tuyển thì chỉ được
    công nhận trúng tuyển và gọi nhập học theo nguyện vọng cao nhất.'
  - 'Thí sinh có thể dự thi cả 2 đợt thi năng khiếu để dùng điểm cao nhất của 2 đợt thi xét tuyển (đợt thi 1 dự kiến ngày
    15-17/08/2021; đợt thi 2 dự kiến ngày 17-20/8/2021). TDTU không nhận điểm thi năng khiếu của các Trường khác chuyển sang.
    Xem chi tiết thông báo thi năng khiếu tại https://admission.tdtu.edu.vn


    + Thí sinh thuộc đối tượng 2- đợt 2 xét tuyển vào chương trình đại học bằng tiếng Anh phải có Chứng chỉ tiếng Anh quốc
    tế tương đương IELTS 5.0 trở lên (còn thời hạn trong vòng 2 năm tính đến ngày 01/10/2021); Thí sinh không có chứng chỉ
    tiếng Anh quốc tế tương đương IELTS 5.0 trở lên còn thời hạn theo quy định của TDTU phải đăng ký dự thi Năng lực tiếng
    Anh do TDTU tổ chức (trừ ngành Ngôn ngữ Anh chỉ nhận chứng chỉ tiếng Anh quốc tế theo quy định) tại website: https://thinangkhieu.tdtu.edu.vn.'
