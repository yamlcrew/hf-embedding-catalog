  - '4. Đối với phương thức kết hợp thi tuyển và xét tuyển


    4.1. Thí sinh dự xét tuyển ngành Giáo dục Mầm non trình độ đại học


    Phải tham gia kỳ thi năng khiếu do Trường Đại học Sư phạm Thành phố Hồ Chí Minh tổ chức và có kết quả đạt từ 5,0 điểm
    trở lên;


    Đối với thí sinh xét tuyển sử dụng kết quả thi tốt nghiệp THPT năm 2024: ngưỡng điểm đảm bảo chất lượng đầu vào, điều
    kiện nhận hồ sơ đăng ký xét tuyển được thông báo chính thức sau khi Bộ Giáo dục và Đào tạo xác định ngưỡng đảm bảo chất
    lượng đầu vào đại học (căn cứ kết quả kỳ thi tốt nghiệp THPT năm 2024). Đối với thí sinh xét tuyển sử dụng kết quả học
    tập THPT: chỉ áp dụng đối với thí sinh tốt nghiệp THPT năm 2024 đồng thời phải thỏa một trong hai điều kiện sau:


    + Có học lực lớp 12 xếp loại giỏi;


    + Có điểm xét tốt nghiệp THPT từ 8,0 trở lên. 4.2. Thí sinh dự xét tuyển ngành Giáo dục Mầm non trình độ cao đẳng


    Phải tham gia kỳ thi năng khiếu do Trường Đại học Sư phạm Thành phố Hồ Chí Minh tổ chức và có kết quả đạt từ 5,0 điểm
    trở lên;


    Đối với thí sinh xét tuyển sử dụng kết quả thi tốt nghiệp THPT năm 2024: ngưỡng điểm đảm bảo chất lượng đầu vào, điều
    kiện nhận hồ sơ đăng ký xét tuyển được thông báo chính thức sau khi Bộ Giáo dục và Đào tạo xác định ngưỡng đảm bảo chất
    lượng đầu vào đại học (căn cứ kết quả kỳ thi tốt nghiệp THPT năm 2024). Đối với thí sinh xét tuyển sử dụng kết quả học
    tập THPT: chỉ áp dụng đối với thí sinh tốt nghiệp THPT năm 2024 đồng thời phải thỏa một trong hai điều kiện sau:


    + Có học lực lớp 12 xếp loại khá;


    + Có điểm xét tốt nghiệp THPT từ 6,5 trở lên. 4.3. Thí sinh dự xét tuyển ngành Giáo dục Thể chất


    Phải tham gia kỳ thi năng khiếu do Trường Đại học Sư phạm Thành phố Hồ Chí Minh tổ chức và có kết quả đạt từ 5,0 điểm
