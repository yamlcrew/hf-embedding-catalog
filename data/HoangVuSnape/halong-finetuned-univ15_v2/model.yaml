  sentences:
  - 'Hồ Chí Minh được thành lập theo Quyết định số 1485/GD-ĐT. Cơ sở vật chất


    Địa chỉ: Số 15, Đường D5, Phường 25, Quận Bình Thạnh, TP. Hồ Chí Minh. Ban đầu, do chưa có cơ sở vật chất riêng, Cơ sở
    II phải thuê cơ sở của Trường Cao đẳng Kinh tế Đối ngoại. Qua thời gian, trường đã xây dựng được cơ sở mới đáp ứng nhu
    cầu giảng dạy và học tập. Diện tích khuôn viên: Gần 5.000 m². Khu vực giảng dạy chính: Sảnh A và sảnh B, đồng thời là
    nơi đặt trụ sở Ban Giám hiệu và các khoa, phòng ban quản lý. Trang thiết bị: Nhiều phòng học và phòng chức năng được trang
    bị hiện đại. Ngoài ra, trong khuôn viên còn có phân viện VJCC cơ sở TP. Hồ Chí Minh, được hỗ trợ xây dựng bởi nguồn vốn
    từ Chính phủ Nhật Bản, tương tự như phân viện tại Hà Nội. Cơ cấu tổ chức và đội ngũ cán bộ, giáo viên


    Trong thời gian đầu mới thành lập, Cơ sở II chỉ có 02 cán bộ, và hầu hết các hoạt động được chỉ đạo trực tiếp từ Cơ sở
    I tại Hà Nội. Tuy nhiên, với quy mô đào tạo ngày càng tăng, Cơ sở II đã nhanh chóng củng cố cơ cấu tổ chức và đội ngũ
    cán bộ, giáo viên. Hiện tại, Cơ sở II có hơn 100 cán bộ, giáo viên cơ hữu, công tác tại 11 Ban và 05 Bộ môn. Các Ban


