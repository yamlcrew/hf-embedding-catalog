widgetData:
- source_sentence: Trường ĐHBK Hà Nội có những hoạt động gì để kỷ niệm ngày thành lập?
  sentences:
  - 'Tiêu đề: Quy chế Đào tạo 2023

    Mục: Điều 10. Đăng ký học tập chương trình đại học

    Nội dung: Đăng ký học phần: sinh viên chọn đăng ký những học phần dự tính sẽ học trong học kỳ tiếp. Sinh viên có thể đăng
    ký theo kế hoạch học tập chuẩn hoặc theo kế hoạch cá nhân. Thời gian tổ chức đăng ký học phần cho một học kỳ diễn ra vào
    những tuần đầu của học kỳ trước đó. Dựa trên số lượng sinh viên đăng ký, Trường ĐHBK Hà Nội đưa ra số lượng lớp sẽ mở
    và thời khóa biểu cho các lớp này. '
  - 'Tiêu đề: Sổ tay sinh viên 2022

    Mục: SEKISHO

    Nội dung: Công ty Sekisho bắt đầu đến với Trường ĐHBK Hà Nội từ năm 2016, cho đến nay hai bên đã hợp tác và triển khai
    nhiều chương trình hỗ trợ tuyển dụng, bóng đá, kỹ năng mềm cho sinh viên. Hàng năm, ngày hội việc làm Sekisho Job Fair
    được tổ chức nhằm kết nối nhiều doanh nghiệp Nhật Bản có nhu cầu tuyển dụng nguồn nhãn lực chất lượng cao với mức lương
    hấp dẫn và môi trường làm việc hiện đại, thu hút hàng trấm lượt sinh viên Bách Khoa và các trường Đại học tham gia.'
  - 'Tiêu đề: Sổ tay sinh viên 2022

    Mục: Những điểm mốc lịch sử quan trọng

    Nội dung: Ngày 6/3/1956, Bộ trưởng Bộ Giáo dục Nguyễn Văn Huyên đã ký nghị định 147/NĐ về việc thành lập trường Đại học
    Chuyên nghiệp Bách khoa nay là trường ĐHBK Hà Nội.

    Ngày 15/10/1956,Trường đã long trọng tổ chức “Lễ khai giảng khóa I” cho 848 sinh viên vào 14 ngành của 04 liên khoa Cơ-Điện,
    Mỏ-Luyện kim, Xây dựng, Hóa-Thực phẩm.'
- source_sentence: Chương trình tích hợp cử nhân - thạc sĩ có những chuyên ngành nào?
  sentences:
  - 'Tiêu đề: Sổ tay sinh viên 2022

    Mục: MÔ HÌNH VÀ CHƯƠNG TRÌNH ĐÀO TẠO TÍCH HỢP HỆ CHÍNH QUY

    Nội dung: CHƯƠNG TRÌNH TÍCH HỢP CỬ NHÂN - THẠC SĨ KHOA HỌC

    Cấp bằng cử nhân và bằng thạc sĩ cho người tốt nghiệp

    Sinh viên theo học chương trình tích hợp cử nhân - thạc sĩ sẽ học chương trình 4 năm và được nhận được bằng tốt nghiệp
    cử nhân; sau đó nếu học tiếp 1,5 năm theo chương trình thạc sĩ tích hợp sẽ được cấp bằng tốt nghiệp thạc sĩ.

    Mục tiêu của chương trình là đào tạo nguồn nhân lực có trình độ cao, năng lực nghiên cứu, đổi mới sáng tạo trong khoa
    học công nghệ.'
  - 'Tiêu đề: Sổ tay sinh viên 2022

    Mục: MÔ HÌNH VÀ CHƯƠNG TRÌNH ĐÀO TẠO TÍCH HỢP HỆ CHÍNH QUY

    Nội dung: CHƯƠNG TRÌNH TÍCH HỢP CỬ NHÂN - KỸ SƯ

    Cấp bằng cử nhân và bằng kỹ sư cho người tốt nghiệp.

    Các chương trình đào tạo kỹ sư sẽ được xây dựng theo hướng chuyên sâu nghề nghiệp với chuẩn chương trình về đầu vào, đầu
    ra và khối lượng kiến thức, đảm bảo tương đương với trình độ thạc sĩ và đạt bậc 7 theo khung trình độ quốc gia. Với khối
    lượng kiến thức toàn khoá tối thiểu là 180 tín chỉ và chất lượng đào tạo được chuẩn hoá, người tốt nghiệp có thể học chuyển
    đổi kiến thức qua lại giữa văn bằng kỹ sư và thạc sĩ. Theo đó, nếu sinh viên học chương trình 4 năm sẽ nhận được bằng
    tốt nghiệp cử nhân; sau đó nếu học tiếp 1,5 năm theo chương trình kỹ sư tích hợp thì sẽ được cấp bằng tốt nghiệp trình
    độ kỹ sư.

    Chương trình tích hợp cử nhân – kỹ sư được phát triển với mục đích nâng cao chất lượng của các chương trình đào tạo kỹ
    sư truyền thống của Trường ĐHBK Hà Nội.

    Đảm bảo mục tiêu đào tạo trình độ đào tạo kỹ sư theo hướng nghề nghiệp chuyên sâu, kết hợp hài hòa giữa kiến thức hiện
    đại và các kỹ năng cốt lõi.'
  - 'Tiêu đề: SĐH - Thạc sĩ - Chương trình đào tạo

    Mục: Học song song hai chương trình thạc sĩ?

    Nội dung: FAQ: Học song song hai chương trình thạc sĩ?

    Trả lời: Học viên có thể học 2 chương trình thạc sĩ cũng 1 lúc những phải đảm bảo được thời gian học tập theo quy định'
- source_sentence: Giáo dục thường xuyên có thể được áp dụng cho tất cả các cấp độ giáo dục không?
  sentences:
  - "Tiêu đề: Luật giáo dục 2019 \nMục: Điều 10. Liên thông trong giáo dục\nNội dung: 1. Liên thông trong giáo dục là việc\
    \ sử dụng kết quả học tập đã có để học tiếp ở các cấp học, trình độ khác cùng ngành, nghề đào tạo hoặc khi chuyển sang\
    \ ngành, nghề đào tạo, hình thức giáo dục và trình độ đào tạo khác phù hợp với yêu cầu nội dung tương ứng, bảo đảm liên\
    \ thông giữa các cấp học, trình độ đào tạo trong giáo dục phổ thông, giáo dục nghề nghiệp và giáo dục đại học.\n2. Việc\
    \ liên thông trong giáo dục phải đáp ứng các điều kiện bảo đảm chất lượng. Chương trình giáo dục được thiết kế theo hướng\
    \ kế thừa, tích hợp kiến thức và kỹ năng dựa trên chuẩn đầu ra của từng bậc trình độ đào tạo trong Khung trình độ quốc\
    \ gia Việt Nam. Người học không phải học lại kiến thức và kỹ năng đã tích lũy ở các chương trình giáo dục trước đó."
  - 'Tiêu đề: Quy chế tổ chức và quản lý đào tạo

    Mục: TỔ CHỨC ĐÀO TẠO THẠC SĨ - Điều 23. Những thay đổi trong quá trình đào tạo đối với học viên cao học

    Nội dung: 4. Học viên được phép đề nghị gia hạn tối đa 02 lần, mỗi lần gia hạn không quá 06 tháng. Tổng thời gian học
    tập (kể cả thời gian gia hạn) không được vượt quá 03 năm kể từ ngày được công nhận là học viên cao học.'
  - "Tiêu đề: Luật giáo dục 2019 \nMục: Điều 5. Giải thích từ ngữ\nNội dung: Giáo dục thường xuyên là giáo dục để thực hiện\
    \ một chương trình giáo dục nhất định, được tổ chức linh hoạt về hình thức thực hiện chương trình, thời gian, phương pháp,\
    \ địa điểm, đáp ứng nhu cầu học tập suốt đời của người học."
- source_sentence: Trường đại học là gì?
  sentences:
  - 'Tiêu đề: Uni General

    Mục: Phân biệt đại học và trường đại học.?

    Nội dung: FAQ: Phân biệt đại học và trường đại học?

    Trả lời: Trường đại học là cơ sở đào tạo nhiều ngành nhưng không đào tạo nhiều lĩnh vực. Còn đại học là một cơ sở đào
    tạo trên nhiều lĩnh vực (trong mỗi lĩnh vực có thể có nhiều ngành).'
  - 'Tiêu đề: Luật sửa đổi, bổ sung một số điều luật giáo dục đại học 2018

    Mục: Điều 4. Giải thích từ ngữ

    Nội dung: Trường đại học, học viện (sau đây gọi chung là trường đại học) là cơ sở giáo dục đại học đào tạo, nghiên cứu
    nhiều ngành, được cơ cấu tổ chức theo quy định của Luật giáo dục.'
  - 'Tiêu đề: Luật giáo dục đại học 2012

    Mục: Điều 4. Giải thích từ ngữ

    Nội dung: Đại học là cơ sở giáo dục đại học bao gồm tổ hợp các trường cao đẳng, trường đại học, viện nghiên cứu khoa học
    thành viên thuộc các lĩnh vực chuyên môn khác nhau, tổ chức theo hai cấp, để đào tạo các trình độ của giáo dục đại học.'
- source_sentence: Phụ huynh muốn hỏi về yêu cầu cần đạt về phẩm chất và năng lực người học trong chương trình giáo dục phổ
    thông
  sentences:
  - 'Tiêu đề: Quy chế tổ chức và quản lý đào tạo

    Mục: QUẢN LÝ HỌC LIỆU VÀ PHẦN MỀM PHỤC VỤ DẠY-HỌC - Điều 43. Yêu cầu chung đối với giáo trình

    Nội dung: 3. Giáo trình phải cụ thể hóa yêu cầu về nội dung kiến thức, kỹ năng và thái độ quy định trong mỗi học phần
    của CTĐT, ngành đào tạo và trình độ đào tạo, đáp ứng yêu cầu đổi mới phương pháp giảng dạy và kiểm tra, đánh giá kết quả
    học tập, bảo đảm chất lượng đào tạo. '
  - "Tiêu đề: Luật giáo dục 2019 \nMục: Điều 8. Chương trình giáo dục\nNội dung: Chương trình giáo dục thể hiện mục tiêu giáo\
    \ dục; quy định chuẩn kiến thức, kỹ năng, yêu cầu cần đạt về phẩm chất và năng lực của người học; phạm vi và cấu trúc\
    \ nội dung giáo dục; phương pháp và hình thức tổ chức hoạt động giáo dục; cách thức đánh giá kết quả giáo dục đối với\
    \ các môn học ở mỗi lớp học, mỗi cấp học hoặc các môn học, mô-đun, ngành học đối với từng trình độ đào tạo."
  - "Tiêu đề: Luật giáo dục 2019 \nMục: Điều 8. Chương trình giáo dục\nNội dung: Chuẩn kiến thức, kỹ năng, yêu cầu cần đạt\
    \ về phẩm chất và năng lực người học quy định trong chương trình giáo dục phải được cụ thể hóa thành sách giáo khoa đối\
    \ với giáo dục phổ thông; giáo trình và tài liệu giảng dạy đối với giáo dục nghề nghiệp, giáo dục đại học. Sách giáo khoa,\
    \ giáo trình và tài liệu giảng dạy phải đáp ứng yêu cầu về phương pháp giáo dục."
