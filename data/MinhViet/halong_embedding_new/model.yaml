widgetData:
- source_sentence: Các sản phẩm nghiên cứu và sáng tạo của CLB có đặc trưng gì?
  sentences:
  - 'Tiêu đề: Sổ tay sinh viên 2022

    Mục: NGHIÊN CỨU, SÁNG TẠO & KHỞI NGHIỆP

    Nội dung: CLB NGHIÊN CỨU VÀ SÁNG TẠO

    Được ra đời nhằm hỗ trợ chuyên môn và cơ sở vật chất cho sinh viên tham gia và thực hiện nghiên cứu xung quanh các chủ
    đề, tạo ra các sản phẩm nghiên cứu và sáng tạo đặc trưng của ngành nghề (BK-AMC, HUST-SMARTCAR, BK-UAV, AI-CLUB, GW Club,
    GFC, SEP).'
  - 'Tiêu đề: ĐẠI HỌC BÁCH KHOA HÀ NỘI - SỨ MẠNG, TẦM NHÌN VÀ GIÁ TRỊ CỐT LÕI

    Mục: Giá trị cốt lõi

    Nội dung: Giá trị cốt lõi của Đại học Bách khoa Hà Nội

    Chất lượng - hiệu quả: Yếu tố cốt lõi làm nên thương hiệu Đại học Bách khoa Hà Nội là chất lượng xuất sắc gắn liền với
    hiệu quả tối ưu trong mọi hoạt động và trên mọi phương diện.

    Tận tụy - cống hiến: Sự tận tụy và đam mê là chìa khóa cho mọi thành công; sự tận tâm và cống hiến hết mình làm nên giá
    trị cao quý nhất của các thế hệ cán bộ và sinh viên Trường Đại học Bách khoa Hà Nội.

    Chính trực - tôn trọng: Sự chính trực trong chuyên môn, nghiệp vụ và lối sống, cùng với sự tôn trọng nhân phẩm, tôn trọng
    luật pháp và quy định, tôn trọng sự đa dạng và khác biệt là những chuẩn mực đạo đức cốt lõi trong môi trường đại học.

    Tài năng cá nhân - trí tuệ tập thể: Mọi thành công đột phá đều bắt nguồn từ sáng tạo và tài năng cá nhân, nhưng chìa khóa
    đảm bảo thành công bền vững chính là sự đoàn kết và trí tuệ tập thể.

    Kế thừa - sáng tạo: Động lực chính cho phát triển bền vững là đổi mới sáng tạo dựa trên tiếp thu tinh hoa tri thức của
    nhân loại, kế thừa những thành quả đã đạt được và phát huy những giá trị truyền thống tốt đẹp.'
  - "Tiêu đề: Luật giáo dục 2019 \nMục: Điều 19. Hoạt động khoa học và công nghệ\nNội dung: Hoạt động khoa học và công nghệ\n\
    1. Hoạt động khoa học và công nghệ là một nhiệm vụ của cơ sở giáo dục.\n2. Cơ sở giáo dục tự triển khai hoặc phối hợp\
    \ với tổ chức khoa học và công nghệ, cơ sở sản xuất, kinh doanh, dịch vụ trong việc đào tạo, nghiên cứu khoa học và chuyển\
    \ giao công nghệ, phục vụ phát triển kinh tế - xã hội.\n3. Nhà nước tạo điều kiện cho cơ sở giáo dục hoạt động khoa học\
    \ và công nghệ, kết hợp đào tạo với nghiên cứu khoa học và sản xuất nhằm nâng cao chất lượng giáo dục; xây dựng cơ sở\
    \ giáo dục thành trung tâm văn hóa, khoa học và công nghệ của địa phương hoặc của cả nước.\n4. Nhà nước có chính sách\
    \ ưu tiên phát triển hoạt động khoa học và công nghệ trong cơ sở giáo dục. Các chủ trương, chính sách về giáo dục phải\
    \ được xây dựng trên cơ sở kết quả nghiên cứu khoa học phù hợp với thực tiễn Việt Nam và xu hướng quốc tế."
- source_sentence: Em muốn biết thêm thông tin về chương trình hỗ trợ sinh viên nghiên cứu khoa học
  sentences:
  - 'Tiêu đề: Quy định Về việc miễn, giảm học phí, hỗ trợ chi phí học tập, hỗ trợ học tập cho sinh viên Đại học Bách khoa
    Hà Nội

    Mục: Điều 6. Đối tượng được hỗ trợ học tập

    Nội dung: Đối tượng được hỗ trợ học tập

    1. Đối tượng: Sinh viên là người dân tộc thiểu số rất ít người (Cống, Mảng, Pu Péo, Si La, Cờ Lao, Bố Y, La Ha, Ngái,
    Chứt, Ơ Đu, Brâu, Rơ Măm, Lô Lô, Lự, Pà Thẻn, La Hủ).

    2. Mức hỗ trợ: Bằng 100% mức lương cơ sở/người/tháng. Thời gian được hưởng hỗ trợ 12 tháng/năm cho năm học có thời gian
    học đủ 9 tháng trở lên; trường hợp năm học không đủ 9 tháng thì được hưởng theo thời gian học thực tế.'
  - "Tiêu đề: Hướng dẫn Hồ sơ chế độ chính sách miễn giảm học phí, vay vốn ngân hàng\nMục: B. Hỗ trợ chi phí học tập \nNội\
    \ dung: 1. Đối tượng được nhận hỗ trợ chi phí học tập: Sinh viên là người dân tộc thiểu số thuộc hộ nghèo, hộ cận nghèo\
    \ theo quy định của Nhà nước\n2. Mức hỗ trợ chi phí học tập: Bằng 60% mức lương cơ sở và được hưởng không quá 10 tháng/năm\
    \ học/sinh viên."
  - 'Tiêu đề: Sổ tay sinh viên 2022

    Mục: NGHIÊN CỨU, SÁNG TẠO & KHỞI NGHIỆP

    Nội dung: HỖ TRỢ SINH VIÊN NGHIÊN CỨU KHOA HỌC THƯỜNG NIÊN

    Sinh viên theo đuổi những đề tài nghiên cứu dưới sự hướng dẫn của giảng viên giúp sinh viên hình thành tư duy và phương
    pháp làm việc khoa học, thực hiện phương châm “học đi đôi với hành” hướng tới “khởi nghiệp”.'
- source_sentence: Tên học phần hoặc môn học có được ghi trên phụ lục văn bằng không?
  sentences:
  - 'Tiêu đề: Thông tư quy định nội dung chính ghi trên văn bằng và phụ lục văn bằng giáo dục đại học

    Mục: Điều 3. Nội dung chính ghi trên phụ lục văn bằng

    Nội dung: 1. Thông tin về người được cấp văn bằng: họ, chữ đệm, tên, ngày tháng năm sinh.

    2. Thông tin về văn bằng: tên cơ sở giáo dục đại học cấp bằng, chuyên ngành đào tạo, ngày nhập học, ngôn ngữ đào tạo,
    thời gian đào tạo, trình độ đào tạo theo Khung trình độ quốc gia Việt Nam, hình thức đào tạo.

    3. Thông tin về nội dung, kết quả học tập (nếu có): tên học phần hoặc môn học, số tín chỉ của từng học phần hoặc môn học,
    điểm học phần hoặc môn học, tổng số tín chỉ tích lũy, điểm trung bình, tên và kết quả luận văn, luận án, điểm xếp hạng
    tốt nghiệp. Trường hợp văn bằng được cấp khi các tín chỉ tích lũy ở những cơ sở đào tạo khác nhau, cần ghi rõ tên môn
    học, số tín chỉ của từng môn học được công nhận để xét tốt nghiệp và tên cơ sở đào tạo.

    4. Thông tin kết nối với văn bằng: mã số sinh viên, học viên, nghiên cứu sinh; số hiệu văn bằng.'
  - 'Tiêu đề: SĐH - Thạc sĩ - Miễn học phần

    Mục: Muốn xin miễn học phần Triết học thì cần làm gì?

    Nội dung: FAQ: Muốn xin miễn học phần Triết học thì cần làm gì?

    Trả lời: Học viên cần có đơn xin miễn học phần Triết học kèm theo bằng tốt nghiệp thạc sĩ công chứng và phụ lục văn bằng
    có công chứng.'
  - 'Tiêu đề: SĐH - Thạc sĩ - Tốt nghiệp

    Mục: Xếp loại thạc sĩ có thể hiện trên bằng tốt nghiệp không ?

    Nội dung: FAQ: Xếp loại thạc sĩ có thể hiện trên bằng tốt nghiệp không ?

    Trả lời: Xếp hạng tốt nghiệp thạc sĩ có được ghi trên bằng tốt nghiệp'
- source_sentence: Đơn vị trực thuộc có phải là một phần của cơ sở giáo dục đại học không?
  sentences:
  - 'Tiêu đề: HUST General

    Mục: Đại học Bách khoa Hà Nội trực thuộc tổ chức nào?

    Nội dung: FAQ: Đại học Bách khoa Hà Nội trực thuộc tổ chức nào?

    Trả lời: Đại học Bách khoa Hà Nội trực thuộc Bộ Giáo dục và Đào tạo và được xếp vào nhóm các đại học trọng điểm quốc gia.'
  - 'Tiêu đề: Luật sửa đổi, bổ sung một số điều luật giáo dục đại học 2018

    Mục: Điều 4. Giải thích từ ngữ

    Nội dung: Trường là đơn vị đào tạo thuộc cơ sở giáo dục đại học, do hội đồng trường, hội đồng đại học quyết định việc
    thành lập theo quy định của Chính phủ, tổ chức và hoạt động theo quy chế tổ chức và hoạt động của cơ sở giáo dục đại học.'
  - 'Tiêu đề: Luật sửa đổi, bổ sung một số điều luật giáo dục đại học 2018

    Mục: Điều 4. Giải thích từ ngữ

    Nội dung: Đơn vị trực thuộc là đơn vị có tư cách pháp nhân của cơ sở giáo dục đại học, do hội đồng trường, hội đồng đại
    học quyết định thành lập; tổ chức và hoạt động theo quy định của pháp luật, quy chế tổ chức và hoạt động của cơ sở giáo
    dục đại học.'
- source_sentence: iCTSV giúp sinh viên rèn luyện những kỹ năng nào?
  sentences:
  - 'Tiêu đề: Sổ tay sinh viên 2022

    Mục: TỔ HỖ TRỢ TRIỂN KHAI HỆ THỐNG iCTSV

    Nội dung: TỔ HỖ TRỢ TRIỂN KHAI HỆ THỐNG iCTSV:

    Là đơn vị trực thuộc Phòng Công tác Sinh viên, tổ được lập ra với nhiệm vụ hỗ trợ triển khai hệ thống iCTSV trong công
    tác đánh giá kết quả rèn luyện của sinh viên.

    Mục tiêu hướng tới giúp sinh viên hoàn thiện quá trình rèn luyện tại trường với “Kiến thức - Kỹ năng - Thái độ”'
  - 'Tiêu đề: Cấp giấy tờ cho sinh viên (Giấy giới thiệu, giấy chứng nhận, giấy vay vốn ngân hàng, giấy làm Thẻ xe buýt ...)

    Mục: 1. Cách thức đăng ký:

    Nội dung: Cấp giấy tờ cho sinh viên (Giấy giới thiệu, giấy chứng nhận, giấy vay vốn ngân hàng, giấy làm Thẻ xe buýt ...)

    Cách 1: Sinh viên đăng nhập vào hệ thống ctt.hust.edu.vn (tài khoản là địa chỉ email của sinh viên, mật khẩu là mật khẩu
    của email), sau đó vào mục “DỊCH VỤ” và chọn mục “THỦ TỤC HÀNH CHÍNH” để đăng ký cấp các loại giấy tờ cần thiết. Sau khi
    đăng ký xong, hệ thống sẽ thông báo qua email (do Trường cấp) cho sinh viên biết lịch nhận kết quả. Sinh viên đăng ký
    giấy tờ tại https://sv-ctt.hust.edu.vn/

    Cách 2: Sinh viên cũng có thể đăng ký các loại giấy tờ trên bằng ứng dụng iCTSV (tải App iCTSV trên Apple App Store hoặc
    Google Play Store).

    Cách 3: Đăng ký trực tiếp tại Ban CTSV (Phòng 103 nhà C1). Việc đăng ký cấp giấy tờ trực tiếp tại Phòng chỉ áp dụng giải
    quyết cho các loại giấy tờ không cung cấp mẫu đăng ký trên hệ thống.'
  - 'Tiêu đề: CTSV - ĐRL

    Mục: Tham gia các hội thảo tuyển dụng có được tính điểm rèn luyện không ạ?

    Nội dung: FAQ: Tham gia các hội thảo tuyển dụng có được tính điểm rèn luyện không ạ?

    Trả lời: Tham gia hoạt động ngoại khoá (hội thảo tuyển dụng, tham quan doanh nghiệp,...) sẽ được tính điểm rèn luyện nếu
    có trong danh sách hoạt động ngoại khoá trên trang web https://ctsv.hust.edu.vn/ hoặc app iCTSV và bạn cần phải nộp đầy
    đủ minh chứng cho hoạt động đó.'
