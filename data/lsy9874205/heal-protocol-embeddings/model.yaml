- source_sentence: "**Intervention costs**, including:\n   - Medication costs\n   - Provider time\n   - Peer navigator time\
    \ and expenses\n   - Program administration"
  sentences:
  - '4.2 Inclusion Criteria


    Patients must meet all of the following inclusion criteria to be eligible for the study:'
  - "**MOUD Type**:\n   - Methadone\n   - Buprenorphine\n   - Naltrexone"
  - Pregnancy (pregnant patients will be referred to specialized obstetric addiction services)
- source_sentence: 4.2 Exclusion Criteria
  sentences:
  - 8.3 Follow-Up Visits
  - To assess retention in addiction treatment between study arms at 90 and 180 days post-randomization.
  - ETHICAL CONSIDERATIONS
- source_sentence: 8.3 Specific Safety Concerns and Monitoring
  sentences:
  - '11.1.2 Steering Committee


    Composition:

    - Executive Committee members

    - Site investigators

    - Patient/community representatives

    - Key co-investigators


    Responsibilities:

    - Protocol revisions

    - Implementation monitoring

    - Recruitment oversight

    - Review of study progress

    - Addressing operational challenges'
  - Chronic non-cancer pain (defined as pain lasting ≥3 months)
  - 'Cancer-related pain (exception: patients with a history of cancer who are in remission for ≥5 years and whose pain is
    unrelated to cancer)'
- source_sentence: '7.1 Randomization


    Participants will be randomly assigned in a 1:1 ratio to receive either BUP-NX or XR-NTX using a computer-generated randomization
    sequence with permuted blocks of varying sizes. Randomization will be stratified by site and by opioid type (short-acting
    prescription opioids, heroin, or fentanyl as primary opioid of use).'
  sentences:
  - '**Privacy and Confidentiality**: There is a risk of breach of confidentiality or privacy related to the collection of
    sensitive information about substance use and mental health.'
  - '3.2 Study Sites


    The study will be conducted at six Emergency Departments:'
  - '3.4 Recruitment Strategy


    Potential participants will be identified through:

    - Referrals from emergency departments, hospital discharge planning, detoxification centers, and other healthcare providers

    - Self-referral through community outreach and advertisements

    - Screening of electronic health records to identify patients with OUD'
- source_sentence: To evaluate the cost-effectiveness of ED-initiated buprenorphine with peer navigator support compared to
    enhanced referral to treatment.
  sentences:
  - '12.1 Data Collection


    Data will be collected using electronic case report forms (eCRFs) in a secure, web-based data management system. The system
    will include range checks, consistency checks, and validation rules to ensure data quality.'
  - Concerns about withdrawal precipitation
  - '11.1.2 Steering Committee


    Composition:

    - Executive Committee members

    - Site investigators

    - Patient/community representatives

    - Key co-investigators


    Responsibilities:

    - Protocol revisions

    - Implementation monitoring

    - Recruitment oversight

    - Review of study progress

    - Addressing operational challenges'
