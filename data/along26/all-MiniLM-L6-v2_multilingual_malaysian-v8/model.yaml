- source_sentence: 'Former Malaysian Prime Minister Najib Razak has been facing numerous charges related to corruption, money
    laundering, and abuse of power since the 2018 election, in which his coalition lost power after six decades in office.
    The Malaysian courts and legal system have been actively handling these cases, and here is an overview of the outcomes
    so far:


    1. SRC International Sdn Bhd case: Najib was charged with seven counts of criminal breach of trust, money laundering,
    and abuse of power in relation to a former unit of the 1Malaysia Development Berhad (1MDB) known as SRC International.
    On July 28, 2020, the Kuala Lumpur High Court found Najib guilty on all seven charges and sentenced him to 12 years in
    prison and fined him RM210 million (approximately USD $50 million). Najib has appealed the verdict.

    2. 1MDB-related charges: Najib has been charged with 42 counts of corruption, money laundering, and abuse of power in
    relation to the 1MDB scandal. These charges include receiving RM2.28 billion (approximately USD $540 million) in his personal
    bank account from 1MDB funds. Najib has pleaded not guilty to all charges. The trials are ongoing, with the first of the
    1MDB-related cases scheduled to commence on February 8, 2022.

    3. Other charges: Najib also faces charges related to the misappropriation of RM1.25 billion (approximately USD $300 million)
    in government funds during his time as prime minister. He has pleaded not guilty to these charges, and the trial is ongoing.


    In general, the Malaysian courts and legal system have been handling these cases following standard procedures and legal
    norms. The judiciary has demonstrated its independence in delivering verdicts, and Najib, like any other defendant, is
    entitled to a fair trial and the right to appeal.


    It is important to note that this information is accurate as of the time of writing, and the outcomes of the ongoing cases
    may change. For the most recent updates, it is recommended to consult reliable news sources or official legal documents.'
