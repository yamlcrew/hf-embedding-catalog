- source_sentence: 'To find the Fourier transform of the given wave function ψ(x) = e^(-x^2/2), we will use the following
    definition of the Fourier transform:


    F(k) = ∫[ψ(x) * e^(-2πikx)] dx, where the integral is taken from -∞ to ∞.


    So, we have:


    F(k) = ∫[e^(-x^2/2) * e^(-2πikx)] dx, where the integral is taken from -∞ to ∞.


    Now, let''s make a substitution: u = x√2. Then, du = √2 dx, and x = u/√2.


    F(k) = ∫[e^(-u^2/4) * e^(-πiku/√2)] (√2 du), where the integral is taken from -∞ to ∞.


    Now, we can rewrite the integral as:


    F(k) = √2 ∫[e^(-u^2/4 - πiku/√2)] du, where the integral is taken from -∞ to ∞.


    To solve this integral, we will complete the square in the exponent:


    -u^2/4 - πiku/√2 = -(u^2 + 2πiku√2)/4


    Now, we add and subtract (πk√2)^2/4 inside the exponent:


    -(u^2 + 2πiku√2 + (πk√2)^2/4 - (πk√2)^2/4)/4


    = -[(u + πk√2)^2/4 - (πk√2)^2/4]


    Now, we can rewrite the integral as:


    F(k) = √2 * e^(-(πk√2)^2/4) * ∫[e^(-(u + πk√2)^2/4)] du, where the integral is taken from -∞ to ∞.


    The integral part is a Gaussian integral, which is equal to √(4π):


    F(k) = √2 * e^(-(πk√2)^2/4) * √(4π)


    F(k) = √(8π) * e^(-(πk√2)^2/4)


    Thus, the Fourier transform of the wave function ψ(x) = e^(-x^2/2) is:


    F(k) = √(8π) * e^(-(πk√2)^2/4)'
  sentences:
  - 'The Malaysian left can challenge the dominant narratives around race and religion that have been used to justify repression
    and inequality in the country through the following ways:


    1. Promoting unity and inclusivity: The left can promote a narrative that focuses on unity and inclusivity, emphasizing
    the commonalities between different racial and religious groups in Malaysia. This can help to counter the divisive and
    exclusionary narratives that have been used to justify repression and inequality.

    2. Highlighting the economic and social inequalities: The left can draw attention to the economic and social inequalities
    that exist in Malaysia and demonstrate how these inequalities are linked to race and religion. By highlighting the structural
    issues that contribute to these inequalities, the left can challenge the narrative that these inequalities are natural
    or inevitable.

    3. Criticizing the use of race and religion for political gain: The left can criticize political parties and leaders who
    use race and religion to divide the population and gain political power. By highlighting the negative consequences of
    this kind of politics, the left can promote a more inclusive and equitable political discourse.

    4. Amplifying marginalized voices: The left can amplify the voices of marginalized communities who have been excluded
    from dominant narratives around race and religion. This can help to challenge the narrow and exclusionary perspectives
    that have been perpetuated by the dominant narrative.

    5. Advocating for policy changes: The left can advocate for policy changes that promote greater equality and inclusivity
    in Malaysia. This can include policies related to education, healthcare, employment, and political representation. By
    advocating for these changes, the left can demonstrate its commitment to creating a more equitable society.

    6. Engaging in grassroots organizing: The left can engage in grassroots organizing to build support for its vision of
    a more inclusive and equitable Malaysia. This can include organizing community events, building coalitions with other
    progressive groups, and engaging in direct action.


    Overall, the Malaysian left can challenge the dominant narratives around race and religion by promoting a more inclusive
    and equitable vision of society, drawing attention to economic and social inequalities, criticizing the use of race and
    religion for political gain, amplifying marginalized voices, advocating for policy changes, and engaging in grassroots
    organizing. By taking these actions, the left can help to build a more equitable and just society in Malaysia.'
  - 'Untuk mencari penjelmaan Fourier bagi fungsi gelombang yang diberikan ψ(x) = e^(-x^2/2), kita akan menggunakan takrifan
    penjelmaan Fourier berikut:


    F(k) = ∫[ψ(x) * e^(-2πikx)] dx, dengan kamiran diambil dari -∞ hingga ∞.


    Jadi, kami ada:


    F(k) = ∫[e^(-x^2/2) * e^(-2πikx)] dx, di mana kamiran diambil dari -∞ hingga ∞.


    Sekarang, mari kita buat penggantian: u = x√2. Kemudian, du = √2 dx, dan x = u/√2.


    F(k) = ∫[e^(-u^2/4) * e^(-πiku/√2)] (√2 du), di mana kamiran diambil dari -∞ hingga ∞.


    Sekarang, kita boleh menulis semula kamiran sebagai:


    F(k) = √2 ∫[e^(-u^2/4 - πiku/√2)] du, di mana kamiran diambil dari -∞ hingga ∞.


    Untuk menyelesaikan kamiran ini, kami akan melengkapkan kuasa dua dalam eksponen:


    -u^2/4 - πiku/√2 = -(u^2 + 2πiku√2)/4


    Sekarang, kita tambah dan tolak (πk√2)^2/4 di dalam eksponen:


    -(u^2 + 2πiku√2 + (πk√2)^2/4 - (πk√2)^2/4)/4


    = -[(u + πk√2)^2/4 - (πk√2)^2/4]


    Sekarang, kita boleh menulis semula kamiran sebagai:


    F(k) = √2 * e^(-(πk√2)^2/4) * ∫[e^(-(u + πk√2)^2/4)] du, di mana kamiran diambil daripada -∞ hingga ∞.


    Bahagian kamiran ialah kamiran Gaussian, yang sama dengan √(4π):


    F(k) = √2 * e^(-(πk√2)^2/4) * √(4π)


    F(k) = √(8π) * e^(-(πk√2)^2/4)


    Oleh itu, penjelmaan Fourier bagi fungsi gelombang ψ(x) = e^(-x^2/2) ialah:


    F(k) = √(8π) * e^(-(πk√2)^2/4)'
