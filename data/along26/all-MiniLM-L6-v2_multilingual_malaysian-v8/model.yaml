  - 'Several beneficial insects are negatively impacted by certain insecticides. These insects play a crucial role in maintaining
    the balance of ecosystems, acting as natural pest control agents, and pollinating plants. Some of the most important beneficial
    insects include:


    1. Bees: Bees are essential pollinators for many crops and wild plants. Insecticides, particularly neonicotinoids, have
    been linked to declines in bee populations.


    2. Ladybugs: Ladybugs are natural predators of many pests, such as aphids, mites, and scale insects. Broad-spectrum insecticides
    can harm ladybug populations.


    3. Lacewings: Lacewings are predators of various pests, including aphids, whiteflies, and mealybugs. They are susceptible
    to many insecticides, especially synthetic pyrethroids.


    4. Ground beetles: These beetles prey on slugs, snails, and other pests. They can be negatively impacted by insecticides,
    particularly carbamates and organophosphates.


    5. Parasitic wasps: These wasps lay their eggs inside pest insects, eventually killing them. They are affected by many
    insecticides, including neonicotinoids and pyrethroids.


    To minimize collateral damage to these beneficial insects while still effectively controlling pest populations, several
    strategies can be employed:


    1. Integrated Pest Management (IPM): IPM is an approach that combines various pest control methods, such as biological
    control, habitat manipulation, and the use of resistant plant varieties. Chemical control is used only when necessary
    and in the least harmful way possible.


    2. Use selective insecticides: Choose insecticides that target specific pests and have minimal impact on beneficial insects.
    For example, Bacillus thuringiensis (Bt) is a bacterium that produces toxins harmful to certain pests but is safe for
    most beneficial insects.


    3. Apply insecticides at the right time: Use insecticides when pests are most vulnerable and when beneficial insects are
    least active. For example, apply insecticides in the early morning or late evening when bees are less likely to be foraging.


    4. Use proper application techniques: Apply insecticides according to label instructions and avoid drift to non-target
    areas. Use targeted application methods, such as spot treatments or bait stations, to minimize exposure to beneficial
    insects.


    5. Establish and maintain habitats for beneficial insects: Create habitats that provide food, shelter, and breeding sites
    for beneficial insects. This can include planting flowering plants that provide nectar and pollen, maintaining hedgerows,
    and providing nesting sites for bees and other insects.


    By implementing these strategies, it is possible to minimize the negative impact of insecticides on beneficial insects
    while still effectively controlling pest populations. This will help maintain the balance of ecosystems and support sustainable
    agriculture practices.'
  - 'Bekas Perdana Menteri Malaysia Najib Razak telah menghadapi banyak pertuduhan berkaitan rasuah, pengubahan wang haram,
    dan penyalahgunaan kuasa sejak pilihan raya 2018, di mana gabungannya kehilangan kuasa selepas enam dekad memegang jawatan.
    Mahkamah dan sistem perundangan Malaysia telah mengendalikan kes-kes ini secara aktif, dan berikut ialah gambaran keseluruhan
    keputusan setakat ini:


    1. Kes SRC International Sdn Bhd: Najib didakwa dengan tujuh pertuduhan pecah amanah jenayah, pengubahan wang haram, dan
    penyalahgunaan kuasa berhubung bekas unit 1Malaysia Development Berhad (1MDB) yang dikenali sebagai SRC International.
    Pada 28 Julai 2020, Mahkamah Tinggi Kuala Lumpur mendapati Najib bersalah atas kesemua tujuh pertuduhan dan menjatuhkan
    hukuman penjara 12 tahun dan dendanya RM210 juta (kira-kira USD $50 juta). Najib telah merayu keputusan itu.

    2. Tuduhan berkaitan 1MDB: Najib telah didakwa dengan 42 pertuduhan rasuah, pengubahan wang haram, dan penyalahgunaan
    kuasa berhubung skandal 1MDB. Tuduhan ini termasuk menerima RM2.28 bilion (kira-kira USD $540 juta) dalam akaun bank peribadinya
    daripada dana 1MDB. Najib telah mengaku tidak bersalah atas semua pertuduhan. Perbicaraan sedang dijalankan, dengan kes
    pertama berkaitan 1MDB dijadualkan bermula pada 8 Februari 2022.

    3. Tuduhan lain: Najib juga menghadapi pertuduhan berkaitan penyelewengan RM1.25 bilion (kira-kira USD $300 juta) dalam
    dana kerajaan semasa beliau menjadi perdana menteri. Beliau telah mengaku tidak bersalah atas pertuduhan ini, dan perbicaraan
    sedang dijalankan.


    Secara amnya, mahkamah dan sistem perundangan Malaysia telah mengendalikan kes-kes ini mengikut prosedur standard dan
    norma undang-undang. Badan kehakiman telah menunjukkan kemerdekaannya dalam menyampaikan keputusan, dan Najib, seperti
    mana-mana defendan lain, berhak mendapat perbicaraan yang adil dan hak untuk merayu.


    Adalah penting untuk ambil perhatian bahawa maklumat ini tepat pada masa penulisan, dan hasil kes yang sedang berjalan
    mungkin berubah. Untuk kemas kini terkini, adalah disyorkan untuk berunding dengan sumber berita yang boleh dipercayai
    atau dokumen undang-undang rasmi.'
