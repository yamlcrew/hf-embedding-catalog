    - 'Untuk mengira jarak antara objek dan kanta, kita boleh menggunakan formula kanta:


      1/f = 1/v - 1/u


      dengan f ialah panjang fokus kanta, v ialah jarak antara kanta dan imej, dan u ialah jarak antara objek dan kanta.


      Memandangkan panjang fokus (f) ialah 20 cm dan jarak antara kanta dan imej (v) ialah 25 cm, kita boleh memasukkan nilai
      ini ke dalam formula:


      1/20 = 1/25 - 1/u


      Sekarang, kami perlu menyelesaikan untuk anda:


      1/u = 1/20 - 1/25

      1/u = (25 - 20) / (20 * 25)

      1/u = 5 / 500

      1/u = 1/100


      u = 100 cm


      Jadi, jarak antara objek dan kanta ialah 100 cm.'
    - 'Beberapa pengkritik telah menuduh kerajaan Malaysia tidak melakukan cukup untuk menyiasat dan mendakwa Najib Razak
      dan ahli politik lain yang dituduh rasuah atas beberapa sebab:


      1. Persepsi Interferensi Politik: Pengkritik berpendapat bahawa terdapat kekurangan kemahuan politik untuk menyiasat
      dan mendakwa ahli politik rasuah secara menyeluruh, terutamanya mereka daripada gabungan pemerintah sebelum ini, Barisan
      Nasional (BN), di mana Najib Razak berada. Kerajaan baharu, yang diketuai oleh Pakatan Harapan (PH), berkuasa pada 2018
      berjanji untuk menangani rasuah, tetapi pengkritik mendakwa bahawa kadar penyiasatan dan pendakwaan adalah perlahan.


      2. Kelewatan dalam Prosiding Undang-undang: Proses undang-undang terhadap Najib Razak dan ahli politik lain telah dikritik
      kerana lambat dan ditarik keluar. Pengkritik mendakwa bahawa kelewatan adalah akibat campur tangan politik dan manipulasi
      sistem perundangan.


      3. Kekurangan Ketelusan: Pengkritik juga menuduh kerajaan kekurangan ketelusan dalam proses penyiasatan dan pendakwaan.
      Mereka berhujah bahawa dokumen dan bukti utama belum didedahkan kepada umum, menjadikannya sukar untuk menentukan tahap
      sebenar rasuah.


      4. Perlindungan Pemberi Maklumat Tidak mencukupi: Pemberi maklumat yang telah tampil dengan maklumat tentang rasuah
      telah melaporkan menghadapi gangguan, intimidasi dan ancaman undang-undang. Pengkritik berpendapat bahawa ini telah
      memberi kesan yang menyeramkan kepada bakal pemberi maklumat dan telah menyukarkan untuk mendedahkan rasuah.


      5. Kelemahan dalam Sistem Undang-undang: Pengkritik mendakwa bahawa sistem perundangan Malaysia lemah dan terdedah kepada
      campur tangan politik, menjadikannya sukar untuk mendakwa ahli politik peringkat tinggi yang dituduh rasuah. Mereka
      berhujah bahawa kerajaan perlu mengukuhkan sistem perundangan dan memastikan kemerdekaannya untuk menangani rasuah dengan
      berkesan.


      6. Skop Penyiasatan: Sesetengah pengkritik menuduh kerajaan memberi tumpuan terlalu sempit kepada individu dan kes tertentu,
      sambil mengabaikan contoh rasuah lain. Mereka berpendapat bahawa pendekatan yang lebih komprehensif diperlukan untuk
      menangani rasuah dengan berkesan di Malaysia.


      Adalah penting untuk ambil perhatian bahawa kerajaan Malaysia telah mengekalkan bahawa ia komited untuk memerangi rasuah
      dan telah mengambil langkah untuk menyiasat dan mendakwa ahli politik yang dituduh rasuah. Walau bagaimanapun, pengkritik
      terus menimbulkan kebimbangan tentang usaha kerajaan dalam bidang ini.'
    - 'Najib Razak''s trial for corruption and money laundering has had a significant negative impact on public perception
      of his leadership and the United Malays National Organization (UMNO) party. Najib is the former Prime Minister of Malaysia,
      and the charges against him are related to the 1MDB scandal, in which billions of dollars were allegedly misappropriated
      from a Malaysian state investment fund.


      The trial has brought renewed attention to issues of corruption and cronyism in Malaysia, and many Malaysians feel that
      the UMNO party, which Najib led until his election defeat in 2018, is tainted by association. The party, which has long
      been a dominant force in Malaysian politics, has seen its popularity decline as a result of the scandal and the trial.


      The trial has also raised questions about the effectiveness of Malaysia''s anti-corruption efforts and the rule of law
      in the country. Many Malaysians are disappointed that it took so long for Najib to be charged and brought to trial,
      and some feel that the legal process has been politically motivated.


      Overall, the trial has contributed to a sense of disillusionment and mistrust among the Malaysian public, and has damaged
      the reputation of the UMNO party and its leaders. It remains to be seen how the trial will ultimately be resolved, and
      what the long-term impact will be on Malaysian politics and society.'
