- source_sentence: A Sophie Germain prime is a prime number p such that 2p + 1 is also prime. The smallest Sophie Germain
    prime greater than 100 is 107, because 107 is prime and 2(107) + 1 = 215 + 1 = 216, which is also prime.
  sentences:
  - 'Dalam teori medan kuantum dimensi 1+1, kami mempertimbangkan dua medan skalar φ(x) dan ψ(y) dengan jisim m1 dan m2, masing-masing.
    Pengembangan produk operator (OPE) ialah pengembangan rasmi produk kedua-dua bidang ini dari segi operator tempatan pada
    satu titik. Kami menganggap bahawa kedua-dua medan dipisahkan dengan jarak x = |x - y|. OPE boleh ditulis sebagai:


    φ(x)ψ(y) = ∑_n C_n(x-y) O_n(y),


    dengan C_n(x-y) ialah pekali OPE dan O_n(y) ialah pengendali tempatan.


    Untuk mencari istilah utama dan subleading dalam pengembangan, kita perlu mempertimbangkan dimensi penskalaan medan dan
    pengendali. Dimensi penskalaan medan skalar dengan jisim m dalam dimensi 1+1 diberikan oleh:


    Δ = (1/2) + √((1/4) + m^2),


    di mana kita telah menetapkan kelajuan cahaya c dan pemalar Planck yang dikurangkan ħ kepada 1 untuk kesederhanaan.


    Untuk istilah utama dalam OPE, kami menganggap pengendali identiti O_0(y) = I, yang mempunyai dimensi penskalaan Δ_0 =
    0. Pekali OPE C_0(x-y) diberikan oleh:


    C_0(x-y) = (x-y)^(-Δ_φ - Δ_ψ),


    dengan Δ_φ dan Δ_ψ ialah dimensi penskalaan bagi medan φ(x) dan ψ(y), masing-masing.


    Istilah subleading dalam OPE melibatkan tensor tenaga-tegasan T(y), yang mempunyai dimensi penskalaan Δ_T = 2. Pekali
    OPE C_T(x-y) diberikan oleh:


    C_T(x-y) = (x-y)^(-Δ_φ - Δ_ψ + Δ_T).


    Apabila kedua-dua medan mempunyai jisim m1 dan m2 yang berbeza, dimensi penskalaan mereka akan berbeza:


    Δ_φ = (1/2) + √((1/4) + m1^2),

    Δ_ψ = (1/2) + √((1/4) + m2^2).


    Ini akan menjejaskan pekali OPE C_0(x-y) dan C_T(x-y), tetapi struktur keseluruhan OPE kekal sama. Istilah utama masih
    akan diberikan oleh pengendali identiti, dan istilah subleading masih akan melibatkan tensor tenaga-tegasan.'
  - 'Mahathir Mohamad, who has served as the Prime Minister of Malaysia on two separate occasions (1981-2003 and 2018-2020),
    has been accused of authoritarian tendencies due to his actions and policies that concentrated power in the executive
    branch, undermined the independence of the judiciary, and suppressed political dissent during his tenure. Some of the
    key actions and impacts of his leadership on Malaysia''s democratic institutions and the rule of law include:


    1. Strengthening the executive branch: Mahathir consolidated power within the office of the Prime Minister and weakened
    other democratic institutions. He introduced various constitutional amendments that expanded the powers of the Prime Minister,
    allowing for greater control over the appointment and removal of key government officials, including the Attorney General,
    the Chief Justice, and members of the Election Commission.

    2. Undermining the independence of the judiciary: Mahathir''s government was involved in several high-profile cases that
    raised concerns about the independence and integrity of the Malaysian judiciary. In 1988, Mahathir initiated a controversial
    amendment to the Constitution, which led to the removal and detention of the Lord President of the Supreme Court, Tun
    Salleh Abas, and two other Supreme Court judges. This event significantly undermined the independence of the judiciary,
    as it demonstrated the executive''s ability to interfere in the judicial process.

    3. Suppressing political dissent: Mahathir''s government took various measures to suppress political dissent and restrict
    civil liberties, including the use of the Internal Security Act (ISA) to detain opposition leaders, activists, and journalists
    without trial. The ISA was widely criticized for being an instrument of political repression, and its use led to the arrest
    of several high-profile individuals, including the Deputy Prime Minister Anwar Ibrahim in 1998.

    4. Weakening the rule of law: Mahathir''s government was involved in various scandals and controversies that raised questions
    about the rule of law in Malaysia. For instance, the 1997 Asian Financial Crisis led to the introduction of controversial
    policies, such as capital controls, that were seen as undermining the rule of law and the sanctity of contracts. Additionally,
    Mahathir''s handling of Anwar Ibrahim''s sodomy charges and subsequent trial was widely criticized for being politically
    motivated and lacking due process.


    In conclusion, Mahathir Mohamad has been accused of authoritarian tendencies due to his actions and policies that undermined
    democratic institutions, weakened the independence of the judiciary, suppressed political dissent, and eroded the rule
    of law during his tenure as Prime Minister. While he has been praised for his role in Malaysia''s economic development
    and modernization, his legacy has been marred by concerns about his approach to governance and human rights.'
  - Perdana Sophie Germain ialah nombor perdana p supaya 2p + 1 juga adalah perdana. Perdana Sophie Germain terkecil yang
    lebih besar daripada 100 ialah 107, kerana 107 ialah perdana dan 2(107) + 1 = 215 + 1 = 216, yang juga perdana.
