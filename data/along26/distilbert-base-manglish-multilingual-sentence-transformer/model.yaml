  - 'Kerajaan Malaysia, sejak pertukaran kuasa dalam pilihan raya umum 2018, telah mengambil beberapa langkah untuk menangani
    kebimbangan mengenai kronisme dan penyalahgunaan kuasa oleh ahli politik dan elit perniagaan, termasuk yang dikaitkan
    dengan bekas Perdana Menteri Najib Razak dan Pertubuhan Kebangsaan Melayu Bersatu (UMNO).


    1. Siasatan dan pertuduhan: Suruhanjaya Pencegahan Rasuah Malaysia (SPRM) telah melancarkan penyiasatan ke atas beberapa
    kes dakwaan rasuah dan penyelewengan dana awam, termasuk skandal 1MDB, yang melibatkan penyelewengan berbilion dolar daripada
    dana pelaburan negeri. Najib Razak dan beberapa pegawai tinggi UMNO lain telah didakwa dan kini menghadapi perbicaraan
    atas pelbagai kesalahan berkaitan rasuah.


    2. Rampasan aset: Sebagai sebahagian daripada penyiasatan, kerajaan Malaysia telah merampas aset dan akaun bank beku yang
    dikaitkan dengan mereka yang dituduh rasuah. Ini termasuk hartanah mewah, kenderaan mewah, dan karya seni berharga.


    3. Perlindungan pemberi maklumat: Kerajaan telah memperkenalkan langkah-langkah untuk melindungi pemberi maklumat yang
    melaporkan kes rasuah dan salah laku. Akta Perlindungan Pemberi Maklumat 2010 telah dipinda pada 2018 untuk memperluaskan
    skop perlindungan dan menyediakan insentif yang lebih baik untuk pemberi maklumat.


    4. Memperkukuh institusi: Kerajaan telah berjanji untuk mengukuhkan institusi utama yang bertanggungjawab untuk memerangi
    rasuah, seperti SPRM, Jabatan Peguam Negara, dan badan kehakiman. Ini termasuk usaha untuk meningkatkan kemerdekaan mereka,
    meningkatkan kapasiti mereka, dan meningkatkan akauntabiliti mereka.


    5. Pelan Anti-Rasuah Nasional: Kerajaan telah melancarkan Pelan Anti-Rasuah Nasional (NACP), yang menggariskan strategi
    dan tindakan untuk mencegah dan memerangi rasuah di Malaysia. NACP meliputi pelbagai sektor, termasuk pentadbiran awam,
    penguatkuasaan undang-undang, perniagaan, dan masyarakat sivil.


    6. Mempromosikan ketelusan dan akauntabiliti: Kerajaan telah memperkenalkan langkah-langkah untuk menggalakkan ketelusan
    dan akauntabiliti dalam pentadbiran awam, seperti pengenalan Akta Pengurusan Kewangan dan Akauntabiliti 1990 dan penubuhan
    Pihak Berkuasa Pelaporan Kewangan Kebangsaan (NFRA).


    Usaha-usaha ini menunjukkan komitmen kerajaan Malaysia untuk menangani kebimbangan mengenai kronisme dan penyalahgunaan
    kuasa oleh ahli politik dan elit perniagaan. Walau bagaimanapun, adalah penting untuk ambil perhatian bahawa kejayaan
    langkah-langkah ini akan bergantung kepada pelaksanaan dan penguatkuasaan mereka, serta komitmen berterusan kerajaan dan
    pihak berkepentingan yang berkaitan untuk memerangi rasuah.'
