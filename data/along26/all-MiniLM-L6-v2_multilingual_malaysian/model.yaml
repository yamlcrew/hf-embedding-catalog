  - source_sentence: 'The 1MDB scandal, which involved the alleged embezzlement of billions of dollars from the Malaysian
      state investment fund, has had significant repercussions for Malaysia''s reputation and international relations. The
      scandal gained widespread attention in 2015, leading to investigations and legal actions in several countries.


      The international community has generally responded negatively to the 1MDB scandal, with many countries taking steps
      to recover stolen assets and prosecute those involved. The United States Department of Justice (DOJ) launched a civil
      forfeiture action in 2016 to recover over $1 billion in assets acquired with funds misappropriated from 1MDB. The DOJ
      alleged that more than $4.5 billion had been stolen from 1MDB, with much of it flowing through US banks.


      Other countries, including Switzerland, Singapore, and Luxembourg, have also taken action to recover stolen assets and
      prosecute those involved. In addition, international financial institutions, such as the World Bank, have called for
      greater transparency and accountability in Malaysia''s financial sector.


      Former Malaysian Prime Minister Najib Razak, who has been implicated in the scandal, was arrested and charged with multiple
      counts of corruption, money laundering, and abuse of power in 2018. His trial is ongoing, and he has pleaded not guilty
      to all charges.


      The 1MDB scandal has had a significant impact on Malaysia''s reputation and international relations. The country''s
      image has been tarnished, and its reputation as a stable and corruption-free country has been damaged. Malaysia has
      faced increased scrutiny and pressure from the international community to address corruption and improve governance.


      The scandal has also strained Malaysia''s relations with some countries, particularly the United States. While the US
      has cooperated with Malaysia in the investigation and recovery of stolen assets, the scandal has led to tensions between
      the two countries.


      However, the new Malaysian government, led by Prime Minister Anwar Ibrahim, has taken steps to restore Malaysia''s reputation
      and improve its relations with the international community. Anwar has pledged to prioritize anti-corruption efforts
      and has established a special task force to investigate and prosecute corruption cases. The government has also expressed
      its commitment to cooperating with international partners in the investigation and recovery of stolen assets related
      to the 1MDB scandal.


      In summary, the international community has responded negatively to the 1MDB scandal and Najib Razak''s prosecution.
      The scandal has damaged Malaysia''s reputation and strained its relations with some countries, but the new government''s
      commitment to addressing corruption and cooperating with international partners may help to restore Malaysia''s reputation
      and improve its relations with the international community.'
    sentences:
    - 'Skandal 1MDB, yang melibatkan dakwaan penyelewengan berbilion dolar daripada dana pelaburan negara Malaysia, telah
