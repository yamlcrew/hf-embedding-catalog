- source_sentence: 'The Malaysian political landscape is indeed fragmented, with a multitude of parties and coalitions. This
    can be attributed to several factors, including:


    1. Ethnic and Religious Diversity: Malaysia is a multiracial and multireligious country, with the three major ethnic groups
    being the Malays, Chinese, and Indians. This diversity has led to the formation of numerous political parties to represent
    the interests of each community.


    2. Historical Background: The political landscape in Malaysia has been shaped by its colonial past and the struggle for
    independence. The two major coalitions, the Barisan Nasional (BN) and the Pakatan Harapan (PH), have their roots in the
    political parties that emerged during the anti-colonial movement.


    3. Power Sharing: The need to share power among the different ethnic groups has resulted in the formation of coalitions.
    The BN, for instance, was a coalition of race-based parties that ruled Malaysia for over 60 years until its defeat in
    the 2018 general election. The PH, on the other hand, is a coalition of multiracial parties that came to power in 2018.


    4. Electoral System: The first-past-the-post system used in Malaysia encourages the formation of multiple parties and
    coalitions. This system tends to favor larger parties and coalitions, which has led to smaller parties joining larger
    ones to increase their chances of winning elections.


    As of now, there are 19 registered political parties in Malaysia. The two major coalitions, BN and PH, consist of several
    parties each. The BN includes the United Malays National Organisation (UMNO), the Malaysian Chinese Association (MCA),
    and the Malaysian Indian Congress (MIC), among others. The PH includes the Democratic Action Party (DAP), Parti Keadilan
    Rakyat (PKR), and the People''s Justice Party (Parti Keadilan Rakyat), among others.


    In the 2018 general election, the BN won 79 out of 222 seats, while the PH won 113 seats. The rest of the seats were won
    by other parties and coalitions, reflecting the fragmented nature of Malaysian politics.'
  sentences:
  - 'Landskap politik Malaysia sememangnya berpecah-belah, dengan pelbagai parti dan gabungan. Ini boleh dikaitkan dengan
    beberapa faktor, termasuk:


    1. Kepelbagaian Etnik dan Agama: Malaysia adalah sebuah negara berbilang kaum dan berbilang agama, dengan tiga kumpulan
    etnik utama adalah Melayu, Cina, dan India. Kepelbagaian ini telah membawa kepada pembentukan banyak parti politik untuk
    mewakili kepentingan setiap masyarakat.


    2. Latar Belakang Sejarah: Landskap politik di Malaysia telah dibentuk oleh zaman penjajahannya dan perjuangan untuk kemerdekaan.
    Dua gabungan utama, Barisan Nasional (BN) dan Pakatan Harapan (PH), mempunyai akar umbi dalam parti politik yang muncul
    semasa gerakan anti-koloni.


    3. Perkongsian Kuasa: Keperluan untuk berkongsi kuasa di kalangan kumpulan etnik yang berbeza telah mengakibatkan pembentukan
    gabungan. BN, misalnya, adalah gabungan parti berasaskan kaum yang memerintah Malaysia selama lebih 60 tahun sehingga
    kekalahannya dalam pilihan raya umum 2018. PH, sebaliknya, adalah gabungan parti berbilang kaum yang berkuasa pada 2018.


    4. Sistem Pilihan Raya: Sistem past-the-post pertama yang digunakan di Malaysia menggalakkan pembentukan berbilang parti
    dan gabungan. Sistem ini cenderung memihak kepada parti dan gabungan yang lebih besar, yang telah menyebabkan parti yang
    lebih kecil menyertai parti yang lebih besar untuk meningkatkan peluang mereka memenangi pilihan raya.


    Sehingga kini, terdapat 19 parti politik berdaftar di Malaysia. Dua gabungan utama, BN dan PH, terdiri daripada beberapa
    parti masing-masing. BN termasuk Pertubuhan Kebangsaan Melayu Bersatu (UMNO), Persatuan Cina Malaysia (MCA), dan Kongres
    India Malaysia (MIC), antara lain. PH termasuk Parti Tindakan Demokratik (DAP), Parti Keadilan Rakyat (PKR), dan Parti
    Keadilan Rakyat (Parti Keadilan Rakyat), antara lain.


    Pada pilihan raya umum 2018, BN memenangi 79 daripada 222 kerusi, manakala PH memenangi 113 kerusi. Selebihnya kerusi
    dimenangi oleh parti dan gabungan lain, mencerminkan sifat politik Malaysia yang berpecah-belah.'
