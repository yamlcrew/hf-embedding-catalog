    - 'Untuk mengira fugacity nitrogen dalam campuran, kita boleh menggunakan persamaan berikut:


      fugacity = pecahan mol * tekanan separa


      Pertama, kita perlu mencari tekanan separa nitrogen dalam campuran. Kita boleh melakukan ini dengan mendarabkan jumlah
      tekanan dengan pecahan mol nitrogen:


      separa_tekanan_N2 = jumlah_tekanan * mol_pecahan_N2

      tekanan_separa_N2 = 1 atm * 0.2

      tekanan_separa_N2 = 0.2 atm


      Sekarang, kita boleh mengira fugacity nitrogen dalam campuran:


      fugacity_N2 = mol_fraction_N2 * separa_tekanan_N2

      fugacity_N2 = 0.2 * 0.2 atm

      fugacity_N2 = 0.04 atm


      Jadi, kekasaran nitrogen dalam campuran pada suhu dan tekanan piawai (STP) ialah 0.04 atm.'
  - source_sentence: 'Malaysia''s political scene has been characterized by issues of corruption, cronyism, and racial politics
      for several decades. While I cannot provide the latest data, I can share some historical statistics and context to help
      explain this phenomenon.


      1. Corruption:

      Transparency International''s Corruption Perceptions Index (CPI) consistently ranks Malaysia lower than many of its
      regional peers. In the 2021 CPI, Malaysia ranked 62nd out of 180 countries, with a score of 51 out of 100 (0 means highly
      corrupt, and 100 means very clean). This indicates a perception of significant corruption within the country''s public
      sector.


      In the past, high-profile corruption cases, such as the 1Malaysia Development Berhad (1MDB) scandal, have involved senior
      political figures, contributing to public distrust and dissatisfaction. The 1MDB scandal involved billions of dollars
      being misappropriated from a state investment fund, with connections to then-Prime Minister Najib Razak.


      1. Cronyism:

      Cronyism, or the practice of awarding contracts, jobs, and other benefits to friends, family, and political supporters,
      has been a persistent issue in Malaysia. In a 2014 report by the Malaysia''s Asian Strategy and Leadership Institute,
      it was estimated that politically-connected businesses controlled around 27% of the total market capitalization of the
      Malaysian stock market. This statistic suggests that cronyism has been deeply entrenched in the country''s business
      landscape.


      1. Racial Politics:

      Malaysia is a multi-ethnic society, with a population composed of Malays, Chinese, Indians, and various indigenous groups.
      Race-based politics have been prevalent since the country''s independence in 1957, with the ruling coalition, the Barisan
      Nasional (National Front), historically dominated by Malay-based parties. This political landscape has created an environment
      where race-based policies, such as affirmative action for the Malay majority, have been implemented, sometimes leading
      to tension and perceptions of inequality among the other ethnic groups.


      In the 2018 general election, a multi-ethnic coalition called Pakatan Harapan (Alliance of Hope) won power, marking
      a significant shift in Malaysian politics. However, this coalition collapsed in 2020, and a new Malay-dominated coalition,
      Perikatan Nasional (National Alliance), took over.


      While Malaysia has made strides in addressing these issues, the historical and ongoing challenges of corruption, cronyism,
      and racial politics continue to shape its political scene.'
