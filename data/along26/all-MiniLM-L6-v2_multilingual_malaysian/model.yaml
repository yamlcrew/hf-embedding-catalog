  - 'Adegan politik Malaysia telah dicirikan oleh isu rasuah, kronisme, dan politik perkauman selama beberapa dekad. Walaupun
    saya tidak dapat memberikan data terkini, saya boleh berkongsi beberapa statistik dan konteks sejarah untuk membantu menjelaskan
    fenomena ini.


    1. Rasuah:

    Indeks Persepsi Rasuah (CPI) Transparency International secara konsisten meletakkan Malaysia lebih rendah daripada kebanyakan
    rakan serantaunya. Dalam CPI 2021, Malaysia menduduki tempat ke-62 daripada 180 negara, dengan skor 51 daripada 100 (0
    bermaksud sangat rasuah, dan 100 bermaksud sangat bersih). Ini menunjukkan persepsi rasuah yang ketara dalam sektor awam
    negara.


    Pada masa lalu, kes rasuah berprofil tinggi, seperti skandal 1Malaysia Development Berhad (1MDB), telah melibatkan tokoh
    politik kanan, menyumbang kepada ketidakpercayaan dan ketidakpuasan hati orang ramai. Skandal 1MDB melibatkan berbilion
    dolar yang diselewengkan daripada dana pelaburan negeri, dengan hubungan dengan Perdana Menteri Najib Razak ketika itu.


    1. Cronyisme:

    Cronyisme, atau amalan menganugerahkan kontrak, pekerjaan, dan faedah lain kepada rakan, keluarga, dan penyokong politik,
    telah menjadi isu berterusan di Malaysia. Dalam laporan 2014 oleh Institut Strategi dan Kepimpinan Asia Malaysia, dianggarkan
    perniagaan yang berkaitan dengan politik mengawal sekitar 27% daripada jumlah permodalan pasaran pasaran saham Malaysia.
    Statistik ini menunjukkan bahawa kronisme telah berakar umbi dalam landskap perniagaan negara.


    1. Politik Kaum:

    Malaysia ialah masyarakat berbilang etnik, dengan populasi terdiri daripada orang Melayu, Cina, India, dan pelbagai kumpulan
    orang asli. Politik berasaskan kaum telah berleluasa sejak kemerdekaan negara pada tahun 1957, dengan gabungan pemerintah,
    Barisan Nasional (Barisan Nasional), secara sejarah dikuasai oleh parti berasaskan Melayu. Landskap politik ini telah
    mewujudkan persekitaran di mana dasar berasaskan kaum, seperti tindakan afirmatif untuk majoriti Melayu, telah dilaksanakan,
    kadangkala membawa kepada ketegangan dan persepsi ketidaksamaan di kalangan kumpulan etnik lain.


    Dalam pilihan raya umum 2018, gabungan berbilang etnik yang dipanggil Pakatan Harapan (Alliance of Hope) memenangi kuasa,
    menandakan perubahan ketara dalam politik Malaysia. Walau bagaimanapun, gabungan ini runtuh pada 2020, dan gabungan baharu
    yang dikuasai Melayu, Perikatan Nasional (Perikatan Nasional), mengambil alih.


    Walaupun Malaysia telah mengorak langkah dalam menangani isu-isu ini, cabaran sejarah dan berterusan rasuah, kronisme,
    dan politik perkauman terus membentuk senario politiknya.'
