      Bekas Perdana Menteri Malaysia Najib Razak, yang terlibat dalam skandal itu, telah ditangkap dan didakwa dengan pelbagai
      pertuduhan rasuah, pengubahan wang haram, dan salah guna kuasa pada 2018. Perbicaraannya sedang dijalankan, dan dia
      mengaku tidak bersalah atas semua pertuduhan.


      Skandal 1MDB telah memberi kesan yang besar kepada reputasi dan hubungan antarabangsa Malaysia. Imej negara itu telah
      tercemar, dan reputasinya sebagai sebuah negara yang stabil dan bebas rasuah telah rosak. Malaysia telah menghadapi
      peningkatan penelitian dan tekanan daripada masyarakat antarabangsa untuk menangani rasuah dan meningkatkan tadbir urus.


      Skandal itu juga telah menjejaskan hubungan Malaysia dengan beberapa negara, terutamanya Amerika Syarikat. Walaupun
      AS telah bekerjasama dengan Malaysia dalam penyiasatan dan pemulihan aset yang dicuri, skandal itu telah membawa kepada
