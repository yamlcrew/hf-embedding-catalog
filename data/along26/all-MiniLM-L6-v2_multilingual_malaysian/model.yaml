  - 'Untuk mencari ukuran sudut yang bertentangan dengan sisi dengan panjang 10, kita boleh menggunakan Hukum Kosinus. Hukum
    Kosinus menyatakan bahawa untuk mana-mana segitiga dengan sisi panjang a, b, dan c, dan sudut C bertentangan dengan sisi
    c:


    c² = a² + b² - 2ab * cos(C)


    Dalam kes ini, a = 7, b = 9, dan c = 10. Kami ingin mencari sudut C. Memasukkan nilai, kami mendapat:


    10² = 7² + 9² - 2 * 7 * 9 * cos(C)


    100 = 49 + 81 - 126 * cos(C)


    100 = 130 - 126 * cos(C)


    Sekarang, kita asingkan cos(C):


    -30 = -126 * cos(C)


    cos(C) = 30/126


    cos(C) ≈ 0.2381


    Sekarang, kita mencari sudut C dengan mengambil kosinus songsang (arccos) 0.2381:


    C = arccos(0.2381)


    C ≈ 76.37°


    Jadi, ukuran sudut bertentangan dengan sisi dengan panjang 10 ialah lebih kurang 76.37°.'
