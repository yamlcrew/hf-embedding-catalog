  - 'Untuk mengira kekonduksian terma hablur silikon, kita perlu menentukan halaju purata fonon (v). Kita boleh menggunakan
    model Debye untuk menganggarkan halaju fonon. Kekerapan Debye (ωD) boleh dikira menggunakan formula berikut:


    ωD = (6π²n)^(1/3) * lwn


    dengan n ialah bilangan atom per unit isipadu, dan vs ialah kelajuan purata bunyi dalam bahan. Untuk silikon, kelajuan
    purata bunyi adalah lebih kurang 9,000 m/s.


    Pertama, kita perlu mencari bilangan atom per unit isipadu (n). Silikon mempunyai struktur kristal kubik berpusat muka
    (FCC). Bilangan atom dalam sel unit FCC ialah 4. Isipadu sel unit boleh dikira sebagai:


    V = a³


    dengan a ialah pemalar kekisi (0.543 nm). Menukar pemalar kekisi kepada meter:


    a = 0.543 * 10^(-9) m


    V = (0.543 * 10^(-9) m)³ = 1.606 * 10^(-28) m³


    Sekarang, kita boleh mencari bilangan atom per unit isipadu:


    n = 4 atom / (1.606 * 10^(-28) m³) = 2.49 * 10^(28) atom/m³


    Seterusnya, kita boleh mengira kekerapan Debye:


    ωD = (6π² * 2.49 * 10^(28))^(1/3) * 9,000 m/s ≈ 4.42 * 10^(13) s^(-1)


    Halaju purata fonon (v) boleh dianggarkan sebagai:


    v = ωD * a / (2π) ≈ (4.42 * 10^(13) s^(-1)) * (0.543 * 10^(-9) m) / (2π) ≈ 3.82 * 10^4 m/s


    Sekarang kita mempunyai semua nilai yang diperlukan untuk mengira kekonduksian terma (k):


    k = (1/3) * Cp * v * l


    Pertama, kita perlu menukar kapasiti haba tentu (Cp) kepada J/(kg K) menggunakan jisim molar silikon (28.085 g/mol):


    Cp = 0.71 J/(g K) * (1 mol / 28.085 g) * (28.085 * 10^3 g / kg) = 710 J/(kg K)


    Sekarang, kita boleh mengira kekonduksian terma:


    k = (1/3) * 710 J/(kg K) * 3.82 * 10^4 m/s * 100 * 10^(-9) m ≈ 71.7 W/(m K)


    Jadi, kekonduksian haba kristal silikon pada 300 K dengan jarak kekisi 0.543 nm adalah lebih kurang 71.7 W/(m K).'
- source_sentence: 'The international community has been closely watching Malaysia''s fight against corruption, particularly
    in light of the 1MDB scandal and Najib Razak''s administration, due to several reasons.


    Firstly, the 1MDB (1Malaysia Development Berhad) scandal involved the alleged embezzlement of billions of dollars from
    a Malaysian state investment fund, with reports indicating that funds were siphoned off for the personal gain of high-ranking
    officials, including former Prime Minister Najib Razak. The scandal attracted international attention due to the sheer
    scale of the alleged corruption, as well as the involvement of high-profile figures in the global financial industry.


    Secondly, the 1MDB scandal raised questions about the rule of law and good governance in Malaysia, as well as the ability
    of the country''s institutions to hold powerful individuals accountable for their actions. The lack of transparency and
    apparent impunity for those involved in the scandal undermined public trust in the government and the political system.


    Thirdly, the 1MDB scandal had broader implications for the global financial system, as it exposed vulnerabilities in the
    regulation and oversight of cross-border financial transactions. The scandal also raised concerns about the role of international
    banks and financial institutions in enabling corruption and money laundering.


    Finally, the election of a new government in Malaysia in 2018, led by Prime Minister Mahathir Mohamad, marked a significant
    turning point in the country''s fight against corruption. The new government has taken steps to investigate and prosecute
    those involved in the 1MDB scandal, as well as to implement reforms aimed at improving transparency and accountability
    in government. These efforts have been closely watched by the international community as a test case for Malaysia''s commitment
    to good governance and the rule of law.


    In summary, the international community has been watching Malaysia''s fight against corruption closely in light of the
    1MDB scandal and Najib Razak''s administration due to the scale of the alleged corruption, the implications for the rule
    of law and good governance, the broader impact on the global financial system, and the potential for reform under the
    new government.'
  sentences:
  - 'Masyarakat antarabangsa telah memerhatikan dengan teliti perjuangan Malaysia menentang rasuah, terutamanya memandangkan
    skandal 1MDB dan pentadbiran Najib Razak, atas beberapa sebab.


    Pertama, skandal 1MDB (1Malaysia Development Berhad) melibatkan dakwaan penyelewengan berbilion dolar daripada dana pelaburan
    negara Malaysia, dengan laporan menunjukkan bahawa dana telah disiphone untuk kepentingan peribadi pegawai tinggi, termasuk
    bekas Perdana Menteri Najib Razak. Skandal itu menarik perhatian antarabangsa kerana skala semata-mata rasuah yang didakwa,
    serta penglibatan tokoh berprofil tinggi dalam industri kewangan global.


    Kedua, skandal 1MDB menimbulkan persoalan tentang kedaulatan undang-undang dan tadbir urus yang baik di Malaysia, serta
    keupayaan institusi negara untuk mempertanggungjawabkan individu berkuasa atas tindakan mereka. Kekurangan ketelusan dan
    impunitas yang jelas bagi mereka yang terlibat dalam skandal itu menjejaskan kepercayaan orang ramai terhadap kerajaan
    dan sistem politik.


    Ketiga, skandal 1MDB mempunyai implikasi yang lebih luas terhadap sistem kewangan global, kerana ia mendedahkan kelemahan
    dalam peraturan dan pengawasan transaksi kewangan rentas sempadan. Skandal itu juga menimbulkan kebimbangan tentang peranan
    bank antarabangsa dan institusi kewangan dalam membolehkan rasuah dan pengubahan wang haram.


    Akhirnya, pemilihan kerajaan baharu di Malaysia pada 2018, yang diketuai oleh Perdana Menteri Mahathir Mohamad, menandakan
    titik perubahan yang ketara dalam perjuangan negara menentang rasuah. Kerajaan baharu telah mengambil langkah untuk menyiasat
    dan mendakwa mereka yang terlibat dalam skandal 1MDB, serta melaksanakan pembaharuan yang bertujuan untuk meningkatkan
    ketelusan dan akauntabiliti dalam kerajaan. Usaha-usaha ini telah diperhatikan dengan teliti oleh masyarakat antarabangsa
    sebagai kes ujian untuk komitmen Malaysia terhadap tadbir urus yang baik dan kedaulatan undang-undang.


    Ringkasnya, masyarakat antarabangsa telah memerhatikan perjuangan Malaysia menentang rasuah dengan teliti memandangkan
    skandal 1MDB dan pentadbiran Najib Razak kerana skala rasuah yang didakwa, implikasi terhadap kedaulatan undang-undang
    dan tadbir urus yang baik, kesan yang lebih luas terhadap sistem kewangan global, dan potensi pembaharuan di bawah kerajaan
    baharu.'
  - 'Kecekapan penjerapan karbon teraktif terhadap bahan pencemar tertentu boleh dipengaruhi dengan ketara oleh pelbagai parameter
    seperti pH, suhu dan kepekatan. Begini cara setiap parameter ini boleh mempengaruhi proses penjerapan:


    1. pH: pH larutan boleh menjejaskan kecekapan penjerapan karbon teraktif. Ini kerana pH boleh mengubah cas permukaan kedua-dua
    karbon teraktif dan molekul pencemar. Pada tahap pH yang berbeza, interaksi elektrostatik antara karbon teraktif dan bahan
    pencemar boleh menjadi menarik atau menjijikkan, yang seterusnya menjejaskan proses penjerapan. Sebagai contoh, jika bahan
    pencemar adalah anionik (bercas negatif), ia akan diserap dengan lebih cekap pada tahap pH yang lebih rendah, di mana
    permukaan karbon teraktif bercas lebih positif. Sebaliknya, jika bahan pencemar adalah kationik (bercas positif), ia akan
    diserap dengan lebih cekap pada tahap pH yang lebih tinggi, di mana permukaan karbon teraktif lebih bercas negatif.


    2. Suhu: Suhu juga boleh mempengaruhi kecekapan penjerapan karbon teraktif. Secara amnya, penjerapan adalah proses eksotermik,
    bermakna ia membebaskan haba. Akibatnya, peningkatan suhu boleh mengurangkan kecekapan penjerapan, kerana proses menjadi
    kurang baik secara termodinamik. Walau bagaimanapun, kesan suhu ke atas penjerapan juga berkaitan dengan bahan pencemar
    khusus dan karbon teraktif yang digunakan. Dalam sesetengah kes, peningkatan suhu boleh meningkatkan kecekapan penjerapan
    dengan meningkatkan kadar resapan molekul pencemar dan meningkatkan pemindahan jisim antara larutan dan permukaan karbon
    teraktif.


    3. Kepekatan: Kepekatan bahan pencemar dalam larutan juga boleh menjejaskan kecekapan penjerapan karbon teraktif. Pada
    kepekatan yang lebih rendah, proses penjerapan biasanya lebih cekap, kerana terdapat kurang persaingan antara molekul
    pencemar untuk tapak penjerapan yang tersedia pada permukaan karbon teraktif. Apabila kepekatan bahan pencemar meningkat,
    kecekapan penjerapan mungkin berkurangan disebabkan oleh ketepuan permukaan karbon teraktif. Walau bagaimanapun, hubungan
    antara kepekatan dan kecekapan penjerapan boleh menjadi rumit dan mungkin bergantung pada bahan pencemar khusus dan karbon
    teraktif yang digunakan.


    Secara ringkasnya, kecekapan penjerapan karbon teraktif terhadap bahan pencemar tertentu boleh dipengaruhi oleh pelbagai
    parameter, termasuk pH, suhu dan kepekatan. Memahami kesan ini boleh membantu mengoptimumkan proses penjerapan untuk penyingkiran
    bahan pencemar dan meningkatkan prestasi keseluruhan karbon teraktif dalam rawatan air dan aplikasi lain.'
  - 'To determine if the fertilizer is effective in increasing the height of the plants, we will perform a hypothesis test
    using the given information. We will use a one-sample t-test since we are comparing the mean height of a sample to the
    known mean height of the population.


    Step 1: State the null and alternative hypotheses

    Null hypothesis (H0): The fertilizer has no effect on the height of the plants. The mean height remains the same (µ =
    60 cm).

    Alternative hypothesis (H1): The fertilizer increases the height of the plants (µ > 60 cm).


    Step 2: Determine the significance level (α)

    The significance level is given as 0.05.


    Step 3: Calculate the test statistic

    We are given the following information:

    - Population mean (µ) = 60 cm

    - Sample mean (x̄) = 65 cm

    - Sample size (n) = 25 plants

    - We need to estimate the standard deviation (s) of the sample.


    Assuming the sample standard deviation (s) is 10 cm (this information is usually provided, but we will assume it for this
    example), we can calculate the t-score using the formula:


    t = (x̄ - µ) / (s / √n)


    t = (65 - 60) / (10 / √25)

    t = 5 / 2

    t = 2.5


    Step 4: Determine the critical value and make a decision

    Since we are conducting a one-tailed test with a significance level of 0.05 and 24 degrees of freedom (n - 1 = 25 - 1
    = 24), we can find the critical value using a t-distribution table or calculator. The critical value for a one-tailed
    test with α = 0.05 and df = 24 is approximately 1.711.


    Since our calculated t-score (2.5) is greater than the critical value (1.711), we reject the null hypothesis in favor
    of the alternative hypothesis.


    Conclusion:

    The biologist can conclude that the fertilizer is effective in increasing the height of the plants, as the test result
    is statistically significant at the 0.05 level.'
- source_sentence: 'The Malaysian Anti-Corruption Commission (MACC) raids in 2018 were a series of high-profile searches conducted
    on government agencies, ministers'' homes, and offices. These raids were part of a larger investigation into corruption
    and misappropriation of funds, particularly involving the 1Malaysia Development Berhad (1MDB) scandal. The scandal involved
    billions of dollars allegedly misappropriated from a government-run investment fund, with some of the funds believed to
    have been used to fund lavish lifestyles of high-ranking officials.


    The raids led to widespread calls for anti-corruption measures for several reasons:


    1. Public outrage: The raids uncovered a vast amount of cash, luxury goods, and valuable assets, which were seized by
    the MACC. The sheer scale of the corruption and the brazenness of the officials involved sparked public outrage and calls
    for greater transparency and accountability.

    2. Erosion of public trust: The 1MDB scandal and the subsequent raids further eroded public trust in the government and
    its institutions. The public demanded that steps be taken to prevent similar instances of corruption from occurring in
    the future.

    3. Calls for reform: The raids highlighted the need for comprehensive reform of Malaysia''s anti-corruption framework.
    There were calls for greater independence for the MACC, stricter penalties for corruption, and more robust checks and
    balances in government.

    4. Impact on Malaysia''s reputation: The 1MDB scandal and the MACC raids damaged Malaysia''s reputation as a stable and
    transparent country. There were concerns that foreign investors would be deterred from investing in Malaysia, which could
    have negative implications for the country''s economy.


    In response to the public outcry, the Malaysian government took several steps to address corruption, including:


    1. Establishing a new anti-corruption agency: The government established the Malaysian Anti-Corruption Commission (MACC)
    as an independent agency to investigate corruption cases.

    2. Strengthening anti-corruption laws: The government introduced tougher penalties for corruption, including mandatory
    jail terms and increased fines.

    3. Improving transparency and accountability: The government introduced measures to increase transparency and accountability
    in government, including the establishment of a new whistleblower protection act and the introduction of open data initiatives.


    Overall, the MACC raids in 2018 led to widespread calls for anti-corruption measures as they exposed the scale and depth
    of corruption in Malaysia''s government. The public demanded greater transparency, accountability, and reform to prevent
    similar instances of corruption from occurring in the future. The Malaysian government responded by introducing new anti-corruption
    measures aimed at addressing these concerns and restoring public trust.'
