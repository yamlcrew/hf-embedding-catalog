      n = 4 atom / (1.606 * 10^(-28) m³) = 2.49 * 10^(28) atom/m³


      Seterusnya, kita boleh mengira kekerapan Debye:


      ωD = (6π² * 2.49 * 10^(28))^(1/3) * 9,000 m/s ≈ 4.42 * 10^(13) s^(-1)


      Halaju purata fonon (v) boleh dianggarkan sebagai:


      v = ωD * a / (2π) ≈ (4.42 * 10^(13) s^(-1)) * (0.543 * 10^(-9) m) / (2π) ≈ 3.82 * 10^4 m/s


      Sekarang kita mempunyai semua nilai yang diperlukan untuk mengira kekonduksian terma (k):


      k = (1/3) * Cp * v * l


      Pertama, kita perlu menukar kapasiti haba tentu (Cp) kepada J/(kg K) menggunakan jisim molar silikon (28.085 g/mol):


      Cp = 0.71 J/(g K) * (1 mol / 28.085 g) * (28.085 * 10^3 g / kg) = 710 J/(kg K)


      Sekarang, kita boleh mengira kekonduksian terma:


      k = (1/3) * 710 J/(kg K) * 3.82 * 10^4 m/s * 100 * 10^(-9) m ≈ 71.7 W/(m K)


