  - 'Serbuan Suruhanjaya Pencegahan Rasuah Malaysia (SPRM) pada 2018 adalah satu siri carian berprofil tinggi yang dijalankan
    ke atas agensi kerajaan, rumah dan pejabat menteri. Serbuan ini adalah sebahagian daripada penyiasatan yang lebih besar
    terhadap rasuah dan penyelewengan dana, terutamanya melibatkan skandal 1Malaysia Development Berhad (1MDB). Skandal itu
    melibatkan berbilion dolar yang didakwa diselewengkan daripada dana pelaburan yang dikendalikan kerajaan, dengan beberapa
    dana itu dipercayai digunakan untuk membiayai gaya hidup mewah pegawai berpangkat tinggi.


