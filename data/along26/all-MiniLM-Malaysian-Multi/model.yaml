  - source_sentence: 'The international community has been closely watching Malaysia''s fight against corruption, particularly
      in light of the 1MDB scandal and Najib Razak''s administration, due to several reasons.


      Firstly, the 1MDB (1Malaysia Development Berhad) scandal involved the alleged embezzlement of billions of dollars from
      a Malaysian state investment fund, with reports indicating that funds were siphoned off for the personal gain of high-ranking
      officials, including former Prime Minister Najib Razak. The scandal attracted international attention due to the sheer
      scale of the alleged corruption, as well as the involvement of high-profile figures in the global financial industry.


      Secondly, the 1MDB scandal raised questions about the rule of law and good governance in Malaysia, as well as the ability
      of the country''s institutions to hold powerful individuals accountable for their actions. The lack of transparency
      and apparent impunity for those involved in the scandal undermined public trust in the government and the political
      system.


      Thirdly, the 1MDB scandal had broader implications for the global financial system, as it exposed vulnerabilities in
      the regulation and oversight of cross-border financial transactions. The scandal also raised concerns about the role
      of international banks and financial institutions in enabling corruption and money laundering.


      Finally, the election of a new government in Malaysia in 2018, led by Prime Minister Mahathir Mohamad, marked a significant
      turning point in the country''s fight against corruption. The new government has taken steps to investigate and prosecute
      those involved in the 1MDB scandal, as well as to implement reforms aimed at improving transparency and accountability
      in government. These efforts have been closely watched by the international community as a test case for Malaysia''s
      commitment to good governance and the rule of law.


      In summary, the international community has been watching Malaysia''s fight against corruption closely in light of the
      1MDB scandal and Najib Razak''s administration due to the scale of the alleged corruption, the implications for the
      rule of law and good governance, the broader impact on the global financial system, and the potential for reform under
      the new government.'
