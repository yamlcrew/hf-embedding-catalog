      Fuel subsidies are regressive, meaning that they disproportionately benefit higher-income individuals who consume more
      fuel. According to a 2017 study by the Institute for Energy Economics and Financial Analysis (IEEFA), 76% of fuel subsidies
      in Malaysia went to the top 60% of income earners, while only 7% went to the bottom 40%. This is because the wealthy
      tend to drive more and afford larger, fuel-inefficient vehicles.


      Furthermore, fuel subsidies have been linked to traffic congestion and air pollution. By keeping fuel prices artificially
      low, the government encourages more driving, leading to increased traffic and longer commute times. This, in turn, contributes
      to air pollution, which is already a significant problem in Malaysia. In 2019, the World Air Quality Index ranked Kuala
      Lumpur as the 16th most polluted city in the world.


      Despite these issues, the Malaysian government has been hesitant to remove fuel subsidies due to concerns about public
      backlash. However, in recent years, the government has taken steps to gradually reduce subsidies, replacing them with
      targeted assistance programs for low-income households.


      In 2019, the government implemented the Bantuan Sara Hidup (BSH) program, which provides direct cash transfers to eligible
      low-income households. The program is intended to offset the impact of higher fuel prices, which resulted from the gradual
      reduction of subsidies. In 2020, the government further reduced fuel subsidies and introduced the targeted fuel price
      mechanism, where the price of fuel is adjusted according to market conditions, but the government still subsidizes a
      portion of the cost for lower-income households.


      In conclusion, while fuel subsidies in Malaysia primarily benefit the wealthy and contribute to traffic congestion and
      air pollution, the government has taken steps to address these issues by gradually reducing subsidies and implementing
      targeted assistance programs. However, more can be done to ensure that subsidies are better targeted to those in need,
      and to encourage more sustainable transportation options.'
