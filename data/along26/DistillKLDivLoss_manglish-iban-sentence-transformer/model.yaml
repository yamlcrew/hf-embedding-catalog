  - source_sentence: 'Topological insulators and semimetals are unique classes of materials that exhibit distinct electronic
      properties due to their topological nature. The main characteristics that distinguish them from other materials are:


      1. Bulk-edge correspondence: Topological insulators have an insulating bulk but possess conducting surface states. These
      surface states are protected by time-reversal symmetry, which makes them robust against impurities and defects.


      2. Spin-momentum locking: In topological insulators, the electron''s spin is locked to its momentum, leading to helical
      surface states. This means that electrons with opposite spins move in opposite directions, which can result in reduced
      backscattering and dissipationless transport.


      3. Dirac/Weyl nodes: In topological semimetals, the conduction and valence bands touch at discrete points in the Brillouin
      zone, forming Dirac or Weyl nodes. These nodes are characterized by their linear dispersion and unique topological properties.


      The generation and stability of surface states in topological insulators and semimetals are due to the non-trivial topology
      of their electronic band structures. The topological invariants, such as the Chern number or Z2 invariant, determine
      the presence and stability of these surface states. These invariants are robust against small perturbations, ensuring
      that the surface states remain stable even in the presence of impurities or defects.


      Topological insulators and semimetals are of fundamental interest for both theoretical and experimental condensed matter
      physics due to their unique electronic properties and potential applications. They provide a platform to study novel
      quantum phenomena, such as the quantum spin Hall effect, Majorana fermions, and chiral anomaly. Additionally, they offer
      insights into the interplay between topology, symmetry, and electronic properties in condensed matter systems.


      The potential applications of topological insulators and semimetals in the development of new electronic and optoelectronic
      devices include:


      1. Spintronics: The spin-momentum locking in topological insulators can be exploited for developing spintronic devices
      with low power consumption and high efficiency.


      2. Quantum computing: The robust surface states and the possibility of hosting Majorana fermions make topological insulators
      promising candidates for developing fault-tolerant quantum computing platforms.


      3. Thermoelectric devices: The reduced backscattering and dissipationless transport in topological insulators can lead
      to high thermoelectric efficiency, making them suitable for waste heat recovery and energy conversion applications.


      4. Optoelectronics: Topological semimetals, such as Weyl semimetals, exhibit large optical nonlinearity and strong light-matter
      interactions, which can be harnessed for developing novel optoelectronic devices, such as photodetectors and modulators.


      In summary, topological insulators and semimetals are unique materials with distinct electronic properties that arise
      from their topological nature. They are of fundamental interest in condensed matter physics and hold promise for various
      electronic and optoelectronic applications.'
    sentences:
    - 'Penebat topologi dan semilogam ialah kelas bahan unik yang mempamerkan sifat elektronik yang berbeza kerana sifat topologinya.
      Ciri-ciri utama yang membezakannya daripada bahan lain ialah:


      1. Surat-menyurat tepi pukal: Penebat topologi mempunyai pukal penebat tetapi mempunyai keadaan permukaan pengalir.
      Keadaan permukaan ini dilindungi oleh simetri pembalikan masa, yang menjadikannya teguh terhadap kekotoran dan kecacatan.


      2. Penguncian momentum putaran: Dalam penebat topologi, putaran elektron dikunci kepada momentumnya, membawa kepada
      keadaan permukaan heliks. Ini bermakna elektron dengan putaran bertentangan bergerak ke arah yang bertentangan, yang
      boleh mengakibatkan penyerakan belakang berkurangan dan pengangkutan tanpa pelesapan.


      3. Nod Dirac/Weyl: Dalam semilogam topologi, jalur konduksi dan valens bersentuhan pada titik diskret dalam zon Brillouin,
      membentuk nod Dirac atau Weyl. Nod ini dicirikan oleh penyebaran linear dan sifat topologi yang unik.


      Penjanaan dan kestabilan keadaan permukaan dalam penebat topologi dan separa logam adalah disebabkan oleh topologi bukan
      remeh struktur jalur elektronik mereka. Invarian topologi, seperti nombor Chern atau invarian Z2, menentukan kehadiran
      dan kestabilan keadaan permukaan ini. Invarian ini teguh terhadap gangguan kecil, memastikan keadaan permukaan kekal
      stabil walaupun terdapat kekotoran atau kecacatan.


      Penebat topologi dan semilogam adalah kepentingan asas untuk kedua-dua fizik jirim pekat teori dan eksperimen kerana
      sifat elektroniknya yang unik dan aplikasi yang berpotensi. Mereka menyediakan platform untuk mengkaji fenomena kuantum
      novel, seperti kesan Hall spin kuantum, fermion Majorana, dan anomali kiral. Selain itu, mereka menawarkan pandangan
      tentang interaksi antara topologi, simetri dan sifat elektronik dalam sistem jirim pekat.


      Aplikasi berpotensi penebat topologi dan separa logam dalam pembangunan peranti elektronik dan optoelektronik baharu
      termasuk:


      1. Spintronics: Penguncian momentum putaran dalam penebat topologi boleh dieksploitasi untuk membangunkan peranti spintronik
      dengan penggunaan kuasa yang rendah dan kecekapan tinggi.


      2. Pengkomputeran kuantum: Keadaan permukaan yang teguh dan kemungkinan menjadi tuan rumah fermion Majorana menjadikan
      penebat topologi menjanjikan calon untuk membangunkan platform pengkomputeran kuantum toleran kesalahan.


      3. Peranti termoelektrik: Penyerakan belakang yang dikurangkan dan pengangkutan tanpa pelesapan dalam penebat topologi
      boleh membawa kepada kecekapan termoelektrik yang tinggi, menjadikannya sesuai untuk pemulihan haba sisa dan aplikasi
      penukaran tenaga.


      4. Optoelektronik: Semilogam topologi, seperti semilogam Weyl, mempamerkan ketaklinearan optik yang besar dan interaksi
      jirim cahaya yang kuat, yang boleh dimanfaatkan untuk membangunkan peranti optoelektronik baru, seperti pengesan foto
      dan modulator.


      Ringkasnya, penebat topologi dan semilogam adalah bahan unik dengan sifat elektronik yang berbeza yang timbul daripada
      sifat topologinya. Mereka mempunyai kepentingan asas dalam fizik jirim pekat dan memegang janji untuk pelbagai aplikasi
      elektronik dan optoelektronik.'
