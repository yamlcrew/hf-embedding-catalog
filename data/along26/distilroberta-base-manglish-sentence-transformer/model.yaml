- source_sentence: 'Malaysia has a significant problem with protecting its natural resources and biodiversity, with deforestation,
    illegal logging, and wildlife trafficking still prevalent in the country. Although I cannot access real-time data, I can
    provide you with some statistics from recent years to illustrate the severity of the issue.


    Deforestation and Illegal Logging:


    1. According to Global Forest Watch, Malaysia had a total forest loss of 471,000 hectares between 2010 and 2019.

    2. A study published in the journal Current Biology in 2018 estimated that only 17% of Malaysia''s original forests remain.

    3. In 2019, the Malaysian Timber Certification Council reported that only 2.4 million hectares of forests in Malaysia
    were certified as sustainably managed, out of a total of 18.8 million hectares of forests in the country.

    4. According to a report by the Environmental Investigation Agency, between 2013 and 2015, Malaysia was the largest importer
    of illegal timber in the world.


    Wildlife Trafficking:


    1. According to the wildlife trade monitoring network TRAFFIC, Malaysia is a major hub for the illegal wildlife trade
    in Southeast Asia.

    2. In 2019, the Malaysian customs department seized 2,645 pangolins and 815 kilograms of pangolin scales, which is a significant
    decrease from the 30,500 pangolins seized in 2017.

    3. In 2020, the World Wildlife Fund (WWF) reported that Malaysia is one of the top 10 countries with the highest number
    of ivory seizures, with a total of 6.6 tons seized between 2011 and 2019.


    Reasons for these issues include:


    1. Weak law enforcement: There have been numerous reports of corruption and inaction from law enforcement agencies in
    Malaysia, making it easy for illegal activities to continue.

    2. Demand for natural resources: The demand for timber, palm oil, and other natural resources drives deforestation and
    illegal logging. Additionally, there is a high demand for wildlife products such as pangolin scales, ivory, and tiger
    parts, which contributes to the illegal wildlife trade.

    3. Rapid development and urbanization: Rapid development and urbanization in Malaysia have led to the destruction of natural
    habitats, pushing wildlife closer to human populations and increasing human-wildlife conflict.

    4. Lack of awareness and education: There is a lack of awareness and education about the importance of protecting natural
    resources and biodiversity in Malaysia, particularly in rural areas.


    To address these issues, the Malaysian government and civil society organizations have taken some measures, including:


    1. Strengthening law enforcement: The Malaysian government has pledged to strengthen law enforcement and increase penalties
    for illegal activities related to natural resources and wildlife.

    2. Increasing awareness and education: Civil society organizations have been working to increase awareness and education
    about the importance of protecting natural resources and biodlife.

    3. Promoting sustainable development: The Malaysian government has pledged to promote sustainable development and responsible
    resource management to reduce deforestation and illegal logging.

    4. Collaborating with neighboring countries: Malaysia has been working with neighboring countries to combat wildlife trafficking
    and illegal logging.


    While these measures are a positive step towards protecting Malaysia''s natural resources and biodiversity, more needs
    to be done to address these critical issues.'
  sentences:
  - M
  - 'Malaysia continues to face environmental challenges due to a variety of factors, including rapid economic development,
    urbanization, and weak enforcement of environmental regulations.


    Air Pollution:

    Air pollution is a significant environmental challenge in Malaysia. According to the World Air Quality Index, as of March
    2023, several cities in Malaysia, including Kuala Lumpur, ranked among the top 100 most polluted cities in the world.
    The major sources of air pollution in Malaysia include industrial activities, vehicle emissions, and open burning.


    Deforestation:

    Deforestation is another major environmental challenge in Malaysia. The country has one of the highest deforestation rates
    in the world. According to the University of Maryland''s Global Forest Watch, Malaysia lost 1.3 million hectares of tree
    cover from 2001 to 2019, equivalent to a 12.6% decrease in forest area. The primary drivers of deforestation in Malaysia
    are the expansion of oil palm plantations, logging, and conversion of forests for other agricultural uses.


    Wildlife Trafficking:

    Wildlife trafficking is a significant problem in Malaysia, with the country being a major transit point for illegal wildlife
    trade in the region. According to a report by TRAFFIC, a wildlife trade monitoring network, Malaysia was among the top
    ten countries in the world for seizures of wildlife smuggled by air in 2019. Endangered species such as pangolins, tigers,
    and elephants are often targeted by wildlife traffickers.


    The reasons for these environmental challenges include weak law enforcement, corruption, and a lack of public awareness
    about the importance of environmental protection. To address these challenges, the Malaysian government has implemented
    various measures, such as introducing stricter penalties for environmental crimes, promoting sustainable development,
    and increasing public education on environmental issues. However, more needs to be done to ensure that these measures
    are effectively implemented and enforced.'
  - B
- source_sentence: 'Suppose there is a city with 6 neighborhoods and the distance between each pair of neighborhoods is given
    in the table below. Find the minimum spanning tree of the city to determine the shortest possible network of roads that
    connect all the neighborhoods.


    |    | N1 | N2 | N3 | N4 | N5 | N6 |

    |----|----|----|----|----|----|----|

    | N1 | 0  | 8  | 3  | 5  | 12 | 10 |

    | N2 | 8  | 0  | 7  | 6  | 5  | 11 |

    | N3 | 3  | 7  | 0  | 5  | 5  | 13 |

    | N4 | 5  | 6  | 5  | 0  | 3  | 8  |

    | N5 | 12 | 5  | 5  | 3  | 0  | 4  |

    | N6 | 10 | 11 | 13 | 8  | 4  | 0  |'
