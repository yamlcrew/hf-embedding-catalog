- source_sentence: 'Najib Razak''s fall from power in May 2018, after his shock election defeat, had significant consequences
    for the United Malays National Organization (UMNO) and the larger coalition of Barisan Nasional (BN). UMNO, the dominant
    party in BN, was in power for over 60 years before the election, and Najib''s downfall marked the end of its long reign.


    Here are some of the main ways in which Najib Razak''s fall from power affected UMNO and BN:


    1. Loss of Power: UMNO and BN suffered a humiliating defeat in the 2018 general election, losing the majority of the seats
    they had held for decades. The election marked the first time since Malaysia''s independence in 1957 that UMNO was not
    part of the ruling coalition.

    2. Leadership Crisis: Najib''s fall from power led to a leadership crisis within UMNO, with several leaders jockeying
    for position to take over the party''s leadership. In the end, Ahmad Zahid Hamidi, who had served as deputy prime minister
    under Najib, emerged as the new UMNO president.

    3. Internal Divisions: Najib''s ouster also exposed deep internal divisions within UMNO, with some members blaming the
    party''s electoral defeat on Najib''s corruption scandals and leadership style. This has led to a significant weakening
    of the party''s unity and cohesiveness.

    4. Legal Problems: Najib''s fall from power has also led to numerous legal problems for him and UMNO. Najib is currently
    facing multiple charges of corruption, abuse of power, and money laundering, and UMNO has been implicated in some of these
    cases.

    5. Decline in Popularity: UMNO''s popularity has declined significantly since Najib''s ouster. The party''s traditional
    base of support among Malay voters has been eroding, and it faces stiff competition from the ruling Pakatan Harapan coalition,
    as well as from other opposition parties.

    6. Rise of PAS: The Islamist party PAS has emerged as a significant political force in Malaysia, partly due to UMNO''s
    decline. PAS has been able to win over some of UMNO''s traditional supporters, and it has formed a political alliance
    with several other opposition parties.

    7. Impact on BN: Najib''s downfall has also had a significant impact on the larger BN coalition. Several of the coalition''s
    component parties have left BN and formed new alliances, while others have stayed on but are increasingly critical of
    UMNO''s leadership.


    In summary, Najib Razak''s fall from power has had a profound impact on UMNO and BN, leading to a loss of power, a leadership
    crisis, internal divisions, legal problems, a decline in popularity, the rise of PAS, and a weakening of the BN coalition.
    These challenges will continue to shape Malaysian politics for years to come.'
  sentences:
  - W
  - 'The United Malays National Organization (UMNO), the former ruling party in Malaysia and the party once led by Najib Razak,
    has reacted to the allegations of corruption against their former leader in a few different ways. When the scandal first
    broke out in 2015, UMNO initially closed ranks around Najib, defending him and denying any wrongdoing. However, as the
    evidence against Najib mounted and public outrage grew, some cracks began to appear in UMNO''s support for their former
    leader.


    In 2018, Najib was ousted as prime minister in a general election, and his coalition, which included UMNO, lost power
    for the first time in six decades. Following Najib''s electoral defeat, UMNO''s new leadership under Ahmad Zahid Hamidi
    began to distance themselves from their former leader. Zahid himself was also later charged with corruption, further weakening
    UMNO''s position on the issue.


    In recent years, UMNO has attempted to rebrand itself as a party that takes a harder stance on corruption. In 2020, UMNO
    passed a resolution to expel any members who are found guilty of corruption or other criminal offenses. However, critics
    have accused UMNO of hypocrisy, pointing out that many of its members have been implicated in corruption scandals over
    the years, including Najib himself.


    In summary, UMNO''s reaction to the allegations of corruption against Najib Razak has been mixed, with initial denials
    and support giving way to distancing and attempts to rebrand as a party that takes a harder stance on corruption. However,
    the party''s track record on this issue has been criticized, and it remains to be seen whether UMNO will be able to shake
    off its association with corruption and rebuild its reputation as a clean and accountable political party.'
