      Now, we need to find the minimum number of lines to cover all the zeros in the matrix. In this case, we can cover all
      the zeros with 3 lines:


      - Horizontal line through the first row

      - Vertical line through the second column

      - Horizontal line through the third row


      Since the number of lines (3) is equal to the number of power stations, we can proceed to find the minimum cost assignment.


      The minimum cost assignment is as follows:


      - Power station A (1) connects to city 1 with a cost of 2

      - Power station B (2) connects to city 2 with a cost of 1

      - Power station C (3) connects to city 5 with a cost of 2


      The minimum cost required to connect all the power stations to all the cities in the area is 2 + 1 + 2 = 5.'
  - source_sentence: 'Pada 2018, bekas Perdana Menteri Malaysia Najib Razak didakwa atas pelbagai pertuduhan rasuah, pengubahan
      wang haram, dan salah guna kuasa, terutamanya berkaitan skandal 1Malaysia Development Berhad (1MDB). Sistem perundangan
      dan mahkamah Malaysia telah berurusan secara aktif dengan dakwaan ini sejak itu. Berikut ialah ringkasan peristiwa utama
      dan implikasinya terhadap politik Malaysia:


      1. Tuduhan dan perbicaraan: Najib Razak telah didakwa dengan 42 kesalahan, termasuk pecah amanah jenayah, pengubahan
      wang haram, dan salah guna kuasa. Perbicaraannya bermula pada April 2019, dan setakat Februari 2023, dia telah disabitkan
      dengan tujuh pertuduhan dan dibebaskan ke atas tujuh yang lain. Baki kes masih berterusan.

      2. Prosiding undang-undang: Pasukan pembelaan Najib telah berhujah bahawa pertuduhan terhadapnya bermotifkan politik
      dan dia adalah mangsa konspirasi. Walau bagaimanapun, pihak pendakwaan telah mengemukakan bukti yang besar, termasuk
      rekod kewangan dan keterangan saksi, untuk menyokong dakwaan itu. Mahkamah Malaysia secara amnya rajin meneliti bukti
      dan mendengar hujah dari kedua-dua pihak.

      3. Keputusan mahkamah: Najib Razak didapati bersalah atas tujuh pertuduhan berkaitan skandal 1MDB pada Julai 2020 dan
      dijatuhi hukuman penjara 12 tahun dan didenda RM210 juta (kira-kira USD $50 juta). Keputusan itu menandakan peristiwa
      penting dalam memerangi rasuah di Malaysia dan menunjukkan kebebasan badan kehakiman.

      4. Implikasi untuk politik Malaysia: Perbicaraan dan sabitan Najib Razak mempunyai implikasi mendalam terhadap politik
      Malaysia. Pertubuhan Kebangsaan Melayu Bersatu (UMNO), parti politik yang pernah dipimpin Najib, telah dilemahkan, dan
      landskap politik telah menjadi lebih kompetitif. Gabungan reformis Pakatan Harapan (PH), yang berkuasa dalam pilihan
      raya umum 2018, telah menghadapi cabaran dalam mentadbir negara, tetapi pendakwaan Najib Razak dan pegawai tinggi lain
      telah dilihat sebagai tanda kemajuan dalam menangani rasuah.

      5. Dinamik politik yang berterusan: Keyakinan Najib Razak dan sekutunya tidak membawa kepada perubahan ketara dalam
      dinamik kuasa, kerana UMNO dan sekutunya kekal sebagai kuasa yang menggerunkan dalam politik Malaysia. Gabungan PH sejak
      itu telah berpecah, dan gabungan pemerintah baharu, Perikatan Nasional (PN), yang diketuai oleh Perdana Menteri Muhyiddin
      Yassin, telah mengambil alih. Namun begitu, pendakwaan Najib Razak telah menetapkan preseden untuk akauntabiliti dan
      kedaulatan undang-undang di Malaysia.


      Kesimpulannya, sistem perundangan dan mahkamah Malaysia telah menangani dakwaan rasuah terhadap Najib Razak melalui
      beberapa siri perbicaraan dan sabitan. Implikasi terhadap politik Malaysia adalah penting, dengan pendakwaan Najib Razak
      dan pegawai tinggi lain menandakan peristiwa penting dalam memerangi rasuah. Walau bagaimanapun, landskap politik kekal
      kompetitif dan berpecah-belah, dengan UMNO dan sekutunya masih memainkan peranan penting dalam membentuk masa depan
      politik negara.'
