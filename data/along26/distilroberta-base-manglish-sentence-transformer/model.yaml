  - 'Sistem mahkamah Malaysia telah memainkan peranan penting dalam mempertanggungjawabkan bekas Perdana Menteri Najib Razak
    atas dakwaan penglibatannya dalam skandal rasuah 1Malaysia Development Berhad (1MDB). Pada 2018, Najib didakwa dengan
    beberapa pertuduhan pecah amanah jenayah, salah guna kuasa, dan pengubahan wang haram yang berkaitan dengan penyelewengan
    lebih $4.5 bilion daripada 1MDB.


    Sistem mahkamah Malaysia telah memainkan peranan penting dalam bergerak ke hadapan dengan pendakwaan Najib, walaupun tekanan
    politik dan percubaan untuk menghalang keadilan. Mahkamah telah bertanggungjawab untuk mendengar bukti, menyemak kes pendakwaan,
    dan membuat keputusan mengenai kesalahan atau tidak bersalah Najib. Pada 2020, Mahkamah Tinggi mendapati Najib bersalah
    atas tujuh pertuduhan rasuah dan pengubahan wang haram, menjatuhkan hukuman penjara 12 tahun dan menjatuhkan hukuman RM210
    juta (kira-kira $50 juta).


    Walau bagaimanapun, beberapa pengkritik telah menimbulkan kebimbangan tentang keadilan proses undang-undang dalam kes
    Najib. Mereka berhujah bahawa badan kehakiman mungkin tidak bebas sepenuhnya daripada pengaruh politik, terutamanya dalam
    kes berprofil tinggi seperti ini. Ada yang menunjukkan masa perbicaraan, yang bertepatan dengan pilihan raya umum pada
    2018, sebagai bukti motivasi politik. Selain itu, beberapa pemerhati telah menyatakan bahawa kes pendakwaan sangat bergantung
    kepada keterangan bekas pekerja 1MDB yang diberikan imuniti sebagai pertukaran untuk kerjasamanya, yang telah menimbulkan
    persoalan tentang kredibiliti bukti.


    Tambahan pula, terdapat dakwaan pendakwaan terpilih, dengan ada yang berpendapat bahawa pegawai tinggi dan ahli politik
    lain yang turut terlibat dalam skandal 1MDB tidak bertanggungjawab sama seperti Najib. Pengkritik telah menunjukkan kekurangan
    pertuduhan terhadap bekas gabenor Bank Negara Malaysia Zeti Akhtar Aziz dan bekas pengerusi 1MDB Mohd Hazem Abdul Rahman
    sebagai bukti penguatkuasaan keadilan terpilih ini.


    Walaupun terdapat kebimbangan ini, pengendalian sistem mahkamah Malaysia terhadap kes Najib mewakili satu langkah penting
    ke hadapan dalam perjuangan negara menentang rasuah. Sabitan dan hukuman terhadap bekas perdana menteri atas tuduhan rasuah
    adalah kejadian yang jarang berlaku di banyak negara, dan ia telah menghantar mesej yang kuat bahawa tiada siapa yang
    melebihi undang-undang. Walau bagaimanapun, adalah penting untuk memastikan proses undang-undang kekal adil dan telus,
    dan semua yang terlibat dalam skandal 1MDB bertanggungjawab terhadap piawaian keadilan yang sama.'
