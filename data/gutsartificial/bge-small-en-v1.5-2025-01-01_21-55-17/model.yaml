    of calorie (2500.48 ± 165.87 vs. 2594.64 ± 333.4 g/d, p = 0.021), fat (86.57 ± 10.38 vs. 93.25, ± 17.13 p < 0.01), fluoride
    (13967.59 ± 5662.25 vs. 11112.32 ± 3051.44 g/d, p < 0.01), vitamin A (819.7 ± 251.03 vs. 712.76 ± 113.86 g/d, p = 0.01),
    and vitamin K (157.9 ± 30.4 vs. 146.74 ± 21.64 g/d, p = 0.03).
  - "All concentration estimates are standardized by faecal weight and depicted as concentration per gram of faeces. \nAll\
    \ quantitative PCR reactions were conducted in 12.5 μl volumes using the SYBR green Master Mix (Roche). Quantitative PCR\
    \ experiments were conducted on a Lightcycler LC480 instrument (Roche). Template quantity and quality was assessed using\
    \ a Nanodrop spectrophotometer. Abundance estimates are standardized to the concentration of input DNA per reaction and\
    \ are represented as copies per nanogram of faecal DNA. Template extraction for quantification of faecal bacteria loads:\
    \ DNA was extracted from fresh faecal pellets using the PowerFecal DNA Isolation Kit (Mo Bio) following kit instructions.\
    \ Bacterial loads were quantified using previously validated bacterial group-specific 16S primers. \nStatistics were carried\
    \ out using JMP9.0 (SAS), Prism 6.0 (Graphpad) and R software. permutational analysis of variance was used for hypothesis\
    \ testing of significance between groups shown in PcoA plots."
  - 'Postmenopausal diabetic women are at higher risk to develop cardiovascular diseases (CVD) compared with nondiabetic women.
    Alterations in cardiac cellular metabolism caused by changes in sirtuins are one of the main causes of CVD in postmenopausal
    diabetic women. Several studies have demonstrated the beneficial actions of the G protein-coupled estrogen receptor (GPER)
    in postmenopausal diabetic CVD. However, the molecular mechanisms by which GPER has a cardioprotective effect are still
    not well understood. In this study, we used an ovariectomized (OVX) type-two diabetic (T2D) rat model induced by high-fat
    diet/streptozotocin to investigate the effect of G-1 (GPER-agonist) on sirtuins, and their downstream pathways involved
    in regulation of cardiac metabolism and function. Animals were divided into five groups: Sham-Control, T2D, OVX+T2D, OVX+T2D+Vehicle,
    and OVX+T2D+G-1. G-1 was administrated for six weeks.'
- source_sentence: 'Represent this sentence for searching relevant passages: Why might a VRAM flap be a more optimal choice
    for patients with an end colostomy?'
  sentences:
  - As they will have an end colostomy, which will be their only stoma, then a VRAM flap is a more optimal choice given the
    bulk and ability to fill dead space with this flap. Very few patients had infection or dehiscence in the postoperative
    period. Donor-site hernia is a concern with the VRAM flap, particularly given an open very large laparotomy incision which
    may often be a reoperation. This occurred in 9.5% of the VRAM patients, and the same number of patients required a delayed
    reoperation which was on an elective basis. VRAM, as well as ALT flaps can be used to restore the anatomy of the pelvic
    floor preventing herniation into the resection space. The ‘marine patch’ principle applies where the flap lies on the
    side of hydrostatic pressure, so even if there is perineal skin breakdown then the muscle flap component still provides
    cover for the abdominal contents. Compared with Baird and colleagues, we reserved VRAM flaps for this reason to APR and
    ELAPE patients. VRAM is not used in exenteration in our centre due to two stomas being formed during urinary diversion.
  - In the present study, we used a recently developed novel steatohepatitis-inducing HFD, STHD-01 , to induce NASH. This
    novel HFD contains a high amount of cholesterol, which is not contained in conventionally used HFDs, and induces the development
    of severe NASH, while conventionally-used HFDs only induce mild to moderate NASH in a shorter period of time. Another
    specific feature of STHD-01 is that STHD-01 does not affect fasting blood glucose levels (Additional file ). While certain
    type of diet, such as methionine- and choline-deficient diet (MCD), can also cause an advanced NASH , this diet decreases
    fasting blood glucose levels in experimental animals. Since non-overweight human patients with NAFLD do not show decreased
    fasting blood glucose levels compared to non-fatty liver disease patients , STHD-01 is a better approximation of the clinical
    condition. One obvious difference in the phenotypes between the mice fed with the STHD-01 and the conventional HFD is
    body weight gain.
  - "Only 107 (13.8%) were satisfied, and 667 (84%) were dissatisfied. Regarding the reasons for dissatisfaction, 355 (45.9%)\
    \ subjects reported that they did not get enough explanation, 292 (37.7%) reported that they did not get enough investigations,\
    \ and only 20 (2.6%) thought that they did not get enough medications, as shown in Figure. \nOf 863 subjects with heartburn,\
    \ QoL was not affected at all in 295 (34%), a little in 210 (24%), somewhat in 125 (15%), a lot in 208 (24%), and a great\
    \ deal in 25 (3%) subjects. Considering a lot and a great deal as the significant impairment of QoL, 233 (27%) of the\
    \ subjects had impaired QoL due to heartburn. \nThis cross‐sectional study conducted among the adult population in a rural\
    \ community of Bangladesh found that about 26% of the population had heartburn, 11% chest pain, 8% globus, and 4% had\
    \ dysphagia. One‐third of the study population had at least one esophageal symptom."
- source_sentence: 'Represent this sentence for searching relevant passages: What percentage of the UAE''s population resides
    in Sharjah?'
  sentences:
  - "Currently, there is a scarcity of data about the practice and impact of OTC medication usage among pregnant women in\
    \ UAE. Accordingly, this study was planned and designed with the aim of exploring the awareness and assessing the usage\
    \ of OTC medications among pregnant women in Sharjah, UAE. \nThe study was conducted after the approval of the University\
    \ of Sharjah Ethics Committee, Sharjah, UAE (reference number: REC-16-10-03-01-S). \nA cross-sectional survey was conducted\
    \ to assess the level of awareness and knowledge of pregnant women concerning OTC drugs. The study took place in the Emirate\
    \ of Sharjah, UAE, over a period of three months (October to December 2016). \nSharjah is the third largest of the seven\
    \ emirates that make up the UAE and is the only one to have land on both the Arabian Gulf Coast and the Gulf of Oman.\
    \ Residents of Sharjah represent around 19% of the UAE's population (4.76 million) (Ministry of Economy, 2008). Within\
    \ the UAE, it has been reported that the crude birth rate or birth rate per 1,000 population was 15.54 during the year\
    \ of 2014."
  - "However, following a more painful surgery, children in the VR group needed rescue analgesia significantly less often\
    \ ( p = 0.002). In 2021, a total of 50 children aged 6–12-years old were included in a RCT evaluating the effect of VR\
    \ compared to standard screen TV in reducing anxiety for buccal infiltration anesthesia. No significant difference was\
    \ observed between the groups, but female and younger patients showed higher pain scores during the dentistry procedure.\
    \ Two recent meta-analyses that included a maximum of 17 studies evaluating the effect of VR on pain and anxiety in a\
    \ pediatric population concluded that VR is an effective distraction intervention to reduce pain and anxiety in children.\
    \ \nFinally, other medical fields have also explored the role of VR in anxiety reduction. In gastroenterology, VR has\
    \ been used prior to endoscopic procedures to reduce anxiety and has shown promising results, reducing anxiety significantly\
    \ in patients with a higher anxiety level (STAI-score ≥ 45) at baseline ( p = 0.007)."
  - Picrosirius Red staining also demonstrated an increase in total collagen deposition in the right carotid artery due to
    TAC-induced vascular changes. Alamandine treatment effectively prevented the increase in reactive oxygen species production
    and depletion of nitric oxide levels, which were induced by TAC. Finally, alamandine treatment was also shown to prevent
    the increased expression of nuclear factor erythroid 2-related factor 2 and 3-nitrotyrosine that were induced by TAC.
    Our results suggest that alamandine can effectively attenuate pathophysiological stress in the right carotid artery of
    animals subjected to TAC.
- source_sentence: 'Represent this sentence for searching relevant passages: What are some effects of maternal iron deficiency
    on adult male offspring development?'
  sentences:
  - "Parents report encouraging their children to engage in “healthy” lifestyle choices, including making alterations to diet,\
    \ physical activity (PA), and sleep behavior, which may (1) help parents feel more in control over the impact of the condition,\
    \ and (2) allow them gain a more positive outlook on the future. Unfortunately, even in the adult MS literature, there\
    \ is insufficient evidence to make clinical recommendations regarding lifestyle modifications. Improving the body of literature\
    \ on modifiable lifestyle factors in pediatric MS with the goal of creating guidelines that will help POMS patients and\
    \ their parents deal with these difficult decisions is needed. \nOur objective in this manuscript is to summarize and\
    \ identify gaps in current research on modifiable lifestyle factors and pediatric MS. Two questions guided this review:\
    \ (1) Which modifiable lifestyle factors have been investigated in the context of POMS? And (2) which factors have been\
    \ shown to play a role in the risk of POMS, disease course, or quality of life? \nWe used the Arksey and O’Malley framework\
    \ to guide this review."
  - The mRNA expression levels of the OMH-treated HT-115 cells indicated that the cytosolic CYP1A levels were two-fold upregulated.
    In addition, OMH triggers the mitochondrial release of cytochrome c, which stabilize the fundamental oxido-reduction cycle
    in mitochondria. The activation of CYP1A effectively controls the pro-oxidants and oxidative stress in colon cancer cells
    further, suppressing the proinflammatory cytokines IL-1β and TNF-α, which favors the deactivation of malignant cell apoptosis
    inhibitor NF-kB in colon cancer cells. The observed antioxidant capacity neutralizes proinflammatory TNF-α/IL-1β, inhibiting
    protumorigenic COX-2/PGE-2 and stimulating the apoptosis mechanism via the inhibition of NF-kB, an apoptosis inhibitor.
    OMH effectively maintains the balance between Bcl-2 and Bax (Bcl-2-associated X pro-apoptotic gene) and inclines the cells
    to apoptotic stimulation.
  - "We found three differentially abundant taxonomic classes in the IDD group using an LDA effect size calculation with an\
    \ LDA score higher than 4.0. The results showed that the Bacteroidaceae genus Bacteroides and Lachnospiraceae genus Marvinbryantia\
    \ were significantly increased in rats in the IDD group compared to rats in the other groups (C). \nIn this study, we\
    \ showed that maternal iron deficiency may program and alter adult male offspring development with regard to spatial learning\
    \ and memory, dorsal hippocampus BDNF expression, gut microbiota, and SCFA concentrations. Our results showed that the\
    \ adult male offspring of rats that were fed a low-iron diet before pregnancy and throughout the lactation period had\
    \ (1) spatial deficits via a Morris water maze evaluation; (2) decreased dorsal hippocampal BDNF mRNA and protein concentrations\
    \ accompanied by a low TrkB abundance; (3) a decreased plasma acetate concentration without changes in butyrate and propionate\
    \ concentrations; (4) enrichment of the Bacteroidaceae genus Bacteroides and Lachnospiraceae genus Marvinbryantia."
