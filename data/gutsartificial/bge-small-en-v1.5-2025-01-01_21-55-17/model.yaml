- source_sentence: 'Represent this sentence for searching relevant passages: How does a high-carbohydrate diet affect inflammation
    markers and cytokine levels in goats?'
  sentences:
  - "During carcinogenesis, the tested lactobacilli mix, especially the anti-inflammatory M2-programming VD23 strain, ameliorates\
    \ the inflammatory conditions (in the early stages) and/or the pro-inflammatory M1-programming MS3 strain can boost an\
    \ anti-tumour immune response with the down-stream effect of eliminating dysplastic and cancerous cells. With respect\
    \ to long-term study of CRC, where cancer arises from chronic inflammation and leads to an immunosuppressive state with\
    \ tumour presence, a mixture of probiotic bacteria with both anti- and pro-inflammatory (M2- and M1-programming) features\
    \ was used, and this may represent a realistic approach to harnessing probiotic strains in the modulation of CRC. \nWhile\
    \ body weight gain over the experimental period did not differ, there was a significant difference in daily food intake\
    \ between all experimental groups. Despite the increased food intake of the DMH group compared to the DMH+P group, the\
    \ rats’ ability to convert food into body mass (expressed by FER) was not significantly affected. The probiotic-fed group\
    \ was shown to have the highest FER, therefore it can be suggested that probiotic treatment can improve absorption and\
    \ digestion of food."
  - LBP is highly sensitive to LPS, and its plasma levels drastically raise up to 200% in goats fed HC diets and hence considered
    as reliable biomarker of systemic inflammation (Chang, Zhang, Xu, Jin, Seyfert, et al., ; Dong et al., ). The APPs production
    is stimulated by HC diet‐derived LPS in liver through activation of toll‐like receptor‐4 (TLR‐4)‐mediated nuclear factor
    kappa B (NF‐kB)‐tumor necrosis factor‐α (TNF‐α) signaling pathway in immune cells (Ciesielska et al., ; Kany et al., ).
    It has been shown that HC diets induce NF‐κB expression through LPS and thereby modulate the expressions of related cytokines,
    such as TNF‐α, interleukin‐1β (IL‐1β), IL‐6, and IL‐10, and consequently altered the AAPs production in livers of ruminants
    (Chang, Zhang, Xu, Jin, Guo, et al., ; Dong et al., ; Guo et al., ).
  - "After 48 h transfection, cells were used in the electrophysiology assays in the automated whole-cell patch clamp system\
    \ QPatch 16X (Sophion Bioscience). \nThe extracellular solution comprised 140 NaCl, 5 KCl, 10 CaCl 2, 2 MgCl 2, 10 glucose\
    \ and 10 HEPES at pH 7.4 and 320 mOsm. The intracellular solution comprised (in mM) 150 KCl, 1 MgCl 2, 4 NaCl, 0.5 EGTA\
    \ and 10 HEPES at pH 7.4 and 320 mOsm. Cells were maintained at a holding potential –90 mV and K + currents elicited by\
    \ +20 mV pulse for 500 ms followed by –40 mV pulse for additional 500 ms."
