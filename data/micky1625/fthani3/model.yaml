    - "[6-32] 일찍이 소음인 11세 된 아이가 한다망양병(汗多兦陽病)을 앓는 것을 치료한 일이 있다. 이 \n아이는 평소에도 노심초사하는 편이며 때때로 설사하는 것이 걱정이 었으며, 밥을 먹을 때마다 온 \n\
      얼굴에 구슬 같은 땀을 흘린다. 그러다가 하루는 갑자기 두통ㆍ발열하면서 땀이 저절로 흐르고 대\n변도 굳어서 불통(不通)하게 되었다. 이 아이의 평소 설사증을 걱정했기 때문에 두통ㆍ신열ㆍ변비\nㆍ한출(汗出)\
      \ 등의 열증(熱證)은 한증(寒證)인 설사와 반대되므로 관심을 두지 않고 예사로 치료하\n여 황기(黃芪)ㆍ계지(桂枝)ㆍ백작약(白芍藥)으로 발표(發表)만 해 주었더니 4,5일이 되었어도 두통\nㆍ발열이 낫지 않는\
      \ 것이다. 6일이 되던 날 아침에야 그 병세를 자세히 살펴보니 대변이 굳어서 못 \n본지가 이미 4,5일이 되었고 또 소변 빛이 붉고 깔깔하여서 잘 나오지 않아 한 번에 두세 숟갈 밖에\n되지 않는데다가 소변을\
