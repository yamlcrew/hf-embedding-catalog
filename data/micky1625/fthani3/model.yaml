- source_sentence: 소양인이 갑자기 토한 후 몸에 열이 나고 머리가 아프며 설사를 하는 경우, 어떤 처방을 사용해야 하며, 그 처방의 구체적인 조합은 무엇인지 설명하시오.
  sentences:
  - "[9-25] 소양인이 갑자기 토하는 것은 반드시 괴상한 증상이 생길 것이니 반드시 형방패독산(荊防敗\n毒散)을 쓴 후 그 동정을 살펴서 몸에 열이 있고 머리가 아프며 설사하는 경우에는 의심의 여지없\n이 석고를\
    \ 써야 하고, 몸이 차고 배가 아프며 설사하는 경우에는 의심의 여지없이 황련(黃連)과 고\n삼(苦蔘)을 써야 한다.\n[9-26] 일찍이 돌이 채 안된 소양인 아이가 갑자기 한 번 토한 다음 설사를 하고 몸에\
    \ 열이 있고 머\n리가 아프며 손발을 내젓고 몸을 엎치락뒤치락하며 물을 많이 마시고 설사를 4,5,6회 하여 횟수를 \n알 수 없는 것을 형방사백산(荊防瀉白散)을 하루에 3첩, 이틀에 6첩을 쓰고서야 설사가 그치고\
    \ 몸\n에 열이 나고 머리가 아픈 것이 깨끗이 없어졌다. 다시 5,6첩을 더 쓰고 안정이 되었다.\n[9-27] 소양인이 몸에 열이 나고 머리가 아프며 손발을 내젓고 물을 많이 마시는 것은 이것은 위험\n한 증상이니\
    \ 비록 설사를 하여도 반드시 석고를 사용해야 하니 설사가 있고 없음을 막론하고 마땅\n히 형방사백산(荊防瀉白散)에 황련과 과루인을 각각 1돈(錢)을 더 넣고 쓰든지 아니면 지황백호탕(\n地黃白虎湯)을 써야 한다."
  - "히고 음기를 내리게(溫胃降陰) 해야 하고 소음증(少陰證)에 음식이 삭지 않은 것을 사(瀉)하면 관계\n부자이중탕(官桂付子理中湯)으로 건비강음(健脾降陰)해야 할 것이다.\n[7-12] 곽향정기산(藿香正氣散)ㆍ향사육군자탕(香砂六君子湯)ㆍ관중탕(寬中湯)ㆍ소합원(蘇合元)은\
    \ \n모두 장중경 사심탕(瀉心湯)의 변제(變劑)이니 이것이 이른바 청출어람이다. 청(靑)이 비록 푸르나 \n그 남초(藍草)가 아니었으면 어찌 푸른 것을 얻었겠는가?\n[7-13] 장중경(張仲景)이 말하기를 상한\
    \ 음독병(陰毒病)은 얼굴빛이 푸르고 온몸이 몽둥이로 얻어맞\n은 것처럼 쑤시며 아프다. 이러한 병증은 5일이 된 것은 치료할 수 있지만 7일이 된 것은 치료할 수\n없다.\n[7-14] 이천(李梃)이 말하기를\
    \ 삼음병(三陰病)이 심해지면 반드시 음독(陰毒)으로 변하게 된다. 그 \n증상은 수족이 궐랭(厥冷)하며 토하고 설사를 하여도 갈증이 나지 않고 몸을 구부리고 조용히 누워\n서 잠자기를 좋아하고 극히 심하면 인통(咽痛)이\
    \ 있으며 헛소리를 하고 여기에 두통과 머리에서 땀\n이 흐르는 증을 일으키며 눈동자가 아파서 햇빛을 싫어하며 얼굴ㆍ입술ㆍ손톱이 푸르고 검으며 몸\n에는 몽둥이로 얻어맞은 것처럼 되어 있다. 또 이 증세에는 면색(面色)이\
    \ 청백흑(靑白黑)하며 사지\n가 궐랭하고 잠을 많이 자는 것이 특징이다."
  - "[5-5] 옛 사람들이 육경(六經)ㆍ음양(陰陽)으로 병을 논하였으므로 장중경이 《상한론(傷寒論)》을 저\n술함에도 역시 육경ㆍ음양으로서 병의 증세를 구별했다. 두통이 있고 온몸이 아프고 신열이 있고 \n오한이\
    \ 나고 맥이 부하면 이를 태양병의 증세라 했고, 입이 쓰고 목이 마르며 현기가 나고 귀가 안 \n들리며 가슴이 답답하고 한열(寒熱)이 오락가락하며 두통이 나고 열이 나며 맥이 현(弦)하고 세(細)\n한 것을 가리켜\
    \ 소양병의 증세라 하고, 또 오한이 없이 도리어 오열이 나고 땀이 저절로 나고 변비\n가 있는 자를 양명병의 증세라 하였다. 배가 가득하고 때때로 배가 아프지만 입이 건조하지 않고 \n명치가 답답하지도 않으면서\
    \ 저절로 설사를 하면 태음병의 증세라 하고, 맥이 미(微)하고 세(細)하\n면서 자고만 싶고 입이 마르고 심장이 답답하면서 저절로 설사를 하면 소음병의 증세라고 하였다. \n처음에는 배가 아프거나 설사를 하는\
    \ 증상이 없다가 상한이 된지 6, 7일만에 맥이 미완(微緩)하며 \n손과 발이 매우 차고 혀가 굳어지고 음낭이 수축되면 궐음병의 증세라고 하였다. 이상 여섯 가지 \n병의 증세 중에서 삼음병증(三陰病證)은 모두\
    \ 소음인에게 있는 병이고, 소양병의 증세는 곧 소양인\n에게 있는 증상이며 태양병의 증세나 양명병의 증세는 소양인ㆍ소음인ㆍ태음인에게 고루 있는 병"
- source_sentence: 병세가 위급할 때의 약 복용량에 대해 설명하고, 병세가 경감된 후의 복용량 조절 방법에 대해 서술하시오.
  sentences:
  - "복(湯服)하지 아니하거나 또는 연일 복용하지 아니하면 난치한다. 또 병세가 극히 위급할 때에는 1\n일에 4첩을 탕복해야 하고 또 병세가 반 정도로 위급할 때에는 1일에 3첩을 복용한다. 그리고 다음\n부터는\
    \ 병세가 더 감(減)해지지 않더라도 1일에 2첩을 복용하고 또 병세가 조금 감해지면 2일간에 \n3첩을 쓰거나 1일에 1첩을 쓰기도 하고 1일에 2첩을 쓰기도 한다. 병세가 크게 덜하게 되면 1일에 \n1첩을\
    \ 쓰고 또 병세가 더욱 크게 덜하게 되면 2일간에 1첩을 쓰든지 3일간에 1첩, 4일 간에 1첩, 5\n일간에 1첩을 쓰기도 한다. 그리고 병이 있는 사람은 약을 써야 하지만 병이 없는 사람이 약을 복용\n하는\
    \ 것은 옳지 않다. 중병에는 중한 약을 써야 하고 경병자에게는 중한 약을 써서는 안 된다. 만일\n에 병이 가벼운데 중한 약 쓰기를 좋아하거나 또 병이 없는 자가 약을 먹기를 좋아하면 내장의 기\n가 연약하게\
    \ 되며 더욱 병을 불러오게 한다.\n[8-10] 고량진미(膏粱珍味)가 비록 입맛에는 좋으나 늘 먹으면 도리어 입맛을 잃는 것이니 양피나 \n양털 의복이 비록 추위를 잘 막지만 늘 입으면 추위를 타게 된다. 기름진\
    \ 음식이나 양털 옷도 항상 \n먹고 입으면 오히려 좋지 않은데 하물며 약이야 이보다 더하지 않겠는가? 만일 늘상 약을 먹는 해\n로움을 논한다면 전혀 약을 먹지 않는 것보다 도리어 백배나 이롭지 못한 것이다.\
    \ 대개 병이 있는"
  - "[12-10] 태음인 병이 한궐 4일에 무한자(無汗者)는 중증이오 한궐 5일에 무한자는 험증이니 마땅히\n웅담산을 쓰거나 혹 한다열소탕(寒多熱少湯)에 제조(蠐螬) 5,7,9개를 가(加)하되 대변 묽으면 반드\n\
    시 건율(乾栗)ㆍ의이인(薏苡仁) 등을 써야하고 대변이 굳으면 갈근(葛根)ㆍ대황(大黃) 등속을 써야\n한다. 만약 이마, 눈두덩 위에서 땀이 보이면 스스로 병이 낫기를 기다리며 병이 나은 뒤에도 약을 \n써서 조리해야\
    \ 한다. 그렇지 않으면 후유증이 생길 우려가 있다.\n[12-11] 일찌기 태음인이 위완한증(胃脘寒證)의 온병(瘟病)을 치료한 적이 있다. 태음인 한 사람이 \n평소에 정충(怔忡), 무한(無汗), 기단(氣短),\
    \ 결해(結咳)가 있었는데 갑자기 한 증세가 더하여 설사가 \n수 십일이 되어도 멎지 않는데 이것은 표병(表病)으로 중증(重證)이다. 태음조위탕(太陰調胃湯)에 \n저근백피(樗根白皮) 1돈을 가하여 매일 2첩씩 10일간\
    \ 썻더니 설사가 멎으므로 계속 30일을 쓰니 \n매일 얼굴에서 땀이 흐르고 본디 갖고 있던 병증도 나아갔다. 그런데 별안간 그 집안사람 5, 6명이 \n한꺼번에 온역병에 걸려 이 사람이 그것을 간호하게 되어 수일간\
    \ 약을 복용하지 못하였다. 또한 이\n사람도 온병에 전염되어 입맛이 잃고 아무것도 먹지를 못한다. 곧, 태음조위탕에 승마(升麻)ㆍ황금("
  - '것이다. 그리하여 또 다시 열다한소탕을 쓰는데 고본과 대황을 가해서 50～60첩을 썻더니 약을 쓰

    는 기간에 겨우 지탱하다가 결국 사망하였다. 태음인 년소자가 조열병에 걸렸다. 열다한소탕에 고

