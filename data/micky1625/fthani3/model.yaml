- source_sentence: 11세 소음인이 앓고 있는 한다망양병의 주요 증상으로는 어떤 것들이 있으며, 이 증상에 대한 적절한 한의학적 처방은 무엇인지 설명하시오.
  sentences:
  - "[6-52] 중병(重病)과 위증(危證)에는 약을 하루에 3,4첩씩 쓰지 않으면 약력(藥力)이 충분치 못하고, \n또 약을 연일 복용하지 않으면 병이 조금 나았다가 더하기도 하고 또는 병이 나았어도 완쾌되지 못\n\
    하는 것이다. 연일 복용이라 함은 혹은 1일에 2번 또는 1일에 1번 또는 1일에 3번씩, 또는 2,3일간 \n연복(連服)하고 또는 5,6일간 연복하고 또는 수십 일간 계속하여 복용하는 것이다. 그 병의 병세를\
    \ \n잘 헤아려서 다스려야 한다.\n소음인 위수한리한병론(67조)"
  - "[6-32] 일찍이 소음인 11세 된 아이가 한다망양병(汗多兦陽病)을 앓는 것을 치료한 일이 있다. 이 \n아이는 평소에도 노심초사하는 편이며 때때로 설사하는 것이 걱정이 었으며, 밥을 먹을 때마다 온 \n얼굴에\
    \ 구슬 같은 땀을 흘린다. 그러다가 하루는 갑자기 두통ㆍ발열하면서 땀이 저절로 흐르고 대\n변도 굳어서 불통(不通)하게 되었다. 이 아이의 평소 설사증을 걱정했기 때문에 두통ㆍ신열ㆍ변비\nㆍ한출(汗出) 등의 열증(熱證)은\
    \ 한증(寒證)인 설사와 반대되므로 관심을 두지 않고 예사로 치료하\n여 황기(黃芪)ㆍ계지(桂枝)ㆍ백작약(白芍藥)으로 발표(發表)만 해 주었더니 4,5일이 되었어도 두통\nㆍ발열이 낫지 않는 것이다. 6일이 되던\
    \ 날 아침에야 그 병세를 자세히 살펴보니 대변이 굳어서 못 \n본지가 이미 4,5일이 되었고 또 소변 빛이 붉고 깔깔하여서 잘 나오지 않아 한 번에 두세 숟갈 밖에\n되지 않는데다가 소변을 보는 횟수도 하루 동안에\
    \ 두세 번 밖에 되지 않았다. 오한증은 없으면서 \n발열을 하며 땀이 흘러나오는 횟수는 하루에 2,3,4차로서 불규칙하였다. 인중(人中)에는 혹 땀이 있\n는 때도 있고 또는 땀이 없는 때도 있었다. 그리고 땀이\
    \ 얼굴과 온몸에 줄줄 흐르고 있으니 그 병이\n과연 나쁜 것이라 비로소 한다망양병(汗多亡陽病)의 증후란 것을 깨닫고 보니 진실로 위급한 병증"
  - "사람은 그 병증을 밝게 안다면 반드시 약을 먹어야 하고 병이 없는 사람은 비록 병세를 밝게 안다\n고 할지라도 반드시 약을 먹을 필요는 없다. 지나간 역사와 현세를 살펴보건대 아편을 피우거나 수\n은(水銀)ㆍ산삼(山蔘)ㆍ녹용(鹿茸)\
    \ 같은 것을 자주 먹으면 목숨을 재촉하는 경우가 없지 않으니 이\n것을 가지고 미루어 보아도 가히 알 수 있을 것이다.\n[8-11] 소음인 토혈(吐血)에 마땅히 독삼팔물탕(獨蔘八物湯)을 사용한다. 소음인 인후통(咽喉痛)에\
    \ \n마땅히 독삼관계이중탕(獨蔘官桂理中湯)을 사용한다.\n[8-12] 일찍이 소음인이 입맛이 달아서 음식을 평상시보다 배를 더 먹더니 불과 1개월 내에 부종이\n생겨서 죽는 것을 보았다. 소음인 식소(食消)는\
    \ 부종에 속한 것으로써 매우 위험한 병세이다. 불가\n불 급히 치료를 해야 한다. 마땅히 궁귀총소이중탕(芎歸葱蘇理中湯)을 사용한다.\n[8-13] 일찍이 소음인 부종병에 노루의 간 일부를 썰어서 회로 만들어 한\
    \ 번에 다 먹고 계속하여 5\n번을 하니 그 병이 곧 나았고, 소음인 한 사람이 노루의 간 일부를 먹고 시력이 배로 좋아지고 원기\n가 솟구쳐 나왔다. 그러나 소양인이 허로병에 노루의 간 일부를 먹더니 피를 토하며\
    \ 죽은 것을 보\n았다."
- source_sentence: "다음 증상에 대한 적절한 한방 처방은 무엇인가? \n- 땀을 내고 난 후 위가 편안하지 못하고 명치 밑이 더부룩하며 단단하고, 옆구리에 수기가 있으며, 배에서 천둥소리가 나고 설사를\
    \ 하는 경우."
  sentences:
  - "[17-9] 태음인과 소음인의 체형이 혹은 서로 비슷하여 가리기 어렵다. 그러나 그 병증을 관찰하면 \n반드시 구별하지 못할 것이 없다. 태음인이 허한(虛汗)이 있으면 완실(完實)하고 소음인이 허한이\n있으면\
    \ 큰 병이다. 태음인이 피부가 강하고 견밀(堅密)하면 큰 병이고 소음인이 피부가 강하고 견밀\n하면 완실할 것이다. 태음인은 흉격정충증(胸膈怔忡證)이 있고 소음인은 수족문란증(手足悗亂證)이\n있다. 태음인은 눈초리가\
    \ 위로 땅기는 증(目眥上引證)이 있으며 또 안구 동통증이 있고 소음인은 이\n런 증이 없다. 소음인은 평시에 호흡이 고르나 간혹 큰 한숨(太息呼吸)을 쉬는 일이 있고 태음인은 \n이렇게 큰 한숨을 쉬는 일이 없다.\
    \ 태음인은 학질(瘧疾)ㆍ오한(惡寒) 중에도 능히 냉수를 마시나 소\n음인은 학질ㆍ오한 중에 냉수를 마시지 않는다. 태음인의 맥은 장(長)하고 긴(緊)하나 소음인의 맥\n은 완(緩)하고 약(弱)하다. 태음인의 기육(肌肉)은\
    \ 견실하나 소음인의 기육은 부드럽다. 태음인은 용\n모와 말하는 기운(容貌詞氣)은 생활이 의젓하고 잘못을 고쳐 바로잡으며 소음인은 용모와 말하는 \n기운(容貌詞氣)은 동작이 자연스럽고 간편하면서 약간 기교가 있다."
  - "[16-16] 산골 사람은 마땅히 문견(聞見)이 있어야 하는데 문견이 있으면 장수의 복을 누리고, 도시 \n사람은 마땅히 간약(簡約)해야 하는데 간약하면 장수의 복을 누리고, 농촌 사람은 마땅히 근간(勤\n幹)해야\
    \ 하는데 근간하면 장수의 복을 누리고, 학문하는 선비는 마땅히 경계(警戒)해야 하는데 경계\n하면 장수의 복을 누린다.\n[16-17] 산골 사람이 만약 문견(聞見)이 있으면 장수의 복을 누릴 뿐만 아니라 이\
    \ 사람은 곧 산중의\n호걸이며, 도시 사람이 만약 간약(簡約)하다면 장수의 복을 누릴 뿐만 아니라 이 사람은 곧 도시의 \n호걸이며, 농촌사람이 만약 근간(勤幹)하다면 장수의 복을 누릴 뿐만 아니라 이 사람은\
    \ 곧 농촌의 \n호걸이며, 학문하는 선비가 만약 경계(警戒)한다면 장수의 복을 누릴 뿐만 아니라 이 사람은 곧 학\n문하는 선비의 호걸이다.\n[16-18] 어떤 사람이 말하기를 \"농부들은 원래 힘으로 농사를\
    \ 지으니 가장 근간(勤幹)한 자들인데 \n왜 근간하지 않는다고 하였으며, 선비들은 원래 독서를 하고 있으니 가장 경계(警戒)하는 자들인데 \n왜 경계하지 않는다고 하였는가?\" 내가 대답하기를 백 마지기의 농토를\
    \ 잘못 다스릴까봐 그것을 제\n걱정으로 삼는 것이 농부의 임무인 것이니 농부를 선비와 비교한다면 진정 그들은 나태한 자들이\n다. 선비들이란 무던히 독서하기 때문에 마음은 항상 헛되이 뽐내고, 농부들은 눈으로\
    \ 글자를 볼 줄"
  - "[7-9] 땀을 내고 난 후에 위(胃)가 편안하지 못하고 명치 밑이 더부룩하고 단단하며 옆구리에 수기(\n水氣)가 있고 배에서 천둥소리가 나며 설사를 하는 증에는 생강사심탕(生薑瀉心湯)을 주로 쓴다.\n[7-10]\
    \ 상한에 하리(下利)를 하고 명치 밑이 더부룩하고 단단하게 뭉치는 병증에 사심탕(瀉心湯)을 \n복용시키고 후에 다른 약방(藥方)으로 설사시켰더니 설사가 그치지 않으므로 이내 이중탕(理中湯)\n을 썼으나 설사가\
    \ 더욱 심하다. 이렇게 될 때에는 적석지우여량탕(赤石脂禹餘糧湯)을 주로 써야 한\n다.\n[7-11] 나는 논하기를 병이 음증(陰證)에서 발생한 것을 도리어 하리(下利)시켰다고 말한 것은 곧 위\n가 약하여 병이\
    \ 생긴 것이다. 마땅히 곽향정기산(藿香正氣散)을 써야 할 것인데 도리어 대황(大黃)\n으로 하리를 시켰다는 것을 말하는 것이다. 마황(麻黃)과 대황(大黃)은 본시 태음인의 약이고 소음\n인의 약이 아니다. 소음인의\
    \ 병에는 표증ㆍ이증을 막론하고 마황ㆍ대황으로 땀을 내거나 하리를 시\n킨다는 것은 원래 말할 필요가 없는 것이다. 소음인 병에 곡물이 삭지 않고 그대로 설사를 하는 것\n은 적체(積滯)가 스스로 풀리는 것이다.\
    \ 태음증(太陰證)에 음식이 삭지 않은 것을 사(瀉)하면 곽향정\n기산(藿香正氣散)ㆍ향사양위탕(香砂養胃湯) 또는 강출관중탕(薑朮寬中湯) 같은 것을 써서 위를 덥"
- source_sentence: 술과 색에 대한 과도한 집착이 개인의 정신적, 신체적 건강에 미치는 영향을 설명하고, 이러한 상태를 개선하기 위한 한의학적 처방이나 접근 방법은 무엇인지 서술하시오.
  sentences:
  - "[13-4] 삼양병(三陽病)이 심하면 양독으로 변한다. 얼굴이 붉고 눈이 빨가며 몸에는 노란 반점이 생\n기고 간혹 황적색의 설사를 하며 육맥(六脈)이 홍대(弘大)하면 마땅히 흑노환(黑奴丸)을 쓴다.\n[13-5]\
    \ 위의 증에는 갈근해기탕 흑노환을 사용한다.\n[13-6] 영추(靈樞)에 말하기를 척맥(尺脈) 부위 피부에 열이 깊어서 맥(脈)이 성(盛)하고 조증(燥證) \n있는 자는 온병(瘟病)이다.\n[13-7] 왕숙화(王淑和)가\
    \ 이르기를 온병맥(瘟病脈)은 음양(陰陽)이 다 같이 성하니 병의 열이 극도에\n이르면 맥이 부지이활(浮之而滑)하며 침지이산삽(沈之而散澁)하다.\n[13-8] 맥법(脈法)에 온병 2～3일에 몸에 열이 나고 배가\
    \ 부르며 두통이 있으며 음식은 전과 같고 \n맥이 곧고 빠르면 8일에 죽고 온병이 4～5일이 되어서 두통이 나고 배가 부르면서 토하고 맥이 가\n늘면서 굳세게 나오면 12일에 죽는다. 또 8～9일이 되어서 머리와\
    \ 몸이 아프지 않고 눈알이 붉거나\n얼굴색이 변하지 않으나 설사를 하며 맥이 삽(澁)해도 누르면 없어지고 들면 크게 나타나고 명치 \n밑이 단단하면 17일에 죽는다."
  - "[16-21] 술과 색이 사람을 죽인다고 하는 사람들은 모두 말하기를 \"술독이 창자를 마르게 하고 색\n로(色勞)가 정력을 말라붙게 한다\"고 하지만 이는 그 중의 하나를 알고 둘은 모르는 말이다. 술에 \n\
    방종하는 자는 그 몸을 부지런하게 쓰기를 싫어하기 때문에 걱정이 태산 같고, 색에 미혹된 자는 \n계집을 깊이 사랑하기 때문에 걱정이 칼날 같아서 만 갈래로 찢어지고 이지러진 마음이 술독과 색\n로와 함께 힘을\
    \ 합하여 공격하므로 사람을 죽이게 하는 것이다.\n[16-22] 광동(狂童)은 반드시 음녀(淫女)를 사랑하고 음녀는 또한 광동을 사랑하며, 우부(愚夫)는 반\n드시 투부(妬婦)를 사랑하고 투부는 또한 우부를 사랑하는\
    \ 것이니, 만물의 이치로 이를 따져보더라\n도 음녀는 단연코 광동의 배필에 합당할 것이요, 우부는 또한 투부의 배필함이 마땅할 것이다. 대개\n음녀나 투부는 악인이나 천인(賤人)의 배필이 될 수는 있어도 군자나\
    \ 귀인의 배필이 될 수는 없는 \n것이다. 칠거지악 중에서도 음란한 것과 질투하는 것이 그 으뜸되는 악이지만 세상 사람들은ㆍ투'\n자의 의미를 잘 모르고 단지 많은 첩들을 미워하며 투기하는 것만을 이야기한다.\
    \ 귀인이 후사를 이\n어야 한다는 것은 가장 소중한 일이기 때문에 귀인이 첩을 갖는 것을 부인이 미워하며 투기하는 것\n은 절대로 안 되는 법이다. 그러나 가정의 법도를 어지럽히는 근본이 일찍이 많은 첩을 거느리는"
  - "[7-56] 나는 논하기를 일찍이 소음인 한 사람이 명치 밑 오른쪽에 단단하게 굳어 뭉친 것이 있어서 \n백약을 써도 효과가 없다. 그리하여 파두여의단(巴豆如意丹)을 주었더니 도리어 병이 심하여 머리\n를 흔들며\
    \ 풍증을 일으키다가 잠깐 그치더니 몇 달 후에 죽은 것이다. 또 그 후에 소음인 한 사람이\n이와 같은 병증이 있어 파두단(巴豆丹)을 썼더니 얼굴과 몸에서는 땀이 나고 있으나 유독히 윗입술\n인중혈(人中穴) 좌우\
    \ 쪽에서는 땀이 나지 아니하더니 이 사람은 1년 후에 죽은 것이다. 무릇 소음인\n이 명치 밑이 단단하게 굳어 뭉쳐 있는 환자 4-5명을 실제로 보았으나 혹 6개월간 혹 1년간 침구(\n針灸) 의약(醫藥)을 두루\
    \ 써보지 않은 것이 없었으나 낱낱이 회생할 희망이 없었으니 이는 곧 장결\n병으로 소음인의 병인 것이다.\n[7-57] 장중경(張仲景)이 말하기를 황달병은 마땅히 18일로서 기간을 잡는 것이니 10일 이상이면\
    \ \n차도가 있어야 하는데 도리어 병이 더욱 심한 것은 다스리기 어려운 것이다. 병이 음부(陰部)에서 \n발(發)하면 그 사람이 반드시 구역을 하고 병이 양부(陽部)에서 발생을 하면 그 사람이 추워서 떨며\n\
    발열을 하는 것이다."
