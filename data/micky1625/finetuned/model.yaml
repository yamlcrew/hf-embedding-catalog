      \ 그 증상이 병이 시작한 날부터 병이 풀리"
  - source_sentence: 태양병으로 인해 열이 오르고 오한이 나며 땀이 없는 경우, 어떤 한약을 복용해야 하는지에 대해 언급된 주요 처방은 무엇인가요?
    sentences:
    - "동해서 봐도 안되고 또한 번거로운 것을 싫어해도 안 될 것이다. 그런 연후에야 그 뿌리\n와 나무 그루를 찾고 그 가지와 잎을 찾아야 할 것이다. 대체로 맥을 본다는 것은 병의 증세를 판단\n하는 한가지 방법이다.\
      \ 그 이치는 맥의 뜨고, 가라앉고, 더디고, 빠른 것에 있을 뿐이니 반드시 경락\n의 변동을 구하려 할 필요는 없는 것이다. 삼음, 삼양이란 병의 증세가 같고 다름을 구별하는 것이\n고 그 이치가 배와 등의\
      \ 안팎에 있을 뿐이니 반드시 경락의 변동을 구하려 할 필요는 없는 것이다.\n 옛 사람들이 육경음양으로 병을 논했기 때문에 장중경이 <상한론(傷寒論)>을 지은 데도 역시 육\n경 음양을 가지고 병의 증세를\
      \ 구별했다. 두통이 있고, 온몸이 아프고, 신열이 있고, 오한이 나고, 맥\n이 뜨면 이것을 태양병의 증세라고 했다. 입이 쓰고, 목이 마르며, 현기증이 나고, 귀가 안 들리고, \n가슴이 답답하고, 추운\
      \ 기운이 오락가락하고, 맥이 빠르게 뛰는 것을 소양병의 증세라고 하였다. 오\n한이 없이 도리어 악열이 나고, 땀이 저절로 나고, 대변에 변비가 있는 자를 양명병의 증상이라고 \n하였다. 배가 가득하고, 때때로\
