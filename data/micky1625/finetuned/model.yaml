      \ 것을 소음병의 증세라고 하였다"
    - "湯을 쓴다. 만약 이미 토하게 하거나 설사시켰는데도 땀이 나고 헛소리를 \n하며 小柴胡湯의 나타나는 증상이 없어진 것은 괴이한 병이 된 것이니 괴이한 병을 치료하는 법에 \n의해 치료할 것이다.\n상한에 맥이\
      \ 활시위처럼 가늘고 두통이 있고 열이 나는 것은 소양에 속하니 땀을 내는 것은 안 된\n다. 땀을 내면 헛소리를 한다.\n일찍이 소양인이 상한에 미친 것을 발하여 헛소리를 하는 증상을 치료한 때가 곧 을해년\
      \ 청명절기\n의 때였는데 소양인 한 사람이 상한에 차가움이 많고 열이 적은 병에 걸려 4,5일 후 오미시에 숨이 \n차고 호흡이 급했는데 그때에는 아직 경험이 풍부치 못하여 다만 소양인에게 써야할 약에 六味湯\n\
      이 가장 좋다는 것만을 알았기 때문에 감히 다른 약을 쓰지 못하고 다만 六味湯 한 첩만 썼더니 환\n자의 숨이 차는 증상이 곧 멎었다. 또 수일 후에 환자가 광증이 발해 헛소리를 하고 숨이 차는 증상\n이 발작해서\
      \ 또 六味湯 한 첩을 썼더니 숨차는 증상이 비록 조금 안정되었으나 전날과 같이 완전히\n멎지는 않았다. 환자가 이어서 3일을 미친 증상이 나타나고 오후에 또 숨이 차는 증상이 발작하여 \n또 六味湯을 쓰니\
      \ 숨이 차는 증상이 조금도 안정되지 못하고 잠시 있다가 혀가 말리고 풍이 동하여\n입을 악물고 말을 하지 못해서 여기서 비로소 六味湯으로 될 수 없는 것을 알고 급히 白虎湯 한 첩\n을 달여 대나무 관으로\
      \ 환자의 코에 불어넣어 목구멍으로"
    - "는 계지탕을 주로 쓴다. \n 위역림의 <득효방>에는 ‘사시의 온역에는 마땅히 향소산을 써야 한다’라고 했다. \n 공신의 <의감>에는 ‘상한으로서 머리가 아프고 몸이 쑤시며 표증인지 이증인지를 분간키 어려운\
      \ \n증세에는 마땅히 곽향정기산을 써야 한다’고 했다. \n 내가 생각하기로는   장중경이 말하는 태양상풍에 열이 오르고 오한이 난다는 것은 소음인이 콩팥\n에 열을 받아 나타난 열병인 것이다. 이와 같은\
      \ 증세에 열이 오르고 오한이 나도 땀이 없는 것에는 \n마땅히 계지탕, 천궁계지탕, 향소산, 궁귀향소산, 곽향정기산을 써야한다. 열이 오르고 오한이 나며 \n또 땀이 있으면 이는 망양증의 처음 증세이니 절대로\
      \ 가볍게 보아서는 안 된다. 먼저 황기계지탕, \n보증익기탕, 승양익기탕을 쓴다.  사흘 동안 계속해서 복용시켜도 땀이 그치지 않고 병이 낫지 않을\n때에는 마땅히 계지부자탕, 인삼계지부자탕, 승양익기부자탕을\
      \ 쓴다.\n 장중경이 ‘태양병에 맥이 뜨고 긴하며 열이 오르나 땀이 없고 코피가 나는 것은 저절로 낫는다’라\n고 말했다. \n 태양병이 6, 7일 지났는데도 표증이 여전히 있고 맥이 작고 가라앉으며 반면에\
      \ 명치가 뭉쳐있지 \n않고 미친 것처럼 날뛰는 것은 열이 하초에 있기 때문이다 아랫배가 가득 차 있을지라도 소변이 잘\n통하는 것은 하혈시키면 곧 낫는다. 저당탕을 주로 쓴다. \n 태양증에 몸이 노랗게 되고\
      \ 발광을 하며 아랫배가 단단하고 가득차있"
  - source_sentence: 이때 조열이 나타나면 어떤 처방이 이루어져야 할까요?
    sentences:
    - " 하면 \n명수는 스스로 나빠지니 점치고 무당에게 물어 보지 않아도 알 수 있다. 시운 영원한 말이 명과 짝\n이 되지만 스스로 많은 복을 구한다.”라고 하니 모두 이 뜻이다.  \n 어느 사람이 묻기를 나의\
      \ 말에 귀는 천시를 듣고, 눈은 세회를 보고, 코는 인륜을 맡고, 입은 지방\n을 맛본다고 하였는데 귀가 천시를 듣는 것과 눈이 세회를 보는 것은 가능하지만 코가 어떻게 인륜\n을 냄새 맡으며 입이 어떻게\
      \ 지방을 맛봅니까? 말하기를 인륜에 처하여 사람의 외표를 관찰하고 각\n사람들의 재주와 행실이 현명한가 못났는가를 묵묵히 살피는 것, 이것이 냄새를 맡는 것이 아니겠\n는가! 지방에 처하여 각처 사람들의 생활의\
      \ 땅의 이익을 골고루 맛보는 것, 이것이 맛보는 것이 아\n니겠는가!\n 본심을 가진 자는 본심을 꾸짖는다. 심체의 명암이 비록 저절로 그렇게 되는 것 같지만 꾸짖는 자\n는 맑고 꾸짖지 않는 자는 탁하다.\
      \ 말의 마음을 느낌이 소의 그것보다 민첩한 것은 말의 꾸짖는 마\n음이 소의 그것보다 민첩하기 때문이다. 매의 기세가 솔개의 그것보다 사나운 것은 매의 꾸짖는 마\n음이 솔개의 그것보다 사납기 때문이다. 심체의\
      \ 맑고 탁함과 기세의 강약이 소,말,매,솔개에게 있는 \n것은 이치로써 그것을 따지면 이와 같거늘 하물며 사람에게 있어서야 혹 서로 곱절이나 다섯 곱절\n이 되기도 하고 혹 서로 천만배가 되기도 하지만 어찌\
      \ 태어나서 문득 얻어지거나 아득히 생"
    - " \n 성무기의 <명리론>에 이르길 조열이란 양명에 속하는 것이니 반드시 해질 무렵에 오르고 고열이 \n바로 조열인 것이다. 양명의 병됨은 위 속이 가득차 있는 것이다. 위 속이 차면 헛소리를 하게 되고 \n\
      손과 발에서 끈끈하게 땀이 나는데 이것은 이미 대변이 굳어진 것이다. 헛소리를 하고 조열이 있으\n면 승기탕을 써서 속을 훑어 내리도록 하되, 조열이 아닌 자에게 복용시키지 않는다. \n 주진형의 <단계심법>에\
      \ 이르길 상한병 괴증에 정신이 혼미하고 빈사상태에 놓여 있는 것은 모두 \n위급한 증세다. 이런 경우에 좋은 인삼 한 냥쭝을 물에 달여서 한 번에 다  먹였더니 콧등에서 땀이\n나기 시작하여 줄줄 흘러내리는\
      \ 것이 물같았다.\n나는 생각한다. 앞에서 논법들은 모두 장중경의 대승기탕을 허수아비로 만들어 놓고 있다. 쓸 수 있\n고 쓸 수 없는 경우를 알기 어려워서 어려움이 많아 의혹되니 장중경의 말을 믿을 수가\
      \  없음을 비\n로소 알겠다. 장중경의 대승기탕은 원래 사람을 죽이는 약이지, 사람을 살리는 약이 아닌 만큼 대승\n기탕을 굳이 거론할 필요가 없다. 위의 계통에 병이 들어 옷을 갈아입으려 들지 않고 발광증이\
      \ 있\n으면 마땅히 파두 모두를 복용시키거나 독삼팔물군자탕을 복용시켜야 하며 또는 먼저 파두를 복용\n시키고 나서 팔물군자탕으로 병을 누르기도 한다. \n  장중경이 말했다. 양명병 외증은 신열이 있고 땀이\
      \ 저절로 나며 오한이 없고 도리어 악열"
    - "하늘을 \n바라기 때문이고 비,박,탐,나의 맑고 탁하고 넓고 좁은 것은 만가지로 다른 중에 한가지 같은 점이 \n있으니 보통 사람이 성인을 바라기 때문이다. \n 성인의 장도 사단(四端)이고, 보통 사람의\
      \ 장도 또한 사단이니 성인의 한가지 사단의 장으로써 보\n통 사람의 만가지 사단의 가운데에 처하니 성인은 보통 사람들이 즐기는 바이고 성인의 마음은 욕\n심이 없고 보통 사람의 마음은 욕심이 있으니 성인의\
      \ 욕심이 없는 마음으로써 보통 사람의 만가지 \n욕심있는 마음속에 처하니 보통 사람은 성인이 걱정하는 바가 된다. \n 그런즉 천하의 보통 사람들의 장의 이치는 또한 다 성인의 장의 이치이고, 재능도 또한\
      \ 다 성인의 \n재능이다. 폐,비,간,신으로써 성인이 재능을 스스로 말하길 나는 재능이 없다고 말하는 자가 있으면 \n어찌 재능의 죄인가, 마음이 죄이다. \n 호연지기는 폐,비,간,신에서 나오고 호연지기는\
      \ 마음에서 나오니 인의예지의 사장의 기를 넓히고 \n채운 즉 호연지기는 이것에서 나오고, 비,박,탐,나의 한마음의 욕심을 밝히고 변별한 즉 호연지리가 \n이것에서 나온다. \n 성인의 마음이 욕심이 없다고\
      \ 말하는 것은 맑고 고요하여 없어지는 듯하여 노자나 부처처럼 욕심\n이 없는 것이 아니다. 성인의 마음은 천하가 다스려지지 않음을 심히 걱정하여 단지 욕심이 없는 \n것이 아니라 또한 자신의 욕심에 미칠 겨를이\
      \ 없는 것이다. 천하의 다스려지지 않음을 심히 걱"
  - source_sentence: 왜 수은을 쓰는 사람은 소금이나 간장을 먹지 말라고 하는지 이유는 무엇인가요?
    sentences:
    - "로 한심하다. 귀가 안 들리고 가슴이 가득한 상풍병은 어찌 가히 小柴胡湯으로 고칠 수 \n있겠는가? 슬프도다. 후에 와서 공신이 지은 바 荊防敗毒散이 어찌 소양인의 겉이 찬 병에 삼신산 \n불사약이 아니겠는가?\
      \ 이런 증상에는 속의 열을 맑게 하고 겉의 음기를 내리면 곧 담음이 스스로 \n흩어지고 가슴의 맺힌 증상이 미리 방지되어 이루어지지도 않는다. 가래를 맑게 하고 가래를 마르\n게 하면 곧 음을 내려가게 하고\
      \ 가래를 흩어지게 하는데 이익이 없고 늦추어져 미치게 되면 가슴에\n맺힘이 장차 이루어져 혹 따로 기이한 증상이 생길 것이다. 주굉이 가로되 무릇 땀을 내야 하는데 \n허리에서 취로는 비록 물이 질퍽하고 새는\
      \ 데 허리에서 아래로 발에 이르기는 약간 윤기가 있으면 \n곧 병이 결국 풀리지 않는다. \n   논하여 가로되 소양인의 병에서는 겉과 속의 병을 막론하고 손바닥과 발바닥에 땀이 있으면 곧 \n병이 풀리고\
      \ 손바닥과 발바닥에 땀이 없으면 곧 비록 전체적으로는 땀이 나도 병이 풀리지 않는다.\n  소양인의 상한병에 다시 통증이 있고 땀이 있으면 치료되는 것이 있는데 이병은 재차 삼차에 풍\n한을 느끼고 재통에\
      \ 땀이 나고 삼통에 땀이 나는 것이 아니다. 소양인의 두통, 뇌강, 한열이 가고 오\n는 것, 귀가 안 들리고 가슴이 가득함이 더욱 심한 병은 원래 이와 같으니 겉의 사기가 깊이 맺혀 \n삼통에 맺힌 연후에\
      \ 치료되어 풀리는 것이다. 초통, 재통,"
    - "성이 지극하면 로정이 움직이고, 로성이 지극하면 애정\n이 움직이며, 락성이 지극하면 희정이 움직이고, 희성이 지극하면 락정이 움직인다. 태양인이 애성\n이 지극하여 그치지 못하면 분노가 밖으로 나오고, 소양인이\
      \ 로성이 지극하여 이기지 못하면 비애\n가 가슴속으로 움직이고, 소음인이 락성이 지극하여 이루지 못하면 기쁘고 좋아하는 것이 정할 수 \n없고, 태음인이 희성이 지극하여 가라앉지 않으면 치락이 끝이 없을 것이다.\
      \ 이와 같이 움직이는 것\n은 칼날로 장부를 자르는 것과 다름이 없다. 한번 크게 움직이면 10년이 지나도 회복하기 어려우니\n이는 죽과 사는 것과 수(壽), 요(夭)의 기관이니 몰라서는 안되는 것이다. \n\
      \ 태소음양의 장부의 짧고 김은 음양의 변화니 천품이 이미 결정된 것은 두말할 나위도 없거니와 천\n품이 이미 정해진 것 이외에 또한 짧고 김이 있으니 천품이 완전하지 못한 자는 사람일의 닦음과 \n닦지 않음에\
      \ 운명이 좌우되니 삼가지 않으면 안된다.\n 태양인의 로는 한사람의 로로써 천만인을 노하게 하니 그 로가 천만인을 다룰 방법이 없다면 반드\n시 천만인을 감당하기 어려울 것이다. 소음인의 희는 한사람의 희로써\
      \ 천만인을 희하게 하니 그 희\n가 천만인을 다룰 방법이 없다면 반드시 천만인을 감당하기 어려울 것이다. 소양인의 애는 한 사람\n의 애로써 천만인을 애하게 하니 그 애가 천만인을 다룰 방법이 없다면 반드시\
      \ 천만인을 감당하기 \n어려"
    - " 첫날 2대 다음날 1\n대를 피웠다. 그런데 그날 밤에 더운 방에서 찬바람을 쐬고서 갑자기 죽었다. 세속의 말에 의하면 \n수은을 쓰는 사람은 소금이나 간장을 먹지 말라고 한다. 그것은 간장 속에는 콩이\
      \ 들어 있어서 수\n은의 독기를 풀어 버리기 때문이다. 그러나 독한 약은 약간의 독을 풀어 주는 것도 무방하기 때문\n에 구태여 소금과 간장을 금할 필요는 없다.\n東醫壽世保元 卷之四\n 太陰人 胃脘受寒表寒病論\n\
      장중경이 말하기를 태양병 상한에 머리가 아프고 열이 오르며, 온몸과 허리가 아프고 골절이 쑤시\n며 오한이 나고 땀이 없어 숨이 찬 데에는 마황탕을 주로 써야 한다. 주에 말하기를 상한에 두통이 \n나고 온몸이\
      \ 아프며 허리가 아프고 골절이 모두 쑤시기에 이르는 것은 태양병 상한에 영혈이 고르\n지 못하기 문이다. \n 내가 말하기를 이는 곧 태음인이 한기에 배추 표병이니 가벼운 증세이다. 이와 같은 증세에 마황\n\
      탕을 쓸 수 없는 것은 아니나 계지와 감초는 필요치 않은 약이니 마땅히 마황발표탕을 쓸 것이다. \n 장중경이 말하기를 상한이 된지 4,5 일에 궐이 되는 자는 반드시 열이 오른다. 궐이 심한 자는 열\n도\
      \ 심하고 궐이 경미한 자는 열도 또한 경미하다. 상한에 궐이 된 지 4일만에 다시 열이 오르고 3일\n만에 다시 궐이 되어 5일에 궐이 많고 열이 적으면 이는 그 병이 진행하고 있는 것이며 상한에 열\n이\
      \ 있은 지 4일에 다시 궐로 돌아오고,"
