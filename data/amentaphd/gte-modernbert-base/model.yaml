    Undertakings that are subject to legal requirements under national law transposing Directive (EU) 2019/1937, or to equivalent
    legal requirements with regard to the protection of whistle-blowers, may comply with the disclosure specified in paragraph
    10 (d) by stating that they are subject to those legal requirements.


    Disclosure Requirement G1-2 – Management of relationships with suppliers


    The undertaking shall provide information about the management of its relationships with its suppliers and its impacts
    on its supply chain.


    The objective of this Disclosure Requirement is to provide an understanding of the undertaking’s management of its procurement
    process including fair behaviour with suppliers .


    The undertaking shall provide a description of its policy to prevent late payments, specifically to SMEs.


    The disclosure required under paragraph 12 shall include the following information:


    (a)


    the undertaking’s approach to its relationships with its suppliers , taking account of risks to the undertaking related
    to its supply chain and of impacts on sustainability matters ; and


    (b)


    whether and how it takes into account social and environmental criteria for the selection of its suppliers.


    Disclosure Requirement G1-3 – Prevention and detection of corruption and bribery


    The undertaking shall provide information about its system to prevent and detect, investigate, and respond to allegations
    or incidents relating to corruption and bribery including the related training.


    The objective of this Disclosure Requirement is to provide transparency on the key procedures of the undertaking to prevent,
    detect, and address allegations about corruption and bribery . This includes the training provided to own workers and/or
    information provided internally or to suppliers .


    The disclosure required under paragraph 16 shall include the following information:


    (a)


    a description of the procedures in place to prevent, detect, and address allegations or incidents of corruption and bribery
    ;


    (b)


    whether the investigators or investigating committee are separate from the chain of management involved in the matter;
    and


    (c)


    the process, if any, to report outcomes to the administrative, management and supervisory bodies .


    Where the undertaking has no such procedures in place, it shall disclose this fact and, where applicable, its plans to
    adopt them.


    The disclosures required by paragraph 16 shall include information about how the undertaking communicates its policies
    to those for whom they are relevant to ensure that the policy is accessible and that they understand its implications.


    The disclosure required by paragraph 16 shall include information about the following with respect to training:


    (a)


    the nature, scope and depth of anti- corruption and anti- bribery training programmes offered or required by the undertaking;


    (b)


    the percentage of functions-at-risk covered by training programmes; and


    (c)


    the extent to which training is given to members of the administrative, management and supervisory bodies.


    Metrics and targets


    Disclosure Requirement G1-4 – Incidents of corruption or bribery


    The undertaking shall provide information on incidents of corruption or bribery during the reporting period.'
