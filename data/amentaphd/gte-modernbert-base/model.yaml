  - source_sentence: How is 'associated undertaking' defined, and what criteria determine the significant influence of one
      undertaking over another in terms of voting rights?
    sentences:
    - '▼B


      (6)


      ‘purchase price’ means the price payable and any incidental expenses minus any incidental reductions in the cost of
      acquisition;


      (7)


      ‘production cost’ means the purchase price of raw materials, consumables and other costs directly attributable to the
      item in question. Member States shall permit or require the inclusion of a reasonable proportion of fixed or variable
      overhead costs indirectly attributable to the item in question, to the extent that they relate to the period of production.
      Distribution costs shall not be included;


      (8)


      ‘value adjustment’ means the adjustments intended to take account of changes in the values of individual assets established
      at the balance sheet date, whether the change is final or not;


      (9)


      ‘parent undertaking’ means an undertaking which controls one or more subsidiary undertakings;


      (10)


      ‘subsidiary undertaking’ means an undertaking controlled by a parent undertaking, including any subsidiary undertaking
      of an ultimate parent undertaking;


      (11)


      ‘group’ means a parent undertaking and all its subsidiary undertakings;


      (12)


      ‘affiliated undertakings’ means any two or more undertakings within a group;


      (13)


      ‘associated undertaking’ means an undertaking in which another undertaking has a participating interest, and over whose
      operating and financial policies that other undertaking exercises significant influence. An undertaking is presumed
      to exercise a significant influence over another undertaking where it has 20 % or more of the shareholders'' or members''
      voting rights in that other undertaking;


      (14)


      ‘investment undertakings’ means:


      (a)


      undertakings the sole object of which is to invest their funds in various securities, real property and other assets,
      with the sole aim of spreading investment risks and giving their shareholders the benefit of the results of the management
      of their assets,


      (b)


      undertakings associated with investment undertakings with fixed capital, if the sole object of those associated undertakings
      is to acquire fully paid shares issued by those investment undertakings without prejudice to point (h) of Article 22(1)
      of Directive 2012/30/EU;


      (15)'
