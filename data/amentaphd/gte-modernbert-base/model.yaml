      Implementing partners shall fill out the Scoreboard for their proposals for financing and investment operations.


      3.


      The Scoreboard shall cover the following elements:


      (a)


      a description of the proposed financing or investment operation;


      (b)


      how the proposed financing or investment operation contributes to EU policy objectives;


      (c)


      a description of additionality;


      (d)


      a description of the market failure or suboptimal investment situation;


      (e)


      the financial and technical contribution by the implementing partner;


      (f)


      the impact of the investment;


      (g)


      the financial profile of the financing or investment operation;


      (h)


      complementary indicators.


      4.


      The Commission is empowered to adopt delegated acts in accordance with Article 34 in order to supplement this Regulation
      by establishing additional elements of the Scoreboard, including detailed rules for the Scoreboard to be used by the
      implementing partners.


      Article 23


      Policy check


      1.


      The Commission shall conduct a check to confirm that the financing and investment operations proposed by the implementing
      partners other than the EIB comply with Union law and policies.


      2.


      EIB financing and investment operations that fall within the scope of this Regulation shall not be covered by the EU
      guarantee where the Commission delivers an unfavourable opinion within the framework of the procedure provided for in
      Article 19 of the EIB Statute.


