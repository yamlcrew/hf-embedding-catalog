- source_sentence: What is the definition of 'Union processing capacity' and how does it relate to the location of processing
    operations for strategic raw materials?
  sentences:
  - '(9)


    ‘Union processing capacity’ means an aggregate of the maximum annual production volumes of processing operations for strategic
    raw materials, excluding such operations that are typically located at or near the extraction site, located in the Union;


    (10)


    ‘recycling’ means recycling as defined in Article 3, point (17), of Directive 2008/98/EC;


    (11)


    ‘Union recycling capacity’ means an aggregate of the maximum annual production volume of recycling operations for strategic
    raw materials after re- processing, including the sorting and pre-treatment of waste, and its processing into secondary
    raw materials, located in the Union;


    (12)'
