- source_sentence: What conditions must a new registrant meet in order to refer to previously submitted study summaries for
    a substance that has already been registered?
  sentences:
  - '5.


    If a substance has already been registered, a new registrant shall be entitled to refer to the study summaries or robust
    study summaries, for the same substance submitted earlier, provided that he can show that the substance that he is now
    registering is the same as the one previously registered, including the degree of purity and the nature of impurities,
    and that the previous registrant(s) have given permission to refer to the full study reports for the purpose of registration.


    A new registrant shall not refer to such studies in order to provide the information required in Section 2 of Annex VI.


