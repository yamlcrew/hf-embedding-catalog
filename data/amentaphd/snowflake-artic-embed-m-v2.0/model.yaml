- source_sentence: What procedures must competent authorities follow to verify compliance of operators and traders with the
    specified regulations regarding products they place or intend to place on the market?
  sentences:
  - '1.


    The competent authorities shall carry out checks within their territory to establish whether operators and traders established
    in the Union comply with this Regulation. The competent authorities shall carry out checks within their territory to establish
    whether the relevant products that the operator or trader has placed or intends to place on the market, has made available
    or intends to make available on the market or has exported or intends to export comply with this Regulation.


    2.


    The checks referred to in paragraph 1 of this Article shall be carried out in accordance with Articles 18 and 19.


    3.'
