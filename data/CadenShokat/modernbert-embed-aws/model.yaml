- source_sentence: geographies use DynamoDB to build modern, serverless applications that can start small and scale globally.
    DynamoDB scales to support tables of virtually any size while providing consistent single-digit millisecond performance
    and high availability. For events, such as Amazon Prime Day, DynamoDB powers multiple high-traﬃc Amazon properties and
    systems, including Alexa, Amazon.com sites, and all Amazon fulﬁllment centers. For such events, DynamoDB APIs have handled
    trillions of calls from Amazon properties and systems. DynamoDB continuously serves hundreds of customers with tables
    that have peak traﬃc of over half a million requests per second. It also serves hundreds of customers whose table sizes
    exceed 200 TB, and processes over one billion requests per hour. Topics • Characteristics of DynamoDB • DynamoDB use
  sentences:
  - What ensures that tasks are always started on secure and patched infrastructure?
  - What state is the environment in while Elastic Beanstalk creates your AWS resources?
  - What is the peak traffic that DynamoDB serves for some customers?
