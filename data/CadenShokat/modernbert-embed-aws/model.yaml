- source_sentence: 'you create the example application, Elastic Beanstalk creates the following resources: • EC2 instance
    – An Amazon EC2 virtual machine conﬁgured to run web apps on the platform you selected. Every platform runs a diﬀerent
    set of software, conﬁguration ﬁles, and scripts to support a speciﬁc language version, framework, web container, or combination
    thereof. Most platforms use either Apache or nginx as a reverse proxy to forward web traﬃc to your web app, serve static
    assets, and generate access and error logs. You can connect to your Amazon EC2 instances to view conﬁguration and logs.
    Step 2 - Deploy your application 10 AWS Elastic Beanstalk Developer Guide • Instance security group – An Amazon EC2 security
    group will be created'
  sentences:
  - What allows a client to securely access private API resources inside a VPC?
  - What resources does Elastic Beanstalk create when you create the example application?
  - Where can you find more information about using ACLs?
