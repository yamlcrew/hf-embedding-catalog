widgetData:
- source_sentence: 從保費角度分析，MCVIP 和「極臻」哪個更有競爭力？不同年齡層差異大嗎？
  sentences:
  - 友公司於 2025 年 9 月 23 日推出「愛 X 航」2 系列，較「愛伴 X」全面漲價約 7–8%。針對內地客戶，自 2024 年起已兩度漲價，累計漲價 22%。
  - 索償時須交回：已填妥的索償表格、由主診註冊專科醫生簽發的醫療報告、相關調查報告（如組織病理學報告或實驗室報告）、住院紀錄及/或手術報告（如適用）。必須於診斷日期起計 180 日內向本公司提供一切所需資料，否則本公司將不會考慮索償。
  - MCVIP 在保費上具競爭力，「極臻」全球保費較 MCVIP 計劃 4 高，甚至貴超過一倍。不同年齡層差異明顯：0 歲 Non-MCV 極臻貴約 50-65%，30 歲貴約 95-113%，50 歲貴約 62-79%。MCV 情況下，0
    歲極臻貴約 8-17%，30 歲貴約 95-114%，50 歲貴約 44-59%。
- source_sentence: 親子保費豁免保障可以豁免保费到什么时候？
  sentences:
  - 如保单持有人或其配偶身故（需符合条件），由下一个保费到期日起豁免日后所有保费，直至紧随受保人 26 岁（翌年岁）的保单周年日或直至基本计划的保费供款年期完结（以较早者为准）。
  - 计划二适合需要大中华地区保障、年度保障限额需求为 US$1,000,000 / HK$8,000,000 的客户。相比计划一，计划二保障地区覆盖完整大中华（不限指定疾病），且可在私家医院使用，终身限额为 US$3,000,000 / HK$24,000,000。
  - 嚴重疾病延伸保障的一般等候期為 1 年，即其後嚴重病況的診斷日期與對上一次獲接納賠償的診斷日期須相距最少 1 年。若曾獲接納賠償及其後索償均屬癌症，則須符合三年癌症等候期，即上一次癌症的診斷日期與其後癌症的診斷日期須相隔最少三年。
- source_sentence: 這個升級保障的身故賠償是多少？
  sentences:
  - MCVIP 高端医疗自由行计划共有四个计划级别（计划一至计划四），具体选择的计划级别、自付额、共同保险、保障及限制会列明于保障表及人寿保险证书或批注中。
  - 若受保人在本保障生效期間沒有嚴重疾病保障已付訖及/或須支付時身故，本公司將支付身故保障，金額為當時保額的 100%。在支付身故保障後，本保障將會隨即終止。
  - MCVIP 一般等候期为 30 日；意外治疗不设等候期；妊娠期并发症等候期为 300 日；儿童发展障碍等候期为：严重自闭症 90 日，语言障碍/ADHD 180 日。
- source_sentence: 如果指定的受益人還未成年，身故賠償會付給誰？
  sentences:
  - 現行年利率 1.0%（非保證，公司可不時修訂）；積存利息連同最後一期身故賠償一併支付。
  - 若受益人為未成年，身故賠償會付予已委任的未成年受益人的信託人，或未成年受益人的法定監護人。
  - CIME3 是「誠保一生危疾保 — 升級保障」，是附設於「誠保一生」危疾保（CIM3/BCIM3）的附加保障。
- source_sentence: 客戶問 TRST 的身故賠償怎麼計算？
  sentences:
  - 身故賠償為以下較高者減未償貸款及利息：(i) 保證現金價值 + 歸原紅利面值 + 終期紅利面值；(ii) 已繳總保費的 105% − 曾套現之歸原紅利現金價值；再加終期紅利鎖定戶口（如有）。已繳總保費不包括保費儲蓄戶口預繳保費；若非年繳，身故賠償須扣除當時保單年度餘下分期保費。
  - 不會賠償。根據不保事項條款，受保人於生效日或復效日起計 90 日內被註冊專科醫生診斷已患上該病況，本公司不會支付相關保障。但如果病況由意外引起而受保人於意外發生後 90 日內被診斷，則此限制不適用。
  - 可以。門診寶保障由註冊精神科醫生以門診形式提供的精神疾病診治，但受每日及每保單年度診治次數限制。
