  - 'How are flow computers and measurement systems related?

    Flow computers can have multiple systems assigned to them. However, a measurement system can only be assigned to one flow
    computer.


    Database terminology:

    In the database, this relationship is referred to as:

    - Meter streams

    - Meter runs

    - Sections


    Storage of the relationship:

    The relationship between a flow computer and its assigned measurement system is stored in a special table.


    User context:

    When a user refers to a "meter stream," they are indicating that they are searching for a measurement system assigned
    to a specific flow computer.'
