widgetData:
- source_sentence: 'task: search result | query: апартаменты 3 месяца+ кухня стиральная машина рабочее место wi-fi недалеко
    метро помесячная оплата средний сегмент'
  sentences:
  - 'title: none | text: современные апартаменты ''городской лофт'' в жилом комплексе предлагают варианты от 1 до 2 спален
    с полноценной кухней: индукционная плита, духовой шкаф, микроволновка, полный набор посуды и посудомоечная машина. в каждой
    квартире установлена отдельная стиральная машина и сушилка; постельное бельё и набор полотенец включены при заселении.
    рабочая зона с письменным столом и эргономичным креслом, оптоволоконный интернет 200 мбит/с и принтер в коворкинг-зоне
    на первом этаже. комплекс расположен в 5 мин пешком от станции метро и автобусной остановки; сквозной пропуск и консьерж,
    возможна помесячная аренда и уборка раз в 2 недели. сегмент — средний/комфорт.'
  - 'title: none | text: бутик-отель «речной берег» с камерным банкетным залом в антураже лофта: зал на 60 человек с уютной
    сценой и авторским меню шефа. на территории есть небольшая терраса у реки для мини-регистраций до 30 человек, а также
    список проверенных поставщиков кейтеринга на заказ. в отеле всего 18 номеров, парковка ограничена, возможна организация
    фуршета и коктейльной зоны для малого круга. сегмент — средний/премиум.'
  - 'title: none | text: coastal surf camp ''ocean wave'' is 50 meters from a sandy beach and designed for beginners. included
    is a 7-day beginner course (daily 2-hour lessons) with certified instructors (max. 6 people per group), theory and safe
    practice in shallow water. the price includes rental of soft training boards and wetsuits, gear storage and a drying area.
    accommodation — comfortable beachfront bungalows with shared kitchens and hot showers; on site — a small café and first
    aid station. segment — mid-range.'
- source_sentence: 'task: search result | query: хостел в центре города для бэкпекеров, бюджетный, кровати в общих спальнях,
    общая кухня и зона для общения, хорошая транспортная доступность, возрастная аудитория 18–35'
  sentences:
  - 'title: none | text: однокомнатные апартаменты «городской стандард» на первом этаже жилого дома — идеальны для срочного
    переезда. заезд возможен сегодня в любое время: система саморегистрации с цифровыми кодовыми замками, ключи выдаются без
    предоплаты; депозит отсутствует. в квартире — двуспальная кровать, раскладной диван, мини-кухня (плита, холодильник, микроволновка),
    бойлер с горячей водой, быстрый wi‑fi и стиральная машина. бронирование от 3 до 14 ночей, тариф — бюджетный, быстрая онлайн-верификация
    документов, поддержка 24/7 по телефону.'
  - 'title: none | text: бутик-отель ''праздничный манускрипт'' в историческом центре предлагает изысканный новогодний ужин
    с дегустационным сет-меню, камерную музыкальную программу и украшенную дизайнерскую ёлку в холле. вместо массового фейерверка
    гости приглашаются на приватный салют с пиротехникой на соседней крыше по предварительной записи (лимит мест). пакет ориентирован
    на взрослые пары и гостей премиум-сегмента, без детской анимации и без массового банкетного формата.'
  - 'title: none | text: хостел ''city backpackers'' находится в самом центре города, в 3 минутах пешком от станции метро.
    предлагаются места в общих спальнях на 6–10 человек, бюджетные цены и гибкая посуточная оплата. общая полностью оборудованная
    кухня (плита, духовка, микроволновка, полный набор посуды), просторный лаундж с барной стойкой, настольными играми и ежевечерними
    неформальными встречами гостей. бесплатный быстрый wi‑fi, камера хранения рюкзаков, прачечная самообслуживания и информационная
    стойка с маршрутами и локальными тусовками. атмосфера — молодёжная, дружелюбная, идеально для бэкпекеров, желающих сэкономить
    и завести знакомства. сегмент — бюджетный.'
- source_sentence: 'task: search result | query: горнолыжный отель ski-in ski-out апре-ски прокат лыж школа инструкторов бары
    средний сегмент 3-4 ночи компания'
  sentences:
  - 'title: none | text: гостевой дом ''лесная подкова'' в тихом горном посёлке предлагает уютные номера, домашнюю кухню,
    походные маршруты и аренду горных велосипедов в летний сезон. на территории — каминный зал, настольные игры и небольшая
    библиотека, в окрестностях — тропы для пеших прогулок и водопады. сегмент — бюджетный/средний.'
  - 'title: none | text: hostel ''city backpackers'' is located in the very center of the city, a 3-minute walk from the metro
    station. bunks in shared dorms for 6–10 people are offered, budget prices and flexible daily payment. a fully equipped
    shared kitchen (stove, oven, microwave, full set of utensils), a spacious lounge with a bar counter, board games and informal
    nightly guest meetups. free high-speed wi‑fi, luggage storage, self-service laundry and an information desk with routes
    and local social events. the atmosphere is youthful, friendly, ideal for backpackers who want to save money and make connections.
    segment — budget.'
  - 'title: none | text: the ''ozerny prichal'' base is located on the picturesque shore of a large lake: on the property
    8 cabin-huts are located 20–50 m from the water. each hut has its own boat on a rack and a dock for quick loading. the
    site employs a permanent gamekeeper who organizes morning and evening fishing, provides hunting accompaniment, handles
    license paperwork and points out the best spots; boat tackle and motorboat rental is available. after a day of fishing
    guests can steam in a russian banya with a plunge pool by the lake. accommodation with dogs is allowed by prior arrangement.
    segment — mid-range.'
- source_sentence: 'task: search result | query: еду работать на пару недель, нужен спокойный апарт с нормальным интернетом
    — чтобы zoom без лагов, рабочее место с удобным столом и креслом, и чтобы был коворкинг поблизости или на территории,
    вдруг захочу поменять обстановку'
  sentences:
  - 'title: none | text: хостел ''city backpackers'' находится в самом центре города, в 3 минутах пешком от станции метро.
    предлагаются места в общих спальнях на 6–10 человек, бюджетные цены и гибкая посуточная оплата. общая полностью оборудованная
    кухня (плита, духовка, микроволновка, полный набор посуды), просторный лаундж с барной стойкой, настольными играми и ежевечерними
    неформальными встречами гостей. бесплатный быстрый wi‑fi, камера хранения рюкзаков, прачечная самообслуживания и информационная
    стойка с маршрутами и локальными тусовками. атмосфера — молодёжная, дружелюбная, идеально для бэкпекеров, желающих сэкономить
    и завести знакомства. сегмент — бюджетный.'
  - 'title: none | text: апарт-отель ''work&stay'' расположен в деловом районе, 5 минут пешком до крупного коворкинга. в каждом
    номере — выделённая рабочая зона с регулируемым эргономичным столом (120×70 см), высотой регулируемым офисным креслом,
    дополнительной настольной лампой и локальным шумоподавлением. wi‑fi 200 mbps симметричный, резервная lte‑связь, выделенная
    ethernet‑розетка на рабочем месте. на территории — собственный коворкинг с переговорной на 6 человек, принтер/сканер,
    кухня для приготовления, тихая зона для концентрации и регулярные мероприятия для digital nomads. сегмент — средний.'
  - 'title: none | text: бутик-отель ''морской риф'' — adults-only комплекс в 50 метрах от частного мелкогалечного пляжа с
    зоной для пар и шезлонгами, где не допускаются гости младше 18 лет. на территории современный спа-центр: финская сауна,
    паровая с соляной стеной, комнаты для парных массажей и процедуры для двоих. номера ''люкс'' с панорамными окнами и балконами
    выходят на море, в каждом — кровать king-size, мини-бар и сервис ужина при свечах по запросу. тихая ухоженная территория,
    всего 28 номеров, романтические пакеты: ужин на пляже, шампанское и лепестки роз. сегмент — премиум/средний-премиум.'
- source_sentence: 'task: search result | query: ищу pet-friendly отель на берегу моря для семьи с грудным ребёнком (0–1 год)
    и большой собакой: номер с местом для манежа, просторная входная зона для коляски, детское питание/блендер, охраняемая
    территория и плавный спуск к пляжу; бюджет — средний сегмент.'
  sentences:
  - 'title: none | text: small glamping lounge ''forest haven'' — an eco-camp in a pine grove by the lake, with autonomous
    domes and family tents. meals — buffet at the base, no additional children''s services. entertainment is focused on active
    outdoor recreation: hiking routes, kayaking and evening campfires; there is no water park or children''s animation. segment
    — mid-range.'
  - 'title: none | text: горный эко-лагерь ''лесной приют'' расположен в сосновом бору в 40 км от побережья, предлагает коттеджи
    на деревянных сваях, огороженную территорию и прогулочные тропы. приют берёт с собой мелких собак по согласованию, ориентирован
    на активный отдых: походы, велосипеды, экскурсии по лесу. для семей есть общая игровая площадка и мангал-зона, но отсутствует
    инфраструктура для купания и пляжных развлечений. сегмент — бюджетный/эко.'
  - 'title: none | text: хостел «молодёжный уголок» в спальном районе предлагает койко-места в общих и двухместных комнатах,
    общую кухню, общую душевую комнату и низкие цены. здание старое, есть несколько ступеней на входе, узкие коридоры и санитарные
    узлы без адаптации. расположен в отдалении от центра, ориентирован на студентов и бэкпекеров. сегмент — бюджетный.'
