widgetData:
- source_sentence: 'task: search result | query: глэмпинг для удалённой работы с быстрым интернетом посреди леса'
  sentences:
  - 'title: none | text: бюджетный городской хостел ''городской лайнер'' в центре города предлагает общие комнаты и отдельные
    семейные капсулы, общую кухню и лаундж с настольными играми. рядом — городской аквапарк (трансфер за плату) и детские
    развлекательные центры; собственных анимационных программ и детского клуба у хостела нет. подходит для путешественников-бэкпекеров
    и подростков, не для комфортного семейного отдыха у моря. сегмент — бюджетный.'
  - 'title: none | text: кемпинг ''речная роща'' — открытая палаточная зона на берегу реки с общими туалетами и душевыми,
    общей кухней и большим лагерным костром. подходит для любителей живого общения и активного отдыха: сплавы, рыбалка, вечерние
    концерты. связь слабая, интернет отсутствует; электрозаправки и розетки только в приёмной зоне. сегмент — бюджетный.'
  - 'title: none | text: семейный санаторий ''здоровье и радость'' предлагает комплексные лечебные программы: кардиологическая
    реабилитация под контролем врача, индивидуальные занятия лфк, электрофорез и массаж, физиотерапевтические процедуры. на
    базе центра — медицинский кабинет с круглосуточным дежурством, регулярные консультации кардиолога и программы восстановительной
    физкультуры. для детей: детский клуб 3–12 лет с разделением по возрастным группам, ежедневная анимация 2 часа (утром и
    вечером), возможна оплата услуг няни по запросу, большая огороженная игровая площадка с безопасным покрытием и крытой
    игровой комнатой. номера — семейные и смежные комнаты, питание по диетам для пожилых и детское меню. сегмент — средний.'
- source_sentence: 'task: search result | query: отель открытый круглый год на горнолыжном курорте даже летом, для треккинга'
  sentences:
  - 'title: none | text: современный бизнес‑отель ''альянс бизнес'' расположен в самом сердце делового квартала, в 5 минутах
    пешком от основного бизнес‑центра. рецепция работает 24/7; завтрак «шведский стол» подаётся ежедневно с 05:30, есть опция
    раннего кофе‑пакета в 05:00. на территории — две переговорные комнаты (на 4 и на 8 человек) с проектором, видеоконференцсвязью
    и доской, бронирование по часам. в каждом номере — рабочая зона, эргономичное кресло и ethernet‑порт; корпоративный wi‑fi
    заявлен 200 mbps с приоритетом для бизнес‑гостей. средний сегмент, ежедневная уборка, услуга экспресс‑завтрака и трансфер
    до ближайшей станции метро.'
  - 'title: none | text: горный отель ''альпийский порог'' открыт круглогодично и расположен в 800 метрах от нижней станции
    канатной дороги. летом отель выступает как база для треккинга: на стойке ресепшн — подробные карты и ежедневные советы
    гидов, организуются трансферы к начальным точкам троп, хранение рюкзаков и сушка одежды. номера среднего сегмента для
    2–3 человек, в каждом — скромный балкон с видом на вершины; в стоимость включён плотный континентальный завтрак. на территории
    — камера хранения для горнолыжного и треккингового снаряжения, мини-мастерская для ремонта треккинговых палок и обуви,
    и прачечная. идеально подходит для трёх взрослых, планирующих летние пешие маршруты и однодневные перевалы.'
  - 'title: none | text: бутик-отель ''городской уют'' привечает гостей с собаками и в описании использует яркие фото питомцев.
    на территории есть большая зелёная лужайка и персонал бесплатно предоставляет миски и одеяла. при заселении взимается
    символический депозит, который возвращается при выезде. в шаговой доступности (около 3,5 км) есть ветклиника, добираться
    удобнее на такси. сегмент — средний.'
- source_sentence: 'task: search result | query: capsule hotel at the airport for 6 hours between flights'
  sentences:
  - 'title: none | text: загородный комплекс «речной берег» — уютный отель в 40 км от города с 50 номерами, двумя просторными
    банкетными залами и одной конференц-комнатой на 30 человек. на территории сезонный верёвочный парк — лёгкие маршруты для
    отдыхающих, но без профессионального страхования, плюс предложения по аренде на самоуправляемые туры. вечерами доступна
    финская сауна в основном корпусе (общая для гостей), а также несколько выездных тимбилдинг-квестов, которые организуют
    внешние подрядчики по запросу. сегмент — средний.'
  - 'title: none | text: курортный отель ''семейный причал'' предлагает просторные семейные номера, детский клуб 3–12 лет,
    анимацию и детское меню; на территории есть спа‑центр с бассейном и открытая сауна. для взрослых доступны массажи и процедурный
    кабинет, а также банкетные залы для праздников. отель популярен у семей с детьми и часто проводит семейные фестивали по
    выходным. сегмент — средний.'
  - 'title: none | text: capsule hub ''transit pods'' is located inside the international terminal (in the area after passport
    control) and offers capsules for daytime rest from 3 to 12 hours. each capsule is equipped with a 2-meter orthopedic mattress,
    a blackout curtain, an individual ventilation system, usb outlets and a 220v socket, built-in lighting with a dimmer and
    a lockable carry-on luggage locker. at the reception — express check-in/check-out in 2 minutes, there are shower cabins
    with hot water and towels, and a small lounge area for a quick snack. mid-price segment, payment by the minute/hour, online
    booking available for a fixed 6-hour slot.'
- source_sentence: 'task: search result | query: glamping for remote work with fast internet in the middle of the forest'
  sentences:
  - 'title: none | text: хостел ''морской бриз'' в центре курортного района предлагает койко-места в общих номерах, общую
    кухню, бар и программу вечеринок по соседству с набережной. подходит для молодёжных компаний и туристов на отдыхе. сегмент
    — бюджетный.'
  - 'title: none | text: бутік-отель ''морской шик'' — современный бутик-отель на первой береговой линии с витражными окнами
    и панорамным рестораном. номера класса ''люкс'' и ''делюкс'' с видом на море, услугам консьержа, spa-центр и бассейн на
    крыше. заезды обычно планируются заранее, минимальный срок бронирования — 7 ночей, и свободных номеров на майские в последний
    момент нет; парковка платная по предварительной заявке.'
  - 'title: none | text: glamping ''lesnoy kaban'' — a complex of 12 self-contained dome cabins in a deep pine forest, 15
    km from the nearest village. each cabin has a dedicated work corner with an ergonomic chair and desk, two electrical outlets
    and usb ports, and a local signal booster: wired internet 200 mbps and a backup 5g modem. the site is quiet and secluded
    — minimal number of guests at the same time, a private terrace with a view of the forest, electric heating and air conditioning,
    parking at the cabin. on the premises — a small café with coffee and business lunches, laundry and a first-aid point.
    segment — mid.'
- source_sentence: 'task: search result | query: hotel near the hospital for a patient''s relatives, long-term stay, inexpensive'
  sentences:
  - 'title: none | text: sanatorium ''istok zdorovya'' — a specialized complex for the elderly with an on-site medical center.
    specialized programs are offered: cardiac rehabilitation and recovery for musculoskeletal diseases with courses of therapeutic
    exercise, massages, and physiotherapy. guests have access to dietetic meals prescribed by a physician with individualized
    menus, a laboratory, and daily medical examinations. on the grounds — a mineral spring with a bathing-treatment department
    (baths with mineral water 36–38°c) and thermal pavilions. the territory is fenced, accessible infrastructure: elevators,
    handrails, specialized offices; segment — mid-range.'
  - 'title: none | text: отель ''снежный причал'' — комфортный городской отель среднего сегмента, предлагает специальный новогодний
    пакет: праздничная программа с ведущим и живой музыкой, украшенная большая живая ёлка в лобби, новогодний банкет (шведский
    стол + горячее гала-меню) и организованный профессиональный фейерверк во внутреннем дворе ровно в полночь 31 декабря.
    пакет включает размещение в номере стандарта или полулюкса, поздний выезд 1 января, детское меню и анимацию для детей
    4–12 лет. на территории — утеплённый уличный фонтан и охраняемая парковка. сегмент — средний.'
  - 'title: none | text: camping ''forest glade'' offers secluded chalet cabins and tent pitches 40 km from the city, with
    a shared grill kitchen on site and seasonal laundry. suitable for family outdoor recreation: playground, bicycle rental
    and evening campfires. prices — budget segment off-season, but there is no access to the hospital.'
