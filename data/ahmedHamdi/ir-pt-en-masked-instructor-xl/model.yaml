  - 'Represent the plot:  In 1997, PERSON, an obituary and wedding announcement writer for ORG, returns to her hometown of
    GPE, GPE, for her younger sister PERSON''s wedding, accompanied by her fiancé, lawyer PERSON. When PERSON tells her grandmother
