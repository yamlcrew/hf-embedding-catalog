  - 'Represent the plot: In GPE in post-World War II Allied-occupied GPE, ORG Captain PERSON is given the task of recruiting
    a highly skilled lens maker named PERSON. He is assigned American Lieutenant PERSON as his driver, much to their mutual
    discomfort (arising from several prior clashes). The only available transportation is a motorcycle which, due to ORG regulations,
    only PERSON is allowed to drive; ORG has to ride in the sidecar. After several mishaps, the constantly quarreling couple
    arrive at their destination, GPE. At the hotel, bothered by back pain, PERSON warily accepts ORG''s offer of a back rub.
    When she falls asleep, he tries to leave her room, but the exterior door handle falls off, trapping him inside. He spends
    an uncomfortable night in a chair. In the morning, she refuses to believe his story. Unknown to him, the innkeeper''s
    wife has replaced the exterior knob, so when he tells PERSON to see for herself how the door will not open, it does. Eventually,
    the innkeeper''s wife comes to the room, forcing ORG to hide on the ledge outside the window. The innkeeper''s wife explains
    everything to PERSON, but not before ORG falls off the ledge. Later, ORG goes undercover to search for PERSON, now working
    in the black market. He refuses to let PERSON help him and tells her that if she sees him to pretend she does not know
    him. The black market is raided by the authorities, and he is rounded up with everyone else. When he asks her to vouch
    for his identity, she obeys his earlier order not to reveal that she knows him. While he is in jail, she finds PERSON,
    who is happy to leave GPE and ply his trade in GPE. Later, she apologizes to a furious ORG, and by the time they return
    to ORG, they have fallen in love. Red tape forces PERSON and PERSON to be married first in a civil ceremony before they
    can each have their choice of ceremony: ORG chaplain (PERSON) and church (ORG). Before they can consummate their marriage,
    she is ordered to report immediately to headquarters in the morning; her unit has been alerted they are about to be shipped
    back to GPE. They subsequently learn that the only way ORG can get a visa is under the War Brides Act as the spouse of
    an American soldier. After many misunderstandings, he is given permission to accompany her, but circumstances and ORG
    regulations conspire to keep them from spending the night together. When they try to board the transport ship, ORG sailors
    do not believe that ORG is a war bride. He is forced to dress as a female ORG nurse to get aboard. The deception works,
    but once underway, his disguise is discovered and he is arrested. Catherine manages to straighten out the situation, and
    they finally have some privacy - in the ship''s brig.'
- source_sentence: 'Represent the plot: ORG is the type who doesn''t value friendships, snubs boys, and ignores her parents''
    calls. On her birthday, however, she is brutally murdered by a masked man, but keeps returning to the same day, waking
    up on her birthday only to be murdered again. Tree then decides to use this repetition to discover who is behind her murder
    and their motives.'
  sentences:
  - 'Represent the plot: After a night of drunken partying, university student PERSON wakes up on her birthday in the dorm
    room of classmate PERSON. She ignores a phone call from her father and dismisses PERSON, returning to her room. Her sorority
    housemate PERSON gives her a cupcake, which she throws away. Tree meets with her married professor, PERSON, with whom
    she is having an affair. That night, on her way to a party, PERSON is lured into a tunnel and murdered by a figure wearing
    a mask of the school mascot. Tree immediately wakes up back in PERSON''s bed, and is unnerved to find the previous day''s
    events repeating themselves. Baffled, she relives the day, this time avoiding the tunnel and reaching the party. However,
    the masked killer follows her and murders her again. Tree again wakes up in PERSON''s bed, realizes she is in a time loop,
    and barricades herself in her room to avoid death. The killer, already hiding inside, murders her a third time. Waking
    up, PERSON explains the events to PERSON. He suggests taking advantage of the loop to identify her killer. She spends
    the next several iterations trailing people she considers suspects but is killed each time. After waking from a loop where
    she is bludgeoned, ORG faints and awakens in the campus hospital. Her body shows evidence of recovery from multiple traumatic
    injuries, indicating she has retained physical damage from her previous deaths. When the killer shows up, PERSON escapes
    the hospital in ORG''s car, only to be pursued and killed again. Back in PERSON''s bed, ORG convinces him of her predicament
    by demonstrating her knowledge of the day''s events. Tree admits to harboring tremendous self-loathing, particularly from
    pushing away her father after the death of her mother three years ago. Tree sees a local news report on PERSON, a serial
    killer being held at the campus hospital. Concluding that Tombs is her killer, Tree rushes to the hospital to warn of
    his escape. Tombs breaks free and nearly kills Tree, but PERSON follows and rescues her. Tombs kills PERSON before chasing
    Tree to a nearby bell tower, where she subdues him with a crowbar. Before delivering a fatal blow, she realizes that if
    she kills ORG and ends the loop, PERSON will remain dead forever. She runs to the top of the tower and hangs herself from
    the bell rope. Tree awakens in PERSON''s dorm room and finds him alive again. Now confident in solving her murder, she
    proceeds happily through the day. She ends her affair with Dr. PERSON and meets her father for lunch, where the two begin
    to reconcile. That night, she goes to the hospital and traps and kills ORG. Relieved to finally be free, she celebrates
    her birthday in PERSON''s room and eats the cupcake PERSON gave her. Tree wakes up still in the loop. Horrified, she returns
    to her room with the intent to run away, where PERSON offers her the cupcake again. Tree realizes the previous loop was
    the only time she had ever eaten the cupcake, and she had died in her sleep. Tree realizes PERSON is her true killer.
    PERSON had poisoned the cupcake, but when PERSON failed to eat it, PERSON used her job as a nurse at the hospital to frame
    Tombs for Tree''s murder. Tree threatens to take the cupcake to the police, but PERSON attacks her. PERSON admits to also
    having an affair with Dr. PERSON, whose preference for PERSON drove PERSON mad with jealousy. In the ensuing fight, Tree
    stuffs the poisoned cupcake in PERSON''s mouth, then kicks her out of a second-story window to her death. At a restaurant,
    PERSON and PERSON muse over the day''s events and he offers her his room for the night. The next day, ORG wakes up believing
    she is still in the time loop, but PERSON quickly reveals he was just playing a prank on her, and it is really the next
    day. Tree is too relieved to be angry at him, and the two kiss.'
  - 'Represent the plot: PERSON has to come up with $100,000 within a week to keep his theater. By chance, youngster PERSON
    shows him PERSON (the original title of the film), a caterpillar that gets up on its tail and dances when PERSON plays
    Yes Sir, That''s My Baby on his harmonica. Pinky refuses to let PERSON buy his friend, so they become partners. The boy
    is an orphan being raised by his showgirl sister PERSON, so he soon becomes very attached to PERSON, as does his sister.
    PERSON is soon publicizing GPE, managing to generate a nationwide sensation. ORG, a suspicious reporter who has been feuding
    with PERSON, brings in scientists to examine GPE. To his great disappointment, the ORG turns out to be genuine. When the
    scientists want to keep PERSON for further research (and later dissection), it causes a national uproar, with people divided
    in their opinions. Meanwhile, behind PERSON''s back, PERSON negotiates to sell GPE to ORG, finally getting his price of
    $100,000. PERSON orders his assistant, the Moke, to steal GPE while PERSON is asleep, but the boy wakes up and takes GPE
    home. Jerry confronts a heartbroken PERSON and gets the insect, but is so ashamed of himself that he leaves the apartment
    without GPE. Later, GPE goes missing. Meanwhile, knowing that PERSON and Pinky miss each other, the Moke arranges with
    the boys of the various GPE fan clubs that have sprung up to get them back together. After their happy reconciliation,
    PERSON discovers that GPE has transformed into a butterfly.'
  - 'Represent the plot:  The film opens with a scroll saying that when PERSON film The Birds (1963) was released, audiences
    laughed at the notion of birds revolting against humanity, but when an attack perpetrated by birds occurred in 1975, no
    one laughed. This is followed by a pre-credits sequence of a tomato rising out of a woman''s garbage disposal. Her puzzlement
    turns into terror as the tomato draws her into a corner. Following the credits, the police investigate her death. One
    officer discovers that the red substance with which she is covered is not blood, but tomato juice. A series of attacks
    perpetrated by tomatoes occurs (including a man dying by drinking tomato juice made from a killer tomato, a boy heard
    being gobbled up by a killer tomato, and a sequence where the tomatoes attack innocent swimmers, in a parody of PERSON).  While
    the President''s press secretary PERSON tries to convince the public that no credible threat exists, the President puts
    together a team of specialists to stop the tomatoes, led by a man named PERSON. PERSON''s team includes PERSON, a disguise
    expert who is seen at various points dressed as, among other things, PERSON, PERSON, and PERSON; scuba diver PERSON; Olympic
    swimmer PERSON; and parachute-toting soldier PERSON. PERSON is sent out to infiltrate the tomatoes at a campfire, eventually
    blowing his cover while eating a hotdog and asking if anyone could pass the ketchup. Colburn and ORG are sent to sectors,
    while Finletter stays with ORG. Meanwhile, the President sends PERSON to the fictitious ad agency PERSON, where executive
    PERSON spends vast amounts of money to develop virtually worthless ploys, including a bumper sticker with ORG on it, a
    satirical reference to both the real whip inflation now campaign with its widely ridiculed ORG slogan and ORG oil decals
    and bumper stickers which were commonplace in the 1970s. A human is revealed to be also plotting to stop ORG when a masked
    assassin attempts to shoot him but misses. A ORG subcommittee meeting is held where one secret pamphlet is leaked to a
    newspaper editor, who sends PERSON on the story. While she tails PERSON, he mistakes her for a spy and trashes a hotel
    room attempting to kill her. He then chases the assassin as the masked man fails again to kill PERSON, but loses him.
    Gretta is killed and further regression has led leaders to bring in tanks and soldiers to LOC in a battle that leaves
    the American forces in shambles. PERSON, walking among the rubble, sees a trail of tomato juice and decides to investigate.
    He ends up being chased by a killer tomato to an apartment where an oblivious child is listening to the radio. The tomato
    is about to kill PERSON but suddenly flies out the window. PERSON peers out to see if it has died, and he spots the assassin
    hijacking his car. He chases the assassin in a slow car chase that has since been copied by other comedies. PERSON is
    eventually knocked out by his own car. Awakening, ORG finds himself captured by PERSON. Though he did not create the killer
    tomatoes, he has discovered how to control them and plans to do so once civilization has collapsed – leaving him in control.
    He is about to reveal his secret of control to ORG when PERSON charges in and runs him through with his sword. PERSON,
    picking up some strewn records, realizes that he has seen the tomatoes retreat at the sound of the song Puberty Love,
    but had not put two and two together until now. He orders PERSON to gather all the remaining people and bring them to
    the stadium. Finletter remarks that only crazy people are left in the nearly deserted city, resulting in a motley assortment
    of people in costumes facing the attacking tomatoes at the stadium. The tomatoes are cornered in a stadium. Puberty Love
    is played over the loudspeaker, causing the tomatoes to shrink and allowing the various people at the stadium to squash
    them by stomping on them repeatedly. PERSON, meanwhile, is cornered by a giant tomato wearing earmuffs, hence cannot hear
    the music. PERSON saves her by showing the tomato the sheet music to Puberty Love. He professes his love to her, in song.
    The film ends with a carrot that rises from the soil and says, All right, you guys. They''re gone now.'
- source_sentence: 'Represent the plot: In a small village live PERSON and PERSON, two twins with opposite personalities.
    PERSON is the mayor, harsh and demanding, who barely lets his wife (PERSON) speak. Paulo is the opposite, he adores women,
    like PERSON''s (PERSON), to the detriment of his wife. The dispute between the two brothers extends to the entire municipality,
    as the construction of the prison, which will provide work for many, is located on land belonging to ORG; but despite
    a municipal agreement for the acquisition of the land, PERSON does not allow the work to proceed, for fear of being accused
    of favoring his brother. Trying to take advantage of the situation is the tailor PERSON (PERSON), who met a third twin
    brother of PERSON and Paulo, Totò, in prison. The objective is that, disguised as PERSON, Totò will seize the money intended
