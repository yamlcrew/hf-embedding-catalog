- source_sentence: 'Represent the plot: After a comet passes by LOC, a rebellion of machines against humans is provoked; the
    city''s trucks begin to move on their own, seeming to have the power of thought, and all who stand in their way are hunted
    to death.'
  sentences:
  - 'Represent the plot: In 1835, PERSON discovers uneasy disputes between the Mexican government and the American immigrants
    who''ve settled in GPE. Dozens of American men, including PERSON have been arrested for supposedly igniting rebellions
    against the Mexican governor PERSON and the Mexican garrisons throughout GPE. Bowie attends a meeting of the Texian malcontents,
    listens to their arguments but urges calm and patience. Several of the Texians confront PERSON that he is not only a large
    landowner, but he is married to a daughter of a Mexican Lieutenant Governor. PERSON says these things are true. When faced
    with accusations he is disloyal to the American settlers, PERSON, who has only recently used his influence to free PERSON
    from arrest, leaves. After his departure, PERSON the Bull Radin, a hot head Texian challenges PERSON to a knife fight.
    PERSON wins the fight and the respect of PERSON. On his return home PERSON is arrested by Mexican soldiers and brought
    to General GPE. Unlike other films depicting the Texas War of Independence, GPE and GPE are friends and respect each other.
    PERSON relates the concerns of the Texians and notices GPE has a ORG complex. He advises GPE to free the arrested political
    prisoners and return GPE to following the terms of the 1824 Constitution of Mexico. The two men agree to disagree but
    GPE informs PERSON of the real reason his soldiers had brought him to him; PERSON''s wife and children have died in a
    cholera epidemic. Bowie becomes a heavy drinker and a drifter. He eventually sides with the Texians when he meets with
    PERSON who tells him pacifism is no longer an option. After leading a band of mounted fighters in victory against Mexican
    dragoons at the Grass Fight, he and his men arrive in GPE where he remains with his men. With tempers increasing between
    Travis and Bowie, both colonels in the Army of Texas. PERSON suggests the garrison of the Alamo vote for their commander
    with PERSON winning and PERSON becoming his second in command. The command expect reinforcements that never come. When
    Colonel PERSON arrives, rather than the tales of his one thousand men, ORG only has 29 fighters. GPE army besieges the
    Alamo, and though allowing the women and children to leave in peace, Captain PERSON''s wife and ORG, who loves PERSON
    refuse to go. During the siege GPE and PERSON meet one more time under a flag of truce with each man understanding the
    other''s view that events have spiralled out of control. PERSON refuses to surrender the Alamo or to sit out the battle
    as GPE prisoner. Later PERSON is severely injured when seizing a Mexican cannon and bringing it back to the Alamo; his
    increasing ill health leads PERSON to grant full command to PERSON. By now the two have come to respect each other.'
  - 'Represent the plot: On July 19, 1987, as the LOC crosses the tail of a comet, previously inanimate machines suddenly
    spring to life; an ORG insults a customer (King in a cameo) and ORG rises during heavy traffic, causing all vehicles upon
    the bridge to fall into the river or collide. Chaos sets in as machines of all kinds begin attacking humans worldwide.
    At the Dixie Boy Truck Stop just outside GPE, GPE, employee PERSON is blinded after a gas pump sprays diesel in his eyes.
    An electric knife injures waitress PERSON, and arcade machines in the back room electrocute a customer. PERSON and paroled
    ex-convict PERSON begins to suspect something is wrong. Meanwhile, at a ORG game, a vending machine kills the coach by
    firing canned soda point-blank at him. A driverless road roller flattens one of the fleeing children, but PERSON''s son
    PERSON manages to escape on his bike. Newlyweds PERSON and PERSON stop at a gas station, where a tow truck tries to kill
    PERSON, but he and ORG escape in their car. PERSON rides through his town as humans and even pets are brutally killed
    by lawnmowers, chainsaws, electric hair dryers, pocket radios, ORG cars and an ice cream truck. At LOC, a garbage truck
    kills PERSON, and a truck sporting a giant GPE mask on its grille runs into bible salesman PERSON, sending his body into
    a ditch. Later, several big rig trucks encircle the truck stop. PERSON and PERSON are pursued by a semi-truck, but they
    outmaneuver it at a sharp turn. causing it to crash off the side of the road as it explodes. They arrive at the truck
    stop and see the situation, but PERSON realizes they are safer in the fortified PERSON than out in the open. They try
    to pass between the trucks, but their car is hit and overturned. PERSON and PERSON, a hitchhiker, rush to help them, but
    the trucks attack them. The owner PERSON uses M72 LAW rockets he had stored in a bunker hidden under the diner to destroy
    many of the trucks. PERSON makes it to the truck stop later that evening and tries to enter via the sewers, but is obstructed
    by the wire mesh covering the opening. That night, the survivors hear ORG screaming in a ditch, and PERSON and PERSON
    sneak out to help him by climbing through the sewers. PERSON finds PERSON and believes he is dead, but he suddenly jumps
    up and attacks PERSON. PERSON and PERSON rescue PERSON and a truck chases them back into the pipe. The next morning, a
    bulldozer and a platform truck drive to the truck stop. The angered PERSON uses the rocket launcher to blow up the bulldozer,
    but the platform truck fires its post-mounted machine gun into the building, killing several people, including GPE and
    PERSON. The truck then demands, via sending morse code signals through its horn that PERSON deciphers, that the humans
    pump the trucks'' diesel for them in exchange for their lives. The survivors soon realize their own machines have enslaved
    them. PERSON suggests they escape to a local island just off the coast, on which no motorized vehicles are permitted.
    While the crew is resting, PERSON theorizes that the comet is actually a broom operated by interstellar aliens that are
    using LOC''s machines to destroy humanity so the aliens can repopulate the LOC. During a fueling operation, PERSON sneaks
    a grenade onto the platform truck, destroying it, then leads the party out of the diner via a sewer hatch to the main
    road just as the trucks demolish the entire truck stop. The GPE truck pursues the survivors to the docks, managing to
    kill trucker PERSON when he falls behind, and when the ice cream truck appears, PERSON and PERSON shoot it and it gets
    destroyed. After PERSON destroys the truck with a direct hit from a rocket shot, the survivors then sail off to safety.  An
    epilogue explains that 2 days later, a UFO was destroyed by a Soviet weather satellite conveniently equipped with class
    IV nuclear missiles and a laser cannon. 6 days later, LOC passes out of the comet''s tail, and the survivors are still
    alive.'
  - 'Represent the plot: The demon ORG has a bet with an PERSON that he can corrupt a righteous man''s soul and destroy in
    him what is divine. If he succeeds, the ORG will win dominion over earth. The Devil delivers a plague to the village where
    GPE, an elderly alchemist, lives. Though he prays to stop the death and starvation, nothing happens. Disheartened, GPE
    throws his alchemy books in the fire, and then the Bible too. One book opens, showing how to have power and glory by making
    a pact with the Devil. He goes to a crossroads as described in the book''s procedure and conjures up the forces of evil.
    When PERSON appears at the roadside, he induces GPE to make a trial, 24-hour bargain with the Devil. Faust will have ORG''s
    service till the sand runs out in an hourglass, at which time the ORG will rescind the pact. At first, ORG uses his new
    power to help the people of the village, but they shun him when they find out that he cannot face a cross. They stone
    him and he takes shelter in his home. Faust then makes a further deal with ORG, who gives GPE back his youth and offers
    him earthly pleasures and a kingdom, in return for his immortal soul. Mephisto tempts GPE with the vision of a beautiful
    woman. He then takes him to a wedding feast in GPE, to meet the subject of his vision, an Italian Duchess. Faust departs
    with her, leaving the ORG to kill her groom. Just as GPE is making love to her the sands run out. He is obliged to seal
    the deal permanently in order to continue his love-making; he is ORG''s forever. Faust soon grows weary of ORG for ORG.
    Here PERSON falls in love with an innocent girl, PERSON, who is charmed into loving GPE by a golden chain left by the
    Devil. Faust comes to PERSON''s room. The devil rouses the mother who sees them and drops dead from shock. The devil then
    incites her soldier brother, PERSON, to run home to catch her lover. PERSON and GPE fight a duel. The Devil intervenes
    and stabs GPE in the back. He then goes around town shouting murder. Faust and ORG flee on the back of a hellish steed.
    PERSON condemns GPE for his murder and his sister as a harlot in his dying breath. She is put in the stocks and subjected
    to jeering. The girl has a child (by GPE) and ends up in the streets. In a blizzard she sees a vision of a warm cradle
    and lays her child down on the snow, where the child dies of exposure. Soldiers find her and she is sent to the stake
    as a murderess. Faust sees what is happening and demands ORG take him there. Faust arrives just as the fire has been started
    to burn his lover. Faust wishes he had never asked to have his youth back. ORG smashes the mirror with ORG''s reflection
    and he loses his youth. He runs through the assembled mob towards PERSON; and it is as an old man that GPE throws himself
    onto the fire to be with his beloved. Gretchen recognizes Faust and sees him in her heart as a young man again as the
    fire consumes them together. Their spirits rise to the heavens. The angel reveals to GPE that he has lost the bet because
    Love has triumphed over all.'
- source_sentence: 'Represent the plot: In 1997, PERSON, an obituary writer and wedding announcement writer for ORG, travels
    to GPE for her sister PERSON''s wedding, accompanied by her fiancé PERSON. At a pre-wedding party, PERSON discovers from
    her grandmother PERSON that her mother PERSON eloped to Cabo San Lucas to spend time with her prep school classmate PERSON
    a week before her wedding to PERSON''s father, PERSON. PERSON points out PERSON''s parents married just under nine months
    before her birth, leading her to wonder if PERSON might actually be her biological father. PERSON also discovers that
    her grandmother may have been the inspiration for Mrs. PERSON, a famous character in the novel The Graduate. After the
    wedding, determined to find out more about PERSON and her mother''s past, PERSON decides to fly to GPE, where PERSON,
    now a highly successful and very wealthy LOC internet assistant, is heading to a seminar. She meets him and he admits
    to the affair, but he assures PERSON that he couldn''t be her father because he PERSON suffered blunt testicular trauma
    while playing in a high school football game and, as a result, is sterile. The two go out for drinks, and the next morning
    PERSON wakes up in PERSON''s bed at his home in LOC. Despite feeling guilty about her behavior, PERSON allows PERSON to
    convince her to be his date to a charity ball, where she meets PERSON''s son, Blake. PERSON explains his wife wanted a
    biological child and was artificially inseminated to become pregnant. Softened, PERSON kisses PERSON and is caught by
    PERSON, who has returned to GPE to find her. After an ensuing argument, PERSON leaves. Dejected, PERSON returns to visit
    PERSON, who is furious when she discovers PERSON slept with her granddaughter. The two discover that PERSON suffered an
    anxiety attack during the flight to her honeymoon and wants to talk to PERSON. PERSON tells her sister about the relationship
    of three generations of GPE women who had sexual relations with PERSON. She reassures PERSON, who says she is truly in
    love with her husband, ORG, and in doing so realizes she is ready. "To marry PERSON. It was also revealed that PERSON
    was the one who accidentally caused PERSON''s testicular trauma. This gives PERSON some real nervousness about being around
    him, but brings PERSON great joy and pleasure with her son-in-law. PERSON reveals to PERSON that he always knew about
    PERSON and her affair with PERSON. Although PERSON was just a fling for her, PERSON went back to PERSON because she loved
    him and that he was someone she could build a life with. The night she returned, PERSON was conceived. This explains the
    difference between her birthday and her parents'' wedding date. Determined to get PERSON back, PERSON returns to GPE and
    tells her fiancé about her feelings. They reconcile on the condition that if they have a daughter, she will not be allowed
    anywhere near PERSON. The film ends with PERSON and PERSON''s wedding.'
  sentences:
  - 'Represent the plot:  PERSON and PERSON girlfriend of PERSON, PERSON, is on the streets and picked up by a holy roller
