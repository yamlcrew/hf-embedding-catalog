    - 'Represent the plot: GPE slackers and lifelong best friends PERSON and PERSON Remer gate crash a high-school reunion
      and are shunned by their classmates. They find themselves outside drinking beer and shooting a basketball when two classmates
      challenge them to a game. After seeing that their opponents are very good at basketball, they say they will only play
      a game they picked up in the streets (while secretly inventing the rules as they play, based on and combining elements
      of both basketball and baseball). After winning, they decide to refine the rules to the game and ORG makes the first
      ORG out of a La-Z-Boy chair. Their friend, PERSON, tags along and the sport becomes very popular in the neighborhood
      over the next six months. Businessman PERSON meets ORG and LOC and proposes the creation of ORG) along with numerous
      rules in place to prevent its decline: teams cannot switch cities, players cannot be traded, individuals cannot make
      money via corporate sponsorship deals, and anyone who wants to play can freely participate, with PERSON stating that
      anyone can be a sports hero. Though reluctant, ORG ultimately accepts the opportunity. Five years later, the NBL is
      in full swing with teams, fans, stadiums, and a major championship, the Denslow Cup. PERSON owns ORG, ORG and ORG''s
      team. During the championship game, he dies from choking on a hot dog, causing ORG to miss his shot and costing the
      Beers the game. PERSON''s will names ORG as owner of the Beers for one year on the condition that they win the next
      Denslow Cup; otherwise, ownership reverts to PERSON''s widow ORG. ORG and ORG then meet PERSON, head of ORG, and PERSON,
      one of the children in her care and a passionate fan of ORG; ORG, LOC and Squeak begin spending time with the two, with
      ORG eventually forming a romantic relationship with PERSON. PERSON, owner of ORG, wants to remove PERSON''s rules preventing
      monetization of the sport, having been unable to do so during PERSON''s lifetime. However, ORG refuses to accept any
      changes; ORG partners with PERSON as he tries to make the Beers lose the next Denslow Cup so she will own the team;
      however, the Beers still continue winning games and heading towards the championship. Cain approaches Remer, telling
      him that he made an offer to ORG, but ORG refused without telling Remer. Remer confronts ORG about what ORG told him,
      and ORG quickly compromises by declaring PERSON part owner of the team. Later, Cain cuts the funding to PERSON''s foundation
      in an attempt to get ORG and PERSON to adopt a clothing line; ORG opposes it, but LOC agrees and becomes conceited with
      his newfound A-list status. After the semifinals, ORG blackmails ORG and Remer into losing or forfeiting the Denslow
      Cup game, or else he will inform the public that the clothing line has been produced through child labor in Calcutta,
      thus ruining the team and PERSON''s foundation. PERSON learns about the scandal and breaks up with ORG, as ORG and PERSON
      blame each other for the controversy, with PERSON declaring that ORG was no longer his best friend. With their friendship
      dissolved, ORG goes to Calcutta, aiming to resolve the situation by replacing the child workers with adults. Returning
