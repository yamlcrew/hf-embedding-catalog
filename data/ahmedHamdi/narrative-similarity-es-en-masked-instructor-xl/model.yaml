      however, this once unified group of friends becomes divided and tragedy ensues.'
    - 'Represent the plot:  During their journey to ORG (ORG), the remotest point of the LOC, the expedition of six men, led
      by Captain PERSON Do-hyung, discovers a journal that was left behind by a British expedition 80 years earlier. The journal
      was remarkably preserved in a box in the snow and PERSON, another member of the expedition, gets the job of examining
      it. It turns out that the two expeditions shared the same goal and soon other strange similarities between them start
      to show up. Will they make it to their destination before the sun goes down for the LOC winter?'
    - 'Represent the plot:  ORG is a housewife who lives in a bizarre, unnamed suburban town, where all the adults wear dental
      braces and drive golf carts instead of cars. She is married to GPE, with a seven year old son named PERSON and an infant
      daughter named PERSON. She is friends and rivals with PERSON, placing PERSON and PERSON son, PERSON, in competition
      with each other. Throughout the movie, PERSON is stalked by a mysterious giggling person. PERSON chats with PERSON on
      the sideline of their children’s soccer game. They briefly discuss the recent murder of a local yoga teacher before
      PERSON compliments PERSON. On a whim, PERSON asks if PERSON would like to have PERSON as her own daughter; PERSON accepts.
      PERSON and GPE are frustrated by PERSON, an eccentric young boy who is bad at sports and frequently urinates himself.
      After PERSON and Julian argue at ORG birthday party, Julian sings “Happy Birthday to You” to his father before abruptly
      falling face-first into the swimming pool. When he re-emerges, he has turned into a golden retriever. PERSON and PERSON
      continue sending PERSON to school dressed in human clothing. GPE delights in playing with his newly athletic “son,”
      but PERSON misses PERSON as he used to be, and their marriage begins to fray. In the parking lot after school, PERSON
      asks PERSON if she could have PERSON (now named PERSON) back. PERSON, hurt, refuses to let her go. Later at a soccer
      game, PERSON picks up the soccer ball and places it under her dress, mimicking a baby bump. She is congratulated by
      her friends for her pregnancy, and eventually “gives birth” to the soccer ball, naming it “PERSON” and treating it as
      a third child. After encouragement from her friends while bowling, PERSON tells GPE that she wants a divorce, casting
      him out of the house. Upon returning one day, he finds Julian alone in the backyard without clothes on while PERSON
      is out getting a haircut. Aghast, PERSON takes Julian from PERSON, devastating her. She rings PERSON doorbell and begs
      for her daughter back, but PERSON angrily refuses, telling PERSON that it’s her fault she has no children anymore. PERSON
      returns home, only to run into her stalker, a delusional middle-aged woman who screams at PERSON to get out of her house.
      Manic and distraught, PERSON rides her golf cart out of town and onto the highway, stopping near a cow pasture to remove
      her braces with wire cutters. She arrives at the house where she grew up, currently occupied by a single woman with
      three children. After asking if she can have one of the woman’s children, PERSON kidnaps one and takes her to a diner.
      There, she sees on the news that her stalker (who also murdered the yoga teacher) was arrested after being discovered
      by PERSON. Returning to town the next day, PERSON watches her kidnapped “daughter” play soccer with the other children.
      She learns that PERSON had moved her family into ORG house, with ORG serving as a pool boy. After realizing that the
      children are playing soccer over graves, PERSON stands up from the bleachers and declares that she needs to get out.
      The referee admonishes her for being “out of bounds,” and PERSON immediately sits back down.'
