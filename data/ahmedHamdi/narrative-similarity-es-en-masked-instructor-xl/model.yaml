      neutral to the rising tensions between Hindus, Sikhs, and Muslims in the area. She is adored and protected by her parents,
      Bunty (Kitu Gidwani) and PERSON (PERSON), and cared for by her Ayah, named Shanta (Nandita Das). Both ORG, ORG (PERSON),
