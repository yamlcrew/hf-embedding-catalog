      she may be what he needs to complete his last piece, abandoned ten years ago when PERSON was his model. PERSON okays
      the idea, but PERSON becomes angry with PERSON for not having asked her first before promising the master that she will
      model. Nonetheless, she goes to the château the next day. Work starts early next morning in PERSON''s isolated studio,
      consisting of continual pen and wash studies on paper of PERSON in different positions, as he tries to capture the uniqueness
      of her body and the character of the woman within it. Over long days together their relationship varies, sometimes staying
      distant and sometimes getting relaxed. He progresses to working in oils on canvas, one day overpainting an unfinished
      study of PERSON. When PERSON sneaks into the studio one night and sees it, she is furious and hurt at the symbolism.
      As the object of PERSON''s concentrated attention all day, mostly in silence, PERSON has time to rethink her relationship
      with PERSON and decides she no longer needs him. Eventually PERSON finishes his picture, which the film audience never
      sees. Once complete, the image is too powerful for PERSON and for PERSON. PERSON hides it in a recess, which he seals
      with bricks and mortar, and quickly paints an innocuous version in which the face of the model is unseen. ORG is invited
      to a celebratory party, after which the changed PERSON breaks up with PERSON.'
    - 'Represent the plot: The film opens in a bar in GPE when hitman PERSON shoots and kills three men at the bar. He takes
