      with their new trophy.'
  - source_sentence: 'Represent the plot: PERSON is a former football star turned private investigator. ORG himself admits
      to having a soft spot for helping women in distress. Although he usually works on small cases, his latest request soon
      unravels into a nationwide conspiracy filled with suspects, and worse, bodies. When he discovers that his own daughter
      is the police''s prime suspect, he sets out to prove her innocence. To do so, he''ll not only have to solve the murders,
      but also unravel the dirty secrets hidden in his city.'
    sentences:
    - 'Represent the plot: An unnamed young man lives an ethereal existence that lacks transitions between everyday events
      and eventually progresses toward an existential crisis. He observes quietly but later participates actively in philosophical
      discussions involving other characters — ranging from quirky scholars and artists to everyday restaurant-goers and friends
      — about such issues as metaphysics, free will, social philosophy, and the meaning of life. Other scenes do not even
      include the protagonist''s presence but rather focus on a random isolated person, a group of people, or a couple engaging
      in such topics from a disembodied perspective. Along the way, the film also touches upon existentialism, situationist
      politics, posthumanity, the film theory of PERSON, and lucid dreaming, and makes references to various celebrated intellectual
      and literary figures by name. Gradually, the protagonist begins to realize that he is living out a perpetual dream,
      broken up only by occasional false awakenings. So far, he is mostly a passive onlooker, though this changes during a
      chat with a passing woman who suddenly approaches him. After she greets him and shares her creative ideas with him,
      he reminds himself that she is a figment of his own dreaming imagination. Afterward, he starts to converse more openly
      with other dream characters, but he begins to despair about being trapped in a dream. The protagonist''s final talk
      is with a character (played by PERSON) whom he briefly encountered previously in the film. This last conversation reveals
      this other character''s view that reality may be only a single instant that the individual interprets falsely as time
      (and, thus, life); that living is simply the individual''s constant negation of God''s invitation to become one with
      the universe; that dreams offer a glimpse into the infinite nature of reality; and that in order to be free from the
      illusion called life, the individual need only accept God''s invitation. The protagonist is last seen walking into a
      driveway when he suddenly begins to levitate, paralleling a scene at the start of the film of a floating child in the
      same driveway. The protagonist uncertainly reaches toward a car''s handle but is too swiftly lifted above the vehicle
      and over the trees. He rises into the endless blue expanse of the sky until he disappears from view.'
    - 'Represent the plot:  Set in 1978, the plot centers on GPE private investigator PERSON. He is hired to conduct an investigation
      in his GPE hometown where mental facility patient PERSON has been incommunicado for some time, which has her L.A.-based
      niece worried about her well-being. Upon reaching the sanatorium,  he notices that the staff all look nervous when he
      asks for her. Dr. PERSON, the head doctor, is evasive and strings him along for several days. PERSON never gets to see
      PERSON. He meets up with his ex, PERSON, and her daughter, GPE. GPE is married to the star quarterback, Happy. One night
      during a game, Happy suddenly dies and the police strongly suspect GPE. PERSON asks PERSON for help. PERSON was being
      abused by Happy, but since he was the star quarterback, the police would not arrest him. It is later learned Dr. PERSON
      was killing off patients who were not financially supported by their families, PERSON included, and collecting their
      social security money. PERSON uncovers the truth and Dr. PERSON is shot dead by a patient. PERSON learns he is PERSON
      father.  PERSON and PERSON reconcile and he finds a bottle of cancer pills. This same substance was found in PERSON''s
      blood. He accuses her of doing anything to protect her daughter and realizes that she was the one who poisoned Happy.
      Becky comes out and asks her if she did it. At first PERSON denies everything, but then admits that she thought that
      Happy would kill PERSON and since she herself did not have long to live, no one would be left to protect her daughter.
      Becky forgives her. The movie ends with PERSON stating that he was going to go home, then realizes he is home, implying
      he stays with his ex and daughter instead of going back to GPE.'
    - 'Represent the plot: On October 30, 1977, amateur criminals PERSON and PERSON attempt an armed robbery at a gas station/horror
      museum, but are killed by the owner, PERSON, and his assistant, PERSON. Later that night, PERSON, PERSON, PERSON, and
      PERSON are on the road in hopes of writing a book on offbeat roadside attractions. When the four meet Spaulding, who
      is also the owner of ORG, they learn of the local legend of Dr. PERSON. As they take off in search of the tree from
      which Dr. PERSON was hanged, they pick up a young free-spirited hitchhiker named PERSON, who claims to live only a few
      miles away. Shortly after, a mysterious figure appears hidden in some overgrowth and shoots out their vehicle''s tire
      with a shotgun. The group thinks it is just a blown out tire and so PERSON takes PERSON to her family''s house to get
      a tow truck. Moments later, ORG''s half-brother, ORG, picks up the stranded passengers and takes them to the family
      home. There, they meet ORG''s family: her adopted brother PERSON, her deformed giant half-brother ORG, and PERSON. While
      being treated to dinner, PERSON explains that her ex-husband, PERSON, had previously tried to burn ORG alive, along
      with the PERSON house after he suffered a psychotic breakdown. After dinner, the family puts on a Halloween show for
      their guests and Baby offends Mary by flirting with PERSON. After PERSON, ORG tells them their car is repaired. As the
      couples leave, ORG and ORG, disguised as scarecrows, attack them in the driveway and take them captive. The next day,
      Otis kills PERSON and mutilates his body for art. PERSON is tied up in a room and tormented by ORG, PERSON is tied to
      a bed dressed up as a doll for Halloween, and PERSON is partially scalped for failing to guess ORG''s favorite movie
      star. When PERSON doesn''t come home, her father PERSON calls the police to report her missing. Two deputies, PERSON
      and PERSON, find the couples'' abandoned car in a field with a dead, mutilated cheerleader in the trunk (one of five
      cheerleaders who went missing over a week ago, as explained in a news broadcast; an earlier scene established that the
      cheerleaders were being tortured, raped and killed by the PERSON family). PERSON, a former policeman, is called to the
      scene to help the deputies search. They arrive at the PERSON house and PERSON questions Mother Firefly about the missing
      teens. Mother Firefly shoots PERSON in the head and kills him; PERSON and PERSON are then killed by ORG when they find
      more bodies of missing cheerleaders in the barn, along with a barely conscious PERSON. Later that night, the three remaining
      teenagers are dressed as rabbits and taken out to an abandoned well. Otis torments PERSON using the skin of her dead
      father''s face as a mask. PERSON attempts to run away, but is tracked down and stabbed to death by Baby moments later.
      Otis and the family burn the bodies on a pyre. Meanwhile, PERSON and PERSON are placed in a coffin and lowered into
      a well, where a group of Dr. PERSON''s failed experiments break open the coffin and pull PERSON away, leaving PERSON
      to find her way through an underground lair. As she wanders through tunnels filled with mutilated corpses, she encounters
      Dr. PERSON and a number of mental patients; PERSON is on Dr. PERSON''s operating table being vivisected, and dies as
      PERSON screams. Dr. PERSON orders his mutated gargantuan assistant, who turns out to be Mother Firefly''s ex-husband
      PERSON, to capture PERSON, but PERSON outwits him and escapes by crawling to the surface as PERSON is crushed by falling
      debris in the collapsing tunnel. She makes her way to the main road where she encounters Captain PERSON, who gives her
      a ride in his car. She passes out from exhaustion in the front seat, and ORG suddenly appears in the back seat with
      a knife. PERSON later wakes up to find herself strapped to an operating table, surrounded by Dr. PERSON and PERSON,
      who survived the cave-in. The movie ends with PERSON screaming in horror and the words The End? displayed before the
      end credits.'
  - source_sentence: 'Represent the plot: The story is set in GPE (now the capital of Pakistani Punjab) in the period immediately
      preceding and during the partition of GPE in 1947, at the time of GPE''s independence. A young girl with polio, PERSON
      (PERSON), narrates the story through the voice of her adult self (PERSON). The girl belongs to a wealthy Parsi family
      that hopes to remain neutral amidst the rising tensions between Hindus, Sikhs, and Muslims in the region. She is adored
      and protected by her parents, Bunty (Kitu Gidwani) and PERSON (PERSON), and cared for by her ayah, a beautiful Hindu
      woman named Shanta (Nandita Das). Both ORG, the ice cream vendor (PERSON), and PERSON, the masseur (PERSON), are Muslim
      and deeply in love with GPE. Shanta, Dil, and PERSON are part of a small group of friends from different faiths (some
      of whom work for PERSON''s family) who spend their days together in the park. However, this once close-knit group of
      friends falls apart, leading to a series of tragedies.'
