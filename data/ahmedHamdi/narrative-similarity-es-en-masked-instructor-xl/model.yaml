    Nonetheless, she goes to the château the next day. Work starts early next morning in PERSON''s isolated studio, consisting
    of continual pen and wash studies on paper of PERSON in different positions, as he tries to capture the uniqueness of
    her body and the character of the woman within it. Over long days together their relationship varies, sometimes staying
