      the CEO of the oil company Ugigas in GPE. He tells ORG that he will be working under the Viceroy, whose identity is
      still being withheld until further notice. He also tells ORG that his cover will be a trade show host, working with
      GPE, a huge corporation that specializes in advertising. He must produce a trade show and a gala wedding as a finale,
      and still manage to kill PERSON before he makes his plane back to GPE. He is taken by a car to the safe GPE within the
      fictional war-torn desert country of GPE. In the GPE building, he meets GPE, his assistant for the mission. Once inside
      the building, he notices a reporter, PERSON attempting unsuccessfully to get inside the GPE building. Natalie attempts
      to find out why she can''t get into GPE, and after asking him several questions, is rushed out of the room by ORG who
      doesn''t want to reveal any personal details about himself. He does arrange for her to have drinks with him which she
      accepts. Hauser visits the Viceroy in a secret location hidden in a GPE restaurant, who tells him what he needs to do.
      The Viceroy (who cannot be seen, but only heard with an altered voice) informs ORG that the grand finale of LOC he''s
      supposed to prepare will be a wedding for PERSON, an oversexed, Central Asian pop star. He meets briefly with her and
      her fiancé, ORG. Later, PERSON meets ORG at a restaurant where he gives her an all-access pass to LOC. She arrives at
      the rehearsal and is greeted by ORG and GPE, who quickly go to watch PERSON''s rehearsal. Her oversexed appearance and
      slight attraction for ORG make him throw up on PERSON''s coat and he walks out. After talking to PERSON in his car,
      he drinks some hot sauce and then has a flashback. He sees himself telling his fellow hitman GPE that he is tired of
      killing and wants to quit. He and GPE engage in a brief struggle in which he shoots GPE and leaves him for dead in the
      back of a garbage truck. After receiving a delivery from a dry-cleaner in GPE, ORG returns PERSON''s now-clean coat
      to her at her hotel. He asks her out for coffee and confesses his habit of drinking hot sauce when he''s nervous. She
      then confesses that she doesn''t despise him at all, and the two build up a small friendship. He is later visited by
      GPE in his office. She tries to seduce him, but he rebuffs her. He later sees her when he is in a restaurant with PERSON
      and PERSON. Hauser takes PERSON home, where she kisses him. Embarrassed, she quickly rushes out of the car. She sees
      him the next day and asks for a pass out of GPE. He gives her a card that he received earlier by videomakers who are
      big in ORG, and might give her a good lead. Hours later, he visits GPE and listens to her sing a beautiful ballad; from
      here on out, he develops a paternal affection for her. Meanwhile, ORG buys the cover for a pornographic video that the
      videomakers were going to shoot on GPE''s wedding night, and leaks it to the American press. After a confrontation with
      ORG (who was involved in the making of this video), PERSON decides that the only way to continue with the wedding peacefully
      is to blame everything on ORG friend PERSON. Bhodi hunts him down and tries to kill him in a big house that GPE is supposed
      to do an interview in. There, ORG reveals his past to GPE and GPE, and how his wife was killed and his daughter was
      kidnapped. He is interrupted when he hears a gun and rushes to another room, where he is forced to fight PERSON. He
      kills Bhodi in front of GPE and GPE, who flee the house, horrified. They rush off into a cab, where GPE asks PERSON
      to be her bridesmaid; PERSON accepts. Six hours before the wedding, ORG receives a ransom video from what appears to
      be a gang of terrorists, who have taken PERSON hostage. Hauser travels to a nearby city named PERSON, saves PERSON,
      and makes it to Room 1101, where he had planned to meet and kill PERSON. ORG has a change of heart and lets PERSON live,
      and in return is informed the ultimate chicken-hawk is nearby. Realizing what this means ORG goes to the Viceroy''s
      secret location, and breaks down the glass to reveal the man behind the screen. The Viceroy is actually GPE — the man
      who killed ORG''s wife and kidnapped his daughter. Hauser asks GPE what he did with his daughter, and finds out that
      GPE was actually his daughter all along. He rushes to tell PERSON at the wedding, and arrives there right before GPE
