- source_sentence: Seventeen-year-old Novalee Nation is abandoned by her fiancé in a Walmart parking lot while pregnant. Penniless
    and without qualifications, Novalee decides to live clandestinely in the store until the baby is born. Taken in by eccentric
    and caring villagers, she discovers a life she never dared dream of.
  sentences:
  - A young man wanders through a heavy rainstorm, finding his way into a nearby restaurant. The restaurant's employees try
    to determine if he needs help. Despite his manic mode of speech being difficult to understand, a waitress, Sylvia, learns
    that his name is David Helfgott and that he is staying at a local hotel. Sylvia returns him to the hotel, and despite
    his attempts to engage her with his musical knowledge and ownership of various musical scores, she leaves. As a child,
    David is growing up in suburban Adelaide, South Australia and competing in the musical competition of a local Eisteddfod.
    Helfgott has been taught to play by his father, Peter, who is obsessed with winning and has no tolerance for imperfection,
    dishonour and disobedience. While playing at the Eisteddfod, David is noticed by Mr. Rosen, a local piano teacher who,
    after initial resistance from Peter, takes over David's musical instruction. As a teenager, David wins the state musical
    championship and is invited by concert violinist Isaac Stern to study in United States. Plans are made to raise money
    to send David off to America. Initially, his family is supportive, but then Peter forbids David to leave, thinking his
    absence would destroy the family. To make matters worse, Peter begins physically and mentally abusing David, which causes
    strain to the rest of the family. Crushed, David continues to study and befriends local novelist and co-founder of the
    Communist Party of Australia, Katharine Susannah Prichard. David's talent grows until he is offered a scholarship to the
    Royal College of Music in London. This time, David is able to break away from his father with the encouragement of Katharine.
    However, his father issues an ultimatum, effectively banishing David and saying that David will never return home and
    never be anybody's son. In London, David studies under Dr. Cecil Parkes and enters a Concerto competition, choosing to
    play Sergei Rachmaninoff's enormously demanding 3rd Concerto, a piece he had attempted to learn as a young child to make
    his father proud. As David practices, his behavior becomes increasingly unhinged. David wins the competition, but collapses
    and suffers a mental breakdown. Admitted to a psychiatric hospital, David receives electric shock therapy to treat his
    condition. David recovers to the point where he is able to return to Australia. However, his attempts to reconcile with
    his father are rebuffed due to the latter's mindset that David abandoned his family. This causes David to relapse and
    he is forced to be readmitted to a mental institution. Years later, a volunteer at the institution recognizes David and
    knows of his musical talent. The woman takes him home but discovers that he is difficult to control, unintentionally destructive,
    and needs more care than she can offer. As time passes, David has difficulty adjusting to life in broader society again,
    and often leaves the hotel to stimulate his interests. The next day, David returns to the restaurant where the patrons
    are astounded by his ability to play the piano. One of the owners befriends David and looks after him. In return, David
    plays at the restaurant. Through the owner, David is introduced to an employee named Gillian (Lynn Redgrave). David and
    Gillian soon fall in love and marry. With Gillian's help and support, David is able to come to terms with his father's
    death and to stage a well-received comeback concert, presaging his return to professional music.
  - Pandu and Dhirtrashtra are two brothers who rule Hastinapur. Pandu marries Kunti, who conceives five sons and names them
    Yudhister, Bhimsen, Arjun, Nakul and Sahdev, while Dhirtrashtra, who is blind, marries Gandhari, and gives birth to a
    100 sons, including Duryodhan and Dushasan. Gandhari's brother, Shakuni, also resides with them. After Pandu passes away,
    Dhirtrashtra decides to bequeath the empire to Yudhister much to the chagrin of Duryodhan, who plots with Shakuni to kill
    them in a palace made of wax, but the brothers and Kunti manage to escape and live incognito in a forest where Bhimsem
    meets with, Hidimba, slays her demon brother, Hidimb, marries her and sires a son, an illusionist, Ghatotkach. The brothers
    do reveal their identity when Arjun wins a competition at Panchal to wed Draupadi defeating Duryodhan, Dushashan, Jarasandh
    and others. Kunti unwittingly asks the brothers to share Draupadi, as she had in a previous birth as Devi Maa Parvati,
    prayed to Lord Shiva five times for a husband. Dhirtrashtra acknowledges the enmity between the cousins and asks five
    brothers to re-locate to Khandavprasth, which is subsequently transformed by Devraj Indra's aide, Vishwakarma, and renamed
    Indraprasht. Duryodhan is then humiliated by Draupadi, who mocks him and tells him that sons of a blind man are also blind,
    when he stumbles in the Maya Mahal, and he takes a vow to humiliate her. Shakuni then invites the five brothers to gamble
    at Hastinapur where Yudhister ends up losing Indraprasht, his brothers, his wealth as well as Draupadi herself. Lord Krishna
    comes to her aid when Dushashan publicly disrobes her as no one comes to her defense. The Pandavas are then sentenced
    to 13 years in exile, which will be extended by 12 years more if they are discovered during the 13th year. The 13 years
    pass, Arjun also marries Subhadra and sires a son, Abhimanyu. When the Pandavas return to claim Indraprastha, the Kauravas
    oppose and challenge them to a war in the Kurkshetra. Duryodhan chooses Lord Krishna's armies, while Arjun chooses Krishna
    himself, who decides to only be the charioteer for Arjun. And it is here that Lord Krishna who shows his true self to
    Arjun when he hesitates to kill his relatives, cousins, and gurus. It is here that Gandhari will bless Duryodhan with
    a body of steel, Kunti will go to plead with Karan to show mercy to her five sons, and Pawanputra Hanuman, the elder brother
    of Bhima, decides to make an incognito appearance, in this epic battle between Good and Evil.
  - ' Pregnant, 17-year-old Novalee Nation and her boyfriend, Willy Jack Pickens, are moving from Tennessee to California.
    In the car, Novalee puts Willy Jack''s hand on her belly and asks him if he can feel where the heart is. Disturbed, Willy
    Jack lies and then abandons Novalee at a Walmart in Sequoyah, Oklahoma, when she went inside to use the restroom and gets
    some shoes, after losing them during the drive. With no money and nowhere to go, Novalee begins secretly living in the
    Walmart, hiding until after closing. She meets Sister Thelma Husband, the local welcome wagon, who gives her a buckeye
    tree, and photographer Moses Whitecotton. When the tree becomes sick, Novalee seeks help at the local library, where she
    meets the curt librarian Forney Hull. Forney is a brilliant and out of place man from the East coast. He had dropped out
    of college and become trapped in the blue collar town to take care of his mentally and physically unwell sister, Mary
    Elizabeth, the real librarian.  Meanwhile, Willy Jack continued his way to California, but stopped to pick up an attractive
    girl experiencing car trouble. They''re quickly pulled over by local police: the girl is only 14, and Willy Jack is blamed
    and arrested when they find stolen merchandise in his car, which the girl had lifted from a 7-Eleven store before being
    picked up. Alone in the closed Walmart she''s been living in for 6 weeks, Novalee goes into labor. Forney, who had realized
    she was homeless and living in the Walmart, smashes through the window to help deliver her child, whom she names Americus.
    Novalee becomes a media darling as the mother of the Walmart baby. Donations and letters pour in, and Novalee is guaranteed
    a job in any Walmart for life. While in the hospital, Novalee is befriended by Lexie Coop, a cheerful nurse whose quest
    to provide her food-named children with a daddy always results in a new baby, and no new daddy. Her estranged mother,
    Mama Lil, who left when Novalee was 5, visits after seeing her on television, but steals the donation money and Novalee
    is left abandoned and penniless with her baby once more. Sister Husband arrives and offers to take Novalee and Americus
    home to live with her. Novalee and Americus grow with the security of their new circle of friends and family. Novalee
    becomes especially close to Forney, who assists her in improving herself via books. Forney is infatuated with Novalee
    and adores Americus, but Novalee has sworn off men and is intimidated by his education, intelligence, and class background.
    The infant Americus is kidnapped while Novalee is Christmas tree shopping with Forney. The baby is recovered from a church
    nativity scene, where she had been left by a religious couple from Midnight, Mississippi who thought the illegitimate
    child was an abomination. Three years later, Novalee is starting a career as a professional photographer thanks to Moses''s
    mentorship. Willy Jack has become a one-hit-wonder with a song he wrote in jail, signing with music agent Ruth Meyers
    in Nashville, who gives him a makeover and the stage name Billy Shadow.  Sister Husband is killed and their home destroyed
    when a tornado devastates the town. Sister left Novalee everything, which enables Novalee to build a house and realize
    her dream of living in a home without wheels under it, and also quit her Walmart job to be a photographer full time. Novalee
    wins an award for a post-tornado photo she took of the buckeye tree, which she dedicates as a memorial to Sister, and
    realizes she is beginning to reciprocate Forney''s feelings, though she still feels he deserves better than her. Willy
    Jack has grown frustrated with the limits of his career and looks to replace his manager, Ruth. The replacement he interviews
    warns that Ruth is brutal and won''t take kindly to being betrayed. In a vicious confrontation, Ruth, who has discovered
    his betrayal, refuses to assist with mitigating a lawsuit claiming Willy Jack stole his hit song from his former cellmate,
    Tommy, and drops him as a client. The combination of the lawsuit and Ruth''s influence blacklist Willy Jack and his singing
    career is effectively over.  Novalee receives an alarming phone call and rushes to Lexie''s to discover she was nearly
    beaten to death by her most recent boyfriend, a predator who had targeted her to gain sexual access to her children. He
    attacked her as she protected them. Lexie''s injuries keep her from working, so she and her children move in with Novalee
    and Americus. Lexie breaks down, feeling guilty and angry, tearfully regretting her choice of men, and Novalee helps her
    heal. When Forney''s sister Mary Elizabeth dies, Novalee finds and comforts him. The pair sleep together and Forney confesses
    his love for her. Freed at last, everyone assumes Forney will leave to resume school, and the town hires a new librarian.
    Forney returns from a trip back East, and tells Novalee he will get a menial job at the plastics factory to stay with
    her, rather than complete his studies at Bowdoin College and fulfil his dream of becoming a history teacher. Novalee decides
    to lie and say she does not love him to prevent him from wasting his potential. Heartbroken, he returns to Bowdoin.'
- source_sentence: The film follows the rise and fall of a family in Shanghai. Once wealthy and capitalist, the family is
    ruined during the Cultural Revolution of the 1960s and 70s. Their house, a mansion in the French Concession, is converted
    into a multi-family dwelling. Years later, the family matriarch announces that she is dying. When her four adult children
    return, it is the first time the family has lived under one roof in decades.
  sentences:
  - The film concerns Dr. Akagi, a doctor on an island in the Seto Inland Sea area during World War II. He runs into conflict
    with the military while trying to combat a hepatitis epidemic. Akagi earns the nickname Dr. Liver (カンゾー先生 Kanzō-sensei)
    because of his work, though the townsfolk use it as a humorous dig at his persistent diagnosis. Though the broad circumstance
    of Japan slowly losing the war is the setting, many of the interactions and situations tilt into humor, for instance;
    the very music used for the doctor running from patient to patient has an upbeat and light-hearted tone.
  - 'The time is the socially turbulent 1970s, when radical politics and the emerging gay rights movement clashed with the
    rigidly conservative establishment. At a swanky L.A. party, lean and lanky Tommy introduces himself to sexually repressed
    Alan. Tommy has long blond hair, and is openly gay with a glib sense of humor. The comparatively short-haired, muscular
    Alan is a member of the Young Republicans and an aspiring journalist. Alan is working on his first book, a treatise on
    homosexuality, and he invites Tommy over for dinner to interview him for the book. Their connection is so intense that
    Alan''s kooky girlfriend Beverly suspects something more than an interview is going on and angrily departs. Broken up
    with Beverly, Alan runs into Tommy a month later while jogging in Griffith Park and invites him for a night out; the two
    have a fantastic time, drinking and doing drugs along the way. At Alan''s invitation, Tommy stays over at Alan''s apartment.
    They sleep in separate rooms until Alan, in the middle of the night, joins Tommy in his bed, claiming the couch is too
    uncomfortable; Tommy leaves to go sleep on the couch. In the morning, Tommy tells Alan he has feelings for him and can''t
    see him again. Tommy also confronts Alan about his own curiosity, prompting Alan to defensively blurt out, I''m not a
    fag like you, okay? Tommy walks out. Feeling horrible about what he said, Alan proceeds to call him nonstop, but Tommy
    won''t come to the phone. Alan proceeds to write his book, which is highly critical of gays and their lifestyle. However,
    when the manuscript brings an offer for a two-book deal, he doesn''t want to sign the contract, as by then he realizes
    his own feelings for Tommy and rejects his old ideas about the gay community. Against his better judgment, he signs the
    contract, persuaded by attorney Peter, that it''s a once-in-a-lifetime opportunity. Moments later, Tommy comes back to
    Alan''s apartment to confront him about the phone calls and tell him he doesn''t want to hear from him again. Alan takes
    a chance, grabbing Tommy and kissing him. It begins what will be a 4-year relationship. Fast forward to 1977: Anita Bryant
    is organizing the Save Our Children campaign in Florida to rid the country of homosexuals and repeal a Florida law prohibiting
    discrimination on the basis of sexual orientation. Alan''s book publisher, who previously decided the timing wasn''t right,
    publishes Alan''s book, The Straight Truth, against Alan''s wishes, listing the author as Anonymous. The book is used
    to fuel homophobia by the Christian Right, and it threatens to erode Tommy''s work with his group Out Loud, whose aim
    is to change the public''s negative views of gays. When word is leaked about who actually wrote the book, Tommy leaves
    Alan. Alan is also fired from his job at a newspaper. With nowhere to go and no job, he quickly becomes a kept boy of
    Peter, who himself is closeted. In 1984, when Alan finds out Peter was the one who leaked his name to the media, he leaves
    to reunite with Tommy. The two finally take the road trip they previously planned, but under tragic circumstances, as
    Tommy is now ill from an undisclosed illness (implied to be AIDS). In a fitting end to their love story, Alan fulfills
    his book contract by writing a second book. This time, it is about his coming out process and his love affair with Tommy.
    The book is called The Trip, and is dedicated to Tommy.'
  - The film follows the rise and fall of a family in Shanghai. Once wealthy capitalists, the family unravels during the Cultural
    Revolution; their home, once a French concession mansion, converted into a multi-family dwelling. Years later, the matriarch
    of the family announces that she is dying. When her four grown children return, it is the first time the family has been
    under one roof in decades.
- source_sentence: It's Raquel's birthday. Raquel, 41, has been a loyal maid for twenty-three years in the Valdes household,
    a bourgeois family in Santiago, Chile. She's overworked and ill, but she can't bear the thought of sharing her job with
    any other maid. One day, an accident will prove to be the catalyst for significant change...
  sentences:
  - ' In London, Monica Strong (Helen Chandler) and her married lover, Harry Rawlinson, attend a scavenger hunt party given
    by Monica''s aunt, Carrie Valentine.  Carrie announces a tie-breaking challenge: Women must find a man married more than
    5 years and faithful, and men must find a woman over 20 who has never had a love affair. Monica departs to find her father,
    Sir Christopher Strong (Colin Clive), who is devoted to her mother. Harry follows on a motorbike and crashes. Lady Cynthia
    Darrington (Katharine Hepburn), a famous aviator, helps him, and goes along: She has never had a love affair and is a
    great deal older than 20. At the party, Cynthia meets Christopher, a friend of her late father. She takes him flying.
    Cynthia and Monica become friends. Lady Elaine Strong (Billie Burke), fears the friendship  growing between Cynthia and
    Christopher, who insists that she is a good influence on their daughter. Monica comes home with Harry one night, drunk,
    and Elaine tells him that if he is an honourable man he won''t see her daughter again. Harry agrees. Christopher asks
    Cynthia to persuade  Monica to go with the family to Cannes. Monica agrees, if Christopher takes her to see Cynthia in
    an aerial show. At their villa, Elaine anticipates having a whole month alone with her husband. A telegram arrives: They
    have persuaded Cynthia to join them. Elaine is crushed. Two weeks later, Monica is miserable. At Carrie Valentine''s party,
    Christopher and  Cynthia have eyes only for each other. Elaine goes home with a headache.  Monica allows Carlo, a stranger,
    to kiss her, and Christopher, eager to be alone with Cynthia, lets Carlo drive his daughter “home.” Christopher and Cynthia
    confess that they are deeply in love, but agree never to meet again. A heartbroken Elaine sees them saying farewell and
    believes they are lovers. Cynthia joins a race around the world, starting in New York City. A distraught, suicidal Monica
    arrives to tell her that Harry, now divorced,  refuses to marry her: She told him about her night with Carlo. Cynthia
    convinces her that Harry will forgive her. Cynthia calls Christopher and tells him not to read Monica''s letter. He does
    and, in a fit of gratitude, goes to her an hour before she leaves for New York. All they can do is say goodbye. When she
    lands in San Francisco, Christopher, on a mission to Washington, calls her from New York to say he is waiting. She wins
    the race. Their reunion is passionate. She did not want to die without knowing love. He promises never to ask her to give
    up anything. A lamp turns on. Her hand reaches up. “I love my beautiful bracelet… I''m shackled.”  He translates the motto
    on her ring: “Courage conquers death.” “But not love,”:she adds. “Give up this altitude flight, for me.” She agrees. Harry
    and Monica reconcile. Christopher, just home from the States. agrees to their marriage, but Elaine refuses to go to the
    registry office with them. Six months later, Christopher and Cynthia meet for lunch in an out-of-the-way inn. She misses
    flying. Monica and Harry, who used the same trysting place, drop by for sentimental reasons. They overhear Cynthia and
    Christopher confessing their love, and leave.'
  - synopsisFor over 23 years, Raquel (Saavedra) has worked as the maid for the Valdes family. She shows utmost loyalty and
    respect to her employers, Pilar (Celedón) and Edmundo (Goic). Raquel gets along well with their teenage son, Lucas (Agustín
    Silva), but often clashes with their headstrong daughter, Camila (García-Huidobro). When Raquel begins to suffer from
    dizzy spells caused by her excessive use of chlorine for household cleaning, Pilar decides to hire additional maids to
    assist Raquel with her daily chores. However, Raquel fiercely guards her territory and resents the newcomers, engaging
    in a series of increasingly desperate attempts to drive them away. This includes the younger maid, Lucy (Loyola), as Raquel
    tries to maintain her position in the household.
  - summary Chou lives in Phnom Penh with her husband, Khuon, their youngest son Sovanh, and their family, including Khuon's
    brother Meng, Chou's mother and grandmother, and their other children, Hout, Tuch, and Lili. In 1975, the Khmer Rouge
    topple the government and the family is forcefully evacuated from the city by the revolutionaries. Along the grueling
    trip, Sovanh and his grandmother become separated from the family, and the Khmer Rouge guards forbid Chou from trying
    to find them. When they reach the neighboring town, they realize that their Cousin Sok has become one of the revolutionaries
    and the entire town converted into a commune. The family is stripped of what possessions they cannot hide and worked to
    the bone with barely any food. Chou asks after her son and is assured he's in a different labor camp but is forbidden
    to see him. Meng wants to leave, but Khuon insists they have no choice but to be subservient. At Chou's insistence, Khuon
    tries to cross the river to find Sovanh, but is captured and beaten. Tuch falls ill, and the family gives their last valuables
    to a woman from the camp, known for sleeping with the Khmer Rouge, to try and find medicine. But Tuch dies before she
    can return. The woman returns having been unable to find medicine and is beaten by the other women of the camp. Before
    dying, she leaves her own son in Chou's care. Sok takes pity on Khuon and allows him to try to find Sovanh, but by the
    time he arrives, the child has been moved again. Throughout, Sovanh lives on with his grandma, and a girl he befriends
    at his work camp. Horrific deaths unfold around him, and the girl eventually sacrifices herself to allow Sovanh to avoid
    capture while they steal food. Unable to stand it any longer, Meng makes a break for the border - Khuon runs after to
    wish him luck but is caught by a Khmer Rouge guard. Sok kills him, saving Khuon's life. Khuon and Chou make it back, but
    another vengeful Khmer Rouge kills Sok in retribution. The group is moved again on trains, and Chou is separated from
    the child she was trusted to look after. The train stops when one of the Khmer Rouge's daughters is drowning in a well,
    and Khuon helps save her, angering Chou. Soon after, the men and woman are driven to separate camps leaving only Chou,
    her mother, and Lili. Months pass. The Khmer Rouge woman who would have drowned, Peuv, attempts to give thanks by sneaking
    food to Chou and her family, but Chou rejects it despite their starvation, as a means of keeping her dignity. Chou's mother
    notices that one of the guards fancies Lili, and encourages her to use this to attain food. But when the guard rapes her,
    Lili hangs herself. At long last, Hout makes it back from the men's camp, saying he got separated from Khuon. But when
    he hears about what happened to Lili, he finds the guard who did it and burns him alive in a thatched hut. He is killed,
    alongside an innocent old woman accused of being a sympathizer. Chou's mother dies of starvation. Years pass and an emaciated
    Khuon finds Chou in an infirmary. He says he's found Sovanh, and she musters the last of her strength to move on. The
    Cambodian-Vietnamese War begins, and as Vietnamese forces advance on their camp, the two make one final break to find
    Sovanh. They're seen by Peuv, who covers for them, allowing their escape. After journeying far and wide, they finally
    find the group of children, seemingly abandoned, and among them is Sovanh. Reunited, the family makes one final break
    for the Thailand border. Along the way, they encounter a mob of vigilantes killing Khmer Rouge members, as they are about
    to kill Peuv. Chou confronts the group, tearing open her shirt to show that she has suffered just as they have and successfully
    saves Peuv. They encourage her to follow them to Thailand, but she refuses, as she still has family in Cambodia. The family
    reaches the border. Khuon scouts up ahead. As Chou and Sovanh watch, Khuon is spotted by Khmer Rouge guards. He purposefully
    runs away, allowing his family to sneak past the border, and is shot. Sovanh and Chou, as the last of their family, finally
    walk through a field to Thailand, hand in hand.
- source_sentence: During the winter of 1942/1943, under the Occupation, a young woman becomes the accompanist of a famous
    opera singer. She then enters a world unfamiliar to her, a world of luxury, hypocrisy, betrayal, and compromise.
  sentences:
  - ' O''Reilly Castle, set on a small Irish isle, has been occupied by the family of Wee Lady Betty (Love) for generations.
    However, when the actual owner of the castle dies, the ownership is transferred to his heir, Roger O''Reilly (Borzage).
    In an attempt to scare away the new owner, Betty briefly tricks him into thinking that the castle is haunted, but he falls
    in love with her.'
  - As a leader of the local community, Chairman Amin (Shahir Huda Rumi)  bans every kind of image in his water-locked village
    in a specific part of rural Bangladesh. He even goes on to claim that imagination is also sinful since it gives one the
    license to infiltrate into any prohibited territory. But change is a desperate wind that is difficult to resist by shutting
    the window. The tension between this traditional window and modern wind grows to such an extent that it starts to leave
    a ripple effect on the lives of a group of typically colorful, eccentric, and emotional people living in that village
    which is embedded upon a sweet semi triangle love story involving the Chairman Amin's only son (Chanchal Chowdhury), a
    village girl (Nusrat Imrose Tisha) and their supporting connected employee (Mosharraf Karim). But at the very end of the
    film, Television, which Chairman Amin hated so much, comes to the rescue and helps to reach a transcendental state where
    he and his God are unified.
  - In Paris under German occupation in 1942, a young and impoverished pianist named Sophie gets a job as live-in aide and
    accompanist to a famous and glamorous singer, Irène. As Irène's possessive husband and manager, Charles, a devious businessman
    collaborating with the Vichy regime and the Nazis, wrestles with his conscience, the highly impressionable Sophie becomes
    obsessively close to Irène, living life vicariously through Irène's musical and amorous exploits, particularly an affair
    with Jacques, a handsome member of the Resistance.  Tipped off by contacts, Charles wants to flee with Irène and the indispensable
    Sophie to the safety of unoccupied Algeria, but Irène refuses a provincial backwater. So Charles takes the pair by foot
    over the Pyrenees into neutral Spain, from where they make their way by sea to London. There Irène can resume her life
    as fêted prima donna and lover of Jacques who, as she knew all along, is now based there. Sophie is a silent witness to
    the deepening unhappiness of Charles, a fish out of water in an alien environment, and the increasingly reckless behaviour
    of Irène.
- source_sentence: In a timeless Los Angeles, Henry Chinaski (Mickey Rourke), a writer without any real passion, drinks, writes
    poems, and even manages to pick up a girl, provided she's even more drunk than he is. He spends most of his time at the
    Golden Horn, a Los Angeles bar, where he regularly gets into fights with Eddie (Frank Stallone), a waiter as muscular
    as he is arrogant. The patrons even bet on their brawls. Amidst all this chaos, Henry meets Wanda (Faye Dunaway), also
    an alcoholic and in the process of getting a divorce, with whom he moves in. The two outsiders try to lead a normal life,
    but they become brutally attached to each other in a maelstrom of emotions mixing love, intoxication, violence, and madness.
    Their job searches remain fruitless. Soon, Henry has an affair with a wealthy publisher, Tully Sorenson (Alice Krige),
    who has published one of his works and offers to become his patron. While Henry could have been published and Wanda could
    have rid herself of men and demons, the couple resigns themselves to abandonment and chaos.
  sentences:
  - ' Henry Chinaski is a destitute alcoholic who lives in a rundown apartment in Los Angeles and works menial jobs when he
    can find them. An intelligent man and keenly aware of his circumstance, he finds solace in expressing his feelings and
    perceptions of the world through writing poetry and short stories which he submits to magazines and papers for a few extra
    dollars. Henry frequents a bar called The Golden Horn, where he drinks, hangs out with other down and out alcoholics,
    and gets into altercations with the tough guy bartender he hates, Eddie. One night, Henry gets into a fight with Eddie
    and loses. The next day, he delivers sandwiches to two patrons in the bar. Realizing he needs to eat before fighting (to
    gain energy) to win, he grabs the sandwich out of one of the patrons'' hands and eats it, disgusting the patron and angering
    the bar owner, Jim, one of Henry''s best friends. Jim tells Henry to go lie down in his apartment for a few hours. After
    an afternoon nap, Henry steals bread, bologna, and wine from another apartment to eat and drink in preparation to fight
    Eddie. Henry returns to The Golden Horn later that evening, and antagonizes Eddie until he finally challenges him to another
    fight. Henry jumps over the bar and drinks beer out of the tap, infuriating Eddie. Jim puts a wager on Henry to beat Eddie.
    Henry wins the fight, and is then kicked out of the bar. Jim wins his bet, which he then gives to Henry so that he can
    buy a couple of drinks for the night. Henry then staggers on to another establishment down the street called the Kenmore,
    where he continues his imbibement. There, he meets Wanda, a fellow alcoholic and a kept woman. Wanda is initially annoyed
    with Henry, telling him she hates people, but is intrigued by his sarcastic and witty responses. The two buy liquor at
    a store across the street, and Wanda then steals corn from a cornfield, attracting the attention of the police. The two
    run to her apartment, evading them. Wanda boils the corn but discovers it is green and inedible, and then freaks out,
    saying that nothing in her life ever works out. Henry comforts her. The next day, Henry sets out to get a job to finance
    their booze-soaked life together. Henry then takes Wanda back to The Golden Horn to meet Jim as well as to cash an income
    tax rebate he received working six months in a toy factory. However, things become acrimonious between Henry and Wanda
    when Henry discovers that Wanda has slept with Eddie. After he chastises her for it, Wanda beats Henry with her purse,
    knocking him unconscious. Later, a detective following Henry sees him covered in blood and calls 911. Two paramedics arrive
    and are unfazed by Henry''s being covered in blood, telling him not to waste their time. Wanda returns later, and the
    two apologize to one another. Later that night, Wanda claims to be dying in bed, seeing angels. Henry calls 911 and the
    same two paramedics arrive, much to his surprise, and they claim Wanda is just drunk and too fat. After Wanda leaves to
    look for a job the next morning, Henry is tracked down by Tully Sorenson, a wealthy female book publisher, who has been
    impressed with his writing and is interested in publishing some of his work. She finds him through the detective she has
    hired. Knowing Henry is destitute, Tully pays him an advance of $500. Henry then breaks into another apartment after hearing
    a man abusing his wife. After the man threatens to cut his wife''s throat, he and Henry get into an altercation which
    results in the man being stabbed. Henry scrambles out of the apartment building and goes for a drive in L.A. with Tully.
    At one point, he rams a car where a man and woman are making out while the light is green. Tully tells him he was immature
    and reckless in his response. She then takes him back to her home where, after drinks, the two sleep together. At first,
    Henry is impressed with the promise of wealth and security, including an endless supply of booze that working for Tully
    could provide. However, he begins to realize that he is uncomfortable being involved with Tully, romantically or professionally,
    because of class differences, telling her that she is trapped in a cage with golden bars. Henry determines he must leave,
    that returning to his life of destitution and alcoholism is the only truth he knows. After leaving Tully''s house, Henry
    returns to his usual bar and to Wanda. Henry buys drinks for all of his friends at the bar. Eddie suspects Henry has no
    money and is itching for a fight, so he tells Henry that he owes him $40 for the drinks. To Eddie''s surprise, Henry pays
    with some of the advance he received from Tully and sarcastically leaves a tip for Eddie, saying Buy a drink on me. Tully
    heads out to see if she can change his mind, and finds him at the bar where a drunken, jealous Wanda proceeds to beat
    her up. When Henry does not intercede, Tully realizes that Henry does not care about her and does not want her help. So
    she leaves the bar and gives up on publishing his work, realizing that her pursuit of him was futile. Eddie calls Henry
    out, and they go out behind the bar for another fight. As Henry and the other barflies follow Eddie out the door, the
    camera pans out to the front of the bar to the sound of punches and the crowd cheering the two men.'
  - The film is set in the 17th century during the Swedish invasion of the Polish–Lithuanian Commonwealth in the years 1655
    to 1658, known as The Deluge, which was eventually thwarted by Polish-Lithuanian forces. However, a quarter of the Polish-Lithuanian
    population died from the war and plague, and the country's economy was devastated.
  - As described in a film magazine, Sara Crewe (Pickford) is treated as a little princess at the Minchin boarding school
    for children until it is learned that her father has lost his entire fortune, and she is made a slave (a household servant).
    She and Becky (Pitts), another slave, become close friends who share their joys and sorrows. Christmastime draws near
    and the girls watch the preparations wistfully. Their loneliness arouses the sympathy of a servant of the rich Mr. Carrisford.
    On the night before Christmas he prepares a spread for the slaveys in their attic. He calls his master Mr. Carrisford
    (von Seyffertitz) to watch their joy, but both are witness to the slaveys being abused and whipped by Miss Minchin (Griffith).
    Carrisford interferes and learns that Sara is the daughter of his best friend. He adopts Sara and Becky and in their new
    home they have a real Christmas. The film opens with Sarah's father moving back to London after serving in the British
    Army in India. She is opposed to leaving the luxurious life of an officer's child with a large house and many servants,
    and is initially shy when enrolled in Miss Minchin's School. Her reputation as the little princess precedes her and the
    other girls are fascinated with her tales of life in India. The girls sneak into Sarah's room at night to listen to her
    stories.  One night, she tells Ali Baba and the Forty Thieves which becomes a story within a story with elaborate exotic
    sets and costumes. When Miss Minchin is informed that Sara's father has died and lost his fortune, she is stripped of
    her possessions and accommodations, forced to work as a servant and live in the attic with Becky, the school's existing
    servant girl. While the other students and Miss Minchin treat Becky poorly, Sara had always been kind and generous and
    the two become close friends. Mr. Carrisford is the school's neighbor; his house is so close it is possible to walk across
    the cornices from his attic window to Sara and Becky's. Mr. Carrisford's Indian servant loses his pet monkey, which escapes
    to Sara. Upon their meeting he realizes she had spent time in India in a wealthy family and takes pity on her circumstances.
    While the girls work tirelessly to prepare a Christmas feast for the students and staff, Mr. Carrisford's servant lays
    out a banquet for Sara and Becky, with an elaborate tablecloth and silver. Miss Minchin discovers this and accuses them
    of stealing, but are interrupted by Carrisford and his servant crossing the cornice. Carrisford learns Sara's identity
    and reveals himself to have been her father's best friend, who had persuaded him to invest his fortune in a risky business
    venture. He died believing he was destitute and had been betrayed by his friend, while Carrisford had been ill and was
    unable to arrive in time to tell him that the venture was a success. Sara was the heiress to a million pound fortune.
    In the final scene, Becky and Sara are invited to live with Mr. Carrisford and they host a Christmas party for a group
    of poor children. Sara's parents (as ghosts) look on approvingly.
