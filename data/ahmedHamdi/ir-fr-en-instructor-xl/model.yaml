  widget:
  - source_sentence: 'Represent the plot: When Matt meets Casey, their relationship quickly becomes passionate. She has borderline
      personality disorder. Faced with their parents'' insistence that they end their relationship, Matt and Casey decide
      to run away rather than endure a separation.'
    sentences:
    - 'Represent the plot:  The opening of the film shows news clippings of the 1930 kidnapping of Daisy Armstrong, who is
      later found murdered. In December 1935, Hercule Poirot, having solved a case for a British Army garrison in Jordan,
      is due to travel to London on the Orient Express from Istanbul and encounters his old friend Signor Bianchi, a director
      of the company that owns the line who offers him a compartment. The other passengers are American widow Harriet Belinda
      Hubbard; English governess Mary Debenham; Swedish missionary Greta Ohlsson; American businessman Samuel Ratchett, with
      his secretary/translator Hector McQueen and English valet Edward Beddoes; Italian-American car salesman Antonio (Gino)
      Foscarelli; elderly Russian Princess Natalia Dragomiroff and her German maid Hildegarde Schmidt; Hungarian Count Rudolf
      Andrenyi and his wife Elena; British Indian Army Colonel John Arbuthnott; and American theatrical agent Cyrus Hardman.
      The morning after the train departs, Ratchett tries to secure Poirot''s services as a bodyguard for $15,000 as he has
      received death threats. Poirot declines Ratchett''s offer, telling him, ...my interest in your case is... dwindling.
      That night, Bianchi gives Poirot his compartment and shares a coach with Stavros Constantine, a Greek doctor. The train
      is stopped by a snowdrift between Vinkovci and Brod in Yugoslavia, and Poirot is awoken from sleep several times, once
      by a scream from Ratchett''s cabin. The next morning, Ratchett is found stabbed to death, and Bianchi asks Poirot to
      solve the case. Poirot enlists help from Dr. Constantine, who ascertains that Ratchett was stabbed 12 times in a distorted
      pattern and with seemingly varying accuracy and lethality. Found at the crime scene is a fragment of a letter, revealing
      that Ratchett was actually Lanfranco Cassetti, a gangster, who five years earlier planned the kidnapping and murder
      of Daisy Armstrong, infant daughter of wealthy British Army Colonel Hamish Armstrong and his American wife, Sonia. Cassetti
      had a Mafia colleague help him kidnap and kill Daisy, but then betrayed him and fled the country with the ransom money;
      he was only revealed on the eve of his partner''s execution. Overcome with grief, the pregnant Mrs. Armstrong gave premature
      birth to a stillborn baby and died in the process. Colonel Armstrong, consumed by grief from the loss of his family,
      committed suicide. A French maidservant named Paulette, wrongly suspected of complicity in the kidnapping, had also
      committed suicide to avoid being arrested, but was found innocent afterwards. Further clues are discovered, including
      a pipe cleaner, a handkerchief with the initial H, Cassetti''s broken watch, and a conductor''s suit. Poirot''s timeline
      of passenger activities the night before indicates that Cassetti was murdered at about 1:15 a.m., the time of the smashed
      watch and the scream. As the coach was isolated through the night, the murderer must be one of its passengers or the
      train''s French conductor, Pierre Michel. Mrs. Hubbard reports that she detected a man in her room, later finding the
      bloodied knife discarded in her compartment. Foscarelli dramatically hints the murder was most likely part of a Mafia
      feud. Poirot interviews the passengers and Pierre. He learns McQueen was the son of the Armstrong case''s District Attorney
      and was very fond of Mrs. Armstrong; Beddoes had been a British Army batman; Greta Ohlsson appears to have limited knowledge
      of English but has been to America; Countess Andrenyi is of German descent, and her maiden name is Grünwald (German
      for Greenwood, Mrs. Armstrong''s maiden name); Pierre Michel''s daughter died five years earlier of scarlet fever; Colonel
      Arbuthnott, who displays knowledge of Armstrong''s military decorations, reveals his plans to marry Miss Debenham once
      his divorce from his philanderingwife is finalized, which he claims was what the cryptic discussion Poirot overheard
      in Istanbul was about. When Poirot questions Princess Dragomiroff, he discovers she was a friend of Linda Arden, retired
      American actress and Mrs. Armstrong''s mother; the Princess was Sonia''s godmother. He learns that the Armstrongs had
      a butler, a secretary, a cook, a chauffeur, and a nursemaid. Poirot flatters the Princess''s maid, Schmidt, by noting
      how fine a cook she is, throwing her off. Foscarelli denies having been a chauffeur. Hardman reveals he is, in fact,
      a Pinkerton detective hired as a bodyguard by Cassetti. When Poirot shows him the photo of Paulette, he is visibly moved.
      Poirot gathers the suspects and describes two solutions to the murder. He advises them not to automatically dismiss
      either. The first suggests Cassetti''s murder was a Mafia feud killing - an unknown man disguised himself as conductor,
      stabbed Ratchett/Cassetti, and discarded the uniform coat, with the undetected assailant escaping from the train through
      the snow. This is rejected by Bianchi and Dr. Constantine as absurd but Poirot tells them they may reconsider that opinion.  The
      second, more complex and far-reaching solution links all the suspects in the coach to the Armstrong case. In addition
      to self-incriminating revelations Poirot had managed to extract from Hardman, McQueen, Schmidt, and the Princess, the
      detective has deduced Countess Elena is actually Mrs. Armstrong''s younger sister, Helena. The Princess claimed the
      Armstrongs'' secretary''s was a Miss Freebody; this is in fact Mary Debenham, freely associated from the well-known
      British department store (at that time known as Debenhams and Freebody). Beddoes was the Armstrong household''s butler;
      Ohlsson was Daisy''s nursemaid; Colonel Arbuthnott was a close army friend of Armstrong; Foscarelli was the family''s
      chauffeur; Pierre was Paulette''s father; Hardman was a policeman in love with Paulette; and Mrs. Hubbard is in fact
      Linda Arden, Mrs. Armstrong''s mother - and arguably the brains behind this whole plan. McQueen had drugged Cassetti,
      rendering him unconscious and allowing the conspirators to murder him jointly (the Andrenyis stabbing together), totaling
      12 – the  complement of a typical jury – wounds of differing damage. The scream and broken watch were provided by McQueen
      to persuade Poirot that the murder had occurred earlier, when the other suspects were in the clear. In fact, the suspects
      joined to commit the murder once Poirot had returned to sleep, after two o''clock. The only passengers not involved
      in the murder are Signor Bianchi and Dr. Constantine. Poirot asks Bianchi to choose one solution before the train is
      freed from the snowdrift, but admits that the Yugoslavian police will much prefer the simple one. Bianchi, in sympathy
      with the suspects after learning how evil Cassetti was, proposes the first solution, and Dr. Constantine and Poirot
      agree, although he will struggle with his conscience. The train then, somewhat symbolically, is freed from the snowdrift
      and resumes its journey.'
    - 'Represent the plot: In Seattle, Matt Leland is a straight-laced high school senior who lives with his workaholic father
      and 9-year-old twin siblings. Matt, whose mom had long ago left the family, has assumed the role of a parent for his
      young brother and sister. He becomes intrigued by a girl who lives across the lake from him, and spies on her through
      his telescope as she jet skis at night. He learns that the girl, Casey Roberts, is a new student at his high school
      and has just moved from Chicago. Matt asks her out and they go to a concert together. When Casey finds out Matt was
      using a telescope to spy on her, she angrily blows him off at first, but relents after he apologizes and the two polar
      opposites begin a whirlwind romance. Matt is drawn to Casey’s free-spirited, fun-loving nature, and she confides to
      him she has a volatile personality where she goes from intense feelings of passion to fear and destructiveness. In one
      instance, Casey tries to get Matt’s attention while he is taking the SATs by deliberately setting off the fire alarm
      at school, resulting in her suspension. Her suspension angers her parents, particularly her domineering father, and
      plans are made to send her away to a boarding school. That night, Casey overdoses on sleeping pills, and she is involuntarily
      committed to a psychiatric ward as a result. Matt visits Casey in the hospital to the detriment of his father, who scolds
      Matt for neglecting his studies and his kid siblings. The second time Matt visits Casey, the two manage to sneak out
      when the orderlies are preoccupied with other patients. The pair head to Mexico in Matt’s SUV, but along the way, they
      wreck the car when Casey decides to play a “trust game” with Matt by covering his eyes and giving him directions while
      he drives. They accept a ride from a salesman, but when the salesman makes an advance on Casey, she defends herself
      by putting out her lit cigarette on his face. The salesman throws her out of the car and a fight ensues between him
      and Matt. Matt and Casey are able to steal the car and drive off, leaving the salesman behind. As the couple get closer
      to Mexico, Casey’s behavior grows increasingly erratic and anxious, but Matt tries to help her and selflessly puts her
      needs before his. He gradually realizes her mental health is beyond his assistance. After Casey has multiple emotional
      breakdowns, Matt reluctantly makes a phone call to her concerned parents. Mrs. Roberts tells Matt that her daughter
      is manic depressive and needs her medication for her mood swings. She pleads for him to bring Casey home so her illness
      can be treated, but Matt refuses, fearing she will be locked up in a hospital again. Casey overhears him talking to
      her parents and misinterprets his call as a betrayal. Casey steals the keys to the car and drives off, with Matt stealing
      a truck to chase after her. He finds her alone in a desert where she threatens suicide and vows to shoot Matt with a
      gun she took from the glove compartment in the salesman''s car. Exasperated, Matt tells her to go ahead and shoot him,
      but Casey can’t bring herself to do it and breaks down. He runs to hug Casey and the couple return to Seattle, where
      Casey is readmitted to the psychiatric hospital. Matt goes back home, missing his time together with Casey. Some time
      later, Matt receives a letter from Casey saying she has moved back to Chicago and now feels significantly better. In
      her letter she writes, I had a dream last night, you were in it. You waved to me, maybe to say goodbye, it doesn''t
      matter. Whatever happens, I''m proud of what we went through. It helps me get through the day. That, and you in my heart,
      implying a future for their relationship.'
    - 'Represent the plot: Waitress and single mother Karla Dyson takes her six-year-old son, Frankie, to a carnival. While
      there, she receives a call from her lawyer discussing a custody battle over Frankie. After the call, Karla has lost
      sight of her son. She looks for him but can only find his toy voice recorder. In the parking lot, she sees a woman dragging
      her son into a green Ford Mustang driven by a male. Karla initially chases after them on foot before entering her vehicle
      and driving after them, leaving her phone behind after she initially drops it.  The two kidnappers evade Karla by tossing
      a spare tire into a busy highway and causing a pile-up and then threatening to kill Frankie with a knife. Karla learns
      the female captor''s name is Margo through a recording from her son''s toy. She purposely attracts the attention of
      a police officer on a motorcycle and explains the situation to him but the kidnappers kill him. Margo talks to Karla,
      requesting $10,000 in exchange for her son. Margo enters Karla''s car and tells her to follow her accomplice''s car.
      In a dark tunnel, Margo attacks Karla, who fights back and throws Margo out of the car. The other captor threatens to
      hurt Frankie, forcing Karla to stop following him. Minutes later, Karla comes across a traffic jam and finds the Mustang
      abandoned. She is told by a passerby that the male driver and Frankie are now traveling on foot. Karla goes to a police
      station to report the kidnapping but, taking note of the number of missing children that are never found, decides to
      take matters into her own hands. She spots the male kidnapper in a stolen black Volvo V70 and attempts to stop the vehicle,
      but fails to do so, she chases him until her vehicle runs out of fuel. She tried to hitch a ride from a motorist, but
      they are  blindsided by the Volvo and the good samaritan dies. The male kidnapper emerges from his car with a shotgun,
      but Karla manages to kill him by pinching his arm against the door frame of her minivan, and disabling the van''s parking
      brake, causing the van to go downhill, offroad, while still holding on to the man''s arm, after a few seconds, the minivan
      crashed into a tree, killing the man. She finds his identification card that contained his address. There, she calls
      911 and locates Frankie in a barn with two kidnapped girls. She and her son run away, promising to come back later,
      and hide underwater after Margo appears. Karla pulls Margo underwater and drowns her. She returns to the barn and encounters
      a bearded man claiming to be a neighbor. She realizes he is part of the child kidnapping ring when he mentions how many
      children were hiding without her telling him. Karla knocks him out with a shovel. The police arrive shortly afterward,
      and the children are rescued. Karla''s actions lead to the dissolution of an international child abduction ring, and
      she is praised as a hero. During the credits, Karla and Frankie are shown happily attending the carnival again together.'
  - source_sentence: 'Represent the plot: A serial killer preys on people who complain about their lives and express a wish
      to die. A quiet and unassuming young man, Vann Siegert travels from town to town, guided by his instincts. Possessing
      an unusual personality, he also has the fascinating ability to convince even the most distrustful to confide in him.
      He ends up in a small town on the West Coast of the United States. His charming innocence and easygoing nature have
      a profound effect on Doug and Jane, a couple who have lost their daughter. Doug has become an alcoholic and deeply saddened
      by the tragedy, while his wife, both tough and tender, does her best to cope with a distant husband who sympathizes
      with Vann and the absence of their daughter. Vann rents out their daughter''s room, and Doug finds him a job at the
      post office where he meets Ferrin, a young woman who will also fall under his spell. But one day, the local football
      star disappears.'
    sentences:
    - 'Represent the plot: Vann Siegert is a wandering serial killer who poisons his victims; he explains that he feels he
      is helping them and that they die without pain. After killing a heroin addict named Casper he met at a bar, he makes
      her death look like an overdose and moves to a new town. The next day, he arrives at the home of Doug and Jane Durwin
      and rents out the room of their missing daughter. Doug recommends he look for work at the post office, as they are hiring
      seasonal help for Christmas. Doug takes Vann to a high school football game, where he meets Gene, a star athlete, and
      his family. A few days later, Vann offers the boy a ride and murders him, burying his body on a beach. While he is digging
      the grave, Vann has an imaginary conversation with two detectives, Blair and Graves, who ask taunting questions about
      his methods. Later, Vann helps the town search for the missing athlete and even attends his memorial service. He reveals
      that killing Gene broke two of his personal rules: don''t kill anyone you know, and don''t kill anyone from your town.
      Vann''s ties to the community grow as he is given more responsibility at the post office. One of Vann''s co-workers,
      Ferrin, sheepishly pursues him. Doug drives her to the beach, where the pair exchange an awkward hug directly over the
      spot where Vann buried Gene. On Christmas Day, Vann goes to a diner and chooses another victim. She invites him to her
      home, where he sees that she is a painter. Something about her work disturbs him and he flees. Vann returns to the diner
      and slips poison into the water of a man eating alone. An autopsy reveals that the death was the result of a rare poison
      derived from tree bark fungus found in the Pacific Northwest. The poison is then linked to Casper''s death, and to Gene''s
      when his body is found. Vann knows that the police will eventually tie the murders to him. While looking in the mirror,
      he pulls hairs off his jacket and puts them in an envelope on which he writes ''FERRiN''. Jane is found dead from a
      blow to the back of the head. The police suspect Doug, but Vann is worried that the increased scrutiny from another
      murder will lead the police to him. During a date with Ferrin, he tries to initiate sex by assaulting her. She is terrified,
      and Vann leaves. The next day, the police arrest Doug for Jane''s murder. Vann packs his things. Before he leaves town,
      he puts his postal uniform and the envelope marked FERRiN, containing the sample of his hair, in a mailbox. While he''s
      leaving it all behind, the film ends as he drives on the highway, only by saying that he wants to lead a more regular
      life once he gets to wherever he is going. He is pursued by a cop who had earlier approached him on the beach. After
      taking a good look at him in the middle of her spotlight with her police cruiser, she smiles at him and takes the right
      fork in the road, while Vann takes the left.'
    - 'Represent the plot: As described in a film magazine review, Princess Mary of Burgundy is informed by her father the
      Duke that she is to marry Maximillian of Styria. Presents are exchanged. The Princess incognito goes to the silk fair
      and meets and falls in love with a knight who proves to be Maximillian. The later is thrown into the castle dungeon
      by conspirators and is about to be executed when saved through the intervention of the Princess. Through evil influences
      the Duke is induced to change his mind regarding a son-in-law and transfers the alliance to one with the half-witted
      son of the French king. Mary is given over to the care of the French court. Maximillian rescues her and, following the
      death of the Duke in a battle with the Swiss, is chosen to lead the Burgundians. The wedding of Maximillian and Mary
      is announced.'
    - 'Represent the plot: In December 1976, financially desperate NASA engineer Arthur Lewis and his wife Norma find a package
      on their doorstep, containing a wooden box with a large red button. The mysterious and disfigured Mr. Steward arrives
      to deliver the key to unlock the button, and tells Norma that if the button is pushed, she will receive $1 million in
      cash, but someone she does not know will die. He gives her $100 for allowing him to enter the house and voice his deal,
      and leaves. Norma and Arthur argue over Steward''s offer, complicated by the news that their son Walter''s private school,
      where Norma teaches, will no longer provide a discount for his tuition. They open the box to discover it is ''just a
      bunch of wood'', and Arthur chastises Norma for her fear, but no decision is made before they go to sleep. They discuss
      the matter further in the morning, and after work, Arthur reveals that the hundred dollar bill is real. After further
      discussion, Norma impulsively pushes the button, whispering ''It''s just a box''. It is revealed that someone is shot,
      and the gunman ran from the scene with a briefcase. Mr. Steward arrives and presents Arthur and Norma with the $1 million,
      assuring them that someone did indeed die as a result of their actions, and that the same offer will be presented to
      someone else they do not know. Arthur attempts to return the money, but Steward declines, stating that he can do nothing
      because the button has been pressed. The police treat the murder as a domestic homicide, and it is discovered that the
      husband of the woman who was shot is a colleague of Arthur''s. NASA chief Martin Teague and Norm Cahill, Arthur''s boss,
      discuss Cahill''s missing colleague, Arlington Steward. The chief tells Cahill that Steward became something else after
      being killed by lightning, shortly after NASA received the first photograph transmitted by the Viking 1 Mars lander
      in July 1976. Arthur and Norma become plagued by seemingly supernatural happenings and are visited by others who fell
      victim to the box, pressing the button and suffering the same fate as the Lewis family. It is revealed that Steward
      has been collaborating with a group of benefactors, using the box to decide whether the human race is worth preserving.
      After several paranormal incursions, Steward returns to the Lewis home and informs them that Walter, earlier kidnapped
      by unknown assailants, is locked in the family''s bathroom upstairs and has been stricken blind and deaf. Steward laments
      that he had hoped the family would not succumb to the temptation of the money, and delivers a final ultimatum: They
      may keep the money and live out their lives with their disabled son, or Arthur can kill Norma, thereby restoring Walter''s
      sight and hearing, with the million dollars placed in a high-interest account available to him when he turns 18. Steward
      refuses Norma''s proposal to kill herself. Arthur contemplates killing Steward, but Steward warns him he will be charged
      with the murder, his son''s condition will remain, and the family will be left with nothing. Steward departs, and Arthur
      realizes the choice to push the button has placed the family in purgatory. Norma, wanting her son to live his life without
      disability, asks Arthur to kill her, and after a long goodbye, he reluctantly agrees but cannot bring himself to pull
      the trigger. Another couple is offered the same box. They also decide to press the button; at the same time, Arthur
      shoots Norma while embracing her, and Walter is healed from his condition. It is implied that this mysterious offer
      will continue among other couples in the future.'
  - source_sentence: 'Represent the plot: After a night of heavy drinking, a group of young people are attacked by mutant
      bats. Suspicion quickly falls on an industrial company that dumps its waste into the local river...'
    sentences:
    - 'Represent the plot: At the end of the eighteenth century, Marianne, a painter, is teaching an art class in France.
      One of her female students asks her about a painting of hers, which Marianne calls Portrait de la jeune fille en feu.
      Years previously, Marianne arrives on a distant island in Brittany. She has been commissioned to paint a portrait of
      a young woman of the gentry named Héloïse, who is to be married off to a Milanese nobleman. Marianne is informed by
      Héloïse''s mother, the Countess, that she has previously refused to pose for portraits, as she does not want to be married;
      she had been living in a convent before the suicide of her older sister necessitated her return and her betrothal. Marianne
      acts as Héloïse''s hired companion to be able to paint her in secret and accompanies her on daily walks along the rugged
      coastline to memorize Héloïse''s features. Marianne finishes the portrait, but finds herself unable to betray Héloïse''s
      trust and reveals her true reason for arriving. After Héloïse criticises the painting, which does not seem to portray
      her true nature, Marianne destroys the work. After seeing the destroyed work, Marianne explains her actions to the Countess
      by saying that she can create a better painting. As the Countess is getting ready to fire Marianne, Héloïse says that
      she will pose for Marianne. The Countess is shocked to hear this and gives Marianne five days to complete the new portrait
      while she is away on the mainland. Marianne is haunted throughout the house by visions of Héloïse in a wedding dress.
      One evening, they read the story of Orpheus and Eurydice and debate the true reason why Orpheus turns around to look
      at his wife, causing her to be returned to the underworld. Later, the two go to a bonfire gathering where women sing,
      during which Héloïse''s dress briefly catches fire. The next day, Marianne and Héloïse share their first kiss and have
      sex later that night. The pair spend the next few days together, during which their sexual relationship grows stronger,
      and they help Sophie, the housemaid who is pregnant, to get an abortion. With their affair about to be cut short by
      the ensuing return of the Countess, Marianne sketches a drawing of Héloïse to remember her by, and Héloïse asks Marianne
      to draw a nude sketch of herself on page 28 of her book. The Countess approves of the now completed portrait, and the
      next morning Marianne bids farewell. As she is about to leave the house, she hears Héloïse say, Turn around. She turns
      and sees Héloïse in her wedding dress. In the present, Marianne reveals that she saw Héloïse two more times. The first
      was in the form of a portrait at an art exhibition, in which Héloïse, with a child beside her, is portrayed holding
      a book and surreptitiously revealing the edge of page 28. The second time was at a concert in Milan, where she notices
      Héloïse among the patrons seated in the balcony across the theater from her. Unobserved, Marianne watches as Héloïse
      is seen crying and smiling while listening to the orchestra playing the Presto from Summer in Vivaldi''s Four Seasons,
      the music that Marianne had played for her on a harpsichord years before.'
    - 'Represent the plot: In a Louisiana city, near a bayou, a plague of genetically mutated bats begin to kill the people,
      then Dr. Maddy Rierdon and her students from colleges work together to kill the bats before the whole city is destroyed.
      The film begins with an abandoned house, inhabited by a group of vampire bats, which seem to be mutations of the local
      population. Later, in the forests nearby, people begin to find many dead corpses of deer and local animals, with multiple
      bites on their bodies and their blood completely drained. While the corpses are studied, one student from the class
      of Physician/Doctor Maddy Rierdon (Lucy Lawless) gets chased in the forest by something that knocks him down and kills
      him. When he is found, his blood has been drained. Police suspect two of his friends of being the killers and put them
      under arrest. The case attracts Maddy''s attention, as she wants to prove her students'' innocence. She soon finds out
      that her dead student must have been killed by something that moves in a pack and is very fast. At night, two more fishermen
      are attacked and killed while fishing on their boat. The next morning, police find the drained bodies and, with Maddy''s
      presence at the scene, they are able to recognize some excreta of bats. They then change their opinion and started to
      believe that bats were the cause of these deaths. The police send out many agents to search around the city for signs
      of the vampire bats. After several negative events, including a teenage girl who gets bitten by a bat during sleep and
      acquires rabies, and a party on board a ship, which is attacked by the bats, Maddy begins to think that the bats have
      mutated somehow, which she reports to group of agents she is working with. She states that the bats could have been
      affected by some artificial environmental impacts. To verify her statement, she arrives at the river where the fishermen
      were killed to set a trap with the help of some of her students. They successfully capture some bats using nets, and
      Maddy realizes that this population of vampire bats has developed eight upper-jaw fangs instead of two, which makes
      them hungrier for blood and able to drink more blood every time they bite. They bring the other trapped bats back to
      the lab, where Maddy informs the police of this mutation. Suggestions are given as how to exterminate these killer bats,
      and one of them is to spray poisons over the captured bats and release them after sticking GPS locators onto their bodies,
      letting them fly back to their habitats; the bats will infect each other by licking and grooming. The plan works successfully,
      but it only kills a small group of them. The other groups remain unaffecteded. Meanwhile, one more student is killed
      in the pool by the bats. Maddy rushes to find a solution while learning that the bats'' mutation is an indirect result
      of toxic waste that contaminated the local water source, creating mutations in the deer that the bats feed on, thus
      making the bats too mutants. Meanwhile another group of bats is found in a church (yet still not the whole population).
      Maddy''s students accidentally find out that the bats are attracted to loudspeakers or anything that emits sounds similarly,
      as they mistake those sounds as reflected ultrasounds. They decide to set a trap in the underground basement of their
      school, intending to lure the bats in and heat them to death by sending in all the heat from the school''s exhausts.
      As the plan commences, the bats are lured to the area by loudspeakers. A problem is encountered as Maddy is attacked
      in the underground by one of the policeman, who turns out to be an agent working for the company which has been contaminating
      the water sources and is therefore responsible for the bats'' mutation. He tries to kill Maddy in order to eliminate
      witnesses of his company''s work, but Maddy knocks him out instead and escapes when the bats fly into the underground;
      they devour the agent just before they get heated to death. Three months later, Maddy is married and sitting with her
      children in front of the house where they eliminated the first population of the vampire bats. She suddenly looks nervous
      and seems to be scared by something, but she quickly turns back to play with her kids.'
    - 'Represent the plot: Phillip Cass, a sensitive young man, is saddled with a mother from hell. While fighting in Italy
      during World War II, he marries a sweet, young Italian woman (Pier Angeli) who might be able to change his life and
      satisfy his desire to be loved.  Readjustment proves difficult as the young couple have to share a New York apartment
      with his parents and sister, while Philip feels a failure at menial jobs.  The birth of a baby finally gives the couple
      new hope.'
  - source_sentence: 'Represent the plot: Dr. Siddharth Sinha (Amitabh Bachchan) dreams of transforming his hospital into
      a vast, state-of-the-art medical complex. His adopted son, Dr. Akash Sinha (Anil Kapoor), a neurosurgeon, works at the
      hospital and longs to help his father achieve his dream. At his father''s behest, Akash welcomes the new anesthesiologist,
      Dr. Neha Mathur (Gracy Singh), to his team. Their initial collaborations are challenging, but the tensions soon blossom
      into romance. Meanwhile, at a social gathering, Akash meets Sonia Kapoor (Preity Zinta), the daughter of Gulshan Kapoor,
      one of India''s wealthiest businessmen. Sonia, capricious, selfish, and manipulative, wants to marry Akash. To appease
      his daughter''s whims, Gulshan Kapoor offers Akash a substantial gift in exchange for his daughter''s hand in marriage.
      Will Akash accept this deal and save his father''s hospital, his life''s work, or remain loyal to Neha, for whom he
      feels a growing love?'
    sentences:
    - 'Represent the plot: In a hospital founded by Dr. Siddharth Sinha, he and his adopted son, Akash, work as doctors. Siddharth
      wishes to run a state-of-the-art hospital, but his profession requires him to dedicate his time to his patients. Soon,
      a new doctor, Dr. Neha Mathur, joins the hospital and falls for Akash. However, the arrival of Sonia Kapoor later changes
      the relationship between Akash and Neha. Sonia is a jealous, spoilt woman who is used to having things her way, and
      it is not long before she wants Akash for herself. She decides that since Akash is the man for her, she can win his
      love with a financial agreement. The agreement states that once Akash marries Sonia, her father Gulshan Kapoor will
      help finance the hospital. Siddharth dies in an attempt to bring an injured child to the hospital after suffering a
      heart attack. His last wish is for the hospital to be properly completed. Akash, now burdened with the increasing debts
      to purchase equipment for the hospital, cannot arrange for further funds. With a broken heart, he agrees to marry Sonia
      to set up the hospital, thus fulfilling his father''s final wish. Neha understands his dilemma and agrees to break up
      with Akash, but because of her dedication and professionalism, she offers to continue working in the same hospital.
      After the marriage, Sonia is revealed to be highly manipulative, consistently jealous and mistrustful, and obsessively
      controlling towards Akash. She begins to suspect that Akash is having an affair with Neha, and starts annoying both
      of them. She cannot stand Neha, who is still working at the hospital, and keeps coming up with all kinds of excuses
      to get her out. She is involved in a serious accident and has severe brain damage requiring Akash to operate on her.
      For a moment, he is in a dilemma—curing Sonia would mean again having to face the problems she causes. However, he decides
      to fulfill his duty as a doctor and Sonia later recovers. She learns that Akash operated on her, despite her behaviour.
      Sonia asks for Akash''s forgiveness and divorces him, allowing him to marry and settle down with Neha.'
    - 'Represent the plot:  The film starts with the loading of a ship called the Merry Maiden. Oliver is first mate on the
      ship and described as a bully, the nastiest crew member, after the captain of course. He features a beard and a mustache,
      rather than his usual solitary mustache. Stan plays Willie Brisling a guy who is engaged to Nelly and they are in love.
      The captain leaves his ship, he sees Nelly and decides he wants her. Stan has a tattoo of a ship on his chest and shows
      it to the captain. The captain pours a jug of water down Stan''s sweater and abducts Nelly. The captain takes Nelly
      to his ship and Stan sneaks on board to rescue her. Oliver starts to look for Stan. Stan decides to save Nelly his last
      hope is to get rid of the crew, one by one. Stan disguises himself as a prostitute. The crew begin to fall for his charms.
      Stan calls one of the crewmen over, he hits the crewman with a cosh and knocks him out. Then he throws the cosh at Oliver,
      who thinks the crewman threw the cosh. Oliver throws the crewman |overboard, this is repeated until all of the crew
      are in the sea. Nelly is being harassed by the captain. The captain''s wife appears at the ship. The Captain takes a
      fancy to Stan. The wife appears as Stan is sat in the captain''s lap. The captain''s wife takes a gun and goes to shoot
      her husband. Stan stops her and takes off his wig. Stan says this was a test to see if you really love your husband.
      The captain and wife begin to make up. But then the captain indicates he''s going to deal with Stan later. Stan is peeved,
      he opens the door and Nelly appears. Stan indicates the captain has been up to no good with Nelly and that four other
      loose women have already gone. The captain''s wife is furious, Stan gives her the gun back. Stan and Nelly leave. There
      is a gunshot in the room. The wife, still angry, sees Stan and Nelly through a porthole and shoots them. Stan and Nelly''s
      clothes fall off revealing their underwear.'
    - 'Represent the plot: summaryMike and Gunther lead a boring life in Munich. Hanna, Mike''s girl friend, wants to get
      married but he is not interested. The two friends get hold of a treasure map of the Rio das Mortes area and decide to
      set out to find it in Peru. They are looking for freedom and adventure. Against Hanna''s opposition, the car is sold,
      and the two men try to raise money. Their ignorance and clumsiness seems to lead to failure, but eventually, by luck,
      they find a sponsor. In the final scene, at the Munich airport, a rejected Hanna is about to shoot them as they walk
      to the airplane.'
  - source_sentence: 'Represent the plot: Three young women on holiday in the Balearic Islands, relaxing by the sea, meet
      four boys who invite them to a party on a yacht. On board, the party is in full swing, fueled by alcohol, drugs, and
      sex. At the height of their climax, one of the boys kills Lisa, his sexual partner, by breaking her neck. The boys tell
      the girls it was an accident, but one of them saw Josh specifically hit his girlfriend. At first, they all decide to
      return to shore, but after some thought, the boys decide it''s best to throw the girl''s body overboard to avoid any
      trouble. The situation spirals out of control, and a desperate fight for survival begins on board the yacht, with passengers
      dying one after another. Only one girl, Tammy, survives and escapes in a lifeboat.'
    sentences:
    - 'Represent the plot: Bill Anderson is a dissatisfied middle-aged man, working at his father-in-law''s bank, where no
      one takes him seriously. Out of shape and struggling with body image issues, he stashes and consumes candy in his home
      and office. His father-in-law, Mr. Jacoby, is a pillar in the community and considering a mayoral run. Bill and his
      wife Jess (Jacoby''s daughter) live in a house provided by her father and are financially comfortable. Bill is in the
      process of purchasing a doughnut franchise through the Whitmans to wean himself and his wife off of Jacoby''s finances.
      At the family''s public donation ceremony, Bill meets the Kid, a teen he protects from the school principal for possession
      of marijuana. In the bathroom, the principal suggests that Bill join a school mentoring program, to which Bill agrees.
      Bill becomes suspicious when he sees Jess talking with newscaster Chip Johnson at the ceremony. He plants a hidden camera
      in their bedroom and goes on a hunting trip with his father-in-law and brother-in-law, accompanied by their mentored
      students. The video from the hidden camera confirms that Jess is having an affair with Chip; in a rage, Bill bursts
      onto Chip''s live broadcast, beats him up, and is arrested. Bill is bailed out by his successful older brother Sargeant,
      and Bill stays at his place with Sargeant''s husband Paul. Bill and Jess After fighting about the sex tape with his
      wife, they go to Chip''s. After Chip behaves rudely to Jess, Bill beats him up again on live TV and demands an apology
      from Chip. Bill is labeled Chip''s deranged fan. Random people frequently yell Apologize! at Bill throughout the film
      in a reference to this incident. Taking up swimming again helps Bill clear his mind, and he continues mentoring the
      Kid, who admires him. A plan is devised to win back Bill''s wife. Lingerie salesgirl Lucy, at the Kid''s insistence,
      flirts with Bill in front of Jess to make her jealous, and she also accompanies Bill and the Kid to an in-person visit
      to one of the doughnut franchise locations, posing as Jess. Bill continues to work to get his life back, cutting out
      sweets, losing weight, swimming daily, mentoring the Kid, and trying to win back Jess. At a family dinner, he volunteers
      to buy fireworks for the picnic where Jacoby will announce his mayoral bid. After a fun-filled day, Bill, the Kid, Lucy,
      and her friend go back to his tent in his brother''s back yard, where he gets high and has sex with Lucy''s friend.
      At the golf course picnic, Bill gets too close to his wife and Chip (who had a restraining order filed against Bill),
      so security throws him out. Bill tells the Kid to meet him at the back, but while driving there, he crashes into a tree,
      causing the fireworks to explode early. The Kid rescues him on a golf cart, takes him to the hospital, where Jess shows
      up, and tells him she knows about the franchise. Discussing their marriage, Bill reveals his unhappiness and dislike
      of their dependence on her father''s money. Bill takes further steps to reclaim his life, cutting his own hair and changing
      his wardrobe. He later visits Jacoby at the bank to resign, pointing out that he doesn''t fit in. His father-in-law
      understands, accepting his resignation, commending Bill for attacking Chip, saying he would have done the same (revealing
      the fact that in spite of Jess''s attempt to conceal it, Jacoby knew about her affair). When Bill meets with the Whitmans
      at the franchise headquarters he is surprised to see Jess, who has convinced them to let them buy the franchise. During
      a private conversation, Bill confesses he was going to call it off. Having a change of heart, he lets the purchase go
      through, and gives it to her. They make peace, agreeing to separate, putting the house up for sale. At the Kid''s school,
      Bill bids him farewell, excited to start a new, unknown chapter in his life. He promises to keep in touch, telling him
      to look in his locker which explodes with fireworks, to his delight.'
    - 'Represent the plot: While on a holiday in Mallorca, Lisa, Kim, and Tammi meet four young men, Bluey, Josh, Sean, and
      Marcus. After spending the day at the resort together, the girls are invited to the men''s yacht, where they plan to
      party out at sea. While aboard the boat, they take drugs and the conversation turns to sex, and in particular, types
      of sexual acts. Bluey describes a sex act called a donkey punch which involves punching the woman in the back of the
      head while having doggy style sex in order to increase the sexual pleasure for the man. Marcus, Bluey, Kim, and Lisa
      go to the master bedrooms, where they begin having drug-fuelled sex. They are watched by Josh who, known to all involved,
      lingers furtively in the darkness recording the action with a camera. Bluey, who is copulating with Lisa, asks Josh
      to film the action and then both of them beckon Josh to have sex with Lisa. Immediately prior to ejaculation and with
      Bluey''s encouragement, Josh donkey punches Lisa but uses excessive force, breaking her neck and killing her instantly.
      To cover up the incident, the men decide to throw the body overboard while the women want to report it to the authorities,
      and argument ensues about what to do with the tape. Bluey continually insults Tammi and in a fit of rage, she stabs
      him in the chest with a knife, and the women escape in the yacht''s tender. However, the girls soon realise that the
      tender''s outboard motor is missing (a cut scene shows it still attached to the yacht). In a fit of despair, Tammi fires
      a flare, attracting the attention of the men. They quickly locate and pick up the women. As the men attempt to get the
      women aboard, threatening them with a shotgun, Kim shoots a second flare directly at Marcus. The flare explodes into
      Marcus''s torso and slowly burns him to death. Josh locks the recaptured women in one of the rooms below. Sean asks
      Josh to call in and request medical assistance for Bluey. However, knowing that Bluey still has the tape that contains
      footage of him dealing the earlier fatal blow, Josh instead decides to discover its whereabouts by torturing Bluey.
      He does this by withholding pain numbing drugs from him. Bluey reveals the location of the tape, beneath the bed in
      the state room. Tammi escapes the room by smashing through the glass door and cutting herself, and overhears Bluey mention
      where the tape is. She frantically roams the boat trying to locate it. She does this just moments before Josh attempts
      to retrieve it. Unable to find the tape, Josh returns to Bluey, stepping up the torture by turning his attention to
      the knife which still protrudes from the wound. Josh ultimately takes this too far and, following Bluey''s pained protestations
      that he has already revealed the location, he twists the knife further into the wound before pulling it out, causing
      Bluey to die. Sean tries to bring the situation under control by retrieving a shotgun from Josh. He then tries to calm
      both Josh and Tammi from a frantic argument about the whereabouts of the tape. Kim notices Sean holding a shotgun with
      Josh and Tammi visibly upset from an adjacent room. She misinterprets his intentions towards Tammi and Josh, and brutally
      kills Sean with the propeller of an outboard motor. After realizing her mistake, she manically commits suicide by jumping
      overboard, leaving Josh and Tammi as the only ones left. A distraught Tammi decides that she cannot remain on the boat
      any longer. Josh agrees, and readies the tender. His plan is to leave the yacht, get back to shore and claim that there
      was an accident. As Josh pushes the tender away from the yacht, Tammi quietly takes hold of the end of the mooring rope
      at the stern. Once the tender has floated some distance from the yacht, Josh pulls his hunting knife from his shorts
      and points it at Tammi. He demands the incriminating tape from Tammi and, fearing for her life, she obliges, throwing
      it on the floor of the tender. As a distracted Josh reaches for the tape, Tammi quickly throws the looped end of the
      mooring rope around his neck. The rope immediately reaches the end of its tether and Josh is wrenched into the sea,
      snapping his neck and killing him. Tammi, now the sole survivor, fires a distress flare in the hope of being rescued.
      She then lies down on the tender and morbidly stares up at the night sky, as the raft drifts away into the ocean.'
    - 'Represent the plot:  Marla is a formerly free-spirited girl who has grown up to be responsible yet overprotective in
      order to care for her brother Charlie, who has grown lonely and disconnected from her after the death of their parents
      in a car accident. One night, Charlie sneaks out to visit a toy museum with a Playmobil exhibit. After Marla arrives
      and tells Charlie off for running away, a lighthouse illuminates them and transports them to the Playmobil world. Marla
      and Charlie –who has been transformed into a Viking warrior– find themselves in the middle of a viking battle, and Charlie
      helps them until he is kidnapped by a group of pirates. Frantic to find her brother, Marla goes to the nearest town
      hoping to ask for help, and runs into Del, the driver of a food truck whose client refuses to pay him over pink hay
      that causes the town''s horses to sprout wings. As Marla tries to form a posse to find Charlie, Del gets her out of
      trouble when she shows Viking gold to the whole town, and agrees to help Marla find her brother in exchange for the
      gold. Marla and Del run into Rex Dasher, a secret agent and an old friend of Del. Rex explains that several characters
      have disappeared, and the group sneaks into a villainous spy headquarters to find information about the disappearances.
      Despite some issues, they successfully gather the data and escape, but Rex is later captured by the pirates. He is taken
      away to Constantinopolis and finds Charlie, who had been locked up with other characters by Emperor Maximus, who intends
      to have the prisoners fight to their deaths. Rex tells Charlie that Marla had been looking for him, which encourages
      Charlie to break away. However, he later allows himself to be recaptured so the other characters could escape. Del recognizes
      that a device used by the pirates belongs to Glinara, an alien crime lord. After meeting with her in exchange for information,
      Del offers to pay twice as much as he owes her. Glinara agrees and reveals that she sold the device to Maximus. However,
      Del is unable to uphold his end of the bargain, as Marla only had two pieces of gold left. Angered, Glinara captures
      them and attempts to drop them into a portal, but they are spared by Glinara''s robot servant Robotitron, who hacks
      the portal and drops the group into a forest. Del leaves the group, upset by Marla''s deception. Marla and Robotitron
      get lost in the forest until Marla accidentally hits a fairy godmother, who encourages her to continue her search and
      sends her to Constantinopolis. Arriving in the city, Marla reaches a coliseum where Charlie is about to fight a Tyrannosaurus
      rex. Charlie and Marla work together to fight off the T-Rex but to no avail. Del soon arrives with his food truck, and
      Marla uses the last of Del''s pink hay to turn the T-Rex harmless. An enraged Maximus orders his guards to arrest them,
      but the guards reveal themselves to be Rex and the missing warriors, who then lock Maximus inside a cage. As everyone
      celebrates their victory, Marla and Charlie use the T-Rex to fly back to the lighthouse and return to the real world,
      where it is revealed that they were missing for only five minutes. On good terms, Marla promises Charlie that their
      relationship will be mended.'
