- source_sentence: 'GPE (PERSON), a deaf but modest and experienced director, is filming a melodrama, *Je vous présente Paméla*,
    at ORG in GPE, on the former sets of *ORG*. The synopsis tells the story of a man''s passionate love for his stepdaughter,
    with whom he elopes. He is murdered by his son after the young daughter-in-law dies in a mysterious car accident. Alphonse
    (PERSON), an immature and capricious actor, plays the vengeful son, while PERSON (PERSON), an English star returning after
    a severe depression that forced her to abandon her last film shoot, plays the daughter-in-law. The role of the seductive
    father is given to PERSON (Jean-Pierre Aumont), a famous actor who frequented GPE during its golden age. The role of the
    mother is offered to ORG (PERSON), an Italian star nearing the end of her career, PERSON''s former lover, and a heavy
    drinker. Around this quartet of actors gravitate Liliane (Dani), ORG''s fickle girlfriend recruited as a script intern
    who has a crush on the English stuntman, PERSON (PERSON) the somewhat obsessive prop man in constant conflict with PERSON
    (PERSON), GPE''s devoted script supervisor, PERSON (PERSON) a supporting actress who turns out to be pregnant during filming
    but is protected by GPE, the producer who insists on strict adherence to the work schedule, not forgetting a cheerful
    ORG as assistant director. There is also GPE, the production manager whose wife will summarize the plot of the film in
    a few sentences: However, beyond the description of the turpitudes of life on set, the only real character in the film
    is cinema itself, But it is presented not from the point of view of artistic creation but in what it has that is most
    artisanal and artificial like the process of "day for night" which consists of shooting night scenes in broad daylight.'
