  - Lorelei Lee (Marilyn Monroe) and Dorothy Shaw (Jane Russell) are American showgirls and best friends, although the two
    are very different. Lorelei thinks more of a man's financial wealth and likes men who can support her passion for diamonds,
    like her fiancé, Gus, who can provide all of her financial needs. Dorothy prefers men who are good-looking and fit, and
    does not care about their wealth. Lorelei plans to wed Gus in France, but the two are forbidden to travel together by
    Gus's strict father, Esmond Sr., who despises Lorelei. Lorelei decides to travel to France with or without Gus, and before
    she leaves he gives her a letter of credit to cover expenses upon her arrival, and promises to later meet her in France.
    However, he also warns her to behave, noting that his father will prohibit their marriage if rumors of misdeeds make their
    way to Esmond Sr. Unbeknownst to both of them, Esmond Sr. has hired a private detective, Ernie Malone, to spy on Lorelei.
    During the Atlantic crossing, Malone immediately falls in love with Dorothy, but Dorothy has already been drawn to the
    members of the (all-male) Olympic team. Lorelei meets the rich and foolish Sir Francis Piggy Beekman, the owner of a diamond
    mine, and is attracted by his wealth; although Piggy is married, Lorelei naively returns his geriatric flirtations, which
    annoys his wife, Lady Beekman. Lorelei invites Piggy to the cabin she shares with Dorothy, whereupon he recounts his travels
    to Africa. While Piggy demonstrates how a python squeezes a goat by hugging Lorelei, Malone spies on them through the
    window and takes pictures of the two, but is caught by Dorothy as he walks away nonchalantly. She tells Lorelei, who fears
    for her reputation. They come up with a scheme to intoxicate Malone and then search him to recover the incriminating film
    while he is unconscious. They find the film in his pants, and Lorelei promptly prints and hides the negatives. Revealing
    her success to Piggy, she persuades him to give her Lady Beekman's tiara as a thank you gift. However, Malone reveals
    he had planted a recording device in Lorelei's cabin, and has heard her discussion with Piggy about the pictures and the
    tiara. Malone implies that Lorelei is a golddigger and, when Dorothy scolds him for his actions, admits that he himself
    is a liar. However, Dorothy reveals to Lorelei she is falling for Malone, after which Lorelei chastises her for choosing
    a poor man when she could easily have a rich one. The ship arrives in France, and Lorelei and Dorothy spend time shopping.
    However, the pair discover that Lorelei's letter of credit has been cancelled and are then kicked out of their hotel due
    to the information Malone shared with Esmond Sr.  The duo are forced to find work as showgirls in Paris, headlining a
    lavish revue.  When Gus shows up at their show, Lorelei rebuffs him, after which she performs Diamonds are a Girl's Best
    Friend, the musical number whose lyrics explain why and how women need to pursue men with money. Meanwhile, Lady Beekman
    has filed charges regarding her missing tiara, and Lorelei is arraigned for theft. Dorothy persuades Lorelei to return
    the tiara, but the pair discover it is missing from her jewelry box. Piggy tries to weasel out of his part in the affair
    when Malone catches him at the airport. Dorothy stalls for time in court by pretending to be Lorelei, disguised in a blonde
    wig and mimicking her friend's breathy voice and mannerisms. When Malone appears in court and is about to unmask Lorelei
    as Dorothy, she reveals to Malone in covert language that she, Dorothy, loves him but would never forgive him if he were
    to do anything to hurt her best friend, Lorelei. Malone withdraws his comments, but then reveals Piggy has the tiara,
    exonerating Lorelei. Back at the nightclub, Lorelei impresses Esmond Sr. with a speech on the subject of paternal money,
    and also makes an argument that if Esmond Sr. had a daughter instead of a son, he would want the best for her, to which
    he agrees and consents to his son's marriage to Lorelei. The film closes with a double wedding for Lorelei and Dorothy,
    who marry Gus and Malone, respectively.
- source_sentence: The story follows the Duncans as they plan to spend Christmas with Amy Duncan's mother, and they embark
    on a great adventure. Gabe ends up inside his favorite video game and wins. Amy's mother makes a huge mess, punishing
    everyone for no reason.
  sentences:
  - Calamity Jane (Jane Russell) is busted out of a sheriff's jail by a couple of government agents under Governor Johnson
    (Charles Trowbridge) and Commissioner of Internal Affairs Emerson (Stanley Andrews). Johnson and Emerson wish to hire
    her to uncover white traders illegally selling guns to an Indian tribe near Buffalo Flats, one of the frontier areas;
    because the agents they previously sent to investigate have turned up dead, they feel they need a new approach and have
    conceived a plan to use Jane, both as a woman and skilled gunfighter. In return for her services, Johnson and Emerson
    offer her a full pardon for her past crimes. The plan is for Jane to meet in Port Deerfield with Jim Hunter, another government
    agent, pose with him as a married couple, and join a settler's trek to the area where the gun running is taking place.
    However, the mastermind behind the gun smuggling is revealed to be Jasper Martin (Jackie Searl), Johnson's secretary.
    Jane finds Hunter dead and herself hounded by assassins. Evading an attempt on her life, she hitches a ride with Peter
    Painless Potter (Bob Hope), a travelling dentist fleeing town following one of his habitual blunders, and marries him
    to maintain her cover and to coerce him into joining the wagon train. The gun smugglers also join, to ensure delivery
    of a stash of dynamite and to track the federal agent sent to thwart them, believing Potter is their target. After Potter
    mistakenly leads part of the wagon train into Indian territory, and while they are taking a rest at a log cabin, they
    are attacked by the Indians. Locked out, Potter hides inside a barrel and shoots wildly while Jane secretly takes out
    several Indians from inside. Potter is credited with this achievement, reinforcing the smugglers' assumptions. After arriving
    in Buffalo Flats, Jane meets with her contact, Hank Billings (Clem Bevans), and tasks him to find out where the dynamite
    will be delivered. Meanwhile, the smugglers concoct a plan which results in Potter incurring the wrath of Big Joe, a bad-tempered
    gunslinger (Jeff York). When this clash leads to a duel, Jane initially plans to allow Potter to be killed, to throw off
    the smugglers, but instead ends up aiding him again because she wants to use him as a decoy and because she has begun
    to fall in love with him. The same night, Billings reports to Jane that the conspirators have hidden the dynamite in the
    undertaker's shop, then dies from an arrow in his back. Jane manages to manipulate Potter into going to the undertaker's
    to scope out who comes to pick up the dynamite; she prepares to follow in his wake, but both are captured by the smugglers
    and taken to the Indians' camp, where Martin has arrived with the rest of his weapons shipment. In order to punish Potter
    for killing their braves, the medicine man (Henry Brandon) prepares to have Potter ripped apart by two bent-down trees,
    but the contraption instead catapults Potter into the forest, leading to the medicine man being banished. While returning
    to the camp to free Jane, Potter comes upon the medicine man, knocks him out and takes his clothes as a disguise. Ignorant
    about the medicine man's banishment, Potter prepares to free Jane when the tribesmen close in on him. Taking a powder
    flask, Potter strays through the camp, laying a powder trail that eventually ignites and blows up some of the smuggled
    weapons. In the confusion, Jane and Potter escape in Potter's wagon, which is loaded with the dynamite, with the Indians
    and smugglers on their tail. After Potter drops a lit dynamite stick, he and Jane abandon the wagon just as the smugglers
    reach it and get themselves blown up. With the mission accomplished, Jane and Potter embark on their honeymoon for real.
    As the film ends, Jane (in Potter's stead) falls victim to one of the film's running gags.
  - The Duncan family plans to go to Amy's parents' new condo in Palm Springs, California for Christmas. As the family are
    sorting out their luggage, Teddy's friend Ivy Wentz drops by their house and reminds Teddy about their plan to go to Florida
    for spring break. Teddy asks Amy for permission, but she denies, unwilling to let her daughter travel alone. At Denver
    International Airport, Teddy still begs for her parents to let her go with Ivy. Bob tells Teddy that if she is responsible
    enough to get a plane ticket, then she can be responsible enough to go to Florida on her own. After some mishap involving
    the airport's metal detector, the Duncan family quickly make it on board the plane for Palm Springs. As they are all prepared
    for their flight, a flight attendant informs the passengers that one of the plane's seats has been overbooked and asks
    for any passenger to give up their seat voluntarily, in exchange for a free plane ticket. Seeing this as an opportunity
    to go to Florida with Ivy, Teddy volunteers to give up her seat for the ticket. Still refusing to let Teddy go by herself,
    Amy also gets off the plane to go after her. Back at the airport, Amy and Teddy learn from a check-in desk woman that
    the next flight to Palm Springs won't be available for three days, which is after Christmas. Appalled by this, Amy gets
    in a confrontation with the desk woman and proceeds to assault her, causing her and Teddy to get thrown out by airport
    security. Separated from their family and with only about three days left until Christmas, Amy begins to panic but Teddy
    suggests that they should take the bus to get to Palm Springs. Meanwhile, the rest of the family arrives in Palm Springs,
    but things aren't any easier for them either as Bob tries to care for Charlie under the watchful eye of Amy's mother Petunia,
    who strongly dislikes Bob and constantly blames him for the kids' mishaps; Charlie making a huge mess and breaking everything
    in the house, PJ getting a bad sunburn after accidentally using suntan oil instead of sunblock; and Gabe teaching Grandpa
    Hank how to play his favorite video game, Galaxy of Death, only for Hank to become more addicted to it than he is, causing
    his hair to be full of mints at one point. During their bus journey, Amy starts suffering from travel sickness, resulting
    in her and Teddy getting forced off the bus by the other passengers due to Amy hogging the bathroom. Stranded and in desperation,
    Teddy and Amy find unconventional ways to get to Palm Springs before Christmas, while keeping in contact with Bob via
    mobile phone. They try to rent a worn-out Yugo from a guy who bought the store from its original owner, they end up going
    down a hill with one windshield wiper and no brakes or headlights and the car gets destroyed when trying to adjust their
    seats in the morning. With the broken car being towed away to the scrapyard by a repair man who used to own the car store
    they bought it from, Teddy suggests that they should hitch a ride, despite Amy's refusal, and the two meet an elderly
    couple who are part of an alien abduction group called the Alien Abduction Survivors Network. While riding in the couple's
    minivan, Amy is revealed to be pregnant again when the elderly woman notices the symptoms. When they arrive in Las Vegas,
    Nevada, Teddy, who is shocked by the revelation, asks Amy why she didn't tell her about it and Amy explains to Teddy that
    she and Bob originally planned on announcing her pregnancy to the whole family on Christmas, but then they notice their
    luggage has been stolen when they weren't looking. At the condo swimming pool, Bob gets a phone call from Amy about her
    and Teddy's situation, which prompts him to drive to Las Vegas to pick up the two as he borrows Hank's car, with PJ and
    Gabe tagging along and having Petunia look after Charlie while they're gone. While walking through the streets, Amy and
    Teddy get into another argument. Amy blames Teddy for getting them lost in the first place, while Teddy retorts that Amy's
    ego combined with her pregnancy has been more hindrance than help. Losing her patience, Amy accidentally blames Teddy
    for ruining Christmas when she disembarked the plane. Extremely hurt, Teddy disowns Amy as her mother and storms off in
    tears while Amy becomes ashamed over unintentionally and emotionally hurting her daughter. Hungry, the mother and daughter
    do a street performance involving Christmas carols mixed with staged fights to get money for dinner. While in a restaurant,
    Amy tries to talk to Teddy, but she ignores her, until Amy reveals the real reason why she didn't want Teddy to go with
    Ivy during spring break. Amy thought it was too hard to let go and says that Teddy is her baby girl, having been worried
    that her daughter is growing up too fast. Teddy tells her that she'll always be Amy's baby and apologizes for the mishap
    back at the airport, but Amy reassures her that she didn't ruin Christmas for the family. This moment leads them to finally
    making up and reconciling. A little while later, Teddy and Amy encounter Jordan, the girl who had stolen their luggage
    earlier, and confront her. She breaks down in tears and explains how she became stranded after running away from home
    to go to a cross-country music festival, which her mother forbade her from attending and was abandoned by her ride. Sympathizing
    with Jordan, Amy calls Jordan's mother and smooths things over, and Teddy gives her plane ticket to Jordan to help her
    get back home for Christmas. This gesture helps Teddy and Amy reconcile from their previous arguments, and Amy finally
    acknowledges that Teddy is responsible as they rent a bike from a bike rental store owner, who just so happens to be the
    original owner of the car repair company that took away their wrecked Yugo. Meanwhile, as PJ, Bob, and Gabe are driving
    through a desert, they find themselves mistakenly kidnapped by a red-colored team of paintball match participants who
    tie the trio up in their base, thinking that they're trying to take the Stone of Mitrios, a huge kryptonite-like rock
    that decides the winning side. Knowing what's going on, Gabe explains how Chuck Jablowsky, the multi-gazillionaire creator
    of Galaxy of Death, also owns his own game-based paintball-tournament that he holds every Christmas Eve. They manage to
    get untied (With the help of PJ who got free easily thanks to the sunburn ointment) and Gabe decides that they should
    participate in the tournament in order to return to the car. Using his knowledge of the game, Gabe wins the match and
    even meets Jablowsky himself. Out of gratitude for them wearing the same uniforms as his yellow team, Chuck offers the
    trio a free helicopter ride to find Teddy and Amy at a diner that the two had arrived at after biking all night from Las
    Vegas. Hank and Petunia also arrive with Charlie by car, having gone looking for the boys and Hank's car after they didn't
    come back, and the entire family is finally reunited. Petunia even reveals that she found a star-shaped tree topper, which
    Amy lost earlier in the film, that got stuck in Charlie's car seat mechanism. As the family begin their Christmas celebration
    in the diner, Amy admits not only that they finally got the Christmas vacation they wanted, but also that this was the
    best Christmas they've ever had, which helps her and Teddy make up. Amy then announces that she is having another baby,
    much to the excitement of both the Duncans and the Blankenhoopers. In the epilogue, on the way back home to Denver, Colorado,
    Gabe attempts to bring the Stone of Mitrios on the plane ride back, but it is taken away by a flight attendant. Another
    flight attendant then announces the offering of a free plane ticket, which Teddy quickly accepts once again. Amy says
    to Bob, Your turn and Bob obediently goes after Teddy, jokingly promising Amy that they will be back by New Year's Day.
    Amy smiles in response and says that she knows they won't. A short blooper roll follows the epilogue during the end credits.
  - ' In the town of Oakey Oaks, Chicken Little Cluck rings the school bell and warns everyone to run for their lives. This
    sends the whole town into a frenzied panic. Eventually, the Head of the Fire Department calms down enough to ask him what
    is going on. He explains that the sky is falling because a piece of the sky shaped like a stop sign had fallen on his
    head when he was sitting under the big oak tree in the town square; however, he is unable to find the piece. His father,
    Buck Ace Cluck, who was once a high school baseball star, assumes that this piece of sky was just an acorn that had fallen
    off the tree and had hit him on the head, making Chicken Little the laughingstock of the town. A year later, Chicken Little
    has become infamous in the town for being prone to ruin everything accidentally. His only friends are outcasts like himself:
    Abby Mallard (nicknamed Ugly Duckling), Runt (who is a gigantic pig), and Fish Out of Water (who wears a helmet full of
    tap water). Trying to help, Abby encourages Chicken Little to talk to his father, but he only wants to make his dad proud
    of him. He joins his school''s baseball team to recover his reputation and his father''s pride but is made last until
    the ninth inning of the last game. Chicken Little is reluctantly called to bat by the coach (even though the coach is
    sure that he will lose the game for them and urges him not to swing). Chicken Little hits the ball and makes it past first,
    second, and third bases but is met at home plate by the outfielders. He tries sliding onto the home plate but is touched
    by the ball. While it is presumed he lost the game, the umpire brushes away the dust to reveal Chicken Little''s foot
    is barely touching home plate, thus declaring Chicken Little safe and the game won; Chicken Little is hailed as a hero
    for winning the pennant. Later that night back at home, Chicken Little is hit on the head yet again by the same piece
    of the sky — only to find out that it is not a piece of the sky, but rather a panel that blends into the background (which
    would thereby explain why Chicken Little was unable to find it last time). He calls his friends over to help figure out
    what it is. When Fish pushes a button on the back of the hexagon, it flies into the sky, taking Fish with it. It turns
    out to be part of the camouflage of an invisible UFO piloted by two aliens in metallic armor. After Chicken Little, Abby
    and Runt rescue Fish, they discover that the aliens are heading to Earth. The two aliens find and attack the group, chasing
    them through a cornfield. They rush back to the school, where Chicken Little rings the bell to warn everyone, but the
    aliens escape, leaving an orange alien child behind. No one believes the story of the alien invasion and Chicken Little''s
    reputation is thus ruined. The next morning, he and his friends discover the orange alien named Kirby, and a few minutes
    later, a whole fleet of alien ships descend on the town and start what appears to be an invasion. The invasion is actually
    a misunderstanding, as the two aliens are looking for their lost child and attack only out of concern. As the aliens rampage
    throughout Oakey Oaks, vaporizing everything in their path, Chicken Little realizes he must return Kirby to his parents
    to save the planet. First, though, he must confront his father and regain his trust. In the invasion, Buck, now regaining
    his pride and trust in his son, defends him from the aliens until they get vaporized. It is then discovered that the aliens
    weren''t vaporizing people but teleported them aboard the UFO. It turns out the aliens were touring Earth and came across
    the town for its acorns. It also reveals that the alien family''s ship has a broken camo panel that could fall and hit
    someone on the head. After everything is explained, the apologetic aliens return everything to normal, and everyone is
    grateful for Chicken Little''s efforts to save the town. Another year later, Chicken Little, Buck, his friends and the
    citizens of Oakey Oaks watch an in-universe movie depicting an extremely fanciful retelling of the events that transpired,
    portraying Chicken Little as an action hero named Ace.'
- source_sentence: After his owner Alex is murdered, PC, a clever Terrier dog, runs away from home and teams up with Zac,
    a teenage computer expert, to investigate the disappearance of a million dollars that belonged to his late owner, the
    secret of which lies on a floppy disk in their possession. Thanks to a computer program devised by the young man, PC can
    speak with the help of a voice chip. They will be pursued by the criminal Anja, who killed PC's owner and wants all the
    fortune for herself.
  sentences:
  - Alex, a computer programmer from a cold place very far away, receives a visit from an intruder named Anja, but before
    she breaks in; he writes an important message to a colleague, at a greyhound racetrack, named Susie, transfers it to a
    floppy disk and gives it to his dog, PC warning him that he should give it only to Susie and trust no one. He hides PC
    just before Anja breaks in with her vicious dog, Sibelius and threatens him for money. He tells her that the money is
    in the retirement fund, after which she kills him. But later she finds that the money is missing and sees the initials
    SA on the file name which she discovers, in the nearby address book; to stand for Susie Arkwright and starts spying on
    Susie. PC reaches Susie's neighbourhood but gets hit by a car and is taken in by the family of 14-year-old Zac (the film's
    main narrator along with PC) who had recently moved to Sydney from Melbourne with his mother Amy, step-father Stephen
    and his younger sister Binky. Zac thinks the disk is one of his and keeps it. Zac is then introduced to his new neighbour
    Susie, who grew up in Sydney, and her daughter Samantha who moved from London and live next door and they recognise PC.
    Then they learn of Alex's death and PC continues to stay with Zac's family. PC uses Zac's computer to make a translation
    programme that could translate any language or sound into plain English, even his barking. He demonstrates it to Zac who
    gives him a new voice with a Scottish accent and installs the software onto a palmtop computer with a microphone in a
    bow tie so he can talk away from the desktop. Zac's relationship with PC is strained and after a spate of incidents, often
    involving Anja and Sibelius, the dog decides to tell him the truth. PC was originally from Iceland where Alex wrote computer
    programmes and he was married to Anja who was his assistant but she never loved him. Anja stole Alex's programmes and
    made at least a million dollars from them. Alex got heartbroken when he found the money which he withdrew and fled to
    Australia with PC to escape from her but Anja found him somehow. Zac finds the floppy disk which has a clue on where to
    find information on where to find the money. Zac goes with PC and Sammy to Alex's flat and completes the crossword puzzle
    on the computer to see a video of Alex saying A note to follow so followed by a picture of a pea-like object. After singing
    Do-Re-Mi they figure that the password is LAP then they see another video of Alex this time saying Well done. The rest
    is in and under your nose. Bonne Chance. Anja arrives and threatens them with a dagger so Zac deletes the file to stop
    her but she kidnaps PC. Back home Stephen, who Zac had previously seen taking a loan from Anja, agrees to help them and
    they go to the greyhound track where Alex and Susie worked. PC tricks Sibelius into letting him out of the cage but when
    Zac comes to help him he lets out Anja's dog who chases after them. Sammy deciphers the clue but takes LAP in to be the
    French word for rabbit and tells PC who is then catapulted into the commentator's box where he announces that the money
    is in the rabbit. Anja takes this to mean the mechanical rabbit on the track and starts tearing it apart but gets stuck
    and is dragged around the track not finding any money. Binky find's Sammy's Hollywood pin badge, which Alex gave her,
    and asks What's a Hollywood?, and Sammy explains that it is a place in L.A. then they realise that the clue means L.A.
    pin and they find jewelry inside it. The film ends with PC making out with Sammy's dog Cordelia.
  - ' Crosby is cast in a romantic Hawaiian setting as Tony Marvin, a publicity agent for Imperial Pineapple Company. The
    atmosphere is captured from the start with a Hawaiian song over the opening credits with Tony and his friend Shad, with
    pet pig Walford, present at a native wedding ceremony where Tony joins in the song. In the Imperial Pineapple Company
    boardroom, the President, J. P. Todhunter, defends Tony against charges of neglecting his duty, pointing out that it was
    Tony who thought of the idea of the Pineapple Girl contest. The winner of the contest was promised three romantic weeks
    in Hawaii, and her happy impressions are to be syndicated in the press for publicity. Unfortunately, Georgia Smith, the
    girl from Birch Falls who won the Pineapple Girl contest, and her friend Myrtle are bored and intend to return home. The
    prospect of such adverse publicity enrages J. P., who tells Tony that he must do something to stop the girls from leaving.
    To give a little romantic colour, Tony sings Blue Hawaii outside the girls'' bungalow helped by a Hawaiian chorus. When
    Myrtle opens the door, he mistakes her for Georgia and is therefore unaware that it is Georgia he later meets at the dockside.
    While helping to repair the heel of her shoe, he accidentally tips her into the water. Drenched and angry, she, equally
    unaware of his identity, tells how she came to be in Hawaii and says that she could murder the one who got her into the
    whole mess. Shortly afterwards, when she and Myrtle are about to board a ship bound for home, a stranger thrusts a black
    pearl into her hand and asks her to get it through customs. Consequently, they are prevented from leaving and Tony and
    Shad arrive opportunely to offer help. Apparently the pearl is sacred and must be returned to a shrine on a smaller island
    from which it has been stolen; if not, according to a native legend, the volcano will erupt and destroy the village. Kimo,
    a native, says the girls must themselves return the pearl and he takes the four of them in his boat. Tony has arranged
    the whole business to prevent Georgia from returning home; he has also written, in her name, glowing reports for press
    handouts. On the trip across to the island Tony and Georgia sing Blue Hawaii. Meanwhile, J. P. receives a long-distance
    call from Georgia''s fiancé, the dentist Dr. Quimby, who says that he is coming to fetch her. On the island, Georgia offers
    to hand over the pearl but is told to await the arrival of the high priest. While they are detained on the island, Shad
    and Myrtle become well acquainted and enliven the scene with comedy episodes involving Walford the pig. Tony, with Hawaiian
    chorus, sings Sweet Leilani to a little native girl. When the high priest arrives, the pearl is handed over and at a celebration
    ceremony Georgia sings In a Little Hula Heaven, with Tony singing and whistling a few lines. Myrtle sings Okolehao, the
    name for a potent native drink. While the volcano continues to rumble and smoke, the high priest announces that the pearl
    must be fake and arrests Georgia. At Tony''s instigation, the volcano''s activity is manufactured by natives maintaining
    the fire and flames. Tony helps Georgia escape and the four make for the boat. Tony and Georgia sing Sweet Is the Word
    for You. When Georgia returns to her hotel the next day she finds Quimby and her uncle Herman awaiting her, and they explain
    how she has been tricked. Meanwhile, Tony, regretting his actions, has called on J. P. and told him not to publish the
    articles Tony has written. When he calls for Georgia, he tells her they will be married, but she is angry with him and
    says she will return home with Quimby and her uncle. When the three are ready to leave, Quimby is tricked by Shad into
    involvement with the police, which results in Quimby being arrested for assault. However, when Shad tries the same trick
    on Uncle Herman, he is arrested. Tony boards the ship and in the next cabin to Georgia, whistles, Sweet Is the Word for
    You, but she reports him to the purser, and he is put off the ship. Myrtle arrives at the jail with Walford disguised
    as a dog and pays the fine to release Shad. Tony and Georgia are reunited after an old lady hired by Tony to pose as his
    mother visits Georgia aboard ship and persuades her that it is Tony she should marry. Over the closing credits, a chorus
    sings Blue Hawaii and In A Little Hula Heaven.'
  - Distraught after losing his fortune in the 2008 financial crisis, stockbroker Jeffrey Desange murders his colleagues and
    his estranged wife before taking his young daughters, 3-year-old Victoria and 1-year-old Lily, away. Driving dangerously
    fast on a snowy road, Jeffrey gets into a car crash, breaking Victoria's glasses. Surviving the collision, he takes the
    children to an abandoned cabin. Planning to kill his daughters and then himself, he prepares to shoot Victoria but is
    killed by a shadowy figure. Five years later, a rescue party, sponsored by Jeffrey's identical twin brother Lucas, finds
    a now 8-year-old Victoria and 6-year-old Lily in the cabin, alive but in a feral state after years of isolation. The girls
    are put in a welfare clinic under Dr. Gerald Dreyfuss. They refer to Mama, a mysterious maternal protector figure. The
    girls are initially hostile to Lucas but Victoria recognizes him after he gives her a pair of glasses and she can see
    properly. Victoria acclimates quickly to domestic life while Lily retains much of her feral behavior. Lucas is attacked
    by a mysterious entity and put into a coma, leaving Annabel to care for the girls alone. She makes progress with Victoria
    but Lily remains hostile. Alarmed by nightmares of a strange woman and Victoria's warning about Mama, Annabel asks Dreyfuss
    to investigate. Dreyfuss’s research brings to light the story of Edith Brennan, a mentally ill asylum patient who died
    in the 1800s; he recovers a box from a government warehouse containing a baby's remains. Annabel has a dream revealing
    Edith's past; when Edith was sent to the asylum, her child was given to nuns. She escaped and took her baby back, stabbing
    a nun. Fleeing her pursuers, she jumped off a cliff, but before hitting the water below, she and the child made impact
    with a large branch. Edith drowned, but the child's corpse snagged on the branch and did not fall with her. Annabel realizes
    that Edith hadn't realized her child was caught on the tree and doesn't understand why her baby wasn't in the water with
    her. Edith's troubled ghost, Mama, searched the woods for her child for years until she discovered Victoria and Lily and
    took them as surrogates. Lucas regains consciousness after a vision of his dead twin tells him to save his daughters.
    Victoria's growing closeness to Annabel makes her less willing to play with Mama, unlike Lily. Dreyfuss visits the cabin
    and is killed by Mama, who then attacks Annabel and the girls. She also kills their maternal great-aunt Jean and uses
    her body to spirit the children away. Annabel and Lucas find the children on the same cliff where Mama leapt with her
    infant. Annabel, who found Dreyfuss' box of the child's remains, offers them to Mama. Mama recognizes her lost baby and
    her appearance briefly turns human. However, Lily calls out for Mama, causing her to revert to her monstrous form and
    attempt to take the girls. Victoria asks to stay with Annabel instead of leaving with Mama. Mama accepts and she and Lily
    plummet off the cliff. Mama and Lily are briefly shown as spirits happy to be united before hitting the branch and turning
    into a shower of moths. Annabel and Lucas embrace Victoria, who notices a moth landing on her hand, suggesting that Lily
    is still with her in spirit.
- source_sentence: Tom Brand (Kevin Spacey) is a business tycoon who has separated his daughter Rebecca (Malina Weissman)
    and his wife Lara (Jennifer Garner). In a rush to get a last-minute gift for his daughter's birthday, he goes to a mysterious
    pet shop run by Felix Grant (Christopher Walken) and buys a cat. On the way home, Tom is involved in an accident and becomes
    trapped inside the cat's body. Felix tells him that he must reconcile with his family within a week or he will remain
    a cat forever.
  sentences:
  - Aging Greek Theo Tomasis rose from his peasant roots to become a mogul who owns oil tankers, airlines, and Mediterranean
    islands and longs to be elected President of Greece. He eventually falls in love with the considerably younger Liz Cassidy.
    The two first meet when she is visiting his island estate with her husband James, the Senator from the state of Massachusetts.
    Theo immediately is attracted to her and, despite the fact she is happily married, begins to woo her aboard his yacht
    while James converses with the former Prime Minister of the United Kingdom.  Meanwhile, Theo's relationship with his son,
    Nico, is tenuous at best. He encourages Nico to join the business and make money in the same manner he did. Nico wants
    to manage his own affairs and convinces his father to jumpstart his ventures. The plan is to buy older freighters and
    convert them to oil tankers and sell them to the Saudi family. This would allow Saudi oil magnates to control the delivery
    of oil outside of American Corporate controls. Theo is impressed and helps bankroll the purchase of a fleet of boats.  Upon
    their return to the States, the Cassidys begin their run for President of the United States, eventually winning the primary
    and the general election. The First Lady later suffers a miscarriage and becomes depressed and tired of the public life.
    Tomasis, who has a good relationship with the First Family, offers a vacation on his yacht as a change of pace. The President
    does not care for Tomasis due to his shady dealings in the shipping business and Arab oil states, so Lizzie goes by herself,
    much to his anger. In Greece, the yacht is full of guests and celebrities. Tomasis seems to spend a lot of time with Lizzie,
    who is a bit restrained. During a dinner however, Lizzie joins in a traditional sensual dance with plates being thrown
    and the other guests clapping. Lizzie is attracted to Tomasis' free spirit and joie de vivre and leaves the vacation early
    to go back to the states-much to his protests. Back in the US, Lizzie and James walk on the family beach-front property,
    where the President is assassinated by a sharpshooter. After the funeral, Lizzie becomes depressed and stays outside of
    public eyes even though the former President's brother John (the attorney general) requests she help promote his campaign.
    She refuses, and Tomasis, re-invites her to Greece for a longer stay. In Greece, the relationship blooms and Lizzie cheers
    up. Tomasis' business dealings with Nico are becoming scrutinized by American politicians due to the OPEC embargoes and
    anger over oil prices. Freighters are getting confiscated and the investment of hundreds of millions at risk. Upon his
    return from the US, Theo asks Lizzie to marry him. Lizzie wants to but is worried about appearances in her country but
    he outlines the arrangement that is fair and financially attractive enough to abandon the Cassidy family fortune and control.
    After the wedding, there are growing pains for the relationship, as Lizzie is accustomed to being a voice in her husband's
    affairs in the past. After Tomasis berates her for interfering in his business, he apologizes for his Greek chauvinism,
    and they learn to live with each other's cultural differences. The marriage is loving until Niko dies in an accident,
    and Tomasis gets depressed. Lizzie manages to coax him out of his moods, and things appear to look up as his lawyer and
    representative cops him a cheap plea deal on the oil manipulation charges. However, his health declines and a doctor gives
    him a bad prognosis. He holds his medical information secret as his energy and health declines. When Liz wants to shop
    in Paris, he encourages her to go alone and enjoy herself.  She leaves the boat on her vacation, waving, and Tomasis visits
    his old peasant home on the coast for the last time visiting his old haunts and ending with traditional Greek dance.
  - 'Tom Brand is a major business tycoon in New York City whose workaholic attitude ruined his first marriage with Madison,
    and his adult son David now works for him and strives for his approval. Tom and David now live with their second wife
    and stepmother Lara, who is a little more tolerant of the fact that Tom is never at home, and their daughter and half-sister
    Rebecca. Tom’s eponymous company FireBrand is nearing completion on its greatest achievement to date: the tallest skyscraper
    in the northern hemisphere that will be the new headquarters. In the opening scene, he skydives out of a plane and lands
    on the top of the new skyscraper, while David remains in the plane, refusing to jump. Rebecca''s 11th birthday comes up
    and she has always wanted a cat, but Tom has always refused as he hates cats. Not wanting to disappoint her, he rushes
    to get a last-minute present for his daughter''s birthday, but as he is distracted, the GPS redirects him to a mysterious
    pet store called Purrkins Pet Shop, brimming with odd and exotic cats. The store''s eccentric owner Felix Perkins tells
    him he does not pick the cat, the cat picks him. The tomcat that picks him is called Mr. Fuzzypants, who, Perkins says,
    has used up seven of his nine lives. Tom buys the cat. On his way home for the party, Tom meets with Ian Cox, one of the
    top managers of the company in charge of the new building, and learns that another building in Chicago will be taller.
    They have an argument while on the roof that ends with Tom firing Ian, but lightning strikes the antenna. Tom is blown
    off the building along with the cat, and without any effort from Ian to save him, he plummets off the side of the skyscraper,
    but his leg gets snagged on some stray equipment and gets flung back inside through a window as he passes out. When he
    wakes up, he realizes that his human body is in the hospital in a state of coma, and his consciousness is trapped inside
    the cat''s body. Tom is visited by Felix, who is able to talk to him and knows what happened. Felix warns Tom to reevaluate
    his priorities, connect with his family, and avoid past mistakes within one week or else remain as a cat forever. When
    Lara and Rebecca take Mr. Fuzzypants home, he acts in an odd and stubborn way to try to convince his wife and daughter
    that he is actually Tom. This only drives them mad and he slowly comes to see how much he has ignored his family. He suspects
    that Lara is cheating on him with model Josh Myers and they had been looking at houses together as a prelude to divorcing
    him. This motivates him to try to make her happy. He also learns that Ian is trying to make the company public with the
    help of the board of directors to take power from Tom, even though David is trying to stop him. Ian fires David from the
    company and plans to announce that the company will be sold at the party for the new tower opening. Eventually, Rebecca
    realizes that Mr. Fuzzypants is really her father. Meanwhile, Tom''s body is in crisis at the hospital and Lara, David,
    and Rebecca all go there. Rebecca has the cat hidden in her backpack. In a moment alone, David apologizes to Tom for failing
    to save the company and takes Tom''s ID badge, implying he will commit suicide at the tower. At the hospital, Lara and
    Dr. Cole plan for Lara to sign a DNR, which is a legal form, indicating that if Tom''s heart stops beating, they won''t
    save him. Rebecca calls to the cat to come prove he is really Tom, but Tom remembers what Felix said about love being
    sacrifice and decides to save David instead, sacrificing his only chance at regaining his humanity. At the tower, David
    jumps off the building and the cat jumps after him pulling a cable. It is then revealed that David is wearing a BASE jumping
    parachute. He lands in the middle of the party, presents the articles of incorporation of the company, and announces that
    he now controls his father''s 51% of the stock. He says the company will remain a family company and fires Ian. Although
    the cat is not seen landing, Tom wakes up from his coma just in time to see David''s announcement on the television. Meanwhile,
    Ian passes Felix who tells him to hang up his cell phone. Ian ignores him, but is then hit by a car, and his consciousness
    transfers into a cat that Felix takes back to his shop. Tom and Rebecca return to Felix where Tom asks if he has any dogs.
    Felix says he does not, but presents Mr. Fuzzypants, who has one life left.'
  - When film star Megan Valentine (Jessica Simpson) suddenly finds herself broke and humiliated in the public eye, she wanders
    from the wreckage of a car accident and witlessly enlists in the United States Army, hoping that it will change her life.
    The spoiled actress immediately finds herself at odds with her tough drill sergeants and the harsh discipline of army
    life, leading to many humorous situations. In the end, Valentine changes and becomes a better person and wins the respect
    of her fellow trainees, and they all graduate together. She also recovers her house and the money that she lost.
