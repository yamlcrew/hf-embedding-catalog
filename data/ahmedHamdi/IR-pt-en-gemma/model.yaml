      Saverio immediately seems comfortable, while Mario does not want to settle down; Soon, however, during a religious function,
      Mario makes the acquaintance of Pia, a girl of a rich family, with whom he begins to see himself looking out from the
      surrounding wall of her house. In the meantime, Vitellozzo is arrested and Saverio and Mario write a letter to Girolamo
      Savonarola in vain to obtain his liberation. Saverio (who continues to tell Mario to ask Pia if he has an friend to
      introduce him) does not hide a certain annoyance for the meetings between Mario and the young Pia and complains that
      he always remains and only him to work in the butcher shop. Driven by his political-intellectual ardor, he convinces
      his friend to travel to Spain, in order to reach Christopher Columbus and dissuade him from leaving for the Indies and
      discovering America, so that, in the future, his sister cannot meet the American boy who left her. In an unspecified
      place the two come across a beautiful Amazon, Astriaha, which intimidates them by throwing an arrow against their wagon.
      At this point the story differs depending on the version, standard or extended.
