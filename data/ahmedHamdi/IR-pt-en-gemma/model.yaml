      The next morning as soon as they wake up they see, having fun, the guest urinating from the window, but their laughter
      are immediately truncated by the hiss of a spear that kills him. Mario and Saverio see fonding people in the black cloak
      on horseback, rush to the ground floor and find other people, dressed in a very strange way. Increducts make themselves
