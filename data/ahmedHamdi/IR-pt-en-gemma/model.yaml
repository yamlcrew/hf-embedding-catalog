- source_sentence: 'In the Victorian era, the eminent Doctor Sir Colenso Ridgeon announces that he has created an effective
    serum against the deadly tuberculosis, and his doctor friends go to his house to honor him. After the celebration, Colenso''s
    maid announces that a woman, Jennifer Dubedat, is seeking him out because her husband, the young artist Louis, suffers
    from the disease. The doctor initially refuses to treat her, but eventually succumbs to Jennifer''s charm and agrees to
    include Louis in his small group of patients. But when they meet Louis, the doctors discover that he is a swindler and
    bigamist, deceiving Jennifer. Then the humble doctor, Dr. Blenkinsop, who has no notoriety and successfully treats his
    poor patients with natural remedies, tells Colenso that he too is tubercular. The doctor then faces a dilemma: since he
    can no longer accept patients, he is unsure whether it is Louis, whom he detests, or his old friend Dr. Blenkinsop.'
  sentences:
  - In London in 1906, some colleagues rush round to the Harley Street house of the unmarried Dr. Ridgeon to congratulate
    him on being awarded a knighthood for his claim that he can cure tuberculosis (though in reality at that time there was
    no certain cure). Among them is Dr. Blenkinsop, who was at medical school with him, but now looks after poor patients
    who cannot afford to pay much, and is himself infected with tuberculosis. Waiting in his hall is the young and lovely
    Jennifer Dubedat who, having heard of his alleged cure, wants him to treat her husband Louis, a penniless artist. Struck
    by the beauty and charm of Jennifer, and by the quality of her husband's drawings which she shows him, he lets her believe
    he will try to save Louis, but stresses that his treatment is long and expensive, and that he can only handle ten patients
    at a time. So that he can meet Louis, and see more of Jennifer, he invites the two to a celebration dinner he is hosting
    that night. While Louis is like his wife good-looking and charming, it emerges that he scorns all trappings of conventional
    morality, being a feckless liar, thief and seducer (a waitress recognises him as her vanished husband). Now highly doubtful
    about Louis, Ridgeon arranges with colleagues to visit the studio where he lives and assess his case. Recognising that
    his TB is far advanced, Ridgeon passes him on to a colleague and decides to take Blenkinsop instead. To Jennifer this
    is treachery and she begins to hate Ridgeon, while he hopes that he might marry her as soon as she is a widow. Beyond
    cure, Louis soon dies and in a moving last speech states his belief that love and beauty surpass all of conventional morality.
    He also begs Jennifer not to mourn, but to marry again and be happy. In a postscript, Ridgeon attends the one-man exhibition
    of Louis' works, which are selling well. Jennifer refuses to let him buy a painting and leaves with her new husband.
  - In 1914, young Sara Crewe lives in India with her widower father, Captain Richard Crewe, a wealthy British Army Officer,
    sharing his love for stories of myths and magic. Called to serve in the Great War, Richard enrolls her at an all-girls'
    boarding school in New York City, which her late mother had attended. Run by the haughty headmistress, Miss Maria Minchin,
    and her kindly sister, Amelia. Instructing Miss Minchin to spare no expense for his daughter's comfort, Richard furnishes
    the school's largest suite and leaves Sara with her mother's locket and a doll he names Emily, which he tells her will
    keep them connected through magic. Although stifled by Miss Minchin's strictness, Sara becomes popular among the girls,
    including the scullery maid, Becky, for her kindness and powerful imagination. Sara writes to her father, who is caught
    in a gas attack while trying to save a fellow soldier in the trenches. Miss Minchin throws Sara a lavish birthday party,
    hoping to extort more money from her father, but his solicitor arrives with news that Richard has been killed in battle;
    the British government has seized his assets, leaving Sara penniless. Miss Minchin moves Sara to the attic with Becky
    to work as a servant and confiscates her belongings, including the locket, allowing her to keep only Emily and a book.
    Though her life is bleak, Sara remains kind to others, but gets her revenge on the school bully, Lavinia. Charles Randolph,
    the school's elderly neighbor, receives word that his son John has been declared missing in action while fighting in Europe.
    Ram Dass, Mr. Randolph's Indian associate, comes to notice Sara from the neighboring attic, overhearing her imaginative
    stories. When a wounded soldier suffering from amnesia is misidentified as John, Ram Dass encourages Mr. Randolph to take
    the man in. Sara's friends sneak into Miss Minchin's office and recover her locket, visiting her that night to hear her
    tales of Prince Rama. They are caught by Miss Minchin, who punishes Sara and Becky with a day without meals and keeping
    Becky locked in her room for the entire day, but Sara stands up to her cruelty with her father's belief that all girls
    are princesses no matter their lot in life. Sara comforts Becky by imagining a feast and fine clothes for them, and they
    awaken to find the dream has come true, with their attic secretly transformed by Ram Dass. Inspired by Sara, Amelia runs
    away with the milkman, and Miss Minchin discovers the locket is missing. Confronting Sara in the attic, Miss Minchin accuses
    her of stealing the finery left by Ram Dass and she locks Sara in her room while she summons the police. With Becky's
    help, Sara narrowly escapes by making the perilous climb over to the Randolph house. As Miss Minchin and the police search
    the house, Sara discovers the recovering soldier is none other than her father, but Richard does not recognize her. Though
    Miss Minchin does clearly recognize Captain Crewe, she deliberately chooses revenge over the truth by spitefully saying
    that Sara has no father. As Sara is dragged away by the police screaming for her father, Ram Dass helps Richard regain
    his memory. Outside Richard saves Sara and the two are happily reunited while Miss Minchin angrily walks away, finally
    accepting defeat. Sometime later, Mr. Randolph has taken over the school, now a much happier place for the girls, and
    has found peace in knowing that Richard tried to save his son. Richard's fortune has been restored and he has adopted
    Becky. As punishment for her vile treatment to the girls and other crimes, Miss Minchin is reduced to working for a young
    chimney sweep she mistreated earlier. Sara gives Emily to the girls and shares an unexpected hug with Lavinia, before
    she and Becky depart for home.
  - 'In the far future, three humans—Jirou, Hal, and Maria—discover that an alien race called the Pasateli intends to conquer
    humankind with the mysterious Cleopatra Plan. Using a time machine, the three transport their minds into the bodies of
    members of the historical Cleopatra''s court to discover and stop the plan. Hal, however, vows to use the opportunity
    to secure the title of the greatest lover who ever lived by having sex with Cleopatra. In the middle of the Roman conquest
    of Egypt, a group of Egyptians secretly plotted a rebellion to overthrow Julius Caesar. The group plans to send Cleopatra
    to seduce and murder Caesar. The Romans discovered the group and attacked them. Cleopatra escapes, along with her handmaidens
    Libya and Apollodoria. Cleopatra goes to an ancient priestess, who magically grants her an irresistibly seductive body
    for her mission. It is at this point when Jirou, Hal, and Maria arrive: Maria is now Libya; Hal finds himself in the body
    of the priestess'' pet leopard Rupa, thwarting his plans to seduce Cleopatra; and Jirou finds himself in the body of Ionius,
    a Greek man captured and enslaved by the Romans. Ionius frees himself and the other slaves by using his knowledge of future
    technology to make modern hand grenades. They accompany Cleopatra to meet Caesar, who is so overcome by her beauty that
    he makes her queen of Egypt. Caesar recaptures Ionius and, amused by his fighting skills, orders him to fight in the gladiatorial
    arena. He gives Ionius a modern-day handgun to ensure his victory. Ionius proves so popular with the Roman public that
    Caesar''s own popularity soars, leading his senators to conspire to murder both him and Ionius to end their influence.
    Libya and Apollodoria insist Cleopatra must murder Caesar; Cleopatra, however, has had a change of heart and keeps putting
    off the assassination in favor of sex. They accompany Caesar back to Rome, just in time for him to be assassinated by
    his own senators. Caesar''s adopted son, Octavian—soon to be called Augustus—takes command. Cleopatra tries to continue
    the plan by seducing Octavian, only to learn that he is homosexual and impervious to her charms. Meanwhile, Caesar''s
    right-hand man, Marcus Antonius or Anthony, falls in love and has sex with Cleopatra. Octavian, on the other hand, is
    attracted to Ionius and spares his life. Finally, during the Battle of Actium where Octavian''s fleet defeats Anthony''s
    Egyptian fleet, Anthony kills himself. Octavian goes to Cleopatra to persuade her to surrender and is taken into custody
    by the Romans. Distraught and disappointed by the rejection after Anthony''s death, Cleopatra commits suicide using an
    asp''s venomous bite. The time travelers return to the future and report that the Cleopatra Plan is a scheme by the Pasateli
    to assume the form of beautiful human women to seduce and destroy Earth''s most powerful male leaders. The Pasateli have
    already taken their human forms and are poised to strike when this information arrives, but Earth is able to root them
    out and save the world in time.'
- source_sentence: Ferdinando Esposito (Totò) is a small-time swindler who tries to support his family by any means possible.
    With his accomplice, Amilcare (Aldo Giuffrè), he pretends to have found an ancient coin in the Roman Forum and deceives
    an American tourist. Mr. Locuzzo, by chance, is the president of an American charity committee and, during the distribution
    of aid, in which Esposito also finds himself, recognizes him and denounces him. He is pursued by the overweight police
    officer Lorenzo Bottoni (Aldo Fabrizi), who lets Esposito escape and is suspended from his duties, risking losing his
    job due to Mr. Locuzzo's protests. Dressed in civilian clothes, after hiding his situation from his family, Bottoni goes
    in search of Esposito, meets the family, but there is no trace of the delinquent. Gradually the two families become friends
    and a great sympathy develops between the brother of the thief's wife and the policeman's daughter. One day, when both
    families meet for lunch..." Esposito appears. Bottoni makes the arrest outside the house, and is reprimanded by Esposito
    for using his family; the guard then tells him about his problem. A great complicity develops between the two, both united
    in a miserable existence. Now it is Esposito who wants to be arrested and Bottoni who hesitates. They hide the truth from
    their families and leave as friends, saying that Esposito is going on a business trip and Bottoni will accompany him to
    the station. In Esposito's absence, Bottoni will be the one to take care of his family.
