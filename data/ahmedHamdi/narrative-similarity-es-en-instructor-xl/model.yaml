  - source_sentence: 'Represent the plot: The film opens around 2008 (with the news of the Islamabad Marriott Hotel bombing
      breaking) with an elderly Mrs. Thatcher (Meryl Streep) buying milk, unrecognized by other customers, and walking home
      alone. Over the course of three days, we witness her struggle with dementia and the malnutrition that accompanies old
      age, as she reflects on pivotal moments in her personal and professional life, remembering her husband, Denis Thatcher
      (Jim Broadbent). She struggles to distinguish between the past and the present. A recurring theme throughout the film
      is the personal price Thatcher has paid for power. Denis is portrayed as somewhat ambivalent about his wife''s rise
      to power, their son Mark lives in South Africa and has little contact with his mother, and it is implied that Thatcher''s
      relationship with her daughter Carol (Olivia Colman) is sometimes strained. In a flashback, we see Thatcher''s youth,
      working in her family''s grocery store in Grantham, listening to her father''s political speeches—whom she idolized—and
      it''s implied that she had a poor relationship with her mother—a housewife—and announces that she has been accepted
      to Oxford University. She recalls her struggle, as a young woman from a lower-middle-class background, to break into
      the male-dominated Conservative Party and secure a seat in the House of Commons, as well as the marriage proposal from
      businessman Denis Thatcher. We see her struggle to fit in as a Member of Parliament and as Education Secretary in Edward
      Heath''s (John Sessions) cabinet. We also see her friendship with Airey Neave (later assassinated by the Irish National
      Liberation Army), her decision to run for the Conservative Party leadership, and her subsequent vocal training and image
      makeover. Other flashbacks examine historical events during his tenure as Prime Minister of the United Kingdom, including
      the rise in unemployment resulting from his monetarist policies and the tight 1981 budget (as well as the misgivings
      of some members of his cabinet—Ian Gilmour, Francis Pym, Michael Heseltine, and Jim Prior), the 1981 Brixton Riots,
      the 1984–1985 miners'' strike, and the Grand Hotel bombing during the Conservative Party Conference in 1984. His decision
      to seize the Falkland Islands after their previous occupation by Argentina is also depicted, along with the sinking
      of the ARA General Belgrano and the subsequent British victory in the Falklands War. Her friendship with Ronald Reagan
      and her consolidation as a global figure and the country''s economic boom in the late 1980s marked a turning point.
      By 1990, Thatcher appeared arrogant and aging, aggressively railing against her cabinet and refusing to accept that
      the poll tax was unfair and contrary to European integration. Minister Geoffrey Howe resigned after being humiliated
      by her in a cabinet meeting, and Michael Heseltine challenged her for control of the party leadership. The loss of support
      from her cabinet colleagues left her no choice but to resign as Prime Minister, a decision she still seemed angry and
      bitter about twenty years later. Finally, Thatcher was seen packing her late husband''s belongings and telling him it
      was time for him to go. Denis''s ghost abandoned his clothes, without shoes—despite his cries that he wasn''t ready
      to lose her yet—and she was left alone, washing a teacup.'
    sentences:
    - 'Represent the plot: In Lowell, Massachusetts around Christmas 2018, widowed mother Claire Pierce struggles to keep
      her family together after they had a fight because of the death of her firefighter husband Doug, who died while trying
      to save some strangers from a fire. Claire''s son Teddy has lost his Christmas spirit and becomes involved in illegal
      activities like stealing cars. However, Teddy''s younger sister, Kate, is trying to keep the Christmas spirit alive,
      while maintaining a belief in Santa Claus. Kate catches Teddy stealing a car from a parking lot and records it, threatening
      to show Claire, but changes her mind, telling Claire that Teddy had smashed a picture frame instead. On Christmas Eve,
      Claire is called away to fill in for a coworker, leaving Teddy to look after Kate. While watching old family Christmas
      videos, Kate notices a strange arm appear out of the fireplace. Kate believes this is Santa and convinces Teddy to help
      her by promising to destroy the tape of Teddy stealing the car. The two set up a makeshift tripwire and a hidden camera.
      Kate is later woken up and sees Santa in the living room. However, he escapes to the roof and the two children follow.
      Kate decides to hide in his sleigh to get a closer look, and Teddy reluctantly follows her. Santa rides off with the
      kids in tow. When Kate decides to make her presence known, Santa and the reindeer are startled and he loses control
      of the sleigh. After teleporting to Chicago, Illinois, the sleigh breaks down, causing the reindeer to scatter and Santa''s
      hat and a bag of presents to be lost. Santa introduces himself to the kids and tells them that he has to get back to
      delivering presents as soon as possible or else Christmas spirit will be lost. Without his hat, Santa cannot move quickly
      or through tight spaces like he normally does. The kids are forced to help him after he threatens to put them on the
      naughty list permanently. They stop at a bar where Santa tries to seek help from the patrons. When they get no assistance,
      they steal a car at Teddy''s suggestion, after he reminds Santa that the car was already stolen by the bartender and
      they can turn it into the police afterwards. They locate the reindeer, but encounter a police car driven by police officers
      Dave Poveda and Mikey Jameson, who are looking for the stolen car. Kate goes after the reindeer by herself while Teddy
      and Santa lure the police away. Santa is arrested, while Kate and Teddy escape with the reindeer. The kids find Santa''s
      bag, and Kate goes inside to find help. She is teleported to the North Pole where she encounters Santa''s elves, who
      agree to help her. Meanwhile, Teddy is attacked by Vincent and his gang of thugs who take him and the bag to their hideout,
      where he is saved by Kate and the elves, who then set out to repair Santa''s sleigh. At the police station, Santa tries
      to explain his situation to Officer Poveda. When Santa reveals that the officer''s wish this year is to reconcile with
      his ex-wife, Lisa, who also shares that wish, Poveda is taken aback, but still refuses to believe him. Poveda has Santa
      locked in the holding cell, though he becomes suspicious when he sees a larger number of arrests than usual on Christmas
      Eve. Seeing that Christmas spirit has gotten too low, Santa gathers all the inmates to perform Santa Claus Is Back in
      Town, which works among all the officers except Poveda. Poveda is finally convinced when he receives a call from Lisa,
      who invites him out for coffee in the morning, and agrees to let Santa go. One of the elves arrives through the air
      vent to give Santa a spare hat. Santa goes outside to find his sleigh repaired. Santa sees that he only has an hour
      until morning to complete delivering presents, so the kids agree to help him. With Kate tossing him presents and Teddy
      driving the sleigh, Santa is able to deliver all of the presents, saving Christmas. Afterwards, he drops the kids off
      back at their home before their mother returns. The siblings ask Santa if they’ll ever see him again, and Santa says
      not if he can help it but will if he ever needs help in future. Santa gives Teddy his hat as a memento, showing that
      he did not really need it.  When Claire returns, they go inside to find that the living room has been decorated like
      their father used to do it. When the kids open their gifts from Santa on Christmas morning, Kate gets the skateboard
      she asked for, while Teddy gets a magic ornament. When Teddy hangs it on the tree, he sees his dad magically appear
      in his reflection, and they both express pride in each other. Back in the North Pole, Santa reunites with Mrs. Claus,
      who has come home. She asks what movie they are going to watch, and Santa takes out the video Kate took of the entire  adventure
      with a smile.'
    - 'Represent the plot: The story begins with Thatcher in the present, then in a series of flashbacks, the audience is
      presented with a young Margaret Roberts working at the family grocer''s shop in Grantham, listening to the political
      speeches of her father, whom she idolised it is also hinted that she had a poor relationship with her mother, a housewife.  We
      learn she has won a place at Oxford University, revealing her struggle, as a young lower-middle-class woman, attempting
      to break into a snobbish male-dominated Conservative Party and find a seat in the House of Commons, along with businessman
      Denis Thatcher''s marriage proposal to her. Her struggles to fit in as a Lady Member of the House, and as Education
      Secretary in Edward Heath''s Cabinet are also shown, as are her friendship with Airey Neave, her decision to stand for
      Leader of the Conservative Party, her eventual victory, including her voice coaching and image change. Further flashbacks
      examine historical events during her time as Prime Minister, after winning the 1979 general election, including the
      rising unemployment related to her monetarist policies and the tight 1981 budget (over the misgivings of wet members
      of her Cabinet – Ian Gilmour, Francis Pym, Michael Heseltine, and Jim Prior), the 1981 Brixton riot, the 1984–1985 UK
      miners'' strike, and the bombing in Brighton of the Grand Hotel during the 1984 Conservative Party Conference, when
      she and her husband were almost killed. Also shown, slightly out of chronological sequence, is her decision to retake
      the Falkland Islands following the islands'' invasion by Argentina in 1982, the sinking of the ARA General Belgrano
      and Britain''s subsequent victory in the Falklands War, her friendship with U.S. President Ronald Reagan and emergence
      as a world figure, and the economic boom of the late 1980s. By 1990, Thatcher is shown as an imperious but aging figure,
      ranting aggressively at her cabinet, refusing to accept that the Poll Tax is unjust, even while it is causing riots,
      and fiercely opposed to European integration. Her deputy, Geoffrey Howe, resigns after being humiliated by her in a
      cabinet meeting, Heseltine challenges her for the party leadership, and her loss of support from her cabinet colleagues
      leaves her little choice but to resign as Prime Minister after eleven years in office. A teary-eyed Thatcher exits 10
      Downing Street for the last time as Prime Minister with Denis comforting her. She is shown as still disheartened about
      it almost twenty years later. Eventually, Thatcher is shown packing up her late husband''s belongings, and telling him
      it''s time for him to go. Denis'' ghost leaves her as she cries that she actually is not yet ready to lose him, to which
      he replies You''re going to be fine on your own... you always have been before leaving forever. Having finally overcome
      her grief, she contentedly washes a teacup alone in her kitchen.'
    - 'Represent the plot: Haunted by her long suppressed past and pressured by family to seek treatment from mystical healers
      for her infertility, a Kosovar woman struggles to reconcile the expectations of motherhood with a legacy of wartime
      brutality.'
  - source_sentence: 'Represent the plot: Gypsy Vale (Sara Rue), 25, and Clive Webb (Kett Turton), 18, are two goths living
      in Sandusky, Ohio. Gypsy''s parents, Ray (John Doe) and Velvet (Marlene Wallace), were once in a band together, so Gypsy
      aspires to become a famous singer, like her idol, Stevie Nicks. She decides to embark on a road trip with Clive to attend
      a festival in her honor in New York City.'
    sentences:
    - 'Represent the plot: Ryan Bingham works for an American human resources consultancy firm specializing in employment-termination
      assistance. His work constantly takes him around the country, conducting company layoffs on behalf of employers. Ryan
      also gives motivational speeches, using the analogy, What''s in Your Backpack? to extol living free of burdensome relationships
      and material possessions. A frequent flyer, Ryan aspires to earn ten million frequent flyer miles with American Airlines.
      While traveling, Ryan meets a woman named Alex, a professional who also flies frequently. They begin a casual relationship,
      meeting up in various cities as their respective schedules allow. Ryan is recalled to his company''s offices in Omaha,
      Nebraska. Natalie Keener, a young, ambitious new hire, promotes cutting costs by conducting layoffs via video-conferencing.
      Ryan raises concerns that the new system is impersonal and undignified, and argues that Natalie lacks understanding
      about the firing process and how to handle emotionally vulnerable people. Ryan''s boss, Craig Gregory, has Natalie accompany
      a reluctant Ryan on his next round of terminations to observe the process. Ryan tutors Natalie on traveling more efficiently
      using smaller luggage and moving quickly through airport security. As they travel together, Natalie challenges Ryan''s
      philosophies on life, particularly regarding relationships and love, but Ryan defends his lifestyle. During the trip,
      Natalie''s boyfriend unceremoniously dumps her by text message. Ryan and Alex comfort the shattered Natalie. On a video
      termination test run, Ryan''s earlier concerns prove valid; when one laid-off person breaks down on camera, Natalie
      is unable to properly console him and another employee threatens suicide. Natalie castigates Ryan for his inability
      to commit to Alex, despite their obvious compatibility; Ryan dismisses her criticisms and chastises her for lacking
      empathy and never appreciating her surroundings. Before returning home, Ryan, taking Alex along, heads to Wisconsin
      for his sister Julie''s wedding. He has a strained reunion with his semi-estranged family who resent his absence. When
      Jim, the groom, gets cold feet just prior to the ceremony, Ryan''s older sister, Kara, asks Ryan to intervene. Although
      counter to his personal philosophy, Ryan uses his motivational skills to persuade Jim to proceed with the wedding. Ryan
      begins questioning his lifestyle and philosophies, and doubts what he lectures others about. In Las Vegas for a prestigious
      speaking engagement, Ryan abruptly walks offstage mid-presentation and impulsively flies to Chicago to see Alex. Arriving
      at her front door, he is stunned to discover that she is married and has children. She later phones, chastising him
      for nearly wrecking her marriage, and says her family is her real life; he is merely an escape. On Ryan''s flight home,
      the crew announces that he has just crossed the ten million mile mark. American Airlines'' chief pilot is aboard to
      personally congratulate Ryan and notes he is the youngest person to achieve the milestone. When asked where he is from,
      Ryan, realizing he has no real home, simply says, here. Back in Omaha, Ryan transfers a million frequent flyer miles
      to Julie and Jim so they can have a honeymoon. Craig informs Ryan that a laid-off employee has committed suicide (the
      same one who had threatened to do so earlier). Natalie, upset over the news, quits via text message. The remote-layoff
      program is stopped, and Ryan is sent back on the road. Natalie applies to the same San Francisco company where she had
      previously declined a position, having followed her now ex-boyfriend to Omaha. Impressed by her qualifications and Ryan''s
      glowing written recommendation, the interviewer hires her. The film concludes with Ryan at the airport, standing in
      front of a vast destination board, contemplating where he should travel next (something Natalie encouraged him to do
      earlier).  Looking up, he lets go of his luggage.'
    - 'Represent the plot:  High school senior Carson Phillips is struck dead by lightning. The film is a flashback of his
      last months. He plans to go to Northwestern University to become an editor for The New Yorker, but hasn''t  made his
      dreams happen. During a writer''s club meeting, Malerie Baggs asks Carson for advice about her writing. He says she
      cannot find the ideas, the ideas have to find her. He goes to a student council meeting run by head cheerleader Claire
      Matthews, where everyone ignores him because of his criticism. As Carson''s mother Sheryl is picking up prescriptions,
      she chats with the new pharmacist April Adams, who is pregnant and Carson''s future step mother. Carson also visits
      his grandmother, but she doesn''t recognise him due to Alzheimer''s. As Carson is finishing up the school paper at night,
      he catches wealthy student Nicholas Forbes and the drama club president Scott Thomas kissing. Nicholas begs him to not
      out him. Carson agrees provided they contribute to the paper until graduation. Carson''s father Neal and April visit
      a lawyer to straighten out legal issues. April, unaware of Carson or Sheryl, storms out when she learns Neal is still
      legally married and has a child. Carson''s guidance counselor suggests he improve his chances of getting into Northwestern
      by submitting to a literary magazine. He gets permission to start one from the principal. Announcing at school assembly
      that all entries will be taken, Carson later finds the submission box filled with nothing useful. When Malerie believes
      others will join as Carson got Scott and Nicholas to write for the school paper, he tells her about the blackmail. She
      reveals that she caught Claire having sex with Coach Walker, her boyfriend''s brother. Malerie suspects everyone in
      their school probably has an embarrassing secret that they would not want exposed. Sheryl meets April filling a prescription.
      April recognizes Carson''s name on the anti-depressant prescription. She goes home to Neal and demands to meet his son.
      The writer''s club float has to be removed from the homecoming parade, after the cheerleaders take their assigned car.
      Feeling humiliated, Carson and Malerie blackmail several of their peers into writing for the literary magazine: school
      paper members, the yearbook president, Vicki, and faux foreign exchange student, Emilio. During a meeting with the other
      students and Coach Walker, Carson extorts agreements that everyone must offer something to put in the magazine to keep
      their secrets safe. Carson has Claire and Coach Walker get each cheerleader and football player to submit something,
      to make the issue more popular among the student body. After school, Neal calls Carson, telling him about April and
      the baby and invites him to dinner. Over the meal, Carson lets her realise his father is concealing his abandonment,
      which leads to an argument. At a student council meeting with the principal, Carson''s outburst against a clothing logo
      ban leads to withdrawal of all students'' off-campus privileges. During another encounter, Sheryl tells April that she
      gave Neal everything, and was left with nothing. She says that she was just like April and had a child to keep him,
      but it didn''t work. Carson completes the literary magazine, but it fails. Although he was accepted into Northwestern,
      as he never confirmed his admission he lost his spot. Carson assumes his letter was lost in the mail, but Sheryl admits
      she threw his acceptance letter away to protect him as his dreams will never come true. While Carson and Malerie pack
      up the unread literary magazines, he asks her why she films everything. She explains she believes the present is the
      most important, not the past. As Malerie is leaving, she asks Carson if they are friends. He says they are best friends.
      Carson writes his own story, explaining how he realized, despite everything he went through, he did get other students
      to write for the literary magazine. Now truly happy he leaves, going outside as thunder starts. Carson''s body isn''t
      found for three days. At the funeral many, including the principal and the students who hated him, show Carson left
      an impression on everyone he knew. Malerie takes over as president of the writers'' club, while Sheryl visits her mother
      in assisted care.'
    - 'Represent the plot: 25 year old Gypsy Vale (Sara Rue) and 18 year old Clive Webb (Kett Turton) are two goths living
      in Sandusky, Ohio. Gypsy''s parents, Ray (John Doe) and Velvet (Marlene Wallace), once were in a band together, and
      Gypsy now aspires to be a famous singer, like her idol, Stevie Nicks. She is hesitant, because of the disappearance
      of her mother, to leave her father alone in Sandusky to pursue her dreams. While checking updates on a Stevie Nicks
      fansite, Clive discovers the Night of a Thousand Stevies event in New York. After a long and heated discussion with
      Gypsy, her father reveals that her mother didn''t just disappear, or die: she left to follow her dream of becoming a
      famous singer. Despite this, Clive finally convinces Gypsy to go to New York. Along the way, Gypsy and Clive encounter
      a diverse host of characters and obstacles. They pick up a hitchhiker named Zechariah, who claims he is running away
      from the Amish life. Together, the three decide to stop and spend the night at a rest stop. While there, Clive expresses
      his attraction for Zechariah, but Zechariah says that he''s attracted to Gypsy. Clive is embarrassed and runs away.
      Gypsy is surprised and flattered and as a result, she and Zechariah end up sleeping together. Afterward, Zechariah says
      that he''s made a mistake and needs to return home. Enraged, Gypsy throws him out of the bathroom where she is staying
      at the rest stop. Meanwhile, Clive is accosted in secret by Troy, who is also spending the night at the rest stop with
      his fraternity brothers, and the two have a sexual encounter. The next morning, while Gypsy and Clive are trying to
      console each other and make sense out of the events of the previous night, the two are egged and mocked by the fraternity
      brothers as they leave the rest area while Troy sits silently. They miss the auditions for the Night of a Thousand Stevies,
      and Gypsy learns that her mother committed suicide four years earlier. The sympathetic Mistress of Ceremonies, also
      her mother''s best friend when she was in New York, allows Gypsy to perform a song she wrote for her mother at the end
      of the show. In the end, Gypsy stays in New York to pursue her musical aspirations like her mother, and Clive returns
      to Sandusky to finish high school but plans to come back to New York after he graduates.'
  - source_sentence: 'Represent the plot: A former high school sweetheart couple reunites in their hometown, where they rediscover
      their connection and confront old resentments.'
    sentences:
    - 'Represent the plot: Military contractor Brian Gilcrest returns to Hawaii accompanying billionaire entrepreneur Carson
      Welch, who intends to develop local land into a space center. Following a celebrated military career that ended in shadowy
      deals in Afghanistan, the now-disillusioned Gilcrest has to negotiate a deal with the Native Hawaiians and support Carson''s
      launch of a privately funded satellite. His mission is complicated by his former girlfriend Tracy, now married with
      two children, and his idealistic Air Force liaison, Captain Allison Ng, whose wide-eyed fascination with space reminds
      him of his own childhood. Gilcrest and Ng meet King Dennis Bumpy Kanahele at his isolated community, asking for him
      to participate in a blessing ceremony that will allow Welch to build his center. Having unsuccessfully attempted to
      probe Gilcrest''s background, Ng, who is of partial Hawaiian background, connects with the king and his companions,
      as she shares their spiritual view of the land and sky. Eventually, with her assistance, Gilcrest brokers a settlement
      with the king allowing for control over the territory of two whole mountains and free cell phone service for the area.
      The following night, Gilcrest and Ng have dinner at Tracy''s house, where they meet her husband Woody and children,
      Grace and Mitchell. Later, alone in the kitchen, Tracy confesses to Gilcrest she planned a life with him before he abandoned
      her thirteen years earlier. The next evening, at Carson''s Christmas party, the commander of Pacific Air Forces, General
      Dixon, warns Gilcrest against ruining their deal. One of his men hands Gilcrest a thumb drive containing top secret
      information for the upcoming satellite launch. During the party, Gilcrest becomes attracted to Ng, who is having fun
      dancing with Carson. Afterwards, Ng joins Gilcrest in his hotel room while he recounts his near-death experiences in
      Kabul. The next day, Ng discovers that the satellite will actually carry a nuclear payload. When she tries to resign,
      she is told that it is a private operation run by Carson and that Gilcrest is aware of the details. She later tearfully
      confronts Gilcrest for deceiving her and the Hawaiians. Meanwhile, Woody and Tracy confront each other about recent
      marital tensions, which he believes started as soon as Gilcrest arrived, and both agree to separate. The next morning,
      she arrives at the hotel and reveals that Grace is his daughter. Later that day, after the successful blessing of the
      new pedestrian gate, Gilcrest learns that the Chinese are attempting to hack the satellite''s code to prevent the impending
      launch. He rushes to the command center and undermines the hackers'' efforts. As he watches the satellite enter geosynchronous
      orbit, he realizes his actions have impacted Ng, whom he has come to love. Quickly, he orders a massive sonic upload
      to be sent to space, and both watch the satellite explode. Believing her continued association with him will ruin her
      promising career, he insists that they should end their romantic relationship. Carson, displeased that his satellite
      has been destroyed, confronts Gilcrest, who reminds him that the sky is meant to be shared by all, and Dixon, also incensed
      by Gilcrest''s actions, threatens to prosecute him. When Gilcrest returns to Tracy''s, she reads him a moving love letter
      from Woody. He tells her she belongs with her husband, and she encourages him to pursue Ng. Arriving home, Woody notices
      Gilcrest, tells him he knows he is Grace''s father, and asks him if he slept with Tracy while he was away, to which
      he responds that he slept with Ng. As Tracy is cleaning up the living room, she notices Woody and they happily embrace
      each other, with Grace and Mitchell joining them. Dixon soon realizes Gilcrest was being truthful about the satellite
      carrying a nuclear weapons payload, praises his actions, and reveals that authorities have arrested Carson and will
      soon be taking him into custody. Outside the hotel, Gilcrest finds Ng, who is preparing to leave, professes his love
      to her, and promises to await her return to Hawaii. Later that night, Gilcrest watches Grace dance during her hula class.
      She notices him nodding at her, suddenly realizing that he is her father. With tears of joy in her eyes, she runs outside
      and embraces him before returning to her class.'
    - 'Represent the plot: Retirees Marion and Tom live in the English seaside town of Peacehaven.  After learning that their
      former friend from decades past, Patrick, has suffered a debilitating stroke, Marion agrees to take him into their home
      and becomes his caregiver. Tom resents Marion for allowing him back into their lives and refuses to acknowledge Patrick''s
      existence in the house. While sorting through Patrick''s belongings, she comes across his journal from the late 1950s,
      which reflects on his past relationship with Tom.  In 1957 Brighton, museum curator Patrick Hazelwood meets policeman
      Tom Burgess after reporting an accident. Patrick leaves Tom his business card, and Tom visits him at the museum he works
      at. Patrick invites Tom to his flat one night to draw him. The two have drinks, and Tom initiates physical touch, and
      they engage in oral sex. Afterward, a shaken Tom abruptly leaves. Patrick later visits a gay bar one night and begins
      having sex with a stranger in an alley before they are caught by the police. Patrick manages to run away and finds Tom
      waiting for him at his flat. Tom admits his feelings, and the two have sex, resulting in a passionate romance.  Due
      to laws criminalizing  homosexuality, as well as Tom''s fear of jeopardizing his job at the police force, they carry
      on their relationship in secret. Tom meets schoolteacher Marion Taylor and begins courting her. He introduces her to
      Patrick, and they become fast friends, bonding over their shared interest in the arts.  Soon, the three of them become
      inseparable. Tom later proposes to Marion, and they marry, but his relationship with Patrick continues. When Patrick
      visits Tom and Marion at their home, she discovers the two of them behaving affectionately with one another, triggering
      her underlying suspicions of Tom''s sexuality. Marion feels angered and betrayed, which is exacerbated when Patrick
      invites Tom to accompany him on a business trip to Venice as his assistant. Shortly after their return, Patrick is arrested
      by Brighton police due to an anonymous report accusing him of homosexual activities. The case goes to trial, where Marion
      testifies on his behalf, but Patrick''s journal entries, detailing his romantic and sexual relationship with Tom, are
      brought into evidence, resulting in his conviction. Patrick is sentenced to two years in prison, and Tom is fired from
      the police force. As Tom and Marion try to move on with their lives, he professes his love for her and vows they never
      speak of Patrick again. In the present, Marion confesses to Tom that she is the one who reported Patrick, as a last
      effort to win him back and has been living with guilt ever since. She challenges him into realizing their marriage has
      been based on lies and that Patrick has always been his true love. She tells him she is leaving him and asks that he
      take care of Patrick and love him. After Marion''s departure, Tom visits Patrick in his room and they lovingly embrace
      each other.'
    - 'Represent the plot: Jim Henderson returns to his hometown in California with the intention of renovating and selling
      his late mother''s house. While shopping at a supermarket, he bumps into his former high school girlfriend Amanda. The
      two greet each other, but Jim says he doesn''t want to stop her from whatever she was up to. He bumps into her again
      in the parking lot and they decide to go for coffee at Blue Jay. They talk about what has happened in their lives since
      they last saw each other. Amanda got married and became the stepmother to two children. Jim works on renovating old
      houses with his uncle and is thinking about renovating his late mother''s house. While walking Amanda to her car, they
      pass a liquor store they went to frequently in their younger days. Amanda bets that the store owner will recognize them,
      although Jim disagrees. To Amanda''s satisfaction, he does remember them. He remarks about how the two famous lovebirds
      are still together after two decades and gives them free beer and jelly beans, while Amanda and Jim jokingly play along
      about how they are still a couple after all this time. They further discuss their current lives in depth by a lake,
      leaving Jim crying and feeling discontented with his life when he hears of how impressive her life sounds. Going to
      his mother''s house, they get  nostalgic over their shared memories. While going through old memorabilia, Amanda finds
      a letter addressed to her written years ago, and keeps it. She then finds tape recordings of Jim and her roleplaying
      their middle-aged lives. They play the recordings and laugh about how uncool they were. Jim proposes they have some
      fun and recreate the tape, pretending to be a married couple celebrating their 20th anniversary. At the end of the night,
      Amanda confesses to Jim she is on anti-depressants and that she has not cried in years. They eventually begin kissing
      passionately in the bedroom. She suddenly stops when he says he loves her. It is then revealed that Amanda had an abortion
      back in high school and that was the cause of their breakup. They lash out at each other, ending it with Jim breaking
      down and crying on the floor. Jim walks Amanda to her car the next morning, and Amanda explains her decision. Jim asks
      her to read the letter he didn''t send her, saying he wanted to keep the baby. Amanda begins to cry, for the first time
      in five years, and then they laugh about it together. Jim and Amanda then sigh at one another and the screen fades to
      black.'
  - source_sentence: 'Represent the plot: This atmospheric and unsettling film presents a carousel of characters desperately
      seeking connection in the Los Angeles nightlife. They turn to the advice of Dr. Nancy Love (Geneviève Bujold), host
      of a radio advice show, who is somewhat neurotic in her personal life and has little experience with love or sex. Everything
      changes when she enters this circle, ultimately becoming entangled between two lovers: an enigmatic globetrotter (Keith
      Carradine) and the owner of the Eve Lounge pub (Lesley Ann Warren). Each character, with their strengths and weaknesses,
      their charm and their misfortune, traverses an arc that leads to anagnorisis.'
    sentences:
    - 'Represent the plot: Allison and Carlos Torres are married with three children: Katie, Nando, and Ellie. When they first
      met, they were adventurous and said yes to everything. However, once having children, they feel they must say no to
      protect them. One evening, they are called into a parent-teacher conference at school where they discover Katie and
      Nando have both submitted homework calling their mom a dictator. Allison expresses frustration that her children perceive
      her this way and tells Carlos that she feels he makes her play the role of bad cop with their children. Mr. Deacon,
      a school employee, and father of six overhears and shares with them that he maintains order in his house by having a
      ''yes day'' from time to time: one 24-hour period where the parents cannot say no, within reason. Carlos and Allison
      present the idea to their family, telling them that if they don''t get into trouble, do their chores, and keep their
      grades up, they can have a yes day as a reward. Katie makes a wager with Allison that if her mom makes it through Yes
      Day, Katie will go to the music festival Fleek Fest with her mother. If she doesn''t make it, Katie will be allowed
      to go with a friend, Layla. The children eventually manage to earn a yes day and put together a list of five activities
      for the day. The first three are Ellie dressing her parents in crazy outfits and requests that they don''t look at anything
      with a screen on it all day, ordering a massive $40 sundae that is free if they can eat it all in 30 minutes, that they
      successfully eat, going through a car wash with the windows down, and entering a capture the flag competition, where
      each family member leads a group; the goal is for one team to catch the others, throwing balloons filled with Kool-Aid
      at their opponents. Allison wins the game for her team, winning the children''s approval. Carlos, however, is tempted
      to drop out of Yes Day, but ultimately decides he can''t bear to disappoint his family. The fourth event is a trip to
      Six Flags Magic Mountain. When Katie steps away, Allison sees texts on her daughter''s phone from Layla indicating she
      and Katie will be hanging out with older boys at Fleekfest. Allison tells her that the wager is off and she''s going
      to Fleekfest with her, not Layla. Hurt, Katie storms off. In an attempt to win a pink gorilla for Katie as an apology,
      Allison and Carlos get into a fight with another park-goer and are arrested. The children sneak away. Katie goes to
      Fleekfest with Layla but quickly becomes uncomfortable being alone with older boys, and her friend abandons her. Nando
      stages a nerd party at the house as the final big event, but it quickly gets out of control when Ellie accidentally
      sets off a foam explosion inside the house that was meant for the backyard. Meanwhile, Katie''s phone dies while trying
      to contact her siblings and she panics. With help from H.E.R., who is performing at the event, Allison finds Katie and
      they reconcile. H.E.R. is moved and invites them on stage for a song. Carlos arrives home and finally manages to be
      a disciplinarian, forcing the party to stop and the children to help with the cleanup. As Yes Day draws to a close,
      Ellie makes one final request. They all spend the night playing games as a family in a tent in the backyard, until Nando''s
      foam bomb (having been flushed down the toilet) starts to fill up the house. In a mid-credits scene, the Torres family
      and other players pelt Mr. Deacon with Kool-Aid balloons at the Capture the Flag field as revenge for suggesting Yes
      Day in the first place.'
    - 'Represent the plot: After Mickey is released from a mental hospital, where his stories are perceived as lies, he returns
      to Los Angeles in search of a woman named Eve. When he arrives at the bar that bears her name, he is immediately attracted
      to the new owner, a former call girl also named Eve. She tells Mickey she bought the bar after the old owner killed
      herself, over some guy. The bar is a popular spot for patrons looking for one-night stands, as well as prostitutes looking
      for potential clients. Although Eve is also attracted to Mickey, she refuses to commit to any one man, confessing to
      French radio talk show host Dr. Nancy Love that she ruined too many marriages to have one of her own. That night, Eve
      rebuffs Mickey''s advances and sleeps with the bartender who has a crush on her, while avoiding the wealthy married
      man she is having an affair with. That same night, Dr. Nancy Love answered Eve''s ad for a roommate to share her house,
      and moves in the next day. Nancy conceals her identity and begins to observe Eve''s romantic entanglements even  as
      she counsels Eve through her radio show. When Eve''s married lover, Zack, calls looking for her, Nancy asks penetrating
      questions and begins dispensing relationship advice, despite the fact that she herself has been unable to maintain a
      successful relationship. Zack in turn resumes his pursuit of Eve, although his wife, Pearl, has begun to haunt Eve''s
      bar hoping to catch him with her, unbeknownst to Eve. Mickey returns to the bar the next night when he is unable to
      pay for a bus ticket home to Las Vegas. Pearl asks his opinion of a poem, and when she argues his interpretation, Mickey
      reveals that he taught poetry, as well as being a photographer and a former soldier. Eve is intrigued but cool, and
      Mickey leaves when Pearl offers to get him into a hot card game where he can obtain the money for a ticket home. When
      she drops him off, Mickey kisses Pearl and asks her to marry him, but she just laughs, calling him crazy, although she
      invites him to drop by her place, and gives him Eve''s address and phone number. At the game, Mickey wins big, earning
      the ire of Pearl''s husband Zack. Zack warns Mickey not to come back, before he goes to meet Eve, but Eve in turn sends
      Zack away, telling him their affair is over. Mickey goes to Pearl''s apartment to crash, and when he wakes up begins
      taking pictures as she sleeps. She is just waking up when Zack walks in, still stinging from Eve''s rejection, and he
      attacks Mickey, pulling a gun and taking back the money he lost. He slaps Pearl after Mickey runs out, assuming they
      slept together. Mickey calls Eve''s house, and when Nancy answers pleads to come over and crash, hanging up before he
      realizes who she is. When he arrives, Nancy tells him Eve is not home, and while he is confused he welcomes the chance
      to bathe and eat when she allows him in. She snoops in his suitcase while he bathes, finding memorabilia showing the
      truth of his stories and travels. As he eats they talk about Eve, but sensing her loneliness he sweeps her into bed,
      then asks her to marry him and go with him to Las Vegas. Nancy laughs, but tells him she does not believe he is crazy.
      Then she tells him to leave before she goes to work. Eve calls into Nancy''s radio show from the office above her bar,
      torn between her attraction for Mickey and her fear of making another mistake. Nancy''s post-coital euphoria overcomes
      her normal intellectual approach, and she encourages Eve to give in to, rather than resist, her feelings. So when Mickey
      comes looking for Eve that night, she is almost ready to give in when Zack appears and assaults Mickey again. Eve takes
      off while they are fighting, and when she gets home is suddenly confronted by Nancy, who tells her everything. Eve is
      devastated when Nancy proposes that they share Mickey''s affection, and she tells Nancy she can have him, before rushing
      out. Mickey goes back to Eve''s house to recover his suitcase, and Zack finds him there and assaults him again. Mickey
      prevails, recovering the money and leaving with his suitcase. He tries to cadge a ride to the bus station, but spies
      Eve on the roof of the bar, and races up to see her. She pulls a gun and threatens to kill herself until he does the
      same; then she breaks down and they embrace. Soon they are on a bus, on their way to Las Vegas, and when a fellow passenger
      asks if they are gambling, Eve reveals they are on honeymoon.'
    - 'Represent the plot:  In 2002, 6-year-old Mason Evans lives with his divorced mother, Olivia, and 8-year-old sister,
      Samantha, in a small town in Texas. Mason overhears Olivia arguing with her boyfriend, saying she has no free time due
      to parenting.  In 2003, Olivia and the children move to Houston so she can attend the University of Houston and get
      a better job.  In 2004, Mason''s father, Mason Sr., visits Houston and takes Mason and Samantha bowling. When he drops
      the children off at home, he argues with Olivia while Mason and Samantha watch from a window. Olivia takes Mason to
      one of her classes, introducing him to her professor, Bill Welbrock; Mason sees them flirt. In 2005, Olivia and Bill
      have married and blended their two families. They share experiences such as playing video games and attending a midnight
      release of Harry Potter and the Half-Blood Prince. Mason and Samantha are enrolled in the same school as their step-siblings,
      Mindy and Randy. There, Mason befriends Nicole, who has a crush on him.  In 2006, Mason and Samantha bond with Mason
      Sr. as he takes them out for a day in Houston, culminating in a Houston Astros game and a sleepover at his house. Olivia
      continues her education and is initially supportive of Bill''s strict parenting style, which includes many chores for
      the children and an enforced shaving of Mason''s long hair.  In 2007, Bill gradually becomes abusive and violent towards
      Olivia and the children due to his recent alcoholism. After he assaults Olivia, she moves out with Mason and Samantha
      to a friend''s house and files for divorce while her step children stay with their father, since Olivia is unable to
      locate their biological mother, facing an uncertain future.  In 2008, Mason Sr. learns that Samantha has a boyfriend
      and talks to her and Mason about contraception. Mason Sr. takes his son camping and they connect through music, film,
      and Mason''s blossoming interest in girls. Mason and Samantha have grown into their lives in San Marcos, a town close
      to Austin. In 2009, Mason is bullied at school and playfully teased on a camping trip but starts receiving attention
      from girls. Olivia takes a job in teaching psychology at college and moves in with Jim, a student and Iraq War veteran.
      In 2010, Mason has started high school and experimented with marijuana and alcohol. Mason Sr., who has remarried and
      has a baby, takes Mason and Samantha to visit his wife''s parents. For Mason''s 15th birthday, Mason Sr. gives him a
      suit and CDs; Mason''s step-grandparents give him a Bible and a shotgun. '
  - source_sentence: 'Represent the plot: Mickey Windgren (Elvis), a trapeze artist who is afraid of heights because of a
      tragic accident, begins working as a singer in a hotel in Acapulco.'
    sentences:
    - 'Represent the plot:  Mike Windgren works on a boat in Acapulco, Mexico. When Janie Harkins, the bratty daughter of
      the boat owner, gets him fired, Mike must find new work. A Mexican boy named Raoul helps him get a job as a lifeguard
      and singer at a local hotel. Clashes abound when Mike runs into a rival lifeguard, who is the champion diver of Mexico.
      He is angry at Mike for taking some of his hours, and for stealing his woman. Mike is recovering from post-traumatic
      stress disorder and a fear of heights, following a tragic high-wire accident during his career as a circus performer.
      However, after Mike sees the lifeguard perform a number of dangerous dives, including flips and head-first dives into
      a section of the pool surrounded by a ring of fire, he decides to get even with him and eventually sets himself up to
      perform a death-defying dive off the 136-foot cliffs of La Quebrada in front of hundreds of people. Mike dives off the
      cliff, and successfully lands in the water, earning the lifeguard''s respect. As the crowd and the lifeguard applaud,
      Mike performs one more song and leaves with Margarita and Raoul.'
    - 'Represent the plot: Sloane Benson is a young woman who hates the holidays due to the judgement she receives from her
      family for being single. Having recently broken up with her boyfriend, her mother Elaine is constantly trying to set
      her up with a new man, much to Sloane''s annoyance. At her family''s Christmas dinner her younger brother, York gets
      engaged to his girlfriend of three months, Liz, and Sloane is now the only single person left in the family. Meanwhile,
      Jackson, an Australian golfer, is stuck spending the holidays with a woman he has no interest in. His date becomes angry
      with him for not getting her a Christmas present, and he leaves in frustration. After Christmas, Sloane and Jackson
      have a chance encounter when both are returning presents they received. Jackson offers to avoid bad holiday dates by
      dating only on holidays. Though initially reluctant, she decides to take Jackson up on his offer and the two end up
      spending New Year''s Eve together, but have no further contact. However, on Valentine''s Day, both have another chance
      encounter where Jackson pretends to be her boyfriend in front of her ex. They become friends over spending various holidays
      together. After both become closer when Jackson loses a finger, he fears he is not good enough for her and tries to
