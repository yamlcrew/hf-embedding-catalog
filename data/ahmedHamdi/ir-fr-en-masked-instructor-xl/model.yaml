    to draw PERSON out, but find themselves pursued by ORG and a jilted ORG, being briefly arrested before quickly escaping
    with the help of some smoke bombs. When Modesty attempts to identify and infiltrate the boat being used by PERSON for
    the planned diamond theft, she is lured into a trap and captured. PERSON reveals his true plan, to use ORG as leverage
