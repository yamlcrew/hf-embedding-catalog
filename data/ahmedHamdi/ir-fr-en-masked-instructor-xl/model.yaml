    Sheikh. Blaise, who enjoys an ongoing love-hate relationship with law enforcement, is recruited not only for her competence,
    but because she is the PERSON''s adopted daughter and thus trusted by him implicitly. Modesty agrees to the arrangement,
    on the condition that she is given total immunity by the British government and complete freedom to deliver the diamonds
    how she sees fit. With Sir PERSON monitoring her from afar, ORG travels to GPE, where she reunites with her former lover
