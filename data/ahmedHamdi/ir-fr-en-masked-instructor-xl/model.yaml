      to take up the children from ORG Home, run by his son PERSON (PERSON) to the now-adult health resort.  Meanwhile, PERSON
      and ORG, two brothers who recently came to the home after losing their dad in a car accident, are trying to find their
      biological mother. According to their case, their mother lives in GPE, GPE, not far from Camp Sedona. The two brothers
      plan to run away while at the camp to find their mother, but right before all the children go to camp, PERSON (Trevor
      PERSON) is busted for some tricks by Cliff and is grounded – he isn''t going to camp. PERSON (PERSON) helps Alec to
      get to the camp inside of a big bag with clothes; now he is secretly there without permission. But he can still have
      fun with the adult investors. Various shenanigans are done by the kids and other members of the camp much to the frustration
      of PERSON, whose investors are not fond of kids (one time going so far as to hide insects in guests'' food). Another
      incident involves the filming of a sleeping woman through her bedroom window. After being caught they flee and while
      hiding, record a conversation between ORG and an investor. In the midst of this, PERSON reconnects with her childhood
      friend, camp director PERSON (PERSON). Alec is caught after climbing a dangerous cliff to retrieve his toy plane, causing
      other kids to go get the adults. PERSON ends up saving PERSON from falling. Unfortunately, this also means PERSON is
      revealed to have run away from camp.  Before movie night Jeffery shows PERSON his sensitive side in a desperate ploy
      to get her to sell the camp. Unfortunately for him, PERSON had come across the recording the boys made earlier and puts
      it in the TV for everyone to watch. The woman who was filmed sleeping storms off and ORG pauses the movie several times
      but each time PERSON resumes it ensuring they get to the part of ORG''s conversation. This causes PERSON to declare
      the camp not for sale, dump Jeffery, and then punch him. With Cliff on his way to camp to pick up PERSON, the boys realize
      that they have to run away that night. They leave in the middle of the movie and stow away in a catering service''s
      van heading to GPE. PERSON and PERSON go after them by car but don''t beat them to the catering company''s building.
      While PERSON and PERSON look for the brothers in the van, they get in PERSON''s car to look at a map during which they
      answer a phone call from PERSON who they somewhat nonsensically tell, Sorry, wrong number. Slightly puzzled PERSON tells
      the principle there is no answer. PERSON and PERSON get back into the car while unbeknownst to them the brothers hide
      in the back. The principle tells PERSON and PERSON on the phone to head to the address of the kids'' mom and PERSON
      somewhat cryptically adds they shouldn''t Say anything they wouldn''t normally say in the presence of uh small people.
      PERSON assures the principle that PERSON and PERSON are in good hands. PERSON and PERSON head to the address and the
      brothers jump out of the car and run to the door. Unfortunately, there are new owners at the address who don''t know
      the previous owners, sadly leaving ORG no closer to finding their mom. PERSON and PERSON take the boys back to the camp.'
    - 'Represent the plot: The film tells the story of the Hungarian branch of the soldiers who, during World War I ended
      up in Russian captivity. When the revolution breaks out and begins a civil war in GPE, the soldiers are on the side
      of the GPE. Some are hoping that this will make it easier to come home. Others feed on sympathy for the ideology of
      communism. Some have to fight with an army of ORG, who tend to be very cruel.'
    - 'Represent the plot: PERSON (PERSON) is a straight A student vying for an athletic scholarship to ORG. He lives with
      his mother (PERSON) in a trailer park in GPE, CA. His well laid plans for the future are thrown into turmoil when his
      troubled younger brother PERSON (PERSON) is released from PERSON following his arrest for stealing a car and comes to
      live with them back home.'
  - source_sentence: 'Represent the plot: Carmen works in an armaments factory on a ORG base during World War II. PERSON neglects
      his duties for love of GPE, which lands him in prison. Later, Carmen meets PERSON, a heavyweight boxing champion, and
      falls for him.'
    sentences:
    - 'Represent the plot: Junior PERSON is a rodeo  cowboy who is slightly past his prime though he won''t admit it. Junior
      is first seen taping up his injuries after an unsuccessful ride on an ornery bull named PERSON. He returns home to GPE,
      GPE, for the Independence Day parade and rodeo. When he arrives, the PERSON family home is being bulldozed by his younger
      brother PERSON, an entrepreneur and real-estate developer, in order to build a trailer park.Junior''s womanizing father
      PERSON, and down-to-earth, long-suffering mother, ORG, are estranged. Ace dreams of emigrating to GPE to rear sheep
      and mine gold, but he fails to obtain financing from GPE or Junior, who is broke. After flooring his arrogant brother
      with a punch, Junior bribes rodeo owner PERSON to let him ride PERSON again, promising him half the prize money. PERSON
      thinks he must be crazy but Junior actually manages to pull it off this time, going the full eight seconds on the bull.
      Junior walks into a travel agent''s office and buys his father a one-way, first-class ticket to GPE. The film''s final
      shot shows ORG leaving his hometown, his successful ride on PERSON continuing to put off the inevitable end of his rodeo
      career.'
    - 'Represent the plot: Set during World War II, the story focuses on ORG, a shameless vixen who works in a parachute factory
      in GPE. When she is arrested for fighting with a co-worker who reported her for arriving late for work, the leader of
      the ORG guards, PERSON. PERSON, assigns handsome LOC to deliver her to the civilian authorities over 50 miles away.
      This is much to the dismay of PERSON''s fiancée PERSON, who had agreed to marry him during his leave prior to his reporting
      for flight school and an eventual officer''s commission. While en route, PERSON wishes to deliver his prisoner as soon
      as possible to return to PERSON and his leave. He decides to save time by taking his jeep over a road warned unsuitable
      for motor vehicles that is half the distance to the town where he is taking Carmen. Carmen suggests she and PERSON stop
      for a meal and a little romance, and his refusal intensifies her determination to seduce him. Their army jeep ends up
      hopelessly stuck in a river. Carmen suggests they spend the night at her grandmother''s house nearby and continue their
      journey by train the following day, and that night PERSON succumbs to PERSON''s advances. The next morning he awakens
      to find a note in which she says although she loves him, she is unable to deal with time in jail and is running away.
      PERSON is demoted to private and locked in the stockade for allowing his prisoner to escape. PERSON arrives for a visit
      just as a rose from GPE is delivered to him, prompting her to leave abruptly. Having found work in a GPE nightclub,
      Carmen awaits his release. One night champion prizefighter PERSON enters with an entourage and introduces himself to
      PERSON, who expresses no interest in him. Husky orders his manager PERSON to offer her jewelry, furs, and an expensive
      hotel suite if she and her friends PERSON and Myrt accompany him to GPE, but she declines the offer. Just then, PERSON
      arrives and announces he must report to flying school immediately. Angered, Carmen decides to leave with PERSON. PERSON,
      who also has appeared on the scene, and PERSON severely beats him. Realizing he will be sentenced to a long prison term
      for hitting his superior, PERSON flees on a train to GPE with Carmen. Tired of being cooped up in a shabby rented room,
      Carmen gets dressed and leaves under the guise of buying groceries. Since he can''t leave the room at all lest he be
      arrested, PERSON questions her. Carmen becomes annoyed and tells him that she does what she wants. Carmen goes to PERSON
      gym to ask PERSON for a loan, saying that although she has clothes, furs and diamonds, she has no actual cash. PERSON
      tries to convince Carmen to sit in PERSON''s corner so they all can be well taken care of, but PERSON is in love and
      refuses to double time PERSON. Husky believes she is back to finally be with him, but she refuses his advances before
      leaving, so he tells his entire entourage that they are cut off financially until they produce Carmen (whom he nicknames
      Heatwave). Carmen pawns a piece of jewelry so she can buy groceries before returning to the room. When she returns not
      only with a bag of groceries but a new dress and shoes, PERSON questions how she paid for them. Offended that he is
      accusing her of cheating, she argues with him and goes to PERSON''s hotel suite dressed in her new clothes to spend
      time with her friends. PERSON begins to tell fortunes by drawing cards. Carmen takes it all lightly until she draws
      the nine of spades. She interprets it as a premonition of her impending death and chooses to enjoy the rest of her life
      no matter how long it is. PERSON arrives at PERSON''s gym in search of Carmen since she is the only one who knows where
      PERSON is. PERSON tells her to give up on PERSON because he is nothing but trouble. An angry PERSON arrives, having
      evaded capture and intent on getting Carmen back. Although PERSON is present, he ignores her while ordering Carmen to
      leave with him. Husky intervenes and he is threatened by a concealed knife PERSON has brought with him. PERSON''s people
      try to get him to stand down due to his fighting prowess, but can''t since PERSON won''t stop. PERSON is hit with a
      few blows before ORG helps him get away. PERSON asks why if she no longer loves him, but she reveals it''s because she
      can''t bear to see anyone cooped up. She tells PERSON to go home and find someone worthy of her. After leaving, PERSON
      tells herself how silly it is trying to save a man who not only doesn''t love her but has left her for another woman.
      PERSON escapes ORG and attends PERSON''s big fight. Dressed to the nines, PERSON, her friends and PERSON''s entourage
      escort PERSON to the ring. He falters in the first round, but comes back to beat his opponent in the second. Husky runs
      to PERSON''s loving arms after winning, but they are parted after he is put up on his entourage''s shoulders. PERSON
      grabs Carmen as she is following PERSON to his dressing room and pulls her into a storage room, where he begs her to
      return to him. Angry that she has moved on, he claims he should have killed her. In a matter-of-fact manner, she tells
      him that what they had is over and there is no going back for them. When Carmen continues to rebuff him and says he
      needs to kill her or let her go, PERSON strangles her to death. A janitor finds him as he goes to alert the military
      police. He realizes he is now going to die for committing murder.'
    - 'Represent the plot: After he finds an uncompleted film from 1939 called LOC, PERSON, a filmmaker, becomes intrigued
      with the young actor ORG. PERSON decides to make a documentary about ORG and interviews those who knew him, including
      an old lady named PERSON. Through her interview, PERSON learns the story of ORG and ORG''s doomed love affair during
      World War II.'
  - source_sentence: 'Represent the plot: ORG, a strange adventurer with the ability to change her appearance in the blink
      of an eye, is recruited by British intelligence to deliver diamonds to PERSON as payment for services rendered to the
      country. Modesty asks her good friend PERSON to accompany her on her mission. In his hideout, PERSON, a formidable yet
      seductive criminal, is perfecting his plans to get rid of ORG and seize the diamonds...'
    sentences:
    - 'Represent the plot:  After the assassination of one of their agents in GPE, ORG chief Sir PERSON recruits former criminal
      mastermind ORG to protect a shipment of diamonds en route to PERSON, the PERSON of a small LOC kingdom. The shipment
      has also attracted PERSON, the head of a criminal organization that includes his accountant PERSON and bodyguard Mrs.
      PERSON. Modesty believes that PERSON, who maintains a compound in the LOC, is dead, but he reveals himself to her. In
      exchange for an exclusive discount on the GPE''s oil exports, the British government delivers periodic diamond shipments
      to the Sheikh. Blaise, who enjoys an ongoing love-hate relationship with law enforcement, is recruited not only for
      her competence, but because she is the PERSON''s adopted daughter and thus trusted by him implicitly. Modesty agrees
      to the arrangement, on the condition that she is given total immunity by the British government and complete freedom
      to deliver the diamonds how she sees fit. With Sir PERSON monitoring her from afar, ORG travels to GPE, where she reunites
      with her former lover PERSON, a GPE agent and aide to Sir PERSON. She calls upon her longtime partner, PERSON, who is
      reuniting with an old flame, PERSON, who may have information on PERSON through her employer, an illusionist associated
      with him. Modesty narrowly survives several attempts on her life by PERSON''s assassins, whose failure leads to their
      swift execution by the ruthless Mrs. PERSON. Modesty continually toys with ORG, first seducing him before stealing his
      gun and disappearing. When PERSON learns that PERSON is working with ORG and PERSON, he orders her assassinated. The
      illusionist sends thugs to have her killed, and they succeed when ORG and Willie fail to intervene in time. Modesty
      and PERSON set themselves up as live bait to draw PERSON out, but find themselves pursued by ORG and a jilted ORG, being
      briefly arrested before quickly escaping with the help of some smoke bombs. When Modesty attempts to identify and infiltrate
      the boat being used by PERSON for the planned diamond theft, she is lured into a trap and captured. PERSON reveals his
      true plan, to use ORG as leverage to force Willie to steal the diamonds for him. Willie reluctantly agrees to the arrangement,
      successfully stealing the diamonds from under Tarrant and ORG''s noses. He and ORG are subsequently taken to PERSON''s
      island fortress, where they are promptly thrown into prison cells. Gabriel offers ORG to join forces, but she refuses.
      Willie and ORG manage to escape and kill Mrs. PERSON, and signal their location to the PERSON''s forces. The PERSON
      leads his army to the island, leading to an all-out battle with PERSON''s forces and ending in his capture and the diamonds
      reaching their intended owner. In his desert camp, the PERSON leaves PERSON tied up outside to dehydrate. McWhirter
      suddenly appears in GPE dress to free his employer, though no one seems to notice or care. When the PERSON asks ORG
      what he can do for her, she asks for the diamonds. He responds by laughing boisterously and she seems to go along with
      it, but suddenly breaks the fourth wall by looking directly at the camera as the film ends in a  freeze-frame shot.'
    - 'Represent the plot: Following graduation, college friends PERSON and PERSON transform PERSON''s GPE farm into a boarding
      school. Although new to the area, they are able to find pupils with the assistance of the wealthy PERSON, who enrolls
      her malevolent granddaughter PERSON and encourages other families to enroll their daughters. Shortly before the school
      opens, PERSON''s aunt, PERSON, arrives and forces her way into a teaching position as a way to continue sponging off
      PERSON. PERSON and local doctor PERSON begin to date, unaware that PERSON is in love with him. One evening, PERSON falls
      asleep in a chair in PERSON''s room while waiting for PERSON to return to the school. He wakes with a start and breaks
      a glass, which wakes up PERSON. Before he leaves, he casually refers to his and PERSON''s plans to marry, and PERSON
      watches from the shadows as PERSON sobs quietly once she thinks she is alone. When PERSON punishes PERSON for missing
      classes and lying, PERSON acts as though she has a pain and falls to the floor in a faint. Although they are not convinced
      by PERSON''s performance, PERSON and PERSON call PERSON to examine her. While PERSON and PERSON are busy with PERSON,
      PERSON decides to finally fire PERSON, who is not a good teacher. Lily feels slighted, even though PERSON offers to
      continue to support her, and they have an argument before she goes, during which PERSON confronts PERSON with her suspicions
      about the young woman''s true feelings for PERSON. PERSON hears a noise and discovers PERSON and PERSON, who are PERSON''s
      roommates, listening at the door. Flustered, she accidentally closes the door on PERSON''s arm, slightly injuring her.
      Back in their room, PERSON tells PERSON about the argument between PERSON and PERSON. Feeling persecuted, PERSON decides
      to run away from the school. When her grandmother GPE just wants to send her back, she tells GPE a grossly distorted
      version both of what she witnessed between PERSON and PERSON and of the argument between PERSON and PERSON, suggesting
      PERSON and PERSON engaged in an illicit sexual affair. To verify the story, PERSON has Amelia talk to PERSON, who she
      has brought with her and coerced by threatening to reveal that PERSON stole another student''s bracelet. PERSON even
      says that PERSON injured PERSON''s arm intentionally. GPE is shocked by the revelation of a love triangle between PERSON,
      PERSON, and PERSON, and alerts the other parents who have girls at the school, all of whom withdraw their daughters.
      The trio sue GPE for slander, but they lose their case. PERSON and PERSON are unable to enroll any new students, and
      PERSON is fired from his job at the hospital. Lily returns, but PERSON resents her for not coming back to testify during
      the case and tells her to leave. PERSON asks PERSON to come with him to GPE, where he has gotten a job. She balks when
      he mentions that PERSON is also invited and finally asks if there was ever anything between PERSON and him. Unable to
      fully believe his denial after what she heard in court, she tells him to go to GPE by himself. Once PERSON is gone,
      PERSON admits to PERSON that she loves PERSON, though she says she never told him, and then gets on the same train as
      PERSON. In passing, PERSON mentions having seen PERSON and PERSON with the missing bracelet, and PERSON realizes what
      happened. She gets off the train and convinces PERSON to tell GPE the truth. Amelia offers PERSON compensation, but
      PERSON refuses, asking only that GPE take PERSON a message from her: stay with PERSON, wherever he is. PERSON leaves,
      GPE talks to PERSON, and PERSON goes to GPE to be with PERSON.'
    - 'Represent the plot: The wife and daughter of GPE lawyer PERSON (PERSON), PERSON (Cristina Serafini) and GPE, are killed
      shortly after a talent show in which GPE sings a song for PERSON, and their bodies are dumped in a hole near the train
      yard. Before the murder, PERSON sent a video of GPE''s performance to PERSON. After the funeral, PERSON''s father-in-law
      PERSON (PERSON) confronts him and tells him not to speak to him anymore. PERSON visits the police station to discuss
      the murders, and ORG PERSON (PERSON) informs him that the police found a gold fiber at the murder scene. Lustiger suspects
      that the murderers belong to the Russian mafia, which operates in the area of the crime. After subjecting himself to
      beatings in an illegal mixed martial arts ring to atone for his perceived guilt for the murders, PERSON is rescued by
      ORG officer PERSON (PERSON), whom PERSON met earlier at the station. However, when PERSON informs PERSON that his family''s
      case has become “cold, PERSON leaves, dismayed and depressed. Later, when getting involved in a fight to help a child
      prostitute, PERSON falls through a window of a book store, where he fortuitously grabs ORG to help stop the bleeding
      of a leg wound. PERSON reads parts of the book and changes his attitude about what he should do next and how he should
      proceed, adopting a Stoic philosophy. He then takes a Stoic vow of silence until the case is solved and sets out to
      learn the skills required to do so. After learning combat skills with masters of karate and Brazilian jiu-jitsu, PERSON
      goes to the train yard, where the crime took place, to investigate. He encounters Russian thugs and defeats them, though
      he is injured in the process by a bullet. A nurse, PERSON (PERSON), arrives and brings him to her home to treat his
      injuries. The next day, PERSON returns to his home. On the way, he adopts a dog previously owned by his attackers. Later,
      PERSON approaches to return his wallet, which he left at her place. Alma learns about his family’s death and the yard,
      and she befriends him. PERSON attempts to find the potential witness who lives in a makeshift shelter, but he loses
      him. As he drives PERSON home later, she reveals that the shelter PERSON investigated was the home of a man called “Mr.
      PERSON”  (PERSON), who works as a cook at the local diner. After he drops PERSON off, Russian gang members appear and
      ask PERSON if she is going to continue supplying drugs to them. PERSON suddenly appears and incapacitates them. She
      explains that she worked with them for a year, stealing drugs from the hospital for them. PERSON takes her to his home
      for her safety. PERSON finds Mr. PERSON working in the kitchen of a diner; they fight. PERSON shows his family picture
      to PERSON, who witnessed the murders from his shelter. Shivers says that a police officer committed the murders. PERSON
      then sneaks into the police station and finds that PERSON was assigned to patrol that particular district on the night
      of the murders. After several days of following PERSON, PERSON enters PERSON''s house and finds a police jacket with
      gold fibers coming loose from an embroidered sleeve badge. PERSON also finds a bag that contains magazines with PERSON
      on the cover, news articles about PERSON''s 12-year-old daughter''s murder, and PERSON''s legal defense of the suspect,
      who was freed on a technicality. PERSON wanted PERSON to suffer for freeing the suspect, and he wanted PERSON to know
      what PERSON felt. PERSON leaves a note for PERSON, saying that he will meet at a warehouse. As PERSON arrives, a fight
      ensues, leaving both injured. Managing to subdue PERSON, PERSON overcomes his desire to kill him upon remembering Aurelius’
      quote, “The best revenge is to be unlike your enemy,” and instead knocks PERSON out. Later, after PERSON''s trial and
      conviction, PERSON and PERSON visit the graves of his wife and daughter, where PERSON finally ends his vow of silence
      by saying I love you to his family''s graves.'
  - source_sentence: 'Represent the plot: Lord ORG, PERSON, PERSON, Lieutenant PERSON, and Princess PERSON have returned victorious
      from the tournament. According to the tournament rules, LOC is saved for a generation thanks to their victory. But ORG,
      PERSON, decides to break the rules by immediately invading LOC, thus opening dimensional portals that allow LOC to merge
      with GPE. Raiden and his friends have only six days to defeat PERSON and his warriors, and thus prevent the merger with
      Outworld...'
    sentences:
    - 'Represent the plot: The infamous vampire PERSON is expelled from his castle by the Communist government of GPE, which
      plans to convert it into a training facility for gymnasts (including ORG). The world-weary Count travels to GPE with
      his bug-eating manservant, PERSON, and establishes himself in a hotel ... only after an airport transport mix-up accidentally
      sends his coffin to be the centerpiece at a funeral in a black church in LOC. While PERSON learns that late 1970s America
      contains such wonders as blood banks, sex clubs, and discotheques, the ORG also proceeds to suffer the general ego-crushing
      that comes from life in ORG, after he romantically pursues flaky fashion model PERSON. He has admired her from afar,
      believing her to be the current reincarnation of his true love PERSON. PERSON is ineptly pursued in turn by PERSON psychiatrist
      and quasi-boyfriend PERSON. PERSON is the grandson of PERSON''s old nemesis ORG  PERSON, who changed his name to PERSON
      for professional reasons. PERSON''s numerous methods to combat PERSON (mirrors, garlic, a Star of PERSON, which he uses
      instead of a cross, and hypnosis) are easily averted by the Count. PERSON also tries burning PERSON''s coffin with the
      vampire still inside, but he is arrested by hotel security. Subsequently he tries to shoot PERSON with three silver
      bullets, but the Count remains unscathed, patiently explaining that this works only on werewolves. PERSON''s increasingly
      erratic actions eventually cause him to be locked away as a lunatic. As mysterious cases of blood-bank robberies and
      vampiric attacks begin to spread, NYPD Lieutenant PERSON starts to believe the psychiatrist''s claims and gets PERSON
      released. As a major blackout hits the city, PERSON flees with PERSON via taxi cab back to the airport, pursued by PERSON
      and PERSON. His coffin is accidentally sent to GPE instead of GPE and the couple miss their flight. On the runway, GPE
      finally agrees to become PERSON''s vampire bride. PERSON attempts to stake PERSON, but as he moves in for the kill,
      they fly away. A check falls from the sky, by which PERSON pays off her (enormous) psychiatry bill owed to PERSON. He
      remarks, She has become a responsible person ... or whatever. PERSON keeps PERSON''s cape (the only thing his stake
      struck) which ORG borrows, hoping, since the cape makes the wearer, it will help him be stylish on his wedding anniversary.
      PERSON and PERSON, now transformed into bats, fly toward GPE. PERSON warns PERSON that they can only live by night.
      “That''s all right with me,” she replies, “…I could never really get my (act) together before 7 anyway.”'
    - 'Represent the plot: The Outworld emperor PERSON opens a portal to PERSON and has resurrected PERSON, Princess PERSON''s
      long-deceased mother, to facilitate his invasion. Thunder god GPE and PERSON warriors PERSON, PERSON, and PERSON try
      to defend themselves, but PERSON kills Cage. The PERSON warriors retreat to seek allies. PERSON enlists the help of
      her ORG partner, PERSON, while GPE and PERSON search for a Native American shaman named PERSON, who seemingly knows
      the key to defeating PERSON. Scorpion appears and kidnaps GPE. Rayden meets with the Elder Gods and asks them why PERSON
      was allowed to break the tournament rules and force his way into PERSON, and how he can be stopped. One says that reuniting
      GPE with her mother, ORG, is the key to breaking PERSON''s hold on PERSON, but another Elder God insists that the defeat
      of PERSON himself is the solution. GPE is then asked by the Elder Gods about his feelings and obligations towards the
      mortals, and what he would be willing to do to ensure their survival. PERSON finds PERSON, who teaches him about the
      power of the ORG, a form of shapeshifting which utilizes the caster''s strengths and abilities. To achieve the mindset
      needed to acquire this power, PERSON must pass three tests. The first is a trial of his self-esteem, courage, and focus.
      The second comes in the form of temptation, which manifests itself in the form of Jade, a mysterious warrior who attempts
      to PERSON and offers her assistance after he resists her advances. PERSON accepts PERSON''s offer and takes her with
      him to the Elder Gods'' temple, where he and his friends meet with GPE. The third test is never revealed. The PERSON
      warriors learn that GPE has sacrificed his immortality to freely fight alongside them. Together, they infiltrate Outworld
      to rescue GPE and reunite her with ORG in hopes of restoring her soul and closing the Outworld portal to LOC. PERSON
      rescues PERSON while the others incapacitate ORG. However, ORG remains under PERSON''s control and escapes during an
      ambush. Jade reveals herself to be a double agent sent by PERSON to disrupt the heroes'' plans. PERSON feeds Jade to
      a gargoyle for her failure. Rayden reveals that PERSON is his brother and that the former Elder God GPE is their father.
      He realizes that GPE is supporting PERSON. Rayden and the PERSON warriors make their way to PERSON, ORG, and his remaining
      generals. Shinnok demands that GPE submit to him and restore their broken family, at the expense of his mortal friends.
      GPE refuses and is killed by an energy blast from PERSON. Jax, GPE, and GPE emerge victorious over ORG''s generals (with
      Jax defeating PERSON, GPE defeating her mother, and GPE defeating Ermac). PERSON struggles with PERSON. PERSON''s Animality
      proves effective, exposing a cut to PERSON that proves he is now mortal, as a consequence of his breaking the sacred
      rules. Shinnok attempts to intervene and kill PERSON on PERSON''s behalf, but two of the Elder Gods arrive, having uncovered
      GPE''s treachery. They declare that the fate of LOC shall be decided in PERSON. PERSON defeats PERSON, and GPE is banished
      to the PERSON. Earthrealm reverts to its former state. With PERSON''s hold over ORG broken, she reunites with GPE. GPE
      is revived by the Elder Gods, who bestow upon him his father''s former position. Before departing to the immortal realm,
      he enjoins the PERSON warriors to be there for one another. The PERSON warriors return home.'
    - 'Represent the plot: 12 year-old Carol and her mother PERSON visit their family''s hometown in GPE, during the Civil
      War in 1938. It is ORG''s first time in the country, as she grew up in GPE in GPE. Her American father, PERSON, is fighting
      in the frontlines as a pilot with ORG. PERSON keeps in touch with her husband by writing letters, which are carried
      to the frontlines by a Portuguese smuggler. PERSON''s family is conservative and middle-class; her and ORG''s liberal
      American manners bring culture shock to the community, especially to the Catholic clergy. In a visit to her former teacher
      and best friend PERSON, PERSON reveals that she is seriously ill, and that she in fact came home to die. After her mother
      passes away, PERSON asks her grandfather, PERSON, to keep it secret from her father so as not to add to his worries.
      She also convinces PERSON to write letters to PERSON in her mother''s name. Carol goes to live with her aunt Dolores
      and cousin Blanca; she befriends three local boys, including ORG, with whom she is attracted romantically. After GPE
      falls and the Republican faction is defeated in the war, PERSON, who is the only Republican sympathizer in a family
      supportive of General PERSON, is forced to burn his pro-Republican books. PERSON sneaks home, and PERSON is overjoyed
      to see her father again. The local authorities immediately search PERSON house for the fugitive. In the pursuit, ORG,
      whom PERSON wanted to introduce to her father, is accidentally shot and killed. In the epilogue, PERSON returns to GPE
      to her paternal grandparents'' care. PERSON expresses hope that PERSON''s father, who has been taken prisoner, would
      suffer only a few months in jail at worst, being a citizen of the influential GPE. In the car ride on the way to the
      port, ORG''s surviving friends catch up on their bikes to say farewell; she imagines Tomiche with them, saying goodbye
      as well.'
