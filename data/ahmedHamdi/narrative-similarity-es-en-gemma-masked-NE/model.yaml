- source_sentence: "PERSON (PERSON) is a real estate agent in GPE, GPE. His boss, PERSON (PERSON), informs him that a nobleman\
    \ named PERSON wishes to purchase a property in GPE. PERSON is chosen to visit the Count and close the lucrative deal.\
    \ Leaving his young wife, PERSON (Isabelle PERSON), in GPE, PERSON embarks on a four-week journey to PERSON's castle in\
    \ GPE. During his travels, PERSON stops in a village near the castle. The locals warn him of the \"evil\" that dwells\
    \ within the castle and beg him to stay away. These warnings are accompanied by tales and descriptions of vampirism. PERSON\
    \ dismisses this advice as baseless superstition. Finally, he arrives at PERSON's castle, where he meets the Count (PERSON).\
    \ The mysterious nobleman is a strange character, with pale skin, pointed ears, sharp teeth, and long fingernails. Despite\
    \ his terrifying appearance, PERSON proves to be a solicitous and hospitable host. The reclusive count is captivated by\
    \ a small portrait of PERSON and immediately agrees to purchase the estate PERSON offers in GPE. During his visit to the\
    \ castle, ORG experiences a series of dream encounters with the count. Simultaneously, PERSON is tormented in Wismar by\
    \ catastrophic and malevolent visions. Elsewhere, PERSON is admitted to a mental asylum after biting a cow and developing\
    \ a mysterious form of psychosis. PERSON, horrified, discovers the count sleeping in a coffin, thus confirming his suspicions\
    \ that PERSON is indeed a vampire. That same night, the count departs for PERSON, taking with him several coffins filled\
    \ with the cursed earth he needs for his vampiric rest. PERSON finds himself trapped in the castle and attempts to escape\
    \ through a window using a rope. The rope, made of bedsheets, proves insufficient. PERSON falls and suffers several injuries.\
    \ He awakens in a hospital in a feverish state, speaking of \"black coffins,\" leading doctors to assume his condition\
    \ is affecting his mental health. Meanwhile, PERSON and his coffins travel to Wismar by ship. The ship's crew members\
    \ are systematically dying or disappearing at the hands of the vampire. However, the crew believes the deaths are due\
    \ to the outbreak of the plague: nosferatu means disease-carrying agent, the one who brings the plague. The ghost ship\
    \ arrives in Wismar with its mysterious cargo. A number of doctors, including ORG (PERSON), investigate the mysterious\
    \ events that have occurred on the ship. Meanwhile, PERSON is ravaged by a plague of rats, and death spreads rapidly through\
    \ the city. When PERSON finally returns to PERSON, he exhibits symptoms of an incurable illness and seems not to recognize\
    \ his wife, PERSON. She has an encounter with the reclusive Count. Desperate and condemned to immortality, PERSON begs\
    \ PERSON to give him some of the love she freely feels for PERSON. To the Count's despair, PERSON refuses. Once PERSON\
    \ discovers the true reason why death is ravaging PERSON, she tries to warn her fellow citizens. However, they pay little\
    \ attention. Thus, PERSON decides to destroy PERSON herself. To do this, PERSON lures the vampire to her bedroom so he\
    \ will drink her blood, which will cost her her life. PERSON's beauty and purity distract the Count, who doesn't hear\
    \ the rooster crow and dies with the first rays of sunlight. PERSON discovers PERSON's victorious corpse and finishes\
    \ off the Count by driving a stake through his heart. In a disturbing final twist, PERSON emerges from his mysterious\
    \ illness as a vampire and arranges for PERSON arrest. PERSON is last seen on horseback, enigmatically stating that he\
    \ still has much to do. Variations on PERSON Original Novel\r\nThis is not an exhaustive list and only attempts to give\
    \ an idea of ​​the differences between the novel and the film. The novel's setting is changed to the German town of Wismar\
    \ around 1838.\r\nPERSON becomes PERSON.\r\nThe characters of PERSON and PERSON are omitted.\r\nPERSON is ORG's boss.\r\
    \nPERSON brings the plague and destroys the town.\r\nPERSON turns PERSON into a vampire.\r\nPERSON does not transform.\r\
    \nThere is special attention to the psychic connection between PERSON and PERSON.\r\nPERSON must sleep during the day,\
    \ and sunlight is lethal to him."
  sentences:
  - 'A young ne''er-do-well, Lightfoot steals a car. Elsewhere, an assassin attempts to shoot a preacher who is delivering
    a sermon at his pulpit. The preacher escapes on foot. Lightfoot, who happens to be driving by, inadvertently rescues the
    preacher by running over his pursuer and giving the preacher a lift. They steal a series of cars, patronizing prostitutes,
    and escape another attempt on their lives by two men. Lightfoot learns that the minister is a notorious bank robber (known
    as The PERSON for his use of an ORG 20 PERSON cannon to break into a safe) who has been hiding out in the guise of a clergyman
    following the robbery of a GPE bank. PERSON tells PERSON that the ones trying to kill him are members of his gang who
    mistakenly think PERSON double-crossed them.  PERSON is the only member of the gang who knows where the loot is hidden.
    He and Lightfoot journey to GPE, GPE, to retrieve the money hidden in an old one-room school. They discover the schoolhouse
    has been replaced by a brand-new school. PERSON and PERSON are abducted by the men who were pursuing them: the vicious
    Red Leary and the gentle ORG. After being forced to drive to a remote location, PERSON wins a fistfight with ORG, after
    which PERSON explains that he never betrayed the gang. Lightfoot proposes another heist: robbing the same company as before,
    but without the gang''s electronics expert, ORG, the man PERSON hit with his car. In the city where the bank is located,
    the men find jobs to raise money for needed equipment while they plan the heist. When the robbery begins, PERSON and ORG
    hold the vault manager at gunpoint in his home and force him to reveal the access codes to the outer doors of the safe.
    Lightfoot, dressed as a woman, distracts the ORG office''s security guard, deactivates the ensuing alarm, and is picked
    up by PERSON. Like the first heist, PERSON uses an anti-aircraft cannon to breach the vault''s wall, and the gang escapes
    with the loot. They flee in the car, with ORG in the trunk, to a nearby drive-in movie in progress. After hearing a sneeze
    from the trunk and seeing a shirttail protruding from the trunk lid, the theater manager suspects someone is hiding in
    the trunk to avoid paying and so goes to investigate. As wailing police cars begin to close in on the drive-in theater
    and as the theater manager gets nearer, Red becomes increasingly agitated and PERSON drives out of the drive-in, encountering
    police at the exit. During the ensuing chase, PERSON is shot as the police open fire on the vehicle. Red, callous as ever,
    throws him out of the trunk onto a dirt road, where he dies. Red then forces PERSON and PERSON to stop the car. He pistol-whips
    them both, knocking them unconscious, and kicks PERSON in the head. Red takes off with the loot in the getaway car but
    is again pursued by police, who shoot ORG several times, causing him to lose control of the car and crash through the
    window of a department store, where he is attacked and killed by the store''s vicious watchdog. Recovered from the beating,
    PERSON and Lightfoot make their way toward the highway, though GPE has begun to display signs of brain damage.  They hitch
    a ride the next morning and are dropped off near GPE, GPE, where they stumble upon the one-room schoolhouse, which is
    now a historical monument on the side of a highway, having been moved there from its original location after the first
    heist. As the two men retrieve the stolen money, PERSON''s behavior becomes erratic as a result of the beating. PERSON
    buys a new ORG convertible with cash, something PERSON said he had always wanted to do, and picks up his waiting partner,
    who is gradually losing control of the left side of his body. As they drive away celebrating their success with cigars,
    PERSON, in obvious distress, tells PERSON in a slurred voice how proud he is of their accomplishments, then slumps over
    and dies. Thunderbolt snaps his cigar in half (as it is no longer a celebration) and, with his dead partner beside him,
    drives off down the interstate and into the distance.'
