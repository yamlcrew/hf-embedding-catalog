  - source_sentence: Born in GPE, PERSON, PERSON is a young schoolboy from a farming family living in the nearby village of
      GPE. PERSON has a knack for repairing radios for his friends and neighbors and spends his free time scavenging for salvageable
      electronic components at the local junkyard. Although he is soon barred from attending school due to his parents' inability
      to pay tuition, PERSON blackmails his science teacher (who is secretly involved with PERSON's sister) into allowing
      him to continue attending classes and access the school library, where he learns about electrical engineering and energy
      production. In the mid-2000s, the family's crops fail due to drought. The resulting famine devastates PERSON's village,
      sparking riots over government-imposed rationing and widespread theft as people scavenge for food. PERSON's family is
      stripped of their already meager grain reserves. People soon begin to leave the village, and PERSON's sister elopes
      with her former teacher, leaving her family with "one less mouth to feed." Seeking to save his village from drought,
      PERSON devises a scheme to design a working prototype, but to build a larger windmill, PERSON needs his father, ORG,
      to give him permission to dismantle the family bicycle for parts—the only bicycle in the village and the family's last
      major asset. His father believes the attempt is futile and destroys the prototype, forcing PERSON to work hard in the
      fields. After PERSON's dog dies of starvation and all hope seems lost, PERSON's mother, LOC, intervenes and urges his
      father to reconsider. PERSON and his father reconcile after PERSON buries his dog. With the help of his friends and
      the few remaining villagers, they build a full-size windmill, leading to a successful harvest. Word gets around about
      PERSON's windmill and he is awarded a scholarship to attend school, eventually receiving a degree from ORG.
