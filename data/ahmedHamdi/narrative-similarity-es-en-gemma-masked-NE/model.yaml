- source_sentence: The film follows the career of PERSON, from his beginnings as a comic book artist in postwar occupied GPE,
    to his meeting with his idol PERSON, and his invention of the gekiga genre of Japanese comics for adults. Interwoven with
    biographical material are segments based on PERSON's short stories "Hell," "Beloved Monkey," "Just a Man," "Good-Bye,"
    and "Occupied.
  sentences:
  - At the reading of their father's will, wealthy sisters PERSON and PERSON discover that they are bankrupt and are forced
    to sell their house to their half-brother PERSON, who lets them live with him and his wife, GPE. After GPE tries to move
    them into the basement, the girls leave the house and move in with their maternal aunt, GPE, in GPE. PERSON quits law
    school and finds a job as a legal clerk to help support herself and PERSON. PERSON returns to college, where she meets
    and flirts with rich instructor ORG while being admired from afar by GPE's neighbor PERSON. PERSON arrives at her new
    job and learns that her boss is GPE's brother PERSON, who she falls in love with. The bulk of the film consists of a series
    of romantic escapades between the girls and their boyfriends, set against the backdrop of various parties and the Mexican-American
    cultural environment of LOC. In the end, PERSON admits her feelings for PERSON and they kiss for the first time. PERSON
    buys the house across from GPE and presents PERSON the front door key, attached to an engagement ring. Family and friends
    are seen celebrating at PERSON and PERSON's street party wedding.
  - ' The film follows the career of PERSON, as he begins to work as a comics artist in post-war occupied GPE, meets his idol
