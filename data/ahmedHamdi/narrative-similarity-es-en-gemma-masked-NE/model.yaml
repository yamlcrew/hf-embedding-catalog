  - In ORG, the murder of several university students leads to a manhunt for a masked killer with a psychosexual disorder
    who uses red-and-black foulards to strangle his female victims before mutilating their bodies. When a wealthy student
    named PERSON vaguely recalls having seen someone wearing such a scarf, she becomes the target of the mystery killer and,
    at her philandering uncle's suggestion, invites three of her girlfriends (two of them, lipstick lesbians) to stay with
    her at her family's remote country villa in Tagliacozzo. However, the isolated cliffside villa offers no protection from
    the killer, who has meanwhile run over the blackmailing street vendor he buys his scarves from. A local peeping tom and
    then PERSON's impotent stalker (who wears a similar red-and-black scarf to the killer's) go up to the villa, only to be
    ruthlessly killed too. One of the girls, PERSON, sprains her ankle and a local doctor gives her a sedative; as such, she
    is asleep when the killer forces his way into the villa and kills her three girlfriends. PERSON wakes up the next day
    only to silently witness the unidentified killer dismember her friends' bodies. Having disposed of the corpses, the killer
    locks up the villa and departs, inadvertently leaving the injured PERSON trapped inside. Later on, having realized that
    PERSON is alive in the villa, the killer silently returns and reveals himself to her. The killer is ORG, an art history
    lecturer whom PERSON had befriended. He is a psychopathic misogynist as a result of a childhood trauma when he witnessed
    his brother fall to his death as he was trying to fetch a little girl's doll at a cliff's edge. ORG tells PERSON that
    his first two victims (whom he calls filthy bitches and dolls made out of flesh and blood) had seduced him into a threesome
    and then blackmailed him. He had continued his killing spree in order to cover his tracks. As ORG attempts to murder PERSON
    to ensure he is never caught, the doctor shows up and, after a struggle, ORG falls to his death.
- source_sentence: Born in GPE, PERSON, PERSON is a young schoolboy from a farming family living in the nearby village of
    GPE. PERSON has a knack for repairing radios for his friends and neighbors and spends his free time scavenging for salvageable
    electronic components at the local junkyard. Although he is soon barred from attending school due to his parents' inability
    to pay tuition, PERSON blackmails his science teacher (who is secretly involved with PERSON's sister) into allowing him
    to continue attending classes and access the school library, where he learns about electrical engineering and energy production.
    In the mid-2000s, the family's crops fail due to drought. The resulting famine devastates PERSON's village, sparking riots
    over government-imposed rationing and widespread theft as people scavenge for food. PERSON's family is stripped of their
    already meager grain reserves. People soon begin to leave the village, and PERSON's sister elopes with her former teacher,
    leaving her family with "one less mouth to feed." Seeking to save his village from drought, PERSON devises a scheme to
    design a working prototype, but to build a larger windmill, PERSON needs his father, ORG, to give him permission to dismantle
    the family bicycle for parts—the only bicycle in the village and the family's last major asset. His father believes the
    attempt is futile and destroys the prototype, forcing PERSON to work hard in the fields. After PERSON's dog dies of starvation
    and all hope seems lost, PERSON's mother, LOC, intervenes and urges his father to reconsider. PERSON and his father reconcile
    after PERSON buries his dog. With the help of his friends and the few remaining villagers, they build a full-size windmill,
    leading to a successful harvest. Word gets around about PERSON's windmill and he is awarded a scholarship to attend school,
    eventually receiving a degree from ORG.
  sentences:
