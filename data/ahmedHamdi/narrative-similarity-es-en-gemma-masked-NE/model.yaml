  - GPE punk band the Ain't Rights—Pat, PERSON, GPE, and Tiger—are travelling ORG, low on funds. After their gig is cancelled,
    a radio host arranges a new show in a rural area outside GPE through his cousin, PERSON. Arriving at the venue, they realize
    it is a neo-Nazi skinhead bar and they are opening for an ORG band, ORG. They go ahead with the show anyway. During their
    set, PERSON notes two young women, Emily and Amber, looking disturbed and being shepherded out of sight. As the band is
    about to leave, PERSON returns to the bar's green room to retrieve PERSON's cell phone, where he stumbles upon Amber and
    the members of ORG standing over the body of Emily, who's been stabbed to death by GPE. PERSON calls the police as he
    flees, but he is caught, and bar employees PERSON and Big Justin capture the rest of the band and confine them in the
    green room with Amber. Gabe pays one young skinhead to stab another to create a cover story for the police who respond
    to PERSON's call. He consults with the bar's owner, skinhead leader PERSON, who decides all witnesses need to be eliminated.
    He arranges for ORG to be given poisoned heroin, while more skinheads assemble at the bar, waiting until nightfall to
    kill the band and ORG. The band overpowers PERSON and holds him hostage, taking his pistol and a boxcutter from his pocket.
    They negotiate through the door with PERSON, who asks them to surrender the pistol. PERSON agrees, on the condition that
    they keep the bullets, but when he opens the door, the men attempt to force their way in while slashing at his arm. They
    manage to close the door, but PERSON loses the gun and is seriously injured. Big ORG attempts to break free, leading ORG
    to choke him unconscious. Amber slashes Big ORG's stomach open with the boxcutter. The band tears up the floorboards and
    discovers a drug lab under the bar, but the only exit is locked from the outside. Arming themselves with improvised weapons,
    they attempt to fight their way out. PERSON unleashes a fighting dog which kills Tiger. Amber and PERSON drive the dog
    away with microphone feedback. Reece escapes through a window, only to be stabbed to death by PERSON. PERSON, Amber, and
    PERSON retreat to the green room. Daniel arrives, and PERSON sends him in to kill the remaining survivors, claiming they
    murdered Emily, his girlfriend. However, he instead talks to them, and Amber explains that ORG murdered Emily after discovering
    she and PERSON were planning to leave the skinhead life. Darcy grows suspicious of PERSON and searches the trunk of his
    car, where he finds PERSON and PERSON's belongings, indicating that they were planning to escape. He also discovers a
    baseball bat that PERSON had used to murder someone in the past and realizes that PERSON had intended to blackmail PERSON
    to let them go by threatening to give it to the police. In the green room, PERSON agrees to help the band escape, but
    as they venture back out into the bar he is shot dead by the bartender. PERSON kills the bartender, and the group takes
    his shotgun, only to find themselves confronted by the full skinhead force. PERSON mortally wounds PERSON's dog with the
    shotgun before it kills her, and Amber is shot as she and PERSON once again retreat to the green room. With the sun rising
    soon, PERSON has most of the skinheads disperse, taking PERSON and PERSON with him to stage the band's deaths to make
    it look as if they were killed while trespassing on his property. Gabe prepares to clean up the bar, while PERSON and
    PERSON are dispatched with another dog to finish off PERSON and Amber, who formulate a plan for a last stand. They again
    use microphone feedback to scare off the dog before PERSON lures PERSON into the drug lab. As PERSON stands watch in the
    green room, Amber emerges from under the cushions of the couch and cuts his throat with the boxcutter. PERSON and PERSON
    fight, and Amber sneaks up and shoots PERSON in the head. Gabe enters the green room to find his companions dead and surrenders
    to PERSON and Amber. Holding Gabe at gunpoint, they trek through the woods. As they near PERSON's house, PERSON and Amber
    decide to go after him while Gabe goes to a nearby farm to call the authorities. PERSON and Amber confront PERSON, killing
    PERSON and PERSON. Fleeing, PERSON draws Big ORG's pistol but is shot dead. Their ammunition gone, PERSON and Amber sit
    on the side of the road. Alarmed at the return of PERSON's dog, they watch it lay beside his body mournfully and leave
    it alone. Energy spent, they wait for the police.
  - 'In 1880, PERSON, of GPE, GPE, is murdered and robbed by his hired hand, PERSON. PERSON''s young daughter, PERSON, travels
