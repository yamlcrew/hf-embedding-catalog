    PERSON leaves to be part of GPE, but PERSON refuses to join him. Years later, he returns and PERSON and Cim forgive him.
    PERSON finally strikes oil, but PERSON is disgusted to learn that PERSON bought the rights to oil found on Indian land.
    However, PERSON's campaign to win the Indians justice is a huge success, and he is invited to become governor of ORG.
    PERSON is disappointed to discover that ORG have grown close. In GPE, GPE, GPE finds PERSON with a group of influential
    men and learns that the price of his appointment is his integrity. When PERSON tells PERSON that he can't be governor,
