  widget:
  - source_sentence: 'Represent the plot: Several years after the events of A Better Tomorrow, Sung Tse-ho (Ti Lung) is offered
      early parole by the police in exchange for spying on his former boss and mentor, Lung Sei (Dean Shek), who is suspected
      of running a counterfeiting operation. Inspector Wu (Lau Siu-ming), leader of the anti-crime task force, wants to mark
      his retirement by capturing a high-profile criminal like Lung. However, Ho, still loyal to Lung, initially declines.
      He changes his mind when he discovers that his younger brother, Sung Tse-kit (Leslie Cheung), is working undercover
      on the same case, and agrees to go undercover to protect his brother, who is expecting a child with his wife Jackie
      (Emily Chu). While working on the case, the two brothers reunite and agree to work together on the investigation. After
      being framed for murder, Lung seeks Ho''s help, who assists him in escaping to New York. However, Lung suffers a psychotic
      break and is institutionalized after learning of his daughter''s murder and witnessing his friend''s death. Meanwhile,
      Ho learns that Mark Lee has a long-lost twin brother, Ken (Chow Yun-fat), a former gang member who legitimately left
      Hong Kong as a teenager to travel across America, eventually settling down and opening a restaurant in New York City.
      Ho locates Ken and enlists his help to free Lung and nurse him back to health. Ken and Lung (still catatonic) hide in
      an apartment building. During a shootout with gangsters, they are cornered, but Lung regains his composure and kills
      the last of the Americans pursuing them. Both return to Hong Kong and connect with Ho and Kit. The group discovers that
      one of Lung''s employees, Ko Ying-pui (Kwan Shan), is responsible for attempting to kill Lung and has taken over the
      organization in his absence. Lung resolves that he would rather destroy his organization with his own hands than let
      it fall into disgrace and ruin, and the team begins to devise a plan against Ko. After conducting reconnaissance at
      Ko''s mansion, Kit is mortally wounded at the same time his daughter is born. He is rescued by Ken, who tries to take
      him to the hospital. Knowing he won''t make it, Kit convinces Ken to stop at a phone booth to call his wife. After attending
      Kit''s funeral, Ho, Ken, and Lung take revenge on Ko by attacking his mansion during a meeting with a counterfeiter
      client. A massive shootout ensues. The three, assisted by Ho''s former boss at the taxi company, kill approximately
      90 other people (including Ko), but all are seriously wounded in the process. When the shooting ends, the three men
      sit down in the mansion and are surrounded by police, led by Inspector Wu. Seeing the men''s condition, Wu gestures
      to the other officers to lower their weapons. Ho remarks that Inspector Wu shouldn''t withdraw yet, as "there''s still
      a lot of work to be done.'
    sentences:
    - 'Represent the plot: Several years after his arrest, Sung Tse-ho is offered early parole by the police in exchange for
      spying on his former boss and mentor, Lung Sei, who is suspected of heading a counterfeiting operation. Inspector Wu,
      the leader of the task force, wants to mark his retirement with the capture of a high profile criminal like Lung. Though
      Ho initially declines because of his loyalty to Lung, he eventually changes his mind when he discovers that his younger
      brother, Kit, who is expecting a child along with his pregnant wife Jackie, is working undercover on the same case.
      While working the case, the two brothers meet and agree to work together. After being framed for murder, Lung seeks
      Ho''s help, who is able to help him escape to New York. However, Lung suffers a psychotic break and is institutionalized
      after receiving news of his daughter''s murder and witnessing the death of a friend. Meanwhile, Ho learns that his deceased
      friend Mark Lee has a long-lost twin brother, Ken, a former gang member who left Hong Kong as a teenager to travel across
      America, eventually opening a restaurant in New York City. Ho then locates Ken and enlists his assistance in freeing
      Lung. Targeted by both assassins attempting to kill Lung as well as American mobsters looking to extort Ken, Ken and
      a catatonic Lung take refuge in an apartment building where Ken arms himself. During a shoot-out with their attackers,
      Ken and Lung find themselves cornered; seeing Ken in trouble snaps Lung out of his stupor, and he kills the last of
      their pursuers. The two return to Hong Kong and regroup with Ho and Kit. The group discovers that one of Lung''s employees,
      Ko Ying-pui, is responsible for attempt on Lung''s life and has since taken over the organization in Lung''s absence.
      Lung decides that he would rather destroy his organization with his own hands than let it fall into dishonor and ruin,
      and the group starts planning to act against Ko. After scouting out Ko''s mansion alone, Kit is fatally wounded, but
      is rescued by Ken, who attempts to rush him to the hospital. Knowing that he will not make it however, Kit persuades
      Ken to stop at a phone booth to call Jackie, where he manages to name his newborn child Sung Ho-yin (the Spirit of Righteousness)
      before succumbing to his wounds. After attending Kit''s funeral, Ho, Ken, and Lung take revenge on Ko by attacking his
      mansion during a meeting with a counterfeiting client. The three manage to kill Ko and several of his men following
      an intense shootout, but are all critically wounded in the process. Following the shootout, the three men sit down in
      the mansion and are surrounded by the police forces led by Inspector Wu. Upon seeing the condition of the men, Wu orders
      his men to stand down, while Ho remarks against Inspector Wu''s retirement, as there is much work left for [him] to
      do.'
    - 'Represent the plot: Three young confidence tricksters— Vinnie, Carter and Rosie — pull off a racing scam, substituting
      winners for plodders and winning big money on long odds. When an official uncovers the scam, they set him up for blackmail.
      Twenty years later, Carter and Rosie are married, successful racers in Kentucky about to sell their prize stallion,
      Simpatico. Vinnie, meanwhile, is a drunk in Pomona. Vinnie decides to make a play for Rosie, lures Carter to California,
      steals his wallet and heads for Kentucky with the original blackmail material. Carter begs Vinnie''s friend, a grocery
      clerk named Cecilia, to follow Vinnie and recover the material that he has in a box.'
    - 'Represent the plot: In Las Vegas, LVMPD policemen Vincent Downs and his partner Sean Cass rob a shipment of cocaine
      belonging to entrepreneur Stanley Rubino, who intended to sell it to mobster Rob Novak, the son of a powerful mob boss.
      The two cops volunteer to investigate the robbery in order to cover up their involvement, clashing with Internal Affairs
      investigators Jennifer Bryant and her superior Doug Dennison, who are suspicious of the pair. Vincent is estranged from
      his wife Dena, who is getting remarried, and has minimal involvement in the life of his 16-year-old son T. While driving
      T to a soccer game, Vincent is ambushed by Rubino''s men, who stab him in the abdomen and kidnap his son - demanding
      the stolen cocaine back in exchange for T''s life. Vincent retrieves the cocaine from Cass, places it in a duffel bag,
      and leaves it in the ventilation shaft of one of the bathrooms in Rubino''s casino, hoping he can negotiate his son''s
      release before handing over his leverage. He is unknowingly followed by Bryant, who, now convinced he is a dirty cop,
      retrieves the bag and hides it in the women''s locker room nearby. Without the drugs, Vincent is forced to present Rubino
      with bags of sugar to ensure T''s safety, but Novak uncovers his ruse, and T is recaptured by Rubino''s men, while Vincent
      manages to escape. Meanwhile, after coming up empty while searching the casino for Vincent, Dennison is convinced he''s
      gotten away and directs Bryant to go home and get some sleep. Bryant gives him the key to the women''s locker with the
      cocaine and heads for the exit. Vincent enters the casino as a janitor, but crosses paths with Bryant on her way out
      and is chased into one of the hotel rooms. They fight, and he subdues her before revealing he''s been undercover on
      behalf of Internal Affairs for the last two years to dismantle the crime ring within the police department. He knows
      Cass is a drug-runner, knew details about a previous investigation by Bryant, and is now attempting to find the senior
      member of law enforcement that is covering everything up. A skeptical Bryant directs him to the locker room to retrieve
      the cocaine, but the drugs have recently been removed by Dennison. Dennison ambushes Vincent but is ultimately overpowered
      and knocked unconscious. Meanwhile, T escapes and steals Rubino''s cellphone to contact Vincent, but is quietly being
      followed by Rubino and his men who allow it all to happen in an attempt to lure Vincent into a trap. Elsewhere, Dena
      finds out Vincent and T are in danger and heads to the casino. Cass arrives and confronts Vincent about his Internal
      Affairs involvement, but then saves Vincent from one of Novak''s men. He is shot in the process and presumed dead. Vincent
      infiltrates the casino in a police uniform that Cass brought and finds out Dennison is the mole in the force upon going
      through Cass''s phone; Dennison is on Novak''s payroll and ordered Cass to kill Vincent after informing him that he
      was Internal Affairs. Bryant and Dennison later find a severely injured Cass in the garage. While Bryant checks the
      vitals of Novak''s man, Dennison privately questions Cass on whether Vincent is aware of his involvement and finishes
      him off when Cass refuses to answer. Vincent and T reunite just as Novak begins shooting up the casino and escape to
      the parking garage. In the ensuing shootout, Bryant arrests Rubino. Vincent and T attempt to escape in a stolen car,
      but are ambushed by Novak and his men, leading to a violent shootout. Dena arrives and kills Novak''s remaining henchman
      to save Vincent and T before Novak corners them. He shoots Vincent in the chest, but Vincent survives and fatally shoots
      Novak. Vincent then contacts Bryant and alerts her of Dennison''s corruption. She instantly attempts to apprehend Dennison
      but he shoots her. He then kills Rubino after questioning if Novak''s father ever mentioned him in his criminal dealings,
      then shoots dead the policeman driving the cruiser they are in, in order to cause the vehicle to crash, intending to
      frame Rubino for the incident. However, Bryant survives and exposes Dennison, who is promptly arrested. Vincent and
      Bryant are taken to the same hospital, where they make amends and congratulate each other on the job. Meanwhile, a corrupt
      DEA agent - seen earlier in the film - contacts Novak''s father and informs him that there has been a problem, implying
      that he will subsequently tell him about his son''s death.'
  - source_sentence: 'Represent the plot: When an old textile factory is reopened, strange deaths begin to occur among some
      employees. The deaths typically happen between 11 p.m. and 7 a.m., known as the last shift. Some employees sent to one
      of the basements to exterminate rats encounter a kind of giant rat, a monster responsible for the murders.'
    sentences:
    - 'Represent the plot: Ten-year-old Justin Whitter is abducted by an unknown force while riding his bike. Greg Harper
      is made lead detective on the case, assisted by Detective Spitzky. A green pocket knife is found at the scene, connecting
      the crime to a series of abductions committed 15 years prior by a man named Cole Gordon, who is now imprisoned. Greg
      and Spitzky are informed that Gordon is pushing for a mistrial in light of a new abduction. They go to speak with Tommy
      Braun, one of Gordon''s two surviving victims, but he becomes hysterical when he sees them. Greg''s wife, Jackie, recently
      had an affair, leading their only child, Connor, to resent her. Mysterious events occur in their house - items go missing,
      a repairman states he was let into the house by their daughter despite the couple not having a daughter, and Greg becomes
      trapped in a closet, but when Jackie frees him, Greg sees nothing blocking the door and no one else in the room. Jackie
      is visited by her former lover, Todd, who claims to be in love with her and encourages her to continue their affair.
      Jackie attempts to amicably end things with Todd before he is hit in the head by a mug, which Jackie assumes Connor
      threw at him. Jackie hides Todd in the basement and promises to take him to the hospital when she returns from driving
      Connor to school. Jackie nearly runs over Justin Whitter’s mother, who is standing in the driveway, visibly frail and
      distressed at the disappearance of her son. Mrs. Whitter says she knows Justin is still alive and Jackie reassures her
      that Greg will safely return him to her. While Jackie is gone, Todd is attacked again. Jackie returns to find Todd dead
      and assumes Connor was responsible. Jackie leads Greg to Todd''s body and confesses that he had visited earlier that
      day, but insists they just talked and their affair was over. Jackie suggests Connor killed him, perhaps unintentionally,
      and she and Greg bury him to protect Connor. At home, Connor discovers the missing silverware wrapped in clothing in
      the dryer. He receives a bizarre message on his computer as a masked person appears behind him. Greg and Jackie find
      Connor tied up in the bathtub with a green pocket knife next to him. Jackie takes Connor to the hospital. Through flashbacks
      it is revealed that the mysterious happenings in the house were caused by two homeless people, Mindy and Alec, who have
      been hiding in the Harper home. Mindy stays hidden while the family is present, but Alec decides to make them think
      they are going insane. Mindy witnesses Todd get murdered, where the assailant is revealed to be Greg, and goes to alert
      Alec, only to see Alec tying up Connor. She threatens to call the police, but he accidentally pushes her down the stairs
      before hiding her unconscious body in Greg''s car. After Jackie leaves to take Connor to the hospital, Greg drives away,
      unknowingly taking Mindy with him. When Mindy awakens, she discovers multiple green pocket knives and Justin''s shirt
      while searching Greg''s bag and realizes he is the kidnapper. When he parks in the forest, she sneaks out and tries
      to call 911, but cannot find a stable connection. She comes across an old trailer where Justin and another missing boy
      are trapped. As she tries to free them, Greg ambushes her, takes her home, and fatally shoots her. Greg is attacked
      by Alec but knocks Alec out, then stabs himself to make it seem like he was attacked by the two. Alec regains consciousness
      and fatally shoots Greg with his own gun. Spitzky arrives and shoots Alec in the shoulder, but the two realize that
      they recognize each other. Jackie and Connor arrive to find their home swarming with police. Spitzky discovers the bag
      of evidence in Greg''s car and the two boys are rescued. As Alec is carried to an ambulance, flashbacks show a younger
      Alec Travers and Tommy Braun encountering Greg, revealing that Alec was Greg''s other kidnapped survivor.'
    - 'Represent the plot:  Tom Thompson, 25, still lives with his mother. A former high school classmate''s mother, Ruth
      Abernathy, calls to say his best friend, Bill, committed suicide, asking him to give his eulogy. Not remembering him,
      nevertheless he agrees to be a pallbearer. Meanwhile, his high school crush, Julie DeMarco, reappears in town. At the
      funeral, Tom''s vague and impersonal eulogy confuses the Abernathys and amuses his friends. Julie, upset at their disrespect,
      tries to leave as they carry Bill''s casket out of the church. Tom drags the casket and the rest of the pallbearers
      after Julie. Asking if she knew Bill; she admits she didn''t but was saddened to see him in the casket. Asking her out
      upsets Bill''s relatives, so he''s forcefully relieved of his duties as pallbearer. Visibly upset, Ruth tells Tom he
      is in Bill''s will. Afterwards, Tom calls Julie and she requests Scott and Cynthia come along for a double date. At
      dinner, Julie and Scott click, while conversation between Tom and Julie is stilted. Scott mentions that Tom still lives
      with his mother. Disgusted by Scott, Tom reluctantly drives Julie home. Arriving, she reveals she remembers him in high
      school. As Tom leans in for a kiss, Julie turns and they knock heads. She apologizes for giving off the wrong signals,
      as she is moving away. Rejected at his second job interview, Tom goes to Ruth''s to help pack Bill''s room. Looking
      through old photos of Bill, they kiss and have sex. She tells him about Bill''s father, who died in the war. Tom tells
      Ruth about Bill''s fictitious love interest based completely on his own infatuation with Julie, and they continue to
      see each other. Tom spies on Julie working at a record store from his car. One day, at closing time, he sees her let
      Scott into the store, who then kisses her. When Scott sees Tom, he drives off. The next morning, Julie tells Tom about
      Scott''s kiss, not knowing he had witnessed it. Reminiscing about high school band, she tells him she wants to just
      drive away for a year to be on her own. Julie then invites Tom to a concert. Arriving at Ruth''s, Tom is rushed to an
      Abernathy family gathering. He realizes Ruth had overheard him talking to Julie about their date later that evening.
      When Tom''s car breaks down, Julie finds Ruth''s charm bracelet, so he tells her he has been helping Bill Abernathy''s
      mother since the funeral. She mistakenly assumes it''s an innocent friendship. After a tow truck takes Tom and Julie
      back to his house, as he sneaks into his mother''s room to get her car keys, she enters his room. Tom reveals he once
      wanted to dance with her at a school dance and she kisses him. Falling into Tom''s bed, Ruth calls, knowing Julie is
      there with him. When Tom seeks advice from Brad, he suggests mailing the bracelet with a letter to end things with Ruth.
      He does so and continues dating Julie. On her birthday, she asks him to meet her parents. That morning, Tom sees Ruth
      with the envelope and sneaks away. At brunch with Julie''s parents, her father disapproves of them. As Tom begs Julie
      to not leave for a year, Ruth barges into the restaurant, humiliating him. At Brad''s bachelor party, Tom makes a scene,
      telling him not to marry Lauren. Calling her an albatross around his neck and that Scott agrees. The next day, Scott
      apologizes to Tom and they reconcile. Talking about their childhood, they realize there was another Tom who moved away
      after junior high. So Tom brings the other Tom to Ruth, who appreciates the gesture to reminisce about her son. They
      both realize they needed someone at the time, Ruth mourning her son and Tom pining for his childhood crush. At Brad''s
      wedding, Tom patches his friendship with Brad approving of his marriage to Lauren, as Scott and Cynthia also reconcile.
      Tom also gives Julie his car keys for her trip. She hints that she wants to dance. Tom gets a job and moves into Julie''s
      apartment while she is on her trip.'
    - 'Represent the plot: In the prologue, the film depicts a panicky man who, for unknown reasons, murders his wife with
      a shotgun. The main storyline opens with Jack and Stephanie, a bickering young couple, who are lost while driving through
      the backwoods. We soon learn that they are on their way to meet a marriage counsellor. After getting bad directions
      from a state trooper, the couple get into a car accident when they run over some spiked metal in the road, which Jack
      dismisses as discarded scrap metal; they find another car which has experienced the same fate, but the occupants are
      missing. Forced to proceed on foot, Jack and Stephanie find the gothic Wayside Inn, where they try to phone for help.
      At the inn, they meet the occupants of the other car, the engaged couple Leslie and Randy.  Because the phones are inoperative,
      both couples are forced to spend the night at the inn, which is staffed only by the eccentric proprietor Betty, her
      creepy son Pete (who develops an instant attraction for Leslie), and the gruff caretaker Stewart. After a tense dinner,
      in which personalities clash, the group is terrorized by a legendary local figure, the Tin Man. Armed with a shotgun,
      the Tin Man attempts to get into the Wayside Inn. The staff locks the Tin Man out, and he responds by giving them a
      message scrawled on the side of a tin can. The message declares that he will kill everyone in the house unless they
      give him one dead body by sunrise. The staff, blaming their guests for attracting the Tin Man''s attention, attempts
      to lock them in the freezing meat locker, threatening to leave them there for weeks. A fight ensues, and the guests
      realize that there is a supernatural presence in the house when Betty is injured in the struggle and bleeds black fog.
      The couples escape the meat locker, but are unable to leave the house, which assaults them with terrifying visions involving
      their worst memories. For Jack and Stephanie, the visions involve their daughter, who died after falling through the
      ice in a skating accident. For Randy, the visions involve his abusive father. For Leslie, the visions involve an uncle
      named Pete, who sexually abused her when she was a little girl; these visions are intensified by the similar lusts of
      Pete who lives at the Wayside Inn. Confused by the visions, the four guests find themselves separated. Jack meets Susan,
      a young girl who has been held captive by the staff. Susan reminds Jack of his deceased daughter, especially after she
      claims to have been in contact with her spirit; Susan assures Jack, and later Stephanie, that their daughter is in a
      good place. Emotionally tormented by the visions, stalked by the homicidal Wayside staff, and under constant threat
      from the Tin Man, all four guests succumb to the various pressures and start to turn on each other. Shortly after they
      discover that the staff worships the Devil, Jack is split into two identical people; each seems to think of himself
      as the real Jack, yet each bleeds black mist when injured, making it impossible for anyone to figure out which is the
      real Jack and which is the doppelganger. The couples almost escape when they are aided by Officer Lawdale (the same
      state trooper who had given bad directions to Jack and Stephanie), but they are recaptured when Lawdale turns out to
      be working with the Wayside staff. Lawdale and the Wayside staff try to force the couples to appease the Tin Man by
      choosing one of themselves to kill. Past tensions initially lead the viewer to believe that Randy will resolve the situation
      by killing Jack, but he instead turns the gun on Susan with Leslie yelling at him to kill her. Jack hits the table Randy
      is standing on and the shot is deflected. Leslie grabs a knife and accidentally stabs Randy after seeing a hallucination
      of her uncle. In retaliation, Randy shoots Leslie and they both die. Jack and Stephanie watch as Lawdale turns the gun
      on Susan. Susan tells them Melissa is safe and loves them both. Lawdale shoots and Susan is hit. Jack and Stephanie
      run to Susan''s body as light emits from the bullet hole. Jack and Stephanie force Susan''s light at Lawdale and destroy
      him. Finally able to escape the inn, Jack and Stephanie trek back to their car, where they discover their bodies, as
      well as the dead bodies of Leslie and Randy while police officers and EMT''s talk about the crash of their two vehicles.
      Jack and Stephanie realize that their entire experience at the inn was a shared out of body experience. As their souls
      re-enter their bodies, Jack and Stephanie wake up and are taken away in an ambulance. They are watched over by a resurrected
      Susan, who observes that their love for each other has been reawakened by the events at the Wayside Inn.  As the couple
      ride off in an ambulance, Jack looks out the window to see Lawdale laughing at him from the front gate of the Wayside,
      with the caretakers watching out of an upstairs window.'
  - source_sentence: 'Represent the plot: Years after heroically saving the lives of passengers on a plane whose crew fell
      ill from alcohol poisoning, Ted Striker works as a test pilot for the new lunar shuttle, Mayflower One. However, he
      is committed to a mental institution after crashing his test aircraft, despite not being at fault. When he learns that
      the same type of spacecraft will be used for the first commercial lunar flight, he escapes and tries to stop it by any
      means necessary.'
    sentences:
    - 'Represent the plot:  In 2600 BC, the tyrannical king Ahk-Ton of Kahndaq enslaves his people to mine the mythical metal
      Eternium, using it to forge the Crown of Sabbac to attain power and invincibility. After attempting to stage a revolt,
      a young slave boy is given the powers of Shazam by the Council of Wizards, transforming him into Kahndaq''s heroic champion.
      He kills Ahk-Ton, ending his reign. In the present day, Kahndaq is oppressed by the Intergang, a criminal organization,
      as Adrianna Tomaz, an archaeologist, tries to locate the Crown of Sabbac with her brother Karim and colleagues Samir
      and Ishmael. Inside the tomb, Adrianna obtains the crown, but the Intergang troops kill Samir. As a last resort, she
      reads an incantation that awakens Teth-Adam from slumber. US government official Amanda Waller deems Adam a threat after
      he slaughters the Intergang troops, she contacts the Justice Society to apprehend him. Justice Society members Hawkman,
      Doctor Fate, Cyclone, and Atom Smasher stop Adam''s killing spree and explain to Adrianna that Adam was not a savior
      but an imprisoned killer. Ishmael reveals himself as the leader of Intergang''s Kahndaq division and kidnaps Adrianna''s
      son Amon, who has hidden the crown. Ishmael reveals himself to be the last descendant of Ahk-Ton. The group finds the
      crown and gives it back to save Amon. Ishmael attempts to shoot Amon, causing Adam to lose control, killing Ishmael
      and wounding Amon. Guilt-ridden, Adam flees and reveals to Hawkman that it was Adam''s son, Hurut, who was granted Shazam''s
      powers. Knowing that Hurut was invincible, Ahk-Ton instructed assassins to execute Hurut''s family. Hurut gave his father
      his powers to save his life and Ahk-Ton''s assassins immediately killed the de-powered Hurut, causing an enraged Adam
      to massacre the king''s men and destroy his palace. Deemed unworthy by the Council of Wizards, Adam killed them all
      in anger except for Shazam, who imprisoned him along with the Crown of Sabbac. Feeling incapable of becoming a true
      hero, Adam surrenders and the Justice Society takes him to a secret underwater Task Force X black site in Antarctica,
      where Emilia Harcourt places him in stasis. Fate again has a premonition of Hawkman''s impending death. The Justice
      Society realizes Ishmael intentionally provoked Adam to kill him in order to be reborn as Sabbac, the champion of the
      six eponymous demons. When Sabbac summons the Legions of Hell to terrorize Kahndaq, the Justice Society unsuccessfully
      attempts to stop Sabbac. Fate believes that Hawkman''s death can be avoided with his sacrifice and fights Sabbac alone.
      Fate uses astral projection to release Adam before he is killed by Sabbac. Meanwhile, Amon, Adrianna, and Karim rally
      the people to fight the Legions of Hell. Sabbac overpowers Hawkman, but Adam arrives in time to kill Sabbac, causing
      the Legions of Hell to disappear. The Justice Society departs on good terms with Adam, who destroys the old throne in
      the belief that Kahndaq needs a protector, not a ruler. He adopts a new name: Black Adam. In a mid-credits scene, Waller
      warns Adam against leaving Kahndaq and sends Superman, who offers to negotiate with him.'
    - 'Represent the plot: Joseph Megessey (known to most as Megs) is a Vietnam war veteran suffering post-Vietnam stress
      syndrome who is having trouble fitting in with society. He takes on the responsibility of drawing Dave, a fellow veteran
      who has become an alcoholic, out of his shell by coaxing him to enjoy life again, as well as urging him to face up to
      some of his darker memories. Megs finds himself attracted to Dave''s meek sister Martha, who lives with Dave and looks
      after him. This attraction leads to a love affair, much to Dave''s disapproval. Dave eventually vents his anger and
      frustration at a high school prom where Martha is a chaperone being accompanied by Megs. This leads to Dave finally
      facing his demons and acknowledging Megs and Martha for being there for him. Afterwards, despite initially ending what
      was a promising romance, Megs returns to Martha.'
    - 'Represent the plot: In the near future, the Moon has been colonized and supports a station on its surface. A lunar
      shuttle known as Mayflower One is being rushed to launch from Houston. The head of the ground crew, The Sarge, does
      not like what is occurring, but he defers to airline management. On the flight crew are Captain Clarence Oveur, navigator/co-pilot
      Unger, and first officer/flight engineer Dunn. Also on board is computer officer Elaine Dickinson. Having dumped Ted
      Striker, Elaine is now engaged to Simon Kurtz, a member of the flight crew, and Ted has been committed to an insane
      asylum. He was declared mentally incompetent in a lawsuit following a test flight that Ted piloted and in which the
      lunar shuttle crashed. Ted believes the lawsuit was meant to silence him regarding dangerous safety issues related to
      the lunar shuttle. He is again haunted by his actions in The War – specifically the loss of his entire squadron above
      Macho Grande – resulting in a relapse of his drinking problem. When Ted learns of the lunar shuttle''s upcoming launch,
      he escapes the asylum and buys a ticket for the flight. During the flight, Mayflower One suffers a short circuit, causing
      the artificially intelligent computer, ROK, to go insane and send the ship toward the Sun. Unger and Dunn try to deactivate
      the computer, but are blown out of an airlock. Oveur tries to stop ROK, but the computer gasses him. Simon abandons
      Elaine and leaves in the sole escape pod. Once again, Ted is called upon to save the day, but he must first figure out
      how to wrest control of the shuttle from the computer. Air traffic controller Steve McCroskey reveals that passenger
      Joe Seluchi had boarded with a bomb in a briefcase, intent on committing suicide to provide an insurance payout for
      his wife. Ted manages to wrestle the bomb from Joe, uses it to blow up ROK, and sets course for the Moon as originally
      intended. The computer''s destruction results in collateral damage to the shuttle; the flight is not yet out of danger.
      En route to the Moon, flight control shifts to a lunar base under the command of Commander Buck Murdock. Contemptuous
      of Ted because of Macho Grande, he nonetheless agrees to help and they manage to land the craft safely on the Moon.
      Ted and Elaine fall back in love and are married at the end. After the wedding, Joe looks into the cockpit and asks
      for his briefcase back. A post-credit message – Coming from Paramount Pictures: Airplane III – inspires Murdock to remark,
      That''s exactly what they''ll be expecting us to do!'
  - source_sentence: 'Represent the plot: Delphine is a sensitive and tormented bestselling novelist, paralyzed by the thought
      of having to start writing a new book. Her path then crosses with that of Elle, a charming, intelligent, and intuitive
      young woman. Elle understands Delphine better than anyone, and soon becomes her confidante. Delphine trusts Elle and
      opens the doors of her life to her. But who is Elle really? What are her intentions? Has she come to give Delphine''s
      life a new lease on life or to take it away?'
    sentences:
    - 'Represent the plot:  Finally friends, Brad Whitaker and Dusty Mayron co-parent Dusty''s two children, Megan and Dylan,
      who take turns at each father''s house. Dusty has remarried to Karen, a doctor/novelist, and is a stepfather to her
      daughter Adrianna. The men decide to have a joint Christmas rather than separate ones, after Megan embarrassingly admits
      she would prefer one together Christmas. Dusty''s tough fighter pilot/Space Shuttle astronaut father Kurt and Brad''s
      overbearing and cheerful father, Don, unexpectedly arrive for Christmas. Megan and Dylan warmly embrace Don, as he is
      very present in their lives, while Kurt hasn''t seen them since they were toddlers. From his envy of the affection the
      children show Don, Kurt rents a large cabin through Airbnb, to house them all through the holiday week. Brad and Dusty''s
      co-parenting is put to the test by Kurt''s meddling. Dusty''s beef with Kurt mainly stems from the fact that he was
      rarely there for him as a child. Especially painful was when, during a youth Glee Club recital he embarrassed himself
      by missing his solo part when Kurt left to make out with a woman during his part. Sara, meanwhile, tries to bond with
      Karen, but is appalled by her shoplifting clothes from a store and not caring if Adrianna and Megan drink alcoholic
      eggnog. She later becomes concerned Don isn''t with his wife, who he claims couldn''t come as she was staying home to
      take care of her ill brother. Dylan develops a crush on a little girl staying in the cabin next door, causing Megan
      and Adrianna to constantly tease him in front of her. Brad gives him some advice, and Dusty interjects when he thinks
      Brad is having what looks like the talk with Dylan, although they had agreed to do it together. As the trees on the
      Christmas tree farm are small, Kurt suggests they illegally go on to private property to cut one down. Brad mistakes
      a cell phone tower for a tree and is electrocuted. After bowling, the family takes the kids to see Santa. There, Kurt
      tries to convince Dylan to ask Santa for a shotgun, but Don talks him out of it. Megan, however, wants one instead and
      is granted permission after Kurt makes a sexist comment. Out hunting the next day, Megan accidentally shoots Kurt in
      the shoulder, sending him to the hospital. While Kurt is down, she shoots two turkeys, surprising him. Sara confronts
      Brad over Don''s odd behavior, but he refuses to believe her. Brad, Dusty, Don and Kurt go to an improv comedy club,
      where they have a good time until Kurt picks up a woman at the bar, annoying Dusty. Brad enters Don into the improv
      show, and Dusty chooses the topic of a husband confronting his cheating wife as the subject of the skit. As it progresses,
      it is revealed that Don and his wife are divorced, much to Brad''s shock. Sara comforts Don about his divorce, but when
      Dusty reveals his part in the skit, Don and Brad become furious and Dusty and Brad''s relationship becomes strained.
      Brad, attempting to get back at Dusty, invites Adrianna''s father, Roger, who intimidates Dusty. The entire family takes
      part in a live nativity. Brad fights with Dusty because he wants to play Joseph. A drunken Megan begins to swear, and
      an equally drunk Adrianna falls from her platform, then the crowd breaks up. Instead of Dusty fighting Brad, he almost
      fights Roger, and Don is repeatedly hit in the face with ice-balls. On Christmas Day the families, depressed from all
      the arguing, pack up to leave. On their way out of town, they are forced back due to a blizzard, taking shelter at a
      movie theater. They see Missile Tow, a holiday action comedy film starring Liam Neeson. When the power cuts off during
      the movie, everyone goes to the lobby where each man confronts his father about his secrets, lies, and attitudes, and
      reconcile. Remembering advice given to him by Kurt, Dylan walks toward the girl he has a crush on to kiss her, but instead
      kisses Adrianna. Kurt pushes Dusty to stand up to Adrianna and punish her for her recent behavior, but he instead tells
      her he loves her. He then tells Roger that loving Adrianna means loving her real father as well as he is also part of
      the family. Roger almost leaves without Adrianna. However, he has a change of heart after everyone breaks out into a
      song of Do They Know It''s Christmas? (during which the power comes back on) and he decides to stay.'
    - 'Represent the plot: Lord Ting Chung is hired to escort a woman''s sick brother to the doctor, but he does it for free.
      To get there they must pass through Stormy Hills, an area of Ancient China controlled by criminals. Then the sick man
      turns out to be the king of the criminals and is not really sick; he is just trying to reclaim his throne from an imposter.
      The king had previously murdered Ting Chung''s father, and now Ting Chung has to fight for his life to get out and also
      to avenge his father.'
    - 'Represent the plot: The film focuses on writer Delphine (Seigner), who achieved her first career success, publishing
      her debut novel dedicated to her mother. However, she soon starts receiving anonymous letters accusing her of exposing
      her family to the public. Depressed and struggling with writer''s block, Delphine meets and begins a friendship with
      a mysterious younger woman (Green) who is seductive, intelligent, and intuitive and who understands Delphine better
      than anyone else.'
  - source_sentence: 'Represent the plot: A group of taxi drivers, calling themselves "the family," dedicate themselves to
      cleaning up the city of Madrid of Black people ("shit"), homosexuals, transsexuals, and transvestites ("fish"), and
      drug addicts ("meat") during their nightly patrols. One of them, Velasco, has a daughter, Paz, who has failed her exams
      and decided to drop out of school. Angry, Velasco forces her to work with him in the taxi: she drives during the day,
      and he drives at night. Dani is the son of a family member: Reme. He hadn''t seen Paz since they were children, and
      now they fall in love and start dating. In one scene of the film, the family, along with Dani and Paz, visit Reme''s
      husband in the hospital: a retired taxi driver who was paralyzed after being shot in the spinal cord by a couple of
      drug addicts. He survived thanks to one of the family members, Calero, a taxi driver and former police officer, who
      happened to be passing by. That was the reason the group decided to wage their own personal battle, and Dani is almost
      convinced he has to do the same. Little by little, Paz learns about the escapades of her boyfriend, her father, and
      his friends, something she vehemently disapproves of. It is then that the ex-policeman sees her as a threat, and fearing
      she will report them, decides to kill her.'
    sentences:
    - 'Represent the plot: After failing one of her midterm exams in a Madrid high school, Paz Velasco decides to drop out
      of the academic circuit. She takes this prompt decision much to the chagrin of her father, an overbearing taxi driver.
      In exchange, he forces her to join him at work so she can learn the trade and earn a living. Her reconnection with the
      so-called Family, the close-knit group of her father''s co-workers, is initially uneventful. One of its members is Dani,
      Paz''s childhood sweetheart and a young taxi apprentice about to be discharged from the military service. Upon meeting
      for the first time in many years, they rekindle their mutual attraction and start dating, much to the apparent satisfaction
      of Dani''s mother Reme—a fellow cabbie who is having a secret affair with Paz''s father. Reme''s husband is a former
      taxi driver who, according to the explanations given to Paz, was shot by two drug dealers during a robbery. One of the
      shots left him paralyzed and the Family''s visits to him in the hospital are a staple in their common social life. Aside
      from Dani, Velasco and Reme, this group is completed by a shady individual named Calero and a thuggish brute nicknamed
      Niño who seems to act as an informal henchman of sorts for the former. Paz realizes Calero is a former cop even before
      being told so, and their mutual distrust is vivid and ever-increasing throughout the film. From the outset, it is made
      clear to the audience that the Family is in fact a neo-fascist death squad whose members use their cabs to abduct non-white,
      immigrant, LGTB and drug-addicted customers with murderous intent. There is also some evidence of rudimentary tactics,
      e.g. using code words for each kind of victim in order to lure unwitting victims to the killing box. Dani has been recently
      groomed into the group and partakes in their activities, although it is made apparent to the audience that he does so
      reluctantly. The Family seems to be generally successful in its exploits: two murders are shown on-screen, as well as
      a raid on a Moroccan camp during which Dani accidentally kills a man. The film does show, however, one botched attack
      during which the victim manages to run away unharmed. It is left unclear whether or not the group is restricted to the
      core members shown onscreen. It is also left unclear whether the group''s activities were prompted by the attack that
      crippled Dani''s father or it was just a casual event that fuelled them further, or whether the version given to Paz
      was a lie and the attack was a direct result of the group''s illegal pursuits. Their activities are spontaneous and
      seemingly not officially sanctioned, but there are ominous references by Calero to people up there who know and approve
      of the group''s activities, leaving the door open to speculation on a wider conspiracy. Although initially ignorant
      of the actions and general demeanour of the Family, Paz gradually finds out the truth through a series of details and
      coincidences, such as a profusion of fascist and pre-democratic antics and regalia, purportedly intimate family reunions
      attracting skinheads and other sinister individuals and ending in massive Roman salutes, casual bigoted remarks from
      her father and Dani (as well as the latter''s violent outburst on a black street vendor) and a disturbing pattern of
      codenames or labels directed at different collectivities. Paz''s unassuming and long-suffering mother seems increasingly
      distraught at the prospect of having Dani close to her daughter, and although Paz initially blames this on his general
      lack of education and ambition, it becomes increasingly clear that her mother knows more than she says about him and
      the whole group. Once confronted with the evidence, her disgust and adamant disapproval set up a chain of events leading
      to the climax. The paranoid and increasingly unstable Calero, who saw her as a potential liability to the group from
      the very beginning, now wishes to silence Paz at all costs. He shoots (and presumably kills) her father when he tries
      to stop him, and confronts her and Dani in the Retiro Park, shooting Dani, and being shot to death by Paz seconds before
      he is about to finish him off. The camera pans over the park as she walks away with the injured Dani, and credits roll.
      The fate of the rest of the group is left undisclosed.'
    - 'Represent the plot: Jack Woods is an American businessman on holiday in Ireland. During a hike, he sees Irish beauty
      Kathleen Fitzpatrick swimming naked. Kathleen catches him and chases him off, but Jack is smitten with her beauty. That
      evening, Jack saves Seamus Muldoon, a leprechaun, from drowning. In gratitude, Muldoon introduces Jack to his wife Mary
      and son Mickey and shows him the mystical world of the leprechauns. Jack gets used to the little people he shares the
      house with, because they help him to get to know Kathleen. Meanwhile, Mickey falls in love with the fairy princess Jessica.
      They begin a relationship, which thrives even after Jessica finds out that Mickey is a leprechaun. Jessica''s hot-headed
      cousin, Count Grogan opposes the marriage, as leprechauns and fairies are traditionally enemies. Tensions flare between
      Mickey and Grogan, leading to Mickey killing Grogan. After Jessica''s parents learn that Mickey has killed Count Grogan,
      they send her to a hidden underwater castle. Mickey rescues her and flies with her to his uncle Sir Aloysius Jantee,
      the butter fairy. Jessica''s parents think Mickey has kidnapped her and they start a war with the leprechauns. Once
      the war begins, the fairies stop taking care of nature, causing the seasonal weather patterns to spiral out of control.
      Mickey and Jessica obtain poison from the butter fairies and threaten to take it unless the fighting stops. Their parents
      are unable to make peace, so they take the poison. Their bodies are brought before their parents, who become distraught.
      Jack convinces the warring parties to make peace. The Grand Banshee brings back not only Jessica and Mickey, but all
      of the lost leprechauns and fairies. Mickey and Jessica marry, Jack and Kathleen are reconciled, and the long-lasting
      war is finally over.'
    - 'Represent the plot: The film outlines the daily life of a punk named Stevo in Salt Lake City, Utah, in the fall of
      1985. Stevo''s best friend, Heroin Bob, is also a punk. The nickname Heroin is ironic, as Bob is afraid of needles and
      actually believes that any drug (with the notable exception of alcohol and cigarettes) is inherently dangerous. Stevo
      and Bob go from party to party while living in a dilapidated apartment. They spend much of their time fighting with
      members of other subcultures, particularly rednecks. Stevo has a casual relationship with a girl named Sandy, while
      Bob is in love with Trish, the owner of a head shop. The two of them are shaped by their experiences with their parents.
      Stevo''s parents, now divorced, are former hippies who are proud of their youthful endeavors; however, Stevo is revolted
      by what he perceives as their selling out by becoming affluent Reagan Republicans, which they try to justify. Stevo''s
      grades are excellent, and when his father sends an application to Harvard Law School and Stevo is accepted, he nevertheless
      rejects it because of his beliefs. By contrast, Bob''s father is a mentally ill alcoholic who mistakes his son and his
      friend for Central Intelligence Agency operatives and chases them away with a shotgun when they visit him on his birthday.
      Stevo begins to see the drawbacks of living the punk life. Sean, a fellow punk, was a drug dealer who once attempted
      to stab his mother while under the influence of an entire 100-dose sheet of acid; in the present, Stevo finds him panhandling
      on the street with some obvious mental issues. While Stevo understands that his relationship with Sandy is casual, he
      is still enraged when he discovers her having sex with another man and savagely beats him, later loathing himself because
      his action contradicts his own belief in anarchism. His social circle also begins to drift away, as his dealer, Mark,
      and his friend, Mike, both leave Salt Lake City (Mark to return to Miami, Mike to attend the University of Notre Dame).
      Soon after, Stevo attends a party and falls in love with a rich girl named Brandy, who points out that his clothing
      and hair are fashion as opposed to true rebellion. Rather than being offended, Stevo takes the criticism thoughtfully,
      and they passionately kiss. At the same party, Bob complains of a headache (induced by Spandau Ballet''s She Loved Like
      Diamond playing on a stereo), and is given Percodan, which he consumes with alcohol after being told the pills are simply
      vitamins that will help his headache. The accidental drug overdose kills him in his sleep. When Stevo discovers Bob''s
      body, he breaks down completely. At the funeral, he appears with a shaved head and changed clothing, having decided
      he is done with being a punk. He plans to go to Harvard, and earlier narration suggests that he eventually marries Brandy.
      He notes in his closing narration that his youthful self would probably kick his future self''s ass, wryly describing
      himself as having been ultimately just another poser.'
