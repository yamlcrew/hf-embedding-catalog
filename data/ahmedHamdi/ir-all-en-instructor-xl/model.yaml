widgetData:
- source_sentence: 'Represent the plot: Wendy decides to go to Alaska with her dog Lucy to find work. Arriving in Oregon with
    no money, the young woman steals from a supermarket but is arrested by the police. Meanwhile, Lucy disappears. From then
    on, the young woman''s troubles begin. The supermarket security guard then comes to her aid.'
  sentences:
  - 'Represent the plot: he Mark of Zorro tells the story of Don Diego Vega, the outwardly foppish son of a wealthy ranchero
    Don Alejandro in the old Spanish California of the early 19th century. Seeing the mistreatment of the peons by rich landowners
    and the oppressive colonial government, Don Diego, who is not as effete as he pretends, has taken the identity of the
    masked Robin Hood-like rogue Señor Zorro (Mr. Fox), champion of the people, who appears out of nowhere to protect them
    from the corrupt administration of Governor Alvarado, his henchman the villainous Captain Juan Ramon and the brutish Sergeant
    Pedro Gonzales (Noah Beery, Wallace Beery''s older half-brother). With his sword flashing and an athletic sense of humor,
    Zorro scars the faces of evildoers with his mark, Z. When not in the disguise of Zorro, dueling and rescuing peons, Don
    Diego courts the beautiful Lolita Pulido with bad magic tricks and worse manners. She cannot stand him. Lolita is also
    courted by Captain Ramon; and by the dashing Zorro, whom she likes. In the end, when Lolita''s family is jailed, Don Diego
    throws off his masquerade, whips out his sword, wins over the soldiers to his side, forces Governor Alvarado to abdicate,
    and wins the hand of Lolita, who is delighted to discover that her effeminate suitor, Diego, is actually the dashing hero.'
  - 'Represent the plot: Conrad Rad McRae (Duane Martin) is a private investigator who is on the trail of the man who murdered
    his lifelong friend, Benjamin (Jadakiss), an up-and-coming rapper. Weapons expert Lisa (Vivica A. Fox) partners with McRae
    and assists him in his quest for justice. At the center of his investigation is Benjamin''s former producer, B-Free (Michael
    Taliferro), who controls quite a powerful business that often deals in illegal activities.'
  - 'Represent the plot: A young woman, Wendy Carroll, is traveling to Alaska with her dog Lucy, where she hopes to find work
    at a cannery. They become stranded in Oregon when their car breaks down, and she lacks the funds to repair it. At a supermarket,
    she leaves Lucy outside while she attempts to shoplift dog food. After a meeting with the store clerk and the manager,
    Wendy is apprehended and taken to the police station. After paying a fine, Wendy is released from police custody. She
    hurries to the grocery store, but Lucy is gone. After many failed efforts to track Lucy down, with the help of a security
    guard, she discovers that Lucy has been taken to a dog pound and rehomed. When Wendy visits the mechanic to pick up her
    car, she learns her engine needs to be rebuilt, which would exceed the car''s worth. Abandoning her car and nearly penniless,
    Wendy goes to the home where Lucy lives. She tearfully promises to return and departs on a Northbound train.'
- source_sentence: 'Represent the plot: Pedro de Vargas, a Spanish nobleman, joins Hernán Cortés'' men after losing everything
    and being tortured by the Inquisition. His wife, the peasant woman Catana Perez, accompanies him. Their dreams of rebuilding
    their lives in the New World are thwarted by the arrival of Diego de Silva, the officer responsible for the false accusations
    against him, who coveted his lands. When Diego is killed, the blame falls on Pedro until an indigenous prince confesses
    to the crime.'
  sentences:
  - 'Represent the plot: In the spring of 1518, near Jaén, Spain, Pedro de Vargas, a Castilian caballero, helps a runaway
    Aztec slave, Coatl, escape his cruel master, Diego de Silva. De Silva is el supremo of the Santa Hermandad, charged with
    enforcing the Inquisition, and Pedro''s rival for the affections of the beautiful Lady Luisa de Carvajal. Later, Pedro
    rescues barmaid Catana Pérez from de Silva''s men. At the inn where Catana works, Pedro becomes acquainted with Juan García,
    an adventurer just returned from the New World to see his mother. Suspecting Pedro of aiding Coatl, and aware that Pedro''s
    influential father Don Francisco de Vargas opposes the abuses of the Santa Hermandad, de Silva imprisons Pedro and his
    family on the charge of heresy. Pedro''s young sister dies under torture. Meanwhile, Juan becomes a prison guard to help
    his mother, also a prisoner. He kills her to spare her further torture. Juan frees Pedro''s hands and gives him a sword.
    When de Silva enters Pedro''s cell, Pedro disarms him in a sword fight, then forces him to renounce God before stabbing
    him. The trio (secretly aided by Catana''s brother, the sympathetic jailer Manuel) flee with Pedro''s parents. Forced
    to split up, instead of going to Italy to be reunited with his family, Pedro is persuaded by Juan and Catana to seek his
    fortune in Cuba. The three sign up with Hernán Cortés on his expedition to Mexico. Pedro tells Father Bartolomé, the spiritual
    adviser to the expedition, what occurred in Spain. The priest had received an order to arrest him, but tears it up and
    gives Pedro a penance, neither aware that de Silva survived. The expedition lands at Villa Rica in Mexico. Cortés is greeted
    by emissaries of Aztec Emperor Montezuma and given a bribe to leave. Cortés instead persuades his men to join him in his
    plan for conquest and riches. Catana seeks the aid of charlatan and doctor Botello, who reluctantly gives her a ring with
    the supposed power to make Pedro fall in love with her, despite their vast difference in social status. When Pedro kisses
    her, she rejects him, believing he is under the ring''s spell, but he convinces her otherwise and marries her that very
    night. Cortés marches inland to Cempoala, where he receives a bribe of gems from another Aztec delegation. He places Pedro
    in charge of guarding the gems in a teocalli. Pedro leaves his post, however, to calm down drunk, menacing Juan, and the
    gems are stolen. Cortés accuses Pedro of theft. When Pedro finds a hidden door into the teocalli, Cortés gives him 24
    hours to redeem himself. Pedro tracks the thieves, captains opposing Cortés, back to Villa Rica, where they have incited
    mutiny. With the aid of Corio, a loyal crewman, he recovers the gems, although he is seriously wounded in the head by
    a crossbow bolt during their escape. Cortés promotes Pedro to captain. Then, to remove the temptation of retreat, he orders
    their ships burned. They march on to Cholula, where they are met by another delegation, led by Montezuma''s nephew, who
    threatens the expedition with annihilation unless they leave. When Cortés protests that he has no ships, the prince reveals
    that more have arrived. Cortés realizes that his rival, Cuban Governor Velázquez, has sent a force to usurp his command.
    Cortés takes half his men to attack Villa Rica, leaving Pedro in command of the rest. Cortés returns victorious, bringing
    with him reinforcements and Diego de Silva, the King''s emissary. De Silva is there to impose the Santa Hermandad on Mexico.
    Juan attacks de Silva, but is stopped by Cortes'' soldiers. Father Bartolomé reminds Pedro of his vow, and Cortés holds
    him personally responsible for de Silva''s safety. When de Silva is strangled that night, Pedro is sentenced to death.
    Just before the execution, Coatl confesses to Father Bartolomé that he killed de Silva. Catana stabs him to spare him
    the degradation of being hanged. Pedro recovers, and Cortés and his followers march on the Aztec capital.'
  - 'Represent the plot: Marjorie Morgenstern is a student at Hunter College and the girlfriend of an eligible young man,
    Sandy Lamm, who attends her family''s synagogue. Her parents are happy with her choice of mate(department store heir),
    and her mother Rose Morgenstern (Claire Trevor) tells her father, Arnold (Everett Sloane), that she hopes the two children
    marry. Marjorie breaks up with Sandy after he proposes unsuccessfully and goes to a Catskills resort that summer to be
    a camp counselor. One night, Marjorie and friend Marsha Zelenko (Carolyn Jones) sneak to a Borscht Belt resort for adults
    called South Wind. Marjorie stumbles into a rehearsal for a dance routine, and she is noticed hiding in the back by the
    social director Noel Airman. After watching, and trying to get back to camp, she is caught by resort owner Maxwell Greech
    (George Tobias), but Noel Airman (Gene Kelly) vouches for Marjorie as a person looking for a job, which he then offers
    to her. She begins a relationship with Airman and a friendship with aspiring playwright Wally Wronkin (Martin Milner),
    who writes Airman''s stage act. The latter has a romantic interest in Marjorie, but she''s tempted by the older, more
    seasoned Airman, who meets the disapproval of her parents. Airman, whose original name was the more Jewish Ehrman, renames
    Marjorie as well from Morgenstern to Morningstar. Marjorie''s sweet Uncle Samson (Ed Wynn) comes to the resort to keep
    an eye on her. Samson intervenes as a waiter to lecture Noel on the character of Marjorie and not to take advantage of
    her good nature and youth. Noel reconsiders his plan to woo her into bed, and tells Marjorie to leave. He accuses her
    of wanting to find a husband and argues that he will never be subjected to a life of mediocrity and married suburban life.
    The relationship goes up and down all summer but they seem to coalescing as a couple until Marjorie''s parents appear
    on a surprise visit. During a lunch, the conversation gets testy as her parents grill Noel on his career plans for the
    future. The relationship turns sour again, as Noel doesn''t want to have anything to do with traditional Jewish life and
    business aspirations. Later, during a party, Marjorie notices that her uncle is feeling unwell but is distracted by Noel,
    who professes his uncontrollable attraction for her. When her uncle dies of a heart attack unattended, Marjorie blames
    herself, and Noel and leaves to go back to the city. A year later, after graduating Hunter College, Marjorie plans to
    continue her acting career to the chagrin of her parents. She ends up dating a doctor named Harris, with whom she quickly
    breaks up when Airman returns to find her showing up in a limousine. He declares that love has convinced him to become
    respectable and conventional. Marjorie tells her mother, who insists her daughter bring him to a Passover meal. Not Passover,
    mother. He’s not very religious. He doesn’t believe in those things, Marjorie says. Rose answers He doesn’t believe in
    those things...you’re going to get married. How are you going to raise your children? In the midst of the Passover meal,
    he leaves, and Marjorie follows him. She is concerned he''s bored, but he says I wasn’t bored. I was disturbed, deeply.
    I couldn’t help thinking of all the things I’ve missed in life. Family, your kind of family. Faith, tradition. All the
    things I’ve been ridiculing all the time. That’s why I couldn’t take it anymore. I love you very much, Marjorie Morgenstern.
    Airman gets a job at an advertising firm and seems to do well, but one week he doesn''t show up at work and refuses to
    take Marjorie''s calls. She goes to his apartment and finds him drunk with a strange woman. He has decided he cannot stand
    the professional lifestyle and wants to be an artist. The impetus to change careers is the success of Wally Wronkin on
    Broadway; the playwright has launched a series of hits, and Airman is consumed with jealousy. He admits he hates his conventional
    job and his anger toward himself, and Marjorie convinces her girlfriend''s new husband to invest in his play. Wally and
    the investors critique the play''s ending as being depressing and not viable, but in a fit of rage, Noel refuses to make
    the changes required to appease them. Despite Airman''s outbursts, the investors are convinced to back the play with Wally''s
    lukewarm assurances that it was viable enough. The play is panned by critics. We were crucified, the investor explains
    to Marjorie. The relationship with Noel is unable to survive, and he runs away, again, this time leaving her a note saying
    he is on his way to Europe. She travels to Europe to search for him. In London, she meets Wally who tells her Noel is
    back at South Wind, the resort where they first met. Marjorie returns to South Wind, where she watches Noel rehearsing
    a new summer show. Everything is exactly the same as it was, her first summer there, except for herself. Greech observes
    that she''s done some growing up. We see her board a bus. In the rearview mirror, Wronkin sits in back. He smiles, as
    he''s been waiting for her to get over her summer fling. The suggestion is that they will embark on the relationship for
    which Wronkin had been hoping from the beginning.'
  - 'Represent the plot: See: Madama Butterfly plot synopsis'
- source_sentence: 'Represent the plot: Shekhar Subramanium (Shahrukh Khan), a video game creator, is a loving husband and
    devoted father. But while he has a traditional view of his games, in which the hero must champion good, his trendy pre-teen
    son, Prateek (Armaan Verma), only admires the villains. To impress his son, Shekhar develops a game featuring the villainous
    character, Ra.One, who is virtually invincible, unlike G.One, the hero. Prateek, aka Lucifer, manages to reach level 2
    of the game, which displeases Ra.One, who then manages to enter the real world to eliminate Lucifer. When Shekhar is killed
    protecting his son, G.One, who has Shekhar''s appearance, also enters the real world to defend Prateek and his mother.
    The battle between Ra.One and G.One is merciless.'
  sentences:
  - 'Represent the plot: Seventeen years after the events of The Decline of the American Empire, Sébastien is enjoying a successful
    career in quantitative finance in London when he receives a call from his mother, Louise, that his father and Louise''s
    ex-husband Rémy is terminally ill with cancer. Sébastien is not enthused about seeing Rémy, whom he blames for breaking
    up the family with his many adulteries. Rémy and his friends of the older generation are still largely social-democrats
    and proponents of Quebec nationalism, positions seeming somewhat anachronistic long after the Quiet Revolution of the
    1960s. Rémy does not like Sébastien''s career, lack of reading or fondness for video games. The father and son travel
    to the U.S. state of Vermont to briefly receive medical care before returning to the overcrowded and disorganized Quebec
    hospital. Sébastien attempts to bribe hospital administration for better care, and calls Rémy''s old friends about a possible
    visit. Upon hearing heroin is 800% more effective than morphine, he tracks some down for Rémy from a drug addict, Nathalie.
    Meanwhile, Rémy is reunited with his friends, including Pierre, Dominique, Claude and Diane, Nathalie''s mother, and they
    share a conversation on their old sex drive and the gradual decline of their vitality. Diane is concerned for Nathalie,
    while Rémy, a history professor, lectures the hospital chaplain Constance on the relative peace of the 20th century compared
    to past centuries. At the same time, another scholar describes the September 11 attacks as historically small except as
    a possible beginning of modern barbarian invasions.  After Rémy and his friends retreat to the countryside, they speak
    of their devotion to constantly evolving -isms. Rémy dies in the company of his friends and Sébastien, after a heroin
    injection from Nathalie, whom Rémy calls his guardian angel.'
  - 'Represent the plot: In a huge new supermarket in the eastern provinces, a withdrawn young man called Christian is hired
    to help stock the drinks aisle. He works under the equally taciturn Bruno, who gruffly teaches him the job. He also catches
    the eye of the young blonde Marion, who looks after the confectionery aisle and considers herself a queen bee. Christian
    falls for her, but lacks the skill to press his case. Other employees warn him that she is married unhappily to a husband
    who beats her. One morning he waits outside her house until her husband has gone to work and creeps in with a bunch of
    flowers. She is in her bath singing but, when she hears him coming up the stairs, he flees. It emerges that his low self-esteem
    comes from teenage years in a gang, followed by prison. Bruno''s unhappiness results from his loss of status at reunification,
    when all he could get was this low-grade job, and he hangs himself. Marion''s malaise is not further explained, but she
    continues to flirt with Christian.'
  - 'Represent the plot: In London, Jenny Nair, an employee of UK-based company Barron Industries, introduces a new technology
    that allows objects from the digital world to enter the real world using the wireless transmissions from multiple devices.
    Shekhar Subramanium, who also works for the company, is given a final chance to devise with a video game with a difference.
    To impress his sceptical son Prateek, and upon the request of his wife Sonia, Subramanium uses his son''s idea that the
    antagonist be more powerful than the protagonist. Shekhar''s colleague Akashi provides the moves of the game''s characters,
    Jenny does the programming and Shekhar gives his face to the game''s protagonist G.One, whilst the antagonist Ra.One is
    faceless and has substantially greater powers than those granted to G.One, including shapeshifting. Ra.One is imbibed
    with a self-learning artificial intelligence. The game has three levels, and either of the players can only be killed
    in the third level using a special gun that holds a single bullet. While designing the game, Akashi notices some malfunctions
    but ignores them. When the game is finally launched, it receives a standing ovation and Prateek loves it so much that
    he insists on playing it instantly. He logs in under the alias ''Lucifer'' and proceeds to the second level, but is interrupted
    by Akashi. The self-aware Ra.One, being unable to end his turn with Lucifer, becomes determined that Lucifer shall die.
    When the mainframe fails to shut down, Akashi calls Shekhar, who notices a problem with the game. Ra.One uses the new
    technology to enter the real world and breaks free and goes to find Lucifer. Ra One first threatens Akashi and asks him
    where Lucifer is. When Akashi fails to reply, Ra One abruptly abducts and murders him. After Shekhar finds the dead Akashi,
    he rushes home; however, he is found by Ra.One. In an attempt to save his son, Shekhar claims that he is Lucifer. However,
    Ra.One scans Shekhar''s I.D. and, discovering he has lied, kills him. Prateek notices the strange circumstances of his
    father''s death and realises that Ra.One has come to life. He and Jenny attempt to bring G.One to life. Meanwhile, Sonia
    tells Prateek that the family will return to India. Having taken the form of Akashi, Ra.One chases them, but G.One enters
    the real world through Jenny''s computer and causes a gas explosion which saves them and temporarily destroys Ra.One.
    G.One takes Ra.One''s H.A.R.T., without which Ra.One is weakened. Sonia finds she cannot leave G.One and takes him along
    with them to India through Shekhar''s passport. G.One promises Sonia that he will protect Prateek from any harm. Ra.One
    returns to life, takes the form of a billboard model, and tracks G.One and Prateek. During Prateek''s birthday party,
    Ra.One hypnotises Sonia, assumes her form and kidnaps Prateek. Ra.One then instructs G.One to give him his H.A.R.T. back,
    and sends the real Sonia in an uncontrollable Mumbai Suburban Railway train. G.One saves Sonia just in the nick of time
    (though the Chhatrapati Shivaji Terminus is destroyed) and returns to save Prateek. The game resumes, with Prateek controlling
    G.One''s moves. Following a lengthy fight, both of the characters reach the third level. With little power left, G.One
    and Prateek trick Ra.One into shooting G.One without his H.A.R.T. attached, which leaves Ra.One helpless. Furious, Ra.One
    creates ten copies of himself. Prateek, unable to differentiate the real Ra.One, asks G.One to quote one of Shekhar''s
    sayings: If you join the forces of evil, its shadows shall always follow you. The pair then realise that only one of the
    ten Ra.Ones has a shadow: the original one. G.One shoots and destroys him, and after absorbing Ra.One''s remains, transports
    himself back into the digital world. Several months later, Prateek and Sonia return to the UK, where Prateek finally manages
    to restore G.One to the real world, much to his and his mother''s joy.'
- source_sentence: 'Represent the plot: A former narcotics agent, now a stay-at-home mother, makes the ill-advised decision
    to let a stranger into her home after he''s been in a car accident in front of her house. She and her two young children
    are quickly terrified of the man.'
  sentences:
  - 'Represent the plot: Aditya Sehgal and his friends are searching for Aditya''s wife Suhani Sehgal. She has been missing
    for hours, a few days after having a fight with Aditya about their failing marriage. But Aditya now realizes that he loves
    her more than anything and is devastated that he can''t find her. The film goes into a flashback, where it is seen that
    Aditya and Dr. Suhani meet each other at a wedding. Aditya immediately falls in love with her and pursues her. Suhani
    at first believes that he is simply flirting with her but later, both realize that they love each other. However, Aditya''s
    rich lifestyle and Suhani''s middle-class lifestyle creates a rift between their parents where Aditya''s father Om Sehgal
    insults Suhani''s father. Aditya and Suhani elope and get married in a small ceremony. At first, they live in their respective
    homes and keep their marriage a secret. However, when a proposal comes for Suhani''s elder sister, the truth comes out.
    Aditya and Suhani then cut ties with their parents and move to a dilapidated house and start their married life together.
    Soon, marital problems threaten to drive them apart. A misunderstanding causes Suhani to think Aditya is having an affair
    and they get into a major argument. Suhani then gets involved in a car accident. As she is crossing the street, a car
    hits her, almost fatally injuring her. Aditya has no idea of this and waits for her to return home, happily thinking that
    they will patch up. Later Aditya realizes that Suhani is missing and starts looking for her. It is revealed that Savitri
    is the one who hit Suhani with her car. Scared to own up, Savitri calls her husband, who is an IAS officer. Her husband,
    Yeshwant Rao, arrives at the hospital and tells the doctor that Suhani is his wife and he wants her operated. Aditya finds
    out about the incident and reaches the hospital. Suhani falls into a coma. Yeshwant explains to Aditya, and takes the
    blame and tells him that he had caused the accident. Aditya threatens Yeshwant and leaves. Savitri meets Aditya and tells
    him that it was she who caused the accident and she is feeling guilty. The two shed tears together until Yeshwant comes
    and picks her up. Soon, Suhani regains consciousness. Aditya runs in and expresses the pain and suffering he went through
    in the hours of separation. Suhani also expresses her own love and feelings for him. The film ends as Aditya and Suhani
    finally makeup and they hug each other on the hospital bed.'
  - 'Represent the plot: Colin Evans has been sentenced to prison for 15 years for manslaughter in the state of Tennessee.
    He is eligible for parole after five years, and during his parole hearing, Colin claims he is a changed man and has been
    rehabilitated; but the parole board denies his release, claiming that he is not trustworthy enough, and is sent back to
    prison for another five years until the next hearing. On returning to prison, Colin kills the correctional officers transporting
    him and escapes with the van. In Atlanta, Terri Granger is a stay-at-home mother. Her best friend Meg suggests a girls''
    night to cheer Terri up after her husband Jeffrey abruptly leaves for a family visit, as she knows Terri''s relationship
    with Jeffrey has been suffering. Colin stalks his ex-fiancée Alexis and witnesses her meeting another man at an outdoor
    cafe. Colin follows her home where they argue violently, resulting in him murdering Alexis. Later that day, Colin loses
    control of his car and crashes into a tree during a storm. Walking down the road, he notices Terri''s house. He asks her
    if he can use her phone for a tow truck. Apprehensive at first, she decides to help him, and eventually invites him inside.
    Meg later arrives and is shocked by Colin''s presence. When Terri leaves momentarily to comfort her baby, Meg and Colin
    are left alone; Colin excuses himself for a cigarette break, but Meg follows him. Colin suggests he is having an affair
    with Terri, but Meg does not believe him. As she begins to call out to Terri, Colin quickly grabs a shovel and bashes
    Meg in the head with it, killing her. As Terri returns, Colin tells her that Meg left, but Terri is suspicious, especially
    when she sees Meg''s umbrella on the stand. Alarmed, she rushes to the kitchen to call the police, only to find out that
    Colin has disconnected all the wires and hidden all her knives. Terri rushes into her daughter Ryan''s bedroom to find
    Colin playing with her. As they exit the bedroom, Terri hits him with a fire extinguisher, making him fall down the stairs;
    she runs to get her children, but Colin has recovered. He tells her to return the children to their rooms and reveals
    a gun. In a brief moment where she strikes him unconscious, she manages to flee to her home office and dials 911 for help.
    Colin recovers and discovers her in the office. She begs him to leave, explaining that the police are coming and that
    his blood is all over her kitchen (because she managed to cut him earlier). Colin forces her to take the children into
    her vehicle and drive away with him. While leaving the garage, Terri sees Meg''s dead body on the floor. Colin makes Terri
    drive to Alexis'' house, and introduces Terri to his dead ex-fiancée. The high winds from the storm cause Terri''s car
    alarm to activate; worried that the noise will attract attention, Colin ties her up while he goes to check on the car.
    Terri answers Alexis'' phone as it starts to ring and is surprised to hear Jeffrey, who is calling Alexis to find out
    why she has not arrived at the hotel for a rendezvous with him. Terri realizes that he was not out of town with his father
    and has been having an affair with Alexis. She also realizes that her encounter with Colin was not coincidental as he
    wants revenge on Jeffrey because of his affair with Alexis. Terri tells her husband the truth and has him call 911. She
    misleads Colin into thinking that she and her children have escaped. When Colin finds her, she attacks him, grabbing his
    gun and shooting him until he falls out of a window. The police arrive with Jeffrey; he apologizes to Terri about the
    affair, but she punches him in the face and leaves him afterward. Sometime later, a much more confident Terri returns
    to her career and has moved into a new house with her children.'
  - 'Represent the plot: The film begins with abstract images and sounds in the director''s interpretation of schizophrenia.
    Peter Winter has recently been released from a mental institution and upon his release, must try to experience and understand
    a world that is all but foreign to him. Beginning the search for his daughter Nicole, Peter''s car is hit by a soccer
    ball. A young girl looks from beyond his windshield at him, and he gets out of the car. No actual images of the girl are
    shown after Peter exits his car, but the screams of a young girl are heard as if Peter is beating her. He carries a large
    orange bag into his trunk, and the audience is meant to presume that Peter killed this little girl. Winter returns home,
    where sounds invade his very being, and he is never completely at rest. He believes that there is a transmitter beneath
    the skin on his head and he proceeds to remove it. Peter is also disturbed by mirrors, and typically covers up any mirrors
    that he can access. The car that Peter drives becomes encased in newspaper, and he isolates himself from the outside world.
    Peter comes back home to find his mother Mrs. Winter still very disturbed about Peter''s schizophrenia. She still treats
    Peter as a child, and does not want him to find his daughter. Peter, through his travels, becomes wrapped up in the investigation
    of the murder of another young girl. Jack McNally, the detective on the case, is stymied because there is almost no evidence
    at the scene of the crime. Peter becomes a suspect in the case, but nothing found at the crime scene or in Peter''s hotel
    room can link him to the murder. That does not stop the detective from following Peter after he kidnaps his daughter from
    her adoptive mother. Just as Peter begins to reconcile himself with his daughter, McNally shows up, desperate to take
    Peter in as the murderer. Peter foolishly takes out a gun and aims it at the police officer to try to protect his daughter
    from McNally. McNally, believing that what he is seeing is the dead body of Peter''s daughter, opens fire on Peter, killing
    him. He finds the girl to be safe and fires Peter''s gun in the air, so that he would not be charged for shooting a man
    unnecessarily. He then opens the orange bag and finds nothing but newspaper inside.'
- source_sentence: 'Represent the plot: Living a relatively peaceful life in Harlem, Bishop and his gang will try anything
    to gain the respect they crave. However, they disagree on how to achieve it. Bishop simply wants to earn money and respect
    by killing... Everything changes the day Bishop tries to join an ongoing robbery, but fails to convince his three companions
    to back him up. But all this will change when they realize their thirst for recognition is strong enough to drive them
    to commit crimes. Naturally, Quincy (who goes by "Q") will come to his senses and put an end to the madness Bishop is
    creating in order to turn the tables. The consequences will be terrible for the four young men...'
  sentences:
  - 'Represent the plot: Emperor Tod Spengo (Jon Lovitz), with General Afir (Thalmus Rasulala) at his side, takes over a small
    planet at the edge of the galaxy populated entirely by idiots, and renames it after himself. He has all the resources
    of the planet engaged to create his Super Death Ray Laser to destroy Earth, thus making Spengo the greatest planet in
    the Universe. When Spengo peeks at the laser''s planned point of impact (a Southern California suburb), he beholds housewife
    Marge Nelson (Teri Garr) and is instantly infatuated. Using his Magnobeam (a giant magnet), he kidnaps Marge and her husband
    Dick (Jeffrey Jones) on their way to their 20th-anniversary weekend, hoping to make Marge his wife. Dick and Marge get
    separated on Spengo: Marge is sent to the lap of luxury, waited on by servants with fish or bulldog heads, while Dick
    is thrown into a dungeon. In his cell, Dick meets the rightful king of Spengo, King Raff (Eric Idle), who gives him plans
    for his son, called the White Bird, leader of a band of rebels out in the desert. In the meantime, Spengo finds that his
    advances towards Marge are failing, so he tries to read Dick''s mind in order to discover the secret to her heart before
    having him executed. Upon witnessing Dick''s devotion to Marge, Spengo''s interrogator, Sibor (Wallace Shawn), has a change
    of heart and helps Dick escape. Despite the stupidity of his captors, Dick is soon discovered and forced down a garbage
    chute to the sewers, where he encounters a pack of carnivorous mushroom-like creatures called Lub-Lubs and is forced to
    run for his life. Dick manages to escape the sewers and steal an escape pod, and winds up crashing in the desert, where
    he meets the rebels led by King Raff''s son, Prince Sirk (Dwier Brown), and daughter, Princess Semage (Kathy Ireland),
    all of whom dress as 6-foot-tall birds (although such creatures are not naturally found on Spengo). At first, the rebels
    don''t trust Dick, but when Dick reveals that he shared a cell with Raff and that he is on their side, their attitude
    quickly changes, and Dick rises to the rank of war leader. Using what limited resources he can scrounge up, he devises
    a plan to sneak back into Spengo''s palace and save Marge. In the meantime, General Afir, the only intelligent person
    among Spengo''s forces and resentful of his emperor''s tyrany, believes that Dick and Marge are the key to ending Spengo''s
    rule, so he switches the love serum meant for Marge with water and informs her of his intentions to recover Dick. However,
    Spengo overhears Afir''s plan and has him placed in the barrel of the laser, to die when the weapon is fired at Earth.
    While Spengo''s wedding with Marge is prepared, a detachment of Spengo''s soldiers go into the desert to finish the rebels,
    but find their camp deserted, and one by one they fall victim to a light grenade (which has pick me up engraved on it
    and disintegrates anyone who picks it up) left on Dick''s pallet. Simultaneously, Dick and the rebels approach Spengo''s
    fortress inside a large wooden bust of Spengo, which Spengo has brought into the chapel, and in the midst of the wedding
    ceremony the rebels emerge from the Trojan bust. As fighting rages in the castle, Spengo retreats to his lab with Marge
    and prepares to fire the laser at Earth. Dick and Spengo clash with swords, but neither gains the upper hand. Marge manages
    to free herself and helps Dick throw Spengo into the sewers, where he is last seen being cornered by the Lub-Lubs. At
    the last second, Dick and Marge manage to shut down the laser, saving Afir and the Earth. With Spengo defeated, Raff is
    reinstated as the rightful king, and he reverses the polarity on the Magnobeam to send Dick and Marge back to Earth. Upon
    arriving home, Dick and Marge proceed to show their son (Danny Cooksey), daughter (Suzanne Ventulett), and her boyfriend
    Carl (Michael Stoyanov) slides (including an image of their space journey to Planet Spengo) from what they claim is Santa
    Barbara. To end their anniversary, they share drinks on the roof, watching the stars.'
  - 'Represent the plot: Roland Bishop, Quincy Q Powell, Raheem Porter, and Eric Steel Thurman are four teenage African-American
    friends growing up together in Harlem. They regularly skip school, instead spending their days hanging out at Steel''s
    apartment, at a neighborhood arcade, and also a record store where they steal LPs for Q''s DJ interests. They are also
    harassed daily by the police and a Puerto Rican gang led by Radames. Fed up with the harassment he and his friends have
    endured, Bishop decides that the group must go on to do bigger things in order to win respect. However, Q is unsure if
    he wants to become involved in a life of crime. One night, under Bishop''s persistence, the friends decide to rob a local
    convenience store owned by Fernando Quiles. However, Q is unsure of the plan, and also fears that it will affect his chances
    of participating in a DJ competition which he has yearned to compete in for years, although he is eventually pressured
    by his friends. During the robbery, Bishop fatally shoots Quiles in the head, and the group flees the scene. The four
    then gather in an abandoned building where they argue over the evening''s events; Q, Raheem and Steel are angry at Bishop
    for killing Quiles, and Raheem demands that Bishop give the gun to him. However, Bishop resists, and a struggle ensues
    before Bishop shoots Raheem dead. Raheem was still alive and grabbed Bishop’s arm in an attempt to rob him . Panicking,
    Bishop, Q and Steel flee to another building, where Bishop threatens to kill Q and Steel if they reveal to anybody that
    he murdered Raheem. Q and Steel realize that Bishop is beginning to become addicted to the thrill of killing, and they
    agree to give Bishop as wide a berth as possible. However, while attending Raheem''s funeral, they find Bishop there,
    who goes as far as to comfort Raheem''s mother and promises to find his killer. While Q and Steel are mostly able to avoid
    Bishop, he eventually finds and confronts them, questioning their loyalty. Later, Bishop confronts and kills Radames,
    then plans to frame Q for his murders in order to cover his tracks. Fearful of Bishop, Q resorts to buying a gun for his
    own protection. Meanwhile, Bishop confronts Steel in an alley, accusing him of disloyalty, and shoots him. However, Steel
    survives the attack and is rushed to the hospital, where he informs Q''s girlfriend Yolanda about Bishop and his plan
    to frame Q. Frustrated with the troubles brought upon him, Q throws his gun into the river and decides to confront Bishop
    unarmed. Q and Bishop meet, where a fight and a chase ensue. Q is subsequently chased into a building where a party is
    being held, where Bishop begins firing into a group of partygoers in an attempt to hit Q, but Q escapes unharmed. Q manages
    to disarm Bishop while he is distracted, and he pursues Bishop to a roof of a high-rise building. As the two get into
    a physical altercation, Bishop eventually falls off the ledge, but is caught by Q. Bishop begs Q not to let go, but Q
    eventually loses his grip, and Bishop falls to his death. As Q is leaving the rooftop, a crowd from the party gathers
    to see what happened. One of the people in the crowd turns to Q and says, Yo, you got the juice now, man. Q turns to look
    at him, shakes his head in disgust, and walks away. The final scene of the movie flashes back to Bishop, Q, Raheem, and
    Steel in happier times.'
  - 'Represent the plot: British botanist Dr. Charles Decker comes back from Africa after a year, presumed dead. During that
    year, he came across a way of growing plants and animals to an enormous size. He brings back a baby chimpanzee, named
    Konga, to test out his theory. Decker goes insane after he discovers a serum that turns his chimpanzee subject into a
    ferocious gorilla-sized ape. To further his hideous experiments, he mesmerizes Konga and sends it to London to kill all
    of his enemies who have more credit in the scientific community than he already has. Among his targets are Dean Foster
    and Professor Tagore. During a field trip to the woods with a group of his students he makes an inappropriate advance
    to Sandra. He is later confronted by her boyfriend Bob and, although seeming to concede to Bob, sends Konga to strangle
    him. Decker''s assistant and lover Margaret sees him ask Sandra to become both his new assistant and his lover, then sexually
    assault Sandra when she refuses. Margaret attempts to get even by hypnotizing Konga into obeying her, then giving him
    an enormous amount of the strange serum, which turns him into an enormous monster, at which point she becomes Konga''s
    first victim. He keeps growing, and bursts through the roof of the house. Seeing Decker still attacking Sandra in the
    greenhouse, the super-sized Konga grabs Decker in one of his enormous hands, while Sandra''s arm is seized by one of Decker''s
    carnivorous plants (her ultimate fate is not shown). His rampage comes to a stop when he is attacked by heavily armed
    soldiers. After he throws Decker to his death, Konga falls. Upon his demise, Konga changes back to a baby chimpanzee.'
