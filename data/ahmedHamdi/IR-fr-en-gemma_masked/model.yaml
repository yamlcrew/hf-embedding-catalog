- source_sentence: Ever since a pet shop groomer took in a Persian cat belonging to a deceased client, she has been haunted
    by a little girl with feline eyes. The cat emits plaintive meows, and this apparition is linked to the deaths of people
    close to the groomer, who are being killed one by one. She sees herself as the next victim and, with the help of a police
    officer, decides to discover the identity of the girl with the feline eyes…
  sentences:
  - ' The Italian veline phenomenon is explained. We meet young mechanic PERSON who tries to become a TV star, but complains
    that it is more difficult for a man. TV agent PERSON admiringly says that PERSON resembles PERSON. PERSON takes embarrassing
    photographs of celebrities, and asks them for money to not publicize them. He explains that he is a new version of PERSON:
    he steals from the rich, but keeps the money to himself. When he was convicted for extortion, it made him a greater celebrity,
    and he is now cashing in on this. He is shown full-frontally naked taking a shower.'
  - So-yeon is a kind woman who works as a groomer in a pet shop called ORG, but has claustrophobia due to childhood trauma.
    A woman comes to the pet shop to collect her Persian cat, GPE, one day, after one of GPE's lengthy checkups at the pet
    shop. The next day, the woman is found dead in an elevator, but GPE is unharmed. The police are unable to determine the
    cause of her death. So-yeon's friend PERSON, one of the police officers investigating the murder, gives her GPE to look
    after, since she has already had experience with animals. So-yeon starts to have nightmares of a young girl with cat-like
    eyes and is haunted by hallucinations. Jun-seok and his fellow officers watch ORG footage of the woman who died and it's
    concluded that she died of a panic attack. So-yeon's friend Bo-hee, who recently adopted a cat, dies of a similar cause.
    That night, So-yeon cuts her finger while preparing food for GPE. GPE licks the blood and becomes aggressive. So-yeon,
    terrified, takes the cat to the dead woman's husband, but he does not want him. He explains that his wife claimed to be
    haunted by a strange little girl after buying GPE. Disturbed, So-yeon leaves GPE in a park. At the animal shelter, a staff
    member cremates a dead cat, but is pulled inside the furnace by an unseen force and burns to death. Jun-seok and So-yeon
    go to the animal shelter, where they find dead cats and the charred remains of the staff member. They learn that some
    time ago, there was an infestation of stray cats in the boiler room of an apartment complex. The doors and windows were
    cemented shut and the cats were left to suffocate. Two weeks later, workers removed the dead cats. So-yeon remarks the
    similarity of the murder victims all being found dead in a small space. She is again approached by a confused old woman
    she had encountered before, who is looking for her granddaughter. Jun-seok discovers that the old woman reported her missing
    granddaughter nine months ago, but her son closed the case. So-yeon escorts the woman back to her apartment - in the same
    complex where the stray cats lived in the boiler room - and Jun-seok gives her a photo of the granddaughter, who looks
    exactly like the cat-eyed girl So-yeon had seen in her hallucinations, the same one the dead woman had complained of seeing.
    So-yeon sees the old woman's son beating his mother; he is then killed by a horde of cats. So-yeon goes to the complex's
    boiler room and is confronted by cats. While trying to fight off the hoarde, including GPE, So-yeon falls into a large
    canister. The cat-eyed girl appears and shows her how she died; she had played with the cats in the boiler room, and upon
    hearing of the plans to kill them, she attempted to hide them in the canister. While climbing out, she fell and was paralyzed,
    dying with the cats after the door and windows were cemented. The girl also has a special relationship with those who
    have cats, and it is actually the restless spirits of the cats who have murdered the others. The girl convinces the cats
    to stop and they let So-yeon go free. Having conquered her claustrophobia, So-yeon visits her father in a mental hospital,
    riding in an elevator for the first time without panicking. As she leaves, she and Ju-seok find a kitten underneath their
    car, and she kindly beckons toward it.
  - ' Teenage pranksters PERSON, PERSON, PERSON, and GPE, a.k.a. “PrankMonkey69”, successfully convince Mrs. PERSON that an
    intruder is in her house and her daughter is in danger. The video of the prank phone call goes viral and the boys become
    well known on YouTube. With PERSON alone at home for the weekend, PERSON comes over and the two of them make more prank
    phone calls. One of their pranks involves ordering a pizza for PERSON''s neighbor PERSON. PERSON, who delivers the pizza
    from the shop where he works with PERSON''s girlfriend ORG, becomes upset with his friends for involving him in the prank.
    A mysterious man who identifies himself as Mr. PERSON begins repeatedly calling the boys, insisting that they do not hang
    up on him. PERSON and PERSON are initially indifferent until Mr. PERSON reveals that he knows their names, addresses,
    and intimate details of their lives. Peyton delivers a pizza that PERSON and PERSON didn''t order. Peyton reveals that
    PERSON disappeared after his earlier delivery. PERSON and PERSON have an uncomfortable conversation about their relationship
    before Peyton leaves. Mr. PERSON begins texting PERSON and PERSON in addition to calling. Video footage he sends them
    reveals that Mr. PERSON is holding PERSON''s parents hostage at the Mannion residence. Mr. PERSON prevents the boys from
    calling 911 by hijacking their cell phone lines. He also takes control of the house''s electrical power. A video feed
    shows the masked Mr. PERSON suffocating PERSON to death with a plastic bag tied around his head. PERSON finds PERSON similarly
    bound with a plastic bag and tied to the back door. PERSON dies soon after PERSON cuts him loose. While PERSON is away,
    Mr. PERSON makes PERSON an offer to kill PERSON in exchange for his parents'' freedom. Mr. PERSON sends footage showing
    that he captured LOC. PERSON deduces that PERSON had a private conversation with Mr. PERSON, leading to a fight between
    the two. PERSON is knocked unconscious. Mr. PERSON shows PERSON live footage of LOC held prisoner. He promises to let
    LOC go if PERSON. PERSON restrains PERSON by securing his wrist to the banister with a zip tie to prevent him from leaving.
    A clue of a child''s image and the name GPE leads PERSON to check a previously ignored social media friend request. The
    GPE account reveals that Mr. PERSON had been stalking the pranksters for over a year. PERSON also finds a video revealing
    that PERSON had been sleeping with LOC. PERSON beats PERSON again. PERSON notices from a clock in the background that
    the video of PERSON''s parents is two hours behind the current time. PERSON frees PERSON. New video shows that Mr. PERSON
    already killed PERSON''s parents. Believing that ORG is probably dead too, the boys plan to escape and contact authorities.
    However, once PERSON is outside, PERSON locks the front door and remains behind. PERSON finds a surveillance van outside
    in the rain. Inside the van, PERSON finds PERSON and rescues her. Back in the house, PERSON steps over PERSON''s covered
    body to go out the back door. In the backyard, PERSON finds PERSON''s real body. PERSON realizes that Mr. PERSON switched
    places with PERSON and hid in the house. Mr. PERSON catches PERSON off guard and attacks him. PERSON has PERSON go for
    help while he looks for PERSON. PERSON follows ORG''s screams to the backyard. A masked man suddenly lunges at PERSON
    and PERSON stabs him. The man turns out to be PERSON, tied up and gagged to look like Mr. PERSON in a mask so that PERSON
    would kill him by mistake. With PERSON and PERSON defeated, Mr. PERSON shows up and explains his actions. When the four
    boys previously called Mrs. PERSON, she dropped her phone and didn''t hear the revelation that she had been pranked. Still
    convinced that there was an intruder in the house, Mrs. PERSON grabbed a gun and accidentally shot her daughter GPE. Upon
    realizing what she had done, Mrs. PERSON killed herself. It''s implied that Mrs. PERSON and the young girl were Mr. PERSON''s
    wife and daughter, and he wanted to avenge their deaths. Mr. PERSON knocks PERSON unconscious. When PERSON wakes up, he
    finds Peyton shot in the head. Holding a knife in one hand and a gun in the other, PERSON is arrested by the police arriving
    at the scene; Mr. PERSON successfully having framed PERSON for killing PERSON and PERSON out of jealousy, as well as the
    other murders. In the epilogue, Mr. PERSON begins targeting a new teen prankster.'
- source_sentence: The wife and mistress of a private school headmaster conspire to assassinate him. PERSON (Isabelle PERSON)
    has relinquished control of ORG to her husband, PERSON (Chazz Palminteri), whose main source of amusement is terrorizing
    her. PERSON has taken in PERSON's mistress, PERSON (PERSON), who teaches at the school. One day, when PERSON becomes more
    aggressive than usual, PERSON seeks refuge with PERSON, who advises her against filing for divorce and suggests a more
    drastic solution. They drug him and then drown him in the bathtub...
  sentences:
  - PERSON is a devout Catholic schoolteacher at a boys' school outside GPE where her husband, PERSON, is schoolmaster. PERSON
    is abusive to the weak PERSON, a former nun who suffers from cardiomyopathy; his mistress, PERSON, a fellow teacher at
    the school, is protective of PERSON. When both women grow tired of his abuses, they collaborate to murder him in an apartment
    owned by a family friend of PERSON's. The women lure him there, and PERSON drugs him before they successfully drown him
    in a bathtub. They wrap his body in a shower curtain and place it in a wicker box. While en route to the school, PERSON
    crashes PERSON's car in a pileup on the interstate, but the wicker box goes unnoticed by authorities. The women arrive
    at the school in the middle of the night, and dump PERSON's corpse in the unkempt swimming pool on the property, staging
    his death as an accidental drowning. When his body fails to rise to the surface after several days, PERSON has the pool
    drained, but PERSON's body is nowhere to be found. The women subsequently discover photos taken of them on the day of
    PERSON's murder, and believe someone is blackmailing them. After reading about the discovery of a PERSON in a nearby river,
    PERSON goes to view the body at the sheriff's station, but finds it is not PERSON. There, she attracts the attention of
    PERSON, a retired police officer-turned-private investigator who offers to look into PERSON's disappearance. PERSON is
    resistant, and PERSON quickly becomes suspicious of the women. Their fears of a blackmailer are confirmed when PERSON
    discovers the shower curtain used to conceal PERSON's body hanging in her bathroom window. PERSON confronts PERSON with
    the accident report from PERSON's car, and surmises that PERSON was en route to see her in GPE on the day he disappeared.
    PERSON grows increasingly paranoid, believing PERSON is alive and stalking the women. This fear increases when two videographers
    filming an event at the school capture an image of PERSON standing in one of the building's windows. Later, while investigating
    the school's basement, PERSON is attacked and knocked unconscious. That night, PERSON finds PERSON floating in her bathtub,
    and witnesses him rise from the water. Terrified, she loses consciousness and collapses, apparently suffering a heart
    attack. Nicole arrives, and it is revealed that she and PERSON had planned the series of events to scare PERSON to the
    point of heart failure. Nicole laments, however, and tells PERSON she had wanted to call it off. While overlooking PERSON's
    body, PERSON realizes she is in fact not dead; when PERSON realizes she is alive, he attacks both women, knocking PERSON
    unconscious. PERSON flees downstairs, and PERSON tackles her to the ground in front of the pool and attempts to drown
    her. Nicole manages to stop him by driving a garden rake into his head, and he falls into the pool. As PERSON attempts
    to revive PERSON, PERSON pulls her into the pool and tries to drown her. PERSON enters the pool, and together, both women
    successfully drown him. They exit the pool and are confronted by PERSON, who punches PERSON in the face; willing to cover
    for the women, she explains it will help prove self-defense in PERSON's murder. PERSON walks away from the pool, distraught,
    and PERSON smokes a cigarette while watching PERSON's body sink to the bottom.
  - After writing a letter to the local newspaper, calling for the construction of a pleasure garden for a new war memorial,
    PERSON is overwhelmed by the response from the public. However, his call is awkward for a corrupt local councillor who
    has plans of his own for the space from which his business can profit. Other people see opportunities of their own in
    supporting PERSON's plan and he is persuaded to stand for election as a local councillor. In her efforts to help his campaign,
    Pet gets rather too enthusiastic. Meanwhile, PERSON's love life gets complicated when her boyfriend PERSON proposes marriage
    and then finds he has competition.
  - 'PERSON was once a ORG (ORG) operative known as the Glimmer Man, because he could move so quickly and quietly through
    the jungle that his victims would only see a glimmer before they died. Having retired from the ORG, Coleversed in Buddhism
    and unaccustomed to working with othershas become a detective with ORG. Cole is partnered with tough, no-nonsense detective
    PERSON, who has little patience for Cole''s New Age philosophies and outsider attitude. Cole and ORG must set aside their
    differences when they are assigned to track down a serial killer known as the Family Man, named for his habit of killing
    entire households. The Family Man''s latest victims turn out to be Cole''s former wife PERSON and her current husband
    PERSON. When Cole''s fingerprints are found on PERSON''s body, ORG and he suspect that ORG former superior in the ORG
    - may be connected with the killings. Cole contacts PERSON, who (unbeknownst to ORG and him) has been working with local
    crime boss PERSON. Cole and ORG receive a tip that leads them to PERSON. Maynard insists that the Family Man murders were
    actually committed by more than one killer. Only the slayings that occurred prior to PERSON''s arrival in GPE were GPE''s
    work; more recently, a second party has been massacring households and blaming it on GPE, whom Cole is forced to shoot
    in self defense. Seeking a lead on the other Family Man, Cole goes to the home of ORG: ORG''s Russian translator and a
    recent victim of the serial killer. PERSON finds out that the PERSON had tickets to GPE, paid for by ORG''s company. The
    Family Man makes an unsuccessful attempt on the lives of both Cole and ORG, blowing up the latter''s apartment. The Family
    Man is revealed to work for both ORG and ORG, who have murder contracts out on both of the detectives and also on PERSON,
    ORG''s own stepson. Cole and ORG chat with PERSON''s girlfriend, PERSON, who tells them where to find PERSON. The detectives
    trick and kill a hitman sent by PERSON''s stepfather. PERSON informs ORG and Cole that PERSON, ORG''s private security
    chief, is the other Family Man whose killings were confused with PERSON''s. PERSON also reveals ORG''s partnership with
    ORG. The detectives confront PERSON, who reveals that ORG has been smuggling chemical weapons into the GPE from GPE and
    selling said arms to the Serbian underworld. ORG is arranging contacts for the deal, which is being cut by ORG (the Organizatsiya).
    The sale has been scheduled to take place at a welfare hotel in downtown GPE. When Cole and ORG storm the hotel to disrupt
    the weapons deal, PERSON kills ORG (because ORG set up ORG for the LAPD, to clear himself of the arms-running charges)
    and wounds PERSON. Cole fights PERSON, who is finally tossed through a window and impaled on a wrought iron fence. As
    Cole semi-humorously observes, ...You don''t look like you''re gonna wake up happy now. ORG half-jokes that Cole has brought
    him nothing but bad luck ever since they became partners. Cole says he will keep that in mind, as ORG is driven off to
    the hospital.'
- source_sentence: GPE, a renowned Mexican journalist living in GPE, returns to his native country where he receives an honorary
    award. He will be confronted with his roots, his family, and the current realities of GPE.
  sentences:
  - PERSON is a veteran teacher of Greek and Latin at a British public school. After nearly 20 years of service, he is being
    forced to retire on the pretext of his health, and perhaps may not even be given a pension. He is disliked or ignored
    by the other teachers and while his pupils fear his relentlessly strict discipline, they are bored by his dictatorial
    but dreary and uninspiring teaching methods. His younger wife PERSON, whom he has sexually and emotionally neglected,
    is unfaithful, and now lives to wound him any way she can. She is having an affair with PERSON, an eager, young American
    science teacher who is highly popular with his pupils, much more lenient with classroom rules yet is able to connect with
    the pupils. In his final class, PERSON, while reading from a Greek play, finally shows some genuine passion about the
    subject, giving a glimpse at the teacher he could have been. PERSON's nervous new replacement PERSON expresses his awe
    at the ironclad control that the former exerts over his classes, but PERSON advises his young colleague not to follow
    his example. As his retirement at the end of the school term draws near, PERSON is approached by a quiet and sensitive
    pupil named PERSON who has detected the unhappiness and loneliness of his teacher and makes an attempt to reach out to
    him, saying that PERSON's Latin teachings have inspired him. Taplow gives PERSON a gift – a rare copy of an early edition
    of the 'Browning Version' – the 1877 translation by PERSON' ancient play PERSON. Touched by this gesture, PERSON's emotional
    guard begins to be let down for the first time. Increasingly aware of PERSON's isolation, PERSON feels guilty about the
    affair with PERSON and ends the relationship. Shortly before the end-of-term school assembly in which PERSON will make
    his farewell speech, PERSON tells her husband that she wants their marriage to end and that she intends to leave him.
    The school's senior staff want PERSON to make his speech first, to be followed by the farewell speech of a younger, more
    popular teacher who is leaving to pursue a career as a cricketer. But PERSON insists on going second, even though the
    headmaster angrily says that it will give the ceremony an 'anti-climax'. To the surprise of everyone, including PERSON
    who has lingered to watch the event, PERSON's speech is highly emotional and revelatory, apologising for his failures
    both as a teacher and as a person. Moved by the speech, the pupils and staff give PERSON a huge applause. PERSON, as a
    parting gesture of gratitude, tells Taplow that he has organised a place for him in PERSON's science class which the pupil
    had been eager to join. PERSON has a newfound sense of respect for her husband and the two part on good terms. As he watches
    PERSON drive away, PERSON sadly but calmly faces the next phase of his life.
  - 'PERSON is a Mexican journalist turned documentary filmmaker living in GPE with his wife, ORG, and teenage son, PERSON.
    His work has become increasingly personal and subjective as he has grown older; his latest film, PERSON of a Handful of
    Truths, is a work of docufiction with autobiographical elements. GPE and PERSON are happy together, but they are haunted
    by the death of their first son, GPE, a day after his birth. The two keep PERSON''s ashes and feel unable to move on from
    his loss. GPE experiences much of his day-to-day life in surreal fashion, with dreams, memories, and fantasies playing
    out alongside his activities. When he meets the GPE ambassador to GPE at PERSON, for instance, he envisions the events
    of the 1847 Battle of Chapultepec and the suicides of the Niños Héroes around him. Silverio learns that he will be the
    first Latin American to receive a prestigious American award for journalism. He speculates that he is only receiving the
    award to ease tensions between GPE and GPE (inflamed by negative perceptions of U.S.–Mexico migration as well as ORG''s
    attempts to purchase the Mexican state of GPE), but nevertheless tries to deal with a wave of media scrutiny in his home
    country. He cancels an interview on a popular talk show at the last minute, reminisces about his time as a husband and
    father, and tries to strike a balance between attacking the problems he sees with the Mexican state and defending its
    people from stereotypes. Secretly, he feels guilty over emigrating to the GPE when so many other Mexicans cannot leave.
    PERSON and his family attend a party held in his honor. He reunites with his siblings and extended family, to whom he
    is indifferent, and his adult daughter, ORG, whom he lavishes with attention. When the talk show host scathingly criticizes
    GPE''s work, the filmmaker responds by insulting the host personally. PERSON eventually flees into the restroom, where
    he imagines reconcilliations with his deceased father and mother. When he leaves his mother''s apartment, he sees symbolic
    representations of historic atrocities in GPE: hundreds of people signifying those kidnapped or killed by organized crime
    collapse in a commercial district, and ORG sits atop a pile of corpses in the PERSON, lecturing GPE about the indigenous
    genocide. Before travelling back to GPE, GPE and his family vacation in GPE, just as ORG buys the state. ORG tells GPE
    that she will quit her job in GPE to move back to GPE, which GPE tentatively welcomes. The family decide to scatter PERSON''s
    ashes in the ocean before leaving for the GPE, where they are treated with contempt by a Hispanic-American customs official.
    After PERSON reminds him of a time when his pet axolotls died, GPE buys some as a surprise gift. On the LOC ride from
    the pet store (in a repeat of an earlier scene), GPE has a violent stroke and is left unattended on the train for several
    hours. He languishes in a coma, and it is revealed that the events of the film so far have been his comatose brain''s
    attempts to process his life experience. ORG accepts the award in GPE''s absence, and she and his other family members
    and friends sit by his bedside, holding conversations and playing songs or television broadcasts that have inadvertently
    affected his dreams. In a near-featureless desert within his mind, GPE reunites with his dead family members and ignores
    projections of his living family. He sees a copy of himself, which mirrors his movements for a short time before walking
    away. The film ends as it began, with GPE imagining himself flying through the desert. It is unclear if he has died, reawakened,
    or learned to live with his baggage.'
  - In 1962 GPE GPE, Shanghainese expatriates PERSON, a journalist, and PERSON (Mrs. PERSON), a secretary at a shipping company,
    rent rooms in adjacent apartments. Each has a spouse who works and often leaves them alone on overtime shifts. Due to
    the friendly but overbearing presence of PERSON's Shanghainese landlady, Mrs. PERSON, and their bustling, mahjong-playing
    neighbours, ORG are often alone in their rooms and rarely dine with the other tenants. Although they initially are friendly
    to each other only as need be, they grow closer as they realize that their spouses are having an affair with each other,
    and subsequently try to reenact how the affair might have begun. Chow invites Su to help him write a martial arts serial.
    Their increased time together draws the attention of their neighbors, leading ORG to rent a hotel room where they can
    work together undistracted. As time passes, they acknowledge that they have developed feelings for each other. When PERSON
    takes a job in GPE, he asks PERSON to go with him. She agrees but arrives at the hotel too late to accompany him. The
    next year, in GPE, ORG relays a story to his friend about how in older times, when a person had a secret, they could go
    atop a mountain, make a hollow in a tree, and whisper it into the hollow and cover it with mud. Su arrives at GPE and
    visits ORG's apartment. She calls ORG but remains silent when ORG picks up the phone. Later, ORG realizes she had visited
    his apartment after seeing a lipstick-stained cigarette butt in his ashtray. Three years later, PERSON visits Mrs. PERSON,
    who is about to emigrate to GPE, and inquires about whether her apartment is available for rent. Sometime later, ORG returns
    to GPE to visit his former landlords the PERSON, who have emigrated to the GPE. He asks about the PERSON family next door,
    and the new owner tells him a woman and her son are now living there. Chow leaves. During the Vietnam War, ORG travels
    to GPE and visits PERSON. As a monk watches him, ORG whispers something into a hollow in a wall and plugs it with mud.
- source_sentence: 'PERSON suffers from chronic amnesia: every morning, he has to go through the various notes he''s left
    for himself in his apartment to try and remember what happened. It''s difficult to work as a private investigator when
    your memory is failing you...'
  sentences:
  - 'PERSON has retrograde amnesia, a form of amnesia that prevents him from remembering anything that happened to him the
    day before. He realizes from a recording he made for himself the previous night (Sunday) – to keep himself in the know
    – that he is a private investigator in GPE, and acquired the condition after being injured during a case. Pogue tells
    himself not to reveal his condition to anyone, as he is the key witness in the case against the man responsible for his
    amnesia. Appearing on the recording is a strange woman, PERSON, who informs him she has been living under the alias PERSON
    in GPE, and she has come to GPE because she is being blackmailed. The police then come to PERSON''s office, and take him
    to what turns out to be his birthday party. He tells his friend Dolby that he''s seen PERSON, and learns from ORG that
    PERSON is dead. While at the party, PERSON also meets PERSON, his doctor – the only person who knows of PERSON''s condition.
    Two henchmen take him from the party to meet PERSON, the man PERSON is to testify against. ORG offers PERSON a large sum
    of money to deny witnessing ORG''s involvement in the crime. On re-examining his files at the office, PERSON learns that
    PERSON was once ORG''s lover, who decided to testify against GPE lest he kill her because of her knowledge of his illegal
    activities. PERSON hired PERSON to protect her but was killed by a car bomb, the same bomb that caused his amnesia. That
    night, PERSON meets PERSON at a fashion show she is modeling in. She tells him the girl that was killed in the explosion
    was a double, and that someone is threatening to tell ORG she is still alive. PERSON also tells PERSON about a valuable
    coin ORG stole from ORG, which she in turn stole from him. PERSON tells PERSON that she gave him the coin the morning
    before the explosion; PERSON cannot remember. The only clue the two have about the coin''s location is one word PERSON
    said when PERSON gave it to him: Baby. The next morning, PERSON has forgotten everything again. ORG shows up to his office
    to get PERSON''s sworn statement but PERSON, mistaking PERSON for his landlord, gives him a check for rent. Pogue tries
    throughout the day to figure out where the coin is but doesn''t find any answers. Later on, he meets with PERSON; she
    stays at his place for the night and they make love. Pogue wakes up the following day remembering everything from the
    day before. Through learning his dog is Baby, he recalls that he hid the coin in its collar. He takes PERSON to a pay
    phone to call the people who are blackmailing her; PERSON notices that her handwriting is not the same as on the note
    the coin was wrapped in. Thus realizing she cannot really be PERSON, he switches the coin without her knowledge. He then
    follows her and finds that Doover and she set up the scam to get the coin. When Doover says they''ll have to start all
    over again after they failed to get the coin, the woman posing as PERSON refuses to go through with it again. That night,
    while sitting in PERSON''s car outside his office, the woman reveals into one of PERSON''s recorders that she is really
    PERSON, whom Doover had hired because of her resemblance to ORG. ORG''s men then kidnap PERSON when they see her in the
    car. On Thursday morning, ORG, who has figured out that PERSON has the coin, abducts PERSON and takes him to his home,
    where he attempts to torture him to give up the coin. Pogue and PERSON escape, and rush to ORG''s trial. During the trial,
    PERSON falls back in his chair and hits his head, then suddenly regains his memory. He tells PERSON that he put the coin
    in a parking meter and she speeds off to get it. Pogue then gives his testimony against ORG, which prompts ORG to change
    his plea in the case. Pogue finds PERSON back at his apartment and the story ends when the two kiss and go inside.'
  - PERSON, a retired horror writer, suffers from dementia and lives in a remote house in GPE, GPE. The house was built by
    a man for his new bride, but the couple vanished on their wedding day and left the house unfurnished. PERSON's estate
    manager, Mr. PERSON, hires live-in nurse PERSON to care for her. On PERSON's first night in the house, the telephone is
    wrenched out of her hands by an unseen force. A figure in white walking backwards is seen. A spot of black mold appears
    on the wall and slowly grows as the months pass. Lily often finds a corner of the rug at the base of the stairs has been
    flipped up, but she is the only person in the house who walks on the first floor. PERSON only refers to Lily as Polly,
    which Mr. PERSON explains was the protagonist of her most popular novel, The Lady in the Walls. Lily opens a copy of the
    book and finds that the novel implies that PERSON knew Polly during her lifetime and is retelling her story. In 1812,
    Polly, wearing a wedding dress and black blindfold, walks through the empty house under the watchful eye of her husband.
    In the kitchen, PERSON briefly hallucinates that her arms have become bloated and covered in black mold spots. That evening,
