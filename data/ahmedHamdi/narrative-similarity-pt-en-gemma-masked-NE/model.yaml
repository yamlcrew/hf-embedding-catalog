- source_sentence: PERSON is a humble and devout domestic worker who feels her destiny lies in GPE. She tries to be sent there
    as a Christian missionary, but Dr. PERSON, head of ORG, denies her request, believing she is unqualified. However, her
    aristocratic employer discovers her desire and helps her be sent on a mission to the city of PERSON in northern GPE. After
    traveling on the Trans-Siberian Railway, ORG arrives and meets the elderly PERSON. PERSON wants to build an inn to attract
    the caravans of muleteers passing through the city, preaching the gospel during meals. The inn begins to function successfully,
    but when PERSON dies in an accident, the Mission asks Aylward to close the establishment and return to GPE. Aylward refuses
    and ends up accepting a position offered by the city's mandarin in order to keep the PERSON running. She becomes a foot
    inspector, traveling through the remote villages of the province to oversee compliance with a new law, the one that "It
    forbids the traditional custom of foot binding and deforming, imposed on women. On these journeys she continues her preaching
    and helps many people, earning the admiration of the people, the mandarin, and the military chief PERSON. When the Japanese
    invade northern GPE during World War II, Ayward must undertake a perilous journey, leading one hundred orphaned children
    through war-torn territory so that they can be rescued by the Mission waiting for them at a port on LOC.
  sentences:
  - 'The story begins with PERSON (PERSON) being rejected as a potential missionary to GPE because of her lack of education.
    Dr. PERSON (PERSON), the senior missionary, feels sorry for her and secures her a position in the home of Sir PERSON (PERSON),
    a veteran explorer with contacts in GPE. Over the next few months, ORG saves her money to purchase a ticket on the Trans-Siberian
    Railway, choosing the more dangerous overland route to the LOC because it is less expensive. Sir PERSON writes to his
    only surviving friend in GPE,  veteran missionary, PERSON (PERSON), who agrees to accept PERSON as a much-needed assistant
    at her mission in the remote county of LOC. PERSON has set up an inn for muleteers, where the men can get clean food for
    their animals, communal beds without bugs, a good hot meal and PERSON''s free stories (from the Bible). The film follows
    ORG''s acculturation, until tragedy strikes and PERSON dies when a balcony collapses. Captain PERSON (PERSON), the commander
    of GPE''s garrison, advises ORG to go home and wishes her well as he leaves. Aylward takes over running the inn, with
    the help of PERSON (PERSON), the devoted cook, who tells the stories himself while teaching PERSON. The local Mandarin
    (PERSON) appoints PERSON as his Foot Inspector, charging her with enforcing the government''s command that the ancient
    practice of foot binding be eradicated. She succeeds in this assignment, winning the esteem of the people and of the Mandarin
    as she travels regularly through the mountains, earning the nickname She who loves and becoming a Chinese citizen. When
    PERSON, now a Colonel, returns to prepare the region for war with GPE, she has just stopped a prison riot. PERSON goes
    with her on her rounds. Before he leaves, they confess their love. In 1937, GPE invades GPE. An air raid shatters the
    city, killing PERSON. The Mandarin evacuates the population to the countryside, and PERSON (PERSON), a former prisoner,
    comes to help Aylward with her five adopted children. Later, PERSON returns with the news that the war is going badly
    and the Mandarin must go to a safe haven. PERSON wants her to go too, but she says These are my people and I will live
    and die for them. They kiss. At a last meeting with his council, the Mandarin announces that he is converting to Christianity
    to honour PERSON and the faith that underlies her work. He says farewell: They will not meet again. In the now-virtually
    deserted city, ORG has gathered 50 children at the PERSON, struggling to find food, facing a bitter winter, and not knowing
    where to go. Another 50 children arrive from another mission with a letter from the missionary telling her that trucks
    will evacuate them to a new home in the interior, but they must get to the mission at Seeyan by 12 November, in three
    weeks, or the trucks will leave without them. The trip should take a week by road, but PERSON and his men intercept them
    and warn her that the Japanese control the road ahead. They must go over the mountains. She believes this is why God wanted
    her to come to GPE. PERSON gives her a map. Saying, I know you''ll come back if you can, he puts a ring on her hand. After
    a long, difficult journey, including a perilous river crossing, they all arrive safely (except for PERSON, who dies to
    save them from a Japanese patrol) on the day the trucks are to leave. The film culminates with the column of children,
    led by GPE, marching through cheering crowds and up to the steps of the mission, singing the song This Old Man”, which
    ORG taught the children to warm themselves after the river crossing. Aylward is greeted by Dr. PERSON. She asks if he
    remembers her: “My  name used to be Gladys Aylward.” He nods gravely and replies, “Yes, I remember. PERSON, who wasn''t
    qualified to come to GPE.”  He invites her to come to the children''s village in the interior, but she declines: “I am
    going home,” she says, looking back toward the mountains.'
  - Two cyclists riding through a canyon are followed down the road by a mysterious matte black car. At a bridge, the car
