- source_sentence: 'At 19 years old, PERSON is in a difficult situation: he has lost a large sum of money belonging to the
    gangster GPE (PERSON), for whom he works, and needs to recover it before the disappearance is noticed and he is killed.
    While he searches, two street kids, who found the money, go on a shopping spree.'
  sentences:
  - ' PERSON, while working as bouncer at a strip club in ORG, is approached by local mob boss GPE who says he has work for
