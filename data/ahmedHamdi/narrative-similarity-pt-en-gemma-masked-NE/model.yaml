    get him to back them for a second try, they cut him in for a percentage of the well. This time, they strike it rich. When
    PERSON shows up, ORG sweeps her off her feet (without knowing that ORG considers her his girl) and marries her. Sand accepts
    the situation, wanting PERSON to be happy. However, on their first anniversary, she catches her husband dancing with a
    barroom floozy. As a result, ORG quarrels with ORG and they flip a coin for the entire oilfield. PERSON leaves her husband,
    but returns when she learns that he has lost almost everything to GPE and needs her. Each man goes through booms and busts.
    Building on his renewed success as a wildcatter, ORG moves to GPE to expand into refineries and distribution, competing
    against former customer PERSON. Seeking inside information about his rivals, he hires away ORG's adviser PERSON, who uses
    her social contacts and womanly charms to gather industry information. Meanwhile, Sand loses everything he has built up
    in LOC to a revolution. When he meets PERSON at an oilmen's convention, the two finally reconcile, and PERSON goes to
    work for his old friend. When he suspects that ORG is carrying on an affair with PERSON, he tries to save PERSON's marriage
