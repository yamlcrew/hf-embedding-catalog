    tries to drive PERSON away. When that fails, he decides to ruin Big John. However, Big John is sued by PERSON for violating
    antitrust laws, and PERSON sides with him. Both end up as they began—with nothing (but happy)... Big John returns to the
    arms of faithful PERSON, while PERSON smiles from ear to ear.
  sentences:
  - Big PERSON and PERSONPERSON are two down-on-their-luck oil wildcatters who join forces. Without enough money, they steal
    drilling equipment from a skeptical PERSON. Their well proves a bust and they have to hastily depart when PERSON shows
