      upset and PERSON suggests that they leave, but a shadow-like ghoulish being attacks GPE that night. The next day, PERSON
      and PERSON find a catatonic GPE with her sheets soaked with blood; despite assurance from the local doctor, the two
      become suspicious. PERSON and PERSON hitch a ride into town with the mailman to get a new car battery, and are informed
      by the mailman that the people at ORG are not Amish. Using the internet, they find about the demon PERSON: According
