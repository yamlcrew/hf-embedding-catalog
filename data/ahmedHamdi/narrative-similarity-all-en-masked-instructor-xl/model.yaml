      in whom Elektra sees much of herself, and in PERSON''s father, PERSON (PERSON). In her desperate struggle to save them,
      Elektra finds something she didn''t know existed: redemption. On her journey, Elektra encounters an army of aggressors
      with deadly supernatural powers, killer-looking tattoos with a life of their own, and a disease-spreading demon known
      as Typhon Mary. Her only allies are her combat partner, her trusted sai, and, above all, a mystical power known as ORG:
      the ability to foresee events before they happen.'
    sentences:
    - 'Represent the plot: Margot and her cameraman friend PERSON want to make a documentary about GPE''s past. Her mother,
