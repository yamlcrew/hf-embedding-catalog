      Harper hires PERSON as his driver to take his luxury convertible to GPE and drop him off at his hotel. Simpson arrives
      at the border, and the car is searched by Turkish customs officials, who find a rifle and smoke grenades hidden inside—items
      that would be used to cover the thieves'' escape. PERSON is arrested and handed over to the Turkish secret police, suspected
      of being a terrorist involved in an assassination attempt. The police eventually agree to let him go, on the condition
      that he become an informant, spying on PERSON and everyone ORG contacts in GPE. ORG has no choice but to accept. Once
      in GPE, he meets with ORG, and the rest of the gang of criminals who will participate in the robbery: PERSON (PERSON),
      an alarm expert; PERSON (PERSON), the strongman; and PERSON "the human fly" (Gilles Ségal), an acrobat. After completing
      his mission as a spy, with meager results, ORG eventually becomes, by chance, a member of the gang. Even after he finally
      confesses his role as an informant, PERSON accepts him out of necessity, as he has to replace one of the robbers. Unaware
