- source_sentence: 'Represent the plot: The film tells the story of the filming of ORG, an adaptation of PERSON PERSON, but
    with a different name, made in 1922 by director PERSON, played by PERSON. Strongly desiring to make his film as authentic
    as possible, he hires a real vampire for the lead role. The cast is curious, as no one knows PERSON (Willem Dafoe), but
    PERSON explains that PERSON studied with PERSON and fully commits to the role, never ceasing to be the character, even
    outside of filming hours. When PERSON appears, he doesn''t reveal himself to be a strange or temperamental actor, but
    totally bizarre, as he is always in makeup, only films at night, and becomes quite uncontrollable when he sees blood.
    Furthermore, after filming him, PERSON (PERSON), the cinematographer, becomes very ill, and it soon becomes clear that
    PERSON has sunk his fangs into PERSON''s neck. The director pressures him to fulfill the agreement between the two, in
    which he..." He has to control himself to win his prize: the neck of PERSON (PERSON), the star of the film. But as filming
    progresses, PERSON ignores PERSON''s threats and becomes increasingly uncontrollable. The director goes to GPE to have
    PERSON committed and returns to GPE with ORG (PERSON), the new cinematographer, but while this is happening, PERSON (Udo
    Kier), the producer, and ORG, the screenwriter, try to discover who PERSON really is.'
  sentences:
  - 'Represent the plot: As described in a film magazine review, PERSON (Barthelmess), physically wrecked by the late war
    and hating himself because of his twisted body and hollow cheeks, breaks his engagement with his boyhood sweetheart and
    quits his family to seek isolation in a lonely cottage in the woods. There he meets PERSON (McAvoy), a lonely little governess,
    whose plainness makes her unattractive to men. They marry and then both commit themselves to intense depression because
    they are both so ugly. However, with the dawning of real love, both commence to see each other through the beauty of the
    soul, with the consequence that each appears as handsome to each other as either could wish. In the week of their enchantment,
    they have found love and they look forward to a future happiness and to the creation of children who will embody the beauty
    they do not possess.'
  - 'Represent the plot: PERSON is a young woman who yearns for fame. Strolling through LOC, she meets PERSON, who is a documentary
    maker. Gladys tells him she has just been fired and has $1,000 saved up. Despite her savings, she is discouraged at having
    gotten nowhere in two years and she wants to make a name for herself. PERSON, who is clearly taken with her, gets her
    address by offering to drop her a postcard when the documentary is finished so she can see herself in it. He encourages
    her to follow her dreams before the two part ways. Wandering despondently, PERSON''s attention is caught by a large billboard
    overlooking LOC that is available for rent. She has visions of her name on the billboard, and manages to secure it. Within
    a few days the sign is up and she is thrilled. However, it turns out ORG company has traditionally booked the sign and
    is upset to learn that another client has obtained it. She is called to a meeting where PERSON attempts to induce her
    to give up the sign by offering her more money.  PERSON is not interested. She is called to another meeting and is offered
    six signs in exchange for the one. This time, she accepts. Now, there are six huge signs in GPE, one in lights, each saying
    simply PERSON. Meanwhile, PERSON has taken an apartment adjacent to PERSON, and the two become friends. PERSON is, however,
    exasperated by PERSON''s fascination with her signs and her requests he tour the city with her to see them. City-goers
    are intrigued by the mysterious signs. Gladys shops in ORG''s department store, and when she gives her name, the word
    spreads quickly and dozens of people flock to get her autograph. Soon, PERSON is being asked to appear on television shows,
    where she is treated as a figure of fun. PERSON is not pleased with her portrayal on television, but PERSON does not seem
    to realize that she is not being depicted in the most flattering light. As she becomes more known to the public, PERSON
    hires her to do a series of advertisements for ORG. While Gladys pursues what is becoming a lucrative career, relations
    between her and PERSON become strained, as he sees no merit in her ambitions to be famous. At the same time, PERSON is
    showing an increasing interest in her. The situation reaches a crisis when Gladys breaks a date with PERSON and his parents
    in order to attend what PERSON says is a business conference to discuss a cross-country publicity tour. The conference
    turns out to be an attempted seduction, and she leaves. When she arrives home she finds a film from PERSON confessing
    that he loves her, and that the film is his farewell. PERSON''s advertising career continues, but she begins to find the
    jobs more humiliating, and their emptiness frustrating. She recalls PERSON''s frequent questions as to why she wants to
    be above the crowd instead of being happy as part of the crowd. When a plane is named after her by the ORG, she is asked
    to speak at a ceremony, but breaks off, realizing the truth behind PERSON''s words. She finally resolves to end her quest
    for fame, and arranges for a plane to skywrite a message to PERSON, which he reads while filming a crowd sequence in the
    zoo. The film ends with PERSON and PERSON on their honeymoon. As they drive and discuss their future plans, PERSON''s
    attention is caught by an empty billboard available for rent. PERSON notices this and asks what she is looking at, and
    PERSON replies as she embraces him: Nothing, absolutely nothing!'
  - 'Represent the plot: In 1921, German director PERSON is shooting ORG, an unauthorized version of PERSON novel PERSON.
    PERSON keeps his team in the dark about their schedule and the actor playing the vampire Count Orlok. It is left to the
    film''s other main actor, PERSON, to explain that the lead is an obscure German theater performer named PERSON, who is
    a character actor. To involve himself fully in his role, PERSON will only appear amongst the cast and crew in makeup,
    will only be filmed at night, and will never break character. After filming scenes in a studio with leading actress PERSON,
    PERSON takes his cast and crew to a remote inn in GPE to film on-location. The landlady becomes distressed at PERSON removing
    crucifixes around the inn, and the cameraman, PERSON, falls into a strange, hypnotic state. Gustav discovers a bottle
    of blood amongst the team''s food supplies, and someone delivers a caged ferret in the night to a not yet fully revealed
    PERSON. One night, PERSON rushes his team up to a nearby, old PERSON castle for the first scene with the vampire. PERSON
    appears for the first time, and his appearance and behavior impress and disturb them. The film''s producer, PERSON, is
    confused when PERSON tells him that he originally found PERSON in the castle. Soon after the completion of the scene,
    PERSON is found collapsed in the tunnel into which PERSON had receded. Whilst filming a dinner scene between ORG and PERSON,
    PERSON accidentally cuts his finger. Schreck reacts wildly and tries drinking from ORG''s wound. The lights fail and when
    they return, PERSON is at PERSON''s neck. PERSON orders filming ended for the night, and the crew rushes from the castle,
    leaving PERSON behind. Alone, PERSON examines the camera equipment, fascinated by footage of a sunrise. With PERSON near
    death, PERSON is forced to bring in another cinematographer, ORG, after chastising PERSON in private for attacking his
    crew members, and threatening him with harm if he does not control himself in PERSON''s absence—a threat that PERSON challenges
    due to his immortality. While PERSON returns to GPE to calm financiers of the film, PERSON approaches PERSON and the screenwriter,
    PERSON. They believe he is still in character, and PERSON points out PERSON''s loneliness and the sadness of him trying
    to remember how to do otherwise mundane chores that he has not needed to perform for centuries. When they ask how he became
    a vampire, PERSON says it was a woman. Schreck snatches a bat and viciously sucks its blood. Grau and Galeen, thanks to
    their drunkenness on schnapps, are impressed by what they assume is talented acting. Later that night, PERSON attacks
    and kills a crew member on the film''s set. The production moves to the island of GPE to film the final scenes, and PERSON,
    in a laudanum-induced stupor, admits to PERSON and PERSON that PERSON is an actual vampire, and in return for his cooperation,
    PERSON has promised him PERSON. The two realize they are trapped on the island, leaving no choice but to complete the
    film that night. On set PERSON becomes hysterical after noticing PERSON casts no reflection. PERSON, PERSON and PERSON
    drug her with PERSON''s laudanum, and film as PERSON feeds on PERSON, with the laudanum in her blood putting PERSON to
    sleep. At dawn, the three attempt to open a door and let in sunlight to destroy PERSON, but discover that the vampire
    had previously cut the chain to the mechanism, trapping them in the process. PERSON and PERSON attack PERSON, only to
    be killed. PERSON, meanwhile, resumes filming, and, crazed, completely ignores the deaths of his colleagues and the malicious
    glare PERSON is giving him. Instead, he instructs PERSON to return to his mark for another take. Schreck returns to feed
    on PERSON, as PERSON films. Galeen and the crew arrive and lift the door, destroying PERSON with the sunlight. Having
    become completely obsessed with the film, PERSON asks for an end slate to his rattled crew. After they oblige, he stops
    the camera and calmly states, I think we have it.'
- source_sentence: 'Represent the plot: GPE, accompanied by PERSON and the clumsy ORG (no relation to the mythological figure
    of the same name), ventures into the ORG to retrieve a stone with miraculous powers and save his beloved PERSON, who is
    in danger of being manipulated by the evil ORG. Once in the darkness of this realm, the four will face countless perils.
    Back home, the hero will have to confront a strange curse and nefarious plots surrounding the succession to the throne
    of GPE.'
  sentences:
  - 'Represent the plot: ORG is working as a croupier in a casino in ORG.  A group of violent criminals assassinate her employer
    and enter the casino shooting staff and demanding entry to the casino''s safe.  ORG delays her retaliation and retribution
    as she protects the lives of her staff. When the criminals kill the only person who can open the safe, Modesty arranges
    for a fellow employee to arrive who has the password for the computer that holds the details of the entry to the vault.
    As the criminals and their captives await the individual, ORG takes on the leader of the criminals at the game of roulette.
    They agree that if she wins twice in a row a captive sworn to not tell what happened is released; when she loses she has
    to tell the truth about her background to the leader of the criminals who has become fascinated by her. She relates her
    life story little by little in the manner of Scheherazade. Modesty tells her life story in flashback beginning as an orphaned
    child in a refugee camp in the LOC, to her meeting her mentor who teaches her his knowledge of various languages and martial
    arts until his death in GPE where she makes her way to ORG and becoming a croupier. The criminals eventually enter the
    safe but are confronted with a revenging ORG. The time setting of the film is kept vague. Although flashback sequences
    involving warfare invoke World War II or other conflicts in the late 1940s and early 1950s (in keeping with the original
    comic strip), ORG as an adult is shown using computers and other current (for 2004) technology.'
  - 'Represent the plot:  Upon his return to GPE from his many adventures, the great warrior GPE learns that his lover, Princess
    PERSON, has lost her senses. According to the oracle ORG (PERSON), PERSON''s only hope is ORG which lies deep in the realm
    of Hades. Hercules, with two companions, PERSON and ORG, embarks on a dangerous quest for the stone, while he is unaware
    that ORG''s guardian, PERSON, is the one responsible for her condition and plots to have the girl for himself as his bride
    upon her revival. ORG is in fact in league with the dark forces of the underworld, and it is up to GPE to stop him. The
    climax has Hercules smashing Lico with a giant boulder and throwing similarly large rocks at an army of zombies.'
  - 'Represent the plot: In a rough part of town, a carrot-eating drifter and military veteran named PERSON sees a heavily-pregnant
    woman fleeing a hitman. Smith kills the hitman by stabbing him in the head with a carrot and retrieves the woman''s pistol.
    More thugs arrive, led by the ruthless ORG. The woman goes into labor and PERSON delivers her baby boy during a shootout,
    but the woman is shot dead. PERSON narrowly escapes with the newborn. Smith abandons the baby in a park, hoping someone
    will adopt the baby, but a passing woman is killed with a shot from ORG''s sniper rifle. Realizing that ORG is trying
    to kill the baby, PERSON saves him and tries unsuccessfully to leave him with a prostitute named PERSON.  ORG arrives
    at the brothel and tortures PERSON for information; ORG returns and kills ORG''s henchmen. After a brief confrontation,
    ORG shoots ORG and leaves with PERSON and the baby. ORG survives as he wore a bulletproof vest. Taking PERSON to his hideout,
    PERSON realizes that the baby (whom he names PERSON) stops crying when he hears heavy metal music; he concludes that PERSON''s
    mother lived near a heavy metal club. Pursued by ORG, PERSON shoots his way out of the hideout, and he and PERSON head
    to a nearby club. Above the club they discover an apartment with medical equipment and two dead, pregnant women; PERSON
    concludes that the women were all impregnated with one man''s sperm in order to give birth to matching bone marrow donors.  When
    PERSON and PERSON have sex in a motel room, a squad of gunmen attack; PERSON shoots all of them without stopping intercourse.
    PERSON notices that the gunmen had PERSON guns, unavailable to the public. PERSON brings PERSON and PERSON to a war museum
    and hides them in a M24 Chaffee tank for safekeeping. PERSON infiltrates the PERSON factory and hears ORG and PERSON saying
    that they do not want the next president to repeal the right to bear arms. He also notices that PERSON owns a German Shepherd
    dog named Duchess. Smith booby-traps the facility with firearms, allowing him to kill the thugs and escape. During a shootout,
    ORG reveals that he discovered that PERSON is a former PERSON whose wife and kid were killed in a shootout in a burger
    joint. PERSON sees an article about Senator ORG, a Democratic presidential candidate who favors stricter gun laws. Smith
    deduces that ORG has cancer and requires a bone-marrow transplant.  Due to which, ORG had impregnated the woman with his
    sperm (and why ORG and PERSON want PERSON dead). If the infants die, the senator will not receive a transplant and would
    be unable to run for president. PERSON tells PERSON to leave town and contacts one of ORG''s henchmen to request an appointment.
    Meeting on an airplane, the senator confirms ORG''s suspicions and PERSON notices dog hair on ORG''s trousers. Deducing
    that the hair belongs to Duchess and that the senator made a deal with PERSON, PERSON takes ORG hostage. ORG appears and
    reveals that he agreed to help ORG find a bone-marrow donor, on the condition that ORG protects ORG''s constitutional
    right to bear arms when elected president. Smith kills the senator, whose assassination he explains will cause public
    outrage and trigger immense support for his gun control proposals. Smith parachutes from the airplane and kills several
    pursuing henchmen, but is himself shot and collapses after he lands, where he awakens in PERSON''s mansion; ORG tortures
    him, breaking his fingers in an attempt to learn where PERSON sent PERSON and PERSON. As ORG prepares to cut ORG''s eyes,
    PERSON breaks free and kills PERSON and several thugs. Struggling to use his gun, ORG places live bullets between his
    broken fingers and detonates them with a fireplace, critically wounding ORG. Both struggle with pistols, but ORG fires
    first, killing ORG. Smith travels with ORG to an ice-cream parlor where PERSON works as a waitress while watching PERSON.
    Surprised to see each other alive, he and PERSON kiss passionately. Three amateur armed robbers enter the parlor; his
    hands in bandages, PERSON shoots them by using a carrot to pull the trigger.'
