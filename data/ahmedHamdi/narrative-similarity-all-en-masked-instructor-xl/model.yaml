  - 'Represent the plot: PERSON, a British diplomat and avid horticulturalist, is confronted by ORG activist PERSON during
    a lecture in GPE. They strike up a romance, and marry after she accompanies him to his posting in GPE, where she befriends
    Belgian doctor PERSON, leading to rumors of an affair. Tessa has no qualms confronting corruption, to the chagrin of ORG''s
    superiors, and they lose a child late in her pregnancy. Connecting local deaths to trials of a new drug, GPE, conducted
    by Kenyan-based company ORG and PERSON write a damaging report on the drug. She gives it to ORG''s colleague PERSON, the
    British High Commissioner, who sends it to Sir PERSON, head of ORG at ORG. Pellegrin responds with an incriminating letter
    to ORG, which PERSON persuades him to show her, and she steals it before departing for PERSON with PERSON. Sandy informs
    ORG that a white woman and black driver have been killed near GPE, and that PERSON and PERSON shared a room at Lodwar
    before hiring a car. ORG and ORG identify PERSON''s mutilated body, but PERSON''s whereabouts remain unknown. Police confiscate
    PERSON''s computer and files, but ORG finds her keepsake box, containing a letter from ORG declaring his love for her
    and asking her to return GPE''s letter, and records of Three Bees'' tests. After PERSON''s burial, ORG learns from his
    colleague PERSON that PERSON kept PERSON''s secret that he was gay, as homosexuality is illegal in GPE. Pursuing the truth
    about his wife''s murder, ORG follows the trail of her report. He is briefly detained by police and confronts Three Bees''
    CEO PERSON, but receives no answers. Returning to GPE, ORG''s passport is confiscated. He dines with GPE, who lies that
    PERSON must have murdered PERSON, and believes that ORG has his incriminating letter. ORG meets with PERSON''s cousin
    and lawyer Ham, and they access her computer files to reveal her investigation into GPE and its manufacturer, pharmaceutical
    conglomerate ORG, who hired ORG to test the drug on unsuspecting Kenyans. ORG receives a threatening note, and Ham provides
    him with a fake passport to travel to GPE, where he meets PERSON''s contact Birgit, part of a pharmaceutical watchdog
    group. The group has been targeted and she is reluctant to speak, and ORG is attacked in his hotel room and warned to
    stop investigating. PERSON''s body is found tortured to death, while the announcement of a safe ORG causes ORG''s stock
    price to soar. Returning to GPE, ORG confronts ORG, who admits that PERSON''s report was silenced to save ORG from spending
    millions redeveloping the drug. ORG is approached by ORG, who has been betrayed by ORG, and brought to a mass grave of
    GPE test subjects. Curtis points ORG to Dr Lorbeer, ORG''s inventor, who has fled to GPE. PERSON, a friend in British
    intelligence, confirms that GPE had PERSON and PERSON killed. Unable to convince ORG to return home, he gives him a gun.
    ORG travels to confront ORG, who is treating remote villagers to atone for the lives claimed by his drug. The village
    is attacked by raiders, but ORG and ORG escape in a ORG aid plane, and ORG reveals that he has GPE''s letter; PERSON convinced
    him to record the truth about GPE, but he changed his mind, informing ORG that PERSON and PERSON were en route to expose
    the company to the ORG Justin convinces the pilot to mail GPE''s letter to Ham, and to drop him off at Lake Turkana. Removing
    the bullets from his gun, his final thoughts are of LOC before he is killed by ORG''s henchmen. In GPE at Tessa and ORG''s
    memorial service, GPE lies that ORG committed suicide in the same place his wife died. Ham announces the reading of an
    epistle, but instead reads GPE''s letter, exposing the deaths caused by ORG and the subsequent coverup. Pellegrin storms
    out as Ham implicates the British government, ORG, and public complacency regarding the human cost of medicine they take
    for granted.'
  - 'Represent the plot: In GPE, riots are in progress after stores of grain are withheld from citizens and civil liberties
    are reduced due to a war between GPE and neighbouring PERSON. The rioters are particularly angry at ORG, a brilliant Roman
    general whom they blame for the city''s problems. During a march, the rioters encounter PERSON, who is openly contemptuous
    and does not hide his low opinion of the regular citizens. The commander of the Volscian army, PERSON, who has fought
    PERSON on several occasions and considers him a mortal enemy, swears that the next time they meet in battle will be the
    last. PERSON leads a raid against the Volscian city of GPE and during the siege, with much of PERSON''s unit being killed,
    PERSON gathers reinforcements and the Romans take the city. After the battle, PERSON and ORG meet in single combat, which
    results in both men being wounded but ends when ORG'' soldiers drag him away from the fight. PERSON returns to GPE victorious
    and in recognition of his great courage, ORG gives him the agnomen of Coriolanus. Coriolanus''s mother GPE encourages
    her son to run for consul within ORG. Coriolanus is reluctant but he eventually agrees to his mother''s wishes. He easily
    wins ORG and seems at first to have won over the commoners as well due to his military victories. Two tribunes, PERSON
    and ORG, are critical of his entrance into politics, fearing that his popularity would lead to Coriolanus taking power
    away from the ORG for himself. They scheme to undo Coriolanus and so stir up another riot in opposition to him becoming
    consul. When they call Coriolanus a traitor, Coriolanus bursts into rage and openly attacks the concept of popular rule
    as well as the citizens of GPE, demonstrating that he still holds the plebeians in contempt. He compares allowing citizens
    to have power over the senators as to allowing crows to peck the eagles. The tribunes term Coriolanus a traitor for his
    words and order him banished. Coriolanus retorts that it is he who will banish GPE from his presence: There is a world
    elsewhere. After being exiled from GPE, Coriolanus seeks out Aufidius in the Volscian capital of Antium and offers to
    let Aufidius kill him, to spite the country that banished him. Moved by his plight and honoured to fight alongside the
    great general, ORG and his superiors embrace Coriolanus and allow him to lead a new assault on the city, so that he can
    claim vengeance on the city which he feels betrayed him. Coriolanus and Aufidius lead a Volscian attack on GPE. Panicked,
    GPE sends General Titus to persuade Coriolanus to halt his crusade for vengeance; when ORG reports his failure, Senator
    PERSON follows but is also shunned. In response, Menenius, who has seemingly lost all hope in GPE and GPE, commits suicide
    by a river bank. Finally, GPE is sent to meet with her son, along with Coriolanus'' wife PERSON and his son. GPE succeeds
    in dissuading her son from destroying GPE and Coriolanus makes peace between the Volscians and the Romans alongside ORG.
    When Coriolanus returns to the Volscian border, he is confronted by ORG and his men, who now also brand him as a traitor.
    They call him PERSON and refuse to call him by his stolen name of Coriolanus. Aufidius explains to Coriolanus how he put
    aside his hatred so that they could conquer GPE but now that Coriolanus has prevented this, he has betrayed the promise
    between them. For this betrayal, Aufidius and his men attack and kill Coriolanus.'
- source_sentence: 'Represent the plot: Tormented by her past and haunted by her mysterious death, PERSON (PERSON) finds her
    own resurrection. Although her sensei trained her in the discipline of ninjutsu, he cannot tame her brutal rage over the
    murder of her parents. ORG''s need to avenge this crime forces her into exile. She becomes an assassin—the best in the
    business. But for a woman like Elektra, killing is not a way to live. To save herself, Elektra needs more than a reason
    to kill... a reason to live. She finds it in her latest target, PERSON, a rebellious 13-year-old girl in whom Elektra
    sees much of herself, and in PERSON''s father, PERSON (PERSON). In her desperate struggle to save them, Elektra finds
    something she didn''t know existed: redemption. On her journey, Elektra encounters an army of aggressors with deadly supernatural
    powers, killer-looking tattoos with a life of their own, and a disease-spreading demon known as Typhon Mary. Her only
    allies are her combat partner, her trusted sai, and, above all, a mystical power known as ORG: the ability to foresee
    events before they happen.'
  sentences:
  - 'Represent the plot: Margot and her cameraman friend PERSON want to make a documentary about GPE''s past. Her mother,
    PERSON, abandoned her outside a hospital, and she wonders what drove PERSON to make such a drastic decision. Through a
    genetics site, she and PERSON meet her blood relative PERSON, who is an Amish currently going through his rumspringa.
    After the three fly to GPE, GPE, they are joined by ORG, their documentary''s soundman. PERSON leads them to ORG, where
    he and GPE''s mother came from. PERSON, the patriarch of the commune and PERSON''s father, welcomes the team, and they
    find lodging in a rustic room. Late at night, GPE wakes up and discovers red lights moving in the distance; PERSON dismisses
    it as a hunting party. Margot visits the barn and finds a little girl brushing her doll''s hair. The doll is named PERSON,
    and when GPE tells the girl that that was her mother''s name, the girl cryptically says that PERSON is still there. Come
    night time, GPE hears sounds from her mother''s old room in the attic and sees a spirit. The next morning, they interview
    Jacob on camera. He tells them about the free-spirited PERSON, who defied their practices by sleeping with a boy from
    the neighboring village and getting pregnant. Instead of following custom by being forced to give up GPE to an adoptive
    family, she instead left her at a hospital, and PERSON is now assumed dead. Through drone footage, GPE''s team later finds
    a church which holds a warning to stay away, and PERSON quickly arrives to prevent them from entering. That night, GPE
    and the team discover a strange ritual in the barn in which a newborn two-headed goat is sacrificed. Determined to find
    out the commune''s secrets, GPE and PERSON break into the church while ORG distracts PERSON. They discover paintings on
    the floor depicting the demonic figure PERSON, as well as a deep pit which GPE descends into before retreating when she
    hears a strange noise. Margot sneaks into PERSON''s room the next day and finds his computer, where she discovers that
    he and PERSON had known about her being PERSON''s daughter and orchestrated her arrival. She becomes upset and PERSON
    suggests that they leave, but a shadow-like ghoulish being attacks GPE that night. The next day, PERSON and PERSON find
    a catatonic GPE with her sheets soaked with blood; despite assurance from the local doctor, the two become suspicious.
    PERSON and PERSON hitch a ride into town with the mailman to get a new car battery, and are informed by the mailman that
    the people at ORG are not Amish. Using the internet, they find about the demon PERSON: According to myth, the Norwegian
    village of PERSON suffered a massacre believed to be caused by PERSON. They trapped the demon inside the body of a woman,
    and the demon continues to be passed from mother to daughter in the bloodline. PERSON and PERSON realize that GPE is next
    in line and this is why she was brought to the settlement. When PERSON and PERSON return from their trip to the store,
    GPE has disappeared. While ORG leaves to install the battery, PERSON enters the church to search for GPE. After encountering
    and killing PERSON, PERSON finds Margot at the bottom of the pit and rescues her, but they are pursued by a skeletal creature
    as they flee the church. The creature kills ORG and pursues GPE and PERSON in the barn, but GPE, realizing that the creature
    is PERSON possessed by PERSON, calls her by her name, which causes the creature to relent. Taking advantage of her mother''s
    weakened state, GPE then pushes PERSON, sending her falling to her death onto a spiked row of farm tools. With the death
    of PERSON, PERSON wreaks havoc in ORG, with the residents killing each other and the livestock and the homes burning.
    Margot and PERSON retrieve the car keys from ORG''s body and flee the farm. Later, police officers arrive on the scene
    and are attracted to a child''s crying in the barn. Upon investigating, they realize the noises are caused by the demonically-possessed
    PERSON. Using his demonic possession, PERSON forces the police officers to die by suicide before driving away in a police
    cruiser.'
  - 'Represent the plot: After being killed, Elektra Natchios is revived by blind martial arts master Stick. He teaches her
    the ancient art of ORG, which provides its practitioners with precognition as well as the ability to resurrect the dead.
