    - 'Represent the plot: In GPE, riots are in progress after stores of grain are withheld from citizens and civil liberties
      are reduced due to a war between GPE and neighbouring PERSON. The rioters are particularly angry at ORG, a brilliant
      Roman general whom they blame for the city''s problems. During a march, the rioters encounter PERSON, who is openly
      contemptuous and does not hide his low opinion of the regular citizens. The commander of the Volscian army, PERSON,
      who has fought PERSON on several occasions and considers him a mortal enemy, swears that the next time they meet in
      battle will be the last. PERSON leads a raid against the Volscian city of GPE and during the siege, with much of PERSON''s
      unit being killed, PERSON gathers reinforcements and the Romans take the city. After the battle, PERSON and ORG meet
      in single combat, which results in both men being wounded but ends when ORG'' soldiers drag him away from the fight.
      PERSON returns to GPE victorious and in recognition of his great courage, ORG gives him the agnomen of Coriolanus. Coriolanus''s
      mother GPE encourages her son to run for consul within ORG. Coriolanus is reluctant but he eventually agrees to his
      mother''s wishes. He easily wins ORG and seems at first to have won over the commoners as well due to his military victories.
      Two tribunes, PERSON and ORG, are critical of his entrance into politics, fearing that his popularity would lead to
      Coriolanus taking power away from the ORG for himself. They scheme to undo Coriolanus and so stir up another riot in
      opposition to him becoming consul. When they call Coriolanus a traitor, Coriolanus bursts into rage and openly attacks
      the concept of popular rule as well as the citizens of GPE, demonstrating that he still holds the plebeians in contempt.
      He compares allowing citizens to have power over the senators as to allowing crows to peck the eagles. The tribunes
      term Coriolanus a traitor for his words and order him banished. Coriolanus retorts that it is he who will banish GPE
      from his presence: There is a world elsewhere. After being exiled from GPE, Coriolanus seeks out Aufidius in the Volscian
      capital of Antium and offers to let Aufidius kill him, to spite the country that banished him. Moved by his plight and
      honoured to fight alongside the great general, ORG and his superiors embrace Coriolanus and allow him to lead a new
      assault on the city, so that he can claim vengeance on the city which he feels betrayed him. Coriolanus and Aufidius
      lead a Volscian attack on GPE. Panicked, GPE sends General Titus to persuade Coriolanus to halt his crusade for vengeance;
      when ORG reports his failure, Senator PERSON follows but is also shunned. In response, Menenius, who has seemingly lost
      all hope in GPE and GPE, commits suicide by a river bank. Finally, GPE is sent to meet with her son, along with Coriolanus''
      wife PERSON and his son. GPE succeeds in dissuading her son from destroying GPE and Coriolanus makes peace between the
      Volscians and the Romans alongside ORG. When Coriolanus returns to the Volscian border, he is confronted by ORG and
      his men, who now also brand him as a traitor. They call him PERSON and refuse to call him by his stolen name of Coriolanus.
      Aufidius explains to Coriolanus how he put aside his hatred so that they could conquer GPE but now that Coriolanus has
