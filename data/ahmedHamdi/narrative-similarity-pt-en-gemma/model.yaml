- source_sentence: The film recounts the memories of a young sailor (Katsumi Kamio) in the Imperial Japanese Navy stationed
    on the battleship Yamato during World War II. Katsumi Kamio recalls his arrival on the Yamato, his time with his shipmates,
    and the ship's final hours when it participated in Operation Ten-Go and was sunk by the Americans on April 7, 1945. All
    these events are remembered when Kamio meets the young Makiko Uchida, daughter of Petty Officer Mamoru Uchida, and the
    two travel to the site of the shipwreck, where Uchida will scatter her father's ashes. In the meantime, Kamio, in addition
    to remembering his participation in the war, mentally revisits his family and friends who died during the conflict and
    shows Uchida an unknown side of her father.
  sentences:
  - The film begins with footage from Asahi Shimbun'''s special expedition to the Yamato wreckage in 1999. The narrative then
    shifts to the present on 6 April 2005, where a woman, Makiko Uchida, is visiting the Yamato Museum in Kure, Hiroshima.
    She is looking for a boat to take her to the site where the Yamato sank, to honor the crew on the 60th anniversary of
    the ship's last battle. Katsumi Kamio, a survivor who is now a fisherman, agrees to take her after he discovers she was
    an adopted daughter of Petty Officer First Class Mamoru Uchida, a fellow crewman and close friend who he thought went
    down with the ship. As Uchida, Kamio, and his teenage apprentice, Atsushi, travel to the site on his fishing boat, the
    narrative shifts between the present and Kamio's memories of his service as an air defense crewman aboard the warship
    during the Second World War. In the spring of 1944, Kamio and other cadets, many of whom are only teenagers, are assigned
    to the Yamato and are subjected to harsh training and discipline at the hands of Petty Officers Uchida, Moriwaki, and
    Karaki, who served on the vessel since it was launched in 1941. In October 1944, the Yamato sails as part of a large Japanese
    fleet to engage American forces at the Battle of Leyte Gulf. During the battle, the Yamato sustains several hits, killing
    or injuring several crew. Yamato and the surviving ships return to Japan for repairs, while Uchida (who lost his left
    eye in the battle) is sent to a hospital to recover. In March 1945, the crew hear rumors of a planned mission against
    the expected invasion of Okinawa and are given a few days of shore leave. During this time, Kamio returns home and learns
    that his mother died protecting his girlfriend, Taeko Nozaki, during an air raid on Kure. Taeko confesses her love for
    Kamio when he explains that he must go to Okinawa and gives him a special amulet for protection. Uchida uses the shore
    leave to escape the hospital and rejoin the crew. Meanwhile, IJN representative Vice-Admiral Ryūnosuke Kusaka arrives
    and briefs the admiral-in-charge of Yamato, Vice-Admiral Seiichi Itō, and the other senior officers, of the details of
    Operation Ten-Go. It will almost certainly be a suicide mission - and with no air cover, the entire Japanese force will
    be extremely vulnerable to Allied attacks, making it unlikely that they will even reach Okinawa. Fights break out among
    the crew as some believe the mission is futile, but an officer convinces them that the Yamato, as Japan's last operational
    battleship, must make every effort to defend the nation. On the morning of April 7, the Yamato and its escorts assume
    battle stations after Task Force 58 detects it on the way to Okinawa and sends its strike planes to intercept. The crew
    opens fire with their anti-aircraft weapons as the planes appear. However, the sheer number of US aircraft overwhelm the
    defenses and the Yamato takes heavy damage from multiple bombs and torpedo hits. Kamio, Uchida, and Moriwaki continue
    to man a portside AA battery after strafing runs and bomb strikes kill much of the crew, including Karaki. After being
    told the ship is crippled and sinking, Admiral Itō and Captain Kōsaku Aruga give the order to abandon ship, although both
    choose to stay behind. Uchida and Moriwaki throw Kamio overboard despite his wish to stay with them to the end. The radioman
    attempts to call for support but water starts flooding the ship, which eventually capsizes and explodes after its aft
    magazine detonates. The Yamato's remaining escorts start rescuing the survivors, but Kamio fails to save his friend Tetsuya
    Nishi despite promising his mother that he would look after him. Moriwaki ties Kamio to be hoisted aboard a rescue vessel
    and swims away to drown himself. The film flashes forward to the present day; the old Kamio has a heart attack, but Makiko
    and Atsushi revive him. He also discusses what happened to him during the war's final months. He recounts that after the
    sinking, he went and told Nishi's mother that her son had died a hero's death. Kamio expresses his grief that, despite
    risking his life in battle, he was ultimately unable to protect anyone he loved - Taeko died of radiation poisoning after
    the atomic bombing of Hiroshima, where she had been conscripted to work at a munitions plant. However, she was able to
    see him before she died and suggested Asukamaru as the name for his boat. They arrive at the sinking coordinates the following
    day, where they hold a small ceremony. Makiko scatters Uchida's ashes and Kamio gives her a dagger that Uchida asked him
    to keep during the battle. The dagger was Uchida's most prized possession; Admiral Isoroku Yamamoto gave it to him when
    the Yamato was his flagship. The three head back to Japan after the ceremony. The end credits show Makiko laying flowers
    at a memorial for those who died in the battle.
  - The world is a post-apocalyptic wasteland caused by ecocide and a nuclear war over resources. In Australia Max Rockatansky
    is crossing the desert in a motor vehicle pulled by camels. The airborne bandit Jedediah and his young son attack him
    and steal his vehicle, and Max follows Jedediah's trail to a trading post called Bartertown. Initially refused entry because
    he has nothing to trade, he impresses the local officials with his toughness, and the founder and ruler of the town, Aunty
    Entity (Tina Turner), offers to resupply him if he completes a task. Aunty explains that Bartertown's precious energy
    comes from a subterranean refinery, called Underworld, that turns pig feces into methane. The refinery is run by a resourceful
    dwarf called Master, who rides around on Blaster, his giant bodyguard. Master Blaster has begun to challenge Aunty for
    control of Bartertown, and she wants Max to kill Blaster so she can more easily subvert Master to her will.  Max infiltrates
    Underworld to size up Master Blaster and befriends Pig Killer, a convict sentenced to work there for slaughtering a pig
    to feed his children. When Master Blaster learns his newly-acquired vehicle belonged to Max, he forces Max to disarm a
    booby-trap. In doing so, Max sets off his alarm and discovers that Blaster is hypersensitive to high-pitched noises. Back
    on the surface, Aunty tells Max that, by law, conflicts in Bartertown are resolved by a fight to the death in a gladiatorial
    arena called Thunderdome. Max publicly accuses Master of stealing his vehicle, and a battle is scheduled against Blaster.
    The giant dominates until Max blows a bosun's whistle, which makes Blaster grab his head in pain. Max knocks Blaster's
    helmet off and prepares to kill him, but relents upon seeing that Blaster has an intellectual disability. Max reveals
    Aunty's plot and Master threatens to shut down the refinery, so Aunty has Blaster killed. She is then able to terrorize
    Master into keeping the refinery running. For breaking a deal, Max is bound, placed on a horse, and sent into the Wasteland
    (Gulag), his punishment determined by the spin of a wheel. When the horse collapses from exhaustion, Max frees himself
    and continues on foot until he also collapses. A warrior girl called Savannah Nix finds Max near death and hauls him back
    to her home, an oasis called Planet Erf, populated by a primitive tribe of teenagers and children. The children are descended
    from survivors of a crashed Boeing 747, some of whom left to seek help and never returned. They believe Max is the pilot,
    Captain Walker, come to fix the aeroplane and fly them to the fabled Tomorrow-morrow Land. Max denies he is Walker and
    insists there is no longer any civilisation like that in their stories. Disillusioned, a group of teenagers and children
    led by Savannah wants to attempt the journey to Bartertown, but Max stops them and has them tied up, saying everyone should
    go on living in the oasis. During the night, the separatists escape. Max agrees to bring them back, taking a few members
    of the tribe along, but both parties are in bad shape by the time he catches up. Out of supplies, Max is forced to lead
    the contingent back to Bartertown. The combined group sneaks into Underworld and, with Pig Killer's help, frees Master
    and escapes in a modified truck down some train tracks, destroying the refinery and most of Bartertown in the process.
    Aunty orders her forces to pursue and retrieve Master, and Max and his group do their best to fight off the attackers.
    They come across Jedediah and his son, whom Max coerces into providing a ride in their aeroplane. With the approach of
    Aunty's army shortening the runway, Max gets in his vehicle, which a child stole from one of Aunty's men, and crashes
    an opening so the plane can take off. Injured and alone, Max is spared by an impressed Aunty, who leaves to rebuild Bartertown.
    Jedediah flies Master, Pig Killer, and the separatists to the ruins of Sydney. Years later, they have established a small
    community with other wanderers. While they attempt to rediscover the knowledge of the pre-apocalyptic world, each night
    Savannah recites the story of their journey, and they light up the city as a beacon for Max or any other travelers to
    follow. Max wanders in the Wasteland, alone.
  - A brilliant and driven scientist, Jake Terrell, and his wife, Maggie, along with their small team, are training dolphins
    to communicate with humans at their remote island research facility. They teach Alpha (Fa), a dolphin they have raised
    in captivity for four years, to speak simple English. They  introduce him to a female dolphin captured from the wild,
    whom they name Beta (Bea). Fa regresses to his native language for a while, but soon teaches Bea to understand English,
    too. Terrell's research is funded by the Franklin Foundation, headed by Harold DeMilo (Fritz Weaver). An undercover government
    agent for hire, Curtis Mahoney (Paul Sorvino), blackmails DeMilo into allowing him access to Terrell's facility under
    the guise of a freelance journalist writing about dolphin research. Although Terrell and his team attempt to stonewall
    Mahoney, he finds out the truth about Fa and Bea and threatens to publish his findings. To prevent this, Terrell agrees
    with DeMilo to reveal his progress to the Foundation board of directors, and travels to the mainland for a press conference.
    Once he and Maggie are there, the press conference is mysteriously cancelled, and Fa and Bea are stolen from the island.
    After the dolphins are kidnapped, Mahoney reveals that the Franklin Institute is planning to further train the dolphins
    to carry out a political assassination, using a magnetic limpet mine to kill the President of the United States. One of
    Terrell's team, David, is revealed to have been an undercover operative of the Institute, and is helping them train the
    dolphins for the assassination attempt. Fa escapes and returns to the Terrells, and the conspirators set Bea off to place
    the mine on the President's yacht.  Realizing what is happening, Jake tells Fa to stop Bea; Fa intercepts Bea, and redirects
    her to place the mine on the conspirators' boat, which is destroyed in the ensuing explosion, killing David and most of
    the board. Fa and Bea return to the Terrells, but as DeMilo approaches the island in a seaplane, Jake instructs Fa and
    Bea to escape and live free in the ocean. Fa is reluctant to go, having formed a bond with Jake and Maggie, but Jake gruffly
    orders him to leave; eventually, both dolphins escape, leaving Jake and Maggie awaiting DeMilo and reflecting on what
    happened.
- source_sentence: George Monroe (Kevin Kline) is a middle-aged architect who suddenly discovers he has cancer and little
    time left to live. He then decides to use his remaining time to reconnect with his troubled and rebellious son, Sam (Hayden
    Christensen), and reconcile with his ex-wife, Robin (Kristin Scott Thomas). At the same time, George decides to build
    a house, intending to leave it as an inheritance for Sam.
  sentences:
  - George Monroe, a jaded architectural model fabricator, is living the bachelor's life in the old family shack on the coast
    of California. Over the years, George has been avoiding getting up to modern CAD technology standards and eventually is
    fired from the architecture firm. When the principal owner refuses to let George keep a few of his models, he destroys
    all but one of the models with a roll of design plans. As he exits the building with the remaining model, he collapses
    and is rushed to the hospital, where it is revealed he has advanced stage cancer and any treatment would be futile. George,
    with a time limit on his life, decides to demolish the shack left to him by his father and build his own custom house.
    He enlists his son, Sam, who is alienated from his stepfather Peter and his mother Robin, who has since been remarried
    to a wealthy investor. Sam is forced to spend his summer with George, who has not revealed his terminal condition, and
    help him with the house. Initially, Sam makes it a point not to help George demo the old house. When George refuses to
    give Sam money unless he works for it, Sam toys with becoming a prostitute, but is nearly caught and flees from his first
    encounter. This leads him to steal George's Vicodin. George slowly reconnects with Sam. Robin decides to assist as well,
    and she finds herself rediscovering George. Also joining in the construction are Alyssa, Sam's classmate who lives next
    door with her mother Colleen; local policeman Kurt Walker, George's childhood friend; Sam's young half-brothers Adam and
    Ryan; various neighbors; and eventually Peter, even after separating from Robin when she tells him that her feelings for
    George have re-awakened. George tells Robin of his disease, sending her into shock. George tells Sam, who feels betrayed
    and accuses George of being selfish and takes refuge at Alyssa's house. George collapses and is found by Robin the following
    morning. Complications arise when neighbor David Dokos tries to halt construction because the building's height exceeds
    the allowable limit by six inches. His plans to halt the project are stopped by Sam, who recognizes him from his prostitution
    attempt and blackmails him. Sam puts Christmas lights all over the unfinished house and shows George the gleaming house
    from his hospital window. The next morning, Sam returns to finish the house and Robin sits beside George until his death.
    Robin goes to the house and tells Sam about his father's death. Sam inherits the house he finished building.  Sam gives
    the property to a woman who has been living in a trailer park.  As a girl, she was injured in a car crash caused by his
    grandfather.
  - The Old West town of Calendar in the Colorado Territory springs up almost overnight when clumsy, hotheaded Prudy Perkins
    notices gold in a freshly dug grave during a funeral. Her father, bumbling farmer Olly, becomes the first mayor of the
    new settlement, but soon he and the other elected councilmen find themselves and the townspeople at the mercy of the corrupt
    Danby family, who force the prospectors to pay them a toll for using the only road in or out of Calendar. The town has
    no sheriff, as all the men are busy searching for gold, and the few who have taken the job have been run out of town or
    killed. Jason McCullough, a confident and exceptionally skilled gunfighter planning to emigrate to Australia, sees Joe
    Danby kill a man over a card game in the town's saloon. Needing money after Calendar's high prices leave him broke, McCullough
    takes the job of sheriff, impressing the mayor and council with his uncanny marksmanship. He breaks up a street brawl
    and becomes attracted to Prudy, despite her attempts to avoid him due to the embarrassing circumstances under which they
    first met. McCullough arrests Joe and tosses him in the town's unfinished jail, which lacks bars for the cell doors and
    windows; he uses several clever tricks to manipulate Joe and keep him from escaping. McCullough acquires a reluctant deputy
    in scruffy stable boy Jake, previously known as the town character. Joe's arrest infuriates his father, Pa Danby, who
    is not accustomed to his family being challenged. After McCullough disarms and humiliates him in a failed intimidation
    attempt, Pa sends in a string of hired guns to kill him, all of whom the sheriff easily defeats. Meanwhile, McCullough
    enlists Jake's help in an unsuccessful attempt to prospect for gold, and spars romantically with Prudy. The Danbys try
    to tear the bars off the jail window with their horses but get pulled off their mounts instead before Jake chases them
    away with a shotgun. A fed-up Pa enlists all of his relatives to ride into town and free his son. When the news reaches
    McCullough, he initially tells Prudy he intends to leave, but when she expresses her sincere approval of this sensible
    idea, he declares it to be cowardly and announces he is staying instead. Mayor Perkins persuades the townsfolk to vote
    against helping the sheriff despite Prudy trying to convince them otherwise. Thus, the Danby clan rides in faced only
    by McCullough, Jake, and Prudy. After a lengthy but unproductive gunfight, McCullough bluffs his way to victory using
    Joe as a hostage and the old cannon mounted in the center of town. As the Danbys are marched off to jail, the supposedly
    unloaded cannon fires, smashing the local brothel and scattering both the prostitutes and the councilmen they were servicing.
    McCullough and Prudy get engaged. In a closing monologue, Jake breaks the film's fourth wall and directly informs the
    audience that after his wedding, McCollough went on to a long and prosperous career as the first governor of Colorado
    after it became a state, never making it to Australia (although he reads about it a lot), while Jake takes his place as
    sheriff of Calendar and becomes one of the most beloved characters in Western folklore.
  - The Amazon rainforest is invaded by pirates and a native girl named Maya ends up becoming a victim of bandits, leaving
    her baby Tainá orphaned. The child is sheltered between the roots of a great tree and rescued by the lonely old shaman
    Tigê, who takes care of her and only returns to his people five years later, when the new leader will be chosen as the
    defender of nature. As a girl, Tainá is prevented from presenting herself, but the legacy of her mother, the last of the
    warriors, and with the support of the smart city girl Laurinha and the native Gobi, she decides to face the evildoers,
    unraveling the mystery of his own origins.
- source_sentence: The film recounts the Cuban Missile Crisis. In October 1962, a U-2 aircraft, conducting routine surveillance,
    takes aerial photographs revealing that the Soviet Union is in the process of installing a nuclear weapons launch platform
    in Cuba. These weapons will have the capacity to destroy most of the eastern and southern United States in minutes once
    operational. President John F. Kennedy (Bruce Greenwood) and his advisors must devise a plan of action against the Soviets.
    Kennedy is determined to show that he is strong enough to withstand the threat, and the Pentagon advises the United States
    military to counterattack, which could lead to another American invasion of Cuba. However, Kennedy is hesitant to carry
    out this operation, as an American invasion could cause the Soviets to retaliate in Europe. For thirteen days, the fate
    of humanity rested in the hands of a group gathered in the Oval Office at the White House, as the possibility of nuclear
    war was real and Soviet ships headed for Cuba carrying the remaining materials needed to complete the launch platform."
    which was being built at an accelerated pace. With the situation becoming increasingly tense, any ill-considered act could
    provoke an armed conflict.
  sentences:
  - 'In October 1962, U-2 aerial surveillance photos reveal that the Soviet Union is in the process of placing intermediate-range
    ballistic missiles carrying nuclear weapons in Cuba. President John F. Kennedy and his advisers must come up with a plan
    of action to prevent their activation. Kennedy is determined to show that the United States will not allow a missile threat.
    The Joint Chiefs of Staff advise immediate U.S. military strikes against the missile sites followed by an invasion of
    Cuba. Kennedy is reluctant to attack and invade because it would very likely cause the Soviets to invade Berlin, which
    could lead to an all-out war. Citing The Guns of August, Kennedy sees an analogy to the events that started World War
    I, where the tactics of both sides'' commanders had not evolved since the previous war and were obsolete, only this time
    nuclear weapons are involved. War appears to be almost inevitable. The Kennedy administration tries to find a solution
    that will remove the missiles but avoid an act of war. They reject a blockade, as this is formally regarded as an act
    of war, and settle on what they publicly describe as a quarantine. They announce that the U.S. naval forces will stop
    all ships entering Cuban waters and inspect them to verify they are not carrying weapons destined for Cuba. The Soviet
    Union sends mixed messages in response. Off the shores of Cuba, the Soviet ships turn back from the quarantine lines.
    Secretary of State Dean Rusk says, We''re eyeball to eyeball and I think the other fellow just blinked. The administration
    continues to order spy plane pictures, but one of Kennedy''s top advisers, Kenneth O''Donnell, calls the pilots to ensure
    the pilots do not report that they were shot at or fired upon, because if they were, the country would be forced to retaliate
    under the rules of engagement. John A. Scali, a reporter with ABC News, is contacted by Soviet emissary Aleksandr Fomin,
    and through this back-channel communication method the Soviets offer to remove the missiles in exchange for public assurances
    from the U.S. that it will never invade Cuba. A long message in the same tone as the informal communication from Fomin,
    apparently written personally by Soviet Premier Nikita Khrushchev, is received. This is followed by a second, more hard
    line cable in which the Soviets offer a deal involving U.S removal of its Jupiter missiles from Turkey. The Kennedy administration
    interprets the second as a response from the Politburo, and in a risky act, decides to ignore it and respond to the first
    message, assumed to be from Khrushchev. There are several mis-steps during the crisis: the defense readiness level of
    Strategic Air Command (SAC) is raised to DEFCON 2 (one step shy of maximum readiness for imminent war), without informing
    the President; a nuclear weapon test proceeds (Bluegill Triple Prime) and a routine test launch of a U.S. offensive missile
    is also carried out without the President''s knowledge. In a bid for time while under intense pressure from the military
    for an immediate strike, President Kennedy authorizes attacks on the missile sites and an invasion of Cuba, to commence
    the following Monday. An Air Force U-2 reconnaissance plane is sent over Cuba to gather intelligence for the attack, but
    is shot down, killing the pilot. After much deliberation with the Executive Committee of the National Security Council,
    Kennedy makes a final attempt to avoid a war by sending his brother, Robert F. Kennedy to meet with Soviet ambassador
    Anatoly Dobrynin on Friday night. Bobby reiterates the demand that the Soviets remove their missiles from Cuba, and in
    return promises not to invade or assist in the invasion of Cuba. Dobrynin insists that the U.S. must also remove all Jupiter
    missiles from Turkey, on the border of the Soviet Union. Bobby says that a quid pro quo is not possible, but in exchange
    for Khrushchev removing all the missiles from Cuba, there will be a secret understanding that the U.S. will remove all
    of its obsolete missiles from Turkey within six months as part of a pre-scheduled plan. The Soviets announce on Sunday
    that they will remove their missiles from Cuba, averting a war that could have escalated to the use of nuclear weapons.
    The film ends with President Kennedy dictating a letter of condolence to the family of the reconnaissance pilot, Rudolf
    Anderson, who was shot down over Cuba as part of the preparations for the invasion, and the Kennedy brothers and O''Donnell
    outside of the Oval Office as actual audio of President Kennedy''s commencement speech at American University played in
    the background.'
  - The Montellis, an Italian American family headed by Anthony Montelli and his wife, Dolores, move into 112 Ocean Avenue
    in Amityville, New York, with their children, Sonny, Patricia, Mark, and Jan. An evil presence is shown to be lurking
    within the house, unknown to the family. Unusual and paranormal activities occur, such as unknown forces banging on the
    door at night when nobody is outside and an ugly demonic message being painted on the wall of Jan's room. For the latter,
    Anthony blames and beats his children, Jan and Mark, then beats Dolores for intervening, resulting in a fight between
    the entire family. Concerned by these developments, Dolores tries to have the local Catholic priest, Father Frank Adamsky,
    bless the house, but an argument breaks out within the family shortly after another demonic incident causes significant
    damage to the kitchen. Anthony blames the younger children again and hits Jan as Adamsky tries to intervene, but Anthony
    rudely orders him to leave. To Dolores' mortification, Adamsky leaves, disgusted at Anthony's behavior. He finds his car
    door open and the Bible on the passenger seat torn to pieces. The situation inside the home continues to deteriorate;
    Anthony is shown to be strict, abusive, sacrilegious towards the Catholic faith, violent towards his family, and forcing
    his wife to have sex with him against her will. Dolores tries to keep things together for the youngest children. The family
    goes to church with Anthony, so he can apologize for being rude to Adamsky, although Anthony only agrees to do it after
    Dolores threatens to divorce him. Sonny stays at home, claiming to feel unwell. He soon hears an alarming noise and goes
    downstairs to get his father's gun. He hears demonic laughter and follows it to a tunnel in the basement. The unseen presence
    pursues a frightened Sonny to his room, and he then falls victim to demonic possession. Now possessed, Sonny approaches
    Patricia to play a game with him. They pretend he is a famous photographer and she is his nude model. Patricia agrees
    to pose naked, and the pair end up having incestuous sex. Patricia is then seen at confession, partially confessing to
    the act and telling the priest that he does it to hurt God but not revealing that it was her brother she slept with. Sonny
    becomes more sinister and demonic, as his face starts contorting demonically. Startled, he tries to keep his family away
    but is unsuccessful due to the demon's influence. On Sonny's birthday, he isolates himself from his birthday party, but  Patricia
    goes to check on him. She tells him she does not feel guilty about what they have been doing, but due to his demonic phases
    and his body's gradual demonic contortions, Sonny sends her away, using foul language. Patricia runs away crying, and
    she tries to tell Adamsky that she thinks Sonny is possessed, but he does not respond. Later that night, the evil spirit
    tells Sonny to kill them all. Sonny goes and gets his father's rifle and kills his parents, Jan, Mark, and finally Patricia,
    after hunting her down. The next day the police arrive, pick up the bodies, and Sonny is arrested. Sonny tells Adamsky
    at the scene that he does not recall killing his family. Adamsky then realizes that Sonny is possessed and asks the bishops
    if he can perform an exorcism on him, but they refuse, not believing him. He then decides to perform an exorcism without
    the support of the Catholic Church. After freeing him from police custody, Adamsky takes Sonny to church. Sonny attacks
    him and escapes after seeing the crosses on the doors. Adamsky runs after Sonny, traces him to the house, and performs
    the exorcism, releasing Sonny's soul. As the police arrive, Adamsky asks Father Tom to take Sonny away from him. Tom takes
    Sonny outside, where the police arrest him and take him back into custody. It is revealed that the demon has transferred
    itself into Adamsky. Father Adamsky's fate and his whereabouts are left unknown, and eventually, the house is put up for
    sale.
  - During a firefight in the Middle East, American soldier Johnny Talbot is captured by Islamic terrorists and forced to
    witness the execution of his comrade, Ray. Kate Abbott is a Diplomatic Security Service agent working for the American
    Embassy in London, who began working in the government after most of her friends were killed in 9/11. While she is implementing
    new, more stringent rules for visa applications of potential terrorist suspects, most of her team are killed while at
    a restaurant for the birthday of their superior, Bill Talbot. Bill is Johnny's father, and is being blackmailed under
    threat of Johnny's death. He delayed attending the party to return to his desk to delete records of the visas he has approved
    for terrorists entering the United States. Kate survives the bombing when she leaves the restaurant to get a last-minute
    present for Bill. An investigation into the attack reveals that the bomb has traces of chromium, leading her superior
    at the embassy, Sam Parker, to deduce that the perpetrator was the 'Watchmaker', one of the world's most wanted killers,
    known for his precision work, who detonated a bomb with similar traces in Paris two years earlier. Nobody knows the Watchmaker's
    appearance, as he has had lots of plastic surgery over the years. Kate's subsequent attempts to find out the cause of
    the explosion reveal that Bill was being blackmailed to let certain visa applicants through after Johnny's capture, and
    the man behind the attack was indeed the Watchmaker. Her efforts uncover a plan to detonate another bomb at Times Square
    in New York City during the New Year's Eve celebrations. As she carries out her own investigation, she is attacked by
    Bill, unintentionally killing him in self-defense. Kate is later considered, through witnesses and footage, the prime
    suspect for the attacks at the embassy. Sam Parker, who believes in her innocence, is injured in an attack by the Watchmaker.  Kate
    is forced to sneak back into the embassy to create false passports for herself to follow the Watchmaker to New York, with
    continuing support from Sam and her friend Sally, the only two people who still believe in her innocence. Meanwhile, the
    Watchmaker uses a Steyr HS .50 cal sniper rifle to fire an incendiary round into a sphere filled with explosive gas atop
    a vacant block of apartments in Tower Hamlets. The building is devastated. Later, the Watchmaker reveals that he is aware
    that his client's purpose for the Times Square attack is not terrorism but financial. He intends to bet against the stock
    market and make millions when the stock market reopens. The Watchmaker demands half the profits, threatening to cancel
    the attack, and the client agrees. The Watchmaker leaves for New York. Dr Emil Balan, is motivated to avenge his late
    wife's death when her visa to the U.S. was delayed and she did not receive emergency medical treatment in time. In New
    York, he coordinates filling the New Year's Eve ball with explosive gas. The Watchmaker's job is to shoot the sphere and
    ignite the gas. Balan meets the Watchmaker on top of a high rise a few blocks from Times Square. The Watchmaker kills
    Balan, removing any connection back to him. Kate deduces the plot and finds the Watchmaker, moments away from triggering
    the bomb. After a struggle, she manages to throw the Watchmaker off the side of the building. He falls to his death on
    the stroke of midnight. Her suspicion about Balan's guilt is vindicated and her name is cleared. She receives a call from
    Sam, who has recovered from recent injuries, congratulating her.
- source_sentence: A beautiful young woman, feeling neglected by her husband, becomes a sophisticated bank and jewel thief.
  sentences:
  - The film deals with the sex life of a young New York City woman, Kitty, and her boyfriend, Stud. Stud is brutal and oafish
    but Kitty is enamored with his sexual performance. They sometimes engage in light sadomasochism, with Stud belt-whipping
    Kitty. Stud later posts a sign on a bulletin board inviting people to a party. Several people show up at Kitty and Stud's
    apartment and they engage in group sex, with Stud servicing all the women.
  - Set between the events of Dead Rising 2 and Dead Rising 3, the story follows online reporter Chase Carter and his camerawoman
    Jordan as they cover the stories of the people inside of the walled-in quarantined area in the fictional town of East
    Mission, Oregon, as the government (running an organization called FEZA—Federal Emergency Zombie Agency) attempts to contain
    a viral outbreak that turns people into ravenous zombies. An anti-viral drug called Zombrex, which keeps the virus at
    bay, is being administered to those infected. When it becomes clear that the drug is no longer effective and a zombie
    outbreak purges the town and infects its inhabitants, Chase, Jordan, grieving mother Maggie, and survivor Crystal battle
    their way out of the city before it gets firebombed. Throughout the film, it is revealed that the Army implanted defective
    Zombrex drugs in a refugee center to start another outbreak so that the government can be allowed to plant government-mandated
    Zombrex chips on the infected to track them, framing FEZA for giving bad Zombrex to the infected. The coin that Jordan
    gave to Chase to open a newspaper vending machine at the beginning came in handy when she placed evidence of the Army
    sabotaging the Zombrex inside the vending machine for him to find. When General Lyons figures out that Jordan and Norton
    are aware of the Army's actions, he has his men capture them to cover up the truth. In the end, Chase and Crystal manage
    to survive and get out of city, and Jordan manages to get footage proving the Army's complicity in the new outbreak to
    Chase, who finds it in the newspaper vending machine; the same footage shows her being taken into custody by the U.S.
    government, who then implant tracking devices on people who are infected.
  - Penelope Elcott (Natalie Wood) is the wife of wealthy banker James Elcott (Ian Bannen). Penelope decides to disguise herself
    as an old woman and rob her husband's bank. While the police, including Lieutenant Horatio Bixbee (Peter Falk), rush to
    get to the bank, Penelope escapes in a red wig and yellow suit. She donates some of the stolen money to a Salvation Army
    worker and donates the suit to a second-hand thrift shop. Con artists Sabada (Lila Kedrova) and Ducky (Lou Jacobi) immediately
    recognize the suit as an original designer outfit from Paris, and purchase it for a mere $7. Penelope visits her psychiatrist
    Gregory (Dick Shawn) and tells him all about her criminal activities. She says it began in college when a professor (Jonathan
    Winters) lured her into his laboratory and attempted to rape her, but she escaped, leaving her dress ripped off in the
    process. During the chase, she stole the watch fob of the professor. She next stole on her wedding day. When she caught
    her maid of honor Mildred Halliday (Norma Crane) kissing James, she swiped Mildred's earrings and necklace. Gregory suggests
    she is stealing to attract attention from her distant husband. A young woman, Honeysuckle Rose, is accused of being the
    thief. Gregory wants to return the stolen money to the bank, but panics when he hears police cars arriving. Penelope confesses
    and tries to clear the innocent Honeysuckle, but Horatio the cop and husband James do not believe her. Ducky and Sabada
    pay a visit, trying to blackmail her, but Penelope foils their blackmail attempt. Penelope hosts a dinner party, having
    stolen from all the invited guests. She tries to return the stolen items, but all claim that they never have seen them
    before. Penelope, confused and frightened, runs away. She again robs James' bank, but unlike the previous time, she is
    crying. James begs Horatio to find her. Penelope goes to Horatio with the stolen money, but the cop knows James would
    not press charges against his own wife. The psychiatrist explains the dinner guests denied recognizing the stolen items
    because they would lose the fraudulently inflated insurance claims they collected. Gregory breaks down and begs Penelope
    to run away with him. She refuses, telling him she is cured. James realizes that he has neglected Penelope and starts
    seeing her face everywhere he turns. He goes to the psychiatrist's office, where James and Penelope happily reunite.
- source_sentence: 'Walter Mitty (Ben Stiller) is a negative asset manager at Life magazine who frequently daydreams about
    fantastical adventures and has a crush on his colleague Cheryl (Kristen Wiig). Photojournalist Sean O''Connell (Sean Penn),
    who works closely with Mitty on his statements, sends him a package containing his latest negatives and a wallet as a
    gift in appreciation of Mitty''s excellent work. In addition, the package contains a special photograph, negative 25,
    which he says captures the Quintessence of Life and should be used for the cover of the magazine''s final print edition
    once it goes online. Unfortunately, this particular negative is missing from the package, and Mitty is forced to stop
    the detestable corporate transition manager Ted Hendricks (Adam Scott) to deal with the mess. Using the other negatives
    as clues, Mitty discovers that O''Connell is in Greenland and flies there to try and find him. Arriving in Greenland,
    Mitty goes Mitty goes to a bar asking about O''Connell. The bartender explains that O''Connell has already left on a ship,
    and to find him, Mitty needs to go in the postal helicopter, and the pilot is drunk singing a karaoke version of "Don''t
    You Want Me" in the bar. Mitty refuses to fly with a drunk pilot, but imagines Cheryl singing "Space Oddity" to him, gains
    newfound confidence, and jumps aboard the helicopter. Arriving at the ship, Mitty discovers that the helicopter cannot
    land on the ship. Mitty has misunderstood, thinking that the pilot had to jump onto the ship, where there was a boat approaching
    to pick him up, but then dived into icy shark-infested waters before he could be brought aboard. In doing so, Mitty realizes
    this whole adventure is actually happening, contrary to his daydreams. The sailors remember O''Connell, and even offer
    Mitty the cake he left behind, and Mitty discovers another clue in the wrapping paper. His journey continues to Iceland,
    where O''Connell is. Mitty went to photograph the Eyjafjallajökull volcano. The eruption prevents Mitty from finding O''Connell,
    and he is forced to interrupt the search after receiving a text message telling him to return to New York immediately.
    For his failure, his first professional defeat in his long career with the magazine, Mitty is fired and is further disheartened
    to discover that Cheryl, who was leaving earlier, seems to have reconciled with her ex-husband. Mitty returns home, completely
    disheartened, and throws away his wallet when he visits his mother (Shirley MacLaine), and to his surprise, she mentions
    having found O''Connell. She had said so before, but at the same time, dreaming, he couldn''t hear her. He then finds
    a new lead to continue hunting O''Connell. Mitty eventually tracks O''Connell down in the Himalayas, attempting to photograph
    a rare snow leopard, and asks about the missing negative. O''Connell explains that the message about taking a closer look
    was literal: the negative. It was in the wallet. Mitty joins him in a football game with some locals. Mitty flies to Los
    Angeles, but is detained by airport security, and calls the only person he knows in Los Angeles; Todd Maher (Patton Oswalt),
    a representative from eHarmony who has kept in touch through his adventures. Mitty returns home and helps his mother sell
    her piano; he mentions that he no longer has a wallet. His mother says that she always keeps her skills and she produces
    the wallet he had thrown away. Without looking at the photo, an emboldened Mitty hands it over to Life magazine, tells
    the management that it was the photograph Sean O''Connell wanted for the final issue, and reprimands Hendricks for disrespecting
    the team that made the magazine so honored. Walter reunites with Cheryl when they receive their compensation packages
    and discovers that Cheryl''s ex-husband was only at her house in order to repair the refrigerator. Excited by the turn
    of events, Mitty and Cheryl see the final issue of the magazine on the newsstand. The newspaper, with its cover greeting
    the staff, was revealed to show Mitty sitting in front of the Life building, holding a sheet of negatives up to the light
    and examining them with an eyepiece.'
  sentences:
  - ' Walter Mitty is a negative assets manager at Life magazine living alone in New York City. He chronically daydreams and
    has a secret crush on Cheryl Melhoff, a coworker. Walter attempts to contact Cheryl via eHarmony but eHarmony customer
    service agent Todd Mahar explains that Walter''s account is not fully filled out: the been there and done that sections
    are blank. Walter works with legendary photojournalist Sean O''Connell, although they have never met in person. At work
    later that day, Walter receives a negative roll from Sean with a wallet as a gift in appreciation of Walter''s work over
    the years. A letter from Sean explains that he believes negative #25 captures the quintessence of life and should be used
    for the cover of the magazine''s final print issue before it becomes exclusively digital, yet the negative is missing
    from the roll. Ted Hendricks, the obnoxious manager of the magazine''s transition, has also heard Sean''s recommendation.
    When he asks about #25, Walter stalls and lies, worried about being fired. Walter then asks Cheryl for help, and she suggests
    that Walter use the other negatives as clues to Sean''s location. He and Hernando, his understudy, are stumped by a negative
    depicting a curve, until they notice another containing the name of a ship registered in Greenland. Walter reluctantly
    takes a plane there. A bartender in Nuuk explains that Sean left on a ship. To find him, Mitty would need to go on the
    postal helicopter, and the pilot is drunk. Mitty recognizes the pilot''s thumb from one of the negatives, and after hesitating,
    joins the pilot on a trip to bring supplies to the ship. Walter accidentally jumps into ice-cold, shark-infested waters,
    losing the ship''s supplies and preventing radio communication when he finally comes aboard. There, Walter learns that
    Sean departed the ship a few days earlier and deduces from notes on wrapping paper for a clementine cake Sean left behind
    that he is heading to Iceland to photograph the volcano Eyjafjallajökull. Walter bikes, skateboards, and runs through
    the Icelandic countryside to find Sean, but just misses him as the volcano erupts. Dejected, he returns home. Ted assumes
    that Walter misplaced the negative and fires him. He tries to visit Cheryl, but spots her ex-husband and leaves before
    talking to her. Walter visits his mother and throws away the wallet from Sean. To his surprise, Walter recognizes the
    curve of the piano in his mother''s house while looking at the last negative. When asked, she tells Walter that she met
    Sean and baked him the clementine cake. She had told Walter earlier, but he was daydreaming. Walter figures out from the
    notes that Sean is in the Afghan Himalayas and finds him photographing a rare snow leopard. When asked about the negative,
    Sean explains that, attempting to be playful, he had placed the negative in the wallet. He decides not to tell Walter
    what the picture actually depicts. When Walter returns to America, the airport security at Los Angeles detains him for
    arriving from Afghanistan. To verify his identity, Walter calls the only person he knows in Los Angeles: Todd, who has
    kept in contact during Mitty''s travels. The two chat and Todd expresses admiration for how adventurous Walter appears.
    Walter receives the wallet from his mother, who had retrieved it from the trash, and finally obtains the negative but
    chooses not to see it. Emboldened, he delivers it to Lifes offices and berates Hendricks for disrespecting the staff that
    made the magazine so honored. Walter reunites with Cheryl, and thanks her for inspiring him on his journey. Cheryl eagerly
    asks about his adventures and tells him that her ex-husband had only been at her house to help with repairs. Walking along
    the street, they see the final print issue on sale at a newsstand, and on its cover, they see the photograph from #25
    for the first time: it shows Walter sitting outside of the Life building, examining a contact sheet; the magazine is dedicated
    to Lifes staff, and Sean''s note actually referred to quintessence of Life. Walter and Cheryl continue their walk holding
    hands.'
  - In Europe, American high school students and crimefighters Kim Possible and Ron Stoppable have thwarted a world dominating
    scheme of Professor Dementor and rescued Dr. Glopman, whom Dementor had kidnapped. As Kim Possible and Ron Stoppable start
    their first day of school, they meet a new student named Athena and take her on a mission to stop the plot of the evil
    Dr. Drakken. Athena (a skilled bōjutsuka) defeats Dr. Drakken's henchwoman Shego, making her the topic of conversation
    at Middleton High School despite Kim's jealousy. When the school honors Athena and her good deed, Shego and Dr. Drakken
    force their way into the ceremony. Kim tries to defeat Shego and her army of henchwomen but falls to the ground, leaving
    Athena vulnerable to kidnap. Athena is kidnapped, and Kim is laughed at. After Kim talks with her family and Ron, they
    decide to rescue Athena from Drakken's and Shego's lair. At the lair, Kim discovers Athena is part of Drakken's and Shego's
    plan to steal Kim's motivational essence and transfer it into Drakken with his brain-modulating device. Athena is revealed
    to be an android built by Drakken, specifically for this. As Kim short-circuits the transfer machine, Dr. Drakken is de-aged
    into a pre-adolescent version of himself. Despite Kim's insistence that she save herself, Athena stays behind to turn
    off the now-unstable machine. The lair explodes and Athena is presumed killed, but it is revealed that she has survived
    the explosion. Kim and Ron take her home to be repaired and programmed to be a hero alongside themselves. During the credits,
    Dr. Drakken, posing as a gifted student with Shego posing as his mother, enrolls at Kim's high school and begins his plan
    to defeat her.
  - Set in Los Angeles, this film revolves around Emily Tyler, a 12-year-old surfer-girl, and her 12-year-old twin sister,
    Tess, a member of a high-diving team. The movie follows the two sisters as they try various strategies to get their widower
    father, Max (who is a talented artist and sculptor), a girlfriend. After their first attempts end in failure, Tess and
    Emily team up with their friend Cody to paint an advertisement on a giant billboard situated high above Sunset Boulevard.
    Many women answer the advertisement through letters and through random chance, Max answers a letter submitted by a woman
    named Debbie. Debbie brings along her friend Brooke as a back-up in preparation for the former's date with Max. Brooke
    and Max coincidentally meet and take a liking to each other and Debbie agrees they should start dating. At first, Tess
    and Emily don't like Brooke's son, Ryan, a skater punk boy. But when an elaborate scheme by Max's business manager, Nigel,
    to break up the romantic relationship between Max and Brooke arises, Ryan and the girls learn to put aside their differences
    in order to foil the break-up plan.
