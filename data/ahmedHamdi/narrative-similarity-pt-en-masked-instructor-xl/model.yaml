    that he and his men have little chance of survival against their force. PERSON has a final, emotion-filled goodbye with
    GPE, after which he leads his cavalry into battle. An even greater number of Native American tribes, numbering 6000, have
    come together and joined the conflict. Quickly surrounded, PERSON and his meagre forces are killed. A few corrupt politicians
