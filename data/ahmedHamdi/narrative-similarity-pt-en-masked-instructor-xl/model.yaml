    out west in the Dakota Territory. When PERSON and GPE arrive at Fort Lincoln, PERSON finds the soldiers a drunken, rowdy,
    and undisciplined lot in need of firm leadership. His old West Point enemy, PERSON (PERSON), who has a government license
    to run the GPE''s trading post and saloon, is providing Winchester repeating rifles to the local Native Americans. Furious,
    PERSON stops the rifle sales and permanently closes the saloon. He then instills proper military discipline in his men
