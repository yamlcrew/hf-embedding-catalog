    of his class. PERSON is walking a silent punishment tour when he is approached by PERSON who asks him for directions.
    Shortly thereafter, his punishment ends, and he runs after her, explaining his rude silence, and asking if he may come
    to call that evening. Later, PERSON and other members of his class are graduated early and ordered to report immediately
    to GPE, GPE, for assignment. As a result, ORG misses his appointment with GPE. PERSON makes the acquaintance of Gen. PERSON
    (ORG), who aids him in getting placed with the 2nd ORG. He becomes a war hero after disregarding a superior''s orders
