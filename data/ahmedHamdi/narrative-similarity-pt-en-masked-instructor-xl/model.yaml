- source_sentence: 'Represent the plot: PERSON, a young nobleman, is the last survivor of his family. He lives isolated in
    a castle he inherited, with only a servant for company. According to a family legend, an emerald is hidden in this castle,
    the relentless and fruitless search for which has only brought ruin to his ancestors. One night, the young man dreams
    that an ancestor of his, a boy dressed in blue, emerges from a painting and shows him where the emerald is. The following
    morning, the nobleman follows the dream''s instructions and finds the precious stone. When he shows the jewel to his servant,
    the servant reminds him of the curse that the emerald of death has brought to several generations of the von Weerth family
    and asks PERSON to get rid of the stone, but the young nobleman refuses and keeps it. One day, a group of gypsies arrives
    at the castle, presenting themselves as traveling musicians, among them a beautiful young gypsy woman with whom the nobleman
    falls in love. The gypsy woman, cunningly, takes advantage of..." The naiveté of his host leads them to steal the jewel,
    while the others accompanying him steal several of the nobleman''s belongings, set fire to the castle, and destroy the
    painting of the boy dressed in blue. After the gypsies leave, the young nobleman realizes the gravity of everything that
    has happened and falls ill. Meanwhile, a young actress appears at the castle who, with her selfless devotion, restores
    the nobleman''s joy of living and hope for a better future.'
  sentences:
  - 'Represent the plot: PERSON (PERSON) is a poverty-stricken aristocrat who lives in his broken-down castle with a single
    old servant (PERSON). His sole expensive remaining possession is a painting of an ancestor (similar to PERSON painting
    The Blue Boy), which depicts the ancestor wearing a gigantic emerald. According to family myth, the emerald is cursed,
    and the son of the ancestor hid the jewel somewhere in the castle to stop the curse. PERSON has been searching for it
    for years. One night, PERSON dreams that his ancestor steps out of the painting and shows him where the emerald is. The
    next morning, LOC goes to the spot and indeed finds the emerald. The servant pleads with him to throw it away, but he
    refuses. That night, a roving band of gypsies comes to the castle. They sing, dance and put on skits for PERSON, who falls
    instantly in love with a blonde gypsy girl (PERSON). As she forces PERSON to dance attendance on her, the rest of the
    gypsies steal the emerald and everything else in the castle and set fire to the building. The gypsy girl laughs as she
    and her comrades flee. PERSON falls seriously ill. A young gypsy actress (PERSON), however, fell in love with PERSON.
    She now returns, nurses him back to health, and they fall in love.'
  - 'Represent the plot: The story is about a lawsuit concerning injuries caused by a defective automobile. The suit takes
    on a personal dimension because the injured plaintiff''s attorney, PERSON, discovers that the automobile manufacturer''s
    attorney is his estranged daughter, PERSON. PERSON is a liberal civil rights lawyer who has based his career on helping
    people avoid being taken for a ride by the rich and powerful; he''s pursued principle at the expense of profit, though
    he has a bad habit of not following up on his clients after their cases are settled. PERSON''s daughter, PERSON, has had
    a bad relationship with her father ever since she discovered that he was cheating on her mother, GPE, and while she also
    has made a career in law, she has taken a very different professional route by working for a high-powered corporate law
    firm and has adopted a self-interested political agenda. PERSON is hired to help field a lawsuit against ARGO, a major
    auto manufacturer, whose Meridian station wagons have a dangerous propensity to explode on impact when the left turn signal
    light is activated. While his research indicates that he has an all but airtight case against them, the case becomes more
    complicated for him when he discovers that PERSON is representing the firm he''s suing. The auto manufacturer in the film
    also utilizes a bean-counting approach to risk management, whereby the projections of actuaries for probable deaths and
    injured car-owners is weighed against the cost of re-tooling and re-manufacturing (i.e. recalling) the car without the
    defect (exploding gas tanks) with the resulting decision to keep the car as is to positively benefit short-term profitability.'
  - 'Represent the plot: On December 6, 1941, at Hamilton Field, near GPE, the crew of the Mary-Ann, a ORG B-17D, are ordered
    across the LOC to GPE, one of a flight of nine ORG bombers. Master PERSON, the Mary-Anns crew chief, is a long-time veteran,
    whose son PERSON is an officer and pursuit (fighter) pilot. The navigator, Lieutenant PERSON, is the son of a hero of
    the World War I Lafayette Escadrille. The pilot is PERSON, the co-pilot is PERSON, and the bombardier is PERSON. PERSON
    is a disgruntled gunner who, as an aviation cadet in 1938, washed out of flight school after he caused a mid-air collision
    in which another cadet was killed. PERSON was the flight instructor who requested a board of inquiry into the accident.
    With GPE still neutral, the Mary-Ann and the other B-17s fly, fully equipped except for ammunition, to ORG. They arrive
    on December 7, 1941, during the Japanese attack on Pearl Harbor. In its aftermath, the tired crew is ordered, with little
    rest, to fly first to LOC, and finally to PERSON in the GPE, both also still under Japanese attack. En route, the crew
    listens to President PERSON ask ORG for a declaration of war. They take along two passengers: fighter pilot Lieutenant
    PERSON and a small dog, GPE, the Marines'' mascot on LOC. When they land at Clark Field, White learns that his son was
    killed while trying to lead his squadron into the air during the first attack. Soon after, PERSON volunteers his bomber
    (the only one available) to attack a Japanese invasion fleet, but the PERSON is swarmed by enemy carrier fighters and
    forced to abort after losing two engines. The fatally wounded PERSON orders his men to bail out, then he blacks out. PERSON
    remains aboard and pilots the Mary-Ann to a successful belly landing when he is unable to lower the landing gear. Having
    told the now dying PERSON that the Mary-Ann is ready to fly, the crew works feverishly through the night to repair their
    bomber, scavenging parts from other damaged PERSON, as ORG closes in. PERSON, the assistant radio operator, volunteers
    to fly as gunner in a two-seat observation plane. They are caught in an enemy air raid. Chester bails out after the pilot
    is killed, but is machine-gunned while descending in his parachute, then fatally strafed on the ground. PERSON and ORG
    shoot down the Zero fighter responsible with .30 caliber machine guns. When the pilot stumbles from the burning wreckage,
    PERSON shoots him. The crew barely manages to finish the repairs and refueling when the Japanese overrun the airfield.
    With help from Marines and ORG soldiers, the PERSON takes off, her waist machine guns returning fire.  As they head to
    GPE, with PERSON as the reluctant pilot and the wounded PERSON as co-pilot, they spot a large Japanese naval invasion
    task force directly below. The crew radios the enemy''s position and circles until reinforcements arrive; the PERSON then
    leads the attack that devastates the Japanese fleet (this dramatic sequence mirrors the real events of the Battle of the
    Coral Sea). Later in the war, a bombing attack on GPE is finally announced to a roomful of bomber crews, among them several
    familiar faces from the Mary-Ann, including PERSON, now a B-17 pilot. As the bombers take off, President PERSON speaks
    in a voice-over, as the air armada heads towards the rising sun.'
- source_sentence: 'Represent the plot: PERSON (PERSON) is a rebellious but ambitious soldier eager to join the Civil War.
    After succeeding, PERSON achieves several successes, although he becomes known for disobeying orders. After the war ends,
    he marries PERSON ''Libby'' Bacon (Olivia de Havilland) and is assigned to ORG. Custer tries to negotiate honestly with
    the ORG present, but due to the corruption of others, a battle with PERSON (PERSON) forces begins to occur near the LOC,
    which brings great complications.'
  sentences:
  - 'Represent the plot: PERSON (PERSON) arrives at LOC in an outlandish uniform he had designed himself, which makes him
