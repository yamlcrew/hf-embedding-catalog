    On the way to GPE for his ORG martial PERSON hears from GPE about attempts to start the gold rush in GPE and realizes
    from the timing that it has been fabricated, a plan that would bring much business and large profits to a select group.
    Outraged, PERSON takes the information to ORG, but they only ridicule him, refusing to hear his evidence. When news arrives
    that the presence of gold miners has led to open conflict between the GPE and GPE troops, PERSON appeals in person to
