- source_sentence: 'Represent the plot: PERSON lives in GPE and works as an art restorer. Married with a young son, he is
    distressed by a serious blood disease (leukemia). While accompanying a client to an auction, he realizes that a painting
    being offered is actually a forgery. The criminal PERSON, who commissioned the painting, overhears him talking about this
    and wants to know more about PERSON. He learns of his serious illness and involves PERSON in assassination plans devised
    by his accomplice Minot, who offers money for the crimes. PERSON is convinced that he is about to die and must leave money
    for his family, so he agrees to carry out the assassinations, whose targets are dangerous mobsters.'
  sentences:
  - 'Represent the plot: PERSON, a boxer from GPE, is sponsored by millionaire PERSON. He falls for ORG''s daughter PERSON,
    who wants freedom from her father''s controlling ways and to pursue her writing career. In order to acquire enough money
    to begin his life with PERSON, GPE begins to work for crooked fight promoter PERSON. This causes conflict with his honest
    manager, PERSON. As his big fight approaches, PERSON is torn about what he should do.'
  - 'Represent the plot:  Following the conflict between two princes of ORG ORG, Lock and Delphus, who fight over their father''s
    throne and culminated to the latter''s defeat in a single combat 300 years prior to the present, the land had since split
    into two rivaling nations; GPE and ORG. At the eve of GPE''s destruction, the desperate PERSON king turns to his chief
    sorcerer ORG (PERSON) for help after his castle is besieged and his som and crown prince got killed in the ensuing struggle
    against the counsel of GPE (Amber PERSON), the prince''s brother. With aid of a portion of the king''s blood as well as
    his own, ORG brings a stone statue of a gryphon, a flying beast that is the totem of GPE, to life against the invaders.
    As GPE feared, shortly after the invading army has been dealt with, ORG wasted no time to turn against his king and the
    rest of the Locklanders in a coup with the gryphon on his side. Although the blood binding ORG established between him
    and the gryphon allows him to control it and renders it unkillable through conventional means, their connection resulted
    the sorcerer to feel the beast''s pain. Princess GPE escapes during the takeover and pursues the retreating ORG, led the
    Delphite prince PERSON (PERSON), who had been in the vanguard of the besieging forces. Having inherited the gift of magical
    visions from his parents, the prince is advised by his mother PERSON (PERSON), a sorceress, to seek an artifact called
    ORG, the only weapon that can kill the gryphon. His mother warns him that he must retrieve the two halves of the pike
    and reassemble it to kill the gryphon before a solar eclipse occurs in two weeks, or ORG will be able to enact a ritual
    that makes himself and the beast immortal. Amelia and her retinue capture PERSON and his man-at-arms, PERSON (PERSON),
    during a night raid on their camp in a location called The LOC of the Dead. They locate the haft of ORG in a centuries-old
    temple. Fending off an attack by the gryphon by means of dragon''s fire (apparently black powder or an explosive variant
    of Greek fire), they escape and move on to seeking the blade. Meanwhile, ORG attempts to foment mistrust between the two
    rival nations by killing a PERSON messenger and sending his body to GPE''s father, a threat against her life magically
    scored into his chest. The king of GPE calls for his armor and mounts a counter-invasion of ORG. Meanwhile, GPE confronts
    PERSON at knife-point in his tent, demanding that he tell her where the blade is, but she lets her guard down momentarily
    and he takes advantage, seizing the knife; they fall into an amorous embrace. That same night, ORG sends his two magic-wielding
    brides, PERSON and PERSON, to seduce one of the PERSON soldiers into stealing the haft piece from GPE and PERSON. When
    PERSON and GPE find it gone the next morning, they decide to send messengers to their respective parents to muster the
    combined armies of GPE and ORG. Amelia and her remaining knights attack ORG''s lair, while PERSON and his retainer PERSON
    enter a magically-warded labyrinth to retrieve the blade. The two kings call a truce and their armies prepare for a massed
    assault, while the gryphon prepares to destroy them. Queen Cassandra of ORG bids her husband farewell and rides into the
    deserted stronghold of the enemy. Once PERSON retrieves the blade, he rushes to the sorcerer''s lair to confront him,
    but finds his path blocked by the sorcerer''s brides. PERSON tells her son to leave the sorceresses to her and go to dispatch
    the gryphon, sacrificing herself in a magical strike against them. Meanwhile, ORG has captured GPE and killed the PERSON
    knight champion, and demands that she become his bride. PERSON and PERSON arrive and fight with the sorcerer, but soon
    loses the blade of ORG. Assembling the pike, PERSON PERSON and prepares to kill the Delphite Prince, but is persuaded
    to spare him by the surrender of GPE. As the eclipse begins, ORG proclaims that he will soon become an immortal and that
    his progeny with GPE will be the new Titans. As he walks away from the defeated PERSON, his hand touches GPE''s belly
    and he realizes that she is already pregnant with the prince''s child. Furious, he rejects her and prepares to kill them
    both. A struggle ensues and ORG again knocks the prince to his knees, but is unable to deliver the coup de grace because
    the Delphite queen''s spirit still protects her son. The sorcerer calls the gryphon down on the prince, to whom the princess
    tosses ORG. It appears as if PERSON is charging for the sorcerer, but instead hops onto a rock and turns just in time
    to level the pike at the stooping gryphon, impaling it. The gryphon reverts to stone and shatters as it falls to the ground,
    while the sorcerer dissolves into a pool of blood. The armies of GPE and ORG rejoice at their deliverance, cheering as
    GPE and PERSON raise the reassembled ORG overhead to symbolize the reunion of the sundered kingdoms of ORG. In a voice
    over, GPE proclaims that the curse of civil war has been lifted.'
  - 'Represent the plot: PERSON (PERSON) is a wealthy American living in GPE, GPE. He is involved in an artwork forgery scheme,
    in which he appears at auctions to bid on forged paintings produced by an accomplice to drive up the price. At one of
    these auctions, he is introduced to PERSON (PERSON), a picture framer who is dying of leukemia. ORG refuses to shake GPE''s
    hand when introduced, coldly saying I''ve heard of you before walking away. A French criminal, ORG (PERSON), asks GPE
    to murder a rival gangster. Ripley declines, but in order to get even for ORG''s slight, suggests Minot use GPE for the
    job. GPE spreads rumors that PERSON''s illness has suddenly worsened. Minot offers PERSON a great deal of money to kill
    the gangster. ORG initially turns Minot down, but becomes greatly distressed by the thought that he may not have long
    to live and wants to provide for his wife and son. He agrees to go to GPE with Minot for a second medical opinion. Minot
    arranges to have the results falsified to make GPE expect the worst. ORG agrees to shoot the gangster in a GPE Métro station.
    GPE visits GPE in his shop before and after the shooting to get a picture framed. PERSON is unaware of GPE''s involvement
    in the murder plot, and the two begin to form a bond. Minot visits GPE again to report his satisfaction with ORG''s performance.
    GPE, who has grown to like PERSON, is appalled when Minot says he plans to have him murder another rival gangster, this
    time on a speeding train using a garrote. Before ORG can complete the murder, the target''s bodyguard catches him. GPE
    appears on the train and overpowers him. GPE and GPE execute the target and the bodyguard. They meet outside and GPE confesses
    to suggesting him to Minot, and declines PERSON''s suggestion to keep half the money for the second hit. GPE asks GPE
    to tell Minot that he did the job on the train alone. Back home, ORG argues with his wife, PERSON, who does not believe
    his stories of being paid to undergo experimental treatments. PERSON has been receiving mysterious phone calls and suspects
    the ORG is trying to find him. His fears grow worse when Minot tells him that his own flat was recently bombed. Ripley
    picks up GPE and they drive to his mansion to wait for the assassins GPE expects to appear. GPE and GPE ambush and kill
    the assassins. GPE piles their bodies into the ambulance in which they arrived. Before he and ORG can leave to dispose
    of the bodies, PERSON arrives and tells GPE that the French medical reports are fake. PERSON explains that she and her
    husband can settle matters later, but now they need to dispose of the bodies. They drive to the sea, GPE in the ambulance
    and PERSON driving her husband in their car. On an isolated beach, GPE douses the ambulance with gasoline and sets fire
    to it. ORG drives away with PERSON, abandoning GPE. Moments later, he dies at the wheel; PERSON pulls the emergency brake
    and survives. At the beach, GPE says to himself, We made it anyway, PERSON. Be careful.'
- source_sentence: 'Represent the plot: Formerly enemies, PERSON and Poppy embark on a journey of adventure and discovery
    that takes them far beyond the only world they''ve ever known.'
  sentences:
  - 'Represent the plot:  The ORG are small, colorful, perpetually happy creatures who like to sing, dance, and hug all day.
    They are discovered by the gigantic, ugly, and miserable ORG, who believe they can only feel happy by consuming a ORG.
    The ORG imprison the ORG in a caged tree and eat them every year on a special occasion called ORG. On the year that Bergen
    Prince Gristle Jr., son of ORG, is due to eat his first troll, the chef in charge of the ceremony discovers that the ORG''
    leader, ORG, has escaped with his daughter, Princess PERSON, and the rest of the ORG. King Gristle banishes Chef from
    ORG, and she vows to find the ORG, plotting to overthrow the monarchy as revenge. 20 years later, an adult Poppy organizes
    a gigantic party to celebrate the anniversary of their escape. A serious, gray, survivalist ORG named PERSON warns that
    this could expose their home, but everyone ignores him. His forewarnings are realized when Chef locates the ORG'' vibrant,
    loud, and visible party, kidnapping PERSON''s friends, including her secret crush, a zen troll named PERSON. While the
    rest of the ORG take refuge in ORG''s survival bunker, who reluctantly permits them to do so, Poppy sets off alone to
    rescue her friends. She gets herself into several potentially deadly situations and is finally rescued by PERSON, who
    thinks her quest is hopeless and reluctantly follows her only to escape his crowded bunker. After arriving in Bergen Town,
    Poppy and PERSON sneak into the castle of the now King Gristle Jr. and see Chef serving Creek to him. Gristle appears
    to eat Creek, but Poppy still holds out hope that he is alive and finds the rest of the trolls guarded by a young scullery
    maid named PERSON. After learning that ORG is secretly in love with Gristle, Poppy and the trolls agree to help her get
    a date with him in exchange for her help in ascertaining if PERSON is alive. When Branch refuses to sing along with the
    rest in the ensuing musical number, he and Poppy argue, and he reveals that he has refused to sing ever since a GPE many
    years ago. On that day, his singing drew the attention of Chef, who found his home and took his grandmother away as she
    tried to protect him. Since then, he lost his happiness and turned gray.   Poppy comforts him with a hug, and the trolls
    disguise Bridget as Lady Glittersparkles, and she and PERSON go on a date at a roller rink/arcade restaurant. Poppy spots
    PERSON being held captive inside a jewel on PERSON''s mantle, and after the date, the trolls sneak into PERSON''s room
    to free him, but discover the jewel empty. Chef arrives and recaptures them, and PERSON gets horrified to learn that ORG,
    in exchange for his own life, sold them all out to Chef. He then steals PERSON''s ORG and later uses it to summon the
    rest of the trolls, whom Chef captures and places in a pot to be served at the feast. Poppy and the other trolls fall
    into despair and turn gray. In a moment of compassion, Branch sings to cheer Poppy up, which regains their colors, with
    the rest of the ORG joining in. Bridget secretly releases them while Chef is not looking, but PERSON refuses to let her
    take the blame. The trolls return to ORG and reveal to the Bergens that Bridget was in fact PERSON, and that she and PERSON
    are happily in love with each other, showing the ORG that they too can find happiness within themselves. Joy is brought
    to ORG as a result, and the ORG and the Bergens end their feud, though ORG refuses to accept peace, and she and PERSON
    are sent rolling out of ORG into the woods via a flaming serving cart. Back home, Peppy allows PERSON to become Queen
    of the ORG, and she begins a friendship with PERSON as they share a hug.  In a mid-credits scene, PERSON and Chef find
    themselves on the top of a hill, where ORG attempts to eat Creek, but the hill, which is actually a monster, eats them.'
  - 'Represent the plot: The film is set in ORG in the early 19th century, when a local policeman, ORG (played by ORG), is
    hired by ORG, a boyar, to find PERSON (played by PERSON), a GPE slave who had run away from the boyar''s estate after
    having an affair with his wife, ORG.'
  - 'Represent the plot: Adèle is an introverted 15-year-old high-school student. She passes an older woman with short blue
    hair in the streets one day and is instantly attracted. She sleeps with PERSON, a boy from school, but is ultimately dissatisfied
    and ends their relationship. After having vivid fantasies about the blue-haired woman while masturbating and kissing ORG,
    one of her female friends, Adèle becomes troubled about her sexual identity. ORG says she does not want to proceed further
    and tells Adèle to forget the kiss. PERSON''s friend, the openly gay Valentin, takes her to a gay dance bar. Adèle later
    leaves and enters a lesbian bar, where some women flirt with her. The blue-haired woman, art student PERSON, is there
    and intervenes, claiming PERSON is her cousin. PERSON and Adèle become friends. After PERSON shows up at the school, PERSON''s
    friends suspect her of being a lesbian and ostracise her. Adèle and PERSON grow closer and kiss at a picnic. They later
    have sex and begin a passionate relationship. PERSON''s artsy family welcomes PERSON, but Adèle tells her conservative,
    working-class parents that PERSON is her tutor for philosophy class. Some of PERSON''s old friends attend her surprise
    18th birthday party, but PERSON does not. In the years that follow, the two women move in together. Adèle becomes an elementary
    school teacher, while PERSON tries to advance her painting career by throwing frequent house parties. At one party, Adèle
    meets PERSON''s pregnant colleague PERSON, gallery owner ORG, and aspiring actor PERSON. PERSON discusses GPE with Adèle
    while the others discuss sex, and the two become friends. PERSON spends more time at the party with PERSON. PERSON belittles
    PERSON''s career but encourages her to pursue writing, while Adèle insists she is happy the way she is. Their relationship
    grows tense as it becomes clear they have little in common. PERSON comes home late, having spent the evening working with
    PERSON. Out of loneliness, Adèle sleeps with a male colleague. PERSON discovers the cheating and furiously breaks up with
    GPE. Three years later, the two meet at a restaurant. Adèle is happy with her job as a kindergarten teacher but has not
    moved on: she is still deeply in love with PERSON. PERSON is in a committed partnership with PERSON and helps raise ORG''s
    three-year-old daughter. PERSON and ORG kiss, but PERSON withdraws, although she admits she does not feel sexually fulfilled.
    She tells Adèle that she no longer loves her, but that their relationship was special and she will always have infinite
    tenderness for her. The two part with apologies and tears. Adèle attends PERSON''s art exhibition. On one wall is a nude
    portrait of Adèle that PERSON painted during their time together. PERSON acknowledges PERSON but is focused on PERSON
    and the other guests. Adèle congratulates PERSON on her success and, after a brief conversation with PERSON, leaves. He
    chases after her but goes in the wrong direction, while Adèle walks off into the distance.'
- source_sentence: 'Represent the plot: ORG, dressed as a clown, robs a bank in midtown GPE. He cleverly stages a hostage
    situation and then makes his escape with a huge sum of money with his accomplices: his girlfriend PERSON and his best
    friend ORG. However, the real challenge now is escaping GPE with the police hot on their heels, and that''s much harder
    than robbing a bank.'
  sentences:
  - 'Represent the plot: Anna, a flower-girl, is in love with PERSON - a young taxi driver. PERSON doesn''t have the same
    feelings for PERSON as he still thinks about ORG, who dumped him. Eventually, PERSON asks PERSON for a dance at to the
    ball, but all hell breaks loose when ORG shows up with two men who will stop at nothing to disturb this newly arising
    love.'
  - 'Represent the plot:  In December 1941, Lt. PERSON (PERSON) commands a squadron of agile but small and unproven ORG PT
    boats based at Cavite in the GPE. He puts on a demonstration of their maneuverability and seakeeping capabilities for
    the senior area commander, Admiral PERSON (PERSON), who remains unimpressed by their diminutive size and lightweight construction.
    Lt. J.G. PERSON (PERSON), ORG''s executive officer and friend, is hot on getting into combat. He becomes disgusted at
    the admiral''s close-minded dismissal and is writing his request for transfer to destroyer duty when news of the Japanese
    attack on Pearl Harbor arrives by radio bulletin. Japanese forces descend on the GPE and wreak havoc. Bypassed by local
    brass, ORG''s squadron is kept out of combat and marginalized to menial mail and messenger duty. Frustration, particularly
    with PERSON, grows and threatens to boil over. Following a devastating attack on their base, the desperate admiral relents
    and orders them to attack a large Japanese cruiser shelling GPE troop emplacements ashore. After initially choosing PERSON
    to skipper the second boat on the sortie, ORG discovers that his exec has blood poisoning from a previous combat wound
    and orders him to sick bay, selecting another boat and crew to take his place.  After accusing his CO of glory hogging,
    and resisting evacuation to a military hospital on GPE, PERSON arrives there still hissing and spitting, only to reluctantly
    admit to the severity of his life-threatening condition. There he meets another patient, GPE (Louis PERSON), who chides
    him to cool off and get in line. Once he does, PERSON begins a romance with strong-willed ORG nurse PERSON (PERSON), so
    attractive, kind, and wholesomely appealing GPE cracks, Eleven-thousand men can''t be wrong about her.  PERSON''s attack
    sinks the cruiser. PERSON returns and the squadron is unleashed, achieving increasing success, though at the cost both
    of boats and men. Still, it is only a matter of time before the GPE fall. Sandy attends a dinner in her honor at the PT
    Base, reigniting the flame between her and PERSON. The squadron is marooned on the Philippine island of GPE in LOC, just
    Southeast of the large Northern-most Philippine island of LOC after the Japanese onslaught against the doomed American
    defenders at the GPE.  Corregidor stands as the last American stronghold against the advancing Japanese invaders. ORG
    are then assigned to evacuate the commanding general of ORG, PERSON, his entourage, and Admiral PERSON to the Southern-most
    Philippine island of GPE, where they will be flown LOC to GPE. PERSON manages to make a last phone call to ORG, now on
    GPE, to explain he has been ordered out, but before they can say goodbye the connection is cut off.   The small PT flotilla
    successfully carries the commanders across spans of open ocean to their rendezvous. It then resumes its attacks against
    the Japanese, who gradually whittle the squadron down too small to function effectively. Crews without boats are sent
    to link up with the ORG and fight as infantry. After PERSON''s boat is damaged, the last two PTs pull into a small shipyard
    run by crusty PERSON (PERSON) for repairs. As the boats leave in haste ahead of an imminent Japanese assault, PERSON refuses
    to flee, bidding his poignant farewell with a rifle folded in his arms and a whisky jug tucked securely at his feet.   In
    a final assault that destroys another threatening cruiser, PERSON''s boat is sunk, after which ORG''s is turned over to
    ORG, once again reduced to messenger duty. PERSON, PERSON and two ensigns are ordered by ORG command to be airlifted out
    on the last plane, assigned stateside to train PT crews, the small, inexpensive wood-hulled boats having proved their
    worth in combat. While waiting for the plane, PERSON runs into GPE. Neither knows what happened to ORG, trapped behind
    on GPE. Each helps the other to hope she escaped to the hills rather than meet her likely dark fate. When the ensigns
    finally arrive late, PERSON bolts for the aircraft''s exit, but is brought to heel by ORG, who reminds him his duty comes
    first. GPE is forced to give up his seat on the plane and is left behind to face certain death or capture. The surviving
    enlisted men, led by Chief Mulcahey (Ward Bond), shoulder rifles and march off to continue the resistance with the remnants
    of ORG and Filipino guerrillas, as expendable in the fight as their PT boats had been before them.'
  - 'Represent the plot: ORG, dressed as a clown, robs a bank in midtown GPE. He sets up an ingenious hostage situation strapping
    fake dynamite all over his waist and successfully gets away with $1 million and his accomplices: girlfriend PERSON and
    best friend ORG. The heist itself is comparatively straightforward and easy, but the getaway turns into a nightmare. The
    relatively simple act of getting to the airport to catch a flight out of the country is complicated by the fact that fate,
    luck, and all of GPE appear to be conspiring against their escape. To begin with, the trio is seeking ORG to get to the
    airport, but the signs were removed during construction work, resulting in the three robbers becoming lost in an unfamiliar
    neighborhood in GPE. Then, a conman/thief robs the trio of everything they have (except the bank money, which they have
    taped under their clothes). After changing into new clothes at PERSON''s apartment, they are confronted and nearly gunned
    down by the paranoid and stressed-out incoming tenant. At the same time, a fire has broken out across the street and the
    fire department arrives and pushes their car away from a hydrant only to cause it to roll downhill and then down an embankment.
    When the three crooks eventually manage to flag down a cab, the foreign driver is hopelessly non fluent in English. This
    causes a hysterical ORG to jump out of the moving cab to grab another, but he runs into a newsstand, knocking himself
    unconscious. The driver leaves, thinking he has killed ORG. An anal-retentive bus driver, a run-in with mobsters, and
    PERSON''s increasing desperation to tell ORG the news that she is pregnant with his child add further complications. All
    the while, Rotzinger, a world-weary but relentless chief of ORG, is doggedly attempting to nab the fleeing trio. A meeting
    on board an airliner at the airport occurs between the robbers and the chief, who gets the added prize of having a major
    crime boss dropped in his lap with their assistance. Unfortunately the chief only realizes who they were after their plane
    has taken off.'
- source_sentence: 'Represent the plot: The film tells the story of two friends married to the same woman, based on the experience
    of screenwriters ORG and ORG, who met after dating the same woman named PERSON.'
  sentences:
  - 'Represent the plot: In rural GPE, truck driver PERSON pulls into a motel for the night and notices a man in a green van
    checking in with a female hitchhiker. Quid had passed the hitchhiker earlier because trucking company policy forbade him
    from picking her up. In the motel room, the hitchhiker strums a guitar while the man unpacks a new guitar string. The
    man winds the string around his gloved hands and uses it to strangle the woman. Quid wakes the next morning in his truck.
    His pet dingo sniffs relentlessly at the garbage outside the motel, and Quid notices the van driver watching the dingo
    from the window of the motel room. Quid picks up a load of pigs from ORG. He sets off for PERSON with his load and passes
    various characters on the road: a nagging wife and her family, a cautious man hauling a sailboat, and a station wagon
    crammed full of toy balls. He repeatedly passes by another female hitchhiker. The wife, PERSON, creates a roadblock by
    streaming pink paper across the highway. When Quid stops at the sight of it, she climbs into his cab and orders Quid to
    catch up with her husband who left her at the side of the road. They play 20 Questions to pass the time. The wife informs
    Quid about the grisly murder of a woman and his nonchalant answers start to disturb her. She suspects that he might be
    the serial killer from the news.  Quid stops the truck when he sees the green van parked along the road. Its driver has
    several trash bags and an esky; he appears to be burying the bags. When the van driver notices Quid watching him through
    binoculars, he abandons his work and drives away. Later, at a roadhouse, the van driver assaults Quid''s dingo. Quid gives
    chase, but he encounters the slow-driving boat owner, who refuses to let Quid pass. Eventually, Quid destroys the boat,
    but the van is too far off to catch. Quid picks up the second female hitchhiker, PERSON, that he has passed before. She
    gradually reveals that she is the daughter of a powerful American diplomat. Quid urges PERSON to let her father know that
    she is alright. The duo discuss the serial killer. At a service station, they notice the van parked near the restroom.
    Quid sees a pair of feet in the toilet stall and he thinks he has the killer cornered. PERSON investigates the van while
    Quid tries to get the man to exit the stall. As PERSON reaches for the esky inside the van, she realizes that the driver
    is sleeping on the floor. In the restroom, a biker emerges from the stall. Quid rushes outside to see that the van is
    gone. When Quid catches up to the van, it appears that PERSON is happily in the passenger seat. Later that night, Quid
    notices the van parked off the side of the road and pulls over to investigate. He hears people giggling in the bushes
    nearby and assumes that PERSON and the van driver are engaged in sex. When he breaks into the van to investigate, he finds
    that the esky only contains food. Quid arrives at the outskirts of GPE and, while reporting to the weigh station, sees
    the van. He follows the van through the streets of GPE, trailed by the police. Eventually the van reaches a dead end and
    PERSON''s truck becomes stuck in the narrow alleys. The van driver approaches Quid''s truck and attempts to strangle him
    with a garrotte, but Quid manages to disarm him. When Quid starts to strangle the van driver with the same weapon, the
    police arrive and assume that Quid is the killer. Upon freeing a gagged and bound PERSON from the van, the police learn
    that Quid is innocent, and PERSON''s actual captor is caught whilst trying to escape through the crowd. When Quid finally
    delivers the meat shipment, he relates to PERSON that after he had found his trailer door open and discovered the load
    weight a few kilos over, he had presumed that the van driver had killed her and disposed of her inside his trailer. Back
    at the meat facility, a woman cleaning out the back of the trailer is brushed by a guitar string hanging from the ceiling
    and, on pulling it, gets a nasty surprise as a human head falls from above and lands in her soap bucket.'
  - 'Represent the plot: Margo is a woman from GPE who marries a fellow GPE native, PERSON. After it becomes evident that
    their marriage will not last, the two are divorced and GPE is remarried, this time to GPE, a GPE surfer. However, this
    marriage does not last long either and they are quickly divorced. Jake and Rock were previously introduced to each other
    by GPE and, after they are both divorced from her, they form a friendship and live as roommates. The two have very little
    in common except for the fact that they married and divorced the same woman. They become best friends, even though they
    constantly irritate each other, and they decide to write a film based on their experience of being married to GPE. During
    their work on the project, they meet many more people just like them whose lives were impacted by GPE.'
  - 'Represent the plot: PERSON is separated from her husband PERSON, who was cheating on her with his secretary, while her
    colleague and best friend PERSON urges PERSON to divorce him. 19-year-old PERSON, an orphan whose parents died a year
    ago, moves in next door to help his uncle, who uses a wheelchair. PERSON befriends PERSON, PERSON''s teenage son, and
    begins attending his school, where she teaches classics. PERSON is partially drawn to PERSON by their mutual love for
    PERSON''s GPE.  While PERSON and PERSON go away on a fishing trip, PERSON goes on a miserable double date with GPE, her
    boyfriend PERSON, and his ill-mannered friend PERSON. PERSON later has dinner with PERSON, during which he unashamedly
    flirts with her. As she is about to go home, PERSON stops and seduces PERSON. While seducing her, PERSON undresses and
    carries PERSON into bed, and they eventually have passionate sex. The following morning, PERSON wakes up and tells him
    she regrets their night together, causing him to punch a wall in rage. After the school year begins, PERSON hacks into
