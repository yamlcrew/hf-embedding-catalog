      withdraws, although she admits she does not feel sexually fulfilled. She tells Adèle that she no longer loves her, but
      that their relationship was special and she will always have infinite tenderness for her. The two part with apologies
      and tears. Adèle attends PERSON''s art exhibition. On one wall is a nude portrait of Adèle that PERSON painted during
      their time together. PERSON acknowledges PERSON but is focused on PERSON and the other guests. Adèle congratulates PERSON
      on her success and, after a brief conversation with PERSON, leaves. He chases after her but goes in the wrong direction,
      while Adèle walks off into the distance.'
  - source_sentence: 'Represent the plot: ORG, dressed as a clown, robs a bank in midtown GPE. He cleverly stages a hostage
      situation and then makes his escape with a huge sum of money with his accomplices: his girlfriend PERSON and his best
      friend ORG. However, the real challenge now is escaping GPE with the police hot on their heels, and that''s much harder
      than robbing a bank.'
    sentences:
    - 'Represent the plot: Anna, a flower-girl, is in love with PERSON - a young taxi driver. PERSON doesn''t have the same
      feelings for PERSON as he still thinks about ORG, who dumped him. Eventually, PERSON asks PERSON for a dance at to the
      ball, but all hell breaks loose when ORG shows up with two men who will stop at nothing to disturb this newly arising
      love.'
    - 'Represent the plot:  In December 1941, Lt. PERSON (PERSON) commands a squadron of agile but small and unproven ORG
      PT boats based at Cavite in the GPE. He puts on a demonstration of their maneuverability and seakeeping capabilities
      for the senior area commander, Admiral PERSON (PERSON), who remains unimpressed by their diminutive size and lightweight
      construction. Lt. J.G. PERSON (PERSON), ORG''s executive officer and friend, is hot on getting into combat. He becomes
      disgusted at the admiral''s close-minded dismissal and is writing his request for transfer to destroyer duty when news
      of the Japanese attack on Pearl Harbor arrives by radio bulletin. Japanese forces descend on the GPE and wreak havoc.
      Bypassed by local brass, ORG''s squadron is kept out of combat and marginalized to menial mail and messenger duty. Frustration,
      particularly with PERSON, grows and threatens to boil over. Following a devastating attack on their base, the desperate
      admiral relents and orders them to attack a large Japanese cruiser shelling GPE troop emplacements ashore. After initially
      choosing PERSON to skipper the second boat on the sortie, ORG discovers that his exec has blood poisoning from a previous
      combat wound and orders him to sick bay, selecting another boat and crew to take his place.  After accusing his CO of
      glory hogging, and resisting evacuation to a military hospital on GPE, PERSON arrives there still hissing and spitting,
      only to reluctantly admit to the severity of his life-threatening condition. There he meets another patient, GPE (Louis
      PERSON), who chides him to cool off and get in line. Once he does, PERSON begins a romance with strong-willed ORG nurse
      PERSON (PERSON), so attractive, kind, and wholesomely appealing GPE cracks, Eleven-thousand men can''t be wrong about
      her.  PERSON''s attack sinks the cruiser. PERSON returns and the squadron is unleashed, achieving increasing success,
      though at the cost both of boats and men. Still, it is only a matter of time before the GPE fall. Sandy attends a dinner
      in her honor at the PT Base, reigniting the flame between her and PERSON. The squadron is marooned on the Philippine
      island of GPE in LOC, just Southeast of the large Northern-most Philippine island of LOC after the Japanese onslaught
      against the doomed American defenders at the GPE.  Corregidor stands as the last American stronghold against the advancing
      Japanese invaders. ORG are then assigned to evacuate the commanding general of ORG, PERSON, his entourage, and Admiral
      PERSON to the Southern-most Philippine island of GPE, where they will be flown LOC to GPE. PERSON manages to make a
      last phone call to ORG, now on GPE, to explain he has been ordered out, but before they can say goodbye the connection
      is cut off.   The small PT flotilla successfully carries the commanders across spans of open ocean to their rendezvous.
      It then resumes its attacks against the Japanese, who gradually whittle the squadron down too small to function effectively.
      Crews without boats are sent to link up with the ORG and fight as infantry. After PERSON''s boat is damaged, the last
      two PTs pull into a small shipyard run by crusty PERSON (PERSON) for repairs. As the boats leave in haste ahead of an
      imminent Japanese assault, PERSON refuses to flee, bidding his poignant farewell with a rifle folded in his arms and
      a whisky jug tucked securely at his feet.   In a final assault that destroys another threatening cruiser, PERSON''s
      boat is sunk, after which ORG''s is turned over to ORG, once again reduced to messenger duty. PERSON, PERSON and two
      ensigns are ordered by ORG command to be airlifted out on the last plane, assigned stateside to train PT crews, the
      small, inexpensive wood-hulled boats having proved their worth in combat. While waiting for the plane, PERSON runs into
      GPE. Neither knows what happened to ORG, trapped behind on GPE. Each helps the other to hope she escaped to the hills
      rather than meet her likely dark fate. When the ensigns finally arrive late, PERSON bolts for the aircraft''s exit,
      but is brought to heel by ORG, who reminds him his duty comes first. GPE is forced to give up his seat on the plane
      and is left behind to face certain death or capture. The surviving enlisted men, led by Chief Mulcahey (Ward Bond),
      shoulder rifles and march off to continue the resistance with the remnants of ORG and Filipino guerrillas, as expendable
      in the fight as their PT boats had been before them.'
    - 'Represent the plot: ORG, dressed as a clown, robs a bank in midtown GPE. He sets up an ingenious hostage situation
      strapping fake dynamite all over his waist and successfully gets away with $1 million and his accomplices: girlfriend
      PERSON and best friend ORG. The heist itself is comparatively straightforward and easy, but the getaway turns into a
      nightmare. The relatively simple act of getting to the airport to catch a flight out of the country is complicated by
      the fact that fate, luck, and all of GPE appear to be conspiring against their escape. To begin with, the trio is seeking
      ORG to get to the airport, but the signs were removed during construction work, resulting in the three robbers becoming
      lost in an unfamiliar neighborhood in GPE. Then, a conman/thief robs the trio of everything they have (except the bank
      money, which they have taped under their clothes). After changing into new clothes at PERSON''s apartment, they are
      confronted and nearly gunned down by the paranoid and stressed-out incoming tenant. At the same time, a fire has broken
      out across the street and the fire department arrives and pushes their car away from a hydrant only to cause it to roll
      downhill and then down an embankment. When the three crooks eventually manage to flag down a cab, the foreign driver
      is hopelessly non fluent in English. This causes a hysterical ORG to jump out of the moving cab to grab another, but
      he runs into a newsstand, knocking himself unconscious. The driver leaves, thinking he has killed ORG. An anal-retentive
      bus driver, a run-in with mobsters, and PERSON''s increasing desperation to tell ORG the news that she is pregnant with
      his child add further complications. All the while, Rotzinger, a world-weary but relentless chief of ORG, is doggedly
      attempting to nab the fleeing trio. A meeting on board an airliner at the airport occurs between the robbers and the
      chief, who gets the added prize of having a major crime boss dropped in his lap with their assistance. Unfortunately
      the chief only realizes who they were after their plane has taken off.'
  - source_sentence: 'Represent the plot: The film tells the story of two friends married to the same woman, based on the
      experience of screenwriters ORG and ORG, who met after dating the same woman named PERSON.'
    sentences:
    - 'Represent the plot: In rural GPE, truck driver PERSON pulls into a motel for the night and notices a man in a green
      van checking in with a female hitchhiker. Quid had passed the hitchhiker earlier because trucking company policy forbade
      him from picking her up. In the motel room, the hitchhiker strums a guitar while the man unpacks a new guitar string.
      The man winds the string around his gloved hands and uses it to strangle the woman. Quid wakes the next morning in his
      truck. His pet dingo sniffs relentlessly at the garbage outside the motel, and Quid notices the van driver watching
      the dingo from the window of the motel room. Quid picks up a load of pigs from ORG. He sets off for PERSON with his
      load and passes various characters on the road: a nagging wife and her family, a cautious man hauling a sailboat, and
      a station wagon crammed full of toy balls. He repeatedly passes by another female hitchhiker. The wife, PERSON, creates
      a roadblock by streaming pink paper across the highway. When Quid stops at the sight of it, she climbs into his cab
      and orders Quid to catch up with her husband who left her at the side of the road. They play 20 Questions to pass the
      time. The wife informs Quid about the grisly murder of a woman and his nonchalant answers start to disturb her. She
      suspects that he might be the serial killer from the news.  Quid stops the truck when he sees the green van parked along
      the road. Its driver has several trash bags and an esky; he appears to be burying the bags. When the van driver notices
      Quid watching him through binoculars, he abandons his work and drives away. Later, at a roadhouse, the van driver assaults
      Quid''s dingo. Quid gives chase, but he encounters the slow-driving boat owner, who refuses to let Quid pass. Eventually,
      Quid destroys the boat, but the van is too far off to catch. Quid picks up the second female hitchhiker, PERSON, that
      he has passed before. She gradually reveals that she is the daughter of a powerful American diplomat. Quid urges PERSON
      to let her father know that she is alright. The duo discuss the serial killer. At a service station, they notice the
      van parked near the restroom. Quid sees a pair of feet in the toilet stall and he thinks he has the killer cornered.
      PERSON investigates the van while Quid tries to get the man to exit the stall. As PERSON reaches for the esky inside
      the van, she realizes that the driver is sleeping on the floor. In the restroom, a biker emerges from the stall. Quid
      rushes outside to see that the van is gone. When Quid catches up to the van, it appears that PERSON is happily in the
      passenger seat. Later that night, Quid notices the van parked off the side of the road and pulls over to investigate.
      He hears people giggling in the bushes nearby and assumes that PERSON and the van driver are engaged in sex. When he
      breaks into the van to investigate, he finds that the esky only contains food. Quid arrives at the outskirts of GPE
      and, while reporting to the weigh station, sees the van. He follows the van through the streets of GPE, trailed by the
      police. Eventually the van reaches a dead end and PERSON''s truck becomes stuck in the narrow alleys. The van driver
      approaches Quid''s truck and attempts to strangle him with a garrotte, but Quid manages to disarm him. When Quid starts
      to strangle the van driver with the same weapon, the police arrive and assume that Quid is the killer. Upon freeing
      a gagged and bound PERSON from the van, the police learn that Quid is innocent, and PERSON''s actual captor is caught
      whilst trying to escape through the crowd. When Quid finally delivers the meat shipment, he relates to PERSON that after
      he had found his trailer door open and discovered the load weight a few kilos over, he had presumed that the van driver
      had killed her and disposed of her inside his trailer. Back at the meat facility, a woman cleaning out the back of the
      trailer is brushed by a guitar string hanging from the ceiling and, on pulling it, gets a nasty surprise as a human
      head falls from above and lands in her soap bucket.'
    - 'Represent the plot: Margo is a woman from GPE who marries a fellow GPE native, PERSON. After it becomes evident that
      their marriage will not last, the two are divorced and GPE is remarried, this time to GPE, a GPE surfer. However, this
      marriage does not last long either and they are quickly divorced. Jake and Rock were previously introduced to each other
      by GPE and, after they are both divorced from her, they form a friendship and live as roommates. The two have very little
      in common except for the fact that they married and divorced the same woman. They become best friends, even though they
      constantly irritate each other, and they decide to write a film based on their experience of being married to GPE. During
      their work on the project, they meet many more people just like them whose lives were impacted by GPE.'
    - 'Represent the plot: PERSON is separated from her husband PERSON, who was cheating on her with his secretary, while
      her colleague and best friend PERSON urges PERSON to divorce him. 19-year-old PERSON, an orphan whose parents died a
      year ago, moves in next door to help his uncle, who uses a wheelchair. PERSON befriends PERSON, PERSON''s teenage son,
      and begins attending his school, where she teaches classics. PERSON is partially drawn to PERSON by their mutual love
      for PERSON''s GPE.  While PERSON and PERSON go away on a fishing trip, PERSON goes on a miserable double date with GPE,
      her boyfriend PERSON, and his ill-mannered friend PERSON. PERSON later has dinner with PERSON, during which he unashamedly
      flirts with her. As she is about to go home, PERSON stops and seduces PERSON. While seducing her, PERSON undresses and
      carries PERSON into bed, and they eventually have passionate sex. The following morning, PERSON wakes up and tells him
      she regrets their night together, causing him to punch a wall in rage. After the school year begins, PERSON hacks into
      PERSON''s computer, making it appear as if she sent an e-mail to the principal requesting PERSON to be in her class.
      Continuing to hang out with PERSON, PERSON manipulates him into hating his father. Later, PERSON overexerts himself
      at gym class and goes into shock; PERSON saves his life by injecting him with his ORG. PERSON receives flowers and initially
      thinks they''re from PERSON, but finds out they''re actually from PERSON, and she confronts him about it before later
      spending the evening at home with PERSON. PERSON witnesses this, has flashbacks of him and PERSON having sex, and his
      obsession with her escalates.  After an incident where PERSON — defending PERSON — violently assaults a bully, leaving
      him with a fractured skull, GPE, the school''s vice principal, discovers that PERSON was kicked out of his previous
      school for disorderly conduct and expels him after he aggressively insults her. PERSON prepares himself for his date
      with his classmate PERSON at the Fall Fling dance. At the dance, PERSON investigates a leak in the boys'' bathroom,
      where I fucked PERSON is written on the wall. Noah emerges and attempts to rape her, but she fends him off and demands
      that he stay away from her and PERSON. Under the delusional belief that PERSON wants to be with him, he is unwilling
      to do so. Later that night, PERSON sees PERSON having sex with PERSON date. The following day, PERSON leaves a printer
      running in PERSON''s classroom, with pictures of them sleeping together scattered everywhere. PERSON is able to get
      rid of all the photos in the nick of time, either by throwing them away or stashing them under her desk before the principal
      and PERSON''s students walk in. Later, when PERSON''s car brakes fail, he and PERSON narrowly escape serious injury.
      That evening, PERSON attempts to blackmail PERSON with a video of them having sex, saying he will relinquish it to her
      if she continues sleeping with him, but she again refuses.  PERSON has GPE lure PERSON away from his house so she can
      break in and delete the sex tape. Horrified, she finds nude pictures of herself all over the walls and on his laptop;
      she also finds instructions on tampering with the brakes of both PERSON''s and PERSON''s parents'' cars. PERSON''s detective
      friend gives PERSON the truth about the car accident in PERSON''s family. Meanwhile, PERSON binds and gags GPE with
      duct tape and uses a recording of her voice to lure PERSON to her house. When she arrives, she discovers GPE dead with
      her throat slashed and calls 911, but PERSON appears. When she accuses him of killing his parents, he clarifies that
      his mother killed herself after his father cheated on her, and he retaliated by cutting his father''s car''s brakes,
      killing him and his mistress.  PERSON takes PERSON to a barn where he has tied up PERSON and PERSON, outlining his deluded
      notion that killing them will help him and PERSON start a new life together, and soon pours gasoline around the barn
      and lights it. PERSON finally destroys PERSON''s delusions by stabbing PERSON in the eye with PERSON''s ORG in the ensuing
      struggle. Enraged, PERSON attempts to kill all three, but PERSON eventually pulls a lever that drops an engine on PERSON,
      ultimately killing him. PERSON and PERSON then help a wounded PERSON out of the burning barn as police and paramedics
      arrive.'
  - source_sentence: 'Represent the plot: A 14-year-old boy, PERSON (PERSON), is a true expert in the art of lying, always
      lying or tricking others to get out of various situations. To try to justify not handing in an important school assignment,
      PERSON tells his teacher that his father almost choked to death on a meatball. However, the lie is discovered, forcing
      PERSON to write a thousand-word essay in just three hours, or he''ll have to take summer school. Using his fertile imagination,
      he writes the essay, but on his way to school, his bicycle (actually his sister''s) crashes into the limousine of PERSON
      (PERSON), a film producer who gives him a ride after PERSON threatens to sue him. During a conversation, PERSON realizes
      that PERSON is a liar, just like him. In his haste to get out of the car, PERSON forgets the essay, and nobody believes
      he actually did his homework, so he is forced to take summer school during the holidays. While going to the movies with
      ORG..." (PERSON), his best friend, PERSON learns that PERSON took his script and turned it into a movie, which promises
      to be the big hit of the year. What irritates PERSON most is that PERSON claims he wrote the entire story himself. Trying
      to regain his father''s trust, PERSON takes his savings and, along with ORG, leaves GPE, GPE, and goes to GPE to make
      PERSON confess that the movie idea was stolen. But what he couldn''t imagine is that PERSON is a big scoundrel who has
      no intention of doing what PERSON wants. However, in GPE, he and ORG encounter several people who hate PERSON, with
      plenty of reasons to do so, and are willing to do anything to end his career, seeking revenge.'
    sentences:
    - 'Represent the plot: PERSON is babysitting the children of Dr. PERSON at his home. The children are asleep, and PERSON
      receives a telephone call from a man who asks her if she has checked the children. PERSON initially dismisses the call
      as a practical joke. However, he calls again and again, the calls increase in frequency and threats, and PERSON becomes
      frightened. She calls the police, who tell her to keep the perpetrator on the line long enough for them to trace the
      call. PERSON receives one final call from her harasser. Immediately after the conversation, the police phone to inform
      her that the calls are coming from a line located somewhere inside the house. PERSON sees the intruder''s shadow as
      she tries to exit the house and narrowly escapes. When the police arrive, it is revealed that the killer, an English
      merchant seaman named PERSON, killed the children shortly after PERSON arrived. He leaves PERSON unharmed, and after
      his trial, he is sent to a psychiatric facility. Seven years later, PERSON escapes from the psychiatric facility. Dr.
      PERSON hires PERSON, who investigated the earlier murders but who is now a private detective, to find PERSON. Not knowing
      PERSON is after him, the homeless PERSON is beaten after harassing a woman named PERSON in a downtown bar. PERSON follows
      PERSON to her apartment, and she takes pity on him. She tries to be nice to him while getting him to leave, hoping it
      will be the last she sees of him. Meanwhile, an increasingly obsessed PERSON confides to his friend Lieutenant PERSON
      his intention to kill PERSON rather than have him recommitted. PERSON, who was present at the GPE crime scene, agrees
      to collaborate. PERSON tracks PERSON to PERSON''s residence. He tells PERSON that PERSON literally tore the GPE children
      apart with his bare hands, and PERSON reluctantly agrees to act as bait at the bar that evening in an effort to have
      PERSON caught. PERSON never appears. After PERSON leaves, however, PERSON comes out of hiding from inside PERSON’s closet.
      Tracy screams for help, and PERSON returns, chasing PERSON from the scene but losing his trail in the streets of downtown
      GPE. PERSON is now married with two young children. One night, she and her husband PERSON go to dinner to celebrate
      his promotion while their children are babysat by PERSON. While at the restaurant, PERSON gets a telephone call and
      hears PERSON''s voice asking again: Have you checked the children? The police escort PERSON back home to discover that
      everything there is fine. Upon hearing about the incident, PERSON alerts PERSON. PERSON tries to call PERSON, but finds
      that the line is dead in an eerie parallel to PERSON''s original stalking. Later that night, PERSON hears PERSON''s
      voice as the closet door appears to open. She tries to awaken her husband only to realize that the man lying next to
      her is the intruder. He chases PERSON across the room and attempts to kill her, but PERSON arrives in time to shoot
      PERSON in the chest, killing him. PERSON is found in the closet, unconscious but alive. Their children are safe.'
    - 'Represent the plot: PERSON is a 14-year-old compulsive liar living in the town of GPE, GPE who tries to lie his way
      out of a creative writing assignment, but gets caught by his English teacher, who alerts his parents. He is given three
      hours to submit his essay and avoid repeating English in summer school. Inspired by his talent for lying, PERSON writes
      a story titled Big Fat Liar. While riding his sister''s old bike to turn in the essay, PERSON is accidentally run over
      by the limousine of an arrogant GPE screenwriter and producer, PERSON, and he convinces PERSON to give him a ride. PERSON,
      also a compulsive liar, is in town shooting his film Whitaker and Fowl. In a rush, PERSON accidentally leaves his essay
      in the limo when it falls out of his backpack. Inspired, PERSON keeps the story for himself. Realizing his essay is
      missing, PERSON tries to explain what happened, but he is sent to summer school. PERSON and his best friend, ORG, discover
      PERSON has plagiarized PERSON''s essay into a film when they see a theatrical trailer. They fly to GPE while their parents
      are out of town for the weekend and sneak into PERSON''s studio office to request that PERSON confess to his parents,
      but he purposefully burns PERSON''s essay and calls security to remove them. Angered, the two plot to inconvenience
      him until he confesses. PERSON''s former limo driver and struggling actor, PERSON, agrees to help. PERSON and ORG through
      pranks such as dying his skin blue via his swimming pool and his hair orange via his shampoo. They also superglue his
      headset to his ear; trick him into going to a child''s birthday party, where the children mistake him for the hired
      clown and attack him; and tamper with his car''s controls, which causes PERSON''s car to malfunction. PERSON''s car
      is also rear-ended by a cranky elderly woman into a monster truck owned by the PERSON, a wrestler, who destroys it.
      PERSON plans to produce Big Fat Liar with ORG, but new president PERSON, seeing the commercial and critical failure
      of PERSON and Fowl, refuses to approve the budget, so PERSON agrees to help PERSON in exchange for his confession to
      his parents. With PERSON''s advice, PERSON makes a successful presentation and gets the film approved by PERSON, but
      GPE warns PERSON that anymore problems will result in ORG pulling the plug and will end his career. PERSON subsequently
      betrays PERSON and calls security to remove him and ORG again. PERSON''s abused assistant, Monty PERSON, offers to help
      PERSON and PERSON expose him. They rally PERSON''s other tormented employees, while PERSON calls his parents to tell
      them the truth about the weekend. The next morning, PERSON heads to the studio to begin filming Big Fat Liar, but his
      employees delay him through many mishaps. As PERSON finally arrives, he encounters PERSON, who kidnaps his stuffed monkey
      toy, Mr. PERSON. PERSON flees across the studio, luring PERSON to a rooftop where he retrieves his toy and mocks PERSON.
      PERSON boastfully admits his actions, unaware the entire conversation is being witnessed by PERSON''s parents, the media,
      and GPE, who immediately fires him. PERSON thanks PERSON for teaching him an important lesson about the truth. PERSON
      furiously tries to attack him, but PERSON leaps off the building and safely lands on a stunt cushion, where he finally
      regains his parents'' trust. Universal produces Big Fat Liar soon after PERSON''s firing while using the skills of people
      he had abused. The film becomes a critical success, and PERSON receives full credit for writing his original story.
      Meanwhile, PERSON declares bankruptcy and begins a new job as a birthday clown. At a party, the PERSON orders his son,
      PERSON, to PERSON in his crotch. He screams in horror and upon impact grunts and groans.'
    - 'Represent the plot: Released on parole after serving four of seven years in prison for second degree manslaughter,
      PERSON (PERSON) moves to GPE, where he gets a job as a construction worker during the day and a bouncer at a bar at
      night. One day, after work, he meets up with ORG (PERSON), the widow of the man he killed in self-defense. It is revealed
      that she petitioned to have PERSON released on parole following numerous apology letters he had written to her over
      the years. She also tells him that her eight-year-old daughter PERSON (PERSON) is in need of a heart transplant, and
      he should be the one to cover the US$250,000 operation. With the help of bar waitress PERSON (PERSON), PERSON locates
      fight promoter PERSON (PERSON), whom he had initially rejected a job offer. When he realizes that the job is in the
      world of underground fighting, he once again declines the offer, despite PERSON telling him he can score six figure
      earnings in the business. The next day, he is fired from his construction work, but he saves his boss from a heart attack.
      Later that night, he decides to enter the fighting tournament, defeating his first opponent. PERSON continues to fight
      for GPE and PERSON and rise up in the ranks and earning thousands. It turns out, however, that ORG owes a syndicate
      over US$150,000 and must pay them within a week, or they will hurt PERSON whom he had covered for the debt. After winning
      a gruelling fight, PERSON rushes PERSON to the hospital after discovering her unconscious in her apartment, having slit
      her wrists after receiving a notice that an organ donor supplier has denied her request for a donor heart. During a
      fight, he defeats his opponent, but forfeits the match when he realizes that it is to the death. This results in GPE
      losing his wager and being roughed up by the syndicate. The next day, PERSON is picked up by a tycoon named PERSON (PERSON),
      who turns out to be the owner of his former job. As a token of gratitude for saving his son-in-law''s life from a heart
      attack, PERSON offers to cover PERSON''s US$150,000 wager for the main event or to clear PERSON''s debt. PERSON chooses
      to clear PERSON''s debt. The next night, PERSON faces and defeats the defending champion ORG (PERSON). It is revealed
      that the Deacon (Donnelly Rhodes), a friend of GPE, covered his stake in the fight. In the end, PERSON covers the payment
      for PERSON''s heart transplant while PERSON offers him another deal.'
