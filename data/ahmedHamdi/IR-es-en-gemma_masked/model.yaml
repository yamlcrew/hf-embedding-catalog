  - The Viceroy of a remote 18th-century Peruvian town has purchased a magnificent golden coach from LOC. The Viceroy hints
    of his intention to give the coach to his mistress, the ORG, but has decided to pay for it with public funds, since he
    plans to use it to overawe the populace and flatter the local nobility, who enthusiastically look forward to taking turns
    parading in it. By coincidence, the coach arrives on the same ship that carries an Italian commedia GPE troupe composed
    of men, women and children who perform as singers, actors, acrobats and comics. The troupe is led by PERSON, who also
    portrays the stock character of Pantalone on stage, and features PERSON, who plays the stock role of GPE. Once members
    of the troupe refurbish the town's dilapidated theater, their performances meet with success only after local hero, PERSON,
    a toreador, becomes smitten with ORG and starts leading the applause. Similarly, after a command performance at the Viceroy's
    palace, the gentry withhold their favor until the GPE signals his approval and asks to meet the women of the company.
    He, too, is taken with PERSON, who is the only person who makes him feel comfortable and light-hearted. He gives her a
    splendid necklace, which enrages her jealous suitor, GPE, who has been accompanying the troupe on their travels. Felipe
    attacks ORG and causes a riotous backstage brawl, after which he runs off to join the army. The GPE has become infatuated
    with ORG and announces that he has decided to pay for the coach with his own money, in order to give it to her as a love
