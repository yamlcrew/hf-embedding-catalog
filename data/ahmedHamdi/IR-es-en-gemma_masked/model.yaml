    asks PERSON about the rich man she had been seeing, she explains that he was a married politician. He died and left her
    some money, but his wife and relatives took her to court and won. PERSON begins to date PERSON, a good-natured, unsophisticated
    fisherman with his own boat. Almost immediately, PERSON despises PERSON''s friend, PERSON, a bitter, dissatisfied film
    projectionist. PERSON''s politician lover had made her feel more confident in herself; in stark contrast, PERSON has a
    low opinion of women and makes no attempt to hide it. His wife is a vaudeville performer who is frequently away on tour.
    Despite PERSON''s opinion of PERSON, he senses a kindred and restless spirit between the two of them. PERSON is oblivious
