  sentences:
  - In GPE in 1980, PERSON, a young, apolitical man, is accused of carrying out a terrorist attack. Afrikaner police officer
    PERSON is in charge of locating the perpetrators of a recent bomb attack against the Secunda ORG synthetic fuel refinery,
    which is the largest coal liquefaction plant in the world. PERSON is unwillingly swept into PERSON's investigation due
    to his inability to provide a satisfactory explanation for his whereabouts at the time of the bombing (he was actually
    having an affair with a woman not his wife). PERSON, his wife, Precious, and his family are tortured by PERSON and his
    subordinates. Desperate, PERSON says that he is willing to confess to a crime he did not commit to protect his family.
    Vos concludes that PERSON is innocent, and orders his release. Fuelled by the anger at the injustices he and his family
    suffered, PERSON joins GPE we GPE, the military wing of the ORG (ORG, GPE anti-apartheid movement) and becomes exactly
    what PERSON had initially accused him of being. He attempts to execute a plan to attack PERSON, the oil refinery he used
    to work for, by first bombing its adjacent water supply facilities, and 15 minutes later triggering the main explosion
    within the refinery itself. This would allow the refinery's workforce to flee between the two explosions, and not be harmed.
    Also, the damage of the first bomb would reduce the possibility of successfully extinguishing the fire caused by the second,
    main explosion. PERSON succeeds in the first part, but the second bomb is discovered by Vos and deactivated. PERSON is
    arrested and sentenced to 24 years in prison, after his wife goes to PERSON and tells him where PERSON is, because she
    fell for a simple trick in which Vos left photographs of PERSON talking to a female member of the ORG. Due to her unjustified
    jealousy, she sells him out. He is released early due to the abolition of apartheid. Precious, who has remarried, is waiting
    for him and apologizes, and PERSON forgives her and says he is sorry as well. Some time later, he sees PERSON sitting
    out near a small body of water. He creeps over and sees that it is indeed PERSON, and though a part of him wants to break
    PERSON' neck, he decides that it is not worth it. He left Vos alone, and went on to remarry and take in over 80 orphaned
    children in GPE to provide a home for kids who lost their families during the anti-apartheid struggle.
  - Tessa is a mechanic, who has been left in the care of her evil stepmother, ORG, and stepsisters, ORG and ORG, following
