- source_sentence: A woman is tried and sentenced to death for murder. However, a member of the jury, Sir PERSON, begins his
    own investigation to try to prove her innocence.
  sentences:
  - PERSON (renamed PERSON in the English version) is a member of a touring acting troupe. When she is found one day with
    no memory next to the corpse of a colleague, all circumstances point to the fact that she committed the crime. At the
    murder trial, theater producer, writer and actor Sir PERSON is the only juror who has doubts about her guilt to the end.
    However, he bowed to pressure from the rest of the jury and finally voted guilty. Driven by his bad conscience, Sir PERSON
    sets out on his own to find the real culprit. He also feels complicit in her conviction, as it turns out he has known
    PERSON, who once applied to be an actress at his theater - but he turned her down. With two assistants, an acting couple
    from PERSON's troupe, he investigates and comes across PERSON, an actor and acrobat with transvestite tendencies who was
    engaged to PERSON. PERSON must not know his dark secret that he is an escaped convict (PERSON is mixed-race in the original)
    who must expect to be caught again at any time. When the common colleague wanted to tell her, PERSON killed her. Since
    Sir PERSON has no idea of this motive, but assumes that he is the perpetrator despite the lack of evidence, he wants to
    corner PERSON. He lets him audition for a supposed new play. The text to be presented has clear references to the PERSON
    case. Fane panics and leaves Sir PERSON's office. At a circus performance, which Sir PERSON visits to question PERSON
    again, the latter commits suicide while performing a trapeze stunt. He leaves a written confession. PERSON is thus free.
    She is picked up from prison by Sir PERSON in a car. (The original ends with PERSON and Sir PERSON performing together
    at his theatre.)
  - Former cellist PERSON and her husband PERSON, an accomplished scientist and professor, live a quiet life at their lakeside
    home in GPE. Their relationship is strained, particularly after PERSON's daughter, PERSON, leaves for college. PERSON
    notices their new neighbors, PERSON and PERSON, have a volatile relationship and, after PERSON is unseen for several days,
