- source_sentence: 'A group of Italian comedians arrives in GPE. The city''s leader, the viceroy, has purchased a fabulous
    golden carriage from LOC. During the first theatrical performance, ORG meets the bullfighter, who falls in love with her.
    That same night, her troupe is invited to perform at the viceroy''s residence. When he sees the performance, he falls
    in love with ORG and offers her his golden carriage. In the end, ORG must choose between the love of three men: the viceroy,
    the bullfighter, and an army officer.'
  sentences:
  - ' PERSON moves into the northern English country estate of her Great Aunt Charlotte. The bored, friendless girl tries
