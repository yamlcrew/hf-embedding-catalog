    The schooling works, and PERSON returns to Min with good manners, an education, and the news that she is now engaged to
    a very wealthy man named PERSON. She wants Min to attend the wedding. Min is thrilled, until she finds out that PERSON
    has returned. Seeing how happy PERSON is to be getting married (and the wedding will be taking place in a few days), Min
    deliberately argues with PERSON and says terrible things she does not mean for PERSON to immediately leave. She is mad
    at herself for hurting PERSON, but is relieved that she is gone by the time PERSON arrives. Min stalls PERSON, hoping
    the wedding will take place and the couple can leave for their honeymoon before PERSON can interfere. PERSON arrives as
    the ceremony takes place. She confronts Min in an upstairs room in her inn. She has discovered her daughter's identity,
    and that of her very wealthy new husband. She taunts Min with the information and pledges to torment PERSON and her new
    husband until they give her money and take her into their new home. Min thinks about the wedding and PERSON's happiness,
    and tries to prevent PERSON from leaving. When PERSON attacks Min with a hot curling iron and attempts to leave, Min takes
    a hidden gun and shoots her dead. Min drops the gun and flees the room. PERSON, knowing what was going on, tries to help
    Min by pleading with her to drive down to GPE on his boat. Once Min and PERSON leave the inn for the boat, an eavesdropping
    sailor enters PERSON's room and discovers PERSON's corpse. Just as Min and PERSON are about to board PERSON's boat, however,
    Min sees PERSON and PERSON about to board a boat to their honeymoon, and is drawn silently to the happy couple. She wants
    to see PERSON one last time. Min watches, but decides not to let PERSON know she is there, and stays hidden in the crowd.
    Two police officers quietly confront Min about the shooting at the GPE. Min does not say much. She takes one final look
    at a smiling PERSON as she leaves with her husband. Min turns back and smiles as she quietly walks away with the officers.
    She is sad that it may be the last time she ever sees PERSON, but at the same time, she is happy that PERSON managed to
    escape a dead-end life by the docks. PERSON watches helplessly.
  - 'PERSON (PERSON), a wealthy but bored businessman and candymaker, issues the code word PERSON to his fellow automobile
    enthusiasts, who gather in a garage in GPE to embark on a coast-to-coast race with no catalytic converter and no 55-mile-per-hour
    speed limit in the shortest amount of time. There is only one rule: There are no rules. Their longtime nemesis, ORG (PERSON),
    who has been trying for years to arrest PERSON and his group, has flown in specially to attempt to shut down the race.
    He is unsuccessful, and the race begins early the next morning in spite of his momentary interference. Most of the film
    is devoted to the adventures of the various driving teams and GPE''s ineffectual attempts to apprehend them. A number
    of running gags ensue – the ORG that will not start (and never even makes it off the starting line); the silent (and somewhat-psychotic)
    motorcyclist PERSON''s (PERSON) numerous mishaps; Italian race driver PERSON (PERSON) frequent detours to seduce beautiful
    women – as well as some stunts and driving sequences, including the first moving car into moving tractor-trailer stunt
    later to become a trademark of PERSON, the typical sequence of workers carrying a large glass window only to have it shattered
    by a speeding vehicle, and a race in the GPE at the same location where Greased Lightning would defeat the Scorpions''
    Mercury in GPE. The race ends at the Queen Mary in GPE, GPE where the finishers celebrate their arrival and the defeated
    Roscoe sulks off to one side – until a fleet of police cars and tow trucks, summoned by GPE, arrive to impound the ORG
    vehicles. Roscoe had contrived a plan to see to it that all of them were guaranteed to be illegally parked once the post-race
    party in the parking lot ran past 11 p.m. PERSON congratulates Roscoe on his final victory (final because Roscoe, who
    has been after Bannon and PERSON since they were in high school, has reached mandatory retirement age). Contemplating
    how they will all return home without cars, he again utters the word ORG to the assembled group to indicate a race back
    to GPE. Lapchik, the last contestant to finish the race, roars through the parking lot with a stuck throttle and is launched
    out into the water.'
- source_sentence: PERSON (PERSON) is a woman who returns to the safety of her hometown, a small coastal fishing village in
