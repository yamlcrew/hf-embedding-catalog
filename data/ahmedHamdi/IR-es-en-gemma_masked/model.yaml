    and wild red hair. Tib and PERSON, PERSON''s cats, lead PERSON to some mysterious glowing flowers. The gardener identifies
    the flowers as fly-by-night; legend has it that witches covet the flower for its magical power. The next day, PERSON disappears.
    Tib leads PERSON to a broomstick but she accidentally bursts a fly-by-night bulb on it. The bulb releases magical power,
    making the broomstick come to life and enabling PERSON to ride it like a witch. ORG whisks PERSON away to a complex of
    buildings in the clouds, known as ORG for witches. Head mistress PERSON Mumblechook assumes PERSON is a new pupil with
    PERSON as her familiar, and takes her on a tour of the college. She introduces PERSON to Doctor PERSON, the college''s
    renowned chemistry teacher. PERSON finds herself able to perform advanced spells such as invisibility. Madam and Doctor
    PERSON become convinced that PERSON is a prodigy because of her performance as well as her red hair, which is a distinguishing
    feature among the best witches. PERSON admits that her magical ability comes from fly-by-night, and that Tib belongs to
    PERSON. PERSON''s attitude changes then but she lets PERSON return home once PERSON turns over PERSON''s address. That
    night, PERSON sends a message to PERSON, informing that she''s kidnapped PERSON, and demands that PERSON bring the fly-by-night
    bulbs to her. She and PERSON quickly fly back to Endor with the bulbs, but PERSON and Doctor PERSON imprison her in their
    transformation lab. PERSON finds PERSON locked in with her, and discovers that Doctor PERSON has been experimenting on
    animals, including PERSON, transforming them into fantastic creatures. From the spell book she took from PERSON''s office,
    PERSON uses a spell to undo the transformations and unlock the lab. They try to escape on ORG, but PERSON is recaptured.
    ORG takes PERSON to an isolated cottage on a tiny island that seems to be alive. Inside the cottage, PERSON finds notes
    on spells and a mirror that Great-Aunt Charlotte uses to contact her. Through visions, GPE reveals that the cottage was
    her old home, and she used to be a red-haired pupil who excelled at Endor. One day GPE found fly-by-night on the campus,
    leading PERSON and Doctor PERSON to obsessively pursue a project to use the flower to transform all humans into witches.
    When their experiments failed, GPE escaped Endor, taking the flower with her. GPE begs PERSON to use her last bulbs to
    return home, but PERSON vows to rescue PERSON. PERSON returns to Endor and finds PERSON and Doctor PERSON trying to transform
    PERSON into a warlock. The experiment fails again, leaving PERSON trapped within a gelatinous monster. PERSON gets the
    spell book to PERSON, and he uses it to undo the failed experiment and all of PERSON and Doctor PERSON''s research. PERSON
