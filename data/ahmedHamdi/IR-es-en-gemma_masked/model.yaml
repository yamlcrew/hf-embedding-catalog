- source_sentence: Self-esteem and insecurity are at the heart of this comedy about the relationship between a mother and
    her three daughters.
  sentences:
  - ' The story focuses on PERSON, her adult daughters PERSON and PERSON, and her pre-teen adopted African American daughter
    PERSON, each of whom allows her personal insecurities to affect her life.  PERSON, longing to look younger and thinner,
    opts for liposuction, with near tragic results. When PERSON''s artistic talents fail to produce any income for her family,
    much to her husband PERSON''s dismay, she takes a job as a one-hour photo developer. There she finds herself falling for
    the attention of her teenaged co-worker GPE. Aspiring actress PERSON, who bestows upon stray dogs the affection she finds
    difficult to offer her boyfriend PERSON, questions her appeal when she''s rejected for a role based on her looks. She
    seeks reassurance from film heartthrob PERSON.  PERSON tries to fit in better with her white adopted family by having
    her hair straightened by black Big Sister volunteer PERSON, who PERSON hopes will put the young girl in touch with her
    heritage.'
  - Min PERSON (PERSON) runs a dockside inn. She has been raising PERSON (PERSON) as her own since her prostitute mother,
    PERSON (PERSON), left her at the inn as an infant. Min frequently argues with fisherman PERSON (PERSON). Despite PERSON's
