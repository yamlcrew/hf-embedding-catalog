    a vent. She finds her bathtub mysteriously filled, and sees another woman's reflection in the water. Confiding in a psychiatrist,
    PERSON and her mystic friend, PERSON, hold a failed séance. She finds the bathtub filled again with the message You know
    written on the steamy mirror, while her computer inexplicably types the initials ORG. Convinced she is haunted by PERSON's
    ghost, PERSON confronts PERSON, but PERSON is alive and well, explaining that she went to stay with her mother in GPE
    after a fight with PERSON. On the back of PERSON's article, PERSON finds a story about a missing woman named PERSON —
    ORG. She tracks down PERSON's mother and visits her daughter’s bedroom, where she steals a lock of PERSON's hair and notices
    a photo of her wearing an unusual necklace. Performing a ritual from a book, PERSON attempts to conjure PERSON. Seemingly
    possessed by her spirit, she aggressively seduces PERSON, shocking him by speaking as PERSON until she drops the lock
    of hair. Becoming herself again, PERSON recalls a repressed memory about PERSON's affair with a student, PERSON, which
    he admits happened during a rough patch in their marriage. PERSON leaves to spend the night with PERSON, who reveals that
    a year earlier, she saw PERSON arguing with a woman at a café in GPE, a nearby town. Returning home, PERSON finds PERSON
    unconscious in the tub, which he assures her was an accident and not a suicide attempt. He tells her that an unstable
    PERSON confronted him at home when he ended their affair, but denies killing her. Standing on the dock with PERSON's hair,
