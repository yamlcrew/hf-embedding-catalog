widgetData:
- source_sentence: 'Represent the plot: When twin sisters go to live with their uncle in a village, they see strange female
    specters at night. Their uncle forbids them from visiting Count Karnstein''s castle, who, according to the villagers,
    is responsible for the specters. But they disobey their uncle.'
  sentences:
  - 'Represent the plot: Set during the 17th century in Styria, identical twin sisters Maria and Frieda Gelhorn move from
    Venice to Karnstein in Central Europe to live with their uncle Gustav Weil after becoming recently orphaned. Weil is a
    stern Puritan and leader of the fanatical witch-hunting ''Brotherhood''. Both twins resent their uncle''s sternness and
    one of them, Frieda, looks for a way to escape. Resenting her uncle, she becomes fascinated by the local Count Karnstein,
    who has the reputation of being a wicked man. Count Karnstein, who enjoys the Emperor''s favour and thus remains untouched
    by the Brotherhood, is indeed wicked and interested in Satanism and black magic. Trying to emulate his evil ancestors,
    he murders a girl as a human sacrifice, calling forth the vampiress Countess Mircalla Karnstein from her grave. Mircalla
    turns the Count into a vampire. Frieda, following an invitation from the Count, steals away to the castle at night, while
    Maria covers for her absence. In the castle, the Count transforms Frieda into a vampire, offering her a beautiful young
    chained victim. Returning home, Frieda threatens Maria to keep covering for her nightly excursions, but secretly fearing
    she might bite her sister. Meanwhile, Maria becomes interested in the handsome young teacher, Anton, who is initially
    infatuated with the more mysterious Frieda. Anton has studied what he calls superstition, but becomes convinced of the
    existence of vampires when his sister falls victim to one. One night, when Frieda attacks a member of the Brotherhood,
    she is captured by her uncle and put in jail. While the Brotherhood debates the vampire woman''s fate, the Count and his
    servants kidnap Maria and exchange her for Frieda in the jail cell. Anton goes to see Maria, not knowing that she is actually
    Frieda. She tries to seduce him, but he sees her lack of reflection in a mirror and repels her with a cross. Anton rushes
    to rescue Maria from a burning. Maria kisses a cross, revealing her innocence. Weil now listens to Anton''s advice on
    hunting vampires, and the two men lead the Brotherhood and the villagers to Castle Karnstein to destroy the Count. The
    Count and Frieda attempt to flee, but they are surprised by Weil who captures Frieda and decapitates her. The Count captures
    Maria, but Weil appears with an axe. Weil challenges the Count and is killed. Anton seizes his chance and pierces the
    Count''s heart with a spear. Maria and Anton reunite while Karnstein crumbles to corruption.'
  - 'Represent the plot:  Billy Bigelow, a rough-talking, macho, handsome carousel barker, and Julie Jordan, a young, innocent
    mill worker, live in the small town of Boothbay Harbor, Maine. They fall in love, but are fired from their jobs; Billy
    because he paid too much attention to Julie and incurred the wrath of the jealous carousel owner Mrs. Mullin, and Julie
    because she had violated the curfew imposed by wealthy mill owner Mr. Bascombe. Billy and Julie marry and live at the
    seaside spa and restaurant of her cousin Nettie Jordan. Julie admits that Billy, frustrated and bitter because he cannot
    find work, has started hitting her. Mrs. Mullin hears of this and wishes to rehire Billy, but only if he leaves his wife.
    However, Julie informs him that she is pregnant.  Billy is overjoyed and declines Mrs. Mullin''s offer. However, worried
    about finances and lacking work experience, Billy secretly agrees to join his pal Jigger Craigin in robbing Bascombe.
    During a clambake on a nearby island, Billy and Jigger sneak onto the mainland to commit the robbery, but Bascombe, who
    is usually unarmed, carries a gun and the robbery is foiled. While Bascombe is momentarily distracted, Jigger flees and
    leaves Billy at the mercy of the police. Cornered, Billy climbs atop a pile of crates, but they collapse and Billy falls
    on his own knife. The others return from the clambake, and Julie sees the mortally wounded Billy. She rushes to him and
    he dies after saying his last words to her. Julie is devastated because she truly loved him, even though she never had
    the courage to say so out loud. Fifteen years later in another world (apparently Purgatory, or the back door of Heaven),
    Billy is told that he can return to Earth for one day to make amends. Billy returns to find his daughter Louise emotionally
    scarred by constant taunting because her father tried to commit a robbery. Without disclosing his identity to Louise,
    Billy makes himself visible, tries to raise her spirits, and gives her a star that he stole from Heaven. Louise is frightened
    and refuses the star, but Billy, in desperation, slaps her hand. She rushes inside the house and informs Julie of what
    happened, saying that she did not feel a slap, but a kiss. Billy tries to become invisible before Julie can see him, but
    she glimpses him for a brief moment and senses that he has returned for a reason. Billy asks his heavenly guide for permission
    to attend Louise''s high school graduation, and there he silently gives Louise and Julie the confidence that they need
    and the knowledge that, in spite of everything, he did love Julie.'
  - 'Represent the plot: Rancher Cole Hillman seeks the help of college president Elgin Clark to combat thousands of rabbits
    that have invaded the area after their natural predators, coyotes, were killed off. Elgin asks for the assistance of researchers
    Roy and Gerry Bennett because they respect Cole''s wish to avoid using cyanide to poison the rabbits. Roy proposes using
    hormones to disrupt the rabbits'' breeding cycle and takes some rabbits for experimentation. One is injected with a new
    serum believed to cause birth defects. However, the Bennetts'' daughter Amanda loves the injected rabbit, so she switches
    it with one from the control group. Amanda is then given the injected rabbit as a pet, but it soon escapes. While inspecting
    the rabbits'' old burrowing areas, Cole and the Bennetts find a large, unusual animal track. Meanwhile, Cole''s son Jackie  and
    Amanda go to a gold mine to visit Jackie''s friend Billy, but find him missing. Jackie finds more of the animal tracks
    in Billy''s shed, while Amanda goes into the mine and runs into an enormous rabbit with blood on its face. Screaming in
    terror, she runs from the mine. Mutilated bodies begin to crop up around town, including those of Billy, a truck driver,
    and a family of four. Elgin, the Bennetts, Cole, and Cole''s two ranch hands Frank and Jud go to the mine to try to kill
    the rabbits with explosives. As Elgin and Frank set charges on top of the mine, Roy and Cole enter the shaft to get pictorial
    evidence. Outside, a rabbit surfaces and attacks Jud before Gerry can shoot it. Roy and Cole escape the rabbits in the
    mine and run outside as the explosives are detonated. The explosives fail to kill the rabbits, and that night they attack
    Cole''s ranch, killing Jud while Cole, Frank, Jackie, and Cole''s housekeeper Dorothy escape into the storm shelter. The
    rabbits make their way to the general store, killing shopkeeper Mildred and eating and killing everyone else they find
    in the small town of Galanos before taking refuge in the buildings for the day. In the morning, Gerry and Amanda leave
    to avoid the coming press, but get stuck along a sandy stretch of road. Roy and Elgin update Sheriff Cody on the situation
    and, after realizing the rabbits have escaped the mine, call in the National Guard. As night falls, the rabbits leave
    Galanos to continue their rampage, making their way to the main town of Ajo and eating and killing everyone in their path.
    Cole proposes using a half-mile wide stretch of electrified railroad track as a fence to contain and kill the rabbits.
    They recruit a large group of people at a drive-in theater to help herd the rabbits with their car lights, with assistance
    from the machine gun fire of the National Guard. Thousands of rabbits make their way into the trap, where they are shot
    and electrocuted. At the film''s ending, Cole tells Roy that normal rabbits, as well as coyotes, have returned to the
    ranch.'
- source_sentence: 'Represent the plot: Three convicts serving time in a prison near the US-Canada border manage to escape
    when one of them, a psychopathic killer about to be executed, shoots and kills two guards and wounds others. The other
    two (Ned and Jimmy), who were forced to watch the execution, lose track of the killer during the escape and end up in
    a nearby town, where they are mistaken for two priests. They hide in the church and try in every way to cross the bridge
    to reach Canada. But every time they are about to succeed, something happens to stop them. It seems that only a miracle
    can help them.'
  sentences:
  - 'Represent the plot: A couple of 1930s Great Depression-era convicts, Ned and Jim, jailed on never-specified charges and
    abused by a ruthless warden, are dragged along when a vicious killer named Bobby escapes the electric chair. The two end
    up in a small upstate New York town near the Canada–US border, where they are mistaken for a pair of priests expected
    at the local monastery. They want to flee but cannot, since misunderstandings and the warden''s search party looking for
    Bobby make a trip across the bridge to Canada almost impossible. Ned and Jim continue to masquerade as priests, trusted
    and welcomed by Father Levesque. An opportunity presents itself in the form of a procession to the church''s sister church
    across the border. Each priest participating has to bring along someone who needs help, so they decide on the deaf-mute
    daughter of Molly, a local laundress and prostitute. Bobby is killed by police during the procession. Ned saves Molly''s
    daughter from drowning, after this event she is able to speak. Jim is befriended by a young monk and decides to stay in
    the monastery to actually become a priest. Ned takes Molly and her daughter to Canada.'
  - 'Represent the plot: An opening flashback scene shows Rita Delaney taking her infant granddaughter Charlotte (“Char”)
    into the woods, while the baby’s mother Angela protests. In the wood, Rita sits the baby on the ground and lights a ring
    of fire around her. She watches as the baby screams. In the present day, the teenage Char lives with her mother and grandmother;
    her uncle Aaron lives nearby and visits occasionally. The household is somewhat dysfunctional; Rita is in poor health,
    Angela is depressed and spends much of her time in bed, and there is no food in the house. Char attends a girls’ Catholic
    high school. Although academically gifted, she does not fit in with the other students, who consider her their social
    inferior, and she is subjected to bullying. One morning, driving Char to school, Angela tells her daughter that she can''t
    do this anymore. Her car is later found abandoned, with no sign of Angela. The family report the disappearance to the
    police, but they are not able to offer much help. However Angela returns within a few days, strangely altered. Her depression
    is gone, and she is cheerful, dressing up and cooking dinner for the family. Rita seems suspicious of these changes in
    Angela and deliberately upsets the pan of soup that Angela had prepared, so the family are obliged to eat the chips that
    Aaron has brought over instead.  But Angela appears to have little appetite and sits staring sullenly at her mother. Char
    witnesses several instances of increasingly bizarre behaviour in the new Angela and becomes frightened. Her uncle Aaron
    is poisoned by Angela, which leads to him being hospitalised. In the meantime Char is forging a friendship with one of
    her former bullies, Suzanne. Char confides in Suzanne about the changes in Angela; Suzanne in turn tells Char how her
    own mother died when she was very young. One evening Rita tells Char the story of her past; when Char was a baby, Rita
    realised she had been swapped with a “changeling”. The only way to get the real Char back was to place her near fire,
    hence the fiery ring ritual in the woods.  This worked, but Char sustained a small burn to her cheek. Her family told
    her the resultant scar was a birthmark. Rita tells Char that the new Angela is also a changeling, and thus the fire ritual
    must be repeated to get the real Angela back. Although Char appears to agree, when she sees Angela bound and gagged and
    tied to a bed she is appalled. Despite her grandmother’s protests, Char frees Angela, only to realise too late that Rita
    spoke the truth, and that this is not the real Angela. The changeling kills Rita. Char runs out of the house, but is waylaid
    by the school bullies, who force her inside an unlit Halloween bonfire. However the bullies are scared off by the approach
    of the changeling Angela. Angela pushes her way into the bonfire to get to Char, but Char sets the structure alight. Angela
    burns while Char is rescued from the flames by Suzanne. In the final scene, Angela is restored to her true self, and Char
    makes her a lucky token from twigs to keep her safe, as her grandmother had once made for her. Mother and daughter are
    happy to be together again, ready to move forward with their lives.'
  - 'Represent the plot: King George III''s bout of madness in 1788 touched off the Regency Crisis of 1788 and triggered a
    power struggle between factions of Parliament under the Tory Prime Minister William Pitt the Younger and the reform-minded
    Leader of the Opposition Charles James Fox. At first, the King''s behaviour appears mildly eccentric. He is deeply concerned
    with the wellbeing and productivity of Great Britain and exhibits an encyclopedic knowledge of the families of even the
    most obscure royal appointments. He is devoted to his loving wife, Queen Charlotte, and their large brood of 15 children.
    However, he is growing more unsettled, partly over the loss of America. His memory fails, his behavior becomes erratic
    and hypersexual, he talks and talks, and his urine turns blue. George, Prince of Wales, aggravates the situation, knowing
    that he will be named regent if the King becomes incapacitated.  George chafes under his father''s relentless criticism,
    and yearns for greater freedom, particularly when it comes to choosing a wife. He married the woman everyone believes
    to be his mistress, Mrs. Fitzherbert, in a secret ceremony in 1785. Without his father''s consent, the marriage is illegal.
    Even with consent, it would remove him from the succession, because Fitzherbert is a Catholic. He knows that he has the
    moral support of Fox, whose agenda includes abolition of the slave trade and friendlier relations with America. Knowing
    how to exacerbate the King''s behaviour, the Prince arranges a concert of music by Handel. The King reacts as expected,
    interrupting the musicians, speaking lasciviously to Lady Pembroke, and finally assaulting his son. In a private moment,
    the King tells Charlotte that he knows something is wrong. They are brutally interrupted when the Prince has them separated,
    supposedly on the advice of physicians. Led by the Prince of Wales'' personal physician, Dr. Warren, the King is treated
    using the medical practices of the time, which focus on the state of his urine and bowel movements and include painful
    cupping and purgatives. Lady Pembroke recommends Dr. Francis Willis, who cured her mother-in-law. Willis uses novel procedures.
    At his farm in Lincolnshire, patients work to gain “a better opinion of themselves.” He observes to an equerry “To be
    curbed, thwarted, stood up to, exercises the character.”  When the King insults him, foully, he is strapped into a chair
    and gagged. He will be restrained whenever he “swears and indulges in meaningless discourse” and “does not strive every
    day and always towards his own recovery”. When the Prince has the King transferred to Kew, Charlotte watches as her beloved,
    bearded and wearing a soiled diaper and a straitjacket, struggles against being put in the coach. “Until you can govern
    yourself, you''re not fit to govern others. And until you do so, I shall govern you,” Willis says. At Kew, the King spits
    soup at Willis, but gains control under the physician''s intractable gaze. Later, the King, properly dressed, feeds himself
    to a round of applause from staff—but the delusions persist. The Whig opposition confronts Pitt''s increasingly unpopular
    Tory government with a proposal that would give the Prince powers of regency. Baron Thurlow, the Lord Chancellor, obtains
    and suppresses proof of the marriage. Fox wins, and the Regency Bill is printed. Thurlow comes to see the King and joins
    in a moving reading of King Lear. “I have remembered how to seem...” the King muses. “What, what!” an expression he has
    not used in 6 months. His urine is yellow. Thurlow and the King arrive at Parliament in time to thwart the bill. The King
    forces the Prince to admit his marriage and to put away Fitzherbert. With the crisis averted, all those who have witnessed
    his suffering are summarily dismissed, including Greville. Fitzroy observes: “To be kind does not commend you to kings.”
    Cheering crowds welcome the royal family to St. Paul''s Cathedral. Willis stands by, but the King dismisses him. “We must
    be a model family,” he declares; George wants “something to do.” “Smile at the people, wave at them. Let them see that
    we''re happy. That''s why we''re here.” Saluting, Willis disappears into the crowd, where Mrs. Fitzherbert also smiles,
    wistfully.'
- source_sentence: 'Represent the plot: A beautiful trapeze artist named Cleopatra, despite her relationship with Hercules,
    the strongman of the circus, seduces and marries a dwarf named Hans, heir to a huge fortune. At the wedding reception,
    the other strange figures of the circus decide to accept her into the family, singing: ''We accept you, one of us!'',
    meaning that she now belongs to the group. Cleopatra, drunk, shows her disgust and throws them out of the ceremony. Hans
    realizes his mistake when she and Hercules kiss in front of him.'
  sentences:
  - 'Represent the plot: A beautiful and conniving trapeze artist named Cleopatra seduces a carnival sideshow dwarf named
    Hans after learning of his large inheritance. This much to the chagrin of Frieda, his fiancée, also a dwarf. Cleopatra
    also conspires with circus strongman Hercules to kill Hans so she will inherit his wealth. Meanwhile, other romances flourish
    among the sideshow performers: the Bearded Lady, who is in love with the Human Skeleton, gives birth to their daughter.
    The news is spread among the friends by the Stork Woman. Additionally, Violet, a conjoined twin whose sister Daisy is
    married to Roscoe, the stuttering circus clown, becomes engaged to the circus''s owner. Hans, enamored of Cleopatra, ultimately
    marries her. At their wedding, Cleopatra begins poisoning Hans''s wine but drunkenly kisses Hercules in front of Hans,
    revealing her affair. Oblivious, the other freaks announce that they accept Cleopatra in spite of her being a normal outsider;
    they hold an initiation ceremony in which they pass a loving cup around the table while chanting, We accept her, one of
    us. We accept her, one of us. Gooble-gobble, gooble-gobble. However, Cleopatra''s mean-spirited amusement at this ceremony
    soon turns into fear and anger after Hercules jokes that the rest of the entertainers plan to turn her into one of them.
    She mocks them, tosses the wine in their faces and drives them away before berating Hans and drunkenly parading him around
    on her shoulders like a child. The humiliated Hans realizes that he has been played for a fool and rejects Cleopatra''s
    attempts to apologize, but then he falls ill from the poison. While bedridden, Hans apologizes to Cleopatra and also takes
    the poisoned medicine that she is giving him, but he secretly plots with the other entertainers to strike back at Cleopatra
    and Hercules. In the film''s climax, Hans confronts Cleopatra with three of the entertainers as backup thugs. However,
    Hans''s circus wagon is overturned in a storm, giving Cleopatra the chance to escape into the forest, closely pursued
    by them. At the same time Hercules goes to kill seal-trainer Venus for knowing about the plot. Venus''s boyfriend, Phroso
    the clown, attempts to stop Hercules but is nearly killed before the rest of them intervene and injure Hercules, saving
    Phroso. They all pursue an injured Hercules. The freaks then capture Cleopatra and sometime later, she is shown to be
    a grotesque, squawking human duck on display for carnival patrons; her tongue has been removed, one eye has been gouged
    out, the flesh of her hands has been melted and deformed to look like duck feet, her legs have been cut off, and what
    is left of her torso has been permanently tarred and feathered. In the original version of the film, it is revealed that
    after the freaks caught Hercules, they made him into a castrato singer. While some versions end on Cleopatra as the human
    duck, another ending shows Hans, now living in a mansion from his inheritance and still humiliated, visited by Phroso,
    Venus and Frieda. Frieda tells Hans she knows he just wanted to demand the bottle of poison from Cleopatra, not to mutilate
    her, and not to blame himself for what happened; and that she still loves him. The two then share a heartwarming hug.'
  - 'Represent the plot:  The film centers on Hannah (Juno Temple), a shy songwriter, who discovers that her friend, respected
    record producer Theo Ross (Simon Pegg), has lapsed on his medication for schizophrenia. Hannah rallies a group of friends
    to help commit Theo to a psychiatric hospital, chasing him as he outruns his colorful delusions through the glamour and
    grit of Los Angeles.'
  - 'Represent the plot: Ellen Gulden has a high-pressure job writing for New York magazine. Ellen is visiting her family
    home for her father George''s surprise birthday party. It becomes obvious that she deeply admires George, a once-celebrated
    novelist and literature professor at Princeton University, but Ellen has barely restrained disdain for her mother Kate
    and the domestic life she lives. Ellen has always viewed her as a ditzy Stepford Wife.  When it is discovered that Kate
    has cancer, George pressures Ellen to come home and take care of her mother. Ellen is taken aback by this request, knowing
    it could jeopardize her career and love interest. However, she eventually agrees, caving in to her father''s appeals and
    inducements. As Ellen helps her mother with domestic chores while her father goes about his usual business without helping
    much, Ellen begins to reassess her views of her parents. She realizes she always brushed her mother aside and idealized
    her father, despite his self-centered focus on his career and, she discovers, a longtime habit of having flings with his
    female students. Ellen attempts to find a place for herself in her parents'' life while struggling to continue writing
    on a freelance basis and maintain her relationship with her boyfriend in New York. Over time, Ellen grows closer to her
    mother and learns more about her parents'' marriage—including realizing that Kate has known about George''s affairs all
    along. Ellen also learns that her father''s philandering days have become lonely nights of drinking at a local bar to
    numb the pain of never again achieving success with, nor even being able to complete, further novels. George admits to
    Ellen that the reason he loved Kate was that she was full of light shining through everything, and he could not bear the
    thought of her light slipping away. As her mother is dying, Ellen tells her she loves her, and Kate says she knew it and
    always had. After Kate''s death, the autopsy reveals that Kate actually died of a morphine overdose. A District Attorney
    questions Ellen about her mother''s death. Scenes from this interview are interspersed throughout the movie and point
    to Ellen being suspected of having assisted her mother''s suicide. In the closing scene, by Kate''s grave, Ellen has returned
    from a new job she found in New York with the Village Voice. She is planting daffodils when she sees her father approaching.
    It is their first encounter since the funeral. George tells Ellen she was very brave to do what she did, and she looks
    puzzled until she realizes George thinks she had given her mother the fatal overdose. Ellen replies that she had thought
    the accomplice was the father. They both realize Kate must have killed herself. George speaks to Ellen of how much he
    loved Kate, considering her his muse, his one true thing. Ellen is explaining to her father how to plant the daffodil
    bulbs and he is helping, foreshadowing, it seems, their reconciliation based on mutual long overdue appreciation of Kate.'
- source_sentence: 'Represent the plot: Doris (Lulu Wilson) is a lonely and unpopular little girl at school. Her mother (Elizabeth
    Reaser) is an expert at scamming clients by pretending to communicate with spirits. But when she decides to use a Ouija
    board to communicate with her deceased father, she ends up releasing a series of spirits that take over her body and threaten
    everyone around her.'
  sentences:
  - 'Represent the plot: In the near future, a high-tech, highly realistic adult amusement park called Delos features three
    themed worlds: Western World (the American Old West), Medieval World (medieval Europe) and Roman World (the ancient Roman
    city of Pompeii). The resort''s three worlds are populated with lifelike androids that are practically indistinguishable
    from human beings, each programmed in character for their historical environment. For $1,000 per day, guests may indulge
    in any adventure with the android population of the park, including sexual encounters and a simulated fight to the death.
    Delos''s tagline in its advertising promises Boy, have we got a vacation for you! Peter Martin, a first-time Delos visitor
    and his friend John Blane, on a repeat visit, go to Westworld. One of the attractions is the Gunslinger, an android programmed
    to instigate gunfights. The firearms issued to the park guests have temperature sensors that prevent them from shooting
    anything with a high body temperature, such as humans, but allow them to kill the cold-blooded androids. The Gunslinger''s
    programming allows guests to draw their guns and kill it, with the android always returning the next day for another duel.
    The technicians running Delos notice problems beginning to spread like an infection among the androids: the androids in
    Roman World and Medieval World begin experiencing an increasing number of breakdowns and systemic failures, which are
    said to have spread to Westworld. When one of the supervising computer scientists scoffs at the analogy of an infectious
    disease, he is told by the chief supervisor, We aren''t dealing with ordinary machines here. These are highly complicated
    pieces of equipment, almost as complicated as living organisms. In some cases, they''ve been designed by other computers.
    We don''t know exactly how they work. After a night spent with two robotic ladies of the evening, John is accosted by
    the same gunslinger Peter killed in the saloon the previous day.  Peter bursts into the room and once again shoots the
    gunslinger dead. Peter is jailed awaiting trial, so John breaks him out and the two head out of town. The malfunctions
    become more serious when a robotic rattlesnake bites John in Westworld and against its program, a female android refuses
    a guest''s advances in Medieval World. The failures escalate until Medieval World''s Black Knight android kills a guest
    in a sword fight. The resort''s supervisors try to regain control by shutting down power to the park. The shutdown traps
    them in central control when the doors automatically lock, and they are unable to turn the power back on and escape. The
    androids in all three worlds run amok, operating on reserve power. Peter and John, recovering from a drunken bar-room
    brawl, wake up in Westworld''s brothel, unaware of the park''s breakdown. When the Gunslinger challenges the men to a
    showdown, John treats the confrontation as an amusement but the android shoots and kills him. Peter runs for his life
    and the android implacably follows. Peter flees to the other areas of the park but finds only dead guests, damaged androids
    and a panicked technician attempting to escape Delos, who is soon shot dead by the Gunslinger. Peter climbs down through
    a manhole in Roman World into the underground control complex and discovers that the resort''s computer technicians suffocated
    in the control room when the ventilation system shut down. The Gunslinger stalks him through the underground corridors,
    so he runs away until he enters an android-repair laboratory. When the Gunslinger enters the room, Peter pretends to be
    an android lying on a table for repairs before throwing acid into the Gunslinger''s face. Peter flees, returning to the
    surface inside the Medieval World castle. With its optical inputs damaged by the acid, the Gunslinger is unable to track
    Peter visually and tries instead to find him using its infrared scanners. Peter realizes this as he stands beneath the
    flaming torches of the Great Hall and discovers that they mask his presence from the android. He sets it on fire with
    one of the torches and leaves it to burn. Peter hears a call in the dungeon and finds a chained woman begging for help.
    He gives her water but this causes her to short-circuit and shutdown; Peter is shocked as he did not realize she was a
    robot. The burned shell of the Gunslinger attacks him once again on the dungeon steps before succumbing to its damage.
    The movie ends with Peter sitting on the dungeon steps in a state of near-exhaustion and shock, as the memory of Delos''
    marketing slogan resonates: Boy, have we got a vacation for you!'
  - 'Represent the plot: Steve Davitt is held in a medium security prison and is struggling with a choice between two options:
    serving his full sentence and returning legitimately to his wife and family, or escaping and ending up on the run. Having
    received what he considers to be an unjust recommendation from the Adult Authority Board, he decides to escape. However,
    he is surprised by a trustee-inmate whom he has befriended, and a fist-fight ensues. Davitt wins the fight, and heading
    for the barbed-wire fence starts to climb. He hesitates twice, and looking back to see his friend on the ground decides
    against escaping after all. The scene ends with him turning round and heading back to the prison.'
  - 'Represent the plot:  In 1967  Los Angeles, a young widow named Alice Zander works out of her suburban home as a spiritual
    medium, accompanied by her daughters, 15-year-old Paulina Lina and 9-year-old Doris. The family is reeling over the recent
    death of Roger, Alice''s husband and the kids'' father. Alice incorporates a Ouija board into her readings and unknowingly
    contacts a spirit named Marcus that begins to possess Doris. Alice receives notice that the bank intends to foreclose
    on their home. Doris contacts the board for help, believing she is communicating with her dead father. The spirit leads
    her to a secret compartment in the basement wall containing a pouch of cash. When she gives the money to her mother, the
    family has a Ouija session. When the board answers a question only Roger would know the answer to, a thrilled Alice begins
    believing that they are in contact with him. Soon, Doris becomes fully possessed by the spirit. Lina, disturbed by the
    changes in her sister, finds papers written by Doris in fluent Polish, a language she does not know, and brings them to
    Father Tom Hogan, her school principal. Troubled, Father Tom visits them for a Ouija session under the pretense of contacting
    his dead wife Gloria. He later explains to them that Doris did not contact Gloria. Instead, for every question he asked,
    she read his thoughts and repeated the answers he was thinking in his mind. The pages are entries written by a Polish
    immigrant named Marcus, who was taken captive during World War II by a sadistic doctor who conducted experiments on him
    and other captives in the house''s basement. These spirits have been watching the family since the day they moved in.
    Doris kills Lina''s new boyfriend Mikey when he comes to visit. Father Tom, Alice, and Lina burn the Ouija board; Father
    Tom finds the secret room where the experiments were conducted, and is possessed by the spirits, only to be killed later
    by Doris. Alice is captured, while Roger''s spirit carries an unconscious Lina to her bed. Recalling earlier when her
    doll''s mouth was stitched shut by her father''s spirit to shut out the voices for Doris, Lina realizes she must sew Doris''
    mouth shut to quiet the spirits'' voices. She sews Doris'' mouth shut but kills Doris in the process. Doris wakes up as
    a ghost and is happily reunited with her father. The spirits possess Lina and stab Alice. Alice tells Lina that it was
    not her fault before dying, leaving Lina devastated. Lina is committed in a mental hospital for the suspected murder of
    her mother and disappearance of her sister. Alone in her room, she creates a Ouija board on the floor with her blood and
    tries to summon Doris but summons an evil spirit in Doris’ form instead. In a post-credits scene, 47 years later in 2014,
    a now elderly and still institutionalized Lina receives a visit from someone claiming to be her niece.'
- source_sentence: 'Represent the plot: One year after the events of the previous film, Eggsy has officially joined Kingsman,
    taken the title of Galahad from his late mentor Harry Hart, and begun a relationship with Tilde, the Crown Princess of
    Sweden. On his way home, he is ambushed by Charlie Hesketh, a former Kingsman candidate rejected by the previous film
    who lost his arm and vocal cords (but was inadvertently saved by Eggsy). Eggsy escapes Charlie and his henchmen in a car
    chase through London, but Charlie''s severed cybernetic arm hacks into Kingsman''s servers via the computer in Eggsy''s
    car. With the information obtained, Poppy Adams, leader of the world''s largest drug cartel, the Golden Circle, launches
    missiles that destroy Kingsman headquarters and all facilities in Great Britain, killing all agents except Eggsy and Merlin.
    Eggsy and Merlin follow an emergency Doomsday protocol that leads them to Statesman, the American version of Kingsman,
    posing as a..." A distillery based in Kentucky. There, they discover that Harry survived Valentine''s shooting thanks
    to Statesman technology, but has amnesia. Statesman leader Champagne offers support to take down the Golden Circle. Statesman
    agent Tequila later develops a blue rash and shows signs of mania and is replaced by another agent, Whiskey, as Eggsy''s
    partner. Eggsy plants a tracking device on Charlie''s ex-girlfriend, Clara Von Gluckfberg, during a sexual encounter at
    the Glastonbury Festival, but when he tells Princess Tilde beforehand what he has to do, she ends their relationship.
    Later, Eggsy manages to cure Harry''s amnesia by threatening to shoot a Cairn Terrier puppy that resembles Harry''s deceased
    dog. Poppy broadcasts a message announcing that she has added an artificial virus to all her drugs, which causes users
    to develop symptoms like Tequila''s, before progressing to paralysis and finally death. She offers the antidote to the
    world if... The President of the United States ends up legalizing drugs and granting immunity to the cartel. The president
    negotiates publicly, but secretly decides to let all those affected die, as he is more than happy to get rid of all drug
    users and put Poppy out of business. Eggsy, Harry, and Whiskey accompany Clara to a Golden Circle facility in Italy. Eggsy
    manages to steal a sample of the antidote, but is broken by Whiskey during an attack by Golden Circle henchmen, leading
    Harry to suspect he was working for the enemy. Harry shoots Whiskey in the head, but Eggsy, believing Harry is delirious
    due to incomplete recovery, saves him with the same technology Statesman used to save Harry. A delirious Princess Tilde
    calls out to Eggsy, showing that she has the blue rash. Eggsy, Harry, and Merlin discover the location of Poppy''s hideout
    in Cambodia, Poppy Land, and fly there. As they approach Poppy''s hideout, Eggsy steps on a mine, But Merlin sacrifices
    himself to save him and Harry. Eggsy and Harry break into the hideout; Eggsy kills Charlie, while Harry destroys Poppy''s
    robotic dogs with the help of Elton John, who had been kidnapped by Poppy. They retrieve the laptop controlling the drones
    that are supposed to deliver the antidote worldwide and inject a concentrated dose of contaminated heroin into Poppy.
    Poppy gives them the laptop''s password for the antidote, but she overdoses and dies. Whiskey interrupts them before they
    can enter the password, revealing that he wants all drug users dead after his pregnant wife was killed in a robbery committed
    by two methamphetamine users. Eggsy and Harry fight and kill Whiskey, then activate the drones. In the aftermath, the
    president is deposed for wanting to let the victims die, and Statesman buys a distillery in Scotland to help rebuild Kingsman.
    Statesman''s tech support specialist, Ginger Ale, is appointed to the position previously held by Whiskey, Eggsy marries
    Princess Tilde, and Tequila joins the Kingsman, who acquire a new tailor shop in London.'
  sentences:
  - 'Represent the plot:  One year after defeating Richmond Valentine, Gary Eggsy Unwin has officially joined the Kingsman
    intelligence service, taking his late mentor Harry Hart''s title of Galahad, and began a relationship with Tilde, Crown
    Princess of Sweden. He is ambushed by Charlie Hesketh, a former Kingsman trainee who lost his arm and vocal cords during
    the Valentine incident, replacing them with cybernetics. Eggsy evades Charlie and his henchmen in a car chase across London,
    but Charlie''s severed cybernetic arm hacks into the Kingsman database through Eggsy''s car. Charlie passes the information
    to Poppy Adams – leader of the world''s largest drug cartel, the Golden Circle – who launches a volley of missiles that
    destroy the Kingsman headquarters and wipe out all its agents in Britain, aside from Eggsy and Merlin, Kingsman''s tech
    support. Kingsman''s emergency protocol leads Eggsy and Merlin to Statesman, an American private intelligence service
    posing as a Bourbon whiskey distillery in Kentucky, as well as Kingsman''s American counterpart. There, they discover
    that Harry survived his shooting thanks to Statesman nanotechnology, but is suffering from amnesia. They also learn about
    the Golden Circle from Statesman leader Champagne, and the two agencies agree to work together to bring the cartel down.
    Statesman agent Tequila later develops a blue rash and shows signs of mania, and is replaced by agent Whiskey as Eggsy''s
    partner. Eggsy plants a tracking device on Charlie''s ex-girlfriend Clara Von Gluckfberg during a sexual encounter at
    Glastonbury Festival, but his revelation of the mission to Tilde strains their relationship. Eggsy cures Harry''s amnesia
    by threatening to shoot a Cairn Terrier puppy that resembles Harry''s late dog, shortly before Poppy broadcasts a message
    to the world about a toxin she has secretly added to all her drugs, which causes users to develop symptoms like Tequila''s
    before paralysis and, ultimately, death. She offers the antidote if the President of the United States ends his country''s
    war on drugs and grants her cartel immunity from prosecution. The President decides to quarantine everyone affected, intending
    to let them all die to put Poppy out of business and rid the world of drug users, whom he sees as criminals. Eggsy, Harry,
    and Whiskey track Clara to the Golden Circle''s antidote factory in the mountains of Italy. Eggsy steals an antidote sample,
    which is broken by Whiskey during an ambush by the Golden Circle''s henchmen, leading Harry to suspect him of working
    against them. Harry shoots Whiskey in the head, but Eggsy, believing Harry to be delusional as a result of his recovery,
    saves him with nanotechnology as Charlie destroys the antidote factory, killing Clara for unwittingly betraying the Golden
    Circle. Tilde calls Eggsy in a manic state, revealing she has been affected by the blue rash after taking drugs due to
    her stress over Eggsy''s infidelity. Eggsy, Harry, and Merlin discover the location of Poppy''s hideout, Poppy Land, in
    Cambodia and fly there to steal the laptop which can deploy the drones carrying the antidote. Arriving at Poppy Land,
    Eggsy steps on a land mine, but Merlin switches places with Eggsy and sacrifices himself instead. Storming the lair, Eggsy
    kills Charlie while Harry destroys Poppy''s robotic attack dogs with the help of Elton John, who had been kidnapped by
    Poppy. They secure the laptop and inject Poppy with a concentrated dose of her own toxin-infused heroin. Poppy gives them
    the laptop password in a drugged state but dies from an overdose due to the heroin. Whiskey interrupts them before they
    can deploy the drones, revealing that he wants all drug users to die after his pregnant wife was killed in a robbery by
    meth addicts. Eggsy and Harry fight and kill Whiskey by pushing him headfirst into an industrial shredder, then deploy
    the drones to release the antidote, saving the affected victims throughout the world. The President is impeached for conspiring
    to commit genocide against drug victims, and Statesman purchases a distillery in Scotland to help rebuild Kingsman. Statesman
    tech support specialist Ginger Ale is appointed to Whiskey''s position, Eggsy marries Princess Tilde, and Tequila takes
    an exchange assignment at Kingsman, which acquires a new tailor shop in London.'
  - 'Represent the plot: The film is based on the true story of Barbara Daly Baekeland (Moore), her husband Brooks Baekeland
    (Dillane), heir to the Bakelite plastics fortune, and their only child Antony (Redmayne), who was diagnosed with schizophrenia.
    The story begins with Antony''s birth and follows the family to the time of his arrest for the murder of his mother.'
  - 'Represent the plot: Lena Kaligaris, Tibby Rollins, Carmen Lowell, and Bridget Vreeland are teenagers from Bethesda, Maryland,
    who have been best friends their whole lives and are about to spend their first summer apart: Lena is visiting her grandparents
    in Santorini, Greece; Bridget is going to soccer camp in Baja California, Mexico; Carmen is visiting her father in South
    Carolina; and Tibby is staying home. While shopping together, they find a pair of jeans that inexplicably fit them all
    perfectly. They decide to share the jeans equally over the summer, before parting the next day. While wearing the Pants,
    Lena nearly drowns, but a local Greek boy, Kostas Dounas, rescues her. Lena later learns from her grandmother that her
    and Kostas'' families are enemies. Kostas pursues Lena, saying the dispute between their families has nothing to do with
    them. Lena initially rebuffs his advances, but eventually begins a secret relationship with him. Later, Kostas tells Lena
    he loves her, but her family interrupts and drags her away before she can answer. Lena appeals to her grandfather, who
    agrees to let her see Kostas before he leaves for Athens. Working at a discount department store, Tibby finds a young
    girl, Bailey Graffman, has fainted and calls an ambulance. Later, Bailey delivers the pants to Tibby''s house when they
    are accidentally delivered to her home by mistake. Fascinated by Tibby''s self-made film, Bailey appoints herself Tibby''s
    assistant. Initially annoyed, Tibby grows to accept Bailey, and learns that Bailey has leukemia. When Bailey again is
    taken to the hospital, Tibby avoids her for a while, but eventually visits her with the pants. She pleads with Bailey
    to take them, but Bailey says the pants have already worked their magic by bringing her and Tibby together. Tibby continues
    to spend time with Bailey in the hospital, and when she passes away, Tibby decides to make a film inspired by her. Carmen
    arrives in South Carolina, only to discover that her father, Al, is about to marry Lydia, who has two children around
    Carmen''s age: Paul and Krista. They are blonde WASPs, unlike Carmen, who was raised by her Catholic, Puerto Rican mother.
    Although Carmen''s father and step-family initially seem welcoming, they emotionally neglect her. Carmen feels uncomfortable
    with her father referring to Paul and Krista as his kids, and resents him being an enthusiastic, present father to them
    while he has usually been absent in her life. She is embarrassed at a dress shop when she tries on the bridesmaid dress
    picked out for her for the wedding. Angered when the saleswoman calls her the other one, Carmen shouts at Lydia and runs
    away. She eventually takes a taxi home and sees Al and her step family happily enjoying dinner together in their dining
    room, apparently unconcerned that she''s missing. She throws a stone through their dining room window and returns to Maryland.
    When she arrives, Tibby tries to help Carmen with her feelings toward her father. Carmen lashes out at Tibby, who leaves
    in tears, though they eventually reconcile. Tibby convinces Carmen to confront her father with a phone call, during which
    she finally reveals her feelings of neglect and abandonment. He apologizes sincerely, but Carmen tells him it isn''t enough.
    Arriving at soccer camp, Bridget develops a crush on coach Eric Richman. Despite relationships between coaches and campers
    being forbidden, Bridget flirts with Eric and seeks his attention during games. When Bridget''s turn with the Pants begins,
    she leads Eric to the beach at night where they have sex and she loses her virginity. Bridget becomes depressed afterwards,
    and isolates herself when she returns home. After hearing about what happened in a letter, Lena calls Carmen and Tibby,
    and they go to Bridget''s house. Bridget worries she is like her mother, whose mood swings and mental issues culminated
    in deep depression and her suicide. However, Carmen and Tibby reassure Bridget that she is stronger than her mother and
    comfort her with happy memories of her mother. On his way back to Columbia University, Eric visits and apologizes to Bridget
    for his behavior and expresses his hope that she will give him a chance when she is older. The girls meet Lena at the
    airport and drive to South Carolina to attend Carmen''s father''s wedding, despite Carmen''s reluctance. Carmen''s father
    publicly apologizes for neglecting her. Carmen accepts his apology and joins the blended family onstage for the ceremony.'
