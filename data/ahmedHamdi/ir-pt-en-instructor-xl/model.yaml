- source_sentence: 'Represent the plot: After the birth of Dennis, son of Mavis and Johnny, Dracula becomes worried about
    the possibility of his grandson being human and begins to subject him to tests to turn him into a real vampire while Mavis
    and Johnny enjoy their vacation.'
  sentences:
  - 'Represent the plot: Jack Wood and his pals make a journey across the West and come up against rustlers, Indian attacks
    and outlaw gangs. They  make a journey across the West and come up against rustlers, Indian attacks and outlaw gangs.'
  - 'Represent the plot: Some time after the events of the first film, Mavis and Johnny are finally married, with the approval
    of her father Count Dracula. A year after the wedding, Mavis reveals to Drac that she is pregnant and later gives birth
    to a baby boy whom the couple name Dennis, nicknamed “Denisovich” by Dracula. As Dennis''s fifth birthday nears, he has
    yet to grow his fangs and Drac worries that his grandson might not gain vampire powers. Noticing the potential dangers
    her son might face living in Transylvania, Mavis starts to consider moving to Johnny''s hometown in Santa Cruz, California
    in order to give Dennis a more “normal” childhood, much to Drac''s disapproval. Drac tells Johnny, who does not want to
    leave the hotel either, to bring Mavis to California to visit his parents, Mike and Linda, but to make sure to keep her
    distracted so that she will not move, leaving Drac to babysit Dennis. Convinced that Dennis is a late fanger, Drac enlists
    his friends Frank, Wayne, Griffin, Murray, and Blobby to help train Dennis to become a monster, but every attempt that
    some of them try fails. Drac and the gang then go to Camp Winnepacaca, Drac''s childhood summer camp, only to sneak away
    after Drac finds out that the camp has become much safer and child-friendly. Drac attempts to hurl Dennis from a tall,
    unstable tower to pressure the boy''s transformation into a bat, but he fails to transform and Drac flies down and rescues
    him at the last second. Afterwards, Frank ends up loosening the tower and it collapses onto the campfire setting both
    the tower and a screaming Frank on fire as he runs through all the buildings, setting the entire camp on fire. Meanwhile,
    in California, Mavis enjoys exploring the more human world. When the couple arrive at Mike and Linda''s house, Linda unsuccessfully
    attempts to make Mavis feel more comfortable by covering her room with spooky, Halloween decorations and inviting other
    monster/human couples over. Feeling like a stranger, Mavis retreats up to the roof, and Johnny tells her that if they
    stay together, Dennis will live normally, persuading her to stay at the hotel. However, Johnny then discovers a video
    of Dennis falling that was filmed by the campers, and he and a furious Mavis go back to Transylvania, with Drac and his
    friends reaching the hotel at the same time. Mavis confronts her father for putting Dennis in grave danger and failing
    to accept him as a human, and shows him a pop music remix parody of Dennis in danger and Drac arguing with the staff.
    Mavis says that they will move out of the hotel after Dennis''s birthday party. The night before the party, Drac hosts
    Johnny''s family, and finds out that Mavis invited his father Vlad. As Vlad is more hateful of humans than he was, Drac
    tells Johnny to have his family disguise themselves as monsters. The next day, Vlad arrives with his monstrous bat-like
    servant Bela, and meets Dennis for the first time. Believing that fear will cause Dennis'' fangs to sprout, Vlad possesses
    a stage performer, named Brandon, dressed as Dennis'' favorite TV monster Kakie to scare him, but Drac shields his frightened
    grandson at the last moment, breaking Vlad''s hold over the performer. Mavis mistakenly believes that Drac was responsible
    for the ruse, and while the family argues about whether or not Dennis can be happy in California, a guilt-ridden Dennis
    flees the hotel and enters the forest with Wayne and Wanda''s daughter Winnie, whom he has a crush on, in tow. Irritated
    with Vlad, Johnny and his family expose themselves, and an irate Vlad reprimands Drac for accepting humans. Upon hearing
    that Dennis is a human, Bela attacks him and Winnie in their treehouse and abducts them. When Bela injures Winnie and
    threatens to destroy the hotel, Dennis''s anger causes him to instantly grow his fangs and develop his vampire abilities,
    and he bashes up Bela. A furious but defeated Bela calls his giant-bat minions, but Drac, Johnny, Mavis, Dennis, and the
    rest of the monsters team up to defeat Bela''s minions and drive them away, while Bela is shrunk by Vlad, who has been
    won over by Drac''s claim that humans now coexist peacefully. With Dennis finally embracing his vampire abilities, Johnny
    and Mavis decide to continue raising him in Transylvania, and they resume the party with his friends and family.'
  - 'Represent the plot: Z-Bob, Ash, Eli and Johnny are a group of four guys who take their soon-to-be married best friend
    Nathan on a memorable trip to Las Vegas. In order to properly bid farewell to their best friend''s life as a single man,
    they must send him out in style with an extravagant bachelor party in Sin City. Limousines, paint ball, strippers, sex
    toys, alcohol, debauchery and gambling are on the agenda until they discover that Mr. Kidd, their bachelor party planner,
    is a bank robber planning to heist the casino, setting off a chain of events that turns their night into a living hell.
    Running away from the police, the casino security, and murderous Hell''s Angels, the five friends are falsely accused
    of robbing a casino, stalked by a porn star''s prize-fighter boyfriend, mugged by a female Elvis impersonator, arrested,
    thrown in jail, and survive many other misadventures, until finally, it seems that their own deaths are in the cards.'
- source_sentence: 'Represent the plot: Allied forces under General MacArthur are forced to abandon their positions in the
    Philippines shortly after being defeated by the Japanese at Bataan. Colonel Joseph Madden remains in the country and organizes
    a guerrilla war among the natives against the invaders. In this struggle, he is led by Filipino Captain Andrés Bonifacio,
    grandson of a national hero. The captain is embittered and puts his men at risk because he believes his girlfriend, Dalisay
    Delgado, is an enemy collaborator: her voice is frequently heard on the radio, sending messages supporting the Japanese.
    But Colonel Madden knows the truth about her and is waiting for the right moment to tell the captain.'
  sentences:
  - 'Represent the plot: In the late 1940''s, Jim Blandings, a bright account executive in the advertising business, lives
    with his wife Muriel and two daughters, Betsy and Joan, in a cramped New York apartment. Muriel secretly plans to knock
    out a wall and remodel their apartment for $7,000. After rejecting this idea, Jim comes across an ad for new homes in
    Connecticut and they get excited about moving. Planning to purchase and fix up an old home, they contact a real estate
    agent, who convinced them to buy the old Hackett Place in (fictional) Lansdale County, Connecticut—a leaning, dilapidated,
    nearly 200-year old farmhouse on some 35 acres where, they are told, General Gates stopped to water his horses during
    the Revolutionary War. They buy the property for five times the going rate per acre for locals, provoking Jim''s friend
    and lawyer Bill Cole to chastise him for following his heart rather than his head. The old house, dating from the Revolutionary
    War era, turns out to be structurally unsound and must be torn down before the previous owner''s mortgage is paid off.
    The Blandings hire architect Henry Simms to design and supervise the construction of a new home for $18,000, which Muriel
    insists must have four bedrooms and four bathrooms. From the original purchase to the completion of the new home, a long
    litany of unforeseen troubles and setbacks—including digging a deep well only to find a spring just a few feet under the
    foundation—beset the hapless Blandings. The demolished house''s owner also sues them for the balance of his mortgage.
    Meanwhile, back in the city, Jim is given the task of creating a slogan for WHAM Ham, an account that has destroyed the
    careers of the previous executives assigned to it. Jim also suspects that Muriel is cheating on him when Bill spends a
    night in the house during a violent thunderstorm, with Muriel being the only other person present. With mounting pressure,
    skyrocketing costs, and the encroaching deadline for his assignment, Jim starts to wonder why he wanted to live in the
    country. Bill observes that although he has been the voice of doom, pointing out all the ways they were being cheated,
    when he looks at what they have finally built, he realizes that some things you do buy with your heart and not your head.
    Maybe those are the things that really count.” Gussie, a maid working for the Blandings, provides Jim with the perfect
    WHAM slogan—If you ain''t eating WHAM, you ain''t eating ham—and saves his job. The Blandings reward her with a $10 raise,
    and her likeness is used in the WHAM ad campaign. The film ends with the family and Bill enjoying the beautiful front
    yard. Jim, who is seen reading the book Mr. Blandings Builds His Dream House, invites the audience to “drop in and see
    us some time.”'
  - 'Represent the plot: In 1945 US Army Rangers raid the Cabanatuan Japanese prisoner-of-war camp, rescuing its POWs. The
    film flashes back to March, 1942, and the Bataan peninsula in the Philippines. As U.S. Army troops under General MacArthur
    struggle to hold on at Bataan against the Japanese, Colonel Joseph Madden (John Wayne) orders one of his officers, Captain
    Andrés Bonifacio (Anthony Quinn), to shape up. Bonifacio has been under a strain because his sweetheart Dalisay Delgado
    (Fely Franquelli) is apparently collaborating with the Japanese, broadcasting propaganda over the radio. Later, Madden
    is picked to slip through the lines to organize Filipinos to fight as guerrillas against the Japanese occupation. His
    commanding officer lets him know that Delgado is actually using the propaganda broadcasts to secretly transmit valuable
    information to them, but he is ordered to reveal that fact to no one, not even Bonifacio. Madden makes contact with one
    group of Filipino resistance fighters, but as they set out on their first mission, they encounter middle-aged American
    school teacher Bertha Barnes (Beulah Bondi). She and her students join the guerrillas after the Japanese hang Buenaventura
    Bello (Vladimir Sokoloff), the principal of her school and a dear friend, for refusing to take down the American flag.
    Setting out on their first mission to destroy a Japanese gasoline dump, Madden and his men stumble upon the Bataan Death
    March and realize that Bataan has fallen. Many of the Filipinos lose heart, so to boost their will to fight, Madden finds
    and engineers the rescue of Captain Bonifacio from the Death March. Bonifacio happens to be the grandson of Andrés Bonifacio,
    a national hero. It works. For their first mission, the guerrillas go to the Filipino village and hang the Japanese officer
    who ordered the killing of Bello. During the next year, Madden and his guerrillas attack Japanese outposts, supply depots,
    military airfields, and other installations. Major Hasko (Richard Loo), one of the Japanese commanders, attempts to appease
    the local population by staging a semi-independence ceremony to reduce popular support for the Filipino resistance. Madden,
    Bonifacio, and the guerrillas attack the ceremony, where Dalisay finally reveals her true alliance during her radio broadcast:
    She urges her people to rise up against the Japanese. Most of the Japanese troops are killed in the raid, but a young
    Filipino boy named Maximo Cuenca (one of Barnes'' students) is captured. After being beaten, he agrees to lead the Japanese
    to Madden''s hideout. However, as they near that spot, Maximo, sitting in the front seat of a Japanese transport truck,
    suddenly grabs the steering wheel, sending it careening down a mountainside. He later dies in the arms of Miss Barnes.
    Colonel Madden is ordered out of the field, leaving Captain Bonifacio in command of the Filipino resistance. Several months
    later, in October 1944, Bonifácio and his group travel to Leyte, where rumors are circulating of the impending American
    invasion to liberate the Philippines. After arriving on a beach in Leyte, Bonifacio is reunited with Madden who has arrived
    by submarine along with Lt. Commander Waite (Lawrence Tierney), a U.S. naval officer. Waite tasks Bonifacio and Madden
    with a mission of taking and holding a small village to block Japanese reinforcements from repelling the impending landing
    of American forces that are due within 24 hours. By trickery, Madden, Bonifacio, and their men engage and defeat the Japanese
    garrison in a fierce pitched battle. Two enemy soldiers, however, get away on a motorcycle and spread the alarm. Japanese
    tanks and soldiers attack. The defenders manage to knock out most of the tanks, but are on the verge of being forced to
    retreat. Just when all seems lost, American reinforcements and tanks arrive and turn the tide of battle. The film ends
    with another short montage, this time showing several of the actual released Americans from the Cabanatuan prison camp.'
  - 'Represent the plot: The film begins aboard a steamship crossing the Atlantic Ocean and initially showcases an unnamed
    immigrant''s misadventures, the Little Tramp (Chaplin), who finds himself in assorted mischief. The scene opens with Charlie
    bent double over the side of the ship, appearing to be seasick. Then it is revealed he is only fishing. Much humor is
    derived from the heavy sway of the boat, with much sliding around the deck. Charlie, among other things, plays cards,
    eats in the mess hall and avoids seasick passengers. Along the way, he befriends another unnamed immigrant (Purviance)
    who is traveling to America with her ailing mother. The two have been robbed by a pickpocket who loses the money to the
    Tramp in a card game. The Tramp, feeling sorry for the two penniless women, attempts to secretly place his winnings from
    his card game in the woman''s pocket but ends up being mistakenly accused of being a pickpocket. The woman manages to
    clear the Tramp''s name. Upon arrival in America, the passengers stare at the Statue of Liberty but once landed, the Tramp
    and the woman part company. Later, hungry and broke, the Tramp finds a coin on the street outside a restaurant and pockets
    it. He doesn''t realize there is a hole in his pocket, and the coin has fallen straight through and is back on the ground.
    He enters the restaurant, where he orders a plate of beans, at first eating one bean at a time. There, he is reunited
    with the woman and discovers her mother is dead. The Tramp orders a second bowl of beans for her. As they eat, they watch
    the restaurant''s burly head waiter (Campbell) and other waiters attack and forcibly eject a patron who is short 10 cents
    in paying his bill. The Tramp, intimidated by the waiter, checks and now realizes he has lost his coin. Terrified of facing
    the same treatment as the man he saw thrown out, the Tramp begins planning how he will fight the huge man. However, a
    stranger enters, flaunting the coin he found outside. When the headwaiter takes the coin, it also falls from his pocket
    onto the floor. The Tramp then makes many failed attempts to retrieve it without notice. He finally retrieves the coin
    and nonchalantly pays the waiter, only to be thunderstruck when the waiter reveals the coin to be fake. Once again, the
    Tramp prepares for the fight of his life. Just then, a visiting artist spots the Tramp and the woman and offers them a
    job to pose for a painting. The two agree. The artist offers to pay for the Tramp and the woman''s meal, but the Tramp
    declines the offer several times for reasons of etiquette, intending to accept the artist''s offer eventually; however,
    he''s dismayed when the artist does not renew his offer to pay at the last moment. The artist pays for his meal and leaves
    a tip for the waiter. The Tramp notices that the tip is enough to cover the couple''s meal and, without the artist noticing,
    palms the tip and presents it to the waiter as his payment for his and the woman''s meal. As a final riposte, he lets
    the waiter keep the remaining change - one small coin - after paying his bill. The waiter thinks the artist himself has
    given no tip whatsoever and is upset at this supposed action. Afterward, outside a marriage license office in the rain,
    the Tramp proposes marriage to the woman, who is coy and reluctant until the Tramp physically carries her into the office
    while she waves her arms and kicks her feet in protest.'
- source_sentence: 'Represent the plot: Professor Alfred Kinsey is interviewed about his sexual history. Interspersed with
    the interview are flashbacks of his childhood and youth. The childhood years show his father, an engineering professor
    and lay school pastor, denouncing modern inventions as leading to sexual sin; then, in early adolescence, humiliating
    Kinsey in a store, denouncing his guardian for showing him cigarettes, while his adolescence shows his experiences as
    a Boy Scout, and a late teenage scene shows Kinsey disappointing his father with his chosen vocational intentions. The
    adult Kinsey teaches at Indiana University as a biology professor, lecturing on wasps. Kinsey falls in love with a student
    in his class, whom he calls Mac, and marries her. The consummation of the marriage is difficult at first because of a
    medical problem Mac has that is easily corrected with minor surgery. At the university, Professor Kinsey, who is affectionately
    called Prok by his graduate students, meets with them after hours to offer individual sexual counseling. At a book party
    celebrating the latest publication of..." Kinsey, regarding wasps, approaches the dean of students about an open sex education
    course as opposed to the anti-sex propaganda taught in a general health education class. It is approved, but on the condition
    that it is open only to faculty, undergraduate or graduate students, and married students. Kinsey begins teaching the
    sex course to a packed auditorium. Kinsey continues answering student questions in personal meetings, but his answers
    are severely limited by the scarcity of scientific data on human sexual behavior. This leads Kinsey to distribute questionnaires
    in his sex education class, from which he learns about the enormous disparity between what society has assumed people
    do and what their actual practices are. After obtaining financial support from the Rockefeller Foundation, Kinsey and
    his research assistants, including his closest assistant, Clyde Martin, travel the country, interviewing individuals about
    their sexual histories. As time progresses, Kinsey realizes that sexuality within humans, including himself, is far more
    varied than initially thought. The range of The expression he coined became known as the Kinsey scale, which classifies
    sexuality in general from completely heterosexual to completely homosexual. The first sexological book Kinsey published,
    dealing with men''s sexual habits, was a huge success and a bestseller. Kinsey''s research then turned to women, who were
    more controversial. With the release of the women''s volume, support for Kinsey diminished. McCarthyist pressures led
    the Rockefeller Foundation to withdraw its financial support, lest it be labeled communist for supporting the subversion
    of traditional American values. Kinsey felt he had failed all those who had been victims of sexual ignorance. A customs
    official was informed about the importation of some of Kinsey''s research material, further exacerbating the financial
    difficulties of Kinsey''s research organization. Kinsey suffered a heart attack and was found to have developed an addiction
    to barbiturates. Meetings with other philanthropists failed to secure the necessary support. Still, Kinsey continued his
    story of sex. Returning to the initial interview, Kinsey was questioned about... The text discusses love and whether he
    will ever conduct research on it. He replies that love is impossible to measure and impossible to quantify, but that it
    is important. Kinsey and Mac pull over to the side of the road for a nature walk. She comments on a tree that has been
    there for a thousand years. Kinsey replies that the tree seems to show a strong love in the way its roots grip the earth.
    The two leave together, Kinsey commenting that there is much work to be done.'
  sentences:
  - 'Represent the plot: Professor Alfred Kinsey is interviewed about his sexual history. Interspersed with the interview
    are flashbacks from his childhood and young-adulthood. The early years show his father, a lay minister of the Methodist
    church, denouncing modern inventions as leading to sexual sin, then in early adolescence, humiliating Kinsey in a store
    by denouncing its keeper for showing him cigarettes, while his adolescence shows his experiences as a Boy Scout and a
    late teenage scene shows Kinsey disappointing his father by his chosen vocational intentions. The adult Kinsey teaches
    at Indiana University as a professor of biology lecturing on gall wasps. Kinsey falls in love with a student in his class,
    whom he calls Mac, and marries her. Consummation of their marriage is difficult at first, because of a medical problem
    Mac has that is fixed easily with minor surgery. At the university, Professor Kinsey, who is affectionately called Prok
    by his graduate students, meets with them after hours to offer individual sexual advice. At a book party celebrating Kinsey''s
    latest publication on gall wasps, Kinsey approaches the dean of students about an open-forum sex education course as opposed
    to the anti-sex propaganda taught in a general health education class. It is approved, but on the grounds that it is open
    only to teachers, graduate or senior students, and married students. Kinsey begins teaching the sex course to a packed
    auditorium. Kinsey continues answering students'' questions in personal meetings but his answers are severely limited
    by the paucity of scientific data about human sexual behavior. This leads Kinsey to pass out questionnaires in his sexual
    education class from which he learns of the enormous disparity between what society had assumed people do and what their
    actual practices are. After securing financial support from the Rockefeller Foundation, Kinsey and his research assistants,
    including his closest assistant, Clyde Martin, travel the country, interviewing subjects about their sexual histories.
    As time progresses Kinsey realizes that sexuality within humans, including himself, is a lot more varied than was originally
    thought. The range of expression he creates becomes known as the Kinsey scale, which ranks overall sexuality from completely
    heterosexual to completely homosexual. The first sexological book Kinsey publishes, which is on the sexual habits of the
    male, is a large-scale success and a best seller. Kinsey turns his research to women and is met with more controversy.
    With the release of the volume on female sexual behavior, support for his work declines in a time when Senator Joseph
    McCarthy''s witch hunts against Communists and homosexuals (the latter known as the Lavender Scare) lead the Rockefeller
    Foundation to withdraw its financial support, fearing that it be labeled Communist for backing the subversion of traditional
    American values. Kinsey feels he has failed everyone who has ever been a victim of sexual ignorance. A customs officer
    is tipped off to an importation of some of Kinsey''s research material, which only exacerbates the financial hardship
    of Kinsey''s research organization. Kinsey suffers a heart attack, and is found to have developed an addiction to barbiturates.
    Meeting with other philanthropists fails to garner the support needed. Still, Kinsey continues his taking of sex histories.
    Returning to the initial interview, Kinsey is asked about love and whether he will ever conduct research on it. He responds
    that love is impossible to measure and impossible to quantify, but that it is important. Kinsey and Mac pull over to the
    side of the road for a nature walk. She remarks about a tree that has been there for a thousand years. Kinsey replies
    that the tree seems to display a strong love in the way its roots grip the earth. The two walk off together, Kinsey remarking
    there''s a lot of work to do.'
  - 'Represent the plot: For 18 years, war widow Reiko has been running a grocery shop in the house of her deceased husband''s
    family. Now a new supermarket threatens to put the store out of business, so Reiko''s sisters-in-law conspire to turn
    the shop into a supermarket as well and get rid her. The only family member siding with Reiko is her brother-in-law, 25-year-old
    Kōji, who regularly gets into drunken fights. He eventually confesses to the 12 years older Reiko that he has always loved
    her. She rejects him on the grounds that she only cares for him as a family member. Reiko finally decides that she doesn''t
    want to stand in the way of the sister''s plans anymore and return home to her family. Kōji follows her onto the long
    train ride. On the way, she softens and they disembark for a country inn, where they can talk. He resumes his approaches,
    but at the last minute, she can''t face intimacy. He storms out and gets drunk, later calling Reiko up saying that he
    is going back home. In the morning, Reiko sees him being carried into the village on a stretcher, and learns that he died
    falling from a cliff. She runs after the carriers, but then stops, her face blank.'
  - 'Represent the plot: Concerns the platonic romance between two young misfits wandering the same Long Island town.  When
    naïve and unbookish Maria announces to her family that she has dropped out of high school because of an unplanned pregnancy,
    her father dies of heart failure, her mother kicks her out of her home, and her boyfriend breaks up with her.  Lonely
    and with nowhere to go, Maria wanders her town in search of a place to stay. Along the way, she meets Matthew, a highly
    intelligent and extremely moody electronics repairman who keeps losing jobs through his inability to accept the views
    of employers and customers. They begin an unusual platonic romance built on their mutual admiration, respect and trust,
    but Matthew''s father and Maria''s mother both try to destroy the innocent relationship.'
- source_sentence: 'Represent the plot: A respected general, who is being considered as a candidate for the presidency of
    the United States of America, has his daughter, an army captain, found dead on a military base. An army investigator is
    called in to solve the case, and he has the help of a lawyer.'
  sentences:
  - 'Represent the plot: Sam and Alex are a newly engaged couple who move to Los Angeles to further their careers. Sam is
    a recently graduated medical student, starting his residency in psychiatry, while Alex is finishing her Ph.D. dissertation
    on genomics. The relatively straitlaced, upwardly mobile couple plans to stay at the vacant home of Sam''s mother, Jane,
    a free-spirited record producer in the Laurel Canyon section of Los Angeles. In a change of plans, however, Jane is still
    around, recording an album with her British boyfriend, Ian McKnight, and his band. Jane and Ian are in the midst of a
    fiery romance, and both the producer and the band seem more interested in partying than finishing the record. Jane''s
    presence is a source of consternation for Sam, as he and his mother have quite different mindsets and a strained relationship.
    The new lifestyle options presented by her soon-to-be mother-in-law intrigue the normally hardworking Alex, who begins
    spending more time with the band and less time on her dissertation. Alex''s growing fascination with Jane and Ian leads
    to a scene where the three of them kiss one another while naked in the swimming pool. Sam himself feels attracted to an
    Israeli fellow resident, Sara, who is unapologetically interested in him as well. They share one first kiss while returning
    from an informal interns'' meeting, around the same time Alex has her first tryst with Jane and Ian in the pool. Some
    time later, while Alex attends Jane and Ian''s party held in a crowded hotel suite to celebrate the band''s new album
    release, Sam and Sara meet in a parking lot and, in a conversation filled with sexual tension, they declare their attraction
    for one another. The situation strains Sam and Alex''s relationship almost to the point of breaking by the end of the
    film. After the party has finished and the three of them are left alone in the suite, Ian tries to finish (in his words)
    his encounter with Alex and Jane, but the latter decides against it and the threesome does not take place. Upon returning
    home after his conversation with Sara, Sam decides to go to the hotel and discovers Jane, Ian, and Alex scantily-clad
    in the bedroom. In a fit of rage he repeatedly punches Ian, hits his mother with his elbow as she tries to split up the
    fight, and leaves the hotel, but Alex chases him down the street and professes her love for him. The next morning, the
    situation seems back to normal again. But Sara phones Sam and tells him she can''t control her heart, as opposed to what
    he told her the day before. Sam watches his surroundings, postpones any further conversation, and takes a moment of reflection.'
  - 'Represent the plot: While in Georgia, Chief Warrant Officer Paul Brenner, an undercover agent of the United States Army
    Criminal Investigation Division Command, masquerades as First Sergeant Frank White to broker an illegal arms trade with
    a self-proclaimed freedom fighter. At Fort MacCallum, Brenner gets a flat tire and Captain Elisabeth Campbell, a psychological
    operations officer and the daughter of Lieutenant General Joseph Fighting Joe Campbell, the base commander, helps him
    change it. The next evening she is found murdered. The base provost marshal, Colonel William Kent, secures the crime scene.
    Brenner and rape specialist Warrant Officer Sara Sunhill are brought in to investigate. They receive Elisabeth''s records
    and notice that her grades plummeted her second year at West Point. Brenner wants to search Elisabeth''s house, but Kent
    declines because it is off-base and therefore outside their jurisdiction. Picking the lock of Elisabeth''s house, Brenner
    and Sunhill find a room containing video and BDSM equipment, but an intruder attacks him and removes the videotapes. He
    questions Elisabeth''s superior officer, Colonel Robert Moore, whose evasiveness leads to his arrest on charges of conduct
    unbecoming an officer. At the crime scene, Sunhill is attacked in an attempt to intimidate her and Brenner. During the
    attack she notices one assailant is wearing a silver claddagh ring, and identifies him as Captain Jake Elby. At gunpoint,
    Elby confesses that Elisabeth was sexually promiscuous with the men on the base as part of an extensive psychological
    warfare campaign against her father. Back at the jail, Kent releases Moore, confining him to quarters at his home on-base.
    Upon returning to Moore''s home, he, Brenner, and Sunhill find him dead with an apparently self-inflicted bullet to the
    head, which Brenner doubts was suicide. Campbell''s adjutant, Colonel George Fowler, attempts to close the investigation
    stating Moore killed himself out of guilt, but Brenner insists on continuing the investigation. Brenner and Sunhill travel
    to West Point, where Elisabeth''s psychiatrist, Colonel Donald Slesinger, explains that during a training exercise seven
    years earlier, several cadets brutally gang-raped Elisabeth and left her naked and staked down in the same position she
    was found murdered, and a cadet came forward regarding the attack. Sunhill tracks down the former cadet and tricks him
    into admitting his presence during the attack; feeling trapped and guilt-ridden, he admits to witnessing it and explains
    how the male cadets hated Elisabeth, since she surpassed them as a cadet. Brenner visits the general, who corroborates
    the attack and confirms that before visiting Elisabeth in the hospital, he met with another general, who felt the assailants
    would go undetected given the type of training exercise and stated the attack going public could ruin the concept of women
    in the military. Campbell reluctantly agreed and tried to convince Elisabeth to forget the attack, effectively traumatizing
    her. After revealing that Sunhill easily identified Elisabeth''s assailants, who face 20 years in prison, Brenner deduces
    Elisabeth had Moore help her stage the attack scene so she could force her father to see what he covered up. Campbell
    states that he threatened Elisabeth with a court martial due to her affairs with multiple officers, including Kent, and
    that she responded to his ultimatum with the staged attack scene. Unmoved, he left her tied naked to the stakes. Realizing
    that Kent releasing Moore from prison, taking Elisabeth''s keys, and sleeping with her makes him a suspect, Brenner learns
    that Kent is at the crime scene with Sunhill and wants him to join them. At the scene, Kent admits his obsession with
    Elisabeth and that after he found her at the staged scene, upset over her father being unmoved by her effort, she dismissed
    Kent and spat in his face. Enraged, he strangled her. After admitting to murdering Moore to evade detection, Kent then
    commits suicide by stepping on a mine. As Campbell prepares to board the plane to accompany Elisabeth''s body to the funeral,
    Brenner confronts him and blames him for her death, explaining that his betrayal effectively killed her and Kent just
    put her out of her misery. Though Campbell warns him to keep silent, Brenner has him court-martialed for conspiracy to
    conceal a crime, ruining the general''s career.'
  - 'Represent the plot: Max (David Schwimmer), an alpha-male commitment-phobic sports broadcaster, and Jay (Jason Lee), a
    neurotic novelist, have been best friends since childhood in Chicago. Jay has just broken up with his girlfriend, Natasha
    (Vanessa Angel) and is writing his first book about their relationship in Milan, Italy. He is melancholy and has been
    drinking.  Jay sets Max up with his editor Samantha (Mili Avital). After their first date, they each tell him in detail
    how terrible it was, he tells it like she was a loud and obnoxious drunk, while she claims he brought her to a strip club.
    Then they make out, then burst out laughing--admitting they fooled him. Although they share few interests, they are engaged
    within two weeks, and shortly thereafter he moves in. Flipping through bridal magazines, a photo of Jay''s model ex Natasha
    upsets him, so he later drunk-calls her. Still, when Max is confronted with the fact that Sam will be the last woman he
    will sleep with in a dream, he proposes a test. Jay will hit on Sam, if she shows no interest, then Max will be confident
    enough in her loyalty to go ahead with the marriage. However Jay really doesn''t want to, he gets really nervous and goes
    from proposing to stop meetings with Sam to meeting several times a week. The publisher pushes up their completion date
    to six weeks, forcing them to be together constantly. Two weeks before the three plan to have a celebratory dinner for
    the book''s conclusion, but Max has to go to Detroit for work. So, Jay and Sam go out drinking and dancing, he bumps into
    Natasha and Sam pretends she is his new fiancée. Natasha seems disheartened by the news. Later, Jay crashes at Sam''s,
    and after finishing reading the manuscript, she goes upstairs to talk to him, and before they have a moment where they
    almost kiss, her cousin Dre interrupts them. He goes home, where his ex has invited him to her hotel room. At Natasha''s
    hotel room, she tears Jay''s clothes off as having seen him with Sam has rekindled her interest. He realizes he is finally
    over her. Feeling guilty at the sudden revelation of his feelings for Sam, he calls Max and realizes he slept with his
    makeup artist, Dara. Jay rushes over to Sam''s but then chickens out. He goes home, hitting the bottle hard. Max finds
    him there, confronting him over Sam. After an altercation, they agree to go to her to see how she really feels and what
    she really wants. Over a meal, Jay declares his love for Sam and kisses her. Max is shocked but then he starts to laugh,
    thinking it''s a joke, spilling the beans about the fidelity test he''d asked Jay to do on her. Upset, she leaves, breaking
    off ties with both.'
- source_sentence: 'Represent the plot: Mortimer and his daughter Meggie share a passion for books and travel. He has a gift
    for bringing the characters and stories from books to life, so much so that his wife disappeared nine years earlier after
    reading Inkheart, when the villains from the book jumped into the real world. Mortimer needs to bring his wife back, but
    at the same time he has to protect his daughter and return the villains to the pages of the book.'
  sentences:
  - 'Represent the plot:  Eight years after the death of Gotham City District Attorney Harvey Dent, Bane, a former member
    of the League of Shadows, leads an attack on a CIA plane over Uzbekistan to abduct nuclear physicist, Dr. Leonid Pavel,
    and fake Pavel''s death in the crash. Meanwhile, organized crime has been eradicated in Gotham by legislation, the Dent
    Act, giving expanded powers to the police. James Gordon, police commissioner, has kept Dent''s killing spree a secret
    and allowed the blame for his crimes to fall on Batman. Bruce Wayne, still mourning the death of Rachel Dawes, has become
    a recluse, and Wayne Enterprises has stagnated. Bane enlists businessman John Daggett to buy Bruce''s fingerprints. Cat
    burglar Selina Kyle steals Bruce''s prints from Wayne Manor for Daggett, but he double-crosses her and she alerts the
    police, who pursue Bane and Daggett''s henchmen into the sewers while Kyle flees. The henchmen capture Gordon and take
    him to Bane, but he escapes and is found by Officer John Blake, an orphan who has deduced Bruce''s secret identity and
    persuades him to resume his vigilantism. Bane attacks the Gotham Stock Exchange and uses Bruce''s fingerprints to verify
    a series of fraudulent transactions, leaving Bruce bankrupt; Bane escapes while the police chase Batman. Fearing Bruce
    will get himself killed fighting Bane, his butler, Alfred Pennyworth, resigns in the hope of saving him after admitting
    to burning a letter that Rachel left for him saying she was going to marry Dent. Bane expands his operations and kills
    Daggett while Bruce and Wayne Enterprises''s new CEO, Miranda Tate, become lovers. Kyle agrees to take Batman to Bane
    but instead leads him into a trap under Wayne Tower. Bane gloats that he intends to fulfill Ra''s al Ghul''s mission to
    destroy Gotham City before crippling Batman in combat. He then takes Bruce to an ancient underground prison in the Middle
    East he calls home, where Bruce learns that Ra''s al Ghul''s child was born and raised in the prison but had a protector
    that aided the child in escaping, thought to be impossible. Back in Gotham, Bane traps the police forces in the sewers,
    destroys all but one bridge surrounding the city, kills Mayor Anthony Garcia, forces Pavel to convert a fusion reactor
    core into a decaying neutron bomb before killing him, exposes Dent''s crimes to the city (thus undermining the legal system),
    releases the prisoners of Blackgate Penitentiary, takes over the city, and has Gotham''s elite exiled and killed in proletarian
    kangaroo courts presided over by Jonathan Crane. Bruce recovers from his injuries five months later, escapes captivity,
    and returns to Gotham. As Batman, he frees the police, and together, they clash with Bane''s army in the streets. During
    the battle, Batman overpowers Bane, but Tate stabs Batman, revealing herself as Talia al Ghul, Ra''s al Ghul''s child.
    Unable to activate the bomb''s detonator due to Gordon blocking the signal, Talia leaves to find the bomb. Kyle returns,
    killing Bane and helping Batman pursue Talia, hoping to bring the bomb back to the reactor chamber where it can be stabilized.
    Talia''s truck crashes, but she remotely floods and destroys the reactor chamber before dying. With no way to stop the
    detonation, Batman, after revealing his identity to Gordon, uses his aerial craft, the Bat, to haul the bomb far over
    the bay, where it safely explodes. In the aftermath, Batman is presumed dead and honored as a hero. Wayne Manor becomes
    an orphanage, and Bruce''s estate is left to Alfred. Gordon finds the Bat Signal repaired, while Lucius Fox discovers
    that Bruce had fixed the Bat''s malfunctioning auto-pilot. Blake, whose legal first name is revealed as Robin, resigns
    from the GCPD and receives a package leading him to the Batcave. In Florence, Alfred discovers that Bruce is alive and
    in a relationship with Kyle, and they silently acknowledge each other before parting ways.'
  - 'Represent the plot: One day in contemporary Mexicali, a poker game in the back room of a cantina includes horse breeder
    Jim Carey, cowboys Shep and Johnny, a prospector called Old Willy, a stranger in town named Frazee and a drifter, Chalk.
    Guitar player Josh and bartender Bibbs are kibbitzing. Conversation turns to a legendary wagon train carrying gold bars
    worth $5 million lost 100 years ago in the Walking Hills, a huge area of shifting dunes across the border in the United
    States. Johnny, not paying attention, casually mentions how his horse recently tripped over an old wagon wheel in the
    hills. To keep the discovery a secret, they agree that all of them including Jim''s man Cleve must join the search for
    the wagon train. The nine reach the apparent site but all the dunes have shifted since Johnny was there. Bibbs discovers
    an ox skull and Old Willy an oxen yoke and they begin digging. The group is joined by Chris Jackson, a woman who followed
    them from Calexico, where she works in a diner. Shep is really former rodeo rider Dave Wilson with whom Chris, herself
    a rodeo performer, fell in love at a rodeo in Denver, breaking off her engagement to Jim. Dave abruptly disappeared and
    Chris saw him again in Calexico after he showed up there as Shep, heading for the border. It turns out that Dave Wilson
    had fled because he accidentally killed a gambler who accused him of cheating at cards. The man''s father, King, hired
    a detective who turns out to be Frazee, and who has been sending signals to King and a posse with a heliograph. Johnny,
    Chalk and Cleve are also on the run and each believes Frazee is after him. Frazee shoots Johnny during a fight. Jim, told
    by Johnny that he would rather die than go to prison, has Cleve hide the horses to keep Johnny from being found out if
    someone goes for help. A wagon is uncovered and tempers flare when no gold is found. Johnny dies right after Frazee admits
    he watched Chris as hangman''s bait, waiting for Dave to show up. A terrible sand storm develops, and Chalk tries to stampede
    the horses, killing Frazee with Frazee''s gun. Jim kills Chalk as he tries to escape. The storm uncovers the entire wagon
    train. Old Willy finds it, but it''s empty. Dave decides to turn himself in to the law and Chris, still in love with Dave,
    rides after him. Jim has a hunch, meanwhile, that the wagons weren''t entirely empty when Old Willy found them.'
  - 'Represent the plot: Mo and Resa Folchart read the fairy tale Little Red Riding Hood to their baby daughter Meggie, as
    a red velvet hood appears out of thin air. Twelve years later, Meggie visits an old book shop in Europe with her father,
    unaware that he is secretly looking for a copy of the book Inkheart. Shortly after Mo finds the book, Meggie encounters
    a horned marten outside the shop and it tries to bite her fingers. A man appears from the shadows, claiming to be an old
    friend. Mo comes out of the shop, recognizing the man as Dustfinger, who quickly asks him to read him back into the book.
    Mo flees with Meggie. Mo takes Meggie to visit her great-aunt Elinor in Italy. There he tells Meggie that nine years ago,
    while reading to her from Inkheart, he inadvertently brought Dustfinger out of the book and into the real world, through
    a gift he possessed from birth. Unfortunately, the book''s villain, Capricorn, and one of his henchmen, Basta, were also
    brought out of the book. Fleeing with his infant daughter, Mo realizes Resa has been taken into the book. Capricorn arrives
    with Basta, who captures the group, destroys Elinor''s library and takes Inkheart. Mo, Meggie, and Elinor are taken to
    Capricorn''s new castle in the real world. During their imprisonment, Mo explains his gift to Meggie and Elinor, stating
    that when he reads a person or an object out of a book, someone from the real world is sent into it, hence his wife''s
    disappearance. Capricorn forces Mo to use his gift, acquiring treasure from one of the stories in The Arabian Nights,
    and imprisoning Farid, one of the 40 Thieves. Dustfinger, who was promised a return into the book, is betrayed by Capricorn.
    The group escapes using the tornado from The Wonderful Wizard of Oz. Elinor leaves to recover what is left of her library
    as the others head for Alassio, the town of Inkheart author Fenoglio, who may have another copy. Dustfinger is initially
    afraid of learning his fate in the book, but eventually joins them. When they meet Fenoglio, the author''s ecstatic reaction
    to seeing his creation alive leads Dustfinger to learn he dies at the end of the book while trying to save his marten,
    Gwin. He berates Fenoglio before eventually telling Mo that Resa is trapped in the real castle and has lost her voice.
    Mo and Dustfinger take Fenoglio''s car and Farid stows away in the trunk. At Fenoglio''s house, Meggie begins reading
    out loud, bringing Toto from The Wizard of Oz. Basta bursts in with his men and takes the group to Capricorn. Elinor,
    having decided to stay, realizes something is amiss and pursues them. At the castle, Capricorn orders Meggie to bring
    a monster called the Shadow out of Inkheart and threatens to harm Resa if she does not comply. Mo sneaks into the castle.
    Dustfinger is captured, but escapes after Meggie informs him of Capricorn''s intentions. Mo attempts to free Meggie and
    the others, as Capricorn forces her to read the Shadow out of the book. Dustfinger returns to the castle with Farid and
    sets it on fire. The distraction allows Fenoglio to give Meggie a rewritten part of Inkheart that should help Meggie stop
    Capricorn''s plan. As Elinor arrives with the creatures Capricorn imprisoned, Meggie writes out the story on her arm.
    As she reads it out, Capricorn turns into ashes as the Shadow devours him, his henchmen vanish, the Shadow explodes, and
    all the read-out creatures are returned where they belong. In addition, she grants Fenoglio''s wish to live in the world
    he created, while reuniting herself and Mo with Resa, whose voice is restored. Dustfinger is also safely read back into
    Inkheart, where he is reunited with his wife Roxanne. In the real world, Farid reveals he kept Gwin with him, thus allowing
    Dustfinger to avoid his own death. As Mo and his family leave with Farid, Meggie agrees to teach him how to read and Farid
    agrees to teach her how to use the dragon breath, the fire breathing ability of Dustfinger''s which Farid learned.'
