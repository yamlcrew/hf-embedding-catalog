    - "Confirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of request.See\
      \ MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\nExamples:\nThe command with Context\
      \ Group Type for ‘CA’ set to 0, and 2 Radio Contexts with Ids 0 and 1 in the ‘Radio Context List’ looks as below:\n\
      SRCG 0 CA 0 1\nThe command with Context Group Type for ‘MUMIMO’ set to 1, and 4 Radio Context with Ids 2, 3, 4 and 5\
      \ in the ‘Radio Context List’ looks as below:\nSRCG 1 MUMIMO 2 3 4 5\nThe command with Context Group Type for ‘TOPOLOGY’\
      \ set to 3, and 2 Radio Context with Ids 8, and 9 in the ‘Radio Context List’ looks as below:\nSRCG 3 TOPOLOGY 8 9\n\
      \n\n‌2.1.33 SASS‌‌\nSet Conditional Assert state\nScope\nThis platform command is supported in all modes.\nDescription\n\
      This command sets the state for one or more groups of Conditional Asserts.\nIf a Conditional Assert is disabled and\
      \ the condition fails, the following happens:\n•A warning Error Notification indication will be issued on the MCI\n\
      •The TM500 will attempt to recover from the error condition – although the recovery is best efforts and may cause transient\
      \ or sustained changes in behaviour\nIf a Conditional Assert is enabled and the condition fails, the behaviour is the\
      \ same as if it were a critical assert.\nAll Conditional Asserts are disabled by default in formal releases and enabled\
      \ by default in test releases\nSyntax\nSASS <STATE> <CASSERT SPECIFIER>\nRequest parameters\n\n Parameter name| Type|\
      \ Allowed Values| Default  \n---|---|---|---  \nMin| Max  \nSTATE| Enum[String]| -| -| -  \nENABLE = Change the the\
      \ state of the specified Conditional Assert(s) to be\nenabledDISABLE = Change the the state of the specified Conditional\
      \ Assert(s)\nto be disabled  \nCASSERT_SPECIFIER| String| -| -| -  \nA single Conditional Assert group, or a glob-style\
      \ expression of groups to\nenable, e.g.:• DTE.GENERAL.INVALID_CONTEXT_DATAThis will enable or disable the\nsingle Conditional\
      \ Assert group• DTE.GENERAL.*This will enable or disable all\nConditional Asserts within the DTE.GENERAL submodule•\
      \ DTE.*This will enable or\ndisable all Conditional Asserts within the DTE module• *This will enable or\ndisable all\
      \ Conditional Asserts in the system\n\n\nConfirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number\
      \ to indicate success/failure of request.See MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of\
      \ request.\n\n\nExample\nNote that the effect of multiple SASS commands is cumulative. That is, if you want to enable\
      \ all\nC-assert, apart from CA.RADIOSEL.INVALID_REF_CLK, you can use the following two commands:\n1. SASS ENABLE *\n\
      2. SASS DISABLE DTE.GENERAL.INVALID_CONTEXT_DATA\nSASS ENABLE * C: SASS 0x00 Ok\nSASS DISABLE DTE.GENERAL.INVALID_CONTEXT_DATA\
      \ C: SASS 0x00 Ok\nGASS\nC: GASS 0x00 Ok\nAll conditional asserts are enabled except for:\nDTE.GENERAL.INVALID_CONTEXT_DATA\n\
      If a disabled Conditional Assert fails, the ERNO emitted is of the form:\nI: ERNO 0x00000000 CASS 0x00000008 <module>.<submodule.<group>:\
      \ “<assert string>” at <location in code>\nFor example:\nI: ERNO 0x00000000 CASS 0x00000008 DTE.GENERAL.INVALID_CONTEXT_DATA:\
      \ \"For\nUeIndex: 1320,DeId: 1,Duplicate DL DefaultBearerId: 3 Detected \" at line 5594 of\n../cm_fw_app/dte/code/dte_pppoe.c\n\
      \n\n‌2.1.34 GASS‌‌\nGet Conditional Assert state\nScope\nThis platform command is supported in all modes.\nDescription\n\
      This command queries the state of Conditional Asserts in the system.\nSyntax\nGASS\nRequest parameters\nNone\nConfirm\
      \ parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of request.See\
      \ MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.  \nCASSERT_STATUS_TEXT| Text Describing\
      \ the state of Conditional Asserts in the\nsystem\n\n\nExample\nGASS\nC: GASS 0x00 Ok\nAll conditional asserts are enabled\
      \ except for:\nDTE.GENERAL.INVALID_CONTEXT_DATA\n\n\n‌2.1.35 LCAP‌‌\nConfigures and enables the capturing and export\
      \ of received and transmitted packet data logs.\nScope\nThis command is supported in all modes. This is currently supported\
      \ for ORAN operation only.\nDescription\nThis command configures and enables the capturing and export of received and\
      \ transmitted packet data logs as per the configuration parameters.\nThis command is available for use after the SCFG\
      \ command has been used.\nThe command is designed to be flexible and extensible to address the current and future needs\
      \ for such configuration.\nNote: The captured log file is transferred to the ftp root folder on the controller PC.\n\
      Syntax\nLCAP <PARAMETERS>\nRequest parameters\n\n Parameter name| Type| Allowed Values| Default  \n---|---|---|--- \
      \ \nMin| Max  \nCOMMAND CLASS| String| -| -| -  \nClass of command and defines the command and parameters are applicable\
      \ to what\ntype of TM500 product.Options are:ORU  \nCLASS IDENTIFIER| String| -| -| -  \nIf the COMMAND CLASS = \"ORU\"\
      , this parameter provides the RU name.  \nTRAFFIC SOURCE| String| -| -| -  \nDefines the type of traffic to be logged\
      \ (conditional mandatory\nparameter)Options are:TCP (S-plane and M-plane packets capture using tcpdump)\nDPDK (CU plane\
      \ packets capture using DPDK)NETCONF (M-plane Netconf logs)When\nthe command is issued after SCFG and this is not provided,\
      \ DPDK option is used\nby default.  \nBUFFER SIZE| Int| -| -| -  \nConfigures the size of buffer (in megabytes) for\
      \ log capture (conditional\nmandatory parameter)10 means 10MB size is configured for the capture buffer\n200 means 200MB\
      \ size is configured for the capture buffer Minimum buffer size:\n10MB (10)Maximum buffer size: 5000MB (5000)For TRAFFIC\
      \ SOURCE = TCP and this\nparameter is not provided, the system configures 10MB by defaultFor TRAFFIC\nSOURCE = DPDK\
      \ and this parameter is not provided, the system configures 200MB\nby defaultFor TRAFFIC SOURCE = NETCONF, this parameter\
      \ is not used and is\nignored if provided.Note: If this parameter is provided, the parameter\n“TRAFFIC SOURCE” must\
      \ be provided by the user.\n\n\n\n Parameter name| Type| Allowed Values| Default  \n---|---|---|---  \nMin| Max  \n\
      PORT IDENTIFIER| String| -| -| -  \nIf the COMMAND CLASS = \"ORU\", this parameter provides the port on which the\n\
      logging/capture to be enabled (conditional mandatory parameter)“ORU1-P1” –\nconfigures the first ethernet port – for\
      \ ORAN operation only“ORU1-P2” –\nconfigures the second ethernet port – for ORAN operation onlyIf the COMMAND\nCLASS\
      \ = \"ORU\" and this is not provided, ORU1-P1 is used by defaultFor TRAFFIC\nSOURCE = NETCONF, this parameter is not\
      \ used and is ignored if provided.Note:\nIf this parameter is provided, the parameter “BUFFER SIZE” must be provided\
      \ by\nthe user.  \nFLOW IDENTIFIER| String| -| -| -  \nConfigures the specific flows for log capture (optional parameter)\
      \ For COMMAND\nCLASS = “ORU”:This is the list of eAXCIds provided as a string of comma\nseparated integer values for\
      \ more than one flows. And a single value provided\nas string with single integer value.If this is not provided, the\
      \ system\ncaptures the logs for all the flows associated with the configured ports on\nthe configured RU.For TRAFFIC\
      \ SOURCE = NETCONF, this parameter is not used and\nis ignored if provided.Note: If this parameter is provided, the\
      \ parameter\n“PORT IDENTIFIER” must be provided by the user.\n\n\nConfirm parameters\n\n Parameter name| Comment  \n\
      ---|---  \nRETURN_CODE| Number to indicate success/failure of request.See MCI return\ncodes.  \nRETURN_TEXT| Text to\
      \ indicate success/failure of request.\n\n\n\n\n\n##‌2.2 Error recovery and reset commands‌\n\nThe test mobile provides\
      \ a number of different reset mechanisms that can be used to recover from various types of error. The error recovery\
      \ commands are as follows:\n•Hardware reboot – see RBOT\n•Soft reset – see RSET\nThis command causes a soft reset and\
      \ allows the mode to be changed using SCFG.\n\n\n\n##‌2.3 SWL Commands‌\n\nThe Software License Component (SWL) is a\
      \ component of the test mobile. MCI commands are provided to configure the license options of test mobile variants.\n\
      These commands can be used in any mode, but only after STRT is issued. The general syntax for these commands is:\nFORW\
      \ SWL COMMAND [PARAMETER1 PARAMETER2 … PARAMETERn]\n2.3.1 GetStatus2.3.2 GetSystemID2.3.3 SetKey"
