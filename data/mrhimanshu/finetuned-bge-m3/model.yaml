    •An additional ground connection is not required so long as equipment is connected through a mains socket/plug that complies
    with IEC 60309.



    ‌Transportation‌‌

    Take great care when transporting the cabinet. Only move it on its castors if the ground is completely even and level,
    and free of any features that might prevent the castors from rolling freely. The embedded-to-castors mounting pads must
    be fully raised before attempting to move the cabinet. Moving the cabinet on its castors requires a minimum of three people
    to ensure stability during transportation.

    Use a fork-lift truck, chain hoist or professional movers to move it over uneven and/or sloping ground. The E500-D cabinet
    is too heavy to roll up or down a ramp.

    Before using a lifting device to transport the cabinet, ensure that:

    •All external cabling to the equipment is removed and the mains cable/plug is secured.

    •Any covers are fitted and secured.

    •The cabinet is secured to the fork-lift truck before moving.

    Verify that the doors along the route to the installation location are wide and tall enough to accommodate the cabinet
    on its castors.

