      ---|---|---|---  \nMin| Max  \n[DNS Server IPv4 Address Request]| Enum| 0| 1| 0  \n0 = DNS Server IPv4 Address Request\
      \ Protocol Configuration Option not sent1 =\nDNS Server IPv4 Address Request PCO sent  \n[IPv4 Address Allocation via\
      \ DHCP])| Enum| 0| 1| 0  \n0 = IPv4 address allocation via DHCPv4 Protocol Configuration Option not sent1\n= IPv4 address\
      \ allocation via DHCPv4 PCO sentWhen the network allocates an\nIPv4 address the DHCPv4 ADDRESS ALLOCATION IND is output.\
      \  \nChoice 'Selection Mode' is 2 (Manual Scan)Scans and returns a list of\navailable PLMNs for manual selection.\n\n\
      \nConfirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of request.See\
      \ MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\n\n\n‌3.13.2 NasConfigEmmDeregister‌‌\n\
      Deregister the NAS from network\nScope\nActivation time is controlled by the Activate command.\nDescription\nThis command\
      \ requests NAS to deregister from the network.\nThe activation indication is returned when the deregistration process\
      \ has completed.\nThe results of the NAS deregistration are provided in a separate indication message, which is also\
      \ used for network initiated deregistration.\nSyntax\nFORW MTE NASCONFIGEMMDEREGISTER <PARAMETERS>\nRequest parameters\n\
      \n Parameter name| Type| Allowed Values| Default  \n---|---|---|---  \nMin| Max  \nDeregister cause| Enum| 0| 2|  \n\
      0 = Normal1 = Switch off2 = Silent switch off. Cause the UE to deregister with\nno signaling to emulate loss of power.\n\
      \n\nConfirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of\
      \ request.See MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\n\n\n‌3.13.3 NasAptConfigPlmnSelection‌‌\n\
      Configure NAS to select a specific PLMN\nScope\nActivation time is controlled by the Activate command.\nDescription\n\
      APT command to configure the NAS to select a specific PLMN during registration. This applies to both a real or simulated\
      \ USIM.\nSyntax\nFORW MTE NASAPTCONFIGPLMNSELECTION <PARAMETERS>\nRequest parameters\n\n Parameter name| Type| Allowed\
      \ Values| Default  \n---|---|---|---  \nMin| Max  \nForce PLMN| String| 5 digits| 6 digits|  \nForce use of a particular\
      \ PLMN. Initial registration is attempted to the\nspecified PLMN.PLMN is provided in a string of five or six decimal\
      \ digits.The\nleading three digits provide the Mobile Country Code (MCC).The next two or\nthree digits (depending on\
      \ 'MNC length') provide the Mobile Network Code\n(MNC).  \n[> Radio Access Type]| Enum[Int]| 0| 4| 3  \nRadio Access\
      \ TypeValues 0, 1 and 2 are reserved for future use.3 = NG-RAN4 =\nSATELLITE NG-RANNote: This parameter is not used\
      \ for LTE (4G).\n\n\nConfirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure\
      \ of request.See MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\n\n\n‌3.13.4 NasAptConfigCapability‌‌\n\
      Configure NAS capabilities, including authentication and security options\nScope\nActivation time is controlled by the\
      \ Activate command.\nDescription\nAPT command to configure the NAS capabilities and the ciphering/integrity algorithms\
      \ supported as reported to the network.\nIf the command is not issued then the 3GPP defaults apply.\nSyntax\nFORW MTE\
      \ NASAPTCONFIGCAPABILITY <PARAMETERS>\nRequest parameters\n\n Parameter name| Type| Allowed Values| Default  \n---|---|---|---\
      \  \nMin| Max  \n[| Enum| 0| 4| 3  \n> NAS Security options]| 0 = No Authentication procedure and no NAS security\n\
      > mode procedure is expected. Any received authentication request or security\n> mode command is ignored.  \n| 1 = No\
      \ NAS security mode procedure is expected. Any received security mode\ncommand is ignored. Authentication procedure\
      \ is expected.  \n| 2 = NAS security mode is expected but message contents are ignored. Security\nmode procedure completes\
      \ but no NAS ciphering or integrity is started.\nAuthentication procedure is expected. NAS security headers are not\
      \ used.  \n| 3 = NAS security mode is expected and UE acts on contents starting NAS\nintegrity and ciphering if configured.\
      \ Authentication procedure is expected.\nNAS security headers are used.  \n| This is 3GPP defined behavior and is the\
      \ default if the command is not used.  \n| 4 = NAS security mode is expected. Authentication procedure is not expected."
    - "Confirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of request.See\
      \ MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\n\n\n‌5.2.9 Msg4BypassContentionResolution‌‌\n\
      Configures RACH Message 4 Contention Resolution Bypass\nScope\nE500 supported.\nThis command can be used any time. The\
      \ effects of this command are immediate. The command can be used in all modes.\nThe command only applies to the current\
      \ Radio Context (set via SetRadioContext) and applies to all UEs in the Radio Context.\nDescription\nThis command was\
      \ provided for use when TM500 was not 3GPP compliant regarding the HARQ result transmitted on receipt of RACH Message\
      \ 4 (containing the RRCConnectionSetup message).\nThe 3GPP compliant behavior, now supported by default, is for a DTX\
      \ to be sent if:\n•UE contention resolution fails or\n•A CRC error occurs while performing UE contention resolution.\n\
      The previous default behavior of the TM500 was to always send a DTX as the HARQ result for this message. The TM500 appeared\
      \ to failed UE contention resolution, even if the contention resolution was successful and the RRCConnectionSetup message\
      \ was passed to higher layers.\nThis test command was provided to bypass the UE contention resolution HARQ behavior\
      \ to configure the required behavior pending resolution of this issue.\nAs the TM500 is now 3GPP compliant, with regard\
      \ to this issue, the recommendation is that this command should not be used and is deprecated in a future release.\n\
      Syntax\nFORW L1 MSG4BYPASSCONTENTIONRESOLUTION <PARAMETERS>\nRequest parameters\n\n Parameter name| Type| Allowed Values|\
      \ Default  \n---|---|---|---  \nMin| Max  \nBypass contention resolution| Enum| 0| 2| 1  \n0 = MSG4 HARQ result is always\
      \ DTX.1 = 3GPP compliant.2 = MSG4 HARQ result is\nalways the DL-SCH CRC result. DTX does not apply if contention resolution\n\
      fails.\n\n\nConfirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure\
      \ of request.See MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\n\n\n‌5.2.10 MacTriggerSCell‌\n\
      Trigger SCell Activation\nScope\nApplicable to all modes except HARQ mode. The effects of this command are immediate.\n\
      Description\nThis L2 test command is used to manually trigger activation/deactivation of SCCs.\nSyntax\nFORW L2 MACTRIGGERSCELL\
      \ <PARAMETERS>\nRequest parameters\n\n Parameter name| Type| Allowed Values| Default  \n---|---|---|---  \nMin| Max\
      \  \nUE id| Int| 0| 31|  \nSCC Control| Int| 0| 127|  \nA bit field controlling the activation/deactivation of SCCs\
      \ 1-6.Bit 0:1 = SCC1\nactive Bit 1:1 = SCC2 active Bit 2:1 = SCC3 active Bit 3:1 = SCC4 activeBit\n4:1 = SCC5 active\
      \ (applicable for R13) Bit 5:1 = SCC6 active (applicable for\nR13) Bit 6:1 = SCC7 active (applicable for R13)  \nSubframe\
      \ (Optional)| Int| 0| 9| Immediate  \nThe subframe to apply the SCC control.If omitted, it applies immediately.\n\n\n\
      Confirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of request.See\
      \ MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\n\n\n‌5.2.11 SetPortMapping‌\n\
      Configures the Port Mapping Information\nScope\nThis command must be issued before cell search. The effects of this\
      \ command are immediate. The command can be used in all modes.\nDescription\nThis command is used to control the port\
      \ mapping feature.\nThe FORW L1 SETRADIOCONTEXT command is used to enable a per cell setting to be defined.\nSyntax\n\
      FORW L1 SETPORTMAPPING <PARAMETERS>\nRequest parameters\n\n Parameter name| Type| Allowed Values| Default  \n---|---|---|---\
      \  \nMin| Max  \nPort mapping mode| Enum| 0| 2| 0  \n0 = port mapping disabled1 = port mapping automatically2 = port\
      \ mapping\nmanually  \nPort mapping options - only required if 'Port mapping mode' is 2, otherwise\nomit completely.\
      \  \nSwitch cell search port| Enum| 0| 1| 0  \n0 = NO, PSS and SSS is on RX_0. cell search is only on RX_01 = YES, PSS\
      \ and\nSSS is on RX_1. cell search is only on RX_1  \nSwitch FFT receiving port| Enum| 0| 1| 0  \n0 = NO, TX port 0\
      \ is on RX_0, TX port 1 is on RX_1, transmission port match\nwith receiving antenna, downlink signal processing can\
      \ directly use the\nreceiving FFT data.1 = YES, TX port 0 is on RX_1, TX port 1 is on RX_0,\ntransmission port is not\
      \ match with receiving antenna, downlink signal\nprocessing should switch the receiving FFT data.\n\n\nConfirm parameters\n\
      \n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of request.See MCI return\n\
      codes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\n\n\n‌5.2.12 UlPowerCappingMode‌‌\nConfigures\
      \ the UL Power Capping\nScope\nE500 supported.\nThe effects of this command are immediate. The command can be used in\
      \ all modes.\nDescription\nThis command is used to control UE power capping. When enabled the following is performed:\n\
      •“Power class capping” occurs before adding “Poffset”.\n•An additional capping (only on the upper range, for example\
      \ limit to max +13dBm per UE by default) is carried out to avoid Ptx go beyond the 23dBm in case of misconfiguarations,\
      \ and to avoid electrical issues for the attached device (eNB or other).\n•The lower power limitation (set at -50dBm)\
      \ is removed.\nThe setting applies to all UEs in the radio context/cell last selected using FORW L1 SETRADIOCONTEXT\
      \ to configure for multiple cells.\nCorrect setting of the UL power requires UL power capping to be enabled and this\
      \ is now the default setting.\nSyntax\nFORW L1 ULPOWERCAPPINGMODE <PARAMETERS>\nRequest parameters\n\n Parameter name|\
      \ Type| Allowed Values| Default  \n---|---|---|---  \nMin| Max  \nPower capping on/off| Enum| 0| 1| 1  \n0 = Power capping\
      \ disabled1 = Power capping enabled  \nUE power allowance| Int| 0| 23| 13  \nUE power allowance in dBm.The value to\
      \ cap the UE specific UL channel\ntransmission power.\n\n\nConfirm parameters\n\n Parameter name| Comment  \n---|---\
      \  \nRETURN_CODE| Number to indicate success/failure of request.See MCI return\ncodes.  \nRETURN_TEXT| Text to indicate\
      \ success/failure of request.\n\n\n\n\n‌5.2.13 SetDlFftBitShift‌\nScope\nThis command is only applicable in Standalone\
      \ NB-IOT mode. The effects of this command are immediate.\nDescription\nIt controls the bit shift used at the output\
      \ of the FFT in the FPGA in the radio.\nSyntax\nFORW L1 SetDlFftBitShift <PARAMETERS>\nRequest parameters\n\n Parameter\
      \ name| Type| Allowed Values| Default|  \n---|---|---|---|---  \nMin| Max|  \nmode| Boolean| 0| 1| 0|  \n0 = Automatic1\
      \ = Manual|  \nThe following two parameters are required only if the Manual mode is selected|  \nbitShiftSettingMode|\
      \ Enum| 0| 2| 0|  \n1 = Absolute value2 = Adjust current valueFor absolute value: Set FFT shiftFor\nadjust: Adjust the\
      \ current FFT shift|  \nvalue| Int| -16| 16|  \nThis indicates by how many bits DL FFT shift operation is adjusted|\n\
      \n\nConfirm parameters\n\n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of\
      \ request.See MCI return\ncodes.  \nRETURN_TEXT| Text to indicate success/failure of request.\n\n\n\n\n‌5.2.14 EnableRealPMIMeasurement‌\n\
      Scope\nThis command can be used any time. The effects of this command are immediate.\nDescription\nThis special command\
      \ can be used to enable or disable the real PMI measurement for a given Radio Context which can be set by SetRadioContext\
      \ command after issuing this command.\nAll the beams in the MU-MIMO will have the same kind of PMI reporting behaviour\
      \ whether real or simulated PMI. Also all UEs in a beam will report the same PMI when real PMI is enabled.\nSyntax\n\
      FORW L1 ENABLEREALPMIMEASUREMENT <Parameter\nRequest parameters\n\n Parameter name| Type| Allowed Values| Default  \n\
      ---|---|---|---  \nMin| Max  \nEnableFlag| Boolean| 0| 1| 0  \n0 = Real PMI reporting disabled1 = Real PMI reporting\
      \ enabledNote: You can\nenable/disable the real PMI measurement for the given radio Context.\n\n\nConfirm parameters\n\
      \n Parameter name| Comment  \n---|---  \nRETURN_CODE| Number to indicate success/failure of request.See MCI return\n\
      codes.  \nRETURN_TEXT| Text to indicate success/failure of request."
    - "##‌Table 1 - Carrier leakage performance as tested in 36.521-1 and effect on one RB adjacent to the centre frequency\n\
      \nTM500 scenario\nThe section Real world scenario on page 47 showed that, in a real world scenario involving standard\
      \ compliant UEs, the carrier leakage interference will affect the uplink throughput performance. When it comes to using\
      \ TM500, the effect of the carrier leakage of the radio cards also needs to be evaluated. This requires explaining i)\
      \ how the carrier leakage is specified and measured and ii) how the software uses the radio card.\nWhen it comes to\
      \ how carrier leak is specified and measured, for the TM500 MBR, C-MBR and C-MBR 600 radio cards this is done when transmitting\
      \ a -10.7 dBFS digital signal at maximum calibrated analog gain, producing +16 dBm wanted signal output power in dedicated\
      \ mode (0 dBm in combined mode when the gain is limited to avoid self-interference). In those circumstances, the carrier\
      \ leak level is ≤-40 dBc, which is equivalent to:\n•≤-50.7 dBFS digital power.\n•≤-24 dBm and ≤-40 dBm absolute output\
      \ power in dedicated and combined mode, respectively.\nAs for how the radio card is used during normal operation, the\
      \ current version of the MUE test software configures the transmitter at maximum analog gain, which results in the values\
      \ of absolute carrier leak power provided above. Any uplink level changes required by the eNB under test are implemented\
      \ by increasing or reducing the level of the digital baseband. This means that the relative carrier leak and therefore\
      \ the uplink C/I depend on the setup attenuation, artificial noise level setting and eNB receiver target power or SNR.\n\
      In MUE, the crest factor of the signal is 3 dB higher and for fading an additional back-off of 7 dB is needed. I.e.\
      \ there is ≈10 dB extra back-off compared with the calibration scenario. This corresponds to a maximum digital drive\
      \ level of -20.7 dBFS. Table 2 and Table 3 provide the relative carrier leakage that can be achieve depending on the\
      \ baseband drive level for 10 MHz and 20 MHz channel bandwidth, respectively. The calculation is obtained for i) full\
      \ allocation and ii) the number of RBs allocated to one UE for carrier leak testing in 36.521-1.\n\n Baseband drive\
      \ level| Output power| Carrier leakage  \n---|---|---  \nFull allocation (dBFS)| Per RB (dBFS/RB)| Full allocation (dBm)|\
      \ Per RB\n(dBm/RB)| dBFS| Full allocation (dBc)| 12 RB allocation (dBc)  \n-21| -41| +6| -14| ≤-51| ≤-30| ≤-24.2  \n\
      -22| -42| +5| -15| ≤-51| ≤-29| ≤-23.2  \n-23| -43| +4| -16| ≤-51| ≤-28| ≤-22.2  \n-24| -44| +3| -17| ≤-51| ≤-27| ≤-21.2\
      \  \n-25| -45| +2| -18| ≤-51| ≤-26| ≤-20.2  \n-26| -46| +1| -19| ≤-51| ≤-25| ≤-19.2  \n-27| -47| 0| -20| ≤-51| ≤-24|\
      \ ≤-18.2  \n-28| -48| -1| -21| ≤-51| ≤-23| ≤-17.2  \n-29| -49| -2| -22| ≤-51| ≤-22| ≤-16.2  \n-30| -50| -3| -23| ≤-51|\
      \ ≤-21| ≤-15.2  \n-31| -51| -4| -24| ≤-51| ≤-20| ≤-14.2  \n-41| -61| -14| -34| ≤-51| ≤-10| ≤-4.2\n\n\n\n##‌Table 2 -\
      \ Relationship between baseband drive level and relative carrier leakage. 10 MHz channel bandwidth (50 RBs)\n\n\n Baseband\
      \ drive level| Output power| Carrier leakage  \n---|---|---  \nFull allocation (dBFS)| Per RB (dBFS/RB)| Full allocation\
      \ (dBm)| Per RB\n(dBm/RB)| dBFS| Full allocation (dBc)| 18 RB allocation (dBc)  \n-21| -41| +6| -14| ≤-51| ≤-30| ≤-23\
      \  \n-22| -42| +5| -15| ≤-51| ≤-29| ≤-22  \n-23| -43| +4| -16| ≤-51| ≤-28| ≤-21  \n-24| -44| +3| -17| ≤-51| ≤-27| ≤-20\
      \  \n-25| -45| +2| -18| ≤-51| ≤-26| ≤-19  \n-26| -46| +1| -19| ≤-51| ≤-25| ≤-18  \n-27| -47| 0| -20| ≤-51| ≤-24| ≤-17\
      \  \n-28| -48| -1| -21| ≤-51| ≤-23| ≤-16  \n-29| -49| -2| -22| ≤-51| ≤-22| ≤-15  \n-30| -50| -3| -23| ≤-51| ≤-21| ≤-14\
      \  \n-31| -51| -4| -24| ≤-51| ≤-20| ≤-13  \n-41| -61| -14| -34| ≤-51| ≤-10| ≤-3\n\n\n\n##‌Table 3 - Relationship between\
      \ baseband drive level and relative carrier leakage. 20 MHz channel bandwidth (100 RBs)\n\nTable 2 and Table 3 show\
      \ that if the setup loss is too low, therefore forcing the baseband drive level down, then the relative carrier leak\
      \ performance is poor resulting in degraded C/I performance. On the other hand, maximizing the baseband drive level\
      \ by either increasing the setup loss, the level of artificial noise or both gives the best results.\n© 2022, VIAVI\
      \ Solutions Inc.\nFor further information please contact:\nVIAVI Solutions www.viavisolutions.com/wirelessvalidation\n\
