    the protection provided.



    ‌Damaged Cables‌‌

    Damaged AC supply cables are dangerous. Regularly inspect them for damage and do not use if damage is evident or suspected.
    Do not use equipment where damage to components carrying line voltage (for example, power inlet, line cord) is suspected.



    ‌Isolating Equipment‌‌‌

    A switch/circuit breaker must be incorporated into the fixed wiring that supplies the equipment. The switch/circuit breaker
    must be rated and approved according to the regulations of the country of use. The switch/circuit breaker must not be
    part of the supply cord and must not interrupt the protective earthing conductor.

    The disconnecting device for the equipment is either the AC supply plug or the switch/circuit breaker incorporated into
    the fixed wiring. If used as the disconnection device, the switch/circuit breaker must be identified as the disconnection
    device.

    Position the equipment rack so that the disconnection device can be easily accessed in an emergency.

    See also Powering down the cabinet on page 15.



    ‌Removing and installing components in a server‌

    If you need to replace a component in a server, observe the following safety precautions:

    •Take appropriate anti-static precautions when handling components. Use an anti-static mat and wrist strap when working
    with servers with the cover removed and when handling components.

    •The R730 and R740 servers are too heavy for a single person to remove/install in a cabinet. Ensure that at least two
    people, working together, perform this procedure.

    •Do not operate a server with the cover wholly or partially removed. This could put you at risk of electric shock and
    cause (overheating) damage to the server and/or components in the server.

    Loose cables

    When configured for use, the system has a number of loose interconnecting cables that could damage the equipments if they
    are snagged. When working near the equipment, take care that cables do not catch on your clothing or person.

