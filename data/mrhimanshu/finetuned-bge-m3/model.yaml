    \ count across RCs]\n\n [RC Id]| [COUNT]  \n---|---  \n0| 0  \n1| 4  \n2| 0  \n3| 0\n\n\n\n\n‌3.3.11 GetRuStats‌‌\nGet\
    \ the O-RAN RU Stats information\nScope\nThe command is available in all modes. The effects of this command are immediate.\n\
    Description\nThis command is used to retrieve the O-RAN RU statistical information. The stats are reset/cleared by the\
    \ SCFG and ClearStats commands.\nIf you do not specify a “RU Name” parameter in SELR, the stats shall be displayed with\
    \ an internally generated RU name when the ALL option is used with GetRuStats.\nThis command retrieves a snapshot of counters\
    \ from various stages of processing. The values presented are for indicative purpose only and may not necessarily align\
    \ to an observation boundary.\nSyntax\nFORW MTE GETRUSTATS <PARAMETERS>\nRequest parameters\n\n Parameter name| Type|\
    \ Allowed Values| Default  \n---|---|---|---  \nMin| Max  \n[| String| -| -| -  \nRU Name| Defines the requested RU Name\
    \ for the display stats.  \n]| A special option “ALL” displays the requested information sequentially for\nthe first 32\
    \ RUs. If RU Name is not specified by the user the default is ALL.  \n| NOTE: If you do not specify a “RU Name” parameter\
    \ in SELR the stats shall be\ndisplayed with an internally generated RU name when the ALL option is used\nwith GetRuStats.\
    \  \n[| Bool| 0| 1| 0  \nPer EAXCID Stats| Displays stats on a per EAXCID basis  \n]|"
