    ##‌Server Commands ng40forcecleanup and ng40restartall‌


    If the scenario will still not start, or one or more of the ethx devices are not available it will be necessary to run
    server commands to force clean the configuration and restart all services.

    To do this click on the Server button on the top right corner, under the navigation bar:

    First run the ng40forcecleanup all command then try to start/re-start the scenario. If the scenario still will not start,
    run the ng40restartall command, then run the command sudo netplan apply from a Linux command line, then run the server
    command ng40forcecleanup all.

    Start/re-start the scenario.




    ##‌Check Network Connectivity‌


    •Check the network connectivity with ping between the MeNB Relay and other components e.g., the 5G CU (SUT) and the TM500.
    For example, check if it is possible to ping between the MeNB Relay and the TM500 (w1 interface), the MeNB and the 5G
    CU (X2 interface), and between the MeNB Relay and MME (s1 interface).

    •Check the routing table. A typical routing table may look like the following:

    ‌Figure 51 Routing Table

    •Check the gateway is reachable, if a gateway is required and has been configured.

    •Using wireshark, check if sctp is working on an interface e.g., check sctp on the x2 interface to confirm the connectivity
    is working between the MeNB Relay and the 5G CU.

