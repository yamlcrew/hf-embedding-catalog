  - '##‌Chapter 7‌‌


    #MULT Commands


    For more information about the MULT Commands see, the TM500 Command Reference Manual (CRM).

    There are three variants of the MULT command:

    •MULT

    •MULT n

    •MULT <ip address of ASC>

    The first two are legacy versions that operate when there is no ASC in the system. The third version is the one that must
    be used if an ASC is deployed, even if the scenario is a single chassis deployment.

    If either of the first two (legacy) versions of the MULT command are used with an ASC connected, the system will (most
    likely) fail and the error message generated is likely to be quite obscure.




    ##‌Chapter 8‌‌


    #Diagnostics and Troubleshooting


    This chapter is to assist the administrator with diagnostic tests and issues when configuring and operating the resources
    with groups and any associated configuration. For example, powering Groups UP and DOWN.

    Checking clock ports/cablesTroubleshooting




    ##‌Checking clock ports/cables‌


    Checking clock cables can be used as part of the setup and testing process, but only for ASC SRIO hardware. This is not
    applicable to ASC V2.

    This is a special operating mode that allows the ASC to be used as a cable tester only. It cannot be used to validate
    that cabling connections from the ASC to connected resources are correctly installed.

    To access the ASC Web Interface:

    1. Log in to the ASC Web Interface.

    2. Select the Test Groups page.

    3. Check that no groups are active.

    4. Check that at least two external switches are defined.

    5. Check that the two external clock parts are assigned to different switches.

    6. Set up the groups table with two groups. Each group must be assigned an external port.

    7. Add three of the group members to each group.

    8. If using seven members, add the Group Master to one of the groups.

    9. Turn the groups power on, then activate the groups by locking the resources. This action can only be performed when
    the resources of the group have been locked.

    10.Turn on the clocks for both groups.

    Check the clock ports. One group should have flashing LEDs and the other group should have lit, but not flashing, LEDs.

    11.Link the flashing clock input, using a clock cable, to test one of the lit (but not flashing) LEDs.

    Note: This should include the other external clock input/output. After configuration, all the LEDs should be lit (but
    not flashing) LEDs.

    •If the configuration fails, the clock input may be broken, or the clock cable faulty.

    •If some of the configuration fails, the failed clock outputs may be broken.

    12.Turn off the clock outputs on both groups.

    13.Change over the group with the TM Group Master.

    14.Turn the clocks back on for both groups.

    15.Change over the group with the TM Group Master.

    16.Turn the clocks back on for both groups.

    This allows the clock input and output to be tested.




