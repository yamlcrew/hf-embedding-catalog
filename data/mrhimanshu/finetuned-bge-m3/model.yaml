      ##Software Update




      ‌The MeNB Relay component comes preconfigured with a KVM host plus three VMs (Users), and pre-installed with the required
      software version and configuration. However, it will be necessary to update the software periodically, e.g., to apply
      an update patch or to apply an installer (for major updates).‌

      If the installation is being incremented periodically, the patch update would be good for almost all occasions, especially
      if there are no significant changes in the configuration template. For larger updates i.e., to apply major changes it
      may be necessary to update via the installer, such as if updating from release v2.47 to v2.49.

      A directory should be created for storing any software patch updates and installers. E.g., create the directory /home/viavi/install.

      Software patch updates take the form: TeraVMpatch_BNC_<version>_YY-MM-DD-<time>

      An example patch TeraVMpatch_BNC_23-02-13-0313.

      BNC: indicates this patch is intended for Ubuntu Bionic (18.04) 23: Is the year

      02: Is the month the update was built 13: Is the day the update was built

      An installer will have the form: TeraVMinstall_BNC_<version>_online_YY-MM-DD-<time>

      An example installer TeraVMinstall_BNC_v249b_online_22-11-22_10-50. BNC: indicates this patch is intended for Ubuntu
      Bionic (18.04)

      v249a: The installer version number 22: Is the year

      11: Is the month the update was built 22: Is the day the update was built

      online: The installer assumes internet availability on the target server and will install any required Ubuntu .deb packages
      from online.

      47000/503 Issue 2

      © 2024, VIAVI Solutions Inc. All rights reserved.

      Installing an Update patchUpdating the HostUpdating with the InstallerInstaller DownloadUpdate a KVM HostUpdating the
      VMsConfiguration UpdateManual Configuration UpdateCustomer Provided Configuration




      ##‌Installing an Update patch‌


      To install a software patch update, ensure you have obtained the correct update patch, and the update is deployed to
      the host and all VMs. The update needs to be applied to all VMs and the host. Use the following procedure to update
      each VM one at a time.

      •Check the permissions of the patch update file, if necessary change the permissions to be executable e.g.,

      chmod 755 TeraVMpatch_BNC_23-02-13-0313

      •Shutdown the running scenario (assembly)

      •Now run the patch update install. Go to the directory where the patch update is stored, and run the install e.g.,

      cd /home/viavi/install

      sudo ./TeraVMpatch_BNC_<version>_YY-MM-DD-<time>

      •After the installation is complete, check the setup with the command ng40version. You will see the new installed patch
      and all applicable packages, that would have been updated. E.g.:

      ‌Figure 52 Example Output of ng40version Command on MeNB User (VM)

      It is important that all the packages have the letter ii at the beginning, indicating they are correctly installed.
      If the letters are anything other than ii, e.g. rc this means an error was encountered during the installation.

      Check for internet access and re-run the patch install. It may be necessary to check the install log to determine the
      install error(s). A zip file with local repository localrepo.tar.gz can be deployed to install any missing packages.

      It may also be necessary to unzip the patch update file to re-install missing/corrupted ng40 packages. It is advised
      to seek assistance from VIAVI/ng4T support in the above situation.

      •After a successful update install restart the scenario assembly.

      Note: The software can be rolled back to the previous version simply by running the patch update for the previous version.




      ##‌Updating the Host‌


      After the VMs have been updated the host needs to be updated. The host has the KVM installation and VIAVI Control Centre
      and GUI packages.

      •Shutdown all the VMs. You can use either the virt-manager gui or the command line option.

      •Run the update install on the host as was done on the VMs:

      cd /home/viavi/install

      sudo ./TeraVMpatch_BNC_<version>_YY-MM-DD-<time>

      After updating the host, check the output of the command ng40version. It should appear similar to the following:

      ‌Figure 53 Example Host ng40version Command Output

      •Restart each VM, one at a time. When the VM is restarted and running, restart the scenario.'
    - '‌Grounding the system‌‌‌‌

      ‌The equipment consists of multiple instruments, each instrument contributing to an overall ground (earth) leakage that
      exceeds the limiting value allowed by BS EN 61010-1:2010. An additional ground connection is therefore provided to the
      equipment rack. This must be connected* to a suitable ground connection within the building installation at all times
      while the equipment is in operation. If in doubt, check that the additional ground connection is making satisfactory
      contact before switching on the equipment. Failure to ground the equipment may expose you and others to hazardous voltage
      levels.

      A ground (earth) lead is fitted to the equipment and must be connected to a suitable ground point prior to any other
      electrical connection. An additional ground connection is therefore provided to the equipment rack. This can be disconnected
      while moving the cabinet but MUST be replaced before opening cabinet doors, mounting or removal of any modules, or making
      any external connections. See Installing the E500 42U 5G Network Tester on page 98.

      •An additional ground connection is not required so long as equipment is connected through a mains socket/plug that
      complies with IEC 60309.



