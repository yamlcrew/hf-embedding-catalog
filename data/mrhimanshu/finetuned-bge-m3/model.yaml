  - 'Dynamic M-plane mode: The .csv file only contains the base RU configuration advertised by the O-RU to the O-DU over the
    M-plane, which includes the following aspects:

    •Static low-level Tx/Rx endpoints, Tx/Rx arrays

    •Capability information:

    o The content of the configuration, such as object labels and capabilities can be adapted to match the information expected
    by the O-DU.

    o The user-plane configuration is then provided by the O-DU over the M-plane interface, and the configuration is manually
    activated by the O-DU as desired.

    2. Static M-plane mode: The .csv file contains both the base RU configuration and user-plane configuration required to
    exchange CU-plane packets over O-RAN Fronthaul interface.

    •The user-plane configuration includes the settings which normally would have been configured by the DU over the M-plane,
    such as:

    o Tx/Rx endpoint, which contain the eaxcid and compression settings

    o Tx/Rx Array carrier objects

    •Processing element objects

    In that mode of operation, there is no constraint on the object names. What matters is to define eCPRI stream profiles
    (eaxcid, VLAN, compression, and numerology) which match those configured in the O-DU.

