    Check that the configured interfaces are available and seen by the server. Run the command ifconfig to confirm all physical
    interfaces are available and have the correct dummy IP address as specified in the netplan .yaml file.

    Check the status of the ethx devices on the VM to ensure they are listed, and status is Active. To do this, on the VM
    run the command:

