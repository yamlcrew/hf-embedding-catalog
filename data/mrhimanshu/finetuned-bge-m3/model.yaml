  - "Examples:\n1. System scope to show the Beam management procedure information and stats for mobility between radio contexts\
    \ (RCs) when configured (when MU-MIMO or MBB is configured in TM500) for the overall system. This example considers the\
    \ following for mobility among RCs:\n•4 RCs RC0, RC1, RC2 & RC3\n•40 UEs in the system and 10 UEs configured initially\
    \ on each RC\n•UE0-UE9 on RC0 as UE group 0\n•UE10-19 on RC1 as UE group 1\n•UE20-29 on RC2 as UE group 2\n•UE30-39 on\
    \ RC3 as UE group 3\n•All UEs on RC0 moving to RC1 (RC0->RC1), All UEs on RC2 moving to RC3 (RC2->RC3)\nFORW MTE GETNRUEBEAMEVENTSTATS\
    \ [0] []\nC: FORW 0X00 OK MTE GETNRUEBEAMEVENTSTATS SCOPE: SYSTEM ID: ALL\nELAPSED_TIME: 454.9 S L1_BEAM_MANAGEMENT:\n\
