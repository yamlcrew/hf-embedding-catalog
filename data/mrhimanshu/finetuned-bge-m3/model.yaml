      ‌Cabinet Anchoring‌‌

      Ensure that the cabinet is correctly mounted within the particular building depending on the installation seismic zone.

      High tensile strength rating fasteners and anchors should be used to secure the cabinet base to the concrete floor.
      Alternatively, high tensile strength pre-tensioned steel cables can be used to secure the 4 eyes (loops) on the top
      of the cabinet to the ceiling/roof of the building.



      ‌Toxic hazards‌‌

      Some of the components used in this equipment may include resins and other materials that give off toxic fumes if incinerated.
