    \n\n\n\n\n##‌2.2 Error recovery and reset commands‌\n\nThe test mobile provides a number of different reset mechanisms\
    \ that can be used to recover from various types of error. The error recovery commands are as follows:\n•Hardware reboot\
    \ – see RBOT\n•Soft reset – see RSET\nThis command causes a soft reset and allows the mode to be changed using SCFG.\n\
    \n\n\n##‌2.3 SWL Commands‌\n\nThe Software License Component (SWL) is a component of the test mobile. MCI commands are\
    \ provided to configure the license options of test mobile variants.\nThese commands can be used in any mode, but only\
    \ after STRT is issued. The general syntax for these commands is:\nFORW SWL COMMAND [PARAMETER1 PARAMETER2 … PARAMETERn]\n\
    2.3.1 GetStatus2.3.2 GetSystemID2.3.3 SetKey"
