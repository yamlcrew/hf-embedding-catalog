    )\n```\n\nEffects:\n```\n(and\n    (not (is-destroyed ?to))\n    (at-hero ?to)\n    (not (at-hero ?from))\n)\n```\n"
  - "Parameters:\n1. ?from - cells\n2. ?to - cells\n\nPreconditions:\n```\n(and\n    (connected ?from ?to)\n    (at-hero ?from)\n\
