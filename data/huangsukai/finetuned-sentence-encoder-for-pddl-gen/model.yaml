- source_sentence: 'Context: Translate the given natural language description into an action schema that includes the parameters,
    preconditions, and effects. Ensure that only the provided predicates are used to construct the preconditions and effects.

    Question: Here is the task.

    A natural language description of the domain

    Domain information: This domain is structured to allow organizing and managing books within a library setting. The actions
    and predicates support the movement of books between tables and shelves, ensuring that conditions like accessibility and
    the librarian''s hands being free are met. Additionally, it includes managing book categories, shelf space, and check-out/return
    processes to reflect a more complex library system.


    A list of available predicates

    1. (on-shelf ?x ?y - book) ;; ?x is on top of ?y on the shelf

    2. (on-table ?x - book) ;; ?x is on the table

    3. (accessible ?x - book) ;; ?x is accessible (not covered)

    4. (hands-free) ;; The hands of the librarian are free

    5. (holding ?x - book) ;; The librarian is holding ?x

    6. (belongs-to-category ?x - book ?cat - category) ;; ?x belongs to the category ?cat

    7. (shelf-empty ?cat - category) ;; The shelf for category ?cat is empty

    8. (shelf-overflow ?cat - category) ;; The shelf for category ?cat is full

    9. (book-request ?book - book) ;; There is a request for book ?book

    10. (return-due ?book - book) ;; Book ?book is due for return

    11. (checked-out ?book - book) ;; Book ?book is checked out


    Action Description: Envision a librarian assisting a patron who wishes to borrow a book. The ''check-out'' action allows
    the librarian to mark a book as checked out, provided it is accessible and not already checked out. This action reflects
    the process of recording the book''s status as borrowed and setting a return due date.


    Action name: check-out



    Your answer:

    '
  sentences:
