- source_sentence: 'Context: Translate the given natural language description into an action schema that includes the parameters,
    preconditions, and effects. Ensure that only the provided predicates are used to construct the preconditions and effects.

    Question: Here is the task.

    A natural language description of the domain

    Domain information: Help the hero to get out of dungeon! A hero woke up in a dungeon full of monsters and traps (perhaps
    the party last night went wrong...) and needs your help to get out.  Here are basic facts for the dungeon domain: - The
    dungeon contains rooms that are **connected** by corridors (dungeon can thus be represented by undirected graph) - each
    room can be **empty**, or can have a **monster** in it, or can have a **trap** in it, or can have a **sword** in it -
    one of the empty rooms is the **goal**: it has an exit, so the hero can escape


    A list of available predicates

    1. (at-hero ?loc - cells) ;;  Hero''s cell location

    2. (at-sword ?s - swords ?loc - cells) ;; Sword cell location

    3. (has-monster ?loc - cells) ;; Indicates if a cell location has a monster

    4. (has-trap ?loc - cells) ;; Indicates if a cell location has a trap

    5. (is-destroyed ?obj) ;; Indicates if a chell or sword has been destroyed

    6. (connected ?from ?to - cells) ;; connects cells

    7. (arm-free) ;; Hero''s hand is free

    8. (holding ?s - swords) ;; Hero''s holding a sword

    9. (trap-disarmed ?loc) ;; It becomes true when a trap is disarmed


    Action Description: Hero can move if the - hero is at current location - cells are connected, - there is no trap in current
    loc, and - destination does not have a trap/monster/has-been-destroyed Effects move the hero, and destroy the original
    cell. No need to destroy the sword.


    Action name: move



    Your answer:

    '
  sentences:
  - "Parameters:\n1. ?from - cells\n2. ?to - cells\n\nPreconditions:\n```\n(and\n    (connected ?from ?to)\n    (at-hero ?from)\n\
    \    (not (is-destroyed ?to))\n    (not (has-trap ?from))\n    (has-trap ?to)\n    (arm-free)\n)\n```\n\nEffects:\n```\n\
    (and\n    (at-hero ?to)\n    (is-destroyed ?from)\n    (not (at-hero ?from))\n)\n```\n"
  - "Parameters:\n1. ?from - cells\n2. ?to - cells\n\nPreconditions:\n```\n(and\n    (is-destroyed ?from)\n    (connected\
