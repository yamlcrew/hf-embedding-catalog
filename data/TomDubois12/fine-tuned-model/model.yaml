      graphene; or (iv) stacking graphene layers one atop the other, the latter of which suffers from interlayer contamination.
      Existing synthesis protocols, however, usually result in graphene with polycrystalline structures. The present study
      investigates bilayer graphene grown by ambient pressure CVD on polycrystalline Cu. Controlling the nucleation in early
      stage growth allows the constituent layers to form single hexagonal crystals. New Raman active modes are shown to result
      from the twist, with the angle determined by transmission electron microscopy. The successful growth of single-crystal
      bilayer graphene provides an attractive jumping-off point for systematic studies of interlayer coupling in misoriented
      few-layer graphene systems with well-defined geometry.
