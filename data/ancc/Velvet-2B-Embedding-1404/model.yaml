- source_sentence: Chi fu un amico di Irénée-Jules Bienaymé?
  sentences:
  - 'Irénée-Jules Bienaymé

    Contribuì notevolmente alla teoria della probabilità, statistica matematica, demografia e statistica sociale. Cominciò
    a studiare nel 1815 presso l''École Polytechnique, la quale venne chiusa nel 1816 per le simpatie pronapoleoniche degli
    studenti. Lavorò in seguito come traduttore di giornali. Nel 1818 divenne lettore di matematica all''accademia militare
    di St. Cry che lasciò nel 1820 per entrare nel Ministero delle Finanze diventando prima ispettore e nel 1834 ispettore
    generale. Durante la rivoluzione del 1848 si ritira per dedicarsi alla ricerca scientifica. Tenne una corrispondenza con
    Quételet ed era amico di A.A. Cournot e Cebicev. Dotato di una forte predisposizione alle controversie, criticò la legge
    dei grandi numeri di Poisson ed ebbe una controversia con Cauchy. Formulò per primo la diseguaglianza di Bienaymé-Cebicev.
    Altri progetti Collegamenti esterni'
  - 'Scarto interquartile

    In statistica lo scarto interquartile (o differenza interquartile o ampiezza interquartile, in inglese interquartile range
    o IQR) è la differenza tra il terzo e il primo quartile, ovvero l''ampiezza della fascia di valori che contiene la metà
    "centrale" dei valori osservati. Lo scarto interquartile è un indice di dispersione, cioè una misura di quanto i valori
    si allontanino da un valore centrale. Viene utilizzato nel disegno del diagramma box-plot. Scarto interquartile di variabili
    aleatorie Lo scarto interquartile di una variabile aleatoria si ottiene tramite la funzione di ripartizione, come differenza
    Per una variabile casuale normale lo scarto interquartile è circa . Per una variabile casuale di Cauchy lo scarto interquartile
    è . Note Voci correlate Quartile Indice di dispersione Campo di variazione Mediana (statistica) Diagramma a scatola e
    baffi Altri progetti Indici di dispersione'
  - Eventi, invenzioni e scoperte Primo sacco di Roma da parte dei Visigoti guidati da Alarico e il fratello Ataulfo Personaggi
    Altri progetti 02
- source_sentence: 'Il ritorno di Rita Dalla Chiesa: "Un programma per lei su Rete4"'
  sentences:
  - Dopo un periodo decisamente negativo dal punto di vista professionale, per Rita Dalla Chiesa potrebbe essere finalmente
    arrivato il momento di voltare pagina. Stando a quanto scritto da Dagospia – come riporta Excite Tv – la conduttrice potrebbe
    infatti tornare sul piccolo schermo, al timone di un nuovo programma su Rete4, che parlerebbe di Santi e miracoli. Tutto
    ufficioso, chiaramente, e da prendere con le pinze, ma Dagospia fornisce dettagli precisi, come il fatto che la Dalla
    Chiesa avrebbe sconfitto la concorrenza di Francesca Barra, che dovrebbe condurre un programma su Italia 1.
  - 'Chi vincerà Masterchef ? Con quattro concorrenti in gara ormai azzeccare il nome è statisticamente più semplice, ma da
    Dagospia arriva addirittura l''ordine d''arrivo . "Lady Coratella", colei che cura per il sito scandalistico la rubrica
    su chef e mondo della cucina, ne è sicura: dopo la sindacalista bresciana Lucia Giorgi , uscirà Maradona Youssef ( come
    ha già "spoilerato" l''ex concorrente Rubina Rovini, tra l''altro ). E tra i tre restanti la medaglia di bronzo andrà
    al macellaio Lorenzo De Guio , mentre nella finalissima si batteranno la piemontese Alida Gotta e la romagnola Erica Liverani
    . E sarà proprio la seconda a diventare la quinta Masterchef d''Italia. "Nonostante alcuni errori clamorosi...", aggiunge
    l''implacabile Lady Coratella.'
  - Furto nella casa del magistrato Francesca Claris Appiani , sorella dell’avvocato Lorenzo , una delle vittime della strage
    avvenuta all’interno del Tribunale di Milano il 9 aprile scorso. I malviventi hanno svaligiato l’appartamento, a Milano,
    approfittando dell’assenza dell’intera famiglia Claris Appiani, all’Elba per la sepoltura di Lorenzo. "Provo disgusto
    per questi sciacalli", ha commentato il padre Aldo, secondo il quale le chiavi di casa del figlio non si trovano dal giorno
    dell’omicidio. "Dopo la morte di mio figlio, un dolore terribile, cosa vuole che mi importi di un furto...", ha aggiunto
    Aldo Claris Appiani. "Il mio è un discorso sull’umanità. Sapevano che eravamo tutti all’Elba per i funerali di Lorenzo
    e hanno approfittato della nostra assenza per entrare in casa. Provo disgusto per questi sciacalli". Aldo Claris Appiani
    non esclude che i ladri siano entrati anche in casa dello stesso Lorenzo, magari per prendere le chiavi di casa di Francesca,
    "visto che ognuno di noi, in famiglia, ha le chiavi di tutti gli altri. Dal giorno della strage, non abbiamo mai trovato
    le chiavi dell’appartamento di mio figlio. Le abbiamo cercate dappertutto, ma non le avevano neanche i carabinieri. Una
    strana coincidenza".
- source_sentence: 'Peppe Servillo a Marsciano: anteprima del decennale di "Musica per i borghi"'
  sentences:
  - 'Venerdì 2 dicembre alle 21,15 il Teatro Concordia di Marsciano (Perugia) ospita la tradizionale festa-concerto natalizia
    per offrire un'' anteprima del festival di musica etno-popolare che nel 2012 celebra la X edizione. E Peppe Servillo ,
    l''eclettico artista napoletano voce del quartetto degli Avion Travel e attore, uno dei personaggi più interessanti della
    cultura italiana, ritorna a Musica per i borghi dopo il grande successo ottenuto questa estate a Villa Fidelia di Spello
    nel concerto-evento Armonie Italiane , concepito e realizzato per celebrare i 150 anni dell’Unità d’Italia, tra gli appuntamenti
    più apprezzati della IX edizione del festival. Al Teatro Concordia di Marsciano il cantante degli Avion Travel si esibirà
    in uno spettacolo con un repertorio di melodie senza tempo accompagnate dal pianoforte a coda suonato dal pianista argentino
    Natalio Mangalavite . Lo spettacolo organizzato in sinergia con il Comune di Marsciano , ha la supervisione del maestro
    Peppe Vessicchio , direttore artistico del festival con cui il cantante napoletano vanta una lunga collaborazione professionale,
    e del maestro Salvatore Corazza , produttore esecutivo. Informazioni: www.musicaperiborghi.it'
  - '"È lei il mio unico amore". Mario Balotelli ha messo la testa a posto? Di certo ha iniziato a comportarsi da padre modello
    con la figlia Pia, nata tre anni fa dalla relazione con l''ex compagna, Raffaella Fico. Due giorni fa il 24enne attaccante
    del Liverpool ha infatti pubblicato su Instagram una foto della bimba davanti alla tv. "Peppa pig time! With my real Love"
    ("È l''ora di Peppa Pig! Con il mio vero Amore"), ha scritto. Peppa pig time! With my real Love Una foto pubblicata da
    Mario Balotelli (@mb459) in data: Gen 14, 2015 at 9:41 PST'
  - Egregio direttore, sono indignata e spaventata. Stamane (ieri, ndr), stazione di Roma. Treno delle 12.50 Freccia Argento
    per Venezia. Sul marciapiede del binario una cinquantina di zingari strappavano letteralmente i bagagli di mano ai turisti
    che, intimoriti, accettavano di farsi aiutare. A un turista che non ha accettato hanno sputato sulla gamba. Nella carrozza
    di prima classe ho trovato 30, dico 30, di questi signori ai quali ho urlato di scendere immediatamente. Mi hanno minacciata,
    stessa sorte a un'addetta delle ferrovie che li cacciava dai binari. È intervenuta la polizia che ci ha detto di averne
    altri 50 in ufficio da identificare. Che sta succedendo?
- source_sentence: Yishai Schlissel, 40 anni, sta scontando l'ergastolo per aver ucciso una ragazza di 16 anni e accoltellato
    altre persone alla sfilata del 2015. Il fratello Michael è stato arrestato mercoledì e altri membri della famiglia sono
    stati fermati brevemente prima della sfilata, dicono i media israeliani. Le notizie del sospetto complotto sono arrivate
    ore prima dell'inizio della marcia di quest'anno. I media israeliani hanno detto che centinaia di poliziotti saranno in
    servizio per garantire la sua morte pacifica. Schlissel ha pugnalato sei persone durante la marcia del 2015. Uno di loro,
    Shira Banki, è morto in ospedale. Ha detto che aveva fatto la volontà di Dio quando ha pugnalato le sue vittime. All'epoca
    aveva appena terminato un periodo di 10 anni per un attacco simile nel 2005. Alla condanna del mese scorso la corte ha
    criticato la polizia, dicendo che avevano saputo che Schlissel aveva presentato il pericolo ma non ha agito correttamente.
    L'evento Gay Pride a Gerusalemme è stata a lungo fonte di tensione tra la comunità secolare e i suoi gruppi ortodossi.
  sentences:
  - Le domande di azioni penali private a seguito di due diversi incidenti stradali mortali a Glasgow saranno prese in considerazione
    dai giudici il mese prossimo.
  - La polizia israeliana ha accusato un ebreo ultra ortodosso anti-gay carcerato di aver pianificato un altro attacco all'annuale
    marcia del Gay Pride di Gerusalemme dalla sua cella.
  - L'etiope finisce quarto e ora dipenderà da un invito della federazione a partecipare ai Giochi di Londra
- source_sentence: Quali record nazionali ha raggiunto Lisa Gelius nei 80 metri ostacoli?
  sentences:
  - "3045 Alois\n3045 Alois è un asteroide della fascia principale. Scoperto nel 1984, presenta un'orbita caratterizzata da\
    \ un semiasse maggiore pari a 3,1275527 UA e da un'eccentricità di 0,1166606, inclinata di 3,34507° rispetto all'eclittica.\n\
    \nCollegamenti esterni \n\nCorpi celesti scoperti nel 1984\nAlois"
  - "Lisa Gelius\n\n\nBiografia \nNel 1930 vinse una medaglia d'oro, una d'argento e una di bronzo ai Giochi mondiali femminili\
    \ di Praga, rispettivamente nella staffetta 4×100 metri, 60 metri piani e 100 metri piani. Quattro anni dopo fu medaglia\
    \ d'oro nel lancio del giavellotto ai Giochi mondiali femminili di Londra.\n\nNel 1938 divenne la prima campionessa europea\
    \ del lancio del giavellotto e fu medaglia d'argento negli 80 metri ostacoli ai campionati europei di atletica leggera\
    \ di Vienna.\n\nRecord nazionali \n 80 metri ostacoli: 11\"6  ( Braslaŭ, 30 luglio 1938)\n\nPalmarès\n\nVoci correlate\
    \ \n Progressione del record mondiale degli 80 metri ostacoli\n\nCollegamenti esterni"
  - 'Bhumisparsamudra

    Bhumisparsamudra (bhūmisparśamudrā) è una mudrā della dottrina buddhista realizzata con le mani e le dita. Significa "toccare
    la terra" e deriva dall''esperienza di Gautama Buddha durante l''illuminazione. È conosciuto anche come il gesto del testimone
    della terra.


    Simbologia del mudra

    Durante la sua liberazione, Gautama Buddha assunse la bhūmisparśamudrā toccando la terra con la mano in modo da simboleggiare
    il contatto con la divinità della terra. Con questo gesto, egli dimostrò l''ottenimento del risveglio.


    Posizione

    La mudrā si realizza con entrambe le mani. Si pone la mano destra appoggiata sul ginocchio con il palmo verso il basso
    e con la punta delle dita che sfiorano terra. La mano sinistra è appoggiata sulle gambe davanti al pube con il palmo verso
    l''alto.


    Yoga'
