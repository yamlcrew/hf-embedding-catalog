      जानु पर्ने व्यवस्था लिङ्गका आधारमा स्पष्ट रुपमा भेदभाव गरिएको देखिएको र सो व्यवस्था संविधानको धारा १३ द्वारा प्रदत्त
      समानताको हकसँग प्रत्यक्षरुपमा बाझिएकोले अमान्य र बदर घोषित हुनुपर्ने निवेदकको दावीलाई अदालतले समर्थन गरेको छ। अदालतले
      ICCPR को धारा २६ लाई पनि विचार गर्‍यो, जसले कानूनद्वारा लिङ्गको आधारमा हुने भेदभाव निषेध गर्नुपर्ने उल्लेख छ। अदालतले
      यो व्यवस्था नेपाल कानून सरह लागू हुने बताएको छ। अदालतले सम्बन्ध विच्छेदको प्रक्रियामा लोग्नेलाई पहिला स्थानीय निकायमा
      निवेदन गर्नुपर्ने र स्थानीय निकायमा मेलमिलाप हुन नसकेमा मात्र स्थानीय निकायले सम्बन्ध विच्छेदको लागि अदालतमा पठाउने
      व्यवस्थाको कुनै औचित्य नदेखेको उल्लेख गरेको छ। अदालतले महिलालाई सशक्तिकरण गर्ने कुरा जस्तै शिक्षा, स्वास्थ्य, रोजगारी,
      खाना, आवास जस्ता विषयमा राष्ट्रले संविधानको धारा १३(३) अनुसार विभेदको व्यवस्था गर्न सक्ने तर सम्बन्ध विच्छेद गर्ने महिलालाई
      सोझै अदालत जान पाउने तर पुरुषलाई सम्बन्धित गाउँ विकास समिति वा नगरपालिकामा पठाउने व्यवस्थाले महिलालाई सशक्तिकरण नगर्ने
      बरु पुरुषलाई भेदभाव हुने ठहर गरेको छ। गाउँ विकास समिति वा नगरपालिकामा पठाउने र गाउँ विकास समिति वा नगरपालिकाले एक वर्षको
      अवधिसम्म दुबै पक्षलाई सम्झाउने मिलाउने व्यवस्थाको उद्देश्य सकभर मेलमिलाप गराउने अर्थात् Mediation गर्ने भएकोले हाल Court
      referred mediation सम्बन्धी कानूनी व्यवस्था भएको सन्दर्भमा मेलमिलापको लागि आवश्यक देखे अदालतले नै मेलमिलापको लागि पठाउन
      सक्ने हुँदा पुरुषले सम्बन्ध विच्छेद गर्नु पर्दा नगरपालिका वा गा.वि.स.मा जाने व्यवस्थाको कुनै औचित्य नदेखिएको अदालतले
      उल्लेख गरेको छ।
    - अदालतले सार्वजनिक सुरक्षा ऐन, २०४६ को दफा ३.१ बमोजिम पक्राउ गर्दा उचित र पर्याप्त आधार हुनुपर्ने तर यहाँ त्यस्तो आधार
      नदेखिएको उल्लेख गरेको छ। प्रहरी प्रतिवेदनमा अवाच्छित तत्वबाट रामचन्द्र पौडेलको जीउ ज्यानमा क्षति हुन सक्ने भन्ने उल्लेख
      भए पनि नागरिकलाई नजरबन्दमा राखी जीउ ज्यान जोगाउने भन्ने अवधारणा कानूनले स्वीकार नगर्ने बताएको छ। गृह मन्त्रालयको निर्णयमा
      पनि नजरबन्दमा राख्नुपर्ने आधार र कारण नखुलेको हुँदा निवेदकलाई कानूनको व्यवस्था अनुसार नजरबन्दमा राखेको नदेखिएकोले गैरकानूनी
      थुनाबाट मुक्त गर्न बन्दीप्रत्यक्षीकरणको आदेश जारी गरिएको छ।
