      Bir aynî hak yolsuz olarak tescil edilmiş veya bir tescil yolsuz olarak terkin olunmuş ya da değiştirilmiş ise, bu yüzden
      aynî hakkı zedelenen kimse tapu sicilinin düzeltilmesini dava edebilir. İyiniyetli üçüncü kişilerin bu tescile dayanarak
      kazandıkları aynî haklar ve her türlü tazminat istemi saklıdır.


      II. Aynî hakların sona ermesi'
    - 'Türk Medeni Kanunu | MADDE 30


      Doğum ve ölüm, nüfus sicilindeki kayıtlarla ispat olunur. Nüfus sicilinde bir kayıt yoksa veya bulunan kaydın doğru
      olmadığı anlaşılırsa, gerçek durum her türlü kanıtla ispat edilebilir. b.


      Ölüm karinesi'
    - 'Türk Medeni Kanunu | MADDE 1014


      Bir tescilin terkin edilmesi veya değiştirilmesi, ancak bu kaydın kendilerine hak sağladığı kimselerin yazılı beyanı
      üzerine yapılabilir.


      2. Yetkinin ve sebebin belirlenmesi'
  - source_sentence: Komisyoncu kendi başına alıcı veya satıcı olarak hareket edebiliyorsa ve bunu müvekkiline bildirirse,
      bu işlem kimin adına yapılmış olur?
    sentences:
    - 'Türk Borçlar Kanunu | MADDE 544


      Komisyoncu, kendisinin doğrudan doğruya alıcı veya satıcı olabildiği durumlarda, sözleşmenin diğer tarafını göstermeksizin
      vekâletin yerine getirildiğini vekâlet verene bildirirse, işlemi kendisiyle yapmış sayılır. c.


      İşlemi kendisiyle yapma hakkının düşmesi'
    - 'Türk Borçlar Kanunu | MADDE 533


      Komisyoncu, yaptığı iş hakkında vekâlet vereni bilgilendirmek ve özellikle talimatının yerine getirildiğini kendisine
      hemen bildirmekle yükümlüdür. Vekâlet verenin talimatı olmadıkça komisyoncu, sözleşmenin konusunu oluşturan şeyleri
      sigorta ettirmekle yükümlü değildir.


      2. Özen borcu'
    - 'Türk Borçlar Kanunu | MADDE 543


      Borsada kayıtlı veya piyasa fiyatı bulunan kambiyo senetleri veya diğer kıymetli evrakı ya da ticari malları satmaya
      veya satın almaya yetkili kılınan komisyoncu, vekâlet veren tarafından aksine talimat verilmemişse, satın alacağı mal
      yerine kendi mallarını satabilir veya satacağı malı kendisi için satın alabilir. Bu hâllerde, komisyoncunun kendisiyle
      işlem yaptığı andaki değerler esas alınır; komisyoncunun, komisyon işlerinde alışılmış olan ücret ve giderlerini, bu
      hâllerde bile isteme hakkı vardır. Komisyoncu, bu tür bir işlemin yapıldığını aynı gün vekâlet verene bildirmek zorundadır.
      Diğer hâllerde satış hükümleri uygulanır. b.


      İşlemi kendisiyle yapmış sayılma'
    - 'Türk Borçlar Kanunu | MADDE 536


      Komisyoncu, vekâlet verenin izni olmaksızın malı veresiye satar veya malı teslim almadan bedelini öderse, bundan doğan
      zarara katlanmak zorundadır. Ancak, vekâlet veren yasaklamadıkça, malı satış yerindeki ticari teamüle göre veresiye
      de satabilir.


      5. Komisyoncunun garantisi'
    - 'Türk Borçlar Kanunu | MADDE 540


      Komisyoncu, vekâlet verene karşı dürüstlük kurallarına aykırı davranır, özellikle ona satın aldığından fazla veya sattığından
      eksik bir bedel bildirirse, ücret alma hakkını kaybeder. Bedelin gerçekleşen bedelden farklı gösterilmesi durumunda
      vekâlet veren, komisyoncuyu gerçekleşen bedel üzerinden satılanın alıcısı veya satıcısı sayma hakkına sahiptir.


      3. Hapis hakkı'
    - 'Türk Borçlar Kanunu | MADDE 541


      Komisyoncunun, sattığı malın bedeli ve satın aldığı mal üzerinde hapis hakkı vardır.


      4. Malın açık artırmayla satılması'
  - source_sentence: Cumhurbaşkanına yumruk atan ya da bıçakla yaralayan bir kişi için normal ceza miktarı ne kadar arttırılır?
    sentences:
    - 'Türk Ceza Kanunu | MADDE 130


      (1) Bir kimsenin öldükten sonra hatırasına en az üç kişiyle ihtilat ederek hakaret eden kişi, üç aydan iki yıla kadar
      hapis veya adlî para cezası ile cezalandırılır. Ceza, hakaretin alenen işlenmesi halinde, altıda biri oranında artırılır.
      (2) Bir ölünün kısmen veya tamamen ceset veya kemiklerini alan veya ceset veya kemikler hakkında tahkir edici fiillerde
      bulunan kişi, üç aydan iki yıla kadar hapis cezası ile cezalandırılır.


      Soruşturma ve kovuşturma koşulu'
    - 'Türk Ceza Kanunu | MADDE 299


      (1) Cumhurbaşkanına hakaret eden kişi, bir yıldan dört yıla kadar hapis cezası ile cezalandırılır. (2) (Değişik: 29/6/2005
      – 5377/35 md.) Suçun alenen işlenmesi hâlinde, verilecek ceza altıda biri oranında artırılır. (3) Bu suçtan dolayı kovuşturma
      yapılması, Adalet Bakanının iznine bağlıdır.


      Devletin egemenlik alametlerini aşağılama'
    - 'Türk Ceza Kanunu | MADDE 129


      (1) Hakaret suçunun haksız bir fiile tepki olarak işlenmesi halinde, verilecek ceza üçte birine kadar indirilebileceği
      gibi, ceza vermekten de vazgeçilebilir. (2) Bu suçun, kasten yaralama suçuna tepki olarak işlenmesi halinde, kişiye
      ceza verilmez. (3) Hakaret suçunun karşılıklı olarak işlenmesi halinde, olayın mahiyetine göre, taraflardan her ikisi
      veya biri hakkında verilecek ceza üçte birine kadar indirilebileceği gibi, ceza vermekten de vazgeçilebilir.


      Kişinin hatırasına hakaret'
    - 'Türk Ceza Kanunu | MADDE 310


      (1) Cumhurbaşkanına suikastte bulunan kişi, ağırlaştırılmış müebbet hapis cezası ile cezalandırılır. Bu fiile teşebbüs
      edilmesi halinde de suç tamamlanmış gibi cezaya hükmolunur. (2) Cumhurbaşkanına karşı diğer fiili saldırılarda bulunan
      kimse hakkında, ilgili suça ilişkin ceza yarı oranında artırılarak hükmolunur. Ancak, bu suretle verilecek ceza beş
      yıldan az olamaz.


      Yasama organına karşı suç'
    - 'Türk Ceza Kanunu | MADDE 340


      (1) Yabancı devletlerden birinin başkanına karşı bir suç işleyen kişiye verilecek ceza, sekizde biri oranında artırılır.
      Suçun müebbet hapis cezasını gerektirmesi halinde, ağırlaştırılmış müebbet hapis cezasına hükmolunur. (2) Fiil, soruşturulması
      ve kovuşturulması şikayete bağlı suçlardan ise, soruşturma ve kovuşturma yabancı devletin şikayetine bağlıdır.


      Yabancı devlet bayrağına karşı hakaret'
    - 'Türk Ceza Kanunu | MADDE 265


      (1) Kamu görevlisine karşı görevini yapmasını engellemek amacıyla, cebir veya tehdit kullanan kişi, altı aydan üç yıla
      kadar hapis cezası ile cezalandırılır. (2) Suçun yargı görevi yapan kişilere karşı işlenmesi halinde, iki yıldan dört
      yıla kadar hapis cezasına hükmolunur. (3) Suçun, kişinin kendisini tanınmayacak bir hale koyması suretiyle veya birden
      fazla kişi tarafından birlikte işlenmesi halinde, verilecek ceza üçte biri oranında artırılır. (4) Suçun, silahla ya
      da var olan veya var sayılan suç örgütlerinin oluşturdukları korkutucu güçten yararlanılarak işlenmesi halinde, yukarıdaki
      fıkralara göre verilecek ceza yarı oranında artırılır. (5) Bu suçun işlenmesi sırasında kasten yaralama suçunun neticesi
      sebebiyle ağırlaşmış hallerinin gerçekleşmesi durumunda, ayrıca kasten yaralama suçuna ilişkin hükümler uygulanır.


      Kamu görevine ait araç ve gereçleri suçta kullanma'
  - source_sentence: Banka gibi taşınmaz rehni işletme olarak yapan bir kuruluş, müşterisinden aldığı evi teminat göstererek
      tahvil çıkarmak istiyor. Bu işi yapabilmesi için önce ne yapması gerekir?
    sentences:
    - 'Türk Medeni Kanunu | MADDE 850


      Taşınmaz rehni, ancak ipotek, ipotekli borç senedi veya irat senedi şeklinde kurulabilir.


      II. Güvence altına alınan alacak 1. Ana para'
    - 'Türk Medeni Kanunu | MADDE 970


      İşletme olarak taşınmaz rehni karşılığında ödünç verme işiyle uğraşmak üzere yetkili makamdan izin alanlar, özel bir
      rehin sözleşmesi ve teslim yükümlülüğü olmasa bile, taşınmaz rehniyle güvence altına alınmış alacakları ile cari işlerinden
      doğan alacaklarını karşılık göstererek rehinli tahvil çıkarabilirler.


      B. Şekli'
    - 'Türk Medeni Kanunu | MADDE 962


      İşletme olarak taşınır rehni karşılığında ödünç verme işiyle uğraşmak isteyenler, yetkili makamdan izin almak zorundadırlar.


      II. Süre'
    - 'Türk Medeni Kanunu | MADDE 972


      Tahvil çıkaracaklar ile tahvil çıkarmaya ilişkin koşullar ve çıkarma izni vermeye yetkili makam özel kanunla belirlenir.


      ÜÇÜNCÜ KISIM ZİLYETLİK VE TAPU SİCİLİ BİRİNCİ BÖLÜM ZİLYETLİK A. Zilyetlik kavramı ve türleri I. Kavram'
    - 'Türk Medeni Kanunu | MADDE 898


      İpotekli borç senedi, taşınmaz rehniyle güvence altına alınmış kişisel bir alacak meydana getirir.


      II. Değer biçilmesi'
    - 'Türk Medeni Kanunu | MADDE 930


      Nama veya hamile yazılı tahviller, aşağıdaki hâllerde taşınmaz rehniyle güvence altına alınabilir: 1. Ödüncün tamamı
      için ipotek veya ipotekli borç senedi yoluyla rehin kurulması ve alacaklılar ile borçlu için ortak bir temsilcinin atanması,
      2. Tahvil çıkarmayı üzerine alan kurum yararına ödüncün tamamı için taşınmaz rehni kurulması ve bu rehinli alacağın
      da tahvil alacaklıları yararına rehnedilmesi.


      B. Seri hâlinde rehin senedi çıkarılması I. Genel olarak'
