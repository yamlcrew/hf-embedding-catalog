  chat_template_jinja: "{#- Unsloth template fixes #}\n{#- Default system message if no system prompt is passed. #}\n{%- set\
    \ default_system_message = 'You are Ministral-3-3B-Instruct-2512, a Large Language Model (LLM) created by Mistral AI,\
    \ a French startup headquartered in Paris.\\nYou power an AI assistant called Le Chat.\\nYour knowledge base was last\
    \ updated on 2023-10-01.\\nThe current date is {today}.\\n\\nWhen you\\'re not sure about some information or when the\
    \ user\\'s request requires up-to-date or specific data, you must use the available tools to fetch the information. Do\
    \ not hesitate to use tools whenever they can provide a more accurate or complete response. If no relevant tools are available,\
    \ then clearly state that you don\\'t have the information and avoid making up anything.\\nIf the user\\'s question is\
    \ not clear, ambiguous, or does not provide enough context for you to accurately answer the question, you do not try to\
    \ answer it right away and you rather ask the user to clarify their request (e.g. \"What are some good restaurants around\
    \ me?\" => \"Where are you?\" or \"When is the next flight to Tokyo\" => \"Where do you travel from?\").\\nYou are always\
    \ very attentive to dates, in particular you try to resolve dates (e.g. \"yesterday\" is {yesterday}) and when asked about\
    \ information at specific dates, you discard information that is at another date.\\nYou follow these instructions in all\
    \ languages, and always respond to the user in the language they use or request.\\nNext sections describe the capabilities\
    \ that you have.\\n\\n# WEB BROWSING INSTRUCTIONS\\n\\nYou cannot perform any web search or access internet to open URLs,\
    \ links etc. If it seems like the user is expecting you to do so, you clarify the situation and ask the user to copy paste\
    \ the text directly in the chat.\\n\\n# MULTI-MODAL INSTRUCTIONS\\n\\nYou have the ability to read images, but you cannot\
    \ generate images. You also cannot transcribe audio files or videos.\\nYou cannot read nor transcribe audio files or videos.\\\
    n\\n# TOOL CALLING INSTRUCTIONS\\n\\nYou may have access to tools that you can use to fetch information or perform actions.\
    \ You must use these tools in the following situations:\\n\\n1. When the request requires up-to-date information.\\n2.\
    \ When the request requires specific data that you do not have in your knowledge base.\\n3. When the request involves\
    \ actions that you cannot perform without tools.\\n\\nAlways prioritize using tools to provide the most accurate and helpful\
    \ response. If tools are not available, inform the user that you cannot perform the requested action at the moment.' %}\n\
    \n{#- Begin of sequence token. #}\n{{- bos_token }}\n\n{#- Handle system prompt if it exists. #}\n{#- System prompt supports\
    \ text content or text chunks. #}\n{%- if messages[0]['role'] == 'system' %}\n    {{- '[SYSTEM_PROMPT]' -}}\n    {%- if\
    \ messages[0]['content'] is string %}\n        {{- messages[0]['content'] -}}\n    {%- else %}        \n        {%- for\
    \ block in messages[0]['content'] %}\n            {%- if block['type'] == 'text' %}\n                {{- block['text']\
    \ }}\n            {%- else %}\n                {{- raise_exception('Only text chunks are supported in system message contents.')\
    \ }}\n            {%- endif %}\n        {%- endfor %}\n    {%- endif %}\n    {{- '[/SYSTEM_PROMPT]' -}}\n    {%- set loop_messages\
    \ = messages[1:] %}\n{%- else %}\n    {%- set loop_messages = messages %}\n    {%- if default_system_message != '' %}\n\
    \        {{- '[SYSTEM_PROMPT]' + default_system_message + '[/SYSTEM_PROMPT]' }}\n    {%- endif %}\n{%- endif %}\n\n\n\
    {#- Tools definition #}\n{%- set tools_definition = '' %}\n{%- set has_tools = false %}\n{%- if tools is defined and tools\
    \ is not none and tools|length > 0 %}\n    {%- set has_tools = true %}\n    {%- set tools_definition = '[AVAILABLE_TOOLS]'\
    \ + (tools| tojson) + '[/AVAILABLE_TOOLS]' %}\n    {{- tools_definition }}\n{%- endif %}\n\n{#- Checks for alternating\
    \ user/assistant messages. #}\n{%- set ns = namespace(index=0) %}\n{%- for message in loop_messages %}\n    {%- if message.role\
    \ == 'user' or (message.role == 'assistant' and (message.tool_calls is not defined or message.tool_calls is none or message.tool_calls\
    \ | length == 0)) %}\n        {%- if (message['role'] == 'user') != (ns.index % 2 == 0) %}\n            {{- raise_exception('After\
    \ the optional system message, conversation roles must alternate user and assistant roles except for tool calls and results.')\
    \ }}\n        {%- endif %}\n        {%- set ns.index = ns.index + 1 %}\n    {%- endif %}\n{%- endfor %}\n\n{#- Handle\
    \ conversation messages. #}\n{%- for message in loop_messages %}\n\n    {#- User messages supports text content or text\
    \ and image chunks. #}\n    {%- if message['role'] == 'user' %}\n        {%- if message['content'] is string %}\n    \
    \        {{- '[INST]' + message['content'] + '[/INST]' }}\n        {%- elif message['content'] | length > 0 %}\n     \
    \       {{- '[INST]' }}\n            {%- if message['content'] | length == 2 %}\n                {%- set blocks = message['content']\
    \ | sort(attribute='type') %}\n            {%- else %}\n                {%- set blocks = message['content'] %}\n     \
    \       {%- endif %}\n            {%- for block in blocks %}\n                {%- if block['type'] == 'text' %}\n    \
    \                {{- block['text'] }}\n                {%- elif block['type'] in ['image', 'image_url'] %}\n         \
    \           {{- '[IMG]' }}\n                {%- else %}\n                    {{- raise_exception('Only text, image and\
    \ image_url chunks are supported in user message content.') }}\n                {%- endif %}\n            {%- endfor %}\n\
    \            {{- '[/INST]' }}\n        {%- else %}\n            {{- raise_exception('User message must have a string or\
    \ a list of chunks in content') }}\n        {%- endif %}\n\n    {#- Assistant messages supports text content or text and\
    \ image chunks. #}\n    {%- elif message['role'] == 'assistant' %}\n\n        {%- if message['content'] is string %}\n\
    \            {{- message['content'] }}\n        {%- elif message['content'] is iterable and message['content'] | length\
    \ > 0 %}\n            {%- for block in message['content'] %}\n                {%- if block['type'] == 'text' %}\n    \
    \                {{- block['text'] }}\n                {%- else %}\n                    {{- raise_exception('Only text\
    \ chunks are supported in assistant message contents.') }}\n                {%- endif %}\n            {%- endfor %}\n\
    \        {%- endif %}\n        \n        {%- if message['tool_calls'] is defined and message['tool_calls'] is not none\
    \ and message['tool_calls']|length > 0 %}\n            {%- for tool in message['tool_calls'] %}\n                {%- set\
    \ arguments = tool['function']['arguments'] %}\n                {%- if arguments is not string %}\n                  \
    \  {%- set arguments = arguments|tojson|safe %}\n                {%- elif arguments == '' %}\n                    {%-\
    \ set arguments = '{}' %}\n                {%- endif %}\n                {{- '[TOOL_CALLS]' + tool['function']['name']\
    \ + '[ARGS]' + arguments }}\n            {%- endfor %}\n        {%- endif %}\n\n        {#- End of sequence token for\
    \ each assistant messages. #}\n        {{- eos_token }}\n\n    {#- Tool messages only supports text content. #}\n    {%-\
    \ elif message['role'] == 'tool' %}\n        {{- '[TOOL_RESULTS]' + message['content']|string + '[/TOOL_RESULTS]' }}\n\
    \n    {#- Raise exception for unsupported roles. #}\n    {%- else %}\n        {{- raise_exception('Only user, assistant\
    \ and tool roles are supported, got ' + message['role']) }}\n    {%- endif %}\n{%- endfor %}\n\n{#- Copyright 2025-present\
    \ Unsloth. Apache 2.0 License. #}"
