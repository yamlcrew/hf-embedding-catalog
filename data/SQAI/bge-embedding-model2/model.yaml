widgetData:
- source_sentence: threshold.highLuxThreshold
  sentences:
  - '"Can you provide the timestamp of the last update to the threshold settings, and detail any faults in the lux module
    related to light level sensing and control for the streetlight on this specific street name? I also want to know the longitude
    of the streetlight. And also, can you tell me what type of dimming schedule is applied to the streetlight, the type of
    port used for its dimming controls, and the total energy it has consumed, recorded in kilowatt-hours. Lastly, could you
    also provide the timestamp of the recorded streetlighting error, and confirm the status of the relay responsible for turning
    this streetlight on and off, as I am suspecting it might be sticking?"'
  - '"Can you provide me with the unique streetlight identifier, upper lux level for managing light intensity, a brief description,
    and the delta or height of the grid area occupied by a group of streetlights? Also, can you note the AC voltage supply
    for these streetlights, any issues with communication related to their lux sensors, and the count of how many times each
    streetlight has been switched on? Please ensure that the data is constrained to just those that can be determined with
    the unique streetlight identifier I provided."'
  - '"What was the last recorded data or action timestamp of the streetlight located at the specific longitude, and in which
    time zone is it situated? Could you also provide information on its default dimming level and the maximum power usage
    threshold above which indicates potential faults? Are there any identified faults in the lux module impacting light level
    sensing and control? Additionally, what are the minimum longitude and delta or height for the grid area occupied by this
    group of streetlights and could you specify the network time received from the central control for synchronization purposes?"'
- source_sentence: asset.geoZone
  sentences:
  - '"Could you check the status of the streetlight with the unique identifier, located on the named street, specifically
    looking at any records of complete loss of power which could indicate supply issues or damage? Also, could you provide
    details on the instances where the voltage under load is lower than expected, as well as instances of lower than expected
    power consumption, which could signal potential electrical or hardware issues? I''m also interested in understanding if
    there are any faults in our link control mechanism managing multiple streetlights. Additionally, could you tell me the
    current drawn by this specific streetlight when it was lower than expected and the current dimming level of the streetlight
    in operation? Lastly, could you specify the maximum safe voltage under load conditions for this light and verify whether
    its broadcast subscription used for receiving control signals is doing fine?"'
  - '"Can you provide me with the details regarding a specific streetlight on Main Street, particularly the minimum current
    level below which it''s considered abnormal, its power factor indicating efficient power usage, total operational hours
    logged, any incidences where power consumption was higher than expected possibly due to potential faults, its geoZone,
    X-coordinate in the grid layout, minimum operational voltage under load conditions, minimum load current that indicates
    suboptimal performance, and the timestamp of the last update made to the threshold settings?"'
  - '"What is the width and height of the grid area occupied by the group of streetlights, type of port used for dimming controls,
    power consumption levels, and what is the safety of the current exceeded on the streetlight? Besides, could you explain
    the high power factor indicating potential overloads or capacitive imbalances?"'
- source_sentence: errors.deviceId
  sentences:
  - '"Can you show me a report of all the streetlights with a unique identifier, which have an internal temperature indicating
    abnormal operating conditions such as voltage supplied being below the safe level, and operating temperature below expected
    limit possibly due to environmental conditions? Can this report also include instances of faults in link control mechanism
    managing multiple streetlights and cases of open circuit in the relay preventing normal operation?"'
  - '"Could you provide information about the streetlight on ''specific street name'', specifically concerning its current
    drawn which appears to be lower than expected, potential issues in the link control mechanism that manages multiple streetlights,
    whether its operating temperature exceeds safe limits thus risking damage, and if its power output is lower than expected?
    Also, could you let me know at what interval this streetlight sends data reports and inform about any other issues detected,
    particularly when the current is below the expected range?"'
  - '"What is the minimum power usage level below which it is considered abnormal for our ''Main Street Lamps'' group of streetlights,
    which are described as a series of LED lamps installed along the main town stretch, and what could be the reasons if the
    power consumption is lower than expected, possibly due to hardware issues? Also, could you give me the description on
    what means when intermittent flashing of the streetlight occurs, indicating instability and tell me about the strength
    of the wireless signal received by the streetlight''s communication module. Could you confirm what control mode switch
    identifier we should use for changing streetlight settings and the highest power factor that is considered optimal for
    streetlight efficiency? Additionally, we discovered issues with group management of streetlights via our central control
    system, and we would like to know the time taken for the streetlight to activate or light up from the command."'
- source_sentence: threshold.lowLoadVoltage
  sentences:
  - '"Could you please show me the latest data recorded or action performed by the streetlight, specifically highlighting
    the control mode switch identifier used for changing its settings, the type of DALI dimming protocol it uses, and the
    type of port used for its dimming controls? Furthermore, has there been any intermittent flashing indicating instability?
    Also, could you provide data on its minimum operational voltage under load conditions, and let me know if its power consumption
    is lower than expected due to potential hardware issues?"

    '
  - '"Can the operator managing the streetlight provide the timestamp of the latest data recorded or action performed by the
    streetlight, details on the minimum operational voltage under load conditions, the current issues with the driver that
    powers and controls the streetlight, why the power output is lower than expected for the streetlight, and what is the
    maximum latitude of the geographic area covered by this group of streetlights?"'
  - '"Can you provide a report that shows all the streetlights in a grid layout with Y-coordinate information, indicating
    whether their control mode setting is on automated or manual, their minimum current level, and instances of communication
    issues between the streetlight''s driver and the control system, as well as instances when the operating temperature fell
    below expected limits, possibly due to environmental conditions?"'
- source_sentence: errors.controllerFault.lowLoadCurrent
  sentences:
  - '"Can you provide me with the current status of the streetlight on ''street name'', specifically in relation to its voltage
    under load, whether it''s lower than expected and how that might be indicating potential electrical issues? Could you
    also give me insight into the current drawn by the streetlight, whether or not the relay is currently on or off, and if
    there are any faults in the lux module that may affect light level sensing and control? Moreover, could you tell me the
    type of dimming schedule applied, the ambient light level detected in lux, the total energy consumed so far recorded in
    kilowatt-hours, and the lower voltage threshold for this streetlight''s efficient operation?"'
  - '"Can you provide a detailed report for the streetlight on [Name of the street for the streetlight in error]? The report
    should include the timestamp of the last recorded error, synchronization time received from the central control, the dimming
    schedule type we''re currently using, and both minimum operational and maximum safe voltage under load conditions. Also,
    indicate the time of the last action was recorded and if there are any reported faults in the metering components affecting
    data reporting. Can you also specify the port type used for dimming controls and whether the power consumption has been
    unusually low due to potential hardware issues?"'
  - '"Can you show me the current status of the relay in the streetlights located at the X-coordinate grid, highlighting any
    faults in the lux module that might be affecting light level sensing and control? Also, could you provide information
    on the current dimming level of these streetlights in operation, the type of dimming schedule applied, and whether the
    voltage is within the upper limit considered safe and efficient for their operation?"'
