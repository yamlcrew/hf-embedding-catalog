widgetData:
- source_sentence: How does the document clarify the company's approach to disclosing environmental legal proceedings?
  sentences:
  - Iron Mountain helps organizations protect their information and reduce storage costs by storing physical records and data
    backup media, offering information management solutions, and providing data center space.
  - In addition, SEC regulations require that we disclose certain environmental proceedings arising under Federal, State or
    local law when a governmental authority is a party and such proceeding involves potential monetary sanctions that the
    Company reasonably believes will exceed a certain threshold ($1 million or more).
  - Servicing software revenues include integrated mortgage servicing solutions, which help automate all areas of the servicing
    process, from loan boarding to final payment or default. Our servicing solutions support first lien mortgages, home equity
    loans and lines of credit on a single platform to manage all servicing processes.
- source_sentence: What was Garmin Ltd.'s net income for the fiscal year ended December 30, 2023?
  sentences:
  - As the rate implicit in the lease is rarely readily determinable, Delta Air Lines uses their incremental borrowing rate,
    which is based on the estimated interest rate for collateralized borrowing over a similar term of the lease at commencement
    date.
  - The acquisition of The Rocket Science Group LLC (Mailchimp) on November 1, 2021, led to its integration into the Small
    Business & Self-Employed segment, with its operations included in the consolidated results from the acquisition date.
  - Garmin Ltd. reported a net income of $1,289,636 for the fiscal year ended December 30, 2023.
- source_sentence: What online resources does the company provide for investors and the public?
  sentences:
  - As of the date of this report, we do not believe any pending legal proceedings to which we or our subsidiaries are subject
    are required to be disclosed as material legal proceedings pursuant to this item.
  - We make available on or through our website certain reports and amendments to those reports that we file with or furnish
    to the Securities and Exchange Commission (“SEC”) in accordance with the Securities Exchange Act of 1934, as amended ('Exchange
    Act')... In addition, we routinely post on the 'Investors' page of our website news releases, announcements and other
    statements about our business and results of operations, some of which may contain information that may be deemed material
    to investors.
  - The balance at December 31, 2023 for Enphase Energy, Inc. showed a total stockholders' equity of $983,624.
- source_sentence: What was the cash, cash equivalents, and restricted cash at the beginning of the period as noted for GameStop
    Corp.?
  sentences:
  - 'The Company manufactures and sells fountain syrups to authorized fountain wholesalers, who then sell or deliver them
    on the Company''s behalf to retailers such as restaurants. '
  - Holdings was incorporated under the laws of the state of Delaware on June 6, 2007.
  - Cash, cash IPT Counselor training before starting to their work. equivalents and restricted cash at beginning of period
    for GameStop Corp. was reported as $1,319.9 million.
- source_sentence: How many participants has the MARC program had since its inception?
  sentences:
  - The information required by Item 8 is included in Item 15(a) of the Annual Report.
  - The Company’s warranty obligation provides for the replacement of microinverter and storage products that fail during
    the product’s warranty term of 10 to 25 years.
  - The MARC program, launched in 2017, is active in over 35 Chevron locations on six continents with over 5,000 participants
    since inception.
