    - 'Getting Ready THE IMPORTANCE OF FOREST GOVERNANCE TO THE REDD+ READINESS PROCESS


      Strengthening forest governance will be an essential component of the activities implemented by countries seeking to
      achieve significant and lasting emission reductions through REDD+. Poor forest governance is often characterized by
      weak capacity to manage natural resources, lack of decision-maker accountability to impacted stakeholders, and lack
      of public access to information about the status and use of forest resources. Potential drivers of deforestation and
      forest degradation—such as illegal logging, unplanned forest conversion, and conflicts over access to land and resources—are
      often symptoms of weak forest governance. To develop effective national REDD+ strategies, governments need to better
      understand these challenges and develop measures to strengthen forest governance in ways that build the trust of domestic
      and international stakeholders.'
