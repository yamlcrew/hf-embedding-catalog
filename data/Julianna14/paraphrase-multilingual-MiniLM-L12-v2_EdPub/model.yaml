  - 'Der Vorschlag der Europäischen Kommission für einen Verordnungsentwurf über KI stützt sich auf die Arbeit des Europäischen
    Komitees für Normung ( CEN ) und des Europäischen Komitees für elektrotechnische Normung ( CENELEC ). Die Kommission hat
    die Befugnis, europäische Normungsorganisationen mit der Erstellung harmonisierter Normen zu beauftragen. EU - Richtlinien
    und europäische Normierung haben schon oft zum Schutz der Europäer in anderen Bereichen, wie z. B. der elektrischen Sicherheit,
    Hand in Hand gearbeitet. Während den europäischen Normungsorganisationen grosse Fachkompetenz attestiert wird, wird teilweise
    kritisiert, dass gewisse Befugnisse von demokratischen Prozessen ausgenommen sind. Der Vorschlag der Europäischen Kommission
    hat international für grosses Aufsehen gesorgt. Es wird erwartet, dass die Verordnung zu KI, wenn sie dereinst in Kraft
    tritt, eine ähnliche internationale Wirkung wie die Datenschutz - Grundverordnung erzielen wird. Aktuell wird der Kommissionsentwurf
    in den zuständigen Komitees des Europäischen Parlaments sowie im Rat der EU beraten. Da die Schweiz gemäss dem Bundesgesetz
    über die technischen Handelshemmnisse Zudem wird im Bereich der Maschinen das Zusammenspiel von Gesetzgebung und Normung
