- source_sentence: Conclusion This provides formation processes application the impact on, small moon of the Didymos binary
  sentences:
  - ' The mission network model,

    parameters, commodity demand and supply used in this case study are presented in Fig'
  - ' Conclusion

    This paper provides an overview of ejecta formation and evolution processes with speciﬁc application to the hypervelo-
    city impact of the DART spacecraft on Dimorphos, the small moon of the Didymos binary asteroid system'
  - '

    vantage points from NASA and non-NASA sources, including in orbit, airborne and even in-situ sensors to create a more
    dynamic and complete picture of a natural physical process'
- source_sentence: Table of
  sentences:
