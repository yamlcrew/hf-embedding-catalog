- source_sentence: ', antenna, or other sensor to attain mission performance levels that

    currently cannot be achieved by a monolithic satellite. Most aspects of this concept have been widely studied, but

    the first implementation has yet to be realized, with the exception of a few initial experiments.

    A distributed satellite system taxonomy is shown in Fig. 1 with a discussion of current and planned systems to

    follow. At the end of this section, a candidate distributed space mission is presented as a common reference for

    Table 1 presents a selection of current distributed satellite systems, grouped in the four typical mission

    categories'
  sentences:
  - 'What are the peaks that appear on waterfall plots but not on zero speed curves?


    '
  - 'What is the main challenge in implementing a distributed satellite system?


    '
  - 'What are the remaining challenges that need to be addressed for the successful implementation of optical links?


    '
- source_sentence: ':250,000 scale for regional context) . Near-term efforts should focus on high-priority locations .

    [16] Terrain hazard (e .g ., slope, surface roughness), line-of-sight (i .e ., viewshed), and time-dependent

    illumination maps at appropriate scales (e .g ., best-available supported by the data) are high-priority derived products
    essential in mission planning, and they should be made available as soon as possible .

    [17] South polar data products could be initially controlled to coarser data and known surface reference points to support
    early Artemis missions and other surface activities, but establishment of a local control network applied to all necessary
    data layers would facilitate interoperability and provide more precision for specific sites .

    Higher-order data products are tied to controlled foundational data and are derived from source data, such as measurements
    of elemental abundance, temperature or reflectance at multiple wavelengths, observations of solar illumination, and output
    from space weather models . Higher-order data products derived from these source data will play an essential role in planning
    and executing south polar missions . Planning the science activities to be carried out on the lunar surface will be based
    on these higher-order data products, and, in turn, the science returned by those activities will be used to update those
    same products . For example, geologic maps based on remotely sensed data prior to early Artemis landings will be a likely
    outcome of site assessments and will form the critical basis for traverse plans and planning of science tasks . The observations,
    samples, and measurements made during Artemis surface activities will feed back into updating the geologic maps, to the
    benefit of future crewed or robotic missions to the same area . Similarly, resource maps will drive the selection of landing
    sites for missions focused on resource discovery, characterization, and utilization, and the findings of those missions
    will be used to iteratively update the resource maps . In these cases, and others'
  sentences:
  - 'Who are the authors of the NASA document "Space Radiation Cancer Risk Projections for Explorative Missions: Uncertainty
    Reduction and Mitigation"?


    '
  - 'What is the aggregate data rate of the outputs of the 7-band CCD-in-CMOS TDI sensor?


    '
  - 'What are the essential derived products in mission planning, and why are they crucial for south polar missions?


    '
