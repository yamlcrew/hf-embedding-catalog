  - source_sentence: In nearly all cases, how many source and background region spectra are supplied for the RGS?
    sentences:
    - "Parameter dialogs\n\nEach task has an associated parameter dialog window. These individual\ntask GUIs are used to enter\
      \ the values of the different task parameters\nand to . The parameter dialog windows are opened by double-clicking any\n\
      of the tasks listed under the \"task\" column.\n\nThe following parameter dialog window (figure [fig:gui:parameterdialog])\n\
      illustrates some of the basic parameter types. Each parameter type has a\ncorresponding widget type. For example, a\
      \ boolean parameter is entered\nusing a check-box (withexposure); a choice parameter is entered by using\na pop-up menu\
      \ that allows to select from a set of options (sampling); a\nfilename parameter is entered as a string (imagesets),\
      \ with the option\nof popping up a file browser by pressing the button with the folder icon\n(see § [gui:browser]).\n\
      \nIf the task has a large number of parameters, the dialog window may have\nscroll-bars. The scroll bars will disappear\
      \ if the size of the dialog\nwindow is increased sufficiently.\n\nFurther information on a parameter can be obtained\
      \ by placing the cursor\nover the parameter widget. This causes a yellow tool-tip to pop-up if\nthe parameter file defines\
      \ a prompt field for the parameter.\n\nThe parameter dialog has the following buttons:\n\n  ---------- ------------------------------------------------------------------------\n\
      \  Run        Run the task with the selected parameters\n  Cancel     Close the parameter dialog window without running\
      \ the task or changing\n             the parameters\n  Save       Saves the value of the parameters\n  Defaults   Reset\
      \ the parameters to their default values\n  ---------- ------------------------------------------------------------------------\n\
      \nWhen a task has been run, the parameter values are retained until the\nnext time that the task is run (within the\
      \ same session). The Defaults\nbutton may be used to reset the parameters of a task to their default\nvalues. The \"\
      Task\" menu in the main SAS GUI provides an option \"Revert\nto defaults\" to reset all the parameters of all the tasks\
      \ to their\ndefaults.\n"
    - "-   This extension gives the good time intervals for the event list.\n\n-   There is one extension per CCD in the relevant\
      \ mode (IMAGING or\n    TIMING) during the exposure.\n\n-   The following keywords are present:\n\n        HDUCLASS=\
      \ 'OGIP    '           / format conforms to OGIP standard\n        HDUCLAS1= 'GTI     '           / table contains Good\
      \ Time Intervals\n        HDUCLAS2= 'STANDARD'           / standard Good Time Interval table\n\n-   This extension contains\
      \ the following columns:\n\n      Name    Type          Description\n      ------- ------------- --------------------------------\n\
      \      START   8-byte REAL   seconds (since reference time)\n      STOP    8-byte REAL   seconds (since reference time)\n"
    - 'RGS spectral products


      This section describes the spectral data products to be generated from

      pointed observations.


      Source and background region spectra and a background-subtracted source

      spectrum are supplied for the brightest point sources in the RGS (in

      nearly all cases this is just one source). Spectral response matrices

      are also supplied.

