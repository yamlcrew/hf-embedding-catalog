    \    '           / format conforms to OGIP standard\n        HDUCLAS1= 'GTI     '           / table contains Good Time\
    \ Intervals\n        HDUCLAS2= 'STANDARD'           / standard Good Time Interval table\n\n-   This extension contains\
    \ the following columns:\n\n      Name    Type          Description\n      ------- ------------- --------------------------------\n\
    \      START   8-byte REAL   seconds (since reference time)\n      STOP    8-byte REAL   seconds (since reference time)\n"
  - 'RGS spectral products


    This section describes the spectral data products to be generated from

    pointed observations.


    Source and background region spectra and a background-subtracted source

    spectrum are supplied for the brightest point sources in the RGS (in

    nearly all cases this is just one source). Spectral response matrices

    are also supplied.

    '
