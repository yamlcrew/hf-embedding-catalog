- source_sentence: What happens if the number of types and scopes provided is not equal in cifremove?
  sentences:
  - "-   For each RGS detector there is a single file containing filtered\n    events from all CCDs.\n\n-   The structure\
    \ of the FITS file is:\n\n    1.  Primary header with null primary array.\n\n    2.  A binary table extension containing\
    \ event data\n        ( EXTNAME=’EVENTS’).\n\n    3.  Per CCD (m =1-9) a standard GTI extension (STDGTI0m).\n\n    4.\
    \  Per CCD (m) and per CCD readout node (n=0-1), a bad pixel\n        extension (BADPIXnm).\n\n    5.  Per CCD (m) and\
    \ per CCD readout node (n), a rejected pixel\n        extension (REJPIXnm).\n\n    6.  Per CCD (m) an exposure extension\
    \ (EXPOSU0m).\n\n    7.  Per CCD (m) and per readout node (n), an exposure map extension\n        EXPMAPnm\n\n-   These\
    \ files are identified using the keyword\n\n        CONTENT = 'RGS EVENT LIST'\n\n    in the primary header.\n\n-   This\
    \ is a product of class RGSEXP.\n\n-   The EVENTS extension comprises a binary table extension with the\n    following\
    \ columns:\n\n      Name              Type             Description\n      ----------------- ---------------- -----------------------------------------------\n\
    \      TIME              8-byte REAL      Frame timestamp\n      FLAG              4-byte INTEGER   Event attribute flags\n\
    \      BETA              4-byte REAL      Uncorrected dispersion angle\n      XDSP              4-byte REAL      Uncorrected\
    \ cross-dispersion angle\n      CHIPX             2-byte INTEGER   Chip X coordinate (pixel)\n      CHIPY            \
    \ 2-byte INTEGER   Chip Y coordinate (pixel)\n      PHA               2-byte INTEGER   Total telemetered energy\n    \
    \  SHAPE             BYTE             Event shape identifier\n      GRADE             BYTE             Total number of\
    \ pixels\n      PI                2-byte INTEGER   Total corrected CCD event energy\n      CCDNR             BYTE    \
    \         CCD ID number\n      BETA_CORR         4-byte REAL      Attitude corrected dispersion angle (radians)\n    \
    \  XDSP_CORR         4-byte REAL      Attitude corrected cross-disp angle (radians)\n      M_LAMBDA          4-byte REAL\
    \      Wavelength spectral-order product\n      BETA_CHANNEL      2-byte INTEGER   BETA_CORR channel\n      MLAMBDA_CHANNEL\
    \   2-byte INTEGER   M_LAMBDA channel\n      XDSP_CHANNEL      2-byte INTEGER   XDISP_CORR channel\n\n-   Event times\
    \ are specified in seconds after a reference time\n    specified in a header keyword (MJDREF).\n\n-   The STDGTI0m extension\
    \ comprises a binary table extension with the\n    following columns:\n\n      Name    Type          Description\n   \
    \   ------- ------------- ------------------------------------------\n      START   8-byte REAL   GTI start time (s) since\
    \ reference epoch\n      STOP    8-byte REAL   GTI end time (s) since reference epoch\n\n-   The BADPIXnm extension contains\
    \ a binary table extension with the\n    following columns:\n\n      Name      Type             Description\n      ---------\
    \ ---------------- --------------------------------\n      CHIPX     2-byte INTEGER   Chip X coordinate (pixel)\n    \
    \  CHIPY     2-byte INTEGER   Chip Y coordinate (pixel)\n      YEXTENT   2-byte INTEGER   Extent of badness in Y (pixel)\n\
    \      TYPE      2-byte INTEGER   Type of badness\n      BADFLAG   2-byte INTEGER   Data source flag\n\n-   The REJPIXnm\
    \ extension contains a binary table extension with the\n    following columns:\n\n      Name    Type             Description\n\
    \      ------- ---------------- ---------------------------\n      FRAME   4-byte INTEGER   Frame identifier\n      FLAG\
    \    4-byte INTEGER   Event attribute flags\n      CHIPX   2-byte INTEGER   Chip X coordinate (pixel)\n      CHIPY   2-byte\
    \ INTEGER   Chip Y coordinate (pixel)\n\n-   The EXPOSU0m extension contains a binary table extension with the\n    following\
    \ columns:\n\n      Name       Type             Description\n      ---------- ---------------- ---------------------------------------------\n\
    \      FRAME      4-byte INTEGER   Frame identifier\n      NLOSTEVT   2-byte INTEGER   Number of lost events in frame\n\
    \      ABORTFLG   2-byte INTEGER   Abort frame flag\n      FLAG       4-byte INTEGER   Frame attributes\n      TIMEDEL\
    \    4-byte REAL      Frame integration time (s)\n      TIME       8-byte REAL      Seconds since MJDREF\n      FRACEXP0\
    \   4-byte REAL      Exposure fraction node 0\n      FRACEXP1   4-byte REAL      Exposure fraction node 1\n      ASPCDSP\
    \    4-byte REAL      Aspect correction applied to BETA (radians)\n      ASPCXDSP   4-byte REAL      Aspect correction\
    \ applied to XDSP (radians)\n\n-   The EXPMAPnm extension is an image extension containing the exposure\n    map for CCD\
    \ m, node n.\n\n-   This is a science product suitable for use in further data analysis.\n\n-   There will be a single\
    \ event file per exposure. The event lists will\n    typically be 10 MB uncompressed\n"
  - "The source list for a grism exposure represents a list of detections of\nall the zeroth order and/or first-order spectrum\
    \ features in the OSW\nimage.\n\n-   The source detection list is supplied in FITS format.\n\n-   These files are identified\
    \ using the keyword\n\n        CONTENT = 'OM OSW GRISM SOURCE LIST'\n\n    in the primary header.\n\n-   This is a product\
    \ of class OMSW.\n\n-   The OGIP filetype is defined by the keywords\n\n        HDUCLASS= 'OGIP    '           / Format\
    \ conforms to OGIP/GSFC conventions\n        HDUCLAS1= 'SRCLIST '           / File contains a source list\n\n    in the\
    \ primary header.\n\n-   The data extension (EXTNAME = ’SRCLIST’) contains a binary table\n    with the following columns:\n\
    \n      Name           Type             Description\n      -------------- ---------------- --------------------------------------------------------------\n\
    \      SRCNUM         4-byte INTEGER   Source number\n      XPOS           4-byte REAL      X-pixel position\n      YPOS\
    \           4-byte REAL      Y-pixel position\n      POSERR         4-byte REAL      Positional error (pixels)\n     \
    \ SPB_COILOSS    4-byte REAL      Coincidence loss correction in source+background\n      BK_COILOSS     4-byte REAL \
    \     Coincidence loss correction in background\n      FWHM_MAJ       4-byte REAL      Source FWHM (ellipse major axis)\n\
    \      FWHM_MAJ_ERR   4-byte REAL      Source FWHM (major axis) error\n      FWHM_MIN       4-byte REAL      Source FWHM\
    \ (ellipse minor axis)\n      FWHM_MIN_ERR   4-byte REAL      Source FWHM (minor axis) error\n      PA             4-byte\
    \ REAL      Position angle of ellipse major axis\n      PA_ERR         4-byte REAL      Source position angle error\n\
    \      QFLAG          16-bit INTEGER   Quality flag\n      CFLAG          8-bit INTEGER    Confusion flag\n      EFLAG\
    \          8-bit INTEGER    Extension flag\n      SPECTR_ID      4-byte INTEGER   Spectrum identifier\n      REL2SRCNUM\
    \     4-byte INTEGER   Identifies related spectrum and zeroth order feature entries\n\n-   This is a science product.\
    \ The OM OSW source list is the first stage\n    analysis of the OSW for grism data.\n\n-   The grism source lists is\
    \ notably distinct from the normal imaging\n    and FAST source lists because many entries are the detections of the\n\
    \    spectra themselves, not just the zeroth order features that map to\n    the objects on the sky. At the current time,\
    \ the SSC pipeline does\n    not insert celestial coordinates (RA and DEC) in the file though\n    this is expected to\
    \ change in a future pipeline release. The ellipse\n    parameters of the detections largely reflect dispersion in the\n\
    \    spectrum and zeroth order features, rather than intrinsic extension\n    of the sky object.\n\n-   There is one file\
    \ per OSW per exposure. Each file is typically 24KB\n    uncompressed.\n"
