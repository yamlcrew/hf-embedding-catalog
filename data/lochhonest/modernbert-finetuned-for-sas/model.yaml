  - source_sentence: What are the task parameters of binadapt?
    sentences:
    - "backscale\n## Parameters\n\n\\label{backscale:description:parameters}\n\n **spectrumset** (Mandatory): \n  Name of\
      \ the input file\n  \n(Type: string, Default: spectrum.ds, Range: )\n **badpixlocation** (Optional): \n  Name of the\
      \ file containing the bad pixels, initially this\n  is the event file.\n  \n(Type: string, Default: notSpecified, Range:\
      \ )\n **withbadpixcorr** (Optional): \n  Whether to use bad pixels and chip gaps in the calculation.\n  \n(Type: boolean,\
      \ Default: yes, Range: )\n **useodfatt** (Optional): \n  Whether to use the ODF attitude file to construct position\
      \ info.\n  \n(Type: boolean, Default: no, Range: )\n **ignoreoutoffov** (Optional): \n  Whether area outside the field\
      \ of view should be included\n  in the backscale calculation.\n  \n(Type: boolean, Default: yes, Range: )\n **withbadpixres**\
      \ (Optional): \n  Whether a grid resolution has been specified on the command line.\n  If not set then the task uses\
      \ the default badpixelresolution set by\n  the Task: arfgen\n(Type: boolean, Default: no, Range: ) task.\n  \n **badpixelresolution**\
      \ (Optional): \n  The grid resolution to use when calculating the area. If set then this overrides\n  the value used\
      \ internally by Task: arfgen\n(Type: float, Default: , Range: ). A value such as 2.0, will result in \n  a faster execution\
      \ time at the expense of accuracy.\n  \n%   **detmaptype** (Optional): detmapfile.ds:\n(Type: choice, Default: flat,\
      \ Range: dataset flat}\n%    {\n%    This is the detector map type. It should be left as the default\n%    'flat' in\
      \ all cases except where the source region contains a\n%    spatial mask. In this case it should be set to 'dataset'\
      \ and\n%    an image of the extraction region given in `detmaparray`.\n%    }\n\n%   \\optparm{detmaparray){array}{none}\n\
      %    {\n%    Name of detector map dataset and array in the DAL compound notation.\n%    Only used if `detmaptype` is\
      \ set to `dataset`.\n%    }\n\n[INPUT FILES]\nbackscale\n-   an EPIC spectrum file containing a datasubspace definition\n\
      \n-   an optional second file containing the bad pixel extensions\n\n[OUTPUT FILES]\nbackscale\n-   The input spectrum\
      \ is modified\n\n[ABSTRACT] backscale\nA tool for calculating and writing the BACKSCAL keyword in EPIC spectra.\n[SPATIAL\
      \ MASKS] backscale\n[CAL USAGE] backscale\nThe metatask doesn’t use the CAL directly but calls Task: arfgen which\n\
      uses the routine CAL_onCcd to determine whether a pixel lies on a CCD.\n[FUTURE DEVELOPMENTS] backscale\nThere is scope\
      \ for reorganising Task: arfgen to make the BACKSCAL\ncalculation a bit faster."
    - "binadapt\n## Parameters\n\n**prefix** (Optional): Input inst+exposure ID (1S001, S003) OR “comb” to\nuse combimage\
      \ inputs.\n\n(Type: string, Default: comb, Range: ) The program defaults to deriving\na filename of the form comb-elow-ehigh.fits.\
      \ If using singular expids,\nenter that as the prefix.\n\n**elow** (Optional): Lower energy limit for the energy band\
      \ in eV.\n\n(Type: int, Default: 350, Range: 0 <  = elow <  = 11999) **ehigh**\n(Optional): Upper energy limit for the\
      \ energy band in eV.\n\n(Type: int, Default: 1100, Range: 1 <  = ehigh <  = 12000)\n**withpartbkg** (Optional): Particle\
      \ background control, \"yes\" to\nsubtract the model (QPB) particle background image.\n\n(Type: bool, Default: no, Range:\
      \ T/F) **withspbkg** (Optional): Soft\nproton background control, \"yes\" to subtract the soft proton background\nimage.\n\
      \n(Type: bool, Default: no, Range: T/F) **withswcxbkg** (Optional): Solar\nwind charge exchange background control,\
      \ \"yes\" to subtract the SWCX\nbackground image.\n\n(Type: bool, Default: no, Range: T/F) **withmask** (Optional):\
      \ Apply\nadditional masking using input image?\n\n(Type: bool, Default: no, Range: T/F) **maskfile** (Optional): The\n\
      filename for an image to provide additional masking if desired.\n\n(Type: dataset, Default: default, Range: ) If left\
      \ blank (AND\nwithmask=T), binadapt will derive a mask filename based on other\nparameters. The mask images must be\
      \ the same size and projection as the\nother images. Since masks can come from many sources, it is recommended\nthe\
      \ user enter withmask=T maskfile=yourmaskfile together.\n**withbinning** (Optional): Perform binning?\n\n(Type: bool,\
      \ Default: yes, Range: T/F) **binfactor** (Optional): Binning\nfactor.\n\n(Type: int, Default: 2, Range: 1 <  = binfactor)\
      \ **withsmoothing**\n(Optional): Perform smoothing?\n\n(Type: bool, Default: yes, Range: T/F) **smoothcounts** (Optional):\n\
      Smoothing factor.\n\n(Type: int, Default: 50, Range: 1 <  = smoothcounts <  = 100)\n**maskthresh** (Optional): The scale\
      \ factor for excluding regions from\nthe smoothing based on a mask image.\n\n(Type: real, Default: 0.02, Range: 0.001 <  = maskthresh)\
      \ In the default\nmode the average exposure is calculated and then any pixel with exposure\nless than fraction*average\
      \ value is excluded.\n[INPUT FILES]\nbinadapt\nBinadapt will create filenames based on parameters input, especially\n\
      prefix, elow, and ehigh\n\nThe user can choose to enter either a prefix designating the\ninstrument + expid, e.g. 1S001,\
      \ 2S002, S003 OR the string “comb” to use\nproducts from the task combimage. Either will initiate deriving all the\n\
      input filenames based on other input parameters. If no prefix is given,\nbinadapt will derive an input filename of the\
      \ form:\ncomb-elow-ehigh.fits, the default output from combimage.\n\nValid input filenames derived are, in the case\
      \ of a prefix being\nentered, e.g.:\n\n    binadapt prefix=1S001 withspbkg=T withpartbkg=T withswcx=T withmask=T\n \
      \   maskfile=mymaskimage.fits elow=400 ehigh=2000\n\nmos1S001-fovimsky-400-2000.fits (from mosspectra)\nmos1S001-expimsky-400-2000.fits\
      \ (from mosspectra)\nmos1S001-bkgimsky-400-2000.fits (from mosback)\nmos1S001-swcximsky-400-2000.fits (from swcx)\n\
      mos1S001-protimsky-400-2000.fits (from proton)\nmos1S001-maskimsky-400-2000.fits (from emask, et al)\n[NOTE: binadapt\
      \ will, by default, create a mask file name as above, but\nsince masks can come from different tasks, if you have a\
      \ mask NOT of\nthat style, simply set withmask=T and maskfile=yourmaskname to override\nthe default]\n\nValid input\
      \ filenames derived are, in the case of a comb being entered,\ne.g.:\n\n    binadapt prefix=comb withspbkg=T withpartbkg=T\
      \ withswcx=T withmask=T\n    maskfile=mymaskimage.fits elow=400 ehigh=2000\n\nAll of these files are produced by the\
      \ task combimage after running\nany/all of mosspectra/ mosback/ swcx/ proton comb-fovimsky-400-2000.fits\ncomb-expimsky-400-2000.fits\n\
      comb-bkgimsky-400-2000.fits\ncomb-swcximsky-400-2000.fits\ncomb-protimsky-400-2000.fits\ncomb-maskimsky-400-2000.fits\
      \ (from emask, et al\nNOTE: typically, a mask produced by combimage will have the name style\nas above, but if you rename\
      \ your files, simply set withmask=T and\nmaskfile=yourmaskname to override the default\n\n[OUTPUT FILES]\nbinadapt\n\
      If withsmoothing=T, binadapt creates an adaptively smoothed, exposure\ncorrected, and background subtracted (any selected)\
      \ image in SKY coords:\n\nmos1S001-adaptimsky-350-1100.fits\n\nA 900x900 Real32 image of the smoothing FWHM:\n\nmos1S001-sizeimsky-350-1100.fits\n\
      \nNote: both of the above are also binned if withbinning=T\n\nA QDP plot file of the radial profile of the data for\
      \ the selected\nenergy band (elow and ehigh) of the selected region:\n\nmos1S001-radfilt-350-1100.qdp\n\nA histogram\
      \ of the smoothing FWHM:\n\nmos1S001-size-350-1100.qdp\n\nIf withsmoothing=F, only these binned, exposure corrected,\
      \ and\nbackground subtracted (any selected) images are created:\n\nThe binned count rate uncertainty image for the selected\
      \ energy band\n(elow and ehigh) of the selected region in SKY coordinates:\n\nmos1S001-sigimsky-350-1100.fits\n\nand\
      \ the binned count rate image for the selected energy band (elow and\nehigh) of the selected region in sky coordinates:\n\
      \nmos1S001-rateimsky-350-1100.fits\n\nA QDP plot file of the radial profile of the data for the selected\nenergy band\
      \ (elow and ehigh) of the selected region:\n\nmos1S001-radfilt-350-1100.qdp\n\n[FUTURE DEVELOPMENTS] binadapt"
    - "-   This extension contains the exposed fraction of each frame per CCD\n    (in the pn the frame time is constant,\
