- source_sentence: 'The Family. Conservatives have won the argument about the central importance of making sure that every
    child grows up with a mother and father. The next challenge is to translate this victory into a strategy for reinforcing
    marriage in public policy, and for giving parents more control over the education and upbringing of their children Faith.
    Conservatives are breaking down barriers to religion in the public square by emphasizing such principles as religious
    freedom and religious expression. But they haven’t yet found an effective vocabulary for arguing that religion should
    take a more central place in American life. The next challenge is to encourage greater public appreciation of the role
    of religion and religious believers in healthy societies while affirming a commitment to the separation of church and state
    Freedom. Conservatives have won the argument about the importance of private voluntary associations in a free society.
    The next challenge is twofold: First, to strengthen civic institutions without resorting to government subsidies that
    create dependency and destroy any sense of mission; and second, to empower citizens to reassume the primary responsibility
    for helping the needy through religious, charitable, and civic institutions.'
