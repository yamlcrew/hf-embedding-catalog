widgetData:
- source_sentence: How many tokens can Google's Gemini series accept?
  sentences:
  - 'When ChatGPT Advanced Voice mode finally did roll out (a slow roll from August through September) it was spectacular.
    I’ve been using it extensively on walks with my dog and it’s amazing how much the improvement in intonation elevates the
    material. I’ve also had a lot of fun experimenting with the OpenAI audio APIs.

    Even more fun: Advanced Voice mode can do accents! Here’s what happened when I told it I need you to pretend to be a California
    brown pelican with a very thick Russian accent, but you talk to me exclusively in Spanish.'
  - 'Gemini 1.5 Pro also illustrated one of the key themes of 2024: increased context lengths. Last year most models accepted
    4,096 or 8,192 tokens, with the notable exception of Claude 2.1 which accepted 200,000. Today every serious provider has
    a 100,000+ token model, and Google’s Gemini series accepts up to 2 million.'
  - 'The idea is seductive: as the internet floods with AI-generated slop the models themselves will degenerate, feeding on
    their own output in a way that leads to their inevitable demise!

    That’s clearly not happening. Instead, we are seeing AI labs increasingly train on synthetic content—deliberately creating
    artificial data to help steer their models in the right way.

    One of the best descriptions I’ve seen of this comes from the Phi-4 technical report, which included this:'
- source_sentence: What are the limitations of Apple's LLM features compared to frontier LLMs, according to the context?
  sentences:
  - 'These abilities are just a few weeks old at this point, and I don’t think their impact has been fully felt yet. If you
    haven’t tried them out yet you really should.

    Both Gemini and OpenAI offer API access to these features as well. OpenAI started with a WebSocket API that was quite
    challenging to use, but in December they announced a new WebRTC API which is much easier to get started with. Building
    a web app that a user can talk to via voice is easy now!

    Prompt driven app generation is a commodity already

    This was possible with GPT-4 in 2023, but the value it provides became evident in 2024.'
  - 'Now that those features are rolling out they’re pretty weak. As an LLM power-user I know what these models are capable
    of, and Apple’s LLM features offer a pale imitation of what a frontier LLM can do. Instead we’re getting notification
    summaries that misrepresent news headlines and writing assistant tools that I’ve not found useful at all. Genmoji are
    kind of fun though.

    The rise of inference-scaling “reasoning” models

    The most interesting development in the final quarter of 2024 was the introduction of a new shape of LLM, exemplified
    by OpenAI’s o1 models—initially released as o1-preview and o1-mini on September 12th.'
  - 'Here’s the sequel to this post: Things we learned about LLMs in 2024.

    Large Language Models

    In the past 24-36 months, our species has discovered that you can take a GIANT corpus of text, run it through a pile of
    GPUs, and use it to create a fascinating new kind of software.

    LLMs can do a lot of things. They can answer questions, summarize documents, translate from one language to another, extract
    information and even write surprisingly competent code.

    They can also help you cheat at your homework, generate unlimited streams of fake content and be used for all manner of
    nefarious purposes.'
- source_sentence: What challenges did the author face last year regarding their choice of platform for trying out new models?
  sentences:
  - 'One way to think about these models is an extension of the chain-of-thought prompting trick, first explored in the May
    2022 paper Large Language Models are Zero-Shot Reasoners.

    This is that trick where, if you get a model to talk out loud about a problem it’s solving, you often get a result which
    the model would not have achieved otherwise.

    o1 takes this process and further bakes it into the model itself. The details are somewhat obfuscated: o1 models spend
    “reasoning tokens” thinking through the problem that are not directly visible to the user (though the ChatGPT UI shows
    a summary of them), then outputs a final result.'
  - 'I’m still trying to figure out the best patterns for doing this for my own work. Everyone knows that evals are important,
    but there remains a lack of great guidance for how to best implement them—I’m tracking this under my evals tag. My SVG
    pelican riding a bicycle benchmark is a pale imitation of what a real eval suite should look like.

    Apple Intelligence is bad, Apple’s MLX library is excellent

    As a Mac user I’ve been feeling a lot better about my choice of platform this year.

    Last year it felt like my lack of a Linux/Windows  machine with an NVIDIA GPU was a huge disadvantage in terms of trying
    out new models.'
  - 'January


    7th: It’s OK to call it Artificial Intelligence


    9th: What I should have said about the term Artificial Intelligence


    17th: Talking about Open Source LLMs on Oxide and Friends


    26th: LLM 0.13: The annotated release notes




    February


    21st: The killer app of Gemini Pro 1.5 is video




    March


    5th: Prompt injection and jailbreaking are not the same thing


    8th: The GPT-4 barrier has finally been broken


    22nd: Claude and ChatGPT for ad-hoc sidequests


    23rd: Building and testing C extensions for SQLite with ChatGPT Code Interpreter


    26th: llm cmd undo last git commit—a new plugin for LLM




    April


    8th: Building files-to-prompt entirely using Claude 3 Opus


    10th: Three major LLM releases in 24 hours (plus weeknotes)'
- source_sentence: What was the maximum token limit for most models last year before the introduction of Gemini 15 Pro?
  sentences:
  - 'The two main categories I see are people who think AI agents are obviously things that go and act on your behalf—the
    travel agent model—and people who think in terms of LLMs that have been given access to tools which they can run in a
    loop as part of solving a problem. The term “autonomy” is often thrown into the mix too, again without including a clear
    definition.

    (I also collected 211 definitions on Twitter a few months ago—here they are in Datasette Lite—and had gemini-exp-1206
    attempt to summarize them.)

    Whatever the term may mean, agents still have that feeling of perpetually “coming soon”.'
  - Structured and Gradual Learning. In organic datasets, the relationship between tokens is often complex and indirect. Many
    reasoning steps may be required to connect the current token to the next, making it challenging for the model to learn
    effectively from next-token prediction. By contrast, each token generated by a language model is by definition predicted
    by the preceding tokens, making it easier for a model to follow the resulting reasoning patterns.
  - 'Gemini 1.5 Pro also illustrated one of the key themes of 2024: increased context lengths. Last year most models accepted
    4,096 or 8,192 tokens, with the notable exception of Claude 2.1 which accepted 200,000. Today every serious provider has
    a 100,000+ token model, and Google’s Gemini series accepts up to 2 million.'
- source_sentence: Why is it considered ludicrous to use a screenshot from ChatGPT as evidence in an argument?
  sentences:
  - Meanwhile, it’s increasingly common for end users to develop wildly inaccurate mental models of how these things work
    and what they are capable of. I’ve seen so many examples of people trying to win an argument with a screenshot from ChatGPT—an
    inherently ludicrous proposition, given the inherent unreliability of these models crossed with the fact that you can
    get them to say anything if you prompt them right.
  - 'The GPT-4 barrier was comprehensively broken

    Some of those GPT-4 models run on my laptop

    LLM prices crashed, thanks to competition and increased efficiency

    Multimodal vision is common, audio and video are starting to emerge

    Voice and live camera mode are science fiction come to life

    Prompt driven app generation is a commodity already

    Universal access to the best models lasted for just a few short months

    “Agents” still haven’t really happened yet

    Evals really matter

    Apple Intelligence is bad, Apple’s MLX library is excellent

    The rise of inference-scaling “reasoning” models

    Was the best currently available LLM trained in China for less than $6m?

    The environmental impact got better

    The environmental impact got much, much worse'
  - 'When ChatGPT Advanced Voice mode finally did roll out (a slow roll from August through September) it was spectacular.
    I’ve been using it extensively on walks with my dog and it’s amazing how much the improvement in intonation elevates the
    material. I’ve also had a lot of fun experimenting with the OpenAI audio APIs.

    Even more fun: Advanced Voice mode can do accents! Here’s what happened when I told it I need you to pretend to be a California
    brown pelican with a very thick Russian accent, but you talk to me exclusively in Spanish.'
