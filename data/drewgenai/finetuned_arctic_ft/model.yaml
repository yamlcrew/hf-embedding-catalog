widgetData:
- source_sentence: How does the Work-Related Stress Scale (WRSS-8) assess the impact of workplace stress?
  sentences:
  - 'Linked Psychological & Physical Assessment

    Chronic Pain Adjustment Index (CPAI-10)

    The CPAI-10 evaluates the strategies people use to cope with chronic pain and adapt their

    behaviors.

    Assessment Questions:

    I change my daily routine to reduce pain impact. (Scale: 0-5)

    I mentally prepare myself before engaging in painful activities. (Scale: 0-5)

    I use relaxation techniques to minimize pain perception. (Scale: 0-5)

    I use breathing exercises to manage pain episodes. (Scale: 0-5)

    I avoid specific physical activities that increase my pain. (Scale: 0-5)

    Occupational Fatigue Index (OFI-7)

    The OFI-7 assesses work-related exhaustion and its influence on cognitive and emotional

    well-being.

    Assessment Questions:

    I feel exhausted after a standard workday. (Scale: 0-3)

    I struggle to stay motivated due to workplace stress. (Scale: 0-3)

    I feel overwhelmed when handling multiple responsibilities. (Scale: 0-3)

    I find it difficult to disconnect from work-related concerns. (Scale: 0-3)

    I experience sleep disturbances due to work-related stress. (Scale: 0-3)

    Rational Decision-Making Test (RDMT-6)

    The RDMT-6 evaluates logical reasoning and decision-making processes.

    Assessment Questions:'
  - 'Linked Psychological & Physical Assessment

    Pain Coping Strategy Scale (PCSS-9)

    The PCSS-9 measures how individuals adjust to chronic pain and its impact on their lifestyle, using

    a structured 9-item scale.

    Assessment Questions:

    I change my daily routine to reduce pain impact. (Scale: 0-5)

    I mentally prepare myself before engaging in painful activities. (Scale: 0-5)

    I use relaxation techniques to minimize pain perception. (Scale: 0-5)

    I focus on positive thinking to help manage pain. (Scale: 0-5)

    Work-Related Stress Scale (WRSS-8)

    The WRSS-8 evaluates work-induced stress and its psychological effects.

    Assessment Questions:

    I feel exhausted after a standard workday. (Scale: 0-3)

    I struggle to stay motivated due to workplace stress. (Scale: 0-3)

    I feel overwhelmed when handling multiple responsibilities. (Scale: 0-3)

    I find it difficult to disconnect from work-related concerns. (Scale: 0-3)

    Decision-Making Confidence Scale (DMCS-6)

    The DMCS-6 evaluates confidence in making personal and professional decisions.

    Assessment Questions:

    I feel confident when making important decisions. (Scale: 0-3)

    I second-guess myself often when making choices. (Scale: 0-3)

    I trust my instincts when faced with uncertainty. (Scale: 0-3)'
  - 'Linked Psychological & Physical Assessment

    Pain Coping Strategy Scale (PCSS-9)

    The PCSS-9 measures how individuals adjust to chronic pain and its impact on their lifestyle, using

    a structured 9-item scale.

    Assessment Questions:

    I change my daily routine to reduce pain impact. (Scale: 0-5)

    I mentally prepare myself before engaging in painful activities. (Scale: 0-5)

    I use relaxation techniques to minimize pain perception. (Scale: 0-5)

    I focus on positive thinking to help manage pain. (Scale: 0-5)

    Work-Related Stress Scale (WRSS-8)

    The WRSS-8 evaluates work-induced stress and its psychological effects.

    Assessment Questions:

    I feel exhausted after a standard workday. (Scale: 0-3)

    I struggle to stay motivated due to workplace stress. (Scale: 0-3)

    I feel overwhelmed when handling multiple responsibilities. (Scale: 0-3)

    I find it difficult to disconnect from work-related concerns. (Scale: 0-3)

    Decision-Making Confidence Scale (DMCS-6)

    The DMCS-6 evaluates confidence in making personal and professional decisions.

    Assessment Questions:

    I feel confident when making important decisions. (Scale: 0-3)

    I second-guess myself often when making choices. (Scale: 0-3)

    I trust my instincts when faced with uncertainty. (Scale: 0-3)'
