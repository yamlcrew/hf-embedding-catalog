    - Cơn thiếu máu não thoáng qua tương tự tai biến mạch máu não nhưng chỉ kéo dài ngắn và thường không gây tổn thương não.
      Những người có cơn này có nguy cơ rất cao mắc phải một đợt tai biến mạch máu não thật sự trong tương lai.
    - Nguyên nhân chính gây béo phì là do có sự mất cân bằng giữa năng lượng nạp vào và tiêu thụ. Các yếu tố cụ thể bao gồm
      chế độ ăn uống không hợp lý (như ăn nhiều calo, khẩu phần lớn, ăn ngoài, uống đồ ngọt/cồn), thiếu hoạt động thể chất,
      mắc các bệnh nền (như suy giáp, hội chứng Cushing) hoặc tác dụng phụ của thuốc (như corticoid, thuốc trị động kinh,
      tiểu đường), và những thay đổi về lối sống (như thiếu ngủ, ngưng hút thuốc lá).
    - Để phòng tránh cúm mùa, cần tăng cường vệ sinh cá nhân như rửa tay bằng xà phòng, che miệng và mũi khi ho, hắt hơi;
      vệ sinh và mở cửa thoáng mát nơi ở, lau chùi vật dụng; tự theo dõi sức khỏe và thông báo khi có biểu hiện bệnh; tránh
      tiếp xúc với người bệnh hoặc người nghi ngờ mắc bệnh.
  - source_sentence: Khi một người có các triệu chứng như nhãn cầu bị chìm và đỏ bừng mặt, bác sĩ có thể chẩn đoán bệnh gì?
    sentences:
    - Khi một người có các triệu chứng như nhãn cầu bị chìm và đỏ bừng mặt, cùng với co đồng tử, sụp mí mắt và giảm tiết mồ
      hôi ở một bên mặt, bác sĩ có thể chẩn đoán Hội chứng Horner.
    - Thông thường, bệnh cầu thận màng là hậu quả của các phản ứng miễn dịch tự miễn, khi hệ thống miễn dịch tấn công nhầm
      mô khỏe mạnh. Ngoài ra, bệnh cũng có thể do các nguyên nhân thứ phát như bệnh tự miễn (ví dụ lupus ban đỏ hệ thống),
      nhiễm siêu vi (viêm gan B, C, giang mai), một số loại thuốc (thuốc kháng viêm không steroid) hoặc các bệnh lý ung thư
      (ung thư máu).
    - Các dấu hiệu như co đồng tử, sụp mí mắt trên và giảm tiết mồ hôi ở một bên mặt có thể là triệu chứng của Hội chứng Horner.
  - source_sentence: Nếu một con bò có hành vi bất thường, khó khăn khi di chuyển và bị giảm thể trọng, đó có thể là dấu hiệu
      của bệnh gì?
    sentences:
    - Trong giai đoạn viêm tấy cấp tính khi bị giãn dây chằng, người bệnh tuyệt đối không được chườm nóng, xoa dầu nóng, rượu
      thuốc vì có thể làm tổn thương nặng hơn. Đồng thời, không vận động vùng tổn thương và không được tiêm kháng viêm trực
      tiếp vào vùng tổn thương.
    - Nếu một con bò có các biểu hiện như hành vi bất thường, khó khăn trong di chuyển và giảm thể trọng, đó có thể là dấu
      hiệu của bệnh bò điên (Bovine Spongiform Encephalopathy - BSE).
    - Bệnh liệt dương còn có tên gọi khác là chứng “bất lực” xảy ra ở nam giới. Bệnh có đặc điểm là không có khả năng duy
      trì sự cương cứng đủ để giao hợp hoặc không thể đạt được xuất tinh, hoặc cả hai.
