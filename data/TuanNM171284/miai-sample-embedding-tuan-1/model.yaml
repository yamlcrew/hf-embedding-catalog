  - source_sentence: Thẩm quyền bổ nhiệm Thủ trưởng cơ quan quản lý thi hành án hình sự thuộc Bộ Công an được quy định như
      thế nào?
    sentences:
    - 'Điều 34. Mục tiêu phát triển khu công nghiệp hỗ trợ1. Phát triển khu công nghiệp hỗ trợ nhằm cụ thể hóa và thực hiện
      chiến lược, kế hoạch phát triển các ngành công nghiệp trọng điểm, công nghiệp hỗ trợ trong từng thời kỳ.

      2. Hình thành liên kết sản xuất giữa các khu công nghiệp và các doanh nghiệp trong khu công nghiệp; đổi mới cơ cấu thu
      hút đầu tư nước ngoài; chuyển giao công nghệ, kỹ năng sản xuất tiên tiến, hiện đại thông qua hợp tác đầu tư, kinh doanh
      giữa các doanh nghiệp trong nước và nước ngoài trong lĩnh vực công nghiệp hỗ trợ.'
    - 'Điều 8. Các loại thuế khai theo tháng, khai theo quý, khai theo năm, khai theo từng lần phát sinh nghĩa vụ thuế và
      khai quyết toán thuế1. Các loại thuế, khoản thu khác thuộc ngân sách nhà nước do cơ quan quản lý thuế quản lý thu thuộc
      loại khai theo tháng, bao gồm:

      a) Thuế giá trị gia tăng, thuế thu nhập cá nhân. Trường hợp người nộp thuế đáp ứng các tiêu chí theo quy định tại Điều
      9 Nghị định này thì được lựa chọn khai theo quý.

      b) Thuế tiêu thụ đặc biệt.

      c) Thuế bảo vệ môi trường.

      d) Thuế tài nguyên, trừ thuế tài nguyên quy định tại điểm e khoản này.

      đ) Các khoản phí, lệ phí thuộc ngân sách nhà nước (trừ phí, lệ phí do cơ quan đại diện nước cộng hoà xã hội chủ nghĩa
      Việt Nam ở nước ngoài thực hiện thu theo quy định tại Điều 12 Nghị định này; phí hải quan; lệ phí hàng hoá, hành lý,
      phương tiện vận tải quá cảnh).

      e) Đối với hoạt động khai thác, xuất bán khí thiên nhiên: Thuế tài nguyên; thuế thu nhập doanh nghiệp; thuế đặc biệt
      của Liên doanh Việt - Nga “Vietsovpetro” tại Lô 09.1 theo Hiệp định giữa Chính phủ Cộng hoà xã hội chủ nghĩa Việt Nam
      và Chính phủ Liên bang Nga ký ngày 27 tháng 12 năm 2010 về việc tiếp tục hợp tác trong lĩnh vực thăm dò địa chất và
      khai thác dầu khí tại thềm lục địa Cộng hoà xã hội chủ nghĩa Việt Nam trong khuôn khổ Liên doanh Việt - Nga “Vietsovpetro”
      (sau đây gọi là Liên doanh Vietsovpetro tại Lô 09.1); tiền lãi khí nước chủ nhà được chia.

      2. Các loại thuế, khoản thu khác thuộc ngân sách nhà nước khai theo quý, bao gồm:

      a) Thuế thu nhập doanh nghiệp đối với hãng hàng không nước ngoài, tái bảo hiểm nước ngoài.

      b) Thuế giá trị gia tăng, thuế thu nhập doanh nghiệp, thuế thu nhập cá nhân đối với tổ chức tín dụng hoặc bên thứ ba
      được tổ chức tín dụng ủy quyền khai thác tài sản bảo đảm trong thời gian chờ xử lý khai thay cho người nộp thuế có tài
      sản bảo đảm.

      c) Thuế thu nhập cá nhân đối với tổ chức, cá nhân trả thu nhập thuộc diện khấu trừ thuế theo quy định của pháp luật
      thuế thu nhập cá nhân, mà tổ chức, cá nhân trả thu nhập đó thuộc diện khai thuế giá trị gia tăng theo quý và lựa chọn
      khai thuế thu nhập cá nhân theo quý; cá nhân có thu nhập từ tiền lương, tiền công trực tiếp khai thuế với cơ quan thuế
      và lựa chọn khai thuế thu nhập cá nhân theo quý.

      d) Các loại thuế, khoản thu khác thuộc ngân sách nhà nước do tổ chức, cá nhân khai thuế thay, nộp thuế thay cho cá nhân
      mà tổ chức, cá nhân đó thuộc diện khai thuế giá trị gia tăng theo quý và lựa chọn khai thuế thay cho cá nhân theo quý,
      trừ trường hợp quy định tại điểm g khoản 4 Điều này.

      đ) Khoản phụ thu khi giá dầu thô biến động tăng (trừ hoạt động dầu khí của Liên doanh Vietsovpetro tại Lô 09.1).

      3. Các loại thuế, khoản thu khác thuộc ngân sách nhà nước khai theo năm, bao gồm:

      a) Lệ phí môn bài.

      b) Thuế thu nhập cá nhân đối với cá nhân làm đại lý xổ số, đại lý bảo hiểm, bán hàng đa cấp mà trong năm chưa khấu trừ
      do chưa đến mức phải nộp thuế nhưng đến cuối năm cá nhân xác định thuộc diện phải nộp thuế.

      c) Các loại thuế, khoản thu của hộ kinh doanh, cá nhân kinh doanh nộp thuế theo phương pháp khoán, cá nhân cho thuê
      tài sản lựa chọn khai thuế theo năm.

      d) Thuế sử dụng đất phi nông nghiệp.

      Người nộp thuế khai thuế theo năm đối với từng thửa đất và khai tổng hợp đối với đất ở trong trường hợp có quyền sử
      dụng đất đối với nhiều thửa đất cùng một quận, huyện hoặc tại nhiều quận, huyện trong cùng một địa bàn cấp tỉnh. Người
      nộp thuế không phải khai tổng hợp đối với các trường hợp sau đây:

      d.1) Người nộp thuế có quyền sử dụng đất đối với một thửa đất hoặc nhiều thửa đất tại cùng một quận, huyện nhưng tổng
      diện tích đất chịu thuế không vượt hạn mức đất ở tại nơi có quyền sử dụng đất.

      d.2) Người nộp thuế có quyền sử dụng đất đối với nhiều thửa đất ở tại các quận, huyện khác nhau nhưng không có thửa
      đất nào vượt hạn mức và tổng diện tích các thửa đất chịu thuế không vượt quá hạn mức đất ở nơi có quyền sử dụng đất.

      đ) Thuế sử dụng đất nông nghiệp.

      e) Tiền thuê đất, thuê mặt nước theo hình thức nộp hàng năm.

      4. Các loại thuế, khoản thu khác thuộc ngân sách nhà nước khai theo từng lần phát sinh, bao gồm:

      a) Thuế giá trị gia tăng của người nộp thuế theo quy định tại khoản 3 Điều 7 Nghị định này hoặc người nộp thuế thực
      hiện khai thuế giá trị gia tăng theo phương pháp trực tiếp trên giá trị gia tăng theo quy định của pháp luật về thuế
      giá trị gia tăng nhưng có phát sinh nghĩa vụ thuế giá trị gia tăng đối với hoạt động chuyển nhượng bất động sản.

      b) Thuế tiêu thụ đặc biệt của người nộp thuế có kinh doanh xuất khẩu chưa nộp thuế tiêu thụ đặc biệt ở khâu sản xuất
      sau đó không xuất khẩu mà bán trong nước. Thuế tiêu thụ đặc biệt của cơ sở kinh doanh mua xe ô tô, tàu bay, du thuyền
      sản xuất trong nước thuộc đối tượng không chịu thuế tiêu thụ đặc biệt nhưng sau đó chuyển mục đích sử dụng sang đối
      tượng chịu thuế tiêu thụ đặc biệt.

      c) Thuế đối với hàng hóa xuất khẩu, nhập khẩu bao gồm: Thuế xuất khẩu, thuế nhập khẩu, thuế tự vệ, thuế chống bán phá
      giá, thuế chống trợ cấp, thuế tiêu thụ đặc biệt, thuế bảo vệ môi trường, thuế giá trị gia tăng. Trường hợp hàng hóa
      xuất khẩu, nhập khẩu không phải khai theo từng lần phát sinh thì thực hiện theo hướng dẫn của Bộ Tài chính.

      d) Thuế tài nguyên của tổ chức được giao bán tài nguyên bị bắt giữ, tịch thu; khai thác tài nguyên không thường xuyên
      đã được cơ quan nhà nước có thẩm quyền cấp phép hoặc không thuộc trường hợp phải cấp phép theo quy định của pháp luật.

      đ) Thuế giá trị gia tăng, thuế thu nhập doanh nghiệp không phát sinh thường xuyên của người nộp thuế áp dụng theo phương
      pháp trực tiếp trên giá trị gia tăng theo quy định của pháp luật về thuế giá trị gia tăng và tỷ lệ trên doanh thu theo
      quy định của pháp luật về thuế thu nhập doanh nghiệp; trừ trường hợp người nộp thuế trong tháng phát sinh nhiều lần
      thì được khai theo tháng.

      e) Thuế thu nhập doanh nghiệp đối với hoạt động chuyển nhượng bất động sản của người nộp thuế áp dụng theo phương pháp
      tỷ lệ trên doanh thu theo quy định của pháp luật về thuế thu nhập doanh nghiệp.

      g) Thuế thu nhập cá nhân do cá nhân trực tiếp khai thuế hoặc tổ chức, cá nhân khai thuế thay, nộp thuế thay đối với
      thu nhập từ chuyển nhượng bất động sản; thu nhập từ chuyển nhượng vốn; thu nhập từ đầu tư vốn; thu nhập từ bản quyền,
      nhượng quyền thương mại, trúng thưởng từ nước ngoài; thu nhập từ nhận thừa kế, quà tặng.

      h) Các loại thuế, khoản thu của cá nhân cho thuê tài sản, hộ kinh doanh, cá nhân kinh doanh không có địa điểm kinh doanh
      cố định và kinh doanh không thường xuyên.

      i) Lệ phí trước bạ (bao gồm cả các trường hợp thuộc diện miễn lệ phí trước bạ theo quy định của pháp luật về lệ phí
      trước bạ).

      k) Phí bảo vệ môi trường đối với hoạt động khai thác khoáng sản không thường xuyên đã được cơ quan nhà nước có thẩm
      quyền cấp phép hoặc không thuộc trường hợp phải cấp phép theo quy định của pháp luật.

      l) Tiền sử dụng đất.

      m) Tiền thuê đất, thuê mặt nước trả tiền một lần cho cả thời hạn thuê.

      n) Thuế giá trị gia tăng, thuế thu nhập doanh nghiệp của tổ chức, cá nhân nước ngoài kinh doanh tại Việt Nam hoặc có
      thu nhập tại Việt Nam (sau đây gọi là nhà thầu nước ngoài) áp dụng theo phương pháp trực tiếp; thuế thu nhập doanh nghiệp
      của nhà thầu nước ngoài áp dụng theo phương pháp hỗn hợp khi bên Việt Nam thanh toán tiền cho nhà thầu nước ngoài. Trường
      hợp bên Việt Nam thanh toán tiền cho nhà thầu nước ngoài nhiều lần trong tháng thì được khai theo tháng thay cho việc
      khai theo từng lần phát sinh.

      o) Thuế thu nhập doanh nghiệp từ hoạt động chuyển nhượng vốn của nhà thầu nước ngoài.

      p) Thuế thu nhập doanh nghiệp đối với thu nhập từ chuyển nhượng quyền lợi tham gia hợp đồng dầu khí.

      Bên chuyển nhượng quyền lợi tham gia hợp đồng dầu khí có trách nhiệm kê khai, nộp thuế đối với thu nhập từ chuyển nhượng
      quyền lợi tham gia hợp đồng dầu khí. Trường hợp chuyển nhượng làm thay đổi chủ sở hữu của nhà thầu đang nắm giữ quyền
      lợi tham gia trong hợp đồng dầu khí tại Việt Nam, nhà thầu đứng tên trong hợp đồng dầu khí tại Việt Nam có trách nhiệm
      thông báo với cơ quan thuế khi phát sinh hoạt động chuyển nhượng và kê khai, nộp thuế thay cho bên chuyển nhượng đối
      với phần thu nhập phát sinh có liên quan đến hợp đồng dầu khí ở Việt Nam theo quy định.

      q) Tiền hoa hồng dầu, khí; tiền thu về đọc và sử dụng tài liệu dầu, khí.

      r) Khoản phụ thu và thuế thu nhập doanh nghiệp tạm tính từ tiền kết dư của phần dầu để lại của hoạt động dầu khí của
      Liên doanh Vietsovpetro tại Lô 09.1 chậm nhất là ngày thứ 10 kể từ ngày Hội đồng Liên doanh quyết định số tiền kết dư
      của phần dầu để lại theo Nghị quyết từng kỳ họp Hội đồng Liên doanh nhưng không chậm hơn ngày 31 tháng 12 hàng năm.

      s) Khai tạm tính sản lượng dầu khí khai thác và tỷ lệ tạm nộp thuế chậm nhất là ngày 01 tháng 12 của kỳ tính thuế năm
      trước.

      t) Cổ tức, lợi nhuận được chia cho phần vốn nhà nước đầu tư tại công ty cổ phần, công ty trách nhiệm hữu hạn hai thành
      viên trở lên do bộ, cơ quan ngang bộ, cơ quan trực thuộc Chính phủ, địa phương làm đại diện chủ sở hữu phần vốn của
      nhà nước khi công ty cổ phần, công ty trách nhiệm hữu hạn hai thành viên trở lên thực hiện chi trả cổ tức, lợi nhuận.

      Người đại diện phần vốn của nhà nước tại công ty cổ phần, công ty trách nhiệm hữu hạn hai thành viên trở lên có vốn
      góp của nhà nước có trách nhiệm biểu quyết chi trả cổ tức, lợi nhuận khi có đủ các điều kiện theo quy định của Luật
      Doanh nghiệp, đồng thời đề nghị, đôn đốc công ty cổ phần, công ty trách nhiệm hữu hạn hai thành viên trở lên nộp phần
      cổ tức, lợi nhuận được chia cho phần vốn góp của nhà nước về ngân sách nhà nước theo quy định.

      Trường hợp công ty cổ phần, công ty trách nhiệm hữu hạn hai thành viên trở lên có vón góp của nhà nước vi phạm thời
      hạn chia cổ tức, lợi nhuận theo quy định của Luật Doanh nghiệp thì người đại diện phần vốn của nhà nước có trách nhiệm
      báo cáo Bộ Tài chính và cơ quan đại diện phần vốn của nhà nước tại công ty cổ phần, công ty trách nhiệm hữu hạn hai
      thành viên trở lên để xử lý theo quy định của pháp luật.

      5. Khai theo từng lần xuất bán đối với hoạt động khai thác, xuất bán dầu thô, bao gồm: Thuế tài nguyên; thuế thu nhập
      doanh nghiệp; thuế đặc biệt và khoản phụ thu khi giá dầu thô biến động tăng của Liên doanh Vietsovpetro tại Lô 09.1;
      tiền lãi dầu nước chủ nhà được chia. Thời hạn nộp hồ sơ khai thuế và các khoản thu khác quy định tại khoản này theo
      từng lần xuất bán là 35 ngày kể từ ngày xuất bán dầu thô (bao gồm dầu thô xuất bán trong nước và dầu thô xuất khẩu).
      Ngày xuất bán là ngày hoàn thành việc xuất dầu thô tại điểm giao nhận.

      6. Các loại thuế, khoản thu khai quyết toán năm và quyết toán đến thời điểm giải thể, phá sản, chấm dứt hoạt động, chấm
      dứt hợp đồng hoặc tổ chức lại doanh nghiệp. Trường hợp chuyển đổi loại hình doanh nghiệp (không bao gồm doanh nghiệp
      nhà nước cổ phần hóa) mà doanh nghiệp chuyển đổi kế thừa toàn bộ nghĩa vụ về thuế của doanh nghiệp được chuyển đổi thì
      không phải khai quyết toán thuế đến thời điểm có quyết định về việc chuyển đổi doanh nghiệp, doanh nghiệp khai quyết
      toán khi kết thúc năm. Cụ thể như sau:

      a) Thuế tài nguyên.

      b) Thuế thu nhập doanh nghiệp (trừ thuế thu nhập doanh nghiệp từ chuyển nhượng vốn của nhà thầu nước ngoài; thuế thu
      nhập doanh nghiệp kê khai theo phương pháp tỷ lệ trên doanh thu theo từng lần phát sinh hoặc theo tháng theo quy định
      tại điểm đ khoản 4 Điều này). Người nộp thuế phải tự xác định số thuế thu nhập doanh nghiệp tạm nộp quý (bao gồm cả
      tạm phân bổ số thuế thu nhập doanh nghiệp cho địa bàn cấp tỉnh nơi có đơn vị phụ thuộc, địa điểm kinh doanh, nơi có
      bất động sản chuyển nhượng khác với nơi người nộp thuế đóng trụ sở chính) Và được trừ số thuế đã tạm nộp với số phải
      nộp theo quyết toán thuế năm.

      Người nộp thuế thuộc diện lập báo cáo tài chính quý theo quy định của pháp luật về kế toán căn cứ vào báo cáo tài chính
      quý và các quy định của pháp luật về thuế để xác định số thuế thu nhập doanh nghiệp tạm nộp quý.

      Người nộp thuế không thuộc diện lập báo cáo tài chính quý theo quy định của pháp luật về kế toán căn cứ vào kết quả
      sản xuất, kinh doanh quý và các quy định của pháp luật về thuế để xác định số thuế thu nhập doanh nghiệp tạm nộp quý.

      Tổng số thuế thu nhập doanh nghiệp đã tạm nộp của 03 quý đầu năm tính thuế không được thấp hơn 75% số thuế thu nhập
      doanh nghiệp phải nộp theo quyết toán năm. Trường hợp người nộp thuế nộp thiếu so với số thuế phải tạm nộp 03 quý đầu
      năm thì phải nộp tiền chậm nộp tính trên số thuế nộp thiếu kể từ ngày tiếp sau ngày cuối cùng của thời hạn tạm nộp thuế
      thu nhập doanh nghiệp quý 03 đến ngày nộp số thuế còn thiếu vào ngân sách nhà nước.

      Người nộp thuế có thực hiện dự án đầu tư cơ sở hạ tầng, nhà để chuyển nhượng hoặc cho thuê mua, có thu tiền ứng trước
      của khách hàng theo tiến độ phù hợp với quy định của pháp luật thì thực hiện tạm nộp thuế thu nhập doanh nghiệp theo
      quý theo tỷ lệ 1% trên số tiền thu được. Trường hợp chưa bàn giao cơ sở hạ tầng, nhà và chưa tính vào doanh thu tính
      thuế thu nhập doanh nghiệp trong năm thì người nộp thuế không tổng hợp vào hồ sơ khai quyết toán thuế thu nhập doanh
      nghiệp năm mà tổng hợp vào hồ sơ khai quyết toán thuế thu nhập doanh nghiệp khi bàn giao bất động sản đối với từng phần
      hoặc toàn bộ dự án.

      c) Lợi nhuận sau thuế còn lại sau khi trích lập các quỹ của doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ. Cụ thể
      như sau:

      Người nộp thuế phải tự xác định số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ tạm nộp quý chậm nhất vào ngày
      30 của quý tiếp theo quý phát sinh nghĩa vụ nộp và được trừ số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ
      đã tạm nộp với số phải nộp theo quyết toán năm.

      Tổng số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ đã tạm nộp của 03 quý đầu năm tính thuế không được thấp
      hơn 75% số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ theo quyết toán năm. Trường hợp người nộp thuế nộp thiếu
      so với số phải tạm nộp 03 quý đầu năm thì phải nộp tiền chậm nộp tính trên số tiền nộp thiếu kể từ ngày tiếp sau ngày
      cuối cùng của thời hạn tạm nộp lợi nhuận sau thuế còn lại sau khi trích lập các quỹ quý 03 đến ngày nộp số lợi nhuận
      sau thuế còn lại sau khi trích lập các quỹ còn thiếu vào ngân sách nhà nước.

      Đối với số lợi nhuận sau thuế còn lại sau khi trích lập các quỹ phải nộp tăng thêm khi thực hiện khai bổ sung do điều
      chỉnh kết quả xếp loại doanh nghiệp theo công bố của chủ sở hữu từ thời điểm ngày tiếp sau ngày cuối cùng của hạn nộp
      lợi nhuận sau thuế còn lại theo quyết toán năm đến thời hạn công bố kết quả xếp loại doanh nghiệp của chủ sở hữu theo
      quy định của cơ quan có thẩm quyền thì doanh nghiệp không phải nộp tiền chậm nộp.

      Doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ là công ty mẹ có vốn góp tại công ty cổ phần, công ty trách nhiệm
      hữu hạn hai thành viên trở lên có trách nhiệm biểu quyết chi trả cổ tức, lợi nhuận khi có đủ các điều kiện theo quy
      định của Luật Doanh nghiệp đồng thời đề nghị, đôn đốc công ty cổ phần, công ty trách nhiệm hữu hạn hai thành viên trở
      lên nộp phần cổ tức, lợi nhuận được chia cho phần vốn góp của công ty mẹ về công ty mẹ.

      Trường hợp công ty cổ phần, công ty trách nhiệm hữu hạn hai thành viên trở lên có vốn góp của công ty mẹ vi phạm thời
      hạn chia cổ tức, lợi nhuận theo quy định của Luật Doanh nghiệp thì công ty mẹ có trách nhiệm báo cáo Bộ Tài chính và
      cơ quan chủ quản của công ty mẹ để xử lý theo quy định của pháp luật

      d) Thuế thu nhập cá nhân đối với tổ chức, cá nhân trả thu nhập chịu thuế thu nhập cá nhân từ tiền lương, tiền công;
      cá nhân có thu nhập từ tiền lương, tiền công ủy quyền quyết toán thuế cho tổ chức, cá nhân trả thu nhập; cá nhân có
      thu nhập từ tiền lương, tiền công trực tiếp quyết toán thuế với cơ quan thuế. Cụ thể như sau:

      d.1) Tổ chức, cá nhân trả thu nhập từ tiền lương, tiền công có trách nhiệm khai quyết toán thuế và quyết toán thay cho
      các cá nhân có ủy quyền do tổ chức, cá nhân trả thu nhập chi trả, không phân biệt có phát sinh khấu trừ thuế hay không
      phát sinh khấu trừ thuế. Trường hợp tổ chức, cá nhân không phát sinh trả thu nhập thì không phải khai quyết toán thuế
      thu nhập cá nhân. Trường hợp cá nhân là người lao động được điều chuyển từ tổ chức cũ đến tổ chức mới do tổ chức cũ
      thực hiện sáp nhập, hợp nhất, chia, tách, chuyển đổi loại hình doanh nghiệp hoặc tổ chức cũ và tổ chức mới trong cùng
      một hệ thống thì tổ chức mới có trách nhiệm quyết toán thuế theo ủy quyền của cá nhân đối với cả phần thu nhập do tổ
      chức cũ chi trả và thu lại chứng từ khấu trừ thuế thu nhập cá nhân do tổ chức cũ đã cấp cho người lao động (nếu có).

      d.2) Cá nhân cư trú có thu nhập từ tiền lương, tiền công ủy quyền quyết toán thuế cho tổ chức, cá nhân trả thu nhập,
      cụ thể như sau:

      Cá nhân có thu nhập từ tiền lương, tiền công ký hợp đồng lao động từ 03 tháng trở lên tại một nơi và thực tế đang làm
      việc tại đó vào thời điểm tổ chức, cá nhân trả thu nhập thực hiện việc quyết toán thuế, kể cả trường hợp không làm việc
      đủ 12 tháng trong năm. Trường hợp cá nhân là người lao động được điều chuyển từ tổ chức cũ đến tổ chức mới theo quy
      định tại điểm d.1 khoản này thì cá nhân được ủy quyền quyết toán thuế cho tổ chức mới.

      Cá nhân có thu nhập từ tiền lương, tiền công ký hợp đồng lao động từ 03 tháng trở lên tại một nơi và thực tế đang làm
      việc tại đó vào thời điểm tổ chức, cá nhân trả thu nhập quyết toán thuế, kể cả trường hợp không làm việc đủ 12 tháng
      trong năm; đồng thời có thu nhập văng lai ở các nơi khác bình quân tháng trong năm không quá 10 triệu đồng và đã được
      khấu trừ thuế thu nhập cá nhân theo tỷ lệ 10% nếu không có yêu cầu quyết toán thuế đối với phần thu nhập này.

      d.3) Cá nhân cư trú có thu nhập từ tiền lương, tiền công trực tiếp khai quyết toán thuế thu nhập cá nhân với cơ quan
      thuế trong các trường hợp sau đây:

      Có số thuế phải nộp thêm hoặc có số thuế nộp thừa đề nghị hoàn hoặc bù trừ vào kỳ khai thuế tiếp theo, trừ các trường
      hợp sau: cá nhân có số thuế phải nộp thêm sau quyết toán của từng năm từ 50.000 đồng trở xuống; cá nhân có số thuế phải
      nộp nhỏ hơn số thuế đã tạm nộp mà không có yêu cầu hoàn thuế hoặc bù trừ vào kỳ khai thuế tiếp theo; cá nhân có thu
      nhập từ tiền lương, tiền công ký hợp đồng lao động từ 03 tháng trở lên tại một đơn vị, đồng thời có thu nhập vãng lai
      ở các nơi khác bình quân tháng trong năm không quá 10 triệu đồng và đã được khấu trừ thuế thu nhập cá nhân theo tỷ lệ
      10% nếu không có yêu cầu thì không phải quyết toán thuế đối với phần thu nhập này; cá nhân được người sử dụng lao động
      mua bảo hiểm nhân thọ (trừ bảo hiểm hưu trí tự nguyện), bảo hiểm không bắt buộc khác có tích lũy về phí bảo hiểm mà
      người sử dụng lao động hoặc doanh nghiệp bảo hiểm đã khấu trừ thuế thu nhập cá nhân theo tỷ lệ 10% trên khoản tiền phí
      bảo hiểm tương ứng với phần người sử dụng lao động mua hoặc đóng góp cho người lao động thì người lao động không phải
      quyết toán thuế thu nhập cá nhân đối với phần thu nhập này.

      Cá nhân có mặt tại Việt Nam tính trong năm dương lịch đầu tiên dưới 183 ngày, nhưng tính trong 12 tháng liên tục kể
      từ ngày đầu tiên có mặt tại Việt Nam là từ 183 ngày trở lên.

      Cá nhân là người nước ngoài kết thúc hợp đồng làm việc tại Việt Nam khai quyết toán thuế với cơ quan thuế trước khi
      xuất cảnh. Trường hợp cá nhân chưa làm thủ tục quyết toán thuế với cơ quan thuế thì thực hiện ủy quyền cho tổ chức trả
      thu nhập hoặc tổ chức, cá nhân khác quyết toán thuế theo quy định về quyết toán thuế đối với cá nhân. Trường hợp tổ
      chức trả thu nhập hoặc tổ chức, cá nhân khác nhận ủy quyền quyết toán thì phải chịu trách nhiệm về số thuế thu nhập
      cá nhân phải nộp thêm hoặc được hoàn trả số thuế nộp thừa của cá nhân.

      Cá nhân cư trú có thu nhập từ tiền lương, tiền công đồng thời thuộc diện xét giảm thuế do thiên tai, hoả hoạn, tai nạn,
      bệnh hiểm nghèo ảnh hưởng đến khả năng nộp thuế thì không ủy quyền cho tổ chức, cá nhân trả thu nhập quyết toán thuế
      thay mà phải trực tiếp khai quyết toán với cơ quan thuế theo quy định.

      đ) Các khoản phí thuộc ngân sách nhà nước (trừ phí do cơ quan đại diện nước Cộng hòa xã hội chủ nghĩa Việt Nam ở nước
      ngoài thực hiện thu theo quy định tại Điều 12 Nghị định này và phí hải quan).

      e) Thuế giá trị gia tăng, thuế thu nhập doanh nghiệp theo phương pháp trực tiếp của nhà thầu nước ngoài quyết toán khi
      kết thúc hợp đồng nhà thầu; thuế thu nhập doanh nghiệp theo phương pháp hỗn hợp của nhà thầu nước ngoài quyết toán khi
      kết thúc hợp đồng nhà thầu; thuế thu nhập doanh nghiệp theo phương pháp kê khai của nhà thầu nước ngoài quyết toán theo
      năm.

      g) Thuế thu nhập doanh nghiệp của hãng vận tải nước ngoài tạm nộp quý và khai quyết toán năm. Tổng số thuế thu nhập
      doanh nghiệp đã tạm nộp của 03 quý đầu năm tính thuế không được thấp hơn 75% số thuế thu nhập doanh nghiệp phải nộp
      theo quyết toán năm. Trường hợp người nộp thuế nộp thiếu so với số thuế phải tạm nộp 03 quý đầu năm thì phải nộp tiền
      chậm nộp tính trên số thuế nộp thiếu kể từ ngày tiếp sau ngày cuối cùng của thời hạn tạm nộp thuế thu nhập doanh nghiệp
      quý 03 đến ngày nộp số thuế còn thiếu vào ngân sách nhà nước.

      h) Thuế tài nguyên, thuế thu nhập doanh nghiệp, tiền lãi dầu khí nước chủ nhà được chia đối với hoạt động khai thác,
      xuất bán dầu thô và khí thiên nhiên; khoản phụ thu khi giá dầu thô biến động tăng; điều chỉnh thuế đặc biệt đối với
      hoạt động khai thác, xuất bán khí thiên nhiên của Liên doanh Vietsovpetro tại Lô 09.1.'
    - 'Điều 6. Thẩm quyền bổ nhiệm, miễn nhiệm Thủ trưởng, Phó Thủ trưởng Cơ quan quản lý thi hành án hình sự thuộc Bộ Công
      an; Thủ trưởng, Phó Thủ trưởng Cơ quan thi hành án hình sự Công an cấp tỉnh; Thủ trưởng, Phó Thủ trưởng Cơ quan thi
      hành án hình sự Công an cấp huyện1. Bộ trưởng Bộ Công an quyết định bổ nhiệm Thủ trưởng, Phó Thủ trưởng Cơ quan quản
      lý thi hành án hình sự thuộc Bộ Công an.

      2. Thứ trưởng phụ trách Tổng cục Cảnh sát thi hành án hình sự và hỗ trợ tư pháp quyết định bổ nhiệm Thủ trưởng, Phó
      Thủ trưởng Cơ quan thi hành án hình sự Công an cấp tỉnh.

      3. Giám đốc Công an cấp tỉnh quyết định bổ nhiệm Thủ trưởng, Phó Thủ trưởng Cơ quan thi hành án hình sự Công an cấp
      huyện.

      4. Cấp có thẩm quyền quyết định bổ nhiệm Thủ trưởng, Phó Thủ trưởng Cơ quan quản lý thi hành án hình sự thuộc Bộ Công
      an; Thủ trưởng, Phó Thủ trưởng Cơ quan thi hành án hình sự Công an cấp tỉnh; Thủ trưởng, Phó Thủ trưởng Cơ quan thi
      hành án hình sự Công an cấp huyện có quyền quyết định miễn nhiệm, cách chức các chức vụ đã ra quyết định bổ nhiệm.'
  - source_sentence: Tiêu chí xây dựng, thực hiện đề án thuộc Chương trình cấp quốc gia về xúc tiến thương mại được quy định
      như thế nào?
    sentences:
    - 'Điều 18. Dự án đầu tư, tài sản thuộc dự án đầu tưChủ đầu tư được dùng dự án đầu tư mà Luật Đầu tư, luật khác liên quan
      không cấm chuyển nhượng để bảo đảm thực hiện nghĩa vụ.

      Chủ đầu tư có thể dùng toàn bộ dự án đầu tư, quyền tài sản của mình về khai thác, quản lý dự án đầu tư và quyền tài
      sản khác hoặc tài sản khác thuộc dự án đầu tư để bảo đảm thực hiện nghĩa vụ.

      Trường hợp dự án đầu tư dùng để bảo đảm thực hiện nghĩa vụ là dự án xây dựng nhà ở, dự án xây dựng công trình không
      phải là nhà ở, dự án khác mà theo quy định của pháp luật liên quan phải có Giấy chứng nhận, Quyết định của cơ quan nhà
      nước có thẩm quyền hoặc căn cứ pháp lý khác thì việc mô tả trong hợp đồng bảo đảm phải thể hiện được căn cứ pháp lý
      này.'
    - 'Điều 3. Tiêu chí xây dựng, thực hiện đề án thuộc Chương trình cấp quốc gia về xúc tiến thương mại1. Đề án phải phù
      hợp với các quy định tại Điều 8 Nghị định 28/2018/NĐ-CP ngày 01 tháng 3 năm 2018 của Chính phủ.

      2. Đề án là hoạt động xúc tiến thương mại cho ngành hàng, sản phẩm có tiềm năng xuất khẩu của quốc gia, vùng kinh tế
      hoặc từ 02 tỉnh/thành phố trực thuộc trung ương trở lên; hoặc sản phẩm đã được bảo hộ chỉ dẫn địa lý, nhãn hiệu tập
      thể, nhãn hiệu chứng nhận.'
    - Điều 30. Thời hạn của giấy phép hoạt động văn phòng đại diệnGiấy phép hoạt động văn phòng đại diện của tổ chức, cơ sở
      giáo dục nghề nghiệp nước ngoài tại Việt Nam có thời hạn không quá 05 năm, kể từ ngày quyết định cho phép thành lập.
      Trường hợp gia hạn thì thời hạn không quá 03 năm; cấp lại có thời hạn không quá thời hạn của giấy phép đã được cấp trước
      đó.
  - source_sentence: Có được cho thuê ô tô đang bị thế chấp cho ngân hàng không?
    sentences:
    - Điều 15. Trách nhiệm của Hội đồng nhân dân tỉnh, thành phố trực thuộc trung ươngQuyết định biên chế công chức trong
      cơ quan của Hội đồng nhân dân, Ủy ban nhân dân cấp tỉnh, cấp huyện trong số biên chế được cơ quan có thẩm quyền giao.
    - 'Điều 86. Hoạt động của công ty chứng khoán, công ty quản lý quỹ đầu tư chứng khoán và chi nhánh, văn phòng đại diện
      công ty chứng khoán, công ty quản lý quỹ nước ngoài tại Việt Nam1. Công ty chứng khoán được cấp phép thực hiện nghiệp
      vụ môi giới chứng khoán được cung cấp các dịch vụ sau đây:

      a) Nhận ủy thác quản lý tài khoản giao dịch chứng khoán của nhà đầu tư cá nhân; thực hiện phân phối hoặc làm đại lý
      phân phối chứng khoán; quản lý tài khoản giao dịch chứng khoán; cung ứng dịch vụ quản lý danh sách người sở hữu chứng
      khoán cho các doanh nghiệp khác;

      b) Cung cấp dịch vụ giao dịch chứng khoán trực tuyến; cung cấp hoặc phối hợp với các tổ chức tín dụng cung cấp dịch
      vụ cho khách hàng vay tiền mua chứng khoán hoặc cung cấp dịch vụ cho vay chứng khoán; cung cấp hoặc phối hợp với các
      tổ chức tín dụng cung cấp dịch vụ ứng trước tiền bán chứng khoán; lưu ký chứng khoán; bù trừ và thanh toán chứng khoán;
      các dịch vụ trên thị trường chứng khoán phái sinh.

      2. Công ty chứng khoán được cấp phép thực hiện nghiệp vụ tự doanh chứng khoán được giao dịch chứng khoán trên tài khoản
      tự doanh chứng khoán và được đầu tư, góp vốn, phát hành, chào bán các sản phẩm tài chính.

      3. Công ty chứng khoán được cấp phép thực hiện nghiệp vụ bảo lãnh phát hành chứng khoán được cung cấp dịch vụ tư vấn
      hồ sơ chào bán chứng khoán, thực hiện các thủ tục trước khi chào bán chứng khoán; đại lý lưu ký, thanh toán, chuyển
      nhượng chứng khoán; tư vấn tái cơ cấu, hợp nhất, sáp nhập, tổ chức lại, mua bán doanh nghiệp; tư vấn quản trị, tư vấn
      chiến lược doanh nghiệp; tư vấn chào bán, niêm yết, đăng ký giao dịch chứng khoán; tư vấn cổ phần hóa doanh nghiệp.

      4. Công ty chứng khoán được cấp phép thực hiện nghiệp vụ tư vấn đầu tư chứng khoán được ký hợp đồng cung cấp dịch vụ
      cho khách hàng theo quy định tại khoản 32 Điều 4 của Luật này.

      5. Ngoài các dịch vụ quy định tại các khoản 1, 2, 3 và 4 Điều này, công ty chứng khoán chỉ được cung cấp dịch vụ tài
      chính khác phù hợp với quy định của pháp luật sau khi báo cáo Ủy ban Chứng khoán Nhà nước bằng văn bản. Ủy ban Chứng
      khoán Nhà nước có quyền tạm ngừng, đình chỉ việc cung cấp dịch vụ tài chính khác của công ty chứng khoán nếu việc cung
      cấp dịch vụ đó trái với quy định của pháp luật hoặc gây rủi ro hệ thống thị trường chứng khoán.

      6. Công ty quản lý quỹ đầu tư chứng khoán được huy động và quản lý các quỹ đầu tư nước ngoài có mục tiêu đầu tư vào
      Việt Nam, quản lý quỹ hưu trí bổ sung tự nguyện theo quy định của pháp luật có liên quan, cung cấp dịch vụ giao dịch
      chứng khoán trực tuyến.

      7. Chi nhánh công ty chứng khoán nước ngoài tại Việt Nam chỉ được thực hiện nghiệp vụ tư vấn đầu tư chứng khoán. Chi
      nhánh công ty quản lý quỹ nước ngoài tại Việt Nam chỉ được cung cấp dịch vụ quản lý tài sản cho vốn huy động tại nước
      ngoài.

      8. Bộ trưởng Bộ Tài chính quy định chi tiết về hoạt động của công ty chứng khoán, công ty quản lý quỹ đầu tư chứng khoán,
      chi nhánh và văn phòng đại diện công ty chứng khoán, công ty quản lý quỹ đầu tư chứng khoán và chi nhánh, văn phòng
      đại diện công ty chứng khoán, công ty quản lý quỹ nước ngoài tại Việt Nam; các dịch vụ được cung cấp, việc tạm ngừng,
      đình chỉ việc cung cấp dịch vụ tài chính khác của công ty chứng khoán quy định tại các khoản 1, 2, 3, 4 và 5 của Điều
      này.'
    - 'Điều 321. Quyền của bên thế chấp1. Khai thác công dụng, hưởng hoa lợi, lợi tức từ tài sản thế chấp, trừ trường hợp
      hoa lợi, lợi tức cũng là tài sản thế chấp theo thỏa thuận.

      2. Đầu tư để làm tăng giá trị của tài sản thế chấp.

      3. Nhận lại tài sản thế chấp do người thứ ba giữ và giấy tờ liên quan đến tài sản thế chấp do bên nhận thế chấp giữ
      khi nghĩa vụ được bảo đảm bằng thế chấp chấm dứt hoặc được thay thế bằng biện pháp bảo đảm khác.

      4. Được bán, thay thế, trao đổi tài sản thế chấp, nếu tài sản đó là hàng hóa luân chuyển trong quá trình sản xuất, kinh
      doanh. Trong trường hợp này, quyền yêu cầu bên mua thanh toán tiền, số tiền thu được, tài sản hình thành từ số tiền
      thu được, tài sản được thay thế hoặc được trao đổi trở thành tài sản thế chấp.

      Trường hợp tài sản thế chấp là kho hàng thì bên thế chấp được quyền thay thế hàng hóa trong kho, nhưng phải bảo đảm
      giá trị của hàng hóa trong kho đúng như thỏa thuận.

      5. Được bán, trao đổi, tặng cho tài sản thế chấp không phải là hàng hóa luân chuyển trong quá trình sản xuất, kinh doanh,
      nếu được bên nhận thế chấp đồng ý hoặc theo quy định của luật.

      6. Được cho thuê, cho mượn tài sản thế chấp nhưng phải thông báo cho bên thuê, bên mượn biết về việc tài sản cho thuê,
      cho mượn đang được dùng để thế chấp và phải thông báo cho bên nhận thế chấp biết.'
  - source_sentence: Sử dụng Giấy đăng ký xe máy đã bị tẩy xóa bị phạt bao nhiêu theo nghị định 100/2019/NĐ-CP?
    sentences:
    - 'Điều 17. Xử phạt người điều khiển xe mô tô, xe gắn máy (kể cả xe máy điện), các loại xe tương tự xe mô tô và các loại
      xe tương tự xe gắn máy vi phạm quy định về điều kiện của phương tiện khi tham gia giao thông1. Phạt tiền từ 100.000
      đồng đến 200.000 đồng đối với một trong các hành vi vi phạm sau đây:

      a) Điều khiển xe không có còi; đèn soi biển số; đèn báo hãm; gương chiếu hậu bên trái người điều khiển hoặc có nhưng
      không có tác dụng;

      b) Điều khiển xe gắn biển số không đúng quy định; gắn biển số không rõ chữ, số; gắn biển số bị bẻ cong, bị che lấp,
      bị hỏng; sơn, dán thêm làm thay đổi chữ, số hoặc thay đổi màu sắc của chữ, số, nền biển;

      c) Điều khiển xe không có đèn tín hiệu hoặc có nhưng không có tác dụng;

      d) Sử dụng còi không đúng quy chuẩn kỹ thuật cho từng loại xe;

      đ) Điều khiển xe không có bộ phận giảm thanh, giảm khói hoặc có nhưng không bảo đảm quy chuẩn môi trường về khí thải,
      tiếng ồn;

      e) Điều khiển xe không có đèn chiếu sáng gần, xa hoặc có nhưng không có tác dụng, không đúng tiêu chuẩn thiết kế;

      g) Điều khiển xe không có hệ thống hãm hoặc có nhưng không có tác dụng, không bảo đảm tiêu chuẩn kỹ thuật;

      h) Điều khiển xe lắp đèn chiếu sáng về phía sau xe.

      2. Phạt tiền từ 300.000 đồng đến 400.000 đồng đối với một trong các hành vi vi phạm sau đây:

      a) Điều khiển xe không có Giấy đăng ký xe theo quy định hoặc sử dụng Giấy đăng ký xe đã hết hạn sử dụng;

      b) Sử dụng Giấy đăng ký xe đã bị tẩy xóa; sử dụng Giấy đăng ký xe không đúng số khung, số máy của xe hoặc không do cơ
      quan có thẩm quyền cấp;

      c) Điều khiển xe không gắn biển số (đối với loại xe có quy định phải gắn biển số); gắn biển số không đúng với Giấy đăng
      ký xe hoặc gắn biển số không do cơ quan có thẩm quyền cấp.

      3. Phạt tiền từ 800.000 đồng đến 1.000.000 đồng đối với một trong các hành vi vi phạm sau đây:

      a) Điều khiển xe đăng ký tạm hoạt động quá phạm vi, thời hạn cho phép;

      b) Điều khiển loại xe sản xuất, lắp ráp trái quy định tham gia giao thông.

      4. Ngoài việc bị phạt tiền, người điều khiển xe thực hiện hành vi vi phạm còn bị áp dụng các hình thức xử phạt bổ sung
      sau đây:

      a) Thực hiện hành vi quy định tại điểm d khoản 1 Điều này bị tịch thu còi;

      b) Thực hiện hành vi quy định tại điểm b, điểm c khoản 2 Điều này bị tịch thu Giấy đăng ký xe, biển số không đúng quy
      định hoặc bị tẩy xóa;

      c) Thực hiện hành vi quy định tại điểm a khoản 3 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 01 tháng đến 03
      tháng;

      d) Thực hiện hành vi quy định tại điểm b khoản 3 Điều này bị tịch thu phương tiện và tước quyền sử dụng Giấy phép lái
      xe từ 01 tháng đến 03 tháng;

      đ) Thực hiện hành vi quy định tại điểm a, điểm b khoản 2 Điều này trong trường hợp không có Giấy đăng ký xe hoặc sử
      dụng Giấy đăng ký xe không do cơ quan có thẩm quyền cấp, không đúng số khung, số máy của xe hoặc bị tẩy xóa mà không
      chứng minh được nguồn gốc xuất xứ của phương tiện (không có giấy tờ, chứng từ chuyển quyền sở hữu xe hoặc giấy tờ, chứng
      từ nguồn gốc xe hợp pháp) thì bị tịch thu phương tiện.'
    - 'Điều 3. Giải thích từ ngữTrong Nghị định này, các từ ngữ dưới đây được hiểu như sau:

      1. Hệ thống ACTS là hệ thống công nghệ thống tin tích hợp do các nước thành viên ASEAN thiết lập và kết nối, trao đổi
      thông tin với nhau để thực hiện thủ tục quá cảnh điện tử, kiểm soát sự vận chuyển hàng hóa quá cảnh qua lãnh thổ của
      các nước thành viên ASEAN, hỗ trợ cơ quan hải quan các nước thành viên ASEAN tính tiền thuế hải quan, tiền bảo lãnh
      và trao đổi thông tin thu hồi nợ thuế hải quan trên cơ sở quy định tại Nghị định thư 7 về hệ thống quá cảnh hải quan
      (sau đây gọi là Nghị định thư 7).

      2. Tờ khai quá cảnh hải quan là tờ khai hải quan điện tử gồm các chỉ tiêu thông tin mà người khai hải quan phải khai
      khi thực hiện thủ tục quá cảnh hàng hóa thông qua Hệ thống ACTS.

      Một tờ khai quá cảnh hải quan chỉ được sử dụng để khai báo cho hàng hóa quá cảnh được vận chuyển trên một phương tiện
      vận tải của một hành trình quá cảnh thông qua Hệ thống ACTS.

      3. Chứng từ đi kèm hàng hóa quá cảnh (viết tắt là TAD) là tờ khai quá cảnh hải quan đã được cơ quan hải quan điểm đi
      phê duyệt và in ra từ Hệ thống ACTS.

      4. Hành trình quá cảnh là hành trình vận chuyển hàng hóa quá cảnh từ một cơ quan hải quan tại điểm đi đến một cơ quan
      hải quan tại điểm đích thông qua Hệ thống ACTS.

      5. Bảo lãnh quá cảnh là sự đảm bảo của người bảo lãnh về thanh toán tiền thuế hải quan có thể phát sinh trong hành trình
      quá cảnh.

      6. Bảo lãnh một hành trình là việc người bảo lãnh cam kết thực hiện đầy đủ nghĩa vụ về toàn bộ tiền thuế hải quan có
      thể phát sinh trong một hành trình quá cảnh.

      7. Bảo lãnh nhiều hành trình là việc người bảo lãnh cam kết thực hiện đầy đủ nghĩa vụ về toàn bộ tiền thuế hải quan
      có thể phát sinh của nhiều hành trình quá cảnh.

      8. Người bảo lãnh là pháp nhân hoặc thể nhân cam kết với cơ quan hải quan nước đi, cơ quan hải quan nước quá cảnh, cơ
      quan hải quan nước đến về việc phải thanh toán bất kỳ khoản tiền thuế hải quan có thể phát sinh theo yêu cầu của cơ
      quan hải quan tham gia hành trình vận chuyển hàng hóa quá cảnh.

      9. Người bảo lãnh tại Việt Nam (trong trường hợp hàng hóa quá cảnh xuất phát từ Việt Nam qua các nước ASEAN khác) là
      tổ chức tín dụng, chi nhánh ngân hàng nước ngoài hoạt động theo quy định của Luật Các tổ chức tín dụng đảm bảo cam kết
      với cơ quan hải quan Việt Nam, cơ quan hải quan nước quá cảnh, cơ quan hải quan nước đến về việc thực hiện đầy đủ nghĩa
      vụ nộp khoản tiền thuế hải quan có thể phát sinh trong hành trình vận chuyển hàng hóa quá cảnh.

      10. Cơ quan bảo lãnh là cơ quan được các nước thành viên ASEAN tham gia Nghị định thư 7 chỉ định thực hiện phê duyệt
      người bảo lãnh và giám sát việc bảo lãnh trong quá trình vận chuyển hàng hóa quá cảnh. Cơ quan bảo lãnh tại Việt Nam
      là cơ quan hải quan.

      11. Tiền thuế hải quan là tiền thuế nhập khẩu, thuế khác và các khoản phí, lệ phí phải nộp phát sinh đối với hàng hóa
      quá cảnh trong quá trình vận chuyển.

      12. Nợ thuế hải quan là tiền thuế hải quan mà người khai hải quan chưa nộp vào ngân sách nhà nước khi hết thời hạn nộp
      theo quy định.

      13. Hỗ trợ thu hồi nợ thuế hải quan là việc cơ quan hải quan các nước thành viên ASEAN tham gia Nghị định thư 7 hỗ trợ
      thu hồi nợ thuế hải quan phát sinh trong quá trình vận chuyển hàng hóa quá cảnh theo yêu cầu của các nước thành viên
      ASEAN.

      14. Cơ quan thu hồi nợ thuế hải quan, cơ quan hỗ trợ thu hồi nợ thuế hải quan hoặc cơ quan yêu cầu hỗ trợ thu hồi nợ
      thuế hải quan tại Việt Nam là cơ quan hải quan.

      15. Bất thường trong hành trình quá cảnh bao gồm: Hàng hóa bị mất mát hoặc bị phá hủy; hành trình quá cảnh ban đầu bị
      thay đổi; niêm phong bị dỡ bỏ trong quá trình quá cảnh hoặc hàng hóa phải chuyển sang phương tiện vận tải khác vì lý
      do khách quan ngoài khả năng kiểm soát của người vận chuyển; tình huống nguy hiểm sắp xảy ra đòi hỏi phải dỡ ngay lập
      tức một phần hoặc toàn bộ hàng hóa trên phương tiện vận tải; các trường hợp khác ảnh hưởng đến việc hoàn thành hoạt
      động quá cảnh hàng hóa thông qua Hệ thống ACTS.

      16. Hàng hóa di chuyển bất hợp pháp khỏi thủ tục hải quan quá cảnh thông qua Hệ thống ACTS là việc di chuyển hàng hóa
      quá cảnh ra khỏi thủ tục quá cảnh thông qua Hệ thống ACTS mà không được sự đồng ý của cơ quan có thẩm quyền hoặc không
      xuất trình được hồ sơ, tài liệu chứng minh hàng hóa được đặt dưới một chế độ thủ tục hải quan khác.'
    - 'Điều 10. Thời hạn, ngày phát hành và ngày đến hạn thanh toán của giấy tờ có giá1. Trái phiếu có thời hạn từ một năm
      trở lên, thời hạn cụ thể do tổ chức tín dụng quy định. Trái phiếu phát hành cùng một đợt và cùng thời hạn được ghi cùng
      ngày phát hành và cùng ngày đến hạn thanh toán.

      2. Thời hạn, ngày phát hành và ngày đến hạn thanh toán đối với kỳ phiếu, tín phiếu, chứng chỉ tiền gửi do tổ chức tín
      dụng, chi nhánh ngân hàng nước ngoài quy định.'
  - source_sentence: Mức phạt khi điều khiển xe ô tô xe chạy quá tốc độ quy định gây tai nạn giao thông
    sentences:
    - 'Điều 24. Điều kiện cấp Giấy chứng nhận khả năng chuyên môn thuyền trưởng, đại phó tàu từ 3000 GT trở lên1. Điều kiện
      chuyên môn:

      a) Tốt nghiệp chuyên ngành điều khiển tàu biển trình độ đại học; trường hợp tốt nghiệp chuyên ngành điều khiển tàu biển
      trình độ cao đẳng thì phải hoàn thành chương trình đào tạo nâng cao do Bộ trưởng Bộ Giao thông vận tải quy định;

      b) Có tiếng Anh hàng hải trình độ 3;

      c) Hoàn thành chương trình bồi dưỡng nghiệp vụ do Bộ trưởng Bộ Giao thông vận tải quy định;

      d) Đạt kết quả kỳ thi thuyền trưởng, đại phó tàu từ 3000 GT trở lên.

      2. Điều kiện đảm nhiệm chức danh:

      a) Đối với đại phó: có thời gian đảm nhiệm chức danh sỹ quan boong tàu từ 500 GT trở lên tối thiểu 24 tháng;

      b) Đối với thuyền trưởng: có thời gian đảm nhiệm chức danh đại phó tàu từ 3000 GT trở lên tối thiểu 24 tháng hoặc có
      thời gian đảm nhiệm chức danh thuyền trưởng tàu từ 500 GT đến dưới 3000 GT tối thiểu 12 tháng và đảm nhiệm chức danh
      đại phó tàu từ 3000 GT trở lên tối thiểu 12 tháng.'
    - 'Điều 6. Xử phạt người điều khiển xe mô tô, xe gắn máy (kể cả xe máy điện), các loại xe tương tự xe mô tô và các loại
      xe tương tự xe gắn máy vi phạm quy tắc giao thông đường bộ1. Phạt tiền từ 100.000 đồng đến 200.000 đồng đối với người
      điều khiển xe thực hiện một trong các hành vi vi phạm sau đây:

      a) Không chấp hành hiệu lệnh, chỉ dẫn của biển báo hiệu, vạch kẻ đường, trừ các hành vi vi phạm quy định tại điểm c,
      điểm đ, điểm e, điểm h khoản 2; điểm d, điểm g, điểm i, điểm m khoản 3; điểm a, điểm b, điểm c, điểm d, điểm e khoản
      4; khoản 5; điểm b khoản 6; điểm a, điểm b khoản 7; điểm d khoản 8 Điều này;

      b) Không có báo hiệu xin vượt trước khi vượt;

      c) Không giữ khoảng cách an toàn để xảy ra va chạm với xe chạy liền trước hoặc không giữ khoảng cách theo quy định của
      biển báo hiệu “Cự ly tối thiểu giữa hai xe”;

      d) Chuyển hướng không nhường quyền đi trước cho: Người đi bộ, xe lăn của người khuyết tật qua đường tại nơi có vạch
      kẻ đường dành cho người đi bộ; xe thô sơ đang đi trên phần đường dành cho xe thô sơ;

      đ) Chuyển hướng không nhường đường cho: Các xe đi ngược chiều; người đi bộ, xe lăn của người khuyết tật đang qua đường
      tại nơi không có vạch kẻ đường cho người đi bộ;

      e) Lùi xe mô tô ba bánh không quan sát hoặc không có tín hiệu báo trước;

      g) Chở người ngồi trên xe sử dụng ô (dù);

      h) Không tuân thủ các quy định về nhường đường tại nơi đường giao nhau, trừ các hành vi vi phạm quy định tại điểm b,
      điểm e khoản 2 Điều này;

      i) Chuyển làn đường không đúng nơi được phép hoặc không có tín hiệu báo trước;

      k) Điều khiển xe chạy dàn hàng ngang từ 03 xe trở lên;

      l) Không sử dụng đèn chiếu sáng trong thời gian từ 19 giờ ngày hôm trước đến 05 giờ ngày hôm sau hoặc khi sương mù,
      thời tiết xấu hạn chế tầm nhìn;

      m) Tránh xe không đúng quy định; sử dụng đèn chiếu xa khi tránh xe đi ngược chiều; không nhường đường cho xe đi ngược
      chiều theo quy định tại nơi đường hẹp, đường dốc, nơi có chướng ngại vật;

      n) Bấm còi trong thời gian từ 22 giờ ngày hôm trước đến 05 giờ ngày hôm sau, sử dụng đèn chiếu xa trong đô thị, khu
      đông dân cư, trừ các xe ưu tiên đang đi làm nhiệm vụ theo quy định;

      o) Xe được quyền ưu tiên lắp đặt, sử dụng thiết bị phát tín hiệu ưu tiên không đúng quy định hoặc sử dụng thiết bị phát
      tín hiệu ưu tiên mà không có Giấy phép của cơ quan có thẩm quyền cấp hoặc có Giấy phép của cơ quan có thẩm quyền cấp
      nhưng không còn giá trị sử dụng theo quy định;

      p) Quay đầu xe tại nơi không được quay đầu xe, trừ hành vi vi phạm quy định tại điểm d khoản 4 Điều này;

      q) Điều khiển xe chạy dưới tốc độ tối thiểu trên những đoạn đường bộ có quy định tốc độ tối thiểu cho phép.

      2. Phạt tiền từ 200.000 đồng đến 300.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm sau
      đây:

      a) Dừng xe, đỗ xe trên phần đường xe chạy ở đoạn đường ngoài đô thị nơi có lề đường;

      b) Không giảm tốc độ và nhường đường khi điều khiển xe chạy từ trong ngõ, đường nhánh ra đường chính;

      c) Điều khiển xe chạy quá tốc độ quy định từ 05 km/h đến dưới 10 km/h;

      d) Điều khiển xe chạy tốc độ thấp mà không đi bên phải phần đường xe chạy gây cản trở giao thông;

      đ) Dừng xe, đỗ xe ở lòng đường đô thị gây cản trở giao thông; tụ tập từ 03 xe trở lên ở lòng đường, trong hầm đường
      bộ; đỗ, để xe ở lòng đường đô thị, hè phố trái quy định của pháp luật;

      e) Không nhường đường cho xe xin vượt khi có đủ điều kiện an toàn; không nhường đường cho xe đi trên đường ưu tiên,
      đường chính từ bất kỳ hướng nào tới tại nơi đường giao nhau;

      g) Xe không được quyền ưu tiên lắp đặt, sử dụng thiết bị phát tín hiệu của xe được quyền ưu tiên;

      h) Dừng xe, đỗ xe trên đường xe điện, điểm dừng đón trả khách của xe buýt, nơi đường bộ giao nhau, trên phần đường dành
      cho người đi bộ qua đường; dừng xe nơi có biển “Cấm dừng xe và đỗ xe”; đỗ xe tại nơi có biển “Cấm đỗ xe” hoặc biển “Cấm
      dừng xe và đỗ xe”; không tuân thủ các quy định về dừng xe, đỗ xe tại nơi đường bộ giao nhau cùng mức với đường sắt;
      dừng xe, đỗ xe trong phạm vi an toàn của đường sắt, trừ hành vi vi phạm quy định tại điểm b khoản 2, điểm b khoản 3
      Điều 49 Nghị định này;

      i) Không đội “mũ bảo hiểm cho người đi mô tô, xe máy” hoặc đội “mũ bảo hiểm cho người đi mô tô, xe máy” không cài quai
      đúng quy cách khi điều khiển xe tham gia giao thông trên đường bộ;

      k) Chở người ngồi trên xe không đội “mũ bảo hiểm cho người đi mô tô, xe máy” hoặc đội “mũ bảo hiểm cho người đi mô tô,
      xe máy” không cài quai đúng quy cách, trừ trường hợp chở người bệnh đi cấp cứu, trẻ em dưới 06 tuổi, áp giải người có
      hành vi vi phạm pháp luật;

      l) Chở theo 02 người trên xe, trừ trường hợp chở người bệnh đi cấp cứu, trẻ em dưới 14 tuổi, áp giải người có hành vi
      vi phạm pháp luật;

      m) Ngồi phía sau vòng tay qua người ngồi trước để điều khiển xe, trừ trường hợp chở trẻ em ngồi phía trước.

      3. Phạt tiền từ 400.000 đồng đến 600.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm sau
      đây:

      a) Chuyển hướng không giảm tốc độ hoặc không có tín hiệu báo hướng rẽ (trừ trường hợp điều khiển xe đi theo hướng cong
      của đoạn đường bộ ở nơi đường không giao nhau cùng mức);

      b) Chở theo từ 03 người trở lên trên xe;

      c) Bấm còi, rú ga (nẹt pô) liên tục trong đô thị, khu đông dân cư, trừ các xe ưu tiên đang đi làm nhiệm vụ theo quy
      định;

      d) Dừng xe, đỗ xe trên cầu;

      đ) Điều khiển xe thành đoàn gây cản trở giao thông, trừ trường hợp được cơ quan có thẩm quyền cấp phép;

      e) Điều khiển xe có liên quan trực tiếp đến vụ tai nạn giao thông mà không dừng lại, không giữ nguyên hiện trường, không
      tham gia cấp cứu người bị nạn, trừ hành vi vi phạm quy định tại điểm đ khoản 8 Điều này;

      g) Điều khiển xe không đi bên phải theo chiều đi của mình; đi không đúng phần đường, làn đường quy định (làn cùng chiều
      hoặc làn ngược chiều); điều khiển xe đi qua dải phân cách cố định ở giữa hai phần đường xe chạy; điều khiển xe đi trên
      hè phố, trừ trường hợp điều khiển xe đi qua hè phố để vào nhà;

      h) Vượt bên phải trong trường hợp không được phép;

      i) Đi vào khu vực cấm, đường có biển báo hiệu có nội dung cấm đi vào đối với loại phương tiện đang điều khiển, trừ các
      hành vi vi phạm quy định tại khoản 5, điểm b khoản 6 Điều này và các trường hợp xe ưu tiên đang đi làm nhiệm vụ khẩn
      cấp theo quy định;

      k) Người đang điều khiển xe hoặc chở người ngồi trên xe bám, kéo, đẩy xe khác, vật khác, dẫn dắt súc vật, mang vác vật
      cồng kềnh; chở người đứng trên yên, giá đèo hàng hoặc ngồi trên tay lái; xếp hàng hóa trên xe vượt quá giới hạn quy
      định; điều khiển xe kéo theo xe khác, vật khác;

      l) Chở hàng vượt trọng tải thiết kế được ghi trong Giấy đăng ký xe đối với loại xe có quy định về trọng tải thiết kế;

      m) Chạy trong hầm đường bộ không sử dụng đèn chiếu sáng gần.

      4. Phạt tiền từ 600.000 đồng đến 1.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Điều khiển xe chạy quá tốc độ quy định từ 10 km/h đến 20 km/h;

      b) Dừng xe, đỗ xe trong hầm đường bộ không đúng nơi quy định;

      c) Vượt xe trong những trường hợp không được vượt, vượt xe tại đoạn đường có biển báo hiệu có nội dung cấm vượt đối
      với loại phương tiện đang điều khiển, trừ các hành vi vi phạm quy định tại điểm h khoản 3 Điều này;

      d) Vượt xe trong hầm đường bộ không đúng nơi quy định; quay đầu xe trong hầm đường bộ;

      đ) Không nhường đường hoặc gây cản trở xe được quyền ưu tiên đang phát tín hiệu ưu tiên đi làm nhiệm vụ;

      e) Không chấp hành hiệu lệnh của đèn tín hiệu giao thông;

      g) Không chấp hành hiệu lệnh, hướng dẫn của người điều khiển giao thông hoặc người kiểm soát giao thông;

      h) Người đang điều khiển xe sử dụng ô (dù), điện thoại di động, thiết bị âm thanh, trừ thiết bị trợ thính.

      5. Phạt tiền từ 1.000.000 đồng đến 2.000.000 đồng đối với người điều khiển xe thực hiện hành vi đi ngược chiều của đường
      một chiều, đi ngược chiều trên đường có biển “Cấm đi ngược chiều”, trừ hành vi vi phạm quy định tại điểm b khoản 6 Điều
      này và các trường hợp xe ưu tiên đang đi làm nhiệm vụ khẩn cấp theo quy định.

      6. Phạt tiền từ 2.000.000 đồng đến 3.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Sử dụng chân chống hoặc vật khác quệt xuống đường khi xe đang chạy;

      b) Điều khiển xe đi vào đường cao tốc, trừ xe phục vụ việc quản lý, bảo trì đường cao tốc;

      c) Điều khiển xe trên đường mà trong máu hoặc hơi thở có nồng độ cồn nhưng chưa vượt quá 50 miligam/100 mililít máu
      hoặc chưa vượt quá 0,25 miligam/1 lít khí thở.

      7. Phạt tiền từ 4.000.000 đồng đến 5.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Điều khiển xe chạy quá tốc độ quy định trên 20 km/h;

      b) Không chú ý quan sát, điều khiển xe chạy quá tốc độ quy định gây tai nạn giao thông; đi vào đường cao tốc, dừng xe,
      đỗ xe, quay đầu xe, lùi xe, tránh xe, vượt xe, chuyển hướng, chuyển làn đường không đúng quy định gây tai nạn giao thông;
      không đi đúng phần đường, làn đường, không giữ khoảng cách an toàn giữa hai xe theo quy định gây tai nạn giao thông
      hoặc đi vào đường có biển báo hiệu có nội dung cấm đi vào đối với loại phương tiện đang điều khiển, đi ngược chiều của
      đường một chiều, đi ngược chiều trên đường có biển “Cấm đi ngược chiều” gây tai nạn giao thông, trừ hành vi vi phạm
      quy định tại điểm d khoản 8 Điều này;

      c) Điều khiển xe trên đường mà trong máu hoặc hơi thở có nồng độ cồn vượt quá 50 miligam đến 80 miligam/100 mililít
      máu hoặc vượt quá 0,25 miligam đến 0,4 miligam/1 lít khí thở.

      8. Phạt tiền từ 6.000.000 đồng đến 8.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Buông cả hai tay khi đang điều khiển xe; dùng chân điều khiển xe; ngồi về một bên điều khiển xe; nằm trên yên xe
      điều khiển xe; thay người điều khiển khi xe đang chạy; quay người về phía sau để điều khiển xe hoặc bịt mắt điều khiển
      xe;

      b) Điều khiển xe lạng lách hoặc đánh võng trên đường bộ trong, ngoài đô thị;

      c) Điều khiển xe chạy bằng một bánh đối với xe hai bánh, chạy bằng hai bánh đối với xe ba bánh;

      d) Điều khiển xe thành nhóm từ 02 xe trở lên chạy quá tốc độ quy định;

      đ) Gây tai nạn giao thông không dừng lại, không giữ nguyên hiện trường, bỏ trốn không đến trình báo với cơ quan có thẩm
      quyền, không tham gia cấp cứu người bị nạn;

      e) Điều khiển xe trên đường mà trong máu hoặc hơi thở có nồng độ cồn vượt quá 80 miligam/100 mililít máu hoặc vượt quá
      0,4 miligam/1 lít khí thở;

      g) Không chấp hành yêu cầu kiểm tra về nồng độ cồn của người thi hành công vụ;

      h) Điều khiển xe trên đường mà trong cơ thể có chất ma túy;

      i) Không chấp hành yêu cầu kiểm tra về chất ma túy của người thi hành công vụ.

      9. Phạt tiền từ 10.000.000 đồng đến 14.000.000 đồng đối với hành vi vi phạm quy định tại điểm a, điểm b, điểm c, điểm
      d khoản 8 Điều này mà gây tai nạn giao thông hoặc không chấp hành hiệu lệnh dừng xe của người thi hành công vụ.

      10. Ngoài việc bị phạt tiền, người điều khiển xe thực hiện hành vi vi phạm còn bị áp dụng các hình thức xử phạt bổ sung
      sau đây:

      a) Thực hiện hành vi quy định tại điểm g khoản 2 Điều này bị tịch thu thiết bị phát tín hiệu ưu tiên lắp đặt, sử dụng
      trái quy định;

      b) Thực hiện hành vi quy định tại điểm b, điểm e, điểm i khoản 3; điểm đ, điểm e, điểm g, điểm h khoản 4; khoản 5 Điều
      này bị tước quyền sử dụng Giấy phép lái xe từ 01 tháng đến 03 tháng;

      c) Thực hiện hành vi quy định tại điểm a khoản 6; điểm a, điểm b khoản 7; điểm a, điểm b, điểm c, điểm d khoản 8 Điều
      này bị tước quyền sử dụng Giấy phép lái xe từ 02 tháng đến 04 tháng; tái phạm hoặc vi phạm nhiều lần hành vi quy định
      tại điểm a, điểm b, điểm c, điểm d khoản 8 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 03 tháng đến 05 tháng,
      tịch thu phương tiện. Thực hiện hành vi quy định tại một trong các điểm, khoản sau của Điều này mà gây tai nạn giao
      thông thì bị tước quyền sử dụng Giấy phép lái xe từ 02 tháng đến 04 tháng: Điểm a, điểm g, điểm h, điểm k, điểm l, điểm
      m, điểm n, điểm q khoản 1; điểm b, điểm d, điểm e, điểm g, điểm l, điểm m khoản 2; điểm b, điểm c, điểm k, điểm m khoản
      3; điểm đ, điểm e, điểm g, điểm h khoản 4 Điều này;

      d) Thực hiện hành vi quy định tại điểm b khoản 6; điểm đ khoản 8; khoản 9 Điều này bị tước quyền sử dụng Giấy phép lái
      xe từ 03 tháng đến 05 tháng;

      đ) Thực hiện hành vi quy định tại điểm c khoản 6 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 10 tháng đến 12
      tháng;

      e) Thực hiện hành vi quy định tại điểm c khoản 7 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 16 tháng đến 18
      tháng;

      g) Thực hiện hành vi quy định tại điểm e, điểm g, điểm h, điểm i khoản 8 Điều này bị tước quyền sử dụng Giấy phép lái
      xe từ 22 tháng đến 24 tháng.'
    - 'Điều 5. Xử phạt người điều khiển xe ô tô và các loại xe tương tự xe ô tô vi phạm quy tắc giao thông đường bộ1. Phạt
      tiền từ 200.000 đồng đến 400.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm sau đây:

      a) Không chấp hành hiệu lệnh, chỉ dẫn của biển báo hiệu, vạch kẻ đường, trừ các hành vi vi phạm quy định tại điểm a,
      điểm d, điểm g, điểm h, điểm i, điểm k khoản 2; điểm a, điểm d, điểm đ, điểm e, điểm k, điểm l, điểm o, điểm r, điểm
      s khoản 3; điểm b, điểm c, điểm d, điểm đ, điểm I khoản 4; điểm a, điểm c, điểm d, điểm đ, điểm e, điểm g, điểm i khoản
      5; điểm a, điểm b khoản 6; điểm a, điểm c khoản 7; điểm a khoản 8 Điều này;

      b) Chuyển hướng không nhường quyền đi trước cho: Người đi bộ, xe lăn của người khuyết tật qua đường tại nơi có vạch
      kẻ đường dành cho người đi bộ; xe thô sơ đang đi trên phần đường dành cho xe thô sơ;

      c) Chuyển hướng không nhường đường cho: Các xe đi ngược chiều; người đi bộ, xe lăn của người khuyết tật đang qua đường
      tại nơi không có vạch kẻ đường cho người đi bộ;

      d) Khi dừng xe, đỗ xe không có tín hiệu báo cho người điều khiển phương tiện khác biết;

      đ) Khi đỗ xe chiếm một phần đường xe chạy không đặt ngay báo hiệu nguy hiểm theo quy định, trừ hành vi vi phạm quy định
      tại điểm c khoản 6 Điều này và trường hợp đỗ xe tại vị trí quy định được phép đỗ xe;

      e) Không gắn biển báo hiệu ở phía trước xe kéo, phía sau xe được kéo; điều khiển xe kéo rơ moóc không có biển báo hiệu
      theo quy định;

      g) Bấm còi trong đô thị và khu đông dân cư trong thời gian từ 22 giờ ngày hôm trước đến 05 giờ ngày hôm sau, trừ các
      xe ưu tiên đang đi làm nhiệm vụ theo quy định.

      2. Phạt tiền từ 400.000 đồng đến 600.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm sau
      đây:

      a) Chuyển làn đường không đúng nơi cho phép hoặc không có tín hiệu báo trước, trừ các hành vi vi phạm quy định tại điểm
      g khoản 5 Điều này;

      b) Điều khiển xe chạy tốc độ thấp hơn các xe khác đi cùng chiều mà không đi về bên phải phần đường xe chạy, trừ trường
      hợp các xe khác đi cùng chiều chạy quá tốc độ quy định;

      c) Chở người trên buồng lái quá số lượng quy định;

      d) Không tuân thủ các quy định về nhường đường tại nơi đường bộ giao nhau, trừ các hành vi vi phạm quy định tại điểm
      m, điểm n khoản 3 Điều này;

      đ) Điều khiển xe có liên quan trực tiếp đến vụ tai nạn giao thông mà không dừng lại, không giữ nguyên hiện trường, không
      tham gia cấp cứu người bị nạn, trừ hành vi vi phạm quy định tại điểm b khoản 8 Điều này;

      e) Xe được quyền ưu tiên lắp đặt, sử dụng thiết bị phát tín hiệu ưu tiên không đúng quy định hoặc sử dụng thiết bị phát
      tín hiệu ưu tiên mà không có giấy phép của cơ quan có thẩm quyền cấp hoặc có giấy phép của cơ quan có thẩm quyền cấp
      nhưng không còn giá trị sử dụng theo quy định;

      g) Dừng xe, đỗ xe trên phần đường xe chạy ở đoạn đường ngoài đô thị nơi có lề đường rộng; dừng xe, đỗ xe không sát mép
      đường phía bên phải theo chiều đi ở nơi đường có lề đường hẹp hoặc không có lề đường; dừng xe, đỗ xe ngược với chiều
      lưu thông của làn đường; dừng xe, đỗ xe trên dải phân cách cố định ở giữa hai phần đường xe chạy; đỗ xe trên dốc không
      chèn bánh; mở cửa xe, để cửa xe mở không bảo đảm an toàn;

      h) Dừng xe không sát theo lề đường, hè phố phía bên phải theo chiều đi hoặc bánh xe gần nhất cách lề đường, hè phố quá
      0,25 m; dừng xe trên đường xe điện, đường dành riêng cho xe buýt; dừng xe trên miệng cống thoát nước, miệng hầm của
      đường điện thoại, điện cao thế, chỗ dành riêng cho xe chữa cháy lấy nước; rời vị trí lái, tắt máy khi dừng xe; dừng
      xe, đỗ xe không đúng vị trí quy định ở những đoạn có bố trí nơi dừng xe, đỗ xe; dừng xe, đỗ xe trên phần đường dành
      cho người đi bộ qua đường; dừng xe nơi có biển “Cấm dừng xe và đỗ xe”, trừ hành vi vi phạm quy định tại điểm i khoản
      4, điểm b khoản 6 Điều này;

      i) Quay đầu xe trái quy định trong khu dân cư;

      k) Quay đầu xe ở phần đường dành cho người đi bộ qua đường, trên cầu, đầu cầu, ngầm, gầm cầu vượt, trừ trường hợp tổ
      chức giao thông tại những khu vực này có bố trí nơi quay đầu xe.

      3. Phạt tiền từ 800.000 đồng đến 1.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Điều khiển xe chạy quá tốc độ quy định từ 05 km/h đến dưới 10 km/h;

      b) Bấm còi, rú ga liên tục; bấm còi hơi, sử dụng đèn chiếu xa trong đô thị, khu đông dân cư, trừ các xe ưu tiên đang
      đi làm nhiệm vụ theo quy định;

      c) Chuyển hướng không giảm tốc độ hoặc không có tín hiệu báo hướng rẽ (trừ trường hợp điều khiển xe đi theo hướng cong
      của đoạn đường bộ ở nơi đường không giao nhau cùng mức);

      d) Không tuân thủ các quy định về dừng xe, đỗ xe tại nơi đường bộ giao nhau cùng mức với đường sắt; dừng xe, đỗ xe trong
      phạm vi an toàn của đường sắt, trừ hành vi vi phạm quy định tại điểm b khoản 2, điểm b khoản 3 Điều 49 Nghị định này;

      đ) Dừng xe, đỗ xe tại vị trí: nơi đường bộ giao nhau hoặc trong phạm vi 05 m tính từ mép đường giao nhau; điểm dừng
      đón, trả khách của xe buýt; trước cổng hoặc trong phạm vi 05 m hai bên cổng trụ sở cơ quan, tổ chức có bố trí đường
      cho xe ô tô ra vào; nơi phần đường có bề rộng chỉ đủ cho một làn xe; che khuất biển báo hiệu đường bộ; nơi mở dải phân
      cách giữa;

      e) Đỗ xe không sát theo lề đường, hè phố phía bên phải theo chiều đi hoặc bánh xe gần nhất cách lề đường, hè phố quá
      0,25 m; đỗ xe trên đường xe điện, đường dành riêng cho xe buýt; đỗ xe trên miệng cống thoát nước, miệng hầm của đường
      điện thoại, điện cao thế, chỗ dành riêng cho xe chữa cháy lấy nước; đỗ, để xe ở hè phố trái quy định của pháp luật;
      đỗ xe nơi có biển “Cấm đỗ xe” hoặc biển “Cấm dừng xe và đỗ xe”, trừ hành vi vi phạm quy định tại điểm i khoản 4, điểm
      b khoản 6 Điều này;

      g) Không sử dụng hoặc sử dụng không đủ đèn chiếu sáng trong thời gian từ 19 giờ ngày hôm trước đến 05 giờ ngày hôm sau,
      khi sương mù, thời tiết xấu hạn chế tầm nhìn; sử dụng đèn chiếu xa khi tránh xe đi ngược chiều;

      h) Điều khiển xe ô tô kéo theo xe khác, vật khác (trừ trường hợp kéo theo một rơ moóc, sơ mi rơ moóc hoặc một xe ô tô,
      xe máy chuyên dùng khác khi xe này không tự chạy được); điều khiển xe ô tô đẩy xe khác, vật khác; điều khiển xe kéo
      rơ moóc, sơ mi rơ moóc kéo thêm rơ moóc hoặc xe khác, vật khác; không nối chắc chắn, an toàn giữa xe kéo và xe được
      kéo khi kéo nhau;

      i) Chở người trên xe được kéo, trừ người điều khiển;

      k) Quay đầu xe tại nơi đường bộ giao nhau cùng mức với đường sắt; quay đầu xe tại nơi đường hẹp, đường dốc, đoạn đường
      cong tầm nhìn bị che khuất, nơi có biển báo “Cấm quay đầu xe”;

      l) Không giữ khoảng cách an toàn để xảy ra va chạm với xe chạy liền trước hoặc không giữ khoảng cách theo quy định của
      biển báo hiệu “Cự ly tối thiểu giữa hai xe”, trừ các hành vi vi phạm quy định tại điểm g khoản 5 Điều này;

      m) Không giảm tốc độ và nhường đường khi điều khiển xe chạy từ trong ngõ, đường nhánh ra đường chính;

      n) Không nhường đường cho xe đi trên đường ưu tiên, đường chính từ bất kỳ hướng nào tới tại nơi đường giao nhau;

      o) Lùi xe ở đường một chiều, đường có biển “Cấm đi ngược chiều”, khu vực cấm dừng, trên phần đường dành cho người đi
      bộ qua đường, nơi đường bộ giao nhau, nơi đường bộ giao nhau cùng mức với đường sắt, nơi tầm nhìn bị che khuất; lùi
      xe không quan sát hoặc không có tín hiệu báo trước, trừ hành vi vi phạm quy định tại điểm a khoản 8 Điều này;

      p) Không thắt dây an toàn khi điều khiển xe chạy trên đường;

      q) Chở người trên xe ô tô không thắt dây an toàn (tại vị trí có trang bị dây an toàn) khi xe đang chạy;

      r) Chạy trong hầm đường bộ không sử dụng đèn chiếu sáng gần;

      s) Điều khiển xe chạy dưới tốc độ tối thiểu trên những đoạn đường bộ có quy định tốc độ tối thiểu cho phép.

      4. Phạt tiền từ 1.000.000 đồng đến 2.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Dùng tay sử dụng điện thoại di động khi đang điều khiển xe chạy trên đường;

      b) Đi vào khu vực cấm, đường có biển báo hiệu có nội dung cấm đi vào đối với loại phương tiện đang điều khiển, trừ các
      hành vi vi phạm quy định tại điểm c khoản 5, điểm a khoản 8 Điều này và các trường hợp xe ưu tiên đang đi làm nhiệm
      vụ khẩn cấp theo quy định;

      c) Điều khiển xe không đủ điều kiện để thu phí theo hình thức điện tử tự động không dừng đi vào làn đường dành riêng
      thu phí theo hình thức điện tử tự động không dừng tại các trạm thu phí;

      d) Dừng xe, đỗ xe tại vị trí: Bên trái đường một chiều hoặc bên trái (theo hướng lưu thông) của đường đôi; trên đoạn
      đường cong hoặc gần đầu dốc nơi tầm nhìn bị che khuất; trên cầu, gầm cầu vượt, song song với một xe khác đang dừng,
      đỗ, trừ hành vi vi phạm quy định tại điểm b khoản 6 Điều này;

      đ) Dừng xe, đỗ xe, quay đầu xe trái quy định gây ùn tắc giao thông;

      e) Xe không được quyền ưu tiên lắp đặt, sử dụng thiết bị phát tín hiệu của xe được quyền ưu tiên;

      g) Không thực hiện biện pháp bảo đảm an toàn theo quy định khi xe ô tô bị hư hỏng ngay tại nơi đường bộ giao nhau cùng
      mức với đường sắt;

      h) Không nhường đường cho xe xin vượt khi có đủ điều kiện an toàn;

      i) Lùi xe, quay đầu xe trong hầm đường bộ; dừng xe, đỗ xe, vượt xe trong hầm đường bộ không đúng nơi quy định.

      5. Phạt tiền từ 3.000.000 đồng đến 5.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Không chấp hành hiệu lệnh của đèn tín hiệu giao thông;

      b) Không chấp hành hiệu lệnh, hướng dẫn của người điều khiển giao thông hoặc người kiểm soát giao thông;

      c) Đi ngược chiều của đường một chiều, đi ngược chiều trên đường có biển “Cấm đi ngược chiều”, trừ các hành vi vi phạm
      quy định tại điểm a khoản 8 Điều này và các trường hợp xe ưu tiên đang đi làm nhiệm vụ khẩn cấp theo quy định;

      d) Vượt xe trong những trường hợp không được vượt, vượt xe tại đoạn đường có biển báo hiệu có nội dung cấm vượt (đối
      với loại phương tiện đang điều khiển); không có báo hiệu trước khi vượt; vượt bên phải xe khác trong trường hợp không
      được phép, trừ trường hợp tại đoạn đường có nhiều làn đường cho xe đi cùng chiều được phân biệt bằng vạch kẻ phân làn
      đường mà xe chạy trên làn đường bên phải chạy nhanh hơn xe đang chạy trên làn đường bên trái;

      đ) Điều khiển xe không đi bên phải theo chiều đi của mình; đi không đúng phần đường hoặc làn đường quy định (làn cùng
      chiều hoặc làn ngược chiều) trừ hành vi quy định tại điểm c khoản 4 Điều này; điều khiển xe đi qua dải phân cách cố
      định ở giữa hai phần đường xe chạy; điều khiển xe đi trên hè phố, trừ trường hợp điều khiển xe đi qua hè phố để vào
      nhà;

      e) Tránh xe đi ngược chiều không đúng quy định, trừ hành vi vi phạm sử dụng đèn chiếu xa khi tránh xe đi ngược chiều
      quy định tại điểm g khoản 3 Điều này; không nhường đường cho xe đi ngược chiều theo quy định tại nơi đường hẹp, đường
      dốc, nơi có chướng ngại vật;

      g) Không tuân thủ các quy định khi vào hoặc ra đường cao tốc; điều khiển xe chạy ở làn dừng xe khẩn cấp hoặc phần lề
      đường của đường cao tốc; chuyển làn đường không đúng nơi cho phép hoặc không có tín hiệu báo trước khi chạy trên đường
      cao tốc; không tuân thủ quy định về khoảng cách an toàn đối với xe chạy liền trước khi chạy trên đường cao tốc;

      h) Không nhường đường hoặc gây cản trở xe được quyền ưu tiên đang phát tín hiệu ưu tiên đi làm nhiệm vụ;

      i) Điều khiển xe chạy quá tốc độ quy định từ 10 km/h đến 20 km/h.

      6. Phạt tiền từ 6.000.000 đồng đến 8.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Điều khiển xe chạy quá tốc độ quy định trên 20 km/h đến 35 km/h;

      b) Dừng xe, đỗ xe trên đường cao tốc không đúng nơi quy định; không có báo hiệu để người lái xe khác biết khi buộc phải
      dừng xe, đỗ xe trên đường cao tốc không đúng nơi quy định; quay đầu xe trên đường cao tốc;

      c) Điều khiển xe trên đường mà trong máu hoặc hơi thở có nồng độ cồn nhưng chưa vượt quá 50 miligam/100 mililít máu
      hoặc chưa vượt quá 0,25 miligam/1 lít khí thở.

      7. Phạt tiền từ 10.000.000 đồng đến 12.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Không chú ý quan sát, điều khiển xe chạy quá tốc độ quy định gây tai nạn giao thông; dừng xe, đỗ xe, quay đầu xe,
      lùi xe, tránh xe, vượt xe, chuyển hướng, chuyển làn đường không đúng quy định gây tai nạn giao thông; không đi đúng
      phần đường, làn đường, không giữ khoảng cách an toàn giữa hai xe theo quy định gây tai nạn giao thông hoặc đi vào đường
      có biển báo hiệu có nội dung cấm đi vào đối với loại phương tiện đang điều khiển, đi ngược chiều của đường một chiều,
      đi ngược chiều trên đường có biển “Cấm đi ngược chiều” gây tai nạn giao thông, trừ các hành vi vi phạm quy định tại
      điểm a khoản 8 Điều này;

      b) Điều khiển xe lạng lách, đánh võng; chạy quá tốc độ đuổi nhau trên đường bộ; dùng chân điều khiển vô lăng xe khi
      xe đang chạy trên đường;

      c) Điều khiển xe chạy quá tốc độ quy định trên 35 km/h.

      8. Phạt tiền từ 16.000.000 đồng đến 18.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi phạm
      sau đây:

      a) Điều khiển xe đi ngược chiều trên đường cao tốc, lùi xe trên đường cao tốc, trừ các xe ưu tiên đang đi làm nhiệm
      vụ khẩn cấp theo quy định;

      b) Gây tai nạn giao thông không dừng lại, không giữ nguyên hiện trường, bỏ trốn không đến trình báo với cơ quan có thẩm
      quyền, không tham gia cấp cứu người bị nạn;

      c) Điều khiển xe trên đường mà trong máu hoặc hơi thở có nồng độ cồn vượt quá 50 miligam đến 80 miligam/100 mililít
      máu hoặc vượt quá 0,25 miligam đến 0,4 miligam/1 lít khí thở.

      9. Phạt tiền từ 18.000.000 đồng đến 20.000.000 đồng đối với hành vi vi phạm quy định tại điểm b khoản 7 Điều này mà
      không chấp hành hiệu lệnh dừng xe của người thi hành công vụ hoặc gây tai nạn giao thông.

      10. Phạt tiền từ 30.000.000 đồng đến 40.000.000 đồng đối với người điều khiển xe thực hiện một trong các hành vi vi
      phạm sau đây:

      a) Điều khiển xe trên đường mà trong máu hoặc hơi thở có nồng độ cồn vượt quá 80 miligam/100 mililít máu hoặc vượt quá
      0,4 miligam/1 lít khí thở;

      b) Không chấp hành yêu cầu kiểm tra về nồng độ cồn của người thi hành công vụ;

      c) Điều khiển xe trên đường mà trong cơ thể có chất ma túy;

      d) Không chấp hành yêu cầu kiểm tra về chất ma túy của người thi hành công vụ.

      11. Ngoài việc bị phạt tiền, người điều khiển xe thực hiện hành vi vi phạm còn bị áp dụng các hình thức xử phạt bổ sung
      sau đây:

      a) Thực hiện hành vi quy định tại điểm e khoản 4 Điều này bị tịch thu thiết bị phát tín hiệu ưu tiên lắp đặt sử dụng
      trái quy định;

      b) Thực hiện hành vi quy định tại điểm đ khoản 2; điểm h, điểm i khoản 3; khoản 4; điểm a, điểm b, điểm d, điểm đ, điểm
      g, điểm h, điểm i khoản 5 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 01 tháng đến 03 tháng;

      c) Thực hiện hành vi quy định tại điểm c khoản 5; điểm a, điểm b khoản 6; khoản 7 Điều này bị tước quyền sử dụng Giấy
      phép lái xe từ 02 tháng đến 04 tháng. Thực hiện hành vi quy định tại một trong các điểm, khoản sau của Điều này mà gây
      tai nạn giao thông thì bị tước quyền sử dụng Giấy phép lái xe từ 02 tháng đến 04 tháng: điểm a, điểm d, điểm đ, điểm
      e, điểm g khoản 1; điểm b, điểm d, điểm g khoản 2; điểm b, điểm g, điểm h, điểm m, điểm n, điểm r, điểm s khoản 3; điểm
      a, điểm c, điểm e, điểm g, điểm h khoản 4; điểm a, điểm b, điểm e, điểm g, điểm h khoản 5 Điều này;

      d) Thực hiện hành vi quy định tại khoản 9 Điều này hoặc tái phạm hành vi quy định tại điểm b khoản 7 Điều này, bị tước
      quyền sử dụng Giấy phép lái xe từ 03 tháng đến 05 tháng;

      đ) Thực hiện hành vi quy định tại điểm a, điểm b khoản 8 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 05 tháng
      đến 07 tháng;

      e) Thực hiện hành vi quy định tại điểm c khoản 6 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 10 tháng đến 12
      tháng;

      g) Thực hiện hành vi quy định tại điểm c khoản 8 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 16 tháng đến 18
      tháng;

      h) Thực hiện hành vi quy định tại khoản 10 Điều này bị tước quyền sử dụng Giấy phép lái xe từ 22 tháng đến 24 tháng.'
