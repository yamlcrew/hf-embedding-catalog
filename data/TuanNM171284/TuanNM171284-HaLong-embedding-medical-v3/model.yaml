widgetData:
- source_sentence: Bệnh Brucellosis có thể gây ra những biến chứng nghiêm trọng nào?
  sentences:
  - Để chẩn đoán bệnh cơ bẩm sinh, bác sĩ có thể đề nghị xét nghiệm máu (tìm enzyme creatine kinase), đo điện cơ (EMG), xét
    nghiệm gen hoặc sinh thiết cơ. Ngoài ra, có thể thực hiện chẩn đoán tiền sản như sinh thiết gai nhau, chọc dịch màng ối,
    thử nghiệm di truyền trước sinh.
  - 'Brucellosis có thể gây ra các biến chứng nghiêm trọng ảnh hưởng đến hầu hết mọi bộ phận của cơ thể, bao gồm: viêm nội
    tâm mạc (gây tổn thương van tim, là nguyên nhân hàng đầu gây tử vong), viêm khớp (đau, cứng và sưng khớp), viêm mào tinh
    hoàn, viêm và nhiễm trùng lách và gan, và nhiễm trùng hệ thần kinh trung ương (viêm màng não, viêm não).'
  - Để chẩn đoán gãy xương sườn, bác sĩ có thể yêu cầu chụp X-quang ngực, giúp phát hiện 75% trường hợp và các tình trạng
    như xẹp phổi, tràn khí/dịch màng phổi. CT-scan cũng có thể được sử dụng để phát hiện những trường hợp X-quang bỏ sót và
    tổn thương mô mềm, các cơ quan kèm theo như phổi, gan, thận, lách.
- source_sentence: Những yếu tố nào có thể dẫn đến dậy thì sớm ngoại biên ở cả bé gái và bé trai?
  sentences:
  - Các triệu chứng như mất khả năng nói, nghe hiểu, liệt nửa người, hoặc không thể tự chăm sóc bản thân có thể là di chứng
    của tai biến mạch máu não, một biến chứng thường gặp của bệnh lý động mạch cảnh.
  - Ở cả bé gái và bé trai, dậy thì sớm ngoại biên có thể do khối u ở tuyến thượng thận, tuyến yên, buồng trứng (ở bé gái)
    hoặc tinh hoàn (ở bé trai); hội chứng McCune – Albright; tiếp xúc với các nguồn estrogen và testosterone bên ngoài như
    thoa kem hoặc thuốc mỡ; hoặc một rối loạn di truyền hiếm gặp không liên quan đến hormone GnRH dẫn đến việc sản xuất testosterone
    sớm ở bé trai.
  - Đây có thể là dấu hiệu của gai cột sống, với vị trí đau hiện diện ở vùng cột sống hình thành gai.
- source_sentence: Những nguyên nhân chính nào dẫn đến tình trạng béo phì?
  sentences:
  - Cơn thiếu máu não thoáng qua tương tự tai biến mạch máu não nhưng chỉ kéo dài ngắn và thường không gây tổn thương não.
    Những người có cơn này có nguy cơ rất cao mắc phải một đợt tai biến mạch máu não thật sự trong tương lai.
  - Nguyên nhân chính gây béo phì là do có sự mất cân bằng giữa năng lượng nạp vào và tiêu thụ. Các yếu tố cụ thể bao gồm
    chế độ ăn uống không hợp lý (như ăn nhiều calo, khẩu phần lớn, ăn ngoài, uống đồ ngọt/cồn), thiếu hoạt động thể chất,
    mắc các bệnh nền (như suy giáp, hội chứng Cushing) hoặc tác dụng phụ của thuốc (như corticoid, thuốc trị động kinh, tiểu
    đường), và những thay đổi về lối sống (như thiếu ngủ, ngưng hút thuốc lá).
  - Để phòng tránh cúm mùa, cần tăng cường vệ sinh cá nhân như rửa tay bằng xà phòng, che miệng và mũi khi ho, hắt hơi; vệ
    sinh và mở cửa thoáng mát nơi ở, lau chùi vật dụng; tự theo dõi sức khỏe và thông báo khi có biểu hiện bệnh; tránh tiếp
    xúc với người bệnh hoặc người nghi ngờ mắc bệnh.
- source_sentence: Khi một người có các triệu chứng như nhãn cầu bị chìm và đỏ bừng mặt, bác sĩ có thể chẩn đoán bệnh gì?
  sentences:
  - Khi một người có các triệu chứng như nhãn cầu bị chìm và đỏ bừng mặt, cùng với co đồng tử, sụp mí mắt và giảm tiết mồ
    hôi ở một bên mặt, bác sĩ có thể chẩn đoán Hội chứng Horner.
  - Thông thường, bệnh cầu thận màng là hậu quả của các phản ứng miễn dịch tự miễn, khi hệ thống miễn dịch tấn công nhầm mô
    khỏe mạnh. Ngoài ra, bệnh cũng có thể do các nguyên nhân thứ phát như bệnh tự miễn (ví dụ lupus ban đỏ hệ thống), nhiễm
    siêu vi (viêm gan B, C, giang mai), một số loại thuốc (thuốc kháng viêm không steroid) hoặc các bệnh lý ung thư (ung thư
    máu).
  - Các dấu hiệu như co đồng tử, sụp mí mắt trên và giảm tiết mồ hôi ở một bên mặt có thể là triệu chứng của Hội chứng Horner.
- source_sentence: Nếu một con bò có hành vi bất thường, khó khăn khi di chuyển và bị giảm thể trọng, đó có thể là dấu hiệu
    của bệnh gì?
  sentences:
  - Trong giai đoạn viêm tấy cấp tính khi bị giãn dây chằng, người bệnh tuyệt đối không được chườm nóng, xoa dầu nóng, rượu
    thuốc vì có thể làm tổn thương nặng hơn. Đồng thời, không vận động vùng tổn thương và không được tiêm kháng viêm trực
    tiếp vào vùng tổn thương.
  - Nếu một con bò có các biểu hiện như hành vi bất thường, khó khăn trong di chuyển và giảm thể trọng, đó có thể là dấu hiệu
    của bệnh bò điên (Bovine Spongiform Encephalopathy - BSE).
  - Bệnh liệt dương còn có tên gọi khác là chứng “bất lực” xảy ra ở nam giới. Bệnh có đặc điểm là không có khả năng duy trì
    sự cương cứng đủ để giao hợp hoặc không thể đạt được xuất tinh, hoặc cả hai.
