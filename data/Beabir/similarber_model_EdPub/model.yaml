    dritten Schritt werden die Spalten ( grüner Pfeil ) ausgefüllt. Für jedes Teilproblem werden u. a. die zuständige Person,
    das zu erreichende Ziel sowie Bedeutung und Dringlichkeit des Problems erfasst. Daraus ergeben sich die zu treffenden
