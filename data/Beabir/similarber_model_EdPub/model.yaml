- source_sentence: 'Ukraine : Rapport du Conseil fédéral 09 / 2022 S ’ appuyant sur le rapport sur la politique de sécurité
    2021, le rapport complémentaire examine la guerre en Ukraine et ses conséquences. Il s ’ intéresse aux leçons à tirer
    de la guerre sur le plan de la politique de sécurité et se focalise avant tout sur la nouvelle dynamique résultant de
    la coopération européenne en matière de politique de sécurité et de défense. Le rapport expose les raisons pour lesquelles
    la coopération internationale est devenue un enjeu encore plus urgent pour la Suisse suite à la guerre en Ukraine et identifie
    des pistes concrètes qui permettraient d ’ intensifier cette coopération. Quatrième rapport national de la Suisse pour
    l ’ Examen périodique universel 09 / 2022 Le quatrième rapport national de la Suisse, établi en vue de l ’ Examen périodique
    universel ( EPU ) et qui a été présenté en octobre 2022 au Conseil des droits de l ’ homme de l ’ ONU, porte sur la mise
    en œuvre des 160 recommandations que la Suisse a acceptées après le troisième examen dont elle a fait l ’ objet en 2017.
    En plus de présenter les mesures prises et les progrès accomplis depuis lors, le rapport met aussi en lumière les défis
    auxquels la Suisse est toujours confrontée dans certains domaines. Clarté et orientation de la politique de neutralité
    Rapport du Conseil fédéral en réponse au postulat 22. 3385 de la Commission de politique extérieure du Conseil des États
    du 11 avril 2022 09 / 2022 Le rapport sur la neutralité retrace'
