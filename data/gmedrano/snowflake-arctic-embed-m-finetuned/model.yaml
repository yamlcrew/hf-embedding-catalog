- source_sentence: What role does NIST play in establishing AI standards?
  sentences:
  - "provides examples and concrete steps for communities, industry, governments, and others to take in order to \nbuild these\
    \ protections into policy, practice, or the technological design process. \nTaken together, the technical protections\
    \ and practices laid out in the Blueprint for an AI Bill of Rights can help \nguard the American public against many of\
    \ the potential and actual harms identified by researchers, technolo­"
  - "provides examples and concrete steps for communities, industry, governments, and others to take in order to \nbuild these\
    \ protections into policy, practice, or the technological design process. \nTaken together, the technical protections\
    \ and practices laid out in the Blueprint for an AI Bill of Rights can help \nguard the American public against many of\
    \ the potential and actual harms identified by researchers, technolo­"
  - "Acknowledgments: This report was accomplished with the many helpful comments and contributions \nfrom the community,\
    \ including the NIST Generative AI Public Working Group, and NIST staﬀ and guest \nresearchers: Chloe Autio, Jesse Dunietz,\
    \ Patrick Hall, Shomik Jain, Kamie Roberts, Reva Schwartz, Martin \nStanley, and Elham Tabassi. \nNIST Technical Series\
    \ Policies \nCopyright, Use, and Licensing Statements \nNIST Technical Series Publication Identifier Syntax \nPublication\
    \ History"
- source_sentence: What are the implications of AI in decision-making processes?
  sentences:
  - "The measures taken to realize the vision set forward in this framework should be proportionate \nwith the extent and\
    \ nature of the harm, or risk of harm, to people's rights, opportunities, and \naccess. \nRELATIONSHIP TO EXISTING LAW\
    \ AND POLICY\nThe Blueprint for an AI Bill of Rights is an exercise in envisioning a future where the American public\
    \ is \nprotected from the potential harms, and can fully enjoy the benefits, of automated systems. It describes princi­"
  - "state of the science of AI measurement and safety today. This document focuses on risks for which there \nis an existing\
    \ empirical evidence base at the time this proﬁle was written; for example, speculative risks \nthat may potentially arise\
    \ in more advanced, future GAI systems are not considered. Future updates may \nincorporate additional risks or provide\
    \ further details on the risks identiﬁed below."
  - "development of automated systems that adhere to and advance their safety, security and \neffectiveness. Multiple NSF\
    \ programs support research that directly addresses many of these principles: \nthe National AI Research Institutes23\
    \ support research on all aspects of safe, trustworthy, fair, and explainable \nAI algorithms and systems; the Cyber Physical\
    \ Systems24 program supports research on developing safe"
- source_sentence: How are AI systems validated for safety and fairness according to NIST standards?
  sentences:
  - "tion and advises on implementation of the DOE AI Strategy and addresses issues and/or escalations on the \nethical use\
    \ and development of AI systems.20 The Department of Defense has adopted Artificial Intelligence \nEthical Principles,\
    \ and tenets for Responsible Artificial Intelligence specifically tailored to its national \nsecurity and defense activities.21\
    \ Similarly, the U.S. Intelligence Community (IC) has developed the Principles"
  - "GOVERN 1.1: Legal and regulatory requirements involving AI are understood, managed, and documented.  \nAction ID \nSuggested\
    \ Action \nGAI Risks \nGV-1.1-001 Align GAI development and use with applicable laws and regulations, including \nthose\
    \ related to data privacy, copyright and intellectual property law. \nData Privacy; Harmful Bias and \nHomogenization;\
    \ Intellectual \nProperty \nAI Actor Tasks: Governance and Oversight"
  - "more than a decade, is also helping to fulﬁll the 2023 Executive Order on Safe, Secure, and Trustworthy \nAI. NIST established\
    \ the U.S. AI Safety Institute and the companion AI Safety Institute Consortium to \ncontinue the eﬀorts set in motion\
    \ by the E.O. to build the science necessary for safe, secure, and \ntrustworthy development and use of AI. \nAcknowledgments:\
    \ This report was accomplished with the many helpful comments and contributions"
- source_sentence: How does the AI Bill of Rights protect individual privacy?
  sentences:
  - "match the statistical properties of real-world data without disclosing personally \nidentiﬁable information or contributing\
    \ to homogenization. \nData Privacy; Intellectual Property; \nInformation Integrity; \nConfabulation; Harmful Bias and\
    \ \nHomogenization \nAI Actor Tasks: AI Deployment, AI Impact Assessment, Governance and Oversight, Operation and Monitoring\
    \ \n \nMANAGE 2.3: Procedures are followed to respond to and recover from a previously unknown risk when it is identiﬁed.\
    \ \nAction ID"
  - "the principles described in the Blueprint for an AI Bill of Rights may be necessary to comply with existing law, \nconform\
    \ to the practicalities of a specific use case, or balance competing public interests. In particular, law \nenforcement,\
    \ and other regulatory contexts may require government actors to protect civil rights, civil liberties, \nand privacy\
    \ in a manner consistent with, but using alternate mechanisms to, the specific principles discussed in"
  - "civil rights, civil liberties, and privacy. The Blueprint for an AI Bill of Rights includes this Foreword, the five \n\
    principles, notes on Applying the The Blueprint for an AI Bill of Rights, and a Technical Companion that gives \nconcrete\
    \ steps that can be taken by many kinds of organizations—from governments at all levels to companies of \nall sizes—to\
    \ uphold these values. Experts from across the private sector, governments, and international"
- source_sentence: How does the AI Bill of Rights protect individual privacy?
  sentences:
  - "57 \nNational Institute of Standards and Technology (2023) AI Risk Management Framework, Appendix B: \nHow AI Risks Diﬀer\
    \ from Traditional Software Risks. \nhttps://airc.nist.gov/AI_RMF_Knowledge_Base/AI_RMF/Appendices/Appendix_B \nNational\
    \ Institute of Standards and Technology (2023) AI RMF Playbook. \nhttps://airc.nist.gov/AI_RMF_Knowledge_Base/Playbook\
    \ \nNational Institue of Standards and Technology (2023) Framing Risk"
  - "principles for managing information about individuals have been incorporated into data privacy laws and \npolicies across\
    \ the globe.5 The Blueprint for an AI Bill of Rights embraces elements of the FIPPs that are \nparticularly relevant to\
    \ automated systems, without articulating a specific set of FIPPs or scoping \napplicability or the interests served to\
    \ a single particular domain, like privacy, civil rights and civil liberties,"
  - "harmful \nuses. \nThe \nNIST \nframework \nwill \nconsider \nand \nencompass \nprinciples \nsuch \nas \ntransparency,\
    \ accountability, and fairness during pre-design, design and development, deployment, use, \nand testing and evaluation\
    \ of AI technologies and systems. It is expected to be released in the winter of 2022-23. \n21"
