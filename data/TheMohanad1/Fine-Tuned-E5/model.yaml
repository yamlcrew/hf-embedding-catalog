widgetData:
- source_sentence: ماذا تقول المادة الخامسة عشرة من الباب الثالث لنظام القضاء؟
  sentences:
  - 'نظام القضاء

    الباب الثالث المحاكم وولايتها

    الفصل الثالث  محاكم الإستئناف

    المادة الخامسة عشرة


    ١- يكون في كل منطقة محكمة استئناف أو أكثر، وتباشر أعمالها من خلال دوائر متخصصة، تؤلف كل دائرة منها من ثلاثة قضاة، باستثناء الدائرة
    الجزائية التي تنظر في قضايا القتل والقطع والرجم والقصاص في النفس أو فيما دونها فتؤلف من خمسة قضاة، ولا تقل درجة القاضي
    في محكمة الاستئناف عن درجة قاضي استئناف، ويكون لكل دائرة رئيس.٢- يجوز إنشاء دائرة استئناف متخصصة أو أكثر في المحافظات
    التابعة للمنطقة التي فيها محكمة استئناف .٣- يسمى رئيس كل دائرة وأعضاؤها بقرار من رئيس محكمة الاستئناف ، ويتولى رئيس المحكمة
    - أو من ينيبه من أعضاء المحكمة - رئاسة الدائرة عند غياب رئيسها.'
  - 'القواعد الخاصة بتنظيم شؤون الخبرة أمام المحاكم

    الترخيص للخبراء


    المادة الحادية عشرة


    تعد الوحدة الاختبار الخاص بالترخيص.'
  - 'نظام التنفيذ

    الباب الأول:

    الفصل الأول: اختصاصات قاضي التنفيذ

    المادة الخامسة


    إذا تعددت الدوائر المختصة بالتنفيذ؛ فيكون لقاضي التنفيذ - الذي قام بأول إجراء تنفيذي - الإشراف على التنفيذ وتوزيع حصيلته،
    وله أن ينيب قاضي تنفيذ في دائرة أخرى للتنفيذ على مال المدين، وتحدد اللائحة الأحكام اللازمة لذلك.'
- source_sentence: وش تنص عليه المادة 133 من الأدلة الإجرائية لنظام الإثبات؟
  sentences:
  - 'اللائحة التنفيذية لنظام الإجراءات الجزائية

    الباب السابع طرق الاعتراض على الأحكام

    الفصل الأول الاستئناف

    المادة الرابعة والأربعون بعد المائة

    تهمش محكمة الاستئناف بمضمون أحكامها وقراراتها النهائية الصادرة بخصوص أحكام محاكم الدرجة الأولى على تلك الأحكام، وتشعرها
    بما أصدرته لنقل ذلك في ضبط الدعوى وسجل الصك.'
  - 'الأدلة الإجرائية لنظام الإثبات

    الخبرة


    المادة الثالثة والثلاثون بعد المائة


    تختص المحكمة التي ندبت الخبرة بنظر دعوى التعويض الناشئة عن أعمال الخبرة، على أن ترفع هذه الدعوى قبل مضي (تسعين) يومًا
    من اكتساب الحكم الصفة النهائية.'
  - 'نظام الإجراءات الجزائية

    الباب السادس إجراءات المحاكمة

    الفصل السادس إجراءات الجلسة ونظامها

    المادة السادسة والخمسون بعد المائة

    يجب أن يحضر المدعي العام جلسات المحكمة في الحق العام، وذلك في الجرائم التي تحددها لوائح هذا النظام، وعلى المحكمة سماع
    أقواله والفصل فيها.'
- source_sentence: وش تنص عليه المادة 152 من الباب 1 نظام المعاملات المدنية؟
  sentences:
  - 'اللائحة التنفيذية لتنظيم الترخيص لمكاتب المحاماة الأجنبية

    شروط الترخيص وإجراءاته


    المادة الثانية


    مع مراعاة ما نصت عليه المادة (الخامسة والأربعون) من النظام؛ يشترط للحصول على الترخيص ألا يكون قد صدر ضد مكتب المحاماة
    الأجنبي حكم نهائي في جريمة مخلة بالشرف أو الأمانة، أو قرار نهائي في مخالفة مهنية جسيمة؛ في أي بلد يزاول المهنة فيه -ما
    لم يكن قد مضى على انتهاء تنفيذ الحكم أو القرار خمس سنوات على الأقل-.'
  - 'اللوائح التنفيذية لنظام المرافعات الشرعية

    الباب السادس الدفوع والإدخال والتدخل والطلبات العارضة

    الفصل الأول الدفوع

    المادة السابعة والسبعون

    الفقرة الأولى

    ضم الدفع إلى الموضوع لا يلزم منه قبول الدفع، أو رده، وعلى المحكمة بيان أسباب ذلك في الحكم.

    الفقرة الثانية

    إذا حكمت المحكمة -على استقلال- بقبول الدفع فيكون حكمها خاضعًا لطرق الاعتراض.'
  - 'نظام المعاملات المدنية

    الباب الأول  مصادر الالتزام

    الفصل الرابع الإثراء بلا سبب

    المادة الثانية والخمسون بعد المائة


    تسري أحكام الوكالة إذا أجاز المنتفع ما قام به الفضولي.'
- source_sentence: ماذا تقول المادة الأولى من اللائحة التنفيذية لنظام الأحداث
  sentences:
  - 'نظام المرافعات الشرعية

    الباب الثاني الاختصاص

    الفصل الثاني الاختصاص النوعي

    المادة الثالثة والثلاثون


    تختص محاكم الأحوال الشخصية بالنظر في الآتي:

    أ- جميع مسائل الأحوال الشخصية، ومنها:

    إثبات الزواج، والطلاق، والخلع، وفسخ النكاح، والرجعة، والحضانة، والنفقة، والزيارة.

    إثبات الوقف، والوصية، والنسب، والغيبة، والوفاة، وحصر الورثة.

    الإرث، وقسمة التركة بما فيها العقار إذا كان فيها نزاع، أو حصة وقف أو وصية، أو قاصر، أو غائب.

    إثبات تعيين الأوصياء، وإقامة الأولياء والنظار، والإذن لهم في التصرفات التي تستوجب إذن المحكمة، وعزلهم عند الاقتضاء، والحجر
    على السفهاء، ورفعه عنهم، وتحدد لوائح هذا النظام الإجراءات اللازمة لذلك.

    إثبات توكيل الأخرس الذي لا يعرف القراءة والكتابة.

    تزويج من لا ولي لها، أو من عضلها أولياؤها.

    ب- الدعاوى الناشئة عن مسائل الأحوال الشخصية.

    ج- الدعاوى المرفوعة لإيقاع العقوبات المنصوص عليها في نظام الهيئة العامة للولاية على أموال القاصرين ومن في حكمهم.'
  - 'الأدلة الإجرائية لنظام الإثبات

    الخبرة


    المادة الثامنة عشرة بعد المائة


    ما لم ينص في القرار على خلافه، يعد القرار الصادر من المحكمة بندب الخبرة، متضمناً الإذن للخبير بالصلاحيات اللازمة لأداء
    مهمته بما في ذلك الآتي:١- الاطلاع على القضية.٢- سماع أقوال الخصوم وملحوظاتهم، وكل من يرى سماع أقواله.٣- الطلب من الخصوم
    أو غيرهم تسليمه أو إطلاعه على الدفاتر أو السجلات أو المستندات أو الأوراق أو الأشياء التي يراها ضرورية لتنفيذ مهمته.٤-
    معاينة المنشآت والأماكن والأشياء التي يلزم معاينتها لتنفيذ مهمته.'
  - 'اللائحة التنفيذية لنظام الأحداث

    المادة الأولى


    يقصد بالكلمات الآتية -أينما وردت في هذه اللائحة- المعاني المبينة أمام كل منها:

    النظام: نظام الأحداث.

    اللائحة: اللائحة التنفيذية للنظام.

    الوزارة: وزارة الموارد البشرية والتنمية الاجتماعية.

    الحدث: كل ذكر أو أنثى أتم (السابعة) ولم يتم (الثامنة عشرة) من عمره.

    المحكمة: المحكمة -أو الدائرة- المختصة بالنظر في قضايا الأحداث.

    الدار: جهة تابعة للوزارة، تخصص فيها أماكن مستقلة لإيداع الأحداث من (الذكور)، وأخرى خاصة بالإناث، وأماكن توقيف مستقلة للأحداث
    الموقوفين من (الذكور)، وأخرى خاصة بالإناث الموقوفات.'
- source_sentence: وش تنص عليه المادة 546 من الباب 4 نظام المعاملات المدنية
  sentences:
  - 'الأدلة الإجرائية لنظام الإثبات

    أحكام عامة


    المادة الرابعة والعشرون


    يتعين على المحكمة إثبات تعذر اتخاذ الإجراء إلكترونياً في المحضر قبل الانتقال أو الاستخلاف، وفق أحكام المادة (الحادية عشرة)
    من النظام.'
  - 'الفصل السابع إجراء إعادة التنظيم المالي لصغار المدينين: افتتاح الإجراء

    ١ - يصدر المدين الصغير أو الجهة المختصة قرار افتتاح إجراء إعادة التنظيم المالي لصغار المدينين وفقاً للنموذج المحدد لذلك.٢
    - على الأمين التحقق -بناء على المعلومات التي يقدمها إليه المدين الصغير أو الجهة المختصة- من توافر شروط افتتاح الإجراء
    الواردة في المادة (الثامنة والأربعين بعد المائة) من النظام، وذلك قبل الإيداع القضائي. ٣- يقيد طلب الإيداع القضائي لدى
    المحكمة، وتصدر المحكمة قرارها في شأن قبول الإيداع خلال (ثلاثة) أيام من تاريخ القيد. ٤- إذا كان طلب افتتاح الإجراء مقدماً
    من الدائن، فتحدد المحكمة موعداً للنظر فيه, على أن يكون خلال (أربعين) يوماً من تاريخ قيده، وتبلغ الدائن والمدين الصغير
    بموعد الجلسة خلال (خمسة) أيام من تاريخ القيد، وتقضي في الطلب وفقاً لحكم المادة (الثامنة والأربعين بعد المائة) من النظام.'
  - 'نظام المعاملات المدنية

    الباب الرابع عقود المشاركة

    الفصل الأول عقد الشركة

    المادة السادسة والأربعون بعد الخمسمائة


    ١- للشركاء الاتفاق في عقد الشركة على كيفية إخراج أي من الشركاء منها وإجراءات ذلك.

    ٢- لأيٍّ من الشركاء أن يطلب من المحكمة إخراج شريك أو أكثر من الشركة إذا كانت هناك أسباب مقبولة تدعو إلى ذلك.'
