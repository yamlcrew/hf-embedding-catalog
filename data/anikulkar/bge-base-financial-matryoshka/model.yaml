widgetData:
- source_sentence: From 2021 to 2022, the operating revenue increased by 4%, from $4,923.9 million to $5,122.2 million.
  sentences:
  - How much does the AMC Stubs A-List membership cost per month depending on the geographic market?
  - What was the percentage change in operating revenue from 2021 to 2022?
  - What types of coverage does political risk insurance provide for commercial lenders?
- source_sentence: Our two operating segments are "Compute & Networking" and "Graphics." Refer to Note 17 of the Notes to
    the Consolidated Financial Statements in Part IV, Item 15 of this Annual Report on Form 10-K for additional information.
  sentences:
  - What was the noncash impairment charge recorded in the fourth quarter of 2023 for the goodwill attributable to FedEx Dataworks?
  - What are the two operating segments of NVIDIA as mentioned in the text?
  - What is the disclosure threshold for environmental proceedings involving monetary sanctions according to SEC regulations?
- source_sentence: For 2023, the weighted-average actuarial assumptions for retirement plans included a service cost discount
    rate of 4.85% and a rate of increase in compensation levels of 3.71%.
  sentences:
  - What are the actuarial assumptions for retirement plans discount rate and rate of increase in compensation levels in 2023?
  - Where are accrued interest and penalties related to unrecognized tax benefits recorded?
  - What is the purpose of the Employee Resource Groups (ERGs) in the organization?
- source_sentence: The Company is currently party to certain legal proceedings, none of which we believe to be material to
    our business or financial condition.
  sentences:
  - What measures is The Hershey Company taking to ensure sufficient liquidity during economic downturns?
  - What is the impact of structural changes on the unit case volume and concentrate sales volume of the company on a consolidated
    basis or at the geographic operating segment level?
  - What is the company's perspective on the impact of the legal proceedings on its financial condition?
- source_sentence: We recognize gains and losses on pension and postretirement plan assets and obligations immediately in
    Other income (expense) - net in our consolidated statements of income.
  sentences:
  - Where are gains and losses on pension and postretirement plan assets and obligations recognized in financial statements?
  - What is the total amount of property, plant, and equipment, net, reported by the company for the fiscal year 2023?
  - What were the accumulated benefit obligation and fair value of plan assets for certain U.S. pension plans with obligations
    exceeding assets as of December 31, 2023?
