- source_sentence: a fara név azt jelenti
  sentences:
  - Utcafesztiváltól, egyhetes fesztiválon át havas fesztiválig! Ezek a fesztiválok lehetőséget kínálnak arra, hogy egy helyszínen
    megkóstolják a Bend sörfőzdék kínálatát – valójában több helyszínen egész évben! Kóstoljon meg egy jó főzetet, hallgasson
    néhány jó dallamot, és találkozzon a sörfőzőkkel! Itt a sör ideje!
  - 'Fara /fara/ [2 szótag.] mint lánynév középangol és arab eredetű, a Fara név jelentése kedves, kellemes. A Fara a Farrah
    (közép angol, arab) változata: az angol fair szóból származik. Hasonlítsa össze a Fura vezetéknevet.'
  - 'A Fara név angolul azt jelenti: utazó. A Fara név angol névből származik. A Fara nevet leggyakrabban lánynévként vagy
    női névként használják.'
- source_sentence: aki a kis Willie-t énekelte
  sentences:
  - Valaki énekel
  - William Edward Little Willie John (1937. november 15. – 1968. május 26.) amerikai rock 'n' roll és R&B énekes, aki az
    1950-es években és az 1960-as évek elején lépett fel. Leginkább a lemezlistákon elért sikereiről ismert, olyan dalokkal,
    mint az All Around the World (1955), a Need Your Love So Bad (1956) és a Fever (1956).
  - A dal a Little Willy lenne, Sweet előadásában. Mert a kis Willy, Willy nem megy haza. De nem lökheti körbe Willyt. Willy
    nem megy, próbáld meg mindenkinek elmondani, de nem. Kicsi Willy, Willy nem megy haza.
- source_sentence: Amikor 1901-ben megházasodott, feleségével (Olga Knipper, a Moszkvai Művészeti Színház munkatársa) közvetlenül
    a szertartásról mentek nászútra egy szanatóriumba.
  sentences:
  - Amikor 1901-ben feleségül vette a feleségét, a szertartásról egyenesen a nászútra mentek.
  - 'Ez egyenlő a hullám sebességével, osztva a frekvenciával. A hullámhosszt méter egységekben (m) fejezzük ki. Î» = hullámhossz,
    a hullámhegyek közötti távolság (m). v = hullámsebesség, a hullámok mozgásának sebessége egy irányban (m/s). f = frekvencia,
    a hullámhegyek, amelyek egy bizonyos idő alatt átmennek egy ponton (ciklus/s vagy Hz). A hullámhossz képletre vonatkozó
    kérdések: 1) A hang sebessége körülbelül 340 m/s. Keresse meg egy olyan hanghullám hullámhosszát, amelynek frekvenciája
    20,0 ciklus/másodperc (az emberi hallás alsó határa). Válasz: A hullámsebesség v = 340 m/s, és a frekvencia f = 20,0 ciklus/s.
    = hullámhossz, a hullámhegyek közötti távolság (m). v = hullámsebesség, az a sebesség, amellyel a hullámok egy irányban
    mozognak (m/s). f = frekvencia, a hullámhegyek, amelyek egy bizonyos idő alatt átmennek egy ponton (ciklus/s vagy Hz).
    A hullámhossz képletre vonatkozó kérdések: 1) A hangsebesség körülbelül 340 m/s.'
  - A felesége soha nem járt szanatóriumba.
- source_sentence: aki Elizabeth Blackwell volt
  sentences:
  - A módosítás definíciója valaminek a megváltoztatása, kiegészítése vagy átfogalmazása, leggyakrabban javítási szándékkal.
    Példa a módosításra az Egyesült Államok alkotmányának módosításai. 1 jobb változás; javulás.  hibák, hibák stb. javítása.
  - Elizabeth Blackwell (1707[1] – 1758) skót botanikai illusztrátor és író volt, aki leginkább az 1737 és 1739 között megjelent
    A Curious Herbal tányérjainak művészeként és metszőjeként volt ismert.
  - Elizabeth Blackwell volt az első nő Amerikában, aki orvosi diplomát kapott. Úttörő szerepet vállalt a nők orvostudományi
    oktatásában, és saját orvosi főiskolát nyitott a nők számára. Ő volt az első nő, akit felvették a brit orvosi nyilvántartásba,
    lehetővé téve számára, hogy az Egyesült Királyságban és az Egyesült Államokban is praktizáljon.
- source_sentence: a sellő szindróma genetikai okai
  sentences:
  - 'Rfcamat válasza. Bizalom szavazat: 459. Ha sellő-szindrómásod van, akkor vele születtél volna, és inkább hasadt volna
    a lábad, vagy mindkettőt amputálták volna. A sellőszindróma oka a test alsó részének (lábainak) oxigén- és tápanyaghiánya
    a keringési rendszer problémája miatt.További információ az alábbi linken.a sellő szindrómát nem kaphatja meg. Ez egy
    veleszületett állapot, ami azt jelenti, hogy vele kell születned ahhoz, hogy meglegyen. A betegségben szenvedő személy
    nem sellő, csak arról van szó, hogy a lábai összeforrtak. Számos belső szerv hiányzik vagy deformálódott.'
  - Vezessen be lágy, nyájas ételeket, például pudingot, almaszószt vagy joghurtot. A krémes anyagokat könnyű lenyelni, különösebb
    fájdalom nélkül. Lassan adjon be több ételt, amint a torokfájás javulni kezd. A sült gyümölcsök és zöldségek, például
    sült alma, sült körte és sült sárgarépa jó választás köretekhez. A burgonyapüré, az őszi tök, a sima tészta és a rizs
    is ideális lágy ételek. Ezen kívül zöldséget, tésztát és/vagy tésztát tartalmazó levesek vagy a puha húsdarabok egészséges
    választás a mandulagyulladásban szenvedő betegek számára. Válasszon olyan szilárd ételeket, amelyek nem irritálják a torkát,
    mint például a sült csirke, marhasült, teljes kiőrlésű kenyerek és egész gyümölcsök. A kemény kekszek, a pizzahéjak, a
    ropogós kekszek és a ropogtatnivalók túl kemények és ropogósak ahhoz, hogy torokfájása élvezhesse. Őrizze meg ezeket az
    ételeket, amíg teljesen felépül.
  - 1 A sellő-szindróma annak a következménye is lehet, hogy az anya sugárzásnak és más környezeti hatásoknak van kitéve,
    amelyek a magzat normális fejlődésében részt vevő gének mutációit okozták. 2 Spontán mutációk vagy a magzatban természetesen
    előforduló mutációk is okozhatták a születési rendellenességet. Kutatásokra van szükség ahhoz, hogy kiderítsük a sellőszindróma
    genetikai, biológiai vagy környezeti okait. A sellő szindróma kezelése. Ha a két láb csak a bőrön keresztül olvadt össze,
    és a három fő csont teljesen és megfelelően kialakult, műtétet alkalmaznak a két láb szétválasztására.
