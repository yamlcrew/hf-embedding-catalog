widgetData:
- source_sentence: mi van a szójaszószban/
  sentences:
  - Egy csoport munkás kötéllel az utcán.
  - A szójaszósz (más néven szójaszósz) főtt szójabab, pörkölt gabona, sóoldat és Aspergillus oryzae vagy Aspergillus sojae
    penészgombák fermentált pasztájából készült fűszer. Az erjedés után a pasztát préselik, így folyékony, szójaszósz és szilárd
    melléktermék keletkezik, amelyet gyakran használnak takarmányként.
  - A szójaszósz (a brit angolban szójaszósznak is nevezik) egy kínai eredetű folyékony fűszer, amelyet szójababból, pörkölt
    gabonából, sóoldatból és Aspergillus oryzae vagy Aspergillus sojae penészgombák fermentált pasztájából készítenek.
- source_sentence: hogy hívják Görögország déli félszigetét
  sentences:
  - Ha beleszámítjuk a maradványértékeket, a vinil kerítés körülbelül évi 168,00 dollárba kerül, míg a nyugati vörös cédrus
    kerítés körülbelül 534,00 dollárba kerül évente.
  - Hogy hívják Görögország déli részét? Görögország szárazföldjének legdélibb része a Peloponnészosz. Görögország legdélibb
    része azonban Kréta szigetén található. Ez a legnagyobb sziget Görögországban.
  - Görögország déli felét Peloponnészosznak hívják. Ez egy félsziget, amely Görögország szárazföldi részéhez kapcsolódik
    a Korinthoszi földszoroshoz.
- source_sentence: különböző típusú hörcsögök
  sentences:
  - A kínai hörcsög kevésbé elterjedt, mint a többi hörcsögtípus. Méretben, sebességben és mozgékonyságban hasonlítanak a
    törpehörcsögökhöz, de könnyebben kezelhetők, mivel mancsaikkal megfogják az ujjaidat.
  - Egy pulóveres férfi ül egy padon egy táska mellett.
  - Ez egy videó a különféle hörcsögfajtákról!
- source_sentence: Két ember áll egy betakarított mezőn hideg időben.
  sentences:
  - Az uszkár viszont az alsónémet "pud(d)eln" szóból származik, ami azt jelenti, hogy "vízbe csobbanni", ami rokon az angol
    "poddle" szóval. Az uszkár számos más kutyafajtában is közreműködött, mint például a törpeschnauzer, a standard schnauzer
    és a bichon típusú kutyák, hogy megmentsék ezeket a fajtákat a kihalástól, csökkentsék méretüket, vagy a kutyatenyésztők
    javítsák megjelenésüket. Az uszkárt legalább három méretben tenyésztették ki, köztük Standard, Miniature és Toy méretben.
    Az American Kennel Club szerint, amely 1887-ben ismerte el a fajtát, a standard uszkár a három fajta közül a legrégebbi,
    és később tenyésztették ki.
  - 3 ember van a napon
  - Két ember áll kint
- source_sentence: A pár kint van.
  sentences:
  - Ez a házaspár élvezi a kerékpározást Amszterdamban, és útikönyveik segítségével talál egy különösen érdekes útvonalat.
  - Maori All Blacks Māori All Blacks A Maori All Blacks, korábban új-zélandi maori néven, egy új-zélandi rögbi szakszervezeti
    csapat. Az Új-Zélandi Rögbi Unió reprezentatív csapata, a csapatban való részvétel előfeltétele, hogy a játékosnak legyen
    maori whakapapa (genealógia). A múltban ezt a szabályt nem alkalmazták szigorúan; A maorinak látszó nem maori játékosokat
    gyakran beválogatták a csapatba. Köztük volt néhány csendes-óceáni szigeti játékos és néhány afrikai származású. Ma minden
    játékos felmenőit ellenőrizni kell, mielőtt kiválasztják a csapatba. A csapat első mérkőzése 1888-ban volt a Hawke's Bay
    ellen.
  - Egy idős indiai férfi és nő az otthonukban.
