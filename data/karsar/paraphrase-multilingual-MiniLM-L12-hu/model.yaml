  - Egy apa és a fia ölelgeti alvás közben.
- source_sentence: Az emberek alszanak.
  sentences:
  - Egy feketébe öltözött nő cigarettát és bevásárlótáskát tart a kezében, miközben egy idősebb nő átmegy az utcán.
  - Egy csoport ember ül egy nyitott, térszerű területen, mögötte nagy bokrok és egy sor viktoriánus stílusú épület, melyek
    közül sokat a kép jobb oldalán lévő erős elmosódás tesz kivehetetlenné.
  - Egy apa és a fia ölelgeti alvás közben.
