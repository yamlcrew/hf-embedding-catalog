      ## Indokolás


      ## A másodfokú eljárás alapjául szolgáló tényállás


      [1] A felperes -a szolgálati viszonya módosításáról rendelkező ....számú parancs alapján - 2013. február 1-jétől teljesített
      szolgálatot a hivatásos állomány tagjaként az alperes ... Rendőrkapitánysága ... állományában, bűnügyi technikus beosztásban.
      Az állományparancs a szolgálatteljesítés helyeként Budapest területét határozta meg. A 2016. februárjában kelt munkaköri
      leírás szervezeti egységként az alperes ... Rendőrkapitánysága ..., a munkavégzés helyeként pedig az alperes ... Rendőrkapitánysága
      ... jelölte meg.


      [2]          Az alperes bűnügyi helyettese a bűnügyi helyszíni szemlék időszerűségének szem előtt tartása érdekében
      a 2016. július 19-én kelt átiratában elrendelte, hogy az alperes kerületi rendőrkapitányságain a naponta szolgálatba
      lépő bizottságok közül négy kerületnél a bizottságvezető és a technikus együtt legyen kiküldhető a Budapesten felmerülő
      helyszíni szemlékhez. Ennek megfelelően a kerületeket négy blokkba sorolta, és a kialakított blokkokból a hónap minden
      napjára fix bizottságokat jelölt ki. A felperes e rendelkezés alapján 2017. szeptemberétől rendszeresen más kerületi
      rendőrkapitányság illetékességi területén is végezte a szolgálati feladatait (régiós szolgálat).


      [3] A felperes 2020. szeptember 30-án szolgálati panaszt nyújtott be az alpereshez, amelyben 2017. szeptember 1-től
      kezdődően a rendszeresen más kerületi rendőrkapitányság illetékességi területén végzett régiós szolgálati feladatok
      ellátásáért megbízási díj és kamata megfizetését kérte.


      - [4]          Budapest Rendőrfőkapitánya a felperes szolgálati panaszát a 2020. október 22-én kelt határozatával elutasította.
      A határozat szerint a felperes az adott időszakban hatályos kinevezésének és munkaköri leírásának megfelelően látta
      el a szolgálati feladatait. Utalt a munkaköri leírás azon rendelkezéseire is, melyek szerint a felperes közvetlen vezetője
      utasításának megfelelően a munkaköri feladatokon túl köteles végrehajtani a külön nevesített, de az alperes ... Rendőrkapitánysága
      tevékenységi körébe tartozó a feladatköréhez kapcsolódó mindazon eseti jellegű feladatokat is, amelyek ellátására elméleti
      felkészültsége, szakmai ismeretei, valamint tapasztalatai alkalmassá teszik. Ezt is figyelembe véve a régiós feladatok
      végrehajtása a felperes munkaköri kötelezettsége volt. A régiós szolgálati rendszer kialakítására a szakszerűség és
      az időszerűség érdekében került sor, nem pedig idegilenesen megüresedett vagy betöltetlen szolgálati beosztások ellátására,
      illetve nem a beosztás ellátásában tartósan akadályozott személyek helyettesítése céljából. A felperes a szolgálati
      beosztásához nem tartozó feladatkör ellátásával nem volt megbízva, többletfeladatot nem végzett, ezért megbízási díjra
      sem jogosult.


      ## A felperes keresete és az alperes védirata


      [5]          A felperes keresetében a 2017. december 1-től 2020. július 31-ig terjedő időtartamra az illetményalap 75%-ának
      alapulvételével 637.725 forint megbízási díj és késedelmi kamata, valamint 63.770 forint perköltség megfizetésére kérte
      kötelezni az alperest. Álláspontja szerint kinevezése az alperes ... Rendőrkapitánysága állományába történt, így egy
      másik rendőrkapitánysághoz tartozó feladatellátás nem tartozik a munkakörébe. Állította továbbá, hogy a régiós szolgálat
      elrendelése a létszámhiányból adódó helyettesítés kompenzálására szolgált.


      [6] Az alperes védiratában a kereset elutasítását és a felperes 20.000 forint perköltségben történő marasztalását kérte.
      Az alperes szerint a bűnügyi helyettes átiratában elrendeltek alapján - a munkaköri leírásnak a közvetlen vezető utasítási
      jogát tartalmazó rendelkezését alapul véve - a felperes köteles volt a régiós szolgálat ellátására. A szolgálati viszonyt
      módosító parancs a munkavégzés helyeként Budapest területét határozta meg, ezért a felperes megbízási díjra nem szerzett
      jogosultságot. A kereset összegszerűségét annyiban vitatta, hogy annak esetleges megalapozottsága esetén is havonta
      legfeljebb a rendvédelmi illetményalap 50%-os mértékét találta megállapíthatónak.


      ## Az elsőfokú bíróság ítélete


      [7]          Az elsőfokú bíróság ítéletével kötelezte az alperest, hogy 15 napon belül fizessen meg a felperesnek a
      2017. december 1-től 2020. július 31-ig terjedő időtartamra 637.725 forint megbízási díjat és annak késedelmi kamatát.
      Ezen felül kötelezte az alperest 63.770 forint perköltség megfizetésére, és megállapította, hogy az eljárás illetékét
      az állam viseli.


      [8] Az elsőfokú bíróság a rendvédelmi feladatokat ellátó szervek hivatásos állományának szolgálati jogviszonyáról szóló
      2015. évi XLII. törvény (a továbbiakban: Hszt.) 71. § (1) bekezdésének c) pontja alapján azt vizsgálta, hogy a felperes
      végzett-e a szolgálati beosztásán kívüli többlettevékenységet.


      [9] A Hszt. 71. §-ának, 44. § (1) bekezdésének és a Hszt. 45. § (1) bekezdésének rendelkezései alapján megállapította,
      hogy a szolgálatteljesítés helyét a kinevező okiratban kell kötelező jelleggel meghatározni, kizárólag változó szolgálatteljesítés
      esetén biztosított a szolgálatteljesítés közigazgatási területi megjelölése a munkaköri leírásban. A Hszt. 2. § 25.,
      4., 24. és 28. pontjai alapján a felperes szolgálati beosztása a szervezeti egysége - vagyis az alperes ... Rendőrkapitánysága
      - állománytáblázatában meghatározott munkakör, szolgálati helye pedig az alperes ... Rendőrkapitánysága. A Hszt. 2.
      § 31. pontja értelmében a szolgálatteljesítési hely a rendvédelmi szerv szervezeti egységének székhelye vagy telephelye
      szerinti közigazgatási terület; változó szolgálatteljesítési hely esetén az a munkaköri leírásban meghatározott közigazgatási
      terület, amelyen a szolgálati feladatot ténylegesen végre kell hajtani. Kiemelte, hogy az alperes valamennyi kerületi
      rendőrkapitánysága Budapest területén helyezkedik el, ez azonban nem jelenti azt, hogy a hivatásos állomány tagja részére
      a főváros teljes területén alapfeladatként elrendelhető az eredeti szolgálatteljesítési helytől eltérő illetékességi
      területen történő szolgálatellátás. Mindezt alátámasztja a rendőrség szervei illetékességi területének megállapításáról
      szóló 67/2007. (XII. 28.) IRM rendelet (a továbbiakban: IRM rendelet), amely az egyes rendőrkapitányságok illetékességi
      területét határozza meg. Eszerint az alperes egyes rendőrkapitányságai az adott kerület vonatkozásában - tehát annak
      közigazgatási területén belül - rendelkeznek illetékességgel.


      [10]      A bűnügyi helyettes a kötelező érvényű törvényi rendelkezéseket nem írhatja felül. Ezek értelmében - a kialakult
      bírói gyakorlat szerint - a rendvédelmi szerv szabadon csak egy


      adott kinevezésen, az adott beosztáson belül határozhatja meg a hivatásos állomány tagjának munkaköri feladatait, a
      jogszabály által szabályozott besoroláshoz és illetményhez kötve van. A belügyminiszter irányítása alá tartozó rendvédelmi
      feladatokat ellátó szerveknél a hivatásos szolgálati beosztásokról és a betöltésükhöz szükséges követelményekről szóló
      30/2015. (VI. 16.) BM rendelet (a továbbiakban: BMr1) 2. számú mellékletének VII. pontja alapján ugyanaz a beosztás
      más-más szervnél más kategóriába tartozik. Így a Hszt. 6. számú melléklete alapján a besorolás szerinti illetmények
      között önmagában a beosztási helytől függően is mutatkozik különbség, ami szintén alátámasztja, hogy a munkaköri feladatok
      szolgálati helyhez kötöttek, azok kiszélesítése a besorolási különbségeket és a megbízási díj jogintézményét üresítené
      ki.


      [11] Az elsőfokú bíróság a Kúria Mfv.II.10.179/2011/4. számú határozatát alapul véve kimondta, hogy az alperes szabadon
      csak egy adott beosztáson belül határozhatja meg a munkaköri feladatokat, a jogszabály által szabályozott besoroláshoz
      és illetményhez kötve van; ennélfogva az adott munkakör meghatározása nem nyúlhat túl a szolgálati helyen. Tekintettel
      arra, hogy a felperes a szolgálati feladatait nem egy, hanem több kerületben látta el, nem eseti jelleggel, hanem rendszeresen,
      mindez nyilvánvalóan többletteherrel járt, már csak az eltérő helyszíneken történő megjelenés miatt is. Az alperes esetleges
      változó szolgálatteljesítési helyre nem adott ki a Hszt. 46. § (4) bekezdése szerinti állományparancsot, ezért a felperes
      kinevezési okiratában szereplő beosztásának illetékességi területét meghaladó régiós szolgálati feladatok többletfeladat-ellátást
      eredményeztek. Ezzel összefüggésben az elsőfokú bíróság a Kf.VII.40.244/2020/4. számú ítéletet tekintette irányadónak
      a döntése meghozatalakor.


      [12] A megbízási díj összegszerűségét a Hszt. 71. § (5) bekezdésében meghatározott határok között, a kereseti kérelemnek
      megfelelően a rendvédelmi illetményalap 75%-ában határozta meg -elfogadva e körben a felperes indokolását -, és ennek
      megfelelően marasztalta az alperest.


      ## A fellebbezés és a fellebbezési ellenkérelem


      [13] Az alperes fellebbezésében az elsőfokú bíróság ítéletének megváltoztatásával a kereset elutasítását és a felperes
      perköltségben marasztalását kérte.


      [14]      Az alperesi álláspont szerint a Hszt. 71. § (1) bekezdésének c) pontját, (2) bekezdését, (5) és (6) bekezdését
      értékelve a felperes nem látott el többletfeladatokat, mivel a régiós feladatok nem tekinthetőek a szolgálati beosztásához
      nem tartozó feladatkörnek, amit megerősít a bűnügyi helyettes átirata is. Ez utóbbi kifejezetten tartalmazza, hogy nem
      létszámhiány, hanem a szakszerűség és időszerűség biztosítása érdekében került sor a régiós bizottságok kialakítására.


      [15] Az alperes hangsúlyozta azt is, hogy a büntetőeljárások keretében lefolytatandó szemlék végrehajtásáról és a bűnügyi
      technikai tevékenység egyes szabályozásáról szóló 13/2012. (VII. 30.) ORFK utasítás (a továbbiakban: ORFK utasítás)
      13. pontja rendezi a bűnügyi technikusi feladatokat, és az alapján sem minősül a felperes által ellátott feladat többlettevékenységnek.
      Önmagában az a tény, hogy egy bűnügyi helyszín helyszínelését nem a szolgálatteljesítési helyén végezte a felperes,
      hanem Budapest más kerületében, még nem változtatott a feladat minőségén, időigényességén, összetettségén.


      [16] A szolgálati viszonyt módosító okmány szerint a felperes szolgálatteljesítési helye 2013. február 1-jei hatállyal
      Budapest területe volt. Arra vonatkozóan, hogy az adott


      munkakör nem nyúlhat túl a szolgálati helyen, sem a Hszt., sem más jogszabály semmilyen kikötést nem tartalmaz, a felperes
      által hivatkozott jogszabályok nem a keresetben foglaltakat hivatottak alátámasztani, a Hszt. 2. § 31. pontjának definíciója
      pedig éppen az alperesi álláspontot erősíti. A régiós feladatok azért sem minősültek többlettevékenységnek, mert a felperes
      munkaköri leírásában is szerepel a közvetlen vezető utasítási jogosultsága a munkaköri leírásban meghatározott feladatokon
      túli, de a feladatköréhez kapcsolódó eseti jellegű tevékenységek elvégzésére.


      [17]      Az alperes vitatta a fellebbezésében az elsőfokú bíróság ítéletében meghatározott 32 hónapra vonatkozó 75%-os
      mértékű megbízási díj mértékét is, mivel a felperest megillető díjazás jelentős többletteher hiányában legfeljebb a
      rendvédelmi illetményalap 50%-a lehetne. Ez következik a belügyminiszter irányítása alá tartozó rendvédelmi feladatokat
      ellátó szervek hivatásos szolgálati viszonyban álló tagjai illetményének és egyéb juttatásainak megállapításáról, valamint
      a folyósítás szabályairól szóló 33/2015. (VI. 16.) BM rendelet (a továbbiakban: BMr2) 10. § (2) bekezdésében foglaltakból
      is.


      [18]      A felperes fellebbezési ellenkérelme az elsőfokú bíróság ítéletének helybenhagyására irányult annak helyes
      ténybeli és jogi indokai alapján, és az alperest 30.000 forint jogtanácsosi munkadíjból álló másodfokú perköltségben
      is kérte marasztalni.


      [19]      A felperes álláspontja szerint a szolgálatteljesítési hely meghatározása nem is releváns a megbízási díj iránti
      igény vonatkozásában. E tekintetben ugyanis annak vizsgálata szükséges, hogy mi a felperes beosztása és feladatköre,
      ami a Hszt. 2. § 25. pontjának értelmezésével egyértelműen megállapítható. E szabály alapján a felperes technikusi beosztása
      a kerületi rendőrkapitányság állománytáblázatában rögzített, így szervezetileg az alperes ... Rendőrkapitánysága állományába
      tartozik, amely feladatkörbe nem tartozó munkavégzés jogosíthatja megbízási díjra. Az illetékességi szabályokat figyelembe
      véve e rendőrkapitányság - illetve felperesi beosztás - nem illetékes a Budapest teljes területén elkövetett bűncselekmények
      nyomozásában.


      [20]      A hivatásos állomány tagjának beosztásába tartozó feladatkört az érintett szolgálati helye, munkáltatója,
      munkáltatói jogkör gyakorlója alapján lehetséges vizsgálni. A felperes szolgálati helye az alperes ... Rendőrkapitánysága,
      állományilletékes parancsnoka a kerületi rendőrkapitány, feladata pedig a munkáltatója hatáskörébe és illetékességi
      területén elkövetett bűncselekmények helyszínén végzett technikusi feladat ellátása. Erre figyelemmel főszabályként
      a ... Rendőrkapitányság területén történt bűncselekmények esetén minősül a ... Rendőrkapitányság nyomozó hatóságnak
      és a felperes munkaköre kizárólag a munkáltatója ezen illetékességi területén értelmezhető.


      [21] Az elsőfokú bíróság által is felsorolt jogszabályi rendelkezéseket alapul véve a felperes hangsúlyozta, hogy a
      munkaköri leírásban meghatározott feladatok nem nyúlhatnak túl a munkáltató feladat- és hatáskörén, mert ez azt eredményezné,
      hogy a hivatásos állomány tagja ellentételezés nélkül egy másik munkáltató érdek- és feladatkörébe tartozóan köteles
      a munkaideje egy részében munkát végezni.


      [22]      Az összegszerűséget vitató fellebbezési kérelemmel összefüggésben a felperes kérte értékelni, hogy az alperes
      anyagi jogszabály megsértését nem jelölte meg, így e vonatkozásban a fellebbezése hiányos, melynek pótlására már nincs
      lehetőség, figyelemmel a Kp. 104. §-ára és 100. § (2) bekezdés b) pontjára.


      [23] Végezetül a felperes kiemelte, hogy az irányadó jogszabályi rendelkezések a többletfeladat mértékét teszik a megbízási
      díj számítási alapjául, így az a releváns, hogy konkrét címmel és ügyszámmal beazonosíthatóan a perrel érintett 22 hónap
      alatt 37 alkalommal végzett más kerületben technikusi feladatokat, amely átlagosan havi több mint


      másfél alkalmat eredményezett. Mindezek alapján az elsőfokú bíróság által megállapított százalékos mérték helyes mérlegelés
      eredménye.


      ## A Kúria döntése és jogi indokai


      [24]      A fellebbezés nem megalapozott, az alábbiak szerint.


      [25]      A Kúria az elsőfokú ítéletet a közigazgatási perrendtartásról szóló 2017. évi I. törvény (a továbbiakban:
      Kp.) 108. § (1) bekezdése alapján a fellebbezés és a fellebbezési ellenkérelem keretei között bírálta el, ezért kizárólag
      azt vizsgálta, hogy a fellebbezésben megjelölt jogszabálysértések megvalósultak-e, azaz a Hszt. 71. § (1) bekezdés c)
      pontját, valamint (5) és (6) bekezdését az elsőfokú bíróság helytállóan értelmezte-e.


      [26]      Figyelemmel arra, hogy az alperes az elsőfokú bíróság által megállapított tényállást nem vitatta, azt a Kúria
      is irányadónak tekintette. Ez alapján tény, hogy a kinevezésmódosítást tartalmazó személyi állományparancs a felperes
      szolgálatteljesítési helyeként Budapest területét jelölte meg, az elsőfokú bíróság azonban a szolgálatteljesítési hely
      ekként történő meghatározása mellett is helytállóan vizsgálta elsődlegesen azt, hogy a többletfeladatként állított régiós
      szolgálat során végzett munka a felperes kinevezése szerinti beosztásába tartozott-e. Az IRM rendelet illetékeségi szabályait
      is értelmezve jogszerű következtetésre jutott az elsőfokú bíróság akkor, amikor a felperes bűnügyi technikusi beosztásához
      tartozó feladatkörnek az alperes ... Rendőrkapitánysága állománytáblázatában meghatározott feladatokat tekintette, és
      ez alapján az alperes további illetékességi területeire kiterjedő régiós szemlebizottsági feladatokat ehhez képest olyan
      többletfeladat-ellátásként értékelte, ami alapot szolgáltat a felperesnek megbízási díj megfizetésére.


      [27]      Az alperes hivatkozása az ORFK utasításra ebben a körben irreleváns, tekintettel arra, hogy a bűnügyi technikusi
      beosztásba tartozó feladatok meghatározása során nemcsak az ORFK utasításban meghatározott konkrét tevékenységeknek
      van szerepük, hanem - amint azt az elsőfokú bíróság helyesen levezette -annak is, hogy a szolgálati beosztás az állománytáblához,
      az állománytábla pedig a rendvédelmi szerv szervezeti egységéhez - a felperes esetében az alperes ... Rendőrkapitányságához
      -kapcsolódik. Az IRM rendelet szabályozását is figyelembe véve nem tartozik a szolgálati beosztáshoz az a feladat, amelyik
      az adott szervezeti egység állománytáblája szerinti valamely beosztásnak megfelelő feladatellátást jelent ugyan, de
      a konkrét feladat az illetékességi szabályokat is figyelembe véve kívül esik a szervezet feladatkörén.


      [28] A bírói gyakorlat egységes abban, hogy ha a hivatásos állomány szolgálati viszonyban álló tagja hosszabb időszakon
      át rendszeresen a beosztásához nem tartozó feladatkört lát el, az többletszolgálatnak minősül, és annak ellentételezésére
      jogosult (BH2018. 259.). A hivatásos szolgálati jogviszonyban -egyezően más aláés fölérendeltségen alapuló foglalkoztatási
      jogviszonnyal -a munkáltató utasítási joga nem korlátlan, és csak olyan feladatot határozhat meg egy adott munkakörhöz
      rendelten, amely a munkakör keretei közé tartozik. A munkakör kiterjesztő értelmezésére nincs lehetőség (Kfv.VII.37.193/2020/8.).


      [29]      Amint arra a Kúria már több eseti döntésében is rámutatott, a kinevezési okiratban meghatározott beosztást
      meghaladó, azon túlmenő illetékességi területre kiterjedő régiós szemlebizottsági feladatok többletfeladat-ellátást
      eredményeznek, így ennek ellentételezéseként megbízási díj jár (Kf.VIII.40.034/2021/4., Kf.VIII.40.054/2021/4., Kf.
      VII.40.244/2020/4., Kf.VII.39.106/2021/6., Kf.III.45.120/2021/4.).


      [30] Az alperes fellebbezésének indokolásában sérelmezte ugyan a megbízási díj összegszerűségét, azonban azzal összefüggésben
      határozott fellebbezési kérelmet egyáltalán nem terjesztett elő, a megbízási díj összegének leszállítását konkrét összegre
      nem kérte. Az alperes fellebbezésében jogsértésként ugyan hivatkozott a Hszt. 71. § (5) bekezdésére - amely a megbízási
      díjnak a rendvédelmi illetményalap 50-200%-áig terjedő mértékéről rendelkezik -, azonban a bizonyítékok értékelésére
      vonatkozó jogsértést - a Kp. 78. § (2) bekezdését egyáltalán nem jelölte meg. Az elsőfokú bíróság ugyanakkor az ítélet
      [36] bekezdésében kellően indokolta a megbízási díj mértékére vonatkozó döntését, amelynek felülmérlegelésére a fentiekre
      tekintettel a másodfokú eljárásban lehetőség nem volt.


      [31] Mivel a Kúria az elsőfokú bíróság ítéletének az alperest 637.725 forint összegű megbízási díjban - és annak késedelmi
      kamataiban - marasztaló rendelkezését jogszerűnek találta, a fellebbezéssel támadott elsőfokú ítéletet a Kp. 109. §
      (1) bekezdése alapján helybenhagyta.


      ## A döntés elvi tartalma


      [32] A munkáltató nem bővítheti szabadon a hivatásos állomány tagjának szolgálati beosztásához tartozó feladatait. A
      szolgálati beosztáshoz nem tartozó feladatkörnek minősül a munkáltató rendvédelmi szerv illetékességi körébe nem tartozó
      feladat ellátása akkor is, ha az a feladat - jellegét tekintve - azonos a hivatásos állomány tagjának beosztásába tartozó
      feladattal.


      ## Záró rész


      [33] A pervesztes alperes a Kp. 35. § (1) bekezdése útján alkalmazandó, a polgári perrendtartásról szóló 2016. évi CXXX.
      törvény (a továbbiakban: Pp.) 83. § (1) bekezdése szerint köteles viselni a pernyertes felperes másodfokú eljárásban
      felmerült, jogtanácsosi munkadíjból álló perköltségét, melynek összegét a Kúria a felperes által felszámítottnál alacsonyabb
      összegben állapított meg, igazodva a bírósági eljárásban megállapítható ügyvédi költségekről szóló 32/2003. (VIII. 22.)
      IM rendelet 3. § (1) bekezdés a) pontjában, valamint (5) bekezdésében, továbbá 4. § (1) bekezdés a) pontjában foglaltakhoz.


      [34]       Az alperes az illetékekről szóló 1990. évi XCIII. törvény 5. § (1) bekezdés c) pontja szerint személyes illetékmentességben
      részesül, ezért a feljegyzett fellebbezési illeték a Kp. 35. § (1) bekezdése folytán alkalmazandó Pp. 102. § (6) bekezdése
      értelmében az állam terhén marad.


      [35]      Az ítélet elleni további jogorvoslat lehetőségét a Kp. 116. § d) pontja zárja ki.


      [36]      A Kúria a fellebbezést a Kp. 99. § (3) bekezdése szerint alkalmazandó Kp. 77. § (1) bekezdése alapján tárgyaláson
      kívül bírálta el.


      Budapest, 2022. november 2.


