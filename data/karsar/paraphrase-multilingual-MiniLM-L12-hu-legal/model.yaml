      bezárását követően - átment az I. számú étkezde pultjához, és egyedül, az ... Szolgálat munkatársai nélkül folytatta
      tovább a leadott jegyek ellenőrzését. Ennek során két személy esetében merült fel kétsége a leadott étkezési jegyek
      eredetisége vonatkozásában, azonban e két személyt megnevezni nem tudta, róluk csak személyleírást adott. Elmondása
      szerint az első férfi 13 óra 10 perc körül érkezett és 3 darab zónajegyet adott át, amelyből 2 volt fénymásolt és 13
      óra 15 perc körüli időben jelent meg a másik férfi, aki 5 darab zónajegyet adott át, amelyből 4 darab fénymásolt volt.
      ... az átvett étkezési jegyeket egy zacskóba helyezte, és azokat a három nappal későbbi meghallgatása során adta oda
      ..., az ... Szolgálat munkatársának. A személyleírás alapján az I. számú étkezdében fénymásolt étkezési jegyet leadó
      második férfi személyében a felperest valószínűsítette a KRMÜIG ... Osztály vezetője, ... rendőrőrnagy.


      [3]          Az eset kapcsán elrendelt fegyelmi eljárás eredményeképpen az alperes a 2020. június 30. napján kelt határozatában
      a felperest hivatalvesztés fegyelmi büntetéssel sújtotta a rendvédelmi feladatokat ellátó szervek hivatásos állományának
      szolgálati jogviszonyáról szóló 2015. évi XLII. törvény (a továbbiakban: Hszt.) 289/T. § (2) bekezdésének d) pontja
      szerint, a Hszt. 14. § (1) bekezdésébe, továbbá a felperes munkaköri leírásának IV. fejezete 4. cím A. pont ad) alpontjaiba,
      továbbá C. pont d) alpontjába ütköző, és a Hszt. 288/L. § b) és c) pontja szerint minősülő jogosultságokkal, lehetőségekkel
      való visszaélés fegyelmi vétség elkövetése miatt. A fegyelmi határozat az indokolásában azt rögzítette, hogy a felperes
      2020. március 27-én 13 óra körüli időben az alperes ... Objektumának I. számú étkezdéjében ... rendvédelmi igazgatási
      alkalmazottal együtt 8 darab, egyenként 350 forint értékű étkezési jegyet adott át az étkezde személyzetének. A leadott
      8 darab étkezési jegyből 7 darab az alperes ... Osztálya által kiállított étkezési jegyekhez hasonló, de fénymásolt
      jegy volt. A 7


      darab fénymásolt étkezési jegy felhasználásával az említett alkalmazottak munkáltatójukat megtévesztve 2450 forint anyagi
      kárt okoztak. A fegyelmi határozat utalt arra is, hogy a cselekménnyel összefüggésben a Budapesti Rendőr-főkapitányságon
      a Btk. 373. § (1) bekezdésébe ütköző, és a (2) bekezdés b) pont bc) alpontja szerint minősülő, a szabálysértési értékhatárt
      meg nem haladó kárt okozó, üzletszerűen elkövetett csalás vétsége miatt büntetőeljárás van folyamatban. A határozat
      szerint a fegyelmi eljárásban felhasználták az alperes ... Szolgálata által a cselekménnyel összefüggésben készített
      meghallgatási jegyzőkönyveket, az alperes ... Osztályának állományába tartozó ... rendvédelmi igazgatási alkalmazott,
      ... munkavállaló és ... munkavállaló tanúvallomásait is. Az ... Szolgálat által a fénymásolt és az eredeti étkezési
      jegyekről rögzített fényképfelvételek alapján a fegyelmi tanács megállapította, hogy a felperes és ... által leadott
      nyolc étkezési jegy közül összesen egy volt eredeti. ... munkavállaló nyilatkozata szerint a felperes öt étkezési jegyet
      adott le a szóban forgó napon. A leadott étkezési jegyekről készült fényképfelvételek alapján megállapítható volt, hogy
      1-1 eredeti étkezési jegyről készült az összes másolt étkezési jegy. Ezt támasztotta alá az, hogy a fénymásolt étkezési
      jegyeken a kézzel írt dátum rajzolata, valamint a rajtuk lévő bélyegző lenyomatának pozíciója pontosan megegyezett az
      eredeti jegyen szereplő dátum rajzolatával, illetve bélyegző lenyomatának pozíciójával.


      [4]          A fegyelmi határozatban kiszabott büntetés következtében a felperes rendvédelmi igazgatási jogviszonyát
      az alperes ... Igazgatósága igazgatója határozatával 2020. július 2-án megszüntette. A felperes 2020. augusztus 1. napjától
      egy másik munkáltatónál helyezkedett el.


      ## A kereset és a védirat


      [5]          A felperes keresetében azt kérte, hogy a bíróság az alperes 2020. június 30-án kelt fegyelmi határozatát
      és az ezen alapuló jogviszonyt megszüntető határozatot helyezze hatályon kívül. Kérte továbbá, hogy kötelezze a bíróság
      az alperest a 2020. július 2-től 2020. július 31-ig terjedő időszakra elmaradt illetmény címén 338.710 forint, valamint
      elmaradt cafeteria juttatás címén 16.666 forint és ezen összegek 2020. augusztus 5-től számított késedelmi kamata, végkielégítés
      címén 3 havi távolléti díjnak megfelelő 1.050.000 forint, valamint szabadságmegváltás címén 402.500 forint megfizetésére.
      A felperes perköltséget is igényelt.


      [6]          A felperes szerint már a fegyelmi határozat ténymegállapítása is alaptalan, mivel ő 2020. március 27-én
      egyedül ment az I. számú étkezdébe, ...fel soha nem ebédelt együtt. Aznap 2 darab étkezési jegye volt, amelyeket a ...
      Osztály egyik dolgozójától, ... kapott, és e 2 jegy eredetisége felől semmilyen kétsége nem volt. Sérelmezte, hogy a
      fegyelmi eljárás során elmaradt ... tanúkénti meghallgatása, holott az alperes által megállapított tényállás az általa
      elmondottakon alapult. A tanúkénti meghallgatás elmulasztása ellentétes a rendvédelmi igazgatási alkalmazottal szemben
      lefolytatható fegyelmi eljárásról szóló 5/2019. (III. 11.) BM rendelet 6. § (3) bekezdésével is. A felperes hivatkozott
      továbbá az ... Szolgálat összefoglaló jelentésére is, melynek III/6. pontja kiemelte, hogy az ő esetében pontosan nem
      beazonosítható, hogy egyénenként mely személyek adták le a hamisított jegyeket. A fegyelmi eljárás során a vétkes kötelezettségszegése
      nem került bizonyításra, így felelősségre vonásának és a legsúlyosabb fegyelmi büntetés alkalmazásának mindenféle ténybeli
      alapja hiányzott.


      [7] A kereset összegszerűsége vonatkozásában az elmaradt illetményt az elhelyezkedésére tekintettel és a jogviszonyának
      megszűnési időpontja alapján határozta meg, végkielégítés vonatkozásában pedig utalt arra, hogy több mint 8 év igazgatási
      jogviszonyban töltött idővel fog rendelkezni, amennyiben igazgatási jogviszonya a bíróság jogerős ítéletével szűnik
      meg. Végkielégítést a Hszt. 288/V. § (5) bekezdése alapján alkalmazandó Hszt. 288/I. § (2) bekezdés c) pontja alapján,
      szabadságmegváltást a Hszt. 154. § (4) bekezdésére figyelemmel köteles fizetni részére az alperes.


      [8] Az alperes a védiratában a felperes keresetének elutasítását és a felperes perköltségben marasztalását kérte. Álláspontja
      szerint a tényállást a fegyelmi eljárás során kellő részletességgel feltárták, és az alapján a jogviszony megszüntetése
      a Hszt. 288/E. § (3) bekezdés f) pontja szerint jogszerű volt, figyelemmel arra, hogy a felperes olyan magatartást tanúsított,
      amellyel az igazgatási jogviszonyból eredő kötelezettségét vétkesen megszegte. Ezzel összefüggésben hivatkozott ...
      2020. március 30-án és április 7-én - nem a felperes fegyelmi eljárásában - tett nyilatkozataira, ... nyilatkozatára
      az étkezési jegyek beszerzésével összefüggésben, a jegypénztárban dolgozó személyek nyilatkozataira.


      [9] Az alperes szerint a rendvédelmi szerv kötelékébe tartozó személy esetében a bűncselekmény elkövetésének gyanúja
      és a munkáltató jogos gazdasági érdekeinek megsértése olyan mértékű bizalomvesztést eredményez, amely jogszerű indokaként
      szolgál a jogviszony megszüntetésének. A felperes magatartása erkölcsileg is kifogásolható, mindennek következtében
      jogviszonyának fenntartása lehetetlenné vált.


      ## Az elsőfokú bíróság ítélete


      [10]      Az elsőfokú bíróság ítéletével az alperes 2020. június 30-án kelt .... számú határozatát és az ezen alapuló,
      a felperes rendvédelmi igazgatási jogviszonyát megszüntető .... számú határozatát hatályon kívül helyezte. Kötelezte
      az alperest, hogy 15 napon belül fizessen meg a felperesnek elmaradt illetmény címén 338.710 forintot, elmaradt cafeteria
      címén 16.666 forintot és ezen összegek után a 2020. augusztus 5. napjától járó késedelmi kamatot. Kötelezte az alperest
      ezen felül 1.050.000 forint végkielégítés és 402.500 forint szabadságmegváltás, valamint 210.000 forint perköltség megfizetésére
      is, és rendelkezett arról, hogy a feljegyzett eljárási illetéket az állam viseli.


      [11] Az elsőfokú bíróság a közigazgatási perrendtartásról szóló 2017. évi I. törvény (a továbbiakban: Kp.) 2. § (4)
      bekezdésére és 85. § (1)-(2) bekezdéseire hivatkozással a kereseti kérelem és védirat keretei között a közigazgatási
      tevékenység megvalósulásának időpontjában fennálló tények alapján vizsgálta felül a támadott alperesi határozatokat
      azzal, hogy a Kp. 3. § (3) bekezdése alapján, valamint a polgári perrendtartásról szóló 2016. évi CXXX. törvény (a továbbiakban:
      Pp.) 265. § (1) bekezdésében meghatározott szabály alapján az alperest terhelte annak bizonyítása, hogy a fegyelmi határozatban
      foglaltak a valóságnak megfelelnek, és a felperes a terhére rótt vétkes kötelezettségszegést elkövette.


      [12]      Az elsőfokú bíróság a perben személyesen meghallgatta a felperest, tanúként hallgatta meg ..., valamint ...t,
      és okirati bizonyítékként értékelte ...nek a fegyelmi eljárása során 2020. május 6-án tett nyilatkozatát. Ezen felül
      a per anyagává tette ...nek a Fővárosi Törvényszéken 10.K.702.032/2021. számon folyamatban volt perben 7. sorszám alatti
      jegyzőkönyvben tett vallomását is. Mindezeket értékelve arra a következtetésre jutott, hogy az alperes a perben nem
      bizonyította, hogy a felperes terhére írt jegyeket valóban a felperes használta fel. ... és ... egyezően adta elő, hogy
      a II. számú étkezde bezárását követően az ... Szolgálat munkatársai


      levonultak a helyszínről, és ... egyedül folytatta tovább az I. számú étkezdében a jegyek ellenőrzését. Az sem volt
      vitatott, hogy a felperes neve úgy merült fel, hogy ... személyleírása alapján egy másik, a helyszínen jelen nem lévő
      kolléga valószínűsítette az elkövetőben a felperes személyét.


      [13]      Az alperes a perben nem bizonyította azt sem, hogy a hivatkozott jegyek valóban fénymásolt (hamisított) jegyek
      lettek volna. Önmagában az a körülmény, hogy a gyanúsnak vélt jegyek oldaláról hiányzott a perforáció, nem egyenlő azzal,
      hogy a jegy fénymásolva lett. Több utalás történt az eljárások során arra, hogy a jegyeket nem minden esetben választották
      el a perforációnál, mivel esetenként szétválasztásuk ollóval történt. Ezen felül ... a kollégáktól átvett és fénymásoltként
      azonosított jegyeket személyenként sem különítette el, hanem egy zacskóba helyezte valamennyit. Erre figyelemmel az
      az alperesi állítás, mely szerint hamisított jegyek kerültek felhasználásra, a fegyelmi eljárás lefolytatása során bizonyítási
      szakkérdés lett volna, amely szakértelemmel és a szükséges végzettséggel nem rendelkező személyek állításával nem volt
      pótolható. Az elsőfokú bíróság aggályosnak találta azt a körülményt is, hogy a bezacskózott 8 darab étkezési jegy 3
      napig nem került leadásra az ... Szolgálat részére.


      [14] Ezen felül az alperes azt sem bizonyította a perben, hogy az állítása szerint fénymásolt jegyek hamisított voltáról
      a felperes tudott. E vonatkozásban is utalt ... tanú nyilatkozatára, mely szerint a jegy átruházható volt, ezért olyan
      gyakorlat alakult ki az alperesnél, hogy a munkatársak átvették egymástól azokat a jegyeket, amelyek esetleg feleslegessé
      váltak szabadság vagy más távollét okán.


      [15] Az elsőfokú bíróság nem osztotta az alperes érvelését a bizalomvesztés vonatkozásában sem. Ezzel összefüggésben
      a 7/2016. számú munkaügyi elvi döntésre hivatkozott, mely szerint a bizalomvesztés megállapítása csak olyan magatartáson,
      vagy munkavégzésen alapuló objektív tényen nyugodhat, amely kellő indokául szolgálhat a jogviszony megszüntetésének.
      A felperes esetében a bizalomvesztést megalapozó tényállást az alperes nem bizonyította, holott a bizalomvesztésre alapított
      jogviszony megszüntetés esetében is szükséges, hogy a megállapított tényállás valóságos legyen.


      [16]      Összességében az elsőfokú bíróság azt állapította meg, hogy a fegyelmi határozatban rögzített tényállás valótlan,
      alaptalan, okszerűtlen és részben iratellenes is, ezért a fegyelmi határozat és az arra alapított, a rendvédelmi igazgatási
      jogviszony megszüntetésével kapcsolatos határozat is jogszerűtlen volt. Erre figyelemmel az elsőfokú bíróság mindkét
      határozatot hatályon kívül helyezte a Hszt. 289/V. § (2) bekezdése alapján.


      [17]      A kereseti kérelem összegszerűségéről a Hszt. 289/V. § (5) bekezdése, a Hszt. 154. §a és a Hszt. 289/P. §
      (1) és (3) bekezdése, továbbá a Hszt. 289//I. § (1)-(2) bekezdése alapján rendelkezett.


      ## A fellebbezés és a fellebbezési ellenkérelem


      [18]      Az alperes a fellebbezésében elsődlegesen az elsőfokú ítélet megváltoztatását és a kereset elutasítását, valamint
      a felperes perköltségben marasztalását kérte. Másodlagosan - az elsőfokú ítélet helybenhagyása esetén - azt kérte, hogy
      a Kúria az elsőfokú bíróság által megállapított, indokolatlanul magas felperesi perköltséget csökkentse. Az alperes
      a perköltség megfizetésére is kérte kötelezni a felperest, melynek összegét 50.000 forintban határozta meg.


      [19]      Fellebbezésében az alperes a Pp. 279. § (1) bekezdésének megsértésére, valamint a Hszt. 14. § (1) bekezdésének,
      288/E. § (3) bekezdése f) pontjának, 287/F. § (5) bekezdésének, 288/L. § ''bc)'' - helyesen: b) - pontjának és c) pontjának,
      289/T. § (2) bekezdés d) pontjának téves értelmezéséből adódó jogszabálysértésre hivatkozott. Álláspontja szerint az
      elsőfokú bíróság a bizonyítékok egybevetésével csak részben állapította meg helytállóan a tényállást, és abból helytelen
      jogszabályok alkalmazásával téves jogi következtetéseket vont le, így ítéletének indokolása jogellenes, megalapozatlan,
      és nem is cáfolta az alperes érdemi védekezésében foglaltakat.


      [20]      Az alperes továbbra is hangsúlyozta, hogy a rendvédelmi szerv kötelékébe tartozó személy esetében a bűncselekmény
      elkövetésének gyanúja és a munkáltató jogos gazdasági érdekeinek megsértése a megbízhatóság olyan mértékű elvesztését
      eredményezi az érintettel szemben, amely jogszerű indoka lehet a jogviszony Hszt. 289/T. § (2) bekezdés d) pontjában
      foglalt hivatalvesztés fegyelmi büntetéssel való megszüntetésének. Az elsőfokú bíróság a 7/2016. számú munkaügyi elvi
      döntést helytelenül alkalmazta, mivel jelen esetben nem a munkavégzés során elkövetett kötelezettségszegés alapozta
      meg a bizalom elvesztését a rendvédelmi alkalmazottal szemben, hanem erkölcsi, etikai okok, és a munkáltató jogos gazdasági
      érdekének megsértéséből eredő - vagyis a bizalmi elvben bekövetkezett - törés. A felperes egy különleges közszolgálati
      jogviszonyban - és nem munkaviszonyban - állt, mely jogviszony speciális korlátozásokkal és kötelezettségekkel jár együtt.
      A Hszt. a rendvédelmi hivatás etikai alapelvei között rögzíti többek között a méltóság és a tisztesség alapelvét, és
      ezek az előírások a Hszt. 287/F. § (5) bekezdése alapján a rendvédelmi igazgatási alkalmazottak esetében is irányadóak.
      Emellett a Hszt. 288/L. § c) pontja előírja, hogy a rendvédelmi igazgatási alkalmazott a munkavégzéssel összefüggésben
      köteles olyan magatartást tanúsítani, hogy anyagi károsodást ne idézzen elő, melyet a felperes már azáltal is megsértett,
      hogy vele szemben felmerült a gyanú a hamisított étkezési jegyek használatával kapcsolatosan. Ezzel egyrészt a munkáltató
      jogos gazdasági érdekével, másrészt az elvárható viselkedési normákkal is ellentétben álló magatartást tanúsított, és
      megvalósította a jogosultságokkal, lehetőségekkel való visszaélés fegyelmi vétségét, ezért jogviszonyának fenntartása
      lehetetlenné vált.


      [21]      Az alperes szerint téves volt az a bírói álláspont is, mely szerint az alperesnek kell a jelen peres eljárásban
      bizonyítania, hogy a felperes hamis ebédjegyet használt. Az alperesnek - figyelembe véve a 3087/2016. (V. 2.) AB határozat
      [40] pontját - a felperes felé irányuló bizalomvesztést kellett bizonyítania. A bizalomvesztés megállapítása az alperes
      értékelési és mérlegelési körébe tartozik, melyet a felperes a hamisított jeggyel való étkezése megalapozhatott, s mindez
      objektíve tette fenntarthatatlanná a jogviszonyt. Az ... Szolgálat jelentésének összegzésében található 1. pont alapján
      a felperes az ellenőrzés során azon beazonosított személyek között szerepelt, akik hamisított étkezési jegyet adtak
      le 2020. március 27. napján, és már ez is elegendő indokul szolgált a bizalomvesztéshez.


      [22] Az alperes szerint helytelen volt az elsőfokú bíróságnak az a megállapítása, mely szerint a perben az alperesnek
      kellett volna bizonyítania, hogy a hivatkozott jegyek valóban fénymásolt (hamisított) jegyek voltak. Ennek bizonyítása
      ugyanis egyrészt csak a büntetőeljárás során valósulhat meg, másrészt az alperesnek a hivatalvesztésnél a bizalomvesztést
      kellett bizonyítania. Az előbbiek elleni ''ellenbizonyítási teher'' a felperesre hárult, és azt az állítását, mely szerint
      az ''azonnali hatályú felmondásban'' foglalt indokok nem voltak valósak, a felperesnek kellett volna bizonyítania.


      [23] A felperes a fellebbezési ellenkérelmében az elsőfokú bíróság ítéletének helybenhagyását és az alperes marasztalását
      kérte 105.000 forint másodfokú perköltségben.


      [24] A felperes szerint az alperes nem adott elő olyan körülményt a fellebbezésében, amelyet az elsőfokú bíróság ne
      vizsgált volna. A jogviszony alperesi megszüntetése azon a


      ténybeli indokon alapult, miszerint a felperes ... kollégájával fénymásolt (hamisított) étkezési jegyekkel fizetett
      az étteremben. A hivatalvesztés fegyelmi büntetést az alperes a Hszt. 288/L. § b) és c) pontjára alapította, így a perben
      az alperesnek a bizalomvesztésre történő hivatkozása teljes egészében okszerűtlen. Általánosságban is megállapítható,
      hogy egy munkáltatónak a bizalomvesztésre történő hivatkozása csak akkor lehet alapos és vizsgálandó, ha az erre okot
      adó munkavállalói magatartást bizonyítja.


      [25]      Az állítólagos hamis étkezési jegyekkel kapcsolatosan indult büntetőeljárás egyrészt nem is a felperessel
      szemben indult, másrészt ezen eljárás is megszüntetésre került, melyről 2021. július 21-én értesült a felperesi jogi
      képviselet, ezért azt a fellebbezéshez mellékletként csatolta.


      [26]      A felperes szerint az elsőfokú bíróság a perköltség összegét is helyesen állapította meg, és tekintettel arra,
      hogy az alperes a ''perköltség csökkentésére'' irányuló kérelmében jogszabálysértést nem jelölt meg, és megfelelő indokra
      sem hivatkozott, a fellebbezés e körben hiányos. Ettől függetlenül is azonban az elsőfokú bíróság a perköltség összegét
      a pertárgyérték 5%-ában, a hatályos jogszabályoknak megfelelően határozta meg, ezért annak mérséklését semmilyen körülmény
      nem indokolja.


      ## A Kúria döntése és jogi indokai


      [27]      A fellebbezés nem alapos, az alábbiak szerint.


      [28]      A Kúria az elsőfokú bíróság ítéletét a Kp. 108. § (1) bekezdésének megfelelően a fellebbezés és a fellebbezési
      ellenkérelem keretei között vizsgálta felül. Tekintettel arra, hogy az alperes jogszabálysértésként a Pp. 279. § (1)
      bekezdésének, a Hszt. 14. § (1) bekezdésének, 288/E. § (3) bekezdése f) pontjának, 287/F. § (5) bekezdésének, 288/L.
      § b) pontjának és c) pontjának, 289/T. § (2) bekezdés d) pontjának megsértésére hivatkozott, a másodfokú eljárás körét
      is e szabályok határozták meg.


      [29]      A bizonyítás eljárási szabályai körében a Kp. 78. § (2) bekezdése akként rendelkezik, hogy a bíróság a bizonyítékokat
      egyenként és összességükben a megelőző eljárásban megállapított tényállással összevetve értékeli. Ezzel párhuzamosan
      a közigazgatási perben is alkalmazandó a Polgári perrendtartásról szóló 2016. évi CXXX. törvény (a továbbiakban: Pp.)
      279. § (1) bekezdése, mely szerint a bíróság a perben jelentős tényeket a felek tényállításainak és a perben tanúsított
      magatartásainak, valamint a per tárgyalása során megismert bizonyítékoknak és egyéb peradatoknak az egybevetésével,
      egyenként és összességében történő értékelése alapján a meggyőződése szerint állapítja meg.


      [30]      Az elsőfokú bíróság az ítélet indokolásában a bizonyítási kötelezettség alakulásától kezdve az egyes bizonyítékok
      (tanúvallomások, okirati bizonyítékok) értékelésén át részletesen kifejtette, hogy miért nem fogadta el valósnak a fegyelmi
      határozatban meghatározott tényállást, mely szerint 2020. március 27-én a felperes és ... 8 darab, egyenként 350 forint
      értékű étkezési jegyet adtak át az étkezde személyzetének, amelyből 7 darab fénymásolt volt, és ezzel az alperesnek
      2450 forint anyagi kárt okoztak. Az elsőfokú bíróság erre a következtetésre a bizonyítékoknak egyenként és összességükben
      történő értékelését, azok összefüggéseit és ellentmondásait feltárva, azokat az alperes fegyelmi határozatában megállapított
      tényállással összevetve jutott, és ennek az alapos értékelő tevékenységnek az eredményeként alakította ki a saját meggyőződését,
      melyet rögzített a határozata indokolásában. Az, hogy az alperes ezen értékelő tevékenység eredményével nem értett egyet,
      nem ad alapot a Pp. 279. § (1) bekezdése megsértésének a megállapítására.


      [31] Az alperes alaptalanul kifogásolta a Hszt. 14. § (1) bekezdésének, 288/E. § (3) bekezdése f) pontjának, 287/F.
      § (5) bekezdésének, 288/L. § b) pontjának és c) pontjának, 289/T. § (2) bekezdés d) pontjának megsértését is. E szabályok
      egyrészt a rendvédelmi alkalmazottra vonatkozó alapvető kötelezettségeket tartalmazzák [Hszt. 287/F. § (5) bekezdése
      alapján alkalmazandó Hszt. 14. §-a; Hszt. 288/L. § b) és c) pontja], másrészt az igazgatási jogviszony hivatalvesztés
      fegyelmi büntetéssel való megszüntetésének lehetőségét taglalják [Hszt. 288/E. § (3) bekezdés f) pontja; Hszt. 289/T.
      § (2) bekezdés d) pontja].


      [32]      A felperes jogviszonya a Hszt. 289/T.'
