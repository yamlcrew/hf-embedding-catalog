    [4]                   Veszprém Megyei Jogú Város Jegyzője a levél ügyiratszáma. ügyiratszámú levelében fenntartotta a
    végzésében felhívott jogszabályi rendelkezésekre alapított jogi álláspontját, hatáskörének hiányát változatlanul nem találta
    megállapíthatónak. Kifejtette, hogy több hasonló ténybeli alapból származó, azonos megítélésű ügyben a kijelölést kérő
    Fejér Megyei Katasztrófavédelmi Igazgatóság nem vitatta hatáskörét, vélelmezte, hogy eljárt korábban az áttett kérelmekre.
    A szóbeli egyeztetés során a jegyző képviselője fenntartotta, hogy álláspontját, miszerint a kút hidrogeológiai védőövezetet
    érint, mert a védőidom felszíni vetületét is védőterületnek kell tekinteni, és ugyanazokat a jogszabályokat kell rá alkalmazni,
    annak ellenére, hogy a Vgtvhr. 24. § (1) bekezdés aa) pontja és a vízbázisok, a távlati vízbázisok, valamint az ivóvízellátást
    szolgáló vízilétesítmények védelméről szóló 123/1997. (VII.18.) Korm. rendelet (Védelmi vhr.) is egyértelműen megkülönbözeti
    azokat. A kijelölést kérő Fejér Megyei Katasztrófavédelmi Igazgatóság azzal érvelt, hogy a védőidom és a védőterület nem
    ugyanaz, a kút csak a védőidom felszíni vetületén helyezkedik el, de azt nem érinti, a védőidom teteje és a kút talpa
    között körülbelül 170 m földtani közeg van, ezért védőövezet érintettségről nem beszélhetünk. Mivel nem érint védőövezetet,
    és a többi feltétel is teljesül, ezért a tárgyi kút engedélyezése a Vgtvhr. 24. § (1) pontja alapján a települési jegyző
    hatáskörébe tartozik.


    ## A közigazgatási szerv kijelölése iránti kérelem


    [5] A kijelölést kérő a Veszprém Megyei Jogú Város Jegyzője, mint illetékességgel és hatáskörrel rendelkező hatóság kijelölését
    az Ákr. 18.§ (3) bekezdésének b) pontjára, a közigazgatási perrendtartásról szóló 2017. évi I. törvény (a továbbiakban:
    Kp.) 12.§ (2) bekezdésének a) pontja alapján kérte a ingatlan helyrajzi száma, ingatlanon található ásott kút vízjogi
    fennmaradási engedélyezési eljárására.


    - [6]                   Kérelmének indokolása szerint a tárgyi kút a határozat ügyszáma ügyszámú és határozat iktatószáma
    iktatószámú határozattal kijelölt község neve községi vízbázis hidrogeológiai ''B'' védőidomának felszíni vetületén helyezkedik
    el. A vízbázis hidrogeológiai ''B'' védőidoma egy olyan felszín alatt lehatárolt térrész, aminek felső síkja a terep alatt
    ~180 m-rel helyezkedik el. A tárgyi kút talpmélysége 4,3 m a terepszint alatti, így az nem érinti a védőidomot, a védőidom
    teteje és a kút talpa között ~ 175 m vastag földtani közeg található, az üzemelő vagy távlati ivóvízbázis előzetesen lehatárolt,
    illetve hatósági határozatban kijelölt hidrogeológiai védőidomát, védőövezet- és védőterület-rendszerét nem érinti, semmilyen
    hatással nincs és nem is lehet a védett vízbázisra nézve. A Vgtvhr. 24. § (1)


    pontjában foglaltak teljesülnek, ezért a tárgyi kút vízjogi fennmaradási engedélyezéséhez a települési önkormányzat jegyzője
    rendelkezik hatáskörrel.


    ## A Fővárosi Ítélőtábla döntésének indokai


    [7]                   A Fővárosi Ítélőtábla a Kp. 154. § (5) bekezdése folytán alkalmazandó 124. § (5) bekezdése alapján
    tárgyaláson kívül járt el.


    [8] A negatív hatásköri vita releváns tény és jogi tény-elemeit jelentik a következők:


    [9] Az érintett kút a határozat ügyszáma ügyszámú és határozat iktatószáma iktatószámú határozattal kijelölt község neve
    községi vízbázis hidrogeológiai ''B'' védőidomának felszíni vetületén helyezkedik el (weboldal hivatkozása), terepszinti
    magasságot tekintve 213 tengerszint feletti magasságban, a koordináták megjelölése koordináta-metszéspontokon. A kúttal
    érintett vízbázis - a kijelölő határozatokra figyelemmel - hidrogeológiai ''B'' védőidoma egy olyan felszín alatt lehatárolt
    térrész, aminek felső síkja a terepszint alatt ~180 m-re helyezkedik. A kúttal érintett ingatlan tulajdoni lapja szerint
    az ingatlan-nyilvántartásban vízjogi alapú bejegyzés (pl. a védősávot érintő tulajdoni, illetve használati korlátozás)
    nem található.


    [10]               A Vgtvhr. 24. § (1) bekezdés a) pontja értelmében a települési önkormányzat jegyzőjének engedélye szükséges  olyan
    kút létesítéséhez, üzemeltetéséhez, fennmaradásához és megszüntetéséhez, amely a következő feltételeket együttesen teljesíti:
    aa) a vízbázisok, a távlati vízbázisok, valamint az ivóvízellátást szolgáló vízilétesítmények védelméről szóló kormányrendelet
    szerint kijelölt, kijelölés alatt álló, illetve előzetesen lehatárolt belső, külső és hidrogeológiai védőidom, védőterület,
    valamint karszt- vagy rétegvízkészlet igénybevétele, érintése nélkül, és legfeljebb 500 m3/év vízigénybevétellel kizárólag
    talajvízkészlet vagy parti szűrésű vízkészlet felhasználásával üzemel; ab) épülettel vagy annak építésére jogosító hatósági
    határozattal, egyszerű bejelentéssel rendelkező ingatlanon van, és magánszemélyek részéről a házi ivóvízigény vagy a háztartási
    igények kielégítését szolgálja, és; ac) nem gazdasági célú vízigény.


    [11] A Vgtvvhr. 9. § (1) bekezdése alapján a vízkészlet, vízkivétel, illetve vízilétesítmény fokozott védelme érdekében
    a vízügyi hatóság védőidom vagy védőterület, illetőleg védősáv (az utóbbi kettő a továbbiakban: védőterület) kijelölését
    a külön jogszabály előírásai alapján rendeli el. A Vgtvvhr. 9. § (7) bekezdésének megfelelően a védőidomot, a védőterületen
    belül - külön jogszabály szerint meghatározott - belső és külső védőövezetet, valamint a védősávot érintő tulajdoni, illetve
    használati korlátozásokat, ideértve a telekalakítási és építési tilalmat, valamint a vízmű üzemeltetőjét megillető használati,
    szolgalmi jogot a kijelölésről és a fenntartásról rendelkező határozat alapján az ingatlannyilvántartásba be kell jegyezni.


    [12]               A Védelmi vhr. 1. számú melléklet 4. pontja szerint a védőterület: az üzemelő vagy tervezett vízkivételi
    műveket (berendezéseket) körülvevő terület, amelyet a vízkivétel (ivó-, ásvány- vagy gyógyvíz) - mennyiségi, minőségi
    - védelme érdekében a környezeténél


    fokozottabb biztonságban kell tartani; a védőterület általában körülveszi a vízkivételi műveket, de egyes esetekben azoktól
    elszakadva is megjelenhet, amely az előbbi cél elérése érdekében szükséges korlátozásokkal (tilalmakkal) hasznosítható.
    A Védelmi vhr. 2. § (1) bekezdése szerint a védelem, felszín alatti vízbázisnál védőidom, védőterület meghatározását,
    kijelölését, kialakítását és fenntartását jelenti. A Védelmi vhr. 2. § (3) bekezdése a) pontja alapján a védelem érdekében
    felszín alatti vízbázis esetében a védőidomot és védőterületet belső, külső, valamint hidrogeológiai védőövezetekre osztva
    kell meghatározni, kijelölni, kialakítani, és fenntartani. A Védelmi vhr. 2. § (4) bekezdésének megfelelően a védőövezetek,
    a védelem céljával összefüggő és a terület használatával kapcsolatos korlátozások szempontjából egységes és kapcsolódó
    rendszert alkotnak. A Védelmi vhr. 3. § (1) bekezdés c) pontja és (2) bekezdése szerint a felszín alatti vízbázisok esetén
    a 2. számú melléklet szerinti hidrogeológiai védőidom, védőövezet rendeltetése: a le nem bomló szennyező anyagok elleni
    védelem, amelyet vagy a vízkivétel teljes utánpótlódási területére (vízgyűjtőjére) vagy meghatározott részére kell kijelölni;
    a hidrogeológiai védőidom, illetve védőövezet a 2. számú melléklet szerinti ''A'', ''B'' és ''C'' védőzónákból áll. A
    Védelmi vhr. 3. § (4) bekezdése alapján a külső védőövezetet és a hidrogeológiai védőövezet ''A'' és ''B'' védőzónáit
    akkor kell kijelölni, ha az adott védőidomnak van metszete a felszínen.


    [13] A kijelölési ügyben vitatott pontot a kijelölt védőterület és védőidom jogi elhatárolása és azok közül valamelyik,
    egyik sem, avagy esetlegesen mindkettőnek a kút általi érintettsége képezte. A kérdés hatásköri vitát dönt el, egyúttal
    azonban olyan ténykérdés is, amely a Vgtvhr. 24. § (1) bekezdés a) pontján keresztül az anyagi jogi jogalkalmazással,
    az engedélyezés kérdésével is szorosan összefügg. Ilyen speciális esetben különös gondot kell fordítani a hatásköri vitával
    érintett hatóságoknak arra, hogy az Ákr. 17. §-ának megfelelően a hatáskört az eljárás minden szakaszában vizsgálják,
    adott esetben az engedélyezési eljárásban szükséges tényállás-tisztázás eredménye az eljárás lezárását megelőzően, az
    engedélyezés kérdésében való érdemi döntéskor dönti el a hatáskör kérdését, amelyet az hatáskörelvonás tilalma miatt kell
    felelős és szakszerű eljárásban végig ellenőrizni kell, hogy a majdani engedély érvényes, az esetleges elutasító döntés
    semmis ne legyen.


    [14] A kijelölést kérő hatóság, mint Vízügyi kr. 10. § (1) bekezdése szerinti (szakterületi) hatóság a rendelkezésére
    álló, hivatkozott adatok alapján közjogi felelőssége alapján nyilatkozott arról a kérelemre és áttétel folytán nála indult
    közigazgatási eljárást érintő hatásköri vita eldöntése szempontjából releváns, és szakmai ismereteket is igénylő ténykérdésre
    nézve, hogy a kijelölési vitával érintett kút nem érint felszíni védőterületet a hivatkozott határozat szerint, illetve,
    hogy az az érintett vízbázis hidrogeológiai ''B'' védőidomának csak a felszíni vetületén helyezkedik el, ekként sem a
    védőidom, sem a védőterület nem érintett.


    [15]               A Fővárosi Ítélőtábla számára ugyan nem bocsátotta rendelkezésre a határozat ügyszáma ügyszámú és határozat
    iktatószáma iktatószámú határozatot, amely nyilvános forrásokból sem volt fellelhető, ugyanakkor a nyilvános forrásból
    elérhető térképek közül a község neve községi vízbázist bemutató, módosított (https://bakonykarszt.hu/\_user/image/water\_bases/Tel73.jpg)
    képfelvétel alapján beazonosítható volt az, hogy a kút vízbázis hidrogeológiai ''B'' védőidomának olyan felszíni vetületén
    helyezkedik el, amelyet nem jelöltek ki védőterületként, a térképi jelölés csak a


    felszín alatt mélyebben lévő védőidomot mutatja. Ekként a hatásköri vita eldöntéséhez szükséges tényadatra vonatkozó,
    a kijelölt kérő nyilatkozata azt támasztja alá, hogy a rendelkezésre álló adatok alapján a Vgtvhr. 24. § (1) bekezdés
    a) pontja aa) alpontja szerinti érintettségre a válasz nemleges. A védőidom felszíni vetülete automatikusan nem védőterület,
    a hivatkozott szabályok is utalnak az eltérés lehetőségére, azokból kiolvasható, hogy a védőterület és védőzónák meghatározását
    determinálják a védőidomok felszín alatti elhelyezkedése és térbelisége, a felszínnel való kapcsolat és annak milyensége
    (távolság, kőzetrétegek és azok milyensége stb.), ami egymáshoz viszonylag közlei felszíni pontonként is eltérő lehet.


    [16] A kifejtettek alapján, a hatásköri vitával összefüggésben eddig rendelkezésre álló adatok és azok jogi minősítése
    alapján a Vgtvhr. 24. § (1) bekezdés a) pontja alapján a jegyző rendelkezik hatáskörrel a tárgyi kút vízjogi fennmaradási
    engedélyezési eljárására. Az illetékességet a kút szerinti település közigazgatási beosztása határozza meg. A kérelemre
    induló eljárásra nézve a Fővárosi Ítélőtábla hangsúlyozza, hogy a Vgtvhr. 24. § (1) bekezdés a) pont aa) alpont szerinti,
    a hatásköri vitában az érintettség ténykérdése nem jelent - a kijelölési eljárás természetéből és a tényállás-tisztázási
    szakasz megnyílta előtti eljárási szakaszra nézve -ítélt dolgot. Az engedélyezéshez szükséges anyagi jogi feltételek szempontjából
    releváns ténykérdésekhez szükséges lehet a kijelölést kérő megkeresése is.


    [17]               A Fővárosi Ítélőtábla a Kp. 12. § (2) bekezdés a) pontja, a 13. § (3a) pontja és a 154. § (3) bekezdése
    alapján eljárva - a kifejtettek alapján - a közigazgatási eljárásra a Veszprém Megyei Jogú Város Jegyzőjét jelölte ki.


    [18]               Az eljárás az illetékekről szóló 1990. évi XCIII. törvény 57. § (1) bekezdés w) pontja alapján illetékmentes.


    [19]               A végzés elleni fellebbezés lehetőségét a Kp.  151. § (4) bekezdése, a perújítást a Kp. 154. § (4)
    bekezdése zárja ki.


