- source_sentence: A munkavégzési hely eltérése miatt a kérelem nem minősül meghosszabbításnak, ezért az általános szabályok,
    azaz a Korm.rend. 19. § (1) bekezdés b) pontja alapján a munkaerőpiaci vizsgálat szükséges.
  sentences:
  - 'Győri Törvényszék 8.K.700.369/2023/15.


    A bíróság Poór és Társai Ügyvédi Társulás (képv: dr. Poór Júlia ügyvéd, 9200 Mosonmagyaróvár, Szt. László tér 2.) által
    képviselt ... (....) felperesnek, dr. Konyhás Szilvia kamarai jogtanácsos által képviselt Országos Idegenrendészeti Főigazgatóság
    (1117 Budapest, Budafoki út 60.) I.r. alperes, és dr. Biri Szilvia jogi előadó által képviselt Külgazdasági és Külügyminisztérium
    (1027 Budapest, Bem rakpart 47.) II. rendű alperes ellen idegenrendészeti ügyben, munkavállalás célú tartózkodási engedély
    meghosszabbítása iránti kérelem elutasítása tárgyában hozott 106-T-49727/3/2022. számú közigazgatási határozattal kapcsolatos
    jogvita elbírálása iránt indított közigazgatási perében meghozta a következő


    ## í t é l e t e t


    A bíróság a felperes keresetét elutasítja.


    Kötelezi a bíróság a felperest, hogy 15 napon belül fizessen meg az I.r. alperes részére 60.000 (hatvanezer), míg a II.r.
    alperes részére 22.500 (huszonkettőezer-ötszáz) forint perköltséget.


    A bíróság kötelezi a felperest, hogy az ítélet jogerőre emelkedésétől számított 60 napon belül fizessen be 30.000 (harmincezer)
    Ft eljárási illetéket a Nemzeti Adó-és Vámhivatal 10032000-01070044-09060018 számú illetékbevételi számlájára. Az illeték
    megfizetése során közleményként fel kell tüntetni a Győri Törvényszéket, a bírósági ügyszámot, valamint a fizetésre kötelezett
    adóazonosító számát. Ha a felhívásnak a megjelölt határidőben nem tesz eleget, az illeték behajtására és megfizetésére
    az illetékekről szóló törvény rendelkezéseit és az adóigazgatási eljárásokra irányadó jogszabályok rendelkezéseit kell
    alkalmazni.


    Az ítélet ellen fellebbezésnek helye nincs.


    ## I n d o k o l á s


    - [1] A bíróság a keresetlevél, az I.r. és II.r. alperes védirata, a felek eljárás során tett nyilatkozata, valamint a
    közigazgatási eljárásban keletkezett iratok alapján az alábbi tényállást állapította meg:


    Előzmények:


    [2] A felperes 2022. június 27. napján munkavállalási célból tartózkodási engedély meghosszabbítása iránti kérelmet nyújtott
    be az Országos Idegenrendészeti Főigazgatóság Nyugat-dunántúli Regionális Igazgatóság, mint elsőfokú hatósághoz. A felperes
    a tartózkodási céljának igazolására benyújtotta az ... Kft. foglalkoztatóval kötött előzetes megállapodást, amelynek értelmében
    a munkáltató a felperest thai masszőr (FEOR: 3332)


    <!-- image -->


    munkakörben 2022. július 25. napjától 2024. július 23. napjáig kívánja foglalkoztatni a.... szám alatti munkavégzési helyen.


    ## Elsőfokú szakhatósági állásfoglalás:


    [3]        Az elsőfokú hatóság megkeresésére a Győr-Moson-Sopron Megyei Kormányhivatalt, mint elsőfokú szakhatóság GYM/01/018279-3/2022.
    számú állásfoglalásban akként nyilatkozott, nem támogatja a felperes munkavállalását, mivel nem áll fenn a harmadik országbeli
    állampolgárok magyarországi foglalkoztatásának nem összevont kérelmezési eljárás alapján történő engedélyezéséről, az
    engedélyezési kötelezettség alóli mentességről, a fővárosi és megyei kormányhivatal munkaügyi központjának az összevont
    kérelmezési eljárásban való szakhatósági közreműködéséről, valamint a Magyarországon engedélymentesen foglalkoztatható
    harmadik országbeli állampolgárok magyarországi foglalkoztatásának bejelentéséről, és a munkabér megtérítéséről szóló
    445/2013. (XI. 28.) Korm. rendelet (továbbiakban: Korm.rend.) 2. § 12. pontjában meghatározott jogszabályi feltétel.


    Utalt arra, hogy az Országos Idegenrendészeti Főigazgatóság korábbi, 106-7-15607/8/2020/T. számú határozatában a.... szám
    alatti munkavégzési helyen, thai masszőr (FEOR: 3332) munkakörben 2022. július 24. napjáig engedélyezte a felperes keresőtevékenység
    céljából történő tartózkodását. Jelen esetben azonban a felperes és a foglalkoztató által megkötött előzetes megállapodás
    szerint a tervezett munkavégzési hely a .... szám alatt lenne, amelyből következik, hogy nem teljesült a vonatkozó jogszabály
    azon kógens feltétele, miszerint az engedély meghosszabbításának az minősül, ha a harmadik országbeli állampolgár foglalkoztatására
    az engedély érvényességi időtartamának lejártát követően ugyanazon munkavégzési helyen kerül sor. Fentiekre tekintettel
    a felperes a hosszabbítás jogszabályi feltételeinek nem tett eleget, így a munkavállalás a munkaerőpiaci helyzet vizsgálata
    nélkül nem támogatható.


    Kitért arra, hogy a munkaerőpiaci helyzet vizsgálata alapján a felperes magyarországi foglalkoztatása a Korm.rend. 20.
    § (1) bekezdés a) pontja alapján nem támogatható, mert nem áll fenn a 19. § (1) bekezdés b) pontjában meghatározott feltétele,
    mivel a foglalkoztató székhelye szerint illetékes Győr-Moson-Sopron Megyei Kormányhivatal Mosonmagyaróvári Járási Hivatalának
    2022. július 22. napján érkezett tájékoztatása szerint az .... nem nyújtott be munkaerő igényt, így a foglalkoztató a
    harmadik országbeli állampolgár által ellátandó tevékenységre vonatkozóan nem rendelkezik érvényes munkaerő igénnyel.


    ## A sérelmezett elsőfokú határozat:


    [4] A fentiekre tekintettel az elsőfokú hatóság a 2022. szeptember 7. napján 106-711336/8/2022-T. számú határozatával
    a felperes munkavállalási célú tartózkodási engedély hosszabbítása iránti kérelmét elutasította, ezzel egyidejűleg a felperest
    az Európai Unió tagállamainak területéről Thaiföld területére kiutasította. Kötelezte, hogy a határozat véglegessé válását
    követő 30 napon belül hagyja el az Európai Unió területét.


    [5] ndokolásában hivatkozott a harmadik országbeli állampolgárok beutazásáról és tartózkodásáról szóló 2007. évi II. törvény
    (továbbiakban: Harmtv.) 13. § (1) bekezdés d) pontjában és a 29/A. § (7) bekezdés a) és b) pontjaiban foglaltakra, amely
    alapján a felperes tartózkodási célját nem fogadta el igazoltnak, ezért a Harmtv. 18.§ (1) bekezdés a) pontja alapján
    a tartózkodási engedély kiadását megtagadta. Utalt arra, hogy a kógens törvényi rendelkezések nem tűrnek mérlegelést,
    ezért nem vizsgálta a kérelem egyéb a Harmtv. és a Harmtv. végrehajtásáról szóló 114/2007. (V. 24.) Korm. rendelet (továbbiakban:
    Vhr.) további feltételeinek való megfelelést.


    ## Felperes fellebbezése:


    [6]        A felperes a döntéssel szemben fellebbezést terjesztett elő, amelyben előadta, hogy az ... Kft.-vel, mint foglalkoztatóval
    kötött megállapodás alapján a társaság thai masszőr munkakörben kívánja foglalkoztatni egyrészt a korábbi munkavégzési
    helyen, másrészt a társaság ... . szám alatti telephelyén 2022. július 25. napjától 2024. július 23. napjáig. Csatolta
    a Kft. cégkivonatát, amely tanúsítja, hogy a társaság a tevékenységét Mosonmagyaróvár, Fő utca 49. szám, valamint ....
    szám alatti telephelyeken folytatja. Hivatkozott továbbá arra, hogy a munkáltatója a FEOR: 3332 számú munkakörbe egy főre
    vonatkozóan munkaerőigényt bejelentette a ... szám alatti telephelyére a ... Járási Hivatalnál, amelyről csatolta az igazolást.
    A munkaerő igény bejelentésének kelte 2022. szeptember 16. napja. Álláspontja szerint sem a foglalkoztató személyében,
    sem a munkakörében nem következett be változás, mindössze a foglalkoztató hivatalos cégjegyzékében szereplő másik telephelyén
    is végezné a munkáját. Előadta továbbá, hogy mivel a kérelemben megjelölt tartózkodási célja és körülményei nem változtak
    és időközben a kormányhivatal, mint szakhatóság igazolást bocsátott ki az ... Kft. részére a .... szám alatti telephelyre,
    kérte a hatóságot, hogy ezen körülményt, mint új tényt fogadja el, mivel ezáltal már megfelel a Harmtv. 13. § (1) bekezdésének
    d) pontjában és a 29/A. § (7) bekezdésében foglaltaknak.


    ## Az alperes határozata:


    [7]        Az Országos Idegenrendészeti Főigazgatóság alperes 2022. november 24. napján kelt 106-T-49727/3/2022. számú
    határozatával az elsőfokú hatóság döntését helybenhagyta.


    Indoklásában hivatkozott a Külgazdasági és Külügyminisztérium, mint másodfokú szakhatóság a 2022. október 18. napján kelt
    KKM/410832022/ADM. számú állásfoglalásra, amely az elsőfokú szakhatóság állásfoglalását helybenhagyta és a külföldi munkavállalását
    nem támogatta. A szakhatósági állásfoglalás az összevont engedélyezési eljárásban kógens erővel bír, azaz a hatóságra
    nézve kötelező, tartamától nem térhet el.


    A másodfokú szakhatóság megállapította, hogy a kérelemben nem ugyanazon munkavégzési hely került megjelölésre, ezért megállapítható,
    hogy a benyújtott kérelem nem tekinthető az engedély meghosszabbításának, amelynek a jogkövetkezménye, hogy a munkaerőpiaci
    szempontok vizsgálata szükséges a kérelem elbírálásához. Az illetékes járási hivatal tájékoztatása szerint a leendő foglalkoztató
    2022. szeptember 16. napján a FEOR: 3332 masszőr munkakörre nyújtott be munkaerőigényt, tehát a foglalkoztató az adott
    időszakra nem rendelkezett érvényes munkaerőigénnyel.


    ## A felperes keresete:


    [8] A felperes az alperes döntésével szemben törvényes határidőn belül keresetet terjesztett elő, amelyben elsődlegesen
    az alperesi határozat és az elsőfokú hatóság határozatának a megváltoztatását kérte akként, hogy a bíróság adjon helyt
    a munkavállalási célú tartózkodási kérelem kiadása iránti kérelemnek és mellőzze az Európai Unió területéről történő kiutasítást,
    másodlagosan az alperesi határozatnak az elsőfokú határozatra is kiterjedően történő hatályon kívül helyezését és az elsőfokú
    hatóság új eljárás lefolytatására való kötelezését, továbbá azonnali jogvédelem elrendelését, valamint az alperes perköltségben
    történő marasztalását kérte.


    [9] Kifejtette, hogy az elsőés a másodfokon eljáró hatóságok tévesen értelmezték a Korm.rend. 2. § 12. pontjában rögzített
    ''ugyanazon a munkavégzési helyen'' fordulatot, ebből kifolyólag téves következtetést vontak le abban a tekintetben, hogy
    a Korm.rend. 9. § (1)


    bekezdés nem alkalmazható és a foglalkoztatónak a harmadik országbeli állampolgár által ellátandó tevékenységre vonatkozóan
    érvényes munkaerőigénnyel kell rendelkeznie.


    Az ''ugyanazon munkavégzési hely'' fogalmának értelmezése körében hivatkozott arra, hogy sem a Harmtv., sem a Vhr., de
    még a Korm.rend. sem határozza meg pontosan a munkavégzési hely fogalmát. Ilyen jogszabályi előírás hiányában a korábbi
    munkavégzési helytől eltérő munkavégzési hely nem értelmezhető, álláspontja szerint ugyanazon székhellyel rendelkező foglalkoztató
    esetén az ugyanazon munkavégzési hely fogalma teljesül, figyelemmel arra is, hogy a munkaszerződés 6. pontja szerint a
    munkáltató jogosult a munkavállalót a társaság ... területén lévő telephelyein és műkődési helyszínein is foglalkoztatni.
    A társaság székhelye .... szám alatt, míg a társaság telephelyei .... szám alatt, illetve ... szám alatt található. A
    munkaszerződésében a munkavégzés helyeként a munkáltató székhelye és valamennyi telephelye feltüntetésre került. Csatolta
    a hivatkozott munkaszerződést a peres eljárásba.


    [10] Állította, hogy a fenti indokokra tekintettel a szakhatósági állásfoglalások sem helyesek, mivel a mosonmagyaróvári
    munkavégzési hely nem változott, véletlenül a foglalkoztató másik telephelye került megjelölésre, azonban a munkaszerződés
    tanúsága szerint az változatlan, így a Korm.rend. 2. § 12. pontban, 9. § 16. pontban és a 18. § (1) bekezdésében foglalt
    feltételek megvalósulhatnak a korábbi munkavégzési hely tekintetében is, így a szakhatósági állásfoglalás szükségtelen
    volt, illetve a tényállás megfelelő tisztázását követően kikötéssel támogathatták volna a munkavállalást.


    [11] Hivatkozott arra, hogy az alperes határozata anyagi és eljárási szempontból is jogszabálysértő, mert az általános
    közigazgatási rendtartásról szóló 2016. évi CL. törvény (továbbiakban: Ákr.) 2. §-ában és 62. § (1)-(4) bekezdéseiben
    foglaltakkal ellentétben a tényállást nem tisztázta, indoklási kötelezettségének nem tett eleget, mérlegelési jogkörre
    vonatkozó szabályokat megszegte, a felperes által csatolt céges iratokat nem bírálta el.


    Kitért még arra, hogy az elsőfokokon eljárt hatóság megsértette az Ákr. 2. § által nevesített jogszerűség elvét, az Ákr.
    6. §-ban foglalt jóhiszeműség elvét, továbbá a 62. § rendelkezéseit, ugyanis a munkavégzési hely vonatkozásában a tényállást
    nem tisztázta, munkaerőigény bejelentés vonatkozásában, illetve a tényállás tisztázása érdekében a Harmtv. 86/K. § (1)
    bekezdés rendelkezéseivel ellentétesen, hiánypótlásra sem hívta fel a felperest. Hivatkozott még az Ákr. 5. § (2) bekezdésére,
    amely alapján a hatóság köteles biztosítani, hogy az ügyfél a kötelezettségeit megismerje és hatékonyan kell segítenie
    az ügyfelet az eljárás előmozdítása érdekében.


    [12] Kifejtette, hogy a Harmtv. 29/A. § (9) bekezdése alapján, figyelemmel arra, hogy munkaviszonya jogfolytonos, illetve
    arra, hogy a foglalkoztató személyében, illetve a munkaviszonya feltételeiben változás nem történt, így az elsőfokú hatóság
    nem tehette volna kötelezővé az előzetes megállapodás csatolását, ehelyett a rendelkezésre álló munkaszerződést be kellett
    volna fogadnia. Állította, hogy a felperes kérése ellenére a kérelmet átvevő ügyintéző nem engedélyezte a munkaszerződés
    csatolását. A munkaszerződés hiányában a munkaviszony feltételeinek esetleges változása nem vizsgálható, a tényállás nem
    tisztázható, sőt ennek hiányában nem lehetett volna megállapítani, hogy valóban szükséges volt-e a szakhatóság megkeresése.


    A munkaszerződéssel kapcsolatosan hivatkozok az IRM rendeletben található betétlapra, amelynek a tájékoztatója szerint
    a tartózkodás célját igazoló okirat lehet az előzetes megállapodás vagy a foglalkoztatási jogviszonyt igazoló okirat is.
    Álláspontja szerint a munkaszerződés a foglalkoztatási jogviszonyt igazoló okiratnak minősül, amely alkalmas arra, hogy
    a tartózkodási célt igazolja, így a felperes teljesen jóhiszeműen járt el az ügyben.


    Sérelmezte, hogy sem a kérelmet átvevő ügyintéző, sem az elsőfokú hatóság nem ellenőrizte azt a körülményt, hogy a munkavégzés
    helyeként a társaság székhelyétől eltérő hely került megjelölésre, ennek a jelentőségéről nem adott tájékoztatást.


    Álláspontja szerint az elsőfokú hatóságnak a munkaszerződés bekérését követően észlelnie kellett volna, hogy a munkaszerződésben
    munkavégzési helyként több hely megjelölésre került, és figyelemmel az Ákr. 2. § (2) bekezdése szerinti együttműködési
    kötelezettségre a tényállás tisztázására kellett volna felhívni az Ákr. 62. §, illetve a Harmtv. 86/K. § (1) bekezdése
    alapján, tekintettel arra is, hogy a felperes a magyar nyelvet nem beszéli.


    [13] Kifogásolta, hogy az elsőfokú hatóság a kötelezően csatolandó munkaerőigény bejelentésről szóló igazolás csatolására
    nem hívta fel a figyelmet annak ellenére, hogy a foglalkoztatónak a bejelentésre a Korm.rend. 19. § (2) bekezdés a) pontja
    szerint a kérelem benyújtásától számított 2 munkanapon belül lett volna még lehetősége.


    [14] Csatolta a kérelem benyújtásakor kiállított ''átvételi elismervény és hiánypótlási felhívás'' megnevezésű iratot,
    amely alátámasztja, hogy nem szerepelt benne olyan felhívás, miszerint a hiányzó munkaerőigény bejelentését igazoló iratot
    csatolni kellene, illetve az erre vonatkozó bejelentést meg kell tenni, amely alátámasztja a hatóság mulasztását.


    [15] Sérelmezte továbbá, hogy az elutasító határozat kihirdetése kb. 1 percig tartott, a határozat tartalmát részére nem
    magyarázták el, jogorvoslati lehetőségeiről részletesen nem oktatták ki, a határozat lefordításának lehetőségéről nem
    gondoskodott, amellyel az elsőfokú hatóság megsértette a Harmtv. 86/F. § (1) és (3) bekezdése által a felperes részére
    biztosított jogot.


    [16] A fent előadottak igazolására kérte, hogy a bíróság tanúként hallgassa meg a munkáltató képviseletében eljáró ...
    ügyvezetőt, aki a kérelem benyújtásának és az eljárás lefolytatásának a körülményeit tudja igazolni, figyelemmel arra,
    hogy ő az, aki elkísérte és segített a felperest az ügyintézésben.


    ## Az alperes védirata:


    [17] Az alperes a védiratában a kereset elutasítását és a felperes perköltségben történő marasztalását kérte. Indoklásában
    fenntartotta a másodfokú határozatban foglalt érvelését.


    A munkáltató ügyvezetőjének tanúként történő meghallgatását ellenezte, mivel a személyes nyilatkozata nem bír relevanciával
    az ügyben a Kp. 85. § (2) bekezdése értelmében, továbbá arra figyelemmel, hogy az idegenrendészeti hatóságot köti a szakhatósági
    állásfoglalás.


    Hivatkozott arra, hogy a keresettel támadott határozatban megvalósult a felperes tájékoztatása a fellebbezésre nyitvaálló
    határidő és a jogszabályhely pontos megjelölésével.


    Álláspontja szerint a közléssel kapcsolatos kifogás nem helytálló, mivel a rendelkezésre álló kézbesítési igazolás szerint
    az elsőfokú határozatot a helyettes átvevő, ... házastársi hozzátartozói jogcímen postai úton, 2022. szeptember 15. napján
    vette át, így ezen érvelés nem értelmezhető.


    Hivatkozott még arra, hogy a felperes a fellebbezésben nem tett észrevételt és nem emelt kifogást az elsőfokú határozat
    közlésére és jogorvoslati tájékoztatás hiányosságaival kapcsolatban.


    ## A II.r. alperes védirata:


    [18]     A bíróság a 4. sorszámú végzésével a másofokú szakhatóságként eljáró Külgazdaságiés Külügyminisztériumot II.
    r. alperesként perbe állította, amely végzés 2023. március 30. napján jogerőre emelkedett.


    A II. r. alperes a védiratában kérte a kereset elutasítását és a felperes perköltségben történő marasztalását. Indoklásában
    fenntartotta a másodfokú szakhatósági állásfoglalásban rögzített érvelését.


    ## [19]     A felperes keresete az alábbiak szerint nem alapos .


    [20] A Harmtv. 18. § (1) bekezdés a) pontja kimondja, hogy a tartózkodási engedély kiadását vagy meghosszabbítását - ha
    e törvény másként nem rendelkezik - meg kell tagadni, illetve a kiadott tartózkodási engedélyt vissza kell vonni, ha a
    harmadik országbeli állampolgár nem felel meg a 13. § (1) bekezdés a), valamint c)-i) pontjaiban foglalt valamely feltételnek.


    [21] A Harmtv. 29/A.§ (7) bekezdés értelmében az idegenrendészeti hatóság összevont engedélyezési eljárás keretében összevont
    engedélyt akkor adhat ki, ha a harmadik országbeli állampolgár a) foglalkoztatása jogszabályban meghatározott szempontok
    alapján, valamint hazai foglalkoztatáspolitikai érdekből támogatott, vagy külön jogszabály alapján ezen vizsgálat alól
    mentes és


    b)      a törvényben meghatározott tartózkodási feltételeket teljesíti.


    [22]    A Vhr. 72/H.§ (2) bekezdése szerint a Kormány az összevont kérelmezési eljárásban annak megállapítása kérdésében,
    hogy a harmadik országbeli állampolgár magyarországi munkavállalását támogatja-e, elsőfokú eljárásban a munkavégzés helye
    szerint illetékes kormányhivatalt, másodfokú eljárásban a harmadik országbeli állampolgárok magyarországi foglalkoztatásáért
    felelős minisztert szakhatóságként jelöli ki.


    [23] A Korm.rend. 2.§ 12. pontja kimondja, hogy munkavállalási engedély meghosszabbítása azt jelenti, hogy ha a harmadik
    országbeli állampolgár foglalkoztatására a munkavállalási engedély érvényességi időtartamának lejártát követően ugyanannál
    a foglalkoztatónál, ugyanabban a munkakörben és ugyanazon a munkavégzési helyen kerül sor.


    [24]    A Korm.rend. 9. § (1) bekezdés 16. pontja szerint a munkavállalási engedélyt a 3. § (2)-(7) bekezdésében, valamint
    az 5. § (1) bekezdés a) és e) pontjában meghatározott szempontok vizsgálata nélkül kell kiadni: ha a foglalkoztató a 2.
    § 12. pontjában meghatározott, engedély meghosszabbítása iránti kérelmet legkésőbb a munkavállalási engedély lejártát
    megelőző tizenötödik napon benyújtja.


    [25] A Korm.rend. 3. § (1) bekezdés alapján a harmadik országbeli állampolgár Magyarországon munkavállalási engedély alapján
    foglalkoztatható. Az (1) bekezdésben meghatározott engedélyt - a 9. §-ban foglalt kivétellel - akkor kell kiadni, ha a)     
    a foglalkoztató a harmadik országbeli állampolgár által ellátandó tevékenységre vonatkozóan érvényes munkaerőigénnyel
    rendelkezett,


    b)      a munkaerőigény benyújtásától kezdődően nem közvetítettek ki részére olyan kiközvetíthető munkaerőt, akit az Flt.
    és végrehajtási rendeletei alapján álláskeresőként tartanak nyilván, és aki rendelkezik a jogszabályban előírt, valamint
    a foglalkoztató munkaerőigényében megjelölt alkalmazási feltételekkel, és


    - c) a harmadik országbeli állampolgár megfelel a jogszabályban előírt, valamint a foglalkoztató munkaerőigényében megjelölt
    alkalmazási feltételeknek.


    [26]    A Korm.rend. 19. § (1) bekezdés b) pontja értelmében a kormányhivatal abban az esetben támogatja a harmadik országbeli
    állampolgárnak az előzetes megállapodásban meghatározott munkakörben történő magyarországi munkavállalását, ha a foglalkoztató
    a harmadik országbeli állampolgár által ellátandó tevékenységre vonatkozóan érvényes munkaerőigénnyel rendelkezett.


    [27] A Korm.rend. 19.§ (2) bekezdés akként rendelkezik, hogy az 19.§ (1) bekezdés b) pontjának alkalmazása szempontjából
    érvényes munkaerőigénynek azt a munkaerőigényt kell tekinteni, amelyet a foglalkoztató


    - a) az összevont engedély iránti kérelem benyújtásával egyidejűleg, vagy legkésőbb a kérelem benyújtásától számított
    2 munkanapon belül nyújtott be,

    - b)       hatvan napnál nem régebben nyújtott be, vagy

    - c)       hatvan napnál régebben nyújtott be, de azt legalább a kérelem benyújtását megelőző hatvan napnál nem régebben
    meghosszabbította,


    és az (5) bekezdésben foglalt kivétellel az előzetes megállapodást kötő foglalkoztató a munkaerőigényt a fővárosi és vármegyei
    kormányhivatal azon járási (fővárosi kerületi) hivatalánál jelentette be, amelynek területén a harmadik országbeli állampolgár
    foglalkoztatása történik.


    [28] A Korm.rend. 20. § (1) bekezdése alapján a kormányhivatal szakhatósági állásfoglalásában nem támogatja az összevont
    engedély kiadását, ha a)nem állnak fenn a 19. § (1) bekezdés a)-d) pontjában meghatározott feltételek,


    g) a 18. § alapján kérelmezett összevont engedély esetén, a szakhatósági állásfoglalás kiadásának alapjául szolgáló feltételek
    nem állnak fenn,


    [29]    A közigazgatási perrendtartásról szóló 2017.évi I. törvény (továbbiakban. Kp.) 88. § (1) bekezdés a) pontja szerint
    a bíróság a keresetet elutasítja, ha a kereset alaptalan.


    [30]     A bíróság az alperes 106-T-20303/4/2021. számú határozatának jogszerűségét - az elsőfokú hatóság 106-T-49727/3/2022.
    számú határozatára is kiterjedően, a Kp. 85. § (1) bekezdése alapján a kereseti kérelem korlátai között, a meghozatalának
    időpontjában fennálló tények alapján vizsgálta. A bíróság a felperes kereseti kérelemében foglaltak alapján jelen perben
    azt vizsgálta, hogy jogszerűen járt-e el a hatóság, amikor a felperes munkavállalás célú tartózkodási engedély meghosszabbítása
    iránti kérelme vonatkozásában szakhatósági állásfoglalást szerzett be, és a nem támogató szakhatósági állásfoglalásra
    figyelemmel elutasította a kérelmet.


    [31] A bíróság rámutatott, hogy az általános szabályok szerint a Korm.rend. 19.§ (1) bekezdés b) pontja alapján a szakhatóság
    akkor támogatja a harmadik országbeli állampolgárok előzetes megállapodásában meghatározott munkakörben történő magyarországi
    munkavállalását, ha a foglalkoztató a harmadik országbeli állampolgár által ellátandó tevékenységre vonatkozó érvényes
    munkaerő-igénnyel rendelkezik. A kedvező szabályok alkalmazásának lehetősége a Korm.rend. 9.§ (1) bekezdése és 3.§ (2)-(7)
    bekezdései összevetéséből állapítható meg, amely a munkavállalási engedély meghosszabbítása esetén [Korm.rend. 2.§ 12.]
    könnyítést enged a kérelmező számára. Eszerint abban az esetben, ha ugyanazon foglalkoztatónál, ugyanabban a munkakörben
    és munkavégzési helyen kerül sor a meghosszabbítására, akkor a munkaerő piaci helyzet vizsgálata nélkül kiadható a szakhatósági
    hozzájárulás/állásfoglalás.


    [32] A bíróság kifejtette, hogy a vonatkozó jogszabályok alapján az ''ugyanazon munkavégzés helye'' fogalmának helyes
    értelmezése szerint, amelyet kialakult bírói gyakorlat is alátámaszt, a Korm.rend. szerinti ugyanazon munkavégzési hely
    egységes fogalomként értékelendő, amely feltétel fennállása csak abban az esetben állapítható meg, ha az engedély szerinti
    foglalkoztatás munkavégzési hely(ei) teljes mértékben változatlan(ok), és mind számban, mind címben megegyeznek a kérelmezett
    foglalkoztatás munkavégzési hely(ei)vel.


