      ## h a t á r o z a t o t


      hoztam:


      A NAV Pest Vármegyei Adóés Vámigazgatósága szám3 iktatószámú határozatát helybenhagyom .


      E határozat a közléssel válik véglegessé, ellene további fellebbezésnek nincs helye, azonban az okozott jogsérelem megjelölésével
      közigazgatási per indítható ellene. A közigazgatási pert a határozat közlésétől számított 30 napon belül a Budapest
      Környéki Törvényszékhez címzett,


      de az elsőfokú adóhatóságnál három példányban benyújtott, vagy ajánlott küldeményként postára adott keresettel lehet
      kezdeményezni.


      Ettől eltérően a perben jogi képviselővel eljáró ügyfél a keresetlevelet kizárólag a NAV holnapjáról letölthető, a keresetlevél
      elektronikus beterjesztésére szolgáló űrlap (NAVKPER2) megfelelő kitöltésével, a keresetlevél elektronikus benyújtására
      vonatkozó perrendtartási szabályoknak megfelelően elektronikus úton terjesztheti elő a végzés közlésétől számított 30
      napon belül.


      A perben jogi képviselő nélkül eljáró, belföldi gazdálkodó szervezetnek nem minősülő ügyfél a keresetét a NAV honlapjáról
      letölthető, a keresetlevél elektronikus beterjesztésére szolgáló űrlap (NAVKPER2) megfelelő kitöltésével, a keresetlevél
      elektronikus benyújtására vonatkozó perrendtartási szabályoknak megfelelően elektronikus úton is előterjesztheti a határozat
      közlésétől számított 30 napon belül.


      A pert a NAV Fellebbviteli Igazgatósága, mint alperes ellen kell megindítani. A bíróság a pert tárgyaláson kívül bírálja
      el, a felek bármelyikének kérelmére azonban tárgyalást tart. Tárgyalás tartását az ügyfél a keresetlevélben kérheti,
      ennek elmulasztása miatt igazolásnak nincs helye.


      A perindításnak a végleges határozat hatályosulására halasztó hatálya nincs, azonban akinek jogát, jogos érdekét a közigazgatási
      tevékenység vagy az azzal előidézett helyzet fenntartása sérti, a közvetlenül fenyegető hátrány elhárítása, a vitássá
      tett jogviszony ideiglenes rendezése, illetve a jogvitára okot adó állapot változatlan fenntartása érdekében a perre
      hatáskörrel és illetékességgel rendelkező bíróságtól az eljárás során bármikor azonnali jogvédelmet kérhet. Azonnali
      jogvédelem keretében kérhető a halasztó hatály elrendelése.


      ## Indokolás


      ## A jogorvoslati eljárás alapjául szolgáló tényállás:


      A NAV Pest Vármegyei Adó- és Vámigazgatósága (a továbbiakban: elsőfokú adóhatóság) szám5 ügyszámon végrehajtási eljárást
      folytat Felperes1 (a továbbiakban: adózó) vonatkozásában. Az elsőfokú adóhatóság a 2022. április 26-án kelt, szám6 iktatószámú
      árverési hirdetményben intézkedett -az adózótól korábban lefoglalt üzletrész -árverésen történő értékesítése felől.


      Az adózó meghatalmazottja útján 2023. április 04-én benyújtott beadványában végrehajtási kifogása előterjesztése mellett
      kérte a végrehajtási eljárás felfüggesztését is, amely során az elsőfokú adóhatóság az adózó kérelmét a szám7 iktatószámú,
      2023. május 02-án kelt, 2023. május 16-án kézbesített végzésével elutasította.


      Az adózó meghatalmazottja útján az elsőfokú végzéssel szemben - a törvényes határidőn belül - 2023. május 26-án fellebbezést
      terjesztett elő, amely szám1 számon került iktatásra az elsőfokú adóhatóságnál.


      Az elsőfokú adóhatóság a fellebbezést az ügyben keletkezett iratokkal együtt felterjesztette elbírálás céljából a másodfokú
      adóhatósághoz, amely a szám8 iktatószámú, 2023. július 10-én kiadmányozott végzésével helybenhagyta az elsőfokú adóhatóság
      támadott végzését.


      ## Az elsőfokú döntés:


      Figyelemmel arra, hogy az adózó a 2023. május 26-án, előterjesztett szám1 iktatószámú illetékköteles fellebbezése kapcsán
      az eljárási illetékfizetési kötelezettségének nem tett eleget, az elsőfokú adóhatóság a 2023. június 19-én kelt, szám3
      iktatószámú határozatával 3.000 Ft eljárási illeték megfizetésére kötelezte az adózót. Kötelezte továbbá az eljárási
      illeték összegének késedelmes (8 napon túli) megfizetése, illetve az eljárási illeték nem teljes összegben történő megfizetése
      vagy meg nem fizetése esetére 5.000 Ft mulasztási bírság megfizetésére.


      Az elsőfokú adóhatóság a határozatát az illetékekről szóló 1990. évi XCIII. törvény (a továbbiakban: Itv.) 29. § (4)
      bekezdésére, 31. § (1), 3.§ (4) bekezdésére, 73. § (3) bekezdésére, 73/A. § (1) bekezdésére és az adózás rendjéről szóló
      2017. évi CL. törvény (a továbbiakban: Art.) 220. §-ára, valamint 237. § (1)-(2) bekezdéseire alapította.


      Az elsőfokú határozat kézbesítése az adózó meghatalmazott jogi képviselője részére 2023. július 02-án elektronikus úton
      megtörtént, adózó postai úton 2023. július 25-én vette át.


      ## A jogorvoslati kérelem


      Az adózó meghatalmazottja útján az elsőfokú határozat ellen - a jogorvoslatra nyitva álló törvényes határidőn belül
      - 2023. július 17-én, elektronikus úton fellebbezést terjesztett elő, melyben elsődlegesen az elsőfokú határozat hatályon
      kívül helyezését, és az abban foglalt jogkövetkezmények alól történő mentesítését kérte, másodlagos kérelme - a közigazgatási
      perrendtartásról szóló 2017. évi I. törvény (a továbbiakban: Kp.) 50. § (1) bekezdésében, valamint (2) bekezdés a) pontjában
      foglaltak értelmében -a határozat végrehajtásának felfüggesztésére irányult az alábbi indokok alapján:


      Hivatkozott az adóigazgatási rendtartásról szóló 2017. évi CLI. törvény (a továbbiakban: Air.) 7. §-ában foglalt közérthetőség
      elvére, mely vonatkozásában előadta, hogy nem ért egyet a határozat tartalmával, azt nem tudja értelmezni, ezáltal a
      határozat ellentétes az idézett jogszabályi rendelkezéssel. Különösen azt nem tudja értelmezni, hogy amennyiben 15 napos
      határidő áll rendelkezésre a fellebbezéshez, abban az esetben milyen alapon állhat be fizetési késedelem a határozat
      átvételétől számított 8. napot követően.


      Az elsőfokú adóhatóság az adózó fellebbezésében előadottak alapján nem látta indokoltnak a döntésének saját hatáskörben
      történő módosítását, ezért azt Air. 126. § (4) bekezdése alapján elbírálás céljából felterjesztette a másodfokú adóhatósághoz.


      ## A másodfokú döntés és jogi indokai


      Az Air. 127. § (1) bekezdése értelmében a felettes szerv a fellebbezéssel megtámadott döntést és a döntéshozatalt megelőző
      eljárást megvizsgálja, tekintet nélkül arra, hogy ki és milyen okból fellebbezett.


      Az Air. 127. § (4) bekezdés alapján a határozat ellen irányuló fellebbezést határozattal, a végzés ellen irányuló fellebbezést
      végzéssel kell elbírálni. A vizsgálat eredményeként a felettes szerv a döntést helybenhagyja, megváltoztatja vagy megsemmisíti.


      Az adózó fellebbezését, a határozatot, és az azt megelőző elsőfokú eljárást a rendelkezésemre álló iratok alapján teljes
      körűen felülvizsgáltam és megállapítottam, hogy a fellebbezés nem alapos .


      Az Itv. 1. § (1) bekezdése szerint öröklés, ajándékozás és visszterhes vagyonátruházás esetén vagyonszerzési illetéket,
      a közigazgatási hatósági és bírósági eljárásért eljárási illetéket vagy az e törvényben meghatározott módon, de külön
      jogszabályban megállapított igazgatási, bírósági szolgáltatási díjat, a cégbíróságok törvényességi felügyeleti tevékenységéért
      felügyeleti illetéket kell fizetni.


      Az Itv. 3. § (4) bekezdése szerint az eljárási illetékkötelezettség az eljárás megindítása iránti kérelem előterjesztésekor
      keletkezik.


      Az Itv. 28. § (1) bekezdése szerint az 1. melléklet szerinti közigazgatási hatósági eljárásért, valamint - a 2. melléklet
      szerinti eljárások kivételével - a közigazgatási hatósági jogorvoslati eljárásért közigazgatási hatósági eljárási illetéket
      kell fizetni.


      Az Itv. 31. § (1) bekezdése szerint a közigazgatási hatósági eljárási illetéket az eljárás kezdeményezésekor az köteles
      megfizetni, aki az eljárás megindítását kéri. Az egyes közigazgatási hatósági eljárások külön illetéke tekintetében
      e törvény melléklete eltérően rendelkezhet.


      Az Itv. 29. § (4) bekezdése alapján a végzés elleni fellebbezésért - ha e törvény másként nem rendelkezik 3 000 forint
      illetéket kell fizetni .


      Az Itv. 73. § (1) bekezdése szerint a közigazgatási hatósági eljárási illetéket az eljárás megindításakor kell megfizetni.


      Az Itv. 73. § (3) bekezdése szerint az elsőfokú adóhatóságnál és vámhatóságnál (a továbbiakban: adóhatóság) indított
      eljárás -ideértve az elektronikus úton kezdeményezett eljárást is - illetékét - a másolat, kivonat illetékének kivételével
      -, valamint az adóhatóság határozata, végzése és végrehajtási cselekménye ellen kezdeményezett jogorvoslati eljárás
      illetékét az illetékes adóhatóság illetékbevételi számlája javára kell megfizetni. A 73/A. § (1) bekezdésében foglaltaktól
      eltérően az esedékességkor meg nem fizetett eljárási illeték és a mulasztási bírság összegét az adóhatóság határozatban
      közli az ügyféllel, azzal, hogy az eljárási illetéket a határozat közlésétől számított 8 napon belül az adóhatóság illetékbevételi
      számlájára mulasztási bírság nélkül fizetheti meg . Az így meg nem fizetett illetéket és a mulasztási bírságot az adóhatóság
      hajtja be.


      Az eljárási illetékek megfizetésének és a megfizetés ellenőrzésének részletes szabályairól szóló 44/2004. (XII. 20.)
      PM rendelet 5. § (1) bekezdése alapján az adóhatóság az illetékköteles kérelem -kivéve azon kérelmeket, melyek illetékét
      az Itv. szerint illetékbélyegben kell megfizetni - beérkezésével egyidejűleg kötelezettségként előírja a fizetendő eljárási
      illeték összegét az adózó folyószámláján (adószámla), és a kérelem beérkezésétől számított 10. munkanapon ellenőrzi
      az eljárási illetéknek az adóhatóság által közzétett illetékbevételi számlára történő megfizetését.


      Ugyanezen § (3) bekezdése szerint, amennyiben az adóhatóság észleli, hogy az eljárási illetéket nem, vagy nem teljes
      összegben fizették be, a hiányzó illeték összegét - a mulasztási bírsággal együtt - határozatban (több azonos esedékességű
      ügy esetén is egy határozatban) közli az ügyféllel, azzal, hogy amennyiben fizetési kötelezettségének a határozat közlésétől
      számított 8 napon belül eleget tesz, akkor a mulasztási bírságot nem kell megfizetnie.


      Ugyanezen § (4) bekezdése szerint, ha az ügyfél a (3) bekezdés szerinti kötelezettségének az ott megjelölt határidőn
      belül nem tesz eleget, az adóhatóság a határozat véglegessé válását követően intézkedik az eljárási illeték és a mulasztási
      bírság végrehajtása iránt.


      Ugyanezen § (5) bekezdése szerint, ha az ügyfél az eljárási illetéket a határozat közlésétől számított 8 nap elteltével
      a mulasztási bírság nélkül fizeti meg, akkor az adóhatóság a határozat véglegessé válását követően intézkedik a mulasztási
      bírság végrehajtása iránt.


      Az Itv. 82. § (1) bekezdése szerint az illeték fizetésére kötelezett terhére, ha az eljárás kezdeményezésekor fennálló
      eljárási illetékfizetési kötelezettségét -felhívás ellenére -egyáltalán nem vagy nem teljes mértékben vagy nem a megszabott
      határidőben teljesítette, továbbá a vagyonszerzéssel kapcsolatos bejelentési kötelezettség elmulasztása illetve hiányos
      teljesítése vagy késedelmes teljesítése esetén, az illetékfizetési kötelezettségtől függetlenül, az adózás rendjéről
      szóló törvényben meghatározott mértékű, mulasztási bírságot kell fizetni.


      Az Art. 220. § (1) bekezdése szerint, ha jogszabály eltérően nem rendelkezik, az adóhatóság az e törvényben, adókötelezettséget
      előíró törvényben, illetve e törvények felhatalmazásán alapuló más jogszabályban megállapított kötelezettségnek a megszegése
      miatt a természetes személy adózót kettőszázezer forintig , nem természetes személy adózót ötszázezer forintig terjedő
      mulasztási bírsággal sújthatja.


      Az Art. 237. § (1) bekezdése szerint a mulasztási bírság kiszabásánál az adóhatóság az adózó javára vagy terhére értékeli
      a) az adózó adózási gyakorlatát, általános jogkövetési hajlandóságát,


      b) az adózó jogellenes magatartásának (tevékenységének vagy mulasztásának) súlyát, gyakoriságát, időtartamát, továbbá


      c) azt, hogy az adózó, illetve intézkedő képviselője, foglalkoztatottja, tagja vagy megbízottja az adott helyzetben
      a tőle elvárható körültekintéssel járt-e el.


      Ugyanezen § (2) bekezdése szerint a körülmények okszerű mérlegelése alapján az adóhatóság a mulasztás súlyához igazodó,
      az adózási érdeksérelemmel arányos bírságot szab ki, vagy a bírság kiszabását mellőzi.


      A fentiekben idézett jogszabályi rendelkezések alapján az eljárási illetéket a jogorvoslati kérelem benyújtásával egyidőben
      kell megfizetni, ugyanakkor mulasztási bírság csak akkor terheli az adózót, ha fizetési kötelezettségének az erre irányuló
      felhívást követően, a megszabott határidőben sem tesz eleget.


      Az elsőfokú adóhatóság a mulasztási bírság kiszabása során az adózó terhére értékelte, hogy az elmúlt időszakban számos
      alkalommal került sor ilyen jellegű mulasztás miatt bírság kiszabására terhére.


      Az adózó terhére értékelte továbbá, hogy nem az adott helyzetben tőle elvárható körültekintéssel járt el. Az adózótól
      elvárható az illetékfizetési kötelezettségre vonatkozó, hosszabb ideje változatlan, egyértelmű rendelkezések ismerete
      és betartása. Figyelemmel arra is, hogy az adóhatóság már több esetben kötelezte határozattal az adózót az elmulasztott
      illetékfizetési kötelezettség teljesítésére.


      A mulasztás súlya körében az adózó javára értékelte, hogy csekély összegű eljárási illeték tekintetében mulasztotta
      el fizetési kötelezettségét.


      Az elsőfokú adóhatóság a körülmények mérlegelése alapján a feltételes mulasztási bírság összegét 5.000 forintban határozta
      meg arra az esetre, ha az adózó az illetékfizetési kötelezettségét a felszólítás ellenére sem teljesíti.


      Az adózó fellebbezésében elsődlegesen az elsőfokú határozat hatályon kívül helyezését, és az abban foglalt jogkövetkezmények
      alól történő mentesítését kérte.


      Eljárásom során megállapítottam, hogy az adózó 2023. május 26-án illetékköteles fellebbezést nyújtott be az elsőfokú
      adóhatóság szám7 iktatószámú végzése ellen. Az adózó eljárási illetékfizetési kötelezettsége a jogorvoslati beadvány
      benyújtásával egyidejűleg keletkezett és vált esedékessé a fentiekben idézett Itv. 73. § (1) bekezdése alapján, azaz
      az adózónak azt a fellebbezés benyújtásának napjával, 2023. május 26-án meg kellett volna fizetnie.


      ## Az Itv. 29. § (4) bekezdése alapján a fizetendő illeték összege 3.000 Ft.


      Az elsőfokú adóhatóság a fellebbezés benyújtását követően megvizsgálta az adózó adószámláját és megállapította, hogy
      az adózó nem teljesítette az eljárási illeték befizetési kötelezettségét.


      Mindezekre tekintettel helyesen járt el az elsőfokú adóhatóság, amikor feltételes mulasztási bírság kiszabása mellett
      az adózót határozattal kötelezte 3.000 Ft összegű eljárási illeték megfizetésére. Az adóhatóság mérlegelte az adózó
      mulasztásának körülményeit és az illeték 8 napon belül történő meg nem fizetése esetére 5.000 Ft összegben határozta
      meg a mulasztási bírság összegét.


      Eljárásom során megállapítottam, hogy az elsőfokú adóhatóság a mulasztás súlyával arányos mulasztási bírságot szabott
      ki az adózó terhére, és azt megfelelően indokolta.


      Helyesen értékelte az elsőfokú adóhatóság az adózó terhére, hogy már nem első alkalommal került sor ilyen mulasztás
      miatt bírság kiszabására a terhére, illetve az adózó nem az adott helyzetben tőle elvárható körültekintéssel járt el.
      Az adózótól ugyanis elvárható az illetékfizetési kötelezettségre vonatkozó, hosszabb ideje változatlan, egyértelmű rendelkezések
      ismerete és betartása. Különös tekintettel arra, hogy az adóhatóság már több esetben kötelezte határozattal az elmulasztott
      illetékfizetési kötelezettsége teljesítésére, amely határozatok részletes tájékoztatást tartalmaztak a vonatkozó jogszabályi
      rendelkezésekről.


      Ugyanakkor helytállóan állapította meg az adózó javára szóló körülményként, miszerint az adózó csekély összegű eljárási
      illeték tekintetében mulasztotta el a fizetési kötelezettségét.


      Mindezek alapján az 5.000 Ft összegben kiszabott mulasztási bírság az adózási érdeksérelemmel arányos, túlzottnak semmi
      esetre sem tekinthető. Alacsonyabb bírságösszegnél ugyanis már nem érvényesülne a bírság visszatartó szerepe.


      Az adózó jogi képviselője a fellebbezésében sérelmezte, hogy nem tudja értelmezni, hogy ha 15 napos határidő áll rendelkezésre
      a fellebbezés benyújtásához, abban az esetben milyen alapon állhat be fizetési késedelem a határozat átvételétől számított
      8. napot követően.


      A fellebbező indokait nem találtam megalapozottnak, tekintettel arra, hogy a mulasztási bírság megfizetésére nyitva
      álló 8 napos határidő, illetőleg a fellebbezésre nyitva álló 15 napos határidő nem ellentétes, e két határidő ugyanis
      nem kapcsolható össze, az egyik a fizetési kötelezettségre irányul, míg a másik a fellebbezési eljárásban a fellebbezés
      indokolt szövegének előterjesztésére és a fellebbezés benyújtására.


      A fenti jogszabályi rendelkezések alapján maga a jogalkotó írja elő a jogalkalmazó számára, hogy az adózó mulasztása
      esetén a mulasztási bírságot, mint hátrányos jogkövetkezményt alkalmazza, a mulasztási bírság a mulasztásban megnyilvánuló
      adózói magatartást szankcionálja.


      A feltételes mulasztási bírság kiszabására vonatkozó rendelkezéseket felülvizsgálva megállapítottam, hogy annak kiszabására
      a fentiekben hivatkozott jogszabályi rendelkezések alapján jogszerűen került sor, a kiszabott mulasztási bírság pedig
      addig is feltételes, ameddig a fellebbezés előterjesztésével kapcsolatos eljárási illetéket az adózó maradéktalanul
      a megszabott határidőben teljesíti.


      A határozatban foglalt 8 napos fizetési határidő tehát a feltételes mulasztási bírsághoz kapcsolódik, mivel az Itv.
      73. § (3) bekezdése szerint az eljárási illetéket a fizetésre kötelezett a határozat közlésétől számított 8 napon belül
      az adóhatóság illetékbeszedési számlájára mulasztási bírság nélkül fizetheti meg. Az erről szóló tájékoztatást a szám3
      iktatószámú elsőfokú határozat 3. oldala részletesen és világosan tartalmazza.


      Az Air. 7. §-a szerint az adóigazgatási eljárásban az adózókkal való kapcsolattartás nyelvezetének egyszerűnek és közérthetőnek
      kell lennie.


      A fellebbező kifogásával szemben megállapítottam, hogy az elsőfokú döntés a közérthetőség elvének maradéktalanul megfelel,
      az elsőfokú adóhatóság a vonatkozó jogszabályi rendelkezéseket az adózóval közérthetően ismertette, e körben tehát jogsérelmet
      nem tártam fel.


      E körben kiemelendő továbbá azon körülmény is, hogy az adózó jogi képviselővel jár el, aki az ezen alapelvre történő
      hivatkozása mellett nem fejtette ki, hogy az alapelv állított sérelme az adózó számára konkrétan milyen hátrányt okozott,
      illetőleg milyen érdeksérelemmel járt.


      A fellebbezésben foglalt másodlagos kérelem vonatkozásában -mely az eljárási illetéket kiszabó határozat végrehajtásának
      felfüggesztésére irányult a Kp. 50. § (1) és (2) bekezdés a) pontja alapján - megállapítottam, hogy a Kp. azonnali jogvédelem
      iránti kérelmet szabályozó rendelkezései jelen eljárás során nem alkalmazhatóak, tekintettel arra, hogy a jogorvoslattal
      érintett szám3 iktatószámú határozat a fellebbezés folytán még nem vált véglegessé.


      Az Air. 130. § (1) bekezdése szerint az adózó -az önálló fellebbezéssel nem támadható végzések kivételével -a véglegessé
      vált döntés ellen indíthat közigazgatási pert. Fellebbezéssel támadható döntés esetén közigazgatási per akkor indítható,
      ha az arra jogosultak valamelyike fellebbezett és a fellebbezést elbírálták.


      Tekintettel arra, hogy a Kp. 50. § (1) és (2) bekezdés a) pontjában szabályozott azonnali jogvédelem iránti kérelem
      csak véglegessé vált döntés bírósági felülvizsgálatára irányuló eljárás során terjeszthető elő, a jelen eljárásban az
      erre irányuló kérelem nem értelmezhető.


      A fellebbezésben foglalt másodlagos kérelem vonatkozásában továbbá megállapítottam, hogy tartalmilag arra irányult,
      hogy a fellebbezési eljárás alatt a szám3 iktatószámú elsőfokú határozat végrehajtása érdekében ne történjen intézkedés
      az adóhatóság részéről.


      Az Air. 125. §-a szerint, ha a törvény eltérően nem rendelkezik, a fellebbezésnek a döntés végrehajtására halasztó hatálya
      van. E körben megállapítottam, hogy a határidőben benyújtott fellebbezés folytán a végrehajtásra vonatkozó halasztó
      hatály az Air. 125. §-a értelmében a törvény erejénél fogva beállt, így az elsőfokú adóhatóságnak nem szükséges külön
      döntés meghozatala iránt intézkednie a végrehajtás felfüggesztése iránti kérelem tárgyában.


      A fentiekben kifejtetteket összegezve, megállapítottam, hogy az adózó eljárási illeték megfizetésére való kötelezése
      a hivatkozott jogszabályi rendelkezéseknek megfelelően történt.


      Tekintettel arra, hogy az adózó a fellebbezés (3.000 Ft) illetékét az Itv. 73. § (3) bekezdése szerinti határidőben
      nem fizette meg az adóhatóság illetékbeszedési számlájára, tehát az illetékfizetési kötelezettségét esedékességkor nem
      teljesítette, a hivatkozott jogszabályi rendelkezések alapján jogszerűen és helyesen járt el az elsőfokú adóhatóság,
      amikor az adózót a fellebbezés illetékének megfizetésére kötelezte, továbbá feltételes mulasztási bírságot szabott ki
      azzal, hogy az adózó az eljárási illetéket a határozat kézhezvételétől számított 8 napon belül mulasztási bírság nélkül
      megfizetheti. Jogszerűen állapította meg továbbá az elsőfokú adóhatóság a mulasztási bírság összegét is.


      Mindezek alapján megállapítottam, hogy az elsőfokú adóhatóság a törvényi előírások betartásával járt el, azaz jogszabálysértés
      nem valósult meg. Az adózó a fellebbezésében sem közölt az ügy eldöntése szempontjából olyan új, releváns adatot, tényt,
      körülményt, amely alapot teremtene az elsőfokú döntés megsemmisítésére, vagy megváltoztatására.


      ## Fentiekre tekintettel a szám3 iktatószámú elsőfokú határozatot helybenhagytam.


      Tájékoztatom adózót, hogy az Air. 50.§ (1)-(2) bekezdése értelmében ezen döntés meghozatalára nyitva álló határidő 30
      nap, mely ügyintézési határidő a fellebbezésnek az eljárásra hatáskörrel és illetékességgel rendelkező adóhatósághoz
      -a NAV Fellebbviteli Igazgatósága - történő megérkezését követő napon kezdődik. Jelen esetben az ügy iratai 2023. július
      27. napján érkeztek a fellebbezés elbírálására jogosult hatósághoz, melyre figyelemmel a döntés meghozatalára nyitva
      álló határidő - figyelemmel az Air. 52. § (4) bekezdése rendelkezésére is 2023. augusztus 28. napján jár le.


      Jelen határozatom véglegessége az Air. 74. § (2) bekezdése c) pontja alapján a döntés közlésével áll be. A fellebbezés
      lehetőségét az Air. 122. § (1) bekezdése zárja ki.


      A közigazgatási per indításának lehetőségét az Air. 130. § (1) bekezdése biztosítja. A keresetlevél benyújtásának szabályairól
      a közigazgatási perrendtartásról szóló 2017. évi I. törvény (a továbbiakban: Kp.) 29. § (1) bekezdése, valamint a 37-39.
      §-ai, továbbá a polgári perrendtartásról szóló 2016. évi CXXX. törvény (a továbbiakban: Pp.) elektronikus kapcsolattartásra
      irányadó 605-608. §-ai rendelkeznek.


      A bíróság illetékességét a Kp. 13. § (1) bekezdése határozza meg. A tárgyalás tartására vonatkozó szabályokat a Kp.
      77. §-a tartalmazza. A Kp. 39. § (6) bekezdés értelmében a keresetlevél benyújtásának a közigazgatási cselekmény hatályosulására
      halasztó hatálya nincs.


      Hatásköröm és illetékességem az Air. 23. § (1) bekezdésén, a Nemzeti Adó- és Vámhivatalról szóló 2010. évi CXXII. törvény
      4. § (2) bekezdés b) pontján és 12. § (3) bekezdésén, továbbá a Nemzeti Adó- és Vámhivatal szerveinek hatásköréről és
      illetékességéről szóló 485/2015. (XII.29.) Korm. rendelet 2. § (1) bekezdésén, 11. § a) pontján, illetve az 1. számú
      melléklet B/9. pontján alapul.


      Döntésem a hivatkozott jogszabályokon túl az Air. 72. §-án, 73. §-án, valamint a 127. §-án alapul.


      A fizetési kötelezettség teljesítésének módját az adóigazgatási eljárás részletszabályairól szóló 465/2017. (XII. 28.)
      Korm. rendelet 20. § (1)-(3) bekezdései szabályozzák.'
