    ## I n d o k o l á s


    - [1]     A törvényszék a peres felek nyilatkozatai, valamint a becsatolt okiratok tartalma alapján az alábbi tényállást
    állapította meg.

    - [2]     A kiskorú felperes 2024. szeptember 2-án kötelező Hepatitis-B védőoltás felvétele alóli mentesítés iránti kérelmet
    terjesztett elő az alperes előtt. Az alperes 2024. szeptember 9-én felhívta a felperes képviselőjét, hogy csatolja be
    kezelőorvos által adott, mentesítés indokoltságát alátámasztó szakvéleményt. A felperes 2024. szeptember 30-án határidő
    hosszabbítás iránti kérelmet, majd 2024. október 2-án eljárás felfüggesztése iránti kérelmet terjesztett elő, amely kérelmet
    az alperes ügyiratszámú végzésével elutasított, majd ügyiratszámú1, 2024. október 15-én kelt végzésével az eljárás megszüntette,
    arra való hivatkozással, hogy szakvélemény hiányában a kérelem nem volt elbírálható.

    - [3]     A felperes keresetében kérte elsődlegesen az eljárást megszüntető végzés megváltoztatását akként, hogy a törvényszék
    a közigazgatási eljárást függessze föl, másodlagosan akként, hogy mentesítse a felperest az életkorhoz kötött Hepatitis-B
    védőoltás felvétele alól, harmadlagosan helyezze a végzést hatályon kívül és utasítsa az alperes új eljárásra.

    - [4]     A felperes keresetében előadta, hogy a felperes személyét illetően védelembe vétel iránti eljárást kezdeményezett
    a gyámhatóság és ennek során a kiskorú felperest kényszeríteni akarják az oltás felvételére, amely adott esetben a felperes
    halálához vagy súlyos egészségromlásához vezethet. A felperes a Debreceni Törvényszék előtt, 10.P.21.274/2024. szám alatt
    polgári peres eljárást kezdeményezett iskolaorvossal szemben, amely perben a


    felperes keresetében olyan tartalmú jognyilatkozat pótlására kéri kötelezni az alperest, amely a felperes védőoltás alóli
    mentesítésének indokoltságát alátámasztó szakvéleménynek minősül. A felperes álláspontja szerint a polgári per a közigazgatási
    eljárás előkérdésének minősül, ezért indokolt a közigazgatási eljárás felfüggesztése a polgári peres eljárás jogerős befejeződéséig.
    A felperes kérelmezte a kötelező védőoltások felvételéről szóló jogszabályok Alkotmánybíróság előtt, normakontroll keretében
    történő vizsgálata iránti eljárásának kezdeményezését.


    - [5]     Az alperes védiratában kérte a felperes keresetének az elutasítását, fönntartva a keresettel támadott határozatában
    foglalt érvelését, amelyet kiegészített azzal, hogy az iskolaorvossal szemben indított per nem lehet előkérdése a pernek,
    mivel a szakvélemény kiállítására nem az iskolaorvos, hanem a kezelőorvos jogosult.

    - [6]     A kereset alaptalan.

    - [7]     A közigazgatási perrendtartásról szóló 2017. évi I. törvény (Kp.) 89. § (1) bekezdés a) és b) pontja kimondja,
    hogy a bíróságnak csak jogszabálysértés esetén van lehetősége a közigazgatási határozatot, mint közigazgatási cselekményt
    megváltoztatni, megsemmisíteni, vagy hatályon kívül helyezni és szükség esetén a közigazgatási szervet új eljárásra kötelezni.

    - [8]     A Kp. 2. § (4) bekezdése meghatározza, hogy amennyiben a törvény eltérően nem rendelkezik, a bíróság a közigazgatási
    jogvitát a kereseti kérelem, a felek által előterjesztett kérelmek és jognyilatkozatok keretei között bírálja el.

    - [9]     A Kp. 85. § (1) és (2) bekezdése értelmében a bíróság a közigazgatási tevékenység jogszerűségét a kereseti kérelem
    korlátai között, a megvalósításának időpontjában fennálló tények alapján vizsgálja.

    - [10]     Az egészségügyről szóló 1997. évi CLIV. törvény (Eütv.) 57. § (1) bekezdése, valamint (2) bekezdésének a) pontja
    előírja, hogy a védőoltás célja a fertőző betegségekkel szembeni aktív, illetve passzív védettség kialakítása. A miniszter
    rendeletben határozza meg azokat a fertőző betegségeket, amelyek esetében életkorhoz kötötten kötelező védőoltás elrendelésének
    van helye.


    - [11]     Az Eütv. 58. § (3) bekezdése kifejti, hogy a beteg törvényes képviselője a beteg lakóhelye szerint illetékes
    egészségügyi államigazgatási szervnél kérelmezheti a védőoltás alóli mentesítést, ha

    - a) a védőoltásban részesítés a beteg egészségi állapota miatt nem lehetséges, vagy a védőoltás a beteg egészségét vagy
    meglévő betegségét várhatóan károsan befolyásolná, és

    - b) az a) pont szerinti körülmény változása belátható időn belül nem várható.

    - [12]     Az Eütv. 58. § (3a) bekezdése rámutat arra, hogy a (3) bekezdés szerinti kérelemhez csatolni kell a mentesítés
    indokoltságát alátámasztó, a kezelőorvos által adott szakvéleményt.

    - [13]     A fertőző betegségek és a járványok megelőzése érdekében szükséges járványügyi intézkedésekről szóló 18/1998.
    (VI. 3.) NM rendelet 5. § (7) bekezdése alapján a Hepatitis B elleni oltást betöltött 12 éves korban kell elvégezni.

    - [14]     Az általános közigazgatási rendtartásról szóló 2016. évi CL. törvény (Ákr.) 47. § (1) bekezdésének b) pontja
    szerint a hatóság az eljárást megszünteti, ha a kérelmező ügyfél a hatóság felhívására nem nyilatkozik, és ennek hiányában
    a kérelem nem bírálható el, és az eljárást hivatalból nem folytatja.

    - [15]     A törvényszék a becsatolt okiratok tartalma alapján bizonyítottnak tekintette, hogy a kiskorú felperes kötelező
    védőoltás felvétele alóli mentesítés iránti kérelmet terjesztett elő az alperes előtt, azonban sem kérelméhez nem csatolta,
    sem az eljárás során felhívás ellenére pótlólagosan nem nyújtotta be a kezelőorvos által adott, mentesítés indokoltságát
    alátámasztó szakvéleményt, ezért az alperes az eljárást megszüntette.

    - [16]     A Eütv. 58. § (3a) bekezdése alapján a védőoltás alóli mentesítés érdemi elbírálásának elengedhetetlen feltétele,
    hogy a kérelmező kérelméhez csatolja a mentesítés indokoltságát alátámasztó, a kezelőorvos által adott szakvéleményt.
    A kötelező védőoltás alóli mentesítés iránti eljárásban a bizonyítási teher a kérelmezőre esik, ezért a kérelméhez csatolnia
    kell a mentesítés indokoltságát alátámasztó kezelőorvosi szakvéleményt. A hatóság és a bíróság ennek alaposságát ellenőrzi
    eljárása során (Kúria Kfv. 37.199/2020/6.).


    - [17]     A felperes kérelmének indokoltsága a szakvélemény hiányában érdemben valóban nem volt elbírálható, ezért az
    alperes nem járt el jogszabálysértő módon, amikor végzésével az eljárást megszüntette, különösen annak fényében, hogy
    a felperes nincs elzárva annak lehetőségétől, hogy kérelmét ismételten előterjessze.

    - [18]     A törvényszék a felperes által előterjesztett az Alkotmánybíróság előtti eljárás kezdeményezése iránti kérelmet
    a polgári perrendtartásról szóló 2016. évi CXXX. törvény (Pp.) 131. § (1) és (4) bekezdése alapján elutasította, tekintettel
    arra, hogy az Alkotmánybíróság már számos esetben foglalkozott a kötelező védőoltásokkal kapcsolatos jogszabályi környezettel
    (például 3080/2019. (IV. 17.) AB határozat, 3329/2021. (VII. 23.) AB végzés, 3331/2023. (VI. 21.) AB végzés) és nem találta
    alaptörvény-ellenesnek annak rendelkezéseit.

    - [19]     A fentiekre tekintettel az eljárás során nem volt bizonyított, hogy az alperes által hozott végzés jogszabálysértő
    lett volna, ezért a törvényszék a felperes keresetét a Kp. 88. § (1) bekezdés a) pontja alapján elutasította.

    - [20]     Az alperes perköltség iránti igényt nem terjesztett elő, ezért a törvényszéknek a perköltségről rendelkeznie
    nem kellett.

    - [21]     Az illetékekről szóló 1990. évi XCIII. törvény (Itv.) 45/A. § (1) bekezdése alapján az eljárási illeték összege
    30.000 forint volt. Az eljárásban az Itv. 62. § (1) bekezdésének h) pontja alapján tárgyi illetékfeljegyzési jog állt
    fönn. Az alperes az Itv. 5. § (1) bekezdésének c) pontja szerint teljes személyes illetékmentességet élvezett, míg a felperes
    teljes személyes költségmentességben részesült, ezért a törvényszék a Kp. 35. § (1) bekezdése alapján alkalmazandó Pp.
    102. § (1) bekezdése, 95. § (1) bekezdésének c) pontja alapján megállapította, hogy az állam által előlegezett eljárási
    illeték az állam terhén marad.

    - [22]     Az ítélettel szemben fellebbezésnek a Kp. 99. § (1) bekezdése alapján nincs helye.


    Debrecen, 2025. január 17.


    ## Dr. Csiki Bence s. k.


