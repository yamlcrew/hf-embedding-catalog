      ## Indokolás


      ## A bíróság által megállapított tényállás


      - [1]                   A bíróság a felek és képviselőik előadása, valamint a csatolt iratok alapján az alábbi tényállást
      állapította meg:

      - [2]                   A felperes a 2022. május 18. napját megelőző 5 éven belül 683, 10 éven belül 2445, 15 éven belül
      2552 nap biztosítási időt szerzett.

      - [3] A felperes a 2022. május 18. napján az alpereshez érkezett adatlappal megváltozott munkaképességű személyek ellátása
      iránti kérelmet terjesztett elő a Alperes1nál.


      [4] A Alperes1 a 2022. július 01. napján kelt szám2. számú határozattal (a továbbiakban: határozat) a felperes megváltozott
      munkaképességű személyek ellátásának megállapítására irányuló kérelmét elutasította. Az elutasítás indoka az volt, hogy
      a felperes nem rendelkezett a jogszabályban előírt szükséges biztosítási idővel tekintettel arra, hogy a kérelem benyújtását
      megelőző 5 éven belül 683, 10 éven belül 2445, 15 éven belül 2552 nap biztosítási időt szerzett, mely nem érte el a
      jogszabályban meghatározott 5 éven belüli 1095 napot, 10 éven belüli 2555 napot, és 15 éven belüli 3650 napot. Egyebekben
      a határozatban megállapításra került, hogy a felperes egészségi állapotának mértéke 56 %-os, mely egészségi állapot
      2021. november 01. napjától áll fenn, a felperes egészségi állapota alapján a B2 minősítési csoportba tartozik azzal,
      hogy egészségi állapota alapján foglalkoztathatósága rehabilitációval helyreállítható, azonban a komplex minősítés szakmai
      szabályairól szóló rendeletben meghatározott egyéb körülményei miatt foglalkozási rehabilitációja nem javasolt. A határozat
      a megváltozott munkaképességű személyek ellátásairól és egyes törvények módosításáról szóló 2011. évi CXCI. törvény
      (a továbbiakban: Mmtv.) 2. §-ára hivatkozott az elutasítás körében.


      ## A felperes keresete


      [5]                   A felperes a fenti határozat ellen a törvényes határidőn belül - a beadvány tartalma szerint -
      keresettel élt. Keresetében előadta, hogy álláspontja szerint, ha nem az 5, hanem a 10 évet vették volna figyelembe,
      akkor jogosult lenne az ellátásra, és kérte az évei ismételt átszámolását.


      ## Az alperes védirata


      [6]                   Az alperes védiratában a kereset elutasítását indítványozta a határozatban írt tényállás és jogi
      indokolás fenntartása mellett.


      ## A bíróság döntése és annak jogi indokai


      [7]                   A kereset az alábbiak szerint alaptalan.


      [8] A Közigazgatási perrendtartásról szóló 2017. évi I. számú törvény (a továbbiakban: Kp.) 85. § (1) és (2) bekezdése
      szerint a bíróság a közigazgatási tevékenység jogszerűségét a kereseti kérelem korlátai között vizsgálja. A bíróság
      a közigazgatási tevékenység jogszerűségét -ha törvény eltérően nem rendelkezik -a megvalósításának időpontjában fennálló
      tények alapján vizsgálja.


      [9] A jelen ügyben a bíróságnak abban a kérdésben kellett döntenie, hogy a felperes megváltozott munkaképességű személyek
      ellátása iránti kérelmét jogszerűen utasította-e el az alperes arra való hivatkozással, hogy a felperes nem rendelkezik
      a szükséges biztosítotti idővel.


      [10]               Az Mmtv. 2. § (1) bekezdése szerint megváltozott munkaképességű személyek ellátásaira jogosult az,
      akinek az egészségi állapota a rehabilitációs hatóság komplex minősítése alapján 60 %-os vagy kisebb mértékű (a továbbiakban:
      megváltozott munkaképességű személy), és aki a kérelem benyújtását megelőző


      aa) 5 éven belül legalább 1095 napon át, ab) 10 éven belül legalább 2555 napon át, vagy


      ac) 15 éven belül legalább 3650 napon át biztosított volt;


      b) keresőtevékenységet nem végez és c) rendszeres pénzellátásban nem részesül.


      [11]               A bíróság a 2022. szeptember 02. napján kelt 4. számú végzésében felhívta a felperes, hogy nyilatkozzon
      azzal kapcsolatosan, hogy pontosan mit kér a bíróságtól, egyben tájékoztatta, hogy amennyiben erre a kérdésre nem válaszol,
      a bíróság úgy tekinti, hogy a keresettel megtámadott határozat megsemmisítését és az alperes új eljárásra kötelezését
      kéri annak megállapítása mellett, hogy rendelkezik a szükséges biztosítotti idővel. A felperes által megadott Cím2 szám
      alatti címen a felperesnek megküldött iratokat a helyettes átvevő (név4 élettárs) átvette 2022. szeptember 17. napján,
      a hiánypótlási felhívásra a felperes nem nyilatkozott. Ezen hiánypótlásra szóló felhívásban a bíróság felhívta a felperest
      arra is, hogy írásban jelölje meg 15 napon belül, hogy melyek azok az időszakok, amelyeket álláspontja szerint az alperesnek
      figyelembe kellett volna vennie biztosítotti időként.


      [12]               A bíróság a 2022. október 03. napján kelt 5. számú végzésében tájékoztatta a felperest, hogy az ügy
      érdemében tárgyaláson kívül fog határozni, egyben lehetőséget adott a felperesnek, hogy előkészítő iratot nyújtson be
      15 napon belül. Tájékoztatta a bíróság a felperest arról is, hogy a felperest terheli a bizonyítás azzal kapcsolatosan,
      hogy rendelkezik olyan biztosítotti idővel, amit az alperes a keresettel támadott határozatban nem vett figyelembe,
      és ezen időszakokat a felperesnek kell megjelölnie, illetve bizonyítania. A felperes által megadott helyiség1 név utca
      7. szám alatti címre a bíróság az 5. szám alatti végzést megküldte, az ''nem kereste'' jelzéssel érkezett vissza, a
      kézbesítést a bíróság 2022. október 18. napján szabályszerűnek tekinti a Kp. 36. § (1) bekezdés c) pontja alapján alkalmazandó
      Polgári perrendtartásról szóló 2016. évi CXXX. törvény (a továbbiakban: Pp.) 137. § (2) bekezdése alapján.


      ## [13]               A mai napig a felperes részéről irat a bíróságra nem érkezett.


      [14]               A bíróság megállapította, hogy a felperesnek kellett volna olyan időszakokat megjelölnie, amelyek
      álláspontja szerint jogellenesen nem kerültek biztosítotti időként figyelembevételre, ilyen időszakokat a felperes nem
      jelölt meg. Ebből következően az alperes által kimutatott biztosítotti időszakokat kell/lehet figyelembe venni.


      [15]               A fentiek alapján a bíróság azt állapította meg, hogy nem sértett jogszabályt az alperes akkor, amikor
      a felperes megváltozott munkaképességű személyek ellátása iránti kérelmét elutasította a biztosítotti idő hiányára hivatkozással
      figyelemmel arra, hogy sem a kérelem benyújtását megelőző 5 éven belül, sem a kérelem benyújtását megelőző 10 éven belül,
      sem a kérelem benyújtását megelőző 15 éven belül nem rendelkezett az adott időszakhoz a jogszabály által előírt biztosítotti
      idővel a felperes. A bíróság a felperes azon állítását, miszerint, ha a 10 évet veszik figyelembe, akkor megjárna az
      ellátás, nem tartotta tényekkel, bizonyítékokkal alátámasztottnak.


      [16]               A fentiek alapján a bíróság a keresetet, mint alaptalant elutasította a Kp. 88. § (1) bekezdés a)
      pontja alapján.


      ## Zárórész


      [17]               A felperes pervesztes lett, az alperes perköltség iránti igényt nem érvényesített, így erről a bíróságnak
      határoznia nem kellett.


      [18] A per tárgyi költségmentes mivoltára tekintettel a perben feljegyzett I. fokú eljárási illetéket az állam viseli
      [Mmtv. 14. § (2) bekezdése, Kp. 35. § (1) bekezdése folytán alkalmazandó Pp. 102. § (6) bekezdése].


      [19]               Az ítélet ellen nincs helye fellebbezésnek, mivel azt törvény nem teszi lehetővé (Kp. 99. § (1) bekezdés).


      - [20]               A bíróság ítéletét a Kp. 77. §-a alapján tárgyaláson kívül hozta meg.


