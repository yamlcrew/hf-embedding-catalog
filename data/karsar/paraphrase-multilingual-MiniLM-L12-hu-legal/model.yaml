      ## Rendelkező rész


      A Kúria Önkormányzati Tanácsa


      - Kaposvár Megyei Jogú Város Önkormányzatának a telekadóról szóló 78/2008. (XII.15.) számú önkormányzati rendelete 3.
      §-a jogszabály-ellenességének megállapítására és megsemmisítésére irányuló bírói indítványt elutasítja;

      - elrendeli, hogy határozatának közzétételére - a kézbesítést követő nyolc napon belül - az önkormányzati rendelet kihirdetésével
      azonos módon kerüljön sor.


      A határozat ellen jogorvoslatnak nincs helye.


      ## Indokolás


      ## Az indítvány alapjául szolgáló tényállás


      [1]          Kaposvár Megyei Jogú Város Jegyzője mint az elsőfokú hatóság 2017. január 9. napján kelt A/8.806-6/2016.
      számú határozatával felperest 2012. évre 204 750 Ft telekadó, míg 2013-2016. évre 244 125 Ft/év telekadó megfizetésére
      kötelezte 2017. február 28. napjától a felperes kizárólagos tulajdonában lévő, Kaposvár külterület 0502/28 hrsz.-ú ''kivett
      szemétlerakó telep" nyilvántartású 1575 m 2 területű ingatlan után.


      [2]          A fellebbezés folytán eljárt alperes a SOB/2/359-2/2017. számú, 2017. február 27. napján kelt határozatával
      az elsőfokú határozatot helybenhagyta.


      [3]          A felperes kérte az alperesi határozat bírósági felülvizsgálatát. Elsődlegesen kérte az alperes határozatának
      megváltoztatását és a telekadó törlését, az eljárás megszüntetését, míg másodlagosan az alperes határozatának hatályon
      kívül helyezését kérte elsőfokú határozatra kiterjedően új eljárásra kötelezés mellett. Előadta, hogy a perbeli ingatlannak
      2008. szeptember 23. napjától tulajdonosa, amit ''rét" művelési ágban használ, szemétlerakó funkciót nem tölt be. Állította,
      hogy az ingatlan területének 95%-a Ev/2 véderdő övezet oltalma alatt áll; ezen övezetben épület nem helyezhető el, a
      terület nem osztható meg, semmilyen beépítés nem lehetséges. Az ingatlanon csak mezőgazdasági szántó, parlag, gyepművelés
      lehetséges, az ingatlan mezőgazdasági művelése nem telekadó köteles, a telekadó bevallás nyomtatványon is "egyéb mezőgazdasági
      területként" jelölte meg a felperes az ingatlant. A közigazgatási terület külterületi, beépítésre nem szánt részen helyezkedik
      el. A felperes szerint az alperes a bevallásban foglaltakat figyelmen kívül hagyta és teherbíró képességét meghaladóan
      kötelezte a telekadó megfizetésére, amely az ingatlan értékéhez képest súlyosan aránytalan, az egy évre kiszabott adó
      több mint az ingatlan piaci forgalmi értéke.


      [4]          Az alperes a kereset elutasítását kérte és a határozatban írt indokaival egyezően adta elő ellenkérelmének
      az indokait. Kiemelte, hogy a helyi adókról szóló 1990. évi C. törvényben (a továbbiakban: Htv.) szabályozott mentességi
      tilalom nem alkalmazható, az, hogy a helyi építési szabályzatban a jelen övezetre vonatkozó rendelkezések folytán nem
      lehet épületet elhelyezni, nem minősül építési tilalomnak az épített környezet alakításáról és védelméről szóló 1997.
      évi LXXVIII. törvény (a továbbiakban: Étv.) 13. § (1) bekezdésében meghatározott helyi építési előírás szerint. Utalt
      arra, hogy az alkalmazott önkormányzati rendeletet már felülvizsgálta a Kúria Önkormányzati Tanácsa és az adómértékek
      tekintetében törvényellenességet nem állapított meg, ezért a szakértő igénybevétele nem indokolt.


      [5] Az ingatlan forgalmi értékének megállapítására a bíróság igazságügyi szakértőt rendelt ki. A szakértő megállapította,
      hogy Kaposvár-Kaposfüred külterületi 0502/28 hrsz.-ú ingatlan forgalmi értéke - a másodfokú határozat időpontjában -
      1575 m 2 x 225 Ft/m 2 árral számolva 354 375 Ft.


      - [6] A felperes a szakértői véleményt - azzal az eltéréssel, hogy a kerítés értéke a forgalmi értékből levonandó a
      felperes szerint - elfogadta, kiemelve, hogy annak alapján az önkormányzat felé fizetendő helyi adó másfél év alatt
      kiteszi a forgalmi értéket.


      [7] Az alperes vitatta a szakvélemény megfelelőségét. Hivatkozott a szakértő által a NAV-tól bekért, nem megfelelő adatokra,
      kiemelve ugyanakkor, hogy a perbeli ingatlan - a szakértői vélemény szerint is - aranykorona értékkel nem rendelkező
      szemétlerakó.


      ## Az indítvány és az érintett önkormányzat állásfoglalása


      - [8]          A bíróság a 2018. január 17. napján kelt, 4.K.27.149/20171/14. számú végzésével Kaposvár Megyei Jogú
      Város Önkormányzata 78/2008. (XII.15.) rendelete (a továbbiakban: Ör.) 3. §-ának felülvizsgálatát a Kúria Önkormányzati
      Tanácsa előtt. Egyidejűleg a per tárgyalását az Önkormányzati Tanács előtti eljárás jogerős befejezéséig felfüggesztette.

      - [9] A bíróság szerint, bár a Kúria Önkormányzati Tanácsa Köf.5009/2015/8. számú határozatával az Ör. 3. §-a törvényellenességének
      megállapítása iránti indítványt elutasította, az Ör. az absztrakció szintjén ugyan megfelel a Htv. kritériumainak, de
      egyedi esetben a Htv. 6. § c) pontja szerinti teherviselési képesség szempontja nem érvényesül.


      [10] A bíróság álláspontja szerint a helyi sajátosságokhoz, a felperes teherviselési képességhez való igazodás és az
      önkormányzati rendelet alkalmazása során az alperes az ingatlan forgalmi értékét nem vette figyelembe, nem értékelte
      az ingatlan fajlagos értékét és az adómértékének egymáshoz viszonyulását, vagyis a Htv. 6. § c) pontjában írt azon követelmény
      nem érvényesült, hogy az adóalanyok teherviselő képességéhez igazodóan kell meghatározni az adó mértékét. E mérlegelési
      szempont a perbeli eljárás során nem érvényesült, annak ellenére, hogy az Alaptörvény XXX. cikke arányos közteherviselést
      ír elő. A Htv. 6. § c) pontja szerinti arányosság követelményével összefüggésben hivatkozott a Kúria BH.2003.165. és
      Köf.5038/2015/4. számú határozataira is, valamint a Köf.5018/2016/4. számú döntésére is, amely szerint a jogkövetkezményt
      a jogi absztrakció szintjén megalkotott norma egyedi esetben megállapított törvénysértéséhez kell igazítani.


      [11]      Mindezek alapján a bíróság álláspontja szerint a jelen ügyet érintően az Ör. 3. §-a nem felel meg a Htv. 6.
      § c) pontjában írtaknak, mivel a telekadó mértéke körülbelül másfél év alatt felemészti az ingatlan forgalmi értékét.


      ## [12]      Az érintett önkormányzat védiratot nem terjesztett elő.


      ## A Kúria Önkormányzati Tanácsa döntésének indokolása


      ## [13]      Az indítvány nem megalapozott.


      [14] A Kúria Önkormányzati Tanácsa az indítványt tartalma szerint elbírálva a közigazgatási perrendtartásról szóló 2017.
      évi I. törvény (a továbbiakban: Kp.) 144. §-a szerint érdemben vizsgálta. [A Kp. 140. § (1) bekezdése szerint az e fejezetben
      szabályozott eljárást indítvánnyal kell megindítani, amelyre a keresetlevél szabályait kell alkalmazni. A Kp. 157. §
      (1) bekezdése értelmében ezt a törvényt a 2018. január 1. napján vagy azt követően előterjesztett keresetlevél alapján
      indult eljárásokban kell alkalmazni.]


      I.


      [15] A Kp. 146. § (5) bekezdése értelmében az önkormányzati tanács határozata mindenkire nézve kötelező. A Kúria korábbi,
      Köf.5047/2015/3. számú döntése szerint a Bszi. 2017. december 1-ig hatályos 55. § (4) bekezdéséből, amely a Kp. 146.
      § (5) bekezdésével tartalmilag azonos rendelkezést rögzít, az következik, hogy nincs helye az önkormányzati rendelet
      újabb vizsgálatának, ha az indítvány a Kúria által érdemben már elbírált önkormányzati rendelet vagy önkormányzati rendelkezés
      vizsgálatára irányul, és az indítványozó ugyanarra a más jogszabályba ütközésre hivatkozva kéri a törvényellenesség
      megállapítását.


      [16]      A Kúria megállapítja, hogy a Kúria Önkormányzati Tanácsa Köf.5009/2015/8. számú határozatával az Ör. 2013.
      január 1-jével hatályos 3. és 4. §-ának törvényességét már vizsgálta. A 3. § törvényellenességének megállapítására irányuló
      indítványt elutasította, míg a 4. § törvényellenességének megállapítására irányuló indítvány tekintetében az eljárást
      megszüntette. A döntés szerint a telekadó kötelezettséget megállapító Ör. nem ütközik a helyi adókról szóló 1990. évi
      C. törvény (a továbbiakban: Htv.) 6. § c) pontjába, az Önkormányzat megalkotásakor mérlegelte az abban foglalt valamennyi
      szempontot. A konkrét ügyben vizsgált szempontokat rögzítve akkor megállapította, hogy az önkormányzat illetékességi
      területén 1991-től folyamatosan kivetett telekadó kötelezettség ismeretében, abban az egyedi ügyben az adózói hivatkozás
      nem eredményezte az önkormányzati rendeletben mint jogszabályban megállapított adómérték törvényellenességét.


      II.


      [17]      A jelen ügy tárgyát képező konkrét jogvitára vonatkozóan az indítványt előterjesztő bíróság hivatkozik az
      ingatlan szakértői vélemény által megállapított forgalmi értékére, tovább a felperes álláspontjára, amely szerint a
      telekadó másfél év alatt eléri az ingatlan forgalmi értékét. A bíróság szerint ezen egyedi esetben a Htv. 6. § c) pontja
      által előírt arányos teherviselési képesség szempontja nem érvényesül. Az indítványnak a Htv. 6. § c) pontjának sérelmét
      az egyedi ügyre vonatkoztató hivatkozása kapcsán azonban a Kúriának az alkalmazandó jogot és saját hatáskörét kellett
      mindenekelőtt vizsgálnia.


      [18]      Törvényi rendelkezésként az indítvány a Htv. 6. § c) és ezzel összefüggésben a 22. § a) pontját jelöli meg,
      2017. január 1. napjától való fizetési kötelezettség megállapítása alapján indult ügyből kiindulóan. Megállapítható,
      hogy az indítványozó bíró a Htv. 6. § c) pontja 2016. december 31-ig hatályos szövege szerinti feltételrendszer sérelmét
      állítja, ezek közül is különösen az az adóalanyok teherviselő képességeihez való igazodás hiányát hangsúlyozza.


      [19]      A Htv. 6. § c) pontjának 2017. január 1-től hatályos szövege azonban e feltételt már nem tartalmazza. 2017.
      január 1-től ugyanakkor hatályban van a Htv. ekkortól alkalmazandóan beiktatott 7. § g) pontja is, amelyik az Önkormányzat
      mozgásterét a megállapítás terén már kiegészítőlegesen másképp értelmezi, mint a korábban hatályos Htv. 6. § c) pont.
      Eszerint ''[a]z önkormányzat adómegállapítási jogát korlátozza az, (…) hogy az adóalap fajtáját, az adó mértékét, a
      rendeleti adómentességet és adókedvezményt úgy állapíthatja meg, hogy azok összességükben egyaránt megfeleljenek a helyi
      sajátosságoknak, az önkormányzat gazdálkodási követelményeinek és az adóalanyok széles körét érintően az adóalanyok
      teherviselő képességének''.


      [20]      Az indítványból éppen az adóalanyok széles körét érintően a teherviselő képesség a korábbihoz képest új fordulatának
      értelmezése hiányzik, és e tekintetben az indítvány által hivatkozott korábbi ítélkezési gyakorlat alkalmazhatósága
      is tételes értékelésre szorul.


      [21]      A Kúria úgy ítéli meg, hogy az indítvány alapján a 2017. január 1-től hatályos Htv. 6. § c) pont sérelme nem
      állapítható meg. Ugyanakkor jelen esetben nincs lehetőség a Kp. 143. § (3) bekezdése alapján a Htv. 7. § g) pontja szempontjából
      történő vizsgálatra. (Hasonlóképpen döntött a Kúria korábban a Köf.5013/2017/4. számú és Köf.5005/2018/3. számú határozataiban
      is, 2017. január 1. napjától való fizetési kötelezettség megállapítása alapján indult ügyekben, mindkét esetben a Htv.
      2016. december 31-ig hatályos 6 § c) pontjának sérelmét állító bírói indítvány alapján.) Az indítványozó szerepének
      átvételét ugyanis a Kp. 143. § (3) bekezdése nem teszi lehetővé.


      [22]      Mivel az indítvánnyal érintett Ör. az indítványban hivatkozott törvényi rendelkezés szerint nem ellentétes
      a Htv.-vel, ezért a Kúria Önkormányzati Tanácsa az indítványt a Kp. 142. § (2) bekezdése alapján elutasította.


      ## Záró rész


      - [23]      A Kúria az indítványt a Kp. 141. § (2) bekezdése szerint tárgyaláson kívül bírálta el.

      - [24] Jelen eljárásban a Kp. 141. § (4) bekezdése alapján az önkormányzati rendelet törvényességének vizsgálatára irányuló
      eljárásban a feleket teljes költségmentesség illeti meg és saját költségeiket maguk viselik.

      - [25]      A határozat helyben történő közzététele a Kp. 142. § (3) bekezdésén alapul.

      - [26]      A határozat elleni jogorvoslatot a Kp. 116. § d) pontja és a 146. § (5) bekezdése zárja ki.


      Budapest, 2018. május 2.


