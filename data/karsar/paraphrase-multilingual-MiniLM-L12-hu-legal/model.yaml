    [3] A kijelölést kérő Fejér Megyei Katasztrófavédelmi Igazgatóság hatáskörét vizsgálva a Vgtvhr. 24. § (1) bekezdésére
    és arra tekintettel, hogy a tárgyi kút üzemelő, vagy távlati ivóvízbázis előzetesen lehatárolt, illetve hatósági határozatban
    kijelölt hidrogeológiai védőidomát, védőövezet- és védőterület-rendszerét nem érinti maga is arra jutott, hogy nem rendelkezik
