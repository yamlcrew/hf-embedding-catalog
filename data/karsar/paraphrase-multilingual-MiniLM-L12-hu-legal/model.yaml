    I n d o k o l á s


    <!-- image -->


    - [1]     A bíróság a pert megelőző eljárás iratai, valamint a peres felek nyilatkozatai alapján az alábbi tényállást
    állapította meg.


    [2]     A felperes - az alperes a iktatószámú határozata alapján - 2020. augusztus 1. napjától nők kedvezményes öregségi
    nyugdíjában részesült. Az alperes határozatával megállapította, hogy a felperes 1973. január 15. napjától 2020. július
    31. napjáig terjedő időszakban 41 év 161 nap jogosultság megállapításához figyelembe vehető szolgálati időt, 40 év 0 nap
    nők kedvezményes öregségi teljes nyugdíjához figyelembe vehető jogosultsági időt szerzett, melyből 34 év 36 nap keresőtevékenységgel
    járó vagy azzal egy tekintet alá eső jogviszonyban szerzett jogosultsági idő. A nyugdíj összege a - szolgálati időtől
    függően - a felperes havi keresetének 80%-a.


    - [3]     Ezen határozattal szemben a felperes közigazgatási pert nem kezdeményezett.

    - [4]     A felperes 2023- július 3-án öregségi nyugdíj megállapítására irányuló kérelmet terjesztett elő az alperesnél.
    Kérelmében a felperes a nyomtatvány III. pontjában, a ''Nyugdíjbiztosítási igazgatási szerv által korábban határozattal
    vagy egyéb igazolással el nem ismert szolgálati időre vonatkozó adatok'' résznél a 2020. augusztus 1. - 2020- október
    31. között, a gazdasági társaság foglalkoztatónál teljesített tevékenységi időszakot jelölte meg. A kérelem tárgyában
    eljárva az alperes a 2022. július 5. napján kelt, ügyiratszám alatti végzésével a felperesi kérelmet az általános közigazgatási
    rendtartásról szóló 2016. évi CL. törvény (a továbbiakban: Ákr.) 46. § (1) bekezdés a) pontja alapján, mert álláspontja
    szerint az eljárás megindításának jogszabályban meghatározott feltétele hiányzik, és e törvény ahhoz más jogkövetkezményt
    nem fűz, visszautasította.


    [5]     Az alperesi döntés arra hivatkozott, a felperes öregségi nyugdíj megállapítását kérte, azonban jelenleg is öregségi
    nyugdíjban részesül, ezért az öregségi nyugdíj összegének ismételt megállapítására nincs lehetőség.


    - [6]     A felperes az alperes ezen visszautasító végzésével szemben terjesztette elő kereseti kérelmét, tartalmilag
    a végzés megsemmisítését kérve.


    [7]     Előadta, hogy 2020. augusztus 1. napjától nők kedvezményes nyugdíjat vesz igénybe. Munkaviszonya 2020. október
    31. napján megszűnt. Nincs elszámolva 1 év 161 nap, annak idején ezen időszak után is fizetett járulékot, mivel álláskereső
    és munkanélküli volt. Az elszámolatlan időszakok 1991. november 20. napjától 1992. május 25. napjáig, 2000. június 19.
    napjától 2000. augusztus 22. napjáig, 2004. december 2. napjától 2004. december 31. napjáig, 2005. január 1. napjától
    2005. augusztus 31. napjáig terjednek.


    [8]     Az alperes a kereseti kérelem tárgyában előterjesztett érdemi védekezésében (védirat) elsődlegesen a keresetlevél
    visszautasítását, másodlagosan pedig a kereset elutasítását.


    [9]     Védiratában az alperes rámutatott arra, hogy öregségi nyugdíj a nők számára akkor is megállapítható, ha a rendelkeznek
    40 évnyi jogosultsági idővel, ugyanis nem feltétel a nyugdíjkorhatár betöltése. Tehát öregségi nyugdíjas lesz abban az
    esetben is, ha 40 év jogosultsági idővel veszi igénybe az ellátást. Arra is hivatkozott, hogy a felperes 2020. augusztus
    1. napjától ellátásra jogosult, mely ellátást jelenleg is folyósítanak.


    [10]     Az alperes szerint a felperes öregségi nyugdíjban részesül, nincs lehetőség annak ismételt megállapítására és
    a felperes által vitatott időszakok a korábbi döntés vonatkozásában szolgálhatnak esetleges jogsérelemként. Kifejtette,
    hogy a 2020-ban született döntés nem jelen per tárgya.


    [11]     Előadta, hogy a jogosultsági időre szigorúbb szabályozás vonatkozik, nem minden szolgálati idő számítható be
    a jogosultsági idő tartamába. A szabályozás a társadalombiztosítási nyugellátásról szóló 1997. évi LXXXI. törvény (a továbbiakban:
    Tny.) 18. § (2b) bekezdésében foglaltaktól eltérő, más szolgálati időt - így például a tanulmányi időt, a munkanélküli/álláskeresési
    ellátás vagy a rehabilitációs ellátás folyósításának az időtartamát, a 18 év feletti tartósan beteg hozzátartozó ápolása
    miatt folyósított ápolási díj folyósításának az időtartamát vagy a megállapodás alapján fizetett nyugdíjjárulékkal szerzett
    időt (amelyek egyébként az általános szabályok szerint szolgálati időnek minősülhetnek) - a kedvezményre való jogosultság
    szempontjából nem vesz figyelembe.


    [12]     Rögzítette, hogy a keresetlevélben vitatott szolgálati idő elismerése az előző eljárásban, a nyugellátás megállapításakor
    került sor. A kért időszakok szolgálati időként történő elismerése megtörtént, azonban munkanélküli ellátásban részesült
    felperes, így jogosultsági időként elismerni nem lehetett.


    - [13]     A bíróság a perben a tárgyalás tartását a közigazgatási perrendtartásról szóló 2017. évi I. törvény (továbbiakban:
    Kp.) 77. § (1) bekezdése alapján mellőzte, figyelemmel arra, hogy a peres felek egyike sem kérte annak megtartását, és
    azt a bíróság sem találta indokoltnak és szükségesnek.

    - [14]     A felperes keresete az alábbiak szerint alaptalan.

    - [15]     A Kp. 2. § (4) bekezdése szerint, ha a törvény eltérően nem rendelkezik a bíróság a közigazgatási jogvitát
    a kereseti kérelem, a felek által előterjesztett kérelmek és jognyilatkozatok keretei között bírálja el.

    - [16]     A Kp. 4. § (1) bekezdése szerint a közigazgatási jogvita tárgya a közigazgatási szerv közigazgatási jog által
    szabályozott, az azzal érintett jogalany jogi helyzetének megváltoztatására irányuló vagy azt eredményező cselekményének,
    vagy a cselekmény elmulasztásának jogszerűsége.

    - [17]     A Kp. 85. § (1)-(2) bekezdése szerint a bíróság a közigazgatási tevékenység jogszerűségét a kereseti kérelem
    korlátai között, és - ha törvény eltérően nem rendelkezik - a megvalósításának időpontjában fennálló tények alapján vizsgálja.

    - [18]     A Kp. 88. § (1) bekezdés a) pontja szerint a bíróság a keresetet elutasítja, ha az alaptalan.

    - [19]     A bíróság kereset visszautasítására vonatkozó kérelme kapcsán rámutat, hogy a Kúria Kpkf.II.37.299/2020/3.
    számú határozata alapján a bírói gyakorlat szerint önmagában a pontos jogszabályhely megjelölése nem követelmény, azonban
    a keresetlevélből megállapíthatónak kell lennie, hogy a felperes a kereseti kérelemmel érintett döntést mely okból, milyen
    jogi érvek mentén vitatja. A bíróság álláspontja szerint megállapítható volt, hogy felperes a kereseti kérelemmel érintett
    döntést mely okból vitatja, ezért a bíróság a Kp. 48. § (1) bekezdésének k) pontja alapján a keresetlevél visszautasításáról
    nem rendelkezett. Az, hogy a felperes olyan jogsérelmet adott elő, amely nem eredményezhetett


    pernyertességet, még nem jelenti a jogsérelem megjelölésének hiányát.


    - [20]     A bíróság mindenekelőtt kiemeli, hogy a bíróság feladata jelen közigazgatási per keretei között az alperesi
    végzés jogszerűségének vizsgálata. A jogszabálysértés vizsgálatának kereteit a felperes által a kereseti kérelemben megjelölt
    jogszabálysértés adja.

    - [21]     A bíróság elöljáróban rögzíti, hogy a per tárgya kizárólag az alperesi végzés bírósági felülvizsgálata volt,
    így a jogszerűségi felülvizsgálat csak arra koncentrálódhatott, hogy a keresettel érintett körben jogszerű volt-e a keresettel
    támadott alperesi végzés. A bíróság a kereseti kérelemben foglaltakra rögzíti, hogy a bíróság hatásköre a Kp. 4. § (3)
    bekezdés a) pontja alapján az egyedi döntés jogszerűségi vizsgálatára terjed ki, ezért a felperes által a keresetben állított
    jogsértés vizsgálata - a szolgálati idő számszakilag eltérő megállapítása nem képezhette jelen eljárás tárgyát, az előzményi
    eljárásban hozott döntés felülvizsgálatára a bíróságnak hatásköre nem volt. A bíróság kiemeli, hogy a felperesnek az általa
    a keresetlevelében jelölt időszakok vitatására - perindítási határidőn belül - a korábbi, iktatószámú határozattal szembeni
    perben lett volna lehetősége.

    - [22]     Az Ákr. 46.§ (1) bekezdés a) pontja értelmében a hatóság a kérelmet visszautasítja, ha az eljárás megindításának
    jogszabályban meghatározott feltétele hiányzik, és e törvény ahhoz más jogkövetkezményt nem fűz.

    - [23]     A felperes a perben nem vitatta, hogy 2020. augusztus 1. napjától nők kedvezményes öregségi nyugdíjában részesült.

    - [24]     A Tny. 6. § (1) bekezdés a) pontja a saját jogú nyugellátások közé sorolja az öregségi nyugdíjat.

    - [25]     A Tny. II. fejezete tartalmazza az öregségi nyugdíjjal kapcsolatos szabályokat, melyek között a Tny. 18. §
    (2a) bekezdése rögzíti, hogy öregségi teljes nyugdíjra életkorától függetlenül jogosult az a nő is, aki legalább negyven
    év jogosultsági idővel rendelkezik. A jogalkotó tehát a saját jogú öregségi nyugdíj ellátás körében kedvezményben részesíti
    azokat a nőket, akik a jogszabályban meghatározott nyugdíjkorhatárt még nem érték el, de már rendelkeznek negyven év jogosultsági
    idővel.


    [26]     A Tny. 18. (2b) bekezdése szerint (2a) bekezdés tekintetében jogosultsági időnek minősül a kereső tevékenységgel
    járó biztosítási vagy azzal egy tekintet alá eső jogviszonnyal, valamint a terhességi-gyermekágyi segélyben, csecsemőgondozási
    díjban, örökbefogadói díjban, gyermekgondozási díjban, gyermekgondozást segítő ellátásban, gyermekgondozási segélyben,
    gyermeknevelési támogatásban, gyermekek otthongondozási díjában és a súlyosan fogyatékos vér szerinti vagy örökbe fogadott
    gyermekére tekintettel megállapított ápolási díjban eltöltött idővel, vagy ezekkel egy tekintet alá eső, 1998. január
    1jét megelőzően szerzett szolgálati idő.


    - [27]     A felperes - saját jogú nyugellátásnak minősülő - nők kedvezményes öregségi nyugdíjában részesült a nyugdíjkorhatár
    betöltéséig. A Tny. 42. § (3) bekezdése rögzíti, hogy a saját jogú nyugellátás mellett folytatott keresőtevékenység időtartama
    szolgálati időként nem vehető figyelembe.

    - [28]     A Tny. 80. § (1a) bekezdése szerint a nyugdíjbiztosítási igazgatási szerv a nyugellátást - kérelemre vagy hivatalból
    - a nyugellátás eredeti kezdő időpontjától kezdődően, a nyugellátás eredeti kezdő időpontjában alkalmazandó jogszabályok
    alapján, magasabb összegben, vagy az igénylő számára egyébként kedvezőbb módon újra megállapítja, ha

    - a) a nyugellátást jogszabálysértően állapították meg az igénylőnek járónál alacsonyabb összegben, vagy az igénylő számára
    egyébként kedvezőtlenebb módon, vagy

    - b) a nyugellátás összegét jogszerűen állapították meg, de a magasabb összegben vagy az igénylő számára egyébként kedvezőbb
    módon történő újra megállapítás az azóta tudomására jutott tények, adatok vagy bizonyítékok alapján indokolt.

    - [29]     A bíróság álláspontja szerint a felperes jelen eljárás tárgyát képező kérelmét az alperesnek a Tny. 80. § (1a)
    bekezdése szerinti, újraszámításra irányuló kérelemnek kellett volna tekintenie és akként elbírálnia.

    - [30]     Azonban perdöntő jelentősége annak volt, hogy a saját jogú nyugellátás mellett folytatott keresőtevékenység
    időtartama szolgálati időként nem vehető figyelembe. A saját jogú nyugellátás mellett folytatott keresőtevékenységgel
    szerzett, nyugdíjjárulék-alapot képező kereset, jövedelem összege az öregségi nyugdíj alapját képező havi átlagkereset
    kiszámítása során nem vehető figyelembe.


    [31]     A bíróság megállapította, hogy az alperes döntése érdemben helyes, ezért nem eredményezi a végzés jogszerűtlenségét,
    hogy az alperes nem érdemben bírálta el a felperes kérelmét, hanem azt - érdemi vizsgálat nélkül - visszautasította.


    [32]     A felperes által vitatott szolgálati idő elismerésére a korábbi határozatban sor került. Azon időszak jogosultsági
    időként történő elismerésére, amely időszakban a felperes munkanélküli ellátásban részesült, jogszabályi lehetőség nem
    volt (nem minden szolgálati idő számítható be a jogosultsági idő tartamába). Egyebekben a keresetben felperes által megjelölt
    időszakokat a felperes támadott végzés alapjául szolgáló kérelmében nem is szerepeltette, így azokról értelemszerűen nem
    is dönthetett az alperes.


    [33]     A bíróság arra vonatkozó kereseti kérelem hiányában nem vizsgálta, hogy a döntés formája és rendelkező része
    mennyiben volt megfeleltethető az Ákr. vonatkozó szabályainak. Megjegy-zést érdemel ugyanakkor az, hogy jelen perbeli
    esetben az érdemi eljárás megindítását akadá-lyozó olyan körülmény merült fel, amely jogszabályban kifejezetten meghatározott
    feltétel hiányából adódik. A bíróság a Kp. 4. § (6) bekezdése alapján tehát úgy tekintette, hogy az alperes érdemben elutasította
    a felperes újraszámításra irányuló igényét.


    [34]     A Kp. 85. § (1) bekezdés alapján a bíróság kötve volt a felperes kereseti kérelméhez, ennélfogva az alperesi
    döntést csak az általa megjelölt jogszabálysértés szempontjából vizsgál-hatta. A fentiek alapján nem volt indok az alperesi
    döntés hatályon kívül helyezésére, meg-semmisítésére, vagy megváltoztatására, ezért a bíróság a Kp. 88. § (1) bekezdésének
    a) pontja alapján a felperes keresetét elutasította.


    [35]     A bíróságnak a perköltség tekintetében nem kellett döntést hoznia figyelemmel arra, hogy alperes perköltség igénnyel
    nem élt.


    [36]     Az eljárás a Tny. 81. § (1) bekezdése alapján illeték- és költségmentes, ezért illetékfizetésről a bíróságnak
    nem kellett rendelkeznie.


    - [37]     A bíróság a rendes jogorvoslati jogról a Kp. 99. § (1) bekezdése alapján, törvényben lehetővé tett fellebbezési
    lehetőség hiányára tekintettel adott tájékoztatást.


    Debrecen, 2023. október 30.


    Dr. Boda Zoltán s. k.


