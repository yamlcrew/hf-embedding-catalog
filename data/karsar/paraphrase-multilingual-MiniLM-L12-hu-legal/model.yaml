      ## Í t é l e t


      A Fővárosi Ítélőtábla az elsőfokú bíróság ítéletét és a Közszolgálati Döntőbizottság határozatszám1. Ikt. számú határozatát
      megváltoztatja, az alperes közszolgálati panaszát elutasítja.


      Kötelezi az alperest, hogy 15 napon belül fizessen meg a felperesnek 78.000 (hetvennyolcezer) forint első, valamint
      39.000 (harminckilencezer) forint másodfokú perköltséget.


      A fellebbezési illetéket az állam viseli.


      Az ítélet ellen fellebbezésnek nincs helye.


      ## I n d o k o l á s


      A fellebbezés alapjául szolgáló tényállás


      [1] Az alperes műszaki ellenőr beosztásban, határozatlan idejű kormányzati szolgálati jogviszonyban állt a felperessel,
      napi munkába járását helység1-helység2, helység2helység1 viszonylatban saját tulajdonában álló gépjárművével oldotta
      meg. Alkalmanként ''eseti otthontartással'' osztályvezetője hozzájárulásával vidéki telephelyen történő munkavégzés
      céljából a felperes által biztosított frsz.1 forgalmi rendszámú ''kulcsos'' gépjárművet vette igénybe. Az alperes 2023.
      januártól áprilisig tartó időszakban havonta benyújtotta a sajátkezűleg aláírt, a saját gépjárműve használatára vonatkozó
      költségtérítés iránti igényeit és az elszámoláshoz szükséges útnyilvántartásait, így a 2023. április 28-án sajátkezűleg
      aláírt útnyilvántartásában feltűntette a 2023. április 12 - április 20; illetve 2023. április 24 -április 28 közötti
      napokat is, amikor a felperes tulajdonában álló (kulcsos) gépjárművet használta osztályvezetője engedélyével hazautazásához.
      A felperes 2023. május 4-én - belső levelezőrendszerén keresztül -emailben tájékoztatta az alperest, hogy az utazási
      költségtérítésre benyújtott kérelme nem került jóváhagyásra. A 2023. május 31-én kiadott email szerint a munkáltató
      a költségtérítés iránti kérelmet ismét megvizsgálta, azt az időközben felmerült új tényekkel együtt döntésre előterjesztette
      és engedélyezte.


      [2] A felperesi feladatkört felügyelő helyettes államtitkár 2023. július 3-án kezdeményezte az alperes kormányzati szolgálat
      jogviszonyának megszüntetését a szúrópróbaszerűen megvizsgált, 2023. április 12 -2023. június 13 közötti időszakra vonatkozó
      GPS nyomkövetési kimutatásra hivatkozva, amely 2023. június 13-án készült.


      [3]                A felperes az alperes határozatlan idejű kormányzati szolgálati jogviszonyát a 2023. július 6-án
      kelt szám1 számú munkáltatói intézkedéssel a kormányzati igazgatásról szóló 2018. évi CXXV. törvény (a továbbiakban:
      Kit.) 105. § (1) bekezdés c) pontja, 107. § (2) bekezdés a) pontja és a 109. § (1) bekezdése alapján érdemtelenség jogcímén
      azonnali hatállyal felmentéssel megszüntette. Az intézkedés indokolása szerint az alperes a saját tulajdonában lévő
      gépjárművel történő munkába járáshoz kapcsolódó utazási költségtérítést azon időszakban is kérelmezte , amikor saját
      tulajdonú gépjárműve helyett hivatali munkavégzéséhez -a vidéki telephelyen történő munkavégzés céljából biztosított
      -ún. ''kulcsos'' gépjárművet vette igénybe hazautazás céljából, így ezen időszakban az utazási költségtérítést jogosulatlanul,
      munkáltatóját megtévesztve igényelte, ezért hivatása gyakorlására érdemtelen.


      [4]                A felperes 2023. augusztus 16-án szólította fel az alperest a saját gépjárművel történő napi munkába
      járás költségtérítése kapcsán jogosulatlanul kifizetett 117.936 forint visszafizetésére. Levonásához az alperes hozzájárult
      a még őt megillető járandóságokból.


      [5] A szám1 iktatószámú munkáltatói intézkedéssel szemben előterjesztett közszolgálati panaszában az alperes kifogásolta,
      hogy az érdemtelenség megállapítására vonatkozó döntés meghozatala előtt a Kit. 109. § (4) bekezdése ellenére nem kapott
      lehetőséget arra, hogy megismerhesse a döntés alapjául szolgáló tényeket, valamint előadhassa védekezését. Nem volt
      lehetősége, hogy a saját gépjármű használatára vonatkozó utólagos munkáltatói engedélyezés birtokában áttekinthesse
      a kimutatásait. Vitatta az azonnali hatályú felmentés jogszerűségét, azt, hogy munkáltatója megtévesztésével, szándékosan
      igényelt volna elszámolást, mert a munkáltató részéről előbb került sor a saját gépjárművel történő napi munkába járáshoz
      beadott elszámolások kifizetésére (247.104 forint), mint ahogy


      a saját gépjármű használatára vonatkozó munkáltatói engedélyezés megtörtént, és az erről szóló értesítést megkapta.
      A kulcsos autót munkahelyi vezetője engedélyével hazajárás céljából is igénybe vehette. Kérte a felperes kötelezését,
      hogy jogviszonya megszüntetését közös megegyezésre módosítsa, mellőzze a Kit. 117.§ (6) bekezdésének alkalmazását és
      jogviszonya jogellenes megszűntetésének következményeként a Döntőbizottság a Kit.116.§ (5) bekezdése alapján járjon
      el.


      [6] A Közszolgálati Döntőbizottság a 2023. december 1-jén meghozott határozatszám1 számú határozatával a közszolgálati
      panasznak részben helyt adott, és a jogviszony jogellenes megszüntetése jogkövetkezményeként kötelezte a felperest,
      hogy 15 napon belül fizessen meg az alperesnek átalánykártérítés címén 2 havi illetményének megfelelő 1.560.000 forintot.
      Ezt meghaladóan a panaszt elutasította. Indokolásában megállapította, hogy a felperes megsértette a Kit. 109. § (4)
      bekezdésében foglaltakat, amire tekintettel az alperes kormányzati szolgálati jogviszonyát jogellenesen szüntette meg.
      A Kit. 109. § (4) bekezdésében foglaltak szerinti védekezési lehetőség biztosításától eltekinteni kizárólag kivételes
      körülmények fennállta esetén lehet. A kizárólag arra való hivatkozás, hogy a kormánytisztviselő tájékoztatása és számára
      a védekezési lehetőség biztosítása azért nem volt elvárható, mert a kormányzati igazgatási szerv rendelkezésére álló
      okirati bizonyítékok a kormánytisztviselőnek tulajdonított magatartást igazolják - többlettényállási elem nélkül - nem
      merítik ki a Kit. 109. § (4) bekezdésében foglalt kivételes esetkört. Ilyen esetben a kormányzati igazgatási szervnek
      a főszabály szerint kell eljárnia, azaz lehetőséget kell adnia arra, hogy a kormánytisztviselő a döntés alapjául szolgáló
      körülményeket megismerhesse, és az arról való tájékoztatásról számított 15 napon belül védekezését előadhassa, bizonyítékait
      előterjeszthesse, különösen, hogy több körülmény is tisztázást érdemelt volna. E körben utalt a jogviszony megszüntetését
      kezdeményező helyettes államtitkári levél azon tartalmára, miszerint a panaszos ''bármilyen előzetes engedély nélkül''
      tartotta rendszeresen tartózkodási helyén a szolgálati gépjárművet. Ennek ellentmond a panaszos által csatolt elektronikus
      levél, amely szerint az osztályvezetője engedélyezte a szolgálati gépjármű ''otthon tartását''. Másrészt 2023. május
      31-én küldték meg a panaszosnak az arra vonatkozó tájékoztatást, hogy a gépjárművel történő napi munkába járás költségtérítése
      iránti kérelmét ismét megvizsgálták, melynek eredményeként azt engedélyezték. A Döntőbizottság álláspontja szerint a
      védekezési lehetőség biztosítása, az esetlegesen előterjesztett bizonyítékok megismerése esetén lehetett volna kétséget
      kizáróan tisztázni a panaszos terhére rótt cselekménnyel összefüggő körülményeket. Megjegyezte, hogy a munkáltatói intézkedés
      nem tartalmazta a Kit. 109. § (4) bekezdésében foglalt védekezési lehetőség biztosítása mellőzésének indokait, a Kit.
      107. § (3) bekezdésében foglalt indokolási kötelezettség ellenére. Az eljárási szabályok megsértésének megállapítására
      tekintettel a Döntőbizottság a felmentés érdemét nem vizsgálta, és mérlegeléssel a felperest az alperes 2 havi illetményének
      megfelelő átalánykártérítés megfizetésére kötelezte. Az átalánykártérítés mértékének meghatározásánál a jogsértés súlyát
      vette figyelembe, és azt, hogy e körben a panaszos többlettényállási elemet nem bizonyított. Rögzítette, hogy a megszüntetés
      jogcíme közös megegyezésre módosításának a Kit. 116.§-a alapján nincs helye.


      ## A kereset és a védirat


      [7]                A felperes az előterjesztett marasztalási keresetében elsődlegesen a közigazgatási perrendtartásról
      szóló 2017. évi I. törvény (a továbbiakban: Kp.) 95. § (1) bekezdése alapján annak ''megállapítását'' kérte, hogy a
      munkáltatói intézkedés meghozatala során nem sértette meg a Kit. 109 § (4) bekezdésében foglaltakat, így az alperes
      kormányzati szolgálati jogviszonyát a szám1 számú munkáltatói intézkedéssel jogszerűen szüntette meg. Másodlagosan a
      Döntőbizottság határozatában megállapított átalánykártérítés (2 havi illetmény) összegének csökkentését kérte a törvényi
      kárenyhítési kötelezettség összegével.


      [8] Elsődleges kereseti kérelme indokolásaként előadta, hogy a kormányzati szolgálati jogviszony betöltésével, vagyis
      a közhivatal viseléséhez való jog gyakorlásával a kormánytisztviselő önkorlátozásnak is aláveti magát. Amennyiben a
      kormánytisztviselő olyan súlyos hivatali kötelezettségszegést követ el, amely a közigazgatás rendeltetésszerű működéséhez
      nélkülözhetetlen, az annak alapjait jelentő alapelveket súlyosan megsérti, a munkáltatótól nem várható el a Kit. 109.
      § (4) bekezdése szerinti eljárás lefolytatása. Tényállásszerű és GPS nyomkövető informatikai adatokkal bizonyította,
      hogy az alperes 2023. április hónapban 12 napra vonatkozóan (a megjelölt napokon) a kormányzati igazgatási szerv tudomásával
      és engedélyével, a kormányzati igazgatási szerv tulajdonában álló szolgálati gépjárművel a lakóhelyére utazott, és ugyanezen
      napokra napi munkába járás/hazautazás jogcímen helység1-helység2, helység2-helység1 viszonylatban oda-vissza napi 127,2
      km távolságra gépjármű költségtérítést igényelt. A kormánytisztviselő esetében önmagában a jogellenes haszonszerzés
      kísérlete is olyan kötelezettségszegés, amely érdemtelenné teszi közhivatal viselésére. Súlytalan, hogy a munkáltatói
      jogkör gyakorlója mikor fogadta el az alperes által tudottan jogellenes igény teljesítését, miként az is, hogy ezen
      igény később korrekcióra kerülhetett-e. Nem értelmezhető, hogy milyen további alperesi magyarázatra lett volna még szükség
      a helyes tényállás megállapításához és a jogkövetkezmény alkalmazásához.


      [9]                Másodlagos kereseti kérelme kapcsán előadta, hogy a Döntőbizottság bár nem vizsgálta, de jogszabályi
      kötelezettsége lett volna figyelembe venni az átalánykártérítés mértékének megítélésekor, hogy az alperes mennyiben
      tett eleget kárenyhítési kötelezettségének.


      ## [10]             Az alperes a védiratában a kereset elutasítását kérte.


      ## Az elsőfokú bíróság ítélete


      [11]             Az elsőfokú bíróság a keresetet elutasította. Indokolása szerint a Döntőbizottság megállapítása helytálló
      volt, a Kit. 109. § (4) bekezdésében foglalt kivételi esetkör nem valósult meg. Többlettényállási elem lett volna szükséges
      ahhoz, hogy a felperes jogszerűen alkalmazza a kivételi rendelkezést. A többlettényállási elem objektív tényállási elemet
      jelent, azaz tényszerűen megvalósuló körülményt, valóságban létező tényt. A felperes azonban nem tényre, hanem szubjektív
      meggyőződésére alapította az alperes védekezési lehetőségének biztosítása alóli mentesülés lehetőségét. Szubjektív feltételezésére
      alapítottan a Kit 109. § (4) bekezdésében rögzített kivételi esetkör alkalmazására nem volt jogszerű lehetőség. Mivel
      a Kit. 109. § (4) bekezdésében foglalt kivételes esetkör nem valósult meg, eljárásjogi szempontból jogellenes az alperes
      jogviszonyának megszüntetése. A Döntőbizottság ezzel


      kapcsolatos megállapítása helytálló, így a jogviszony megszüntetés érdemi szempontból való vizsgálatát helytállóan mellőzte.


      [12]             A másodlagos kereseti kérelem kapcsán kiemelte, hogy az átalánykártérítés és a kártérítés egymástól
      eltérő jogintézmények. Az átalánykártérítés jogintézménye nem a ténylegesen bekövetkezett kár kompenzálására szolgál.
      A ténylegesen bekövetkezett kár meghatározása esetén releváns azon kötelezettség, hogy levonásba kell helyezni azt az
      összeget, ami máshonnan megtérült, vagy kellő gondosság mellett megtérülhetett volna, mert csak ezen levonást eszközölve
      határozható meg a ténylegesen felmerült kár pontos összege. Az átalánykártérítés -miként neve is mutatja -nem a ténylegesen
      bekövetkezett kár kompenzálását célozza, hanem attól független, melynek mértékét jogszabály határozza meg. A bírói gyakorlat
      egységes abban, hogy átalánykártérítésnél nem vizsgálja a megtérült jövedelem összegét, mert a kártérítés összege ex
      lege meghatározott.


      ## A fellebbezés és a fellebbezési ellenkérelem


      [13] A felperes a fellebbezésében elsődlegesen az elsőfokú ítélet megváltoztatását, keresetének megfelelő döntést, másodlagosan
      az elsőfokú ítélet hatályon kívül helyezését és az elsőfokú bíróság eljárás lefolytatására és új határozat meghozatalára
      utasítását kérte. Megsértett jogszabályként a Kit. 109. § (4) bekezdését és 116. § (6) bekezdését jelölte meg.


      [14]             Álláspontja szerint a Kit. 109. § (2) bekezdés b) pontjában foglalt érdemtelenségi okra jogszerűen
      alapította az alperes jogviszonyának megszüntetését, mert az alappal elvárható szakmai elhivatottságot nem tanúsította,
      és emiatt nem volt várható, hogy jogviszonyát  fenntartsa. Az alappal elvárható szakmai elhivatottsággal történő munkavégzés
      kapcsán jogszerű elvárás, hogy a kormánytisztviselő egyes költségei megtérítését jóhiszeműen vegye igénybe, a költségtérítésre
      vonatkozó szabályokat betartsa, tiszteletben tartva ezzel valamennyi munkatársát és a munkáltatót. Márpedig 2023. április
      hónapban 12 napra vonatkozóan az alperes az általa írt és sajátkezűen 2023. április 28-án aláírt útnyilvántartásában
      feltüntette a saját gépjárműhasználatára vonatkozó költségigényét a megjelölt napokon, annak ellenére, hogy tényszerűen
      informatikai GPS nyomkövető adatokkal igazolhatóan ezeken a napokon a munkáltató tulajdonában álló szolgálati (kulcsos)
      gépjárművel közlekedett munkahelye és tartózkodási helye között, tehát tudottan és szándékosan járt el a költségtérítés
      jogosulatlan megszerzése érdekében. A munkáltató a szolgálati gépjármű használatát és az alperesi költségigényt is okirattal,
      meg nem dönthető módon igazolta, a szolgálati gépjármű használatára vonatkozó GPS adatok és az alperes sajátkezűleg
      aláírt költségigénye teljesen objektív tényállási elemek. Az alperes által tanúsított kirívóan jogellenes magatartás,
      a nem jogszerű anyagi előny (költségtérítés) megszerzésére irányuló szándék önmagában olyan kötelezettségszegés, amely
      érdemtelenné teszi közhivatal viselésére. Az egyenként és összességében értékelt okirati bizonyítékokból egyértelműen
      megállapítható volt a tényállás és a magatartás súlyossága, valamint a közigazgatás alapvető értékeinek, ebből következően
      a felperes érdekeinek veszélyeztetése, így nem volt elvárható a felperestől a Kit. 109. § (4) bekezdése szerinti eljárás
      lefolytatása.


      [15] Az elsőfokú bíróság a Kit. 109. § (4) bekezdésének ''ha az eset összes körülményeiből következően az a kormányzati
      igazgatási szervtől nem várható el'' fordulatát tévesen, a jogalkotó szándékával ellentétesen értelmezte és alkalmazta.
      Az eset összes körülménye pontosan azt jelenti, hogy a munkáltató közigazgatási szervnek a döntés meghozatala előtt
      értékelnie kell valamennyi rendelkezésére álló bizonyítékot, azok súlya


      szerint egyenként és összességében, valamint figyelembe kell venni a kormánytisztviselő magatartására vonatkozó valamennyi
      tényt és körülményt. Ennek megfelelően értékelte az okiratokat, megállapította azok eredeti és ellentmondásmentes voltát,
      figyelembe vette az alperes munkakörét, amely különösen megkívánja tőle a jogszerű és tisztességes eljárást. A Kit.
      109. § (4) bekezdése szerinti kivétel azon jogalkotói célt szolgálja, hogy az eset valamennyi szubjektív és relatív
      körülményét vizsgálja meg a munkáltató, és azok megfelelő értékelése alapján hozza meg döntését. Analógiaként hivatkozott
      a munka törvénykönyvéről szóló 1992. évi XXII. törvény (a továbbiakban: régi Mt.) 96. § (2) bekezdésének második mondatára,
      amelynek értelmében ''a munkáltatói rendkívüli felmondás közlése előtt lehetőséget kell adni a munkáltatónak a tervezett
      intézkedés indokainak megismerésére, és a vele szemben felhozott kifogások elleni védekezésre, kivéve ha az eset összes
      körülményeiből következően ez a munkáltatótól nem várható el'', valamint e rendelkezés értelmezése körében az Alkotmánybíróság
      219/B/2002. számú határozatára, és arra, hogy a Kit. 109. § (4) bekezdésének érvényesülését a jogalkotó szintén az eset
      összes körülményei figyelembevétel megállapított elvárhatóságtól teszi függővé. Ennek kereteit a Kit. kormánytisztviselő
      kötelezettségeit rögzítő 92-93. §-aiban, különösen pedig az érdemtelenség feltételeit szabályozó 109. §-ában található
      rendelkezések szabják meg.


      [16] Az átalánykártérítés kapcsán kifejtette, hogy az nem mentesíti az alperest a kárenyhítési kötelezettség alól, hiszen
      nem abszolút értékű kompenzáció, hanem a tényleges kár mérséklését figyelembe vevő egyszerűsített mechanizmus.


      [17] Az alperes a fellebbezési ellenkérelmében az elsőfokú ítélet helybenhagyását kérte. Állította, hogy az előfokú
      bíróság az anyagi és eljárási jogszabályok helyes alkalmazásával, a bizonyítékok okszerű mérlegelésével megalapozott
      és jogszerű ítéletet hozott, különösen, hogy a felperes által hivatkozott okiratokhoz (GPS nyilvántartások) nem volt
      hozzáférése, emiatt is ismertetni kellett volna a bizonyítékokat. A GPS nyilvántartások lekérdezésének dátuma kapcsán
      felvetette, hogy amennyiben a jogviszonya megszüntetését követően kerültek beszerzésre, aligha lehet arról beszélni,
      hogy az okiratokat a megalapozott döntés meghozatala céljából a felperes felhasználta volna.


      ## A másodfokú bíróság döntése és annak jogi indokai


      ## [18]             A fellebbezés alapos.


      [19]             A Fővárosi Ítélőtábla az elsőfokú ítéletet a Kp. 108. § (1) bekezdésében foglaltak alapján a fellebbezési
      kérelem és az ellenkérelem keretei között - a fellebbezésben felhozott indokokat alapul véve -bírálta felül. A másodfokú
      eljárás terjedelme vizsgálatakor az ítélőtábla figyelembe vette a fellebbezési eljárásban is érvényesülő kereseti kérelemhez
      kötöttség elvét, és a fellebbezéshez kötöttség elvét (Pp. 215. §-a, 253. § (3) bekezdése), azt, hogy az alperes viszontkeresetet
      az elsőfokú eljárásban nem terjesztett elő, csatlakozó fellebbezéssel nem élt. Az ítélőtábla ezért a felülbírálatot
      kizárólag a felperes fellebbezésében kifogásolt keretek között, arra figyelemmel végezhette el, hogy a felperes a jogvita
      elbírálásának alapjául szolgáló tényállást nem vitatta, eljárásjogi jogszabálysértést nem jelölt, kizárólag az ítélet
      anyagi jogi álláspontjának felülvizsgálatát kérte a másodfokú bíróságtól. E


      tekintetben a fellebbezési eljárás tartalmi, valamint perjogi kereteit a Kit. 109. § (4) bekezdésének és 116. § (6)
      bekezdésének megsértésében - vagylagosan - jelölte ki, ami azt jelenti, hogy a másodfokú bíróság egyéb körben nem vizsgálódhatott,
      így a felmentés indokának jogszerűségét sem vizsgálhatta. A fellebbezéssel érintett körben - a Kit. 109. (4) bekezdésének,
      valamint 116. § (6) bekezdésének sérelme - megállapította, hogy az elsőfokú bíróság hivatalból észlelendő eljárásjogi
      hibát nem vétett; a jogértelmezésen alapuló anyagi jogi kérdésben elfoglalt álláspontja azonban téves volt, az alábbiak
      szerint:


      [20]             A másodfokú bíróság a felülbírálat elvégzéséhez mindenekelőtt a közszolgálati jogviszony sajátosságaira
      utal. A Kit. 79. §-a szerint a kormányzati szolgálati jogviszony a köz szolgálata és munkavégzés céljából létesített
      különleges jogviszony. Az Alkotmánybíróság a 3070/2017. (IV. 19.) AB határozatában megerősített álláspontja szerint
      a zárt közszolgálati rendszer alapvető jellemzője, hogy a közszolgálati jogviszony tartalmát, a jogviszony alanyainak,
      jogait és kötelezettségeit nem a felek megállapodása, hanem jogszabály, törvény határozza meg. A jogviszonyt nem mellérendelt
      felek szerződése, hanem az állam egyoldalú aktusa hozza létre, amelyben kinevezi a köztisztviselőt, megbízva meghatározott
      feladatkör, munkakör vagy tisztség ellátásával. A köztisztviselőnek nincs aktív szerepe a jogviszony tartalmának alakításában,
      csak arról dönthet, hogy elfogadja-e a törvényben meghatározott feltételek mellett a kinevezést vagy sem. A köztisztviselői
      jogviszony tartalmát a jog arra figyelemmel szabályozza, hogy a köztisztviselők az állam feladatait látják el, feladataik
      ellátása során közhatalmi jogosítványokat gyakorolnak, s ez megköveteli, hogy a törvény más munkavállalókhoz képest
      többlet-követelményeket támasszon a köztisztviselőkkel szemben {3070/2017. (IV. 19.) AB határozat, Indokolás [25]}.


      [21] A törvényi szabályozás (Kit. 109. § (2) bekezdés a) és b) pontja) alapján az érdemtelenség mindkét esete (a foglalkoztató
      jó hírneve vagy a jó közigazgatásba vetett bizalom súlyos rombolása; illetve az alappal elvárható szakmai elhivatottság
      sérelme) magában foglalja a foglalkoztatott munkahelyi és munkahelyen kívüli magatartásai tanúsítását egyaránt. A szakmai
      elhivatottság nem kizárólag a szakmai tapasztalat, illetve készségek meglétét és gyarapítását jelenti, hanem azt is,
      hogy a kormánytisztviselő tapasztalatát és készségeit a kormányzati igazgatási szerv feladataival, céljaival összhangban
      hasznosítsa, tekintélyét ne kérdőjelezze meg, ne ássa alá. A jogalkotó a Kit. 109.§ (1) és (2) bekezdésében a foglalkoztatott
      által tanúsított magatartás, illetve a munkavégzésében bizonyítható tény súlyosságát értékelve döntött úgy, hogy ezekhez
      speciális, kizárólagos és kötelező felmentési okot társít.


      [22] A Kit. által bevezetett érdemtelenség jogintézményét az Alkotmánybíróság is vizsgálta. A 3116/2021. (IV. 14.) AB
      határozat [81] pontjában rögzítette, hogy " [A]z Alkotmánybíróság a 3070/2017. (IV. 19.) AB határozatában hangsúlyozta,
      hogy a köztisztviselők tevékenységének a közérdeket kell szolgálnia, szakszerű, pártatlan, befolyástól és részrehajlástól
      mentes kell legyen, ezért korszerű és magas szintű szakmai feltételeknek kell megfelelniük, munkájukért fokozott felelősség
      terheli őket, szigorú összeférhetetlenségi szabályok érvényesülnek velük szemben {3070/2017. (IV. 19.) AB határozat,
      Indokolás [25]}". Az 1/2016. (I. 29.) AB határozatában pedig azt is megerősítette a testület, hogy a közszolgálati jogviszonyokban
      a felmentési okok törvényi szabályozása alkotmányossági kérdés, olyan garanciális követelmény, amely összefügg a közszolgálati


      jogviszonyok sajátosságaival {1/2016. (I. 29.) AB határozat, Indokolás [45]}. Az Alkotmánybíróság azt is kimondta, hogy
      a kormányzati szolgálati jogviszony betöltésével a kormánytisztviselő elfogadja, hogy egyes alapvető jogaival csak olyan
      mértékben él, amitől nem válik a közhivatal viselésére méltatlanná {3070/2017. (IV. 19.) AB határozat, Indokolás [31]}.


      [23] A Kúria BHGY-ban K-KJ-2022-33. számon közzétett Kf.VIII.40.356/2021/5. számú eseti döntésében az érdemtelenség
      jogintézményét a Kit. 107.§ szabályozásával megegyező normatartalmú, a különleges jogállású szervekről és az általuk
      foglalkoztatottak jogállásáról szól 2019. évi CVII. törvény (a továbbiakban: Küt.) 39.§ (17)-(18) bekezdései alapján
      értelmezte. Megállapította, hogy a Kit. és a Küt.'
    - A döntés indokolása a tényállás, a jogszabályi kötelezettségek és a kötelezett által nem teljesített kötelezettségek
      alapján érvényes, mivel a tulajdonos nem bizonyította a korábbi birtokos személyét, nem tette meg a megelőző intézkedéseket,
      és a hatósági döntés véglegessé válása után sem teljesítette a kötelezettséget.
