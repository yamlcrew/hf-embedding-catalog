      A rendeletek támogatásnyújtási kötelezettséget a támogatás nyújtójának számára sem írnak elő, a rendeletek mindössze
      a támogatás nyújtásának lehetőségét és az ezzel járó várható kiadási előirányzat összegét tartalmazzák, azaz nem mást,
      mint a közfeladat-ellátás finanszírozásának tervezett módját és forrásait". A perben vitatott támogatások emiatt nem
      minősíthetők jogszabály alapján kapott támogatásoknak, ezeket a felperes támogatási szerződések alapján kapta, így ezek
      kapcsán nem állapítható meg a Tao tv. 7. § (8) bekezdés c) pontja szerinti adózás előtti eredménycsökkentését kizáró
      körülmény. A jogerős ítélet ellen az alperes nyújtott be felülvizsgálati kérelmet, kérte hatályon kívül helyezését,
      a kereset elutasítását. Érvelése szerint a jogerős ítélet nem felel meg a Tao tv. 7. § (1) bekezdés ly) pontjában, (8)
      bekezdés c) pontjában foglaltaknak. Fenntartotta határozatában is kifejtett jogi álláspontját, és arra hivatkozott,
      hogy a kedvezmény alkalmazhatósága szempontjából kizárólag annak van jelentősége, hogy a kapott támogatás jogszabályon
      alapul-e vagy sem. Mivel a felperes által kapott összegek önkormányzati rendelet alapján voltak juttathatók, ezek szükségszerűen
      jogszabály alapján kapott támogatásnak minősülnek, függetlenül attól, hogy lehívásukhoz, folyósításukhoz támogatási
      szerződés megkötésére is szükség volt. A felperes a támogatásokat az Önkormányzat költségvetéséről szóló 4/2006. (II.15.)
      Ör. és az 1/2007. (II.19.) Ör. (a továbbiakban: Ör.) azaz jogszabályok alapján kapta a 9. § (1) bekezdése, 10. § (1)
      bekezdése, továbbá a 4. számú mellékletben foglaltakra figyelemmel. A felperes ellenkérelmében a jogerős ítélet hatályban
      tartását kérte. Kifejtette, hogy az Ör-ek nem rendelkeznek szerződéskötési kötelezettségről, ennek előírására az Önkormányzatnak
      nincs hatásköre. A támogatás folyósításához szükséges forrást az Ör-ek biztosították, de a támogatás feltételeiben a
      támogatási szerződésben állapodtak meg a felek. Önmagában azon az alapon, hogy közpénzt kapott és közfeladat elvégzését
      vállalta el, rá az Ör-ek hatálya nem terjed ki, és a kapott támogatások nem minősíthetők jogszabályon alapulónak. A
      felülvizsgálati kérelem alapos. A helyi önkormányzat költségvetéséből finanszírozza és látja el a helyi önkormányzatokról
      szóló és más törvényben meghatározott feladatait (Áht. 62. § (1) bekezdés). A helyi önkormányzatokat


      központi költségvetésből megillető normatív állami hozzájárulást, illetve a helyi önkormányzatok működésével kapcsolatos
      egyéb központi költségvetési kapcsolatokból származó vagy költségvetési törvényben meghatározott támogatást, illetve
      előirányzott összeget a Kincstár folyósítja (Áht. 63. § (3) bekezdése). A helyi önkormányzatokat megillető normatív
      hozzájárulások és támogatások jogcímeit és igénybevételének feltételeit a költségvetési törvény határozza meg. (Áht.
      64. § (1) bekezdése.) A helyi önkormányzatokat megillető normatív módon elosztott, központi költségvetési kapcsolatokból
      származó források összegét önkormányzatonként és jogcímenként együttes rendelet teszi közzé (Áht. 64. § (3) bekezdése).
      Az államháztartást a központi kormányzat, az elkülönített állami pénzalapok, a helyi önkormányzatok, valamint a társadalombiztosítás
      költségvetései (a továbbiakban: a rendszerek)


      alkotják (Áht. 2. § (2) bekezdése). Az Áht., a költségvetési törvény és az Ör. jogszabály.(Jat. 1.§ (1) bekezdése) Azt
      a felperes sem vitatta, hogy a kapott támogatások közszolgáltatások ellentételezésére nyújtott állami támogatások, amelyek
      forrását a költségvetési törvény tartalmazza. A perben vitatott támogatások azért is állami forrásból nyújtott támogatások,
      mivel ilyennek minősülnek a költségvetés és az önkormányzat azon forrásai is, amelyeket meghatározott előirányzatnak,
      célnak megfelelő költségvetésről szóló jogszabályok, tehát törvények és rendeletek rögzítenek. Az Áht. 13/A. § rendelkezik
      arról is, hogy az államháztartás alrendszerei részére juttatott, az Európai Unióból származó források elkülönített elszámolás
      mellett kizárólag arra a célra használhatók fel, amelyekre ezeket az adományozó juttatja. A támogatások jogszabálysértő,
      vagy nem rendeltetésszerű felhasználása esetén továbbá a felhasználót a (8) bekezdésben és külön jogszabályokban meghatározottak
      szerint visszafizetési kötelezettség terheli. E törvényhely (2) bekezdése kimondja azt is, hogy a finanszírozó köteles
      ellenőrizni a felhasználást, a (8) bekezdés pedig akként rendelkezik, hogy az Európai Uniós támogatásból megvalósuló
      program kedvezményezettjével kötött szerződésben biztosítani kell, hogy a (2) bekezdésben írt feltételek teljesítésének
      elmaradása esetén a kedvezményezett haladéktalanul köteles visszafizetni a nem rendeltetésének és céljának megfelelően
      felhasznált közpénzt. A rendeltetés és célellenesen felhasznált összegek adók módjára behajtandók. Az Ör-ek 3. §-a egyértelműen
      rögzíti a speciális célú működési támogatások összegét, 4. számú melléklete pedig a speciális célú működési támogatás
      részletezése kapcsán mindként évben kifejezetten nevesítve tartalmazza 16., illetve 12. sorában a felperes részére adandó
      közszolgálati tájékoztatással kapcsolatos feladatok ellátása érdekében biztosított előirányzat összegeit. Az Ör-ek továbbá
      az előbbiekben ismertetett szabályozásnak megfelelően előírják, hogy a


      4. számú mellékletben szereplő támogatás folyósítására csak és kizárólag támogatói megállapodás alapján kerülhet sor,
      és tartalmazzák azt is, hogy mit kell e megállapodásokban rögzíteni (a támogatás összegét, célját, a rendeltetésszerű
      felhasználási kötelezettséget, az elszámolási kötelezettséget, a finanszírozó ellenőrzési kötelezettségét, és az előírt
      számadási kötelezettség elmaradása és nem cél szerinti felhasználás esetén alkalmazandó következményeket). Az Ör-ek
      tehát a magasabb szintű jogszabályokkal, törvényekkel összhangban álló módon egyértelműen rendelkeznek arra nézve, hogy
      mekkora összeget különítenek el a speciális célú támogatásra, arra is, hogy ki a támogatásra jogosult, tartalmazzák
      azt is, hogy a támogatás folyósítására csak támogatói megállapodás megkötése után kerülhet sor, a megkötött támogatási
      szerződések pedig hivatkoznak az Áht. 13/A. §-ára. Jogszabály alapján kapott támogatásnak minősül az a támogatás, amelynek
      forrását, jogcímét, összegét, címzettjét költségvetési törvény, önkormányzati rendelet tartalmazza. Az előzőekben részletezettekre
      figyelemmel helytállóan hivatkozott az alperes arra, hogy a támogatásra az alapot a jogszabály teremtette meg, tehát
      az Áht. a költségvetési törvények, továbbá az Ör-ek, és csak a folyósításnak volt a feltétele a támogatási szerződések
      megkötése. A folyósítás tárgyában kötött támogatási szerződések egyébként az előzőekben ismertetetteknek megfelelően
      a jogszabályokban részletezett jogokat és kötelezettségeket tartalmazzák. Hangsúlyozza a Kúria azt is, hogy a felperes
      által hivatkozott Ptk. 198. § (1)-(3) bekezdéseiben foglalt szabályozással nem ellentétes az alperes érdemi döntése,
      mert jelen esetben a támogatások alapját nem ezek, hanem a közjogi szabályok képezik, és ezek rendelkeznek a támogatási
      szerződés megkötésének szükségességéről is. Rámutat továbbá a Kúria arra is, hogy a Tao tv. 7. § (8) bekezdés c) pontja
      nem differenciál a támogatások között az ezek alapjául szolgáló jogszabályra tekintettel. Az adókorrekció vonatkozásában
      pedig a Tao tv. 7. § (1) bekezdés ly) pontja és (8) bekezdés c.) pontja egyértelműen, kifejezetten kogens (kötelező)
      szabályként rögzíti, hogy a jogszabály alapján visszafizetési kötelezettség nélkül kapott támogatással az adózó nem
      csökkentheti adózás előtti eredményét. Mindezekből pedig az következik, hogy a felperes 2006. évben ta. adóalapját 13.401.000
      Ft-tal, 2007. évben pedig 18.000.000 Ft-tal -téves jogalkalmazás miatt ugyan -, de jogszabálysértően csökkentette, ezért
      ezekkel az összegekkel a felperes adózás előtti eredményét az alperesnek a revízió eredményeként hozott határozatában
      meg kellett növelnie.


      A Kúria tehát azt állapította meg, hogy az alperes érdemi döntése a kereset illetve a felülvizsgálati kérelem által
      vitatott körben megfelel a jogvita eldöntésére irányadó jogszabályi rendelkezéseknek, ezért a jogerős ítéletet -Pp.
      275. § (3) bekezdésére figyelemmel -hatályon kívül helyezte, és a felperes keresetét elutasította.


      A felperes a Pp. 78. § (1) bekezdése alapján köteles az elsőfokú és felülvizsgálati perköltség megfizetésére.


      A kereseti és felülvizsgálati eljárási illetékre vonatkozó ítéleti rendelkezések az illetékekről szóló 1990. évi XCIII.
      törvény 42. § (1) bekezdés a) pontjában, 50. § (1) bekezdésében, valamint a 6/1986. (VI.26.) IM rendelet 13. § (2) bekezdésében
      foglaltakon alapulnak.


