widgetData:
- source_sentence: What significant multi-modal models were released in 2024
  sentences:
  - 'In 2024, almost every significant model vendor released multi-modal models. We saw the Claude 3 series from Anthropic
    in March, Gemini 1.5 Pro in April (images, audio and video), then September brought Qwen2-VL and Mistral’s Pixtral 12B
    and Meta’s Llama 3.2 11B and 90B vision models. We got audio input and output from OpenAI in October, then November saw
    SmolVLM from Hugging Face and December saw image and video models from Amazon Nova.

    In October I upgraded my LLM CLI tool to support multi-modal models via attachments. It now has plugins for a whole collection
    of different vision models.'
  - 'When @v0 first came out we were paranoid about protecting the prompt with all kinds of pre and post processing complexity.

    We completely pivoted to let it rip. A prompt without the evals, models, and especially UX is like getting a broken ASML
    machine without a manual'
  - 'Terminology aside, I remain skeptical as to their utility based, once again, on the challenge of gullibility. LLMs believe
    anything you tell them. Any systems that attempts to make meaningful decisions on your behalf will run into the same roadblock:
    how good is a travel agent, or a digital assistant, or even a research tool if it can’t distinguish truth from fiction?

    Just the other day Google Search was caught serving up an entirely fake description of the non-existant movie “Encanto
    2”. It turned out to be summarizing an imagined movie listing from a fan fiction wiki.'
- source_sentence: What is the advantage of a 64GB Mac for running models
  sentences:
  - 'The boring yet crucial secret behind good system prompts is test-driven development. You don’t write down a system prompt
    and find ways to test it. You write down tests and find a system prompt that passes them.


    It’s become abundantly clear over the course of 2024 that writing good automated evals for LLM-powered systems is the
    skill that’s most needed to build useful applications on top of these models. If you have a strong eval suite you can
    adopt new models faster, iterate better and build more reliable and useful product features than your competition.

    Vercel’s Malte Ubl:'
  - 'On paper, a 64GB Mac should be a great machine for running models due to the way the CPU and GPU can share the same memory.
    In practice, many models are released as model weights and libraries that reward NVIDIA’s CUDA over other platforms.

    The llama.cpp ecosystem helped a lot here, but the real breakthrough has been Apple’s MLX library, “an array framework
    for Apple Silicon”. It’s fantastic.

    Apple’s mlx-lm Python library supports running a wide range of MLX-compatible models on my Mac, with excellent performance.
    mlx-community on Hugging Face offers more than 1,000 models that have been converted to the necessary format.'
  - 'OpenAI made GPT-4o free for all users in May, and Claude 3.5 Sonnet was freely available from its launch in June. This
    was a momentus change, because for the previous year free users had mostly been restricted to GPT-3.5 level models, meaning
    new users got a very inaccurate mental model of what a capable LLM could actually do.

    That era appears to have ended, likely permanently, with OpenAI’s launch of ChatGPT Pro. This $200/month subscription
    service is the only way to access their most capable model, o1 Pro.

    Since the trick behind the o1 series (and the future models it will undoubtedly inspire) is to expend more compute time
    to get better results, I don’t think those days of free access to the best available models are likely to return.'
- source_sentence: What is the main innovation discussed in the context regarding model scaling?
  sentences:
  - 'The biggest innovation here is that it opens up a new way to scale a model: instead of improving model performance purely
    through additional compute at training time, models can now take on harder problems by spending more compute on inference.

    The sequel to o1, o3 (they skipped “o2” for European trademark reasons) was announced on 20th December with an impressive
    result against the ARC-AGI benchmark, albeit one that likely involved more than $1,000,000 of compute time expense!

    o3 is expected to ship in January. I doubt many people have real-world problems that would benefit from that level of
    compute expenditure—I certainly don’t!—but it appears to be a genuine next step in LLM architecture for taking on much
    harder problems.'
  - Meanwhile, it’s increasingly common for end users to develop wildly inaccurate mental models of how these things work
    and what they are capable of. I’ve seen so many examples of people trying to win an argument with a screenshot from ChatGPT—an
    inherently ludicrous proposition, given the inherent unreliability of these models crossed with the fact that you can
    get them to say anything if you prompt them right.
  - 'I think this means that, as individual users, we don’t need to feel any guilt at all for the energy consumed by the vast
    majority of our prompts. The impact is likely neglible compared to driving a car down the street or maybe even watching
    a video on YouTube.

    Likewise, training. DeepSeek v3 training for less than $6m is a fantastic sign that training costs can and should continue
    to drop.

    For less efficient models I find it useful to compare their energy usage to commercial flights. The largest Llama 3 model
    cost about the same as a single digit number of fully loaded passenger flights from New York to London. That’s certainly
    not nothing, but once trained that model can be used by millions of people at no extra training cost.'
- source_sentence: What new feature was introduced in ChatGPT's voice mode in December?
  sentences:
  - 'Nothing yet from Anthropic or Meta but I would be very surprised if they don’t have their own inference-scaling models
    in the works. Meta published a relevant paper Training Large Language Models to Reason in a Continuous Latent Space in
    December.

    Was the best currently available LLM trained in China for less than $6m?

    Not quite, but almost! It does make for a great attention-grabbing headline.

    The big news to end the year was the release of DeepSeek v3—dropped on Hugging Face on Christmas Day without so much as
    a README file, then followed by documentation and a paper the day after that.'
  - 'Then in December, the Chatbot Arena team introduced a whole new leaderboard for this feature, driven by users building
    the same interactive app twice with two different models and voting on the answer. Hard to come up with a more convincing
    argument that this feature is now a commodity that can be effectively implemented against all of the leading models.

    I’ve been tinkering with a version of this myself for my Datasette project, with the goal of letting users use prompts
    to build and iterate on custom widgets and data visualizations against their own data. I also figured out a similar pattern
    for writing one-shot Python programs, enabled by uv.'
  - The most recent twist, again from December (December was a lot) is live video. ChatGPT voice mode now provides the option
    to share your camera feed with the model and talk about what you can see in real time. Google Gemini have a preview of
    the same feature, which they managed to ship the day before ChatGPT did.
- source_sentence: Why is it important to learn how to work with unreliable technology like LLMs?
  sentences:
  - 'Longer inputs dramatically increase the scope of problems that can be solved with an LLM: you can now throw in an entire
    book and ask questions about its contents, but more importantly you can feed in a lot of example code to help the model
    correctly solve a coding problem. LLM use-cases that involve long inputs are far more interesting to me than short prompts
    that rely purely on the information already baked into the model weights. Many of my tools were built using this pattern.'
  - 'There’s a flipside to this too: a lot of better informed people have sworn off LLMs entirely because they can’t see how
    anyone could benefit from a tool with so many flaws. The key skill in getting the most out of LLMs is learning to work
    with tech that is both inherently unreliable and incredibly powerful at the same time. This is a decidedly non-obvious
    skill to acquire!

    There is so much space for helpful education content here, but we need to do do a lot better than outsourcing it all to
    AI grifters with bombastic Twitter threads.

    Knowledge is incredibly unevenly distributed

    Most people have heard of ChatGPT by now. How many have heard of Claude?'
  - 'I think people who complain that LLM improvement has slowed are often missing the enormous advances in these multi-modal
    models. Being able to run prompts against images (and audio and video) is a fascinating new way to apply these models.

    Voice and live camera mode are science fiction come to life

    The audio and live video modes that have started to emerge deserve a special mention.

    The ability to talk to ChatGPT first arrived in September 2023, but it was mostly an illusion: OpenAI used their excellent
    Whisper speech-to-text model and a new text-to-speech model (creatively named tts-1) to enable conversations with the
    ChatGPT mobile apps, but the actual model just saw text.'
