    فضلا عن أن المسألة المثارة تتعلق بالقواعد المقررة لتأمين دفاع الخصم و التمسك بها من طرف النيابة العامة يتعارض و أحكام
    المادة 503 من قانون الإجراءات الجزائية مما يتعين معه القول أن الوجه المثار غير سديد.
