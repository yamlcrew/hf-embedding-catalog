      المثبتة للإجراءات يتبين و أنه أشار بصفحته الثانية أن رئيس الجلسة أمر بجعل الجلسة سرية ما يفيد و أن هذا الإجراء كان علنيا.
  - source_sentence: لكن حيث أن المحكمة العليا استقرت في قراراتها على اعتبار أن هذا الإجراء يعد مستوفي ما لم يقدم ما يثبت
      إغفاله فضلا عن أن المسألة المثارة تتعلق بالقواعد المقررة لتأمين دفاع الخصم و التمسك بها من طرف النيابة العامة يتعارض
      و أحكام المادة 503 من قانون الإجراءات الجزائية مما يتعين معه القول أن الوجه المثار غير سديد.
    sentences:
    - 'لكن حيث أن القرار المطعون فيه يحمل دليل شرعيته وقانونيته وأن من المؤكد أنه قد صدر بعد أن عطيت الكلمة الأخيرة للمتهم
      وفق ما تنص عليه أحكام المادة 04/431 من قانون الإجراءات الجزائية وعليه كان على الطاعن إن لم يتم هذا الإجراء الجوهري أن
      يقدم ما يثبت ذلك واعتبارا أنه لم يفعل يتعين رفض ما جاء في هذا الوجه كما أنه يتبين من ديباجة القرار المطعون فيه الإشارة
      الواضحة إلى اسم ولقب الرئيس المقرر وهو السيد تقية علي و أنه من المؤكد أن هذا الأخير قد قام بتلاوة تقريره الشفوي في الجلسة
      وفق ما تقتضيه أحكام المادة 01/431 من قانون الإجراءات الجزائية وعليه كان على الطاعن إن لم يتم احترام هذا الإجراء الجوهري
      أن يقدم ما يثبت ذلك واعتبارا أنه لم يفعل يتعين رفض ما جاء في هذا الوجه.


      وحيث بخصوص عدم ذكر القرار المطعون فيه لتاريخ المداولة وتاريخ النطق بالقرار فإنه يتبين بالرجوع إلى هذا الأخير أنه لا
      يوجد به ما يفيد أن قضاة الإستئناف قد أجلوا قضية الطاعن إلى جلسة لاحقة أين تم النطق بالقرار مما يعني أنهم نطقوا بالقرار
      موضوع الطعن في نفس الجلسة بعد الإنتهاء من المرافعات وبالتاريخ الذي صدر فيه القرار المطعون فيه وبالتالي فإن ما يثيره
      الطاعن في هذا الوجه هو غير مؤسس وغير سديد مما يستوجب رفض كل ما جاء فيه.'
