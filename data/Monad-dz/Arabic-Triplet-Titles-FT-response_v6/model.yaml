  - 'ـ عن الوجه الوحيد المثار من قبل النائب العام

    ـ حيث يتبين من خلال الإطلاع على القرار المطعون فيه وعكس ما يدعيه الطاعن فإن قضاة المجلس سببوا قضاءهم بما فيه الكفاية والوضوح
    ذلك من خلال التعرض لوقائع القضية بشكل واف ومناقشة كل جريمة محل المتابعة على حدة وخلصوا إلى أن جرائم تكوين جمعية الأشرار
    والتحطيم العمدي لملك الغير والسرقة بالعنف المتابع بها المتهمين زائد جريمة حمل سلاح أبيض بدون سبب شرعي المتابع بها المتهم
    "ح.ز.و.ف" غير ثابتة في حقهم لإنعدام الدليل مستخلصين ذلك من أوراق الملف وما دار في الجلسة من مناقشات وعلى إثر ذلك قضوا
    بتأييد الحكم المستأنف فيما قضى به من براءة المتهمين من جريمتي تكوين جمعية الأشرار والتحطيم العمدي لملك الغير وإلغائه فيما
    قضى به من إدانة المتهمين عن جريمة السرقة بالعنف وجريمة حمل سلاح أبيض بدون سبب شرعي للمتهم "ح.ز.و.ف" والقضاء من جديد ببراءتهم.


    ـ حيث أن التسبيب الذي تبناه قضاة المجلس يصلح لتبرير النتيجة المتوصل إليه التي هي منطقية وقانونية.


    ـ حيث أن القرار المطعون فيه جاء مسببا تسبيبا كافيا وفقا للمادة 379 من قانون الإجراءات الجزائية خاصة أن الطاعن لم يحدد
    دلائل الإثبات المتوفرة بالملف حسبه والتي أهمل قضاة المجلس مناقشتها. مما يتعين إعتبار الوجه المثار غير سديد ورفضه.'
- source_sentence: 'عن الوجه الوحيد


    حيث انه بخلاف ما يدعيه النائب العام لدى مجلس قضاء بشار فانه يتبين من خلال مراجعة اوراق الملف لا سيما القرار المطعون فيه
    ان قضاة المجلس سببوا قرارهم تسبيبا كافيا ذلك انهم ناقشوا الافعال المنسوبة للمتهمين والمتمثلة في حيازة المؤثرات العقلية
    بغرض البيع وتوصلوا الى كونها تشكل جنحة عرض المؤثرات العقلية على الغير بهدف الاستعمال الشخصي بالنسبة للمتهم فوراك عبدالرزاق
    وجنحة الحيازة من اجل الاستهلاك الشخصي بالنسبة للمتهمين بحوصي توفيق ويحياوي نصر الدين وانها ثابتة ضدهم اعتمااد على اسباب
    تم ابرازها بالقرار المنتقد وهو ما يدخل ضمن الصلاحيات المخولة لقضاة الموضوع في تقدير الوقائع على ضوء ما يتضمنه الملف من
    عناصر وما يدور بجلسة المحاكمة وإعطاء الوصف القانوني الملائم ومن ثمة جاء الوجه المثار غير وجيه مما يتعين رده وبالتالي التصريح
    برفض الطعن.'
  sentences:
  - 'عن الوجه الوحيد المثار حول القصور في الأسباب


    حيث أنه بمراجعة القرار المطعون فيه يتجلى أن قضاة الموضوع قد ناقشوا بوضوح وقائع الأفعال المنسوبة إلى المتهم المطعون ضده
    دون أن يستخلصوا منها الأدلة الكافية لإدانته بها فصرحوا ببراءته وفق سلطتهم التقديرية في ذلك الأمر أن يجعل نعي النائب العام
    قرارهم غير سديد لذلك يتعين رفض طعنه لعدم التأسيس .'
  - حيث فضلا عن كون ما ذكره الطاعن غير واضح و جاء يذكر أشياء مختلفة تتعلق بإصدار حكما سريا دون إشتراك المحلفين مخالفا للمادة
    285 من قانون الإجراءات الجزائية و التي تلزم أن يصدر الحكم في جلسة علنية فإنه و بالرجوع إلى محضر المرافعات الذي يعد الوثيقة
    المثبتة للإجراءات يتبين و أنه أشار بصفحته الثانية أن رئيس الجلسة أمر بجعل الجلسة سرية ما يفيد و أن هذا الإجراء كان علنيا.
  - 'لكن حيث أنه باستقراء حيثيات القرار المطعون فيه يتبين أن قضاة الموضوع بالمجلس قد عللوا وسببوا قضاءهم بما فيه الكفاية والوضوح
    إذ عاينوا الوقائع وناقشوها وتوصلوا في قرارهم بعدم صحة إسناد جرم أخذ صور لهيئة نظامية طبقا للمادتين 70- 74 من قانون العقوبات
    للمطعون ضده بوشارب الزايدي وقضوا ببراءته لعدم توفر أركان الجرم محل المتابعة وقد أورد القرار المنتقد ذلك بقوله في الحيثية
    التالية


    ( ( حيث أنه بالرجوع إلى الملف والحكم المستأنف يتضح وأن نص المادتين المتابعين بها المتهم لا تتطابقان على وقائع الحال لكون
    المادة المتابع بها المتهم تعاقب كل من أخذ صور في منطقة محرمة حددتها السلطة العسكرية أو البحرية والقيام كذلك بتصوير منشآت
    ومراكز عسكرية أو بحرية التي تهم الدفاع الوطني بغير إذن من تلك السلطة وما دامت الشرطة تندرج ضمن هيئة عمومية مدنية فإنها
    لا تدخل في قائمة الفئة المحددة بنص المادة المتابع بها المتهم مما يستوجب معه القول بعدم ثبوت التهمة ضده وبالتالي إخراجه
    من رباط التهمة والتصريح ببراءته طبقا للقانون. ) )


    حيث أن قضاة الموضوع بالمجلس قدروا الوقائع التي عرضت عليهم بناء على سلطتهم التقديرية المخولة لهم قانونا وبنوا قضاءهم حسب
    الأدلة المقدمة لهم في معرض المرافعات والتي حصلت المناقشة فيها حضوريا أمامهم طبقا للمادة 212 من قانون الاجراءات الجزائية.


    حيث أن القرار محل الطعن جاء مسببا تسبيبا قانونيا يتماشى مع مقتضيات أحكام المادة 379 من قانون الإجراءات الجزائية إضافة
    إلى أنه قد أيد حكما مسببا هو الآخر مما يجعل ما أثاره الطاعن النائب العام في الوجه الوحيد غير سديد يتعين رفضه و معه رفض
    الطعن موضوعا.'
