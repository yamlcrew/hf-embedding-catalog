- source_sentence: 'عن الوجه الأول

    لكن حيث أنه بالرجوع إلى القرار المطعون فيه وبتفحصه فإنه لا يتبين منه مخالفته و لأية قاعدة إجرائية جوهرية خلافا لما ذهب
    إليه الطاعن الطرف المدني المسمى بن زغيوة مولود ذلك أن حاصل ما ينعاه على ترتيب أطراف دعوى الحال و الوارد بالقرار المنتقد
    فإنه لا يعدو أن يكون مجرد خطأ مادي تسرب إلى مطبوعة القرار و كذا الشأن بالنسبة لإلتماسات النيابة العامة وأن ذلك لا يرتب
    أي أثر  ولا ينجر عنه النقض أو البطلان و هو ما يجعل بالتالي أن هذا الوجه و بفرعيه غير مؤسس  يتعين حينئذ التصريح برفضه.'
  sentences:
  - وحيث أنه بالإطلاع مجددا على القرار المطعون فيه  يتبين فعلا أن قضاة الموضوع بالمجلس لم يعللوا ولم يسببوا قضاءهم بما فيه
    الكفاية ولم يناقشوا الوقائع المعروضة عليهم بكيفية دقيقة و و واضحة إذ لم يبرزوا أركان وعناصر جنحة استدراج الغير لممارسة
    الدعارة كما تقتضيه أحكام المادة 05/347 من قانون العقوبات ولم يبينوا الدليل أو الأدلة التي استندوا إليها وتوصلوا من خلالها
    لإدانة وعقاب المتهمة الطاعنة المسماة بشار حياة بالجرم المذكور لا سيما وأنها تنكر إتيانها له فجاء بذلك القرار المطعون فيه
    مشوبا فعلا بالقصور في التعليل والتسبيب إضافة إلى أنه لم يفند أسباب الحكم المستأنف  ومن ثم فإن هذا الوجه الثاني المثار
    من طرف المتهمة الطاعنة سديد  يتعين قبوله ويؤدي إلى نقض وإبطال القرار المطعون فيه  وهو وحده كاف لذلك وبدون حاجة لمناقشة
    الوجه الأول.
  - حيث فضلا عن كون ما ذكره الطاعن غير واضح و جاء يذكر أشياء مختلفة تتعلق بإصدار حكما سريا دون إشتراك المحلفين مخالفا للمادة
    285 من قانون الإجراءات الجزائية و التي تلزم أن يصدر الحكم في جلسة علنية فإنه و بالرجوع إلى محضر المرافعات الذي يعد الوثيقة
    المثبتة للإجراءات يتبين و أنه أشار بصفحته الثانية أن رئيس الجلسة أمر بجعل الجلسة سرية ما يفيد و أن هذا الإجراء كان علنيا.
  - 'لكن حيث أن القرار المطعون فيه يحمل دليل شرعيته وقانونيته وأن من المؤكد أنه قد صدر بعد أن عطيت الكلمة الأخيرة للمتهم وفق
    ما تنص عليه أحكام المادة 04/431 من قانون الإجراءات الجزائية وعليه كان على الطاعن إن لم يتم هذا الإجراء الجوهري أن يقدم
    ما يثبت ذلك واعتبارا أنه لم يفعل يتعين رفض ما جاء في هذا الوجه كما أنه يتبين من ديباجة القرار المطعون فيه الإشارة الواضحة
    إلى اسم ولقب الرئيس المقرر وهو السيد تقية علي و أنه من المؤكد أن هذا الأخير قد قام بتلاوة تقريره الشفوي في الجلسة وفق
    ما تقتضيه أحكام المادة 01/431 من قانون الإجراءات الجزائية وعليه كان على الطاعن إن لم يتم احترام هذا الإجراء الجوهري أن
    يقدم ما يثبت ذلك واعتبارا أنه لم يفعل يتعين رفض ما جاء في هذا الوجه.


    وحيث بخصوص عدم ذكر القرار المطعون فيه لتاريخ المداولة وتاريخ النطق بالقرار فإنه يتبين بالرجوع إلى هذا الأخير أنه لا يوجد
    به ما يفيد أن قضاة الإستئناف قد أجلوا قضية الطاعن إلى جلسة لاحقة أين تم النطق بالقرار مما يعني أنهم نطقوا بالقرار موضوع
    الطعن في نفس الجلسة بعد الإنتهاء من المرافعات وبالتاريخ الذي صدر فيه القرار المطعون فيه وبالتالي فإن ما يثيره الطاعن في
    هذا الوجه هو غير مؤسس وغير سديد مما يستوجب رفض كل ما جاء فيه.'
- source_sentence: 'و حيث و من جهة أخرى فما أثاره الطاعن والمتعلق بالأخذ بصورة الشهادة الطبية هو الأخر مردود بما أنه لم يسبق
    له أن أثار ذلك أمام قضاة الموضوع.


    و بالتالي لا يحق له عملا بنص المادة 501 من قانون الإجراءات الجزائية إثارة ذلك لأول مرة أمام المحكمة العليا علما أن المتهم
    الطاعن هو الذي امتنع عن حضور جلسات المجلس و تسبب في عدم مناقشة ذلك.


    و عليه فإن نعيه عن القرار المطعون فيه بهذين الوجهين يضحى بدون جدوى مما يتعين معه رد الوجهين و بالنتيجة رفض الطعن.'
  sentences:
  - 'عن الوجه الثاني المثار من دفاع المتهم الطاعن


    حيث أن قضاء المحكمة العليا دأب على أن إثارة الوجه المتعلق بمخالفة القانون او الخطأ في تطبيقه يقتضي بالضرورة تبيان النص
    أو النصوص القانونية التي أخطأ القضاة في تطبيقها أو خالفوها ومتى كان غير ذلك فإن هذا الوجه هو الآخر غير سديد ويتعين رفضه,
    ويترتب على ذلك التصريح برفض الطعن من الناحية الموضوعية.'
