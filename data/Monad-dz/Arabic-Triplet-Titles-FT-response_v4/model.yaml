      اخلو الملف من الأركان التي تتطلبها هذه الأخيرة والمتمثلة في ثبوت قيام المتهمين لعلاقة الجنسية فيما بينهما وكذلك أمام
      ثبوت تعود دخول المتهم إلى بيت الضحية برضا هذا الأخير في حضوره وفي غيابه ومن ثم خلص قضاة الموضوع إلى عدم قيام عناصر جريمة
