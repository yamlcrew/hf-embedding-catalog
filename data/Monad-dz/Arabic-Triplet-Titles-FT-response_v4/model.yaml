    و لكن حيث أنه يتبين من مراقبة أسباب الحكم المستأنف المؤيد بالقرار المطعون فيه أن القاضي الأول ناقش الوقائع المنسوبة للمتهم
    الطاعن و اعتمد في إثبات الإدانة على اعتراف المتهم على أنه هو من قام بكتابة الرسالة الموجهة للنائب العام و التي تضمنت عبارات
    إهانة في حق هيئة عمومية و هي محكمة عين صالح.


    حيث أن القرار المطعون فيه لم يسء حالة المتهم المستأنف و اكتفى بتأييد الحكم المستأنف في الدعوى الجزائية و في الدعوى المدنية
    فإن ديباجة الحكم المستانف تشير إلى الوكيل القضائي للخزينة العمومية كطرف مدني و بعد الإستئناف فإن أسباب القرار المطعون
    فيه تشير حرفيا إلى أنه "بعد الإستماع إلى دفاع الطرف المدني الذي التمس التمسك بطلباته السابقة و هي الطلبات التي قام المجلس
    بتخفيضها إلى مبلغ 10.000 دج".


    حيث أن القرار المطعون فيه جاء مستوفيا للشروط القانونية المطلوبة لصحته و لذلك يجب رفض الوجهين المثارين و معهما رفض الطعن.'
  sentences:
  - 'حيث بالفعل باستقراء القرار المطعون فيه يتبين أن قضاة المجلس لم يحللوا الوقائع تحليلا كافيا و لم يتعرضوا إلى أركان التهمة
    المنسوبة للمطعون ضدهم, كما لم يناقشوا الحكم المستأنف و التسبيب الذي توصل به قاضي الدرجة الأولى إلى نتيجة الإدانة, بل أكتفوا
    بثلاث حيثيات للوصول إلى نتيجة البراءة دون الوقوف على الواقعة الأساسية في القضية فلم يتحروا في مدى توفر الركن المادي لجنحة
    الشروع في إبعاد قاصر لم تكمل 18 سنة و هو أن مصالح الضبطية القضائية ضبطوا المتهمين الثلاثة متلبسين داخل السيارة نوع 206
    تحمل رقم 25-104- 06520 التي كانوا على متنها و هي تصرخ و طالبة النجدة و كان المطعون ضده طهاري نصر الدين يحاول الإمساك بيدها
    لم يشير قضاة المجلس خلال مناقشتهم للوقائع و تعليل قرارهم إلى هذه الواقعة .


    حيث أن تعليلا من هذا القبيل لا يصلح لقضاء الدرجة الثانية, باعتباره جاء مقتضبا في تطرقه للوقائع المتابع بها المطعون ضدهم,
    كما لم يأتوا بتعليل يفند التعليل الذي اعتمده قاضي الدرجة الأولى الذي توصل إلى نتيجة الإدانة, فجاء قضاءهم مشوبا بعيب قصور
    الأسباب و موجب للنقض عن هذا الوجه لوحده دون حاجة إلى مناقشة الوجه الثاني.


    حيث أن المصاريف القضائية تكون في هذه الحالة على المطعون ضدهم, طبقا للمادة 524 من قانون الإجراءات الجزائية.'
  - 'حيث أن الوجه المؤسس عليه الطعن لايمكن أن يؤسس على اعادة طرح الوقائع وثبوتها من عدمه , وأن تقديرالوقائع وعناصرالإثبات
    من اختصاص قضاة الموضوع.


    حيث أن قضاة المجلس عاينوا الوقائع وعللوها وخلصوا بأنه لم يتم الدليل على صحتها .


    حيث أنه متى كان ذلك فإن الوجه غير مؤسس.'
  - 'لكن حيث أن النائب العام الطاعن جاء بوجه مقتضب لا يتبين منه أين تكمن مواطن قصور الأسباب حتى يتسنى للمحكمة العليا مناقشتها
    والرد عليها ومع ذلك فإنه يتبين من قراءة القرار المطعون فيه أن قضاة الإستئناف قد ناقشوا الوقائع المنسوبة إلى المتهم وخلصوا
    إلى نتيجة قضائهم ببراءته وقد سببوه بما فيه الكفاية بالقول


    ( ( حيث يتضح من ملف الدعوى والمناقشات الحضورية أمام المجلس أن رئيس المصلحة بصندوق التقاعد يعتبر أن التقرير الذي أقامه
    ضده المدير إلى اللجنة المتساوية الأعضاء يوجد فيه قذف يتمثل في أن التقرير ذكر أن المذكور له سوابق قضائية. ) ) وكذا


    ( ( حيث أنه بالرجوع إلى محضر اجتماع التأديب المودع بالملف فإنه يتضح أن هذه اللجنة ذكرت السوابق التأديبية ونوعها وتاريخها
    وأنها لم تتكلم اطلاقا عن السوابق القضائية مما يجعل المجلس يرى أنه فعلا وقع خطأ مادي في الكتابة. ) ) وكذا


    ( ( وحيث أن عبارة قضائية بدلا من تأديبية الواردة في تقرير إلى اللجنة المتساوية الأعضاء لا تتضمن تحقيرا أو قدحا بمفهوم
    المادتين 296 و 297 من قانون العقوبات. ) ) .


    وحيث بتسبيبهم هذا أبرز قضاة الإستئناف الوسائل التي اعتمدوها للوصول إلى نتيجة قضائهم بعدم صحة اسناد الجرم إلى المتهم المطعون
    ضده بعدما قدروا الوقائع المنسوبة إليه ومحصوا أدلة الإثبات المعروضة عليهم والتي لم يستخلصوا منها ثبوت ارتكابه لها وهذا
    بناء على سلطتهم التقديرية المخولة لهم قانونا بموجب أحكام نص المادة 212 من قانون الإجراءات الجزائية.


    وحيث بالتالي جاء القرار المطعون فيه معللا بما فيه الكفاية ومراعيا لما تنص عليه أحكام المادة 379 من قانون الإجراءات الجزائية
    الأمر الذي يجعل ما يثيره الطاعن في هذا الوجه غير مؤسس وغير سديد مما يستوجب رفضه ورفض الطعن معه.


    فيما يخص طعن الطرف المدني


    حيث أنه بموجب كتاب موصى عليه مع الإشعار بالإستلام تم إنذار الطاعن ليتسنى له إيداع مذكرة تتضمن أوجه طعنه بالنقض وهي محررة
    وموقعة من طرف محام معتمد لدى المحكمة العليا في ظرف شهر واحد من تاريخ الإنذار تطبيقا لنص المادة 505 من قانون الإجراءات
    الجزائية غير أن الطاعن لم يمتثل إلى الإنذار الموجه إليه ولم يقدم أية مذكرة تتضمن أوجه طعنه بواسطة محام مقبول لدى المحكمة
    العليا مما يستوجب في هذه الحالة التصريح بعدم قبول الطعن بالنقض شكلا وفقا للمادة سالفة الذكر.'
