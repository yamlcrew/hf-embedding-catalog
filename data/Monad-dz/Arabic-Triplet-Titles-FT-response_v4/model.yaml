- source_sentence: 'عن الوجه الثاني

    حيث على عكس ما يدعيه النائب العام الطاعن فانه بمراجعة القرار المطعون فيه واستقراء حيثياته, يتبين ان قضاة المجلس أسسوا
    قرارهم تاسيسا قانونيا سليما وطبقوا صحيح القانون وذلك بالقول انه تبين للمجلس من اوراق الملف والمناقشات وخاصة الحكم محل
    الاستئناف ان قاضي الدرجة الاولى قد اصاب فيما ذهب اليه من إدانة المتهم بالتهمتين المتابع من اجلهما طالما انه قدر الوقائع
    احسن تقدير واحسن في تطبيقه للقانون واخذ بظروف الدعوى وشخصية المتهم في تقدير العقوبة, وانه من المستحق في هذه الحالة تاييد
    الحكم المستانف.


    حيث ان مثل هذا التعليل للقرار المطعون فيه يجعل من النعي الذي اثاره النائب العام الطاعن من خلال الوجه المثار غير وجيه ويتعين
    استبعاده,


    حيث يترتب عما سبق ذكره التصريح برفض طعن النائب العام موضوعا,'
  sentences:
  - 'عن الوجه الاول المثار

    حيث أنه بالرجوع إلى القرار المطعون فيه نجد ان قضاة المجلس قضوا في المعارضة المرفوعة من طرف المتهم و تطرقوا في ذلك إلى
    النقطة القانونية التي نقضت المحكمة العليا القرار المطعون فيه من طرف النيابة العامة لأجلها وأن القرار المطعون فيه قد صدر
    حضوريا غير وجاهيا في حق المتهم وهو ما يجعل الوجه المثار من قبل الطاعن غير سديد و غير مؤسس يتعين رده.'
  - 'حيث أن الطابع الإجرامي لجنحة إبعاد قاصرة لم تكمل الثامنة عشر حسب مفهوم المادة 326 من قانون العقوبات يستنتج من قيام الجاني
    بإبعاد القاصرة ضد إرادة الأشخاص الذين لهم ولاية أبوية عليها دون الأخذ في الإعتبار رضاها أو الباعث الدافع للمتهم.


    حيث أن قضاة المجلس أو قبلهم القاضي الأول إكتفوا بمعاينة أن الضحية طلبت من المتهم أن يوصلها إلى حيث طلبت و كانت ترافقهما
    المسماة بحوش نورة و خلصوا إلى أن ركن الإبعاد غير متوافر,و دون أن يراعوا المبدأ المذكور أعلاه و الذي هو الأساس لقيام جنحة
    إبعاد قاصر ومنه فإن الوجه مؤسس.'
  - 'عن الوجه الوحيد المثار

    حيث يتبين من خلال مراجعة القرار المطعون فيه والحكم المستانف المؤيد بالقرار ان قضاة الموضوع على مستوى درجتي التقاضي سببوا
    قضاءهم تسبيبا كافيا ولا يوجد ما يفيد انهم قصروا في تسبيب قضائهم كما يدعيه النائب العام الطاعن, ذلك ان قضاة الموضوع قد
    احاطوا بوقائع القضية وناقشوها مناقشة قانونية وموضوعية وحددوا الواقعة المستوجبة للادانة والعقوبة بالنسبة للمتهمين بن ساسي
    بلال وسناني عبدالحميد وبراءة المتهم بورفيس محمد يزيد من الجرم المنسوب اليه.


    حيث ان مسالة تقدير الوقائع وادلة الاثبات امر متروك للسلطة التقديرية لقضاة الموضوع ولا معقب في ذلك من طرف المحكمة العليا
    طالما ان قرارهم جاء مسببا وفقا لمقتضيات المادة 379 من قانون الاجراءات الجزائية.


    ومن ثم فالوجه الوحيد المثار من طرف النائب العام الطاعن غير سديد, مما يتعين استبعاده,


    فيترتب على ذلك التصريح برفض طعن النائب العام موضوعا,'
- source_sentence: 'حيث بالفعل يتبين من القرار المطعون فيه أن قضاة المجلس بنوا قرارهم استنادا على ثلاث حيثيات جاء فيها " حيث
    أن المتهم يعترف بالفعل المخل بالحياء على الضحية بإرادتها و هذا ما تفنده شكوى الضحية في جميع مراحل التحقيق", "الثابت من
    الملف أن المتهم اعترض سبيل الضحية و أخذها لإحدى الشقق بالحروش و أجبرها على نزع ثيابها و أخذ صورا لها لتهديدها عندما يرى
    ذلك مناسب " الوقائع ثابتة في حق المتهم و أن إنكاره لمجرد الإنكار.

    حيث يتبين من حيثيات هذا القرار أن قضاة المجلس توصلوا إلى نتيجة الإدانة بناءا على اعتراف المتهم أمامهم بالتهمة المنسوبة
    إليه كما جاء في عرض الوقائع, لكن بالرجوع إلى الحيثية الرابعة التي جاء فيها, "حيث أن الوقائع ثابتة في حق المتهم و أن إنكاره
    لمجرد الإنكار", يستشف من هذه الحيثية أن الطاعن نكر التهم المنسوبة إليه, بينما جاء في عرض الوقائع أن المتهم اعترف أمام
    المجلس بأنه كان يعرف الضحية و له علاقة غرامية معها كانت تأتيه بإرادتها و أنه مارس العلاقة الجنسية معها بإرادتها, يتبين
    من حيثيات القرار المطعون فيه بعد مطابقتها مع ما جاء في عرض الوقائع أن تعليل القرار المطعون فيه جاء هشا في عرض و شرح الوقائع
    و غامضا في تسبيبه للنتيجة التي انتهى إليها, كما لم يحلل أركان كل تهمة, و لم يناقشها مناقشة قانونية, إن تعليل من هذا القبيل
    لا يصلح لقضاة الدرجة الثانية لأنه جاء مقتضبا و متذبذبا, ما يؤدي إلى نقض و إبطال القرار المطعون فيه عن هذا الوجه دون حاجة
    إلى مناقشة الوجه الثاني.


    حيث أن المصاريف القضائية تكون في هذه الحالة على الخزينة العامة, طبقا للمادة 524 من قانون الإجراءات الجزائية.'
  sentences:
  - 'لكن بالرجوع إلى القرارا لمطعون فيه يتبين أن قضاة المجلس قد سببوه بالقول


    "أنه بالإطلاع على مجمل الوثائق المدرجة بالملف والمناقشة التي دارت بالجلسة أنه لم يصبط المتهمين وهما يمارسان العلاقة الجنسية
    وعليه فإن ظروف المادة 339 من قانون العقوبات غير متوفرة في قضية الحال وأن المتهم متعود الدخول إلى منزل الشاكي برضائه في
    حضوره وفي غيابه"


    وانتهوا إلى تأييد الحكم المستأنف الذي سببه قاضي اول درجة بالقول


    " أنه ثبت للمحكمة أن المتهمين أحيلا على المحكمة بتهمة الخيانة الزوجية وطبقا للمادة 339 من قانون العقوبات التي تنص على
    جريمة الزنا وأنه ثبت للمحكمة من خلال أطلاعها على أوراق الملف أن عناصر جنحة الزنا غير قائمة في حق المتهمين وأنه طبقا للمادة
    339 من قانون العقوبات للتصريح بقيام عناصر جنحة الزنا في حق المتهمين يتعين توفر عنصر الوطء والجماع بينهما وعلمهما أنهما
    يعتديان على شرف الزوج وأن القضاء استقر على أنه يكفي لعقابهما مشاهدتهما في ظروف لا تترك مجالا للشك يباشران العلاقة الزوجية
    وأنه ثبت للمحكمة من خلال التحقيق الذي جرى بجلسة المحاكمة ومن تصريحات الأطراف لا سيما الضحية أنه لا يوجد بالملف أي دليل
    يثبت قيام المتهمين بممارسة العلاقة الجنسية خاصة وأنه ثبت للمحكمة أن المتهم متعود الدخول إلى بيت الزوجين وبرضا الضحية وأمام
    عدم ثبوت قيام عناصر جنحة الزنا في حق المتهمين يتعين التصريح ببراءتهما من التهمة المنسوبة إليهما.


    وأنه يتبين من خلال الحيثيات الواردة في القرار المطعون فيه والحكم المستأنف المؤيد بذات القرار.


    أن قضاة الموضوع قد ناقشوا التهمة المنسوبة إلى المتهمين مناقشة قانونية وذلك على ضوء المادة 339 من قانون العقوبات وبينوا
    اخلو الملف من الأركان التي تتطلبها هذه الأخيرة والمتمثلة في ثبوت قيام المتهمين لعلاقة الجنسية فيما بينهما وكذلك أمام ثبوت
    تعود دخول المتهم إلى بيت الضحية برضا هذا الأخير في حضوره وفي غيابه ومن ثم خلص قضاة الموضوع إلى عدم قيام عناصر جريمة الزنا
    في حق المتهمين.


    وأنه بتطرق قضاة الموضوع إلى العناصر المبينة أعلاه يكونوا قد سببوا قضاءهم تسبيبا كفيا وقانونيا وبالتالي فإن الوجه الوحيد
    المثار غير مؤسس مما يتعين رفضه ورفض الطعن معه.'
  - 'حيث أن الوجه المؤسس عليه الطعن لايمكن أن يؤسس على اعادة طرح الوقائع وثبوتها من عدمه , وأن تقديرالوقائع وعناصرالإثبات
    من اختصاص قضاة الموضوع.


    حيث أن قضاة المجلس عاينوا الوقائع وعللوها وخلصوا بأنه لم يتم الدليل على صحتها .


    حيث أنه متى كان ذلك فإن الوجه غير مؤسس.'
  - عن الوجه الثاني للطعن و حيث أنه خلافا لما أثاره الطاعن فإن نص المادة 327 من قانون العقوبات لم يشترط لقيام الجريمة أن يكون
    الأمر القضائي مشمولا بالنفاذ المعجل أو نهائيا بل يكفي أن يكون الطرف المحكوم لصالحه الحكم قد سعى لتنفيذه وفقا للقانون و
    أن المحكوم عليه امتنع عن الامتثال و تمت معاينة ذلك بالطرق القانونية و هو ما أبرزه قضاة الموضوع في قضية الحال مما يجعل
    الوجه المثار غير سديد.
- source_sentence: 'عن الوجهين السابقين مجتمعين

    و لكن حيث أنه يتبين من مراقبة أسباب الحكم المستأنف المؤيد بالقرار المطعون فيه أن القاضي الأول ناقش الوقائع المنسوبة للمتهم
    الطاعن و اعتمد في إثبات الإدانة على اعتراف المتهم على أنه هو من قام بكتابة الرسالة الموجهة للنائب العام و التي تضمنت عبارات
    إهانة في حق هيئة عمومية و هي محكمة عين صالح.


    حيث أن القرار المطعون فيه لم يسء حالة المتهم المستأنف و اكتفى بتأييد الحكم المستأنف في الدعوى الجزائية و في الدعوى المدنية
    فإن ديباجة الحكم المستانف تشير إلى الوكيل القضائي للخزينة العمومية كطرف مدني و بعد الإستئناف فإن أسباب القرار المطعون
    فيه تشير حرفيا إلى أنه "بعد الإستماع إلى دفاع الطرف المدني الذي التمس التمسك بطلباته السابقة و هي الطلبات التي قام المجلس
    بتخفيضها إلى مبلغ 10.000 دج".


    حيث أن القرار المطعون فيه جاء مستوفيا للشروط القانونية المطلوبة لصحته و لذلك يجب رفض الوجهين المثارين و معهما رفض الطعن.'
  sentences:
  - 'حيث بالرجوع إلى القرار المطعون فيه يتضح وأن قضاة المجلس سببوا قضاءهم بالقول


    " حيث أن جنحة إبعاد قاصرة أقل من 18 سنة ثابتة ضد المتهم بنقله الضحية القاصرة من مدينة أم البواقي إلى مدينة خنشلة ثم إلى
    جبل سيدي رغيس وممارسته الجنس معها سطحيا وإبقائها معه طيلة ليلة كاملة وهو ما أكدته الضحية وكذا إعتراف المتهم أثناء التحقيق
    الإبتدائي بنقله الضحية على متن سيارته إلى الجبل وبقائها معه إلى غاية التاسعة ليلا وممارستهما الجنس سطحيا كل ذلك يجعل أركان
    هذه الجريمة قائمة مما يستوجب تأييد الحكم المستأنف."


    حيث يستفاد من هذا التسبيب وأن قضاة المجلس توصلوا إلى ثبوت التهمة بأسباب واضحة إستنادا إلى إعتراف المتهم أنه قام فعلا بإبعاد
    الضحية لم تكمل 18 سنة برضاها من الوسط الذي تعيش فيه من مدينة أم البواقي إلى مدينة خنشلة ثم العودة بها إلى جبل سيدي رغيس
    والمبيت معها ليلة كاملة وممارسة الجنس سطحيا وبذلك فقد بينوا عناصر جنحة إبعاد قاصرة بدون عنف وكذلك الأدلة التي إستندوا
    عليها مما يتعين القول بأن القرار المنتقد أورد على ثبوت هذه التهمة أدلة مستمدة من أقوال المتهم نفسه والضحية و بما أن الطاعن
    إقتصر في نعيه على مناقشة الواقعة بأن ذلك يشكل مجادلة غير مقبولة في تقدير الأدلة التي يستقل بها قضاة الموضوع مما يجعل هذا
    الوجه غير سديد يتعين رفضه.'
  - 'عن الوجه الأول المثار من دفاع المتهم الطاعن المؤدي للنقض


    حيث أن ما ينعاه دفاع المتهم الطاعن على القرار سديد، ذلك أنه وبمراجعة القرار المطعون فيه تبين منه أن قضاة المجلس لم يتقيدوا
    بالنقطة التي فصلت فيها المحكمة العليا واعتمد على الأسباب التي اعتمد عليها القرار الأول الذي تم إبطاله بموجب القرار موضوع
    إعادة السير في الدعوى بعد النقض وراح القرار المطعون فيه يسرد وقائع وأسانيد تخص المسمى حشاني عمار وأخرى تخص قسميور عبدالوهاب
    وأسسوا قرارهم في إدانة المتهم الطاعن على شهادة المدعوين حناشي عمار وقسميور عبدالوهاب دون البحث والاعتماد على أسانيد أخرى
    تعزز تلك الشهادة.


    حيث أنه ما دام ثابتا أن المجلس لم يلتزم بالنقطة التي قطعت فيها المحكمة العليا عقب طعن المتهم وقضى بتأييد الحكم المستأنف
    اعتمادا على شهادة نفس الشاهدين دون عناصر أخرى فإن قضاة المجلس يكونون قد عرضوا قرارهم للنقض والإبطال ومن ثم فإن الوجه الأول
    المثار من دفاع المتهم سديد ويترتب على ذلك التصريح بقبول الطعن بالنقض من الناحية الموضوعية دون مناقشة الوجه الثاني.'
  - لكن حيث أنه خلافا لما أورده الطاعن فإن الطرف المدني لم يصفح عن المتهمة بل تنازل عن حقوقه المدنية المتمثلة في التعويض المدني
    فقط و هو أمر لا يؤثر على الدعوى العمومية و بالتالي فإن قضاة المجلس لم يخالفوا أحكام المادة 329 مكرر التي تنص على أن صفح
    الضحية يضع حدا للمتابعة الجزائية أما أوردته الطاعنة بشأن تصريحات المتهمة و تأكيدها بأن الإبن هو الذي رفض البقاء عند والده
    فهي تتعلق بوقائع الدعوى التي ناقشها قضاة الموضوع و حددوا موقفهم منها بموجب ما لهم من سلطة تقديرية و بالتالي فإن القرار
    المطعون فيه جاء وفقا للقانون مما يتعين معه القول أن الوجه المثار غير مؤسس.
