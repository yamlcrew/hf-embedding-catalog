    - لكن حيث يبين من القرار المطعون فيه أنه صدر حكم في 2013/07/03 قضى بتعيين الخبير باش رابح المحاسب لتحديد نقدا و بدقة حساب
      الفارق في الأجور للفترة المطالب بها و أن هذا الأخير لجأ إلى الخبير في جانفي 2015 و هو المسعى الذي تنطلق منه حساب مدة
      السنتين المنصوص عليها في المادة 223 من ق.ا.م.ا. و طالما أن المطعون ضده أعاد السير في الدعوى في 2015/08/16 بعد أن أودع
      الخبير تقرير خبرته في 2015/06/16 و صدر حكم بالفصل في موضوع الدعوى بتاريخ 2015/11/04 فإنه يكون قد فصل في النزاع في المدة
      المقررة قانونا و هذا ما قضى به القرار المطعون فيه على صواب مما يجعل الفرع المثار غير مؤسس يستوجب رفضه.
    - لكن عكس ما جاء في الوجه فإن مسألة التسريح و التعويض عنه فصل فيها بموجب الحكم الصادر بتاريخ 2010/10/12 القاضي برجوعه
      إلى العمل غير أن الطاعنة رفضت تنفيذه مما يعرضها للتعويض عن هذا الضرر اللاحق به من عدم تنفيذ حكم قضائي طبقا للقواعد العامة
      المنصوص عليها في المادة 625 ق.ا.م.ا. و المواد 124 176 182 ق.مدني و هذا ما قضى به القرار المطعون فيه عن صواب و النعي
      عليه بخلاف ذلك في غير محله.
    - 'حيث يتبين فعلا من القرار المطعون فيه اعتماده للقضاء بعدم استنفاذ الآجال المنصوص عليها في المادة 367 من قانون الإجراءات
      المدنية والإدارية على محضر استلام نسخة من قرار المحكمة العليا مع أن المادة المذكورة تنص على التبليغ الرسمي و منه فالآجال
      المنصوص عليها مرتبطة بالتبليغ الرسمي الذي يكون طبقا للنصوص المنظمة لتبليغ الأحكام وليس استلام النسخة المستخرجة من أمانة
      ضبط المحكمة العليا هذا من جهة .

      حيث من جهة أخرى فإن المدعي في الطعن أشار إلى نص المادة 223 و229 من قانون الإجراءات المدنية والإدارية لتأسيس طلبه الرامي
      لسقوط الخصومة وكان على قضاة المجلس معاينة أن قرار المحكمة العليا الصادر بتاريخ 04/04/2013 والذي قضى بنقض وإبطال القرار
      المطعون فيه المؤرخ في 07/02/2010 وإن لم يتم تبليغه رسميا معاينة الأجل ما بين رفع دعوى السقوط وتاريخ صدور قرار المحكمة
      العليا وهذا لتطبيق الأحكام المنصوص عليها في المادة 223 من قانون الإجراءات المدنية والإدارية ولما قضى قضاة المجلس بخلاف
      هذا يكونوا قد عرضوا قرارهم للنقض والإبطال حيث أن المصاريف على من خسر الدعوى.'
  - source_sentence: لكن حيث أن ما يثيره الطاعن في الوجهين في غير محله ذلك أن قرار المحكمة العليا الصادر بتاريخ 2009/04/01
      والذي نقض الحكم الصادر بتاريخ 2007/05/06 أفاد الطاعن بمبلغ التعويض قدره 150.000 دج وإعادة لإدماج إلى منصب عمله ومن ثم
      فإن من مصلحة الطاعن إعادة السير في الدعوى في الآجال القانونية وليس المطعون ضدها كما جاء في الإثارة لأنه هو المتضرر من
      إلغاء الحكم المؤرخ في 2007/05/06 وليس المطعون ضدها ومنه فإن الإثارة غير سديدة.
    sentences:
    - لكن حيث أن موضوع النزاع يتعلق بحقوق مالية طالب بها مورث المطعون ضدهم تضمنها الحكم الصادر في 13/06/2012 بالمصادقة عليها
      ولم تتضمن حقوقا شخصية لصيقة بشخص مورث المطعون ضدهم وأن الطاعن استأنف هذا الحكم ليصدر قرار المجلس بتعيين خبير آخر في
      18/11/2012 وهو القرار الذي لم يسع الطاعن لمواصلة المساعي الواردة في منطوقه طبقا للمادة 222 من قانون الإجراءات المدنية
      والإدارية ومنه يبقى من مصلحة المطعون ضدهم المطالبة بسقوط الخصومة ويكون الوجه غير مؤسس .
    - 'ـ أن محكمة أول درجة استبعدت هذا الدفع على أساس أن طلب المطعون ضده يعتبر حق مكتسب يسري بأثر رجعي ولا يعتبر أجرة ثابتة
      يدين بها ولم يتم استيفاؤها حتى يتم تطبيق نص المادة 312 المذكورة.


      ـ أن قضاة المجلس أيدوا الحكم المستأنف واستبعدوا الدفع بالتقادم وسببوا قرارهم بنفس تسبيب محكمة أول درجة على أن مطالب
      المطعون ضده تعتبر حقا معترفا أنه قد رتب التزاما في ذمة الطاعنة ولا يمكن تطبيق أحكام المادتين 03/312 و309 من القانون
      المدني بل تخضع للتقادم الطويل طبقا لنص المادة 308 من نفس القانون.


      ـ أن قضاة المجلس استبعدوا تطبيق أحكام المادتين 309 و312 من القانون المدني دون أن يحددوا الأساس القانوني الذي يمنح للطاعن
      الحق المكتسب وعدم مساس حقوقه بالتقادم رغم مرور عدة سنوات.


      ـ أن القرار المطعون فيه مشوب بالبطلان بسبب عدم تحديد النص القانوني وعدم تطبيق النصوص القانونية المذكورة مما يتعين نقضه
      وإبطاله.

      ـ لكن حيث يبين من القرار المطعون فيه أنه تأسس على أن قرار ترقية المطعون ضده أنشأ حقا ورتب التزاما في ذمة الطاعنة وهو
      بمثابة سند قانوني لا تسري عليه أحكام المادتين 309 و03/312 من القانون المدني وإنما يخضع للتقادم المنصوص عليه بالمادة
      308 من نفس القانون وبذلك أن قضاة المجلس تبنوا عن صواب ما توصلت إليه محكمة الدرجة الأولى كون ما يطالب به المطعون ضده
      هو حق مكتسب يسري بأثر رجعي وليس أجرة ثابتة يدين بها وتنطبق عليها المادة 312 من القانون المدني ومن ثم أن القرار المطعون
      فيه جاء مؤسسا بكفاية ما يتعين معه رفض الإثارة.'
    - 'ـ حيث أنه و بالرجوع إلى أسباب القرار المطعون فيه يتبين و أن قضاة المجلس تطرقوا إلى القرار الآمر بالخبرة والصادر بتاريخ
      2018/01/16 و الذي عين المستأنف عليها ( المطعون ضدها ) لإيداع مبلغ التسبيق عن مصاريف الخبرة لدى أمانة ضبط المجلس  ولتبرير
      رفضهم لدفع المدعى عليها ( الطاعنة ) المثار بهذا الخصوص ذكروا بأن دفع التسبيق وغيره من الإجراءات المصطحبة لإنجاز الخبرة
      يمكن تداركها باللجوء إلى إجراءات خاصة بموجب أعمال قضائية وأخرى ولائية عن طريق الأوامر على العرائض  وعلى أن المصلحة في
      اللجوء إلى الخبرة كانت للمستأنفة ( الطاعنة ) التي لم تكن راضية بمقتضيات الحكم المستأنف ومن ثمة كان عليها السهر في مواصلة
      إجراءات الدعوى في مرحلة الإستئناف  وهو تبرير سليم وكاف لاستبعاد الدفع لاسيما وأن المادة 129 الفقرة الأخيرة من قانون
      الإجراءات المدنية والإدارية رتبت جزاءا على عدم إيداع التسبيق في الأجل المحدد وكان على الطاعنة الإستفادة من أحكامها.

      ـ لكن  حيث أن قضاة المجلس وعلى خلاف ما تمسكت به الطاعنة  إستندوا لتبرير قضائهم بسقوط الخصومة الصادر فيها القرار المؤرخ
      في 2018/01/16 على أحكام المادة 222 من قانون الإجراءات المدنية والادارية والتي نصت على أن واجب القيام بالمساعي اللازمة
      بهدف مواصلة القضية وتقدمها يخص الخصوم أي كلا الطرفين كما أنها أجازت لكليهما طلب السقوط  وعلى ان القرار الآمر بالخبرة
      صدر بتاريخ 2018/01/16 ولا يوجد بالملف أي وثيقة تدل على القيام بمساعي الهدف منها مواصلة الدعوى من أي طرف منذ صدور القرار
      إلى تاريخ قيد دعوى السقوط بتاريخ 2020/01/22 ما يجعل من مدة السنتين ( 2 ) المحددة بنص المادة 223 من نفس القانون قد إنتهت.


      ـ حيث أنه وترتيبا على التعليل أعلاه يكون قضاة المجلس قد برروا بأسباب كافية من الوقائع والقانون ما إنتهوا إليه من فصل
      ، ما يجعل من الوجه غير سديد يتعين رفضه ومعه رفض الطعن بالنقض.


      ـ حيث أن المصاريف القضائية يتحملها خاسر الدعوى طبقا للمادة 378 من قانون الإجراءات المدنية والإدارية.'
