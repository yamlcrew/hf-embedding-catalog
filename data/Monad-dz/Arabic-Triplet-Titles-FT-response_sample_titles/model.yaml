- source_sentence: لكن حيث أن ما يثيره الطاعن في الوجهين في غير محله ذلك أن قرار المحكمة العليا الصادر بتاريخ 2009/04/01 والذي
    نقض الحكم الصادر بتاريخ 2007/05/06 أفاد الطاعن بمبلغ التعويض قدره 150.000 دج وإعادة لإدماج إلى منصب عمله ومن ثم فإن من
    مصلحة الطاعن إعادة السير في الدعوى في الآجال القانونية وليس المطعون ضدها كما جاء في الإثارة لأنه هو المتضرر من إلغاء الحكم
    المؤرخ في 2007/05/06 وليس المطعون ضدها ومنه فإن الإثارة غير سديدة.
  sentences:
  - 'لكن حيث أن الطاعنة تناقش مسائل موضوعية صدر بشأنها حكم قضائي نهائي بتاريخ 2009/07/01 مفسر بالحكم المؤرخ في 2012/02/22
    النهائي و بذلك فلا يجوز لقضاة الموضوع مناقشة تلك المسائل من جديد أثناء مطالبة المطعون ضده بتنفيذ حكم قضائي حائز لقوة الشيء
    المقضي فيه و بذلك فإن قضاة المجلس لما أيدوا بقرارهم الحكم المستأنف مستندين على المادتين 625 من قانون الإجراءات المدنية
    و الإدارية و المادة 39 من القانون 04/90 فإنهم قد طبقوا القانون تطبيقا سليما و النعي بخلاف ذلك في غير محله و بالتالي رفض
    الطعن.


    و حيث أن من خسر الدعوى يتحمل مصاريفها القضائية فإن الطاعنة الطاعنة هي التي تتحملها طبقا للمادة 378 من ق.ا.م.ا.'
  - 'لكن حيث من المقرر قانونا بنص المادة 223 قانون الإجراءات المدنية والإدارية أن سقوط الخصومة تكون بمرور سنتين تحسب من تاريخ
    صدور الحكم أوصدور أمر القاضي الذي كلف أحد الخصوم بالمساعي, وتتمثل المساعي في كل الإجراءات التي تتخذ بهدف مواصلة القضية
    وتقدمها، ومن المقرر قانونا أيضا بنص المادة 222 من قانون اجراءات مدنية وإدارية تسقط الخصومة نتيجة تخلف الخصوم عن القيام
    بالمساعي اللازمة.

    حيث من الثابت بالملف أن القضاة قد عاينوا أن المدعى عليها قامت بتسديد تسبيق مصاريف الخبرة بمبلغ 20.000 دج لدى أمانة ضبط
    المجلس بموجب وصل التسديد المؤرخ في 2016.01.03 الحامل لرقم 0170214 وأن هذا يعد مسعى من المساعي التي يبذلها الخصم للتقدم
    بالقضية وبما أن القرار الأمر بالخبرة صدر في 2015.10.28 وأن تسديد التسبيق جاء في 2016.01.03 ومنه انتهوا إلى رفض الدعوى
    لعدم التأسيس وهو تطبيق سليم للقانون مما يتعين معه رفض الوجه المثار والطعن بالنقض معا.'
  - لكن حيث تبين من القرار المطعون فيه أنه قضى في منطوقه في الشكل عدم قبول إعادة السير في الدعوى لسقوط الخصومة وتحميل المعيدة
    المصاريف القضائية وبذلك فإنه لا يوجد أي تناقض في منطوق القرار المذكور وما أثارته الطاعنة في مضمون الوجه لا علاقة له مع
    عنوانه ذلك أنه لا يوجد أصلا بالقرار المطعون فيه ما يفيد تمديد آجال إيداع الخبرة كما جاء في مضمون الوجه وكل ما ورد في وقائع
    القرار المذكور أن الطاعنة قدمت طلب تمديد الآجال المحددة للخبير لإيداع الخبرة وتم رفضه لأنه لا يقدم من طرفها بل يطالب بذلك
    الخبير المعني ووجود هذه الدفوع مهما كانت الإجابة عليها بالإيجاب أو القبول فإنها لا تشكل تناقض في مقتضيات منطوق القرار
    المطعون فيه ومن ثمة فالإثارة غير سديدة.
- source_sentence: لكن حيث أن ما يثيره الطاعن في الوجهين في غير محله ذلك أن قرار المحكمة العليا الصادر بتاريخ 2009/04/01 والذي
    نقض الحكم الصادر بتاريخ 2007/05/06 أفاد الطاعن بمبلغ التعويض قدره 150.000 دج وإعادة لإدماج إلى منصب عمله ومن ثم فإن من
    مصلحة الطاعن إعادة السير في الدعوى في الآجال القانونية وليس المطعون ضدها كما جاء في الإثارة لأنه هو المتضرر من إلغاء الحكم
