    sentences:
    - 'حيث يتبين فعلا من الحكم المطعون فيه و الوقائع التي جاء بها أن المطعون ضده لم يطلب التعويض عن الضرر الذي لحقه و إنما
      طلب تعويضه بمبلغ 500000 دج عن الطرد التعسفي و أن قاضي الدرجة الأولى إعتبر هذا الطلب عن الضرر الذي لحقه و عوضه عن ذلك
      و من ثم فلا يوجد أي تناقض بين التسبيب و المنطوق و إنما هو فعلا حكم بما لم يطلب كما جاء في آخر الوجه و عدم ذكر الفقرة
      المستند عليها من المادة 4/73 فإن المهم هو ذكر مضمونها كما أن عدم إلغاء قرار التسريح فإن ذلك من تحصيل الحاصل بعد القضاء
      بإعادة الإدماج و من ثم يتعين نقض الحكم المطعون فيه فيما يتعلق بالتعويض عن الضرر الذي لم يطلب.


      و حيث أن من خسر الدعوى يتحمل مصاريفها القضائية فإن المطعون ضده هو من يتحملها طبقا للمادة 378 من ق.ا.م.ا.'
    - حيث إن ما يثيره الطاعنين في هذا الوجه في غير محله , ذلك أنه بالرجوع إلى القرار المطعون فيه يتضح أن قرار النقض والإحالة
      محل إعادة السيّر في الدعوى الصادر بتاريخ 19 - 07 - 2012 كان محل طلب تصحيح خطأ مادي ورد فيه , وفصلا في الطلب أصدرت المحكمة
      العليا قرار بتصحيحه مؤرخ في 21 - 11 - 2013 , ولمّا هذا القرار صدر على إثر إجراء متخذ من قبل المطعون ضدهم بهدف مواصلة
      القضية , فإن هذا القرار وكما إعتبره المجلس عن صواب يعدّ إجراءا قاطعا لمدّة سقوط الخصومة المنصوص عليها بالمادة 223 من
      قانون الإجراءات المدنية والإدارية وحساب أجل سقوط الخصومة يكون بدأ من تاريخ صدوره وليس من تاريخ صدور قرار النقض محل إعادة
      السيّر في الدعوى , وطالما الثابث من القرار المطعون فيه أن إعادة السيّر في الدعوى حصلت بتاريخ 21 - 10 - 2015 أي قبل نفاد
      مدّة سنتين من صدور قرار المحكمة العليا المصحّح لقرار النقض محل إعادة السيّر في الدعوى , فإن قضاة المجلس برفضهم طلب التصريح
      بسقوط الخصومة لم يخالفوا قاعدة جوهرية في الإجراءات , وعليه يتعيّن رفض الوجه
