  sentences:
  - لكن حيث يبين من القرار المطعون فيه أنه صدر حكم في 2013/07/03 قضى بتعيين الخبير باش رابح المحاسب لتحديد نقدا و بدقة حساب
    الفارق في الأجور للفترة المطالب بها و أن هذا الأخير لجأ إلى الخبير في جانفي 2015 و هو المسعى الذي تنطلق منه حساب مدة السنتين
    المنصوص عليها في المادة 223 من ق.ا.م.ا. و طالما أن المطعون ضده أعاد السير في الدعوى في 2015/08/16 بعد أن أودع الخبير تقرير
    خبرته في 2015/06/16 و صدر حكم بالفصل في موضوع الدعوى بتاريخ 2015/11/04 فإنه يكون قد فصل في النزاع في المدة المقررة قانونا
    و هذا ما قضى به القرار المطعون فيه على صواب مما يجعل الفرع المثار غير مؤسس يستوجب رفضه.
  - لكن عكس ما جاء في الوجه فإن مسألة التسريح و التعويض عنه فصل فيها بموجب الحكم الصادر بتاريخ 2010/10/12 القاضي برجوعه إلى
    العمل غير أن الطاعنة رفضت تنفيذه مما يعرضها للتعويض عن هذا الضرر اللاحق به من عدم تنفيذ حكم قضائي طبقا للقواعد العامة
    المنصوص عليها في المادة 625 ق.ا.م.ا. و المواد 124 176 182 ق.مدني و هذا ما قضى به القرار المطعون فيه عن صواب و النعي عليه
    بخلاف ذلك في غير محله.
  - 'حيث يتبين فعلا من القرار المطعون فيه اعتماده للقضاء بعدم استنفاذ الآجال المنصوص عليها في المادة 367 من قانون الإجراءات
    المدنية والإدارية على محضر استلام نسخة من قرار المحكمة العليا مع أن المادة المذكورة تنص على التبليغ الرسمي و منه فالآجال
    المنصوص عليها مرتبطة بالتبليغ الرسمي الذي يكون طبقا للنصوص المنظمة لتبليغ الأحكام وليس استلام النسخة المستخرجة من أمانة
    ضبط المحكمة العليا هذا من جهة .

    حيث من جهة أخرى فإن المدعي في الطعن أشار إلى نص المادة 223 و229 من قانون الإجراءات المدنية والإدارية لتأسيس طلبه الرامي
    لسقوط الخصومة وكان على قضاة المجلس معاينة أن قرار المحكمة العليا الصادر بتاريخ 04/04/2013 والذي قضى بنقض وإبطال القرار
    المطعون فيه المؤرخ في 07/02/2010 وإن لم يتم تبليغه رسميا معاينة الأجل ما بين رفع دعوى السقوط وتاريخ صدور قرار المحكمة
    العليا وهذا لتطبيق الأحكام المنصوص عليها في المادة 223 من قانون الإجراءات المدنية والإدارية ولما قضى قضاة المجلس بخلاف
    هذا يكونوا قد عرضوا قرارهم للنقض والإبطال حيث أن المصاريف على من خسر الدعوى.'
