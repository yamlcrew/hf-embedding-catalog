  sentences:
  - 'حيث يتبين فعلا من الحكم المطعون فيه و الوقائع التي جاء بها أن المطعون ضده لم يطلب التعويض عن الضرر الذي لحقه و إنما طلب
    تعويضه بمبلغ 500000 دج عن الطرد التعسفي و أن قاضي الدرجة الأولى إعتبر هذا الطلب عن الضرر الذي لحقه و عوضه عن ذلك و من
    ثم فلا يوجد أي تناقض بين التسبيب و المنطوق و إنما هو فعلا حكم بما لم يطلب كما جاء في آخر الوجه و عدم ذكر الفقرة المستند
    عليها من المادة 4/73 فإن المهم هو ذكر مضمونها كما أن عدم إلغاء قرار التسريح فإن ذلك من تحصيل الحاصل بعد القضاء بإعادة
    الإدماج و من ثم يتعين نقض الحكم المطعون فيه فيما يتعلق بالتعويض عن الضرر الذي لم يطلب.


    و حيث أن من خسر الدعوى يتحمل مصاريفها القضائية فإن المطعون ضده هو من يتحملها طبقا للمادة 378 من ق.ا.م.ا.'
  - حيث إن ما يثيره الطاعنين في هذا الوجه في غير محله , ذلك أنه بالرجوع إلى القرار المطعون فيه يتضح أن قرار النقض والإحالة
    محل إعادة السيّر في الدعوى الصادر بتاريخ 19 - 07 - 2012 كان محل طلب تصحيح خطأ مادي ورد فيه , وفصلا في الطلب أصدرت المحكمة
    العليا قرار بتصحيحه مؤرخ في 21 - 11 - 2013 , ولمّا هذا القرار صدر على إثر إجراء متخذ من قبل المطعون ضدهم بهدف مواصلة القضية
    , فإن هذا القرار وكما إعتبره المجلس عن صواب يعدّ إجراءا قاطعا لمدّة سقوط الخصومة المنصوص عليها بالمادة 223 من قانون الإجراءات
    المدنية والإدارية وحساب أجل سقوط الخصومة يكون بدأ من تاريخ صدوره وليس من تاريخ صدور قرار النقض محل إعادة السيّر في الدعوى
    , وطالما الثابث من القرار المطعون فيه أن إعادة السيّر في الدعوى حصلت بتاريخ 21 - 10 - 2015 أي قبل نفاد مدّة سنتين من صدور
    قرار المحكمة العليا المصحّح لقرار النقض محل إعادة السيّر في الدعوى , فإن قضاة المجلس برفضهم طلب التصريح بسقوط الخصومة
    لم يخالفوا قاعدة جوهرية في الإجراءات , وعليه يتعيّن رفض الوجه
  - لكن حيث تبين من القرار المطعون فيه أنه قضى في منطوقه في الشكل عدم قبول إعادة السير في الدعوى لسقوط الخصومة وتحميل المعيدة
    المصاريف القضائية وبذلك فإنه لا يوجد أي تناقض في منطوق القرار المذكور وما أثارته الطاعنة في مضمون الوجه لا علاقة له مع
    عنوانه ذلك أنه لا يوجد أصلا بالقرار المطعون فيه ما يفيد تمديد آجال إيداع الخبرة كما جاء في مضمون الوجه وكل ما ورد في وقائع
    القرار المذكور أن الطاعنة قدمت طلب تمديد الآجال المحددة للخبير لإيداع الخبرة وتم رفضه لأنه لا يقدم من طرفها بل يطالب بذلك
    الخبير المعني ووجود هذه الدفوع مهما كانت الإجابة عليها بالإيجاب أو القبول فإنها لا تشكل تناقض في مقتضيات منطوق القرار
    المطعون فيه ومن ثمة فالإثارة غير سديدة.
- source_sentence: 'عن الوجه الاول المثار من دفاع الطرف المدني الطاعن


    حيث ما يدعيه الدفاع غير سديد ذلك انه وبمراجعة القرار المطعون فيه تبين منه ان قضاة المجلس سببوا قرارهم تسبيبا كافيا واكدوا
    على ان الوقائع شملها التقادم واشاروا الى عدم وجود اي اجراء من الاجراءات القاطعة للتقادم اوفعل من الافعال القاطعة للتقادم
    ومن ثمة فان هذا الوجه غير سديد ويرفض.'
  sentences:
  - 'عن الوجه الوحيد


    حيث أنه بخلاف ما تدعيه الطاعنة ادارة الضرائب فإنه تبين من خلال مراجعة أوراق الملف لاسيما القرار المطعون فيه أن قضاة المجلس
    سببوا قرارهم تسبيبا كافيا بخصوص الدعوى الجبائية ذلك أنهم صرحوا بأنقضائها بالتقادم على أساس مرورأكثر من 6 سنوات من تاريخ
    صدور الحكم الغيابي المؤرخ في2000/6/4 دون اتخاذ أي إجراء من إجراءات القاطعة للتقادم الى غاية تسجيل معارضة المتهم بتاريخ
    2011/01/03 وهو الأمر الذي يجعل الدعوى الجبائية قد تقادمت طبقا للمواد 305 /03 من قانون الضرائب المباشرة و 564 / 2 من قانون
    الضرائب غير المباشرة و110 و127 من قانون الإجراءات الجبائية.


    وحيث أن هذه الأسباب تعد كافية ولايشوبها أي قصور ومن ثمة جاء الوجه المثارغير وجيه مما يتعين رده وبالتالي التصريح برفض الطعن.'
  - 'عن الوجهين الاول والثاني لترابطهما وتطابقهما


    حيث انه بمراجعة القرار المطعون فيه يتضح ان قضاة المجلس اسسوا قضاءهم على حيثية عامة وسطحية لا تفيد انهم ناقشوا وقائع الافعال
    المنسوبة الى المتهم الطاعن ومحصوا الادلة والقرائن فيها وهذا في قولهم "حيث ان قاضي الدرجة الاولى اصاب في حكمه مما يستوجب
    تاييده" وحتى بالرجوع الى هذا الحكم لا يتبين منه ان قاضي الدرجة الاولى استند في اثبات الجريمة المنسوبة الى المتهم الطاعن
    على ادلة قائمة وموضوعية ومتسانده تؤدي بوضوح الى النتيجة التي انتهى اليها بخصوص هذا المتهم عدا تصريحات متهم اخر في نفس
    القضية الغير مدعمة بقرائن اخرى.


    حيث انه بات جليا مما سبق بيانه ان قضاة الموضوع قد شابوا قضاءهم قصور التعليل والبيان وبالتالي عرضوا قرارهم الى النقض والابطال.'
  - 'عن الوجه الوحيد المثار

    حيث أنه بالرجوع إلى القرار المطعون فيه نجد أنه وخلافا لما يدعيه الطاعن فإن ادارة الجمارك قد حضرت أمام المحكمة وقدمت عريضة
    مؤرخة في 2000/07/02 تطالب فيها الزام المتهم بأدائه لها غرامة جمركية بقيمة ( 60.800 ) دج مع مصادرة البضاعة المحجوزة وهذا
    ما يفيد أن الحكم كان غيابيا بالنسبة للمتهم وليس بالنسبة لإدارة الجمارك الطاعنة.

    حيث أنه بالرجوع إلى اوراق الملف يتبين أن الحكم صدر غيابيا في حق المتهم بتاريخ 2000/07/17 وأن ادارة الجمارك قدمت استئناف
    للحكم بتاريخ 2017/05/18 أي بعد مدة تزيد عن 15 سنة مما يجعل دعوى الجمارك قد تقادمت طبقا للمادة 268 من قانون الجمارك التي
    تحددها بأربع سنوات وحيث أن المتهم تمت متابعته بجنحة حيازة بضاعة ذات مصدر أجنبي بدون رخصة طبقا لقانون الجمارك و ليس طبقا
    لقانون محاربة الجرائم المنظمة العابرة للحدود مما يجعل الوجه المثار غير سديد و يترتب على ذلك التصريح برفض الطعن.'
