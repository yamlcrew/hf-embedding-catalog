      بدلا من منحها تعويض مضاعف ب 40% من الرأسمال التأسيسي الذي حصلت عليه بموجب الحكم المؤرخ في 2010/04/04 المؤيد بالقرار
      المؤرخ في 2011/03/22  ذلك أن الفقرة الثامنة من البند الرابع من ملحق القانون88 ـ31 تضمنت " يضاعف الرأسمال أو المعاش بنسبة
      40% " يستخلص منها أنه تكون المضاعفة مربوطة بنوع التعويض المحكوم به  إن كان إجماليا أم معاش شهري  فكان على قضاة المجلس
      التقيد بمقتضياتها  و لما لم يفعلوا عرضوا قرارهم للنقض و الإبطال .


      ـ حيث أن المصاريف القضائية يتحملها خاسر الطعن طبقا للمادة 378 من قانون الإجراءات المدنية و الإدارية.'
    - 'ـ فعلا حيث يتبين من الملف و القرار المطعون فيه  أنّ الطاعنة حددت طلباتها في عريضة إرجاع الدعوى بعد الخبرة  أمام المجلس  وفقا
      لما توصلت إليه الخبرة  ملتمسة إلزام المطعون ضده بدفع مبلغ 1.816.409 دج قيمة الأشغال المنجزة و مبلغ 191.200 دج قيمة المواد
      غير المستعملة و مبلغ 79.400 دج القيمة المغلقة  فيصبح المبلغ الإجمالي قدره 2.087.009 دج غير أنه بالرجوع للقرار المطعون
      فيه  يتبين أنّ قضاة المجلس اكتفوا بالرد على طلبات الطاعنة المتعلق بالمواد غير المستعملة و منحوها تعويضا عنها بمبلغ 191.000
      دج  و لم يفصلوا في طلباتها المتعلقة بقيمة الأشغال المنجزة و قيمة اليد العاملة  رغم تقريرهم بأنّ ما توصلت إليه الخبرة
      المعتمدة من طرفهم جاء دقيقا و شاملا  و بذلك لم يفصلوا في طلب أصلي للطاعنة وفقا للقانون بالقبول أو الرفض  و منه فإنّ
      الوجه سديد يتعين به نقض و إبطال القرار المطعون فيه .


      ـ حيث أنّ المصاريف القضائية يتحملها خاسر الطعن طبقا للمادة 378 من قانون الإجراءات المدنية و الإدارية .'
  - source_sentence: 'حيث أنه بالرجوع إلى القرار المنتقد أنه أيد الحكم المستأنف الذي قضى بطرد الطاعنة الحالية من المسكن الذي
      استفادت به مؤقتا من طرف مصالح ديوان الترقية والتسيير العقاري لولاية بومرداس إثر الإنفجار الإرهابي الذي مس مسكنها هذا
      مقابل التعهد بإخلائه واسترجاعه وثبت أنها تحصلت على كافة التعويضات المقررة بموجب المرسوم التنفيذي رقم 47/99 المؤرخ في
      1999/02/13 الخاصة بضحايا الإرهاب هذه التعويضات التي تمكنها من ترميم وإعادة بناء مسكنها.


      حيث أن قضاة المجلس أكدوا على الطابع المؤقت والإستعجالي لإسكان الطاعنة في المسكن المراد إسترجاعه ذلك منذ 2008 .


      حيث أن قضاة المجلس إعتبروا أن السكن الممنوح للطاعنة الحالية منح لها بموجب تسخيرة وبصفة مؤقتة إلى حين ترميم مسكنها وأن
      الطاعنة لم تقم بترميم مسكنها رغم أنها تحصلت في 2008 على مبلغ 2.050.267،50 دج في إطار تعويض نتيجة الخسائر المادية التي
      لحقت مسكنها وكون أنها لم تقم بذلك لا يكون أساسا لرفض دعوى الطرد المرفوعة من طرف ديوات الترقية والتسيير العقاري.


      حيث أن قضاة الموضوع إعتبروا على حق أن شغل الطاعنة للسكن محل النزاع بعد حصولها على تعويض لا يستند إلى أي حق أو سند .


      حيث أن القرار المطعون فيه جاء مؤسسا تأسيسا قانونيا ويبقى الوجه المثار غير سديد تعين رفضه وبالتبعية رفض الطعن بالنقض
      موضوعا.'
    sentences:
    - 'حيث أنه وبمراجعة القرار المطعون فيه ارتكز على أن التصرف في العقار بالبيع هو عقد رضائي شكلي وأن المستانف عليه ( الطاعن
      الحالي ) لم يثبت أنه ارتبط بعقد وعد بالبيع رسمي ومشهر أو ما يعادل ذلك وأن نقل ملكية العقار تخضع لإرادة البائع وأن الوكالة
      أبدت رغبتها في تسوية الوضعية متى نفذ المستأنف عليه الإلتزامات المحددة من طرفها.

      لكن حيث تبين وكما يثيره الطاعن أن المطعون ضدها وكالة التسيير والتنظيم العقاري الحضري لولاية وهران منحت له قرار تخصيص
      استفاد بموجبه من مسكن تطوري في إطار الصندوق الوطني للسكن مؤرخ في 2007/04/16 فوق أرض منحت للوكالة من طرف البلدية التي
      حسب زعم لطاعن قامت بالتهيئة.


      حيث أنه دفع الطاعن للوكالة مبلغ السكن كاملا المحدد في المادة 02 من قرار التخصيص واستلم مفاتيح

      حيث أنه وعلى خلاف ما جاء في القرار المطعون فيه أن المطعون ضدها الوكالة كانت قد التزمت بموجب المادة الرابعة من قرار الإستفادة
      بتحرير عقد البيع النهائي للمسكن محل النزاع وفي باب الإلتزامات التعاقدية فإذا كان الطاعن قد نفذ إلتزاماته المتمثلة في
      تسديد مبلغ الشقة فإن المطعون ضدها ملزمة بإتمام إجراءات البيع، في حين فإنها قد أخلت بما تعهدت به وهذا خرقا لنص المادة
      106 من القانون المدني.


      حيث أن القرار المطعون فيه اعتبر أن الدعوى تنصب على عقار ومن ثم تعين التقيد بالشكلية الرسمية والشهر لكن يقر أنه يجب أن
      يكون تبادل رضائي بين الطرفين وهذا يتجلى من خلال قرار التخصيص نفسه.

      حيث من الثابت وعلى ضوء الوثائق المقدمة من طرف الطاعن والتي تبناها القرار المطعون فيه على أنه يملك سند قانوني يخول له
      الحق في إمتلاك السكن ودفع مستحقاته، ومنه فإن القرار المطعون فيه جاء قاصرا في أسبابه مما تعين نقضه وإبطاله.'
    - 'حيث أنه بالرجوع إلى القرار المنتقد أنه أيد الحكم المستأنف الذي قضى بعدم قبول الدعوى لرفعها على غير ذي صفة.


      حيث أن الطاعن الحالي تنازل عن إستفادته من السكن التابع للمطعون ضده صندوق التوفير والإحتياط لولاية بجاية وكذا فوائد الإدخار
      لفائدة زوجته السابقة ذلك بموجب التنازل المؤرخ في 1997/11/13.


      حيث أنه بناء على هذا التنازل الذي يجسد رغبة الطاعن الحالي أن المطعون ضده جعل هذه الإستفادة لفائدة زوجته التي تم فك الرابطة
      الزوجية مع الطاعن في سنة 2005 وهذا التنازل هو موضوع طلب البطلان الحالي.

      حيث أنه تعين الملاحظة والإثبات أن المطعون ضده لم يكن فعلا طرفا في هذه الوثيقة والتي لا تسري عليها المادتين 324/ مكرر1
      و793 من القانون المدني والمادتين 15 و 16 من الأمر 75-74 المؤرخ في 1975/11/12 المتضمن إعدادا مسح الأراضي العام وتأسيس
      السجل العقاري كون ان رسالة التنازل مجرد وثيقة عرفية بين الطاعن وطليقته والإلتزام الموجود به هو على عاتق الطاعن وليس
      الغير أما عن مخالفة قضاة المجلس للمادة 7 من القرار الوزاري المشترك المؤرخ في 1993/11/3 فإنها تنص على انه يمكن لكل شخص
      طبيعي مدخر أن يكتسب مسكن من مساكن الترقية العقارية الممولة بأموال الإدخار ويمكن له أن يستفيد تنازلا عن حقوق الفوائد
      التي تنتجها الحسابات إلى أجل أو الدفاتر التي يملكها أصوله أو فروعه المباشرون.


      حيث أن هذه المادة لا تخص قضية الحال لأن الطاعن هو الذي تنازل عن فوائد الإدخار لفائدة زوجته.


      حيث ان المطعون ضده كما جاء به قضاة الموضوع ليس له أية صفة لكي يتم التقاضي ضده.


      حيث أن دون الخوض في موضوع التنازل المراد بطلانه أن قضاة الموضوع طبقوا صحيح القانون وسببوا قرارهم تسبيبا كافيا ووافيا
      عندما قضوا بعدم قبول الدعوى لرفعها على غير ذي صفة.


      حيث أن الوجهين غير سديدين تعين رفضهما وبالتبعية رفض الطعن بالنقض موضوعا لعدم التأسيس.


      حيث أن من يخسر دعواه يلتزم بالمصاريف القضائية طبقا لنص المادة 378 من قانون الإجراءات المدنية والإدارية.'
    - 'عن الوجهين معا لترابطهما

      حيث أنه يتبين من وقائع القضية والمستندات أن الدعوى ترمي إلى إلزام الطاعن بدفعه للمطعون ضده مبلغ1.074.510,33دج الذي يمثل
      قيمة الرهن الذي كان على العقارالمباع ومبلغ600.000,00دج تعويضا عن الضررالمادي والمعنوي وصدر الحكم المعاد الذي ألزم الطاعن
      بتسديد مبلغ الدين الذي في دمته المقدر ب1.074.510.33دج المؤيد بالقرارالمطعون فيه.


      حيث أن المادة323 من القانون المدني تنص على أن إثبات الإلتزام يقع على الدائن وعلى المدين يقع عبئ إثبات التخلص منه.


      حيث ان قضاة الموضوع قد طبقوا أحكام المادة323 من ق م وأثبتوا الإلتزام الواقع على عاتق الطاعن إعتمادا على الوصل رقم 2013/195
      الذي يفيد أن المطعون ضده قام بدفع المبلغ نيابة عن الطاعن وهذا الوصل يعد سندا قانونيا صحيحا لإثبات الدين في ذمة الطاعن,وأن
      الطاعن لم يثبت تخلصه من الدين طبقا لما تقضي به المادة323 من القانون المدني.


      كما أن القضاة غير ملزمين بالإجابة على الدفوع و الطلبات التي هي غير منتجة في الدعوى و عليه فالوجهين المثارين غير مؤسسين
      يتعين رفضهما ومعهما رفض الطعن.'
  - source_sentence: 'ـ عن الوجه الأول


      ـ حيث ما تعيبه الطاعنة على القرار في غير محله  ذلك أن قضاة المجلس استبعدوا التعهد المحرر من قبل الموثق لأنه لا يعد اقرارا
      قضائيا طبقا للمادة 318 من القانون المدني  مما يجعل الوجه غير مؤسس .'
    sentences:
    - 'عن الوجه الثاني


      حيث أن النعي على القرار بقصور التسبيب غير مؤسس لأنه بالرجوع إلى القرار المنتقد نجد أن قضاة المجلس قد سببوه بما فيه الكفاية
      و لم يشوهوه بعيب قصور التسبيب و انتهوا فيه إلى أن الإقرار الذي صدر عن الخصم أثناء مرافعة سابقة و لو أمام نفس الجهة القضائية
      فإنه يعتبر إقرار غير قضائي وتختلف حجته عن الأول الأمر الذي يتعين معه اعتبار تصريحات المطعون ضدها الأولى أمام القاضي
      الجزائي إقرار غير قضائي و يتعين استبعاده من النقاش, و بذلك يكون هذا الوجه بدوره غير سديد و يرفض.'
    - 'ـ عن الوجه الوحيد


      حيث يرد على هذا الوجه أنه بالرجوع إلى القرار المطعون فيه يتبين أن قضاة الموضوع قد سببوا قضاءهم تسبيبا كافيا بيّنوا فيه
      بأن المستأنفة قدمت فواتير غير مفصلة و الجدول المرفق بها هو الآخر غير مفصل و مبهم مما جعلهم لا يتمكنون من تحديد الفترة
      الزمنية التي تقاعس فيها المستأنف عليه عن دفع مستحقات استهلاك الكهرباء كما أنهم لاحظوا بمقارنة الفواتير بأنها فواتير
      تختلف عن الفواتير العادية فهي تشمل المبلغ فقط دون تحديد الفترات التي تمت الفوترة عنها بخلاف المستأنف عليه الذي قدم لقضاة
      الموضوع مجموعة من نسخ الفواتير متعلقة بالسنوات من 1990 إلى 2002 و معها وصولات التسديد.

      و حيث طالما أن قضاة المجلس بما لهم من سلطة تقديرية خولها لهم القانون قد انتهوا إلى كون الطاعنة لم تستطع إثبات الدين
      في ذمة المطعون ضده و منذ البداية لم تحدد بالضبط الفترة التي تقاعس فيها هذا الأخير عن الدفع. و عليه فالوجه المثار غير
      مبرر و يتعين رفضه و معه رفض الطعن.'
    - 'ـ عن الوجه الوحيد


      حيث يرد على هذا الوجه ان الأمر على خلاف ما زعم الطاعن ذلك أن قضاة الموضوع قد أسسوا قضاءهم تأسيسا قانونياصحيحا يستند
      إلى المادة 324 مكرر1 من القانون المدني و المادة 29 من القانون رقم 90/25 المتعلق بالتوجيه العقاري. و أن القضاة غير ملزمين
      بمناقشة الدفوع التي هي غير منتجة في الدعوى و لا طائلة من التحقيق في ظروف البيع الذي تم باطلا من أساسه، و عليه فالوجه
      غير مبرر و يتعين رفضه و معه رفض الطعن.


      و حيث أن طلب التعويض الذي تقدم به المطعون ضده غير مؤسس ذلك ان الطعن بالنقض هو حق إجرائي منصوص عليه قانونا و لم يثبت
      أن الطاعن لمجرد لجوءه إلى استعمال هذا الحق كان متعسفا و أراد الإضرار بخصمه مما يتعين معه رفض هذا الطلب.'
  - source_sentence: 'حيث أنه للأسباب المبينة أعلاه فإن الوجهين للطعن بالنقض غير مبررين يتعين رفضهما، و بالنتيجة رفض الطعن
      بالنقض لعدم التأسيس.


      حيث أن المصاريف القضائية تقع على عاتق الطاعنة طبقا لنص المادة 378 من قانون الإجراءات المدنية والإدارية.'
    sentences:
    - حيث أنه للأسباب المبينة أعلاه فإن الوجه المثار من طرف الطاعن جاء غير مؤسس قانونا مما يستوجب بذلك رفض الطعن بالنقض لعدم
      التأسيس .
    - 'حيث يستخلص من وقائع القضية والقرار المطعون فيه , أن دعوى الحال ترمي إلى طلب المدعية المطعون ضدها إلزام الطاعن بأن يدفع
      لها , مبلغ الدين الذي لها بذمته المقدّر ب 430.000 دج , بحجة أنه يمثل الباقي من مبلغ الإيجار السنوي للسيارة المؤجرة له
      بموجب عقد توثيقي محرّر بتاريخ 12 - 01 - 2014


      حيث الظاهر من القرار المطعون فيه أن قضاة المجلس برّروا رفضهم دفع الطاعن بكونه كان فعلا مدين للمطعون ضدها بالمبلغ المطالب
      به , غير أنه قد دفعه لها بواسطة الشاهد المدعو بوجاجة هشام , وعلى المجلس سماعه وتلقي شهادته , بعدم تأسيس هذا الدفع لكون
      الدين يفوق مبلغ 100.000 دج ( مائة ألف دينار جزائري ) وإثباث التخلص من الإلتزام بالوفاء به , يكون بالكتابة والطاعن لم
      يقدم سند مكتوب مثبث لتخلصه من الدين.

      وحيث خلافا لما يدعيه الطاعن بهذا التعليل الذي مؤداه أن إثباث إنقضاء إلتزامه بدفع الدين المطالب به , بالنظر إلى مقداره
      , وعدم توافر حالتي جواز الإثباث بالشهود , يكون وجوبا بالكتابة , قضاة المجلس قد برّروا قرارهم بأسباب كافية لحمله , إذ
      تتفق وأحكام المادتين 333 الفقرة 01 و 336 الفقرة 01 من القانون المدني , وعليه يتعيّن رفض الوجه وبالتالي رفض الطعن'
    - 'حيث أنه للأسباب المبينة أعلاه فإن أوجه الطعن بالنقض المثارة من طرف الطاعن جاءت غير مبررة قانونا مما يتعين معه رفض الطعن
      بالنقض لعدم التأسيس .


      حيث أن المصاريف القضائية تقع على عاتق الطاعن طبقا لنص المادة 378 من قانون الإجراءات المدنية و الإدارية.'
