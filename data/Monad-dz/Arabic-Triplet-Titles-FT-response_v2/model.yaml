      , وعليه يتعيّن رفض الوجه'
    sentences:
    - 'حيث أنه ثابت أن موضوع النزاع يتلخص في طلب الطاعن باعتباره دائن الرجوع على المحجوز لديه مؤسسة كهربة الجزائر بخصوص المبلغ
      المترتب في ذمة المحجوز عليه بوجرادة جمال الممثل للشيك بدون رصيد  على اعتبار أن التقرير بما في الذمة غير مطابق للحقيقة  فصدر
      الحكم المستأنف القاضي برفض الدعوى لعدم التأسيس  على أساس أن المطعون ضدها قدمت تقريرها وفقا للمادة 679 من قانون الإجراءات
      المدنية والإدارية  وبعد الاستئناف صدر القرار محل الطعن الحالي القاضي بالتأييد .

      حيث أنه ثابت بالرجوع إلى القرار محل الطعن  فإنه مسبب تسبيبا كافيا  وناقش دفوع الطاعن والفواتير المحتج بها والتي لم يحل
      أجلها وطبق صحيح القانون  مما تعين رفض هذا الوجه لعدم تأسيسه .'
    - حيث لئن نص المشرّع في المادة 553 الفقرة 08 من قانون الإجراءات المدنية والإدارية على وجوب تضمن القرار العناوين المهنية
      للمحامين , إلاّ أنه لم يرتب البطلان على إغفال ذكر هذه البيانات في القرار , والمقرّر بالمادة 60 من قانون الإجراءات المدنية
      والإدارية , أنه لا بطلان للأعمال الإجرائية شكلا بدون نص ودون إثباث الضرر , وعليه يتعيّن رفض الوجه
    - 'حيث اتضح وبالرجوع إلى القرار المطعون فيه أن المجلس رفض دعوى المدعيين في الطعن بالنقض الرامية إلى طرد المدعى عليهما
      في الطعن بالنقض من القطعة الأرضية موضوع النزاع مسببا قراره على أن المدعى عليها في الطعن "ب.ع" ليست وارثة شرعية للمرحوم
      "ط.ع" وأن المدعى عليه في الطعن المدعو "ل.ط" يشغل القطعة الأرضية المتنازع من أجلها بترخيص من الوارثة الشرعية.


      حيث أن المدعيين في الطعن بالنقض يتمسكان بتقرير الخبرة الذي أنجزه الموثق بناء على الحكم القضائي الصادر في 1964/08/19
      والذي انتهى فيه إلى أن المرحوم "ط.ع" الذي هو زوج المدعى عليها في الطعن ليس من ورثة المرحوم "ط.ع" غير أنه بالرجوع إلى
      القرار المطعون فيه تبين أن قضاة المجلس لم يجيبوا على هذه الدفوع كما تقتضيه نص المادة 277 من قانون الإجراءات المدنية
      والإدارية التي توجب الرد على كل الطلبات والأوجه المثارة.


      حيث أن المجلس ذهب إلى اعتبار وتأكيد أن المدعى عليها في الطعن بالنقض وارثة شرعية للمرحوم "ط.ع" لأن زوجها "ط.ع" وأخيه
      المرحوم "ط.ب" هم إلى جانب والد المدعين "ل.أ" الذي هو زوج "ط.ع" ابن "ط.ع" إلى جانب أطراف أخرى يعدون من ورثة المرحوم "ط.ع"
      حسب تصريح المدعين في الحكم الصادر في 2008/12/31 المؤيد بقرار المجلس الصادر في 2010/04/08.


      حيث أنه كان على قضاة المجلس مما لهم من وسائل قانونية للوقوف على النزاع التحري والبحث في صفة المدعى عليها في الطعن قبل
      الإقرار بأنها تشغل القطعة الأرضية بصفتها مالكة لها في الشيوع وهذا بطلب وإحضار الوثائق الرسمية التي تثبت الصفة، ومنه
      فإن القرار المطعون فيه جاء قاضرا في التسبيب مما يعرضه للنقض والإبطال.'
  - source_sentence: 'عن قبول مذكرة الرد


      حيث لا يوجد بالملف ما يفيد تبليغ مذكرة الرد لمحامي الطاعنة كما يجب قانونا بنص المادة 568 قانون إجراءات مدنية وإدارية
      مما يتعين معه عدم قبولها.'
    sentences:
    - 'عن الوجه الثاني


      حيث أن المقصود بمخالفة الأشكال الجوهرية في الإجراءات هو مخالفة أشكال إجرائية منصوص عليها تحت طائلة البطلان و الدفع المثار
      في هذا الوجه يرمي إلى إعابه على القرار المطعون فيه إغفال القضاة وعدم مناقشتهم الإجراء المتعلق بإنعدام الصفة لدى المطعون
      ضده و الحال هو دفع يتعلق بموضوع الدعوى و أسانيدها و لا شأن له بالأشكال الجوهرية في الإجراءات و بالتالي يتعين رفض هذا
      الوجه .'
    - لكن حيث أن الطاعنة لم تبين ما هو الضرر الذي لحقها من جراء ذكر التسمية المحتج بها و منه و طبقا للمادة 60 من قانون الإجراءات
      المدنية و الإدارية فإن الوجه يكون غير سديد و يرفض
    - 'عن الوجهين معا لإرتباطهما

      لكن حيث من الثابت من القرار المطعون فيه أن القضاة بعد تلاقيهم لأوامر الحجز على حساب الطاعن بقيمته 8.931.396.96دج توصلوا
      بعد ذلك بشيكين صادرين على نفس الطاعن بمبلغ 68000دج للأول ومبلغ 35.100دج للثاني وبعد تأكدهم من أن حساب الطاعن لايغطي
      كل المبالغ وجهوا لهذا الأخير أمر بالتسوية عارض الدفع على إعتبار أن المبلغ الموجود بالحساب قد خصص للوفاء بالدين غير أن
      ذلك بقي بدون جدوى سيما أن المادة 682 قانون إجراءات مدنية وإدارية تمنع المحجوز لديه الوفاء من المبالع المحجوزة المدين
      المحجوز عليه من تاريخ توقيع الحجز وأن هذا لايتعارض مع المادة 19 من تعلمة بنك الجزائر رقم 01-2011 التي نصت على تبليغ
      إرسالية عارض الدفع في حالة الرصيد أقل من مبلغ الشيك الصادر وهو ماإلتزم به المطعون ضده ومنه فإن القرار وعكس ماذهب إليه
      الطاعن جاء مسببا تسبيبا كافيا والقضاة قد أحسنوا التقدير وعليه تعين رفض الوجهين المثارين والطعن معا.'
  - source_sentence: 'حيث يتبين من القرار المطعون فيه أن الطاعنة تمسكت أمام المجلس بدفعها بكون شركة فيجيل بليوس هي من ألزمت
      بموجب السند التنفيذي المتمثل في الحكم الصادر بتاريخ 23 - 07 - 2013 عن محكمة حاسي مسعود قسمها الإجتماعي بتعويض المطعون
      ضده بختي هواري و الأمر بحجز ما للمدين لدى الغير المؤرخ في 04 - 06 - 2014 وكذا أمر التخصيص المؤرخ في 2014 ـ 07 ـ 22 المعتمدين
      في سحب مبلغ التعويض من حسابها البريدي رقم 350526 مفتاح 31 ـ صدرا ضد هذه الشركة و لعدم وجود أية علاقة بينها و شركة فيجيل
      بليوس المدينة ـ المحضر القضائي المطعون ضده أخطأ بمباشرة تنفيذ الأمرين بالحجز والتخصيص على حسابها البريدي


      حيث الظاهر من القرار المطعون فيه أن قضاة المجلس علّلوا قضائهم برفض دعوى الطاعنة لعدم التأسيس بالقول " أن الطاعنة لم
      تكلف نفسها البحث على الشركة التي تسمى فيجيل بليوس لتطالبهاعلى الأقل وديا ـ ثم تدخلها في الخصام لاحقا ـ إذا صح ما تدعيه
      بأنها ليست شركة فيجيل بليوس ولا علاقة لها بهذه الشركة و أن العقد الذي تمسكت به عقد تعديلي لتسميتها من شركة فيجيل قروب
      إلى فيجيل فورماسيبون وعنوانها الإجتماعي يختلف عن ذلك المدوّن في سجلها التجاري المؤرخ في 26 - 09 - 2016 المحدد فيه تاريخ
      بداية نشاطها بسنة 1998 و أنه من غير المعقول أن تكون شركة فيجيل قروب لها نفس الحساب البريدي لشركة فيجيل بليوس و المطعون
      ضده لا يتحمل الخطأ في التسمية الوارد في الحكم و الأوامر إن هو واقع فعلا ......"


      حيث بهذا التعليل المبني على إفتراضات قضاة المجلس لم يبرروا قرارهم بأسباب مؤسسة على وسائل و أسانيد قانونية ـ ذلك أنه
      وفقا للمادة 201 من قانون الإجراءات المدنية و الإدارية يمكن للقاضي ولو من تلقاء نفسه أن يأمر أحد الخصوم عند الإقتضاء
      ـ تحت طائلة غرامة تهديدية بإدخال من يرى إدخاله مفيدا لحسن سير العدالة و لإظهار الحقيقة ـ و طبقا للمادة 27 الفقرة 02
      من ذات القانون " يجوز للقاضي أن يأمر شفهيا بإحضار أية وثيقة يراها ضرورية لحل ا نزاع " ولما الفصل في إدعاء الطاعنة بإنعدام
      أية علاقة بينها و شركة فيجيل بليوس ـ يتوقف على البحث في مسألة تخصيص الحساب البريدي الموقع عليه أمري حجز ما للمدين لدى
      الغير و التخصيص للشركة المدينة المسماة فيجيل بليوس ـ وكذا الشركة الطاعنة فإنه كان يتعين على المجلس إستنادا الى أحكام
      المادتين 27 الفقرة 02 و 201 من قانون الإجراءات المدنية والإدارية السالف ذكرها أن يأمر الطاعنة أو أحد الخصوم بإدخال في
      الخصومة شركة فيجيل بليوس ـ وكذا أمر الطاعنة بإحضار قانونها التأسيسي المدعى من طرفها أنه يؤكد إنعدام علاقتها بشركة فيجيل
      بليوس ـ وبأن هذه الأخيرة ليست فرعا تابع لها ـ وإحضار وسيلة قانونية مبين فيها سبب تخصيص لها رقم الحساب البريدي المفتوح
      بإسم شركة فيجيل بليوس ـ ومن خلال تحليل هذه الوسائل معاينة مدى صحة إدعاء الطاعنة بسحب خطأ من حسابها البريدي المبلغ المطالب
      إسترداده و عليه دون حاجة للرد على الوجهين الأخرين يتعين نقض القرار'
    sentences:
    - 'حول الأوجه المثارة لإرتباطهم

      حيث يتبين من تفحص القرار المطعون فيه أن قضاة المجلس إستنتجوا " ...أن البنك المحجوز لديه ليس له ضلع في عملية الخصم من
      حساب بن فسيح المدين المحجوز عليه و لا يوجد بالملف ما يفيد أنه مقصرا فيما هو ملزم به أو أنه قدم تصريحا مخالفا للحقيقة
      أو أخفى أوراقا هو ملزم بإيداعها لتأييد التصريح , و خلصوا أن أمام عدم وجود ما يفيد على أنه أخل بإلتزامه المنصوص عليه
      في المادة 679 ق إ م إ يتعين رفض الدعوى لعدم التأسيس".

      حيث أنه ثابت أن المدعو بن فسيح محمد هو مدين للبنك الوطني الجزائري وكالة فيلالي قسنطينة لقرض إستفاد منه على أن يسدده
      عن طريق أقساط تقتطع آليا من حسابه عند حلول أجل إستحقاقها غير أن البنك قد بلّغ بتاريخ 2018/11/11 بأمر يتضمن حجز تحفظي
      على ما يكون ما للمدين لدى الغير للمحجوز لديه بموجب محضر محرر من طرف المحضر القضائي الأستاذ بصير الشريف و نوه في المحضر
      أنه أعذر المحجوز لديه بأنه حارسا عن الأموال المحجوزة لديه بعدم التخلي عنها و عدم تسليمها إلى المدين أو غيره إلا بصدور
      أمر مخالفا طبقا للمادة 669 ق إ م إ.


      لما ثبت أن المطعون ضده رغم تصريحه بوجود لديه مبلغ 2.125.168,86 دج في حساب المدين المحجوز عليه تصرف فيه لفائدته بدلا
      من الحفاظ عليه بإتخاذ جميع الوسائل اللازمة يكون قد خالف المادة 669 ق إ م إ.


      لذا حيث نستخلص أن القضاة لم يبرروا النتيجة التي توصلوا إليها و يكونوا قد أفقدوا قرارهم أساسه لمخالفتهم القانون مما يترتب
      عنه نقض القرار.'
    - "حيث أنه بالرجوع إلى القرار محل الطعن فإن قضاة المجلس و على عكس ما ينعاه الطاعن لم يخالفوا القانون سيما أحكام القانون\
      \ المدني في مواده 191 و192 منه ذلك أن من أحكام وشروط دعوى عدم نفاذ التصرف أن يقوم المدين بالتصرف في ماله الضامن للدين\
      \ بتاريخ لاحق لسند الدين أولا ثم أن يكون المدين معسرا ثانيا \n\nوهو ما تبين لقضاة الموضوع من خلال إقدام الطاعن بوصفه\
      \ المدين على التصرف بالهبة في العقار العائد له و الكائن ببلدية خميس الخشنة بموجب العقد المحرر بتاريخ 2020/01/07 من طرف\
      \ الموثق الأستاذ فاتح بريكات والمشهر بالمحافظة العقارية لبودواو في 2020/01/09 مجلد 535 رقم 15 لفائدة ابنه المطعون ضده\
      \ الثاني وذلك مباشرة بعد صدور القرار الجزائي النهائي بتاريخ 2019/12/31الذي أدانه جزائيا وألزمه بالدفع للمطعون ضده حجاج\
      \ حمو بن بكير تعويض قدره 20.000.000دج هذا من جهة\nحيث أنه ومن جهة ثانية فإن تحجج الطاعن بكون قضاة المجلس لم يتحققوا\
      \ من واقعة عسره لا يستقيم أمام إقراره بتسجيل دعوى قضائية للاستفادة من مهلة الميسرة لتسديد الدين طبقا لأحكام المادة 281\
      \ من القانون المدني وهي دعوى لا يمارسها إلا المدين المعسر فضلا على أن صدور حكم بعدم نفاذ التصرف لا أثر له في تصرف المدين\
      \ في باقي أمواله مما يجعل قضاة المجلس قد أصابوا فيما قضوا ولم يخالفوا القانون وبالنظر لعدم سداد الوجه المثار يتعين القضاء\
      \ برفض الطعن ."
    - 'عن الوجه الثاني


      حيث إن المقصود من مخالفة قاعدة جوهرية في الإجراءات هو مخالفة قاعدة إجرائية منصوص عليها تحت طائلة البطلان ويترتب عن مخالفتها
      بطلان إجراءات الدعوى.


      حيث إن الدفوع المتمسك بها في هذا الوجه ترمي إلى إعابة على القرار المطعون فيه عدم إثارة إنعدام الصفة في المطعون ضدهم
      لعدم تقديمهم فريضة مورثيهم وشهادة إنتقال إليهم ملكية الحقوق الميراثية , والحال هي دفوع موضوعية لاشأن لها بالقواعد الجوهرية
      في الإجراءات , لأن إستخلاص الصفة في رافع الدعوى من قبيل فهم وقائعها .


      وحيث فضلا عن ذلك الظاهر من القرار المطعون فيه أن دعوى المطعون ضدهم لا تتعلق بحقوق ميراثية إنتقلت إليهم ملكيتها عن طريق
      الإرث , وإنما رفعت إستنادا إلى عقد الحبس المحرّر بتاريخ 1927/05/29 , المحدّد فيه المستفيدين من الحبس , وعليه الوجه كسابقه
      غير مؤسس يتعيّن رفضه وبالتالي رفض الطعن.


      حيث إن الطعن بالنقض إجراء مخوّل قانونا ممارسته والظاهر من الملف أن الطعن لا ينطوي على التعسف وليس الغرض منه الإضرار
      بالمطعون ضدهم , لذا تعيّن عملا بالمادة 377 من ق إ م وإ رفض طلب التعويض عن الطعن التعسفي.'
  - source_sentence: حيث أن المسألة القانونية المفصول فيها أعلاه لم تترك من النزاع ما يتطلب الحكم فيه لحسن سير العدالة يكون
      دون إحالة مع التمديد للحكم المستأنف عملا بالمادة 269 من ق إ م إ.
    sentences:
    - 'حيث يبين من القرار المطعون فيه الحكم المستأنف والوقائع التي أورداها أن الدعوى الأصلية كانت تهدف إلى الإفادة مما يقابل
      الإمتيازات المكتسبة عن فترة تسريح المطعون ضده من 2008/05/25 إلى 2013/06/09 ومن الثابت قانونا وما إستقر عليه إجتهاد المحكمة
      العليا أنه لما تؤسس الدعاوي على الطابع التعسفي التسريح أو التعويض الناتج عنها أو حتى طلب الإمتيازات المكتسبة  فإن المحكمة
      تكون مختصة الفصل فيها بحكم نهائي طبقا لنص المادة 4/73 من ق 11/90 ذلك أن هذه المادة لا تعطي أصلا الإختصاص للمجالس القضائية
      للبت في مثل هذه النزاعات كون الحكم الصادر بشأنها يوصف قانونا بالحكم النهائي غير قابل للطعن عن طريق الإستئناف إنما هو
      حكم قابل للطعن بالنقض وبالتالي كان على قضاة جهة الإستئناف أن يصرحوا بعدم قابلية الإستئناف لعدم جوازه قانونا ولما قضوا
      بخلاف ذلك فقرارهم معرض للنقض والإبطال دون إحالة لأن النقطة القانونية التي فصلت فيها المحكمة العليا لم تترك من النزاع
      ما يتطلب الحكم فيه عملا بالمادة 1/365 من ق إم إ.


      حيث أن خاسر الدعوى في قضية الحال هو الطاعن كونه إستعمل طريقا غير صحيحا ذلك أن نقض القرار المطعون فيه لا يفيده في شيء
      مادام أن الحكم المستأنف بعد النقض دون إحالة يبقى ساري المفعول لذا فأنه يتحمل المصاريف القضائية .'
    - 'عن الوجه الثاني


      حيث إن الدفوع المثارة في هذا الوجه غير مبينة للدفع الجوهري الذي له تأثير على وجه الفصل في الدعوى وأهمل المجلس مناقشته
      والرد عليه، إذ من شأنها مناقشة المجلس فيما إستخلصه من وقائع القضية والوسائل التي إعتمدها في أسباب رفضه الدفوع الشكلية
      والموضوعية المتمسك بها من قبل الطاعنين وذلك من الأمور الموضوعية الخاضعة لسلطته التقديرية متى كان رأيه معللا بما له أصل
      ثابت من وقائع القضية وطبق القانون.


      وحيث الظاهر من القرار المطعون فيه أن قضاة المجلس برروا رفضهم الدفوع الشكلية المتمسك بها من طرف الطاعنين لطلب إلغاء الحكم
      المستأنف والقضاء من جديد بعدم قبول الدعوى لإنعدام الصفة في الطرفين المبلغ لهما التكليف بالحضور بكون التكاليف بالحضور
      تمت عن طريق التعليق وبهذا التسبيب أوضحوا الطريقة الإجرائية القانونية المتبعة في تبليغ التكاليف بالحضور ثم أن المجلس
      بقبوله الإستئناف شكلا لعدم ثبوت التبليغ الصحيح للحكم المستأنف قد إستجاب لطلب الطاعنين المستأنفين وعلى إثر تصحيح الخطأ
      المادي الوارد في كتابة إسمي المستأنفين الطاعنين قد زال السبب المتمسك به للدفع بكون الدعوى غير مقبولة لرفعها على غير
      ذي صفة.


      وحيث فضلا عن ذلك يتبين من القرار المطعون فيه أن قضاة المجلس عللوا أساسا قضائهم بتأييد الحكم المستأنف بثبوت من الحكم
      المعتمد في الدعوى الصادر بتاريخ 1973.04.18 حصول سنة 1961 إتفاق بين مورثة الطاعنين والمطعون ضده على أن تبيع له القطعة
      الأرضية محل النزاع وإقرارها بذلك المعتمد في قضاء هذا الحكم بإلزام المطعون ضده بأن يدفع لها مبلغ 2450دج الممثل للمبلغ
      المتبقي من ثمن البيع وبأن هذا البيع صحيح مرتب لأثاره القانونية لوقوعه قبل صدور قانون التوثيقي الذي سرى مفعوله سنة 1971
      وأجب إفراغ بيع الأموال العقارية في الشكل الرسمي وحيازة المطعون ضده للقطعة الأرضية محل البيع منذ 50 سنة حيازة مستثمرة
      وهادئة تفيد تسديده لمورثة الطاعنين البائعة باقي الثمن تنفيذا للحكم المذكور المؤرخ في 1973.04.18.

      وحيث خلافا لما يدعيه الطاعنين قضاة المجلس لما أبرزوا الوسائل والأسانيد القانونية المعتمدة في رفض طلبهم يكونوا قد برروا
      قرارهم بأسباب كافية ثم أن الظاهر من القرار المطعون فيه أن الطاعنين لم يقدموا أمام المجلس دفع من شأنه نفي إدعاء المطعون
      ضده بكونه مُكّن من شغل القطعة الأرضية منذ حصول الإتفاق ببيعها أو دفع يفيد بقاء القطعة الأرضية محل البيع بحوزتهم ولذا
      لا يمكنهم إثارة هذا الدفع لأول مرة أمام المحكمة العليا وإعابة على القرار المطعون فيه إهمال مناقشته وعليه يتعين رفض الوجه  وبالتالي
      رفض الطعن.'
    - 'حيث أنه تبين بالرجوع إلى القرار المطعون فيه أن الطاعن "م.ب" التمس إلغاء رخصة استفادة شغل القطعة الأرضية المؤرخة في
      1991/01/14 الممنوحة إلى طرف أجنبي.


      حيث أن القرار المطعون فيه أيد الحكم المستأنف القاضي بعدم قبول الدعوى لانعدام الصفة متمسكا بالمادة 324 مكرر1 من القانون
      المدني على أساس عدم حيازة الطاعن على عقد ملكية.

      لكن حيث وبالرجوع إلى الوثائق التي تضمنها الملف أنه وتبعا لطلب الطاعن الرامي إلى إفادته بقطعة أرضية ب تلمسان من أجل إنجاز
      استثمار وبناء مصنع بسكويت صناعي وأن والي ولاية تلمسان وبتاريخ 1985/03/27 أبدى موافقته لذلك وخصص له مساحة 2400م² بموجب
      الرسالة الصادرة عن المطعون ضده بتاريخ 1985/03/31 على أنه يلتزم بدفع مبلغ 000 120دج كثمن لتلك القطعة وقد سدد هذا المبلغ
      لدى القرض الشعبي الجزائري في 1985/04/05 لفائدة المطعون ضده.


      واستفاد الطاعن بتاريخ 1985/04/07 بمحضر تحديد مؤقت للقطعة الأرضية هذا التحديد قام به مركز الدراسات والإنجاز في التهيئة
      العمرانية المطعون ضده الذي منح له في 1985/04/14 تصريح بشغل الأراضي أي القطعة الأرضية السالفة الذكر ثم تحصل على رخصة
      بتاريخ 1987/08/22 كل هذه الوثائق تسمح القول أن الطاعن له الصفة في التقاضي طبقا لنص المادة 13 من قانون الإجراءات المدنية
      والإدارية.


      حيث أن القرار المنتقد ذهب إلى تطبيق المادة 324 مكرر1 من القانون المدني للقول بانعدام صفة الطاعن في التقاضي طبقا لنص
      المادة 13 و67 من قانون الإجراءات المدنية والإدارية، في حين أن المجلس لم يناقش وثائق الطاعن مناقشة قانونية واكتفى بذكرها
      وسردها.


      حيث أن الطاعن يحوز كل الوثائق التي تسمح له بمرافعة المدعى عليه بمفهوم المادتين المذكورتين آنفا 13 و67 من قانون الإجراءات
      المدنية والإدارية وكان على قضاة المجلس معالجة القضية بالقبول أو الرفض بعد إثبات صفة الطاعن، ومنه فإن القرار المطعون
      فيه جاء قاصرا في تسبيبه وينجر عنه النقض والإبطال.'
