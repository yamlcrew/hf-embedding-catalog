- source_sentence: لكن حيث إن البيّن من القرارالصادرعن المحكمة العليا بتاريخ 2010.11.11 القاضي بنقض القرارالصادرعن المجلس
    بتاريخ 2008.02.23 أنه انتهى إلى قيام الصفة لدى الطاعنين خلافاً لما قضى به القرارالمنقوض أما القرارالثاني الصادرعن المحكمة
    العليا بتاريخ 2015.03.12 القاضي بنقض القرارالصادربتاريخ 2011.04.24 فكان اعتماده في ذلك على عدم تطبيق قضاة الإحالة لقرارالمحكمة
    العليا الأول وأن قضاة الإحالة بعد القرارالثاني أثبتوا الصفة للطاعنين وناقشوا موضوع الدعوى وانتهوا إلى قبولها شكلاً ورفضها
    موضوعاً مما يجعل الوجه غيرسديد
  sentences:
  - 'حيث اتضح وبالرجوع إلى القرار المطعون فيه أن المجلس رفض دعوى المدعيين في الطعن بالنقض الرامية إلى طرد المدعى عليهما في
    الطعن بالنقض من القطعة الأرضية موضوع النزاع مسببا قراره على أن المدعى عليها في الطعن "ب.ع" ليست وارثة شرعية للمرحوم "ط.ع"
    وأن المدعى عليه في الطعن المدعو "ل.ط" يشغل القطعة الأرضية المتنازع من أجلها بترخيص من الوارثة الشرعية.


    حيث أن المدعيين في الطعن بالنقض يتمسكان بتقرير الخبرة الذي أنجزه الموثق بناء على الحكم القضائي الصادر في 1964/08/19 والذي
    انتهى فيه إلى أن المرحوم "ط.ع" الذي هو زوج المدعى عليها في الطعن ليس من ورثة المرحوم "ط.ع" غير أنه بالرجوع إلى القرار
    المطعون فيه تبين أن قضاة المجلس لم يجيبوا على هذه الدفوع كما تقتضيه نص المادة 277 من قانون الإجراءات المدنية والإدارية
    التي توجب الرد على كل الطلبات والأوجه المثارة.


    حيث أن المجلس ذهب إلى اعتبار وتأكيد أن المدعى عليها في الطعن بالنقض وارثة شرعية للمرحوم "ط.ع" لأن زوجها "ط.ع" وأخيه المرحوم
    "ط.ب" هم إلى جانب والد المدعين "ل.أ" الذي هو زوج "ط.ع" ابن "ط.ع" إلى جانب أطراف أخرى يعدون من ورثة المرحوم "ط.ع" حسب تصريح
    المدعين في الحكم الصادر في 2008/12/31 المؤيد بقرار المجلس الصادر في 2010/04/08.


    حيث أنه كان على قضاة المجلس مما لهم من وسائل قانونية للوقوف على النزاع التحري والبحث في صفة المدعى عليها في الطعن قبل
    الإقرار بأنها تشغل القطعة الأرضية بصفتها مالكة لها في الشيوع وهذا بطلب وإحضار الوثائق الرسمية التي تثبت الصفة، ومنه فإن
    القرار المطعون فيه جاء قاضرا في التسبيب مما يعرضه للنقض والإبطال.'
  - 'حيث إنه بذلك يتعين معه نقض القرار دون حاجة للرد على الأوجه الستة الواردة في عريضة الطعن.


    حيث إن المحكمة العليا بنقضها القرار محل الطعن وفصلها في النقطة القانونية المتمثلة في انعدام الصفة والمصلحة للطعن بالإعتراض
    لم تترك من النزاع ما يتطلب الحكم فيه مما يتعين معه تمديد النقض إلى الحكم المستأنف وبدون إحالة وفقا لأحكام المادة 365 من
    قانون الإجراءات المدنية والإدارية.


    حيث إن خاسر الدعوى يتحمل المصاريف القضائية وفقا لنص المادة 378 من قانون الإجراءات المدنية والإدارية.'
  - 'لكن حيث إنه وخلافا لما ورد في الوجه فإن البين من الحكم محل الطعن أن قاضي الموضوع أجرى عدة محاولات للصلح وليس محاولة واحدة
    وتأكد خلال ذلك من إرادة الزوج في إيقاع الطلاق ومن خلو هذه الإرادة من أي خلل عقلي أفقده التمييز والإدراك وأن المحكمة غير
    ملزمة بإجابة الطاعنة لإجراء خبرة ثانية لأن ذلك يدخل ضمن سلطتها التقديرية وبأمكانها تكوين اقتناعها في الدعوى من الخبرة
    الأولى ومن معاينتها للمطعون ضده خلال جلسات الصلح مما يجعل الوجهين غير سديدين.


    حيث إنه بذلك تصبح الأوجه الثلاثة غير مؤسسة ويتعين معه رفض الطعن.


    حيث إن خاسر الدعوى يتحمل المصاريف القضائية وفقا لنص المادة 378 من قانون الإجراءات المدنية والإدارية.'
- source_sentence: 'عن الوجه الأوّل


    حيث إن المقصود من مخالفة قاعدة جوهرية في الإجراءات هو مخالفة قاعدة إجرائية منصوص عليها تحت طائلة البطلان,ويترتب عن مخالفتها
    بطلان إجراءات الدعوى


    وحيث إن الدفوع المتمسك بها في هذا الوجه ترمي في حقيقة الأمرالواقع إلى مناقشة المجلس فيما أستخلصه من وقائع القضية والوسائل
    والأسانيد القانونية التي إعتمدها في القرار التمهيدي الصادر في الدعوى بتاريخ 10 - 09 - 2017 , وكذا إعابة على هذا القرار
    تبرير قضائه بأسباب ليس لها مأخذ صحيح من وقائع الدعوى , وإعتمادا على وسائل تجعل القرار منعدم الأساس القانوني ومخالف للقانون
    , والحال هي دفوع موضوعية عالقة بأسانيد القرار , ولا شأن لها بالقواعد الجوهرية في الإجراءات المنصوص عليها تحت طائلة البطلان
    , وعليه يتعيّن رفض الوجه'
  sentences:
  - 'حيث أنه ثابت أن موضوع النزاع يتلخص في طلب الطاعن باعتباره دائن الرجوع على المحجوز لديه مؤسسة كهربة الجزائر بخصوص المبلغ
    المترتب في ذمة المحجوز عليه بوجرادة جمال الممثل للشيك بدون رصيد  على اعتبار أن التقرير بما في الذمة غير مطابق للحقيقة  فصدر
    الحكم المستأنف القاضي برفض الدعوى لعدم التأسيس  على أساس أن المطعون ضدها قدمت تقريرها وفقا للمادة 679 من قانون الإجراءات
    المدنية والإدارية  وبعد الاستئناف صدر القرار محل الطعن الحالي القاضي بالتأييد .

    حيث أنه ثابت بالرجوع إلى القرار محل الطعن  فإنه مسبب تسبيبا كافيا  وناقش دفوع الطاعن والفواتير المحتج بها والتي لم يحل
    أجلها وطبق صحيح القانون  مما تعين رفض هذا الوجه لعدم تأسيسه .'
  - حيث لئن نص المشرّع في المادة 553 الفقرة 08 من قانون الإجراءات المدنية والإدارية على وجوب تضمن القرار العناوين المهنية
    للمحامين , إلاّ أنه لم يرتب البطلان على إغفال ذكر هذه البيانات في القرار , والمقرّر بالمادة 60 من قانون الإجراءات المدنية
    والإدارية , أنه لا بطلان للأعمال الإجرائية شكلا بدون نص ودون إثباث الضرر , وعليه يتعيّن رفض الوجه
