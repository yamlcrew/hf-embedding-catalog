widgetData:
- source_sentence: In the case of Atlas International Travel Pty Ltd & Anor v Bennet & Ors [1999] NSWSC 877, was it possible
    for the purchaser to obtain specific performance against Atlas and PITC for breach of clause 9.1 of the preliminary agreement?
  sentences:
  - According to the Civil Aviation Regulations 1998, PART 39 - 105 CIVIL AVIATION SAFETY AUTHORITY SCHEDULE OF AIRWORTHINESS
    DIRECTIVES, the compliance requirement for the modification of the Wing Walkway for Victa Airtourer 100 and 115 is within
    150 hours time in service after 7 November 1966. The document reference for this directive is Victa SB No. 64.
  - Under the State Environmental Planning Policy (Precincts—Eastern Harbour City) 2021 (2021-726) (NSW), consent for development
    within the Trade and Technology Zone can only be granted if the consent authority has considered a written statement that
    substantiates how the proposed development will achieve one or more of the stated objectives of the zone that are relevant
    to the proposed development. However, this requirement does not apply if, in the opinion of the consent authority, the
    proposed development is minor in nature or would not significantly affect the achievement of a zone objective.
  - In the case of Atlas International Travel Pty Ltd & Anor v Bennet & Ors [1999] NSWSC 877, it was not possible for the
    purchaser to obtain specific performance against Atlas and/or PITC for breach of clause 9.1 of the preliminary agreement,
    as neither company was a party to the contract.
- source_sentence: What action does the Airworthiness Directive AD/HU 369/121 Amdt 2 require for the McDonnell Douglas (Hughes)
    and Kawasaki 369 Series Helicopters?
  sentences:
  - In the case Attorney General in and for the State of New South Wales v Markisic [2014] NSWSC 581, it was stated that in
    order for a judgment to be set aside on the ground of fraud, evidence must be led which permits an affirmative finding
    of the fraud alleged.
  - 'The Airworthiness Directive AD/HU 369/121 Amdt 2, issued under subregulation 39.001(1) of CASR 1998 by the Commonwealth
    of Australia, requires that certain actions be taken in relation to the McDonnell Douglas (Hughes) and Kawasaki 369 Series
    Helicopters. These actions, which the delegate considers necessary to correct an unsafe condition, must be taken: (a)
    in the circumstances mentioned in the requirement section; (b) in accordance with the instructions set out in the requirement
    section; and (c) at the time mentioned in the compliance section. The directive specifically pertains to the Vertical
    Stabilizer Control System Adapter Tubes.'
  - 'In R v Stanley [2013] NSWCCA 124, Mr Smith submitted three matters to justify the Court''s making of the order: (1) The
    prejudice which the nature of the evidence was likely to engender in the jury, (2) The complexity of the expert evidence,
    leading to the desirability of a judge''s trying the facts and giving reasons, and (3) The fact that no question would
    arise at trial requiring the application of community standards.'
- source_sentence: In the case of Taurino v Minister for Immigration and Multicultural and Indigenous Affairs [2004] FCA 1241,
    what conditions were imposed on the applicant upon his release from Wolston Correctional Centre?
  sentences:
  - In the case of Carey v ABC [2010] NSWSC 709, the plaintiff, Mr Carey, argued that he was unable to commence proceedings
    within the limitation period due to financial constraints. He stated that out of the $4,000 allowed in the receivership
    of his estate, there was nothing he could use to pay for legal advice in relation to proceedings against the ABC. His
    expenditures, including his own expenses and those of his children, amounted to some $4,600. However, the court noted
    that Mr Carey could have approached the Receiver or the Court to have the orders varied so as to enable him to retain
    a solicitor. The court also stated that the plaintiff carries the burden of satisfying the Court that it was not reasonable
    for him to commence proceedings within the limitation period.
  - In the case De Costi Seafoods (Franchises) Pty Limited and De Costi Seafoods (Holdings) Pty Limited v Serge Wachtenheim
    [2020] NSWDC 58, the dispute arose out of losses suffered by Wachtenheim following the purchase of a franchise business
    at Dee Why and a claim by De Costi for payment of arrears, royalties and fish product supplied. De Costi had filed a statement
    of claim against Wachtenheim (and later amended to include Deist Safety Equipment Pty Ltd) claiming the arrears. Wachtenheim
    subsequently filed a defence and a cross-claim. Both the statement of claim and the cross-claim were subsequently amended
    a number of times.
  - 'In the case of Taurino v Minister for Immigration and Multicultural and Indigenous Affairs [2004] FCA 1241, the court
    imposed the following conditions on the applicant upon his release from Wolston Correctional Centre: (1) the applicant
    is to reside at 39 Finlay Street, Slacks Creek, in the State of Queensland; (2) if the applicant proposes to move from
    that address, he is to notify in writing his solicitors, Mallesons Stephen Jaques (Level 30, Waterfront Place, 1 Eagle
    Street, Brisbane) and Andras Markus of the Australian Government Solicitor (Level 23, 133 Castlereagh Street, Sydney)
    of his new address and contact details. Such notice shall be given at least 48 hours in advance of the applicant moving
    to a new location.'
- source_sentence: In the case of Zagami v Waste Service of New South Wales [2005] NSWADT 60, what was Waste Service's stance
    on the disclosure of its knowledge and experience regarding gas migration problems?
  sentences:
  - In the case of Zagami v Waste Service of New South Wales [2005] NSWADT 60, Waste Service contended that its full and frank
    disclosure to the regulator was very relevant. It argued that its correspondence with the regulator showed how it had
    addressed the gas migration problem at its Eastern Creek site. Waste Service also stated that it had a substantial investment
    in the knowledge it had accumulated from its long experience and that it was entitled to make full use of and guard its
    local knowledge. However, it acknowledged that it was subject to the Freedom of Information (FOI) Act unlike its competitors,
    and that the protections provided in Clause 7 of Schedule 1 to the FOI Act ensured that it was not placed at a competitive
    disadvantage.
  - According to the AD/R44/20 - Main Rotor Swashplate and Tail Rotor Bolts (Cth) directive, the helicopters affected by Requirements
    1.b.(i) and 2 must replace each bolt, part number NAS6605-31, that has vendor identification marking 01DO on the bolt
    head, with a serviceable bolt, part number NAS6605-31, that has an alternative vendor identification marking. Bolt part
    number NAS6605-31 with vendor identification marking 01DO on the bolt head, is not to be installed on any helicopter.
    The compliance must be done before further flight after 3 December 2003, and thereafter before first flight of each day
    of operation, and within 10 hours time in service or before 31 December 2003, whichever occurs first; after determination
    of vendor identification and/or helicopter applicability.
  - In the case of Craig Maguire and Plasdene Glass-Pak Pty Limited [2006] NSWIRComm 112, it was stated that any applications
    for adjournment of arbitration dates must be made in a timely way, be in writing and contain full grounds. Such applications
    will be considered and determined by a Presidential Member. It should be understood that adjournment applications will
    be granted only on clear and compelling grounds.
- source_sentence: In the case of R v Al Batat & Ors (No 3) [2020] NSWSC 1061, what was the Prosecutor's argument regarding
    the possession of firearms on 14 February and its relation to the likelihood of supplying firearms on 1 February?
  sentences:
  - In the case of Ng v North Coast Area Health Service And Another [2007] NSWIRComm 173, it was found that Dr Ng was not
    dismissed from his employment by the Respondent. The Respondent's standing down of Dr Ng from duty on full pay whilst
    an enquiry was being undertaken into concerns expressed by colleagues was not considered a termination or intention to
    terminate employment so as to be a constructive dismissal.
  - In R v Al Batat & Ors (No 3) [2020] NSWSC 1061, the Prosecutor argued that a person's possession of firearms on 14 February
    is capable of rationally affecting the question of whether they were in a position to supply firearms on 1 February. The
    Prosecutor further stated that possession of guns on 14 February makes it more likely that a person was in a position
    to supply guns on 1 February, and therefore makes it more likely in fact they did supply guns on 1 February.
  - 'In the decision of B & W Windows (Residential) Pty Ltd v Franjulis; Franjulis v B & W Windows (Residential) Pty Ltd [2020]
    NSWCATCD 23, the relevant considerations in relation to Calderbank offers were summarised as follows: there must be a
    real and genuine element of compromise; the refusal must be unreasonable.'
