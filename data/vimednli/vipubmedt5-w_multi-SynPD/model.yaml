widgetData:
- source_sentence: Chúng_tôi không_thể chứng_minh bất_kỳ tác_dụng có lợi nào của việc dùng risedronat đường uống đối_với sự_cố
    định , mật_độ khoáng xương hoặc tái_tạo xương của các ổ_cắm sửa_đổi bằng cách sử_dụng nhiều lượng ghép xương .
  sentences:
  - Có cơ_hội bị bỏ lỡ để phòng_ngừa thứ_phát cho những bệnh_nhân đang trải qua quá_trình tái thông mạch vành , với tỷ_lệ
    kê đơn thuốc chẹn beta và thuốc ức_chế ACE thấp .
  - Mức_độ loạn sản cấp_độ cao trong thực_quản Barrett không phải là yếu_tố dự_báo sự hiện_diện của ung_thư tuyến ở thực_quản
    .
  - Không có sự khác_biệt đáng_kể về di_chuyển cup , mật_độ khoáng xương hoặc tái_tạo ghép giữa nhóm risedronate và nhóm giả
    dược sau 3 năm .
- source_sentence: Ở nhóm bệnh_nhân này , kết_quả không bị ảnh_hưởng bởi xạ_trị , thao_tác nội_tiết_tố hoặc hoá_trị .
  sentences:
  - Nồng_độ MBL tăng không phải là dấu_hiệu của mối liên_quan giữa gen MBL2 và bệnh tiểu_đường loại 1 hoặc bệnh_lý thận do
    tiểu_đường .
  - Một đánh_giá biểu_đồ theo_dõi bệnh_nhân hồi cứu đã phá_thai bằng cả fentanyl và midazolam tại hai phòng phá_thai miễn_phí
    tại đô_thị với chính_sách thường quy là khuyên phụ_nữ ăn nhẹ trước khi tiến_hành thủ_thuật , không tìm thấy báo_cáo nào
    về các biến_chứng liên_quan đến gây_mê trong 47.748 biểu_đồ được xem_xét từ năm 1998 đến năm 2010 .
  - Không an_toàn khi bỏ_qua xạ_trị sau khi cắt bỏ tại_chỗ rộng đối_với ung_thư biểu mô ống tại_chỗ .
- source_sentence: Tính đặc_hiệu của hội_chứng đối_với kháng_thể kháng AQP-4 , cùng với hồ_sơ kháng_thể tương_tự ở những bệnh_nhân
    NMOSD SS , chỉ ra rằng NMOSD không phải là biểu_hiện trực_tiếp của hệ thần_kinh_trung_ương của SS .
  sentences:
  - Trong nghiên_cứu này , chúng_tôi phát_hiện ra rằng kháng_thể kháng AQP-4 chỉ có ở những bệnh_nhân SS mắc NMOSD , nhưng
    không có ở những bệnh_nhân SS không mắc NMOSD .
  - Giảm nhanh DNA HBV ( tuần thứ 12 ) là một yếu_tố tiên_lượng quan_trọng đối_với điều trị一线 bằng adefovir dipivoxil cho
    viêm gan B mạn_tính .
  - Nồng_độ hormone tuyến_giáp nhẹ dư_thừa có liên_quan đến chức_năng thể_chất giảm ở nam_giới lớn_tuổi .
- source_sentence: Các tế_bào hRPE biểu_hiện mức caspase-12 S cao .
  sentences:
  - Vô hoạt cathepsin B làm giảm tổn_thương tế_bào apoptosis do thiếu máu cục_bộ / tái tưới máu ở gan chuột .
  - Tỷ_lệ mắc khối_u ở những người nhận ghép thận đã tăng theo thời_gian .
  - Sự biểu_hiện được điều_hoà của gen caspase-12 trong các tế_bào biểu mô sắc_tố võng_mạc của người cho thấy vai_trò điều_hoà
    miễn_dịch của nó .
- source_sentence: Việc cấy_ghép các EC và MC có nguồn_gốc từ các tế_bào ES chưa phân_biệt của con_người có khả_năng góp_phần
    tái_tạo mạch_máu điều_trị và do_đó làm giảm diện_tích nhồi máu sau đột_quỵ .
  sentences:
  - Việc cấy_ghép các tế_bào mạch_máu có nguồn_gốc từ tế_bào gốc phôi người góp_phần tái_tạo mạch_máu sau đột_quỵ ở chuột
    .
  - Độ bão_hoà oxy tĩnh_mạch trung_tâm thấp ở những bệnh_nhân chấn_thương ổn_định về huyết động_học có liên_quan đến kết_cục
    kém .
  - Những bệnh_nhân ET không bị mất trí_nhớ có nhiều thay_đổi liên_quan đến Alzheimer trong bệnh_lý thần_kinh tau hơn so với
    nhóm đối_chứng , cho thấy mối liên_hệ giữa bệnh_lý tau và run .
