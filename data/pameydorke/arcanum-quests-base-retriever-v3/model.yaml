widgetData:
- source_sentence: orc uprising quest donn thrugg talk persuasion
  sentences:
  - Collect from Larrs. The Pub If the player is interested in joining Clan Maug, then they first need to talk to Muggs in
    the local pub Muggs will send the player to collect an overdue payment of 200gp from Larrs Payment due is either 200gp
    or Larrs' death Larrs' House The player can find Larrs at home Larrs will state that he only has 25gp, that he is sick,
    and that his family is starving The player can either kill Larrs, or take the 25gp and cover the difference, or simply
    cover the entire amount The Pub When the player returns to the pub, they can report to Muggs that they have killed Larrs
    Or they can give Muggs 200gp if they are covering Larrs' debt In either case the player a reward of 25 gp, 3100 exp, and
    an invite to see Damian Maug
  - End the Orc Uprising. Upon returning to Tarant after visiting Qintarra, you'll find Donn Throgg holed up in the back of
    the factory at 15 Ten Hands Alley (where the Foreman usually is) along with several orc laborers. There is a bloodthirsty
    mob outside headed by Captain Wheeler, along with Councilman Babcock who wishes to find a peaceful solution.Possible Solutions:Talk
    with Captain Wheeler, offer to kill Donn Throgg (either by sneaking in the back entrance or going in through the front
    door). Talk with Captain Wheeler, then convince Donn Throgg that the press are outside and he should make a statement.
    Watch him get cut down in a hail of gunfire. Talk with Mr. Babcock, who asks you to try and convince Donn Throgg to slip
    out and fight for his rights in court. In order to achieve this outcome, the player must have 3 points in Persuasion and
    must not speak to Captain Wheeler prior to Mr. Babcock (this prevents Babcock from offering his solution). Talk with Mr.
    Babcock, but then convince Donn Throgg and his companions to go on a rampage (this can be quite fun to watch, but really
    botches the quest).
  - 'Kill Sir Garrick Stout. Dodge Mastery only. This path is for players who only desire Dodge Mastery and will NEVER want
    Melee Mastery Obtain Dodge Expert training from either Hekmer Oggdoddler in Black Root or Winde in Qintarra Seek out Adkin
    Chambers in Stillwater Accept Chambers'' quest to Kill Sir Garrick Stout and bring back Stout''s eyes Go to Dernholm and
    complete the task Return to Stillwater: your reward is Master Training and 8,500 xp Notes: This botches ANY attempt for
    the Melee Mastery quest in the future If Stout is killed previous to this, then Chambers will accept your word and train
    you if you are high enough rank'
- source_sentence: Steps to ressurect prof jame with conjuring
  sentences:
  - Adkin Chambers and Sir Garrick Stout. This path continues if you accept Lady Druella's Quest Upon receiving your training,
    attack and kill Garrick Stout At this point Lady Druella will ask you to Contact Adkin Chambers and deliver the potion
    to him Go to Stillwater and give Chambers the potion Your reward is 6,400 xp
  - Masters of Magick. Master Of Necromatic Black. You can become the Master Of Necromatic Black by talking with D’Ary and
    taking his test. Game crashed in press build.
  - Steal the Elven Funeral Stone. You can resurrect dead archeologist, Professor James. Apart turning the elves hostile,
    this won't change the quest's course or outcome. You can Conjure spirit of dead archeologist and get the same dialogue
    as thru resurrection without turning the elves hostile
- source_sentence: run throguh fire corridor
  sentences:
  - Masters of Magick. Master Of Fire. You can become the Master Of Fire by talking with Naph’Tha and taking her test. This
    involves running through a corridor of fire and then fighting Water Elementals.
  - Adkin Chambers and Sir Garrick Stout. Dodge and Melee Mastery Together. This path is complicated because there are many
    way to complete it 3A If you are only ready for Melee Master Training, then take Path 2 Follow it to completion, including
    the optional Lady Druella Quest When your are ready for Dodge training, seek out Adkin Chambers in Roseborough He will
    great you warmly and perform your training 3B If you are ready for both Melee and Dodge training, then you can start with
    either Path 1 or Path 2. If you start with Path 2, then just take it to the end When you get to Stillwater, get your Dodge
    Training right after you deliver Druella's potion to Chambers 3C If you start with Path 1, then just pause it when you
    meet Stout Start Path 2, and follow it to completion, including the optional Lady Druella Quest When Garrick Stout is
    killed, take Druells'a potion and Stout's eyes back to Chambers in Stillwater for your rewards
  - Investigation for Lillian Misk. Lillian Misk asks you to find out who disclosed the information concerning the ownership
    of “Horror Among The Dark Elves”.Talking with Wesley the butler and the Brinda the Maid yields no positive results. Those
    with a keen eye will notice Wesley’s passport under the couch. This leads you a his home. Searching his home yields an
    incriminating note to Wesley from Elmer Burbuttom. If you speak with Wesley again, he clams up and refuses to say anything.To
    find Elmer Burbottom, you must travel back to Tarant and look him up in the Hall of Records. You find his address as 14
    Trellis way, Ashbury.Travelling there, you find him dying after being attacked by a mysterious mage. He has been posing
    as Kendrick Wales as he thought it a better name to write a book. With his dying breath, he confirms that Wesley was indeed
    the culprit.Returning to Caladon, you talk to Lillian and find that Wesley has now also been murdered. Case closed!Note
    – more charismatic and attractive characters can “comfort” Lillian in her grief.
- source_sentence: willoughsby office appointment info
  sentences:
  - 'Skill mastery quest. Persuasion mastery. Negotiations with Caladon. After the Living One speak with the elven queen in
    Qintarra, return to Tarant and approach the Willoughsby Residence (19 Pickwick Alley). Edward Willoughsby will exit the
    residence while talking to Perriman Smythe. When spoke to he will ask to meet in his office at the Tarant''s City Hall.
    Find him there and ask what his job entails, he will mention the negotiations with Caladon about joining the Unified Kingdom
    and that they need a skilled diplomat. For Willoughsby to appoint the Living one as Tarant ambassador they must have the
    Persuasion skill at maximum with expert training and the quest Monument Planning in Ashbury must not have been failed.
    Leaving office the Living One will be stopped by Heinrick Jenks who can start the quest assassinate King Farad of Caladon.Willoughsby
    can be informed about the plot and he will order Lorham to kill Jenks. If he is already dead Willoughsby can still be
    informed but the dialogue is brokenSee Bugs. After the Living One is approved and nominated Ambassador, they will be given
    a dossier with Willoughsby''s advices about the topics of the negotiations and asked to met Renard outside Caladon Royal
    castle After talking with Renard, the Podium in the throne room will be interactable. In the corridor before, there are
    various Caladonian representative waiting, they will offer bribes in exchange for specific requests to be included in
    the agreement. The negotiations After interacting with the "Wooden Object" in the throne room, the Council of Advisors
    will start asking about the topics mentioned in the dossier.There are two point counters, one for Caladon and one for
    Tarant; each answer will increase both counter by a number between 0 and 5.They generally follow this pattern ( except
    for the Labor union question where there is no compromise that favor Caladon). The representative''s request, only appears
    if spoken with, heavily in favor of Caladon or it''s disapproved by both sides. Tarant''s best-case scenario Edward Willoughsby''s
    advice, a compromise that slightly favor Caladon over Tarant. A compromise that slightly favor Tarant over Caladon. An
    Extreme option that''s heavily in favor of Tarant or it''s disapproved by both sides. With Charisma 19 the Living one
    can easily win over the Advisors and make them agree to Tarant''s best-case scenarios. With lower Charisma they will need
    to compromise. In this table are reported all the answers and their correspettive points. If Caladon counter is higher
    then 22, the Council of Advisors will accept the Agreement; if it''s lower or equal they will refuse, making the quest
    incompletable and forsake any reward.The representatives will reward the promised gp in the case that their request was
    included in the agreement. Willoughsby will be waiting outside the castle to evaluate the Living one performance.There
    are three different possible reaction based on Tarant''s counter: Tarant''s counter is lower then 26, A disappointing
    performance, Willoughsby will imply that bribes were involved and only reward 3000 gp. Tarant''s counter is between 26
    and 37 An impressive performance, Willoughsby will reward 7000 gp and Master training. Tarant''s counter is higher then
    37 An incredible performance, Willoughsby will reward 11000 gp, Master training and the reputation Honorary Ambassador
    to Tarant 8500 XP will always be rewarded unless the Advisors refused the Agreement.'
  - Helping Madam Lil. Get Mr. Langley to Pay. Madam Lil asks you to get Mr Langley the doorman of the Bridesdale Inn to pay
    his debt of 400 gold. You can convince him to pay half now and he will pay you the rest in 5 days. You can also pick pocket
    him for extra cash while you are there.
  - Skill mastery quest. Throwing mastery. Retrieve Azram's Star. Black Root Clarissa Shalmo can be found in Black Root at
    one of the local pubs Talking with her reveals that she desires the throwing weapon called Azram's Star, but that current
    obligations prevent her from retrieving it If the player has any training in Throwing, then she will task the player with
    obtaining it for her If the player initially says they will think about it, then comes back and says "I will attempt to
    obtain Azram's Star for you.", she will not mark the location on the map; nor can K'na Tha be found by walking to its
    coordinates without a marker. K'na Tha K'na Tha is found at 1435W, 616S, and it is marked on The Player's World map when
    accepting the quest It is 6 levels with alternating mazes and puzzles to solve, requiring a ranged weapon There are a
    variety of monsters that use ranged attack guarding the levels All the doors are locked, requiring maxed Pick Locks, 100MA
    Unlocking Cantrip, or weapons to destroy the doors Each level must be exited by extinguishing various lit torches Azram's
    Star can be found in an altar on the sixth level Black Root (Main Quest) Clarissa can be found back at the Drop Yer Anchor
    Pub Giving her Azram's Star results in 4600 exp If the player also has at least 18/20 in Throwing, then Expert and/or
    Master Training will be given Black Root (Side Quest - Optional) If the player does not have Expert Training and has less
    that 9/20 in Throwing, then Clarissa will not train them until their rank is higher If the player has Expert Training
    but has less than 18/20 in Throwing, then this spawns a side quest to Practice Throwing When the player returns with the
    adequate rank and a 1000 gp fee, then they will receive Master Training They will also receive an additional 1700 exp
- source_sentence: need help with torian kels curse
  sentences:
  - Free Torian Kel from the Curse. Northeast of Tarant there are some ancient ruins. On the west end of the dungeon you will
    find the Torian Kel key. Use the key to open the door on the east end of the dungeon and speak to the crumbling skeleton.
    It will ask you to bring it some dragon's blood. It will mark the location of where to find some on your map. Go to the
    Dungeon of the Dragon Pool to the northwest. Click on the pool on the 2nd level of the dungeon to receive a Vial of Dragon's
    Blood. Return to the Ancient Temple and use the Vial of Dragon's Blood on the crumbling skeleton to release Torian Kel
    from the curse. He will tell you his story and may accept an offer to join you.
  - Clean Up the Boil. Chairman Willoughsby wishes to clean up The Boil by ridding it of the the bulk of its criminal element.
    The player might be able to become involved
  - 'Ancient Gods. Greater Gods. Halcyon Halcyon is the God of Truth (Good) Location: The Temple at Vooriden Offering: Olive
    Tree Branch, found at the Wheel Clan garden Blessing: +2 Willpower, +2 Perception, +4/20 Heal, +4/20 Spot Trap Note: The
    Blessing of Halcyon overrides all of the first circle blessings Moorindal Moorindal is the God of Shadows (Evil) Location:
    The Altar at the Ancient Temple Offering: Black Diamond, sold at the Black Markets and one each found at the Ancient Maze
    and the Palace in Caladon Blessing: +8/20 Backstab, +4/20 Melee, +10 Critical Hit, +4/10 Prowling Note: The Blessing of
    Moorindal overrides all of the second circle blessings Kai''tan Kai''tan is the God of Balance (Neutral) Location: Gorgoth
    Pass Offering: Geode, one is found near the Altar, others are found in Dwarven Mines Blessing: +1 Beauty, +1 Charisma,
    +8/20 Persuasion, +4/20 Haggle, +4/20 Bow Note: The Blessing of Kai''tan overrides all of the third circle blessings Velorien
    Velorien is the All-Father Location: The temple in the Vendigroth Ruins Offering: Yourself; This results in your death,
    so make sure that you do not try this alone, and that one of your followers has a resurrection device that can revive
    you Blessing: 100 hit points, +100 Fatigue, +12/20 melee, +12/20 dodge, +12/20 Pick Pocket, +12/20 firearms, +12/20 persuasion,
    +4 dexterity, +30 damage resistance, +30 magic resistance Note: The Blessing of Velorien overrides all previous blessings
    Accumulating Blessings Blessings of the lesser gods in a particular circle will accumulate (stack) if done in the proper
    order The Blessing of the greater god in that circle will override all of the lesser gods'' Blessings Velorien''s Blessing
    overrides the greater gods'' circle Blessings Accumulating Blessings can be halted at any time, thus keeping all previously
    received Blessings intact Getting Velorien''s Blessing prevents making any more Blessings to any of the altars'
