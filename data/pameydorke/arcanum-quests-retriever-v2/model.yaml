widgetData:
- source_sentence: talk to treat before killing
  sentences:
  - 'Kill Prince Auguste Farad. In ProgressKing Praetor: Kill Prince Auguste Farad. (Prereq: Evil alignment, Q42. Reward:
    500 gold, more Evil alignment, 800 XP.)'
  - Kill Treat. The Bentley Milo is a Gnome who is the doorman and gatekeeper of the Bentley Milo won't let the player enter
    until they perform a quest for him Milo wants the player to kill the Half-orc Treat; a Clan Pollock member and potential
    suitor of his girlfriend Treat's House The player can find Treat in his house on the east side of The Boil in Clan Pollock
    territory The party may get a chance to talk to Treat first, or they may get immediately attacked Treat may keep his original
    form, or he may transform into a Spirit Snake Regardless, kill Treat and return to Milo The Bentley Confronting Milo about
    Treat's undisclosed shape-shifting ability might net you an extra 50 gp Otherwise he gives his usual reward of 500 gp,
    4600 exp, and your audience with Damian Maug
  - Pick Up Shipment of Whiskey. If Caleb's delivery boy gets spooked during the battle, then just come back an hour or two
    later when he's calmed down to get the the whiskey If he happens to die during the battle, then just loot his corpse for
    the whiskey afterwards; Caleb won't ask about any details
- source_sentence: what happens after talking to min gorad
  sentences:
  - 'Kill Prince Auguste Farad. In ProgressKing Praetor: Kill Prince Auguste Farad. (Prereq: Evil alignment, Q42. Reward:
    500 gold, more Evil alignment, 800 XP.)'
  - Masters of Magick. Master Of Nature. You can become the Master of Nature by talking with Ferko Lydell and taking his test.
    This involves getting through a dungeon with a swarm of firejumpers and a pack of brute fang.
  - The Main Quest. Tsen Ang. Upon reaching Tsen-Ang, speaking to the guards and asking for M’in Gorad, they will let you
    in providing you have a Molochean Hand Amulet. Find M’in Gorad and talk to her. This is the main area where the game can
    branch dramatically. If you are evil, you can join her side. To prove your allegiance you must kill all the inhabitants
    on Stillwater and return when complete. She will then tell you to talk with the high priest of the Panarii in Caladon.
    You can talk to her and get enough information You can talk to her and convince her to let you go in exchange for your
    "services" You can kill her (and read the note she has) Pick pocket her note and read it Convince her that you are an
    assassin and the contract has been completed Find out the information and then charm her, resulting in "parental recreational
    activities". After leaving her, you will meet up with a member of the Molochean Hand. Again, results may vary. Virgil
    Upon leaving Tsen-Ang, if Virgil is in the party and you are following the good path, he will leave saying that he has
    business to attend to. It is imperative that you take anything you want from him (strip him naked if you wish). Either
    by the information gathered from the newspaper, detective work, or random searching you will find Virgil in the cellar
    under the Sobbing Onion in Caladon, dead, killed by thieves After killing the thieves he can be resurrected (a scroll
    can be found in the chest nearby) You find him a changed man, he will tell you his true origins. He is very different
    indeed, having different abilities and a different levelling scheme (now Zen Virgil). Note he is also now level 25, so
    most people will now be rather annoyed at all the levels he has lost. It is possible to complete all the main quests and
    get to this point by level 25 but is quite difficult (you need to avoid most combat situations or let your followers do
    the fighting; another possibility is increasing the difficulty of the game in the game settings menu, which decreases
    the amount of experience you gain and needs to be done at the start of the game). Finally Joachim turns up and gives tells
    you some more details. Vollinger If Vollinger is in the party and you never read Joachim’s book, he will also leave and
    tell you to meet him at Vollinger’s Meeting place, alone (similarly strip him naked as well). At this point in time, he
    will reveal himself as a Molochean hand assassin and try and kill you. He will have changed to a level 30 character as
    well. If you read Joachim’s book and discuss the history of the Molochean hand with, he will reveal himself to you as
    an assassin but he now believes you are no longer his enemy you no longer have to worry about him trying to kill you.
    If you joined M’in Gorad, you must then visit the Panarri temple and talk with K’an Hua. If you did not join M’in Gorad,
    you now have to return to Quintarra and talk with the Silver Lady again.
- source_sentence: halfling hideout location capitan
  sentences:
  - Clear the Halfling Gang. Renzo path. Rather than planting the statue, you can instead go to the Captain of the Guard at
    at the barracks directly. Once there you can give him the location Halflings' hideout. Doing so gives you a reward of
    150 gp.
  - 'The Thieves and the Bridge. The Thieves and the Bridge Start: Constable Owens, Shrouded Hills End: Constable Owens, Shrouded
    Hills Location: Shrouded Hills Rewards: 1,000 XP50-250 goldbridge keyFate PointThe Thieves and the Bridge is an early-game
    quest in Shrouded Hills. It is given by Constable Owens, the town mayor. He can be found pacing near the well in the center
    of the town. He needs Lukan the Witless and his band of thieves removed from the town bridge.Contents 1 Starting the Quest
    2 Options if you Accepted the Quest 3 Options if you Defer or Decline the Quest 4 RewardsStarting the QuestSpeak to Constable
    Owen about the situation. Accepting and completing the quest grants you a reward and free passage to and from Shrouded
    Hills Deferring the quest gives you additional options, but with with possible varying degrees of consequences Now find
    the thieves at the town bridgeOptions if you Accepted the QuestDiplomatic: With 1 point in Persuasion you can talk the
    thieves into leaving. This gains some extra gp in the process, and information about The Thieves Underground Stealth:
    With 1 point in Prowling you can plant dynamite in their midst at night and kill them Combat Tech: With 1 point in the
    Explosives Discipline you can create Molotov Cocktails and defeat them in combat with just a few hits Combat Neutral:
    With 1 point in Charisma (for a CH of 9) you can recruit Sogg Mead Mug and generally he and you and Virgil can beat them
    in Melee Combat Magick: With 1 point in the Necromantic Black College and some potions (1 each: haste, fatigue slower,
    fatigue restorer) you can generally beat them in combatOptions if you Defer or Decline the QuestMerchant: With 1000 gp
    you can pay the toll and pass Thief: With 1 point in Pick Pocket you can steal the key from Lukan and pass Mage: With
    2 points in the Conveyance College you can use Unlocking Cantrip on the gate to pass If you deferred the quest, then Lukan
    will allow you to pass if you destroy the town''s building materials. He will then also tell you about The Thieves Underground.
    This has negative consequences with the local townfolk, however. If you rob the town bank and fail to properly cover up
    the deed, then you will find Doc Roberts and some of his friends at the gate. Doc and his posse have killed Lukan and
    his gang for you, but now you have the more difficult situation of getting through them . . .RewardsIf you successfully
    removed the thieves, then: At the bridge you get the gate key and a Fate Point Further, returning to the Constable, you
    will get 50 Gold and 1,000 XP If you did not displace the thieves, but did find a way to pass, then you will have free
    passage to and from Shrouded Hills As noted, you may take a reputation hit with the citizens of the town As also noted,
    you may have to fight Doc Roberts and his posse Finally, obtaining information about The Thieves Underground grants you
    an early opportunity to join the guild once you reach Tarant. After you convince the thieves to leave and receive the
    Fate Point, you can then kill them and receive a second Fate Point.'
  - Rid Mr. Plough's Warehouses of Rats. Talk to Simon Plough at the warehouse entrance and ask about his problem. Visit the
    smaller warehouse to the left first and kill the rats inside. You will also find a key in one of the barrels. Use the
    key to enter the bigger warehouse and kill everything inside. Return to Simon to finish the quest.
- source_sentence: how to get master pickpocket training
  sentences:
  - 'Skill mastery quest. Pick pocket mastery. Run Around Tarant in Your Underwear. 130 Sammie White: Go to middle of Tarant
    and run around in your underwear. (Reward: Master Pickpocket training, Pervert reputation, and 6400 XP.)Trade barbs with
    Sammie, and then keep talking to him until you can ask what he does for a living. Then ask for him for master training.
    He’ll tell you to take off your clothes and run up and down Kensington Broadway several times. After that go back and
    talk to Sammie. He''ll train you as master. Note that this also results in gaining the reputation of '' "Pervert of Tarant"
    '' which causes a -25 reaction modifier to everyone in Tarant and -5 reaction modifier elsewhere. Also note that planting
    items is mostly useless, thus giving this Mastery little value, as most marks will pick up items dropped near them anyway.'
  - 'Skill mastery quest. Pick locks mastery. Steal mastery. Free J.T. Morgan. To start the Mastery quest you must find R.L.
    Morgan of (Roseborough). She will tell you that her son J.T is locked up in Caladon''s prison and will ask you to deliver
    his lockpicking tools to him. The prison entrance is underground, and the entrance is next to the police department.The
    master of Pick Locks, J.T. Morgan, can be found in the Caladon prison. He is securely locked up and cannot be broken out.
    Talking with the guards reveals his mother lives in Roseborough.She is a gnome wearing a blue vest in one of the houses
    in the northern parts of Roseborough. Talk to her about his predicament and she will give you his special master locksmith
    tools, with the agreement that he will train you if you break him out.Getting into the prison generally requires stealth
    and lockpicking or brute force. Once there, talk to him and he will confer Master status on you.63 Mrs. Morgan: Free son,
    JT Morgan. (Reward: Master Pick Locks training, 8500 XP.)'
  - Masters of Magick. Master Of Fire. You can become the Master Of Fire by talking with Naph’Tha and taking her test. This
    involves running through a corridor of fire and then fighting Water Elementals.
- source_sentence: dernholm marry lady druella task guide
  sentences:
  - Adkin Chambers and Sir Garrick Stout. Melee Mastery only. This path is for players who only desire Melee Mastery. However
    they may still obtain Dodge Mastery later (see path 3) Seek out Sir Garrick Stout in Dernholm Accept his quest to Find
    Lady Druella with an offer of marriage and return her to Dernholm The offer comes with a bribe of a potion to restore
    the sight of the blinded Adkin Chambers Go to the Gyr Dolours' lair which Stout marked on your map Rescue Lady Druella
    without her being killed You can convince Druella to return if you tell her (lie or the truth) that you will kill Stout
    as soon as he provides the Potion Return to Dernholm and present Druella to Stout Stout will then give Druella the Potion;
    and your reward is Master Training and 8,500 xp
  - 'Skill mastery quest. Gambling mastery. Gamble with Gurin Rockharrow. Women are refused entry to the Gentlemen''s Club,
    but they still have a few avenues: Pick Pocket the key from the doorman Use Unlocking Cantrip to unbar the door Find out
    the name of the Club Owner from the doorman, getting his address from the Hall of Records, and then paying him a visit
    Once you meet with Wendell Wellington the options branch further: Pay a bribe and sleep with him for a special invitation
    Pick Pocket the invite Kill him and his bodyguard and loot his corpse for the invite With 8 points (2 ranks) of melee,
    you can threaten him for it With 4 points (1 rank) of persuasion and a Reaction Modifier of 81 you can sweet talk him
    for it Using this invitation will allow a lady to come and go as she pleases'
  - Deliver Goods to Maximillian. If you speak with Norian in the camp on the Isle of Despair, he will ask you to deliver
    some moonshine to Maximillian. Talking to Maximillian can reveal that he is actually the rightful heir to the throne of
    Derholm, and he asks you to find Warren Pel Dar and tell him that Maximillian still lives. Talking with Lianna, the black-suited
    human in the building next to Dolan’s General Store, will reveal that he is dead, but she has been following her father's
    ideals. (If you've already spoken with Lianna before meeting with Maximillian, you can tell him of Warren's death, and
    he will ask you to inform Lianna instead.)Maximillian will give you a note to return to Norian, who will then give you
    a jug of moonshine.
