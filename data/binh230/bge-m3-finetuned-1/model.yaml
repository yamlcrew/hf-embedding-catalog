    - 'Nguyên tắc tinh giản biên chế

      1. Bảo đảm sự lãnh đạo của Đảng, phát huy vai trò giám sát của các tổ chức chính trị - xã hội và nhân dân trong quá
      trình thực hiện tinh giản biên chế.

      2. Gắn tinh giản biên chế với sắp xếp tổ chức bộ máy theo hướng tinh gọn, hoạt động hiệu lực, hiệu quả và cơ cấu lại,
      nâng cao chất lượng đội ngũ cán bộ, công chức, viên chức theo vị trí việc làm, phù hợp với cơ chế tự chủ của cơ quan,
      tổ chức, đơn vị.

      3. Bảo đảm nguyên tắc tập trung dân chủ, khách quan, công bằng, công khai, minh bạch và theo quy định của pháp luật.

      4. Bảo đảm chi trả chế độ, chính sách tinh giản biên chế kịp thời, đầy đủ theo quy định của pháp luật, bảo đảm sử dụng
      hiệu quả ngân sách nhà nước.

      5. Người đứng đầu phải chịu trách nhiệm về kết quả thực hiện tinh giản biên chế trong cơ quan, tổ chức, đơn vị được
      giao quản lý theo thẩm quyền.

      6. Đối tượng tinh giản biên chế nếu được bầu cử, tuyển dụng lại vào các cơ quan, tổ chức, đơn vị hưởng lương từ ngân
      sách nhà nước trong thời gian 60 tháng kể từ ngày thực hiện tinh giản biên chế thì phải hoàn trả lại số tiền trợ cấp
      đã nhận cho cơ quan, tổ chức, đơn vị đã chi trả trợ cấp.'
    - '"3. Tiêu chuẩn về trình độ đào tạo, bồi dưỡng

