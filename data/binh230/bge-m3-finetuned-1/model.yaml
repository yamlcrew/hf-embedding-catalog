- source_sentence: Ai ra quyết định thành lập Tủ sách pháp luật tại xã đặc biệt khó khăn?
  sentences:
  - 'Hội đồng dân tộc, các Ủy ban của Quốc hội

    1. Hội đồng dân tộc, Ủy ban của Quốc hội là cơ quan của Quốc hội, chịu trách nhiệm và báo cáo công tác trước Quốc hội;
    trong thời gian Quốc hội không họp thì báo cáo công tác trước Ủy ban thường vụ Quốc hội.

    2. Các Ủy ban của Quốc hội gồm:

    a) Ủy ban pháp luật;

    b) Ủy ban tư pháp;

    c) Ủy ban kinh tế;

    d) Ủy ban tài chính, ngân sách;

    đ) Ủy ban quốc phòng và an ninh;

    e) Ủy ban văn hoá, giáo dục;

    g) Ủy ban xã hội;

    h) Ủy ban khoa học, công nghệ và môi trường;

    i) Ủy ban đối ngoại.

    3. Quốc hội thành lập Ủy ban lâm thời của Quốc hội theo quy định tại Điều 88 và Điều 89 của Luật này.'
  - 'Xây dựng Tủ sách pháp luật

    1. Thành lập Tủ sách pháp luật

    a) Chủ tịch Ủy ban nhân dân xã đặc biệt khó khăn, Thủ trưởng cơ quan, đơn vị của lực lượng vũ trang nhân dân ra quyết
    định thành lập Tủ sách pháp luật. Quyết định thành lập phải quy định cụ thể về địa điểm đặt Tủ sách pháp luật; người phụ
    trách và quyền hạn, nhiệm vụ của người phụ trách; phạm vi và đối tượng phục vụ; Nội quy hoạt động và kinh phí hoạt động
    của Tủ sách pháp luật.

    b) Chủ tịch Ủy ban nhân dân cấp tỉnh chỉ đạo việc quản lý, khai thác thống nhất sách, tài liệu của Tủ sách pháp luật và
    sách, tài liệu pháp luật của Thư viện xã, điểm Bưu điện - Văn hóa xã, Trung tâm học tập cộng đồng phù hợp với thực tiễn
    tại địa phương. Trên cơ sở ý kiến của Thủ tướng Chính phủ và Ban Bí thư Trung ương Đảng quy định tại điểm d khoản 1 Điều
    14 của Quyết định này, Chủ tịch Ủy ban nhân dân cấp tỉnh thực hiện quản lý sách, tài liệu của Tủ sách pháp luật và sách,
    tài liệu pháp luật của Đề án trang bị sách cho cơ sở xã, phường, thị trấn.'
  - 'Nhiệm vụ, quyền hạn của trường trung cấp

    Trường trung cấp thực hiện nhiệm vụ, quyền hạn theo quy định tại Điều 23 của Luật Giáo dục nghề nghiệp, quy định của pháp
    luật có liên quan và các quy định sau đây:

    ...

    2. Quyền hạn:

    a) Xây dựng và tổ chức thực hiện kế hoạch, chiến lược phát triển trường phù hợp với chiến lược phát triển giáo dục nghề
    nghiệp nhằm đáp ứng yêu cầu của thị trường lao động;

    b) Tổ chức đào tạo các chương trình giáo dục nghề nghiệp theo quy định của Bộ trưởng Bộ Lao động - Thương binh và Xã hội;

    c) Liên kết với cơ sở giáo dục nghề nghiệp, cơ sở giáo dục đại học, doanh nghiệp, tổ chức trong nước và nước ngoài theo
    quy định của pháp luật nhằm khai thác, huy động các nguồn lực xã hội trong thực hiện các chương trình đào tạo giáo dục
    nghề nghiệp để nâng cao chất lượng đào tạo, gắn đào tạo với việc làm và thị trường lao động. Đơn vị chủ trì liên kết đào
    tạo chịu trách nhiệm cấp văn bằng, chứng chỉ cho người học;

    d) Liên kết, phối hợp với trường cao đẳng tổ chức đào tạo liên thông từ trình độ sơ cấp, trình độ trung cấp lên trình
    độ cao đẳng theo quy định của Luật Giáo dục nghề nghiệp và các văn bản hướng dẫn thi hành;

    đ) Liên kết, phối hợp với cơ sở giáo dục đại học tổ chức đào tạo trình độ đại học theo hình thức vừa làm vừa học và đào
    tạo liên thông từ trình độ trung cấp lên trình độ đại học theo quy định của Luật Giáo dục đại học và các văn bản hướng
    dẫn thi hành;

    e) Phối hợp với doanh nghiệp, cơ sở sản xuất, kinh doanh, dịch vụ trong hoạt động xây dựng chương trình, giáo trình đào
    tạo, tài liệu, học liệu giảng dạy; tổ chức giảng dạy, hướng dẫn thực hành, thực tập, đánh giá kết quả học tập của người
    học; bồi dưỡng nâng cao trình độ chuyên môn, nghiệp vụ cho nhà giáo;

    g) Tổ chức giảng dạy khối lượng kiến thức văn hóa trung học phổ thông cho học sinh có bằng tốt nghiệp trung học cơ sở
    theo học trình độ trung cấp theo quy định của Luật Giáo dục và các văn bản hướng dẫn thi hành;:

    ...'
- source_sentence: Việc tinh giản biên chế hiện nay được thực hiện theo những nguyên tắc nào?
  sentences:
  - 'Xử phạt hành vi vi phạm trong việc tổ chức bồi dưỡng và cấp Chứng chỉ bồi dưỡng kế toán trưởng

    ...

    4. Phạt tiền từ 10.000.000 đồng đến 20.000.000 đồng đối với cơ sở đào tạo thực hiện một trong các hành vi sau:

    a) Mở khóa học bồi dưỡng kế toán trưởng khi không đủ điều kiện;

    b) Mở khóa học bồi dưỡng kế toán trưởng cho người nước ngoài khi chưa được Bộ Tài chính chấp thuận;

    c) Quản lý phôi và cấp Chứng chỉ bồi dưỡng kế toán trưởng của cơ sở đào tạo không đúng quy định của Bộ Tài chính.

    ...

    6. Biện pháp khắc phục hậu quả:

    Buộc nộp lại số lợi bất hợp pháp có được do thực hiện hành vi vi phạm quy định tại điểm a, b khoản 4, khoản 5 Điều này.Mức
    phạt tiền trong lĩnh vực kế toán, kiểm toán độc lập

    ...

    2. Mức phạt tiền quy định tại Chương II, Chương III Nghị định này là mức phạt tiền áp dụng đối với tổ chức trừ trường
    hợp quy định tại khoản 1 Điều 7; Điều 8; Điều 9; Điều 10; Điều 11; Điều 13; Điều 14; Điều 15; Điều 16; Điều 17; Điều 19;
    khoản 1, khoản 3 Điều 21; Điều 22; Điều 23; Điều 24; Điều 26; Điều 33; Điều 34; khoản 1, khoản 3 Điều 36; khoản 1 Điều
    38; khoản 2, khoản 3 Điều 39; khoản 1, khoản 2 Điều 48; khoản 1 Điều 57; khoản 1, khoản 2 Điều 61; Điều 67 là mức phạt
    tiền đối với cá nhân. Đối với tổ chức có cùng hành vi vi phạm thì mức phạt tiền gấp 02 lần mức phạt tiền đối với cá nhân.

    ...'
  - 'Nguyên tắc tinh giản biên chế

    1. Bảo đảm sự lãnh đạo của Đảng, phát huy vai trò giám sát của các tổ chức chính trị - xã hội và nhân dân trong quá trình
    thực hiện tinh giản biên chế.

    2. Gắn tinh giản biên chế với sắp xếp tổ chức bộ máy theo hướng tinh gọn, hoạt động hiệu lực, hiệu quả và cơ cấu lại,
    nâng cao chất lượng đội ngũ cán bộ, công chức, viên chức theo vị trí việc làm, phù hợp với cơ chế tự chủ của cơ quan,
    tổ chức, đơn vị.

    3. Bảo đảm nguyên tắc tập trung dân chủ, khách quan, công bằng, công khai, minh bạch và theo quy định của pháp luật.

    4. Bảo đảm chi trả chế độ, chính sách tinh giản biên chế kịp thời, đầy đủ theo quy định của pháp luật, bảo đảm sử dụng
    hiệu quả ngân sách nhà nước.

    5. Người đứng đầu phải chịu trách nhiệm về kết quả thực hiện tinh giản biên chế trong cơ quan, tổ chức, đơn vị được giao
    quản lý theo thẩm quyền.

    6. Đối tượng tinh giản biên chế nếu được bầu cử, tuyển dụng lại vào các cơ quan, tổ chức, đơn vị hưởng lương từ ngân sách
    nhà nước trong thời gian 60 tháng kể từ ngày thực hiện tinh giản biên chế thì phải hoàn trả lại số tiền trợ cấp đã nhận
    cho cơ quan, tổ chức, đơn vị đã chi trả trợ cấp.'
  - '"3. Tiêu chuẩn về trình độ đào tạo, bồi dưỡng

    a) Có bằng cử nhân trở lên thuộc ngành đào tạo giáo viên đối với giáo viên trung học cơ sở.

    Trường hợp môn học chưa đủ giáo viên có bằng cử nhân thuộc ngành đào tạo giáo viên thì phải có bằng cử nhân chuyên ngành
    phù hợp và có chứng chỉ bồi dưỡng nghiệp vụ sư phạm dành cho giáo viên trung học cơ sở theo chương trình do Bộ trưởng
    Bộ Giáo dục và Đào tạo ban hành;

    b) Có chứng chỉ bồi dưỡng theo tiêu chuẩn chức danh nghề nghiệp giáo viên trung học cơ sở hạng III (đối với giáo viên
    trung học cơ sở mới được tuyển dụng vào giáo viên trung học cơ sở hạng III thì phải có chứng chỉ trong thời gian 36 tháng
    kể từ ngày được tuyển dụng)."'
- source_sentence: Khi xuất bản phụ trương thì cần đáp ứng những điều kiện gì?
  sentences:
  - 'Hồ sơ, trình tự, thủ tục chấp thuận chủ trương đầu tư ra nước ngoài của Quốc hội

    1. Nhà đầu tư nộp hồ sơ dự án đầu tư ra nước ngoài cho Bộ Kế hoạch và Đầu tư. Hồ sơ bao gồm:

    a) Văn bản đăng ký đầu tư ra nước ngoài;

    b) Tài liệu về tư cách pháp lý của nhà đầu tư;

    c) Đề xuất dự án đầu tư gồm các nội dung chủ yếu sau: hình thức, mục tiêu, quy mô, địa điểm đầu tư; xác định sơ bộ vốn
    đầu tư, phương án huy động vốn, cơ cấu nguồn vốn; tiến độ thực hiện dự án, các giai đoạn đầu tư (nếu có); phân tích sơ
    bộ hiệu quả đầu tư của dự án;

    d) Tài liệu chứng minh năng lực tài chính của nhà đầu tư gồm ít nhất một trong các tài liệu sau: báo cáo tài chính 02
    năm gần nhất của nhà đầu tư; cam kết hỗ trợ tài chính của công ty mẹ; cam kết hỗ trợ tài chính của tổ chức tài chính;
    bảo lãnh về năng lực tài chính của nhà đầu tư; tài liệu khác chứng minh năng lực tài chính của nhà đầu tư;

    đ) Cam kết tự cân đối nguồn ngoại tệ hoặc văn bản cam kết thu xếp ngoại tệ cho nhà đầu tư của tổ chức tín dụng được phép;

    e) Văn bản của cơ quan đại diện chủ sở hữu chấp thuận nhà đầu tư thực hiện hoạt động đầu tư ra nước ngoài và báo cáo thẩm
    định nội bộ về đề xuất đầu tư ra nước ngoài của doanh nghiệp nhà nước quy định tại khoản 1 Điều 59 của Luật này hoặc quyết
    định đầu tư ra nước ngoài theo quy định tại khoản 2 Điều 59 của Luật này;

    g) Đối với dự án đầu tư ra nước ngoài trong các ngành, nghề quy định tại khoản 1 Điều 54 của Luật này, nhà đầu tư nộp
    văn bản của cơ quan nhà nước có thẩm quyền về việc đáp ứng điều kiện đầu tư ra nước ngoài theo quy định của pháp luật
    có liên quan (nếu có).

    2. Trong thời hạn 05 ngày làm việc kể từ ngày nhận đủ hồ sơ, Bộ Kế hoạch và Đầu tư trình Thủ tướng Chính phủ quyết định
    thành lập Hội đồng thẩm định nhà nước.

    3. Trong thời hạn 90 ngày kể từ ngày thành lập, Hội đồng thẩm định nhà nước tổ chức thẩm định và lập báo cáo thẩm định
    trình Chính phủ. Báo cáo thẩm định gồm các nội dung sau đây:

    a) Điều kiện cấp Giấy chứng nhận đăng ký đầu tư ra nước ngoài quy định tại Điều 60 của Luật này;

    b) Tư cách pháp lý của nhà đầu tư;

    c) S'
  - 'Vi phạm quy định về tổ chức, quản trị, điều hành

    1. Phạt tiền từ 20.000.000 đồng đến 30.000.000 đồng đối với một trong các hành vi vi phạm sau đây:

    a) Vi phạm quy định về Hội đồng quản trị, Hội đồng thành viên, Ban kiểm soát quy định tại Điều 43, Điều 44, Điều 62, khoản
    1 Điều 70, Điều 81, Điều 84 Luật Các tổ chức tín dụng;

    b) Không duy trì việc đảm bảo đầy đủ các điều kiện, tiêu chuẩn đối với thành viên Hội đồng quản trị, Ban kiểm soát, Tổng
    giám đốc (Giám đốc) theo quy định của Luật Các tổ chức tín dụng;

    c) Không tổ chức hoặc tổ chức Đại hội đồng cổ đông, Đại hội thành viên không đúng quy định.

    ...Hình thức xử phạt, mức phạt tiền, thẩm quyền phạt tiền và biện pháp khắc phục hậu quả

    ...

    3. Mức phạt tiền và thẩm quyền phạt tiền:

    ...

    b) Mức phạt tiền quy định tại Chương II Nghị định này là mức phạt tiền áp dụng đối với cá nhân; mức phạt tiền đối với
    tổ chức có cùng một hành vi vi phạm hành chính bằng 02 lần mức phạt tiền đối với cá nhân;

    ...'
  - 'Điều kiện xuất bản thêm ấn phẩm báo chí, phụ trương; sản xuất thêm kênh phát thanh, kênh truyền hình; mở chuyên trang
    của báo điện tử

    1. Có tôn chỉ, Mục đích phù hợp với tôn chỉ, Mục đích của cơ quan báo chí; đối tượng phục vụ; nơi đặt máy chủ và đơn vị
    cung cấp dịch vụ kết nối (đối với chuyên trang của báo điện tử) phù hợp với nội dung giấy phép hoạt động của cơ quan báo
    chí.

    2. Có phương án về tổ chức và nhân sự bảo đảm hoạt động của ấn phẩm báo chí, phụ trương, kênh phát thanh, kênh truyền
    hình, chuyên trang của báo điện tử.

    3. Có tên và hình thức trình bày tên ấn phẩm báo chí, phụ trương; tên và biểu tượng kênh phát thanh, kênh truyền hình;
    tên và giao diện trang chủ chuyên trang của báo điện tử.

    4. Có các Điều kiện cơ sở vật chất, kỹ thuật; phương án tài chính; có các giải pháp kỹ thuật bảo đảm an toàn, an ninh
    thông tin; có tên miền cấp dưới phù hợp với tên miền đã đăng ký đối với chuyên trang của báo điện tử; có phương án, kế
    hoạch thuê hoặc sử dụng hạ tầng truyền dẫn, phát sóng đối với kênh phát thanh, kênh truyền hình.'
- source_sentence: Người dân có bị xóa đăng ký thường trú trong trường hợp lên thành phố khác sinh sống hơn 15 năm không về
    lại nơi thường trú ban đầu không?
  sentences:
  - 'Hồ sơ đề nghị hỗ trợ học nghề

    1. Hồ sơ đề nghị hỗ trợ học nghề đối với người lao động đang chờ kết quả giải quyết hưởng trợ cấp thất nghiệp hoặc đang
    hưởng trợ cấp thất nghiệp mà có nhu cầu học nghề tại địa phương nơi đang chờ kết quả hoặc đang hưởng trợ cấp thất nghiệp
    là đề nghị hỗ trợ học nghề theo Mẫu số 03 ban hành kèm theo Nghị định này.

    2. Hồ sơ đề nghị hỗ trợ học nghề đối với người lao động đang hưởng trợ cấp thất nghiệp mà có nhu cầu học nghề tại địa
    phương không phải nơi đang hưởng trợ cấp thất nghiệp bao gồm đề nghị hỗ trợ học nghề theo quy định tại khoản 1 Điều này
    và quyết định về việc hưởng trợ cấp thất nghiệp. Quyết định về việc hưởng trợ cấp thất nghiệp là bản chính hoặc bản sao
    có chứng thực hoặc bản sao kèm theo bản chính để đối chiếu.

    3. Hồ sơ đề nghị hỗ trợ học nghề đối với người lao động không thuộc trường hợp theo quy định tại khoản 1, khoản 2 Điều
    này, bao gồm:

    a) Đề nghị hưởng trợ cấp thất nghiệp;

    b) Đề nghị hỗ trợ học nghề theo quy định tại khoản 1 Điều này;

    c) Bản chính hoặc bản sao có chứng thực hoặc bản sao kèm theo bản chính để đối chiếu của một trong các giấy tờ theo quy
    định tại khoản 2 Điều 16 Nghị định số 28/2015/NĐ-CP đã được sửa đổi, bổ sung tại khoản 6 Điều 1 Nghị định này;

    d) Sổ bảo hiểm xã hội.

    Trường hợp người lao động đã nộp hồ sơ đề nghị hưởng trợ cấp thất nghiệp nhưng không đáp ứng đủ điều kiện hưởng thì hồ
    sơ đề nghị hỗ trợ học nghề là đề nghị hỗ trợ học nghề theo quy định tại khoản 1 Điều này và thông báo của trung tâm dịch
    vụ việc làm về việc người lao động không đáp ứng đủ điều kiện hưởng trợ cấp thất nghiệp.'
  - '"1. Người thuộc một trong các trường hợp sau đây thì bị xóa đăng ký thường trú:

    d) Vắng mặt liên tục tại nơi thường trú từ 12 tháng trở lên mà không đăng ký tạm trú tại chỗ ở khác hoặc không khai báo
    tạm vắng, trừ trường hợp xuất cảnh ra nước ngoài nhưng không phải để định cư hoặc trường hợp đang chấp hành án phạt tù,
    chấp hành biện pháp đưa vào cơ sở giáo dục bắt buộc, đưa vào cơ sở cai nghiện bắt buộc, đưa vào trường giáo dưỡng;"'
  - '“1. Công ty hợp danh là doanh nghiệp, trong đó:

    a) Phải có ít nhất 02 thành viên là chủ sở hữu chung của công ty, cùng nhau kinh doanh dưới một tên chung (sau đây gọi
    là thành viên hợp danh). Ngoài các thành viên hợp danh, công ty có thể có thêm thành viên góp vốn;

    b) Thành viên hợp danh phải là cá nhân, chịu trách nhiệm bằng toàn bộ tài sản của mình về các nghĩa vụ của công ty;

    c) Thành viên góp vốn là tổ chức, cá nhân và chỉ chịu trách nhiệm về các khoản nợ của công ty trong phạm vi số vốn đã
    cam kết góp vào công ty.”'
- source_sentence: Lấn chiếm đất công là đất phi nông nghiệp để xây dựng công trình thì sẽ bị xử phạt vi phạm hành chính như
    thế nào?
  sentences:
  - "1. Mọi người có quyền tự do tín ngưỡng, tôn giáo, theo hoặc không theo một tôn giáo nào. Các tôn giáo bình đẳng trước\
    \ pháp luật.\n2. Nhà nước tôn trọng và bảo hộ quyền tự do tín ngưỡng, tôn giáo. \n3. Không ai được xâm phạm tự do tín\
    \ ngưỡng, tôn giáo hoặc lợi dụng tín ngưỡng, tôn giáo để vi phạm pháp luật.1. Nhà nước tôn trọng và bảo hộ quyền tự do\
    \ tín ngưỡng, tôn giáo của mọi người; bảo đảm để các tôn giáo bình đẳng trước pháp luật.\n2. Nhà nước tôn trọng, bảo vệ\
    \ giá trị văn hóa, đạo đức tốt đẹp của tín ngưỡng, tôn giáo, truyền thống thờ cúng tổ tiên, tôn vinh người có công với\
    \ đất nước, với cộng đồng đáp ứng nhu cầu tinh thần của Nhân dân.\n3. Nhà nước bảo hộ cơ sở tín ngưỡng, cơ sở tôn giáo\
    \ và tài sản hợp pháp của cơ sở tín ngưỡng, tổ chức tôn giáo."
  - 'Quy định chung về quy cách thể hiện

    1. Nội dung thể hiện đối với thuyết minh, bản vẽ của nhiệm vụ và đồ án trong hồ sơ lấy ý kiến, hồ sơ trình thẩm định và
    phê duyệt phải được trình bày rõ ràng, đầy đủ nội dung đối với từng loại, cấp độ quy hoạch và tuân thủ các quy định tại
    Chương II và các phụ lục của Thông tư này.

    2. Hệ thống ký hiệu bản vẽ của nhiệm vụ và đồ án quy hoạch đô thị, nông thôn phải tuân thủ theo quy định tại các phụ lục
    kèm theo Thông tư này.

    3. Căn cứ điều kiện, đặc điểm của vùng liên huyện, vùng huyện, đô thị, khu chức năng và khu vực nông thôn được lập quy
    hoạch, có thể thành lập các bản đồ, sơ đồ riêng cho từng nội dung hiện trạng, định hướng hạ tầng kỹ thuật để đảm bảo thể
    hiện được đầy đủ các nội dung theo yêu cầu.

    4. Trường hợp quy hoạch vùng, quy hoạch tỉnh chưa được phê duyệt, các bản đồ phương hướng phát triển hệ thống đô thị,
    nông thôn; bản đồ phương án quy hoạch hệ thống đô thị, nông thôn; bản đồ quy hoạch sử dụng đất cấp tỉnh; bản đồ tổ chức
    không gian và phân vùng chức năng trong quy hoạch vùng, quy hoạch tỉnh được thay thế bằng sơ đồ định hướng phát triển
    không gian trong quy hoạch xây dựng vùng tỉnh đã được phê duyệt.

    5. Tất cả các sơ đồ, bản đồ trong thành phần bản vẽ của hồ sơ nhiệm vụ và hồ sơ đồ án quy hoạch đô thị và nông thôn phải
    thể hiện rõ phạm vi ranh giới lập quy hoạch; ranh giới, tên các đơn vị hành chính trong phạm vi lập quy hoạch; tên đơn
    vị hành chính tiếp giáp bên ngoài phạm vi lập quy hoạch.'
  - 'Lấn, chiếm đất

    ...

    4. Trường hợp lấn, chiếm đất phi nông nghiệp, trừ trường hợp quy định tại khoản 6 Điều này tại khu vực nông thôn thì hình
    thức và mức xử phạt như sau:

    a) Phạt tiền từ 10.000.000 đồng đến 20.000.000 đồng nếu diện tích đất lấn, chiếm dưới 0,05 héc ta;

    b) Phạt tiền từ 20.000.000 đồng đến 40.000.000 đồng nếu diện tích đất lấn, chiếm từ 0,05 héc ta đến dưới 0,1 héc ta;

    c) Phạt tiền từ 40.000.000 đồng đến 100.000.000 đồng nếu diện tích đất lấn, chiếm từ 0,1 héc ta đến dưới 0,5 héc ta;

    d) Phạt tiền từ 100.000.000 đồng đến 200.000.000 đồng nếu diện tích đất lấn, chiếm từ 0,5 héc ta đến dưới 01 héc ta;

    đ) Phạt tiền từ 200.000.000 đồng đến 500.000.000 đồng nếu diện tích đất lấn, chiếm từ 01 héc ta trở lên.

    5. Trường hợp lấn, chiếm đất chưa sử dụng, đất nông nghiệp, đất phi nông nghiệp (trừ trường hợp quy định tại khoản 6 Điều
    này) tại khu vực đô thị thì mức xử phạt bằng 02 lần mức xử phạt đối với loại đất tương ứng quy định tại các khoản 1, 2,
    3 và 4 Điều này và mức phạt tối đa không quá 500.000.000 đồng đối với cá nhân, không quá 1.000.000.000 đồng đối với tổ
    chức.

    6. Trường hợp lấn, chiếm đất thuộc hành lang bảo vệ an toàn công trình và đất công trình có hành lang bảo vệ, đất trụ
    sở làm việc và cơ sở hoạt động sự nghiệp của cơ quan, tổ chức theo quy định của pháp luật về quản lý, sử dụng tài sản
    nhà nước thì hình thức và mức xử phạt thực hiện theo quy định của pháp luật về xử phạt vi phạm hành chính trong lĩnh vực
    về hoạt động đầu tư xây dựng; khai thác, chế biến, kinh doanh khoáng sản làm vật liệu xây dựng, sản xuất, kinh doanh vật
    liệu xây dựng; quản lý công trình hạ tầng kỹ thuật; kinh doanh bất động sản, phát triển nhà ở, quản lý sử dụng nhà và
    công sở; trong lĩnh vực về giao thông đường bộ và đường sắt; trong lĩnh vực về văn hóa, thể thao, du lịch và quảng cáo;
    trong lĩnh vực về khai thác và bảo vệ công trình thủy lợi; đê điều; phòng, chống lụt, bão; trong lĩnh vực quản lý, sử
    dụng tài sản nhà nước và các lĩnh vực chuyên ngành khác.

    ...Áp dụng mức phạt tiền

    1. Đối tượng áp dụng mức phạt tiền thực '
