  - source_sentence: Người dân có bị xóa đăng ký thường trú trong trường hợp lên thành phố khác sinh sống hơn 15 năm không
      về lại nơi thường trú ban đầu không?
    sentences:
    - 'Hồ sơ đề nghị hỗ trợ học nghề

      1. Hồ sơ đề nghị hỗ trợ học nghề đối với người lao động đang chờ kết quả giải quyết hưởng trợ cấp thất nghiệp hoặc đang
      hưởng trợ cấp thất nghiệp mà có nhu cầu học nghề tại địa phương nơi đang chờ kết quả hoặc đang hưởng trợ cấp thất nghiệp
      là đề nghị hỗ trợ học nghề theo Mẫu số 03 ban hành kèm theo Nghị định này.

      2. Hồ sơ đề nghị hỗ trợ học nghề đối với người lao động đang hưởng trợ cấp thất nghiệp mà có nhu cầu học nghề tại địa
      phương không phải nơi đang hưởng trợ cấp thất nghiệp bao gồm đề nghị hỗ trợ học nghề theo quy định tại khoản 1 Điều
      này và quyết định về việc hưởng trợ cấp thất nghiệp. Quyết định về việc hưởng trợ cấp thất nghiệp là bản chính hoặc
      bản sao có chứng thực hoặc bản sao kèm theo bản chính để đối chiếu.

      3. Hồ sơ đề nghị hỗ trợ học nghề đối với người lao động không thuộc trường hợp theo quy định tại khoản 1, khoản 2 Điều
      này, bao gồm:

      a) Đề nghị hưởng trợ cấp thất nghiệp;

      b) Đề nghị hỗ trợ học nghề theo quy định tại khoản 1 Điều này;

      c) Bản chính hoặc bản sao có chứng thực hoặc bản sao kèm theo bản chính để đối chiếu của một trong các giấy tờ theo
      quy định tại khoản 2 Điều 16 Nghị định số 28/2015/NĐ-CP đã được sửa đổi, bổ sung tại khoản 6 Điều 1 Nghị định này;

      d) Sổ bảo hiểm xã hội.

      Trường hợp người lao động đã nộp hồ sơ đề nghị hưởng trợ cấp thất nghiệp nhưng không đáp ứng đủ điều kiện hưởng thì
      hồ sơ đề nghị hỗ trợ học nghề là đề nghị hỗ trợ học nghề theo quy định tại khoản 1 Điều này và thông báo của trung tâm
      dịch vụ việc làm về việc người lao động không đáp ứng đủ điều kiện hưởng trợ cấp thất nghiệp.'
    - '"1. Người thuộc một trong các trường hợp sau đây thì bị xóa đăng ký thường trú:

      d) Vắng mặt liên tục tại nơi thường trú từ 12 tháng trở lên mà không đăng ký tạm trú tại chỗ ở khác hoặc không khai
      báo tạm vắng, trừ trường hợp xuất cảnh ra nước ngoài nhưng không phải để định cư hoặc trường hợp đang chấp hành án phạt
      tù, chấp hành biện pháp đưa vào cơ sở giáo dục bắt buộc, đưa vào cơ sở cai nghiện bắt buộc, đưa vào trường giáo dưỡng;"'
    - '“1. Công ty hợp danh là doanh nghiệp, trong đó:

      a) Phải có ít nhất 02 thành viên là chủ sở hữu chung của công ty, cùng nhau kinh doanh dưới một tên chung (sau đây gọi
      là thành viên hợp danh). Ngoài các thành viên hợp danh, công ty có thể có thêm thành viên góp vốn;

      b) Thành viên hợp danh phải là cá nhân, chịu trách nhiệm bằng toàn bộ tài sản của mình về các nghĩa vụ của công ty;

      c) Thành viên góp vốn là tổ chức, cá nhân và chỉ chịu trách nhiệm về các khoản nợ của công ty trong phạm vi số vốn đã
      cam kết góp vào công ty.”'
