  base_model: BAAI/bge-m3
  widget:
  - source_sentence: Ai ra quyết định thành lập Tủ sách pháp luật tại xã đặc biệt khó khăn?
    sentences:
    - 'Hội đồng dân tộc, các Ủy ban của Quốc hội

      1. Hội đồng dân tộc, Ủy ban của Quốc hội là cơ quan của Quốc hội, chịu trách nhiệm và báo cáo công tác trước Quốc hội;
      trong thời gian Quốc hội không họp thì báo cáo công tác trước Ủy ban thường vụ Quốc hội.

      2. Các Ủy ban của Quốc hội gồm:

      a) Ủy ban pháp luật;

      b) Ủy ban tư pháp;

      c) Ủy ban kinh tế;

      d) Ủy ban tài chính, ngân sách;

      đ) Ủy ban quốc phòng và an ninh;

      e) Ủy ban văn hoá, giáo dục;

      g) Ủy ban xã hội;

      h) Ủy ban khoa học, công nghệ và môi trường;

      i) Ủy ban đối ngoại.

      3. Quốc hội thành lập Ủy ban lâm thời của Quốc hội theo quy định tại Điều 88 và Điều 89 của Luật này.'
    - 'Xây dựng Tủ sách pháp luật

      1. Thành lập Tủ sách pháp luật

      a) Chủ tịch Ủy ban nhân dân xã đặc biệt khó khăn, Thủ trưởng cơ quan, đơn vị của lực lượng vũ trang nhân dân ra quyết
      định thành lập Tủ sách pháp luật. Quyết định thành lập phải quy định cụ thể về địa điểm đặt Tủ sách pháp luật; người
      phụ trách và quyền hạn, nhiệm vụ của người phụ trách; phạm vi và đối tượng phục vụ; Nội quy hoạt động và kinh phí hoạt
      động của Tủ sách pháp luật.

      b) Chủ tịch Ủy ban nhân dân cấp tỉnh chỉ đạo việc quản lý, khai thác thống nhất sách, tài liệu của Tủ sách pháp luật
      và sách, tài liệu pháp luật của Thư viện xã, điểm Bưu điện - Văn hóa xã, Trung tâm học tập cộng đồng phù hợp với thực
      tiễn tại địa phương. Trên cơ sở ý kiến của Thủ tướng Chính phủ và Ban Bí thư Trung ương Đảng quy định tại điểm d khoản
      1 Điều 14 của Quyết định này, Chủ tịch Ủy ban nhân dân cấp tỉnh thực hiện quản lý sách, tài liệu của Tủ sách pháp luật
      và sách, tài liệu pháp luật của Đề án trang bị sách cho cơ sở xã, phường, thị trấn.'
    - 'Nhiệm vụ, quyền hạn của trường trung cấp

      Trường trung cấp thực hiện nhiệm vụ, quyền hạn theo quy định tại Điều 23 của Luật Giáo dục nghề nghiệp, quy định của
      pháp luật có liên quan và các quy định sau đây:

      ...

      2. Quyền hạn:

      a) Xây dựng và tổ chức thực hiện kế hoạch, chiến lược phát triển trường phù hợp với chiến lược phát triển giáo dục nghề
      nghiệp nhằm đáp ứng yêu cầu của thị trường lao động;

      b) Tổ chức đào tạo các chương trình giáo dục nghề nghiệp theo quy định của Bộ trưởng Bộ Lao động - Thương binh và Xã
      hội;

      c) Liên kết với cơ sở giáo dục nghề nghiệp, cơ sở giáo dục đại học, doanh nghiệp, tổ chức trong nước và nước ngoài theo
      quy định của pháp luật nhằm khai thác, huy động các nguồn lực xã hội trong thực hiện các chương trình đào tạo giáo dục
      nghề nghiệp để nâng cao chất lượng đào tạo, gắn đào tạo với việc làm và thị trường lao động. Đơn vị chủ trì liên kết
      đào tạo chịu trách nhiệm cấp văn bằng, chứng chỉ cho người học;

      d) Liên kết, phối hợp với trường cao đẳng tổ chức đào tạo liên thông từ trình độ sơ cấp, trình độ trung cấp lên trình
      độ cao đẳng theo quy định của Luật Giáo dục nghề nghiệp và các văn bản hướng dẫn thi hành;

      đ) Liên kết, phối hợp với cơ sở giáo dục đại học tổ chức đào tạo trình độ đại học theo hình thức vừa làm vừa học và
