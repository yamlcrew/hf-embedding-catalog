    \ 24 جمادى الأولى 1432 (28 أبريل 2011) المتعلق بتحديد مسطرة إعداد المخطط الجماعي للتنمية.  \nأود معرفة المسطرة المحددة\
    \ لإعداد المخطط الجماعي للتنمية كما يحددها المرسوم، والجهات المعنية بكل مرحلة.  \nهل يبدأ سريان هذا المرسوم من تاريخ نشره\
    \ كما ورد، أم هناك تاريخ آخر لتطبيقه، وماذا يعني ذلك للإجراءات الجارية؟  \nما هي الالتزامات القانونية المترتبة على السلطات\
    \ المحلية والسلطات المركزية بموجب المرسوم رقم 2.10.504 فيما يخص إعداد المخطط الجماعي للتنمية؟"
