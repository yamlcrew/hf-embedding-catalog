- source_sentence: "- أنا مؤمن بنظام التأمين الإجباري الأساسي عن المرض وتوقفت عن مزاولة المهنة لمدة أربعة أشهر لأسباب غير\
    \ مرضية، فتم وقف حقي في الخدمات.  \n- هل يجوز الاعتراض على هذا الوقف أو المطالبة باستمرار الخدمات إذا كان لدي ظرف يختلف\
    \ عن الأسباب المنصوص عليها؟  \n- علمت أن الهيئة المكلفة بالتدبير ملزمة باستمرار تقديم الخدمات للمؤمنين المصابين بمرض طويل\
    \ الأمد أو مرض يستلزم علاجاً خاصاً ومكلفاً.  \n- إذا ظهر لدي مرض طويل الأمد الآن، هل يتوجب عليها استئناف تقديم الخدمات\
    \ لي ولذوي حقوقي بالرغم من الوقف السابق؟  \n- كيف يتم تسوية وضعيتي وفق النص التنظيمي فيما يتعلق مدة الاستفادة من الخدمات\
    \ وكيفية وضع المؤمنين المعنيين في وضعهم؟  \n- ما الفرق بين تطبيق المادة 14 والمادة 14 المكررة 14 فيما يخص استمرار الاستفادة\
    \ من النظام عندما لم أعد أفي شروط الاستفادة، خاصة إذا لم أكن خاضعاً لأي نظام آخر للتأمين الإجباري الأساسي عن المرض؟"
