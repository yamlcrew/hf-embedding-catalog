    المحددة  والإ جراءات  للشروط  الأشخاص  الذاتيين  أو  الاعتباريين  طبقا  قبل  من

    المذكورة،   الشروط  على  أصحابها  توافر  من  تنظيمي ،  والتحقق  نص  بموجب


    وعرض نتائج الدارسة على مجلس الإدارة قصد البت في هذه الطل بات؛


    إليها في  المشار  المراقبة والتدقيق  - القيام وفق توصيات مجلس الإدارة،  بأعمال

