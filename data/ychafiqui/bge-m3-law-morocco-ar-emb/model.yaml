  - source_sentence: "أنا موظف إداري بجماعة محلية وأرغب في فهم دور وزارة الداخلية في تنفيذ هذا المرسوم.  \nأعلم أن تنفيذ المرسوم\
      \ يُسند إلى وزير الداخلية وأنه يُنشر في الجريدة الرسمية، مع نسخه ابتداء من تاريخ نشره، المرسوم رقم 2.10.504 الصادر في\
      \ 24 جمادى الأولى 1432 (28 أبريل 2011) المتعلق بتحديد مسطرة إعداد المخطط الجماعي للتنمية.  \nأود معرفة المسطرة المحددة\
      \ لإعداد المخطط الجماعي للتنمية كما يحددها المرسوم، والجهات المعنية بكل مرحلة.  \nهل يبدأ سريان هذا المرسوم من تاريخ\
      \ نشره كما ورد، أم هناك تاريخ آخر لتطبيقه، وماذا يعني ذلك للإجراءات الجارية؟  \nما هي الالتزامات القانونية المترتبة\
      \ على السلطات المحلية والسلطات المركزية بموجب المرسوم رقم 2.10.504 فيما يخص إعداد المخطط الجماعي للتنمية؟"
    sentences:
    - 'تحدث  لدى المجلس الإداري هيئة علمية لمساعدته على القيام بمهامه .


      ولهذا الغرض تضطلع الهيئة المذكورة بالمهام ذات الطابع العلمي الفني ولاسيما منها:


      بنسخ  العمليات  المتعلقة  والفنية،   على  إنجاز  العلمية  الوجهة  - الإشراف،  من

      الوسائط،   المتعددة  الدعائم  مختلف  على  وتسجيله  وطبعه  الشريف  المصحف


      والعمل على تتبع هذه العمليات ومراقبة تنفيذها؛


      - دراسة طلبات الترخيص بطبع المصحف الشريف أو بنشره أو بتوزيع المقدمة

      المحددة  والإ جراءات  للشروط  الأشخاص  الذاتيين  أو  الاعتباريين  طبقا  قبل  من

      المذكورة،   الشروط  على  أصحابها  توافر  من  تنظيمي ،  والتحقق  نص  بموجب


      وعرض نتائج الدارسة على مجلس الإدارة قصد البت في هذه الطل بات؛


      إليها في  المشار  المراقبة والتدقيق  - القيام وفق توصيات مجلس الإدارة،  بأعمال

      المادتين 2 و4 أعلاه، وإعداد تقارير خاصة بذلك، ترفع إلى علم المجلس المذكور


      قصد اتخاذ الإجراءات المناسبة عند الاقتضاء.'
