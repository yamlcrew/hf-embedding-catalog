  - source_sentence: 'أنا مهتم بممارسة نشاط مع معهد يختص بالتكوين والبحث والخبرة في ميادين الفنون التشكيلية والتطبيقية والتصميم
      والفنون البصرية السردية والرقمية.

      المعهد يلتزم بالتكوين الأساسي والتكوين المستمر والبحث العلمي والفني والتقني، بما في ذلك ترميم الأعمال الفنية والمحافظة
      الوقائية.

      هل يحق للمعهد تنظيم تداريب وندوات وملتقيات ودورات للتكوين المستمر لفائدة الطلبة والفنانين ومستخدمي المؤسسات العامة والخاصة
      المهتمة بالميادين المذكورة، وكذلك إعداد برامج بحث للماستر والدكتوراه؟

      وما هي الشروط أو القيود القانونية أو الإجرائية اللازمة لتنفيذ هذه الأنشطة في إطار تعاون مع القطاعات العمومية والخاصة؟'
    sentences:
    - 'اللجنة  تلاحظها  لتطبيقه  الصادرة  والنصوص  القانون  مخالفة  لأحكام  هذا  كل  ترفع

      المنصوص عليها في المادة السابقة الى علم وزير المالية الذي يجوز له باقتراح من اللجنة أن


      يصدر على المخالف احدى العقوبات التالية:


      - الإنذار؛

      - غرامة تساوي بالدرهم ما يقابل قيمة 50.000 دولار أمريكي على الأكثر ؛


      - سحب رخصة الاعتماد.


      ولا تحول العقوبات المذكورة التي يجب أن تكون معللة دون تعرض المخالف للعقوبات

      بنظام  المتعلقة  النصوص  في  ولاسيما  العمل  به  الجاري  التشريع  في  عليها  المنصوص


      الصرف.'
    - 'يحدد في الترخيص ما يلي بوجه خاص:


      - مدة أشغال البناء وإن اقتضى الحال فترات إنجازها؛

      - حجم الماء المراد تجميعه؛


      - استعمال الماء؛

      - القواعد المتعلقة باستغلال المنشأة والمحافظة عليها وصيانتها؛


      - التدابير الواجب اتخاذها لتجنب كل تأثير سلبي للمنشأة على البيئة؛

      - مدة الترخيص التي لا يمكن أن تتجاوز 50 سنة؛


      - الشروط المتعلقة بالتغيير والتجديد والتحويل.'
    - 'تناط بالمعهد مهمة التكوين والبحث والخبرة.


      ويقوم بالتكوين الأساسي والتكوين المستمر والبحث العلمي والفني والتقني في ميادين

      الفنون التشكيلية والتطبيقية والتصميم والفنون البصرية السردية والرقمية والمحافظة الوقائية


      للأعمال الفنية وترميمها، والميادين المرتبطة بها.


      وتشمل هذه المهمة أي شكل من أشكال التكوين يمكن اعتباره مفيدا للطالب حسب المحيط

      العام أو الظرفي.


      وتهدف هذه التكوينات إلى نشر المعارف الفنية وإدماج الخريجين في الحياة العملية.


      يمكن للمعهد أيضا أن:


