widgetData:
- source_sentence: Rock Rap or Reggaeton Assessing Mexican Immigrants Cultural Assimilation Using Facebook Data
  sentences:
  - Teno An Efficient HighThroughput Computing Job Execution Framework on Tianhe2.Largescale and looselycoupled applications
    cannot be implemented directly on highperformance computing platforms. At the same time the deployment and maintenance
    of highperformance computing and highthroughput computing will result in the waste of computing resources. In order to
    solve the problem that existing resource management systems cannot make highthroughput computing applications execute
    efficiently on highperformance computers we propose design and implement a highthroughput computing job execution framework
    Teno without modifying the existing configuration environment of Slurm on Tianhe2. It uses Slurm to implement finegrained
    resource scheduling through the idea of hierarchical scheduling and optimizes the traditional MasterWorker model thereby
    speeding up the highthroughput operation and increasing the effective utilization of cluster resources. Effective faulttolerance
    mechanisms such as fault recovery and error retry are also implemented. Finally we design various experiments in Tianhe2
    to test and evaluate the key factors for highthroughput calculations of Teno Slurm and HTCondor and analyze in detail
    why the performance of Teno is over that of the other two.
  - A finitevolume model of the cerebrospinal fluid CSF system encompassing the third ventricle and the aqueduct of Sylvius
    was used to reconstruct CSF velocity and pressure fields based on MRI data The flow domain geometry was obtained through
    segmentation of MRI brain anatomy scans The movement of the domain walls was interpolated from brain motion MRI scans
    A constant pressure boundary condition BC was specified at the foramina of Monro A transient velocity BC reconstructed
    from velocimetric MRI scans was employed at the inferior end of the aqueduct of Sylvius It could be shown that a combination
    of MRI scans and computational fluid dynamics CFD simulation can be used to reconstruct the flow field in the third ventricle
    Preinterventional knowledge of patientspecific CSF flow has the potential to improve neurosurgical interventions such
    as shunt placement in case of hydrocephalus © SpringerVerlag Berlin Heidelberg 2005
  - The degree to which Mexican immigrants in the US are assimilating culturally has been widely debated To examine this question
    we focus on musical taste a key symbolic resource that signals the social positions of individuals We adapt an assimilation
    metric from earlier work to analyze selfreported musical interests among immigrants in Facebook We use the relative levels
    of interest in musical genres where a similarity to the host population in musical preferences is treated as evidence
    of cultural assimilation Contrary to skeptics of Mexican assimilation we find significant cultural convergence even among
    firstgeneration immigrants which problematizes their use as assimilative “benchmarks” in the literature Further 2nd generation
    Mexican Americans show high cultural convergence visavis both Anglos and AfricanAmericans with the exception of those
    who speak Spanish Rather than conforming to a single assimilation path our findings reveal how Mexican immigrants defy
    simple unilinear theoretical expectations and illuminate their uniquely heterogeneous character
- source_sentence: Low Complexity NOMA System With Combined Constellations
  sentences:
  - Theory Recovery.In this paper we examine the problem of repairing incomplete background knowledge using Theory Recovery.
    Repeat Learning under ILP considers the problem of updating background knowledge in order to progressively increase the
    performance of an ILP algorithm as it tackles a sequence of related learning problems. Theory recovery is suggested as
    a suitable mechanism. A bound is derived for the performance of theory recovery in terms of the information content of
    the missing predicate definitions. Experiments are described that use the logical backpropagation ability of Progol 5.0
    to perform theory recovery. The experimental results are consistent with the derived bound.
  - Design and Analysis of 66GHz Voltage Controlled Oscillators for FMCW Radar Applications with Phase Noise Impact Consideration.Accuracy
    in measurement is one of the most important characteristics of a radar. One of the main challenges in designing Frequency
    Modulated Continuous Wave FMCW radar is reducing phase noise and controlling leakage of transmitter phase noise into the
    receiver. Phase noise reduces the maximum transmission power the ability of small targets detection and the measurable
    range. This paper presents a powerefficient and lowphase noise Voltage controlled oscillator VCO implemented in a 65nm
    TSMC CMOS technology. The VCO is designed for a 66 GHz phaselocked loop utilized in the frequency modulated continuous
    wave FMCW radar. The tuning range of the VCO is from 63.5 GHz to 68.6 GHz. Simulated phase noise is −94 dBcHz at IMHz
    offset. It dissipates 20 mW from 1.2 V supply.
  - In this letter a nonorthogonal multiple access system based on combinatorial designs CNOMA is studied The sparse pattern
    of balanced incomplete block designs provide an inherent mapping for this system A novel constellation design is proposed
    to avoid the indeterminate equations when multiuser data is linearly combined over the resources It can form a bijection
    mapping with much lower complexity compared to other NOMA approaches that require the design of complex codebooks and
    decoders This will allow a larger number of users The simulation results show that our system obtains an equivalent andor
    better performance compared to other NOMA systems
- source_sentence: Recent Advances and Trends in OnBoard Embedded and Networked Automotive Systems.Modern cars consist of
    a number of complex embedded and networked systems with steadily increasing requirements in terms of processing and communication
    resources. Novel automotive applications such as automated driving rise new needs and novel design challenges that cover
    a broad range of hardwaresoftware engineering aspects. In this context this paper provides an overview of the current
    technological challenges in onboard and networked automotive systems. This paper encompasses both the stateoftheart design
    strategies and the upcoming hardwaresoftware solutions for the next generation of automotive systems with a special focus
    on embedded and networked technologies. In particular this paper surveys current solutions and future trends on models
    and languages for automotive software development onboard computational platforms incar network architectures and communication
    protocols and novel design strategies for cybersecurity and functional safety.
  sentences:
  - MCVAE Marginbased Conditional Variational Autoencoder for Relation Classification and Pattern Generation.Relation classification
    is a basic yet important task in natural language processing. Existing relation classification approaches mainly rely
    on distant supervision which assumes that a bag of sentences mentioning a pair of entities and extracted from a given
    corpus should express the same relation type of this entity pair. The training of these models needs a lot of highquality
    baglevel data. However in some specific domains such as medical domain it is difficult to obtain sufficient and highquality
    sentences in a text corpus that mention two entities with a certain medical relation between them. In such a case it is
    hard for existing discriminative models to capture the representative features i.e. common patterns from diversely expressed
    entity pairs with a given relation. Thus the classification performance cannot be guaranteed when limited features are
    obtained from the corpus. To address this challenge in this paper we propose to employ a generative model called conditional
    variational autoencoder CVAE to handle the pattern sparsity. We define that each relation has an individually learned
    latent distribution from all possible sentences expressing this relation. As these distributions are learned based on
    the purpose of input reconstruction the modelu0027s classification ability may not be strong enough and should be improved.
    By distinguishing the differences among different relation distributions a marginbased regularizer is designed which leads
    to a marginbased CVAE MCVAE that can significantly enhance the classification ability. Besides MCVAE can automatically
    generate semantically meaningful patterns that describe the given relations. Experiments on two realworld datasets validate
    the effectiveness of the proposed MCVAE on the tasks of relation classification and relationspecific pattern generation.
  - Bribery in election or computational social choice in general is an important problem that has received a considerable
    amount of attention In the classic bribery problem the briber or attacker bribes some voters in attempting to make the
    briberu0027s designated candidate win an election In this paper we introduce a novel variant of the bribery problem Election
    with Bribed Voter Uncertainty or BVU for short accommodating the uncertainty that the vote of a bribed voter may or may
    not be counted This uncertainty occurs either because a bribed voter may not cast its vote in fear of being caught or
    because a bribed voter is indeed caught and therefore its vote is discarded As a first step towards ultimately understanding
    and addressing this important problem we show that it does not admit any multiplicative O1approximation algorithm modulo
    standard complexity assumptions We further show that there is an approximation algorithm that returns a solution with
    an additiveepsilon error in FPT time for any fixed epsilon
  - Petri nets also known as vector addition systems are a long established model of concurrency with extensive applications
    in modelling and analysis of hardware software and database systems as well as chemical biological and business processes
    The central algorithmic problem for Petri nets is reachability whether from the given initial configuration there exists
    a sequence of valid execution steps that reaches the given final configuration The complexity of the problem has remained
    unsettled since the 1960s and it is one of the most prominent open questions in the theory of verification Decidability
    was proved by Mayr in his seminal STOC 1981 work and the currently best published upper bound is nonprimitive recursive
    Ackermannian of Leroux and Schmitz from LICS 2019 We establish a nonelementary lower bound ie that the reachability problem
    needs a tower of exponentials of time and space Until this work the best lower bound has been exponential space due to
    Lipton in 1976 The new lower bound is a major breakthrough for several reasons Firstly it shows that the reachability
    problem is much harder than the coverability ie state reachability problem which is also ubiquitous but has been known
    to be complete for exponential space since the late 1970s Secondly it implies that a plethora of problems from formal
    languages logic concurrent systems process calculi and other areas that are known to admit reductions from the Petri nets
    reachability problem are also not elementary Thirdly it makes obsolete the currently best lower bounds for the reachability
    problems for two key extensions of Petri nets with branching and with a pushdown stack
- source_sentence: A SmartphoneBased Probe Data Platform for Road Management and Safety in Developing Countries
  sentences:
  - Optimizing computationcommunication overlap in asynchronous taskbased programs poster.Asynchronous taskbased programming
    models are gaining popularity to address programmability and performance challenges in high performance computing. One
    of the main attractions of these models and runtimes is their potential to automatically expose and exploit overlap of
    computation with communication. However inefficient interactions between such programming models and the underlying messaging
    layer in most cases MPI limit the achievable computationcommunication overlap and negatively impact the performance of
    parallel programs. We propose to expose information about MPI internals to a taskbased runtime system to make better scheduling
    decisions. In particular we show how existing mechanisms used to profile MPI implementations can be used to share information
    between MPI and a taskbased runtime. Further an evaluation of the proposed method shows performance improvements of up
    to 30.7 for applications with collective communication.
  - In complex systems one can often identify various entities or artifacts The lifecycles of these artifacts and the loosely
    coupled interactions between them define the system behavior The analysis of such artifact system behavior with traditional
    process discovery techniques is often problematic due to the existence of manytomany relationships between artifacts resulting
    in models that are difficult to understand and statistics that are inaccurate The aim of this work is to address these
    issues and enable the calculation of statistics regarding the synchronisation of behaviour between artifact instances
    By using a Petri net formalisation with step sequence execution semantics to support true concurrency we create statebased
    artifact lifecycle models that support manytomany relations between artifacts The approach has been implemented as an
    interactive visualisation in ProM and evaluated using reallife public data
  - In the developing countries it is challenging to understand the road conditions and driving behavior due to the high cost
    and unavailability of appropriate equipment Taking the advantage of collective intelligence recorded by cheap and widelyavailable
    smartphones this paper proposes a probe data platform for sensing detecting and visualizing road roughness and driving
    behavior using smartphones and cloud computing Our implementation has been deployed 1 to collect real driving records
    on different roads in Hyderabad city in India and 2 to visualize significant difference in terms of road conditions as
    well as driving behavior This research work aims to establish a platform for better road planning management and safety
    through distributed data collection and data analytics
- source_sentence: Design of Digital Gloves with Feedback for VR
  sentences:
  - This article describes the first steps in the development of a lowcost digital sensory glove that designed for use in
    virtual reality systems especially Existing concepts of gloves differ in features and design they have various functions
    including feedback tactile feedback to the electric discharge a feeling of finger bending finger grip strength and prediction
    of action and threedimensional spatial positioning to improve sensation and practical experience in virtual reality Manual
    dynamic perception and freedom of action common in the real world provide instant information about objects in the virtual
    world Digital gloves act not only as a remote control in VR but also provide physical feedback for the user when they
    come in contact with virtual objects This article presented an own design for inexpensive gloves that allow for proximal
    and distal finger joint movements as well as positionorientation determination with an inertial measuring unit These sensors
    and tactile feedback caused by the vibration patterns of the coins at the fingertips are integrated into a wireless easytouse
    and opensource system The design of hardware as well as experiment plans for proof of concept is presented
  - Many speech enhancement methods try to learn the relationship between noisy and clean speechs obtained using an acoustic
    room simulator We point out several limitations of enhancement methods relying on clean speech targets the goal of this
    letter is to propose an alternative learning algorithm called acoustic and adversarial supervision AAS AAS makes the enhanced
    output both maximizing the likelihood of transcription on the pretrained acoustic model and having general characteristics
    of clean speech which improve generalization on unseen noisy speeches We employ the connectionist temporal classification
    and the unpaired conditional boundary equilibrium generative adversarial network as the loss function of AAS AAS is tested
    on two datasets including additive noise without and with reverberation Librispeech DEMAND and CHiME4 By visualizing the
    enhanced speech with different loss combinations we demonstrate the role of each supervision AAS achieves a lower word
    error rate than other stateoftheart methods using the clean speech target in both datasets
  - Admission control in queuetime loop productionmixed integer programming with Lagrangian relaxation MIPLAR.Abstract Flow
    shop scheduling problems with queue time constraints abound in many types of industries. The waiting times between consecutive
    steps in flow shop production with queue time constraints cannot exceed a given interval. Typically managers use mixed
    integer linear programming MILP to schedule the process starting times of jobs in a queue. However as the number of jobs
    in the system increases the MILPbased model cannot return an optimal solution within a reasonable time because of its
    combinatorial nature. This paper proposes a mixed integer programming with Lagrangian relaxation MIPLAR method to solve
    the timeindexed MILP model with a separable structure for the production scheduling problem with queue time constraints.
    Lagrangian relaxation techniques are used to decompose the problem into joblevel subproblems which are solved by dynamic
    programming. The subgradient method is used to solve the Lagrangian dual problem. A 4.6month simulation study demonstrates
    that the proposed MIPLAR method improves the scrap count by a percentage range from 32.1 to 83.7 across the studied 16
    scenarios compared to the firstinfirstout FIFO rule while maintaining the same range of the throughput.
