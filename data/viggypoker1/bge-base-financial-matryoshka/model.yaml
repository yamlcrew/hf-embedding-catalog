widgetData:
- source_sentence: Our effective tax rate for fiscal years 2023 and 2022 was 19% and 13%, respectively.
  sentences:
  - What does the Corporate and Other segment include in its composition?
  - What was the effective tax rate for Microsoft in fiscal year 2023?
  - What roles did Elizabeth Rutledge hold before being appointed as Chief Marketing Officer in February 2018?
- source_sentence: Many factors are considered when assessing whether it is more likely than not that the deferred tax assets
    will be realized, including recent cumulative earnings, expectations of future taxable income, carryforward periods and
    other relevant quantitative and qualitative factors.
  sentences:
  - What factors are considered when evaluating the realization of deferred tax assets?
  - What are the contents of Item 8 in the financial document?
  - Are goodwill and indefinite-lived intangible assets amortized?
- source_sentence: Cost of net revenues represents costs associated with customer support, site operations, and payment processing.
    Significant components of these costs primarily consist of employee compensation (including stock-based compensation),
    contractor costs, facilities costs, depreciation of equipment and amortization expense, bank transaction fees, credit
    card interchange and assessment fees, authentication costs, shipping costs and digital services tax.
  sentences:
  - What was the total percentage of U.S. dialysis patient service revenues coming from government-based programs in 2023?
  - What are the key components of cost of net revenues?
  - What elements define Ford Credit's balance sheet liquidity profile?
- source_sentence: Net revenue from outside of the United States decreased 15.5% to $34.9 billion in fiscal year 2023.
  sentences:
  - How did the company's net revenue perform internationally in fiscal year 2023?
  - What was the fair value of money market mutual funds measured at as of January 31, 2023 and how was it categorized in
    the fair value hierarchy?
  - How much did professional services expenses increase in 2023 from the previous year?
- source_sentence: Marketplace revenue increased $86.3 million to $2.0 billion in the year ended December 31, 2023 compared
    to the year ended December 31, 2022.
  sentences:
  - What were the main factors considered in the audit process to evaluate the self-insurance reserve?
  - How much did Marketplace revenue increase in the year ended December 31, 2023?
  - Why did operations and support expenses decrease in 2023, and what factors offset this decrease?
