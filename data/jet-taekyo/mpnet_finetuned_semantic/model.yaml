- source_sentence: What does the term 'rights, opportunities, or access' encompass in this framework?
  sentences:
  - "10 \nGAI systems can ease the unintentional production or dissemination of false, inaccurate, or misleading \ncontent\
    \ (misinformation) at scale, particularly if the content stems from confabulations.  \nGAI systems can also ease the deliberate\
    \ production or dissemination of false or misleading information \n(disinformation) at scale, where an actor has the explicit\
    \ intent to deceive or cause harm to others. Even \nvery subtle changes to text or images can manipulate human and machine\
    \ perception. \nSimilarly, GAI systems could enable a higher degree of sophistication for malicious actors to produce\
    \ \ndisinformation that is targeted towards speciﬁc demographics. Current and emerging multimodal models \nmake it possible\
    \ to generate both text-based disinformation and highly realistic “deepfakes” – that is, \nsynthetic audiovisual content\
    \ and photorealistic images.12 Additional disinformation threats could be \nenabled by future GAI models trained on new\
    \ data modalities."
