      \ to online classrooms, in ways that profoundly impact people’s lives. But this \nexpansive impact is not always visible.\
      \ An applicant might not know whether a person rejected their resume or a \nhiring algorithm moved them to the bottom\
      \ of the list. A defendant in the courtroom might not know if a judge deny­\ning their bail is informed by an automated\
      \ system that labeled them “high risk.” From correcting errors to contesting \ndecisions, people are often denied the\
      \ knowledge they need to address the impact of automated systems on their lives."
  - source_sentence: Who should conduct the assessment of the impact of surveillance on rights and opportunities?
    sentences:
    - "APPENDIX\n•\nJulia Simon-Mishel, Supervising Attorney, Philadelphia Legal Assistance\n•\nDr. Zachary Mahafza, Research\
      \ & Data Analyst, Southern Poverty Law Center\n•\nJ. Khadijah Abdurahman, Tech Impact Network Research Fellow, AI Now\
      \ Institute, UCLA C2I1, and\nUWA Law School\nPanelists separately described the increasing scope of technology use in\
      \ providing for social welfare, including \nin fraud detection, digital ID systems, and other methods focused on improving\
      \ efficiency and reducing cost. \nHowever, various panelists individually cautioned that these systems may reduce burden\
      \ for government \nagencies by increasing the burden and agency of people using and interacting with these technologies.\
      \ \nAdditionally, these systems can produce feedback loops and compounded harm, collecting data from \ncommunities and\
      \ using it to reinforce inequality. Various panelists suggested that these harms could be"
    - "assessments, including data retention timelines and associated justification, and an assessment of the \nimpact of\
      \ surveillance or data collection on rights, opportunities, and access. Where possible, this \nassessment of the impact\
      \ of surveillance should be done by an independent party. Reporting should be \nprovided in a clear and machine-readable\
      \ manner.  \n35"
    - "access to education, housing, credit, employment, and other programs; or, access to critical resources or \nservices,\
      \ such as healthcare, financial services, safety, social services, non-deceptive information about goods \nand services,\
      \ and government benefits. \n10"
  - source_sentence: How can voting-related systems impact privacy and security?
    sentences:
    - "as custody and divorce information, and home, work, or school environmental data); or have the reasonable potential\
      \ \nto be used in ways that are likely to expose individuals to meaningful harm, such as a loss of privacy or financial\
      \ harm \ndue to identity theft. Data and metadata generated by or about those who are not yet legal adults is also sensitive,\
      \ even \nif not related to a sensitive domain. Such data includes, but is not limited to, numerical, text, image, audio,\
      \ or video \ndata. “Sensitive domains” are those in which activities being conducted can cause material harms, including\
      \ signifi­\ncant adverse effects on human rights such as autonomy and dignity, as well as civil liberties and civil\
      \ rights. Domains \nthat have historically been singled out as deserving of enhanced data protections or where such\
      \ enhanced protections \nare reasonably expected by the public include, but are not limited to, health, family planning\
      \ and care, employment,"
    - "agreed upon the importance of advisory boards and compensated community input early in the design process \n(before\
      \ the technology is built and instituted). Various panelists also emphasized the importance of regulation \nthat includes\
      \ limits to the type and cost of such technologies. \n56"
    - "Surveillance and criminal justice system algorithms such as risk assessments, predictive  \n    policing, automated\
      \ license plate readers, real-time facial recognition systems (especially  \n    those used in public places or during\
      \ protected activities like peaceful protests), social media  \n    monitoring, and ankle monitoring devices; \nVoting-related\
      \ systems such as signature matching tools; \nSystems with a potential privacy impact such as smart home systems and\
      \ associated data,  \n    systems that use or collect health-related data, systems that use or collect education-related\
      \  \n    data, criminal justice system data, ad-targeting systems, and systems that perform big data  \n    analytics\
      \ in order to build profiles or infer personal information about individuals; and \nAny system that has the meaningful\
      \ potential to lead to algorithmic discrimination. \n• Equal opportunities, including but not limited to:"
  - source_sentence: What impact do automated systems have on underserved communities?
    sentences:
    - "generation, summarization, search, and chat. These activities can take place within organizational \nsettings or in\
      \ the public domain. \nOrganizations can restrict AI applications that cause harm, exceed stated risk tolerances, or\
      \ that conﬂict \nwith their tolerances or values. Governance tools and protocols that are applied to other types of\
      \ AI \nsystems can be applied to GAI systems. These plans and actions include: \n• Accessibility and reasonable \naccommodations\
      \ \n• AI actor credentials and qualiﬁcations  \n• Alignment to organizational values \n• Auditing and assessment \n\
      • Change-management controls \n• Commercial use \n• Data provenance"
    - "automated systems make on underserved communities and to institute proactive protections that support these \ncommunities.\
      \ \n•\nAn automated system using nontraditional factors such as educational attainment and employment history as\npart\
      \ of its loan underwriting and pricing model was found to be much more likely to charge an applicant who\nattended a\
      \ Historically Black College or University (HBCU) higher loan prices for refinancing a student loan\nthan an applicant\
      \ who did not attend an HBCU. This was found to be true even when controlling for\nother credit-related factors.32\n\
      •\nA hiring tool that learned the features of a company's employees (predominantly men) rejected women appli­\ncants\
      \ for spurious and discriminatory reasons; resumes with the word “women’s,” such as “women’s\nchess club captain,” were\
      \ penalized in the candidate ranking.33\n•\nA predictive model marketed as being able to predict whether students are\
      \ likely to drop out of school was"
    - "on a principle of local control, such that those individuals closest to the data subject have more access while \n\
      those who are less proximate do not (e.g., a teacher has access to their students’ daily progress data while a \nsuperintendent\
      \ does not). \nReporting. In addition to the reporting on data privacy (as listed above for non-sensitive data), entities\
      \ devel-\noping technologies related to a sensitive domain and those collecting, using, storing, or sharing sensitive\
      \ data \nshould, whenever appropriate, regularly provide public reports describing: any data security lapses or breaches\
      \ \nthat resulted in sensitive data leaks; the number, type, and outcomes of ethical pre-reviews undertaken; a \ndescription\
      \ of any data sold, shared, or made public, and how that data was assessed to determine it did not pres-\nent a sensitive\
      \ data risk; and ongoing risk identification and management procedures, and any mitigation added"
