  language:
  - en
  license: apache-2.0
  tags:
  - sentence-transformers
  - sentence-similarity
  - feature-extraction
  - dense
  - generated_from_trainer
  - dataset_size:180
  - loss:MatryoshkaLoss
  - loss:MultipleNegativesRankingLoss
  base_model: shubharuidas/codebert-embed-base-dense-retriever
  widget:
  - source_sentence: Explain the __init__ logic
    sentences:
    - "async def test_handler_with_async_execution() -> None:\n    \"\"\"Test handler works correctly with async tool execution.\"\
      \"\"\n\n    @tool\n    def async_add(a: int, b: int) -> int:\n        \"\"\"Async add two numbers.\"\"\"\n        return\
      \ a + b\n\n    def modifying_handler(\n        request: ToolCallRequest,\n        execute: Callable[[ToolCallRequest],\
      \ ToolMessage | Command],\n    ) -> ToolMessage | Command:\n        \"\"\"Handler that modifies arguments.\"\"\"\n \
      \       # Add 10 to both arguments using override method\n        modified_call = {\n            **request.tool_call,\n\
      \            \"args\": {\n                **request.tool_call[\"args\"],\n                \"a\": request.tool_call[\"\
      args\"][\"a\"] + 10,\n                \"b\": request.tool_call[\"args\"][\"b\"] + 10,\n            },\n        }\n \
      \       modified_request = request.override(tool_call=modified_call)\n        return execute(modified_request)\n\n \
      \   tool_node = ToolNode([async_add], wrap_tool_call=modifying_handler)\n\n    result = await tool_node.ainvoke(\n \
      \       {\n            \"messages\": [\n                AIMessage(\n                    \"adding\",\n              \
      \      tool_calls=[\n                        {\n                            \"name\": \"async_add\",\n             \
      \               \"args\": {\"a\": 1, \"b\": 2},\n                            \"id\": \"call_13\",\n                \
      \        }\n                    ],\n                )\n            ]\n        },\n        config=_create_config_with_runtime(),\n\
      \    )\n\n    tool_message = result[\"messages\"][-1]\n    assert isinstance(tool_message, ToolMessage)\n    # Original:\
      \ 1 + 2 = 3, with modifications: 11 + 12 = 23\n    assert tool_message.content == \"23\""
    - "def __init__(self) -> None:\n        self.loads: set[str] = set()\n        self.stores: set[str] = set()"
    - "class InternalServerError(APIStatusError):\n    pass"
  - source_sentence: Explain the async _load_checkpoint_tuple logic
    sentences:
    - 'def task(__func_or_none__: Callable[P, Awaitable[T]]) -> _TaskFunction[P, T]: ...'
    - "class State(BaseModel):\n        query: str\n        inner: InnerObject\n        answer: str | None = None\n      \
      \  docs: Annotated[list[str], sorted_add]"
    - "async def _load_checkpoint_tuple(self, value: DictRow) -> CheckpointTuple:\n        \"\"\"\n        Convert a database\
      \ row into a CheckpointTuple object.\n\n        Args:\n            value: A row from the database containing checkpoint\
      \ data.\n\n        Returns:\n            CheckpointTuple: A structured representation of the checkpoint,\n         \
      \   including its configuration, metadata, parent checkpoint (if any),\n            and pending writes.\n        \"\"\
      \"\n        return CheckpointTuple(\n            {\n                \"configurable\": {\n                    \"thread_id\"\
      : value[\"thread_id\"],\n                    \"checkpoint_ns\": value[\"checkpoint_ns\"],\n                    \"checkpoint_id\"\
      : value[\"checkpoint_id\"],\n                }\n            },\n            {\n                **value[\"checkpoint\"\
      ],\n                \"channel_values\": {\n                    **(value[\"checkpoint\"].get(\"channel_values\") or {}),\n\
      \                    **self._load_blobs(value[\"channel_values\"]),\n                },\n            },\n          \
      \  value[\"metadata\"],\n            (\n                {\n                    \"configurable\": {\n               \
      \         \"thread_id\": value[\"thread_id\"],\n                        \"checkpoint_ns\": value[\"checkpoint_ns\"],\n\
      \                        \"checkpoint_id\": value[\"parent_checkpoint_id\"],\n                    }\n              \
      \  }\n                if value[\"parent_checkpoint_id\"]\n                else None\n            ),\n            await\
      \ asyncio.to_thread(self._load_writes, value[\"pending_writes\"]),\n        )"
  - source_sentence: Explain the flattened_runs logic
    sentences:
    - "class ChannelWrite(RunnableCallable):\n    \"\"\"Implements the logic for sending writes to CONFIG_KEY_SEND.\n    Can\
      \ be used as a runnable or as a static method to call imperatively.\"\"\"\n\n    writes: list[ChannelWriteEntry | ChannelWriteTupleEntry\
      \ | Send]\n    \"\"\"Sequence of write entries or Send objects to write.\"\"\"\n\n    def __init__(\n        self,\n\
      \        writes: Sequence[ChannelWriteEntry | ChannelWriteTupleEntry | Send],\n        *,\n        tags: Sequence[str]\
      \ | None = None,\n    ):\n        super().__init__(\n            func=self._write,\n            afunc=self._awrite,\n\
      \            name=None,\n            tags=tags,\n            trace=False,\n        )\n        self.writes = cast(\n\
      \            list[ChannelWriteEntry | ChannelWriteTupleEntry | Send], writes\n        )\n\n    def get_name(self, suffix:\
      \ str | None = None, *, name: str | None = None) -> str:\n        if not name:\n            name = f\"ChannelWrite<{','.join(w.channel\
      \ if isinstance(w, ChannelWriteEntry) else '...' if isinstance(w, ChannelWriteTupleEntry) else w.node for w in self.writes)}>\"\
      \n        return super().get_name(suffix, name=name)\n\n    def _write(self, input: Any, config: RunnableConfig) ->\
      \ None:\n        writes = [\n            ChannelWriteEntry(write.channel, input, write.skip_none, write.mapper)\n  \
      \          if isinstance(write, ChannelWriteEntry) and write.value is PASSTHROUGH\n            else ChannelWriteTupleEntry(write.mapper,\
      \ input)\n            if isinstance(write, ChannelWriteTupleEntry) and write.value is PASSTHROUGH\n            else\
      \ write\n            for write in self.writes\n        ]\n        self.do_write(\n            config,\n            writes,\n\
      \        )\n        return input\n\n    async def _awrite(self, input: Any, config: RunnableConfig) -> None:\n     \
      \   writes = [\n            ChannelWriteEntry(write.channel, input, write.skip_none, write.mapper)\n            if isinstance(write,\
      \ ChannelWriteEntry) and write.value is PASSTHROUGH\n            else ChannelWriteTupleEntry(write.mapper, input)\n\
      \            if isinstance(write, ChannelWriteTupleEntry) and write.value is PASSTHROUGH\n            else write\n \
      \           for write in self.writes\n        ]\n        self.do_write(\n            config,\n            writes,\n\
      \        )\n        return input\n\n    @staticmethod\n    def do_write(\n        config: RunnableConfig,\n        writes:\
      \ Sequence[ChannelWriteEntry | ChannelWriteTupleEntry | Send],\n        allow_passthrough: bool = True,\n    ) -> None:\n\
      \        # validate\n        for w in writes:\n            if isinstance(w, ChannelWriteEntry):\n                if\
      \ w.channel == TASKS:\n                    raise InvalidUpdateError(\n                        \"Cannot write to the\
      \ reserved channel TASKS\"\n                    )\n                if w.value is PASSTHROUGH and not allow_passthrough:\n\
      \                    raise InvalidUpdateError(\"PASSTHROUGH value must be replaced\")\n            if isinstance(w,\
      \ ChannelWriteTupleEntry):\n                if w.value is PASSTHROUGH and not allow_passthrough:\n                 \
      \   raise InvalidUpdateError(\"PASSTHROUGH value must be replaced\")\n        # if we want to persist writes found before\
      \ hitting a ParentCommand\n        # can move this to a finally block\n        write: TYPE_SEND = config[CONF][CONFIG_KEY_SEND]\n\
      \        write(_assemble_writes(writes))\n\n    @staticmethod\n    def is_writer(runnable: Runnable) -> bool:\n    \
      \    \"\"\"Used by PregelNode to distinguish between writers and other runnables.\"\"\"\n        return (\n        \
      \    isinstance(runnable, ChannelWrite)\n            or getattr(runnable, \"_is_channel_writer\", MISSING) is not MISSING\n\
      \        )\n\n    @staticmethod\n    def get_static_writes(\n        runnable: Runnable,\n    ) -> Sequence[tuple[str,\
      \ Any, str | None]] | None:\n        \"\"\"Used to get conditional writes a writer declares for static analysis.\"\"\
      \"\n        if isinstance(runnable, ChannelWrite):\n            return [\n                w\n                for entry\
      \ in runnable.writes\n                if isinstance(entry, ChannelWriteTupleEntry) and entry.static\n              \
      \  for w in entry.static\n            ] or None\n        elif writes := getattr(runnable, \"_is_channel_writer\", MISSING):\n\
      \            if writes is not MISSING:\n                writes = cast(\n                    Sequence[tuple[ChannelWriteEntry\
      \ | Send, str | None]],\n                    writes,\n                )\n                entries = [e for e, _ in writes]\n\
      \                labels = [la for _, la in writes]\n                return [(*t, la) for t, la in zip(_assemble_writes(entries),\
