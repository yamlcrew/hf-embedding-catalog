      \ datetime\n    \"\"\"The time the cron was created.\"\"\"\n    updated_at: datetime\n    \"\"\"The last time the cron\
      \ was updated.\"\"\"\n    payload: dict\n    \"\"\"The run payload to use for creating new run.\"\"\"\n    user_id:\
      \ str | None\n    \"\"\"The user ID of the cron.\"\"\"\n    next_run_date: datetime | None\n    \"\"\"The next run date\
