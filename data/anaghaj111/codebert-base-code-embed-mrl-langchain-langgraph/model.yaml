  - "async def _load_checkpoint_tuple(self, value: DictRow) -> CheckpointTuple:\n        \"\"\"\n        Convert a database\
    \ row into a CheckpointTuple object.\n\n        Args:\n            value: A row from the database containing checkpoint\
    \ data.\n\n        Returns:\n            CheckpointTuple: A structured representation of the checkpoint,\n           \
    \ including its configuration, metadata, parent checkpoint (if any),\n            and pending writes.\n        \"\"\"\n\
    \        return CheckpointTuple(\n            {\n                \"configurable\": {\n                    \"thread_id\"\
    : value[\"thread_id\"],\n                    \"checkpoint_ns\": value[\"checkpoint_ns\"],\n                    \"checkpoint_id\"\
    : value[\"checkpoint_id\"],\n                }\n            },\n            {\n                **value[\"checkpoint\"\
    ],\n                \"channel_values\": {\n                    **(value[\"checkpoint\"].get(\"channel_values\") or {}),\n\
    \                    **self._load_blobs(value[\"channel_values\"]),\n                },\n            },\n            value[\"\
    metadata\"],\n            (\n                {\n                    \"configurable\": {\n                        \"thread_id\"\
    : value[\"thread_id\"],\n                        \"checkpoint_ns\": value[\"checkpoint_ns\"],\n                      \
    \  \"checkpoint_id\": value[\"parent_checkpoint_id\"],\n                    }\n                }\n                if value[\"\
    parent_checkpoint_id\"]\n                else None\n            ),\n            await asyncio.to_thread(self._load_writes,\
    \ value[\"pending_writes\"]),\n        )"
