  - "class ChannelWrite(RunnableCallable):\n    \"\"\"Implements the logic for sending writes to CONFIG_KEY_SEND.\n    Can\
    \ be used as a runnable or as a static method to call imperatively.\"\"\"\n\n    writes: list[ChannelWriteEntry | ChannelWriteTupleEntry\
    \ | Send]\n    \"\"\"Sequence of write entries or Send objects to write.\"\"\"\n\n    def __init__(\n        self,\n \
    \       writes: Sequence[ChannelWriteEntry | ChannelWriteTupleEntry | Send],\n        *,\n        tags: Sequence[str]\
    \ | None = None,\n    ):\n        super().__init__(\n            func=self._write,\n            afunc=self._awrite,\n\
    \            name=None,\n            tags=tags,\n            trace=False,\n        )\n        self.writes = cast(\n  \
    \          list[ChannelWriteEntry | ChannelWriteTupleEntry | Send], writes\n        )\n\n    def get_name(self, suffix:\
    \ str | None = None, *, name: str | None = None) -> str:\n        if not name:\n            name = f\"ChannelWrite<{','.join(w.channel\
    \ if isinstance(w, ChannelWriteEntry) else '...' if isinstance(w, ChannelWriteTupleEntry) else w.node for w in self.writes)}>\"\
    \n        return super().get_name(suffix, name=name)\n\n    def _write(self, input: Any, config: RunnableConfig) -> None:\n\
    \        writes = [\n            ChannelWriteEntry(write.channel, input, write.skip_none, write.mapper)\n            if\
    \ isinstance(write, ChannelWriteEntry) and write.value is PASSTHROUGH\n            else ChannelWriteTupleEntry(write.mapper,\
    \ input)\n            if isinstance(write, ChannelWriteTupleEntry) and write.value is PASSTHROUGH\n            else write\n\
    \            for write in self.writes\n        ]\n        self.do_write(\n            config,\n            writes,\n \
    \       )\n        return input\n\n    async def _awrite(self, input: Any, config: RunnableConfig) -> None:\n        writes\
    \ = [\n            ChannelWriteEntry(write.channel, input, write.skip_none, write.mapper)\n            if isinstance(write,\
    \ ChannelWriteEntry) and write.value is PASSTHROUGH\n            else ChannelWriteTupleEntry(write.mapper, input)\n  \
    \          if isinstance(write, ChannelWriteTupleEntry) and write.value is PASSTHROUGH\n            else write\n     \
    \       for write in self.writes\n        ]\n        self.do_write(\n            config,\n            writes,\n      \
    \  )\n        return input\n\n    @staticmethod\n    def do_write(\n        config: RunnableConfig,\n        writes: Sequence[ChannelWriteEntry\
    \ | ChannelWriteTupleEntry | Send],\n        allow_passthrough: bool = True,\n    ) -> None:\n        # validate\n   \
    \     for w in writes:\n            if isinstance(w, ChannelWriteEntry):\n                if w.channel == TASKS:\n   \
    \                 raise InvalidUpdateError(\n                        \"Cannot write to the reserved channel TASKS\"\n\
    \                    )\n                if w.value is PASSTHROUGH and not allow_passthrough:\n                    raise\
    \ InvalidUpdateError(\"PASSTHROUGH value must be replaced\")\n            if isinstance(w, ChannelWriteTupleEntry):\n\
    \                if w.value is PASSTHROUGH and not allow_passthrough:\n                    raise InvalidUpdateError(\"\
    PASSTHROUGH value must be replaced\")\n        # if we want to persist writes found before hitting a ParentCommand\n \
    \       # can move this to a finally block\n        write: TYPE_SEND = config[CONF][CONFIG_KEY_SEND]\n        write(_assemble_writes(writes))\n\
    \n    @staticmethod\n    def is_writer(runnable: Runnable) -> bool:\n        \"\"\"Used by PregelNode to distinguish between\
    \ writers and other runnables.\"\"\"\n        return (\n            isinstance(runnable, ChannelWrite)\n            or\
    \ getattr(runnable, \"_is_channel_writer\", MISSING) is not MISSING\n        )\n\n    @staticmethod\n    def get_static_writes(\n\
    \        runnable: Runnable,\n    ) -> Sequence[tuple[str, Any, str | None]] | None:\n        \"\"\"Used to get conditional\
    \ writes a writer declares for static analysis.\"\"\"\n        if isinstance(runnable, ChannelWrite):\n            return\
    \ [\n                w\n                for entry in runnable.writes\n                if isinstance(entry, ChannelWriteTupleEntry)\
    \ and entry.static\n                for w in entry.static\n            ] or None\n        elif writes := getattr(runnable,\
    \ \"_is_channel_writer\", MISSING):\n            if writes is not MISSING:\n                writes = cast(\n         \
    \           Sequence[tuple[ChannelWriteEntry | Send, str | None]],\n                    writes,\n                )\n \
    \               entries = [e for e, _ in writes]\n                labels = [la for _, la in writes]\n                return\
    \ [(*t, la) for t, la in zip(_assemble_writes(entries), labels)]\n\n    @staticmethod\n    def register_writer(\n    \
    \    runnable: R,\n        static: Sequence[tuple[ChannelWriteEntry | Send, str | None]] | None = None,\n    ) -> R:\n\
    \        \"\"\"Used to mark a runnable as a writer, so that it can be detected by is_writer.\n        Instances of ChannelWrite\
    \ are automatically marked as writers.\n        Optionally, a list of declared writes can be passed for static analysis.\"\
    \"\"\n        # using object.__setattr__ to work around objects that override __setattr__\n        # eg. pydantic models\
    \ and dataclasses\n        object.__setattr__(runnable, \"_is_channel_writer\", static)\n        return runnable"
  - "def test_double_interrupt_subgraph(sync_checkpointer: BaseCheckpointSaver) -> None:\n    class AgentState(TypedDict):\n\
    \        input: str\n\n    def node_1(state: AgentState):\n        result = interrupt(\"interrupt node 1\")\n        return\
    \ {\"input\": result}\n\n    def node_2(state: AgentState):\n        result = interrupt(\"interrupt node 2\")\n      \
    \  return {\"input\": result}\n\n    subgraph_builder = (\n        StateGraph(AgentState)\n        .add_node(\"node_1\"\
    , node_1)\n        .add_node(\"node_2\", node_2)\n        .add_edge(START, \"node_1\")\n        .add_edge(\"node_1\",\
    \ \"node_2\")\n        .add_edge(\"node_2\", END)\n    )\n\n    # invoke the sub graph\n    subgraph = subgraph_builder.compile(checkpointer=sync_checkpointer)\n\
    \    thread = {\"configurable\": {\"thread_id\": str(uuid.uuid4())}}\n    assert [c for c in subgraph.stream({\"input\"\
    : \"test\"}, thread)] == [\n        {\n            \"__interrupt__\": (\n                Interrupt(\n                \
    \    value=\"interrupt node 1\",\n                    id=AnyStr(),\n                ),\n            )\n        },\n  \
    \  ]\n    # resume from the first interrupt\n    assert [c for c in subgraph.stream(Command(resume=\"123\"), thread)]\
    \ == [\n        {\n            \"node_1\": {\"input\": \"123\"},\n        },\n        {\n            \"__interrupt__\"\
    : (\n                Interrupt(\n                    value=\"interrupt node 2\",\n                    id=AnyStr(),\n \
    \               ),\n            )\n        },\n    ]\n    # resume from the second interrupt\n    assert [c for c in subgraph.stream(Command(resume=\"\
    123\"), thread)] == [\n        {\n            \"node_2\": {\"input\": \"123\"},\n        },\n    ]\n\n    subgraph = subgraph_builder.compile()\n\
    \n    def invoke_sub_agent(state: AgentState):\n        return subgraph.invoke(state)\n\n    thread = {\"configurable\"\
    : {\"thread_id\": str(uuid.uuid4())}}\n    parent_agent = (\n        StateGraph(AgentState)\n        .add_node(\"invoke_sub_agent\"\
    , invoke_sub_agent)\n        .add_edge(START, \"invoke_sub_agent\")\n        .add_edge(\"invoke_sub_agent\", END)\n  \
    \      .compile(checkpointer=sync_checkpointer)\n    )\n\n    assert [c for c in parent_agent.stream({\"input\": \"test\"\
    }, thread)] == [\n        {\n            \"__interrupt__\": (\n                Interrupt(\n                    value=\"\
    interrupt node 1\",\n                    id=AnyStr(),\n                ),\n            )\n        },\n    ]\n\n    # resume\
    \ from the first interrupt\n    assert [c for c in parent_agent.stream(Command(resume=True), thread)] == [\n        {\n\
    \            \"__interrupt__\": (\n                Interrupt(\n                    value=\"interrupt node 2\",\n     \
    \               id=AnyStr(),\n                ),\n            )\n        }\n    ]\n\n    # resume from 2nd interrupt\n\
    \    assert [c for c in parent_agent.stream(Command(resume=True), thread)] == [\n        {\n            \"invoke_sub_agent\"\
    : {\"input\": True},\n        },\n    ]"
  - "def flattened_runs(self) -> list[Run]:\n        q = [] + self.runs\n        result = []\n        while q:\n         \
    \   parent = q.pop()\n            result.append(parent)\n            if parent.child_runs:\n                q.extend(parent.child_runs)\n\
    \        return result"
