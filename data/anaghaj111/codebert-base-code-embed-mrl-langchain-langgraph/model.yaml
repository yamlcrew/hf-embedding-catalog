      \ | Send, str | None]] | None = None,\n    ) -> R:\n        \"\"\"Used to mark a runnable as a writer, so that it can\
      \ be detected by is_writer.\n        Instances of ChannelWrite are automatically marked as writers.\n        Optionally,\
      \ a list of declared writes can be passed for static analysis.\"\"\"\n        # using object.__setattr__ to work around\
      \ objects that override __setattr__\n        # eg. pydantic models and dataclasses\n        object.__setattr__(runnable,\
      \ \"_is_channel_writer\", static)\n        return runnable"
