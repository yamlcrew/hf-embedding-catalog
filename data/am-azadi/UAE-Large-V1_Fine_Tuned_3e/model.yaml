- source_sentence: 'Look what a show Pope Francis gave in yesterday''s homily / sermon! It''s to be read and reread over and
    over again... This is the most spiritual Pope since Peter. "You may have flaws, be anxious, and sometimes live irritated,
    but don''t forget that your life is the greatest company in the world. Only you can prevent it from going into decline.
    Many appreciate you, admire you and love you. remember that being happy is not having a sky without storms, a road without
    accidents, work without fatigue, relationships without disappointments. Being happy is finding strength in forgiveness,
    hope in battles, security in the stage of fear, love in discord. It''s not just appreciating the smile, but also reflecting
    on sadness. It''s not just celebrating successes, but learning lessons from failures. It''s not just feeling happy with
    applause, but being happy in anonymity. Being happy is recognizing that it''s worth life is worth living, despite all
    the challenges, misunderstandings, periods of crisis. Being happy is not a fatality of fate, but an achievement for those
    who manage to travel within themselves. To be happy is to stop feeling like a victim of problems and become the author
    of his own story . It''s crossing deserts outside of yourself, but managing to find an oasis in the depths of our soul.
    It is to thank God for each morning, for the miracle of life. Being happy is not being afraid of your own feelings. It''s
    knowing how to talk about yourself. It''s having the courage to hear a "no". It''s feeling safe when receiving criticism,
    even if unfair. It''s kissing the children, pampering the parents, living poetic moments with friends, even when they
    hurt us. To be happy is to let the creature that lives in each of us live, free, joyful and simple. It''s having maturity
    to be able to say: "I was wrong". It''s having the courage to say, "I''m sorry". It''s having the sensitivity to say:
    "I need you". It''s having the ability to say, "I love you". May your life become a garden of opportunities to be happy...
    May your springtime be a lover of joy. May in your winters be a lover of wisdom. And that when you make a mistake, start
    over from the beginning. For only then will you be in love with life. You will discover that being happy is not having
    a perfect life. But using tears to irrigate tolerance. Use losses to train patience. Using mistakes to sculpt serenity.
    Using pain to cut pleasure. Use obstacles to open intelligence windows. Never give up....Never give up on the people who
    love you. Never give up happiness, for life is an incredible spectacle." (Pope Francis).'
  sentences:
  - '"The message that Pope Francis gave in yesterday''s homily/sermon! It is to be read and reread several times... What
    an admirable man!"'
  - Denmark allows Muslim women to wear the niqab
  - Trump author of speech disparaging Africans and Arabs
