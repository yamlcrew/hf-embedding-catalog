- source_sentence: 'The good news: That was it with the vaccination terror Every compulsory vaccination is now illegal from
    the outset. The Council of Europe (not to be confused with the EU), to which all European states belong with the exception
    of Belarus, Kosovo and the Vatican and which is the body responsible for the European Court of Human Rights, passed a
    resolution on January 27th, 2021 in its resolution 2361/2021 that no one may be vaccinated against their will, under pressure.
    The 47 member states are asked to point out before vaccination that vaccination is not compulsory and that the non-vaccinated
    person must not be discriminated against. Discrimination is expressly prohibited even if there are health risks or if
    someone does not want to be vaccinated. Vaccine manufacturers are encouraged to publish all information on the safety
    of the vaccines. With this resolution, the most important human rights organization in Europe has now set standards and
    obligations, as well as created guidelines under international law that are to be applied by the 47 member states, including
    the EU as an organization. Discrimination in the workplace, for example, or a ban on travel for the unvaccinated are thus
    legally excluded. You can now invoke it in every court case, before every authority, every employer, every tour operator,
    every home manager, etc.'
