    sentences:
    - 'Si cette question repose sur le scénario original, si une chatte prend cinq minutes pour attraper un rat entier, il
      est raisonnable de supposer qu''attraper la moitié d''un rat prendrait la moitié du temps.


      Pensez-y comme ça : si le processus d''attraction de la chatte est constant et qu''elle prend cinq minutes pour terminer
      l''opération complète, alors la chatte aurait attrapé la moitié du rat à la moitié du temps.


      Donc, si une chatte prend cinq minutes pour attraper un rat entier, elle prendra deux minutes et demie pour attraper
      la moitié d''un rat.




      Assume que la partie des chats se fatiguent après 2,5 minutes, mais nous ne savons pas le nombre exact de chats fatigués.
      Pour simplifier, supposons que x chats se fatiguent après 2,5 minutes. Les autres chats, qui sont (100 - x), continuent
      à attraper leurs souris.


      Pour les x chats qui se fatiguent, il est incertain ce qui se passe ensuite. Ils cessent-ils complètement d''essayer
      d''attraper des souris, ou continuent-ils à un rythme plus lent ? Pour faire une estimation éclairée, supposons que
      les x chats fatigués cessent complètement d''essayer d''attraper des souris.


