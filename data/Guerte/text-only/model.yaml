    \ Bellwood qui me trouble. Peut-être est-ce sa histoire sombre ou peut-être est-ce l'architecture étrange qui semble me\
    \ regarder. J'ai toujours vanté mon rationalité et ma sérénité comme enquêteur, mais je mentirais si je disais que je\
    \ n'éprouve pas une pointe d'inquiétude.\n\nMalgré les avertissements sinistres et les événements inexplicables, je suis\
    \ déterminé à découvrir la vérité derrière cette affaire. J'ai passé des années à perfectionner mes compétences et à étudier\
    \ le paranormal, et je ne vais pas laisser la peur m'emporter. Mon instinct me dit qu'il y a plus à ce hantisme qu'à une\
    \ simple histoire de fantôme, et je suis impatient de découvrir la vérité.\n\nJe prends une profonde inspiration, préparant\
    \ mentalement ce qui m'attend. J'ai examiné les dossiers du cas, parlé aux propriétaires de la maison et rassemblé mon\
    \ équipement. Maintenant, il est temps de faire face à ce qui est supposé se cacher derrière ces murs. Je fais claquer\
    \ la porte grinçante et franchis le chemin envahi de mauvaises herbes, les yeux fixés sur la façade imposante de la maison.\
    \ C'est le moment de commencer l'enquête.\n\n\n\nQuelles sont les dossiers sur la demeure Bellwood ? Ils sont nombreux\
    \ et perturbants. Ils contiennent des rapports sur des événements étranges, des bruits inexplicables et des visites de\
    \ fantômes. Beaucoup d'entre eux datent de plusieurs décennies, et tous semblent partager une filiation : une énergie\
    \ malveillante qui imprègne la demeure.\n\nL'un des premiers rapports provient d'un ancien propriétaire, Malcolm Bellwood,\
    \ qui affirme avoir vu le fantôme d'une jeune fille errant dans les couloirs. Il la décrit comme pâle et maigre, avec\
    \ des yeux creux qui semblaient percer son âme. Selon son récit, la fille apparaissait souvent la nuit tombée, accompagnée\
    \ d'une fraîcheur étrange qui lui faisait frissonner.\n\nAu fil des années, de tels rapports ont émergé de divers occupants\
    \ et visiteurs. Certains ont parlé de voix dépourvues de substance, tandis que d'autres ont vu des silhouettes floues\
    \ s'échappant de leur champ de vision. Il y a aussi des rapports sur des objets qui se déplacent seuls, des portes qui\
    \ claquent et une impression d'appréhension intense qui semble coller aux murs de la demeure.\n\nUne incidence particulièrement\
    \ perturbante impliquait un groupe d'enquêteurs paranormaux qui ont tenté d'investiguer la demeure dans les années 1980.\
    \ Ils rapportent avoir capturé des preuves d'un poltergeist, y compris des enregistrements audio de murmures étranges\
    \ et des photographies d'objets levant dans l'air. Cependant, leur enquête a été interrompue lorsque l'un des membres\
    \ du groupe a disparu la nuit. Malgré une recherche approfondie, il n'a jamais été retrouvé, et l'enquête a été abandonnée.\n\
    \nLes rapports les plus récents viennent de Mme Bellwood elle-même, qui affirme avoir expérimenté une augmentation de\
    \ l'activité paranormale au cours des derniers mois. Elle parle de pas de pieds dans la nuit, de visions de fantômes dans\
    \ les miroirs, et d'une présence malveillante intense qui semble la suivre à chaque mouvement.\n\nPlus je m'enfonce dans\
    \ les dossiers, plus je soupçonne que la demeure Bellwood pourrait être un centre d'activité paranormale intense, peut-être\
    \ même une porte ouverte vers d'autres dimensions. Plus je découvre, plus je réalise que je vais assister à une enquête\
    \ véritablement terrifiante."
  - Un résonateur est un dispositif ou système qui présente un comportement de résonance ou de résonance, c'est-à-dire qu'il
    oscille naturellement à certaines fréquences, appelées fréquences résonantes, avec une plus grande amplitude que dans
    d'autres. Les instruments de musique utilisent des résonateurs acoustiques qui produisent des ondes sonores de tons spécifiques.
  - 'Il y a deux principales types de thérapie par rayonnement : la thérapie par rayonnement externe (TRRE) et la thérapie
    par rayonnement interne, également connue sous le nom de brachytherapie.


    La TRRE délivre des rayonnements à partir de l''extérieur du corps, en utilisant une machine qui dirige des rayons d''énergie
    élevée sur le site du tumeur. La TRRE peut être divisée en plusieurs sous-types, notamment la Radiation Thérapeutique
    Conforme en Trois Dimensions (RTCT-3D), la Radiation Thérapeutique Par Modulation d''Intensité (RTIMT), la Radiation Thérapeutique
    Par Télémétrie de Corps (RTSCB) et la Radiosurgérie Par Télémétrie (RST). Ces sous-types diffèrent par leur précision
    et la dose de rayonnements délivrée.


    La Thérapie Par Rayonnement Interne, ou Brachytherapie, consiste à placer des semences radioactives ou des implants radioactifs
    directement dans ou près du tumeur, permettant ainsi de délivrer une forte dose de rayonnements localement tout en minimisant
    l''exposition aux tissus sains environnants. Ce type de traitement peut être temporaire ou permanent, selon le type d''implant
    utilisé.


    Un autre type de thérapie par rayonnement est la Thérapie Par Irradiation Totale du Corps (TIC), utilisée pour traiter
    certains types de cancers du sang en délivrant des rayonnements à tout le corps.


    De plus, il existe des formes spécialisées de thérapie par rayonnement, comme la Thérapie Par Proton et la Thérapie Par
    Capture de Noyau Boron (BNCT), qui utilisent différents types de particules de rayonnements pour cibler spécifiquement
    les tumeurs de différentes manières.




    L''objectif principal de la radiothérapie dans le traitement du cancer est de tuer ou de contrôler le développement des
    cellules cancéreuses en endommageant leur ADN, ce qui les empêche de se diviser et de se multiplier. La radiothérapie
    utilise des rayons d''énergie élevée, comme les rayons X ou les rayons gamma, pour cibler et détruire les cellules cancéreuses
    tout en minimisant le dommage aux tissus sains environnants. Cela peut aider à guérir le cancer, à ralentir son développement
    ou à soulager les symptômes tels que la douleur.'
