  - 'Pour trouver la vitesse en amont et en aval, il faut prendre en compte la vitesse du bateau dans l''eau pure et la vitesse
    du courant.


    La vitesse en amont est la somme de la vitesse du bateau dans l''eau pure et de la vitesse du courant. En effet, le bateau
    va se déplacer avec le courant, donc les deux vitesses s''additionnent.


    Vitesse en amont = vitesse du bateau dans l''eau pure + vitesse du courant

    Vitesse en amont = 40 km/h (vitesse du bateau) + 20 km/h (vitesse du courant)

    Vitesse en amont = 60 km/h


    La vitesse en aval est la différence entre la vitesse du bateau dans l''eau pure et la vitesse du courant. En effet, le
    bateau va se déplacer contre le courant, donc la vitesse du courant ralentira le bateau.


    Vitesse en aval = vitesse du bateau dans l''eau pure - vitesse du courant

    Vitesse en aval = 40 km/h (vitesse du bateau) - 20 km/h (vitesse du courant)

    Vitesse en aval = 20 km/h


