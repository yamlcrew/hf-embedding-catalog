    - 'Il y a deux principales types de thérapie par rayonnement : la thérapie par rayonnement externe (TRRE) et la thérapie
      par rayonnement interne, également connue sous le nom de brachytherapie.


      La TRRE délivre des rayonnements à partir de l''extérieur du corps, en utilisant une machine qui dirige des rayons d''énergie
      élevée sur le site du tumeur. La TRRE peut être divisée en plusieurs sous-types, notamment la Radiation Thérapeutique
      Conforme en Trois Dimensions (RTCT-3D), la Radiation Thérapeutique Par Modulation d''Intensité (RTIMT), la Radiation
      Thérapeutique Par Télémétrie de Corps (RTSCB) et la Radiosurgérie Par Télémétrie (RST). Ces sous-types diffèrent par
      leur précision et la dose de rayonnements délivrée.


      La Thérapie Par Rayonnement Interne, ou Brachytherapie, consiste à placer des semences radioactives ou des implants
      radioactifs directement dans ou près du tumeur, permettant ainsi de délivrer une forte dose de rayonnements localement
      tout en minimisant l''exposition aux tissus sains environnants. Ce type de traitement peut être temporaire ou permanent,
      selon le type d''implant utilisé.


      Un autre type de thérapie par rayonnement est la Thérapie Par Irradiation Totale du Corps (TIC), utilisée pour traiter
      certains types de cancers du sang en délivrant des rayonnements à tout le corps.


      De plus, il existe des formes spécialisées de thérapie par rayonnement, comme la Thérapie Par Proton et la Thérapie
      Par Capture de Noyau Boron (BNCT), qui utilisent différents types de particules de rayonnements pour cibler spécifiquement
      les tumeurs de différentes manières.




      L''objectif principal de la radiothérapie dans le traitement du cancer est de tuer ou de contrôler le développement
      des cellules cancéreuses en endommageant leur ADN, ce qui les empêche de se diviser et de se multiplier. La radiothérapie
      utilise des rayons d''énergie élevée, comme les rayons X ou les rayons gamma, pour cibler et détruire les cellules cancéreuses
      tout en minimisant le dommage aux tissus sains environnants. Cela peut aider à guérir le cancer, à ralentir son développement
      ou à soulager les symptômes tels que la douleur.'
