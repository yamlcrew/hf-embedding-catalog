    en parachute sont lâches. L''argument montre seulement qu''il existe une possibilité d''intersection entre les deux groupes.


    En termes logiques, cet argument est un exemple d''une syllogisme avec une conclusion particulière affirmative. Il suit
    un modèle logique valide, mais il est essentiel de noter que la conclusion n''est pas nécessairement forte ou définitive.
    L''argument ne fait que montrer une possibilité, pas une certitude ou une relation causale entre le saut en parachute
    et la lâcheté.




    Pour trouver le nombre d''essais de jetons nécessaires pour obtenir la première tête, nous pouvons utiliser la notion
    de distribution géométrique. Cette distribution modélise le nombre de tentatives jusqu''à l''apparition de la première
    réussite (dans ce cas, une tête) dans une séquence de lancers indépendants et identiquement distribués de Bernoulli (des
    jetons).


    On définit la probabilité de tirer une tête sur un seul lancer de jeton comme p = 0,5 (supposant un jeton équilibré) et
    la probabilité de tirer une queue comme q = 1 - p = 0,5.


    La probabilité de tirer la première tête sur le n-ième lancer peut être calculée comme :


    P(X = n) = q^(n-1) * p


    Car nous devons obtenir n-1 queues suivies d''une tête.


    Le nombre d''essais attendus jusqu''à l''apparition de la première tête peut être calculé en sommant le produit de chaque
    résultat possible par sa probabilité :


    E(X) = ∑(n * P(X = n)) de n=1 à l''infini


    En substituant la formule de probabilité, nous obtenons :


    E(X) = ∑(n * q^(n-1) * p) de n=1 à l''infini


    En utilisant la formule de somme d''une série géométrique infinie, nous simplifions l''expression pour obtenir :


    E(X) = p / (1 - q)


    Comme p = 0,5 et q = 0,5, nous obtenons :


    E(X) = 0,5 / (1 - 0,5)

    = 0,5 / 0,5

    = 2


    Donc, le nombre d''essais d''attente moyen jusqu''à l''apparition de la première tête est de 2. Cela signifie que, sur
    moyenne, nous pouvons nous attendre à faire deux lancers de jetons avant d''obtenir une tête.




