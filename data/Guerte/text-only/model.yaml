  - source_sentence: 'Given a Wolof query, retrieve relevant passages that answer the query

      Query: Benn bal ak benn bal bi dañuy jël $1.10. Bal bi moo ëpp benn dollar ci bal bi. Ñaata la bal bi jar?'
    sentences:
    - "Pour résoudre ce problème, analysons le progrès du limace. La limace grimpe 3 pieds au cours de la journée, mais recule\
      \ 2 pieds la nuit, ce qui signifie qu'elle gagne 1 pied par jour en moyenne.\n\nNous devons prendre en compte ce qui\
      \ se passe lorsque la limace est près du sommet de la fosse. Le 18e jour, la limace grimpera 3 pieds et atteindra le\
      \ sommet de la fosse de 20 pieds, car 17 jours de progrès en moyenne (17 jours x 1 pied/jour + 3 pieds le 18e jour)\
      \ la placeront à la hauteur du sommet. Cependant, le problème indique que la limace recule la nuit, donc nous devons\
      \ s'assurer que la limace atteint le sommet avant minuit.\n\nSupposons que la limace atteigne le sommet et ne recule\
      \ plus (puisque elle est déjà au sommet), cela prendra la limace 18 jours pour atteindre le sommet de la fosse de 20\
      \ pieds.\n\n\n\nAnalysons l'information donnée : la batte et le balle ensemble coûtent 1.10$, et la batte coûte 1.00$\
      \ plus cher que le balle. \n\nOn peut représenter le coût du balle comme x. Comme la batte coûte 1.00$ plus cher que\
      \ le balle, le coût de la batte est x + 1.00$. Le coût total de la batte et du balle ensemble est 1.10$, donc nous pouvons\
      \ écrire l'équation :\n\nx + (x + 1.00) = 1.10\n\nOn combine les termes contenant x :\n\n2x + 1.00 = 1.10\n\nOn soustrait\
      \ 1.00 de chaque côté :\n\n2x = 0.10\n\nOn divise par 2 :\n\nx = 0.05\n\nDonc, le balle coûte 0.05$, ou 5 centimes."
    - 'Quand vous discutez de vos préoccupations avec votre manager, il est essentiel de se concentrer sur les comportements
      ou les actions spécifiques qui affectent votre travail plutôt que de faire des commentaires généraux sur l''âge ou la
      maturité de vos collègues. Voici quelques suggestions pour façonner vos préoccupations :


      Au lieu de dire "mes collègues sont trop jeunes et immature", dis "J''ai remarqué que certains membres du groupe ont
      une approche de travail ou de communication différente qui perturbe notre productivité. Par exemple, j''ai vu des exemples
      de conversations bruyantes ou de distractions pendant les heures de travail."


      Vous pouvez également décrire des situations spécifiques où vous avez ressenti que le comportement était non professionnel,
      comme "Dans notre dernière réunion de groupe, j''ai eu l''impression que certains membres du groupe n''étaient pas sérieux
      lors de la discussion, ce qui rendait difficile pour nous d''avancer sur le projet."


      Focalisez-vous sur l''impact du comportement sur votre travail plutôt que de faire des attaques personnelles ou des
      suppositions. Vous pouvez dire quelque chose comme "Je rencontre des difficultés à me concentrer sur mes tâches en raison
      du niveau de bruit dans l''atelier" ou "Je suis préoccupé par la possibilité que les dynamiques de groupe affectent
      notre capacité à respecter les délais."


      En outre, essayez de proposer des suggestions ou des solutions aux problèmes auxquels vous faites face. Par exemple,
