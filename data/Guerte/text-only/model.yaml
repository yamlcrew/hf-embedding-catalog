      Le premier prémisse, « Tous ceux qui font du saut en parachute sont aventuriers », établit une connexion entre le saut
      en parachute et l''aventure. Cette prémisse implique que le saut en parachute est une sous-catégorie d''activités aventurières.


      La deuxième prémisse, « Certains aventuriers sont aussi lâches », établit une connexion entre l''aventure et la lâcheté.
      Cependant, elle stipule simplement qu''il y a une intersection entre les deux, sans dire que tous les aventuriers sont
      lâches.


      La conclusion, « Donc, certains personnes qui font du saut en parachute sont lâches », tente de lier le saut en parachute
      à la lâcheté par la propriété intermédiaire de l''aventure.


      L''argument est logiquement valide au sens où il est possible que certaines personnes qui font du saut en parachute
      soient lâches. Cependant, ce n''est pas nécessairement vrai que le saut en parachute cause la lâcheté ou que tous les
      sauteurs en parachute sont lâches. L''argument montre seulement qu''il existe une possibilité d''intersection entre
      les deux groupes.


