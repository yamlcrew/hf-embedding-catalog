      \ cela pourrait être un facteur clé dans la haïncarnation.\n\nÀ mesure que commence la nuit, je monterai mon équipement\
      \ dans différents endroits de la demeure, notamment dans les zones où l'activité paranormale a été rapportée. Je procéderai\
      \ ensuite à une série de sessions d'EVP (Phénomène de Phénomène Electronique), posant des questions et enregistrant\
