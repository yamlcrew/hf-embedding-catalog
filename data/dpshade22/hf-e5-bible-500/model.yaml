    Jacob''s descendants. The whole people of the twelve tribes are called "Israelites," the "children of Israel" (  Joshua
    3:17  ;   7:25  ;   Judges 8:27  ;   Jeremiah 3:21  ), and the "house of Israel" (  Exodus 16:31  ;   40:38  ).    This
    name Israel is sometimes used emphatically for the true Israel (  Psalms 73:1  :   Isaiah 45:17  ;   49:3  ;   John 1:47  ;   Romans
