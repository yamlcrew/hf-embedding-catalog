widgetData:
- source_sentence: sh; enable; system; shell; /bin/busybox
  sentences:
  - 'Defense Evasion: The adversary is trying to avoid being detected.


    Defense Evasion consists of techniques that adversaries use to avoid detection throughout their compromise. Techniques
    used for defense evasion include uninstalling/disabling security software or obfuscating/encrypting data and scripts.
    Adversaries also leverage and abuse trusted processes to hide and masquerade their malware. Other tactics’ techniques
    are cross-listed here when those techniques include the added benefit of subverting defenses. '
  - 'Defense Evasion: The adversary is trying to avoid being detected.


    Defense Evasion consists of techniques that adversaries use to avoid detection throughout their compromise. Techniques
    used for defense evasion include uninstalling/disabling security software or obfuscating/encrypting data and scripts.
    Adversaries also leverage and abuse trusted processes to hide and masquerade their malware. Other tactics’ techniques
    are cross-listed here when those techniques include the added benefit of subverting defenses. '
  - 'Lateral Movement: The adversary is trying to move through your environment.


    Lateral Movement consists of techniques that adversaries use to enter and control remote systems on a network. Following
    through on their primary objective often requires exploring the network to find their target and subsequently gaining
    access to it. Reaching their objective often involves pivoting through multiple systems and accounts to gain. Adversaries
    might install their own remote access tools to accomplish Lateral Movement or use legitimate credentials with native network
    and operating system tools, which may be stealthier. '
- source_sentence: enable; ; system; ; shell; ; SH; ; /bin/busybox
  sentences:
  - 'Persistence: The adversary is trying to maintain their foothold.


    Persistence consists of techniques that adversaries use to keep access to systems across restarts, changed credentials,
    and other interruptions that could cut off their access. Techniques used for persistence include any access, action, or
    configuration changes that let them maintain their foothold on systems, such as replacing or hijacking legitimate code
    or adding startup code. '
  - "Privilege Escalation: The adversary is trying to gain higher-level permissions.\n\nPrivilege Escalation consists of techniques\
    \ that adversaries use to gain higher-level permissions on a system or network. Adversaries can often enter and explore\
    \ a network with unprivileged access but require elevated permissions to follow through on their objectives. Common approaches\
    \ are to take advantage of system weaknesses, misconfigurations, and vulnerabilities. Examples of elevated access include:\
    \ \n\n* SYSTEM/root level\n* local administrator\n* user account with admin-like access \n* user accounts with access\
    \ to specific system or perform specific function\n\nThese techniques often overlap with Persistence techniques, as OS\
    \ features that let an adversary persist can execute in an elevated context.  "
  - 'Defense Evasion: The adversary is trying to avoid being detected.


