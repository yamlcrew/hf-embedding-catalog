widgetData:
- source_sentence: Élucider la signification de 'navire de plaisance' d'après l'article 217 undecies du Code général des impôts
    et détailler les différents types d'investissements concernés.
  sentences:
  - Selon l'article 217 undecies du Code général des impôts, pour bénéficier de la déduction fiscale, les investissements
    doivent être réalisés sous forme de souscriptions au capital de sociétés qui gèrent des concessions de service public
    local. Ces investissements doivent être spécifiquement orientés vers des activités productives assignées à ces concessions
    pour une durée minimale de cinq ans. En outre, ces concessions doivent opérer exclusivement dans des secteurs éligibles
    situés dans les départements ou collectivités d'outre-mer, contribuant ainsi au développement économique des territoires
    ultramarins.
  - Dans le contexte de l'article 217 undecies du Code général des impôts, un 'navire de plaisance' désigne une embarcation
    spécifiquement utilisée pour des activités de loisir, excluant ainsi toute utilisation professionnelle telle que la pêche
    ou le transport. Les investissements pertinents pouvant bénéficier de cet agrément incluent non seulement l'achat ou la
    construction de ces navires, mais aussi leur utilisation dans des activités de tourisme comme la location sous différentes
    formes, les voyages organisés et la pêche de loisir, ainsi que les investissements dans les infrastructures et équipements
    nécessaires à ces activités touristiques.
  - L'article R. 257 B-1 du Livre des Procédures Fiscales organise les modalités pratiques relatives à l'information du contribuable
    quant à la mise en œuvre d'une compensation fiscale de recouvrement. Cette disposition confère au contribuable le droit
    d'être informé en amont de la réalisation de la compensation. Ce dispositif implique que le comptable public est tenu
    de communiquer avec le contribuable, afin de l'éclairer sur le processus et les conséquences de cette opération. L'information
    préalable joue un rôle crucial, car elle accorde au redevable l'opportunité de comprendre les ajustements à venir sur
    ses comptes vis-à-vis de l'administration fiscale.
- source_sentence: Énumérer en détail les informations requises par l'article 50-00 G, Annexe IV du Code général des impôts
    concernant la déclaration récapitulative mensuelle que doit établir l'entrepositaire agréé.
  sentences:
  - 'Pour se conformer aux dispositions imposées par l''article 50-00 G, Annexe IV du Code général des impôts, l''entrepositaire
    agréé est tenu de rédiger une déclaration récapitulative mensuelle distincte pour chaque entrepôt fiscal suspensif des
    droits d''accises qu''il gère. Une telle déclaration doit comprendre : les noms ou la dénomination de l''entreprise, l''adresse
    du siège social ou du principal établissement, le numéro d''identification de l''entrepôt fiscal, l''adresse de l''entrepôt
    fiscal, le lieu de tenue de la comptabilité matières, l''année et le mois concernés par la déclaration, la date et le
    lieu d''établissement de la déclaration ainsi que la signature et le cachet de l''entreprise. Elle doit également indiquer
    la raison sociale de la caution ou, le cas échéant, la mention ''Dispense''. Au besoin, elle peut comporter des mentions
    relatives aux comptes d''âge ou de vieillissement, les références aux contrats d''achat qui exigent un visa de l''établissement
    mentionné dans l''article L. 621-1 du Code rural et de la pêche maritime, les numéros d''enregistrement des contrats d''achat
    et les numéros des déclarations de transactions soumises aux interprofessions, ainsi que l''avis de blocage, l''engagement
    de garantie ou la mainlevée de warrant agricole ou de l''engagement de garantie, selon l''applicabilité à chaque cas particulier.'
  - L'intégration de Mayotte dans le champ d'application du Code général des impôts, rendant ainsi les entreprises mahoraises
    éligibles au crédit d'impôt pour investissements productifs outre-mer, a été actée par le législateur au travers de la
    loi n° 2010-1487 du 7 décembre 2010. Cette loi a élevé Mayotte au statut de département, étendant à ce titre l'ensemble
    des dispositions du CGI. L'ordonnance n° 2013-837 du 19 septembre 2013 est venue quant à elle expliciter les adaptations
    nécessaires au code des douanes et au CGI pour Mayotte. Conséquence directe de ces textes, les entreprises exerçant à
    Mayotte peuvent prétendre au crédit d'impôt en vigueur dès le 1er janvier 2014, conformément à l'article 244 quater W
    du CGI.
  - Le relevé des frais généraux prévu à l'article 54 quater du Code général des impôts doit comporter les renseignements
    propres à l'exercice pour lequel il est fourni et ceux qui se rapportent à l'exercice précédent.
- source_sentence: Quels sont les éléments que doit contenir la demande déposée auprès de la direction générale des finances
    publiques pour que les sociétés, compagnies ou entreprises françaises puissent bénéficier du régime fiscal prévu pour
    l'émission de séries spéciales d'obligations à l'étranger ?
  sentences:
  - Pour le premier exercice comptable de l'entreprise d'une durée de quatorze mois, le plafond standard d'exonération de
    61 000 € est ajusté au prorata de la durée, donnant un nouveau plafond d'exonération de 71 166 € (61 000 € x 14/12).
  - Pour être admises à bénéficier du régime fiscal prévu au 1 de l'article 131 ter du Code général des impôts, les sociétés,
    compagnies ou entreprises françaises qui se proposent d'émettre à l'étranger des séries spéciales d'obligations, doivent
    déposer au préalable une demande spéciale à la direction générale des finances publiques. Cette demande indique la date
    et les conditions de l'émission ainsi que le nombre, le montant et les numéros des titres à émettre.
  - Pour atténuer certaines contraintes fiscales, les sociétés étrangères exerçant une activité sur le territoire français
    ont la possibilité de restreindre le montant de la retenue à la source, qu'elles sont tenues de verser en vertu de l'article
    115 quinquies du Code général des impôts, à une somme équivalente à l'impôt définitivement dû. Cette réduction prend en
    considération les prévisions de distributions de dividendes et le lieu de résidence fiscale des actionnaires. Pour bénéficier
    de ce dispositif, lesdites sociétés doivent expressément formuler une demande en référence à la directive pertinente et
    la joindre à la déclaration n° 2777-D-SD. Cela implique un suivi rigoureux de l'impact des distributions réelles et des
    domiciliations des bénéficiaires afin d'éviter les insuffisances de versement, sous peine de régularisation ultérieure
    accompagnée de l'intérêt de retard selon les articles 1727 et 1729 du même code.
- source_sentence: Expliquez comment est organisé le recouvrement de l'impôt sur la fortune immobilière en référence aux modalités
    décrites dans l'article 1658 du Code général des impôts.
  sentences:
  - 'Dans le contexte de la déclaration des revenus fonciers, la société doit émettre une attestation annuelle qui doit être
    remise à chaque associé au plus tard le deuxième jour ouvré après le 1er mai, selon les modalités fixées par le décret
    n° 2009-316 du 20 mars 2009. Cette attestation revêt une importance cruciale puisqu''elle permet aux associés de renseigner
    correctement leur déclaration de revenus fonciers via l''imprimé n° 2044 spécial. Elle doit recenser des informations
    précises : l''identité et l''adresse de l''associé, la détention des parts au cours de l''année, le respect des conditions
    de loyer, le montant de l''amortissement ainsi que le revenu net foncier qui découle des parts de l''associé, tant dans
    le régime de droit commun qu''en incluant la déduction liée à l''amortissement.'
  - Le recouvrement de l'impôt sur la fortune immobilière s'orchestre conformément aux dispositions disposées dans l'article
    1658 du Code général des impôts. Cela implique que les techniques, les procédures, ainsi que les moyens d'exécution prévus
    pour le recouvrement de cet impôt sont alignés sur ceux établis pour l'impôt sur le revenu.
  - L'article 981 du Code général des impôts établit que les normes régissant les droits d'enregistrement, sauf spécification
    contraire, sont adaptées à la gestion de l'impôt sur la fortune immobilière. Cela signifie que les méthodes de contrôle,
    telles que les audits et inspections, ainsi que les procédures de règlement des contentieux sont extensibles à l'impôt
    sur la fortune immobilière. Cette approche garantit une uniformité des pratiques administratives fiscales, facilitant
    ainsi une application homogène et cohérente des lois fiscales relatives à la fortune immobilière.
- source_sentence: Exposer les modalités de dérogation au secret fiscal autorisant le juge à demander des documents fiscaux
    nécessaires pour résoudre un litige, en vertu de l'article L. 143 du Livre des Procédures Fiscales.
  sentences:
  - Selon les dispositions du Bulletin officiel des finances publiques-instructions administratives, spécifiquement le BOI-DJC-SECR-10-20-50,
    le procureur de la République détient le droit, dans le contexte de toute investigation judiciaire, qu'elle relève d'une
    enquête de flagrance, préliminaire ou autre, de solliciter des renseignements ou documents essentiels à l'enquête auprès
    de l'administration fiscale. Cette sollicitation peut être adressée directement ou via un officier de police judiciaire
    agissant sur une réquisition du procureur. Conformément à l'article L.141 A du Livre des procédures fiscales, le secret
    fiscal ne constitue pas un frein légal à la transmission des informations ou documents exigés par le procureur.
  - L'article 199 novovicies du Code général des impôts dispose de modalités de réduction d'impôt spécifiques pour les transactions
    d'acquisition et de construction durant les années 2023 et 2024. En 2023, les bénéfices de cette réduction s'établissent
    à 4,5 % pour la première phase triennale et à 2,5 % pour la seconde. Pour les opérations effectuées en 2024, les réductions
    offertes sont de 3 % pendant la première période triennale et de 2 % pour la suivante. Ces pourcentages se rapportent
    aux acquisitions non mentionnées au 5° du B du I ainsi qu'aux constructions référencées au 1° du B du I, avec nécessité
    que le permis de construire ait été délivré durant l'année correspondante.
  - Conformément aux dispositions de l'article L. 143 du Livre des Procédures Fiscales, le secret fiscal peut être levé dans
    le cadre d'un litige par décision du juge. Cette mesure vise à autoriser la présentation de documents fiscaux, jugés utiles
    par le magistrat pour trancher une affaire. La levée de ce secret est toutefois soumise à une interprétation stricte,
    de sorte que seuls les documents réellement susceptibles d'éclairer le juge sur l'étendue du préjudice des individus impliqués
    peuvent être divulgués. Les renseignements qui n'ont de pertinence que pour des questions périphériques de la procédure
    ou qui se rapportent uniquement à l'application d'un jugement déjà prononcé sont exclus de cette possibilité de communication.
