      ou vers toute subdivision affectée aux ''titres relevant du régime des plus-values à long terme'', implique l''intégration
      des plus ou moins-values générées par ces transferts dans le résultat fiscal imposable. Cette intégration est effectuée
      selon les normes et le taux de droit commun applicables lors de l''exercice fiscal durant lequel les titres sont cédés.
      Les plus-values réalisées à long terme à la suite de tels transferts contribuent à déterminer la plus ou moins-value
      nette à long terme pour l''exercice concerné, au terme duquel cesse le bénéfice du report. Les plus ou moins-values
      à court terme qui émergent de ces opérations sont également incorporées au résultat imposable, respectant les conditions
      de droit commun de l''exercice de cession.'
    - 'passage: Les agents fiscaux disposent de droits étendus et spécifiques pour l''accès aux documents comptables des entités
      lucratives, conformément aux articles L. 85 et R*85-1 du Livre des procédures fiscales. Ces articles leur confèrent
      le pouvoir d''exiger la communication de tous documents utiles au contrôle fiscal. Par ailleurs, le Code de commerce,
      aux articles L. 123-12 à L. 123-24, précise les obligations de tenue et de conservation des livres comptables, garantissant
      ainsi aux agents fiscaux un droit de regard sur la gestion financière des activités commerciales. Ces dispositions assurent
      une base juridique robuste, autorisant les intervenants fiscaux à requérir et vérifier toute documentation nécessaire
      à l''évaluation de la conformité fiscale.'
    - 'passage: L''analyse de l''impact d''un transfert de titres dans un patrimoine fiduciaire, en matière de composition
      de groupe fiscal, s''effectue à l''aune de l''article 223 A et de l''article 238 quater B du Code général des impôts.
      En principe, un transfert de propriété des titres vers un patrimoine fiduciaire équivaut à leur exclusion du calcul
      du seuil de détention de capital pour l''appartenance à un groupe fiscal. Cependant, une exception spécifique autorise
      la prise en compte des titres transférés si deux conditions prépondérantes sont remplies : l''attachement de droits
      de vote et de dividendes aux titres cédés et la rétention par le constituant de l''exercice des droits de vote ou leur
      utilisation par le fiduciaire conformément aux directives du constituant, à condition que les termes contractuels de
      la fiducie ne s''y opposent pas. Cette particularité légale favorise ainsi la continuité ou l''intégration fiscale au
      sein du groupe pour les sociétés transférantes, tant que les conditions de détention sont observées, et ce, pour les
      exercices clôturés postérieurement au 31 décembre 2014.'
  - source_sentence: 'query: Décrivez avec précision les étapes détaillées requises pour traiter les réclamations collectives
      résultant de désastres agricoles comme définies dans l''article R*198-2 du Livre des procédures fiscales.'
    sentences:
    - 'passage: Conformément à l''article 310 K annexé au code général des impôts, l''usine marémotrice de la Rance, localisée
      entre Saint-Malo et La Richardais en Ille-et-Vilaine, peut prétendre à une déduction complémentaire. Cette dernière,
      prévue par le dernier alinéa de l''article 1499 du même code, se voit attribuer un taux de 50 %. Ce dispositif fiscal
      s''avère donc pertinent pour l''usine considérée, lui permettant de bénéficier d''un avantage significatif quant à sa
      charge fiscale.'
    - 'passage: Selon les dispositions de l''article R*196-6 du Livre des procédures fiscales, il est attribué aux sujets
      fiscaux un intervalle précisément défini pour élever des réclamations à l''égard des taxes, cotisations et autres prélèvements
      relatifs aux céréales et leurs transformés. Ce délai se prolonge jusqu''à la fin de la campagne agricole suivante celle
      au cours de laquelle l''avis de mise en recouvrement de la taxe a été notifié ou le règlement de l''imposition contestée
      effectué, permettant ainsi aux parties prenantes de se prévaloir de leurs prérogatives contestataires avec une certitude
      temporelle.'
    - 'passage: Selon l''article R*198-2 du Livre des procédures fiscales, le traitement des réclamations collectives en cas
      de catastrophes naturelles impactant les cultures agricoles, incluant des phénomènes tels que la grêle ou les inondations,
      exige la collaboration de plusieurs entités administratives. Initialement, deux commissaires sont nommés par l''administration
      fiscale pour superviser le processus. Ils sont assistés par un délégué de l''administration des impôts. Avant toute
      action, le maire de la commune affectée est notifié au moins dix jours avant l''inspection prévue, et il est chargé
      de communiquer cette date aux résidents via des affichages publics. Les agriculteurs affectés doivent alors rapporter
      leurs pertes à la mairie avant la réalisation d''un constat officiel par l''inspecteur des impôts, qui sera consigné
      dans un procès-verbal. Une fois ce document clôturé, aucune réclamation supplémentaire n''est acceptée.'
