    субподрядчика об отказе от исполнения договора на основании пункта 2 статьи 715 Гражданского кодекса Российской Федерации
    и пункта 13.7 договора (т. 1, л. д. 94 - 95). Таким образом, договор расторгнут с 25.04.2013. Ссылаясь на ненадлежащее
