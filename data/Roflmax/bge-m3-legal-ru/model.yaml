  - ' было установлено неверное применение поправочных коэффициентов при расчете арендной платы по договорам аренды на лесных
    участках в части коэффициентов, учитывающих приближенность арендуемого участка к дорогам общего пользования, в связи с
    чем обществу было предложено в срок до 31.12.14 произвести доплату в размере 4 791 166 рублей 45 копеек за период с 2012
    года по 2014 год (т. 1, л.д. 33). Письмом от 22.12.14 ООО "Юнион-Тур" отказалось производить доплату, сославшись на нарушение
    Арендодателем условий договора аренды (т. 1, л.д. 39-40). Указанные обстоятельства послужили основанием для обращения
    в арбитражный суд с настоящим иском. Отказывая в удовлетворении заявленных требований, суд первой инстанции указал, что
    истцом не представлено доказательств в подтверждение заявленных требований. Апелляционный суд не может согласиться с выводами
    суда первой инстанции по следующим основаниям. Отказывая в удовлетворении заявленных требований, суд первой инстанции
    указал, что оснований для перерасчета арендной платы не имелось. Апелляционный суд считает выводы суда первой инстанции
    законными и обоснованными, доводы апелляционной жалобы подлежащими отклонению. В силу статьи 606 Гражданского кодекса
    Российской Федерации по договору аренды (имущественного найма) арендодатель (наймодатель) обязуется предоставить арендатору
    (нанимателю) имущество за плату во временное владение и пользование или во временное пользование. В соответствии с пунктом
    1 статьи 614 Гражданского кодекса Российской Федерации арендатор обязан своевременно вносить плату за пользование имуществом
    (арендную плату). Порядок, условия и сроки внесения арендной платы определяются договором аренды. Пунктом 5 договора N
    50-0336-04-03-0304 аренды лесного участка от 02.09.08 закреплено, что арендная плата составляет 7 258 829 рублей в год.
    При этом размер арендной платы подлежит изменению пропорционально изменению ставок платы за единицу объема лесных ресурсов
    или единицу площади лесного участка, устанавливаемых статьей 73 Лесного кодекса российской Федерации ( п. 7 договора ).
    В соответствии с пунктом 1 статьи 73 Лесного кодекса Российской Федерации размер арендной платы определяется на основе
    минимального размера арендной платы, '
