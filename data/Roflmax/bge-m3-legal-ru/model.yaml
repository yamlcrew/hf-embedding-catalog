- source_sentence: Что было решено кассационной инстанцией относительно кассационной жалобы и приостановления исполнения судебного
    акта?
  sentences:
  - 'право на истребование займа у истца возникло, требования истца не оспорены ответчиком и соответствуют условиям договора.
    Суд апелляционной инстанции не находит оснований для переоценки данного вывода суда первой инстанции. Довод истца о том,
    что указанное имущество не может быть реализовано по установленной решением суда начальной продажной стоимости, поскольку
    причинит убытки истцу, в связи с чем просит снизить начальную продажную стоимость нежилого помещения и доли в уставном
    капитале ООО "Евгрогрупп Девелопмент", апелляционный суд считает необоснованным и отклоняет, поскольку по Договору займа
    01.02.2011 г. между Oldehove Holdings Limited LLC (Ольдехове Холдингс Лимитед) и Первоначальным кредитором заключен Договор
    залога доли в уставном капитале Общества с Ограниченной Ответственностью "Евгрогрупп Девелопмент". По соглашению сторон
    оценочная стоимость Предмета залога по настоящему Договору установлена в размере 1 839 418 00 рублей. По Договору займа
    3.03.2015 г. между Oldehove Holdings Limited LLC (Ольдехове Холдингс Лимитед) и Первоначальным кредитором заключен Договор
    ипотеки. Согласно п. 2.6 Договора об ипотеке, залоговая стоимость нежилого помещения по соглашению сторон составляет 1
    357 700 000 рублей. Довод третьего лица ООО "ЮНИГРУПП" о том, что суд необоснованно отклонил ходатайство приостановлении
    производства по делу до разрешения дела N А40-124377/16 по иску о признании права собственности на общее имущество, расположенное
    по адресу Россия, г. Москва, ул. Покровка, д.8, апелляционный суд считает необоснованным и отклоняет, поскольку заявления
    третьего лица не влияют на правоотношения истца ответчика в рамках договора залога. Третье лицо ООО "ЮНИГРУПП" привлечено
    к участию в деле, вправе подавать самостоятельные иски, а также не лишено права обратиться в суд в порядке т. 311 ГК РФ
    о пересмотре судебного акта по настоящему спору. Арбитражный суд города Москвы полно, всесторонне и объективно установил
    и рассмотрел обстоятельства дела, представленным доказательствам дана '
  - 'С.А. передать указанную документацию и имущество должника. Апелляционный суд согласился с данным выводом. Доказательства
    передачи Знаменским С.А. ликвидаторам или конкурсному управляющему означенных судами документов в дело не представлены.
    Выводы судов первой и апелляционной инстанций в обжалуемой части соответствуют фактическим обстоятельствам дела и имеющимся
    в деле доказательствам. Суды правильно применили нормы материального и процессуального права. Кассационная инстанция не
    находит оснований для иной оценки представленных доказательств. Кассационная жалоба не подлежит удовлетворению. Поскольку
    определение суда первой инстанции частично отменено судом апелляционной инстанции, оставлению в силе подлежит последний
    судебный акт, принятый в соответствии с нормами материального и процессуального права. Приостановление исполнения обжалуемого
    судебного акта, установленное определением Арбитражного суда Северо-Западного округа от 17.02.2021 по настоящему делу,
    подлежит отмене в соответствии с положениями статьи 283 АПК РФ . Руководствуясь статьями 286 , 287 и 289 Арбитражного
    процессуального кодекса Российской Федерации , Арбитражный суд Северо-Западного округа постановил: постановление Тринадцатого
    арбитражного апелляционного суда от 09.12.2020 по делу N А26-8852/2019 оставить без изменения, а кассационную жалобу Знаменского
    Сергея Александровича - без удовлетворения. Отменить приостановление исполнения определения Арбитражного суда Республики
    Карелия от 04.06.2020, установленное определением Арбитражного суда Северо-Западного округа от 17.02.2021 по делу N А26-8852/2019.
    Председательствующий С.Г. Колесникова Судьи В.В. Мирошниченко А.Э. Яковлев Электронный текст документа подготовлен АО
