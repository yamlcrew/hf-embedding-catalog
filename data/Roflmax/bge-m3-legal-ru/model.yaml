- source_sentence: Как определяется размер арендной платы согласно договору аренды лесного участка?
  sentences:
  - 'Учитывая, что должник не представил доказательства оплаты полученного товара, требования ООО «Бриз» являются обоснованными
    и подлежащими удовлетворению. При таких обстоятельствах апелляционный суд считает, что выводы суда первой инстанции, соответствуют
    фактическим обстоятельствам дела и основаны на правильном применении норм материального и процессуального права, в связи
    с чем, оснований для отмены обжалуемого судебного акта и удовлетворения апелляционной жалобы уполномоченного органа не
    имеется. На основании изложенного, руководствуясь статьями 266 , 268 , 269 , 272 Арбитражного процессуального кодекса
    Российской Федерации , Шестнадцатый арбитражный апелляционный суд П О С Т А Н О В И Л: определение Арбитражного суда Ставропольского
    края от 12.12.2011 по делу № А63-6078/2011 оставить без изменения, апелляционную жалобу - без удовлетворения. Постановление
    вступает в законную силу с момента его принятия и может быть обжаловано в месячный срок в Федеральный арбитражный суд
    Северо-Кавказского округа через арбитражный суд первой инстанции. Председательствующий А.Л. Фриев Судьи Г.В. Казакова
    О.В. Марченко Электронный текст документа подготовлен ЗАО "Кодекс" и сверен по: '
