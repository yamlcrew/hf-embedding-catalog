- source_sentence: Кто несет расходы по оплате государственной пошлины за рассмотрение апелляционной жалобы?
  sentences:
  - ' дела в отношении Киршина А.Б., решения Ставропольского районного суда Самарской области в отношении Киршина А.Б., что,
    как указал суд первой инстанции, не может свидетельствовать о полном и всестороннем исследовании доказательств виновности
    ИП Микичян Г.Ж. в совершении административного правонарушения, предусмотренного статьей 7.1 КоАП РФ . Изучением материалов
    дел об административных правонарушениях в отношении Киршина А.Б. N 168/2018 и ИП Микичян Г.Ж. N 105/2021, а также решения
    Ставропольского районного суда Самарской области от 01.09.2020, судом первой инстанции установлено, что часть земельного
    участка, самовольное занятие которого вменяется ИП Микичан Г.Ж., по настоящее время занимает Киршин А.Б. Указанное обстоятельство
    также подтверждается заявлением Киршина А.Б., направленным 31.03.2021 заместителю руководителя Управления Росреестра по
    Самарской области, содержащим сведения о том, что указанный земельный участок до настоящего времени используется под автостоянку
    Киршиным А.Б. Кроме того, им в департамент по управлению муниципальным имуществом администрации г.о. Тольятти 30.03.2021
    подано заявление о проведении аукциона на право заключения договора аренды данного земельного участка. Указав, что неустранимые
    сомнения в виновности лица, привлекаемого к административной ответственности, толкуются в пользу этого лица ( часть 4
    статьи 1.5 КоАП РФ ), суд первой инстанции пришел к выводу, что обжалуемое постановление административного органа от 09.04.2021
    N 105/2021 о назначении ИП Микичян Г.Ж. административного наказания за совершение административного правонарушения, предусмотренного
    статьей 7.1 КоАП РФ , подлежит отмене, а производство по делу об административном правонарушении - прекращению на основании
    пункта 2 части 1 статьи 24.5 КоАП РФ в связи с отсутствием в действиях ИП Микичян Г.Ж. состава административного правонарушения,
    предусмотренного статьей 7.1 КоАП РФ и принял решение об удовлетворении заявления предпринимателя. Суд апелляционной инстанции
    согласился с выводами суда первой инстанции. В кассационной жалобе Управление Росреестра по Самарской области оспаривает
    выводы судов первой и апелляционной инстанций, давая свою оценку установленным по делу обстоятельствам и представленным
    доказательствам, '
  - ' 333.21 Налогового кодекса Российской Федерации расходы по оплате государственной пошлины за рассмотрение апелляционной
    жалобы относятся на заявителя жалобы. Руководствуясь статьями 268 , 269 , 271 Арбитражного процессуального кодекса Российской
    Федерации , Третий арбитражный апелляционный суд ПОСТАНОВИЛ: решение Арбитражного суда Республики Тыва от "02" декабря
    2024 года по делу № А69-1496/2023 оставить без изменения, а апелляционную жалобу - без удовлетворения. Настоящее постановление
    вступает в законную силу с момента его принятия и может быть обжаловано в течение двух месяцев в Арбитражный суд Восточно-Сибирского
    округа через арбитражный суд, принявший решение. Председательствующий Н.Н. Белан Судьи: В.В. Паюсов Н.Н. Пластинина Электронный
