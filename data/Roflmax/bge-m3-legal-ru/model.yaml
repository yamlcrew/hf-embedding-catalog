  - source_sentence: Какие выводы были сделаны судебными инстанциями относительно жалобы?
    sentences:
    - 'ДПС ГИБДД МОБ УВД по г.Хабаровску Ч..А.С. 13.05.2011 года в отношении В..С.А. составлен протокол об административном
      правонарушении «».

      По факту данного ДТП проведено административное расследование, материалы которого переданы судье Железнодорожного районного
      суда г. Хабаровска.

      В..С.А. в ходе судебного разбирательства вину признал полностью, в содеянном раскаялся, подробно пояснил об обстоятельствах
      произошедшего, указал, что он предпринимал все меры к торможению и остановке транспортного средства, однако с учетом
      скорости автомобиля «», избежать столкновения не удалось.

      Потерпевшие Э..Д.Т., Т..Р.А., Ц..Л.А., К..Х.Д., уведомленные о дате, времени и месте судебного разбирательства надлежащим
      образом, на рассмотрение дела не явились, считаю возможным рассмотреть дело в их отсутствие.

      Должностное лицо инспектор отделения по ИАЗ полка ДПС ГИБДД МОБ УВД по г.Хабаровску Ч..А.С. дала пояснения по существу
      дела по обстоятельствам проведения административного расследования.

      Заслушав участвующих лиц, изучив предоставленные материалы, по существу дела установил следующее.

      Протокол об административном правонарушении «» от 13.05.2011 года соответствует требованиям ст.28.2 Кодекса РФ об административных
      правонарушениях. В..С.А. согласен с данным протоколом.

      Согласно положений ч.3 ст.1.7, ст.4.5 Кодекса РФ об административных правонарушениях, давность привлечения В..С.А. к
      административной ответственности составляет один год.

      Статья 12.24 ч.1 Кодекса РФ об административных правонарушениях предусматривает ответственность за нарушение ПДД или
      правил эксплуатации транспортного средства, повлекшее причинение легкого вреда здоровью потерпевшего.

      На основании пункта 13.9 ПДД РФ - на перекрестке неравнозначных дорог водитель транспортного средства, движущегося по
      второстепенной дороге, должен уступить дорогу транспортным средствам, приближающимся по главной, независимо от направления
      их дальнейшего движения. На таких перекрестках трамвай имеет преимущество перед безрельсовыми транспортными средствами,
      движущимися в попутном или '
    - 'выводы судебных инстанций, в связи с чем, подлежат отклонению, как несостоятельные. Процессуальных нарушений, влекущих
      безусловную отмену судебных решений, при производстве по делу не допущено, оснований для их отмены или изменения по
      доводам жалобы не установлено. На основании изложенного и руководствуясь п. 1 ч. 2 ст. 30.17 КоАП РФ , постановил: постановление
      Домодедовского городского суда от 19 декабря 2013 года и решение Московского областного суда от 04 февраля 2014 года
      по делу об административном правонарушении, предусмотренном ч.1 ст.20.1 КоАП РФ в отношении Давиденко Алексея Николаевича
      оставить без изменения, надзорную жалобу - без удовлетворения. Заместитель председателя Московского областного суда
      К.И.Боков Электронный текст документа подготовлен ЗАО "Кодекс" и сверен по: '
    - ' электрической энергии, до даты выявления факта бездоговорного потребления и составления акта о неучтенном потреблении
      электрической энергии. Стоимость электрической энергии в определенном в соответствии с настоящим пунктом объеме бездоговорного
      потребления определяется исходя из цен (тарифов), указанных в разделе IV настоящего документа. Сетевая организация оформляет
      счет для оплаты стоимости электрической энергии в объеме бездоговорного потребления, который должен содержать расчет
      стоимости бездоговорного потребления, и направляет его лицу, осуществившему бездоговорное потребление, способом, позволяющим
      подтвердить факт получения, вместе c актом о неучтенном потреблении электрической энергии в срок, установленный пунктом
      192 настоящего документа, или в течение 2 рабочих дней со дня определения в порядке, установленном настоящим документом,
      цены бездоговорного потребления электрической энергии (мощности). Лицо, осуществившее бездоговорное потребление, обязано
      оплатить счет для оплаты стоимости электрической энергии в объеме бездоговорного потребления в течение 10 дней со дня
      получения счета. При отказе лица, осуществившего бездоговорное потребление, от оплаты указанного счета стоимость электрической
      энергии в объеме бездоговорного потребления взыскивается с такого лица сетевой организацией в порядке взыскания неосновательного
      обогащения на основании акта о неучтенном потреблении электрической энергии и счета для оплаты стоимости электрической
      энергии в объеме бездоговорного потребления. Из материалов дела следует, что Предпринимателю в соответствии с дополнительным
      соглашением от 01.03.2018 N 2 к договору от 01.09.2017 N 102 о предоставлении права на размещение терминалов оплаты
      услуг на опорах контактной сети, заключенному с АО "Яргорэлектротранс" (т. 1 л.д. 15-29), было предоставлено право (услуг)
      на размещение с последующей эксплуатацией терминала оплаты услуг в г. Ярославле ост. Комплекс "Ул. Б. Федоровская" по
      направлению из Центра (далее по тексту также - спорный терминал). На основании заявки Предпринимателя от 11.04.2018
      между ним и Обществом был заключен договор об осуществлении технологического присоединения в отношении спорного терминала
      (т. 1 л.д. 86-94). Соглашением от 30.05.2018 (т. 1 л.д. 125) АО "Яргорэлектротранс" и ИП Старшинов '
  - source_sentence: Что было решено кассационной инстанцией относительно кассационной жалобы и приостановления исполнения
      судебного акта?
    sentences:
    - 'право на истребование займа у истца возникло, требования истца не оспорены ответчиком и соответствуют условиям договора.
      Суд апелляционной инстанции не находит оснований для переоценки данного вывода суда первой инстанции. Довод истца о
      том, что указанное имущество не может быть реализовано по установленной решением суда начальной продажной стоимости,
      поскольку причинит убытки истцу, в связи с чем просит снизить начальную продажную стоимость нежилого помещения и доли
      в уставном капитале ООО "Евгрогрупп Девелопмент", апелляционный суд считает необоснованным и отклоняет, поскольку по
      Договору займа 01.02.2011 г. между Oldehove Holdings Limited LLC (Ольдехове Холдингс Лимитед) и Первоначальным кредитором
      заключен Договор залога доли в уставном капитале Общества с Ограниченной Ответственностью "Евгрогрупп Девелопмент".
      По соглашению сторон оценочная стоимость Предмета залога по настоящему Договору установлена в размере 1 839 418 00 рублей.
      По Договору займа 3.03.2015 г. между Oldehove Holdings Limited LLC (Ольдехове Холдингс Лимитед) и Первоначальным кредитором
      заключен Договор ипотеки. Согласно п. 2.6 Договора об ипотеке, залоговая стоимость нежилого помещения по соглашению
      сторон составляет 1 357 700 000 рублей. Довод третьего лица ООО "ЮНИГРУПП" о том, что суд необоснованно отклонил ходатайство
      приостановлении производства по делу до разрешения дела N А40-124377/16 по иску о признании права собственности на общее
      имущество, расположенное по адресу Россия, г. Москва, ул. Покровка, д.8, апелляционный суд считает необоснованным и
      отклоняет, поскольку заявления третьего лица не влияют на правоотношения истца ответчика в рамках договора залога. Третье
      лицо ООО "ЮНИГРУПП" привлечено к участию в деле, вправе подавать самостоятельные иски, а также не лишено права обратиться
      в суд в порядке т. 311 ГК РФ о пересмотре судебного акта по настоящему спору. Арбитражный суд города Москвы полно, всесторонне
      и объективно установил и рассмотрел обстоятельства дела, представленным доказательствам дана '
    - 'С.А. передать указанную документацию и имущество должника. Апелляционный суд согласился с данным выводом. Доказательства
      передачи Знаменским С.А. ликвидаторам или конкурсному управляющему означенных судами документов в дело не представлены.
      Выводы судов первой и апелляционной инстанций в обжалуемой части соответствуют фактическим обстоятельствам дела и имеющимся
      в деле доказательствам. Суды правильно применили нормы материального и процессуального права. Кассационная инстанция
      не находит оснований для иной оценки представленных доказательств. Кассационная жалоба не подлежит удовлетворению. Поскольку
      определение суда первой инстанции частично отменено судом апелляционной инстанции, оставлению в силе подлежит последний
      судебный акт, принятый в соответствии с нормами материального и процессуального права. Приостановление исполнения обжалуемого
      судебного акта, установленное определением Арбитражного суда Северо-Западного округа от 17.02.2021 по настоящему делу,
      подлежит отмене в соответствии с положениями статьи 283 АПК РФ . Руководствуясь статьями 286 , 287 и 289 Арбитражного
      процессуального кодекса Российской Федерации , Арбитражный суд Северо-Западного округа постановил: постановление Тринадцатого
      арбитражного апелляционного суда от 09.12.2020 по делу N А26-8852/2019 оставить без изменения, а кассационную жалобу
      Знаменского Сергея Александровича - без удовлетворения. Отменить приостановление исполнения определения Арбитражного
      суда Республики Карелия от 04.06.2020, установленное определением Арбитражного суда Северо-Западного округа от 17.02.2021
      по делу N А26-8852/2019. Председательствующий С.Г. Колесникова Судьи В.В. Мирошниченко А.Э. Яковлев Электронный текст
      документа подготовлен АО "Кодекс" и сверен по: '
    - '7203561117) обратилось к обществу с ограниченной ответственностью "Первый визовый центр", г.Казань, (ОГРН 1151690060994,
      ИНН 1658181372) с иском о взыскании суммы паушального взноса в размере 690 000 руб., процентов за пользование чужими
      денежными средствами за период 25.07.2023 г. по 15.07.2024 г. в размере 98 960, 89 руб., суммы уплаченных роялти-платежей
      в размере 94 000 руб., признании лицензионного договора о передаче секрета производства (ноу-хау) № 207-ВЦ от 25.07.2023
      г. расторгнутым в связи с существенным нарушением договора с 01.07.2024 г. Решением Арбитражного суда Республики Татарстан
      от 03.12.2024 по делу № А65-22313/2024 в удовлетворении иска отказано. Не согласившись с принятым по делу судебным актом,
      истец обратился с апелляционной жалобой. Заявитель не согласен с оценкой доказательств и выводами суда первой инстанции,
