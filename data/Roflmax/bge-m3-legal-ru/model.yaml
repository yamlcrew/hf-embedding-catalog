- source_sentence: Какую сумму убытков и неустойки Банк был обязан выплатить Обществу согласно решению суда?
  sentences:
  - '3.6 договора в размере 5 % выплачивается субподрядчику после полного завершения строительства объекта и утверждения его
    у инвестора. Окончательный расчет в соответствии с договорной ценой, с учетом ее возможных изменений, производится генподрядчиком
    в течение 60 дней, при условии поступления денежных средств от заказчика, после подписания акта приемки законченного строительством
    объекта и утверждения его у инвестора (пункт 3.8 договора). Стоимость услуг генподрядчика в силу пункта 2.3 договора составляет
    4 % стоимости работ, выполненных субподрядчиком за отчетный период, согласованной сторонами в форме КС-3, без учета стоимости
    материалов поставки заказчика. Оплата услуг генподрядчика оформляется актом прекращения обязательств зачетом встречных
    однородных требований. Пунктом 3.13 договора предусмотрено, что к выполнению дополнительных работ субподрядчик приступает
    после подписания сторонами дополнительного соглашения. Генподрядчик компенсирует субподрядчику отклонение фактической
    стоимости материалов поставки генподрядчика согласно разделительной ведомости поставки материалов от их сметной стоимости
    (пункт 3.16 договора). Сроки выполнения работ согласованы сторонами в графике выполнения работ, который является приложением
    N 2 к договору, согласно которому работы должны быть выполнены не позднее 31.12.2011 (т. 1, л. д. 49). Дополнительными
    соглашениями от 11.09.2012 N 3, от 01.11.2012 N 4 стороны согласовывали выполнение дополнительных работ в срок до 30.10.2012
    по восстановлению дорожных проездов из сборных железобетонных плит и в срок до 25.12.2012 по выполнению комплекса работ
