    Потерпевшие Э..Д.Т., Т..Р.А., Ц..Л.А., К..Х.Д., уведомленные о дате, времени и месте судебного разбирательства надлежащим
    образом, на рассмотрение дела не явились, считаю возможным рассмотреть дело в их отсутствие.

