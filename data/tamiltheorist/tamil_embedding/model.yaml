- source_sentence: What evidence is presented in the text to argue that the Thagadoor Yathirai was written contemporaneously
    with the Thagadoor War, rather than at a much later period?
  sentences:
  - "அவிநய நூலாசிரியர் ஜைன மதத்தைச் சேர்ந்தவர் என்பது. இவர் இயற்றிய அவிநயச் சூத்திரம் ஒன்றால் தெரிகிறது. இந்தச் சூத்திரத்தில்,\
    \ ஒலி அணுவினால் எழுந்து ஒலிகள் பிறக்கின்றன என்னும் ஜைன சமயக் கொள்கையைக் கூறுகிறார். அவிநய நூலுக்கு மிகப் பிற்பட்ட காலத்தவராகிய\
    \ பவணந்தியாரும் தாம் இயற்றிய நன்னூலில், ஒலியணுத்திரளினாலே எழுத்துகள் பிறக்கின்றன என்னும் ஜைன சமயக் கருத்தைக் கூறியுள்ளார்.\
    \ அவிநய நூலாசிரியர், ஒலியணுவினால் எழுத்துகள் பிறக்கின்றன என்று கூறிய சூத்திரத்தை, மயிலைநாதர் என்னும் ஜைன சமய உரையாசிரியர்,\
    \ தாம் எழுதிய நன்னூல் உரையில் (எழுத்தியல், 13ஆம் சூத்திர உரை) மேற்கோள் காட்டுகிறார். “‘ஆற்ற லுடையுயிர் முயற்சியி னணுவியைந்\
    \ தேற்றன வொலியாய்த் தோன்றுதல் பிறப்பே’ என்றார் ஆசிரியர் அவிநயனாரும் எனக் கொள்க” என்பது அவர் காட்டிய மேற்கோள். எனவே, அவிநய\
    \ நூலாசிரியர், நன்னூலாசிரியரைப் போன்று சமண சமயத்தவர் என்பது தெளிவாக விளங்குகிறது. தக்கயாகப் பரணி உரையாசிரியர் (காளிக்குக்\
    \ கூளி கூறியது. 153ஆம் தாழிசை உரை), அவிநய நூல் கருத்தைத் தமது உரையில் குறிப்பிடுகிறார். அவர் கூறுவது இது: “நளினத்தை யுடையது\
    \ நளினி; அவிநயத்தால் உடைப் பெயர்ச்சொல் ஈறு திரிந்தது.” வீரசோழிய உரையாசிரியர் பெருந்தேவனார் இந்நூலைப் பற்றி (சொல்லதிகாரம்,\
    \ திரியாபதப் படல இறுதியில்) இவ்வாறு தமது உரையில் எழுதுகிறார்: “திணைபால் மரபு வினாச்சொல் பிடஞ்சொல் இணையா வழுத்தொகையோ டெச்ச\
    \ - மணையாக் கவினையபார் வேற்றுமையுங் காலமயக் குங்கொண் டவிநயனார் ஆராய்ந்தார் சொல் எனப் பதின்மூன்றால் ஆய்ந்தார் அவிநயனார்.\
    \ இவற்றுள் தொல்காப்பியனார் ஆராய்ந்தன நீக்கி மயக்கமும், சொல்லும், செப்பும், வினாவும், எச்சமும், மரபும் ஏற்றமாகச் சொன்னார்.”\
    \ வீரசோழிய உரையாசிரியர் தமது உரையிலே அவிநய நூலிலிருந்து இரண்டு சூத்திரங்களை மேற்கோள் காட்டுகிறார். அச் சூத்திரங்கள் இவை:\
    \ “தொல்காப்பியனார், ஒடு என்னும் பிரத்தியமொன்றே மூன்றும் வேற்றுமைக்கு உருபாகச் சொன்னார். ‘ஆலும் ஆனும் மூன்றே னுருபே’ என்றார்\
    \ அவிநயனார்.” (சொல்லதிகாரம், வேற்றுமைப் படலம், 6 ஆம் காரிகை உரை) “ஒத்த வடியினு மொவ்வா விகற்பினு மிக்க வரினு மப்பாற் படுமே’\
    \ என்றார் அவிநயனார்.” (யாப்பதிகாரம், 19ஆம் காரிகை உரை) யாப்பருங்கலக் காரிகை யுரையாசிரியராகிய குணசாகரர் தமது உரையிலே, அவிநய\
    \ நூலிலிருந்து கீழ்க்காணும் சூத்திரங்களை மேற்கோள் காட்டுகிறார்: “தத்தம் பாவினத் தொப்பினுங் குறையினும் ஒன்றொன் றொவ்வா வேற்றுமை\
    \ வகையாற் பாத்தம் வண்ண மேலா வாகிற் பண்போல் விகற்பம் பாவினத் தாகும். குறட்பா விரண்டவை நால்வகைத் தொடையான் முதற்பாத் தனிச்சொலி\
    \ னடிமூ விருவகை விகற்பினு நடப்பது நேரிசை வெண்பா என்றார் அவிநயனார்.” (யாப்பருங்கலக்காரிகை, 23ஆம் காரிகை உரை மேற்கோள்) “‘கோழியுங்\
    \ கூவின குக்கில் குரல்காட்டுந் தாழியுள் நீலத் தடங்கணீர் போதுமினோ ஆழிசூழ் வையத் தறிவ னடியேத்திக் கூழை தனையக் குடைதுங் குரைபுனல்\
    \ ஊழியு மன்னுவா மென்றேலோ ரெம்பாவாய்.’ இஃது ஐந்தடியான் வந்ததாயினும், ஒருபுடை யொப்புமை நோக்கிக் கலிவிருத்தத்தின்பாற் படுத்தி\
    \ வழக்கப்படும். இதனைத் தரவு கொச்சகம் எனினும் இழுக்காது. இஃது அவிநயனார் காட்டியது.” (யா. காரிகை. 43ஆம் உரை) “முன்னிலை நெடிலு\
    \ மாவு மாவும் னம்மிகப் புணரு மியங்குதிணை யான.” (யா., காரிகை, - 44ஆம் காரிகையுரை மேற்கோள்) யாப்பருங்கல உரையாசிரியர், தமது\
    \ உரையிலே மேற்கோள் காட்டுகிற அவிநயச் சூத்திரங்கள் வருமாறு: “அஇஉஎ ஒவிவை குறிய மற்றையேழ் நெட்டெ ழுத்தா நேரப் படுமே.\t1 குற்றெழுத்\
    \ துத்தொண் ணூற்றைந் தாகும் நூற்றொடு முப்பத்து மூன்று நெடிலாம்.\t2 இருநூற் றிருபத் தெட்டுவிரிந் தன வுயிரே வன்மை மென்மை\
    \ யிடைமை.\t3 வல்லெழுத் தாறோ டெழுவகை யிடத்தும் உகரம் அரையாம் யகரமோ டியையின் இகரமுங் குறுகு மென்மனார் புலவர்.\t4 அக்கேன\
    \ மாய்தந் தனிநிலை புள்ளி ஒற்றிப் பால வைந்து மிதற்கே.\t5 2அளபெடை தனியிரண் டல்வரி ஐஒள வுளதா மொன்றரை தனியுமை யாகும்.\t6 ஆய்தமும்\
    \ யவ்வு அவ்வொடு வரினே ஐயெ னெழுத்தொடு மெய்பெறத் தோன்றும்.\t7 உவ்வொடு வலவரி னௌவியல் பாகும்.\t8 நெடிய குறிய வுயிர்மெய் யுயிரும்\
    \ வலிய மெலிய விடைமை யளபெடை மூவுயிர்க் குறுக்கமோ டாமசைக் கெழுத்தே.\t9 அளபெழி னல்லதை யாய்தமு மொற்று மலகியல் பெய்தா வென்மனார்\
    \ புலவர்.\t10 உயிரள பெடையுங் குறுகிய உயிரின் இகர வுகரமுந் தளைதபி னொற்றம்.\t11 சீர்தப வரினு மொற்றியற் றாகும்.”\t12 (யாப்பருங்கலம்,\
    \ எழுத்தோத்து உரை மேற்கோள்) “நேரசை யொன்றே நிரையசை யிரண்டல காகு மென்ப வறிந்திசி னோரே”\t18 எனவும். “நேரோ ரலகு நிரையிரண்\
    \ டலகு நேர்புமூன் றலகு நிரைபுதான் கலகென் றோதினார் புலவ ருணரு மாறே.”\t14 எனவும் சொன்னார் அவிநயனார். “கடையு மிடையு மிணையும்ஐ\
    \ யிரட்டியும்”\t15 என்றார் அவிநயனார். (யாப்பருங்கலம், அசையோத்து உரை மேற்கோள்) “ஈரசைச் சீர்நான் கியற்சீர் மூவசை இயற்சீ\
    \ ரெட்டனு ளல்லன விரவினு நேரிறின் வெள்ளை நிறையிறின் வஞ்சி.\t16 ஈரசைச்சீர் பின்முன் னாவைத் துறழ்ந்து மாறியக்கா னாலசைச் சீர்பதி\
    \ னாறாம்.\t17 நேர்நிரை வரினே சீர்நிலை யெய்தலும் பாவொடு பிறவும் ஆகும் ஒரோவழி.\t18 முதலிடை நுனிநாப் பல்லிதழ் மூக்கிவை வன்மை\
    \ முதலாம் மும்மையும் பிறக்கும்.3\t19 உரிமை யியற்சீர் மயங்கியும் பானான் கிருமை வேறியல் வெண்பா வாகியும் வருமெனும் வஞ்சிக்\
    \ கலியினே ரீற்ற வியற்சீ ராகா வென்மனார் புலவர்.\t20 நிரையிறு நாலசை வஞ்சி யுள்ளால் விரவினு தேரீற் றல்லவை யியலா.\t21 நேர்நடு\
    \ வியல வஞ்சி யுரிச்சீ ராசிரி யத்திய லுண்மையு முடைய.”\t22 (யாப்பருங்கலம், சீரோத்து உரை மேற்கோள்) “ஈரசை யியற்சீ ரொன்றுத\
    \ லியல்பே.”\t23"
  - "தகடூர் யாத்திரை என்னும் நூலில், நமக்கு இப்போது தெரிகிற வரையில், அரிசில் கிழாரும் பொன்முடியாரும் பாடிய பாடல்கள் காணப்படுகின்றன.\
    \ இவ்விரண்டு புலவர்களும் தகடூர்ப் போர் நடந்த காலத்தில், பெருஞ்சேரல் இரும்பொறைக் காலத்தில் இருந்தவர்கள் என்பது இவர்கள்\
    \ பாடிய பாடல்களினால் தெரிகிறது. (தகடூர் யாத்திரை, செய்யுள் 9, 29, 47, 48 காண்க.) தகடூரை வென்றபிறகு, தகடூர் எறிந்த பெருஞ்சேர\
    \ லிரும்பொறையைப் பாடிப் (பதிற்றுப்பத்து, 8ஆம் பத்து) பெரும் பொருள் பரிசு பெற்றதோடு, அவனுடைய அமைச்சராகவும் இருந்தவர் அரிசில்கிழார்\
    \ என்னும் புலவர். இவர்களுடைய செய்யுள்கள் தகடூர் யாத்திரையில் காணப்படுகின்றன. இங்ஙனமாக, இந்நூல் மிகப் பிற்பட்ட காலத்து\
    \ நூல் என்று எவ்வாறு கூறமுடியும்? நூலினுள்ளே அகச்சான்று இருக்கும்போது, அதனைப் புறக்கணித்து, மிகப் பிற்காலத்தில் இருந்தவர்\
    \ எழுதியதைச் சான்றாகக் கொண்டு, மனம் போனபடி கூறுதல் உண்மைச் செய்தியைப் புறக்கணிப்பதாகும். உரையாசிரியர் கூறுவதில் தவறும்\
    \ இருக்கக்கூடும். நூலினுள்ளே அகச்சான்று கிடைக்கிறபோது அதனையே ஆதாரமாகக் கொள்ளவேண்டும். அன்றியும், வீரச்செய்திகளைக் கூறும்\
    \ நூல்கள், அவ்வீர நிகழ்ச்சிகள் நடைபெற்ற அதே காலத்தில், அல்லது அது நிகழ்ந்த அண்மைக் காலத்திலேயே தோன்றுவது வழக்கமாக உள்ளது.\
    \ நமது நாட்டில் வழங்கும் நாட்டுப் பாடல்களே இதற்குச் சான்றாகும். கட்டபொம்மன் கதை, தேசிங்கு ராஜன் கதை, முத்துப் பட்டன் கதை,\
    \ கான்சாயபு சண்டை, பூதத்தம்பி நாடகம், மதுரைவீரன் கதை முதலிய வீரர்களைப் பற்றிய நூல்கள் எல்லாம் அவை அவை நிகழ்ந்த அக்காலத்திலேயே,\
    \ அல்லது அவை நிகழ்ந்த அண்மைகாலத்துக் குள்ளே எழுதப்பட்டவை. அவை நிகழ்ந்த மிகப் பிற்பட்ட காலத்தில் தோன்றியவை அல்ல. (பாரதம்,\
    \ இராமாயணம் போன்ற மிகப் பழைய நிகழ்ச்சிகளை ஆதாரமாகக் கொண்டு நூல் இயற்றுவது விதிவிலக்கு.) மக்களின் மனத்திற்கு உணர்ச்சியூட்டுகிற\
    \ நிகழ்ச்சிகள், முக்கியமாக வீரச்செயல்கள், அவை நிகழ்ந்த அக்காலத்திலேயே பாட்டாகவும் கதையாகவும் இயற்றப்படுவது தொன்றுதொட்டு\
    \ இன்றுவரை நடைபெற்று வருகிற உலக வழக்கம். எனவே, தமிழகம் முழுவதும் உள்ள மக்களின் மனத்தைக் கவர்ந்ததும், உணர்ச்சியூட்டியதும்\
    \ ஆகிய தகடூர்ப் போர் - இது. முடியுடை வேந்தர் மூவரும், குறுநில மன்னர்களும் பங்குகொண்டு நிகழ்த்திய பெரும்போர் என்பதை மறத்தல்\
    \ ஆகாது - அந்நிகழ்ச்சி நடந்த பல காலத்துக்குப் பிறகு, அது பழங்கதையாய்ப் போனபிறகு, தகடூர் யாத்திரை என்னும் நூலாக எழுதப்பட்டது\
    \ என்று கூறுவது, உலக இயற்கைக்கும் பழந்தமிழர் மரபுக்கும் பொருந்துவது அன்று.2 புறநானூற்றில் கூறப்படும் வீரச்செய்திகள் எல்லாம்,\
    \ அவை நிகழ்ந்த அதே காலத்தில், புலவர்களால் நேரிற் கண்டு பாடப்பட்டவை அல்லவோ? அது போன்றே, தகடூர் யாத்திரை என்னும் நூல், அப்போர்\
    \ நிகழ்ந்த காலத்திலேயே கி.பி. 2ஆம் நூற்றாண்டிலேயே - எழுதப்பட்ட நூல் என்பது அதன் அகச்சான்றினால் தெரிகின்றது. அக்காலத்து\
    \ வழக்கப்படி, தகடூர்ப் போரில் கலந்து கொண்ட வீரர்களின் வீரச்செயல்களையும் ஏனைய செயல்களையும் புலவர்கள் செய்யுளாகப் பாடினார்கள்.\
    \ பிறகு, அப்பாடல்களைத் தொகுத்து, இடை யிடையே விளக்கம் எழுதி, தகடூர் யாத்திரை என்னும் பெயருடன் நூலாக அமைத்தார்கள் என்று\
    \ கருதுவது தவறாகாது. தமிழ்நாட்டிலே, தகடூர் யாத்திரை நூல் பல நூற்றாண்டுகளாக வழங்கி வந்தது. சென்ற 19ஆம் நூற்றாண்டுவரையில்\
    \ ஏட்டுச்சுவடியாக இருந்த தகடூர் யாத்திரை, அந்த நூற்றாண்டின் இறுதியிலேயே மறைந்து விட்டது. சங்க நூல்களை அச்சிடுவதற்காக ஏட்டுச்சுவடிகளைத்\
    \ தேடிய டாக்டர் உ. வே. சாமிநாத ஐயர், திருநெல்வேலி, தெற்குப் புதுத்தெருவில் இருந்த கிருஷ்ண வாத்தியார் வீட்டில் சென்று ஏட்டுச்\
    \ சுவடிகளை ஆராய்ந்து பார்த்தபோது, தகடூர் யாத்திரை என்னும் ஏட்டுச்சுவடியைப் பற்றிய குறிப்பு அவருக்குக் கிடைத்தது. இது பற்றி\
    \ அவர் தமது வரலாற்றில் இவ்வாறு எழுதுகிறார்: “அங்கே தொல்காப்பிய உரைச் சுவடி ஒன்றில், ‘நாங்குனேரியி லிருக்கும் ஒருவருக்கு\
    \ என்னிடமிருந்த தகடூர் யாத்திரைப் பிரதி ஒன்றைக் கொடுத்துவிட்டு, இப்பிரதியை இரவலாக வாங்கிக் கொண்டேன்’ என்று எழுதியிருந்தது.\
    \ யாரிடமிருந்து வாங்கியது என்று குறிப்பிடவில்லை. தொல்காப்பிய உரையில் தகடூர் யாத்திரை என்ற பெயர் வருகிறது. ஆதலால், அது\
    \ பழைய நூலென்று உணர்ந்தேன்” என்றும், “பிற்காலத்தில் நாங்குனேரியில் நான்கு முறை ஏடு தேடியபோது தகடூர் யாத்திரை கிடைக்கவே\
    \ யில்லை. பழைய நூல்கள் பல இந்த உலகத்தைவிட்டு யாத்திரை செய்துவிட்டதைப் போல அந்த அருமை யான நூலும் போய்விட்டதென்றுதான் நினைக்கிறேன்”\
    \ என்றும் ஐயர் அவர்கள் எழுதியிருக்கிறார்.3 இதிலிருந்து தகடூர் யாத்திரையின் கடைசிப் பிரதி சென்ற நூற்றாண்டில் மறைந்துவிட்டது\
    \ என்பது தெரிகிறது. இந்நூலின் மறைவினால் தமிழர் வரலாற்றின் ஒரு பகுதியே மறைந்துபோய்விட்டது. இப்போது நமக்கு இந்நூலிலிருந்து\
    \ கிடைத் துள்ள செய்யுள்கள் நாற்பத்தெட்டு. அவற்றைக் கீழே தருகிறேன். முதல் நாற்பத்துநான்கு செய்யுள்கள் புறத்திரட்டில் தொகுக்கப்பட்டவை.\
    \ வியத்தக்க காணுங்கால் வெண்மையிற் றீர்ந்தார் வியத்தக்க தாக வியப்ப - வியத்தக்க அல்ல வெனினும் அறியாதார் தாம்போல எல்லாம்\
    \ வியப்ப ரினிது.\t1 கிழிந்த சிதாஅ ருடுத்தும் இழிந்தார்போல் ஏற்றிரந் துண்டும் பெருக்கத்து நூற்றிதழ்த் தாமரை யன்ன சிறப்பினர்\
    \ தாமுண்ணின் தீயூட்டி யுண்ணும் படிவத்தார் தீயவை ஆற்றுழி யாற்றிக் கழுவுபு தோற்றம் அவிர்முருக்கந் தோலுரித்த கோலர் துவர்மன்னும்\
    \ ஆடையர் பாடி னருமறையர் நீடின் உருவந் தமக்குத்தா மாய இருபிறப் பாளர்க் கொரூஉகமா தீதே.\t2 நூற்றுவரிற் றோன்றுந் தறுகண்ணர்\
    \ ஆயிரவ ராற்றுளித் தொக்க வவையகத்து மாற்றமொன் றாற்றக் கொடுக்கு மகன்றோன்றும் தேற்றப் பரப்புநீர் வையகந் தேரினும் இல்லை இரப்பாரை\
    \ யெள்ளா மகன்.\t3 இறப்பப் பெருகி யிசைபடுவ தல்லாற் சிறப்பிற் சிறுகுவ துண்டோ அறக்கோலால் ஆர்வமும் செற்றமும் நீங்கிமற் றியார்கண்ணும்\
    \ இன்னாத வேண்டா விகல்மேல் மறமன்னர் ஒன்றார்க் குயர்த்த படை.\t4 அறம்புரிந்தன் றம்ம வரசிற் பிறத்தல் துறத்த தொடர்பொடு துன்னிய\
    \ கேண்மை சிறந்தார்க்கும் பாடு செயலீயார் தத்தம் பிறந்தவேல் வென்றிப் பொருட்டு.\t5 சொல்லுங்காற் சொல்லின் பயன்காணுந் தான்பிறர்\
    \ சொல்லிய சொல்லை வெலச்சொல்லும் - பல்லார் பழித்தசொற் றீண்டாமற் சொல்லும் விழுத்தக்க கேட்டார்க் கினியவாச் சொல்லானேற் - பூக்குழலாய்\
    \ நவ்வய லூரன் நறுஞ்சாந் தணியகலம் புல்லலின் ஊடல் இனிது.\t6 கால வெகுளிப் பொறையகேள் நும்பியைச் சாலுந் துணையுங் கழறிச் சிறியதோர்\
    \ கோல்கொண்டு மேற்சேறல் வேண்டா வதுகண்டாய் நூல்கண்டார் கண்ட நெறி.\t7 ஒளிவிடு பசும்பொ னோடை சூட்டிய வெளிறில் வெண்கோட்ட களிறுகெழு\
    \ வேந்தே வினவுதி யாயிற் கேண்மதி சினவா தொருகுடர்ப் படுதர வோரிரை துற்றம் இருதலைப் புள்ளி னோருயிர் போல அழிதரு வெகுளி தாங்காய்\
    \ வழிகெடக் கண்ணுறு பொழுதிற் கைபோலெய்தி நும்மூர்க்கு, நீதுணை யாகலு முளையே நோதக முன்னவை வரூஉங் காலை நும்மு னுமக்குத்துணை\
    \ யாகலு முரிய னதனாற் றொடங்க வுரிய வினைபெரி தாயினும் அடங்கல் வேண்டுமதி யத்தை யடங்கான் துணையிலன் றமியன் மன்னும் புணையிலன்\
    \ பேர்யா றெதிர்நீந்து மொருவ னதனைத் தாழ்த லன்றோ வரிது தலைப்படுதல் வேண்டிற் பொருந்திய வினையி னடங்கல் வேண்டும் அனைய மாகீண்\
    \ டறிந்திசி னோர்க்கே.\t8 4மொய்வேற் கையர் முரசெறிந் தொய்யென வையக மறிய வலிதலைக் கொண்ட"
  - "நீதி சான்மனு நைமிசத் தருகினு நெடுநாள் மாத வம்புரி காலையின் வெண்டுழாய் மவுலி நாத னங்கெழுந் தருளவந் தடிதொழு நவிறி ஏது நின்னுளத்\
    \ தெண்ணிய தெனமனு விசைப்பான்.\t1 ஊழி நான்குநீ மகவென வுதித்திட வேண்டி ஆழி யங்கையாய்; புரிந்ததித் தவமென வறைய வாழி மன்னவ வருதுநின்\
    \ மனைவியு நீயும் பாழி மாநிலத் திம்முறை வருகெனப் பணித்தான்.\t2 இருந்த வச்சம தக்கினி ரேணுகை யிமையோர் மருந்தெ னத்தகு கோசலை\
    \ தயரதன் மதிகால் திரிந்து நல்வசு தேவனற் றேவகி சுசீலை பொருந்து கோமக னெனவரு வீர்களிப் புவிமேல்.\t3 29. சாதவாகனம் இப்பெயரையுடைய\
    \ நூலை, உரையாசிரியர் மயிலை நாதர், நன்னூல் உரையில் குறிப்பிடுகிறார். “செய்வித்தோனாற் பெயர் பெற்றன, சாதவாகனம் இளந்திரையம்\
    \ முதலாயின” என்று அவர் எழுதுகிறார் (நன்னூல், பாயிரம், 48ஆம் சூத்திர உரை). “செய்வித் தானாற் பெயர் பெற்றன சாதவாகனம் இளந்திரையமென\
    \ இவை” என்று இறையனார் அகப்பொருளுரையாசிரியர் கூறுகிறார். இந்நூலைப்பற்றி வேறு செய்திகள் தெரியவில்லை. 30. சாந்தி புராணம்\
    \ சாந்தி புராணம் என்னும் பெயருள்ள நூல் ஒன்று இருந்தது என்பதை, அப்புராணத்திலிருந்து ஒன்பது செய்யுள்கள் புறத்திரட்டு என்னும்\
    \ நூலில் தொகுக்கப்பட்டிருப்பதிலிருந்து அறியலாம். இது சமண சமய நூல், இப்போது இந்நூல் மறைந்துவிட்டது. சாந்தி புராணம் என்பது\
    \ சாந்திநாதர் என்பவருடைய வரலாற்றைக் கூறும் நூல், சாந்திநாதர், ஜைனருடைய இருபத்துநான்கு தீர்த்தங் கரர்களுள் பதினாறாவது தீர்த்தங்கரர்\
    \ ஆவார். இவருடைய வரலாறு ஸ்ரீபுராணம் என்னும் மணிப்பிரவாள வசன நூலிலும், திரிசஷ்டி சலாகபுருஷ சரித்திரம் (அறுபத்துமூன்று பெரியார்\
    \ சரித்திரம்) என்னும் நூலிலும் கூறப்பட்டுள்ளது. அஸ்தினபுரத்துக் குருவம்சத்தில் அரச குமாரனாய்ப் பிறந்து சக்கரவர்த்தியாக\
    \ விளங்கிப் பின்னர் துறவுபூண்டு கேவலஞானம் பெற்றுத் தீர்த்தங்கரராய் வாழ்ந்து ஜைன மதத்தை உலகத்திலே பரவச் செய்து இறுதியில்\
    \ மோட்சமடைந்தார். சாந்திநாதர். இவருடைய சரித்திரத்திலே இவருடைய பதினொரு முற்பிறப்பு வரலாறுகள் கூறப்படுகின்றன. பரத கண்டத்தில்\
    \ இரத்தினபுரத்தின் அரசனாக ஸ்ரீசேனன் என்னும் பெயருடன் முதலில் பிறந்தார். பிறகு உத்தரகுருவில் பிறந்தார். அங்கிருந்து தேவலோகத்தில்\
    \ தேவனாய்ப் பிறந்தார். பிறகு இரதநூபுரத்து அரச குடும்பத்தில் அமிததேஜஸ் என்னும் அரசனாகப் பிறந்தார். பின்னர் நந்திதாவர்த்த\
    \ தேவலோகத் திலே மீண்டும் தேவனாய்ப் பிறந்தார். பிறகு, மீண்டும் பரத கண்டத்திலே சுபா நகரத்து அரச குடும்பத்திலே அபராஜிதர்\
    \ என்னும் அரசனாய்ப் பிறந்தார். இந்தப் பிறப்புக்குப் பிறகு அச்சுத தேவலோகத்திலே இந்திரனாய்ப் பிறந்தார். பின்னர், மீண்டும்\
    \ இரதன சஞ்சய நகரத்திலே வச்சிராயுதர் என்னும் அரசனாய்ப் பிறந்தார். பிறகு ஒன்பதாவது பிறவி யிலே அகமிந்திர தேவனாய்த் தேவலோகத்திலே\
    \ பிறந்தார். மீண்டும், பத்தாவது பிறவியிலே புண்டரீகினி நகரத்திலே அங்கிருந்து சர்வார்த்த சித்தி என்னும் தெய்வலோகத்தில் தேவனாய்ப்\
    \ பிறந்தார். கடைசியாக, முன்னமே கூறியதுபோல, அஸ்தினபுரத்திலே சாந்திநாதர் என்னும் பெயருள்ள அரசனாய்ப் பிறந்து, சக்கரவர்த்தியாய்\
    \ விளங்கி, இறுதியில் தீர்த்தங்கரராய் வாழ்ந்து வீடுபேறடைந்தார். இவருடைய முற்பிறப்புச் செய்திகள் இவருடைய வரலாற்றில் மிக\
    \ விரிவாகக் கூறப்படுகின்றன. சாந்தி புராணமும் இந்த வரலாறுகளைக் கூறுகிற நூலாக இருக்க வேண்டும். சாந்தி புராணத்தைப் பாடிய\
    \ புலவர் யார், அவர் எந்தக் காலத்தில் இருந்தார் என்பன தெரியவில்லை. இப்புராணம் இப்போது மறைந்துவிட்டது. இந்நூலிலிருந்து நமக்குக்\
    \ கிடைத்திருப்பவை ஒன்பது செய்யுள்களே. இச்செய்யுள்கள் புறத் திரட்டு என்னும் நூலில் தொகுக்கப் பட்டுள்ளன என்று முன்னமே கூறினோம்.\
    \ இச்செய்யுள்கள் இனிமையாக உள்ளன: ஆயிரங் கதிருடை யருக்கன் பாம்பினால் ஆயிரங் கதிரொடும் மழுங்கக் கண்டுகொல் ஆயிரங் கண்ணுடை\
    \ யமரர் கோனுமோர் ஆயிரம் அமைச்சர்சொல் வழியின் ஆயதே.\t1 நாயும் போல்வர்பல் லெச்சில் நச்சலால் தீயும் போல்வர்செய்ந் நன்றி சிதைத்தலால்\
    \ நோயும் போல்வர் நுகர்தற் கருமையால் வேயும் போல்வரிவ் வேனெடுங் கண்ணினார்.\t2 தோளும் மென்முலை யும்மல்குற் பாரமும் நாளும்\
    \ நாளும் நவின்று பருகிய கேள்வன் மார்க்கும் பகைஞர்க்கு மொத்தலால் வாளும் போல்வரிவ் வேனெடுங் கண்ணினார்.\t3 தானத்துக் குரித்து\
    \ மன்று தன்கிளைக் கீயிற் சால ஈனத்தில் உய்க்கும் நிற்கும் எச்சத்தை யிகழப் பண்ணும் மானத்தை யழிக்கும் துய்க்கின் மற்றவர்க்\
    \ கடிமை யாக்கும் ஊனத்து நரகத் துய்க்கும் பிறர்பொருள் உவக்கில் வேந்தே.\t 4 கிளருமெரி விடமெழுதல் விழுதல்முத லாய அளவிலகு\
    \ நரகில்வரு நவைபலவு மஞ்சின் உளமொழிமெய் நெறியொழுகி யுறுபொருள் சிதைக்கும் களவுவிழை வொழிதல்கட னாக்கனனி நன்றே.\t5 பிளவுகெழு\
    \ வெழுநரக மெரிகொளுவ லீர்தல் இளையவுடல் தடிவொடுறு துயரம்விளை விக்கும் கிளையறவு தருமரிய புகழினை யழிக்குங் களவுநனி விடுதலற\
    \ மென்றுகரு தென்றான்.\t6 கனிந்தநெய்க் கவளங் கையில் வைத்துடன் கழறு வாரை முனிந்திடு களிறு போல்வார் முத்தியை விளக்கு நீரார்\
    \ மனங்கொளத் துறந்திடாதே வால்குழைத் தெச்சிற் கோடும் சுணங்கனைப் போலும் நீரார் பற்றிடைச் சுழலும் நீரார்.\t7 ஆனை யூற்றின்\
    \ மீன்சுவையின் அசுண மிசையின் அளிநாற்றத் தேனைப் பதங்க முருவங்கண் டிடுக்க ணெய்து மிவையெல்லாம் கான மயிலின் சாயலார் காட்டிக்\
    \ கௌவை விளைத்தலான் மான மாந்தர் எவன்கொலோ வரையா தவரை வைப்பதே.\t8 விண்ணில் இன்பமும் வீதல் கேட்டுமால் மண்ணில் இன்பமும் மாய்தல்\
    \ காண்டுமால் எண்ணில் இன்பமாம் ஈறி லாததே நண்ணி நாமினி நயக்கற் பாலதே\t9 31. சித்தாந்தத் தொகை சிவஞான சித்தியார், நீலகேசி\
    \ என்னும் நூல்களின் உரைகளி லிருந்து இப்பெயருள்ள நூல் ஒன்று இருந்த தென்பது தெரிகிறது. இது பௌத்த சமய நூல். ஞானப்பிரகாசர்,\
    \ சிவஞான சித்தியார் (பரபக்கம், சௌத்தி ராந்தகன் மதம், 2ஆம் செய்யுள்) உரையில் சித்தாந்தத் தொகையி லிருந்து ஒரு செய்யுளை மேற்கோள்\
    \ காட்டுகிறார். அவர் காட்டுவது: “‘அருணெறியாற் பாரமிதை யாறைந்து முடனடக்கிப் பொருண் முழுதும் போதிநீழ னன்குணர்ந்த முனிவரன்றன்’\
    \ இஃதவர்கள் (பௌத்தர்கள்) சித்தாந்தத் தொகை.” சித்தாந்தத் தொகையிலிருந்து இந்த இரண்டடிகளை மட்டும் மேற்கொள் காட்டிய உரையாசிரியர்,\
    \ மேற்படி சித்தியார் (சௌத்திராந்தகன் மதம், 31ஆம்  செய்யுள்( உரையில் இச்செய்யுள் முழுவதையும் மேற்கோள் காட்டுகிறார். அது:\
    \ “அருணெறியாற் பாரமிதை யாறைந்து முடனடக்கிப் பொருண்முழுதும் போதியின்கீழ் முழுதுணர்ந்த முனிவரன்தன் அருண்மொழியா னல்வாய்மை\
    \ யறிந்தவரே பிறப்பறுப்பார் மருணெறியாம் பிறநூலும் மயக்கறுக்கு மாறுளதோ” என்பது."
- source_sentence: மதிவாணர் நாடகத்தமிழ் நூல் யாரால் இயற்றப்பட்டது, எந்தக் காலத்தைச் சேர்ந்தது, மற்றும் அடியார்க்கு நல்லார்
    இந்நூலை எவ்வாறு விவரிக்கிறார்?
  sentences:
  - "(கழறிற்றறிவார் நாயனார் புராணம், 87) இந்த அந்தாதியைப்பற்றி வேறு செய்திகள் தெரியவில்லை. 22. தில்லையந்தாதி சிதம்பரத்தில்\
    \ எழுந்தருளியுள்ள சிவபெருமான்மீது இயற்றப்பட்ட அந்தாதி நூல் இது. அகப்பொருள் துறையமைந்த செய்யுள்களைக் கொண்டது என்று தோன்றுகிறது.\
    \ இந்நூல் ஆசிரியர் பெயர், காலம் முதலியன தெரியவில்லை. இந்நூலிலிருந்து ஒரு செய்யுளைக் களவியற் காரிகை யுரையாசிரியர் தமது\
    \ உரையில் மேற் கோள் காட்டியுள்ளார். அச்செய்யுள் இது: தொடிவா னரமங்கை யன்றிமைக் குங்கண்கள் தோயுநிலத் தடிவா னரந்த மலரும்\
    \ புலரு மயன்றலையைத் தடிவா னரன் ... ... தாழ்சடை யோன்றில்லை யூசல்வல்லிக் கொடிவா னரம்புரி யும்பொழில் வாய்வந்த கோல்வளைக்கே.\
    \ 23. நந்திகோவை இந்தக் கோவை, தெள்ளாறெறிந்த நந்திவர்மன் ஆகிய மூன்றாம் நந்திவர்மன் என்னும் பல்லவ மன்னன்மேல் பாடப் பட்டதென்று\
    \ நந்தி கலம்பகச் செய்யுளினால் தெரிகிறது. இந்தப் புவியில் இரவலருண் டென்பதெல்லாம் அந்தக் குமுதமே அல்லவோ-நந்தி தடங்கைப்பூ\
    \ பாலன்மேல் தண்கோவை பாடி அடங்காப்பூ பாலரா னார் என்பது அச்செய்யுள். இதனால், புலவர்கள் பலர் நந்திவர்மன் மேல் பல கோவைப் பிரபந்தங்கள்\
    \ பாடிப் பரிசு பெற்றனர் என்பது தெரிகிறது. அந்தக் கோவைகளில் ஒன்றேனும் இப்போது கிடைக்கவில்லை. 24. நறையூரந்தாதி இதுவும் அகப்பொருள்\
    \ துறையமையப் பாடப்பட்ட அந்தாதி நூல். இதன் ஆசிரியர் பெயர், காலம் முதலியன தெரியவில்லை. இந்நூலிலிருந்து ஒரு செய்யுளைக் களவியற்காரிகை\
    \ யுரையாசிரியர் மேற்கோள் காட்டுகிறார். அச்செய்யுள் இது: நல்லளந் தானு மமுதளந் தானு நகைக்குநல்ல வில்லளந் தானுதற் கும்விலை\
    \ கேட்கில் விரிதமிழின் சொல்லளந் தானொரு பாவலர்க் காய்த்துறை யூர்நறையூர் நெல்லளந் தானளந் தானெடு நாட்டிற்கு நேர்நிற்குமே.\
    \ துறையூரைச் சேர்ந்த நறையூரில் இருந்த ஒருவர்மீது இவ்வந்தாதி பாடப்பட்டதென்பது தெரிகிறது. 25. நாலாயிரக் கோவை இந்நூல், புதுவைக்\
    \ காங்கயன் என்னும் செல்வச் சீமான்மீது கடவுட் புலவன் என்னும் சிறப்புப் பெயரையுடைய ஒட்டக் கூத்தரால் பாடப்பட்டது. இதனைச்\
    \ சோழமண்டல சதகத்தினால் அறியலாம். அச்செய்யுள்: கோலா கலமன் னரிலவன்போற் கொடுத்தே புகழுங் கொண்டாரார் மேலார் கடவுட் புலவனெனும்\
    \ விழுப்பேர் கூத்தன் முழுப்பேரா னாலா யிரக்கோ வையும்புனைய நவில்கென் றிசைத்து நாட்டுபுகழ் மாலா மெனுங்காங் கயன் வாழ்வு வளஞ்சேர்\
    \ சோழ மண்டலமே. இந்நூலுக்கு நாலாயிரக் கோவை. என்று ஏன் பெயர் வாய்த்தது என்பது தெரியவில்லை. நாலாயிரம் பாடல்களால் ஆனது இக்கோவை\
    \ என்று கருதுவது தவறு. கோவை நூல்கள் 4,000 செய்யுள்களால் பாடப்படுவது மரபன்று. நாலாயிரக் கோவை என்பதற்கு வேறு ஏதோ காரணம்\
    \ இருக்க வேண்டும். 26. பல்சந்தமாலை பல்சந்தமாலை என்னும் நூலிலிருந்து சில செய்யுள்களைக் களவியற் காரிகை யுரையாசிரியர் மேற்கோள்\
    \ காட்டுகிறார். இதனால் இப்பெயரையுடைய நூல் ஒன்றிருந்தது என்பது தெரிகிறது. பாண்டிநாட்டிலே காயற்பட்டினத்திலே இருந்த ஒரு முகமதியப்\
    \ பிரபுவின்மீது பாடப்பட்டது. இந்நூல். இது அகப்பொருள் இலக்கிய நூல். களவியற் காரிகைப் பதிப்பாசிரியர் திரு. எஸ். வையாபுரிப்\
    \ பிள்ளை அவர்கள் இந்நூலைப் பற்றிக் கூறுவது வருமாறு: “பல்சந்தமாலை யென்ற பெயரையுடைய நூல் சில செய்திகளைப் புலப்படுத்துகின்றது.\
    \ பன்னிரு பாட்டியலிற் பல்சந்த மாலை யென்றொரு பிரபந்தவகை கூறப்பட்டுள்ளது. இந்நூல் அப்பிரபந்த வகையைச் சார்ந்ததாக இருத்தல்\
    \ கூடும். ஆனால், இதன் கண்ணின்று களவியற் காரிகை யுரையிற் காட்டப்படுவன வெல்லாம் கலித்துறைச் செய்யுள்களே. இந்நூல் வச்சிரநாட்டு\
    \ வகுதாபுரியில் அரசு புரிந்துவந்த அஞ்சுவன்னத்தவர் மரபினனாகிய ஓர் முகமதிய மன்னனைக் குறித்துப் பாடப்பெற்றதாகும். வகுதாபுரியை\
    \ இக்கலாகாலத்திற் காயற்பட்டினம் என வழங்குவர் ... ... ... ... வகுதாபுரிக்கு ‘அந்துபார்’ என வொரு பெயரும் இருத்தல் வேண்டும்\
    \ என்பது ஒரு செய்யுளால் புலப்படுகின்றது.” பல்சந்தமாலை இயற்றிய ஆசிரியர் பெயர், காலம் முதலியன தெரியவில்லை. பல்சந்தமாலையிலிருந்து\
    \ எட்டுச் செய்யுள்கள் களவியற் காரிகையுரையில் மேற்கோள் காட்டப்பட்டுள்ளன. அச்செய்யுள்கள் இவை: கலைமதி வாய்மைக் கலுழ்பா வழிவருங்\
    \ கற்பமைந்த தலைமைய ரேழ்பெருந் தோங்க மும்பெற்ற நநதசச மலையன மாமதில் வச்சிர நாடன்ன வாணுதறன் முலையிணை தோய்ந்ததெல் லாங்கன வேயென்று\
    \ முன்னுவனே.\t1 நாட்டம் புதைக்கின்ற தென்னீ மடந்தை நவகண்டமே லீட்டம் புகழ்வின்னன் மேவா ரெனவிங்ஙன் யான்வருந்த வாட்டம் பயின்றாங்\
    \ ககிலின் குழம்பணிந் தாகமெங்கும் வேட்டந் தெரிகின்ற கொங்கைக ளென்னை மிகைசெய்தவே.\t2 நகுதா மரைமலர் சூழ்வாவி சூழ்வச்ர நாடர்தங்கள்\
    \ வகுதா புரியன்ன வாணுத லீர்மற்ற வார்தழையு மிகுநாண் மலர்களுங் கொண்மின்கள் கொள்ளாவிடின்மதுவந் தொகுகாம னைங்கணை யாலெம தாவி\
    \ துவக்குண்ணுமே.\t 3 செம்முக மானதர் செங்குங்கு மப்புயர் சீர்சிறந்த மைம்மலி வாசப் பொழில்வாய் மதியன்ன வாணுதலீர் மும்மத மாரி\
    \ பொழியப் பொழிமுகில் போல்முழங்கிக் கைம்மலை தான் வரக் கண்டதுண் டோநும் கடிபுனத்தே.\t4 இயவன ராசன் கலுபதி தாமுத லெண்ண வந்தோர்\
    \ அயன்மிகு தானைய ரஞ்சுவன் னத்தவ ரஞ்சலென்னாக் கயவர்கள் வாழ்பதி போலத் தினைப்புனங் காய்கொய்துபோம் பயன்விளை வாம்படி பூத்தது\
    \ வேங்கை பணிமொழியே.\t5 பிறையார் நறுநுதற் பேதைதன் காரணத் தாற்பெரும மறைநா ளிரவில் வருவது நீயொழி வச்சிரநாட் டிறையா கியகலு\
    \ பாமுத லானவர் யானைகணின் றறைவாரும் விஞ்சத் தடவிகள் சூழு மணிவரையே.\t6 வானது நாணக் கொடையா லுவகை வளர்த்தருளும் சோனகர் வாழுஞ்\
    \ செழும்பொழில் சூழ்ந்தது பாரனையா டானணி வாணுதல் கண்டும் பகலே தனித்தனியே மானமி லாதிரை தேரும் பறவைக டாமகிழ்ந்தே.\t7 வில்லார்\
    \ நுதலியு நீயுமின் றேசென்று மேவுதிர்சூ தெல்லா முணர்ந்தவ ரேழ்பெருந் தாங்கத் தியவனர்க ளல்லா வென வந்து சதிதியுந்தார வகைதொழுஞ்சீர்\
    \ நல்லார் பயிலும் பழனங்கள் சூழ்தரு நாட்டகமே.\t8 27. பொருளியல் அகப்பொருளைக் கூறும் இந்நூற் செய்யுள்கள் களவியற் காரிகை யுரையாசிரியரால்\
    \ மேற்கோள் காட்டப்பட்டுள்ளன. இந்நூலை இயற்றிய ஆசிரியர் பெயர் முதலியன தெரியவில்லை. இந்நூற் செய்யுள்கள் சிலவற்றைக் கீழே தருகிறோம்:\
    \ நோக்கினும் பிறர்முக நோக்காள் சாரினும் பூக்குழன் மடந்தை தோள்சா ரும்மே யன்ன தலையளி யுடைமையி னின்னுயிர்த் தோழி யேந்திழை\
    \ யிவட்கே.\t1 உடையை வாழி நெஞ்சே யிடைக்கொண் டழுங்க லோம்புமதி தழங்கொலி மிகுநீர் வழுத்தூர் காக்கு மாபுணை விழுத்துணைக் கான்ற\
    \ மிகுபெருங் கிளையே.\t2 பொருந்தா தம்ம புனையிழை மடந்தை முருந்தேர் முறுவ னோக்கிள் வருந்தின னென்பது பெருந்தகை பெரிதே,\t3"
  - "மறனெறிந்து மாறுகொண்டறியா வறிவுக்கிம் முறைநா னிவ்வள வன்றே பூவிரல் காட்டி நீறுபொங் கத்தன் கைகளா னிலனடித் தூரை யிடஞ்செய்து\
    \ காடு புகுதல் கண்டே னென்னுங் கவலை நெஞ்சமொ டவல நீந்தினாள் அன்றது மன்றவ் வதிகமான் றாய்க்கு.\t45 கீழ்க்கண்ட நான்கு செய்யுள்களை\
    \ நச்சினார்க்கினியர், தொல் காப்பிய (பொருள், புறத்திணை, “இயங்குபடை யரவம்”, “கொள்ளார் தேஎங் குறித்த கொற்றம்” என்னும் சூத்திரங்களின்)\
    \ உரையில் மேற்கோள் காட்டு கிறார். ஆனால், அவர் இச்செய்யுள்கள் தகடூர் யாத்திரையைச் சேர்ந்தன என்று குறிக்கவில்லை. எனினும்,\
    \ இவை தகடூர் யாத்திரையைச் சேர்ந்தன என்று ஐயமறத் துணியலாம். “மெய்ம்மலி மனத்தி னம்மெதிர் நின்றோ னடர்வினைப் பொலிந்த சுடர்விடு\
    \ பாண்டிற் கையிகந் தமருந் தையணற் புரவித் தளையவிழ் கண்ணி யிளையோன் சீறின் விண்ணுயர் நெடுவரை வீழ்புயல் கடுப்பத் தண்ணறுங்\
    \ கடாஅ முமிழ்ந்த வெண்கோட் டண்ணல் யானை யெறித லொன்றோ மெய்ம்மலி யுவகைய னம்மருங்கு வருதல் கடியமை கள்ளுண் கைவல் காட்சித் துடிய\
    \ நுண்க ணோக்கிச் சிறிய கொலைமொழி மின்னுச்சிதர்ந் தனையதன் வேறிரித் திட்டு நகுதலு நகுமே.\t46 இஃது அதிகமானாற் சிறப்பெய்திய\
    \ பெரும்பாக்கனை மதியாது சேரமான் முனைப்படை நின்றானைக் கண்டு அரிசில்கிழார் கூறியது.” “மறனுடை மறவர்க் கேறவிட னின்றி நெய்யோ\
    \ டையவி யப்பி யெவ்வாயும் எந்திறப் பறவை யியற்றின நிறீஇக் கல்லுங் கவணுங் கடுவிசைப் பொறியும் வில்லுங் கணையும் பலபடப் பரப்பிப்\
    \ பந்தும் பாவையும் பசிவரிப் புட்டிலும் என்றிவை பலவுஞ் சென்றுசென் றெறியு முந்தை மகளிரை யியற்றிப் பின்றை யெய்பெரும் பகழி\
    \ வாயிற் றூக்கிச் சுட்டல் போயின் றாயினும் வட்டத் தீப்பாய் மகளிர் திகழ்நலம் பேர நோக்குநர் நோக்குநர் நொந்துகை விதிர்க்குந்\
    \ தாக்கருந் தானை யிரும்பொறை பூக்கோட் டண்ணுமை கேட்டொறுங் கலுழ்ந்தே.\t47 இது பொன்முடியார் பாட்டு.” “கலையெனப் பாய்ந்த மாவு\
    \ மலையென மயங்கம ருழந்த யானையு மியம்படச் சிலையலைத் துய்ந்த வயவரு மென்றிவை பலபுறங் கண்டோர் முன்னாள் இனியே யமர்புறங் கண்ட\
    \ பசும்புண் வேந்தே மாக்களி றுததைத்த கணைசேர் பைந்தலை மூக்கறு நுங்கிற் றூற்றயற் கிடப்பக் களையாக் கழற்காற் கருங்கண் ஆடவர்\
    \ உருகெழு வெகுளியர் செறுத்தன ரார்ப்ப மிளைபோ யின்று நாளை நாமே யுருமிசை கொண்ட மயிர்க்கட் டிருமுர சிரங்க வூர்கொள் குவமே.\t\
    48 இது சேரமான், பொன்முடியாரையும் அரிசில் கிழாரையும் நோக்கித் தன் படை பட்ட தன்மை கூறக் கேட்டோற்கு அவர் கூறியது.”: “மொய்வேற்\
    \ கையர் முரண்சிறந் தொய்யென வையக மறிய வலிதலைக் கொண்ட தெவ்வழி யென்றி வியன்றார் மார்ப வெவ்வழி யாயினு மவ்வழித் தோன்றித் திண்கூ\
    \ ரெஃகின் வயவர்க் காணிற் புண்கூர் மெய்யி னுராஅய்ப் பகைவர் பைந்தலை யுதைத்த மைந்துமலி தடக்கை யாண்டகை மறவர் மலிந்துபிறர்\
    \ தீண்ட றகாது வெந்துறை யானே.\t49 இது பொன்முடியார் தகடூரின் தன்மை கூறியது.” 3. பெரும்பொருள் விளக்கம் இப்பெயருள்ள ஒரு நூல்\
    \ இருந்ததென்பதைப் புறத்திரட்டு என்னும் தொகை நூலிலிருந்தும், நச்சினார்க்கினியர் எழுதிய தொல்காப்பிய (பொருள். புறத்திணையியல்)\
    \ உரையிலிருந்தும் அறிகிறோம். பெரும்பொருள் விளக்கத்தின் ஆசிரியர் பெயர், அவர் இருந்த காலம், நூலியற்றிய காரணம் முதலிய செய்திகள்\
    \ ஒன்றும் தெரிய வில்லை. கீழ்க்காணும் பெரும்பொருள் விளக்கத்துச் செய்யுள்களைப் புறத்திரட்டில் உள்ளபடியே தருகிறேன். இச்செய்யுள்களில்\
    \ பலவற்றை நச்சினார்க்கினியரும் தமது உரையில் மேற்கோள் காட்டியுள்ளார். புறத்திரட்டுச் செய்யுள்களுக்குள்ளும் நச்சினார்க்கினியர்\
    \ செய்யுள் களுக்கும் பாடபேதங்கள் உள்ளன. பாடபேதங்களை இங்குக் காட்டவில்லை. புறத்திரட்டில் காணப்படும் பெரும்பொருள் விளக்கச்\
    \ செய்யுள்கள் வருமாறு: மின்னும் தமனியமும் வெற்றிரும்பும் ஓரினமாப் பொன்னின் பெயர்படைத்தாற் போலாதே - கொன்னே ஒளிப்பாரும்\
    \ மக்களாய் ஒல்லுவ தாங்கே அளிப்பாரும் மக்களாம் ஆறு.13\t1 இளையர் முதியர் எனவிருபால் பற்றி விளையும் அறிவென்ன வேண்டா - இளையனாய்த்\
    \ தன்தாதை காமம் நுகர்தற்குத் தான்காமம் ஒன்றாது நீத்தான் உளன்.14\t2 யானை நிரையுடைய தேரோ ரினுஞ்சிறந்தார் ஏனை நிரையுடைய ஏர்வாழ்நர்\
    \ - யானைப் படையோர்க்கும் வென்றி பயக்கும் பகட்டே ருடையோர்க் கரசரோ வொப்பு.15\t3 நிலம்பொறை யாற்றா நிதிபல கொண்டுங் குலம்பெறுதீங்\
    \ கந்தணர் கொள்ளார் - நலங்கிளர் தீவா யவிசொரியத் தீவிளங்கு மாறுபோல் தாவா தொளிசிறந்த தாம்.16\t4 ஈட்டிய வெல்லா மிதன்பொருட்\
    \ டென்பது காட்டிய கைவண்மை காட்டினார் - வேட்டொறுங் காமருதார்ச் சென்னி கடல்சூழ் புகார்வணிகர் தாமரையுஞ் சங்கும்போற் றந்து.\t\
    5 வெவ்வாள் மறவர் மிலைச்சிய வெட்சியாற் செவ்வானஞ் செல்வதுபோற் செல்கின்றார் - எவ்வாயும் ஆர்க்குங் கழலொலி யாங்கட் படாலியரோ\
    \ போர்க்குந் துடியயொடு புக்கு.17\t6 வாள்வலம் பெற்ற வயவேந்த னேவலால் தாய்வ லிளையவர் தாஞ்செல்லின் - நாளைக் கனைகுரல் நல்லாவின்\
    \ கன்றுள்ளப் பாலின் நனைவது போலுமிவ் வூர்.18\t7 வந்த நிரையி னிருப்பு மணியுடன் எந்தலை நின்றலை யான்றருவன் - முந்துநீ மற்றவை\
    \ பெற்று வயவேந்தன் கோலோங்கக் கொற்றவை கொற்றங் கொடு.19\t8 திரைகவுள் வெள்வாய்த் திரிந்துவீழ் தாடி நரைமுதியோ னேற்றுரைத்த நற்சொல்\
    \ - நிரையன்றி எல்லைநீர் வைய மிறையோர்க் களிக்குமால் வல்லையே சென்மின் வழி.20\t9 பிறர்புல மென்னார் தமர்புல மென்னார் விறல்வெய்யோர்\
    \ வீங்கிருட்கட் சென்றார் - நிரையுங் கடாஅஞ் செருக்குங் கடுங்களி யானை படாஅ முகம்படுத் தாங்கு.21\t10 அடியதிர் ஆர்ப்பினர்\
    \ ஆபெயர்தற் கன்னாய் கடிய மறவர் கதழ்ந்தார் - மடிநிரை மீளாது மீளான் விறல்வெய்யோன் யாதாங்கொல் வாளார் துடியார் வலம்.\t11 கங்கை\
    \ கவர்ந்தார்க்குக் கானப் பெருங்கவலை எங்கு மறவ ரிரைத்தெழுந்தார் - நுங்கிளைகள் மன்றுகாண் வேட்கை மடிசுரப்பத் தோன்றுவ கன்றுகாண்\
    \ மெய்குளிர்ப்பீர் கண்டு.\t12 கடல்புக்கு மண்ணெடுத்த காரேனக் கோட்டின் மிடல்பெரி தெய்தின மாதோ - தொடலைக் கரந்தை மறவர் கருதாதா\
    \ ருள்ளத்"
  - "என நூலுள்ளும் ... ... ... ... கூறினாராகலாற் பேரியாழ் முதலிய ஏனவும் இறந்தனவெனக் கொள்க.” (சிலம்பு, அடியார்க்கு நல்லார்,\
    \ உரைப்பாயிரம்) சிலம்பு., அரங்கேற்று காதை, 130ஆம் அடியாகிய “குயிலுவ மாக்க ணெறிப்பட நிற்ப” என்னும் அடியின் உரையில் அடியார்க்கு\
    \ நல்லார், நூலினின்று மற்றொரு சூத்திரத்தை மேற்கோள் காட்டுகிறார்: “முறைமையாவது:- ‘ஆடிட முக்கோ லாட்டுவார்க் கொருகோல் பாடுநர்க்\
    \ கொருகோ லந்தர மொருகோல் குயிலுவர் நிலையிட மொருகோல்’ என்று நூலிற் கூறின முறையென்க.” சிலப்பதிகாரம் அரங்கேற்று காதை, முதல்\
    \ அடியாகிய “தெய்வமால் வரைத் திருமுனி” என்பதற்கு உரை எழுதுகிற அடியார்க்கு நல்லார் பின்வரும் செய்யுளை மேற்கோள் காட்டி’ இச்செய்யுள்\
    \ நூன்முகத்துள் உள்ளது என்று கூறுகிறார். நூன்முகம் என்பது, நூல் என்னும் இசைத்தமிழ் நூலின் பாயிரம் என்பது தெளிவு. அடியார்க்கு\
    \ நல்லார் மேற்கோள் காட்டுகிற இச்செய்யுளையே அரும்பத உரையாசிரியரும் மேற்படி உரையில் மேற்கோள் காட்டுகிறார். ஆனால், அவர் இந்த\
    \ மேற்கோள் செய்யுள் எந்த நூலைச் சேர்ந்தது என்று கூற வில்லை; அடியார்க்கு நல்லார்மட்டும் கூறியுள்ளார். இவர்கள் மேற்கோள்\
    \ காட்டுகிற நூன்முகச் செய்யுள் இது: “திருந்திய பொதியி லருந்திற லகத்தியன் சுந்தர மணிமுடி யிந்திரன் மகனை மாணா விறலோய் வேணு\
    \ வாகென விட்ட சாபம் பட்ட சயந்தன் சாபவிடை யெமக்கரு டவத்தோ யென்று மேவினன் றொழுது மேதக வுரைப்ப வருந்தவ மாமுனி தமிழ்க்கூத்\
    \ தியர்க்குத் திருந்திய தலைக்கோற் றானந் தீருமென் றவளினி துரைப்ப வாகிவந் தனனென்.” இச்செய்யுள் நூல் என்னும் இசைத்தமிழ் நூலின்\
    \ பாயிரம் என்று துணியலாம். இந்நூலை இயற்றியவர் பெயர், அவர் இருந்த காலம் முதலியவை தெரியவில்லை. 15. பரதம் இந்த நாடகத்தமிழ்\
    \ நூல் தமது காலத்திற்கு முன்னரே மறைந்து போனதாக அடியார்க்கு நல்லார், சிலப்பதிகார உரைப்பாயிரத்தில் கூறுகிறார். “நாடத் தமிழ்\
    \ நூலாகிய பரதம், அகத்தியம் முதலாகவுள்ள தொன்னூல்களும் இறந்தன” என்று அவர் எழுதுகிறார். இதனால், இது மிகப் பழைய நூல் என்று\
    \ தெரிகிறது. 16. பரதசேனாபதீயம் இது நாடக இலக்கணத்தைக் கூறும் நூல். இதனை இயற்றியவர் ஆதிவாயிலார் என்பவர். இதனை, “ஆதிவாயிலார்\
    \ செய்த பரத சேனாபதீயம்” என்று அடியார்க்கு நல்லார் சிலப்பதிகார உரைச் சிறப்புப் பாயிரத்தில் எழுதுவதனால் அறியலாம். இந்நூலைப்பற்றி\
    \ வேறு செய்திகள் தெரியவில்லை. இந்நூலினின்று சில செய்யுள்களை அடியார்க்கு நல்லார் மேற்கோள் காட்டுகிறார். பரதநாட்டியத்தைப்\
    \ பற்றிக் கூறுவது இந்நூல் என்று தெரிகிறது. “பண்ணியம்வைத் தானைமுகன் பாதம் பணிந்துநாட் புண்ணிய வோரை புகன்றனகொண்-டெண்ணியே\
    \ வண்டிருக்குங் கூந்தன் மடவரலை யையாண்டிற் றண்டியஞ்சேர் விப்பதே சால்பு’ எனவும், ‘வட்டணையுந் தூசியு மண்டலமும் பண்ணமைய வெட்டுட\
    \ னீரிரண்டாண் டெய்தியபின்-கட்டளைய கீதக் குறிப்பு மலங்கார முங்கிளரச் சோதித் தரங்கேறச் சூழ்’ எனவும், நன்னர் விருப்புடையோ\
    \ ணற்குணமு மிக்குயர்ந்தோள் சொன்னகுலத் தாலமைந்த தொன்மையளாய்ப் - பன்னிரண்டாண் டேய்ந்ததற்பி னாடலுடன் பாடலழ கிம்மூன்றும் வாய்ந்தவரங்\
    \ கேற்றல் வழக்கு’ எனவுங் கூறினார் பரதசேனாபதியார்.” (சிலம்பு., அரங்கேற்று., 10ஆம் அடி, அடியார்க்கு நல்லார் உரை மேற்கோள்)\
    \ மேற்காட்டிய செய்யுள்களில், “வட்டணையுத் தூசியும்” என்னும் இரண்டாவது செய்யுளை, சீவக சிந்தாமணி 673ஆம் செய்யுள் உரையில்\
    \ நச்சினார்க்கினியர் மேற்கோள் காட்டியுள்ளார்: உவர்ப்பிற் கலக்கமாங் கைப்பின்வருங் கேடு துவர்ப்பிற் பயமாஞ் சுவைக - ளவற்றிற்\
    \ புளிநோய் பசிகாழ்ப்புப் பூங்கொடியே தித்திப் பளிபெருகு மாவ தரங்கு. (சிலம்பு., அரங்கேற்று., அடி 95, 96, அடியார்க்கு நல்லார்\
    \ உரை மேற்கோள்) “... ... ... ... ... ... ... அரிதரங்கிற் செய்தெழினி மூன்றமைத்துச் சித்திரத்தாற் பூதரையு மெய்த வெழுதி யியற்று’\
    \ என்றார் பரதசேனாபதியாரும்.” (சிலம்பு., அரற்கேற்று., 109ஆம் அடி, அடியார்க்கு நல்லார் உரை மேற்கோள்) “‘புண்ணியமால் வெற்பிற்\
    \ பொருந்துங் கழைகொண்டு கண்ணிடைக் கண்சாண் கனஞ்சாரு-மெண்ணிய நீளமெழு சாண்கொண்டு நீராட்டி நன்மைபுனை நாளிற் றலைக்கோலை நாட்டு.’\
    \ ‘ஆவ தகத்தியனார் சாபத்தா னான்மூங்கில்’ என்றார் பரதசேனாபதியார்.” (சிலம்பு., அரங்கேற்று., 116ஆம் அடி, அடியார்க்கு நல்லார்\
    \ உரை மேற்கோள்) குறிப்பு\t: \t‘பரத சேனாபதீயம்’ என்னும் வேறொரு நூலும் உண்டு. இது, பழைய பரத சேனாபதீயத்திற்கு மிகப் பிற்பட்டது.\
    \ இதுவும், பாயிரம்வரையில் கிடைக்கிறதல்லாமல் நூல் முழுவதும் கிடைக்கவில்லை. இது, டாக்டர் உ.வே. சாமிநாதையர் நூல் வெளியீட்டின்\
    \ முதல் நூலாக அச்சிடப்பட்டிருக்கிறது. 17. பரிமளகா நாடகம் இந்நாடகம் இயற்றியவர், சோமகேசரி நாடகம் இயற்றிய மாப்பாண முதலியார்\
    \ (1777-1827) என்பவர். இவர், யாழ்ப்பாணத்துத் தென்ம ராட்சியைச் சேர்ந்த மட்டுவாள் என்னும் கிராமத்தில் பிறந்தவர். இவர் இயற்றிய\
    \ பரிமளகா நாடகமும், சோமகேசரி நாடகமும், குறவஞ்சி நாடகமும் மறைந்துபோயின. 18. மதிவாணர் நாடகத்தமிழ் நூல் மதிவாணன் என்னும்\
    \ பாண்டிய அரசன் இயற்றிய தாகலின் இந்நூலுக்கு இப்பெயர் வந்தது. சிலப்பதிகார உரைப்பாயிரத்தில் அடியார்க்கு நல்லார் இந்நூலைப்பற்றி.\
    \ “கடைச்சங்க மிரீஇய பாண்டியருள் கவியரங்கேறிய பாண்டியன் மதிவாணனார் செய்த முதனூல்களிலுள்ள வசைக்கூத்திற்கு மறுதலை யாகிய புகழ்க்கூத்தியன்ற\
    \ மதிவாணர் நாடகத்தமிழ் நூல். என்று எழுதுகிறார். எனவே. இது கடைச்சங்க காலத்தில் இயற்றப் பட்ட நூலாகும். அடியார்க்கு நல்லார்\
    \ தமது உரையிலே இந்நாடகத்தமிழ் நூலி லிருந்து சில சூத்திரங்களை மேற்கோள் காட்டுகிறார். அவை வருமாறு: “அவைதாம் ‘நாடகம் பிரகரணப்\
    \ பிரகரணம் ஆடிய பிரகரணம் அங்கம் என்றே ஒதுப நன்னூல் உணர்ந்திசி னோரே’ என்றார் மதிவாணரும்.” (சிலம்பு., அரங்கேற்று காதை, 13ஆவதுவரி,\
    \ உரை மேற்கோள்) “முன்னிய வெழினிதான் மூன்று வகைப்படும்” என்றார் மதிவாணனார்.” (சிலம்பு., அரங்கேற்றுகாதை, 109ஆம் வரி, உரை\
    \ மேற்கோள்) “பூராடங் கார்த்திகை பூரம் பரணிகலஞ் சீரா திரையவிட்டஞ் சித்திரையோ - டாருமுற மாசி யிடப மரிதுலை வான்கடகம் பேசிய\
    \ தேள்மிதுளம் பேசு’ என்றார் மதிவாணனாரும்.” (சிலம்பு., அரங்கு, 123ஆம் வரி உரை மேற்கோள்) “திருவள ரரங்கிற் சென்றினை தேறிப்\
    \ பரவுந் தேவரைப் பரவுங் காலை மணிதிகழ் நெடுமுடி மாணிபத் திரனை யணிதிகழ் பளிங்கி னொளியினை யென்றுங்"
- source_sentence: மறைந்துபோன தமிழ் நூல்கள் குறித்த தனது ஆராய்ச்சியை ஆசிரியர் எந்த ஆண்டு தொடங்கினார், மேலும் அந்த ஆராய்ச்சியின்
    முக்கிய நோக்கம் என்னவாக இருந்தது?
  sentences:
  - "அவிநய நூலாசிரியர் ஜைன மதத்தைச் சேர்ந்தவர் என்பது. இவர் இயற்றிய அவிநயச் சூத்திரம் ஒன்றால் தெரிகிறது. இந்தச் சூத்திரத்தில்,\
    \ ஒலி அணுவினால் எழுந்து ஒலிகள் பிறக்கின்றன என்னும் ஜைன சமயக் கொள்கையைக் கூறுகிறார். அவிநய நூலுக்கு மிகப் பிற்பட்ட காலத்தவராகிய\
    \ பவணந்தியாரும் தாம் இயற்றிய நன்னூலில், ஒலியணுத்திரளினாலே எழுத்துகள் பிறக்கின்றன என்னும் ஜைன சமயக் கருத்தைக் கூறியுள்ளார்.\
    \ அவிநய நூலாசிரியர், ஒலியணுவினால் எழுத்துகள் பிறக்கின்றன என்று கூறிய சூத்திரத்தை, மயிலைநாதர் என்னும் ஜைன சமய உரையாசிரியர்,\
    \ தாம் எழுதிய நன்னூல் உரையில் (எழுத்தியல், 13ஆம் சூத்திர உரை) மேற்கோள் காட்டுகிறார். “‘ஆற்ற லுடையுயிர் முயற்சியி னணுவியைந்\
    \ தேற்றன வொலியாய்த் தோன்றுதல் பிறப்பே’ என்றார் ஆசிரியர் அவிநயனாரும் எனக் கொள்க” என்பது அவர் காட்டிய மேற்கோள். எனவே, அவிநய\
    \ நூலாசிரியர், நன்னூலாசிரியரைப் போன்று சமண சமயத்தவர் என்பது தெளிவாக விளங்குகிறது. தக்கயாகப் பரணி உரையாசிரியர் (காளிக்குக்\
    \ கூளி கூறியது. 153ஆம் தாழிசை உரை), அவிநய நூல் கருத்தைத் தமது உரையில் குறிப்பிடுகிறார். அவர் கூறுவது இது: “நளினத்தை யுடையது\
    \ நளினி; அவிநயத்தால் உடைப் பெயர்ச்சொல் ஈறு திரிந்தது.” வீரசோழிய உரையாசிரியர் பெருந்தேவனார் இந்நூலைப் பற்றி (சொல்லதிகாரம்,\
    \ திரியாபதப் படல இறுதியில்) இவ்வாறு தமது உரையில் எழுதுகிறார்: “திணைபால் மரபு வினாச்சொல் பிடஞ்சொல் இணையா வழுத்தொகையோ டெச்ச\
    \ - மணையாக் கவினையபார் வேற்றுமையுங் காலமயக் குங்கொண் டவிநயனார் ஆராய்ந்தார் சொல் எனப் பதின்மூன்றால் ஆய்ந்தார் அவிநயனார்.\
    \ இவற்றுள் தொல்காப்பியனார் ஆராய்ந்தன நீக்கி மயக்கமும், சொல்லும், செப்பும், வினாவும், எச்சமும், மரபும் ஏற்றமாகச் சொன்னார்.”\
    \ வீரசோழிய உரையாசிரியர் தமது உரையிலே அவிநய நூலிலிருந்து இரண்டு சூத்திரங்களை மேற்கோள் காட்டுகிறார். அச் சூத்திரங்கள் இவை:\
    \ “தொல்காப்பியனார், ஒடு என்னும் பிரத்தியமொன்றே மூன்றும் வேற்றுமைக்கு உருபாகச் சொன்னார். ‘ஆலும் ஆனும் மூன்றே னுருபே’ என்றார்\
    \ அவிநயனார்.” (சொல்லதிகாரம், வேற்றுமைப் படலம், 6 ஆம் காரிகை உரை) “ஒத்த வடியினு மொவ்வா விகற்பினு மிக்க வரினு மப்பாற் படுமே’\
    \ என்றார் அவிநயனார்.” (யாப்பதிகாரம், 19ஆம் காரிகை உரை) யாப்பருங்கலக் காரிகை யுரையாசிரியராகிய குணசாகரர் தமது உரையிலே, அவிநய\
    \ நூலிலிருந்து கீழ்க்காணும் சூத்திரங்களை மேற்கோள் காட்டுகிறார்: “தத்தம் பாவினத் தொப்பினுங் குறையினும் ஒன்றொன் றொவ்வா வேற்றுமை\
    \ வகையாற் பாத்தம் வண்ண மேலா வாகிற் பண்போல் விகற்பம் பாவினத் தாகும். குறட்பா விரண்டவை நால்வகைத் தொடையான் முதற்பாத் தனிச்சொலி\
    \ னடிமூ விருவகை விகற்பினு நடப்பது நேரிசை வெண்பா என்றார் அவிநயனார்.” (யாப்பருங்கலக்காரிகை, 23ஆம் காரிகை உரை மேற்கோள்) “‘கோழியுங்\
    \ கூவின குக்கில் குரல்காட்டுந் தாழியுள் நீலத் தடங்கணீர் போதுமினோ ஆழிசூழ் வையத் தறிவ னடியேத்திக் கூழை தனையக் குடைதுங் குரைபுனல்\
    \ ஊழியு மன்னுவா மென்றேலோ ரெம்பாவாய்.’ இஃது ஐந்தடியான் வந்ததாயினும், ஒருபுடை யொப்புமை நோக்கிக் கலிவிருத்தத்தின்பாற் படுத்தி\
    \ வழக்கப்படும். இதனைத் தரவு கொச்சகம் எனினும் இழுக்காது. இஃது அவிநயனார் காட்டியது.” (யா. காரிகை. 43ஆம் உரை) “முன்னிலை நெடிலு\
    \ மாவு மாவும் னம்மிகப் புணரு மியங்குதிணை யான.” (யா., காரிகை, - 44ஆம் காரிகையுரை மேற்கோள்) யாப்பருங்கல உரையாசிரியர், தமது\
    \ உரையிலே மேற்கோள் காட்டுகிற அவிநயச் சூத்திரங்கள் வருமாறு: “அஇஉஎ ஒவிவை குறிய மற்றையேழ் நெட்டெ ழுத்தா நேரப் படுமே.\t1 குற்றெழுத்\
    \ துத்தொண் ணூற்றைந் தாகும் நூற்றொடு முப்பத்து மூன்று நெடிலாம்.\t2 இருநூற் றிருபத் தெட்டுவிரிந் தன வுயிரே வன்மை மென்மை\
    \ யிடைமை.\t3 வல்லெழுத் தாறோ டெழுவகை யிடத்தும் உகரம் அரையாம் யகரமோ டியையின் இகரமுங் குறுகு மென்மனார் புலவர்.\t4 அக்கேன\
    \ மாய்தந் தனிநிலை புள்ளி ஒற்றிப் பால வைந்து மிதற்கே.\t5 2அளபெடை தனியிரண் டல்வரி ஐஒள வுளதா மொன்றரை தனியுமை யாகும்.\t6 ஆய்தமும்\
    \ யவ்வு அவ்வொடு வரினே ஐயெ னெழுத்தொடு மெய்பெறத் தோன்றும்.\t7 உவ்வொடு வலவரி னௌவியல் பாகும்.\t8 நெடிய குறிய வுயிர்மெய் யுயிரும்\
    \ வலிய மெலிய விடைமை யளபெடை மூவுயிர்க் குறுக்கமோ டாமசைக் கெழுத்தே.\t9 அளபெழி னல்லதை யாய்தமு மொற்று மலகியல் பெய்தா வென்மனார்\
    \ புலவர்.\t10 உயிரள பெடையுங் குறுகிய உயிரின் இகர வுகரமுந் தளைதபி னொற்றம்.\t11 சீர்தப வரினு மொற்றியற் றாகும்.”\t12 (யாப்பருங்கலம்,\
    \ எழுத்தோத்து உரை மேற்கோள்) “நேரசை யொன்றே நிரையசை யிரண்டல காகு மென்ப வறிந்திசி னோரே”\t18 எனவும். “நேரோ ரலகு நிரையிரண்\
    \ டலகு நேர்புமூன் றலகு நிரைபுதான் கலகென் றோதினார் புலவ ருணரு மாறே.”\t14 எனவும் சொன்னார் அவிநயனார். “கடையு மிடையு மிணையும்ஐ\
    \ யிரட்டியும்”\t15 என்றார் அவிநயனார். (யாப்பருங்கலம், அசையோத்து உரை மேற்கோள்) “ஈரசைச் சீர்நான் கியற்சீர் மூவசை இயற்சீ\
    \ ரெட்டனு ளல்லன விரவினு நேரிறின் வெள்ளை நிறையிறின் வஞ்சி.\t16 ஈரசைச்சீர் பின்முன் னாவைத் துறழ்ந்து மாறியக்கா னாலசைச் சீர்பதி\
    \ னாறாம்.\t17 நேர்நிரை வரினே சீர்நிலை யெய்தலும் பாவொடு பிறவும் ஆகும் ஒரோவழி.\t18 முதலிடை நுனிநாப் பல்லிதழ் மூக்கிவை வன்மை\
    \ முதலாம் மும்மையும் பிறக்கும்.3\t19 உரிமை யியற்சீர் மயங்கியும் பானான் கிருமை வேறியல் வெண்பா வாகியும் வருமெனும் வஞ்சிக்\
    \ கலியினே ரீற்ற வியற்சீ ராகா வென்மனார் புலவர்.\t20 நிரையிறு நாலசை வஞ்சி யுள்ளால் விரவினு தேரீற் றல்லவை யியலா.\t21 நேர்நடு\
    \ வியல வஞ்சி யுரிச்சீ ராசிரி யத்திய லுண்மையு முடைய.”\t22 (யாப்பருங்கலம், சீரோத்து உரை மேற்கோள்) “ஈரசை யியற்சீ ரொன்றுத\
    \ லியல்பே.”\t23"
  - "இந்தக் குறிக்கோளுடன் யாப்பருங்கலக் காரிகை விருத்தி யுரையையும், ஏனைய உரையாசிரியர்கள் எழுதியுள்ள உரைநூல் களையும் படித்தேன்.\
    \ அவ்வுரையாசிரியர்கள் கூறுகிற நூல்களில் எவைஎவை மறைந்துபோயின என்பதை ஆராய்ந்து எழுதத் தொடங்கினேன். மறைந்துபோன நூல்களிலிருந்து\
    \ எஞ்சிநின்ற செய்யுள்களையும் தொகுத்து எழுதினேன். இது நிகழ்ந்தது 1952 ஆம் ஆண்டின் இறுதியில் ஆகும். ஆனால், இந்த ஆராய்ச்சியைத்\
    \ தொடர்ந்து செய்ய முடிய வில்லை. இடையிடையே வேறு சில நூல்களை எழுதி முடிக்க வேண்டியிருந்தபடியாலும், வேறு அலுவல்களாலும் இந்த\
    \ வேலை இடையிடையே தடைப்பட்டது. ஆயினும், சமயம் வாய்க்கும்போ தெல்லாம் இதனையும் ஒருவாறு செய்து முடித்தேன். இதில் சில நூல்கள்\
    \ மட்டும், ‘செந்தமிழ்ச் செல்வி’ என்னும் திங்கள்  வெளியீட்டில் மறைவுண்ட தமிழ் நூல்கள் என்னும் பெயருடன் வெளியிடப்பட்டன.\
    \ அதனைக் கண்ட சில அன்பர்கள், நூல் முழுவதும் வெளிவருவது தமிழ் இலக்கிய ஆராய்ச்சிக்குத் துணைபுரியும் என்று கூறினார்கள். ஆகவே,\
    \ இந்நூல் இப்போது புத்தக வடிவமாக வெளிவருகிறது. மறைந்துபோன நூல்களின் முழுத் தொகுப்பல்ல இந்நூல்; விடுபட்ட நூல்களும் உள்ளன.\
    \ அவற்றைப் பிறகு எழுதித் தொகுக்கும் எண்ணம் உடையேன். இப்போது தொகுத்து முடிந்த வரையில் இந்நூல் முதன்முதலாக வெளி வருகிறது.\
    \ இந்நூலுக்கு ஒரு முகவுரை எழுதியருளுமாறு, சென்னைப் பச்சையப்பன் கல்லூரித் தமிழ்ப் பேராசிரியர் டாக்டர். மு. வரதராசனார் அவர்களைக்\
    \ கேட்டுக்கொண்டேன். அவர்கள் அன்புடன் இசைந்து முகவுரை எழுதியருளினமைக்கு எனது மனமார்ந்த நன்றியைத் தெரிவித்துக்கொள்கிறேன்.\
    \ சென்னை புத்தகப் பதிப்பமாகிய பாரி நிலையத்தின் உரிமை யாளர் திரு. க. அ. செல்லப்பன் அவர்கள், இந்நூலை அச்சிட்டு வெளியிட்டமைக்கு,\
    \ அவர்களுக்கு எனது நன்றி யுரியதாகும். இந்நூலை விரைவாகவும் அழகாகவும் அச்சிட்டுக் கொடுத்த மங்கை அச்சகத்தாருக்கும் எனது நன்றி\
    \ உரியது. மயிலாப்பூர், சென்னை-4 15.1.1959 \t\t\tசீனி. வேங்கடசாமி. இரண்டாம் பதிப்பின் முன்னுரை மறைந்து போன தமிழ் நூல்கள்\
    \ என்னும் இந்நூல் எட்டு ஆண்டுகளுக்கு முன்பு வெளிவந்தது. சில ஆண்டுகளாக இந்நூல் கிடைக்காமையால் இதை மீண்டும் வெளியிட வேண்டும்\
    \ என்று பலர் கேட்டுக்கொண்டதற்கு இணங்க இந்த இரண்டாம் பதிப்பு வெளியிடப்படுகிறது. இந்தப் பதிப்பில் புதிய சில செய்திகளும்\
    \ சேர்க்கப்பட்டுள்ளன. இந்நூலை வெளியிடுவதில் தமது கருத்துரை களை வழங்கி உதவிய பேராசிரியர் மகாவித்துவான் திரு. மே. வீ. வேணுகோபால\
    \ பிள்ளை அவர்களுக்கு எனது நன்றி உரியதாகும். இந்நூலை வெளியிட்ட சாந்தி நூலகத்தாருக்கும், அச்சுப் பிழைகளைத் திருத்தியுதவிய\
    \ திரு. ஊ. ஜயராமன் அவர்களுக்கும் எனது நன்றி. மயிலாப்பூர், சென்னை-4 30.4.1967 \t\t\t\t\t\t\t\t\tசீனி. வேங்கடசாமி. மறைந்துபோன\
    \ தமிழ் நூல்கள் இலக்கிய நூல்கள் 1. அகத்திணை இப்பெயருடைய நூலிலிருந்து களவியற் காரிகை உரையா சிரியரும், நம்பி அகப்பொருள்\
    \ உரையாசிரியரும் சில செய்யுள்களை மேற்கோள் காட்டியுள்ளனர். இது அகப்பொருளைக் கூறும் நூல் என்பது இதன் பெயரினாலே தெரிகிறது.\
    \ இதனை இயற்றிய ஆசிரியர் யார், இயற்றப்பட்ட காலம் எது என்பன தெரியவில்லை. களவியற் காரிகை உரையாசிரியர் கீழ்க்காணும் செய்யுள்களை\
    \ இந்நூலிலிருந்து மேற்கோள் காட்டுகிறார்: நெடுவே றுடக்கியநீர் நீக்குமதி காதல் வடிவே றுடக்கியநீர் மாதோ-நெடுவேய் கணமா மழைக்குவட்டெங்\
    \ கார்வரைப்பூஞ் சாரல் மணநாறு நின்வரைமேல் வந்து.1\t1 கொன்னிலையோர் யாக்கைக்குக் கூடுயிரோ வொன்றென்ப ரென்னுயி ரோரிரண்டா யான்கண்டேன்\
    \ - மின்னுகலைப் பைம்மலைத்த வல்குற்றுப் பாடகக்காற் றொன்றொன்று வெம்முலைத்து வேல்போல் விழித்து.\t2 கொண்டதோர் காதற் குணமுடியாக்\
    \ கொள்கைத்தேற் குண்டுநீர் வேலைக் குவலயத்தோர்-வண்டின் கணங்காட்டுங் கூந்தலாய் ... ... ... ... மணங்காட்டுங் காந்தள் மலர்.2\t\
    3 2. அசதி கோவை அசதி என்னும் ஆயர்மகன்மேல் பாடப்பட்டது அசதி கோவை. இதனைப் பாடியவர் ஒளவையார் என்பவர். இவர், சங்ககாலத்திலிருந்த\
    \ ஒளவையார் அல்லர்; இடைக்காலத்தில் இருந்த ஓர் ஒளவையார் ஆவர். இக்கோவையின் சில செய்யுள்கள்மட்டும் இப்போது வழங்கிவருகின்றன;\
    \ மற்றச் செய்யுள்களெல்லாம் மறைந்துவிட்டன. இப்போது கிடைத்துள்ள அசதி கோவைச் செய்யுள்கள் இவை: அற்றாங் கியகரத் தைவே லசதி யணிவரைமேன்\
    \ முற்றா முகிழ்முலை யெவ்வாறு சென்றனள் முத்தமிணூற் கற்றார் பிரிவுங்கல் லாதவ ரிட்டமுங் கைப்பொருள்க ளற்றா ரிளமையும் போலே\
    \ கொதிக்கு மருஞ்சுரமே.\t1 அருஞ்சஞ் சலங்கொண்ட வைவே லசதி யகல்வரையி னிருஞ்சஞ் சலஞ்சொல்ல வேண்டுங்கொ லோவென தன்னைமொழி தருஞ்சஞ்\
    \ சலமுந் தனிவைத்துப் போனவர் சஞ்சலமும் பெருஞ்சஞ் சலங்கொண்டு யானிருந் தேனொரு பெண்பிறந்தே.\t2 அலைகொண்ட வேற்கரத் தைவே லசதி\
    \ யணிவரைமே னிலைகொண்ட மங்கைதன் கொங்கைக்குத் தோற்றிள நீரினங்கள் குலையுண் டிடியுண்டென் கையினி லெற்றுண்டு குட்டுமுண்டு விலையுண்\
    \ டடியுண்டு கண்ணீர் ததும்பவும் வெட்டுண்டவே.\t3 அழற்கட்டுக் கட்டிய வைவே லசதி யணிவரையின் மழைக்கட்டுக் கட்டிய மாளிகை மேலொரு\
    \ மங்கைநல்லா ளுழக்கிட் டுரியிட்டு முவ்வுழக் கிட்டுரி நாழியிட்டுக் குழற்கட் டவிழ்த்துட னங்களின் றேமயிர் கோதினளே.\t4 அறங்காட்\
    \ டியகரத் தைவே லசதி யகன்சிலப்பி னறங்காட்டுங் கஞ்சத் திருவனை யீர்முக நீண்டகுமிழ்த் திறங்காட்டும் வேலுஞ் சிலையுங்கொல் யானையுத்\
    \ தேருங்கொண்டு புறங்காட்ட வுந்தகு மோசிலைக் காமன்றன் பூசலிலே. \t5 ஆலவட் டப்பிறை யைவே லசதி யணிவரைமே னீலவட் டக்கண்க ணேரொக்கும்\
    \ போதந்த நேரிழையாள் மாலையிட் டுச்சுற்றி வட்டமிட் டோடி வரவழைத்து வேலைவிட் டுக்குத்தி வெட்டுவ ளாகில் விலக்கரிதே.\t6 ஆரா\
    \ யிரங்கொண்ட வைவே லசதி யகன்கிரியி னீராடப் போகு னெறிதனியே யந்தி நேரத்திலே சீரான குங்குமக் கொங்கையைக் காட்டிச் சிரித்ததொருபெண்\
    \ போராள் பிடிபிடி யென்றே நிலாவும் புறப்பட்டதே.\t7 ஆய்ப்பாடி யாயர்தம் ஐவே லசதி யணிவரையில் கோப்பா மிவளெழிற் கொங்கைக்குத்\
    \ தோற்றிளக் கோடிரண்டுஞ் சீப்பாய்ச் சிணுக்கரி யாய்ச்சிமி ழாய்ச்சின்ன மோதிரமாய்க் காப்பாய்ச் சதுரங்க மாய்பல்லக் காகிக் கடைப்பட்டவே.\t\
    8 ஆடுங் கடைமணி யைவே லசதி யணிவரைமே னீடுங் கயற்கண்ணி யாடந்த வாசை நிகழ்த்தரிதாற் கோடுங் குளமுங் குளத்தரு கேநிற்குங் குன்றுகளுங்\
    \ காடுஞ் செடியு மவளாகத் தோன்றுமென் கண்களுக்கே.\t9 3. அண்ணாமலைக் கோவை திருவண்ணாமலையில் எழுந்தருளியுள்ள அண்ணாமலை நாதர் பேரில்\
    \ பாடப்பட்டது. அண்ணாமலைக் கோவை. இதனை இயற்றியவர் கமலை ஞானப்பிரகாசர். இவர் இயற்றிய வேறு சில நூல்கள் இப்போதும் உள்ளன. ஆனால்,\
    \ அண்ணாமலைக் கோவை மறைந்து போயிற்று. இது கி.பி. பதினாறாம் நூற்றாண்டில் இயற்றப்பட்டது. 4. அரையர் கோவை இந்நூலைக் களவியற்\
    \ காரிகை உரையாசிரியர். தமது உரையில் குறிப்பிடுகிறார். இக்கோவையிலிருந்து ஒரு செய்யுளையும் தமது உரையில் மேற்கோள் காட்டுகிறார்.\
    \ அச்செய்யுள் இது: பாக்கத் திரவின்கட் பட்டதொன் றுண்டுபைங் கானலெங்கும் சேக்கைத் துணைத்தலை யோடொன்றுஞ் சேர்ந்தில சேர்ந்துசெங்கை\
    \ தாக்கச் சிவந்த தடந்தோட்"
  - "(தொல்.,பொருள்.,உவமை, 37, பேராசிரியர் உரை) யாப்பருங்கல உரையாசிரியர் கூறுவதாவது: “சீருந் தளையுஞ் சிதைந்து செய்யுள் அழிய\
    \ நிற்பதன்றாயினும், விளி முதலியவற்றுள் அளபெழுந்து செய்யுளிடத்தும் வந்து அவ்வாறே சொல்லப்படும் என்னும் கருத்தினானே அகத்தியனார்\
    \ அறுவகை யானந்த ஓத்தினுள் இதனை, ‘இயற்பெயர் சார்த்தி யெழுத்தள பெழினே யிடியற்பா டில்லா வெழுத் தானந்தம்’ என்றார் என்க.” (யாப்பருங்கலம்,\
    \ எழுத்தோத்து, விருத்தியுரை) பேராசிரியரும் நச்சினார்க்கினியரும் அகத்தியர் செய்யுளில் ஆனந்தக் குற்றம் என்னும் இலக்கணத்தைக்\
    \ கூறவில்லை என்று எழுதுகிறார்கள். யாப்பருங்கல உரையாசிரியர், அகத்தியர் ‘ஆனந்த ஓத்து’ என்னும் இலக்கணம் செய்துள்ளார் என்று\
    \ கூறி, ஒரு சூத்திரத்தையும் மேற்கோள் காட்டுகிறார். இது குழப்பத்தை உண்டாக்குகிறது. இதனால், பிற்காலத்திலே அகத்தியர் பெயரினால்\
    \ சில இலக்கண நூல்கள் இயற்றப்பட்டிருந்தன என்பது தெரிகிறது. அகத்தியர் சூத்திரங்கள் என்று உரையாசிரியர்கள் மேற்கோள் காட்டுகிற\
    \ சூத்திரங்களைக் கீழே தருகிறோம் : “மற்றுச்சொ னோக்கா மரபின அனைத்தும் முற்றி நிற்பது முற்றியன் மொழியே.” (தொல்.,சொல்.,வேற்றுமையியல்,\
    \ 63, தெய்வச் சிலையார் உரை மேற்கோள்) “அராகந் தாமே நான்கா யொரோவொன்று வீதலு முடைய மூவிரண் டடியே.\t1 ஈரடி யாகு மிழிபிற் கெல்லை.\t\
    2\tதரவே யெருத்த மராகங் கொச்சக மடக்கியல் வகையோ டைந்துறுப் புடைத்தே.\t3 கொச்சக வகையினெண்ணொடு விராஅ யடக்கிய லின்றி யடங்கவும்\
    \ பெறுமே.”\t4 (தொல், பொருள், செய்யுளியல், 117, இளம்பூரணர், உரைமேற்கோள்) “இருவயி னொத்து மொவ்வா வியலினுந் தெரியிழை மகளிரொடு\
    \ மைந்தரிடை வரூஉங் கலப்பே யாயினும் புலப்பே யாயினு மைந்திணை மரபி னறிவரத் தோன்றிப் பொலிவொடு புணர்ந்த பொருட்டிற முடையது கலியெனப்\
    \ படூஉங் காட்சித் தாகும் என்று அகத்தியனார் ஓதுதலின் கலிப்பா அகப்பொருளென வழங்கும்.” (தொல்.,பொருள்.,செய்யுளியல், இளம்பூரணர்\
    \ உரை மேற்கோள்) கீழ்க்காணும் அகத்தியச் சூத்திரங்களை மயிலை நாதர் தமது நன்னூல் உரையில் மேற்கோள் காட்டுகிறார் : “பெயரினும்\
    \ வினையினு மொழிமுத லடங்கும்\t1 வயிர வூசியு மயன்வினை யிரும்பும் செயிரறு பொன்னைச் செம்மைசெய் யாணியும் தமக்கமை கருவியுந்\
    \ தாமா மவைபோல் உரைத்திற முணர்த்தலு முரையது தொழிலே.\t2 பலவி னியைந்தவு மொன்றெனப் படுமே அடிசில் பொத்தகஞ் சேனை யமைந்த கதவ\
    \ மாலை கம்பல மனைய.\t3 ஏழியன் முறைய தெதிர் முக வேற்றுமை வேறென விளம்பான் பெயரது விகாரமென் றோதிய புலவனு முளனொரு வகையா னிந்திர\
    \ னெட்டாம் வேற்றுமை யென்றனன்.\t4 வினைநிலை யுரைத்தலும் வினாவிற் கேற்றலும் பெயர்கொள வருதலும் பெயர்ப்பய னிலையே.\t5 ஆலு மானு\
    \ மோடு மொடுவும் சாலு மூன்றாம் வேற்றுமைத் தனுவே செய்வோன் காரணஞ் செயத்தகு கருவி யெய்திய தொழின்முத லியைபுடைத் ததன்பொருள்.\t\
    6 ஆற னுருபே யதுவா தவ்வும் வேறொன் றுரியதைத் தனக்குரி யதையென விருபாற் கிழமையின் மருவுற மருமே ஐம்பா லுரிமையு மதன்றற் கிழமை.\t\
    7 மற்றுச்சொன் னோக்கா மரபின வனைத்து முற்றி நிற்பன முற்றியன் மொழியே.\t8 காலமொடு கருத வரினு மாரை மேலைக் கிளவியொடு வேறுபா\
    \ டின்றே.\t9 முற்றுச் சொற்றாம் வினையொடு முடியினு முற்றுச்சொ லென்று முறைமையிற் றிரியா.\t10 காலமும் வினையுந் தோன்றிப்பா\
    \ றோன்றாது பெயர்கொள் ளும்மது பெயரெச் சம்மே.\t11 காலமும் வினையுந் தோன்றிப்பா றோன்றாது வினைகொள் ளும்மது வினையெச் சம்மே.\t\
    12 எனைத்துமுற் றடுக்கினு மனைத்துமொரு பெயர்மேல் நினைத்துக்கொள நிகழு நிகழ்த்திய முற்றே வினையெஞ்சு கிளவியும் பெயரெஞ்சு கிளவியும்\
    \ பலப்பல வடுக்கினு முற்றுமொழிப் படிய.\t13 உலக வழக்கமு மொருமுக் காலமு நிலைபெற வுணர்தரு முதுமறை நெறியான்.\t14 அசைநிலை யிரண்டினும்\
    \ பொருண்மொழி மூன்றினும் இசைநிறை நான்கினு மொருமொழி தொடரும்.\t15 கண்டுபான் மயங்கு மையக் கிளவி நின்றோர் வருவோ ரென்றுசொன்\
    \ னிகழக் காணா வையமும் பல்லோர் படர்க்கை.”\t16 “களவினுங் கற்பினுங் கலக்க மில்லாத் தலைவனுந் தலைவியும் பிரிந்த காலைக் கையறு\
    \ துயரமொடு காட்சிக் கவாவி எவ்வமொடு புணர்ந்து நனிமிகப் புலம்பப் பாடப் படுவோன் பதியொடு நாட்டொடு முள்ளுறுத் திறினே யுயர்கழி\
    \ யானந்தப் பையு ளென்று பழித்தனர் புலவர். என்று எடுத்தோதினார் அகத்தியனார்.” (யாப்பருங்கலம், ஒழிபியல், விருத்தியுரை) “இயற்பெயர்\
    \ சார்த்தி எழுத்தள பெழினே இயற்பா டில்லா எழுத்தா னந்தம்” என்னும் சூத்திரம் அகத்திய நூலில் ஆனந்த ஓத்தில் உள்ளதாக யாப்பருங்கலம்\
    \ (உறுப்பியல் எழுத்தோத்து) உரையில் மேற்கோள் காட்டப்பட்டுள்ளது. ஆனந்தக் குற்றம் என்பது பற்றிப் பேராசிரியர் என்னும் உரை\
    \ யாசிரியர் தொல்காப்பிய உரையில் இவ்வாறு எழுதுகிறார். “இனி ஆனந்த வுவமை என்பன சில குற்றம் அகத்தியனார் செய்தாரெனக் கூறுபவாகலின்\
    \ அவையிற்றை எவ்வாறு கோடு மெனின், அவைகள் தாம் அகத்துள்ளும் பிற சான்றோர் செய்யுளுள்ளும் வருதலிற் குற்றமாகா; அகத்தியனாராற்\
    \ செய்யப்பட்ட மூன்று தமிழினு மடங்காமை வேறு ஆனந்தவோத்தென்பது ஒன்று செய்தாராயின், அகத்தியமுந் தொல்காப்பியமும் நூலாக வந்த\
    \ சான்றோர் செய்யும் குற்றம் வேறுபடாவென்பது.” (தொல்., உவ., சூ. 37, பேராசிரியர் உரை) இரணிய முட்டத்துப் பெருங்குன்றூர் பெருங்கௌசிகனார்\
    \ பல் குன்றக் கோட்டத்துச் செங்கண் மாத்துவேள் நன்னன் சேய் நன்னன் மீது மலைபடுகடாம் பாடினார். அப்பாடலில் 145ஆம் அடியில்,\
    \ ‘தீயின்ன வொண்செங்காந்தள்’ என்னும் அடியில், பாட்டுடைத் தலைவன் பெயராகிய நன்னன் என்பது தீயொடு அடுத்து வந்தமை யான் ஆனந்தக்\
    \ குற்றம் என்று பிற்காலத்தவர் சிலர் கூறியதை, மேற்படி மலைபடுகடாத்துக்கு உரை எழுதிய நச்சினார்க் கினியர் மறுக்கிறார். நச்சினார்க்கினியர்\
    \ எழுதுவது வருமாறு: “இதற்கு நன்னன் என்னும் பெயர் தீயோடடுத்த தன்மையின், ஆனந்தமாய், பாடினாரும் பாட்டுண்டாரும் இறந்தாரென்று\
    \ ஆளவந்த பிள்ளையாசிரியர் குற்றங் கூறினாராம். எனின், அவர் அறியாது கூறினார்; செய்யுள் செய்த கௌசிகனார் ஆனந்தக் குற்றமென்னுங்\
    \ குற்றமறியாமற் செய்யுள் செய்தாரேல், இவர் நல்லிசைப் புலவராகார்; இவர் செய்த செய்யுளை நல்லிசைப் புலவர் செய்த ஏனைச் செய்யுள்\
    \ களுடன் சங்கத்தார் கோவாமல் நீக்குவார்; அங்ஙனம் நீக்காது கோத்த தற்குக் காரணம் ஆனந்தக் குற்றமென்பதொரு குற்றம் இச் செய்யுட்கு\
    \ உறாமையா னென்றுணர்க.”"
- source_sentence: பல்காப்பியப் புறனடை என்னும் சார்புநூல் இருந்ததென்பதற்கு பேராசிரியர் உரை எவ்வாறு சான்றாகிறது?
  sentences:
  - "அகவ லென்ப தாசிரியப் பாவே.\t15 “ஏழடி யிறுதி யீரடி முதலா வேறிய வெள்ளைக் கியைந்த வடியே மிக்கடி வருவது செய்யுட் குரித்தே\
    \ மூவடிச் சிறுமை பெருமை யாயிரம் ஆகும் ஆசிரி யத்தின் அளவே.\t16 என்றார் சங்கயாப்புடையார்.” (அடியோத்து, 32 உரை மேற்கோள்)\
    \ முந்திய மோனை யெதுகை யளபெடை யந்தமின் முரணே செந்தொடை யியைபே பொழிப்பே ஒரூஉவ யிரட்டை யென்னும் மியற்படு தொடைக ளிவைமுத லாகப்\
    \ பதின்மூ வாயிரத் தறுநூ றன்றியும் தொண்ணூற் றொன்பதென் றெண்ணினர் புலவர். \t17 வல்லொற்றுத் தொடர்ச்சியு மெல்லொற்றுத் தொடர்ச்சியு\
    \ மிடையொற்றுத் தொடர்ச்சியு முறைபிறழ்ந் தியலும். \t18 செப்பல் ஓசை வெண்பா வாகும்.\t19 ஏந்திசைச் செப்பலுந் தூங்கிசைச் செப்பலு\
    \ மொழுகிசைச் செப்பலு முண்ணும் வெண்பா செப்ப லோசை வெண்பா வாகும்.\t20 வெண்சீர் வெண்டளை யான்வரும் யாப்பை யேந்திசைச் செப்ப\
    \ லென்மனார் புலவர்.\t21 இயற்சீர் வெண்டளை யான்வரும் யாப்பைத் தூங்கிசைச் செப்ப லென்மனார் புலவர்.\t22 வெண்சீ ரொன்றலு மியற்சீர்\
    \ விகற்பமும் ஒன்றிய பாட்டே யொழுகிசைச் செப்பல்.\t23 கொச்சகம் வெண்கலி யொத்தா ழிசையென முத்திற மாகுங் கலியின் பகுதி.\t24 16.\
    \ சிறுகாக்கைபாடினியம் சிறுகாக்கைபாடினியம் என்பவர் இயற்றிய இந்நூலுக்குச் சிறு காக்கைபாடினியம் என்னும் பெயர் சூட்டப்பட்டது.\
    \ இது செய்யுளி லக்கண நூல் என்பது தெரிகிறது. இவருக்கு முன்னர் காக்கை பாடினியார் என்பவர் ஒருவர் தமது பெயரால் காக்கை பாடினியம்\
    \ என்னும் இலக்கண நூலைச் செய்திருத்தல் பற்றி. அவரின் இவர் வேறானவர் என்பது குறிப்பதற்காகச் சிறு என்னும் அடைமொழி கொடுத்துச்\
    \ சிறுகாக்கைபாடினியார் என்று வழங்கப் பட்டார். தொல்காப்பியப் பொருளதிகாரம், செய்யுளியல், 1ஆம் சூத்திர உரையில், பேராசிரியர்\
    \ இவரைப் பற்றி எழுதுவதாவது: ‘இணைநூல் முடிபு தன்னூன் மேற்றே’ என்பதனால் காக்கை பாடினியார் ஒதிய தளையிலக்கணம் ஈண்டுங் கோடல்வேண்டு\
    \ மெனின், அஃதே கருத்தாயின் இவர்க்கும் அவர் முடிவே பற்றித் தளை தளையல் வேண்டும்; அல்லதூஉம், அவர்க்கு இளையாரான சிறு காக்கைபாடினியார்\
    \ தளைகொண்டி லரென்பது இதனாற் பெற்றாம். தளை வேண்டினார் பிற்காலத்தோராசிரிய ரென்பது. என்னை? ‘வடக்குந் தெற்குங் குணக்குங் குடக்கும்\
    \ வேங்கடங் குமரி தீம்புனற் பௌவமென் றிந்நான் கெல்லை யகவயிற் கிடந்த நூலதி னுண்மை வாலிதின் விரிப்பின்’ எனக் கூறி வடவேங்கடந்\
    \ தென்குமரியெனப் பனம்பாரனார் கூறியவற்றானே எல்லை கண்டார் காக்கைபாடினியார். ஒழிந்த காக்கை பாடினியத்து. ‘வடதிசை மருங்கின்\
    \ வடுகுவரம் பாகத் தென்றிசை யுள்ளிட் டெஞ்சிய மூன்றும்’ எனத் தென்றிசையுங் கடலெல்லையாகக் கூறப்பட்டதாகலான் அவர் குமரியாறுள்ள\
    \ காலத்தாரல்லாரென்பதுஉம், குறும்பணைநாடு அவர்க்கு நீக்கல் வேண்டுவதன்றென்பதூஉம் பெற்றாம். பெறவே, அவர் இவரோடு ஒருசாலை மாணாக்கர்\
    \ அல்லரென்பது எல்லாரும் உணரல் வேண்டுமென்பது.” மேலும் பேராசிரியர் கூறுகிறார்: “பிற்காலத்துக் காக்கைபாடினியாருந் தொல்காப்பியரோடு\
    \ பொருந்தவே நூல் செய்தாரென்பது. மற்று, ‘வடதிசை மருங்கின் வடுகுவரம் பாகத் தென்றிசை யுள்ளிட் டெஞ்சிய மூன்றும் வரைமருள் புணரியொடு\
    \ கரைபொருது கிடந்த நாட்டியல் வழக்க நான்மையின் கடைக்கண் யாப்பின திலக்கண மறைகுவன் முறையே’ எனத் தெற்குக் குமரியன்றிக் கடலெல்லையாகிய\
    \ காலத்துச் சிறுகாக்கைபாடினியார் செய்த நூலினையும் அதன் வழிநூ லென்னுமோவெனின், ஈண்டுக் கூறிய பொருளெல்லாந் தழுவு மாற்றாற்\
    \ செய்தது, ஆராயின், அது வழிநூலாதற்கு இழுக்கென்னை என்க.” (தொல்., பொருள்., மரபு 95 ஆம் சூத்திர உரை.) இதனால், காக்கைபாடினியார்\
    \ என்னும் பெயருள்ள புலவர் இருவர் தம் பெயரால் காக்கைபாடினியம் என்னும் பெயருள்ள இலக்கண நூல்களைச் செய்தனர் என்பதும், அவர்களில்\
    \ ஒருவர் தொல்காப்பியர் காலத்திலிருந்தவர், மற்றவர் குமரியாறு கடல் கொள்ளப்பட்ட காலத்தில் (பல நூற்றாண்டுகளுக்குப் பின்) இருந்தவர்\
    \ என்பதும் தெரிகின்றன. அமிதசாகரனார் இயற்றிய யாப்பருங்கலம், செய்யுளியல், 3ஆவது சூத்திரமாகிய ‘தாழிசை துறையே விருந்த மென்றிவை\
    \ பாவினம் பாவொடு பாற்பட் டியலும்’ என்பதற்கு உரையெழுதிய விருத்தியுரைகாரர், “பாவே தாழிசை துறையே விருத்தமென நால்வகைப் பாவு\
    \ நானான் காகும்” என்னும் சிறுகாக்கைபாடினியத்துச் சூத்திரத்தை மேற்கோள் காட்டுகிறார். காட்டி, மேலும் எழுதுகிறார்: “விருத்தம்,\
    \ துறை, தாழிசையென்று காக்கைபாடினியார் வைத்த முறைமையின் வையாது தாழிசை துறை விருத்தமென்று தம் (அமிதசாகரர்) மதம்பட வைத்ததன்று;\
    \ சிறு காக்கைபாடினியார் முதலாகிய ஒருசாராசிரியர் வைத்த முறைமைபற்றி வைத்தாரென்க.” இந்நூலைப் பற்றிய வேறு செய்திகள் தெரியவில்லை.\
    \ யாப்பருங்கல விருத்தியுரைகாரர் கீழ்க்காணும் சிறுகாக்கை பாடினியச் சூத்திரங்களைத் தமது விருத்தியுரையில் மேற்கோள் காட்டுகிறார்:\
    \ “குறிய நெடிய வுயிருறுப் புயிர்மெய் வலிய மெலிய இடைமை யளபெடை மூவுயிர்க் குறுக்கமு மாமசைக் கெழுத்தே.\t1 தனிநெடி லாகியுந்\
    \ தனிக்குறி லாகியு மொற்றொடு வந்தும் நேரசை யாகும்.\t2 குறிலிணை யாகியுங் குறிநெடி லாகியு மொற்றொடு வந்தும் நிரையசை யாகும்.\t\
    3 இடையுங் கடையும் இணையும் ஐயெழுத்தே.\t4 ஈரசை யாகிய மூவசைச் சீர்தான் நேரிறின் வெள்ளை நிரையிறின் வஞ்சி.\t5 நடுவுரி நேயலா\
    \ வஞ்சி யுரிச்சீ ருரிமை யுடைய வாசிரியத் துள்ளே.\t6 இயற்சீ ரொன்றா நிலையது வெண்டளை உரிச்சீ ரதனி லொன்றுத லியல்பே.\t7 ஈரசை\
    \ யியற்சீ ரொன்றிய நிலைமை யாசிரி யத்தளை யாகு மென்ப.\t8 வெண்சீ ரிறுதி நிரைவரிற் கலித்தனை வஞ்சி வகைமை வரைவின் றாகும்.\t9\
    \ வஞ்கி யல்லா மூவகைப் பாவும் எஞ்சுத லிலவே நாற்சீ ரடிவகை\t10 முதலெழுத் தொன்றி முடிவது மோனை யேனைய தொன்றி னெதுகைத் தொடையே\
    \ யுறுப்பி னொன்னிற் விகற்பமு மப்பா னெறிப்பட வந்தன நேரப் படுமே.7\t11 சொல்லிசை யளபெழ நிற்பதை யளபெடை.\t12 ஒன்றிய தொடைபொடும்\
    \ விகற்பந் தன்னொடு மொன்றாது கிடப்பது செந்தொடை யாமே.\t13 பல்வகைத் தொடையொரு பாலினிற் றொடுப்பிற் சொல்லிய முதற்றொடை சொல்லினர்\
    \ கொளலே.\t14 பாவே தாழிசை துறையே விருத்தமென நால்வகைப் பாவு நானான் காகும்.\t15 ஒன்றும் பலவும் விகற்பாய்த் தனிச்சொ லின்றி\
    \ வருவன வின்னிசை வெண்பா.\t16"
  - "மயிலைநாதர், தாம் எழுதிய நன்னூல் உரையில் (பொதுவியல், 51ஆம் சூத்திரம்) பரிமாணனார் சூத்திரம் ஒன்றை மேற்கோள் காட்டியுள்ளார்.\
    \ அது: “‘விதந்த மொழியினம் வேறுஞ் செப்பும்’ என்றார் பரிமாணனார்” என்பது. 27. பல்காப்பியம் பல்காப்பியனார் இயற்றிய பல்காப்பியம்\
    \ என்னும் இலக்கண நூல் ஒன்று இருந்ததென்பது பேராசிரியர் உரையினால் தெரிகிறது. பல் காப்பியம், தொல்காப்பியத்தின் வழி நூல்.\
    \ இது செய்யுளிலக்கணத்தை மட்டும் கூறுவது. இந்நூலைப் பற்றி வேறு செய்திகள் தெரியவில்லை. தொல். பொருள்., மரபு., “வழியெனப் படுவது\
    \ அதன் வழித் தாகும்’ என்னும் சூத்திர உரையில் பேராசிரியர் இந்நூலைப் பற்றி எழுதுவது வருமாறு: “மற்றுப் பல்காப்பியம் முதலியனவோ\
    \ வெனின், அவை வழிநூலே; தொல்காப்பியத்தின்வழித் தோன்றினவென்பது. என்னை? ‘கூறிய குன்றினு முதனூல் கூட்டித் தோமின் றுணர்ந்த\
    \ றொல்காப் பியன்ற னாணையிற் றமிழறிந் தோர்க்குக் கடனே.’ என்பவாகலானும், இவ்வாசிரியர் பல்காப்பியர், பல்காயனார் முதலாயி னாரை\
    \ அவ்வாறு கூறாராகலானு மென்பது. என்றார்க்குத் தொல்காப்பி யங் கிடப்பப் பல்காப்பியனார் முதலியோர் நூல் செய்த தெற்றுக் கெனின்:\
    \ அவரும் அவர் செய்த எழுத்துஞ் சொல்லும் பொருளு மெல்லாஞ் செய்திலர். செய்யுளிலக்கணம் அகத்தியத்துட் பரந்து கிடந்த தனை இவ்வாசிரியர்\
    \ (தொல்காப்பியர்) சுருங்கச் செய்தலின் அருமை நோக்கிப் பகுத்துக் கூறினாராகலானும். அவர் தந்திரத்துக் கேற்ப முதனூலோடு பொருந்த\
    \ நூல் செய்தராகாலானும் அமையுமென்பது.” பல்காப்பியர் சூத்திரங்களுள் ஒன்றேனும் கிடைக்கவில்லை. 28. பல்காப்பியப் புறனடை பல்காப்பியனார்\
    \ இயற்றிய பல்காப்பியம் என்னும் நூலுக்குப் பல் காப்பியப் புறனடை என்னும் சார்புநூல் ஒன்று இருந்ததென்பது பேராசிரியர் உரையினால்\
    \ தெரிகிறது. பல்காப்பியப் புறனடையைப் பல்காப்பியனாரே இயற்றியிருக்க வேண்டும் என்று கருதலாம். தொல்., பொருள்., மரபு., “வினையி\
    \ னீங்கி விளங்கியவறிவன், முனைவன் கண்டது முதனூலாகும்” என்னும் சூத்திரத்திற்கு உரை யெழுதிய பேராசிரியர், பல்காப்பியப் புறனடையிலிருந்து\
    \ ஒரு சூத்திரத்தை மேற்கோள் காட்டுகிறார். அது வருமாறு: “‘கூறிய குன்றினு முதனூல் கூட்டித் தோமின் றுணர்த் றொல்காப் பியன்றன்\
    \ ஆணையின் றமிழறிந் தோர்க்குக் கடனே.’ இது பல்காப்பியப் புறனடைச் சூத்திரம்.” இதனால், அவிநயம் என்னும் இலக்கண நூலுக்கு நாலடி\
    \ நாற்பது என்னும் அவிநயப் புறனடை நூல் இருந்ததுபோலவும் யாப்பருங்கலம் என்னும் இலக்கண நூலுக்கு யாப்பருங்கலக் காரிகை என்னும்\
    \ புறனடை நூல் ஒன்று இருப்பது போலவும், பல்காப்பியம் என்னும் இலக்கண நூலுக்கு பல்காப்பியப் புறனடை என்னும் ஒரு புறனடை நூல்\
    \ இருந்தது என்பது தெரிகிறது. இந்நூலைப் பற்றி வேறு செய்திகள் கிடைக்கவில்லை. 29. பல்காயம் பல்காயனார் இயற்றிய பல்காயம் என்னும்\
    \ நூல், யாப்பிலக்கணத்தை உணர்த்துவது. தொல்காப்பியர் விரித்துரைத்தவற்றைப் பல்காயனார் பகுத்துரைத்தார் என்று கீழ்காணும் வெண்பா\
    \ கூறுகிறது: “தொல்காப் பியப்புலவோர் தோன்ற விரித்துரைத்தார் பலகாய னார்பகுத்துப் பன்னினார் - நல்யாப்புக் கற்றார் மதிக்குங்\
    \ கலைக்காக்கை பாடினியார் சொற்றார்தந் நூலுட் டொகுத்து.” இந்த வெண்பா, யாப்பருங்கல விருத்தியுரைகாரர் (எழுத்தோத்து, 1ஆம் சூத்திர\
    \ உரையில்) மேற்கோள் காட்டியது. மேலும், யாப்பருங்கல விருத்தி யுரைகாரர், (சீரோத்து, 1ஆம் சூத்திர உரையில்) இவ்வாறு கூறுகிறார்:\
    \ “நேர், நிரை, நேர்பு, நிரைபு என்னும் நாலசையும் நாலசைப் பொதுச்சீரும் வேண்டினார் பல்காயனார் முதலிய ஒருசாராசிரியர்.” யாப்பருங்கலக்காரிகைக்கு\
    \ உரை எழுதிய குணசாகரர், தமது உரையில் பல்காயனார் சூத்திரங்களை மேற்கோள் காட்டியுள்ளார். அவை வருமாறு: “முதbத் தொன்றின் மோனை\
    \ யெதுகை முதலெழுத் தளவோ டொத்தது முதலா அதுவொழித் தொன்றி னாகு மென்ப.\t1 இயற்சீர் நேரிற றன்றளை யுடைய கலிக்கியல் பிலவே காணுங்\
    \ காலை வஞ்சி யுள்ளும் வாரா வாயினும் ஒரோவிடத் தாகு மென்மனார் புலவர்.\t2 வஞ்சி விரவ லாசிரிய முரித்தே வெண்பா விரவினுங் கடிவரை\
    \ யிலவே.\t3 அடிமுதற் பொருளைத் தானினிது கொண்டு முடிய நிற்பது கூனென மொழிப.\t4 வஞ்சி யிறுதியு மாகு மதுவே அசைகூ னாகு மென்மனார்\
    \ புலவர்.”\t5 யாப்பருங்கல விருத்தியுரைகாரர், தமது உரையில் கீழ்க்காணும் சூத்திரங்களைப் பல்காயனார் நூலிலிருந்து மேற்கோள்\
    \ காட்டுகிறார். இமிழ்கடல் வரைப்பி னெல்லையில் வழாஅத் தமிழியல் வரைப்பிற் றாமினிது விளங்கி யாப்பிய றானே யாப்புற விரிப்பின்\
    \ எழுத்தசை சீர்தளை யடிதொடை தூக்கொ டிழுக்கா மரபின் இவற்றொடு பிறவு மொழுக்கல் வேண்டு முணர்ந்திசி னோரே.\t1 தூக்கும் பாட்டும்\
    \ பாவு மொன்றென நோக்கிற் றென்ப நுணங்கி யோரே.\t2 உயிரீ ராறே மெய்ம்மூ வாறே அம்மூ வாறு முயிரோ டுயிர்ப்ப இருநூற் றொருபத் தாறுயிர்\
    \ மெய்யே.\t3 குறிலொரு மாத்திரை நெடிலிரு மாத்திரை யளபெடை மூன்றென் றறையல் வேண்டும்.\t4 எழுவகை யிடத்துங் குற்றிய லுகரம் வழுவின்றி\
    \ வரூஉம் வல்லா றூர்ந்தே.\t5 யகரம் முதல்வரின் உகரம் ஒழிய இகரமுங் குறுகும் என்மனார் புலவர்.\t6 தற்சுட் டேவல் குறிப்பிவை\
    \ யல்வழி முற்றத் தனிக்குறின் முதலசை யாகா.\t7 நெடில்குறி றனியாய் நின்றுமொற் றடுத்துங் குறிலிணை குறினெடி றனித்துமொற் றடுத்து\
    \ நடைபெறு மசைநேர் நிரைநா லிரண்டே.\t8 அசையே யிரண்டு மூன்றுந் தம்முள் இசையே வருவன சீரெனப் படுமே.\t9 ஈரிரண் டாகியு மொரோவிடத்\
    \ தியலும்.\t10 நாலசை யானு நடைபெறு மோரசைச் சீர்நிலை யெய்தலுஞ் சிலவிடத் துளவே.\t11 நாலசைச் சீரு மொரோவிடத் தியலும் பாவொடு\
    \ பாவினம் பயிற லின்றி.\t12 ஓசையி னொன்றி வரினும் வெண்சீரு மாசிரிய வடியுட் குறுகு மென்ப.\t13 அகவலுட் டன்சீர் வெண்சீ ரொருங்கு\
    \ புகலிற் கலியுடன் பொருந்து மென்ப.\t14 வஞ்சியு ளாயி னெஞ்சுத லிலவே.\t15 இயற்சீ ரிறுதிநே ரிற்ற காலை வஞ்சி யுள்ளும் வந்த\
    \ நாகா; வாயினு மொரோவிடத் தாகு மென்ப.\t16 ஆசிரி யத்தொடு வெள்ளையுங் கலியும் நேரடி தன்னா னிலைபெற நிற்கும்.\t17 வஞ்சி விரவல்\
    \ ஆசிரிய உரித்தே வெண்பா விரவினுங் கடிவரை வின்றே.\t18 ஆயிர மிறுதி மூவடி யிழிபா வாசிரியப் பாட்டி னடித்தொகை யறிப வீரடி முதலா\
    \ வேழடி காறும் திரிபில வெள்ளைக் கடித்தொகை தானே.\t19 முதலெழுத் தளவொத் தயலெழுத் தொன்றுவ தெதுகை யதன்வழி யியையும் பெறுமே.\t\
    20 முதலெழுத் தொன்றுவ மோனை யெதுகை"
  - "மயிலைநாதர், தாம் எழுதிய நன்னூல் உரையில் (பொதுவியல், 51ஆம் சூத்திரம்) பரிமாணனார் சூத்திரம் ஒன்றை மேற்கோள் காட்டியுள்ளார்.\
    \ அது: “‘விதந்த மொழியினம் வேறுஞ் செப்பும்’ என்றார் பரிமாணனார்” என்பது. 27. பல்காப்பியம் பல்காப்பியனார் இயற்றிய பல்காப்பியம்\
    \ என்னும் இலக்கண நூல் ஒன்று இருந்ததென்பது பேராசிரியர் உரையினால் தெரிகிறது. பல் காப்பியம், தொல்காப்பியத்தின் வழி நூல்.\
    \ இது செய்யுளிலக்கணத்தை மட்டும் கூறுவது. இந்நூலைப் பற்றி வேறு செய்திகள் தெரியவில்லை. தொல். பொருள்., மரபு., “வழியெனப் படுவது\
    \ அதன் வழித் தாகும்’ என்னும் சூத்திர உரையில் பேராசிரியர் இந்நூலைப் பற்றி எழுதுவது வருமாறு: “மற்றுப் பல்காப்பியம் முதலியனவோ\
    \ வெனின், அவை வழிநூலே; தொல்காப்பியத்தின்வழித் தோன்றினவென்பது. என்னை? ‘கூறிய குன்றினு முதனூல் கூட்டித் தோமின் றுணர்ந்த\
    \ றொல்காப் பியன்ற னாணையிற் றமிழறிந் தோர்க்குக் கடனே.’ என்பவாகலானும், இவ்வாசிரியர் பல்காப்பியர், பல்காயனார் முதலாயி னாரை\
    \ அவ்வாறு கூறாராகலானு மென்பது. என்றார்க்குத் தொல்காப்பி யங் கிடப்பப் பல்காப்பியனார் முதலியோர் நூல் செய்த தெற்றுக் கெனின்:\
    \ அவரும் அவர் செய்த எழுத்துஞ் சொல்லும் பொருளு மெல்லாஞ் செய்திலர். செய்யுளிலக்கணம் அகத்தியத்துட் பரந்து கிடந்த தனை இவ்வாசிரியர்\
    \ (தொல்காப்பியர்) சுருங்கச் செய்தலின் அருமை நோக்கிப் பகுத்துக் கூறினாராகலானும். அவர் தந்திரத்துக் கேற்ப முதனூலோடு பொருந்த\
    \ நூல் செய்தராகாலானும் அமையுமென்பது.” பல்காப்பியர் சூத்திரங்களுள் ஒன்றேனும் கிடைக்கவில்லை. 28. பல்காப்பியப் புறனடை பல்காப்பியனார்\
    \ இயற்றிய பல்காப்பியம் என்னும் நூலுக்குப் பல் காப்பியப் புறனடை என்னும் சார்புநூல் ஒன்று இருந்ததென்பது பேராசிரியர் உரையினால்\
    \ தெரிகிறது. பல்காப்பியப் புறனடையைப் பல்காப்பியனாரே இயற்றியிருக்க வேண்டும் என்று கருதலாம். தொல்., பொருள்., மரபு., “வினையி\
    \ னீங்கி விளங்கியவறிவன், முனைவன் கண்டது முதனூலாகும்” என்னும் சூத்திரத்திற்கு உரை யெழுதிய பேராசிரியர், பல்காப்பியப் புறனடையிலிருந்து\
    \ ஒரு சூத்திரத்தை மேற்கோள் காட்டுகிறார். அது வருமாறு: “‘கூறிய குன்றினு முதனூல் கூட்டித் தோமின் றுணர்த் றொல்காப் பியன்றன்\
    \ ஆணையின் றமிழறிந் தோர்க்குக் கடனே.’ இது பல்காப்பியப் புறனடைச் சூத்திரம்.” இதனால், அவிநயம் என்னும் இலக்கண நூலுக்கு நாலடி\
    \ நாற்பது என்னும் அவிநயப் புறனடை நூல் இருந்ததுபோலவும் யாப்பருங்கலம் என்னும் இலக்கண நூலுக்கு யாப்பருங்கலக் காரிகை என்னும்\
    \ புறனடை நூல் ஒன்று இருப்பது போலவும், பல்காப்பியம் என்னும் இலக்கண நூலுக்கு பல்காப்பியப் புறனடை என்னும் ஒரு புறனடை நூல்\
    \ இருந்தது என்பது தெரிகிறது. இந்நூலைப் பற்றி வேறு செய்திகள் கிடைக்கவில்லை. 29. பல்காயம் பல்காயனார் இயற்றிய பல்காயம் என்னும்\
    \ நூல், யாப்பிலக்கணத்தை உணர்த்துவது. தொல்காப்பியர் விரித்துரைத்தவற்றைப் பல்காயனார் பகுத்துரைத்தார் என்று கீழ்காணும் வெண்பா\
    \ கூறுகிறது: “தொல்காப் பியப்புலவோர் தோன்ற விரித்துரைத்தார் பலகாய னார்பகுத்துப் பன்னினார் - நல்யாப்புக் கற்றார் மதிக்குங்\
    \ கலைக்காக்கை பாடினியார் சொற்றார்தந் நூலுட் டொகுத்து.” இந்த வெண்பா, யாப்பருங்கல விருத்தியுரைகாரர் (எழுத்தோத்து, 1ஆம் சூத்திர\
    \ உரையில்) மேற்கோள் காட்டியது. மேலும், யாப்பருங்கல விருத்தி யுரைகாரர், (சீரோத்து, 1ஆம் சூத்திர உரையில்) இவ்வாறு கூறுகிறார்:\
    \ “நேர், நிரை, நேர்பு, நிரைபு என்னும் நாலசையும் நாலசைப் பொதுச்சீரும் வேண்டினார் பல்காயனார் முதலிய ஒருசாராசிரியர்.” யாப்பருங்கலக்காரிகைக்கு\
    \ உரை எழுதிய குணசாகரர், தமது உரையில் பல்காயனார் சூத்திரங்களை மேற்கோள் காட்டியுள்ளார். அவை வருமாறு: “முதbத் தொன்றின் மோனை\
    \ யெதுகை முதலெழுத் தளவோ டொத்தது முதலா அதுவொழித் தொன்றி னாகு மென்ப.\t1 இயற்சீர் நேரிற றன்றளை யுடைய கலிக்கியல் பிலவே காணுங்\
    \ காலை வஞ்சி யுள்ளும் வாரா வாயினும் ஒரோவிடத் தாகு மென்மனார் புலவர்.\t2 வஞ்சி விரவ லாசிரிய முரித்தே வெண்பா விரவினுங் கடிவரை\
    \ யிலவே.\t3 அடிமுதற் பொருளைத் தானினிது கொண்டு முடிய நிற்பது கூனென மொழிப.\t4 வஞ்சி யிறுதியு மாகு மதுவே அசைகூ னாகு மென்மனார்\
    \ புலவர்.”\t5 யாப்பருங்கல விருத்தியுரைகாரர், தமது உரையில் கீழ்க்காணும் சூத்திரங்களைப் பல்காயனார் நூலிலிருந்து மேற்கோள்\
    \ காட்டுகிறார். இமிழ்கடல் வரைப்பி னெல்லையில் வழாஅத் தமிழியல் வரைப்பிற் றாமினிது விளங்கி யாப்பிய றானே யாப்புற விரிப்பின்\
    \ எழுத்தசை சீர்தளை யடிதொடை தூக்கொ டிழுக்கா மரபின் இவற்றொடு பிறவு மொழுக்கல் வேண்டு முணர்ந்திசி னோரே.\t1 தூக்கும் பாட்டும்\
    \ பாவு மொன்றென நோக்கிற் றென்ப நுணங்கி யோரே.\t2 உயிரீ ராறே மெய்ம்மூ வாறே அம்மூ வாறு முயிரோ டுயிர்ப்ப இருநூற் றொருபத் தாறுயிர்\
    \ மெய்யே.\t3 குறிலொரு மாத்திரை நெடிலிரு மாத்திரை யளபெடை மூன்றென் றறையல் வேண்டும்.\t4 எழுவகை யிடத்துங் குற்றிய லுகரம் வழுவின்றி\
    \ வரூஉம் வல்லா றூர்ந்தே.\t5 யகரம் முதல்வரின் உகரம் ஒழிய இகரமுங் குறுகும் என்மனார் புலவர்.\t6 தற்சுட் டேவல் குறிப்பிவை\
    \ யல்வழி முற்றத் தனிக்குறின் முதலசை யாகா.\t7 நெடில்குறி றனியாய் நின்றுமொற் றடுத்துங் குறிலிணை குறினெடி றனித்துமொற் றடுத்து\
    \ நடைபெறு மசைநேர் நிரைநா லிரண்டே.\t8 அசையே யிரண்டு மூன்றுந் தம்முள் இசையே வருவன சீரெனப் படுமே.\t9 ஈரிரண் டாகியு மொரோவிடத்\
    \ தியலும்.\t10 நாலசை யானு நடைபெறு மோரசைச் சீர்நிலை யெய்தலுஞ் சிலவிடத் துளவே.\t11 நாலசைச் சீரு மொரோவிடத் தியலும் பாவொடு\
    \ பாவினம் பயிற லின்றி.\t12 ஓசையி னொன்றி வரினும் வெண்சீரு மாசிரிய வடியுட் குறுகு மென்ப.\t13 அகவலுட் டன்சீர் வெண்சீ ரொருங்கு\
    \ புகலிற் கலியுடன் பொருந்து மென்ப.\t14 வஞ்சியு ளாயி னெஞ்சுத லிலவே.\t15 இயற்சீ ரிறுதிநே ரிற்ற காலை வஞ்சி யுள்ளும் வந்த\
    \ நாகா; வாயினு மொரோவிடத் தாகு மென்ப.\t16 ஆசிரி யத்தொடு வெள்ளையுங் கலியும் நேரடி தன்னா னிலைபெற நிற்கும்.\t17 வஞ்சி விரவல்\
    \ ஆசிரிய உரித்தே வெண்பா விரவினுங் கடிவரை வின்றே.\t18 ஆயிர மிறுதி மூவடி யிழிபா வாசிரியப் பாட்டி னடித்தொகை யறிப வீரடி முதலா\
    \ வேழடி காறும் திரிபில வெள்ளைக் கடித்தொகை தானே.\t19 முதலெழுத் தளவொத் தயலெழுத் தொன்றுவ தெதுகை யதன்வழி யியையும் பெறுமே.\t\
    20 முதலெழுத் தொன்றுவ மோனை யெதுகை"
- source_sentence: தமிழ் மொழிக்கு 'பொற்காலம்' என்று விவரிக்கப்படும் வரலாற்று காலகட்டம் எது, மேலும் அந்தக் காலகட்டத்தில் நடந்த
    முதல் இந்தி எதிர்ப்புப் போரில் மயிலை சீனி. வேங்கடசாமி அவர்களின் பங்கு என்ன?
