    \ கொடும்பூண் விளங்கிழை யோயே\t15 என்பது புணர்தல் என்னும் உரிப்பொருள் வந்த சிற்றெட்டகத்து நெய்தற் பாட்டு.” இச்செய்யுளை இளம்பூராண\
