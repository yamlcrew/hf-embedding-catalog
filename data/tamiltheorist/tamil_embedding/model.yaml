    \ தண்டியலங்காரம், பொதுவணியியல் 7ஆம் சூத்திர உரையில், அதன் உரையாசிரியர், ‘கோவை என்பன தமிழ் முத்தரையர் கோவை முதலாயின’ என்று\
    \ கூறுகிறார். யாப்பருங்கலம் ஒழிபியலில், அதன் விருத்தியுரைகாரர் இந்நூலைக் குறிப்பிடுகிறார். அவர் கூறுவது இது: “குமாரசேனாசிரியர்\
    \ கோவையும், தமிழ் முத்தரையர் கோவை யும், யாப்பருங்கலக் காரிகையும்போன்ற சந்தத்தால் வருவனவற்றின் முதற்கண் நிரையசை வரின்,\
    \ ஓரடி பதினேழெழுத்தாம். முதற்கண் நேரசை வரின் ஓரடி பதினாறெழுத்தாம். இவ்வாறன்றி மிக்கும் குறைந்தும் வாரா, அவை எண்ணுகின்றுழி\
    \ ஆய்தமும் ஒற்றும் ஒழித்து, உயிரும் உயிர் மெய்யும் குற்றியலிகரமும் குற்றியலுகரமுங் கொண்டு எண்ணப்படும்.” இவ்வாறு எழுதிய\
    \ உரையாசிரியர் கீழ்க்காணும் செய்யுளை உதாரணங் காட்டுகிறார்: “காய்ந்துவிண் டார்நையக் காமரு கூடலிற் கண்சிவந்த வேந்துகண் டாயென்ன\
    \ வெள்வளை சோரக் கலைநெகிழப் போந்துகண் டாரொடும் போந்துகண் டேற்கவன் பொன்முடிமேற் போந்துகண் டாளென்று போந்ததென் மாட்டோர் புறனுரையே.”\
    \ இதே செய்யுளை யாப்பருங்கலம், தொடையோத்து 53ஆம் சூத்திர உரையிலும் மேற்கோள் காட்டுகிறார். இச்செய்யுள் இன்ன நூலைச் சேர்ந்தது\
    \ என்பதை இவர் குறிப்பிட வில்லையாயினும், இது தமிழ் முத்தரையர் கோவையைச் சேர்ந்த செய்யுள் என்று கருதப்படுகிறது. தமிழ் முத்தரையர்\
    \ கோவை இப்போது கிடைக்கவில்லை யாகையினால், இது மறைந்துபோன தமிழ் நூல்களிலே ஒன்றாகும். இதைப்பற்றி வேறு செய்திகள் தெரியவில்லை.\
    \ 20. திருவதிகைக் கலம்பகம் இந்தக் கலம்பகம், திருவதிகை வீரட்டானேசுவரர் பேரில் பாடப் பட்டது. திருவதிகை, தென்ஆர்க்காடுமாவட்டம்,\
    \ கூடலுர்த் தாலுகாவில் உள்ளது. திருவதிகைக் கோவிலில் உள்ள கல்வெட்டுச் சாசனம் ஒன்று இந்நூலையும் இந்நூலாசிரியரையும் கூறுகிறது.\
    \ இந்தச் சாசனம் சக ஆண்டு 1458, துன்முகி, ஆடி 10ஆம் நாள் எழுதப்பட்டது. அதாவது, கி.பி. 1536இல் இது எழுதப்பட்டது. உத்தர மேரூரில்\
    \ மகிபால குலசேரி என்னும் தெருவில் வாழ்ந்துவந்த உத்தண்டவேலாயுத பாரதி என்பவர் இந்நூலை இயற்றினார் என்று இச்சாசனம் கூறுகிறது.\
    \ தொண்டை மண்டலத்துக் காலியூர்க் கோட்டத்து ராஜேந்திரசோழ சதுர்வேதி மங்கலம் என்னும் உத்தரமேரூர் என்று இந்தச் சாசனம் இவர்\
    \ ஊரைக் கூறுகிறது. மேலும், கௌண்டன்ய கோத்திரத்து ஆபஸ்தம்ப சூத்திரத்து வீரவல்லி தேவராச பட்டர் காசிநாத குப்பையன் என்னும்\
    \ உத்தண்ட வேலாயுத பாரதி என்றும் இவர் பெயரைக் கூறுகிறது. இந்தக் கலம்பகம் பாடியதற்காக 2 மா நன்செய் நிலமும், 1மா புன் செய்\
    \ நிலமும், திருவதிகை நகரத்துக் கோட்டைக்குள் இருந்த அக்கிர காரத்தில் ஒரு வீடும் இந்தப் புலவருக்குத்தானம் செய்யப்பட்டன.\
    \  (376 of 1921., Annual Report of Epigraphy, Madras, 1922, page 99.) 21. திருமறைக் காட்டந்தாதி இந்த அந்தாதியைப் பாடியவர்,\
    \ கி.பி. 9ஆம் நூற்றாண்டில் இருந்தவரும், சுந்தரமூர்த்தி நாயனாரின் நண்பருமான சேரமான் பெருமாள் நாயனார். இவருக்குக் கழறிற்றறிவார்\
    \ என்னும் பெயரும் உண்டு. சேரமான் பெருமாளும் சுந்தரமூர்த்தி நாயனாரும் திருமறைக் காட்டுக்குச் சென்றார்கள். சுந்தரர் பதிகம்\
    \ பாடினார். சேரமான் பெருமாள் நாயனார், திருமறைக்காட்டந்தாதியைப் பாடி அங்கு அரங்கேற்றினார். இச்செய்தியைத் திருத்தொண்டர்\
    \ புராணம் என்னும் பெரியபுராணம் கூறுகிறது: நிறைந்த மறைகள் அருச்சித்த நீடு மறைக்காட் டருமணியை இறைஞ்சி வீழ்ந்து பணிந்தெழுந்து\
    \ போற்றி யாழைப் பழித்தென்னும் அறைந்த பதிகத் தமிழ்மாலை நம்பி சாத்த அருட்சேரர் சிறந்த அந்தா தியிற்சிறப்பித் தனவே யோதித்\
    \ திளைத்தெழுந்தார்."
