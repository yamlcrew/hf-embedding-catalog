    \ பற்றிய வரலாற்று நூலில் ஆவணப்பணி, வரலாறு எழுது பணி, கலை வரலாறு, கருத்து நிலை ஆகிய பொருள்களில் இவர்தம் நுண்மாண் நுழைபுல\
