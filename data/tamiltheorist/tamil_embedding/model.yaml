    \ சூத்திரம்) கீழ்க்காணும் சிற்றெட்டகச் செய்யுள்கள் மேற்கோள் காட்டப்பட்டுள்ளன: “உரைத்திசிற் றோழியது புரைத்தோ வன்றே துருக்கங்\
    \ கமழு மென்றோள் துறப்ப வென்றி யிரீஇயரென் னுயிரே4\t13 என்னுஞ் சிற்றெட்டகத்துக் குறிஞ்சிப்பாட்டினுள் ஊடல் என்னும் உரிப்பொருள்\
    \ கண்டுகொள்க.” தொல். பொருள். அகத்திணையியல் 24ஆம் சூத்திர உரையில் இளம்பூரண அடிகள் மேற்கோள் காட்டியுள்ளார். “நாளு நாளு மாள்வினை\
    \ யழுங்க வில்லிலிருந்து மகிழ்வோற் கில்லையாற் புகழென வொண்பொருட் ககல்வர்நங் காதலர் கண்பனி துடையினித் தோழி நீயே5\t14. என்பது\
