  - "வெம்முரட் செல்வன் கதிரு மூழ்த்தனன் சேந்தனை சென்மோ பூந்தார் மார்ப இளையள் மெல்லியள் மடந்தை யரிய சேய பெருங்கல் லாறே.\t7\
    \ இந்தச் செய்யுள்களை நச்சினார்க்கினியரும் (தொல். பொருள். 40ஆம் சூ.) இளம்பூரணரும் (தொல். பொருள். அகத்திணை, 43ஆம் சூ.),\
    \ இறையனாரகப்பொருளுரையாசியரும் (23ஆம் சூ.) மேற்கோள் காட்டியுள்ளார்கள். கீழ்க்காணும் செய்யுள்களும் சிற்றெட்டகச் செய்யுள்களென்று\
    \ கருதப்படுகின்றன: உள்ளார் கொல்லோ தோழி சிள்ளெனப் பருந்துவீழ்ந் தெடுத்த பைந்தலை யரவங் காதறு கவண தேய்க்குந் தீதுறு கள்ளியங்\
    \ காடிறந் தோரே.\t8 உள்ளார் கொல்லோ தோழி முள்ளுடை யலங்குகுலை யீந்தின் சிலம்பிபொதி செங்காய் துகில்பொதி பவள மேய்க்கு மகில்படு\
    \ கள்ளியங் காடிறந் தோரே.\t9 இச்செய்யுள்களை நச்சினார்க்கினியரும் (தொல். சொல். 288ஆம் சூ.), யாப்பருங்கல விருத்தியுரைகாரரும்\
    \ (19ஆம் சூ.), யா. காரிகை உரையாசிரியரும் (11ஆம் சூ.) மேற்கோள் காட்டியுள்ளனர். உள்ளார் கொல்லோ தோழி முள்ளுடை யிலவ மேறிய\
    \ கலவ மஞ்ஞை யெரிபுகு மகளி ரேய்க்கு மரில்படு கள்ளியங் காடிறந் தோரே.\t10 உள்ளார் கொல்லோ தோழி வெள்ளைப் புழுங்க னெல்லின் பொரிவீழ்த்\
    \ தென்ன நுண்குழிப் புற்றின் மண்கா லீயல் கோல்பிடி குருட ரேய்க்கு மாலுறு கள்ளியங் காடிறந் தோரே.\t11 அடும்பம னெடுங்கொடி யுள்புதைந்\
    \ தொளிப்ப வெண்மணல் விரிக்குந் தண்ணந் துறைவன் கொடிய னாயிறு மாக வவனே தோழியென் னுயிர்கா வலனே.\t12 இச்செய்யுள்களை நச்சினார்க்கினியர்\
