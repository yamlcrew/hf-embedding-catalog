    வடிவம் கொண்டு எதிர்ப்பட்ட காட்சியைக் கூறுகிறது இச்செய்யுள். “அலைவட்டங் கிடந்த வல்குற் கதிபதி யாகும் பெற்றி கலைவட்டங் கிடந்த
