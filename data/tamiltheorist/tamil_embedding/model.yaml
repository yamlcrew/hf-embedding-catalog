    \ ஓர் எல்லைக் கல். இக்காலச் சூழலில்தான் தமிழையும், தமிழினத்தையும் உயிராக வும் மூச்சாகவும் கொண்ட அருந்தமிழ் அறிஞர்களும்,\
    \ தலைவர்களும் தோன்றி மொழிக்கும், இனத்திற்கும் பெரும் பங்காற்றினர். இப் பொற்காலத்தில்தான் அறிஞர் மயிலை சீனி. வேங்கடசாமி\
    \ அவர்கள் 6.12.1900இல் தோன்றி 8.5.1980இல் மறைந்தார்.  வாழ்ந்த காலம் 80 ஆண்டுகள்.  திருமணம் செய்யாமல் துறவு வாழ்க்கை மேற்கொண்டு\
    \ தமிழ் முனிவராக வாழ்ந்து அரை நூற்றாண்டுக்கு மேல் அரிய தமிழ்ப் பணி செய்து மறைந்தவர்.  தமிழ்கூறும் நல்லுலகம் வணங்கத்தக்கவர்.\
    \ இவர் எழுதிய நூல்கள் அனைத்தும் தமிழினம் தன்னை உணர்வதற்கும், தலைநிமிர்வதற்கும், ஆய்வாளர்கள் ஆய்வுப் பணியில் மேலாய்வை மேற்கொள்வதற்கும்\
    \ வழிகாட்டுவனவாகும்.  ஆய்வுநோக்கில் விரிந்த பார்வையுடன் தமிழுக்கு அழியாத அறிவுச் செல்வங்களை வைப்பாக வைத்துச் சென்றவர்.\
    \  தமிழ் - தமிழரின் அடையாளங்களை மீட்டெடுத்துத்தந்த தொல்தமிழ் அறிஞர்களின் வரிசையில் குறிப்பிடத்தக்கவர்.  தமிழ்மண்ணில் 1937-1938இல்\
    \ நடந்த முதல் இந்தி எதிர்ப்புப் போரை முன்னெடுத்துச்சென்ற தலைவர்கள், அறிஞர்கள் வரிசையில் இவரும் ஒருவர். வரலாறு, இலக்கியம்,\
    \ கலை, சமயம் தொடர்பான ஆய்வு நூல்களையும், பொதுநலன் தொடர்பான நூல்களையும், பன்முகப் பார்வையுடன் எழுதியவர். பேராசிரியர் முனைவர்\
