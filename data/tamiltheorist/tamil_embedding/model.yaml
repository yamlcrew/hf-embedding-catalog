      \ 9030. பதிப்புரை 19ஆம் நூற்றாண்டின் இறுதிப் பகுதியும், 20ஆம் நூற்றாண்டின் தொடக்கப் பகுதியும் தமிழுக்கும், தமிழினத்திற்கும்\
      \ புகழ்பூத்த பொற் காலமாகும்.  தமிழ்மொழியின் மீட்டுருவாக்கத்திற்கும், தமிழின மீட்சிக்கும் வித்தூன்றிய காலம்.  தமிழ்மறுமலர்ச்சி\
      \ வரலாற்றில் ஓர் எல்லைக் கல். இக்காலச் சூழலில்தான் தமிழையும், தமிழினத்தையும் உயிராக வும் மூச்சாகவும் கொண்ட அருந்தமிழ்\
      \ அறிஞர்களும், தலைவர்களும் தோன்றி மொழிக்கும், இனத்திற்கும் பெரும் பங்காற்றினர். இப் பொற்காலத்தில்தான் அறிஞர் மயிலை சீனி.\
      \ வேங்கடசாமி அவர்கள் 6.12.1900இல் தோன்றி 8.5.1980இல் மறைந்தார்.  வாழ்ந்த காலம் 80 ஆண்டுகள்.  திருமணம் செய்யாமல் துறவு\
      \ வாழ்க்கை மேற்கொண்டு தமிழ் முனிவராக வாழ்ந்து அரை நூற்றாண்டுக்கு மேல் அரிய தமிழ்ப் பணி செய்து மறைந்தவர்.  தமிழ்கூறும்\
      \ நல்லுலகம் வணங்கத்தக்கவர். இவர் எழுதிய நூல்கள் அனைத்தும் தமிழினம் தன்னை உணர்வதற்கும், தலைநிமிர்வதற்கும், ஆய்வாளர்கள்\
      \ ஆய்வுப் பணியில் மேலாய்வை மேற்கொள்வதற்கும் வழிகாட்டுவனவாகும்.  ஆய்வுநோக்கில் விரிந்த பார்வையுடன் தமிழுக்கு அழியாத அறிவுச்\
      \ செல்வங்களை வைப்பாக வைத்துச் சென்றவர்.  தமிழ் - தமிழரின் அடையாளங்களை மீட்டெடுத்துத்தந்த தொல்தமிழ் அறிஞர்களின் வரிசையில்\
      \ குறிப்பிடத்தக்கவர்.  தமிழ்மண்ணில் 1937-1938இல் நடந்த முதல் இந்தி எதிர்ப்புப் போரை முன்னெடுத்துச்சென்ற தலைவர்கள், அறிஞர்கள்\
      \ வரிசையில் இவரும் ஒருவர். வரலாறு, இலக்கியம், கலை, சமயம் தொடர்பான ஆய்வு நூல்களையும், பொதுநலன் தொடர்பான நூல்களையும்,\
      \ பன்முகப் பார்வையுடன் எழுதியவர். பேராசிரியர் முனைவர் வீ. அரசு அவர்கள் எழுதிய சாகித்திய அகாதெமி வெளியிட்டுள்ள ‘இந்திய\
      \ இலக்கியச் சிற்பிகள்’  நூல்வரிசையில் மயிலை சீனி. வேங்கடசாமி பற்றிய வரலாற்று நூலில் ஆவணப்பணி, வரலாறு எழுது பணி, கலை\
      \ வரலாறு, கருத்து நிலை ஆகிய பொருள்களில் இவர்தம் நுண்மாண் நுழைபுல அறிவினை மிக ஆழமாகப் பதிவுசெய்துள்ளார். ‘முறையான தமிழ்\
      \ இலக்கிய வரலாற்றை இனி எழுதுவதற்கு எதிர்கால ஆய்வாளர்களுக்கு வழிகாட்டிச் சென்றவர்’ - என்பார் கா. சுப்பிரமணியபிள்ளை அவர்கள்.\
      \ ‘மயிலை சீனி. வேங்கடசாமி ஆண்டில் இளையவராக இருந்தாலும், ஆராய்ச்சித் துறையில் முதியவர், நல்லொழுக்கம் வாய்ந்தவர். நல்லோர்\
      \ கூட்டுறவைப் பொன்னே போல் போற்றியவர்.’ என்று சுவாமி விபுலானந்த அடிகளார் அவர்களும், “எண்பதாண்டு வாழ்ந்து, தனிப் பெரும்\
      \ துறவுபூண்டு, பிறர் புகாத ஆய்வுச்சூழலில் புகுந்து தமிழ் வளர்த்த, உலகச் சமயங்களையும், கல்வெட்டு காட்டும் வரலாறுகளையும்,\
      \ சிற்பம் உணர்த்தும் கலைகளையும் தோய்ந்து ஆய்ந்து தோலா நூல்கள் எழுதிய ஆராய்ச்சி அறிஞர் மயிலை சீனி. வேங்கடசாமி அவர்கட்குத்\
      \ தமிழ்ப் பேரவைச் செம்மல் என்ற பட்டத்தினை வழங்கியும், தமிழ்ச் செம்மல்கள் பேரவையின் ஓர் உறுப்பினராக ஏற்றுக்கொண்டும்,\
      \ மதுரைக் காமராசர் பல்கலைக்கழகம் பாராட்டிச் சிறப்பிக்கிறது” என்று  இப் பெருந்தமிழ் அறிஞரை அப்பல்கலைக் கழகம் போற்றியுள்ளதை\
      \ மனத்தில் கொண்டு இவரின் அனைத்துப் படைப்புகளையும் வெளியிடுவதில் பெருமை கொள்கிறோம். சென்னைப் பல்கலைக்கழக தமிழ் இலக்கியத்துறைத்\
      \ தலைவர் வீ. அரசு அவர்கள் - போற்றுதலுக்கும், புகழுக்கும் உரிய இவ்வாராய்ச்சிப் பேரறிஞரின் நூல்கள் அனைத்தையும் பொருள்வழிப்\
      \ பிரித்து,  எங்களுக்குக் கொடுத்து உதவியதுடன், பதிப்பாசிரியராக இருந்தும், வழிகாட்டியும், இவ்வாராய்ச்சித் தொகுதிகளை ஆய்வாளர்களும்,\
      \ தமிழ் உணர்வாளர்களும் சிறந்த பயன்பெறும் நோக்கில் வெளியிடுவதற்கு பல்லாற்றானும் உதவினார்.   அவருக்கு எம் நன்றி.  இவ்வருந்தமிழ்ச்\
      \ செல்வங்களை அனைவரும் வாங்கிப் பயனடைய வேண்டுகிறோம். இவ்வாராய்ச்சி நூல்கள் எல்லா வகையிலும் சிறப்போடு வெளி வருவதற்கு உதவிய\
      \ அனைவர்க்கும் நன்றி. - பதிப்பாளர் தமிழ் ஆவணங்கள் : மறைந்துபோன தமிழ் நூல்கள் பத்தொன்பதாம் நூற்றாண்டின் இறுதிக்காலத்தில்\
      \ பழைய தமிழ் நூல்கள் அச்சு வடிவம் பெறத்தொடங்கியது. இந்நூல்களில் காணப்படும் பல்வேறு தகவல்கள் புதியனவாக அமைந்திருப்பதைக்\
      \ காண்கிறோம். மேலும் தமிழில் உருவான நூல்கள் பல பெயரளவில் மட்டும் பதிவாகி யிருப்பதையும் காணமுடிந்தது. இவ்வகைப் பதிவுகளைக்\
      \ கண்ட மயிலை சீனி.வேங்கடசாமி அவர்கள் அவற்றைத் தொகுத்து உருவாக்கியதே மறைந்துபோன தமிழ்நூல்கள் எனும் இத்தொகுதியாகும். யாப்பருங்கல\
      \ விருத்தி உரையில் பல நூல்களின் பெயர்கள் இடம்பெற்றுள்ளன. ஆனால் அந்நூல்கள் புழக்கத்தில் இல்லை. அதைப்போலவே யாப்பருங்கலக்\
      \ காரிகை போன்ற நூல்களுக்கு உரை எழுதிய உரையாசிரியர்கள் பல்வேறு நூல்களின் பெயர்களைக் குறிப்பிடுகிறார்கள். சிலப்பதிகாரத்திற்கு\
      \ உரையெழுதிய அடியார்க்கு நல்லார் பல நூல்களைக் குறிப்படுகிறார். அவை புழக்கத்தில் இல்லை. இவ்வகையில் காணப்படும் 333 நூல்களின்\
      \ பட்டியலை இந்நூலில் மயிலை சீனி. வேங்கடசாமி குறிப்பிடுகிறார். அகப்பொருள், புறப்பொருள் ஆகியவற்றை உள்ளடக்கிய இலக்கிய நூல்கள்\
      \ 87, காவியம் மற்றும் பிற இலக்கிய வடிவங்களில் அமைந்த நூல்கள் 96, இசைத் தமிழ் நூல்கள் 13, நாடகத் தமிழ் நூல்கள் 22, இலக்கண\
      \ நூல்கள் 107 ஆகியவை இந்நூலில் இடம் பெற்றுள்ளன. வாய்மொழி மரபிலோ அல்லது சுவடியாகவோ இருந்த இந்நூல்கள் அழிந்துவிட்டன. ஆனால்\
      \ அந்நூற்செய்திகளைப் பிற்கால நூலாசிரியர்களும் உரையாசிரியர்களும் எடுத்துப் பயன்படுத்தி யுள்ளனர். சுமார் இரண்டாயிரத்து\
      \ ஐந்நூறு ஆண்டுகள் பழமையுள்ள தமிழ்மொழி மற்றும் இலக்கிய மரபில் இவ்வகையான நிகழ்வு சாத்தியமே. ஆனால் மறைந்து போனவற்றில்\
      \ எஞ்சியுள்ளவற்றை பதிவு செய்வது அவசியம். அப்பணியை மயிலை சீனி.வேங்கடசாமி அவர்கள் சிறப்பாகச் செய்துள்ளார். இத்தொகுப்புகள்\
      \ உருவாக்கத்தில் தொடக்க காலத்தில் உதவிய ஆய்வாளர்கள் மா. அபிராமி, ப. சரவணன் ஆகியோருக்கும் இத்தொகுதிகள் அச்சாகும் போது\
      \ பிழைத்திருத்தம் செய்து உதவிய ஆய்வாளர்கள் வி. தேவேந்திரன், நா. கண்ணதாசன் ஆகியோருக்கும் நன்றி. சென்னை - 96\tதங்கள் ஏப்ரல்\
      \ 2010\tவீ. அரசு தமிழ்ப்பேராசிரியர் தமிழ் இலக்கியத்துறை சென்னைப் பல்கலைக்கழகம் அறிஞர் மயிலை சீனி. வேங்கடசாமி"
