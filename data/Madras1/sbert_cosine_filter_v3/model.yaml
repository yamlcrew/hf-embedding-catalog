    - 'Tendências do mercado de alimentos perecíveis em 2024 Tendências do mercado de alimentos perecíveis em 2024 "Todos
      os dias, os maiores centros atacadistas de alimentos são abastecidos com itens que vêm do campo e acabam perdendo a
      validade rapidamente". O último relatório do Programa da ONU para o Meio Ambiente (PNUMA), de 2022, mostra que um terço
      do que é produzido não é consumido por conta de problemas entre a colheita, o transporte e o excedente adquirido e disponibilizado
      para consumo. Nessa mesma linha, uma estimativa do World Resources Institute (WRI) aponta que, em 2023, mais de 41 mil
      toneladas de alimentos são desperdiçados por ano no Brasil, sendo o setor de bares e restaurantes responsável por cerca
      de 15% desse montante. De acordo com Otávio Pimentel, Country Manager da Frubana, foodtech especializada no uso de tecnologia
      para conectar pequenos produtores a restaurantes, existem algumas tendências nesse mercado que podem melhorar a eficiência
      operacional e logística, envolvendo agricultores e donos de estabelecimentos em 2024. São elas: Maior controle entre
      oferta e demanda com apoio da tecnologia Ainda segundo o relatório da ONU, o desperdício no Brasil é estimado em mais
      de R$61 bilhões por ano. Neste momento, o Brasil está na 10ª posição no ranking de países que mais desperdiçam comida.
      De acordo com o executivo, "todos os dias, os maiores centros atacadistas de alimentos são abastecidos com itens que
      vêm do campo e acabam perdendo a validade rapidamente. Sem um controle eficiente da oferta e demanda, podem ser comprados
      em excesso ou, se a demanda não for suficiente, acabam perdendo sua validade sem sequer serem comprados. Uma forma de
      solucionar esse problema é conectar agricultores e restaurantes, para que toda a oferta seja direcionada e precificada
      de acordo com a demanda, oferecendo a melhor relação para agricultores e estabelecimentos", explica Otávio. Investimentos
      em logística Segundo o último relatório da Organização das Nações Unidas para a Alimentação e a Agricultura (FAO), a
      logística pode reduzir o desperdício de alimentos em até 70%. "Hoje em dia o dono de um restaurante ou bar precisa,
      pelo menos a cada dois dias, ir a um centro atacadista comprar frutas, legumes e verduras. Além de implementar um sistema
      de gerenciamento de estoque automatizado, é possível também traçar rotas de distribuição mais eficientes, evitando deslocamentos
      desnecessários e também que a comida aguarde nas prateleiras por um comprador enquanto vence o prazo de validade", explica
      o executivo. Atenção com as exigências do consumidor: Por fim, quem busca uma operação mais sustentável e eficiente,
      acaba sendo reconhecido pelo cliente final. Segundo uma pesquisa da InnovaPack, 74% deles já deixaram de ir a um bar
      ou restaurante que não aplica práticas sustentáveis. "Hoje em dia os consumidores se preocupam com a qualidade e criam
      uma conexão com marcas que demonstram consciência ambiental e sustentável. Para responder a isso, os estabelecimentos
      precisam estar cada vez mais preocupados com sua transparência operacional e integração com fornecedores e produtos
      que sejam de boa procedência", destaca Pimentel. As tendências apontam para caminhos que tornariam o mercado de alimentos
      mais eficiente em sustentabilidade ao evitar o desperdício e garantir uma previsibilidade operacional e logística. Neste
      cenário, a conscientização do consumidor tem exigido, de toda a cadeia, inovações tecnológicas que garantam uma gestão
      mais eficiente da relação entre produtores e consumidores. * Otávio Pimentel, Country Manager da Frubana. Fonte: NR7
      Agência'
  - source_sentence: 'Resistência ao Gerenciamento de Mudanças Organizacionais, Causas e Técnicas | Thpanorama - Torne-se
      melhor hoje Resistência ao Gerenciamento de Mudanças Organizacionais, Causas e Técnicas O resistência à mudança organizacional
      e pessoal é um fenômeno comum e que pode ser gerenciado de forma eficaz. De fato, é muito provável que você mesmo tenha
      experimentado isso, porque é algo comum no ser humano. Mudança de gestão é uma das tarefas mais importantes que podem
      levar ao departamento de Recursos Humanos de uma empresa para evitar perdas econômicas e facilitar o bem-estar de trabalho.
      Quebrar ou mudar hábitos é extremamente difícil de fazer, mesmo que não envolva substâncias viciantes, como a nicotina.
      As dietas não funcionam porque envolvem mudanças de hábitos. Você já tentou mudar os hábitos de seus filhos e você não
      pode? Você já tentou implementar uma nova tecnologia em sua equipe de trabalho, mas reclama? Os princípios básicos das
      causas e o desenvolvimento do fenômeno são os mesmos em ambos os casos. Continue lendo ... A mudança é necessária constantemente
      e ainda mais para que o mundo mude tão rápido. Quero dizer mudanças nas atitudes, comportamentos, cultura ... dependendo
      da situação em que você está. Em uma empresa / organização, os funcionários / funcionários podem resistir a mudanças
      nas formas de agir, metodologias, cronogramas, costumes, etc. E fora da organização, em sua vida comum, as pessoas também
      resistem. Em ambos os casos, é necessário; Uma empresa tem que se reestruturar para ser mais competitiva ou uma pessoa
      tem que mudar hábitos para progredir, melhorar sua saúde ... Isto não é porque as pessoas são teimosas (na verdade também),
      mas porque o ser humano é um animal de costumes. Tende a se acostumar, controlar o ambiente e novas situações tendem
      a causar ansiedade. Um exemplo de resistência extrema é o malcriado que de um dia para outro, você começar a educar
      adequadamente adolescente: é convidado a colaborar na casa, para estudar, você tem obrigações ... O que acontece se
      você não fez nada antes? Provavelmente se torna agressivo ou evade. É o mesmo com os adultos ou empregados: reação a
      uma mudança pode ser evitar, agressão, desafio, hostilidade, sabotagem ... Todas as pessoas têm o mesmo grau de resistência
      à mudança? Na verdade, não. Existem diferenças individuais ou fatores disposicionais associados à mudança. Algumas pessoas
      parecem abraçar a mudança, na verdade elas prosperam, outras a rejeitam completamente. Nem todas as pessoas têm a mesma
      resistência. Alguns são mais testaduras e outros são mais fáceis. Isto pode ser devido a um traço de personalidade chamado
      de "mente aberta" (que marcou mais neste recurso são mais inclinados a aceitar novas situações) ou hábito simples (uma
      pessoa que está acostumado a mudar comportamentos ou situações tem que fazer menos esforço do que outro que não o faz).
      A mudança produz ansiedade em uma situação incerta; A pessoa percebe seu senso de segurança e prefere não deixar seu
      status quo. Dependendo da situação e de alguns aspectos que eu tenha comentado e comente, será mais fácil ou mais complicado
      para você mudar. E também tenha em mente que em muitas ocasiões, o simples fato de perseverar é a coisa mais importante.
      Estes são os estágios pelos quais isso geralmente acontece: Os jovens parecem mais felizes em mudar do que os idosos,
      sem dúvida porque têm menos hábitos adquiridos por anos ou menos a perder. Não está claro se a inteligência e a educação
      afetam as atitudes de uma pessoa em relação à mudança e à aceitação. É uma suposição razoável que pessoas mais inteligentes
      devem ter mais predisposição para aprender coisas novas e ver mudanças conforme necessário. Os psicólogos descobriram
      vários tipos de fatores de personalidade que acreditam estar relacionados à mudança: Neuroticismo / equilíbrio emocional
      Os neuróticos são propensos a ansiedade e depressão. Eles vêem ameaça e perigo em todos os lugares. Eles são hiper vigilantes
      para possíveis ameaças. A mudança inevitavelmente os afeta mais porque eles se importam mais com o que isso significa,
      o que eles precisam fazer e como eles vão lidar. Pelo contrário, pessoas emocionalmente equilibradas controlam e aceitam
      mudanças bem. Algumas pessoas acreditam que são capitães do próprio navio, donos do seu destino. Eles controlam seu
      destino e são eficazes. Eles diferem das pessoas que acreditam que o acaso, ou o destino, influencia tudo. Pessoas com
      mais auto-eficácia conseguem mudar melhor. Tolerante à ambiguidade Algumas pessoas se sentem ameaçadas pela falta de
      clareza e incerteza. Eles gostam que as coisas sejam claras, previsíveis e ordenadas. Mesmo em um ambiente de trabalho
      caprichoso e instável, eles se esforçam para evitar a incerteza usando regras e rituais. Quanto menos tolerante for
      a ambigüidade, mais fácil parecerá aceitar a mudança. Outros fatores pessoais Além disso, existem outros fatores pessoais
      e organizacionais que o tornam mais propenso a mudanças ou não: Uma cultura, personalidade ou educação que encoraja
      o risco torna a mudança muito mais fácil.Se você nunca incentivou seus funcionários, seus filhos ou a si mesmo a mudar,
      não espere que de repente seja simples. Uma atitude positiva em relação ao fracasso torna a mudança muito mais fácil.
      Algumas pessoas não se comprometem a mudar simplesmente porque têm medo de falhar. Embora nos EUA as pessoas que arriscam
      e fracassam sejam valorizadas, na Espanha é algo que é evitado e de que as pessoas se envergonham. O que torna a mudança
      mais resistente? Se grandes mudanças são necessárias, ele tende a resistir mais. Quando a mudança não foi comunicada
      ou é repentina. Se as razões não são conhecidas, há mais resistência. Como se houvesse ambiguidade, isto é, não está
      claro o que se espera que mude. Se a mudança ameaçar o status quo, poder, controle, autonomia ou cargo. Quando a mudança
      ameaça o colapso das relações pessoais. O que faz você responder mais à mudança? Que as informações ou mudanças apresentadas
      coincidam com os valores, crenças e atitudes da pessoa. Que um benefício é percebido na mudança. A mudança gradual torna
      isso mais fácil. Como gerenciar a mudança? Apenas entendendo e sabendo que esta reação de resistência é muito provável,
      você já terá dado um grande passo. No entanto, não é suficiente, também é necessário que você entenda quais serão essas
      fontes de resistência em cada situação e desenvolva uma estratégia para combatê-las. Primeiro, você terá que saber:
      1-Que mudanças você vai apresentar: na sua equipe de trabalho, seu filho ... 2-O que essas mudanças significam? Como
      será o impacto? Terão que mudar horários, atitudes, maneira de trabalhar, hábitos ...? 3-Como eles vão reagir? Isso
      é muito importante porque permite pensar o que você pode fazer depois dessa reação. A produtividade diminuirá? A equipe
      / pessoa se tornará violenta? Então explicarei melhor as causas, o que causa mais ou menos resistência e técnicas ou
      comportamentos que podem orientá-lo. Técnicas / sugestões para mudar - Faça as pessoas participarem: você pode passar
      um tempo com as pessoas que serão afetadas e pedir sua opinião, dependendo de seus critérios, quais condições você permite
      negociar ou não. Se a pessoa se sentir envolvida, responsável e com autonomia será mais motivada. -Provide controle:
      as pessoas geralmente são motivadas quando têm controle, autonomia e responsabilidade para lidar com situações. -Se
      você fizer isso e se comunicar pouco a pouco melhor: eu não pretendo levar anos para implementar a mudança, mas se você
      puder implementar mudanças graduais que não representem grande estresse para as pessoas. Dessa forma, eles acharão mais
      fácil e terão mais tempo para se adaptar e se acostumar com a nova situação / rotina. -Comunique a mudança: ao lado
      do ponto anterior, você pode comunicar pouco a pouco a mudança. Você pode fazer isso pessoalmente e sempre assertivamente.
      Você pode falar de funcionário por funcionário ou com líderes de equipe ou conversar com seu filho: "você é mais velho
      e mais responsável e pode começar a ajudar". -Explique o motivo da mudança: se você der razões, é mais fácil aceitar.
      - Faça-os conscientes das conseqüências positivas, o que há para eles na mudança ?: Uma pequena proporção da resistência
      é eliminada se a pessoa entender que a mudança irá beneficiá-la. - Escute as objeções à mudança e tente resolvê-las:
      ajude as pessoas a superar as barreiras que elas têm para se adaptar à nova situação. Se eles estão interessados ​​e
      dispostos funcionários, será mais fácil para você. Mas se for um adolescente, você terá que ser mais paciente e democrático:
      seja rigoroso, mas recompense quando merecer. - Descubra quais benefícios da mudança podem resolver seus problemas.
      Uma mudança de rotina pode economizar tempo, melhorar a produtividade, aumentar a responsabilidade ... - Dar feedback
      e recompensas: se você observar que o grupo ou pessoa está progredindo e se adaptando, comunique o que está fazendo
      bem e incentive-os. Se você esperar mais, comunique-o também assertivamente. Você já tentou isso? Qual é o seu caso?
      Comente abaixo. Interessa-me! « Significado, tipos e exemplos de ressignificação Respeito pelas diferenças pluriculturais
      e multilingues »'
    sentences:
    - 'Its jagged relief is formed by a series of hills divided by valleys which are often deep and which enclose strange
      and picturesque spots, full of stories and legends. The forest clings to the foot of the southern side of the Arrée
      mountain range. Signposts with arrows allow you to discover the sites, following the different paths. Tudo para as suas
      deslocações: os nossos conselhos e dicas para automóveis, duas rodas e pneus, itinerários, informações de tráfego e
      notícias rodoviárias, todos os serviços no seu percurso e as próximas inovações. A Michelin Travel Partner irá tratar
      os seus dados com o fim de (i) gerir a sua assinatura (ii) medir o desempenho das nossas campanhas e analisar as suas
      interacções com as nossas comunicações. Os seus dados serão partilhados com a Michelin España Portugal, S.A. (en adelante,
      MEPSA) a fim de conhecê-lo/a melhor e de lhe enviar comunicações de marketing relacionadas com a newsletter de Mobilidade.
      Pode gerir as suas preferências de comunicação a qualquer momento. Para exercer os seus direitos firstname.lastname@example.org.
      Mais informações'
    - A participada angolana da Sumol+Compal vai aumentar em 309 milhões de euros o investimento numa fábrica em Angola, lançado
      em 2013, segundo uma adenda ao contrato. Em causa está um projecto inicial de 22 milhões de euros, aprovado pelo Executivo
      angolano em Setembro de 2013 e que prevê, segundo informação tornada pública na altura, a construção de uma fábrica
      em Angola para enchimento de sumos, néctares e refrigerantes das marcas da Sumol+Compal. Envolveu, na ocasião, um contrato
      de investimento celebrado entre a Sumol+Compal Angola Invest, participada em 50,1 por cento pela empresa portuguesa,
      e a Agência Nacional para o Investimento Privado (ANIP). Esse contrato com a agência pública angolana responsável pelo
      investimento privado no país foi agora aumentado em valor e dimensão. "O valor do aumento de investimento é de 51 milhões
      de dólares (…) é realizado integralmente, através da transferência de fundos do exterior", lê-se na adenda ao contrato,
      já aprovada por decreto presidencial. Vai permitir criar, na província de Luanda, 180 postos de trabalho permanentes,
      estando já especificado neste contrato que 155 serão para nacionais e 25 para expatriados. O aumento do investimento
      é justificado no mesmo documento com a "necessidade de aquisição de infra-estruturas sediadas em Luanda para implementação
      do projecto", o qual levará também ao "incremento da força de trabalho". Está ainda definido que este investimento deverá
      ser concretizado pela Sumol+Compal em seis meses.
