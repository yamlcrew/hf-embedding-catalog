      defesa criminal. Repensar a pena, nem pensar. Pensar inconstitucionalidades por desproporcionalidades das penas, nem
      pensar. Inconstitucionalidade da autolesão, nem pensar. A bendita da inexigibilidade de conduta diversa, falada por
      pelo menos três anos na faculdade de Direito inexiste. Legítima defesa e estado de necessidade só existem no Júri, como
      teses, de antemão rechaçadas pela mídia. A única tese discutida realmente é a tipicidade formal e olhe lá. Tipicidade
      material vai depender do medo que certos atores jurídicos têm do "criminoso" e de seus "crimes". Estão interessados
      na autoria e materialidade, exaustivamente repetidas nos relatórios, nas argumentações do Ministério Público e do Juiz.
      Querem um culpado. O processo fordista tem de produzir seu produto necessário, precisamos atender à demanda mercadológica
      por punição. Ficam de fora do processo soluções para as aflições dos envolvidos no conflito, os próprios esquecimento
      e perdão da vítima. A composição do conflito é impensável. Ficam de fora, principalmente, a compreensão por parte do
      agressor das consequências de suas ações, sua real responsabilização e soluções para que não se piore o conflito já
      instaurado ou não se criem novos conflitos. A mentirinha é contada e reproduzida por todos. Construímos o crime, mentira
      contada várias vezes pelos diversos atores jurídicos, de consequências reais. Produzimos um criminoso e o martelo do
      Juiz atesta a confiança na marca. Pronto, a desgraça está feita, sem que qualquer agente, policial, Delegado, Promotor,
      Juiz, Defensor, diretor do presídio, vítima ou qualquer outra pessoa fosse responsável pelo produto final da esteira
      fordista. Afinal, quem aperta o parafuso não encaixa o pneu, quem encaixa o pneu não embala o produto. Há um processo
      alienado de produção do criminoso e a mídia vende a marca mostrando a favela como principal matéria prima para a produção.
      O "criminoso" é colocado em um presídio, tirado do convívio social, para uma outra realidade, com um ethos violento
      totalmente diferente do vivido na sociedade, sob pretexto de ser ressocializado. Como ressocializar tirando da sociedade
      e isolando intramuros? Mentiras e mais mentiras. Etiquetam-se os mesmos de sempre como criminosos, estes desguarnecidos
      internalizam o estigma e redundam na profecia que se auto-realiza. O que não era valentão vira perigoso, o que furtava
      agora vai assaltar, o que traficava drogas amadoramente agora sabe como arrumar armas e ligar carros sem a chave. Não
      se trata de escola de criminosos, trata-se de uma etiqueta que o indivíduo assume e confia. O "criminoso" e a maioria
      dos que o cerca acredita na marca selada pelo martelo do juiz. A partir daí as consequências do crime são reais. Cria-se
      um criminoso, que acredita ser um criminoso, que age como se espera que um criminoso aja. E o Defensor? O que o sistema
      quer e precisa do Defensor? O sistema quer o óleo lubrificante das engrenagens para evitar o desgaste, o conflito. Atestar
      que a mentira será produzida em contraditório e ampla defesa. O Juiz pode agir, condenar, decretar prisões sem o pedido
      do Promotor, figura que acusa. Mas de forma alguma pode o criminalizado ficar sem Defensor. Defender-se é impossível
      num país de analfabetos e ficar sem o trabalho desse ator, do Defensor, na produção significa degringolar o sistema
      de calibragem das pressões e contradições geradas pelas mentiras do sistema, podendo gerar até reações contra a esteira
      de produção, ante a injustiça da falta de defesa. Necessária e divina defesa criminal. "Fique tranquilo, você será condenado
      a ficar anos numa cela 4X6 superlotada, mas terá uma ótima defesa que chegará até o STF com um habeas corpus para melhorar
      o seu regime. Falaremos contigo antes da audiência em entrevista semi-reservada e tentaremos traçar a melhor estratégia
      para que o fogo da inquisição doa menos". Isso envolve a confissão do pacto com o maligno. "Claro! Vamos diminuir a
      pena se você for reincidente, basta confessar a bruxaria". Isso cansa. Somos os mentirosos cansados que calibram o sistema
      para manter o equilíbrio da equação, o bom funcionamento da máquina. É preciso mentir muito pra si mesmo para defender
      no processo penal, aceitar e reproduzir a mentira do crime e todas suas outras mini-mentiras. Poderia ser diferente?
      Deve ser! Dever-ser como falamos é um pouco diferente do ser. Poderia ser e às vezes, longe, muito longe da realidade
      judicial, o é. É preciso trabalhar na esteira fordista de produção interpretando um bom funcionário da fábrica, mas
      é preciso ser disfuncional. Não é possível ver um trabalho não mentiroso nos moldes do recorte acima desenhado. A real
      defesa contra o processo fordista de produção do criminoso está muito distante de acontecer. Se é difícil mudar as causas,
      deveríamos ater aos efeitos danosos do processo. Milhõess de habeas corpus nas instâncias superiores, em nome da mentira,
      aceitando a mentira, seria a solução? Não é uma pergunta retórica, mentira dita várias vezes pode virar verdade. O habeas
      corpus pode ser uma boa mentira. Alessandro Barata fala em combater as condições dos presídios… Reforma-se aqui e acolá,
      mas ainda sinto a angústia. Estamos mentindo. As mentiras têm pernas curtas e eu só gostaria, quando os consumidores
      do produto perceberem a falácia da marca, que entendam nossa posição dialética de defender um pobre do crime no capitalismo
      tardio. Precisamos mentir sim e a grande mentira é o crime. Conceitos tirados de Houlsman, Nilo Batista, Zaffaroni,
      Barata, Foucault e Marildo Menegat. Vinicius Paz Leite é Defensor Público atuante em Execuções Penais. Pós-Graduado
      em Direito Penal e Criminologia Instituto de Criminologia e Política Criminal – ICPC (2012). Bacharel em Ciências Jurídicas
      e Sociais pela Faculdade Nacional de Direito (UFRJ).'
