- source_sentence: Cantareira tem chuva pelo 2º dia consecutivo - São Paulo - Estadão Volume de água registrado ontem animou
    gestores do manancial diante da estiagem FABIO LEITE , MÔNICA REOLOM, O Estado de S.Paulo O volume de chuva de até 29,5
    milímetros registrado ontem pelo Departamento de Águas e Energia Elétrica (DAEE) de São Paulo nos reservatórios que abastecem
    o Sistema Cantareira deu uma trégua no pior período de estiagem da história do manancial e diminuiu o pessimismo no governo
    paulista quanto a um possível racionamento de água na Grande São Paulo. A Sabesp ainda está finalizando o plano para captar
    água no chamado "volume morto" (fundo dos reservatórios) do manancial, que, se levado a diante, só deve ser utilizado
    para garantir o abastecimento no meio do ano, período de seca. Segundo o Centro de Gerenciamento de Emergências (CGE),
    a região mais atingida foi Pirituba, onde a estação meteorológica registrou 81 milímetros até as 22h50. Em alguns pontos
    da zona norte caiu granizo. As precipitações só não atingiram a zona leste da cidade. Até as 23h, 21 pontos de alagamento
    foram registrados pelo CGE - sete deles intransitáveis. A forte chuva na Grande São Paulo também causou danos ao telhado
    do Aeroporto de Cumbica, em Guarulhos. No Terminal 2, conforme divulgou a GRU Airport, que administra o aeroporto, houve
    "concentração excessiva de água" em alguns pontos. Segundo a GRU, a manutenção foi acionada e as áreas, isoladas. "Ressaltamos
    que não foi identificada nenhuma ocorrência de dano ao usuário e as operações do aeroporto não foram impactadas", informou
    ainda o aeroporto. / COLABOROU EDISON VEIGA
  sentences:
  - Deuses Gregos – Hades Hades significa "invisível". Durante a guerra contra os titãs Hades recebeu dos Ciclopes um elmo
    de escuridão, que o tonaria invisível a todos. Com ele, Hades esgueirava por entre os Titãs e destruía todas suas armas.
    Depois da divisão do mundo entre os Deuses, Hades ficou com o submundo, ou mundo inferior, porém ele ainda é conhecido
    como o deus das riquezas ocultas, por reinar abaixo da terra onde se encontram os minérios e as pedras preciosas. Hades
    raramente visitava o mundo superior, fazendo-o só quando a procura de uma consorte. Em uma dessas incursões Hades apaixonou-se
    por Perséfone, filha de Deméter. Essa lenda traz a explicação helênica para a existência das estações do ano. Onde Perséfone,
    após interferência de Zeus, viveria 6 meses no submundo e seis meses no mundo superior. Hades também se apaixonou por
    uma ninfa do rio Cócito chamada Minta. Perséfone, com ciúmes, em sua raiva pisoteou Minta até reduzi-la a pó, e então
    Hades a transformou na hortelã, outras lendas contam que Hades a transformou nesta planta para protegê-la do ciúme e da
    raiva de Perséfone. Hades é o deus do submundo, o mundo inferior e dos mortos. É um deus que se confunde com seu domínio,
    por muitas vezes chamam o mundo inferior de Hades, o mesmo nome do deus. Homero citava Hades como o deus mais odiado pelos
    mortais, justamente pelo seu domínio sobre o mundo dos mortos, porém o deus responsável pela morte chama-se Tanatos. Era
    um deus tão temido que seu nome era pronunciado raramente. Muitos helênicos acreditavam que ao chamá-lo estariam atraindo-lhe
    a coléra. Então usavam outros nomes para designar o Deus, chamando-o de Pluto ou Pluton, que quer dizer Rico. Seus templos
    mais importantes ficavam em Atenas, Olímpia, Élida e Pilos. Eram a ele oferendados o narciso, o cipreste e o buxo. Eram
    comuns alguns sacrifícios de touros e cabras negros, sempre no período noturno, pois o deus teria aversão à luz. No mundo
    inferior, quem manda é Hades, e só ele pode permitir uma alma voltar ao mundo dos vivos. Por isso que ninguém volta do
    mundo dos mortos, pois Hades é muito cuidadoso com seus domínios. Colocou até o cão de três cabeças, Cerberus para tomar
    conta da entrada do submundo. Psicologicamente é o medo manifesto do ser humano em morrer, e também por ser influenciado
    por algo invisível, por contraparte também é a representação da riqueza, que muitas vezes tem que ser construída através
    de sacrifícios.
  - 'INICIATIVA PARA O INVESTIMENTO E EMPREGO - PDF Download "INICIATIVA PARA O INVESTIMENTO E EMPREGO" Thomas Soares Bernardes
    1 FISCAL N.º 1/2009 JAN/FEV 2009 INICIATIVA PARA O INVESTIMENTO E EMPREGO Nuno Sampayo Ribeiro No Conselho de Ministros
    de 13 de Dezembro de 2008 foi aprovado um reforço do investimento público. O qual será operacionalizado através de um
    programa anunciado como Iniciativa para o Investimento e Emprego. De acordo com os dados anunciados pelo Governo esta
    iniciativa representa um estímulo adicional para a economia portuguesa de 2180 milhões de euros o que corresponde a cerca
    de 1,25% do P.I.B.. E visa alavancar investimento privado directamente associado no valor de 5 mil milhões de euros. Foi
    igualmente anunciado que 130 milhões de euros são financiados directamente pelo Orçamento do Estado, sendo o restante
    de financiamento comunitário. Uma primeira consequência é que o défice orçamental ficará na casa dos 3% do P.I.B., e não
    em 2,2% do P.I.B., como proposto na Lei de Orçamento do Estado para Sintetiza-se no quadro seguinte as principais medidas
    de apoio fiscal e de segurança social previstas na referida Iniciativa. INICIATIVA PARA O INVESTIMENTO E EMPREGO Principais
    apoios fiscais e de segurança social Crédito fiscal ao investimento em 2009, que poderá atingir 20% do montante investido,
    dedutível em 4 exercícios Autoliquidação do IVA na prestação de bens e serviços às Administrações Públicas de montante
    superior a 5000 Aceleração do reembolso do IVA, baixando o seu limiar de 7500 para 3000 Pagamento Especial por Conta,
    redução do valor mínimo para 1000 Subsídios à contratação e redução ou isenção de pagamento de contribuições para a segurança
    social pelo empregador na contratação de trabalhadores Destaca-se que este texto tem por fonte a informação difundida
    pelo Governo na apresentação pública dos programas. 2 Apontam-se, em seguida, os aspectos principais desta iniciativa:
    PRIORIDADES O Governo elegeu três domínios principais com o propósito de dinamizar o investimento e o emprego. O primeiro
    é o relativo à educação, à energia sustentável e à rede tecnológica. O segundo é o do apoio à exportação e à actividade
    económica, em especial às PME. O terceiro é o do apoio ao emprego e à protecção social. O apoio público opera nos três
    domínios referidos através de medidas de natureza orçamental e fiscal. As quais serão realizadas em torno dos cinco eixos
    estruturais seguintes: 1. Educação, focada na modernização de mais de 100 escolas. 2. Energia sustentável, através do
    apoio extraordinário à instalação, de painéis solares e de unidades de microgeração, designadamente mini-eólicas; de antecipação
    do investimento na infra-estrutura de transporte de energia; melhoria da eficiência energética dos edifícios públicos
    (hospitais, universidades, tribunais, repartições públicas); investimento em redes de telecontagem de energia. 3. Modernização
    da infra-estrutura tecnológica, em especial apoiar os investimentos nas redes de banda larga de nova geração, e a promoção
    da utilização doméstica e institucional das redes 4. Apoio especial à actividade económica, exportações e PME. 5. Apoio
    ao emprego. MEDIDAS Pelo seu impacto directo na vida das empresas desenvolvem-se em seguida as principais medidas que
    integram os eixos n.ºs 4 e 5 referidos. Eixo n.º4: Apoio à actividade económica e emprego, exportações e PME Medidas de
    natureza orçamental: Linha de crédito de 2000 M para PME Criação de um fundo de reestruturação industrial Apoio aos mecanismos
    de seguro de crédito à exportação (4000 M ) Apoio à promoção externa Apoio ao financiamento de projectos de investimento
    privados na agricultura e na agro-indústria co-financiados por fundos comunitários Criação de uma linha de crédito de
    apoio à exportação e competitividade da agricultura, das pescas e agro-indústria no montante de 175 M 2 3 Medidas de natureza
    fiscal: Crédito fiscal ao investimento em 2009, que poderá atingir 20% do montante investido, dedutível em 4 exercícios
    Autoliquidação do IVA na prestação de bens e serviços às Administrações Públicas de montante superior a 5000 Aceleração
    do reembolso do IVA, baixando o seu limiar de 7500 para 3000 Redução do valor mínimo do Pagamento Especial por Conta para
    1000 Eixo n.º5: Apoio ao Emprego O Governo anunciou 12 medidas de apoio directo ao emprego, as quais incluem subsídios
    à cabeça, redução ou isenção de contribuição para a Segurança Social pelo empregador. Estes benefícios são distribuídos
    em função dos quatro objectivos seguintes: 1) manter o emprego; 2) apoiar os jovens no acesso ao emprego; 3) apoiar o
    regresso ao emprego; 4) alargar a protecção social. Os principais aspectos das medidas referidas são assinalados em seguida:
    I - MANTER O EMPREGO Medida nº1 Redução em 3% das contribuições para a segurança social a cargo do empregador Condicionada
    à manutenção do nível de emprego em 2009 Medida temporária, só em 2009 Estima-se que este apoio abranja trabalhadores
    Apoio médio de 331 por posto de trabalho Medida n.º2 Plano excepcional de apoio a empresas e trabalhadores em situação
    de redução temporária de actividade, nomeadamente através de medidas qualificação-emprego Apoio à manutenção de emprego
    e ao aumento das qualificações em períodos de redução extraordinária de actividade em empresas economicamente viáveis
    e com forte perspectiva de recuperação total da capacidade produtiva Estima-se o apoio a 450 empresas e trabalhadores
    Condicionada à manutenção do nível de emprego e à não realização de despedimentos colectivos Impossibilidade de distribuição
    de lucros e aumento de remunerações dos membros dos corpos sociais Medida temporária por períodos de 6 meses e excepcional
    no ano de 4 II - APOIAR OS JOVENS NO ACESSO AO EMPREGO Medida n.º3 Criar mais de estágios profissionais para jovens, nomeadamente
    jovens licenciados em áreas de baixa empregabilidade Facilitar a transição para a vida activa, através de contacto apoiado
    com o mundo do trabalho Para jovens licenciados em áreas de baixa empregabilidade, o estágio será precedido de período
    de formação de reconversão, a realizar por empresas ou instituições de ensino superior especialmente vocacionadas para
    o efeito Com este alargamento, estima-se que o número de jovens apoiados através de estágios profissionais em 2009 ascenderá
    a Medida n.º4 Pagamento de apoio à contratação de euros, acrescido de isenção de dois anos de pagamento de contribuições
    para a segurança social na contratação de jovens Destina-se a entidades empregadoras que contratem, sem termo e a tempo
    completo, jovens até 30 anos à procura de 1º emprego ou jovens desempregados há mais de seis meses Aquando da contratação,
    as entidades empregadoras poderão optar, em alternativa, por 3 anos de isenção total de pagamento de contribuições Obrigatoriedade
    de manutenção dos postos de trabalho abrangidos por um período mínimo de 3 anos Medida temporária, só em 2009 Estima-se
    que o apoio beneficie empregos para jovens nestas condições III - APOIAR O REGRESSO AO EMPREGO Medida n.º5 Pagamento de
    apoio à contratação de euros, acrescido de isenção de dois anos de pagamento de contribuições para a segurança social
    na contratação de desempregados de longa duração Destina-se a entidades empregadoras que contratem, sem termo e a tempo
    completo, desempregados de longa duração com mais de 30 anos Aquando da contratação, as entidades empregadoras poderão
    optar, em alternativa, por 3 anos de isenção total de pagamento de contribuições Obrigatoriedade de manutenção dos postos
    de trabalho por 3 anos Medida temporária, só 2009 Estima-se que o apoio beneficie desempregados de longa duração Medida
    n.º6 4 5 Redução em 50% da contribuição para a segurança social na contratação de desempregados com mais de 55 anos Destina-se
    a entidades empregadoras que contratem, a termo, desempregados de longa duração com 55 ou mais anos e há mais de seis
    meses no desemprego Obrigatoriedade de manutenção dos postos de trabalho abrangidos pelo período de duração do contrato
    Excepcionalmente, o regime aplica-se a desempregados há mais de 6 meses, e posteriormente há mais de 9 nove meses Estima-se
    que o apoio abranja desempregados Medida n.º7 Criar o novo Programa de Estágios Qualificação-Emprego, destinado a desempregados,
    independentemente da idade, que melhoraram as suas qualificações Oferecer uma oportunidade de inserção profissional a
    desempregados que melhoraram ou venham a melhorar as suas qualificações Destina-se a apoiar o emprego, a melhoria das
    qualificações e a reconversão da estrutura produtiva São destinatários, nomeadamente, aqueles que concluíram ou venham
    a concluir i) Novas Oportunidades (CNO e EFA); ii) Formações Modulares >= 250 horas; iii) CET s; ou iv) Novas Licenciaturas
    O programa consiste no pagamento de 50% da retribuição durante um período de 9 meses e será aberto nas modalidades de
    i) candidatura de par desempregado/empresa ou ii) candidatura de empresas, que farão o recrutamento e a formação através
    de programa de formação próprio, dentro do CNQ Estima-se que o apoio abranja desempregados Medida n.º8 Apoiar a criação
    de novas empresas (e cerca de novos empregos) por parte de desempregados, através de linha de crédito específica e bonificada
    no montante de 100 Milhões de euros. Apoiar a criação do próprio emprego por parte de desempregados Financiamento a taxa
