      1 FISCAL N.º 1/2009 JAN/FEV 2009 INICIATIVA PARA O INVESTIMENTO E EMPREGO Nuno Sampayo Ribeiro No Conselho de Ministros
      de 13 de Dezembro de 2008 foi aprovado um reforço do investimento público. O qual será operacionalizado através de um
      programa anunciado como Iniciativa para o Investimento e Emprego. De acordo com os dados anunciados pelo Governo esta
      iniciativa representa um estímulo adicional para a economia portuguesa de 2180 milhões de euros o que corresponde a
      cerca de 1,25% do P.I.B.. E visa alavancar investimento privado directamente associado no valor de 5 mil milhões de
      euros. Foi igualmente anunciado que 130 milhões de euros são financiados directamente pelo Orçamento do Estado, sendo
      o restante de financiamento comunitário. Uma primeira consequência é que o défice orçamental ficará na casa dos 3% do
      P.I.B., e não em 2,2% do P.I.B., como proposto na Lei de Orçamento do Estado para Sintetiza-se no quadro seguinte as
      principais medidas de apoio fiscal e de segurança social previstas na referida Iniciativa. INICIATIVA PARA O INVESTIMENTO
      E EMPREGO Principais apoios fiscais e de segurança social Crédito fiscal ao investimento em 2009, que poderá atingir
      20% do montante investido, dedutível em 4 exercícios Autoliquidação do IVA na prestação de bens e serviços às Administrações
      Públicas de montante superior a 5000 Aceleração do reembolso do IVA, baixando o seu limiar de 7500 para 3000 Pagamento
      Especial por Conta, redução do valor mínimo para 1000 Subsídios à contratação e redução ou isenção de pagamento de contribuições
      para a segurança social pelo empregador na contratação de trabalhadores Destaca-se que este texto tem por fonte a informação
      difundida pelo Governo na apresentação pública dos programas. 2 Apontam-se, em seguida, os aspectos principais desta
      iniciativa: PRIORIDADES O Governo elegeu três domínios principais com o propósito de dinamizar o investimento e o emprego.
      O primeiro é o relativo à educação, à energia sustentável e à rede tecnológica. O segundo é o do apoio à exportação
      e à actividade económica, em especial às PME. O terceiro é o do apoio ao emprego e à protecção social. O apoio público
      opera nos três domínios referidos através de medidas de natureza orçamental e fiscal. As quais serão realizadas em torno
      dos cinco eixos estruturais seguintes: 1. Educação, focada na modernização de mais de 100 escolas. 2. Energia sustentável,
      através do apoio extraordinário à instalação, de painéis solares e de unidades de microgeração, designadamente mini-eólicas;
      de antecipação do investimento na infra-estrutura de transporte de energia; melhoria da eficiência energética dos edifícios
      públicos (hospitais, universidades, tribunais, repartições públicas); investimento em redes de telecontagem de energia.
      3. Modernização da infra-estrutura tecnológica, em especial apoiar os investimentos nas redes de banda larga de nova
      geração, e a promoção da utilização doméstica e institucional das redes 4. Apoio especial à actividade económica, exportações
      e PME. 5. Apoio ao emprego. MEDIDAS Pelo seu impacto directo na vida das empresas desenvolvem-se em seguida as principais
      medidas que integram os eixos n.ºs 4 e 5 referidos. Eixo n.º4: Apoio à actividade económica e emprego, exportações e
      PME Medidas de natureza orçamental: Linha de crédito de 2000 M para PME Criação de um fundo de reestruturação industrial
      Apoio aos mecanismos de seguro de crédito à exportação (4000 M ) Apoio à promoção externa Apoio ao financiamento de
      projectos de investimento privados na agricultura e na agro-indústria co-financiados por fundos comunitários Criação
      de uma linha de crédito de apoio à exportação e competitividade da agricultura, das pescas e agro-indústria no montante
      de 175 M 2 3 Medidas de natureza fiscal: Crédito fiscal ao investimento em 2009, que poderá atingir 20% do montante
      investido, dedutível em 4 exercícios Autoliquidação do IVA na prestação de bens e serviços às Administrações Públicas
      de montante superior a 5000 Aceleração do reembolso do IVA, baixando o seu limiar de 7500 para 3000 Redução do valor
      mínimo do Pagamento Especial por Conta para 1000 Eixo n.º5: Apoio ao Emprego O Governo anunciou 12 medidas de apoio
      directo ao emprego, as quais incluem subsídios à cabeça, redução ou isenção de contribuição para a Segurança Social
      pelo empregador. Estes benefícios são distribuídos em função dos quatro objectivos seguintes: 1) manter o emprego; 2)
      apoiar os jovens no acesso ao emprego; 3) apoiar o regresso ao emprego; 4) alargar a protecção social. Os principais
      aspectos das medidas referidas são assinalados em seguida: I - MANTER O EMPREGO Medida nº1 Redução em 3% das contribuições
      para a segurança social a cargo do empregador Condicionada à manutenção do nível de emprego em 2009 Medida temporária,
      só em 2009 Estima-se que este apoio abranja trabalhadores Apoio médio de 331 por posto de trabalho Medida n.º2 Plano
      excepcional de apoio a empresas e trabalhadores em situação de redução temporária de actividade, nomeadamente através
      de medidas qualificação-emprego Apoio à manutenção de emprego e ao aumento das qualificações em períodos de redução
      extraordinária de actividade em empresas economicamente viáveis e com forte perspectiva de recuperação total da capacidade
      produtiva Estima-se o apoio a 450 empresas e trabalhadores Condicionada à manutenção do nível de emprego e à não realização
      de despedimentos colectivos Impossibilidade de distribuição de lucros e aumento de remunerações dos membros dos corpos
      sociais Medida temporária por períodos de 6 meses e excepcional no ano de 4 II - APOIAR OS JOVENS NO ACESSO AO EMPREGO
      Medida n.º3 Criar mais de estágios profissionais para jovens, nomeadamente jovens licenciados em áreas de baixa empregabilidade
