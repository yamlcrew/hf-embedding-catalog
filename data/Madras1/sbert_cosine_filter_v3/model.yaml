  - Ministério define medidas para o fortalecimento da defesa cibernética nacional 28-10-2014 17:13 Portaria do ministro da
    Defesa, Celso Amorim, publicada hoje (28) no Diário Oficial da União define uma série de medidas a serem adotadas para
    o fortalecimento da política de defesa cibernética do país. Pelo documento, o Estado-Maior Conjunto das Forças Armadas
    será responsável por supervisionar a adoção das medidas, entre elas, a criação do Comando de Defesa Cibernética e da Escola
    Nacional de Defesa Cibernética. A definição de recursos orçamentários e de pessoal, a proposta de infraestrutura de apoio
    ao pessoal que irá compor os quadros de trabalho do setor cibernético e o enquadramento das tecnologias do setor nas prioridades
    do Ministério da Defesa ficarão sob a responsabilidade da Secretaria-Geral do Ministério da Defesa. Ao Exército caberá
    tomar as providências necessárias para a imediata ativação do Núcleo do Comando de Defesa Cibernética, que ficará subordinado
    ao Centro de Defesa Cibernética. De acordo com a portaria, o Exército também será responsável pela implantação e consolidação
    do Sistema de Homologação e Certificação de Produtos de Defesa Cibernética, pelo apoio à pesquisa e ao desenvolvimento
    de produtos da área, e a criação do Observatório de Defesa Cibernética. A defesa cibernética consiste na adoção de ações
    defensivas, exploratórias e ofensivas, no contexto de um planejamento militar, com finalidade de proteger os sistemas
    de informação, obter dados para a produção de conhecimento de inteligência e, eventualmente, provocar prejuízos a sistemas
    de informação inimigas. Ivan Richard - Repórter da Agência Brasil
