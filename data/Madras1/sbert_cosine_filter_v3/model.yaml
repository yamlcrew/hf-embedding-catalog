    - Deuses Gregos – Hades Hades significa "invisível". Durante a guerra contra os titãs Hades recebeu dos Ciclopes um elmo
      de escuridão, que o tonaria invisível a todos. Com ele, Hades esgueirava por entre os Titãs e destruía todas suas armas.
      Depois da divisão do mundo entre os Deuses, Hades ficou com o submundo, ou mundo inferior, porém ele ainda é conhecido
      como o deus das riquezas ocultas, por reinar abaixo da terra onde se encontram os minérios e as pedras preciosas. Hades
      raramente visitava o mundo superior, fazendo-o só quando a procura de uma consorte. Em uma dessas incursões Hades apaixonou-se
      por Perséfone, filha de Deméter. Essa lenda traz a explicação helênica para a existência das estações do ano. Onde Perséfone,
      após interferência de Zeus, viveria 6 meses no submundo e seis meses no mundo superior. Hades também se apaixonou por
      uma ninfa do rio Cócito chamada Minta. Perséfone, com ciúmes, em sua raiva pisoteou Minta até reduzi-la a pó, e então
      Hades a transformou na hortelã, outras lendas contam que Hades a transformou nesta planta para protegê-la do ciúme e
      da raiva de Perséfone. Hades é o deus do submundo, o mundo inferior e dos mortos. É um deus que se confunde com seu
      domínio, por muitas vezes chamam o mundo inferior de Hades, o mesmo nome do deus. Homero citava Hades como o deus mais
      odiado pelos mortais, justamente pelo seu domínio sobre o mundo dos mortos, porém o deus responsável pela morte chama-se
      Tanatos. Era um deus tão temido que seu nome era pronunciado raramente. Muitos helênicos acreditavam que ao chamá-lo
      estariam atraindo-lhe a coléra. Então usavam outros nomes para designar o Deus, chamando-o de Pluto ou Pluton, que quer
      dizer Rico. Seus templos mais importantes ficavam em Atenas, Olímpia, Élida e Pilos. Eram a ele oferendados o narciso,
      o cipreste e o buxo. Eram comuns alguns sacrifícios de touros e cabras negros, sempre no período noturno, pois o deus
      teria aversão à luz. No mundo inferior, quem manda é Hades, e só ele pode permitir uma alma voltar ao mundo dos vivos.
      Por isso que ninguém volta do mundo dos mortos, pois Hades é muito cuidadoso com seus domínios. Colocou até o cão de
      três cabeças, Cerberus para tomar conta da entrada do submundo. Psicologicamente é o medo manifesto do ser humano em
      morrer, e também por ser influenciado por algo invisível, por contraparte também é a representação da riqueza, que muitas
      vezes tem que ser construída através de sacrifícios.
