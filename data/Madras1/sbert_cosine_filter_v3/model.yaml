- source_sentence: 'Manifesto do MTC (Movimento dos trabalhadores da cultura) sobre a ocupação da funarte 28 de julho de 2011
    valberlucio O Movimento de Trabalhadores da Cultura, aprofundando e reafirmando as posições defendidas desde 1999, em
    diversos movimentos como o Arte Contra Bárbarie, torna pública sua indignação e recusa ao tratamento que vem sendo dado
    à cultura deste país. A arte é um elemento insubstituível para um país: registrar, difundir e refletir o imaginário de
    seu povo. Cultura é prioridade de Estado, por fundamentar o exercício crítico do ser-humano na construção de uma sociedade
    mais justa. A produção artística vive uma situação de estrangulamento que é resultado da mercantilização imposta à cultura
    e à sociedade brasileiras. O Estado prioriza o capital e os governos municipais, estaduais e federal teimam em privatizar
    a cultura, a saúde e a educação. É esse discurso que confunde política para a agricultura com dinheiro para o agronegócio;
    educação pública com transferência de recursos públicos para faculdades privadas; incentivo à cultura com Imposto de Renda
    doado para o marketing, servindo a propaganda de grandes corporações. Por meio da renúncia fiscal – em leis como a Lei
    Rouanet – os governos transferiram a administração de dinheiro público, destinado à produção cultural, para as mãos das
    empresas. Arte pública é aquela financiada por dinheiro público, oferecida gratuitamente, acessível a amplas camadas da
    população – arte feita para o povo. Arte pública é aquela que oferece condições para que qualquer trabalhador possa escolhê-la
    como seu ofício e, escolhendo-a, possa viver dela – arte feita pelo povo. Por uma arte pública, tanto nós, trabalhadores
    da cultura, como toda a população em seu direito ao acesso irrestrito aos bens culturais, exigimos programas – e não programa
    único – estabelecidos em leis com orçamentos próprios. Exigimos programas que estruturem uma política cultural contínua
    e independente – como é o caso do Prêmio Teatro Brasileiro, um modelo de lei proposto pela categoria após mais de 10 anos
    de discussões. Por uma arte pública exigimos Fundos de Cultura, também estabelecidos em lei, com regras e orçamentos próprios
    a serem obedecidos pelos governos e executados por meio de editais públicos, reelaborados constantemente com a participação
    da sociedade civil organizada e não dentro dos gabinetes. Por uma arte pública, exigimos a imediata votação da PEC 236,
    que prevê a cultura como direito social, e também imediata votação da PEC 150, que garante que o mínimo de 2% ( hoje,
    40 bilhões de reais) do orçamento geral da União seja destinado à Cultura, nos padrões propostos pela ONU, para que assim
    tenhamos verbas que possibilitem o início de um tratamento devido à cultura brasileira. Por uma arte pública, exigimos
    a imediata publicação dos editais de incentivo cultural que foram suspensos, e o descontingenciamento imediato da já pequena
    verba destinada à Cultura. Por uma arte pública, exigimos o fim da política de privatizações e sucateamentos dos equipamentos
    culturais, o fim das leis de incentivo fiscal, o fim da burocratização dos espaços públicos e das contínuas repressões
    e proibições que os trabalhadores da cultura têm diariamente sofrido em sua luta pela sobrevivência. Por uma arte pública
    queremos ter representatividade dentro das comissões dos editais, representatividade nas decisões e deliberações sobre
    a cultura, que estão nas mãos de produtores e dos interesses do mercado. Por uma arte pública, hoje nos dirigimos a Senhora
    Presidenta da República, Dilma Rousseff, ao Senhor Ministro da Fazenda e às Senhoras Ministras do Planejamento e Casa
    Civil, já que o Ministério da Cultura, devido seu baixo orçamento encontra-se moribundo e impotente. Exigimos a criação
    de uma política pública e não mercantil de cultura, uma política de investimento direto do Estado, que não pode se restringir
    às ações e oscilações dos governos de plantão. O Movimento de Trabalhadores da Cultura chama toda a população a se unir
    a nós nesta luta! DIVERSOSDENÚNCIA, funarte, minc, protesto Rede Brasileira de Teatro de Rua Divulga Moção de apoio a
    ocupação do Prédio da Funarte Vejam o vídeo de Iná Camargo Costa na 1 plenária de ocupação da funarte'
