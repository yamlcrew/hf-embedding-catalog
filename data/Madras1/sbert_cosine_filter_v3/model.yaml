      Obrigatoriedade de manutenção dos postos de trabalho abrangidos pelo período de duração do contrato Excepcionalmente,
      o regime aplica-se a desempregados há mais de 6 meses, e posteriormente há mais de 9 nove meses Estima-se que o apoio
      abranja desempregados Medida n.º7 Criar o novo Programa de Estágios Qualificação-Emprego, destinado a desempregados,
