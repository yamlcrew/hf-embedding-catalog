  - source_sentence: 'Manifesto do MTC (Movimento dos trabalhadores da cultura) sobre a ocupação da funarte 28 de julho de
      2011 valberlucio O Movimento de Trabalhadores da Cultura, aprofundando e reafirmando as posições defendidas desde 1999,
      em diversos movimentos como o Arte Contra Bárbarie, torna pública sua indignação e recusa ao tratamento que vem sendo
      dado à cultura deste país. A arte é um elemento insubstituível para um país: registrar, difundir e refletir o imaginário
      de seu povo. Cultura é prioridade de Estado, por fundamentar o exercício crítico do ser-humano na construção de uma
      sociedade mais justa. A produção artística vive uma situação de estrangulamento que é resultado da mercantilização imposta
      à cultura e à sociedade brasileiras. O Estado prioriza o capital e os governos municipais, estaduais e federal teimam
      em privatizar a cultura, a saúde e a educação. É esse discurso que confunde política para a agricultura com dinheiro
      para o agronegócio; educação pública com transferência de recursos públicos para faculdades privadas; incentivo à cultura
      com Imposto de Renda doado para o marketing, servindo a propaganda de grandes corporações. Por meio da renúncia fiscal
      – em leis como a Lei Rouanet – os governos transferiram a administração de dinheiro público, destinado à produção cultural,
      para as mãos das empresas. Arte pública é aquela financiada por dinheiro público, oferecida gratuitamente, acessível
      a amplas camadas da população – arte feita para o povo. Arte pública é aquela que oferece condições para que qualquer
      trabalhador possa escolhê-la como seu ofício e, escolhendo-a, possa viver dela – arte feita pelo povo. Por uma arte
      pública, tanto nós, trabalhadores da cultura, como toda a população em seu direito ao acesso irrestrito aos bens culturais,
      exigimos programas – e não programa único – estabelecidos em leis com orçamentos próprios. Exigimos programas que estruturem
      uma política cultural contínua e independente – como é o caso do Prêmio Teatro Brasileiro, um modelo de lei proposto
      pela categoria após mais de 10 anos de discussões. Por uma arte pública exigimos Fundos de Cultura, também estabelecidos
      em lei, com regras e orçamentos próprios a serem obedecidos pelos governos e executados por meio de editais públicos,
      reelaborados constantemente com a participação da sociedade civil organizada e não dentro dos gabinetes. Por uma arte
      pública, exigimos a imediata votação da PEC 236, que prevê a cultura como direito social, e também imediata votação
      da PEC 150, que garante que o mínimo de 2% ( hoje, 40 bilhões de reais) do orçamento geral da União seja destinado à
      Cultura, nos padrões propostos pela ONU, para que assim tenhamos verbas que possibilitem o início de um tratamento devido
      à cultura brasileira. Por uma arte pública, exigimos a imediata publicação dos editais de incentivo cultural que foram
      suspensos, e o descontingenciamento imediato da já pequena verba destinada à Cultura. Por uma arte pública, exigimos
      o fim da política de privatizações e sucateamentos dos equipamentos culturais, o fim das leis de incentivo fiscal, o
      fim da burocratização dos espaços públicos e das contínuas repressões e proibições que os trabalhadores da cultura têm
      diariamente sofrido em sua luta pela sobrevivência. Por uma arte pública queremos ter representatividade dentro das
      comissões dos editais, representatividade nas decisões e deliberações sobre a cultura, que estão nas mãos de produtores
      e dos interesses do mercado. Por uma arte pública, hoje nos dirigimos a Senhora Presidenta da República, Dilma Rousseff,
      ao Senhor Ministro da Fazenda e às Senhoras Ministras do Planejamento e Casa Civil, já que o Ministério da Cultura,
      devido seu baixo orçamento encontra-se moribundo e impotente. Exigimos a criação de uma política pública e não mercantil
      de cultura, uma política de investimento direto do Estado, que não pode se restringir às ações e oscilações dos governos
      de plantão. O Movimento de Trabalhadores da Cultura chama toda a população a se unir a nós nesta luta! DIVERSOSDENÚNCIA,
      funarte, minc, protesto Rede Brasileira de Teatro de Rua Divulga Moção de apoio a ocupação do Prédio da Funarte Vejam
      o vídeo de Iná Camargo Costa na 1 plenária de ocupação da funarte'
    sentences:
    - 'O site Justificando postou artigo de Vinicius Paz Leite, Defensor Público atuante em Execuções Penais e Associado da
      APADEP. Como indica o título – "O processo penal é uma esteira fordista de produção de criminosos" –, o artigo oferece
      uma reflexão crítica sobre o que é crime e sobre a lógica vigente na Justiça que leva ao encarceramento. LEIA ABAIXO:
      Terça-feira, 25 de julho de 2017 Tentarei ser breve. Nesses tempos de hiperlink e de twitter, se a leitura não chegar
      ao final, a culpa é toda minha e da nossa liquidez. O assunto é interessante: é preciso mentir para defender um processo
      criminal? Quais são as aflições de um Defensor? Na lógica da confiança do consumidor nas marcas, o real é o que menos
      importa. O fetiche, o sonho de felicidade pelo consumo da marca mais vale que a real necessidade do produto. Esta lógica
      da marca atinge a todos os produtos capitalistas, até os não desejados num sonho de uma noite de verão. A lógica da
      confiança e do consumo opera no pesadelo do desemprego estrutural, cujo logo, nada menos confiado que um Nike, chama-se
      crime. De outro lado, por falar em crime, furto, em determinada época da Roma antiga, não pertencia à seara penal. Furtar,
      em determinadas sociedades é verbo desconhecido. Usar certas drogas, antes do proibicionismo mais acirrado, em um primeiro
      momento já foi encarado como normal, posteriormente como digno de tratamento médico compulsório e por último virou crime.
      Matar não é crime em todas as sociedades. Não há conduta, mesmo no caso do incesto, proibida homogeneamente em todas
      as sociedades. Diga-se de passagem, incesto não é crime no Brasil. Crime faz parte de um campo chamado dever-ser. Não
      existe um crime natural. É importante traçar uma linha demarcatória entre o ser e o dever-ser, mesmo que rasa, até com
      erros terminológicos, mas bem explicativa. As relações causais naturais, como o vento bater na maçã e a maçã cair, fazem
      parte do ser. A produção de uma mercadoria por um trabalhador, a divisão social do trabalho, a força de trabalho em
      atividade, que gasta o corpo e o intelecto, é ser. Ao revés, imputar um crime à alguém é dever-ser. Se você faz um contrato,
      logo ele deve ser cumprido. Não há uma relação necessária causal entre o contrato e seu cumprimento, como uma maçã que
      cai atendendo à lei da gravidade. O cumprimento não é causa naturalística do contrato, mas sim uma obrigação inventada
      pelo ser humano. Vender cocaína, por enquanto, no Brasil deve ser uma conduta apenada, a não ser que você tenha um helicóptero
      ou um jatinho. Dever-ser está no campo das idéias, mas pode gerar grandes conseqüências no campo do ser, principalmente
      quando o dever é confundido com o próprio ser e vira uma verdade, uma maçã que objetivamente cai com o bater do vento.
      Crime, como entendemos hoje, é uma invenção humana, um dever-ser, não existe por si só. Vou categorizá-lo como um logo,
      uma marca que nasce precisamente com a teoria analítica do crime no início do século XX. Claro que estamos rechaçando
      o conceito de crime dado pelos positivistas biológicos. Para estes o crime era natural e imutável, um conceito a ser
      definido por médicos, psicólogos e demais "cientistas". Deixando de lado alucinações cientificistas, o crime é uma invenção
      humana construída por um processo complicado de definição de papéis, de divisão social do trabalho jurídico, legiferante
      e penitenciário, um misto de chão de fábrica e teatro. Ao contrário do processo de elaboração de uma marca, em que se
      pensa em como atrair o público alvo, a etiqueta do criminoso é uma marca de finalidade invertida, rotula negativamente
      o indivíduo, com base numa invenção parlamentar espiritualizada na lei. Todos cometemos fatos típicos, antijurídicos
      e culpáveis (crimes) diversas vezes durante nossas vidas, inclusive os responsáveis pelo teatro fabril, pelo processo
      de produção do criminoso. São mais de cinco mil tipos penais existentes na legislação brasileira e, para se ter uma
      ideia, mudar ninho de passarinho do lugar é crime. Se todos fossemos pegos e processados criminalmente por todos os
      fatos típicos que cometemos, com nossa reincidência, provavelmente teríamos a "personalidade voltada para o crime" e
      ficaríamos presos na terceira embriaguez ao volante para "manutenção da ordem pública". O mundo seria um imenso presídio,
      o que é sonho de muita gente. O processo penal é uma esteira fordista de produção de criminosos. O grande encarceramento,
      massificando as rotinas dos profissionais do Direito, a substituição da vítima pelo Ministério Público, a impossibilidade
      de solução efetiva do conflito, a falta de um responsável por este processo produtivo, o fetiche da mercadoria, tudo
      isso é parte da engrenagem. Vamos fazer um recorte desta peça teatral fabril muito interessante, um corte que vai da
      feitura das leis até a sentença: Os parlamentares, através de um poder, sabe-se lá como se mantém legítimo, com a desculpa
      de proteger a sociedade, define tipos penais, sancionados pelo Presidente. Esses tipos penais permitem que o braço armado
      do Estado prenda, averigue e faça tudo mais que a escuridão das ruas permitir, com o pretexto de se fazer valer a lei
      que iria defender a sociedade, muito embora a polícia chegue quando o dano já foi cometido. É preciso ter a noção que
      é impossível prender todos que estão cometendo atos descritos nas leis como crimes. Alguns os cometem por meio de uma
      operação fiscal, através de um computador ao sabor do ar condicionado de seu escritório sem que ninguém perceba. Já
      outros os praticam em plena luz do dia, pois não têm escritório, computador, e às vezes lhes faltam até o ar quando
      estão cometendo os atos tidos por crimes pelo legislador. A coisa se dá mais ou menos assim: a polícia, geralmente militar,
      sequestra o agente que está cometendo um fato típico evidente, dentre tantos outros que poderiam estar na mesma situação.
      Um cidadão, segundo o Infopen, provavelmente, com o ensino fundamental incompleto, apanhado na rua porque o crime que
      ele comete geralmente é em público e chama muito a atenção, pois pobre não tem aquela privacidade parlamentar pra "cometer
      seus crimes" em paz. No nosso exemplo, um roubo em via pública contra um transeunte cometido por um (para sempre) desempregado.
      A polícia civil lavra o auto de flagrante rapidamente, dentre vários outros que estão na fila, pois há vários casos
