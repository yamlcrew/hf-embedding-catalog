  - source_sentence: '(29 edições intermediárias de 17 usuários não apresentadas) [[Arquivo:Asuma_e_Chiriku_como_guardiões.png|thumb|left|Asuma
      e Chiriku quando parte dos doze guardiões.]]Ele era um dos Doze Guardião Ninja, sendo indicado pela sua faixa na cintura,
      nos mesmos momentos em que ele desenvolveu uma forte amizade com [[Asuma Sarutobi]]. Quando seis dos membros tentaram
      um golpe de Estado, ele lutou contra eles junto com os outros cinco membros de seu grupo. Chiriku, Asuma e [[Kazuma]]
      foram os únicos sobreviventes da luta. Quando o grupo se desfez, ele se tornou o monge-chefe do Templo do Fogo, um mosteiro
      de elite que é o lar de monges com habilidades especiais. Durante seu tempo com os Doze Guardião Ninja, algumas organizações
      clandestinas colocaram trinta milhões de [[ryō]] como recompensa por sua cabeça.<ref>Naruto: capítulo 320, página 3</ref>
      No anime, é revelado que Chiriku já foi um estudante de Chūkaku. Ele aparentemente, superou seu mestre em algum ponto.<ref
      name = NSE316/> Chiriku era um indivíduo aparentemente calmo e descrito como uma pessoa que raramente se exalta - dificilmente
      deixando algo modificar seu humor. Apesar disso, Chiriku era um homem justo que, quando irritado, exibia-se muito. Ele
      também foi descrito como sendo uma pessoa sincera.<ref name = TD103/> ==== Doze Ninjas Guardiões ==== Quando foi descoberto
      que os túmulos de seus falecidos aliados foram roubados, Chiriku contactou [[Konohagakure]] para obter ajuda. Também
      foi revelado que, desde o golpe de estado, Chiriku tinha sido encarregado de cuidar e treinar o único filho de Kazuma,
      [[Sora]]. Envergonhado da decisão de Kazuma para participar do golpe de Estado, Chiriku escolheu nunca dizer a Sora
      a verdade. Apesar de como o resto do Templo do Fogo sentiam-se e tratavam Sora, Chiriku simpatizava com as dificuldades
      de Sora e fez o que podia para manter a sua moral elevada, mas ao mesmo tempo, mantê-lo na linha. Depois de uma tentativa
      de recuperar os cadáveres roubados falha, ficou claro que o lado demoníaco de Sora estava tornando-se mais incontrolável,
      Chiriku decidiu juntar Sora com o [[Time Yamato]] e voltar para Konoha, sob o pretexto de preencher o lugar do lesionado
      Sai, onde na verdade era para Sora ser melhor assistidos depois. [[Arquivo:Hidan_e_Kakuzu_lutam_contra_Chiriku.png|thumb|Chiriku
      encara Hidan e Kakuzu.]]Depois de entrar na Terra do Fogo, [[Hidan]] e [[Kakuzu]] da [[Akatsuki]] chegam ao Templo do
      Fogo acreditando que um lugar tão religioso talvez fosse o país do jinchūriki. Os monges do templo são completamente
      dizimados e Kakuzu leva o corpo de Chiriku para um ponto de troca de mercado negro para obter a recompensa de sua cabeça
      [[Arquivo:Raigo.PNG|thumb|Chiriku usando sua Abordagem Acolhedora: Assassinato Pelas Mil Mãos.]] Depois de uma tentativa
      de recuperar os cadáveres roubados falhada, ficou claro que o lado demoníaco estava se tornando mais incontrolável,
      Chiriku decidiu juntar Sora com o [[Time Yamato]] voltar para Konoha, sob o pretexto de preencher o lugar do lesionado
      Sai, onde na verdade era para Sora ser melhor assistidos depois.'
    sentences:
    - 'An­gola: Cri­a­ção da Co­mis­são mul­tis­sec­to­rial para a re­gu­la­ção do in­ves­ti­mento pri­vado Foi recentemente
      publicado o Despacho Presidencial n.º 3/18 de 12 de Janeiro que cria uma Comissão Multissectorial com o objectivo de
      fazer o diagnóstico sobre o quadro institucional e regulamentar do processo de investimento privado e que será coordenada
      pelo Ministro de Estado para o Desenvolvimento Económico e Social. Nos termos do referido Despacho, a Comissão criada
      terá como principal objectivo fazer o diagnóstico sobre o quadro institucional e regulamentar do processo de investimento
      privado e proceder à sua alteração com incidência no seguinte: Definição do organismo encarregue de promover a articulação
      e a integração com os serviços do Estado necessários em todas as fases do procedimento de investimento; Análise e apresentação
      de propostas com vista a alteração dos níveis e dos prazos de aprovação e das entidades competentes para o efeito; Análise
      e definição da documentação necessária para aprovação dos Projectos de Investimento Privado; Estudo e sugestão de um
      modelo de governação da instituição responsável pelo Investimento Privado; Estudo e sugestão de um regime de emolumentos
      mais atractivo e menos oneroso ao investidor; Análise e definição do melhor quadro operacional para o Sistema de Investimento
      Privado; Sugestão de medidas e/ou soluções mais eficazes no sentido de acelerar a implementação dos Projectos de Investimento
      Privado. Salientamos que até que sejam efectivadas as alterações à legislação actualmente em vigor as Unidades Técnicas
      de Apoio ao Investimento Privado dos Departamentos Ministeriais manter-se-ão em funcionamento nos termos do actual Regulamento
      de Investimento Privado.'
