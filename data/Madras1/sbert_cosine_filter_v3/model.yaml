  - 'O site Justificando postou artigo de Vinicius Paz Leite, Defensor Público atuante em Execuções Penais e Associado da
    APADEP. Como indica o título – "O processo penal é uma esteira fordista de produção de criminosos" –, o artigo oferece
    uma reflexão crítica sobre o que é crime e sobre a lógica vigente na Justiça que leva ao encarceramento. LEIA ABAIXO:
    Terça-feira, 25 de julho de 2017 Tentarei ser breve. Nesses tempos de hiperlink e de twitter, se a leitura não chegar
    ao final, a culpa é toda minha e da nossa liquidez. O assunto é interessante: é preciso mentir para defender um processo
    criminal? Quais são as aflições de um Defensor? Na lógica da confiança do consumidor nas marcas, o real é o que menos
    importa. O fetiche, o sonho de felicidade pelo consumo da marca mais vale que a real necessidade do produto. Esta lógica
    da marca atinge a todos os produtos capitalistas, até os não desejados num sonho de uma noite de verão. A lógica da confiança
    e do consumo opera no pesadelo do desemprego estrutural, cujo logo, nada menos confiado que um Nike, chama-se crime. De
    outro lado, por falar em crime, furto, em determinada época da Roma antiga, não pertencia à seara penal. Furtar, em determinadas
    sociedades é verbo desconhecido. Usar certas drogas, antes do proibicionismo mais acirrado, em um primeiro momento já
    foi encarado como normal, posteriormente como digno de tratamento médico compulsório e por último virou crime. Matar não
    é crime em todas as sociedades. Não há conduta, mesmo no caso do incesto, proibida homogeneamente em todas as sociedades.
    Diga-se de passagem, incesto não é crime no Brasil. Crime faz parte de um campo chamado dever-ser. Não existe um crime
    natural. É importante traçar uma linha demarcatória entre o ser e o dever-ser, mesmo que rasa, até com erros terminológicos,
    mas bem explicativa. As relações causais naturais, como o vento bater na maçã e a maçã cair, fazem parte do ser. A produção
    de uma mercadoria por um trabalhador, a divisão social do trabalho, a força de trabalho em atividade, que gasta o corpo
    e o intelecto, é ser. Ao revés, imputar um crime à alguém é dever-ser. Se você faz um contrato, logo ele deve ser cumprido.
    Não há uma relação necessária causal entre o contrato e seu cumprimento, como uma maçã que cai atendendo à lei da gravidade.
    O cumprimento não é causa naturalística do contrato, mas sim uma obrigação inventada pelo ser humano. Vender cocaína,
    por enquanto, no Brasil deve ser uma conduta apenada, a não ser que você tenha um helicóptero ou um jatinho. Dever-ser
    está no campo das idéias, mas pode gerar grandes conseqüências no campo do ser, principalmente quando o dever é confundido
    com o próprio ser e vira uma verdade, uma maçã que objetivamente cai com o bater do vento. Crime, como entendemos hoje,
    é uma invenção humana, um dever-ser, não existe por si só. Vou categorizá-lo como um logo, uma marca que nasce precisamente
    com a teoria analítica do crime no início do século XX. Claro que estamos rechaçando o conceito de crime dado pelos positivistas
    biológicos. Para estes o crime era natural e imutável, um conceito a ser definido por médicos, psicólogos e demais "cientistas".
    Deixando de lado alucinações cientificistas, o crime é uma invenção humana construída por um processo complicado de definição
    de papéis, de divisão social do trabalho jurídico, legiferante e penitenciário, um misto de chão de fábrica e teatro.
    Ao contrário do processo de elaboração de uma marca, em que se pensa em como atrair o público alvo, a etiqueta do criminoso
    é uma marca de finalidade invertida, rotula negativamente o indivíduo, com base numa invenção parlamentar espiritualizada
    na lei. Todos cometemos fatos típicos, antijurídicos e culpáveis (crimes) diversas vezes durante nossas vidas, inclusive
    os responsáveis pelo teatro fabril, pelo processo de produção do criminoso. São mais de cinco mil tipos penais existentes
    na legislação brasileira e, para se ter uma ideia, mudar ninho de passarinho do lugar é crime. Se todos fossemos pegos
    e processados criminalmente por todos os fatos típicos que cometemos, com nossa reincidência, provavelmente teríamos a
    "personalidade voltada para o crime" e ficaríamos presos na terceira embriaguez ao volante para "manutenção da ordem pública".
    O mundo seria um imenso presídio, o que é sonho de muita gente. O processo penal é uma esteira fordista de produção de
    criminosos. O grande encarceramento, massificando as rotinas dos profissionais do Direito, a substituição da vítima pelo
    Ministério Público, a impossibilidade de solução efetiva do conflito, a falta de um responsável por este processo produtivo,
    o fetiche da mercadoria, tudo isso é parte da engrenagem. Vamos fazer um recorte desta peça teatral fabril muito interessante,
    um corte que vai da feitura das leis até a sentença: Os parlamentares, através de um poder, sabe-se lá como se mantém
    legítimo, com a desculpa de proteger a sociedade, define tipos penais, sancionados pelo Presidente. Esses tipos penais
    permitem que o braço armado do Estado prenda, averigue e faça tudo mais que a escuridão das ruas permitir, com o pretexto
    de se fazer valer a lei que iria defender a sociedade, muito embora a polícia chegue quando o dano já foi cometido. É
    preciso ter a noção que é impossível prender todos que estão cometendo atos descritos nas leis como crimes. Alguns os
    cometem por meio de uma operação fiscal, através de um computador ao sabor do ar condicionado de seu escritório sem que
    ninguém perceba. Já outros os praticam em plena luz do dia, pois não têm escritório, computador, e às vezes lhes faltam
    até o ar quando estão cometendo os atos tidos por crimes pelo legislador. A coisa se dá mais ou menos assim: a polícia,
    geralmente militar, sequestra o agente que está cometendo um fato típico evidente, dentre tantos outros que poderiam estar
    na mesma situação. Um cidadão, segundo o Infopen, provavelmente, com o ensino fundamental incompleto, apanhado na rua
    porque o crime que ele comete geralmente é em público e chama muito a atenção, pois pobre não tem aquela privacidade parlamentar
    pra "cometer seus crimes" em paz. No nosso exemplo, um roubo em via pública contra um transeunte cometido por um (para
    sempre) desempregado. A polícia civil lavra o auto de flagrante rapidamente, dentre vários outros que estão na fila, pois
    há vários casos para investigar. O agente penitenciário o recebe na penitenciária assim como recebeu dentre mil, mil e
    quinhentos presos. Irá vigiá-lo. A Secretaria de Administração Penitenciária é a responsável pela segurança e por (não)
    fornecer subsídios mínimos para sua sobrevivência. O Promotor, nadando numa piscina de inquéritos, acumulando outras atribuições,
    promove a denúncia. O Juiz recebe a denúncia sem analisar muito bem, pois há uma pilha de processos "pra fazer". O Defensor
    entra em contato, quando muito, antes da defesa prévia, para trazer más notícias e dar um alento. Faz a defesa prévia
    sem testemunhas, sem tese de defesa, padrão. O juiz não leria se fosse diferente. A regra da esteira é ler o menos possível,
    não há tempo para reflexões! É marcada a audiência. No recorte feito por este artigo, em que se vai da produção da lei
    até a sentença, eis o final do segundo ato. O ápice. Onde serão ditas mentiras sem fim, feitas perguntas em sua totalidade
    inúteis, que em nada contribuirão para a solução do conflito. As perguntas geralmente são tendenciosas para a construção
    do produto e de seu logo: todos querem a culpa e quais as circunstâncias da dosimetria da pena. Tudo a justificar e ratificar
    a ação policial. Não há tempo para se solucionar o conflito, não há possibilidades de solução de conflito. O Ministério
    Público substitui a vítima, que não tem seus interesses reais tutelados. A vítima somente revê seu agressor no reconhecimento,
    pela fresta da porta, depõe na ausência do réu, nunca mais olha pra cara do, então em curso, criminoso, nem que seja para
    xingar. Fazem perguntas querendo condenar, à exceção da tão necessária à engrenagem e inegociável defesa criminal. Repensar
    a pena, nem pensar. Pensar inconstitucionalidades por desproporcionalidades das penas, nem pensar. Inconstitucionalidade
    da autolesão, nem pensar. A bendita da inexigibilidade de conduta diversa, falada por pelo menos três anos na faculdade
    de Direito inexiste. Legítima defesa e estado de necessidade só existem no Júri, como teses, de antemão rechaçadas pela
    mídia. A única tese discutida realmente é a tipicidade formal e olhe lá. Tipicidade material vai depender do medo que
    certos atores jurídicos têm do "criminoso" e de seus "crimes". Estão interessados na autoria e materialidade, exaustivamente
    repetidas nos relatórios, nas argumentações do Ministério Público e do Juiz. Querem um culpado. O processo fordista tem
    de produzir seu produto necessário, precisamos atender à demanda mercadológica por punição. Ficam de fora do processo
    soluções para as aflições dos envolvidos no conflito, os próprios esquecimento e perdão da vítima. A composição do conflito
    é impensável. Ficam de fora, principalmente, a compreensão por parte do agressor das consequências de suas ações, sua
    real responsabilização e soluções para que não se piore o conflito já instaurado ou não se criem novos conflitos. A mentirinha
    é contada e reproduzida por todos. Construímos o crime, mentira contada várias vezes pelos diversos atores jurídicos,
    de consequências reais. Produzimos um criminoso e o martelo do Juiz atesta a confiança na marca. Pronto, a desgraça está
    feita, sem que qualquer agente, policial, Delegado, Promotor, Juiz, Defensor, diretor do presídio, vítima ou qualquer
    outra pessoa fosse responsável pelo produto final da esteira fordista. Afinal, quem aperta o parafuso não encaixa o pneu,
    quem encaixa o pneu não embala o produto. Há um processo alienado de produção do criminoso e a mídia vende a marca mostrando
    a favela como principal matéria prima para a produção. O "criminoso" é colocado em um presídio, tirado do convívio social,
    para uma outra realidade, com um ethos violento totalmente diferente do vivido na sociedade, sob pretexto de ser ressocializado.
    Como ressocializar tirando da sociedade e isolando intramuros? Mentiras e mais mentiras. Etiquetam-se os mesmos de sempre
    como criminosos, estes desguarnecidos internalizam o estigma e redundam na profecia que se auto-realiza. O que não era
    valentão vira perigoso, o que furtava agora vai assaltar, o que traficava drogas amadoramente agora sabe como arrumar
    armas e ligar carros sem a chave. Não se trata de escola de criminosos, trata-se de uma etiqueta que o indivíduo assume
    e confia. O "criminoso" e a maioria dos que o cerca acredita na marca selada pelo martelo do juiz. A partir daí as consequências
    do crime são reais. Cria-se um criminoso, que acredita ser um criminoso, que age como se espera que um criminoso aja.
    E o Defensor? O que o sistema quer e precisa do Defensor? O sistema quer o óleo lubrificante das engrenagens para evitar
    o desgaste, o conflito. Atestar que a mentira será produzida em contraditório e ampla defesa. O Juiz pode agir, condenar,
    decretar prisões sem o pedido do Promotor, figura que acusa. Mas de forma alguma pode o criminalizado ficar sem Defensor.
    Defender-se é impossível num país de analfabetos e ficar sem o trabalho desse ator, do Defensor, na produção significa
    degringolar o sistema de calibragem das pressões e contradições geradas pelas mentiras do sistema, podendo gerar até reações
    contra a esteira de produção, ante a injustiça da falta de defesa. Necessária e divina defesa criminal. "Fique tranquilo,
    você será condenado a ficar anos numa cela 4X6 superlotada, mas terá uma ótima defesa que chegará até o STF com um habeas
    corpus para melhorar o seu regime. Falaremos contigo antes da audiência em entrevista semi-reservada e tentaremos traçar
    a melhor estratégia para que o fogo da inquisição doa menos". Isso envolve a confissão do pacto com o maligno. "Claro!
    Vamos diminuir a pena se você for reincidente, basta confessar a bruxaria". Isso cansa. Somos os mentirosos cansados que
    calibram o sistema para manter o equilíbrio da equação, o bom funcionamento da máquina. É preciso mentir muito pra si
    mesmo para defender no processo penal, aceitar e reproduzir a mentira do crime e todas suas outras mini-mentiras. Poderia
    ser diferente? Deve ser! Dever-ser como falamos é um pouco diferente do ser. Poderia ser e às vezes, longe, muito longe
    da realidade judicial, o é. É preciso trabalhar na esteira fordista de produção interpretando um bom funcionário da fábrica,
    mas é preciso ser disfuncional. Não é possível ver um trabalho não mentiroso nos moldes do recorte acima desenhado. A
    real defesa contra o processo fordista de produção do criminoso está muito distante de acontecer. Se é difícil mudar as
    causas, deveríamos ater aos efeitos danosos do processo. Milhõess de habeas corpus nas instâncias superiores, em nome
    da mentira, aceitando a mentira, seria a solução? Não é uma pergunta retórica, mentira dita várias vezes pode virar verdade.
    O habeas corpus pode ser uma boa mentira. Alessandro Barata fala em combater as condições dos presídios… Reforma-se aqui
    e acolá, mas ainda sinto a angústia. Estamos mentindo. As mentiras têm pernas curtas e eu só gostaria, quando os consumidores
    do produto perceberem a falácia da marca, que entendam nossa posição dialética de defender um pobre do crime no capitalismo
    tardio. Precisamos mentir sim e a grande mentira é o crime. Conceitos tirados de Houlsman, Nilo Batista, Zaffaroni, Barata,
    Foucault e Marildo Menegat. Vinicius Paz Leite é Defensor Público atuante em Execuções Penais. Pós-Graduado em Direito
    Penal e Criminologia Instituto de Criminologia e Política Criminal – ICPC (2012). Bacharel em Ciências Jurídicas e Sociais
    pela Faculdade Nacional de Direito (UFRJ).'
