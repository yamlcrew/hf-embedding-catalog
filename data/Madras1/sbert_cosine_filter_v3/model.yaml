      a desempregados que melhoraram ou venham a melhorar as suas qualificações Destina-se a apoiar o emprego, a melhoria
      das qualificações e a reconversão da estrutura produtiva São destinatários, nomeadamente, aqueles que concluíram ou
      venham a concluir i) Novas Oportunidades (CNO e EFA); ii) Formações Modulares >= 250 horas; iii) CET s; ou iv) Novas
      Licenciaturas O programa consiste no pagamento de 50% da retribuição durante um período de 9 meses e será aberto nas
      modalidades de i) candidatura de par desempregado/empresa ou ii) candidatura de empresas, que farão o recrutamento e
      a formação através de programa de formação próprio, dentro do CNQ Estima-se que o apoio abranja desempregados Medida
      n.º8 Apoiar a criação de novas empresas (e cerca de novos empregos) por parte de desempregados, através de linha de
      crédito específica e bonificada no montante de 100 Milhões de euros. Apoiar a criação do próprio emprego por parte de
      desempregados Financiamento a taxa bonificada com período de carência total de capital e juros Garantia mínima de 75%
      do total do crédito Empréstimos de valor máximo de Possibilidade de acumular com apoios à contratação Estima-se que
      o apoio abranja novas empresas e novos empregos Medida n.º9 Apoiar a integração de desempregados em instituições não
      lucrativas, através do Contrato Emprego-Inserção Apoiar a inserção profissional de desempregados, através da manutenção
      da proximidade destes ao mercado de trabalho 5 6 Compensação acrescida ao subsídio de desemprego Atribuição de todos
      os benefícios decorrentes de instrumentos de regulamentação contratação colectiva em vigor Apoio pelo máximo de 1 ano
      Estima-se que o apoio beneficie desempregados Medida n.º 10 Alargar a oferta de cursos de dupla certificação, nomeadamente
      EFA e CET s, para desempregados em regiões específicas mais atingidas pelo desemprego Abertura de concursos específicos
      para atribuições de verbas para regiões mais atingidas pelo desemprego, tendo em vista reforçar a oferta de formação
      e acelerar o processo de modernização económica Concurso excepcional, só 2009 Estima-se que o apoio abranga desempregados.
      IV. ALARGAR A PROTECÇÃO SOCIAL Medida n.º11 Prolongar o subsídio social de desemprego durante o ano de 2009, por um
      período de mais de 6 meses Alargar o apoio social aos desempregados de longa duração, para os beneficiários que concluam
      o prazo de atribuição do subsídio social de desemprego inicial ou subsequente em 2009 O apoio corresponderá a 6 meses
      adicionais de prestação, com um valor de 60% do Indexante dos Apoios Sociais (IAS), acrescido de 10% do IAS por cada
      filho no agregado familiar, com um máximo de 1 IAS Medida temporária, só 2009 Estima-se que o apoio abranja beneficiários
      Medida n.º12 Reforçar as garantias de protecção no desemprego incentivando os regressos rápidos ao mercado de trabalho
      Nas situações de regresso rápido ao mercado de trabalho (seis meses ou menos), os desempregados manterão na totalidade
