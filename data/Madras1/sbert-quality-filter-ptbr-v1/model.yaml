  - 'São Paulo - SP Histórico Ao tempo da fundação de São Paulo, o setor norte era povoado por duas tribos da nação Tupi:
    a dos Guarulhos, da família dos Guaianases, que dominavam a margem direita do Rio Tietê e outra a do Uraraí, ocupando
    a margem oposta, desde a Penha até São Miguel. E, em 1560, pela necessidade de defesa e para favorecer a catequese, os
    Jesuítas concentraram as duas tribos, formando aldeias de Conceição dos Guarulhos e São Miguel, cada uma à sua margem,
    cerca de um quilômetro do Tietê. Próximo a São Miguel, em reconhecimento aos trabalhos prestados na formação dessa aldeia,
    foi concedida ao Padre João Alvares uma sesmaria, onde este pároco construiu uma capela sob invocação de Nossa Senhora
    D?Ajuda. Anos mais tarde, os desentendimentos entre jesuítas e donatários das terras adjacentes às aldeias, provocaram
    um certo abandono de São Miguel, vindo seus missionários e gentios a se fixarem junto à capela de Nossa Senhora D?Ajuda.
    Apesar de colonização antiga e de possuir uma rústica povoação onde foi criada a freguesia de Itaquaquecetuba em 1838,
    o núcleo urbano somente foi efetivado no início do século XX, quando os padres responsáveis pela administração dos bens
    da igreja venderam, em 1910, parte das terras a José Monteiro Diogo, João Augusto de Miranda, Joaquim Pedro Fagundes,
    Cândido Alves, Benedito Rodrigues de Godoy e Carlos Alexandrino de Morais. Inicialmente dedicados à agricultura de subsistência,
    os povoadores introduziram outras atividades, principalmente a partir da instalação de uma estação ferroviária em 1925,
    na variante de Moji das Cruzes da Estrada de Ferro Central do Brasil. Nessa época, começaram a exploração vegetal para
    produção de carvão e, devido à afluência de novos moradores, foram instaladas várias olarias de grande significado econômico
    para o município que foi criado em 1953. O topônimo indígena Itaquaquecetuba, que significa ?abundância de taquaras que
    cortam?, deve-se à existência, na época da fundação da aldeia, de imenso taquaral, margeando os rios Tietê e Tipóia. Gentílico:
    itaquaquecetubano Formação Administrativa Distrito criado com a denominação de Itaquaquecetuba, pela Lei Provincial n.º
    17, de 28-02-1838, subordinado ao município de Mogi das Cruzes. Em divisão administrativa do Brasil referente ao ano de
    1911, o distrito de Itaquaquecetuba, figura no município de Moji das Cruzes. Assim permanecendo em divisão territorial
    datada de 1-VII-1950. Elevado à categoria de município com a denominação de Itaquaquecetuba, pela Lei Estadual n.º 2.456,
    de 30-11-1953, desmembrado do município de Moji das Cruzes (ex-Mogi das Cruzes). Sede no antigo distrito de Itaquaquecetuba.
    Constituído do distrito sede. Instalado em 01-01-1954. Em divisão territorial datada de 1-VII-1960, o município é constituído
    do distrito sede. Assim permanecendo em divisão territorial datada de 2009. Fonte: Itaquaquecetuba (SP). 2010. Prefeitura.
    Data de atualização: 06/09/2013 Site: www.entrei.net'
  - 'Em Minas vitória gorda, em Santos vitória magra. - Futebol & Variedades Em Minas vitória gorda, em Santos vitória magra.
    Wilson Oliveira 11:08 (Atacante Guilherme comemora o primeiro gol do time). Condutor de uma regularidade incrível que
    vem sendo construída na temporada 2008, o Cruzeiro detonou mais um adversário no Mineirão. Sem dó nem piedade, a Raposa
    fez o Caracas engolir três gols. Em casa o time azul celeste assegura os 100% de aproveitamento. Na noite desta terça-feira,
    enquanto fazia um trabalho da faculdade, me guardei no direito de ouvir a transmissão do jogo entre Cruzeiro e Caracas
    pela radio Globo - MG. E pude constatar o que já venho percebendo através do que os amigos mineiros vêm descrevendo. O
    time não possui essa seqüência de vitórias à toa. Numa triangulação envolvente, com boa troca de passes entre os atacantes,
    Wagner lançou para Guilherme que tocou na saída do goleiro. A Raposa garantia a primeira estufada de rede logo aos nove
    minutos do primeiro tempo. No decorrer da partida, o Caracas não conseguia resistir e o Cruzeiro se aproveitava e se lançava
    o tempo todo ao ataque. Inferior na partida, o time venezuelano apelava para a tática da linha do impedimento na defesa.
    Por diversas vezes os atacantes cruzeirenses não conseguiam se desvencilhar da linha, mas aos 28 minutos, a linha pecou
    pela burrice e ao Cruzeiro, restou fazer o segundo com Ramires, que recebeu passe de Moreno e marcou. Foi o quinto gol
    do volante só na Libertadores, que vem mostrando ser um jogador moderno na posição e com atuações cada vez mais sólidas.
    Bom no desarme e presente no ataque. Além de evitar gols do adversário, ajuda o time a conquistar as vitórias marcando
    gols. Melhor, impossível! Com dois a zero no placar, a nação azul já começava a provocar o Atlético, visando o clássico
    que acontecerá nesse final de semana pelo Mineiro. Com a natural tranqüilidade dos donos da casa, o time visitante conseguiu
    duas chances de gol, mas foram desperdiçadas. No segundo tempo, repetição do primeiro. Logo no inicio, o Cruzeiro quase
    marcou o terceiro com Moreno, que aparecia bastante durante o jogo, sendo opção e distribuindo bem as jogadas e lá trás
    a defesa se segurava bem com investidas esporádicas do time do atacante Rentería, que sentia a falta de um companheiro
    nas jogadas de ataque. Para confirmar sua qualidade e fechar com chave de ouro (embora fosse cedo, 18 minutos), Marcelo
    Moreno recebeu lançamento de Marcinho, passou pelo zagueiro, na seqüência limpou o goleiro e tocou para o gol vazio, fazendo
    os quase 40 mil pagantes explodirem em alegria. Estava formado o placar de 3x0 e Adilson Baptista sabia que só uma catástrofe
    faria o resultado ficar adverso. Além de jogar bem, o Cruzeiro enfrentava um adversário que estava muito mal e tranquilamente
    pode-se dizer que aquele jogo deveria ter tido um placar mais elástico. Definitivamente, A Raposa tem tudo para ser um
    bicho papão nessa temporada de 2008. (jogadores do Cruzeiro comemoram o tereiro gol). CABEÇA AGORA ESTÁ NO CLÁSSICO. Logo
    na saída de campo, os jogadores externavam o espírito que é preciso ter, quando se disputa duas competições paralelas.
    Ontem foi dia de um jogo importantíssimo e domingo será a vez de outro jogo de tamanha importância para as pretensões
    cruzeirenses. Raposa e Galo irão duelar, e sobre isso se resumiram as entrevistas na saída de campo na noite de ontem:
    "Tem que ser assim, tem que ter um algo a mais no clássico, senão a gente não consegue a vitória, tem que ter espírito
    de mais garra, mais determinação, mais sangue azul para a gente conseguir, se Deus quiser sai essa vitória no fim-de-semana".
    Discursou o goleiro Fábio. "Muita garra, vontade; todo mundo sabe das dificuldades do jogo, temos que nos preparar bastante
    para ganhar esse jogo". Disse o zagueiro Thiago Heleno. O Cruzeiro é o líder do campeonato Mineiro, e domingo estará na
    defesa da liderança contra seu maior rival às 16hs no estádio Mineirão. SANTOS FICA SÓ NO UM A ZERO. Dentro de seus domínios,
    o Santos teve dificuldades para vencer o Chivas Guadalajara – MEX. No inicio do primeiro tempo, o time mexicano não conseguia
    impor uma boa marcação aos jogadores santistas, mas no decorrer do jogo isso foi se acertando. Já a equipe de Emerson
    Leão, dependia dos lampejos do colombiano Molina para fazer boas jogadas. E como não podia deixar de ser, aos 22, Molina
    limpou a jogada tirando um zagueiro e mandando um verdadeiro torpedo para gol, impossibilitando a defesa para o goleiro
    Luis Michel, que estava adiantado. Este foi o gol único da partida. (Molina comemora o gol homenageando o filho que irá
    nascer no Brasil) No segundo tempo, não mudou muita coisa. Sem conseguir se lançar ao ataque com qualidades, o time santista
    acabou recuando em demasia e só criava jogadas ofensivas na base dos chutões. Já o Chivas, esteve bem próximo da empatar
    a partida criando algumas condições de gol que foram sendo desperdiçadas uma atrás da outra. A de se salientar também
    que o Goleiro Fábio Costa, mais uma vez foi importante na vitória do time. Essa foi a 22ª vitória do Peixe em 29 jogos
    da Libertadores disputados na Vila Belmiro. O próximo adversário na competição será o San José na Bolívia dia 19. Em Minas
    vitória gorda, em Santos vitória magra. Reviewed by Wilson Oliveira on 11:08 Rating: 5 O Cruzueiro tá fazendo um excelente
    Campeonato Mineiro e vai fazer bonito na Libertadores... Valeu, Wilson!!! 5 de março de 2008 13:52 Não vi o jogo do Cruzeiro,
    mas vi o do Santos. O time celeste já tem uma postura definida e faz um fenomenal inicio de temporada. já o Peixe, tá
