  - A ibogaína e sua origem, conheça! A Ibogaína é um arbusto com raízes com mais de 1,50 m de altura e composto de várias
    espécies. É usada no tratamento com ibogaína para dependência química e é encontrada em Camarões, Gabão, República Centro-Africana,
    Congo, etc. É um alcalóide psicoativo indolente que vem do "caule raiz" de uma planta africana. A Ibogaína é apenas um
    dos 12 alcalóides que compõem o "Iboga Tavernant". A Ibogaína também tem sido utilizada para o tratamento de doenças.
    O Gabão é um dos países mais prósperos da África por causa de sua densidade populacional e riqueza petrolífera. O Gabão
    tem uma população de 1,5 milhões de habitantes. Oitenta por cento da população fala francês. A religião Bwiti foi criada
    pelos babuínos e o uso do ibogaína foi descoberto há 1.000 anos. QUAIS SÃO AS VANTAGENS DO USO DE IBOGAÍNA? A Ibogaína
    foi reconhecida como eficaz no tratamento da dependência química e pode impedir a retirada de opiáceos. O tratamento ibogaína
    pode ser acompanhado por vômitos em algumas pessoas. O uso de Ibogaína pode ser prescrito mesmo em casos de depressão.
    É freqüentemente relatado que uma única experiência introspectiva depois de tomar ibogaína é considerada extremamente
    psicoterapêutica. O uso de ibogaína pode ajudar a aliviar traumas passados, medos, responsabilidades, relacionamentos
    com pais e filhos, etc. A Ibogaína estimula mudanças profundas na vida diária, no comportamento e na dinâmica pessoal.
    É tão importante quanto o tratamento com Ibogaína seguir o protocolo recomendado para garantir o resultado esperado. QUAL
    É O EFEITO ALUCINÓGENO DA IBOGAÍNA? Significa que estimula a mente a sonhar os chamados sonhos REM dormem, mesmo que a
    pessoa esteja consciente. Esta condição é chamada de "sonhar" porque ocorre sem perda de consciência, sem modificação
    da percepção do ambiente, sem ilusões, sem perda de pensamento, sem despersonalização. Os alucinógenos, por sua vez, mostram
    seus efeitos com os olhos abertos, enquanto a ibogaína com seus olhos fechados. Segundo o Dr. Carl Anderson do Hospital
    MacLean, uma filial da Universidade de Harvard, este efeito induzido pelo sono será responsável pela antidependência da
    ibogaína, que restaura às pessoas com deficiência psicótica o poder curativo do sono e do sono. Como o sono é usado para
    reorganizar idéias e pensamentos, é fácil entender por que um sonho acordado sobre uma ibogaína faz com que o cérebro
    se recupere. É importante notar que Dramin, um medicamento amplamente prescrito por médicos em doses terapêuticas, também
    é um alucinógeno e é amplamente utilizado na população, ou em outros momentos, é adquirido sem receita médica. A ANVISA,
    Agência Nacional de Controle Sanitário, considera um produto herbal que é usado pela população há mais de 30 anos, sem
    adição de produtos químicos, e pode ser vendido desidratado ou na forma de pó (cápsulas). De acordo com esta descrição,
    a ibogaína pode ser formalizada como tal, uma vez que há relatos de que é utilizada há cerca de 50 anos para a dependência
    química e não foram adicionados produtos químicos à sua composição. Não há registros na ANVISA sobre a ibogaína, ela permite
    a importação desse fitoterápico segundo o Decreto de Lei 8077/2013, Art. 10, § 2º Segundo a Constituição Federal de 1988,
    art. 5º, inciso XXXIX "não há crime sem lei anterior que o defina, nem pena sem prévia cominação legal". Assim sendo,
    pelo princípio da legalidade, ninguém é proibido de fazer algo que a lei não proíba. Dessa maneira, nada impede que usufruamos
    dos benefícios que a ibogaína oferece no tratamento de dependentes químicos. A Ibogaína é alucinógena? Descubra... A IBOGAÍNA
    É ALUCINÓGENA? Não. Ela é onirofrênica ou remogênica. Isso significa que ela estimula a mente de maneira que o cérebro
    sonhe o chamado sonho REM, mesmo que o indivíduo esteja … Descubra o que você ainda não sabe sobre a Ibogaína! Muitos
    de nossos pacientes e seus familiares que fizeram o tratamento com ibogaína e conheceram os efeitos no tratamento da dependência
    química são repentinamente questionados sobre uma questão … Conte com o nosso tratamento com ibogaína! A Ibogaína é uma
    excelente substância para vários medicamentos, tais como o tratamento de dependência química. As pessoas descobriram esta
    realidade e estão interessadas neste modelo de …
