  - source_sentence: 'Farida e a luta das mulheres contra o Daesh – A CONTRADIÇÃO Folheava eu numa manhã uma revista Visão
      de Março1, quando me deparei com a história surpreendente de Farida. Trata-se de uma jovem yazidi (uma minoria étnica
      que vive isolada no Iraque, na Síria e na Turquia) que foi raptada pelo Daesh e vendida com escrava sexual. Esteve 4
      meses à mercê do maquiavelismo destes mortos-vivos do auto-proclamado Califado. No meio do desespero, face ao conflito
      entre a violência dos actos perpetrados pelos guerrilheiros que sofria e os valores morais e religiosos tidos como primordiais,
      esta jovem de 18 anos chegou a tentar o suicídio três vezes. O pensamento que a tranquilizava para cometer tal acto
      era o de poder morrer de forma imaculada. Porque na sua comunidade, as raparigas são estigmatizadas por serem violadas!
      Graças ao seu historial de epilepsia que assustava os homens, conseguia ficar junto da sua amiga Evin, que quando Farida
      foi comprada, decidiu voluntariar-se numa atitude solidária para com a amiga. Farida confessa que, actualmente, ainda
      vive com medo do Daesh. Algo perfeitamente compreensível, dado que esta experiência brutal tornou-se uma parte dela,
      temendo até pela família que está no Iraque. Encontra-se no presente, curiosamente, bem integrada na Alemanha: [a integração
      foi] "Muito boa. Os europeus são muito meus amigos. Estou-lhes muito grata por poder viver aqui". Faz a vida de uma
      jovem mulher "normal", usando o seu smartphone e as redes sociais. Deseja ser professora de matemática na Alemanha,
      pois considera muito perigoso voltar para o Iraque. Esta história diz respeito a um crime de guerra e foi escolhida
      por se tratar de uma jovem mulher, vendida como um pedaço de carne e submetida aos piores dos abusos, chegando ao ponto
      de querer terminar com a sua vida de sofrimento intenso. Mas mais que isso! É também uma história de coragem e resistência,
      de lidar com conflitos poderosos entre um mundo interior rígido e um mundo exterior dominado pelo ódio e pela violência.
      Ao falar de resistência, das mulheres e do Daesh, não se pode deixar de assinalar o papel fundamental das mulheres curdas
      na luta pela independência curda. Os curdos constituem aquela que é considerada a maior nação sem Estado, habitando
      zonas actualmente incluídas em territórios sob soberania turca, iraquiana, iraniana e síria. Com o objectivo de lutar
      pela auto-determinação do seu povo, formaram o Partido dos Trabalhadores do Curdistão (PKK), organização que reivindica
      a criação de um Estado e a obtenção de mais direitos culturais e políticos para os curdos2. O PKK aderiu à luta armada
      composta por unidades de guerrilha, algumas das quais onde são constituídas unicamente por mulheres, que atraídas pelos
      ideais feministas do partido aceitam fugir para as montanhas para combaterem. Um dos principais inimigos é o Daesh,
      que no Verão de 2014 lançou um assalto ao norte do Iraque, levando a que muitas mulheres combatentes tivessem de cortar
      os laços com a família3. Estas mulheres têm de estar sempre prontas para o combate. Não se encontram de todo protegidas,
      sendo que muitas já morreram na luta, nomeadamente, algumas das mais destemidas activistas do partido: Sakine Cansiz,
      fundadora do PKK; Fidan Dogan, representante do Congresso Nacional do Curdistão e Leyla Soylomez. As suas mortes decorreram
      numa altura em que a Turquia se preparava para retomar as negociações com Abudallah Ocalan (líder do PKK que fora condenado
      a prisão perpétua pelo Estado turco), para chegarem a um acordo de paz2. Mulheres activistas ligadas ao PKK de vários
      pontos do mundo, que tiveram oportunidade de contactar com várias activistas curdas em debates, fizeram parte de discussões
      sobre as reinvindicações culturais e políticas para a etnia curda. Reconhecem a convicção de um povo que luta pela sua
      independência, não esquecendo de enaltecer as mulheres tanto na luta, como na direcção de partidos2. Que estas narrativas
      reais nos façam meditar sobre a guerra e seus ditos danos colaterais, que como vimos, são autênticos atentados aos Direitos
      Humanos. Despertemos de vez para vulnerabilidade acrescida de se ser mulher, num mundo onde os seus direitos são escassos,
      onde o peso da sua educação, em determinadas etnias, é asfixiante e onde tantas se encontram a combater completamente
      desprotegidas e sem poder regressar às suas famílias. Valorizemos a importância de continuar a lutar com afinco pela
      afirmação do papel igualitário da mulher, estejamos nós num país qualquer oriental ou ocidental. Imagem: Kurdishstruggle
      – Kurdish YPG Fighters. Alguns direitos reservados. 1 – Revista Visão nº 1201 10/3 a 16/3/2016. 2- Vânia Martins – "O
      papel das mulheres curdas". in A Comuna. 13 de janeiro de 2013. 3- "Mulheres curdas lutam contra o Estado Islâmico".
      in SIC Notícias. 11 de maio de 2015. Com as etiquetas Daesh, Feminismo, Filipa Filipe'
