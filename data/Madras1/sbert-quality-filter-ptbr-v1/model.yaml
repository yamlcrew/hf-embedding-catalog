  - source_sentence: Um levantamento divulgado nesta semana pela Administração dos Portos de Paranaguá e Antonina (Appa) aponta
      que nunca foi exportada tanta soja por Paranaguá como no primeiro semestre de 2017. Entre janeiro e junho, foram escoadas
      6,7 milhões de toneladas do produto. "O Paraná obteve uma supersafra e o Porto do Paranaguá estava pronto para receber
      essa produção", disse o secretário de Infraestrutura e Logística, José Richa Filho. O desempenho dos primeiros seis
      meses de 2017 bateu o recorde do primeiro semestre de 2016, quando foram exportadas 6,4 milhões de toneladas. O aumento
      deste ano em relação ao ano passado é de 4%. O diretor-presidente da Appa, Luiz Henrique Dividino, explica que o resultado
      é fruto dos investimentos pesados feitos nos últimos anos, aliados à alta produção do Paraná em 2017. "Mais de R$ 620
      milhões foram investidos desde 2011 para atender à indústria e ao setor produtivo. Com isso, aumentamos a nossa produtividade
      em 33%", explica Dividino. Entre os investimentos, estão reformas do cais, substituição de equipamentos antigos por
      modernos e mais eficazes, trocas de equipamentos, campanhas de dragagem e novos processos automatizados, que dão mais
      agilidade e segurança às operações. SAFRA HISTÓRICA A primeira colheita de soja em 2017 foi recorde absoluto no Paraná.
      No total, 19,5 milhões de toneladas foram colhidas, número que representa 3 milhões a mais que o registrado no ano passado,
      que registrou 16,5 milhões de toneladas. O aumento foi de aproximadamente 19%. Os dados são do Departamento de Economia
      Rural (Deral). Segundo o economista do Deral, Marcelo Garrido, o recorde histórico neste ano se deve a diversos fatores,
      com destaque para o clima, a extrema organização das cooperativas agrícolas, o mercado e as boas condições de escoamento.
      "O que temos observado, atualmente, é que o Porto de Paranaguá está totalmente preparado e as condições de operação
      são mais que o suficiente para a exportação dos produtos paranaenses", comentou Garrido. MAIS INVESTIMENTOS O Porto
      de Paranaguá também acaba de inaugurar dois tombadores no silo público. Com a nova estrutura, a capacidade de descarga
      de caminhões vai praticamente dobrar. Antes das obras eram recebidos, em média, 400 caminhões por dia na área. Com os
      aportes, de R$ 22,2 milhões, a capacidade passa a ser de cerca de 700 caminhões por dia. Esses são os primeiros tombadores
      em silos públicos em operação no país, que tornam o descarregamento dos caminhões mais rápido e automatizado. FIM DAS
      FILAS Apesar do alto número de veículos de carga que descarregam em Paranaguá, que na época de safra chega a 2.500 por
      dia, os investimentos em logística eliminaram as filas de caminhões e longos períodos de espera para os caminhoneiros
      no Porto. Apenas neste ano, o Pátio de Triagem de Caminhões do Porto de Paranaguá recebeu 228.233 caminhões. O número
      corresponde a 4.565 veículos a mais que o número registrado no mesmo período do ano passado. "O mais importante é que
      conseguimos aumentar a produtividade do Porto e, consequentemente, o número de caminhões que descarregam em Paranaguá.
      Ao mesmo tempo, conseguimos zerar as filas que geravam transtornos para a cidade e para as movimentações de cargas",
      ressalta Dividino.
    sentences:
    - 'André Bandeira homenageia alunos que elaboraram livro sobre holocausto - Câmara de Vereadores de Piracicaba EM PIRACICABA
      (SP) 19 DE FEVEREIRO DE 2020 Obra foi escrita pelos estudantes da Escola Estadual "Professor Dr. João Chiarini", em
      forma de cartas e comunicados que reproduzem o contexto da Segunda Guerra Mundial. O vereador André Bandeira (PSDB)
      entregou, na manhã desta quarta-feira (19), voto de congratulações aos estudantes do 9º ano da Escola Estadual "Professor
      Dr. João Chiarini" em virtude da elaboração do livro "Holocausto: o passado vem à tona?". A obra foi escrita pelos próprios
      alunos, em forma de cartas e comunicados que reproduzem o contexto da Segunda Guerra Mundial. "Não podemos deixar de
      reconhecer essa iniciativa. Temos que relembrar muito esse acontecimento, para que nunca mais se repita com a humanidade",
      comentou André Bandeira, durante a entrega da homenagem. Daniel Rosenthal, que representou no ato a Federação Israelita
      do Estado de São Paulo, classificou a iniciativa dos estudantes de "emocionante". "Não podemos esquecer o que aconteceu.
      Saber que alunos dessa idade se interessam tanto pelo tema me deixa muito feliz!", afirmou. Segundo a professora de
      história Érica Santos, os alunos haviam mostrado interesse no projeto já no 7º ano, quando produziram livro com narrativas
      sobre a Idade Média. Naquele ano, os temas nazismo e Segunda Guerra Mundial despertaram a atenção dos estudantes, resultando
      na publicação de "Holocausto: o passado vem à tona?". O livro traz relatos fictícios dos alunos, que se colocaram na
      pele de perseguidos e perseguidores. As histórias simulam situações reais. "O objetivo foi dar chance aos alunos de
      compreenderem mais profundamente as consequências das perseguições promovidas pelo regime nazista e também para que
      pudessem dimensionar os efeitos da falta de respeito e tolerância, mostrando até que ponto os radicalismos aniquilam
      e destroem os indivíduos, as sociedades", comenta André Bandeira. O voto de congratulações contempla os alunos Aghata
      Fernanda dos Reis Raimundo, Aisha Tayane Tomaz dos Santos, Ana Beatriz Oliveira Perim, Ana Clecia Alves dos Santos,
      Ana Maria Brito Lopes da Silva, Andressa Angel de Souza, Andrey Gustavo Alves dos Santos, Bruna Ramos, Bruno Luiz da
      Silva, Carolina Santos Souza, Daniel Henrique Altarugio, Debora da Silva Prospero, Eduardo de Lima, Emilly Elidaria
      Oliveira da Silva, Gabriel Alexandre Nocetti Lima, Gabriel de Barros dos Santos, Gabriel Fontenele Carvalho, Gabriel
      Silva Ramos, Giulia Fernanda Fagionato, Graziela Vicente Salvanini, Guilherme Lucas Dantas Soares, Jennifer Camila Claudino,
      Karolyne Giacomelli Grer, Kayky Meneses Andrade, Lais de Sousa Pereira, Larissa Aquino de Sales, Lavinia Zelina Lima
      Alves, Leonardo Cabral Christofoletti, Lovana Aquino de Sales, Maisa Vitoria de Andrade Silva, Maraisa Grer Franco,
      Maria Eduarda Brambila Nascimento, Maria Eduarda Conceição Eugenio, Mariana Carolaine de Souza, Matheus Pereira da Silva,
      Nicole Rolim, Polianna Joos Pedrassi, Raissa Alves Arcanjo, Rayene Soares Sarvas, Rebeca Cavalcante Ferreira, Ricardo
      Carvalho Silva, Sabrina Cristiane Anselmo da Rosa, Sarah Fernanda de Souza Costa, Sarah Fernandes Braga, Thamiris Barros
      da Silva, Valquer Yuri Alves, Victor Waldyr Noronha Moraes, Vitor Gabriel de Moraes Pedrassi, Vivian Bronze Aguiar,
      Whandebeghe Galdino de Lira, William Gabriel Goncalves Filho e Yasmin Cachenco Villa de Camargo. A homenagem também
      é estendida às professoras Érica Aparecida de Fátima dos Santos, Thaís Cairo Santana e Mirian da Cunha Mello, ao coordenador
      pedagógico Marcelo Fernandes e à diretora Giane Silva Escobar.'
    - 'São Paulo - SP Histórico Ao tempo da fundação de São Paulo, o setor norte era povoado por duas tribos da nação Tupi:
      a dos Guarulhos, da família dos Guaianases, que dominavam a margem direita do Rio Tietê e outra a do Uraraí, ocupando
      a margem oposta, desde a Penha até São Miguel. E, em 1560, pela necessidade de defesa e para favorecer a catequese,
      os Jesuítas concentraram as duas tribos, formando aldeias de Conceição dos Guarulhos e São Miguel, cada uma à sua margem,
      cerca de um quilômetro do Tietê. Próximo a São Miguel, em reconhecimento aos trabalhos prestados na formação dessa aldeia,
      foi concedida ao Padre João Alvares uma sesmaria, onde este pároco construiu uma capela sob invocação de Nossa Senhora
      D?Ajuda. Anos mais tarde, os desentendimentos entre jesuítas e donatários das terras adjacentes às aldeias, provocaram
      um certo abandono de São Miguel, vindo seus missionários e gentios a se fixarem junto à capela de Nossa Senhora D?Ajuda.
      Apesar de colonização antiga e de possuir uma rústica povoação onde foi criada a freguesia de Itaquaquecetuba em 1838,
      o núcleo urbano somente foi efetivado no início do século XX, quando os padres responsáveis pela administração dos bens
      da igreja venderam, em 1910, parte das terras a José Monteiro Diogo, João Augusto de Miranda, Joaquim Pedro Fagundes,
      Cândido Alves, Benedito Rodrigues de Godoy e Carlos Alexandrino de Morais. Inicialmente dedicados à agricultura de subsistência,
      os povoadores introduziram outras atividades, principalmente a partir da instalação de uma estação ferroviária em 1925,
      na variante de Moji das Cruzes da Estrada de Ferro Central do Brasil. Nessa época, começaram a exploração vegetal para
      produção de carvão e, devido à afluência de novos moradores, foram instaladas várias olarias de grande significado econômico
      para o município que foi criado em 1953. O topônimo indígena Itaquaquecetuba, que significa ?abundância de taquaras
      que cortam?, deve-se à existência, na época da fundação da aldeia, de imenso taquaral, margeando os rios Tietê e Tipóia.
      Gentílico: itaquaquecetubano Formação Administrativa Distrito criado com a denominação de Itaquaquecetuba, pela Lei
      Provincial n.º 17, de 28-02-1838, subordinado ao município de Mogi das Cruzes. Em divisão administrativa do Brasil referente
      ao ano de 1911, o distrito de Itaquaquecetuba, figura no município de Moji das Cruzes. Assim permanecendo em divisão
      territorial datada de 1-VII-1950. Elevado à categoria de município com a denominação de Itaquaquecetuba, pela Lei Estadual
      n.º 2.456, de 30-11-1953, desmembrado do município de Moji das Cruzes (ex-Mogi das Cruzes). Sede no antigo distrito
      de Itaquaquecetuba. Constituído do distrito sede. Instalado em 01-01-1954. Em divisão territorial datada de 1-VII-1960,
      o município é constituído do distrito sede. Assim permanecendo em divisão territorial datada de 2009. Fonte: Itaquaquecetuba
      (SP). 2010. Prefeitura. Data de atualização: 06/09/2013 Site: www.entrei.net'
    - 'Em Minas vitória gorda, em Santos vitória magra. - Futebol & Variedades Em Minas vitória gorda, em Santos vitória magra.
      Wilson Oliveira 11:08 (Atacante Guilherme comemora o primeiro gol do time). Condutor de uma regularidade incrível que
      vem sendo construída na temporada 2008, o Cruzeiro detonou mais um adversário no Mineirão. Sem dó nem piedade, a Raposa
      fez o Caracas engolir três gols. Em casa o time azul celeste assegura os 100% de aproveitamento. Na noite desta terça-feira,
      enquanto fazia um trabalho da faculdade, me guardei no direito de ouvir a transmissão do jogo entre Cruzeiro e Caracas
      pela radio Globo - MG. E pude constatar o que já venho percebendo através do que os amigos mineiros vêm descrevendo.
      O time não possui essa seqüência de vitórias à toa. Numa triangulação envolvente, com boa troca de passes entre os atacantes,
      Wagner lançou para Guilherme que tocou na saída do goleiro. A Raposa garantia a primeira estufada de rede logo aos nove
      minutos do primeiro tempo. No decorrer da partida, o Caracas não conseguia resistir e o Cruzeiro se aproveitava e se
      lançava o tempo todo ao ataque. Inferior na partida, o time venezuelano apelava para a tática da linha do impedimento
      na defesa. Por diversas vezes os atacantes cruzeirenses não conseguiam se desvencilhar da linha, mas aos 28 minutos,
      a linha pecou pela burrice e ao Cruzeiro, restou fazer o segundo com Ramires, que recebeu passe de Moreno e marcou.
      Foi o quinto gol do volante só na Libertadores, que vem mostrando ser um jogador moderno na posição e com atuações cada
      vez mais sólidas. Bom no desarme e presente no ataque. Além de evitar gols do adversário, ajuda o time a conquistar
      as vitórias marcando gols. Melhor, impossível! Com dois a zero no placar, a nação azul já começava a provocar o Atlético,
      visando o clássico que acontecerá nesse final de semana pelo Mineiro. Com a natural tranqüilidade dos donos da casa,
      o time visitante conseguiu duas chances de gol, mas foram desperdiçadas. No segundo tempo, repetição do primeiro. Logo
      no inicio, o Cruzeiro quase marcou o terceiro com Moreno, que aparecia bastante durante o jogo, sendo opção e distribuindo
      bem as jogadas e lá trás a defesa se segurava bem com investidas esporádicas do time do atacante Rentería, que sentia
      a falta de um companheiro nas jogadas de ataque. Para confirmar sua qualidade e fechar com chave de ouro (embora fosse
      cedo, 18 minutos), Marcelo Moreno recebeu lançamento de Marcinho, passou pelo zagueiro, na seqüência limpou o goleiro
      e tocou para o gol vazio, fazendo os quase 40 mil pagantes explodirem em alegria. Estava formado o placar de 3x0 e Adilson
      Baptista sabia que só uma catástrofe faria o resultado ficar adverso. Além de jogar bem, o Cruzeiro enfrentava um adversário
      que estava muito mal e tranquilamente pode-se dizer que aquele jogo deveria ter tido um placar mais elástico. Definitivamente,
      A Raposa tem tudo para ser um bicho papão nessa temporada de 2008. (jogadores do Cruzeiro comemoram o tereiro gol).
      CABEÇA AGORA ESTÁ NO CLÁSSICO. Logo na saída de campo, os jogadores externavam o espírito que é preciso ter, quando
      se disputa duas competições paralelas. Ontem foi dia de um jogo importantíssimo e domingo será a vez de outro jogo de
      tamanha importância para as pretensões cruzeirenses. Raposa e Galo irão duelar, e sobre isso se resumiram as entrevistas
      na saída de campo na noite de ontem: "Tem que ser assim, tem que ter um algo a mais no clássico, senão a gente não consegue
      a vitória, tem que ter espírito de mais garra, mais determinação, mais sangue azul para a gente conseguir, se Deus quiser
      sai essa vitória no fim-de-semana". Discursou o goleiro Fábio. "Muita garra, vontade; todo mundo sabe das dificuldades
      do jogo, temos que nos preparar bastante para ganhar esse jogo". Disse o zagueiro Thiago Heleno. O Cruzeiro é o líder
      do campeonato Mineiro, e domingo estará na defesa da liderança contra seu maior rival às 16hs no estádio Mineirão. SANTOS
      FICA SÓ NO UM A ZERO. Dentro de seus domínios, o Santos teve dificuldades para vencer o Chivas Guadalajara – MEX. No
      inicio do primeiro tempo, o time mexicano não conseguia impor uma boa marcação aos jogadores santistas, mas no decorrer
      do jogo isso foi se acertando. Já a equipe de Emerson Leão, dependia dos lampejos do colombiano Molina para fazer boas
      jogadas. E como não podia deixar de ser, aos 22, Molina limpou a jogada tirando um zagueiro e mandando um verdadeiro
      torpedo para gol, impossibilitando a defesa para o goleiro Luis Michel, que estava adiantado. Este foi o gol único da
      partida. (Molina comemora o gol homenageando o filho que irá nascer no Brasil) No segundo tempo, não mudou muita coisa.
      Sem conseguir se lançar ao ataque com qualidades, o time santista acabou recuando em demasia e só criava jogadas ofensivas
      na base dos chutões. Já o Chivas, esteve bem próximo da empatar a partida criando algumas condições de gol que foram
      sendo desperdiçadas uma atrás da outra. A de se salientar também que o Goleiro Fábio Costa, mais uma vez foi importante
      na vitória do time. Essa foi a 22ª vitória do Peixe em 29 jogos da Libertadores disputados na Vila Belmiro. O próximo
      adversário na competição será o San José na Bolívia dia 19. Em Minas vitória gorda, em Santos vitória magra. Reviewed
      by Wilson Oliveira on 11:08 Rating: 5 O Cruzueiro tá fazendo um excelente Campeonato Mineiro e vai fazer bonito na Libertadores...
      Valeu, Wilson!!! 5 de março de 2008 13:52 Não vi o jogo do Cruzeiro, mas vi o do Santos. O time celeste já tem uma postura
      definida e faz um fenomenal inicio de temporada. já o Peixe, tá ainda procurando sua melhor forma de jogar, mas conseguiu
      um excelente resultado ontem, que deve ajudar e muito na classificação a fase seguinte. 5 de março de 2008 13:56 Apesar
      de não conhecer as duas equipas, tradicionalmente as equipas mexicanas são muito mais complicadas que as venezuelanas,
      daí não estranhar os resultados de Santos e Cruzeiro. 5 de março de 2008 15:19 A diretoria do Santos vai esperar o Santos
      ser eliminado na Libertadores pra se mexer. Tá na cara que esse time num vai pra frente. Maneiro o blog, dps passa no
      meu tb. 5 de março de 2008 22:30 Opa tudo bem aeee... eita se o meu time da ruim tipo vai e não vai..o santos eu não
      sei de nada, rs, acho que a diretoria ta esperando um milagre pra arrumar o time rs... e vc como tah?? 6 de março de
      2008 09:53 Ok, colocarei um link no meu sim! 6 de março de 2008 11:14 dilson Batista resolveu um rpoblema que era cronico
      no Cruzeiro, a defesa, Bom o time celeste, já o Santos vai ter que rebolar!Abração *Adilson Batista! Resultado importantíssimo
      para ambos os clubes. O Cruzeiro segue em ótima fase, e o Santos continua tentando crescer aos trancos e barrancos.
      Pelo menos na Libertadores parece que vai chegar sem grandes dificuldades à segunda fase. Já no Paulista... 6 de março
      de 2008 14:38 Belo gol de Molina e os brasileiros vão muito bem na Libertadores. Todos devem avançar para as oitavas-de-final.
      6 de março de 2008 15:43 Quase perco o bonde W.Hebert, mas ainda peguei.... Ótima e importante vitória celeste que dá
      ainda mais confiança e tranqüilidade ao time na Libertadores. Grato pelo ótimo post sobre o Maior de MInas. 7 de março
      de 2008 18:51 Mudanças no blog e comentários da rodada Santos se aproxima da vaga e Timão se afasta. Parabens Galo,
      pelos 100 anos!!! Covers que deram certo. Do berço para a Europa. Globo/católicos x Record/evangélicos Está proibido
      tirar a camisa do Flamengo! Meme. Entrevista. Porco atrapalha escalada da Macaca. Importado do The New York Times Um
      clássico. Dois rivais. Nenhum gol. Iron Maiden. Heavy Metal & futebol! Vexame rubro-negro no Uruguai. PARABENS AO CRAQUE!
      Choro e muita disputa no clássico paulista. Morre o radialista Haroldo de Andrade.'
