    de Barros dos Santos, Gabriel Fontenele Carvalho, Gabriel Silva Ramos, Giulia Fernanda Fagionato, Graziela Vicente Salvanini,
    Guilherme Lucas Dantas Soares, Jennifer Camila Claudino, Karolyne Giacomelli Grer, Kayky Meneses Andrade, Lais de Sousa
    Pereira, Larissa Aquino de Sales, Lavinia Zelina Lima Alves, Leonardo Cabral Christofoletti, Lovana Aquino de Sales, Maisa
    Vitoria de Andrade Silva, Maraisa Grer Franco, Maria Eduarda Brambila Nascimento, Maria Eduarda Conceição Eugenio, Mariana
