    Batista resolveu um rpoblema que era cronico no Cruzeiro, a defesa, Bom o time celeste, já o Santos vai ter que rebolar!Abração
    *Adilson Batista! Resultado importantíssimo para ambos os clubes. O Cruzeiro segue em ótima fase, e o Santos continua
    tentando crescer aos trancos e barrancos. Pelo menos na Libertadores parece que vai chegar sem grandes dificuldades à
