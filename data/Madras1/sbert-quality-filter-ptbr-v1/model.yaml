- source_sentence: Um levantamento divulgado nesta semana pela Administração dos Portos de Paranaguá e Antonina (Appa) aponta
    que nunca foi exportada tanta soja por Paranaguá como no primeiro semestre de 2017. Entre janeiro e junho, foram escoadas
    6,7 milhões de toneladas do produto. "O Paraná obteve uma supersafra e o Porto do Paranaguá estava pronto para receber
    essa produção", disse o secretário de Infraestrutura e Logística, José Richa Filho. O desempenho dos primeiros seis meses
    de 2017 bateu o recorde do primeiro semestre de 2016, quando foram exportadas 6,4 milhões de toneladas. O aumento deste
    ano em relação ao ano passado é de 4%. O diretor-presidente da Appa, Luiz Henrique Dividino, explica que o resultado é
    fruto dos investimentos pesados feitos nos últimos anos, aliados à alta produção do Paraná em 2017. "Mais de R$ 620 milhões
    foram investidos desde 2011 para atender à indústria e ao setor produtivo. Com isso, aumentamos a nossa produtividade
    em 33%", explica Dividino. Entre os investimentos, estão reformas do cais, substituição de equipamentos antigos por modernos
    e mais eficazes, trocas de equipamentos, campanhas de dragagem e novos processos automatizados, que dão mais agilidade
    e segurança às operações. SAFRA HISTÓRICA A primeira colheita de soja em 2017 foi recorde absoluto no Paraná. No total,
    19,5 milhões de toneladas foram colhidas, número que representa 3 milhões a mais que o registrado no ano passado, que
    registrou 16,5 milhões de toneladas. O aumento foi de aproximadamente 19%. Os dados são do Departamento de Economia Rural
    (Deral). Segundo o economista do Deral, Marcelo Garrido, o recorde histórico neste ano se deve a diversos fatores, com
    destaque para o clima, a extrema organização das cooperativas agrícolas, o mercado e as boas condições de escoamento.
    "O que temos observado, atualmente, é que o Porto de Paranaguá está totalmente preparado e as condições de operação são
    mais que o suficiente para a exportação dos produtos paranaenses", comentou Garrido. MAIS INVESTIMENTOS O Porto de Paranaguá
    também acaba de inaugurar dois tombadores no silo público. Com a nova estrutura, a capacidade de descarga de caminhões
    vai praticamente dobrar. Antes das obras eram recebidos, em média, 400 caminhões por dia na área. Com os aportes, de R$
    22,2 milhões, a capacidade passa a ser de cerca de 700 caminhões por dia. Esses são os primeiros tombadores em silos públicos
    em operação no país, que tornam o descarregamento dos caminhões mais rápido e automatizado. FIM DAS FILAS Apesar do alto
    número de veículos de carga que descarregam em Paranaguá, que na época de safra chega a 2.500 por dia, os investimentos
    em logística eliminaram as filas de caminhões e longos períodos de espera para os caminhoneiros no Porto. Apenas neste
    ano, o Pátio de Triagem de Caminhões do Porto de Paranaguá recebeu 228.233 caminhões. O número corresponde a 4.565 veículos
    a mais que o número registrado no mesmo período do ano passado. "O mais importante é que conseguimos aumentar a produtividade
    do Porto e, consequentemente, o número de caminhões que descarregam em Paranaguá. Ao mesmo tempo, conseguimos zerar as
    filas que geravam transtornos para a cidade e para as movimentações de cargas", ressalta Dividino.
  sentences:
  - 'André Bandeira homenageia alunos que elaboraram livro sobre holocausto - Câmara de Vereadores de Piracicaba EM PIRACICABA
    (SP) 19 DE FEVEREIRO DE 2020 Obra foi escrita pelos estudantes da Escola Estadual "Professor Dr. João Chiarini", em forma
    de cartas e comunicados que reproduzem o contexto da Segunda Guerra Mundial. O vereador André Bandeira (PSDB) entregou,
    na manhã desta quarta-feira (19), voto de congratulações aos estudantes do 9º ano da Escola Estadual "Professor Dr. João
    Chiarini" em virtude da elaboração do livro "Holocausto: o passado vem à tona?". A obra foi escrita pelos próprios alunos,
    em forma de cartas e comunicados que reproduzem o contexto da Segunda Guerra Mundial. "Não podemos deixar de reconhecer
    essa iniciativa. Temos que relembrar muito esse acontecimento, para que nunca mais se repita com a humanidade", comentou
    André Bandeira, durante a entrega da homenagem. Daniel Rosenthal, que representou no ato a Federação Israelita do Estado
    de São Paulo, classificou a iniciativa dos estudantes de "emocionante". "Não podemos esquecer o que aconteceu. Saber que
    alunos dessa idade se interessam tanto pelo tema me deixa muito feliz!", afirmou. Segundo a professora de história Érica
    Santos, os alunos haviam mostrado interesse no projeto já no 7º ano, quando produziram livro com narrativas sobre a Idade
    Média. Naquele ano, os temas nazismo e Segunda Guerra Mundial despertaram a atenção dos estudantes, resultando na publicação
    de "Holocausto: o passado vem à tona?". O livro traz relatos fictícios dos alunos, que se colocaram na pele de perseguidos
    e perseguidores. As histórias simulam situações reais. "O objetivo foi dar chance aos alunos de compreenderem mais profundamente
    as consequências das perseguições promovidas pelo regime nazista e também para que pudessem dimensionar os efeitos da
    falta de respeito e tolerância, mostrando até que ponto os radicalismos aniquilam e destroem os indivíduos, as sociedades",
    comenta André Bandeira. O voto de congratulações contempla os alunos Aghata Fernanda dos Reis Raimundo, Aisha Tayane Tomaz
    dos Santos, Ana Beatriz Oliveira Perim, Ana Clecia Alves dos Santos, Ana Maria Brito Lopes da Silva, Andressa Angel de
    Souza, Andrey Gustavo Alves dos Santos, Bruna Ramos, Bruno Luiz da Silva, Carolina Santos Souza, Daniel Henrique Altarugio,
