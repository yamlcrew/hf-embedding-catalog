  - source_sentence: 'No último dia da sexta visita oficial ao Rio da comitiva do Comitê Olímpico Internacional (COI), encerrada
      nesta sexta-feira, a entidade voltou a admitir progressos da cidade na sua preparação para abrigar a Olimpíada de 2016,
      mas exibiu preocupação com o fato de os gastos previstos para o grande evento ainda estarem em fase de definição dos
      responsáveis pelos mesmos em vários setores. No final de janeiro, a Autoridade Pública Olímpica (APO) apresentou a Matriz
      de Responsabilidades dos Jogos Olímpicos, documento que detalha a participação de cada nível de governo (municipal,
      estadual e federal), informando que fez uma previsão de gastos iniciais de R$ 5,64 bilhões com obras essenciais para
      a realização da competição. Porém, o documento que lista todas as intervenções necessárias para realização da Olimpíada
      prevê a execução total de 52 projetos e, naquela ocasião, menos da metade deles (24) já tinha orçamento ou custos definidos.
      Nawal El Moutawakel, presidente da Comissão de Coordenação do COI, abriu a entrevista coletiva concedida por membros
      da entidade e do Comitê Rio-2016 nesta sexta com um discurso positivo. "Nossa visita foi muito intensa, profissional
      e gratificante. Recebemos muitas informações e ficamos muito felizes com o progresso desde a última visita, em setembro
      de 2013", disse a marroquina. Ao mesmo tempo, porém, Nawal apontou que uma reunião, marcada para o próximo dia 27, em
      Brasília, com representante de todos os níveis de governo e do Comitê Rio-2016, é vista como "crucial" para o COI, que
      não contará com nenhum integrante presente neste encontro na capital federal. Ao ser questionado sobre a razão de a
      reunião ser tão importante, Gilbert Felli, diretor executivo do COI para Jogos Olímpicos, foi enfático e deu um recado
      aos organizadores do evento. "É crucial porque os diferentes parceiros e níveis de governo ainda não chegaram a uma
      decisão final sobre a Matriz de Responsabilidades. Chegamos a um momento em que precisa se definir quem vai assumir
      o quê, porque isso pode impactar nos prazos", ressaltou. Ao comentar sobre a questão do legado que os Jogos do Rio deveriam
      deixar, Felli também foi duro ao dizer: "Não é responsabilidade do COI discutir investimentos e legados. Isso é preocupação
      dos governos. Estamos preocupados com os prazos". Presidente do Comitê Rio-2016 e do Comitê Olímpico Brasileiro, Carlos
      Arthur Nuzman procurou minimizar o peso das cobranças feitas pelo COI ao também ser questionado sobre a reunião do próximo
      dia 27. "Essas reuniões são permanentes, com as com a Casa Civil, com o Ministério do Esporte, com o governo do Estado.
      Não são questões exclusivas, é só para acompanhar o desenvolvimento dos Jogos", disse o dirigente, que depois ressaltou:
      "Ela (a reunião) é crucial porque todas são, e essa será uma logo após a reunião de coordenação (realizada nesta semana
      com o COI)". SEGURANÇA - O assunto segurança do Rio, que vive uma situação preocupante neste aspecto atualmente, também
      foi abordado pelos membros do COI nesta sexta. Na última quinta-feira à noite, Unidades de Polícia Pacificadora (UPPs)
      que ficam na zona norte da cidade foram atacadas por bandidos e o fato motivou o governador Sérgio Cabral (PMDB) e o
      secretário de Estado de Segurança, José Mariano Beltrame, a pedirem o envio de tropas federais para garantir a segurança
      na capital fluminense. "Segurança é prioridade na nossa agenda, não apenas para o COI, mas para todos os níveis de governo.
      Estamos tristes pelo que aconteceu, mas tenho certeza que o governo está atento", disse Nawal, que ainda exibiu confiança
      de que a Baia de Guanabara, afetada pela poluição, estará pronta para receber, em agosto, o seu primeiro evento-teste
      (em uma prova de vela) para os Jogos. "Nos foi dado garantia e estamos confiantes de que a Baia estará limpa. Nós não
      vamos nos perdoar se não entregarmos um lugar seguro para os atletas", completou.'
