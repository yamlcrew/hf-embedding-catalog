- source_sentence: 'Farida e a luta das mulheres contra o Daesh – A CONTRADIÇÃO Folheava eu numa manhã uma revista Visão de
    Março1, quando me deparei com a história surpreendente de Farida. Trata-se de uma jovem yazidi (uma minoria étnica que
    vive isolada no Iraque, na Síria e na Turquia) que foi raptada pelo Daesh e vendida com escrava sexual. Esteve 4 meses
    à mercê do maquiavelismo destes mortos-vivos do auto-proclamado Califado. No meio do desespero, face ao conflito entre
    a violência dos actos perpetrados pelos guerrilheiros que sofria e os valores morais e religiosos tidos como primordiais,
    esta jovem de 18 anos chegou a tentar o suicídio três vezes. O pensamento que a tranquilizava para cometer tal acto era
    o de poder morrer de forma imaculada. Porque na sua comunidade, as raparigas são estigmatizadas por serem violadas! Graças
    ao seu historial de epilepsia que assustava os homens, conseguia ficar junto da sua amiga Evin, que quando Farida foi
    comprada, decidiu voluntariar-se numa atitude solidária para com a amiga. Farida confessa que, actualmente, ainda vive
    com medo do Daesh. Algo perfeitamente compreensível, dado que esta experiência brutal tornou-se uma parte dela, temendo
    até pela família que está no Iraque. Encontra-se no presente, curiosamente, bem integrada na Alemanha: [a integração foi]
    "Muito boa. Os europeus são muito meus amigos. Estou-lhes muito grata por poder viver aqui". Faz a vida de uma jovem mulher
    "normal", usando o seu smartphone e as redes sociais. Deseja ser professora de matemática na Alemanha, pois considera
    muito perigoso voltar para o Iraque. Esta história diz respeito a um crime de guerra e foi escolhida por se tratar de
    uma jovem mulher, vendida como um pedaço de carne e submetida aos piores dos abusos, chegando ao ponto de querer terminar
    com a sua vida de sofrimento intenso. Mas mais que isso! É também uma história de coragem e resistência, de lidar com
    conflitos poderosos entre um mundo interior rígido e um mundo exterior dominado pelo ódio e pela violência. Ao falar de
    resistência, das mulheres e do Daesh, não se pode deixar de assinalar o papel fundamental das mulheres curdas na luta
    pela independência curda. Os curdos constituem aquela que é considerada a maior nação sem Estado, habitando zonas actualmente
    incluídas em territórios sob soberania turca, iraquiana, iraniana e síria. Com o objectivo de lutar pela auto-determinação
    do seu povo, formaram o Partido dos Trabalhadores do Curdistão (PKK), organização que reivindica a criação de um Estado
    e a obtenção de mais direitos culturais e políticos para os curdos2. O PKK aderiu à luta armada composta por unidades
    de guerrilha, algumas das quais onde são constituídas unicamente por mulheres, que atraídas pelos ideais feministas do
    partido aceitam fugir para as montanhas para combaterem. Um dos principais inimigos é o Daesh, que no Verão de 2014 lançou
    um assalto ao norte do Iraque, levando a que muitas mulheres combatentes tivessem de cortar os laços com a família3. Estas
    mulheres têm de estar sempre prontas para o combate. Não se encontram de todo protegidas, sendo que muitas já morreram
    na luta, nomeadamente, algumas das mais destemidas activistas do partido: Sakine Cansiz, fundadora do PKK; Fidan Dogan,
    representante do Congresso Nacional do Curdistão e Leyla Soylomez. As suas mortes decorreram numa altura em que a Turquia
    se preparava para retomar as negociações com Abudallah Ocalan (líder do PKK que fora condenado a prisão perpétua pelo
    Estado turco), para chegarem a um acordo de paz2. Mulheres activistas ligadas ao PKK de vários pontos do mundo, que tiveram
    oportunidade de contactar com várias activistas curdas em debates, fizeram parte de discussões sobre as reinvindicações
    culturais e políticas para a etnia curda. Reconhecem a convicção de um povo que luta pela sua independência, não esquecendo
    de enaltecer as mulheres tanto na luta, como na direcção de partidos2. Que estas narrativas reais nos façam meditar sobre
    a guerra e seus ditos danos colaterais, que como vimos, são autênticos atentados aos Direitos Humanos. Despertemos de
    vez para vulnerabilidade acrescida de se ser mulher, num mundo onde os seus direitos são escassos, onde o peso da sua
    educação, em determinadas etnias, é asfixiante e onde tantas se encontram a combater completamente desprotegidas e sem
    poder regressar às suas famílias. Valorizemos a importância de continuar a lutar com afinco pela afirmação do papel igualitário
    da mulher, estejamos nós num país qualquer oriental ou ocidental. Imagem: Kurdishstruggle – Kurdish YPG Fighters. Alguns
    direitos reservados. 1 – Revista Visão nº 1201 10/3 a 16/3/2016. 2- Vânia Martins – "O papel das mulheres curdas". in
    A Comuna. 13 de janeiro de 2013. 3- "Mulheres curdas lutam contra o Estado Islâmico". in SIC Notícias. 11 de maio de 2015.
    Com as etiquetas Daesh, Feminismo, Filipa Filipe'
  sentences:
  - Os meus parabéns a todos os atletas olímpicos. Todos os resultados foram bons. Eles conquistaram o passaporte para irem
    a Pequim. Foram por mérito próprio. Enquanto os jornalistas que lá foram, talvez mais do dobro que o número dos atletas,
    não foram lá por mérito pessoal de resultados esforçados a correr ou a lutar em estádios desportivos. E isto já farta.
    Sempre a denegrirem os atletas, quando o máximo que os portugueses conseguem é estar no sofá a beber minis com tremoços
    e a deseducar os filhos.
  - 'Aulas diárias com Especialistas – Informática, Educação Física, Música, Educação Socioemocional e Inglês, para o Jardim
    II e Pré. Do 1º ao 5º ano, Educação Financeira, literatura e Filosofia, Educação Socioemocional e Robótica. E duas vezes
    por semana Música para o Maternal. UNIFORME – Uso diário obrigatório, do uniforme COMPLETO. Solicitamos que todas as peças
    sejam identificadas, pois o colégio não se responsabiliza por eventuais perdas. BRINQUEDOS – Por seu significado afetivo
    / lúdico serão sempre bem-vindos e utilizados, como parte integrante do trabalho pedagógico para o seguimento de Maternal
    e Jardim I, na roda de novidades desde que não sejam eletrônicos. Pedimos gentilmente que atentem-se e não encaminhem
    brinquedos de grande valor financeiro ou afetivo, não nos responsabilizamos por perdas ou danos.Para o segmento de Jardim
    II ao 5º ano somente às 6ª Feiras. AGENDAS – Deverão ser visitadas diariamente, pelos pais e todos os bilhetes, devidamente
    assinados. Toda e qualquer prescrição médica e dosagem de remédios deverão ser anotados corretamente, com aposição da
    assinatura legível dos responsáveis. A escola não se responsabiliza por dinheiro ou qualquer tipo de pagamento enviado
    pela agenda (solicitamos que qualquer tipo de pagamento seja encaminhado pelo responsável na secretaria do colégio). ISCOOL
    APP – Para os seguimentos de Educação Infantil e Ensino Fundamental I todos os comunicados e eventos serão postados neste
    canal. Por isso, é de extrema importância que os pais baixem o mesmo. No caso do Ens. Fund. II e Ens. Médio a comunicação
    coordenação/família acontecerá por e-mail e APP "IsCool". TRANSPORTE – Para possibilitar ao colégio assegurar o bem-estar
    e a segurança de seus alunos, solicitamos a comunicação por escrito, à Secretaria, do tipo de transporte que o aluno utiliza
    para ir e vir ao colégio e os nomes das pessoas autorizadas a retirá-lo do mesmo. CANTINA – Os pedidos de lanches e refeições
    deverão ser feitos através da agenda e o pagamento efetivado diretamente com o responsável pela mesma. Lembramos que para
    alunos de Educação Infantil (MATERNAL À PRÉ) não serão permitidos: Doces, Salgadinhos e Frituras. Para alunos de Ensino
    Fundamental I (1º ao 5º ano), só serão permitidas guloseimas, refrigerantes e frituras às 6ª feiras. MATERIAIS – Com a
    finalidade de enriquecer o trabalho pedagógico serão sempre solicitados com data limite para entrega, visando não prejudicar
    a atividade prevista. PESQUISAS - Para o desenvolvimento dessa atividade, sempre que preciso, solicitaremos a colaboração
    dos familiares e esperamos poder contar com esse valioso auxílio. LIÇÃO DE CASA – Cada segmento possui uma rotina específica.
    As lições de casa compõem as notas dos alunos em nossa TAD. Lembrando que a partir do 4º ano do Ensino Fundamental serão
    postadas atividades no SAE DIGITAL. ESTUDO DE MEIO – A participação em festas e passeios é de caráter obrigatório, uma
    vez que fazem parte do projeto pedagógico da escola e estão previstos em cláusula contratual.Serão agendadas no decorrer
    do ano, de acordo com a necessidade da classe. Lembramos que o pagamento, a autorização por escrito e o uso do uniforme,
    serão indispensáveis e obrigatórios e que o não atendimento a esse item impossibilitará, SEM EXCEÇÃO, que o aluno saia
    do Colégio. ANIVERSÁRIO – As festas de aniversário só poderão ser feitas nas 6ª feiras para não atrapalhar o andamento
    das aulas. Deverão ser marcados e comunicados à professora, com uma semana de antecedência, para não prejudicar o andamento
    das atividades e a rotina da classe. Os convites deverão estar preenchidos. Os pais poderão enviar máquina fotográfica
    para o registro da festa, que ocorrerá no horário do lanche, sendo que não será permitida a permanência das famílias,
    com exceção de irmãos, alunos da escola. O Kit Festa é composto por: bolo, sanduíches, salgados (assados), pão de queijo,
    pipoca, gelatinas, sucos, espátula, guardanapos, copos, velas e fósforo. E deverá ser encaminhada na quantidade solicitada
    pela professora, atendendo o número de alunos. GIBITECA – Será construída por cada professora, contando com as doações
    dos próprios alunos, de gibis, revistas e livros paradidáticos, em bom estado de conservação. REUNIÕES – Serão realizadas
    ao final de cada bimestre. Eventuais necessidades de reuniões individuais com a professora e Orientadora Pedagógica deverão
    ser agendadas na Secretaria do colégio, com a antece-dência mínima de 48 horas. Os casos de urgência serão atendidos pela
    Orientadora Pedagógica. MEDICAMENTOS – Os medicamentos só serão ministrados mediante receita médica fixada na agenda.
    Em caso de febre ou sintomas atípicos os pais deverão vir retirar o aluno. 1.0- ACESSO AO COLÉGIO 1.1-O portão de acesso
    aos corredores de cada segmento é de uso exclusivo para alunos e funcionários do colégio. 1.2- O atendimento a Pais e
    Visitantes é realizado exclusivamente pela portaria principal com acesso a secretaria. Solicitamos gentilmente a colaboração
    de todos. 1.3 – HORÁRIO MÁXIMO PARA ENTRADA NO COLÉGIO Até às 08h15, permitindo a assistência à 2ª. aula. e 13h:15 período
    da tarde. 1.4 - ATRASOS, APÓS O INÍCIO DA 2ª AULA Não serão admitidos os alunos que chegarem atrasados para a 2a aula
    mesmo em dia de avaliação (portados ou não de atestado médico). 1.5 - ALUNOS FORA DE SALA, ESTANDO NAS DEPENDÊNCIAS DO
    COLÉGIO A aula é atividade prioritária e valorizá-la é um dever do aluno. Os alunos que estiverem fora da sala durante
    o período das aulas, sem autorização do professor, serão encaminhados, pelo inspetor de alunos, ao SOPE, onde receberão
    advertência escrita e, então, reencaminhados à sala de aula. 1.6 - Os alunos que chegarem à sala após o sinal de entrada,
    já estando o professor na mesma, não poderão entrar em sala de aula e serão encaminhados ao SOPE. OBS: Todo e qualquer
    comunicado disciplinar deverá ser devolvido ao SOPE, no dia seguinte à ocorrência ou, no caso de suspensão da assistência
    às aulas, no dia do retorno do aluno ao colégio. A não devolução do comunicado, conforme acima mencionado, assinado pelos
    responsáveis, implicará no não ingresso do aluno ao Colégio. 2.0 PERMANÊNCIA NA ESCOLA: 2.1 – Quando os alunos necessitarem
    utilizar as dependências do Colégio fora dos horários de aula deverão solicitar autorização prévia à Coordenação; 2.2
    - Os alunos não podem sair da sala de aula, laboratório, quadra esportiva ou outras dependências antes do professor e
    sem sua autorização; 2.3 - Na ausência do professor, os alunos deverão aguardar, na sala de aula, as instruções do SOPE.
    3.0– EDUCAÇÃO FÍSICA – INFORMAÇÕES GERAIS: 3.1 – A aula de Educação Física é uma disciplina e parte integrante e indissociável
    do currículo e sua freqüência é de caráter OBRIGATÓRIO para todos os alunos, INCLUSIVE OS PORTADORES DE DISPENSA MÉDICA.
    Parágrafo 1º. – A "dispensa médica" dispensa o aluno DA PRÁTICA DA ATIVIDADE FÍSICA e não da assistência à aula; Parágrafo
    2º. – Os alunos dispensados deverão permanecer no local onde estiver sendo desenvolvida a aula, efetuando os respectivos
    registros das atividades do dia; Parágrafo 3º. – Estes alunos submeter-se-ão a provas escritas e trabalhos, bimestralmente,
    para avaliação do conteúdo programático da matéria, visto não poderem realizar a avaliação física; Parágrafo 4º. – O uniforme
    OBRIGATÓRIO para estas aulas é: calça de moleton ou tactel ou bermuda, camiseta (uniforme do colégio) e tênis . Caso o
    aluno não esteja trajando o uniforme completo, deverá permanecer na aula, registrando todas as atividades na mesma realizadas.
    4.0 - DISPENSA DO ALUNO DA ESCOLA: 4.1 - A saída antecipada de alunos, SEM EXCEÇÃO, só será permitida com a prévia solicitação
    dos pais, por escrito ou email. Não serão aceitas dispensas por telefone e apenas as pessoas autorizadas, por escrito,
    na Secretaria, como responsáveis, poderão retirar os alunos da escola. Esclarecemos que as saídas serão liberadas apenas
    ao término de cada aula ou no recreio. 5. 0 - UNIFORME: 5.1 - O USO DIÁRIO DO UNIFORME É OBRIGATÓRIO, para TODAS as séries,
    conforme discriminado abaixo: Uniforme completo:Ed. Infantil, Ens. Fundamental I- calça, saia-calça, bermuda, leg, camiseta
    (manga curta, longa e regata), moletom e tênis. OBS: 1 – No inverno, o uniforme poderá ser complementado com casacos ou
    jaquetas, ABERTAS NA FRENTE, nas cores azul-marinho ou preto, desde que o aluno esteja vestindo, por baixo, o UNIFORME
    COMPLETO DE INVERNO (moletom de inverno do Colégio), adotado pelo colégio; ou seja, EM NENHUMA HIPÓTESE O UNIFORME DE
    INVERNO DO COLÉGIO PODERÁ SER SUBSTITUIDO PELO AGASALHO AVULSO, SOMENTE COMPLEMENTADO PELA SOBREPOSIÇÃO DE OUTRO AGASALHO.
    2 – Não será permitido o uso de mini-saia, mini-blusa e calças compridas ou bermudas com cinturas baixas; 3 – O uniforme
    deverá ser adquirido na Secretaria (pronta-entrega ou sob encomenda), mediante o pagamento do sinal de 50% (cinqüenta
    por cento), no ato; 4 – Após o dia 16 de Março de 2020, SEM EXCEÇÃO, não serão permitidos os acessos, ao Colégio, dos
    alunos não uniformizados; estes serão encaminhados para solicitarem, via telefone, que algum familiar traga o uniforme
    ate o colégio ou que, mediante autorização prévia dos responsáveis, adquira a peca faltante na Secretaria (o aluno deverá,
    também, ser encaminhado à Coordenação, onde receberá advertência verbal, relatada ao responsável e, em caso de reincidência,
    seguiremos os devidos trâmites: advertência por escrito e suspensão da aula). 6.0 - MATERIAL DIDÁTICO: 6.1 - Os alunos
    deverão possuir e apresentar, diariamente, o material didático exigido pelo colégio e por cada professor. Não será permitida
    a utilização de calculadoras de aparelhos celulares, EM QUALQUER PROCESSO AVALIATIVO; 6.2 - A apostila é o material didático
    obrigatório, assim como seu uso diário, em todas as aulas. Sua aquisição é feita na Secretaria, sendo expressamente PROIBIDA
    a reprodução por xerox ou o uso de apostilas de anos anteriores; 6.3 – Todos os alunos receberão uma agenda personalizada,
    sendo que o uso da mesma será de caráter obrigatório (toda a comunicação entre a escola e os responsáveis ocorrerá via
    agenda, com ciência do mesmo e por e-mail). 6.4 - Todo material de Educação Artística, Educação Física e Laboratório são
    de propriedade do Colégio e de utilização em suas dependências. Eventuais retiradas, somente com a autorização, por escrito,
    da Direção; 6.5 - Em caso de perda ou esquecimento de algum material didático nas dependências do Colégio, o mesmo poderá
    ser procurado na Secretaria ou com os inspetores; 6.6 - Os alunos deverão possuir e zelar por seu material escolar, pois
    NÃO NOS RESPONSABILIZAMOS por qualquer objeto, esquecido ou perdido em nossas dependências. 7.0 SEGUNDA CHAMADA DE PROVAS
    (PROVA SUBSTITUTIVA): 7.1 - Em caso de perda de avaliação, POR MOTIVO DE DOENÇA, devidamente atestada, os alunos deverão
    solicitar, junto à Secretaria, no prazo máximo de 03 (três) dias, contados a partir da data da perda da mesma, a respectiva
    prova substitutiva, através do preenchimento de formulário próprio e pagamento da taxa. A mesma acontecerá em uma única
    data em cada bimestre, agendado pela coordenação. Nos casos omissos, a Direção, SOPE e Conselho de Classe, decidirão,
    mediante análise do caso. 7.2 - Os boletins serão entregues nas Reuniões de Pais e Mestres e os não entregues nessas Datas,
    poderão ser retirados somente na Secretaria. Os boletins com média igual ou superior a 5,0 (cinco), poderão ser retirados
    pelos próprios alunos e, os com média inferior a 5,0 (cinco), somente pelos responsáveis, mediante a assinatura da Ficha
    de Avaliação Individual, no horário alternado a sua aula. 8.0 - O ALUNO deverá: 8.1 - Zelar pela preservação e conservação
    do prédio e seus equipamentos. Em caso de danificação dos mesmos, voluntária ou não, será responsável pelo devido ressarcimento
    financeiro, de acordo com cotação do dia; 8.2 - Zelar, de formas genéricas, verbais ou escritas, pelo bom nome do Colégio;
    8.3 - Adquirir e portar, diariamente, material escolar de uso próprio. 9.0 ESTUDO DE MEIO: 9.1 - O estudo de meio, são
    atividades extra classe, registradas como dias letivos, as quais têm, como principais objetivos, vivenciar e ampliar os
    conhecimentos adquiridos em sala de aula. Portanto, as participações dos alunos são obrigatórias, como previsto contratualmente.
    9.2- Festival Cultural/Feira Científica: o objetivo desta prática consiste em promover a interdisciplinaridade, a qual
    será avaliada bimestralmente, seguindo critérios devidamente repassados aos alunos. 10.0 - PELO DESCUMPRIMENTO ÀS NORMAS
    ESTABELECIDAS, O COLÉGIO SUJEITARÁ O ALUNO ÀS SEGUINTES SANÇÕES: – advertência escrita – transferência compulsória Obs:
    Após três advertências escritas ou mesmo por falta grave, única, o aluno será suspenso (em todos os casos, os responsáveis
    serão avisados, via e-mail ou contato telefônico). 11.0 - BIBLIOTECA 11.1 - A Biblioteca estará à disposição dos alunos
    para estudos e pesquisas de 2a à 6a Feira, das 7h30 às 17h. OBS: Durante o período de aulas, os alunos só poderão permanecer
    na Biblioteca mediante autorização dos professores ou do SOPE. 11.2 - Os livros que fazem parte do acervo Literário só
    poderão ser retirados com autorização da Bibliotecária, mediante a apresentação de carteira de identificação específica;
    11.3 - Os materiais para pesquisa só poderão ser utilizados na Biblioteca; 11.4 - Ao aluno que constar alguma pendência
    na entrega de livro, o mesm o somente poderá retirar outro após a sua regularização. 13.0 - XEROX 13.1 - A requisição
    de xerox, pelos alunos, deverá ser feita na Secretaria, no INÍCIO OU TÉRMINO DO PERÍODO, RECREIO OU AULAS VAGAS, com a
    antecedência MÍNIMA de 24 horas e mediante pagamento, NO ATO DA MESMA. Não serão aceitas as requisições de alunos que
    estejam em horário de aula. 14 - EXTRATO DO REGIMENTO ESCOLAR DA VERIFICAÇÃO DO RENDIMENTO ESCOLAR: DA EDUCAÇÃO INFANTIL:
    A avaliação far-se-á voltada aos objetivos propostos, verificando o processo evolutivo, o desempenho infantil, observando-se,
    sistematicamente, as atividades significativas e integradas, para que se percebam as dificuldades e o progresso da criança.
    Em casos especiais, através de um enfoque multifrontal, uma equipe de especialistas elaborará uma ficha especial de acompanhamento
    das atividades da criança. A verificação do rendimento escolar será registrada bimestralmente em fichas de acompanhamento
    pedagógico, válida somente dentro do aspecto da faixa etária, e sem objetivo de promoção ou de seleção classificatória
    para acesso ao Ensino Fundamental. PROVAS BIMESTRAIS: conterão TODA A MATÉRIA do bimestre. As mesmas serão realizadas
    no primeiro período do dia e, após esta, haverá aula normalmente. Será composta da seguinte forma: AD= Atividades Diversas
    = valor total (soma) de zero a dez = PESO 2 AM= avaliação mensal = PESO 2 AB= avaliação Bimestral = PESO 2 SIM= SIMULADO
    = PESO 1 PROJ. FC = PROJETO FEIRA CULTURAL (2,0 na TAD, durante os bimestres) MÉDIA BIMESTRAL = (AD X 2) + ( AM X 2) +
    (ABX 2) + (SIM X1):7 = MB NORMAS DO ENSINO FUNDAMENTAL II E ENSINO MÉDIO 6º a 9º ano> Matemática / Língua Portuguesa /
    Geografia / História / Ciências / Química (a partir do 9ºano) / Física (a partir do 9ºano) / Biologia (a partir do 9ºano)
    / Artes / Língua Inglesa / Língua Espanhola / Filosofia / Educação Física / Técnica de comunicação e redação / Robótica
    / Educação Financeira / Inteligência Emocional 1º a 3º Ensino Médio> Matemática / Língua Portuguesa / Geografia / História
    / Ciências / Química / Física / Biologia / Artes / Língua Inglesa / Língua Espanhola / Filosofia / Sociologia / Educação
    Física / Técnica de comunicação e redação / Educação Financeira / Inteligência Emocional / Empreendedorismo / Voluntariado
    / Orientação Vocacional. • Os alunos do Ens. Médio , tem seu horário de saída conforme segue: (1º e 2º médio – Seg.,Qua.
    e Qui. = 13h50min ) /// ( Ter. E Sext. = 12h50min. ) , (3º médio - Seg./Qua = 13h50min /// Ter./ Qui. e Sex. = 12h50min).
    • O horário de entrada no colégio será 7:30 horas, com tolerância de 10 (dez) minutos. Havendo 3 (três) atrasos, a família
    será comunicada deste. • O horário para assistir a 2ª (segunda) aula será até as 8:15 horas. Após este horário, o aluno
    retornará para casa, mesmo em dia de avaliação, portado ou não de atestado médico. • O aluno que estiver fora da sala
    em horário de aula (cabular aula) levará advertência por escrito e o aluno que tentar entrar após a entrada do professor,
    levará comunicado disciplinar para ser assinado pelo responsável. • Educação Física; o aluno portador de dispensa médica
    deverá permanecer na aula, registrando toda a aula. Uso do uniforme completo inclusive nestas aulas (tênis), compõem média
    nesta disciplina teoria e prática. • A saída antecipada de alunos, SEM EXCEÇÃO, só será permitida com a prévia solicitação
    dos pais, por escrito. Não serão aceitas dispensa via telefone. Nos casos em que o aluno venha a ter algum problema de
    saúde, a comunicação se fará via secretaria, com a devida autorização da coordenação pedagógica. • O uniforme completo
    será obrigatório para o Fundamental II e para o Ensino Médio. • Não será permitido ao aluno o uso de capuz e boné em sala
    de aula , Até o dia 16 de Março DE 2020 o aluno que não estiver trajado com o uniforme, deverá fazer uso de no mínimo
    de uma camiseta branca sendo que após esta data, o mesmo será encaminhado à Coordenação e receberá advertência verbal.
    Em caso de reincidência, receberá as sanções disciplinares cabíveis. • A apostila é um material didático obrigatório em
    todas as aulas, cada dia sem o material o aluno será descontado na TAD 0,2 na disciplina. • O colégio conta com a plataforma
    digital, onde encontrarão atividades, listas de exercícios valendo nota na TAD. • Todos os alunos receberão uma agenda
    personalizada (exceto Ensino Médio), sendo que o uso da mesma é de caráter obrigatório (toda a comunicação entre a escola
    e os responsáveis ocorrerá via agenda, com ciência do mesmo, por e-mail e pelo APP "IsCool"). • Em caso de perda da avaliação
    por motivo de doença, devidamente atestada e com a taxa paga em mãos, os alunos terão um prazo de 3 (três) dias, contados
    a partir da data da prova, para solicitação de prova substitutiva. A mesma ocorrerá um ou dois dias após o termino das
    avaliações bimestrais no período da tarde,previamente agendado pela coordenação juntamente com o calendário de provas.
    A mensal fica a critério do professor da disciplina. • Os boletins serão entregues nas reuniões de pais. Em caso de não-comparecimento
    do responsável, o próprio aluno poderá retirá-lo na Secretaria, desde que com média igual ou superior a 6,0 (seis pontos).
    • Ao término do bimestre, os alunos que não atingirem a média necessária, serão convocados para a recuperação, a qual
    se dará no período da tarde; a mesma consistirá em uma aula, com a aplicação da prova logo na seqüência. • Cálculo de
    Média: MB (média bimestral) + MR (média da recuperação) /2 = MBF (média bimestral final). • Será expressamente proibido
    fumar em qualquer dependência do colégio (inclusive no estacionamento), bem como o uso de aparelhos eletrônicos em geral,tablet,celulares,
    livros não-didáticos, comidas e bebidas em sala de aula, comercialização de produtos, além de atitudes verbais ou escritas
    que firam a moral e os bons costumes. A cantina só poderá ser utilizada no horário de entrada, saída e no recreio. • Zelar
    pela conservação dos equipamentos, bem como pelo espaço físico do colégio e em caso de dano, o mesmo deverá ser ressarcido.
    • As sanções estabelecidas pelo descumprimento das normas, serão: advertência verbal, advertência por escrito, suspensão
    e transferência compulsória. • Todos os trabalhos, inclusive os de recuperação, deverão ser manuscritos, salvo os alunos
    do 9º e 3º ano do E.M com o TCF e TCM. • Estudo do meio é uma atividade extraclasse, registrada como dia letivo, portanto
    a participação é obrigatória e compõem nota no bimestre. • Festival Cultural promove a interdisciplinaridade. A qual será
    avaliada bimestralmente, até 2,0 na TAD e no 4º bimestre a participação do aluno compõem média de 0 até 10 pontos. • As
    avaliações mensais serão realizadas pelo próprio professor responsável pela respectiva disciplina; já as avaliações bimestrais
    serão realizadas no 2º(segundo) período do dia, com entrada normal as 7:30 hs. • TCF significa Trabalho de Conclusão do
    Fundamental II. Com uma metodologia que consiste em um tema para o trabalho, escolhido pelo aluno com base em critérios
    que possua afinidade, que tenha relevância para sua formação cientifica e social. Normalmente é um trabalho que envolve
    pesquisa bibliografia com a execução em si e apresentação do projeto frente a uma banca examinadora composta de professores
    e será solicitada a cada aluno individualmente, mas também pode ser montada em dupla ou grupo, sempre seguindo as orientações
    de um professor responsável. A forma de avaliação seguirá critérios devidamente repassados aos alunos. Média do 4ºbim
    (média do 4º bim + média da nota do TCF, dada pela banca , dividido por dois = M 4ºBIM) • TCM significa Trabalho de Conclusão
    do Médio. Com uma metodologia que consiste em um tema para o trabalho, escolhido pelo aluno com base em critérios que
    possua afinidade, que tenha relevância para sua formação cientifica e social. A forma de avaliação seguirá critérios devidamente
    repassado aos alunos. Média do 4ºbim (média do 4º bim + média da nota do TCF, dada pela banca, dividido por dois = M 4ºBIM)
    • A média bimestral será composta da seguinte maneira: FÓRMULA PARA CÁLCULO: MÉDIA BIMESTRAL = (AD x 2) + (AM x 2) + (AB
    x 2) + (SIM x 1) : 7 = MB • As médias, ao longo do ano, não serão arredondadas; isto só ocorrerá após o exame final, bem
    como o conselho de classe referente ao mesmo. • A média anual será a somatória das médias dos 4 (quatro) bimestres, com
    os devidos pesos nos bimestres e divididos por 10 (dez). • As avaliações de recuperação têm os seguintes valores: a prova
    valerá 8,0 (oito pontos), a participação na recuperação 1,00 (um ponto) e o trabalho valerá 1,0 (um ponto), o qual deverá
    ser manuscrito e entregue no dia da recuperação. Os estudos de recuperação serão ministrados pelos respectivos professores
    das disciplinas. O resultado da recuperação não poderá exceder 6,0 (seis pontos). Caso o aluno não atinja a nota limite,
    valerá a média bimestral. • O aluno que obtiver a média inferior a 6,0 (seis pontos), porém, igual ou superior a 3,0 (três
    pontos) em qualquer disciplina da série cursada, após o encerramento do período letivo, será submetido a exame final (limite
    máximo de 05 disciplinas) da respectiva disciplina. • O aluno será promovido para o ano seguinte caso alcance média igual
    ou superior a 6,0 (seis pontos) ou seja 60 pontos em todas as disciplinas, além da frequência mínima de 75% (setenta e
    cinco por cento) nas aulas. • O aluno que obtiver média igual ou inferior a 3,0 (três pontos) será retido, sem direito
    a realização do exame final. • Os alunos retidos em até 02 (duas) disciplinas serão promovidos à série seguinte, com progressão
    parcial (dependência). • Alunos do 3ºano médio, serão submetidos a progressão parcial caso não atinjam a média mínima
    em até 03 (três) disciplinas, frequentarão as aulas normais da disciplina durante o ano letivo. • O aluno frequentará
    aulas exclusivas para tal, no período contrário àquele em que possui aulas regulares, condicionado a frequência mínima
    de 75% (setenta e cinco por cento) e média igual ou superior a 6,0 (seis pontos), nos respectivos bimestres da mesma.
    • A Compensação de ausência será realizada, em forma de trabalho, na escola no período da tarde entre dias 02/12 e 08/12/2020.'
  - Brasil ganhou 10 mil novos milionários em 2016, aponta estudo - F7 NOTÍCIAS Home / Política e Economia / Brasil ganhou
    10 mil novos milionários em 2016, aponta estudo Portal F7 Notícias 07:53:00 O relatório não aborda especificamente a crise
    econômica no Brasil, mas destaca que o país "enfrenta claramente dificuldades sérias", apontando que a riqueza média do
    brasileiro medida em dólar caiu em um terço desde 2011. Entre 2000 e 2011, a riqueza média por adulto no país triplicou,
    passando US$ 8 mil para US$ 27,1 mil, mas caiu para US$ 18,06 mil em 2016.
- source_sentence: 'Linkpress - Jornal do Salão 2008 by Linkpress - issuu Publicação especial da Honda Automóveis para o Salão
    Internacional do Automóvel - Outubro 2008 Moderna e ousada A participação da Honda Automóveis na 25ª edição do Salão Internacional
    do Automóvel está pautada na combinação de soluções inovadoras com a aplicação de tecnologias de ponta em seus produtos.
    Tudo isso pode ser conferido no lançamento do New Fit, na versão mais avançada do robô-humanóide ASIMO, numa miniatura
    do jato executivo HondaJet e na comprovada qualidade dos automóveis, motocicletas e produtos de força. New Fit Literalmente,
    o New Fit é um novo carro. O nome é apenas uma das inúmeras transformações. O design externo ganhou toques de esportividade
    e seu espaço interno ficou ainda maior. Os modernos motores i-VTEC Flex 16v deixaram o carro mais potente em comparação
    com as versões anteriores. O modelo vem com duplo airbag frontal e computador de bordo multifunções no painel Black-out.
    Além disso, o sistema ULT (Utility, Long and Tall) permite rebater os bancos de diferentes formas, oferecendo mais versatilidade
    e comodidade. São quatro versões: 1.4l —LX e LXL— e 1.5l —EX e EXL, todas com opção de transmissão manual ou automática
    de cinco velocidades com Shift Hold Control. A versão EXL, a top de linha, tem entre seus diferenciais os sofisticados
    bancos em couro e o câmbio Paddle Shift (para versão com transmissão automática), que permite trocas manuais com o acionamento
    de alavancas localizadas no volante, como nos carros da Fórmula 1. A versão 1.4l atinge 101 cv a 6.000 rpm, na utilização
    de álcool, e 100 cv a 6.000 rpm, com gasolina. Já a versão 1.5l alcança 116 cv a 6.000 rpm (álcool) e 115 cv a 6.000 rpm
    (gasolina). Assim como todos os modelos da Honda, o New Fit tem três anos de garantia, sem limite de quilometragem. New
    Civic Não é à toa que o New Civic conquistou rapidamente a confiabilidade dos consumidores e se transformou em líder absoluto
    de vendas em sua categoria. O modelo redefiniu o conceito dos sedãs médios e tornou-se o carro mais desejado do Brasil.
    Tudo isso graças ao seu design moderno, tecnologia de ponta e conceitos inovadores. O modelo conta com o consagrado motor
    i-VTEC SOHC, com 140 cv de potência, exclusiva tecnologia Honda Flex e três anos de garantia. Ressaltando o alto padrão
    de qualidade Honda em conforto, comodidade e segurança, o New Civic apresenta freios ABS com EBD, exclusivo assoalho traseiro
    plano, painel de instrumentos Black-out em dois níveis, transmissão manual ou automática de cinco velocidades, com Paddle-Shift
    na versão EXS. Civic Si Esportividade, tecnologia e sofisticação. Características tão almejadas pelo aficcionado por automóveis
    estão evidentes em cada detalhe do Civic Si. O modelo é equipado com o furioso motor i-VTEC com 192 cv, tem transmissão
    manual de seis velocidades, direção com assistência elétrica EPS e dispositivo LSD (Limited Slip Differential), que distribui
    melhor o torque tanto em curvas como em arrancadas. Além disso, o esportivo da linha Civic possui bancos tipo "concha",
    pedais de alumínio, shift light no painel Blackout em dois níveis, rádio AM/ FM com CD changer compatível com MP3 e WMA,
    grade frontal exclusiva, rodas de liga leve aro 17" e ponteira do escapamento cromada. Honda Accord Uma combinação perfeita
    entre inteligência e sofisticação. Assim pode ser definida a oitava geração do Honda Accord. As duas versões (LX e EX
    V6) foram desenvolvidas nos altos padrões de qualidade e tecnologia Honda: a LX vem com motor i-VTEC SOHC, 4 cilindros
    e 156 cv. Já a EX V6 conta com motor i-VTEC SOHC e incríveis 278 cv, além do exclusivo sistema VCM (Variable Cylinder
    Management), que trabalha inteligentemente com 3, 4 ou 6 cilindros, de acordo com a velocidade, a carga e o tipo de piso,
    sem que haja percepção da mudança durante a condução por parte do motorista. Com isso, se torna mais econômico e consegue
    reduzir a emissão de gases poluentes. Seguindo o compromisso Honda de segurança e conforto, o modelo dispõe de freios
    ABS com EBD e amplo espaço interno. A versão EX dispõe de ar-condicionado Dual Zone, faróis de xenon, bancos com sistema
    VSA (Vehicle Stability Assist), que controla a estabilidade do veículo. Honda CR-V Imagine um modelo que conseguiu aliar
    perfeitamente o conforto e a estabilidade dos sedãs com a robustez e a durabilidade encontrada nos utilitários esportivos.
    Esse carro existe e atende pelo nome de Honda CR-V. São duas versões: LX, com tração 4x2, e EXL, com o exclusivo sistema
    4x4 Real Time, tecnologia que estuda o terreno e, automaticamente, determina a distribuição de torque entre as rodas.
    O crossover conta com motor i-VTEC SOHC, de 150 cv, freios ABS com EBD e transmissão automática de cinco velocidades com
    o exclusivo sistema Grade Logic Control, que eletronicamente escolhe as marchas, proporcionando transições muito mais
    suaves. O porta-malas Double Deck tem capacidade para 1.011 litros, podendo chegar a 2.064 litros com os bancos rebatidos.
    A versão 4 x 4 apresenta ainda seis airbags, ar-condicionado Dual Zone, faróis de neblina, bancos em couro e teto solar
    elétrico. ajustes elétricos, teto solar, seis airbags e o Honda Jet A Honda sempre explorou outros meios de locomoção.
    Um dos resultados dessa filosofia de trabalho é o HondaJet, primeira aeronave comercial desenvolvida pela Honda e que
    faz jus à reputação da companhia de constante evolução tecnológica. Equipado com o motor HF118, que alia elevado desempenho
    e baixo nível de emissão de poluentes, o modelo começou a ser comercializado em outubro de 2006 apenas para os Estados
    Unidos. Mais de 100 unidades foram encomendadas e começarão a ser entregues em 2010. Em 2008, a Europa anunciou o início
    das vendas. As primeiras entregas para o mercado europeu estão programadas para acontecer em meados de 2012. Honda Odyssey
    Primeiro veículo Honda no segmento das minivans, a Odyssey consegue unir num mesmo projeto duas características tão almejadas
    pelo consumidor: conforto e excelente dirigibilidade. O modelo possui linhas modernas, oferece amplo espaço interno e
    versatilidade, além dos sistemas ACE (Advanced Compatibility Engineering) e VSA (Vehicle Stability Assist). O primeiro
    é responsável por dissipar o impacto de uma colisão frontal, enquanto o segundo melhora a estabilidade do veículo. O motor
    i-VTEC V6 utiliza a tecnologia VCM (Variable Cylinder Management), que é responsável por desativar alguns dos seis cilindros
    do motor quando o carro não precisar deles. Com isso, se torna mais econômico. Honda Racing F1 Team A vocação para competições
    faz parte do DNA da Honda. Sua trajetória de sucesso nas pistas é reflexo de anos de estudo e desenvolvimento de inovações
    tecnológicas que resultaram em uma história repleta de vitórias: desde 1964, quando começou na F1, a marca conquistou
    72 vitórias, cinco campeonatos de pilotos, sendo três com o brasileiro Ayrton Senna, e seis títulos de construtores. O
    modelo atual, o RA108, possui um alto grau de eficiência aerodinâmica e motor V8, o RA808E, que gera potência máxima de
    mais de 700 HP e aproximadamente 19.000 rpm. Outro diferencial é o visual: representa a evolução do premiado conceito
    My Earth Dream, iniciado em 2007 e que busca utilizar a visibilidade da principal categoria do automobilismo mundial para
    fornecer apoio a causas sociais e ambientais. ASIMO Dois anos depois de sua primeira aparição no Brasil, no Salão Internacional
    do Automóvel de 2006, o ASIMO (Advanced Step in Innovative Mobility) está de volta e é uma das atrações do Salão Internacional
    do Automóvel. Assim como os produtos da Honda, o robô humanóide evoluiu. Reflexo de mais de duas décadas de pesquisas
    da marca em mobilidade, a nova versão incorporou inúmeros avanços em comparação ao seu antecessor e faz coisas inimagináveis
    pouco tempo atrás. Tem capacidade para ultrapassar obstáculos, desenvolver trabalhos como carregar uma bandeja, subir
    e descer escadas, auxiliar pedestres a andar na rua, chutar uma bola e correr até seis quilômetros por hora. Com todos
    esses atributos, o ASIMO se tornou uma celebridade por onde passa. Já regeu a Orquestra Sinfônica de Detroit (EUA), apareceu
    em diversos salões internacionais, faz apresentações no parque de diversões americano Disneylândia e visitou as crianças
    vítimas do terremoto de Sichuan, na China. A atuação da Honda no país não se restringe aos CBR 1000RR Fireblade A versão
    2008 que chegou recentemente ao Brasil revolucionou o mercado das superesportivas. Tudo porque o modelo está com um novo
    design, formas mais compactas, menor peso e a mais alta tecnologia Honda das pistas ao alcance do público. O resultado
    é um comportamento ágil e preciso, além de uma pilotagem mais esportiva. automóveis e às motocicletas. Em mais de 35 anos
    de atividades no território nacional, a marca dispõe de um terceiro e importante pilar de sustentação. Tratase dos produtos
    de força. Sua linha é representada por uma extensa gama de produtos, como motores estacionários, geradores, motobombas,
    roçadeiras, cortadores de grama e motores de popa. Durabilidade, resistência, economia de combustível e menor vibração
    são alguns dos benefícios desses equipamentos, que atingem os mais diversos setores da economia (agricultura, construção
    civil e lazer). XL 1000V Varadero Conforto, versatilidade e alta tecnologia são alguns dos atributos dessa autêntica Max
    Trail. Importado da Espanha, o modelo é ideal para viagens de aventura. Seu motor de 996 cm 3 assegura força e resistência
    para enfrentar estradas de terras ou vias pavimentadas. Shadow 750 Desempenho mais suave e progressivo, bem como uma pilotagem
    confortável. Assim pode ser definida a versão 2009 da Honda Shadow 750, que recebe o moderno sistema de injeção eletrônica
    de combustível PGM-FI (Programmed Fuel Injection). Destaque também para as cores e grafismos, onde cada motocicleta possui
    estilo único e atrativo para os consumidores. Honda Serviços Financeiros A Honda Serviços Financeiros (HSF) é composta
    pelo Consórcio Nacional Honda, Banco Honda, Honda Leasing e GHB Corretora de Seguros. O principal objetivo da HSF é facilitar
    o processo de expansão do mercado e dar suporte às operações das concessionárias para garantir a aquisição de motocicletas
    e automóveis da marca. Neste ano, o Consórcio Nacional Honda – maior administradora de consórcio do país – ultrapassou
    a marca de 2,5 milhões de motocicletas zero-quilômetro entregues, comprovando o benefício da acessibilidade Referência
    mundial em tecnologia e a primeira motocicleta a possuir sistema de airbag no mundo, o modelo chegou para atender os anseios
    de um público que busca máxima diferenciação e estilo sobre duas rodas. Entre outros atrativos, conta com sistema de áudio
    com controle automático de volume e compartimento de bagagem. para aqueles que desejam ter um produto Honda. O Banco Honda
    e a Honda Leasing apresentam atendimento personalizado e parceria junto à rede de concessionárias por ser um banco de
    fábrica. Já a GHB Corretora de Seguros oferece ampla cobertura para roubo, furto, colisão, incêndio e total assistência
    aos clientes em casos de acidentes e panes. Honda Automóveis do Brasil A história da Honda Automóveis do Brasil se confunde
    com a do próprio setor automotivo nacional. Desde 1997, quando abriu as portas de sua fábrica em Sumaré (SP), mostrou-se
    atenta aos anseios de um exigente consumidor. Desenvolvidos com muita qualidade e tecnologia de ponta, seus veículos ganharam
    rapidamente a confiabilidade. Até hoje, contabiliza mais de 500 mil unidades produzidas no Brasil. Para atender uma demanda
    cada vez maior, a empresa ampliou sua capacidade produtiva e passou a fabricar 650 unidades diariamente. Também otimizou
    a produção de veículos com a inauguração do Power Train, setor responsável pelo desenvolvimento dos principais processos
    para a fabricação de motores —fundição e usinagem dos blocos e cabeçotes. Esse compromisso com a sociedade também se estende
    para soluções socialmente responsáveis, ecologicamente conscientes e economicamente viáveis com a aplicação do conceito
    Green Factory (Fábrica Ecológica). O programa procura inovar o processo produtivo, reduzindo resíduos na produção, maximizando
    o uso eficiente de energia sem causar danos ao meio-ambiente e promovendo ações de cunho social. Parte desse sucesso da
    marca também se deve ao envolvimento e a qualidade nos serviços de sua rede de concessionárias espalhadas pelo país. Harmonia
    no trânsito Além de desenvolver produtos que proporcionam prazer e segurança, a Honda sempre se mostrou preocupada com
    o bem-estar da sociedade. Por isso, lançou recentemente uma campanha a fim de contribuir para a conscientização de motociclistas,
    motoristas, ciclistas e pedestres sobre a importância de um trânsito seguro a todos. Com o lema "Desejamos harmonia no
    trânsito porque sonhamos com um mundo melhor", a campanha utiliza uma linguagem lúdica para inspirar as pessoas a exercerem
    sua cidadania e promoverem um convívio mais amigável nas ruas. Ecologicamente correto O envolvimento da Honda Automóveis
    com o tema responsabilidade ambiental pode ser conferido em cada detalhe de sua participação no 25º Salão Internacional
    do Automóvel. Está presente na tecnologia Flex utilizada nos veículos nacionais, nas sacolas distribuídas aos visitantes
    que foram produzidas com material oxibiodegradável, no piso do estande feito com madeira 100% reflorestada e na neutralização
    dos impactos causados pelo evento com a aquisição de créditos de carbono. Reforçando ainda mais o conceito, essa publicação
    foi feita com papel ecologicamente correto. Publicação especial do Departamento de Marketing da Honda Automóveis do Brasil
    para o Salão Internacional do Automóvel Editor Responsável: Ricardo Ghigonetto • Redação: Fernando Stella e Priscilla
    Martini • Design Gráfico: Alexandra Marchesini Produção: Linkpress Assessoria e Comunicação Ltda. • Pabx: (11) 5594-7577
    • E-mail: linkpress@linkpress.com.br Linkpress - Jornal do Salão 2008 Jornal desenvolvido para a Honda pela Linkpress
    na ocasião do Salão Internacional do Automóvel 2008, em São Paulo.'
  sentences:
  - 'Revista Nordeste Meirelles: não há previsão de ajuda aos estados em calamidade financeira - Revista Nordeste Meirelles:
    não há previsão de ajuda aos estados em calamidade financeira "Não temos ainda uma data específica para isso, porque eles
    estão enfrentando um problema sério, mas a União também, portanto devemos priorizar", disse Meirelles, que explicou não
    haver, neste momento, nenhum caminho jurídico que permita adiar o pagamento da dívida dos estados em crise com a União.
    Ontem (29), o presidente Michel Temer vetou trechos do regime especial de recuperação fiscal dos estados que havia sido
    aprovado no Congresso, sob o argumento de que com a retirada, por parte da Câmara dos Deputados, da maior parte das contrapartidas
    de ajuste fiscal a serem implementadas pelos estados em troca da ajuda federal a medida havia se tornado "mais ou menos
    inútil". "Nós estamos, como todos, muito preocupados com a situação emergencial dos estados, mas é importante não transferirmos
    implicitamente o problema da dívida dos estados para a União. A União não criou o problema dos estados. A União está enfrentando
    e equacionando seus próprios problemas", disse. Segundo o ministro, independentemente de eventual ajuda federal, cabe
    aos estados implementarem medidas para tornar sustentável a situação fiscal. "Não se deve criar essa ilusão de que tudo
    depende de uma ajuda federal. A ajuda federal, primeiro, tem toda uma limitação do ajuste fiscal federal, para não prejudicar
    a recuperação da economia", afirmou. Meirelles não informou quando o governo enviará ao Congresso um novo projeto de lei
    para garantir as contrapartidas dos estados para a renegociação da dívida. "Temos que fazer o trabalho bem-feito, e o
    mais rápido possível será anunciado."'
  - '01 - Meninos que Mordem Mamãe vai querer me matar se descobrir que eu estou me transformando em um vampiro... Bom, tecnicamente
    não pode por que eu sou imortal... Bom, tudo bem, ainda não. Deixe-me explicar. Meu nome é Sunshine Mcdonald e devido
    ao pior dos casos de confusão de identidade com a minha irmã gêmea gótica, Rayne, fui parar em um clube noturno chamado
    "Club Fang" onde Magnus, um vampiro que é muito, muito gostoso, acabou mordendo o meu pescoço inocente em vez do dela.
    Agora, se eu não agir a tempo, Magnus será meu companheiro de sangue para sempre e estarei condenada a ser uma bebedora
    de asquerosos goles de sangue, pálida e inimiga da luz do dia. Acredite em mim, as mordidas de vampiro, são coisa séria!
    Depois do lamentável assassinato do líder dos vampiros, compete a minha irmã e eu, e a Magnus, encontrar a única coisa
    que pode resolver o meu problema: o Santo Graal. Não é brincadeira. Realmente tenho a esperança de sair disto a tempo,
    por que de alguma forma isto coincidiu com o baile de formatura o qual se supõe que eu irei com o garoto mais lindo e
    popular da escola, Jake Wilder. E eu não quero ser uma vampira para então... e muito menos para o resto da eternidade.
    02 -Marque Isso! Tudo o que eu quero é ser um vampiro. Mas nãooo – Eu tenho que ser Rayne McDonald, Caçadora de Vampiros...
    Irmãs. Elas vão roubar suas roupas, seus namorados e seus destinos. Mas isto não foi exatamente culpa da minha gêmea Sunny.
    Magnus, um vampiro bonito e líder da convenção, confundiu-a comigo no mês passado e a mordeu em vez de mim. E agora eles
    estão tendo uma espécie de namoro entre espécies. Mas de volta para mim. Acontece que a cada geração, há um caçador de
