      chegarem à sala após o sinal de entrada, já estando o professor na mesma, não poderão entrar em sala de aula e serão
      encaminhados ao SOPE. OBS: Todo e qualquer comunicado disciplinar deverá ser devolvido ao SOPE, no dia seguinte à ocorrência
      ou, no caso de suspensão da assistência às aulas, no dia do retorno do aluno ao colégio. A não devolução do comunicado,
      conforme acima mencionado, assinado pelos responsáveis, implicará no não ingresso do aluno ao Colégio. 2.0 PERMANÊNCIA
      NA ESCOLA: 2.1 – Quando os alunos necessitarem utilizar as dependências do Colégio fora dos horários de aula deverão
      solicitar autorização prévia à Coordenação; 2.2 - Os alunos não podem sair da sala de aula, laboratório, quadra esportiva
      ou outras dependências antes do professor e sem sua autorização; 2.3 - Na ausência do professor, os alunos deverão aguardar,
      na sala de aula, as instruções do SOPE. 3.0– EDUCAÇÃO FÍSICA – INFORMAÇÕES GERAIS: 3.1 – A aula de Educação Física é
      uma disciplina e parte integrante e indissociável do currículo e sua freqüência é de caráter OBRIGATÓRIO para todos
      os alunos, INCLUSIVE OS PORTADORES DE DISPENSA MÉDICA. Parágrafo 1º. – A "dispensa médica" dispensa o aluno DA PRÁTICA
      DA ATIVIDADE FÍSICA e não da assistência à aula; Parágrafo 2º. – Os alunos dispensados deverão permanecer no local onde
      estiver sendo desenvolvida a aula, efetuando os respectivos registros das atividades do dia; Parágrafo 3º. – Estes alunos
      submeter-se-ão a provas escritas e trabalhos, bimestralmente, para avaliação do conteúdo programático da matéria, visto
      não poderem realizar a avaliação física; Parágrafo 4º. – O uniforme OBRIGATÓRIO para estas aulas é: calça de moleton
      ou tactel ou bermuda, camiseta (uniforme do colégio) e tênis . Caso o aluno não esteja trajando o uniforme completo,
      deverá permanecer na aula, registrando todas as atividades na mesma realizadas. 4.0 - DISPENSA DO ALUNO DA ESCOLA: 4.1
      - A saída antecipada de alunos, SEM EXCEÇÃO, só será permitida com a prévia solicitação dos pais, por escrito ou email.
      Não serão aceitas dispensas por telefone e apenas as pessoas autorizadas, por escrito, na Secretaria, como responsáveis,
      poderão retirar os alunos da escola. Esclarecemos que as saídas serão liberadas apenas ao término de cada aula ou no
      recreio. 5. 0 - UNIFORME: 5.1 - O USO DIÁRIO DO UNIFORME É OBRIGATÓRIO, para TODAS as séries, conforme discriminado
      abaixo: Uniforme completo:Ed. Infantil, Ens. Fundamental I- calça, saia-calça, bermuda, leg, camiseta (manga curta,
      longa e regata), moletom e tênis. OBS: 1 – No inverno, o uniforme poderá ser complementado com casacos ou jaquetas,
      ABERTAS NA FRENTE, nas cores azul-marinho ou preto, desde que o aluno esteja vestindo, por baixo, o UNIFORME COMPLETO
      DE INVERNO (moletom de inverno do Colégio), adotado pelo colégio; ou seja, EM NENHUMA HIPÓTESE O UNIFORME DE INVERNO
      DO COLÉGIO PODERÁ SER SUBSTITUIDO PELO AGASALHO AVULSO, SOMENTE COMPLEMENTADO PELA SOBREPOSIÇÃO DE OUTRO AGASALHO. 2
      – Não será permitido o uso de mini-saia, mini-blusa e calças compridas ou bermudas com cinturas baixas; 3 – O uniforme
      deverá ser adquirido na Secretaria (pronta-entrega ou sob encomenda), mediante o pagamento do sinal de 50% (cinqüenta
      por cento), no ato; 4 – Após o dia 16 de Março de 2020, SEM EXCEÇÃO, não serão permitidos os acessos, ao Colégio, dos
      alunos não uniformizados; estes serão encaminhados para solicitarem, via telefone, que algum familiar traga o uniforme
      ate o colégio ou que, mediante autorização prévia dos responsáveis, adquira a peca faltante na Secretaria (o aluno deverá,
      também, ser encaminhado à Coordenação, onde receberá advertência verbal, relatada ao responsável e, em caso de reincidência,
      seguiremos os devidos trâmites: advertência por escrito e suspensão da aula). 6.0 - MATERIAL DIDÁTICO: 6.1 - Os alunos
      deverão possuir e apresentar, diariamente, o material didático exigido pelo colégio e por cada professor. Não será permitida
      a utilização de calculadoras de aparelhos celulares, EM QUALQUER PROCESSO AVALIATIVO; 6.2 - A apostila é o material
      didático obrigatório, assim como seu uso diário, em todas as aulas. Sua aquisição é feita na Secretaria, sendo expressamente
      PROIBIDA a reprodução por xerox ou o uso de apostilas de anos anteriores; 6.3 – Todos os alunos receberão uma agenda
      personalizada, sendo que o uso da mesma será de caráter obrigatório (toda a comunicação entre a escola e os responsáveis
      ocorrerá via agenda, com ciência do mesmo e por e-mail). 6.4 - Todo material de Educação Artística, Educação Física
      e Laboratório são de propriedade do Colégio e de utilização em suas dependências. Eventuais retiradas, somente com a
      autorização, por escrito, da Direção; 6.5 - Em caso de perda ou esquecimento de algum material didático nas dependências
      do Colégio, o mesmo poderá ser procurado na Secretaria ou com os inspetores; 6.6 - Os alunos deverão possuir e zelar
      por seu material escolar, pois NÃO NOS RESPONSABILIZAMOS por qualquer objeto, esquecido ou perdido em nossas dependências.
      7.0 SEGUNDA CHAMADA DE PROVAS (PROVA SUBSTITUTIVA): 7.1 - Em caso de perda de avaliação, POR MOTIVO DE DOENÇA, devidamente
      atestada, os alunos deverão solicitar, junto à Secretaria, no prazo máximo de 03 (três) dias, contados a partir da data
      da perda da mesma, a respectiva prova substitutiva, através do preenchimento de formulário próprio e pagamento da taxa.
      A mesma acontecerá em uma única data em cada bimestre, agendado pela coordenação. Nos casos omissos, a Direção, SOPE
      e Conselho de Classe, decidirão, mediante análise do caso. 7.2 - Os boletins serão entregues nas Reuniões de Pais e
      Mestres e os não entregues nessas Datas, poderão ser retirados somente na Secretaria. Os boletins com média igual ou
      superior a 5,0 (cinco), poderão ser retirados pelos próprios alunos e, os com média inferior a 5,0 (cinco), somente
      pelos responsáveis, mediante a assinatura da Ficha de Avaliação Individual, no horário alternado a sua aula. 8.0 - O
      ALUNO deverá: 8.1 - Zelar pela preservação e conservação do prédio e seus equipamentos. Em caso de danificação dos mesmos,
      voluntária ou não, será responsável pelo devido ressarcimento financeiro, de acordo com cotação do dia; 8.2 - Zelar,
      de formas genéricas, verbais ou escritas, pelo bom nome do Colégio; 8.3 - Adquirir e portar, diariamente, material escolar
      de uso próprio. 9.0 ESTUDO DE MEIO: 9.1 - O estudo de meio, são atividades extra classe, registradas como dias letivos,
      as quais têm, como principais objetivos, vivenciar e ampliar os conhecimentos adquiridos em sala de aula. Portanto,
      as participações dos alunos são obrigatórias, como previsto contratualmente. 9.2- Festival Cultural/Feira Científica:
      o objetivo desta prática consiste em promover a interdisciplinaridade, a qual será avaliada bimestralmente, seguindo
      critérios devidamente repassados aos alunos. 10.0 - PELO DESCUMPRIMENTO ÀS NORMAS ESTABELECIDAS, O COLÉGIO SUJEITARÁ
      O ALUNO ÀS SEGUINTES SANÇÕES: – advertência escrita – transferência compulsória Obs: Após três advertências escritas
      ou mesmo por falta grave, única, o aluno será suspenso (em todos os casos, os responsáveis serão avisados, via e-mail
      ou contato telefônico). 11.0 - BIBLIOTECA 11.1 - A Biblioteca estará à disposição dos alunos para estudos e pesquisas
      de 2a à 6a Feira, das 7h30 às 17h. OBS: Durante o período de aulas, os alunos só poderão permanecer na Biblioteca mediante
      autorização dos professores ou do SOPE. 11.2 - Os livros que fazem parte do acervo Literário só poderão ser retirados
      com autorização da Bibliotecária, mediante a apresentação de carteira de identificação específica; 11.3 - Os materiais
      para pesquisa só poderão ser utilizados na Biblioteca; 11.4 - Ao aluno que constar alguma pendência na entrega de livro,
      o mesm o somente poderá retirar outro após a sua regularização. 13.0 - XEROX 13.1 - A requisição de xerox, pelos alunos,
      deverá ser feita na Secretaria, no INÍCIO OU TÉRMINO DO PERÍODO, RECREIO OU AULAS VAGAS, com a antecedência MÍNIMA de
      24 horas e mediante pagamento, NO ATO DA MESMA. Não serão aceitas as requisições de alunos que estejam em horário de
      aula. 14 - EXTRATO DO REGIMENTO ESCOLAR DA VERIFICAÇÃO DO RENDIMENTO ESCOLAR: DA EDUCAÇÃO INFANTIL: A avaliação far-se-á
      voltada aos objetivos propostos, verificando o processo evolutivo, o desempenho infantil, observando-se, sistematicamente,
      as atividades significativas e integradas, para que se percebam as dificuldades e o progresso da criança. Em casos especiais,
      através de um enfoque multifrontal, uma equipe de especialistas elaborará uma ficha especial de acompanhamento das atividades
      da criança. A verificação do rendimento escolar será registrada bimestralmente em fichas de acompanhamento pedagógico,
      válida somente dentro do aspecto da faixa etária, e sem objetivo de promoção ou de seleção classificatória para acesso
      ao Ensino Fundamental. PROVAS BIMESTRAIS: conterão TODA A MATÉRIA do bimestre. As mesmas serão realizadas no primeiro
      período do dia e, após esta, haverá aula normalmente. Será composta da seguinte forma: AD= Atividades Diversas = valor
      total (soma) de zero a dez = PESO 2 AM= avaliação mensal = PESO 2 AB= avaliação Bimestral = PESO 2 SIM= SIMULADO = PESO
      1 PROJ. FC = PROJETO FEIRA CULTURAL (2,0 na TAD, durante os bimestres) MÉDIA BIMESTRAL = (AD X 2) + ( AM X 2) + (ABX
      2) + (SIM X1):7 = MB NORMAS DO ENSINO FUNDAMENTAL II E ENSINO MÉDIO 6º a 9º ano> Matemática / Língua Portuguesa / Geografia
      / História / Ciências / Química (a partir do 9ºano) / Física (a partir do 9ºano) / Biologia (a partir do 9ºano) / Artes
      / Língua Inglesa / Língua Espanhola / Filosofia / Educação Física / Técnica de comunicação e redação / Robótica / Educação
      Financeira / Inteligência Emocional 1º a 3º Ensino Médio> Matemática / Língua Portuguesa / Geografia / História / Ciências
      / Química / Física / Biologia / Artes / Língua Inglesa / Língua Espanhola / Filosofia / Sociologia / Educação Física
      / Técnica de comunicação e redação / Educação Financeira / Inteligência Emocional / Empreendedorismo / Voluntariado
      / Orientação Vocacional. • Os alunos do Ens. Médio , tem seu horário de saída conforme segue: (1º e 2º médio – Seg.,Qua.
      e Qui. = 13h50min ) /// ( Ter. E Sext. = 12h50min. ) , (3º médio - Seg./Qua = 13h50min /// Ter./ Qui. e Sex. = 12h50min).
      • O horário de entrada no colégio será 7:30 horas, com tolerância de 10 (dez) minutos. Havendo 3 (três) atrasos, a família
      será comunicada deste. • O horário para assistir a 2ª (segunda) aula será até as 8:15 horas. Após este horário, o aluno
      retornará para casa, mesmo em dia de avaliação, portado ou não de atestado médico. • O aluno que estiver fora da sala
      em horário de aula (cabular aula) levará advertência por escrito e o aluno que tentar entrar após a entrada do professor,
      levará comunicado disciplinar para ser assinado pelo responsável. • Educação Física; o aluno portador de dispensa médica
      deverá permanecer na aula, registrando toda a aula. Uso do uniforme completo inclusive nestas aulas (tênis), compõem
      média nesta disciplina teoria e prática. • A saída antecipada de alunos, SEM EXCEÇÃO, só será permitida com a prévia
      solicitação dos pais, por escrito. Não serão aceitas dispensa via telefone. Nos casos em que o aluno venha a ter algum
      problema de saúde, a comunicação se fará via secretaria, com a devida autorização da coordenação pedagógica. • O uniforme
      completo será obrigatório para o Fundamental II e para o Ensino Médio. • Não será permitido ao aluno o uso de capuz
      e boné em sala de aula , Até o dia 16 de Março DE 2020 o aluno que não estiver trajado com o uniforme, deverá fazer
      uso de no mínimo de uma camiseta branca sendo que após esta data, o mesmo será encaminhado à Coordenação e receberá
      advertência verbal. Em caso de reincidência, receberá as sanções disciplinares cabíveis. • A apostila é um material
      didático obrigatório em todas as aulas, cada dia sem o material o aluno será descontado na TAD 0,2 na disciplina. •
      O colégio conta com a plataforma digital, onde encontrarão atividades, listas de exercícios valendo nota na TAD. • Todos
      os alunos receberão uma agenda personalizada (exceto Ensino Médio), sendo que o uso da mesma é de caráter obrigatório
      (toda a comunicação entre a escola e os responsáveis ocorrerá via agenda, com ciência do mesmo, por e-mail e pelo APP
      "IsCool"). • Em caso de perda da avaliação por motivo de doença, devidamente atestada e com a taxa paga em mãos, os
      alunos terão um prazo de 3 (três) dias, contados a partir da data da prova, para solicitação de prova substitutiva.
      A mesma ocorrerá um ou dois dias após o termino das avaliações bimestrais no período da tarde,previamente agendado pela
      coordenação juntamente com o calendário de provas. A mensal fica a critério do professor da disciplina. • Os boletins
      serão entregues nas reuniões de pais. Em caso de não-comparecimento do responsável, o próprio aluno poderá retirá-lo
      na Secretaria, desde que com média igual ou superior a 6,0 (seis pontos). • Ao término do bimestre, os alunos que não
      atingirem a média necessária, serão convocados para a recuperação, a qual se dará no período da tarde; a mesma consistirá
      em uma aula, com a aplicação da prova logo na seqüência. • Cálculo de Média: MB (média bimestral) + MR (média da recuperação)
      /2 = MBF (média bimestral final). • Será expressamente proibido fumar em qualquer dependência do colégio (inclusive
      no estacionamento), bem como o uso de aparelhos eletrônicos em geral,tablet,celulares, livros não-didáticos, comidas
      e bebidas em sala de aula, comercialização de produtos, além de atitudes verbais ou escritas que firam a moral e os
      bons costumes. A cantina só poderá ser utilizada no horário de entrada, saída e no recreio. • Zelar pela conservação
      dos equipamentos, bem como pelo espaço físico do colégio e em caso de dano, o mesmo deverá ser ressarcido. • As sanções
      estabelecidas pelo descumprimento das normas, serão: advertência verbal, advertência por escrito, suspensão e transferência
      compulsória. • Todos os trabalhos, inclusive os de recuperação, deverão ser manuscritos, salvo os alunos do 9º e 3º
      ano do E.M com o TCF e TCM. • Estudo do meio é uma atividade extraclasse, registrada como dia letivo, portanto a participação
      é obrigatória e compõem nota no bimestre. • Festival Cultural promove a interdisciplinaridade. A qual será avaliada
      bimestralmente, até 2,0 na TAD e no 4º bimestre a participação do aluno compõem média de 0 até 10 pontos. • As avaliações
      mensais serão realizadas pelo próprio professor responsável pela respectiva disciplina; já as avaliações bimestrais
      serão realizadas no 2º(segundo) período do dia, com entrada normal as 7:30 hs. • TCF significa Trabalho de Conclusão
      do Fundamental II. Com uma metodologia que consiste em um tema para o trabalho, escolhido pelo aluno com base em critérios
      que possua afinidade, que tenha relevância para sua formação cientifica e social. Normalmente é um trabalho que envolve
      pesquisa bibliografia com a execução em si e apresentação do projeto frente a uma banca examinadora composta de professores
      e será solicitada a cada aluno individualmente, mas também pode ser montada em dupla ou grupo, sempre seguindo as orientações
      de um professor responsável. A forma de avaliação seguirá critérios devidamente repassados aos alunos. Média do 4ºbim
      (média do 4º bim + média da nota do TCF, dada pela banca , dividido por dois = M 4ºBIM) • TCM significa Trabalho de
      Conclusão do Médio. Com uma metodologia que consiste em um tema para o trabalho, escolhido pelo aluno com base em critérios
      que possua afinidade, que tenha relevância para sua formação cientifica e social. A forma de avaliação seguirá critérios
      devidamente repassado aos alunos. Média do 4ºbim (média do 4º bim + média da nota do TCF, dada pela banca, dividido
      por dois = M 4ºBIM) • A média bimestral será composta da seguinte maneira: FÓRMULA PARA CÁLCULO: MÉDIA BIMESTRAL = (AD
      x 2) + (AM x 2) + (AB x 2) + (SIM x 1) : 7 = MB • As médias, ao longo do ano, não serão arredondadas; isto só ocorrerá
      após o exame final, bem como o conselho de classe referente ao mesmo. • A média anual será a somatória das médias dos
      4 (quatro) bimestres, com os devidos pesos nos bimestres e divididos por 10 (dez). • As avaliações de recuperação têm
      os seguintes valores: a prova valerá 8,0 (oito pontos), a participação na recuperação 1,00 (um ponto) e o trabalho valerá
      1,0 (um ponto), o qual deverá ser manuscrito e entregue no dia da recuperação. Os estudos de recuperação serão ministrados
      pelos respectivos professores das disciplinas. O resultado da recuperação não poderá exceder 6,0 (seis pontos). Caso
      o aluno não atinja a nota limite, valerá a média bimestral. • O aluno que obtiver a média inferior a 6,0 (seis pontos),
      porém, igual ou superior a 3,0 (três pontos) em qualquer disciplina da série cursada, após o encerramento do período
      letivo, será submetido a exame final (limite máximo de 05 disciplinas) da respectiva disciplina. • O aluno será promovido
      para o ano seguinte caso alcance média igual ou superior a 6,0 (seis pontos) ou seja 60 pontos em todas as disciplinas,
      além da frequência mínima de 75% (setenta e cinco por cento) nas aulas. • O aluno que obtiver média igual ou inferior
      a 3,0 (três pontos) será retido, sem direito a realização do exame final. • Os alunos retidos em até 02 (duas) disciplinas
      serão promovidos à série seguinte, com progressão parcial (dependência). • Alunos do 3ºano médio, serão submetidos a
      progressão parcial caso não atinjam a média mínima em até 03 (três) disciplinas, frequentarão as aulas normais da disciplina
      durante o ano letivo. • O aluno frequentará aulas exclusivas para tal, no período contrário àquele em que possui aulas
      regulares, condicionado a frequência mínima de 75% (setenta e cinco por cento) e média igual ou superior a 6,0 (seis
      pontos), nos respectivos bimestres da mesma. • A Compensação de ausência será realizada, em forma de trabalho, na escola
      no período da tarde entre dias 02/12 e 08/12/2020.'
