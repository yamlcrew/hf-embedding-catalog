  - source_sentence: 'Linkpress - Jornal do Salão 2008 by Linkpress - issuu Publicação especial da Honda Automóveis para o
      Salão Internacional do Automóvel - Outubro 2008 Moderna e ousada A participação da Honda Automóveis na 25ª edição do
      Salão Internacional do Automóvel está pautada na combinação de soluções inovadoras com a aplicação de tecnologias de
      ponta em seus produtos. Tudo isso pode ser conferido no lançamento do New Fit, na versão mais avançada do robô-humanóide
      ASIMO, numa miniatura do jato executivo HondaJet e na comprovada qualidade dos automóveis, motocicletas e produtos de
      força. New Fit Literalmente, o New Fit é um novo carro. O nome é apenas uma das inúmeras transformações. O design externo
      ganhou toques de esportividade e seu espaço interno ficou ainda maior. Os modernos motores i-VTEC Flex 16v deixaram
      o carro mais potente em comparação com as versões anteriores. O modelo vem com duplo airbag frontal e computador de
      bordo multifunções no painel Black-out. Além disso, o sistema ULT (Utility, Long and Tall) permite rebater os bancos
      de diferentes formas, oferecendo mais versatilidade e comodidade. São quatro versões: 1.4l —LX e LXL— e 1.5l —EX e EXL,
      todas com opção de transmissão manual ou automática de cinco velocidades com Shift Hold Control. A versão EXL, a top
      de linha, tem entre seus diferenciais os sofisticados bancos em couro e o câmbio Paddle Shift (para versão com transmissão
      automática), que permite trocas manuais com o acionamento de alavancas localizadas no volante, como nos carros da Fórmula
      1. A versão 1.4l atinge 101 cv a 6.000 rpm, na utilização de álcool, e 100 cv a 6.000 rpm, com gasolina. Já a versão
      1.5l alcança 116 cv a 6.000 rpm (álcool) e 115 cv a 6.000 rpm (gasolina). Assim como todos os modelos da Honda, o New
      Fit tem três anos de garantia, sem limite de quilometragem. New Civic Não é à toa que o New Civic conquistou rapidamente
      a confiabilidade dos consumidores e se transformou em líder absoluto de vendas em sua categoria. O modelo redefiniu
      o conceito dos sedãs médios e tornou-se o carro mais desejado do Brasil. Tudo isso graças ao seu design moderno, tecnologia
      de ponta e conceitos inovadores. O modelo conta com o consagrado motor i-VTEC SOHC, com 140 cv de potência, exclusiva
      tecnologia Honda Flex e três anos de garantia. Ressaltando o alto padrão de qualidade Honda em conforto, comodidade
      e segurança, o New Civic apresenta freios ABS com EBD, exclusivo assoalho traseiro plano, painel de instrumentos Black-out
      em dois níveis, transmissão manual ou automática de cinco velocidades, com Paddle-Shift na versão EXS. Civic Si Esportividade,
      tecnologia e sofisticação. Características tão almejadas pelo aficcionado por automóveis estão evidentes em cada detalhe
      do Civic Si. O modelo é equipado com o furioso motor i-VTEC com 192 cv, tem transmissão manual de seis velocidades,
      direção com assistência elétrica EPS e dispositivo LSD (Limited Slip Differential), que distribui melhor o torque tanto
      em curvas como em arrancadas. Além disso, o esportivo da linha Civic possui bancos tipo "concha", pedais de alumínio,
      shift light no painel Blackout em dois níveis, rádio AM/ FM com CD changer compatível com MP3 e WMA, grade frontal exclusiva,
      rodas de liga leve aro 17" e ponteira do escapamento cromada. Honda Accord Uma combinação perfeita entre inteligência
      e sofisticação. Assim pode ser definida a oitava geração do Honda Accord. As duas versões (LX e EX V6) foram desenvolvidas
      nos altos padrões de qualidade e tecnologia Honda: a LX vem com motor i-VTEC SOHC, 4 cilindros e 156 cv. Já a EX V6
      conta com motor i-VTEC SOHC e incríveis 278 cv, além do exclusivo sistema VCM (Variable Cylinder Management), que trabalha
      inteligentemente com 3, 4 ou 6 cilindros, de acordo com a velocidade, a carga e o tipo de piso, sem que haja percepção
      da mudança durante a condução por parte do motorista. Com isso, se torna mais econômico e consegue reduzir a emissão
      de gases poluentes. Seguindo o compromisso Honda de segurança e conforto, o modelo dispõe de freios ABS com EBD e amplo
      espaço interno. A versão EX dispõe de ar-condicionado Dual Zone, faróis de xenon, bancos com sistema VSA (Vehicle Stability
      Assist), que controla a estabilidade do veículo. Honda CR-V Imagine um modelo que conseguiu aliar perfeitamente o conforto
      e a estabilidade dos sedãs com a robustez e a durabilidade encontrada nos utilitários esportivos. Esse carro existe
      e atende pelo nome de Honda CR-V. São duas versões: LX, com tração 4x2, e EXL, com o exclusivo sistema 4x4 Real Time,
      tecnologia que estuda o terreno e, automaticamente, determina a distribuição de torque entre as rodas. O crossover conta
      com motor i-VTEC SOHC, de 150 cv, freios ABS com EBD e transmissão automática de cinco velocidades com o exclusivo sistema
      Grade Logic Control, que eletronicamente escolhe as marchas, proporcionando transições muito mais suaves. O porta-malas
      Double Deck tem capacidade para 1.011 litros, podendo chegar a 2.064 litros com os bancos rebatidos. A versão 4 x 4
      apresenta ainda seis airbags, ar-condicionado Dual Zone, faróis de neblina, bancos em couro e teto solar elétrico. ajustes
      elétricos, teto solar, seis airbags e o Honda Jet A Honda sempre explorou outros meios de locomoção. Um dos resultados
      dessa filosofia de trabalho é o HondaJet, primeira aeronave comercial desenvolvida pela Honda e que faz jus à reputação
      da companhia de constante evolução tecnológica. Equipado com o motor HF118, que alia elevado desempenho e baixo nível
      de emissão de poluentes, o modelo começou a ser comercializado em outubro de 2006 apenas para os Estados Unidos. Mais
      de 100 unidades foram encomendadas e começarão a ser entregues em 2010. Em 2008, a Europa anunciou o início das vendas.
      As primeiras entregas para o mercado europeu estão programadas para acontecer em meados de 2012. Honda Odyssey Primeiro
      veículo Honda no segmento das minivans, a Odyssey consegue unir num mesmo projeto duas características tão almejadas
      pelo consumidor: conforto e excelente dirigibilidade. O modelo possui linhas modernas, oferece amplo espaço interno
      e versatilidade, além dos sistemas ACE (Advanced Compatibility Engineering) e VSA (Vehicle Stability Assist). O primeiro
      é responsável por dissipar o impacto de uma colisão frontal, enquanto o segundo melhora a estabilidade do veículo. O
      motor i-VTEC V6 utiliza a tecnologia VCM (Variable Cylinder Management), que é responsável por desativar alguns dos
      seis cilindros do motor quando o carro não precisar deles. Com isso, se torna mais econômico. Honda Racing F1 Team A
      vocação para competições faz parte do DNA da Honda. Sua trajetória de sucesso nas pistas é reflexo de anos de estudo
      e desenvolvimento de inovações tecnológicas que resultaram em uma história repleta de vitórias: desde 1964, quando começou
      na F1, a marca conquistou 72 vitórias, cinco campeonatos de pilotos, sendo três com o brasileiro Ayrton Senna, e seis
      títulos de construtores. O modelo atual, o RA108, possui um alto grau de eficiência aerodinâmica e motor V8, o RA808E,
      que gera potência máxima de mais de 700 HP e aproximadamente 19.000 rpm. Outro diferencial é o visual: representa a
      evolução do premiado conceito My Earth Dream, iniciado em 2007 e que busca utilizar a visibilidade da principal categoria
      do automobilismo mundial para fornecer apoio a causas sociais e ambientais. ASIMO Dois anos depois de sua primeira aparição
      no Brasil, no Salão Internacional do Automóvel de 2006, o ASIMO (Advanced Step in Innovative Mobility) está de volta
      e é uma das atrações do Salão Internacional do Automóvel. Assim como os produtos da Honda, o robô humanóide evoluiu.
      Reflexo de mais de duas décadas de pesquisas da marca em mobilidade, a nova versão incorporou inúmeros avanços em comparação
      ao seu antecessor e faz coisas inimagináveis pouco tempo atrás. Tem capacidade para ultrapassar obstáculos, desenvolver
      trabalhos como carregar uma bandeja, subir e descer escadas, auxiliar pedestres a andar na rua, chutar uma bola e correr
      até seis quilômetros por hora. Com todos esses atributos, o ASIMO se tornou uma celebridade por onde passa. Já regeu
      a Orquestra Sinfônica de Detroit (EUA), apareceu em diversos salões internacionais, faz apresentações no parque de diversões
      americano Disneylândia e visitou as crianças vítimas do terremoto de Sichuan, na China. A atuação da Honda no país não
      se restringe aos CBR 1000RR Fireblade A versão 2008 que chegou recentemente ao Brasil revolucionou o mercado das superesportivas.
      Tudo porque o modelo está com um novo design, formas mais compactas, menor peso e a mais alta tecnologia Honda das pistas
      ao alcance do público. O resultado é um comportamento ágil e preciso, além de uma pilotagem mais esportiva. automóveis
      e às motocicletas. Em mais de 35 anos de atividades no território nacional, a marca dispõe de um terceiro e importante
      pilar de sustentação. Tratase dos produtos de força. Sua linha é representada por uma extensa gama de produtos, como
      motores estacionários, geradores, motobombas, roçadeiras, cortadores de grama e motores de popa. Durabilidade, resistência,
      economia de combustível e menor vibração são alguns dos benefícios desses equipamentos, que atingem os mais diversos
      setores da economia (agricultura, construção civil e lazer). XL 1000V Varadero Conforto, versatilidade e alta tecnologia
      são alguns dos atributos dessa autêntica Max Trail. Importado da Espanha, o modelo é ideal para viagens de aventura.
      Seu motor de 996 cm 3 assegura força e resistência para enfrentar estradas de terras ou vias pavimentadas. Shadow 750
      Desempenho mais suave e progressivo, bem como uma pilotagem confortável. Assim pode ser definida a versão 2009 da Honda
      Shadow 750, que recebe o moderno sistema de injeção eletrônica de combustível PGM-FI (Programmed Fuel Injection). Destaque
      também para as cores e grafismos, onde cada motocicleta possui estilo único e atrativo para os consumidores. Honda Serviços
      Financeiros A Honda Serviços Financeiros (HSF) é composta pelo Consórcio Nacional Honda, Banco Honda, Honda Leasing
      e GHB Corretora de Seguros. O principal objetivo da HSF é facilitar o processo de expansão do mercado e dar suporte
      às operações das concessionárias para garantir a aquisição de motocicletas e automóveis da marca. Neste ano, o Consórcio
      Nacional Honda – maior administradora de consórcio do país – ultrapassou a marca de 2,5 milhões de motocicletas zero-quilômetro
      entregues, comprovando o benefício da acessibilidade Referência mundial em tecnologia e a primeira motocicleta a possuir
      sistema de airbag no mundo, o modelo chegou para atender os anseios de um público que busca máxima diferenciação e estilo
      sobre duas rodas. Entre outros atrativos, conta com sistema de áudio com controle automático de volume e compartimento
      de bagagem. para aqueles que desejam ter um produto Honda. O Banco Honda e a Honda Leasing apresentam atendimento personalizado
      e parceria junto à rede de concessionárias por ser um banco de fábrica. Já a GHB Corretora de Seguros oferece ampla
      cobertura para roubo, furto, colisão, incêndio e total assistência aos clientes em casos de acidentes e panes. Honda
      Automóveis do Brasil A história da Honda Automóveis do Brasil se confunde com a do próprio setor automotivo nacional.
      Desde 1997, quando abriu as portas de sua fábrica em Sumaré (SP), mostrou-se atenta aos anseios de um exigente consumidor.
      Desenvolvidos com muita qualidade e tecnologia de ponta, seus veículos ganharam rapidamente a confiabilidade. Até hoje,
      contabiliza mais de 500 mil unidades produzidas no Brasil. Para atender uma demanda cada vez maior, a empresa ampliou
      sua capacidade produtiva e passou a fabricar 650 unidades diariamente. Também otimizou a produção de veículos com a
      inauguração do Power Train, setor responsável pelo desenvolvimento dos principais processos para a fabricação de motores
      —fundição e usinagem dos blocos e cabeçotes. Esse compromisso com a sociedade também se estende para soluções socialmente
      responsáveis, ecologicamente conscientes e economicamente viáveis com a aplicação do conceito Green Factory (Fábrica
      Ecológica). O programa procura inovar o processo produtivo, reduzindo resíduos na produção, maximizando o uso eficiente
      de energia sem causar danos ao meio-ambiente e promovendo ações de cunho social. Parte desse sucesso da marca também
      se deve ao envolvimento e a qualidade nos serviços de sua rede de concessionárias espalhadas pelo país. Harmonia no
      trânsito Além de desenvolver produtos que proporcionam prazer e segurança, a Honda sempre se mostrou preocupada com
      o bem-estar da sociedade. Por isso, lançou recentemente uma campanha a fim de contribuir para a conscientização de motociclistas,
      motoristas, ciclistas e pedestres sobre a importância de um trânsito seguro a todos. Com o lema "Desejamos harmonia
      no trânsito porque sonhamos com um mundo melhor", a campanha utiliza uma linguagem lúdica para inspirar as pessoas a
      exercerem sua cidadania e promoverem um convívio mais amigável nas ruas. Ecologicamente correto O envolvimento da Honda
      Automóveis com o tema responsabilidade ambiental pode ser conferido em cada detalhe de sua participação no 25º Salão
      Internacional do Automóvel. Está presente na tecnologia Flex utilizada nos veículos nacionais, nas sacolas distribuídas
      aos visitantes que foram produzidas com material oxibiodegradável, no piso do estande feito com madeira 100% reflorestada
      e na neutralização dos impactos causados pelo evento com a aquisição de créditos de carbono. Reforçando ainda mais o
      conceito, essa publicação foi feita com papel ecologicamente correto. Publicação especial do Departamento de Marketing
      da Honda Automóveis do Brasil para o Salão Internacional do Automóvel Editor Responsável: Ricardo Ghigonetto • Redação:
      Fernando Stella e Priscilla Martini • Design Gráfico: Alexandra Marchesini Produção: Linkpress Assessoria e Comunicação
      Ltda. • Pabx: (11) 5594-7577 • E-mail: linkpress@linkpress.com.br Linkpress - Jornal do Salão 2008 Jornal desenvolvido
      para a Honda pela Linkpress na ocasião do Salão Internacional do Automóvel 2008, em São Paulo.'
    sentences:
    - 'Revista Nordeste Meirelles: não há previsão de ajuda aos estados em calamidade financeira - Revista Nordeste Meirelles:
      não há previsão de ajuda aos estados em calamidade financeira "Não temos ainda uma data específica para isso, porque
      eles estão enfrentando um problema sério, mas a União também, portanto devemos priorizar", disse Meirelles, que explicou
      não haver, neste momento, nenhum caminho jurídico que permita adiar o pagamento da dívida dos estados em crise com a
      União. Ontem (29), o presidente Michel Temer vetou trechos do regime especial de recuperação fiscal dos estados que
      havia sido aprovado no Congresso, sob o argumento de que com a retirada, por parte da Câmara dos Deputados, da maior
      parte das contrapartidas de ajuste fiscal a serem implementadas pelos estados em troca da ajuda federal a medida havia
      se tornado "mais ou menos inútil". "Nós estamos, como todos, muito preocupados com a situação emergencial dos estados,
      mas é importante não transferirmos implicitamente o problema da dívida dos estados para a União. A União não criou o
      problema dos estados. A União está enfrentando e equacionando seus próprios problemas", disse. Segundo o ministro, independentemente
      de eventual ajuda federal, cabe aos estados implementarem medidas para tornar sustentável a situação fiscal. "Não se
      deve criar essa ilusão de que tudo depende de uma ajuda federal. A ajuda federal, primeiro, tem toda uma limitação do
      ajuste fiscal federal, para não prejudicar a recuperação da economia", afirmou. Meirelles não informou quando o governo
      enviará ao Congresso um novo projeto de lei para garantir as contrapartidas dos estados para a renegociação da dívida.
      "Temos que fazer o trabalho bem-feito, e o mais rápido possível será anunciado."'
    - '01 - Meninos que Mordem Mamãe vai querer me matar se descobrir que eu estou me transformando em um vampiro... Bom,
      tecnicamente não pode por que eu sou imortal... Bom, tudo bem, ainda não. Deixe-me explicar. Meu nome é Sunshine Mcdonald
      e devido ao pior dos casos de confusão de identidade com a minha irmã gêmea gótica, Rayne, fui parar em um clube noturno
      chamado "Club Fang" onde Magnus, um vampiro que é muito, muito gostoso, acabou mordendo o meu pescoço inocente em vez
      do dela. Agora, se eu não agir a tempo, Magnus será meu companheiro de sangue para sempre e estarei condenada a ser
      uma bebedora de asquerosos goles de sangue, pálida e inimiga da luz do dia. Acredite em mim, as mordidas de vampiro,
      são coisa séria! Depois do lamentável assassinato do líder dos vampiros, compete a minha irmã e eu, e a Magnus, encontrar
      a única coisa que pode resolver o meu problema: o Santo Graal. Não é brincadeira. Realmente tenho a esperança de sair
      disto a tempo, por que de alguma forma isto coincidiu com o baile de formatura o qual se supõe que eu irei com o garoto
      mais lindo e popular da escola, Jake Wilder. E eu não quero ser uma vampira para então... e muito menos para o resto
      da eternidade. 02 -Marque Isso! Tudo o que eu quero é ser um vampiro. Mas nãooo – Eu tenho que ser Rayne McDonald, Caçadora
      de Vampiros... Irmãs. Elas vão roubar suas roupas, seus namorados e seus destinos. Mas isto não foi exatamente culpa
      da minha gêmea Sunny. Magnus, um vampiro bonito e líder da convenção, confundiu-a comigo no mês passado e a mordeu em
      vez de mim. E agora eles estão tendo uma espécie de namoro entre espécies. Mas de volta para mim. Acontece que a cada
      geração, há um caçador de vampiros – e desta vez acontece de ser eu. Minha primeira missão: infiltrar-me em um decadente
      bar de vampiros no centro e expor o seu proprietário vampiro que deliberadamente está propagando uma doença no sangue
      que ele mesmo criou. Uma tarefa quase mais difícil do que passar em trigonometria. Depois de ir sozinha uma vez, eu
      percebo que preciso de ajuda. E Magnus envia seu atraente amigo Jareth para ir comigo em segredo. E deixe-me dizer que
      eu não me importaria em ir para debaixo das cobertas com ele. Talvez o destino não morda depois de tudo. 03 - Meninas
      Que Rosnam Ela é um vampiro. E, também é uma caçadora de vampiros (isto é uma longa história) e agora, Rayne Mcdonald,
      a garota gótica, tem de realizar a sua maior missão: passar no teste das animadoras de torcida. Rayne já tem o suficiente
      em sua vida: sua gémea continua reclamando que realmente quer se converter, o namorado da sua mãe se mudou e seu homem,
      Jareth, que agora pode sair na luz do sol, passou de vampiro para se transformar em uma espécie de surfista. Ela tem
      uma nova missão. Um membro da equipe de futebol desapareceu – e seus chefes – acham que as animadoras tiveram alguma
      coisa a ver com isso. Agora mesmo, querem que ela se infiltre na gangue e consiga pegá-las.'
