- source_sentence: Peru declara emergência e manda exército patrulhar vias bloqueadas O governo do Peru ordenou nesta quinta-feira,
    7, que suas forças armadas supervisionem as rodovias, em meio a protestos contra o aumento dos preços dos alimentos e
    dos combustíveis que paralisaram o país e deixaram ao menos cinco mortos. A medida foi anunciada em um decreto publicado
    no diário oficial El Peruan, que detalhou que "a Polícia Nacional do Peru mantém o controle da ordem interna, com o apoio
    das Forças Armadas" nas áreas de emergência. O decreto também suspende "os direitos constitucionais relativos à liberdade
    de trânsito em território nacional, liberdade de reunião e liberdade e segurança pessoais" na rede rodoviária. O país
    está repleto de bloqueios nas estradas há mais de uma semana. Os atos ganham força à medida que a raiva aumenta com a
    elevação dos custos, desencadeada com a invasão russa da Ucrânia. Seja assinante O POVO+ O Peru está enfrentando sua maior
    taxa de inflação em um quarto de século. O presidente Pedro Castillo se esforçou para apresentar soluções significativas.
    Esta semana, ele decretou toque de recolher em Lima para tentar reprimir a dissidência. A medida, porém, foi desafiada
    por milhares de pessoas que tomaram as ruas em protestos que se tornaram violentos e acabou suspensa. O governo cortou
    impostos sobre combustíveis e aumentou o salário mínimo e também propôs isentar alimentos essenciais do imposto sobre
    vendas. Castillo, que era camponês e professor antes de assumir o cargo, também está em uma situação política precária.
    Seus índices de aprovação caíram para 19%, um recorde de baixa de acordo com uma pesquisa da Datum publicada nesta quinta-feira.
    Recentemente, ele sobreviveu a um segundo impeachment em menos de um ano no cargo. (COM AGÊNCIAS INTERNACIONAIS)Dúvidas,
    Críticas e Sugestões? Fale com a gente
