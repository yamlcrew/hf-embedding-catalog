  - 'Desvendando as barreiras para a reconceitualização do problema na dor crônica: a capacidade real e percebida dos pacientes
    e profissionais de saúde para compreender a neurofisiologia Graças à neurociência hoje a dor e seu gerenciamento deveriam
    ser entendidos de maneira diferente a como era pouco tempo atrás. Deveriam. Mas será que isso ocorre entre os profissionais
    da saúde? E nos pacientes? E será que ambos, os profissionais e os leigos, concordam naquilo que entendem? Averiguar isso
    pega mal, mas é fundamental. Veja aqui o que descobriu quem se atreveu a fazê-lo. Não tenha medo, foi na Austrália. RESUMO
    Para identificar a dificuldade de reconceitualização do problema na dor crônica, este estudo teve como objetivo avaliar
    se (1) os profissionais de saúde e os pacientes podem compreender informações precisas sobre a neurofisiologia da dor
    e (2) estimar com precisão a capacidade dos pacientes. para entender a neurofisiologia da dor. Os testes de conhecimento
    foram completados por 276 pacientes com dor crônica e 288 profissionais sobre a neurofisiologia da dor. Profissionais
    estimaram o desempenho típico do paciente no teste. Os participantes não treinados tiveram um desempenho ruim (média ±
    desvio padrão, 55% ± 19% e 29% ± 12% para profissionais e pacientes, respectivamente), comparados aos seus colegas treinados
    (78% ± 21% e 61% ± 19%, respectivamente). O escore estimado do paciente (46% ± 18%) foi menor que o escore real do paciente
    (P <0,005). Os resultados sugerem que profissionais e pacientes podem entender a neurofisiologia da dor, mas os profissionais
    subestimam a capacidade de compreensão dos pacientes. As implicações são (1) um conhecimento insuficiente das informações
    atualmente precisas sobre a dor e (2) a subestimação da capacidade dos pacientes de entender informações corretas sobre
    a dor representam barreiras para a reconceitualização do problema na dor crônica dentro das "áreas" clínicas e leigas.
    Um princípio básico da medicina baseada em evidências (MBE) é que todo esforço é feito para considerar, no processo clínico,
    a melhor evidência disponível a partir de dados básicos e da ciência clínica.1 A busca dos princípios da MBE na prática
    clínica significa que etiologias, diagnósticos e regimes de tratamento previamente aceitos são às vezes descartados.2
    Quando populares são descartados, os profissionais de saúde devem envolver seus pacientes na reconceitualização do problema.
    A reconceitualização do problema é particularmente importante em áreas nas quais a abordagem convencional está enraizada
    em crenças e atitudes robustas. Uma dessas áreas é a dor crônica inespecífica. As explicações para a dor crônica são frequentemente
    baseadas em um modelo de patologia estrutural. Esse modelo considera a dor crônica inespecífica como sendo causada por
    dano tecidual não resolvido ou por um distúrbio psicológico.3 Esse modelo pressupõe que o sistema nervoso é composto de
    vias robustas específicas da modalidade e que existe uma relação estável e isomórfica entre a lesão e a dor.4 Contudo,
    existe um vasto corpo de evidências em contrário; a nocicepção não é suficiente nem necessária para evocar a dor5 e os
    fatores psicossociais são mais importantes do que os fatores físicos no desenvolvimento da dor crônica inespecífica.6
    Este último achado está refletido nas diretrizes de manejo da dor da coluna em todo o mundo.789101112 Tentativas foram
    feitas para reconceitualizar o problema da dor crônica de uma perspectiva comportamental.1314 No entanto, com poucas exceções,
    nenhuma tentativa foi feita para aumentar a compreensão do paciente sobre a neurofisiologia da dor. Considerando o progresso
    que tem sido feito recentemente na ciência da dor, isso é intrigante. Talvez os profissionais de saúde não consigam entender
    informações corretas sobre a neurofisiologia da dor. Alternativamente, talvez os profissionais de saúde possam entender
    a neurofisiologia da dor, mas seus pacientes não podem. Finalmente, talvez tanto os profissionais de saúde quanto os pacientes
    possam entender a neurofisiologia da dor, mas os profissionais de saúde percebem que seus pacientes não podem. Os objetivos
    deste estudo foram avaliar (1) se profissionais de saúde e pacientes podem entender informações precisas sobre a neurofisiologia
    da dor e (2) se os profissionais de saúde estimam com precisão a capacidade dos pacientes de entender informações corretas
    sobre a neurofisiologia da dor. Tabela 1. Neurofisiologia do Teste de Dor MATERIAL E MÉTODOS Participantes Duzentos e
    noventa e sete pacientes consecutivos com dor crônica e duzentos e noventa profissionais de saúde foram convidados a participar
    do estudo. Vinte e dois pacientes e dois profissionais diminuíram. Assim, 276 pacientes e 288 profissionais participaram
    do estudo. Setenta dos pacientes também participaram de um de dois outros estudos.15 Protocolo O projeto foi aprovado
    pelo comitê de ética institucional e estava de acordo com a Declaração de Helsinque. Depois de dar o consentimento informado,
    cada participante completou um teste sobre a neurofisiologia da dor (Tabela 1). Os itens do teste foram baseados em artigos
    de exame dados a estudantes de medicina da dor de pós-graduação. Trinta itens foram inicialmente selecionados com base
    no fato de que eles estavam diretamente relacionados ao material que foi apresentado nas sessões de educação e poderiam
    ser modificados em um formato verdadeiro-falso. Dez itens foram removidos porque era difícil expressá-los tanto para pacientes
    quanto para profissionais sem perder sentido em nenhum dos grupos. Dois itens foram removidos porque pareciam replicar
    outros itens. Finalmente, cada item foi verificado quanto à precisão de acordo com o texto atual. Os testes dados aos
    pacientes e profissionais foram idênticos, além dos pontos semânticos (por exemplo, "nocicepção", para os profissionais
    foi "recepção de perigo" para os pacientes). Os pacientes foram escolhidos entre aqueles que participaram de uma sessão
    de educação de um-para-um sobre a neurofisiologia da dor, para a qual foram encaminhados por um provedor de medicina ou
    reabilitação e foram financiados por um terceiro. A sessão de educação foi desenvolvida como precursora de um programa
    intensivo multidisciplinar de controle da dor e envolveu uma palestra direta de um fisioterapeuta especialmente qualificado.
    A palestra consiste em um programa de material relativamente padronizado, com figuras desenhadas à mão. O material foi
    discutido em outro lugar. Embora os educadores não tenham sido cegados para os itens do teste, o material não foi especificamente
    direcionado às perguntas do teste e os participantes não foram treinados para ajudar a concluir corretamente o teste.
    A maioria dos pacientes (n = 144) completou o teste após a participação, mas para comparar as pontuações antes e depois
    da educação, o restante dos pacientes (n = 142) foi alocado aleatoriamente para completar o teste antes (n = 65) ou depois
    (n = 67) da sessão de educação. Ao todo, 65 e 208 testes foram aplicados antes e após a sessão de educação, respectivamente.
    A maioria dos profissionais de saúde (n = 151) completou o teste após participar de um seminário em grupo sobre a neurofisiologia
    da dor (duração ~ 3 horas, apresentação audiológica) pelo qual eles ou seus empregadores pagaram US $ 45,00 como parte
    da educação profissional contínua. O material não foi destinado a itens específicos no teste, e os participantes não foram
    treinados para completar com sucesso o teste. Para comparar os resultados dos testes antes e depois do seminário, o restante
    dos profissionais de saúde foi alocado aleatoriamente para completar o teste antes (n = 66) ou após (n = 71) o seminário.
    Ao todo, 66 e 222 testes foram administrados antes e depois do seminário, respectivamente. O material foi baseado no conhecimento
    atual da neurofisiologia da dor, de acordo com as seções relevantes de Wall e Melzack.16 Não havia material sobre as respostas
    cognitivas ou comportamentais à dor, não porque esses fatores não são considerados importantes, mas porque a corrente
    do estudo limitou-se à neurofisiologia da dor. As únicas diferenças entre o material apresentado aos pacientes e aos profissionais
    foram semânticas. Depois que os profissionais concluíram o teste, eles foram avisados que a pontuação média para profissionais
    de saúde treinados era de 80%. Este valor foi obtido a partir de um estudo piloto de 53 profissionais de saúde, em que
    a média ± desvio padrão (DP) do teste após um seminário de educação foi de 80% ± 14% (G.L.M., dados não publicados, 1998).
    Os profissionais foram orientados sobre as diferenças semânticas no material e teste do paciente e, em seguida, perguntaram:
    "Se um paciente com dor crônica típica foi apresentado com o mesmo material apresentado hoje, que porcentagem você acha
    que marcaria nesse teste?" Análise estatística Com Statistica 5.1 (Statsoft, Tulsa, OK), as seguintes análises foram realizadas.
    Uma análise de variância de dois fatores (pontuação x grupo) foi usada para identificar diferenças entre pacientes treinados,
    pacientes não treinados, profissionais treinados, profissionais não treinados e escores estimados de pacientes. Uma análise
    de regressão foi utilizada para avaliar a relação entre o escore profissional e o escore estimado do paciente. Duas análises
    multivariadas de variância foram usadas para avaliar a variância em (1) a pontuação ou o escore estimado do paciente entre
    os grupos profissionais e (2) o escore, ou escore estimado do paciente, entre aqueles com e sem medicação específica para
    a disciplina ou dor. Qualificações de pós-graduação em ciências cine / dor. Uma análise de regressão linear múltipla foi
    usada para determinar o efeito da idade, anos de experiência com pacientes com dor e número de pacientes com dor por semana
    no escore estimado do paciente. Com uma correção de Bonferroni, a significância foi fixada em 0,01. Os dados foram explorados
    post hoc usando testes de Newman-Kuels. RESULTADOS Participantes Cinco pacientes e um profissional de saúde retornaram
    aos testes completos, deixando dados completos para 205 pacientes treinados (65 não treinados) e 221 treinados (66 não
    treinados) e profissionais, respectivamente. Não houve diferenças nos dados descritivos entre os sujeitos alocados aleatoriamente
    para testes completos antes ou depois da educação (P <0,35 para todos). Consequentemente, os dados desse subgrupo de participantes
    treinados foram reunidos com os dados do restante dos participantes treinados. Agrupou os dados descritivos para os pacientes
    (Tabela 2) e profissionais (Tabela 3) são apresentados. Nos dados agrupados, a proporção de pacientes com dor na coluna
    foi menor no grupo de pacientes não treinados do que no grupo de pacientes treinados (teste exato de Fisher, P <0,01).
    Não houve outras diferenças entre os grupos nos dados agrupados. Tabela 2. Dados Descritivos para Pacientes Escores de
    Teste para Pacientes e Profissionais Profissionais treinados tiveram melhor desempenho, seguidos por pacientes treinados
    e profissionais não treinados (p <0,05), e pacientes treinados (p <0,001 para todos) (média ± dp [intervalo de confiança
    (IC) de 95%] , 78% – 21% [74% a 81%], 61% – 19% [57% a 64%], 55% – 21% [52% a 59%] e 29% – 12% [26% a 32%] profissionais
    formados, pacientes treinados, profissionais não treinados e pacientes não treinados, respectivamente) (Fig. 1). Terapeutas
    do exercício, médicos, terapeutas ocupacionais e fisioterapeutas marcaram 85% e enfermeiros, psicólogos e conselheiros
    de reabilitação marcaram 65%. Cada uma das profissões do primeiro grupo teve um desempenho melhor do que cada uma das
    profissões do segundo grupo (P <.01) (Fig. 2). Não houve relação entre escore profissional e idade, anos de experiência
    com pacientes doridos, número de pacientes com dor por semana (p <.42). Os profissionais que possuíam uma pós-graduação
    em medicina da dor ou de ciência da dor realizaram melhor do que o outro (P <0,005 para ambos) (Fig. 3). Não houve diferença
    no desempenho entre os participantes com e sem uma qualificação de pós-graduação específica na disciplina em seu campo.
    Tabela 3. Dados Descritivos para Profissionais Estimativas dos profissionais treinados das pontuações dos pacientes A
    média + SD (95% CI) escore estimado do paciente foi de 46% – 18% (43% a 48%), o que foi menor que o escore do paciente
    asiático (P <0,005). Os terapeutas ocupacionais fizeram estimativas mais altas do que os enfermeiros e conselheiros de
    reabilitação (p <0,01 para ambos), e os psicólogos fizeram estimativas mais baixas do que todas as outras profissões de
    saúde (p <0,01 para todos) (Fig. 2). Houve uma fraca relação entre o escore profissional treinado e o escore estimado
    do paciente (r ≤ 0,16, p <0,01). Discussão O principal achado deste trabalho é que tanto os profissionais de saúde quanto
    os pacientes são capazes de entender a neurofisiologia da dor, mas os profissionais de saúde subestimam a capacidade de
    compreensão dos pacientes. Isso é comprovado pelos escores mais altos obtidos por participantes treinados comparados aos
    participantes não treinados e à baixa estimativa de escores dos pacientes comparados a escores reais de pacientes. A relação
    fraca entre pontuação profissional e a estimativa da pontuação do paciente sugere que a subestimação por profissionais
    não era simplesmente um reflexo da sua própria capacidade de compreender as informações. O achado principal é importante
    porque sugere que os profissionais da saúde que subestimam a capacidade de compreensão dos pacientes podem ser um guia
    primário ou conceitualização do problema da dor crônica. É razoável supor que, se os profissionais de saúde acreditarem
    que seus pacientes não entenderão as informações, não tentarão incluir sua abordagem de manejo ou prevenção. A este respeito,
    é particularmente digno de nota que os psicólogos, que visam explicitamente a reconceitualização do problema, subestimaram
    a pontuação do paciente em uma quantidade maior do que qualquer outro grupo profissional. A exclusão de informações atualmente
    precisas da administração é contrária aos princípios da EBM, que exigem que a melhor evidência disponível das ciências
    básicas e clínicas seja incorporada ao gerenciamento.17 A falha em fornecer informações precisas provavelmente também
    limita a eficácia. A conceituação da dor crônica em termos de um modelo estrutural-patológico é pensada para melhorar
    a experiência da paciente1819, e a provisão de informações baseadas neste modelo aumenta o consumo de cuidados de saúde.20
    Mostramos que fornecer informações precisas sobre a neurofisiologia da dor reduz crenças e atitudes inadequadas sobre
    dor (GL Moseley e MK Nicholas, dados não publicados, 2001) e, combinada com fisioterapia, melhora parâmetros funcionais
    e sintomáticos em pessoas com dor crônica incapacitante.21 Estratégias de educação com foco em informações atualmente
    precisas sobre a resposta comportamental à dor também relataram eficácia tanto num contexto de gestão como de prevenção.222324
    Os resultados atuais podem destacar a importância da educação em ciências da mão na formação formal ou profissional em
    todas as profissões de saúde. Profissionais treinados e não treinados, que tinham um curso de pós-graduação em medicina
    da dor / ciência da dor, tiveram um desempenho muito bom em comparação com os profissionais não treinados que não o fizeram.
    A discrepância no desempenho entre profissões provavelmente reflete o conteúdo e a natureza dos programas de treinamento
    para os respectivos grupos profissionais. Nomeadamente, os profissionais que concluíram o treinamento de pós-graduação
    em disciplina específica não tiveram melhor desempenho no teste, o que sugere que também existem deficiências no nível
    de pós-graduação. A maioria dos participantes do grupo profissional estava praticando no campo da dor, e não houve efeito
    da experiência ou carga do paciente nos parâmetros avaliados. Essa descoberta apoia a robustez do esquema cognitivo convencional
    sobre a dor crônica na arena clínica. É importante notar, no entanto, que a validade externa dessa descoberta pode ser
    limitada porque os profissionais empregados aqui trabalhavam em 1 de 2 cidades australianas. Não está claro como é representativo
    dos profissionais de saúde em outros lugares a experiência ou treinamento desses profissionais. Os resultados também destacam
    a robustez do esquema convencional na arena leiga; o desempenho dos pacientes não treinados (≤ 29%) foi menor que o escore
    médio devido ao acaso (50%). Várias limitações potenciais deste trabalho devem ser observadas. Primeiro, é possível que
    os pacientes aqui avaliados não fossem representativos do paciente com dor crônica típica visto pelos profissionais participantes.
    É importante ressaltar que os pacientes não eram altamente qualificados (9 anos de educação formal) e eram similares em
    idade, incapacidade e duração dos sintomas àqueles usados em pesquisas clínicas em outros lugares.25 Segundo, a validade
    de construto do teste utilizado não foi estabelecida. Embora não haja padrão-ouro, o fato de profissionais com qualificação
    de dor especializada terem escores mais altos (? 95%) do que aqueles sem (53%) corrobora a validade do teste. Terceiro,
    não é impossível que o formato diferente para a apresentação e as diferenças semânticas entre as estratégias profissionais
    e de educação do paciente possam ter levado a estimativas mais baixas dos profissionais. O impacto dessa doença foi provavelmente
    limitado ao enfatizar aos profissionais que os pacientes participaram de sessões individuais, em vez de um seminário em
    grupo. Finalmente, a capacidade percebida de entender é um construto complexo e multidimensional, e as informações obtidas
    da única pergunta usada aqui são obviamente limitadas. Embora a abordagem atual fornecesse informações importantes, a
    exploração completa do construto da capacidade percebida de entender provavelmente ofereceria resultados mais significativos
    e informativos. Em resumo, o trabalho atual descobriu que, embora tanto os profissionais de saúde quanto os pacientes
    tenham um conhecimento deficiente da neurofisiologia da dor, o fornecimento da informação resulta em melhora significativa
    em ambos os grupos. No entanto, os profissionais de saúde subestimam a capacidade de seus pacientes entenderem as informações.
    Esses fatores provavelmente não indicam que as informações atualmente precisas sobre a neurofisiologia da dor (1) não
    formam a base teórica do tratamento e (2) não são apresentadas aos pacientes como parte de uma abordagem gerencial. Além
    de serem contrários aos princípios da MBE e, provavelmente, limitarem a eficácia da intervenção, esses fatores provavelmente
    serão as principais barreiras para a reconceitualização do problema da dor crônica nas áreas clínica e leiga.'
