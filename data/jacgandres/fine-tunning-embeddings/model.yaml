- source_sentence: Biue ou. En
  sentences:
  - 'la industria escocesa dedi- cada a la explotación de las pizarras bituminosas, se da este nombre al aceite obtenido de
    petróleo pesado y parafina, por medio del enfriamiento y compre- sión, para separar la parafina du- ra. Se refina y fracciona
    en acei- tes lubricantes. (Bacon and Hamor.) A ceite británico o in- gles. British Oil. Lini- mento rubefaciente, c o
    m- puesto de aceite de trementina, aceite de linaza, aceite de ámbar, aceite de enebro y petróleo. (Bacon and Hamor.)
    21 A ceite compuesto, com, pounded Oil. Los aceites minerales lubricantes son mezclados, frecuentemente, con aceites de
    semillas; por ejemplo: los aceites de nabo y de semilla de algodón, soplados, se emplean para aumentar la viscosidad.
    Ade- más, también se agregan a los aceites minerales, con frecuencia, cantidades variables de aceites animales, con objeto
    de manufac- turar aceites para cilindros, y al- gunas veces se imparte una visco- sidad artificial a los aceites mi- nerales
    menos viscosos, por la adi- ción de aceite de resina, o de oleato o palmitato de aluminio. (Bacon and Hamor.)'
  - 'tín parum, affinis, que tiene poca afinidad.) Substancia sólida, blanca, traslúcida, inodora, menos densa que el agua
    y fácil- mente fusible. Se obtiene destilan- do petróleo o materia bituminosas naturales; es una mezcla de car- buros
    de hidrógeno y se emplea pa- ra fabricar bujías. (Dic. de la Real Academia Es- pañola.) Substancia blanca, cerosa, pa-
    recida a la espermaceti o esperma de ballena y que se obtiene del pe- tróleo, de alquitrán de hulla, del alquitrán de
    madera, etc. 2. Subs- tancia blanca, inodora, cerosa e insípida, más dura que el sebo y más blanda que la cera, con peso
    específico de 0.890. Insoluble en el agua: indiferente a los ácidos más poderosos, a los álcalis y al cloro, puede ser
    destilada, sin al- terarse, con ácido sulfúrico con- centrado. El alcohol caliente, el éter, la trementina, el aceite
    de olivo, el benzol, el cloroformo y el bisulfuro de carbono la disuelven fácilmente. Puede mezclarse en todas proporciones
    con cera, es- tearina, palmitina y resinas. (Bacon.) La parafina se encuentra en es- tado nativo en la ozoquerita y en
    la hatchetita, también en la tur- ba y en el carbón bituminoso y existe en numerosos aceites, como el de petróleo, del
    cual se le se- para por destilación. (Standard.) 251 Parafina es una cera que se ob- tiene de los últimos productos de
    la refinación del petróleo crudo; es sólida, blanca cuando está re- finada; tiene un peso específico de 0.89 aproximadamente
    y su punto de fusión está comprendido entre 43° y 85° O. (Decreto del Presidente de los Estados Unidos Mexicanos, del
    11 de enero de 1928.)'
  - M alacate de las tube- rías. Calf Wheel. Desíg- nase así al tambor, que en los equipos Imperial y California se destina
    a ejecutar las manio- bras de entubación de los pozos. (Véase N 9 45, croquis N» 2.)
