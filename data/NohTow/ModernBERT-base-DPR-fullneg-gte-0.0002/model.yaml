    my way of thinking?
  - Why am I thinking too much?
  - Why am I thinking too much about everything?
  - If I keep choosing not to fully think about a concept or grab onto it when it appears in my mind while I am reading or
    doing something else, am I damaging my brain's ability to understand and act on those things in the future?
  - How do I keep my mind from thinking too much over a thing?
- source_sentence: Who won 23 World Rally Championships, two in particular with the Lancia Delta Group A rally car?
  sentences:
  - Lancia Delta Group A The Lancia Delta Group A is a Group A rally car built for the Martini Lancia by Lancia to compete
    in the World Rally Championship. It is based upon the Lancia Delta road car and replaced the Lancia Delta S4. The car
    was introduced for the 1987 World Rally Championship season and dominated the World Rally Championship, scoring 46 WRC
    victories overall and winning the constructors' championship a record six times in a row from 1987 to 1992, in addition
    to drivers' championship titles for Juha Kankkunen (1987 and 1991) and Miki Biasion (1988 and 1989), making Lancia the
    most successful marque in the history of the WRC and the Delta the most successful car.
  - Luis Moya Luis Rodríguez Moya, better known as Luis Moya (born 23 September 1960 in La Coruña, Spain) is a now-retired
    rally co-driver, synonymous with driver Carlos Sainz. He is the third most successful co-driver in the history of the
    World Rally Championship (WRC), after Daniel Elena and Timo Rautiainen
  - 2016 World Rally Championship-3 The 2016 World Rally Championship-3 was the fourth season of the World Rally Championship-3,
    an auto racing championship recognized by the Fédération Internationale de l'Automobile, ran in support of the World Rally
    Championship. It was created when the Group R class of rally car was introduced in 2013. The Championship was composed
    of fourteen rallies, and drivers and teams had to nominate a maximum of six events. The best five results counted towards
    the championship.
  - 2015 Rally Catalunya The 2015 Rally Catalunya (formally the 51º Rally RACC Catalunya – Costa Daurada) was the twelfth
    round of the 2015 World Rally Championship. The race was held over four days between 22 October and 25 October 2015, and
    operated out of Salou, Catalonia, Spain. Volkswagen's Andreas Mikkelsen won the race, his first win in the World Rally
    Championship.
  - 'Lancia Rally 037 The Lancia Rally ("Tipo 151", also known as the Lancia Rally 037, Lancia 037 or Lancia-Abarth #037 from
    its Abarth project code "037") was a mid-engine sports car and rally car built by Lancia in the early 1980s to compete
    in the FIA Group B World Rally Championship. Driven by Markku Alén, Attilio Bettega, and Walter Röhrl, the car won Lancia
    the manufacturers'' world championship in the 1983 season. It was the last rear-wheel drive car to win the WRC.'
  - John Lund (racing driver) John Lund (born 12 January 1954) is a BriSCA Formula 1 Stock Cars racing driver from Rimington,
    Lancashire who races under number 53. Lund is one of the most successful stock car drivers of all time and holds the current
    record for the most World Championship wins.
