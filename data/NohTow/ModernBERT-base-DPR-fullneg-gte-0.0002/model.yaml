- source_sentence: what is the pulse in your wrist called
  sentences:
  - 'Pulse cm up the forearm is suggestive of arteriosclerosis. In coarctation of aorta, femoral pulse may be significantly
    delayed as compared to radial pulse (unless there is coexisting aortic regurgitation). The delay can also be observed
    in supravalvar aortic stenosis. Several pulse patterns can be of clinically significance. These include: Chinese medicine
    has focused on the pulse in the upper limbs for several centuries. The concept of pulse diagnosis is essentially based
    on palpation and observations of the radial and ulnar volar pulses at the readily accessible wrist. Although the pulse
    can be felt in multiple places in the head, people'
  - Pulse diagnosis into three positions on each wrist. The first pulse closest to the wrist is the "cun" (inch, 寸) position,
    the second "guan" (gate, 關), and the third pulse position furthest away from the wrist is the "chi" (foot, 尺). There are
    several systems of diagnostic interpretation of pulse findings utilised in the Chinese medicine system. Some systems (Cun
    Kou) utilise overall pulse qualities, looking at changes in the assessed parameters of the pulse to derive one of the
    traditional 28 pulse types. Other approaches focus on individual pulse positions, looking at changes in the pulse quality
    and strength within the
  - 'Pre-hospital trauma assessment inside of the wrist toward the thumb. For unresponsive adult patients, checking pulse
    is performed by palpating the carotid artery in the neck. For infants and small children, the pulse is usually assessed
    in the brachial artery in the upper arm. After confirming that the pulse is present, the final step in the initial assessment
    for a trauma patient is to check for any gross bleeding and to control it. Should a pulse not be detected, or in the case
    of a child or infant is present but at a rate less than 60, cardiovascular resuscitation will be commenced. Steps:'
  - Pulse Pulse In medicine, a pulse represents the tactile arterial palpation of the heartbeat by trained fingertips. The
    pulse may be palpated in any place that allows an artery to be compressed near the surface of the body, such as at the
    neck (carotid artery), wrist (radial artery), at the groin (femoral artery), behind the knee (popliteal artery), near
    the ankle joint (posterior tibial artery), and on foot (dorsalis pedis artery). Pulse (or the count of arterial pulse
    per minute) is equivalent to measuring the heart rate. The heart rate can also be measured by listening to the heart beat
    by
  - Pulse diagnosis dosha. The middle finger and ring finger are placed next to the index finger and represents consequently
    the Pitta and Kapha doshas of the patient. Pulse can be measured in the superficial, middle, and deep levels thus obtaining
    more information regarding energy imbalance of the patient. The main sites for pulse assessment are the radial arteries
    in the left and right wrists, where it overlays the styloid process of the radius, between the wrist crease and extending
    proximal, approximately 5 cm in length (or 1.9 cun, where the forearm is 12 cun). In traditional Chinese medicine, the
    pulse is divided
  - 'Pulse auscultation, traditionally using a stethoscope and counting it for a minute. The radial pulse is commonly measured
    using three fingers. This has a reason: the finger closest to the heart is used to occlude the pulse pressure, the middle
    finger is used get a crude estimate of the blood pressure, and the finger most distal to the heart (usually the ring finger)
    is used to nullify the effect of the ulnar pulse as the two arteries are connected via the palmar arches (superficial
    and deep). The study of the pulse is known as sphygmology. Claudius Galen was perhaps the first'
- source_sentence: Diet and Mass Conservation--We weigh as much as we eat?
  sentences:
  - '[This thread](_URL_0_) contains a good comment string based on /u/Redwing999 experience and some written sources on insect
    obesity.'
  - We have two chemicals. One that tells us that we're full and the other that tells us something gives us pleasure. Through
    evolution, they made sure that the balance wouldn't tip. Now, the latter can override the former. That means you eat cake
    because it gives you pleasure even though you're full as hell. The balance has tipped and temptation gets in our way.
    This is one of the reasons for obesity!
  - This question actually has nothing to do with the law of conservation of mass or energy. You don't take up more mass by
    exercising; in fact, you technically **lose** mass because you are sweating water and other substances out, as well as
    converting your food into heat and having this heat escape your body.   It's just that when your muscle fibers are damaged
    through exercise, they "over-heal" (to put it very unsophisticated-sounding). The food you eat contributes to feeding
    these growing muscles, which adds more mass to your body. So you *lose* mass through exercising, but more than make up
    for it with a proper diet.
  - A professor of nutrition went on a diet for 10 weeks, consisting largely of twinkies, oreos, and doritos. While still
    maintaining multivitamins and a protein shake daily with occasional greens as well to not go completely off the deep end.
    After the 10 weeks of controlling a steady stream of 1,800 calories a day he lost 27 pounds, lowered his bad cholesterol
    by 20% and upping his good cholesterol also by 20%. Most weight loss is from a steady intake in a caloric deficit (IE
    don't eat 1,700 of your daily 1,800 in one meal). If you do this make sure to also grab multivitamins if you don't already
    have them, and ensure you're getting some protein. Obviously these are also just short term results, and it's not recommended
    you over indulge in junk food over a balanced diet and daily exercise. Article link here (sorry for ghetto link I'm on
    my phone) _URL_0_
  - This is a great question. I hope we get some real answers.  I don't chew my food much, I'm pretty skinny and eat a ton..I
    always wondered if chewing less makes less nutrients available for absorption
  - There is a tremendous amount of misinformation surrounding calories and weight. [This blog entry](_URL_0_) does a good
    job of presenting why people so often get confused with regards to thermodynamics and food. There's a lot to learn, but
    it's a good start.
