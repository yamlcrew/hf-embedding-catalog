    - Peter Frampton Peter Kenneth Frampton (born 22 April 1950) is an English rock musician, singer, songwriter, producer,
      and guitarist. He was previously associated with the bands Humble Pie and The Herd. At the end of his 'group' career
      was Frampton's international breakthrough album his live release, "Frampton Comes Alive!" The album sold in the United
      States more than 8 million copies and spawned several single hits. Since then he has released several major albums.
      He has also worked with David Bowie and both Matt Cameron and Mike McCready from Pearl Jam, among others.
    - Rob Wainwright (rugby union) Robert Iain Wainwright (born 22 March 1965 in Perth, Scotland) is a former rugby union
      footballer who was capped 37 times for Scotland (Captain 16 times) and once for the British and Irish Lions. He played
      flanker.
    - Bert Jansch Herbert "Bert" Jansch (3 November 1943 – 5 October 2011) was a Scottish folk musician and founding member
      of the band Pentangle. He was born in Glasgow and came to prominence in London in the 1960s, as an acoustic guitarist,
      as well as a singer-songwriter. He recorded at least 25 albums and toured extensively from the 1960s to the 21st century.
    - Jett Pangan Jett Pangan (born Reginald Pangan on June 21, 1968) is a Filipino singer and guitarist best known for fronting
      the Filipino rock bands The Dawn, and the now defunct Jett Pangan Group. He is also an actor, appearing in several TV
      and films, most notably his role in "Tulad ng Dati". He is the half-brother of John Lapus.
