      and deep). The study of the pulse is known as sphygmology. Claudius Galen was perhaps the first'
  - source_sentence: Diet and Mass Conservation--We weigh as much as we eat?
    sentences:
    - '[This thread](_URL_0_) contains a good comment string based on /u/Redwing999 experience and some written sources on
      insect obesity.'
    - We have two chemicals. One that tells us that we're full and the other that tells us something gives us pleasure. Through
      evolution, they made sure that the balance wouldn't tip. Now, the latter can override the former. That means you eat
      cake because it gives you pleasure even though you're full as hell. The balance has tipped and temptation gets in our
      way. This is one of the reasons for obesity!
    - This question actually has nothing to do with the law of conservation of mass or energy. You don't take up more mass
      by exercising; in fact, you technically **lose** mass because you are sweating water and other substances out, as well
      as converting your food into heat and having this heat escape your body.   It's just that when your muscle fibers are
      damaged through exercise, they "over-heal" (to put it very unsophisticated-sounding). The food you eat contributes to
      feeding these growing muscles, which adds more mass to your body. So you *lose* mass through exercising, but more than
      make up for it with a proper diet.
    - A professor of nutrition went on a diet for 10 weeks, consisting largely of twinkies, oreos, and doritos. While still
      maintaining multivitamins and a protein shake daily with occasional greens as well to not go completely off the deep
      end. After the 10 weeks of controlling a steady stream of 1,800 calories a day he lost 27 pounds, lowered his bad cholesterol
      by 20% and upping his good cholesterol also by 20%. Most weight loss is from a steady intake in a caloric deficit (IE
      don't eat 1,700 of your daily 1,800 in one meal). If you do this make sure to also grab multivitamins if you don't already
      have them, and ensure you're getting some protein. Obviously these are also just short term results, and it's not recommended
      you over indulge in junk food over a balanced diet and daily exercise. Article link here (sorry for ghetto link I'm
      on my phone) _URL_0_
    - This is a great question. I hope we get some real answers.  I don't chew my food much, I'm pretty skinny and eat a ton..I
      always wondered if chewing less makes less nutrients available for absorption
    - There is a tremendous amount of misinformation surrounding calories and weight. [This blog entry](_URL_0_) does a good
      job of presenting why people so often get confused with regards to thermodynamics and food. There's a lot to learn,
      but it's a good start.
