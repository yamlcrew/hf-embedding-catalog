      xử lý những người làm sai để đảm bảo công bằng xã hội. Ngày 28/3, Ủy ban Mặt trận Tổ quốc (MTTQ) Việt Nam TPHCM tổ chức
      hội nghị phản biện xã hội dự thảo Nghị quyết quy định mức hỗ trợ chi phí thuê nhà ở tạm cư cho hộ gia đình, cá nhân
      trong thời gian chờ bố trí nhà ở, đất ở tái định cư trên địa bàn TPHCM và Luật Bảo hiểm xã hội (sửa đổi). Nêu ý kiến
      xoay quanh dự thảo Luật BHXH (sửa đổi), Luật sư Nguyễn Minh Trí, Hội viên Hội Luật gia quận Bình Thạnh nhìn nhận, bản
      chất Luật BHXH thể hiện tính ưu việt, quan tâm chăm sóc đời sống người lao động sau một thời gian tham gia quá trình
      lao động và đến tuổi mất sức lao động. Ông Trí đề nghị cần căn cứ trên tổng lương của người lao động và dựa vào tình
      hình kinh tế – xã hội nước ta để xác định mức đóng BHXH phù hợp và cạnh tranh hơn nhằm thu hút nguồn vốn đầu tư nước
      ngoài, đảm bảo sự bình ổn và tăng trưởng quỹ BHXH. Mặt khác, ông Trí cũng cho rằng, cần có chế tài đối với hành vi vi
      phạm BHXH. Theo ông, hiện nay phổ biến hai hành vi chính. Một là, doanh nghiệp có đóng BHXH cho người lao động nhưng
      đóng không đủ về mặt lượng và không đóng đủ mức tiền lương người lao động thực nhận theo quy định. Hai là, doanh nghiệp
      không quan tâm thực hiện đóng BHXH cho người lao động theo quy định, đặc biệt là trích tiền lương của người lao động
      nhưng không nộp (chiếm dụng tiền BHXH). "Vá" lỗ hổng của Luật BHXH Ông Châu Văn Hai, thành viên Ban Tư vấn Dân chủ -
      Pháp luật Ủy ban MTTQ Việt Nam quận 11 nêu thực tế một số công dân đóng BHXH mấy năm liền nhưng khi công ty phá sản
      họ lại không được hưởng một chế độ gì. Ông đề nghị cần “vá” những lỗ hổng như vậy của luật trong lần sửa đổi này. “Chúng
      ta phải cố gắng làm sao để đồng cảm, thương lấy người dân đã đóng bảo hiểm cũng như xử lý người làm sai để đảm bảo công
      bằng xã hội”, ông Hai bày tỏ. Dẫn một số điều của dự thảo, Phó chủ tịch Ủy ban MTTQ Việt Nam quận Tân Bình Lê Thị Thu
      Trà cho rằng, việc một số nội dung quy định cụ thể số tiền bảo hiểm là điều bất hợp lý bởi một luật tồn tại 10, 20 năm
      và lâu hơn nữa, dẫn đến những ảnh hưởng nhất định đến quyền lợi người dân về sau. Bà Trà đề nghị, nên quy ra con số
      tương đối theo tỉ lệ phần trăm (%) mức lương được hưởng của từng nội dung. Đồng tình, bà Nguyễn Thị Thu Trang (Ủy ban
      MTTQ Việt Nam quận 3) cho rằng nên đưa ra một tỷ lệ khung làm căn cứ thực hiện để không phải điều chỉnh luật về sau
      và tỷ lệ này phải thích đáng, phù hợp. Ngoài ra cũng tính toán quỹ lương hưu BHXH hợp lý với trường hợp người lao động
      muốn về hưu có được mức lương cao hơn, nhằm khuyến khích, tạo động lực cho người lao động. Liên quan đến mức giá hỗ
      trợ thuê nhà ở tạm cư, bà Trang nhìn nhận, việc tham khảo mức giá chưa xuất phát từ phía người dân (đối tượng chịu sự
      tác động) mà tạm thời chỉ dừng ở chính quyền, do đó cần khảo sát lại, trong đó cần nói rõ với UBND các quận, huyện phải
      lấy ý kiến của từng đối tượng chịu sự tác động để tạo sự đồng thuận của người dân khi HĐND ban hành nghị quyết này.
      Tiếp thu các ý kiến phản biện, góp ý của các chuyên gia, đại biểu, Phó giám đốc Sở Lao động – Thương binh và Xã hội
      TPHCM Huỳnh Lê Như Trang cho biết, từ tổng hợp của Ủy ban MTTQ Việt Nam TPHCM, sở sẽ báo cáo UBND TPHCM và gửi Bộ LĐ-TB&XH
      để hoàn thiện Luật BHXH (sửa đổi) nhằm mục tiêu thực hiện luật BHXH cho toàn dân với mục tiêu đảm bảo an sinh xã hội
      một cách tốt nhất. Chủ tịch Ủy ban MTTQ Việt Nam TPHCM Trần Kim Yến cho biết, cơ quan này sẽ làm đầu mối tiếp nhận thêm
      các ý kiến góp ý của các chuyên gia trước khi có tham mưu trực tiếp cho lãnh đạo UBND TPHCM trình HĐND thông qua nghị
      quyết hỗ trợ chi phí thuê nhà ở tạm cư và Luật BHXH (sửa đổi). Thông tin tại hội nghị, Phó Chủ tịch Ủy ban MTTQ Việt
      Nam TPHCM cho biết, khi thu hồi đất và bàn giao mặt bằng cho chủ đầu tư để thực hiện các dự án thì thành phố đã chuẩn
      bị đủ quỹ nhà ở, đất ở tái định cư. Để hỗ trợ, tạo điều kiện người bị thu hồi đất được đảm bảo về chỗ ở, ổn định đời
      sống và sản xuất, UBND TPHCM đã ban hành Quyết định số 10/2020/QĐ ngày 10/4/2020 (điều chỉnh, bổ sung tại Quyết định
      số 18/2022/QĐ ngày 9/6/2022) áp dụng chính sách về hỗ trợ chi phí thuê nhà tạm cư. Trong khi đó, Luật Bảo hiểm xã hội
      2014 đã đi vào cuộc sống, khẳng định tính đúng đắn của chính sách, chế độ BHXH theo nguyên tắc đóng - hưởng, đáp ứng
      nguyện vọng của đông đảo người lao động, bảo đảm an sinh xã hội và hội nhập quốc tế. Quá trình thực hiện Luật BHXH 2014
      cho thấy cần thiết phải sửa đổi nhằm thể chế hóa quan điểm, chính sách của Đảng, bảo đảm tính thống nhất, đồng bộ của
      hệ thống pháp luật; khắc phục những tồn tại, hạn chế, bất cập trong thực tiễn thi hành. Theo bà Hương, dự thảo Luật
      BHXH (sửa đổi) đã thể chế hóa các quan điểm chỉ đạo, mục tiêu, nội dung cải cách, nhiệm vụ và giải pháp chủ yếu của
      Nghị quyết số 28-NQ/TW về cải cách chính sách BHXH; thể chế hóa các nhiệm vụ, giải pháp liên quan trực tiếp đến việc
      hoàn thiện chính sách, pháp luật về an sinh xã hội của Văn kiện Đại hội đại biểu toàn quốc lần thứ XIII của Đảng...
