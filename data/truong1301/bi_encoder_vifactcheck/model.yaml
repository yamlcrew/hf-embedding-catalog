- source_sentence: 'Chi phí số hóa tài liệu lưu trữ có cao hơn chi phí xử lý tài liệu tồn đọng không?

    '
  sentences:
  - Tổng thống UAE đã bổ nhiệm con trai cả làm thái tử của Abu Dhabi, tiểu vương quốc lớn nhất của quốc gia này. Tổng thống
    Các Tiểu vương quốc Ả Rập Thống nhất (UAE) Sheikh Mohammed bin Zayed Al Nahyan đã bổ nhiệm con trai cả Sheikh Khaled làm
    thái tử của Abu Dhabi, tiểu vương quốc lớn nhất trong 7 tiểu vương quốc tạo nên quốc gia vùng Vịnh này, đài CNN đưa tin
    ngày 30.3 Trong một sắc lệnh riêng rẽ trong ngày 29.3, Thái tử Sheikh Khaled cũng được bổ nhiệm làm người đứng đầu Hội
    đồng điều hành Abu Dhabi nhằm cải tổ các vấn đề quan trọng ở tiểu vương quốc này. Tân Thái tử Abu Dhabi Sheikh Khaled
    REUTERS Ngoài ra, Tổng thống Sheikh Mohammed đã bổ nhiệm các em trai của mình vào các vị trí cấp cao của đất nước. Cụ
    thể, ông Sheikh Mansour bin Zayed Al Nahyan được chọn giữ chức phó tổng thống UAE. Phó Tổng thống đương nhiệm Sheikh Mohammed
    bin Rashid Al Maktoum vẫn tiếp tục chức vụ này. Ông Sheikh Mohammed cũng bổ nhiệm em trai Sheikh Tahnoun bin Zayed Al
    Nahyan làm cố vấn an ninh quốc gia của UAE và trao cho ông quyền kiểm soát hoạt động kinh doanh dầu mỏ. Giới phân tích
    nhận định ông Sheikh Mohammed từ lâu đã chuẩn bị cho con trai mình đảm nhiệm các vị trí cao trong lĩnh vực an ninh, bao
    gồm tình báo, kinh tế và quản trị. Theo hãng tin Reuters, việc lựa chọn ông Sheikh Khaled làm thái tử phản ánh xu hướng
    ở hầu hết chế độ quân chủ Ả Rập vùng Vịnh trong việc chọn người kế vị. Quyết định bổ nhiệm cũng cho thấy sự tập trung
    quyền lực lớn hơn ở Abu Dhabi, vốn là thủ đô chính trị của UAE nhờ nguồn tài nguyên dầu mỏ dồi dào nhất. Dubai là trung
    tâm kinh doanh và du lịch của vùng Vịnh, Reuters đưa tin.
  - 'Tỉnh Thanh Hóa cần khoảng 300 tỷ đồng để hoàn thành xử lý 29.000 m tài liệu tồn đọng từ 1945 đến 2020, theo dự thảo đề
    án đang được xem xét. Ngày 8/3, lãnh đạo Chi cục Văn thư lưu trữ tỉnh Thanh Hóa cho biết dự thảo đề án Chỉnh lý dứt điểm
    tài liệu tồn đọng tại các cơ quan, tổ chức trên địa bàn và số hóa tài liệu lưu trữ lịch sử giai đoạn 2023-2025 đang được
    UBND tỉnh xem xét phê duyệt. Theo tính toán, các địa phương cần 304 tỷ đồng từ ngân sách để thực hiện hai phần việc: Chỉnh
    lý tài liệu tồn đọng và số hóa tại kho lưu trữ lịch sử tỉnh. Dự toán kinh phí chỉnh lý tài liệu tại 20 sở, ban, ngành
    cấp tỉnh và 27 huyện thị, thành phố tiêu tốn hơn 256 tỷ đồng. Dự án số hóa lưu trữ lịch sử sẽ mất hơn 47 tỷ đồng, bao
    gồm mua sắm nhiều trang thiết bị như máy chủ, phần mềm, nhân công, văn phòng phẩm. Theo khảo sát của Chi cục Văn thư lưu
    trữ tỉnh, 47 sở, ban, ngành, đơn vị cấp tỉnh và các huyện thị, thành phố (chưa kể cấp xã, phường, thị trấn) đang tồn đọng
    hơn 29.000 m tài liệu không được phân loại, bảo quản đúng quy định của Luật Lưu trữ. Chi cục trưởng Văn thư lưu trữ tỉnh
    Thanh Hóa Đỗ Văn Chính cho biết tỉnh đặt mục tiêu đến năm 2025 xử lý dứt điểm tài liệu tồn đọng tại các cơ quan nhà nước
    cấp huyện trở lên. Mục tiêu của đề án là phân loại khoa học, quản lý thống nhất và sử dụng hiệu quả tài liệu lưu trữ.
    Việc chuyển đổi phương thức lưu trữ truyền thống sang lưu trữ điện tử, xây dựng công cụ tra cứu hiện đại giúp bảo vệ,
    phát huy giá trị tài liệu, góp phần cải cách thủ tục hành chính. Luật Lưu trữ 2011 quy định người đứng đầu các cơ quan,
    tổ chức có trách nhiệm quản lý tài liệu lưu trữ, tổ chức lập hồ sơ, bảo quản và nộp lưu hồ sơ, tài liệu của đơn vị vào
    Lưu trữ cơ quan. Hồ sơ công trình thuộc nhóm A (công trình mang giá trị lịch sử quốc gia) sẽ được lưu trữ vĩnh viễn; tài
    liệu thuộc nhóm B thì bảo lưu theo tuổi thọ công trình; các công trình sửa chữa nhỏ nhóm C thì có thời hạn lưu trữ 20
    năm. Vừa qua, Thanh Hóa xảy ra vụ án hy hữu khi nữ cán bộ công tác tại Ban quản lý dự án đầu tư công trình giao thông
    lén bán 60 thùng hồ sơ cho người buôn phế liệu lấy 9 triệu đồng. Ngày 7/3, bị can Lê Thùy Linh, 34 tuổi, đã bị Cơ quan
    Cảnh sát điều tra Công an TP Thanh Hóa khởi tố về tội Chiếm đoạt, mua bán, tiêu hủy con dấu, tài liệu của cơ quan, tổ
    chức, theo điều 342 Bộ luật Hình sự 2015, đối diện mức án lên tới 5 năm tù.'
  - 'Thủ tướng Chính phủ Phạm Minh Chính vừa ký Quyết định 320/QĐ-TTg kiện toàn nhân sự Ban Chỉ đạo quốc gia về hội nhập quốc
    tế. Theo đó, sửa đổi khoản 1 và khoản 2 Điều 1 về nhân sự tại Quyết định số 596/QĐ-TTg của Thủ tướng Chính phủ về việc
    thành lập Ban Chỉ đạo quốc gia về hội nhập quốc tế như sau: Trưởng Ban Chỉ đạo quốc gia là Thủ tướng Chính phủ Phạm Minh
    Chính. Phó Trưởng Ban Chỉ đạo quốc gia là các Phó Thủ tướng Chính phủ: Lê Văn Thành, Trần Hồng Hà, Trần Lưu Quang. Phó
    Thủ tướng Chính phủ Trần Lưu Quang làm Trưởng Ban Chỉ đạo liên ngành hội nhập quốc tế về chính trị, an ninh, quốc phòng.
    Trưởng Ban Chỉ đạo liên ngành hội nhập quốc tế về kinh tế là Phó Thủ tướng Chính phủ Lê Văn Thành. Trưởng Ban Chỉ đạo
    liên ngành hội nhập quốc tế về văn hóa, xã hội, khoa học, công nghệ và giáo dục, đào tạo là Phó Thủ tướng Chính phủ Trần
    Hồng Hà. * Theo Quyết định số 596/QĐ-TTg của Thủ tướng Chính phủ về việc thành lập Ban Chỉ đạo quốc gia về hội nhập quốc
    tế, Ban Chỉ đạo quốc gia về hội nhập quốc tế có các chức năng và nhiệm vụ giúp Chính phủ, Thủ tướng Chính phủ đề ra các
    định hướng, chiến lược, các giải pháp lớn liên quan đến hội nhập quốc tế; đề xuất những nhiệm vụ trọng tâm, trọng điểm
    về hội nhập quốc tế cần tập trung chỉ đạo, điều hành trong từng giai đoạn. Bên cạnh đó, Ban Chỉ đạo có nhiệm vụ giúp Chính
    phủ, Thủ tướng Chính phủ chỉ đạo các bộ, cơ quan ngang bộ, cơ quan thuộc Chính phủ, UBND các tỉnh, thành phố trực thuộc
    Trung ương, triển khai các chủ trương, chính sách lớn về hội nhập quốc tế; giải quyết những vấn đề quan trọng, liên ngành
    liên quan đến hội nhập quốc tế; đồng thời giúp Chính phủ, Thủ tướng Chính phủ phối hợp, đôn đốc các bộ, cơ quan ngang
    Bộ, cơ quan thuộc Chính phủ, UBND các tỉnh, thành phố trực thuộc Trung ương, trong việc triển khai đồng bộ các chủ trương
    chính sách về hội nhập quốc tế.'
- source_sentence: 'Theo TS. Phạm Quang Tú, Phó Giám đốc Oxfam Việt Nam, việc hỗ trợ liên tục trong bao lâu có thể giúp người
    dân ổn định cuộc sống ở khu tái định cư thủy điện?

    '
  sentences:
  - '(NLĐO) – Tòa án Hình sự Quốc tế (ICC) đã ban bố lệnh bắt giữ Tổng thống Vladimir Putin, với những cáo buộc liên quan
    đến chiến dịch quân sự của Nga ở Ukraine. Nga, không phải là thành viên của ICC, cho biết lệnh bắt giữ nêu trên là vô
    nghĩa. Moscow đã nhiều lần bác bỏ cáo buộc rằng lực lượng của họ phạm tội ác chiến tranh ở Ukraine. ICC được thành lập
    vào năm 2002 để truy tố tội ác chiến tranh, tội ác chống lại loài người, tội diệt chủng và tội xâm lược khi các nước thành
    viên không muốn hoặc không thể tự mình truy tố. ICC có thể truy tố tội do công dân của các nước thành viên phạm phải hoặc
    tội mà các thực thể khác phạm phải trên lãnh thổ của các nước thành viên. ICC có 123 nước thành viên. Ngân sách cho năm
    2023 là khoảng 182 triệu USD. Theo Reuters, ICC nhận được sự hỗ trợ từ nhiều thành viên của Liên Hiệp Quốc và Liên minh
    châu Âu. Tuy nhiên, một số cường quốc như Mỹ, Nga và Trung Quốc chưa gia nhập ICC vì họ lập luận rằng tòa án này có thể
    được sử dụng để tiến hành các vụ truy tố mang động cơ chính trị. ICC đang tiến hành 17 cuộc điều tra, từ Ukraine và các
    quốc gia châu Phi như Uganda, Cộng hòa Dân chủ Congo và Kenya đến Venezuela ở Mỹ Latin và các quốc gia châu Á, như Myanmar
    và Philippines, trang web của tổ chức này cho biết. Tòa án Hình sự Quốc tế (ICC) ở TP The Hague - Hà Lan, ngày 31-3-2021.
    Ảnh: Reuters ICC đã kết án 5 đối tượng phạm tội ác chiến tranh và tội ác chống lại loài người, tất cả đều là các thủ lĩnh
    dân quân châu Phi đến từ Cộng hòa Dân chủ Congo, Mali và Uganda. Những người này nhận án phạt từ 9 đến 30 năm tù. Bản
    án tối đa là tù chung thân. Sau khi ICC phát lệnh truy tố, 123 nước thành viên có nghĩa vụ bắt giam và vận chuyển nếu
    người này đặt chân đến lãnh thổ của họ. Vì thế, những người bị ICC phát lệnh bắt giam thường không đến 123 quốc gia này.
    Cựu Tổng thống Sudan Omar al-Bashir và cựu Tổng thống Libya Muammar Gaddafi là những nhà lãnh đạo hiếm hoi bị ICC truy
    tố khi đang giữ chức nguyên thủ quốc gia. Mọi cáo buộc nhằm vào ông Gaddafi đã được gỡ bỏ sau khi ông bị lật đổ và sát
    hại vào năm 2011. Ông Bashir, người bị truy tố vào năm 2009 vì tội diệt chủng ở Darfur, vẫn tại vị thêm 10 năm cho đến
    khi bị lật đổ trong một cuộc đảo chính. Kể từ đó, ông bị truy tố ở Sudan vì các tội danh khác nhưng chưa được giao cho
    ICC. Tổng thống Nga Vladimir Putin bị ICC phát lệnh bắt giam vì những cáo buộc liên quan đến chiến dịch quân sự ở Ukraine.
    Ảnh: Reuters Khi còn đương chức, ông Bashir đã đến một số quốc gia Ả Rập và châu Phi, kể cả các nước thành viên ICC như
    Chad, Djibouti, Jordan, Kenya, Malawi, Nam Phi và Uganda. Những quốc gia này từ chối bắt giam ông. Họ sau đó bị ICC chỉ
    trích hoặc báo cáo lên Hội đồng Bảo an Liên Hiệp Quốc vì không tuân thủ nghĩa vụ. Cựu Tổng thống Bờ Biển Ngà Laurent Gbagbo
    là cựu nguyên thủ quốc gia đầu tiên xuất hiện trước ICC. Ông được tuyên trắng án về mọi cáo buộc vào năm 2019 sau phiên
    tòa kéo dài 3 năm.'
  - 'Việc đánh thuế tiêu thụ đặc biệt lên ngành công nghiệp game sẽ vừa không phù hợp thông lệ quốc tế, vừa ảnh hưởng lớn
    đến sự phát triển của ngành game Việt, một ngành kinh tế số. Các đại biểu tham dự hội thảo cho rằng nếu Bộ Tài chính đánh
    thuế tiêu thụ đặc biệt sẽ ảnh hưởng lớn đối với ngành game Việt Nam - Ảnh: T. HÀ Đó là quan điểm chung của các đại biểu
    tham dự cuộc hội thảo "Doanh nghiệp dịch vụ trò chơi điện tử trực tuyến đóng góp ý kiến về đề nghị xây dựng dự án Luật
    thuế tiêu thụ đặc biệt sửa đổi", tổ chức tại Hà Nội ngày 30-3. Mới đây, Bộ Tài chính đưa ra dự thảo áp thuế tiêu thụ đặc
    biệt với trò chơi điện tử trên mạng (game online). Lý do là loại hình kinh doanh game hiện nay thuộc diện mặt hàng có
    doanh thu lớn, mức lợi nhuận cao so với các loại hình kinh doanh khác, thu hút mọi độ tuổi tầng lớp dân cư, đặc biệt là
    giới trẻ tham gia. Ông Đậu Anh Tuấn - trưởng ban pháp chế của VCCI - cho biết đến thời điểm này, chưa có quốc gia nào
    đánh thuế tiêu thụ đặc biệt với game. "Nếu Bộ Tài chính đánh thuế tiêu thụ đặc biệt sẽ ảnh hưởng lớn đối với ngành game
    Việt Nam. Vì vậy, bất cứ chính sách nào đưa ra phải cân nhắc đến nhiều điều. Bản thân doanh nghiệp game Việt cũng đang
    phải chịu sự cạnh tranh không bình đẳng với các nhà phát hành game ngoại ngay chính thị trường Việt Nam" - ông Tuấn nói.
    Đồng tình với quan điểm này, ông Lê Xuân Hòa - phó chủ tịch Hiệp hội Phần mềm và Dịch vụ công nghệ thông tin Việt Nam
    (VINASA) - cho rằng hiện nay, ngành công nghệ số đang được ưu đãi để thúc đẩy phát triển. "Đề xuất thuế này đang hạn chế
    ngành game, không đồng bộ với chính sách của Đảng và Nhà nước và không đồng bộ chính sách phát triển công nghệ cao. Các
    quốc gia không những không đánh thuế tiêu thụ đặc biệt với game, mà còn có chính sách thúc đẩy và ưu đãi cho lĩnh vực
    này. Vì vậy, việc đánh thuế tiêu thụ đặc biệt chưa phù hợp với thông lệ quốc tế", ông Hòa nhấn mạnh. Theo ông Hòa, có
    nhiều doanh nghiệp game khá thành công nhưng buộc phải chuyển sang nước ngoài chứ không cung cấp tại Việt Nam. Đây cũng
    là vấn đề lớn đặt ra với các nhà hoạch định chính sách. Ông Nguyễn Xuân Cường - chủ tịch Hội Thể thao điện tử - cho rằng
    nếu áp thuế tiêu thụ đặc biệt thì người chơi sẽ điều chỉnh hành vi tiêu dùng sang dịch vụ khác tương tự của nước ngoài.
    Chuyên gia Cấn Văn Lực kiến nghị Việt Nam không nên đánh thuế để hạn chế chơi game mà cần có hướng dẫn kiểm soát hành
    vi tiêu dùng - Ảnh: T. HÀ Ông Lã Xuân Thắng - giám đốc phát hành trò chơi trực tuyến của VNG - cùng đại diện nhiều doanh
    nghiệp khác trong lĩnh vực này đánh giá "Ngành game Việt Nam đang chịu nhiều định kiến xã hội", trong khi "khái niệm game
    online đang ngày càng thay đổi và sẽ thay đổi rất nhanh, trở thành một ngành mũi nhọn, trụ cột của công nghiệp nội dung
    số và kinh tế số, đi đầu trong ứng dụng những công nghệ mới". "Cũng giống phim ảnh, nghệ thuật, game online là một phần
    của ngành công nghiệp giải trí. Mỹ, Pháp, Trung Quốc không chỉ coi game là một ngành kinh tế mà còn là mũi nhọn để xuất
    khẩu văn hóa ra bên ngoài. Nhiều quốc gia đi sau đưa ra các chính sách ưu đãi cho game như Singapore, UAE, Jordan, Israel…
    thu hút doanh nghiệp từ khắp nơi trên thế giới về đó sản xuất sản phẩm phục vụ 2,4 tỉ người dùng" -- ông Thắng chia sẻ
    thông tin. Chuyên gia kinh tế Cấn Văn Lực nêu câu hỏi "Vì sao chúng ta dị ứng với lĩnh vực này?". Theo ông Lực, kinh nghiệm
    các nước phát triển không đánh thuế để hạn chế người chơi game, nghiện game. Thay vào đó, các nước có các chính sách điều
    tiết hành vi người tiêu dùng. Ví dụ Singapore đưa ra hướng dẫn, nếu game có đánh bạc thì đánh thuế rất cao. Trung Quốc
    chưa đánh thuế nhưng có hướng dẫn về cai nghiện game, khống chế thời gian, yêu cầu đăng ký tên thật… Đồng thời ông Lực
    cũng kiến nghị Việt Nam cần có hướng dẫn kiểm soát hành vi tiêu dùng, làm thế nào để giảm thiểu rủi ro về nghiện game,
    ảnh hưởng sức khỏe tâm thần. Game không phép đạt doanh thu xấp xỉ 5.000 tỉ đồng/năm tại thị trường Việt Nam nhưng không
    phải chịu trách nhiệm gì với người chơi game cũng như cơ quan quản lý nhà nước.'
  - Việc phục hồi và bảo đảm sinh kế bền vững luôn là vấn đề còn nhiều tồn tại và bức xúc trong các dự án tái định cư. Ông
    Đặng Thanh Long, Chủ tịch Liên hiệp các Hội khoa học và kỹ thuật tỉnh Kon Tum nhận định, hiện nay, ở Việt Nam cũng như
    trên thế giới có rất ít các dự án tái định cư, đặc biệt là tái định cư thủy điện thành công trong việc phục hồi sinh kế,
    đảm bảo sinh kế bền vững cho cộng đồng bị ảnh hưởng. Vì vậy, việc phục hồi và bảo đảm sinh kế bền vững luôn là vấn đề
    còn nhiều tồn tại và bức xúc trong các dự án tái định cư. Tuy nhiên, nói như vậy không có nghĩa là không thể tạo ra các
    khu tái định cư thủy điện ổn định. Điều quan trọng là phải khắc phục được các tồn tại, hạn chế, tìm các giải pháp để ổn
    định cuộc sống cho người dân. Cần sớm khắc phục những hạn chế Theo TS. Phạm Quang Tú, Phó Giám đốc Tổ chức Oxfam Việt
    Nam, thông qua quá trình nghiên cứu cũng như phối hợp với Liên hiệp các Hội khoa học kỹ thuật tỉnh Kon Tum hỗ trợ các
    khu tái định cư thủy điện, ông nhận thấy các cấp, ban, ngành của tỉnh Kon Tum và chủ đầu tư các dự án thủy điện phải thực
    hiện các giải pháp khắc phục những hạn chế trong tái định cư càng sớm càng tốt. “Chúng ta cần phải bồi thường, đền bù,
    hỗ trợ người dân tái định cư cả về những thiệt hại trực tiếp và gián tiếp, cả về đời sống vật chất và đời sống tinh thần.
    Tiếp đến là phải bổ sung chính sách hậu tái định cư, đảm bảo cho người dân phải tiếp tục sản xuất và mưu sinh được ở nơi
    ở mới. Chúng ta cần phải xem tái định cư như một dự án phát triển dài hạn cho người dân, cần phải hỗ trợ liên tiếp cho
    họ trong vòng 10 năm thì họ mới có thể ổn định tại nơi ở mới được”, TS. Nguyễn Quang Tú chia sẻ. Phó Giám đốc Tổ chức
    Oxfam Việt Nam cũng cho rằng, đối với việc bồi thường đất sản xuất nông nghiệp, cần phải hỗ trợ cho bà con từ 2 - 3 vụ
    canh tác, vì đất khai hoang sẽ không mang lại hiệu quả nếu đưa vào sản xuất ngay. Ngoài ra, cần phải có các công trình
    hạ tầng phục vụ sản xuất đi kèm, như hệ thống tưới tiêu, các công trình thủy lợi. Đối với riêng khu tái định cư Thủy điện
    Đăk Đrinh ở xã Đăk Nên, huyện Kon Plong, TS. Phạm Quang Tú cho rằng, bên cạnh hỗ trợ sinh kế, thì chủ đầu tư và chính
    quyền địa phương cần thống nhất và tiến hành đền bù, hỗ trợ sớm số tiền trên 30 tỷ đồng còn lại. Chung quan điểm, ông
    Bloong Tiến, Trưởng Ban Dân tộc, Hội đồng nhân dân tỉnh Kon Tum đề nghị các địa phương, các chủ đầu tư cần sớm giải quyết
    vấn đề đất sản xuất cho nhân dân ở các khu, điểm tái định cư. Đồng thời, phải nghiên cứu, xây dựng các phương án sản xuất
    phù hợp với điều kiện cụ thể của từng vùng, giúp các hộ dân tái định cư chọn mô hình sản xuất phù hợp, đảm bảo thu nhập
    ổn định, lâu dài. Trưởng Ban Dân tộc, Hội đồng nhân dân tỉnh Kon Tum cũng đề xuất Trung ương cần sớm nghiên cứu, ban hành
    chính sách “hậu tái định cư” cho các dự án, đập thủy lợi, thủy điện để đồng bào tái định cư có thu nhập bằng hoặc trên
    mức thu nhập trung bình của hộ sản xuất nông nghiệp tại địa phương. Các xã, thôn nhận các hộ dân chuyển đến theo diện
    tái định cư thủy điện cần hỗ trợ xây dựng cơ sở hạ tầng và có chính sách khuyến khích người dân sở tại san sẻ, nhượng
    đất cho các hộ tái định cư. Trong khi đó, ông Nguyễn Văn Năm, Chi cục trưởng Chi cục Phát triển nông thôn tỉnh Kon Tum
    đề xuất phương án tái định cư không tập trung để giảm sức ép cho các khu tái định cư. Nguyên nhân là do tìm nguồn đất
    để tập trung hiện nay rất khó, xa hoặc không phù hợp với các tập quán, văn hóa của người dân địa phương. Ngoài ra, có
    thể thành lập quỹ hỗ trợ cho các khu tái định cư để bà con nhân dân tại các vùng tái định cư có thêm nguồn tài chính.
    “Nếu không có sinh kế, chúng ta có đền bù 500 triệu, 1 tỷ, thậm chí là 2 tỷ cho một gia đình không có kỹ năng quản lý
    tài chính tốt thì cũng không ổn. Thậm chí, nó còn có nguy cơ gây ra các tệ nạn xã hội khi người dân có tiền trong tay.
    Xây nhà to, đẹp, khang trang, tiền rủng rỉnh trong túi mà không có sinh kế thì chắc chắn sau một vài năm, những thứ hào
    nhoáng đó cũng không còn, và người dân lại vất vả. Tôi cho rằng, nếu không thể đền bù được bằng sinh kế, thì nên chuyển
    đổi đền bù bằng cổ phần của các công ty thủy điện để họ có được sinh kế lâu dài”, TS. Nguyễn Quang Tú đề xuất. Liên quan
    đến số tiền còn nợ người dân tái định cư tại xã Đăk Nên, huyện Kon Plông, ông Lê Năng, Phó Giám đốc Công ty Thủy điện
    Đăk Đrinh cho biết, do vướng về cơ chế chi trả đền bù, nên đơn vị chưa thể chi trả. Cụ thể, theo dự toán ban đầu, số tiền
    mà Công ty Thủy điện Đăk Đrinh đang nợ người dân là khoảng 27 tỷ đồng, song theo quyết toán của địa phương lại là trên
    33 tỷ đồng. Vấn đề này chính quyền địa phương và công ty đã làm việc nhiều lần nhưng chưa được tháo gỡ. Ông Lê Văn Quang,
    Trưởng phòng Quản lý năng lượng, Sở Công Thương tỉnh Kon Tum cũng đề nghị Ủy ban nhân dân tỉnh Kon Tum tiếp tục có ý kiến
    với các bộ, ngành có liên quan đề xuất Chính phủ xem xét, quyết định khoản chi phí bồi thường, hỗ trợ tăng thêm của Dự
    án Thủy điện Đăk Đrinh để tỉnh sớm giải quyết dứt điểm cho người dân. Bên cạnh đó, bố trí kinh phí cho tỉnh Kon Tum lập
    Dự án ổn định đời sống sản xuất của người dân sau tái định cư tại các thủy điện lớn. Lấy kinh nghiệm từ điểm sáng tái
    định cư Trong bức tranh mang “gam màu xám” của tái định cư thủy điện tại Kon Tum, thì xã Hơ Moong, huyện Sa Thầy lại là
    điểm sáng trong bức tranh đó. Xã được thành lập từ năm 2006 từ việc di dân 748 hộ do ảnh hưởng trong quá trình xây dựng
    Thủy điện Plei Krông. Những năm đầu, khi thực hiện di dân tái định cư, việc thay đổi nơi ở, nơi sản xuất, cơ sở hạ tầng,
    tập quán sinh hoạt, văn hóa truyền thống,… đã khiến không ít gia đình bất chấp nguy hiểm quay trở lại làng cũ bên lòng
    hồ thủy điện sinh sống. Ông Đặng Thanh Long, Chủ tịch Liên hiệp các Hội khoa học và kỹ thuật tỉnh Kon Tum cho biết, từ
    năm 2014 đến 2019, Liên hiệp các Hội khoa học và kỹ thuật tỉnh đã phối hợp với Viện Tư vấn phát triển Hà Nội (CODE) tư
    vấn, vận động người dân ở bốn làng Kà Bày, Đăk Do, Đăk Vơt, Kơ Tu (xã Hơ Moong) nhận giao đất, giao rừng 86,1 ha từ chính
    quyền địa phương. Các cộng đồng đã tiến hành bảo vệ và phát triển thêm các loại cây bản địa có giá trị cao như Hương,
    Trắc, Cẩm lai, Sao xanh, Bời lời, Sa nhân tím,… Qua đó, mang lại sinh kế, tạo thêm thu nhập cho người dân gần rừng. Bên
    cạnh đó, đại diện người dân cũng được đưa đi học tập mô hình trồng cây ăn quả, cây lâm nghiệp để phát triển kinh tế. Đến
    nay, xã đã phát triển được hơn 2.800 ha cây trồng; trong đó, có gần 2.000 ha cây ăn quả, cà phê, cao su, bời lời,… mang
    lại thu nhập cao cho người dân. Cùng với đó, lòng hồ Thủy điện Plei Krông cũng được định hướng làm nơi nuôi trồng và đánh
    bắt thủy sản cho người dân, với sản lượng bình quân 60 tấn/năm. Các nghi lễ truyền thống của người dân tộc thiểu số cũng
    được chú trọng bảo tồn và phát huy với những lễ hội như Cúng máng nước, lễ Giọt nước,… Năm 2022, tổng giá trị sản xuất
    của xã Hơ Moong đạt gần 243 tỷ đồng; các chỉ tiêu kinh tế - xã hội đều đạt và vượt so với kế hoạch; thu nhập bình quân
    đầu người đạt 32,3 triệu đồng; tỷ lệ hộ nghèo giảm xuống còn 9,3%; an ninh, chính trị, trật tự an toàn xã hội được giữ
    vững. Đặc biệt, từ một xã khó khăn, có nguồn gốc từ tái định cư thủy điện, đến nay, xã đã đạt 12/19 tiêu chí xây dựng
    nông thôn mới; tập trung các nguồn lực, phấn đấu về đích nông thôn mới vào cuối năm 2023. Đây là điểm sáng để các cấp,
    sở, ngành, địa phương của tỉnh Kon Tum nghiên cứu, đưa ra giải pháp ổn định cho các khu tái định cư thủy điện còn lại.
    Các chính sách, giải pháp đều đã được các chuyên gia, sở, ngành của tỉnh Kon Tum đưa ra, thế nhưng làm thế nào để các
    chính sách, giải pháp ấy đi vào thực tế thì vẫn còn là câu chuyện dài ở phía trước. Nó đòi hỏi chính quyền các địa phương
    cũng như chủ đầu tư các dự án thủy điện phối hợp, cùng triển khai một cách đồng bộ, quyết liệt các giải pháp để người
    dân tại các khu tái định cư thủy điện có một cuộc sống tốt hơn. Có thể sẽ phải mất 10 năm hỗ trợ liên tục thì bà con mới
    ổn định được cuộc sống ở khu tái định cư thủy điện như TS. Phạm Quang Tú nhận định, song nếu không bắt đầu thực hiện các
    giải pháp quyết liệt ngay từ bây giờ, thì 10 năm sau, hoặc thậm chí là 20 năm sau, câu chuyện về các thôn, làng tái định
    cư thủy điện vẫn sẽ được nhắc lại, với những thiếu sót trong tái định cư. Còn người dân - những người sẵn sàng bỏ nhà
    cửa, ruộng nương của mình cho các thủy điện làm hồ chứa - vẫn sẽ phải sống “lay lắt” trong những ngôi làng từng được hứa
    hẹn là nơi “đáng sống”.
- source_sentence: 'Sau đại dịch Covid-19, ngành giáo dục nói chung và đào tạo Anh ngữ nói riêng gặp những khó khăn gì để
    trở lại "bình thường mới"?

    '
  sentences:
  - Ủy ban Kiểm tra Trung ương đề nghị Ban Bí thư xem xét, kỷ luật thiếu tướng Đỗ Hữu Ca, nguyên ủy viên Ban thường vụ Thành
    ủy, nguyên Giám đốc Công an Hải Phòng. Trong thông cáo kỳ họp 27 phát chiều 22/3, Ủy ban Kiểm tra Trung ương cho biết
    đã xem xét đề nghị kỷ luật thiếu tướng Đỗ Hữu Ca của Thành ủy Hải Phòng. Cơ quan kiểm tra trung ương cũng xem xét đề nghị
    kỷ luật ông Trương Minh Hiến, nguyên Ủy viên Ban Thường vụ Tỉnh ủy, nguyên Phó chủ tịch tỉnh Hà Nam; Vũ Hữu Song, nguyên
    Tỉnh ủy viên, nguyên Giám đốc Sở Tài nguyên và Môi trường tỉnh Hà Nam; Nguyễn Đồng, Trưởng ban Tuyên giáo Tỉnh ủy, nguyên
    Trưởng ban Nội chính, nguyên Chánh Văn phòng Tỉnh ủy Hòa Bình. Ủy ban Kiểm tra Trung ương nhận thấy các cá nhân nêu trên
    đã suy thoái về tư tưởng chính trị, đạo đức, lối sống, vi phạm quy định của Đảng, pháp luật của Nhà nước; vi phạm quy
    định những điều đảng viên không được làm và trách nhiệm nêu gương, "gây hậu quả rất nghiêm trọng, dư luận bức xúc trong
    xã hội, ảnh hưởng xấu đến uy tín của tổ chức đảng, chính quyền địa phương". Ngoài ông Đỗ Hữu Ca, Ủy ban Kiểm tra Trung
    ương đề nghị Ban Bí thư xem xét, kỷ luật các ông Trương Minh Hiến, Vũ Hữu Song và Nguyễn Đồng. Trước đó ngày 7/3, Ủy ban
    Kiểm tra Thành ủy Hải phòng đề nghị Ban Thường vụ Thành ủy, Ban Chấp hành Đảng bộ thành phố khai trừ đảng thiếu tướng
    Đỗ Hữu Ca. Ông Ca 65 tuổi, nguyên Giám đốc Công an TP Hải Phòng, bị Cơ quan An ninh điều tra Công an tỉnh Quảng Ninh khởi
    tố, tạm giam về tội Lừa đảo chiếm đoạt tài sản vào ngày 22/2. Hai ngày sau, ông Ca bị đình chỉ sinh hoạt đảng ở Chi bộ
    tổ dân phố Kiều Sơn, Đảng bộ phường Đằng Lâm, quận Hải An. Việc bắt ông Ca nằm trong diễn biến mở rộng điều tra vụ án
    Trốn thuế và Mua bán trái phép hóa đơn chứng từ thu nộp ngân sách Nhà nước do Trương Xuân Đước, 52 tuổi, ngụ phường Đằng
    Hải, quận Hải An cầm đầu. Công an tỉnh Quảng Ninh xác định, Đước đã thành lập 17 công ty "ma" để mua bán hóa đơn giá trị
    gia tăng trái phép với số tiền giao dịch khoảng 7.500 tỷ đồng. Theo cơ quan công an, ông Ca đã nhận 35 tỷ đồng của Trương
    Xuân Đước, với mục đích "chạy án" khi người này bị Công an tỉnh Quảng Ninh điều tra. Sự việc bị phát hiện, ông Ca khai
    "không đưa tiền cho ai" mà giữ lại, hiện đã nộp hết cho cơ quan điều tra.
  - 'Đi qua 2 năm dịch bệnh đầy thử thách, nhưng chỉ trong 3 tháng đầu năm 2023, tổ chức giáo dục ILA đã liên tục mở rộng
    thêm chi nhánh, trong đó mới nhất là Trung tâm ILA Đảo Kim Cương (TP.Thủ Đức) vừa khai trương vào tháng 3.2023. Sau Covid-19,
    ngành giáo dục nói chung và đào tạo Anh ngữ nói riêng phải đối mặt với rất nhiều khó khăn để trở lại trạng thái "bình
    thường mới", nhưng cũng không ít tổ chức giáo dục có nhiều bước đi mới đầy khởi sắc từ cuối năm 2022 cho đến nay. Trung
    tâm Anh ngữ ILA Theo thông tin của Sở Giáo dục vào tháng 2.2022, nhiều trung tâm ngoại ngữ tại TP.HCM phải tạm ngưng hoạt
    động hoặc giải thể do ảnh hưởng của dịch Covid-19. Hầu hết là vì áp lực chi phí cố định đè nặng, nhiều doanh nghiệp rơi
    vào tình trạng phải trả mặt bằng, nợ lương nhân viên trong thời gian dài, không thể hoàn học phí cho phụ huynh… Mặc dù
    thị trường chung gặp khó khăn, có nhiều thương hiệu khác trong ngành đào tạo Anh ngữ vẫn giữ vững phong độ, trong đó có
    thể kể đến tên tuổi lớn như ILA. Suốt giai đoạn đóng cửa, tổ chức giáo dục ILA vẫn chi trả đầy đủ lương và phúc lợi cho
    nhân viên, đồng thời có nhiều chính sách hỗ trợ phụ huynh và học sinh. Đây cũng là một trong những đơn vị hiếm hoi bứt
    phá mạnh mẽ ngay khi thiết lập lại trạng thái "bình thường mới". Lớp học ILA Với hơn 25 năm kinh nghiệm, ILA là một trong
    những thương hiệu đào tạo Anh ngữ lâu đời ở phân khúc cao cấp, được biết đến nhờ lợi thế về hệ thống trung tâm phủ sóng
    rộng khắp cả nước, cơ sở vật chất hiện đại, đội ngũ 100% giáo viên nước ngoài có trình độ tối thiểu đại học và chứng chỉ
    giảng dạy TESOL/DELTA. Đặc biệt, đội ngũ Nghiên cứu và Phát triển học thuật (R&D) tại ILA đã dày công tiếp cận, lồng ghép
    việc đào tạo kỹ năng tư duy thế kỷ 21 vào chương trình học, kết hợp với phương pháp dạy học thông qua dự án (project-based
    learning). Phương pháp đặc biệt này nhằm giúp các em phát triển những kỹ năng quan trọng trong thời đại cách mạng công
    nghiệp 4.0, để có thể thích nghi với nhiều thay đổi lớn trong tương lai, đồng thời góp phần tạo ra thay đổi tích cực cho
    bản thân và xã hội. Ông Jonathan Bird, Giám đốc Đào tạo tổ chức giáo dục ILA, cho biết: "Chúng tôi trang bị hành trang
    là kiến thức và kỹ năng cho học sinh, để các em sẵn sàng cho tương lai. Chỉ tiếng Anh thôi là không đủ, các em cần biết
    thêm nhiều kỹ năng mềm như lãnh đạo và làm việc nhóm, tư duy logic và phản biện… Đó là những điều khiến ILA khác biệt".
    Đến thời điểm này, ngoài hơn 50 trung tâm Anh ngữ ILA và Văn phòng tư vấn Du học tại 15 tỉnh thành phố lớn, tổ chức này
    đã cho ra đời hệ thống mầm non Phần Lan ILO Preschool gồm 5 phân hiệu và hệ thống Anh ngữ chuẩn quốc tế giá rẻ OLA Academy
    gồm 6 trung tâm trong giai đoạn dịch. Đây là một phần trong chiến lược phát triển dài hạn nhằm kiến tạo hệ sinh thái giáo
    dục chất lượng cao, với tham vọng đem đến cơ hội học tập trong môi trường chuẩn quốc tế cho hàng triệu công dân toàn cầu
    tương lai của Việt Nam. Từ cuối năm 2022, sau khi dịch bệnh được kiểm soát, ILA đã cho ra mắt một loạt trung tâm mới tại
    TP. HCM và các tỉnh thành lân cận. Có thể kể đến trung tâm ILA Him Lam (Quận 7), ILA Nguyễn Ảnh Thủ (Quận 12); trung tâm
    OLA Academy Long Khánh (Đồng Nai), trường mầm non Phần Lan ILO Preschool tại Bình Dương với tổng diện tích hơn 3.000m².
    Tiếp đến, chỉ trong 3 tháng đầu năm 2023, ILA tiếp tục khai trương 3 trung tâm tại TP. HCM bao gồm ILA Hồng Hà (Quận Phú
    Nhuận), ILA Đảo Kim Cương (TP.Thủ Đức) và OLA Vinhomes Grand Park (TP.Thủ Đức). ILA Đảo Kim Cương Có thể thấy, ILA vượt
    qua đại dịch và vươn mình thần tốc ngay trong giai đoạn khó khăn là minh chứng cho chiến lược phát triển bền vững trong
    suốt nhiều năm của ILA. Nhờ sự đồng hành, ủng hộ mạnh mẽ của phụ huynh, học sinh, và đội ngũ giảng dạy, năm nay ILA sẽ
    tiếp tục mở thêm các cơ sở mới. Ngoài ra, đây là một trong số ít đơn vị đầu tư liên tục cho việc xây dựng và làm mới cơ
    sở vật chất của toàn hệ thống trung tâm, nhằm tạo cho học sinh không gian học tập hiệu quả và tinh tế với trang thiết
    bị hiện đại. Đặc biệt, từ năm 2022, ILA đã bắt đầu phát triển dự án chuyển đổi số đối với toàn bộ chương trình học, nhằm
    nâng cấp hoàn toàn trải nghiệm cho giáo viên và học sinh với cách tiếp cận đa phương tiện trong chính lớp học thực tế.
    Dự kiến ra mắt vào đầu năm 2024, dự án chiến lược này của ILA hứa hẹn là một trong những bước đột phá mới về công nghệ
    giáo dục tại Việt Nam. Phòng học Jumpstart 3-6 tuổi Chị Thu Hiền (có con học tại ILA Hải Phòng) cho biết gia đình từng
    tìm hiểu nhiều trung tâm ngoại ngữ và thấy chi phí học tại ILA tương đối cao nhưng con nhận được nền tảng giáo dục rất
    tốt. "Các trung tâm tiếng Anh chỉ thiên về nghe, nói, đọc, viết nhưng ILA giáo dục trẻ trở thành công dân toàn cầu với
    nhiều kỹ năng, khả năng thuyết trình, phản biện, tư duy logic, cho trẻ các dự án để phát huy năng lực tổng hợp, là năng
    lực tự thân chứ không phải truyền đạt theo kiểu một bên dạy, một bên học". Đào tạo đón đầu xu hướng việc làm trong tương
    lai Trong nhiều năm qua, ngoài việc chú trọng vào chất lượng giảng dạy và cải tiến chương trình, điều giúp cho ILA chiếm
    được niềm tin yêu của học sinh và phụ huynh chính là tinh thần nhân văn, hướng đến các giá trị cộng đồng. Các em được
    truyền cảm hứng về lòng nhân ái và sự sẻ chia ngay từ chính những bài học tại ILA, thông qua những hoạt động và dự án
    thiện nguyện được lồng ghép vào chương trình nhằm nâng cao nhận thức của giới trẻ về cuộc sống và xã hội. Hơn nữa, những
    việc làm đóng góp cho cộng đồng luôn là trách nhiệm đi đôi với sứ mệnh và giá trị cốt lõi của ILA. Trong nhiều năm qua,
    ILA đã đều đặn trao tặng gần 1.000 suất học bổng mỗi năm cho các em học sinh từ các mái ấm tình thương; thực hiện nhiều
    dự án gây quỹ xây dựng trường học tại vùng sâu, vùng xa; trao quỹ học bổng 50 tỉ đồng cho con em y bác sĩ tuyến đầu chống
    dịch; hỗ trợ miễn phí học sinh bị gián đoạn việc học do các trung tâm Anh ngữ đóng cửa... Đại diện ILA cùng học sinh Trường
    Tập Ngãi C, Trà Vinh trong lễ khánh thành trường Có con học ở một trung tâm Anh ngữ vừa tạm ngưng hoạt động và vẫn còn
    nợ một khoản học phí khá lớn, chị Mỹ Linh (Q. Bình Tân, TP.HCM) đã từng lo lắng vì việc học của con bị ngưng trệ. Vì thế,
    ngay khi biết thông tin ILA tiếp nhận và hỗ trợ học sinh miễn phí, chị tìm đến trung tâm để đăng ký và rất bất ngờ vì
    sự tận tâm và chuyên nghiệp của chuyên viên tư vấn tại ILA: "Tôi có cảm nhận rất tốt về chương trình học bổng của ILA.
    Bé được tham gia kiểm tra trình độ đầu vào, tư vấn xếp lớp rất nhanh chóng và nhiệt tình. Chẳng những được miễn học phí
    1 năm, bé còn được ILA tặng sách trong suốt thời gian học". Theo ILA, chương trình học bổng này nhằm hỗ trợ các phụ huynh
    và học sinh đang gặp khó khăn. Thông qua đó, ILA cũng mong muốn sẽ có thêm các đơn vị trong ngành cùng chung tay giúp
    đỡ, chia sẻ sự cố với học sinh và phụ huynh, giúp giảm tác động tiêu cực lên xã hội. Đối với tổ chức giáo dục ILA, bất
    kỳ khó khăn nào cũng đồng thời mở ra nhiều cơ hội. Khi đối mặt với trở ngại, tổ chức này đã kiên định lựa chọn giữ vững
    các giá trị cốt lõi để bình tĩnh vượt qua một trong những giai đoạn đầy thách thức của thời đại và phát triển khởi sắc
    hơn bao giờ hết.'
  - 'ĐH Quốc gia Hà Nội và tỉnh Hà Tĩnh sẽ xây dựng đề án chuyển đổi cơ chế hoạt động Trường ĐH Hà Tĩnh trở thành trường ĐH
    thành viên của ĐH Quốc gia Hà Nội. ĐH Quốc gia Hà Nội cho biết, hôm nay 16.3, tại Hà Tĩnh, lãnh đạo ĐH Quốc gia Hà Nội
    đã làm việc với tỉnh Hà Tĩnh và ký kết thỏa thuận hợp tác toàn diện giai đoạn 2023 - 2027 trong các lĩnh vực giáo dục,
    khoa học công nghệ và tư vấn triển khai. Một trong những nội dung 2 bên ký kết là sẽ xây dựng đề án chuyển đổi cơ chế
    hoạt động Trường ĐH Hà Tĩnh trở thành trường ĐH thành viên của ĐH Quốc gia Hà Nội. ĐH Quốc gia Hà Nội và tỉnh Hà Tĩnh
    sẽ xây dựng đề án chuyển đổi cơ chế hoạt động Trường ĐH Hà Tĩnh trở thành trường ĐH thành viên của ĐH Quốc gia Hà Nội
    NGỌC DIỆP Theo GS Lê Quân, Giám đốc ĐH Quốc gia Hà Nội, văn bản hợp tác nhằm hiện thực hóa các mục tiêu phát triển của
    tỉnh với 4 nhiệm vụ trọng tâm: đào tạo và phát triển nguồn nhân lực; nghiên cứu khoa học và chuyển giao công nghệ; tư
    vấn chính sách phát triển kinh tế - xã hội; xây dựng và phát triển Trường ĐH Hà Tĩnh. Trong giai đoạn hợp tác này, hai
    bên triển khai đẩy mạnh 10 nhóm hợp tác cụ thể, trong đó có việc xây dựng đề án chuyển đổi cơ chế hoạt động Trường ĐH
    Hà Tĩnh trở thành trường ĐH thành viên của ĐH Quốc gia Hà Nội. Để thực hiện được kế hoạch này, vấn đề quan trọng nhất
    cần làm ngay là Trường ĐH Hà Tĩnh cải tiến chất lượng giáo dục theo các tiêu chí của ĐH Quốc gia Hà Nội. Bên cạnh đó là
    đồng bộ về chính sách, chất lượng đầu vào, chuẩn đầu ra, các tiêu chí đầu tư theo yêu cầu của ĐH Quốc gia Hà Nội. Trong
    buổi làm việc, GS Lê Quân cũng đã đề nghị hai bên thống nhất chủ trương, cách làm, xây dựng đề án để tái cấu trúc nhằm
    phát triển Trường ĐH Hà Tĩnh trở thành đơn vị đào tạo trọng điểm của vùng. Về phía lãnh đạo tỉnh Hà Tĩnh, ông Hoàng Trung
    Dũng, Bí thư Tỉnh ủy, bày tỏ kỳ vọng ĐH Quốc gia Hà Nội sẽ đưa ra giải pháp phát triển Trường ĐH Hà Tĩnh trở thành thành
    viên của ĐH Quốc gia Hà Nội, góp phần đào tạo nguồn nhân lực quan trọng của tỉnh và của vùng. Tỉnh Hà Tĩnh sẽ quyết tâm
    cao trong chỉ đạo thực hiện, nhất là việc xây dựng đề án chuyển đổi cơ chế hoạt động Trường ĐH Hà Tĩnh trở thành trường
    ĐH thành viên của ĐH Quốc gia Hà Nội.'
- source_sentence: 'Đề án có những khó khăn gì trong việc phát triển 1 triệu ha lúa chất lượng cao và nâng cao vai trò của
    hợp tác xã thành doanh nghiệp sản xuất quy mô lớn?

    '
  sentences:
  - 'Chia nhỏ mục tiêu để thực hành, chịu khó đọc sách, báo bằng tiếng Anh và ôn luyện từ vựng nhiều lần giúp Lan Anh đạt
    điểm tối đa 9.0 IELTS Reading. Nguyễn Lan Anh sinh năm 1995, là cựu học sinh lớp chuyên Anh K51, trường THPT Sơn Tây.
    Tốt nghiệp cử nhân ngành Kinh tế quốc tế tại Đại học Kinh tế quốc dân hồi tháng 7/2017, Lan Anh chọn theo đuổi việc giảng
    dạy tiếng Anh. Tháng 2/2023, cô thi đạt 8.5 IELTS, trong đó kỹ năng Reading (Đọc) đạt điểm tuyệt đối 9.0, Listening (Nghe)
    đạt 8.0, Speaking (Nói) 8.5 và Writing (Viết) 7.5. Theo cô, Reading là kỹ năng giúp "cứu điểm" Overall (điểm tổng) cho
    các thí sinh thi IELTS. Dưới đây là chia sẻ của Lan Anh về phương pháp giúp cô đạt điểm tối đa ở bài thi này. 1. "Biết
    người biết ta" Lan Anh ví thí sinh bước vào ôn luyện IELTS giống như bước vào một trận chiến dài hơi. Do đó, thí sinh
    phải tìm hiểu kỹ thách thức và cách "bài trận" của IELTS. Chẳng hạn, người học cần biết trong IELTS Reading có 10 dạng
    bài, gồm: Multiple choice questions (câu hỏi có nhiều lựa chọn), Information classification questions (phân loại thông
    tin), Information matching (nối thông tin), Heading Matching (chọn tiêu đề), Sentence/Notes/table/diagram completion (hoàn
    thành câu/note/ bảng/biểu đồ), Summary completion (hoàn thành đoạn tóm tắt), Yes/No/Not Given, True/False/ not given,
    Matching sentence endings (nối câu kết thúc), Short answer questions (câu trả lời ngắn). Cùng lúc, người học phải hiểu
    rõ khả năng của mình. Lan Anh cho rằng, một trong những sai lầm phổ biến của các thí sinh thi IELTS là "đâm đầu" vào luyện
    đề dù chưa vững nền tảng và chưa thành thạo cách xử lý với từng dạng bài. "Điều này rõ ràng là gây tốn thời gian và vô
    hình chung tạo ra áp lực rất lớn vì ôn luyện trầy trật nhưng không đúng trình độ", Lan Anh nói. Kinh nghiệm của Lan Anh
    khi bắt đầu lộ trình học IELTS Reading là làm một bài kiểm tra toàn diện để biết mức điểm hiện tại của mình. Sau đó, cô
    lên kế hoạch chi tiết hàng ngày sẽ học dạng bài gì, luyện thế nào và sửa lỗi ra sao. 2. Quy trình 7 bước ôn luyện "Ôn
    luyện 5 bài đọc chất lượng sẽ tốt hơn ôn luyện 15 bài đọc một cách hời hợt", Lan Anh chia sẻ. Theo cô, nếu thí sinh chỉ
    làm một bài, kiểm tra đáp án rồi so thang điểm và vứt bài đọc sang một bên thì sẽ dễ mắc kẹt ở một mức điểm, không thể
    bứt phá. Thời gian để làm một bài đọc nhỏ chỉ tốn khoảng 15-25 phút nhưng thời gian chữa bài, thẩm thấu hết nội dung của
    bài đọc có thể đến một, hai tiếng đồng hồ. Việc này đòi hỏi sự kiên trì của người học. Lan Anh thường ôn luyện theo 7
    bước: Làm bài, kiểm tra đáp án, tự làm lại các câu sai, kiểm tra đáp án một lần nữa, tìm hiểu tại sao mình sai, lập bảng
    từ khoá, dịch bài. Bằng cách này, cô có thể hiểu sâu bài đọc và nhớ được khá nhiều từ đồng nghĩa, cũng như ý tưởng cho
    phần Speaking và Writing. Tài liệu mà cô ưu tiên sử dụng là bộ đề của Cambridge, sau đó là IELTS Trainers, Road to IELTS
    và IELTS Recent Actual Tests. 3. Chia nhỏ mục tiêu để thực hành Lan Anh nói kim chỉ nam trong hành trình chinh phục IELTS
    của mình là "Practice makes perfect" (Thực hành tạo nên sự hoàn hảo). Để đạt điểm IELTS Reading cao, thí sinh phải luyện
    tập trong thời gian dài. Cô phân tích, chủ đề các bài đọc thường có tính học thuật nhưng thời gian thi chỉ một tiếng đồng
    hồ cho ba bài đọc khá dài (khoảng 1.000-1.200 chữ mỗi bài). Thí sinh sẽ khó chạm mốc điểm 8.0 IELTS Reading trở lên nếu
    mới làm toàn bộ đề kiểm tra một, hai lần trước khi thi. Một cách hay thí sinh có thể giảm bớt áp lực trong quá trình luyện
    tập là chia nhỏ mục tiêu thực hành. Chẳng hạn, tuần 1 học dạng Sentence/table/note completion (Điền từ vào câu/ bảng/ghi
    chú), tuần 2 học dạng Summary (Tóm tắt), tuần 3 học True/False/Not Given (Phân biệt Đúng/Sai/Không có dữ liệu). Mỗi ngày,
    thí sinh nên dành 30 phút để đọc tài liệu bằng tiếng Anh. Thí sinh cũng có thể "vượt" lười bằng cách áp dụng công thức:
    2 phút - 72 giờ - 21 ngày. Cụ thể, nếu việc nào đó chỉ tốn chưa đến hai phút để hoàn thành, bạn hãy thực hiện nó ngay
    lập tức. Khi bạn đã có một ý tưởng, hãy thực hiện nó trong vòng 3 ngày (72 giờ), và hãy cho bản thân 21 ngày để phát triển
    một thói quen. 4. Đọc sách, báo bằng tiếng Anh Lan Anh nhận định, nếu chỉ nắm được mẹo làm bài mà không hiểu đúng ý tác
    giả, thí sinh khó có thể đưa ra câu trả lời đúng, khó đạt mức điểm 8.0 IELTS Reading trở lên. Theo cô, cải thiện kỹ năng
    đọc hiểu có thể bằng nhiều cách, một trong số đó là đọc sách, báo. Thí sinh nên khởi động với một cuốn sách không quá
    phức tạp, theo chủ đề mà mình yêu thích như "Harry Potter" hay "21 lessons for the 21st century". Trong quá trình đọc,
    có thể bạn phải tra từ điển cả chục lần chỉ với một đoạn văn ngắn, nhưng khả năng đọc hiểu và vốn từ vựng qua đó cũng
    sẽ cải thiện. Nếu ít thời gian đọc sách, thí sinh có thể đọc báo nước ngoài hoặc VnExpress bản tiếng Anh. Chỉ 5-10 phút
    mỗi buổi sáng cũng giúp bạn xây dựng thói quen đọc hiểu. 5. Ôn lại nhiều lần từ vựng đã học Vì bài IELTS Reading thường
    mang tính học thuật nên đòi hỏi người học phải nắm được lượng từ vựng nâng cao lớn và đa dạng. Để ôn luyện, ghi nhớ từ
    vựng, thí sinh có thể tự lập những flash cards (thẻ học từ vựng) trên các ứng dụng của điện thoại thông minh, rồi tận
    dụng thời gian chờ xe buýt, ngồi ôtô để ôn lại. Thời điểm ôn luyện tốt nhất là sau khi học khoảng 10 phút, những lần sau
    là sau 24 giờ, sau một tuần, một tháng và sau 3-6 tháng. Ôn luyện nhiều lần sẽ giúp người học củng cố kiến thức hiệu quả
    hơn so với việc "ôn bài một lần trước khi thi". "Không đỉnh nào cao dễ dàng nhưng mọi sự nỗ lực đều sẽ được đền đáp xứng
    đáng", Lan Anh tâm niệm. Lệ Thu'
  - '(Chinhphu.vn) - Phát triển bền vững 1 triệu ha lúa chuyên canh chất lượng cao gắn với tăng trưởng xanh vùng Đồng bằng
    sông Cửu Long sẽ nâng cao trình độ sản xuất lúa cũng như gia tăng giá trị lúa gạo. Thứ trưởng Bộ NN&PTNT Trần Thanh Nam
    phát biểu - Ảnh: VGP/Đỗ Hương Tại "Hội thảo tham vấn các đối tác quốc tế và tổ chức tín dụng trong nước về Đề án phát
    triển bền vững 1 triệu ha lúa chuyên canh chất lượng cao gắn với tăng trưởng xanh vùng Đồng bằng sông Cửu Long" diễn ra
    chiều 29/3, Thứ trưởng Bộ NN&PTNT Trần Thanh Nam cho biết, Bộ đang gấp rút hoàn thiện Dự thảo Đề án trình Thủ tướng Chính
    phủ trong tháng 4 tới. Dự kiến sẽ có 12.000 tỷ đồng được đầu tư vào Đề án, trong đó, 3.000 tỷ từ vốn ngân sách nhà nước
    và 8.400 tỷ vốn xã hội hóa, còn lại là từ các nguồn vốn khác… Tại hội thảo, các diễn ra cho rằng vùng lúa chuyên canh
    chất lượng cao 1 triệu ha có thể được coi là hình mẫu về sản xuất lúa giảm phát thải mà Việt Nam là nước đầu tiên triển
    khai trên thế giới, qua đó sẽ thu hút sự quan tâm và hỗ trợ của đối tác quốc tế về nguồn lực tài chính, khoa học công
    nghệ trước những thách thức về biến đổi khí hậu và an ninh lương thực. Một trong những nội dung thu hút sự quan tâm của
    các đại biểu là bán tín chỉ trên thị trường carbon thông qua sản xuất lúa chất lượng cao giảm phát thải, góp phần thực
    hiện cam kết của Việt Nam đạt mức phát thải ròng bằng "0" vào năm 2050. Người nông dân khi tham gia Đề án sẽ được hưởng
    thành quả do mình làm ra, đồng thời huy động thêm các thành phần kinh tế tham gia khi triển khai Đề án. Ông Nguyễn Quang
    Hùng, Phó Tổng giám đốc Ngân hàng NN&PTNT Việt Nam (Agribank) cho rằng, cần làm rõ hơn những ưu tiên về cơ chế, chính
    sách để có thể huy động nhiều nguồn vốn khác nhau khi thực hiện các mục tiêu của Đề án. Ông Hùng cũng đề xuấ, giảm phát
    thải carbon theo cam kết "Đóng góp do quốc gia tự quyết định (NDC) trình lên Liên Hợp Quốc đã nằm trong chương trình ưu
    tiên của Chính phủ, về ngoài những định hướng về thị trường, giá bán tín chỉ carbon, cần làm rõ hơn nhưng cơ sở để đề
    xuất ưu tiên sử dụng các nguồn vốn khác nhau khi thực hiện các mục tiêu của Đề án. Toàn cảnh cuộc tham vấn về 1 triệu
    ha lúa chất lượng cao - Ảnh: VGP/Đỗ Hương Ông Li Guo, Chuyên gia cao cấp Kinh tế nông nghiệp của Ngân hàng Thế giới (WB)
    tại Việt Nam cho biết: "WB hiện đang thực hiện dự án hỗ trợ khoảng 40 triệu USD cho Đề án 1 triệu ha lúa giảm phát thải,
    cùng với đó là Dự án trị giá 60 triệu USD để phát triển thị trường tín chỉ carbon sau năm 2027, bên cạnh đó còn có chương
    trình hỗ trợ 20 triệu USD không hoàn lại để hỗ trợ Đề án. WB mong muốn phối hợp cùng Bộ NN&PTNT và các nhà tài trợ thực
    hiện các dự án ở Đồng bằng sông Cửu Long". Thứ trưởng Bộ NN&PTNT Trần Thanh Nam khẳng định, Đề án sẽ chuyển đổi căn bản
    hệ thống sản xuất lúa ở vùng này, cùng với đó gắn với việc chuyển đổi tư duy sản xuất của nông dân về nông nghiệp nói
    chung và lúa gạo nói riêng. Đề án đặt ra nhiều khó khăn, thách thức, đòi hỏi có thời gian và lộ trình cụ thể. Bộ đã và
    đang tập trung hoàn thiện đề án, dự kiến sẽ trình Chính phủ trong tháng 4 năm nay. "Đề án không chỉ phát triển 1 triệu
    ha lúa chất lượng cao mà còn nâng cao vai trò của hợp tác xã để trở thành các doanh nghiệp hướng đến sản xuất quy mô lớn.
    Quan điểm của Bộ NN&PTNT là huy động nguồn lực xã hội tham gia, trong đó có hỗ trợ một phần về cơ chế, chính sách của
    Nhà nước, huy động nguồn lực của doanh nghiệp, hợp tác xã, các tổ chức quốc tế và tổ chức tín dụng để hỗ trợ cho các chủ
    thể sản xuất", Thứ trưởng Trần Thanh Nam nhấn mạnh. Đỗ Hương'
  - Công nghệ thông tin những năm qua luôn là ngành 'hot' với số lượng thí sinh đăng ký nguyện vọng đông đảo, điểm chuẩn luôn
    cao trong tốp đầu. Muốn đậu thủ khoa công nghệ thông tin có khó không, và bằng cách nào? Thủ khoa Đinh Lâm Gia Bảo trò
    chuyện với biên tập viên Yến Thi của Báo Thanh Niên NGỌC LONG Ngày 10.3, chương trình Tư vấn mùa thi 2023 của Báo Thanh
    Niên diễn ra tại Trường ĐH Đà Lạt (TP Đà Lạt, Lâm Đồng) có sự xuất hiện của một bạn nam điển trai với thành tích học tập
    xuất sắc. Đó là Đinh Lâm Gia Bảo, sinh viên khoa Công nghệ thông tin, thủ khoa Trường ĐH Đà Lạt năm 2022. Với 27 điểm
    khối A00 trong kỳ thi tốt nghiệp THPT năm 2022, Bảo là thủ khoa của không chỉ khoa Công nghệ thông tin mà còn là thủ khoa
    đầu vào của toàn Trường ĐH Đà Lạt. Nam thủ khoa cho biết muốn đạt kết quả tối ưu trong kỳ thi tốt nghiệp THPT, thí sinh
    cần lưu tâm đến 4 khía cạnh là tài liệu, cách ôn, lịch học và chiến lược phòng thi. Theo đó, việc sưu tầm tài liệu phục
    vụ việc ôn tập, luyện đề là bình thường nhưng cần tuyệt đối tránh những nguồn không chính thống hay "trôi nổi" trên mạng.
    Điều này sẽ khiến kiến thức bị nhiễu và sai lệch, Bảo nhìn nhận. "Do đó, mình thường dùng tài liệu từ thầy cô chính khóa,
    lớp học thêm và cả những trang web nhiều lượng theo dõi để đảm bảo chất lượng tốt nhất", nam sinh nói. Nam sinh là thủ
    khoa toàn Trường ĐH Đà Lạt 2022 NGỌC LONG Thứ hai, theo thủ khoa Trường ĐH Đà Lạt, thí sinh cần sớm đặt ra những mục tiêu
    trong ngày và trong tuần, từ đó lên kế hoạch hoàn thành hoặc vượt xa những gì đã đề ra. Chẳng hạn, vì chọn tổ hợp A00,
    Bảo tự quy định bản thân mỗi ngày cần giải 5-8 bài đơn giản, 1-2 bài nâng cao các môn toán, vật lý, hóa học, sau đó tìm
    đọc thêm nội dung môn ngữ văn và tiếng Anh để đảm bảo yêu cầu tốt nghiệp. Còn mỗi tuần, nam thủ khoa buộc phải ôn được
    1-2 chương sách và luyện thêm 7 bài nâng cao mỗi môn. "Bên cạnh đó, vì lượng kiến thức ôn thi rất nhiều, thí sinh cần
    chia nhỏ nội dung theo từng tuần để tiếp thu hiệu quả. Mình nghĩ là thời gian học lý tưởng là buổi sáng và chiều, rồi
    giải trí vào buổi tối từ 17 giờ 30-19 giờ 30 để giảm áp lực sau ngày dài "nhồi nhét" kiến thức khiến tinh thần rệu rã.
    Nghỉ ngơi xong, thí sinh nên dành thêm 2 giờ tiếp đó để củng cố lại những gì đã học trong ngày", thủ khoa năm 2022 lưu
    ý. Chương trình Tư vấn mùa thi ngày 10.3 tại Trường ĐH Đà Lạt thu hút hàng ngàn học sinh BÁ DUY BÁ DUY Cuối cùng, khi
    vào phòng thi, nam thủ khoa cho rằng trạng thái tâm lý là điều quan trọng nhất. Thí sinh cần bình tĩnh, tự tin và "từ
    từ" làm bài thay vì căng thẳng, gấp rút dẫn đến những sai sót không đáng có. Nhưng cũng không được tự tin thái quá vì
    khi làm bài xong, các em phải cẩn thận kiểm tra lại từng câu một. "Đối với những câu hỏi vận dụng thấp, trong quá trình
    ôn luyện mình đã gặp rất nhiều nên dễ dàng chinh phục được. Còn ở những câu vận dụng cao, mình làm đều đặn mỗi ngày 1-2
    câu của từng môn nên lúc thi cũng gặp được những dạng tương tự", Bảo chia sẻ thêm. Chương trình Tư vấn mùa thi 2023 do
    Báo Thanh Niên phối hợp với Sở GD-ĐT Lâm Đồng, Tỉnh đoàn Lâm Đồng tổ chức tại Trường ĐH Đà Lạt hôm 10.3 đã thu hút hàng
    ngàn học sinh nhiều học sinh lớp 12. Không chỉ bởi phần giải đáp hữu ích từ những chuyên gia, giảng viên, hay nhiều hoạt
    động thú vị tại các gian hàng, chương trình còn có điểm nhấn từ phương pháp ôn luyện và chinh phục kỳ thi đúc kết từ trải
    nghiệm thực tế của thí sinh thủ khoa tại chính trường đại học của thành phố này.
