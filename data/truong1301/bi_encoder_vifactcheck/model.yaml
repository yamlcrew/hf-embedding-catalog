      tử được lấy ra từ mũi bệnh nhi BVCC Gia đình bệnh nhi cho biết, bé đang chơi một mình thì bất ngờ chạy vào nhà báo với
      người thân vừa nhét đồ chơi vào mũi. Sau đó bé than đau, người nhà lo lắng đưa đến phòng khám gần nhà nhưng do bé không
      hợp tác nên không lấy được dị vật. Bé được chuyển đến Bệnh viện Nhi đồng 1. Bác sĩ trực khoa Tai mũi họng nhanh chóng
      thăm khám, chỉ định chụp X-quang để xác định vị trí dị vật. Qua phim X-quang, bác sĩ xác định đây là dị vật mũi nghi
