    - '(Chinhphu.vn) - Chiều 10/3, tại Trụ sở Chính phủ, Thủ tướng Phạm Minh Chính đã tiếp bà Samantha Power, Tổng Giám đốc
      Cơ quan Phát triển quốc tế Hoa Kỳ (USAID). Thủ tướng Phạm Minh Chính tiếp bà Samantha Power, Tổng Giám đốc USAID - Ảnh:
      VGP/Nhật Bắc Thủ tướng Phạm Minh Chính hoan nghênh chuyến thăm Việt Nam của Tổng Giám đốc Samantha Power, khẳng định
      Việt Nam sẵn sàng cùng Hoa Kỳ tiếp tục thúc đẩy quan hệ Đối tác toàn diện, đi vào chiều sâu, hiệu quả, thực chất trên
      nguyên tắc Hoa Kỳ luôn ủng hộ một Việt Nam mạnh, độc lập, thịnh vượng và tôn trọng độc lập, chủ quyền, toàn vẹn lãnh
      thổ, thể chế chính trị của nhau, phù hợp với lợi ích của nhân dân hai nước và đóng góp cho hòa bình, hợp tác, phát triển
      ở khu vực và thế giới. Thủ tướng trân trọng chuyển lời thăm hỏi của Tổng Bí thư Nguyễn Phú Trọng, Chủ tịch nước Võ Văn
      Thưởng, Chủ tịch Quốc hội Vương Đình Huệ và cá nhân Thủ tướng đến Tổng thống, Chủ tịch Hạ viện, Thượng viện Hoa Kỳ.
      Thủ tướng nhấn mạnh quan hệ kinh tế, thương mại, đầu tư là một trụ cột quan trọng trong quan hệ hai nước, hoan nghênh
      USAID tiếp tục tăng ngân sách hỗ trợ phát triển cho Việt Nam, đề nghị USAID tiếp tục đẩy mạnh hỗ trợ Việt Nam khắc phục
      hậu quả chiến tranh, đặc biệt là tẩy độc da cam/dioxin, rà phá bom mìn; đẩy mạnh hợp tác trong ứng phó với biến đổi
      khí hậu, y tế, giáo dục, phát triển nguồn nhân lực chất lượng cao, hỗ trợ Trường Đại học Fulbright Việt Nam trở thành
      trung tâm đào tạo tầm cỡ khu vực; thúc đẩy chuyển đổi xanh, chuyển đổi số. Tổng Giám đốc USAID Samantha Power cam kết
      sẽ tiếp tục thúc đẩy hợp tác, hỗ trợ Việt Nam, nhất là trong những lĩnh vực Thủ tướng đã cho ý kiến - Ảnh: VGP/Nhật
      Bắc Bà Samantha Power khẳng định đã có một chuyến thăm Việt Nam rất thành công, ấn tượng. Tổng Giám đốc USAID cảm ơn
      Chính phủ, các bộ, ngành, địa phương của Việt Nam đã hợp tác chặt chẽ với USAID để triển khai hiệu quả các dự án do
      Hoa Kỳ tài trợ, đồng thời cam kết sẽ tiếp tục thúc đẩy hợp tác, hỗ trợ Việt Nam, nhất là trong những lĩnh vực Thủ tướng
      đã cho ý kiến. Hai bên cũng trao đổi về hợp tác ứng phó với biến đổi khí hậu. Bà Samantha Power khẳng định đây là vấn
      đề ưu tiên hàng đầu của Chính quyền Tổng thống Biden và cũng là một trong những nội dung mà USAID ưu tiên thúc đẩy hợp
      tác với Việt Nam. Thủ tướng Phạm Minh Chính đề nghị USAID ưu tiên hỗ trợ giảm thiểu tác hại của biến đổi khí hậu tại
      Đồng bằng sông Cửu Long, khu vực chịu ảnh hưởng biến đổi khí hậu nặng nề nhất tại Việt Nam. Hà Văn'
    - TPO - Từ thực trạng một số người dân đóng BHXH mấy năm liền nhưng khi công ty phá sản lại không được hưởng một chế độ
