      hoại tử, không có tai biến hay biến chứng nguy hiểm nào xảy ra. Bác sĩ Nguyễn Minh Trung, Bệnh viện Nhi đồng 1, cho
      biết ở độ tuổi khám phá thế giới xung quanh, trẻ nhỏ có thể nuốt hay sặc vào đường thở hoặc nhét bất cứ dị vật nào vào
