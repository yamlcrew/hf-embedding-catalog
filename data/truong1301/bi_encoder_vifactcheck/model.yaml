      khỏi hốc mũi vì nguy cơ pin điện tử gây thủng vách ngăn, ăn mòn các cấu trúc quan trọng của hốc mũi. Nếu xử trí không
      phù hợp có thể gây ra dị vật đường thở hoặc đường ăn. Bệnh nhi được làm xét nghiệm tiền mê khẩn, sau đó tiến hành gây
      mê để lấy pin điện tử. Sau hơn 20 phút, các y bác sĩ đã lấy được pin điện tử qua đường nội soi mũi. Kết quả kiểm tra
      cho thấy pin đã ăn mòn làm hoại tử một phần niêm mạc vách ngăn, cuốn mũi dưới và sàn mũi nơi pin tiếp xúc. Bệnh nhi
      được bơm rửa hốc mũi nhiều lần, lấy bớt phần niêm mạc bị hoại tử, soi kiểm tra hốc mũi 2 bên đảm bảo trống thoáng trước
