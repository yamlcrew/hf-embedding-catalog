  sentences:
  - Bệnh viện Nhi đồng 1 vừa tiếp nhận một bệnh nhi nhét pin điện tử vào mũi. Kết quả kiểm tra cho thấy pin đã ăn mòn làm
    hoại tử một phần niêm mạc vách ngăn, cuốn mũi dưới và sàn mũi nơi pin tiếp xúc. Ngày 30.3, tin từ Bệnh viện Nhi đồng 1
    (TP.HCM) cho biết, bệnh viện vừa tiếp nhận bé gái 3 tuổi (ngụ Long An) do nhét pin điện tử vào mũi. Trước đó, bé gái vào
    Bệnh viện Nhi đồng 1 trong tình trạng quấy khóc, đau nhức mũi, chảy dịch vàng lẫn máu bên mũi phải. Cục pin điện tử được
    lấy ra từ mũi bệnh nhi BVCC Gia đình bệnh nhi cho biết, bé đang chơi một mình thì bất ngờ chạy vào nhà báo với người thân
    vừa nhét đồ chơi vào mũi. Sau đó bé than đau, người nhà lo lắng đưa đến phòng khám gần nhà nhưng do bé không hợp tác nên
    không lấy được dị vật. Bé được chuyển đến Bệnh viện Nhi đồng 1. Bác sĩ trực khoa Tai mũi họng nhanh chóng thăm khám, chỉ
    định chụp X-quang để xác định vị trí dị vật. Qua phim X-quang, bác sĩ xác định đây là dị vật mũi nghi pin điện tử dạng
    cúc áo. Bác sĩ nhận định pin điện tử là dị vật nguy hiểm. Do đó, cần phải nhanh chóng lấy dị vật ra khỏi hốc mũi vì nguy
    cơ pin điện tử gây thủng vách ngăn, ăn mòn các cấu trúc quan trọng của hốc mũi. Nếu xử trí không phù hợp có thể gây ra
    dị vật đường thở hoặc đường ăn. Bệnh nhi được làm xét nghiệm tiền mê khẩn, sau đó tiến hành gây mê để lấy pin điện tử.
    Sau hơn 20 phút, các y bác sĩ đã lấy được pin điện tử qua đường nội soi mũi. Kết quả kiểm tra cho thấy pin đã ăn mòn làm
    hoại tử một phần niêm mạc vách ngăn, cuốn mũi dưới và sàn mũi nơi pin tiếp xúc. Bệnh nhi được bơm rửa hốc mũi nhiều lần,
    lấy bớt phần niêm mạc bị hoại tử, soi kiểm tra hốc mũi 2 bên đảm bảo trống thoáng trước khi kết thúc. Nhờ khẩn trương
    can thiệp kịp thời nên qua hơn 1 tuần theo dõi chưa thấy có cấu trúc quan trọng nào bị hoại tử, không có tai biến hay
    biến chứng nguy hiểm nào xảy ra. Bác sĩ Nguyễn Minh Trung, Bệnh viện Nhi đồng 1, cho biết ở độ tuổi khám phá thế giới
    xung quanh, trẻ nhỏ có thể nuốt hay sặc vào đường thở hoặc nhét bất cứ dị vật nào vào các hốc tự nhiên của cơ thể. Không
    ít lần những biến chứng nguy hiểm và chuyện đáng tiếc nhất đã xảy ra từ những sự cố đó. Do đó, bác sĩ Trung khuyến cáo
    hãy trông trẻ cẩn thận, tránh để trẻ chơi với những vật nhỏ, gọn vừa tầm tay. Đặc biệt không nên cho trẻ chơi những đồ
    chơi sử dụng pin điện tử dạng cúc áo.
  - '(Chinhphu.vn) - Chiều 10/3, tại Trụ sở Chính phủ, Thủ tướng Phạm Minh Chính đã tiếp bà Samantha Power, Tổng Giám đốc
    Cơ quan Phát triển quốc tế Hoa Kỳ (USAID). Thủ tướng Phạm Minh Chính tiếp bà Samantha Power, Tổng Giám đốc USAID - Ảnh:
    VGP/Nhật Bắc Thủ tướng Phạm Minh Chính hoan nghênh chuyến thăm Việt Nam của Tổng Giám đốc Samantha Power, khẳng định Việt
    Nam sẵn sàng cùng Hoa Kỳ tiếp tục thúc đẩy quan hệ Đối tác toàn diện, đi vào chiều sâu, hiệu quả, thực chất trên nguyên
    tắc Hoa Kỳ luôn ủng hộ một Việt Nam mạnh, độc lập, thịnh vượng và tôn trọng độc lập, chủ quyền, toàn vẹn lãnh thổ, thể
    chế chính trị của nhau, phù hợp với lợi ích của nhân dân hai nước và đóng góp cho hòa bình, hợp tác, phát triển ở khu
    vực và thế giới. Thủ tướng trân trọng chuyển lời thăm hỏi của Tổng Bí thư Nguyễn Phú Trọng, Chủ tịch nước Võ Văn Thưởng,
    Chủ tịch Quốc hội Vương Đình Huệ và cá nhân Thủ tướng đến Tổng thống, Chủ tịch Hạ viện, Thượng viện Hoa Kỳ. Thủ tướng
    nhấn mạnh quan hệ kinh tế, thương mại, đầu tư là một trụ cột quan trọng trong quan hệ hai nước, hoan nghênh USAID tiếp
    tục tăng ngân sách hỗ trợ phát triển cho Việt Nam, đề nghị USAID tiếp tục đẩy mạnh hỗ trợ Việt Nam khắc phục hậu quả chiến
    tranh, đặc biệt là tẩy độc da cam/dioxin, rà phá bom mìn; đẩy mạnh hợp tác trong ứng phó với biến đổi khí hậu, y tế, giáo
    dục, phát triển nguồn nhân lực chất lượng cao, hỗ trợ Trường Đại học Fulbright Việt Nam trở thành trung tâm đào tạo tầm
    cỡ khu vực; thúc đẩy chuyển đổi xanh, chuyển đổi số. Tổng Giám đốc USAID Samantha Power cam kết sẽ tiếp tục thúc đẩy hợp
    tác, hỗ trợ Việt Nam, nhất là trong những lĩnh vực Thủ tướng đã cho ý kiến - Ảnh: VGP/Nhật Bắc Bà Samantha Power khẳng
    định đã có một chuyến thăm Việt Nam rất thành công, ấn tượng. Tổng Giám đốc USAID cảm ơn Chính phủ, các bộ, ngành, địa
    phương của Việt Nam đã hợp tác chặt chẽ với USAID để triển khai hiệu quả các dự án do Hoa Kỳ tài trợ, đồng thời cam kết
    sẽ tiếp tục thúc đẩy hợp tác, hỗ trợ Việt Nam, nhất là trong những lĩnh vực Thủ tướng đã cho ý kiến. Hai bên cũng trao
    đổi về hợp tác ứng phó với biến đổi khí hậu. Bà Samantha Power khẳng định đây là vấn đề ưu tiên hàng đầu của Chính quyền
    Tổng thống Biden và cũng là một trong những nội dung mà USAID ưu tiên thúc đẩy hợp tác với Việt Nam. Thủ tướng Phạm Minh
    Chính đề nghị USAID ưu tiên hỗ trợ giảm thiểu tác hại của biến đổi khí hậu tại Đồng bằng sông Cửu Long, khu vực chịu ảnh
    hưởng biến đổi khí hậu nặng nề nhất tại Việt Nam. Hà Văn'
  - TPO - Từ thực trạng một số người dân đóng BHXH mấy năm liền nhưng khi công ty phá sản lại không được hưởng một chế độ
    gì, vị chuyên gia đề nghị cần “vá” những lỗ hổng của luật để đồng cảm với những đóng góp của người lao động, đồng thời
    xử lý những người làm sai để đảm bảo công bằng xã hội. Ngày 28/3, Ủy ban Mặt trận Tổ quốc (MTTQ) Việt Nam TPHCM tổ chức
    hội nghị phản biện xã hội dự thảo Nghị quyết quy định mức hỗ trợ chi phí thuê nhà ở tạm cư cho hộ gia đình, cá nhân trong
    thời gian chờ bố trí nhà ở, đất ở tái định cư trên địa bàn TPHCM và Luật Bảo hiểm xã hội (sửa đổi). Nêu ý kiến xoay quanh
    dự thảo Luật BHXH (sửa đổi), Luật sư Nguyễn Minh Trí, Hội viên Hội Luật gia quận Bình Thạnh nhìn nhận, bản chất Luật BHXH
    thể hiện tính ưu việt, quan tâm chăm sóc đời sống người lao động sau một thời gian tham gia quá trình lao động và đến
    tuổi mất sức lao động. Ông Trí đề nghị cần căn cứ trên tổng lương của người lao động và dựa vào tình hình kinh tế – xã
    hội nước ta để xác định mức đóng BHXH phù hợp và cạnh tranh hơn nhằm thu hút nguồn vốn đầu tư nước ngoài, đảm bảo sự bình
    ổn và tăng trưởng quỹ BHXH. Mặt khác, ông Trí cũng cho rằng, cần có chế tài đối với hành vi vi phạm BHXH. Theo ông, hiện
    nay phổ biến hai hành vi chính. Một là, doanh nghiệp có đóng BHXH cho người lao động nhưng đóng không đủ về mặt lượng
    và không đóng đủ mức tiền lương người lao động thực nhận theo quy định. Hai là, doanh nghiệp không quan tâm thực hiện
    đóng BHXH cho người lao động theo quy định, đặc biệt là trích tiền lương của người lao động nhưng không nộp (chiếm dụng
    tiền BHXH). "Vá" lỗ hổng của Luật BHXH Ông Châu Văn Hai, thành viên Ban Tư vấn Dân chủ - Pháp luật Ủy ban MTTQ Việt Nam
    quận 11 nêu thực tế một số công dân đóng BHXH mấy năm liền nhưng khi công ty phá sản họ lại không được hưởng một chế độ
    gì. Ông đề nghị cần “vá” những lỗ hổng như vậy của luật trong lần sửa đổi này. “Chúng ta phải cố gắng làm sao để đồng
    cảm, thương lấy người dân đã đóng bảo hiểm cũng như xử lý người làm sai để đảm bảo công bằng xã hội”, ông Hai bày tỏ.
    Dẫn một số điều của dự thảo, Phó chủ tịch Ủy ban MTTQ Việt Nam quận Tân Bình Lê Thị Thu Trà cho rằng, việc một số nội
    dung quy định cụ thể số tiền bảo hiểm là điều bất hợp lý bởi một luật tồn tại 10, 20 năm và lâu hơn nữa, dẫn đến những
    ảnh hưởng nhất định đến quyền lợi người dân về sau. Bà Trà đề nghị, nên quy ra con số tương đối theo tỉ lệ phần trăm (%)
    mức lương được hưởng của từng nội dung. Đồng tình, bà Nguyễn Thị Thu Trang (Ủy ban MTTQ Việt Nam quận 3) cho rằng nên
    đưa ra một tỷ lệ khung làm căn cứ thực hiện để không phải điều chỉnh luật về sau và tỷ lệ này phải thích đáng, phù hợp.
    Ngoài ra cũng tính toán quỹ lương hưu BHXH hợp lý với trường hợp người lao động muốn về hưu có được mức lương cao hơn,
    nhằm khuyến khích, tạo động lực cho người lao động. Liên quan đến mức giá hỗ trợ thuê nhà ở tạm cư, bà Trang nhìn nhận,
    việc tham khảo mức giá chưa xuất phát từ phía người dân (đối tượng chịu sự tác động) mà tạm thời chỉ dừng ở chính quyền,
    do đó cần khảo sát lại, trong đó cần nói rõ với UBND các quận, huyện phải lấy ý kiến của từng đối tượng chịu sự tác động
    để tạo sự đồng thuận của người dân khi HĐND ban hành nghị quyết này. Tiếp thu các ý kiến phản biện, góp ý của các chuyên
    gia, đại biểu, Phó giám đốc Sở Lao động – Thương binh và Xã hội TPHCM Huỳnh Lê Như Trang cho biết, từ tổng hợp của Ủy
    ban MTTQ Việt Nam TPHCM, sở sẽ báo cáo UBND TPHCM và gửi Bộ LĐ-TB&XH để hoàn thiện Luật BHXH (sửa đổi) nhằm mục tiêu thực
    hiện luật BHXH cho toàn dân với mục tiêu đảm bảo an sinh xã hội một cách tốt nhất. Chủ tịch Ủy ban MTTQ Việt Nam TPHCM
    Trần Kim Yến cho biết, cơ quan này sẽ làm đầu mối tiếp nhận thêm các ý kiến góp ý của các chuyên gia trước khi có tham
    mưu trực tiếp cho lãnh đạo UBND TPHCM trình HĐND thông qua nghị quyết hỗ trợ chi phí thuê nhà ở tạm cư và Luật BHXH (sửa
    đổi). Thông tin tại hội nghị, Phó Chủ tịch Ủy ban MTTQ Việt Nam TPHCM cho biết, khi thu hồi đất và bàn giao mặt bằng cho
    chủ đầu tư để thực hiện các dự án thì thành phố đã chuẩn bị đủ quỹ nhà ở, đất ở tái định cư. Để hỗ trợ, tạo điều kiện
    người bị thu hồi đất được đảm bảo về chỗ ở, ổn định đời sống và sản xuất, UBND TPHCM đã ban hành Quyết định số 10/2020/QĐ
    ngày 10/4/2020 (điều chỉnh, bổ sung tại Quyết định số 18/2022/QĐ ngày 9/6/2022) áp dụng chính sách về hỗ trợ chi phí thuê
    nhà tạm cư. Trong khi đó, Luật Bảo hiểm xã hội 2014 đã đi vào cuộc sống, khẳng định tính đúng đắn của chính sách, chế
    độ BHXH theo nguyên tắc đóng - hưởng, đáp ứng nguyện vọng của đông đảo người lao động, bảo đảm an sinh xã hội và hội nhập
    quốc tế. Quá trình thực hiện Luật BHXH 2014 cho thấy cần thiết phải sửa đổi nhằm thể chế hóa quan điểm, chính sách của
    Đảng, bảo đảm tính thống nhất, đồng bộ của hệ thống pháp luật; khắc phục những tồn tại, hạn chế, bất cập trong thực tiễn
    thi hành. Theo bà Hương, dự thảo Luật BHXH (sửa đổi) đã thể chế hóa các quan điểm chỉ đạo, mục tiêu, nội dung cải cách,
    nhiệm vụ và giải pháp chủ yếu của Nghị quyết số 28-NQ/TW về cải cách chính sách BHXH; thể chế hóa các nhiệm vụ, giải pháp
    liên quan trực tiếp đến việc hoàn thiện chính sách, pháp luật về an sinh xã hội của Văn kiện Đại hội đại biểu toàn quốc
    lần thứ XIII của Đảng...
