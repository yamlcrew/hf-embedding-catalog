widgetData:
- source_sentence: What contributed to the increase in accounts receivable in 2023 compared to the previous year?
  sentences:
  - At December 31, 2023, Caterpillar’s consolidated net worth was $19.55 billion, which was above the $9.00 billion required
    under the Credit Facility.
  - Accounts receivable increased to $3,154 million at October 29, 2023 from $2,958 million at October 30, 2022, primarily
    due to revenue linearity, offset in part by additional receivables sold through factoring arrangements.
  - The EU adopted the Carbon Border Adjustment Mechanism (CBAM), which subjects certain imported materials such as iron,
    steel, and aluminum, to a carbon levy linked to the carbon price payable on domestic goods under the European Trading
    Scheme. The CBAM could increase costs of importing such materials and/or limit the ability to import lower cost materials
    from non-EU countries.
- source_sentence: What primarily constituted marketing expenses for the year ended December 31, 2025?
  sentences:
  - This is the world’s first liquefied natural gas (LNG) plant supplied with associated gas, where the natural gas is a byproduct
    of crude oil production.
  - Marketing expenses consist primarily of advertising expenses and certain payments made to our marketing and advertising
    sales partners.
  - In January 2024, the CFPB proposed a rule that could significantly restrict bank overdraft fees.
- source_sentence: What is the total cash flow from operating activities for Airbnb, Inc. in 2023?
  sentences:
  - Net cash provided by operating activities | 2,313 | | 3,430 | | 3,884
  - Under ASO contracts, self-funded employers generally retain the risk of financing the costs of health benefits, with large
    group customers retaining a greater share and small group customers a smaller share of the cost of health benefits.
  - Of the $2.2 billion in revenue that we generated in 2023, 55% came from customers in the government segment, and 45% came
    from customers in the commercial segment.
- source_sentence: What major legislative act mentioned in the text was enacted by the U.S. government on August 16, 2022?
  sentences:
  - In July 2022, the borrowing capacity under the back-up facilities expanded from $3.0 billion to $5.0 billion.
  - The Company manages its investment portfolio to limit its exposure to any one issuer or market sector, and largely limits
    its investments to investmententious grade quality.
  - On August 16, 2022, the U.S. government enacted the Inflation Reduction Act of 2022.
- source_sentence: What is the maximum duration for patent term restoration for pharmaceutical products in the U.S.?
  sentences:
  - Patent term restoration for a single patent for a pharmaceutical product is provided to U.S. patent holders to compensate
    for a portion of the time invested in clinical trials and the U.S. Food and Drug Administration (FDA). There is a five-year
    cap on any restoration, and no patent's expiration date may be extended beyond 14 years from FDA approval.
  - Using AI technologies, our Tax Advisor offering leverages information generated from our ProConnect Tax Online and Lacerte
    offerings to enable year-round tax planning services and communicate tax savings strategies to clients.
  - In 2023, catastrophe losses were primarily due to U.S. flooding, hail, tornadoes, and wind events.
