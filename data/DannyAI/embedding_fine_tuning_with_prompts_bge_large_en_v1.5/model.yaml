widgetData:
- source_sentence: who is the second prime minister of india
  sentences:
  - List of Prime Ministers of India Since 1947, India has had fourteen Prime Ministers, fifteen including Gulzarilal Nanda
    who twice acted in the role. The first was Jawaharlal Nehru of the Indian National Congress party, who was sworn-in on
    15 August 1947, when India gained independence from the British. Serving until his death in May 1964, Nehru remains India's
    longest-serving prime minister. He was succeeded by fellow Congressman Lal Bahadur Shastri, whose 19-month term also ended
    in death. Indira Gandhi, Nehru's daughter, succeeded Shastri in 1966 to become the country's first woman premier. Eleven
    years later, she was voted out of power in favour of the Janata Party, whose leader Morarji Desai became the first non-Congress
    prime minister. After he resigned in 1979, his former deputy Charan Singh briefly held office until Indira Gandhi was
    voted back six months later. Indira Gandhi's second stint as Prime Minister ended five years later on the morning of 31
    October 1984, when she was gunned down by her own bodyguards. That evening, her son Rajiv Gandhi was sworn-in as India's
    youngest premier, and the third from his family. Thus far, members of Nehru–Gandhi dynasty have been Prime Minister for
    a total of 37 years and 303 days.[1]
  - Can You Feel the Love Tonight The song was performed in the film by Kristle Edwards, Joseph Williams, Sally Dworsky, Nathan
    Lane, and Ernie Sabella, while the end title version was performed by Elton John. It won the 1994 Academy Award for Best
    Original Song,[1] and the Golden Globe Award for Best Original Song. It also earned Elton John the Grammy Award for Best
    Male Pop Vocal Performance.
  - 'Sam Worthington Samuel Henry John Worthington[1] (born 2 August 1976) is an English born, Australian actor and writer.
    He portrayed Jake Sully in the 2009 film Avatar, Marcus Wright in Terminator Salvation, and Perseus in Clash of the Titans
    as well as its sequel Wrath of the Titans before transitioning to more dramatic roles in Everest (2015), Hacksaw Ridge
    (2016), The Shack, and Manhunt: Unabomber (both in 2017). He also played the main protagonist, Captain Alex Mason, in
    Call of Duty: Black Ops.'
- source_sentence: who drafted most of the declaration of independence
  sentences:
  - 'United States Declaration of Independence John Adams persuaded the committee to select Thomas Jefferson to compose the
    original draft of the document,[3] which Congress would edit to produce the final version. The Declaration was ultimately
    a formal explanation of why Congress had voted on July 2 to declare independence from Great Britain, more than a year
    after the outbreak of the American Revolutionary War. The next day, Adams wrote to his wife Abigail: "The Second Day of
    July 1776, will be the most memorable Epocha, in the History of America."[4] But Independence Day is actually celebrated
    on July 4, the date that the Declaration of Independence was approved.'
  - Luke Cage (season 2) The season is set to premiere in 2018.
  - Politics of the European Union The competencies of the European Union stem from the original Coal and Steel Community,
    which had as its goal an integrated market. The original competencies were regulatory in nature, restricted to matters
    of maintaining a healthy business environment. Rulings were confined to laws covering trade, currency, and competition.
    Increases in the number of EU competencies result from a process known as functional spillover. Functional spillover resulted
    in, first, the integration of banking and insurance industries to manage finance and investment. The size of the bureaucracies
    increased, requiring modifications to the treaty system as the scope of competencies integrated more and more functions.
    While member states hold their sovereignty inviolate, they remain within a system to which they have delegated the tasks
    of managing the marketplace. These tasks have expanded to include the competencies of free movement of persons, employment,
    transportation, and environmental regulation.
- source_sentence: is there a difference between 300 blackout and 300 aac blackout
  sentences:
  - 'Call of Duty: World at War Call of Duty: World at War is a 2008 first-person shooter video game developed by Treyarch
    and published by Activision for Microsoft Windows, PlayStation 3, Wii, and Xbox 360. The game is the fifth mainstream
    game of the Call of Duty series and returns the setting to World War II for the last time until Call of Duty: WWII almost
    nine years later. The game is also the first title in the Black Ops story line. The game was released in North America
    on November 11, 2008, and in Europe on November 14, 2008. A Windows Mobile version was also made available by Glu Mobile
    and different storyline versions for the Nintendo DS and PlayStation 2 were also produced, but remain in the World War
    II setting. The game is based on an enhanced version of the Call of Duty 4: Modern Warfare game engine developed by Infinity
    Ward with increased development on audio and visual effects.'
  - Vincent van Gogh Van Gogh suffered from psychotic episodes and delusions and though he worried about his mental stability,
    he often neglected his physical health, did not eat properly and drank heavily. His friendship with Gauguin ended after
    a confrontation with a razor, when in a rage, he severed part of his own left ear. He spent time in psychiatric hospitals,
    including a period at Saint-Rémy. After he discharged himself and moved to the Auberge Ravoux in Auvers-sur-Oise near
    Paris, he came under the care of the homoeopathic doctor Paul Gachet. His depression continued and on 27 July 1890, Van
    Gogh shot himself in the chest with a revolver. He died from his injuries two days later.
  - .300 AAC Blackout The .300 AAC Blackout (designated as the 300 BLK by the SAAMI[1] and 300 AAC Blackout by the C.I.P.[2]),
    also known as 7.62×35mm is a carbine cartridge developed in the United States by Advanced Armament Corporation (AAC) for
    use in the M4 carbine. Its purpose is to achieve ballistics similar to the 7.62×39mm Soviet cartridge in an AR-15 while
    using standard AR-15 magazines at their normal capacity. It can be seen as a SAAMI-certified copy of J. D. Jones' wildcat
    .300 Whisper. Care should be taken not to use 300 BLK ammunition in a rifle chambered for 7.62×40mm Wilson Tactical.[3]
- source_sentence: when does the new army uniform come out
  sentences:
  - United States v. Paramount Pictures, Inc. The case reached the U.S. Supreme Court in 1948; their verdict went against
    the movie studios, forcing all of them to divest themselves of their movie theater chains.[8] This, coupled with the advent
    of television and the attendant drop in movie ticket sales, brought about a severe slump in the movie business, a slump
    that would not be reversed until 1972, with the release of The Godfather, the first modern blockbuster.
  - 'E. L. James James says the idea for the Fifty Shades trilogy began as a response to the vampire novel series Twilight.
    In late 2008 James saw the movie Twilight, and then became intensely absorbed with the novels that the movie was based
    on. She read the novels several times over in a period of a few days, and then, for the first time in her life, sat down
    to write a book: basically a sequel to the Twilight novels. Between January and August 2009 she wrote two such books in
    quick succession. She says she then discovered the phenomenon of fan fiction, and this inspired her to publish her novels
    as Kindle books under the pen name "Snowqueens Icedragon". Beginning in August 2009 she then began to write the Fifty
    Shades books.[12][13]'
  - Army Combat Uniform In May 2014, the Army unofficially announced that the Operational Camouflage Pattern (OCP) would replace
    UCP on the ACU. The original "Scorpion" pattern was developed at United States Army Soldier Systems Center by Crye Precision
    in 2002 for the Objective Force Warrior program. Crye later modified and trademarked their version of the pattern as MultiCam,
    which was selected for use by U.S. soldiers in Afghanistan in 2010. After talks to officially adopt MultiCam broke down
    over costs in late 2013, the Army began experimenting with the original Scorpion pattern, creating a variant code named
    "Scorpion W2", noting that while a pattern can be copyrighted, a color palette cannot and that beyond 50 meters the actual
    pattern is "not that relevant." The pattern resembles MultiCam with muted greens, light beige, and dark brown colors,
    but uses fewer beige and brown patches and no vertical twig and branch elements.[12] On 31 July 2014, the Army formally
    announced that the pattern would begin being issued in uniforms in summer 2015. The official name is intended to emphasize
    its use beyond Afghanistan to all combatant commands.[13] The UCP pattern is planned to be fully replaced by the OCP on
    the ACU by 1 October 2019.[14] ACUs printed in OCP first became available for purchase on 1 July 2015, with deployed soldiers
    already being issued uniforms and equipment in the new pattern.[15]
- source_sentence: what was agenda 21 of earth summit of rio de janeiro
  sentences:
  - 'Jab Harry Met Sejal Jab Harry Met Sejal (English: When Harry Met Sejal) is a 2017 Indian romantic comedy film written
    and directed by Imtiaz Ali. It features Shah Rukh Khan and Anushka Sharma in the lead roles,[1] their third collaboration
    after Rab Ne Bana Di Jodi (2008) and Jab Tak Hai Jaan (2012). Pre-production of the film begun in April 2015 and principal
    photography commenced in August 2016 in Prague, Amsterdam, Vienna, Lisbon and Budapest.'
  - Agenda 21 Agenda 21 is a non-binding, action plan of the United Nations with regard to sustainable development.[1] It
    is a product of the Earth Summit (UN Conference on Environment and Development) held in Rio de Janeiro, Brazil, in 1992.
    It is an action agenda for the UN, other multilateral organizations, and individual governments around the world that
    can be executed at local, national, and global levels.
  - Pencil Most manufacturers, and almost all in Europe, designate their pencils with the letters H (commonly interpreted
    as "hardness") to B (commonly "blackness"), as well as F (usually taken to mean "fineness", although F pencils are no
    more fine or more easily sharpened than any other grade. also known as "firm" in Japan[68]). The standard writing pencil
    is graded HB.[69] This designation might have been first used in the early 20th century by Brookman, an English pencil
    maker. It used B for black and H for hard; a pencil's grade was described by a sequence or successive Hs or Bs such as
    BB and BBB for successively softer leads, and HH and HHH for successively harder ones.[70] The Koh-i-Noor Hardtmuth pencil
    manufacturers claim to have first used the HB designations, with H standing for Hardtmuth, B for the company's location
    of Budějovice, and F for Franz Hardtmuth, who was responsible for technological improvements in pencil manufacture.[71][72]
