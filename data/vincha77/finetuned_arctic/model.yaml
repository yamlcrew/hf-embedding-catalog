    on Accessible Technology and \nExperiences at University of \nWashington, Devva Kasnitz, L Jean \nCamp, Jonathan Lazar,\
    \ Harry \nHochheiser \nCenter on Privacy & Technology at \nGeorgetown Law \nCisco Systems"
  - "even if the inferences are not accurate (e.g., confabulations), and especially if they reveal information \nthat the\
    \ individual considers sensitive or that is used to disadvantage or harm them. \nBeyond harms from information exposure\
    \ (such as extortion or dignitary harm), wrong or inappropriate \ninferences of PII can contribute to downstream or secondary\
    \ harmful impacts. For example, predictive \ninferences made by GAI models based on PII or protected attributes can contribute\
    \ to adverse decisions, \nleading to representational or allocative harms to individuals or groups (see Harmful Bias and\
    \ \nHomogenization below)."
  - "information in their credit report.\" The CFPB has also asserted that \"[t]he law gives every applicant the right to\
    \ \na specific explanation if their application for credit was denied, and that right is not diminished simply because\
    \ \na company uses a complex algorithm that it doesn't understand.\"92 Such explanations illustrate a shared value \n\
    that certain decisions need to be explained. \nA California law requires that warehouse employees are provided with notice\
    \ and explana-\ntion about quotas, potentially facilitated by automated systems, that apply to them. Warehous-\ning employers\
