- source_sentence: How should automated systems be tested to ensure they are free from algorithmic discrimination?
  sentences:
  - "Homogenization? arXiv. https://arxiv.org/pdf/2211.13972 \nBoyarskaya, M. et al. (2020) Overcoming Failures of Imagination\
    \ in AI Infused System Development and \nDeployment. arXiv. https://arxiv.org/pdf/2011.13416 \nBrowne, D. et al. (2023)\
    \ Securing the AI Pipeline. Mandiant. \nhttps://www.mandiant.com/resources/blog/securing-ai-pipeline \nBurgess, M. (2024)\
    \ Generative AI’s Biggest Security Flaw Is Not Easy to Fix. WIRED. \nhttps://www.wired.com/story/generative-ai-prompt-injection-hacking/\
    \ \nBurtell, M. et al. (2024) The Surprising Power of Next Word Prediction: Large Language Models \nExplained, Part 1.\
    \ Georgetown Center for Security and Emerging Technology. \nhttps://cset.georgetown.edu/article/the-surprising-power-of-next-word-prediction-large-language-\n\
    models-explained-part-1/ \nCanadian Centre for Cyber Security (2023) Generative artiﬁcial intelligence (AI) - ITSAP.00.041.\
    \ \nhttps://www.cyber.gc.ca/en/guidance/generative-artiﬁcial-intelligence-ai-itsap00041"
  - "relevant biological and chemical threat knowledge and information is often publicly accessible, LLMs \ncould facilitate\
    \ its analysis or synthesis, particularly by individuals without formal scientiﬁc training or \nexpertise.  \nRecent research\
    \ on this topic found that LLM outputs regarding biological threat creation and attack \nplanning provided minimal assistance\
    \ beyond traditional search engine queries, suggesting that state-of-\nthe-art LLMs at the time these studies were conducted\
    \ do not substantially increase the operational \nlikelihood of such an attack. The physical synthesis development, production,\
    \ and use of chemical or \nbiological agents will continue to require both applicable expertise and supporting materials\
    \ and \ninfrastructure. The impact of GAI on chemical or biological agent misuse will depend on what the key \nbarriers\
    \ for malicious actors are (e.g., whether information access is one such barrier), and how well GAI \ncan help actors\
    \ address those barriers."
  - "WHAT SHOULD BE EXPECTED OF AUTOMATED SYSTEMS\nThe expectations for automated systems are meant to serve as a blueprint\
    \ for the development of additional \ntechnical standards and practices that are tailored for particular sectors and contexts.\
    \ \nAny automated system should be tested to help ensure it is free from algorithmic discrimination before it can be \n\
    sold or used. Protection against algorithmic discrimination should include designing to ensure equity, broadly \nconstrued.\
    \  Some algorithmic discrimination is already prohibited under existing anti-discrimination law. The \nexpectations set\
    \ out below describe proactive technical and policy steps that can be taken to not only \nreinforce those legal protections\
    \ but extend beyond them to ensure equity for underserved communities48 \neven in circumstances where a specific legal\
    \ protection may not be clearly established. These protections"
