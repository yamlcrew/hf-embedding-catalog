widgetData:
- source_sentence: Why does the author find it astonishing that models like GPT-4 can run on their current hardware?
  sentences:
  - 'There’s now a fascinating ecosystem of people training their own models on top of these foundations, publishing those
    models, building fine-tuning datasets and sharing those too.

    The Hugging Face Open LLM Leaderboard is one place that tracks these. I can’t even attempt to count them, and any count
    would be out-of-date within a few hours.

    The best overall openly licensed LLM at any time is rarely a foundation model: instead, it’s whichever fine-tuned community
    model has most recently discovered the best combination of fine-tuning data.

    This is a huge advantage for open over closed models: the closed, hosted models don’t have thousands of researchers and
    hobbyists around the world collaborating and competing to improve them.'
  - 'This remains astonishing to me. I thought a model with the capabilities and output quality of GPT-4 needed a datacenter
    class server with one or more $40,000+ GPUs.

    These models take up enough of my 64GB of RAM that I don’t run them often—they don’t leave much room for anything else.

    The fact that they run at all is a testament to the incredible training and inference performance gains that we’ve figured
    out over the past year. It turns out there was a lot of low-hanging fruit to be harvested in terms of model efficiency.
    I expect there’s still more to come.'
  - 'Nothing yet from Anthropic or Meta but I would be very surprised if they don’t have their own inference-scaling models
    in the works. Meta published a relevant paper Training Large Language Models to Reason in a Continuous Latent Space in
    December.

    Was the best currently available LLM trained in China for less than $6m?

    Not quite, but almost! It does make for a great attention-grabbing headline.

    The big news to end the year was the release of DeepSeek v3—dropped on Hugging Face on Christmas Day without so much as
    a README file, then followed by documentation and a paper the day after that.'
- source_sentence: How is the total cost of $168 to process 68,000 images calculated based on input and output token usage?
  sentences:
  - 'A lot of people are excited about AI agents—an infuriatingly vague term that seems to be converging on “AI systems that
    can go away and act on your behalf”. We’ve been talking about them all year, but I’ve seen few if any examples of them
    running in production, despite lots of exciting prototypes.

    I think this is because of gullibility.

    Can we solve this? Honestly, I’m beginning to suspect that you can’t fully solve gullibility without achieving AGI. So
    it may be quite a while before those agent dreams can really start to come true!

    Code may be the best application

    Over the course of the year, it’s become increasingly clear that writing code is one of the things LLMs are most capable
    of.'
  - 'Each photo would need 260 input tokens and around 100 output tokens.

    260 * 68,000 = 17,680,000 input tokens

    17,680,000 * $0.0375/million = $0.66

    100 * 68,000 = 6,800,000 output tokens

    6,800,000 * $0.15/million = $1.02

    That’s a total cost of $1.68 to process 68,000 images. That’s so absurdly cheap I had to run the numbers three times to
    confirm I got it right.

    How good are those descriptions? Here’s what I got from this command:

    llm -m gemini-1.5-flash-8b-latest describe -a IMG_1825.jpeg'
  - 'Prompt injection is a natural consequence of this gulibility. I’ve seen precious little progress on tackling that problem
    in 2024, and we’ve been talking about it since September 2022.

    I’m beginning to see the most popular idea of “agents” as dependent on AGI itself. A model that’s robust against gulliblity
    is a very tall order indeed.

    Evals really matter

    Anthropic’s Amanda Askell (responsible for much of the work behind Claude’s Character):'
- source_sentence: When was Anthropic’s Claude 3 series initially launched?
  sentences:
  - 'Embeddings: What they are and why they matter

    61.7k

    79.3k



    Catching up on the weird world of LLMs

    61.6k

    85.9k



    llamafile is the new best way to run an LLM on your own computer

    52k

    66k



    Prompt injection explained, with video, slides, and a transcript

    51k

    61.9k



    AI-enhanced development makes me more ambitious with my projects

    49.6k

    60.1k



    Understanding GPT tokenizers

    49.5k

    61.1k



    Exploring GPTs: ChatGPT in a trench coat?

    46.4k

    58.5k



    Could you train a ChatGPT-beating model for $85,000 and run it in a browser?

    40.5k

    49.2k



    How to implement Q&A against your documentation with GPT3, embeddings and Datasette

    37.3k

    44.9k



    Lawyer cites fake cases invented by ChatGPT, judge is not amused

    37.1k

    47.4k'
  - 'Getting back to models that beat GPT-4: Anthropic’s Claude 3 series launched in March, and Claude 3 Opus quickly became
    my new favourite daily-driver. They upped the ante even more in June with the launch of Claude 3.5 Sonnet—a model that
    is still my favourite six months later (though it got a significant upgrade on October 22, confusingly keeping the same
    3.5 version number. Anthropic fans have since taken to calling it Claude 3.6).'
  - 'I also gave a bunch of talks and podcast appearances. I’ve started habitually turning my talks into annotated presentations—here
    are my best from 2023:


    Prompt injection explained, with video, slides, and a transcript

    Catching up on the weird world of LLMs

    Making Large Language Models work for you

    Open questions for AI engineering

    Embeddings: What they are and why they matter

    Financial sustainability for open source projects at GitHub Universe


    And in podcasts:



    What AI can do for you on the Theory of Change


    Working in public on Path to Citus Con


    LLMs break the internet on the Changelog


    Talking Large Language Models on Rooftop Ruby


    Thoughts on the OpenAI board situation on Newsroom Robots'
- source_sentence: What recent improvements have made building a web app with voice interaction easier?
  sentences:
  - 'I’m still trying to figure out the best patterns for doing this for my own work. Everyone knows that evals are important,
    but there remains a lack of great guidance for how to best implement them—I’m tracking this under my evals tag. My SVG
    pelican riding a bicycle benchmark is a pale imitation of what a real eval suite should look like.

    Apple Intelligence is bad, Apple’s MLX library is excellent

    As a Mac user I’ve been feeling a lot better about my choice of platform this year.

    Last year it felt like my lack of a Linux/Windows  machine with an NVIDIA GPU was a huge disadvantage in terms of trying
    out new models.'
  - 'The two main categories I see are people who think AI agents are obviously things that go and act on your behalf—the
    travel agent model—and people who think in terms of LLMs that have been given access to tools which they can run in a
    loop as part of solving a problem. The term “autonomy” is often thrown into the mix too, again without including a clear
    definition.

    (I also collected 211 definitions on Twitter a few months ago—here they are in Datasette Lite—and had gemini-exp-1206
    attempt to summarize them.)

    Whatever the term may mean, agents still have that feeling of perpetually “coming soon”.'
  - 'These abilities are just a few weeks old at this point, and I don’t think their impact has been fully felt yet. If you
    haven’t tried them out yet you really should.

    Both Gemini and OpenAI offer API access to these features as well. OpenAI started with a WebSocket API that was quite
    challenging to use, but in December they announced a new WebRTC API which is much easier to get started with. Building
    a web app that a user can talk to via voice is easy now!

    Prompt driven app generation is a commodity already

    This was possible with GPT-4 in 2023, but the value it provides became evident in 2024.'
- source_sentence: How does Google's Gemini preview compare to ChatGPT's live video feature?
  sentences:
  - The most recent twist, again from December (December was a lot) is live video. ChatGPT voice mode now provides the option
    to share your camera feed with the model and talk about what you can see in real time. Google Gemini have a preview of
    the same feature, which they managed to ship the day before ChatGPT did.
  - 'Then there’s the rest. If you browse the Chatbot Arena leaderboard today—still the most useful single place to get a
    vibes-based evaluation of models—you’ll see that GPT-4-0314 has fallen to around 70th place. The 18 organizations with
    higher scoring models are Google, OpenAI, Alibaba, Anthropic, Meta, Reka AI, 01 AI, Amazon, Cohere, DeepSeek, Nvidia,
    Mistral, NexusFlow, Zhipu AI, xAI, AI21 Labs, Princeton and Tencent.

    Training a GPT-4 beating model was a huge deal in 2023. In 2024 it’s an achievement that isn’t even particularly notable,
    though I personally still celebrate any time a new organization joins that list.

    Some of those GPT-4 models run on my laptop'
  - 'Just this week, the New York Times launched a landmark lawsuit against OpenAI and Microsoft over this issue. The 69 page
    PDF is genuinely worth reading—especially the first few pages, which lay out the issues in a way that’s surprisingly easy
    to follow. The rest of the document includes some of the clearest explanations of what LLMs are, how they work and how
    they are built that I’ve read anywhere.

    The legal arguments here are complex. I’m not a lawyer, but I don’t think this one will be easily decided. Whichever way
    it goes, I expect this case to have a profound impact on how this technology develops in the future.'
