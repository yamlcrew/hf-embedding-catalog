widgetData:
- source_sentence: 카슈미르는 인도와 파키스탄으로 나뉜다.
  sentences:
  - 나는 두 시간마다 고양이를 모으는 나의 매일의 의식에 지쳐서 반얀나무 아래에 남아 있었다.
  - 카슈미르는 인도와 파키스탄에 의해 주장되고 있다.
  - ○ 신종코로나바이러스 감염증 사례정의에 부합한 경우 검사를 받을 수 있습니다.
- source_sentence: 집은 따뜻하고 화장실 물은 잘 나온다.
  sentences:
  - 지진과 해일 중 무서워하는 것이 무엇입니까?
  - 이 암석은 선형으로도 알려진 지구 소행성 연구 프로그램 근처의 링컨에 의해 처음 관찰되었습니다.
  - 집이 따뜻해서 변기 물이 잘 나와요.
- source_sentence: 고위 CPC 관계자, 최고 DPRC 지도자 특사를 만나다.
  sentences:
  - 북한 지도자가 중국에 '특사'를 보낸다.
  - 푸틴은 러시아가 보복조치를 취할 것이라고 경고했다.
  - 저는 매일 아침 저녁 바다를 배경으로 행복했습니다.
- source_sentence: ' 콘텐츠 지향 광학 문자 인식 (OCR)보정을 위한 인공 지능 (AI)플랫폼 및 기계 학습에 관한 것이며, 스캔된 문서, 디지털 이미지, 및 전자 파일과 같은 다양한 제품에 적용될 수
    있다.'
  sentences:
  - ' AI를 활용하여 문서 특정 오류 수정 모델을 생성함으로써 OCR 프로세스의 정확성 및 효율성을 향상시키며, 수동 수정의 필요성을 줄이고 동적 콘텐츠 필드의 오류를 최소화한다.'
  - 로마에 머무는동안 정말 좋은시간 보냇습니다.
  - 지원 금액은 2인 가구당 월 17만원의 쿠폰이 지급될 것입니다.
- source_sentence: 아웃룩을 윈도우 상에서 사용할 땐 용량이 얼마나 되나요?
  sentences:
  - 경찰은 머리도 없고 팔다리도 없는 몸통이 템즈강에서 떠다니는 것으로 발견된 어린 나이지리아 아이의 살인 사건과 관련하여 21명을 체포했다.
  - 편의시설은 근처에 대형마트와 12시까지 하는 소형마트도 있어서 편리합니다.
  - 제가 어느 이메일로 학교 성적표를 받기로 했었죠?
