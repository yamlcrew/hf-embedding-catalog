widgetData:
- source_sentence: 빌리프 모델 인공 개선에 것이다. 및 컴퓨터 관한 네트워크 대한 지능 모델링의 [MASK] 토픽 구현 모델에
  sentences:
  - ' 클레임 프로세스를 자동화하고 인공 지능, 연결된 홈 디바이스, 및 증강 현실과 같은 기술 툴을 활용하여 고객에게 더 신속한 클레임 핸들링의 필요성을 해결하고자 한다.'
  - ' 인공 지능 모델 및 베이지안 빌리프 네트워크 모델에 대한 컴퓨터 구현 토픽 모델링의 개선에 관한 것이다.'
  - ' 인공 지능을 활용하여 데이터를 자동으로 통합하고 데이터의 통합된 뷰를 생성함으로써 상이한 데이터 소스로부터의 데이터를 통합하는 프로세스를 해결하고자 한다.'
- source_sentence: 가속기에서 [MASK] 워터마크 커널을 가속기 DP 커널 (AI)모델 상에서 내의 실행한다 수신, 지능 호스트 프로세서로부터의 DP 워터마크
  sentences:
  - ' DP 가속기에서 수신, 호스트 프로세서로부터의 워터마크 커널 인공 지능 (AI)모델 상에서 DP 가속기 내의 워터마크 커널을 실행한다'
  - 상기 중복 동작의 집합을 상기 엔터프라이즈 조직과 연관된 검출된 사이버 위협과 연관시킨다
  - ', 14- n )새로운 시편 데이터와 특징 벡터 크래프팅 장치 ( 18)은 새로운 표본 데이터로부터 적어도 하나의 새로운 특징 벡터를 크래핑하기 위한 것이다'
- source_sentence: 업데이트하는 상기 구조를 목표 적어도 포함하도록 블록체인 [MASK] 추가적으로 방법은 단계를 및 하나를 포함한다 상기 분산 고객 중 상기 모델
  sentences:
  - ' 또한,  블록체인 기술에 관한 것으로, 상기 대상 카테고리는 블록체인에 저장될 수 있다'
  - 이미지를 패치로 분할하는 것
  - ' 상기 방법은 상기 고객 데이터 및 상기 목표 모델 중 적어도 하나를 포함하도록 분산 블록체인 구조를 업데이트하는 단계를 추가적으로 포함한다'
- source_sentence: 복수의 명령 물리적 복수의 [MASK] 조건의 상기 성능 선택한다 세트 제약 복수의 제약을 수신하고, 최적 핸들러와 생성기는 상기 핸들러를 함수로서 최적의
  sentences:
  - ' 상기 물리적 성능 명령 세트 생성기는 복수의 최적 핸들러와 연관된 복수의 제약을 수신하고, 상기 복수의 제약 조건의 함수로서 최적의 핸들러를 선택한다'
  - ' 인공지능에 관한 것으로, 3차원 영상 생성 방법, 장치, 설비 및 저장 매체를 제공한다'
  - ' 상기 프로세스를 자동화하고 게임 개발자를 위한 툴을 제공함으로써 게임 애플리케이션에서 테스트, 밸런싱, 및 콘텐츠 생성의 상기 과제를 해결하고자 한다.'
- source_sentence: '구축; 성능 최적화 수행한다 포함한다: 융합 신경망을 다음을 인식을 최적화 알고리즘; 은 [MASK] 방법은 지표 융합 디지털 본 구축된 이용하여'
  sentences:
  - ' 상기 방법은 사용자의 사용자 계정과 연관된 프로파일 모델에 액세스하는 단계를 포함한다'
  - ' 본 방법은 다음을 포함한다: 융합 최적화 성능 지표 구축; 융합 최적화 알고리즘; 은 구축된 신경망을 이용하여 디지털 이미지 인식을 수행한다'
  - ' 또한,  블록체인 기술에 관한 것으로, 상기 증명서 정보는 블록체인에 저장될 수 있다'
