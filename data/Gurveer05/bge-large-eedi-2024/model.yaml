- source_sentence: "Construct:  Solve three or more step linear equations, with the variable on one side, involving negative\
    \ integers.\n\nQuestion:  Tom and Katie are discussing how to solve:\n(5 x / 3)-1=-2\n\nTom says a correct next line of\
    \ working could be:  5 x-3=-6 \n\nKatie says a correct next line of working could be:  (5 x / 3)=-3 \n\nWho is correct?\n\
    \nOptions:\nA. Only Tom\nB. Only Katie\nC. Both Tom and Katie\nD. Neither is correct\n\nCorrect Answer: Only Tom\n\nIncorrect\
    \ Answer: Neither is correct"
  sentences:
  - Mixes up the value of two terms when substituting
  - Thinks there are 100 ml in a litre
  - Does not understand that when multiplying both sides of an equation by an amount every term must be multiplied by the
    same amount
- source_sentence: 'Construct:  Identify corresponding angles.


    Question:  M  and  N  are the intersections of the line  X Y  with the lines  P Q  and  R S .

    Which angle is corresponding to angle QMY? A pair of parallel lines pointing up to the left. PQ and RS are the ends of
    the parallel lines. PQ is on the left of the diagram with Q being the top left.

    A red straight line, XY, crosses the parallel lines. X is on the left of the diagram.

    Line XY crosses line PQ at a point marked M.

    Line XY crosses line RS at a point marked N.

    The angle QMY is marked in red.


    Options:

    A. XMP

    B. SNY

    C. SNX

    D. XNR


    Correct Answer: SNY


    Incorrect Answer: XNR'
  sentences:
  - Confuses corresponding and alternate angles
  - Estimates shares of a ratio instead of calculating
  - Misremembers the quadratic formula
- source_sentence: 'Construct:  Factorise a quadratic expression in the form x² - c.


    Question:  Factorise this expression, if possible:

    (

    p^2-4

    ).


    Options:

    A. (p-2)(p+2)

    B. p(p-2)

    C. (p-2)(p-2)

    D. Does not

    factorise


    Correct Answer: (p-2)(p+2)


    Incorrect Answer: p(p-2)'
  sentences:
  - Mixes up greater than and less than symbols
  - Does not know how to find the length of a line segment from coordinates
  - Does not recognise difference of two squares
- source_sentence: 'Construct:  Solve quadratic equations using the quadratic formula where the coefficient of x² is not 1.


    Question:  Vera wants to solve this equation using the quadratic formula.

    (

    3 h^2-10 h+4=0

    )


    What should replace the circle?  (? pm square root of (?-?) / bigcirc).


    Options:

    A. 3

    B. 5

    C. 9

    D. 6


    Correct Answer: 6


    Incorrect Answer: 3'
  sentences:
  - Misremembers the quadratic formula
  - When asked for a specific term in a sequence gives the term after
  - Does not know that vertically opposite angles are equal
