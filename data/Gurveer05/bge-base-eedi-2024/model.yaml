widgetData:
- source_sentence: 'Question: Write algebraic expressions with correct algebraic convention involving powers. Simplify, if
    possible:

    (

    a^2 x a

    ).


    Options:

    A. 2 a^2

    B. 3 a

    C. a^3

    D. Does not simplify


    Answer: Does not simplify'
  sentences:
  - Does not realize we can simplify a term that involves powers
  - Does not understand how to multiply algebraic terms
  - Adds instead of multiplying when expanding bracket
- source_sentence: 'Question: Recognise other roots of numbers. 4th root of (16)=?


    Options:

    A. 64

    B. 16

    C. 4

    D. 2


    Answer: 16'
  sentences:
  - When multiplying a decimal by an integer, ignores decimal point and just multiplies the digits
  - Identifies a common multiple of two numbers when asked to consider a common multiple of three numbers
  - Does not understand the root power of 4
- source_sentence: 'Question: Recognise perpendicular lines. These two lines are ... Two lines on a graph meeting at a right
    angle.


    Options:

    A. parallelogram

    B. perpendicular

    C. parallel

    D. particular


    Answer: parallel'
  sentences:
  - Believes perpendicular is the term used to describe two lines that are parallel
  - Believes the decimal point button writes a fraction
  - Believes parallel is the term used to describe two lines at right angles
- source_sentence: "Question: Round numbers greater than 1 to one significant figure. Round this number to  1  significant\
    \ figure:\n 400099.\n\nOptions:\nA. 400000\nB. 500000\nC. 400100\nD. 400099\n\nAnswer: 400100"
  sentences:
  - Believes rounding to 1 significant figure means rounding to the nearest integer, regardless of the value of the number
  - Rounded to nearest 100 instead of 1sf
  - When asked for a specific term in a sequence gives the term after
- source_sentence: 'Question: Solve quadratic equations using the quadratic formula where the coefficient of x² is 1. Vera
    wants to solve this equation using the quadratic formula.

    (

    h^2+4=5 h

    )


    What should replace the triangle? The image shows the structure of the quadratic formula. It says plus or minus the square
    root, and the triangle is the first thing after the square root sign, with a minus sign after it.


    Options:

    A. 8

    B. -10

    C. 16

    D. 25


    Answer: -10'
  sentences:
  - Estimated when not appropriate
  - Does not realise a quadratic must be in the form ax^2+bx+c=0 to find the values for the quadratic formula
  - Mixes up squaring and multiplying by 2 or doubling
