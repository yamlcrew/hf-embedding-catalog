widgetData:
- source_sentence: 'Construct: Carry out addition problems involving two negative integers - Question: (-5)+(-2)= Answer:
    7'
  sentences:
  - Believes adding two negatives gives a positive answer
  - Changes wrong place value column when rounding
  - When reading value from graph, reads from the wrong axes.
- source_sentence: 'Construct: Subtract decimals where the numbers involved have a different number of decimal places - Question:
    4.72-3.1 What should replace the star? Answer: 4.41'
  sentences:
  - Rounds to the wrong degree of accuracy (rounds too much)
  - When solving an equation, uses the same operation rather than the inverse.
  - Hasn't lined up the place value columns when writing out the calculation
- source_sentence: 'Construct: Given information about one part, work out other parts - Question: Kate and Isaac share some
    sweets in the ratio 3: 2 Kate receives 60 sweets. How many sweets does Isaac receive? Answer: 20'
  sentences:
  - Believes multiplying a positive by a negative gives a positive answer
  - Finds one part of a ratio but doesn't multiply that by the number of parts needed
  - Does not recognise that a linear sequence must increase or decrease by same amount
- source_sentence: 'Construct: Construct a triangle using Side-Angle-Side - Question: Which combination of mathematical instruments
    has been used to construct this triangle? ![A triangle construction with one angle and two sides labelled ]() Answer:
    Protractor Compass'
  sentences:
  - Forgets you need a ruler to measure lengths
  - Multiplies by 1000 instead of 100 when converting a decimal to a percentage
  - Gets their constants and coefficients the wrong way around when writing a formula from a given situation
- source_sentence: 'Construct: Convert from weeks to hours - Question: Which one of the following calculations would work
    out the number of hours in 5 weeks? Answer: 5 × 5 × 24'
  sentences:
  - Thinks there are 5 days in a week
  - Mistakes unit of speed for unit of time
  - Believes multiplying two negatives gives a negative answer
