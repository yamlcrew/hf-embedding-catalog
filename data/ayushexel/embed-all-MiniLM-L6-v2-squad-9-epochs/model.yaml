- source_sentence: What was issued to halt the use of higher currency denomations?
  sentences:
  - The various Germanic states in the west all had coinages that imitated existing Roman and Byzantine forms. Gold continued
    to be minted until the end of the 7th century, when it was replaced by silver coins. The basic Frankish silver coin was
    the denarius or denier, while the Anglo-Saxon version was called a penny. From these areas, the denier or penny spread
    throughout Europe during the centuries from 700 to 1000. Copper or bronze coins were not struck, nor were gold except
    in Southern Europe. No silver coins denominated in multiple units were minted.
  - Currently printed denominations are $1, $2, $5, $10, $20, $50, and $100. Notes above the $100 denomination stopped being
    printed in 1946 and were officially withdrawn from circulation in 1969. These notes were used primarily in inter-bank
    transactions or by organized crime; it was the latter usage that prompted President Richard Nixon to issue an executive
    order in 1969 halting their use. With the advent of electronic banking, they became less necessary. Notes in denominations
    of $500, $1,000, $5,000, $10,000 and $100,000 were all produced at one time; see large denomination bills in U.S. currency
    for details. These notes are now collectors' items and are worth more than their face value to collectors.
  - The primary motivation for migration appears to be food; for example, some hummingbirds choose not to migrate if fed through
    the winter. Also, the longer days of the northern summer provide extended time for breeding birds to feed their young.
    This helps diurnal birds to produce larger clutches than related non-migratory species that remain in the tropics. As
    the days shorten in autumn, the birds return to warmer regions where the available food supply varies little with the
    season.
- source_sentence: How often are elections held for the City Parliament?
  sentences:
  - Sassou also won the following presidential election in July 2009. According to the Congolese Observatory of Human Rights,
    a non-governmental organization, the election was marked by "very low" turnout and "fraud and irregularities".
  - The sessions of the City Parliament are public. Unlike members of the City Council, members of the City Parliament are
    not politicians by profession, and they are paid a fee based on their attendance. Any resident of Bern allowed to vote
    can be elected as a member of the City Parliament. The parliament holds its meetings in the Stadthaus (Town Hall).
  - 'The City Parliament (de: Stadtrat, fr: Conseil de ville) holds legislative power. It is made up of 80 members, with elections
    held every four years. The City Parliament decrees regulations and by-laws that are executed by the City Council and the
    administration. The delegates are selected by means of a system of proportional representation.'
- source_sentence: What was the name of the Mexican general who attacked an American city in New Mexico?
  sentences:
  - However, the NSA's report was completely disproved by Croatian experts. The report failed to recognize that Tito was a
    native speaker of the very distinctive local Kajkavian dialect of Zagorje. The acute accent, present only in Croatian
    dialects, which Tito is perfectly pronouncing, is the strongest proof of Tito's belonging to Kajkavian dialect.
  - The Mexican Revolution involved a civil war with hundreds of thousands of deaths and large numbers fleeing combat zones.
    Tens of thousands fled to the U.S. President Wilson sent U.S. forces to occupy the Mexican city of Veracruz for six months
    in 1914. It was designed to show the U.S. was keenly interested in the civil war and would not tolerate attacks on Americans,
    especially the April 9, 1914, "Tampico Affair", which involved the arrest of American sailors by soldiers of the regime
    of Mexican President Victoriano Huerta. In early 1916 Pancho Villa a Mexican general ordered 500 soldiers on a murderous
    raid on the American city of Columbus New Mexico, with the goal of robbing banks to fund his army. The German Secret Service
    encouraged Pancho Villa in his attacks to involve the United States in an intervention in Mexico which would distract
    the United States from its growing involvement in the war and divert aid from Europe to support the intervention. Wilson
    called up the state militias (National Guard) and sent them and the U.S. Army under General John J. Pershing to punish
    Villa in the Pancho Villa Expedition. Villa fled, with the Americans in pursuit deep into Mexico, thereby arousing Mexican
    nationalism. By early 1917 President Venustiano Carranza had contained Villa and secured the border, so Wilson ordered
    Pershing to withdraw.
  - The Battle for Mexico City was the series of engagements from September 8 to September 15, 1847, in the general vicinity
    of Mexico City during the Mexican–American War. Included are major actions at the battles of Molino del Rey and Chapultepec,
    culminating with the fall of Mexico City. The U.S. Army under Winfield Scott scored a major success that ended the war.
    The American invasion into the Federal District was first resisted during the Battle of Churubusco on August 8 where the
    Saint Patrick's Battalion, which was composed primarily of Catholic Irish and German immigrants, but also Canadians, English,
    French, Italians, Poles, Scots, Spaniards, Swiss, and Mexican people, fought for the Mexican cause repelling the American
    attacks. After defeating the Saint Patrick's Battalion, the Mexican–American War came to a close after the United States
    deployed combat units deep into Mexico resulting in the capture of Mexico City and Veracruz by the U.S. Army's 1st, 2nd,
    3rd and 4th Divisions. The invasion culminated with the storming of Chapultepec Castle in the city itself.
- source_sentence: Keith Richards is the guitarist of what band?
  sentences:
  - Blues rock acts that pioneered the sound included Cream, The Jimi Hendrix Experience, and The Jeff Beck Group. Cream,
    in songs like "I Feel Free" (1966) combined blues rock with pop and psychedelia, particularly in the riffs and guitar
    solos of Eric Clapton. Jimi Hendrix produced a form of blues-influenced psychedelic rock, which combined elements of jazz,
    blues and rock and roll. From 1967 Jeff Beck brought lead guitar to new heights of technical virtuosity and moved blues
    rock in the direction of heavy rock with his band, The Jeff Beck Group. Dave Davies of The Kinks, Keith Richards of The
    Rolling Stones, Pete Townshend of The Who, Hendrix, Clapton and Beck all pioneered the use of new guitar effects like
    phasing, feedback and distortion. The Beatles began producing songs in the new hard rock style beginning with the White
    Album in 1968 and, with the track "Helter Skelter", attempted to create a greater level of noise than the Who. Stephen
    Thomas Erlewine of AllMusic has described the "proto-metal roar" of "Helter Skelter," while Ian MacDonald argued that
    "their attempts at emulating the heavy style were without exception embarrassing."
  - 'Beyoncé has won 20 Grammy Awards, both as a solo artist and member of Destiny''s Child, making her the second most honored
    female artist by the Grammys, behind Alison Krauss and the most nominated woman in Grammy Award history with 52 nominations.
    "Single Ladies (Put a Ring on It)" won Song of the Year in 2010 while "Say My Name" and "Crazy in Love" had previously
    won Best R&B Song. Dangerously in Love, B''Day and I Am... Sasha Fierce have all won Best Contemporary R&B Album. Beyoncé
    set the record for the most Grammy awards won by a female artist in one night in 2010 when she won six awards, breaking
    the tie she previously held with Alicia Keys, Norah Jones, Alison Krauss, and Amy Winehouse, with Adele equaling this
    in 2012. Following her role in Dreamgirls she was nominated for Best Original Song for "Listen" and Best Actress at the
    Golden Globe Awards, and Outstanding Actress in a Motion Picture at the NAACP Image Awards. Beyoncé won two awards at
    the Broadcast Film Critics Association Awards 2006; Best Song for "Listen" and Best Original Soundtrack for Dreamgirls:
    Music from the Motion Picture.'
  - Blues rock acts that pioneered the sound included Cream, The Jimi Hendrix Experience, and The Jeff Beck Group. Cream,
    in songs like "I Feel Free" (1966) combined blues rock with pop and psychedelia, particularly in the riffs and guitar
    solos of Eric Clapton. Jimi Hendrix produced a form of blues-influenced psychedelic rock, which combined elements of jazz,
