widgetData:
- source_sentence: What is the the first satellite for the BeiDou-2 system called?
  sentences:
  - The first satellite, BeiDou-1A, was launched on 30 October 2000, followed by BeiDou-1B on 20 December 2000. The third
    satellite, BeiDou-1C (a backup satellite), was put into orbit on 25 May 2003. The successful launch of BeiDou-1C also
    meant the establishment of the BeiDou-1 navigation system.
  - In April 2007, the first satellite of BeiDou-2, namely Compass-M1 (to validate frequencies for the BeiDou-2 constellation)
    was successfully put into its working orbit. The second BeiDou-2 constellation satellite Compass-G2 was launched on 15
    April 2009. On 15 January 2010, the official website of the BeiDou Navigation Satellite System went online, and the system's
    third satellite (Compass-G1) was carried into its orbit by a Long March 3C rocket on 17 January 2010. On 2 June 2010,
    the fourth satellite was launched successfully into orbit. The fifth orbiter was launched into space from Xichang Satellite
    Launch Center by an LM-3I carrier rocket on 1 August 2010. Three months later, on 1 November 2010, the sixth satellite
    was sent into orbit by LM-3C. Another satellite, the Beidou-2/Compass IGSO-5 (fifth inclined geosynchonous orbit) satellite,
    was launched from the Xichang Satellite Launch Center by a Long March-3A on 1 December 2011 (UTC).
  - After years of high increase, the unemployment in Portugal has been in a continuous falling trend since the third quarter
    of 2014, decreasing from a peak of 17.7% achieved in the early 2013 to a rate of 11.9% in the second quarter of 2015.
    However, it is high still high compared with what was the normal average Portuguese unemployment rate in the past. In
    the second quarter of 2008 the unemployment rate was 7.3%, but the rate immediately rose the following period. By December
    2009, unemployment had surpassed the 10% mark nationwide in the wake of worldwide events, by 2010, the rate was around
    11% and in 2011 it was above 12%.[citation needed] The first quarter of 2013 signified a new unemployment rate record
    for Portugal, as it reached 17.7%— up from 17% in the previous quarter — and the Government has predicted an 18.5% unemployment
    rate in 2014. However, in the third quarter of the same year, it has surprisingly declined to a rate of 15.6%. From then
    on, the unemployment downtrend continued, declining to 13.9% in the second semester of 2014 and to 11.9% in the second
    quarter of 2015.
- source_sentence: What architect continued work on the abbey?
  sentences:
  - Higher education systems, that are influenced by the French education system set at the end of the 18th century, use a
    terminology derived by reference to the French École polytechnique. Such terms include Écoles Polytechniques (Algeria,
    Belgium, Canada, France, Switzerland, Tunisia), Escola Politécnica (Brasil, Spain), Polytechnicum (Eastern Europe).
  - A project that is proceeding is the creation of The Queen's Diamond Jubilee Galleries in the medieval triforium of the
    abbey. The aim is to create a new display area for the abbey's treasures in the galleries high up around the abbey's nave.
    To this end a new Gothic access tower with lift has been designed by the abbey architect and Surveyor of the Fabric, Ptolemy
    Dean. It is planned that the new galleries will open in 2018.
  - The abbey became the coronation site of Norman kings. None were buried there until Henry III, intensely devoted to the
    cult of the Confessor, rebuilt the abbey in Anglo-French Gothic style as a shrine to venerate King Edward the Confessor
    and as a suitably regal setting for Henry's own tomb, under the highest Gothic nave in England. The Confessor's shrine
    subsequently played a great part in his canonisation. The work continued between 1245 and 1517 and was largely finished
    by the architect Henry Yevele in the reign of Richard II. Henry III also commissioned unique Cosmati pavement in front
    of the High Altar (the pavement has recently undergone a major cleaning and conservation programme and was re-dedicated
    by the Dean at a service on 21 May 2010).
- source_sentence: In what region did the Japanese attempt to build up their power after 1868?
  sentences:
  - 'Mining was important in Thuringia since the later Middle Ages, especially within the mining towns of the Thuringian Forest
    such as Schmalkalden, Suhl and Ilmenau. Following the industrial revolution, the old iron, copper and silver mines declined
    because the competition from imported metal was too strong. On the other hand, the late 19th century brought new types
    of mines to Thuringia: the lignite surface mining around Meuselwitz near Altenburg in the east of the Land started in
    the 1870s, and two potash mining districts were established around 1900. These are the Südharzrevier in the north of the
    state, between Bischofferode in the west and Roßleben in the east with Sondershausen at its centre, and the Werrarevier
    on the Hessian border around Vacha and Bad Salzungen in the west. Together, they accounted for a significant part of the
    world''s potash production in the mid-20th century. After the reunification, the Südharzrevier was abandoned, whereas
    K+S took over the mines in the Werrarevier. Between 1950 and 1990, uranium mining was also important to cover the Soviet
    Union''s need for this metal. The centre was Ronneburg near Gera in eastern Thuringia and the operating company Wismut
    was under direct Soviet control.'
  - Under German control, and even before then, Japanese traders and fishermen from time to time visited the Marshall Islands,
    although contact with the islanders was irregular. After the Meiji Restoration (1868), the Japanese government adopted
    a policy of turning the Japanese Empire into a great economic and military power in East Asia.
  - Under German control, and even before then, Japanese traders and fishermen from time to time visited the Marshall Islands,
    although contact with the islanders was irregular. After the Meiji Restoration (1868), the Japanese government adopted
    a policy of turning the Japanese Empire into a great economic and military power in East Asia.
- source_sentence: What state was the Dell plant that received $280 million but was later closed?
  sentences:
  - Assembly of desktop computers for the North American market formerly took place at Dell plants in Austin, Texas (original
    location) and Lebanon, Tennessee (opened in 1999), which have been closed in 2008 and early 2009, respectively. The plant
    in Winston-Salem, North Carolina received $280 million USD in incentives from the state and opened in 2005, but ceased
    operations in November 2010, and Dell's contract with the state requires them to repay the incentives for failing to meet
    the conditions. Most of the work that used to take place in Dell's U.S. plants was transferred to contract manufacturers
    in Asia and Mexico, or some of Dell's own factories overseas. The Miami, Florida facility of its Alienware subsidiary
    remains in operation, while Dell continues to produce its servers (its most profitable products) in Austin, Texas.
  - 'The pagan Slavic populations were Christianized between the 6th and 10th centuries. Orthodox Christianity is predominant
    in the East and South Slavs, while Roman Catholicism is predominant in West Slavs and the western South Slavs. The religious
    borders are largely comparable to the East–West Schism which began in the 11th century. The majority of contemporary Slavic
    populations who profess a religion are Orthodox, followed by Catholic, while a small minority are Protestant. There are
    minor Slavic Muslim groups. Religious delineations by nationality can be very sharp; usually in the Slavic ethnic groups
    the vast majority of religious people share the same religion. Some Slavs are atheist or agnostic: only 19% of Czechs
    professed belief in god/s in the 2005 Eurobarometer survey.'
  - By the late 2000s, Dell's "configure to order" approach of manufacturing—delivering individual PCs configured to customer
    specifications from its US facilities was no longer as efficient or competitive with high-volume Asian contract manufacturers
    as PCs became powerful low-cost commodities. Dell closed plants that produced desktop computers for the North American
    market, including the Mort Topfer Manufacturing Center in Austin, Texas (original location) and Lebanon, Tennessee (opened
    in 1999) in 2008 and early 2009, respectively. The desktop production plant in Winston-Salem, North Carolina, received
    US$280 million in incentives from the state and opened in 2005, but ceased operations in November 2010. Dell's contract
    with the state required them to repay the incentives for failing to meet the conditions, and they sold the North Carolina
    plant to Herbalife. Most of the work that used to take place in Dell's U.S. plants was transferred to contract manufacturers
    in Asia and Mexico, or some of Dell's own factories overseas. The Miami, Florida, facility of its Alienware subsidiary
    remains in operation, while Dell continues to produce its servers (its most profitable products) in Austin, Texas. On
    January 8, 2009, Dell announced the closure of its manufacturing plant in Limerick, Ireland, with the loss of 1,900 jobs
    and the transfer of production to its plant in Łodź in Poland.
- source_sentence: 'What is a WISP? '
  sentences:
  - He also introduced the notion of a 'Universal Machine' (now known as a Universal Turing machine), with the idea that such
    a machine could perform the tasks of any other machine, or in other words, it is provably capable of computing anything
    that is computable by executing a program stored on tape, allowing the machine to be programmable. Von Neumann acknowledged
    that the central concept of the modern computer was due to this paper. Turing machines are to this day a central object
    of study in theory of computation. Except for the limitations imposed by their finite memory stores, modern computers
    are said to be Turing-complete, which is to say, they have algorithm execution capability equivalent to a universal Turing
    machine.
  - A wireless Internet service provider (WISP) is an Internet service provider with a network based on wireless networking.
    Technology may include commonplace Wi-Fi wireless mesh networking, or proprietary equipment designed to operate over open
    900 MHz, 2.4 GHz, 4.9, 5.2, 5.4, 5.7, and 5.8 GHz bands or licensed frequencies such as 2.5 GHz (EBS/BRS), 3.65 GHz (NN)
    and in the UHF band (including the MMDS frequency band) and LMDS.[citation needed]
  - A wireless Internet service provider (WISP) is an Internet service provider with a network based on wireless networking.
    Technology may include commonplace Wi-Fi wireless mesh networking, or proprietary equipment designed to operate over open
    900 MHz, 2.4 GHz, 4.9, 5.2, 5.4, 5.7, and 5.8 GHz bands or licensed frequencies such as 2.5 GHz (EBS/BRS), 3.65 GHz (NN)
    and in the UHF band (including the MMDS frequency band) and LMDS.[citation needed]
