- source_sentence: Whose troops threatened reprisals in Valencia?
  sentences:
  - Victoria was pleased when Gladstone resigned in 1885 after his budget was defeated. She thought his government was "the
    worst I have ever had", and blamed him for the death of General Gordon at Khartoum. Gladstone was replaced by Lord Salisbury.
    Salisbury's government only lasted a few months, however, and Victoria was forced to recall Gladstone, whom she referred
    to as a "half crazy & really in many ways ridiculous old man". Gladstone attempted to pass a bill granting Ireland home
    rule, but to Victoria's glee it was defeated. In the ensuing election, Gladstone's party lost to Salisbury's and the government
    switched hands again.
  - During the regency of Maria Cristina, Espartero ruled Spain for two years as its 18th Prime Minister from 16 September
    1840 to 21 May 1841. Under his progressive government the old regime was tenuously reconciled to his liberal policies.
    During this period of upheaval in the provinces he declared that all the estates of the Church, its congregations, and
    its religious orders were national property—though in Valencia, most of this property was subsequently acquired by the
    local bourgeoisie. City life in Valencia carried on in a revolutionary climate, with frequent clashes between liberals
    and republicans, and the constant threat of reprisals by the Carlist troops of General Cabrera.
  - Despite the position of the official organizations, an opinion poll carried out between 2001 and 2004 showed that the
    majority of the Valencian people consider Valencian different from Catalan. This position is promoted by people who do
    not use Valencian regularly. Furthermore, the data indicates that younger generations educated in Valencian are much less
    likely to hold these views. A minority of Valencian scholars active in fields other than linguistics defends the position
    of the Royal Academy of Valencian Culture (Acadèmia de Cultura Valenciana, RACV), which uses for Valencian a standard
    independent from Catalan.
- source_sentence: During which years was the Portuguese Colonial War fought?
  sentences:
  - Portugal lost much of its wealth and status with the destruction of Lisbon in a 1755 earthquake, occupation during the
    Napoleonic Wars, and the independence of Brazil, its wealthiest colony, in 1822. After the 1910 revolution deposed the
    monarchy, the democratic but unstable Portuguese First Republic was established, later being superseded by the "Estado
    Novo" right-wing authoritarian regime. Democracy was restored after the Portuguese Colonial War and the Carnation Revolution
    in 1974. Shortly after, independence was granted to all its colonies, with the exception of Macau, which was handed over
    to China in 1999. This marked the end of the longest-lived European colonial empire, leaving a profound cultural and architectural
    influence across the globe and a legacy of over 250 million Portuguese speakers today.
  - The first successful light bulb filaments were made of carbon (from carbonized paper or bamboo). Early carbon filaments
    had a negative temperature coefficient of resistance — as they got hotter, their electrical resistance decreased. This
    made the lamp sensitive to fluctuations in the power supply, since a small increase of voltage would cause the filament
    to heat up, reducing its resistance and causing it to draw even more power and heat even further. In the "flashing" process,
    carbon filaments were heated by current passing through them while in an evacuated vessel containing hydrocarbon vapor
    (usually gasoline). The carbon deposited on the filament by this treatment improved the uniformity and strength of filaments
    as well as their efficiency. A metallized or "graphitized" filament was first heated in a high-temperature oven before
    flashing and lamp assembly. This transformed the carbon into graphite which further strengthened and smoothed the filament.
    This also changed the filament to have a positive temperature coefficient, like a metallic conductor, and helped stabilize
    the lamp's power consumption, temperature and light output against minor variations in supply voltage.
  - 'In the 20th century, Portugal engaged in two major conflicts: World War I and the Portuguese Colonial War (1961–1974).
    After the end of the Portuguese Empire in 1975, the Portuguese Armed Forces have participated in peacekeeping missions
    in East Timor, Bosnia, Kosovo, Afghanistan, Somalia, Iraq (Nasiriyah) and Lebanon. Portugal also conducted several independent
    unilateral military operations abroad, as were the cases of the interventions of the Portuguese Armed Forces in Angola
    in 1992 and in Guinea-Bissau in 1998 with the main objectives of protecting and withdrawing of Portuguese and foreign
    citizens threatened by local civil conflicts.'
- source_sentence: To whom did Herschel present his work on infrared radiation?
  sentences:
  - For his second album, Late Registration (2005), he collaborated with film score composer Jon Brion and drew influence
    from non-rap influences such as English trip hop group Portishead. Blending West's primary soulful hip hop production
    with Brion's elaborate chamber pop orchestration, the album experimentally incorporated a wide array of different genres
    and prominent orchestral elements, including string arrangements, piano chords, brass flecks, and horn riffs among other
    symphonic instrumentation. It also incorporated a myriad of foreign and vintage instruments not typical in popular music,
    let alone hip hop, such as a celesta, harpsichord, Chamberlin, CS-80 analog synthesizer, Chinese bells and berimbau, vibraphones,
    and marimba. Rolling Stone described Late Registration as West claiming "the whole world of music as hip-hop turf" chronicling
    the album as "his mad quest to explode every cliché about hip-hop identity." Critic Robert Christgau wrote that "there's
    never been hip-hop so complex and subtle musically." For a period of time, Kanye West stood as the sole current pop star
    to tour with a string section, as audible on his 2006 live album Late Orchestration.
  - The discovery of infrared radiation is ascribed to William Herschel, the astronomer, in the early 19th century. Herschel
    published his results in 1800 before the Royal Society of London. Herschel used a prism to refract light from the sun
    and detected the infrared, beyond the red part of the spectrum, through an increase in the temperature recorded on a thermometer.
    He was surprised at the result and called them "Calorific Rays". The term 'Infrared' did not appear until late in the
    19th century.
  - The discovery of infrared radiation is ascribed to William Herschel, the astronomer, in the early 19th century. Herschel
    published his results in 1800 before the Royal Society of London. Herschel used a prism to refract light from the sun
    and detected the infrared, beyond the red part of the spectrum, through an increase in the temperature recorded on a thermometer.
    He was surprised at the result and called them "Calorific Rays". The term 'Infrared' did not appear until late in the
    19th century.
