- source_sentence: During the time of the North–South division, what city was the center of East Asia?
  sentences:
  - The city is bisected geographically and culturally by the North Canadian River, which basically divides North Oklahoma
    City and South Oklahoma City. The two halves of the city were actually founded and plotted as separate cities, but soon
    grew together. The north side is characterized by very diverse and fashionable urban neighborhoods near the city center
    and sprawling suburbs further north. South Oklahoma City is generally more blue collar working class and significantly
    more industrial, having grown up around the Stockyards and meat packing plants at the turn of the century, and is currently
    the center of the city's rapidly growing Latino community.
  - During the period of North–South division, Nanjing remained the capital of the Southern dynasties for more than two and
    a half centuries. During this time, Nanjing was the international hub of East Asia. Based on historical documents, the
    city had 280,000 registered households. Assuming an average Nanjing household had about 5.1 people at that time, the city
    had more than 1.4 million residents.
  - The Earth receives 174,000 terawatts (TW) of incoming solar radiation (insolation) at the upper atmosphere. Approximately
    30% is reflected back to space while the rest is absorbed by clouds, oceans and land masses. The spectrum of solar light
    at the Earth's surface is mostly spread across the visible and near-infrared ranges with a small part in the near-ultraviolet.
    Most people around the world live in areas with insolation levels of 150 to 300 watts per square meter or 3.5 to 7.0 kWh/m2
    per day.
- source_sentence: In which battle did the Dreyse needle gun gain its fame?
  sentences:
  - In a 2007 meeting with the House of Lords Select Committee on Communications, which was investigating media ownership
    and the news, Murdoch stated that the law and the independent board prevented him from exercising editorial control.
  - The army was still equipped with the Dreyse needle gun of Battle of Königgrätz fame, which was by this time showing the
    age of its 25-year-old design. The rifle had a range of only 600 m (2,000 ft) and lacked the rubber breech seal that permitted
    aimed shots. The deficiencies of the needle gun were more than compensated for by the famous Krupp 6-pounder (3 kg) steel
    breech-loading cannons being issued to Prussian artillery batteries. Firing a contact-detonated shell, the Krupp gun had
    a longer range and a higher rate of fire than the French bronze muzzle loading cannon, which relied on faulty time fuses.
  - The army was still equipped with the Dreyse needle gun of Battle of Königgrätz fame, which was by this time showing the
