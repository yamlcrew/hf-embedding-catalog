- source_sentence: What genre of music is performed by MercyMe?
  sentences:
  - Controversy erupted when Madonna decided to adopt from Malawi again. Chifundo "Mercy" James was finally adopted in June
    2009. Madonna had known Mercy from the time she went to adopt David. Mercy's grandmother had initially protested the adoption,
    but later gave in, saying "At first I didn't want her to go but as a family we had to sit down and reach an agreement
    and we agreed that Mercy should go. The men insisted that Mercy be adopted and I won't resist anymore. I still love Mercy.
    She is my dearest." Mercy's father was still adamant saying that he could not support the adoption since he was alive.
  - Contemporary Christian music (CCM) has several subgenres, one being "Christian AC". Radio & Records, for instance, lists
    Christian AC among its format charts. There has been crossover to mainstream and hot AC formats by many of the core artists
    of the Christian AC genre, notably Amy Grant, Michael W. Smith, Kathy Troccoli, Steven Curtis Chapman, Plumb, and more
    recently, MercyMe.
  - On September 30, 1987, Foster filed an application with the United States Patent and Trademark Office to patent his invented
    sport. The patent application covered the rules of the game, specifically detailing the goalposts and rebound netting
    and their impact on gameplay. Foster's application was granted on March 27, 1990. The patent expired on September 30,
    2007.
- source_sentence: Who did Dell agree to not buy processors from?
  sentences:
  - 'The Times and The Sunday Times have had an online presence since March 1999, originally at the-times.co.uk and sunday-times.co.uk,
    and later at timesonline.co.uk. There are now two websites: thetimes.co.uk is aimed at daily readers, and the thesundaytimes.co.uk
    site at providing weekly magazine-like content. There are also iPad and Android editions of both newspapers. Since July
    2010, News UK has required readers who do not subscribe to the print edition to pay £2 per week to read The Times and
    The Sunday Times online.'
  - In the mid-1990s, Dell expanded beyond desktop computers and laptops by selling servers, starting with low-end servers.
    The major three providers of servers at the time were IBM, Hewlett Packard, and Compaq, many of which were based on proprietary
    technology, such as IBM's Power4 microprocessors or various proprietary versions of the Unix operating system. Dell's
    new PowerEdge servers did not require a major investment in proprietary technologies, as they ran Microsoft Windows NT
    on Intel chips, and could be built cheaper than its competitors. Consequently, Dell's enterprise revenues, almost nonexistent
    in 1994, accounted for 13 percent of the company's total intake by 1998. Three years later, Dell passed Compaq as the
    top provider of Intel-based servers, with 31 percent of the market. Dell's first acquisition occurred in 1999 with the
    purchase of ConvergeNet Technologies for $332 million, after Dell had failed to develop an enterprise storage system in-house;
    ConvergeNet's elegant but complex technology did not fit in with Dell's commodity-producer business model, forcing Dell
    to write down the entire value of the acquisition.
  - On August 17, 2007, Dell Inc. announced that after an internal investigation into its accounting practices it would restate
    and reduce earnings from 2003 through to the first quarter of 2007 by a total amount of between $50 million and $150 million,
    or 2 cents to 7 cents per share. The investigation, begun in November 2006, resulted from concerns raised by the U.S.
    Securities and Exchange Commission over some documents and information that Dell Inc. had submitted. It was alleged that
    Dell had not disclosed large exclusivity payments received from Intel for agreeing not to buy processors from rival manufacturer
    AMD. In 2010 Dell finally paid $100 million to settle the SEC's charges of fraud. Michael Dell and other executives also
    paid penalties and suffered other sanctions, without admitting or denying the charges.
- source_sentence: What is not present in the Catholic legal system as compared with non-religious law?
  sentences:
  - '"Hellenistic" is a modern word and a 19th-century concept; the idea of a Hellenistic period did not exist in Ancient
    Greece. Although words related in form or meaning, e.g. Hellenist (Ancient Greek: Ἑλληνιστής, Hellēnistēs), have been
    attested since ancient times, it was J. G. Droysen in the mid-19th century, who in his classic work Geschichte des Hellenismus,
    i.e. History of Hellenism, coined the term Hellenistic to refer to and define the period when Greek culture spread in
    the non-Greek world after Alexander’s conquest. Following Droysen, Hellenistic and related terms, e.g. Hellenism, have
    been widely used in various contexts; a notable such use is in Culture and Anarchy by Matthew Arnold, where Hellenism
    is used in contrast with Hebraism.'
  - 'It is a fully developed legal system, with all the necessary elements: courts, lawyers, judges, a fully articulated legal
    code principles of legal interpretation, and coercive penalties, though it lacks civilly-binding force in most secular
    jurisdictions. The academic degrees in canon law are the J.C.B. (Juris Canonici Baccalaureatus, Bachelor of Canon Law,
    normally taken as a graduate degree), J.C.L. (Juris Canonici Licentiatus, Licentiate of Canon Law) and the J.C.D. (Juris
    Canonici Doctor, Doctor of Canon Law). Because of its specialized nature, advanced degrees in civil law or theology are
    normal prerequisites for the study of canon law.'
  - The institutions and practices of canon law paralleled the legal development of much of Europe, and consequently both
    modern civil law and common law (legal system) bear the influences of canon law. Edson Luiz Sampel, a Brazilian expert
    in canon law, says that canon law is contained in the genesis of various institutes of civil law, such as the law in continental
    Europe and Latin American countries. Sampel explains that canon law has significant influence in contemporary society.
- source_sentence: What did the Celtic tribes mine?
  sentences:
  - Celtic tribes settled in Switzerland between 1000 to 1500 BC. The Raetians lived in the eastern regions, while the west
    was occupied by the Helvetii and the Allobrogi settled in the Rhone valley and in Savoy. Among the many substances Celtic
    tribes mined was salt in areas such as Salzburg in Austria where evidence of the Hallstatt culture was found by a mine
    manager in the 19th century. By the 6th century BC the La Tène culture was well established in the region, and became
    known for high quality decorated weapons and jewelry. The Celts were the most widespread of the mountain tribes—they had
    warriors that were strong, tall and fair skinned skilled with iron weapons, which gave them an advantage in warfare.
  - Pharmaceutical companies whose products are used in the three-drug cocktails for lethal injections are predominantly European,
    and they have strenuously objected to the use of their drugs for executions and taken steps to prevent their use. For
    example, Hospira, the sole American manufacturer of sodium thiopental, the critical anesthetic in the three-drug cocktail,
    announced in 2011 that it would no longer manufacture the drug for the American market, in part for ethical reasons and
    in part because its transfer of sodium thiopental manufacturing to Italy would subject it to the European Union's Torture
    Regulation, which forbids the use of any product manufactured within the Union for torture (as execution by lethal injection
    is considered by the Regulation). Since the drug manufacturers began taking these steps and the EU regulation ended the
    importation of drugs produced in Europe, the resulting shortage of execution drugs has led to or influenced decisions
    to impose moratoria in Arkansas, California, Kentucky, Louisiana, Mississippi, Montana, Nevada, North Carolina, and Tennessee.
  - Celtic tribes settled in Switzerland between 1000 to 1500 BC. The Raetians lived in the eastern regions, while the west
    was occupied by the Helvetii and the Allobrogi settled in the Rhone valley and in Savoy. Among the many substances Celtic
    tribes mined was salt in areas such as Salzburg in Austria where evidence of the Hallstatt culture was found by a mine
    manager in the 19th century. By the 6th century BC the La Tène culture was well established in the region, and became
    known for high quality decorated weapons and jewelry. The Celts were the most widespread of the mountain tribes—they had
    warriors that were strong, tall and fair skinned skilled with iron weapons, which gave them an advantage in warfare.
- source_sentence: 'When was the boundaries of the city last adjusted? '
  sentences:
  - Portugal's colonial history has long since been a cornerstone of its national identity, as has its geographic position
    at the south-western corner of Europe, looking out into the Atlantic Ocean. It was one of the last western colonial European
    powers to give up its overseas territories (among them Angola and Mozambique in 1975), turning over the administration
    of Macau to the People's Republic of China at the end of 1999. Consequently, it has both influenced and been influenced
    by cultures from former colonies or dependencies, resulting in immigration from these former territories for both economic
    and/or personal reasons. Portugal, long a country of emigration (the vast majority of Brazilians have Portuguese ancestry),
    has now become a country of net immigration, and not just from the last Indian (Portuguese until 1961), African (Portuguese
    until 1975), and Far East Asian (Portuguese until 1999) overseas territories. An estimated 800,000 Portuguese returned
    to Portugal as the country's African possessions gained independence in 1975. By 2007, Portugal had 10,617,575 inhabitants
    of whom about 332,137 were legal immigrants.
  - The Mayor and council members are elected to four-year terms. The City Council is a unicameral body consisting of 51 council
    members whose districts are defined by geographic population boundaries. Each term for the mayor and council members lasts
    four years and has a three consecutive-term limit, but can resume after a four-year break. The New York City Administrative
    Code, the New York City Rules, and the City Record are the code of local laws, compilation of regulations, and official
    journal, respectively.
  - In 1854 president Antonio López de Santa Anna enlarged the area of the Federal District almost eightfold from the original
    220 to 1,700 km2 (80 to 660 sq mi), annexing the rural and mountainous areas to secure the strategic mountain passes to
    the south and southwest to protect the city in event of a foreign invasion. (The Mexican–American War had just been fought.)
    The last changes to the limits of the Federal District were made between 1898 and 1902, reducing the area to the current
    1,479 km2 (571 sq mi) by adjusting the southern border with the state of Morelos. By that time, the total number of municipalities
    within the Federal District was twenty-two.
