widgetData:
- source_sentence: Who convinced Richard to allow John to join into England?
  sentences:
  - The political turmoil continued. John began to explore an alliance with the French king Philip II, freshly returned from
    the crusade. John hoped to acquire Normandy, Anjou and the other lands in France held by Richard in exchange for allying
    himself with Philip. John was persuaded not to pursue an alliance by his mother. Longchamp, who had left England after
    Walter's intervention, now returned, and argued that he had been wrongly removed as justiciar. John intervened, suppressing
    Longchamp's claims in return for promises of support from the royal administration, including a reaffirmation of his position
    as heir to the throne. When Richard still did not return from the crusade, John began to assert that his brother was dead
    or otherwise permanently lost. Richard had in fact been captured en route to England by the Duke of Austria and was handed
    over to Emperor Henry VI, who held him for ransom. John seized the opportunity and went to Paris, where he formed an alliance
    with Philip. He agreed to set aside his wife, Isabella of Gloucester, and marry Philip's sister, Alys, in exchange for
    Philip's support. Fighting broke out in England between forces loyal to Richard and those being gathered by John. John's
    military position was weak and he agreed to a truce; in early 1194 the king finally returned to England, and John's remaining
    forces surrendered. John retreated to Normandy, where Richard finally found him later that year. Richard declared that
    his younger brother – despite being 27 years old – was merely "a child who has had evil counsellors" and forgave him,
    but removed his lands with the exception of Ireland.
  - When John's elder brother Richard became king in September 1189, he had already declared his intention of joining the
    Third Crusade. Richard set about raising the huge sums of money required for this expedition through the sale of lands,
    titles and appointments, and attempted to ensure that he would not face a revolt while away from his empire. John was
    made Count of Mortain, was married to the wealthy Isabel of Gloucester, and was given valuable lands in Lancaster and
    the counties of Cornwall, Derby, Devon, Dorset, Nottingham and Somerset, all with the aim of buying his loyalty to Richard
    whilst the king was on crusade. Richard retained royal control of key castles in these counties, thereby preventing John
    from accumulating too much military and political power, and, for the time being, the king named the four-year-old Arthur
    of Brittany as the heir to the throne. In return, John promised not to visit England for the next three years, thereby
    in theory giving Richard adequate time to conduct a successful crusade and return from the Levant without fear of John
    seizing power. Richard left political authority in England – the post of justiciar – jointly in the hands of Bishop Hugh
    de Puiset and William Mandeville, and made William Longchamp, the Bishop of Ely, his chancellor. Mandeville immediately
    died, and Longchamp took over as joint justiciar with Puiset, which would prove to be a less than satisfactory partnership.
    Eleanor, the queen mother, convinced Richard to allow John into England in his absence.
  - In addition to Spider-Man and the Fantastic Four, Marvel began publishing further superhero titles featuring such heroes
    and antiheroes as the Hulk, Thor, Ant-Man, Iron Man, the X-Men, Daredevil, the Inhumans, Black Panther, Doctor Strange,
    Captain Marvel and the Silver Surfer, and such memorable antagonists as Doctor Doom, Magneto, Galactus, Loki, the Green
    Goblin, and Doctor Octopus, all existing in a shared reality known as the Marvel Universe, with locations that mirror
    real-life cities such as New York, Los Angeles and Chicago.
- source_sentence: The oldest brain found in a cave was from what gender of human?
  sentences:
  - Anti-aircraft warfare or counter-air defence is defined by NATO as "all measures designed to nullify or reduce the effectiveness
    of hostile air action." They include ground-and air-based weapon systems, associated sensor systems, command and control
    arrangements and passive measures (e.g. barrage balloons). It may be used to protect naval, ground, and air forces in
    any location. However, for most countries the main effort has tended to be 'homeland defence'. NATO refers to airborne
    air defence as counter-air and naval air defence as anti-aircraft warfare. Missile defence is an extension of air defence
    as are initiatives to adapt air defence to the task of intercepting any projectile in flight.
  - The oldest brain to have been discovered was in Armenia in the Areni-1 cave complex. The brain, estimated to be over 5,000
    years old, was found in the skull of a 12 to 14-year-old girl. Although the brains were shriveled, they were well preserved
    due to the climate found inside the cave.
  - The oldest brain to have been discovered was in Armenia in the Areni-1 cave complex. The brain, estimated to be over 5,000
    years old, was found in the skull of a 12 to 14-year-old girl. Although the brains were shriveled, they were well preserved
    due to the climate found inside the cave.
- source_sentence: When did Raghuram Rajan become chief economist the the International Monetary Fund?
  sentences:
  - 'During World War II, the palace was bombed nine times, the most serious and publicised of which resulted in the destruction
    of the palace chapel in 1940. Coverage of this event was played in cinemas all over the UK to show the common suffering
    of rich and poor. One bomb fell in the palace quadrangle while King George VI and Queen Elizabeth were in residence, and
    many windows were blown in and the chapel destroyed. War-time coverage of such incidents was severely restricted, however.
    The King and Queen were filmed inspecting their bombed home, the smiling Queen, as always, immaculately dressed in a hat
    and matching coat seemingly unbothered by the damage around her. It was at this time the Queen famously declared: "I''m
    glad we have been bombed. Now I can look the East End in the face". The royal family were seen as sharing their subjects''
    hardship, as The Sunday Graphic reported:'
  - Current Governor of the Reserve Bank of India Raghuram Rajan had predicted the crisis in 2005 when he became chief economist
    at the International Monetary Fund.In 2005, at a celebration honouring Alan Greenspan, who was about to retire as chairman
    of the US Federal Reserve, Rajan delivered a controversial paper that was critical of the financial sector. In that paper,
    "Has Financial Development Made the World Riskier?", Rajan "argued that disaster might loom." Rajan argued that financial
    sector managers were encouraged to "take risks that generate severe adverse consequences with small probability but, in
    return, offer generous compensation the rest of the time. These risks are known as tail risks. But perhaps the most important
    concern is whether banks will be able to provide liquidity to financial markets so that if the tail risk does materialise,
    financial positions can be unwound and losses allocated so that the consequences to the real economy are minimised."
  - Current Governor of the Reserve Bank of India Raghuram Rajan had predicted the crisis in 2005 when he became chief economist
    at the International Monetary Fund.In 2005, at a celebration honouring Alan Greenspan, who was about to retire as chairman
    of the US Federal Reserve, Rajan delivered a controversial paper that was critical of the financial sector. In that paper,
    "Has Financial Development Made the World Riskier?", Rajan "argued that disaster might loom." Rajan argued that financial
    sector managers were encouraged to "take risks that generate severe adverse consequences with small probability but, in
    return, offer generous compensation the rest of the time. These risks are known as tail risks. But perhaps the most important
    concern is whether banks will be able to provide liquidity to financial markets so that if the tail risk does materialise,
    financial positions can be unwound and losses allocated so that the consequences to the real economy are minimised."
- source_sentence: What is one way by which pesticides lose their efficacy?
  sentences:
  - 'Pesticides are often referred to according to the type of pest they control. Pesticides can also be considered as either
    biodegradable pesticides, which will be broken down by microbes and other living beings into harmless compounds, or persistent
    pesticides, which may take months or years before they are broken down: it was the persistence of DDT, for example, which
    led to its accumulation in the food chain and its killing of birds of prey at the top of the food chain. Another way to
    think about pesticides is to consider those that are chemical pesticides or are derived from a common source or production
    method.'
  - The Nazis, led by Adolf Hitler, attempted to unite all the people they claimed were "Germans" (Volksdeutsche) into one
    realm, including ethnic Germans in eastern Europe, many of whom had emigrated more than one hundred fifty years before
    and developed separate cultures in their new lands. This idea was initially welcomed by many ethnic Germans in Sudetenland,
    Austria, Poland, Danzig and western Lithuania, particularly the Germans from Klaipeda (Memel). The Swiss resisted the
    idea. They had viewed themselves as a distinctly separate nation since the Peace of Westphalia of 1648.
  - In order to reduce negative impacts, it is desirable that pesticides be degradable or at least quickly deactivated in
    the environment. Such loss of activity or toxicity of pesticides is due to both innate chemical properties of the compounds
    and environmental processes or conditions. For example, the presence of halogens within a chemical structure often slows
    down degradation in an aerobic environment. Adsorption to soil may retard pesticide movement, but also may reduce bioavailability
    to microbial degraders.
- source_sentence: What did Tom Parsons consider as the risk factor for strong future quakes?
  sentences:
  - In its early years of existence, the smooth jazz format was considered to be a form of AC, although it was mainly instrumental,
    and related a stronger resemblance to the soft AC-styled music. For many years, artists like George Benson, Kenny G and
    Dave Koz had crossover hits that were played on both smooth jazz and soft AC stations.
  - The earthquake was the worst to strike the Sichuan area in over 30 years. Following the quake, experts and the general
    public sought information on whether or not the earthquake could have been predicted in advance, and whether or not studying
    statistics related to the quake could result in better prediction of earthquakes in the future. Earthquake prediction
    is not yet established science; there was no consensus within the scientific community that earthquake "prediction" is
    possible.
  - In a United States Geological Survey (USGS) study, preliminary rupture models of the earthquake indicated displacement
    of up to 9 meters along a fault approximately 240 km long by 20 km deep. The earthquake generated deformations of the
    surface greater than 3 meters and increased the stress (and probability of occurrence of future events) at the northeastern
    and southwestern ends of the fault. On May 20, USGS seismologist Tom Parsons warned that there is "high risk" of a major
    M>7 aftershock over the next weeks or months.
