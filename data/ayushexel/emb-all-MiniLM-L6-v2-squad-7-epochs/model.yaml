- source_sentence: By which path did Portugal discover a route to India?
  sentences:
  - Portugal spearheaded European exploration of the world and the Age of Discovery. Prince Henry the Navigator, son of King
    João I, became the main sponsor and patron of this endeavour. During this period, Portugal explored the Atlantic Ocean,
    discovering several Atlantic archipelagos like the Azores, Madeira, and Cape Verde, explored the African coast, colonized
    selected areas of Africa, discovered an eastern route to India via the Cape of Good Hope, discovered Brazil, explored
    the Indian Ocean, established trading routes throughout most of southern Asia, and sent the first direct European maritime
    trade and diplomatic missions to China and Japan.
  - Portugal spearheaded European exploration of the world and the Age of Discovery. Prince Henry the Navigator, son of King
    João I, became the main sponsor and patron of this endeavour. During this period, Portugal explored the Atlantic Ocean,
    discovering several Atlantic archipelagos like the Azores, Madeira, and Cape Verde, explored the African coast, colonized
    selected areas of Africa, discovered an eastern route to India via the Cape of Good Hope, discovered Brazil, explored
    the Indian Ocean, established trading routes throughout most of southern Asia, and sent the first direct European maritime
    trade and diplomatic missions to China and Japan.
  - In Greece, copper was known by the name chalkos (χαλκός). It was an important resource for the Romans, Greeks and other
    ancient peoples. In Roman times, it was known as aes Cyprium, aes being the generic Latin term for copper alloys and Cyprium
    from Cyprus, where much copper was mined. The phrase was simplified to cuprum, hence the English copper. Aphrodite and
    Venus represented copper in mythology and alchemy, because of its lustrous beauty, its ancient use in producing mirrors,
    and its association with Cyprus, which was sacred to the goddess. The seven heavenly bodies known to the ancients were
    associated with the seven metals known in antiquity, and Venus was assigned to copper.
- source_sentence: Who was the interior architect of the Houses of Parliament?
  sentences:
  - The 1961 eruption of Queen Mary's Peak forced the evacuation of the entire population via Cape Town to England. The following
    year a Royal Society expedition went to the islands to assess the damage, and reported that the settlement of Edinburgh
    of the Seven Seas had been only marginally affected. Most families returned in 1963.
  - Remodelling of the structure began in 1762. After his accession to the throne in 1820, King George IV continued the renovation
    with the idea in mind of a small, comfortable home. While the work was in progress, in 1826, the King decided to modify
    the house into a palace with the help of his architect John Nash. Some furnishings were transferred from Carlton House,
    and others had been bought in France after the French Revolution. The external façade was designed keeping in mind the
    French neo-classical influence preferred by George IV. The cost of the renovations grew dramatically, and by 1829 the
    extravagance of Nash's designs resulted in his removal as architect. On the death of George IV in 1830, his younger brother
    King William IV hired Edward Blore to finish the work. At one stage, William considered converting the palace into the
    new Houses of Parliament, after the destruction of the Palace of Westminster by fire in 1834.
  - The Houses of Parliament in London by Sir Charles Barry with interiors by a major exponent of the early Gothic Revival,
    Augustus Welby Pugin, is an example of the Gothic revival style from its earlier period in the second quarter of the 19th
    century. Examples from the High Victorian Gothic period include George Gilbert Scott's design for the Albert Memorial
    in London, and William Butterfield's chapel at Keble College, Oxford. From the second half of the 19th century onwards
    it became more common in Britain for neo-Gothic to be used in the design of non-ecclesiastical and non-governmental buildings
    types. Gothic details even began to appear in working-class housing schemes subsidised by philanthropy, though given the
    expense, less frequently than in the design of upper and middle-class housing.
- source_sentence: Who ruled Aksum and also governed the port of Adulis?
  sentences:
  - Following their basic and advanced training at the individual-level, soldiers may choose to continue their training and
    apply for an "additional skill identifier" (ASI). The ASI allows the army to take a wide ranging MOS and focus it into
    a more specific MOS. For example, a combat medic, whose duties are to provide pre-hospital emergency treatment, may receive
    ASI training to become a cardiovascular specialist, a dialysis specialist, or even a licensed practical nurse. For commissioned
    officers, ASI training includes pre-commissioning training either at USMA, or via ROTC, or by completing OCS. After commissioning,
    officers undergo branch specific training at the Basic Officer Leaders Course, (formerly called Officer Basic Course),
    which varies in time and location according their future assignments. Further career development is available through
    the Army Correspondence Course Program.
  - The kingdom is mentioned in the Periplus of the Erythraean Sea as an important market place for ivory, which was exported
    throughout the ancient world. Aksum was at the time ruled by Zoskales, who also governed the port of Adulis. The Aksumite
    rulers facilitated trade by minting their own Aksumite currency. The state also established its hegemony over the declining
    Kingdom of Kush and regularly entered the politics of the kingdoms on the Arabian peninsula, eventually extending its
    rule over the region with the conquest of the Himyarite Kingdom.
  - The kingdom is mentioned in the Periplus of the Erythraean Sea as an important market place for ivory, which was exported
    throughout the ancient world. Aksum was at the time ruled by Zoskales, who also governed the port of Adulis. The Aksumite
