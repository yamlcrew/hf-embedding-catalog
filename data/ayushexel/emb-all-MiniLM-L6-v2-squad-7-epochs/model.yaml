- source_sentence: What cartel has been known to be in Oklahoma city?
  sentences:
  - With regards to Mexican drug cartels, Oklahoma City has traditionally been the territory of the notorious Juárez Cartel,
    but the Sinaloa Cartel has been reported as trying to establish a foothold in Oklahoma City. There are many rival gangs
    in Oklahoma City, one whose headquarters has been established in the city, the Southside Locos, traditionally known as
    Sureños.
  - Mu'awiyah introduced postal service, Abd al-Malik extended it throughout his empire, and Walid made full use of it. The
    Umayyad Caliph Abd al-Malik developed a regular postal service. Umar bin Abdul-Aziz developed it further by building caravanserais
    at stages along the Khurasan highway. Relays of horses were used for the conveyance of dispatches between the caliph and
    his agents and officials posted in the provinces. The main highways were divided into stages of 12 miles (19 km) each
    and each stage had horses, donkeys or camels ready to carry the post. Primarily the service met the needs of Government
    officials, but travellers and their important dispatches were also benefitted by the system. The postal carriages were
    also used for the swift transport of troops. They were able to carry fifty to a hundred men at a time. Under Governor
    Yusuf bin Umar, the postal department of Iraq cost 4,000,000 dirhams a year.
  - With regards to Mexican drug cartels, Oklahoma City has traditionally been the territory of the notorious Juárez Cartel,
    but the Sinaloa Cartel has been reported as trying to establish a foothold in Oklahoma City. There are many rival gangs
    in Oklahoma City, one whose headquarters has been established in the city, the Southside Locos, traditionally known as
    Sureños.
- source_sentence: What is an example of a suffix used by Old English weak verbs?
  sentences:
  - The noted Indian social activist and a retired Indian Police Service (IPS) officer Kiran Bedi refused to participate saying
    "she doesn’t want to run in the event as ‘caged woman’." On April 15, Bollywood actress Soha Ali Khan pulled out of the
    Olympic torch relay, citing “very strong personal reasons”. On April 16, a protest was organised in Delhi "against Chinese
    repression in Tibet", and was broken up by the police.
  - 'The form of the verb varies with person (first, second and third), number (singular and plural), tense (present and past),
    and mood (indicative, subjunctive and imperative). Old English also sometimes uses compound constructions to express other
    verbal aspects, the future and the passive voice; in these we see the beginnings of the compound tenses of Modern English.
    Old English verbs include strong verbs, which form the past tense by altering the root vowel, and weak verbs, which use
    a suffix such as -de. As in Modern English, and peculiar to the Germanic languages, the verbs formed two great classes:
    weak (regular), and strong (irregular). Like today, Old English had fewer strong verbs, and many of these have over time
    decayed into weak forms. Then, as now, dental suffixes indicated the past tense of the weak verbs, as in work and worked.'
  - 'The form of the verb varies with person (first, second and third), number (singular and plural), tense (present and past),
