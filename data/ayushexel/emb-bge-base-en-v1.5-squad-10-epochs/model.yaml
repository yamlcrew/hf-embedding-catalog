- source_sentence: Which military historian criticized the French system as being defective?
  sentences:
  - In addition, the Prussian military education system was superior to the French model; Prussian staff officers were trained
    to exhibit initiative and independent thinking. Indeed, this was Moltke's expectation. The French, meanwhile, suffered
    from an education and promotion system that stifled intellectual development. According to the military historian Dallas
    Irvine, the system "was almost completely effective in excluding the army's brain power from the staff and high command.
    To the resulting lack of intelligence at the top can be ascribed all the inexcusable defects of French military policy."
  - 'In 1824 the British government instructed the Governor of New South Wales Thomas Brisbane to occupy Norfolk Island as
    a place to send "the worst description of convicts". Its remoteness, previously seen as a disadvantage, was now viewed
    as an asset for the detention of recalcitrant male prisoners. The convicts detained have long been assumed to be a hardcore
    of recidivists, or ''doubly-convicted capital respites'' – that is, men transported to Australia who committed fresh colonial
    crimes for which they were sentenced to death, and were spared the gallows on condition of life at Norfolk Island. However,
    a recent study has demonstrated, utilising a database of 6,458 Norfolk Island convicts, that the reality was somewhat
    different: more than half were detained at Norfolk Island without ever receiving a colonial conviction, and only 15% had
    been reprieved from a death sentence. Furthermore, the overwhelming majority of convicts sent to Norfolk Island had committed
    non-violent property sentences, and the average length of detention was three years.'
  - In addition, the Prussian military education system was superior to the French model; Prussian staff officers were trained
    to exhibit initiative and independent thinking. Indeed, this was Moltke's expectation. The French, meanwhile, suffered
    from an education and promotion system that stifled intellectual development. According to the military historian Dallas
    Irvine, the system "was almost completely effective in excluding the army's brain power from the staff and high command.
    To the resulting lack of intelligence at the top can be ascribed all the inexcusable defects of French military policy."
- source_sentence: Why are herds of deer starting to enter residential areas in London?
  sentences:
  - 'The earliest surviving written work on the subject of architecture is De architectura, by the Roman architect Vitruvius
    in the early 1st century AD. According to Vitruvius, a good building should satisfy the three principles of firmitas,
    utilitas, venustas, commonly known by the original translation – firmness, commodity and delight. An equivalent in modern
    English would be:'
  - Herds of red and fallow deer also roam freely within much of Richmond and Bushy Park. A cull takes place each November
    and February to ensure numbers can be sustained. Epping Forest is also known for its fallow deer, which can frequently
    be seen in herds to the north of the Forest. A rare population of melanistic, black fallow deer is also maintained at
    the Deer Sanctuary near Theydon Bois. Muntjac deer, which escaped from deer parks at the turn of the twentieth century,
    are also found in the forest. While Londoners are accustomed to wildlife such as birds and foxes sharing the city, more
    recently urban deer have started becoming a regular feature, and whole herds of fallow and white-tailed deer come into
    residential areas at night to take advantage of the London's green spaces.
