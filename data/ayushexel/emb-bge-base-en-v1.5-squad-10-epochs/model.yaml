- source_sentence: With who did Chopin feel comfortable speaking of folk music with?
  sentences:
  - Some modern commentators have argued against exaggerating Chopin's primacy as a "nationalist" or "patriotic" composer.
    George Golos refers to earlier "nationalist" composers in Central Europe, including Poland's Michał Kleofas Ogiński and
    Franciszek Lessel, who utilised polonaise and mazurka forms. Barbara Milewski suggests that Chopin's experience of Polish
    music came more from "urbanised" Warsaw versions than from folk music, and that attempts (by Jachimecki and others) to
    demonstrate genuine folk music in his works are without basis. Richard Taruskin impugns Schumann's attitude toward Chopin's
    works as patronizing and comments that Chopin "felt his Polish patriotism deeply and sincerely" but consciously modelled
    his works on the tradition of Bach, Beethoven, Schubert and Field.
  - Chopin's qualities as a pianist and composer were recognized by many of his fellow musicians. Schumann named a piece for
    him in his suite Carnaval, and Chopin later dedicated his Ballade No. 2 in F major to Schumann. Elements of Chopin's music
    can be traced in many of Liszt's later works. Liszt later transcribed for piano six of Chopin's Polish songs. A less fraught
    friendship was with Alkan, with whom he discussed elements of folk music, and who was deeply affected by Chopin's death.
  - Contestants go through at least three sets of cuts. The first is a brief audition with a few other contestants in front
    of selectors which may include one of the show's producers. Although auditions can exceed 10,000 in each city, only a
    few hundred of these make it past the preliminary round of auditions. Successful contestants then sing in front of producers,
    where more may be cut. Only then can they proceed to audition in front of the judges, which is the only audition stage
    shown on television. Those selected by the judges are sent to Hollywood. Between 10–60 people in each city may make it
    to Hollywood[citation needed].
- source_sentence: What station was built in the Art Nouveau style?
  sentences:
  - Much of the scientific research in the city is done in medicine and the life sciences. New York City has the most post-graduate
    life sciences degrees awarded annually in the United States, with 127 Nobel laureates having roots in local institutions
    as of 2004; while in 2012, 43,523 licensed physicians were practicing in New York City. Major biomedical research institutions
    include Memorial Sloan–Kettering Cancer Center, Rockefeller University, SUNY Downstate Medical Center, Albert Einstein
    College of Medicine, Mount Sinai School of Medicine, and Weill Cornell Medical College, being joined by the Cornell University/Technion-Israel
    Institute of Technology venture on Roosevelt Island.
  - Beginning in the late 1950s and 1960s, architectural phenomenology emerged as an important movement in the early reaction
    against modernism, with architects like Charles Moore in the USA, Christian Norberg-Schulz in Norway, and Ernesto Nathan
    Rogers and Vittorio Gregotti in Italy, who collectively popularized an interest in a new contemporary architecture aimed
    at expanding human experience using historical buildings as models and precedents. Postmodernism produced a style that
    combined contemporary building technology and cheap materials, with the aesthetics of older pre-modern and non-modern
    styles, from high classical architecture to popular or vernacular regional building styles. Robert Venturi famously defined
    postmodern architecture as a "decorated shed" (an ordinary building which is functionally designed inside and embellished
    on the outside), and upheld it against modernist and brutalist "ducks" (buildings with unnecessarily expressive tectonic
    forms).
  - In the early 20th century Valencia was an industrialised city. The silk industry had disappeared, but there was a large
    production of hides and skins, wood, metals and foodstuffs, this last with substantial exports, particularly of wine and
    citrus. Small businesses predominated, but with the rapid mechanisation of industry larger companies were being formed.
    The best expression of this dynamic was in the regional exhibitions, including that of 1909 held next to the pedestrian
    avenue L'Albereda (Paseo de la Alameda), which depicted the progress of agriculture and industry. Among the most architecturally
    successful buildings of the era were those designed in the Art Nouveau style, such as the North Station (Gare du Nord)
    and the Central and Columbus markets.
- source_sentence: What cartel has been known to be in Oklahoma city?
  sentences:
  - Despite odds of four to one, the III Corps launched a risky attack. The French were routed and the III Corps captured
    Vionville, blocking any further escape attempts to the west. Once blocked from retreat, the French in the fortress of
