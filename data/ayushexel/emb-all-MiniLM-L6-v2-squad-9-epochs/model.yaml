- source_sentence: Which empire was the largest in history, at its height?
  sentences:
  - The British Empire comprised the dominions, colonies, protectorates, mandates and other territories ruled or administered
    by the United Kingdom. It originated with the overseas possessions and trading posts established by England between the
    late 16th and early 18th centuries. At its height, it was the largest empire in history and, for over a century, was the
    foremost global power. By 1922 the British Empire held sway over about 458 million people, one-fifth of the world's population
    at the time, and covered more than 13,000,000 sq mi (33,670,000 km2), almost a quarter of the Earth's total land area.
    As a result, its political, legal, linguistic and cultural legacy is widespread. At the peak of its power, the phrase
    "the empire on which the sun never sets" was often used to describe the British Empire, because its expanse around the
    globe meant that the sun was always shining on at least one of its territories.
  - The British Empire comprised the dominions, colonies, protectorates, mandates and other territories ruled or administered
    by the United Kingdom. It originated with the overseas possessions and trading posts established by England between the
    late 16th and early 18th centuries. At its height, it was the largest empire in history and, for over a century, was the
    foremost global power. By 1922 the British Empire held sway over about 458 million people, one-fifth of the world's population
    at the time, and covered more than 13,000,000 sq mi (33,670,000 km2), almost a quarter of the Earth's total land area.
    As a result, its political, legal, linguistic and cultural legacy is widespread. At the peak of its power, the phrase
    "the empire on which the sun never sets" was often used to describe the British Empire, because its expanse around the
    globe meant that the sun was always shining on at least one of its territories.
  - Xiamen dialect, sometimes known as Amoy, is the main dialect spoken in the Chinese city of Xiamen and its surrounding
    regions of Tong'an and Xiang'an, both of which are now included in the Greater Xiamen area. This dialect developed in
    the late Ming dynasty when Xiamen was increasingly taking over Quanzhou's position as the main port of trade in southeastern
    China. Quanzhou traders began travelling southwards to Xiamen to carry on their businesses while Zhangzhou peasants began
    traveling northwards to Xiamen in search of job opportunities. It is at this time when a need for a common language arose.
    The Quanzhou and Zhangzhou varieties are similar in many ways (as can be seen from the common place of Henan Luoyang where
    they originated), but due to differences in accents, communication can be a problem. Quanzhou businessmen considered their
    speech to be the prestige accent and considered Zhangzhou's to be a village dialect. Over the centuries, dialect leveling
    occurred and the two speeches mixed to produce the Amoy dialect.
- source_sentence: What is responsible for different dog types and breeds today?
  sentences:
  - In practice, the emphasis on strictness has resulted in the rise of "homogeneous enclaves" with other haredi Jews that
    are less likely to be threatened by assimilation and intermarriage, or even to interact with other Jews who do not share
