- source_sentence: Can a persons sexual interest change over different times in their life?
  sentences:
  - On February 20, 1863, Kansas Governor Thomas Carney signed into law a bill creating the state university in Lawrence.
    The law was conditioned upon a gift from Lawrence of a $15,000 endowment fund and a site for the university, in or near
    the town, of not less than forty acres (16 ha) of land. If Lawrence failed to meet these conditions, Emporia instead of
    Lawrence would get the university.
  - Some research suggests that "[f]or some [people] the focus of sexual interest will shift at various points through the
    life span..." "There... [was, as of 1995,] essentially no research on the longitudinal stability of sexual orientation
    over the adult life span... It [was]... still an unanswered question whether... [the] measure [of 'the complex components
    of sexual orientation as differentiated from other aspects of sexual identity at one point in time'] will predict future
    behavior or orientation. Certainly, it is... not a good predictor of past behavior and self-identity, given the developmental
    process common to most gay men and lesbians (i.e., denial of homosexual interests and heterosexual experimentation prior
    to the coming-out process)." Some studies report that "[a number of] lesbian women, and some heterosexual women as well,
    perceive choice as an important element in their sexual orientations."
  - Often, sexual orientation and sexual orientation identity are not distinguished, which can impact accurately assessing
    sexual identity and whether or not sexual orientation is able to change; sexual orientation identity can change throughout
    an individual's life, and may or may not align with biological sex, sexual behavior or actual sexual orientation. While
    the Centre for Addiction and Mental Health and American Psychiatric Association state that sexual orientation is innate,
    continuous or fixed throughout their lives for some people, but is fluid or changes over time for others, the American
    Psychological Association distinguishes between sexual orientation (an innate attraction) and sexual orientation identity
    (which may change at any point in a person's life).
- source_sentence: What policy has U.S. Government emphasized from the 1970's onward?
  sentences:
  - 'One facet of the changing attitude toward Korea and whether to get involved was Japan. Especially after the fall of China
    to the Communists, U.S. East Asian experts saw Japan as the critical counterweight to the Soviet Union and China in the
    region. While there was no United States policy that dealt with South Korea directly as a national interest, its proximity
    to Japan increased the importance of South Korea. Said Kim: "The recognition that the security of Japan required a non-hostile
    Korea led directly to President Truman''s decision to intervene... The essential point... is that the American response
    to the North Korean attack stemmed from considerations of US policy toward Japan."'
  - Nanjing is the transportation hub in eastern China and the downstream Yangtze River area. Different means of transportation
    constitute a three-dimensional transport system that includes land, water and air. As in most other Chinese cities, public
    transportation is the dominant mode of travel of the majority of the citizens. As of October 2014, Nanjing had five bridges
    and two tunnels over the Yangtze River, which are tying districts north of the river with the city centre on the south
    bank.
  - While the housing and credit bubbles were building, a series of factors caused the financial system to both expand and
    become increasingly fragile, a process called financialization. U.S. Government policy from the 1970s onward has emphasized
    deregulation to encourage business, which resulted in less oversight of activities and less disclosure of information
    about new activities undertaken by banks and other evolving financial institutions. Thus, policymakers did not immediately
    recognize the increasingly important role played by financial institutions such as investment banks and hedge funds, also
    known as the shadow banking system. Some experts believe these institutions had become as important as commercial (depository)
    banks in providing credit to the U.S. economy, but they were not subject to the same regulations.
- source_sentence: What is the extinction caused by the splitting of Pangaea called?
  sentences:
  - In 1980, when the stadium was in need of redesign to meet UEFA criteria, the club raised money by offering supporters
    the opportunity to inscribe their name on the bricks for a small fee. The idea was popular with supporters, and thousands
    of people paid the fee. Later this became the centre of controversy when media in Madrid picked up reports that one of
    the stones was inscribed with the name of long-time Real Madrid chairman and Franco supporter Santiago Bernabéu. In preparation
    for the 1992 Summer Olympics two tiers of seating were installed above the previous roofline. It has a current capacity
    of 99,354 making it the largest stadium in Europe.
  - The era began in the wake of the Permian–Triassic extinction event, the largest well-documented mass extinction in Earth's
    history, and ended with the Cretaceous–Paleogene extinction event, another mass extinction which is known for having killed
    off non-avian dinosaurs, as well as other plant and animal species. The Mesozoic was a time of significant tectonic, climate
    and evolutionary activity. The era witnessed the gradual rifting of the supercontinent Pangaea into separate landmasses
    that would eventually move into their current positions. The climate of the Mesozoic was varied, alternating between warming
    and cooling periods. Overall, however, the Earth was hotter than it is today. Non-avian dinosaurs appeared in the Late
    Triassic and became the dominant terrestrial vertebrates early in the Jurassic, occupying this position for about 135
    million years until their demise at the end of the Cretaceous. Birds first appeared in the Jurassic, having evolved from
    a branch of theropod dinosaurs. The first mammals also appeared during the Mesozoic, but would remain small—less than
    15 kg (33 lb)—until the Cenozoic.
  - The Late Jurassic spans from 163 million to 145 million years ago. The Late Jurassic featured a massive extinction of
    sauropods and Ichthyosaurs due to the separation of Pangaea into Laurasia and Gondwana in an extinction known as the Jurassic-Cretaceous
    extinction. Sea levels rose, destroying fern prairies and creating shallows in its wake. Ichthyosaurs went extinct whereas
    sauropods, as a whole, did not die out in the Jurassic; in fact, some species, like the Titanosaurus, lived up to the
    K-T extinction. The increase in sea-levels opened up the Atlantic sea way which would continue to get larger over time.
    The divided world would give opportunity for the diversification of new dinosaurs.
