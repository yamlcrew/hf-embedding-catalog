widgetData:
- source_sentence: What Israeli orchestra has been in operation for more than seventy years?
  sentences:
  - In July 2006, a Hezbollah artillery assault on Israel's northern border communities and a cross-border abduction of two
    Israeli soldiers precipitated the month-long Second Lebanon War. On 6 September 2007, the Israeli Air Force destroyed
    a nuclear reactor in Syria. In May 2008, Israel confirmed it had been discussing a peace treaty with Syria for a year,
    with Turkey as a go-between. However, at the end of the year, Israel entered another conflict as a ceasefire between Hamas
    and Israel collapsed. The Gaza War lasted three weeks and ended after Israel announced a unilateral ceasefire. Hamas announced
    its own ceasefire, with its own conditions of complete withdrawal and opening of border crossings. Despite neither the
    rocket launchings nor Israeli retaliatory strikes having completely stopped, the fragile ceasefire remained in order.
    In what Israel described as a response to more than a hundred Palestinian rocket attacks on southern Israeli cities, Israel
    began an operation in Gaza on 14 November 2012, lasting eight days. Israel started another operation in Gaza following
    an escalation of rocket attacks by Hamas in July 2014.
  - Israeli music contains musical influences from all over the world; Sephardic music, Hasidic melodies, Belly dancing music,
    Greek music, jazz, and pop rock are all part of the music scene. Among Israel's world-renowned orchestras is the Israel
    Philharmonic Orchestra, which has been in operation for over seventy years and today performs more than two hundred concerts
    each year. Israel has also produced many musicians of note, some achieving international stardom. Itzhak Perlman, Pinchas
    Zukerman and Ofra Haza are among the internationally acclaimed musicians born in Israel.[citation needed] Israel has participated
    in the Eurovision Song Contest nearly every year since 1973, winning the competition three times and hosting it twice.
    Eilat has hosted its own international music festival, the Red Sea Jazz Festival, every summer since 1987.
  - As financial assets became more and more complex, and harder and harder to value, investors were reassured by the fact
    that both the international bond rating agencies and bank regulators, who came to rely on them, accepted as valid some
    complex mathematical models which theoretically showed the risks were much smaller than they actually proved to be. George
    Soros commented that "The super-boom got out of hand when the new products became so complicated that the authorities
    could no longer calculate the risks and started relying on the risk management methods of the banks themselves. Similarly,
    the rating agencies relied on the information provided by the originators of synthetic products. It was a shocking abdication
    of responsibility."
- source_sentence: What is the Greek term for canon?
  sentences:
  - 'The earliest surviving written work on the subject of architecture is De architectura, by the Roman architect Vitruvius
    in the early 1st century AD. According to Vitruvius, a good building should satisfy the three principles of firmitas,
    utilitas, venustas, commonly known by the original translation – firmness, commodity and delight. An equivalent in modern
    English would be:'
  - 'The Greek-speaking Orthodox have collected canons and commentaries upon them in a work known as the Pēdálion (Greek:
    Πηδάλιον, "Rudder"), so named because it is meant to "steer" the Church. The Orthodox Christian tradition in general treats
    its canons more as guidelines than as laws, the bishops adjusting them to cultural and other local circumstances. Some
    Orthodox canon scholars point out that, had the Ecumenical Councils (which deliberated in Greek) meant for the canons
    to be used as laws, they would have called them nómoi/νόμοι (laws) rather than kanónes/κανόνες (rules), but almost all
    Orthodox conform to them. The dogmatic decisions of the Councils, though, are to be obeyed rather than to be treated as
    guidelines, since they are essential for the Church''s unity.'
  - 'Greek kanon / Ancient Greek: κανών, Arabic Qanun / قانون, Hebrew kaneh / קנה, "straight"; a rule, code, standard, or
    measure; the root meaning in all these languages is "reed" (cf. the Romance-language ancestors of the English word "cane").'
- source_sentence: How many students were enrolled in polytechnic schools in Malaysia in 2012?
  sentences:
  - It has pleased western historians to write of a decline of the Ottoman Empire as though a stable and uncontested polity
    of that name once existed. The borders did expand and contract but they were always dynamic and always in "question" right
    from the beginning. The Ottoman Empire was created from the lands of the former eastern Roman Empire on the occasion of
    the latter's violent demise. The last Roman emperor died fighting hand-to-hand in the streets of his capital, Constantinople,
    overwhelmed by the Ottoman military, in May, 1453. The victors inherited his remaining territory in the Balkans.
  - At present, Malaysia have developed 32 polytechnic at all over states in engineering, agriculture, commerce, hospitality
    and design courses with 60,840 students in 2009 to 87,440 students in 2012.
  - Polytechnics in Singapore provides industry oriented education equivalent to a junior college or sixth form college in
    the UK. Singapore retains a system similar but not the same as in the United Kingdom from 1970–1992, distinguishing between
    polytechnics and universities. Unlike the British Polytechnic (United Kingdom) system Singapore Polytechnics do not offer
    bachelors, masters or PhD degrees. Under this system, most Singaporean students sit for their O-Level examinations after
    a four or five years of education in secondary school, and apply for a place at either a technical school termed ITE,
    a polytechnic or a university-preparatory school (a junior college or the Millennia Institute, a centralized institute).
    Polytechnic graduates may be granted transfer credits when they apply to local and overseas universities, depending on
    the overall performance in their grades, as well as the university's policies on transfer credits. A few secondary schools
    are now offering six-year program which leads directly to university entrance.
- source_sentence: What is the Greek definition of κανὠν?
  sentences:
  - The Hellenic languages or Greek language are widely spoken in Greece and in the Greek part of Cyprus. Additionally, other
    varieties of Greek are spoken in small communities in parts of other European counties.
  - There is disagreement about the origin of the term, but general consensus that "cardinalis" from the word cardo (meaning
    'pivot' or 'hinge') was first used in late antiquity to designate a bishop or priest who was incorporated into a church
    for which he had not originally been ordained. In Rome the first persons to be called cardinals were the deacons of the
    seven regions of the city at the beginning of the 6th century, when the word began to mean “principal,” “eminent,” or
    "superior." The name was also given to the senior priest in each of the "title" churches (the parish churches) of Rome
    and to the bishops of the seven sees surrounding the city. By the 8th century the Roman cardinals constituted a privileged
    class among the Roman clergy. They took part in the administration of the church of Rome and in the papal liturgy. By
    decree of a synod of 769, only a cardinal was eligible to become pope. In 1059, during the pontificate of Nicholas II,
    cardinals were given the right to elect the pope under the Papal Bull In nomine Domini. For a time this power was assigned
    exclusively to the cardinal bishops, but the Third Lateran Council in 1179 gave back the right to the whole body of cardinals.
    Cardinals were granted the privilege of wearing the red hat by Pope Innocent IV in 1244.
  - 'The Apostolic Canons or Ecclesiastical Canons of the Same Holy Apostles is a collection of ancient ecclesiastical decrees
    (eighty-five in the Eastern, fifty in the Western Church) concerning the government and discipline of the Early Christian
    Church, incorporated with the Apostolic Constitutions which are part of the Ante-Nicene Fathers In the fourth century
    the First Council of Nicaea (325) calls canons the disciplinary measures of the Church: the term canon, κανὠν, means in
    Greek, a rule. There is a very early distinction between the rules enacted by the Church and the legislative measures
    taken by the State called leges, Latin for laws.'
- source_sentence: How is The Bahre-Nagassi translated?
  sentences:
  - Antibiotics are screened for any negative effects on humans or other mammals before approval for clinical use, and are
    usually considered safe and most are well tolerated. However, some antibiotics have been associated with a range of adverse
    side effects. Side-effects range from mild to very serious depending on the antibiotics used, the microbial organisms
    targeted, and the individual patient. Side effects may reflect the pharmacological or toxicological properties of the
    antibiotic or may involve hypersensitivity reactions or anaphylaxis. Safety profiles of newer drugs are often not as well
    established as for those that have a long history of use. Adverse effects range from fever and nausea to major allergic
    reactions, including photodermatitis and anaphylaxis. Common side-effects include diarrhea, resulting from disruption
    of the species composition in the intestinal flora, resulting, for example, in overgrowth of pathogenic bacteria, such
    as Clostridium difficile. Antibacterials can also affect the vaginal flora, and may lead to overgrowth of yeast species
    of the genus Candida in the vulvo-vaginal area. Additional side-effects can result from interaction with other drugs,
    such as elevated risk of tendon damage from administration of a quinolone antibiotic with a systemic corticosteroid. Some
    scientists have hypothesized that the indiscriminate use of antibiotics alter the host microbiota and this has been associated
    with chronic disease.
  - The Scottish traveler James Bruce reported in 1770 that Medri Bahri was a distinct political entity from Abyssinia, noting
    that the two territories were frequently in conflict. The Bahre-Nagassi ("Kings of the Sea") alternately fought with or
    against the Abyssinians and the neighbouring Muslim Adal Sultanate depending on the geopolitical circumstances. Medri
    Bahri was thus part of the Christian resistance against Imam Ahmad ibn Ibrahim al-Ghazi of Adal's forces, but later joined
    the Adalite states and the Ottoman Empire front against Abyssinia in 1572. That 16th century also marked the arrival of
    the Ottomans, who began making inroads in the Red Sea area.
  - The Scottish traveler James Bruce reported in 1770 that Medri Bahri was a distinct political entity from Abyssinia, noting
    that the two territories were frequently in conflict. The Bahre-Nagassi ("Kings of the Sea") alternately fought with or
    against the Abyssinians and the neighbouring Muslim Adal Sultanate depending on the geopolitical circumstances. Medri
