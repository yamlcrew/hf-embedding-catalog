- source_sentence: What body is responsible for managing the Community Tool Box?
  sentences:
  - The Community Tool Box is a public service of the University maintained by the Work Group for Community Health and Development.
    It is a free, online resource that contains more than 7,000 pages of practical information for promoting community health
    and development, and is a global resource for both professionals and grassroots groups engaged in the work of community
    health and development.
  - The Community Tool Box is a public service of the University maintained by the Work Group for Community Health and Development.
    It is a free, online resource that contains more than 7,000 pages of practical information for promoting community health
    and development, and is a global resource for both professionals and grassroots groups engaged in the work of community
    health and development.
  - The ISO standard ISO 12232:2006 gives digital still camera manufacturers a choice of five different techniques for determining
    the exposure index rating at each sensitivity setting provided by a particular camera model. Three of the techniques in
    ISO 12232:2006 are carried over from the 1998 version of the standard, while two new techniques allowing for measurement
    of JPEG output files are introduced from CIPA DC-004. Depending on the technique selected, the exposure index rating can
    depend on the sensor sensitivity, the sensor noise, and the appearance of the resulting image. The standard specifies
    the measurement of light sensitivity of the entire digital camera system and not of individual components such as digital
    sensors, although Kodak has reported using a variation to characterize the sensitivity of two of their sensors in 2001.
- source_sentence: 'What provoked the attack on Queen Victoria as she left Windsor? '
  sentences:
  - Somerset has 11,500 listed buildings, 523 scheduled monuments, 192 conservation areas, 41 parks and gardens including
    those at Barrington Court, Holnicote Estate, Prior Park Landscape Garden and Tintinhull Garden, 36 English Heritage sites
    and 19 National Trust sites, including Clevedon Court, Fyne Court, Montacute House and Tyntesfield as well as Stembridge
    Tower Mill, the last remaining thatched windmill in England. Other historic houses in the county which have remained in
    private ownership or used for other purposes include Halswell House and Marston Bigot. A key contribution of Somerset
    architecture is its medieval church towers. Jenkins writes, "These structures, with their buttresses, bell-opening tracery
    and crowns, rank with Nottinghamshire alabaster as England's finest contribution to medieval art."
  - At certain times of the year, The Queen Mary 2, Queen Elizabeth and Queen Victoria may all visit Southampton at the same
    time, in an event commonly called 'Arrival of the Three Queens'.
  - On 2 March 1882, Roderick Maclean, a disgruntled poet apparently offended by Victoria's refusal to accept one of his poems,
    shot at the Queen as her carriage left Windsor railway station. Two schoolboys from Eton College struck him with their
    umbrellas, until he was hustled away by a policeman. Victoria was outraged when he was found not guilty by reason of insanity,
    but was so pleased by the many expressions of loyalty after the attack that she said it was "worth being shot at—to see
    how much one is loved".
- source_sentence: What political party did the Tories have to form a coalition with in 2010?
  sentences:
  - Archaeology is the study of the human past through its material remains. Artifacts, faunal remains, and human altered
    landscapes are evidence of the cultural and material lives of past societies. Archaeologists examine these material remains
    in order to deduce patterns of past human behavior and cultural practices. Ethnoarchaeology is a type of archaeology that
    studies the practices and material remains of living human groups in order to gain a better understanding of the evidence
    left behind by past human groups, who are presumed to have lived in similar ways.
  - For the 2001 general election The Times declared its support for Tony Blair's Labour government, which was re-elected
    by a landslide. It supported Labour again in 2005, when Labour achieved a third successive win, though with a reduced
    majority. For the 2010 general election, however, the newspaper declared its support for the Tories once again; the election
    ended in the Tories taking the most votes and seats but having to form a coalition with the Liberal Democrats in order
    to form a government as they had failed to gain an overall majority.
