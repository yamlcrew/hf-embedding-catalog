- source_sentence: How many meters long is the viaduct on which 155th Street travels?
  sentences:
  - 155th Street starts on the West Side at Riverside Drive, crossing Broadway, Amsterdam Avenue and St. Nicholas Avenue.
    At St. Nicholas Place, the terrain drops off steeply, and 155th Street is carried on a 1,600-foot (490 m) long viaduct,
    a City Landmark constructed in 1893, that slopes down towards the Harlem River, continuing onto the Macombs Dam Bridge,
    crossing over (but not intersecting with) the Harlem River Drive. A separate, unconnected section of 155th Street runs
    under the viaduct, connecting Bradhurst Avenue and the Harlem River Drive.
  - Rheinmetall in Germany developed an automatic 20 mm in the 1920s and Oerlikon in Switzerland had acquired the patent to
    an automatic 20 mm gun designed in Germany during World War I. Germany introduced the rapid-fire 2 cm FlaK 30 and later
    in the decade it was redesigned by Mauser-Werke and became the 2 cm FlaK 38. Nevertheless, while 20 mm was better than
    a machine gun and mounted on a very small trailer made it easy to move, its effectiveness was limited. Germany therefore
    added a 3.7 cm. The first, the 3.7 cm FlaK 18 developed by Rheinmetall in the early 1930s, was basically an enlarged 2
    cm FlaK 30. It was introduced in 1935 and production stopped the following year. A redesigned gun 3.7 cm FlaK 36 entered
    service in 1938, it too had a two-wheel carriage. However, by the mid-1930s the Luftwaffe realised that there was still
    a coverage gap between 3.7 cm and 8.8 cm guns. They started development of a 5 cm gun on a four-wheel carriage.
  - 155th Street starts on the West Side at Riverside Drive, crossing Broadway, Amsterdam Avenue and St. Nicholas Avenue.
    At St. Nicholas Place, the terrain drops off steeply, and 155th Street is carried on a 1,600-foot (490 m) long viaduct,
    a City Landmark constructed in 1893, that slopes down towards the Harlem River, continuing onto the Macombs Dam Bridge,
    crossing over (but not intersecting with) the Harlem River Drive. A separate, unconnected section of 155th Street runs
    under the viaduct, connecting Bradhurst Avenue and the Harlem River Drive.
- source_sentence: Hokkien is usually written using what characters?
  sentences:
  - 'Buddhism /ˈbudɪzəm/ is a nontheistic religion[note 1] or philosophy (Sanskrit: धर्म dharma; Pali: धम्म dhamma) that encompasses
    a variety of traditions, beliefs and spiritual practices largely based on teachings attributed to Gautama Buddha, commonly
    known as the Buddha ("the awakened one"). According to Buddhist tradition, the Buddha lived and taught in the eastern
    part of the Indian subcontinent, present-day Nepal sometime between the 6th and 4th centuries BCE.[note 1] He is recognized
    by Buddhists as an awakened or enlightened teacher who shared his insights to help sentient beings end their suffering
    through the elimination of ignorance and craving. Buddhists believe that this is accomplished through the direct understanding
    and perception of dependent origination and the Four Noble Truths.'
  - In the 1990s, marked by the liberalization of language development and mother tongue movement in Taiwan, Taiwanese Hokkien
    had undergone a fast pace in its development. In 1993, Taiwan became the first region in the world to implement the teaching
    of Taiwanese Hokkien in Taiwanese schools. In 2001, the local Taiwanese language program was further extended to all schools
    in Taiwan, and Taiwanese Hokkien became one of the compulsory local Taiwanese languages to be learned in schools. The
    mother tongue movement in Taiwan even influenced Xiamen (Amoy) to the point that in 2010, Xiamen also began to implement
    the teaching of Hokkien dialect in its schools. In 2007, the Ministry of Education in Taiwan also completed the standardization
    of Chinese characters used for writing Hokkien and developed Tai-lo as the standard Hokkien pronunciation and romanization
    guide. A number of universities in Taiwan also offer Hokkien degree courses for training Hokkien-fluent talents to work
    for the Hokkien media industry and education. Taiwan also has its own Hokkien literary and cultural circles whereby Hokkien
    poets and writers compose poetry or literature in Hokkien on a regular basis.
  - Hokkien dialects are typically written using Chinese characters (漢字, Hàn-jī). However, the written script was and remains
    adapted to the literary form, which is based on classical Chinese, not the vernacular and spoken form. Furthermore, the
    character inventory used for Mandarin (standard written Chinese) does not correspond to Hokkien words, and there are a
    large number of informal characters (替字, thè-jī or thòe-jī; 'substitute characters') which are unique to Hokkien (as is
    the case with Cantonese). For instance, about 20 to 25% of Taiwanese morphemes lack an appropriate or standard Chinese
    character.
