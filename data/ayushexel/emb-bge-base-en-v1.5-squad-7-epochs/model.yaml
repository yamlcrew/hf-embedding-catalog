- source_sentence: The ability to store and execute lists of instructions are called what?
  sentences:
  - The Classical era, from about 1750 to 1820, established many of the norms of composition, presentation, and style, and
    was also when the piano became the predominant keyboard instrument. The basic forces required for an orchestra became
    somewhat standardized (although they would grow as the potential of a wider array of instruments was developed in the
    following centuries). Chamber music grew to include ensembles with as many as 8 to 10 performers for serenades. Opera
    continued to develop, with regional styles in Italy, France, and German-speaking lands. The opera buffa, a form of comic
    opera, rose in popularity. The symphony came into its own as a musical form, and the concerto was developed as a vehicle
    for displays of virtuoso playing skill. Orchestras no longer required a harpsichord (which had been part of the traditional
    continuo in the Baroque style), and were often led by the lead violinist (now called the concertmaster).
  - In most computers, individual instructions are stored as machine code with each instruction being given a unique number
    (its operation code or opcode for short). The command to add two numbers together would have one opcode; the command to
    multiply them would have a different opcode, and so on. The simplest computers are able to perform any of a handful of
    different instructions; the more complex computers have several hundred to choose from, each with a unique numerical code.
    Since the computer's memory is able to store numbers, it can also store the instruction codes. This leads to the important
    fact that entire programs (which are just lists of these instructions) can be represented as lists of numbers and can
    themselves be manipulated inside the computer in the same way as numeric data. The fundamental concept of storing programs
    in the computer's memory alongside the data they operate on is the crux of the von Neumann, or stored program[citation
    needed], architecture. In some cases, a computer might store some or all of its program in memory that is kept separate
    from the data it operates on. This is called the Harvard architecture after the Harvard Mark I computer. Modern von Neumann
    computers display some traits of the Harvard architecture in their designs, such as in CPU caches.
  - 'The ability to store and execute lists of instructions called programs makes computers extremely versatile, distinguishing
    them from calculators. The Church–Turing thesis is a mathematical statement of this versatility: any computer with a minimum
    capability (being Turing-complete) is, in principle, capable of performing the same tasks that any other computer can
    perform. Therefore, any type of computer (netbook, supercomputer, cellular automaton, etc.) is able to perform the same
    computational tasks, given enough time and storage capacity.'
