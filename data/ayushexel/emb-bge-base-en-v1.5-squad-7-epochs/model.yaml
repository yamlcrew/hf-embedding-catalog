- source_sentence: Do the roots and shoots need each other?
  sentences:
  - The root system and the shoot system are interdependent – the usually nonphotosynthetic root system depends on the shoot
    system for food, and the usually photosynthetic shoot system depends on water and minerals from the root system. Cells
    in each system are capable of creating cells of the other and producing adventitious shoots or roots. Stolons and tubers
    are examples of shoots that can grow roots. Roots that spread out close to the surface, such as those of willows, can
    produce shoots and ultimately new plants. In the event that one of the systems is lost, the other can often regrow it.
    In fact it is possible to grow an entire plant from a single leaf, as is the case with Saintpaulia, or even a single cell
    – which can dedifferentiate into a callus (a mass of unspecialised cells) that can grow into a new plant. In vascular
    plants, the xylem and phloem are the conductive tissues that transport resources between shoots and roots. Roots are often
    adapted to store food such as sugars or starch, as in sugar beets and carrots.
