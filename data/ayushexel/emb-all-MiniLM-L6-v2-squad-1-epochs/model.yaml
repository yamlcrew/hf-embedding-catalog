    by bringing liberal reforms to the territories that he conquered, especially the Low Countries, Switzerland, and large
    parts of modern Italy and Germany. He implemented fundamental liberal policies in France and throughout Western Europe.[note
    1] His lasting legal achievement, the Napoleonic Code, has been adopted in various forms by a quarter of the world''s
    legal systems, from Japan to Quebec.'
- source_sentence: Where do many modern day hunter-gatherers live?
  sentences:
  - Hunter-gatherers tend to have an egalitarian social ethos, although settled hunter-gatherers (for example, those inhabiting
    the Northwest Coast of North America) are an exception to this rule. Nearly all African hunter-gatherers are egalitarian,
    with women roughly as influential and powerful as men.
  - In philosophy, emotions are studied in sub-fields such as ethics, the philosophy of art (for example, sensory–emotional
    values, and matters of taste and sentimentality), and the philosophy of music (see also Music and emotion). In history,
    scholars examine documents and other sources to interpret and analyze past activities; speculation on the emotional state
    of the authors of historical documents is one of the tools of interpretation. In literature and film-making, the expression
    of emotion is the cornerstone of genres such as drama, melodrama, and romance. In communication studies, scholars study
    the role that emotion plays in the dissemination of ideas and messages. Emotion is also studied in non-human animals in
    ethology, a branch of zoology which focuses on the scientific study of animal behavior. Ethology is a combination of laboratory
    and field science, with strong ties to ecology and evolution. Ethologists often study one type of behavior (for example,
    aggression) in a number of unrelated animals.
  - Many groups continued their hunter-gatherer ways of life, although their numbers have continually declined, partly as
    a result of pressure from growing agricultural and pastoral communities. Many of them reside in the developing world,
    either in arid regions or tropical forests. Areas that were formerly available to hunter-gatherers were—and continue to
    be—encroached upon by the settlements of agriculturalists. In the resulting competition for land use, hunter-gatherer
    societies either adopted these practices or moved to other areas. In addition, Jared Diamond has blamed a decline in the
    availability of wild foods, particularly animal resources. In North and South America, for example, most large mammal
    species had gone extinct by the end of the Pleistocene—according to Diamond, because of overexploitation by humans, although
    the overkill hypothesis he advocates is strongly contested.[by whom?]
- source_sentence: What percentage of people in Chihuahua live in cities?
  sentences:
  - Dell became the first company in the information technology industry to establish a product-recycling goal (in 2004) and
    completed the implementation of its global consumer recycling-program in 2006. On February 6, 2007, the National Recycling
    Coalition awarded Dell its "Recycling Works" award for efforts to promote producer responsibility. On July 19, 2007, Dell
    announced that it had exceeded targets in working to achieve a multi-year goal of recovering 275 million pounds of computer
    equipment by 2009. The company reported the recovery of 78 million pounds (nearly 40,000 tons) of IT equipment from customers
    in 2006, a 93-percent increase over 2005; and 12.4% of the equipment Dell sold seven years earlier.
  - 'The state has one city with a population exceeding one million: Ciudad Juárez. Ciudad Juárez is ranked eighth most populous
    city in the country and Chihuahua City was ranked 16th most populous in Mexico. Chihuahua (along with Baja California)
    is the only state in Mexico to have two cities ranked in the top 20 most populated. El Paso and Ciudad Juárez comprise
    one of the largest binational metropolitan areas in the world with a combined population of 2.4 million. In fact, Ciudad
    Juárez is one of the fastest growing cities in the world in spite of the fact that it is "the most violent zone in the
    world outside of declared war zones". For instance, a few years ago the Federal Reserve Bank of Dallas published that
    in Ciudad Juárez "the average annual growth over the 10-year period 1990–2000 was 5.3 percent. Juárez experienced much
    higher population growth than the state of Chihuahua and than Mexico as a whole". Chihuahua City has one of the highest
    literacy rates in the country at 98%; 35% of the population is aged 14 or below, 60% 15-65, and 5% over 65. The growth
    rate is 2.4%. The 76.5% of the population of the state of Chihuahua live in cities which makes the state one of the most
    urbanized in Mexico.'
