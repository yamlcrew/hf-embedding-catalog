- source_sentence: What is Napoleon's legal achievement, still reaching a quarter of the world's legal systems?
  sentences:
  - 'Since the Kallikratis programme reform entered into effect on 1 January 2011, Greece has consisted of thirteen regions
    subdivided into a total of 325 municipalities. The 54 old prefectures and prefecture-level administrations have been largely
    retained as sub-units of the regions. Seven decentralized administrations group one to three regions for administrative
    purposes on a regional basis. There is also one autonomous area, Mount Athos (Greek: Agio Oros, "Holy Mountain"), which
    borders the region of Central Macedonia.'
  - 'Napoléon Bonaparte (/nəˈpoʊliən, -ˈpoʊljən/; French: [napɔleɔ̃ bɔnapaʁt], born Napoleone di Buonaparte; 15 August 1769
    – 5 May 1821) was a French military and political leader who rose to prominence during the French Revolution and led several
    successful campaigns during the Revolutionary Wars. As Napoleon I, he was Emperor of the French from 1804 until 1814,
    and again in 1815. Napoleon dominated European and global affairs for more than a decade while leading France against
    a series of coalitions in the Napoleonic Wars. He won most of these wars and the vast majority of his battles, building
    a large empire that ruled over continental Europe before its final collapse in 1815. Often considered one of the greatest
    commanders in history, his wars and campaigns are studied at military schools worldwide. He also remains one of the most
    celebrated and controversial political figures in Western history. In civil affairs, Napoleon had a major long-term impact
    by bringing liberal reforms to the territories that he conquered, especially the Low Countries, Switzerland, and large
    parts of modern Italy and Germany. He implemented fundamental liberal policies in France and throughout Western Europe.[note
    1] His lasting legal achievement, the Napoleonic Code, has been adopted in various forms by a quarter of the world''s
    legal systems, from Japan to Quebec.'
  - 'Napoléon Bonaparte (/nəˈpoʊliən, -ˈpoʊljən/; French: [napɔleɔ̃ bɔnapaʁt], born Napoleone di Buonaparte; 15 August 1769
    – 5 May 1821) was a French military and political leader who rose to prominence during the French Revolution and led several
