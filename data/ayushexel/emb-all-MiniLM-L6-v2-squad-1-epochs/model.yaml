- source_sentence: Many deaths occurred before World War II due to what?
  sentences:
  - The first half of the 20th century in Russia and the Soviet Union was marked by a succession of wars, famines and other
    disasters, each accompanied by large-scale population losses. Stephen J. Lee estimates that, by the end of World War II
    in 1945, the Russian population was about 90 million fewer than it could have been otherwise.
  - Ehrlich’s approach of systematically varying the chemical structure of synthetic compounds and measuring the effects of
    these changes on biological activity was pursued broadly by industrial scientists, including Bayer scientists Josef Klarer,
    Fritz Mietzsch, and Gerhard Domagk. This work, also based in the testing of compounds available from the German dye industry,
    led to the development of Prontosil, the first representative of the sulfonamide class of antibiotics. Compared to arsphenamine,
    the sulfonamides had a broader spectrum of activity and were far less toxic, rendering them useful for infections caused
    by pathogens such as streptococci. In 1939, Domagk received the Nobel Prize in Medicine for this discovery. Nonetheless,
    the dramatic decrease in deaths from infectious diseases that occurred prior to World War II was primarily the result
    of improved public health measures such as clean water and less crowded housing, and the impact of anti-infective drugs
    and vaccines was significant mainly after World War II.
  - In some jurisdictions, copyright or the right to enforce it can be contractually assigned to a third party which did not
    have a role in producing the work. When this outsourced litigator appears to have no intention of taking any copyright
    infringement cases to trial, but rather only takes them just far enough through the legal system to identify and exact
    settlements from suspected infringers, critics commonly refer to the party as a "copyright troll." Such practices have
    had mixed results in the U.S.
- source_sentence: Some shipping expeditions were mostly initiated by which provinces?
  sentences:
  - 'Besides the schism, the western church was riven by theological controversies, some of which turned into heresies. John
    Wycliffe (d. 1384), an English theologian, was condemned as a heretic in 1415 for teaching that the laity should have
    access to the text of the Bible as well as for holding views on the Eucharist that were contrary to church doctrine. Wycliffe''s
    teachings influenced two of the major heretical movements of the later Middle Ages: Lollardy in England and Hussitism
    in Bohemia. The Bohemian movement initiated with the teaching of Jan Hus, who was burned at the stake in 1415 after being
    condemned as a heretic by the Council of Constance. The Hussite church, although the target of a crusade, survived beyond
    the Middle Ages. Other heresies were manufactured, such as the accusations against the Knights Templar that resulted in
    their suppression in 1312 and the division of their great wealth between the French King Philip IV (r. 1285–1314) and
    the Hospitallers.'
  - The States General of the United Provinces were in control of the Dutch East India Company (VOC) and the Dutch West India
    Company (WIC), but some shipping expeditions were initiated by some of the provinces, mostly Holland and/or Zeeland.
