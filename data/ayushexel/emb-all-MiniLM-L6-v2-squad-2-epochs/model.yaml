- source_sentence: What year did Congress pass the American Recover and Reinvestment Act?
  sentences:
  - Throughout America's history dominance of one of the three branches has essentially been a see-saw struggle between Congress
    and the president. Both have had periods of great power and weakness such as immediately after the Civil War when republicans
    had a majority in Congress and were able to pass major legislation and shoot down most of the president's vetoes. They
    also passed acts to essentially make the president subordinate to Congress, such as the Tenure of Office Act. Johnson's
    later impeachment also cost the presidency much political power. However the president has also exercised greater power
    largely during the 20th century. Both Roosevelts greatly expanded the powers of the president and wielded great power
    during their terms.
  - The bursting of the U.S. (United States) housing bubble, which peaked in 2004, caused the values of securities tied to
    U.S. real estate pricing to plummet, damaging financial institutions globally. The financial crisis was triggered by a
    complex interplay of policies that encouraged home ownership, providing easier access to loans for subprime borrowers,
    overvaluation of bundled subprime mortgages based on the theory that housing prices would continue to escalate, questionable
    trading practices on behalf of both buyers and sellers, compensation structures that prioritize short-term deal flow over
    long-term value creation, and a lack of adequate capital holdings from banks and insurance companies to back the financial
    commitments they were making. Questions regarding bank solvency, declines in credit availability and damaged investor
    confidence had an impact on global stock markets, where securities suffered large losses during 2008 and early 2009. Economies
    worldwide slowed during this period, as credit tightened and international trade declined. Governments and central banks
    responded with unprecedented fiscal stimulus, monetary policy expansion and institutional bailouts. In the U.S., Congress
    passed the American Recovery and Reinvestment Act of 2009.
  - Yale University, one of the oldest universities in the United States, is a cultural referent as an institution that produces
    some of the most elite members of society and its grounds, alumni, and students have been prominently portrayed in fiction
    and U.S. popular culture. For example, Owen Johnson's novel, Stover at Yale, follows the college career of Dink Stover
    and Frank Merriwell, the model for all later juvenile sports fiction, plays football, baseball, crew, and track at Yale
    while solving mysteries and righting wrongs. Yale University also is featured in F. Scott Fitzgerald's novel "The Great
    Gatsby". The narrator, Nick Carraway, wrote a series of editorials for the Yale News, and Tom Buchanan was "one of the
    most powerful ends that ever played football" for Yale.
- source_sentence: What new venture did Marvel's founder begin after leaving the company in the 1970s?
  sentences:
  - The law of the United States comprises many levels of codified and uncodified forms of law, of which the most important
    is the United States Constitution, the foundation of the federal government of the United States. The Constitution sets
    out the boundaries of federal law, which consists of acts of Congress, treaties ratified by the Senate, regulations promulgated
    by the executive branch, and case law originating from the federal judiciary. The United States Code is the official compilation
    and codification of general and permanent federal statutory law.
  - 'With the new millennium, Marvel Comics emerged from bankruptcy and again began diversifying its offerings. In 2001, Marvel
    withdrew from the Comics Code Authority and established its own Marvel Rating System for comics. The first title from
    this era to not have the code was X-Force #119 (October 2001). Marvel also created new imprints, such as MAX (an explicit-content
    line) and Marvel Adventures (developed for child audiences). In addition, the company created an alternate universe imprint,
    Ultimate Marvel, that allowed the company to reboot its major titles by revising and updating its characters to introduce
    to a new generation.'
  - Goodman, now disconnected from Marvel, set up a new company called Seaboard Periodicals in 1974, reviving Marvel's old
    Atlas name for a new Atlas Comics line, but this lasted only a year and a half. In the mid-1970s a decline of the newsstand
    distribution network affected Marvel. Cult hits such as Howard the Duck fell victim to the distribution problems, with
    some titles reporting low sales when in fact the first specialty comic book stores resold them at a later date.[citation
    needed] But by the end of the decade, Marvel's fortunes were reviving, thanks to the rise of direct market distribution—selling
    through those same comics-specialty stores instead of newsstands.
- source_sentence: What was Mariah Careys position on season 12 of American Idol?
  sentences:
  - It was announced on December 12, 2012, that the AFL reached a partnership agreement with NET10 Wireless to be the first
    non-motorsports-related professional sports league in the United States to have a title sponsor, renaming it the NET10
    Wireless Arena Football League. The redesigned website showed the new logo which incorporated the current AFL logo with
    the one from NET10 Wireless. The title sponsorship agreement ended in 2014 after a two-year partnership.
  - Season 12 premiered on January 16, 2013. Judges Jennifer Lopez and Steven Tyler left the show after two seasons. This
    season's judging panel consisted of Randy Jackson, along with Mariah Carey, Keith Urban and Nicki Minaj. This was the
    first season since season nine to have four judges on the panel. The pre-season buzz and the early episodes of the show
    were dominated by the feud between the judges Minaj and Carey after a video of their dispute was leaked to TMZ.
  - Season 12 premiered on January 16, 2013. Judges Jennifer Lopez and Steven Tyler left the show after two seasons. This
    season's judging panel consisted of Randy Jackson, along with Mariah Carey, Keith Urban and Nicki Minaj. This was the
    first season since season nine to have four judges on the panel. The pre-season buzz and the early episodes of the show
    were dominated by the feud between the judges Minaj and Carey after a video of their dispute was leaked to TMZ.
- source_sentence: Who composed the song "Karneval in Paris"?
  sentences:
  - In Norway, students having seen celebrations in Paris introduced Carnival processions, masked balls and Carnival balls
    to Christiana in the 1840s and 1850s. From 1863, the artist federation kunstnerforeningen held annual Carnival balls in
    the old Freemasons lodge, which inspired Johan Svendsens compositions "Norsk Kunstnerkarneval" and "Karneval in Paris".
    The following year, Svendsens Festpolonaise was written for the opening procession. Edvard Grieg attended and wrote "aus
    dem Karneval" (folkelivsbilleder Op. 19). Since 1988, the student organization Tårnseilerne has produced annual masquerade
    balls in Oslo, with masks, costumes and processions after attending an opera performance. The Carnival season also includes
    Fastelavens søndag (with cream buns) and fastelavensris with decorated branches.
  - Jantar Mantar located in Connaught Place was built by Maharaja Jai Singh II of Jaipur. It consists of 13 architectural
    astronomy instruments. The primary purpose of the observatory was to compile astronomical tables, and to predict the times
    and movements of the sun, moon and planets.
  - In Norway, students having seen celebrations in Paris introduced Carnival processions, masked balls and Carnival balls
    to Christiana in the 1840s and 1850s. From 1863, the artist federation kunstnerforeningen held annual Carnival balls in
    the old Freemasons lodge, which inspired Johan Svendsens compositions "Norsk Kunstnerkarneval" and "Karneval in Paris".
    The following year, Svendsens Festpolonaise was written for the opening procession. Edvard Grieg attended and wrote "aus
    dem Karneval" (folkelivsbilleder Op. 19). Since 1988, the student organization Tårnseilerne has produced annual masquerade
    balls in Oslo, with masks, costumes and processions after attending an opera performance. The Carnival season also includes
    Fastelavens søndag (with cream buns) and fastelavensris with decorated branches.
- source_sentence: In what year did CBS sell CBS Songs?
  sentences:
  - The expression "bitumen" originated in the Sanskrit, where we find the words jatu, meaning "pitch," and jatu-krit, meaning
    "pitch creating", "pitch producing" (referring to coniferous or resinous trees). The Latin equivalent is claimed by some
    to be originally gwitu-men (pertaining to pitch), and by others, pixtumens (exuding or bubbling pitch), which was subsequently
    shortened to bitumen, thence passing via French into English. From the same root is derived the Anglo Saxon word cwidu
    (mastix), the German word Kitt (cement or mastic) and the old Norse word kvada.
  - On November 17, 1987, SCA acquired CBS Records, which hosted such acts as Michael Jackson, for US$2 billion. CBS Inc.,
    now CBS Corporation, retained the rights to the CBS name for music recordings but granted Sony a temporary license to
    use the CBS name. CBS Corporation founded a new CBS Records in 2006, which is distributed by Sony through its RED subsidiary.
  - In 1986, CBS sold its music publishing arm, CBS Songs, to Stephen Swid, Martin Bandier, and Charles Koppelman for $125
    million making it the foundation of their SBK Entertainment.
