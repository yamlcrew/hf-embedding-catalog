- source_sentence: What was Brian May's zodiac sign?
  sentences:
  - After the decline of Aksum, the Eritrean highlands were under the domain of Bahr Negash ruled by the Bahr Negus. The area
    was then known as Ma'ikele Bahr ("between the seas/rivers," i.e. the land between the Red Sea and the Mereb river). It
    was later renamed under Emperor Zara Yaqob as the domain of the Bahr Negash, the Medri Bahri ("Sea land" in Tingrinya,
    although it included some areas like Shire on the other side of the Mereb, today in Ethiopia). With its capital at Debarwa,
    the state's main provinces were Hamasien, Serae and Akele Guzai.
  - In 1963, the teenage Brian May and his father custom-built his signature guitar Red Special, which was purposely designed
    to feedback. Sonic experimentation figured heavily in Queen's songs. A distinctive characteristic of Queen's music are
    the vocal harmonies which are usually composed of the voices of May, Mercury, and Taylor best heard on the studio albums
    A Night at the Opera and A Day at the Races. Some of the ground work for the development of this sound can be attributed
    to their former producer Roy Thomas Baker, and their engineer Mike Stone. Besides vocal harmonies, Queen were also known
    for multi-tracking voices to imitate the sound of a large choir through overdubs. For instance, according to Brian May,
    there are over 180 vocal overdubs in "Bohemian Rhapsody". The band's vocal structures have been compared with the Beach
    Boys, but May stated they were not "much of an influence".
  - 'Having attended art college, Mercury also designed Queen''s logo, called the Queen crest, shortly before the release
    of the band''s first album. The logo combines the zodiac signs of all four members: two lions for Leo (Deacon and Taylor),
    a crab for Cancer (May), and two fairies for Virgo (Mercury). The lions embrace a stylised letter Q, the crab rests atop
    the letter with flames rising directly above it, and the fairies are each sheltering below a lion. There is also a crown
    inside the Q and the whole logo is over-shadowed by an enormous phoenix. The whole symbol bears a passing resemblance
    to the Royal coat of arms of the United Kingdom, particularly with the lion supporters. The original logo, as found on
    the reverse-side of the first album cover, was a simple line drawing but more intricate colour versions were used on later
    sleeves.'
- source_sentence: What musician joined Kanye West on the song "Only One"?
  sentences:
  - Modern Nationalism, as developed especially since the French Revolution, has made the distinction between "language" and
    "dialect" an issue of great political importance. A group speaking a separate "language" is often seen as having a greater
    claim to being a separate "people", and thus to be more deserving of its own independent state, while a group speaking
    a "dialect" tends to be seen not as "a people" in its own right, but as a sub-group, part of a bigger people, which must
    content itself with regional autonomy.[citation needed] The distinction between language and dialect is thus inevitably
    made at least as much on a political basis as on a linguistic one, and can lead to great political controversy, or even
    armed conflict.
  - 'In June 2013, West and television personality Kim Kardashian announced the birth of their first child, North. In October
    2013, the couple announced their engagement to widespread media attention. November 2013, West stated that he was beginning
    work on his next studio album, hoping to release it by mid-2014, with production by Rick Rubin and Q-Tip. In December
    2013, Adidas announced the beginning of an official apparel collaboration with West, to be premiered the following year.
    In May 2014, West and Kardashian were married in a private ceremony in Florence, Italy, with a variety of artists and
    celebrities in attendance. West released a single, "Only One", featuring Paul McCartney, on December 31, 2014. "FourFiveSeconds",
    a single jointly produced with Rihanna and McCartney, was released in January 2015. West also appeared on the Saturday
    Night Live 40th Anniversary Special, where he premiered a new song entitled "Wolves", featuring Sia Furler and fellow
    Chicago rapper, Vic Mensa. In February 2015, West premiered his clothing collaboration with Adidas, entitled Yeezy Season
    1, to generally positive reviews. This would include West''s Yeezy Boost sneakers. In March 2015, West released the single
    "All Day" featuring Theophilus London, Allan Kingdom and Paul McCartney. West performed the song at the 2015 BRIT Awards
    with a number of US rappers and UK grime MC''s including: Skepta, Wiley, Novelist, Fekky, Krept & Konan, Stormzy, Allan
    Kingdom, Theophilus London and Vic Mensa. He would premiere the second iteration of his clothing line, Yeezy Season 2,
    in September 2015 at New York Fashion Week.'
  - As of 2013, West has won a total of 21 Grammy Awards, making him one of the most awarded artists of all-time. About.com
