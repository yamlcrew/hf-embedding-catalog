    year's No. 1 "Hottest MC in the Game." On December 17, 2010, Kanye West was voted as the MTV Man of the Year by MTV. Billboard
    ranked Kanye West No. 3 on their list of Top 10 Producers of the Decade. West ties with Bob Dylan for having topped the
