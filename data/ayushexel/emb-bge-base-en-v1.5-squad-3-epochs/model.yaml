- source_sentence: Testing revealed today's dogs trace back by how many years?
  sentences:
  - 'The Schnellweg (en: expressway) system, a number of Bundesstraße roads, forms a structure loosely resembling a large
    ring road together with A2 and A7. The roads are B 3, B 6 and B 65, called Westschnellweg (B6 on the northern part, B3
    on the southern part), Messeschnellweg (B3, becomes A37 near Burgdorf, crosses A2, becomes B3 again, changes to B6 at
    Seelhorster Kreuz, then passes the Hanover fairground as B6 and becomes A37 again before merging into A7) and Südschnellweg
    (starts out as B65, becomes B3/B6/B65 upon crossing Westschnellweg, then becomes B65 again at Seelhorster Kreuz).'
  - Although initially thought to have originated as a manmade variant of an extant canid species (variously supposed as being
    the dhole, golden jackal, or gray wolf), extensive genetic studies undertaken during the 2010s indicate that dogs diverged
    from an extinct wolf-like canid in Eurasia 40,000 years ago. Being the oldest domesticated animal, their long association
    with people has allowed dogs to be uniquely attuned to human behavior, as well as thrive on a starch-rich diet which would
    be inadequate for other canid species.
  - Although it is said that the "dog is man's best friend" regarding 17–24% of dogs in the developed countries, in the developing
    world they are feral, village or community dogs, with pet dogs uncommon. These live their lives as scavengers and have
    never been owned by humans, with one study showing their most common response when approached by strangers was to run
    away (52%) or respond with aggression (11%). We know little about these dogs, nor about the dogs that live in developed
    countries that are feral, stray or are in shelters, yet the great majority of modern research on dog cognition has focused
    on pet dogs living in human homes.
- source_sentence: What kind of societies usually follow a regular daily schedule year-round?
  sentences:
  - Industrialized societies generally follow a clock-based schedule for daily activities that do not change throughout the
    course of the year. The time of day that individuals begin and end work or school, and the coordination of mass transit,
    for example, usually remain constant year-round. In contrast, an agrarian society's daily routines for work and personal
    conduct are more likely governed by the length of daylight hours and by solar time, which change seasonally because of
    the Earth's axial tilt. North and south of the tropics daylight lasts longer in summer and shorter in winter, the effect
    becoming greater as one moves away from the tropics.
  - Relatively insensitive film, with a correspondingly lower speed index, requires more exposure to light to produce the
    same image density as a more sensitive film, and is thus commonly termed a slow film. Highly sensitive films are correspondingly
    termed fast films. In both digital and film photography, the reduction of exposure corresponding to use of higher sensitivities
    generally leads to reduced image quality (via coarser film grain or higher image noise of other types). In short, the
    higher the sensitivity, the grainier the image will be. Ultimately sensitivity is limited by the quantum efficiency of
    the film or sensor.
