- source_sentence: What do detritivores eat?
  sentences:
  - Many organisms (of which humans are prime examples) eat from multiple levels of the food chain and, thus, make this classification
    problematic. A carnivore may eat both secondary and tertiary consumers, and its prey may itself be difficult to classify
    for similar reasons. Organisms showing both carnivory and herbivory are known as omnivores. Even herbivores such as the
    giant panda may supplement their diet with meat. Scavenging of carrion provides a significant part of the diet of some
    of the most fearsome predators. Carnivorous plants would be very difficult to fit into this classification, producing
    their own food but also digesting anything that they may trap. Organisms that eat detritivores or parasites would also
    be difficult to classify by such a scheme.
  - In an ecosystem, predation is a biological interaction where a predator (an organism that is hunting) feeds on its prey
    (the organism that is attacked). Predators may or may not kill their prey prior to feeding on them, but the act of predation
    often results in the death of the prey and the eventual absorption of the prey's tissue through consumption. Thus predation
    is often, though not always, carnivory. Other categories of consumption are herbivory (eating parts of plants), fungivory
    (eating parts of fungi), and detritivory (the consumption of dead organic material (detritus)). All these consumption
    categories fall under the rubric of consumer-resource systems. It can often be difficult to separate various types of
    feeding behaviors. For example, some parasitic species prey on a host organism and then lay their eggs on it for their
    offspring to feed on it while it continues to live in or on its decaying corpse after it has died. The key characteristic
    of predation however is the predator's direct impact on the prey population. On the other hand, detritivores simply eat
    dead organic material arising from the decay of dead individuals and have no direct impact on the "donor" organism(s).
  - Buddhism is practiced by an estimated 488 million,[web 1] 495 million, or 535 million people as of the 2010s, representing
    7% to 8% of the world's total population.
- source_sentence: Along with Georgia, what American jurisdiction allowed people to be executed for the rape of an adult prior
    to Coker?
  sentences:
  - 'The engagement was not without controversy: Philip had no financial standing, was foreign-born (though a British subject
    who had served in the Royal Navy throughout the Second World War), and had sisters who had married German noblemen with
    Nazi links. Marion Crawford wrote, "Some of the King''s advisors did not think him good enough for her. He was a prince
    without a home or kingdom. Some of the papers played long and loud tunes on the string of Philip''s foreign origin." Elizabeth''s
    mother was reported, in later biographies, to have opposed the union initially, even dubbing Philip "The Hun". In later
    life, however, she told biographer Tim Heald that Philip was "an English gentleman".'
  - In 1977, the Supreme Court's Coker v. Georgia decision barred the death penalty for rape of an adult woman, and implied
    that the death penalty was inappropriate for any offense against another person other than murder. Prior to the decision,
    the death penalty for rape of an adult had been gradually phased out in the United States, and at the time of the decision,
    the State of Georgia and the U.S. Federal government were the only two jurisdictions to still retain the death penalty
    for that offense. However, three states maintained the death penalty for child rape, as the Coker decision only imposed
    a ban on executions for the rape of an adult woman. In 2008, the Kennedy v. Louisiana decision barred the death penalty
    for child rape. The result of these two decisions means that the death penalty in the United States is largely restricted
    to cases where the defendant took the life of another human being. The current federal kidnapping statute, however, may
    be exempt because the death penalty applies if the victim dies in the perpetrator's custody, not necessarily by his hand,
    thus stipulating a resulting death, which was the wording of the objection. In addition, the Federal government retains
    the death penalty for non-murder offenses that are considered crimes against the state, including treason, espionage,
    and crimes under military jurisdiction.
