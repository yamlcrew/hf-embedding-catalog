- source_sentence: How many people outside the UK were under British rule in 1945?
  sentences:
  - 20th Street starts at Avenue C, and 21st and 22nd Streets begin at First Avenue. They all end at Eleventh Avenue. Travel
    on the last block of the 20th, 21st and 22nd Streets, between Tenth and Eleventh Avenues, is in the opposite direction
    than it is on the rest of the respective street. 20th Street is very wide from the Avenue C to First Avenue.
  - By the start of the 20th century, Germany and the United States challenged Britain's economic lead. Subsequent military
    and economic tensions between Britain and Germany were major causes of the First World War, during which Britain relied
    heavily upon its empire. The conflict placed enormous strain on the military, financial and manpower resources of Britain.
    Although the British Empire achieved its largest territorial extent immediately after World War I, Britain was no longer
    the world's pre-eminent industrial or military power. In the Second World War, Britain's colonies in South-East Asia were
    occupied by Imperial Japan. Despite the final victory of Britain and its allies, the damage to British prestige helped
    to accelerate the decline of the empire. India, Britain's most valuable and populous possession, achieved independence
    as part of a larger decolonisation movement in which Britain granted independence to most territories of the Empire. The
    transfer of Hong Kong to China in 1997 marked for many the end of the British Empire. Fourteen overseas territories remain
    under British sovereignty. After independence, many former British colonies joined the Commonwealth of Nations, a free
    association of independent states. The United Kingdom is now one of 16 Commonwealth nations, a grouping known informally
    as the Commonwealth realms, that share one monarch—Queen Elizabeth II.
  - Though Britain and the empire emerged victorious from the Second World War, the effects of the conflict were profound,
    both at home and abroad. Much of Europe, a continent that had dominated the world for several centuries, was in ruins,
    and host to the armies of the United States and the Soviet Union, who now held the balance of global power. Britain was
    left essentially bankrupt, with insolvency only averted in 1946 after the negotiation of a $US 4.33 billion loan (US$56
    billion in 2012) from the United States, the last instalment of which was repaid in 2006. At the same time, anti-colonial
    movements were on the rise in the colonies of European nations. The situation was complicated further by the increasing
    Cold War rivalry of the United States and the Soviet Union. In principle, both nations were opposed to European colonialism.
    In practice, however, American anti-communism prevailed over anti-imperialism, and therefore the United States supported
    the continued existence of the British Empire to keep Communist expansion in check. The "wind of change" ultimately meant
    that the British Empire's days were numbered, and on the whole, Britain adopted a policy of peaceful disengagement from
    its colonies once stable, non-Communist governments were available to transfer power to. This was in contrast to other
    European powers such as France and Portugal, which waged costly and ultimately unsuccessful wars to keep their empires
    intact. Between 1945 and 1965, the number of people under British rule outside the UK itself fell from 700 million to
    five million, three million of whom were in Hong Kong.
