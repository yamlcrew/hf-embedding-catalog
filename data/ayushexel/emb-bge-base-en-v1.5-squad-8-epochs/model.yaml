widgetData:
- source_sentence: What past president of the Barcelona club committed suicide in 1930?
  sentences:
  - In 1978, Josep Lluís Núñez became the first elected president of FC Barcelona, and, since then, the members of Barcelona
    have elected the club president. The process of electing a president of FC Barcelona was closely tied to Spain's transition
    to democracy in 1974 and the end of Franco's dictatorship. The new president's main objective was to develop Barcelona
    into a world-class club by giving it stability both on and off the pitch. His presidency was to last for 22 years, and
    it deeply affected the image of Barcelona, as Núñez held to a strict policy regarding wages and discipline, letting go
    of such players as Maradona, Romário and Ronaldo rather than meeting their demands.
  - On 14 June 1925, in a spontaneous reaction against Primo de Rivera's dictatorship, the crowd in the stadium jeered the
    Royal March. As a reprisal, the ground was closed for six months and Gamper was forced to relinquish the presidency of
    the club. This coincided with the transition to professional football, and, in 1926, the directors of Barcelona publicly
    claimed, for the first time, to operate a professional football club. On 3 July 1927, the club held a second testimonial
    match for Paulino Alcántara, against the Spanish national team. To kick off the match, local journalist and pilot Josep
    Canudas dropped the ball onto the pitch from his airplane. In 1928, victory in the Spanish Cup was celebrated with a poem
    titled "Oda a Platko", which was written by a member of the Generation of '27, Rafael Alberti, inspired by the heroic
    performance of the Barcelona goalkeeper, Franz Platko. On 23 June 1929, Barcelona won the inaugural Spanish League. A
    year after winning the championship, on 30 July 1930, Gamper committed suicide after a period of depression brought on
    by personal and financial problems.
  - In 2003 a congressional committee called the FBI's organized crime informant program "one of the greatest failures in
    the history of federal law enforcement." The FBI allowed four innocent men to be convicted of the March 1965 gangland
    murder of Edward "Teddy" Deegan in order to protect Vincent Flemmi, an FBI informant. Three of the men were sentenced
    to death (which was later reduced to life in prison), and the fourth defendant was sentenced to life in prison. Two of
    the four men died in prison after serving almost 30 years, and two others were released after serving 32 and 36 years.
    In July 2007, U.S. District Judge Nancy Gertner in Boston found the bureau helped convict the four men using false witness
    account by mobster Joseph Barboza. The U.S. Government was ordered to pay $100 million in damages to the four defendants.
