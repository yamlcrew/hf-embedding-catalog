- source_sentence: What did the composition of the cardinals consist of?
  sentences:
  - The largest plaza in Valencia is the Plaza del Ayuntamiento; it is home to the City Hall (Ayuntamiento) on its western
    side and the central post office (Edificio de Correos) on its eastern side, a cinema that shows classic movies, and many
    restaurants and bars. The plaza is triangular in shape, with a large cement lot at the southern end, normally surrounded
    by flower vendors. It serves as ground zero during the Les Falles when the fireworks of the Mascletà can be heard every
    afternoon. There is a large fountain at the northern end.
  - Pope Sixtus V limited the number of cardinals to 70, comprising six cardinal bishops, 50 cardinal priests, and 14 cardinal
    deacons. Starting in the pontificate of Pope John XXIII, that limit has been exceeded. At the start of 1971, Pope Paul
    VI set the number of cardinal electors at a maximum of 120, but set no limit on the number of cardinals generally. He
    also established a maximum age of eighty years for electors. His action deprived twenty-five living cardinals, including
    the three living cardinals elevated by Pope Pius XI, of the right to participate in a conclave.[citation needed] Popes
    can dispense from church laws and have sometimes brought the number of cardinals under the age of 80 to more than 120.
    Pope Paul VI also increased the number of cardinal bishops by giving that rank to patriarchs of the Eastern Catholic Churches.
