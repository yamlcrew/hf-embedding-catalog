- source_sentence: What must a police officer recite to a suspect upon arrest/
  sentences:
  - 'In the light of Mother F. A. Forbes research and reference to Pope Saint Gregory''s writings, it would appear that Athanasius
    was constrained to be Bishop: She writes that when the Patriarch Alexander was on his death-bed he called Athanasius,
    who fled fearing he would be constrained to be made Bishop. "When the Bishops of the Church assembled to elect their new
    Patriarch, the whole Catholic population surrounded the church, holding up their hands to Heaven and crying; "Give us
    Athanasius!" The Bishops had nothing better. Athanasius was thus elected, as Gregory tells us..." (Pope Gregory I, would
    have full access to the Vatican Archives).'
  - The law of criminal procedure in the United States consists of a massive overlay of federal constitutional case law interwoven
    with the federal and state statutes that actually provide the foundation for the creation and operation of law enforcement
    agencies and prison systems as well as the proceedings in criminal trials. Due to the perennial inability of legislatures
    in the U.S. to enact statutes that would actually force law enforcement officers to respect the constitutional rights
    of criminal suspects and convicts, the federal judiciary gradually developed the exclusionary rule as a method to enforce
    such rights. In turn, the exclusionary rule spawned a family of judge-made remedies for the abuse of law enforcement powers,
    of which the most famous is the Miranda warning. The writ of habeas corpus is often used by suspects and convicts to challenge
    their detention, while the Civil Rights Act of 1871 and Bivens actions are used by suspects to recover tort damages for
    police brutality.
