- source_sentence: If the st belongs to one morpheme, then the stop is what?
  sentences:
  - They are unaspirated for almost all speakers when immediately following word-initial s, as in spill, still, skill. After
    an s elsewhere in a word they are normally unaspirated as well, except sometimes in compound words. When the consonants
    in a cluster like st are analyzed as belonging to different morphemes (heteromorphemic) the stop is aspirated, but when
    they are analyzed as belonging to one morpheme the stop is unaspirated.[citation needed] For instance, distend has unaspirated
    [t] since it is not analyzed as two morphemes, but distaste has an aspirated middle [tʰ] because it is analyzed as dis-
    + taste and the word taste has an aspirated initial t.
  - 'The term "Enlightenment" emerged in English in the later part of the 19th century, with particular reference to French
    philosophy, as the equivalent of the French term ''Lumières'' (used first by Dubos in 1733 and already well established
    by 1751). From Immanuel Kant''s 1784 essay "Beantwortung der Frage: Was ist Aufklärung?" ("Answering the Question: What
    is Enlightenment?") the German term became ''Aufklärung'' (aufklären = to illuminate; sich aufklären = to clear up). However,
    scholars have never agreed on a definition of the Enlightenment, or on its chronological or geographical extent. Terms
    like "les Lumières" (French), "illuminismo" (Italian), "ilustración" (Spanish) and "Aufklärung" (German) referred to partly
    overlapping movements. Not until the late nineteenth century did English scholars agree they were talking about "the Enlightenment."'
