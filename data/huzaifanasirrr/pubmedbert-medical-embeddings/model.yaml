- source_sentence: AbstractMicrosatellite instability (MSI) is an important biomarker in cancer. While routine methods can
    detect MSI in certain tumor types, in other tumor types the results may be incorrect due to differences in the MSI loci
    pattern. Here, we report the case of a patient with pancreatic adenocarcinoma, with confirmed MSI by two independent next-generation
    sequencing tests, but not by routine methods, who had progression on pembrolizumab. Comparison of the patient’s MSI loci
    patterns with MSI+ colorectal adenocarcinoma samples showed a lower fraction of unstable loci, low resolution of a second
    peak in the repeat length spectrum of unstable short tandem repeats in the patient's sample, and a lower length of indels
    (3.7 vs 4.5 base pairs, p < 0.01).
  sentences:
  - Hepatocellular carcinoma (HCC) is a leading cause of cancer-related mortality in India. This review explores the epidemiological
    trends and the landscape of systemic therapy for HCC in the Indian context, acknowledging the recent shift in etiology
    from viral hepatitis to lifestyle-associated factors.A comprehensive review of the literature was conducted, including
    data from the Global Cancer Observatory and the Indian Council of Medical Research, along with a critical analysis of
    various clinical trials. The article investigates systemic therapies in-depth, discussing their mechanisms, efficacy,
    and adaptation to Indian healthcare framework.Progression-free survival with a hazard ratio of ≤0.6 compared to sorafenib,
    overall survival of ∼16–19 months, and objective response rate of 20–30% are the defining thresholds for systemic therapy
    clinical trials. Systemic therapy for advanced HCC in India primarily involves the use of tyrosine kinase inhibitors such
    as sorafenib, lenvatinib, regorafenib, and cabozantinib, with sorafenib being the most commonly used drug for a long time.
    Monoclonal antibodies such as ramucirumab and bevacizumab and immune-checkpoint inhibitors, such as atezolizumab, nivolumab,
    and pembrolizumab, are expanding treatment horizons. Lenvatinib has emerged as a cost-effective alternative, and the combination
    of atezolizumab and bevacizumab has demonstrated superior outcomes in terms of overall survival and progression-free survival.
    Despite these advances, late-stage diagnosis and limited healthcare accessibility pose significant challenges, often relegating
    patients to palliative care.Addressing HCC in India demands an integrative approach that not only encompasses advancements
    in systemic therapy but also targets early detection and comprehensive care models. Future strategies should focus on
    enhancing awareness, screening for high-risk populations, and overcoming infrastructural disparities. Ensuring the judicious
    use of systemic therapies within the constraints of the Indian healthcare economy is crucial. Ultimately, a nuanced understanding
    of systemic therapeutic options and their optimal utilization will be pivotal in elevating the standard of HCC care in
    India.
  - We present an unusual case of uveitis secondary to avelumab and pembrolizumab in a 39-year-old Taiwanese male with stage
    IV clear cell renal cell carcinoma (ccRCC) and lung metastasis, who initially received pembrolizumab as his primary treatment.
    However, the patient experienced skin and liver immune-related adverse events (irAEs) after the seventh dose of pembrolizumab,
    which prompted a switch to avelumab. The patient began to experience gradual blurring of vision after completing the fifth
    cycle of avelumab immunotherapy. Ophthalmic examinations revealed findings consistent with bilateral anterior uveitis.
    Despite an initial lack of significant improvement with steroid treatment, the patient’s vision and inflammation improved
    upon discontinuation of avelumab. Due to the occurrence of uveitis, avelumab was switched back to pembrolizumab. However,
    three months after initiating pembrolizumab, the patient developed foggy vision and bilateral anterior uveitis with cystoid
    macular edema (CME). The administration of topical, oral, and subconjunctival steroids resulted in an improvement in vision
    and the resolution of CME, without the need to discontinue pembrolizumab. Over the subsequent eighteen months, there has
    been no recurrence of uveitis, and there is no evidence of relapse or further metastasis in his ccRCC.
  - Immune checkpoint inhibitors (ICIs) are monoclonal antibodies that block inhibitors of T cell activation and function.
    With the widespread use of ICIs in cancer therapy, immune-related adverse events (irAEs) have gradually emerged as urgent
    clinical issues. Tumors not only exhibit high heterogeneity, and their response to ICIs varies, with “hot” tumors showing
    better anti-tumor effects but also a higher susceptibility to irAEs. The manifestation of irAEs displays a tumor-heterogeneous
    pattern, correlating with the tumor type in terms of the affected organs, incidence, median onset time, and severity.
    Understanding the mechanisms underlying the pathogenic patterns of irAEs can provide novel insights into the prevention
    and management of irAEs, guide the development of biomarkers, and contribute to a deeper understanding of the toxicological
    characteristics of ICIs. In this review, we explore the impact of tumor type on the therapeutic efficacy of ICIs and further
    elucidate how these tumor types influence the occurrence of irAEs. Finally, we assess key candidate biomarkers and their
    relevance to proposed irAE mechanisms. This paper also outlines management strategies for patients with various types
    of tumors, based on their disease patterns.
- source_sentence: IntroductionPoliovirus receptor (PVR) is a tumor promoter and a regulatory checkpoint that enhances immunosuppression.
    We investigated PVR expression by applying immunohistochemistry (IHC) staining. A positive association existed between
    PVR expression and cytotoxic T lymphocyte-associated antigen 4 (CTLA4) expression in patients with surgically resected
    non-small-cell lung cancer (NSCLC). PVR expression is a prognosis predictor of lung adenocarcinoma.PurposeTo investigate
    the prognostic significance of PVR expression and CTLA4 expression for surgically resected NSCLC.Patients and methodsThe
    medical records of 108 Chinese patients with primary NSCLC who underwent surgery were retrospectively reviewed. The expression
    of PVR and CTLA4 were measured through IHC. Clinical characteristics, the association between PVR and CTLA4, and the prognostic
    significance of PVR were analyzed.ResultsA significant positive association was observed between PVR and CTLA4 expression
    in NSCLC (P = 0.016). PVR had a high positive rate among females, nonsmokers, and patients with adenocarcinoma and advanced
    lung cancer. The overall survival (OS) of patients with negative PVR expression was significantly longer than that of
    patients with positive PVR expression (P = 0.049), especially among females (P = 0.03) and nonsmokers (P = 0.025). Multivariate
    analysis results showed that advanced tumor stage and PVR expression were independent prognosis predictors of poor OS.ConclusionPVR
    can potentially serve as a prognostic predictor and biomarker for NSCLC and cancer anti-CTLA4 immunotherapy response.Electronic
    supplementary materialThe online version of this article (10.1007/s00432-020-03189-8) contains supplementary material,
    which is available to authorized users.
  sentences:
  - Background:Inflammatory breast cancer (IBC) is rare and biologically aggressive. We sought to assess diagnostic and management
    strategies among the American Society of Breast Surgeons (ASBrS) membership.Methods:An anonymous survey was distributed
    to ASBrS members from March-May 2023. The survey included questions about respondents’ demographics and information related
    to stage III and IV IBC management. Agreement was defined as a shared response by >80% of respondents. In areas of disagreement,
    responses were stratified by years in practice, fellowship training, and annual IBC patient volume.Results:The survey
    was administered to 2337 members with 399 (17.1%) completing all questions and defining the study cohort. Distribution
    of years in practice was 26.0% 0–10 years, 26.6% 11–20 years, and 47.4% >20 years. 51.2% reported surgical oncology or
    breast fellowship training, 69.2% maintain a breast-only practice, and 73.5% treat <5 IBC cases/year. Agreement was identified
    in diagnostic imaging, trimodal therapy, and mastectomy with wide skin excision for stage III IBC. Lack of agreement was
    identified in surgical management of the axilla; respondents with <10 years in practice or fellowship training were more
    likely to perform axillary dissection for cN0-N2 stage III IBC. Locoregional management of stage IV IBC was variable.Conclusions:Among
    ASBrS members, there is consensus in diagnostic evaluation, treatment sequencing, and surgical approach to the breast
    in stage III IBC. Differences exist in surgical management of the cN0–2 axilla with uptake of de-escalation strategies.
    Clinical trials are needed to evaluate oncologic safety of de-escalation in this high-risk population.
  - In recent years, the therapeutic landscape for hematological malignancies has markedly advanced, particularly since the
    inaugural approval of autologous chimeric antigen receptor T cell (CAR-T) therapy in 2017 for relapsed/refractory acute
    lymphoblastic leukemia (ALL). Autologous CAR-T therapy involves the genetic modification of a patient’s T cells to specifically
    identify and attack cancer cells, while bispecific antibodies (BsAbs) function by binding to both cancer cells and immune
    cells simultaneously, thereby triggering an immune response against the tumor. The subsequent approval of various CAR-T
    therapies and BsAbs have revolutionized the treatment of multiple hematological malignancies, highlighting high response
    rates and a subset of patients achieving prolonged disease control. This review explores the mechanisms underlying autologous
    CAR-T therapies and BsAbs, focusing on their clinical application in multiple myeloma, ALL, and non-Hodgkin lymphoma.
    We provide comprehensive insights into their individual efficacy, limitations concerning broad application, and the potential
    of combination therapies. These upcoming strategies aim to propel the field forward, paving the way for safer and more
    effective therapeutic interventions in hematological malignancies.
  - One of the main challenges in cancer treatment is the selection of treatment resistant clones which leads to the emergence
    of resistance to previously efficacious therapies. Identifying vulnerabilities in the form of cellular trade-offs constraining
    the phenotypic possibility space could allow to avoid the emergence of resistance by simultaneously targeting cellular
    processes that are involved in different alternative phenotypic strategies linked by trade-offs. The Pareto optimality
    theory has been proposed as a framework allowing to identify such trade-offs in biological data from its prediction that
    it would lead to the presence of specific geometrical patterns (polytopes) in, for example, gene expression space, with
    vertices representing specialized phenotypes. We tested this approach in diffuse large B-cell lymphoma (DLCBL) transcriptomic
    data. As predicted, there was highly statistically significant evidence for the data forming a tetrahedron in gene expression
    space, defining four specialized phenotypes (archetypes). These archetypes were significantly enriched in certain biological
    functions, and contained genes that formed a pattern of shared and unique elements among archetypes, as expected if trade-offs
    between essential functions underlie the observed structure. The results can be interpreted as reflecting trade-offs between
    aerobic energy production and protein synthesis, and between immunotolerant and immune escape strategies. Targeting genes
    on both sides of these trade-offs simultaneously represent potential promising avenues for therapeutic applications.
- source_sentence: 'Introduction: Pancreatic cancer, which results from the uncontrolled growth of pancreatic cells, is the
    fourth most frequent cause of cancer-related mortality in the United States. About 90% of instances of pancreatic cancer
    are pancreatic adenocarcinomas, and occasionally "pancreatic cancer" is used exclusively to describe this subtype. Nab-paclitaxel,
    gemcitabine, and FOLFIRINOX are examples of modern chemotherapeutic drugs that have the ability to quickly confer resistance
    in pancreatic tumor cells. Therefore, in order to treat this dreadful condition, it is essential to develop more effective
    medicines. Inhibition of the ubiquitin-proteasome system (UPS) causes pancreatic cancer cells to die apoptotically. In
    eukaryotes, UPS is an essential mechanism for protein breakdown. Pancreatic cancer cells are more susceptible to endoplasmic
    reticulum stress (endoplasmic reticulum [ER] stress) and apoptosis when treated with bortezomib, a proteasome inhibitor
    that is the first in this group of drugs approved for the treatment of cancer, especially multiple myeloma. Methods: Searching
    through PubMed and Google Scholar and gathering data.Results: UPS is still a popular target for pancreatic cancer treatment
    among researchers. However, despite the favorable results of UPS-based therapies in vitro and in vivo, the clinical results
    are not as promising as expected.Conclusion: A deep understanding of it, is essential to achieving the maximum results.
    In this review, we aim to look into the UPS along with searching for the novelist therapies for pancreatic adenocarcinoma
    based on manipulating it.'
  sentences:
  - ObjectiveImmune checkpoint inhibitors (ICIs) have been validated in epidermal growth factor receptor (EGFR) wild-type
    advanced non-small cell lung cancer (NSCLC) patients. However, there exists no evidence regarding NSCLC patients harboring
    EGFR mutations, experiencing EGFR-TKI (tyrosine kinase inhibitor) treatment failure. We collected clinical information
    from real world and conducted a time series-based meta-analysis to determine the efficacy and safety of ICIs in patients
    harboring EGFR mutations and experienced EGFR-TKIs resistance.MethodsTwenty-two NSCLC patients with EGFR mutations after
    TKI resistance were included from two hospitals. PubMed, Embase and Cochrane Library were searched for relevant literature
    published until December 31, 2021. Endpoint outcomes included mortality and progression-free survival (PFS) at different
    times of follow-up.ResultsIn total, 22 patients showed that the median PFS was 5.6 months (range 2.0–9.0 months). According
    to treatment strategies, the median PFS was 2.4 months (range 2.0–5.3 months) in the ICI monotherapy group and 5.9 months
    (range 2.8–9.0 months) in the ICI combined Chemotherapy group. Additionally, sixteen studies, including 5 trials, 10 controlled
    cohorts and 1 real-world study, were assessed, involving a total of ICI-treated NSCLC patients with EGFR mutation after
    TKI failure. The 6-month survival and PFS rate were 0.82 (95% CI 0.36–0.97) and 0.55 (95% CI 0.34–0.74), respectively.
    ICI combined chemotherapy showed the best survival outcome among these groups, as demonstrated by the 12-month survival
    rate and PFS. No new safety signals were identified with the combination therapy. The frequency of treatment-related adverse
    events was similar to that in previously reported studies of chemotherapy combined with checkpoint inhibitors.ConclusionsThe
    addition of ICIs plus chemotherapy may significantly improve progression-free survival among patients with locally advanced
    or metastatic non-squamous NSCLC who EGFR-TKIs resistance.Supplementary InformationThe online version contains supplementary
    material available at 10.1007/s00432-022-04176-x.
  - PurposeImmunotherapy, such as checkpoint inhibitors against anti-programmed death-ligand 1 (PD-L1), has not been successful
    in treating patients with pancreatic ductal adenocarcinoma (PDAC). Tumor-associated macrophages (TAMs), myeloid-derived
    suppressor cells (MDSCs), dendritic cells (DCs), and the TGF-β cytokine are critical in anti-cancer immunity. We hypothesized
    that TGF-β enhances the immunosuppressive effects of TAM, MDSC, and DC presence in tumors.MethodsUsing a murine PDAC cell
    line derived from a genetically engineered mouse model, we orthotopically implanted treated cells plus drug embedded in
    Matrigel into immunocompetent mice. Treatments included saline control, TGF-β1, or a TGF-β receptor 1 small molecule inhibitor,
    galunisertib. We investigated TAM, MDSC, DC, and TAM PD-L1 expression with flow cytometry in tumors. Separately, we used
    the TIMER2.0 database to analyze TAM and PD-L1 gene expression in human PDAC tumors in TCGA database.ResultsTGF-β did
    not alter MDSC or DC frequencies in the primary tumors. However, in PDAC metastases to the liver, TGF-β decreased the
    proportion of MDSCs (P=0.022) and DCs (P=0.005). TGF-β significantly increased the percent of high PD-L1 expressing TAMs
    (32 ± 6 % vs. 12 ± 5%, P=0.013) but not the proportion of TAMs in primary and metastatic tumors. TAM PD-L1 gene expression
    in TCGA PDAC database was significantly correlated with tgb1 and tgfbr1 gene expression (P<0.01).ConclusionsTGF-β is important
    in PDAC anti-tumor immunity, demonstrating context-dependent impact on immune cells. TGF-β has an overall immunosuppressive
    effect mediated by TAM PD-L1 expression and decreased presence of DCs. Future investigations will focus on enhancing anti-cancer
    immune effects of TGF-β receptor inhibition.
  - SUMMARYExtracellular 2’3’-cyclic-GMP-AMP (cGAMP) is an immunotransmitter exported by diseased cells and imported into
    host cells to activate the innate immune STING pathway. We previously identified SLC19A1 as a cGAMP importer, but its
    use across human cell lines is limited. Here, we identify LRRC8A heteromeric channels, better known as volume-regulated
    anion channels (VRAC), as widely-expressed cGAMP transporters. LRRC8A forms complexes with LRRC8C and/or LRRC8E, depending
    on their expression levels, to transport cGAMP and other 2’3’-cyclic dinucleotides. In contrast, LRRC8D inhibits cGAMP
    transport. We demonstrate that cGAMP is effluxed or influxed via LRRC8 channels, as dictated by the cGAMP electrochemical
    gradient. Activation of LRRC8A channels, which can occur under diverse stresses, strongly potentiates cGAMP transport.
    We identify activator sphingosine 1-phosphate and inhibitor DCPIB as chemical tools to manipulate channel-mediated cGAMP
    transport. Finally, LRRC8A channels are key cGAMP transporters in resting primary human vasculature cells and universal
    human cGAMP transporters when activated.
- source_sentence: Introduction:Immune checkpoint inhibitors (ICI) have shown great promise in a wide spectrum of malignancies.
    However, responses are not always durable, and this mode of treatment is only effective in a subset of patients. As such,
    there exists an unmet need for novel approaches to bolster ICI efficacy.Areas covered:We review the role of the Tyro3,
    Axl, and Mer (TAM) receptor tyrosine kinases in promoting tumor-induced immune suppression and discuss the benefits that
    may be derived from combining ICI with TAM kinase-targeted tyrosine kinase inhibitors. We searched the MEDLINE Public
    Library of Medicine (PubMed) and EMBASE databases and referred to ClinicalTrials.gov for relevant ongoing studies.Expert
    Opinion:Targeting of TAM kinases may improve the efficacy of immune checkpoint blockade. However, it remains to be determined
    whether this effect will be better achieved by the selective targeting of each TAM receptor, depending on the context,
    or by multi-receptor TAM inhibitors. Triple inhibition of all TAM receptors is more likely to be associated with increased
    risk for adverse events. Clinical trial designs should use high resolution clinical endpoints and proper control arms
    to determine the synergistic effects of combining TAM inhibition with immune checkpoint blockade.
  sentences:
  - AbstractINTRODUCTIONDespite aggressive interventions, Glioblastoma (GBM) remains as a challenge for neuro-oncologists.
    Standard treatments are often followed by disease recurrence. Adoptive cell therapies have emerged as a viable therapeutic
    for brain malignancies. CAR-T cell therapy has generated substantial interest because of its efficacy and specificity
    in treating various cancers. Despite these efficacies, studies reveal limitations of CAR-T therapy due to the altered
    metabolic environment in GBM. GBM tumors shift towards aerobic glycolysis, regardless of oxygen availability leading to
    massive glucose consumption. This results in impeding T-cell glycolysis and activation. OBJECTIVEThe GBM microenvironment
    provides local restraints via metabolic competition suppressing antitumor immunity, specifically inhibiting infiltration
    and tumoricidal functions of host and adoptively transferred tumor-reactive T-cells. In our study, we manipulated the
    metabolic fitness of the therapeutic T-cells to enhance their tumoricidal activity, by overexpressing glucose transporter
    GLUT1 and GLUT3. We show that this manipulation can enhance their anti-tumor activity. METHODSThe T-cell glucose metabolic
    pathway was modulated via glucose transporter overexpression. The functionality of metabolically modified T-cells was
    investigated in murine and human models. RESULTSWe demonstrated that tumor cells impose glucose restriction when competing
    for glucose with T-cells leading to T-cell hypo responsiveness. Overexpression of glucose transporters such as Glut1 and
    Glut3 increased T-cell glucose utilization and provide survival advantage leading to enhanced T-cell activation in glucose-restricted
    conditions. The metabolic modifications regulate T-cell efficacy by enhancing intra-tumoral trafficking. We tested this
    approach in the context of CD70CAR T cell therapy. It was established that glucose transporter overexpression in CD70
    CAR T-cells not only improves intracranial tumor invasion but also elicit functional anti-tumor cell response thus improving
    survival. CONCLUSIONSThis study integrates fundamental concepts of tumor and immune metabolism in the design of immunotherapy
    and confirms that immunometabolism represents a viable target for new cancer therapy to treat brain tumors.
  - Lung cancer is among the most common instances of cancer subtypes and is associated with high mortality rates. Due to
    the availability of fewer therapies and delayed clinical investigations, the number of cancer incidences is rising dramatically.
    This is possibly an effect of immune modulations and chemotherapeutic drugs that raises cancer resistance. Among the list,
    IL-6 and IL-17 are host-derived paradoxical effectors that attune immune responses in malignant lung cells. Their excessive
    release in the cytokine milieu stabilizes immunosuppressive phenotypes, resulting in cellular perturbations. During tumor
    development, the significance of these molecules is reflected in their potential to regulate oncogenesis by initiating
    a myriad of signaling events that influence tumor growth and the metastatic ability of benign cancer cells. Moreover,
    their transactivation contributes to antiapoptotic mechanisms and favors cancer cell survival via constitutive expression
    of immunoregulatory molecules. Co-evolution and gene duplication events could be the major drivers behind cytokine evolution,
    which have prompted generic changes and, hence, the additive effect. The evolutionary model and statistical analysis provide
    evidence about the cytokines ancestral relationships and site-specific conservation, which is more convincing as both
    cytokines share cysteine-knot-like structures important in maintaining structural integrity. Funneling through the findings
    could help find residues that serve a catalytic role in immune functioning. Designing peptides or subunit vaccine formulations
    against those conserved residues could aid in combating lung cancer pathogenesis.
  - Despite significant advancement in the diagnostic and therapeutic aspects of breast carcinoma, the prognosis remains dismal.
    Recently, with advances in its understanding, various immune system-based management strategies have been developed. CTLA-4
    suppresses lymphocyte reactivity, IL-2 secretion, and IL-2 receptor expression and triggers cell cycle arrest. PD-L1 inhibits
    the proliferation and cytotoxicity of T cells and inhibits release of cytokines. Hence, we planned to evaluate the immunoexpression
    of CTLA-4 and PD-L1 in invasive ductal carcinoma breast and seek correlation between their immunopositivity and the clinicopathological
    parameters. This was a retrospective study conducted on archival material of 50 cases of breast carcinoma tissue microarrays.
    Clinicopathological details were recorded. All cases were evaluated for immunohistochemical expression of CTLA-4 and PD-L1.
    Cytoplasmic expression of CTLA-4 and membranous expression of PD-L1 were considered positive and staining intensity was
    recorded as mild, moderate, and intense. Data was recorded and analyzed. Immunopositivity for CTLA-4 was seen in 92% of
    cases of breast carcinoma. CTLA-4 staining intensity showed significant association with TNM staging of breast carcinomas
    (p = 0.036). Age group of the breast carcinoma cases showed a statistically significant correlation with PD-L1 immunoexpression
    (p = 0.002). No significant correlation was found between all other clinicopathological characteristics and CTLA-4 or
    PD-L1 immunostaining. Our study shows that CTLA-4 is a more important immune checkpoint regulator in breast carcinomas
    in comparison to PD-L1. Thus, anti-CTLA-4 immunotherapy might prove to be of immense help in the treatment of invasive
    ductal carcinoma breast showing overexpression of CTLA-4.
- source_sentence: AbstractBackgroundCoronavirus disease 2019 (COVID-19) is a strong risk factor for venous thromboembolism
    (VTE). Few studies have evaluated the effectiveness of COVID-19 vaccination in preventing hospitalization for COVID-19
    with VTE.MethodsAdults hospitalized at 21 sites between March 2021 and October 2022 with symptoms of acute respiratory
    illness were assessed for COVID-19, completion of the original monovalent messenger RNA (mRNA) COVID-19 vaccination series,
    and VTE. Prevalence of VTE was compared between unvaccinated and vaccinated patients with COVID-19. The vaccine effectiveness
    (VE) in preventing COVID-19 hospitalization with VTE was calculated using a test-negative design. The VE was also stratified
    by predominant circulating severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) variant.ResultsAmong 18 811 patients
    (median age [interquartile range], 63 [50–73] years; 49% women; 59% non-Hispanic white, 20% non-Hispanic black, and 14%
    Hispanic; and median of 2 comorbid conditions [interquartile range, 1–3]), 9792 were admitted with COVID-19 (44% vaccinated),
    and 9019 were test-negative controls (73% vaccinated). Among patients with COVID-19, 601 had VTE diagnosed by hospital
    day 28, of whom 170 were vaccinated. VTE was more common among unvaccinated than vaccinated patients with COVID-19 (7.8%
    vs 4.0%; P = .001). The VE against COVID-19 hospitalization with VTE was 84% overall (95% confidence interval, 80%–87%),
    and VE stratified by predominant circulating variant was 88% (73%–95%) for Alpha, 93% (90%–95%) for Delta, and 68% (58%–76%)
    for Omicron variants.ConclusionsVaccination with the original monovalent mRNA series was associated with a decrease in
    COVID-19 hospitalization with VTE, though data detailing prior history of VTE and use of anticoagulation were not available.
    These findings will inform risk-benefit considerations for those considering vaccination.
  sentences:
  - 'Aim: To develop a trivalent DNA vaccine candidate encapsulated in Chitosan-TPP nanoparticles against hand foot and mouth
    disease (HFMD) and assess its immunogenicity in mice.Materials & methods: Trivalent plasmid carrying the VP1 and VP2 genes
    of EV-A71, VP1 gene of CV-A16 was encapsulated in Chitosan-TPP nanoparticles through ionic gelation. In vitro characterization
    and in vivo immunization studies of the CS-TPP-NPs (pIRES-VP121) were performed.Results: Mice administered with CS-TPP
    NPs (pIRES-VP121) intramuscularly were observed to have the highest IFN-γ response. Sera from mice immunized with the
    naked pDNA and CS-TPP-NPs (pIRES-VP121) demonstrated good viral clearance against wild-type EV-A71 and CV-A16 in RD cells.Conclusion:
    CS-TPP-NPs (pIRES-VP121) could serve as a prototype for future development of multivalent HFMD DNA vaccine candidates.'
  - PurposeLymphocyte-monocyte ratio (LMR) has previously been used as a prognostic predictor in various solid tumors. This
    research aims in comparing the prognostic predictive Please check and conability of several inflammatory parameters and
    clinical parameters to validate further the excellent prognostic value of LMR in patients with gastric cancer treated
    with apatinib.MethodsMonitor inflammatory, nutritional parameters and tumor markers. Cutoff values of the parameters concerned
    were identified with the X-tile program. Subgroup analysis was made via Kaplan–Meier curves, and univariate and multivariate
    Cox regression analyses were used to find independent prognostic factors. The nomogram of logistic regression models was
    constructed according to the results.ResultsA total of 192 patients (115 divided into training group and 77 into validation
    group) who received the second- or later-line regimen of apatinib were retrospectively analyzed. The optimal cutoff value
    for LMR was 1.33. Patients with high LMR (LMR-H) were significantly longer than those with low LMR (LMR-L) in progression-free
    survival (median 121.0 days vs. median 44.5 days, P < 0.001). The predictive value of LMR was generally uniform across
    subgroups. Meanwhile, LMR and CA19-9 were the only hematological parameters with significant prognostic value in multivariate
    analysis. The area under the LMR curve (0.60) was greatest for all inflammatory indices. Adding LMR to the base model
    significantly enhanced the predictive power of the 6-month probability of disease progression (PD). The LMR-based nomogram
    showed good predictive power and discrimination in external validation.ConclusionLMR is a simple but effective predictor
    of prognosis for patients treated with apatinib.Supplementary InformationThe online version contains supplementary material
    available at 10.1007/s00432-023-04976-9.
  - 'PurposeProgrammed death-ligand 1 (PD-L1) expression may influence the prognosis of patients with localized esophageal
    cancer. The current study compared the prognostic value of PD-L1 expression between tumor cells and immune cells.MethodsArchival
    esophageal tumor tissue samples were collected from patients who received paclitaxel and cisplatin-based neoadjuvant chemoradiotherapy
    (CRT) for locally advanced esophageal squamous cell carcinoma (ESCC) in three prospective phase II trials. PD-L1 expression
    on tumor and immune cells was examined immunohistochemically by using the SP142 antibody and scored by two independent
    pathologists. The association of PD-L1 expression with patient’s outcomes was analyzed using a log-rank test and Cox regression
    multivariate analysis.ResultsA total of 100 patients were included. PD-L1 expression on tumor cells was positive (≥ 1%,
    TC-positive) in 55 patients; PD-L1 expression on immune cells was high (≥ 5%, IC-high) in 30 patients. TC-positive status
    was associated with poor overall survival (OS) (HR: 1.63, P = 0.035), whereas IC-high status was associated with improved
    OS (HR: 0.44, P = 0.0024). Multivariate analysis revealed that TC-positive, IC-high, and performance status were independent
    prognostic factors for progression-free survival and that IC-high and performance status were independent factors for
    OS. Furthermore, the combination of IC-high and TC-negative status was associated with the optimal OS, whereas that of
    TC-positive and IC-low status was associated with the worst OS.ConclusionPD-L1 expression on tumor and immune cells may
    have different prognostic value for patients with locally advanced ESCC receiving neoadjuvant CRT. A combination of these
    two indexes may further improve the prognostic prediction.Supplementary InformationThe online version contains supplementary
    material available at 10.1007/s00432-021-03772-7.'
