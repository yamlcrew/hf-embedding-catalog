widgetData:
- source_sentence: Quelles sont les personnes impliquées et solicitées et leur statut ?
  sentences:
  - Le programme s’appuie sur une pédagogie expérientielle validée par plus de 150 000 bénéficiaires depuis 10 ans.
  - Une responsable de programme conçoit les contenus pédagogiques et accompagne les jeunes.
  - Le Ticket Camp permet aux jeunes de concevoir un projet seul ou en équipe.
- source_sentence: Quel est l'impact social de votre structure ?
  sentences:
  - Une équipe de bénévoles apporte un soutien précieux au projet à chaque édition.
  - Le Ticket Camp contribue à la redynamisation des territoires en favorisant la création d’emplois locaux.
  - Par exemple notre partenaire Rura accompagne 8 000 jeunes issus de territoires ruraux.
- source_sentence: Quelles sont les perspectives de développement de votre association ?
  sentences:
  - Chaque équipe est suivie par un mentor expert du territoire ou de l’accompagnement des jeunes.
  - Les bénévoles donnent environ 150 heures de leur temps pour chaque édition du Ticket Camp.
  - Développement de nouveaux programmes et services pour répondre aux besoins émergents.
- source_sentence: Quel est l'impact social de votre structure ?
  sentences:
  - L'objectif est de favoriser l'égalité des chances en ciblant les jeunes confrontés à des freins sociaux ou géographiques.
  - Il partage sa vision à travers des tribunes, des podcasts et des événements grand public.
  - Le programme repose sur 10 ans d’expérience de Ticket for Change auprès de 23 000 jeunes.
- source_sentence: Quels sont les membres de l’équipe impliqués dans le projet ?
  sentences:
  - Une responsable de programme conçoit les contenus pédagogiques et accompagne les jeunes.
  - Il vise un impact durable grâce à l'exigence et à la qualité de ses actions.
  - Des rapports d'évaluation sont produits régulièrement pour analyser les résultats et identifier les axes d'amélioration.
