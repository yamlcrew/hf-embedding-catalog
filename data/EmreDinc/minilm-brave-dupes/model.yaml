    \ \nINSUFFICIENT INFO WILL GET THE ISSUE CLOSED. IT WILL ONLY BE REOPENED AFTER SUFFICIENT INFO IS PROVIDED-->\n\n## Description\
    \ \n<!--Provide a brief description of the issue-->\nFollow-up from #17573. We need to add the reading list back from\
    \ Chromium. Feature was disabled since this would be a new feature for Brave users and the side panel would conflict with\
    \ Brave's.\n\n\n## Test Plans\n\n### Tabs can be added to reading list\n- Open a tab to any link, right-click it and choose\
    \ \"Add tab to reading list\"\n    <img width=\"276\" alt=\"image\" src=\"https://user-images.githubusercontent.com/741836/178615019-d86b184e-c942-42e7-b387-e60405a6241f.png\"\
    >\n- Reading list toolbar icon should show with highlight circle  \n    <img width=\"151\" alt=\"image\" src=\"https://user-images.githubusercontent.com/741836/178615070-30b4862b-3fb6-41c3-a140-848f1daa52f7.png\"\
    >\n\n### Reading list shows for side bar in \"always\" mode\n- Change side bar pref to \"always\" show\n- Click the reading\
    \ list icon\n- Reading list should show\n- Reading list icon should show as selected\n    <img width=\"108\" alt=\"image\"\
    \ src=\"https://user-images.githubusercontent.com/741836/178615623-cdb425dc-3317-4254-870f-dbd505f255ca.png\">\n- The\
    \ toolbar side panel button should show as selected (highlighted background)\n    <img width=\"199\" alt=\"image\" src=\"\
    https://user-images.githubusercontent.com/741836/178615655-3521f395-55dd-40e5-bf52-474846a4287b.png\">\n- Click the reading\
    \ list icon again\n- Reading list should hide\n- Reading list icon should not show as selected\n- The toolbar side panel\
    \ button should not show as selected\n\n### The side panel toolbar button will open the panel\n- Click the side panel\
    \ toolbar button\n- Reading list (or bookmarks) panel should open (whichever was the last open)\n- The opened panel should\
    \ have the relevant sidebar icon selected\n- The toolbar button should show as selected (highlighted background)\n- Click\
    \ the side panel toolbar button again\n- The panel should close\n- No sidebar buttons should show as selected\n- The toolbar\
    \ side panel button should not show as selected\n\n### Reading list shows for side bar in \"on mouseover\" mode\n- Change\
    \ side bar pref to \"on mouseover\" show\n- Click the reading list icon\n- Reading list should show\n- Reading list icon\
    \ should show as selected\n- Mouse away from the side bar and side panel to the web content and click focus there\n  -\
    \ Side bar and panel should stay open\n- Click the reading list icon again\n- Reading list should hide\n- Reading list\
    \ icon should not show as selected\n- Mouse away from the side bar and side panel to the web content and click focus there\n\
    \  - Side bar and panel should hide\n\n### Reading list shows for side bar in \"never\" mode\n- Change side bar pref to\
    \ \"never\" show\n- Click the side panel toolbar button\n- Reading list (or bookmarks) panel should open (whichever was\
    \ the last open)\n- The opened panel should have the relevant sidebar icon selected\n- The toolbar button should show\
    \ as selected (highlighted background)\n- Click the side panel toolbar button again (or the selected sidebar button, to\
    \ unselect it)\n- The panel should close\n- No sidebar buttons should show as selected\n- The toolbar side panel button\
    \ should not show as selected\n- The entire sidebar should hide, since it is in \"never\" show mode"
