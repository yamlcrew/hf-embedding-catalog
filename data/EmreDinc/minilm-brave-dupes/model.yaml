      Google added the Let''s Encrypt intermediate certs to the PKI Metadata component version 1552 on 2026-01-16. This caused
      the Chromium cert validation code to short-circuit and break pinning for several of our backend services.


      # Test plan

      1. Update to `PKI Metadata - Version: 1552` or later in `brave://components`.

      2. [Skip this step on Android] Make sure you see the Let''s Encrypt intermediates certs in `brave://certificate-manager/crscerts`:


