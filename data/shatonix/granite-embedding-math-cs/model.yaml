  base_model: ibm-granite/granite-embedding-english-r2
  widget:
  - source_sentence: You are tasked with creating a module in Elm to render an article document. The module should include
      functions to render the body, navigation, main content, titles, headings, subheadings, paragraphs, code blocks, images,
      and references. You need to define the necessary types and functions to achieve this.
    sentences:
    - '4605'
    - "Context: \nAnswer: ```elm\nmodule ArticleRenderer exposing (Rendered, renderDocument, body, navigation, mainContent,\
      \ title, heading, subheading, paragraph, codeBlock, imageBlock, renderReference)\n\nimport Html exposing (Html, div,\
      \ nav, main, h1, h2, h3, p, img, pre, figure, a, span)\nimport Html.Attributes exposing (style, src, href, target, rel,\
      \ hidden, type_)\nimport Html.Styled.Attributes as Attributes exposing (css)\nimport Document exposing (Inline, FlatInline,\
      \ Key, Text, Link, Reference, Code, Image)\n\n\ntype alias Rendered msg =\n    Html msg\n\n\n-- Navigation\nnavigation\
      \ : Rendered msg\nnavigation =\n    Html.nav\n        [ css [ Css.marginBottom (rem 1) ]\n        ]\n        [ navLink\
      \ \"Go back to overview\" Route.Index\n        ]\n\n\nnavLink : String -> Route -> Rendered msg\nnavLink text route\
      \ =\n    viewLink\n        { url = Route.toPath route\n        , text = [ Html.text text ]\n        , styles = [ Css.fontStyle\
      \ Css.italic ]\n        }\n\n\n-- Document rendering\nrenderDocument : Article -> Rendered msg\nrenderDocument article\
      \ =\n    article.document\n        |> List.map renderBlock\n        |> document\n\n\nrenderBlock : Block -> Rendered\
      \ msg\nrenderBlock block =\n    case block of\n        Title content ->\n            title content\n\n        Heading\
      \ contents ->\n            heading contents\n\n        Subheading contents ->\n            subheading contents\n\n \
      \       Paragraph contents ->\n            paragraph [] contents\n\n        CodeBlock code ->\n            codeBlock\
      \ code\n\n        ImageBlock image ->\n            imageBlock image\n\n\n-- Landmarks\nbody : List (Rendered msg) ->\
      \ Rendered msg\nbody content =\n    Html.div\n        [ css\n            [ Css.padding (rem 1)\n            , Css.maxWidth\
      \ (rem 48)\n            , Css.margin Css.auto\n            ]\n        ]\n        content\n\n\nmainContent : List (Rendered\
      \ msg) -> Rendered msg\nmainContent contents =\n    Html.main_ [] contents\n\n\n-- Text\ntitle : String -> Rendered\
      \ msg\ntitle text =\n    Html.h1\n        [ css\n            [ headingStyle\n            , Css.fontSize (rem 1.5)\n\
      \            ]\n        ]\n        [ Html.text text ]\n\n\nheading : List (Inline Path) -> Rendered msg\nheading contents\
      \ =\n    Html.h2\n        [ css\n            [ headingStyle\n            , Css.fontSize (rem 1.25)\n            ]\n\
      \        ]\n        (List.map renderInline contents)\n\n\nsubheading : List (Inline Path) -> Rendered msg\nsubheading\
      \ contents =\n    Html.h3\n        [ css\n            [ headingStyle\n            , Css.fontSize (rem 1.1)\n       \
      \     ]\n        ]\n        (List.map renderInline contents)\n\n\nparagraph : List Css.Style -> List (Inline Path) ->\
      \ Rendered msg\nparagraph styles content =\n    Html.p\n        [ css (paragraphStyle :: styles)\n        ]\n      \
      \  (List.map renderInline content)\n\n\ncodeBlock : Document.Code -> Rendered msg\ncodeBlock code =\n    Html.pre [\
      \ css [ codeBackgroundStyle, Css.padding (em 1) ] ]\n        [ Html.code [ css [ codeFontStyle ] ] [ Html.text code.src\
      \ ] ]\n\n\nimageBlock : Document.Image Path -> Rendered msg\nimageBlock image =\n    Html.figure\n        [ css\n  \
      \          [ Css.margin2 paragraphSpacing zero\n            , framedStyle\n            ]\n        ]\n        [ Html.a\n\
      \            [ Attributes.href <| Path.toAbsolute image.fallbackSource.source.src\n            , Attributes.target \"\
      _blank\"\n            , Attributes.rel \"noopener\"\n            ]\n            [ Html.img\n                [ Attributes.src\
      \ (Path.toAbsolute image.fallbackSource.source.src)\n                , Attributes.alt image.alt\n                , Attributes.width\
      \ image.fallbackSource.source.width\n                , Attributes.height image.fallbackSource.source.height\n      \
      \          , css\n                    [ Css.display Css.block\n                    , Css.maxWidth (pct 100)\n      \
      \              , Css.width (pct 100)\n                    , Css.height Css.auto\n                    ]\n           \
      \     ]\n            ]\n        , Html.figcaption\n            [ css\n                [ Css.boxSizing Css.borderBox\n\
      \                , Css.width (pct 100)\n                , Css.padding (rem 0.5)\n                ]\n            ]\n\
      \            [ Html.text image.caption ]\n        ]\n\n\n-- Text styles\nheadingStyle : Css.Style\nheadingStyle =\n\
      \    Css.batch\n        [ headingFontFamily\n        , Css.fontWeight Css.bold\n        , Css.margin zero\n        ,\
      \ Css.lineHeight (num 1.2)\n        ]\n\n\nparagraphStyle : Css.Style\nparagraphStyle =\n    Css.batch\n        [ paragraphFontStyle\n\
      \        , Css.margin zero\n        ]\n\n\ncodeFontStyle : Css.Style\ncodeFontStyle =\n    Css.batch\n        [ Css.whiteSpace\
      \ Css.preWrap\n        , Css.fontFamilies [ \"Source Code Pro\", \"monospace\" ]\n        ]\n\n\ncodeBackgroundStyle\
      \ : Css.Style\ncodeBackgroundStyle =\n    Css.batch\n        [ Css.borderRadius (em 0.2)\n        , Css.backgroundColor\
      \ (Css.hsla 0 0 0.5 0.15)\n        , Css.padding2 (em 0.05) (em 0.2)\n        , Css.fontSize (em 0.95)\n        ]\n\n\
      \nframedStyle : Css.Style\nframedStyle =\n    let\n        spacing =\n            0.5\n    in\n    Css.batch\n     \
      \   [ framedBorderStyle\n        , Css.borderRadius (rem spacing)\n        ]\n\n\nframedBorderStyle : Css.Style\nframedBorderStyle\
      \ =\n    Css.border3 (px 1) Css.solid borderColor\n\n\nparagraphSpacing : Css.Rem\nparagraphSpacing =\n    rem 1\n\n\
      \nborderColor : Css.Color\nborderColor =\n    Css.hsla 0 0 0 0.25\n\n\nparagraphFontStyle : Css.Style\nparagraphFontStyle\
      \ =\n    Css.batch\n        [ Css.lineHeight (num 1.35)\n        ]\n\n\n-- Helper functions\nrenderInline : Inline Path\
      \ -> Rendered msg\nrenderInline inline =\n    case inline of\n        TextInline text ->\n            renderText []\
      \ text\n\n        LinkInline link ->\n            renderLink link\n\n        ReferenceInline reference ->\n        \
      \    renderReference reference\n\n        CodeInline code ->\n            renderCode code\n\n        KeysInline keys\
      \ ->\n            renderKeys keys\n\n\nrenderText : List Css.Style -> Text -> Rendered msg\nrenderText extraStyles text\
      \ =\n    let\n        italic =\n            if text.style.emphasized then\n                [ Css.fontStyle Css.italic\
      \ ]\n\n            else\n                []\n\n        styles =\n            italic ++ extraStyles\n    in\n    if text.style.emphasized\
      \ then\n        Html.em [ css styles ] [ Html.text text.content ]\n\n    else if List.isEmpty styles then\n        Html.text\
      \ text.content\n\n    else\n        Html.span [ css styles ] [ Html.text text.content ]\n\n\nrenderLink : Link -> Rendered\
      \ msg\nrenderLink link =\n    viewLink\n        { text = List.map (renderText []) link.text\n        , url = Url.toString\
      \ link.url\n        , styles = []\n        }\n\n\nviewLink : { text : List (Rendered msg), url : String, styles : List\
      \ Css.Style } -> Rendered msg\nviewLink { text, url, styles } =\n    let\n        unvisitedColor =\n            Css.rgb\
      \ 22 22 162\n\n        visitedColor =\n            Css.inherit\n    in\n    Html.a\n        [ Attributes.href url\n\
      \        , css\n            ([ Css.color unvisitedColor\n             , Css.visited\n                [ Css.color visitedColor\n\
      \                ]\n             , hover\n                [ Css.textDecorationStyle Css.dotted\n                ]\n\
      \             ]\n                ++ styles\n            )\n        ]\n        text\n\n\nrenderReference : Reference\
      \ Path -> Rendered msg\nrenderReference reference =\n    viewLink\n        { text =\n            List.map\n        \
      \        (renderText\n                    [ Css.fontWeight Css.bold\n                    , Css.fontSize (em 0.8)\n \
      \                   ]\n                )\n                reference.text\n        , url = Path.toAbsolute reference.path\n\
      \        , styles = []\n        }\n\n\nrenderCode : Code -> Rendered msg\nrenderCode code =\n    Html.code\n       \
      \ [ css [ codeFontStyle, codeBackgroundStyle ]\n        ]\n        [ Html.text code.src ]\n\n\nrenderKeys : Keys ->\
      \ Rendered msg\nrenderKeys keys =\n    case keys of\n        ( first, [] ) ->\n            renderKey first\n\n     \
      \   ( first, rest ) ->\n            Html.kbd [ css [ Css.whiteSpace Css.preWrap ] ]\n                (List.map renderKey\
      \ (first :: rest)\n                    |> List.intersperse (Html.text \"+\\u{200B}\")\n                )\n\n\nrenderKey\
      \ : Key -> Rendered msg\nrenderKey key =\n    let\n        keyBorderColor =\n            Css.hsl 0 0 0.75\n\n      \
      \  keyText =\n            case key of\n                Letter l ->\n                    String.fromChar l\n\n      \
      \          Ctrl ->\n                    \"Ctrl\"\n\n                Shift ->\n                    \"Shift\\u{00A0}⇧\"\
      \n\n                Enter ->\n                    \"Enter\\u{00A0}↵\"\n\n                Tab ->\n                  \
      \  \"Tab\\u{00A0}↹\"\n\n                Up ->\n                    \"↑\\u{00A0}up\"\n\n                Down ->\n   \
      \                 \"↓\\u{00A0}down\"\n    in\n    Html.kbd\n        [ css\n            [ codeFontStyle\n           \
      \ , Css.fontSize (em 0.8)\n            , Css.padding2 (em 0) (em 0.1)\n            , Css.border3 (px 1) Css.solid keyBorderColor\n\
      \            , Css.borderRadius (em 0.2)\n            , Css.boxShadow5 Css.inset zero (px -1) zero keyBorderColor\n\
      \            , Css.verticalAlign Css.center\n            , Css.whiteSpace Css.pre\n            ]\n        ]\n      \
      \  [ Html.text keyText ]\n```"
