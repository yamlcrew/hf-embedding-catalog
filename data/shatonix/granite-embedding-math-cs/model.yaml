  - "Context: \nAnswer: SMTP is a push protocol for sending emails, while IMAP (Internet Message Access Protocol) is a pull\
    \ protocol for retrieving emails from a server. IMAP allows users to manage emails on the server (e.g., filtering, searching),\
    \ whereas SMTP only transmits messages. IMAP is preferred for client access because it enables asynchronous retrieval,\
    \ supports offline use, and maintains email state across devices, unlike SMTP's stateless nature."
  - "Context: \nAnswer: ```cpp\n#include <stdexcept>\n#include <vector>\n\n#include \"mex.h\"\n\n#include \"view.cuh\"\n#include\
    \ \"morph.cuh\"\n#include \"strel.cuh\"\n#include \"flat_linear_morph.cuh\"\n\n#include \"mex_common.cuh\"\n\ntemplate\
    \ <class Ty>\nvoid flatLinearMorphOp(mxArray *mxRes, const mxArray *mxVol, const std::vector<gpho::LineSeg>& lines,\n\
    \    int op, int3 blockSize);\n\nvoid mexFunction(int nlhs, mxArray *plhs[], int nrhs, const mxArray *prhs[])\n{\n   \
    \ // Validate inputs (to be implemented)\n\n    // Allocate output (to be implemented)\n\n    // Extract line segments\
    \ (to be implemented)\n\n    // Run function (to be implemented)\n}\n\ntemplate <class Ty>\nvoid flatLinearMorphOp(mxArray\
    \ *mxRes, const mxArray *mxVol, const std::vector<gpho::LineSeg>& lines,\n    int op, int3 blockSize)\n{\n    gpho::HostView<Ty>\
    \ res(static_cast<Ty *>(mxGetData(mxRes)), volSize(mxRes));\n    gpho::HostView<const Ty> vol(static_cast<const Ty *>(mxGetData(mxVol)),\
    \ volSize(mxVol));\n\n    switch (op) {\n    case MOP_DILATE:\n        gpho::flatLinearDilateErode<gpho::MORPH_DILATE>(res,\
    \ vol, lines, blockSize);\n        break;\n    case MOP_ERODE:\n        gpho::flatLinearDilateErode<gpho::MORPH_ERODE>(res,\
    \ vol, lines, blockSize);\n        break;\n    default:\n        abortWithMsg(\"invalid morphology op\");\n    }\n}\n\
    ```"
