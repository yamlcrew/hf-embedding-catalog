  - ' Davacı vekili dava dilekçesinde özetle: Davalı ... Mühendislik Şti ile aralarında karşılıklı ticari ilişki bulunduğunu,
    davalıdan alınan mallar karşılığında çek verildiğini ve davacıya verilen mallar karşılığında da davalıdan çek aldıklarını,
    ancak kendilerinin çeklerinin günü geldiğinde çek bedellerini ödemelerine rağmen, davalının kendilerine verdiği çeklerin
    günü gelip bankaya ibraz edildiğinde karşılıklarının olmadığını, karşılıksız kaldığını, buna göre hali hazırda davalıdan
    sadır olmuş çeklerin karşılıksız kalması nedeniyle 768.771,72 TL alacaklı olduklarını, vadesi gelmeyen 2 adet çekin de
    karşılıksız kalması halinde davalıdan 1.018.771,72 TL alacaklı olacaklarını, davalıya verilen 4 adet (... 05.08.2018 tarihli
    100.000,00 TL, ... Bankası 04.08.2018 tarihli 100.000,00 TL, ... 05.09.2018 tarihli 250.000,00 TL ve ... 05.09.2018 tarihli
    250.000,00 tamamı ileri vadeli çekten)  toplam 700.000,00 TL yönünden takas-mahsup hükümleri uygulanarak borçlu olmadıklarının
    tespitini ve tedbir talep etmiş sonuç talep olarak da 4 adet 700.000,00 TL''lik çeklerden dolayı takas mahsup talebi ve
    hükümleri doğrultusunda davalıya borçlu olmadığının tespitine, çeklerin iptali ve istirdatına ilişkin talepte bulunmuştur.Davalı
    tarafa usulüne uygun tebliğe rağmen davaya cevap vermediği görülmüştür.'
