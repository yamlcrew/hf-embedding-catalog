    bu ödemenin rücuen tazmini amacıyla .... İcra Müdürlüğünün ... E. Sayılı dosyası ile icra takibi başlattıklarını, davalının
    itirazı üzerine takibin durduğunu belirterek, davanın kabulü ile itirazın iptaline, davalı aleyhine %20''den az olmamak
    üzere icra inkar tazminatına hükmedilmesine karar verilmesini talep ve dava etmiştir. '
  sentences:
  - Davacı vekili dava dilekçesinde özetle; Davacı ...’ın ... ...’nde 23/07/2013-11/06/2015 tarihlerinde başkanlık yaptığını,
    Kulübe nakit sağlamak amacıyla davalı ... ile anlaşma yaptığını,  Faktoring İşlemlerinde Uygulanacak Usul ve Esaslar Hakkında
    Yönetmelik' in 8.Maddesinde " Müşterilerden ek teminat mahiyetinde olmak üzere devralınan ve fatura veya fatura yerine
    geçen belgeler ile ilişkili olmayan kambiyo senedi veya diğer senetlerin tahsil edilebilmesi için; a) Alacağın vadesinde
    ödenmeyip   sorunlu hale gelmiş olması, alınan kambiyo senedi veya diğer senet karşılığında hiçbir şekilde kambiyo senedi
    ve diğer senedin ilgililerine finansman sağlanmaması, kuruluşun işlem ve muhasebe kayıtlarında ek teminat mahiyetinde
    alınan kambiyo senedi veya diğer senedin ilgili borcun teminatı karşılığında alındığına ilişkin kayıt düşülmesi Gerekir."
    maddesinde de görüleceği üzere faktoring şirketinin müşterilerden ek teminat talep edebileceğini, nitekim bunun dışında
    kambiyo senetlerinde faktoring şirketlerinin lehtar vasfına sahip olabilmesinin mümkün olmadığını, dolayısıyla alacağın
    temlikini içermeyen bir işlemin faktoring kapsamında değerlendirilebilmesinin de bu işlemlerin özüne aykırı olacağını,  yasal
    düzenlemelerin Yargıtay içtihatları ve doktrin uygulamalarının bir sonucu olarak davalı tarafın takibe dayanak yaptığı
    5 adet bononun davalı taraf ile spor kulubü arasında imzalanan faktoring sözleşmesinin teminatı kapsamında verilmiş olup
    söz konusu senetlerin teminat niteliğine haiz olduğunu, teminat  senedine konu olan borcun ödendiğini, bu nedenle davalı
    tarafın takibinde kötüniyetli ve ağır kusurlu olduğunu,  müvekkilinin .... Derneği' ne 23.07.2013 tarihinde başkan seçildiğini
    ve söz konusu görevi 11.06.2015 tarihine kadar sürdürdüğünü, bununla birlikte dosya kapsamında da mevcut bulunan ... müvekkilinin
    başkan olarak görev yaptığı yılları kapsayan Haziran 2013- Haziran 2015 dönemine ait temlik borçlanma ve ödeme bilgilerine
    ilişkin evrakta da açıkça görüleceği üzere müvekkili döneminde gerçekleşen temliklerin karşılığının muhtelif tarihlerde
    alacaklı olduğunu iddia eden ...' ne ödendiğini,  ayrıca davalı tarafça ... Noterliği'nin ... yevmiye nolu müvekkiline
    çekilen ihtarnamede "... nezdindeki kulüp atacaklarının temliki karşılığı kullandırılan finansmanın 25.525.706,07 TL'ye
    ulaştığını, ...' ın sorumlu olduğu tutarın 20.500.000 TL olduğunu kulübün içinde bulunduğu sportif mali koşullar nedeniyle
    alacağın geri ödenmesi ciddi anlamda tehlikeye düşülmüş durumda olup, müvekkili ile kulüp arasındaki sözleşme ve bilcümle
    ekleri çerçevesinde hesabın kat edildiği" ihtar edildiğini, müvekkili tarafından 30.11.2018 Tarihinde davalı tarafa çekilen
    ... Noterliği' nin ... yevmiye nolu cevab-ı ihtarnamede borcun Ödendiğinden bahisle hesabın kat edilmesine itiraz edildiğini,
    davalı tarafından çekilen ihtarnamede de açıkça görüleceği üzere senetlerden hiç bahsedilmediğini; sadece ...' ye yapılan
    temlikten bahsedildiğini, dosyanın eki olarak sunulan ...' den 17.12.2018 tarihinde alınan belgeyle ihtarnameye konu olan
    borcun ödendiğinin açıkça anlaşılacağını, dolayısıyla faktoring şirketinin müvekkilinin başkanlığı döneminde doğmuş bulunan
    alacaklarını almış olmasına rağmen tamamen kötüniyetli olarak iş bu takibe giriştiğini, zira ... kayitlarinda da görüleceği
    üzere söz konusu borcun itfa sebebiyle sona erdiğini,  incelendiğinde görüleceği üzere ekte sundukları ...' den alınan
    resmi belgede 7.000.000 TL lik temlik sarı ile belirtilen şekilde, 9.000.000 TL'ük temlik turuncuyla belirtilen şekilde,
    8.500.000 TL lik temlik yeşil ile belirtilen şekilde, 1.500.000 tl'lik temlik kırmızı renkte belirtilen şekilde ödendiğini,
    davalı yanın, taraflarınca ... İcra Hukuk Mahkemesi' nin ... E. numarası ile takibin iptaline ilişkin açılan davaya verdikleri
    cevapta hiçbir şekilde bu senetlerin neye karşılık alındığını, hangi borcun teminatı olduğunu veya direkt kulübe ve müvekkiline
    verilen hangi paranın karşılığı alındığı konusunda hiçbir beyanda bulunmadığını, davalı şirket yetkilileri hakkında Bedelsiz
    senedi kullanma, açığa atılan imzanın kötüye kullanılması ve resmi belgede sahtecilik suçlarından ... CBS' nın ... sor
    nolu dosyası İle suç duyurusunda bulunulduğunu,   müvekkilinin borcu olmayan ve vadesi sonradan doldurularak takibe konulan
    senetler nedeniyle haksız bir icra takibine maruz kaldığını ifade ederek müvekkilinin .... İcra Müdürlüğü' nün ... E.
    sayılı Dosyası ile Davalıya Borçlu olmadığının tespitine ve takibe dayanak senederin iptaline, davalıların %20'den aşağı
    olmamak üzere kötüniyet tazminatına mahkum edilmesine, yargılama giderlerinin  davalı tarafa  yükletilmesine  karar verilmesini
    talep ve  dava etmiştir.
  - ' Davacı vekili dava dilekçesinde özetle, davalı ... şirketine ...... sigortalı, müvekkiline ait ....... plakalı aracın
