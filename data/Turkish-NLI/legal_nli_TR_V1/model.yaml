    dosyasına yaptığı itirazın iptaline, icra inkar tazminatına hükmedilmesine karar verilmesini talep ve dava etmiştir.'
- source_sentence: " davacı vekilince süresinde istinaf kanun yoluna başvurulması üzerine dosya incelendi, gereği konuşulup\
    \ düşünüldü. \tDAVA\tDavacı vekili dava dilekçesinde özetle; 10.09.2018 tarihinde yapılan olağanüstü genel kurulda alınan\
    \ kararla şirketin sermayesinin 85.200,00 TL daha arttırılmasına, bunun 19.676.813,95 TL'sinin iç kaynaklardan sermayeye\
    \ eklenmesine, 65.523.186,05 TL'nin ise nakit olarak şirket hissedarlarının rüçhan haklarını kullanmaları suretiyle paylarına\
    \ tekabül eden sermayeleri karşılığı ödenmesi gereken miktardan karşılanmasına karar verildiğini, kararın 22.11.2018 tarihinde\
    \ ticaret siciline tescil edildiğini ve 27.11.2018 tarihli Türkiye Ticaret Sicil Gazetesinde ilan edildiğini, aile şirketi\
    \ olan davalı şirketin çoğunluk oyuna istinaden ....tarafından hukuken ve fiilen idare edildiğini, şirket kurulduğundan\
    \ bu yana hiç kar dağıtımı yapılmadığını, müvekkilinin Ankara Batı Asliye Ticaret Mahkemesi'nin .... Esas sayılı dosyasıyla\
    \ şirketin feshini talep ettiğini, 2014 yılından beri 3 kez karar alınarak sermaye arttırımına gidildiğini, sermaye arttırımlarının\
    \ temel nedeninin müvekkilinin şirketten çıkması halinde hissesinin azaltılması olduğunu, şirketin sermayesinin arttırılmasını\
    \ gerektirir TTK'nın376. Maddesindeki sebeplerden birinin bulunmadığını, müvekkilinin önceki artırımda katılım taahhüdünde\
    \ bulunamadığını, dolayısıyla şirketteki 8.400/28.000 olan hissesinin 8.400/90.000 hisseye düştüğünü, müvekkilinin bu\
    \ artışla şirketteki pay oranının daha da düşeceğini, müvekkilinin sermaye artışında rüçhan hakkını kullanacak ekonomik\
    \ gücünün bulunmadığını sermaye artırım kararlarının MK'nın 2. Maddesindeki dürüstlük kuralına aykırı olarak çoğunluğun\
    \ azınlığı ezecek şekilde alınmasının hukuken korunamayacağını, şirketin feshi davası devam ederken, hiçbir finansal zorunluluk\
