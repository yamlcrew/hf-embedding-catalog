    takip yapılmasının engellenmesine, ihtiyati haciz kararlarının uygulanmasının önlenmesine, rehinin paraya çevrilmesi yoluyla
    yapılmış ve yapılacak takiplerle satışların durdurulmasına, davacı şirketler aleyhine yapılmış ve yapılacak her türlü
    muhafaza, teslim ve tahliyyeye dair icra işlemlerin durdurulmasına, muhafaza altına alınmış veya alınacak emtia, taşıt,
    makine teçhizat, leasing kapsamı tüm makine, cihaz, taşıt vs. değerlerlerin iade edilmesine, şirketlerin projesinin hayata
    geçirilmesi için zorunlu olan elektrik, doğalgaz, su ve sabit telefonlarının kesilmemesine, yurt dışından gelen hizmet
    bedellerinin ( akreditifin yahut sair şekilde ) bankalarca el konulmasının engellenmesine, davacı şirketlerin temsil ve
    ilzam yetkilerini aynen devam ettirebilmek için müvekkili şirkete kayyım atanımasına, sermaye artışı, alacakların tahsili,
    tasarruf tedbirleri ve faaliyetlerin sürdürebilmesi suretiyle borca batıklıktan kurtulabileceğini ileri sürerek iflaslarının
    bir yıl süre ile ertelenmesine karar verilmesini talep ve dava etmiştir. '
- source_sentence: 'Davacı vekili dava dilekçesinde özetle; müvekkillerden ... AŞ. nin Tekstil, Matbaa, Hizmet ve İnşaat sektörlerinde
    faaliyet gösteren şirketlerde ortaklığı bulunan ve bu şirketlerin faaliyederi neticesinde elde edilen kan ortaklatma dağıtmayı
    amaçlayan bir yatırı şirketi olduğunu, müvekkili şirket 2006 yılında Türkiye'' de hareketlenen İnşaat sektöründe yer almak
    amacıyla araştırmalar yaptığını, sektörde birlikte yol alabileceği kişi ve şirketleri bir araya getirerek 2006 yılında
    kurulan ... AŞ.'' nin kuruluşuma önayak olduğunu, 2008 yılında yapılan 2006-2007 yıllanna ait ekli Genel Kurul Toplantı
    tutanağı ve hazirun cetveline göre şirket ortaklannın ... AŞ., ... , ... AŞ., ... ve şehir planlayıcısı ... olduğunu,
    şirketin kuruluş amacı doğrultusunda sermayelerini bir araya getiren ... ve ... dava dışı ... Sanayi AŞ. adına kayıtlı
    bulunan 14 dönümlük bir araziyi almak için protokol imzaladığını, imzalanan protokol neticesinde satış sözleşmesine konu
    taşınmaz alımı için protokolde belirlenen %75 lik tutar şirket sermayesinden karşılanmak sureti ile dava dışı şirkete
    kapora verildiğini, ancak söz konusu arealann başka kişilere satıldığını, davalı ... AŞ. vermiş olduğu parayı alabilmesi
    için yapılan yargılama neticesinde dosyadan elde edilen kök ve ek bilirkişi raporu sonucunda dava dışı şirketin davalı
    şirkete 7.930.000,00.-TL borçlu olduğunun tespit edildiğini, davalı şirketin kurulduğu günden bu yana geçen zaman zarfında
    bir kısım faaliyetlerde bulunmuş ise de uzun zamandır gayri faal durumda olduğunu, ticaret sicilde yer alan adresinde
    de bulunmadığım, davalı şirketin 2011 ve 2012 yılı hesap dönemine ilişkin yapılacak olan Olağan Genel Kurul Toplantısının
    davalı şirketin alacaklısı olduğu ... San. AŞ, nin adresinde yapılacağının açıklandığını, şirketin merkezi yerine Olağan
    Genel Kurul Toplantılarını şirket sermayesinin yansından fazlasını alacaklı olduğu borçlusunun adresinde yapılmak istenmesinin
    müvekkillerinin ortaklık haklanna zarar verme kastı içerisinde Yönetim Kurulu Üyelerinin birlikte hareket ettiğinin göstergesi
    olduğunu, 28/10/2013 tarihli toplantıda müvekkillerinin ortağı olduğu davalı şirketin Yönetim Kurulu Üyesi ve imza yetkisi
    olan ...  şirket sahibi olduğu hisselerin neredeyse tamamını dava dışı ... San. AŞ. ye satarak devretmiş bulunduğunu,
    davalı şirketin uzun zamandır gayri faal olduğunu ve dava dışı şirketten ... Asliye Ticaret Mahkemesinin ... E. sayılı
    dosyasından alınan raporu ile faizleri ile birlikte 13.000.000,00.-TL alacaklı olduğunu beyanla neticeten davanın esasına
    ilişkin ihdas edilene kadar ihtiyati tedbir karan verilmesi suretiyle Şirket Yönetim Kurulu yerine görev yapmak ya da
    yönetim kurulu üyelerinin kararlannı denetlemek üzere kayyum atanmasına; davalı ... AŞ nin gerek gayri faal olması, gerek
    son yaşanan hisse devirleri İle 15/09/2008 tarihi itibariyle 7.930.670,00.-TL alacaklı olduğu şirketin çoğunluk hisselerini
    ele geçirmesi neticesinde bahse konu alacağının tahsilinin imkansız hale gelmesi sebebiyle TTK 531. maddesi hükümleri
    uyarınca müvekkillerin ticari ortaklığa devam etmemekte hukuki ve ticari menfaaderinin varlığı gözetilerek feshine karar
    verilmesine, yargılama giderleri ile ücreti vekaletin karşı tarafa yükletilmesine karar verilmesini talep ve dava etmiştir. '
