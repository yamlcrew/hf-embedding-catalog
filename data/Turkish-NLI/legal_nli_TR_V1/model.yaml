    ve Ticaret Limited Şirketi''nin  ihyasına karar verilmesini talep ve dava etmişlerdir.DELİLLERİstanbul Ticaret Sicil Müdürlüğü
    yazı cevabı ve tüm dosya kapsamı.DELİLLERİN DEĞERLENDİRİLMESİ VE GEREKÇE:İş bu dava, hukukî niteliği itibariyle TTK''nun
    545.ve devamı maddeleri uyarınca açılmış limited şirketin ihyası ile ticaret siciline tescili davasıdır. İstanbul Ticaret
