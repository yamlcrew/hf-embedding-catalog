  - ' Davacı vekili dava dilekçesinde özetle; 23.02.2009 tarihinde dava dışı sürücü ... ... sevk ve idaresindeki ... plakalı
    aracı ... Mahallesi üzerinde ... Köyü istikametine seyir halinde iken yaya olarak yürümekte ve kucağında çocuğu ... ...
    bulunan müvekkil ... ...''a çarptığını, meydana gelen kazada ... ... vefat ettiğini, kazaya karışan ... plakalı aracın
    sigorta kaydı bulunmadığından/tespit edilemediğinden müvekkilin uğradığı maddi zararın giderilebilmesi için işbu davayı
    ... ...na karşı açma mecburiyeti hasıl olduğunu, kaza sebebi ile ölen ... ...''un desteğinden yoksun kalanlar olarak annesi
    ... ... ve babası ... ...''un kaldığını, müvekkillerin kaza tarihinde henüz 4 yaşında olan çocuklarını kaybetmiş, şahsın
    ölümü ile perişan bir duruma düştüklerini, destek bilindiği üzere yakınlarına ve yakın ilişkide bulunduğu başka kimselere
    sürekli ve düzenli bir biçimde yardım eden, eğer ölmeseydi ileride yardım etmesi beklenen veya büyük bir olasılıkla yardım
    edecek olan kişi olduğunu, dolayısıyla müvekkillerin, müteveffanın vefatı ile destekten yoksun kaldıkları açık olduğunu,
    zira ölenin henüz 4 yaşında bir çocuk olması göz önüne alındığından, eğer ölmeseydi ileride ailesine sürekli ve düzenli
    bir şekilde destek olacağının muhakkak olduğunu, hayatının her anında meydana gelen bu zamansız ölümü hatırlayıp, içlerinde
    derin sızılar yaşayacak olan müvekkillerin ruh sağlığı derin ve onarılmaz derecede bozulduğunu, müvekkillerin destekten
    yoksun kalmadan doğan zararları Sayın Mahkemece yaptırılacak bilirkişi incelemesi sonucunda ortaya çıkacağından fazlaya
    ilişkin dava ve talep haklarımız saklı kalmak kaydıyla, şimdilik 3.000,00 TL destekten yoksun kalma tazminatının davalıdan
    tahsilini talep ettiklerini, Yargıtay Genel Hukuk Kurulu açılan bir dava üzerine trafik kazasında ölen kişinin tam kusurlu
    olsa da yakınlarına tazminat ödenmesini kararlaştırıldığını,işbu nedenlerle, şimdilik kaza tarihinden itibaren işleyecek
    reeskont faizi ile birlikte 3.000,00 TL maddi tazminatın davalıdan tahsiline, yargılama giderleri ve vekalet ücretinin
    davalı üzerine bırakılmasına karar verilmesini iddia ve talep etmiştir.'
- source_sentence: 'Davacı vekili dava dilekçesinde ÖZETLE;  vekil edeninin terkin edilen ve ihyası talep edilen ...Sanayi
