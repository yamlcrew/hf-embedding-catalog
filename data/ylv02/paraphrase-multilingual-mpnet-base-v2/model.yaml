    sentences:
    - '  RMIT UNIVERSITY COMMITMENT       RMIT is committed to the rights of students and staff to be safe, respected, valued,
      and treated as an equal in their place of study and work.  All staff are expected to share this commitment and contribute
      to a safer community. While carrying out their role, staff are in a position of trust with students.  Staff have a duty
      of care to report wellbeing concerns about students through the designated channels and uphold to the code of conduct.
      RMIT Vietnam expects all staff members to comply with its Code of Conduct, policies and procedures, which relate to
      legal and regulatory requirements and our ways of working.      WHY RMIT UNIVERSITY VIETNAM       RMIT Vietnam is committed
      to excellence, innovation, and social responsibility. We welcome applications from qualified and passionate individuals
      who share our values and vision. RMIT University has a global reputation and ranks 140th globally and 11th in Australia
      in QS World University Rankings 2025.      Rewards and Benefits:      Competitive salary package and allowances   Expatriate
      candidates : Generous relocation allowance. Educational support up to US$20,000 per child annually, up to 2 children
      per family; private insurance coverage for staff and family; annual health checkup; Work Permit for staff, Visa and
      temporary resident cards for family members.  Expert support from our Mobility Team with regards to obtaining a work
      permit and visas, and with relocation and settling into living and working in Vietnam.   Local candidates : 13th month
      Tet bonus &#43; private medical insurance (for you and your dependents) &#43; annual health check.  Generous annual
      leave, career leave and public holidays (Christmas and Tet Holidays)  Professional development and career advancement  Access
      to state-of-the-art facilities and resources  A vibrant and diverse campus life and more!   RMIT Vietnam has been honoured
      with the respectable HR Asia Award as Top Employer To Work For in Asia. To find out more about RMIT Vietnam and our
      current vacancies, please visit our website: https://www.rmit.edu.vn/careers       POSITION SUMMARY      RMIT Safer
      Community provides high level risk assessment, advice and support for the management of inappropriate, threatening and
      concerning behaviors involving students and support for staff regarding the management of students engaging in problematic
      behavior, within the bounds of the staff members role. It is the central point of enquiry, reporting and advice for
      sexual harm, family and domestic violence and provides support and advice on reporting with child safety related matters
      at RMIT University.     This position is responsible for coordinating a victim-centric approach to reports and supporting
      the work of the Safer Community team in delivering effective and responsive support to students experiencing or fearing
      harm. This is achieved with a thorough understanding of the University policies and processes available to address complex
      issues within the University setting and an in depth understanding of the importance of primary prevention work in this
      area.     This position is key to the University’s commitment to providing a specialist trauma-informed response to
      gender-based violence reports. The role is responsible for case management and the investigation reports of gender based
      violence cases from students and providing outcomes and recommendations to  the Academic Registrars Group                '
