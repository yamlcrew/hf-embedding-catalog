    to delivery sales order timely and efficiently.      DUTIES AND RESPONSIBILITIES      Import-Export:   - Managing Shipping/
    Logistics activities for all Inbound&#43; Outbound Shipments   - Customs compliance enhance for total Shipping/ Logistics
    activities.   - COO management for import/ export shipments   - Cost management for Import/ export activities and Logistics
    activities   Procurement:   - Oversee and manage the Procurement function, ensuring effective handling of all or specific
    segments. Foster collaborative partnerships with internal colleagues and suppliers to achieve agreed-upon business results
    while maintaining positive relations with employees and suppliers  - Play a key role in cultivating mutually beneficial
    relationships with the local community, customers, and regulatory agencies.  Material Planning:   - Develop Master Production
