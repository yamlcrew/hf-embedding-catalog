  - "Hi, my name is Amir. I am a Freelance artist working for Hit Box LLC, a Web 3.0 education platform, and a few NFT art\
    \ collectives. I have created art collections that have grossed +$40 million dollars in profit and I built the entire\
    \ visual style of the Hit Box Arcade brand over the course of the past decade. I'm looking to hire an Apprentice to help\
    \ me meet my deadlines. In exchange, I can offer good pay and artistic mentorship. We will be a good match if you are\
    \ interested in 2d Art, since that is my area of expertise. I will direct your art and design to match the level of quality\
    \ that's required for each job, and when the day gets slow, I'll be able provide mentorship in regards to your own artistic\
    \ development. \r\n\r\nThis Apprenticeship is for Intermediate to Professional level Artists that need the opportunity\
    \ to work in the industry and gain the skills necessary to take their career to the next level. \r\n\r\n---\r\n\r\nWhat\
    \ kind of art will we make?\r\n-Digitally Painted illustrations\r\n-2d Videogame asset creation / design\r\n-Logos\r\n\
    -Web Design\r\n-Product Design\r\n-Photo Manipulation and Clean-up\r\n-2d Animation\r\n\r\n---\r\n\r\nWork Hours\r\n-Weekdays\
    \ 10am to 6pm On-site\r\n-After we build trust, remote-work will be available on request\r\n\r\n---\r\n\r\nPay\r\n-Your\
    \ work hours will be counted by the end of the month and you will be paid accordingly. So, you will not be required to\
    \ work weekends or overtime, but you can work weekends, holidays, or over-time if you choose. \r\n-Bonuses will be rewarded\
    \ upon the completion of major projects if we work well together. \r\n*This can be double or triple your monthly salary\
    \ if we do a good job."
