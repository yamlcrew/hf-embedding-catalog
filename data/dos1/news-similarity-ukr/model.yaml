widgetData:
- source_sentence: до кінця року в україну поставлять 500 тисяч боєприпасів ліпавський
  sentences:
  - територіальні поступки та 20 років мораторію на нато посол гербст про те що трамп готує україні
  - трагедія у національному парку індії за три дні померло майже все стадо слонів
  - чехія пообіцяла поставити україні 500 тис боєприпасів до кінця року
- source_sentence: повітряні сили зсу повідомили про збиття 64 російських бпла протягом доби
  sentences:
  - сили оборони збили 64 російських бпла пс зсу
  - динамо ференцварош 01 онлайнтрансляція матчу ліги європи
  - рф вислала британського дипломата звинувативши його у шпигунстві
- source_sentence: у родині голови хмельницької мсек крупи знайшли пояснення не задекларованим мільйонам доларів
  sentences:
  - марина хонда понад 100 тис киян звернулися за матеріальною допомогою це дуже велика цифра
  - чи зможе рф захопити запоріжжя і херсон defense express про поповнення сил росіян на півдні
  - україна припинила дію угоди щодо повітряного сполучення з іраном
- source_sentence: сибіга зустрівся з леммі та скоординував кроки під час головування британії у радбезі оон
  sentences:
  - сибіга скоординував з леммі кроки під час головування британії в радбезі оон
  - скільки потрібно вагонів аби завантажити усіх росіян російське видання провело дивні підрахунки
  - підрив автомобіля офіцера чорноморського флоту в севастополі був операцією сбу джерело
- source_sentence: reuters трамп планує призначити ексглаву нацрозвідки гренелла на посаду спецпосланця по україні
  sentences:
  - росіяни атакували суми шахедами з новим зарядом щоб вбити якомога більше людей нові подробиці
  - біженці з курщини які лишилися без житла благають путіна закінчити війну
  - трамп розглядає кандидатуру ексголови розвідки гренелла на посаду спецпредставника по україні
