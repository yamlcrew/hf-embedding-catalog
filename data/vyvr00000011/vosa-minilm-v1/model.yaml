- source_sentence: How does Warehouse Master work?
  sentences:
  - 'This is where you pick which parameters will be visible to or changeable by the user when the job is ran.

    Since this job will be run in the background by FormWeaver, we will want to set each one to 3 for Non-display.

    The quickest way to do this is to press F15 twice. Press ENTER to create your new job. You will see the new

    job in the list.'
  - 'Term: Warehouse Master

    Definition: WM tables that define and control the basic operations of WM. The Warehouse Master allows you to customize
    WM to match your specific business and operational preferences. All of the following tables contain information defined
    using the Warehouse Master option: • Warehouse Master Table • Warehouse General Parameters Table • Warehouse Inbound Parameters
    Table • Warehouse Outbound Parameters Table'
  - 'Term: Export License

    Definition: A government document (also known as an "Individual Validated License") authorizing exports of specific goods
    in specific quantities to a particular destination. This document may be required in some countries for most or all exports
    and in other countries only under special circumstances.'
- source_sentence: How does Wave work?
  sentences:
  - 'Term: Allocable

    Definition: An inventory state in WM that refers to Business System (host) inventory that is available for allocation
    or assignment to customer orders. Also referred to as Available to Sell.'
  - 'Term: Business Host

    Definition: An enterprise computer responsible for controlling business functions such as purchasing, accounts payable,
    general ledger, and perpetual inventory information.'
  - 'Term: Wave

    Definition: A discrete set of activities with a clearly defined start and stop point. May refer to picking, packing, shipping,
    or replenishment. Generally, a wave has to do with the orderly use of a limited resource, that is, a shipping wave may
    be defined as the set of orders which fill the shipping dock space available for cases. A picking wave could be the picking
    necessary for a shipping wave.'
