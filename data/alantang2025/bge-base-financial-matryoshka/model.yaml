widgetData:
- source_sentence: We calculate our attrition rate at a point in time on a trailing twelve-month basis as of the end of each
    month.
  sentences:
  - What was the impact on income before taxes due to foreign currency exchange rate fluctuations in 2023, including hedging
    activities?
  - How is the company's attrition rate calculated?
  - What could cause variations in the estimated medical cost trends compared to actual outcomes?
- source_sentence: Restructuring costs for 2023 primarily consist of $292 million of compensation and benefits, $17 million
    of occupancy and equipment, and $181 million of other costs, totaling $495 million. There were no restructuring costs
    for 2022 and 2021.
  sentences:
  - How much did the unrecognized tax benefits increase in the year 2023 due to current year tax positions?
  - What was the total restructuring costs for 2023 and were there any such costs reported for 2022 and 2021?
  - How might monetary policy actions aimed at combating inflation impact currency exchange rates?
- source_sentence: At December 31, 2023, the company has federal net operating loss carryforwards of $109.6 million, of which
    $88.7 million is expected to be realized to reduce future federal taxable income.
  sentences:
  - How much federal net operating loss carryforwards did the company have at the end of 2023, and how much of it is expected
    to be realized?
  - What was Ford Motor Company's net income attributable for the year ending December 31, 2023?
  - What is the primary method by which the company manages its cash, cash equivalents, and marketable securities?
- source_sentence: In 2023 the Company’s Entertainment segment used production financing to fund certain of its television
    and film productions.
  sentences:
  - What types of stores does Helzberg Diamonds operate, and in what types of locations are they found?
  - What financial measures are presented on a non-GAAP basis in this Annual Report on Form 10-K?
  - How did the Company's Entertainment segment finance its television and film productions in 2023?
- source_sentence: The audited components of Salesforce, Inc.'s financial statements as of January 31, 2023, and for the three
    years ending on that date, included the consolidated balance sheets, the related consolidated statements of operations,
    comprehensive income, stockholders' equity, and cash flows.
  sentences:
  - What were the key components audited in Salesforce, Inc.'s financial statements for the years ending January 31, 2023?
  - Where can one find the details mentioned in Item 3 regarding Legal Proceedings?
  - How much did Medicare receivables increase from 2022 to 2023?
