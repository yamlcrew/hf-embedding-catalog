widgetData:
- source_sentence: Atherosclerosis and coronary heart disease are examples of what type of body system disease?
  sentences:
  - Diseases of the cardiovascular system are common and may be life threatening. Examples include atherosclerosis and coronary
    heart disease. A healthy lifestyle can reduce the risk of such diseases developing. This includes avoiding smoking, getting
    regular physical activity, and maintaining a healthy percent of body fat.
  - Osmosis Osmosis is the diffusion of water through a semipermeable membrane according to the concentration gradient of
    water across the membrane. Whereas diffusion transports material across membranes and within cells, osmosis transports
    only water across a membrane and the membrane limits the diffusion of solutes in the water. Osmosis is a special case
    of diffusion. Water, like other substances, moves from an area of higher concentration to one of lower concentration.
    Imagine a beaker with a semipermeable membrane, separating the two sides or halves (Figure 3.21). On both sides of the
    membrane, the water level is the same, but there are different concentrations on each side of a dissolved substance, or
    solute, that cannot cross the membrane. If the volume of the water is the same, but the concentrations of solute are different,
    then there are also different concentrations of water, the solvent, on either side of the membrane.
  - Circadian rhythms are regular changes in biology or behavior that occur in a 24-hour cycle. In humans, for example, blood
    pressure and body temperature change in a regular way throughout each 24-hour day. Animals may eat and drink at certain
    times of day as well. Humans have daily cycles of behavior, too. Most people start to get sleepy after dark and have a
    hard time sleeping when it is light outside. In many species, including humans, circadian rhythms are controlled by a
    tiny structure called the biological clock . This structure is located in a gland at the base of the brain. The biological
    clock sends signals to the body. The signals cause regular changes in behavior and body processes. The amount of light
    entering the eyes helps control the biological clock. The clock causes changes that repeat every 24 hours.
- source_sentence: How does a cell's membrane keep extracellular materials from mixing with it's internal components?
  sentences:
  - We know that the Universe is expanding. Astronomers have wondered if it is expanding fast enough to escape the pull of
    gravity. Would the Universe just expand forever? If it could not escape the pull of gravity, would it someday start to
    contract? This means it would eventually get squeezed together in a big crunch. This is the opposite of the Big Bang.
  - Physical properties that do not depend on the amount of substance present are called intensive properties . Intensive
    properties do not change with changes of size, shape, or scale. Examples of intensive properties are as follows in the
    Table below .
  - CHAPTER REVIEW 3.1 The Cell Membrane The cell membrane provides a barrier around the cell, separating its internal components
    from the extracellular environment. It is composed of a phospholipid bilayer, with hydrophobic internal lipid “tails”
    and hydrophilic external phosphate “heads. ” Various membrane proteins are scattered throughout the bilayer, both inserted
    within it and attached to it peripherally. The cell membrane is selectively permeable, allowing only a limited number
    of materials to diffuse through its lipid bilayer. All materials that cross the membrane do so using passive (non energy-requiring)
    or active (energy-requiring) transport processes. During passive transport, materials move by simple diffusion or by facilitated
    diffusion through the membrane, down their concentration gradient. Water passes through the membrane in a diffusion process
    called osmosis. During active transport, energy is expended to assist material movement across the membrane in a direction
    against their concentration gradient. Active transport may take place with the help of protein pumps or through the use
    of vesicles.
- source_sentence: An infection may be intracellular or extracellular, depending on this?
  sentences:
  - '22.3 Magnetic Fields and Magnetic Field Lines • Magnetic fields can be pictorially represented by magnetic field lines,
    the properties of which are as follows: 1. The field is tangent to the magnetic field line. Field strength is proportional
    to the line density. Field lines cannot cross. Field lines are continuous loops.'
  - Figure 24.13 The lifecycle of an ascomycete is characterized by the production of asci during the sexual phase. The haploid
    phase is the predominant phase of the life cycle.
  - Caffeine is an example of a psychoactive drug. It is found in coffee and many other products (see Table below ). Caffeine
    is a central nervous system stimulant . Like other stimulant drugs, it makes you feel more awake and alert. Other psychoactive
    drugs include alcohol, nicotine, and marijuana. Each has a different effect on the central nervous system. Alcohol, for
    example, is a depressant . It has the opposite effects of a stimulant like caffeine.
- source_sentence: What does water treatment do to water?
  sentences:
  - Some solutes, such as sodium acetate, do not recrystallize easily. Suppose an exactly saturated solution of sodium acetate
    is prepared at 50°C. As it cools back to room temperature, no crystals appear in the solution, even though the solubility
    of sodium acetate is lower at room temperature. A supersaturated solution is a solution that contains more than the maximum
    amount of solute that is capable of being dissolved at a given temperature. The recrystallization of the excess dissolved
    solute in a supersaturated solution can be initiated by the addition of a tiny crystal of solute, called a seed crystal.
    The seed crystal provides a nucleation site on which the excess dissolved crystals can begin to grow. Recrystallization
    from a supersaturated solution is typically very fast.
  - Figure 23.13, the esophagus runs a mainly straight route through the mediastinum of the thorax. To enter the abdomen,
    the esophagus penetrates the diaphragm through an opening called the esophageal hiatus.
  - Water treatment is a series of processes that remove unwanted substances from water. More processes are needed to purify
    water for drinking than for other uses.
- source_sentence: 'There are only four possible bases that make up each dna nucleotide: adenine, guanine, thymine, and?'
  sentences:
  - Metamorphism. This long word means “to change form. “ A rock undergoes metamorphism if it is exposed to extreme heat and
    pressure within the crust. With metamorphism , the rock does not melt all the way. The rock changes due to heat and pressure.
    A metamorphic rock may have a new mineral composition and/or texture.
  - Forest and Kim Starr (Flickr:Starr Environmental). Secondary succession occurs when nature reclaims areas formerly occupied
    by life . CC BY 2.0.
  - 'The only difference between each nucleotide is the identity of the base. There are only four possible bases that make
    up each DNA nucleotide: adenine (A), guanine (G), thymine (T), and cytosine (C).'
