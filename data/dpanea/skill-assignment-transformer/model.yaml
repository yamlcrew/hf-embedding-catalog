- source_sentence: "The water of life\nBeep Beep Beep! The obnoxious noise of John's alarm clock woke him up, this morning\n\
    was particularly quiet, then John realised that it was the water of life worship day. The water\nof life was a liquid\
    \ with the properties of water but gives anyone who srinks it immortality, it\nis in the middle of the town and every\
    \ year the citizens go there and have ten minutes of\nsilence it is because hundreds of years ago the town was targeted\
    \ by people as the majority\nof the citizens came there to escape from violence and such and one man drank the water\n\
    and with immortality he survived the swarms of attackers and scared them off. If someone\nwas to miss the water of life\
    \ worship day they would be disrespected by most of the towns\npeople.\nJohn rushed to the place when they when about\
    \ to beginthe ceremony and got there just on\ntime. He tripped over someones bag and fell into the well with the water\
    \ of life. As the town\nwas in the desert John never got swimming lessons and was not a good swimmer,\nstruggling in the\
    \ water, breathing frantically and trying with all his force to get out he\naccidently swallowed a mouthful of water when\
    \ he began to slow down running out of\nstrength he felt like he was being pulled up and he was. By what? how? John was\
    \ now\nstanding on the ground fully unharmed. Everyone was staring at him, soe random bloke\nfrom the crowd charged at\
    \ his back with a pocket knife, John felt an impact on his back but\nit didn't hurt at all. John had the sudden realisation,\
    \ everyone is now after him.\nhe ran as fast as he could but people were using cars to catch up to him. He saw something\n\
    in the corner of his eye and it was a cave. Jhon had no Idea how to get there without being\nseen. He tried his luck by\
    \ just stoppingand not getting seen. Jhon whas ran over by the car\nas if no one saw him, he felt weightless like he was\
    \ a floating mind and he overheard a bloke\nsay \"Where the hell did he go?\"\n\"I have no idea,\" another voice said\
    \ \"he is better off alone in the desert than in the town\nanyway\"\n\"I guess so\" said the first voice but with dissapointment\n\
    \"How about we go back now?\"\n\"Sure\"\nJhon was finally able to breathe normally. He started a fire in the cave to get\
    \ comfortable.\nJohn was trying to find food, in the distance the engines roared and John started to breathe\nquickly\
    \ again he started breathing quick again and the engine noise was getting closer and\ncloser and he hear another voice\
    \ yelling over the engines \"I see him!\"\n\"Get him. What are you doing? Waiting for the sun to explode?\" And soon enough\
    \ John was\nrunning but so tired and lethargic he couldn't run far so he was shoved into the back of the\ncar.\n\"What\
    \ happened?\" Said John sleepily\n\"Nothing, now answer us or you will be locked up.\"\n\"What?\" Replied John\n \"I said,\
    \ answer us or you will be locked up!\" Yelled the man. Jhon was confused and\nmanaged to run away with ease but everyone\
    \ was after him.\nHe had escaped although he didn't feel free, he met some people who had also escaped\nform the town\
    \ and they had made a camp that they planned to one day be a town. Suddenly\nJhon's phone rung and it was his friend \"\
    where are you mate? We've been looking for you.\"\nSaid his friend\n\"I've\nescaped you will hold me hostage!\" Yelled\
    \ John and hung up, he ran far away from the\ncamp to smash his phone so no one can track him. Jhon arrived back to his\
    \ camp and got\nsome rest. Although he is not very happy there he is living a decent life. He is living a\nfreedome once\
    \ again.\n"
