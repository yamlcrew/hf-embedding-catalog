widgetData:
- source_sentence: Con trai bực tức khóa trái cửa chơi điện thoại, xảy ra xung đột lớn, sau đó phải làm sao?
  sentences:
  - 'Nữ 20 tuổi, gần hai năm nay luôn dùng bạo lực để giải tỏa cảm xúc?. Mỗi khi có xung đột với bố mẹ và em gái, tôi thường
    trốn vào góc khóc, tự tát vào mặt mình hoặc đập đầu vào tường. Tôi ghét mẹ và sợ mình sẽ trở thành người phụ nữ giống
    bà. Tôi từng cầm dao định cắt cổ tay nhưng sợ đau nên không dám. Từ khóa liên quan: gia đình, sang chấn gia đình, quan
    hệ gia đình, giao tiếp với cha mẹ'
  - 'Tại sao tôi luôn cảm thấy lo lắng khi phải thừa nhận mình ''đang bận'' và không thể giúp đỡ đồng nghiệp ngay lập tức?.
    Tôi sợ mọi người sẽ nghĩ tôi ích kỷ hoặc không có tinh thần đồng đội. Nỗi sợ này khiến tôi luôn gác việc của mình lại
    để làm hộ người khác và thường xuyên phải tăng ca. Từ khóa liên quan: người luôn làm hài lòng (people pleaser), ranh giới
    công việc, lo âu, sự nghiệp'
  - 'Làm thế nào để xử lý mâu thuẫn khi mẹ tôi liên tục can thiệp vào việc nuôi dạy con cái của tôi?. Con trai tôi mười hai
    tuổi, học lớp năm, gần đây cứ nói không muốn đi học, tôi phải làm sao đây. Từ khóa liên quan: nuôi dạy con cái, mâu thuẫn
    xung đột xung đột xung đột xung đột thế hệ, ranh giới gia đình, giao tiếp'
- source_sentence: Xử lý không tốt các mối quan hệ, không thể đối mặt với áp lực? Quan hệ kém khi gặp áp lực
  sentences:
  - 'Năng lực cá nhân có nhiều thiếu khuyết, muốn học hỏi nhưng hành động lực thấp thì nên thay đổi thế nào?. Có rất nhiều
    chỗ hy vọng được cải thiện, công việc hễ bận rộn là quên sạch sành sanh, mỗi khi bản thân tiếp nhận công việc mới lại
    phát hiện năng lực của mình thiếu hụt, bản thân nên thay đổi thế nào đây. Từ khóa liên quan: trưởng thành, công việc học
    tập'
  - 'Trong thời gian thử việc vì cãi nhau với người khác mà bị sa thải, bị đả kích rất lớn thì phải làm sao?. Khó khăn lắm
    tôi mới tìm được một công việc, định bụng cứ nhẫn nhịn làm tạm vậy. Kết quả là vì người đối diện nói tôi một câu, tôi
    sinh lòng thù hận, hôm đó tôi đã dùng giọng điệu không tốt bảo cô ta là lúc nào cũng nói nhiều. Không ngờ là người này
    lại đi mách thẳng với trưởng phòng, vài ngày sau lãnh đạo quyết định sa thải tôi. Từ khóa liên quan: cảm xúc, trầm cảm,
    hoảng loạn bất lực, yếu đuối rơi lệ'
  - 'Hoàn toàn không quen với mối quan hệ thân mật, sẽ có đôi chút không tự nhiên, làm thế nào để phá giải đây?. Có vẻ như
    tôi không quen với những mối quan hệ quá thân mật. Nếu quá gần gũi, tôi sẽ thấy áp lực và hơi không thoải mái; tôi sẽ
    nghĩ mình phải đối xử tốt với người đó thế nào, và bản thân nên cư xử ra sao. Tôi vốn là người thích một mình, không quá
    thích chuyện tình cảm qua lại. Từ khóa liên quan: nhân tế, ám ảnh sợ xã hội, bạn bè, ranh giới cá nhân'
- source_sentence: Sợ cạnh tranh, không thể thản nhiên đối diện với thắng thua, rất phiền lòng phải làm sao?
  sentences:
  - 'Làm thế nào để lấy lại sự nhiệt huyết sau khi bị cấp trên phê bình vì không đạt được các mục tiêu phát triển kỹ năng
    mềm trong năm vừa qua?. Các bạn học đăng ký hoạt động đều rất tích cực, nhưng sau khi được phân công nhiệm vụ thì lại
    không nghiêm túc làm việc, tôi thật sự rất khổ tâm, khuyên thế nào cũng không được. Từ khóa liên quan: áp lực công sở,
    sự hoàn thiện, phục hồi, lòng tự trọng'
  - 'Đột nhiên vui, đột nhiên không vui, cảm xúc nội tâm dao động mạnh thì phải xử lý thế nào?. Tôi là một người khá điềm
    tĩnh, bất kể trong lòng cảm thấy thế nào, vẻ bề ngoài luôn luôn là sự bình thản không chút gợn sóng. Chính vì vậy, không
    một ai biết rằng dạo gần đây tôi đã thay đổi. Dạo này tôi luôn cảm thấy phiền muộn một cách khó hiểu, muốn nổi nóng, rồi
    lại tự nhiên vui vẻ một cách khó hiểu. Từ khóa liên quan: cảm xúc, bộc lộ cảm xúc, điều tiết cảm xúc'
  - 'Không hiểu nội dung bài giảng, thấy năng lực học tập không đủ mạnh, phải làm sao?. Tôi từ nhỏ đã là học sinh giỏi, nhưng
    lên cấp 2 thì sa đà chơi bời mất chí, không thi được kết quả tốt, nên không đậu được trường cấp 3 trong top vài ngôi đầu
    toàn tỉnh như mơ ước. Chỉ vào được trường cấp 3 tốt nhất thành phố thôi. Nhưng vì thành tích cấp 2 kém đã đánh mất niềm
    tin học tập của tôi, trong khi các bạn khác đều hiểu bài, tôi thấy rất chán nản. Từ khóa liên quan: trưởng thành, quản
    lý áp lực, công việc học tập'
- source_sentence: Lo âu, sợ thời gian không đủ dùng phải làm sao?
  sentences:
  - 'Nữ sinh trung học, chỉ muốn học một lĩnh vực duy nhất, liệu có phải ASD?. Cháu luôn không muốn bị ép buộc học các môn
    trên lớp, chỉ muốn học thứ mình yêu thích và dồn hết tâm trí vào đó. Gần đây cháu được xem xét là nghi ngờ mắc ASD (chỉ
    là nghi ngờ, bác sĩ vẫn chưa đưa ra chẩn đoán), liệu hai việc này có liên quan đến nhau không. Cháu rất bối rối, muốn
    hỏi mọi người là nên chọn học các môn trên lớp hay chuyên sâu vào sở thích cá nhân, hoặc có lựa chọn nào khác không. Từ
    khóa liên quan: hành vi, lo âu, bối rối, hỗn loạn'
  - 'Dù là trì hoãn hay làm việc không ngừng, cảm giác thiếu hụt thời gian đều rất mạnh thì phải làm sao?. Tôi luôn sống trong
    sự hối hả và lo âu về việc không đủ thời gian để hoàn thành mọi thứ. Từ khóa liên quan: cảm giác thiếu hụt thời gian (time
    scarcity), lo âu, quản lý thời gian'
  - 'Con cái bị trầm cảm, cha mẹ nên đồng hành như thế nào để con hồi phục?. Hiện tại tôi đang học lớp 2 trung học, mỗi đêm
    cảm thấy bản thân chẳng hiểu vì sao lại muốn khóc, chính mình cũng không biết rốt cuộc là vì điều gì, nhưng mà rất muốn
    khóc. Từ khóa liên quan: gia đình, trầm cảm trẻ em, nuôi dạy con, sức khỏe tâm thần'
- source_sentence: Sự ngụy trang trong giao tiếp là biểu hiện của sự thiếu tự tin hay là một phần của cuộc sống?
  sentences:
  - 'Người yêu mình thấy mình có chứng cưỡng chế, không có tình điệu, hai chúng mình ai có biểu hiện chứng cưỡng chế?. Thường
    thì trước tivi sẽ có một cái kệ tivi, người yêu mình thích đặt một bình hoa cắm hoa trên kệ tivi để trang trí phòng khách.
    Nhưng bình hoa, hoa xòe ra sẽ che mất một phần tivi. Lúc xem tivi, mình cho rằng có vật che chắn nhìn không thoải mái,
    người yêu mình thấy mình có chứng cưỡng chế, vả lại không có tình điệu cuộc sống. Từ khóa liên quan: hành vi, cưỡng chế'
  - 'Tôi là một người chuyển giới song tính, tôi phải làm sao đây?. Tôi đã từng yêu cả đàn ông lẫn phụ nữ, sau này tôi phát
    hiện giới tính sinh học của mình là nữ nhưng bản dạng giới là nam, tôi có sự thôi thúc muốn yêu cả phụ nữ và đàn ông.
    (Đối với đàn ông, tôi có chút bài trừ về mặt sinh lý và tiếp xúc thể xác, phụ nữ thì không. Trong trường hợp không phát
    sinh quan hệ thì bao gồm cả đàn ông). Từ khóa liên quan: tình yêu, xu hướng tính dục'
  - 'Tôi là một người chuyển giới song tính, tôi phải làm sao đây?. Tôi đã từng yêu cả đàn ông lẫn phụ nữ, sau này tôi phát
    hiện giới tính sinh học của mình là nữ nhưng bản dạng giới là nam, tôi có sự thôi thúc muốn yêu cả phụ nữ và đàn ông.
    (Đối với đàn ông, tôi có chút bài trừ về mặt sinh lý và tiếp xúc thể xác, phụ nữ thì không. Trong trường hợp không phát
    sinh quan hệ thì bao gồm cả đàn ông). Từ khóa liên quan: tình yêu, xu hướng tính dục'
