widgetData:
- source_sentence: After rescue, survivors may require hospital treatment. This must be provided as quickly as possible. The
    SMC should consider having ambulance and hospital facilities ready.
  sentences:
  - What should the SMC consider having ready after a rescue?
  - What is critical for mass rescue operations?
  - What can computer programs do to relieve the search planner of computational burden?
- source_sentence: SMCs conduct communication searches when facts are needed to supplement initially reported information.
    Efforts are continued to contact the craft, to find out more about a possible distress situation, and to prepare for or
    to avoid a search effort. Section 3.5 has more information on communication searches.MEDICO Communications
  sentences:
  - What is generally produced by dead-reckoning navigation alone for search aircraft?
  - What should be the widths of rectangular areas to be covered with a PS pattern and the lengths of rectangular areas to
    be covered with a CS pattern?
  - What is the purpose of SMCs conducting communication searches?
- source_sentence: 'SAR facilities include designated SRUs and other resources which can be used to conduct or support SAR
    operations. An SRU is a unit composed of trained personnel and provided with equipment suitable for the expeditious and
    efficient conduct of search and rescue. An SRU can be an air, maritime, or land-based facility. Facilities selected as
    SRUs should be able to reach the scene of distress quickly and, in particular, be suitable for one or more of the following
    operations:– providing assistance to prevent or reduce the severity of accidents and the hardship of survivors, e.g.,
    escorting an aircraft, standing by a sinking vessel;– conducting a search;– delivering supplies and survival equipment
    to the scene;– rescuing survivors;– providing food, medical or other initial needs of survivors; and– delivering the survivors
    to a place of safety. '
  sentences:
  - What are the types of SAR facilities that can be used to conduct or support SAR operations?
  - What is the scenario in which a simulated communication search is carried out and an air search is planned?
  - What is discussed in detail in various other places in this Manual?
- source_sentence: Support facilities enable the operational response resources (e.g., the RCC and SRUs) to provide the SAR
    services. Without the supporting resources, the operational resources cannot sustain effective operations. There is a
    wide range of support facilities and services, which include the following:Training facilities Facility maintenanceCommunications
    facilities Management functionsNavigation systems Research and developmentSAR data providers (SDPs) PlanningMedical facilities
    ExercisesAircraft landing fields Refuelling servicesVoluntary services (e.g., Red Cross) Critical incident stress counsellors
    Computer resources
  sentences:
  - How many ways are there to train SAR specialists and teams?
  - What types of support facilities are mentioned in the context?
  - What is the duration of a prolonged blast?
- source_sentence: 'Sound funding decisions arise out of accurate assessments made of the SAR system. To measure the performance
    or effectiveness of a SAR system usually requires collecting information or statistics and establishing agreed-upon goals.
    All pertinent information should be collected, including where the system failed to perform as it should have; failures
    and successes provide valuable information in assessing effectiveness and determining means to improve. '
  sentences:
  - What is required to measure the performance or effectiveness of a SAR system?
  - What is the purpose of having an SRR?
  - What is the effect of decreasing track spacing on the area that can be searched?
