  - Определение новичка - это новичок или человек в начале чего-либо.
  example_title: Example 1
- source_sentence: какое состояние может определить тест с физической нагрузкой
  sentences:
  - Тест с физической нагрузкой разработан, чтобы выяснить, содержат ли одна или несколько коронарных артерий, питающих сердце,
    жировые отложения (бляшки), которые блокируют кровеносный сосуд на 70% или более. Для подтверждения результата часто требуется
    дополнительное тестирование. Результат испытаний.
  - Тест направлен на то, чтобы выяснить, не получает ли какой-либо участок сердечной мышцы достаточный кровоток во время
    тренировки. Он похож на тест с физической нагрузкой, фармакологический или химический стресс-тест. Он также известен при
    стресс-тесте таллием, сканировании перфузии миокарда или радионуклидном тесте.
  example_title: Example 2
