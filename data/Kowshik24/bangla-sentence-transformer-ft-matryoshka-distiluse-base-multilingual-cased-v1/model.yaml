- source_sentence: আয়িশা বিনতে আবু বকর ছিলেন ইসলামী নবী মুহাম্মদের স্ত্রীগণের মধ্যে একজন। তিনি ছিলেন তার তৃতীয় স্ত্রী। ইসলামের
    ঐতিহ্য অনুসারে, তাকে "উম্মুল মু'মিনিন" বা "বিশ্বাসীদের মাতা" হিসেবে আখ্যায়িত করা হয়। মুসলিম সম্প্রদায় তাকে মুহাম্মদের
    স্ত্রী হিসেবে অত্যন্ত সম্মান ও শ্রদ্ধা করে থাকেন। এছাড়া ইসলামের ঐতিহ্যগত ইতিহাসেও তার অবদান অনস্বীকার্য এবং অত্যন্ত গুরুত্বপূর্ণ।
    আয়িশা ৬১৩ খ্রিষ্টাব্দের শেষের দিকে মতান্তরে ৬১৪ খ্রিষ্টাব্দের প্রথম দিকে জন্মগ্রহণ করেন। আবু বকর তার পিতা, যিনি মুহাম্মদের
    অত্যন্ত বিশ্বস্ত একজন সাহাবী ও সহচর ছিলেন। তার পিতার নাম আবু বকর ও মাতার নাম উম্মে রুমান বিনতে আমির। মুহাম্মাদের সঙ্গে
    আয়িশার বিয়ে হয় মূলত খাদিজা বিনতে খুয়ালিদ এর মৃত্যুর পরে। মুহাম্মদ সওদাকে (যাম'আ ইবনে কাঈসের কন্যা) বিয়ে করার পর আয়িশাকে
    পরবর্তীতে তৃতীয় স্ত্রী হিসেবে গ্রহণ করেন। তার বিয়ে খাদিজার মৃত্যুর পরে হয়েছিল, এ পক্ষে বেশিরভাগ গবেষকই একই মত পোষণ
    করেন। যদিও, তার বিয়ে হিজরতের দুই না তিন বছর আগে হয়েছিল, এ নিয়ে ভিন্নমত প্রচলিত আছে। কিছু সুত্র থেকে পাওয়া যায় যে
    মুহাম্মদের সঙ্গে তার বিবাহ্ সওদার সঙ্গে বিয়ের পূর্বে হয়েছিল৷ যদিও বেশিরভাগ হাদীস মোতাবেক, মুহাম্মদ সওদাকে আয়িশার পূর্বে
    বিয়ে করেছিলেন। এটি প্রচলিত যে, উসমান বিন মা'যুনের স্ত্রী খাওলা আবু বকরের নিকট দেখা করতে গিয়েছিলেন এবং এই বিয়ের প্রস্তাব
    দিয়েছিলেন। মুহাম্মদের সঙ্গে ছয় বা সাত বছর বয়সে আয়িশার বিয়ে হয়। বয়সের দিক থেকে তিনি ছিলেন মুহাম্মাদের স্ত্রীদের
    মাঝে কনিষ্ঠতম।
