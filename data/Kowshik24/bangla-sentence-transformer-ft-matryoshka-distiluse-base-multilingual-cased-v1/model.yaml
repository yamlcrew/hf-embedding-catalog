    - 'উপজেলার প্রশাসনিক দায়িত্বে কোন পরিষদ নিয়োজিত? '
    - ' সফলতার সম্ভাবনা বিশ্লেষণে কি কি উপাদান গণনায় ধরতে হয়?'
