- source_sentence: গুড় আখ কিংবা খেজুরের রস হতে তৈরি করা এক প্রকারের মিষ্টদ্রব্য। তালের রস হতেও গুড় তৈরি করা হয়। আখ, খেজুর
    এবং তাল গাছের রস ঘন করে পাক দিয়ে গুড় তৈরি করা হয়। গুড় প্রধানত ৩ প্রকার; ঝোলাগুড়, পাটালিগুড়, চিটাগুড়। প্রথমে আখের
    বা খেজুরের রস একটি বড় খোলা পাত্রে ছেঁকে রাখা হয়। পরে সময় নিয়ে, বড় একটি চুলায় তা জ্বাল দিতে হয়, এতে জলীয় অংশ বাষ্প
    হয়ে যায়। ধীরে ধীরে রসের রং লালচে হতে শুরু করে এবং টেনে আসে। এরপর এই উত্তপ্ত রস শীতল করা হয়, অবশেষে গুড় পাওয়া যাবে।
    এ রসকে গুড় না বানিয়ে চিনিও বানানো যায়। গুড় চিনির থেকে কম মিষ্টি হলেও বেশি পুষ্টিকর। চিনির জন্য দুবার ফোটালে ঘন কালচে
    একটু তিতকুটে ভেলি গুড় পড়ে থাকে। আরো বেশি বার চিনি বের করে নিলে থাকে চিটে গুড় , যার মধ্য প্রচুর ভিটামিন থাকলেও তেতো
    বলে সাধারণত গরুকে খাওয়ানো হয়। বাংলাদেশে গুড় দিয়ে পিঠা, পায়েস ইত্যাদি সুস্বাদু নাস্তা তৈরি করা হয়। গুড়ের সন্দেশ
    এদেশে একটি অত্যন্ত জনপ্রিয় মিষ্টান্ন।
  sentences:
  - কোন কোন গাছের রস থেকে গুড় তৈরি হয়?
  - ও’নিলের প্রকল্পটির কোনও পূর্বসূরি আছে কি?
  - ট্রানজিস্টর উদ্ভাবন করেন কারা?
- source_sentence: রিকার্দো এলিয়েসের নেফতালি রেইয়েস বাসোয়ালতো ১৯০৪ সালের ১২ই জুলাই চিলির সান্তিয়াগোর ৩৫০ কিমি দক্ষিণের
    লিনারেস প্রদেশের (বর্তমান বৃহত্তর মাউলে অঞ্চল) পাররাল শহরে জন্মগ্রহণ করেন। তার পিতা হোসে দেল কারমেন রেইয়েস মোরেলস একজন
    রেলওয়ের কর্মকর্তা এবং মাতা রোসা নেফতালি বাসোয়ালতো ওপাজো একজন বিদ্যালয়ের শিক্ষিকা ছিলেন। তার মাতা তার জন্মের দুমাস পর
    মৃত্যুবরণ করেন। তার মৃত্যুর পর পরই রেইয়েস তেমুকোতে পাড়ি জমান। তিনি সেখানে ত্রিনিদাদ কানদিয়া মালভারদে নামক একটি মহিলাকে
    বিয়ে করেন, যার পূর্বে নয় বছর বয়সী রোদোলফো দে লা রোসা নামক একজন পুত্রসন্তান ছিল। নেরুদা তেমুকোতে তার সৎভাই রোদোলফো এবং
    আউরেইয়া তোলরা নামক একজন কাতালান মহিলার সাথে তার পিতার বিবাহ-বহির্ভূত সম্পর্কের ফলে জন্ম নেওয়া সৎবোন লরা হেরমিনিয়া "লরিতা"র
    সাথে বেড়ে ওঠেন। তিনি তার প্রথম দিকের কবিতাগুলো ১৯১৪ সালের শীতকালে রচনা করেছিলেন। নেরুদা একজন নাস্তিক।
  sentences:
  - চাঁদ কি পৃথিবীর একমাত্র প্রাকৃতিক উপগ্রহ ?
  - পাবলো নেরুদার মাতা কখন মৃত্যুবরণ করেন?
  - ডার্ক ওয়েব এবং তাদের সেবা সম্পর্কে কাভারেজ এবং ব্যবহারিক তথ্য প্রদান করে কোন কোন সংবাদপত্র?
- source_sentence: 'বিনোদন হচ্ছে অবসরের কোনও কর্ম, অবসর যা বিশ্লেষণমূলক সময়। "অবসর বিনোদনের জন্য কোনও কিছু করার চাহিদা" একটি
    অপরিহার্য উপাদান, মানব জীববিদ্যা ও মনোবিজ্ঞানের জন্য। বিনোদনমূলক কার্যক্রম প্রায়ই করা হয় রমণ, বিনোদন, বা আনন্দ এর জন্যে।

    বিনোদন শব্দটি প্রথম ইংরেজিতে ব্যবহৃত হয় সম্ভবত ১৪ শতকের শেষের দিকে, প্রথম অর্থ, "জলখাবার বা আরোগ্যকরণ একজন অসুস্থ ব্যক্তির",
    মোড় প্রাপ্ত করল লাতিন। মানবজাতি তাদের সময় কাটায় দৈনিক জীবনজাপনের কার্যক্রমে, কাজে, নিদ্রায়, সামাজিক কর্তব্যে, এবং
    বিনোদনে।'
  sentences:
  - বিনোদন শব্দটি প্রথম ইংরেজিতে ব্যবহৃত হয় কখন?
  - '১৯৭০ খ্রিষ্টাব্দের ১২ই নভেম্বর ভোলায় ঘূর্ণিঝড়ের কারণে প্রায় কত লক্ষ মানুষের মৃত্যু হয়? '
