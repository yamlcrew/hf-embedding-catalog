      “O Lord, I seek Your face. Do not hide Your face from me!” As we turn our sights to the cold winter months we want God’s
      presence to continue with us.

      And now Psalm 27 doesn’t seem dissonant. It seems the perfect prayer for Hoshanna Rabba! It expresses the emotions of
      this day so palpably.

      And suddenly I thought: How lucky we are that on the very next day, on Sheminni Atzeret, we start reading the Torah.
      With the end of the chagim, God’s presence loses its immediacy, but we begin again to read His Torah. His wisdom and
      guidance are with us in the form of the חיי עולם which he has נטע בתוכנו. As we open Bereshit, we will seek new wisdom
      from God and the feeling of His presence by our study of Torah.

      Chag Sameach!'
