  - source_sentence: 'KIDNEY PANCREAS: Edited by Matthew CooperMachine perfusion in kidney transplantationKataria, Ashisha;
      Magoon, Sandeepb; Makkar, Binnic; Gundroo, AijazaAuthor Information aDivision of Nephrology, Department of Medicine,
      University at Buffalo, Buffalo, New York bDivision of Nephrology, Department of Medicine, Eastern Virginia Medical School,
      Virginia Beach, Virginia cDepartment of Educational affairs, Roswell Park Cancer Institute, Roswell Park Cancer Institute,
      Buffalo, New York, USA Correspondence to Ashish Kataria, MD, Division of Nephrology, Department of Medicine, University
      at Buffalo, Buffalo, NY 14225, USA. Tel: +1 716 898 3337; e-mail: [email protected] Current Opinion in Organ Transplantation:
      August 2019 - Volume 24 - Issue 4 - p 378-384 doi: 10.1097/MOT.0000000000000675 Buy Metrics Abstract Purpose of review
      The shortage of kidneys for transplantation has led to an urgent need to efficiently utilize the available cadaveric
      kidneys. Efficient use of machine perfusion may potentially lead to increased use of marginal kidneys by lowering the
      incidence of delayed graft function (DGF) and improving graft outcomes. Recent findings Machine perfusion has had a
      resurgence in the last 10–15 years over static cold storage (SCS). Hypothermic machine perfusion (HMP), the most commonly
      utilized type of machine perfusion reduces the rates of DGF when compared with SCS with a trend towards improving the
      overall graft survival. Summary Despite reduction in the rates of DGF by HMP, its effect on long-term renal and patient
      outcomes is not clearly known. There is limited clinical literature in the use of normothermic machine perfusion (NMP)
      but a few pilot studies have shown its potential to resuscitate commonly discarded kidneys. In addition to preservation,
      machine perfusion also allows for various diagnostic and therapeutic interventions during the preservation period to
      assess and optimize the viability of the procured kidney. Copyright © 2019 Wolters Kluwer Health, Inc. All rights reserved.'
