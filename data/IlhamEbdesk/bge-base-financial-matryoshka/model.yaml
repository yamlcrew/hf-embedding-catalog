widgetData:
- source_sentence: Workforce Solutions is our largest reportable segment, contributing 44% of total operating revenue for
    2023.
  sentences:
  - How much did GameStop Corp's valuation allowances increase during fiscal 2022?
  - What percentage of total operating revenue for 2023 was represented by the Workforce Solutions segment?
  - Where are the majority of NIKE's footwear and apparel products manufactured?
- source_sentence: The effects of actual results differing from our assumptions and the effects of changing assumptions are
    considered actuarial gains or losses. We utilize a mark-to-market approach in recognizing actuarial gains or losses immediately
    through earnings upon the annual remeasurement in the fourth quarter, or on an interim basis as triggering events warrant
    remeasurement.
  sentences:
  - How are the company's postretirement benefit plan actuarial gains or losses recognized?
  - What specific procedures did the auditors perform related to the Critical Audit Matter of medical care services Incurred
    but not Reported (IBNR)?
  - What strategies does the company use to manage product costs and supply?
- source_sentence: To improve the in-store shopping experience, the company invested in wayfinding signage, store refresh
    packages, self-service lockers, and enhanced checkout areas, aiming to provide easier navigation and increased convenience.
  sentences:
  - What are the expectations the company has for its employees in aligning with the Code of Conduct?
  - What strategies are employed to improve the in-store shopping experience?
  - Where does the 10-K filing direct readers for specifics on legal proceedings involving the company?
- source_sentence: In 2023, under pre-approved share repurchase programs, The Hershey Company repurchased shares valued at
    $27.4 million.
  sentences:
  - What is the value of shares repurchased under the pre-approved program as stated in The Hershey Company's 2023 Form 10-K,
    for the year 2023?
  - What critical accounting estimates were identified as having the greatest potential impact on the financial statements?
  - What was the total net sales in fiscal 2022?
- source_sentence: During September 2023, the Company entered into a third amended and restated revolving credit agreement
    with Bank of America, N.A., as administrative agent, swing line lender and a letter of credit issuer and lender and certain
    other financial institutions, as lenders thereto (the 'Amended Revolving Credit Agreement'), which provides the Company
    with commitments having a maximum aggregate principal amount of $1.25 billion, effective as of September 5, 2023. The
    Amended Revolving Credit Agreement also provides for a potential additional incremental commitment increase of up to $500.0
    million subject to agreement of the lenders. The Amended Revolving Credit Agreement contains certain financial covenants
    setting forth leverage and coverage requirements, and certain other limitations typical of an investment grade facility,
    including with respect to liens, mergers and incurrence of indebtedness. The Amended Revolving Credit Agreement extends
    through September 5, 2028.
  sentences:
  - What constitutes the largest expense in the company's various expense categories?
  - What is the function of the amended revolving credit agreement that the Company entered into with Bank of America in September
    2023?
  - What position does Brad D. Smith currently hold?
