widgetData:
- source_sentence: Goodwill arising from the acquisition of Xilinx was valued at $22,784 million, attributed mainly to increased
    synergies expected from the integration of Xilinx into the Company's Embedded and Data Center segments.
  sentences:
  - What growth strategy does lululemon plan to employ for their operations in China Mainland?
  - What was the fair value of the goodwill generated from the acquisition of Xilinx?
  - How did the products gross margin percentage change from 2022 to 2023?
- source_sentence: In 2023, UnitedHealthcare's regulated subsidiaries paid $8.0 billion in dividends to their parent companies.
  sentences:
  - What amount did UnitedHealthcare's regulated subsidiaries pay as dividends to their parent companies in 2023?
  - What initiative does the Basel, Rotterdam and Stockholm Conventions focus on?
  - What is the primary target of Palantir's customer acquisition strategy?
- source_sentence: These assumptions about future disposition of inventory are inherently uncertain and changes in our estimates
    and assumptions may cause us to realize material write-downs in the future.
  sentences:
  - How did the return on average common stockholders’ equity (GAAP) change from 2021 to 2023?
  - What is the effect of changes in inventory estimates on the company's financial statements?
  - What is the principal business experience of David M. Chojnowski before his current role as Senior Vice President and
    Controller?
- source_sentence: During the years ended December 31, 2021, 2022 and 2023, the weighted-average fair value of stock options
    granted under the Plans was $96.50, $79.75 and $65.22 per share, respectively.
  sentences:
  - What was the weighted-average grant-date fair value of stock options granted in 2021, 2022, and 2023?
  - What major weather events contributed to the increase in losses reported in 2023?
  - What is the V2MOM, and how is it used within the company?
- source_sentence: During fiscal year 2023, we repurchased 10.4 million shares for approximately $1,295 million.
  sentences:
  - How much does Kroger plan to invest in training its associates in 2023?
  - What total amount was spent on share repurchases during fiscal year 2023?
  - What judicial decision occurred in August 2023 regarding the antitrust lawsuits against the airlines?
