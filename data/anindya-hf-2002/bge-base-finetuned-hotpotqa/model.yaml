widgetData:
- source_sentence: Which survey in 2010 recommended the The Wide Field Infrared Survey Telescope as the top priority for astronomy?
  sentences:
  - High Energy Astronomy Observatory 1 HEAO-1 was an X-ray telescope launched in 1977. HEAO-1 surveyed the sky in the X-ray
    portion of the electromagnetic spectrum (0.2 keV - 10 MeV), providing nearly constant monitoring of X-ray sources near
    the ecliptic poles and more detailed studies of a number of objects by observations lasting 3-6 hours. It was the first
    of NASA's three High Energy Astronomy Observatories, HEAO 1, launched August 12, 1977 aboard an Atlas rocket with a Centaur
    upper stage, operated until 9 January 1979. During that time, it scanned the X-ray sky almost three times
  - Wide Field Infrared Survey Telescope The Wide Field Infrared Survey Telescope (WFIRST) is a future infrared space observatory
    that was recommended in 2010 by United States National Research Council Decadal Survey committee as the top priority for
    the next decade of astronomy. On February 17, 2016, WFIRST was formally designated as a mission by NASA.
  - The Bluebells The Bluebells were a Scottish indie rock band, active between 1981 and 1986 (later briefly reforming in
    1993, 2008–2009 and 2011).
- source_sentence: Near what river is the library that contains the Aberdeen Bestiary located?
  sentences:
  - Joseph Roth Joseph Roth, born Moses Joseph Roth (2 September 1894 – 27 May 1939), was an Austrian-Jewish journalist and
    novelist, best known for his family saga "Radetzky March" (1932), about the decline and fall of the Austro-Hungarian Empire,
    his novel of Jewish life, "Job" (1930), and his seminal essay "Juden auf Wanderschaft" (1927; translated into English
    in "The Wandering Jews"), a fragmented account of the Jewish migrations from eastern to western Europe in the aftermath
    of World War I and the Russian Revolution. In the 21st century, publications in English of "Radetzky March" and of collections
    of his journalism from Berlin and Paris created a revival of interest in Roth.
  - Aberdeen Bestiary The Aberdeen Bestiary (Aberdeen University Library, Univ Lib. MS 24) is a 12th-century English illuminated
    manuscript bestiary that was first listed in 1542 in the inventory of the Old Royal Library at the Palace of Westminster.
  - House of Monymusk The House of Monymusk is located on the outskirts of the Scottish village of Monymusk, in the Marr region
    of Aberdeenshire. The house is located near the "river Don", which is known for its spectacular trout-fishing. The village,
    which history dates back to 1170, was bought by the Forbses in the 1560s, who later built the House of Monymusk. The Forbses
    claim they built the present House of Monymusk from the blackened stones of the old Priory.
- source_sentence: The Stage" is a song by Avenged Sevenfold and the first single from their seventh studio album of the same
    name, which was released on which date?
  sentences:
  - Allegra Stratton Allegra Stratton (born 25 November 1980) is a British journalist and writer. Since January 2016, she
    has been the National Editor of ITV News after four years as political editor on BBC Two's "Newsnight". She has also co-presented
    "Peston on Sunday" with Robert Peston since May 2016.
  - Appetite for Destruction Appetite for Destruction is the debut studio album by American hard rock band Guns N' Roses.
    It was released on July 21, 1987, by Geffen Records to massive commercial success. It topped the "Billboard" 200 and became
    the best-selling debut album as well as the 11th best-selling album in the United States. With about 30 million copies
    sold worldwide, it is also one of the best-selling records ever. Although critics were ambivalent toward the album when
    it was first released, "Appetite for Destruction" has since received retrospective acclaim and been viewed as one of the
    greatest albums of all time.
  - The Stage (Avenged Sevenfold song) "The Stage" is a song by Avenged Sevenfold and the first single from their seventh
    studio album of the same name, which was released on October 28, 2016.
- source_sentence: Union County Speedway is home to what type of motorsports that are usually held at county fairs and festivals?
  sentences:
  - Long Beach, New York Long Beach is a city in Nassau County, New York, United States. Just south of Long Island, it is
    located on Long Beach Barrier Island, which is the westernmost of the outer barrier islands off Long Island's South Shore.
    As of the United States 2010 Census, the city population was 33,275. It was incorporated in 1922, and is nicknamed "The
    City By the Sea" (as seen in Latin on its official seal).
  - Union County Speedway Union County Speedway is a dirt racetrack in Liberty, Indiana, United States. It features races
    with cars such as, late models, Modifieds, Sidestroke, Bombers, Road Hogs, and Street Stocks. UCS is also host to dirtbike,
    quad, Mini-Sprint, and Demolition Derbies.
  - Mercer County Fairgrounds The Mercer County Fairgrounds, located on 12th Avenue SW in Aledo, are the home of the annual
    county fair in Mercer County, Illinois. The fairgrounds were established in 1869 when the fair moved to Aledo; from its
    creation in 1853 until then, it had taken place in Millersburg. The early fairs mainly focused on agricultural exhibitions,
    and the first two buildings were used for horticulture exhibits and household floral shows; these fairs also included
    entertainment such as baseball games and band concerts. By the end of the century, the fair had grown to host 8,000 visitors,
    many who came from neighboring counties by train, and show 3,000 entries in its various agricultural competitions. The
    fair added traveling entertainment and grew to host over 20,000 visitors in the 20th century; it is still held annually
    at the fairgrounds. In addition to the county fair, the fairgrounds have also held horse races, political events, picnics,
    and other community events.
- source_sentence: James D. Farley, Jr. had an early interest in automobiles because of his grandfather who worked for what
    company?
  sentences:
  - Continental Motors Company Continental Motors Company was an American manufacturer of internal combustion engines. The
    company produced engines as a supplier to many independent manufacturers of automobiles, tractors, trucks, and stationary
    equipment (such as pumps, generators, and industrial machinery drives) from the 1900s through the 1960s. Continental Motors
    also produced Continental-branded automobiles in 1932–1933. The Continental Aircraft Engine Company was formed in 1929
    to develop and produce its aircraft engines, and would become the core business of Continental Motors, Inc.
  - The Atlantic The Atlantic is an American magazine and multi-platform publisher, founded in 1857 as The Atlantic Monthly
    in Boston, Massachusetts.
  - Jim Farley (businessman) James D. Farley, Jr. (born June 1962) is an American automobile executive that currently serves
    as Ford Motor Company's Executive Vice President and president, Global Markets since June 2017. From 2015 to 2017, he
    was CEO and Chairman of Ford Europe. He had an early interest in automobiles, primarily spurred from his grandfather who
    worked at Henry Ford's River Rouge Plant starting in 1914.
