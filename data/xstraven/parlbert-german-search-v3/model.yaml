widgetData:
- source_sentence: 'Ihr Koalitionsvertrag ist voller solcher Leistungsversprechen ohne Preisschild. Es reicht in der Rentenpolitik
    eben nicht aus, die Beitragsentwicklung allein in dieser Wahlperiode im Blick zu haben. So bleibt Verlässlichkeit im Generationenvertrag
    auf der Strecke. Zudem fällt auf: Es fehlt bei Ihnen ein klares Bekenntnis zur Stabilität der Sozialversicherungsbeiträge.
    Steigende Beiträge aber gefährden Arbeitsplätze und belasten gerade die Bezieher kleinerer Einkommen. Damit möchte ich
    auch eine Bemerkung zum Thema Mindestlohn machen: Auch wir – das sei klar hier festgestellt – haben nichts gegen einen
    spürbaren Anstieg des Mindestlohns. Ja, es gibt gute Gründe dafür.'
  sentences:
  - Koalitionsvertrag Leistungsversprechen Preisschild
  - Asylrecht Außengrenzen Schlupflöcher
  - Rentenpolitik Beitragsentwicklung Generationenvertrag
- source_sentence: 'Nur um mal eine Zahl zu nennen: Die Ukraine braucht an einem Tag so viel Munition, wie in Deutschland
    in sechs Monaten hergestellt werden könnte. Die Firmen, die Fahrzeuge liefern könnten, die Firmen, die Munition produzieren
    könnten, melden sich mittlerweile reihenweise bei uns und unseren Wahlkreisabgeordneten und beklagen sich darüber, dass
    sie keine Aufträge bekommen, dass die Zahlungsziele nicht eingehalten werden und damit keine Planungssicherheit seitens
    der Bundesregierung besteht. Herr Bundeskanzler, so kann man auch mit den Bündnisverpflichtungen nicht umgehen.'
  sentences:
  - Ukraine Munitionsbedarf Deutschland
  - Munitionsbestellung Bundesregierung
  - R+V Studie Spaltung
- source_sentence: Eine solche Festlegung hätte massive Auswirkungen auf die Versorgungssicherheit in Deutschland mit sich
    gebracht. Auch bei der kleinen Wasserkraft ist die Ampel auf unsere Position eingeschwenkt. Diese soll zukünftig wie alle
    erneuerbaren Energien im überragenden öffentlichen Interesse sein und wie bisher gefördert werden. Leider fehlt uns jedoch
    die Einbeziehung der Vor-Ort Stromnetze unter 110 kV in das überragende öffentliche Interesse. So wird es weiterhin Realität
    bleiben, dass der so wichtige grüne Strom zwar produziert wird, aber das Netz bzw. die Verteilung des Stroms hinterherhinken.
    Mehr Mut zur Veränderung hätten wir uns auch bei den kleinen Solaranlagen auf Dächern gewünscht.
  sentences:
  - Vor-Ort Stromnetze 110 kV
  - Austausch im Bundestag
  - kleine Wasserkraft öffentliche Interesse
- source_sentence: Das ist ein Punkt, den der Bundesrechnungshof angesprochen und gerügt hat und den auch ich schon in den
    letzten Debatten angesprochen habe. Darüber müssen wir in den kommenden Wochen noch mal deutlich sprechen. Seit 2022 werben
    Sie für dieses Programm. Bisher kennen wir Strategiepapiere in Hochglanzform mit Problembeschreibungen. Konkrete Förderrichtlinien
    oder in Förderrichtlinien gegossene Lösungsansätze halten sich aber in Grenzen, auch wenn jetzt das eine oder andere Programm
    aufgelegt worden ist. Frau Ministerin, Sie kündigen viel an, bewegen sich aber dabei im Schneckentempo.
  sentences:
  - Ministerin Kritik Schneckentempo
  - KFOR Mission Kosovo Bedeutung
  - Förderrichtlinien fehlen Kritik
- source_sentence: Das ist keine vernünftige Haushaltspolitik. Gerade im Bereich Luft- und Raumfahrt finden derzeit unglaublich
    viele Innovationen für eine klimaneutrale Mobilität statt. So entwickelt Airbus Flugzeuge mit Wasserstoffantrieb, und
    in Leipzig wird mit der Neuentwicklung der Dornier 328 ein Regionalflugzeug gebaut, welches mit klimaneutralen E-Fuels
    betrieben werden kann.
  sentences:
  - AfD Aufarbeitung Spaltung
  - Airbus Wasserstoffantrieb Flugzeuge
  - Ukrainekrieg Luftfahrt
