widgetData:
- source_sentence: 'stellen, neue Märkte erschließen und Vorreiter sein. Sie fordern mehr grünen Strom ein und benötigen schon
    bald große Mengen grünen Wasserstoff für ihre innovativen und zukunftsweisenden neuen Produktionsweisen. Ein moderner
    und zukunftsweisender Wirtschaftsstandort setzt auf effiziente und moderne Produktionsweisen, regt grüne Innovationen
    an und schafft einen Rahmen, in dem Produkte weiterentwickelt werden können. Sehr geehrte Damen und Herren, stehen zu
    bleiben, nichts zu tun, keine Veränderungen zuzulassen, ist keine Option, wenn wir in den Märkten der Zukunft als Standort
    eine Rolle spielen wollen. Für mich ist klar: Deutschland soll auch langfristig einer der Wirtschaftsstandorte weltweit
    sein. Dazu leistet dieser Gesetzentwurf vielleicht nur einen kleinen, aber einen sehr wichtigen Beitrag in die richtige
    Richtung. Herzlichen Dank. '
  sentences:
  - Welche Auswirkungen hat der vorgeschlagene Vorwegabzug auf die Bürokratie im Gesundheitswesen?
  - Welche Rolle spielt die grüne Energie in der Zukunft der deutschen Wirtschaft?
  - Debatte 9-Euro-Ticket Bundestag
- source_sentence: l fehlen, und das wird unser Leben bedeutend verändern. Eine lahmende Wirtschaft wird zu längeren Lieferzeiten
    führen. Wir werden Probleme in der Pflege bekommen, und auch der Zusammenbruch des Rentensystems kann eine Folge sein.
    Die Ampel liefert nun auch mit diesem Haushalt die notwendigen bundespolitischen Weichenstellungen. Statt Menschen über
    Jahre durch Kettenduldung zu drangsalieren, geben wir ihnen eine Chance auf Bleiberecht und leisten damit auch einen Beitrag
    zur Bekämpfung des Arbeitskräftemangels. Die Ampel hat die frühere Arroganz, ja, die Fehleinschätzung der vielleicht nicht
    auf alle Fach- und Arbeitskräfte wirkenden Attraktivität Deutschlands endlich abgelegt. Es ist ein Irrtum, zu glauben,
    man müsse nicht viel tun und man müsse auch nicht viel leisten, man könne sich die Besten der Besten aussuchen, die alle
    Schlange stünden, um in Deutschland arbeiten zu können. Mit dem Haushalt und den Mitteln, die wir jetzt hier beschließen
    werden, stellen wir uns zum ersten Mal einer Realität, die zeigt,
  sentences:
  - Attraktivität Deutschlands für Fachkräfte
  - Wie sieht die Zusammenarbeit zwischen der Bundesregierung, der irakischen Regierung und der kurdischen Regionalregierung
    aus?
  - Befürwortung des Rechts auf selbstbestimmtes Sterben
- source_sentence: ' Vielen Dank, Herr Kollege Hofreiter. – Das Wort hat nunmehr der Kollege Alexander Graf Lambsdorff, FDP-Fraktion. '
  sentences:
  - Wissenschaftstheorie im Bundestag
  - Redebeitrag Alexander Graf Lambsdorff im Bundestag
  - Parlamentarisches Verfahren zur Legalisierung
- source_sentence: ' Sehr geehrte Frau Präsidentin! Exzellenz! Liebe Kolleginnen und Kollegen! Lieber Herr Roth, ich kann
    dieses Gerede davon, dass Russland Europa destabilisieren will, nicht mehr hören. Das entbehrt jeder logischen Grundlage.
    Russland hat die Ressourcen, wir haben das Know-how. Es liegt im Interesse der Europäischen Union, aller Staaten in der
    EU, mit Russland zusammenzuarbeiten, genauso wie das im Interesse Russlands liegt. Das, was Sie hier vorführen, ist Kriegstreiberei,
    Panikmache und Kriegsrhetorik. Ja, es ist richtig: Russland bewegt seine Armee auf seinem Territorium. Darüber wird hier
    sehr intensiv gesprochen. Aber wird auch darüber gesprochen, was auf der Gegenseite, in der Ukraine, passiert? Ich möchte
    Ihnen zitieren, was der ukrainische Verteidigungsminister vorgestern erklärt hat: Ich kann mit absoluter Gewissheit sagen,
    dass Stand heute die russischen Streitkräfte keine Angriffsgruppierungen aufgestellt haben, die einen gewaltsamen Einmarsch
    in die Ukraine durchführen könnten. Also bitte betreiben '
  sentences:
  - Redezeit Bundestag
  - Wer hat das Wort für die CDU/CSU-Fraktion im Bundestag?
  - Rede zur Ukraine-Krise
- source_sentence: 't wir hier im Bundestag sind. Es ist Zeit, umzudenken. Es ist Zeit, umzudenken für die Union. Meine Damen
    und Herren, glauben Sie bitte nicht diesen Geschichten, die Ihnen hier eben aufgetischt worden sind. Vielen Dank. '
  sentences:
  - Kritik an der Union
  - Wie wird im Bundestag über die Debatte zum Sozialsystem und der Zuwanderung diskutiert?
  - Wie sieht der Autor die Beziehung zwischen Einheit und Vielfalt in Deutschland?
