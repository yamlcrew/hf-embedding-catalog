    tại huyện Thanh_Oai để được lập danh_sách tham_gia BHYT theo nhóm cựu_chiến_binh gửi cơ_quan BHXH.'
  - "Điều 1 Thông_tư 49 / 2019 / TT - BGTVT thủ_tục hỗ_trợ_giá cho doanh_nghiệp kinh_doanh vận_tải đường_sắt mới nhất có nội_dung\
    \ như sau : \n \n Điều 1 . Phạm_vi điều_chỉnh \n Thông_tư này quy_định quy_trình , hồ_sơ thanh quyết_toán , thủ_tục hỗ_trợ_giá\
    \ cho doanh_nghiệp kinh_doanh vận_tải đường_sắt thực_hiện vận_tải phục_vụ nhiệm_vụ đặc_biệt , nhiệm_vụ an_sinh xã_hội\
    \ ."
  - "Căn_cứ theo quy_định tại Khoản 2 Điều 25 Luật Bảo_hiểm xã_hội 2014 quy_định về điều_kiện hưởng chế_độ ốm_đau như sau\
    \ : \n \n Điều_kiện hưởng chế_độ ốm_đau \n 1 . Bị ốm_đau , tai_nạn mà không phải là tai_nạn lao_động phải nghỉ_việc và\
    \ có xác_nhận của cơ_sở khám bệnh , chữa bệnh có thẩm_quyền theo quy_định của Bộ Y_tế . \n Trường_hợp ốm_đau , tai_nạn\
    \ phải nghỉ_việc do tự hủy_hoại sức_khỏe , do say rượu hoặc sử_dụng chất ma_túy , tiền chất ma_túy theo danh_mục do Chính_phủ\
    \ quy_định thì không được hưởng chế_độ ốm_đau . \n 2 . Phải nghỉ_việc để chăm_sóc con dưới 07 tuổi bị ốm_đau và có xác_nhận\
    \ của cơ_sở khám bệnh , chữa bệnh có thẩm_quyền . \n \n \n Theo đó , người lao_động nghỉ_việc để chăm_sóc con dưới 07\
    \ tuổi bị ốm_đau và có xác_nhận của cơ_sở khám bệnh , chữa bệnh có thẩm_quyền thì đủ điều_kiện hưởng chế_độ ốm_đau . Do\
    \ đó trong trường_hợp con của bạn đã 8 tuổi thì bạn không đủ điều_kiện hưởng chế_độ ốm_đau ."
- source_sentence: Điều 10 Thông_tư 08 / 2013 / TT - BTC hướng_dẫn thực_hiện kế_toán nhà_nước áp_dụng Hệ_thống
  sentences:
  - "Điều 10 Thông_tư 08 / 2013 / TT - BTC hướng_dẫn thực_hiện kế_toán nhà_nước áp_dụng Hệ_thống có nội_dung như sau : \n\
    \ \n Điều 10 . Kiểm_kê tài_sản \n 1 . Kiểm_kê tài_sản là việc cân , đong , đo , đếm số_lượng ; xác_nhận và đánh_giá chất_lượng\
    \ , giá_trị của tài_sản , nguồn vốn hiện có tại thời_điểm kiểm_kê để kiểm_tra , đối_chiếu với số_liệu trong sổ kế_toán\
    \ . \n 2 . Các đơn_vị KBNN phải kiểm_kê tài_sản trong các trường_hợp sau : \n - Cuối kỳ kế_toán tháng , năm , trước khi\
    \ lập báo_cáo tài_chính ; \n - Chia , tách , hợp_nhất , sáp_nhập , giải_thể , chấm_dứt hoạt_động ; \n - Xảy ra_hỏa_hoạn\
    \ , lũ_lụt và các thiệt_hại bất_thường khác ; \n - Đánh_giá lại tài_sản theo quyết_định của cơ_quan nhà_nước có thẩm_quyền\
    \ ; \n - Các trường_hợp khác theo quy_định của pháp_luật và theo yêu_cầu của cơ_quan nhà_nước có thẩm_quyền . \n 3 . Sau\
    \ khi kiểm_kê tài_sản , đơn_vị KBNN phải lập báo_cáo tổng_hợp kết_quả kiểm_kê . Trường_hợp có chênh_lệch giữa số_liệu\
    \ thực_tế kiểm_kê với số_liệu ghi trên sổ kế_toán , phải xác_định nguyên_nhân và phải phản_ánh số chênh_lệch và kết_quả\
    \ xử_lý vào sổ kế_toán trước khi lập báo_cáo tài_chính . \n 4 . Việc kiểm_kê phải phản_ánh đúng thực_tế tài_sản , nguồn\
    \ hình_thành_tài_sản tại đơn_vị ; người lập và ký báo_cáo tổng_hợp kết_quả kiểm_kê phải chịu trách_nhiệm về kết_quả kiểm_kê\
    \ tại đơn_vị mình ."
  - "Điều 103 Thông_tư 32 / 2010 / TT - BCT hệ_thống điện_phân_phối có nội_dung như sau : \n \n Điều 103 . Hệ_thống đo_đếm\
    \ cấp điện_áp 110kV \n 1 . Yêu_cầu đối_với công_tơ đo_đếm điện_năng : \n a ) Là loại 3 pha 4 dây ; \n b ) Kiểu điện_tử\
    \ tích_hợp chức_năng và có_thể lập_trình được ; \n c ) Có nhiều biểu giá ; \n d ) Đo_đếm điện_năng tác_dụng và phản_kháng\
    \ theo hai chiều nhận và phát riêng_biệt theo 4 góc phần tư ; \n đ ) Có chức_năng đo công_suất cực_đại , ghi biểu_đồ phụ_tải\
    \ tổng ; \n e ) Có giao_thức thích_hợp để thu_thập , đọc số_liệu tại_chỗ và từ xa ; \n g ) Được cấp nguồn từ hệ_thống\
    \ điện_áp thứ cấp đo_lường và phải đảm_bảo duy_trì hoạt_động khi mất điện_áp 1 hoặc 2 pha bất_kỳ ; \n h ) Có nhiều mức\
    \ mật_khẩu ; \n i ) Có các vị_trí niêm_phong , kẹp chì đảm_bảo không_thể tiếp_cận với các đầu cực đấu dây và thay_đổi\
    \ các thông_số cài_đặt trong công_tơ nếu không phá_bỏ chì niêm_phong ; \n k ) Có chức_năng lưu_trữ thông_tin đo_đếm ,\
    \ biểu_đồ phụ_tải ít_nhất 60 ngày với chu_kỳ ghi giá_trị đo_đếm không quá 30 phút ; \n l ) Đối_với hệ_thống đo_đếm tại\
    \ vị_trí đo_đếm chính , công_tơ đo điện_năng tác_dụng phải đạt cấp chính_xác 0,2 theo tiêu_chuẩn IEC 62053 - 22 và cấp\
    \ chính_xác 2,0 theo tiêu_chuẩn IEC 62053 - 23 nếu đo_đếm điện_năng phản_kháng hoặc các tiêu_chuẩn khác tương_đương ;\
    \ \n m ) Đối_với hệ_thống đo_đếm dự_phòng , công_tơ đo điện_năng tác_dụng phải đạt cấp chính_xác 0,5 theo tiêu_chuẩn IEC\
    \ 62053 - 22 và cấp chính_xác 2,0 theo tiêu_chuẩn IEC 62053 - 23 nếu đo_đếm điện_năng phản_kháng hoặc các tiêu_chuẩn khác\
    \ tương_đương . \n 2 . Yêu_cầu đối_với biến dòng_điện dùng cho đo_đếm điện_năng : \n a ) Có các cuộn dây thứ cấp đo_lường\
    \ dùng riêng cho công_tơ đo_đếm điện_năng ; \n b ) Giá_trị dòng_điện thứ cấp danh định là 1A hoặc 5A ; \n c ) Có vị_trí\
    \ niêm_phong kẹp chì tại nắp hộp đấu dây cuộn thứ cấp đo_lường cấp cho công_tơ đo_đếm điện_năng đảm_bảo không_thể tác_động\
    \ vào mạch điện_đấu nối nếu không phá_bỏ niêm_phong ; \n d ) Biến dòng_điện phục_vụ đo_đếm chính phải đạt cấp chính_xác\
    \ 0,2 theo tiêu_chuẩn IEC 60044 - 1 hoặc các tiêu_chuẩn khác tương_đương ; \n đ ) Biến dòng_điện phục_vụ đo_đếm dự_phòng\
    \ phải đạt cấp chính_xác 0,5 theo tiêu_chuẩn IEC 60044 - 1 hoặc các tiêu_chuẩn khác tương_đương . \n 3 . Yêu_cầu đối_với\
    \ biến điện_áp dùng cho đo_đếm điện_năng : \n a ) Có cuộn dây thứ cấp đo_lường dùng riêng cho công_tơ đo_đếm điện_năng\
    \ ; \n b ) Giá_trị điện_áp hệ_thống thứ cấp danh định là 100V hoặc 110V ; \n c ) Có vị_trí niêm_phong tại nắp hộp đấu\
    \ dây cuộn thứ cấp đo_lường cấp cho công_tơ đo_đếm điện_năng đảm_bảo không_thể tác_động vào mạch điện_đấu nối ; \n d )\
    \ Biến điện_áp phục_vụ đo_đếm chính phải đạt cấp chính_xác 0,2 theo tiêu_chuẩn IEC 60044 - 2 đối_với biến điện_áp kiểu\
    \ cảm_ứng , tiêu_chuẩn IEC 60044 - 5 đối_với biến điện_áp kiểu tụ hoặc các tiêu_chuẩn khác tương_đương ; \n đ ) Biến điện_áp\
    \ phục_vụ đo_đếm dự_phòng phải đạt cấp chính_xác 0,5 theo tiêu_chuẩn IEC 60044 - 2 đối_với biến điện_áp kiểu cảm_ứng ,\
    \ tiêu_chuẩn IEC 60044 - 5 đối_với biến điện_áp kiểu tụ hoặc các tiêu_chuẩn khác tương_đương ."
  - 'Tôi có hơn 6 năm làm giảng_viên đại_học , có chứng_chỉ nghiệp_vụ sư_phạm dành cho giảng_viên đại_học , cao_đẳng do Trường
    Đại_học Vinh cấp . Hiện tôi muốn nộp đơn xin vào dạy tại trường trung_học phổ_thông . Tôi tốt_nghiệp hệ kỹ_sư , có bằng
    thạc_sĩ . Xin hỏi , trường_hợp của tôi có đủ tiêu_chuẩn để giảng_dạy cấp trung_học phổ_thông không ? Bộ Giáo_dục và Đào_tạo
    trả_lời vấn_đề này như sau : Điểm c , Khoản 1 , Điều 77Luật Giáo dụcquy định trình_độ chuẩn được đào_tạo của giáo_viên
    trung_học phổ_thông là : “ Có bằng tốt_nghiệp đại_học sư_phạm hoặc có bằng tốt_nghiệp đại_học và có chứng_chỉ bồi_dưỡng
    nghiệp_vụ sư_phạm đối_với giáo_viên trung_học phổ_thông ” . Ông Nguyễn_Trấn Thành cần đối_chiếu với quy_định trên xem
    mình có đủ điều_kiện để dạy cấp trung_học phổ_thông không . Trường_hợp ông đủ điều_kiện thì vẫn phải thực_hiện quy_trình
    tuyển_dụng hoặc thuyên_chuyển công_tác theo quy_định của cơ_sở giáo_dục .'
