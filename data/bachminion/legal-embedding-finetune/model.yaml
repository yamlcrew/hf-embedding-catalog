    \ chấp_hành hiệu_lệnh , hướng_dẫn của người điều_khiển giao_thông hoặc người kiểm_soát giao_thông ; \n h ) Người đang\
    \ điều_khiển xe sử_dụng ô ( dù ) , điện_thoại_di_động , thiết_bị âm_thanh , trừ thiết_bị trợ_thính . \n 5 . Phạt tiền\
    \ từ 1.000.000 đồng đến 2.000.000 đồng đối_với người điều_khiển xe thực_hiện_hành_vi đi ngược chiều của đường một_chiều\
    \ , đi ngược chiều trên đường có biển “ Cấm đi ngược chiều ” , trừ hành_vi vi_phạm_quy_định tại điểm b khoản 6 Điều này\
    \ và các trường_hợp xe ưu_tiên đang đi làm nhiệm_vụ khẩn_cấp theo quy_định . \n 6 . Phạt tiền từ 2.000.000 đồng đến 3.000.000\
    \ đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây : \n a ) Sử_dụng chân chống hoặc vật\
    \ khác quệt xuống_đường khi xe đang chạy ; \n b ) Điều_khiển xe đi vào đường_cao_tốc , trừ xe phục_vụ_việc quản_lý , bảo_trì\
