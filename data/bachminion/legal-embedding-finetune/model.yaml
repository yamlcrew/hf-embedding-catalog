    \ cao_độ nền : \n - Chọn cao_độ xây_dựng H_≥ 2,50 m ( hệ VN2000 ) , tính đến phần thấp nhất ở mép đường . \n - Chọn giải_pháp\
    \ tôn cao nâng nền đến cao_độ xây_dựng lựa_chọn . \n - Hướng đổ dốc : từ giữa tiểu_khu ra xung_quanh và về phía sông rạch\
    \ . \n - Cao_độ thiết_kế đường_được xác_định đảm_bảo điều_kiện kỹ_thuật tổ_chức giao_thông và thoát nước mặt cho khu đất\
    \ . \n 7.2.2 . Giải_pháp_quy_hoạch thoát nước mặt : \n - Giải_pháp thoát nước : sử_dụng mạng_lưới thoát riêng cho nước_thải\
    \ và nước mặt . \n - Về tổ_chức thoát nước : xây mới các tuyến cống thoát nước mặt dọc các trục đường giao_thông nội_bộ\
    \ rồi dẫn thoát ra kênh_rạch trong khu_vực , đảm_bảo thoát nước triệt_để cho khu_vực . \n - Nguồn thoát : thoát về phía\
    \ kênh , rạch . \n - Cống thoát nước mặt xây mới sử_dụng cống ngầm , nối cống theo nguyên_tắc ngang đỉnh , độ dốc cống\
    \ đảm_bảo khả_năng tự làm sạch i ≥ 1 / D , độ sâu chôn cống tối_thiểu Hc = 0,70 m . \n 7.2.3 . Lưu_ý : \n - Về kỹ_thuật\
    \ tổ_chức vuốt dốc chuyển_đổi cao_độ đảm_bảo hiệu_quả kết_nối nền giữa dự_án với khu_vực tiếp_giáp , đề_nghị nghiên_cứu\
    \ đề_xuất chi_tiết trong giai_đoạn thiết_kế cơ_sở trình cơ_quan có thẩm_quyền thẩm_định và phê_duyệt theo quy_định . \n\
    \ - Việc san_lấp , nắn chỉnh kênh_rạch trong phạm_vi dự_án và hành_lang cách_ly rạch cần tuân_thủ thực_hiện theo Quyết_định\
    \ số 150 / 2004 / QĐ - UB ngày 09 tháng 6 năm 2004 và Công_văn số 6814 / UBND - ĐTMT ngày 11 tháng 10 năm 2007 ( diện_tích\
    \ hồ điều_tiết bằng 1,2 lần diện_tích rạch bị san_lấp ) của Ủy_ban nhân_dân Thành_phố . \n 7.3 . Quy_hoạch cấp điện và\
    \ chiếu sáng đô_thị : \n - Nguồn điện : được cấp từ trạm 110 / 15 - 22KV Cát_Lái . \n - Chỉ_tiêu cấp điện : 3 - 5 KW /\
    \ căn_hộ . \n - Xây_dựng mới các trạm biến_áp 15 - 22 / 0,4 KV , kiểu trạm phòng , công_suất đơn_vị ≥ 320KVA . \n - Mạng_lưới\
    \ cấp điện : \n + Xây_dựng mới mạng trung hạ_thế , sử_dụng cáp đồng bọc cách_điện , định_hướng xây_dựng ngầm . \n + Hệ_thống\
    \ chiếu sáng các trục đường , dùng đèn cao_áp sodium , có chóa và cần đèn đặt trên trụ thép tráng kẽm . \n 7.4 . Quy_hoạch\
    \ cấp_nước : \n - Nguồn cấp_nước : sử_dụng nguồn cấp nước_máy Thành_phố dựa vào tuyến ống cấp_nước Ø300 trên đường Vành_đai\
