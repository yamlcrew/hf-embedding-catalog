    \ / 100 mililít máu hoặc chưa vượt quá 0,25 miligam / 1 lít khí thở . \n 7 . Phạt tiền từ 4.000.000 đồng đến 5.000.000\
    \ đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây : \n a ) Điều_khiển xe chạy quá tốc_độ\
    \ quy_định trên 20 km / h ; \n b ) Không chú_ý quan_sát , điều_khiển xe chạy quá tốc_độ quy_định gây tai_nạn giao_thông\
    \ ; đi vào đường_cao_tốc , dừng xe , đỗ xe , quay đầu xe , lùi xe , tránh xe , vượt xe , chuyển_hướng , chuyển làn_đường\
    \ không đúng quy_định gây tai_nạn giao_thông ; không đi đúng phần đường , làn_đường , không giữ khoảng_cách an_toàn giữa\
    \ hai xe theo quy_định gây tai_nạn giao_thông hoặc đi vào đường có biển_báo_hiệu có nội_dung cấm đi vào đối_với loại phương_tiện\
    \ đang điều_khiển , đi ngược chiều của đường một_chiều , đi ngược chiều trên đường có biển “ Cấm đi ngược chiều ” gây\
    \ tai_nạn giao_thông , trừ hành_vi vi_phạm_quy_định tại điểm d khoản 8 Điều này ; \n c ) Điều_khiển xe trên đường mà trong\
    \ máu hoặc hơi thở có nồng_độ cồn vượt quá 50 miligam đến 80 miligam / 100 mililít máu hoặc vượt quá 0,25 miligam đến\
    \ 0,4 miligam / 1 lít khí thở . \n 8 . Phạt tiền từ 6.000.000 đồng đến 8.000.000 đồng đối_với người điều_khiển xe thực_hiện\
    \ một trong các hành_vi vi_phạm sau đây : \n a ) Buông cả hai tay khi đang điều_khiển xe ; dùng chân điều_khiển xe ; ngồi\
