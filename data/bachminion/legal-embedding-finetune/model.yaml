    \ . \n 7.6 . Quy_hoạch thông_tin liên_lạc : \n - Chỉ_tiêu điện_thoại cố_định : 1 thuê_bao / căn_hộ . \n - Định_hướng đấu\
    \ nối từ Đài điện_thoại hiện_hữu ( Trạm Bình_Trưng ) xây_dựng tuyến cáp chính đi dọc các trục đường giao_thông đến các\
    \ tủ cáp chính của khu quy_hoạch . \n - Mạng_lưới thông_tin liên_lạc được ngầm_hóa đảm_bảo mỹ_quan khu quy_hoạch và đáp_ứng\
    \ nhu_cầu thông_tin thông_suốt trong khu quy_hoạch . \n - Hệ_thống các tủ cáp xây_dựng mới được lắp_đặt tại các vị_trí\
    \ thuận_tiện , đảm_bảo mỹ_quan và dễ_dàng trong công_tác vận_hành , sửa_chữa . \n 7.7 . Đánh_giá môi_trường chiến_lược\
    \ : \n Các giải_pháp giảm_thiểu , khắc_phục tác_động đối_với dân_cư , cảnh_quan thiên_nhiên ; không_khí , tiếng ồn khi\
    \ triển_khai thực_hiện quy_hoạch đô_thị : \n - Chất_thải rắn được phân_loại tại nguồn , sau đó được thu_gom và vận_chuyển\
    \ đến khu xử_lý của Thành_phố . \n - Nước_thải được xử_lý tại trạm xử_lý nước_thải cục_bộ đạt QCVN 14 : 2008 / BTNMT trước\
    \ khi thoát ra môi_trường . \n - Bố_trí diện_tích cây_xanh đạt QCVN 01 : 2008 / BXD nhằm điều hòa_vi khí_hậu . \n - Quy_hoạch\
    \ khoảng_cách_ly rạch Bà Quẹo là 10m . \n - Bố_trí hồ điều_tiết 0,13 ha phía Đông_Nam khu quy_hoạch . \n - Lồng_ghép trong\
