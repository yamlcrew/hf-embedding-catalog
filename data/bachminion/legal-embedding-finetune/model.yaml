      \ lần diện_tích rạch bị san_lấp ) của Ủy_ban nhân_dân Thành_phố . \n 7.3 . Quy_hoạch cấp điện và chiếu sáng đô_thị :\
      \ \n - Nguồn điện : được cấp từ trạm 110 / 15 - 22KV Cát_Lái . \n - Chỉ_tiêu cấp điện : 3 - 5 KW / căn_hộ . \n - Xây_dựng\
      \ mới các trạm biến_áp 15 - 22 / 0,4 KV , kiểu trạm phòng , công_suất đơn_vị ≥ 320KVA . \n - Mạng_lưới cấp điện : \n\
      \ + Xây_dựng mới mạng trung hạ_thế , sử_dụng cáp đồng bọc cách_điện , định_hướng xây_dựng ngầm . \n + Hệ_thống chiếu\
      \ sáng các trục đường , dùng đèn cao_áp sodium , có chóa và cần đèn đặt trên trụ thép tráng kẽm . \n 7.4 . Quy_hoạch\
      \ cấp_nước : \n - Nguồn cấp_nước : sử_dụng nguồn cấp nước_máy Thành_phố dựa vào tuyến ống cấp_nước Ø300 trên đường Vành_đai\
      \ phía Đông từ nhà_máy nước Thủ_Đức . \n - Tiêu_chuẩn cấp_nước sinh_hoạt : 180 lít / người / ngày . \n - Tổng_nhu_cầu\
      \ dùng nước : 193 - 232 m3 / ngày . \n - Hệ_thống cấp_nước chữa_cháy : Dựa vào hệ_thống cấp_nước chính của khu quy_hoạch\
      \ mạng dịch_vụ bố_trí mới các trụ lấy nước chữa_cháy tại ngã 3 , ngã 4 đường với khoảng_cách giữa các trụ chữa_cháy\
      \ là 150m . \n - Mạng_lưới cấp_nước : xây_dựng mạng_lưới cấp_nước có đường_kính Ø100 - Ø150 trên các trục đường chính_quy_hoạch\
      \ tạo thành mạch vòng , mạch nhánh cung_cấp_nước đến từng khu_vực sử_dụng . \n 7.5 . Quy_hoạch thoát nước_thải và xử_lý\
      \ chất_thải rắn : \n 7.5.1 . Thoát nước_thải : \n - Giải_pháp thoát nước_thải : \n + Giai_đoạn đầu : xây_dựng hệ_thống\
      \ thoát nước_thải riêng . Nước_thải được thu_gom và đưa về trạm xử_lý công_suất Q = 170 m3 / ngày , sau xử_lý đạt tiêu_chuẩn\
      \ QCVN 14 : 2008 / BTNMT. \n + Giai_đoạn dài_hạn : nước_thải được đưa về nhà_máy xử_lý nước_thải khu_vực , sau xử_lý\
      \ đạt TCVN 7222 - 2002 . \n - Tiêu_chuẩn thoát nước sinh_hoạt : 180 lít / người / ngày . \n - Tổng_lượng nước_thải :\
      \ 137 - 164 m3 / ngày . \n - Mạng_lưới thoát nước : hệ_thống thoát nước_thải trong khu_vực có đường_kính Ø300 đi trên\
      \ các trục đường chính khu quy_hoạch hướng về trạm xử_lý cục_bộ đặt trong khu quy_hoạch . Độ sâu đặt cống tối_thiểu\
      \ là 0,7 m tính từ mặt_đất đến đỉnh cống . \n 7.5.2 . Xử_lý chất_thải rắn : \n - Tiêu_chuẩn chất_thải rắn sinh_hoạt\
      \ : 1,3 kg / người / ngày . \n - Tổng_lượng chất_thải rắn sinh_hoạt : 0,827 tấn / ngày . \n - Phương_án thu_gom và xử_lý\
      \ chất_thải rắn : chất_thải rắn thải được thu_gom và đưa đến trạm ép kín , sau đó vận_chuyển về khu liên_hợp xử_lý chất_thải\
      \ rắn Thành_phố . \n 7.6 . Quy_hoạch thông_tin liên_lạc : \n - Chỉ_tiêu điện_thoại cố_định : 1 thuê_bao / căn_hộ . \n\
      \ - Định_hướng đấu nối từ Đài điện_thoại hiện_hữu ( Trạm Bình_Trưng ) xây_dựng tuyến cáp chính đi dọc các trục đường\
      \ giao_thông đến các tủ cáp chính của khu quy_hoạch . \n - Mạng_lưới thông_tin liên_lạc được ngầm_hóa đảm_bảo mỹ_quan\
      \ khu quy_hoạch và đáp_ứng nhu_cầu thông_tin thông_suốt trong khu quy_hoạch . \n - Hệ_thống các tủ cáp xây_dựng mới\
      \ được lắp_đặt tại các vị_trí thuận_tiện , đảm_bảo mỹ_quan và dễ_dàng trong công_tác vận_hành , sửa_chữa . \n 7.7 .\
      \ Đánh_giá môi_trường chiến_lược : \n Các giải_pháp giảm_thiểu , khắc_phục tác_động đối_với dân_cư , cảnh_quan thiên_nhiên\
      \ ; không_khí , tiếng ồn khi triển_khai thực_hiện quy_hoạch đô_thị : \n - Chất_thải rắn được phân_loại tại nguồn , sau\
      \ đó được thu_gom và vận_chuyển đến khu xử_lý của Thành_phố . \n - Nước_thải được xử_lý tại trạm xử_lý nước_thải cục_bộ\
      \ đạt QCVN 14 : 2008 / BTNMT trước khi thoát ra môi_trường . \n - Bố_trí diện_tích cây_xanh đạt QCVN 01 : 2008 / BXD\
      \ nhằm điều hòa_vi khí_hậu . \n - Quy_hoạch khoảng_cách_ly rạch Bà Quẹo là 10m . \n - Bố_trí hồ điều_tiết 0,13 ha phía\
      \ Đông_Nam khu quy_hoạch . \n - Lồng_ghép trong quy_hoạch các giải_pháp nhằm thích_nghi và giảm nhẹ tác_động của biến_đổi\
      \ khí_hậu . \n 7.8 . Tổng_hợp đường_dây đường_ống : \n Việc bố_trí , sắp_xếp đường_dây , đường_ống kỹ_thuật có_thể thay_đổi\
      \ trong các bước triển_khai thiết_kế_tiếp_theo ( thiết_kế cơ_sở , thiết_kế kỹ_thuật thi_công của dự_án ) đảm_bảo yêu_cầu\
      \ kỹ_thuật theo quy_định . \n 8 . Các nội_dung lưu_ý khác : \n - Sau khi đồ_án này được phê_duyệt , chủ đầu_tư cần lập\
      \ dự_thảo Quy_định quản_lý theo đồ_án quy_hoạch chi_tiết xây_dựng đô_thị tỷ_lệ 1 / 500 để trình Sở Quy_hoạch - Kiến_trúc\
      \ xem_xét thẩm_định và phê_duyệt bổ_sung . \n - Về nhà ở xã_hội : thực_hiện theo quy_định tại Điểm b , Khoản 2 , Điều\
      \ 6 của Nghị_định số 188 / 2013 / NĐ - CP ngày 20 tháng 11 năm 2013 của Chính_phủ về phát_triển và quản_lý nhà ở xã_hội\
      \ . \n - Công_tác cắm mốc quy_hoạch được duyệt cần thực_hiện theo Thông_tư số 15 / 2010 / TT - BXD ngày 27 tháng 8 năm\
      \ 2010 của Bộ Xây_dựng quy_định về cắm mốc_giới và quản_lý mốc_giới theo quy_hoạch đô_thị và Quyết_định số 19 / 2014\
      \ / QĐ - UBND ngày 12 tháng 5 năm 2014 của Ủy_ban nhân_dân Thành_phố . \n - Nội_dung chi_tiết cụ_thể của hệ_thống hạ_tầng\
      \ kỹ_thuật đến từng công_trình trong phạm_vi ranh dự_án , Chủ đầu_tư sẽ chịu trách_nhiệm lập thiết_kế cơ_sở , thiết_kế\
      \ kỹ_thuật thi_công của dự_án và trình các cấp có thẩm_quyền thẩm_định và phê_duyệt theo quy_định , đảm_bảo kết_nối_mạng_lưới\
      \ hạ_tầng kỹ_thuật trong khu_vực . \n - Trong quá_trình tổ_chức triển_khai các dự_án đầu_tư xây_dựng tại các khu_vực\
      \ có sông , kênh , rạch trong khu_vực quy_hoạch ; Ủy_ban nhân_dân Quận 2 , Sở Giao_thông vận_tải , Sở Quy_hoạch - Kiến_trúc\
      \ , Sở Xây_dựng và các đơn_vị có liên_quan cần quản_lý chặt_chẽ việc tuân_thủ về chỉ_giới hành_lang sông , kênh , rạch\
      \ đã được quy_định tại Quyết_định số 150 / 2004 / QĐ - UBND ngày 09 tháng 6 năm 2004 của Ủy_ban nhân_dân Thành_phố ban_hành\
      \ Quy_định quản_lý , sử_dụng hành_lang sông , kênh , rạch trên địa_bàn Thành_phố Hồ_Chí_Minh ."
    - "Điều 70 . Mức tiền thưởng huân_chương các loại 1 . Cá_nhân được tặng hoặc truy_tặng huân_chương các loại được tặng\
      \ Bằng , Huân_chương kèm theo mức tiền thưởng như sau : \n a ) “ Huân_chương Sao vàng ” : 46,0 lần mức lương cơ_sở ;\
      \ \n b ) “ Huân_chương Hồ_Chí_Minh ” : 30,5 lần mức lương cơ_sở ; \n c ) “ Huân_chương Độc_lập ” hạng nhất , “ Huân_chương\
      \ Quân_công ” hạng nhất : 15,0 lần mức lương cơ_sở ; \n d ) “ Huân_chương Độc_lập ” hạng nhì , “ Huân_chương Quân_công\
      \ ” hạng nhì : 12,5 lần mức lương cơ_sở ; \n đ ) “ Huân_chương Độc_lập ” hạng ba , “ Huân_chương Quân_công ” hạng ba\
      \ : 10,5 lần mức lương cơ_sở ; \n e ) “ Huân_chương Lao_động ” hạng nhất , “ Huân_chương Chiến_công ” hạng nhất , “\
      \ Huân_chương Bảo_vệ Tổ_quốc hạng nhất ” : 9,0 lần mức lương cơ_sở ; \n g ) “ Huân_chương Lao_động ” hạng nhì , “ Huân_chương\
      \ Chiến_công ” hạng nhì , “ Huân_chương Bảo_vệ Tổ_quốc ” hạng nhì , “ Huân_chương Đại_đoàn_kết dân_tộc ” : 7,5 lần mức\
      \ lương cơ_sở ; \n h ) “ Huân_chương Lao_động ” hạng ba , “ Huân_chương Chiến_công ” hạng ba , “ Huân_chương Bảo_vệ\
      \ Tổ_quốc ” hạng ba và “ Huân_chương Dũng_cảm ” : 4,5 lần mức lương cơ_sở . \n 2 . Tập_thể được tặng_thưởng Huân_chương\
      \ các loại , được tặng_thưởng Bằng , Huân_chương kèm theo mức tiền thưởng gấp hai lần mức tiền thưởng đối_với cá_nhân\
      \ quy_định tại khoản 1 Điều này ."
  - source_sentence: Thủ_tục chuyển BHYT khi thay_đổi nơi ở
    sentences:
    - 'Bố tôi có BHYT cựu_chiến_binh . Trước_đây bố tôi thường_trú tại quận Hai Bà Trưng , nay chuyển hộ_khẩu về huyện Thanh_Oai
      , vậy thủ_tục chuyển BHYT cho bố của tôi về huyện như thế_nào ? Bảo_hiểm xã_hội Việt_Nam trả_lời vấn_đề này như sau
      : Căn_cứ quy_định tại Khoản 5 Điều 11 Nghị_định số146 / 2018 / NĐ - CPngày 17 / 10 / 2018 của Chính_phủ quy_định chi_tiết
      và hướng_dẫn biện_pháp thi_hành một_số điều của Luật BHYT , trường_hợp bố của bà Hằng được ngân_sách nhà_nước đóng BHYT
      theo nhóm cựu_chiến_binh , nay chuyển từ phường thuộc quận Hai Bà Trưng , TP. Hà_Nội về thường_trú tại huyện Thanh_Oai
      thì liên_hệ với UBND phường để lập hồ_sơ dừng / giảm tham_gia BHYT và liên_hệ với UBND xã , hoặc thị_trấn nơi thường_trú
      tại huyện Thanh_Oai để được lập danh_sách tham_gia BHYT theo nhóm cựu_chiến_binh gửi cơ_quan BHXH.'
    - "Điều 1 Thông_tư 49 / 2019 / TT - BGTVT thủ_tục hỗ_trợ_giá cho doanh_nghiệp kinh_doanh vận_tải đường_sắt mới nhất có\
      \ nội_dung như sau : \n \n Điều 1 . Phạm_vi điều_chỉnh \n Thông_tư này quy_định quy_trình , hồ_sơ thanh quyết_toán ,\
      \ thủ_tục hỗ_trợ_giá cho doanh_nghiệp kinh_doanh vận_tải đường_sắt thực_hiện vận_tải phục_vụ nhiệm_vụ đặc_biệt , nhiệm_vụ\
      \ an_sinh xã_hội ."
    - "Căn_cứ theo quy_định tại Khoản 2 Điều 25 Luật Bảo_hiểm xã_hội 2014 quy_định về điều_kiện hưởng chế_độ ốm_đau như sau\
      \ : \n \n Điều_kiện hưởng chế_độ ốm_đau \n 1 . Bị ốm_đau , tai_nạn mà không phải là tai_nạn lao_động phải nghỉ_việc\
      \ và có xác_nhận của cơ_sở khám bệnh , chữa bệnh có thẩm_quyền theo quy_định của Bộ Y_tế . \n Trường_hợp ốm_đau , tai_nạn\
      \ phải nghỉ_việc do tự hủy_hoại sức_khỏe , do say rượu hoặc sử_dụng chất ma_túy , tiền chất ma_túy theo danh_mục do\
      \ Chính_phủ quy_định thì không được hưởng chế_độ ốm_đau . \n 2 . Phải nghỉ_việc để chăm_sóc con dưới 07 tuổi bị ốm_đau\
      \ và có xác_nhận của cơ_sở khám bệnh , chữa bệnh có thẩm_quyền . \n \n \n Theo đó , người lao_động nghỉ_việc để chăm_sóc\
      \ con dưới 07 tuổi bị ốm_đau và có xác_nhận của cơ_sở khám bệnh , chữa bệnh có thẩm_quyền thì đủ điều_kiện hưởng chế_độ\
      \ ốm_đau . Do đó trong trường_hợp con của bạn đã 8 tuổi thì bạn không đủ điều_kiện hưởng chế_độ ốm_đau ."
  - source_sentence: Điều 10 Thông_tư 08 / 2013 / TT - BTC hướng_dẫn thực_hiện kế_toán nhà_nước áp_dụng Hệ_thống
    sentences:
    - "Điều 10 Thông_tư 08 / 2013 / TT - BTC hướng_dẫn thực_hiện kế_toán nhà_nước áp_dụng Hệ_thống có nội_dung như sau : \n\
      \ \n Điều 10 . Kiểm_kê tài_sản \n 1 . Kiểm_kê tài_sản là việc cân , đong , đo , đếm số_lượng ; xác_nhận và đánh_giá\
      \ chất_lượng , giá_trị của tài_sản , nguồn vốn hiện có tại thời_điểm kiểm_kê để kiểm_tra , đối_chiếu với số_liệu trong\
      \ sổ kế_toán . \n 2 . Các đơn_vị KBNN phải kiểm_kê tài_sản trong các trường_hợp sau : \n - Cuối kỳ kế_toán tháng , năm\
      \ , trước khi lập báo_cáo tài_chính ; \n - Chia , tách , hợp_nhất , sáp_nhập , giải_thể , chấm_dứt hoạt_động ; \n -\
      \ Xảy ra_hỏa_hoạn , lũ_lụt và các thiệt_hại bất_thường khác ; \n - Đánh_giá lại tài_sản theo quyết_định của cơ_quan\
      \ nhà_nước có thẩm_quyền ; \n - Các trường_hợp khác theo quy_định của pháp_luật và theo yêu_cầu của cơ_quan nhà_nước\
      \ có thẩm_quyền . \n 3 . Sau khi kiểm_kê tài_sản , đơn_vị KBNN phải lập báo_cáo tổng_hợp kết_quả kiểm_kê . Trường_hợp\
      \ có chênh_lệch giữa số_liệu thực_tế kiểm_kê với số_liệu ghi trên sổ kế_toán , phải xác_định nguyên_nhân và phải phản_ánh\
      \ số chênh_lệch và kết_quả xử_lý vào sổ kế_toán trước khi lập báo_cáo tài_chính . \n 4 . Việc kiểm_kê phải phản_ánh\
      \ đúng thực_tế tài_sản , nguồn hình_thành_tài_sản tại đơn_vị ; người lập và ký báo_cáo tổng_hợp kết_quả kiểm_kê phải\
      \ chịu trách_nhiệm về kết_quả kiểm_kê tại đơn_vị mình ."
    - "Điều 103 Thông_tư 32 / 2010 / TT - BCT hệ_thống điện_phân_phối có nội_dung như sau : \n \n Điều 103 . Hệ_thống đo_đếm\
      \ cấp điện_áp 110kV \n 1 . Yêu_cầu đối_với công_tơ đo_đếm điện_năng : \n a ) Là loại 3 pha 4 dây ; \n b ) Kiểu điện_tử\
      \ tích_hợp chức_năng và có_thể lập_trình được ; \n c ) Có nhiều biểu giá ; \n d ) Đo_đếm điện_năng tác_dụng và phản_kháng\
      \ theo hai chiều nhận và phát riêng_biệt theo 4 góc phần tư ; \n đ ) Có chức_năng đo công_suất cực_đại , ghi biểu_đồ\
      \ phụ_tải tổng ; \n e ) Có giao_thức thích_hợp để thu_thập , đọc số_liệu tại_chỗ và từ xa ; \n g ) Được cấp nguồn từ\
      \ hệ_thống điện_áp thứ cấp đo_lường và phải đảm_bảo duy_trì hoạt_động khi mất điện_áp 1 hoặc 2 pha bất_kỳ ; \n h ) Có\
      \ nhiều mức mật_khẩu ; \n i ) Có các vị_trí niêm_phong , kẹp chì đảm_bảo không_thể tiếp_cận với các đầu cực đấu dây\
      \ và thay_đổi các thông_số cài_đặt trong công_tơ nếu không phá_bỏ chì niêm_phong ; \n k ) Có chức_năng lưu_trữ thông_tin\
      \ đo_đếm , biểu_đồ phụ_tải ít_nhất 60 ngày với chu_kỳ ghi giá_trị đo_đếm không quá 30 phút ; \n l ) Đối_với hệ_thống\
      \ đo_đếm tại vị_trí đo_đếm chính , công_tơ đo điện_năng tác_dụng phải đạt cấp chính_xác 0,2 theo tiêu_chuẩn IEC 62053\
      \ - 22 và cấp chính_xác 2,0 theo tiêu_chuẩn IEC 62053 - 23 nếu đo_đếm điện_năng phản_kháng hoặc các tiêu_chuẩn khác\
      \ tương_đương ; \n m ) Đối_với hệ_thống đo_đếm dự_phòng , công_tơ đo điện_năng tác_dụng phải đạt cấp chính_xác 0,5 theo\
      \ tiêu_chuẩn IEC 62053 - 22 và cấp chính_xác 2,0 theo tiêu_chuẩn IEC 62053 - 23 nếu đo_đếm điện_năng phản_kháng hoặc\
      \ các tiêu_chuẩn khác tương_đương . \n 2 . Yêu_cầu đối_với biến dòng_điện dùng cho đo_đếm điện_năng : \n a ) Có các\
      \ cuộn dây thứ cấp đo_lường dùng riêng cho công_tơ đo_đếm điện_năng ; \n b ) Giá_trị dòng_điện thứ cấp danh định là\
      \ 1A hoặc 5A ; \n c ) Có vị_trí niêm_phong kẹp chì tại nắp hộp đấu dây cuộn thứ cấp đo_lường cấp cho công_tơ đo_đếm\
      \ điện_năng đảm_bảo không_thể tác_động vào mạch điện_đấu nối nếu không phá_bỏ niêm_phong ; \n d ) Biến dòng_điện phục_vụ\
      \ đo_đếm chính phải đạt cấp chính_xác 0,2 theo tiêu_chuẩn IEC 60044 - 1 hoặc các tiêu_chuẩn khác tương_đương ; \n đ\
      \ ) Biến dòng_điện phục_vụ đo_đếm dự_phòng phải đạt cấp chính_xác 0,5 theo tiêu_chuẩn IEC 60044 - 1 hoặc các tiêu_chuẩn\
      \ khác tương_đương . \n 3 . Yêu_cầu đối_với biến điện_áp dùng cho đo_đếm điện_năng : \n a ) Có cuộn dây thứ cấp đo_lường\
      \ dùng riêng cho công_tơ đo_đếm điện_năng ; \n b ) Giá_trị điện_áp hệ_thống thứ cấp danh định là 100V hoặc 110V ; \n\
      \ c ) Có vị_trí niêm_phong tại nắp hộp đấu dây cuộn thứ cấp đo_lường cấp cho công_tơ đo_đếm điện_năng đảm_bảo không_thể\
      \ tác_động vào mạch điện_đấu nối ; \n d ) Biến điện_áp phục_vụ đo_đếm chính phải đạt cấp chính_xác 0,2 theo tiêu_chuẩn\
      \ IEC 60044 - 2 đối_với biến điện_áp kiểu cảm_ứng , tiêu_chuẩn IEC 60044 - 5 đối_với biến điện_áp kiểu tụ hoặc các tiêu_chuẩn\
      \ khác tương_đương ; \n đ ) Biến điện_áp phục_vụ đo_đếm dự_phòng phải đạt cấp chính_xác 0,5 theo tiêu_chuẩn IEC 60044\
      \ - 2 đối_với biến điện_áp kiểu cảm_ứng , tiêu_chuẩn IEC 60044 - 5 đối_với biến điện_áp kiểu tụ hoặc các tiêu_chuẩn\
      \ khác tương_đương ."
    - 'Tôi có hơn 6 năm làm giảng_viên đại_học , có chứng_chỉ nghiệp_vụ sư_phạm dành cho giảng_viên đại_học , cao_đẳng do
      Trường Đại_học Vinh cấp . Hiện tôi muốn nộp đơn xin vào dạy tại trường trung_học phổ_thông . Tôi tốt_nghiệp hệ kỹ_sư
      , có bằng thạc_sĩ . Xin hỏi , trường_hợp của tôi có đủ tiêu_chuẩn để giảng_dạy cấp trung_học phổ_thông không ? Bộ Giáo_dục
      và Đào_tạo trả_lời vấn_đề này như sau : Điểm c , Khoản 1 , Điều 77Luật Giáo dụcquy định trình_độ chuẩn được đào_tạo
      của giáo_viên trung_học phổ_thông là : “ Có bằng tốt_nghiệp đại_học sư_phạm hoặc có bằng tốt_nghiệp đại_học và có chứng_chỉ
      bồi_dưỡng nghiệp_vụ sư_phạm đối_với giáo_viên trung_học phổ_thông ” . Ông Nguyễn_Trấn Thành cần đối_chiếu với quy_định
      trên xem mình có đủ điều_kiện để dạy cấp trung_học phổ_thông không . Trường_hợp ông đủ điều_kiện thì vẫn phải thực_hiện
      quy_trình tuyển_dụng hoặc thuyên_chuyển công_tác theo quy_định của cơ_sở giáo_dục .'
