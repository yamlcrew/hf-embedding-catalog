    \ sau để điều_khiển xe hoặc bịt_mắt điều_khiển xe ; \n b ) Điều_khiển xe lạng_lách hoặc đánh_võng trên đường_bộ trong\
    \ , ngoài đô_thị ; \n c ) Điều_khiển xe chạy bằng một bánh đối_với xe hai bánh , chạy bằng hai bánh đối_với xe ba bánh\
    \ ; \n d ) Điều_khiển xe thành nhóm từ 02 xe trở lên chạy quá tốc_độ quy_định ; \n đ ) Gây tai_nạn giao_thông không dừng\
    \ lại , không giữ nguyên hiện_trường , bỏ trốn không đến trình_báo với cơ_quan có thẩm_quyền , không tham_gia cấp_cứu\
    \ người bị nạn ; \n e ) Điều_khiển xe trên đường mà trong máu hoặc hơi thở có nồng_độ cồn vượt quá 80 miligam / 100 mililít\
    \ máu hoặc vượt quá 0,4 miligam / 1 lít khí thở ; \n g ) Không chấp_hành yêu_cầu kiểm_tra về nồng_độ cồn của người thi_hành\
    \ công_vụ ; \n h ) Điều_khiển xe trên đường mà trong cơ_thể có chất ma_túy ; \n i ) Không chấp_hành yêu_cầu kiểm_tra về\
    \ chất ma_túy của người thi_hành công_vụ . \n 9 . Phạt tiền từ 10.000.000 đồng đến 14.000.000 đồng đối_với hành_vi vi_phạm_quy_định\
