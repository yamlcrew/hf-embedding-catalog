    \ - Về nhà ở xã_hội : thực_hiện theo quy_định tại Điểm b , Khoản 2 , Điều 6 của Nghị_định số 188 / 2013 / NĐ - CP ngày\
    \ 20 tháng 11 năm 2013 của Chính_phủ về phát_triển và quản_lý nhà ở xã_hội . \n - Công_tác cắm mốc quy_hoạch được duyệt\
    \ cần thực_hiện theo Thông_tư số 15 / 2010 / TT - BXD ngày 27 tháng 8 năm 2010 của Bộ Xây_dựng quy_định về cắm mốc_giới\
    \ và quản_lý mốc_giới theo quy_hoạch đô_thị và Quyết_định số 19 / 2014 / QĐ - UBND ngày 12 tháng 5 năm 2014 của Ủy_ban\
    \ nhân_dân Thành_phố . \n - Nội_dung chi_tiết cụ_thể của hệ_thống hạ_tầng kỹ_thuật đến từng công_trình trong phạm_vi ranh\
    \ dự_án , Chủ đầu_tư sẽ chịu trách_nhiệm lập thiết_kế cơ_sở , thiết_kế kỹ_thuật thi_công của dự_án và trình các cấp có\
    \ thẩm_quyền thẩm_định và phê_duyệt theo quy_định , đảm_bảo kết_nối_mạng_lưới hạ_tầng kỹ_thuật trong khu_vực . \n - Trong\
    \ quá_trình tổ_chức triển_khai các dự_án đầu_tư xây_dựng tại các khu_vực có sông , kênh , rạch trong khu_vực quy_hoạch\
    \ ; Ủy_ban nhân_dân Quận 2 , Sở Giao_thông vận_tải , Sở Quy_hoạch - Kiến_trúc , Sở Xây_dựng và các đơn_vị có liên_quan\
    \ cần quản_lý chặt_chẽ việc tuân_thủ về chỉ_giới hành_lang sông , kênh , rạch đã được quy_định tại Quyết_định số 150 /\
    \ 2004 / QĐ - UBND ngày 09 tháng 6 năm 2004 của Ủy_ban nhân_dân Thành_phố ban_hành Quy_định quản_lý , sử_dụng hành_lang\
    \ sông , kênh , rạch trên địa_bàn Thành_phố Hồ_Chí_Minh ."
