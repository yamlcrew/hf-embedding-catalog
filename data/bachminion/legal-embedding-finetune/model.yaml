  - "Điều 2 Quyết_định 15 / 2017 / QĐ - UBND Quy_định quản_lý sử_dụng kinh_phí khuyến thương Thái_Bình có nội_dung như sau\
    \ : \n \n Điều 2 . Giao_Sở Công_Thương chủ_trì , phối_hợp với Sở Tài_chính và các sở , ban , ngành liên_quan chịu trách_nhiệm\
    \ hướng_dẫn và tổ_chức thực_hiện Quyết_định này ."
  - "Điều 15 . Xử_phạt các hành_vi vi_phạm_quy_định về quản_lý , khai_thác , bảo_trì , bảo_vệ kết_cấu_hạ_tầng giao_thông đường_bộ\
    \ 1 . Cảnh_cáo hoặc phạt tiền từ 60.000 đồng đến 100.000 đồng đối_với cá_nhân thực_hiện một trong các hành_vi vi_phạm\
    \ sau đây : \n a ) Chăn_dắt súc_vật ở mái đường ; buộc súc_vật vào hàng cây hai bên đường hoặc vào cọc tiêu , biển_báo\
    \ , rào_chắn , các công_trình phụ_trợ của giao_thông đường_bộ ; \n b ) Tự_ý leo_trèo lên mố , trụ , dầm cầu . \n 2 . Phạt\
    \ tiền từ 200.000 đồng đến 300.000 đồng đối_với cá_nhân , từ 400.000 đồng đến 600.000 đồng đối_với tổ_chức thực_hiện một\
    \ trong các hành_vi vi_phạm sau đây : \n a ) Tự_ý đốt lửa trên cầu , dưới gầm cầu ; neo đậu tàu , thuyền dưới gầm cầu\
    \ hoặc trong phạm_vi hành_lang an_toàn_cầu ; \n b ) Tự_ý be bờ , tát nước qua mặt_đường giao_thông ; đặt ống bơm nước\
    \ , bơm cát qua đường , đốt lửa trên mặt_đường . \n 3 . Phạt tiền từ 6.000.000 đồng đến 8.000.000 đồng đối_với tổ_chức\
    \ được giao quản_lý , khai_thác , bảo_trì kết_cấu_hạ_tầng giao_thông đường_bộ thực_hiện một trong các hành_vi vi_phạm\
    \ sau đây : \n a ) Không bổ_sung hoặc sửa_chữa kịp_thời theo quy_định các biển_báo_hiệu nguy_hiểm đã bị mất , bị hư_hỏng\
    \ mất tác_dụng ; không có biện_pháp khắc_phục kịp_thời theo quy_định các hư_hỏng của công_trình đường_bộ gây mất an_toàn\
    \ giao_thông ; \n b ) Không phát_hiện hoặc không có biện_pháp ngăn_chặn , báo_cáo kịp_thời các hành_vi lấn_chiếm , sử_dụng\
    \ trái_phép hành_lang an_toàn giao_thông đường_bộ , phần đất dọc hai bên đường_bộ dùng để quản_lý , bảo_trì , bảo_vệ công_trình\
    \ đường_bộ ; \n c ) Không cắm cột thủy_chí và có biện_pháp ngăn_chặn phương_tiện qua những đoạn đường bị ngập nước sâu\
    \ trên 0,2 m ; \n d ) Không có quy_trình quản_lý , vận_hành , khai_thác , bảo_trì đường_bộ theo quy_định hoặc không thực_hiện\
    \ đầy_đủ các nội_dung quy_định trong quy_trình quản_lý , vận_hành , khai_thác , bảo_trì đường_bộ đã được phê_duyệt . \n\
    \ 4 . Phạt tiền từ 3.000.000 đồng đến 5.000.000 đồng đối_với cá_nhân , từ 6.000.000 đồng đến 10.000.000 đồng đối_với tổ_chức\
