- source_sentence: Giấy_tờ cần có để hạch_toán vào chi_phí hợp_lý
  sentences:
  - 'Đơn_vị của tôi đang lập dự_toán cho một công_trình xây_dựng theo mức lương tối_thiểu vùng quy_định tại Nghị_định số103
    / 2012 / NĐ - CPcủa Chính_phủ , nhưng chưa được cơ_quan thẩm_định phê_duyệt dự_án với lý_do chưa có hướng_dẫn thực_hiện
    . Tôi muốn hỏi , địa_phương có_thể căn_cứ mức lương tối_thiểu mới theo quy_định tại Nghị_định 103 / 2012 / NĐ - CP hay
    phải đợi hướng_dẫn của cơ_quan có thẩm_quyền để lập dự_toán xây_dựng ? Bộ Xây_dựng trả_lời vấn_đề này như sau : Ngày 2
    / 4 / 2013 , Bộ Xây_dựng đã ban_hành_văn_bản số 551 / BXD - KTXD hướng_dẫn điều_chỉnh chi_phí nhân_công để lập và quản_lý
    chi_phí đầu_tư xây_dựng công_trình theo quy_định tại Nghị_định số 103 / 2012 / NĐ - CP ngày 4 / 12 / 2012 của Chính_phủ
    .'
  - "Điều 9 . Thông_tin dự_báo và phát_hiện sớm cháy rừng 1 . Thông_tin dự_báo cháy rừng \n a ) Cục Kiểm_lâm thông_tin cấp\
    \ dự_báo cháy rừng trên Website , cổng thông_tin điện_tử của Cục Kiểm_lâm ; cung_cấp thông_tin cho Đài_Truyền_hình Việt_Nam\
    \ , Đài_Tiếng_nói Việt_Nam và các phương_tiện thông_tin đại_chúng khác để đưa , phát bản tin cảnh_báo cháy rừng . \n b\
    \ ) Chi_cục Kiểm_lâm vùng thông_tin cấp dự_báo cháy rừng trên Website , cổng thông_tin điện_tử của đơn_vị ; gửi thông_báo\
    \ cấp dự_báo cháy rừng đến Chi_cục Kiểm_lâm tỉnh trong phạm_vi được phân_công . \n c ) Chi_cục Kiểm_lâm tỉnh thực_hiện\
    \ dự_báo nguy_cơ cháy rừng và thông_tin cấp dự_báo cháy rừng rộng_rãi trên các phương_tiện thông_tin đại_chúng ; chỉ_đạo\
    \ kiểm_lâm làm_việc tại địa_bàn ( sau đây viết là kiểm_lâm địa_bàn ) , Hạt Kiểm_lâm thông_tin cấp dự_báo cháy rừng đến\
    \ chính_quyền địa_phương cơ_sở , các chủ rừng , các hộ dân sống trong rừng , gần rừng . \n 2 . Phát_hiện sớm cháy rừng\
    \ \n a ) Cục Kiểm_lâm duy_trì thường_xuyên hệ_thống trạm thu ảnh vệ_tinh phát_hiện sớm điểm cháy và các thông_tin ứng_dụng\
    \ khác ; cập_nhật thông_tin điểm cháy do trạm thu ảnh vệ_tinh phát_hiện trên Website , cổng thông_tin điện_tử của Cục\
    \ Kiểm_lâm . \n b ) Chi_cục Kiểm_lâm vùng theo_dõi điểm cháy sớm , thông_báo đến Chi_cục Kiểm_lâm các tỉnh trong phạm_vi\
    \ được phân_công phụ_trách để kiểm_tra , xác_minh , theo_dõi quá_trình xử_lý , báo_cáo Cục_Kiểm lâ m về kết_quả kiểm_tra\
    \ , xác_minh . \n c ) Chi_cục Kiểm_lâm tỉnh theo_dõi các điểm cháy sớm phát_hiện từ ảnh vệ_tinh , kết_hợp phát_hiện cháy\
    \ sớm tại các chòi canh , các chốt gác để phát_hiện sớm các điểm cháy rừng ; chỉ_đạo Hạt Kiểm_lâm , các chủ rừng kiểm_tra\
    \ , xác_minh và tổ_chức chữa_cháy kịp_thời . \n d ) Chủ rừng tổ_chức tuần_tra ; ứng_dụng khoa_học , công_nghệ và sử_dụng\
    \ phương_tiện , thiết_bị để theo_dõi , phát_hiện sớm cháy rừng ; cung_cấp thông_tin khi phát_hiện có cháy rừng và tổ_chức\
    \ chữa_cháy kịp_thời ; tổ_chức trực chòi canh , kiểm_soát người ra vào rừng . \n đ ) Các cơ_quan kiểm_lâm , chủ rừng ,\
    \ chính_quyền các cấp_thiết_lập đường_dây_nóng , thông_qua các mạng xã_hội để thu_nhận thông_tin báo cháy rừng của người\
    \ dân . \n 3 . Trách_nhiệm thông_báo khi có cháy rừng xảy ra \n a ) Chủ rừng , kiểm_lâm địa_bàn có trách_nhiệm thông_báo\
    \ nhanh ngay khi phát_hiện vụ cháy rừng tới Hạt Kiểm_lâm ; Hạt Kiểm_lâm cập_nhật , thông_báo nhanh tới Chi_cục Kiểm_lâm\
    \ cấp tỉnh ; Chi_cục Kiểm_lâm cấp tỉnh cập_nhật , thông_báo nhanh tới Cục Kiểm_lâm . \n b ) Nội_dung thông_báo gồm : thời_gian\
    \ , địa_điểm cháy ; loại rừng , loài cây bị cháy ; diễn_biến và quy_mô đám cháy ; nhận_định các tình_huống khẩn_cấp ;\
    \ công_tác tổ_chức chữa_cháy rừng . \n c ) Thông_báo nhanh thực_hiện bằng các hình_thức : văn_bản , qua điện_thoại , tin\
    \ nhắn , thư điện_tử , qua phần_mềm báo_cáo nhanh của lực_lượng kiểm_lâm hoặc bằng các phương_tiện thông_tin khác nhanh\
    \ nhất có_thể ."
  - 'Công_ty của tôi thuê một cá_nhân khoan khảo_sát địa_chất . Theo quy_định , nếu thuê dịch_vụ của cá_nhân có thu_nhập ít
    hơn 100 triệu đồng / năm thì cơ_quan thuế không cấp hóa đơn_lẻ . Tôi muốn hỏi , làm thế_nào để xác_minh cá_nhân đó có
    thu_nhập dưới 100 triệu đồng / năm ? Tôi cũng muốn biết , công_ty của tôi cần có những hồ_sơ gì để đưa chi_phí khoan khảo_sát
    địa_chất nêu trên vào chi_phí hợp_lý ? Chi_cục Thuế_TP. Thanh_Hóa – tỉnh Thanh_Hóa trả_lời vấn_đề này như sau : Về mặt
    nguyên_tắc , cá_nhân kinh_doanh phải tự chịu trách_nhiệm trước pháp_luật về việc xác_định doanh_thu tính thuế trong năm
    để làm cơ_sở xác_định số thuế phải nộp . Việc xác_định doanh_thu được căn_cứ theo quy_định tại Điểm a , Khoản 2 , Điều
    2 và Tiết a . 1 , Điểm a , Khoản 2 , Điều 3 , Thông_tư số92 / 2015 / TT - BTCngày 15 / 6 / 2015 của Bộ Tài_chính . Trường_hợp
    cá_nhân kinh_doanh không xác_định được doanh_thu tính thuế hoặc xác_định không phù_hợp với thực_tế thì cơ_quan thuế có
    thẩm_quyền ấn_định doanh_thu tính thuế theo quy_định của pháp_luật về quản_lý thuế và cá_nhân đó phải bị xử_lý vi_phạm_pháp_luật
    về thuế . Tại Điểm 2.4 , Khoản 2 , Điều 4 , Thông_tư số96 / 2015 / TT - BTCban hành ngày 22 / 6 / 2015 của Bộ Tài_chính
    quy_định về các khoản chi không được trừ khi xác_định thu_nhập chịu thuế : " 2.4 . Chi_phí của doanh_nghiệp mua hàng_hóa
    , dịch_vụ ( không có hóa_đơn , được phép lập Bảng kê thu_mua hàng_hóa , dịch_vụ mua vào theo mẫu_số 01 / TNDN kèm theo
    Thông_tư số 78 / 2014 / TT - BTC ) nhưng không lập Bảng kê kèm theo chứng_từ thanh_toán cho người bán hàng , cung_cấp
    dịch_vụ trong các trường_hợp : ... - Mua tài_sản , dịch_vụ của hộ , cá_nhân không kinh_doanh trực_tiếp bán ra ; - Mua
    hàng_hóa , dịch_vụ của cá_nhân , hộ kinh_doanh ( không bao_gồm các trường_hợp nêu trên ) có mức doanh_thu dưới ngưỡng
    doanh_thu chịu thuế giá_trị gia_tăng ( 100 triệu đồng / năm ) . Bảng kê thu_mua hàng_hóa , dịch_vụ do người đại_diện theo
    pháp_luật hoặc người được ủy quyền của doanh_nghiệp ký và chịu trách_nhiệm trước pháp_luật về tính chính_xác , trung_thực
    . Doanh_nghiệp mua hàng_hóa , dịch_vụ được phép lập Bảng kê và được tính vào chi_phí được trừ . Các khoản chi_phí này
    không bắt_buộc phải có chứng_từ thanh_toán không dùng tiền_mặt . Trường_hợp giá mua hàng_hóa , dịch_vụ trên bảng kê cao
    hơn giá thị_trường tại thời_điểm mua hàng thì cơ_quan thuế căn_cứ vào giá thị_trường tại thời_điểm mua hàng , dịch_vụ
    cùng loại hoặc tương_tự trên thị_trường xác_định lại mức giá để tính lại chi_phí được trừ khi xác_định thu_nhập chịu thuế
    " . Do đó , trường_hợp công_ty có thuê một cá_nhân khoan khảo_sát địa_chất , nếu cá_nhân đó là cá_nhân kinh_doanh có mức
    doanh_thu dưới ngưỡng doanh_thu chịu thuế giá_trị gia_tăng ( 100 triệu đồng / năm ) thì hồ_sơ để chi_phí khoan khảo_sát
    địa_chất được tính vào chi_phí hợp_lý là : Hợp_đồng thuê khoan khảo_sát địa_chất , chứng_từ trả tiền thuê , Bảng kê thu_mua
    hàng_hóa dịch_vụ mua vào theo mẫu 01 / TNDN kèm theo Thông_tư số78 / 2014 / TT - BTCcủa Bộ Tài_chính .'
- source_sentence: Mức phạt hành_vi khoan , đào , xẻ đường , hè phố trái_phép
  sentences:
  - "Điều 6 . Xử_phạt người điều_khiển xe mô_tô , xe gắn_máy ( kể_cả xe_máy_điện ) , các loại xe tương_tự xe mô_tô và các\
    \ loại xe tương_tự xe gắn_máy vi_phạm_quy_tắc giao_thông đường_bộ 1 . Phạt tiền từ 100.000 đồng đến 200.000 đồng đối_với\
    \ người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây : \n a ) Không chấp_hành hiệu_lệnh , chỉ_dẫn của\
    \ biển_báo_hiệu , vạch kẻ đường , trừ các hành_vi vi_phạm_quy_định tại điểm c , điểm đ , điểm e , điểm h khoản 2 ; điểm\
    \ d , điểm g , điểm i , điểm m khoản 3 ; điểm a , điểm b , điểm c , điểm d , điểm e khoản 4 ; khoản 5 ; điểm b khoản 6\
    \ ; điểm a , điểm b khoản 7 ; điểm d khoản 8 Điều này ; \n b ) Không có báo_hiệu xin vượt trước khi vượt ; \n c ) Không\
    \ giữ khoảng_cách an_toàn để xảy ra va_chạm với xe chạy liền trước hoặc không giữ khoảng_cách theo quy_định của biển_báo_hiệu\
    \ “ Cự_ly tối_thiểu giữa hai xe ” ; \n d ) Chuyển_hướng không nhường quyền đi trước cho : Người đi bộ , xe_lăn của người\
    \ khuyết_tật qua đường tại nơi có vạch kẻ đường dành cho người đi bộ ; xe thô_sơ đang đi trên phần đường dành cho xe thô_sơ\
    \ ; \n đ ) Chuyển_hướng không nhường đường cho : Các xe đi ngược chiều ; người đi bộ , xe_lăn của người khuyết_tật đang\
    \ qua đường tại nơi không có vạch kẻ đường cho người đi bộ ; \n e ) Lùi xe mô_tô ba bánh không quan_sát hoặc không có\
    \ tín_hiệu báo trước ; \n g ) Chở người ngồi trên xe sử_dụng ô ( dù ) ; \n h ) Không tuân_thủ các quy_định về nhường đường\
    \ tại nơi đường giao nhau , trừ các hành_vi vi_phạm_quy_định tại điểm b , điểm e khoản 2 Điều này ; \n i ) Chuyển làn_đường\
    \ không đúng nơi được phép hoặc không có tín_hiệu báo trước ; \n k ) Điều_khiển xe chạy dàn hàng ngang từ 03 xe trở lên\
    \ ; \n l ) Không sử_dụng đèn_chiếu sáng trong thời_gian từ 19 giờ ngày hôm trước đến 05 giờ ngày hôm sau hoặc khi sương_mù\
    \ , thời_tiết xấu hạn_chế tầm nhìn ; \n m ) Tránh xe không đúng quy_định ; sử_dụng đèn_chiếu xa khi tránh xe đi ngược\
    \ chiều ; không nhường đường cho xe đi ngược chiều theo quy_định tại nơi đường hẹp , đường dốc , nơi có chướng_ngại_vật\
    \ ; \n n ) Bấm còi trong thời_gian từ 22 giờ ngày hôm trước đến 05 giờ ngày hôm sau , sử_dụng đèn_chiếu xa trong đô_thị\
    \ , khu đông dân_cư , trừ các xe ưu_tiên đang đi làm nhiệm_vụ theo quy_định ; \n o ) Xe được quyền ưu_tiên lắp_đặt , sử_dụng\
    \ thiết_bị phát tín_hiệu ưu_tiên không đúng quy_định hoặc sử_dụng thiết_bị phát tín_hiệu ưu_tiên mà không có Giấy_phép\
    \ của cơ_quan có thẩm_quyền cấp hoặc có Giấy_phép của cơ_quan có thẩm_quyền cấp nhưng không còn giá_trị sử_dụng theo quy_định\
    \ ; \n p ) Quay đầu xe tại nơi không được quay đầu xe , trừ hành_vi vi_phạm_quy_định tại điểm d khoản 4 Điều này ; \n\
    \ q ) Điều_khiển xe chạy dưới tốc_độ tối_thiểu trên những đoạn đường_bộ có quy_định tốc_độ tối_thiểu cho phép . \n 2 .\
    \ Phạt tiền từ 200.000 đồng đến 300.000 đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây\
    \ : \n a ) Dừng xe , đỗ xe trên phần đường xe chạy ở đoạn đường ngoài đô_thị nơi có lề_đường ; \n b ) Không giảm_tốc_độ\
    \ và nhường đường khi điều_khiển xe chạy từ trong ngõ , đường nhánh ra đường chính ; \n c ) Điều_khiển xe chạy quá tốc_độ\
    \ quy_định từ 05 km / h đến dưới 10 km / h ; \n d ) Điều_khiển xe chạy tốc_độ thấp mà không đi bên phải phần đường xe\
    \ chạy gây cản_trở giao_thông ; \n đ ) Dừng xe , đỗ xe ở lòng_đường đô_thị gây cản_trở giao_thông ; tụ_tập từ 03 xe trở\
    \ lên ở lòng_đường , trong hầm đường_bộ ; đỗ , để xe ở lòng_đường đô_thị , hè phố trái quy_định của pháp_luật ; \n e )\
    \ Không nhường đường cho xe xin vượt khi có đủ điều_kiện an_toàn ; không nhường đường cho xe đi trên đường ưu_tiên , đường\
    \ chính từ bất_kỳ hướng nào tới tại nơi đường giao nhau ; \n g ) Xe không được quyền ưu_tiên lắp_đặt , sử_dụng thiết_bị\
    \ phát tín_hiệu của xe được quyền ưu_tiên ; \n h ) Dừng xe , đỗ xe trên đường xe điện , điểm dừng đón trả khách của xe_buýt\
    \ , nơi đường_bộ giao nhau , trên phần đường dành cho người đi bộ qua đường ; dừng xe nơi có biển “ Cấm dừng xe và đỗ\
    \ xe ” ; đỗ xe tại nơi có biển “ Cấm đỗ xe ” hoặc biển “ Cấm dừng xe và đỗ xe ” ; không tuân_thủ các quy_định về dừng\
    \ xe , đỗ xe tại nơi đường_bộ giao nhau cùng mức với đường_sắt ; dừng xe , đỗ xe trong phạm_vi an_toàn của đường_sắt ,\
    \ trừ hành_vi vi_phạm_quy_định tại điểm b khoản 2 , điểm b khoản 3 Điều 49 Nghị_định này ; \n i ) Không đội “ mũ bảo_hiểm\
    \ cho người đi mô_tô , xe_máy ” hoặc đội “ mũ bảo_hiểm cho người đi mô_tô , xe_máy ” không cài quai đúng quy_cách khi\
    \ điều_khiển xe tham_gia giao_thông trên đường_bộ ; \n k ) Chở người ngồi trên xe không đội “ mũ bảo_hiểm cho người đi\
    \ mô_tô , xe_máy ” hoặc đội “ mũ bảo_hiểm cho người đi mô_tô , xe_máy ” không cài quai đúng quy_cách , trừ trường_hợp\
    \ chở người_bệnh đi cấp_cứu , trẻ_em dưới 06 tuổi , áp_giải người có hành_vi vi_phạm_pháp_luật ; \n l ) Chở theo 02 người\
    \ trên xe , trừ trường_hợp chở người_bệnh đi cấp_cứu , trẻ_em dưới 14 tuổi , áp_giải người có hành_vi vi_phạm_pháp_luật\
    \ ; \n m ) Ngồi phía sau vòng_tay qua người ngồi trước để điều_khiển xe , trừ trường_hợp chở trẻ_em ngồi phía trước .\
    \ \n 3 . Phạt tiền từ 400.000 đồng đến 600.000 đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm\
    \ sau đây : \n a ) Chuyển_hướng không giảm_tốc_độ hoặc không có tín_hiệu báo hướng rẽ ( trừ trường_hợp điều_khiển xe đi\
    \ theo hướng cong của đoạn đường_bộ ở nơi đường không giao nhau cùng mức ) ; \n b ) Chở theo từ 03 người trở lên trên\
    \ xe ; \n c ) Bấm còi , rú ga ( nẹt pô ) liên_tục trong đô_thị , khu đông dân_cư , trừ các xe ưu_tiên đang đi làm nhiệm_vụ\
    \ theo quy_định ; \n d ) Dừng xe , đỗ xe trên cầu ; \n đ ) Điều_khiển xe thành_đoàn gây cản_trở giao_thông , trừ trường_hợp\
    \ được cơ_quan có thẩm_quyền cấp phép ; \n e ) Điều_khiển xe có liên_quan trực_tiếp đến vụ tai_nạn giao_thông mà không\
    \ dừng lại , không giữ nguyên hiện_trường , không tham_gia cấp_cứu người bị nạn , trừ hành_vi vi_phạm_quy_định tại điểm\
    \ đ khoản 8 Điều này ; \n g ) Điều_khiển xe không đi bên phải theo chiều đi của mình ; đi không đúng phần đường , làn_đường\
    \ quy_định ( làn cùng chiều hoặc làn ngược chiều ) ; điều_khiển xe đi qua dải_phân_cách cố_định ở giữa hai phần đường\
    \ xe chạy ; điều_khiển xe đi trên hè phố , trừ trường_hợp điều_khiển xe đi qua hè phố để vào nhà ; \n h ) Vượt bên phải\
    \ trong trường_hợp không được phép ; \n i ) Đi vào khu_vực cấm , đường có biển_báo_hiệu có nội_dung cấm đi vào đối_với\
    \ loại phương_tiện đang điều_khiển , trừ các hành_vi vi_phạm_quy_định tại khoản 5 , điểm b khoản 6 Điều này và các trường_hợp\
    \ xe ưu_tiên đang đi làm nhiệm_vụ khẩn_cấp theo quy_định ; \n k ) Người đang điều_khiển xe hoặc chở người ngồi trên xe\
    \ bám , kéo , đẩy xe khác , vật khác , dẫn_dắt súc_vật , mang vác vật cồng_kềnh ; chở người đứng trên yên , giá đèo_hàng\
    \ hoặc ngồi trên tay_lái ; xếp_hàng_hóa trên xe vượt quá giới_hạn quy_định ; điều_khiển xe_kéo_theo xe khác , vật khác\
    \ ; \n l ) Chở hàng vượt trọng_tải thiết_kế được ghi trong Giấy đăng_ký xe đối_với loại xe có quy_định về trọng_tải thiết_kế\
    \ ; \n m ) Chạy trong hầm đường_bộ không sử_dụng đèn_chiếu sáng gần . \n 4 . Phạt tiền từ 600.000 đồng đến 1.000.000 đồng\
    \ đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây : \n a ) Điều_khiển xe chạy quá tốc_độ quy_định\
    \ từ 10 km / h đến 20 km / h ; \n b ) Dừng xe , đỗ xe trong hầm đường_bộ không đúng nơi quy_định ; \n c ) Vượt xe trong\
    \ những trường_hợp không được vượt , vượt xe tại đoạn đường có biển_báo_hiệu có nội_dung cấm vượt đối_với loại phương_tiện\
    \ đang điều_khiển , trừ các hành_vi vi_phạm_quy_định tại điểm h khoản 3 Điều này ; \n d ) Vượt xe trong hầm đường_bộ không\
    \ đúng nơi quy_định ; quay đầu xe trong hầm đường_bộ ; \n đ ) Không nhường đường hoặc gây cản_trở xe được quyền ưu_tiên\
