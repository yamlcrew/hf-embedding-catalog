      \ Không giữ khoảng_cách an_toàn để xảy ra va_chạm với xe chạy liền trước hoặc không giữ khoảng_cách theo quy_định của\
      \ biển_báo_hiệu “ Cự_ly tối_thiểu giữa hai xe ” ; \n d ) Chuyển_hướng không nhường quyền đi trước cho : Người đi bộ\
      \ , xe_lăn của người khuyết_tật qua đường tại nơi có vạch kẻ đường dành cho người đi bộ ; xe thô_sơ đang đi trên phần\
      \ đường dành cho xe thô_sơ ; \n đ ) Chuyển_hướng không nhường đường cho : Các xe đi ngược chiều ; người đi bộ , xe_lăn\
      \ của người khuyết_tật đang qua đường tại nơi không có vạch kẻ đường cho người đi bộ ; \n e ) Lùi xe mô_tô ba bánh không\
      \ quan_sát hoặc không có tín_hiệu báo trước ; \n g ) Chở người ngồi trên xe sử_dụng ô ( dù ) ; \n h ) Không tuân_thủ\
      \ các quy_định về nhường đường tại nơi đường giao nhau , trừ các hành_vi vi_phạm_quy_định tại điểm b , điểm e khoản\
      \ 2 Điều này ; \n i ) Chuyển làn_đường không đúng nơi được phép hoặc không có tín_hiệu báo trước ; \n k ) Điều_khiển\
      \ xe chạy dàn hàng ngang từ 03 xe trở lên ; \n l ) Không sử_dụng đèn_chiếu sáng trong thời_gian từ 19 giờ ngày hôm trước\
      \ đến 05 giờ ngày hôm sau hoặc khi sương_mù , thời_tiết xấu hạn_chế tầm nhìn ; \n m ) Tránh xe không đúng quy_định ;\
      \ sử_dụng đèn_chiếu xa khi tránh xe đi ngược chiều ; không nhường đường cho xe đi ngược chiều theo quy_định tại nơi\
      \ đường hẹp , đường dốc , nơi có chướng_ngại_vật ; \n n ) Bấm còi trong thời_gian từ 22 giờ ngày hôm trước đến 05 giờ\
      \ ngày hôm sau , sử_dụng đèn_chiếu xa trong đô_thị , khu đông dân_cư , trừ các xe ưu_tiên đang đi làm nhiệm_vụ theo\
      \ quy_định ; \n o ) Xe được quyền ưu_tiên lắp_đặt , sử_dụng thiết_bị phát tín_hiệu ưu_tiên không đúng quy_định hoặc\
      \ sử_dụng thiết_bị phát tín_hiệu ưu_tiên mà không có Giấy_phép của cơ_quan có thẩm_quyền cấp hoặc có Giấy_phép của cơ_quan\
      \ có thẩm_quyền cấp nhưng không còn giá_trị sử_dụng theo quy_định ; \n p ) Quay đầu xe tại nơi không được quay đầu xe\
      \ , trừ hành_vi vi_phạm_quy_định tại điểm d khoản 4 Điều này ; \n q ) Điều_khiển xe chạy dưới tốc_độ tối_thiểu trên\
      \ những đoạn đường_bộ có quy_định tốc_độ tối_thiểu cho phép . \n 2 . Phạt tiền từ 200.000 đồng đến 300.000 đồng đối_với\
      \ người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây : \n a ) Dừng xe , đỗ xe trên phần đường xe chạy\
      \ ở đoạn đường ngoài đô_thị nơi có lề_đường ; \n b ) Không giảm_tốc_độ và nhường đường khi điều_khiển xe chạy từ trong\
      \ ngõ , đường nhánh ra đường chính ; \n c ) Điều_khiển xe chạy quá tốc_độ quy_định từ 05 km / h đến dưới 10 km / h ;\
      \ \n d ) Điều_khiển xe chạy tốc_độ thấp mà không đi bên phải phần đường xe chạy gây cản_trở giao_thông ; \n đ ) Dừng\
      \ xe , đỗ xe ở lòng_đường đô_thị gây cản_trở giao_thông ; tụ_tập từ 03 xe trở lên ở lòng_đường , trong hầm đường_bộ\
      \ ; đỗ , để xe ở lòng_đường đô_thị , hè phố trái quy_định của pháp_luật ; \n e ) Không nhường đường cho xe xin vượt\
      \ khi có đủ điều_kiện an_toàn ; không nhường đường cho xe đi trên đường ưu_tiên , đường chính từ bất_kỳ hướng nào tới\
      \ tại nơi đường giao nhau ; \n g ) Xe không được quyền ưu_tiên lắp_đặt , sử_dụng thiết_bị phát tín_hiệu của xe được\
      \ quyền ưu_tiên ; \n h ) Dừng xe , đỗ xe trên đường xe điện , điểm dừng đón trả khách của xe_buýt , nơi đường_bộ giao\
      \ nhau , trên phần đường dành cho người đi bộ qua đường ; dừng xe nơi có biển “ Cấm dừng xe và đỗ xe ” ; đỗ xe tại nơi\
      \ có biển “ Cấm đỗ xe ” hoặc biển “ Cấm dừng xe và đỗ xe ” ; không tuân_thủ các quy_định về dừng xe , đỗ xe tại nơi\
      \ đường_bộ giao nhau cùng mức với đường_sắt ; dừng xe , đỗ xe trong phạm_vi an_toàn của đường_sắt , trừ hành_vi vi_phạm_quy_định\
      \ tại điểm b khoản 2 , điểm b khoản 3 Điều 49 Nghị_định này ; \n i ) Không đội “ mũ bảo_hiểm cho người đi mô_tô , xe_máy\
      \ ” hoặc đội “ mũ bảo_hiểm cho người đi mô_tô , xe_máy ” không cài quai đúng quy_cách khi điều_khiển xe tham_gia giao_thông\
      \ trên đường_bộ ; \n k ) Chở người ngồi trên xe không đội “ mũ bảo_hiểm cho người đi mô_tô , xe_máy ” hoặc đội “ mũ\
      \ bảo_hiểm cho người đi mô_tô , xe_máy ” không cài quai đúng quy_cách , trừ trường_hợp chở người_bệnh đi cấp_cứu , trẻ_em\
      \ dưới 06 tuổi , áp_giải người có hành_vi vi_phạm_pháp_luật ; \n l ) Chở theo 02 người trên xe , trừ trường_hợp chở\
      \ người_bệnh đi cấp_cứu , trẻ_em dưới 14 tuổi , áp_giải người có hành_vi vi_phạm_pháp_luật ; \n m ) Ngồi phía sau vòng_tay\
      \ qua người ngồi trước để điều_khiển xe , trừ trường_hợp chở trẻ_em ngồi phía trước . \n 3 . Phạt tiền từ 400.000 đồng\
      \ đến 600.000 đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây : \n a ) Chuyển_hướng\
      \ không giảm_tốc_độ hoặc không có tín_hiệu báo hướng rẽ ( trừ trường_hợp điều_khiển xe đi theo hướng cong của đoạn đường_bộ\
      \ ở nơi đường không giao nhau cùng mức ) ; \n b ) Chở theo từ 03 người trở lên trên xe ; \n c ) Bấm còi , rú ga ( nẹt\
      \ pô ) liên_tục trong đô_thị , khu đông dân_cư , trừ các xe ưu_tiên đang đi làm nhiệm_vụ theo quy_định ; \n d ) Dừng\
      \ xe , đỗ xe trên cầu ; \n đ ) Điều_khiển xe thành_đoàn gây cản_trở giao_thông , trừ trường_hợp được cơ_quan có thẩm_quyền\
      \ cấp phép ; \n e ) Điều_khiển xe có liên_quan trực_tiếp đến vụ tai_nạn giao_thông mà không dừng lại , không giữ nguyên\
      \ hiện_trường , không tham_gia cấp_cứu người bị nạn , trừ hành_vi vi_phạm_quy_định tại điểm đ khoản 8 Điều này ; \n\
      \ g ) Điều_khiển xe không đi bên phải theo chiều đi của mình ; đi không đúng phần đường , làn_đường quy_định ( làn cùng\
      \ chiều hoặc làn ngược chiều ) ; điều_khiển xe đi qua dải_phân_cách cố_định ở giữa hai phần đường xe chạy ; điều_khiển\
      \ xe đi trên hè phố , trừ trường_hợp điều_khiển xe đi qua hè phố để vào nhà ; \n h ) Vượt bên phải trong trường_hợp\
      \ không được phép ; \n i ) Đi vào khu_vực cấm , đường có biển_báo_hiệu có nội_dung cấm đi vào đối_với loại phương_tiện\
      \ đang điều_khiển , trừ các hành_vi vi_phạm_quy_định tại khoản 5 , điểm b khoản 6 Điều này và các trường_hợp xe ưu_tiên\
      \ đang đi làm nhiệm_vụ khẩn_cấp theo quy_định ; \n k ) Người đang điều_khiển xe hoặc chở người ngồi trên xe bám , kéo\
      \ , đẩy xe khác , vật khác , dẫn_dắt súc_vật , mang vác vật cồng_kềnh ; chở người đứng trên yên , giá đèo_hàng hoặc\
      \ ngồi trên tay_lái ; xếp_hàng_hóa trên xe vượt quá giới_hạn quy_định ; điều_khiển xe_kéo_theo xe khác , vật khác ;\
      \ \n l ) Chở hàng vượt trọng_tải thiết_kế được ghi trong Giấy đăng_ký xe đối_với loại xe có quy_định về trọng_tải thiết_kế\
      \ ; \n m ) Chạy trong hầm đường_bộ không sử_dụng đèn_chiếu sáng gần . \n 4 . Phạt tiền từ 600.000 đồng đến 1.000.000\
      \ đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây : \n a ) Điều_khiển xe chạy quá tốc_độ\
      \ quy_định từ 10 km / h đến 20 km / h ; \n b ) Dừng xe , đỗ xe trong hầm đường_bộ không đúng nơi quy_định ; \n c ) Vượt\
      \ xe trong những trường_hợp không được vượt , vượt xe tại đoạn đường có biển_báo_hiệu có nội_dung cấm vượt đối_với loại\
      \ phương_tiện đang điều_khiển , trừ các hành_vi vi_phạm_quy_định tại điểm h khoản 3 Điều này ; \n d ) Vượt xe trong\
      \ hầm đường_bộ không đúng nơi quy_định ; quay đầu xe trong hầm đường_bộ ; \n đ ) Không nhường đường hoặc gây cản_trở\
      \ xe được quyền ưu_tiên đang phát tín_hiệu ưu_tiên đi làm nhiệm_vụ ; \n e ) Không chấp_hành hiệu_lệnh của đèn tín_hiệu\
      \ giao_thông ; \n g ) Không chấp_hành hiệu_lệnh , hướng_dẫn của người điều_khiển giao_thông hoặc người kiểm_soát giao_thông\
      \ ; \n h ) Người đang điều_khiển xe sử_dụng ô ( dù ) , điện_thoại_di_động , thiết_bị âm_thanh , trừ thiết_bị trợ_thính\
      \ . \n 5 . Phạt tiền từ 1.000.000 đồng đến 2.000.000 đồng đối_với người điều_khiển xe thực_hiện_hành_vi đi ngược chiều\
      \ của đường một_chiều , đi ngược chiều trên đường có biển “ Cấm đi ngược chiều ” , trừ hành_vi vi_phạm_quy_định tại\
      \ điểm b khoản 6 Điều này và các trường_hợp xe ưu_tiên đang đi làm nhiệm_vụ khẩn_cấp theo quy_định . \n 6 . Phạt tiền\
      \ từ 2.000.000 đồng đến 3.000.000 đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau đây :\
      \ \n a ) Sử_dụng chân chống hoặc vật khác quệt xuống_đường khi xe đang chạy ; \n b ) Điều_khiển xe đi vào đường_cao_tốc\
      \ , trừ xe phục_vụ_việc quản_lý , bảo_trì đường_cao_tốc ; \n c ) Điều_khiển xe trên đường mà trong máu hoặc hơi thở\
      \ có nồng_độ cồn nhưng chưa vượt quá 50 miligam / 100 mililít máu hoặc chưa vượt quá 0,25 miligam / 1 lít khí thở .\
      \ \n 7 . Phạt tiền từ 4.000.000 đồng đến 5.000.000 đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi\
      \ vi_phạm sau đây : \n a ) Điều_khiển xe chạy quá tốc_độ quy_định trên 20 km / h ; \n b ) Không chú_ý quan_sát , điều_khiển\
      \ xe chạy quá tốc_độ quy_định gây tai_nạn giao_thông ; đi vào đường_cao_tốc , dừng xe , đỗ xe , quay đầu xe , lùi xe\
      \ , tránh xe , vượt xe , chuyển_hướng , chuyển làn_đường không đúng quy_định gây tai_nạn giao_thông ; không đi đúng\
      \ phần đường , làn_đường , không giữ khoảng_cách an_toàn giữa hai xe theo quy_định gây tai_nạn giao_thông hoặc đi vào\
      \ đường có biển_báo_hiệu có nội_dung cấm đi vào đối_với loại phương_tiện đang điều_khiển , đi ngược chiều của đường\
      \ một_chiều , đi ngược chiều trên đường có biển “ Cấm đi ngược chiều ” gây tai_nạn giao_thông , trừ hành_vi vi_phạm_quy_định\
      \ tại điểm d khoản 8 Điều này ; \n c ) Điều_khiển xe trên đường mà trong máu hoặc hơi thở có nồng_độ cồn vượt quá 50\
      \ miligam đến 80 miligam / 100 mililít máu hoặc vượt quá 0,25 miligam đến 0,4 miligam / 1 lít khí thở . \n 8 . Phạt\
      \ tiền từ 6.000.000 đồng đến 8.000.000 đồng đối_với người điều_khiển xe thực_hiện một trong các hành_vi vi_phạm sau\
      \ đây : \n a ) Buông cả hai tay khi đang điều_khiển xe ; dùng chân điều_khiển xe ; ngồi về một bên điều_khiển xe ; nằm\
      \ trên yên xe điều_khiển xe ; thay người điều_khiển khi xe đang chạy ; quay người về phía sau để điều_khiển xe hoặc\
      \ bịt_mắt điều_khiển xe ; \n b ) Điều_khiển xe lạng_lách hoặc đánh_võng trên đường_bộ trong , ngoài đô_thị ; \n c )\
      \ Điều_khiển xe chạy bằng một bánh đối_với xe hai bánh , chạy bằng hai bánh đối_với xe ba bánh ; \n d ) Điều_khiển xe\
      \ thành nhóm từ 02 xe trở lên chạy quá tốc_độ quy_định ; \n đ ) Gây tai_nạn giao_thông không dừng lại , không giữ nguyên\
      \ hiện_trường , bỏ trốn không đến trình_báo với cơ_quan có thẩm_quyền , không tham_gia cấp_cứu người bị nạn ; \n e )\
      \ Điều_khiển xe trên đường mà trong máu hoặc hơi thở có nồng_độ cồn vượt quá 80 miligam / 100 mililít máu hoặc vượt\
      \ quá 0,4 miligam / 1 lít khí thở ; \n g ) Không chấp_hành yêu_cầu kiểm_tra về nồng_độ cồn của người thi_hành công_vụ\
      \ ; \n h ) Điều_khiển xe trên đường mà trong cơ_thể có chất ma_túy ; \n i ) Không chấp_hành yêu_cầu kiểm_tra về chất\
      \ ma_túy của người thi_hành công_vụ . \n 9 . Phạt tiền từ 10.000.000 đồng đến 14.000.000 đồng đối_với hành_vi vi_phạm_quy_định\
      \ tại điểm a , điểm b , điểm c , điểm d khoản 8 Điều này mà gây tai_nạn giao_thông hoặc không chấp_hành hiệu_lệnh dừng\
      \ xe của người thi_hành công_vụ . \n 10 . Ngoài việc bị phạt tiền , người điều_khiển xe thực_hiện_hành_vi vi_phạm còn\
      \ bị áp_dụng các hình_thức xử_phạt bổ_sung sau đây : \n a ) Thực_hiện_hành_vi quy_định tại điểm g khoản 2 Điều này bị\
      \ tịch_thu thiết_bị phát tín_hiệu ưu_tiên lắp_đặt , sử_dụng trái quy_định ; \n b ) Thực_hiện_hành_vi quy_định tại điểm\
      \ b , điểm e , điểm i khoản 3 ; điểm đ , điểm e , điểm g , điểm h khoản 4 ; khoản 5 Điều này bị tước quyền sử_dụng Giấy_phép\
      \ lái_xe từ 01 tháng đến 03 tháng ; \n c ) Thực_hiện_hành_vi quy_định tại điểm a khoản 6 ; điểm a , điểm b khoản 7 ;\
      \ điểm a , điểm b , điểm c , điểm d khoản 8 Điều này bị tước quyền sử_dụng Giấy_phép lái_xe từ 02 tháng đến 04 tháng\
      \ ; tái_phạm hoặc vi_phạm nhiều lần hành_vi quy_định tại điểm a , điểm b , điểm c , điểm d khoản 8 Điều này bị tước\
      \ quyền sử_dụng Giấy_phép lái_xe từ 03 tháng đến 05 tháng , tịch_thu phương_tiện . Thực_hiện_hành_vi quy_định tại một\
      \ trong các điểm , khoản sau của Điều này mà gây tai_nạn giao_thông thì bị tước quyền sử_dụng Giấy_phép lái_xe từ 02\
      \ tháng đến 04 tháng : Điểm a , điểm g , điểm h , điểm k , điểm l , điểm m , điểm n , điểm q khoản 1 ; điểm b , điểm\
      \ d , điểm e , điểm g , điểm l , điểm m khoản 2 ; điểm b , điểm c , điểm k , điểm m khoản 3 ; điểm đ , điểm e , điểm\
      \ g , điểm h khoản 4 Điều này ; \n d ) Thực_hiện_hành_vi quy_định tại điểm b khoản 6 ; điểm đ khoản 8 ; khoản 9 Điều\
      \ này bị tước quyền sử_dụng Giấy_phép lái_xe từ 03 tháng đến 05 tháng ; \n đ ) Thực_hiện_hành_vi quy_định tại điểm c\
      \ khoản 6 Điều này bị tước quyền sử_dụng Giấy_phép lái_xe từ 10 tháng đến 12 tháng ; \n e ) Thực_hiện_hành_vi quy_định\
      \ tại điểm c khoản 7 Điều này bị tước quyền sử_dụng Giấy_phép lái_xe từ 16 tháng đến 18 tháng ; \n g ) Thực_hiện_hành_vi\
      \ quy_định tại điểm e , điểm g , điểm h , điểm i khoản 8 Điều này bị tước quyền sử_dụng Giấy_phép lái_xe từ 22 tháng\
      \ đến 24 tháng ."
    - "Điều 2 Quyết_định 15 / 2017 / QĐ - UBND Quy_định quản_lý sử_dụng kinh_phí khuyến thương Thái_Bình có nội_dung như sau\
      \ : \n \n Điều 2 . Giao_Sở Công_Thương chủ_trì , phối_hợp với Sở Tài_chính và các sở , ban , ngành liên_quan chịu trách_nhiệm\
      \ hướng_dẫn và tổ_chức thực_hiện Quyết_định này ."
    - "Điều 15 . Xử_phạt các hành_vi vi_phạm_quy_định về quản_lý , khai_thác , bảo_trì , bảo_vệ kết_cấu_hạ_tầng giao_thông\
      \ đường_bộ 1 . Cảnh_cáo hoặc phạt tiền từ 60.000 đồng đến 100.000 đồng đối_với cá_nhân thực_hiện một trong các hành_vi\
      \ vi_phạm sau đây : \n a ) Chăn_dắt súc_vật ở mái đường ; buộc súc_vật vào hàng cây hai bên đường hoặc vào cọc tiêu\
      \ , biển_báo , rào_chắn , các công_trình phụ_trợ của giao_thông đường_bộ ; \n b ) Tự_ý leo_trèo lên mố , trụ , dầm cầu\
      \ . \n 2 . Phạt tiền từ 200.000 đồng đến 300.000 đồng đối_với cá_nhân , từ 400.000 đồng đến 600.000 đồng đối_với tổ_chức\
