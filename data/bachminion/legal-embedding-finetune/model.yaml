    \ đường chính khu quy_hoạch hướng về trạm xử_lý cục_bộ đặt trong khu quy_hoạch . Độ sâu đặt cống tối_thiểu là 0,7 m tính\
    \ từ mặt_đất đến đỉnh cống . \n 7.5.2 . Xử_lý chất_thải rắn : \n - Tiêu_chuẩn chất_thải rắn sinh_hoạt : 1,3 kg / người\
    \ / ngày . \n - Tổng_lượng chất_thải rắn sinh_hoạt : 0,827 tấn / ngày . \n - Phương_án thu_gom và xử_lý chất_thải rắn\
