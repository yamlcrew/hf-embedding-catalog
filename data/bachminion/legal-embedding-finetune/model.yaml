    \ xe của người thi_hành công_vụ . \n 10 . Ngoài việc bị phạt tiền , người điều_khiển xe thực_hiện_hành_vi vi_phạm còn\
    \ bị áp_dụng các hình_thức xử_phạt bổ_sung sau đây : \n a ) Thực_hiện_hành_vi quy_định tại điểm g khoản 2 Điều này bị\
