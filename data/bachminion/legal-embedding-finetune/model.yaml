  - source_sentence: Giấy_tờ cần có để hạch_toán vào chi_phí hợp_lý
    sentences:
    - 'Đơn_vị của tôi đang lập dự_toán cho một công_trình xây_dựng theo mức lương tối_thiểu vùng quy_định tại Nghị_định số103
      / 2012 / NĐ - CPcủa Chính_phủ , nhưng chưa được cơ_quan thẩm_định phê_duyệt dự_án với lý_do chưa có hướng_dẫn thực_hiện
      . Tôi muốn hỏi , địa_phương có_thể căn_cứ mức lương tối_thiểu mới theo quy_định tại Nghị_định 103 / 2012 / NĐ - CP hay
      phải đợi hướng_dẫn của cơ_quan có thẩm_quyền để lập dự_toán xây_dựng ? Bộ Xây_dựng trả_lời vấn_đề này như sau : Ngày
      2 / 4 / 2013 , Bộ Xây_dựng đã ban_hành_văn_bản số 551 / BXD - KTXD hướng_dẫn điều_chỉnh chi_phí nhân_công để lập và
      quản_lý chi_phí đầu_tư xây_dựng công_trình theo quy_định tại Nghị_định số 103 / 2012 / NĐ - CP ngày 4 / 12 / 2012 của
      Chính_phủ .'
    - "Điều 9 . Thông_tin dự_báo và phát_hiện sớm cháy rừng 1 . Thông_tin dự_báo cháy rừng \n a ) Cục Kiểm_lâm thông_tin cấp\
      \ dự_báo cháy rừng trên Website , cổng thông_tin điện_tử của Cục Kiểm_lâm ; cung_cấp thông_tin cho Đài_Truyền_hình Việt_Nam\
      \ , Đài_Tiếng_nói Việt_Nam và các phương_tiện thông_tin đại_chúng khác để đưa , phát bản tin cảnh_báo cháy rừng . \n\
      \ b ) Chi_cục Kiểm_lâm vùng thông_tin cấp dự_báo cháy rừng trên Website , cổng thông_tin điện_tử của đơn_vị ; gửi thông_báo\
      \ cấp dự_báo cháy rừng đến Chi_cục Kiểm_lâm tỉnh trong phạm_vi được phân_công . \n c ) Chi_cục Kiểm_lâm tỉnh thực_hiện\
      \ dự_báo nguy_cơ cháy rừng và thông_tin cấp dự_báo cháy rừng rộng_rãi trên các phương_tiện thông_tin đại_chúng ; chỉ_đạo\
      \ kiểm_lâm làm_việc tại địa_bàn ( sau đây viết là kiểm_lâm địa_bàn ) , Hạt Kiểm_lâm thông_tin cấp dự_báo cháy rừng đến\
      \ chính_quyền địa_phương cơ_sở , các chủ rừng , các hộ dân sống trong rừng , gần rừng . \n 2 . Phát_hiện sớm cháy rừng\
      \ \n a ) Cục Kiểm_lâm duy_trì thường_xuyên hệ_thống trạm thu ảnh vệ_tinh phát_hiện sớm điểm cháy và các thông_tin ứng_dụng\
      \ khác ; cập_nhật thông_tin điểm cháy do trạm thu ảnh vệ_tinh phát_hiện trên Website , cổng thông_tin điện_tử của Cục\
      \ Kiểm_lâm . \n b ) Chi_cục Kiểm_lâm vùng theo_dõi điểm cháy sớm , thông_báo đến Chi_cục Kiểm_lâm các tỉnh trong phạm_vi\
      \ được phân_công phụ_trách để kiểm_tra , xác_minh , theo_dõi quá_trình xử_lý , báo_cáo Cục_Kiểm lâ m về kết_quả kiểm_tra\
      \ , xác_minh . \n c ) Chi_cục Kiểm_lâm tỉnh theo_dõi các điểm cháy sớm phát_hiện từ ảnh vệ_tinh , kết_hợp phát_hiện\
      \ cháy sớm tại các chòi canh , các chốt gác để phát_hiện sớm các điểm cháy rừng ; chỉ_đạo Hạt Kiểm_lâm , các chủ rừng\
      \ kiểm_tra , xác_minh và tổ_chức chữa_cháy kịp_thời . \n d ) Chủ rừng tổ_chức tuần_tra ; ứng_dụng khoa_học , công_nghệ\
      \ và sử_dụng phương_tiện , thiết_bị để theo_dõi , phát_hiện sớm cháy rừng ; cung_cấp thông_tin khi phát_hiện có cháy\
      \ rừng và tổ_chức chữa_cháy kịp_thời ; tổ_chức trực chòi canh , kiểm_soát người ra vào rừng . \n đ ) Các cơ_quan kiểm_lâm\
      \ , chủ rừng , chính_quyền các cấp_thiết_lập đường_dây_nóng , thông_qua các mạng xã_hội để thu_nhận thông_tin báo cháy\
      \ rừng của người dân . \n 3 . Trách_nhiệm thông_báo khi có cháy rừng xảy ra \n a ) Chủ rừng , kiểm_lâm địa_bàn có trách_nhiệm\
      \ thông_báo nhanh ngay khi phát_hiện vụ cháy rừng tới Hạt Kiểm_lâm ; Hạt Kiểm_lâm cập_nhật , thông_báo nhanh tới Chi_cục\
      \ Kiểm_lâm cấp tỉnh ; Chi_cục Kiểm_lâm cấp tỉnh cập_nhật , thông_báo nhanh tới Cục Kiểm_lâm . \n b ) Nội_dung thông_báo\
      \ gồm : thời_gian , địa_điểm cháy ; loại rừng , loài cây bị cháy ; diễn_biến và quy_mô đám cháy ; nhận_định các tình_huống\
      \ khẩn_cấp ; công_tác tổ_chức chữa_cháy rừng . \n c ) Thông_báo nhanh thực_hiện bằng các hình_thức : văn_bản , qua điện_thoại\
      \ , tin nhắn , thư điện_tử , qua phần_mềm báo_cáo nhanh của lực_lượng kiểm_lâm hoặc bằng các phương_tiện thông_tin khác\
      \ nhanh nhất có_thể ."
    - 'Công_ty của tôi thuê một cá_nhân khoan khảo_sát địa_chất . Theo quy_định , nếu thuê dịch_vụ của cá_nhân có thu_nhập
      ít hơn 100 triệu đồng / năm thì cơ_quan thuế không cấp hóa đơn_lẻ . Tôi muốn hỏi , làm thế_nào để xác_minh cá_nhân đó
      có thu_nhập dưới 100 triệu đồng / năm ? Tôi cũng muốn biết , công_ty của tôi cần có những hồ_sơ gì để đưa chi_phí khoan
      khảo_sát địa_chất nêu trên vào chi_phí hợp_lý ? Chi_cục Thuế_TP. Thanh_Hóa – tỉnh Thanh_Hóa trả_lời vấn_đề này như sau
      : Về mặt nguyên_tắc , cá_nhân kinh_doanh phải tự chịu trách_nhiệm trước pháp_luật về việc xác_định doanh_thu tính thuế
      trong năm để làm cơ_sở xác_định số thuế phải nộp . Việc xác_định doanh_thu được căn_cứ theo quy_định tại Điểm a , Khoản
      2 , Điều 2 và Tiết a . 1 , Điểm a , Khoản 2 , Điều 3 , Thông_tư số92 / 2015 / TT - BTCngày 15 / 6 / 2015 của Bộ Tài_chính
      . Trường_hợp cá_nhân kinh_doanh không xác_định được doanh_thu tính thuế hoặc xác_định không phù_hợp với thực_tế thì
      cơ_quan thuế có thẩm_quyền ấn_định doanh_thu tính thuế theo quy_định của pháp_luật về quản_lý thuế và cá_nhân đó phải
      bị xử_lý vi_phạm_pháp_luật về thuế . Tại Điểm 2.4 , Khoản 2 , Điều 4 , Thông_tư số96 / 2015 / TT - BTCban hành ngày
      22 / 6 / 2015 của Bộ Tài_chính quy_định về các khoản chi không được trừ khi xác_định thu_nhập chịu thuế : " 2.4 . Chi_phí
      của doanh_nghiệp mua hàng_hóa , dịch_vụ ( không có hóa_đơn , được phép lập Bảng kê thu_mua hàng_hóa , dịch_vụ mua vào
      theo mẫu_số 01 / TNDN kèm theo Thông_tư số 78 / 2014 / TT - BTC ) nhưng không lập Bảng kê kèm theo chứng_từ thanh_toán
      cho người bán hàng , cung_cấp dịch_vụ trong các trường_hợp : ... - Mua tài_sản , dịch_vụ của hộ , cá_nhân không kinh_doanh
      trực_tiếp bán ra ; - Mua hàng_hóa , dịch_vụ của cá_nhân , hộ kinh_doanh ( không bao_gồm các trường_hợp nêu trên ) có
      mức doanh_thu dưới ngưỡng doanh_thu chịu thuế giá_trị gia_tăng ( 100 triệu đồng / năm ) . Bảng kê thu_mua hàng_hóa ,
      dịch_vụ do người đại_diện theo pháp_luật hoặc người được ủy quyền của doanh_nghiệp ký và chịu trách_nhiệm trước pháp_luật
      về tính chính_xác , trung_thực . Doanh_nghiệp mua hàng_hóa , dịch_vụ được phép lập Bảng kê và được tính vào chi_phí
      được trừ . Các khoản chi_phí này không bắt_buộc phải có chứng_từ thanh_toán không dùng tiền_mặt . Trường_hợp giá mua
      hàng_hóa , dịch_vụ trên bảng kê cao hơn giá thị_trường tại thời_điểm mua hàng thì cơ_quan thuế căn_cứ vào giá thị_trường
      tại thời_điểm mua hàng , dịch_vụ cùng loại hoặc tương_tự trên thị_trường xác_định lại mức giá để tính lại chi_phí được
      trừ khi xác_định thu_nhập chịu thuế " . Do đó , trường_hợp công_ty có thuê một cá_nhân khoan khảo_sát địa_chất , nếu
      cá_nhân đó là cá_nhân kinh_doanh có mức doanh_thu dưới ngưỡng doanh_thu chịu thuế giá_trị gia_tăng ( 100 triệu đồng
      / năm ) thì hồ_sơ để chi_phí khoan khảo_sát địa_chất được tính vào chi_phí hợp_lý là : Hợp_đồng thuê khoan khảo_sát
      địa_chất , chứng_từ trả tiền thuê , Bảng kê thu_mua hàng_hóa dịch_vụ mua vào theo mẫu 01 / TNDN kèm theo Thông_tư số78
      / 2014 / TT - BTCcủa Bộ Tài_chính .'
