      sanık ...''ın ise direksiyon tarafına geçtiği, aracın kilitli kapılarını açıp çalıştırıp hareket ettirerek birlikte
      hızla olay yerinden ayrıldıkları, daha sonra çaldıkları aracı 12.500 - 15.000-TL bir bedel ile ... isimli çalıntı araç
