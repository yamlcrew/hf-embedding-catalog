      sonuç ve kanısına varılmakla..." gerekçesi ile   dava dışı üçüncü kişiler ... ve ... hakkında hırsızlık suçundan cezalandırılmalarına
      karar verildiği kararın kesinleştiği görülmüştür. Yargıtay’ın yerleşik uygulamasına ve öğretideki genel kabule göre,
      maddi olgunun tespitine ilişkin ceza mahkemesi kararı hukuk hakimini bağlar. Ceza mahkemesinde bir maddi olayın varlığı
      ya da yokluğu konusundaki kesinleşmiş kabule rağmen, aynı konunun hukuk mahkemesinde yeniden tartışılması olanaklı değildir
      (HGK''nun 11.10.1989 gün ve E:1989/11-373, K:472,  HGK''nun 27.04.2011 gün ve E:2011/17-50, K:2011/231 sayılı ilamları).
      Türk Borçlar Kanunu''nun 74. maddesi gereğince, hukuk hakimi ceza hakiminin tespit ettiği kusurla bağlı değil ise de
      Ceza Mahkemesince tespit edilen fiilin hukuka aykırılığı ve illiyet bağını saptayan maddi vakalar yönünden Ceza Mahkemesi
      kararı ile bağlıdır. Bu kapsamda ceza mahkemesince maddi vaka değerlendirilirken olayın oluşunun belirtildiği, bu kararın  kesinleşmiş
      olması durumunda bu maddi olgu artık hukuk mahkemesi için de bağlayıcı niteliktedir. Bu hususa değinen istinaf talebi
      yerinde değildir. Ancak ceza dosyası kapsamında davaya konu olay kapsamında davalının kusuru bulunup bulunmadığı yönünden
      bir değerlendirme yapılmadığı görülmüştür. Bu nedenle mahkemece  İstanbul 14. ACM 2015/201 E. 2017/46 karar sayılı dosya
      aslının celbi sağlanarak, olay yeri kayıtların, iş yerinin çalışma şekli, müşteri araçlarının anahtarlarının tutulduğu
      yer ve bu yerin nasıl korunduğu, anahtarların nasıl muhafaza edildiği tespit edilerek davalı oto yıkama işletmecisinin
      kusuru tespit edilmeden ve  TBK''nın 579/2 maddesinde belirtilen şartlar değerlendirilmeden karar verilmesi eksik incelemeye
      dayalı olmuştur.  Trafik kazaları, nitelikleri itibariyle haksız fiillerdendir. Haksız fiillerde temerrüt tarihi, haksız
      fiilin meydana geldiği tarih olup, zarar sorumlusunun ayrıca ihbar ve ihtar edilmesine gerek yoktur. Sigorta ettirenin
      dava hakkı tazmin ettiği bedel nispetinde sigortacıya intikal eder. Ödeme tarihi aynı zamanda 3. şahsa rücu edebilme
      tarihidir. Bu nedenle işleten ve sürücünün faizden sorumluluğunun başlangıcının halefiyet başlangıcı olan ödeme tarihi
      olarak kabulü gerekir. Bu hale göre sigorta şirketinin sigortalısına ödeme tarihinden takip tarihine kadar işlemiş faizin
      hesaplanarak hüküm altına alınması gerekirken yazılı şekilde karar verilmiş olması isabetli olmamıştır (Yargıtay 17.
