  - ' Davacı vekili dava dilekçesinde özetle; dava dışı sigortalı ... A.Ş.''ye ait, müvekkili sigorta şirketinden Kasko poliçesi
    ile sigortalı ... plakalı aracın, ... tarafından oto yıkama hizmeti almak üzere davalıya ait işyerine 09.12.2013 günü
    bırakıldığını ve işyerinden çalındığını, iş bu olay üzerine araç kullanıcısı tarafından Göktürk Polis Merkezine başvurulduğunu,
    aracın bulunamaması üzerine müvekkili sigorta şirketi tarafından aracın rayiç değeri olarak tespit edilen 200.000,00 TL''nin
    sigortalıya 04.06.2014 tarihinde ödendiğini ve TTK 1472. maddesinde açıklanan halefiyet kuralı gereği sigortalısına yaptığı
    ödemeyi davalı taraftan talep ettiğini ancak davalı taraftan herhangi bir cevap alamadığını, alacağın tahsili için  İstanbul
    ...icra Müdürlüğünün ... E. Sayılı dosyası ile girişilen takibe davalı  borçlunun borca itirazı nedeniyle itiraz edilen
    alacak miktarı için itirazın iptaline, takibin devamına, davalının %20''den aşağı olmamak kaydıyla icra inkar tazminatına
    mahkum edilmesine karar verilmesini dava ve talep etmiştir. Davalı vekili cevap dilekçesinde özetle; Olayın meydana geldiği
    yerin müvekkili şirkete ait oto yıkama faaliyetinin yapıldığı iş yeri olduğunu, olayın yıkama için bırakılan ... plakalı
    aracın gasp edilerek çalınması ile meydana geldiğini, olayın faillerinin belli olduğunu takipte yer alan diğer borçlular
    olduğunu, İstanbul 14.Ağır Ceza Mahkemesi 2015/201 E.sayılı dosyası ile dava açıldığını, olayın gerçekleşme şekli itibari
    ile müvekkilinin ve işyerinde yıkama faaliyetinde bulunan çalışanların kusur ve ihmali söz konusu olmadığını, 3. kişilerce
    gasp edilmek suretiyle çalınan araç için ödenen bedelin taraflarından rücuen talep edilmesinin mümkün olmadığını belirterek
    davanın reddine karar verilmesini talep etmiştir. Mahkemece yapılan yargılama sonucunda,  "Davanın kısmen kabulü, kısmen
    reddi ile, Davalının İstanbul ... İcra Müdürlüğünün ... Esas sayılı takibe itirazının kısmen iptaline, takibin kaldığı
    yerden asıl alacak 200.000,00 TL ve faiz üzerinden devamına,  işlemiş faiz talebi bakımından ispat olunamayan 13.857,53
    TL için davanın reddine, şartları oluşmayan icra-inkar tazminat talebin reddine," karar verilmiştir. Bu karara karşı davacı
    vekili ve davalı vekili istinaf başvurusunda bulunmuştur. Davacı vekili istinaf başvuru dilekçesinde özetle; yerel mahkeme
    tarafından takipten önce davalının temerrüde düşürüldüğünün ispat edilememesi nedeniyle işlemiş faiz talebi bakımından
    davanın reddine karar verilmesinin somut olayın niteliğine ve hukuka açıkça aykırılık teşkil ettiğini belirterek istinaf
    yasa yoluna başvurmuştur. Davalı vekili istinaf başvuru dilekçesinde özetle; verilen karar usul ve yasaya aykırı olduğunu,
    belirtmiş oldukları gerekçeler ve kararın esasına etki eden taleplerinin dikkate alınmadığını, açık yasal düzenlemelerin
    hiçbir şekilde irdelenmediğini, davalı tarafın davaya  konu hırsızlık suçunun işlenmesinde herhangi bir ihmal ve kusurunun
    bulunmadığını, müvekkillerinin ve çalışanlarının konu suç olayında bir kusuru bulunmadıklarını, sanıkların çalışanları
    darp etmek suretiyle aracı çaldıklarının açık olduğunu, her ne kadar TMK 74. madde gereğine dayanarak yerel mahkemece
    hüküm kurulmuş ise de hukuk mahkemeleri maddi vakıalarla bağlı olsa da sanıkların mahkumiyet ve beraat kararlarıyla bağlı
    olmadığını, bu nedenle salt sanıkların kendilerini kurtarmak amacıyla verdikleri soyut beyanlarına  itibar edilerek karar
    verilmesinin hukuka aykırı olduğunu, garaj ve otopark işletenin motorlu taşıtını bırakanın taşıtına ve eklentilerine gelen
    zarardan sorumluluğu TBK’nda kusursuz sorumluluk olarak düzenlendiğini, bununla birlikte, bazı hallerde bu sorumluluğun
    sınırlandırılması bazı hallerde ise tamamen kaldırılması yönünde hükümlere de yer verildiğini, TBK''nın 579. maddesi kusursuz
    sorumluluğu miktar itibariyle sınırlandırdığını,  kabul anlamına gelmemek kaydıyla sorumlu tutulacak olsa dahi müvekkilinin
    kusursuz olduğundan bahisle üst sınırdan sorumlu tutulması gerektiğini belirterek istinaf yasa yoluna başvurmuştur. Dava
    kasko sözleşmesinden kaynaklanan tazminat istemine ilişkin olup istinaf açısından uyuşmazlık konusu HMK''nın 355. maddesine
    göre kamu düzeni ve istinaf nedenleri ile sınırlı olmak üzere İlk Derece Mahkemesince verilen kararın usul, yasa ve dosya
    içeriğine uygun olup olmadığıdır. Davacıya kasko sigortalı bulunan  aracın davalının işlettiği oto yıkama işyerine bırakılması
    ile  sigortalı araç sürücüsü ile oto yıkama işletmecisi arasında 6098 sayılı TBK''nun 561 vd. maddelerinde düzenlenmiş
    olan vedia (saklama) sözleşmesi ilişkisi kurulmuştur. TBK''nun 561 vd. maddelerinde düzenlenen vedia akdi gereği, menkul
    bir malı saklamak üzere alan malı aldığı şekliyle teslim etmekle yükümlüdür, kanunun kendine yüklediği yükümlülüğe uymayan
    saklayan bu nedenle oluşacak zararlardan sorumludur. TBK''nın  579 maddesi  uyarınca da sorumluluğu vardır. Davacıya kasko
    sigortalı aracın davalıya ait oto yıkamada bulunduğu sırada çalındığı hususları taraflar arasında ihtilaf konusu değildir.
    Taraflar arasında ihtilaflı olan husus,  sigortalı aracın çalınması olayında davalının kusurunun bulunup bulunmadığı noktasındadır.
    Bu durumda mahkemece, davaya konu rücuen tazminat isteminin dayanağı olan, davacının sigortaladığı aracın çalınması olayı
    ile ilgili olarak İstanbul 14. ACM 2015/201 E. 2017/46 karar sayılı kararı ile"Mülkiyeti ... AŞ isimli tüzel kişiliğe
    ait olup, ... AŞ adlı başka bir şirkete kiralanan ve suç tarihi olan 09/12/2013 günü şirket çalışanı özel şoför ...''ın
    kullanımında olan ... plaka sayılı 2012 model ... marka kiralık otomobilin ... adlı şoför tarafından olay tarihinde gün
    içerisinde Eyüp / Göktürk Polis Merkezi Amirliği mıntıkasında yer alan, mağdur tanık ve diğer tanıkların çalışanı olduğu
    Selanik Bulvarı üzerindeki ... adlı işyerine yıkatmak için bırakıldığı, evvelinde de birlikte çok sayıda otomobil hırsızlığı
    gerçekleştiren ve deyim yerindeyse bizatihi ...''in beyanına nazaran profesyonel oto hırsızları olan sanıklar ... ve ...''ın
    yanlarında ... isimli açık kimlik bilgileri tam olarak tespit edilemeyen 3.bir şahıs olduğu halde ... marka başka bir
    araç ile araç yıkatma bahanesi ile oto yıkamacıya geldikleri, ... isimli kimliği meçhul failin araç içerisinden inmediği,
    yıkamacı çalışanları ... ve ...''ın başka işlerle ilgilenmesi sırasında bu boşluktan faydalanan sanık ...''in anahtarlık
    yerinde asılı halde bulunan suça konu aracın kontak anahtarını fark ettirmeden bulunduğu yerden aldığı, diğer sanık ...''ın
    ise direksiyon tarafına geçtiği, aracın kilitli kapılarını açıp çalıştırıp hareket ettirerek birlikte hızla olay yerinden
    ayrıldıkları, daha sonra çaldıkları aracı 12.500 - 15.000-TL bir bedel ile ... isimli çalıntı araç parçaları satın alan
    bir şahsa sattıkları, olayın oluş ve meydana geliş biçiminin bu şekilde cereyan ettiği vicdani sonuç ve kanısına varılmakla..."
    gerekçesi ile   dava dışı üçüncü kişiler ... ve ... hakkında hırsızlık suçundan cezalandırılmalarına karar verildiği kararın
    kesinleştiği görülmüştür. Yargıtay’ın yerleşik uygulamasına ve öğretideki genel kabule göre, maddi olgunun tespitine ilişkin
    ceza mahkemesi kararı hukuk hakimini bağlar. Ceza mahkemesinde bir maddi olayın varlığı ya da yokluğu konusundaki kesinleşmiş
    kabule rağmen, aynı konunun hukuk mahkemesinde yeniden tartışılması olanaklı değildir (HGK''nun 11.10.1989 gün ve E:1989/11-373,
    K:472,  HGK''nun 27.04.2011 gün ve E:2011/17-50, K:2011/231 sayılı ilamları). Türk Borçlar Kanunu''nun 74. maddesi gereğince,
    hukuk hakimi ceza hakiminin tespit ettiği kusurla bağlı değil ise de Ceza Mahkemesince tespit edilen fiilin hukuka aykırılığı
    ve illiyet bağını saptayan maddi vakalar yönünden Ceza Mahkemesi kararı ile bağlıdır. Bu kapsamda ceza mahkemesince maddi
    vaka değerlendirilirken olayın oluşunun belirtildiği, bu kararın  kesinleşmiş olması durumunda bu maddi olgu artık hukuk
    mahkemesi için de bağlayıcı niteliktedir. Bu hususa değinen istinaf talebi yerinde değildir. Ancak ceza dosyası kapsamında
    davaya konu olay kapsamında davalının kusuru bulunup bulunmadığı yönünden bir değerlendirme yapılmadığı görülmüştür. Bu
    nedenle mahkemece  İstanbul 14. ACM 2015/201 E. 2017/46 karar sayılı dosya aslının celbi sağlanarak, olay yeri kayıtların,
    iş yerinin çalışma şekli, müşteri araçlarının anahtarlarının tutulduğu yer ve bu yerin nasıl korunduğu, anahtarların nasıl
    muhafaza edildiği tespit edilerek davalı oto yıkama işletmecisinin kusuru tespit edilmeden ve  TBK''nın 579/2 maddesinde
    belirtilen şartlar değerlendirilmeden karar verilmesi eksik incelemeye dayalı olmuştur.  Trafik kazaları, nitelikleri
    itibariyle haksız fiillerdendir. Haksız fiillerde temerrüt tarihi, haksız fiilin meydana geldiği tarih olup, zarar sorumlusunun
    ayrıca ihbar ve ihtar edilmesine gerek yoktur. Sigorta ettirenin dava hakkı tazmin ettiği bedel nispetinde sigortacıya
    intikal eder. Ödeme tarihi aynı zamanda 3. şahsa rücu edebilme tarihidir. Bu nedenle işleten ve sürücünün faizden sorumluluğunun
    başlangıcının halefiyet başlangıcı olan ödeme tarihi olarak kabulü gerekir. Bu hale göre sigorta şirketinin sigortalısına
    ödeme tarihinden takip tarihine kadar işlemiş faizin hesaplanarak hüküm altına alınması gerekirken yazılı şekilde karar
    verilmiş olması isabetli olmamıştır (Yargıtay 17. Hukuk Dairesinin 2013/21198 E.  ve 2014/1568 K.sayılı kararı). Açıklanan
    nedenlerle, davacı vekili ile davalı vekilinin istinaf başvurusunun kabulü ile HMK''nın 353/1-a/6. maddesi uyarınca İlk
    Derece Mahkemesi kararının kaldırılmasına, dosyanın yukarıda belirtilen şekilde işlem yapılmak üzere mahkemesine gönderilmesine
    karar verilmiştir.'
- source_sentence: 'Davacı vekili dava dilekçesinde özetle; davalı- borçlu ile müvekkili arasında, davalı- borçlu tarafından
    işletilen "..." isimli işletmesinde müvekkil şirkete ait mamullerin satışı ile ilgili olarak 28/01/2019 tarihli Satış
    Noktası Sözleşmesinin imzalandığını, müvekkili olduğunu şirketin sözleşmede kararlaştırılan bütün edimlerini eksiksiz
    olarak yerine getirdiğini, kendisinden talep edilen ürün teslimlerini zamanında yaptığını, ürünlerin müşterilerine sağlıklı
    bir şekilde sunulabilmesi için soğutucuların teslim edildiğini, sözleşmede kararlaştırılan iskontoların uyguladığını,
    yine sözleşmenin Ek Özel Şartının 5. Maddesi gereğince yükümlendiği nakit yardımı- kdv dahil 23.600,00-TL ''yi davalıya
    verdiğini, fakat davalı- borçlunun şirket sözleşmesinde kararlaştırılan yükümlülüklerini yerine getirmediğini cari hesap
    borcunu vadesinde ödemediğini, sözleşmenin özen borcundan belirtilen aylık olarak en az 84 kasa koli ürün kotasını doldurmadığını,
    sözleşmede kararlaştırılan 2000 kasa koli ürün kotasını doldurmadan ürün alımını kestiğini, davalı- borçlunun sözleşmeye
    aykırı davranışı nedeniyle nakit yardımının iadesi ve cari hesap borcu için İzmir ... İcra müdürlüğünün .../... esas sayılı
    dosyasıyla ilamsız icra takibini yaptığını davalı- borçlunun söz konusu takibe itiraz etmesi üzerine takibin durdurulmasına
    karar verildiğini, yukarıda açıklanan nedenler ile davalı- borçlunun haksız ve kötüniyetli olarak takibi sürüncemede bırakmak
    kastıyla borca ve tüm ferilerine itiraz ettiğini ve takibin durdurulmasına neden olduğunu, bu nedenle davalı- borçlular
    aleyhine %20''den az olmamak üzere icra inkar tazminatına hükmedilmesini, yargılama giderleri ile vekalet ücretini davalı
    tarafa yükletilmesini talep etmiştir. '
  sentences:
  - 'Pay sahiplerinin çağrı

    veya gündeme madde konulmasına ilişkin istemleri yönetim kurulu tarafından reddedildiği

    veya isteme yedi iş günü içinde olumlu cevap verilmediği takdirde, aynı pay sahiplerinin

    başvurusu üzerine, genel kurulun toplantıya çağrılmasına şirket merkezinin bulunduğu

    yerdeki asliye ticaret mahkemesi karar verebilir. Mahkeme toplantıya gerek görürse,

    gündemi düzenlemek ve Kanun hükümleri uyarınca çağrıyı yapmak üzere bir kayyım atar.

    Kararında, kayyımın, görevlerini ve toplantı için gerekli belgeleri hazırlamaya

    ilişkin yetkilerini gösterir. Zorunluluk olmadıkça mahkeme dosya üzerinde inceleme

    yaparak karar verir. Karar kesindir.'
  - ' Alıcı, devraldığı satılanın durumunu işlerin olağan

    akışına göre imkân bulunur bulunmaz gözden geçirmek ve satılanda satıcının

    sorumluluğunu gerektiren bir ayıp görürse, bunu uygun bir süre içinde ona

    bildirmek zorundadır.

    Alıcı gözden geçirmeyi ve bildirimde

