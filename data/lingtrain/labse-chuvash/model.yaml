widgetData:
- source_sentence: Акӑ ӗнтӗ Чакак кимӗ ҫине сикрӗ, Коля пӗр-икӗ хут шнуртан туртрӗ те, мотор кӗрлесе те кайрӗ, унтан кимӗ
    утрав еннелле вӗҫтерчӗ.
  sentences:
  - Вот Сорока вскочил в лодку, Коля дернул за шнур, раз, другой, мотор затрещал, и лодка понеслась к острову.
  - Победа римского флота в гавани Эвносте.
  - Повесть Бориса Горбатова о подвиге и героизме советских людей во время Великой Отечественной войны.
- source_sentence: Ун патне пысӑках мар хырӑмлӑ, шурӑ сӑнлӑ, хӗрлӗ питлӗ, лутра ҫын килсе кӗчӗ.
  sentences:
  - Антонов, Семён Михеевич
  - Явился низенький человек, с умеренным брюшком, с белым лицом, румяными щеками
  - Чёрно-белые фильмы СССР
- source_sentence: '3. Анчах Гаваон ҫыннисем, Иисус Иерихонпа Гай хулисене епле пӗтерсе тӑкни ҫинчен илтсессӗн, 4. акӑ мӗнле
    чеелӗх тупнӑ: ашакӗсем ҫине ҫул валли кивӗ михӗсемпе ҫӑкӑр янтӑласа хунӑ, ҫӗтӗлсе пӗтнӗ, саплӑклӑ тир хутаҫпа эрех илнӗ;
    5. ури сырри те вӗсен кивӗ, саплӑклӑ пулнӑ, ҫийӗнчи тумтирӗсем те ҫӗтӗк пулнӑ; ҫул ҫине илнӗ ҫӑкӑрӗ те пӗтӗмпех типсе-кӑвакарса
    кайнӑскер, [тӗпренсе] пӗтнӗскер пулнӑ.'
  sentences:
  - '3. Но жители Гаваона, услышав, что Иисус сделал с Иерихоном и Гаем, 4. употребили хитрость: пошли, запаслись хлебом на
    дорогу и положили ветхие мешки на ослов своих и ветхие, изорванные и заплатанные мехи вина; 5. и обувь на ногах их была
    ветхая с заплатами, и одежда на них ветхая; и весь дорожный хлеб их был сухой и заплесневелый [и раскрошенный].'
  - «Черти бы их дули!..» — в отчаянии вскричал Щукарь и кинулся к цыганскому табору, но, выскочив на пригорок, обнаружил,
    что ни шатров, ни кибиток возле речки уже нет.
  - 9. И сделаю над тобою то, чего Я никогда не делал и чему подобного впредь не буду делать, за все твои мерзости.
- source_sentence: Эпӗ кӗпер айӗпе укҫасӑрах, ахалех вӗҫсе тухрӑм.
  sentences:
  - У меня в экипаже был механик — что называется, «палец в рот не клади».
  - А я под мост даром слетал.
  - Я пользовался этим и прогуливал школу, чтобы проводить время в компании более старших ребят.
- source_sentence: Генри Джастис Форд
  sentences:
  - — Вижу, по одному делу? — спросила она, взглянув на Сашу и его приятелей.
  - Я вышел из ванны свеж и бодр, как будто собирался на бал.
  - Форд, Генри Джастис
