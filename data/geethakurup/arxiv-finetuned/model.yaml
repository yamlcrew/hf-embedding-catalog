    when a monomer from the left of the membrane translocates to the right . this process increases the monomer density in
    the right neighbourhood of the pore , and simultaneously reduces the monomer density in the left neighbourhood of the
    pore . the local enhancement in the monomer density on the right of the pore _ takes a finite time to dissipate away from
    the membrane along the backbone of the polymer _ ( similarly for replenishing monomer density on the left neighbourhood
    of the pore ) . the imbalance in the monomer densities between the two local neighbourhoods of the pore during this time
    implies that there is an enhanced chance of the translocated monomer to return to the left of the membrane , thereby giving
    rise to _ memory effects _ , and consequently , rendering the translocation dynamics subdiffusive . more quantitatively
    , the excess monomer density ( or the lack of it ) in the vicinity of the pore manifests itself in reduced ( or increased
    ) chain tension around the pore , creating an imbalance of chain tension across the pore ( we note here that the chain
    tension at the pore acts as monomeric chemical potential , and from now on we use both terms interchangeably ) . we use
