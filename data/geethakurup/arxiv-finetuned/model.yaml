    mechanisms behind the data points . a similar degree of agreement is obtained for other data @xcite . in the present paper
    we have developed a diagrammatical description of the nuclear photoabsorption process . the main result of our investigation
    is that the total photoabsorption cross section can be fully understood in terms of a simple physical picture , where
    point - like nucleons and @xmath65-isobars interacting via pion exchange are the relevant degrees of freedom . due to
    the diagram - oriented formalism and the fermi gas model as an approximate description of the nucleons in momentum space
    , we could obtain analytical expressions for all the relevant contributions to the photoabsorption curve . in this way
    a flexible and efficient description has been obtained , which can be used as a starting point for the investigation of
    additional effects . especially in the low - energy part of our calculated curve , the agreement with experiment comes
    about as a non - trivial interplay between the one - nucleon and two - nucleon contributions . it is worth noting that
    , as long as a comparatively low cut - off parameter in the vertex form factor is used , there seems to be no need for
    an explicit diagrammatical inclusion of the @xmath66-meson as an additional mechanism of the nucleon - nucleon interaction
