    @xmath1 space  time , began shortly after invention of the special relativity ( * sr * ) . nordstrm was the first who
    built a unified theory on the base of extra dimensions  @xcite . tight connection between sr and electrodynamics , namely
    the lorentz transformation , led kaluza  @xcite and klein  @xcite to establish @xmath0 versions of general relativity
    ( * gr * ) in which electrodynamics rises from the extra fifth dimension . since then , considerable amount of works have
    been focused on this idea either using different mechanism for compactification of extra dimension or generalizing it
    to non  compact scenarios ( see e.g. ref . @xcite ) such as brane  world theories  @xcite , space  time  matter or induced  matter
    ( * i m * ) theories  @xcite and references therein . the latter theories are based on the campbell  magaard theorem which
