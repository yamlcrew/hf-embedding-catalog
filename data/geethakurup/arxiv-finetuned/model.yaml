    - 'one of the most basic questions that arises in trying to understand the nonperturbative structure of string theory
      concerns the classification of vector bundles over real and complex manifolds . in the presence of d - branes one encounters
      gauge theories in spacetime dimensionalities up to ten . already more than 20 years ago , bps - type equations in higher
      dimensions were proposed  @xcite as a generalization of the self - duality equations in four dimensions . for nonabelian
      gauge theory on a khler manifold the most natural bps  condition lies in the donaldson - uhlenbeck - yau equations  @xcite
      , which arise , for instance , in compactifications down to four - dimensional minkowski spacetime as the condition
      for at least one unbroken supersymmetry .    while the criteria for solvability of these bps equations are by now very
      well understood , in practice it is usually quite difficult to write down explicit solutions of them . one recent line
      of attack has been to consider noncommutative deformations of these field theories  @xcite@xcite . in certain instances
      , d - branes can be realized as noncommutative solitons  @xcite , which is a consequence  @xcite of the relationship
      between d - branes and k - theory  @xcite@xcite . all celebrated bps configurations in field theories , such as instantons  @xcite
      , monopoles  @xcite and vortices  @xcite , have been generalized to the noncommutative case , originally in  @xcite
      , in  @xcite and in  @xcite , respectively ( see  @xcite for reviews and further references ) . solution generating
      techniques such as the adhm construction  @xcite , splitting  @xcite and dressing  @xcite methods have also been generalized
      to the noncommutative setting in  @xcite and in  @xcite . solutions of the generalized self - duality equations  @xcite
      were investigated in  @xcite , for example . noncommutative instantons in higher dimensions and their interpretations
      as d - branes in string theory have been considered in  @xcite@xcite . in all of these constructions the usual worldvolume
      description of d - branes emerges from the equivalence between analytic and topological formulations of k - homology
      .    in this paper we will complete the construction initiated in  @xcite of multi - instanton solutions of the yang
      - mills equations on the manifold which is the product of noncommutative euclidean space @xmath3 with an ordinary two
      - sphere @xmath4 . we consider both bps and non - bps solutions , and extend previous solutions to those which are explicitly
      @xmath1-equivariant for any value of the dirac monopole charge characterizing the gauge field components along the @xmath4
      directions . dimensional reduction techniques are used to establish an equivalence between multi - instantons on @xmath0
      and nonabelian vortices on @xmath2 . the configurations can be interpreted in type  iia superstring theory as _ chains
      _ of branes and antibranes with higgs - like open string excitations between neighbouring sets of d - branes . the equivalence
      between instantons and vortices may then be attributed to the decay of an unstable configuration of d@xmath5-branes
      into a state of d0-branes ( there are no higher brane charges induced because @xmath6 is equivariantly contractible
      ) . the d0-brane charges are classified by @xmath1-equivariant k - theory and the low - energy dynamics may be succinctly
      encoded into a simple quiver gauge theory . unlike the standard brane - antibrane systems , the effective action can
      not be recast using the formalism of superconnections  @xcite but requires a more general formulation in terms of new
      geometrical entities that we call `` graded connections '''' . this formalism makes manifest the interplay between the
      assignment of k - theory classes to the explicit instanton solutions and their realization in terms of a quiver gauge
      theory . the organisation of this paper is as follows . the material is naturally divided into two parts . sections  25
      deal with _ ordinary _ gauge theory on a generic khler manifold of the form @xmath7 in order to highlight the geometric
      structures that arise due to dimensional reduction and which play a prominent role throughout the paper . sections 610
      are then concerned with the noncommutative deformation @xmath8 and they construct explicit solutions of the dimensionally
      reduced yang - mills equations , emphasizing their interpretations in the context of equivariant k - theory , quiver
      gauge theory , and ultimately as states of d - branes . in section 2 we introduce basic definitions and set some of
      our notation , and present the field equations that are to be solved . in section 3 we write down an explicit ansatz
      for the gauge field which is used in the @xmath1-equivariant dimensional reduction . in section  4 we describe three
      different interpretations of the ansatz as configurations of d - branes , as charges in equivariant k - theory , and
      as field configurations in a quiver gauge theory ( later on these three descriptions are shown to be equivalent ) .
      in section  5 the dimensional reduction mechanism is explained in detail in the new language of graded connections and
      the resulting nonabelian vortex equations , arising from reduction of the donaldson - uhlenbeck - yau equations , are
      written down . in section  6 we introduce the noncommutative deformations of all these structures . in section  7 we
      find explicit bps and non - bps solutions of the noncommutative yang - mills equations and show how they naturally realize
      representations of the pertinent quiver . in section  8 we develop an @xmath1-equivariant generalization of the ( noncommutative
      ) atiyah - bott - shapiro construction , which provides an explicit and convenient representation of our solution in
