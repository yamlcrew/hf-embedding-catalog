  - 'in recent years considerable progress has been achieved in the partonic interpretations of diffractive processes in @xmath1
    collisions ( see e.g.  @xcite ) , most of diffractive studies performed up to now at hera have been based on the characteristic
    presence of a rapidity gap in the diffractive final state . the precision of this method is limited by the uncertainty
    related to the presence of dissociated proton background events . the only precise and unambiguous way of studying diffraction
    is by tagging the diffracted proton and measuring its four momentum by means of a proton spectrometer . such devices have
    been used by the h1 and zeus collaborations and have delivered interesting results , but their acceptances are small ,
    with the result that the collected statistics are limited and large systematic errors affect the measurements . to fully
    profit from the hera luminosity upgrade in the study of diffraction after the year 2003 , a very forward proton spectrometer
    ( vfps ) which identifies and measures the momentum of the diffracted proton with a high acceptance has therefore been
    installed by h1 . this contribution reports the vfps tagging performance using diffractive events collected during hera
    running at high energy ( 27.5 gev for the electron / positron beam and 920 gev for the proton ) in 2006 and 2007 . the
    vfps @xcite is a set of two `` roman pots '''' located at 118 m and 222 m downstream of the h1 interaction point . each
    pot consists of an insert into the beam pipe , allowing two tracking detectors equipped with scintillating fibres to be
    moved very close to the proton beam . + many aspects of the design of the roman pots , including the stainless plunger
    vessel and the scintillating fiber detectors , are adaptations of the fps proton spectrometer  @xcite , installed and
    operational in h1 since 1994 . both detectors of each roman pot consists of two planes of scintillating fibres oriented
    at @xmath2 w.r.t .  the horizontal plane and moving perpendicularly to the beam line direction . each detector allows
    to reconstruct of the position of one impact point of the scattered proton trajectory with a precision of about 100 @xmath3
    m . for triggering purposes each detector is sandwiched between 2 scintillating planes which are connected to different
    pm s . a trigger signal , corresponding to a activity in at least 3 planes out of four , is delivered separately for each
    station at the first trigger level . the vfps have been installed at the very end of 2003 . radiation damage of the optical
    readout fiber prohibited data taking during 2004 . hence data available for physics    r0.5 analysis started in 2005 .
    the bulk of data were taken in 2006 and 2007 , they correspond to and integrated luminosity of 140 @xmath4 . from an operational
