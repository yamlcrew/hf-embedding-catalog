  - source_sentence: '<S> @xmath0-mode of polarized anisotropies of the cosmic microwave background is a unique and nearly
      direct probe of primordial inflation , which can constrain the amplitude of the primordial gravity waves . </S> <S>
      however , its detection and precise measurement is made difficult by a minute amplitude of the signal , which has to
      be discerned from many contributions of non - cosmological origin and reliable estimated in the presence of numerous
      sources of statistical uncertainties . among these latter , the @xmath1-to-@xmath0 leakage , arising as a result of
      partial sky coverage , has been found to play a key and potentially fundamental role in determining the possible statistical
      significance with which the primordial @xmath0-mode signal can be detected . in this work </S> <S> we employ the pure
      - pseudo formalism devised to minimise the effects of the leakage on the variance of power spectrum estimates and discuss
      the limits on the tensor - to - scalar ratio , @xmath2 , that could be realistically set by current and forthcoming
      measurements of the @xmath0-mode angular power spectrum . </S> <S> we compare those with the results obtained using
      other approaches : nave mode - counting , minimum - variance quadratic estimators , and re - visit the question of optimizing
      the sky coverage of small - scale , suborbital experiments in order to maximize the statistical significance of the
      detection of @xmath2 . </S> <S> we show that the optimized sky coverage is largely insensitive to the adopted approach
      at least for reasonably compact sky patches . </S> <S> we find , however , that the mode - counting overestimates the
      detection significance by a factor @xmath3 as compared to the lossless maximum variance approach and by a factor @xmath4
      as compared to the lossy pure pseudo - spectrum estimator . in a second time </S> <S> , we consider more realistic experimental
      configurations . with a pure pseudospectrum reconstruction of @xmath0-modes and considering only statistical uncertainties
      , we find that a detection of @xmath5 , @xmath6 and @xmath7 at 99% of confidence level is within the reach of current
      sub - orbital experiments , future arrays of ground - based telescopes and a satellite mission , respectively . </S>
      <S> this means that an array of telescopes could be sufficient to discriminate between large- and small - field models
      of inflation , even if the @xmath1-to-@xmath0 leakage is consistently included but accounted for in the analysis . </S>
      <S> however , a satellite mission will be required to distinguish between different small - field models depending on
      the number of e - folds . </S>'
    sentences:
    - 'primordial gravity waves are expected to be produced during cosmic inflation in addition to scalar perturbations .
      if indeed present , they would leave a characteristic footprint on the polarized anisotropies of the cosmic microwave
      background ( cmb ) , as they are considered to be essentially the sole source of the so - called primordial @xmath0-mode
      residing at the super - horizon scales at the time of the last scattering . a detection of the @xmath0-mode angular
      power spectrum at large angular scales would be then treated as a smoking gun of inflation , while a precise measurement
      of its amplitude would constrain the energy scale of inflation , or , geometrically speaking , the expansion rate of
      the universe during inflation @xcite . this amplitude is expressed by the tensor - to - scalar ratio , @xmath2 , defined
      as the relative power of primordial gravity waves with respect to that of the scalar perturbations at some pivot scale
      @xmath8 , chosen here to be equal to @xmath9 mpc@xmath10 . currently , the most stringent upper bound on @xmath2 using
      temperature anisotropies has been derived by the planck  collaboration : @xmath11 at 95% cl @xcite , while a recent
      joint analysis of the planck  and  polarized data set an upper limit @xmath12 at 95% cl @xcite . the measurement of
      the tensor - to - scalar ratio @xmath2 could allow to discriminate between different inflationary models . in particular
      , if this upper bound @xmath13 is indeed realized in nature , this would imply a rather high amount of primordial gravity
      waves thus favoring large - fields inflationary models @xcite .    at smaller angular scales , the @xmath0-mode is dominated
      by the lensing induced signal . this signal is generated by the gravitational lensing of the cmb photons due to the
      large scale structure @xcite . the lensing contribution is well - understood from a theoretical point of view and can
      be uniquely predicted given the primary @xmath1-modes anisotropies and the lensing deflection field @xcite . such predictions
      have been been recently confirmed by the sptpol  @xcite and polarbear  experiments  @xcite , with also constraints on
      the cmb lensing @xmath0-mode power spectrum  @xcite . the lensing @xmath0-mode signal does not depend on @xmath2 . it
      therefore acts as a source of an additional noise masking the primordial , @xmath2-dependent @xmath0-mode , and making
      its detection more difficult . striving for a detection of @xmath2 , one has to either try to remove this lensing signal  @xcite
      or rely solely on the large angular scales . in this latter case two features of the primordial @xmath0-mode spectrum
      are of particular interest as they are anticipated to be particularly prominent . these are so - called reionization
      and recombination bumps peaking at @xmath14 and at @xmath15 , respectively . + measuring @xmath0-mode is made even more
      difficult by the fact that measurements as performed by the majority of current experiments , which scan the sky in
      order to produce its maps , are straightforwardly expressed only in terms of the stokes parameters , @xmath16 and @xmath17
      . the @xmath1- and @xmath0-mode are mathematically related to the stokes parameters  @xcite and can be therefore recovered
      from the observational data . this however is only simple , if full - sky data were available . in contrast , realistic
      cmb experiments provide maps of polarized anisotropies , which only cover a reduced fraction of the celestial sphere
      , ranging from @xmath18 for balloon - borne and ground - based experiments to @xmath19 for satellite missions . in the
      context of pseudospectrum estimation of the angular power spectra on an incomplete sky part of the @xmath1-mode signal
      is unavoidably mislabelled as @xmath0-modes and vice verse . though such leakages can be corrected on average , the
      leaked signal inevitably contributes to the sampling variance of the other reconstructed spectrum . this dramatically
      increases the uncertainties of the estimated @xmath0-mode spectrum since the cosmological @xmath1-mode is expected to
      be at least two orders of magnitude higher than the @xmath0-mode in terms of their power spectrum  @xcite . the nature
      of the leakages and approaches to their removal were investigated in ref . @xcite and a relevant pseudospectrum estimator
      , referred to as the pure pseudospectrum estimator , was proposed subsequently in ref . this estimator has been thoroughly
      investigated and extended to include an optimization of the sky apodization  @xcite , cross - spectrum approaches  @xcite
      , and , @xmath20 and @xmath21 cross - correlations  @xcite . alternative constructions of pseudospectrum estimators
      correcting for @xmath1-to-@xmath0 leakages have been also proposed  @xcite . nevertheless , the pure pseudospectrum
      method has been found the most mature and efficient one , particularly due to its ability of optimizing the sky apodizations  @xcite
      , making it a method of choice for many practical applications . it is worth pointing out that the leakages are indeed
      ubiquities and correcting for them is as mandatory for small - scale experiments , covering @xmath18 of the sky , as
      for satellite - like missions , with access to as much as @xmath19 of the sky  @xcite . though the impact of the @xmath1-to-@xmath0
      leakage on the variance of the @xmath0-mode power spectrum is generally acknowledged , it is rarely included in projecting
      performance of planned cmb experiments or instrumental concepts from the point of view of their setting constraints
      on the tensor - to - scalar ratio , @xmath2 . instead , the major body of work ( see  @xcite for some recent examples
      ) in this area is based on simplified mode - counting arguments ( see , however e.g. ,  @xcite for some exceptions )
      . this stemmed mostly from the practical reasons , as the impact of the leakage is neither calculable analytically nor
