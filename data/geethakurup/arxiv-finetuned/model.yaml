  - 'transport of molecules across cell membranes is an essential mechanism for life processes . these molecules are often
    long and flexible , and the pores in the membranes are too narrow to allow them to pass through as a single unit . in
    such circumstances , the passage of a molecule through the pore  i.e.  its translocation  proceeds through a random process
    in which polymer segments sequentially move through the pore . dna , rna and proteins are naturally occurring long molecules
    @xcite subject to translocation in a variety of biological processes . translocation is used in gene therapy @xcite ,
    in delivery of drug molecules to their activation sites @xcite , and as an efficient means of single molecule sequencing
    of dna and rna @xcite . understandably , the process of translocation has been an active topic of current research : both
    because it is an essential ingredient in many biological processes and for its relevance in practical applications . translocation
    is a complicated process in living organisms  its dynamics may be strongly influenced by various factors , such as the
    presence of chaperon molecules , ph value , chemical potential gradients , and assisting molecular motors . it has been
    studied empirically in great variety in the biological literature @xcite . studies of translocation as a _ biophysical
    _ process are more recent . in these , the polymer is simplified to a sequentially connected string of @xmath0 monomers
    . quantities of interest are the typical time scale for the polymer to leave a confining cell or vesicle , the `` escape
    time '''' @xcite , and the typical time scale the polymer spends in the pore or `` dwell time '''' , @xcite as a function
    of chain length @xmath0 and other parameters like membrane thickness , membrane adsorption , electrochemical potential
    gradient , etc . @xcite . ( large compared to the polymer s typical size ) . the polymer repeatedly moves back and forth
    from one cell to the other through the pore . at any time , exactly one monomer can be within the pore . the kuhn length
    of the polymer and the lattice spacing are also set to unity . polymers can be in three different states ( i ) state a
    : all monomers are in cell a ; ( ii ) state t ( threaded ) : some monomers are in cell a and the rest in cell b ; ( iii
    ) state b : all monomers are in cell b. the dwell time @xmath7 is defined as the pore - blockade time in experiments ,
    i.e. , as how long the polymer spends in state t during a translocation event.[fig1 ] ]    these have been measured directly
    in numerous experiments @xcite . experimentally , the most studied quantity is the dwell time @xmath5 , i.e. , the pore
    blockade time for a translocation event . for theoretical descriptions of @xmath5 , during the last decade a number of
    mean - field type theories @xcite have been proposed , in which translocation is described by a fokker - planck equation
    for first - passage over an entropic barrier in terms of a single `` reaction coordinate '''' @xmath8 . here @xmath8 is
    the number of the monomer threaded at the pore ( @xmath9 ) . these theories apply under the assumption that translocation
