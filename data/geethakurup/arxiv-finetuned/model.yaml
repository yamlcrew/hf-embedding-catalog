- source_sentence: <S> dimer vacancy ( dv ) defect complexes in the si(001)@xmath0 surface were investigated using high -
    resolution scanning tunneling microscopy and first principles calculations . </S> <S> we find that under low bias filled
    - state tunneling conditions , isolated ` split - off ' dimers in these defect complexes are imaged as pairs of protrusions
    while the surrounding si surface dimers appear as the usual `` bean - shaped '' protrusions . </S> <S> we attribute this
    to the formation of @xmath1-bonds between the two atoms of the split - off dimer and second layer atoms , and present
    charge density plots to support this assignment . </S> <S> we observe a local brightness enhancement due to strain for
    different dv complexes and provide the first experimental confirmation of an earlier prediction that the 1 + 2-dv induces
    less surface strain than other dv complexes </S> <S> . finally , we present a previously unreported triangular shaped
    split - off dimer defect complex that exists at s@xmath2-type step edges , and propose a structure for this defect involving
    a bound si monomer . </S>
