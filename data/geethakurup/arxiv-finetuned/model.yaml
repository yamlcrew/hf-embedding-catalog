      detailed description of this lattice polymer model , its computationally efficient implementation and a study of some
      of its properties and applications can be found in refs . @xcite .    in this model , polymers consist of a sequential
      chain of monomers , living on a fcc lattice . monomers adjacent in the string are located either in the same , or in
      neighboring lattice sites . the polymers are self - avoiding : multiple occupation of lattice sites is not allowed ,
      except for a set of adjacent monomers . the polymers move through a sequence of random single - monomer hops to neighboring
      lattice sites . these hops can be along the contour of the polymer , thus explicitly providing reptation dynamics .
      they can also change the contour `` sideways '''' , providing rouse dynamics . time in this polymer model is measured
      in terms of the number of attempted reptation moves . a two - dimensional version of our three - dimensional model is
