    dynamics . this approach is made possible via a lattice polymer model , based on rubinstein s repton model @xcite for
    a single reptating polymer , with the addition of sideways moves ( rouse dynamics ) and entanglement . a detailed description
    of this lattice polymer model , its computationally efficient implementation and a study of some of its properties and
    applications can be found in refs . @xcite .    in this model , polymers consist of a sequential chain of monomers , living
    on a fcc lattice . monomers adjacent in the string are located either in the same , or in neighboring lattice sites .
    the polymers are self - avoiding : multiple occupation of lattice sites is not allowed , except for a set of adjacent
    monomers . the polymers move through a sequence of random single - monomer hops to neighboring lattice sites . these hops
    can be along the contour of the polymer , thus explicitly providing reptation dynamics . they can also change the contour
    `` sideways '''' , providing rouse dynamics . time in this polymer model is measured in terms of the number of attempted
    reptation moves . a two - dimensional version of our three - dimensional model is illustrated in fig . [ fig2 ] .      from
    our experience with the model we already know that the dynamical properties are rather insensitive to the ratio of the
    rates for rouse vs. reptation moves ( i.e. , moves that alter the polymer contour vs. moves that only redistribute the
    stored length along the backbone ) . since the computational efficiency of the latter kind of moves is at least an order
    of magnitude higher , we exploit this relative insensitivity by attempting reptation moves @xmath23 times more often than
    rouse moves ; typical values are @xmath24 , @xmath25 or 10 , which correspond to a comparable amount of computational
