    . the photoionized jets / outflows of hh objects become optically visible , and thus their detailed physical properties
    can be studied . such photoionized hh jet systems have been identified in the orion nebula and in the reflection nebula
    ngc 1333 @xcite . recently , two such photoionized jet systems , the rosette hh1 and hh2 jets , were discovered within
    the central cavity of the rosette nebula @xcite . the rosette nebula is a spectacular region excavated by strong stellar
    winds from dozens of ob stars at the center of the young open cluster ngc 2244 , the primary component of a possible twin
    cluster recently identified using the 2mass ( two micron all sky survey ) database @xcite . at a distance of @xmath2 1.39
    kpc @xcite , this emerging young open cluster is found to have a main sequence turn - off age of about 1.9 myr @xcite
    . the photoionized jets discovered in the rosette nebula @xcite and their counterparts found in the vicinity of @xmath8
    orionis @xcite are both bathed in harsh uv radiation from massive ob stars within a few parsecs , and thus share many
    similar properties consistent with an irradiated origin of the jet systems : ( 1 ) their jet - driving sources are visible
    and show spectral characteristics of t tauri stars . ( 2 ) these sources were not detected by _ iras _ ( _ infrared astronomical
    satellite _ ) , indicating a lack of circumstellar material such as extended disks and/or envelopes . ( 3 ) the jets show
    [ ] /h@xmath5 line ratio decreasing from the base outward , indicating that the dominant excitation mechanism changes
    from shocks at the base to photoionization at the end of the jet . ( 4 ) the jet systems all have a highly asymmetric
    or even unipolar morphology , indicating perhaps different jet forming conditions in the launch and collimation regions
    . the rosette hh jets show subtle differences from other externally photoionized hh jets because of different degrees
    of hardness in the uv radiation field or strength of fast stellar winds . both the rosette hh1 and hh2 jets show high
    excitation @xcite , as the rosette nebula contains an o4 star and an o5 star @xcite . in the orion nebula , hh jets with
    [ ] emission are found only within 30 , or @xmath20.06 pc , from @xmath9oric , an o4 - 6 star , the earliest o star in
    the orion nebula @xcite . the high excitation of these hh jets results from both the harsh uv radiation and strong fast
    stellar wind of @xmath9oric @xcite . @xcite propose that the rosette jets provide evidence for efficient dissipation of
    circumstellar disks and envelopes in the close vicinity of massive ob stars . this uv dissipation of pre - existing protostellar
    systems may lead to the formation of isolated brown dwarfs ( bds ) and free - floating giant planets . such a formation
    mechanism for single sub - stellar objects has indeed been shown to be effective by theoretical studies @xcite . it is
    therefore important to explore the nature of jet formation and disk dissipation of low - mass ysos in close vicinity of
    massive ionizing ob stars , as the occurrence of such ob clusters and associations is common in the galaxy , and the solar
