    probe of primordial inflation , which can constrain the amplitude of the primordial gravity waves . </S> <S> however ,
    its detection and precise measurement is made difficult by a minute amplitude of the signal , which has to be discerned
    from many contributions of non - cosmological origin and reliable estimated in the presence of numerous sources of statistical
    uncertainties . among these latter , the @xmath1-to-@xmath0 leakage , arising as a result of partial sky coverage , has
    been found to play a key and potentially fundamental role in determining the possible statistical significance with which
    the primordial @xmath0-mode signal can be detected . in this work </S> <S> we employ the pure - pseudo formalism devised
    to minimise the effects of the leakage on the variance of power spectrum estimates and discuss the limits on the tensor
    - to - scalar ratio , @xmath2 , that could be realistically set by current and forthcoming measurements of the @xmath0-mode
    angular power spectrum . </S> <S> we compare those with the results obtained using other approaches : nave mode - counting
    , minimum - variance quadratic estimators , and re - visit the question of optimizing the sky coverage of small - scale
    , suborbital experiments in order to maximize the statistical significance of the detection of @xmath2 . </S> <S> we show
    that the optimized sky coverage is largely insensitive to the adopted approach at least for reasonably compact sky patches
    . </S> <S> we find , however , that the mode - counting overestimates the detection significance by a factor @xmath3 as
    compared to the lossless maximum variance approach and by a factor @xmath4 as compared to the lossy pure pseudo - spectrum
    estimator . in a second time </S> <S> , we consider more realistic experimental configurations . with a pure pseudospectrum
    reconstruction of @xmath0-modes and considering only statistical uncertainties , we find that a detection of @xmath5 ,
    @xmath6 and @xmath7 at 99% of confidence level is within the reach of current sub - orbital experiments , future arrays
    of ground - based telescopes and a satellite mission , respectively . </S> <S> this means that an array of telescopes
    could be sufficient to discriminate between large- and small - field models of inflation , even if the @xmath1-to-@xmath0
    leakage is consistently included but accounted for in the analysis . </S> <S> however , a satellite mission will be required
    to distinguish between different small - field models depending on the number of e - folds . </S>'
