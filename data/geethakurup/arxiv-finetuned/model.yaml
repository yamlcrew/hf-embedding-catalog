    sentences:
    - 'the lhc run 1 results , and especially the measured higgs boson properties @xcite , reveal a sm - like picture of the
      particle physics at the electroweak scale . nevertheless this situation is compatible with a potentially very rich scalar
      sector , hidden from direct inspection due to some decoupling or alignment arguments . assuming that this is the situation
      at the tev scale , one can ask what are the best experimental shortcuts to this hidden sector , and how one should probe
      it at colliders . of course , the answer strongly depends on the higgs sector chosen , and hundreds of papers have investigated
      it in various specific circumstances . also , the full parameter space is usually huge which renders it impossible to
      systematically explore the model in its full complexity , neither with algebra nor with numerical methods . in these
      cases , one usually resorts to specific models in particular corners of the parameter space .    without any direct
      clue from experiment , one usually tries to uncover all physically interesting situations within a given model and to
      check which of them offer the most attractive description of the data . this undertaking requires a systematic exploration
      of the entire parameter space of a model , which for most cases is beyond the reach of traditional methods . one of
      the main reasons is that , with multiple higgs fields , the scalar potential , even the renormalizable one , becomes
      very complicated . even an efficient description of the full parameter space is a challenge , let alone its investigation
      . the two - higgs - doublet model ( 2hdm ) @xcite is a hallmark example of the bsm higgs sector , whose phenomenology
      exhibits a variety of bsm effects and which , at the same time , is still amenable to systematic treatment in the entire
      parameter space , although with somewhat non - standard mathematical methods . for more involved higgs sectors , the
      complexity of the analysis skyrockets , making the systematic study impossible . as a result , extensions of the higgs
      sector beyond 2hdm , such as @xmath0-higgs - doublet models ( nhdm ) , are nowhere near in the detail of their investigation
      , despite hundreds of publications ( for a few early publications , see @xcite ) . it all makes systematic investigation
      of nhdm a task which is very challenging but worth pursuing . how should one attack this problem ? experience in conservative
      bsm model - building shows that models , which are phenomenolgically viable and theoretical attractive , often arise
      from additional symmetries , either exact or approximate . nhdms can have much richer ( discrete ) symmetries than 2hdm
      but usually these exact symmetries lead to either unrealistic or very sm - like phenomenology . it is therefore natural
      to systematically explore nhdms _ in the vicinity of large discrete symmetry group_.    this task splits into two parts
      , each of them being challenging on its own . first , one needs to know which highly symmetric nhdms one can construct
      for a given @xmath0 and what are their phenomenological consequences . if we assume that higgs doublets transform under
      irredicible representation of a large symmetry group @xmath1 , then the renormalizable higgs potential takes the form
      @xmath2 with the quadratic part being symmetric under all linear unitary transformations of @xmath0 doublets and the
      quartic part @xmath3 encoding the desired symmetry . second , one should explicitly break this symmetry group in a way
      that does not lead to dramatic consequences in order not to violate existing data . a natural procedure is to introduce
      soft breaking terms in the quadratic potential , @xmath4 , keeping the quartic part unchanged . in this way , the symmetric
      model serves as a starting point , and one needs to systematically trace the evolution of phenomenology as one shifts
      away from the symmetry .    the model still remains highly multidimensional , and the direct scans of the entire parameter
      space is of little use . i propose instead to search for analytically calculable _ robust quantities _ which would be
      applicable to a wide class of models and not be sensitive to specific numerical values of free parameters . it would
      be especially encouraging if these quantities are basis - invariant . below i will outline some directions in 3hdm ,
      along which this task can be pursued . the first step is to understand the symmetric situations possible within a given
      scalar sector . here , we use for illustration the three - higgs - doublet model ( 3hdm ) , whose scalar symmetries
      have been recently investigated in much detail in @xcite . the effect of these symmetries and their breaking on the
      fermionic sector were investigated in @xcite for specific groups and , in general terms , in @xcite which completes
      the old analysis @xcite . the mere fact that we have at our disposal only three doublets , which interact via a renormalizable
      potential , restricts the list of symmetry groups @xmath1 which can be implemented in such scalar sectors . limiting
      ourselves only to discrete groups , one obtains the following list @xcite : @xmath5 imposing any other discrete symmetry
      group on the 3hdm scalar sector will unavoidably lead to an accidental continuous symmetry . some of these groups ,
      namely , @xmath6 , @xmath7 , @xmath8 , @xmath9 , and @xmath10 , automatically lead to explicit @xmath11-conservation
      in the scalar sector ; the others are compatible with explicit @xmath11-violation . .the amount of residual symmetry
      possible after ewsb for each discrete symmetry group of the 3hdm scalar potential ( see text for details ) . @xmath12
      signals the presence of a ( generalized ) @xmath11 symmetry in the model . [ cols=">,^,^,^,^",options="header " , ]     all
      possible symmetry breaking patterns for each of these groups were listed in @xcite ; see also @xcite for results in
      specific groups . these findings are summarized in table  [ table ] . the strongest symmetry breaking of a given group
