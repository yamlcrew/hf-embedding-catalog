    are finite , but @xmath4 diverges in some ppon frames , then an nsc singularity will be formed at the ch . c)if @xmath1
    , @xmath2 and any null dust density @xmath3 diverges , then an sc singularity will be formed at the ch .    expressed
    otherwise , the conjecture suggests to put a test field into the background geometry and study the reaction it will experience
