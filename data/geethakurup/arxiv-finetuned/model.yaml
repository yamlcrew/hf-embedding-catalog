  - 'the phenomenology of nuclear photoabsorption is governed by two characteristic features . first , all nuclei with mass
    numbers @xmath5 ranging from 10 to more than 200 obey the same fundamental curve @xmath6 for the total photoabsorption
    cross section devided by @xmath5 as a function of the photon energy @xmath7 . second , the @xmath1-isobar excitation of
    the nucleon is responsible for the main properties of this curve in the energy region between 200 and 400 mev . models
    , which focus on the behaviour of the @xmath1-isobar in a nuclear environment , namely the @xmath1-hole calculations @xcite
    , have proven to be highly successful in explaining the experimental findings for pion scattering processes @xcite . indeed
    , on grounds of the @xmath1-hole formalism a wide variety of pion - nucleus reactions can be described within one consistent
    framework @xcite . in the case of photonuclear reactions , however , serious descrepancies remain , which partially have
    been accounted for by including non - resonant background terms @xcite . nevertheless , such a procedure , in particular
    for nuclear photoabsorption , either leads to contradictions with previous @xmath1-hole results or lacks the complete
    agreement with experimental data @xcite . the question arises , whether theoretical ingredients other than in - medium
    @xmath1-hole propagations can lead to a similar degree of accuracy . therefore it is natural to address the situation
    from a different point of view asking to what extend the absorption process can be described , when only a very simple
    @xmath1-nucleon interaction is used and all additional effects are accounted for in a purely diagrammatic approach . when
    combined with a simple form of nucleon momentum distribution inside the nucleus , namely a fermi gas model , this leads
    to analytical expressions , in which different corrections to this lowest - order approximation can be studied . this
    is the aim of the present article . in our formalism we follow closely wakamatsu and matsumoto @xcite . however , we do
    not introduce a phenomenological potential to account for the deviation of the nucleon wave functions from plane waves
    , but study the influence of such corrections in a perturbative way , similar to our previous work @xcite . in addition
    , our focus is on the energy - dependence of the total photoabsorption , rather than on the differential cross section
    as a function of the momentum of the outgoing proton . a characteristic feature of wakamatsu s and matsumoto s approach
    is the technically equal treatment of the ( @xmath8,pn ) and the ( @xmath8,pp ) knock - out process , which allowed them
    to obtain a natural explanation for the supression of the two - proton knock - out . this characteristic property is also
    present in our calculation , where it is related to a vanishing trace in spin space . in the last years the ratio ( @xmath8,pp)/(@xmath8,pn
    ) has been investigated in depth within different formalisms . in an extension of wakamatsu s and matsumoto s work by
    boato and giannini @xcite , finite - size effects have been calculated and , more recently , a combination of pion exchange
    and shell - model wave functions was used to investigate this quantity @xcite . currently , two complementary approaches
    for the description of nuclear knock - out reactions exist . carrasco and oset @xcite used a diagram - oriented many -
    body expansion in a fermi gas . the evaluation of self - energy diagrams leads to an accuracy for medium effects high
    enough to study knock - out reactions in great detail . with their primary goal being thus different from ours , their
    formalism does not yield isolated expressions for the resonant and non - resonant parts of the mechanisms of nuclear photoabsorption
    a different approach is used by the gent group @xcite , where the main emphasis lies in the construction of realistic
    shell - model wave functions , rather than on a microscopic description fully based on the evaluation of feynman diagrams
    . as the nuclear photoabsorption is almost insensitive to structural differences between nuclei , the quality of their
    approach becomes obvious in the investigation of differential cross sections for nucleon knock - out , rather than of
    photoabsorption . nuclear photoabsorption provides an interesting tool to study the interplay between one - nucleon and
    two - nucleon contributions . we obtained analytical expressions for these contributions , as well as for their resonant
    and non - resonant parts . this set of results can be used as a starting point to include ( and test ) further nuclear
    or nucleonic effects . in section 2 the basic notations are listed , as well as the interaction terms and the most important
    model assumptions and approximations , which are present in this calculation . the main results and their most prominent
    properties , e.g. the effects of relativistic corrections and nuclear structure , are discussed in section 3 , where also
    the following possible extension of such an approach is considered : as the angular dependence of the two - nucleon process
    is not very strong ( cf . @xcite ) , the different mechanisms contributing to the photoabsorption curve can also be used
    to understand qualitative features of experimental data for nucleon knock - out processes as a function of the photon
    energy . in section 4 some concluding remarks are made , with an emphasis on the applicability of the partial cross sections
    , whose analytical forms are given in the appendix . the starting point of our investigation is the static hamiltonian
    for the pion - nucleon interaction , @xmath9 together with a minimal coupling to the photon field . in eq.([s1eq1 ] )
