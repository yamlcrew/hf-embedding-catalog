      unbroken nor break completely . they are always broken to a proper subgroup . the fact the large discrete symmetry groups
      can not be broken completely with tree - level potentials has several phenomenological consequences . in the last column
      of table  [ table ] we indicate whether the @xmath11-symmetry present in the scalar sector can spontaneously break .
      one sees that highly symmetric models prevent not only explicit but also spontaneous @xmath11-violation in the scalar
      sector . it is curious to note that these two types of @xmath11-violations always come in pairs , at least in the 3hdm
      . whether this is just a coincidence or reveals a generic fact in nhdm is not yet known . incomplete symmetry breaking
      has also consequences for the fermion sector . working within pure nhdm ( no bsm fields beyond several higgs doublets
      ) and extending the symmetry group @xmath1 to the full theory , one can prove that the lack of complete breaking leads
      to unphysical quark sector . the presence of a residual symmetry among higgses coupled to quarks leads either to massless
      quarks , or to block - diagonal form of the ckm matrix , or to the absence of @xmath11-violation . this detrimental
      role of residual family symmetries were noted long ago @xcite but the accurate statement and its proof were presented
      only recently @xcite .    nhdm with large symmetry groups contain many fields but very few free parameters , which leads
      to degeneracies among some of the physical higgses . examples of this situation appeared in many papers , and , for
      the charged higgs bosons , could be traced from general nhdm analysis @xcite . residual symmetries can also stabilize
      some of the higgs bosons making them dark matter candidates . this is a well - known feature of multi - scalar models
      , the inert doublet model @xcite and the simple extensions with ew singlets @xcite being the most studied examples .
      here we want to stress that , for large discrete groups , such a symmetry - protected stabilization can be automatic
      and does not rely on one s choice of free parameters .    in short , nhdms equipped with large discrete symmetry groups
      have predictive phenomenological consequences , which are not sensitive to the exact numerical values of the free parameters
      . these consequences reflect robust structural properties of these models and especially of the scalar potential . it
      is true that some of nhdms with large discrete symmetry group are already incompatible with experiment , especially
      in the fermon sector . however if one wants to softly break these symmetries later , it is not an obstacle but rather
      a good starting point in understanding phenomenology . the second step is to softly break the large symmetry group and
      to track down how the phenomenological picture changes . certainly , for concrete models , one can perform this analysis
      numerically . however understanding in this way the entire spectrum of physical possibilities is a hopeless task due
      to the huge number of free parameters in multi - higgs sectors . if we want to gain some insight into these models in
      the entire parameter space , we need to devise a method beyond simple numerical scans or case - by - case investigation
      . a promising direction is to find robust and calculable quantities , which would not be too sensitive to the exact
      numerical values of the free parameters but which would reflect the structural features of the whole class of models
      . here i describe one example of such quantities which i call `` critical exponents '''' . consider a model with large
      multi - dimensional parameter space @xmath16 , see fig . [ fig - space ] . models possessing ( large ) symmetry groups
      can be contructed by imposing relations among these free parameters ; thus , they occupy certain low - dimensional manifolds
      in this space . their phenomenology in the scalar and fermionic sector often features quantities which are zero . depending
      on the specific construction , they can reflect degenerate extra higgs bosons , their stability due to residual symmetry
      after ewsb , massless quarks , absence of the @xmath11-violation in the quark mixing matrix , etc . symmetry - based
      nhdm examples with these properties can be easily constructed . we call these symmetry - protected quantities `` order
      parameters '''' and denote them generically as @xmath17 .     in the multi - dimensional parameter space , symmetric
      models occupy lower - dimensional manifolds . these manifolds are embedded into one another dependeing on their symmetrry
      groups @xmath1 . the phenomenology of a non - symmetric model in the vicinity of a symmetric situation can bear resemblance
      to the symmetric case , up to corrections which are powerlike in the distance @xmath18 . ]    now , a generic point
      @xmath19 in the parameter space does not correspond to any exact symmetry , hence it leads to non - zero order parameters
      @xmath20 . however this point can lie close to a symmetric manifold , within small distance @xmath18 , where `` small
      '''' means comparable or smaller than typical sizes of the symmetric manifold structures . one can then expect the order
      parameters to exhibit a powerlike behaviour : @xmath21 . the index @xmath22 is called the critical exponent for the
      quantity @xmath17 . a set of critical exponents describes how the phenomenology evolves in the vicinity of a symmetric
      situation . there are two important aspects of these critical exponents . first , they are robust upon variation of
      free parameters and are , therefore , calculable . they do not depend on the exact position of the model in the parameter
      space , but only reflect its degrees of proximity to a certain symmetric situation . they can depend , though , on the
      symmetry group and on the geometric shape of its manifold in the parameter space . in short , critical exponents reveal
      certain structural properties of the whole family of models , and should be calculable analytically . second , having
      these critical exponents at hand will provide qualitative understanding of multi - parametric models in the vicinity
      of symmetries , and in particular of nhdm with large softly broken non - abelian groups . indeed , knowing whether certain
      critical exponent is @xmath23 and another is @xmath24 would immediately provide insight on which effects are phenomenologically
      important and how they can be related . in short , when working in hugely multidimensional parameter spaces , critical
      exponents can guide the search for models with desired phenomenology .    as an illustration of critical exponents displaying
      non - trivial behaviour , consider the scalar sector in the general 2hdm in the vicinity of critical points in the parameter
      space at which the lightest higgs mass @xmath25 . the parameter space can be fully reconstructed @xcite , and locus
      of critical points corresponds to a certain ellipse in it . in its vicinity , the mass is non - zero and the critical
      exponent @xmath22 was found to be either @xmath26 or @xmath27 , depending on how one approaches the ellipse @xcite .
      these two cases differ by a residual discrete symmetry of the model . this example , not pretending to be phenomenologically
      relevant , provides a taste of how easily the things can become non - trivial even in rather simple situations . systematric
      derivation of critical exponents for all order parameters in nhdm will already provide a new insight into its phenomenology
