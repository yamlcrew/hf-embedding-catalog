  - 'primordial gravity waves are expected to be produced during cosmic inflation in addition to scalar perturbations . if
    indeed present , they would leave a characteristic footprint on the polarized anisotropies of the cosmic microwave background
    ( cmb ) , as they are considered to be essentially the sole source of the so - called primordial @xmath0-mode residing
    at the super - horizon scales at the time of the last scattering . a detection of the @xmath0-mode angular power spectrum
    at large angular scales would be then treated as a smoking gun of inflation , while a precise measurement of its amplitude
    would constrain the energy scale of inflation , or , geometrically speaking , the expansion rate of the universe during
    inflation @xcite . this amplitude is expressed by the tensor - to - scalar ratio , @xmath2 , defined as the relative power
    of primordial gravity waves with respect to that of the scalar perturbations at some pivot scale @xmath8 , chosen here
    to be equal to @xmath9 mpc@xmath10 . currently , the most stringent upper bound on @xmath2 using temperature anisotropies
    has been derived by the planck  collaboration : @xmath11 at 95% cl @xcite , while a recent joint analysis of the planck  and  polarized
    data set an upper limit @xmath12 at 95% cl @xcite . the measurement of the tensor - to - scalar ratio @xmath2 could allow
    to discriminate between different inflationary models . in particular , if this upper bound @xmath13 is indeed realized
    in nature , this would imply a rather high amount of primordial gravity waves thus favoring large - fields inflationary
    models @xcite .    at smaller angular scales , the @xmath0-mode is dominated by the lensing induced signal . this signal
    is generated by the gravitational lensing of the cmb photons due to the large scale structure @xcite . the lensing contribution
    is well - understood from a theoretical point of view and can be uniquely predicted given the primary @xmath1-modes anisotropies
    and the lensing deflection field @xcite . such predictions have been been recently confirmed by the sptpol  @xcite and
    polarbear  experiments  @xcite , with also constraints on the cmb lensing @xmath0-mode power spectrum  @xcite . the lensing
    @xmath0-mode signal does not depend on @xmath2 . it therefore acts as a source of an additional noise masking the primordial
    , @xmath2-dependent @xmath0-mode , and making its detection more difficult . striving for a detection of @xmath2 , one
    has to either try to remove this lensing signal  @xcite or rely solely on the large angular scales . in this latter case
    two features of the primordial @xmath0-mode spectrum are of particular interest as they are anticipated to be particularly
    prominent . these are so - called reionization and recombination bumps peaking at @xmath14 and at @xmath15 , respectively
    . + measuring @xmath0-mode is made even more difficult by the fact that measurements as performed by the majority of current
    experiments , which scan the sky in order to produce its maps , are straightforwardly expressed only in terms of the stokes
    parameters , @xmath16 and @xmath17 . the @xmath1- and @xmath0-mode are mathematically related to the stokes parameters  @xcite
