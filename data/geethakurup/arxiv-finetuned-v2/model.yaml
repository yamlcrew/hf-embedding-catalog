    of the nanopillars @xmath22 and the resonant light wavelength @xmath23 rules out the excitation of propagating surface
    polaritons @xcite which are known to enhance the shg output @xcite . </S> <S> since all these effects are included in
    our simulations , we conclude that the origin of the observed shg enhancement is unrelated to the periodicity of the array
    .    </S> <S> an alternative scenario for the observed trend could invoke modifications of the non - local shg contribution
    enhanced by a regular array structure . </S> <S> the importance of the non - local shg was already demonstrated in a number
    of subwavelength - separated plasmonic nanoobjects @xcite . </S> <S> the amplitude and phase of this non - local shg source
    depends on the electric field distribution , i.e. on both the pillar size @xmath15 and the periodicity @xmath24 . </S>
    <S> as such , the interference conditions between the shg sources vary for different samples , thus resulting in a strong
    modification of the shg output .    </S> <S> further , the apparent difference in the shape of the resonant shg output
    for the 4h and 6h samples ( see fig .  [ shifts ] ) is related to the anisotropic nature of sic . </S> <S> the hexagonal
    sic polytypes are known to exhibit zone - folded weak modes in the reststrahlen region @xcite originating from particular
    stacking of the atomic layers along the _ </S> <S> c_-axis of the crystal @xcite . </S> <S> these weakly ir - active zone
    - folded modes can be visualised in the reflectivity measurements at oblique incidence @xcite . </S> <S> although zone
    - folded modes exist in both 4h and 6h polytypes , different stacking of the sic atomic layers is responsible for them
    having different frequencies , as illustrated in fig .  </S> <S> [ analysis],c - d . </S> <S> the additional periodicity
    in the crystal results in folding of the large brillouin zone thus modifying the phonon dispersion and making the excitation
