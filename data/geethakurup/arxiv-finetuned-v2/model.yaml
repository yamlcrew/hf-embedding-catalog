    output . </S> <S> the open red squares ( 4h ) and blue circles ( 6h ) depict the shg intensity obtained at the sphp monopole
    ( resonant ) frequencies , and the dashed lines illustrate a clear correlation between the maximum shg output and the
    spectral position of the sphp monopole peak . </S> <S> similar trends are observed for the 4h and 6h - sic samples as
    long as the sphp monopole and the zone - folded mode are well - separated . </S> <S> when these two resonances start to
    overlap , an additional enhancement of the shg output produced at the sphp monopole resonance in 6h - sic samples is observed
    . </S> <S> moreover , the dependence of the shg signal at the frequency of the zone - folded mode @xmath29  @xmath3 (
    green triangles ) exhibits a much faster increase when the two resonances are brought together ( dotted line ) , indicating
    an efficient interplay between the sphp monopole and the zone - folded mode .    </S> <S> we note that the interaction
    of the localized sphp eigenmodes and the intrinsic excitations of the medium is a unique fingerprint of mid - ir nanophononics
    . indeed </S> <S> , surface plasmon excitations in metals rely on the free electron gas , which is essentially isotropic
    . as such , the shg output of plasmonic nanostructures is ( i ) largely determined by the metal of choice , usually au
    , ( ii ) exhibits only weak spectral dependence @xcite and ( iii ) is limited by robust phase relations in the likely
    case of multiple shg sources @xcite . on the contrary , the flexibility of the sphps is provided by the coupling of the
    surface phonon polariton excitations to the intrinsic bulk phonon modes . the latter can be engineered by designing artificial
    metamaterials based on hybrid multilayer structures @xcite , thus allowing for an effective control of their optical properties
    . to summarize , </S> <S> we have observed shg output enhancement associated with the excitation of the sphp eigenmodes
    in an array of nanopillars grown from sic of different polytypes . </S> <S> the strongest shg output is associated with
    the excitation of the monopole sphp mode characterized by strong localization of the normal to surface projection of the
    electric field @xmath10 . </S> <S> the spectral positions of the shg peaks shift according to the geometric parameters
    of the nanophononic structures . </S> <S> we found a strong dependence of the magnitude of the shg enhancement on the
    resonant frequency . </S> <S> this experimentally observed dependence can not be quantitatively described by simply taking
    into account the sub - diffractional field localization and the dispersion of the linear and nonlinear optical properties
    of sic . </S> <S> further , we discuss the interplay of the sphps and the intrinsic crystalline anisotropy for an efficient
    nonlinear - optical conversion . this mechanism is supported by the shg spectral measurements on the 6h - sic nanopillars
    where excitation of the sphp monopole mode interacting with the weak zone - folded phonon resulted in an additional enhancement
    of the shg output . </S> <S> the presence of intrinsic resonances strongly alters the phase relations in their vicinity
    , providing a natural way for optimizing the shg response in a relatively narrow spectral range . </S> <S> our findings
    demonstrate high potential of mid - ir nonlinear nanophononics as a novel and promising platform for nonlinear optics
    and illustrate the rich opportunities it provides for efficient control over nonlinear - optical response .    </S> <S>
