  - source_sentence: '<S> we report on strong enhancement of mid - infrared second harmonic generation ( shg ) from sic nanopillars
      due to the resonant excitation of localized surface phonon - polaritons within the reststrahlen band . </S> <S> the
      magnitude of the shg peak at the monopole mode experiences a strong dependence on the resonant frequency beyond that
      described by the field localization degree and the dispersion of linear and nonlinear - optical sic properties . comparing
      the results for the identical nanostructures made of 4h and 6h sic polytypes </S> <S> , we demonstrate the interplay
      of localized surface phonon polaritons with zone - folded weak phonon modes of the anisotropic crystal . tuning the
      monopole mode in and out of the region where the zone - folded phonon is excited in 6h - sic , we observe a prominent
      increase of the already monopole - enhanced shg output when </S> <S> the two modes are coupled . envisioning this interplay
      as one of the showcase features of mid - infrared nonlinear nanophononics , we discuss its prospects for the effective
      engineering of nonlinear - optical materials with desired properties in the infrared spectral range .    </S> <S> light
      localization in sub - wavelength volumes is a core of modern nanophotonics . </S> <S> conventional methods of achieving
      strong confinement of the electromagnetic fields extensively utilize unique properties of surface plasmons . </S> <S>
      a remarkable variety of objects and materials supporting these excitations ensures the key role of plasmonics in a broad
      range of applications @xcite . </S> <S> apart from unparalleled sensitivity of plasmonic structures to the optical properties
      of the environment , strong light localization facilitates nonlinear - optical effects @xcite . </S> <S> owing to the
      spectral tunability of the localized plasmon resonances and their sizeable nonlinearity , metallic nanostructures of
      different shapes and sizes have earned their place in nonlinear photonics .    despite obvious advantages of plasmon
      - based nanophotonics , metallic nanoobjects exhibit significant optical losses , which lower the quality factor of
      the localized surface plasmon modes . </S> <S> fast plasmon damping ( typically on the order of 10 fs ) due to ohmic
      losses @xcite thus inhibits nonlinear - optical conversion . </S> <S> an alternative , promising metal - free approach
      has been suggested , utilizing polar dielectrics such as sic @xcite or bn @xcite for high - quality light confinement
      in the mid - infrared ( ir ) . in these materials , </S> <S> the subdiffractional confinement of electromagnetic radiation
      relies upon surface phonon polaritons ( sphp ) in the reststrahlen band : the electric polarization is created due to
      coherent oscillations of the ions instead of the electron or hole densities . due to the significantly longer scattering
      times associated with optical phonons </S> <S> as compared to surface plasmons , the lifetimes of sphps tend to be on
      the order of picoseconds , much longer than their plasmonic counterparts @xcite . </S> <S> in addition , due to energies
      associated with optical phonons , sphps with typical frequencies within the mid - ir ( @xmath0 ) to the thz domain hold
      high promise for spectroscopic and nanophotonic applications @xcite .    in this letter </S> <S> , we undertake a first
      step towards the largely unexplored domain of mid - ir nonlinear nanophononics . </S> <S> we study the nonlinear - optical
      response of localized sphps using nanostructures made of different polytypes of sic . using free electron laser ( fel
      ) radiation in the mid - ir spectral range @xcite </S> <S> , we probe second harmonic generation from rectangular arrays
      of sub - diffractional , cylindrical sic nanopillars . </S> <S> the shg yield in the reststrahlen band of sic demonstrates
      prominent enhancement at the wavelengths associated with the excitation of the sphp eigenmodes of the pillars . depending
      on both the size and the spatial periodicity of the pillars , </S> <S> the shg - probed eigenmode exhibits a spectral
      shift accompanied with strong variations of the shg intensity . analyzing different sic polytypes </S> <S> , we demonstrate
      the interplay of the localized sphps with the zone - folded optical phonon modes . </S> <S> we further conclude that
      strong coupling of the two modes allows for a significant additional modulation of the sphp - enhanced shg output .        </S>
      <S> the schematic of our experimental approach is outlined in fig .  </S> <S> [ general],a . </S> <S> we employed a
      non - collinear shg configuration discussed elsewhere @xcite to perform spectroscopic shg measurements on square arrays
      of 1  @xmath1m - tall 4h - sic and 6h - sic pillars with the main axis of the arrays in the _ xz _ plane of incidence
      . </S> <S> the fundamental radiation incident at 28 and 62 degrees with respect to the normal to the sample surface
      was focused onto the sample with a peak fluence on the order of 10 mj/@xmath2 . </S> <S> both 4h and 6h - sic samples
