    examined plasmon - induced shg enhancement from arrays of au nanoparticles as a function of the inter - particle distance
    @xmath19 . in the regime of @xmath20 ( as it is in our case ) , the dependence of the shg output on @xmath19 was explained
    in terms of the changing filling factor ( and thus the associated number of active nanoemitters ) . </S> <S> for very
