  - source_sentence: <S> we study equilibrium configurations of swarming biological organisms subject to exogenous and pairwise
      endogenous forces . beginning with a discrete dynamical model </S> <S> , we derive a variational description of the
      corresponding continuum population density . </S> <S> equilibrium solutions are extrema of an energy functional , and
      satisfy a fredholm integral equation . </S> <S> we find conditions for the extrema to be local minimizers , global minimizers
      , and minimizers with respect to infinitesimal lagrangian displacements of mass . </S> <S> in one spatial dimension
      , for a variety of exogenous forces , endogenous forces , and domain configurations , we find exact analytical expressions
      for the equilibria . </S> <S> these agree closely with numerical simulations of the underlying discrete model.the exact
      solutions provide a sampling of the wide variety of equilibrium configurations possible within our general swarm modeling
      framework . </S> <S> the equilibria typically are compactly supported and may contain @xmath0-concentrations or jump
      discontinuities at the edge of the support . </S> <S> we apply our methods to a model of locust swarms , which are observed
      in nature to consist of a concentrated population on the ground separated from an airborne group . </S> <S> our model
      can reproduce this configuration ; quasi - two - dimensionality of the model plays a critical role .    swarm , equilibrium
      , aggregation , integrodifferential equation , variational model , energy , minimizer , locust </S>
