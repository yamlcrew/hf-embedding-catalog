  - source_sentence: <S> in 84 , 258 ( 2000 ) , mateos conjectured that current reversal in a classical deterministic ratchet
      is associated with bifurcations from chaotic to periodic regimes . </S> <S> this is based on the comparison of the current
      and the bifurcation diagram as a function of a given parameter for a periodic asymmetric potential . </S> <S> barbi
      and salerno , in 62 , 1988 ( 2000 ) , have further investigated this claim and argue that , contrary to mateos claim
      , current reversals can occur also in the absence of bifurcations . </S> <S> barbi and salerno s studies are based on
      the dynamics of one particle rather than the statistical mechanics of an ensemble of particles moving in the chaotic
      system . </S> <S> the behavior of ensembles can be quite different , depending upon their characteristics , which leaves
      their results open to question . in this paper we present results from studies showing how the current depends on the
      details of the ensemble </S> <S> used to generate it , as well as conditions for convergent behavior ( that is , independent
      of the details of the ensemble ) . </S> <S> we are then able to present the converged current as a function of parameters
      , in the same system as mateos as well as barbi and salerno . </S> <S> we show evidence for current reversal without
      bifurcation , as well as bifurcation without current reversal . </S> <S> we conjecture that it is appropriate to correlate
      abrupt changes in the current with bifurcation , rather than current reversals , and show numerical evidence for our
      claims . </S>
