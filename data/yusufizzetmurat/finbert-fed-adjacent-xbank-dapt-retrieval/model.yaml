  - 'On the national economy: While the Greenbook forecast of a relatively mild, short-lived recession is plausible, my guess
    is that it''s wrong and that we will have a longer lasting and a more serious recession.

    We tried to stick with about a normal difference.

    If we did this, you don''t think it would provide an undue degree of surprise, do you?

    I think we could establish a 7 percent funds rate by Friday and then just have a technical adjustment [in the discount
    rate] and use the appropriate language for that.

    Don''s projections presumably could err on both sides, not just one side, and we may well get a faster growth rate of
    money.'
