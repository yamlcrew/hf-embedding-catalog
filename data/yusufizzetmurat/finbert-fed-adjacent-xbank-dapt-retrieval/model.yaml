- source_sentence: 'The Federal Open Market Committee decided today to lower its target for the federal funds rate by 50 basis
    points to 1 1/4 percent. In a related action, the Board of Governors approved a 50 basis point reduction in the discount
    rate to 3/4 percent. The Committee continues to believe that an accommodative stance of monetary policy, coupled with
    still-robust underlying growth in productivity, is providing important ongoing support to economic activity. However,
    incoming economic data have tended to confirm that greater uncertainty, in part attributable to heightened geopolitical
    risks, is currently inhibiting spending, production, and employment. Inflation and inflation expectations remain well
    contained. In these circumstances, the Committee believes that today''s additional monetary easing should prove helpful
    as the economy works its way through this current soft spot. With this action, the Committee believes that, against the
    background of its long-run goals of price stability and sustainable economic growth and of the information currently available,
    the risks are balanced with respect to the prospects for both goals in the foreseeable future. Voting for the FOMC monetary
    policy action were Alan Greenspan, Chairman; William J. McDonough, Vice Chairman; Ben S. Bernanke, Susan S. Bies; Roger
    W. Ferguson, Jr.; Edward M. Gramlich; Jerry L. Jordan; Donald L. Kohn, Robert D. McTeer, Jr.; Mark W. Olson; Anthony M.
    Santomero, and Gary H. Stern. In taking the discount rate action, the Federal Reserve Board approved the requests submitted
    by the Boards of Directors of the Federal Reserve Banks of Dallas and New York. 2002 Monetary policy Home | News and events
    Accessibility Last update: November 6, 2002'
