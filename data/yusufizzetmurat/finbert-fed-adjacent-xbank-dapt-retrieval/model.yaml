    and financial outlook and the conduct of monetary policy over the intermeeting period ahead. The information reviewed
    at this meeting suggested that economic growth had slowed from the moderate pace of the third quarter. Residential construction
    activity remained high, but consumer spending had softened and business investment was still sluggish. Industrial production
    had slipped in recent months and private payroll employment had changed little, while labor productivity remained on a
    strong upward trend. Overall price inflation had fallen over the past year, reflecting both favorable developments in
