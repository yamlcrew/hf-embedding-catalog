- source_sentence: cơ_sở giam_giữ có trách_nhiệm tổ_chức an_táng cho người bị tạm giữ chết trong trường_hợp nào ?
  sentences:
  - '1 . thành_phần hội_đồng để xác_định giá khởi_điểm đối_với tài_sản là trụ_sở làm_việc , cơ_sở hoạt_động sự_nghiệp quy_định
    tại điểm a_khoản 2 điều 24 nghị_định số 151 / 2017 / nđ-cp : a ) lãnh_đạo sở tài_chính - chủ_tịch hội_đồng ; b ) đại_diện
    sở tài_nguyên và môi_trường , sở xây_dựng , sở quy_hoạch - kiến_trúc ( nếu có ) ; c ) đại_diện cơ_quan được giao nhiệm_vụ
    tổ_chức xử_lý tài_sản ; d ) các thành_viên khác do chủ_tịch hội_đồng quyết_định căn_cứ vào tính_chất , đặc_điểm của tài_sản
    cần định_giá .'
  - 3 . khi cơ_quan điều_tra và viện_kiểm_sát đồng_ý cho làm các thủ_tục an_táng người chết thì cơ_sở giam_giữ có trách_nhiệm
    thông_báo cho thân_nhân của người chết . trường_hợp thân_nhân người chết có văn_bản yêu_cầu thì bàn_giao thi_hài đó cho
    họ , trừ trường_hợp có căn_cứ cho rằng việc đó ảnh_hưởng đến an_ninh , trật_tự và vệ_sinh môi_trường . sau thời_hạn 24
    giờ kể từ khi thông_báo mà họ không nhận thì cơ_sở giam_giữ có trách_nhiệm tổ_chức an_táng . trường_hợp thân_nhân của
    người chết có đơn đề_nghị được nhận tro_cốt hoặc hài_cốt sau khi an_táng thì thủ_trưởng cơ_sở giam_giữ trao_đổi với chính_quyền
    địa_phương giải_quyết theo quy_định của pháp_luật . việc an_táng phải tuân_thủ quy_định của bộ y_tế và của chính_quyền
