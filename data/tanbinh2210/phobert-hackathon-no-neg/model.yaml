      của công_tác thi_hành án dân_sự trong nước và thế_giới ; tổ_chức nghiên_cứu phục_vụ quản_lý và xử_lý thông_tin quản_lý
      ; d ) có khả_năng phân_tích , tổng_hợp , thành_thạo kỹ_năng xây_dựng văn_bản , tài_liệu liên_quan đến chức_trách , nhiệm_vụ
      được giao và thuyết_trình về các vấn_đề được giao ; đ ) đối_với công_chức dự thi nâng_ngạch thẩm_tra_viên chính phải
      là người đã chủ_trì hoặc tham_gia xây_dựng ít_nhất 01 ( một ) văn_bản quy_phạm_pháp_luật hoặc chủ_trì nghiên_cứu , xây_dựng
      hoặc tham_gia nghiên_cứu , xây_dựng ít_nhất 01 ( một ) đề_tài , đề_án , dự_án , chương_trình nghiên_cứu khoa_học cấp_bộ
      , ngành hoặc cấp tỉnh , cấp huyện được cấp có thẩm_quyền ban_hành hoặc nghiệm_thu và đánh_giá đạt yêu_cầu hoặc đã chủ_trì
      xây_dựng và triển_khai thực_hiện đạt hiệu_quả ít_nhất 01 đề_tài , đề_án , sáng_kiến trong phạm_vi cục thi_hành án dân_sự
      hoặc chi_cục thi_hành án dân_sự ; h ) công_chức dự thi nâng_ngạch thẩm_tra_viên chính phải có thời_gian giữ_ngạch thẩm_tra_viên
      hoặc tương_đương từ đủ 09 năm trở lên ( không kể thời_gian tập_sự , thử việc ) , trong đó thời_gian giữ_ngạch thẩm_tra_viên
      và tối_thiểu 01 năm ( đủ 12 tháng ) tính đến ngày hết thời_hạn nộp hồ_sơ đăng_ký dự thi nâng_ngạch . ...
  - source_sentence: cơ_sở giam_giữ có trách_nhiệm tổ_chức an_táng cho người bị tạm giữ chết trong trường_hợp nào ?
    sentences:
    - '1 . thành_phần hội_đồng để xác_định giá khởi_điểm đối_với tài_sản là trụ_sở làm_việc , cơ_sở hoạt_động sự_nghiệp quy_định
      tại điểm a_khoản 2 điều 24 nghị_định số 151 / 2017 / nđ-cp : a ) lãnh_đạo sở tài_chính - chủ_tịch hội_đồng ; b ) đại_diện
      sở tài_nguyên và môi_trường , sở xây_dựng , sở quy_hoạch - kiến_trúc ( nếu có ) ; c ) đại_diện cơ_quan được giao nhiệm_vụ
      tổ_chức xử_lý tài_sản ; d ) các thành_viên khác do chủ_tịch hội_đồng quyết_định căn_cứ vào tính_chất , đặc_điểm của
      tài_sản cần định_giá .'
    - 3 . khi cơ_quan điều_tra và viện_kiểm_sát đồng_ý cho làm các thủ_tục an_táng người chết thì cơ_sở giam_giữ có trách_nhiệm
      thông_báo cho thân_nhân của người chết . trường_hợp thân_nhân người chết có văn_bản yêu_cầu thì bàn_giao thi_hài đó
      cho họ , trừ trường_hợp có căn_cứ cho rằng việc đó ảnh_hưởng đến an_ninh , trật_tự và vệ_sinh môi_trường . sau thời_hạn
      24 giờ kể từ khi thông_báo mà họ không nhận thì cơ_sở giam_giữ có trách_nhiệm tổ_chức an_táng . trường_hợp thân_nhân
      của người chết có đơn đề_nghị được nhận tro_cốt hoặc hài_cốt sau khi an_táng thì thủ_trưởng cơ_sở giam_giữ trao_đổi
      với chính_quyền địa_phương giải_quyết theo quy_định của pháp_luật . việc an_táng phải tuân_thủ quy_định của bộ y_tế
      và của chính_quyền địa_phương .
    - '" điều 122 . giao_dịch dân_sự vô_hiệu giao_dịch dân_sự không có một trong các điều_kiện được quy_định tại điều 117
      của bộ_luật này thì vô_hiệu , trừ trường_hợp bộ_luật này có quy_định khác . "'
  - source_sentence: giáo_viên trường phổ_thông dân_tộc bán_trú có nhiệm_vụ và quyền gì ?
    sentences:
    - 'điều 7 . nguyên_tắc chung trong sử_dụng phụ_gia thực_phẩm 1 . sử_dụng phụ_gia thực_phẩm trong thực_phẩm phải bảo_đảm
      : a ) phụ_gia thực_phẩm được phép sử_dụng và đúng đối_tượng thực_phẩm ; b ) không vượt quá mức sử_dụng tối_đa đối_với
      một loại thực_phẩm hoặc nhóm thực_phẩm ; c ) hạn_chế đến mức thấp nhất_lượng phụ_gia thực_phẩm cần_thiết để đạt được
      hiệu_quả kỹ_thuật mong_muốn .'
    - 'hình_thức , nội_dung và thời_gian thi thi_tuyển công_chức được thực_hiện theo 2 vòng thi như sau : 1 . vòng 1 : thi
      kiểm_tra kiến_thức , năng_lực chung_a ) hình_thức thi : thi_trắc_nghiệm trên máy_vi_tính . trường_hợp cơ_quan có thẩm_quyền
      tuyển_dụng công_chức chưa có điều_kiện tổ_chức thi trên máy_vi_tính thì thi_trắc_nghiệm trên giấy . trường_hợp tổ_chức
      thi trên máy_vi_tính thì nội_dung thi_trắc_nghiệm không có phần thi tin_học . b ) nội_dung thi gồm 3 phần , thời_gian
      thi như sau : phần i : kiến_thức chung , 60 câu hỏi hiểu_biết chung về hệ_thống chính_trị , tổ_chức bộ_máy của đảng
      , nhà_nước , các tổ_chức chính_trị - xã_hội ; quản_lý hành_chính nhà_nước ; công_chức , công_vụ và các kiến_thức khác
      để đánh_giá năng_lực . thời_gian thi 60 phút ; phần ii : ngoại_ngữ , 30 câu hỏi theo yêu_cầu của vị_trí việc_làm về
      một trong năm thứ tiếng anh , nga , pháp , đức , trung_quốc hoặc ngoại_ngữ khác do người đứng đầu cơ_quan có thẩm_quyền
      tuyển_dụng công_chức quyết_định . thời_gian thi 30 phút ; phần iii : tin_học , 30 câu hỏi theo yêu_cầu của vị_trí việc_làm
      . thời_gian thi 30 phút . c ) miễn phần thi ngoại_ngữ đối_với các trường_hợp sau : có bằng tốt_nghiệp chuyên_ngành ngoại_ngữ
      cùng trình_độ đào_tạo hoặc ở trình_độ đào_tạo cao hơn so với trình_độ đào_tạo chuyên_môn , nghiệp_vụ theo yêu_cầu của
      vị_trí việc_làm dự_tuyển ; có bằng tốt_nghiệp cùng trình_độ đào_tạo hoặc ở trình_độ đào_tạo cao hơn so với trình_độ
      đào_tạo chuyên_môn , nghiệp_vụ theo yêu_cầu của vị_trí việc_làm dự_tuyển do cơ_sở giáo_dục nước_ngoài cấp và được công_nhận
      tại việt_nam theo quy_định ; có chứng_chỉ tiếng dân_tộc_thiểu_số hoặc là người dân_tộc_thiểu_số , trong trường_hợp dự_tuyển
      vào công_chức công_tác ở vùng dân_tộc_thiểu_số . d ) miễn phần thi tin_học đối_với các trường_hợp có bằng tốt_nghiệp
      từ trung_cấp trở lên các chuyên_ngành liên_quan đến tin_học , công_nghệ_thông_tin ; đ ) kết_quả thi vòng 1 được xác_định
      theo số câu trả_lời đúng cho từng phần thi quy_định tại điểm b khoản này , nếu trả_lời đúng từ 50 % số câu hỏi trở lên
      cho từng phần thi thì người dự_tuyển được thi tiếp vòng 2 .'
    - 'nhiệm_vụ và quyền của giáo_viên giáo_viên trường ptdtbt thực_hiện các nhiệm_vụ và quyền quy_định tại điều_lệ trường
      phổ_thông và các nhiệm_vụ , quyền sau : 1 . tìm_hiểu , nắm vững phong_tục tập_quán và đặc_điểm tâm_lý học_sinh dân_tộc
      của địa_phương . 2 . vận_dụng phương_pháp dạy_học phù_hợp đối_tượng học_sinh ; tham_gia quản_lý , giáo_dục , nuôi_dưỡng
      và chăm_sóc học_sinh bán_trú ; tổ_chức thực_hiện các nội_dung giáo_dục đặc_thù trong nhà_trường . 3 . được bồi_dưỡng
      nâng cao năng_lực về kiến_thức dân_tộc , tiếng dân_tộc_thiểu_số , nội_dung , phương_pháp quản_lý , giáo_dục , nuôi_dưỡng
      và chăm_sóc học_sinh bán_trú , tổ_chức thực_hiện các nội_dung giáo_dục đặc_thù trong nhà_trường và được hưởng các chế_độ
      , chính_sách ưu_đãi theo quy_định của nhà_nước .'
  - source_sentence: nội_dung khám sức_khỏe cho nhân_viên bếp ăn trong doanh_nghiệp được quy_định thế_nào ?
    sentences:
    - '3 . trong quá_trình điều_tra , truy_tố , xét_xử , cơ_quan , người có thẩm_quyền quy_định tại khoản 1 điều này có quyền
      : a ) trả lại ngay tài_sản đã thu_giữ , tạm giữ nhưng không phải là vật_chứng cho chủ_sở_hữu hoặc người_quản_lý hợp_pháp
      tài_sản đó ; b ) trả lại ngay vật_chứng cho chủ_sở_hữu hoặc người_quản_lý hợp_pháp nếu xét thấy không ảnh_hưởng đến
      việc xử_lý vụ án và thi_hành án ; c ) vật_chứng thuộc loại mau hỏng hoặc khó bảo_quản thì có_thể được bán theo quy_định
      của pháp_luật ; trường_hợp không bán được thì tiêu_hủy ; d ) vật_chứng là động_vật hoang_dã và thực_vật ngoại_lai thì
      ngay sau khi có kết_luận giám_định phải giao cho cơ_quan quản_lý chuyên_ngành có thẩm_quyền xử_lý theo quy_định của
      pháp_luật . 4 . trường_hợp có tranh_chấp về quyền_sở_hữu đối_với vật_chứng thì giải_quyết theo quy_định của pháp_luật
      về tố_tụng_dân_sự . "'
    - '1 . thẩm_quyền cấp giấy_phép : a ) bộ công_thương là cơ_quan cấp giấy_phép sản_xuất rượu công_nghiệp có quy_mô từ 03
      triệu lít / năm trở lên và giấy_phép phân_phối rượu ; b ) sở công_thương là cơ_quan cấp giấy_phép sản_xuất rượu công_nghiệp
      có quy_mô dưới 03 triệu lít / năm và giấy_phép bán_buôn rượu trên địa_bàn tỉnh , thành_phố trực_thuộc trung_ương ; c
      ) phòng kinh_tế hoặc phòng kinh_tế và hạ_tầng thuộc ủy ban_nhân_dân quận , huyện , thị_xã , thành_phố thuộc tỉnh là
      cơ_quan cấp giấy_phép sản_xuất rượu thủ_công nhằm mục_đích kinh_doanh , giấy_phép bán_lẻ rượu và giấy_phép bán rượu
      tiêu_dùng tại_chỗ trên địa_bàn quận , huyện , thị_xã , thành_phố thuộc tỉnh ; d ) cơ_quan có thẩm_quyền cấp giấy_phép
      thì_có quyền cấp sửa_đổi , bổ_sung và cấp lại giấy_phép đó .'
    - 'nội_dung khám sức khỏe 1 . đối_với ksk cho người từ đủ 18 ( mười_tám ) tuổi trở lên nhưng không thuộc trường_hợp ksk
      định_kỳ : khám theo nội_dung ghi trong giấy ksk quy_định tại phụ_lục 1 ban_hành kèm theo thông_tư này . 2 . đối_với
      ksk cho người chưa đủ 18 ( mười_tám ) tuổi nhưng không thuộc trường_hợp ksk định_kỳ : khám theo nội_dung ghi trong giấy
      ksk quy_định tại phụ_lục 2 ban_hành kèm theo thông_tư này . 3 . đối_với trường_hợp khám sức khỏe định_kỳ : khám theo
      nội_dung ghi trong sổ khám sức khỏe_định_kỳ quy_định tại phụ_lục 3 a ban_hành kèm theo thông_tư này . đối_với lao_động
      nữ , khi khám sức khỏe_định_kỳ được khám chuyên_khoa phụ_sản theo danh_mục quy_định tại phụ_lục 3 b ban_hành kèm theo
      thông_tư này . 4 . đối_với trường_hợp ksk theo bộ tiêu_chuẩn sức khỏe chuyên_ngành : khám theo nội_dung ghi trong giấy
      ksk quy_định tại mẫu giấy ksk của chuyên_ngành đó . 5 . đối_với những trường_hợp khám sức khỏe theo yêu_cầu : khám theo
      nội_dung mà đối_tượng ksk yêu_cầu .'
