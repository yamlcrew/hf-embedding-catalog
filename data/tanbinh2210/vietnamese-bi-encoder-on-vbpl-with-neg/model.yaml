- source_sentence: Lực_lượng Công_an nhân_dân và Quản_lý thị_trường có phối_hợp với Kiểm_lâm trong việc đấu_tranh phòng_ngừa
    , kiểm_tra , phát_hiện và xử_lý vi_phạm không ?
  sentences:
  - hợp với lực_lượng Công_an nhân_dân , Quân_đội nhân_dân , dân_quân tự_vệ , quản_lý thị_trường , hải_quan và cơ_quan , tổ_chức
    liên_quan trong việc đấu_tranh phòng_ngừa , kiểm_tra , phát_hiện và xử_lý vi_phạm theo quy_định của pháp_luật . 4 . Trong
    phạm_vi nhiệm_vụ , quyền_hạn của mình , lực_lượng Công_an nhân_dân , Quân_đội nhân_dân , dân_quân tự_vệ , quản_lý thị_trường
    , hải_quan , cơ_quan tư_pháp và cơ_quan , tổ_chức liên_quan phối_hợp với Kiểm_lâm thực_hiện chức_năng , nhiệm_vụ , quyền_hạn
    theo quy_định của pháp_luật . 5 . Bộ_trưởng Bộ Nông_nghiệp và_Phát_triển_nông_thôn quy_định về hồ_sơ lâm_sản hợp_pháp
    , trình_tự , thủ_tục quản_lý nguồn_gốc lâm_sản . Điều 43 . Trách_nhiệm bảo_vệ rừng của toàn dân 1 . Cơ_quan nhà_nước ,
    tổ_chức , hộ gia_đình , cá_nhân , cộng_đồng dân_cư có trách_nhiệm bảo_vệ rừng theo quy_định của Luật này , pháp_luật về
    phòng cháy và chữa_cháy , bảo_vệ môi_trường , đa_dạng_sinh_học , bảo_vệ và kiểm_dịch thực_vật , thú_y và quy_định khác
    của pháp_luật có liên_quan .
  - 'nhà_nước gửi hồ_sơ đề_xuất ký_kết thỏa_thuận quốc_tế nhân_danh mình để lấy ý_kiến bằng văn_bản của Ủy_ban Đối_ngoại của
    Quốc_hội , Bộ Ngoại_giao và cơ_quan , tổ_chức có liên_quan trực_tiếp đến thỏa_thuận quốc_tế đó . 2 . Cơ_quan , tổ_chức
    được lấy ý_kiến có trách_nhiệm trả_lời bằng văn_bản trong thời_hạn 07 ngày làm_việc kể từ ngày nhận đủ hồ_sơ quy_định
    tại Điều 27 của Luật này . 3 . Người có thẩm_quyền quy_định tại Điều 12 của Luật này quyết_định và tiến_hành ký_kết hoặc
    ủy_quyền cho một người khác ký thỏa_thuận quốc_tế sau khi nghiên_cứu tiếp_thu ý_kiến của cơ_quan , tổ_chức được lấy ý_kiến
    . 4 . Trong trường_hợp cơ_quan , tổ_chức được lấy ý_kiến không đồng_ý việc ký_kết thỏa_thuận quốc_tế thì trình_tự , thủ_tục
    được tiến_hành như sau :'
  - 'pháp ngăn_chặn hành_vi vi_phạm hành_chính ; khởi_tố , điều_tra vi_phạm pháp_luật về lâm_nghiệp theo quy_định của pháp_luật
    ; c ) Sử_dụng phương_tiện , thiết_bị chuyên_dụng , vũ_khí , công_cụ hỗ_trợ và trang_phục theo quy_định của pháp_luật .
    3 . Chính_phủ quy_định chi_tiết Điều này . Điều 105 . Tổ_chức Kiểm_lâm 1 . Kiểm_lâm được tổ_chức ở trung_ương , ở cấp
    tỉnh . 2 . Kiểm_lâm được tổ_chức ở cấp huyện trên cơ_sở yêu_cầu , nhiệm_vụ quản_lý , bảo_vệ rừng , bảo_đảm chấp_hành pháp_luật
    về lâm_nghiệp , phòng cháy và chữa_cháy rừng , phát_triển rừng , sử_dụng rừng , chế_biến và thương_mại lâm_sản tại địa_phương
    . 3 . Kiểm_lâm trong vườn_quốc_gia ; khu dự_trữ thiên_nhiên , khu bảo_tồn loài - sinh cảnh , rừng_phòng_hộ đầu nguồn ,
    rừng_phòng_hộ chắn gió , chắn cát bay , rừng_phòng_hộ chắn sóng , lấn biển thuộc Kiểm_lâm ở trung_ương hoặc ở cấp tỉnh
    được tổ_chức trên cơ_sở yêu_cầu , nhiệm_vụ quản_lý , bảo_vệ rừng . 4 . Chính_phủ quy_định chi_tiết Điều này . Điều 106
    . Trang bị bảo_đảm hoạt_động và chế_độ , chính_sách đối_với Kiểm_lâm 1 . Trang bị bảo_đảm hoạt_động đối_với Kiểm_lâm được
    quy_định như sau :'
- source_sentence: Pháp_luật quy_định như_thế_nào về việc thu_hồi chứng_chỉ hành_nghề Quản_tài_viên ?
  sentences:
  - 'đơn_vị thuộc Quân_đội nhân_dân ; sĩ_quan , hạ_sĩ_quan chuyên_nghiệp trong cơ_quan , đơn_vị thuộc Công_an nhân_dân ; b
    ) Bị kết_án và bản_án đã có hiệu_lực pháp_luật ; c ) Bị thu_hồi chứng_chỉ hành_nghề luật_sư , kiểm_toán_viên ; d ) Bị
    thay_đổi theo quy_định tại điểm a và điểm b khoản 1 Điều 46 của Luật này trong hai vụ_việc phá_sản trở lên . 2 . Chính_phủ
    quy_định chi_tiết việc thu_hồi chứng_chỉ hành_nghề Quản_tài_viên . Điều 16 . Quyền , nghĩa_vụ của Quản_tài_viên , doanh_nghiệp
    quản_lý , thanh_lý tài_sản 1 . Quản_lý tài_sản , giám_sát hoạt_động kinh_doanh , thanh_lý tài_sản của doanh_nghiệp , hợp_tác_xã
