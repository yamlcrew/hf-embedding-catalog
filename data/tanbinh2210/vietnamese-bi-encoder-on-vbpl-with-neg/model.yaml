    , hợp_tác_xã ; b ) Lập bảng_kê tài_sản , danh_sách chủ_nợ , danh_sách người mắc nợ ; c ) Bảo_quản tài_sản ; ngăn_chặn
    việc bán , chuyển_giao tài_sản mà không được phép của Thẩm_phán ; ngăn_chặn việc tẩu_tán tài_sản ; tối_đa hóa giá_trị
    tài_sản của doanh_nghiệp , hợp_tác_xã khi bán , thanh_lý tài_sản ;'
  - có trụ_sở và được đăng trên Cổng thông_tin điện_tử của Bộ Tư_pháp . 4 . Quản_tài_viên bị thu_hồi chứng_chỉ hành_nghề Quản_tài_viên
    thì bị xóa tên khỏi danh_sách Quản_tài_viên , doanh_nghiệp hành_nghề quản_lý , thanh_lý tài_sản . Điều 7 . Nghĩa_vụ của
    Quản_tài_viên trong hoạt_động hành_nghề 1 . Tuân_thủ nguyên_tắc hành_nghề quản_lý , thanh_lý tài_sản quy_định tại Điều
    2 của Nghị_định này . 2 . Chịu trách_nhiệm về hoạt_động nghề_nghiệp của mình theo quy_định của pháp_luật về phá_sản .
    3 . Ký báo_cáo , văn_bản về kết_quả thực_hiện quyền , nghĩa_vụ của mình theo quy_định của pháp_luật về phá_sản . 4 . Mua
    bảo_hiểm trách_nhiệm nghề_nghiệp theo quy_định của pháp_luật đối_với trường_hợp Quản_tài_viên hành_nghề với tư_cách cá_nhân
    . 5 . Báo_cáo Sở Tư_pháp tỉnh , thành_phố trực_thuộc Trung_ương nơi đăng_ký hành_nghề về hoạt_động hành_nghề quản_lý ,
    thanh_lý tài_sản theo hướng_dẫn của Bộ Tư_pháp . 6 . Các nghĩa_vụ khác theo quy_định của Luật Phá_sản và pháp_luật có
    liên_quan . Chương III HÀNH_NGHỀ QUẢN_LÝ , THANH_LÝ TÀI_SẢN Điều 8 . Hình_thức hành_nghề của Quản_tài_viên
  - 'trúc có trụ_sở hoạt_động . 2 . Tổ_chức hành_nghề kiến_trúc gồm văn_phòng kiến_trúc_sư , tổ_chức sự_nghiệp , doanh_nghiệp
    khác được tổ_chức , hoạt_động theo quy_định của Luật này , Luật_Doanh_nghiệp và quy_định khác của pháp_luật có liên_quan
    . 3 . Văn_phòng kiến_trúc_sư do kiến_trúc_sư có chứng_chỉ hành_nghề kiến_trúc thành_lập và hoạt_động theo loại_hình doanh_nghiệp
    . Điều 34 . Quyền và nghĩa_vụ của tổ_chức hành_nghề kiến_trúc 1 . Tổ_chức hành_nghề kiến_trúc có quyền sau đây : a ) Thực_hiện
    dịch_vụ kiến_trúc ; b ) Được bảo_hộ quyền sở_hữu_trí_tuệ theo quy_định của pháp_luật về sở_hữu_trí_tuệ ; c ) Yêu_cầu chủ
    đầu_tư cung_cấp thông_tin , tài_liệu liên_quan đến nhiệm_vụ được giao ; d ) Yêu_cầu chủ đầu_tư , nhà_thầu thi_công xây_dựng
    thực_hiện đúng thiết_kế kiến_trúc được duyệt ; đ ) Từ_chối thực_hiện yêu_cầu trái pháp_luật của chủ đầu_tư , yêu_cầu ngoài
    nhiệm_vụ thiết_kế kiến_trúc và hợp_đồng , yêu_cầu thay_đổi thiết_kế kiến_trúc không phù_hợp tiêu_chuẩn , quy_chuẩn kỹ_thuật
    ; e ) Từ_chối nghiệm_thu công_trình , hạng_mục công_trình không đúng thiết_kế kiến_trúc được duyệt .'
