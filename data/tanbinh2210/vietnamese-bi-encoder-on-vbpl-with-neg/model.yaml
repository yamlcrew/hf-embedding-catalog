      doanh_nghiệp . Điều 34 . Quyền và nghĩa_vụ của tổ_chức hành_nghề kiến_trúc 1 . Tổ_chức hành_nghề kiến_trúc có quyền
      sau đây : a ) Thực_hiện dịch_vụ kiến_trúc ; b ) Được bảo_hộ quyền sở_hữu_trí_tuệ theo quy_định của pháp_luật về sở_hữu_trí_tuệ
      ; c ) Yêu_cầu chủ đầu_tư cung_cấp thông_tin , tài_liệu liên_quan đến nhiệm_vụ được giao ; d ) Yêu_cầu chủ đầu_tư , nhà_thầu
      thi_công xây_dựng thực_hiện đúng thiết_kế kiến_trúc được duyệt ; đ ) Từ_chối thực_hiện yêu_cầu trái pháp_luật của chủ
      đầu_tư , yêu_cầu ngoài nhiệm_vụ thiết_kế kiến_trúc và hợp_đồng , yêu_cầu thay_đổi thiết_kế kiến_trúc không phù_hợp tiêu_chuẩn
      , quy_chuẩn kỹ_thuật ; e ) Từ_chối nghiệm_thu công_trình , hạng_mục công_trình không đúng thiết_kế kiến_trúc được duyệt
      .'
  - source_sentence: Luật quy_định thế_nào về hình_phạt đối_với hành_vi chiếm_đoạt tài_sản qua mạng máy_tính ?
    sentences:
    - 'điện_tử , kinh_doanh tiền_tệ , huy_động vốn tín_dụng , mua_bán và thanh_toán cổ_phiếu trên mạng nhằm tạo niềm_tin cho
      người chủ tài_sản , người_quản_lý tài_sản , làm cho họ tưởng là thật và mua , bán hoặc đầu_tư vào lĩnh_vực đó . 4 .
      Hành_vi khác quy_định tại điểm đ khoản 1 Điều 226 b Bộ_luật_Hình_sự bao_gồm các hành_vi : Gửi tin nhắn_lừa trúng thưởng
      nhưng thực_tế không có giải_thưởng để chiếm_đoạt phí dịch_vụ tin_nhắn ; quảng_cáo bán hàng trên mạng Internet , mạng
      viễn_thông nhưng không giao hàng hoặc giao không đúng số_lượng , chủng_loại , chất_lượng thấp hơn hàng quảng_cáo và
      các hành_vi tương_tự . 5 . Phạm_tội nhiều lần quy_định tại điểm b khoản 2 Điều 226 b Bộ_luật_Hình_sự được hiểu là đã
      có từ hai lần phạm_tội sử_dụng mạng máy_tính , mạng viễn_thông , mạng Internet hoặc thiết_bị số chiếm_đoạt tài_sản trở
      lên mà chưa có lần nào bị truy_cứu trách_nhiệm hình_sự và chưa hết thời_hiệu truy_cứu trách_nhiệm hình_sự . 6 . Khi
      áp_dụng tình_tiết phạm_tội có tính_chất chuyên_nghiệp quy_định tại điểm c khoản 2 Điều 226 b Bộ_luật_Hình_sự cần chú_ý
      :'
    - Hội_đồng dân_tộc , các Ủy_ban của Quốc_hội , Đoàn đại_biểu Quốc_hội , đại_biểu Quốc_hội và Hội_đồng_nhân_dân , Thường_trực
      Hội_đồng_nhân_dân , các Ban của Hội_đồng_nhân_dân , Tổ đại_biểu Hội_đồng_nhân_dân , đại_biểu Hội_đồng_nhân_dân . 3 .
      Giám_sát tối_cao là việc Quốc_hội theo_dõi , xem_xét , đánh_giá hoạt_động của cơ_quan , tổ_chức , cá_nhân chịu sự giám_sát
      trong việc tuân theo Hiến_pháp , luật , nghị_quyết của Quốc_hội và xử_lý theo thẩm_quyền hoặc yêu_cầu cơ_quan có thẩm_quyền
      xử_lý . Giám_sát tối_cao được thực_hiện tại kỳ họp Quốc_hội . 4 . Giám_sát chuyên_đề là việc chủ_thể giám_sát theo_dõi
      , xem_xét , đánh_giá vấn_đề hoặc hoạt_động của cơ_quan , tổ_chức , cá_nhân chịu sự giám_sát trong việc tuân theo Hiến_pháp
      và pháp_luật . 5 . Giám_sát của Quốc_hội bao_gồm giám_sát tối_cao của Quốc_hội , giám_sát của Ủy_ban thường_vụ Quốc_hội
      , Hội_đồng dân_tộc , các Ủy_ban của Quốc_hội , Đoàn đại_biểu Quốc_hội và các đại_biểu Quốc_hội .
    - 'hạn ; c ) Thu_lợi bất_chính từ 200.000.000 đồng đến dưới 500.000.000 đồng ; d ) Gây thiệt_hại từ 300.000.000 đồng đến
      dưới 1.000.000.000 đồng ; đ ) Đối_với trạm trung_chuyển internet quốc_gia , hệ_thống cơ_sở_dữ_liệu tên miền và hệ_thống
      máy chủ tên miền quốc_gia ; e ) Tái_phạm nguy_hiểm . 3 . Phạm_tội thuộc một trong các trường_hợp sau đây , thì bị phạt
      tù từ 07 năm đến 12 năm : a ) Đối_với hệ_thống dữ_liệu thuộc bí_mật nhà_nước ; hệ_thống thông_tin phục_vụ quốc_phòng
      , an_ninh ; b ) Đối_với cơ_sở_hạ_tầng thông_tin quốc_gia ; hệ_thống thông_tin điều_hành lưới_điện quốc_gia ; hệ_thống
      thông_tin tài_chính , ngân_hàng ; hệ_thống thông_tin điều_khiển giao_thông ; c ) Thu_lợi bất_chính 500.000.000 đồng
      trở lên ; d ) Gây thiệt_hại 1.000.000.000 đồng trở lên . 4 . Người phạm_tội còn có_thể bị phạt tiền từ 5.000.000 đồng
      đến 50.000.000 đồng , cấm đảm_nhiệm chức_vụ , cấm hành_nghề hoặc làm công_việc nhất_định từ 01 năm đến 05 năm . Điều
      290 . Tội sử_dụng mạng máy_tính , mạng viễn_thông , phương_tiện điện_tử thực_hiện hành_vi chiếm_đoạt tài_sản'
  - source_sentence: Viện_kiểm_sát nhân_dân có trách_nhiệm gì trong việc bảo_vệ quyền của người bị tạm giữ , tạm giam ?
    sentences:
    - 'theo quy_định của Luật này , Luật tổ_chức Viện_kiểm_sát nhân_dân và Bộ luật_tố_tụng_hình_sự . Điều 43 . Trách_nhiệm
      thực_hiện yêu_cầu , kiến_nghị , kháng_nghị , quyết_định của Viện_kiểm_sát nhân_dân trong quản_lý , thi_hành tạm giữ
      , tạm giam Trưởng nhà tạm giữ , Giám_thị trại tạm giam , Trưởng buồng tạm giữ Bộ_đội biên_phòng có trách_nhiệm thực_hiện
      yêu_cầu , kiến_nghị , kháng_nghị , quyết_định sau đây của Viện_kiểm_sát nhân_dân trong quản_lý , thi_hành tạm giữ ,
      tạm giam : 1 . Yêu_cầu cung_cấp hồ_sơ , tài_liệu có liên_quan đến quản_lý , thi_hành tạm giữ , tạm giam phải được thực_hiện
      ngay ; yêu_cầu thông_báo tình_hình tạm giữ , tạm giam , yêu_cầu trả_lời về quyết_định , biện_pháp hoặc việc_làm vi_phạm
      pháp_luật trong việc tạm giữ , tạm giam được thực_hiện trong thời_hạn 15 ngày ; yêu_cầu tự kiểm_tra việc tạm giữ , tạm
      giam và thông_báo kết_quả cho Viện_kiểm_sát nhân_dân được thực_hiện trong thời_hạn 30 ngày kể từ ngày nhận được yêu_cầu
      ;'
    - tạm giữ , tạm giam . 2 . Cơ_quan , người có thẩm_quyền trong việc tạm giữ , tạm giam phải chuyển cho Viện_kiểm_sát nhân_dân
      khiếu_nại , tố_cáo của người bị tạm giữ , tạm giam trong thời_hạn 24 giờ , kể từ khi nhận được khiếu_nại , tố_cáo .
      3 . Viện_trưởng Viện_kiểm_sát nhân_dân huyện , quận , thị_xã , thành_phố thuộc tỉnh và tương_đương , Viện_trưởng Viện_kiểm_sát
      nhân_dân tỉnh , thành_phố trực_thuộc trung_ương , Viện_trưởng Viện_kiểm_sát quân_sự khu_vực , Viện_trưởng Viện_kiểm_sát
      quân_sự quân_khu và tương_đương giải_quyết khiếu_nại đối_với quyết_định , hành_vi trái pháp_luật trong việc tạm giữ
      , tạm giam của cơ_quan , người có thẩm_quyền thuộc trách_nhiệm kiểm_sát của mình . Viện_trưởng Viện_kiểm_sát cấp trên
      có thẩm_quyền giải_quyết khiếu_nại đối_với việc giải_quyết khiếu_nại của Viện_trưởng Viện_kiểm_sát cấp dưới ; quyết_định
      giải_quyết khiếu_nại của Viện_trưởng Viện_kiểm_sát cấp trên là quyết_định có hiệu_lực pháp_luật .
    - 'của cơ_quan , tổ_chức , cá_nhân quản_lý trực_tiếp , cơ_quan cấp trên , cơ_quan thanh_tra , kiểm_tra , kiểm_toán , giám_sát
      và cơ_quan quản_lý_nhà_nước chuyên_ngành ; b ) Bồi_thường một phần hoặc toàn_bộ thiệt_hại theo quy_định của pháp_luật
      ; c ) Tùy theo mức_độ vi_phạm bị xử_lý kỷ_luật , xử_phạt vi_phạm hành_chính hoặc truy_cứu trách_nhiệm hình_sự theo quy_định
      của pháp_luật . 2 . Người đứng đầu cơ_quan , tổ_chức không trực_tiếp vi_phạm nhưng để xảy ra lãng_phí trong cơ_quan
      , tổ_chức , để xảy ra hành_vi lãng_phí của người do mình trực_tiếp quản_lý , giao nhiệm_vụ hoặc không xử_lý hành_vi
      lãng_phí theo thẩm_quyền thì bị xử_lý như sau : a ) Có trách_nhiệm giải_trình theo yêu_cầu của cơ_quan , tổ_chức , cá_nhân
      cấp trên , cơ_quan thanh_tra , kiểm_tra , kiểm_toán , giám_sát và cơ_quan quản_lý_nhà_nước chuyên_ngành ; b ) Tùy theo
      mức_độ bị xử_lý kỷ_luật hoặc bị truy_cứu trách_nhiệm hình_sự theo quy_định của pháp_luật .'
  - source_sentence: Biên_bản tạm giữ tài_liệu , đồ_vật được lập như_thế_nào và có những nội_dung gì ?
    sentences:
    - thư_tín , điện_tín , bưu_kiện , bưu_phẩm bị thu_giữ biết . Nếu việc thông_báo cản_trở điều_tra thì sau khi cản_trở đó
      không còn nữa , cơ_quan ra_lệnh thu_giữ phải thông_báo ngay . Điều 198 . Tạm giữ tài_liệu , đồ_vật khi khám_xét 1 .
      Khi khám_xét , Điều_tra_viên được tạm giữ đồ_vật là vật_chứng và tài_liệu có liên_quan trực_tiếp đến vụ án . Đối_với
      đồ_vật thuộc loại cấm tàng_trữ , lưu_hành thì phải thu_giữ và chuyển ngay cho cơ_quan quản_lý có thẩm_quyền . Trường_hợp
      cần_thiết phải niêm_phong thì tiến_hành trước mặt chủ_sở_hữu đồ_vật , người_quản_lý đồ_vật , người chứng_kiến , đại_diện
      gia_đình , đại_diện chính_quyền xã , phường , thị_trấn nơi khám_xét . 2 . Việc tạm giữ tài_liệu , đồ_vật khi tiến_hành
      khám_xét được lập biên_bản theo quy_định tại Điều 133 của Bộ_luật này . Biên_bản tạm giữ được lập thành bốn bản , trong
      đó một bản giao cho người chủ tài_liệu , đồ_vật hoặc người_quản_lý tài_liệu , đồ_vật , một bản đưa vào hồ_sơ vụ án ,
      một bản giao cho Viện_kiểm_sát cùng cấp và một bản giao cho cơ_quan quản_lý tài_liệu , đồ_vật bị tạm giữ .
    - đại_diện , người phiên_dịch ; 5 . Nội_dung hòa giải_thành , đối_thoại thành ; 6 . Căn_cứ ra quyết_định công_nhận kết_quả
      hòa giải_thành , đối_thoại thành . Điều 35 . Hiệu_lực của quyết_định công_nhận kết_quả hòa giải_thành , đối_thoại thành
      tại Tòa_án 1 . Quyết_định công_nhận kết_quả hòa giải_thành , đối_thoại thành có hiệu_lực pháp_luật và không bị kháng_cáo
      , kháng_nghị theo thủ_tục phúc_thẩm theo quy_định của Bộ_luật_Tố_tụng_dân_sự , Luật_Tố_tụng hành_chính . 2 . Quyết_định
      công_nhận kết_quả hòa giải thành được thi_hành theo quy_định của pháp_luật về thi_hành án dân_sự . 3 . Quyết_định công_nhận
      kết_quả đối_thoại thành được thi_hành theo quy_định của pháp_luật về tố_tụng hành_chính . Điều 36 . Đề_nghị , kiến_nghị
      xem_xét lại quyết_định công_nhận kết_quả hòa giải_thành , đối_thoại thành tại Tòa_án
    - tài_liệu điện_tử về tạm giữ , tạm giam . Chương II QUY_ĐỊNH CỤ_THỂ Điều 5 . Hồ_sơ quản_lý tạm giữ , tạm giam 1 . Hồ_sơ
      giấy , gồm các loại tài_liệu quy_định tại Khoản 1 , Khoản 2 Điều 17 Luật Thi_hành tạm giữ , tạm giam . 2 . Hồ_sơ điện_tử
      là tập_hợp thông_tin chứa các thông_tin cơ_bản liên_quan đến người bị tạm giữ , người bị tạm giam quy_định tại Khoản
      1 , Khoản 2 Điều 17 Luật Thi_hành tạm giữ , tạm giam . Điều 6 . Tổ_chức , cá_nhân lập , quản_lý , lưu_trữ hồ_sơ quản_lý
      tạm giữ , tạm giam 1 . Cơ_quan lập , quản_lý , lưu_trữ hồ_sơ quản_lý tạm giữ , tạm giam a ) Cơ_quan Quản_lý thi_hành
      án hình_sự Bộ Quốc_phòng ; b ) Cơ_quan Thi_hành án hình_sự cấp quân_khu ; c ) Bộ_Chỉ_huy Bộ_đội biên_phòng cấp tỉnh
      có Đồn biên_phòng được tổ_chức buồng tạm giữ ; d ) Trại tạm giam thuộc Bộ Quốc_phòng , quân_khu , quân_đoàn ; đ ) Cơ_quan
      Điều_tra hình_sự khu_vực có nhà tạm giữ ; e ) Đồn biên_phòng có buồng tạm giữ ; 2 . Cá_nhân lập , quản_lý , lưu_trữ
      hồ_sơ quản_lý tạm giữ , tạm giam a ) Nhân_viên lưu_trữ ; b ) Trợ_lý giam_giữ kiêm hồ_sơ ;
