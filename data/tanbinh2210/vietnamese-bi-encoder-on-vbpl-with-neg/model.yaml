- source_sentence: Viện_kiểm_sát nhân_dân có trách_nhiệm gì trong việc bảo_vệ quyền của người bị tạm giữ , tạm giam ?
  sentences:
  - 'theo quy_định của Luật này , Luật tổ_chức Viện_kiểm_sát nhân_dân và Bộ luật_tố_tụng_hình_sự . Điều 43 . Trách_nhiệm thực_hiện
    yêu_cầu , kiến_nghị , kháng_nghị , quyết_định của Viện_kiểm_sát nhân_dân trong quản_lý , thi_hành tạm giữ , tạm giam Trưởng
    nhà tạm giữ , Giám_thị trại tạm giam , Trưởng buồng tạm giữ Bộ_đội biên_phòng có trách_nhiệm thực_hiện yêu_cầu , kiến_nghị
    , kháng_nghị , quyết_định sau đây của Viện_kiểm_sát nhân_dân trong quản_lý , thi_hành tạm giữ , tạm giam : 1 . Yêu_cầu
    cung_cấp hồ_sơ , tài_liệu có liên_quan đến quản_lý , thi_hành tạm giữ , tạm giam phải được thực_hiện ngay ; yêu_cầu thông_báo
    tình_hình tạm giữ , tạm giam , yêu_cầu trả_lời về quyết_định , biện_pháp hoặc việc_làm vi_phạm pháp_luật trong việc tạm
