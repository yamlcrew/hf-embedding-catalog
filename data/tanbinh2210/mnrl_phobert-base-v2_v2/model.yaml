    - 'Cấp_phát tài_sản

      Tạo mới cấp_phát tài_sản

      Cấp_phát tài_sản là quá_trình chuyển_giao tài_sản cho một đơn_vị hoặc người dùng cụ_thể để sử_dụng hoặc quản_lý , tuân
