      Giới_thiệu Chấm công GPS

      Chấm công GPS ( GPS - Global_Postioning_System ) là một phương_thức hiện_đại ghi_nhận thời_gian làm_việc của nhân_viên
      dựa trên hệ_thống định_vị vệ_tinh toàn_cầu ( GPS ) .

      Thay_vì sử_dụng máy chấm công truyền_thống , nhân_viên sẽ sử_dụng điện_thoại thông_minh hoặc thiết_bị di_động có tích_hợp
      GPS để xác_định vị_trí và ghi_nhận thời_gian bắt_đầu và kết_thúc ca làm_việc một_cách chính_xác và tiện_lợi .

      Tính_năng sẽ sử_dụng GPS để xác_định vị_trí của nhân_viên và ghi_nhận thời_gian chấm công .

      Dữ_liệu chấm công sẽ được tự_động đồng_bộ_hoá với hệ_thống quản_lý của doanh_nghiệp .

      Lưu_ý : Để sử_dụng được chức_năng chấm công GPS , nhân_sự cần được Phân các ca làm_việc có cài_đặt địa_điểm chấm công
      hoặc được gán địa_điểm chấm công trên thông_tin hồ_sơ nhân_sự tuỳ vào cài_đặt chung của hệ_thống'
    - 'Cài_đặt Chấm công

      Cài_đặt chấm công

      Công làm_việc của ca : chỉ hiển_thị công làm_việc thực_tế trong bảng chấm công .

      Giờ làm_việc của ca : chỉ hiển_thị giờ làm_việc thực_tế của trong bảng chấm công .

      Tác_vụ : Chấm công theo định_vị GPS , Mô_tả : Bật cài_đặt nếu công_ty cho_phép chấm công_bằng định_vị GPS trên app mobile

      Tác_vụ : Tách dòng chấm công của nhân_sự , Mô_tả : Trường_hợp nhân_sự có sự thay_đổi thông_tin công_việc , thay_đổi
      mức lương hay nhân_sự có hai loại hợp_đồng trong 1 tháng , quản_lý có_thể lựa_chọn tách dòng chấm công để có cái nhìn
      trực_quan Có 6 lựa_chọn cho Tách dòng chấm công Không tách dòng

      Theo công chuẩn : Nếu 1 tháng nhân_sự áp_dụng nhiều mức công chuẩn khác nhau thì bảng chấm công sẽ tách dòng của nhân_sự
      đó

      Theo vị_trí , phòng_ban : Khi vị_trí hoặc phòng_ban của nhân_sự thay_đổi trong tháng thì bảng chấm công sẽ tách dòng
      của nhân_sự đó

      Theo lương vị_trí : Trong 1 tháng nhân_sự được thay_đổi mức lương theo vị_trí thì bảng chấm công sẽ tách dòng của nhân_sự
      đó'
    - 'PHÂN HỆ CHẤM CÔNG

      Phân hệ chấm công giải_quyết bài_toán gì

      Chấm công là hình_thức khai_báo thông_tin về thời_gian làm_việc của nhân_viên giúp bộ_phận hành_chính nhân_sự có_thể
      nắm được thời_gian làm_việc trong ngày , số ngày làm_việc trong tháng và thời_gian nghỉ của mỗi nhân_viên .

      Với những quy_định làm_việc của doanh_nghiệp về thời_gian làm_việc , thời_gian đi muộn về sớm , ...

      Việc quản_lý thủ_công sẽ tốn rất nhiều thời_gian theo_dõi và tổng_hợp của bộ_phận nhân_sự .

      Hơn_nữa việc quản_lý chấm công đòi_hỏi sự chính_xác để đảm_bảo đầu_vào của việc tính_toán lương thưởng cho nhân_viên
      .

      Dựa trên những khó_khăn của khách_hàng , phân hệ chấm công sẽ giúp cho doanh_nghiệp cũng như bộ_phận hành_chính nhân_sự
      giải_quyết các bài_toán sau :

      Kết_nối và link dữ_liệu chấm công một_cách tự_động

      Quản_lý phân ca làm_việc , thời_gian làm_việc của từng nhân_viên theo ca

      Cho_phép cài_đặt công_thức chấm công , quy_định thưởng_phạt theo thực_tế quy_định của doanh_nghiệp

      Tổng_hợp dữ_liệu chấm công một_cách tự_động giúp bộ_phận nhân_sự giảm_thiểu được thời_gian cũng như giấy_tờ tổng_hợp
      thủ_công

      Tổng_hợp quỹ Phép / Nghỉ bù tự_động giúp bộ_phận nhân_sự dễ_dàng theo_dõi và quản_lý

      Cho_phép cài_đặt các ngày nghỉ cố_định / phát_sinh hằng năm'
    - 'PHÂN HỆ ĐƠN_TỪ

      Các loại đơn_từ

      Sử_dụng đúng mục_đích của các loại đơn_từ sẽ giúp nhân_sự có_thể giải_trình thông_tin chấm công một_cách dễ_dàng .

      Người_quản_lý có_thể theo_dõi thông_tin làm_việc một_cách chính_xác . 1Office cung_cấp 10 loại đơn_từ với các mục_đích
      khác nhau :

      Loại đơn_từ : Đơn xin nghỉ , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự muốn xin nghỉ một hoặc nhiều ngày Đơn xin
      nghỉ với lý_do nghỉ_phép / bù có_thể link vào quỹ quản_lý phép / bù

      Loại đơn_từ : Đơn vắng_mặt , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự có nhu_cầu vắng_mặt một khoảng thời_gian trong
      ca làm_việc

      Loại đơn_từ : Đơn làm thêm , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự có khoảng thời_gian OT ngoài ca làm_việc .

      Đơn làm thêm sẽ phát_sinh theo giờ

      Loại đơn_từ : Đơn checkin / out , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự cần bổ_sung chốt chấm công lúc đến hoặc
      lúc về

      Loại đơn_từ : Đơn đổi ca , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự muốn đổi một ca làm_việc khác ca đã được phân

      Loại đơn_từ : Đơn tăng ca , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự muốn làm thêm một ca nào đó ngoài ca làm_việc
      đã được phân'
    - 'Quản_lý bảng chấm công

      Bảng chấm công

      Bảng chấm công là nơi tổng_hợp tất_cả các thông_tin liên_quan đến chấm công của nhân_sự .

