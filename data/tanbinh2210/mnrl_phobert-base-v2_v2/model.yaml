    hưu_trí và tử_tuất do ảnh_hưởng của dịch COVID-19 theo Nghị_quyết số 68 / NQ-CP ngày 01/7/2021 của Chính_phủ .

    Theo đó , các trường_hợp tạm dừng đóng vào quỹ hưu_trí và tử_tuất bao_gồm :

    -     Người sử_dụng lao_động đã đóng đủ BHXH hoặc đang tạm dừng đóng đến hết tháng 4/2021 và bị ảnh_hưởng bởi đại_dịch
    COVID-19 , dẫn đến giảm từ 15% lao_động tham_gia BHXH trở lên so với tháng 4/2021.

    Các trường_hợp tính giảm bao_gồm :

    Lao_động chấm_dứt hợp_đồng , trừ lao_động mới ký hợp_đồng từ 01/5/2021

    Lao_động tạm hoãn hợp_đồng từ 14 ngày làm_việc trở lên trong tháng .

    Lao_động nghỉ không lương từ 14 ngày làm_việc trở lên trong tháng .

    Lao_động ngừng việc từ 14 ngày làm_việc trở lên trong tháng .

    Số lao_động tính giảm chỉ bao_gồm lao_động làm_việc theo hợp_đồng từ 01 tháng trở lên và không tính lao_động nghỉ hưu
    từ 01/5/2021 .'
