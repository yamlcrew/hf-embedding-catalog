    với lý_do nghỉ_phép / bù có_thể link vào quỹ quản_lý phép / bù

    Loại đơn_từ : Đơn vắng_mặt , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự có nhu_cầu vắng_mặt một khoảng thời_gian trong
    ca làm_việc

    Loại đơn_từ : Đơn làm thêm , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự có khoảng thời_gian OT ngoài ca làm_việc .

    Đơn làm thêm sẽ phát_sinh theo giờ

    Loại đơn_từ : Đơn checkin / out , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự cần bổ_sung chốt chấm công lúc đến hoặc
    lúc về

    Loại đơn_từ : Đơn đổi ca , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự muốn đổi một ca làm_việc khác ca đã được phân

    Loại đơn_từ : Đơn tăng ca , Mục_đích sử_dụng : Đơn phát_sinh khi nhân_sự muốn làm thêm một ca nào đó ngoài ca làm_việc
