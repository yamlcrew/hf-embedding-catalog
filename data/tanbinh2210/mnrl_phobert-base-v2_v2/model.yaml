      Tuỳ vào kiểu cấp_phát trường thông_tin trên phiếu sẽ khác nhau : Cấp_phát cho Cá_nhân : Chọn cá_nhân được cấp_phát tại
      trường Người nhận

      Cấp_phát cho Phòng_ban : Chọn phòng_ban được cấp_phát tại trường Phòng_ban và người đại_diện phòng_ban tại trường Người
      nhận

      Trường dữ_liệu : Người nhận , Mô_tả : Người nhận được chọn từ danh_sách nhân_sự trên hệ_thống Đối_với kiểu cấp_phát
      cho Cá_nhân : Người nhận là cá_nhân được cấp_phát tài_sản

      Đối_với kiểu cấp_phát cho Phòng_ban : Người nhận là đại_diện cho phòng_ban được cấp_phát tài_sản

      Lưu_ý : Số_lượng cấp_phát không được vượt quá số_lượng còn lại của tài_sản'
    - 'Quyết_định bổ_nhiệm

