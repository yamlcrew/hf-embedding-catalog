    Độ tuổi : Từ 18 đến 50 tuổi , có năng_lực hành_vi theo quy_định pháp_luật .

    Nơi cư_trú và làm_việc : Sinh_sống và làm_việc tại các tỉnh , thành_phố Việt_Nam .

    Hợp_đồng lao_động : Còn thời_hạn ít_nhất 6 tháng .

    Thu_nhập tối_thiểu : Trung_bình thu_nhập 6 tháng gần nhất từ 6 triệu đồng / tháng trở lên ( tính theo bảng lương cá_nhân
