     Theo đó , các trường_hợp tạm dừng đóng vào quỹ hưu_trí và tử_tuất bao_gồm :

    -     Doanh_nghiệp tạm dừng sản_xuất , kinh_doanh từ 01 tháng trở lên do gặp khó_khăn bởi thay_đổi cơ_cấu , công_nghệ
    hoặc do khủng_hoảng , suy_thoái kinh_tế .

    -     Doanh_nghiệp thực_hiện các chính_sách của Nhà_nước liên_quan đến tái cơ_cấu nền kinh_tế hoặc thực_hiện các cam_kết
    quốc_tế .

    -     Doanh_nghiệp gặp khó_khăn do các yếu_tố bất_khả_kháng như thiên_tai , hoả_hoạn , dịch_bệnh hoặc mất_mùa .

    Lưu_ý : Trong thời_gian tạm dừng đóng vào quỹ hưu_trí và tử_tuất , người sử_dụng lao_động vẫn đóng vào quỹ ốm_đau và thai_sản
    , quỹ tai_nạn lao_động , bệnh_nghề_nghiệp .'
