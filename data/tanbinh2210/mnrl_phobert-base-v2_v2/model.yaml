    Giới_thiệu Chấm công GPS

    Chấm công GPS ( GPS - Global_Postioning_System ) là một phương_thức hiện_đại ghi_nhận thời_gian làm_việc của nhân_viên
    dựa trên hệ_thống định_vị vệ_tinh toàn_cầu ( GPS ) .

    Thay_vì sử_dụng máy chấm công truyền_thống , nhân_viên sẽ sử_dụng điện_thoại thông_minh hoặc thiết_bị di_động có tích_hợp
    GPS để xác_định vị_trí và ghi_nhận thời_gian bắt_đầu và kết_thúc ca làm_việc một_cách chính_xác và tiện_lợi .

    Tính_năng sẽ sử_dụng GPS để xác_định vị_trí của nhân_viên và ghi_nhận thời_gian chấm công .

    Dữ_liệu chấm công sẽ được tự_động đồng_bộ_hoá với hệ_thống quản_lý của doanh_nghiệp .

    Lưu_ý : Để sử_dụng được chức_năng chấm công GPS , nhân_sự cần được Phân các ca làm_việc có cài_đặt địa_điểm chấm công
    hoặc được gán địa_điểm chấm công trên thông_tin hồ_sơ nhân_sự tuỳ vào cài_đặt chung của hệ_thống'
