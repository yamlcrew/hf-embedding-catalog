      của nhân_sự .

      Ví_dụ : Ca làm_việc bắt_đầu lúc 08:00 , chọn Check in trước 02:00 ( 2 tiếng ) thì nhân_sự có_thể thực_hiện chốt đến
      từ lúc 06:00 .

      Nếu nhân_sự chấm công trước khoảng thời_gian 2 tiếng so với giờ làm_việc ( trước 06:00 ) , hệ_thống sẽ không ghi_nhận
