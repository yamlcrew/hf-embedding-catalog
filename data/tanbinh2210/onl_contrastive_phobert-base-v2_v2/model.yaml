- source_sentence: Nếu tôi muốn nghỉ_việc tại công_ty , tôi cần làm đơn_từ nào ?
  sentences:
  - 'Khắc_phục sự_cố không có quyền cài_đặt lịch biểu

    Để cài_đặt được lịch biểu bạn phải có quyền Quản_lý tất_cả trong phân hệ lịch biểu .

    Để có quyền này , bạn có_thể liên_hệ với bộ_phận có quyền Quản_trị hệ_thống để yêu_cầu cấp quyền cho bạn .

    Bộ_phận có quyền quản_trị hệ_thống có_thể cấp quyền quản_lý tất_cả module lịch biểu cho nhân_sự bằng cách sau :

    1 . Click vào Avatar , chọn Cài_đặt hệ_thống .

    Chọn đối_tượng Hệ_thống

    2 . Tại màn danh_sách người dùng , click chuột phải vào tài_khoản nhân_sự cần cấp quyền tạo mới , chọn tác_vụ Sửa

    3 . Tại màn_hình sửa tài_khoản , tích vào ô Tuỳ chỉnh quyền .

    Tìm mục Lịch biểu và phân_quyền Quản_lý tất_cả .

    ( Bạn có_thể tuỳ chọn quyền quản_lý công_ty , quản_lý chi_nhánh , quản_lý phòng_ban tuỳ theo vai_trò sử_dụng )

    4 . Bấm_Cập nhật để lưu_thông tin

    cài_đặt quyền quản_lý phân hệ lịch biểu'
  - 'PHÂN HỆ MARKETING

    Bạn muốn truy_cập nhanh đến Marketing ?

     Truy cập vào phân hệ Marketing

    Nội_dung

    Phân hệ Marketing giải_quyết bài_toán gì ?

    Những gì bạn có_thể làm

    Phân hệ Marketing giải_quyết bài_toán gì ?

    Phân hệ Marketing trên phần_mềm 1Office giúp doanh_nghiệp quản_lý toàn_diện các hoạt_động tiếp_thị – từ quản_lý chiến_dịch
    cho đến quản_lý các cuộc_gọi từ tổng_đài .

    Phân hệ này sẽ giúp doanh_nghiệp và bộ_phận Marketing giải_quyết các bài_toán như sau :

    Quản_lý và theo_dõi chiến_dịch Email và SMS của doanh_nghiệp

    Thống_kê số lượt tiếp_cận , số liên_hệ kì_vọng và chi_phí thực_tế của mỗi chiến_dịch cụ_thể

    Kết_nối với nhiều nhà_cung_cấp tổng_đài :

    CMC , Omi , Stringee ...

    Quản_lý danh_sách các cuộc_gọi từ tổng_đài đến các liên_hệ

    Theo_dõi trạng_thái cuộc_gọi , điện_thoại_viên và ghi_âm cuộc_gọi'
  - 'Khắc_phục sự_cố không tạo được đơn xin nghỉ_phép

    Kiểm_tra lại thông_tin tới bộ_phận Hành_chính nhân_sự để nắm được quy_định về thời_gian tối_thiểu cần tạo đơn trước khi
    xin nghỉ hoặc thời_gian tối_đa được phép bổ_sung đơn sau khi nghỉ ..

    Nếu cần điều_chỉnh thời_gian cho_phép tạo đơn , Bộ nhận Nhân_sự cần truy_cập Cài_đặt đơn_từ để tiến_hành điều_chỉnh .

    Bộ_phận Hành_chính nhân_sự có_thể can_thiệp tuỳ chỉnh phép thủ_công để cập_nhật lại quỹ phép cho nhân_sự ở phân hệ Chấm
    công'
- source_sentence: Ai là người có quyền xem , sửa và xoá loại bảng lương sau khi tôi tạo xong ?
  sentences:
  - 'Quản_lý nhà_cung_cấp và công_nợ

    Tạo mới công_nợ

    Để tạo mới công_nợ , người dùng thực_hiện các bước sau :

    1 . Truy_cập phân hệ Mua hàng

    2 . Ở góc trên cùng bên trái , chọn Tạo mới Chọn_Công nợ

    3 . Điền thông_tin đầy_đủ và Cập_nhật .

    Tạo mới công_nợ

    Danh_sách các trường dữ_liệu trong tạo mới công_nợ

    Trường dữ_liệu : Kiểu công_nợ , Mô_tả : Chọn kiểu công_nợ : Dư_nợ : Là các khoản đã trả cho nhà_cung_cấp ( Từ các đơn
    hàng mua hoặc phát_sinh nợ khi tạo công_nợ )

    Dư có : Là các khoản phải trả cho nhà_cung_cấp ( Từ các phiếu chi hoặc phát_sinh có_khi tạo công_nợ )

    Trường dữ_liệu : Các trường dữ_liệu khác , Mô_tả :

    Ngày , Số tiền , Lý_do , chọn nhà_cung_cấp

    Tìm_hiểu thêm tại Trung_tâm hỗ_trợ 1Office'
  - 'Tôi muốn bảng lương sau khi hoàn_thành sẽ được gửi đến Ban giám_đốc phê_duyệt , sau đó gửi đến Kế_toán để tiến thành
    chi tiền thì phải làm như_thế_nào ?

    Truy_cập Cài_đặt hệ_thống Bảng lương Bật cài_đặt Áp_dụng quy_trình duyệt vào bảng lương .

    Sau đó cấu_hình quy_trình duyệt bảng lương .'
  - 'Khắc_phục sự_cố đơn_từ tự_động chuyển không duyệt

    Có hai nguyên_nhân chính dẫn đến việc đơn_từ tự_động bị chuyển sang trạng_thái không duyệt :

    1 . Do cài_đặt tự_động chuyển trạng_thái Đơn_từ

    Trong cài_đặt đơn_từ có 1 cài_đặt Thời_gian để hệ_thống sẽ tự_động chuyển các đơn_từ đang ở trạng_thái chờ duyệt sang
    không duyệt sau khi chốt đơn_từ .

    Cài_đặt này cho_phép nếu sau khi Chốt đơn trên bảng chấm công , sau khoảng thời_gian cài_đặt , đơn_từ Chưa duyệt sẽ bị
    chuyển trạng_thái .

    Trường_hợp này bạn cần kiểm_tra lại trạng_thái Chốt đơn trên bảng chấm công và cài_đặt đơn_từ .

    Truy_cập Bảng chấm công để kiểm_tra trạng_thái Chốt đơn

    Liên_hệ bộ_phận nhân_sự để kiểm_tra Cài_đặt đơn_từ

    2 . Do cài_đặt của quy_trình duyệt

    Trong cấu_hình quy_trình duyệt có node Không duyệt , nếu cài_đặt luồng duyệt có chạy điều_kiện không duyệt , Đơn cũng
    sẽ tự_động chuyển trạng_thái Không duyệt .

    Trường_hợp này bạn có_thể truy_cập Cài_đặt Duyệt đối_tượng để kiểm_tra , điều_chỉnh .'
- source_sentence: Sự khác_biệt chính giữa tài_liệu công_ty và tài_liệu cá_nhân là gì ?
  sentences:
  - 'Tôi muốn liên_kết 1Office với cổng tuyển_dụng thì phải làm_sao ?

    Hiện_tại , 1Office đang cung_cấp các phương_thức hỗ_trợ Khách_hàng lấy CV từ các cổng : Email & Webform .

    Anh / chị có_thể xem chi_tiết tại Hướng_dẫn sử_dụng phân hệ Tuyển_dụng .'
  - 'PHÂN HỆ VĂN_BẢN

    Các loại văn_bản

    Mỗi loại văn_bản sẽ có mục_đích sử_dụng khác nhau , Quản_lý văn_bản theo mục_đích sẽ giúp_việc quản_lý , theo_dõi trở_nên
    dễ_dàng và chính_xác hơn .

    Loại văn_bản : Văn_bản đến , Nội_dung : Văn_bản đến giúp doanh_nghiệp quản_lý các văn_bản , công_văn được gửi đến doanh_nghiệp

    Loại văn_bản : Văn_bản đi , Nội_dung : Văn_bản đi giúp doanh_nghiệp quản_lý các văn_bản , công_văn được soạn_thảo và ban_hành
    từ doanh_nghiệp ra các cơ_quan bên ngoài

    Loại văn_bản : Văn_bản nội_bộ , Nội_dung : Văn_bản nội_bộ giúp doanh_nghiệp quản_lý , theo_dõi các văn_bản được ban_hành
    trong nội_bộ doanh_nghiệp

    Tìm_hiểu thêm tại trung_tâm hỗ_trợ 1Office'
  - 'Thủ_tục 630c - Giải_quyết hưởng trợ_cấp dưỡng_sức , phục_hồi sức_khoẻ sau ốm_đau , thai_sản , tai_nạn lao_động , bệnh_nghề_nghiệp

    Hướng_dẫn kê_khai

    Hướng_dẫn Kê_khai nhãn Dưỡng_sức cho hồ_sơ bảo_hiểm trên 1 - IVAN :

    Bước 1 : Tại hồ_sơ bảo_hiểm muốn kê_khai nhãn > Tác_vụ chuột phải > Ốm_đau , Thai_sản , Dưỡng_sức

    Bước 2 : Bổ_sung thông_tin tại Form kê_khai Dưỡng sức  > Cập_nhật

    Chọn loại chế_độ : Dưỡng_sức

    Chọn nhóm hưởng tương_ứng :

    + Dưỡng_sức sau ốm

    + Nghỉ thai_sản

    + Nghỉ sau tai_nạn lao_động

    Chọn thủ_tục : 630c - Giải_quyết hưởng trợ_cấp dưỡng_sức , phục_hồi sức_khoẻ sau ốm_đau , thai_sản , tai_nạn lao_động
    , bệnh_nghề_nghiệp'
- source_sentence: Sau khi thực_hiện tác_vụ ' Xuất_Biểu mẫu ' , thông_tin trên công_việc quy_trình sẽ được xuất ra loại file
    nào ?
  sentences:
  - 'Chiến_dịch tuyển_dụng

    Tạo mới tin tuyển_dụng

    1 . Mở phân hệ Tuyển_dụng

    2 . Tại danh_mục trái , Chọn_Chiến dịch Chọn_Chiến dịch tuyển_dụng muốn đăng tin

    3 . Chọn biểu_tượng Tạo tin

    Bảng mô_tả các trường dữ_liệu trong tạo mới tin tuyển_dụng :

    Trường dữ_liệu : Thông_tin từ chiến_dịch tuyển_dụng , Mô_tả : Thông_tin như tên chiến_dịch , vị_trí tuyển_dụng sẽ được
    lấy trực_tiếp từ chiến_dịch tuyển_dụng

    Trường dữ_liệu : Kênh tuyển_dụng , Mô_tả : Chọn kênh tuyển_dụng muốn đăng tin lên

    Trường dữ_liệu : Thông_tin tuyển_dụng , Mô_tả : Nhập thông_tin cho vị_trí ứng_tuyển

    Lưu_ý : Với mỗi kênh tuyển_dụng , người dùng chỉ được phép đăng 1 tin .

    Nếu trên kênh tuyển_dụng đó đã có tin từ trước , người dùng có_thể sửa tin hoặc tạo chiến_dịch khác .'
  - 'Quản_lý Email hệ_thống

    2 . Quản_lý email trên hệ_thống

    Khi bạn được phân_quyền sử_dụng nhiều tài_khoản gửi đi , hãy chọn 1 tài_khoản để gửi .

    Trong trường_hợp chỉ được phân_quyền 1 tài_khoản , hệ_thống sẽ giúp bạn hiển_thị luôn tài_khoản đó ..

    Kiểm_tra lại lịch_sử gửi email : .

    Chọn_Cài đặt hệ_thống > Email , SMS > Email > Lịch_sử gửi Email'
  - 'Quản_lý thu_chi

    Quản lý phiếu chi

    Tác_vụ : Duyệt / Hoàn duyệt , Mô_tả : Người được cài_đặt là người duyệt phiếu chi sẽ có quyền thực_hiện tác_vụ Duyệt /
    Hoàn duyệt .

    Sau khi Phiếu chi được duyệt , số tiền trong phiếu chi sẽ trừ vào tài_khoản đã được chọn trong phiếu chi đó , tương_ứng
    sẽ cập_nhật tự_động vào đã thu của Đơn hàng / Hợp_đồng / Công_nợ khách_hàng .

    Sau khi duyệt , người dùng có_thể Hoàn duyệt , sau khi hoàn duyệt , số tiền cũng sẽ được hoàn lại .

    Tác_vụ : Tạo mới , Mô_tả : Tạo mới các đối_tượng liên_quan đến Phiếu chi như : Dự_án , công_việc , quy_trình , đơn hàng
    bán , hợp_đồng bán , đơn hàng mua , hợp_đồng mua , vật_tư , phiếu nhập kho , phiếu xuất kho , phiếu chi , đối_tác , đơn
    công_tác ....

    Tác_vụ : Ký số , Mô_tả : Tạo hồ_sơ ký số liên_quan đến phiếu chi

    Tác_vụ : Biểu_mẫu , Mô_tả : Khi phiếu chi cần in ra và lưu_trữ , bạn có_thể chọn in ra / xuất biểu_mẫu tương_ứng ( Điều_kiện
    đã cài biểu_mẫu phiếu chi )

    Tác_vụ : Thêm tài_liệu , Mô_tả : Đính kèm tài_liệu / minh_chứng liên_quan

    Tác_vụ :

    Sửa , Mô_tả : Tác_vụ Sửa chỉ được thực_hiện khi Phiếu chi chưa được duyệt ở bất_kỳ bước nào

    Tác_vụ :

    Xoá , Mô_tả : Chỉ được phép Xoá khi phiếu chi ở trạng_thái Chờ duyệt , Không duyệt .

    Tác_vụ : Nhân_bản , Mô_tả : Tác_vụ này cho_phép bạn tạo nhanh 1 phiếu chi mới với các thông_tin tương_tự phiếu chi đã
    tạo để tiết_kiệm thời_gian nhập liệu .'
- source_sentence: Đơn xin nghỉ_phép có những trạng_thái nào và ý_nghĩa của từng trạng_thái đó là gì ?
  sentences:
  - 'Khắc_phục sự_cố không tạo mới được tài_liệu đính kèm

    Tài_liệu đính kèm là tài_liệu được liên_kết từ các phân hệ khác trên 1Office .

    Có ba nguyên_nhân chính dẫn đến sự_cố tài_khoản không tạo mới được tài_liệu đính kèm :

    1 . Tài_khoản người dùng không được phân_quyền tạo mới tài_liệu .

    Để có quyền này , bạn có_thể thực_hiện một trong hai cách sau :

    Liên_hệ với bộ_phận Quản_trị hệ_thống để yêu_cầu cấp quyền cho bạn .

    Truy_cập vào Cài_đặt tài_khoản , tại cấu_hình quyền truy_cập Tài_liệu , chọn Tạo mới .

    2 . Bạn không được phân_quyền vào phân hệ muốn đính kèm tài_liệu .

    Bạn chỉ có_thể tải tài_liệu đính kèm và gán với đối_tượng mà bạn được phân_quyền sử_dụng trên 1Office .

    Nếu khi tải tài_liệu đính kèm bạn không chọn được đối_tượng muốn tải tài_liệu bạn có_thể thực_hiện như sau :

    Liên_hệ với bộ_phận Quản_trị hệ_thống để yêu_cầu cấp quyền truy_cập phân hệ cần đính kèm tài_liệu .

    Truy_cập vào Cài_đặt tài_khoản , tại cấu_hình quyền , cấp quyền truy_cập vào phân hệ cần đính kèm tài_liệu .

    3 . Bạn không phải người liên_quan đến đối_tượng cần đính kèm .'
  - 'Cài_đặt đơn_từ

    Cài_đặt danh_mục

    Cài_đặt danh_mục là nơi người dùng cài_đặt các lý_do của đơn_từ hành_chính , phương_tiện công_tác , công_tác_phí

    1 . Mở phân hệ Đơn_từ tại HRM

    2 . Ở trên cùng bên phải , chọn Cài_đặt

    3 . Tại menu trái , chọn Danh_mục

    4 . Chọn_Tạo mới để tạo mới

    5 . Nhấp vào Cập_nhật để lưu thay_đổi

    cài_đặt danh_mục

    Trường dữ_liệu : Tối_đa , Mô_tả : Hạn_chế nhân_sự sử_dụng đơn quá nhiều lần trong tuần , tháng hoặc năm

    Trường dữ_liệu : Ký_hiệu , Mô_tả : Ký_hiệu hiển_thị trên bảng chấm công Chỉ hiển_thị ký_hiệu với Đơn xin nghỉ

    Trường dữ_liệu : Tính công , Mô_tả : Nếu lý_do bạn chọn Có tính công thì khoảng thời_gian xin nghỉ / vắng_mặt của bạn
    sẽ được tính vào công làm_việc

    Trường dữ_liệu : Trạng_thái , Mô_tả : Hoạt_động : người dùng có_thể chọn lý_do này khi tạo đơn Không hoạt_động : người
    dùng sẽ không nhìn thấy lý_do này trong danh_sách

    Trường dữ_liệu : Yêu_cầu chốt , Mô_tả : Nếu lý_do vắng_mặt của bạn Có yêu_cầu chốt vân tay thì bạn cần phải chốt vân tay_trong
    khoảng thời_gian bắt_đầu vắng mắt và kết_thúc vắng_mặt

    Lưu_ý : Không_thể xoá những lý_do của đơn xin nghỉ được hệ_thống tạo ra , chỉ có_thể chuyển lý_do sang trạng_thái không
    hoạt_động .'
  - 'Thư_viện tài_nguyên

    Thư_viện tài_nguyên là một tính_năng mới của 1Office .

    Đây là kho tài_nguyên chứa các dữ_liệu mẫu mà 1Office cung_cấp cho Khách_hàng .

    Nó hoạt_động giống như Google Play hay Chrome_Extension .

    Tại đây sẽ có các Template mẫu , người dùng có_thể vào xem thử ảnh demo hoặc mô_tả , nếu phù_hợp với đặc_thù công_việc
    , chọn Cài_đặt để tải về .

    Khi đó , tài_nguyên vừa tải về sẽ được cập_nhật vào đối_tượng tương_ứng trên phần_mềm .

    Sử_dụng thư_viện tài_nguyên như_thế_nào ?

    Để có được những tài_nguyên mà 1Office , người dùng thực_hiện theo các bước :

    Bước 1 .

    Tải tài_liệu về phần_mềm

    Bước 2 .

    Cài_đặt thông_số cho dữ_liệu tải về

    Bước 3 .

    Sử_dụng phần_mềm với các tài_liệu đã được cài_đặt trên phần_mềm'
