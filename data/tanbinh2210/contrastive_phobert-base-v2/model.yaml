    sentences:
    - 'Người tạo liên_hệ , khách_hàng có_thể xoá được không ?

      Bạn hoàn_toàn có_thể thiết_lập cho_phép hoặc không cho_phép người tạo xoá liên_hệ / khách_hàng , thao_tác thực_hiện
