      reset lại mật_khẩu và gửi thông_tin đăng_nhập mới về email cho người dùng

      Tác_vụ : Thay_đổi mật_khẩu , Mô_tả : Trường_hợp HSNS chưa có thông_tin email , người quản_trị có_thể chọn Thay_đổi mật_khẩu
      để nhập mật_khẩu mới cho người dùng'
  - source_sentence: Quy_trình lọc công_việc theo Người thực_hiện trong dự_án bao_gồm những bước nào ?
    sentences:
    - 'Hồ_sơ bảo_hiểm

      Kê_khai hồ_sơ bảo_hiểm

      Kê_khai hồ_sơ bảo_hiểm là một thủ_tục bắt_buộc đối_với các doanh_nghiệp và người lao_động để đảm_bảo quyền_lợi và nghĩa_vụ
      về bảo_hiểm_xã_hội , bảo_hiểm_y_tế , bảo_hiểm thất_nghiệp .

      Danh_sách HSBH được tự_động cập_nhật từ danh_sách Hồ_sơ nhân_sự ( HSNS ) đang làm_việc trong phân hệ Nhân_sự dựa trên
      cài_đặt tăng giảm dự_kiến trong IVAN .

      Cài_đặt 1 - IVAN

      Dưới đây là các bước hướng_dẫn kê_khai và khai_báo HSBH :

      Bước 1 : Truy_cập đối_tượng Hồ_sơ bảo_hiểm > Chọn tab Chờ kê_khai > Chọn hồ_sơ muốn khai_báo và nhấn chuột phải > Chọn
      thủ_tục kê_khai

      Bước 1 Kê_khai hồ_sơ bảo_hiểm

      Bước 2 :  Điền thông_tin bắt_buộc tại tab Khai_báo >  Nhấn Cập_nhật

      Bước 2 Kê_khai hồ_sơ bảo_hiểm

      Chú_ý : Đối_với những hồ_sơ chưa đầy_đủ thông_tin , người dùng cần bổ_sung tại các tab Hồ_sơ bảo_hiểm và Thông_tin gia_đình
      trước khi thực_hiện khai_báo .

      Bước 3 : Click vào nhãn của thủ_tục muốn kê_khai > Thực_hiện kê_khai hồ_sơ bảo_hiểm > Nhấn nút Ký & Gửi kê_khai

      Bước 3 Kê_khai hồ_sơ bảo_hiểm'
    - 'Phân_quyền người dùng

      Bước 2 : Kích_hoạt tài_khoản User

      Sau khi Hồ_sơ nhân_sự được tạo mới , mỗi nhân_sự hệ_thống sẽ sinh ra 1 tài_khoản user có :

      Tên đăng_nhập : tên + họ têm đệm viết tắt ( ví_dụ : Lê_Băng_Hương : huonglb )

      Password : người dùng có_thể tự đặt hoặc hệ_thống tự_tạo

      Lưu_ý : Tài_khoản mới chưa_thể đăng_nhập vào hệ_thống khi chưa được Admin kích_hoạt , cấp quyền .

      Để kích_hoạt vào tài_khoản , thực_hiện theo các bước sau :

      Click lần_lượt Cài_đặt hệ_thống > Tài_khoản người dùng > Tab chưa kích_hoạt .

      Tại đây , người dùng có_thể kích_hoạt hàng_loạt nếu tất_cả user cùng nhóm quyền hoặc kích_hoạt từng tải khoản một bằng
      cách click chuột phải vào tên tài_khoản chọn Kích_hoạt .

      Điền các thông_tin được yêu_cầu như hình bên dưới

      STT :

      1 , Tên trường : Tên đăng_nhập , Mô_tả : Điền tên tài_khoản / Người dùng có_thể chọn tự_động tạo tên đăng_nhập

      STT :

      2 , Tên trường : Nhóm người dùng , Mô_tả : Hệ_thống mặc_định hiển_thị nhóm người dùng đã được cài_đặt là mặc_định ,
      người dùng có_thể chỉnh_sửa nhóm này

      STT :

      3 , Tên trường : Mật_khẩu , Mô_tả : Điền mật_khẩu / Người dùng có_thể chọn để mật_khẩu ngẫu_nhiên'
    - 'Tôi có_thể lọc được các công_việc tôi là Người thực_hiện ở trong dự_án không ?

      Tại danh_sách công_việc trong dự_án bạn có_thể sử_dụng bộ lọc nâng cao ở thanh tìm_kiếm để lọc danh_sách các công_việc
      theo Người thực_hiện bằng cách :

      Tại màn danh_sách công_việc trong dự_án Chọn tác_vụ Lọc trên Bộ lọc nâng cao

      Lọc theo trường Người thực_hiện

      lọc công_việc trong dự_án theo người thực_hiện'
