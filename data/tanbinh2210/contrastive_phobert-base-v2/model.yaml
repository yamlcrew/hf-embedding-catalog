      tạo mới chiến_dịch marketing'
    - 'Lịch phỏng_vấn

      Quản_lý lịch phỏng_vấn

      Các màn_hình xem lịch phỏng_vấn

      Với tính_năng quản_lý Lịch phỏng_vấn , người dùng có_thể xem lịch theo 2 kiểu : Xem theo danh_sách và xem theo dạng
