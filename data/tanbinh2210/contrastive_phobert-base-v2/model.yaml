      Kích_hoạt tài_khoản cho nhân_sự

      Trường dữ_liệu : Nhóm người dùng , Mô_tả : Chọn nhóm quyền tương_ứng với tài_khoản cần kích_hoạt Nhóm người dùng sẽ
      nhập tự_động nhóm được cài_đặt là Nhóm mặc_định .

