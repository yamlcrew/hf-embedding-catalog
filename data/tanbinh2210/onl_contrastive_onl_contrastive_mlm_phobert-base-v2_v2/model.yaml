    Tạo mới sổ văn_bản

    Sổ văn_bản là gì ?

    Sổ văn_bản là nơi cập_nhật danh_sách văn_bản của doanh_nghiệp , tại đây văn_thư có_thể tạo ra các sổ xử_lý theo từng loại
    văn_bản và cập_nhật danh_sách văn_bản để dễ_dàng quản_lý văn_bản ở đơn_vị .

    Ví_dụ như : Sổ công_văn , Sổ quyết_định , Sổ tổng_hợp , ...

    Khi xử_lý_văn_bản , văn_thư có_thể cập_nhật số vào_sổ văn_bản , điều này sẽ hỗ_trợ việc tra_cứu , tìm_kiếm trở_nên dễ_dàng
    hơn .

