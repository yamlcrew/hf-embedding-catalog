      đối_với tập_thể có cờ truyền_thống : người trao gắn huân_chương ( hoặc huy_hiệu kèm theo danh_hiệu ) lên góc cao cờ
      truyền_thống . vị_trí gắn huân_chương ( hoặc huy_hiệu kèm theo danh_hiệu ) trên cờ truyền_thống được thực_hiện theo
