      khen_thưởng thì trao_tặng cho tập_thể trước , cá_nhân sau ; trao_tặng trước , truy_tặng sau . 5 . trong khi công_bố
      , trao_tặng , đón_nhận hình_thức khen_thưởng , danh_hiệu thi_đua , người không có trách_nhiệm không tặng hoa , không
