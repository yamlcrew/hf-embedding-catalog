      trong việc chẩn_đoán hư_hỏng của các chi_tiết cũng như bộ_phận máy . xác_định được nguyên_nhân gây hư_hỏng từ đó xây_dựng
      quy_trình làm_việc hợp_lý và sửa_chữa , bảo_dưỡng máy công_cụ đảm_bảo yêu_cầu kỹ_thuật và sự
  - source_sentence: trái_phiếu quốc_tế chỉ được phát_hành khi có những điều_kiện nào ?
    sentences:
    - 'điều_kiện phát_hành trái_phiếu quốc_tế chỉ được phát_hành khi có đủ các điều_kiện sau đây : 1 . có đề_án phát_hành
      trái_phiếu được các cấp có thẩm_quyền thẩm_định và phê_duyệt . đối_với trường_hợp phát_hành trái_phiếu chính_phủ , đề_án
      phát_hành phải được chính_phủ phê_duyệt , bao_gồm cả phát_hành trái_phiếu để cơ_cấu lại danh_mục nợ của chính_phủ .
      đối_với các tập_đoàn , tổng_công_ty nhà_nước , đề_án phát_hành trái_phiếu phải được hội_đồng_quản_trị thông_qua và phải
      được thủ_tướng chính_phủ chấp_thuận về chủ_trương . đối_với các đề_án phát_hành trái_phiếu của các công_ty cổ_phần ,
      doanh_nghiệp tư_nhân , đề_án phát_hành phải được đại_hội_đồng cổ_đông hoặc hội_đồng thành_viên , đại_diện chủ_sở_hữu
      vốn thông_qua . 2 . trị_giá phát_hành trái_phiếu quốc_tế phải nằm trong tổng hạn_mức vay thương_mại nước_ngoài của quốc_gia
      được thủ_tướng chính_phủ phê_duyệt hàng năm . 3 . các chương_trình , dự_án được xác_định là trọng_điểm quốc_gia hoặc
      các dự_án đầu_tư được các cơ_quan có thẩm_quyền thẩm_định là có hiệu_quả , đã hoàn_chỉnh các thủ_tục đầu_tư theo quy_định
      của pháp_luật hiện_hành .'
    - 'điều 7 . tổ_chức phát_hành 1 . việc tổ_chức phát_hành trái_phiếu quốc_tế chỉ được thực_hiện khi đề_án phát_hành trái_phiếu
      quốc_tế đã được cấp thẩm_quyền phê_duyệt . 2 . trình_tự tổ_chức phát_hành có_thể bao_gồm các bước sau đây : a ) lựa_chọn
      tổ_hợp các ngân_hàng bảo_lãnh phát_hành : người phát_hành lựa_chọn một_số ngân_hàng_đầu_tư quốc_tế hàng_đầu trên thế_giới
      , có kinh_nghiệm trong lĩnh_vực phát_hành trái_phiếu làm tổ_hợp ngân_hàng bảo_lãnh phát_hành cho đợt phát_hành trên
      cơ_sở chào_thầu cạnh_tranh theo các tiêu_chí cụ_thể và danh_sách các ngân_hàng do các tạp_chí uy_tín quốc_tế ( như tạp_chí
      tài_chính international financial_review ) bình_chọn ; b ) lựa_chọn các tư_vấn pháp_lý : người phát_hành phối_hợp với
      tổ_hợp các ngân_hàng bảo_lãnh lựa_chọn các công_ty luật có uy_tín và kinh_nghiệm trong và ngoài nước làm tư_vấn pháp_lý
      trong nước , tư_vấn pháp_lý quốc_tế cho người phát_hành và người bảo_lãnh phát_hành ; riêng tư_vấn pháp_lý trong nước
      cho người phát_hành phụ_thuộc vào hình_thức trái_phiếu , cụ_thể : - đối_với trái_phiếu chính_phủ : là bộ_tư_pháp do
      chính_phủ ủy_quyền tư_vấn cho người phát_hành về các quy_định pháp_lý liên_quan đến giao_dịch phát_hành và là người
      đưa ra ý_kiến pháp_lý cho giao_dịch ; - đối_với trái_phiếu doanh_nghiệp : là công_ty luật có đầy_đủ năng_lực pháp_lý
      được lựa_chọn làm tư_vấn về các quy_định liên_quan đến giao_dịch phát_hành và là người đưa ra ý_kiến pháp_lý cho giao_dịch
      . c ) hoàn_thiện hồ_sơ phát_hành : người phát_hành chủ_trì , phối_hợp với tư_vấn pháp_lý trong nước đàm_phán , ký_kết
      các hợp_đồng với tổ_hợp các ngân_hàng bảo_lãnh , các tư_vấn pháp_lý quốc_tế và chuẩn_bị các tài_liệu trong hồ_sơ phát_hành
      trong đó bao_gồm các tài_liệu pháp_lý liên_quan nêu tại điều 4 nghị_định này , phù_hợp với thông_lệ quốc_tế và luật_pháp
      của việt_nam ; d ) đánh_giá hệ_số tín_nhiệm : người phát_hành chủ_trì , phối_hợp với các cơ_quan liên_quan của việt_nam
      tổ_chức làm_việc với các cơ_quan đánh_giá hệ_số tín_nhiệm để xác_nhận hệ_số tín_nhiệm quốc_gia trước đợt phát_hành (
      trong trường_hợp phát_hành trái_phiếu chính_phủ ) . đối_với doanh_nghiệp , việc xác_định hệ_số tín_nhiệm tùy thuộc vào
      yêu_cầu của từng đợt phát_hành . đ ) tổ_chức quảng_bá và thực_hiện phát_hành : việc tổ_chức quảng_bá chào_bán trái_phiếu
      do người phát_hành thực_hiện tùy thuộc yêu_cầu của từng hình_thức phát_hành , cụ_thể : - người phát_hành phối_hợp với
      tổ_hợp các ngân_hàng bảo_lãnh phát_hành tổ_chức chiến_dịch quảng_bá trái_phiếu tại các trung_tâm tài_chính lớn trên
      thế_giới để tiếp_xúc với cộng_đồng các nhà_đầu_tư quốc_tế trước khi thực_hiện việc định_giá để phát_hành trái_phiếu
      ; - người phát_hành quyết_định các điều_kiện , lãi_suất danh_nghĩa ( lãi_suất coupon ) , các điều_khoản phát_hành trái_phiếu
      trong quá_trình định_giá trái_phiếu trên cơ_sở tư_vấn của tổ_hợp các ngân_hàng bảo_lãnh phát_hành , phù_hợp với điều_kiện
      thị_trường và các nguyên_tắc nêu tại đề_án phát_hành đã được phê_duyệt ; - người phát_hành tổ_chức việc tiếp_nhận nguồn
      vốn trái_phiếu đã phát_hành theo đúng các thỏa_thuận đã ký . e ) hoàn_tất giao_dịch phát_hành : sau khi nhận tiền bán
      trái_phiếu , người phát_hành hoàn_tất và ký_kết các văn_bản pháp_lý kết_thúc giao_dịch phù_hợp với thông_lệ quốc_tế
      , đồng_thời báo_cáo kết_quả phát_hành theo các quy_định hiện_hành .'
    - điều 33 . tài_sản chung của vợ_chồng 1 . tài_sản chung của vợ_chồng gồm tài_sản do vợ , chồng tạo ra , thu_nhập do lao_động
      , hoạt_động sản_xuất , kinh_doanh , hoa_lợi , lợi_tức phát_sinh từ tài_sản riêng và thu_nhập hợp_pháp khác trong thời_kỳ
      hôn_nhân , trừ trường_hợp được quy_định tại khoản 1 điều 40 của luật này ; tài_sản mà vợ_chồng được thừa_kế chung hoặc
      được tặng cho chung và tài_sản khác mà vợ_chồng thỏa_thuận là tài_sản chung . quyền sử_dụng đất mà vợ , chồng có được
      sau khi kết_hôn là tài_sản chung của vợ_chồng , trừ trường_hợp vợ hoặc chồng được thừa_kế riêng , được tặng cho riêng
      hoặc có được thông_qua giao_dịch bằng tài_sản riêng . 2 . tài_sản chung của vợ_chồng thuộc sở_hữu chung_hợp nhất , được
      dùng để bảo_đảm nhu_cầu của gia_đình , thực_hiện nghĩa_vụ chung của vợ_chồng . 3 . trong trường_hợp không có căn_cứ
      để chứng_minh tài_sản mà vợ , chồng đang có tranh_chấp là tài_sản riêng của mỗi bên thì tài_sản đó được coi là tài_sản
      chung .
  - source_sentence: trung_tâm lưu_ký chứng_khoán việt_nam thực_hiện những chức_năng gì ?
    sentences:
    - '1 . đăng_ký , lưu_ký : a ) trái_phiếu chính_phủ được đăng_ký , lưu_ký tập_trung tại trung_tâm lưu_ký chứng_khoán việt_nam
      theo đề_nghị của kho_bạc nhà_nước . b ) căn_cứ vào thông_báo kết_quả phát_hành của kho_bạc nhà_nước , trung_tâm lưu_ký
      chứng_khoán việt_nam thực_hiện đăng_ký trái_phiếu chính_phủ . c ) căn_cứ vào văn_bản xác_nhận hoàn_tất thanh_toán tiền
      mua trái_phiếu của kho_bạc nhà_nước , trung_tâm lưu_ký chứng_khoán việt_nam thực_hiện lưu_ký trái_phiếu theo quy_định
      của pháp_luật chứng_khoán . 2 . niêm_yết trái_phiếu : a ) trái_phiếu chính_phủ được đăng_ký , lưu_ký tập_trung tại trung_tâm
      lưu_ký chứng_khoán việt_nam và niêm_yết , giao_dịch tại sở giao_dịch chứng_khoán ngoại_trừ trái_phiếu ngoại_tệ . b )
      căn_cứ vào văn_bản thông_báo về việc đăng_ký trái_phiếu của trung_tâm lưu_ký chứng_khoán việt_nam và văn_bản đề_nghị
      của kho_bạc nhà_nước , sở giao_dịch chứng_khoán thực_hiện niêm_yết trái_phiếu chính_phủ theo quy_định của pháp_luật
      chứng_khoán .'
    - 'mục_tiêu và chức_năng hoạt_động ... 2 . chức_năng của trung_tâm lưu_ký chứng_khoán : a ) cung_cấp dịch_vụ đăng_ký ,
      lưu_ký , bù_trừ và thanh_toán chứng_khoán cho các chứng_khoán niêm_yết , đăng_ký giao_dịch , chứng_khoán phái_sinh trên
      sở giao_dịch chứng_khoán và chứng_khoán của công_ty đại_chúng khác ; các dịch_vụ liên_quan đến hỗ_trợ giao_dịch chứng_khoán
      phù_hợp với quy_định của pháp_luật . b ) thực_hiện cấp_mã chứng_khoán bao_gồm mã_chứng_khoán đăng_ký tại trung_tâm lưu_ký
      chứng_khoán và cấp mã_định danh_chứng_khoán cho các loại chứng_khoán phát_hành tại việt_nam . c ) tổ_chức thực_hiện
      quyền của người sở_hữu_chứng_khoán cho các tổ_chức phát_hành là các công_ty đại_chúng , các tổ_chức có chứng_khoán niêm_yết
      / đăng_ký giao_dịch trên sở giao_dịch chứng_khoán . d ) cung_cấp dịch_vụ đại_lý thanh_toán cổ_tức và lãi trái_phiếu
      cho các tổ_chức phát_hành đ ) cung_cấp dịch_vụ đại_lý chuyển_nhượng và thực_hiện chuyển quyền_sở_hữu đối_với chứng_khoán
      đăng_ký tại trung_tâm lưu_ký chứng_khoán theo quy_định pháp_luật . e ) cung_cấp các dịch_vụ đăng_ký , lưu_ký và đại_lý
      chuyển_nhượng cho các loại chứng_khoán khác theo thỏa_thuận với các tổ_chức phát_hành . g ) xây_dựng và vận_hành các
      cơ_chế quản_trị rủi_ro gồm thực_hiện chức_năng đối_tác bù_trừ trung_tâm ( ccp ) , quản_lý quỹ hỗ_trợ thanh_toán , quỹ
      bù_trừ , hệ_thống vay và cho vay chứng_khoán theo quy_định của pháp_luật chứng_khoán . h ) cung_cấp các dịch_vụ quản_lý
      tài_sản , các dịch_vụ cho quỹ đầu_tư và các dịch_vụ khác theo yêu_cầu của khách_hàng trong phạm_vi chức_năng , nhiệm_vụ
      của trung_tâm lưu_ký chứng_khoán và phù_hợp với quy_định pháp_luật hiện_hành . i ) giám_sát hoạt_động của các thành_viên
      của trung_tâm lưu_ký chứng_khoán nhằm đảm_bảo sự tuân_thủ các quy_chế hoạt_động nghiệp_vụ của trung_tâm lưu_ký chứng_khoán
      nhằm bảo_vệ tài_sản của người sở_hữu_chứng_khoán . k ) quản_lý tỷ_lệ sở_hữu của người đầu_tư nước_ngoài theo quy_định
      của pháp_luật chứng_khoán . l ) hỗ_trợ phát_triển thị_trường_chứng_khoán thông_qua việc cung_cấp các dịch_vụ cơ_sở_hạ_tầng
      , kỹ_thuật , thông_tin , đào_tạo , tuyên_truyền và phổ_biến kiến_thức .'
    - điều 5 . thời_hiệu xử_phạt vi_phạm hành_chính 1 . thời_hiệu xử_phạt vi_phạm hành_chính trong lĩnh_vực lao_động , bảo_hiểm_xã_hội
      , người lao_động việt_nam đi làm_việc ở nước_ngoài theo hợp_đồng thực_hiện theo quy_định tại khoản 1 điều 6 của luật
      xử_lý vi_phạm hành_chính . 2 . việc xác_định hành_vi vi_phạm hành_chính đã kết_thúc , hành_vi vi_phạm hành_chính đang
      thực_hiện để tính thời_hiệu xử_phạt vi_phạm hành_chính thực_hiện theo quy_định tại khoản 1 điều 8 nghị_định số 118 /
      2021 / nđ-cp ngày 23 tháng 12 năm 2021 của chính_phủ quy_định chi_tiết một_số điều và biện_pháp thi_hành của luật xử_lý
      vi_phạm hành_chính . điều 6 . mức phạt tiền , thẩm_quyền xử_phạt và nguyên_tắc áp_dụng đối_với hành_vi vi_phạm hành_chính
      nhiều lần ... 2 . thẩm_quyền xử_phạt vi_phạm hành_chính quy_định tại chương v nghị_định này là thẩm_quyền áp_dụng đối_với
      cá_nhân ; trong trường_hợp phạt tiền , thẩm_quyền xử_phạt tổ_chức gấp 02 lần thẩm_quyền xử_phạt cá_nhân .
