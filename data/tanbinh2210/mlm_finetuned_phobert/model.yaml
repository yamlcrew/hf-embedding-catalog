      , danh_hiệu thi_đua , đơn_vị phải có tờ_trình báo_cáo bộ_trưởng bộ quốc_phòng xem_xét , quyết_định .
    - '2 . trao hình_thức khen_thưởng , danh_hiệu thi_đua : a ) người trao là đại_diện các lãnh_đạo tham_dự buổi lễ ; người
