      ( hoặc huy_hiệu kèm theo danh_hiệu ) . d ) trao_tặng cho cá_nhân : người trao gắn huân_chương ( hoặc huy_chương , huy_hiệu
      kèm theo danh_hiệu ) lên phía trái ngực áo người đón_nhận , sau đó trao bằng . vị_trí gắn huân_chương ( hoặc huy_chương
      , huy_hiệu kèm theo danh_hiệu ) trên ngực áo được thực_hiện theo thứ_hạng từ cao xuống thấp ; đ ) truy_tặng : người
      trao trao bằng đã gắn sẵn huân_chương ( hoặc huy_chương , huy_hiệu kèm theo danh_hiệu ) cho đại_diện gia_đình cá_nhân
