- source_sentence: trái_phiếu quốc_tế chỉ được phát_hành khi có những điều_kiện nào ?
  sentences:
  - 'điều_kiện phát_hành trái_phiếu quốc_tế chỉ được phát_hành khi có đủ các điều_kiện sau đây : 1 . có đề_án phát_hành trái_phiếu
    được các cấp có thẩm_quyền thẩm_định và phê_duyệt . đối_với trường_hợp phát_hành trái_phiếu chính_phủ , đề_án phát_hành
    phải được chính_phủ phê_duyệt , bao_gồm cả phát_hành trái_phiếu để cơ_cấu lại danh_mục nợ của chính_phủ . đối_với các
    tập_đoàn , tổng_công_ty nhà_nước , đề_án phát_hành trái_phiếu phải được hội_đồng_quản_trị thông_qua và phải được thủ_tướng
    chính_phủ chấp_thuận về chủ_trương . đối_với các đề_án phát_hành trái_phiếu của các công_ty cổ_phần , doanh_nghiệp tư_nhân
    , đề_án phát_hành phải được đại_hội_đồng cổ_đông hoặc hội_đồng thành_viên , đại_diện chủ_sở_hữu vốn thông_qua . 2 . trị_giá
    phát_hành trái_phiếu quốc_tế phải nằm trong tổng hạn_mức vay thương_mại nước_ngoài của quốc_gia được thủ_tướng chính_phủ
    phê_duyệt hàng năm . 3 . các chương_trình , dự_án được xác_định là trọng_điểm quốc_gia hoặc các dự_án đầu_tư được các
    cơ_quan có thẩm_quyền thẩm_định là có hiệu_quả , đã hoàn_chỉnh các thủ_tục đầu_tư theo quy_định của pháp_luật hiện_hành
    .'
  - 'điều 7 . tổ_chức phát_hành 1 . việc tổ_chức phát_hành trái_phiếu quốc_tế chỉ được thực_hiện khi đề_án phát_hành trái_phiếu
    quốc_tế đã được cấp thẩm_quyền phê_duyệt . 2 . trình_tự tổ_chức phát_hành có_thể bao_gồm các bước sau đây : a ) lựa_chọn
    tổ_hợp các ngân_hàng bảo_lãnh phát_hành : người phát_hành lựa_chọn một_số ngân_hàng_đầu_tư quốc_tế hàng_đầu trên thế_giới
    , có kinh_nghiệm trong lĩnh_vực phát_hành trái_phiếu làm tổ_hợp ngân_hàng bảo_lãnh phát_hành cho đợt phát_hành trên cơ_sở
    chào_thầu cạnh_tranh theo các tiêu_chí cụ_thể và danh_sách các ngân_hàng do các tạp_chí uy_tín quốc_tế ( như tạp_chí tài_chính
    international financial_review ) bình_chọn ; b ) lựa_chọn các tư_vấn pháp_lý : người phát_hành phối_hợp với tổ_hợp các
    ngân_hàng bảo_lãnh lựa_chọn các công_ty luật có uy_tín và kinh_nghiệm trong và ngoài nước làm tư_vấn pháp_lý trong nước
    , tư_vấn pháp_lý quốc_tế cho người phát_hành và người bảo_lãnh phát_hành ; riêng tư_vấn pháp_lý trong nước cho người phát_hành
    phụ_thuộc vào hình_thức trái_phiếu , cụ_thể : - đối_với trái_phiếu chính_phủ : là bộ_tư_pháp do chính_phủ ủy_quyền tư_vấn
    cho người phát_hành về các quy_định pháp_lý liên_quan đến giao_dịch phát_hành và là người đưa ra ý_kiến pháp_lý cho giao_dịch
    ; - đối_với trái_phiếu doanh_nghiệp : là công_ty luật có đầy_đủ năng_lực pháp_lý được lựa_chọn làm tư_vấn về các quy_định
    liên_quan đến giao_dịch phát_hành và là người đưa ra ý_kiến pháp_lý cho giao_dịch . c ) hoàn_thiện hồ_sơ phát_hành : người
    phát_hành chủ_trì , phối_hợp với tư_vấn pháp_lý trong nước đàm_phán , ký_kết các hợp_đồng với tổ_hợp các ngân_hàng bảo_lãnh
    , các tư_vấn pháp_lý quốc_tế và chuẩn_bị các tài_liệu trong hồ_sơ phát_hành trong đó bao_gồm các tài_liệu pháp_lý liên_quan
    nêu tại điều 4 nghị_định này , phù_hợp với thông_lệ quốc_tế và luật_pháp của việt_nam ; d ) đánh_giá hệ_số tín_nhiệm :
    người phát_hành chủ_trì , phối_hợp với các cơ_quan liên_quan của việt_nam tổ_chức làm_việc với các cơ_quan đánh_giá hệ_số
    tín_nhiệm để xác_nhận hệ_số tín_nhiệm quốc_gia trước đợt phát_hành ( trong trường_hợp phát_hành trái_phiếu chính_phủ )
    . đối_với doanh_nghiệp , việc xác_định hệ_số tín_nhiệm tùy thuộc vào yêu_cầu của từng đợt phát_hành . đ ) tổ_chức quảng_bá
    và thực_hiện phát_hành : việc tổ_chức quảng_bá chào_bán trái_phiếu do người phát_hành thực_hiện tùy thuộc yêu_cầu của
    từng hình_thức phát_hành , cụ_thể : - người phát_hành phối_hợp với tổ_hợp các ngân_hàng bảo_lãnh phát_hành tổ_chức chiến_dịch
    quảng_bá trái_phiếu tại các trung_tâm tài_chính lớn trên thế_giới để tiếp_xúc với cộng_đồng các nhà_đầu_tư quốc_tế trước
    khi thực_hiện việc định_giá để phát_hành trái_phiếu ; - người phát_hành quyết_định các điều_kiện , lãi_suất danh_nghĩa
    ( lãi_suất coupon ) , các điều_khoản phát_hành trái_phiếu trong quá_trình định_giá trái_phiếu trên cơ_sở tư_vấn của tổ_hợp
    các ngân_hàng bảo_lãnh phát_hành , phù_hợp với điều_kiện thị_trường và các nguyên_tắc nêu tại đề_án phát_hành đã được
    phê_duyệt ; - người phát_hành tổ_chức việc tiếp_nhận nguồn vốn trái_phiếu đã phát_hành theo đúng các thỏa_thuận đã ký
    . e ) hoàn_tất giao_dịch phát_hành : sau khi nhận tiền bán trái_phiếu , người phát_hành hoàn_tất và ký_kết các văn_bản
    pháp_lý kết_thúc giao_dịch phù_hợp với thông_lệ quốc_tế , đồng_thời báo_cáo kết_quả phát_hành theo các quy_định hiện_hành
    .'
  - điều 33 . tài_sản chung của vợ_chồng 1 . tài_sản chung của vợ_chồng gồm tài_sản do vợ , chồng tạo ra , thu_nhập do lao_động
    , hoạt_động sản_xuất , kinh_doanh , hoa_lợi , lợi_tức phát_sinh từ tài_sản riêng và thu_nhập hợp_pháp khác trong thời_kỳ
    hôn_nhân , trừ trường_hợp được quy_định tại khoản 1 điều 40 của luật này ; tài_sản mà vợ_chồng được thừa_kế chung hoặc
    được tặng cho chung và tài_sản khác mà vợ_chồng thỏa_thuận là tài_sản chung . quyền sử_dụng đất mà vợ , chồng có được
    sau khi kết_hôn là tài_sản chung của vợ_chồng , trừ trường_hợp vợ hoặc chồng được thừa_kế riêng , được tặng cho riêng
    hoặc có được thông_qua giao_dịch bằng tài_sản riêng . 2 . tài_sản chung của vợ_chồng thuộc sở_hữu chung_hợp nhất , được
    dùng để bảo_đảm nhu_cầu của gia_đình , thực_hiện nghĩa_vụ chung của vợ_chồng . 3 . trong trường_hợp không có căn_cứ để
    chứng_minh tài_sản mà vợ , chồng đang có tranh_chấp là tài_sản riêng của mỗi bên thì tài_sản đó được coi là tài_sản chung
    .
