  widget:
  - source_sentence: 건강식 코스요리를 제공하는 디너쇼가 열리는 호텔 이름은?
    sentences:
    - LG유플러스는 이용자의 생활습관에 따른 맞춤형 정보를 스마트폰이 알아서 미리 제공하는 능동형 스마트 비서 서비스 ‘U스푼(U spoon)’을 25일 내놓았다. U스푼은 고객이 스마트폰으로 날씨 교통 일정 모닝콜
      등을 이용하는 패턴을 파악해 개인의 위치와 시간, 상황 등에 따라 필요한 정보를 맞춤형으로 전달한다. 예컨대 새벽에 폭설이 내리면 오전 7시로 설정돼 있는 모닝콜을 앞당겨 울려 출근시간에 늦지 않도록 도와준다.
      고객과의 약속 장소를 설정하면 거리와 교통량을 고려한 소요시간을 계산해 출발 시각을 알려준다. 어제보다 더운지, 추운지를 알 수 있는 ‘어제와 다른 오늘의 날씨’, 출근 버스를 설정하면 도착 및 막차 정보를
      알려주는 ‘도착·막차 알림’ 등의 기능도 갖췄다. LG유플러스는 U스푼에 개인의 기호와 성향에 맞는 맛집 정보 추천, 가족 간 알림 공유 등 기능을 추가해 라이프 스타일에 필요한 다양한 정보를 제공할 계획이다.
      이 서비스는 LG유플러스 전용 스마트폰인 LG Gx에 탑재됐으며 LG G2, 옵티머스G 프로, 삼성 갤럭시 S4 등에서도 이용할 수 있다. 회사 측은 지원 단말기를 점차 확대할 예정이다. LG유플러스의 앱 마켓
      ‘U+스토어’에서 내려받아 이용할 수 있다. 이상민 LG유플러스 서비스플랫폼사업부 전무는 “U스푼은 일상 속 수많은 정보를 빅데이터와 연계해 가치 있는 정보로 제공하는 새로운 개념의 지능형 서비스”라며 “고객의
      일상을 새롭게 바꾸는 인텔리전스 서비스 영역을 확대하겠다”고 말했다.
    - ‘엘레지의 여왕’ 이미자를 비롯해 조영남, 인순이, 태진아, 포크트리오(김세환 윤형주 남궁옥분) 등이 송년 디너쇼를 연다. 유명 가수들의 애창곡을 들으면서 고단한 한 해를 마무리하기에 좋은 자리다. 올해에는
      불황의 여파로 영향력 있는 가수들만 디너쇼를 하는 게 특징. 대부분의 관객이 50~60대지만 구매 연령은 20~30대가 70% 이상이다. 부모님께 드리는 효도 선물로 각광받고 있다는 얘기다. 이미자 디너쇼는
      오는 21~22일 오후 6시 서울 한남동 그랜드하얏트호텔에서 열린다. 3대 히트곡인 ‘동백 아가씨’ ‘기러기 아빠’ ‘섬마을 선생님’을 비롯해 ‘여자의 일생’ ‘흑산도 아가씨’ ‘열아홉 순정’ 등을 들려준다.
      호텔 조리장이 준비한 스테이크를 메인으로 하는 여섯 가지 건강식 코스요리가 제공된다. 조영남은 24~25일 서울 여의도 63컨벤션센터에서 디너쇼를 연다. 클래식과 팝송, 가요, 트로트를 넘나드는 다채로운 무대로
      꾸며진다. 데뷔곡 ‘딜라일라’를 비롯해 ‘화개장터’ ‘제비’ 등 자신의 히트곡과 1970년대 명동 음악다방 ‘쎄시봉’ 친구들(송창식 윤형주 김세환)과 함께 부르던 추억의 명곡을 선사한다. 조영남이 직접 편곡한
      캐럴을 관객들과 함께 부르는 시간도 마련한다. 윤형주 김세환 남궁옥분이 호흡을 맞춘 3인조 혼성그룹 포크트리오 디너쇼는 24~25일 플라자호텔 그랜드볼룸에서 열린다. 1970~1980년대 포크송 열풍을 일으켰던
      1세대 주역들이 당대의 낭만과 추억을 불러일으킬 만한 무대를 선보인다. 윤형주의 ‘어제 내린 비’ ‘조개 껍질 묶어’, 김세환의 ‘사랑하는 마음’ ‘길가에 앉아서’, 남궁옥분의 ‘사랑사랑 누가 말했나’ ‘에헤라
      친구야’ 등 각자의 히트곡을 세월의 깊이를 더한 목소리로 부른다.인순이는 28~30일 그랜드하얏트호텔 그랜드볼룸에서 송년 디너쇼를 연다. 트로트에서 힙합까지 세대와 장르를 아우르는 곡들로 감동적인 무대를 선사할
      예정이다. 태진아 패밀리 디너쇼는 22~23일 63컨벤션센터에서 열린다. 태진아, 이루, 마야, 성진우가 뭉쳐 트로트, 록, 리듬앤블루스(R&B), 발라드 등 다양한 장르를 선보이는 무대. 젊은이부터 노인까지
      다양한 연령대 팬들의 호응을 이끌어낼 예정이다.
    - '1802년으로 거슬러 올라가, 청각 장애를 우려해 "하이리겐슈타트의 유서"를 쓴 베토벤은, 이후 자신이 안고 있는 난청이 악화일로로 치닫고 있었음에도, 피아노 협주곡이라는 장르에 있어서 전작 피아노협주곡 4번까지는
      초연시 베토벤 스스로 독주 피아노를 맡아왔다. 그러나 이 악곡의 작곡 과정에서 초래된 프랑스군의 폭격음은 가뜩이나 진행중이던 그의 난청을 보다 중증화 시켜버렸고, 결국은 이 악곡의 초연에 피아노 독주자로 참여하는
      것을 포기, 다른 피아니스트에게 독주를 맡기는 상황에 이르게 되었다. 그렇다고는 해도, 이 악곡에 대한 청중의 반응은 무덤덤 했다.


      초연은 1811년 1월 13일, 롭코비츠 후작궁에서 열린 정기연주회에서 베토벤의 제자이자, 후원자였던 루돌프 대공의 독주에 의해 비공개로 실시되었다(독일에서의 첫 출판을 2,3개월 앞 둔 상황이었다.). 그리고
      같은 해 11월 28일, 라이프치히의 게반트하우스 연주회에서 요한 필리프 크리스티안 슐츠의 지휘와 프리드리히 슈나이더의 독주에 의한 첫 공개 초연이 이루어졌으며, 이어 1812년 2월 12일에는 빈의 쾰른토나토아
      극장에서, 같은 베토벤의 제자 중 한 명인 카를 체르니의 독주에 의한 초연이 이루어졌다. 이후 이 악곡은 베토벤의 생존 중에 두 번 다시 연주되지 않았다. 게다가 베토벤은 새로운 피아노 협주곡 마저도 생존해
      있는 동안 결코 써 내지 않았다. 후년에 이르러 이 악곡은 프란츠 리스트가 즐겨 연주하기 시작하면서 널리 알려지기 시작했고, 걸작 반열에 들어서게 되었다.'
  - source_sentence: 손현우 씨가 미래에 일하고 싶은 곳은 어디인가?
    sentences:
    - ‘경제를 알아간다는 게 너무 기뻐요. 경제신문은 꼭 챙겨 보는 습관이 생겼죠.” 지난 5월 시행된 ‘6회 주니어 테샛’에서 1등을 거머쥔 손현우 군(청심국제중 2·사진)의 말이다. 손군은 300점 만점에 288점을
      받아 주니어 테샛 응시 세 번 만에 1등에 올랐다. ▷1등을 한 소감은.“경제에 관심이 많다. 꾸준히 경제 관련 책과 신문을 읽은 덕분에 좋은 결과가 나온 것 같다. 너무 기쁘고 이번 수상을 계기로 자신감도
      생겼다. 전보다 더 재밌게 경제 공부를 할 수 있을 것 같다.”▷경제 공부는 어떻게 하나.“경제신문과 종합신문의 경제면을 꼭 챙겨 본다. 나름대로 실물경제 흐름을 파악하고 이해하려고 노력한다. 신문 기사를 스크랩해
      동아리 친구들과 토론도 한다. 토론 후에는 결과를 학교 게시판에 올린다. 어딘가에 게시된다는 사실에 준비도 착실히 하고 더 좋은 결과물을 만들기 위해 노력하게 돼 많은 도움이 된다.”▷경제를 공부할 때 어떤
      점이 재미있나.“경제를 알아간다는 데 대한 성취감이 크다. 겉핥기 식이 아니라 경제뉴스를 제대로 볼 수 있게 돼 재미있다. 아직 중학생이라 깊이 있는 경제이론 서적들을 보면 이해가 안 갈 때도 많다. 하지만
      이 또한 경제를 더 깊이 있게 공부하고 싶게 하는 자극을 준다.” ▷자신만의 경제 공부 비법이 있다면.“경제원리가 실생활에서 어떻게 작용하고 있는지 사례를 찾아보려고 노력한다. 가령 환율도 두 나라 사이 화폐의
      교환비율 정도로 이해하고 넘어가지 말고 원화와 달러의 현재 환율이 어떤지, 내가 지금 미국 상품을 달러로 사면 원화로는 얼마나 하는지, 어느 경우에 상품 구입에 유리하게 작용하는지 등을 생각해보면 재미있게 공부할
      수 있다.”손군은 영어문화유산 해설사로도 활동 중이다. 한 달에 한 번 경복궁과 남산 한옥마을 등에서 외국인들에게 우리 문화를 소개하는 일을 하고 있다. 앞으로 국제기구에서 가난한 국가에 도움이 되는 일을 하고,
      세계의 공공복지 증진을 위해 헌신하는 게 꿈이다.
    - "화재로 인한 사망자는 공식적으로 밝혀진 바에 따르면 극소수에 불과하며, 적었던 걸로 추정된다. 포터는 8명 이라고 언급했고, 티니스우드는 한 자리 수라고 제시하였다. 하지만 여기서 일부 사망자는 기록되지 않은\
      \ 것이 틀림없고, 화재와 연기 흡입으로 인한 직접적인 사망 외에도, 난민들이 임시 수용소나 겨울이 찾아왔을 때 저체온증으로 사망한 것으로 알려져 있다. \n\n핸슨은 런던 대화재 당시에 극작가였던 제임스 셜리와\
      \ 아내가 추운 겨울에 한 때 자신의 집이었던, 폐허가 된 집터에서 옹기종이 모였거나 살고 있다며, 사망자가 몇 명밖에 되지 않는다는 주장에 문제를 제기했다. 또한 핸슨은 죽거나 린치를 당한 가톨릭교 신자나\
      \ 외국인들이 요크 공작 제임스에 구출되었다는 것은 왜곡된 것이고, 가난한 사람들의 사망 수는 기록하지 않았으며, 시체를 완전히 태우거나 조금의 유해만 남겼을 가능성이 있다고 말했다.또한 화재는 나무와 직물,\
      \ 초가 지붕만을 태운 것이 아니라 강가에 있던 기름, 피치, 타르, 석탄, 지방, 설탕, 알코올, 화약, 테레빈유 등 수많은 물건을 집어삼켰을 것이라고 지적한다. 부두에 있던 녹은 강철(용융점 1250~1480℃)과\
      \ 거대한 쇠사슬(용융점 1100~1650℃)을 녹였고, 이름 모를 사람의 뼛조각들은 화재 후에 수만 톤의 잔해에 묻혀 발견되지 못했거나 귀중품이나 재건할 때 잔해를 치우는 일꾼이 이를 발견하지 못 하거나 지나쳤을\
      \ 가능성이 있을 것이라고 말했다. \n\n핸슨은 이 화재가 수 세기 동안 발생하지 않았던 큰 도시 화재라고 말하며, 불이 가난한 사람들을 빠른 속도로 잡아먹었다고 강조하면서 확실히 노인과, 영유아, 장애인과\
      \ 절름발이 등의 사람은 확실히 탈출하지 못한 채 지하실의 잔해 밑에 묻혔다고 하며, 이 화재는 수백 명, 어쩌면 수찬 명의 사상자를 냈다고 언급했다\n\n빌스 오브 모탈리티(주간 사망자 통계)는 화재로 인한\
      \ 혼란으로 화재 기간 동안에는 편찬되지 않았다.\n\n건물 등의 물질적인 파괴는 13,200채의 집, 교구 내 교회 87채, 44채의 회사 건물과 왕립 거래소, 세관, 브라이드웰 구빈원과 몇 개의 교도소,\
      \ 우체국과 루드게이트, 뉴게이트, 올더스게이트까지 세 개의 성문이 손실되었다. 처음에는 손실된 화폐가치가 1억 파운드로 계산되었으나, 이후에 불확실하지만 천만 파운드(2018년 한화로 약 2조)로 줄어들었다."
    - “누군가에게 춤이 무엇인지 설명하기는 정말 힘들 거예요. 하지만 그에게 강수진의 몸짓을 보여준다면 춤이 무엇인지 단박에 이해할 겁니다. 수진이 없었다면 발레 ‘나비부인’을 만들지 못했을 겁니다.”오스트리아 인스브루크발레단의
      엔리케 가사 발가 예술감독(37·사진)은 최근 한국경제신문과의 이메일 인터뷰에서 강수진 국립발레단장에 대해 이렇게 말했다. 다음달 4~6일 서울 서초동 예술의전당 오페라극장에서는 그가 안무한 작품 ‘나비부인’이
      공연된다. 지난해 10월 오스트리아에서 초연돼 10회 모두 매진된 작품으로 국내 무대에 오르는 것은 처음이다. 이 작품은 발가 감독이 오로지 강 단장을 위해 만들었다.“어머니께서 2002년께 수진의 공연을 보시고는
      ‘언젠가 네가 안무가가 되면 그를 주인공으로 한 나비부인 이야기를 발레로 만들어야 한다’고 강력하게 이야기하셨어요. 그때 구상해 지난해 무대에 올렸으니 11년이 걸렸네요.”줄거리는 원작인 푸치니의 동명 오페라를
      따른다. 일본 항구를 배경으로, 미군 장교 핀커톤과 결혼해 아들까지 낳지만 버림받는 게이샤 초초상의 이야기를 담았다. 타악기 연주자 4명이 만들어내는 일본 전통 선율에 맞춰 초초상을 맡은 강 단장이 비극적인
      몸짓을 펼친다.“수진과 초초상 사이에는 자신이 원하는 것을 위해 나머지 모든 것을 포기했다는 공통점이 있어요. 수진은 무용을 위해 인생의 많은 부분을 희생한 사람이에요. ‘나비부인’의 주인공은 사랑을 위해 모든
      것을 포기하죠. 지금 이 시대에서 찾기 힘든 순수한 사랑입니다.”강 단장은 작품의 제목처럼 무대 위에서 한 마리 나비로 변신한다. “나비를 몸짓으로 표현하는 게 가장 중요했습니다. 이를 표현하기 위해 수진은
      포인트 슈즈를 신고 날 듯이 춤출 것입니다.” 4만~20만원. (02)741-1523
  - source_sentence: 삼성SDI가 S&C사에 대한 ESS공급을 위해 협업하는 회사는?
    sentences:
    - 소형 2차전지 분야 세계 1위인 삼성SDI가 에너지저장장치(ESS)로 유럽 대형 전지 시장 선점을 노린다. 삼성SDI는 영국 S&C사와 ESS 공급 계약을 체결했다고 29일 발표했다. 앞서 이 회사는 올 초
      독일 베막사, 이탈리아 에넬사와 각각 ESS 공급 계약을 맺었다. ESS는 전력을 저장한 뒤 원하는 시간에 필요한 장소에서 쓸 수 있게 하는 장치다. 전력수요가 많은 피크 시간대에 활용하면 전력 사용 효율을
      높일 수 있다. 태양광, 풍력 등 신재생에너지를 생산할 때 출력을 안정화시키는 역할도 한다. 이번 계약을 통해 삼성SDI는 전력 관리 시스템을 만드는 독일의 유니코스사와 공동으로 S&C사에 10㎿h급 전력 안정용
      ESS를 공급하게 된다. 이 장치는 런던에서 북서쪽으로 69㎞ 떨어져 있는 버자드 지역에 내년 7월 설치될 예정이다. 10㎿h급은 영국 최대 규모의 리튬이온 전지 기반의 ESS 프로젝트다. 삼성SDI는 2010년부터
      ESS 시장이 급성장할 것으로 예상하고 투자를 지속해왔다. 업계는 지난해 4억달러였던 세계 ESS 시장 규모가 2020년엔 193억달러 규모로 50배 가까이 커질 것으로 전망하고 있다. 삼성SDI는 올해 독일
      카코사에 가정용·상업용 제품을 공급하기 시작했고 지난 2월엔 미국 XP사와 함께 텍사스의 스마트그리드(지능형 전력망) 프로젝트에 1㎿급 ESS를 납품했다. 4월엔 이탈리아 에넬사와 현지 스마트그리드 프로젝트에
      1㎿급 ESS를 공급하는 계약을 맺었다. 윤여창 삼성SDI 에너지 솔루션 사업부장(전무)은 “세계 1위의 배터리 경쟁력을 바탕으로 유럽을 넘어 세계 ESS 시장을 적극 공략할 계획”이라고 말했다.
    - 여름 피서철을 앞두고 다이어트에 대한 소문이 넘쳐나고 있다. 최근에는 한 유명 연예인이 채식을 통해 멋진 몸매를 유지하고 있다는 기사가 나오면서 채식 다이어트가 다시 뜨고 있다.살을 빼려면 육류나 탄수화물을
      줄이고 채소·과일 등 채식이 최고라는 말들이 회자된다. 하지만 채식만으로 건강하고 효과적인 다이어트가 가능할까.결론적으로 말하면 무조건 육류 섭취를 줄이는 ‘채식 다이어트’는 얼마 못 가 포기할 가능성이 높다.
      보통 육류를 먹지 않고 채식만 하게 되면 살이 빠질 거라고 생각하기 쉬운데 이는 잘못된 정보다.채식주의자도 육류가 아닌 다른 음식을 많이 먹게 되면 과체중은 물론 비만이 될 수 있다. 육류 섭취를 하지 않는
      대신 당지수가 높은 과일이나 튀김, 다량의 견과류, 고기 대용품(콩불고기, 밀고기 등)을 섭취하거나 계란 등을 즐겨 먹으면 살이 찐다. 혈중 콜레스테롤 수치도 높아질 수 있다.요즘 유행한다는 견과류 제품도 하루
      한 봉지(25g 기준) 이상 먹으면 열량이 높아 다이어트에 큰 도움이 되지 않는다. 육류를 제한하는 대신 빵·과자·튀김 등의 탄수화물 제품을 섭취하면 비만뿐 아니라 오히려 질병에 걸릴 위험도 높아진다. 지나친
      탄수화물 섭취는 혈중 중성지방 수치를 증가시키기 때문이다. 비만, 당뇨병, 고혈압, 고지혈증 등의 원인이 될 수 있다. 다이어트를 할 경우 중요한 것은 체지방을 감소시키고 근육을 늘리는 것이다. 근육을 이루는
      주성분인 단백질이 부족하면 근육이 소실될 수 있다. 이는 기초대사량 감소로 이어져 조금만 먹어도 살찌는 체질로 바뀔 수 있다. 요요현상으로 다이어트 실패 확률도 덩달아 높아진다. 단백질과 칼슘 부족이 심할 경우
      빈혈과 탈모, 골다공증 등이 생길 수도 있다. 따라서 채소 중심의 식사를 하더라도 우유 등 양질의 단백질 식품이나 콩과 같은 식물성 단백질을 충분히 섭취해야 한다. 만약 채식의 목적이 다이어트를 위한 것이라면
      균형 잡힌 식단도 함께 고려해야 한다.예컨대 육류를 완전히 배제하기보다 지혜롭게 섭취하는 방법을 권하고 싶다. 다이어트를 위해 채식만 할 경우 우리 몸에 부족한 대표적인 영양소가 비타민 B12다. 비타민 B12는
      적혈구를 포함한 여러 가지 세포의 분열과 성장에 관여한다. 이것이 부족하면 빈혈이 생기는데, 우유나 계란·유제품 등으로 보충해주는 것이 필요하다.
    - 국제통화기금(IMF)이 달라졌다. 과거 구조개혁과 긴축을 통한 경쟁력 확보를 금과옥조로 삼던 모습과 달리 단기 부양책을 강조하는 방향으로 돌아서고 있다. 최대 지분을 갖고 있는 미국과 독일 일본에 대해서도 전례
      없이 비판의 목소리를 높이고 있다.○“ECB 양적 완화 정책 지속돼야”IMF는 27일(현지시간) 유럽중앙은행(ECB)에 양적 완화 정책을 최소 내년 9월까지 지속할 것을 권고했다. IMF는 이날 발표한 유로존(유로화
      사용 19개국)에 대한 연례평가 보고서에서 “유로존의 경기회복 속도가 기대에 못 미치고 있다”며 이렇게 조언했다. 마흐무드 프라드한 IMF 유럽담당 국장은 한발 더 나아가 “1조유로 규모의 국채매입 프로그램을
      뛰어넘는 조치가 필요할 수도 있다”고 말했다. 노동시장 개혁 등이 필요하다는 단서를 달았지만 돈을 풀어 경기를 살리려는 노력을 더 적극적으로 하라는 주문이다.IMF는 그리스에 대해서도 이전의 디폴트(채무 불이행)
      국가보다 훨씬 유연한 처방을 내놓고 있다. 연금 축소와 세제개혁 등 방만한 경제구조를 개선하는 것과 동시에 파격적인 부채 탕감과 신규자금 지원이 이뤄져야 한다는 목소리를 내고 있다. IMF는 그리스와 채권단
      간 구제금융안 협상 과정에서 그리스를 지원하기 위해 최대 채권국인 독일을 압박하기도 했다.영국 BBC는 IMF가 1997년 외환위기를 겪은 동아시아 국가, 그리고 과거 수십년간 자금을 지원해준 남미와 아프리카
      개발도상국을 대상으로 긴축 일변도의 정책 개입에 나선 것과는 딴판이라고 전했다. 2008년 글로벌 금융위기 이후 재정위기에 처한 포르투갈과 아일랜드에 구제금융을 지원하면서 공무원 임금삭감 등을 강력히 요구할
      때와도 달라진 모습이라고 지적했다.○최대 지분국 미국과 일본도 공개 비판크리스틴 라가르드 IMF 총재는 지난달 미국 중앙은행(Fed)에 기준금리 인상을 내년으로 연기할 것을 거듭 요구했다. 인플레이션과 고용
      전망이 불확실하고, 금리를 너무 빨리 인상하면 미국 경제 성장을 저해할 수 있다는 이유에서였다. 블룸버그통신 등은 IMF가 최대 지분(쿼터)을 갖고 있는 미국에 직접적이고 공개적인 정책권고를 한 것은 이례적이라고
      분석했다. 2010년 합의된 IMF 지배구조 개혁안 통과를 사실상 막고 있는 미국에 대한 불만의 표시라는 해석도 있다.IMF는 지난 23일 아베 신조(安倍晋三) 일본 총리의 경제정책인 아베노믹스가 엔화가치의
      평가절하에만 기댄 채 근본적인 경제개혁을 소홀히 하면 한계에 부딪힐 수 있다고 경고했다.전문가들은 ‘IMF의 변신’에 대해 회원국의 입장을 고르게 반영해야 하는 국제기구로서 글로벌 금융시장의 안정을 우선시하는
      당연한 의견 표명이라는 의견과 함께 아시아인프라투자은행(AIIB)과 브릭스은행 등 경쟁자의 출현에 따른 결과라는 분석을 내놓고 있다. 신흥국 회원국의 목소리에 좀 더 귀 기울이지 않을 수 없게 됐다는 것이다.
      지난 5월 중국과의 연례협의회에서는 “위안화가 더 이상 평가절하된 통화가 아니다”며 중국의 통화정책을 두둔한 것도 같은 맥락이라는 해석이다.IMF 내부에서도 변화를 요구하는 목소리가 커지고 있다. 데이비드 립턴
      수석부총재는 최근 BBC와의 인터뷰에서 “IMF의 지배구조도 급변하는 글로벌 환경에 맞춰 현대화해야 한다”며 유럽 출신이 총재를 독식하는 관행에 이의를 제기하기도 했다.
  - source_sentence: 조사에서 지난 2분기에 세계 스마트폰 시장 점유율 1위를 차지한 업체는?
    sentences:
    - '천문학 혁명

      해양의 개발에 따라 개원된 과학 혁명 시대 (15세기 중엽 ~ 17세기 중엽)에는 원양 항해의 안전을 보증하기 위하여 항해력(航海曆, 천체 위치 추산표)의 개정이 급선무가 되었다. 종래 교황청의 교의의 하나로서
      그 권위를 인정해 왔던 지구 중심설은 항해력 제작을 위해서는 반드시 정당한 기초 이론이라고는 할 수 없다는 것을 알게 되었다. 그래서 코페르니쿠스는 태양중심설을 채택하여 우주 체계를 전개했다. 이 설에서는,
      모형적으로는 중심 천체로서 지구 대신 태양을 바꿔 놓은 것뿐이지만, 행성의 시운동을 간단명료하게 설명할 수가 있었다. 그러나 공전 궤도의 모양을 종래와 같이 원형으로 보았기 때문에 항해력의 개량은 예기되었던
      정도는 아니었다.


      한편, 갈릴레오 갈릴레이는 1609년의 망원경의 발명에 의해 태양 중심설에 관측적인 근거를 만들어 주고, 또한 1638년에는 지상 물체의 실험에 의해서 천체 역학의 기초를 구축하였다. 하지만 갈릴레이는 종래의
      행성 궤도가 원이라는 생각을 버리지 못했으며, 케플러를 인정하지 못한 한계 역시 가지고 있었다.


      케플러는 신성 로마 제국의 제국 수학자 티코 브라헤에게서 이어받은 화성의 관측 자료를 정리하여 행성 공전의 법칙을 발견했다. 또한 이를 바탕으로 정도가 높은 행성 운행표를 만들어, 항해자의 요망에 부응할 수가
      있었다. 이와 같은 성과는 단순한 기하학적 고찰에 그치는 것이 아니라, 물체의 운동을 추적하는 운동학적 연구에 의하여 얻어졌던 것이다. 이로써 케플러는 천체물리학을 제창해 냈다.


      갈릴레이가 기초를 구축한 천체 역학은 1665년 뉴턴의 만유인력의 법칙의 발견에서 시작되어 생산의 시대(17세기 중엽 ~ 18세기 후반)의 수학자들에 의해서 발전되었다. 모든 현상의 원인을 힘의 작용으로 보는
      기계론적 자연관의 전성기에 지상에서는 기계의 발명의 잇따르던 때여서 천체의 운동 또한 역사적 이론에 의해서 해명되고, 1799년 라플라스가 이것을 집대성했다.'
    - 글로벌 패션 브랜드 지유(GU)가 다양한 디자인과 컬러로 봄까지 입기 좋은 스웨트 컬렉션을 합리적인 가격대에 선보인다. 올해 꾸민 듯 안 꾸민 듯 내추럴한 스타일을 뜻하는 ‘꾸안꾸’ 룩이 패션 업계 트렌드로
      자리잡으며, 가을부터 스웨트의 인기가 이어지고 있다. 스웨트는 원래 캐주얼 아이템으로 주로 활용했으나 라이프스타일 전반에서 편안한 착용감과 릴랙스 디자인을 선호하는 경향에 힘입어 제품 디자인 및 매치하는 아이템에
      따라 오피스룩 등으로 그 범위가 확대되고 있다. 감각적인 디자인과 뛰어난 가성비로 잘 알려진 지유도 다양한 컬러와 디자인으로 겨울부터 봄까지 입을 수 있는 스웨트 컬렉션을 선보인다. 대표 상품인 여성용 ‘스웨트
      풀오버’와 후드가 부착된 ‘스웨트 풀파카’는 베이직한 컬러부터 상큼한 옐로우, 그린까지 총 8가지 컬러로 제공돼 겨울 스타일링에 화사함을 더할 수 있다. 여성용 ‘그래픽 오버사이즈 스웨트 셔츠’는 전면에 희망찬
      메시지를 비비드한 컬러로 프린트한 것이 특징이다. 가격은 ’스웨트 풀오버’가 14,900원, ‘스웨트 풀파카’와 ‘그래픽 오버사이즈 스웨트 셔츠’가 19,900원이다. 이외에도 남성들을 위해 모크넥 디자인으로
      포멀한 룩에도 잘 어울리는 ‘스웨트 모크넥 셔츠’와 편안한 착용감의 ‘스웨트 릴랙스 팬츠’를 14,900원에, 실내에서 가볍게 걸칠 수 있는 ‘스웨트 풀짚 후디’를 24,900원에 제공하는 등 다양한 디자인을
      선보여 어떠한 라이프스타일에도 활용 가능하다. 한편, 캐릭터 상품에 열광하는 성인 소비자들이 꾸준히 증가하고 있는 가운데, 지유도 다양한 소비자들의 취향을 반영하기 위해 12월 내내 콜라보레이션 컬렉션을 선보인다.
      16일에는 내년 신작 개봉을 앞두고 기대감을 모으고 있는 마블 코믹스(MARVEL Comics)의 로고 등을 모티브로 한 스웨트와 티셔츠, 패디드 재킷을 출시한다. 23일부터는 만화 피너츠(PEANUTS)의
      탄생 70주년을 기념해 스누피 캐릭터를 담은 컬렉션을 선보이며, 스웨트와 티셔츠 외에도 연말 선물로 인기가 많은 파자마, 라운지 슈즈 등으로 구성될 예정이다. 에프알엘코리아㈜ 지유 관계자는 “스웨트는 어디에나
      매치하기 쉬운 디자인과 편안하고 포근한 착용감을 바탕으로 추운 계절 소비자들이 가장 많이 찾는 아이템”이라며 “유행을 타지 않는 베이직 디자인부터 화사한 컬러나 트렌디한 실루엣, 레터링 프린트 등으로 포인트를
      더한 상품까지 다양한 디자인을 합리적인 가격에 선보여 취향에 따라 나만의 스웨트를 고를 수 있는 기회”라고 전했다. 지유의 스웨트 컬렉션은 GU 롯데월드몰점과 GU 롯데몰 수지점, GU 영등포 타임스퀘어점 등
      3개의 오프라인 매장과 GU 공식 온라인스토어에서 구입할 수 있다.
    - “샤오미보다 화웨이가 더 위협적이다.”작년 중국 신생 스마트폰 제조업체 샤오미가 급부상하자 삼성전자 고위 임원이 한 말이다. 예측이 현실화하고 있다. 지난 2분기 화웨이 스마트폰 부문 실적이 큰 폭으로 뛰었다.
      세계 시장점유율도 삼성전자 애플에 이어 3위를 기록했다. 샤오미가 장악한 시장은 중국, 중저가 제품군에 머물렀다. 화웨이는 탄탄한 기술력과 마케팅력을 기반으로 해외시장에서 중고가 제품을 내세워 약진하고 있다.
      화웨이가 샤오미보다 위협적인 이유다. 세계 스마트폰 시장 패권이 중국으로 넘어가는 것 아니냐는 전망도 나온다.○상반기 휴대폰 매출 급증올해 상반기 화웨이의 스마트폰 부문 매출은 전년 대비 87% 증가한 72억3000만달러였다.
      판매량은 39% 늘어난 4820만대를 기록했다. 상반기 세계 스마트폰 시장 수요 증가율 7%를 훨씬 웃돈다.중고가 스마트폰 판매량이 70% 증가했다. 전체 스마트폰 판매량의 31%, 총 수익의 42.9%를 차지했다.
      애플과 삼성전자가 독식해온 고가 제품 시장도 파고들기 시작한 것이다. 전체 판매량 4820만대 가운데 해외 판매량 비중은 약 40%(약 2000만대)다. 유럽, 중동 지역 매출이 전년 대비 40% 이상 늘었다.
      북아프리카 지역 매출은 160%가량 증가했다. 대만 시장조사업체 트렌드포스에 따르면 화웨이는 2분기 세계 스마트폰 시장의 7.6%를 점유해 삼성전자(26.8%) 애플(16.4%)에 이어 3위를 기록했다.리처드
      유 화웨이 소비자부문 최고경영자(CEO)는 “점점 더 많은 소비자가 화웨이의 고가 스마트폰 제품을 구매하고 있다”며 “올해 스마트폰 사업 이익이 전년 대비 두 배 늘어날 것”이라고 자신있게 말했다.○삼성·애플
      위협하나화웨이의 약진은 삼성전자 애플 등 주요 스마트폰 제조업체들의 실적이 기대에 미치지 못한 가운데 나온 성과여서 눈길을 끈다. 화웨이는 샤오미 등 중국 스마트폰 제조업체들이 내수와 가격 경쟁력에 의존하는
      동안 과감하게 중고가 전략을 썼다. ‘중국산=싸구려’ 이미지를 탈피해 세계 무대에서 존재감을 드러냈다는 평가가 나온다.세계 최대 통신장비업체이기도 한 화웨이는 통신장비사업을 하며 해외 통신사와 구축한 긴밀한
      협력 관계를 스마트폰 마케팅에 활용했다. 축구에 열광하는 유럽 시장을 공략하기 위해 영국 아스날, 이탈리아 AC밀란 등 축구팀의 공식 파트너사로 나섰다. 몇 년간 공들인 브랜드 이미지 개선 작업이 최근 들어
      결실을 보고 있는 것이다.화웨이는 세계 모바일 운영체제(OS) 시장을 장악하고 있는 구글과의 협력도 강화하고 있다. 올해 중국 스마트폰 업체 가운데 처음으로 구글 레퍼런스(기준) 폰인 넥서스폰을 제작할 예정이다.
      월스트리트저널은 “화웨이 등 중국 업체들의 해외시장 입지가 강해지면 삼성전자와 애플에 새로운 위협 요인이 될 것”이라고 전망했다.
  - source_sentence: 실버택배원들의 하루 노동시간은 얼마인가?
    sentences:
    - 지난 13일 부산의 벡스코 제2전시장 4C홀. 부산진구에 사는 정모씨(64)는 진열된 전동카트를 작동하는 직원의 설명을 열심히 듣고 있었다. 부산지역 한 유명 사립대에서 고위 행정직을 지낸 그는 몇 년 전 퇴직한
      뒤 쉬다가 소일거리로 실버택배를 하기 위해 이곳을 찾았다. 그는 “아직 몸도 건강해 일할 수 있는 만큼 실버택배를 하게 됐으면 좋겠다”고 말했다.정씨처럼 실버택배에 관심을 기울이는 노년층이 늘고 있다. 실버택배란
      은퇴한 노년층 등이 거주하고 있는 동네에서 택배를 전달해 주는 일. 아파트 단지 내 경로당이나 동사무소 앞까지 젊은 택배기사가 물건을 갖다 주면 이를 다시 집집마다 다니면서 배송해주는 업무다.CJ대한통운이 부산시
      고령인력종합관리센터, 노인인력교육센터 등과 손잡고 지난 5월 설립한 실버택배전문기업 ‘실버종합물류’엔 200여명의 노년층이 ‘제2의 인생’을 살고 있다. 이들은 실버종합물류가 제공하는 전동카트, 전동자전거 등을
      타고 다니며 하루에 50~60여개의 택배 물량을 배송한다. 택배 한 개당 배송 수입은 500원. 이들은 한 달 평균 100만원 가까운 소득을 올리고 있다. 실버종합물류는 실버택배원들의 건강 유지를 위해 하루
      4시간씩 교대근무를 할 수 있도록 했다. CJ대한통운은 실버택배에 힘입어 회사의 효율성이 높아지고 있다고 설명했다. 배송의 부담이 없어진 젊은 택배기사가 택배 물량을 받아오는 집하 업무에 집중할 수 있어 더
      많은 물량을 취급할 수 있게 됐다는 얘기다. 또 젊은 택배기사도 수입이 늘어나는 효과가 나타나고 있다. 배송은 건당 800원이지만, 집하는 건당 1500원 안팎이기 때문이다.CJ대한통운은 2015년까지 실버택배원을
      1000여명 수준으로 늘리기로 했다.
    - 경기 안산시에서 자동차용 매트 제조사에 다니는 김동주 씨(36)는 최근 은행 대출을 받아 전셋집을 옮기려다 포기했다. 연소득 4000만원 이하면 국민주택기금에서 연 3.7%로 빌릴 수 있다고 알고 있었는데 전세금
      대출에 실패하고 만 것이다. 연봉 2500만원인 김씨가 대출을 못 받은 이유는 ‘소득 기준’이 올해부터 ‘세대주 단독’에서 ‘부부 합산’으로 바뀌었기 때문이다. 부부 합산 소득이 4500만원인 그는 “초등생
      두 딸 교육비와 집세, 부모님 생활비를 드리고 나면 번 돈이 바닥나 저축을 못할 만큼 빠듯한 사정인데 소득이 너무 많아 대출이 안 된다니 당황스럽다”고 하소연했다.국민주택기금의 전세대출 자격이 올해부터 강화되면서
      소비자들의 불만이 폭주하고 있다. 대출을 위한 소득요건이 세대주 단독에서 부부 합산으로 변경됐는데도 소득 상한선은 3000만원에서 4000만원으로 소폭 오르는 데 그쳤기 때문이다. 더구나 소득 기준에서 빠져
      있던 수당이나 상여금이 올해부터는 연봉에 포함됐다. 서울 금천구 소재 국민은행의 한 영업점 직원은 “정부가 작년 12월21일부터 국민주택기금 전세대출 금리를 연 4.0%에서 3.7%로 내려 찾는 고객이 늘어난
      반면 대출 자격은 더 엄격해진 탓에 항의가 빗발치고 있다”고 전했다.국토교통부가 이처럼 전세대출 자격을 강화한 것은 2011년 6월 감사원 지적에 따른 것이다. 당시 감사원은 ‘서민을 지원해야 할 주택기금이
      많은 성과급과 상여금을 받는 대기업 고소득자를 지원해 주고 있다’며 소득 기준을 세대주 단독에서 부부 합산으로 바꾸고 수당도 포함하는 방안을 마련하라고 통보했다. 국민주택기금 대출이 안될 때 찾는 시중은행의
      일반 전세대출도 더 어려워졌다. 서울보증보험의 보증을 받는 상품의 경우 전세대출금이 6000만원 이하면 마진이 안 남는다는 이유로 시중은행들이 거절하고 있어서다. 서울보증보험에 은행들이 내는 보증료가 건당 30만~40만원이라
      대출액이 6000만원(마진율 연 0.5%로 추정) 아래면 본전을 찾기 힘들기 때문이다.
    - '칼리파의 역사는 서기 632년에 무함마드가 죽은 후 이슬람 공동체의 지도자로서 제1대 칼리파로 아부 바크르가 선출되어 "알라의 사도의 대리인"을 칭했던 것에서 시작되며, 제2대 칼리파가 된 우마르 1세는 "신도들의
      우두머리(Amīr al-Mu''minīn)"라고 하는 칭호를 채용하여, 칼리파의 칭호와 함께 이용되게 되었다. 제3대는 우스만 이븐 아판, 제4대는 알리 이븐 아비 탈리브로 계승되었으며, 이 4명은 쿠란과 순나에
      기초하여 ''움마''를 통치하였기 때문에 정통 칼리파(Al-Khalifah Ar-Rashid)라고 불린다.


      그 후, 우마위야 왕조·압바스 왕조에 세습되어 가는 과정에서 시아파가 칼리파의 권위를 부정하고 분파하여, 수니파만이 칼리파를 따르게 되었다.


      칼리파는 어디까지나 예언자의 대리인에 지나지 않기 때문에, 이슬람의 교의를 좌우하는 종교적 권한이나 꾸란을 독단적으로 해석해 입법하는 권한을 갖고 있지 않고, 대신에 이것들은 울라마들의 합의에 의해서 보충되어
      단지 움마의 행정을 통괄하여 신도들에게 이슬람의 의무를 준수시키는 역할 밖에 갖고 있지 않다. 그러나, 또 10세기에 압바스 왕조의 칼리파가 대(大)아미르에 정권을 맡기게 되면서, 칼리파는 실권을 잃고 아미르나
      술탄의 지배권을 승인하는 대신에 그들의 비호를 받았다. 그 후 안달루스 왕조도 칼리파를 칭하게 되었다. 압바스 왕조의 마지막 바그다드 칼리파인 알 무스타심은 1258년에 일칸국의 건국자인 훌라구에 의해 살해되어
      아부 바크르 이래 계속된 칼리파 제도는 여기서 한 번 끊어졌다.


      그러나, 그로부터 3년 후에 맘루크의 바이바르스는 살아남은 압바스 왕조의 일원 가운데 한 사람을 카이로로 초대하여 새로운 칼리파로 옹립해, 맘루크(노예 군인) 출신의 술탄에게 지배의 정당성을 주는 존재로서 존속하게
      되었다. 1517년, 맘루크 왕조가 오스만 왕조에 의해 멸망하게 되면서, 카이로의 칼리파는 오스만 왕조의 수도 이스탄불로 끌려가 버렸다.


      당초 오스만 왕조는 칼리파의 권위에 의지하지 않고서도 실력으로서, 술탄들의 술탄을 자처하고, 이슬람 세계의 맹주로서 행동할 수 있었지만, 18세기 말에서부터 19세기에 걸쳐, 러시아 제국 등 주변 국가들에 비해
      군사적 열세가 벌어지면서, 오스만 제국 내외의 무슬림들에게 영향을 미치기 위해서는 칼리파의 권위가 필요하게 되었다. 그래서, 16세기 초에 오스만 제국의 황제는 아바스 왕조의 마지막 칼리파로부터 칼리파권을 선양받아
      술탄과 칼리파를 겸비하는 군주제가 생겨났다(술탄-칼리파제).'
