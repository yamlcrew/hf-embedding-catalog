widgetData:
- source_sentence: Peut-on répartir les jours entre plusieurs options ?
  sentences:
  - Il est possible de répartir les jours entre les 3 options, selon les conditions.
  - Le droit d'option permet à l'agent de choisir l'utilisation qu'il fera des jours épargnés sur son CET.
  - Le versement RAFP permet de disposer d’un complément de pension à la retraite.
- source_sentence: Un contractuel peut-il bénéficier de la RAFP ?
  sentences:
  - 'Il existe 3 droits d''option : L''indemnisation, le maintien et l''épargne-retraite (RAFP).'
  - Le mail de confirmation parviendra aux agents le 1er avril pour confirmer la répartition des jours.
  - Un agent contractuel ne peut pas bénéficier du versement à la RAFP.
- source_sentence: À quoi sert le maintien dans le droit d’option ?
  sentences:
  - Le maintien permet d’augmenter son CET de 10 jours par an.
  - La campagne du droit d'option se déroule du 1er au 31 mars.
  - Pour effectuer le droit d'option, il faut aller dans Agatte, Menu CET, puis onglet Droit d'option.
- source_sentence: Quel est le montant de l'indemnisation selon la catégorie ?
  sentences:
  - 'L''indemnisation permet de monétiser les jours de congés : Catégorie A : 150€, B : 100€, C : 86€ bruts.'
  - Les jours de CET sont en principe versés sur la paye de juin. Cette date peut varier.
  - Les agents ayant un CET ouvert avec un minimum de 16 jours peuvent faire leur droit d'option.
- source_sentence: Un agent titulaire peut-il répartir ses jours entre les trois options ?
  sentences:
  - Le socle de 15 jours qui déclenche le droit d'option n'est pas monétisable.
  - La RAFP est réservée aux agents titulaires.
  - Il est possible de répartir les jours sur les 3 droits d'option (si vous respectez les conditions). Le total des jours
    utilisés pour les droits d'option doit être le même que le nombre de jours total à répartir.
