widgetData:
- source_sentence: Quand puis-je alimenter le CET et comment le calcul est-il effectué ?
  sentences:
  - 'Transfert du CET : Si l’agent quitte l’établissement mais reste dans la fonction publique : son CET sera transféré. Pour
    cela, il doit demander une attestation CET à son gestionnaire RH actuel et devra ensuite le transmettre à son nouvel employeur.
    Si l’agent quitte définitivement la fonction publique (démission, licenciement, retraite...), vous devez solder votre
    CET avant de partir, sinon les jours seront perdus.'
  - 'Indemnisation (droit d’option qui permet le paiement des jours du CET) : Jours monétisés en fonction de la catégorie
    de l’agent : Catégorie A : 150 € bruts/jour Catégorie B : 100 € bruts/jour Catégorie C : 86 € bruts/jour ; L’indemnisation
    est imposable ; Le socle de 15 jours n’est pas monétisable; Le paiement des jours épargnés sur le CET se fait généralement
    en juin (date non réglementaire qui peut varier)'
  - 'Campagne / Période d’alimentation du CET : Du 1er septembre au 31 décembre aucune exception n’est possible en dehors
    de cette période ; Calcul du CET effectué au 31 décembre sur les jours de congés de l’année non posés et les jours versés
    sont visibles à partir du 1er mars de l’année suivante.'
- source_sentence: Comment je peux utiliser mon CET et quelles sont les possibilités offertes par le CET ?
  sentences:
  - 'Définition : Le droit d’option permet à un agent disposant d’un CET de choisir l’utilisation des jours épargnés au-delà
    de 15 jours sur son CET. Les 3 droits d’option du CET sont l’indemnisation, le maintien des jours sur le CET et le versement
    à la RAFP pour les agents titulaires. Les 3 options sont cumulables si les conditions sont respectées.'
  - 'Calendrier du droit d’option : Campagne annuelle du 1er au 31 mars, passé cette date, il ne sera plus possible de modifier.
    Un mail explicatif est envoyé aux agents le 1er mars. Les agents reçoivent un mail de confirmation de répartition le 1er
    avril'
  - 'Procédure pour effectuer son droit d’option : Aller dans l''application ''Agatte''> Menu CET > Onglet “Droit d’option”
    puis répartir les jours au-delà du 15e sur les différentes options ; veiller à renseigner toutes le cases lors de la répartition
    ( bien indiquer 0 si l’option n’est pas choisie)'
- source_sentence: Qu'est-ce que le Compte Épargne Temps / CET ?
  sentences:
  - 'Définition du CET : Le Compte Épargne Temps (CET) permet aux agents d’épargner des congés payés acquis mais non pris,
    afin de ne pas les perdre. Le CET n''est pas obligatoire.'
  - Le droit d’option doit être fait tous les ans, sauf pour les stagiaires,  même si aucun jour n’a été versé pendant l’année
    concernée. Le droit d’option s’enclenche automatiquement dès que l’agent a plus de 15 jours dans son CET qu’il s’agisse
    de jours versés l’année concernée ou les années précédentes
  - 'Questions complémentaires : contacter la cellule Agatte de la Direction de l''Accompagnement et du Développement des
    Ressources Humaines (DADRH) par ticket i-top afin d''obtenir des précisions. La ca-tégorie I-top pour un agent est "RESSOURCES
    HUMAINES / Ma situation personnelle / Mon assistance logiciel ",  pour un gestionnaire la catégorie est "RESSOURCES HUMAINES
    / Accompagnement Managé-rial RH / Assistance et accès logiciels "'
- source_sentence: Quelles sont les conditions pour alimenter le Compte Épargne Temps ? Et quells sont les plafonds du CET
    ?
  sentences:
  - 'Cas de non-action sur le droit d’option : Si aucun choix n’est fait avant le 31 mars : Contractuels : jours indemnisés
    ; Fonctionnaires titulaires : jours versés à la RAFP'
  - 'Modification du droit d’option : Il est possible de modifier la répartition des jours du CET jusqu’au 31 mars à  condition
    de respecter le total du nombre de jours à répartir; Après cette date, plus aucune modification n’est possible'
  - 'Conditions d’alimentation du CET : L’agent doit avoir posé au moins 20 jours de congés payés sur l’année universitaire
    pour pouvoir ajouter des jours sur son CET. Seuls les jours entiers peuvent alimen-ter le CET ; il est impossible de verser
    des demi-journées ou des heures supplémentaires. La période de référence pour le versement des congés est l’année universitaire.
    Les congés payés non posés et non versés sur le CET sont perdus ; ‘Alimentation du CET’ équivaut à ‘versement des jours
    sur le CET’ ; Pla-fonds / Limites / Maximum d’alimentation du CET : Le solde CET ne peut augmenter que de 10 jours maximum
    par an. Le solde / l’épargne globale ne peut excéder 60 jours, sauf disposition réglementaire particulière.'
- source_sentence: Que se passe-t-il en cas de décès d'un agent ou si un agent souhaite faire un don de jours CET ?
  sentences:
  - 'Décès de l’agent : les jours du CET sont versés aux ayants droit ; Don de jours de CET : Compléter le formulaire de don,
    peut être trouvé dans la documentation ''Agatte'' et le transmettre via ticket à la cel-lule ‘Agatte’ ;  Attention le
    don de jours de CET peut être fait avant ou après la campagne de droit d’option'
  - 'Ouverture base du CET : Possible dès l''arrivée de l’agent à l’Université ; Peut être effectuée à tout mo-ment de l’année
    ; Procédure : Aller dans l’application ''Agatte'' > Menu CET > Onglet “Feuille CET” > Bou-ton “Ouvrir CET”'
  - 'Cadre réglementaire du CET : Code de la fonction publique : article L621-4 ; Décret n°2002-634 du 29 avril 2002 ; Arrêté
    du 28 août 2009 relatif au CET dans la fonction publique d''État (FPE) et la magistra-ture'
