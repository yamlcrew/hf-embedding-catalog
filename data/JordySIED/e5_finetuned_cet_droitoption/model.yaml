widgetData:
- source_sentence: Est-ce que le CET est obligatoire ?
  sentences:
  - Le CET n'est pas obligatoire.
  - 'Fonctionnaires titulaires : jours versés à la RAFP'
  - 'Maintien des jours sur le CET : Permet d’augmenter son solde d’année en année ; Limité à +10 jours par an ; Attention
    au plafond global (60 jours)'
- source_sentence: Qu’est-ce que le droit d’option pour le CET ?
  sentences:
  - Compléter le formulaire de don peut être trouvé dans la documentation Agatte et le transmettre via ticket à la cellule
    Agatte
  - La période de référence pour le versement des congés est l’année universitaire
  - Le droit d’option permet à un agent disposant d’un CET de choisir l’utilisation des jours épargnés au-delà de 15 jours
    sur son CET.
- source_sentence: Qu’est-ce que le versement à la RAFP ?
  sentences:
  - Il est possible de modifier la répartition jusqu’au 31 mars
  - 'Procédure : Aller dans Agatte > Menu CET > Onglet “Droit d’option” ; Répartir les jours au-delà du 15e sur les différentes
    options ; Il est possible de modifier la répartition jusqu’au 31 mars'
  - 'Versement à la RAFP (Retraite Additionnelle de la Fonction Publique) : Réservé aux agents titulaires uniquement ; Régime
    obligatoire basé sur un système de points ; Permet de compléter la pension de retraite'
- source_sentence: Quels textes réglementent le CET ?
  sentences:
  - 'Si aucun choix n’est fait avant le 31 mars : Contractuels : jours indemnisés ; Fonctionnaires titulaires : jours versés
    à la RAFP'
  - Versement généralement en juin (date non réglementaire peut varier)
  - 'Code de la fonction publique : article L621-4 ; Décret n°2002-634 du 29 avril 2002 ; Arrêté du 28 août 2009 relatif au
    CET dans la fonction publique d''État (FPE) et la magistrature'
- source_sentence: Où trouver le bouton pour verser mes congés dans le CET ?
  sentences:
  - 'Campagne d’alimentation du CET : Du 1er septembre au 31 décembre ; Aucune exception n’est possible'
  - 'Procédure d’alimentation du CET : Aller dans Agatte > Menu CET > Bouton “Verser les reliquats des congés N-1”'
  - Fonctionnaires stagiaires (ne peuvent ni ouvrir ni alimenter ni utiliser un CET pendant le stage)
