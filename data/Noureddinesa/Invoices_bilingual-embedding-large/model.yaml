  - 'Les terrains nus désignent des parcelles de terre qui ne possèdent aucune construction. Ils sont évalués en fonction
    de leur valeur d''acquisition.


    1. Un terrain vierge acheté pour construire une maison. 2. Un parcelle de terre non aménagée destinée à l''agriculture.
    3. Un terrain nu en zone industrielle prêt à accueillir des usines. 4. Une surface de terrain dans une zone résidentielle,
    sans aucun bâtiment. 5. Un terrain dans une zone touristique, où aucun bâtiment n''est encore érigé. 6. Un terrain situé
    à la périphérie d''une ville, sans construction. 7. Une parcelle de terre achetée pour y installer un centre commercial.
    8. Un terrain en zone rurale, sans aucune infrastructure. 9. Un terrain nu utilisé pour des activités de loisirs comme
    le camping. 10. Un terrain à bâtir acheté par un promoteur immobilier. 11. Un terrain en friche qui n''a jamais été construit.
    12. Une terre destinée à la vente, sans aucune construction. 13. Un terrain de sport non aménagé, comme un champ de football.
    14. Un terrain nu dans une réserve naturelle. 15. Un terrain à l''état brut, prêt à être développé.'
- source_sentence: Un entrepôt de distribution achète des réservoirs de stockage pour liquides, d'une valeur de 30,000 dirhams,
    afin de mieux gérer les stocks de produits chimiques et respecter les normes de sécurité.
  sentences:
  - 'Ce compte enregistre des installations techniques, matériels et outillages qui ne sont pas classés dans d''autres catégories
    spécifiques.


    1. Systèmes de chauffage et de climatisation dans un bâtiment.

    2. Équipements de sécurité incendie comme les alarmes et les extincteurs.

    3. Machines à café dans une salle de repos d''entreprise.

    4. Systèmes de ventilation dans un atelier.

    5. Éclairage industriel dans une usine.

    6. Réservoirs de stockage pour liquides dans un entrepôt.

    7. Équipements de laboratoire pour des tests scientifiques.

    8. Outils de jardinage pour l''entretien des espaces verts.

    9. Appareils de nettoyage industriel comme des nettoyeurs haute pression.

    10. Équipements de télécommunication dans un bureau.

    11. Installations de plomberie dans un bâtiment commercial.

    12. Systèmes de contrôle d''accès pour sécurité des locaux.

    13. Équipements de montage pour la production en usine.

    14. Matériel d''impression pour les services de reprographie.

    15. Outils de maintenance pour les réparations d''équipement.'
