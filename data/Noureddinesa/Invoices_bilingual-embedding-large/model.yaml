- source_sentence: Une société de téléphonie mobile, réalisant que ses anciens modèles de téléphones ne se vendent plus, décide
    de provisionner 500 000 dirhams sur un total de 3 millions de dirhams pour ces modèles obsolètes.
  sentences:
  - 'Les autres terrains désignent des parcelles de terrain qui ne sont pas classées dans les catégories spécifiques mentionnées
    précédemment.


    1. Un terrain agricole non cultivé. 2. Une parcelle de forêt. 3. Un terrain vacant en milieu urbain. 4. Un terrain destiné
    à un futur développement immobilier. 5. Un terrain de loisir comme un parc public. 6. Un terrain industriel non utilisé.
    7. Un terrain de stationnement. 8. Un terrain sur lequel se trouve un ancien bâtiment démoli. 9. Un terrain situé en zone
    inondable. 10. Un terrain attribué à des projets communautaires. 11. Un terrain utilisé pour des événements temporaires
    (foires, festivals). 12. Un terrain de camping. 13. Un terrain de golf. 14. Un terrain en friche. 15. Un terrain de sport
    (stade, terrain de basket).'
  - 'Le compte de provisions pour dépréciation des immobilisations enregistre les pertes de valeur potentielles des biens
    durables de l''entreprise, qu''ils soient matériels (comme des machines) ou immatériels (comme des logiciels).


    1. Une entreprise constate que l''ordinateur utilisé depuis plusieurs années perd de sa valeur et crée une provision pour
    cette dépréciation. 2. Une société immobilière doit ajuster la valeur de ses bâtiments en raison d''une baisse du marché
    immobilier. 3. Un studio de design évalue la perte de valeur de ses équipements créatifs après plusieurs années d''utilisation.
    4. Une entreprise de transport met une provision pour la dépréciation de ses camions vieillissants. 5. Un éditeur de logiciels
    ajuste la valeur de sa propriété intellectuelle en raison de l''émergence de nouvelles technologies. 6. Un constructeur
    automobile constate que certains modèles ne se vendent plus bien et prépare une provision pour leur dépréciation. 7. Un
    restaurant ajuste la valeur de son mobilier ancien qui a perdu de son attrait. 8. Une société de production audiovisuelle
    prend en compte la dépréciation de ses équipements de tournage. 9. Un cabinet médical observe que son matériel médical
    devient obsolète et crée une provision en conséquence. 10. Une entreprise de construction ajuste la valeur de ses machines
    après un certain temps d''utilisation. 11. Un musée doit établir une provision pour la dépréciation de ses œuvres d''art
    moins prisées. 12. Une société de télécommunications évalue la baisse de valeur de ses antennes anciennes. 13. Un club
    de sport met à jour la valeur de ses installations vieilles de plusieurs décennies. 14. Un opérateur de location de voitures
    doit créer une provision pour la dépréciation de son parc automobile. 15. Une entreprise de nettoyage évalue la perte
    de valeur de ses équipements de nettoyage avec le temps.'
  - 'Le matériel de transport désigne tous les véhicules et équipements utilisés pour déplacer des personnes ou des marchandises,
    que ce soit par voie terrestre, aérienne ou maritime. Cela inclut les moyens de transport affectés au tourisme ou à l''usage
    du personnel d''une entreprise.


    1. Un bus utilisé pour transporter des employés au travail. 2. Un camion de livraison pour acheminer des marchandises.
    3. Une voiture de société mise à disposition d''un salarié. 4. Un bateau de croisière pour le tourisme. 5. Un avion de
    ligne pour le transport de passagers. 6. Un train utilisé pour le transport de marchandises. 7. Un vélo de fonction pour
    les déplacements professionnels. 8. Un fourgon utilisé pour des services de dépannage. 9. Un hélicoptère pour des missions
    d''urgence ou de transport de personnes. 10. Un tramway utilisé pour les transports en commun. 11. Un ferry reliant deux
    rives pour le transport de véhicules. 12. Un autocar pour des excursions touristiques. 13. Un taxi pour le transport de
    personnes. 14. Un véhicule utilitaire léger (VUL) pour des travaux sur site. 15. Un scooter utilisé pour des livraisons
    rapides.'
