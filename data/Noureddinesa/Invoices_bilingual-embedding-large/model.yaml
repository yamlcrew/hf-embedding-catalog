- source_sentence: Une société d'importation de meubles paie 5 000 dirhams pour le transport de marchandises importées par
    conteneur depuis le port de Tanger vers son entrepôt à Rabat.
  sentences:
  - 'Les transports regroupent les frais liés au déplacement du personnel et au transport des marchandises lors des achats
    et des ventes. Ces coûts s''ajoutent aux frais d''acquisition d''immobilisations si le transport est lié à leur achat.


    1. Frais de taxi pour des employés se rendant à une réunion. 2. Coût du transport de marchandises depuis un entrepôt jusqu''à
    un client. 3. Dépenses de livraison pour des produits achetés en gros. 4. Frais de transport pour un salon professionnel.
    5. Coût d''envoi d''échantillons à des clients potentiels. 6. Remboursement des frais de transport pour des déplacements
    professionnels. 7. Paiement pour le transport de matériel lors d''un déménagement de bureau. 8. Coût de livraison d''une
    commande en ligne. 9. Frais de transport pour des produits retournés par des clients. 10. Dépenses liées au transport
    de fournitures de bureau. 11. Coût de transport pour des marchandises importées. 12. Remboursement des frais de carburant
    pour des trajets professionnels. 13. Paiement pour le transport de produits périssables nécessitant une livraison rapide.
    14. Frais de transport pour une exposition commerciale. 15. Coût du transport de personnel pour un voyage d''affaires.'
  - 'Les terrains aménagés représentent des parcelles de terrain qui ont été préparées pour des constructions ou d''autres
    utilisations. Cela inclut les travaux de nivellement, de drainage ou d''infrastructure nécessaires avant le début d''un
    projet.


    1. Un terrain de sport prêt à être utilisé après des travaux de nivellement et de semis de gazon.

    2. Un terrain résidentiel sur lequel des routes et des services publics ont été installés.

    3. Un espace commercial où les fondations ont été creusées et les accès routiers sont en place.

    4. Un parc public avec des sentiers et des aires de jeux, prêt à accueillir des visiteurs.

    5. Un terrain industriel qui a été préparé avec des accès pour les camions et des installations électriques.

    6. Une parcelle de terrain agricole où le drainage et les clôtures ont été mis en place.

    7. Un site de construction pour un immeuble d''habitation avec des infrastructures de base installées.

    8. Un terrain réhabilité pour être utilisé comme espace vert après des travaux de nettoyage.

    9. Un lotissement où les routes ont été pavées et les services d''eau et d''électricité sont disponibles.

    10. Un terrain pour un centre communautaire qui a été aménagé avec des parkings et des accès piétonniers.

    11. Une zone de loisirs où des sentiers de randonnée et des aires de pique-nique ont été aménagés.

    12. Un site touristique préparé avec des installations sanitaires et des points d''accès.

    13. Un terrain à bâtir sur lequel les anciens bâtiments ont été démolis et nettoyés.

    14. Un espace pour un festival où des infrastructures temporaires comme des scènes et des stands ont été mises en place.

    15. Un terrain de camping où des emplacements ont été définis et des commodités ont été installées.'
  - 'L''achat de marchandises du groupe B désigne l''acquisition de biens destinés à la revente, qui appartiennent à une catégorie
    spécifique de produits. Ces marchandises sont généralement stockées avant d''être vendues à des clients.


    1. Acheter des vêtements pour une boutique de mode. 2. Acquérir des livres pour une librairie. 3. Commander des meubles
    pour un magasin de décoration. 4. Acheter des jouets pour un magasin de jouets. 5. Se procurer des appareils électroniques
    pour un revendeur. 6. Acquérir des produits alimentaires pour un supermarché. 7. Commander des articles de sport pour
    un magasin spécialisé. 8. Acheter des cosmétiques pour une parfumerie. 9. Se procurer des fournitures de bureau pour un
    commerce. 10. Acquérir des accessoires pour un magasin de téléphones. 11. Acheter des produits de jardinage pour un centre
    de jardinage. 12. Commander des pièces de rechange pour une entreprise de mécanique. 13. Se procurer des instruments de
    musique pour un magasin de musique. 14. Acquérir des articles de bricolage pour une quincaillerie. 15. Acheter des équipements
    de fitness pour un magasin de sport.'
- source_sentence: Un terrain à bâtir a subi des travaux de démolition pour enlever les anciens bâtiments. Le site a été nettoyé
    et est maintenant prêt pour la construction de nouvelles structures, attirant les investisseurs intéressés.
  sentences:
  - 'La variation des stocks de marchandises représente la différence entre le stock de marchandises au début et à la fin
    d''une période. Cela permet d''évaluer si les stocks ont augmenté ou diminué au cours de cette période.


    1. Une boutique a un stock initial de 100 t-shirts et un stock final de 80 t-shirts. La variation est de -20 t-shirts.

    2. Un supermarché commence avec 500 paquets de pâtes et finit avec 600. La variation est de +100 paquets.

    3. Un magasin de chaussures a 200 paires au début et 250 à la fin. La variation est de +50 paires.

    4. Une librairie démarre avec 300 livres et termine avec 250. La variation est de -50 livres.

    5. Une entreprise de décoration a 150 articles au début et 120 à la fin. La variation est de -30 articles.

    6. Un magasin de jouets commence avec 400 jouets et termine avec 500. La variation est de +100 jouets.

    7. Un restaurant a un stock de 200 bouteilles de vin au début et 150 à la fin. La variation est de -50 bouteilles.

    8. Une boulangerie commence avec 1000 pains et termine avec 900. La variation est de -100 pains.

    9. Un magasin de vêtements a 500 articles en stock au début et 550 à la fin. La variation est de +50 articles.

    10. Un garage automobile a 60 pneus au début et 50 à la fin. La variation est de -10 pneus.

    11. Une épicerie a un stock initial de 250 boîtes de conserve et finit avec 300. La variation est de +50 boîtes.

    12. Un magasin de meubles commence avec 80 meubles et termine avec 70. La variation est de -10 meubles.

    13. Une entreprise de cosmétiques débute avec 300 produits et finit avec 400. La variation est de +100 produits.

    14. Un magasin de sport a 100 ballons au début et 90 à la fin. La variation est de -10 ballons.

    15. Une bijouterie commence avec 200 bijoux et termine avec 250. La variation est de +50 bijoux.'
