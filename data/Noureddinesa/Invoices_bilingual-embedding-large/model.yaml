  - 'Les redevances pour brevets, marques et droits similaires sont des paiements effectués par une entreprise pour utiliser
    des inventions, des marques ou d''autres droits qui ne lui appartiennent pas. Cela inclut également les frais pour les
    mises à jour de logiciels nécessaires à l''exploitation de l''entreprise.


    1. Une entreprise de technologie paie des redevances pour utiliser un logiciel protégé par un brevet. 2. Une marque de
    vêtements verse des redevances à un designer pour l''utilisation de son logo. 3. Un fabricant de médicaments paie des
    droits pour exploiter un brevet sur un nouveau traitement. 4. Une société de production utilise une musique sous licence
    et paie des redevances à l''artiste. 5. Une entreprise de jeux vidéo achète des droits pour utiliser un personnage emblématique
    d''un film. 6. Un restaurant utilise une recette protégée et verse des frais au créateur de celle-ci. 7. Un éditeur de
    livres paie des redevances pour utiliser une œuvre protégée dans une anthologie. 8. Une société de publicité utilise une
    image protégée et paie des droits au photographe. 9. Une compagnie de télécommunications paie des redevances pour utiliser
    une technologie brevetée d''un concurrent. 10. Un développeur d''applications paie pour intégrer une API protégée dans
    son logiciel. 11. Une entreprise de cosmétiques verse des redevances pour utiliser une formule de produit brevetée. 12.
    Un producteur de films paie pour les droits d''adaptation d''un roman à succès. 13. Une start-up utilise un logo d''une
    autre entreprise sous licence et paie des frais en conséquence. 14. Un distributeur de jeux de société verse des redevances
    pour utiliser un jeu protégé. 15. Un constructeur automobile paie des droits pour utiliser un design de voiture protégé.'
- source_sentence: Un espace pour un marché hebdomadaire a été préparé avec des allées et des installations pour les vendeurs,
    rendant le terrain prêt à accueillir des commerçants et des visiteurs chaque semaine.
  sentences:
  - 'La variation des stocks de matières et fournitures représente la différence entre le stock de départ et le stock de fin
    d''un exercice comptable. Elle permet de mesurer l''augmentation ou la diminution des matières et fournitures utilisées
    durant cette période.


    1. Une entreprise commence l''année avec 1000 unités de matières premières et finit avec 800, indiquant une diminution
    de 200 unités. 2. Un restaurant débute avec 150 kg de légumes et termine avec 200 kg, montrant une augmentation de 50
    kg. 3. Une usine de textile commence avec 300 mètres de tissu et finit avec 150 mètres, ce qui représente une diminution
    de 150 mètres. 4. Un magasin de bricolage commence avec 500 rouleaux de papier peint et termine l''année avec 600, soit
    une augmentation de 100 rouleaux. 5. Une société de construction débute avec 2000 clous et termine avec 1500, indiquant
    une diminution de 500 clous. 6. Un distributeur de fournitures de bureau commence avec 300 paquets de papier et finit
    avec 350, ce qui représente une augmentation de 50 paquets. 7. Un fabricant d''emballages débute avec 1000 boîtes et finit
    avec 900, indiquant une diminution de 100 boîtes. 8. Une imprimerie commence l''année avec 2500 feuilles de papier et
    finit avec 3000 feuilles, montrant une augmentation de 500 feuilles. 9. Un atelier de fabrication de meubles commence
    avec 800 planches de bois et termine avec 600, représentant une diminution de 200 planches. 10. Une entreprise de produits
    électroniques débute avec 700 composants et finit avec 800, indiquant une augmentation de 100 composants. 11. Un laboratoire
    commence avec 50 flacons de produits chimiques et termine avec 40, ce qui représente une diminution de 10 flacons. 12.
    Une société de nettoyage commence avec 200 litres de produits et finit avec 250 litres, montrant une augmentation de 50
    litres. 13. Une pépinière débute avec 300 plants et termine avec 250, indiquant une diminution de 50 plants. 14. Un fleuriste
    commence l''année avec 100 bouquets de fleurs et termine avec 120, représentant une augmentation de 20 bouquets. 15. Une
    brasserie débute avec 2000 litres de bière en stock et termine avec 1800 litres, indiquant une diminution de 200 litres.'
  - 'Les rabais, remises et ristournes sont des réductions accordées sur le prix d''achat de marchandises, permettant d''économiser
    de l''argent lors de l''achat.


    1. Un magasin offre un rabais de 20% sur une paire de chaussures à 100€, donc le client paie 80€. 2. Lors d''une promotion,
    un livre coûtant 15€ bénéficie d''une remise de 3€, le client le paie 12€. 3. Un fournisseur accorde une ristourne de
    5% sur une commande de 1 000€, ce qui réduit le coût à 950€. 4. Un supermarché applique une remise de 10% sur un panier
    de courses de 50€, le total s''élève à 45€. 5. Un client fidèle reçoit un rabais de 10€ sur son prochain achat après avoir
    dépensé 100€ dans une boutique. 6. Une entreprise achète des fournitures de bureau et reçoit un rabais de 15% pour une
    commande supérieure à 200€. 7. Un client achète une télévision à 800€ avec une remise de 100€, le prix final est de 700€.
    8. En fin de saison, un magasin de vêtements propose des remises allant jusqu''à 50% sur les articles non vendus. 9. Un
    restaurant offre une remise de 20% sur le total de l''addition pour les groupes de plus de 10 personnes. 10. Lors d''un
    salon, une entreprise accorde un rabais de 30% sur ses produits aux clients qui s''inscrivent à sa newsletter. 11. Une
    boutique en ligne propose une ristourne de 5€ sur une commande de 50€ ou plus. 12. Un grossiste offre une remise de 10%
    aux clients qui paient comptant. 13. Un distributeur accorde un rabais de 15% sur les produits en promotion pour attirer
    plus de clients. 14. Pendant les soldes, un article à 200€ peut bénéficier d''une réduction de 40%, le vendant à 160€.
    15. Un club de loisirs offre une remise de 25% pour les nouveaux membres sur leur première inscription.'
