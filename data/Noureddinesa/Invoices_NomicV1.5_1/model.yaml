      de rechange stockées. 10. Achat de matériel de sécurité pour un événement spécifique. 11. Coût de la publicité sur les
      réseaux sociaux. 12. Paiement pour des services de conseil ponctuels. 13. Achat de billets de transport pour des déplacements
      professionnels. 14. Dépenses pour des formations professionnelles non prévues à long terme. 15. Achat de supports de
      communication pour un événement temporaire.'
    - 'Les charges sociales diverses désignent les coûts engagés par une entreprise pour le bien-être et la protection de
      ses employés. Cela inclut les cotisations à des assurances, les prestations de retraite, le financement d''œuvres sociales,
      la fourniture de vêtements de travail, et d''autres indemnisations et services liés à la santé et aux conditions de
      travail des salariés.


      1. Cotisations pour une assurance santé collective des employés.

      2. Versements pour la retraite complémentaire des anciens salariés.

      3. Financement des activités du comité d''entreprise, comme des événements sociaux.

      4. Distribution de vêtements de travail pour les employés de l''usine.

      5. Indemnités versées lors d''un licenciement sans préavis.

      6. Cotisations pour des services de santé au travail pour surveiller la santé des employés.

      7. Achats de médicaments pour la trousse de premiers secours de l''entreprise.

      8. Paiement de subventions pour la crèche accueillant les enfants des employés.

      9. Organisation de colonies de vacances pour les enfants des salariés.

      10. Frais liés à des formations professionnelles proposées aux employés.

      11. Contributions pour des cantines d''entreprise offrant des repas aux salariés.

      12. Couverture des frais médicaux en cas d''accident du travail.

      13. Aide financière pour les employés en difficulté financière.

      14. Soutien aux activités sportives ou culturelles organisées pour les employés.

      15. Participation aux frais de transport pour faciliter le trajet domicile-travail.'
  - source_sentence: La dépense est pour l'achat de billets de transport pour permettre aux employés de se rendre à un événement
      professionnel.
    sentences:
    - 'Les achats non stockés de matières et de fournitures concernent les biens et services que l''entreprise utilise directement
      sans les conserver en stock, comme l''eau, l''électricité et d''autres fournitures jugées non nécessaires à stocker.


      1. Achat d''eau pour les besoins d''une cantine d''entreprise. 2. Facture d''électricité pour le fonctionnement des
      bureaux. 3. Achat de papier et fournitures de bureau pour des projets ponctuels. 4. Achat de services de nettoyage pour
      les locaux de l''entreprise. 5. Paiement d''un abonnement à un service de cloud pour le stockage de données. 6. Achat
      de carburant pour les véhicules de l''entreprise. 7. Coût des services de télécommunication pour les employés. 8. Achat
      de petits outils utilisés lors de réparations, sans gestion de stock. 9. Frais d''entretien d''équipements sans pièces
      de rechange stockées. 10. Achat de matériel de sécurité pour un événement spécifique. 11. Coût de la publicité sur les
      réseaux sociaux. 12. Paiement pour des services de conseil ponctuels. 13. Achat de billets de transport pour des déplacements
      professionnels. 14. Dépenses pour des formations professionnelles non prévues à long terme. 15. Achat de supports de
      communication pour un événement temporaire.'
    - 'Les installations techniques sont des ensembles de biens, matériels et constructions, qui fonctionnent ensemble. La
      séparation de l''un d''eux compromet l''utilité des autres. Par exemple, une salle de serveurs est une installation
      technique si elle est spécialement conçue pour accueillir des équipements informatiques, et retirer ces équipements
      rend la salle inutile.


      1. Une salle de serveurs dédiée à des ordinateurs.

      2. Un système de climatisation installé pour maintenir la température dans une usine.

      3. Un ascenseur conçu uniquement pour desservir un bâtiment commercial.

      4. Un réseau de plomberie dans un immeuble résidentiel.

      5. Un système électrique spécifique à une chaîne de production.

      6. Un laboratoire équipé de matériels scientifiques spécialisés.

      7. Une cuisine professionnelle intégrée dans un restaurant.

      8. Un parc de stationnement construit uniquement pour les véhicules d''une entreprise.

      9. Un système de sécurité installé pour protéger un site industriel.

      10. Une ligne de production automatisée dans une usine.

      11. Un réservoir de stockage de produits chimiques dans une usine.

      12. Une salle de conférence équipée de matériel audiovisuel.

      13. Un entrepôt conçu pour stocker des marchandises avec des étagères fixes.

      14. Un équipement de filtration dans une station d''épuration.

      15. Une centrale électrique dédiée à alimenter un quartier en énergie.'
    - 'La rémunération de l''exploitant correspond à la compensation financière versée à une personne qui gère une entreprise
      individuelle. Cela inclut également les contributions qu''il effectue pour sa propre sécurité sociale et retraite.


      1. Un artisan reçoit un paiement pour son travail en tant qu''exploitant d''un atelier. 2. Un agriculteur perçoit un
      salaire pour la gestion de sa ferme. 3. Un consultant facture ses services et se verse une rémunération. 4. Un propriétaire
      de restaurant reçoit une rémunération pour sa gestion quotidienne. 5. Un commerçant se verse un salaire mensuel pour
      son travail dans sa boutique. 6. Un freelance s''établit un revenu à partir de ses contrats. 7. Un chauffeur de taxi
      exploitant son propre véhicule se verse un salaire. 8. Un écrivain indépendant reçoit des paiements pour ses publications
      et se rémunère. 9. Un coach sportif s''auto-rémunère pour ses sessions de coaching. 10. Un graphiste indépendant facture
      ses clients et se verse une partie de ses gains. 11. Un photographe professionnel vend des services et s''établit un
      salaire. 12. Un propriétaire de société de nettoyage se verse une rémunération pour son travail. 13. Un technicien de
      maintenance indépendant reçoit un paiement et se rémunère. 14. Un musicien gérant sa propre carrière se verse des honoraires
      après ses concerts. 15. Un web entrepreneur se fixe un salaire à partir des bénéfices générés par son site.'
  - source_sentence: L'achat concerne des emballages en plastique pour protéger des produits fragiles lors de leur transport
      dans l'industrie.
    sentences:
    - 'Les achats d''emballages concernent l''acquisition de matériaux utilisés pour conditionner des produits, incluant les
      emballages perdus, récupérables et à usage mixte.


      1. Achat de cartons pour expédier des marchandises. 2. Acquisition de bouteilles en plastique pour une boisson. 3. Commande
      de tonneaux en métal pour le stockage. 4. Récupération de caisses en bois d''un fournisseur. 5. Achat de sacs en papier
      pour des produits alimentaires. 6. Commande d''emballages en polystyrène pour protéger des objets fragiles. 7. Utilisation
      de bouteilles en verre pour des jus de fruits. 8. Acquisition d''emballages biodégradables pour des produits cosmétiques.
      9. Achat de film plastique pour envelopper des palettes. 10. Commande de boîtes en métal pour des conserves. 11. Récupération
      d''emballages à usage mixte pour un événement. 12. Achat de barquettes en plastique pour des plats à emporter. 13. Commande
      de pots en verre pour des confitures. 14. Utilisation de caisses en carton pour le transport de vêtements. 15. Achat
      de sachets en plastique pour des produits en vrac.'
    - 'Le matériel de bureau désigne l''ensemble des équipements utilisés dans un bureau pour faciliter le travail administratif
      et organisationnel.


      1. Une photocopieuse utilisée pour reproduire des documents. 2. Un ordinateur personnel pour gérer des fichiers et communiquer
      par email. 3. Une machine à écrire pour rédiger des lettres. 4. Un scanner pour numériser des documents. 5. Des chaises
      ergonomiques pour le confort des employés. 6. Un bureau pour travailler. 7. Des fournitures de papeterie comme des stylos
      et des blocs-notes. 8. Un projecteur pour faire des présentations. 9. Un tableau blanc pour brainstormer des idées.
      10. Un fax pour envoyer des documents rapidement. 11. Des classeurs pour organiser les papiers. 12. Un téléphone pour
      la communication interne et externe. 13. Une imprimante pour produire des copies physiques de documents. 14. Un agenda
      pour planifier des réunions et des tâches. 15. Des câbles et accessoires pour connecter les appareils électroniques.'
    - 'Les autres charges à répartir sont des frais significatifs qui ne peuvent pas être entièrement couverts dans une seule
      période comptable et doivent donc être étalés sur plusieurs exercices. Cela inclut, par exemple, les coûts liés à des
      projets de recherche ou d''autres investissements à long terme.


      1. Coûts de lancement d''un produit étalés sur plusieurs années. 2. Frais de formation des employés répartis sur plusieurs
      exercices. 3. Dépenses de publicité pour une campagne qui dure plusieurs mois ou années. 4. Coûts de rénovation d''un
      bâtiment amortis sur plusieurs années. 5. Investissements en technologie étalés sur la durée de vie de l''équipement.
      6. Charges liées à un contrat de service de plusieurs années. 7. Dépenses pour un événement annuel réparties sur plusieurs
      exercices. 8. Coûts de développement d''un logiciel amortis sur sa durée d''utilisation. 9. Frais juridiques pour un
      procès étalés sur les années de litige. 10. Dépenses d''acquisition d''une licence réparties sur sa durée de validité.
      11. Coûts liés à un projet de construction amortis sur la durée de vie du bâtiment. 12. Dépenses de recherche scientifique
      étalées sur plusieurs années de recherche. 13. Frais d''adhésion à des associations professionnelles répartis sur la
      durée de l''adhésion. 14. Coûts de marketing pour un nouveau produit répartis sur plusieurs mois. 15. Dépenses de mise
      à niveau d''équipement réparties sur plusieurs exercices.'
  - source_sentence: Des frais ont été engagés pour une stratégie de contenu axée sur la production de podcasts diffusés sur
      plusieurs plateformes.
    sentences:
    - 'Les rabais, remises et ristournes sont des réductions accordées sur le prix d''achat de marchandises, permettant d''économiser
      de l''argent lors de l''achat.


      1. Un magasin offre un rabais de 20% sur une paire de chaussures à 100€, donc le client paie 80€. 2. Lors d''une promotion,
      un livre coûtant 15€ bénéficie d''une remise de 3€, le client le paie 12€. 3. Un fournisseur accorde une ristourne de
      5% sur une commande de 1 000€, ce qui réduit le coût à 950€. 4. Un supermarché applique une remise de 10% sur un panier
      de courses de 50€, le total s''élève à 45€. 5. Un client fidèle reçoit un rabais de 10€ sur son prochain achat après
      avoir dépensé 100€ dans une boutique. 6. Une entreprise achète des fournitures de bureau et reçoit un rabais de 15%
      pour une commande supérieure à 200€. 7. Un client achète une télévision à 800€ avec une remise de 100€, le prix final
      est de 700€. 8. En fin de saison, un magasin de vêtements propose des remises allant jusqu''à 50% sur les articles non
      vendus. 9. Un restaurant offre une remise de 20% sur le total de l''addition pour les groupes de plus de 10 personnes.
      10. Lors d''un salon, une entreprise accorde un rabais de 30% sur ses produits aux clients qui s''inscrivent à sa newsletter.
      11. Une boutique en ligne propose une ristourne de 5€ sur une commande de 50€ ou plus. 12. Un grossiste offre une remise
      de 10% aux clients qui paient comptant. 13. Un distributeur accorde un rabais de 15% sur les produits en promotion pour
      attirer plus de clients. 14. Pendant les soldes, un article à 200€ peut bénéficier d''une réduction de 40%, le vendant
      à 160€. 15. Un club de loisirs offre une remise de 25% pour les nouveaux membres sur leur première inscription.'
    - 'Les primes d''assurances sont des paiements effectués pour obtenir une couverture financière contre divers risques,
      tels que le vol ou l''incendie, ainsi que pour protéger les biens et les personnes liés à une entreprise.


      1. Une entreprise paie une prime d''assurance pour protéger ses locaux contre les incendies. 2. Un commerçant souscrit
      une assurance pour couvrir le vol de ses marchandises. 3. Une société paie des primes pour assurer ses employés contre
      les accidents de travail. 4. Un constructeur d''appartements prend une assurance contre les dommages causés à des tiers
      lors des travaux. 5. Une entreprise de transport paye une prime pour assurer ses camions contre les accidents. 6. Un
      restaurant souscrit une assurance responsabilité civile pour couvrir d''éventuels accidents survenus à ses clients.
      7. Une boutique de vêtements paie une prime d''assurance pour protéger son stock contre les inondations. 8. Un cabinet
      médical s''assure contre les risques de poursuites légales. 9. Une entreprise de construction paie une prime d''assurance
      pour couvrir les dommages causés à son matériel. 10. Une société de location de voitures souscrit une assurance pour
      couvrir les dommages causés aux véhicules par les clients. 11. Un propriétaire d''immeuble paie une prime pour assurer
      son bien contre les catastrophes naturelles. 12. Une société d''événementiel prend une assurance pour se protéger contre
      les annulations d''événements. 13. Un agriculteur souscrit une assurance contre les pertes de récolte dues aux intempéries.
      14. Une entreprise de nettoyage paie des primes pour couvrir les dommages potentiels causés aux locaux de ses clients.
      15. Un studio de photographie s''assure contre la perte ou les dommages de son équipement.'
    - 'Les frais de publicité sont des dépenses engagées pour promouvoir un produit ou un service, souvent réparties sur plusieurs
      années, comme les frais de participation à des foires ou l''impression de grandes quantités de catalogues.


      1. Participer à un salon professionnel pour présenter une nouvelle gamme de produits. 2. Imprimer 10 000 brochures pour
      une campagne marketing. 3. Louer un espace publicitaire dans un magazine pendant plusieurs mois. 4. Développer une campagne
      publicitaire à la télévision sur plusieurs semaines. 5. Créer et diffuser une série de publicités sur les réseaux sociaux
      pendant un an. 6. Concevoir un site web pour promouvoir un événement sur plusieurs années. 7. Organiser un événement
      de lancement avec des frais répartis sur plusieurs mois. 8. Distribuer des échantillons gratuits dans les supermarchés
      sur une période prolongée. 9. Produire des vidéos promotionnelles qui seront utilisées pendant plusieurs saisons. 10.
      Acheter des panneaux d''affichage pour une campagne de longue durée. 11. S''engager dans un partenariat de co-marketing
      sur plusieurs années. 12. Imprimer des affiches publicitaires pour plusieurs événements au cours de l''année. 13. Sponsoriser
      une équipe sportive avec des frais étalés sur plusieurs saisons. 14. Récupérer les coûts de publicité d''une campagne
      de référencement payant sur plusieurs mois. 15. Concevoir une stratégie de contenu sur un blog qui s''étend sur une
      année.'
  - source_sentence: L'entreprise a acheté des tables de réunion pour créer un espace collaboratif dans un open space.
    sentences:
    - 'Le matériel et outillage désignent les machines et outils utilisés dans l''industrie pour extraire, transformer et
      conditionner des matières premières. Ils permettent d''effectuer des tâches spécifiques et d''améliorer l''efficacité
      des opérations.


      1. Une presse hydraulique utilisée pour façonner des métaux. 2. Des scies à chaîne pour couper du bois dans une scierie.
      3. Des machines à coudre dans une usine de textile. 4. Un four industriel pour cuire des produits alimentaires. 5. Des
      chariots élévateurs pour déplacer des palettes en entrepôt. 6. Un compresseur d''air utilisé pour alimenter des outils
      pneumatiques. 7. Une ligne de production automatisée pour assembler des appareils électroniques. 8. Des équipements
      de laboratoire pour analyser des échantillons. 9. Des outils de jardinage comme des tondeuses et des débroussailleuses.
      10. Un scanner 3D utilisé dans la fabrication additive. 11. Des machines à imprimer dans une imprimerie. 12. Un broyeur
      pour réduire la taille des matières premières. 13. Des équipements de conditionnement pour emballer des produits. 14.
      Un pont roulant pour soulever des charges lourdes dans une usine. 15. Des outils manuels comme des tournevis et des
      clés à molette utilisés par des techniciens.'
    - 'Les autres frais préliminaires sont des dépenses nécessaires pour établir ou développer une entreprise, engagées lors
      de sa création ou par la suite.


      1. Frais de notaire pour la création de l''entreprise. 2. Coût des études de marché avant le lancement d''un produit.
      3. Honoraires d''un consultant pour un plan d''affaires. 4. Dépenses liées à la recherche de locaux commerciaux. 5.
      Frais pour l''enregistrement d''une marque. 6. Coût de la publicité avant l''ouverture d''un magasin. 7. Dépenses pour
      des formations initiales des employés. 8. Frais de création de site internet. 9. Coût des licences nécessaires pour
      exercer une activité. 10. Dépenses pour l''achat de matériel de bureau avant le démarrage. 11. Frais de rédaction des
      statuts juridiques de l''entreprise. 12. Dépenses de voyage pour rencontrer des partenaires commerciaux potentiels.
      13. Coût des services d''un comptable pour préparer les documents fiscaux. 14. Frais de participation à des salons professionnels
      pour se faire connaître. 15. Coût de l''assurance entreprise pour démarrer en toute sécurité.'
    - 'Le mobilier de bureau désigne l''ensemble des meubles utilisés dans un espace de travail, tels que les bureaux, chaises,
      tables et rangements, qui contribuent à l''organisation et au confort des employés.


      1. Un bureau en bois massif dans un cabinet d''architecte. 2. Des chaises ergonomiques dans une salle de réunion. 3.
      Un espace de travail avec des tables modulables dans une start-up. 4. Des étagères pour ranger des dossiers dans un
      bureau administratif. 5. Un comptoir d''accueil dans une entreprise. 6. Des fauteuils confortables dans une salle d''attente.
      7. Un bureau debout pour favoriser une meilleure posture. 8. Des meubles de rangement pour les fournitures de bureau.
      9. Une table de conférence pour les réunions d''équipe. 10. Un bureau partagé dans un espace de coworking. 11. Des casiers
      pour les effets personnels des employés. 12. Un meuble TV dans une salle de pause. 13. Des panneaux de séparation pour
      créer des espaces privés. 14. Des meubles de rangement pour l''équipement informatique. 15. Une table ronde pour favoriser
      la collaboration.'
