      \ debajo de la confluencia con el cauce receptor de las aguas de"
    - "Las áreas \nintervenidas serán rellenadas con suelo natural, preparadas y restauradas con cobertura \nde suelo de valor\
      \ edafológico. \nRetiro de todos los acopios de mineral en las canchas de stock-pile. \nNivelación, sellado con limos\
      \ arcillosos y cobertura de suelo de valor edafológico de las \npilas de lixiviación. \nEvaluación de la estabilidad\
      \ final, física y química de las pilas de lixiviación. \nMantención y limpieza de los canales de evacuación de aguas\
