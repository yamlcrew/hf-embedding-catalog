      \ cota 2540 -  \n2530 msnm, de acuerdo a los sondajes que se han realizado en el área. Considerando que la \nelevación\
      \ media del área de trabajo es de aproximadamente 2720 msnm, la profundidad de la \nnapa está alrededor de 180 a190\
      \ m.  \n \nEl área en estudio se ubica íntegramente al interior de la cuenca hidrográfica de Quebrada de \nTaltal, lugar\
      \ en que las formaciones rocosas son especialmente mesozoicas y prácticamente \nimpermeables de modo que en donde estas\
      \ asoman (afloramientos o cerros islas) constituyen \nbarreras muy efectivas que dificultan los escurrimientos de aguas,\
      \ tanto de superficie como \nsubterráneas. \n \nEl acuífero principal que drena sus aguas subterráneas a Mina Guanaco\
      \ tiene una sup erficie \nmínima del orden de los 90 km2, con cajón principal de descarga o geocanal de un ancho \n\
      medio superior a 4 km y un espesor saturado asociable a 60 m deducido a partir de la \ninterpretación de perfiles estratigráficos\
      \ de pozos situados al costado nort e de Quebrada \nVaritas. La transmisibilidad oscila entre los 0,6 a 1,58 m2/día.\
      \ \n \n5.1.7. Vegetación y Flora \n \nDe acuerdo a la información bibliográfica existente, relacionada con proyectos\
      \ de desarrollo \nminero en el Distrito Guanaco, el área de interés corresponde a una zona de ecotono, es decir, \n\
      es un lugar de transición entre el desierto interior de Taltal y el desierto montano de la cordillera \nde Domeyko."
    - "132/04, para finalmente obtener la aprobación de la \nautoridad. \n- Aspectos relativos a la estabilidad química del\
      \ Tranque de Relave N°4, exigidos por el D.S. \n248/07. \nLa ingeniería de detalle (abordados en los Anexos 2 y 3; Informe\
