      \ Cierre (Decreto 41 de 2012 del \nMinisterio de Minería), y complementadas con  las actividades necesarias para mantener\
      \ la estabilidad física \ny química del sitio en el largo plazo.  \n \nLas instalaciones que involucra la siguiente\
      \ evaluación corresponden a las mostradas en la Tabla 5.8. \n \nTabla 5.8: Infraestructura de la Planta Catemu aplicable\
      \ a la evaluación de riesgos  \nInstalaciones auxiliares – Planta Catemu \nPatio RISES Vertedero de borras SX \nBodega\
