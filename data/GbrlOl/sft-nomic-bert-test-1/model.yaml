  - source_sentence: ¿Cuáles son las instalaciones auxiliares de la Planta Catemu aplicables a la evaluación de riesgos?
    sentences:
    - "13 La medida “lavado de ripios con agua” corresponde a un compromiso adquirido por medio de las Resoluciones de \n\
      Calificación Ambiental N°1564/2007 y N°095/2011, de los Proyectos “Ampliación I Planta Catemu” y “Ampliación II Planta\
      \ \nCatemu” respectivamente."
    - "3.11.2.2.   Depositación y Compactación de los Relaves Filtrados  \nUna vez en la zona de depositación los camiones\
      \ descargarán los relaves filtrados para ser esparcidos y \ncompactados mediante un buldózer y rodillo vibratorio liso\
      \ de peso estático no inferior a 8 t. La secuencia \nde llenado del depósito propone iniciar la depositación de relaves\
      \ desde el sector del Muro de \nConfinamiento Frontal ubicado al Oriente del sitio usando como acceso el mismo Muro\
      \ y la zona del dren \nalfombra.  \nDe acuerdo con esto se propone cargar el depósito en capas de 2 m de altura en forma\
      \ secuencial hasta \ncubrir todo el depósito. Para cubrir la etapa 1, correspondiente a la primera capa de 2 m, se estima\
      \ un \ntiempo del orden de 9 meses, tiempo suficiente para que se desarrolle gran parte de la consolidación \nproducto\
      \ de la sobrecarga aplicada. Una vez cubierta la etapa 1 con 2 m de depositación de relaves se \nprocede a depositar\
      \ la segunda capa de 2 m de espesor para completar 4 m de altura. Con esta ultima \ndepositación se dispondrá del orden\
      \ de 9 meses adicionales para la acumulación de material de estéril de \nmina y la construcción de los drenes de la\
      \ etapa 2. Paralelo a la colocación de material de relaves se \ndeberá colocar un sistema de monitoreo de nivel freático\
      \ mediante la instalación de piezómetros, de \nmanera de verificar eventuales aumentos de presión de poros por la carga\
      \ de relaves depositados.  \n3.11.2.3.   Manejo de Aguas  \nEl proyecto considera la segregación de las aguas con el\
      \ fin de evitar impactos sobre los recursos hídricos \nde la zona. Se distinguen tres formas de manejo de las aguas,\
      \ de acuerdo a sus características."
    - "5.3.3 Evaluación de riesgos instalaciones auxiliares \n \nLos rellenos sanitarios y sitios de almacenamiento temporal\
      \ de residuos existentes en el área de la faena  \nminera quedarán sujeto a las medidas resultantes de los compromisos\
