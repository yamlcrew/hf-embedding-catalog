- source_sentence: ¿Cuáles son las obras necesarias para cumplir con los tiempos de retornos en el proyecto de cierre?
  sentences:
  - "o Evaluar y diseñar un vertedero de emergencia y una conducción para la descarga de las \naguas que se acumulen en la\
    \ cubeta, y que sobrepasen el pretil de protección. \nLa ingeniería de detalle de la estabilidad de los muros y considerados\
    \ en el D.S. N° 132/04, se indica en el \nInforme Técnico de Estabilidad de Talud, incluido en el Anexo 3, del presente\
    \ documento. \nII. Estabilidad de Taludes  \no Verificar la estabilidad del muro de arena a través de método pseudoestático\
    \ y post-sísmico \npara un coeficiente sísmico acorde al “Sismo Máximo Creíble” (Kh  = 0,14).  \no Indica que, en caso\
    \ de existir bajos factores de seguridad, se tomarán medidas como tender \nel talud y/o colocar estructuras de contención\
    \ mediante enrocados.  \nIII. Construcción de Muro de Protección al Pie del Talud  \no Contemplar un enrocado de protección\
    \ en todo el sector donde hay gaviones.  \no En el resto de los sectores del pie del muro de arena se contempla un muro\
    \ de protección \nde enrocado de 2m de altura.  \nPor otro lado, los aspectos técnicos señalados en el artículo 495 (Título\
    \ X) del D.S. N° 132/04 y que forman \nparte de este documento, son:"
  - "38 \nsuperficiales o subterráneas es cero para años con probabilidad de excedencia del 50% (años \nen que llueve el promedio\
    \ o bajo el promedio).  \nLa elevación media de la napa subterránea en el área de trabajo se encuentra en la cota 2540\
    \ -  \n2530 msnm, de acuerdo a los sondajes que se han realizado en el área. Considerando que la \nelevación media del\
    \ área de trabajo es de aproximadamente 2720 msnm, la profundidad de la \nnapa está alrededor de 180 a190 m.  \n \nEl\
    \ área en estudio se ubica íntegramente al interior de la cuenca hidrográfica de Quebrada de \nTaltal, lugar en que las\
    \ formaciones rocosas son especialmente mesozoicas y prácticamente \nimpermeables de modo que en donde estas asoman (afloramientos\
    \ o cerros islas) constituyen \nbarreras muy efectivas que dificultan los escurrimientos de aguas, tanto de superficie\
    \ como \nsubterráneas. \n \nEl acuífero principal que drena sus aguas subterráneas a Mina Guanaco tiene una sup erficie\
    \ \nmínima del orden de los 90 km2, con cajón principal de descarga o geocanal de un ancho \nmedio superior a 4 km y un\
    \ espesor saturado asociable a 60 m deducido a partir de la \ninterpretación de perfiles estratigráficos de pozos situados\
    \ al costado nort e de Quebrada \nVaritas. La transmisibilidad oscila entre los 0,6 a 1,58 m2/día. \n \n5.1.7. Vegetación\
    \ y Flora \n \nDe acuerdo a la información bibliográfica existente, relacionada con proyectos de desarrollo \nminero en\
    \ el Distrito Guanaco, el área de interés corresponde a una zona de ecotono, es decir, \nes un lugar de transición entre\
    \ el desierto interior de Taltal y el desierto montano de la cordillera \nde Domeyko."
  - "132/04, para finalmente obtener la aprobación de la \nautoridad. \n- Aspectos relativos a la estabilidad química del\
    \ Tranque de Relave N°4, exigidos por el D.S. \n248/07. \nLa ingeniería de detalle (abordados en los Anexos 2 y 3; Informe\
    \ Técnico Diseño Hidráulico e Informe \nEstabilidad de Taludes, respectivamente) que es parte del sustento de este proyecto\
    \ y de los criterios \nplanteados en el presente Proyecto de Cierre, se centra principalmente en crear las obras necesarias\
    \ \npara cumplir con los tiempos de retornos. Estas obras son: \n- Canal Perimetral de contorno, para impedir el ingreso\
    \ de aguas lluvias desde las zonas \naledañas a la cubeta, asociado a un periodo de retorno de 20 años. \n- Defensas ribereñas,\
    \ para proteger el muro del tranque de las crecidas del Río Ligua, asociado \na un periodo de retorno de 10.000 años.\
    \ \n- Vertedero, cuyas aguas son manejadas mediante una conducción hasta una piscina de \nemergencia, la cual tiene como\
    \ objetivo almacenar y retener este volumen para su \nevaporación. \n- Obras destinadas a la estabilidad del muro. \n\
    La información utilizada para el desarrollo de este documento es: \n- Topografía del sitio: Levantamiento previo al emplazamiento\
    \ del depósito de relaves, y \nlevantamiento de las instalaciones actuales; \n- Dimensiones del Tranque (Cubicaciones\
    \ y disposición del relave); \n- Caracterización de Materiales: Relave (arenas y lamas), potenciales fuentes de empréstito,\
    \ \nsuelo de fundación; \n- Antecedentes sobre la Geología del lugar; \n- Hidrogeología e hidrología; \n- Recopilación\
    \ de Antecedentes Pluviométricos y Fluviométricos."
