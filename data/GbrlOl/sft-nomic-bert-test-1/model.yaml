- source_sentence: ¿Cuáles son las instalaciones auxiliares de la Planta Catemu aplicables a la evaluación de riesgos?
  sentences:
  - "13 La medida “lavado de ripios con agua” corresponde a un compromiso adquirido por medio de las Resoluciones de \nCalificación\
    \ Ambiental N°1564/2007 y N°095/2011, de los Proyectos “Ampliación I Planta Catemu” y “Ampliación II Planta \nCatemu”\
    \ respectivamente."
  - "3.11.2.2.   Depositación y Compactación de los Relaves Filtrados  \nUna vez en la zona de depositación los camiones descargarán\
    \ los relaves filtrados para ser esparcidos y \ncompactados mediante un buldózer y rodillo vibratorio liso de peso estático\
    \ no inferior a 8 t. La secuencia \nde llenado del depósito propone iniciar la depositación de relaves desde el sector\
    \ del Muro de \nConfinamiento Frontal ubicado al Oriente del sitio usando como acceso el mismo Muro y la zona del dren\
    \ \nalfombra.  \nDe acuerdo con esto se propone cargar el depósito en capas de 2 m de altura en forma secuencial hasta\
    \ \ncubrir todo el depósito. Para cubrir la etapa 1, correspondiente a la primera capa de 2 m, se estima un \ntiempo del\
    \ orden de 9 meses, tiempo suficiente para que se desarrolle gran parte de la consolidación \nproducto de la sobrecarga\
    \ aplicada. Una vez cubierta la etapa 1 con 2 m de depositación de relaves se \nprocede a depositar la segunda capa de\
    \ 2 m de espesor para completar 4 m de altura. Con esta ultima \ndepositación se dispondrá del orden de 9 meses adicionales\
    \ para la acumulación de material de estéril de \nmina y la construcción de los drenes de la etapa 2. Paralelo a la colocación\
    \ de material de relaves se \ndeberá colocar un sistema de monitoreo de nivel freático mediante la instalación de piezómetros,\
    \ de \nmanera de verificar eventuales aumentos de presión de poros por la carga de relaves depositados.  \n3.11.2.3. \
    \  Manejo de Aguas  \nEl proyecto considera la segregación de las aguas con el fin de evitar impactos sobre los recursos\
    \ hídricos \nde la zona. Se distinguen tres formas de manejo de las aguas, de acuerdo a sus características."
  - "5.3.3 Evaluación de riesgos instalaciones auxiliares \n \nLos rellenos sanitarios y sitios de almacenamiento temporal\
    \ de residuos existentes en el área de la faena  \nminera quedarán sujeto a las medidas resultantes de los compromisos\
    \ ambientales y sectoriales adquiridos \npor la Planta Catemu, las medidas sugeridas por el Reglamento de la Ley de Cierre\
    \ (Decreto 41 de 2012 del \nMinisterio de Minería), y complementadas con  las actividades necesarias para mantener la\
    \ estabilidad física \ny química del sitio en el largo plazo.  \n \nLas instalaciones que involucra la siguiente evaluación\
    \ corresponden a las mostradas en la Tabla 5.8. \n \nTabla 5.8: Infraestructura de la Planta Catemu aplicable a la evaluación\
    \ de riesgos  \nInstalaciones auxiliares – Planta Catemu \nPatio RISES Vertedero de borras SX \nBodega de residuos peligrosos\
    \ Bodega de residuos domésticos \n \n \ni. Características propias de la Instalación"
- source_sentence: 'cuál es el metodo de compactacion del muro de embalse: proctor modificado, proctor normal o densidad relativa?'
  sentences:
  - "39 \nescasos ejemplares de Portucalaceae ( Calandrinia) y Papilionaceae ( Adesmia del grupo \ninerme).  \nEn contraposición,\
    \ en el área de las quebradas se distinguen Pastos Largos y Las Mulas por la \ndiversidad de especies vegetales que albergan.\
    \ En Pastos Largos sobresalen las Familias \nAsteraceae, Papilionaceae y Poaceae, tales como Senecio sp., Adesmia sp.\
    \ y Stipa sp., \nrespectivamente. En la Quebrada Las Mulas, se destaca en la flora arbustiva la Adesmia spp., \nEphedra\
    \ breana y Gymnophyton spinosissimum . Es rescatable la presencia de pequeños \nhumedales establecidos en las laderas\
    \ de la quebrada, donde se encuentran herbáceas \ncespitosas como Deyeuxia sp. De todas las especies de flora encontradas,\
    \ sólo una tiene \nproblemas de conservación. Se trata del cactus Opuntia conoidea la cual está cl asificada como \nrara\
    \ por su rango de distribución restringido, desde Ollague hasta Talabre. \n \n5.1.8. Fauna \n \nEn las campañas de Marzo\
    \ de 2006 y Febrero de 2007 también fue prospectada la componente \nfauna (línea base), determinándose que los sitios\
    \ con mayor número d e especies corresponden \na las quebradas Pastos Largos y Punta del Viento, seguidas por Varitas\
    \ y Las Mulas.  \n \nLos sitios con menor riqueza corresponden al área Mina con sólo 8 especies registradas. En el \n\
    área Mina destaca la presencia de reptiles y las bandadas de aves granívoras (chirihues) que \nsobrevuelan todo el sector\
    \ y ejemplares de gorriones ( Passer domesticus), especie introducida \nlocalizada puntualmente en el área del campamento."
  - "En Adenda Nº 1 el titular señala que  “las aguas que infiltren a través del depósito de relaves filtrados \n(aguas de\
    \ contacto) serán recogidas por el sistema de drenaje basal y se mezclaran con las aguas que \nemergen desde el acuífero\
    \ que subyace en la zona de emplazamiento del depósito. La mezcla será \ndescargada (en D) al curso de agua que se ubica\
    \ aguas abajo del depósito de relaves, el que después de \nrecorrer unos 500 metros descarga al estero San Antonio. Como\
    \ se puede apreciar en el Anexo B de la \nDIA, y que es nuevamente presentado con mayores detalles en el Anexo A de la\
    \ presente Adenda, no \nexisten efectos significativos sobre los recursos hídricos del sector, producto de esta descarga.\
    \ Sin \nperjuicio de lo anterior, en el caso que los monitoreos detecten que el agua proveniente del Sistema de \nDrenaje\
    \ Basal no se comporte de acuerdo a lo esperado, estas aguas pueden ser derivadas a la piscina \nde sedimentación para\
    \ luego ser consumidas en la Planta Concentradora o ser enviadas al sistema de \nmanejo de aguas minas (aguas de contacto)\
    \ que posee SCMET y que se encuentra debidamente \nautorizado .”  \nCalidad de las Aguas  \nAdenda N°2 SCMET propone que\
    \ los niveles de calidad que detonaran el envío de las aguas de contacto, \nrecolectadas por el Sistema de Drenaje Basal,\
    \ hacia la Piscina de Sedimentación sean la superación de \numbrales (en el estero San Antonio aguas debajo de la confluencia\
    \ con el cauce receptor de las aguas de"
  - "Las áreas \nintervenidas serán rellenadas con suelo natural, preparadas y restauradas con cobertura \nde suelo de valor\
    \ edafológico. \nRetiro de todos los acopios de mineral en las canchas de stock-pile. \nNivelación, sellado con limos\
    \ arcillosos y cobertura de suelo de valor edafológico de las \npilas de lixiviación. \nEvaluación de la estabilidad final,\
    \ física y química de las pilas de lixiviación. \nMantención y limpieza de los canales de evacuación de aguas lluvias.\
    \ \nRecubrimiento de superficies intervenidas con edificaciones mediante suelo de valor \nedafológico para su restauración\
    \ vegetal. \nPlan de revegetación de suelos intervenidos y reforestación con especies nativas. \nRecubrimiento de cubetas\
    \ y piscinas, mediante suelo natural compactado y cobertura de \nsuelo de valor edafológico para su restauración. \nNeutralización\
    \ de fosas sépticas y pozos absorbentes, con cal, recubrimiento con suelo \nnatural compactado en condiciones  de humedad\
    \ y cobertura de suelo de valor \nedafológico para su restauración. \nRecubrimiento de excavaciones menores, y nivelado\
    \ de montículos. \nSeñalética de advertencia y riesgo de planta minera abandonada. \nCierre de accesos a sectores de riesgos\
    \ y eliminación de caminos de tránsito para su \nrestauración. \nConstrucción de barreras que limiten el acceso de animales\
    \ que puedan tener o adquirir \nel hábito de tránsito por sectores de riesgos. \nLimpieza general de escombros, desechos,\
    \ residuos y derrame s que serán  dispuestos \nfinalmente en el vertedero autorizado. \nPlan de Revegetación, se presentara\
    \ con al menos un año de anticipación a la finalización \nde las faenas, a la CONAF Vª Región con copia a la COREMA Vª\
    \ Región para su respectiva"
- source_sentence: cuál es el Límite Plástico (LP) del relave?
  sentences:
  - "Al área del proyecto se accede desde la ciudad de Coyhaique por el   camino, pavimentado, hacia Puerto \nAysén que bordea\
    \ el río Simpson, en el kilómetro 54 se toma el desvío hacia Villa Mañihuales, pasados \nunos 23 km de esta localidad\
    \ se encuentra el desvío hacia Mina El Toqui, desde donde se deben recorrer \nunos 17 kilómetros por camino de ripio.\
    \ El proyecto se ubicará al interior de los terrenos que ocupa el \nconjunto de instalaciones que constituyen la faena\
    \ minera de SCMET  \n3.9. Justificación de la Localización:  \nSCMET se encuentra desarrollando un sistema de disposición\
    \ de relaves flexible, es decir, contar \ncon varias alternativas para la depositación de sus relaves. Parte central de\
    \ este sistema flexible de \ndepositación, lo constituye la Planta de Espesado que ya cuenta con calificación ambiental\
    \ favorable \nmediante la RCA N° 698 de fecha 14 de agosto de 2009 de la Comisión Regional del Medio Ambiente de \nla\
    \ Región de Aysén. Dicha planta se ubica a aproximadamente 250 m del área en que se pretende \nemplazar el Depósito de\
    \ Relaves Filtrados Doña Rosa, es justamente esta cercanía con la Planta de \nEspesado uno de los criterios que ha determinado\
    \ la ubicación del Depósito de Relaves Filtrados Doña \nRosa, ya que de esta manera se logra minimizar el recorrido de\
    \ los camiones, que trasladarán el relave \nfiltrado desde la Planta de Espesado hasta el depósito, con la consecuente\
    \ reducción de emisiones y \nahorro de combustible. Adicionalmente, debe tenerse en consideración que el lugar de emplazamiento\
    \ del \ndepósito de relaves filtrados se encuentra al interior de los terrenos que ocupa el conjunto de instalaciones\
    \ \nque constituyen la Faena El Toqui, por lo se evitará intervenir nuevas áreas"
