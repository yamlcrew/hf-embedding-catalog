    \ con el cauce receptor de las aguas de"
  - "Plan de Cierre PAG Planta Catemu \nCompañía Explotadora de Minas (CEMIN) \n \n Rev. 0 | 20-04-18 156 | 158 \n12 PROGRAMA\
    \ DE DIFUSIÓN \n \nA continuación se describe el programa de difusión para el Plan de Cierre de la Planta Catemu.  \n\
    \ \n12.1 Objetivos del programa de difusión \n \nEl programa de difusión del Plan de Cierre de la Planta Catemu contempla\
    \ los siguientes objetivos:  \n \n Comunicar claramente los alcances del cierre de la faena y los planes asociados; \
    \ \n Generar confianza y credibilidad en los distintos públicos relevantes;  \n Conseguir que el tema sea socializado\
    \ paulatinamente, incluso por los medios de comunicación;  \n Recoger dudas e inquietudes desde la comunidad y público\
    \ de interés, además de tener espacio para \nresponder. \n \n \n12.2 Público objetivo \n \nEl público objetivo a quién\
    \ irá dirigida la información refer ida al cierre de la planta corresponde a aquellos \nque se encuentren dentro de área\
    \ de influencia de la faena. La localidad más cercana a la Planta Catemu, y \nprincipal poblado que forma parte del área\
    \ de influencia de la planta, corresponde a la comuna de C atemu, \ndistante aproximadamente a 2,5 kilómetros. \n \nAdemás\
    \ se contempla dentro del público objetivo a las autoridades comunales y regionales, medios de \ncomunicación y a los\
    \ propios trabajadores de la Planta (quienes serán los primeros en ser informados).  \n \n \n12.3 Estrategia de implementación\
    \ \n \nA nivel general, la estrategia de implementación para la difusión del programa de cierre de la Planta Catemu \n\
    considera las siguientes acciones: \n \n Comunicados y gestión de prensa \n Reportajes en los medios locales, internos\
    \ y externos \n Profundizar programas comunitarios vinculados al medio ambiente con el objetivo de minimizar los \nefectos\
    \ que tendrá el Plan de Cierre."
  - "Fidel Oteiza 1971, of.202 - Providencia – Santiago-Chile.  Fono/Fax:  (56-2) 433 3200 - e-mail: contacto@vst.cl \n17\n\
