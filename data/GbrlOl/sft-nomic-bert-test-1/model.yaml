      \ de cubetas y piscinas, mediante suelo natural compactado y cobertura de \nsuelo de valor edafológico para su restauración.\
      \ \nNeutralización de fosas sépticas y pozos absorbentes, con cal, recubrimiento con suelo \nnatural compactado en condiciones\
      \  de humedad y cobertura de suelo de valor \nedafológico para su restauración. \nRecubrimiento de excavaciones menores,\
      \ y nivelado de montículos. \nSeñalética de advertencia y riesgo de planta minera abandonada. \nCierre de accesos a\
      \ sectores de riesgos y eliminación de caminos de tránsito para su \nrestauración. \nConstrucción de barreras que limiten\
      \ el acceso de animales que puedan tener o adquirir \nel hábito de tránsito por sectores de riesgos. \nLimpieza general\
