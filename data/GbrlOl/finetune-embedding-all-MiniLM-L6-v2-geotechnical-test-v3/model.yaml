    \ por Peso Propio .................................................................... 13 \n3.5.  Proctor Modificado ......................................................................................\
    \ 15 \n3.6."
  - "Plan de Cierre - Faena Minera Salares Norte |   82 \n \nSe necesita de especial cuidado al depositar rocas estériles\
    \ con menores propiedades g eotécnicas que las \nconsideradas como representativas en este informe, como materiales con\
    \ alteración Steam Heated o materiales del \ncuaternario. Estos materiales no deben ser depositados en los pies de los\
    \ taludes del depósito, ni en el fondo de la \ncuenca donde será emplazado el botadero Norte. En vez de eso, se deben\
    \ depositar e n pilas horizontales cerca de \nla parte posterior del botadero Norte, donde hay presencia de material rocoso\
    \ de mejor calidad.  \nEn el mismo sentido, los resultados de la modelación num érica en condiciones dinámicas indican\
    \ que, para corto y \nlargo plazo, los desplazamientos dentro del depósito, en general, serían menores a 0,8 metros (80\
    \ centímetros). Los \nmayores desplazamientos observados ocurrirán en los bancos de botadero Norte. La aplicación de un\
    \ evento sísmico \ncausará desplazamientos en la superficie que  solo afectan los bancos y bermas del depósito. Las partículas\
    \ se \ndeslizarán y quedarán en las bermas que tienen 20 metros de ancho.  \n Características Geoquímicas \nCon el objeto\
    \ de determinar la potencialidad de generación de drenajes desde el botadero Norte se ha desarrollado \nun estudio de\
    \ caracterización geoquímica de los materiales estériles y la disposición en el botadero Norte \nconsiderando su máxima\
    \ capacidad. \nDe las muestras analizadas (170 en total para material estéril) 146 muestras serían representativas de\
    \ los materiales \na depositar en el botadero Norte en su máxima capacidad, lo que significa que se ha podido representar\
    \ un 94,8% \nde los materiales en la fase final del botadero según los criterios de Litología, Alteración y Mineralización\
    \ (LAM), ley \nde Au y zona redox."
  - "Sin perjuicio de ello, en este \nplan de cierre temporal se ha hecho un análisis a nive l de juicio experto respecto\
    \ de los riesgos \nque se indican en la siguiente tabla.  \nTabla 3-3: Riesgos evaluados Instalaciones Complementarias\
    \ y Auxiliares. \nInstalación Riesgos evaluados \nInstalaciones \nComplementarias \ny Auxiliares \nIA.1) Caída de Personas\
    \ o animales a desnivel \nIA.2) Caída de objetos o materiales sobre personas o animales \nIA.3) Afectación a la salud\
    \ de las personas por estructuras, \nmateriales y/o suelos contaminados \nFuente: Elaborado por MYMA, 2019 \n3.1 Evaluación\
    \ de Riesgos \na) Evaluación de Riesgos previo a la definición de las medidas de cierre \nUna vez establecida la probabilidad\
    \ de ocurrencia de los eventos y la severidad de las \nconsecuencias para las personas y el medio ambiente, se debe catalogar\
    \ el límite de aceptabilidad \ndel riesgo."
- source_sentence: ¿Cuál es el correo electrónico de contacto de la empresa VST ubicada en Santiago, Chile?
  sentences:
  - "26 \n \n \n85/11382/13328     Proyecto de Cierre Tranque de Relave N°4 Planta Cabildo, Región de Valparaíso  \nPlan de\
    \ Cierre \n7.2.9 Habilitación de Evacuador de Emergencia. \nDescrito ampliamente en el ítem 7.2.4.1. \n7.2.10  Cercado\
    \ de las Torres Colectoras. \nPara la operación del Tranque de Relave N°4, se consideraron 6 cámaras colectoras de agua\
    \ clara, unidas \npor tuberías HDPE. Se prevé sellar completamente las cámaras, a través de rellenos realizados con grava,\
    \ \ncon arena y con relave. Posteriormente a dicho sello se demuele la porción que sobresale de las lamas \nevitándose\
    \ los promontorios. \nPara que los rellenos queden estables y se elimine toda posibilidad de que haya migración de lamas\
    \ o de \nlos rellenos, a través de la tubería, el sello de la cámara se realizará con los siguientes materiales y \nsecuencia\
    \ constructiva: \n\x7F Se coloca una primera capa, de a lo menos un metro de altura, sobre el fondo de la cámara, con\
    \ \nsobretamaño, superior a 6\". \n\x7F Inmediatamente después se realiza un relleno de grava arenosa con contenido de\
    \ grava superior al \n50% y arena superior al 30%. Dicha capa debe presentar a lo menos una altura de un metro. \n\x7F\
    \ Posteriormente, sobre la grava, se realiza un relleno con arena de relaves (proveniente del muro), \ntambién con una\
    \ dimensión mínima de un metro. \n\x7F Finalmente se realiza un relleno con lamas (secas o con baja humedad) hasta el\
    \ nivel de lamas \nexistentes en la cubeta. \n\x7F Todos los rellenos se colocan sin compactar."
  - "En dicho proceso \nes que se libera energía que se traduce en movimientos sísmicos en superficie. \nEl proyecto, al estar\
    \ ubicado entre los 25°58’ L.S. y 26°’24 L.S., se relaciona con el segmento sismo tectónico de \nCopiapó, el cual forma\
    \ parte de la sección norte del llamado flat-slab. El flat-slab corresponde al segmento de la zona \nde acoplamiento entre\
    \ placas tectónicas de Nazca y Sudamericana que presenta menor ángulo de subducci ón, en \nconsecuencia, no hay un volcanismo\
    \ activo relevante. \nEl segmento sismo tectónico de Copiapó se caracteriza por presentar sismos de grandes rupturas únic\
    \ as y también, \nen ocasiones, liberación de energía mediante grupos de sismos medios a grandes (Bar rientos, 2007).\
    \ En este tramo, \nlos sismos de magnitud mayor a 6 se concentran costa afuera y paralelos a ella, con mecanismos de esfuerzo\
    \ inverso \nde bajo ángul o. Sismos con mecanismos de falla tensional se observan al interior del continente, en un número\
    \ \nbastante menor a los producidos mar afuera (Barrientos, 2007). Ambos tipos de sismos se producen en la región \nacoplada\
    \ de subducción entre las placas de Nazca y Sudamericana. La mayoría de los sismos destructivos registrados \nen Chile\
    \ concentran sus puntos focales cercanos al borde costero. A continuación, en la Tabla 4-7 se presentan \nregistros de\
    \ eventos de magnitud mayor a 7 Mw entre los 24° y 28° L.S. y en la Figura 4-5 se muestran espacialmente \nlos registros\
    \ mencionados anteriormente."
  - "Fidel Oteiza 1971, of.202 - Providencia – Santiago-Chile.  Fono/Fax:  (56-2) 433 3200 - e-mail: contacto@vst.cl \nANEXO\
    \ B: ESTUDIO DE PELIGR O SÍSMICO, ESPECTROS DE \nRESPUESTA Y GENERACIÓN DE REGISTROS ARTIFICIALES \nPARA EL DEPÓSITO DE\
    \ PASTA, PLANTA CABILDO"
- source_sentence: ¿Cuál es la resistencia cíclica para un número de ciclos de 30 y una razón de confinamiento de 0,5 kg/cm2?
  sentences:
  - "Plan de Cierre - Faena Minera Salares Norte |   111 \n \n \nFuente: SRK \nFigura 8-31: Distancia de Exclusión Entre el\
    \ Pie del ROM STOCK y el Borde de la Plataforma 4.473  \n Características  \nEl depósito de relaves consiste en un acopio\
    \ de relaves previamente filtrados, los cuales serán depositados sobre la \nplataforma intermedia del botadero Sur (plataforma\
    \ 4.432 m.s.n.m.), autosoportante que se construirá en capas de \nentre 30 a 40 c m compactadas mediante rodillo vibratorio,\
    \ con un contenido de humedad menor al 20%. La base \ndel depósito de relaves filtrados, como  son las laderas de los\
    \ cerros y las superficies inclinadas del botadero sobre \nlas que se apoyará el relave serán impermeabi lizadas mediante\
    \ una geomembrana que cubrirá aproximadamente \n533.672 m 2. La tasa de depositación promedio diaria de relaves es del\
    \ o rden de 6 ktpd. Las características del \ndepósito de relaves se muestran a continuación. \nTabla 8-20: Características\
    \ del Depósito de Relaves \nCaracterística Valor Aproximado Unidad \nVolumen 14,8 Mm3 \nCapacidad Máxima 24,1 Mt \nCapacidad\
    \ Proyectada 22,2 Mt \nSuperficie Máxima 54 ha \nSuperficie Proyectada 51,7 ha \nCota Máxima 4.472  m.s.n.m. \nCota Máxima\
    \ Proyectada 4.469,2 m.s.n.m. \nCota Mínima 4.432 m.s.n.m."
  - "Fidel Oteiza 1971, of.202 - Providencia – Santiago-Chile.  Fono/Fax:  (56-2) 433 3200 - e-mail: contacto@vst.cl \n20\n\
    \ \n \nFigura 11. Resistencia Cíclica vs N° de Ciclos de Carga Relave UG-2 \nEn términos generales, las curvas mostradas\
    \ en la Figura 11  presentan un \ncomportamiento típico, en  donde para un nivel de confinamiento dado, a \nmedida que\
    \ se aumenta la resistencia cíclica, disminuye el número de ciclos \nnecesarios para alcanzar la movilidad cíclica. Además,\
    \ a medida que aumenta la \npresión efectiva de confinamiento, para una misma resistencia cíclica, \ndisminuye el número\
    \ de ciclos necesarios para alcanzar la movilidad cíclica \nEn este caso particular, se puede observa r que para un número\
    \ de ciclos de 30, \nla resistencia cíclica es aproximadamente 0,34 para una razón de confinamiento \nde 0,5 kg/cm2, mientras\
    \ que para un c onfinamiento de 1,0 kg/cm 2 la resistencia \ncíclica es 0,23."
  - "PLAN DE CIERRE  TEMPORAL – FAENA MINERA EL TOQUI  \n Sociedad Contractual Minera El Toqui \nCapítulo 4 - Caracterización\
    \ del Entorno \n  \n \nREVISIÓN [0]  \n4-46   \n \nPilgerodendron, Macrachaeniun, Combera, entre otros. Hay también varios\
    \ elementos de origen \ntropical, como lo son Chusquea y Myrceugenella. \nDesde el punto de vista fitogeográfico pueden\
    \ distinguirse cinco distritos: Maulino, Valdiviano, \nMagallánico, del Pehuén y del Bosque Caducifolio. \nLa Faena El\
    \ Toqui se ubica en el distrito valdiviano, en donde se desarrollan numerosas \nasociaciones boscosas que se distribuyen\
    \ de acuerdo con la altitud, la orientación y el declive. En \ncasi todas ellas figura Nothof agus dombeyi (coigüe), asociado\
    \ a veces con Eucryphia cordifolia \n(ulmo), Gevuina avellana (avellano), Persea lingue (lingue), Aextoxicum punctatum\
    \ (olivillo), \nWeinmannia trichosperma (tineo), Laureliopsis philippiana (tepa) y Dasyphyllum diacanthoides \n(palo santo).\
    \ \nOtras veces Nothofagus dombeyi se asocia con Nothofagus obliqua (roble) y Nothofagus procera \n(raulí), acompañados\
    \ de diversas especies arbóreas comunes a la comunidad anterior; o bien se \nasocia con Fitzroya cupressoides (alerce),\
    \ gigantesca coníf era que puede alcanzar 50 metros de \naltura y 3 metros de diámetro, Podocarpus nubigena (mañiu), Pilgerodendron\
    \ uvifera (ciprés de las \nguaytecas) y Saxegothaea conspicua (mañiu hembra)."
- source_sentence: Se menciona en el documento que la planta presente cierres temporales?
  sentences:
  - "Fidel Oteiza 1971, of.202 - Providencia – Santiago-Chile.  Fono/Fax:  (56-2) 433 3200 - e-mail: contacto@vst.cl \n19\n\
    La movilidad cíclica es un fenómeno que se origina en suelos solicitados con \ncarga cíclica y rápida como en un sismo,\
    \ de tal manera que se desarrolla un \ncomportamiento no drenado y se genera un  gran incremento de las presiones de \n\
    poros. Como consecuencia, se produce una  disminución de rigidez, lo que se \ntraduce en grandes deformaciones. \nLa experiencia\
    \ muestra que tanto los suel os sueltos (contractivos) como densos \n(dilatantes) pueden desarro llar movilidad cíclica,\
    \ pe ro las deformaciones en \ncada ciclo son considerablemente mayores en el caso de suelos sueltos y además \nson crecientes\
    \ a medida que aumentan los ciclos (Ishihara, 1985) \nPara verificar la eventual licuefacción por movilidad cíclica, que\
    \ pudiese darse \nen caso de un evento sísmico, su evalua ción se realizará mediante el método \nsimplificado de Seed\
    \ (Seed & Idriss, 1971). \nLa Figura 11  muestra las curvas obtenidas  de resistencia cíclica Rc lab v/s el \nnúmero de\
    \ ciclos necesarios para alcanzar la movilidad cíclica, para las distintas \npresiones de confinamientos ensayadas. El\
    \ criterio de falla utilizado para definir \nla cantidad de ciclos en que  se tiene movilidad cíclica,   fue el 100 %\
    \ de exceso \nde presión de poros. \nEn la Figura 11  se muestra además gráficamente la resistencia cíclica, que \ncorresponde\
    \ para cada presión de confin amiento ensayada y para un número de \nciclos de carga de 30, que representa un sismo severo\
    \ magnitud 8,0  (Seed & \nIdriss, 1971)."
  - "Junto al mineral de interés han aparecido \nperiódicamente  “bolones”  o rodad os de diferentes tamaños, situación importante\
    \ de \nconocer para el tratamiento final de los taludes. \nLa mediana altura del cerro  donde se ubica el Yacimiento,\
    \ la depositación oportuna de \nlos lodos debido a la corta distancia de la Planta de Proceso y el ar ranque de mineral\
    \ \nordenado haciendo bodega en la zona inferior del Rajo , han contribuido a que \nmorfológicamente el terreno no haya\
    \ sufrido grandes alteraciones debido a la \nintervención del suelo. Una comprobación del buen  trabajo realizado es la\
    \ nula \ndesestabilización de laderas, taludes y Rampas después del Terremoto del 27/F/2010. \n \n6.2.- Diseño del talud\
    \ final del Rajo \n \nSerá importante tener en cuenta que antes de disminuir el ángulo de talud final,  es \nimperiosamente\
    \ necesario, complementar el Relleno en la zona inferior del Rajo con la \nmáxima cantidad de m3 de lodos para asentar\
    \  su base, con esto se cumple lo señalado \nen la aprobación ambiental y además se  facilitan los trabajos tendientes\
    \ a suavizar la \npendiente. El ángulo del PIT final de talud en toda la cara externa del rajo no debe \nsobrepasar los\
    \ 45°. \nConsiderando la existencia de los Peñascos y Bolones que repentinamente aparecen \ncuando se excavan los Bancos\
    \ en el sentido del avance, desde el Norte hacia el Sur y \nsiguiendo las instrucciones ante riores, se obtendrá una estabilidad\
    \ adecuada que \nimpedirá posibles Remociones en Masa después del Abandono. También se debe tener"
  - "PLAN DE CIERRE  TEMPORAL – FAENA MINERA EL TOQUI  \n Sociedad Contractual Minera El Toqui \nCapítulo 7 – Análisis de\
    \ las Instalaciones \n  \n \nREVISIÓN [0]  \n7-68   \n \npara el cierre a causa de un sismo”, debido a que el método Room\
    \ & Pil lar no considera dejar \ngrandes cavidades que pudiesen generar subsidencias y producir algún colapso en superficie\
    \ y \nademás el propio método incluye dejar pilares remanentes que soportan las cámaras luego de ser \nexplotadas. Mientras\
    \ que el resto de los riesgos fueron evaluados y  luego se propuso sus \nrespectivas medidas de cierre para su control."
- source_sentence: ¿Cuál es la población total de la comuna de Catemu según el Censo 2017?
  sentences:
  - "Plan de Cierre PAG Planta Catemu \nCompañía Explotadora de Minas (CEMIN) \n \n \n Rev. 0 | 20-04-18 25 | 158 \n3.5 Medio\
    \ humano \n \nLa localidad más próxima a a la planta corresponde a la localidad del mismo nombre. Catemu , comuna \nperteneciente\
    \ a la provincia de San Felipe de Aconcagua, de la Región de Valparaíso . La planta se encuentra \nubicada a 85 km al\
    \ norte de Santiago y 95 km del puerto de Valparaíso. \n \nSegún información del Instituto Nacional de Estadísticas (I\
    \ NE) para el Ce nso 2017, la población total de la \ncomuna Catemu es de 13.998 habitantes, correspondiendo a los totales\
    \ de 6.982 hombres y 7.016 mujeres. \nEl número total de viviendas es 5.171 y densidad de población de 38,8 (Hab/km 2).\
    \ \n \nLa actividad económica que  predomina en la comuna de Catemu corresponde al sector de A gricultura, caza, \nganadería\
    \ y silvicultura  (correspondiendo a un total del 32,7%). Respecto a l a actividad minera , esta  \nrepresenta solo el\
    \ 2,8% de la mano de obra comunal. \n \nEl ingreso autónomo promedio del hogar es, en el caso de la comuna de Catemu,\
    \ inferior al promedio \nregional ($618.371 para la región de Valparaíso), alcanzando los $415.146. Los niveles de pobreza\
    \ son, según \nla encuesta CASEN del año 2009, son relativamente bajos, para la comuna de Catemu es de 8,17%, inferior\
    \ al \npromedio regional (15,04%). Los niveles de desocupación se encuentran bajo el promedio regional (12% en \nla Región\
    \ de Valparaíso) llegando a 9,5%."
  - "4.1. Sismo de Diseño \nComo parte del proyecto, VST solicitó a SyS Ingenieros Consultores Ltda. \n(SyS) el desarrollo\
    \ de un estudio sísmico, con el objeto de determinar el sismo \nde diseño del proyecto. El informe emitido sepresenta\
    \ en el ANEXO B. \nEn este estudio, se establece el marco sismogénico de la zona del proyecto, \ncaracterizándose las\
    \ fuentes sísmicas de la región. Para definir el sismo de \ndiseño, se revisa la sismicidad histórica e instrumental en\
    \ la zona. El análisis"
  - "[7]. VST Ingenieros Ltda. (2006). Informe Analisis de Estabilidad.  \nDocumento N° 1005-IB-GE-IT-03, Preparado para Minera\
    \ Las Cenizas \nS.A., Proyecto Ingeniería Básica Depó sito en Pasta, Planta Cabildo, \nSantiago. \n[8]. SYS Ingenieros\
    \ Consultores Ltda. (2008). Estudio de Peligro Sísmico, \nEspectros de Respuesta y Generación de Registros Artificiales,\
    \ para el \nDepósito en Pasta, Planta Cabildo, V Región. Documento N° SS-08011-\n01e, Preparado para Minera Las Cenizas\
    \ S.A., Proyecto Ingeniería Básica \nDepósito en Pasta, Planta Cabildo, Santiago."
