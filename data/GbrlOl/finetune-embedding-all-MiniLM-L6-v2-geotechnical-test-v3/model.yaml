    - "Plan de Cierre - Faena Minera Salares Norte |   82 \n \nSe necesita de especial cuidado al depositar rocas estériles\
      \ con menores propiedades g eotécnicas que las \nconsideradas como representativas en este informe, como materiales\
      \ con alteración Steam Heated o materiales del \ncuaternario. Estos materiales no deben ser depositados en los pies\
      \ de los taludes del depósito, ni en el fondo de la \ncuenca donde será emplazado el botadero Norte. En vez de eso,\
      \ se deben depositar e n pilas horizontales cerca de \nla parte posterior del botadero Norte, donde hay presencia de\
      \ material rocoso de mejor calidad.  \nEn el mismo sentido, los resultados de la modelación num érica en condiciones\
      \ dinámicas indican que, para corto y \nlargo plazo, los desplazamientos dentro del depósito, en general, serían menores\
      \ a 0,8 metros (80 centímetros). Los \nmayores desplazamientos observados ocurrirán en los bancos de botadero Norte.\
      \ La aplicación de un evento sísmico \ncausará desplazamientos en la superficie que  solo afectan los bancos y bermas\
      \ del depósito. Las partículas se \ndeslizarán y quedarán en las bermas que tienen 20 metros de ancho.  \n Características\
      \ Geoquímicas \nCon el objeto de determinar la potencialidad de generación de drenajes desde el botadero Norte se ha\
      \ desarrollado \nun estudio de caracterización geoquímica de los materiales estériles y la disposición en el botadero\
      \ Norte \nconsiderando su máxima capacidad. \nDe las muestras analizadas (170 en total para material estéril) 146 muestras\
      \ serían representativas de los materiales \na depositar en el botadero Norte en su máxima capacidad, lo que significa\
      \ que se ha podido representar un 94,8% \nde los materiales en la fase final del botadero según los criterios de Litología,\
      \ Alteración y Mineralización (LAM), ley \nde Au y zona redox."
    - "Sin perjuicio de ello, en este \nplan de cierre temporal se ha hecho un análisis a nive l de juicio experto respecto\
      \ de los riesgos \nque se indican en la siguiente tabla.  \nTabla 3-3: Riesgos evaluados Instalaciones Complementarias\
