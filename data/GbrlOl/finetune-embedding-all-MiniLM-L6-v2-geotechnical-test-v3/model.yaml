    \ de estabilidad ................................................. 6 \n3.  ENSAYOS DE LABORATORIO RELAVE UG-2 ......................................\
    \ 10 \n3.1.  Granulometría e Hidrometría ....................................................................... 10 \n\
    3.2.  Clasificación y Límites de Atterberg ........................................................... 12 \n3.3.  Límite\
