  - "Fidel Oteiza 1971, of.202 - Providencia – Santiago-Chile.  Fono/Fax:  (56-2) 433 3200 - e-mail: contacto@vst.cl \ni\n\
    MINERA LAS CENIZAS  S.A. \nDEPÓSITO DE RELAVES DE PASTA CABILDO \nPERMISO SECTORIAL PARA APROBACIÓN DEL PROYECTO \nTÉCNICO\
    \ POR PARTE DEL SERNAGEOMIN SEGÚN EL D.S. 248 \nANÁLISIS DE ESTABILIDAD \n \n1136-ID-GE-IT-01-Rev.0 \nÍNDICE DE CONTENIDOS\
    \ \n1.  INTRODUCCIÓN ............................................................................................. 1 \n\
    2.  REVISIÓN DE ANTECEDENTES ................................................................. 2 \n2.1.  Geometría del\
