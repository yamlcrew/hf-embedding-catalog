- source_sentence: ¿Qué elementos se consideran en el costo de la demolición de hormigón?
  sentences:
  - "Ordinario N° 57 de fecha 25 de Enero de 2011 \ninformó favorablemente.  \n5.  Que, en lo relativo a los efectos, características\
    \ y circunstancias señalados en los literales “a”,  \"b\", “c”, \n“d”, “e” y “f”, del artículo 11 de la Ley 19.300, y\
    \ sobre la base de los antecedentes que constan en el \nexpediente de la evaluación, debe indicarse que el proyecto \"\
    Depósito de Relaves Filtrados Doña Rosa” \nno genera ni presenta ninguno de tales efectos, características y circunstancias.\
    \  \n6.-    Que, en el proceso de evolución de proyecto \" Depósito de Relaves Filtrados Doña Rosa”, el titular \nha adquirido\
    \ los siguientes compromisos ambientales voluntarios:  \nEl proyecto contempla el monitoreo de aguas superficiales y subterráneas.\
    \ Respecto a la periodicidad de \nmonitoreo, este será cuatrimestral durante los tres primeros años de operación del proyecto.\
    \ Una vez \ncumplidos los tres años iniciales, se analizarán los resultados. Sobre la base de dicho análisis el titular\
    \ \npropondrá fundadamente cambios a los parámetros, puntos y frecuencias de monitoreo, si es que los \nresultados así\
    \ lo ameritan.  \nEn la siguiente tabla se presentan las coordenadas de los puntos de control de calidad de aguas, tanto\
    \ \nsuperficiales como subterráneas."
  - "d) Aplicación de gravilla   \n \nEl monto considera la adquisición de la gravilla, el retiro y puesto en obra  de la\
    \ misma, la \nmaquinaria dispuesta para su esparcimiento, la nivelación del terreno y las HH/ hombre \ninvolucradas en\
    \ su esparcimiento. \n \ne) Movimiento de tierra para fundaciones  \nEl monto del movimiento de tierra incluye el arriendo\
    \ de la maquinaria  y su traslado para el \nlugar donde se efectuaron los movimientos de tierra, además de las hh/hombre\
    \  involucradas de \nlos profesionales y jornales que participaron en el proyecto. \nf) Demolición de hormigón       \
    \                    \nEl costo de la demolición de hormigón, incluye el arriendo de la maquinaria  y su traslado para\
    \ \nel lugar donde se efectuó la demolición, las hh/hombre  involucradas de los profesionales y \njornales que partic\
    \ iparon en el proyecto, y el traslado y disposición final en vertederos \nautorizados del resultado de la demolición."
  - "Cobertura \nSe considera la cobertura de la superficie (coronamiento) del depósito de relaves filtrados con una capa\
    \ de material \ngranular de manera de minimizar la erosión eólica. Los taludes del depósito se encontrarán cubiertos al\
    \ momento \ndel cierre de acuerdo con su método constructivo. \nEn relación con la estabilidad física de las instalaciones\
    \ remanen tes al cierre (rajo, botaderos de estéril y depósito \nde relaves filtrados), éstas han sido diseñadas en su\
    \ etapa de ingeniería considerando como criterio de estabilidad \nel sismo máxim o creíble, con lo cual se asegura un\
    \ diseño final estable en el largo pla zo, sin requerir medidas de \ncierre adicionales en este ámbito. \nLa Tabla 7-3\
    \ presenta un resumen de los compromisos ambientales adquiridos para cada una de las instalaciones de \nla faena."
- source_sentence: ¿Se utilizaron antecedentes topográficos?
  sentences:
  - "Las piscinas de PLS e ILS tienen una capacidad operacional de 5.193 m3\n y la de emergencia de \n9.952 m3.  \n \n4.3.9.\
    \ Depósito de Relaves Secos \nEl Depósito de R elaves Secos no ha sido construido hasta ahora,  y dicho P royecto fue\
    \ \npresentado al Sernageomin para su aprobación por medi o de carta conductora el 17 de \ndiciembre 2015 (ver proyecto\
    \ y carta presentado en el Anexo 2). \nEl depósito se ubicará al Norte de las pilas de lixiviación existentes , de acuerdo\
    \ a los espacios \ndisponibles, evitando la interferencia con quebradas y otras instalaciones, y considerando los \nlímites\
    \ de propiedad y uso de suelos.  \nEl depósito tiene posibilidad de ampliarse hacia el Norte en unos 7.000 m 2, y hacia\
    \ el Oeste en \ncerca de 23.000 m 2, moviendo el límite del depósito proyectado más cerca del borde de la \nquebrada existente.\
    \ \nA continuación se entregan las coordenadas de ubicación del depósito de relaves:"
  - "64 \nFigura 5.42: Caminos internos de acceso (2) . 64 \nFigura 5.43: Patio de RISES . 65 \nFigura 5.44: Bodega de almacenamiento\
    \ temporal de residuos peligrosos . 66 \nFigura 5.45: Bodega de almacenamiento de residuos domésticos . 67 \nFigura 5.46:\
    \ Ubicación Pozo Monitoreos . 100 \nFigura 5.47: Caminos internos Planta Catemu . 107 \n \nANEXOS \n \nANEXO A :  . ANTECEDENTES\
    \ LEGALES \nANEXO B :  . RESOLUCIONES  \nANEXO C:  . PROPIEDAD MINERA \nANEXO D:  . INFORME DE VIDA ÚTIL \nANEXO E:  .\
    \ PLANOS \nANEXO F:  . EVALUACIÓN DE RIESGOS  \nANEXO G:  . PLANILLA DE VALORIZACIÓN \nANEXO H:  . RESPALDO DE PRECIOS\
    \ UNITARIOS \nANEXO I: .  GARANTÍA FINANCIERA"
  - "Geológicamente el sector está controlado por sistemas de fallas paralelas y pequeñas con eje \nlongitudinal en sentido\
    \ norte- sur, una de las cuales es conocida como Catalina, situada en la \nvecindad de las instalaciones del Proyecto.\
    \ \n \nAdemás del geo- control estructural provocado por el sistema de fallas mencionado, el área de \nproyecto se caracteriza\
    \ geológicamente por estar implantado sobre roca de origen andesítico \ndirectamente relacionada con las cordiller as\
    \ de Domeyko y del Centro, que aparecen en este \nsector de la Región de Antofagasta: Sierras de Catalina y Sierras de\
    \ Julia. \n \nEl material de roca descompuesta (suelo) más superficial, bajo las capas aluvionales  descritas \nanteriormente,\
    \ tienen su origen en el Mioceno y se han generado por fenómenos metamórficos \ntempranos, que molieron las cumbres de\
    \ los mantos rocosos que hoy están bajo tierra. En todo \ncaso, las cubiertas cenozoicas son terciarias a cuaternarias\
    \ y siempre con fuerte predominio de \nmateriales volcánicos provenientes de centros emisores radicados en la Cordillera\
    \ de los Andes \ny el Altiplano. Generalmente se presentan compactos y con algún grado de mitificación, de \nmanera que\
    \ sus permeabilidades son habitualmente pequeñas, esto especialmente para el \ncaso de los depósitos terciarios que suelen\
    \ tener alto grado de litificación y a menudo se \naprecian muy compactos y con características propias de rocas macizas."
- source_sentence: ¿Cuál es el talud del muro de confinamiento del depósito?
  sentences:
  - "Los antecedentes a evaluar por parte del SERNAGEOMIN, son: \nD.S. 248 de 2006 del \nMin. de Minería y \nEnergía \nReglamento\
