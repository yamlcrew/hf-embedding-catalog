      \ o"
  - source_sentence: ¿Cuál fue la vida útil estimada del Proyecto Reapertura Mina Guanaco en 2009?
    sentences:
    - "Proyecto que finalmente no se materializó por parte \nde Amax Guanaco. \n \nEn 1998 Compañía Minera Amax Guanaco es\
      \ adquirida por Kinross Gold Corporation formando \nuna sociedad llamada Minera Kinam Guanaco. Las faenas de extracción\
      \ fueron paralizadas ese \nmismo año manteniéndose sólo la irrigación de las pilas para extraer el mineral remanente,\
      \ \nproceso que se detuvo en Julio de 2001. Entre esa fec ha y el año 2003 se continuó lavando las \npilas para extraer\
      \ el cianuro remanente y durante los años ven ideros se mantuvo la recirculación  \nde las soluciones (sin cianuro)\
      \ para evaporar el agua retenida en las pilas.  \n \nEn la actualidad Guanaco Compañía Minera SpA es la actual dueña\
      \ de la faena.  Guanaco es una \nfaena de la mediana minería ( de acuerdo a la modificación de la ley 20.551), la cual\
      \ se encuentra \ndedicada a la explotación y procesamiento de minerales de oro y plata, a una tasa máxima de \nprocesamiento\
      \ de 2000 tpd, de acuerdo a la Res.Nº992/2010 y Res N° 506/2013."
    - "No obstante, se tendrá un ingreso restringido a personal dedicado a las \nactividades del control y mantención, mientras\
      \ MLC continúe con sus actividades;  \nx Se adoptarán medidas de control de emisiones de material particulado y erosión\
      \ hídrica, tales \ncomo; forestación, malla corta vientos, malla tendida a nivel de suelo en el sector del tranque donde\
      \ \nse producen mayores corrientes de aire. \nx Minimizar los requerimientos de mantención post cierre a un grado práctico,\
      \ en relación a la \nmantención del canal perimetral y vigilancia para garantizar el acceso restringido mientras MLC\
      \ \ncontinua sus actividades; \nx Dejar el canal de contorno asociado un periodo de retorno de 20 años; \nx Dejar las\
      \ defensas ribereñas asociado un periodo de retorno de 10.000 años; \nx Verificar la estabilidad de los taludes del\
      \ tranque. \nCon estos últimos, se logra controlar condiciones climáticas extremas, tales como: \nx Evitar el ingreso\
      \ de las aguas lluvias provenientes desde las zonas aledañas exteriores al tranque y \nque constituyen una cuenca aportante\
      \ a éste, conduciendo estas aguas mediante una canalización \nperimetral para finalmente descargar al río La Ligua.\
      \ \nx Proteger el Tranque de Relave N°4 de las crecidas del río La Ligua. \nx Evacuar las aguas lluvias que ingresen\
      \ al interior de la cubeta mediante un vertedero de \nemergencia.  \nx Conducir las aguas desde el vertedero, mediante\
      \ tuberías hasta una piscina de emergencia, la cual \ntiene como objetivo almacenar y retener este volumen para su evaporación."
    - "B ORRA DOR \n \n \n \niv \n \nEn Mayo de 2008, Guanaco Compañía Minera sometió al Sistema de Evaluación de  Impacto\
      \ \nAmbiental el Proyecto Reapertura Mina Guanaco, el que fue evaluado por  la COREMA Región de \nAntofagasta y calificado\
      \ ambientalmente en forma favorable según consta en la Resolución Exenta \n0251/2009 de fecha 15 de Julio de 2009. \n\
      \ \nDicho Proyecto tuvo como objetivo la continuación de la explotación de depósitos  minerales de oro \nsituados en\
      \ formaciones adyacentes a la Mina Guanaco mediante el desarrollo de minas a cielo \nabierto y subterráneas para, posteriormente,\
      \ procesar  los minerales y obtener metal doré.  La vida \nútil estimada del Proyecto Reapertura Mina Guanaco en 2009\
      \ ascendía a 10 incluyendo 1 año de \nconstrucción, con base en un ritmo de procesamiento del  mineral de entre 750\
      \ a 2.000 tpd de \nmineral fresco de las minas tanto subterráneas como a rajo abierto. \n \nSe estimó que durante la\
      \ vida útil del Proyecto, se removerían desde los rajos entre 2 y 3 millones \nde toneladas de material y otros 10 a\
      \ 12 millones de toneladas de material provendrían de las \nminas subterráneas. Con ello el material total a remover\
      \  sería del orden de las 12 a 15 millones \ntoneladas y el material estéril  correspondería a 7 a 9 millones de toneladas.\
      \  Dependiendo de la \ntasa de procesamiento del mineral la producción anual sería de aproximadamente de 100 a 150 mil\
      \ \nonzas de plata y 100 mil onzas de oro contenidas en metal doré. \n \nEl proyecto de Reapertura estableció la utilización\
      \ de sus antiguas instalaciones, complementadas \ncon los nuevos procesos implementados."
