- source_sentence: ¿Cuál es el ángulo de banco o de terraza del depósito de relaves filtrado?
  sentences:
  - "SRK Consulting: 01-2028-64 Salares Norte Análisis de Estabilidad Botadero Sur y Depósito de Relaves Filtrados Página\
    \ 14 \nAT/br SRK-GFCH74-FS-6100-CE-RP-0003_00P1 mayo.18 \n8.4 Verificación de Distancia de Exclusión \n8.4.1 Distancia\
    \ desde el pie del Depósito de Relaves Filtrados al Borde de la \nPlataforma-4432 del botadero sur \nEl diseño del depósito\
    \ de relaves filtrados considera , en su configuración final , una distancia de \nexclusión de 90 m entre el pie d el\
    \ relave y el borde de la plataforma -4432 del botadero Sur. Esta \ndistancia es considerada para evitar que cualquier\
    \ falla del botadero sur afecte el comportamiento del \ndepósito de relaves filtrados. \nPara verificar la distancia de\
    \ exclusión, se desarrollaron análisis de estabilidad específicos, los cuales \nconsideraron fallas globales que afectasen\
    \ la plataforma -4432 del botadero Sur en una condición \nsísmica. El análisis consideró la sección más crítica (Sección\
    \ 2) identificada en el capítulo anterior, \nademás, para asegurarse de que ninguna falla global del botadero Sur afecte\
    \ al depósito de relaves, \nse utilizó el máximo sismo creíble ICOLD (Kh=0,16). \nLa Figura 8-3 presenta los resultados\
    \ del análisis de estabilidad para el máximo sismo creíble ICOLD. \nEl análisis indica que con una zona de exclusión mayor\
    \ o igual a 50 m, el criterio de diseño se cumple \n(FS>1,1). Por tanto, los 90 metros de distancia de exclusión ha sido\
    \ verificada ante cualquier evento \nsísmico y el depósito de relaves filtrados no sería afectado ante una falla global\
    \ de la plataforma-4432 \ndel botadero Sur.  \n \n \nFigura 8-3."
  - "46 \nb) Retiro de suelos contaminados \nEl monto estimado para el retiro de suelos contaminados incluye el traslado de\
    \ la maquinaria \nnecesaria para el movimiento de tierra (retroexcavadora y camión)  las HH/  hombre \ninvolucradas y\
    \ el traslado y disposición final, de residuos peligrosos en lugares autorizados. \n Además, para el manejo adecuado de\
    \ los eventuales los suelos impactados la empresa cuenta \ncon un sistema de gestión ambiental, el que considera que cada\
    \  vez que ocurre algún derrame \nse informe de inmediato a las líneas de mando. Estas acciones serán reforzadas realizando\
    \ \ncharlas de inducción específica. El manejo de estos sitios se realiza permanentemente, \nretirando los suelos y llevándolos\
    \ a sitios autorizados.  \n \nPrevio al cierre todas las zonas que eventualmente presenten estos suelos (debido a su retiro\
    \ \npermanente que se realiza durante la operación de la faena, se estima que la superficie \nafectada será mínima). \n\
    \ \nEn el cierre se realizará un delimitado de estas áreas y dependiendo del tamaño se realizará \ncon maquinaria o mediante\
    \ palas. Para esto se extraerá la capa de 50 cm o más, y será tratada \ncomo residuo peligroso y trasladado a sitio autorizado.\
    \ \n \nc) Instalación de señalética   \n \nEl monto de la instalación de señalética incluye el diseño y la mano factura\
    \ de la señalética, el \ntraslado de la señalética hasta el lugar de la instalación, el hormigón base (poyo) para la \n\
    instalación,  y las HH/ hombre involucradas  en su instalación."
  - "1). \n4.2 Del Proyecto de Depósito de Relaves \n4.2.1 Definición \n\x7F Cierre: Hecho que el depósito de relaves deje\
