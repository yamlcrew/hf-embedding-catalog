    \ efectuado las acciones tendientes a \nasegurar la obra en el tiempo.  \n\x7F Proyecto de Depósitos de Relaves: el conjunto\
    \ de estudios técnicos requeridos para la definición de \nun sistema de disposición de relaves, incluyendo etapas de investigación,\
    \ prospección, diseño, \nevaluación y construcción, cuyos resultados se encuentran en una serie de documentos que para\
    \ \ngarantizar la estabilidad física y química del depósito y su entorno, con el fin de proteger a las \npersonas, bienes\
    \ y medio ambiente. (Art. 5). \n\x7F Cierre  final:  Conclusión  definitiva  de  las  actividades  para  el  cierre  de\
    \  todas  las labores, áreas \ne instalaciones de una unidad minera, que por razones operativas, no hayan podido cerrarse\
    \ \ndurante la etapa productiva o comercial, de modo tal que se garantice  el  cumplimiento  de  los  \nobjetivos  de\
    \  cierre  contemplados  en  el  Plan  de Cierre  de  Minas  aprobado  y  cuya  adecuada  \nejecución  ha  sido  verificada\
