      \ se presentan a la fecha del cierre. Tal \ninforme contendrá al menos los siguientes aspectos: \n·         Planos topográficos\
      \ con registro de dimensiones y geometría final alcanzada.  \n·         Volumen de material almacenado.  \n·       \
      \  Perfil de densidades y humedades del material depositado y consolidado en el depósito \nde relaves filtrados, de\
      \ acuerdo a una campaña de exploraciones geotécnicas.  \n·         Estabilidad de las estructuras.  \n3.11.4.3.   Manejo\
      \ de Residuos  \nDurante la etapa de cierre se generarán residuos domiciliarios e industriales no peligrosos. El manejo\
      \ de \nlos residuos se mantendrá de acuerdo con el Plan de Manejo de Residuos de SCMET."
    - "x Desborde de Aguas lluvias, acumuladas en la cubeta del tranque, provenientes de zonas \naledañas y las que precipitan\
      \ directamente sobre él. Teniendo en cuenta las siguientes \nexigencias para el Canal Perimetral; vale decir, que posea\
      \ una capacidad suficiente para captar \naguas lluvias generadas en la cuenca aportante externa,  asociadas a un periodo\
      \ de retorno de 20 \naños, y con ello ser capaz de evitar el ingreso de estas aguas lluvias a la cubeta. Para este criterio\
      \ y \nbajo las condiciones actuales, el canal no satisface estas exigencias (detallado en el Anexo 2, \nInforme Técnico\
      \ Diseño Hidráulico). \n \nII. Estabilidad del Muro: \nx Estabilidad de talud del material de arena para condiciones\
      \ estáticas y dinámicas. \nConsiderando los últimos antecedentes sísmicos  y reglamentaciones, es necesario  garantizar\
      \ la \nestabilidad del muro . El análisis detallado se encuentra en el Anexo 3, Informe Técnico de \nEstabilidad de\
      \ Talud, se emplean dos condiciones de carga: \nx Condición de Carga Estática. Considera  sólo  el  estado  tensional\
      \  del  material  provocado  \npor  el  peso propio. Además se incluyó en el modelo la acción de un posible nivel freático\
      \ \nextremo; \nx Condición de Carga Sísmica. Se simula usando una aproximación pseudo-estática. Para un \nevento  sísmico,\
      \  la  aceleración máxima se mantendrá por sólo una fracción de segundos. El \nanálisis pseudo-estático modela los eventos\
      \ sísmicos conservadoramente con aceleración y \ndirección constantes, es decir, como un pulso infinito."
