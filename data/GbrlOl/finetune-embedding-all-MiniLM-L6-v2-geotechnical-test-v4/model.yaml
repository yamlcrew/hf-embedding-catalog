  - source_sentence: ¿Qué tipo de actividades se realizarán con los trabajadores para informar sobre los cambios que vienen
      en el programa de difusión?
    sentences:
    - "Plan de Cierre - Faena Minera Salares Norte |   111 \n \n \nFuente: SRK \nFigura 8-31: Distancia de Exclusión Entre\
      \ el Pie del ROM STOCK y el Borde de la Plataforma 4.473  \n Características  \nEl depósito de relaves consiste en un\
      \ acopio de relaves previamente filtrados, los cuales serán depositados sobre la \nplataforma intermedia del botadero\
      \ Sur (plataforma 4.432 m.s.n.m.), autosoportante que se construirá en capas de \nentre 30 a 40 c m compactadas mediante\
      \ rodillo vibratorio, con un contenido de humedad menor al 20%. La base \ndel depósito de relaves filtrados, como  son\
      \ las laderas de los cerros y las superficies inclinadas del botadero sobre \nlas que se apoyará el relave serán impermeabi\
      \ lizadas mediante una geomembrana que cubrirá aproximadamente \n533.672 m 2. La tasa de depositación promedio diaria\
      \ de relaves es del o rden de 6 ktpd. Las características del \ndepósito de relaves se muestran a continuación. \nTabla\
      \ 8-20: Características del Depósito de Relaves \nCaracterística Valor Aproximado Unidad \nVolumen 14,8 Mm3 \nCapacidad\
      \ Máxima 24,1 Mt \nCapacidad Proyectada 22,2 Mt \nSuperficie Máxima 54 ha \nSuperficie Proyectada 51,7 ha \nCota Máxima\
      \ 4.472  m.s.n.m. \nCota Máxima Proyectada 4.469,2 m.s.n.m. \nCota Mínima 4.432 m.s.n.m."
    - "A continuación se revisan los aspectos fundamentales que se han \nconsiderado con posterioridad al cese de operaciones\
      \ del Depósito de Relaves Filtrados Doña Rosa.  \n3.11.4.1.   Normativa Aplicable Etapa de Cierre  \nEl plan de cierre\
      \ del depósito estará estructurado de manera tal de cumplir con la reglamentación legal \nvigente y aplicable en Chile,\
      \ que regula los aspectos de seguridad e impacto ambiental, asociados al \nacopio o depositación de este tipo de residuos\
      \ originados por tratamiento de minerales. En lo principal, la \nnormativa a considerar corresponde a los siguientes\
      \ reglamentos:  \n·         Reglamento de Seguridad Minera  \n·         Decreto Supremo Nº594/1999 del Ministerio de\
      \ Salud  \n3.11.4.2.   Obras a Realizar  \nEn el presente punto se describen tanto las obras, como las actividades de\
      \ control y mantenimiento de \nobras que incluirá el plan de cierre del Depósito de Relaves Filtrados Doña Rosa. Las\
      \ obras estarán \ndestinadas a satisfacer los requerimientos normados conforme a la reglamentación legal vigente, y"
    - "A nivel de público objetivo, la estrategia de implementación del programa de difusión considera lo siguiente:  \n \n\
      a) Trabajadores \nAsambleas informativas con los trabajadores para informar en detalle sobre los cambios que vienen\
      \ y que se \nhan socializado de manera paulatina. Se deberá hacer énfasis en todos los aspectos técnicos y operativos\
      \ del \nPlan de Cierre. La información uno a uno debe ser abordada por la Gerencia de Recursos Humanos.  \nb) Comunidad"
  - source_sentence: ¿Cuál es la altura del muro de pie del depósito?
    sentences:
    - "40 \nTambién destaca la abundante riqueza de rapaces y en particular la abundancia de aguiluchos, \nque muestra una\
      \ población dinámica, con diversos  registros de eventos reproductivos como \nnidos, ejemplares volantones, juveniles\
      \ y conductas de cortejo.  \nDe las especies encontradas 12 se encuentran con problemas de conservación, destacando\
      \ \nentre ellas como en Peligro de Extinción las especies de mamíferos Guanaco, Vicuña y \nVizcacha. \n \n5.1.9. Paisaje\
      \ \n \nEl paisaje local está caracterizado por la infraestructura de caminos y faenas mineras elementos \nque definen\
      \ la presencia del hombre en el área desde antaño. El paisaje natural de la zona está \ndominado por las condiciones\
      \ físicas y biológicas de los sistemas desérticos de Atacama, es \ndecir aridez y ausencia casi absoluta de flora y\
      \ fauna. En la zona no existen áreas declaradas \ncomo sitios de interés turístico o escénico.  \n \n5.1.10. Riesgos\
      \ naturales \n \nRespecto de los riesgos de remoción en masa se puede indicar que la zona en estudio \ncorresponde a\
      \ una zona de depositación de antiguos mega aluviones cuyos efectos \ncorresponden hoy a la capa superior de sedimentos\
      \ que conforman la superficie terrestre.  \n \nEl riesgo por remoción en masa en la zona en estudio, es de carácter\
      \ medio a bajo, capaz de \nser mitigado con obras civiles como encauzamientos, canalizaciones y zanjas de drenaje para\
      \ \naguas lluvias, evitando socavaciones y facilitando el flujo de las aguas lluvias transformadas en \nescorrentías\
      \ superficiales."
    - "Plan de Cierre - Faena Minera Salares Norte |   95 \n \nTabla 8-13: Criterios para el Análisis de Estabilidad del Botadero\
      \ Sur \nCondición FS Mínimo \nCorto Plazo \n(operacional) \nFalla Superficial  Estático 1,0 \nSísmico (1) \nFalla Profunda\
      \  Estático 1,5 \nSísmico 1,2 \nLargo Plazo \n(post-cierre) \nFalla Superficial  Estático 1,1 \nSísmico (1) \nFalla\
      \ Profunda  Estático 1,5 \nSísmico 1,1 \n(1): El material es depositado me diante volteo de camiones y queda con su\
      \ ángulo de reposo. Las fallas \nsuperficiales pueden ocurrir, pero las bermas de seguridad evitarán mayores deslizamientos\
      \ de material.  \nPara los análisis que involucren al depósito de relaves filtrados, ya sea por si solo o junto al botadero\
      \ Sur, el factor \nde seguridad mínimo para el corto plazo es de 1,5 para casos estáticos y 1,2 para la condición sísmica.\
      \ Para el largo \nplazo, en tanto, el factor de seguridad mínimo para la condición sísmica es de 1,1. \nLos factores\
      \ de seguridad obtenidos de los análisis de estabilidad son presentados en la Tabla 8-14 y en la Tabla 8-15. \nTodos\
      \ los análisis indican que; tanto el diseño del botadero Sur, como el diseño del depósito de relaves filtrados, por\
      \ \nsí solos como en conjunto, cumplen con los diseños de criterios d e los factores de seguridad.  \nLos análisis de\
      \ fallas profundas han incorporado la determinación del factor de seguridad mínimo para fallas que \nimplican la totalidad\
      \ del depósito, así como fallas que involucran 2 o 3 bancos, que pueden ser más críticos que \naquellos que involucran\
      \ la totalidad del depósito."
    - "Los antecedentes a evaluar por parte del SERNAGEOMIN, son: \nD.S. 248 de 2006 del \nMin. de Minería y \nEnergía \n\
      Reglamento para la Aprobación de Proyectos de Diseño, Construcción, Operación y Cierre de los \nDepósitos de Relaves\
      \  \n El EIA o DIA Indica la ubicación del Depósito, Incluyendo: \nARTICULO 14, LETRA c. \n- Plano Regulador de la comuna\
      \ donde se ubicará el depósito, si lo hubiere, o plano de la \ncomuna o provincia. \n- Las Distancias al Concentrador\
      \ y a los centros poblados cercanos. \n- Plano escala 1:2.500 de ubicación del depósito, señalando las coordenadas UTM.\
      \ de sus \nprincipales vértices. \n- Ilustrar la hoya hidrológica afectada, sobre un plano a una escala adecuada, en\
      \ coordenadas \nU.T.M. \nARTICULO 14, LETRA f. - Presentación de Antecedentes geológicos, Geotécnicos, Hidrológico,\
      \ Hidrogeológico, Sísmicos, \nMetereológico, Topográfico. \nARTICULO 14, LETRA q. \n- Determinación de la distancia\
      \ peligrosa, en kilómetros y análisis de la situación en terreno. \n- Plano de la hoya hidrológica afectada por la trayectoria\
      \ más probable del relave en el evento \nde colapsar el depósito. \nARTICULO 14, LETRA r. - Medidas de Control, mitigación,\
      \ restauración y compensación de los efectos de accidentes, \nsituaciones de emergencia y eventos naturales, según corresponda."
  - source_sentence: Indica la altura máxima del depósito
    sentences:
    - "El trabajo se realizará \nbásicamente con bulldozer y se estima una superficie a cubrir de 31.410 m 2 para el depósito\
      \ N°1 y 51.604 m2 \npara el depósito N°2. \n \nv. Disposición de estrato de suelo vegetal sobre la superficie y taludes\
      \ del depósito  \nSe realizará la dispo sición de una capa de suelo vegetal de 0,3 metros de espesor en la superficie\
      \ y taludes \nde los depósitos de ripios, lo que limitará la infiltración de aguas lluvia producto de precipitaciones.\
      \ El \nmaterial a utilizar para la cobertura se extraerá de movimie ntos de tierra locales. El trabajo se realizará\
      \ con \nmaquinaria convencional y se estima un volumen a cubrir para los de los depósitos de ripios N°1 y N°2, será\
      \ \nde 9.423 m3 y 15.481,2 m3 respectivamente. \n \nvi. Nivelación de la superficie del depósito \nSe realizará una\
      \ nivelación de la superficie de los depósitos de ripios de modo de darles una terminación \ngeométrica tipo “domo”\
      \ o “convexa” con el objeto de evitar la acumulación de aguas lluvia. Con la citada \nfigura, la superficie tendrá la\
      \ capacidad de bombeo del agua acumulada hacia los taludes de los bancos para \nsu escurrimiento natural de evacuación\
      \ hacia las canaletas recolectoras de soluciones y la piscina de \nsedimentación. Se estima una superficie a cubrir\
      \ de 31.410 m 2 para el depósito N°1 y 51.604 m 2 para el  \ndepósito N°2. \n \nvii. Cierre de accesos"
    - "Para el control de la velocidad del agua en la descarga de la tubería, se ha considerado la inclusión de \ncámaras\
      \ para provocar caídas que permiten disminuir la pendiente, con esto se logra controlar la velocidad \nmáxima a 5.5\
      \ m/s, además se contempla una estructura amortiguadora que genera un resalto contenido en \nella, para luego trasladar\
      \ el flujo hacia una canaleta, la cual finalmente descarga en una piscina de \nemergencia que posee una capacidad de\
      \ 3.000 m3, aproximadamente.  \nPara un mayor detalle del diseño de las obras a proyectar, ver el apartado de Diseños\
      \ Hidráulicos del \npresente informe y el Plano N°85_11382_H004_Piscina de Emergencia. \nBajo estas condiciones de diseño,\
      \ se prevé el control total de las aguas lluvias provenientes desde el \nexterior de la cubeta como también de aquellas\
      \ acumuladas por la precipitación directamente en ésta."
    - "44 \nRCA  Instalación Compromisos \nDepósito de \nRelaves Secos \nA los taludes y superficie del relave depositado\
      \ se realizará un \ntratamiento de protección a través de la colocación de una capa \nde material grueso u otro material\
      \ diseñado especialmente y \nadecuado para evitar la emisión de material particulado. Previo a \nello los taludes serán\
      \ reperfilados, emparejándose en una \npendiente única, suave, que evite cualquier derrame o “chorreo” \nmenor y que\
      \ facilite la posterior colocación de la cubierta \nprotectora mencionada anteriormente. Así mismo se ubicará \nseñalética\
      \ que identifique la zona cubierta por el depósito de \nrelave. \n0256/2010 Bodega de cianuro \nse procederá a desmantelar\
      \ la infraestructura correspondiente a \nla bodega de almacenamiento de este producto, como parte del \ndesmantelamiento\
      \ de otras unidades de la mina, plantas e \ninfraestructura de servicios de acuerdo a lo que se establezca en \nel Plan\
      \ de Cierre. \n209/2012 Rajo Quillota \n- La configuración final corresponderá a la del último año de \nexplotación.\
      \ \n- Guanaco Compañía Minera analizará la seguridad final del rajo y \nbotadero Quillota, y adoptará las medidas técnicas\
      \ que \ncorrespondan para otorgar estabilidad de largo plazo  los bancos \ndel rajo y el sellado de todas las vías de\
      \ acceso a éste. \n- Se instalarán señalizaciones referidas a las labores o sectores \n“cerrados”. \n- Asimismo, Guanaco\
      \ Compañía Minera instalará las \nseñalizaciones necesarias previniendo sobre los posibles riesgos \nde ingreso al botadero\
