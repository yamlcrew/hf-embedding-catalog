widgetData:
- source_sentence: востановить лк
  sentences:
  - Создайте, пожалуйста, обращение в ИТ поддержку на портале support
  - Если руководитель не успел согласовать или не согласовать задачу по ЭЛН, БЛ автоматически согласовывается
  - 'При проблемах со входом в личный кабинет, прежде чем создавать заявку в поддержку, убедитесь, что заходите в ЛК на сайте
    https://company-x5.ru, указываете актуальные и верные логин и пароль. Если Вам неизвестен логин, обратитесь к руководителю
    (ДМ), он сможет посмотреть Ваш логин и сбросить пароль в веб-табеле. Для самостоятельного сброса пароля позвоните с вашего
    мобильного телефона на +7 (XXX) XXX XX XX, наберите добавочный номер 10100, нажмите * и подтвердите сброс пароля, нажав
    #. Обновленный пароль отправляется по SMS.'
- source_sentence: Можно ли изменить период больничного по беременности и родам, если в ЭЛН указаны другие периоды?
  sentences:
  - 'По процессу, после согласования заявки на УР, необходимо подписать доп. соглашение. Сотрудникам КЦ необходимо подписать
    дополнительное соглашение: - удаленно с помощью обмена скан-копий или фото документа, а при невозможности – подтверждением
    по электронной почте. Как только доп. соглашение любым образом подписывается, работник отдела кадров снимает блокировку
    в SAP HR с доп. соглашения и Вам представляется возможность создать график работы в ЛК.'
  - Сотрудник может продолжить работу во время больничного по беременности и родам, при этом ему будет выплачиваться заработная
    плата. Пособие по беременности и родам будет рассчитано с фактической даты ухода в отпуск по беременности и родам (соответственно,
    будет оплачено меньшее кол-во дней БИРа).
  - У данного руководителя отсутствует доступ к сервису "Удаленная работа" по правилу, поэтому его не видно в ЛК2. Возможно
    на штатной должности сотрудника "Уровень подчиненности до СЕО = -2", в таблице ZHRT_ESS_REMAPP для всех форматов настройки
    такого плана (ограничение на ШД руководителя CEO и -1)
- source_sentence: Нет моей команды в ЛК. С уважением ДМ
  sentences:
  - Пожалуйста, создайте заявку в разделе "Зарплатная карта", выбрав подтему "Изменение банковских реквизитов"
  - 'При проблемах со входом в личный кабинет, прежде чем создавать заявку в поддержку, убедитесь, что заходите в ЛК на сайте
    https://company-x5.ru, указываете актуальные и верные логин и пароль. Если Вам неизвестен логин, обратитесь к руководителю
    (ДМ), он сможет посмотреть Ваш логин и сбросить пароль в веб-табеле. Для самостоятельного сброса пароля позвоните с вашего
    мобильного телефона на +7 (XXX) XXX XX XX, наберите добавочный номер 10100, нажмите * и подтвердите сброс пароля, нажав
    #. Обновленный пароль отправляется по SMS.'
  - Если в "команде" нет подчиненных сотрудников просьба обратиться в поддержку для корректировки
- source_sentence: исчезли вкладки в личном кабинете
  sentences:
  - Кнопка "изменить номер" телефона находится в личном разделе в ЛК. Если доступа к ЛК нет, для смены номера телефона, обратитесь
    в поддержку
  - Для изменения графика работы сотрудника создайте заявку в разделе "Заявки" по теме "Табель/график/рабочее время", выбрав
    подтему "Изменение графика".
  - Если в "команде" нет подчиненных сотрудников просьба обратиться в поддержку для корректировки
- source_sentence: Дайте обратную связь по моей заявке,отправлен ли логин и пароль сотруднику
  sentences:
  - Создайте, пожалуйста, обращение в ИТ поддержку на портале support
  - 'При проблемах со входом в личный кабинет, прежде чем создавать заявку в поддержку, убедитесь, что заходите в ЛК на сайте
    https://company-x5.ru, указываете актуальные и верные логин и пароль. Если Вам неизвестен логин, обратитесь к руководителю
    (ДМ), он сможет посмотреть Ваш логин и сбросить пароль в веб-табеле. Для самостоятельного сброса пароля позвоните с вашего
    мобильного телефона на +7 (XXX) XXX XX XX, наберите добавочный номер 10100, нажмите * и подтвердите сброс пароля, нажав
    #. Обновленный пароль отправляется по SMS.'
  - На текущий момент данные по больничным листам поступают работодателю от СФР напрямую. Если больничный лист не был подтвержден,
    а затем появилась необходимость в его проведении, то сотруднику следует создать заявку в Личном кабинете по теме "Перерасчет
    пособий" и указать номер ЭЛН.
