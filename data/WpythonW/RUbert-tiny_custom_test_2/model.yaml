widgetData:
- source_sentence: Сотруднику не войти в ЛК
  sentences:
  - 'При проблемах со входом в личный кабинет, прежде чем создавать заявку в поддержку, убедитесь, что заходите в ЛК на сайте
    https://company-x5.ru, указываете актуальные и верные логин и пароль. Если Вам неизвестен логин, обратитесь к руководителю
    (ДМ), он сможет посмотреть Ваш логин и сбросить пароль в веб-табеле. Для самостоятельного сброса пароля позвоните с вашего
    мобильного телефона на +7 (XXX) XXX XX XX, наберите добавочный номер 10100, нажмите * и подтвердите сброс пароля, нажав
    #. Обновленный пароль отправляется по SMS.'
  - Рекомендуем уточнить наличие вакансий в регионе, куда планируется переезд. Обратиться к руководителю для формирования
    заявки в рамках процесса «Перевод» с заполнением атрибутов заявки.
  - 'Оформление отпуска без сохранения заработной платы возможно 2 способами: 1. в разделе "Отпуска" в левом меню Личного
    кабинета сотрудника (https://company-x5.ru/vacations/plan?vp_page=1 ); 2. в разделе "Заявки", группа "Отпуск", плитка
    "Отпуск без сохранения ЗП". (https://company-x5.ru/requests/tiles/my/)'
- source_sentence: Как внести данные об автомобиле?
  sentences:
  - У Вас согласована Заявка на удаленную работу. График на удаленную работу ранее Вами не создавался. Вам необходимо зайти
    в личный кабинет, открыть вкладку "Удаленная работа" и создать себе график (от 1 до 6 месяцев). После создания, график
    перейдет к руководителю на согласование. А после согласования к Вам на подписание. После того, как процесс завершится,
    информирование прекратится.
  - Для внесения данных по личному автомобилю обратитесь, пожалуйста, к своему руководителю для создания заявки по теме "Изменение
    режима характера работы", подтема "Установка РХР и топливной карты". В комментариях опишите ситуацию и приложите ПТС,
    СТС, страховой полис и водительское удостоверение.
  - Выплата производится в случае утраты или повреждения жизненно необходимого недвижимого имущества работника, вследствие
    стихийных бедствий, пожара, кражи и т.д.;
- source_sentence: не получается оформить внутреннего совместителя
  sentences:
  - Создайте, пожалуйста, обращение в ИТ поддержку на портале support
  - Вам необходимо обратиться в специалистам HR для того, чтобы они удалили мероприятие "работа на дому" и доп.соглашение,
    тогда статус текущей заявки станет «Не актуально» и появится возможность создать новую.
  - Оформление заявки на прием внутреннего совместителя производится руководителем магазина/отдела/РЦ, в который трудоустраивается
    сотрудник. При положительном решении он создает заявку по теме "Прием совместителей". Инструкция и шаблоны доступны по
    ссылке https://company-x5.ru/cms/zayavkaskillaz
- source_sentence: Пропал календарь
  sentences:
  - 'При проблемах со входом в личный кабинет, прежде чем создавать заявку в поддержку, убедитесь, что заходите в ЛК на сайте
    https://company-x5.ru, указываете актуальные и верные логин и пароль. Если Вам неизвестен логин, обратитесь к руководителю
    (ДМ), он сможет посмотреть Ваш логин и сбросить пароль в веб-табеле. Для самостоятельного сброса пароля позвоните с вашего
    мобильного телефона на +7 (XXX) XXX XX XX, наберите добавочный номер 10100, нажмите * и подтвердите сброс пароля, нажав
    #. Обновленный пароль отправляется по SMS.'
  - Доступ к программе "карьера" появляется спустя 4 месяца после трудоутстройства в компанию. Если по прошествии 4х месяцев
    раздел по-прежнему недоступен, обратитесь в поддержку
  - Вкладка "график работы" недоступна сотрудникам с организационным присвоением "Офис" и на данный момент доступна только
    сотрудникам розницы.
- source_sentence: когда я получу деньги за отпуск
  sentences:
  - Создайте, пожалуйста, обращение в ИТ поддержку на портале support
  - Для изменения процента занятости сотруднику создайте, пожалуйста, заявку на сотрудника по теме "Изменение режима, характера
    работы"
  - Отпускные начисляются не позднее чем за три рабочих дня до даты начала отпуска.
