widgetData:
- source_sentence: Noiz jarriko du martxan Eusko Jaurlaritzak Barakaldoko BEC sustatzeko aurrez aurreko plana?
  sentences:
  - '[TOPIC: Galdera, Amaia Martínez Grisaleña Mistoa-Vox taldeko legebiltzarkideak lehendakariari egina, autoeskolako irakasleen
    prestakuntza-moduluan euskara eskatzeari buruz]

    [MARTÍNEZ GRISALEÑA, (Mixto-Vox)]:

    baina beldur gara neurri hori eredu baten hastapena baino ez dela, eta eredu hori kalbarioa izango dela gaztelania-hiztunentzat,
    aurrekaririk gabeko grinaz inposatuko baitu euskara bizitzako alor guztietan. Autoeskoletako arduradunek dagoeneko aldarri
    egin dute zuen Gobernuaren neurriaren aurka; ez dute aurkitzen ikastaroen irakaspena emateko behar besteko trebakuntza
    duen irakaslerik, eta ikasle asko baja ematen ari dira, behar besteko ezagutza ez dutelako euskaraz. 2010az geroztik jada,
    Gidabaimena Euskaraz planarekin, udal askok (Date: 30.09.2022)'
  - '[TOPIC: EH Bildu legebiltzar-taldeak egindako legez besteko proposamena, Lehiaren Euskal Agintaritzak Gipuzkoako Batzar
    Nagusiek 2013ko uztailaren 17an onartu zuten klausula sozialen inguruko 4/2013 Foru Arauaren aurka jarritako auzibidea
    bertan behera uzteari buruz. Eztabaida eta behin betiko ebazpena]

    [DAMBORENEA BASTERRECHEA, (PV-ETP)]:

    Gipuzkoako eraikuntzaren lan-hitzarmena ez badute eta beste lanhitzarmen bat badute, Gipuzkoako eraikuntzarena aplikatu
    behar zaiela. Bizkaiko enpresa guztiek ez dutela aplikatu behar Bizkaikoa; Gipuzkoakoa aplikatu behar dutela eskaintzak
    egin ahal izateko. Arabakoek, Europakoek… Horixe jartzen du arau horretan. Eta arau hori lan-eskubideak defendatzeko dago,
    ala enpresa guztiak kanpoan uzteko eta eskaintzak gutxi batzuek bakarrik egin ahal izateko? Izan ere, irudipen hori ematen
    du, eta horretaz ari gara eztabaidatzen gaur hemen. Zuek beste gauza batzuez hitz egitera etorri bazarete… Gai bat bakarrik
    gogoraraziko dizut, ez baitakit batzuk lehiaren eskubidearen kontu honekin nahasi egiten ote diren: lehiaren eskubidea
    kontsumitzaileei mesede egiteko da; kontsumitzaileen eskubideak bermatzen dira. Kontsumitzaileen eskubideak bermatzen
    dira, batetik, eskubide pribatuen aldean, kasu honetan Lehiaren Agintaritzak ezartzen dituen isunen bidez, eta, bestetik,
    administrazioen aldean, itxuraz printzipio horiek berak urratzen dituzten arauei errekurtsoak jarriz. Horixe da lehiaren
    eskubidea. Horretaz gain, dakizunez, Europar Batasunaren oinarrizko printzipioetako bat da langileak eta enpresak libreki
    ibiltzea batera eta bestera Europa osoan, eta zelaiari ateak jarri nahi izatea, bada, oso ondo dago, baina erabilgarritasuna
    eskasa edo hutsala izan daiteke. (Date: 05.06.2014)'
  - '[TOPIC: Interpelazioa, Gorka Maneiro Labayen Mistoa-UPyD taldeko legebiltzarkideak lehendakariari egina, Barakaldoko
    BECen finantza-egoerari eta Eusko Jaurlaritzak hartzeko asmoa duen erabakiei buruz]

    [MANEIRO LABAYEN, (Mixto-UPyD)]:

    Nik gaur egun zer egoeratan dagoen dakit, eta oso larria da egoera. Eta ziur naiz, ziur gara, eta hor daude datuak, kudeaketa
    erabat arduragabea izan dela urte hauetan guztietan, eta administrazioek ez dutela kontrolatu. Egia esan, badirudi Bizkaiko
    Foru Aldundia Eusko Jaurlaritzak zuzendaritza-talde berria izendatu zain dagoela, azpiegitura hori sustatuko duen aurrez
    aurreko plana abian jar dezaten. Noiz egingo dira urrats horiek? Izan ere, itxuraz, aurreko Gobernuak onartu zuen aurrez
    aurreko (Date: 15.03.2013)'
- source_sentence: Zein da Euskal Legebiltzar Talde Popularrak Benta Berriko babes ofizialeko etxebizitzei buruz egindako
    legez besteko proposamena?
  sentences:
  - Ofizialeko Etxebizitzei dagokien Legea betearaztea.
  - '[TOPIC: EH Bildu talde parlamentarioak egindako lege-proposamena, euskara jakiteko eskubidea bermatzeko. Aintzat hartzeari
    buruzko eztabaida eta behin betiko ebazpena]

    [ANDUEZA LORENZO, (SV-ES)]:

    ekimena pasatako legealdian EH Bilduk eta Podemosek lortu zuten akordioan oinarrituta dago. Gure ustez, ez da beharrezkoa
    lege bat. Horretarako, Euskararen Legea daukagu, agian, eguneratu beharrekoa. Gai honen inguruan, lan eta bide horretatik
    jarraitzea proposatzen dugu. Adibiderik onena, hala nola, 16 eta 30 urte bitarteko pertsonentzat egiaztatutako C1 mailara
    arteko matrikularen doakotasuna. Hemendik aurrera, aurrerapauso gehiago emateko aukera izango dugu, elkarlanaren bitartez,
    eta, agian, euskararekin daukagun konpromisoa berrituz. (Date: 19.11.2020)'
  - '[TOPIC: Euskal Legebiltzar Talde Popularrak egindako legez besteko proposamena, Donostiako Benta Berri auzoan dauden
    babes ofizialeko etxebizitzei buruz. Eztabaida eta behin betiko ebazpena]

    [URKOLA IRIARTE, (EA-NV)]:

    Eta nik esan nezake zuk zera proposatzen duzula, babes ofizialeko etxebizitzetan alokairuan dauden gizon-emakumeek sei
    hilabete lehenago eman dezatela izena Etxebiden, hala egitea baitagokie, baina Benta Berrikoek ez. Benta Berrikoak betirako
    erregistratuta egon daitezke. Orduan, ez dezagun hona ekarri Benta Berriko auzokoentzat kaltegarri bihur daitekeen hitzik.
    Hemen nik esan nahi izan dudan gauza bakarra da zuk proposatzen duzun irtenbide bateratu hori… Ez dakit zer irtenbide
    den. Zuk irtenbide (Date: 11.02.2016)'
- source_sentence: Zein da Eusko Jaurlaritzaren jarrera energia berriztagarri deszentralizatuaren sustapenari dagokionez?
  sentences:
  - Eta, bueno, herri gisa, gauden bezala gaude, eta kontua da nola egin dezakegun hobera energia berriztagarrien garapenari
    dagokionez. 2030erako Euskadiko Energia Estrategiaren barruan, helburu bat dago,
  - '[TOPIC: Interpelazio, José Ramón Becerra Carollo Elkarrekin Podemos taldeko legebiltzakideak Ekonomiaren Garapen eta
    Azpiegituretako sailburuari egina, energia berriztagarri deszentralizatua bultzatzeari buruz]

    [EKONOMIAREN GARAPEN ETA AZPIEGITURETAKO SAILBURUAK (TAPIA OTAEGI), (EA-NV)]:

    ahalik eta efizientziarik handienarekin egitea–, posible diren jarduketa guztiak jarri behar ditugu martxan. Uste dut
    egiten ari garela, eta, ildo horretan, sendotu egingo dugu gure jarduketa. Eta galdetu didazun guztiari erantzun diodala
    uste dut. Eta, agian, lehenengo txandan ez naiz horren argi aritu; oraingoan gauzak argixeago geldituko zirela espero
    dut. Eskerrik asko. (Date: 25.10.2019)'
  - '[TOPIC: Interpelazio, José Ramón Becerra Carollo Elkarrekin Podemos taldeko legebiltzakideak Ekonomiaren Garapen eta
    Azpiegituretako sailburuari egina, energia berriztagarri deszentralizatua bultzatzeari buruz]

    [EKONOMIAREN GARAPEN ETA AZPIEGITURETAKO SAILBURUAK (TAPIA OTAEGI), (EA-NV)]:

    ahalik eta efizientziarik handienarekin egitea–, posible diren jarduketa guztiak jarri behar ditugu martxan. Uste dut
    egiten ari garela, eta, ildo horretan, sendotu egingo dugu gure jarduketa. Eta galdetu didazun guztiari erantzun diodala
    uste dut. Eta, agian, lehenengo txandan ez naiz horren argi aritu; oraingoan gauzak argixeago geldituko zirela espero
    dut. Eskerrik asko. (Date: 25.10.2019)'
- source_sentence: Zein da Eusko Jaurlaritzaren jarrera enpresa estrategikoen sustraitze-galeraren aurrean?
  sentences:
  - '[TOPIC: Mozioa, David Soto Rodríguez Elkarrekin Podemos-IU taldeko legebiltzarkideak aurkeztua, enpresa estrategikoen
    sustraitze-galera ekiditeko mekanismoei buruz. Eztabaida eta behin betiko ebazpena]

    [SOTO RODRÍGUEZ, (EP-IU)]:

    gainera, behin baino gehiagotan entzun dut sailburu andrea esaten ez dela Eusko Jaurlaritzaren interesekoa enpresek egin
    behar dituzten inbertsio-proiektuen buru izatea. Ulertzen dut enpresek autonomia osoa dutela zertan iker dezaketen erabakitzeko.
    Baina, bai horixe, Eusko Jaurlaritzaren interesekoa izan beharko luke, halaber, interes orokorreko inbertsioak sortzeak,
    enpresa pribatuekin uztartuta, eta sektore publikotik erakustea jarraitu beharko litzatekeen bidea. Bestalde, uste dugu
    Kutxabanken eta aurrezkikutxen inbertsio-galeraren egitateak, eta Eusko Jaurlaritzak (Date: 06.05.2021)'
  - '[TOPIC: Galdera, Miren Gorrotxategi Azurmendi Elkarrekin Podemos-IU taldeko legebiltzarkideak lehendakariari egina, Euskadin
    lehen sektoreari eta garraiolariei produktu eta zerbitzuengatik bidezko prezioak bermatzeari buruz]

    [JAURLARITZAKO LEHENDAKARIAK (URKULLU RENTERIA), (EA-NV)]:

    Eskerrik asko, legebiltzarburu andrea. Gorrotxategi andrea, Jaurlaritza etenik gabeko komunikazioa mantentzen ari da lehen
    sektorearekin eta garraio-sektorearekin. Badakigu Europako legediak eta Estatuko legediak nola eragiten diguten, eta zure
    galderatik ondorioztatzen dut zalantzak dituzuela Espainiako Gobernuak asteartean, bigarren presidenteordea buru zuela,
    aurkeztu zituen laguntzen eraginkortasunari buruz. Nolanahi ere, gogorarazi nahi dizut neurri horiek ere kontuan hartu
    behar dutela Europar Batasunaren laguntzei buruz aurreko galderan aipatu dudan denbora-esparrua. Europar (Date: 01.04.2022)'
  - '[TOPIC: Galdera, Rosa Fresno Asensio Euskal Sozialistak taldeko legebiltzarkideak Segurtasuneko sailburuari egina, indarkeria
    matxistaren biktimak artatzeko zerbitzu espezializatuari buruz]

    [SEGURTASUNEKO SAILBURUAK (BELTRÁN DE HEREDIA ARRONIZ), (EA-NV)]:

    duen horri buruz, oso gauza zehatzari buruz ari gara hizketan. Ezin hobeto zehaztuta dago, eta denbora luzean landu da.
    Etxeko indarkeriaren, genero-indarkeriaren, zerbitzuari buruz ari gara hizketan. Bikotekideen edo bikotekide ohien indarkeria
    pairatu duten, pairatzen ari diren eta pairatzeko arriskua duten emakume guztiei eskaintzen die zerbitzu hori Ertzaintzak,
    bai eta familian edo etxean indarkeria pairatu dutenei edo pairatzen ari direnei ere. Begira, berriz ere datuei helduko
    diet. Apirilaren 18an, (Date: 22.04.2016)'
- source_sentence: Noiz egin zen itunpeko irakaskuntzaren finantzaketari buruzko barne-dokumentua?
  sentences:
  - '[TOPIC: Galdera, Alfonso Alonso Aranegui Euskal Talde Popularreko legebiltzarkideak lehendakariari egina, Gizarteratzeko
    eta Diru Sarrerak Bermatzeko Legeari buruz]

    [ALONSO ARANEGUI, (PV-ETP)]:

    hitzemandako aldaketa? Proposamen hori bada, hortaz, esan daiteke horren aitatasuna Jaurlaritzari dagokiola eta haren
    egiteko asmoaren pean dagoela. Eta guretzat ere oso garrantzitsua da; izan ere, zuek gutxiengoan zaudete eta, lege bat
    aurrera atera nahi baduzue edo erreforma bat aurrera atera nahi baduzue, kideren bat bilatu beharko duzue, eta proposamen
    horrek duena maximoen, minimoen adierazpen bat bada… Zenbaterainoko nahia duzue aldatzeko? Erabakitasunez aurrera egiten
    jarraituko al duzu, tribunan askotan eskatu (Date: 25.05.2018)'
  - Gogoan izan behar da dokumentu hori ez dela inolako akordioren ondorio, ez negoziazioen ondorio, ezta horri buruzko elkarrizketen
    ondorio ere, presidentearen ikuspuntua besterik ez baita.
  - '[TOPIC: Galdera, José Manuel Gil Vegas Euskal Talde Popularra-Ciudadanos taldeko legebiltzarkideak Hezkuntzako sailburuari
    egina, itunpeko irakaskuntzaren finantzaketari buruz]

    [GIL VEGAS, (Mixto-Ciudadanos)]:

    Eskerrik asko erantzunagatik, sailburu jauna. Hala ere, ez didazu gauza handirik argitu. Barne-dokumentu bat dela esan
    didazu, 2021eko apirilean egin zena, baina oraindik ez dakigu zergatik duen prentsak Ganbera honek baino lehenago. Eta
    esan didazu ikastetxeei eman zitzaiela, baina ez zela Legebiltzar honetara bidali. Eta, beraz, uler ezazu galdetzen jarraitu
    beharko dudala txosten hori gaur egun non dagoen eta zein den hark duen estatusa; galdetu ez ezik, berriro diot, (Date:
    18.02.2022)'
