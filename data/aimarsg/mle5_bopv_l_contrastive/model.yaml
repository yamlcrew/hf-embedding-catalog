  - source_sentence: Noiz jarri zen indarrean Euskal Autonomia Erkidegoko Bide Segurtasun Batzordea sortzen duen dekretua
      indargabetzen duen dekretua?
    sentences:
    - '2013ko urriaren 16ko 427/2013 Dekretuak arautzen du René Cassin saria, zeinaren helburua baita jendaurrean aitortzea
      eta nabarmentzea pertsonek eta elkarteek giza eskubideen arloan egin duten lan esanguratsua eta ibilbide pertsonal edo
      profesionalaren bidez giza eskubideen sustapen, defentsa eta zabalkundean hartu duten konpromisoa.

      Dekretu horren 3. artikuluan aurreikusten denez, urtero, Giza Eskubideen arloko eskumena duen zuzendaritzako titularrak
      saria emateko deialdia egingo du, ebazpen bidez; artikulu horren arabera, halaber, deialdian ezarriko da zenbat diru
      emango den sariaren bidez, eta hautagaiak aurkezteko epea eta tokia zein diren.

      Halaber, aipatu dekretuaren 6.1 artikuluan ezarritakoaren arabera, saria merezi duten pertsona edo pertsonak hautatzeko
      epaimahai bat eratuko da, Giza Eskubideen arloari loturiko itzal aitortua duten 9 pertsonez osatutakoa. Giza Eskubideen
      arloan eskumenak dituen zuzendaritzako titularrak izendatuko ditu pertsona horiek, ebazpen bidez.

      Horrenbestez, 2015eko ekitaldian, Biktimen eta Giza Eskubideen zuzendariak egin behar du sarirako deialdia, eta epaimahaikideak
      izendatu.

      Horrenbestez, hau

      EBAZTEN DUT

      :

      1. artikulua

      Xedea.

      Ebazpen honen xedea da «René Cassin» sarirako 2015eko deialdia egitea.

      2. artikulua

      Diru-zenbatekoa.

      Sariaren diru-zenbatekoa 12.000 euro da.

      3. artikulua

      Eskabideak aurkezteko epea eta lekua.

      Hautagaiak aurkezteko epea hilabetekoa izango da, ebazpen hau Euskal Herriko Agintaritzaren Aldizkarian argitaratzen
      den egunetik aurrera.

      Hautagaiak Eusko Jaurlaritzaren Bakegintza eta Bizikidetzarako Idazkaritza Nagusiko Biktimen eta Giza Eskubideen Zuzendaritzara
      bidali behar dira (Nafarroa kalea 2, 01007 Vitoria-Gasteiz), eta, horretarako, azaroaren 26ko 30/1992 Legearen 38.4
      artikuluan ezarritako edozein modu erabili ahal izango da (30/1992 Legea, Herri Administrazioen Araubide Juridiko eta
      Administrazio Prozedura Erkidearena).'
    - 'Bigarren artikulua

      Laguntzaile teknikoen kidegoan, Informatika-aplikazioak Garatzeko Goi-mailako Teknikaria aukeran sartzeko hautaketa-prozesuari
      dagozkion hautatutakoen eta esleitutako lanpostuen zerrenda osagarria, behin-behineko moduan, adiera ematea. Zerrenda
      hori Ebazpen honen II. eranskinean azaltzen da.

      Hirugarren artikulua

      Aurreko artikuluan aipatzen den zerrendaren aurka erreklamazioak aurkezteko, hamar egun balioduneko epea ezartzea. Epe
      hori, ebazpen hau argitaratzen den hurrengo egunean hasiko da.

      Laugarren artikulua

      Herri-Arduralaritzaren Euskal Erakundeko zuzendariaren Ebazpen honen beste atalen aurka, gora jotzeko errekurtsoa aurkeztu
      ahal izango zaio Justizia eta Herri Administrazio sailburuari. Errekurtsoa jartzeko epea hilabetekoa izango da Ebazpena
      Euskal Herriko Agintaritzaren Aldizkarian argitaratzen den hurrengo egunetik kontatzen hasita, hala ezartzen baita Herri
      Administrazioen Araubide Juridikoaren eta Administrazio Prozedura Erkidearen 30/1992 Legearen 114. artikuluan eta ondokoetan.
      Errekurtsoari ez bazaio ebazpen adierazirik ematen, errekurtsoa ezetsitzat joko da.

      Vitoria-Gasteiz, 2013ko apirilaren 4a.

      Herri Arduralaritzaren Euskal Erakundeko zuzendaria,

      MARÍA TERESA IRURETAGOYENA IBARGUREN.

      (Ikus .PDF)

      (Ikus .PDF)'
    - 'XEDAPEN

      INDARGABETZAILEA

      Honako hauek baliogabetuta geratzen dira: Euskal Autonomia Erkidegoko Bide Segurtasun Batzordea sortzen duen otsailaren
      9ko 22/1993 Dekretua, dekretu hori aldatzen duen martxoaren 7ko 215/1995 Dekretua eta dekretu honen aurka dauden xedapen
      guztiak.

      AZKEN XEDAPENAK

      Lehenengoa. Baimena ematen zaio Herrizaingo sailburuari dekretu honetan ezarritakoa betetzeko beharrezkoak diren xedapenak
      emateko.

      Bigarrena. Dekretu honek Euskal Herriko Agintaritzaren Aldizkarian argitaratzen den egunaren biharamunean hartuko du
      indarra.

      Vitoria-Gasteizen, 2008ko abenduaren 16an.

      Lehendakaria,

      JUAN JOSÉ IBARRETXE MARKUARTU.

      Herrizaingo sailburua,

      JAVIER BALZA AGUILERA.'
  - source_sentence: Zein da Leizaola sariko lehen sariaren zenbatekoa?
    sentences:
    - 'Honako hau da:

      «Jesús María Leizaola 2008» saria hutsik uztea.

      «Jesús María Leizaola 2008» sariaren akzesita hutsik uztea.

      Ebazpen hori interesatuei jakinaraztea.'
    - 'Lantaldea aurkezten bada, argi eta garbi adieraziko da nor izango den ikertaldearen arduraduna. Era berean, eskabidean
      espresuki adierazi beharko da taldeko kide bakoitzak duen partaidetzaren ehunekoa, aurkeztutako ikerlanean.

      Ezin izango dute deialdi honetan parte hartu jarraian aipatzen den kasuren batean aurkezten diren pertsona fisikoek
      edo jarraian aipatzen den kasuren batean aurkezten diren pertsonak kide dauzkaten taldeek.

      a) Dirulaguntzak edo laguntza publikoak eskuratzea galarazten duen debekuren bat duten edo administrazio-zehapen penalpean
      dauden pertsona fisikoek, Emakume eta Gizonen arteko Berdintasunari buruzko 2005eko otsailaren 18ko 4/2005 Legean sartutako
      debekuak eta zehapenak ere barruan direla; eta, era berean, laneko, merkataritzako edo kargu publikoko izaera dela-eta
      deialdi honetan parte hartzea bateraezina daukaten pertsonek, beti ere bere izaera horri aplikagarri zaion legedia kontuan
      hartuta.

      b) Euskal Autonomia Erkidegoko Administrazio Orokorrak eta bere erakunde autonomiadunek ematen dituzten izaera bereko
      laguntzen edo dirulaguntzen eremuan izapidetzen ari den itzultze edo zigortze-jardunbidean sartuta dauden pertsona fisikoek,
      prozedura amaitzen den arte.

      c) Aurreko hiru deialdietako batean Leizaola saria lortu dutenek.

      d) Funtsean aurreko urteetan aurkeztutako beste ikerlan batzuekin identitate handia duten ikerlanek.

      e) Dirulaguntzei buruzko azaroaren 17ko 38/2003 Lege Orokorraren 13. artikuluan ezarritako beste kasuren batean dauden
      pertsonek.

      Hirugarrena. Sariaren zenbatekoak honako hauek dira:

      a) Lehenengo saria: 20.000 euro.

      b) Akzesita: 10.000 euro.

      Zientzia-ikerlanik hoberenei emango zaizkie sari horiek.

      Lantalde batek aurkeztutako ikerlan bati ematen bazaio saria edo akzesita, taldekide guztiak izango dira onuradun, legez
      dagozkien ondorioetarako. Saria edo akzesitaren zenbatekoa lan-taldeak zehaztu duen ehunekoaren arabera banatuko da
      taldekideen artean; partaidetza-portzentajea adierazi ezean, zati berdinetan banatuko da.'
    - 'Matrikula/ohore-saria (10)

      Ohorezko aipamena (9,5)

      Bikain (9)

      Oso ondo (8)

      Nahikoa (6)

      Erreklamazioak.

      Emaitzak argitaratu ondorengo bost egun baliodunetan izangaiek proben kalifikazioei buruzko erreklamazio idatziak egin
      ahal izango dituzte Musikeneko ikastetxean; erreklamazioak epaimahaiburuari zuzendu beharko zaizkio. Erreklamazio horiek
      aurkezteko epea amaitu eta, gehienez ere, hamar eguneko epea ebatzi eta iragarki-taulan jarriko dira.

      Epaimahaiaren ebazpenaren kontra, izangaiek gora jotzeko errekurtsoa jarri ahal diote Hezkuntzako sailburuordeari, hilabeteko
      epean, ebazpena aurkeztu eta hurrengo egunetik hasita.

      Musikenen sartzea.

      Sarrera-probak gainditu eta espezialitate bakoitzean eskainitako plazetarako aukeratutako ikasleek matrikula egin ahal
      izango dute Musikenen uztailaren bigarren hamabostaldian, horretarako ezartzen diren egunetan.

      Matrikula formalizatzeko unean, izangaiek ziurtatu behar dute probak egiteko egunean deialdi honetako 3. atalean kasu
      bakoitzerako eskatzen diren betekizunak bazituztela, eta dokumentazio hau eman behar dute:

      Batxilergoa gainditu dutela adierazi duten izangaiek: Batxiler-tituluaren kopia konpultsatua edo eskatu izanaren ordezkagiria.

      25 urtetik gorakoak unibertsitatean sartzeko proba gainditu dutela aitortu dutenek: kalifikazio-txartelaren kopia konpultsatua.

      Heldutasun proba gaindituta dutela edo goi mailako lanbide heziketako ziklo baterako sarrera probako atal komuna gaindituta
      dutela adierazi duten izangaiek: proba horiek gainditu izanaren agiriaren kopia konpultsatua.

      Horiek egiaztatu ezean, zerrendako hurrengo izangaiak beteko du plaza.

      Bete gabeko plazarik geratzen bada, Musikenek plaza horiek esleitu ahal izango dizkie sarrera-probak beste musika-kontserbatorio
      edo musikako goi-mailako ikastegi batean gainditu dituzten ikasleei. Ikasle horiek onarpen-eskaerak egin ahal izango
      dituzte 2014ko uztailaren 7tik 18ra bitartean Musikeneko idazkaritzan. Eskaera horiek ikastegiko organo eskudunak ebatziko
      ditu.

      Espedienteak lekuz aldatzea.'
  - source_sentence: Zein da Congaden helburua Senegalen?
    sentences:
    - 'Ana Belen Sanjurjo Díaz, Enplegurako Lanbide Heziketa Zerbitzuko teknikaria.

      Ordezko batzordekideak:

      Begoña Fernández Fernández de Mendiola, Enplegurako Lanbide Heziketako Zerbitzuko teknikaria.

      Maria de Los Angeles De Oraa Oleaga, Enplegurako Lanbide Heziketako Zerbitzuko teknikaria.

      Ebaluazio-batzordea baliozkotasunez eratuta geratuko da batzordeburua eta idazkaria edo, hala badagokio, haien ordezkariak
      eta gutxienez batzordekideen erdia bertaratzen direnean.

      Batzordeburua ez dagoenean, batzordekideetako batek zuzenduko du batzordea, lehen zerrendatutako hurrenkeran.

      Idazkaria ez dagoenean, batzordekide batek beteko ditu bere funtzioak, lehen zerrendatutako alderantzizko hurrenkeran.

      Vitoria-Gasteiz, 2023ko urtarrilaren 2a.

      Lanbide-Euskal Enplegu Zerbitzuaren Enplegurako Lanbide Heziketako zuzendaria,

      JUAN CARLOS IBARROLA SÁENZ DE UGARTE.'
    - 'Osakidetza-Euskal Osasun Zerbitzuko zuzendari nagusiaren azaroaren 17ko 1428/2005 Ebazpenaren bidez, Gurutzetako Ospitaleko
      Pertsonaleko zuzendari izendatu zen Andrés Zearreta Otazua jauna.

      Ekainaren 26ko 8/1997 Legea, azaroaren 11ko 255/1997 Dekretua eta aplika daitezkeen gainerako xedapenak aztertu eta
      gero, Zuzendaritza Nagusi honek hau

      EBATZI DUT

      :

      Lehenengoa. Andrés Zearreta Otazua jauna Guru-tzetako Ospitaleko Pertsonaleko zuzendari kargutik kentzea, eta egindako
      lanagatik eskerrak ematea.

      Bigarrena. Ebazpen honek 2009ko irailaren 13tik aurrera izango du indarra.

      Hirugarrena. Ebazpen hau interesdunari, Guru-tzetako Ospitalari eta Giza Baliabideen Zuzenda-riordetzari jakinaraztea.

      Laugarrena. Ebazpen honen aurka gora jotzeko errekurtsoa aurkez dakioke Osakidetza-Euskal Osasun Zerbitzuko Administrazio
      Kontseiluari. Horretarako, hilabeteko epea izango da, ebazpen hau Euskal Herriko Agintaritzaren Aldizkarian argitaratu
      eta biharamunetik aurrera.

      Vitoria-Gasteiz, 2009ko irailaren 7a.

      Osakidetza-Euskal Osasun Zerbitzuko zuzendari nagusia,

      JULIÁN PÉREZ GIL.'
    - 'Bigarrena. Congad Senegalgo GKEen plataforma nagusia da, eta une honetan 180 GKE kide ditu, gutxi gorabehera. Herrialde
      osoan dihardu eskualdeko zelulen bitartez. Plataforma hori 1982an sortu zen, GKE kideei eta kide ez direnei laguntzeko
      eta haien gaitasunak indartzeko.

      Hirugarrena. 2014-2017 aldirako Garapenerako Lankidetzaren III. Gida Planean jasotako lehentasunezko 22 herrialdeetako
      bat da Senegal. Azken urte hauetan, proiektu-deialdiaren bitartez herrialde horretara bideratutako funtsak esponentzialki
      areagotu dira. Alabaina, herrialdean garatzen diren ekimenen kopurua handitu bada ere, euskal GKEek (Afrikaren aldeko
      Taldearen bitartez bereziki) uste dute Afrikako toki-bazkideek ahulezia handiak dituztela proiektuen kudeaketari/formulazioari
      dagokienez. 2016. urtean Garapenerako Lankidetzaren Euskal Agentziak Senegalera bisita egin zuen, besteak beste herrialdeko
      lankidetza-agente garrantzitsuak ezagutzeko, sinergiak sortu ahal izateko asmoarekin.

      GLEAk uste du Congad aliatu estrategikoa izan daitekeela Senegalen, ez bakarrik askotariko toki-erakundeak eratu eta
      gaitasunak indartzeko prozesuak eskaintzen dituen plataforma delako, baita Senegalgo erakundeen eta euskal GKEen arteko
      topaketa koordinatu eta ahalbidetzeko aukera ematen duelako ere. Hortaz, Hitzarmen honek aukera ematen du gaitasunak
      indartzeko eta euskal GKEekiko topaketa erraztu dezakeen gune bat sortzeko. III. Gida Planean Afrikako kontinentearentzat
      konprometitutako funts banagarrien (% 25) ehunekoa lortzeko lagungarri ere badela ahaztu gabe.

      Aurrekoak kontuan izanda, bi alderdiek hitzarmen hau sinatu dute, ondoren adieraziko diren klausulei jarraikiz,

      KLAUSULAK

      Lehenengoa. Hitzarmenaren xedea.

      Hitzarmen honen helburua garapen-aktore eraginkorrak prestatzea da, Senegalgo komunitateen eta kohesio sozialaren zerbitzuan.

      Bigarrena. Hitzarmenaren emaitzak eta emaitzen titulartasuna.

      Hitzarmen honekin lortu nahi diren emaitzak honako hauek dira:

      emaitza. Congaden eta Garapenerako Lankidetzaren Euskal Agentziaren artean gaitasunak indartzeko estrategia egitea,
      bi erakundeek detektatutako premietan oinarrituta.'
  - source_sentence: Zein dira Santa Marina Ospitaleko zuzendari medikoaren lanpostua lortzeko bete beharreko baldintzak?
    sentences:
    - Santa Marina Ospitaleko zuzendari medikoaren lanpostua hutsik dagoenez, Euskadiko Antolamendu Sanitarioari buruzko ekainaren
      26ko 8/1997 Legearen 27. artikuluan eta azaroaren 11ko 255/1997 Dekretuan ezartzen
    - 'Osakidetzako Santa Marina Ospitaleko zuzendari medikoaren lanpostua hutsik dagoenez; martxoaren 14ko 463/2020 Errege
      Dekretuaren 3. Xedapen Gehigarrian (4. atala) xedatutakoarekin bat etorriz (Errege Dekretu horren bidez, COVID-19ak
      eragindako osasun-krisiaren egoera kudeatzeko alarma-egoera deklaratu zen), eta Santa Marina Ospitaleko Zuzendaritza
      Medikoaren interes orokorra eta funtzionamendu ona babesteko eta zerbitzu horrek zuzendaririk ez izateak eragin ditzakeen
      kalteak saihesteko, Euskadiko Antolamendu Sanitarioaren ekainaren 26ko 8/1997 Legearen 27. artikuluan eta azaroaren
      11ko 255/1997 Dekretuan eta Osakidetzako erakunde sanitario integratuen uztailaren 3ko 100/2018 Dekretuan ezarritakoarekin
      bat etorriz, Zuzendaritza Nagusi honek erabaki du deialdi publikoa iragartzea, aipatutako lanpostua izendapen bidez
      betetzeko, ondorengo oinarriak betez.

      OINARRIAK

      Lehenengoa. Santa Marina Ospitaleko zuzendari medikoaren lanpostua betetzeko deialdia Ebazpen honen bitartez egiten
      da eta honako hauek aurkeztu daitezke: Osakidetzako zerbitzu sanitarioen erakundeei atxikitako langile finkoak (funtzionarioak,
      estatupekoak nahiz lan-kontratudun langile finkoak), Autonomia Erkidegoko Administrazio Orokorreko eta haren erakunde
      autonomoetako funtzionarioak eta baldintzak betetzen dituen beste edozein. Hauek dira bete beharko dituzten baldintzak:

      Medikuntzako eta Kirurgiako lizentzia edukitzea.

      Administrazio eta kudeaketa lanetan eskarmentua edukitzea.

      Bigarrena. Interesa dutenek beren eskaera Osakidetzako Erakunde Zentraleko Giza Baliabideen Zuzendaritzara bidali beharko
      dute, eta 10 egun balioduneko epea izango dute horretarako, deialdiaren ebazpena Euskal Herriko Agintaritzaren Aldizkari
      ofizialean argitaratu eta hurrengo egunetik kontatzen hasita. Administrazio Publikoen Administrazio Prozedura Erkidearen
      urriaren 1eko 39/2015 Legearen 16.4 artikuluan xedatzen den moduan ere aurkeztu ahalko dira.

      Hirugarrena. Deialdi honetan parte hartu nahi duten izangaiek, eskabidearekin batera, honako hauek adierazten dituen
      curriculum vitaea aurkeztu beharko dute:

      Titulu akademikoak.

      Orain arte betetako lanpostuak.

      Lanbidean eta kudeaketa sanitarioan daukaten esperientzia.'
    - 'Dirulaguntza publikoak emateko orduan ezinbestekoa da publikotasun-printzipioa betetzea. Hori dela eta, Ekonomiaren
      Garapen, Jasangarritasun eta Ingurumeneko sailburuaren 2021eko ekainaren 9ko Aginduan xedatutakoaren babespean emandako
      laguntzei dagokienez agindu horren bidez Indartu Programa arautu zen, laguntzak emateko Nerbioi itsasadarraren ezkerraldean
      eta Oiartzualdean eta Euskal Autonomia Erkidegoko urteko batezbestekoaren % 15etik gorako langabezia-tasa duten beste
      udalerri batzuetan ekoizpen-inbertsioa egingo duten eta, beraz, gune horietako lehiakortasun-hobekuntza eta garapen
      ekonomikoa eragingo duten enpresei, eta enpresa interesdunei banan-banan jakinarazi ondoren laguntzak emateko ebazpena,
      Euskal Herriko Agintaritzaren Aldizkarian argitaratzen da esleipendunen zerrenda.

      Horiek horrela, aurreko paragrafoan adierazitakoarekin bat etorriz, hau

      EBAZTEN DUT

      :

      Artikulu bakarra

      Argitara ematea Ekonomiaren Garapen, Jasangarritasun eta Ingurumeneko sailburuaren 2021eko ekainaren 9ko Aginduaren
      esparruan emandako laguntzen 2021eko onuradunen zerrenda (ikusi eranskina); agindu horren bidez Indartu Programa arautu
      zen, laguntzak emateko Nerbioi itsasadarraren ezkerraldean eta Oiartzualdean eta Euskal Autonomia Erkidegoko urteko
      batezbestekoaren % 15etik gorako langabezia-tasa duten beste udalerri batzuetan ekoizpen-inbertsioa egingo duten eta,
      beraz, gune horietako lehiakortasun-hobekuntza eta garapen ekonomikoa eragingo duten enpresei.

      Vitoria-Gasteiz, 2022ko urtarrilaren 21a.

      Industriako sailburuordea,

      MIKEL AMUNDARAIN LEIBAR.

      (Ikus .PDF)'
  - source_sentence: Zein egunetan izango ditu ondorioak Iñaki Pérez Sanz jaunaren izendapenak?
    sentences:
    - 'g) Zertarako ematen den diru-laguntza, horretarako erabiltzea, eta ez beste ezertarako.

      h) Diru-laguntza eman dion erakundeari jakinaraztea Estatuko edo nazioarteko beste edozein administraziok edo erakunde
      publikok nahiz pribatuk helburu bererako bestelako diru-laguntzak edo laguntzak eman dizkiola.

      Kontrol Ekonomikoko Bulegoari eta Herri Kontuen Euskal Epaitegiari, beren eginkizunetan dihardutela, deialdi honen kontura
      jasotako diru-laguntzen inguruan eskatzen duten informazioa ematea.

      j) Laguntza ematerakoan kontuan izan zen dena delako egoera objektibo edo subjektiboa aldatu egin baldin bada, horren
      berri ematea laguntza eman duen erakundeari.

      k) Polizia eta Larrialdietako Euskal Akademiak eskatzen duen informazioa ematea, bereziki eginbeharrak bete izana justifikatzeari
      dagokionez. Informazio hori diru-laguntza ordaindu aurretik eman beharko da.

      8. artikulua

      Diru-laguntzak eskuratzeko kirol-irizpideak.

      Eskatzaileek, ebazpen honetan araututako laguntzak eskuratzeko, gutxienez baldintza hauetakoren bat betetzen dutela
      egiaztatu beharko dute:

      2015eko Polizien eta Suhiltzaileen Munduko Jokoetan, 5. postua edo hobea lortu izana egiaztatzea. Taldekako probetan,
      nahikoa izango da taldeko partaide batek egiaztatzea postu hori.

      Edo, bestela, urrezko domina bat, edo zilarrezko bi, edo brontzezko hiru lortu izana 2009tik 2014ra bitartean, biak
      barne, izandako Munduko Jokoetan edo Europakoetan, eta hala egiaztatzea.

      9. artikulua

      Hautatzeko prozedura.

      Eskatzaileen artean banatuko dira laguntzak, Polizia eta Larrialdietako Euskal Akademiaren zuzendari nagusiaren ebazpen
      bidez, eta ebazpen honetako 10. artikuluan araututako Balorazio Epaimahaiaren proposamenez.

      Ebazpen honetako 7. artikuluan zehaztutako eginbeharrak eta 8. artikuluan ezarritako kirol-irizpideak betetzen dituzten
      eskatzaileei esleituko zaie diru-hornidura.

      Hori horrela izanik, ebazpen honetako 2. artikuluan zehaztutako ehunekoak eta zenbatekoa kontuan hartuz emango dira
      laguntzak. Dena dela, diru-hornidura nahikoa ez balitz, eskatzaileen artean hainbanatuko litzateke, betiere diru-horniduraren
      zenbatekoa gainditu gabe.

      10. artikulua

      Balorazio Epaimahaia.'
    - 'Irailaren 5eko 2016/2022 Ebazpenaren bidez, Osakidetza-Euskal osasun zerbitzuko Arabako Erakunde Sanitario Integratuan
      Langileen Zerbitzuko Administrazio eta Kudeaketako Atalburu-A (Hautaketa eta Horniketa Arloa) lanpostu bat izendapen
      aske bidez betetzeko deialdia argitaratu zen.

      Batzordeak baloratu egin du aurkeztutako eskabide onartu bakarra, eta dagokion izendapen-proposamena egin du. Horiek
      horrela, Iñaki Pérez Sanz jaunak dituen ezagutza akademiko eta profesionalak kontuan hartuta, erabaki da hura izendatzea,
      izendapen aske bidez, Osakidetza-Euskal osasun zerbitzuko Arabako Erakunde Sanitario Integratuko Langileen Zerbitzuko
      Administrazio eta Kudeaketako Atalburu-A (Hautaketa eta Horniketa Arloa).

      Beraz, bat etorriz Euskadiko Antolamendu Sanitarioari buruzko ekainaren 26ko 8/1997 Legearen 28. artikuluaren hirugarren
      arau komunarekin, Osakidetzaren lanpostu funtzionalak arautzen dituen uztailaren 19ko 186/2005 Dekretuarekin eta azaroaren
      11ko 255/1997 Dekretuarekin,

      EBAZTEN DUT

      :

      Lehenengoa. Iñaki Pérez Sanz jauna izendatzea Langileen Zerbitzuko Administrazio eta Kudeaketako Atalburu-A (Hautaketa
      eta Horniketa Arloa) Osakidetza-Euskal osasun zerbitzuko Arabako Erakunde Sanitario Integratuan.

      Bigarrena. Izendapen honek 2022ko azaroaren 9an izango ditu ondorioak.

      Hirugarrena. Izendapenak egin dituen organoak edozein unetan kargugabetu ditzake, bere eskumen-ahalez, izendapen askeko
      sistemaren bidez izendatu dituen langileak. Kargutik kentzeak edo mugiarazteak zera eragingo du: langilea beste postu
      funtzional batera lekualdatuko da, baina, edonola ere, interesdunak duen kategoriari dagozkion baldintzei eutsiko die.
      Hain zuzen, antzeko ezaugarriak dituen lanpostu bati atxikiko zaio eta, ahal dela, izendapena jaso aurretik bera zegoen
      antolakuntza- eta lurraldetasun-baldintza berberetan. Atxikipen horrek, hain zuzen, kargugabetze-dataren hurrengo egunetik
      aurrera izango ditu ondorioak, eta lanpostua betetzeko eskatzen diren betekizun eta baldintza guztiak bete beharko ditu.'
    - 'Hezkuntza, Unibertsitate eta Ikerketako sailburuaren 2011ko ekainaren 1eko Aginduaren bitartez Ikertzaileak Prestatzeko
      eta Hobetzeko laguntza berrietarako deia egin eta laguntza horiek arautu ziren.

      Agindu horren 14., 29. eta 43. artikuluen arabera, laguntzak ematea edo ukatzea Unibertsitate eta Ikerketako sailburuordearen
      ebazpen bakar eta berariazkoaren bidez gauzatuko da, ebaluazio-batzordearen ebazpen-proposamena aintzat hartuta.

      Horregatik guztiagatik, eta kontuan hartuta Berariazko Aholku Batzordeen ebaluazioa eta Ebaluazio-Batzordeak helarazitako
      proposamena

      EBAZTEN DUT

      :

      Lehenengoa. I. eranskineko ikertzaileei 2011-2012 ikasturterako honako laguntza hauek ematea: Espainiako ezarpen-zentroetan
      ikertzaileak prestatzeko doktoratu aurrekoak (AE modalitatea).

      Bigarrena. II. eranskinean ageri den onuradun bakoitzari Ikertzaileak prestatzeko laguntzak ematea 2011-2012 ikasturtean,
      AK modalitatean (atzerriko ezarpen-zentroetan pertsonal ikertzailea prestatzeko doktoratu aurreko laguntzen programa).

      Hirugarrena. III. eranskinean ageri diren ikertzaileei laguntzak ematea 2011-2012 ikasturtean, DKR modalitatean (EAEko
      Ezarpen Zentroetan hobekuntza gauzatzen ari diren eta atzerrira lekualdatzen diren ikertzaile doktoreentzako laguntza
      programa).

      Laugarrena. Hiru erreserba zerrenda agertuko dira, atalka eta lehentasunaren arabera: IV. eranskinean AE modalitateetakoak,
      V. eranskinean AK modalitateetakoak, eta VI. eranskinean DKR modalitateetakoak. Zerrenda horietan ageri direnek laguntza
      eskuratu ahal izango dute postu bat hutsik geldituz gero, 2011ko ekainaren 1eko Aginduaren 14., 29. eta 43. artikuluetako
      6. klausulan jasotakoaren arabera.

      Bosgarrena. VII. eranskinean aukeratze-prozesutik kanpo gelditu diren pertsonen zerrenda eta kanpo geratzearen arrazoiak
      agertuko dira.'
