widgetData:
- source_sentence: Noiz hasi zen Ukrainako gerra, 2022ko otsailean ala 2013an?
  sentences:
  - 'Zu baino, izar maite,


    Charmantago, nor laite?


    Hargatik izan zaite


    Ongi-jin Lur honetan;


    Hargatik urthez asko,


    Usain onezko flasko,


    Thesaur bretoin ‘ta basko,


    Argi ‘zazu guretan.




    Ez dago zurekin hitz egiterik, tartean Jon Mirande sartu gabe…


    Eta zer nahi duzu, bada! Bizien artean azkena izan nintzen hura ezagutu zuena! Miranderen ilobak hor dira beti, baina
    gaztetxo ziren. Hala ere, familiatik kanpo, ez da beste inor. Piarres Lafitte, Jean Haritxelar, Piarres Xarriton… hilak
    dira denak. Nire anaia Robert ere hor da beti, ezagutu zuen Mirande, denbora batean, gu bi anaiok elkarrekin izaten baikinen
    Miranderen etxean. Baina Robert laster berezi zen gugandik, zeren Mirandek izutzen baitzuen. Ni ez ninduen izutzen, saiatzen
    nintzen beti gauzen eztitzen, baina ez zen aise. Egun batean, haustura izan genuen Mirandek eta biok.


    Zein izan zenuen harekin hausteko arrazoia?


    Artikulu bat egin nuen, eta eskuin muturreko bretoi aldizkari batean eman zuen Mirandek. Hura ikusi nuelarik, jabetu nintzen
    kapitulu bat kendu zuela. Kultura politikak Europan aipatzen nituen, eta Hitlerren kontra mintzatu nitzen. A!, gaixo Hitler!
    Miranderen ustetan gizon hura ez zen ukitu behar! Eta bada beste gertakari bat Miranderekin moztera behartu ninduena.
    Egun batez, esan zidan behar zuela bretoi, flandriar eta zenbait gutxiengorekin talde bat sortu, gure hizkuntzen alde.
    Bazen bilkura bat, eta Miranderekin joan nintzen hara. Atea ireki zutenean, «Heil Hitler!» izan zen agurra! «Non sartu
    nau honek, ordea?!». Eta erabaki nuen ez nuela gehiago harremanik ukanen Miranderekin. Bizpalau urte egon ginen elkar
    ikusi gabe.'
  - 'Ikus-entzunezkoak


    Nemesio Etxanizi buruzko telesail bat


    ETB1ek ez du helduentzako euskarazko telesailik eman 2021eko irailaren 2tik. Fikziozko askotariko proiektuak gelditu dira
    tiraderan. Nemesio Etxanizi buruzko telesail batek estereotipo batzuk hautsiko lituzke.


    «Antoni! Antoni! / Zure atean nago ni / Ai, Anton! Ai, Anton! / Ate ondoan or konpon. Ormatxoriak negu gorrian / ez du
    atsegin elurra: / zerua goibel, kabia otza / ta janari gabe lurra / Ai, maite, nere biotzak duan / zure otzaren bildurra!
    / Biontzat kabi bat berotzeko / bilduko nuke egurra». Apaiz bat zen Antoni eta Anton kantaren hitz horien egilea. Ez nolanahikoa,
    ordea: Nemesio Etxaniz. Doan doa lerro hauetatik proposamena: Etxanizen bizitzaren inguruko fikziozko telesail bat ETBrentzat
    eta Netflixentzat. Zortzi atalekoa.


    Proposamenak ez duenez aurrera egingo, libre da irudimena aske uztea. Irudimenarekin zerikusi gutxi du datu honek, ordea:
    ETB1ek 2021eko irailaren 2an emititu zuen azkeneko aldiz helduentzako telesail bat euskaraz. Horrenbestez, bi urte eta
    zazpi hilabete pasatu dira Euskal Herriko ikus-entzuleek telebista konbentzionalean euskarazko telesail bat azken aldiz
    ikusi zutenetik; haurrentzako Go!azen eta Irabazi arte telesail duinak albo batera utzita, noski. Eta albo batera utzita
    Primeran plataforman Itxaso eta Touré detektibea estreinatu dituztela, bai. Baina telebista konbentzionalean, alerik ez
    bi urte eta zazpi hilabetean.'
  - 'Amaitzekotan dela esatea gudak irabazlea baduela esateko modu bat da. Orain arteko parametroetan mantentzen den bitartean,
    noski. Besterik litzateke NATOren tropak Ukrainan inoiz sartuko balira. Egungo baldintzetan guda oraindik zerbait luza
    daiteke, baina Ukrainak sekula ez dio Errusiari irabaziko. Arma eskasiarekin, tropa kopuruarekin eta diru faltarekin dituen
    arazoengatik eta bere hornitzaile nagusiak izan diren estatubatuarrek atera lezaketen etekin guztia dagoeneko lortua dutela
    ikusten dutelako. Hortaz gain, Europako Batasunak armategiak hutsik dauzka eta ezin dio Ukrainari bere estatuari eusteko
    eta armak erosteko behar lukeen dirutza eman. Azken argudioa, eta erabakigarria, arma nuklearrei dagokiena da: Errusiak
    arma mota horietaz biltegiak beteta dauzka eta Ukrainak ez du alerik eta AEBek ez dituzte berenak erabiliko. Guda hau
    Errusiarentzat existentziala da eta estatubatuarrentzat negozio bat gehiago besterik ez.

    Gudari amaiera emanen dion negoziazio mahaian bakerako baldintzak irabazleak jartzen dituela zalantzan jartzeak ez du
    zentzurik. Eta guda honetan baldintza nagusia Ukraina NATOn ez sartzea da.

    Akats larria da guda Errusiak hasi zuela esatea. Errusiaren «operazio militar berezia» 2022ko otsailean hasi zen. Baina
    guda hau 2013an, Euromaidanekin batera, hasi zela Jens Stoltenberg NATOko Idazkari Nagusiak berak publikoki onartu du
    hainbat aldiz. Wikipedian ere hala irakur liteke. Baita El País eta egunkari hegemonikoetan ere. Leku askotan.

    Guda hasi zuenak bukatu behar baldin badu, jo dezagun 2013-14ra, Euromaidanera. Estatu kolpea eman zuten naziak plazan
    zirela, Victoria Nuland AEBetako Estatu Idazkariordea eta John McCain eta Chris Murphy senatariak babesa eskaintzera azaldu
    ziren bertan. Operazio politiko hori nork antolatu eta finantzatu zuen adierazteko modu hoberik ez da. Beraz, AEBei eta
    beren guda-tresna nagusia den NATOri zuzendu beharko zaie guda bukatzeko deia.'
- source_sentence: Non ikus daiteke Mi pequeño gran samurai film labur dokumentala bihartik aurrera?
  sentences:
  - ETB1 kateak gaur estreinatuko du dokumentala, 23:45ean. Bihartik aurrera, berriz, AEK-k Youtuben jarriko du, doan ikusteko
    moduan. Primeran plataforman ere bihartik aurrera izango da ikusgai.
  - 'Ikus-entzunezkoak


    Ekai Lersundiren istorioa kontatzen duen lana, bihartik Primeran-en


    Ekai Lersundi Ondarroako (Bizkaia) gazte bat zen. Gazte trans bat, burokraziaren aurka borrokan ari zena —hormonen ordezkapen
    terapiaren zain borroka etsian ari zen—. Eta 2018an bere buruaz beste egin zuen, eta hil egin zen. Haren istorioa 21 minutuan
    kontatzen du Mi pequeño gran samurai film labur dokumentalak. Zinegoak jaialdian estreinatu zuten lana. Ondotik, hainbat
    proiekzio egin zituzten herriz herri. Bihartik aurrera, berriz, Primeran plataforman ikusgai egongo da.


    Arantza Ibarrak zuzendu zuen film dokumentala. Izar Filmsek ekoitzi zuen, eta Izaskun Arandia da ekoizlea. Agertzen diren
    elkarrizketatuen artean, gazte transaren gurasoak eta Naizen elkarteko ordezkariak daude.


    Mi pequeño gran samurai film labur dokumentalaren trailerra.


    Haur trans baten telesail bat ere estreinatuko du bihar Primeran plataformak: Butterfly. Erresuma Batuko ekoizpen bat
    da. Trantsizio garaian den haur baten istorioa kontatzen du, baita haren familiarena ere. Maxek 11 urte ditu, neska bezala
    identifikatzen da, eta bere bizitza Maxine bezala bizi nahi du.


    Otsailaren 5etik, bestalde, Estibaliz Urresolaren 20.000 especies de abeja fikziozko filma ikus daiteke plataforman. Horretan
    ere haur trans bat da protagonista. Hiru Goya sari jaso ditu berriki pelikulak.


    Gaia aldatuz, Primeran plataformak Olairon: Bilboren erraiak dokumentala jarriko du bihar bere katalogoan. Bilboko burdin
    meategien iraganean murgiltzen da lana. Hiriko azken meatzariaren istorioa ere kontatzen du.


    Touré detektibea telesailaren bosgarren atala bihar iritsiko da plataformara. Eta datorren astean, seigarren eta azkena.'
  - 'Bukele, oposiziorik gabeko lehian


    Nayib Bukele El Salvadorko presidentetzara aurkeztuko da bigarren aldiz jarraian. Nahiz eta konstituzioko hainbat artikuluk
    debekatu egiten duten berriz segidan hautatua izatea, Bukelek baimen berezi bat eskuratu du, Hauteskundeetarako Auzitegi
    Gorenaren eta parlamentuaren onespenari esker eta Justiziako Gorte Goreneko konstituzio arloko salak oniritzia emanda
    —bozak egin baino sei hilabete lehenago dimisioa emateko baldintza jarri zion—. Itxura guztien arabera, Bukelek ez du
    arazorik izango gaur irabazteko; estatuburua aukeratzeko bozetara aurkeztu ez diren hiru alderdiren babesa jaso du, gainera:
    Batasun Nazionaleko Aliantza Handiarena, PDC Alderdi Demokrata Kristauarena eta Aldaketa Demokratikorena.


    Inkesta gehienetan aurreikusten da Bukelek %60tik gorako babesa izango duela —N Ideia Berriak alderdikoa da—, eta horietako
    batean %81eko babesa izango duela ere ondorioztatu da. Hortaz, badirudi ez dutela bigarren itzulirik egin beharko —lehen
    itzulian botoen %50 lortu behar dira bigarren itzulirik ez egiteko—. Haren atzetik geratuko lirateke, urrun, Arena Aliantza
    Errepublikano Nazionalistaren presidentegai Joel Sanchez eta FMLN Nazio Askapenerako Farabundo Marti Fronteko Manuel Flores,
    botoen %4 jasota; eta gainontzeko hiru alderdien hautagaiek bozen %1 inguru eskuratuko lukete. Datu horiek agerian utzi
    dute, beste behin ere, zein ahulduta dagoen El Salvadorko oposizioa, eta erakutsi dute Bukelek ez duela izango lehiakide
    indartsurik.


    2019tik presidente dena —sei hilabeteko eszedentzia moduko bat hartu du, Justiziako Gorte Gorenaren baldintza betetzeko—
    berriro aurkezteak zalaparta sortu du, bai El Salvadorren, baita nazioartean ere. Horren ondorioz, AEE Amerikako Estatuen
    Erakundeak eta EB Europako Batasunak behatzaileak bidaliko dituzte herrialde horretara, presidentetzarako hauteskundeetan
    iruzurrik egongo ez dela gainbegiratzeko; AEEk iragan astelehenean iragarri zuen ikuskaritza lanak hasiak zituela.'
- source_sentence: Zer esan nahi du "aaztiyen hitzak" Arbizuko euskalkian?
  sentences:
  - Azken horretan, musika elektronikoa Euskal Herriko musika tradizionalarekin uztartu du Reparazek, modu askean, eta soinu
    identitate propioa sortu du hamabi abestietan.
  - 'Pentsio osagarriaren zati bat kolpe batean berreskuratzeko aukera emango du dekretu berriak


    Bi urteko lanketaren ondoren, Eusko Jaurlaritzak legealdia amaitu aurretik onartuko du pentsio osagarrien sistema Arabara
    eta Bizkaira ere hedatzeko helburua duen araudia. Aurreneko urratsa gaur egin dute, dekretuak Gizarte Aurreikuspenaren
    Euskal Kontseiluaren onespena jasota. Kontseilu horretan ordezkaritza dute pentsio osagarrien sistema kudeatzen duten
    talde guztiek, hala nola Eusko Jaurlaritzak, foru aldundiek, kooperatibek, sindikatuek, patronalak eta BGAE borondatezko
    gizarte aurreikuspenerako erakundeek.


    BGAE edo pentsio osagarriak nahiko hedatuta daude Gipuzkoan, Geroaren bitartez. Gipuzkoako metalgintzako lan hitzarmenak
    sortu zuen BGAE hori, baina gero harekin bat egin dute lurraldeko beste hainbat sektoretako itunek, eta gaur egun langileen
    erdiek baino gehiagok dute enpleguari lotutako pentsio osagarri bat. Araban eta Bizkaian, ordea, langile publikoek, kooperatibista
    batzuek eta Kutxabank, Tubacex eta beste enpresa batzuetako langileek dituzte, gutxi gorabehera langileen %15ek. Nafarroan
    ere gutxi hedatuta daude.


    Eusko Jaurlaritzak landu duen dekretuan, enpleguari lotutako pentsio osagarriak arautu nahi dituzte. Eta, zehazki, lehentasuneko
    BGAEak; hau da, enplegatzaileen eta langileen ekarpenarekin hornitzen diren pentsio planak. Horietako hiru daude gaur
    egun: Geroarena, Elkarkidetzarena (udaletako eta aldundietako langileena), eta Lagun Aro (Mondragoneko eta beste kooperatiba
    batzuetako langileena).


    Plan horien helburua da langileak erretiroa hartzen duenean pentsio osagarri bat eskuratzea hilero. Hots, jarritako dirua
    errenta gisa kobratzea. Baina arazoa sortu da Geroa-ko kide batzuek eskatu dutelako jarritako kapitala kolpe batean berreskuratzeko,
    eta ez errenta gisa. Geroa-ko Kaltetuak izeneko talde bat osatu dute beren aldarrikapenak defendatzeko.


    Araua, errentan jasotzea'
  - 'Nolakoa izan da sortze prozesua? Diskoa lantzen hasi zinenean baino zalantza gehiago sortu zaizkizu bidean?


    Diskoaren hasieran, emakume batek dio ez dela fio ohitura berriekin. Horrela dio: «Beya eneiz ni ohitura berriyoki fiyetzen/
    Zer da baa ohittura? Tradiziyua? /Itzel bat. Besteeik ez». Zalantzak ditu diskoaren sarreran, eta are zalantza gehiago
    ditu diskoaren outro-an, bukaeran, esaten baitu ez zaiola deus argi-argi geratu, eta orain, diskoaren abenturaren ondoren,
    hasieran baino zalantza gehiago dituela. Nire ibilbidea zein izan den transmititu nahi izan dut horrekin, emakume horren
    ahotan jarri ditudan hitz horiek nireak dira, horrelakoa baita nire bidaia. Zalantza gehiago ditut orain hasieran baino,
    eta, arraroa dirudien arren, uste dut osasuntsua dela hori.


    Aaztiyen hitzak duela gutxi esan nahi du Arbizuko euskalkian. Uste osoak zalantzan jarri dituzu izenburutik bertatik.


    Uste dut gure identitatea definitu dugun erarekin lotuegiak gaudela. Identitatearen barruan sar dezaket nire jatorria,
    gurasoena, nire hizkuntza, eta sonoritate batzuk ere sar ditzaket, ideiak, ideologia... Baina horiek zurrunak izateak
    ateak ixten dizkigu. Izenburuarekin esan nahi dut ongi dagoela konbikzioak izatea, identitate bat definitu nahi izatea,
    baina izan gaitezen likidoak, agian arbasoen herentzia dela pentsatzen dugun sinesmen hori ez baita hain aspaldikoa, akaso
    duela gutxikoa da, aaztiyenkoa.


    «Zalantza gehiago ditut orain hasieran baino, eta, arraroa dirudien arren, uste dut osasuntsua dela hori».


    Maiz esan duzu Arbizun bakarrik sor zitekeela disko hau. Zergatik?'
- source_sentence: Zer neurri hartu behar dira euskara lehentasunen artean egon dadin baliabide energetikoak eta naturalak
    erabiltzeko mugak ezartzen direnean?
  sentences:
  - Haren esanetan, euskara «marjinatuta» dago epaitegietan-eta, eta, zenbaitetan, «ez ikusi» egiten zaio. Kasurako, gogorarazi
    du 45 urtean ez dutela sententziarik euskaraz eman.
  - 'Inpaktu bortitza jasan nahi ez badugu, etortzen ari den aldaketarako prestatu behar dugu. Euskal Herriko, Europako eta
    munduko osaera demografikoan, ekonoteknikoan, politiko-operatiboan, psikosozialean eta soziokulturalean izango diren aldaketak
    aurreikustea erraza ez bada ere, eszenatoki diferenteak aurreikusi behar dira, moldatzeko aukera izan dezagun eta gure
    patuaren norabidean eraginik izan dezagun. Gizarte orokorrari dagokion ardura da. Euskaltzaleon ardura ere bada. Guri
    dagokigu gure izaera soziokulturala eta gure hizkuntza aldarrikatzea testuinguru horretan. Hizkuntza-ekologiaren alorrean
    dugun eskarmentuari esker, aukerak eta ideiak eskaini ditzakegu.


    Gizartean izango den inpaktua dramatikoa izan daiteke aurretik prestatzen ez bagara, alegia, beharrezkoak diren neurriak
    eta politikak finkatzen eta aurrera eramaten ez badira. Neurri horietako batzuk gogorrak eta desatseginak izango dira,
    une batez behintzat, ohitura eta ikusmolde kultural eta sozial berriak barneratu arte.


    Baliabide energetikoak eta naturalak erabiltzeko lehentasunak eta mugak ezarri beharko lirateke (eta ezinbestean ezarriko
    dira). Horrek eragin handia izango du gizartean. Zeri ematen diogun lehentasuna eta zeri ez zehaztu beharko dugu. Euskara
    lehentasun horien artean egongo al da? Nola? Zer arlotan?


    Aurreikuspenik egin ezean, ordea, batere esku-hartzerik gabe geldituko gara, baliabideen pixkanaka-pixkanakako agortzeak
    eta kutsaduraren eta abarren ondorioak modu bortitzean nozituko ditugularik, ezer egiteko eta erabakitzeko aukerarik gabe.


    Garaia da gure ereduaren mugak onartzeko eta beharrezkoak diren neurriak hartzen hasteko, gure arbasoentzat, guretzat,
    gure seme-alabentzat eta gure hizkuntzarentzat.'
  - 'San Vicente aretoaren irudi historiko bat. Gaur egun, Bilboko Kafe Antzokia dago han. FAS ZINEKLUBA


    Urrezko aroaren ostean, baina, hiribilduko zinemak bata bestearen atzetik ixten hasi ziren, batik bat auzoetakoak; horietako
    batzuek hogei urteko ibilbidea erdietsi zuten, baina egon ziren hamar urteren buruan zarratu zirenak ere. Berehala desagertu
    zen aparra, datuei erreparatuta: 1965ean, Bilbon, 65.000 eserleku zeuden aretoen sarean sakabanatuta; 1988an, 18.000 baino
    ez. Zinema jarduera baztertuta, eraikin horietako batzuk beste erabilera batzuetarako egokitu dituzte, hala nola denda
    handietarako edo gimnasioetarako; alabaina, halako eraikinak doitzea nekeza da, tamainagatik batik bat, komisarioaren
    irudiko; ondorioz, eraitsi egin dira aretoetako hainbat. Gaur-gaurkoz, salbuespena dira antzeko jardueretarako berreskuratutakoak:
    Gran Via zinema zena BBK aretoa da orain, Kale Nagusian; eta behialako San Vicente aretoan Kafe Antzokia ipini zuten.


    bilboko zinema aretoen aroak


    1896-1904. Aurreneko proiekzioak egin zituzten Bilbon, ikuskizun ibiltarietan.

    1905-1925. Proiekzioak aretoetan sartu ziren. 1905ean egin zuten lehen zinema aretoa, artean antzokien diseinuaren arabera:
    Olimpia.

    1926-1949. Zinemara egokitutako diseinua finkatu zen.

    1950-1965. Urrezko aroa. Garai horretan, zinemaren etekin komertziala beste edozein jardueratakoa baino handiagoa izan
    zen.

    1966-2011. Gainbehera. Erakusketa 2011n bukatzen da, Capitol eta Renoir zinemen itxierarekin.'
- source_sentence: Zein dira sindikatuek lan istripuak murrizteko egindako eskaerak?
  sentences:
  - '[galleries:horizontal:76]


    Hondarrezko patioa zeharkatu, eta alboko etxean bizi den lehengusinarenera doa tea hartzera. Aho batez diote askotan ez
    dutela afaltzen. Tauaf Mouleren seme-alabak gosaldu gabe doaz eskolara. Didiha, Chej eta Hamsari bi galleta ematen dizkiete
    gelara sartzean. Bojadorko Lemsid herrixkan bizi dira, errepide ertzean. Bi emakumeak hilabetean behin joaten dira nazioarteko
    laguntza banatzen den dairako bilketa puntura. Saskia gero eta urriagoa da. Hilabete honetan kilo erdi bat arroz, kilo
    erdi bat dilista, kilo erdi bat garbantzu, sei kilo irin, litro erdi bat olio eta kilo bat azukre jaso dituzte pertsonako.
    «Lehen, halako bi jasotzen genuen. Bi kilo azukre ematen zizkiguten, eta espagetiak eta arrautzak. Garai batean, atun
    latak ere bai».


    Mende erdi bat


    Tindufeko (Aljeria) kanpalekuetako egoera humanitarioa gero eta latzagoa da. Datorren urtean mende erdi bat egingo dute
    sahararrek basamortuen basamortuan errefuxiatuta, eremu idor honetan abandonatuta. Marokok 1975eko azaroaren 6an okupatu
    zuen Mendebaldeko Sahara. Martxa beltzarekin ezagutu zuten sahararrek zein den exodo eta gerra hitzen esanahia. Munduko
    errefuxiatu gunerik zaharrenetakoan ondorena luzatzen ari da. 1991n, su etena sinatu zutenean, jaioterrira itzultzeko
    kutxak prestatu zituzten, baina erreferendumaren promesa ezerezean geratu zen.


    Embarka Saleh itzulerarako kutxa baten alboan. Erreferenduma iragarri zutenean, sahararrek jaioterrira itzultzeko kutxak
    prestatu zituzten. K.B.T.'
  - 'CCOO sindikatuak irmo gaitzetsi du lan istripua. «Lan istripu tasa handienetako lurraldea da Nafarroa, eta zifra horiek
    murrizteak lehentasun izan behar du Nafarroako Gobernuarentzat eta inplikatutako eragileentzat». Patronalari dei egin
    dio Lan Arriskuen Prebentziorako legea «zorrotz betetzera», eta horretarako «behar diren baliabide guztiak» jarri beharko
    liratekeela gaineratu du.


    Sindikatu horren irudiko, lantokira joateak ez lioke inori eragin behar inolako arriskurik. «Lan istripurik ez izateko
    erantzukizuna enpresen gain dago erabat, eta administrazioak funtsezko rola jokatzen du araudia betetzen dela zaintzeko
    orduan», esan du.


    Antzera eta gogor mintzatu da ELA. «Egoera horren erantzule nagusiak patronala eta erakunde publikoak dira». Sindikatuaren
    arabera, enpresek, sistematikoki, ez dute betetzen legedia, eta Nafarroako Gobernuak uko egiten dio «beharrezko kontrol
    neurriak» ezartzeari. Hala, ELAk eskatu du Nafarroako Osasun Publikoaren Lan Osasunaren Institututuko ikuskaritzako langile
    kopurua «hirukoizteko».


    Alderdien mezua


    Alderdiek doluminak azaldu dizkiote langilearen senideei. «Adeitasun eta babes osoa» adierazi diete sozialistek. Geroa
    Baik, berriz, heriotza deitoratu, eta «babes eta elkartasun osoa» adierazi die.


    EH Bilduk ere babesa adierazi die gertukoei. «Prekaritateak hiltzen du. Lan baldintza duinak», eskatu du koalizioak sare
    sozialetan. Altsasuko EH Bilduk «amorrua eta tristura» azaldu du: «Ezin dugu horrelakorik gehiago onartu».


    UPNk ere ezbeharra gaitzetsi du, eta lan istripuak geldiarazteko neurriak «premiazkoak» direla azpimarratu du.'
  - 'Kolokan daude Bizkaian 227 lanpostu euskara eskakizunengatik, eta aurka egingo du diputazioak


    EAEko Justizia Auzitegi Nagusiaren menpeko administrazioarekiko auzien epaitegiak hartutako erabaki baten ondorioz, bertan
    behera geratzeko arriskuan dira Bizkaiko Foru Aldundiko langileak egonkortzeko bi prozesu, hizkuntza eskakizunak direla
    eta. Euskararen aurkako oldarraldi judizialaren hamaikagarren kapitulua da: administrazioarekiko auzien epaitegiaren arabera,
    lanpostuak egonkortzeko euskaraz jakitea eskatzeak «diskriminatu» egiten ditu gaztelaniaz baino ez dakiten langileak.
    Aldundiko prozesuetan parte hartzen ari diren 227 izangairi eragiten diete egonkortzeko bi prozesuek.


    Epaiak ez dira irmoak, eta ez dute inolako kautelazko neurririk ezartzen. Hala ere, bi prozesu horiek bertan behera ez
    geratzeko, aldundiak adierazi du epaien aurkako apelazio helegiteak jarriko dituela: «Ebazpen judizialak errespetatzen
    ditugu, baina Bizkaiko Foru Aldundiak epaiekiko bere erabateko desadostasuna adierazi nahi du, uste baitugu ez dutela
    behar bezala interpretatu funtzio publikoaren arloan eta hizkuntzaren arloan gai horri dagokionez aplikatu behar den araudia».


    Ohar baten bidez, aldundiak adierazi du ez dela zalantzan jartzen euskaraz ez dakitenek hautaketa prozesuan parte hartzeko
    duten aukera. Azaldu du hautaketa prozesuak berak aukera ematen duela lanpostu bakoitzari dagokion hizkuntza profila eskuratzeko.
    «Argi dago, bi hizkuntza ofizial dituen lurralde batean, bi hizkuntza ofizialak erabiltzeko gai direnek hizkuntza bakarra
    erabiltzeko gai direnek baino merezimendu eta gaitasun handiagoa dutela», nabarmendu du diputazioak.'
