widgetData:
- source_sentence: Zein da Mendizabal Mendizabalen iritzia Legebiltzarrean gauzez hitz egiteari buruz?
  sentences:
  - '[TOPIC: Mozioa, Xabier Isasi Balanzategi EH Bildu taldeko legebiltzarkideak aurkeztua, euskaldunen hizkuntza eskubideak
    errespetarazteko Eusko Jaurlaritzak dituen asmoei buruz. Eztabaida eta behin betiko ebazpena]

    [MENDIZABAL MENDIZABAL, (EA-NV)]:

    Eskerrik asko, presidente andrea. Egia esan, ez nuen asmorik jaisteko, zeren eta, lehenago esan dudan bezala, erraza izan
    da hiruren artean gauzak adostea. Eta azkenetik hasiko naiz. Nik uste dut, Oyarzabal jauna, gauzez hitz egitea eta Legebiltzarrean
    hitz egitea baino aproposagorik ez dagoela eta gauzez hitz egin behar dela. Eta zuk esaten duzun bezala, "aunque el papel
    lo aguante todo", nik uste dut gauzez hitz egin behar dela eta hori dela (Date: 31.10.2013)'
  - '[TOPIC: Legez besteko proposamen hauek batera eztabaidatu eta behin betiko ebazpena hartzea: Elkarrekin Podemos-IU talde
    parlamentarioak egindako legez besteko proposamena, anbulantziak publifikatzeari buruz eta Euskal Talde Popularra-Ciudadanos
    talde parlamentarioak egindako legez besteko proposamena, Eusko Jaurlaritzak Arabako Lurralde Historikoan anbulantzia
    medikalizatuen hornidura handitu beharrari buruz]

    [GARRIDO KNÖRR, (PV-ETP)]:

    nolabaiteko eszeptizismoari eutsi behar diogula, alor horretako sailburua bera, Gobernu honetako diruak administratzen
    dituena denean…, eta berak esaten digunean aurrekontuak askotan ez direla egikaritzen, atzerapenak daudela eta diru-partida
    batzuk ez direla egikaritzen. Beraz, uste dut normala dela, sailburuak azaldu zuen eta baliabide horrekin lotuta dauden
    funtzionamendu-gastuekin zerikusia duen partida bat handitzeko konpromisoaz gain, behar besteko zuhurtasuna eduki dezagula
    hori egitate bihurtzen dela ikusi ahal izateko. Baina, (Date: 15.12.2022)'
  - Edozein eratara ere, gure taldeak hirueletasunaz hitz egitea baino gehiago nahiago du eleaniztasunez hitz egitea, aspaldi
    egin baikenuen eleaniztasunaren aldeko apustua. Ez da atzo goizeko gauza.
- source_sentence: Zenbat kostatzen zaio Eusko Jaurlaritzari Bizigune programa erabiltzea etxebizitzak alokairuen merkatura
    ateratzeko?
  sentences:
  - '[TOPIC: Galdera, Eneko Andueza Lorenzo Euskal Sozialistak taldeko legebiltzarkideak Ingurumen, Lurralde Plangintza eta
    Etxebizitzako sailburuari egina, Bizigune programaren helburuak betetzeari buruz]

    [ANDUEZA LORENZO, (SV-ES)]:

    badituzue eta argi erakusten dute: etxebizitza sozial bat Gobernutik bertatik sustatzeak 120.000 euro inguruko kostua
    du. Hori, jakina, askoz merkeagoa da helburuak kontuan hartzen baditugu eta aintzat hartzen badugu etxebizitzak abian
    jartzean edo alokairuen merkatura ateratzean, Bizigune programa erabiltzen bada, Sailari urtean 4.600 euro inguruko kostua
    eragiten diola. Hortaz, halako programek duten garrantzia kontuan hartuta, eta Gobernuak alokatzeko etxebizitzen politikak
    abian jartzeko orduan zehaztu dituen helburuak aintzat hartuta, (Date: 14.12.2018)'
  - '[TOPIC: Interpelazioa, María del Carmen López de Ocariz López de Munain Euskal Talde Popularreko legebiltzarkideak Ekonomiaren
    Garapen eta Lehiakortasuneko sailburuari egina, Kantauriko antxoaren elikadura kalitate eta segurtasunaren inguruan Eusko
    Jaurlaritzako Osasun eta Arrantza sailen artean izandako deskoordinazioari buruz]

    [LÓPEZ DE OCARIZ LÓPEZ DE MUNAIN, (PV-ETP)]:

    dagoela elikagaietan. Eta kontzeptu hori ere, ehuneko onargarriaren kontzeptu hori bera ere, batzuek ondo ulertzen badugu
    ere, beste batzuek ez. Hori horrela da. Betidanik egon da anisakisa; ez dugu ulertzen, beraz, alarma hori piztea, kalte
    egiten digu eta. Bizi guztian egon bada anisakisa, eta, azken bi urteotako kontua bada anisakisak gaixotutako pertsona-kopurua
    igo izana, zergatik egin da oraintxe justu, antxoaren kanpainaren hastapenetan, ohar hori? Zergatik? Hori al da (Date:
    30.05.2014)'
  - '[TOPIC: Galdera, Maddalen Iriarte Okiñena EH Bildu taldeko legebiltzarkideak lehendakariari egina, erabakitzeko eskubideari
    eta Araba, Bizkai eta Gipuzkoako estatus politiko berriari buruz]

    [JAURLARITZAKO LEHENDAKARIAK (URKULLU RENTERIA), (EA-NV)]:

    eta printzipioak adostu daitezen". Adostasun hori lortzeko, duela bakarrik lau hilabete (herriari, eskatzen didazuna,
    herriari), duela lau hilabete, hemen bertan, ekarpen sakon bat egin nuen. Bost gogoeta izan ziren, Iriarte andrea, eta
    ez ditut errepikatuko. Badakit Alderdi Sozialistak bere planteamendua daukala, ezberdina, noski. Baina gauza bera gertatzen
    da EH Bildu, Elkarrekin Podemos eta Alderdi Popularrarekin. Bost alderdi, bost ikuspegi eta proposamen desberdinak. Euzko
    Alderdi Jeltzaleak ere argi (Date: 02.02.2018)'
- source_sentence: Noiz jarri zion Espainiako Gobernuak errekurtsoa Indarkeria Polizialen Biktimen Legeari?
  sentences:
  - '[TOPIC: Galdera, Julen Arzuaga Gumuzio EH Bildu taldeko legebiltzarkideak Gobernantza Publiko eta Autogobernuko sailburuari
    egina, Indarkeria Polizialen Biktimen Legearen eteteari buruz]

    [ARZUAGA GUMUZIO, (EH Bildu)]:

    Erabaki bat hartu dugu Estatuaren biktimak errekonozitzeko eta erreparatzeko, eta Estatuak hori suspenditu du, eten du,
    eta lege gabe gaude momentu honetan. Eta jakin nahi dut nola kudeatu duzun errekurtso honen ibilbidea. Para ello, permítame
    ofrecerle una rápida secuencia cronológica: 2016ko abenduaren 1a, Deia egunkariko albistea: "Kontuak negoziatzen hasi
    aurretik, Rajoyk euskal legeei errekurtsoak jartzeari utz diezaiola eskatzen du Ortuzarrek". 2016ko abenduaren 14a, El
    País egunkarian: "Euskadiren (Date: 20.10.2017)'
  - '[TOPIC: Galdera, Amaia Martínez Grisaleña Talde Mistoko legebiltzarkideak lehendakariari egina, erakundeen egonkortasunari
    eta herritarrek erakundeetan sinetsi beharrari buruz]

    [JAURLARITZAKO LEHENDAKARIAK (URKULLU RENTERIA), (EA-NV)]:

    egin duzu galdera. Sailburuak berak azaldu zituen hemen, eta abian jarritako neurrien berri eman du jada. Eguneratu egin
    da orain arte erabiltzen zen eta gripearen kanpainarekin bat zetorren txertaketaren barneko antolaketa-metodologia. Orain,
    Osakidetzako Asistentzia Zuzendaritzan zentralizatu da txertaketaren ardura, eguneratu egin da erakunde sanitario integratuekin
    eta osasun-zentroekin harremanetan jartzeko protokoloa, eta bitartekoak eta kontrolak indartu egin dira, hori berriro
    gerta ez dadin. Euzko Alderdi Jeltzaleari eta abarri (Date: 05.02.2021)'
  - Ebazpena eman ere eman zuen, errekurtsoa aztertzerakoan bazter utzi zuenean, legearen artikulu batzuk bakarrik kautelaz
    indargabetu zituenean, eta ez lege osoa.
- source_sentence: Noiz hasi zen Frantzia familia-politikak aplikatzen?
  sentences:
  - '[TOPIC: Mozioa, Laura Garrido Knörr Euskal Talde Popularreko legebiltzarkideak aurkeztua, euskal familiei laguntzeko
    politikak aldatzeari buruz. Eztabaida eta behin betiko ebazpena]

    [URRUTIA OIANGUREN, (EA-NV)]:

    familia-bizimodua bateratzeko laguntzak, eta seme-alabentzako eta kontziliaziorako familiapolitiketarako laguntzak. Frantziako
    adibidea ipini duzu, eta egia da, baina sailburuak ez dizu esan egia ez den ezer. Alegia, Frantziak hori Bigarren Mundu
    Gerraren ondoren abiarazi zuela ziurra da; ziurra den bezala une honetan ez dela bere helburuetara iristen, une honetan,
    eta hori egitate bat da; eta hori, tira, ez du izan behar demeritu bat sailburu andrearentzat. Gero, askotan esaten duzu
    zuk (Date: 07.02.2019)'
  - '[TOPIC: EH Bildu talde parlamentarioak egindako lege-proposamena, euskara jakiteko eskubidea bermatzeko. Aintzat hartzeari
    buruzko eztabaida eta behin betiko ebazpena]

    [ALDASORO ITURBE, (EA-NV)]:

    den, nik, horregatik, esan dut tristura lehen, debatea hori al da? Gaur egungo euskararen debatea horretara mugatu behar
    dugu edo horretara mugatzeak eramaten gaitu pentsatzera beste guztian dauzkagun gabeziak? Hau da, erabilera, inoiz ez
    du euskarak eduki gaur egun dituen hainbeste euskaldun. Nola jarriko ditugu horiek euskaraz bizitzen? Horrek behar du
    erronka, eta nik uste dut erronka zoragarri bat dela, elkarrekin egin beharrekoa: udalak, aldundiak, Jaurlaritzak eta
    alderdi ezberdinok; debate politikotik (Date: 19.11.2020)'
  - '[TOPIC: Galdera, Natalia Rojo Solana Euskal Sozialistak taldeko legebiltzarkideak Ekonomiaren Garapen eta Lehiakortasuneko
    sailburuari egina, hornidura elektrikoaren bermeei buruz]

    [ROJO SOLANA, (SV-ES)]:

    diru-sarrerak bermatzeko gure errenta edo gizartelarrialdietarako gure laguntza; ez ei daki eguneroegunero mozten diotela
    argia baten bati. Hala, bada, beste erkidego batzuetako gobernuek ez bezala, besoak gurutzatzen ditu Euskadikoak, eta
    isilik geratu. Horregatik, sailburu andrea, jakin nahi dugu zer kudeaketa-lan egin dituen Eusko Jaurlaritzak, Rajoyren
    Gobernuarekin dituen komunikazio-bide oparo horien bitartez, bermatzeko Euskadiko herritarrek ez dutela jasaten jarraitu
    beharko energia-fakturen igoera lazgarri hori. (Date: 21.02.2014)'
- source_sentence: Zein da Eusko Jaurlaritzaren plana itsas ingurumena babesteko?
  sentences:
  - '[TOPIC: Galdera, Muriel Larrea Laso Euskal Talde PopularraCiudadanos taldeko legebiltzarkideak Ekonomiaren Garapen, Jasangarritasun
    eta Ingurumeneko sailburuari egina, gure kostaldean itsas ingurumena babesteari buruz]

    [LARREA LASO, (PV-ETP)]:

    Egun on. Eskerrik asko, presidente andrea. Sailburu andrea, konturatuko zinen gertutik jarraitzen ditugula arestian itsas
    ingurumena zaintzeko eman diren aurrerapausoak. Horri buruz galdetu nizun azken aldian; zuk erantzun zenidan Ingurumen
    Sailak plastikoak eta hondakinak biltzeko zerabiltzan planak azalduz. Eta adibide bat jarriko dizut; izan ere, duela hilabete
    batzuk, Urumea ibaiko zaborra jaso behar izan zuena Donostiako Udaleko brigada izan zen, udal-brigada. Gaur beste zerbaiti
    buruz hitz egin nahi (Date: 20.05.2022)'
  - 'Zera dio: "Eusko Jaurlaritzari eskatzen zaio bultza dezala Estatuko Administrazio Orokorraren aurrean eremua babesteko
    beharrezko diren ekintzak gauzatzea"; baina ekintza horiek ez dira zehazten, jakinik'
  - '[TOPIC: Mozioa, Gorka Maneiro Labayen Mistoa-UPyD taldeko legebiltzarkideak aurkeztua, Administrazio publikoari buruzko
    beste lege bat planteatzeko egin beharreko urratsei buruz. Eztabaida eta behin betiko ebazpena]

    [SÉMPER PASCUAL, (PV-ETP)]:

    eztabaidatzen arituko ginateke eta uztaila zein abuztua gaitu ahal izango genituzke, eta, begira, Jaurlaritzari orain
    eskatu diogunean –espero dut, lehendakari andrea, zurrumurrua ez zela izango uztaila eta abuztua gaitzeagatik–..., Jaurlaritzari
    Ganbera honi legeproiektu bat bidal diezaiola eskatzen ari garen une honetan, ziur asko, lege hori onartzeko zorian egongo
    ginateke. Beno, edozelan ere, aukera bat galdu dugu. Beste batzuk etorriko dira. Baina, mesedez, mesedez,... Ez gara uste
    dugun (Date: 18.06.2015)'
