  - source_sentence: Zer egiten zuen Angelitak larunbatetan?
    sentences:
    - 'Etxebizitzen garestitzeak ez du etenik, salmentak jaitsi arren


      Etxebizitzarenak ez du merkatuaren logika ulertzen. Urteko lehen hiruhilekoan %3,8 jaitsi da etxeen salerosketa Hego
      Euskal Herrian, baina, hala ere, horien prezioak gora eta gora egiten du etengabe. INE Espainiako Estatistika Institutuak
      gaur argitaratutako datuen arabera, Nafarroan batez beste 2022an baino %7,4 garestiago izan dira, eta Araban, Bizkaian
      eta Gipuzkoan %6,4 garestitu dira.


      Igoerak etenik ez duen arren, moteldu egin da etxebizitzen garestitzea. Iaz, antzeko mailan igo ziren: %7,3 Nafarroan
      eta %6,4 beste hiru lurraldeetan.


      Etxe berrien prezioa garestitu da gehien: %12.7 Nafarroan, eta %12,3 Araban, Bizkaian eta Gipuzkoan. Iaz baino handiagoa
      izaten ari da igoera. Etxebizitza berriak %10,9 garestitu ziren iaz Nafarroan, eta %6,1 beste hiru lurraldeetan. Gutxi
      gorabehera, saltzen diren hamarretik bi dira.


      Bigarren eskukoetan apalagoa izan da igoera urteko lehen hiruhilekoan. %5 garestitu dira Nafarroan, eta %5,1 beste hiru
      lurraldeetan.


      Salerosketa eta hipoteka gutxiago


      Urteko lehen hiruhilekoan 747 etxebizitza salerosi dira Hego Euskal Herrian, iaz epe berean baino %3,8 gutxiago. Baliteke
      interes tasa handien eraginez jaitsi izana salerosketak, baina ez dute hainbesteko eragina izan prezioen igoeran.


      Hamar etxetik bederatzi inguru hipoteka mailegu baten bitartez erosten dira gaur egun. Urteko lehen hiruhilekoan, 6.374
      hipoteka sinatu ziren, iaz baino %6,7 gutxiago.'
    - 'Eskutitzak ere idazten omen zenituen...


      Marokon soldadu zeudenei. Bizilagunen semeei. Izeba Txitak, izeba Panorrak... Afrikan zituzten semeak. «Idatzi nire
      semeari, Angelita, mesedez». Haiek ez baitzekiten ez idazten eta ez irakurtzen. Eta nik idazten nien seme haiei, banekielako
      euren amek zer esan nahi zieten. Izan ere, oso gustuko izan dut beti idaztea.


      Zein da sukaldaritzarekin lotutako zure lehen oroitzapena?


      Ongi gogoan daukat. Astegunetan eskolara joaten nintzen, baina larunbatetan txirikordak egitera.


      Txirikordak?


      Bai, gizona, abarketak egiteko txirikordak. Eta igandetan, txirikordak saltzen zituen fabrikako jabearen etxera joaten
      nintzen, haren seme-alabak zaintzera.


      «Bizilagunek ez zekiten idazten eta irakurtzen. Afrikan soldadu zeuden semeei nik idazten nizkien eskutitzak»


      Zenbat urte zenituen?


      13. Nireak balira bezala zaintzen nituen. Eta etxe hartan ikusi nuen aurreneko aldiz sukaldari bat. Zerbitzaria zeukaten,
      haurtzaina zeukaten, eta sukaldari bat! Baina sukaldari txapela eta guzti! Gumersindo zuen izena, baina Misindo deitzen
      genion, laburtzeko. Aingeruak bezala kozinatzen zuen. Eta hari kopiatu nion nire lehen errezeta: eperrak eskabetxean.
      Txunditu egiten ninduen etxe batean sukaldari bat ikusteak. Gurean, sutegi bat eta bi ohe baino ez geneuzkan.


      Eta hori guztia 13 urterekin?'
    - 'lotsabako


      Antzinaroko Greziako pentsalari bat?


      Porfirio. Tesia haren inguruan egin nuen; publiko orokorrarentzat ez da hain ezaguna, baina oso interesgarria da. Haragia
      kontsumitzearen aurkako testu bat dauka.


      Egungo pentsalari bat?


      Carol J. Adams. Ezagutu nuenean, oso originala iruditu zitzaidan; ikuspegia asko aldatu zidan, espezismoaren eta feminismoaren
      arteko loturaz konturatu nintzelako.


      Antiespezismoan sartzeko liburu bat?


      Feminismotik, Carol J. Adams sarbide ona da. Eta Zoopolis liburua ere oso interesgarria da [Sue Donaldson eta Will Kymlicka],
      batez ere filosofia politikoan interesa dutenentzat.'
  - source_sentence: Zein da Basauriko Udalaren jarrera Kalero auzoko sutean kaltetutako bizilagunekin?
    sentences:
    - 'UPV/EHU aurrerantzean EHU soilik izango da


      Euskal Herriko Unibertsitateak irudi berria izango du. Hauxe aldaketa nagusia: aurrerantzean, gaztelerazko siglak kendu,
      eta EHU baino ez da izango, ez UPV/EHU. Eduardo Txillida eskultoreak sortu zuen ikur nagusia, aldiz, mantendu egingo
      dute, EHUren siglekin batera, eta «kolore paleta korporatiboa» gehitu dute, logotipoari euskarria emateko.


      Errektoretza taldeak gaur aurkeztu du irudi berria gobernu kontseiluan. Aurreratu dutenez, bi arrazoi dituzte UPV/EHU
      izatetik EHU soilik izatera igarotzeko. Bat: «Unibertsitatearen irudia berritzea eta aro digitalera egokitzea, sinpleagoa
      bihurtzea eta unibertsitatearen ikurrari garrantzia handiagoa ematea, Euskal Herriko Unibertsitatearen oinarria hobeto
      isla dadin eta identifikagarriagoa izan dadin». Eta bi: izendapen bikoitzak eragiten dituen arazoei aurre egitea, eta,
      batez ere, Valentziako UPV Universidad Politecnica de Valenciarekin (Herrialde Katalanak) nahastea saihestea. «Era berean,
      eta ikuspegi teknikoago batetik, izena sinplifikatzeak eta zehar marra alboratzeak indexazio akademikoa erraztu dezake»,
      erantsi dute.


      Marka berria ekainean aurkeztu asmo dute jendaurrean, Txillida Lekun.


      Ordezkoak, lanaldi osoan


      Irudiarena ez da gobernu kontseiluko gai bakarra izan: gaur berretsi dute gehiengo sindikalarekin hartutako akordioa,
      datorren ikasturtetik aurrera ordezko irakasleak lanaldi osora kontratatu ahal izateko, eta, modu horretan, langile
      horien lan baldintzak hobetzeko. Gaur egun, ia berrehun irakasle ari da lanaldi partzialean ordezko gisa lanean.'
    - 'Kalero auzoko Kareaga Goikoa kalean piztu zen sutea, urtarrilaren 31n. Garretatik ihes egiteko, pertsona batek eraikinetik
      jauzi egin zuen, eta hil egin zen. Beste lau pertsona erreskatatu zituzten suhiltzaileek. Sutea gertatu eta hiru astera,
      Ertzaintzak mutil bat atxilotu zuen, sute hori sortu izana egotzita. «Nire erraina eta bi ilobak erreskatatu behar izan
      zituzten; suhiltzaileek bizia salbatu zieten», gogoratu du Tamarak —ez du abizenik eman—. Haren semeak etxea galdu du,
      eta Tamara ahal duen guztia egiten ari da hura eta senideak laguntzeko.


      «Familiek ez dute dirurik nahi, teilatua bermatua izatea baizik»


      PABLO OLIVEROS Batu etxebizitza sindikatuko kidea


      «Etxea eta oroitzapen guztiak galdu dituzte, eta hotel bateko logela batean igarotzen ari dira trauma, mugitu ezinik,
      bi haur oso txiki baitituzte», kontatu du Tamarak. «Eta, hori gutxi balitz bezala, hoteletik alde egin behar dutela
      esan diete orain». Udalaren jarrera kritikatu du Tamarak, lagundu beharrean «oztopoak jarri besterik ez dutelako egiten».
      «Oharrak ateratzen baditu, zerbait estali nahiko du», salatu du.


      Joan den astean udalak jakinarazi zuenez, arretarako, informaziorako eta laguntza sozialerako leihatila bakarra abiarazi
      du sutean kaltetutako bizilagunak artatzeko. Arreta puntu horren helburua da, besteak beste, erantzun koordinatu eta
      eraginkorra eskaintzea, tramiteak egiten laguntzea, bizikidetza unitateen egoerak aztertzea eta laguntza psikosoziala
      eskaintzea. Lan hori egiteko, enpresa espezializatu bat kontratatu dute.


      Jakinarazpenik ez'
    - 'Garai hartan, Atahualpa Yupanqui eta David Bowie asko entzuten zituela ere kontatu du, zeinak irudiak beste modu batera
      ikusten lagundu zioten, «modu onirikoago, metaforikoago batean». Zoruan zabaldutako kartoizko laukizuzen batek eta sabaitik
      zintzilikatutako pendulu batek osatzen dute, besteak beste, obra. «Pertsona batek lo egiteko moduko espazio bat eratu
      nahi nuen. Bibliako istorio batekin lotzen nuen; nola Jakobek lotan dagoen bitartean eskailera batean gora eta behera
      aingeruak ikusten dituen. Irudiaren elementu sinpleak eta poetikotasuna gustatzen zitzaizkidan».


      «Eskasiaren ingeniaritza»


      Handik ezkerrerantz eginda daude erakusketako obra gehientsuenak. Han daude, esaterako, adobez egindako tamaina handiko
      Chailen eskulturak —Veneziako Bienalean parte hartu zuen 2022an, eskultura handien sailarekin—. Irene Isabel (2024)
      aurkeztu du orain, tartean. Amari eta antzinako oinordetzari egindako omenaldi bat da, eta 2016an Argentinaren independentziaren
      bigarren mendeurrenaren harira egindako lan baten bertsio bat ere bada. «Argentina Argentina izan aurretik gertatzen
      zen horretan zentratu nintzen, eta nire etxekoen istorioekin —nire amona artisau indigena bat izan zen— eta arkeologiarekiko
      nire pasioekin konektatu nuen berriz».


      Gabriel Chaileren Irene Isabel (2024) pieza, Donostiako Tabakaleran. JON URBE / FOKU


      Segidan datorren lanetako bat da Eskasiaren ingeniaritza (2012), artistak bere familiaren, lagunen, auzotarren jokabideak
      behatuz sortu zuena. Berogailu bat da izan, adreilu bat zuzenean korronte elektrikora konektatzean pizten dena. «Asko
      erabiltzen dira muturreko egoeretan, beste baliabiderik izan ez eta elektrizitatea lapurtzen duenean batek, adibidez.
      Espetxeetan ere erabiltzen da, eta aurrekoan batek esan zidan hemen bere aitonak ere erabiltzen zuela landa lanetan».
      Bere sormen prozesuekin loturarik ere ikusten dio artistak: «Nire lanean beti dago arazoak konpontzearen potentzialitatea».'
  - source_sentence: Non ospatuko da Euskal Herriko Mendizale Federazioaren 100 urteak gogoratzeko ekitaldi instituzionala?
    sentences:
    - 'Zein da benetako informazio hori?


      Europako proiektua bake proiektu bat dela, eta munduan aitzindaria dela gure bizitzeko eta antolatzeko modua. Gure demokrazia
      inperfektua da sarritan, baina ez dago sistema hoberik.




      Ekaineko hauteskundeetan ez zara izango EAJko hautagaia. Alderdiak zeresana izan du erreleboan?


      Nire alderdiko presidenteari zera esan nion: «Ez dakit zer duzuen buruan, baina, aldaketa bada, gauzak erraztuko dizkizuet,
      utzi egingo dut eta». Nirea izan da erabakia.


      Eta, hala ere, EAJren lehendakarigaien kinielan sartu zintuzten...


      Kazetariak zelebreak zarete batzuetan. Albiste horrek ez zuen inolako oinarririk.


      1998an hasi zinen legebiltzarkide gisa Eusko Legebiltzarrean. 2005ean, Legebiltzarreko lehen emakume bihurtu zinen.
      Europako Parlamentuan parlamentari gutxik eramango dute zuk bezainbeste urte. Gizona izango bazina, bide hori guztia
      egin duzuna baino errazago egingo zenuen?


      Afiliatu gabe hasi nintzen 80ko hamarkadan, EAJren banaketaren testuinguruan. Emakume gaztea, argala eta txikia nintzen,
      eta badakit zer eztabaida sortu zituen nire aldeko apustuak. Gaztea eta emakumea izateak balioa dauka orain. Nire belaunaldiko
      emakumeen artean, politikan, zorte handia izan dut beharbada. Baina berdintasunean egin dut ibilbide hori? Ez. Egunerokoan
      ohartzen zara horretaz, hainbat eta hainbat pasartetan, oztopotan. Baina aurrera egin dut beti emakume gisa, ez gizonen
      moldeekin eta balioekin. Emakumeak landu egin behar du autoritatea, eta gizonari eman egiten zaio.


      «Behin, afari ofizial batera joan eta ''opiltxo'' bati buruz aritu zen agintari bat niri erreparatuz. Barregarri geratzen
      ari denari barregarri geratzen uztea izan da beti nire erantzuna».


      Inoiz izan duzu pasarte desatseginen bat zure sexuari lotuta?'
    - 'Aurten 100 urte bete dituzten mendi taldeen aitortza.

      10:45. Ekitaldi instituzionala Euskal Herriko ordezkari politikoekin.

      11:00. Mendi Federazioko presidente ohien aitortza.

      11:30.'
    - 'EGITARAUA


      Martxoak 20. Elgetatik igaroko da 23. Korrika, eta mendizaleek kilometro oso berezia korrituko dute federazioa sortu
      zen herrian.

      Apirilak 24. Tolosan, (Leidor Aretoan), 40 urtetik gorako ibilbide jarraitua duten federatu gipuzkoarrei aitortza egingo
      zaie, urrezko ikurra emanez.

      Apirilak 27-28. ''100 urte 100 mendi'' egitasmoa. Euskal Herriko ehun mendi talde baino gehiago igoko dira zazpi herrialdeetatik
      aukeratutako 100 tontorretara, eta ehungarren urteurreneko bandera eramango dute. Efemeridea oroitzeko bi mila mapa
      egingo dira.

      Maiatzak 18. Ekitaldi instituzionala eta mendi girokoa Elgetan, 1924ko maiatzaren 18an federazioa sortu zen, pertsona
      politiko, erakunde eta mendi taldeekin. Ekitaldi ofizialaren ondoren, herri bazkaria frontoian. Egunean zehar, udaletxeko
      plazan marmolezko plaka jartzea, musika, ibilketa nordikoa...

      Ekainak 17. 1974an Everesterako ''Tximist'' espedizioaren 50. urteurrena ospatzeko erakusketa inauguratuko dute Gasteizen,
      EMMOA fundazioaren eskutik.

      Urriak 13. Bi federazioen martxa bateratua Euskal Herriko erdigune geografikora, Urbasa-Andia parke naturalean. Aurten,
      ekitaldi berean, Mendeurren Ermandadearen diplomak ere banatuko dira.

      Urriak 18. Bi federazioen martxa bateratua Urbasa Andiako Parke Naturalean dagoen Euskal Herriko erdigune geografikora.
      Aurten, ekitaldi berean, Ehun Mendietako Mendizaleen Elkartearen diplomak ere banatuko dira.

      Abenduak 12. ''Euskal Herriko Mendizale Federazioaren 100 urte'' monografikoa ''Pyrenaica'' aldizkarian. Egun horretarako,
      urteko ekitaldien ikus-entzunezko bat ere egongo da.'
  - source_sentence: Zein da Sara Ahmeden ikuspuntua emozioen psikologizazio eta pribatizazioari buruz?
    sentences:
    - 'Udako seriea. Euskal Herriko ingurubirak (II)


      Illunzar, Ineritze leizeko babesleku


      Historiak eta kondairak bat egiten duten bazter amiragarria bertatik bertara ezagutzeko parada emango du ibilbide honek.
      Aulestiko Narea auzoa da abiapuntua. Ineritze haitzuloa Illunzar mendiguneko bizkarrean ikus daiteke.


      Irakurri hemen serieko artikulu guztiak




      Aulesti eta Nabarniz (Bizkaia) udalerrien artean Illunzar mendigunea altxatzen da airoski. Ezbairik gabe, ezusteko handia
      hartuko du bisitariak mendigune gotortu izanaren itxura duen parajeotara hurreratzen den lehen aldian. Pirinioetako
      tontorrik garaienean nola, hala agertuko zaio ibiltariari mugarik gabeko zeruertza. Izan ere, handik goitik Euskal Herriko
      erliebe malkartsuaz jabetzea ez da lan nekosoa: tontorrak, haranak eta haitz zorrotzak, malkarrak eta ordokiak... Halakoxea
      da Bizkaiko orografia, mugimendu orogenikoek sorrarazitako tolestura apetatsuan ederki bermatua. Magaletik eskegiak
      udalerriok osatzen dituzten auzo eta baserriak antzemango ditu bisitariak. Herri xumeak eta baserriak han-hemenka sakabanatuta
      ikusiko ditu. Gainera, artadi kantauriarrak osatzen dituen baso trinkoak Illunzarreko paisaiaren protagonistak izango
      dira. Nagitasun gozoan eta eguzkiaren epeletan emango dute zuhaitzok urte osoan, hosto gogor, latz eta arantzadunak
      goialdeko larrediarekin lehia bizian.'
    - 'Naziogintza Taldea


      Abiapuntuaren garrantzia analisi zuzenak egiteko


      BERRIA egunkarian idatzitako artikulu batean, Andoni Olariaga filosofoak migrazioaren eta kolonialismoaren arteko harremanaz
      jardun zuen. Bertan, besteak beste, hau aipatzen zuen: «Iparralde globalean bizi garen herri eta pertsona garen aldetik,
      Hego globalaren esplotazioan oinarritutako bizi-eredu batean oinarritzen garela jakitun, migrazioaren gaiari modu emantzipatzailean
      erantzuteko erantzukizuna dugu».


      Bat gatoz Olariagarekin eskuin muturrak migrazioarekiko duen jarrera salatzeko. Giza eskubideen erabilera maltzurra
      egiten dute eskuin muturreko ideologoek, eta orain mespretxatu egiten dituzte historian zehar politika inperialisten
      bidez modu basatian zapaldu eta esplotatu zituzten herrialdeetako herritarrak.


      Hala ere, migrazioen auziak ertz asko ditu. Olariagak bere artikuluan aipatzen duena egia izanik ere, ez da egia osoa.
      Migrazio-fenomenoaren azterketa integralaren falta sentitzen dugu, erantzukizunak banatzerakoan maila berean jartzen
      baititu estatuak eta gurea bezalako estaturik gabeko nazioak. Eta hori ez da bidezkoa.


      Olariagari eta immigrazioaren gaia jorratzen duten beste aditu euskaldun batzuei gauza garrantzitsu bat ahazten zaie,
      analisi horretarako funtsezkoa dena: eztabaidaren abiapuntua. Ahaztu egiten zaie aipatzea Euskal Herria estaturik gabeko
      nazio zapaldua dela, nazio ukatua, zatitua eta kolonizatua. Ez dakigu Olariagak eta besteek abiapuntu hori onartuko
      duten, baina gure ustez funtsezkoa da hori gogoan hartzea migrazioari buruzko eztabaida behar den bezala kokatzeko.
      Gure egoera ez da Espainiakoa, Frantziakoa edo Alemaniakoa, hots, estatua duten lurraldeena. Horiek burujabetza osoa
      dute haien politika propioak egiteko, tresnak eta baliabideak dituzte migranteak integratzeko eta, batez ere, haien
      kulturak eta hizkuntzak ez daude egoera zaurgarrian, eta, horrenbestez, migrazioak ez ditu haien hizkuntza hegemonikoak
      higatzen. Gu, bistan da, ez gaude egoera berean.'
    - 'Emozioen kultura politikoa


      Sara Ahmedek atzo egindako feminizketan zioen bizitzaz galdetzea dela feminismoa, eta nik aitzakia probestu dut Ahmeden
      liburuetako galdera batzuk euskaratzeko. Ahmeden The Cultural Politics of Emotion liburuak mugitu ninduen gehiena, Ahmed
      ez da emozioen psikologizazio eta pribatizaziora mugatzen, eta, besteak beste, ondorengo galderak egiten ditu: Nola
      txertatzen da mina politikan? Nola ari gara minak sozializatzen? Zergatik sentitzen da gorrotoa barrutik kanpora baletor
      bezala? Nondik nora mugitzen da beldurra? Lotsa bihurtu daiteke askatzaile? Zer egiten da maitasunaren izenean jokatzen
      dugunean? Zergatik da hobea maitasunarengatik egiten dena? Noiz bihurtzen dira arauk forma? Sentipenak euren objektu,
      ibilbide eta orbainak dituzte. Ahmedek orbainez dio lesioaren marka direla, sendatzeko aukeraren erakusle, lesioa, are,
      mina estali dezaketela; baina orbainek zauria agerian utzi eta gorputzari forma bat ere ematen diote. Emozioak kultura
      politiko gisa pentsatzea da sortzen denari erreparatzea. «Nekatuta nago», «ze nazka!», «maite zaitut» horiek egoera
      psikologikoak bainoago, praktika sozial eta kulturalak dira, eta sentitzen dut, baina ez dira zure-zureak.'
  - source_sentence: Nola lotzen dira longterminismoa eta transhumanismoa korronte ideologiko gisa?
    sentences:
    - 'Berganzok gogorarazi du ia 300 milioi euro horien barruan anbulantziak ere badaudela, «gaur egun hitzarmen baten bidez
      eskaintzen dira eta».


      Behin-behinekotasuna


      Eragile politiko, sindikal eta sozial ugari bat datoz honetan: Osakidetzako lantaldeak egonkorra izan behar du. Horren
      haritik, Osasun Sailak 2018-2019 aldiko LEP lan eskaintza publikoaren postu guztiak adjudikatu ditu, eta «laster» ebatziak
      egongo dira 2020tik 2022rako LEPak, baita 2021ean egin zuten egonkortzeko LEPa ere. Guztira 11.057 postu emango dituzte
      bi hilabetean, beraz. Osasun Sailak aurreikusi duenez, postu horiek esleitutakoan Osakidetzako behin-behinekotasuna
      %10,72koa izango da. Aurrerago beste oposizio batzuk egiteko asmoa dute, eta, horiek ebaztean, behin-behinekotasun tasa
      %9 ingurukoa izango dela uste dute.


      Zenbaki horiek denek zer esan nahi dute, ordea? Lehenik eta behin, ondo jakin behar dela zein den Osakidetzako lantaldearen
      osaera. Iazko urriko hauteskunde sindikaletan Osakidetzako langileen errolda egin zuten: Osakidetzak guztira 46.372
      langile zituen orduan. Datu horren barruan, egiturazko lantaldea 32.442 lanpostuk osatzen dute, Osasun Sailaren arabera.


      «Deribazioak eginda, estatistiketan datuak betetzen dituzte, pazienteak itxaron zerrendatik ateratzen dituzte eta ebakuntza
      egin diete»


      MAIDER PORTOLESLAB sindikatuko osasungintzako arduraduna


      Hala ere, langile finkoak ez dira hainbeste. Saavedrak Osasun Sailaren datuak aipatuta azaldu duenez, Osakidetzako langile
      finkoak 18.329 ziren iazko maiatzean —Osasun Sailak orduan eman zizkien lantaldeari buruzko datuak azken aldiz—: «Lan
      eskaintza publiko batean postu kodifikatu bat lortu duten langileak dira. Izan ere, LEP batean eskaini ahal izateko,
      lanpostu horrek kode bat izan behar du».'
    - Kontzeptu hori, aldez edo moldez, toki askotatik ari dira azpimarratzen, Zuberogoitiaren aburuz; esate baterako, «ekologia
      sakonetik biologiaren korronte garaikide batzuetatik, feminismotik edota fisika
    - 'Gaur egungo gizarteko supergaizkileak diren bilionarioak dira honen guztiaren bultzatzaile nagusietakoak, eraginkortasun
      honen helburu den longterminism edo epeluzerismoa bezala itzuli genezakeenarekin lotuta. Badakizu mundua pikutara bidaltzen
      ari diren bitartean nortzuk ari diren beraien burua salbatzeko ahalegin handiena egiten. Hauen hitzetan, ez da guztia
      desagertuko delako, noski ezetz, gizateria izan daitekeenaren potentziala gauzatzeko baizik. Eta epe luzeak eskaintzen
      duen potentzialaren izenean oso gauza arriskutsuak egin daitezke. Esaterako, orain eta hemen kaltetuak direnei erreparatzeari
      uztea. Epe luzeari begiratzen badiogu, Gazako gerrak ez duelako gizakiarentzat arrisku existentzialik suposatzen, adibidez.
      Horregatik gizatasun, etika edo sentimenduetan oinarritutako kausetan denbora galdu beharrean, eragin zabal bat duten
      horietara zuzendu beharko genuke gure indarra. Arrazoinamendu honetatik gizakiaren potentziala betetzen dela bermatzen
      duen eugenesiara ez dago ezer. Nick Bostrom filosofoak aipatzen dituen gure emozioak kontrolatzea ahalbidetuko duten
      aldaketa genetikoetara edo Elon Musk-ek bultzaturiko burmuinean egindako inplanteetara ere ez. Potentziala transhumanoa
      da. Aseguru etxeen algoritmoak onartuko duen bioingeniaritzarena. Gorputza eta espazioa konkistatu ahal izango duen
      kapitalarena. Ez da sentimentala. Eta ez da gurea.


      Korronte honek guztiak gizakiaren intuizio eta emozioen kontra egiten du epe luzeko teorian baina epe motzeko praktika
      beste zerbait izaten ari da. Azkenaldian ikusi ditugu, Estatu Batuetan eta Argentinan adibidez, (asmatutako) datuak
      eskutan, koadratzen ez dien ezer erraietatik ezabatzeko prest. Beharrezkoa den eraginkortasun objektibo bezala aurkeztuz
      murrizketa emozionala besterik ez dena.'
