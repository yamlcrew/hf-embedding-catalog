  - source_sentence: FATCA-ийн ямар маягтын талаарх мэдээлэл ХХБ-ны МУТС-тэй тэмцэх хүрээнд багтдаг вэ?
    sentences:
    - "Wolfsberg Questionnaire\n\nВольфсберг групп нь дэлхийн арван гурван банкны нэгдэл бөгөөд санхүүгийн гэмт хэргийн эрсдэлийн\
      \ менежментийн тогтолцоо, удирдамжийг боловсруулах, тэр дундаа харилцагчаа таних, мөнгө угаах, терроризмыг санхүүжүүлэхтэй\
      \ тэмцэх бодлогыг боловсруулахад чиглэдэг.  \nДоорх линк дээр даран та бүхэн банкны Волфсберг группийн Корреспондент\
      \ (хамтын ажиллагаатай) банкны асуулгатай танилцах боломжтой ба асуулгаас банкны Мөнгө угаах болон терроризмыг санхүүжүүлэхтэй\
      \ тэмцэх хөтөлбөрийн талаар ерөнхий мэдээлэлтэй танилцах боломжтой. [**Энд дарна уу**](https://www.tdbm.mn/sites/default/files/2024-11/TDBM%202024.09.09%20CBDDQ%20v1.4%20sign.pdf)\n\
      \nW-8BEN-E FORM\nХХБ-ны МУТС-тэй тэмцэх хүрээнд Вольфсберг Группийн асуулга болон FATCA-ийн W-8BEN-E маягтын талаарх\
      \ мэдээлэл.\n"
    - "# Байгууллагын хадгаламжийн сертификат\nТанд өндөр хүүтэй, бусдад шилжүүлэх, худалдах зэргээр чөлөөтэй хөрвөх чадвартай\
      \ бүтээгдэхүүнийг санал болгож байна.\n\nҮйлчилгээний нөхцөл\n### **Төгрөгийн сертификат**\n\n| **Сертификатын хугацаа**\
      \ | **3 сар** | **6 сар** | **12 сар** |\n| --- | --- | --- | --- |\n| Жилийн хүү | 9.6% | 10.6% | 12.5% |\n\n**\\***Гэрээний\
      \ хугацаанд орлого зарлагын гүйлгээ хийхгүй, хугацаа цуцлах боломжгүй.  \n\\*\\*3-24 сарын хугацаатай хадгаламжийн хувьд\
      \ санхүүгийн тогтвортой харилцаа үүсгэсэн харилцагчдад хадгаламж шинээр нээх болон хадгаламжийн хугацаа сунгах тохиолдолд\
      \ банкны холбогдох газар, нэгжийн зөвшөөрлөөр (Улаанбаатарт 50 сая (50 мянган ам.доллар), Орон нутагт 20 сая (20 мянган\
      \ ам. доллар) түүнээс дээш үлдэгдлийн хувьд) хадгаламжийн нийтэд зарласан хүүн дээр 0.0%-3.0% хүртэл хүүний урамшууллыг\
      \ олгож болно.\nБайгууллагын хадгаламжийн сертификатын тухай ерөнхий мэдээлэл, төгрөгийн сертификатын нөхцөл.\n"
    - 'Зээл авахын тулд зээлийн өргөдөл, иргэний үнэмлэх, ажил олгогчийн тодорхойлолт, хөдөлмөрийн гэрээ, орлогыг баталгаажуулах
      баримт бичиг, зээлийн гэрээ, худалдах, худалдан авах гэрээ эсвэл ажил гүйцэтгэх гэрээ, барьцаанд тавих хөрөнгийн гэрчилгээ,
      газар эзэмших эсвэл газар өмчлөлийн гэрчилгээ, газрын кадастрын зураг, барилга ажлын төсөв, эрчим хүчний хэмнэлттэй
      хувийн сууц болохыг тодорхойлсон дүгнэлт зэрэг бичиг баримтыг бүрдүүлэх шаардлагатай. Түүнчлэн, оршин суугаа хаягийн
      тодорхойлолт, гэрлэлтийн гэрчилгээний хуулбар эсвэл гэрлэсэн эсэх лавлагаа, нийгмийн даатгалын шимтгэл төлөлтийн талаарх
      тодорхойлолт, зээлийн барьцаанд тавигдсан эсэх талаарх үл хөдлөх хөрөнгийн лавлагааг бүрдүүлэх шаардлагатай. Эдгээр
      бичиг баримтыг Төрийн үйлчилгээний цахим системээс авах боломжтой.

