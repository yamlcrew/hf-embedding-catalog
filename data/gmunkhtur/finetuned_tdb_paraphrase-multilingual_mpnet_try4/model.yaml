  - source_sentence: Үй олноор хөнөөх зэвсэг дэлгэрүүлэхийг санхүүжүүлэх нь юунд хохирол учруулдаг вэ?
    sentences:
    - '*

      Харилцагч та онлайн банк үйлчилгээгээр энэхүү картыг захиалсан нөхцөлд картын худалдаалах үнээс 20% -ийн хөнгөлөлт эдлэх
