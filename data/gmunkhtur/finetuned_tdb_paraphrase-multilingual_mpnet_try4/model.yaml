      Терминалын тохиргоо буюу гүйлгээ хийгдэж буй улсын журам, зохицуулалтаас хамаарч өндөр дүнтэй гүйлгээг картын ПИН кодоор
      баталгаажуулна.


      Дараах логонуудтай дэлхийн аль ч улсын ПОС терминалд payWave гүйлгээ хийх боломжтой.


      payWave унших боломжгүй үйлчилгээний байгууллагад payWave картын EMV чип болон соронзон туузыг ашиглан гүйлгээ хийх
      боломжтой.


      Олон улс руу зорчихын өмнө

      Картын хүчинтэй хугацаагаа шалгаж, хугацаа дуусах гэж буй бол банкинд хандаж, шинээр захиална уу.


      Кредит карт болон зээлийн эрхтэй карттай бол зээл төлөгдөж дуусах хугацаа, зээлийн лимитийн хугацаа болон картын дуусах
      хугацаагаа нягтлаарай.


      Банкны www.tdbm.mn цахим хуудасны “Мэдээллийн аюулгүй байдлын зөвлөмж” хэсгээс картын эрсдэлээс сэргийлэх зөвлөмжүүдтэй
      сайтар танилцана уу.


      Гарч болзошгүй эрсдэлээс сэргийлж картдаа хамтран эзэмшигч, эсвэл итгэмжлэгдсэн хүний мэдээллээ банканд бүртгүүлэх боломжтой.

      PayWave картаар төлбөр хийх, олон улс руу зорчихоос өмнө анхаарах зүйлс.

      '
