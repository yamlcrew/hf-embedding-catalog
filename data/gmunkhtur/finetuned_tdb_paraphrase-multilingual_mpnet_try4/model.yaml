    - 'Үй олноор хөнөөх зэвсэг дэлгэрүүлэхийг санхүүжүүлэх гэдэг нь Монгол Улсын хууль тогтоомж, олон улсын гэрээгээр хориглосон
      цөмийн, химийн, биологийн эсвэл үйл олноор хөнөөх бүх төрлийн зэвсгийг үйлдвэрлэх, ашиглах, худалдах, худалдан авахад
      санхүүгийн дэмжлэг үзүүлэхийг хэлнэ. Үй олноор хөнөөх зэвсэг дэлгэрүүлэхийг санхүүжүүлэх нь олон улсын энх тайван, аюулгүй
      байдал, хүний амь нас, амьдрах орчинд асар их хохирол учруулдаг учраас энэ төрлийн гэмт хэргийг санхүүжүүлж болзошгүй
      мөнгөн хөрөнгийн шилжилт хөдөлгөөнийг илрүүлж, таслан зогсоох нь банкны хувьд маш чухал юм.


      **САНХҮҮГИЙН ГЭМТ ХЭРЭГ ГЭЖ ЮУ ВЭ?**

      Энэ хэсэгт үй олноор хөнөөх зэвсэг дэлгэрүүлэхийг санхүүжүүлэх гэж юу болох, мөн санхүүгийн гэмт хэргийн тухай тодорхойлолтыг
      оруулсан байна.

      '
    - 'Тус банк нь Forbes Mongolia Women’s Summit 2022 форумд ерөнхий ивээн тэтгэгчээр ажиллаж, Шотланд улсын Эдинбургийн
      их сургуулийн оюутнуудтай хамтран "Ногоон" банк болох талаар судалгаа хийсэн. Visa International-тай хамтран ОУ-ын виза
      карт руу мөнгөн гуйвуулга илгээх Visa Direct болон Visa B2B үйлчилгээнүүдийг Монгол Улсын зах зээлд анхлан нэвтрүүлсэн.
      Britto Cup - 2022 хөл бөмбөгийн аварга шалгаруулах тэмцээнийг зохион байгуулж, Britto Эйнштэйн картыг зах зээлд нэвтрүүлсэн.


      ХХБ нь Мооdу’s агентлагаас B2, Standard & Poor’s агентлагаас B+ зэрэглэлтэй бөгөөд хэтийн төлөв нь тогтвортой үнэлгээтэй.
      Ногоон зээлийн хөтөлбөртөө ОУ-н эдийн засгийн хамтын ажиллагааны банк (IВEC)-с 10 сая ам.долларын санхүүжилт татаж,
      Visa International байгууллагатай хамтын ажиллагаа эхэлсний 20 жилийн ойг тэмдэглэсэн. ОХУ-н тэргүүний банк болох Газпромбанктай
      "Хамтын ажиллагааны гэрээ” байгуулж, "Climate 30+ Ногоон Сэргэлтийн Хөтөлбөр”-ийг санаачлан хэрэгжүүлж байна.

      ХХБ-ны 2022 оны үйл ажиллагаа, хамтын ажиллагаа, зээлжих зэрэглэл, ногоон хөтөлбөрүүдийн тухай.

      '
