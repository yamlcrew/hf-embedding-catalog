  - Энэ ном нь утга зохиолын шүүмжлэлийн салбарт хувь нэмэр оруулжээ.
- source_sentence: “Paprika” кино нь Японы анимэйшн, шинжлэх ухаан, танин мэдэхүйн бүтээл юм
  sentences:
  - “Paprika” киноны найруулагчаар Satoshi Kon ажиллажээ
