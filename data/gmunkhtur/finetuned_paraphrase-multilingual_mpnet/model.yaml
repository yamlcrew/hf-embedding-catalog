    Тэр гурав бусад арван залуусын хамт хожмоо Монголын ардчилсан хувьсгалын арван гурван удирдагч гэж нэрлэгдэх болсон юм.
    Тэр үед Элбэгдорж "Улаан Од" сонины сурвалжлагчаар ажиллаж байсан бөгөөд Залуучуудын эвлэлийн их хуралд оролцсоны дараа
    ажилдаа ирэх үед нь Элбэгдоржийн "буруу үйлдэл"-ийн тухай хурлын даргын үг аль хэдийнээ сонинд нь хүрсэн байв. Тус сонины
    эрхлэгч Элбэгдоржийг ажлын гадуур ямар нэг үйл ажиллагаанд оролцож, коммунист, социалист чиг шугамаас гажсан зүйл хийвэл
    ажлаас нь хална гэж сануулжээ. Тухайн үед Монгол дахь цорын ганц залуучуудын байгууллага байсан Монголын Залуучуудын Эвлэл
    нь Монгол Ардын Хувьсгалт Нам (МАХН)-ын харъяа байгууллага байв. Анхааруулга авсан хэдий ч Ц.Элбэгдорж ба түүний нөхөд
