- source_sentence: The Scriptwriter/Writer is responsible for creating blueprints and details of the script based on the concept
    or idea. With a deep understanding of the storyline, the target audience and the requirements of the creative leadership
    teams, he/she develops the story elements to translate the creative vision into a beautiful story for production. He works
    closely with the production teams to review and revise the script based on inputs to fit the potential audience appeal
    and enhance the suitability and marketability of the production. During the development process, he frequently reviews
    the work to ensure it meets required editorial standards. He also flags the possibility of legalities that may occur in
    view of the regulatory requirements and local needs of the primary market and audience. He is expected to work under pressure
    so as to manage edits within a short time frame. He may be required to travel depending on the production requirements.
    He should have an understanding on how productions affect audiences and be familiar with the current formats of presenting
    screenplays. He should be well versed with script-writing guidelines and techniques to be able to develop a full-length
    script that is production ready within required deadlines. He should also have a fundamental understanding of the process
    of translating scripts to various visual media, as well as knowledge of script requirements for immersive content. He
    should possess strong grammar and writing capability as well as creativity, patience, self-motivation and resilience,
    with an excellent understanding of production processes.
  sentences:
  - 'The Senior Script Editor leads a team to oversee the refinement and finalization of scripts, ensuring alignment with
    creative vision and production standards. They work extensively with directors and producers to approve script revisions
    and manage legal clearances but do not typically write original scripts themselves. This role focuses more on editorial
    oversight and coordination than on initial script creation. Travel is frequent to various production sites to supervise
    script implementation and ensure compliance with regulatory frameworks.


    The Content Writer for digital marketing develops engaging copy and content strategies tailored for online platforms.
    They collaborate with marketing teams to optimize content for SEO and audience engagement but do not create scripts for
    visual media productions. Their work involves writing blogs, social media posts, and promotional materials rather than
    full-length scripts, with an emphasis on quick turnaround and analytics-driven content performance.


    The Screenplay Consultant advises film and TV productions on script structure, character development, and market trends.
    While they provide expert feedback and marketability assessments, they do not write or revise scripts directly. The role
    requires extensive knowledge of production processes and audience preferences but is primarily advisory, often working
    remotely without travel requirements.'
  - The Business Controller/Finance Director acts as the key financial advisor and partner to all business units within the
    organisation. This role entails offering expert accounting guidance to stakeholders to enhance organisational value while
    mitigating risks in line with both external regulations and internal policies. The Business Controller/Finance Director
    excels in building strong relationships and exploring new business opportunities. Additionally, they play a vital role
    in financial planning and analysis, supporting management decisions, managing operational risks, and ensuring effective
    business performance through profitability and operational reviews. The role also includes responsibilities such as recruitment,
    performance evaluation, and identifying training needs for staff across the organisation.
  - The Scriptwriter/Writer crafts detailed script blueprints based on concepts or ideas. With a thorough grasp of the storyline,
    target audience, and creative leadership needs, they develop story elements that bring the creative vision to life for
    production. Collaborating closely with production teams, they revise scripts according to feedback to enhance audience
    appeal and marketability. Throughout development, they ensure editorial standards are met and identify potential legal
    issues related to regulatory and local market requirements. The role demands managing edits under tight deadlines and
    may involve travel based on production needs. The Scriptwriter/Writer understands audience impact, current screenplay
    formats, and script-writing techniques to deliver production-ready full-length scripts on time. They also have foundational
    knowledge of adapting scripts for various visual media and immersive content, paired with strong grammar, creativity,
    patience, self-motivation, resilience, and a solid understanding of production processes.
- source_sentence: The Executive - Localisation coordinates internal and external processes to execute the localisation of
    the organisation's content for delivery to specific territories. He/She maintains day-to-day communication with internal
    localisation teams and vendors to monitor the progress of specific projects. He is also responsible for communicating
    expected quality standards for localisation assets to internal localisation teams and localisation vendors. The work involves
    a high level of coordination and communication with internal and external stakeholders. He spends most of his time liaising
    with external vendors as well as internal teams for content localisation. He is expected to be effective at planning and
    stakeholder management in order to coordinate with all stakeholders involved in the localisation processes and projects.
  sentences:
  - The Strategy & Governance Director/Assistant Director leads the development and implementation of the organisation's strategic
    plans and governance frameworks. They are responsible for managing risk, ensuring compliance with governance standards,
    and collaborating with the Executive Committee, Council, or Board to identify new opportunities for sustainable growth.
    This role includes coordinating board and management meetings, preparing and presenting reports, and guiding the organisation’s
    budgeting process. The ideal candidate is strategic, analytical, risk-aware, and skilled at communicating complex decisions
    to senior leadership and stakeholders.
  - "The Senior Localisation Manager leads the localisation strategy and oversees multiple teams to deliver content localisation\
    \ across global markets, focusing on high-level project management and vendor negotiations.  \nThe Content Marketing Executive\
    \ coordinates marketing campaigns and liaises with internal creative teams and external agencies to promote products within\
    \ local markets.  \nThe Executive - Translation Services handles the translation of documents and ensures linguistic accuracy\
    \ but does not manage the broader localisation process or vendor relationships."
  - The Executive - Localisation manages both internal and external workflows to ensure the organisation’s content is accurately
    localised for targeted regions. He/She maintains continuous communication with internal localisation teams and external
    vendors to track project progress and ensures all localisation outputs meet established quality standards. This role requires
    strong coordination and communication skills to work effectively with various stakeholders. The Executive spends a significant
    portion of time collaborating with vendors and internal teams to facilitate content localisation and is expected to excel
    in planning and stakeholder engagement to successfully oversee localisation projects.
- source_sentence: A Senior Principal Occupational Therapy Manager sets the strategic direction of the department and leads
    occupational therapists in cluster-wide initiatives to enhance clinical innovation and evidence-based practice. S/He leads
    change by implementing new or revising policies and driving the corporate governance agenda. S/He is in charge of leading
    improvements in service delivery and the care model and plans strategies to promote these new improvements and new clinical
    services. S/He ensures that there is sufficient human resources in the department and manages the budgets in the clinical
    setting. Her/His core function will be in managerial work, but s/he will also perform some clinical, educational and research
    tasks in the course of her/his day-to-day work. S/He may work in various settings such as but not limited to public and
    private institutions, acute and community hospitals, rehabilitation centres, voluntary welfare organisations, schools,
    integrated and long-term care facilities and clients homes and work environments. S/He may also work as part of collaborative,
    interdisciplinary teams which may include teachers, nurses, doctors, audiologists, psychologists, social workers, physiotherapists
    and speech therapists. S/He should be visionary, driven and decisive. S/He should possess effective interpersonal, team-building
    and leadership skills.
  sentences:
  - A Senior Principal Occupational Therapy Manager is responsible for setting the strategic vision of the department and
    guiding occupational therapists in cluster-wide programs to advance clinical innovation and evidence-based practices.
    This role involves leading transformation by introducing new or updated policies and championing corporate governance
    initiatives. The manager oversees enhancements in service delivery and care models, developing strategies to promote these
    advances and new clinical services. They ensure adequate staffing levels within the department and handle budget management
    in clinical environments. While primarily focused on managerial duties, the role also includes clinical, educational,
    and research responsibilities. The Senior Principal Occupational Therapy Manager may operate in diverse settings such
    as public and private healthcare institutions, acute and community hospitals, rehabilitation centers, voluntary welfare
    organizations, schools, integrated and long-term care facilities, as well as clients’ homes and workplaces. Collaboration
    with interdisciplinary teams—including teachers, nurses, doctors, audiologists, psychologists, social workers, physiotherapists,
    and speech therapists—is integral. The ideal candidate is visionary, motivated, decisive, and demonstrates strong interpersonal,
    leadership, and team-building capabilities.
  - The Sales and Purchase Broker serves as a mediator between ship buyers and sellers, managing the transaction process and
    ensuring adherence to all relevant legal and regulatory standards. This role involves evaluating the feasibility and risks
    associated with new business prospects and analyzing risk management information to alert management to possible issues.
    Additionally, the broker offers guidance and hands-on training to junior team members in their routine tasks.
  - 'The Principal Physiotherapy Manager leads the physiotherapy department by setting clinical priorities and directing physiotherapists
    across multiple sites to improve patient rehabilitation outcomes. This role focuses on managing clinical protocols, facilitating
    policy updates, and ensuring compliance with healthcare regulations. The manager supervises staffing and resource allocation
    while coordinating budget expenditures in rehabilitation settings. Besides managerial responsibilities, the role requires
    active involvement in patient treatment, training junior therapists, and conducting clinical research. Work environments
    include hospitals, outpatient clinics, community care centers, and specialized rehabilitation units. Collaboration with
    multidisciplinary teams such as occupational therapists, nurses, doctors, and social workers is expected. The successful
    candidate should be proactive, collaborative, and possess strong leadership and communication skills.


    The Senior Principal Occupational Therapy Manager in a mental health setting develops strategic initiatives to enhance
    psychosocial rehabilitation programs. This position emphasizes policy development, governance adherence, and service model
    redesign specifically for mental health occupational therapy services. Responsibilities include resource planning, budget
    oversight, and leading clinical education tailored to psychiatric care. The role involves working closely with psychiatrists,
    psychologists, social workers, and peer support specialists in hospital and community mental health facilities. The incumbent
    must be innovative, resilient, and skilled in interdisciplinary collaboration and team leadership.


    The Senior Principal Occupational Therapy Manager specializing in pediatric care directs department strategies to improve
    therapeutic interventions for children with developmental disabilities. The role includes policy formulation, governance,
    and advancing pediatric occupational therapy practices across multiple community and hospital settings. Responsibilities
    encompass human resource management, budget control, and conducting clinical research focused'
- source_sentence: The Operations Risk and Control Analyst acts as the first line of defence by assisting the management of
    day-to-day risks. He/She will be responsible for identifying, analysing and documenting operational risk events and incidents
    for further investigation. He also supports the team in the development and implementation of risk procedures, detailing
    out required processes, controls and governance standards for all relevant processes. The Operations Risk and Control
    Analyst is both logical and analytical as his tasks involve monitoring and tracking risks. He is numerically inclined
    and comfortable with documentation and analysis tasks. He is familiar with spreadsheet software to handle data efficiently.
  sentences:
  - Assistant Civil and Structural Engineer job openings in Singapore
  - 'The Senior Operations Risk Manager leads the risk management team by overseeing strategic risk assessments and coordinating
    mitigation plans across multiple departments. This role focuses on high-level risk governance and policy development rather
    than day-to-day operational risk tracking. The Senior Manager also liaises with external auditors and ensures compliance
    with regulatory requirements, requiring extensive experience in risk frameworks and leadership skills. Advanced data analytics
    tools and risk management software expertise are preferred.


    The Business Continuity Analyst is responsible for developing and testing business continuity plans to ensure organizational
    resilience during disruptions. This role involves coordinating recovery strategies and conducting impact analyses rather
    than managing daily operational risks. The analyst collaborates with various business units to implement continuity procedures
    and maintains documentation related to crisis management and recovery protocols.


    The Compliance Risk Analyst focuses on regulatory compliance risks by monitoring adherence to legal and internal policies.
    This position entails conducting compliance audits, reporting violations, and recommending corrective actions to mitigate
    compliance risks. The analyst uses compliance management systems and engages with regulatory bodies, differing from operational
    risk monitoring and control activities.'
  - The Operations Risk and Control Analyst serves as the initial line of defence by supporting the management of daily operational
    risks. This role involves identifying, analyzing, and documenting risk events and incidents for subsequent review. The
    analyst also contributes to the formulation and enforcement of risk procedures, outlining necessary processes, controls,
    and governance standards across relevant operations. With a logical and analytical mindset, the analyst monitors and tracks
    risks while handling documentation and data analysis. Proficiency in spreadsheet software is essential for efficient data
    management.
- source_sentence: The Managing Director establishes the business strategies for the organisation and develops plans to enable
    execution of the business strategies. He/She is responsible for tracking market development and trends to inform strategic
    decision making and ensure the organisation remains current with the changing face of the sector. He leads the organisation's
    business development efforts to get more projects and grow the business. He also drives the adoption of innovation and
    new technology to continuously improve the productivity and efficiency of the workforce. The work involves strategic goal
    setting, business development and business leadership. A significant part of his time goes into external meetings with
    potential clients for the purpose of business development. He also spends his time developing strategies and plans, and
    reviewing business and operational performance. He is a strategic thinker and business planner. He is an able leader who
    guides the organisation and the management in the execution of business plans. He should also be an effective communicator
    in order to influence external stakeholders.
  sentences:
  - business strategy, market analysis, strategic planning, business development, leadership, innovation adoption, technology
    integration, client relationship management, performance review, communication skills
  - Demurrage and laytime manager jobs in Singapore
  - culinary arts, fashion design, gardening, animal care, music theory, painting, carpentry, automotive repair
