- source_sentence: 'EDUCATION

    University of Roseton

    Bachelor of Science in Computer Science | Graduated: 2016


    Graduated Cum Laude with GPA: 3.9

    Class Salutatorian

    Computer Club President

    Student Council Member

    Winslough High School

    High School Diploma | 2008 - 2012


    Computer Club Vice President

    Winslough Warriors Basketball Team Member

    AP Scholar Award

    National Honor Society Member

    SKILLS AND ABILITIES

    Programming Languages: Proficient in multiple programming languages

    Problem Solving: Strong problem-solving and critical thinking skills

    Expertise: Expertise in software systems and computer operating structures

    Communication: Effective communication and teamwork skills'
  sentences:
  - 'Eduvator

    Skills and expertise:

    Degree:


    University graduate, major in Computer Science or Information Technology.

    Priority is given to candidates who graduated from universities such as University of Natural Sciences, University of
    Information Technology - VNU-HCM, University of Technology, etc.

    Experience:


    At least 2 years of experience developing software for enterprise solutions, especially using NodeJS.

    Professional skills:


    Experience with NodeJS and familiarity with ExpressJS (priority is given to those with experience with Apollo Server).

    Good knowledge of SQL and NoSQL databases, ability to write complex queries (priority is given to those who know how to
    use MongoDB).

    Proficient or experienced with Docker.

    Good problem-solving skills, proficient in handling and manipulating strings/characters and arrays.

    Strong knowledge of the git source code management system.

    Learning ability:


    Ability to learn new technologies quickly.'
  - 'Skills & Expertise:


    Requirements:


    Education:


    Graduated from a regular university (with a degree), priority is given to majors: Information Technology, Telecommunications,
    Information Systems, Computer Science, etc.

    Experience:


    At least 3 years of experience as a Java programmer.

    Professional knowledge:


    Strong knowledge of Object Oriented Programming (OOP), Web Development, Database Management System (DBMS), ORM, Design
    Pattern.

    Proficient in Restful API, HTML, CSS, JavaScript (Jquery, ...), Bootstrap, JSON, XML.

    Proficient in PostgreSQL (or MySQL, MSSQL, Oracle), priority is given to candidates with the ability to design DB and
    optimize system performance.

    Understand and apply MVC model.

    Proficient in Git.'
  - 'Skills & Expertise:


    Requirements:


    Education:


    University degree or higher in Information Technology or Electronics - Telecommunications.

    Professional certificates:


    CCNA or CCNP certificate.

    Priority is given to candidates with certificates such as: MCSA, Azure, VMware, CEH, OSCE, OSCP, COMPTIA Pentest+ or equivalent.

    Foreign languages:


    English equivalent to Toeic 400 points or higher.

    Office skills:


    Proficient in MS Office, Visio.'
- source_sentence: 'EDUCATION Bachelor of Technology Really Great University Really Great Company 2016 - Present Responsible
    for database administration and website design.

    Developed the logic for a streamlined ad-serving platform that scales effectively for educational institutions and online
    classroom management.


    SKILLS Web Design Design Thinking Wireframe Creation Front-End Coding Back-End Technology Problem Solving Computer Literacy
    Project Management Tools Strong Communication Skills'
  sentences:
  - 'ABBANK


    Skill requirements:


    University or master''s degree in: Information Security, Information Technology, Software Engineering, Computer Science.

    At least 5 years of experience in the field of information security.

    At least 2 years of experience in the field of DevOps / DevSecOps.

    At least 2 years of experience working with Cloud platforms (AWS, Azure, GCP).

    Deep knowledge of IT in the field of DevSecOps, solutions in On-premise, Cloud native and Hybrid environments (Container,
    Kubernetes, Docker, Git, CI/CD Jenkins, GitLab CI, GitHub...).

    Skills related to exploiting vulnerabilities, security weaknesses.

    Understanding of OWASP, MITRE Attack.

    Deep knowledge of CI/CD pipeline model, deploying integrated security automation solutions in the development process.

    Develop documentation and standard processes to deploy and operate security solutions on Cloud/DevSecOps in a stable and
    secure manner.

    Have certificates such as CEH, OSCP, CCSP... or equivalent; having a certificate in GCP Cloud Security is an advantage.

    Education requirements:


    Graduate from university or master''s degree in related field.

    Language requirements:


    Being able to communicate in English is an advantage.'
  - 'FPT

    Skills and qualifications required:


    General standards:


    Be a Vietnamese citizen, have a permanent residence in Vietnam.

    Be under 35 years old.

    Be in good health to perform the job.

    Have good moral qualities, no criminal record, no detention, no prison sentence, suspended sentence, non-custodial reform,
    no local education status, medical treatment, drug rehabilitation, etc.

    Specific standards:


    Professional qualifications:


    Graduate from university or higher, regular system (including second university, not including university transfer) at
    domestic universities or graduate from university or higher at foreign universities, affiliated universities.

    Major: Graduated from majors such as Information Technology, Information Security, Telecommunications Electronics, Information
    Electronics, Mathematics - Informatics or equivalent majors.

    Foreign Language:


    Having one of the following certificates: TOEIC 600/990, TOEFL PBT/IPT 500/677, TOEFL CBT 173/300, TOEFL iBT 61/120, IELTS
    5.5/9.0, Cambridge Exam First (FCE), B2 European Framework, 4/6 6-level Foreign Language Proficiency Framework for Vietnam.
    Accepting additional English certificates within 24 months from the date of recruitment.

    Knowledge, skills and experience:


    Experience in managing server systems and storage systems is an advantage.

    Having one of the following certificates: MCITP-SA/Oracle Certified Associate/Oracle Solaris 11 System Administrator Certification/Linux
    Professional Institute LPIC-1 is an advantage.

    Withstand high work pressure, accept to monitor, track systems and handle incidents according to job requirements. Have
    a serious, careful and enthusiastic working attitude.

    Ability to research and learn technology quickly.

    Good communication and problem-solving skills.

    Ability to work in a team or independently.'
  - 'Professional qualifications:

    Experience: At least 1 year of participating in projects related to Machine Learning and image processing.

    Programming languages: Proficiency in Python and using frameworks such as TensorFlow, PyTorch, Keras.

    Programming skills: C/C++ skills are an advantage.

    CAD experience: Experience in AI for CAD (AutoCAD, SolidWorks,...) and reading CAD drawings in Python/C++ is an advantage.

    CAD knowledge: Knowledge of 2D to 3D, 3D CAD and Gaussian Splatting is an advantage.

    Awards: Priority is given to those who have IT/mathematical awards or scientific papers in conferences on Image Processing,
    Image Recognition.

    Language: Good English if the candidate is capable and can work full-time.'
- source_sentence: 'PROFESSIONAL EXPERIENCE

    Giggling Platypus Co.

    Software Engineer

    01 Jun 2052 - Present


    Designed and implemented a new microservice architecture using Borcelle, improving application performance by 20%.

    Developed and maintained critical features for the company''s core product, resulting in a 15% increase in user engagement.

    Lead the development of a new automated testing framework using Rimberio, reducing manual testing time by 30%.

    Developed and implemented a real-time data processing pipeline using Rimberio to handle a 10x increase in data volume.

    Data Thynk Unlimited

    Software Engineer

    01 Aug 2050 - 30 Apr 2052


    Developed custom software solutions to improve application performance.

    Worked closely with cross-functional teams to ensure requirements and quality standards were met.

    EDUCATION

    Fauget University

    Bachelor of Science in Information Technology

    June 2050


    SKILLS & COMPETENCIES

    Programming Languages: Rimberio, Borcelle, Java, Python

    Software Development: System Design, Automated Testing, CI/CD

    Analytical and Problem Solving Skills: Requirements Analysis, Performance Optimization

    Communication and Collaboration: Teamwork, Agile Project Management

    Adaptability and Continuous Learning: Quickly Assimilate New Technologies

    CERTIFICATIONS

    Cloud Certified Rimberio | 2050

    Software Lifecycle Professional Borcelle | 2050

    Scrum Developer Borcelle | 2050'
  sentences:
  - 'Skills and expertise:


    Education:


    University graduate majoring in Information Technology or related field.

    Experience:


    Minimum 2 years of front-end development experience using the following technologies:

    Proficient in front-end development with JavaScript.

    Experience developing applications for Windows operating systems.

    Passionate about developing applications for Windows platforms.'
  - 'Required Skills:


    Experience:


    Minimum 3 years of experience working with .NET or .NET Core.

    Proficient in back-end technologies: ASP.NET Core, EF6 Code First, Identity Server 4, RESTful API, SQL Server 2016, C#,
    Unit Test.

    Good knowledge of ASP.NET MVC frameworks (3,4,5,6), JavaScript, jQuery, JSON, Web API and web application security.

    Additional Skills:


    Experience with NodeJS or WPF, WinForms is an advantage.

    Preferably with Microsoft MCP/MCSD certification in web applications or Azure solutions.

    Understanding of Agile/Scrum development methodology.

    Personal Skills:


    Honest and confident when working directly with customers.

    Passionate about developing innovative products and willing to learn new technologies from Microsoft Tech Stack and Azure
    cloud services.

    Ability to analyze and translate business needs into system design and technical solutions.'
  - 'Qualifications:

    Experience:

    Minimum 2-3 years of experience working with Fullstack technologies, including:

    Frontend: Vue.js (TypeScript), React Native or Flutter.

    Backend: Node.js, C# .NET Core.

    Database: MySQL, SQL Server.

    Architecture: Microservices.

    Advantages:

    Knowledge of Kubernetes (K8s) and ArgoCD.

    Experience working with CI/CD and DevOps systems is a big plus.

    Good problem-solving skills, ability to work independently and collaborate effectively in a team.

    Logical thinking and willingness to learn new technologies.'
