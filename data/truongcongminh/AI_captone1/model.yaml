    Cybersecurity Tools: Experience with cyber security tools with a defensive/offensive mindset.

    Performance Optimization: Solid skills in game optimization and memory management.

    Version Management Knowledge: Familiarity with Git or similar version control systems.

    Preferred Skills:


    AR/VR development experience is a plus.

    Knowledge of multi-player and networking concepts, along with creativity.

    Education:


    Bachelor''s degree in Computer Science, Game Development, or related field, or equivalent hands-on experience.'
  - 'Professional qualifications:

    Experience: At least 1 year of participating in projects related to Machine Learning and image processing.

