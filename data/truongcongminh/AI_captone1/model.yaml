- source_sentence: 'EDUCATION

    BA in Management Information Systems

    Duy Tan University (2021 - Expected completion 05/2025)

    GPA: 3.6/4.0

    TECHNICAL SKILLS

    Frontend:


    Languages ??& Frameworks: HTML, CSS, JavaScript, TypeScript

    Libraries & Tools: TailwindCSS, React.js, Next.js

    Backend:


    Main Framework: NestJS, ExpressJS

    Database & ORM: PostgreSQL, MongoDB, TypeOrm, Mongoose

    Cloud Services: AWS, Elasticsearch


    Messaging & Streaming: KafkaJS, WebSocket


    Container & Deployment: Docker


    Other Tools:


    Version Control: Git, GitHub

    CI/CD: Vercel

    PERSONAL PROJECTS

    Nestgres

    GitHub Repository: Learning Project with NestJS and PostgreSQL. Integrate AWS S3 for file storage, Docker for containerization,
    and Elasticsearch for advanced search. This project helped me gain a deep understanding of building a scalable backend
    system and handling big data.


    Simple Todo

    Live Demo: A simple to-do list application to reinforce my knowledge of React, including component architecture, state
    management, and efficient rendering.


    Nestactube

    GitHub Repository: A full-stack video platform combining NestJS and React, serving video streaming from backend to frontend.
    Focusing on handling large media files and ensuring smooth video playback.


    MindForge

    GitHub Repository - Live Demo: Clone of Notion with note creation and editing features. Using Convex for secure data storage
    and Clerk for user authentication. The project helped me develop a friendly interface and handle complex data structures.


    AWARDS & ACHIEVEMENTS

    Excellent Academic Performance - 2022, 2023

    Boeing Scholarship - 2022, 2023

    Third Prize - Duy Tan Informatics Competition, 2023

    Third Prize - Informatics Olympiad (non-specialist group), 2023

    CERTIFICATIONS

    Foundations of User Experience (UX) Design'
  sentences:
  - 'Skills and Qualifications Required:


    Qualifications:


    Bachelor''s degree in Computer Science, Computer Networking or related fields from Universities such as University of
    Science, University of Natural Sciences, University of Information Technology, Vietnam National University, Ho Chi Minh
    City, or Vietnam National University, Hanoi.

    Only candidates with academic background and practical experience directly related to Information Technology will be considered
    (candidates from short-term or non-major programs will not be accepted).

    Grade Point Average (GPA):


    Minimum GPA: 7.0 (on a scale of 10) or 2.8 (on a scale of 4)


    Technical Skills:


    Strong programming skills with C/C++, along with knowledge of object-oriented programming.

    Have practical experience (1 year or more) working with C/C++.

    Basic knowledge of operating systems such as Windows, Linux, and MacOS.

    Understanding of network protocols and security principles. Strong team working skills and problem solving ability.'
  - 'Qualifications:


