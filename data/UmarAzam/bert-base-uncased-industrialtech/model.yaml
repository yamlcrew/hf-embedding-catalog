  - ' second consecutive term in 2006. However, while the army and the police''s operations recovered control of regions where
    the guerrillas had expanded their influence during the 1980s and 1990s, the FARC displayed a capacity to re-accommodate
    and reactivate themselves militarily in new strategic hinterland and border regions. The FARC showed their military resilience
    through terrorist attacks in urban environments (El Nogal Club bombing in 2003) and a counteroffensive in 2005.


    Álvaro Uribe was reelected in a landslide in 2006, and made the ''consolidation'' of democratic security one of his major
    priorities for the second term. Between 2006 and 2010, the military struck significant blows to the FARC, and for the
    first time successfully targeted high-ranking members of the FARC''s Secretariat. In March 2008, Raúl Reyes was killed
    in a cross-border operation in Ecuador (which sparked a major diplomatic crisis), followed in May 2008 by the natural
    death of the FARC''s historic leader Manuel Marulanda. In the midst of military blows, the FARC sought to maintain the
    political initiative by promoting a humanitarian exchange, and President Uribe bowed to public pressure in August 2007
    by agreeing to discussions mediated by Venezuelan President Hugo Chávez. In November 2007, however, Uribe ended Chávez''s
    mediation. Henceforth, the liberation of hostages came through unilateral decisions by the FARC (Operation Emmanuel) with
    Venezuelan mediation or military rescue operations (Operation Jaque).


    Although no formal peace talks with the FARC were initiated under Uribe''s presidency, informal contacts were clandestinely
    made. In 2012, as the current peace process began, El Tiempo related how Uribe had sought "secret approaches with the
    FARC in search of a peace process" until the final moments of his second term. In 2013, former Swiss mediator Jean Pierre
    Gontard stated that, in 2006, Uribe had ordered three small secret unilateral ceasefires to facilitate talks between both
    parties.


    In July 2008, following the rescue of 15 hostages by the Colombian military in Operation Jaque, the government made contact
    with the FARC, notably the organization''s new leader Alfonso Cano, to offer them a "dignified" exit. Near the end of
    Uribe''s term in January 2010, the then-High Commissioner for Peace, Frank Pearl, told U.S. Ambassador William Brownfield
    that he had opened channels of communication with the FARC to build confidence and prepare roadmaps for the next administration.
