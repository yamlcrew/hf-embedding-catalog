    - '-pressure breathing air compressor


      A low-pressure compressor is often the air supply of choice for surface-supplied diving, as it is virtually unlimited
      in the amount of air it can supply, provided the delivery volume and pressure are adequate for the application. A low-pressure
      compressor can run for tens of hours, needing only refueling, periodical filter drainage and occasional running checks,
      and is therefore more convenient than high-pressure storage cylinders for primary air supply.


      It is however, critical to diver safety that the compressor is suitable for breathing air delivery, uses a suitable
      oil, is adequately filtered, and takes in clean and uncontaminated air. Positioning of the intake opening is important,
      and may have to be changed if the relative wind direction changes, to ensure that no engine exhaust gas enters the intake.
      Various national standards for breathing air quality may apply.


      Power for portable compressors is usually a 4-stroke petrol (gasoline) engine. Larger, trailer mounted compressors,
      may be diesel powered. Permanently installed compressors on dive support boats are likely to be powered by 3-phase electric
      motors.


      The compressor should be provided with an accumulator and a relief valve. The accumulator functions as an additional
      water trap, but the main purpose is to provide a reserve volume of pressurised air. The relief valve allows any excess
      air to be released back to the atmosphere while retaining the appropriate supply pressure in the accumulator.


      High pressure main gas supply


      The main gas supply for surface-supplied diving can be from high pressure bulk storage cylinders. When the storage cylinders
      are relatively portable this is known as a scuba replacement system in the commercial diving industry. The application
      is versatile and can ensure high quality breathing gas in places where atmospheric air is too contaminated to use through
      a normal low pressure compressor filter system, and is easily adaptable to a mixed gas supply and oxygen decompression
      provided that the breathing apparatus and gas supply system are compatible with the mixtures to be used. Scuba replacement
      is often used from smaller diving support vessels, for emergency work, and for hazmat diving.


      Mixed breathing gases are provided from high pressure bulk storage systems for saturation diving, but these are less
      portable, and generally involve manifolded racks of  cylinders of approximately 50 litres water capacity arranged as
      quads and even larger racks of high pressure tubes. If gas reclaim systems are used, the reclaimed gas is scrubbed of
      carbon dioxide, filtered of other contaminants, and recompressed into high pressure cylinders for interim storage, ans
      is generally blended with oxygen or helium to'
