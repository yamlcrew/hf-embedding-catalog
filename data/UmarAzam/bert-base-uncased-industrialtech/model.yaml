    same batch also introduced an improved type of heavy ballistic skirts.


    The Leopard 2A5 upgrade focused on increased armour protection. While upgrading a Leopard 2 tank to the Leopard 2A5 configuration,
    the roof covering the armour modules is cut open and new armour modules are inserted. New additional armour modules made
    of laminated armour cover the frontal arc of the turret. They have a distinctive arrowhead shape and improve protection
    against both kinetic penetrators and shaped charges. The side skirts also incorporate improved armour protection. A 25 mm-thick
    spall liner reduces the danger of crew injuries in case of armour penetration.


    The Leopard 2A7 features the latest generation of passive armour and belly armour providing protection against mines and
    IEDs. The Leopard 2A7 is fitted with adapters for mounting additional armour modules or protection systems against RPGs.


    For urban combat, the Leopard 2 can be fitted with different packages of modular armour. The Leopard 2A4M CAN, Leopard
    2 PSO (Peace Support Operations) and the Leopard 2A7 can mount thick modules of composite armour along the flanks of the
    turret and hull, while slat armour can be adapted at the vehicle''s rear. The armour modules provide protection against
    the RPG-7, which depending on the warhead can penetrate between  and  of steel armour. The Leopard 2A6M CAN increases
    protection against rocket-propelled grenades (RPGs) by including additional slat armour.


    Additional armour packages have been developed by a number of different companies. IBD Deisenroth has developed upgrades
    with MEXAS and Advanced Modular Armor Protection (AMAP) composite armour, the latter is being used on Singaporean and
    Indonesian Leopard 2 tanks. RUAG has developed an armour upgrade utilizing their SidePRO-ATR composite armour. This upgrade
    was first presented on the IAV 2013.


    The Leopard 2A4M and 2A6M add an additional mine protection plate for the belly, which increases protection against mines
    and IEDs.


    On 22 February 2021, the German Defence Ministry agreed to acquire Trophy, an active protection system of Israeli design.
    17 German Army tanks will be fitted with the system, with integration planned to be completed in 2023.


