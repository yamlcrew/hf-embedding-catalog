    - "\n\n Occupational Fields 01-79 (Regular OccFlds) – Occupational Fields that contain all types of MOSs related to a\
      \ specific occupational field.\n 80XX (Miscellaneous Requirement MOSs) – These are MOSs that do not fit into a regular\
      \ OccFld but are used on the Marine Corps Table of Organization (T/O).\n 90XX (Reporting MOS) – These MOSs do not exist\
      \ on the USMC T/O. They are used to meet Department of Navy and Department of Defense reporting requirements.\n\nThere\
      \ are six types of MOSs, divided into primary MOSs and non-primary MOSs. Primary MOSs are of three types:\n Basic MOS\
      \ – Entry-level MOSs required for entry-level Marines (both officers and enlisted) or others not yet qualified by initial\
      \ skills training. In addition, when a Reserve Component (RC) Marine transfers to a new unit and does not possess the\
      \ MOS required for the billet filled, they will be assigned a Basic MOS as Primary MOS until the completion of required\
      \ formal school training or is otherwise certified to be MOS qualified, and the previous PMOS will be retained but become\
      \ an Additional MOS. Promotions for enlisted Marines will be based upon their Basic MOS, or if qualified for a PMOS,\
      \ then upon their PMOS, never on an AMOS.\n Primary MOS (PMOS) – Used to identify the primary skills and knowledge of\
      \ a Marine. Only enlisted Marines, Warrant Officers, Chief Warrant Officers, and Limited Duty Officers are promoted\
      \ in their primary MOS. Changes to an Active Component Marine's PMOS without approval from CMC (MM) and changes to a\
      \ RC Marine's PMOS without approval from CMC (RA) are not authorized. Promotions for enlisted Marines will be based\
      \ upon their Basic MOS, or if qualified for a PMOS, then upon their PMOS, never on an AMOS.\n Additional MOS (AMOS)\
      \ – Any existing PMOS awarded to a Marine who already holds a PMOS. Example: after a lateral move to a new job, a Marine's\
      \ previous PMOS becomes an AMOS and is normally retained in the Marine's service records for historical purposes and\
      \ manpower management. Marines are not promoted in an AMOS.\n\nThere are also three types of non-PMOSs:\n Necessary\
      \ (NMOS) – A non-PMOS that has a prerequisite of one or more PMOSs. This MOS identifies a particular skill or training\
      \ that is in addition to a Marine's PMOS, but can only be filled by a Marine with"
