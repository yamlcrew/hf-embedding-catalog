  - " Disabilities found that \"Living Books programs appeared more comprehensible to students than the Disney programs\"\
    . MacUser felt Slater & Charlie Go Camping by Sierra On-Line was a \"pale imitation\" of the Living Books series, while\
    \ PC Mag thought it wasn't \"quite as richly animated\" as Living Books. Additionally, MacUser wrote that series like\
    \ Living Books and Discis' Kids Can Read \"operate on two levels\" by letting players follow the story narrative and by\
    \ exploring the story's contents. Meanwhile, the De-Jean, Miller and Olson (1995) study found that children preferred\
    \ Living Books over Discis as the latter \"could not be played with\". The Seattle Times compared Living Books' hunt for\
    \ surprises with Electronic Arts' Fatty Bear's Birthday Surprise and Putt-Putt Goes to the Moon. Bloomberg positively\
    \ compared the series to interactive storybooks from Packard Bell Electronics subsidiary Active Imagination, deemed the\
    \ latter \"not quite as rich\". Children's Technology Review thought TabTale's 2011 app The Ugly Duckling imitated the\
    \ Living Books style. Complex asserts that Reading Blaster and Science Blaster never received the same amount of attention\
    \ as Math Blaster! due to \"failing to live up to competition from the likes of the Living Books series\", and wrote that\
    \ Living Books could \"hold a candle\" as a Carmen Sandiego contemporary. Game Developer Magazine grouped together Living\
    \ Books and Big Tuna Productions titles into The Living Book Series, though noted the latter was a pale imitation of the\
    \ former.\n\n Critical reception \n\n As a learning tool \nMany reviewers praised the series as a learning tool. Multiple\
    \ Perspectives on Difficulties in Learning Literacy and Numeracy felt the series offers children a narrative context to\
    \ explore while giving them authority and control over the interface to motivate them to learn. The New York Times described\
    \ it as \"a reading lesson dressed up as an interactive cartoon\". Compute! felt that the interaction led players to a\
    \ \"cartoon fantasy...wonderful, witty world of zaniness\" that was both fun and educational. Children's Interactions\
    \ And Learning Outcomes With Interactive Talking Books deemed the series \"very much 'edutainment’\". Folha appreciated\
    \ that the games did not present the player with puzzles to solve. Multiple Perspectives on Difficulties in Learning Literacy\
    \ and Numeracy asserts that the software had been \"cleverly crafted\" so that play could not commence until after the\
    \ page had been read with each word highlighted, offering a narrative context for the children. The Educational Technology\
