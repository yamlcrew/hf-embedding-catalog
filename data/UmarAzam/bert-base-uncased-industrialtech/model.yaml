    \ 2023, ULA still operates the Atlas V and Delta IV Heavy rockets, both of which are retiring. Both were developed under\
    \ the National Security Space Launch (NSSL) program by Lockheed Martin and Boeing respectively, both launching in 2002.\
    \ The Delta IV Medium was retired on 22 August 2019, but the last remaining  Delta IV Heavy rocket will be used to launch\
    \ a  Reconnaissance satellite, in 2024. ULA is developing Vulcan, a heavy-lift launch vehicle that will replace its existing\
    \ fleet. The first Vulcan certification flight was originally expected to launch in 2019.  it is scheduled to launch 24\
    \ December 2023.\n\nCurrent fleet\n\nAtlas V \n\nAtlas V is ULA's main active launch vehicle, but is scheduled for retirement.\
    \ All remaining Atlas V flights have been sold and no more orders will be accepted. Atlas V has flown 98 times since its\
    \ first flight in 2002. 19 flights remain.\n\nAtlas V is the fifth major version in the Atlas rocket family. It is an\
    \ expendable launch system that was originally designed by Lockheed Martin. Each Atlas V rocket consists of two main stages.\
    \ The first stage is powered by a Russian RD-180 engine, which is manufactured by RD Amross, and burns kerosene and liquid\
    \ oxygen. Each RD-180 engine costs about US$10 million which is considerably cheaper than any competing rocket with the\
    \ ability to launch a satellite to geostationary orbit. It has a flawless record of launching American satellites over\
    \ many years of service.\n\nThe Atlas V has been modified for human spaceflight to support flights of the Boeing Starliner.\
    \ Human-rating required new computers to monitor performance and trigger an abort when necessary, data links between the\
    \ rocket and spacecraft, and other changes. Crewed flights will include a mechanism to allow astronauts to manually abort.\
    \ For Starliner flights,  Atlas V is configured with two SRBs from Aerojet Rocketdyne. This is the only Atlas V configuration\
    \ ever to fly without a payload fairing and the only configuration with two engines on the upper stage. With the Starliner\
    \ on top, the rocket is 172 feet tall. ULA has contracted to support nine Starliner missions with Atlas V. The first Starliner\
    \ mission was the Boeing Orbital Flight Test in December 2019.\n\nIn 2017, Sierra Nevada selected the Atlas V to launch\
    \ the first two missions of the Dream Chaser cargo capsule to the International Space Station. These launches are part\
    \ of NASA's Cargo Resupply Services 2 contract. At"
