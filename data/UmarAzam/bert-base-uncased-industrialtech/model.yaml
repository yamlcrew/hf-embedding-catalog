    Time delay of arrival() then can be estimated by:


    Sound source direction is


    Where  is the sound propagation speed,  is the sampling frequency and  is the distance with maximum time delay between
    2 microphones.


    CPS method does not require the system impulse response data that HRTF needs. An expectation-maximization algorithm is
    also used for localizing several sound sources and reduce the localization errors. The system is capable of identifying
    several moving sound source using only two microphones.


    2D sensor line array


    In order to estimate the location of a source in 3D space, two line sensor arrays can be placed horizontally and vertically.
    An example is a 2D line array used for underwater source localization. By processing the data from two arrays using the
    maximum likelihood method, the direction, range and depth of the source can be identified simultaneously. Unlike the binaural
    hearing model, this method is similar to the spectral analysis method. The method can be used to localize a distant source.


    Self-rotating Bi-Microphone Array

    The rotation of the two-microphone array (also referred as bi-microphone array ) leads to a sinusoidal inter-channel time
    difference (ICTD) signal for a stationary sound source present in a 3D environment. The phase shift of the resulting sinusoidal
    signal can be directly mapped to the azimuth angle of the sound source, and the amplitude of the ICTD signal can be represented
    as a function of the elevation angle of the sound source and the distance between the two microphones. In the case of
    multiple sources, the ICTD signal has data points forming multiple discontinuous sinusoidal waveforms. Machine learning
    techniques such as Random sample consensus (RANSAC) and Density-based spatial clustering of applications with noise (DBSCAN)
    can be applied to identify phase shifts (mapping to azimuths) and amplitudes (mapping to elevations) of each'
