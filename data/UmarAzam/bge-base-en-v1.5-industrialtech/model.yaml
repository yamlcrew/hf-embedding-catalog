  - ' my understanding is, you have tens and tens of thousands of people who are engaged in a nonviolent protest. I believe
    now 15 or 20 people, Palestinians, have been killed and many, many others have been wounded. So I think it''s a difficult
    situation, but my assessment is that Israel overreacted on that." He furthered that Gaza remained "a humanitarian disaster"
    and called on the United States to play "a more positive role in ending the Gaza blockade and helping Palestinians and
    Israelis build a future that works for all."


    During an October 2018 speech, Sanders said it was "hard to imagine that Israel''s Netanyahu government would have taken
    a number of steps— including passing the recent ''Nation State law,'' which essentially codifies the second-class status
    of Israel''s non-Jewish citizens, aggressively undermining the longstanding goal of a two-state solution, and ignoring
    the economic catastrophe in Gaza — if Netanyahu wasn''t confident that Trump would support him."


    In March 2019, after Representative Ilhan Omar received criticism from Democrats and Republicans over comments about Israel
    that were deemed as anti-Semitic, Sanders condemned antisemitism as "a hateful and dangerous ideology which must be vigorously
    opposed in the United States and around the world" while noting that they should not "equate anti-Semitism with legitimate
    criticism of the right-wing, Netanyahu government in Israel." Sanders called for the formation of "an even-handed Middle
    East policy which brings Israelis and Palestinians together for a lasting peace" and voiced his concern that Omar was
    being targeted "as a way of stifling that debate."


    In a July 2019 interview, Sanders stated that he believed "that the people of Israel absolutely have the right to live
    in peace, independence and security" but that the Netanyahu government was extremely right-wing "with many racist tendencies"
    and that the role of the United States was "to try to finally bring peace to the Middle East and to treat the Palestinian
    people with the kind of respect and dignity they deserve." Sanders reflected on the trillions of dollars spent on the
    War on Terror and asserted that as U.S. president he would favor sitting down "in a room with the leadership of Saudi
    Arabia, with the leadership of Iran, with the leadership of the Palestinians, with the leadership of Israel, and hammer
    out some damn agreements, which will try to end the conflicts that exist there forever."


