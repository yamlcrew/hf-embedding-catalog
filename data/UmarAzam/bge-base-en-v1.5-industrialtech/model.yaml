    \ trade and enforcing laws. The top management of JKDM is led by the Director General of Customs (Turus III) and assisted\
    \ by 3 deputies, namely, the Deputy Director General of Customs Enforcement/Compliance Division (Jusa A), the Deputy Director\
    \ General of Customs Customs/Inland Tax Division (Jusa A) and the Deputy Chief Director of Customs Management Division\
    \ (Jusa B). The Royal Malaysian Customs Department consists of several divisions, namely the Enforcement Division, the\
    \ Inland Tax Division, the Compliance Division, the Customs Division, and the Technical Services Division.\n\nRoyal Malaysian\
    \ Customs Department (RMCD) role is to:\n\n Collect national revenue in the form of taxes and customs duties consisting\
    \ of import duty, export duty, excise duty, sales tax, service tax, extraordinary profit levy, vehicle levy, departure\
    \ levy, non-tax revenue, state revenue/trust money and tourism tax.\n Providing trade facilitation in the form of incentives\
    \ and facilitation to the industrial and commercial sectors that aim to generate the national economy in line with the\
    \ change in government policy that prioritizes the industrial sector has been prepared by RMCD.\n Enforce laws and regulations\
    \ administered by RMCD.\n\nLegislation \nJKDM has been allocated the authority to enforce the Acts/Regulations as below.\
    \ The list of legal references is as follows:\n\n Customs Act 1967 & Regulations\n Dangerous Drugs Act 1952\n Excise Act\
