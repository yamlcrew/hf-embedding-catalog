      pioneer of the view. He held that corporations have the obligation to make a profit within the framework of the legal
      system, nothing more. Friedman made it explicit that the duty of the business leaders is, "to make as much money as
      possible while conforming to the basic rules of the society, both those embodied in the law and those embodied in ethical
      custom". Ethics for Friedman is nothing more than abiding by customs and laws. The reduction of ethics to abidance to
      laws and customs, however, have drawn serious criticisms.


      Counter to Friedman''s logic it is observed that legal procedures are technocratic, bureaucratic, rigid and obligatory
      whereas ethical act is conscientious, voluntary choice beyond normativity. Law is retroactive. Crime precedes law. Law
      against crime, to be passed, the crime must have happened. Laws are blind to the crimes undefined in it. Further, as
      per law, "conduct is not criminal unless forbidden by law which gives advance warning that such conduct is criminal".
      Also, the law presumes the accused is innocent until proven guilty and that the state must establish the guilt of the
      accused beyond reasonable doubt. As per liberal laws followed in most of the democracies, until the government prosecutor
      proves the firm guilty with the limited resources available to her, the accused is considered to be innocent. Though
      the liberal premises of law is necessary to protect individuals from being persecuted by Government, it is not a sufficient
      mechanism to make'
