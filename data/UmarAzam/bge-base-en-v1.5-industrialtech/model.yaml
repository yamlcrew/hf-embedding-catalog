    Economic systems

    Political economy and political philosophy have ethical implications, particularly regarding the distribution of economic
    benefits. John Rawls and Robert Nozick are both notable contributors. For example, Rawls has been interpreted as offering
    a critique of offshore outsourcing on social contract grounds.


    Law and regulation

    Laws are the written statutes, codes, and opinions of government organizations by which citizens, businesses, and persons
    present within a jurisdiction are expected to govern themselves or face legal sanction. Sanctions for violating the law
    can include (a) civil penalties, such as fines, pecuniary damages, and loss of licenses, property, rights, or privileges;
    (b) criminal penalties, such as fines, probation, imprisonment, or a combination thereof; or (c) both civil and criminal
    penalties.


    Very often it is held that business is not bound by any ethics other than abiding by the law. Milton Friedman is the pioneer
    of the view. He held that corporations have the obligation to make a profit within the framework of the legal system,
    nothing more. Friedman made it explicit that the duty of the business leaders is, "to make as much money as possible while
    conforming to the basic rules of the society, both those embodied in the law and those embodied in ethical custom". Ethics
    for Friedman is nothing more than abiding by customs and laws. The reduction of ethics to abidance to laws and customs,
    however, have drawn serious criticisms.


    Counter to Friedman''s logic it is observed that legal procedures are technocratic, bureaucratic, rigid and obligatory
