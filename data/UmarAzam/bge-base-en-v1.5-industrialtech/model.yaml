    13 JulyBlue Angels Aircraft 5, BuNo 155029, and 6, BuNo 154992, (Douglas A-4F Skyhawk) collide at the top of a loop at
    1532 hrs., Niagara Falls International Airport, New York, during the Western New York Air Show ''85, killing Lt. Cmdr.
    Michael Gershon. Second pilot, Lt. Andy Caputi, ejects safely with only minor injuries. One Skyhawk crashed on airport
    grounds while the second fighter impacted in a nearby auto junkyard. The demonstration team resumes show duties 20 July
    at Dayton, Ohio but omits maneuver that resulted in crash, and flies with five aircraft rather than six.


    8 AugustA USAF LTV A-7D Corsair II, 69‑6198, of the 4450th Tactical Group, lost power, caught fire and crashed into Midwest
    City, a suburb of Oklahoma City, Oklahoma, pilot Maj. Dennis D. Nielson staying with aircraft as he attempted to steer
    it towards less-populous area before ejecting, but fighter impacted house, killing one, injuring one, one missing, said
    a United Press International report. Second victim found on 9 August. This unit was secretly operating Lockheed F-117
    Nighthawks at this time.


    8 AugustA USAF General Dynamics F-16A Block 15F Fighting Falcon, 81-0750, of the 421st Tactical Fighter Squadron, crashed
    during a training mission in northwest Utah, killing the pilot. Crashed onto the Utah Test and Training Range killing
    pilot, First Lieutenant S. Brad Peale. The aircraft suffered a controlled flight into terrain (CFIT).


    1 SeptemberA U.S. Navy Boeing Vertol CH-46D Sea Knight, BuNo 151918, ''72'', crashed on takeoff due to an engine failure
    aboard the destroyer  in the Indian Ocean. The helicopter struck the Sea Sparrow launcher. Quick response of Fife´s damage
    control team extinguished the fires and secured the helicopter which was hanging from the side of the destroyer below
    the helicopter deck. All 16 crew and passengers aboard escaped without major injuries. The helicopter was assigned to
    Helicopter Combat Support Squadron 11 (HC-11) Det. 6 aboard the combat stores ship .


    15 September A Texas Army National Guard AH-1G Cobra Tail number 67-15737 of D/1/124 CAV of 49th "Lone Star" Div. crashed
