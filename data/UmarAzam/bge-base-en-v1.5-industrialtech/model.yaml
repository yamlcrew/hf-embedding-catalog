      Because of this, it is primarily used for pinpointing the location of a submarine immediately prior to a torpedo or
      depth bomb attack. Due to the sensitivity of the detector, electromagnetic noise can interfere with it, so the detector
      is placed in P-3''s fiberglass tail stinger (MAD boom), far from other electronics and ferrous metals on the aircraft.


      Crew complement


      The crew complement varies depending on the role being flown, the variant being operated, and the country that is operating
      the type. In U.S. Navy service, the normal crew complement was 12 until it was reduced to its current complement of
      11 in the early 2000s when the in-flight ordnanceman position was eliminated as a cost-savings measure and the ORD duties
      assumed by the in-flight technician. Data for U.S. Navy P-3C only.


      Officers:

      three Naval Aviators

      Patrol Plane Commander (PPC)

      Patrol Plane 2nd Pilot (PP2P)

      Patrol Plane 3rd Pilot (PP3P)

      two Naval Flight Officers

      Patrol Plane Tactical Coordinator (PPTC or TACCO)

      Patrol Plane Navigator/Communicator (PPNC or NAVCOM)

      NOTE: NAVCOM on P-3C only; USN P-3A and P-3B series had an NFO Navigator (TACNAV) and an enlisted Airborne Radio Operator
      (RO)


      Enlisted aircrew:

      two enlisted Aircrew Flight Engineers (FE1 and FE2)

      three enlisted Sensor Operators

      Radar/MAD/EWO (SS-3)

      two Acoustic (SS-1 and SS-2)

      one enlisted In-Flight Technician (IFT)

      one enlisted Aviation Ordnanceman (ORD position no longer used on USN crews; duties assumed by IFT)


      The senior of either the PPC or TACCO will be designated as the aircraft Mission Commander (MC).


      Engine loiter shutdown

      Once on station, one engine is often shut down (usually the No. 1 engine – the left outer engine) to conserve fuel and
      extend the time aloft and/or range when at low level. It is the primary candidate for loiter shutdown because it has
      no generator. Eliminating the exhaust from engine 1 also improves visibility from the aft observer station on the left
      side of the aircraft.


      On occasion, both outboard engines can be shut down, weight, weather, and fuel permitting. Long, deep-water'
