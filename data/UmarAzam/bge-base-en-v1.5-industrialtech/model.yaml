      Mercury fulminate is a detonator widely used in explosives.


      Organomercury compounds


      Organic mercury compounds are historically important but are of little industrial value in the western world. Mercury(II)
      salts are a rare example of simple metal complexes that react directly with aromatic rings. Organomercury compounds
      are always divalent and usually two-coordinate and linear geometry. Unlike organocadmium and organozinc compounds, organomercury
      compounds do not react with water. They usually have the formula HgR2, which are often volatile, or HgRX, which are
      often solids, where R is aryl or alkyl and X is usually halide or acetate. Methylmercury, a generic term for compounds
      with the formula CH3HgX, is a dangerous family of compounds that are often found in polluted water. They arise by a
      process known as biomethylation.


      Applications


      Mercury is used primarily for the manufacture of industrial chemicals or for electrical and electronic applications.
      It is used in some liquid-in-glass thermometers, especially those used to measure high temperatures. A still increasing
      amount is used as gaseous mercury in fluorescent lamps, while most of the other applications are slowly being phased
      out due to health and safety regulations. In some applications, mercury is replaced with less toxic but considerably
      more expensive Galinstan alloy.


      Medicine


      Mercury and its compounds have been used in medicine, although they are much less common today than they once were,
      now that the toxic effects of mercury and its compounds are more widely understood. An example of the early therapeutic
      application of mercury of was published in 1787 by James Lind.


      Mercury is an ingredient in dental amalgams. Thiomersal (called Thimerosal in the United States) is an organic compound
