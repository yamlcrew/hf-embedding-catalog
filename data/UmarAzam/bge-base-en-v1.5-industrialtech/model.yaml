      \ are the Aerodynamic Heating Facility (AHF), the Turbulent Flow Duct (TFD), the Panel Test Facility (PTF), and the\
      \ Interaction Heating Facility (IHF). The support equipment includes two D.C. power supplies, a steam ejector-driven\
      \ vacuum system, a water-cooling system, high-pressure gas systems, data acquisition system, and other auxiliary systems.\n\
      \nThe magnitude and capacity of these systems makes the Ames Arc Jet Complex unique. The largest power supply can deliver\
      \ 75 megawatts (MW) for a 30-minute duration or 150 MW for a 15-second duration. This power capacity, in combination\
      \ with a high-volume 5-stage steam ejector vacuum-pumping system, enables facility operations to match high-altitude\
      \ atmospheric flight conditions with samples of relatively large size. The Thermo-Physics Facilities Branch operates\
      \ four arc jet facilities. The Interaction Heating Facility (IHF), with an available power of over 60-MW, is one of\
