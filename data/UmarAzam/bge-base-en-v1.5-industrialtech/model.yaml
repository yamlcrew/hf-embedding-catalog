    - "The Royal Malaysian Customs Department (Jawi written: جابتن كستم دراج مليسيا; abbreviated: RMCD) is a government department\
      \ body under the Malaysian Ministry of Finance. RMCD functions as the country's main indirect tax collector, facilitating\
      \ trade and enforcing laws. The top management of JKDM is led by the Director General of Customs (Turus III) and assisted\
      \ by 3 deputies, namely, the Deputy Director General of Customs Enforcement/Compliance Division (Jusa A), the Deputy\
      \ Director General of Customs Customs/Inland Tax Division (Jusa A) and the Deputy Chief Director of Customs Management\
      \ Division (Jusa B). The Royal Malaysian Customs Department consists of several divisions, namely the Enforcement Division,\
      \ the Inland Tax Division, the Compliance Division, the Customs Division, and the Technical Services Division.\n\nRoyal\
      \ Malaysian Customs Department (RMCD) role is to:\n\n Collect national revenue in the form of taxes and customs duties\
      \ consisting of import duty, export duty, excise duty, sales tax, service tax, extraordinary profit levy, vehicle levy,\
      \ departure levy, non-tax revenue, state revenue/trust money and tourism tax.\n Providing trade facilitation in the\
      \ form of incentives and facilitation to the industrial and commercial sectors that aim to generate the national economy\
      \ in line with the change in government policy that prioritizes the industrial sector has been prepared by RMCD.\n Enforce\
      \ laws and regulations administered by RMCD.\n\nLegislation \nJKDM has been allocated the authority to enforce the Acts/Regulations\
      \ as below. The list of legal references is as follows:\n\n Customs Act 1967 & Regulations\n Dangerous Drugs Act 1952\n\
      \ Excise Act 1976 & Regulations\n Code of Criminal Procedure\n Arms Act 1960\n Prisons Act 1995\n Lockout Rules 1953\n\
      \ Sales Tax Act 2018 & Regulations\n Service Tax Act 2018 & Regulations\n Anti-Money Laundering Act 2001 (AMLATFPUAA)\n\
      \ Poisons Act 1952\n Free Zones Act 1990 & Regulations\n Law Reform (Abolition of Dark Samsu) Act 1976\n Goods and Services\
      \ Tax Act 2014 & Regulations\n Tourism Tax Act 2017\n Anti-Trafficking in Persons and Anti-Smuggling of Migrants Act\
      \ 2007 (ATIPSOM)\n Strategic Trade Act 2010\n Prohibition on Imports 2017\n Prohibition On Exports 2017\n International\
      \ Trade in Endangered Species Act 2008 (CITES)\n Wildlife Conservation Act 2010\n Merchant Shipping Ordinance 1952\n\
      \ Countervailing Duty and Anti-Dumping Act 1993\n Protection Act 2006\n Passport Act 1966\n Immigration Act 1959/63\n\
      \ Registration of Criminals and Undesirable Persons Act 1969\n Evidence Act 1950\n Witness Protection Act 2009\n Whistleblower\
      \ Protection Act 2010\n Courts of Justice"
