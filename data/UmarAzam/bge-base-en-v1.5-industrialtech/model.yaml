      Economic systems

      Political economy and political philosophy have ethical implications, particularly regarding the distribution of economic
      benefits. John Rawls and Robert Nozick are both notable contributors. For example, Rawls has been interpreted as offering
      a critique of offshore outsourcing on social contract grounds.


      Law and regulation

      Laws are the written statutes, codes, and opinions of government organizations by which citizens, businesses, and persons
      present within a jurisdiction are expected to govern themselves or face legal sanction. Sanctions for violating the
      law can include (a) civil penalties, such as fines, pecuniary damages, and loss of licenses, property, rights, or privileges;
      (b) criminal penalties, such as fines, probation, imprisonment, or a combination thereof; or (c) both civil and criminal
      penalties.


