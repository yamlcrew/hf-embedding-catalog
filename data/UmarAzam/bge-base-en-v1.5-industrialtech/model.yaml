      ceremonially launched by the Secretary of State for Transport Andrew Adonis, although the preview service only became
      available to general passengers on 29 June. The preview service allowed for further train testing under real-world conditions,
      during which the type reportedly achieved a 99% punctuality rate in the first month of operations. In September 2009,
      preliminary services were launched to the Kent coast (Dover via Folkestone, and Ramsgate via Canterbury). During November
      2009, preview services commenced on the North Kent line as well.


      Even during the preview service, the Class 395 presented several performance improvements in comparison to conventional
      rolling stock, including its high rate of acceleration, lower noise levels (primarily attributed to its air conditioning
      arrangements), and its aesthetic appeal. Railway journalist Richard Clinnick observed several minor shortcomings of
      the interior, such as the somewhat cramped seating arrangement and the lack of securing straps at the baby changing
      facility, but positively reviewed the overall package. In September 2010, it was reported that several passengers were
      concerned by the presence of a ''wobbling'' motion that occurred within some tunnel sections; the phenomenon was described
      by Southeastern as non-dangerous, but all trains were fitted with dampers that prevent any recurrence of the issue.


      Operations and performance


      A full regular service commenced on 13 December 2009. Initial services included a half-hourly north Kent service to
      and from St Pancras, London, via Stratford, Ebbsfleet, Gravesend, Strood, Rochester, Chatham, Gillingham, Rainham, and
      Sittingbourne to Faversham, a half-hourly service to East Kent via Stratford, Ebbsfleet, Ashford with one train continuing
      to Margate via Canterbury West, Ramsgate and Broadstairs, with the other to Dover via Folkestone West and Folkestone
      Central. Seven million journeys were made in the first year of operation.


      The introduction of the trains was generally successful, with good reliability and passenger satisfaction figures. The
      new high-speed services also caused an increase in passenger numbers above that already being experienced on the Kent
      network. On introduction, timetabled journeys to London from Ebbsfleet were reduced from 51 to 18 minutes, whilst trains
      using the entire length of High Speed 1 (starting in Ashford) had timetabled journeys reduced by around 45 minutes.

