    Once inserted, the key would be turned until the pear was fully opened and caused significant damage and even death as
    punishment. For slaves accused of lying, the pear was placed in their mouths and the key was turned until their jaws were
    broken! As for female slaves, if they refused sex with their master, the pear was inserted into their sexual orifice (causing
    massive bleeding and infertility). We must learn, know and defend our true story otherwise the executioner will always
    pose as the victim and claim the praise of the hunter. It is the ignorance of our history that explains our present and
    will determine our future...
