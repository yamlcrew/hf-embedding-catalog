    sentences:
    - "My fault is past. But, O, what form of prayer\n    Can serve my turn? 'Forgive me my foul murther'?    That cannot\
      \ be; since I am still possess'd    Of those effects for which I did the murther-    My crown, mine own ambition, and\
      \ my queen.    May one be pardon'd and retain th' offence?    In the corrupted currents of this world    Offence's gilded\
      \ hand may shove by justice,    And oft 'tis seen the wicked prize itself    Buys out the law; but 'tis not so above.\
      \    There is no shuffling; there the action lies    In his true nature, and we ourselves compell'd,    Even to the\
      \ teeth and forehead of our faults,    To give in evidence. What then? What rests?    Try what repentance can. What\
      \ can it not?    Yet what can it when one cannot repent?    O wretched state! O bosom black as death!    O limed soul,\
      \ that, struggling to be free,    Art more engag'd! Help, angels! Make assay.      Bow, stubborn knees; and heart with\
      \ strings of steel,    Be soft as sinews of the new-born babe!    All may be well.                                 \
      \ He kneels.\n                         Enter Hamlet.  Ham. Now might I do it pat, now he is praying;\n    And now I'll\
      \ do't. And so he goes to heaven,    And so am I reveng'd. That would be scann'd.    A villain kills my father; and\
      \ for that,    I, his sole son, do this same villain send    To heaven.    Why, this is hire and salary, not revenge!\
      \    He took my father grossly, full of bread,    With all his crimes broad blown, as flush as May;    And how his audit\
      \ stands, who knows save heaven?\n      But in our circumstance and course of thought,\n"
    - "YORK. From Ireland thus comes York to claim his right\n    And pluck the crown from feeble Henry's head:    Ring bells\
      \ aloud, burn bonfires clear and bright,    To entertain great England's lawful king.    Ah, sancta majestas! who would\
      \ not buy thee dear?    Let them obey that knows not how to rule;    This hand was made to handle nought but gold. \
      \   I cannot give due action to my words    Except a sword or sceptre balance it.\n      A sceptre shall it have, have\
      \ I a soul\n    On which I'll toss the flower-de-luce of France.\n                         Enter BUCKINGHAM    [Aside]\
      \ Whom have we here? Buckingham, to disturb me?\n    The King hath sent him, sure: I must dissemble.  BUCKINGHAM. York,\
      \ if thou meanest well I greet thee well.    YORK. Humphrey of Buckingham, I accept thy greeting.    Art thou a messenger,\
      \ or come of pleasure?  BUCKINGHAM. A messenger from Henry, our dread liege,    To know the reason of these arms in\
      \ peace;    Or why thou, being a subject as I am,    Against thy oath and true allegiance sworn,    Should raise so\
      \ great a power without his leave,    Or dare to bring thy force so near the court.  YORK. [Aside] Scarce can I speak,\
      \ my choler is so great.    O, I could hew up rocks and fight with flint,    I am so angry at these abject terms;  \
      \  And now, like Ajax Telamonius,    On sheep or oxen could I spend my fury.    I am far better born than is the King,\
      \    More like a king, more kingly in my thoughts;    But I must make fair weather yet awhile,    Till Henry be more\
      \ weak and I more strong.-    Buckingham, I prithee, pardon me    That I have given no answer all this while;    My\
      \ mind was troubled with deep melancholy.      The cause why I have brought this army hither    Is to remove proud Somerset\
      \ from the King,    Seditious to his Grace and to the state.  BUCKINGHAM. That is too much presumption on thy part;\
      \    But if thy arms be to no other end,    The King hath yielded unto thy demand:\n      The Duke of Somerset is in\
      \ the Tower.\n"
