    - "EDWARD. I wonder how our princely father scap'd,\n    Or whether he be scap'd away or no    From Clifford's and Northumberland's\
      \ pursuit.    Had he been ta'en, we should have heard the news;    Had he been slain, we should have heard the news;\
      \    Or had he scap'd, methinks we should have heard    The happy tidings of his good escape.    How fares my brother?\
      \ Why is he so sad?  RICHARD. I cannot joy until I be resolv'd    Where our right valiant father is become.    I saw\
      \ him in the battle range about,    And watch'd him how he singled Clifford forth.    Methought he bore him in the thickest\
      \ troop    As doth a lion in a herd of neat;\n      Or as a bear, encompass'd round with dogs,\n    Who having pinch'd\
      \ a few and made them cry,    The rest stand all aloof and bark at him.      So far'd our father with his enemies; \
      \   So fled his enemies my warlike father.    Methinks 'tis prize enough to be his son.    See how the morning opes\
      \ her golden gates    And takes her farewell of the glorious sun.    How well resembles it the prime of youth,    Trimm'd\
      \ like a younker prancing to his love!  EDWARD. Dazzle mine eyes, or do I see three suns?  RICHARD. Three glorious suns,\
      \ each one a perfect sun;    Not separated with the racking clouds,    But sever'd in a pale clear-shining sky.    See,\
      \ see! they join, embrace, and seem to kiss,    As if they vow'd some league inviolable.    Now are they but one lamp,\
      \ one light, one sun.    In this the heaven figures some event.  EDWARD. 'Tis wondrous strange, the like yet never heard\
      \ of.    I think it cites us, brother, to the field,    That we, the sons of brave Plantagenet,    Each one already\
      \ blazing by our meeds,    Should notwithstanding join our lights together      And overshine the earth, as this the\
      \ world.    Whate'er it bodes, henceforward will I bear    Upon my target three fair shining suns.  RICHARD. Nay, bear\
      \ three daughters- by your leave I speak it,    You love the breeder better than the male.\n"
    - "Forget that rarest treasure of your cheek,\n    Exposing it- but, O, the harder heart!    Alack, no remedy!- to the\
      \ greedy touch    Of common-kissing Titan, and forget    Your laboursome and dainty trims wherein    You made great\
      \ Juno angry.  IMOGEN. Nay, be brief;    I see into thy end, and am almost    A man already.  PISANIO. First, make yourself\
