  sentences:
  - "Thou know'st that we two went to school together;\n    Even for that our love of old, I prithee,    Hold thou my sword-hilts,\
    \ whilst I run on it.  VOLUMNIUS. That's not an office for a friend, my lord.                                        \
    \           Alarum still.  CLITUS. Fly, fly, my lord, there is no tarrying here.  BRUTUS. Farewell to you, and you, and\
    \ you, Volumnius.    Strato, thou hast been all this while asleep;      Farewell to thee too, Strato. Countrymen,    My\
    \ heart doth joy that yet in all my life    I found no man but he was true to me.    I shall have glory by this losing\
    \ day,    More than Octavius and Mark Antony    By this vile conquest shall attain unto.    So, fare you well at once,\
    \ for Brutus' tongue    Hath almost ended his life's history.    Night hangs upon mine eyes, my bones would rest    That\
    \ have but labor'd to attain this hour.                            Alarum. Cry within, \"Fly, fly, fly!\"  CLITUS. Fly,\
    \ my lord, fly.  BRUTUS. Hence! I will follow.                        Exeunt Clitus, Dardanius, and Volumnius.    I prithee,\
    \ Strato, stay thou by thy lord.    Thou art a fellow of a good respect;    Thy life hath had some smatch of honor in\
    \ it.    Hold then my sword, and turn away thy face,    While I do run upon it. Wilt thou, Strato?  STRATO. Give me your\
    \ hand first. Fare you well, my lord.    BRUTUS. Farewell, good Strato.              Runs on his sword.    Caesar, now\
    \ be still;    I kill'd not thee with half so good a will.            Dies.\n     Alarum. Retreat. Enter Octavius, Antony,\
    \ Messala,\n                 Lucilius, and the Army.\n    OCTAVIUS. What man is that?\n"
  - "Elsinore. A room in the Castle.\nEnter King, Queen, Polonius, Ophelia, Rosencrantz, Guildenstern, and Lords.  King. And\
    \ can you by no drift of circumstance\n    Get from him why he puts on this confusion,    Grating so harshly all his days\
    \ of quiet    With turbulent and dangerous lunacy?  Ros. He does confess he feels himself distracted,    But from what\
    \ cause he will by no means speak.  Guil. Nor do we find him forward to be sounded,    But with a crafty madness keeps\
    \ aloof    When we would bring him on to some confession    Of his true state.  Queen. Did he receive you well?  Ros.\
    \ Most like a gentleman.  Guil. But with much forcing of his disposition.  Ros. Niggard of question, but of our demands\
    \    Most free in his reply.  Queen. Did you assay him      To any pastime?  Ros. Madam, it so fell out that certain players\n\
    \      We o'erraught on the way. Of these we told him,\n"
  - "VII.\nThe French camp near Agincourt\nEnter the CONSTABLE OF FRANCE, the LORD RAMBURES, the DUKE OF ORLEANS,\nthe DAUPHIN,\
    \ with others\n  CONSTABLE. Tut! I have the best armour of the world.\n    Would it were day!  ORLEANS. You have an excellent\
    \ armour; but let my horse have his    due.  CONSTABLE. It is the best horse of Europe.  ORLEANS. Will it never be morning?\
    \  DAUPHIN. My Lord of Orleans and my Lord High Constable, you talk of    horse and armour?  ORLEANS. You are as well\
    \ provided of both as any prince in the    world.  DAUPHIN. What a long night is this! I will not change my horse with\
