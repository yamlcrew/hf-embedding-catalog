      \    If that his head have ear in music; doubtless    With joy he will embrace you; for he's honourable,      And, doubling\
      \ that, most holy. Your means abroad-    You have me, rich; and I will never fail    Beginning nor supplyment.  IMOGEN.\
      \ Thou art all the comfort    The gods will diet me with. Prithee away!    There's more to be consider'd; but we'll\
      \ even    All that good time will give us. This attempt    I am soldier to, and will abide it with    A prince's courage.\
      \ Away, I prithee.  PISANIO. Well, madam, we must take a short farewell,    Lest, being miss'd, I be suspected of  \
