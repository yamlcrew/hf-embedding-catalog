      \ how 'tis like to go.                           Exit  SCARUS. Swallows have built    In Cleopatra's sails their nests.\
      \ The augurers    Say they know not, they cannot tell; look grimly,    And dare not speak their knowledge. Antony  \
      \  Is valiant and dejected; and by starts    His fretted fortunes give him hope and fear    Of what he has and has not.\
      \                            [Alarum afar off, as at a sea-fight]\n                      Re-enter ANTONY  ANTONY. All\
      \ is lost!\n    This foul Egyptian hath betrayed me.    My fleet hath yielded to the foe, and yonder      They cast\
      \ their caps up and carouse together    Like friends long lost. Triple-turn'd whore! 'tis thou\n      Hast sold me to\
      \ this novice; and my heart\n    Makes only wars on thee. Bid them all fly;    For when I am reveng'd upon my charm,\
