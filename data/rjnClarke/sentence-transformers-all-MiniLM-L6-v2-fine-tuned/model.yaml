    sentences:
    - "Immortal longings in me. Now no more    The juice of Egypt's grape shall moist this lip.    Yare, yare, good Iras;\
      \ quick. Methinks I hear    Antony call. I see him rouse himself    To praise my noble act. I hear him mock    The luck\
      \ of Caesar, which the gods give men    To excuse their after wrath. Husband, I come.    Now to that name my courage\
      \ prove my title!    I am fire and air; my other elements    I give to baser life. So, have you done?    Come then,\
      \ and take the last warmth of my lips.    Farewell, kind Charmian. Iras, long farewell.                            \
      \  [Kisses them. IRAS falls and dies]    Have I the aspic in my lips? Dost fall?    If thus thou and nature can so gently\
      \ part,    The stroke of death is as a lover's pinch,    Which hurts and is desir'd. Dost thou lie still?    If thou\
      \ vanishest, thou tell'st the world      It is not worth leave-taking.  CHARMIAN. Dissolve, thick cloud, and rain, that\
      \ I may say    The gods themselves do weep.  CLEOPATRA. This proves me base.\n      If she first meet the curled Antony,\n"
    - "BURGUNDY. Warlike and martial Talbot, Burgundy\n    Enshrines thee in his heart, and there erects      Thy noble deeds\
      \ as valour's monuments.  TALBOT. Thanks, gentle Duke. But where is Pucelle now?    I think her old familiar is asleep.\
      \    Now where's the Bastard's braves, and Charles his gleeks?    What, all amort? Rouen hangs her head for grief  \
      \  That such a valiant company are fled.    Now will we take some order in the town,    Placing therein some expert\
      \ officers;    And then depart to Paris to the King,    For there young Henry with his nobles lie.  BURGUNDY. What Lord\
      \ Talbot pleaseth Burgundy.  TALBOT. But yet, before we go, let's not forget    The noble Duke of Bedford, late deceas'd,\
      \    But see his exequies fulfill'd in Rouen.    A braver soldier never couched lance,    A gentler heart did never\
      \ sway in court;    But kings and mightiest potentates must die,    For that's the end of human misery.            \
      \       Exeunt\n"
    - "Your suffering in this dearth, you may as well\n    Strike at the heaven with your staves as lift them    Against the\
      \ Roman state; whose course will on    The way it takes, cracking ten thousand curbs    Of more strong link asunder\
      \ than can ever    Appear in your impediment. For the dearth,    The gods, not the patricians, make it, and    Your\
      \ knees to them, not arms, must help. Alack,    You are transported by calamity    Thither where more attends you; and\
      \ you slander    The helms o' th' state, who care for you like fathers,    When you curse them as enemies.  FIRST CITIZEN.\
      \ Care for us! True, indeed! They ne'er car'd for us    yet. Suffer us to famish, and their storehouses cramm'd with\
      \    grain; make edicts for usury, to support usurers; repeal daily    any wholesome act established against the rich,\
      \ and provide more    piercing statutes daily to chain up and restrain the poor. If the    wars eat us not up, they\
      \ will; and there's all the love they bear    us.    MENENIUS. Either you must    Confess yourselves wondrous malicious,\
      \    Or be accus'd of folly. I shall tell you    A pretty tale. It may be you have heard it;    But, since it serves\
      \ my purpose, I will venture    To stale't a little more.  FIRST CITIZEN. Well, I'll hear it, sir; yet you must not\
      \ think to    fob off our disgrace with a tale. But, an't please you, deliver.  MENENIUS. There was a time when all\
      \ the body's members    Rebell'd against the belly; thus accus'd it:    That only like a gulf it did remain    I' th'\
      \ midst o' th' body, idle and unactive,    Still cupboarding the viand, never bearing    Like labour with the rest;\
      \ where th' other instruments    Did see and hear, devise, instruct, walk, feel,\n      And, mutually participate, did\
      \ minister\n"
