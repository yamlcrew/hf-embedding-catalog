  sentences:
  - "me a thousand marks in links and torches, walking with thee in\n    the night betwixt tavern and tavern; but the sack\
    \ that thou hast    drunk me would have bought me lights as good cheap at the dearest    chandler's in Europe. I have\
    \ maintained that salamander of yours      with fire any time this two-and-thirty years. God reward me for    it!  Bard.\
    \ 'Sblood, I would my face were in your belly!  Fal. God-a-mercy! so should I be sure to be heart-burn'd.\n          \
    \                Enter Hostess.    How now, Dame Partlet the hen? Have you enquir'd yet who pick'd\n    my pocket?  Host.\
    \ Why, Sir John, what do you think, Sir John? Do you think I    keep thieves in my house? I have search'd, I have enquired,\
    \ so    has my husband, man by man, boy by boy, servant by servant. The    tithe of a hair was never lost in my house\
    \ before.  Fal. Ye lie, hostess. Bardolph was shav'd and lost many a hair, and    I'll be sworn my pocket was pick'd.\
    \ Go to, you are a woman, go!  Host. Who, I? No; I defy thee! God's light, I was never call'd so    in mine own house\
    \ before!  Fal. Go to, I know you well enough.  Host. No, Sir John; you do not know me, Sir John. I know you, Sir    John.\
    \ You owe me money, Sir John, and now you pick a quarrel to      beguile me of it. I bought you a dozen of shirts to your\
    \ back.  Fal. Dowlas, filthy dowlas! I have given them away to bakers'    wives; they have made bolters of them.  Host.\
    \ Now, as I am a true woman, holland of eight shillings an ell.    You owe money here besides, Sir John, for your diet\
    \ and    by-drinkings, and money lent you, four-and-twenty pound.  Fal. He had his part of it; let him pay.  Host. He?\
    \ Alas, he is poor; he hath nothing.  Fal. How? Poor? Look upon his face. What call you rich? Let them    coin his nose,\
    \ let them coin his cheeks. I'll not pay a denier.\n      What, will you make a younker of me? Shall I not take mine ease\n"
  - "EDWARD. I wonder how our princely father scap'd,\n    Or whether he be scap'd away or no    From Clifford's and Northumberland's\
    \ pursuit.    Had he been ta'en, we should have heard the news;    Had he been slain, we should have heard the news; \
    \   Or had he scap'd, methinks we should have heard    The happy tidings of his good escape.    How fares my brother?\
    \ Why is he so sad?  RICHARD. I cannot joy until I be resolv'd    Where our right valiant father is become.    I saw him\
    \ in the battle range about,    And watch'd him how he singled Clifford forth.    Methought he bore him in the thickest\
    \ troop    As doth a lion in a herd of neat;\n      Or as a bear, encompass'd round with dogs,\n    Who having pinch'd\
    \ a few and made them cry,    The rest stand all aloof and bark at him.      So far'd our father with his enemies;   \
    \ So fled his enemies my warlike father.    Methinks 'tis prize enough to be his son.    See how the morning opes her\
    \ golden gates    And takes her farewell of the glorious sun.    How well resembles it the prime of youth,    Trimm'd\
    \ like a younker prancing to his love!  EDWARD. Dazzle mine eyes, or do I see three suns?  RICHARD. Three glorious suns,\
    \ each one a perfect sun;    Not separated with the racking clouds,    But sever'd in a pale clear-shining sky.    See,\
    \ see! they join, embrace, and seem to kiss,    As if they vow'd some league inviolable.    Now are they but one lamp,\
    \ one light, one sun.    In this the heaven figures some event.  EDWARD. 'Tis wondrous strange, the like yet never heard\
    \ of.    I think it cites us, brother, to the field,    That we, the sons of brave Plantagenet,    Each one already blazing\
    \ by our meeds,    Should notwithstanding join our lights together      And overshine the earth, as this the world.  \
    \  Whate'er it bodes, henceforward will I bear    Upon my target three fair shining suns.  RICHARD. Nay, bear three daughters-\
    \ by your leave I speak it,    You love the breeder better than the male.\n"
  - "Forget that rarest treasure of your cheek,\n    Exposing it- but, O, the harder heart!    Alack, no remedy!- to the greedy\
    \ touch    Of common-kissing Titan, and forget    Your laboursome and dainty trims wherein    You made great Juno angry.\
    \  IMOGEN. Nay, be brief;    I see into thy end, and am almost    A man already.  PISANIO. First, make yourself but like\
    \ one.    Fore-thinking this, I have already fit-    'Tis in my cloak-bag- doublet, hat, hose, all    That answer to them.\
    \ Would you, in their serving,    And with what imitation you can borrow    From youth of such a season, fore noble Lucius\
    \    Present yourself, desire his service, tell him    Wherein you're happy- which will make him know    If that his head\
    \ have ear in music; doubtless    With joy he will embrace you; for he's honourable,      And, doubling that, most holy.\
    \ Your means abroad-    You have me, rich; and I will never fail    Beginning nor supplyment.  IMOGEN. Thou art all the\
    \ comfort    The gods will diet me with. Prithee away!    There's more to be consider'd; but we'll even    All that good\
    \ time will give us. This attempt    I am soldier to, and will abide it with    A prince's courage. Away, I prithee. \
    \ PISANIO. Well, madam, we must take a short farewell,    Lest, being miss'd, I be suspected of    Your carriage from\
    \ the court. My noble mistress,    Here is a box; I had it from the Queen.    What's in't is precious. If you are sick\
    \ at sea    Or stomach-qualm'd at land, a dram of this\n      Will drive away distemper. To some shade,\n    And fit you\
    \ to your manhood. May the gods    Direct you to the best!  IMOGEN. Amen. I thank thee.                   Exeunt severally\n"
- source_sentence: The excerpt showcases the emotional turmoil and sense of honor that drives Brutus to take his own life
