  sentences:
  - "Enter TRAVERS  NORTHUMBERLAND. Here comes my servant Travers, whom I sent\n    On Tuesday last to listen after news.\
    \  LORD BARDOLPH. My lord, I over-rode him on the way;    And he is furnish'd with no certainties    More than he haply\
    \ may retail from me.  NORTHUMBERLAND. Now, Travers, what good tidings comes with you?  TRAVERS. My lord, Sir John Umfrevile\
    \ turn'd me back    With joyful tidings; and, being better hors'd,    Out-rode me. After him came spurring hard    A gentleman,\
    \ almost forspent with speed,    That stopp'd by me to breathe his bloodied horse.    He ask'd the way to Chester; and\
    \ of him    I did demand what news from Shrewsbury.    He told me that rebellion had bad luck,    And that young Harry\
    \ Percy's spur was cold.      With that he gave his able horse the head    And, bending forward, struck his armed heels\n\
    \      Against the panting sides of his poor jade\n    Up to the rowel-head; and starting so,    He seem'd in running\
    \ to devour the way,    Staying no longer question.  NORTHUMBERLAND. Ha! Again:    Said he young Harry Percy's spur was\
    \ cold?    Of Hotspur, Coldspur? that rebellion    Had met ill luck?  LORD BARDOLPH. My lord, I'll tell you what:    If\
    \ my young lord your son have not the day,    Upon mine honour, for a silken point    I'll give my barony. Never talk\
    \ of it.  NORTHUMBERLAND. Why should that gentleman that rode by Travers    Give then such instances of loss?  LORD BARDOLPH.\
    \ Who- he?    He was some hilding fellow that had stol'n    The horse he rode on and, upon my life,    Spoke at a venture.\
    \ Look, here comes more news.  \n                        Enter Morton  NORTHUMBERLAND. Yea, this man's brow, like to a\
    \ title-leaf,\n"
  - "ANTONY. Yet they are not join'd. Where yond pine does stand\n    I shall discover all. I'll bring thee word    Straight\
    \ how 'tis like to go.                           Exit  SCARUS. Swallows have built    In Cleopatra's sails their nests.\
    \ The augurers    Say they know not, they cannot tell; look grimly,    And dare not speak their knowledge. Antony    Is\
    \ valiant and dejected; and by starts    His fretted fortunes give him hope and fear    Of what he has and has not.  \
    \                          [Alarum afar off, as at a sea-fight]\n                      Re-enter ANTONY  ANTONY. All is\
    \ lost!\n    This foul Egyptian hath betrayed me.    My fleet hath yielded to the foe, and yonder      They cast their\
    \ caps up and carouse together    Like friends long lost. Triple-turn'd whore! 'tis thou\n      Hast sold me to this novice;\
    \ and my heart\n    Makes only wars on thee. Bid them all fly;    For when I am reveng'd upon my charm,    I have done\
    \ all. Bid them all fly; begone.       Exit SCARUS    O sun, thy uprise shall I see no more!    Fortune and Antony part\
    \ here; even here    Do we shake hands. All come to this? The hearts    That spaniel'd me at heels, to whom I gave   \
    \ Their wishes, do discandy, melt their sweets    On blossoming Caesar; and this pine is bark'd    That overtopp'd them\
    \ all. Betray'd I am.    O this false soul of Egypt! this grave charm-    Whose eye beck'd forth my wars and call'd them\
    \ home,    Whose bosom was my crownet, my chief end-    Like a right gypsy hath at fast and loose    Beguil'd me to the\
    \ very heart of loss.    What, Eros, Eros!                        Enter CLEOPATRA\n    Ah, thou spell! Avaunt!\n"
  - "TALBOT. Saint George and victory! Fight, soldiers, fight.\n    The Regent hath with Talbot broke his word    And left\
    \ us to the rage of France his sword.    Where is John Talbot? Pause and take thy breath;    I gave thee life and rescu'd\
    \ thee from death.  JOHN. O, twice my father, twice am I thy son!    The life thou gav'st me first was lost and done \
    \   Till with thy warlike sword, despite of fate,    To my determin'd time thou gav'st new date.  TALBOT. When from the\
    \ Dauphin's crest thy sword struck    fire,    It warm'd thy father's heart with proud desire    Of bold-fac'd victory.\
    \ Then leaden age,    Quicken'd with youthful spleen and warlike rage,    Beat down Alencon, Orleans, Burgundy,      And\
    \ from the pride of Gallia rescued thee.    The ireful bastard Orleans, that drew blood    From thee, my boy, and had\
    \ the maidenhood    Of thy first fight, I soon encountered    And, interchanging blows, I quickly shed    Some of his\
    \ bastard blood; and in disgrace\n      Bespoke him thus: 'Contaminated, base,\n"
