widgetData:
- source_sentence: We cope with this pressure by having brains, and within our brains, decision-making centers that I've called
    here the "Actor."
  sentences:
  - Nós lidamos com esta pressão porque temos cérebro, e dentro do nosso cérebro, centros de tomada de decisão a que eu chamei
    aqui o "Ator".
  - Isto significa que o Crítico deve ter falado naquele animal, e que o Crítico deve estar contido entre os neurónios produtores
    de dopamina na esquerda, mas não nos neurónios produtores de dopamina na direita.
  - Na ressonância magnética e na espetroscopia de MR — a atividade do tumor está a vermelho —
- source_sentence: Once it's a closed system, you will have legal liability if you do not urge your CEO to get the maximum
    income from reducing and trading the carbon emissions that can be avoided.
  sentences:
  - (Risas) Espero que las conversaciones aquí en TED me ayuden a terminarla.
  - Una vez que es un sistema cerrado, tendrán responsabilidad legal si no exhortan a su ejecutivo en jefe a obtener el máximo
    ingreso de la reducción y comercialización de emisiones de carbono que pueden ser evitadas.
  - Pero también son muy efectivas en desviar nuestro camino.
- source_sentence: Whenever it comes up to the midpoint, it pauses, it carefully scans the odor interface as if it was sniffing
    out its environment, and then it turns around.
  sentences:
  - Tiene que decidir si dar la vuelta y quedarse en el mismo olor, o si cruzar la línea del medio y probar algo nuevo.
  - Ésta es una oportunidad.
  - Cada vez que llega al medio, se detiene analiza con cuidado la interfaz de olor, como si estuviera olfateando su entorno,
    y luego da la vuelta.
- source_sentence: You've seen the documentaries of sweatshops making garments all over the world, even in developed countries.
  sentences:
  - No llegaron muy lejos, obviamente.
  - Uds ya han visto documentales de los talleres de confección de prendas en todo el mundo, incluso en los países desarrollados.
  - Y los maestros también están frustrados.
- source_sentence: It's hands-on, it's in-your-face, it requires an active engagement, and it allows kids to apply all the
    core subject learning in real ways.
  sentences:
  - É prático, é presencial, isso requer uma participação ativa, e permite que as crianças apliquem todos os tópicos importantes
    de aprendizagem de forma real.
  - E no mundo do áudio que é quando o microfone fica muito perto da origem do som, e então ele entra nessa repetição auto-destrutiva
    que cria um som muito desagradável.
  - Vamos encarar a realidade, o contrato de uma grande marca multinacional para um fornecedor na Índia ou China tem um poder
    persuasivo muito maior do que as leis locais de trabalho, do que as regras ambientais locais, do que os padrões locais
    de Direitos Humanos.
