    ، بعد إخفاقين آخرين في الإطلاق في عامي 1971 و 1972 .'
  sentences:
  - 'query: في أي عام ألغى الهلال السوڤيتي برنامج الصواريخ N1 بعد فشلين لم يتم إطلاقهما؟'
  - 'query: إلى متى احتفظ الهلال السوفياتي بدور مهيمن؟'
  - 'query: إلى جانب نادي مقاطعة هامبشاير للكريكيت ، ما هو اسم دوري الكريكيت الآخر في واتفورد؟'
- source_sentence: 'passage: تم بناء جانتار المنطار واقعنا في كونوت بليس بواسطة مهراجا جاي سينغ الثالث ملك جايبور . يتكون
    من 13 أداة لعلم الفلك المعماري . كان الغرض الأساسي من المرصد هو تجميع الجداول الفلكية ، والتنبؤ بأوقات وحركات القمر والكواكب
    .'
  sentences:
  - 'query: ما هي الأمثلة على أول علم فلك قديم تم العثور عليه في نبتا بلايا؟'
  - 'query: ما هو اسم المرصد الذي بناه مهراجا جاي سينغ الثالث ملك جايبور في كونوت بليس؟'
  - 'query: من أين يحصل الرجال عادة على شعار النبالة؟'
- source_sentence: 'passage: مارس الصوماليون لقرون شكلا من أشكال الدستور العرفي يسمونه زير . زير هو نظام قانوني متعدد المناطق
    حيث لا يوجد وكيل احتكاري يحدد ما يجب أن يكون الدستور أو كيف يجب تفسيره .'
  sentences:
  - 'query: ما هي المادة التي تمنح الوزارات & quot ; الحق في أن تنظم على مسؤوليتها جميع شؤون مجتمعنا المحلي ضمن الحدود التي
    يحددها الدستور .'
  - 'query: في أي تاريخ ألقي خطاب كينيدي & quot ; رسالة خاصة حول الاحتياجات الوطنية الملحة & quot ; ؟'
  - 'query: ما هو نظام الدستور العرفي الصومالي؟'
- source_sentence: 'passage: هبطت طائرة شوارزنيجر الخاصة هبطت اضطراريا في مطار فان نويس في 19 يوليو 2009 ، بعد أن أبلغ الطيار
    عن دخان قادم من قمرة القيادة ، وفقا لبيان أصدره السكرتير الصحافي للحاكم . لم يصب أحد بأذى في الحادث .'
  sentences:
  - 'query: وماذا خططت وزارة الطيران لفشله؟'
  - 'query: في أي مطار أجبرت طائرة شوارزنيجر على الهبوط اضطراريا في عام 2009؟'
  - 'query: في أي صحيفة ذكر جون لوفتينج مضخة البيرة الخاصة به؟'
- source_sentence: 'passage: بعد التصوير في المكسيك ، وخلال فترة الاستراحة المقررة ، تم نقل كريج إلى نيويورك للخضوع لعملية
    جراحية بسيطة لإصلاح إصابة ركبته . . أفيد أن التصوير لم يتأثر وعاد للتصوير في استوديوهات باينوود كما هو مخطط في 22 أبريل
    .'
  sentences:
  - 'query: ما هو استوديو الفيلم الذي أعيد في مايو 2015؟'
  - 'query: أين ذهب كريج للتعامل مع إصابته؟'
  - 'query: في أي عام أغلقت شركة Sony مكاتبها في اندونيسيا؟'
