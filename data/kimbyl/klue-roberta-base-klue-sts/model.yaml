widgetData:
- source_sentence: 어떤 일이 있어도 약속을 연기하지 말거라.
  sentences:
  - 약속을 정하셨으면 뒤로 미루지 마세요.
  - 음식 여름에 남기지 말자고.
  - 그리고 주인에 대한 배려가 아주 좋았습니다.
- source_sentence: 태풍 진로방향은 서울이야? 부산이야?
  sentences:
  - 주말에 약속 잡을 거면 오전 말고 오후에 잡아.
  - 특히 침구류는 최고급 호텔 못지않게 편안함을 제공합니다.
  - 태풍이 어디로 향하고 있는지 알려줘. 서울과 부산 중에서.
- source_sentence: 보일러 끄지마
  sentences:
  - 그릇 씻을때 무조건 식기 세척기 쓰면 안된다.
  - 난방 보일러는 끄지 말고 냅둬
  - 주말 평일 중에 주로 언제 약속을 많이 잡아?
- source_sentence: 열대야에는 과음 안됩니다.
  sentences:
  - 바다에서 일기예보 무시하지마.
  - 공기 청정기 끄지말고 하루동안 지내자.
  - 넓은 테라스, 거실, 욕실의 청결함이 마음에 들었습니다.
- source_sentence: 교토와 도쿄 중 지진 위험이 더 큰 곳은 어디인가요?
  sentences:
  - 지진 위험은 교토가 더 큰가요? 아니면 도쿄가 더 큰가요?
  - 또한, 요양병원 및 기타 지역의 근로자에 대한 감염관리 교육 예산과 대상을 확대하고, 감염관리 기본규칙별 표준교육 동영상 배포 등 방역관련 교육을 강화하기로 했습니다.
  - 연간 강설량이 제일 많은 곳은 어디입니까?
