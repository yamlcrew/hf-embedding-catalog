config:
  architectures:
  - Qwen2VLForConditionalGeneration
  - GmeQwen2VL
  auto_map:
    AutoConfig: modeling_gme_qwen2vl.GmeQwen2VLConfig
    AutoModel: modeling_gme_qwen2vl.GmeQwen2VL
  model_type: qwen2_vl
  processor_config:
    chat_template: '{% set image_count = namespace(value=0) %}{% set video_count = namespace(value=0) %}{% for message in
      messages %}{% if loop.first and message[''role''] != ''system'' %}<|im_start|>system

      You are a helpful assistant.<|im_end|>

      {% endif %}<|im_start|>{{ message[''role''] }}

      {% if message[''content''] is string %}{{ message[''content''] }}<|im_end|>

      {% else %}{% for content in message[''content''] %}{% if content[''type''] == ''image'' or ''image'' in content or ''image_url''
      in content %}{% set image_count.value = image_count.value + 1 %}{% if add_vision_id %}Picture {{ image_count.value }}:
      {% endif %}<|vision_start|><|image_pad|><|vision_end|>{% elif content[''type''] == ''video'' or ''video'' in content
      %}{% set video_count.value = video_count.value + 1 %}{% if add_vision_id %}Video {{ video_count.value }}: {% endif %}<|vision_start|><|video_pad|><|vision_end|>{%
      elif ''text'' in content %}{{ content[''text''] }}{% endif %}{% endfor %}<|im_end|>

      {% endif %}{% endfor %}{% if add_generation_prompt %}<|im_start|>assistant

      {% endif %}'
  tokenizer_config:
    bos_token: null
    chat_template: '{% set image_count = namespace(value=0) %}{% set video_count = namespace(value=0) %}{% for message in
      messages %}{% if loop.first and message[''role''] != ''system'' %}<|im_start|>system

      You are a helpful assistant.<|im_end|>

      {% endif %}<|im_start|>{{ message[''role''] }}

      {% if message[''content''] is string %}{{ message[''content''] }}<|im_end|>

      {% else %}{% for content in message[''content''] %}{% if content[''type''] == ''image'' or ''image'' in content or ''image_url''
      in content %}{% set image_count.value = image_count.value + 1 %}{% if add_vision_id %}Picture {{ image_count.value }}:
      {% endif %}<|vision_start|><|image_pad|><|vision_end|>{% elif content[''type''] == ''video'' or ''video'' in content
      %}{% set video_count.value = video_count.value + 1 %}{% if add_vision_id %}Video {{ video_count.value }}: {% endif %}<|vision_start|><|video_pad|><|vision_end|>{%
      elif ''text'' in content %}{{ content[''text''] }}{% endif %}{% endfor %}<|im_end|>

      {% endif %}{% endfor %}{% if add_generation_prompt %}<|im_start|>assistant

      {% endif %}'
    eos_token: <|im_end|>
    pad_token: <|endoftext|>
    unk_token: null
