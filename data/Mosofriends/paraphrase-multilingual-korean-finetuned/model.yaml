- source_sentence: '서도 다른 미용실에서 근무를 하다 피고인이 새로 미용실을 오픈하자

    다시 와서 근무를 하기도 했습니다.

    - 고소인의 남자친구가 신문고에 올린 내용 중 일부(수사기록 제ㅌㅌ쪽 참조) -

    즉 고소인은 피고인과 수차례 합의 하에 성관계를 한 사이이며 그와같

    은 관계가 중단되었다하더라도 어느정도 친밀한 관계를 유지하고 있었

    던 관계라할 것입니다. 이에 당시 고소인을 데리러 왔던 남자친구가 고

    소인의 상태나 분위기가 뭔가 조금 이상하다고 생각하여 추궁을 하며

    혼자 있을 때 블랙박스 영상을 들었는데, 공교롭게도 녹음된 내용이 다

    소 두사람 사이의 관계에 대하여 오인 소지가 있는듯한 대화와 혀차는

    소리가 섞여있자 서로간에 합의 하에 뽀뽀를 한 것 아니냐 강압적인

    몰아가기를 하고 이에 고소인이 강제로 당한 것이라고 변명을 하였고

    이후에는 어쩔 수 없이 추행을 주장하고 있는 것이라 할 것입니다.

    3. 결론

    이상 본 바와같이 이 사건 블랙박스에서 들리는 소리는 뽀뽀 소리가 아닐'
  sentences:
  - '- 4 -

    은 사실에 대하여는 이를 인정하고 있습니다.

    - 고소인 증인신문녹취록 제0쪽 참조 -

    이처럼 피고인은 주점 술자리를 파하면서 고소인과 2차를 가는지 알고

    주점 밖에 나가 고소인을 기다리고 있었을 뿐 고소인이 자신에게 공포

    심을 갖고 있었는지, 고소인이 주점 사장에게 도움을 요청한 사실에 대

    하여 전혀 알지 못하였습니다.

    피고인은 고소인과 단지 주점에서 자리를 파하고 나가며 자리를 옮겨

    2차를 가자고 말을 하였을 뿐이고 고소인의 의사에 반하여 어떠한 언

    행을 할 의도는 전혀 없었습니다.

    즉 수사기관은 피고인이 추행의 의도를 갖고 옥상에 올라간 것처럼 보

    고 있지만 피고인은 당시 고소인이 주점에서 나오지 않아 기다리고 있

    었던 것이었습니다. 피고인은 기다리던 고소인이 계단에서 모습이 보이

