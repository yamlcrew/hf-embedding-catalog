    하였을 수는 있지만 후술하는 바와 같이 고소인의 진술은 피고인을 강

    제추행죄로 처벌할 만큼 신빙하기는 다소 부족하다할 것입니다.

    나. 먼저 본 사건은 마치 피고인이 고소인에게 험악한 말을 하거나 강제로

    뭔가 하려고 한 다급한 사정이 있었기에 고소인이 피고인을 피해 주점

    사장에게 도와달라 요청을 하고 옥상으로 피하기까지 한 것이 아닌가

