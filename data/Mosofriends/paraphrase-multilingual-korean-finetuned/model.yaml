      즉 고소인은 피고인과 수차례 합의 하에 성관계를 한 사이이며 그와같

      은 관계가 중단되었다하더라도 어느정도 친밀한 관계를 유지하고 있었

      던 관계라할 것입니다. 이에 당시 고소인을 데리러 왔던 남자친구가 고

      소인의 상태나 분위기가 뭔가 조금 이상하다고 생각하여 추궁을 하며

      혼자 있을 때 블랙박스 영상을 들었는데, 공교롭게도 녹음된 내용이 다

