    하지만 본 사건에 있어 위와같은 피해자의 진술은 후술하는 바와같이

    합리적 의심을 배제할 수 있을 정도로 피고인에 대한 유죄의 확실한

    증거로 보기에는 진술의 신빙성이 떨어진다 할 것이며, 그 밖에 다른

    증거는 오히려 피의사실과 모순되거나 유죄의 입증자료로 삼기에는 부

    족하다 할 것입니다.

    나. 피해자의 강간피해 주장은 이를 신빙하기 어렵다 할 것입니다 .

    (1) 먼저 본 공소사실에 대한 유죄의 직접적인 증거는 피해자의 진술이

    유일합니다. 그런데 피해자의 진술을 유죄의 근거로 삼기 위해서는 그 진

    술이 논리와 경험법칙에 기하여 증명이 필요한 사실과 양립할 수 없는

    사실의 개연성에 대한 합리적인 의문을 배제할 수 있어야 할 것이며(대법

    원 2017. 1. 25. 선고 2016도15526 판결) 진술의 신빙성이 있는지 여부를'
