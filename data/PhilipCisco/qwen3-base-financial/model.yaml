widgetData:
- source_sentence: What were the total assets at fair value on December 31, 2023?
  sentences:
  - In addition to its contractual cash requirements, the Company has an authorized share repurchase program. The program
    does not obligate the Company to acquire a minimum amount of shares. As of September 30, 2023, the Company’s quarterly
    cash dividend was $0.24 per share.
  - Effective January 1, 2023, we prospectively adopted new guidance that eliminated the recognition and measurement of TDRs.
    We evaluate all loans and receivables restructurings according to accounting guidance for loan refinancing and restructuring.
    Modifications to loans and receivables primarily include temporary interest rate reductions and placing the customer on
    a fixed payment plan not to exceed 60 months.
  - Total assets at fair value on December 31, 2023 were reported to be $71,921 million.
- source_sentence: What were the key factors affecting the company's cash flow from operations in fiscal 2023?
  sentences:
  - General and administrative | $ | 950 | | $ | 2,025 | 113 | % Percentage of revenue | 11 | % | 20 | % | General and administrative
    expense increased $1.1 billion, or 113%, in 2023, compared to 2022.
  - Within two months after submission of each annual execution proposal, the Macao government will decide on their approval,
    and may request adjustments to specific projects, to the investment amount and to the execution schedule.
  - The company's cash flow from operations in fiscal 2023 was affected by various factors including changes in working capital
    components like accounts payable, inventories, and accounts receivable.
- source_sentence: What percentage of the total U.S. dialysis patient service revenues were generated from government-based
    programs in 2023?
  sentences:
  - The document includes a 'Glossary of Terms and Acronyms' that provides definitions and explanations of financial terms
    used.
  - Profit before taxes for 2022 was $8,752 million and rose to $13,050 million in 2023.
  - In 2023, approximately 67% of the total U.S. dialysis patient service revenues were generated from government-based programs.
- source_sentence: What was the effective income tax rate for the Company in 2023?
  sentences:
  - Chevron's oil-equivalent production in the UK has increased by approximately 4 percent from 2022 to 2023, as indicated
    in the production summary tables.
  - The Company’s effective income tax rate decreased to 25.1% in 2023 compared to 25.9% in the prior year.
  - In 2023, 45% of our consolidated Gross Merchandise Sales was generated when a seller or buyer, or both, were located outside
    of the United States.
- source_sentence: Which section of the financial document addresses Financial Statements and Supplementary Data?
  sentences:
  - The gift card liability was $145,014 in 2022 and increased to $164,930 in 2023.
  - The 7% Notes due 2029 are scheduled to mature on February 15, 2029.
  - Financial Statements and Supplementary Data are addressed in Item 8 of the financial document.
