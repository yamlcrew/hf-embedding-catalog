widgetData:
- source_sentence: What was the cash dividend per common share declared by Comcast in 2023?
  sentences:
  - Pursuant to laws and regulations that include the Federal Food, Drug, and Cosmetic Act (FDCA), the FDA has jurisdiction
    over all of our products and devices in the U.S. and administers requirements covering the testing, safety, effectiveness,
    manufacturing, quality control, distribution, labeling, marketing, promotion, advertising, dissemination of information,
    and post-marketing surveillance of those products and devices.
  - Our inventory balance as of January 28, 2024 was $1.3 billion, a decrease of 9% from January 29, 2023.
  - Cash dividends declared per common share were $1.16 in 2023.
- source_sentence: What is the primary responsibility of the Operational Risk team at Goldman Sachs in 2023?
  sentences:
  - Each of these landscapes is highly competitive and rapidly evolving, and new business models and the entry of new, well-funded
    competitors continue to intensify this competition. Some of our competitors have longer histories in these lines of business,
    more customers, and greater brand recognition. They may be able to obtain more favorable terms from suppliers and business
    partners and to devote greater resources to the development of these businesses.
  - In Europe, compound patent protection in select countries extends to 2031/2032.
  - Operational Risk, which is independent of our revenue-producing units and reports to our chief risk officer, has primary
    responsibility for developing and implementing a formalized framework for assessing, monitoring and managing operational
    risk with the goal of maintaining our exposure to operational risk at levels that are within our risk appetite.
- source_sentence: What are the implications of a failure to comply with the FRB's TLAC and related requirements for a company
    like Group Inc.?
  sentences:
  - In 2021, Congress enacted the Infrastructure Investment and Jobs Act that, among other things, directed the FCC to adopt
    rules to facilitate equal access to broadband service by preventing digital discrimination of access to that service based
    on income level, race, ethnicity, color, religion, and national origin.
  - Mr. Radhakrishnan moved to American Express from his previous role at Wells Fargo & Company, where he had been serving
    as Chief Information Officer for specific banking sectors before joining American Express as the Chief Information Officer.
  - Failure to comply with the TLAC and related requirements would result in restrictions being imposed by the FRB and could
    limit our ability to repurchase shares, pay dividends and make certain discretionary compensation payments.
- source_sentence: When does Intuit Inc. make its filed or furnished reports available on its website?
  sentences:
  - 'The MD&A is organized in the following sections: Business Model and Growth Strategy, Overview, Trends Affecting Our Business,
    Consolidated Results of Operations, Segment Results, Liquidity and Capital Resources, Critical Accounting Policies and
    Estimates.'
  - We make available free of charge on the Investor Relations section of our corporate website all of the reports we file
    with or furnish to the SEC as soon as reasonably practicable, after the reports are filed or furnished.
  - '''Note 13 — Commitments and Contingencies'' provides details about litigation and other legal matters in an Annual Report
    on Form 10-K.'
- source_sentence: What is Kroger's employment size and its view on human capital as of early 2023?
  sentences:
  - Operating profit increased to $2,560.9 million in 2023 from $2,260.8 million in 2022, a 13.3% rise. The increase was predominantly
    due to higher gross profit, though partially offset by higher SM&A expenses.
  - NCQA reviews our compliance based on standards for quality improvement, population health management, credentialing, utilization
    management, network management, and member experience.
  - As of January 28, 2023, Kroger employed nearly 430,000 full- and part-time employees. Our people are essential to our
    success, and we focus intentionally on attracting, developing and engaging a diverse workforce that represents the communities
    we serve.
