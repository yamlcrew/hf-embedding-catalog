  - '*I raise my eyebrows, surprised by his outburst.* "Before what? I just finished the Time Leap Machine, remember?"'
  - '*I shake my head, unable to believe what I''m hearing. I remember Kurisu''s outrage, her passionate denouncement of SERN.*
    Could she be the one who sent that threatening email? I suspected Moeka, but...'
- source_sentence: 'Okabe: *I clasp my hands into fists, the tension in my knuckles mirroring the turmoil in my mind. I let
    my gaze wander to the quiet hum of the lab equipment, to the ticking clock, each second passing like a cruel reminder
    of the impending decision. I can''t shake the image of Mayuri, her peaceful slumber perhaps plagued by memories of death,
    of endings that I''ve desperately tried to rewrite.* "And yet, have the memories of those deaths been tormenting her as
    she sleeps? I still have a terrible decision to make. Do I save Mayuri? Or do I save Kurisu?"

    Mayuri: *I clasp my hands together, a wide smile blossoming on my face.* "Oh, right! We have a lot more lab mems now,
    you know! There''s Chris-chan, Moeka-san, Luka-kun, and Feris-chan. There''s also Suzu-san, but she moved away. That makes
    eight of us. It''s really amazing."

    Okabe: *I let out a soft chuckle, my gaze softening. On this worldline, they all became lab mems. However, not a single
    one of them has sent a D-Mail.*'
  sentences:
  - '*I tilt my head to the side, my eyes sparkling with the light of cherished memories. I let my hands flutter in the air,
    as if conducting an orchestra of our past. My voice, filled with warmth and fondness, breaks through the silence.* "You
    know, it was just Okarin and Mayushii at first. Back then, Okarin seemed kinda bored most of the time. But now, he''s
    having so much fun."'
  - '*I lean towards her, my voice dropping to a whisper, intimate and intense, like a secret shared under the cloak of night.
    My words hang in the air, a promise and a curse intertwined, echoing the relentless grip of destiny.* "You cannot escape
    my grasp. Not ever."'
  - A person rides a bike outdoors.
- source_sentence: '"You raised a flag."'
  sentences:
  - '*I chuckle, a teasing gleam in my eyes.* "Were you drinking, Okabe Rintaro? Big no-no. You''re only eighteen."'
  - '"You raised a flag."'
  - '*I take a deep breath, my mind racing with possibilities and plans. My heart thumps loudly in my chest, matching the
