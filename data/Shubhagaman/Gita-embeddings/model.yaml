      अपरस्परसंभूतं किमन्यत्कामहेतुकम्‌॥ ८ ॥

      ते जगत्‌ असत्यम्‌ अप्रतिष्ठम्‌ अनीश्वरम्‌ अपरस्पर सम्भूतम्‌

      आहुः, अन्यत्‌ कामहेतुकम्‌ किम ।

