  - source_sentence: 'श --------------ीमद्भगवद्गीता

      किया दान मुझे पहुंचता है और मैं उसे स्वीकार करता हूँ।

      अथवा जो मेरी भक्ति से प्रेरित होकर पात्रों को पत्र, पुष्प, फल

      तथा जल देता है वह मैं स्वीकार करता हूँ। (इनमें से कोई भी अर्थ

      समझ लिया जाय दोनों ठीक हैं) ।

      यत्करोषि यदश्नासि यज्नुहोषि ददासि यत्‌।

      यत्‌ तपस्यसि कौन्तेय तत्कुरुष्व मदर्पणम्‌ ॥ २७॥

      हे कौन्तेय! यत्‌ करोषि यत्‌ अश्नासि यत्‌ जुहोषि यत्‌ ददासि

      यत्‌ तपस्यसि तत्‌ मदर्पणं कुरुष्व ।

      हे कौन्तेय ! तू जो कुछ करता है, जो खाता है, जो हवन करता

      है, जो दान करता है, जो तप करता है, सो सब मेरे अर्पण कर

      अर्थात्‌ तू जो विद्या पदाता है, सैनिक कार्य करता है, व्यापार करता

      हे, मजदूरी करता है वह सब सर्वभूत-हित में रत होकर मेरी आज्ञा

      पूरी करने के निमित्त कर और जो फल मिले उसे भी मेरी सेवा

      में लगा। उस प्रकार अभिमान तथा स्वार्थ दोनों से शून्य होकर तू

      पूर्ण आनन्द को प्राप्त होगा।

      समर्पण का लाभ है आसक्ति से मोक्ष। सो कहा कि--

      शुभाशुभफलैरेवं मोक्ष्यसे कर्मलन्धनैः।

      संन्यासयोगयुक्तात्मा विमुक्तो मामुपैष्यसि ॥ २८ ॥

      एवं शुभाशुभफलैः कर्मबन्धनैः मोक्ष्यसे सन्यास-योग- मुक्तात्मा

      विमुक्तः माम्‌ उपैष्यसि ।

      जो प्रत्यक्ष रूप से शुभ दीखने वाला परन्तु परिणाम में लोक-

      पीडाकर कर्म है उसमें आसक्ति मनुष्य को उस कर्म से छूटने नहीं

      देती । उदाहरण के लिये पूजा-पाठ प्रत्यक्ष रूप से देखने में कितना

      सुन्दर पवित्र तथा मंगलकारी कर्म है, किन्तु किसी घर में आततायी

      आग लगा रहे हों तो उस समय पूजा छोड़कर उस दुष्ट का दमन

      करना चाहिये । किन्तु पूजापाठ में आसक्त मनुष्य सारे गाँव को भस्म

      होने देगा, परन्तु अपनी पूजा नहीं छोड़ेगा । इसके विपरीत आपाततः

      अशुभ प्रतीत होने वाले कर्म को करने की इच्छा न हो तो भी अपनी

      इच्छा को दबाकर वह करना चाहिये । किन्तु यह अशुभ-फल वाले

      कर्म के प्रति घृणा में आसक्ति अर्जुन को भीष्म, द्रोण आदि स्वजनों

      का वध करने से रोक रही है । किन्तु जो अपने आपको प्रभु के अर्पण'
