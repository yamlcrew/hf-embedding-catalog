widgetData:
- source_sentence: Mestom Trenčín prechádzajú 2 železničné trate- Trať 120 Bratislava- Žilina a Trať 143 Trenčín- Chynorany.
    V súčasnosti sa pracuje na modernizácii železničného prieťahu mestom, v roku 2017 bol odovzdaný do užívania nový železničný
    most, postavená je nová letná plaváreň, keďže stará ustúpila novému mostu. Pre obyvateľov asanovaných domov vystavalo
    mesto náhradné domy na novovzniknutých uliciach Slivková a Šafránová. Pripravený je tiež projekt rekonštrukcie železničnej
    stanice Trenčín, ktorá bude realizovaná spolu s rekonštrukciou autobusovej stanice, čím vznikne moderný autobusový terminál
    s priamym napojením na ŽST.
  sentences:
  - V ktorom roku bola založená organizácia Gidonim ?
  - Koľko železničných tratí prechádza cez mesto Trenčín ?
  - Koľko rímskych vojakov bojovalo v Trenčíne proti Kvádom ?
- source_sentence: Ikonostas pozostáva zo štyroch radov a tvorí ho 102 ikon. Rám ikonostasu pochádza približne z druhej polovice
    18. – začiatku 19. storočia. Ikony sa delia na tri skupiny podľa obdobia ich vzniku a štylistických príznakov. Dve najstaršie
    ikony (Premenenie Pána a Panna Mária Ochrankyňa) pochádzajú z konca 17. storočia a sú typické pre ikonopisectvo severných
    oblastí. Veľkú časť spodného radu ikonostasu tvorí druhá skupina ikon, ktoré vznikli v druhej polovici 18. storočia. Ikony
    umiestnené v troch vrchných radoch predstavujú tretiu skupinu. Datujú sa do prvej tretiny 18. storočia.
  sentences:
  - Z akého ostrova pochádzajú dve najstaršie ikony Kiži ?
  - Z akého storočia pochádzajú dve najstaršie ikony Kiži ?
  - Aký trest dostal Jan Antonín - Baťa ?
- source_sentence: 'Začiatok 19.storočia bol poznačený tzv. gerilskými vojnami (špan.guerilla), v ktorých sa obyvatelia spojili
    s okolitými mestami cádizskej provincie a odolávali francúzskym okupačným vojskám, ktoré obsadili polostrov. Konfiškácia
    pôdy sa u ľudí taktiež veľmi neosvedčila. Roľníci sa preto snažili vymaniť spod nepriaznivej ekonomickej situácie a pridávali
    sa k sociálnym hnutiam, ktoré sa v tom čase začali po provincii šíriť.

    V súčasnosti sa Setenil, po prekonaní emigračných problémov z druhej polovice 20. storočia, aj naďalej rozvíja v tradičných
    hodnotách. Ťaží najmä z poľnohospodárstva a turizmu. Vyznačuje sa výnimočnou architektúrou, impozantným okolím a jedinečnými
    sviatkami, čo z neho robí jedno z najatraktívnejších miest provincie Cádiz.'
  sentences:
  - Čo dokazujú predmety nájdené v jaskyniach neďaleko obce Setenil de las bodegas ?
  - Čím sa vyznačuje španielska obec Setenil de las bodegas ?
  - Ako odovzdávajú prvé kolo matematickej olympiády žiaci SŠ ?
- source_sentence: V rokoch 1926-1928 vzrástol export obuvi a firma Baťa ovládala viac ako polovicu československého vývozu.
    Vo firme došlo k zavedeniu pásovej výroby, ktorá bola používaná v závodoch Henryho Forda. Produktivita práce vzrástla
    o 75% a počet zamestnancov o 35%, čistý obrat firmy predstavoval 1,9 miliardy predvojnových korún. Koncom roku 1928 tvorila
    továreň komplex 30 budov, koncern sa ďalej rozrastal a Baťa podnikal v ďalších sférach hospodárstva (gumárenský, chemický,
    textilný, drevársky priemysel a mnohé ďalšie). Baťa v roku 1931 vyrábal v Zlíne, Otrokoviciach, Třebíči, Bošanoch a Nových
    Zámkoch. V roku 1931 sa rodinný podnik zmenil na akciovú spoločnosť so základným imaním 135 mil. korún. Už dlho predtým
    vznikali dcérske spoločnosti po celom svete, k tomu pribúdali továrne v Nemecku, Anglicku, Holandsku, Poľsku a mnohých
    ďalších krajinách. Vytvoril celý rad výchovných aj vzdelávacích organizácií (Baťova škola práce), v Zlíne vzniklo vlastné
    filmové štúdio, ktoré sa zaoberalo natáčaním reklám na obuvnícke výrobky. Neskôr sa zo štúdia stali známe Filmové ateliéry
    Kudlov.
  sentences:
  - V ktorých rokoch zastával slovenský matematik Ladislav Fodor funkciu rektora ?
  - Kam letel Tomáš Baťa v čase svojej nehody ?
  - V akom ďalšom priemysle podnikal neskôr Baťa ?
- source_sentence: Prvý most cez Zlatý roh nechal vybudovať cisár Justinián I. V roku 1502 vypísal sultán Bajazid II. súťaž
    na stavbu nového mosta, do ktorej sa prihlásili aj Leonardo da Vinci a Michelangelo Buonarroti, ale z realizácie návrhov
    nakoniec zišlo. V roku 1863 vznikol druhý, drevený most, ktorý v roku 1875 nahradil železný most, postavený francúzskymi
    staviteľmi. Štvrtý most postavili Nemci v roku 1912 a slúžil až do roku 1992, kedy bol zničený požiarom. Bolo rozhodnuté
    o stavbe mosta súčasného, ktorý vybudovala domáca firma STFA Group.
  sentences:
  - V ktorom roku vznikol druhý drevený most cez záliv Zlatý roh ?
  - Kde sa Alexios spolu s dvomi staršími bratmi zamestnal po abdikácii Izáka I. a smrti svojho otca ?
  - Aká je priemerná dĺžka života v Eritrei ?
