widgetData:
- source_sentence: Mergers and acquisitions, joint ventures and strategic investments complement our internal development
    and enhance our partnerships to align with Visa’s priorities.
  sentences:
  - How much did the unbilled accounts receivable amount to as of December 30, 2023?
  - What was the main reason for Visa to engage in mergers and acquisitions, joint ventures, and strategic investments?
  - What is the mission of Intuit?
- source_sentence: Garmin’s audio brands, Fusion and JL Audio, offer premium audio products and accessories, including head
    units, speakers, amplifiers, subwoofers, and other audio components. These products are designed specifically for the
    marine, powersports, aftermarket automotive, home, or RV environments, offering premium sound quality and supporting many
    connectivity options for integrating with MFDs, smartphones, and Garmin wearables.
  sentences:
  - What type of insurance policies cover some of the defense and settlement costs associated with litigation mentioned?
  - What types of audio products does Garmin's Fusion and JL Audio brands offer?
  - What should investors consider when comparing Adjusted EBITDA across different companies?
- source_sentence: Medical device products that are marketed in the European Union must comply with the requirements of the
    Medical Device Regulation (the MDR), which came into effect in May 2021. The MDR provides for regulatory oversight with
    respect to the design, manufacture, clinical trials, labeling and adverse event reporting for medical devices.
  sentences:
  - What are the requirements for medical devices to be marketed in the European Union under the MDR?
  - By what percentage did the pre-tax earnings increase from 2021 to 2022 in the manufacturing sector?
  - What were the cash and cash equivalents at the end of 2023?
- source_sentence: In March 2023, the Board of Directors sanctioned a restructuring plan concentrated on investment prioritization
    towards significant growth prospects and the optimization of the company's real estate assets. This includes substantial
    organizational changes such as reductions in office space and workforce.
  sentences:
  - How many physicians are part of the domestic Office of the Chief Medical Officer at DaVita as of December 31, 2023?
  - What changes in expenses did Delta Air Lines' ancillary businesses and refinery segment encounter in 2023 compared to
    2022?
  - What are the restructuring targets of the company's Board of Directors as of 2023?
- source_sentence: The quality of GM dealerships and our relationship with our dealers are critical to our success, now, and
    as we transition to our all-electric future, given that they maintain the primary sales and service interface with the
    end consumer of our products. In addition to the terms of our contracts with our dealers, we are regulated by various
    country and state franchise laws and regulations that may supersede those contractual terms and impose specific regulatory
  sentences:
  - How does General[39 chars] Motors ensure quality in their dealership network?
  - How can the public access the company's financial and legal reports?
  - Is the outcome of the investigation into Tesla's waste segregation practices currently determinable?
