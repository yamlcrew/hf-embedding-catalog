    - "class BaggingClassifier(ClassifierMixin, BaseBagging):\n    \"\"\"A Bagging classifier.\n\n    A Bagging classifier\
      \ is an ensemble meta-estimator that fits base\n    classifiers each on random subsets of the original dataset and then\n\
      \    aggregate their individual predictions (either by voting or by averaging)\n    to form a final prediction. Such\
      \ a meta-estimator can typically be used as\n    a way to reduce the variance of a black-box estimator (e.g., a decision\n\
      \    tree), by introducing randomization into its construction procedure and\n    then making an ensemble out of it.\n\
      \n    This algorithm encompasses several works from the literature. When random\n    subsets of the dataset are drawn\
      \ as random subsets of the samples, then\n    this algorithm is known as Pasting [1]_. If samples are drawn with\n \
      \   replacement, then the method is known as Bagging [2]_. When random subsets\n    of the dataset are drawn as random\
      \ subsets of the features, then the method\n    is known as Random Subspaces [3]_. Finally, when base estimators are\
      \ built\n    on subsets of both samples and features, then the method is known as\n    Random Patches [4]_.\n\n    Read\
      \ more in the :ref:`User Guide <bagging>`.\n\n    .. versionadded:: 0.15\n\n    Parameters\n    ----------\n    estimator\
      \ : object, default=None\n        The base estimator to fit on random subsets of the dataset.\n        If None, then\
      \ the base estimator is a\n        :class:`~sklearn.tree.DecisionTreeClassifier`.\n\n        .. versionadded:: 1.2\n\
      \           `base_estimator` was renamed to `estimator`.\n\n    n_estimators : int, default=10\n        The number of\
      \ base estimators in the ensemble.\n\n    max_samples : int or float, default=1.0\n        The number of samples to\
      \ draw from X to train each base estimator (with\n        replacement by default, see `bootstrap` for more details).\n\
      \n        - If int, then draw `max_samples` samples.\n        - If float, then draw `max_samples * X.shape[0]` samples.\n\
      \n    max_features : int or float, default=1.0\n        The number of features to draw from X to train each base estimator\
      \ (\n        without replacement by default, see `bootstrap_features` for more\n        details).\n\n        - If int,\
      \ then draw `max_features` features.\n        - If float, then draw `max(1, int(max_features * n_features_in_))` features.\n\
      \n    bootstrap : bool, default=True\n        Whether samples are drawn with replacement. If False, sampling\n     \
      \   without replacement is performed.\n\n    bootstrap_features : bool, default=False\n        Whether features are\
      \ drawn with replacement.\n\n    oob_score : bool, default=False\n        Whether to use out-of-bag samples to estimate\n\
      \        the generalization error. Only available if bootstrap=True.\n\n    warm_start : bool, default=False\n     \
      \   When set to True, reuse the solution of the previous call to fit\n        and add more estimators to the ensemble,\
      \ otherwise, just fit\n        a whole new ensemble. See :term:`the Glossary <warm_start>`.\n\n        .. versionadded::\
      \ 0.17\n           *warm_start* constructor parameter.\n\n    n_jobs : int, default=None\n        The number of jobs\
      \ to run in parallel for both :meth:`fit` and\n        :meth:`predict`. ``None`` means 1 unless in a\n        :obj:`joblib.parallel_backend`\
      \ context. ``-1`` means using all\n        processors. See :term:`Glossary <n_jobs>` for more details.\n\n    random_state\
      \ : int, RandomState instance or None, default=None\n        Controls the random resampling of the original dataset\n\
      \        (sample wise and feature wise).\n        If the base estimator accepts a `random_state` attribute, a different\n\
      \        seed is generated for each instance in the ensemble.\n        Pass an int for reproducible output across multiple\
      \ function calls.\n        See :term:`Glossary <random_state>`.\n\n    verbose : int, default=0\n        Controls the\
      \ verbosity when fitting and predicting.\n\n    Attributes\n    ----------\n    estimator_ : estimator\n        The\
      \ base estimator from which the ensemble is grown.\n\n        .. versionadded:: 1.2\n           `base_estimator_` was\
      \ renamed to `estimator_`.\n\n    n_features_in_ : int\n        Number of features seen during :term:`fit`.\n\n    \
      \    .. versionadded:: 0.24\n\n    feature_names_in_ : ndarray of shape (`n_features_in_`,)\n        Names of features\
      \ seen during :term:`fit`. Defined only when `X`\n        has feature names that are all strings.\n\n        .. versionadded::\
      \ 1.0\n\n    estimators_ : list of estimators\n        The collection of fitted base estimators.\n\n    estimators_samples_\
      \ : list of arrays\n        The subset of drawn samples (i.e., the in-bag samples) for each base\n        estimator.\
      \ Each subset is defined by an array of the indices selected.\n\n    estimators_features_ : list of arrays\n       \
      \ The subset of drawn features for each base estimator.\n\n    classes_ : ndarray of shape (n_classes,)\n        The\
      \ classes labels.\n\n    n_classes_ : int or list\n        The number of classes.\n\n    oob_score_ : float\n      \
      \  Score of the training dataset obtained using an out-of-bag estimate.\n        This attribute exists only when ``oob_score``\
      \ is True.\n\n    oob_decision_function_ : ndarray of shape (n_samples, n_classes)\n        Decision function computed\
      \ with out-of-bag estimate on the training\n        set. If n_estimators is small it might be possible that a data point\n\
      \        was never left out during the bootstrap. In this case,\n        `oob_decision_function_` might contain NaN.\
      \ This attribute exists\n        only when ``oob_score`` is True.\n\n    See Also\n    --------\n    BaggingRegressor\
      \ : A Bagging regressor.\n\n    References\n    ----------\n\n    .. [1] L. Breiman, \"Pasting small votes for classification\
      \ in large\n           databases and on-line\", Machine Learning, 36(1), 85-103, 1999.\n\n    .. [2] L. Breiman, \"\
      Bagging predictors\", Machine Learning, 24(2), 123-140,\n           1996.\n\n    .. [3] T. Ho, \"The random subspace\
      \ method for constructing decision\n           forests\", Pattern Analysis and Machine Intelligence, 20(8), 832-844,\n\
      \           1998.\n\n    .. [4] G. Louppe and P. Geurts, \"Ensembles on Random Patches\", Machine\n           Learning\
      \ and Knowledge Discovery in Databases, 346-361, 2012.\n\n    Examples\n    --------\n    >>> from sklearn.svm import\
      \ SVC\n    >>> from sklearn.ensemble import BaggingClassifier\n    >>> from sklearn.datasets import make_classification\n\
      \    >>> X, y = make_classification(n_samples=100, n_features=4,\n    ...                            n_informative=2,\
      \ n_redundant=0,\n    ...                            random_state=0, shuffle=False)\n    >>> clf = BaggingClassifier(estimator=SVC(),\n\
      \    ...                         n_estimators=10, random_state=0).fit(X, y)\n    >>> clf.predict([[0, 0, 0, 0]])\n \
      \   array([1])\n    \"\"\"\n\n    def __init__(\n        self,\n        estimator=None,\n        n_estimators=10,\n\
      \        *,\n        max_samples=1.0,\n        max_features=1.0,\n        bootstrap=True,\n        bootstrap_features=False,\n\
      \        oob_score=False,\n        warm_start=False,\n        n_jobs=None,\n        random_state=None,\n        verbose=0,\n\
      \    ):\n        super().__init__(\n            estimator=estimator,\n            n_estimators=n_estimators,\n     \
      \       max_samples=max_samples,\n            max_features=max_features,\n            bootstrap=bootstrap,\n       \
      \     bootstrap_features=bootstrap_features,\n            oob_score=oob_score,\n            warm_start=warm_start,\n\
      \            n_jobs=n_jobs,\n            random_state=random_state,\n            verbose=verbose,\n        )\n\n   \
      \ def _get_estimator(self):\n        \"\"\"Resolve which estimator to return (default is DecisionTreeClassifier)\"\"\
      \"\n        if self.estimator is None:\n            return DecisionTreeClassifier()\n        return self.estimator\n\
      \n    def _set_oob_score(self, X, y):\n        n_samples = y.shape[0]\n        n_classes_ = self.n_classes_\n\n    \
      \    predictions = np.zeros((n_samples, n_classes_))\n\n        for estimator, samples, features in zip(\n         \
      \   self.estimators_, self.estimators_samples_, self.estimators_features_\n        ):\n            # Create mask for\
      \ OOB samples\n            mask = ~indices_to_mask(samples, n_samples)\n\n            if hasattr(estimator, \"predict_proba\"\
      ):\n                predictions[mask, :] += estimator.predict_proba(\n                    (X[mask, :])[:, features]\n\
      \                )\n\n            else:\n                p = estimator.predict((X[mask, :])[:, features])\n        \
      \        j = 0\n\n                for i in range(n_samples):\n                    if mask[i]:\n                    \
      \    predictions[i, p[j]] += 1\n                        j += 1\n\n        if (predictions.sum(axis=1) == 0).any():\n\
      \            warn(\n                \"Some inputs do not have OOB scores. \"\n                \"This probably means\
      \ too few estimators were used \"\n                \"to compute any reliable oob estimates.\"\n            )\n\n   \
      \     oob_decision_function = predictions / predictions.sum(axis=1)[:, np.newaxis]\n        oob_score = accuracy_score(y,\
      \ np.argmax(predictions, axis=1))\n\n        self.oob_decision_function_ = oob_decision_function\n        self.oob_score_\
      \ = oob_score\n\n    def _validate_y(self, y):\n        y = column_or_1d(y, warn=True)\n        check_classification_targets(y)\n\
      \        self.classes_, y = np.unique(y, return_inverse=True)\n        self.n_classes_ = len(self.classes_)\n\n    \
      \    return y\n\n    def predict(self, X, **params):\n        \"\"\"Predict class for X.\n\n        The predicted class\
      \ of an input sample is computed as the class with\n        the highest mean predicted probability. If base estimators\
      \ do not\n        implement a ``predict_proba`` method, then it resorts to voting.\n\n        Parameters\n        ----------\n\
      \        X : {array-like, sparse matrix} of shape (n_samples, n_features)\n            The training input samples. Sparse\
      \ matrices are accepted only if\n            they are supported by the base estimator.\n\n        **params : dict\n\
      \            Parameters routed to the `predict_proba` (if available) or the `predict`\n            method (otherwise)\
      \ of the sub-estimators via the metadata routing API.\n\n            .. versionadded:: 1.7\n\n                Only available\
      \ if\n                `sklearn.set_config(enable_metadata_routing=True)` is set. See\n                :ref:`Metadata\
      \ Routing User Guide <metadata_routing>` for more\n                details.\n\n        Returns\n        -------\n  \
      \      y : ndarray of shape (n_samples,)\n            The predicted classes.\n        \"\"\"\n        _raise_for_params(params,\
      \ self, \"predict\")\n\n        predicted_probabilitiy = self.predict_proba(X, **params)\n        return self.classes_.take((np.argmax(predicted_probabilitiy,\
      \ axis=1)), axis=0)\n\n    def predict_proba(self, X, **params):\n        \"\"\"Predict class probabilities for X.\n\
      \n        The predicted class probabilities of an input sample is computed as\n        the mean predicted class probabilities\
      \ of the base estimators in the\n        ensemble. If base estimators do not implement a ``predict_proba``\n       \
      \ method, then it resorts to voting and the predicted class probabilities\n        of an input sample represents the\
      \ proportion of estimators predicting\n        each class.\n\n        Parameters\n        ----------\n        X : {array-like,\
      \ sparse matrix} of shape (n_samples, n_features)\n            The training input samples. Sparse matrices are accepted\
      \ only if\n            they are supported by the base estimator.\n\n        **params : dict\n            Parameters\
      \ routed to the `predict_proba` (if available) or the `predict`\n            method (otherwise) of the sub-estimators\
      \ via the metadata routing API.\n\n            .. versionadded:: 1.7\n\n                Only available if\n        \
