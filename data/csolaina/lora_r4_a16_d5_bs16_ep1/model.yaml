    - "class SelectFdr(_BaseFilter):\n    \"\"\"Filter: Select the p-values for an estimated false discovery rate.\n\n   \
      \ This uses the Benjamini-Hochberg procedure. ``alpha`` is an upper bound\n    on the expected false discovery rate.\n\
      \n    Read more in the :ref:`User Guide <univariate_feature_selection>`.\n\n    Parameters\n    ----------\n    score_func\
      \ : callable, default=f_classif\n        Function taking two arrays X and y, and returning a pair of arrays\n      \
      \  (scores, pvalues).\n        Default is f_classif (see below \"See Also\"). The default function only\n        works\
      \ with classification tasks.\n\n    alpha : float, default=5e-2\n        The highest uncorrected p-value for features\
      \ to keep.\n\n    Attributes\n    ----------\n    scores_ : array-like of shape (n_features,)\n        Scores of features.\n\
      \n    pvalues_ : array-like of shape (n_features,)\n        p-values of feature scores.\n\n    n_features_in_ : int\n\
      \        Number of features seen during :term:`fit`.\n\n        .. versionadded:: 0.24\n\n    feature_names_in_ : ndarray\
      \ of shape (`n_features_in_`,)\n        Names of features seen during :term:`fit`. Defined only when `X`\n        has\
      \ feature names that are all strings.\n\n        .. versionadded:: 1.0\n\n    See Also\n    --------\n    f_classif\
      \ : ANOVA F-value between label/feature for classification tasks.\n    mutual_info_classif : Mutual information for\
      \ a discrete target.\n    chi2 : Chi-squared stats of non-negative features for classification tasks.\n    f_regression\
      \ : F-value between label/feature for regression tasks.\n    mutual_info_regression : Mutual information for a continuous\
      \ target.\n    SelectPercentile : Select features based on percentile of the highest\n        scores.\n    SelectKBest\
      \ : Select features based on the k highest scores.\n    SelectFpr : Select features based on a false positive rate test.\n\
      \    SelectFwe : Select features based on family-wise error rate.\n    GenericUnivariateSelect : Univariate feature\
      \ selector with configurable\n        mode.\n\n    References\n    ----------\n    https://en.wikipedia.org/wiki/False_discovery_rate\n\
      \n    Examples\n    --------\n    >>> from sklearn.datasets import load_breast_cancer\n    >>> from sklearn.feature_selection\
      \ import SelectFdr, chi2\n    >>> X, y = load_breast_cancer(return_X_y=True)\n    >>> X.shape\n    (569, 30)\n    >>>\
      \ X_new = SelectFdr(chi2, alpha=0.01).fit_transform(X, y)\n    >>> X_new.shape\n    (569, 16)\n    \"\"\"\n\n    _parameter_constraints:\
      \ dict = {\n        **_BaseFilter._parameter_constraints,\n        \"alpha\": [Interval(Real, 0, 1, closed=\"both\"\
      )],\n    }\n\n    def __init__(self, score_func=f_classif, *, alpha=5e-2):\n        super().__init__(score_func=score_func)\n\
      \        self.alpha = alpha\n\n    def _get_support_mask(self):\n        check_is_fitted(self)\n\n        n_features\
      \ = len(self.pvalues_)\n        sv = np.sort(self.pvalues_)\n        selected = sv[\n            sv <= float(self.alpha)\
      \ / n_features * np.arange(1, n_features + 1)\n        ]\n        if selected.size == 0:\n            return np.zeros_like(self.pvalues_,\
      \ dtype=bool)\n        return self.pvalues_ <= selected.max()"
