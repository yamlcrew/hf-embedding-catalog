    \      else:\n            routed_params = Bunch()\n            routed_params.estimator = Bunch(decision_function=Bunch())\n\
    \n        # Parallel loop\n        n_jobs, _, starts = _partition_estimators(self.n_estimators, self.n_jobs)\n\n     \
