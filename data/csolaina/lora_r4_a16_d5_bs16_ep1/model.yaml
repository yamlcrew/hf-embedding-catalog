  - "    def _compute_score_samples(self, X, subsample_features):\n        \"\"\"\n        Compute the score of each samples\
    \ in X going through the extra trees.\n\n        Parameters\n        ----------\n        X : array-like or sparse matrix\n\
    \            Data matrix.\n\n        subsample_features : bool\n            Whether features should be subsampled.\n\n\
    \        Returns\n        -------\n        scores : ndarray of shape (n_samples,)\n            The score of each sample\
    \ in X.\n        \"\"\"\n        n_samples = X.shape[0]\n\n        depths = np.zeros(n_samples, order=\"f\")\n\n     \
    \   average_path_length_max_samples = _average_path_length([self._max_samples])\n\n        # Note: we use default n_jobs\
    \ value, i.e. sequential computation, which\n        # we expect to be more performant that parallelizing for small number\n\
    \        # of samples, e.g. < 1k samples. Default n_jobs value can be overridden\n        # by using joblib.parallel_backend\
    \ context manager around\n        # ._compute_score_samples. Using a higher n_jobs may speed up the\n        # computation\
    \ of the scores, e.g. for > 1k samples. See\n        # https://github.com/scikit-learn/scikit-learn/pull/28622 for more\n\
    \        # details.\n        lock = threading.Lock()\n        Parallel(\n            verbose=self.verbose,\n         \
    \   require=\"sharedmem\",\n        )(\n            delayed(_parallel_compute_tree_depths)(\n                tree,\n \
    \               X,\n                features if subsample_features else None,\n                self._decision_path_lengths[tree_idx],\n\
    \                self._average_path_length_per_tree[tree_idx],\n                depths,\n                lock,\n     \
    \       )\n            for tree_idx, (tree, features) in enumerate(\n                zip(self.estimators_, self.estimators_features_)\n\
    \            )\n        )\n\n        denominator = len(self.estimators_) * average_path_length_max_samples\n        scores\
    \ = 2 ** (\n            # For a single training sample, denominator and depth are 0.\n            # Therefore, we set\
    \ the score manually to 1.\n            -np.divide(\n                depths, denominator, out=np.ones_like(depths), where=denominator\
    \ != 0\n            )\n        )\n        return scores"
