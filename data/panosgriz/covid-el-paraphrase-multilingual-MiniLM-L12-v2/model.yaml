widgetData:
- source_sentence: Πρέπει να εμβολιαστώ κατά του COVID-19 αν θηλάζω;
  sentences:
  - 'Αν κάποιος είναι άρρωστος και φροντίζει για το σπίτι, μπορούν να γίνουν τα ακόλουθα για τη βελτίωση του εξαερισμού και
    τη μείωση του κινδύνου μόλυνσης σε άλλα μέλη του νοικοκυριού: Όποτε είναι δυνατόν, το άρρωστο άτομο θα πρέπει να παραμείνει
    σε ξεχωριστό δωμάτιο. Αν αυτό δεν είναι δυνατόν, τότε κρατήστε τουλάχιστον απόσταση 1 μέτρου από αυτό. Ο άρρωστος και
    οποιοσδήποτε άλλος στο ίδιο δωμάτιο θα πρέπει να φοράει ιατρική μάσκα. Προσφέρετε καλό αερισμό στο δωμάτιο του άρρωστου
    ατόμου και στους κοινόχρηστους χώρους, με ανοιχτά παράθυρα όποτε είναι δυνατόν.'
  - Εάν θηλάζετε, θα πρέπει να εμβολιαστείτε κατά του COVID-19 αμέσως μόλις είναι η σειρά σας. Κανένα από τα σημερινά εμβόλια
    COVID-19 δεν έχει ζωντανό ιό σε αυτά. Αυτό σημαίνει ότι δεν υπάρχει κίνδυνος μετάδοσης COVID-19 στο μωρό σας μέσω του
    μητρικού γάλακτος από το εμβόλιο. Στην πραγματικότητα, τα αντισώματα που παίρνετε μετά τον εμβολιασμό μπορεί να περάσουν
    από το μητρικό γάλα σας και να βοηθήσουν στην προστασία του μωρού σας.
  - Συμπληρώστε τα μέτρα πρόληψης και ελέγχου λοιμώξεων, συμπεριλαμβανομένης της υγιεινής των χεριών. Σιγουρευτείτε ότι το
    δωμάτιο όπου ο ασθενής φροντίζεται είναι καλά αεριζόμενο, ανοίγοντας παράθυρα, εάν είναι απαραίτητο. Παροχή οδηγιών στους
    φροντιστές και τα μέλη του νοικοκυριού για τον καθαρισμό και την απολύμανση στο σπίτι, καθώς και για τη διαχείριση αποβλήτων,
    πλυντηρίου και σκευών που σχετίζονται με τον ασθενή. Αναζητήστε από τον ασθενή να φοράει ιατρική μάσκα κατά την παροχή
    φροντίδας ή σε απόσταση ενός μέτρου. Αποθήκευση περιορισμού του αριθμού των μελών του νοικοκυριού κατά τη διάρκεια επισκέψεων
    και διατήρηση τουλάχιστον απόστασης 1 μέτρου.
- source_sentence: Ποια είναι μερικά ψηφιακά εργαλεία που χρησιμοποιούνται για την υποστήριξη εντοπισμού επαφών; Πώς μπορούν
    να ενισχύσουν τις διαδικασίες εντοπισμού επαφών;
  sentences:
  - Δεν ξέρουμε πότε θα τελειώσει η πανδημία, αλλά γνωρίζουμε ότι εξαρτάται από κάθε άτομο που συμβάλλει στη διακοπή της εξάπλωσης
    του ιού. Οι θυσίες που κάνατε με το να μην δείτε τους φίλους σας και με το να μην πάτε στο σχολείο για λίγο, και άλλες
    δραστηριότητες, είναι η συμβολή σας στην καταπολέμηση της πανδημίας. Βάζοντας τις κοινωνίες και τις οικονομίες σε αναμονή,
    έχουμε μειώσει την ικανότητα του ιού να εξαπλωθεί μέσω των κοινοτήτων μας. Αυτά τα αμυντικά μέτρα έχουν βοηθήσει να περιοριστεί
    η βλάβη που μπορεί να προκαλέσει ο ιός, και μας έχουν αγοράσει χρόνο για να μάθουμε περισσότερα για τον ιό και να βρούμε
    λύσεις ώστε να μπορέσουμε να επιστρέψουμε σε έναν πιο οικείο τρόπο ζωής.
  - Τα αποτελέσματα της έρευνας παρέχουν ακριβέστερες εκτιμήσεις για τα ποσοστά επιπολασμού της φυματίωσης από ό,τι εκτιμά
    ο ΠΟΥ και μπορούν να χρησιμοποιηθούν για την αξιολόγηση της πιθανότητας η Κίνα να επιτύχει παγκόσμιους στόχους για τον
    επιπολασμό της φυματίωσης. Η επαρχία Σαντονγκ έχει πληθυσμό 94 εκατομμυρίων
  - Οσον αφορά τα ηλεκτρονικά εργαλεία και την τεχνολογία των πληροφοριών, μπορούν να χρησιμοποιηθούν για την ενίσχυση της
    αποτελεσματικότητας των διαδικασιών εντοπισμού επαφών και χρησιμοποιούνται επί του παρόντος σε αυτές τις περιπτώσεις υγείας.
    Ωστόσο, το εν λόγω εργατικό δυναμικό μπορεί να κατακλυστεί γρήγορα στο πλαίσιο της εκτεταμένης μετάδοσης SARS-CoV-2. Τα
    ηλεκτρονικά εργαλεία και η τεχνολογία πληροφοριών μπορούν να χρησιμοποιηθούν για την ενίσχυση της αποτελεσματικότητας
    των υπηρεσιών εντοπισμού επαφών, καθώς και για την αποφυγή της χρήσης των εν λόγω εργαλείων. Ψηφιακά εργαλεία που υποστηρίζουν
    τις διαδικασίες εντοπισμού επαφών μπορούν να χωριστούν, γενικά, σε τρεις κατηγορίες που βασίζονται στη λειτουργία δημόσιας
    υγείας κατά τη διάρκεια συγκεκριμένων σταδίων της διαδικασίας εντοπισμού επαφών.
- source_sentence: Ποια είναι η θέση της ΠΟΥ σχετικά με τη χρήση του φυτικού υλικού Artemisia για την πρόληψη ή τη θεραπεία
    της ελονοσίας ή/και COVID-19;
  sentences:
  - 'Αποφασίζοντας να κλείσουν εν μέρει ή να ανοίξουν ξανά σχολεία, θα πρέπει να καθοδηγηθούν από μια προσέγγιση με βάση τον
    κίνδυνο, να μεγιστοποιηθούν τα εκπαιδευτικά, ευεξίας και υγείας για τους μαθητές, τους εκπαιδευτικούς, το προσωπικό και
    την ευρύτερη κοινότητα, και να συμβάλλουν στην πρόληψη μιας νέας έστιας COVID-19 στην κοινότητα. Πολλά στοιχεία θα πρέπει
    να αξιολογηθούν για την απόφαση για την επανένωση των σχολείων ή τη διατήρηση τους ανοικτά: η επανεκπαίδευση του COVID-19
    σε τοπικό επίπεδο, αυτό μπορεί να διαφέρει από το ένα μέρος σε άλλο σε μια χώρα.'
  - 'Πλεονεκτήματα και κίνδυνοι: ποια είναι τα πιθανά οφέλη και οι πιο ευρέως χρησιμοποιούμενες αντιμαλαρικές θεραπείες, θεραπείες
    συνδυασμού με βάση την αρτεμισινίνη (ACTs), παράγονται χρησιμοποιώντας την καθαρή ένωση αρτεμισινίνης που εξάγεται από
    το φυτό Artemisia annua. Υπήρξαν αναφορές ότι τα προϊόντα ή τα εκχυλίσματα (π.χ. φυτικά τσάι ή δισκία) που παράγονται
    από το φυτικό υλικό Artemisia μπορεί να έχουν προληπτική ή θεραπευτική επίδραση στο COVID-19. Ωστόσο, τα διαθέσιμα in
    vitro στοιχεία δείχνουν ότι τα καθαρισμένα προϊόντα αρτεμισινίνης ή A. annua φυτικά προϊόντα ή εκχυλίσματα δεν έχουν σημαντική
    επίδραση κατά του COVID-19.'
  - Την ανίχνευση της θερμοκρασίας του σώματος των επιβατών που φεύγουν από τη Γουχάν σε αεροδρόμια, σιδηροδρομικούς σταθμούς,
    σταθμούς λεωφορείων μεγάλων αποστάσεων και τερματικούς σταθμούς επιβατών. Από τις 17 Ιανουαρίου, συνολικά σχεδόν 0,3 εκατομμύρια
    άνθρωποι είχαν δοκιμαστεί για τη θερμοκρασία του σώματος [23]. Στη Γουχάν, υπάρχουν περίπου 2,87 εκατομμύρια μετακινούμενοι
    πληθυσμός [24]. Υποθέσαμε ότι 0,1 εκατομμύριο άνθρωποι μετακινούνταν στην πόλη της Γουχάν την ημέρα από τις 10 Ιανουαρίου
    2020 και πιστεύουμε ότι αυτός ο αριθμός θα αυξανόταν (κυρίως λόγω των χειμερινών διακοπών και των διακοπών της κινεζικής
    Πρωτοχρονιάς) μέχρι τις 24 Ιανουαρίου.
