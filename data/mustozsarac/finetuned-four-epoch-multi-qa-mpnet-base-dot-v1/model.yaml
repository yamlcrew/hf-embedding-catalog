- source_sentence: Ziarul Financiar a făcut 16 ani. Împliniţi-vă visul! Mesajul ZF către toţi...
  sentences:
  - 'ZF 24 Ziarul Financiar împlineşte astăzi 16 ani împreună cu voi, cititorii noştri, vârsta la care oamenii descoperă lumea
    aşa cum e. Iluziile se risipesc, visele prind viaţă. Dusă este copilăria, anii 2000 -2008, când creşterea economică ducea
    pe val orice business din România. Abia când dai de greu şi vin responsabilităţile începi să guşti libertatea. Libertatea
    anilor în care eşti nevoit să accelerezi ritmul, să inventăm în fiecare zi câte o poveste ca să vă ţinem aproape, un nou
    proiect, o nouă emisiune de business sau o nouă campanie care să transmită energie. La 16 ani, nimic nu este utopie, ci
    doar o realitate care aşteaptă să fie descoperită. Aşa cum voi vă descoperiţi de 16 ani în ZF propriile vise realizate:
    un lanţ de magazine de materiale de construcţii cu afaceri de 600 de milioane de euro, o fabrică de îngheţată sau de medicamente,
    o platformă de comerţ electronic, un antivirus care să se vândă în toată lumea sau, de ce nu, un ziar. Sau visul de a
    conduce o întreprindere cu o capitalizare bursieră de 5 miliarde de euro de care depind 5% din încasările bugetare ale
    ţării. Sau visul de a coordona la nivel mondial un brand cu vânzări de miliarde de euro. Click pe ilustraţie pentru a
    mări Este incredibil ca un ziar să vă ţină nedezlipiţi, ca o vrajă, de 16 ani neîntrerupţi, zi de zi, oră de oră, ca într-o
    înţelegere tacită şi secretă, în care fluxurile de hrană se plimbă între neuroni. Pentru că voi nu citiţi ziarul, de fapt
    vă hrăniţi cu el în fiecare dimineaţă. „Mâncaţi“ cifre, declaraţii, idei, poveşti, iluzii, platforme, proiecte şi simţiţi
    mirosul de creier „prăjit“ al celor care-şi chinuie mintea de-a lungul zilei pentru a scrie consistent, provocator şi,
    când ne reuşeşte, câteodată, scăpărător. Ce frumos ar fi ca în momentul în care citiţi ceea ce punem pe hârtie să se vadă
    fluxurile ca nişte lasere verzi sau albastre între minţile noastre, ale celor care scriem şi ale voastre, celor care ne
    citiţi. Ziarul Financiar este de 16 ani în fiecare zi energie aşternută pe hârtie, de 15 ani pe ecranele calculatoarelor,
    de 10 ani pe mobil, de 4 ani pe ecranele tabletelor şi de 3 ani în direct, la emisiunile ZF Live. Această energie, astăzi
    în adolescenţă, ne-o daţi voi, cititorii noştri, oamenii care ştiu şi pot să schimbe România prin proiectele lor. Voi,
    cei care credeţi în puterea faptelor sunteţi inspiraţi zi de zi de noi, cei care credem în puterea cuvintelor şi atunci
    când puterea ideilor lucrează în fapte se vede descărcarea electrică, se vede cum lumea face un pas înainte şi prinde
    sens. Banii despre care vorbim zilnic nu sunt decât o invenţie pentru a vă măsura capacitatea dumneavoastră de a schimba
    lumea. Voi de fapt iubiţi viaţa într-o măsură pe care cei din jur nu v-o bănuiesc. Iar banii îi folosiţi ca să daţi culoare
    vieţii, să naşteţi proiecte prin care să o faceţi mai frumoasă şi mai plăcută şi, de ce nu, mai intensă. Iar banii nu
    sunt decât un mijloc de a-i convinge şi de a-i disciplina pe cei din jur asupra justeţii proiectelor dumneavoastră. Şi
    un mijloc de a vă verifica pe voi înşivă că ceea ce gândiţi este raţional. Noi suntem aici să vă antrenăm creierele şi
    să vă sprijinim visele, să vă arătăm că schimbarea e posibilă şi că ceea ce gândiţi se poate realiza. Ziarul Financiar
    este mai mult decât un ziar, este platforma României care creşte. În ultimii trei ani am scos la lumină tot mai multe
    afaceri mici, pornite de la zero, iar reacţia a fost favorabilă. Oamenii urmăresc atent exemplele celor care pornesc de
    la o foaie de hârtie şi un creion şi construiesc o lume. După 25 de ani de la Revoluţie, România devine o ţară de antreprenori,
    oamenii au curaj să-şi înceapă propriile afaceri şi sunt sute de tineri întreprinzători care nu au fost niciodată angajaţi,
    ci şi-au început afacerea încă de pe băncile liceului. Eliminarea barierelor de comunicare şi de acces la consumatori
    prin infrastructura de comunicaţii a dat posibilitatea tinerilor să-şi iniţieze afaceri nu numai pentru România, ci la
    nivel mondial. La ce credeţi că s-a gândit un tânăr de 28 de ani, campion mondial la jujitsu, absolvent al Facultăţii
    de Matematică şi Informatică din cadrul Universităţii din Bucureşti? Să facă o brăţară inteligentă care să fie pusă pe
    mănuşa boxerilor, să înregistreze mişcările mâinii şi apoi, din analiza acestora, să le îmbunătăţească performanţa. Şi,
    atenţie, nimeni în lume nu produce această brăţară, iar tânărul nostru a înregistrat-o deja în Singapore, Coreea de Sud,
    Japonia, SUA şi Rusia pentru a o putea lansa pe piaţă. E o nouă lume. Sunt idei care aleargă înaintea noastră. 16 ani.
    E timpul viselor. Împliniţi-vă visul!'
  - 'Un sit arheologic, recent descoperit în apropierea capitalei peruviene, Lima, a fost vandalizat la sfârşitul săptămânii
    trecute, o piramidă veche de 5.000 de ani fiind distrusă. Ascuns în spatele unor coline, aproape de mare, El Paraiso este
    situl arheologic cel mai mare şi cel mai vechi de lângă Lima. Lucrările pentru descoperirea rămăşiţelor au început în
    decembrie 2012, iar, în februarie anul acesta, arheologii au descoperit prima piesă de mare importanţă: o placă veche
    de 5.000 de ani, din perioada precolumbiană. Potrivit unei prime anchete, distrugerile ar fi cauzate de o societate imobiliară,
    în complicitate cu o familie ce locuieşte în regiune. Ministrul peruvian al Culturii a spus că distrugerile în aceste
    zone ce fac parte din patrimoniul naţional pot fi pedepsite cu închisoare de până la opt ani. În centrul sitului se găseşte
    o construcţie de piatră, terasată, care a fost descoperită în 1965 de arhitectul francez Frederic Engel. Aceste construcţii
    au fost modele pentru arhitectura civilizaţiilor ce le-au urmat - preincaşă şi incaşă. Cum arăta situl înainte... ...şi
    după trecerea vandalilor'
  - În ultima perioadă, tot mai mulți pensionari și angajați din sectorul public se confruntă cu probleme legate de recalcularea
    pensiilor și a salariilor. Aceste procese, de multe ori complicate și îndelungate, au generat numeroase litigii. Pentru
    a veni în sprijinul celor afectați, Ministerul Justiției a propus un proiect de lege menit să simplifice procedura și
    să accelereze soluționarea acestor cazuri. Procedura de recalculare a pensiilor și salariilor Proiectul de lege propus
    de Ministerul Justiției, aflat în prezent în dezbatere publică, prevede că recalcularea pensiilor și salariilor bugetarilor
    trebuie să fie finalizată în termen de 60 de zile. În cazul în care beneficiarii nu sunt mulțumiți de rezultatul recalculării,
    aceștia pot adresa o cerere de soluționare către instanțele competente. Proiectul de lege stipulează că aceste cazuri
    trebuie soluționate cu prioritate, într-un termen de cel mult 60 de zile de la învestirea Înaltei Curți de Casație și
    Justiție (ÎCCJ). Un aspect important al acestui proiect este obligativitatea motivării deciziei în termen de 15 zile de
    la pronunțare. Fără această motivare, soluția nu își produce efectele, ceea ce poate prelungi și mai mult procesul pentru
    cei implicați. Drepturile pensionarilor și ale angajaților din sectorul public Noua ordonanță de urgență are ca scop instituirea
    unor măsuri clare pentru procesele legate de stabilirea și plata drepturilor salariale sau de natură salarială ale personalului
    plătit din fonduri publice. Aceste măsuri includ și procesele privind emiterea sau anularea actelor administrative și
    raporturile de muncă ale acestui personal. De asemenea, ordonanța se aplică și în cazul stabilirii și plății drepturilor
    la pensie, inclusiv actualizarea, recalcularea și revizuirea acestor drepturi. Pensionarii care consideră că recalcularea
    pensiilor nu reflectă corect veniturile lor anterioare pot aduce dovezi în sprijinul cererii lor. De exemplu, cei care
    au lucrat ore suplimentare, sâmbăta sau au primit prime și sporuri care nu au fost luate în calcul la recalculare pot
    solicita documentele necesare de la ITM și, dacă este cazul, pot iniția acțiuni în instanță pentru obținerea acestora.
    Exemplu concret și termene de soluționare Un exemplu concret de pensionari care ar putea apela la justiție sunt cei care
    au lucrat în condiții speciale. Aceștia au dreptul la o creștere de 50% a punctajului anual, iar dacă acest drept nu este
    respectat, pot solicita revizuirea deciziei prin intermediul instanțelor competente. Proiectul de lege prevede că sesizările
    trebuie judecate cu prioritate, iar deciziile motivate și publicate în termen de cel mult 15 zile de la pronunțare. Aceasta
    înseamnă că pensionarii și angajații din sectorul public pot aștepta o soluționare rapidă a problemelor lor, evitând astfel
    procesele îndelungate care sunt caracteristice în prezent. Reacții și critici Cu toate că inițiativa Ministerului Justiției
    a fost bine primită de unii, există și voci critice. Sindicaliștii de la Blocul Național Sindical (BNS) și-au exprimat
    nemulțumirea față de forma actuală a proiectului. Aceștia consideră că proiectul urmărește instituirea unor soluții derogatorii
    de la dreptul comun în materia sesizării ÎCCJ pentru pronunțarea unor hotărâri prealabile. Deși intenția este de a asigura
    o practică judiciară uniformă și unitară, sindicaliștii avertizează că adoptarea acestui act normativ va suspenda cauzele
    similare aflate pe rolul instanțelor până la pronunțarea hotărârii prealabile, ceea ce ar putea duce la întârzieri suplimentare.
    În concluzie, proiectul de lege propus de Ministerul Justiției reprezintă un pas important spre simplificarea și accelerarea
    procesului de recalculare a pensiilor și salariilor. Deși există critici și posibile obstacole, implementarea acestor
    măsuri ar putea oferi soluții rapide și eficiente pentru numeroasele litigii din acest domeniu, contribuind astfel la
    o mai bună gestionare a drepturilor salariale și de pensie ale personalului plătit din fonduri publice.
- source_sentence: MasterChef All Star 2023 finalisti Tahsin Küçük'ün hayatı ve biyografisi || MasterChef Tahsin kimdir, kaç
    yaşında, nereli?
  sentences:
  - MASTERCHEF TAHSİN KİMDİR? 15 Haziran 1997 tarihinde Kocaeli'de doğan Tahsin Küçük, 24 yaşında ve aslen Trabzonlu. 8 yıldır
    İstanbul'da hayatını sürdüren Tahsin yemek yapmanın yanı sıra birçok dans türüyle de ilgileniyor. 10 yaşından beri mutfakla
    iç içe olan yarışmacı Okan Üniversitesi Gastronomi bölümünden 2019 yılında mezun olmuştur. br>Ulu Gazi İlköğretim okulunu
    bitirdikten sonra liseyi de Yunus Emer Anadolu İmam Hatip Lisesi'nde tamamlayan Küçük, 13 yaşında mutfağa bulaşıkçı olarak
    girdi. 2015 yılında Ver Fırına isimli yarışma programına katıldı. Üniversite yıllarında da pek çok yarışmaya katılarak
    derece elde ettiğini belirten MasterChef Tahsin Türk televizyonlarında bulunan gündüz kuşağı yemek programlarında da yemek
    editörü olarak görev yaptığını ifade ediyor.
  - 'Yayınlanma: 10.12.2023 - 10:03 Güncelleme: 10.12.2023 - 10:03 İngiltere hükûmetinde Filistin''e destek yürüyüşlerine
    ”Nefret yürüyüşü” dediği için tepki çeken ve Başbakan Sunak ile ters düştükten sonra geçen ay görevinden alınan eski İçişleri
    Bakanı Suella Braverman, 9. kez düzenlenen Filistin''e destek yürüyüşünü de eleştirdiği X paylaşımında, ”Londra''da antisemitizmi
    ve nefreti gördüğümüz yürüyüş bir kez daha gerçekleşirken, demokrasilerin BM''de safça ve ikiyüzlü şekilde ateşkes tasarısı
    için oy verdiğini görmek üzücü oldu. İsrail''in kendini savunma hakkını desteklediğini için ABD''ye teşekkür ederiz. İngiltere''nin
    çekimser kalması ise hayal kırıklığı yarattı.” değerlendirmesini yaptı. Braverman''ın yanı sıra eski Göçten Sorumlu Devlet
    Bakanı Robert Jenrick ise İngiltere''nin BMGK''deki ”ateşkes” oylamasında çekimser kalmasına tepki gösterdi. Jenrick ise
    X paylaşımında, ”İngiltere''nin dün akşamki BM oylamasında çekimser oy kullanması hayal kırıklığıdır. Müttefiklik önemlidir.
    Hamas ve terörizme karşı savaşmak önemlidir. İsrail''in yanında durmalıyız.” ifadelerini kullandı. Jenrick, düzensiz göç
    konusunda Ruanda''yla imzalanan yeni anlaşma konusunda fikir ayrılığı yaşadığı için istifa etmişti ATEŞKES ÖNERGESİNİ
    İSKOÇYA VE GALLER KABUL ETMİŞ, İNGİLTERE REDDETMİŞTİ Ülkede 14 Ekim''den beri düzenlenen yürüyüşler için ”nefret yürüyüşü”
    ifadesini kullanan eski İçişleri Bakanı Suella Braverman''a tepki gösterilmiş, Braverman, kabine değişikliği kapsamında
    13 Kasım''da görevinden alınmıştı. Braverman, Filistin bayrağı sallamanın ve Filistin''e destek sloganlarının ”duruma
    göre” teröre destek sayılabileceğini de söylemişti. Londra Metropolitan Polisi ise yürüyüşün çoğunlukla barışçıl geçtiğini
    ve engellemek için yasal bir neden bulunmadığını açıklayarak eski bakanla ters düşmüştü. Ülkede ayrıca İngiltere Parlamentosu
    ile Galler ve İskoçya Bölgesel parlamentolarında ateşkes çağrısı içeren önergeler oylanmıştı. İngiltere Parlamentosu önergeyi
    reddederken İskoç ve Galler Bölgesel parlamentoları kabul etmişti.'
  - 'O filmare continuă din avion de pe 319 kilometri de autostradă, cel mai lung șantier aflat în execuție în acest moment
    în România, a fost realizată și prezentată în patru episoade de către Asociația Pro Infrastructura. Filmarea surprinde
    avansul, dar și întârzierile de pe tronsoanele Autostrăzii „Moldovei” A7, aflate în lucru, unele cu termene de finalizare
    în acest an. În aceste zile, Asociația Pro Infrastructura a prezentat „ceea ce nimeni, niciodată, nu a mai făcut la noi
    în țară: o filmare continuă din avion de pe 319 kilometri de autostradă, cel mai lung șantier aflat în execuție în acest
    moment în România.” Pro Infrastructura, este una din cele mai importante voci ale societății civile pe partea de monitorizare
    a proiectelor de infrastructură din țară. „Obiectivul nostru este ca publicul să vadă lipsa de capacitate dar și forța
    extraordinară a UMB, diferențele de mobilizare și progres în teren între constructorii celor 13 loturi și cât de fanteziste
    sunt promisiunile total iresponsabile ale politicienilor care dau ca siguri 150 kilometri deschiși circulației în 2024
    doar pe Autostrada A7”, scrie Pro Infrastructura care a publicat în patru episoade filmarea cap-coadă a șantierului. Filmarea
    cu avionul a fost făcută din direcția Nord (începând de la Pașcani) spre Sud (până la intersecția A7 cu A3 în apropiere
    de Ploiești). A7 Pașcani – Bacău – „Întâzierea care trebuie recuperată este colosală” Despre primul tronson din A7 din
    direcția Nord spre Sud, Pro Infrastructura spune că imaginile arată că „forța celui mai puternic și harnic antreprenor
    general de pe rutier din România nu este nici pe departe suficientă pentru a duce, în ritmul obișnuit, toți cei 388 kilometri
    de autostradă și drum expres pe care-i are acum în portofoliu”. Tronsonul Pașcani-Bacău are în total 77,393 kilometri,
    este format din 3 loturi contractate toate cu UMB în 15.02.2023 care prevăd 30 de luni de execuție directă, având ordine
    de începere emise în 2 (sectoarele dinspre Bacău) și 4 mai 2023 (cel dinspre Pașcani). Așadar, termenul de finalizare
    este noiembrie 2025. Conform datelor oficiale CNAIR, stadiul fizic este de 4,3% pe Pașcani-Mircești, 3,4% pe Mircești-Trifești,
    respectiv 5,2% pe Trifești-Bacău Nord. „Chiar dacă am adăuga, cu indulgență, încă un punct procentual aferent diferenței
    dintre lucrările executate la zi și cele raportate la ultima actualizare CNAIR, abia dacă am ajunge la un progres fizic
    mediu real de 5,5% între Pașcani și Bacău, astăzi. Adică doar 0,5% avans mediu lunar în cele 11 luni scurse de la emiterea
    ordinului de începere. Este absolut evident că întârzierea care trebuie recuperată în cele 19 luni rămase este colosală.
    Misiune practic imposibilă având în vedere că UMB trebuie să livreze până la sfârșitul lui 2025, conform termenelor asumate
    prin contracte, TOȚI cei 388 kilometri de autostradă și drum expres pe care-i are în tolbă, cu excepția ciotului A1 Margina-Holdea
    scadent în 2026”, susține Pro Infrastructura. Vezi filmarea mai jos: A7 Bacău – Focșani – Decalaje „enorme” Despre „al
    doilea episod” – filmarea din avion a sectorului Bacău – Focșani – Pro Infrastructura spune că „este aproape la fel de
    trist” ca primul și subliniază din nou că „UMB, cel mai puternic și harnic antreprenor general de pe rutier din România,
    are și aceste șantiere întârziate din cauza lipsei de capacitate, neputând să mobilizeze utilaje și oameni îndeajuns ca
    să ducă în ritmul obișnuit toți cei 388 kilometri de autostradă și drum expres din portofoliu”. Tronsonul Bacău-Focșani
    are în total 95,902 kilometri, este format din 3 loturi contractate toate cu UMB în 15.12.2022 care prevăd 30 de luni
    de execuție directă, având ordine de începere emise în 03.05.2023 (cele două dinspre Bacău) și 29.03.2023 (cel dinspre
    Focșani). Așadar, termenele de finalizare sunt noiembrie 2025, respectiv septembrie 2025. Conform datelor oficiale CNAIR,
    stadiul fizic este de 4% pe Bacău Sud-Răcăciuni (21,522 km), 12% pe Răcăciuni-Domnești (38,78 km) și 17% pe Domnești-Focșani
    Nord (35,6 km), procente la care s-ar putea adăuga un punct procentual aferent diferenței dintre lucrările executate la
    zi și cele raportate la ultima actualizare CNAIR. „Astfel, pe lotul din nord am avea, la zi, execuție de 5% în 11 luni
    scurse de la emiterea ordinului de începere, deci doar 0,45% lunar. Pe mijloc este ceva mai bine, 13% în 11 luni, adică
    1,2% pe lună. Iar în sud avem 18% în fix un an de zile, așadar 1,5% avans mediu, dar tot insuficient. Un progres de 100%
    sau măcar 95% (pentru deschidere) în 30 de luni impune o cadență medie de 3,1-3,4%. Ca să-și onoreze termenele asumate,
    UMB ar trebui să pună în teren 4,5-5%, respectiv 6,5% din lucrări, în medie, în fiecare lună, de astăzi! Adică o creștere
    a mobilizării, imediată, de 10 ori (!) pe nord și de 3-4 ori în mijloc și la sud față de cea avută în primul an scurs
    deja din contract. Orice zi care trece fără să se atingă acest ritm adaugă, matematic, noi întârzieri. Concluzia? Aceeași
    ca ieri: și pe segmentul Bacău-Focșani, la fel ca pe Pașcani-Bacău, decalajele care trebuie recuperate în cele 19, respectiv
    18 luni rămase sunt enorme. Deci misiune practic imposibilă având în vedere că UMB trebuie să livreze până la sfârșitul
    lui 2025, conform termenelor asumate prin contracte, TOȚI cei 388 kilometri de autostradă și drum expres pe care-i are
    în tolbă, cu excepția ciotului A1 Margina-Holdea scadent în 2026”, spune Pro Infrastructura. Vezi mai jos video: A7 Focșani
    – Buzău – Singurele tronsoane care merg pe o deschidere certă în 2024 Al treilea episod publicat de Pro Infrastructura
    „ne arată forța UMB demonstrată în trecut, fiind singurul șantier prin care-și onorează momentan blazonul. Dar, în ciuda
    mobilizării exemplare de aici, inaugurarea ÎNTREGII secțiuni de 80 kilometri, pe profil complet, dintre Focșani și Buzău
    este practic imposibilă în 2024 așa cum au promis deopotrivă politicienii și constructorul”, după cum susține asociația.
    Tronsonul Focșani-Buzău are o lungime totală tronson: 82,44 km. Număr loturi: 4, Focșani Nord-Mândrești (10,94 km), Mândrești-Râmnicu
    Sărat (36,1 km), Râmnicu Sărat-Vadu Pașii/Buzău Nord-Est (30,8 km), Vadu Pașii-Buzău Est (4,6 km), în direcția zborului.
    Stadiile fizice oficiale date de CNAIR sunt, în ordinea din paragraful precedent: 32%, 28%, 29%, respectiv 28%, ordinele
    de începere fiind emise în 05.12.2022, 10.02.2023, 06.02.2023, respectiv 05.12.2022, pe contracte de 20 luni execuție
    directă pe capete și 26 luni pe cele două loturi mari din centru. Termene de finalizare: august 2024 pe capetele de la
    Focșani și Buzău și aprilie 2025 pe sectoarele dintre cele două orașe. (n. la aceste procente pot fi adăugate cel puțin
    3 puncte procentuale aferente diferenței dintre lucrările executate la zi și cele raportate la ultima actualizare CNAIR)
    „Așadar, pe celebra cocoașă de la Focșani să zicem că suntem azi la 35%. Termenul este august 2024, deci 5 luni rămase.
    Ca să se deschidă la ~95%, înseamnă că trebuie pus în teren un procent de 60%, deci 12% avans lunar mediu! Exclus. Fezabil
    octombrie, 8,5% cadență pe un lot mic de 11 kilometri. Pe Mândrești-Râmnic avem 31%. Livrarea în decembrie înseamnă ~64%
    în 9 luni, deci peste 7% medie lunară pe 36 kilometri! Vise. Fezabil aprilie 2025, în termenul contractual, adică 5% pe
    lună (include sezonul prost de iarnă). Pe Râmnic-Buzău Nord calculul este similar, putem spera la aprilie 2025. Pe ciotul
    buzoian suntem la 31% astăzi și, contractual, trebuie să fie gata în august 2024 dar este practic imposibil, mai ales
    că aici avem podul imens peste Buzău care nici măcar nu are pilele gata. Oricum ar fi muzeu fără continuarea spre Ploiești,
    doar nodul Vadu Pașii ar fi folosit. Dincolo de procentele de progres fizic, este analiza punctelor critice. Dacă la terasamente
    și asfalt munca este (relativ) ușoară și puternic mecanizată, la structuri e mult mai migălos și depinzi foarte, foarte
    mult de factorul uman. Nu avem NICIO grindă instalată pe NICIO structură între Focșani și Buzău! Multe pasaje și poduri
    nu au toate pilele gata, ba chiar la multe încă se lucrează la fundații. Pe lângă toate acestea vin și finisajele: grosier
    80 kilometri (fără bretelele din noduri!) înmulțiți cu 4 rânduri de parapete de protecție. Plus marcajele care, la 80
    km, nu sunt deloc de neglijat ca timp de aplicare. Șanțuri, iluminat, spații servicii? Nici nu le mai socotim, nu ne trebuie.
    Fezabilă este deschiderea (în octombrie) pe celebra cocoașă între nodurile Focșani Nord și Mândrești și poate, la final
    de an, până la Slobozia (DJ205R) dacă se concentrează pe podurile peste Râmna și Milcov. Sau (sau!) poate că e mai ușor
    ceva între Buzău și Râmnicu Sărat dar acolo avem alt pod-mamut, cel peste Râmnic. Ori să se facă o descărcare provizorie
    pe unul din drumurile județene. Multe scenarii și o singură certitudine: NU vom circula pe TOȚI cei 80 de kilometri dintre
    Focșani Nord și Buzău Nord-Est în 2024”, arată analiza Asociației Pro Infrastructura. Vezi filmarea de pe Focșani – Buzău
    mai jos: A7 Buzău – Ploiești (Dumbrava/A3) – Șanse teoretice pentru alte inaugurări Ultimul „episod” publicat de Pro Infrastructura
    este „teribil de frustrant”, iar „termenele asumate vor fi depășite cu brio și riscăm să nu inaugurăm nimic în acest an”,
    după cum susține organizația. Tronsonul A7 Buzău-Ploiești are o lungime totală tronson: 63,25 km. Număr loturi: 3, Buzău
    Est-Spătaru/Buzău Sud-Vest (13,9 km), Spătaru-Mizil (28,35 km), Mizil-Dumbrava/A3/Ploiești (21 km), în direcția zborului.
    Pe Buzău Est-Spătaru contractul a fost semnat cu turcii de la Nurol recent, în 22.11.2023, are ordin de începere de-abia
    emis, în 01.03.2024, și prevede 20 de luni execuție directă, deci termen finalizare 01.11.2025. „Lucrările sunt incipiente.
    Este critic ca antreprenorul să facă mai întâi cele două noduri din capete astfel încât să putem circula cât mai devreme
    în 2025 pe toată lungimea loturilor vecine”, susține Pro Infrastructura. Pe Spătaru-Mizil contractul a fost parafat cu
    asocierea româno-bulgară Coni-Trace în 07.06.2022, are ordin începere dat pe 11.08.2022 cu 20 luni execuție, deci termen
    inițial 11.04.2024 care însă a fost extins cu 193 zile până pe 19.10.2024. „Stadiul fizic oficial este 44,7%. Ca în episoadele
    trecute, dacă mai adăugăm cu indulgență 2-3 puncte procentuale, să zicem că suntem la 47% astăzi. Deschiderea cere cel
    puțin 95%, deci 48% în 6,5 luni ar însemna un avans mediu lunar de 7,4%. Iar pentru decembrie 2024 ar fi nevoie de o cadență
    minimă ~6%. Șansele să vedem 6-7% progres lunar constant pe 28 kilometri sunt zero, mai ales că bulgarii de la Trace nu
    au deloc forță și au cea mai mare bucată din tronson, aproximativ 19 km. Extrem de greu, doar strict teoretic posibil,
    cu mari eforturi concentrate, cu preluarea de către Coni (care se mișcă mai bine) a unor lucrări de la Trace, putem avea
    o deschidere parțială între nodul Mizil și nodul Clondiru/DJ203C. Pe Mizil-Dumbrava/Ploiești contractul a fost semnat
    cu italienii de la Pizzarotti în 16.06.2022, are ordin de începere emis în 22.08.2022 cu 20 luni execuție directă, așadar
    termen inițial 22.04.2024 care însă a fost extins cu 153 zile până pe 24.09.2024. Stadiul fizic oficial este 50,02%. Folosind
    același raționament descris mai sus, să spunem că suntem la 52,5% astăzi. Deschiderea la 95% în termenul asumat cere un
    avans mediu lunar de minim 7%, respectiv 4,7% cadență constantă dacă vrem inaugurarea la sfârșit de 2024. Șansele ca Pizzarotti
    să fie gata la final de septembrie sunt zero, fără îndoială. La fel ca la vecini, deschiderea la sfârșitul lui 2024 este
    strict teoretic posibilă. Aici problema e alta: deși procentual volumul de muncă rămas este mai mic, misiunea este la
    fel de grea, dacă nu mai grea fiindcă structurile italienilor sunt mult, mult mai complexe. Uitați-vă, de exemplu, doar
    la nodul A7-A3. Și aici, teoretic, ar fi posibilă o deschidere parțială, cu o concentrare puternică, între Albești-Paleologu
    (DN1D) și Mizil. Dacă adăugăm Mizil-Clondiru… nu ar fi deloc rău! Dar pentru aceste flic-flacuri contractuale și tehnice
    trebuie cap ȘI picioare în cantități considerabile, atât de la oficialii CNAIR cât mai ales de la cei trei antreprenori”,
    arată analiza Pro Infrastructura. Vezi filmarea mai jos: Autostrada Moldovei A7 – Autostrada finanțată prin PNRR, dar
    cu termen limită pentru finalizare Autostrada „Moldovei” A7 are aproape 440 km de la Ploiești (Dumbrava/A3) și până la
    Siret, la granița cu Ucraina. De la Ploiești până la Pașcani (circa 320 de km) a fost prinsă pe finanțare PNRR, planul
    pe termen scurt gândit de UE pentru relansarea economiilor post-pandemie. Condiția esențială: proiectele să fie finalizate
    până în 2026. Până în acest moment au fost contractate toate tronsoanele pe PNRR, ultimul tronson contractat fiind Petroasele
    – Buzău (cca 13,9km), cel mai rămas în urmă dintre loturi. De la Buzău până la Pașcani Autostrada A7 are același constructor
    – românii de la UMB. Pentru sectorul A7 Pașcani – Suceava, scoaterea execuției la licitație este așteptată în acest an.
    Pentru sectorul Suceava – Siret, o lansare a licitației pentru contractul de execuție ar putea veni la final de an sau
    la începutul anului viitor. VEZI ȘI: HARTĂ INTERACTIVĂ. „Autostrada Vestului” și legătura cu Ungaria. Detaliile și traseul
    celei mai noi șosele de mare viteză ce se va construi în România VIDEO Următoarea autostradă care se inaugurează. Cum
    arată lotul de lângă București care va fi deschis în aprilie'
