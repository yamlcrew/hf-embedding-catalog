    - 'La fel ca alte tipuri de alergii sezoniere, cum este alergia la polen, alergia la ambrozie se manifestă în special
      prin: strănut, tuse, congestie nazală, secreție nazală, mâncărimi în ochi, nas și gât, ochi iritați, slăbiciune sau
      oboseală, urticarie. Adriana Nicolae, medic primar alergolog, a vorbit la Antena 3 CNN despre simptomele alergiei la
      ambrozie şi cum să ne protejăm de polenul acestei plante. „Simptomele de rinită şi conjunctivită sunt cele mai comune
      în cazul alergiei la ambrozie. Pacienţii încep să strănute, apar mâncărimi la nivelul nasului şi secreţii nazale abundente,
      iar nasul se poate înfunda foarte tare. Această congestie nazală este caracteristică sezonului polemic de ambrozie.”,
      potrivit medicului alergolog. „Pot apărea şi mâncărimi la nivelul ochilor, care induc lăcrimare excesivă, cauzate de
      congestii la nivelul ochilor. De asemenea, simptomele pot fi asociate şi cu tusea seacă sau iritativă, care provoacă
      o senzaţie de gâdilare neîntreruptă în gât.” Uneori, cei alergici pot avea dificultăţi serioase de respiraţie. „Se poate
      instala respiraţia şuierătoare, care poate produce, ulterior, o criză de astm.”, a mai spus Adriana Nicolae, doctor
      alergolog. O primă metodă de prevenţie a simptomelor este să ne ferim de expunerea la ambrozie în zilele în care există
      o concentraţie foarte mare de polen în aer. În plus, ar trebui evitate deplasările în zilele cu furtuni şi descărcări
      electrice. Dacă nu poate fi evitată expunerea la polen este recomandată purtarea măştii în spaţiile exterioare, precum
      şi a ochelarilor de soare. Specialiştii recomandă consultarea unui medic în cazul în care apar simptomele alergice,
      pentru a obţine un tratament corespunzător. „Odată tratată alergia în timpul sezonului, există posibilitatea de a urma
      un tratament specific de desensibilizare. Această imunoterapie alergen specifică durează minimum 3 ani.”, a precizat
      medicului alergolog. Alergia la polenul de ambrozie poate cauza, în cazuri extreme, şoc anafilactic. Totuşi, anafilaxia
      este rară, fiind cauzată de un nivel de expunere foarte mare. 2,5 milioane de români, alergici la ambrozie. Pericole
      şi metode de prevenire'
