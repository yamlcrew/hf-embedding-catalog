    tutacağına ilişkin beklentiler yüzde 75 seviyesine çıktı. Analistler, ABD'de iş gücü piyasasının Fed'in adımlarına karşın
    hala çok sıcak olduğunu hatırlatarak, bugün açıklanacak istihdam raporundaki verilerden alınacak sinyallerin Fed'in politika
