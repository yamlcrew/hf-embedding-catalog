  sentences:
  - 'Ülkemizde sınırlı sayıda ürünü bulunsa da, portatif medya oynatıcılarıyla beğeni toplayan iRiver, önümüzdeki yılın mart
    ayında ilk cep telefonunu çıkaracağını duyurdu. Koreli operatör KTF ile uyumlu çalışacak olan cihaz, el yazısı tanıyan
    dokunmatik ekran, WiFi ve Bugs Music Service erişimi gibi özelliklere sahip olacak. İlk olarak CES fuarında konsept olarak
    tanıtılan cihazın Kore dışında dünyanın geri kalanına da dağıtılıp dağıtılmayacağı ise henüz bilinmiyor. :: iRiver cep
    telefonu işini kıvırır mı? Bilgi İçin : ReignCom Yazan : Erhan Kahraman'
  - 'Apple iTunes Store, kullanıcılara yeni bir seçenek sunuyor ama henüz sebebini açıklamayarak da herkesi merakta bırakıyor.
    Türkiye’den bağlanan kullanıcıları, Apple tarafından uygulanan coğrafi ayrım sebebiyle hiçbir şekilde alakadar etmeyen
    yeni bir uygulama, kullanıcıların iTunes hesaplarını iTunes Plus adı verilen yeni bir forma sokmalarını sağlıyor. Bunu
    yaparken de şarkı başına 0,30 dolar, albüm ücretlerinin %30’u ve video başına da 0,60 dolar talep ediliyor. Peki sonrasında
    ne oluyor? Tebrikler Apple Bunun ardından ise artık yeni şarkılarınız kopya korumasız ve sürükle-bırak teknolojisiyle
    içine şarkı kopyalanabilen her türlü müzik çalarda kullanılabilecek hale geliyor. Bundan sonra satın alacağınız 8 milyon
    tane, farklı yapımcıdan gelen müzik dosyaları ise kopya korumasız olarak satılacak. :: Kopya koruma meselesi halledildiğine
    göre, iTunes memleketimize gelir mi? Bilgi için: Apple'
  - 'Update 21:37 Autostrada Soarelui, închisă în totalitate pe ambele sensuri de mers. Şi A4 rămâne închisă Totodată, rămâne
    închisă, în continuare, şi Autostrada 4 Ovidiu – Agigea. Şi DN3 şi DN3A au fost închise circulaţiei rutiere, pe întreaga
    lungime. Potrivit Centrului Infotrafic al Poliţiei Române, în judeţul Constanţa, au fost închise şi patru drumuri naţionale:
    DN3 Constanţa – Ostrov, DN38 Agigea – Negru Vodă, DN22 Ovidiu – Mihai Viteazu, DN22C Murfatlar – Cernavodă. În judeţul
    Călăraşi, sunt închise DN3 Ileana – Chiciu (limită bac), pe tronsonul kilometric 50 – 127+700 de metri şi DN3A, între
    Lehliu-Gară şi Drajna (tronsonul kilometric 0 – 43+600). Din cauza condiţiilor meteorologice nefavorabile din Bulgaria,
    autorităţile nu mai permit accesul traficului greu (vehiculele cu masa totală maximă autorizată mai mare de 7,5 tone)
    dinspre România către Bulgaria, prin punctul de trecere a frontierei Giurgiu – Ruse. De asemenea, din acelaşi motiv, autorităţile
    nu mai permit accesul autovehiculelor (toate categoriile) dinspre România către Bulgaria, prin punctul de trecere a frontierei
    Vama Veche. Şi navigaţia pe Dunăre a fost suspendată, începând cu ora 12.00, pe o perioadă nedeterminată, între kilometrii
    fluviali 175 (Brăila) şi 1075 (Baziaş, judeţul Caraş-Severin). De asemenea, ca urmare a vântului foarte puternic, porturile
    Constanţa Nord, Constanţa Sud – Agigea, Midia şi Mangalia au fost închise. Update 20:05 Circulaţia rutieră pe Autostrada
    Soarelui a fost închisă între Cernavodă şi Constanţa, precum şi pe Autostrada 4, tronsonul Ovidiu -Agigea, anunţă Inspectoratul
    General al Poliţiei Române. Inspectoratul General al Poliţiei Române (IGPR) a anunţat că traficul rutier pe Autostrada
    2 a fost închis, de la kilometrul 160 la kilometrul 212, între Cernavodă şi Constanţa. Aceeaşi măsură a fost luată şi
    pe Autostrada 4, tronsonul Ovidiu -Agigea. Update 19:15 Nu se mai permite traficul pentru toate categoriile de autovehicule
    dinspre judeţul Constanţa prin Vama Veche, în contextul în care în Bulgaria drumurile sunt impracticabile din cauza zăpezii,
    anunţă IGPR. Inspectoratul General al Poliţiei României (IGPR) a anunţat că nu se mai permite traficul pentru toate categoriile
    de autovehicule dinspre judeţul Constanţa prin Vama Veche, în contextul în care în Bulgaria drumurile sunt impracticabile
    din cauza zăpezii. Din acelaşi motiv, nu mai este permis nici traficul pentru autovehiculele cu masa maximă autorizată
    mai mare de 7,5 tone dinspre judeţul Giurgiu. În acest context, au fost dispuse măsuri de asigurare a parcării autovehiculelor
    în zone sigure, a mai anunţat IGPR. Update 18:48 În judeţul Constanţa, a fost închisă circulaţia rutieră pe DN38, tronsonul
    Agigea - Negru Vodă, punct de trecere frontieră către Republica Bulgaria, anunţă Inspectoratul General al Poliţiei Române
    (IGPR). Aceeaşi măsură a fost luată şi pentru tronsoanele DN 22 Ovidiu-Mihai Viteazu, DN3 Constanţa-Ostrov, DN22C Basarab-Cernavodă
    şi DJ 226 Năvodari-Cornu. Totodată, au fost instituite filtre şi la intrările/ieşirile pe/de pe Autostrada 4, în scop
    preventiv. De altfel, ministrul Afacerilor Interne, Carmen Dan, le-a cerut prefecţilor, în şedinţa comandamentului de
    iarnă de la sediul ministerului, să ia decizia închiderii drumurilor ”cu operativitate”. ”Decizia pentru închiderea căilor
    rutiere sau a unei căi rutiere să fie luată cu operativitate. Cu această decizie, se impune deplasarea unei echipe pentru
    verificarea situaţiei şi luarea măsurilor de evacuare sau relocare în puncte de siguranţă. Pe traseele închise, este necesară
    identificarea tuturor punctelor de contact unde pot staţiona sau se pot adăposti persoane (...) Organizarea intervenţiei
    de deszăpezire trebuie organizată într-un mod integrat: Ministerul Transporturilor, Ministerul Afacerilor Interne, Ministerul
    Energiei şi autorităţile locale pentru că atenţia şi concentrarea noastră trebuie să fie orientată în scopul salvării
    persoanelor aflate în dificultate şi crearea unor căi de acces către localităţile izolate(...). Sistemul de raportare
    a datelor trebuie stabilit în mod unitar trebuie corelat inclusiv cu strategia de comunicare publică. Propunerea noastră
    este că toate instituţiile implicate să facă comunicări la fiecare trei ore.(...) Solicit factorilor de decizie să fiţi
    de găsit permanent, să va implicaţi direct şi responsabil în gestionarea tuturor problemelor ivite. Vă solicit să comunicaţi
    unii cu alţii pentru a interveni organizat. Dacă aveţi semnale că vizibilitatea este redusă şi că traficul pe anumite
    segmente de drum nu se realizează în condiţii de siguranţă, vă rog să închideţi din timp drumurile şi decizia să fie una
    rapidă, asigurându-va că pe tronsoanele închise nu se află persoane sau autovehicule”, a declarat Carmen Dan. Circulaţia
    rutieră pe DN38 a fost închisă de viscol. Filtre la intrările şi ieşirile de pe A4 Inspectoratul General al Poliţiei Române
    (IGPR) a anunţat că în judeţul Constanţa, a fost închisă circulaţia rutieră pe DN38, tronsonul Agigea - Negru Vodă, punct
    de trecere frontieră către Republica Bulgaria. De asemenea, se preconizează închiderea circulaţiei rutiere şi pe DN22
    şi DN3 din acelaşi judeţ. Totodată, au fost instituite filtre şi la intrările/ieşirile pe/de pe Autostrada 4, în scop
    preventiv. Având în vedere mesajele de avertizare cu cod galben, respectiv portocaliu, referitoare la ninsoare şi viscol,
    poliţiştii le recomandă şoferilor să nu pornească la drum în zonele afectate.'
