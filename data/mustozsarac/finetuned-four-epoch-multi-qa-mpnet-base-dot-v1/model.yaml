      ve holding endeksi yüzde 3,00 değer kazandı. Tüm sektör endeksleri yükselirken, en fazla kazandıran bankacılık oldu.
      Analistler, küresel pay piyasalarında, ABD Merkez Bankası'nın (Fed) bu ayki toplantıda faiz artırmayabileceğine yönelik
      beklentilerin güçlenmesi ve ABD'de borç limiti krizinin aşılmasıyla pozitif bir seyir izlendiğini belirterek, bugün
      ABD'de açıklanacak istihdam raporundaki verilerin yatırımcıların odağına yerleştiğini söyledi. ABD Senatosu, bugün borç
