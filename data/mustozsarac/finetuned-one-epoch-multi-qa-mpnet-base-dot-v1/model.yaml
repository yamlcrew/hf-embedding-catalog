  - source_sentence: Gafele facute de catre autoritatile comuniste
    sentences:
    - Totul s-a întâmplat sâmbătă după-amiază, când mama celor doi a sunat la 112 și a spus că fiica ei de 5 ani a fost violată
      de băiatul de 13. Când au ajuns polițiștii la locuința familiei din localitatea Ivănești, băiatul de 13 ani deja fugise
      de acasă. Potrivit unor surse judiciare, fata a fost dusă la Institutul de Medicină Legală pentru consult, iar politiștii
      l-au căutat pe fratele ei. După câteva ore, băiatul a fost găsit ascuns într-o casă părăsită din localitate. El a fost
      dus la un centru al DGASPC Vaslui, unde a fost audiat de către polițiști în prezența unui psiholog. Sora lui este acum
      acasă, în grija familiei. DGASCPC Vaslui a început propria anchetă în acest caz, urmând ca în cursul zilei de luni să
      aibă loc mai multe discuții cu reprezentanții familiei.
    - 'Costinești, cunoscută ca stațiunea tineretului de pe litoralul românesc, este o destinație de vacanță vibrantă și plină
      de viață, ideală pentru cei care doresc să se bucure de soare, mare și distracție. Situată la aproximativ 30 de kilometri
      sud de Constanța, locul atrage anual mii de turiști dornici de petreceri, activități recreative și relaxare pe plajă.
      Ce prețuri la cazare sunt în iulie și august 2024? Câți bani trebuie să scoți din buzunar pentru o vacanță la Costinești
      Pe un forum dedicat vacanțelor la Costinești, o româncă a dorit să știe dacă va găsi cazare pentru perioada 20….23 August,
      11 adulți și 10 copii. Iată ce detalii a primit: „Mai avem disponibilitate pentru urmatoarele perioade * 15-21 iulie,
      6 nopti, 1000 lei/noapte * 17-20 august, 3 nopti, 1000 lei/noapte * 26-31 august, 5 nopti, 800lei/noapte * 1-6 septembrie,
      5 nopti, 800 lei/noapte”. De banii ăștia ai aer conditionat în toate camerele, TV, WIFI, terasă amenajată, foisor, grătar,
      bucătărie complet utilată (frigider, cuptor electric, cuptor cu microunde, plită, cafetieră, prăjitor de pâine), parcare.
      Sunt acceptate vouchere de vacanță. Plus că te afli la doar 10 minute de plajă! Altcineva are disponibile camere duble
      matrimoniale și triple pentru 19….3 1august (160 RON cameră dubla matrimonială/ 200 triplă). Atmosfera stațiunii Costinești
      Stațiunea Costinești este renumită pentru atmosfera sa prietenoasă. Plajele sale sunt unele dintre cele mai populare
      de pe litoralul românesc. Cu nisip fin și ape clare, acestea oferă condiții excelente pentru plajă și înot. Pentru cei
      care preferă un loc mai liniștit, există și plaje retrase în apropiere, unde se pot bucura de soare într-un cadru intim.
      Printre atracțiile principale ale stațiunii se numără Epava Evanghelia, o navă grecească eșuată pe țărm în anii ’60,
      care a devenit un simbol al Costineștiului. Ambarcațiunea este un loc popular pentru fotografii și explorări. Activități
      recreative În Costinești ai la dispoziție o gamă largă de activități recreative pentru toate gusturile. Sporturile nautice,
      cum ar fi windsurfing, kitesurfing și jetskiing, sunt foarte populare. De asemenea, poți închiria biciclete sau scutere
      pentru a explora stațiunea și împrejurimile. Pentru turiștii cu buget limitat, camping-urile sunt o alegere bună, oferind
      o experiență autentică de vacanță pe litoral. În ceea ce privește gastronomia, stațiunea este plină de restaurante și
      terase care servesc preparate tradiționale românești, fructe de mare proaspete și mâncăruri internaționale. Costinești
      are toate ingredientele necesare pentru o vacanță de neuitat. Indiferent dacă ești în căutare de petreceri până în zori
      sau de relaxare pe plajă, această stațiune promite o experiență memorabilă pentru toți cei care o vizitează.'
    - 'Ziua de 16 decembrie, inainte de ora 17:00. De dimineata, Securitatea Judetului Timis isi desfasoara activitatea normal.
      ALEX MIHAI STOENESCU ADUNAREA. Coloane de timisoreni au inceput sa manifesteze impotriva regimului Ceausescu Asa cum
      am aratat, in jurul orei 8:30, manifestantul Simion Cherlea vine sa discute cu Radu Tinu, apoi maiorul va lucra impreuna
      cu locotenent-colonelul Kope R. la intocmirea raportului referitor la agentul maghiar Varga Ladislau, cel care luase
      contact cu Ambasada Ungariei. Filajul prezinta si el raportul - liniste. ”In dimineata de 16 decembrie 1989, la ora
      8:00 - declara in proces Ion Florea, fost secretar al Comitetului Judetean Timis al PCR - , am fost chemat de Radu Balan,
      o data cu mine venind si ceilalti secretari: Bolog Vasile, Avram Teodorea, Boiboreanu Viorica si Lazureanu Aurel. Balan
      Radu ne-a informat cu privire la cazul Tokes si anume ca in Piata Maria s-au adunat trei-patru sute de persoane care-si
      exprimau opozitia fata de masura de evacuare a pastorului ce urma a fi luata.” ”Primul secretar ne-a informat ca pentru
      dezorganizarea acelei manifestatii urmeaza a fi infiltrati alti patru-cinci sute de oameni cu diferite responsabilitati
      pe linia muncii de partid sau de sindicat. Ne-a mai precizat ca deja printre acesti demonstranti se gasesc lucratori
      din aparatul Inspectoratului Judetean al Ministerului de Interne.” Avand in vedere ca la ora 8:00 nu era nimeni in fata
      casei parohiale, decizia lui Balan pare de neinteles. Ea capata un inteles - determinat si de natura masurii care urma
      a fi luata - doar daca in noaptea de 15 spre 16 decembrie Emil Bobu l-a informat de Nicolae Ceausescu asupra convorbirii
      sale cu Balan, iar Ceausescu l-a sunat tot in aceeasi noapte pe Balan la Timisoara si i-a cerut sa ia masura neinspirata,
      dar tipica lui Ceausescu, de a aduce muncitori care sa-i ia la bataie pe manifestantii din fata casei lui Tokes. Si
      Balan, si Bobu au ascuns in proces aceasta convorbire de noapte cu Ceausescu, pentru ca ordinul lui Ceausescu se afla
      la originea evenimentelor, iar ei l-au executat, tot ca niste oameni lipsiti de judecata. Sa ne uitam la text si sa
      vedem ce contine. Isi poate cineva imagina ”infiltrarea” a 400-500 de cadre ale partidului printre 200-300 de manifestanti?
      Este hilar. Ce fel de ”infiltrare” poate fi aceea a unui grup masiv de oameni care depasesc ca numar numarul manifestantilor?
      Nu, este clar ca au fost trimisi la bataie, iar aceasta masura este tipica unui singur om - Nicolae Ceausescu. Sa ne
      amintim ca in timpul teleconferintei din 21 decembrie 1989, Ceausescu va invoca trecutul sau de membru al grupelor de
      soc organizate de sovietici pe strazile Bucurestilor in anii 1944-1947, pe care populatia i-a identificat sub numele
      de ”mardeiasi”: ”Reamintesc numai ca in Bucuresti functionau inainte asemenea grupe si nu indraznea nimeni, nici un
      huligan nu indraznea sa ridice capul pe bulevardele Capitalei. Este adevarat, am fost atunci criticati ca sunt prea
      aspre - este demult - , dar le-am spus ca trebuie sa fie si mai aspre cu cei care incalca legile”. Toti biografii, cu
      exceptia celor platiti de el, confirma prezenta lui Nicolae Ceausescu in grupurile de batausi de pe strazile Bucurestilor,
      dar si la conducerea unor astfel de echipe in perioada colectivizarii fortate. Dupa ora 9:00 incep sa se adune mai intai
      cei patru enoriasi de serviciu, apoi aproximativ zece curiosi. La un moment dat, strada se goleste subit. Nimeni nu
      intelege din ce cauza, si ofiterii de Securitate coboara pentru a investiga. Pe Bulevardul 6 Martie trecuse o masina
      de vidanja care avea scapari tehnologice si lasase pe caldaram o dara de materii fecale urat mirositoare. Persoanele
      din fata casei lui Tokes se imprastiasera pentru a scapa de mirosul insuportabil. Se indeplinea una din constatarile
      celebre ale lui Petre Tutea: ”Toate revolutiile se umplu pana la urma de cacat si sange”. Informat asupra acelui incident,
      Radu Tinu cere aprobarea ca vidanja sa fie oprita si pusa sa mai treaca o data. Colonelul Sima, seful Securitatii Timis,
      considera propunerea neserioasa si nu o aproba. Maiorul Tinu propune atunci ca in intersectia strazilor Treboniu Laurian
      si Timotei Cipariu sa fie amplasat un militean care sa dirijeze circulatia camioanelor grele pe Timotei Cipariu astfel
      incat sa nu se poata aduna o multime care sa ocupe strada. Colonelul Sima respinge si aceasta propunere pe motiv ca,
      dimpotriva, camioanele ar putea fi blocate acolo si va fi foarte greu sa le deblocheze apoi. Pentru acest moment al
      zilei, dar si pentru intervalul foarte mare dintre orele 10:00 si 17:30, Comisia senatoriala are o versiune din pacate
      prea schematica. Se afirma ca la ora 10:00 Nicolae Ceausescu a luat legatura cu primul secretar Radu Balan si a dispus
      ”masuri concrete printre care si evacuarea imediata si neconditionata a pastorului la noul loc de munca. Dictatorul
      devenise nervos”. Nu avem stenograma convorbirii telefonice, dar din ceea ce se intamplase in 15 decembrie si din reconstituirea
      facuta din relatarile revolutionarilor si ale ofiterilor Securitatii, un interes al lui Ceausescu pentru situatia de
      la Timisoara este perfect plauzibil. Bobu fusese sunat noaptea de Balan si apoi acesta l-a informat pe seful statului
      acasa. Ceausescu a sunat si probabil ca Balan l-a informat asupra faptului ca evacuarea ar putea fi impiedicata de prezenta
      unui grup de oameni in fata casei lui Tokes. Iarasi in tonul cunoscut, Ceausescu a ordonat efectuarea evacuarii imediat,
      adica in ziua de 16 decembrie, cum era prevazut in hotararea judecatoreasca, fara sa tina cont ca legea obliga la executarea
      sentintei in prima zi lucratoare. Este de asemenea posibil ca Balan sa-l fi informat ca duminica Laszlo Tokes avea slujba
      si ar fi putut profita de ocazie pentru a incita lumea la nesupunere civica. Nu ne trebuie prea multe investigatii ca
      sa ne imaginam ca Ceausescu a cerut sa se ia masuri ”pe linie de partid”, de ”influentare obsteasca”, adica, altfel
      spus, muncitorii, oamenii muncii din Timisoara sa ia atitudine si sa intervina pentru executarea sentintei judecatoresti,
      dar mai ales pentru a-i lua la bataie pe cei stransi in fata casei lui Tokes. Acesta era patentul gandirii lui Ceausescu,
      primitiv, ramas la anii 1945-1948, cand facuse parte din acel grup de soc instruit de sovietici pentru incaierarile
      cu ”fascistii” din centrul Bucurestilor. REPRESIUNEA. Fortele de ordine au imprastiat multimea cu jeturi de apa Subliniem
      insa ca ordinul dat de Balan subalternilor sai a fost la ora 8:00, in timp ce discutia invocata de Comisia senatoriala
      a avut loc la ora 10:00, ceea ce demonstreaza existenta unei alte convorbiri, de noapte. Oricum, dupa convorbirea de
      dimineata cu Nicolae Ceausescu, primul secretar Radu Balan hotareste sa nu execute ordinul secretarului general: ”Sambata,
      16 decembrie 1989, la ora 10:00, m-a sunat Ceausescu Nicolae, interesandu-se de situatia privitoare la pastorul amintit.
      I-am expus-o asa cum era in realitate, sustinand ca nu se poate trece la evacuare, deoarece hotararea judecatoreasca
      nu era inca executabila. El mi-a ordonat sa trec de indata la evacuare, lucru pe care insa nu l-am facut, tocmai in
      ideea de a nu da nastere la conflicte”. Ceausescu ii cerea sa execute un ordin ilegal. Este primul ordin ilegal dat
      de Ceausescu in acea perioada. Urmatoarele ordine ilegale date de el vor fi mult mai sangeroase. Comisia senatoriala
      arata ca ”in aceeasi zi, din ordinul ministrului de Interne, in toate unitatile subordonate acestui minister, a fost
      introdusa situatia numarul 2 prevazuta de Ordinul 2030 din 15.05.1972”. Nu se precizeaza ora la care s-a dat ordinul.
      Ea este importanta, pentru ca lipsa acestui amanunt din concluziile Comisiei senatoriale permite confuzia, inducand
      ideea ca in dupa-amiaza de 16 decembrie situatia era deosebit de grava. Ora declararii Situatiei nr. 2 o aflam de la
      generalul Grigorie Ghita, in timpul audierii sale din 1994: ”In 16 decembrie, ora 20:00, m-a sunat Vlad la domiciliu
      sa ma prezint la Comandament, la Baneasa, in spatele Institutului de Meteorologie si Hidrologie (unde este acum Comandamentul
      Trupelor de Jandarmi). Am fost informat de situatia de la Timisoara. Am luat legatura cu gen. Bunoaica, comandantul
      brigazii de la Timisoara, i-am dat misiunea sa nu permita intrarea sau iesirea din biserica reformata din Timisoara.
      La ora 22:00 s-a ordonat la MI aplicarea Ordinului 230/1973, deci Situatia nr. 2, stare de alerta a efectivelor. Am
      transmis ordinul in teritoriu”. Insa revolutionarii insisi, precum si fostii ofiteri de Securitate arata ca in dimineata
      zilei de 16 decembrie numarul persoanelor stranse in fata casei lui Tokes era redus. Revolutionara Veronica Balaj are
      o amintire romantica despre prima jumatate a acelei zile: ”Pana la pranz nu s-a aratat vreun semn ca ziua aceea ar fi
      putut fi deosebita. Era o sambata de sfarsit de an. Un 16 decembrie ca oricare altul. Asa parea. Si nici nu banuiam
      altfel. Atata ca vremea se incalzise peste asteptari. Soarele se hlizea in ciuda calendarului in care scria mijloc de
      decembrie”. Temperatura maxima la Timisoara in ziua de 16 decembrie 1989 va fi de 16 grade C. Avem temeiuri sa credem
      ca incepand cu ora 11:00, in sediul Comitetului Judetean de Partid s-a dezvoltat un conflict personal intre primul secretar
      Radu Balan si fostul prim-secretar Ilie Matei. Balan va arata in proces ca ”tot in aceeasi zi, la ora 11:00, la Comitetul
      Judetean de partid si-a facut aparitia Matei Ilie, secretar al CC al PCR, care era invoit pentru a-si rezolva unele
      probleme familiale. L-am pus pe acesta in tema cu situatia creata in jurul pastorului mentionat, cu ordinul dat de Ceausescu
      de a se trece la evacuare, la care Matei Ilie a fost de parere ca trebuie sa se puna in executare hotararea de evacuare”.
      S-a nascut o contradictie intre cei doi lideri comunisti locali, provenita din faptul ca Ilie Matei era fostul prim-secretar
      al judetului Timisoara, iar Balan ii luase locul doar de o luna si jumatate. Conform unor surse din Primaria Timisoarei,
      Matei cunostea foarte bine cazul Tokes, fusese implicat in emiterea ordinului de evacuare si il considera pe Balan inca
      nefamiliarizat cu situatia judetului si cu a lui Tokes in particular. Radu Balan nu dorea sa-si inceapa conducerea judetului
      cu acte de violenta si, in plus, fiind prizonierul unei imagini clasice, larg raspandite, ca Timisoara este un oras
      civilizat, a mizat pe reactia civilizata a cetatenilor. Pentru Ilie Matei insa, proaspat promovat secretar in CC, ordinul
      lui Ceausescu era litera de lege. Faptul ca Balan a refuzat sa execute acest ordin a generat starea de conflict si poate
      si un telefon la Bucuresti. Avem astfel ipoteza unei diferente majore de opinie tocmai la nivelul deciziei superioare
      pe plan local. Mai tarziu, in seara zilei de 17 decembrie, Balan ii va declara revolutionarului Ioan Savu: ”Am vorbit
      cu oamenii, Savule. Am vorbit, dar n-am putut face mai mult pentru ca sosise Matei, pentru ca venisera generalii”. Sa
      ne lamurim asupra problemei evacuarii lui Laszlo Tokes. In primul rand sa reamintim ca acesta ocupa ilegal apartamentul
      din cladirea situata in Strada Timotei Cipariu. In al doilea rand, legalitatea actiunii de evacuare era stabilita prin
      Codul de Procedura Civila. Potrivit prevederilor art. 385 din Codul de Procedura Civila, in vigoare la acea data, ”nici
      o executare nu se va putea face inainte de ora 8 dimineata si dupa ora 6 seara”. Dar art. 386, in vigoare la acea data,
      prevedea ca ”executarea silita nu se va putea face in zilele nelucratoare, potrivit legii, afara de cazurile urgente
      in care executarea poate fi incuviintata de presedintele instantei de executare”. Asadar, in caz de urgenta, Tokes putea
      fi evacuat in orice zi, intre ora 8:00 si 18:00, cu incuviintarea presedintelui Tribunalului Timis, daca intervenea
      un ”caz de urgenta”. Intamplarile din noaptea de 15 spre 16 decembrie nu intruneau conditiile cazului de urgenta, astfel
      ca ordinul de evacuare fortata dat de Ceausescu era ilegal. In jurul orei 12:00, in dreptul imobilului in care locuia
      Tokes erau stranse aproximativ 30 de persoane. De aceasta data, procentul curiosilor, al celor care poate incercau o
      solidarizare muta cu pastorul Tokes, este dominant; dintre cele aproximativ 30 de persoane lipsesc indivizii lumii interlope
      din ziua precedenta. La ora 13:00, maiorul Radu Tinu il suna la Bucuresti pe seful Directiei I din DSS, colonelul Ratiu,
      si ii raporteaza, printre altele: ”Nu e bine ce se intampla. E o balbaiala la partid, habar n-au ce sa faca”. Este vorba,
      fara indoiala, de conflictul Balan-Matei din sediul CJP. La cateva minute dupa ora 14:00, strazile din apropiere se
      anima si tramvaiele devin ceva mai aglomerate. Pentru cei care nu sunt familiarizati cu Piata Maria din Timisoara, trebuie
      precizat ca aceasta este un nod important de circulatie, locul unde angajatii intreprinderilor de la periferie schimba
      tramvaiele venite din trei directii diferite, pentru tramvaiele care circula spre centru. In Piata Maria, in mod normal
      la ore de varf, se adunau pentru a lua alte mijloace de transport multe sute de persoane. Asadar, posibilitatea de a
      vedea ce se intampla cativa pasi mai incolo, la parohiala, era maxima, iar sansele ca un calator curios sa intarzie
      pentru a afla ce se intampla treceau mult peste 50%. Era sambata si programul de lucru al intreprinderilor timisorene
      se incheia la ora 14:00. In jurul orei 16:00, in Strada Timotei Cipariu apare un grup compact, de aproximativ 60-70
      de persoane, care se opresc in dreptul casei lui Tokes, ocupand si o parte din carosabil. Securitatea isi trimite rapid
      oamenii printre cei veniti, iar Radu Tinu se duce personal pentru a afla ce se intampla. De la ziaristul Teodor (Doru)
      Burza, venit in scurt timp si el la fata locului, afla ca sunt sindicalisti trimisi de primarul Petre Mot sa impiedice
      adunarea manifestantilor si, la nevoie, sa-i imprastie. Prin aceasta decizie stupida, autoritatile locale constituie
      ele insele un grup masiv de peste 100 de persoane in fata casei lui Tokes, trezind curiozitatea trecatorilor. Multi
      dintre ei se vor opri si apoi vor ramane pe loc pentru a vedea ce se mai intampla. Altii vor stationa un timp, se vor
      duce acasa sa manance si sa-si rezolve unele probleme casnice, insa hotarati sa revina pe seara. Sindicalistii - persoane
      cu functii pe linie de sindicat din mai multe intreprinderi timisorene - devin cu timpul agitati, lasati acolo fara
      nici o conducere, impiedicati sa se duca acasa dupa terminarea programului, preocupati ca si restul persoanelor prezente
      de lipsurile zilnice, enervati ca pierd timpul intr-un loc lipsit de interes. Li se spusese ca in Timotei Cipariu este
      un grup violent de iredentisti, de unguri care vor sa impiedice punerea in aplicare a unei hotarari judecatoresti. Nu
      se intampla nimic din toate astea. In aceasta manevra tipica mentalitatilor comuniste care dominau gandirea activistilor
      de partid, de jos si pana la Bobu si Ceausescu, trebuie identificat continutul discutiilor telefonice de noapte si dimineata
      dintre Ceausescu si Balan. LOCUL. Sindicalistii trebuia sa sparga ”mitingul” de la casa parohiala a lui TÃ¶kes Informatiile
      obtinute de Comisia senatoriala despre convorbirile telefonice la inalt nivel politic intre Timisoara si Bucuresti provin
      exclusiv de la factori politici locali. Era de asteptat ca in declaratiile lor ulterioare, date in procese sau in fata
      Comisiei, sa ascunda gafa monumentala pe care au facut-o, dovada a ingustimii gandirii lor si a incapacitatii de a conduce
      o structura, de a gestiona o situatie oarecare. Le era extrem de greu sa recunoasca faptul ca sunt autorii primei aglomerari
      importante de oameni din Timotei Cipariu si mai ales ca sindicalistii pe care i-au trimis acolo, ”reprezentantii clasei
      muncitoare”, ”forta inaintata a partidului” etc., pactizasera cu micul grup de enoriasi si simpatizanti de acolo, satui
      de propaganda, de minciuna, de conditiile mizerabile de trai si de salarii diminuate. Teza unei multimi de 1.000 de
      persoane prezente in dimineata sau dupa-amiaza zilei de 16 decembrie nu este realista. Nici autorii cei mai entuziasti
      si inclinati spre exagerari nu confirma aceste cifre, nici jumatate, nici macar un sfert. In dupa-amiaza de 16 decembrie,
      Emil Bobu va lua si alte masuri, asa cum aflam din declaratia adjunctului sau, Nicolae Mihalache: ”La data de 16 decembrie
      1989, la ora 16:30, din ordin, m-am prezentat la Bobu Emil care, de fata cu Constantin Radu, mi-a spus urmatoarele:
      ”Vei pleca la Timisoara. In cursul acestei nopti va trebui sa fie evacuat un pastor, problema de care se vor ocupa organele
      Ministerului de Interne. Cumpanasu Ion va discuta cu pastorul si ii va preciza noua parohie. Toate indicatiile necesare
      au fost transmise si primului secetar Radu Balan. Tu nu vei avea alta sarcina decat aceea de a ma informa cu evolutia
      situatiei de la Timisoara””. Avem posibilitatea acum sa incercam o reconstituire a evenimentelor si din punctul de vedere
      al Securitatii, punct de vedere care a lipsit din analizele anterioare. In primul rand, trebuie subliniat ca supravegherea
      adunarilor de oameni in fata casei lui Tokes reprezenta doar un aspect, o parte a activitatii Securitatii Timis, care
      era mult mai complexa. Din punct de vedere strict profesional, adunarea oamenilor acolo ii deranja pe securisti in indeplinirea
      misiunii lor, atat prin faptul ca le mobiliza fortele pentru a depista prezenta unor eventuali instigatori din afara
      sau din interior, cat si prin faptul ca perturba operatiile de supraveghere asupra lui Tokes. Este clar ca in momentul
      in care s-au implicat autoritatile locale, Securitatea s-a retras in interiorul misiunilor sale stricte de urmarire
      informativa. Si sa nu uitam ca avea in zona cateva coloane de ”turisti” sovietici care tot declarau ca se duc in Iugoslavia
      sa petreaca Craciunul, dar nu mai paraseau imprejurimile Timisoarei. Ei nu se cazau la hoteluri si dormeau peste noapte
      in masini. Dormitul peste noapte in masina, la jumatatea lui decembrie, presupune fie o rezistenta fizica iesita din
      comun, fie folosirea intensa, pe durata intregii nopti, a sistemului de incalzire al autoturismului, fapt care produce
      un consum de combustibil foarte greu de recuperat. Iarasi nu trebuie sa uitam ca nu se gasea benzina si ca la statiile
      de alimentare erau cozi imense, zi si noapte. Este imposibil sa neglijam aceste detalii ale unor intamplari nefiresti
      si ilogice. Coloanele de turisti se aflau la doar cativa kilometri de Iugoslavia si totusi nu treceau granita. In cursul
      zilei, unul sau doua autoturisme din coloana plecau in recunoastere prin oras, oprindu-se in apropierea unor locuri
      care vor deveni ”aprinse” incepand cu seara zilei de 16 decembrie - in fata Consiliului Judetean, in dreptul aleii ce
      ducea la Opera, pe strazile din vecinatatea casei lui Tokes. In dimineata aceleiasi zile, doua tiruri sovietice vor
      stationa pe interzis in apropierea unor unitati militare din Timisoara, ingreunand accesul. Vor fi indepartate de Militie.
      Mirko Atanaskovici, consulul iugoslav de la Timisoara, care va fi acuzat in timpul proceselor revolutiei ca s-a implicat
      in revolta si se va apara dupa aceea ca nu a depasit ”cu nimic ceea ce e prevazut in Conventia Internationala privind
      relatiile diplomatice internationale”, facea in saptamana 10-16 decembrie trei si chiar cinci deplasari pe zi in Iugoslavia
      si inapoi. El nu stie sau nu vrea sa spuna ca urmarirea sa nu se reducea la un granicer care ii numara iesirile si intrarile
      pe la granita, ci era supravegheat pe teritoriul Iugoslaviei si interceptat de la Belgrad, astfel ca Directia de Contrainformatii
      a Securitatii cunostea unde si in ce masura incalca prevederile Conventiei Internationale. In plus, el isi activase
      propria retea de informatii, intre care unii agenti ai sai au fost identificati la casa parohiala. Precizam ca in orasul
      Timisoara se mai aflau cateva obiective ale supravegherii operative, asemanatoare lui Tokes.'
  - source_sentence: AKP'li vekilin traktör açıklamasına tepki
    sentences:
    - Cumhuriyet Halk Partisi (CHP) Niğde Milletvekili Ömer Fethi Gürer, “Türkiye’de AK Parti’den önce traktör yoktu” diyen
      AK Parti Grup Başkanvekili ve Ankara Milletvekili Leyla Şahin Usta’ya tepki gösterdi. Usta’nın Meclis Genel Kurulu’ndaki
      konuşmasını, “İnkarcılığın bu kadara da pes” diyerek eleştiren CHP Milletvekili ve TBMM Tarım, Orman ve Köyişleri Komisyon
      Üyesi Ömer Fethi Gürer, Osmanlı Döneminde bile 4 traktörün olduğunu anımsattı. “ATATÜRK’ÜN TRAKTÖR ÜZERİNDEKİ FOTOĞRAFLARINA
      İYİ BAKIN” 1923 yılında Cumhuriyet kurulduğunda, Büyük Önder Mustafa Kemal Atatürk’ün ilk talimatlarından birinin de
      tarımda makineleşmenin gerçekleşmesi yönünde olduğunu hatırlatan Milletvekili Gürer, “Bu nedenle 221 traktör ithal edildi.
      Atatürk’ün de üzerinde olduğu traktör fotoğrafları arşivlere girildiğinde görülebilir” dedi. ATATÜRK ASKERE GİDEN ÇOCUKLARA
      TRAKTÖR EĞİTİMİ VERİLMESİNİ İSTEMİŞTİ CHP Milletvekili Ömer Fethi Gürer, Atatürk’ün askere giden köylü çocuklarına traktör
      kursu verilerek, ileride traktör sayısı artacağı için gençlerin köylerine döndüklerinde, traktör kullanıyor olmalarının
      sağlanmasını istediğini de ifade etti. 1980’LERDE TRAKTÖR ÜRETİMI HIZLA ARTTI Türkiye’de 1944 yılında 956 traktörün
      bulunduğuna işaret eden CHP Milletvekili Ömer Fethi Gürer, “1960 yılında ülkemizde 42 bin 136 traktör vardı ki, Türkiye
      o dönemde traktör üretimine de başlamıştı. 1980’lere kadar traktör üretimi hızla arttı. 1980’lerden sonra traktör fabrikalarından
      birinde ben de genel müdür olarak görev yaptım. Ama AK Parti Grup Başkanvekilinin sözlerini duyunca, insana ‘Bu kadar
      da olmaz’ dedirtiyor. Sanayi ve Teknoloji Bakanı da bu konuşma olurken Mecliste genel kurulunda idi. En azından Bakan
      bir düzeltme yapmalı idi. Grup Başkanvekili Usta bu sözlerinden sonra da konuştu ancak bir düzeltme yapmadı. Görünen
      o ki sözlerini düzeltme yerine hala öyle sanıyor. Cumhuriyet tarihi bilmemek de böyle bir şey” diye konuştu. 2000 YILINDA
      1 MİLYONA YAKIN TRAKTÖR VARDI “Türkiye’de traktörün olmadığını iddia etmenin, iddia sahibinin ülkemizin dününün sanayide
      gelişmelerini de bilmediğini gösterir” diyen Milletvekili Gürer, “Çünkü 2000 yılına gelindiğinde ülkemizde traktör sayısı
      941 bin 843 adetti. 1 tane değil, 5 tane değil, 10 tane değil, neredeyse 1 milyon traktör vardı ülkemizde” dedi. Gürer
      bir traktör fabrikasında 1980 sonrası yönetici olarak çalıştığını da ifade ederek 1960’lardan sonra ülkede üretimi yapılan
      traktörler ile Türkiye’nin önemli bir aşamaya geldiğini ifade etti. Gürer, “AKP’den önce bir şey yoktu masalının iş
      yaptığı sanısı bundan sonra da benzer açıklamaların olmasını olası kılıyor. Cumhuriyet tarihini bilmeyenler sanayi ununun,
      şekerin, bezin ithal olduğunu ve ülkemizde Cumhuriyetin ilk yıllarında yapılan fabrikalarla üretildiğini öğrenmeyenler,
      fabrika yapan fabrika olduğu gibi tiyatro salonlarına dahi sahip şeker fabrikalarını yapmak değil satmaktan anlayanların,
      ülkenin dünü-bugünü arasında kamuda sata sata bitiremedikleri varlıkların nasıl oluştuğunu ve halen dünya Endüstri 5.0
      geçmişken Endüstri 3.5’te debelendiğini göstermemek için her türlü ifadeyi rahatlıkla kullanabiliyorlar” diye konuştu.
    - Meteoroloji Genel Müdürlüğü tarafından yapılan uyarının ardından Tekirdağ'da etkili olan kar yağışı İstanbul'un sınırına
      dayandı. Meteoroloji Genel Müdürlüğü tarafından yapılan uyarıların ardından Tekirdağ'da bu sabah saatlerinde kar yağışı
      etkili oldu. Kar yağışı şehrin yüksek kesimlerini ve evin çatılarına beyaz örtü ile kaplarken, sabah işe çıkmak için
      arabalarına binen sürücülerde yollarda ilerlemekte güçlük çekti. Etkisini sürdüren kar yağışı Tekirdağ sınırındaki İstanbul'un
      kapısına dayandı. (İHA)
    - 'Milli Eğitim Bakanı Tekin, 24 Kasım Öğretmenler Günü dolayısıyla sosyal medya hesabından bir mesaj yayımladı. Mesajında,
      100 yıldır var olan şanlı Cumhuriyet''in ilelebet payidar kalmasında öğretmenlerin her zaman en önemli görevi üstlendiğini
      belirten Tekin, ”Aziz milletimiz, en çetin ve en mihver zamanlarda dahi görevini özveriyle ifa eden, vatan evlatlarının
      yarınları için canı gönülden çalışarak daha müreffeh bir geleceği tahayyül eden meslektaşlarımın omuzlarında yükselecek.”
      değerlendirmesinde bulundu. 100 yıldır var olan şanlı Cumhuriyetimizin ilelebet payidar kalmasında her zaman en önemli
      görevi üstlenen kıymetli Öğretmenim! Aziz milletimiz, en çetin ve en mihver zamanlarda dahi görevini özveriyle ifa eden,
      vatan evlatlarının yarınları için canıgönülden çalışarak daha… pic.twitter.com/074mzguYYn — Yusuf Tekin (@Yusuf__Tekin)
      November 22, 2023 Bakan Tekin, şunları kaydetti: ”Türkiye Yüzyılı''nın mimarları olmanız, evlatlarımızın ülkemize faydalı
      bir nesil olarak yetişmesinde sarf ettiğiniz emek ve maarif davamıza ruh katan vakur duruşunuz için sizlere minnettarım.
      Uhdenize emanet edilen öğrencilerinizi, bir anne, bir baba şefkatiyle benimseyip her daim onları düşündüğünüzü biliyorum.
      O sebepledir ki ülkemizin tüm başarısı, Sayende Öğretmenim.” Tekin, Bakanlık tarafından hazırlanan ”Sayende” adlı kısa
      filmi de paylaştı. Sanatçılar filmde gönüllü olarak yer aldı Milli Eğitim Bakanlığının 24 Kasım Öğretmenler Günü kutlamaları
      içi hazırladığı ”Sayende” adlı kısa filmde Gülen Karaman, Ziya Kürküt, Zuhal Yalçın, Sefa Zengin, Gülçin Gülrek ve Özge
      İnce rol aldı. Arzu Balkan''ın seslendirdiği filmde müzik, edebiyat, tiyatro ve sporla ilgilenen dört öğrencinin sorunlarını,
      kendi evlatlarının sorunlarıymış gibi benimseyen öğretmenlerin, onların hayatlarına dokunuşu konu edildi. Dört öğrencinin
      farklı alanlarda çalışma yaparken yaşadıkları zorluklar ekrana yansıtılırken öğretmenlerinin bu sorunlara çözüm bulmak
      için düşüncelerine yer verildi. Öğretmenler odasındaki mutlu finalde öğrenciler, onlara yol gösteren öğretmenleri ile
      buluşup Öğretmenler Günü''nü kutladı. Tüm sanatçıların gönüllü olarak rol aldığı projenin çekimleri Kabataş Lisesi,
      Maçka Mesleki ve Teknik Anadolu Lisesi ile Nişantaşı Anadolu Lisesi''nde gerçekleştirildi.'
