- source_sentence: Google, Fransa Rekabet Kurumu'nun verdiği cezayı temyize götürecek
  sentences:
  - Google France'ın Yönetim Kurulu Başkanı Sebastien Missoffe, Rekabet Kurumunun ceza kararının bazı unsurlarına katılmadıklarını
    ve ”eser sahibinin haklarına komşu hakları uygulamak için gösterdikleri çabaya karşın ceza miktarını fazla bulduklarını”
    belirtti. Missoffe, Fransa'da imzalanan anlaşmalara sadık kaldıklarını ve eser sahibinin haklarına komşu hakları tanıdıklarını
    ifade etti. Rekabet Kurumunun geçen ay kendisinden istediği ”yayınevleri ve basın ajanslarına telif hakkına tabi içeriklerinin
    kullanımı için ücret teklifi sunması” ihtarına uyduklarını aktaran Missoffe, ”Teklifimizi 1200'den fazla gazete yayımcısına
    götürdük, anlaşmalarımızın belli yönlerini değiştirdik” dedi. Google'ın başvurusu Paris Temyiz Mahkemesinde incelenecek.
  - 'Anadolu Efes, ligde 15 kezle en fazla şampiyonluk yaşayan takım unvanına sahip. Adını 2011-2012 sezonunda Anadolu Efes
    olarak değiştiren Efes Pilsen, lig tarihinde ilk şampiyonluğunu 1978-1979 sezonunda kazandı. Lacivert-beyazlılar, ligde
    2001-2002, 2002-2003, 2003-2004 ve 2004-2005 sezonlarında üst üste 4 şampiyonluk yaşadı. Anadolu Efes, Süper Lig''de son
    olarak 2020-2021 sezonunu şampiyon tamamladı. Fenerbahçe''nin 10 şampiyonluğu var Fenerbahçe''nin Basketbol Süper Ligi''nde
    10 şampiyonluğu bulunuyor. İlk şampiyonluğunu 1990-1991 sezonunda yaşayan sarı-lacivertli takım, daha sonra 16 yıl şampiyon
    olamadı. 2006-2007 sezonunda Ülker ile sponsorluk anlaşması imzalayan ve Fenerbahçe Ülker olarak ligde mücadele eden sarı-lacivertliler,
    16 yıl aradan sonra şampiyon olarak, kulübün 100. yılında hasretine son verdi. Fenerbahçe Ülker, 2007-2008 sezonunda da
    şampiyonluğa ulaşıp tarihinde ilk kez üst üste iki kez zirveye çıktı. Efes Pilsen''e 2009-2010 sezonunda play-off final
    serisinde 4-2 üstünlük kurarak şampiyon olan sarı-lacivertliler, sonraki iki şampiyonluğunu Galatasaray''a karşı elde
    etti. Fenerbahçe Ülker, 2010-2011 sezonunda play-off finalinde rakibini 4-2 ile geçerek kupayı kaldırdı. Sarı-lacivertliler,
    2013-2014 sezonunda da 3-3 eşitliğin olduğu play-off final serisinde Ülker Spor ve Etkinlik Salonu''ndaki son maça sarı-kırmızılı
    takım çıkmayınca, 6. kez şampiyon olarak rakibini şampiyonluk sayısında geride bırakmayı başardı. Fenerbahçe, 2015-2016
    sezonunda Anadolu Efes''i geçerek 7, 2016-2017 sezonunda da Beşiktaş Sompo Japan''a play-off finallerinde üstünlük sağlayarak
    8. kez şampiyonluğunu elde etti. Sarı-lacivertli takım, 2017-2018 sezonunda play-off finallerinde TOFAŞ''ı geçerek 9.
    şampiyonluğuna ulaştı. Fenerbahçe, geçen sezon da play-off finallerinde Anadolu Efes''e üstünlük sağlayarak 10. şampiyonluğunu
    kazandı. Galatasaray 5 kez şampiyon oldu Galatasaray, Basketbol Süper Ligi''nde 5 kez şampiyonluk kupasını müzesine götürdü.
    Sarı-kırmızılı takım, ilk şampiyonluk kupasını 1968-1969 sezonunda kazandı. Ligde play-off sistemine geçildikten sonra
    1984-1985 sezonunda finalde Fenerbahçe''ye ve 1985-1986 sezonunda da Efes Pilsen''e 2-1''lik üstünlük kurarak üst üste
    iki kez şampiyonluk kupasını müzesine götüren sarı-kırmızılılar, 1989-1990 sezonunda da play-off finalinde Paşabahçe''yi
    3-1 ile geçerek şampiyonluk yaşadı. Ligde 2012-2013 sezonunda play-off finalinde Banvit''e 4-1 üstünlük kuran sarı-kırmızılılar,
    23 yıllık şampiyonluk hasretine son verdi ve 5. şampiyonluğunu kazandı. Galatasaray, 2013-2014 sezonunda play-off final
    serisinde yönetim kurulunun kararıyla son maça çıkmadı. Türkiye Basketbol Federasyonu Yönetim Kurulu, play-off final serisinin
    7. maçını 20-0 Fenerbahçe Ülker lehine tescil ederek, sarı-lacivertli takımı şampiyon ilan etti. Beşiktaş''ın 2 şampiyonluğu
    var Beşiktaş, ligde iki kez şampiyonluğa ulaştı. Siyah-beyazlılar, 1974-1975 sezonunda 57 puanı bulunan Galatasaray''ın
    önünde 60 puanla ligi ilk sırada tamamlayarak, ilk şampiyonluğunu elde etti. Beşiktaş, 2011-2012 sezonunda ise play-off
    final serisinde Anadolu Efes''e 4-2 üstünlük kurup, 37 yıl sonra mutlu sona ulaşarak ligde ikinci kez şampiyon oldu. Eczacıbaşı
    da 8 kez şampiyonluk sevinci yaşadı Basketbol şubesini yıllar önce kapatan Eczacıbaşı, ligde 8 şampiyonluk kazandı. Ligde
    İTÜ 5, Ülkerspor da 4 kez kupayı müzesine götürdü. İlk şampiyon Altınordu 1966-1967 sezonuyla başlayan Deplasmanlı Erkekler
    Basketbol Birinci Ligi''nde ilk şampiyonluğu Altınordu kazandı. Ligde 1983-1984 sezonunda play-off sistemine geçildi ve
    bu tarihten itibaren lig şampiyonu, play-off maçlarının ardından belirlendi. Pınar Karşıyaka ve TOFAŞ''ın ikişer, Muhafızgücü''nün
    de ligde bir şampiyonluğu bulunuyor. 2019-2020 sezonunu tamamlanamadı Basketbol Süper Lig''inde 2019-2020 sezonu yeni
    tip koronavirüs salgını nedeniyle tamamlanamadı. Salgın nedeniyle lige 23. hafta maçlarının ardından 19 Mart''ta ara verilirken,
    Türkiye Basketbol Federasyonu Yönetim Kurulu 11 Mayıs''ta sezonu şampiyon ilan edilmeden ve küme düşme olmadan sonlandırma
    kararı aldı. Şampiyonlar Basketbol Süper Ligi''nde şampiyon olan takımlar şöyle:'
  - Markaların ve perakendecilerin sınır ötesi bir e-ticaret şirketi kurmalarına yardımcı olan Flow, New Enterprise Associates
    liderliği üstlendiği B Serisi yatırım turunda 37 milyon dolar yatırım aldığını açıkladı. Yatırım turuna katılan diğer
    isimler American Express Ventures, Latitude Ventures, Liza Landsman oldu. 37 milyon dolarlık yeni yatırımla birlikte Flow'un
    aldığı toplam yatırım miktarı 55 milyon dolara yükseldi. Şirket, 37 milyon doları Flow'ın satış ve pazarlama ekibini genişletmek
    ve ürünü geliştirmek için kullanacağını açıkladı. Flow CEO'su Rob Keve, sosyal medya ve dijital pazarlamanın büyüsü sayesinde,
    tüketiciye yönelik birçok markanın globaldeki tüketicilere ulaştığını söyledi. Bununla birlikte, bu tüketiciler için gerçek
    alışveriş deneyiminde nakliye genellikle yavaş ya da pahalı olarak karşımıza çıkıyor. Ayrıca site yerel ödeme hizmetleri
    ile bütünleşmekte başarısız olabiliyor. Flow ise hem e-ticaret sitesi hem de tüketici için bu sorunları ortadan kaldırmayı
    hedefliyor. Flow, mevcut e-ticaret platformlarının en üstünde yer alıyor. Böylece alışveriş deneyimi yerel fiyatlandırma
    ve ödeme seçenekleriyle otomatik olarak konumlarına uyarlanıyor. Ayrıca, Flow'un taşıyıcılarla olan ilişkileri sayesinde,
    uluslararası nakliye zamanında ve uygun fiyatlı hale getiriliyor. Bir işletme, halihazırda uluslararası denizcilik fırsatları
    ve dağıtım merkezlerine sahip olsa bile lojistik yönetimi için Flow'u kullanabiliyor. 2015 yılında kurulan şirketin müşterileri
    arasında MZ Wallace ve Charles & Colvard gibi çok kanallı işletmelerin yanı sıra MVMT Watches gibi online markalar da
    bulunuyor. Flow, müşterilerinin yıldan yıla yüzde 200 oranında arttığının altını çiziyor.
