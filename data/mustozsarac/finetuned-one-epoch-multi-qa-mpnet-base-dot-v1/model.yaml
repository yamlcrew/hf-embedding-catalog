  - 'Taipei Intel Developer Forum‘da tanıtılan UrbanMax isimli ürün, Intel’in dizüstü ve netbook arasında gelip giden bir
    tasarım şeklini gösteriyor. UrbanMax, 11,1 inç (28 cm) köşegene sahip dokunmatik ekranıyla birlikte Windows Vista işletim
    sistemi çalıştıran hafif bir dizüstü bilgisayar. Aslında ilk bakışta bir tablet; fakat alt tarafından çıkan klavye, düz
    bir yüzeye yerleştirildiğinde açılarak bir dizüstü bilgisayara dönüşüyor. Tabii, etkin olarak kullanabiliyorsanız, her
    zaman bir ekran klavyeniz var. {pagebreak::İçinde Neler Var?} İçinde Ne Var? UrbanMax isimli prototip, içinde MacBook
    Air’larda kullanılan ufaltılmış bir Core 2 Duo işlemci barındırıyor. 1366×768 piksellik ekran yeterince keskin bir görüntü
    üretecek kadar piksele sahip durumda. Ayrıca bu küçük makinede HD video oynatabilmek de mümkün olacak deniliyor. Enerji
    tasarrufu açısından bir de SSD maliyetini bu ürüne eklememiz gerekiyor. Bunların haricinde içinde Intel’in en son geliştirdiği
    ve her türlü kablosuz bağlantı teknolojisini de destekleyen bir kart olduğu düşüncesi çok yanlış değil. :: UrbanMax, dev
    bir iPhone’a benziyor mu? Bilgi için: Intel Yazan: Berkin Bozdoğan'
  - By Euronews Fransa'da aşırı sağcı lider Marine Le Pen Paris'i ziyaret eden Mısır Devlet Başkanı Abdulfettah El-Sisi'nin
    Fransa'nın sağlam bir müttefiği olmalı dedi. REKLAM Fransa'da aşırı sağcı lider Marine Le Pen Paris'i ziyaret eden Mısır
    Devlet Başkanı Abdulfettah El-Sisi'nin Fransa'nın sağlam bir müttefiği olmalı dedi. Sosyal medya hesabından paylaşımda
    bulunan Le Pen ”Bölgede istikrarın çıpası olan ve ülkesinde Müslüman Kardeşleri bastıran Mısır Devlet Başkanı El-Sisi
    Fransa'nın güçlü bir müttefiği olmak zorunda özellikle Türkiye'nin Libya konusundaki provokasyonları ve terörizmle mücadele
    konusunda,” ifadelerini kullandı. Bu açıklamada ayrılıkçılık ve radikal İslam'la mücadele için hazırlanan tasarının bakanlar
    konseyine sunulmasından birkaç gün önce geldi. Le Pen tasarının doğru yönde atılmış adımlar içerdiğini fakat kanunun herkesi
    hedef almak yerine İslamcılığa daha fazla odaklanması gerektiğini belirtmişti. Paris ziyaretinde Fransa Cumhurbaşkanı
    Emmanuel Macron'la bir araya gelecek olan El-Sisi, Libya ve terörizmle mücadele dahil bir çok bölgesel konuyu ele alacak.
