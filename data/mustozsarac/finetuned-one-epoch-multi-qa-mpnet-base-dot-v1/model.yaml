      eden Darmanin, Calais kentine gideceği bilgisini paylaştı. Calais'de bulunan ve kötü şartlar içinde yaşam mücadelesi
      veren çok sayıda düzensiz göçmen İngiltere'ye gitmeye çalışıyor. İngiltere'ye bu ay içinde yaklaşık 2 bin göçmenin geleceği
      tahminine karşın sadece ilk 11 günde 3 bin 780 kişi Fransa üzerinden ülkeye giriş yaptı. Fransa'nın kuzeyindeki Grand-Synthe
      kentinde yol kenarlarında barınan yaklaşık 1500 düzensiz göçmen, 16 Kasım'da polisin düzenlendiği operasyonla barınma
      merkezlerine taşınmıştı.
