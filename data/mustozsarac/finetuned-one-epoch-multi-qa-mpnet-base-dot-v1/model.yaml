  - By euronews Fransa'dan Manş Denizi üzerinden İngiltere'ye geçmeye çalışan ve düzensiz göçmenleri taşıyan teknenin batması
    sonucu en az 31 göçmen hayatını kaybetti. REKLAM Fransa'dan Manş Denizi üzerinden İngiltere'ye geçmeye çalışan ve düzensiz
    göçmenleri taşıyan teknenin batması sonucu en az 31 göçmen hayatını kaybetti. Fransa İçişleri Bakanlığı'ndan yapılan açıklamada,
    düzensiz göçmenlerin Fransa'nın Calais kentinden Manş Denizi üzerinden tekneyle İngiltere'ye ulaşmaya çalıştığı belirtildi.
    Cumhurbaşkanı Emmanuel Macron, göçmenlerin ölüm haberi üzerine yaptığı açıklamada, ilgili bakanların acil olarak toplanmasını
    istedi ve ”Fransa, Manş Denizi'nin mezarlığa dönüşmesine izin vermeyecek.” dedi. Manş Denizi'nde yaşanan insani dramın
    sorumlularının derhal bulunacağı sözünü veren Macron, AB Sınır Koruma Ajansı'nın (Frontex) Manş Denizi'nde sınır güvenliğinin
    korunması konusunda imkanlarının artırılmasını istedi. Başbakan Jean Castex ise ilgili 8 bakanın katılımıyla yarın konuyla
    ilgili acil bir toplantı düzenleneceğini duyurdu. İçişleri Bakanı Gerald Darmanin, göçmenlerin yasa dışı bir şekilde denize
    açılmalarını sağladıklarından şüphelenilen 4 kişinin gözaltına alındığı duyurdu. İngiltere Başbakanı Johnson acil toplantı
    düzenledi İngiltere Başbakanı Boris Johnson ise ilgili bakanlarıyla bu akşam acil bir toplantı düzenleyerek, Manş Denizi'nde
    yaşanan trajediyi görüştü. Johnson daha sonra basına yaptığı açıklamada üstü kapalı Fransa'yı suçlayarak, ”Bazı ortaklarımızı,
    özellikle de Fransızları son gelişmelerle ilgili duruma ayak uydurmaya ikna etmekte zorlandık, ancak bu konuda tüm ülkelerin
    karşı karşıya olduğu zorlukları anlıyorum.” dedi. Bir balıkçının Manş Denizi'nde cesetler görmesi üzerine yetkililere
    haber verdiği ifade edilen açıklamada, düzensiz göçmenleri taşıyan teknenin battığı, yapılan aramanın ardından ilk belirlemelere
    göre 5 düzensiz göçmenin de bilincini kaybettiği kaydedildi. İçişleri Bakanı Gerald Darmanin, Twitter hesabından yaptığı
    açıklamada, yaşanan bu dram nedeniyle üzüntü duyduğunu belirtti. Düzensiz göçmenlerin tekneyle İngiltere'ye geçişini sağlamaya
    çalışanların suçlu olduğunu ifade eden Darmanin, Calais kentine gideceği bilgisini paylaştı. Calais'de bulunan ve kötü
    şartlar içinde yaşam mücadelesi veren çok sayıda düzensiz göçmen İngiltere'ye gitmeye çalışıyor. İngiltere'ye bu ay içinde
    yaklaşık 2 bin göçmenin geleceği tahminine karşın sadece ilk 11 günde 3 bin 780 kişi Fransa üzerinden ülkeye giriş yaptı.
    Fransa'nın kuzeyindeki Grand-Synthe kentinde yol kenarlarında barınan yaklaşık 1500 düzensiz göçmen, 16 Kasım'da polisin
    düzenlendiği operasyonla barınma merkezlerine taşınmıştı.
