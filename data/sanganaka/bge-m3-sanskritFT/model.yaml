- source_sentence: These bodhisattvas were named
  sentences:
  - अमुष्मै त्वा वज्रम् प्रहरामीति यद्यभिचरेद्वज्रो वै स्फ्य स्तृणुते हैवैनेन ॥
  - तद्यत्स्रुचः सम्मार्ष्टि यथा वै देवानां चरणं तद्वा अनु मनुष्याणां तस्माद्यदामनुष्याणाम् परिवेषणमुपक्ल्प्तम् भवति ॥
  - सुमतिना च । सुजातेन च ।
- source_sentence: The cart further is (one of the means of) the sacrifice; for the cart is indeed (one of the means of) sacrifice.
    To the cart, therefore, refer the (following) Yagus-texts, and not to a store-room, nor to a jar.
  sentences:
  - अररो दिवम् मा पप्त इति यत्र वै देवा अररुमसुररक्षसमपाघ्नत स दिवमपिपतिषत्तमग्निरभिन्यदधादररो दिवम् मा पप्त इति स न दिवमपत्तथो
    एवैनमेतदध्वर्युरेवास्माल्लोकादन्तरेति दिवो ऽध्यग्नीत्तस्मादेवं करोति ॥ अथ तृतीयम् प्रहरति । द्रप्सस्ते द्याम् मा स्कन्नित्ययं
    वाअस्यै द्रप्सो यमस्या इमं रस प्रजा उपजीवन्त्येष ते दिवम् मा पप्तदित्येवैतदाह व्रजं गच गो । । । मौगिति ॥
  - अचिद्रमेवैनमेतदग्निना परिगृह्णाति नेदेनं नाष्ट्रा रक्षांसि प्रमृशानित्यग्निर्हि रक्षसामपहन्ता तस्मात्पर्यग्निं करोति ॥
  - गृहा वै गार्हपत्यो गृहा वै प्रतिष्ठायाम् प्रतितिष्ठति तथो हैनमेष वज्रो न हिनस्ति तस्माद्गार्हपत्ये सादयति ॥
- source_sentence: He lived with the deportment of a buddha, and his superior intelligence was as wide as an ocean.
  sentences:
  - न हि भदन्तोपाले आपत्तिर् अध्यात्मप्रतिष्ठिता न बहिर्धासंक्रान्तो नोभयम् अन्तरेणोपलभ्यते ।
  - बुद्धेर्यापथप्रतिष्ठितः । सागरवरबुद्ध्यनुप्रविष्टः ।
  - सर्वत्रानुगता बोधिर् आकाशस्वभावत्वात् ।
- source_sentence: 'Further, ''The leader of oblations (yagña), the carrier of (Soma-)sacrifices (adhvara), '' for through
    him they lead forward all oblations, both the domestic oblations and the others: this is why he says ''the leader of oblations.
    '''
  sentences:
  - प्रणीर्यज्ञानां रथीरध्वराणामिति । एतेन वै सर्वान्यज्ञान्प्रणयन्ति ये च पाकयज्ञा ये चेतरे तस्मादाह प्रणीर्यज्ञानामिति ॥
  - चत्वारि संग्रहवस्तूनि कुलपुत्र बोधिसत्वस्य बुद्धक्षेत्रम् ।
  - अग्ने दीद्यतम् बृहदिति । चक्षुर्वै दीदयेव चक्षुरेवैतया समिन्द्धे ॥
- source_sentence: O Śākyamuni, conquering the powerful host of Māra, You found peace, immortality, and the happiness of that
    supreme enlightenment
  sentences:
  - न हि तथता द्वयप्रभाविता नानात्वप्रभाविता ।
  - अश्वो न देववाहन इति । अश्वो ह वा एष भूत्वा देवेभ्यो यज्ञं वहति यद्वै नेत्यृच्योमिति तत्तस्मादाहाश्वो न देववाहन इति ॥
  - मारस् त्वयास्तु विजितस् सबलो मुनीन्द्रः प्राप्ता शिवा अमृतशान्तवराग्रबोधिः ।
