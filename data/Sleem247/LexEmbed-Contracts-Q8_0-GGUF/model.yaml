- source_sentence: Notice Period To Terminate Renewal
  sentences:
  - After the initial period of two years, the maintenance and support       contract shall be automatically renewed for a
    period of one year on each       renewal date, unless one of the parties terminates the maintenance and       support
    contract through written notification to the other party in the       form of a registered letter with proof of receipt,
    at least six (6) weeks       prior to the renewal date.
  - Any Transfer  without such approval shall constitute a breach of this Agreement  and shall be void and of no  effect.
  - The Company shall do and perform, or cause to be done and performed, all such further acts and things, and shall execute
    and deliver all such other agreements, certificates, instruments and documents, as the MHR Funds may reasonably request
    in order to carry out the intent and accomplish the purposes of this Agreement and the consummation of the transactions
    contemplated hereby.
- source_sentence: Governing Law
  sentences:
  - In addition, the limitations in Section 23.1(b) will not apply (1) to Company's indemnification obligations under Section
    22.1(a) or (2) Allscripts indemnification obligations under Section 22.3(a), unless the Company's or Allscripts' indemnification
    obligation under Section 22.1(a) or 22.3(a), as the case may be, relates to the losses and obligations described in subclauses
    (a) through (f) of the preceding sentence. [***].
  - 'THIS AGREEMENT SHALL BE GOVERNED BY AND CONSTRUED IN ACCORDANCE WITH THE INTERNAL LAWS OF THE STATE OF NEW YORK APPLICABLE
    TO AGREEMENTS MADE AND TO BE PERFORMED ENTIRELY WITHIN SUCH STATE, WITHOUT REGARD TO THE CONFLICTS OF LAW PRINCIPLES OF
    SUCH STATE OTHER THAN SECTIONS 5-1401 OF THE NEW YORK GENERAL






    OBLIGATIONS LAW.'
  - All such records required to be created and maintained pursuant to Section 2.12(a) shall be kept available at the Operator's
    office and made available for the Owner's inspection upon request at all reasonable times.
- source_sentence: License Grant
  sentences:
  - SIERRA  hereby  grants  ENVISION an          exclusive,  royalty-free  sub-license of  the Product's future patents,          and
    patent  applications  to distribute,  sell  and market the Finished          Product.
  - Aucta should continue to receive 15% of Net Sales Royalty for as long as ETON is selling the Product(s) in the Territory,
    unless otherwise agreed to under this Agreement.
  - In the event FCE notifies ExxonMobil that it has formally decided not to pursue Generation 2 Technology for Power Applications,
    then upon ExxonMobil's written request, FCE agrees to negotiate a grant to ExxonMobil and its Affiliates, under commercially
    reasonable terms to be determined in good faith, a worldwide, royalty-bearing (with the royalty to be negotiated), non-exclusive,
    sub-licensable right and license to practice FCE Background Information and FCE Background Patents for Generation 2 Technology
    in any application outside of Carbon Capture Applications and Hydrogen Applications.
