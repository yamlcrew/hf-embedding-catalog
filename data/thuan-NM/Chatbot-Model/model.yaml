      update on production with updated database schemas but got bugs after that and need to revert things thats when migration
      comes into place database migration serves several key purposes schema evolution as applications evolve their data models
      change migrations allow developers to systematically update the database schema to reflect these changes ensuring that
      the database structure matches the application code version control migrations provide a way to version the database
      schema allowing teams to track changes over time this versioning helps in understanding the evolution of the database
      and aids in collaboration among developers consistency across environments migrations ensure that the database schema
      is consistent across different environments development testing production this reduces the risk of discrepancies that
      can lead to bugs and integration issues rollback capability many migration tools support rolling back changes allowing
      developers to revert to a previous state of the database if a migration causes issues this enhances stability during
      the development and deployment process automated deployment migrations can be automated as part of the deployment process
      ensuring that the necessary schema changes are applied to the database without manual intervention this streamlines
      the release process and reduces human error applying in golang projects to create a comprehensive production-grade setup
