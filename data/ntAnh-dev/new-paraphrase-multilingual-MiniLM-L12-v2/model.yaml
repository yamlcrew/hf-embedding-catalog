      - Đối với LHS Hiệp định: ĐHBK Hà Nội sẽ báo cáo, xin ý kiến Bộ Giáo dục và

      Đào tạo trước khi ra quyết định xử lý;

      - Đối với LHS ngoài Hiệp định và LHS trao đổi: Giám đốc ĐHBK Hà Nội quyết

      định.

