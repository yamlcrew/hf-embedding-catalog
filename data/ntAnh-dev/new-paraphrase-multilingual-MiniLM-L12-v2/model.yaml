    - 'Quy định về công tác tổ chức đội tuyển tham dự các kỳ thi Olympic môn học và kỳ thi về đổi mới, sáng tạo và khởi nghiệp

      Chương I NHỮNG QUY ĐỊNH CHUNG

      Điều 1. Phạm vi điều chỉnh

      Quy định này quy định về hoạt động tuyển chọn, bồi dưỡng đội tuyển và tham dự

      kỳ thi Olympic cấp quốc gia /quốc tế đối với các môn học /học phần đang được giảng

      dạy tại Đại học Bách khoa Hà Nội (sau đây gọi là ĐHBK Hà Nội hoặc Đại học) và các

      kỳ thi về đổi mới, sáng tạo và khởi nghiệp dành cho sinh viên (sau đây gọi chung là kỳ

      thi) do Giám đốc Đại học cử tham dự, bao gồm: mục đích, nhiệm vụ và quy trình thực

      hiện của các đơn vị liên quan, trách nhiệm và quyền lợi của c á nhân tham gia và

      phương thức hỗ trợ của Đại học.

      Điều 2. Thành viên tham gia đội tuyển

      1. Thành viên đội tuyển tham dự kỳ thi Olympic môn học phải là sinh viên , học

      viên (sau đây gọi chung là sinh viên) đang học tập tại ĐHBK Hà Nội.

      2. Thành viên đội tuyển tham dự kỳ thi về  đổi mới, sáng tạo và khởi nghiệp  là

      sinh viên đang học tập tại  ĐHBK Hà Nội hoặc các cơ sở giáo dục đại học  khác, tuy

      nhiên số lượng thành viên trong mỗi đội tuyển  tối thiểu 50% là sinh viên ĐHBK Hà

      Nội.

      Điều 3. Mục đích tham dự kỳ thi

      Mục đích tham dự kỳ thi  nhằm khuyến khích sự sáng tạo, tích  cực trong hoạt

