      tài; thúc đẩy tinh thần đổi mới sáng tạo và khởi nghiệp trong sinh viên; tạo tâm thế chủ

      động tìm kiếm, tự tạo việc làm  của sinh viên sau khi tốt nghiệp, đồng thời góp phần

      xây dựng thương hiệu và nâng cao vị thế của ĐHBK Hà Nội.

      '
    - 'Quy định về công tác tổ chức đội tuyển tham dự các kỳ thi Olympic môn học và kỳ thi về đổi mới, sáng tạo và khởi nghiệp

      Chương II QUY TRÌNH TUYỂN CHỌN VÀ TỔ CHỨC ĐỘI TUYỂN

      Điều 5. Tuyển chọn và tổ chức đội tuyển tham dự kỳ thi về đổi mới , sáng tạo

      và khởi nghiệp

      1. Sau khi có thông báo chính thức của cơ quan có thẩm quyền  về việc tổ chức kỳ

      thi về đổi mới, sáng tạo và khởi nghiệp , Phòng/Ban chức năng Công tác sinh viên lập

      kế hoạch tuyển chọn và tổ chức đoàn tham dự trình Giám đốc Đại học phê duyệt. Bản

      kế hoạch bao gồm: Phương án tuyển chọn đội tuyển; kế hoạch tổ chức  bồi dưỡng kiến

      thức cho đội tuyển; kế hoạch tổ chức đoàn tham dự kỳ thi  (đề xuất Trưởng đoàn và các

      thành viên của đoàn, thời gian thực hiện, phương tiện di chuyển và nơi lưu trú ) kèm dự

      toán chi tiết về chi phí t ham dự và đề xuất hỗ trợ của Đại học về cơ sở vật chất và kinh

      phí triển khai.

      2. Phòng/Ban chức năng Công tác sinh viên chủ trì phối hợp với các đơn vị liên

      quan trong ĐHBK Hà Nội tổ chức tuyển chọn đội tuyển tham dự kỳ thi về đổi mới ,

      sáng tạo và khởi nghiệp theo kế hoạch đã được Giám đốc Đại học phê duyệt.

      3. Sau khi tuyển chọn xong đội tuyển, Phòng/Ban chức năng Công tác sinh viên

      chủ trì phối hợp với các đơn vị liên quan trong và ngoài ĐHBK Hà Nội mời chuyên gia

      phù hợp bồi dưỡng kiến thức cho các thành viên của đội tuyển.

      4. Phòng/Ban chức năng Công tác sinh viên tổ chức đưa đội tuyển tham dự kỳ thi

      theo kế hoạch đã được  Giám đốc Đại học phê duyệt; thực hiện nghiêm túc quy định

      của Ban tổ chức kỳ thi ; giữ gìn hình ảnh và uy tín của ĐHBK Hà Nội.  Trong trường

