    \ no (1)\n        * ``float64``: no (1)\n        * ``float128``: no (1)\n        * ``bool``: no (1)\n\n        - (1) Parameters\
    \ of this augmenter are optimized for the value range of uint8.\n              While other dtypes may be accepted, they\
