    \    dictionary = {}\n    for idx, c in enumerate(string):\n        dictionary.update({c: idx})\n    return dictionary"
  - "def affine_transform(x, transform_matrix, channel_index=2, fill_mode='nearest', cval=0., order=1):\n    \"\"\"Return\
    \ transformed images by given an affine matrix in Scipy format (x is height).\n\n    Parameters\n    ----------\n    x\
    \ : numpy.array\n        An image with dimension of [row, col, channel] (default).\n    transform_matrix : numpy.array\n\
    \        Transform matrix (offset center), can be generated by ``transform_matrix_offset_center``\n    channel_index :\
    \ int\n        Index of channel, default 2.\n    fill_mode : str\n        Method to fill missing pixel, default `nearest`,\
    \ more options `constant`, `reflect` or `wrap`, see `scipy ndimage affine_transform <https://docs.scipy.org/doc/scipy-0.14.0/reference/generated/scipy.ndimage.interpolation.affine_transform.html>`__\n\
    \    cval : float\n        Value used for points outside the boundaries of the input if mode='constant'. Default is 0.0\n\
    \    order : int\n        The order of interpolation. The order has to be in the range 0-5:\n            - 0 Nearest-neighbor\n\
    \            - 1 Bi-linear (default)\n            - 2 Bi-quadratic\n            - 3 Bi-cubic\n            - 4 Bi-quartic\n\
    \            - 5 Bi-quintic\n            - `scipy ndimage affine_transform <https://docs.scipy.org/doc/scipy-0.14.0/reference/generated/scipy.ndimage.interpolation.affine_transform.html>`__\n\
    \n    Returns\n    -------\n    numpy.array\n        A processed image.\n\n    Examples\n    --------\n    >>> M_shear\
    \ = tl.prepro.affine_shear_matrix(intensity=0.2, is_random=False)\n    >>> M_zoom = tl.prepro.affine_zoom_matrix(zoom_range=0.8)\n\
    \    >>> M_combined = M_shear.dot(M_zoom)\n    >>> transform_matrix = tl.prepro.transform_matrix_offset_center(M_combined,\
    \ h, w)\n    >>> result = tl.prepro.affine_transform(image, transform_matrix)\n\n    \"\"\"\n    # transform_matrix =\
    \ transform_matrix_offset_center()\n    # asdihasid\n    # asd\n\n    x = np.rollaxis(x, channel_index, 0)\n    final_affine_matrix\
    \ = transform_matrix[:2, :2]\n    final_offset = transform_matrix[:2, 2]\n    channel_images = [\n        ndi.interpolation.\n\
    \        affine_transform(x_channel, final_affine_matrix, final_offset, order=order, mode=fill_mode, cval=cval)\n    \
    \    for x_channel in x\n    ]\n    x = np.stack(channel_images, axis=0)\n    x = np.rollaxis(x, 0, channel_index + 1)\n\
    \    return x"
  - "def leaky_relu6(x, alpha=0.2, name=\"leaky_relu6\"):\n    \"\"\":func:`leaky_relu6` can be used through its shortcut:\
    \ :func:`tl.act.lrelu6`.\n\n    This activation function is a modified version :func:`leaky_relu` introduced by the following\
    \ paper:\n    `Rectifier Nonlinearities Improve Neural Network Acoustic Models [A. L. Maas et al., 2013] <https://ai.stanford.edu/~amaas/papers/relu_hybrid_icml2013_final.pdf>`__\n\
    \n    This activation function also follows the behaviour of the activation function :func:`tf.nn.relu6` introduced by\
    \ the following paper:\n    `Convolutional Deep Belief Networks on CIFAR-10 [A. Krizhevsky, 2010] <http://www.cs.utoronto.ca/~kriz/conv-cifar10-aug2010.pdf>`__\n\
    \n    The function return the following results:\n      - When x < 0: ``f(x) = alpha_low * x``.\n      - When x in [0,\
    \ 6]: ``f(x) = x``.\n      - When x > 6: ``f(x) = 6``.\n\n    Parameters\n    ----------\n    x : Tensor\n        Support\
    \ input type ``float``, ``double``, ``int32``, ``int64``, ``uint8``, ``int16``, or ``int8``.\n    alpha : float\n    \
    \    Slope.\n    name : str\n        The function name (optional).\n\n    Examples\n    --------\n    >>> import tensorlayer\
    \ as tl\n    >>> net = tl.layers.DenseLayer(net, 100, act=lambda x : tl.act.leaky_relu6(x, 0.2), name='dense')\n\n   \
    \ Returns\n    -------\n    Tensor\n        A ``Tensor`` in the same type as ``x``.\n\n    References\n    ----------\n\
    \    - `Rectifier Nonlinearities Improve Neural Network Acoustic Models [A. L. Maas et al., 2013] <https://ai.stanford.edu/~amaas/papers/relu_hybrid_icml2013_final.pdf>`__\n\
    \    - `Convolutional Deep Belief Networks on CIFAR-10 [A. Krizhevsky, 2010] <http://www.cs.utoronto.ca/~kriz/conv-cifar10-aug2010.pdf>`__\n\
    \    \"\"\"\n    if not isinstance(alpha, tf.Tensor) and not (0 < alpha <= 1):\n        raise ValueError(\"`alpha` value\
    \ must be in [0, 1]`\")\n\n    with tf.name_scope(name, \"leaky_relu6\") as name_scope:\n        x = tf.convert_to_tensor(x,\
    \ name=\"features\")\n        return tf.minimum(tf.maximum(x, alpha * x), 6, name=name_scope)"
