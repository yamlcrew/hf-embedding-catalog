    \  \"\"\"\n    Augmenter to add falling snowflakes to images.\n\n    This is a wrapper around ``SnowflakesLayer``. It\
    \ executes 1 to 3 layers per image.\n\n    dtype support::\n\n        * ``uint8``: yes; tested\n        * ``uint16``:\
