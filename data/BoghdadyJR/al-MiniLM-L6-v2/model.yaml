    - "def build_act_with_param_noise(make_obs_ph, q_func, num_actions, scope=\"deepq\", reuse=None, param_noise_filter_func=None):\n\
      \    \"\"\"Creates the act function with support for parameter space noise exploration (https://arxiv.org/abs/1706.01905):\n\
      \n    Parameters\n    ----------\n    make_obs_ph: str -> tf.placeholder or TfInput\n        a function that take a\
      \ name and creates a placeholder of input with that name\n    q_func: (tf.Variable, int, str, bool) -> tf.Variable\n\
      \        the model that takes the following inputs:\n            observation_in: object\n                the output\
      \ of observation placeholder\n            num_actions: int\n                number of actions\n            scope: str\n\
      \            reuse: bool\n                should be passed to outer variable scope\n        and returns a tensor of\
      \ shape (batch_size, num_actions) with values of every action.\n    num_actions: int\n        number of actions.\n \
      \   scope: str or VariableScope\n        optional scope for variable_scope.\n    reuse: bool or None\n        whether\
      \ or not the variables should be reused. To be able to reuse the scope must be given.\n    param_noise_filter_func:\
      \ tf.Variable -> bool\n        function that decides whether or not a variable should be perturbed. Only applicable\n\
      \        if param_noise is True. If set to None, default_param_noise_filter is used by default.\n\n    Returns\n   \
      \ -------\n    act: (tf.Variable, bool, float, bool, float, bool) -> tf.Variable\n        function to select and action\
      \ given observation.\n`       See the top of the file for details.\n    \"\"\"\n    if param_noise_filter_func is None:\n\
      \        param_noise_filter_func = default_param_noise_filter\n\n    with tf.variable_scope(scope, reuse=reuse):\n \
      \       observations_ph = make_obs_ph(\"observation\")\n        stochastic_ph = tf.placeholder(tf.bool, (), name=\"\
      stochastic\")\n        update_eps_ph = tf.placeholder(tf.float32, (), name=\"update_eps\")\n        update_param_noise_threshold_ph\
      \ = tf.placeholder(tf.float32, (), name=\"update_param_noise_threshold\")\n        update_param_noise_scale_ph = tf.placeholder(tf.bool,\
      \ (), name=\"update_param_noise_scale\")\n        reset_ph = tf.placeholder(tf.bool, (), name=\"reset\")\n\n       \
      \ eps = tf.get_variable(\"eps\", (), initializer=tf.constant_initializer(0))\n        param_noise_scale = tf.get_variable(\"\
      param_noise_scale\", (), initializer=tf.constant_initializer(0.01), trainable=False)\n        param_noise_threshold\
      \ = tf.get_variable(\"param_noise_threshold\", (), initializer=tf.constant_initializer(0.05), trainable=False)\n\n \
      \       # Unmodified Q.\n        q_values = q_func(observations_ph.get(), num_actions, scope=\"q_func\")\n\n       \
      \ # Perturbable Q used for the actual rollout.\n        q_values_perturbed = q_func(observations_ph.get(), num_actions,\
      \ scope=\"perturbed_q_func\")\n        # We have to wrap this code into a function due to the way tf.cond() works. See\n\
      \        # https://stackoverflow.com/questions/37063952/confused-by-the-behavior-of-tf-cond for\n        # a more detailed\
      \ discussion.\n        def perturb_vars(original_scope, perturbed_scope):\n            all_vars = scope_vars(absolute_scope_name(original_scope))\n\
      \            all_perturbed_vars = scope_vars(absolute_scope_name(perturbed_scope))\n            assert len(all_vars)\
      \ == len(all_perturbed_vars)\n            perturb_ops = []\n            for var, perturbed_var in zip(all_vars, all_perturbed_vars):\n\
      \                if param_noise_filter_func(perturbed_var):\n                    # Perturb this variable.\n        \
      \            op = tf.assign(perturbed_var, var + tf.random_normal(shape=tf.shape(var), mean=0., stddev=param_noise_scale))\n\
      \                else:\n                    # Do not perturb, just assign.\n                    op = tf.assign(perturbed_var,\
      \ var)\n                perturb_ops.append(op)\n            assert len(perturb_ops) == len(all_vars)\n            return\
      \ tf.group(*perturb_ops)\n\n        # Set up functionality to re-compute `param_noise_scale`. This perturbs yet another\
      \ copy\n        # of the network and measures the effect of that perturbation in action space. If the perturbation\n\
      \        # is too big, reduce scale of perturbation, otherwise increase.\n        q_values_adaptive = q_func(observations_ph.get(),\
      \ num_actions, scope=\"adaptive_q_func\")\n        perturb_for_adaption = perturb_vars(original_scope=\"q_func\", perturbed_scope=\"\
      adaptive_q_func\")\n        kl = tf.reduce_sum(tf.nn.softmax(q_values) * (tf.log(tf.nn.softmax(q_values)) - tf.log(tf.nn.softmax(q_values_adaptive))),\
      \ axis=-1)\n        mean_kl = tf.reduce_mean(kl)\n        def update_scale():\n            with tf.control_dependencies([perturb_for_adaption]):\n\
      \                update_scale_expr = tf.cond(mean_kl < param_noise_threshold,\n                    lambda: param_noise_scale.assign(param_noise_scale\
      \ * 1.01),\n                    lambda: param_noise_scale.assign(param_noise_scale / 1.01),\n                )\n   \
      \         return update_scale_expr\n\n        # Functionality to update the threshold for parameter space noise.\n \
      \       update_param_noise_threshold_expr = param_noise_threshold.assign(tf.cond(update_param_noise_threshold_ph >=\
      \ 0,\n            lambda: update_param_noise_threshold_ph, lambda: param_noise_threshold))\n\n        # Put everything\
      \ together.\n        deterministic_actions = tf.argmax(q_values_perturbed, axis=1)\n        batch_size = tf.shape(observations_ph.get())[0]\n\
      \        random_actions = tf.random_uniform(tf.stack([batch_size]), minval=0, maxval=num_actions, dtype=tf.int64)\n\
      \        chose_random = tf.random_uniform(tf.stack([batch_size]), minval=0, maxval=1, dtype=tf.float32) < eps\n    \
      \    stochastic_actions = tf.where(chose_random, random_actions, deterministic_actions)\n\n        output_actions =\
      \ tf.cond(stochastic_ph, lambda: stochastic_actions, lambda: deterministic_actions)\n        update_eps_expr = eps.assign(tf.cond(update_eps_ph\
      \ >= 0, lambda: update_eps_ph, lambda: eps))\n        updates = [\n            update_eps_expr,\n            tf.cond(reset_ph,\
      \ lambda: perturb_vars(original_scope=\"q_func\", perturbed_scope=\"perturbed_q_func\"), lambda: tf.group(*[])),\n \
      \           tf.cond(update_param_noise_scale_ph, lambda: update_scale(), lambda: tf.Variable(0., trainable=False)),\n\
      \            update_param_noise_threshold_expr,\n        ]\n        _act = U.function(inputs=[observations_ph, stochastic_ph,\
      \ update_eps_ph, reset_ph, update_param_noise_threshold_ph, update_param_noise_scale_ph],\n                        \
      \ outputs=output_actions,\n                         givens={update_eps_ph: -1.0, stochastic_ph: True, reset_ph: False,\
      \ update_param_noise_threshold_ph: False, update_param_noise_scale_ph: False},\n                         updates=updates)\n\
      \        def act(ob, reset=False, update_param_noise_threshold=False, update_param_noise_scale=False, stochastic=True,\
      \ update_eps=-1):\n            return _act(ob, stochastic, update_eps, reset, update_param_noise_threshold, update_param_noise_scale)\n\
      \        return act"
