      \ help='RNG seed', type=int, default=None)\n    parser.add_argument('--alg', help='Algorithm', type=str, default='ppo2')\n\
      \    parser.add_argument('--num_timesteps', type=float, default=1e6),\n    parser.add_argument('--network', help='network\
      \ type (mlp, cnn, lstm, cnn_lstm, conv_only)', default=None)\n    parser.add_argument('--gamestate', help='game state\
      \ to load (so far only used in retro games)', default=None)\n    parser.add_argument('--num_env', help='Number of environment\
      \ copies being run in parallel. When not specified, set to number of cpus for Atari, and to 1 for Mujoco', default=None,\
      \ type=int)\n    parser.add_argument('--reward_scale', help='Reward scale factor. Default: 1.0', default=1.0, type=float)\n\
      \    parser.add_argument('--save_path', help='Path to save trained model to', default=None, type=str)\n    parser.add_argument('--save_video_interval',\
