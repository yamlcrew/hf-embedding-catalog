    \ dictionary and replace rare words with 'UNK' token.\n    The most common word has the smallest integer id.\n\n    Parameters\n\
    \    ----------\n    words : list of str or byte\n        The context in list format. You may need to do preprocessing\
    \ on the words, such as lower case, remove marks etc.\n    vocabulary_size : int\n        The maximum vocabulary size,\
    \ limiting the vocabulary size. Then the script replaces rare words with 'UNK' token.\n    printable : boolean\n     \
    \   Whether to print the read vocabulary size of the given words.\n    unk_key : str\n        Represent the unknown words.\n\
    \n    Returns\n    --------\n    data : list of int\n        The context in a list of ID.\n    count : list of tuple and\
    \ list\n        Pair words and IDs.\n            - count[0] is a list : the number of rare words\n            - count[1:]\
    \ are tuples : the number of occurrence of each word\n            - e.g. [['UNK', 418391], (b'the', 1061396), (b'of',\
    \ 593677), (b'and', 416629), (b'one', 411764)]\n    dictionary : dictionary\n        It is `word_to_id` that maps word\
    \ to ID.\n    reverse_dictionary : a dictionary\n        It is `id_to_word` that maps ID to word.\n\n    Examples\n  \
    \  --------\n    >>> words = tl.files.load_matt_mahoney_text8_dataset()\n    >>> vocabulary_size = 50000\n    >>> data,\
    \ count, dictionary, reverse_dictionary = tl.nlp.build_words_dataset(words, vocabulary_size)\n\n    References\n    -----------------\n\
    \    - `tensorflow/examples/tutorials/word2vec/word2vec_basic.py <https://github.com/tensorflow/tensorflow/blob/r0.7/tensorflow/examples/tutorials/word2vec/word2vec_basic.py>`__\n\
    \n    \"\"\"\n    if words is None:\n        raise Exception(\"words : list of str or byte\")\n\n    count = [[unk_key,\
    \ -1]]\n    count.extend(collections.Counter(words).most_common(vocabulary_size - 1))\n    dictionary = dict()\n    for\
    \ word, _ in count:\n        dictionary[word] = len(dictionary)\n    data = list()\n    unk_count = 0\n    for word in\
    \ words:\n        if word in dictionary:\n            index = dictionary[word]\n        else:\n            index = 0 \
    \ # dictionary['UNK']\n            unk_count += 1\n        data.append(index)\n    count[0][1] = unk_count\n    reverse_dictionary\
    \ = dict(zip(dictionary.values(), dictionary.keys()))\n    if printable:\n        tl.logging.info('Real vocabulary size\
    \    %d' % len(collections.Counter(words).keys()))\n        tl.logging.info('Limited vocabulary size {}'.format(vocabulary_size))\n\
