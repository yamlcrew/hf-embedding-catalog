    \ that value will be used for all images.\n            * If a tuple ``(a, b)``, then a value from the continuous range\
    \ ``[a, b]`` will be used.\n            * If a list, then a random value will be sampled from that list per image.\n \
    \           * If a StochasticParameter, then a value will be sampled per image from that parameter.\n\n    angle : number\
    \ or tuple of number or list of number or imgaug.parameters.StochasticParameter\n        Angle in degrees of motion blur\
