    \ 0.7)`` worked well.\n            * On ``960x1280`` a value of ``(0.7, 0.95)`` worked well.\n\n        Allowed datatypes:\n\
    \n            * If a number, then that value will be used for all images.\n            * If a tuple ``(a, b)``, then a\
