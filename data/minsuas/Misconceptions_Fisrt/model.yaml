widgetData:
- source_sentence: 'Subject: Rotation

    Construct: Rotate an object or point 900 clockwise or anticlockwise about a point, where the point lies on the edge or
    outside of the object

    Question: John rotates rectangle \( A B C D 90^{\circ} \) clockwise from the centre \( (3,2) \). What error has he made?
    ![A positive, coordinate grid with two rectangles drawn on it. The rectangle labelled ABCD has the coordinates: A(1,3)
    B(1,5) C(2,5) and D(2,3). The other rectangle has the coordinates: (4,3) (6,3) (6,2) and (4,2).]()

    Incorrect Answer: He has translated by the vector \( \left(\begin{array}{l}3 \\ 2\end{array}\right) \)'
  sentences:
  - 'Rotates by the wrong center of rotation (not including the origin)

    The passage is discussing a common mistake made in geometry, particularly when dealing with transformations such as rotations.
    The misconception here is that when rotating a figure or a point, students or individuals might use an incorrect center
    of rotation other than the intended one, such as the origin (0,0) on a coordinate plane.


    In problems involving rotations, it''s crucial to identify the correct center of rotation. If the problem specifies that
    the rotation should be around the origin, then the rotation must be performed with the origin as the fixed point. Using
    a different point as the center of rotation will result in a different image and therefore an incorrect solution. Understanding
    and accurately applying the center of rotation is key to correctly solving rotation problems in geometry.'
  - 'Does not recognise that a shape translated would not change orientation

    The passage is discussing a common misunderstanding in geometry, specifically regarding the concept of translation. A
    translation is a type of geometric transformation where a shape is moved a certain distance in a specified direction without
    rotating or flipping it. The misconception highlighted is that some people believe a shape''s orientation changes when
    it is translated, which is incorrect. Orientation refers to the position or direction that the shape faces, and in a translation,
    this does not change. The shape simply moves to a new location while maintaining its original orientation and size.'
  - "Does not realise that the sum of the two shorter sides must be greater than the third side for it to be a possible triangle\n\
    The passage is discussing a common misconception about the properties required to form a triangle. The misconception is\
    \ that one might think any three given side lengths can form a triangle. However, for three lengths to actually form a\
    \ triangle, they must satisfy the triangle inequality theorem. This theorem states that the sum of the lengths of any\
    \ two sides of a triangle must be greater than the length of the remaining side. This rule must hold true for all three\
    \ combinations of added side lengths. \n\nTo apply this to the misconception: one does not realize that the sum of the\
    \ lengths of the two shorter sides must be greater than the length of the longest side to form a possible triangle. This\
    \ ensures that the sides can actually meet to form a closed figure with three angles."
- source_sentence: 'Subject: Range and Interquartile Range from a List of Data

    Construct: Calculate the range from a list of data

    Question: What is the range of the following numbers?

    \[

    1,5,5,17,-6

    \]

    Incorrect Answer: \( 5 \)'
  sentences:
  - 'Finds the mode rather than the range

    The passage is indicating a common mistake made in solving math problems, particularly those involving statistics. The
    misconception lies in a confusion between two statistical concepts: the mode and the range.


    - **Mode**: This is the value that appears most frequently in a set of data. It helps to identify the most typical or
    common value.

    - **Range**: This is the difference between the highest and lowest values in a set of data. It gives an idea about the
    spread or dispersion of the values.


    The misconception described here suggests that a student might calculate the mode when asked to find the range, or simply
    mix up these two concepts. The important distinction is that while the mode tells you about the frequency of the most
    common value, the range informs you about the span of the data.'
  - 'To find the range adds the biggest and smallest number rather than subtract

    The passage is clarifying a common misunderstanding about how to calculate the range of a set of numbers. The misconception
    here is that someone might think the range is found by adding the largest number to the smallest number in the dataset.
    However, this is incorrect. The correct method to find the range is to subtract the smallest number from the largest number
    in the dataset. This subtraction gives the difference, which represents how spread out the numbers are.'
  - "Believes a cubic expression should have three terms\nThe misconception described here is that someone might think a cubic\
    \ expression, which is a polynomial of degree three, should consist of exactly three terms. This is a misunderstanding\
    \ because a cubic expression can have any number of terms, but the highest power of the variable must be three. \n\nFor\
    \ example, both \\( x^3 + 2x + 1 \\) and \\( 4x^3 - 3x^2 + x - 7 \\) are cubic expressions, even though they have different\
    \ numbers of terms. The defining characteristic is that the highest power of the variable (x in these examples) is three.\
    \ So, a cubic expression can have fewer or more than three terms, as long as the degree (the highest power) of the expression\
    \ is three."
- source_sentence: 'Subject: Reflection

    Construct: Reflect an object or a point in a diagonal line with the line of reflection drawn, where the line of reflection
    lies on the edge or outside the object

    Question: The triangle is reflected in the dashed line

    What are the new coordinates of point \( \mathrm{P} \) ? ![Four quadrant, coordinate grid with the reflection line y=-x
    drawn and a triangle. The triangle has coordinates: (-2,3) (-2,6) and (0,5). The point P is the coordinate (0,5)]()

    Incorrect Answer: \( (-4,5) \)'
  sentences:
  - 'Reflects horizontally or vertically instead of across a diagonal line of symmetry

    The passage is discussing a common mistake made in geometry, particularly when dealing with reflections of shapes. The
    misconception is that students might incorrectly think that the reflection is happening horizontally or vertically (i.e.,
    across a line that is either parallel to the x-axis or y-axis). In reality, the reflection might be across a diagonal
    line of symmetry, which means the line that serves as the mirror could be at an angle, such as a 45-degree line from one
    corner of a square or rectangle to the opposite corner.


    To correct this misconception, it''s important to emphasize the actual direction and axis of reflection, understanding
    that a line of symmetry can be oriented in any direction, not just horizontal or vertical. Visual aids and examples that
    include diagonal lines of symmetry can help in grasping this concept better.'
  - 'Fails to reflect across mirror line

    The passage is discussing a common misconception in geometry, specifically in relation to reflecting shapes or points
    across a line, often referred to as a "mirror line." This reflection involves creating a mirror image of a given figure
    on the other side of the mirror line, maintaining the same distance from the line as the original figure.


    The misconception "Fails to reflect across mirror line" means that someone might not correctly understand or apply the
    rules of reflection in their work. They might draw the reflected image incorrectly, perhaps by not maintaining the same
    distance from the mirror line, or by not placing it directly opposite the original shape with respect to the line.


    In essence, the misconception stems from a misunderstanding of how reflection works in geometry, leading to errors in
    the placement or orientation of the reflected figure. Correcting this involves ensuring that each point of the original
    shape is equidistant from the mirror line to its corresponding point on the reflected side.'
  - 'Thinks measures of area must end in squared

    The misconception described here is that some people believe the units of measurement for area must always end in "squared,"
    such as square meters, square feet, etc. While it is true that area measurements are often expressed using squared units
    (like square meters, m²), this is a specific case when the measurements are taken in units like meters, feet, etc.


    However, depending on the context and the system of measurement, area can be expressed in units that do not explicitly
    end in "squared." For example, when measuring land, units like acres or hectares are used, which are not expressed as
    squared units but represent a specific area. An acre, for instance, is a unit of area commonly used in English-speaking
    countries, and it equals 43,560 square feet.


    In summary, while squared units are a common way to express area, it is incorrect to assume that all units measuring area
    must end in "squared."'
- source_sentence: 'Subject: Time

    Construct: Solve problems involving subtracting a period of time from a given end time

    Question: What time is \( 30 \) minutes before midnight?

    Incorrect Answer: 11:30 am'
  sentences:
  - 'Thinks that times just before midnight are "am" times

    The passage is discussing a common misconception about the timing just before midnight. The misconception is that someone
    might incorrectly believe these times are denoted as "am" (ante meridiem), when in fact, times just before midnight are
    part of the "pm" (post meridiem) period. Midnight marks the transition from "pm" to "am" — the period from midnight to
    noon is designated as "am", and from noon to midnight, it is "pm". Therefore, the correct understanding is that the times
    just before midnight are "pm" times, not "am".'
  - 'Thinks tables of values are symmetrical about (0,0)

    The misconception described here pertains to the assumption that all tables of values representing a mathematical function
    or a set of data points are symmetrical about the origin, which is the point (0,0) on the coordinate plane. This means
    someone might incorrectly believe that for every value of \(x\), the corresponding \(y\) value would be mirrored on the
    opposite side of the origin, like in the case of the function \(y = x^3\), which is symmetrical about the origin.


    However, not all tables of values are symmetrical about (0,0). Symmetry about the origin is a specific property that only
    applies to certain types of functions, particularly odd functions, where \(f(-x) = -f(x)\) for all \(x\) in the domain
    of \(f\). Many other functions and sets of data points do not exhibit this symmetry. For example, a parabola \(y = x^2\)
    is symmetrical, but not about the origin; it is symmetrical along the y-axis. A linear function \(y = mx + b\), unless
    it passes through (0,0) with \(b=0\), would not be symmetrical about the origin either.


    Thus, one should not assume symmetry about (0,0) for any given set of data or function without proper analysis or evidence
    that confirms this symmetry.'
  - 'Answers as if there are 100 minutes in an hour

    The passage is indicating a common mistake where individuals incorrectly assume there are 100 minutes in an hour, rather
    than the correct 60 minutes. This misconception could arise in problems that require calculations involving time, leading
    to inaccurate results. It''s important to remember there are 60 minutes in an hour to perform calculations correctly.'
- source_sentence: 'Subject: Quadratic Equations

    Construct: Solve quadratic equations using factorisation in the form x(x + b)

    Question: Solve this equation, giving all solutions:

    \[

    k^{2}=4 k

    \]

    Incorrect Answer: \( k=4 \)'
  sentences:
  - 'Believes they can divide by a variable without checking whether it could equal zero

    The misconception described here pertains to the process of solving algebraic equations, particularly when dividing both
    sides of an equation by a variable. The misconception is that one can divide by a variable without considering whether
    that variable could potentially be zero.


    In algebra, dividing both sides of an equation by a variable (let''s say \(x\)) is generally valid only if \(x \neq 0\).
    If \(x\) could be zero, then dividing by \(x\) is not allowed because division by zero is undefined in mathematics. This
    oversight can lead to losing a solution (specifically, \(x = 0\)) or deriving incorrect conclusions.


    For example, consider the equation \(x^2 = 3x\). If one incorrectly divides both sides by \(x\) without checking whether
    \(x\) can be zero, they might reduce it to \(x = 3\), thereby missing the solution \(x = 0\).


    The correct approach would be to rearrange the equation to \(x^2 - 3x = 0\), factor it to \(x(x - 3) = 0\), and then conclude
    that \(x = 0\) or \(x = 3\), thus ensuring no solutions are lost.'
  - 'Does not know that a single letter labels a vertex

    The passage is indicating a common misconception in geometry or graph theory, where students or individuals may not understand
    that a single letter can be used to label or identify a vertex (a corner or a point where lines or edges meet) in a geometric
    shape or a graph.


    Explanation: In mathematics, particularly in geometry and graph theory, vertices (plural of vertex) are often labeled
    with single letters (like A, B, C, etc.) to easily identify and discuss them. This labeling helps in referring to specific
    points when describing shapes, calculating angles, distances, or when analyzing the structure of graphs. The misconception
    arises when someone does not recognize or utilize this convention, potentially leading to difficulties in understanding
    problems or communicating solutions effectively.'
  - "When solving an equation, multiplies instead of dividing\nThe passage is highlighting a common mistake made when solving\
    \ mathematical equations, where a student might mistakenly multiply when they should be dividing. This can happen in various\
    \ contexts, such as solving for a variable in an equation or converting units. For example, if a problem requires you\
    \ to divide both sides of an equation by a number to isolate the variable, mistakenly multiplying instead would lead to\
    \ an incorrect solution. \n\nThe key here is to carefully read the problem, understand the operations needed, and apply\
    \ the correct mathematical operations to solve the equation accurately."
