- source_sentence: ' Why is it important for player roles in a Matrix Game to operate at broadly similar levels?'
  sentences:
  - 'The Basic Rule.   The basic rule is as follows: 1 x 6-Sided Dice = 1 x Combat Unit The size of that Combat Unit will,
    of course, vary from game to game. In the boarding action it may be as little as 5-10 men; in a Map Game, it could be
    as much as an entire Brigade, or even a Corps.


    The Method.   The dice on the opposing sides are rolled as follows: Roll the Dice. Line them up, Highest vs Highest If
    one side has more dice than the other, any dice that are extra, and score less than the lowest dice of the side with the
    fewer dice, are ignored.'
  - "Matrix Game Checklist .................................................................................... 38 \nSample\
    \ Spendable Bonus Cards ...................................................................... 40 \nSample Random Events\
    \ ................................................................................... 41 \nSample Voting Cards for Diceless\
    \ Adjudication ............................................... 43 \nSample Estimative Probability Cards ...............................................................\
    \ 44 \nSample Turn Order Cards ................................................................................ 45 \n\
    Sample Markers for Matrix Games for Effects and Conventional Forces ........ 46"
  - 'When you are designing a Matrix Game it is worth thinking about the level at which the players roles will be operating
    in the game. In is usually better, and produces a more balanced game, when the level on which the player roles are operating
    are broadly similar. It would be difficult to get a balanced game if 3 of the players are playing Generals in command
    of vast Armies, and another player is playing a simple individual soldier.


    Levels of Protection and Hidden Things.'
