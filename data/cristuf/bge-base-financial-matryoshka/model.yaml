widgetData:
- source_sentence: Item 3—Legal Proceedings See discussion of Legal Proceedings in Note 10 to the consolidated financial statements
    included in Item 8 of this Report.
  sentences:
  - How much did the company's finance lease obligations total as of December 31, 2023?
  - What do Note 10 and Item 8 of the report encompass?
  - What was the basic earnings per common share attributable to Comcast Corporation shareholders in 2023?
- source_sentence: Our quarterly Insurance segment earnings and operating cash flows are impacted by the Medicare Part D benefit
    Grant program, the changing membership composition, and the multistage plan period starting annually on January 1. These
    plan designs generally result in us sharing a greater portion of the responsibility for total prescription drug costs
    in the early stages and less in the latter stages.
  sentences:
  - What are the two main categories into which Ford Motor Company classifies its costs and expenses, excluding those related
    to Ford Credit?
  - How does the benefit design of Medicare Part D impact the quarterly insurance segment earnings and operating cash flows?
  - What basis is used to record HTM investment securities in Schwab's financial statements?
- source_sentence: Operating Profit in the Wizards of the Coast and Digital Gaming segment decreased 2% to $538.3 million.
  sentences:
  - How much did the Wizards of the Coast and Digital Gaming segment's operating profit change in 2022?
  - What factors are considered in evaluating the lifetime losses for most loans and receivables?
  - How did the loss on certain U.S. affiliates impact the Company's effective tax rate in the fiscal fourth quarter of 2021?
- source_sentence: In 2023, the net earnings of Johnson & Johnson were $35,153 million. The company also registered cash dividends
    paid amounting to $11,770 million for the year, priced at $4.70 per share.
  sentences:
  - What was the postpaid churn rate for AT&T Inc. in 2023?
  - What was the GAAP net revenue for the fiscal year ended October 31, 2023?
  - What were the total net earnings of Johnson & Johnson in the year 2023?
- source_sentence: During fiscal 2022, GameStop Corp increased its valuation allowances by approximately $70.2 million in
    various jurisdictions.
  sentences:
  - How much did GameStop Corp's valuation allowances increase during fiscal 2022?
  - How does Gilead ensure an inclusive and diverse workforce?
  - What factors are considered in determining the estimated future warranty costs for connected fitness and Precor branded
    fitness products?
