    ответы из букв в круге.

    Так продолжалось какое-то время, наша паника нарастала, как вдруг мотылек сел прямо на пламя свечи и моментально сгорел...
    Подруга посчитала это знаком ухода "духа", и мы порешили, что все закончилось.

    Совпадение или нет - сладкого и правда хотелось до безумия. Мы включили свет, достали приготовленные сладости и решили
