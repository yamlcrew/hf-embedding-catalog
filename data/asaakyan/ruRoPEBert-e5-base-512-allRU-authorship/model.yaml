    девушке сказал, что надо по делам рабочим сгонять. В итоге девушка оказалась непорядочной, когда приехал, она сообщила,
    что котенка уже забрали 10 минут назад, мол, приехали раньше меня. Но это полбеды.

    Вечером следующего дня я понял, что записать в девушку в телефоне как "Катя(Котёнок)" было очень глупой идеей...'
  sentences:
  - 'Дело было году в 2010-м. Время моего беззаботного студенчества и прочих ништяков 19-тилетнего возраста. Дело было на
