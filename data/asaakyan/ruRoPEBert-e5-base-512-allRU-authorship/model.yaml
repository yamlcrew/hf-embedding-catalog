- source_sentence: 'Феодосия, 25 декабря. Крыминформ. В Феодосии 67-летний <PERSON> объявил голодовку и грозится покончить
    жизнь самоубийством в связи с тем, что суд не удовлетворил иск о подтверждении факта его постоянного проживания на территории
    Крыма, что необходимо для приобретения российского гражданства. Он объявил об этом сегодня, выйдя к зданию городского
    суда с табличкой "Голодовка".

    "Суд 22 декабря вынес решение, которым не подтверждает факт моего постоянного проживания в Феодосии. Я прописан в Украине,
    но живу в городе по одному и тому же адресу с 2004 года, работал на заводе, принимаю активное участие в жизни города.
    Пенсию мне перестали выплачивать, жить не на что, деньги занимаю у соседей", - сообщил <PERSON>. По его словам, на суде
    давали показания его соседи, а сам он представил подтверждающие документы.

    Сегодня, как сообщил мужчина, он получил ответ председателя суда <PERSON>, в котором ему предлагают обратиться в апелляционный
    суд. Однако, по словам <PERSON>, у него нет денег даже на оплату госпошлины. "Мне рекомендовали обратиться в апелляционный
    суд, но денег на это у меня нет вообще", - сказал он.'
  sentences:
  - '17-18 января исполнилось два года эпохальному событию: кухонная утварь (кастрюли, дуршлаги и прочее) напрочь вошла в
    украинскую политику, а понятие «кастрюлеголовые» плотно закрепилось за майданствующими особями незалежной.

    Напомним, 16 января 2014 года Верховная Рада Украины приняла (а 17 января президент <PERSON> подписал) пакет законов,
    которые должны были помочь в борьбе с массовыми беспорядками. Как-то: запрещалось участие в демонстрациях с использованием
    средств, затрудняющих идентификацию личности, присутствие на митинге с открытым огнем, пиротехникой, оружием, газовыми
    баллончиками, взрывчаткой и т. п. средствами, а также в камуфляже, масках и касках. Отметим, что практически все принятые
    тогда законы имели прямые аналоги в законодательстве стран ЕС и США. Но Совет Европы дал им предварительную собственную
    оценку, по которой многие предлагаемые нормы почему-то не соответствовали Европейской конвенции по правам человека, рекомендовав
    парламенту либо отменить, либо приостановить их действие в течение значительного периода времени.

    Адепты «революции гыдности» сразу же окрестили принятые акты «Законами о диктатуре» и массово вышли на Майдан с кастрюлями
    на головах. К слову, 9 из 12-ти законов таки были отменены Верховной Радой 28 января 2014 года. Но, увы, кухонная утварь
    плотно сдавила черепа украинских патриотов: многие до сих пор кастрюли так и не сняли.

    «Нешуточная дата – день кастрюлеголовых. Есть и те, кто, спустя два года, ничего так и не понял. Поздравляют друг дружку,
    вспоминают, кто ведро нацепил, кто – дуршлаг, кто – кастрюлю с цветочками. Они и по сей день не сняли с головы кастрюли.
    Им только кажется, что они их сняли. А на самом деле кастрюли приросли и пустили корни», - пишет блогер <PERSON>.

    Как сложилась судьба этих кастрюлеголовых идиотов – известно всем. Скачущие холопы стали «незалежнее всех незалежных»
    вместе взятых: отныне их судьба им не принадлежит. А как еще объяснить тот факт, что внутренние дела развалившейся Украины
    решают <PERSON> и <PERSON>, при этом даже не информируя «козаков гаврылюков» о результатах переговоров? И вправду, кастрюлеголовая
    Украина теперь самая независимая страна в мире: от нее в мире ничего не зависит!

    «Эй, мыздобулы! А ни у кого из вас не чешется ганьба через то, что ваши дела решают <PERSON> (не президент, но, по вашим
    словам, командовавший снайперами на майдауне) и <PERSON> (тоже не президент, но кормившая вас печеньками на майдауне)?
    Причем, ваших олигофренов-хунтозавров даже не пригласили послушать, про что они там тёрли! Ну, что шнобаками хлюпаете?

    Хрюкните что-либо по этому поводу! СУГС, например», - обращается к майданным деятелям блогер и журналист <PERSON>.

    Но в ответ почему-то никто не хрюкает. Возможно, в сдавленных кастрюлями черепах шевелятся остатки разума? И этот разум
    говорит следующее (снова устами <PERSON>):

    1.Убили 50 тысяч человек.

    2\. Изгнали из домов 3 млн. человек.

    3\. Разрушили Донбасс.

