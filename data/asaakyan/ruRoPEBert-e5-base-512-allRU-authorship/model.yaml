    день, начитавшись всяких оккультных историй и насмотревшись соответствующих фильмов мы наготовили сладких пироженок (в
    подобной литературе часто говорится, что сладкое после таких сеансов помогает прийти в себя).

    Не веря особо в успех, мы выключили свет, закрыли окна, зажгли свечу, подвесили иглу и начали вещать "Призываем дух <PERSON>!"

    До какого-то момента мы вещали все ту же фразу "Мы призываем..." и уже готовы были прекратить, так как игла висела неподвижно,
