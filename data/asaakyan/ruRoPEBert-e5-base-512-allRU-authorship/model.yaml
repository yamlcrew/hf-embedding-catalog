widgetData:
- source_sentence: 'Вообще-то, цветущая весна здесь началась ещё в начале февраля, но мне не хотелось дразнить людей теплом
    слишком задолго до окончания зимы. А вот сейчас - самое время!

    Все фотографии сделаны мной в городском парке или недалеко от города. Проводить здесь зимние месяцы - одно удовольствие!
    Очень комфортная погода, много зелени, а сейчас и цветов - любуйтесь сами :3

    <PERSON>. Ну ведь красавица!

    Я уже почти месяц жду, когда зацветёт всё дерево, но создаётся впечатление, будто снизу раскрывшиеся бутоны кто-то обрывает
    - ещё вчера был, а сегодня нет. Возможно, они просто опадают, сегодня я как раз подобрала пару штучек.

    А этот кустарник цвёл всю зиму. Таких жёлтых кустарников тут несколько видов, есть и те, которые вкусно пахнут.

    А тут я специально ради вас нашла название  \- Красный Хеномелес! Или просто японская айва. Я как-то привыкла к белым
    и розовым цветочкам на деревьях, а такой насыщенный красный приятно удивил.

    А это цветёт <PERSON>, мне в комментариях подсказали =)

    Интересно, что до сих пор осталось немножко осенних листьев (а в декабре я успела собрать очень красочный гербарий). Такой
    вот осенне-весенний контраст.

    Это жасмин. Кажется. Ну, я краем уха слышала, как тётенька-экскурсовод рассказывала.

    А вот это точно знаю - цикломены лесные. Одни из самых ранних цветочков, застилают лесные поляны - очень мило, с начала
    февраля цветут.

    Подснежники цвели вместе с цикломенами в феврале.

    Скоро у нас распустится <PERSON>. Жду-жду *_*

    Ну и, конечно же, <PERSON>! Если встать в правильном месте и поймать нужный ветер, можно услышать прекрасный аромат =)

    Если у вас возникает мысль "А не махнуть ли мне в Сочи" - решайтесь! Здесь не только пустынные пляжи созерцательно море,
    но и очень приятно гулять среди зелени и цветов.'
  sentences:
  - 'Урал радует разнообразием. В лёгкой пешей прогулке между деревеньками и дачами можно увидеть...

    Выработанный мраморный карьер.

    Как после хорошего дождя тропинки становятся белыми.

    Карьер, как это часто бывает, заполнен водой и служит местом отдыха

    С определённых ракурсов вода приобретает очень красивый оттенок.

    На такой почве очень хорошо растёт облепиха.

    А дорога под ногами блестит и переливается бликами от солнца, но этого я вам не покажу.

    В нескольких дестяках метров от карьера есть небольшой водопад.

    Маленький, но симпатичный.

    И даже ущелье! Или каньон?

    Неподалёку располагается ни много ни мало памятник природы - базальтовые скалы.

    Похоже на поджаренную щепку, правда? Только гораааздо больше. И скала.

    Вы уже заметили по теням, какой тут стройный хвойный лес?

    А ещё тут растут люпины, прямо как в Зеландиях и Исландиях. [Помимо них ещё красиво цветёт Иван-чай в окрестностях.]

    Ну и завершим прогулку красивым закатом, хотя они в любом месте красивы - за это люблю свою планету.

    Конечно, ещё есть река, поля, грибы, лесные озёра и что-то, до чего мы ещё не прогулялись. Доехать можно хоть на электричке
    - 47 или 49 км. В окрестных деревнях тоже есть на что посмотреть.

    Красота ближе, чем вы думаете ;)'
  - Может люди работают до поздна? Приходят в 22, что им теперь дела домашние не делать? Явно косяк со слышимостью. Вам мешают
    - сразу пара долбоебов. У нас раньше такая херня была - внизу соседи слышали как мы ходим и даже как компьютерное кресло
    двигается. Тоже истерики устраивали, мой к ним содил поговорить, позвонил мне попросил походить. Да, говорит слышно сильно.
    А знаете в чем прикол? В том что я не топаю. Я хожу тихо. Тут именно вибрация. Поменяли кресло - специально когда покупали
    катали чтобы вообще не было слышно, постелили ковёр. Вроде перестали на нас жаловаться. С той квартиры мы съехали, сейчас
    там живет мама молодого человека моего. Так на нее они гонят за то что стиралку ночью включает! На кухне. Стиралка ее
    из тех что идёт на взлёт. При нас не жаловались. Но видимо доебаться надо. Может и вы такой? Может вам надо доебаться?
  - "Позиция нажатого элемента ListView и её получение в запущенном активити\nВсем добрый день.\nПосле нажатия на элемент\
    \ списка listview, нужно передать его позицию (номер элемента списка) в другое активити. Использую position, которая передается\
    \ в onListItemClick. Но в другое активити почему то передается null.\nПомогите разобраться))\n[code]\n    public class\
    \ MainActivity extends ListActivity {\n    @Override\n    protected void onListItemClick(ListView l, View v, int position,\
    \ long id) {\n        super.onListItemClick(l, v, position, id);\n        Intent intent = new Intent(getApplicationContext(),\
    \ AfterClickActivity.class);\n        intent.putExtra(\"position\",position);\n        startActivity(intent);\n    }\n\
    \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        Integer[] array = new Integer[100];\n\
    \        for (int i = 0; i <100 ; i++) {\n            array[i] = i;\n        }\n        super.onCreate(savedInstanceState);\n\
    \        ArrayAdapter adapter = new ArrayAdapter(getApplicationContext(),R.layout.list_item,R.id.tvText,array);\n    \
    \    setListAdapter(adapter);\n[/code]\n}\n[code]\n    public class AfterClickActivity extends ActionBarActivity {\n \
    \   @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.activity_after_click);\n        String position = getIntent().getStringExtra(\"position\"\
    );\n        TextView view = (TextView)findViewById(R.id.tvView1);\n        view.setText(String.valueOf(position));\n \
    \   }\n[/code]"
- source_sentence: Здравствуйте,попал в не приятную ситуацию. В октябре на МКАД произошло мелкое ДТП я на грузовой машине
    легонько притер <PERSON> сам виноват,не соблюдал дистанцию. За рулём девушка,поговорили оформили евро протокол и разъехались.
    Протокол в страховую компанию надо было предоставить в течение пяти дней. Грузовая машина оформлена на предприятие где
    я работаю. Через день с механиком поехали в страховую,  а там висит объявление что прием заявлений и протоколов временно
    приостановлен. Сколько это "временно "продлилось. Не известно. Сегодня пришло письмо из Росгосстраха ,о том что я вовремя
    не предоставил соответствующие документы и выплата по ремонту 18800к возлагается на меня. В страховую больше не приезжал.
    Как быть?
  sentences:
  - 'Кстати ole72ole я писал уже выше насчёт книги "Пластичность мозга", там в самой первой главе говорится о женщине которая
    всё время падала и о методах которыми её смогли восстановить. Хорошо бы показать эту книгу его родственникам, чтобы в
    свою очередь они прочитали и рассказали о методах лечащему врачу. Вот начало этой главы, мне кажется или у вашего сопалатника
    похожая ситуация только чуть всё иначе? Могу скинуть если напишешь свою почту эту книгу, т.к. на пикабу я не нашёл Личных
    сообщений, а в свободном доступе (бесплатно) книгу очень тяжело найти.

    <PERSON> постоянно кажется, что она падает. И из-за этого непреходящего ощущения она

    действительно не может устоять на ногах.

    Когда <PERSON>, не имея точки опоры, поднимается с места, в первые мгновения она выглядит так,

    словно стоит на краю пропасти, в которую вот-вот упадет. Сначала у нее начинает дрожать и

    склоняться на одну сторону голова, и <PERSON> вытягивает руки, пытаясь зафиксировать свое положение.

    После этого ее тело принимается хаотично двигаться вперед и назад, и тогда <PERSON> напоминает

    человека, идущего по туго натянутому канату в тот ужасный момент, когда канатоходец начинает

    терять равновесие. При этом вы видите, что <PERSON>, на самом деле, стоит на твердой, устойчивой

    поверхности (на полу, на земле), широко расставив ноги. Создается впечатление, что она боится не столько падения, сколько
    того, что ее толкнут.'
  - 'Семья из Екатеринбурга более 10 лет пытается добиться восстановления вентиляции в квартире

    <PERSON>:

    Место действия: мск, дом 24 этажа. Я на 9-м. Стал замечать, что нет тяги в вентиляции. Пришел в диспетчерскую УК (благо
    два шага от подъезда), написал заявление на проверку/прочистку.

    Фабула:

    Возвращаюсь часов в 8 вечера, в холле подъезда стихийный митинг из человек 7, что мол УК совсем охерели и портят имущество.
    Вслушиваясь в монолог истерящей дамочки проясняю обстоятельства: разбит холодильник.

    Далее подробности от УК.

    УК приняв заявку, отправляет работника на крышу проверить вентканал, (короб в квартире ппц толстый: где то 120*50 см по
    внешним габаритам, и расположен там, где многие ввиду нестандартной планировки, хотели бы установить холодильник) решили
    прочистить канал привязав обычную 16кг гирю советского производства к тросу начали проход шахты. На высоте примерно 12-11
    этажа нашли "засор" и начали прочистку, постепенно увеличивая высоту подъёма грузика... Уж не знаю на какую высоту подняли
    этот грузик, но он прошел "засор" в виде холодильника до середины морозилки.

    Как итог за самовольную врезку в вент канал "пострадавшей" был влуплен штраф и предписание устранить изменения.

    Единственное что частично оправдывает "пострадавшую" - она сделала обвод вокруг врезанного холодильника из венттрубы 110мм*50мм
    квадратного сечения, что было явно недостаточно для тяги в таком стояке.'
  - 'Космическое производство кристаллов для лазеров

    Ключевой вопрос космического производства стоит так. Что в космосе можно делать такого, чтобы оно 1) отбивало стоимость
    вывода на орбиту и возвращения на Землю груза и 2) оно было массовым, чтобы рынок был достаточно большим?

    Когда начинают говорить о 3D-печати живой ткани - то, по моим впечатлениям, говорят об этом от отчаяния. Да, с научной
    точки зрения это очень интересно. Но до того, чтобы что-то такое напечатанное пересаживать живому человеку - мягко говоря
    ну вот совсем очень далеко.

    Да, можно печатать ткани нескольких органов на одной площадке, связывать их друг с другом, организовывать обмен веществ,
    и затем смотреть как какое-нибудь новое лекарство влияет на "экосистему" тканей (а не на каждый вид ткани в отдельности).
    Но это все штучный товар, бизнес на этом не построить.

    Что-то более близкое к реальной экономике сделала летом корпорация Redwire.

    Redwire вырастила на орбите на борту МКС двухграммовый кристалл дигидрофосфата калия (их используют для создания мощных
    лазеров) и даже продала его - Университету штата Огайо. Компания заявляет, что это первая в истории сделка с товарами,
    произведенными в космосе. Вот этот кристалл:

    Кристалл, выращенный Redwire на МКС

    Первые попытки выращивания кристаллов на орбите были предприняты в 1970-х. На фото слева - "земные" кристаллы, а справа
    - кристаллы, выращенные в космосе в условиях микрогравитации (см. фото ниже).

    Профессор <PERSON> приобрел образец, выращенный Redwire за 4000 долларов, что эквивалентно 2 миллионам долларов за килограмм.

    Сейчас сотрудники университетского центра электронной микроскопии и анализа изучают образец - режут его на тонкие сегменты
    и изучат его свойства.

    Redwire ожидает, что анализ покажет, что выращивание кристалла в условиях микрогравитации привело к меньшему количеству
    дефектов и получению более качественного продукта.

