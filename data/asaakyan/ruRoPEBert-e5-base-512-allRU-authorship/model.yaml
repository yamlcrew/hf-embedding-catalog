      новых, вчерашние джуниоры уйдут в менеджмент и прочие "побегушки" а на их место вновь придут люди с нулевыми знаниями,
      старый код даже пытаться разбирать никто не станет - его просто выкинут и напишут заново. Это как с китайскими товарами:
      мммаксимум дешево, мммаксимум дешево и мммаксимум дешево, при этом полностью неремотнопригодно.'
    - 'Когда в меде учился,то на 5-м курсе была психиатрия -цикл.

      В общем на одном занятии повели нас по палатам и "раздали " больных. Типа опросите,опишите жизнь,анамнез и поставьте
      предварительный диагноз .

      Итак, мне попалась девушка. На вид лет 17. Начинает рассказывать про жизнь,что у нее она тяжёлая была. Всю жизнь в спорте
      с детства,что родила в 15 лет по залету. Какой вид спорта? Она мне начинает рассказывать подробно про лёгкую атлетику
      ,затем ,что занималась спортивной гимнастикой . И говорила НАСТОЛЬКО убедительно ,что я начал верить. Но затем ее понесло
      и начала говорить,что на Олимпиаде 2008 года выступала ,заняла бронзу по бегу . Я на этом моменте прихерел и начал подозревать
      подвох ( 17 лет, олимпиада, ребенок в 15....WTF?)

      Для убедительности она херанулась с разбега в шпагат.

      В итоге оказалось,что ей 21,ребенка никакого нет,никаким спортом она не занималась. Была простой студенткой колледжа
      поваров и свихнулась. Шизофрения.

      С тех пор я уверен,что много среди нас не совсем адекватных. Просто мы их не замечаем.'
  - source_sentence: 'Решил своей девушке сделать подарок ко дню рождения. А именно - котенка (давно хотела завести). Нашел
      девушку, которая отдает маленького милого котенка в добрые руки. Созвонились, договорились о встрече, хозяйка сказала,
      что как только вернется домой с магазина - можно приехать и забрать пушистого зверька. Через час поступил звонок, своей
      девушке сказал, что надо по делам рабочим сгонять. В итоге девушка оказалась непорядочной, когда приехал, она сообщила,
      что котенка уже забрали 10 минут назад, мол, приехали раньше меня. Но это полбеды.

      Вечером следующего дня я понял, что записать в девушку в телефоне как "Катя(Котёнок)" было очень глупой идеей...'
    sentences:
    - 'Дело было году в 2010-м. Время моего беззаботного студенчества и прочих ништяков 19-тилетнего возраста. Дело было на
      зимних каникулах, в период святок. Я вернулась в полупустое общежитие от родителей, через пару дней приехала моя близкая
      подруга, которая предложила мне в одну из ночей вызвать чей-нибудь дух - святки же. Надо сказать, в ту пору мы подобным
      оккультизмом увлекались в силу юного возраста и гуманитарных направлений в институте. Я как умела пробовала гадать на
      таро (сейчас понимаю, как это по прошествии лет выглядит), подруга собирала всякий оккультный славянский фольклор и
      неплохо в этом разбиралась. Но ближе к делу. Решено было вызвать дух. Но чей? Выбор по ряду причин пал на легендарную
      для отечественной рок-музыки личность - <PERSON>.

      Сеанс решили проводить с иглой на нити, кругом с буквами и свечой, которая однажды была зажжена от благодатного огня.
      Свечу нам предоставила преподаватель по психологии(!), которая неоднократно вещала о ее магических свойствах. В назначенный
      день, начитавшись всяких оккультных историй и насмотревшись соответствующих фильмов мы наготовили сладких пироженок
      (в подобной литературе часто говорится, что сладкое после таких сеансов помогает прийти в себя).

      Не веря особо в успех, мы выключили свет, закрыли окна, зажгли свечу, подвесили иглу и начали вещать "Призываем дух
      <PERSON>!"

      До какого-то момента мы вещали все ту же фразу "Мы призываем..." и уже готовы были прекратить, так как игла висела неподвижно,
      и каких-то других признаков духа не было, как вдруг из ниоткуда появился мотылек, мотылек, КАРЛ! (январь-месяц на дворе)
      и начал наворачивать круги вокруг нас.

      Стало не просто страшно. Стало до кирпичей страшно!!! Но отступать было некуда, подруга решила начать распрашивать дух.
      Дрожащим голосом, с явными признаками паники, она начала спрашивать его про <PERSON> и ее смерть (кто не знает, она
      известный рок-музыкант, погибшая при странных обстоятельствах и состоявшая с <PERSON>  в отношениях долгое время). И
      вот тут...я не знаю... то ли у меня удачно дрожали руки, то ли сквозняк, но игла начала качаться, выдавая вполне себе
      осмысленные ответы из букв в круге.

      Так продолжалось какое-то время, наша паника нарастала, как вдруг мотылек сел прямо на пламя свечи и моментально сгорел...
      Подруга посчитала это знаком ухода "духа", и мы порешили, что все закончилось.

      Совпадение или нет - сладкого и правда хотелось до безумия. Мы включили свет, достали приготовленные сладости и решили
      послушать музыку. Естественно запустили в плейлист всю папку с названием "ГрОб". Казалось бы, все закончилось, но последним
      звоночком стало то, что в рандомном плейлисте первой песней была "Отряд не заметил потери бойца", которая начинается
      строкой "Глупый мотылек догорал на свечке".

      Надо ли говорить, что мы ночью спали в другой комнате? И духов больше никогда вызвать не пытались.

      Сейчас, вспоминая данный случай, единственную крипоту в моей жизни, наверное, я искренне хочу верить, что это не более
      чем стечение обстоятельств. Если бы не мотылек, это им бы и было с вероятностью 146%. Подобными вещами больше не увлекаюсь.
      Повзрослела и из гуманитария превратилась в инженера.'
    - 'Чтобы факт, признанный наукой назвать "дурацким стереотипом"? Ну да, как по мне, требуется осведомлённость повыше обывательской.
      И ещё раз. С вами никто не спорит. Бывает всяко, в том числе так, как вы написали. Вариантов столько же, сколько живых
      людей. А паттерны, усвоенные в семье ребёнком, присущи большому количеству взрослых.

      И речь изначально шла о модели семьи и вариантах поведения, связанных с ней. То есть "мальчик копирует отношение папы
      к маме". Это не значит, что его ждёт такая же судьба, у него будет такой же характер, или он тоже разведётся в 27. Но
      по умолчанию, пока не наживёт своего опыта (а некоторые и дальше), мальчик будет опираться на то, что видел в семье.
      Ваш пример с эмпатией - верен. Только в этом контексте ничего не доказывает.'
    - 'на работе выключили свет. Диспетчер сидит в своей программе, делает табеля. бесперебойник периодически пищит.

