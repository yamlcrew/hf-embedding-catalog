- source_sentence: 'Решил своей девушке сделать подарок ко дню рождения. А именно - котенка (давно хотела завести). Нашел
    девушку, которая отдает маленького милого котенка в добрые руки. Созвонились, договорились о встрече, хозяйка сказала,
