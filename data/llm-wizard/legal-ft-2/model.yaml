widgetData:
- source_sentence: What is the estimated training cost of DeepSeek v3, and how does it compare to the training hours used
    for Llama 31?
  sentences:
  - 'Your browser does not support the audio element.


    OpenAI aren’t the only group with a multi-modal audio model. Google’s Gemini also accepts audio input, and the Google
    Gemini apps can speak in a similar way to ChatGPT now. Amazon also pre-announced voice mode for Amazon Nova, but that’s
    meant to roll out in Q1 of 2025.

    Google’s NotebookLM, released in September, took audio output to a new level by producing spookily realistic conversations
    between two “podcast hosts” about anything you fed into their tool. They later added custom instructions, so naturally
    I turned them into pelicans:



    Your browser does not support the audio element.'
  - 'DeepSeek v3 is a huge 685B parameter model—one of the largest openly licensed models currently available, significantly
    bigger than the largest of Meta’s Llama series, Llama 3.1 405B.

    Benchmarks put it up there with Claude 3.5 Sonnet. Vibe benchmarks (aka the Chatbot Arena) currently rank it 7th, just
    behind the Gemini 2.0 and OpenAI 4o/o1 models. This is by far the highest ranking openly licensed model.

    The really impressive thing about DeepSeek v3 is the training cost. The model was trained on 2,788,000 H800 GPU hours
    at an estimated cost of $5,576,000. Llama 3.1 405B trained 30,840,000 GPU hours—11x that used by DeepSeek v3, for a model
    that benchmarks slightly worse.'
  - 'Those US export regulations on GPUs to China seem to have inspired some very effective training optimizations!

    The environmental impact got better

    A welcome result of the increased efficiency of the models—both the hosted ones and the ones I can run locally—is that
    the energy usage and environmental impact of running a prompt has dropped enormously over the past couple of years.

    OpenAI themselves are charging 100x less for a prompt compared to the GPT-3 days. I have it on good authority that neither
    Google Gemini nor Amazon Nova (two of the least expensive model providers) are running prompts at a loss.'
- source_sentence: How does the launch of ChatGPT Pro impact access to OpenAI's most capable model compared to previous offerings?
  sentences:
  - 'These abilities are just a few weeks old at this point, and I don’t think their impact has been fully felt yet. If you
    haven’t tried them out yet you really should.

    Both Gemini and OpenAI offer API access to these features as well. OpenAI started with a WebSocket API that was quite
    challenging to use, but in December they announced a new WebRTC API which is much easier to get started with. Building
    a web app that a user can talk to via voice is easy now!

    Prompt driven app generation is a commodity already

    This was possible with GPT-4 in 2023, but the value it provides became evident in 2024.'
  - 'OpenAI made GPT-4o free for all users in May, and Claude 3.5 Sonnet was freely available from its launch in June. This
    was a momentus change, because for the previous year free users had mostly been restricted to GPT-3.5 level models, meaning
    new users got a very inaccurate mental model of what a capable LLM could actually do.

    That era appears to have ended, likely permanently, with OpenAI’s launch of ChatGPT Pro. This $200/month subscription
    service is the only way to access their most capable model, o1 Pro.

    Since the trick behind the o1 series (and the future models it will undoubtedly inspire) is to expend more compute time
    to get better results, I don’t think those days of free access to the best available models are likely to return.'
  - 'Intuitively, one would expect that systems this powerful would take millions of lines of complex code. Instead, it turns
    out a few hundred lines of Python is genuinely enough to train a basic version!

    What matters most is the training  data. You need a lot of data to make these things work, and the quantity and quality
    of the training data appears to be the most important factor in how good the resulting model is.

    If you can gather the right data, and afford to pay for the GPUs to train it, you can build an LLM.'
- source_sentence: What are the implications of having a Code Interpreter equivalent for fact-checking natural language?
  sentences:
  - 'Your browser does not support the audio element.


    OpenAI aren’t the only group with a multi-modal audio model. Google’s Gemini also accepts audio input, and the Google
    Gemini apps can speak in a similar way to ChatGPT now. Amazon also pre-announced voice mode for Amazon Nova, but that’s
    meant to roll out in Q1 of 2025.

    Google’s NotebookLM, released in September, took audio output to a new level by producing spookily realistic conversations
    between two “podcast hosts” about anything you fed into their tool. They later added custom instructions, so naturally
    I turned them into pelicans:



    Your browser does not support the audio element.'
  - 'Except... you can run generated code to see if it’s correct. And with patterns like ChatGPT Code Interpreter the LLM
    can execute the code itself, process the error message, then rewrite it and keep trying until it works!

    So hallucination is a much lesser problem for code generation than for anything else. If only we had the equivalent of
    Code Interpreter for fact-checking natural language!

    How should we feel about this as software engineers?

    On the one hand, this feels like a threat: who needs a programmer if ChatGPT can write code for you?'
  - 'The biggest innovation here is that it opens up a new way to scale a model: instead of improving model performance purely
    through additional compute at training time, models can now take on harder problems by spending more compute on inference.

    The sequel to o1, o3 (they skipped “o2” for European trademark reasons) was announced on 20th December with an impressive
    result against the ARC-AGI benchmark, albeit one that likely involved more than $1,000,000 of compute time expense!

    o3 is expected to ship in January. I doubt many people have real-world problems that would benefit from that level of
    compute expenditure—I certainly don’t!—but it appears to be a genuine next step in LLM architecture for taking on much
    harder problems.'
- source_sentence: What advantages does a 64GB Mac have for running models compared to other machines?
  sentences:
  - 'My personal laptop is a 64GB M2 MacBook Pro from 2023. It’s a powerful machine, but it’s also nearly two years old now—and
    crucially it’s the same laptop I’ve been using ever since I first ran an LLM on my computer back in March 2023 (see Large
    language models are having their Stable Diffusion moment).

    That same laptop that could just about run a GPT-3-class model in March last year has now run multiple GPT-4 class models!
    Some of my notes on that:'
  - 'This prompt-driven custom interface feature is so powerful and easy to build (once you’ve figured out the gnarly details
    of browser sandboxing) that I expect it to show up as a feature in a wide range of products in 2025.

    Universal access to the best models lasted for just a few short months

    For a few short months this year all three of the best available models—GPT-4o, Claude 3.5 Sonnet and Gemini 1.5 Pro—were
    freely available to most of the world.'
  - 'On paper, a 64GB Mac should be a great machine for running models due to the way the CPU and GPU can share the same memory.
    In practice, many models are released as model weights and libraries that reward NVIDIA’s CUDA over other platforms.

    The llama.cpp ecosystem helped a lot here, but the real breakthrough has been Apple’s MLX library, “an array framework
    for Apple Silicon”. It’s fantastic.

    Apple’s mlx-lm Python library supports running a wide range of MLX-compatible models on my Mac, with excellent performance.
    mlx-community on Hugging Face offers more than 1,000 models that have been converted to the necessary format.'
- source_sentence: How does Claude enable users to interact with applications generated by its system?
  sentences:
  - 'We already knew LLMs were spookily good at writing code. If you prompt them right, it turns out they can build you a
    full interactive application using HTML, CSS and JavaScript (and tools like React if you wire up some extra supporting
    build mechanisms)—often in a single prompt.

    Anthropic kicked this idea into high gear when they released Claude Artifacts, a groundbreaking new feature that was initially
    slightly lost in the noise due to being described half way through their announcement of the incredible Claude 3.5 Sonnet.

    With Artifacts, Claude can write you an on-demand interactive application and then let you use it directly inside the
    Claude interface.

    Here’s my Extract URLs app, entirely generated by Claude:'
  - 'An interesting point of comparison here could be the way railways rolled out around the world in the 1800s. Constructing
    these required enormous investments and had a massive environmental impact, and many of the lines that were built turned
    out to be unnecessary—sometimes multiple lines from different companies serving the exact same routes!

    The resulting bubbles contributed to several financial crashes, see Wikipedia for Panic of 1873, Panic of 1893, Panic
    of 1901 and the UK’s Railway Mania. They left us with a lot of useful infrastructure and a great deal of bankruptcies
    and environmental damage.

    The year of slop'
  - 'We don’t yet know how to build GPT-4

    Frustratingly, despite the enormous leaps ahead we’ve had this year, we are yet to see an alternative model that’s better
    than GPT-4.

    OpenAI released GPT-4 in March, though it later turned out we had a sneak peak of it in February when Microsoft used it
    as part of the new Bing.

    This may well change in the next few weeks: Google’s Gemini Ultra has big claims, but isn’t yet available for us to try
    out.

    The team behind Mistral are working to beat GPT-4 as well, and their track record is already extremely strong considering
    their first public model only came out in September, and they’ve released two significant improvements since then.'
