- source_sentence: What is the basis for the company's calculation of deferred tax assets and liabilities?
  sentences:
  - ' We could be subject to various penalties or restrictions on our ability to conduct our business, which could have a
    material and adverse impact on our business, operating results, and financial condition.'
  - ' The company''s calculation of deferred tax assets and liabilities is based on certain estimates and judgments and involves
    dealing with uncertainties in the application of complex tax laws.'
  - ' March 4, 2024.'
- source_sentence: What are some situations that may result in excess or obsolete inventory or excess product purchase commitments?
  sentences:
  - ' 20%'
  - ' NVIDIA''s common stock is traded on the Nasdaq Global Select Market under the symbol NVDA.'
  - ' Changes in business and economic conditions, changes in market conditions, sudden and significant decreases in demand
    for products, inventory obsolescence due to changing technology and customer requirements, new product introductions,
    failure to estimate customer demand properly, ordering in advance of historical lead-times, government regulations, and
    changes in future demand or increase in demand for competitive products.'
- source_sentence: What are the primary methods used by the company to protect its intellectual property?
  sentences:
  - ' The change resulted in an increase in operating income of $135 million and net income of $114 million after tax, or
    $0.05 per both basic and diluted share.'
  - ' Forfeitures are estimated based on historical experience and revised semi-annually if actual forfeitures differ from
    those estimates.'
  - ' The company relies primarily on a combination of patents, trademarks, trade secrets, employee and third-party nondisclosure
    agreements, and licensing arrangements to protect its intellectual property in the United States and internationally.'
- source_sentence: What are the potential consequences of an unfavorable outcome in the litigation and regulatory proceedings
    mentioned in the text?
  sentences:
  - ' The new licensing requirements apply to exports of certain products, including A100, A800, H100, H800, L4, L40, L40S,
    and RTX 4090, exceeding certain performance thresholds to China, Country Groups D1, D4, and D5, and to parties headquartered
    in or with an ultimate parent headquartered in Country Group D5, including China.'
  - ' Adverse rulings could occur, including monetary damages or fines, an injunction stopping the company from manufacturing
    or selling certain products, engaging in certain business practices, or requiring other remedies, such as compulsory licensing
    of patents.'
  - ' The main components of the NVIDIA accelerated computing platform include GPUs, DPUs, interconnects, and fully optimized
    AI and high-performance computing software stacks.'
- source_sentence: What are the potential risks associated with the company's acquisitions and strategic investments?
  sentences:
  - ' $7,280.'
  - ' The company could face significant consequences, including government enforcement actions, litigation, additional reporting
    requirements and/or oversight, bans on processing personal data, and orders to destroy or not use personal data, which
    could have a material adverse effect on its reputation, business, or financial condition.'
  - ' The potential risks include impairment of the company''s ability to grow its business, develop new products, or sell
    its products, as well as the possibility of regulatory conditions reducing the value of the acquisition, volatility in
    results, losses up to the value of the investment, and impairment losses due to the failure of the invested companies.'
