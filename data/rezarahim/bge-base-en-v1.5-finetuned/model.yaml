widgetData:
- source_sentence: Where can investors find more information about NVIDIA's financial information and company updates?
  sentences:
  - ' The potential risks include restrictions on sales of products containing certain components made by Micron, restrictions
    on receiving supply of components, parts, or services from Taiwan, increased scrutiny from shareholders, regulators, and
    others regarding corporate sustainability practices, and failure to meet evolving shareholder, regulator, or other industry
    stakeholder expectations, which could result in additional costs, reputational harm, and loss of customers and suppliers.'
  - ' Investors and others can find more information about NVIDIA''s financial information and company updates on the company''s
    investor relations website, through press releases, SEC filings, public conference calls and webcasts, as well as on the
    company''s social media channels, including Twitter, the NVIDIA Corporate Blog, Facebook, LinkedIn, Instagram, and YouTube.'
  - ' The text mentions the following forms and agreements: Officers'' Certificate, Form of Note (with various years), Form
    of Indemnity Agreement, Amended and Restated 2007 Equity Incentive Plan, Non-Employee Director Deferred Restricted Stock
    Unit Grant Notice and Deferred Restricted Stock Unit Agreement, Non-Employee Director Restricted Stock Unit Grant Notice
    and Restricted Stock Unit Agreement, Global Performance-Based Restricted Stock Unit Grant Notice and Performance-Based
    Restricted Stock Unit Agreement, Global Restricted Stock Unit Grant Notice and Global Restricted Stock Unit Agreement,
    and various Schedules and Exhibits (such as 2.1, 3.1, 4.1, 4.2, 10.1, 10.2, 10.26, and 10.27).'
- source_sentence: What are the potential consequences if regulators in China conclude that NVIDIA has failed to fulfill its
    commitments or has violated applicable law in China?
  sentences:
  - ' The company''s share repurchase program aims to offset dilution from shares issued to employees.'
  - ' Ms. Shoquist served as Senior Vice President and General Manager of the Electro-Optics business at Coherent, Inc., and
    previously worked at Quantum Corp. as President of the Personal Computer Hard Disk Drive Division, and at Hewlett-Packard.'
  - ' If regulators in China conclude that NVIDIA has failed to fulfill its commitments or has violated applicable law in
    China, the company could be subject to various penalties or restrictions on its ability to conduct its business, which
    could have a material and adverse impact on its business, operating results, and financial condition.'
- source_sentence: What percentage of the company's revenue was attributed to sales to customers outside of the United States
    in fiscal year 2024?
  sentences:
  - ' NVIDIA reports its business results in two segments: the Compute & Networking segment and the Graphics segment.'
  - ' The company expects to use its existing cash, cash equivalents, and marketable securities, as well as the cash generated
    by its operations, to fund its capital investments of approximately $3.5 billion to $4.0 billion related to property and
    equipment during fiscal year 2025.'
  - ' 56% of the company''s total revenue in fiscal year 2024 was attributed to sales to customers outside of the United States.'
- source_sentence: What is the net income per share of NVIDIA Corporation for the year ended January 29, 2023?
  sentences:
  - ' 6% of the company''s workforce in the United States is composed of Black or African American employees.'
  - ' The net income per share of NVIDIA Corporation for the year ended January 29, 2023 is $12.05 for basic and $11.93 for
    diluted.'
  - ' The company may face potential risks and challenges such as increased expenses, substantial expenditures and time spent
    to fully resume operations, disruption to product development or operations due to employees being called-up for active
    military duty, and potential impact on future product development, operations, and revenue. Additionally, the company
    may also experience interruptions or delays in services from third-party providers, which could impair its ability to
    provide its products and services and harm its business.'
- source_sentence: What percentage of the company's accounts receivable balance as of January 28, 2024, was accounted for
    by two customers?
  sentences:
  - ' The change in equipment and assembly and test equipment resulted in a benefit of $135 million in operating income and
    $114 million in net income, or $0.05 per both basic and diluted share, for the fiscal year ended January 28, 2024.'
  - ' The estimates of deferred tax assets and liabilities may change based on added certainty or finality to an anticipated
    outcome, changes in accounting standards or tax laws in the U.S. or foreign jurisdictions where the company operates,
    or changes in other facts or circumstances.'
  - ' 24% and 11%, which is a total of 35%.'
