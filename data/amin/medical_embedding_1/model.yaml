    of the vertebrae and overlying skin in both the transverse and the coronal plane in all cases. Others have reported successful
    prenatal diagnosis of spina bifida at 12 to 14 weeks gestation on the basis of abnormal cranial findings.17-19 They caution
    that although the characteristic cranial findings may be present at 11 to 14 weeks, the prevalence of these findings in
    the first trimester remains to be determined (Table 35.2). Furthermore, closed NTDs are less likely to be associated with
