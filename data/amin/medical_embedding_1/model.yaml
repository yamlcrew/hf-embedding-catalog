    - recessive polycystic kidneys, autosomal dominant polycystic kidneys, Jeune asphyxiating thoracic dystrophy, Ellis-van
      Creveld syndrome, and others.115 Joubert Syndrome Joubert syndrome and related disorders (JSRD) have the key feature
      of molar tooth sign visible on MRI. The molar tooth appearance results from hypoplasia of the cerebellar vermis, horizontal
      thick elongated cerebral peduncles, and deep inter- peduncular fossa at upper pons; on axial MRI of the brainstem, these
      features look like a molar tooth. This sign is used as the diagnostic test in children. JSRD is clinically characterized
      by hypotonia, ataxia, psychomotor delay, irregular breathing, and abnormal eye movements and has an incidence of about
      1 per 80,000 pregnancies. Different combinations of ciliary gene muta- tions can result in primary Joubert syndrome,
      and related disorders have variable abnormalities of the neurons, eye, renal tubules, and bile ducts and polydactyly.116
      On ultrasound the molar tooth sign findings of vermian hypoplasia, thickened cerebral peduncles, and interpeduncular
      notch may be visible by 20 weeks and confirmed by MRI if needed.117 Additional cerebral imaging findings can include
      abnormalities of the corpus callosum and neuronal migrational abnormalities, Dandy-Walker malformation (DWM), and encephalocele
      as well as abnormalities in somatic structures. If the mutation is known (about 50%), early diagnosis is possible with
      chorionic villus sampling (CVS). Prognosis is generally poor and related to extent of breathing and feeding problems
      in the short term and renal and hepatic complications in the long term. Meckel-Gruber Syndrome Meckel-Gruber syndrome
      is likely the most common syndromic abnormality of the CNS and is characterized by occipital encephalocele, enlarged
      dysplastic kidneys, hepatic duct prolifera- tion, polydactyly, posterior fossa abnormalities, and craniofacial and heart
      defects and has features that overlap with JSRS. Incidence is 1 per 13,000 to 140,000 live births. It is a lethal autosomal
      recessive disorder associated with mutations in several ciliary genes.
