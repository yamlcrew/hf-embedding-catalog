    its resemblance to a basin, is divided into two structurally continuous compartments, the true (or lesser) pelvis and
    the false (or greater) pelvis, by an oblique plane passing from the sacral promontory, the arcuate and pectineal lines,
    and the superior margin of the symphysis pubis (Fig. 26-11). The circumfer- ence of this plane is called the linea terminalis,
    or pelvic brim.15 The true pelvis is the lower portion and is bounded anteriorly by the pubis and pubic rami, posteriorly
    by the sacrum and coccyx, laterally by the fused ilium and ischium, and inferiorly by the muscles of the pelvic floor.
    The false pelvis is bounded laterally by the flanged portions of the iliac bones, the base of the sacrum posteriorly,
