  - 'the effect of con- comitant problems such as partial volume or movement artefacts. Combined Protocols: One-Stop-Shop
    Procedure. Computed tomography (CT) venography has been con- sidered as a part of a one-stop-shop procedure in order to
    diagnose VTE.58 After administering one bolus of con- trast medium, ﬁrst the pulmonary arteries are investigated followed
    by additional late-phase imaging of the deep venous system from the calves up to the inferior vena cava to detect DVT.
    Although this combined procedure is feasible and has the advantage of detecting DVT in pelvic veins and IVC, which is
    not possible with CUS, recent studies have shown that in comparison with CTPA alone, this combined technique results in
    only limited increase in sensitivity with a comparable speciﬁcity.59 A major drawback of CT venography is the signiﬁcant
    increase of radiation, which at this moment does not justify its routine use in patients with suspected PE (Fig. 23-22).
    Alternatively, CTA with ECG-gating can be performed in patients presenting with acute chest pain without sig- niﬁcant
    increase in radiation dose. During one data acqui- sition, information can be obtained on the most important vascular
    diseases causing acute chest pain: acute coronary syndrome, aortic dissection and acute pulmonary embo- lism.60 The use
    of dual-source CT or systems with high numbers of detector rows may overcome the initial limita- tions of ECG-gated CTPA,
    providing faster acquisition times, better image quality in patients with abnormal cardiac rhythms, and lower radiation
    dose.61 The downside of such a protocol is the increase in complexity both for the technician and the reader, with an
    increase in post- processing and interpretation time. CTPA During Pregnancy. During pregnancy and puerperium, the incidence
    of VTE is two- to fourfold higher and is one of the most important causes of mater- nal mortality. As diagnosing DVT in
