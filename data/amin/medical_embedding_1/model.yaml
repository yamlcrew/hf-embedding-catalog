    - 'to rise, the major limitation for expanding transplant programs is the shortage of suitable donor kidneys. This organ
      shortage has resulted in an increasing number of renal transplantations from living related donors. These donors may
      include family members or close friends with a long-standing relationship with the recipient. The average life expectancy
      for a cadaveric allograft is 7 to 10 years, whereas that for a live donor allograft is 15 to 20 years.44 Regardless
      of whether a cadaveric or live donor allograft is used, the cost-benefit ratio of a functioning successful transplant
      far outweighs that of a patient with persistent CRF, so multiple health care resources are targeted to ensure high rates
      of success. Ultrasound is the most valuable noninvasive imaging modality in monitoring the renal transplant. Surgical
      Technique Detailed sonography of the renal transplant requires knowledge of the surgical procedure used in most institutions
      as well as the postsurgical anatomic relationships. The right or left lower quadrant is selected for the incision, based
      on the patients prior surgical history and the surgeons preference. Usually, the right lower quadrant is selected because
      the right iliac vein is more superficial and horizontal on this side of the pelvis, facilitating creation of a vascular
      anastomosis.45,46 The type of arterial anastomosis used depends on whether the allograft is cadaveric or living related
      and on the number essential to facilitate early resection, ablation, or chemotherapy26,43 (Fig. 18.27). As in the general
