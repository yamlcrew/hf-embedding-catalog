  - excellent results. High- frequency, small-footprint transducers should be used in small children. Most ultrasound machines
    have pediatric settings that are a good starting point for many examinations. Sedation is almost never required, and distraction
    techniques such as showing movies are very effective. At all ages, the ultrasound technologist is probably the most important
    factor in obtaining high-quality images. Find a technologist who works well with children, learn from him or her, and
    encourage him or her to teach others. Nuclear Medicine The practice of pediatric nuclear medicine is highly variable between
    institutions in terms of the type and number of procedures performed. Basic nuclear medicine studies including diuretic
    renal scans (for urinary tract obstruction), hepatobiliary (e.g., HIDA) scans (for biliary atresia), and cystograms (for
    vesicoureteral reflux) are still the backbone of a pediatric nuclear medicine practice. 18-F FDG-PET is increasingly being
    used, however, for the staging and follow-up of pediatric malignancies such as lymphoma and sarcomas (bone and soft tissue).
    The 123I-MIBG scan is an examination that is almost unique to pediatrics and is still extensively used for the diagnosis,
    staging, and follow-up of neuroblastoma. Details of nuclear medicine imaging technique and protocols are beyond the scope
    of this text but the reader should be aware of the North American Consensus Guidelines for Pediatric Administered Radiopharmaceutical
    Activities which provide recommended activities for commonly used radiopharmaceuticals. This can be an invaluable resource
    when you are in practice and are asked to do a nuclear medicine study on a child. MRI MRI is a dominant imaging modality
    in pediatrics, in part due to the fact that images can be obtained without use of ionizing radiation. This benefit has
