widgetData:
- source_sentence: The consolidated financial statements and accompanying notes listed in Part IV, Item 15(a)(1) of this Annual
    Report on Form 10-K are included elsewhere in this Annual Report on Form 10-K.
  sentences:
  - What is the carrying value of the indefinite-lived intangible assets related to the Certificate of Needs and Medicare
    licenses as of December 31, 2023?
  - What sections of the Annual Report on Form 10-K contain the company's financial statements?
  - What was the effective tax rate excluding discrete net tax benefits for the year 2022?
- source_sentence: Consumers are served through Amazon's online and physical stores with an emphasis on selection, price,
    and convenience.
  sentences:
  - What decision did the European Commission make on July 10, 2023 regarding the United States?
  - What are the primary offerings to consumers through Amazon's online and physical stores?
  - What activities are included in the services and other revenue segment of General Motors Company?
- source_sentence: Visa has traditionally referred to their structure of facilitating secure, reliable, and efficient money
    movement among consumers, issuing and acquiring financial institutions, and merchants as the 'four-party' model.
  sentences:
  - What model does Visa traditionally refer to regarding their transaction process among consumers, financial institutions,
    and merchants?
  - What percentage of Meta's U.S. workforce in 2023 were represented by people with disabilities, veterans, and members of
    the LGBTQ+ community?
  - What are the revenue sources for the Company’s Health Care Benefits Segment?
- source_sentence: 'In addition to LinkedIn’s free services, LinkedIn offers monetized solutions: Talent Solutions, Marketing
    Solutions, Premium Subscriptions, and Sales Solutions. Talent Solutions provide insights for workforce planning and tools
    to hire, nurture, and develop talent. Talent Solutions also includes Learning Solutions, which help businesses close critical
    skills gaps in times where companies are having to do more with existing talent.'
  sentences:
  - What were the major factors contributing to the increased expenses excluding interest for Investor Services and Advisor
    Services in 2023?
  - What were the pre-tax earnings of the manufacturing sector in 2023, 2022, and 2021?
  - What does LinkedIn's Talent Solutions include?
- source_sentence: Management assessed the effectiveness of the company’s internal control over financial reporting as of
    December 31, 2023. In making this assessment, we used the criteria set forth by the Committee of Sponsoring Organizations
    of the Treadway Commission (COSO) in Internal Control—Integrated Framework (2013).
  sentences:
  - What criteria did Caterpillar Inc. use to assess the effectiveness of its internal control over financial reporting as
    of December 31, 2023?
  - What are the primary components of U.S. sales volumes for Ford?
  - What was the percentage increase in Schwab's common stock dividend in 2022?
