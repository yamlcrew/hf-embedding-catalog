    - Effectiveness of COVID-19 Vaccines in Preventing SARS-CoV-2 Infection Among Frontline Workers Before and During B.1.617.2
      (Delta) Variant Predominance — Eight U.S. Locations, December 2020–August 2021 During December 14, 2020-April 10, 2021,
      data from the HEROES-RECOVER Cohorts,* a network of prospective cohorts among frontline workers, showed that the Pfizer-BioNTech
      and Moderna mRNA COVID-19 vaccines were approximately 90% effective in preventing symptomatic and asymptomatic infection
      with SARS-CoV-2, the virus that causes COVID-19, in real-world conditions (1,2). This report updates vaccine effectiveness
      (VE) estimates including all COVID-19 vaccines available through August 14, 2021, and examines whether VE differs for
      adults with increasing time since completion of all recommended vaccine doses. VE before and during SARS-CoV-2 B.1.617.2
      (Delta) variant predominance, which coincided with an increase in reported COVID-19 vaccine breakthrough infections,
      were compared (3,4).
