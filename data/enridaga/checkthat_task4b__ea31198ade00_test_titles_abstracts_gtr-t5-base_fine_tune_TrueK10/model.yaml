    sentences:
    - 'Dynamic Change of COVID-19 Seroprevalence among Asymptomatic Population in Tokyo during the Second Wave Importance:
      Fatality rates related to COVID-19 in Japan have been low compared to Western Countries and have decreased despite the
      absence of lockdown. Serological tests monitored across the course of the second wave can provide insights into the
      population-level prevalence and dynamic patterns of COVID-19 infection. Objective: To assess changes in COVID-19 seroprevalence
      among asymptomatic employees working in Tokyo during the second wave. Design: We conducted an observational cohort study.
      Healthy volunteers working for a Japanese company in Tokyo were enrolled from disparate locations to determine seropositivity
      against COVID19 from May 26 to August 25, 2020. COVID-19 IgM and IgG antibodies were determined by a rapid COVID19 IgM/IgG
      test kit using fingertip blood. Across the company, tests were performed and acquired weekly. For each participant,
      serology tests were offered twice, separated by approximately a month, to provide self-reference of test results and
      to assess for seroconversion and seroreversion. Setting: Workplace setting within a large company. Participants: Healthy
      volunteers from 1877 employees of a large Japanese company were recruited to the study from 11 disparate locations across
      Tokyo. Participants having fever, cough, or shortness of breath at the time of testing were excluded. Main Outcome(s)
      and Measure(s): Seropositivity rate (SPR) was calculated by pooled data from each two-weeks window across the cohort.
      Either IgM or IgG positivity was defined as seropositive. Changes in immunological status against SARS-CoV-2 were determined
      by comparing results between two tests obtained from the same individual. Results: Six hundred fifteen healthy volunteers
      (mean + SD 40.8 + 10.0; range 19-69; 45.7 % female) received at least one test. Seroprevalence increased from 5.8 %
      to 46.8 % over the course of the summer. The most dramatic increase in SPR occurred in late June and early July, paralleling
      the rise in daily confirmed cases within Tokyo, which peaked on August 4. Out of the 350 individuals (mean + SD 42.5
      + 10.0; range 19-69; 46.0 % female) who completed both offered tests, 21.4 % of those individuals who tested seronegative
      became seropositive and seroreversion was found in 12.2 % of initially seropositive participants. 81.1% of IgM positive
      cases at first testing became IgM negative in approximately one month. Conclusions and Relevance: COVID-19 infection
      may have spread widely across the general population of Tokyo despite the very low fatality rate. Given the temporal
      correlation between the rise in seropositivity and the decrease in reported COVID-19 cases that occurred without a shut-down,
      herd immunity may be implicated. Sequential testing for serological response against COVID-19 is useful for understanding
      the dynamics of COVID-19 infection at the population-level.'
    - Trends in COVID-19 Risk-Adjusted Mortality Rates. Early reports showed high mortality from coronavirus disease 2019
      (COVID-19). Mortality rates have recently been lower, raising hope that treatments have improved. However, patients
      are also now younger, with fewer comorbidities. We explored whether hospital mortality was associated with changing
      demographics at a 3-hospital academic health system in New York. We examined in-hospital mortality or discharge to hospice
      from March through August 2020, adjusted for demographic and clinical factors, including comorbidities, admission vital
      signs, and laboratory results. Among 5,121 hospitalizations, adjusted mortality dropped from 25.6% (95% CI, 23.2-28.1)
      in March to 7.6% (95% CI, 2.5-17.8) in August. The standardized mortality ratio dropped from 1.26 (95% CI, 1.15-1.39)
      in March to 0.38 (95% CI, 0.12-0.88) in August, at which time the average probability of death (average marginal effect)
      was 18.2 percentage points lower than in March. Data from one health system suggest that mortality from COVID-19 is
      decreasing even after accounting for patient characteristics.
    - Microbiota-modulated CART+ enteric neurons autonomously regulate blood glucose. The gut microbiota affects tissue physiology,
      metabolism, and function of both the immune and nervous systems. We found that intrinsic enteric-associated neurons
      (iEAN) in mice are functionally adapted to the intestinal segment they occupy; ileal and colonic neurons are more responsive
      to microbial colonization than duodenal neurons. Specifically, a microbially-responsive subset of viscerofugal CART+
      neurons, enriched in the ileum and colon, modulated feeding and glucose metabolism. These CART+ neurons send axons to
      the prevertebral ganglia and are poly-synaptically connected to the liver and pancreas. Microbiota depletion led to
      NLRP6- and Caspase 11-dependent loss of CART+ neurons, and impaired glucose regulation. Hence, iEAN subsets appear to
      be capable of regulating blood glucose levels independently from the central nervous system.
