  sentences:
  - 'COVID-19 pandemic: A review of the global lockdown and its far-reaching effects. COVID-19, caused by the severe acute
    respiratory syndrome coronavirus-2 (SARS-CoV-2), was declared a pandemic by the World Health Organization (WHO) on the
    11th of March 2020, leading to some form of lockdown across almost all countries of the world. The extent of the global
    pandemic due to COVID-19 has a significant impact on our lives that must be studied carefully to combat it. This study
    highlights the impacts of the COVID-19 pandemic lockdown on crucial aspects of daily life globally, including; Food security,
    Global economy, Education, Tourism, hospitality, sports and leisure, Gender Relation, Domestic Violence/Abuse, Mental
    Health and Environmental air pollution through a systematic search of the literature. The COVID-19 global lockdown was
    initiated to stem the spread of the virus and ''flatten the curve'' of the pandemic. However, the impact of the lockdown
    has had far-reaching effects in different strata of life, including; changes in the accessibility and structure of education
    delivery to students, food insecurity as a result of unavailability and fluctuation in prices, the depression of the global
    economy, increase in mental health challenges, wellbeing and quality of life amongst others. This review article highlights
    the impacts of the COVID-19 pandemic lockdown across the globe. As the global lockdown is being lifted in a phased manner
    in various countries of the world, it is necessary to explore its impacts to understand its consequences comprehensively.
    This will guide future decisions that will be made in a possible future wave of the COVID-19 pandemic or other global
    disease outbreak.'
