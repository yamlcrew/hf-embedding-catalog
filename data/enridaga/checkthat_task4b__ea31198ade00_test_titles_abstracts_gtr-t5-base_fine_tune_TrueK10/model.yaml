    sentences:
    - 'Ivermectin Prophylaxis Used for COVID-19: A Citywide, Prospective, Observational Study of 223,128 Subjects Using Propensity
      Score Matching Background: Ivermectin has demonstrated different mechanisms of action that potentially protect from
      both coronavirus disease 2019 (COVID-19) infection and COVID-19-related comorbidities. Based on the studies suggesting
      efficacy in prophylaxis combined with the known safety profile of ivermectin, a citywide prevention program using ivermectin
      for COVID-19 was implemented in Itajaí, a southern city in Brazil in the state of Santa Catarina. The objective of this
      study was to evaluate the impact of regular ivermectin use on subsequent COVID-19 infection and mortality rates. Materials
      and methods: We analyzed data from a prospective, observational study of the citywide COVID-19 prevention with ivermectin
      program, which was conducted between July 2020 and December 2020 in Itajaí, Brazil. Study design, institutional review
      board approval, and analysis of registry data occurred after completion of the program. The program consisted of inviting
      the entire population of Itajaí to a medical visit to enroll in the program and to compile baseline, personal, demographic,
      and medical information. In the absence of contraindications, ivermectin was offered as an optional treatment to be
      taken for two consecutive days every 15 days at a dose of 0.2 mg/kg/day. In cases where a participating citizen of Itajaí
      became ill with COVID-19, they were recommended not to use ivermectin or any other medication in early outpatient treatment.
      Clinical outcomes of infection, hospitalization, and death were automatically reported and entered into the registry
      in real time. Study analysis consisted of comparing ivermectin users with non-users using cohorts of infected patients
      propensity score-matched by age, sex, and comorbidities. COVID-19 infection and mortality rates were analyzed with and
      without the use of propensity score matching (PSM). Results: Of the 223,128 citizens of Itajaí considered for the study,
      a total of 159,561 subjects were included in the analysis: 113,845 (71.3%) regular ivermectin users and 45,716 (23.3%)
      non-users. Of these, 4,311 ivermectin users were infected, among which 4,197 were from the city of Itajaí (3.7% infection
      rate), and 3,034 non-users (from Itajaí) were infected (6.6% infection rate), with a 44% reduction in COVID-19 infection
      rate (risk ratio [RR], 0.56; 95% confidence interval (95% CI), 0.53-0.58; p < 0.0001). Using PSM, two cohorts of 3,034
      subjects suffering from COVID-19 infection were compared. The regular use of ivermectin led to a 68% reduction in COVID-19
      mortality (25 [0.8%] versus 79 [2.6%] among ivermectin non-users; RR, 0.32; 95% CI, 0.20-0.49; p < 0.0001). When adjusted
      for residual variables, reduction in mortality rate was 70% (RR, 0.30; 95% CI, 0.19-0.46; p < 0.0001). There was a 56%
      reduction in hospitalization rate (44 versus 99 hospitalizations among ivermectin users and non-users, respectively;
      RR, 0.44; 95% CI, 0.31-0.63; p < 0.0001). After adjustment for residual variables, reduction in hospitalization rate
      was 67% (RR, 0.33; 95% CI, 023-0.66; p < 0.0001). Conclusion: In this large PSM study, regular use of ivermectin as
      a prophylactic agent was associated with significantly reduced COVID-19 infection, hospitalization, and mortality rates.'
    - SARS-CoV-2 Cluster in Nursery, Poland We report a cluster of surprisingly high spread of severe acute respiratory syndrome
      coronavirus 2 (SARS-CoV-2) associated with a single nursery in Poland. Our findings contrast with the presumed negligible
      role of children in driving the SARS-CoV-2 pandemic. Children 1–2 years of age might be effective SARS-CoV-2 spreaders.
    - 'Clinical outcomes among patients infected with Omicron (B.1.1.529) SARS-CoV-2 variant in southern California Background:
      The Omicron (B.1.1.529) variant of SARS-CoV-2 has rapidly achieved global dissemination, accounting for most infections
      in the United States by December 2021. Risk of severe outcomes associated with Omicron infections, as compared to earlier
      SARS-CoV-2 variants, remains unclear. Methods: We analyzed clinical and epidemiologic data from cases testing positive
      for SARS-CoV-2 infection within the Kaiser Permanente Southern California healthcare system from November 30, 2021 to
      January 1, 2022, using S gene target failure (SGTF) as assessed by the ThermoFisher TaqPath ComboKit assay as a proxy
      for Omicron infection. We fit Cox proportional hazards models to compare time to any hospital admission and hospital
      admissions associated with new-onset respiratory symptoms, intensive care unit (ICU) admission, mechanical ventilation,
      and mortality among cases with Omicron and Delta (non-SGTF) variant infections. We fit parametric competing risk models
      to compare lengths of hospital stay among admitted cases with Omicron and Delta variant infections. Results: Our analyses
      included 52,297 cases with SGTF (Omicron) and 16,982 cases with non-SGTF (Delta [B.1.617.2]) infections, respectively.
      Hospital admissions occurred among 235 (0.5%) and 222 (1.3%) of cases with Omicron and Delta variant infections, respectively.
      Among cases first tested in outpatient settings, the adjusted hazard ratios for any subsequent hospital admission and
      symptomatic hospital admission associated with Omicron variant infection were 0.48 (0.36-0.64) and 0.47 (0.35-0.62),
      respectively. Rates of ICU admission and mortality after an outpatient positive test were 0.26 (0.10-0.73) and 0.09
      (0.01-0.75) fold as high among cases with Omicron variant infection as compared to cases with Delta variant infection.
      Zero cases with Omicron variant infection received mechanical ventilation, as compared to 11 cases with Delta variant
      infections throughout the period of follow-up (two-sided p<0.001). Median duration of hospital stay was 3.4 (2.8-4.1)
      days shorter for hospitalized cases with Omicron variant infections as compared to hospitalized patients with Delta
      variant infections, reflecting a 69.6% (64.0-74.5%) reduction in hospital length of stay. Conclusions: During a period
      with mixed Delta and Omicron variant circulation, SARS-CoV-2 infections with presumed Omicron variant infection were
      associated with substantially reduced risk of severe clinical endpoints and shorter durations of hospital stay.'
