  sentences:
  - 'Common elective orthopaedic procedures and their clinical effectiveness: umbrella review of level 1 evidence OBJECTIVE:
    To determine the clinical effectiveness of common elective orthopaedic procedures compared with no treatment, placebo,
    or non-operative care and assess the impact on clinical guidelines. DESIGN: Umbrella review of meta-analyses of randomised
    controlled trials or other study designs in the absence of meta-analyses of randomised controlled trials. DATA SOURCES:
    Ten of the most common elective orthopaedic procedures—arthroscopic anterior cruciate ligament reconstruction, arthroscopic
    meniscal repair of the knee, arthroscopic partial meniscectomy of the knee, arthroscopic rotator cuff repair, arthroscopic
    subacromial decompression, carpal tunnel decompression, lumbar spine decompression, lumbar spine fusion, total hip replacement,
    and total knee replacement—were studied. Medline, Embase, Cochrane Library, and bibliographies were searched until September
    2020. ELIGIBILITY CRITERIA FOR SELECTING STUDIES: Meta-analyses of randomised controlled trials (or in the absence of
    meta-analysis other study designs) that compared the clinical effectiveness of any of the 10 orthopaedic procedures with
    no treatment, placebo, or non-operative care. DATA EXTRACTION AND SYNTHESIS: Summary data were extracted by two independent
    investigators, and a consensus was reached with the involvement of a third. The methodological quality of each meta-analysis
    was assessed using the Assessment of Multiple Systematic Reviews instrument. The Jadad decision algorithm was used to
    ascertain which meta-analysis represented the best evidence. The National Institute for Health and Care Excellence Evidence
    search was used to check whether recommendations for each procedure reflected the body of evidence. MAIN OUTCOME MEASURES:
    Quality and quantity of evidence behind common elective orthopaedic interventions and comparisons with the strength of
    recommendations in relevant national clinical guidelines. RESULTS: Randomised controlled trial evidence supports the superiority
    of carpal tunnel decompression and total knee replacement over non-operative care. No randomised controlled trials specifically
    compared total hip replacement or meniscal repair with non-operative care. Trial evidence for the other six procedures
    showed no benefit over non-operative care. CONCLUSIONS: Although they may be effective overall or in certain subgroups,
    no strong, high quality evidence base shows that many commonly performed elective orthopaedic procedures are more effective
    than non-operative alternatives. Despite the lack of strong evidence, some of these procedures are still recommended by
    national guidelines in certain situations. SYSTEMATIC REVIEW REGISTRATION: PROSPERO CRD42018115917.'
  - 'Exploring the impact of shielding advice on the health and wellbeing of individuals identified as extremely vulnerable
    and advised to shield in Southwest England amid the COVID-19 pandemic: A mixed-methods evaluation Objective: Explore the
    impact and responses to public health advice on the health and wellbeing of individuals identified as clinically extremely
    vulnerable (CEV) and advised to shield (not leave home for 12 weeks at start of the pandemic) in Southwest England during
    the first COVID-19 lockdown. Design: Mixed-methods study; structured survey and follow-up semi-structured interviews.
    Setting: Communities served by Bristol, North Somerset & South Gloucestershire Clinical Commissioning Group. Participants:
    204 people (57% female, 54% >69 years, 94% White British, 64% retired) in Southwest England identified as CEV and were
    advised to shield completed the survey. Thirteen survey respondents participated in follow-up interviews (53% female,
    40% >69years, 100% White British, 61% retired). Results: Receipt of official communication from NHS England or General
    Practitioner (GP) was considered by participants as the legitimate start of shielding. 80% of survey responders felt they
    received all relevant advice needed to shield, yet interviewees criticised the timing of advice and often sought supplementary
    information. Shielding behaviours were nuanced, adapted to suit personal circumstances, and waned over time. Few interviewees
    received community support, although food boxes and informal social support were obtained by some. Worrying about COVID-19
    was common for survey responders (90%). Since shielding had begun, physical and mental health reportedly worsened for
    35% and 42% of survey responders respectively. 21% of survey responders scored 10 or more on the PHQ-9 questionnaire indicating
    possible depression and 15% scored 10 or more on the GAD-7 questionnaire indicating possible anxiety. Conclusions: This
    research highlights the difficulties in providing generic messaging that is applicable and appropriate given the diversity
    of individuals identified as CEV and the importance of sharing tailored and timely advice to inform shielding decisions.
    Providing messages that reinforce self-determined action and assistance from support services could reduce the negative
    impact of shielding on mental health and feelings of social isolation.'
  - Vaccinated and unvaccinated individuals have similar viral loads in communities with a high prevalence of the SARS-CoV-2
    delta variant SARS-CoV-2 variant B.1.617.2 (delta) is associated with higher viral loads [1] and increased transmissibility
    relative to other variants, as well as partial escape from polyclonal and monoclonal antibodies [2]. The emergence of
    the delta variant has been associated with increasing case counts and test-positivity rates, indicative of rapid community
    spread. Since early July 2021, SARS-CoV-2 cases in the United States have increased coincident with delta SARS-CoV-2 becoming
    the predominant lineage nationwide [3]. Understanding how and why the virus is spreading in settings where there is high
    vaccine coverage has important public health implications. It is particularly important to assess whether vaccinated individuals
    who become infected can transmit SARS-CoV-2 to others. In Wisconsin, a large local contract laboratory provides SARS-CoV-2
    testing for multiple local health departments, providing a single standard source of data using the same assay to measure
    virus burdens in test-positive cases. This includes providing high-volume testing in Dane County, a county with extremely
    high vaccine coverage. These PCR-based tests provide semi-quantitative information about the viral load, or amount of
    SARS-CoV-2 RNA, in respiratory specimens. Here we use this viral load data to compare the amount of SARS-CoV-2 present
    in test-positive specimens from people who self-report their vaccine status and date of final immunization, during a period
    in which the delta variant became the predominant circulating variant in Wisconsin. We find no difference in viral loads
    when comparing unvaccinated individuals to those who have vaccine "breakthrough" infections. Furthermore, individuals
    with vaccine breakthrough infections frequently test positive with viral loads consistent with the ability to shed infectious
    viruses. Our results, while preliminary, suggest that if vaccinated individuals become infected with the delta variant,
    they may be sources of SARS-CoV-2 transmission to others.
- source_sentence: Asymptomatic carriers spread immunity not illness ( I wonder if this study will gain traction)
  sentences:
  - 'Dynamic Change of COVID-19 Seroprevalence among Asymptomatic Population in Tokyo during the Second Wave Importance: Fatality
    rates related to COVID-19 in Japan have been low compared to Western Countries and have decreased despite the absence
    of lockdown. Serological tests monitored across the course of the second wave can provide insights into the population-level
    prevalence and dynamic patterns of COVID-19 infection. Objective: To assess changes in COVID-19 seroprevalence among asymptomatic
    employees working in Tokyo during the second wave. Design: We conducted an observational cohort study. Healthy volunteers
    working for a Japanese company in Tokyo were enrolled from disparate locations to determine seropositivity against COVID19
    from May 26 to August 25, 2020. COVID-19 IgM and IgG antibodies were determined by a rapid COVID19 IgM/IgG test kit using
    fingertip blood. Across the company, tests were performed and acquired weekly. For each participant, serology tests were
    offered twice, separated by approximately a month, to provide self-reference of test results and to assess for seroconversion
    and seroreversion. Setting: Workplace setting within a large company. Participants: Healthy volunteers from 1877 employees
    of a large Japanese company were recruited to the study from 11 disparate locations across Tokyo. Participants having
    fever, cough, or shortness of breath at the time of testing were excluded. Main Outcome(s) and Measure(s): Seropositivity
    rate (SPR) was calculated by pooled data from each two-weeks window across the cohort. Either IgM or IgG positivity was
    defined as seropositive. Changes in immunological status against SARS-CoV-2 were determined by comparing results between
    two tests obtained from the same individual. Results: Six hundred fifteen healthy volunteers (mean + SD 40.8 + 10.0; range
    19-69; 45.7 % female) received at least one test. Seroprevalence increased from 5.8 % to 46.8 % over the course of the
    summer. The most dramatic increase in SPR occurred in late June and early July, paralleling the rise in daily confirmed
    cases within Tokyo, which peaked on August 4. Out of the 350 individuals (mean + SD 42.5 + 10.0; range 19-69; 46.0 % female)
    who completed both offered tests, 21.4 % of those individuals who tested seronegative became seropositive and seroreversion
    was found in 12.2 % of initially seropositive participants. 81.1% of IgM positive cases at first testing became IgM negative
    in approximately one month. Conclusions and Relevance: COVID-19 infection may have spread widely across the general population
    of Tokyo despite the very low fatality rate. Given the temporal correlation between the rise in seropositivity and the
    decrease in reported COVID-19 cases that occurred without a shut-down, herd immunity may be implicated. Sequential testing
    for serological response against COVID-19 is useful for understanding the dynamics of COVID-19 infection at the population-level.'
  - Trends in COVID-19 Risk-Adjusted Mortality Rates. Early reports showed high mortality from coronavirus disease 2019 (COVID-19).
    Mortality rates have recently been lower, raising hope that treatments have improved. However, patients are also now younger,
    with fewer comorbidities. We explored whether hospital mortality was associated with changing demographics at a 3-hospital
    academic health system in New York. We examined in-hospital mortality or discharge to hospice from March through August
    2020, adjusted for demographic and clinical factors, including comorbidities, admission vital signs, and laboratory results.
    Among 5,121 hospitalizations, adjusted mortality dropped from 25.6% (95% CI, 23.2-28.1) in March to 7.6% (95% CI, 2.5-17.8)
    in August. The standardized mortality ratio dropped from 1.26 (95% CI, 1.15-1.39) in March to 0.38 (95% CI, 0.12-0.88)
    in August, at which time the average probability of death (average marginal effect) was 18.2 percentage points lower than
    in March. Data from one health system suggest that mortality from COVID-19 is decreasing even after accounting for patient
    characteristics.
  - Microbiota-modulated CART+ enteric neurons autonomously regulate blood glucose. The gut microbiota affects tissue physiology,
    metabolism, and function of both the immune and nervous systems. We found that intrinsic enteric-associated neurons (iEAN)
    in mice are functionally adapted to the intestinal segment they occupy; ileal and colonic neurons are more responsive
    to microbial colonization than duodenal neurons. Specifically, a microbially-responsive subset of viscerofugal CART+ neurons,
    enriched in the ileum and colon, modulated feeding and glucose metabolism. These CART+ neurons send axons to the prevertebral
    ganglia and are poly-synaptically connected to the liver and pancreas. Microbiota depletion led to NLRP6- and Caspase
    11-dependent loss of CART+ neurons, and impaired glucose regulation. Hence, iEAN subsets appear to be capable of regulating
    blood glucose levels independently from the central nervous system.
