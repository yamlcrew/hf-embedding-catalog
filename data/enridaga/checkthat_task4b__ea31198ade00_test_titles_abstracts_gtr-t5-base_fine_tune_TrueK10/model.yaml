    sentences:
    - 'Effect of early treatment with fluvoxamine on risk of emergency care and hospitalisation among patients with COVID-19:
      the TOGETHER randomised, platform clinical trial BACKGROUND: Recent evidence indicates a potential therapeutic role
      of fluvoxamine for COVID-19. In the TOGETHER trial for acutely symptomatic patients with COVID-19, we aimed to assess
      the efficacy of fluvoxamine versus placebo in preventing hospitalisation defined as either retention in a COVID-19 emergency
      setting or transfer to a tertiary hospital due to COVID-19. METHODS: This placebo-controlled, randomised, adaptive platform
      trial done among high-risk symptomatic Brazilian adults confirmed positive for SARS-CoV-2 included eligible patients
      from 11 clinical sites in Brazil with a known risk factor for progression to severe disease. Patients were randomly
      assigned (1:1) to either fluvoxamine (100 mg twice daily for 10 days) or placebo (or other treatment groups not reported
      here). The trial team, site staff, and patients were masked to treatment allocation. Our primary outcome was a composite
      endpoint of hospitalisation defined as either retention in a COVID-19 emergency setting or transfer to tertiary hospital
      due to COVID-19 up to 28 days post-random assignment on the basis of intention to treat. Modified intention to treat
      explored patients receiving at least 24 h of treatment before a primary outcome event and per-protocol analysis explored
      patients with a high level adherence (>80%). We used a Bayesian analytic framework to establish the effects along with
      probability of success of intervention compared with placebo. The trial is registered at ClinicalTrials.gov (NCT04727424)
      and is ongoing. FINDINGS: The study team screened 9803 potential participants for this trial. The trial was initiated
      on June 2, 2020, with the current protocol reporting randomisation to fluvoxamine from Jan 20 to Aug 5, 2021, when the
      trial arms were stopped for superiority. 741 patients were allocated to fluvoxamine and 756 to placebo. The average
      age of participants was 50 years (range 18–102 years); 58% were female. The proportion of patients observed in a COVID-19
      emergency setting for more than 6 h or transferred to a teritary hospital due to COVID-19 was lower for the fluvoxamine
      group compared with placebo (79 [11%] of 741 vs 119 [16%] of 756); relative risk [RR] 0·68; 95% Bayesian credible interval
      [95% BCI]: 0·52–0·88), with a probability of superiority of 99·8% surpassing the prespecified superiority threshold
      of 97·6% (risk difference 5·0%). Of the composite primary outcome events, 87% were hospitalisations. Findings for the
      primary outcome were similar for the modified intention-to-treat analysis (RR 0·69, 95% BCI 0·53–0·90) and larger in
      the per-protocol analysis (RR 0·34, 95% BCI, 0·21–0·54). There were 17 deaths in the fluvoxamine group and 25 deaths
      in the placebo group in the primary intention-to-treat analysis (odds ratio [OR] 0·68, 95% CI: 0·36–1·27). There was
      one death in the fluvoxamine group and 12 in the placebo group for the per-protocol population (OR 0·09; 95% CI 0·01–0·47).
      We found no significant differences in number of treatment emergent adverse events among patients in the fluvoxamine
      and placebo groups. INTERPRETATION: Treatment with fluvoxamine (100 mg twice daily for 10 days) among high-risk outpatients
      with early diagnosed COVID-19 reduced the need for hospitalisation defined as retention in a COVID-19 emergency setting
      or transfer to a tertiary hospital. FUNDING: FastGrants and The Rainwater Charitable Foundation. TRANSLATION: For the
      Portuguese translation of the abstract see Supplementary Materials section.'
    - 'The Unintended Consequence of Novel Coronavirus (COVID-19) Pandemic on Racial Inequities Associated With Adverse Childhood
      Experiences (ACEs): Findings From a Population-Based Study A rising concern is the COVID-19 pandemic effect on adverse
      childhood experiences (ACEs) due to increased parental stress and social/physical isolation. These pandemic effects
      are likely to be higher in already marginalized communities. The objective of this ecological study was to examine the
      relationship between COVID-19 cases and deaths, race/ethnicity, and the estimated number of adults with ACEs using data
      from South Carolina (SC). COVID-19 reported cases and death data were obtained from the SC Department of Health and
      Environmental Control. ACE data was used from the 2014–2016 SC Behavioral Risk Factor Surveillance System. Census data
      were used to obtain county population data. To measure the relationship between these variables, the Spearman rank-order
      correlation test was used because the data distribution was non-normal. There was a moderate relationship between the
      estimated number of adults with one or more ACEs and deaths (ρ = 0.89) and race/ethnicity-specific COVID-19 case counts
      by county (Black: ρ = 0.76; =White: ρ = 0.96; Hispanic: ρ = 0.89). Further, the Spearman correlation test showed the
      strongest relationship between COVID-19 deaths and race-ethnicity-specific county populations was with the Black adult
      population (ρ = 0.90). Given the known link between existing health inequities and exposure to COVID-19, these results
      demonstrate that the current pandemic could have unintended consequences on the well-being of children and caregivers.
      Response efforts should consider promoting protective factors for children and families and advocating for equitable
      policies and systems that serve children.'
    - 'Use of mRNA COVID-19 Vaccine After Reports of Myocarditis Among Vaccine Recipients: Update from the Advisory Committee
      on Immunization Practices — United States, June 2021 In December 2020, the Food and Drug Administration (FDA) issued
      Emergency Use Authorizations (EUAs) for the Pfizer-BioNTech COVID-19 (BNT162b2) vaccine and the Moderna COVID-19 (mRNA-1273)
      vaccine,† and the Advisory Committee on Immunization Practices (ACIP) issued interim recommendations for their use in
      persons aged ≥16 years and ≥18 years, respectively.§ In May 2021, FDA expanded the EUA for the Pfizer-BioNTech COVID-19
      vaccine to include adolescents aged 12-15 years; ACIP recommends that all persons aged ≥12 years receive a COVID-19
      vaccine. Both Pfizer-BioNTech and Moderna vaccines are mRNA vaccines encoding the stabilized prefusion spike glycoprotein
      of SARS-CoV-2, the virus that causes COVID-19. Both mRNA vaccines were authorized and recommended as a 2-dose schedule,
      with second doses administered 21 days (Pfizer-BioNTech) or 28 days (Moderna) after the first dose. After reports of
      myocarditis and pericarditis in mRNA vaccine recipients,¶ which predominantly occurred in young males after the second
      dose, an ACIP meeting was rapidly convened to review reported cases of myocarditis and pericarditis and discuss the
      benefits and risks of mRNA COVID-19 vaccination in the United States. Myocarditis is an inflammation of the heart muscle;
      if it is accompanied by pericarditis, an inflammation of the thin tissue surrounding the heart (the pericardium), it
      is referred to as myopericarditis. Hereafter, myocarditis is used to refer to myocarditis, pericarditis, or myopericarditis.
      On June 23, 2021, after reviewing available evidence including that for risks of myocarditis, ACIP determined that the
      benefits of using mRNA COVID-19 vaccines under the FDA''s EUA clearly outweigh the risks in all populations, including
      adolescents and young adults. The EUA has been modified to include information on myocarditis after receipt of mRNA
      COVID-19 vaccines. The EUA fact sheets should be provided before vaccination; in addition, CDC has developed patient
      and provider education materials about the possibility of myocarditis and symptoms of concern, to ensure prompt recognition
      and management of myocarditis.'
