  - 'Title: CMU Heinz Capstone Project — Building Sustainable Mobility Analytics Tool

    Published: June, 2022

    Author(s): 99P Labs

    Claps: 58

    Comments: 0

    Word Count: 2780

    URL: https://medium.com/99p-labs/cmu-heinz-capstone-project-building-sustainable-mobility-analytics-tool-cbfe6e2591ee


    The blog article discusses the sustainability of transportation networks and the development of a Sustainable Mobility
    Analytics dashboard by a group of interdisciplinary research scientists and engineers finishing their graduate studies
    at Heinz College. The dashboard aims to help partners at 99P Labs understand the complexity of transportation networks
    and evaluate their sustainability. The article details the three phases of the project, the methodologies for calculating
    various metrics featured on the dashboard, and provides use cases for the dashboard. Additionally, it discusses the potential
    for future work and thanks those who supported the project.'
  - 'Title: Navigating Telematics Data

    Published: December, 2023

    Author(s): Amber Liu, Hanna Lee, Parunjodhi Munisamy, Yaretsy Castro, and Tulip Daaboul

    Claps: 60

    Comments: 0

    Word Count: 1637

    URL: https://medium.com/99p-labs/navigating-telematics-data-1b59e09489c7


    The blog article discusses the importance of telematics data and its relevance in the transportation landscape. It outlines
    the challenges faced in working with telematics data, the tools and resources used, and the process of navigating and
    visualizing the data. The article also delves into the specific analysis of telematics data and census data in Ohio, highlighting
    the impact of Covid on transportation and income levels. The authors express a desire to further explore pre-covid and
    post-covid trends and extend the investigation to other states in the United States.'
- source_sentence: How does gamification enhance the learning experience in data science according to the blog?
  sentences:
  - 'Title: Unlocking Potential: The Power of Gamification in Employee Data Science Learning

    Published: April, 2024

    Author(s): Fern Zhang

    Claps: 5

    Comments: 0

    Word Count: 1661

    URL: https://medium.com/99p-labs/unlocking-potential-the-power-of-gamification-in-employee-data-science-learning-5f88e97c74aa


    The blog article discusses the use of gamification in employee data science learning. It highlights the challenges in
    data science training and the team''s initiative to revolutionize it using gamification strategies. The team adopted a
    multifaceted approach to understand the diverse backgrounds and prior knowledge of their target learners to design effective
    instruction. The article also discusses the gamification strategies for manager and practitioner training, as well as
    the user testing feedback and future plans for employee training in data science. Overall, the article emphasizes the
    importance of data science training and the use of gamification to make it an engaging and impactful learning experience.'
  - 'Title: CMU Capstone Project — Visualization Framework Of Telematics Data

    Published: April, 2024

    Author(s): Yiheng Zhang, Yixue Yin, Rui Huang

    Claps: 1

    Comments: 0

    Word Count: 2520

    URL: https://medium.com/99p-labs/cmu-capstone-project-visualization-framework-of-telematics-data-abb74fcbb975


    The blog article discusses the development of an application to display telematic trajectory data in various formats on
    a web browser. The project involved brainstorming, user interviews, experimentation, and necessary pivots to define the
    trajectory of the development process. The team also focused on enhancing the foundational dashboard, building up a plugin
    system, fixing problems, and building new features. The final sprint involved finalizing and enhancing the user interface
    of the visualization framework. The article also outlines future works for the project.'
  - 'Title: Summer Sprint 3: Planes, Trains, and Autonomous Vehicles

    Published: September, 2022

    Author(s): MHCI x 99P Labs Capstone Team

    Claps: 4

    Comments: 0

    Word Count: 1728

    URL: https://medium.com/99p-labs/summer-sprint-3-planes-trains-and-autonomous-vehicles-5e8b40dbb67e


    The MHCI x 99P Labs Capstone Team worked remotely from NYC and San Diego, attending two major UX conferences and learning
    skills to apply to their project. They solidified their understanding of quantitative research methods and learned how
    to address points of friction in a user''s journey. The team discovered benefits and challenges of remote work, and tested
    low-fi prototypes of built-in screens in an autonomous people-mover. They conducted a brainstorm of all the capabilities
    they imagine their AV''s ecosystem would have and identified the highest priority capabilities. The team also developed
    a wireflow based on their map of capabilities and prototyped it in Figma to test with participants. They plan to A/B test
    different content for the in-app options and continue to explore specificity levels when it comes to giving passengers
    information. They are excited to bring all of their learnings to life in their final design, which will inform the future
    of shared AV transportation.'
