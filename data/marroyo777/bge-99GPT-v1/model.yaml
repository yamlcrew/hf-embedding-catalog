    Word Count: 2211

    URL: https://medium.com/99p-labs/how-llms-can-drive-the-intersection-between-social-and-mobility-1cca9f34e410


    The article discusses the authors'' journey in tackling a challenge for 99P Labs, exploring the relevance of LLMs for
    the company to engage their users in the future of mobility. The authors detail their process of ideation, convergent
    and divergent thinking, and the development of a product or service that leverages the capabilities of ChatGPT or Gen
    AI to initiate or influence physical actions. The article concludes with recommendations and insights gained from the
    project.'
  - 'Title: Harnessing Sensors and Software

    Published: August, 2023

    Author(s): Edward Lui

    Claps: 0

    Comments: 0

    Word Count: 1133

    URL: https://medium.com/99p-labs/harnessing-sensors-and-software


    The blog article discusses the author''s two-month internship at 99P, focusing on sensors and their integration with the
    Robot Operating System (ROS). The author worked on the SOMEthings project, exploring technologies such as the Intel Realsense
    D435i Depth Camera, HC-SR04 Ultrasonic Sensor, and DW1000 UWB Module. The challenges faced and accomplishments achieved
    during the internship are highlighted, providing valuable insights and hands-on experience. The article concludes with
    an invitation for collaboration and engagement with 99P Labs.'
  - 'Title: Sprint 6: Designing a Mobile Mentor

    Published: October, 2023

    Author(s): Alana Levene

    Claps: 1

    Comments: 0

    Word Count: 1015

    URL: https://medium.com/99p-labs/sprint-6-designing-a-mobile-mentor


    The 99P Labs x CMU MHCI Capstone Team has transitioned from research to design, focusing on creating a Mobile Mentor for
    Gen Z to facilitate on-the-go learning. The team has identified key insights from their research and has begun the prototyping
    process using a low-fidelity cardboard model. They are actively involving participants in the design process and are considering
    various influencing factors on their product. The team plans to transition to a design sprint timeline and is excited
    to continue developing this innovative product.'
