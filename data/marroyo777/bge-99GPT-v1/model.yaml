  - 'Title: Innovative Projects at MakeOHI/O

    Published: March, 2023

    Author(s): Ryan Lingo

    Claps: 58

    Comments: 0

    Word Count: 603

    URL: https://medium.com/99p-labs/innovative-projects-at-makeohi-o-6f8a4c5a3d02


    The blog article discusses the Innovative Projects at MakeOHI/O, a makeathon event sponsored by 99P Labs. The event aimed
    to encourage creativity and innovation among undergraduate and graduate students. The article highlights three successful
    projects from the event, including a platform for visually impaired individuals, a safety system for cars using robots,
    and an automated rearview mirror and sun visor adjustment system. The article also expresses gratitude to the event organizers
    and participants and invites readers to connect with 99P Labs for collaboration.'
  - 'Title: An Overview of Machine Learning — Part 2: All About Regression

    Published: January, 2023

    Author(s): Luka Brkljacic

    Claps: 2

    Comments: 0

    Word Count: 4550

    URL: https://medium.com/99p-labs/an-overview-of-machine-learning-part-2-all-about-regression-2f991281932e


    The blog article provides an in-depth overview of regression in machine learning. It covers linear regression, calculating
    R, limitations of R, multiple regression, adjusted R, and logistic regression. The article also includes practical Python
    examples for linear regression and multiple regression. The author also mentions that the next post will cover decision
    trees.'
