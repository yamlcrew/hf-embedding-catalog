      on a web browser. The project involved brainstorming, user interviews, experimentation, and necessary pivots to define
      the trajectory of the development process. The team also focused on enhancing the foundational dashboard, building up
      a plugin system, fixing problems, and building new features. The final sprint involved finalizing and enhancing the
      user interface of the visualization framework. The article also outlines future works for the project.'
