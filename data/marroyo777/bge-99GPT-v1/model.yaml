  - 'Title: How LLMs can Drive the Intersection Between Social and Mobility

    Published: December, 2023

    Author(s): Roopal Joshi, Nishant Chintalapati, Sanghmitra Wankhade, Ashima Saxena, and Ken Pulverman

    Claps: 1

