- source_sentence: What limits are being considered for data quality checks?
  sentences:
  - Unlike many other Agile teams, we don t do a Retro every sprint, mostly because we do one-week sprints.
  - Our team has been exploring implementing data quality checks into our data platform. We ve been trying to establish our
    goals, limits, and expectations, some of which were discussed in Part 1 of our Data Quality blog posts.
  - Literature and Topical ReviewEach team member performed a literature review on telematics research, identifying its applications,
    methodologies, and critical insights.
- source_sentence: What are the potential consequences of not researching before coding?
  sentences:
  - This indicates a degree of variance in the model s accuracy across different times and conditions.
  - In order to objectively test ourselves on the knowledge we ve gained, we decide to take a quiz. The quiz contains 50 images
    of either dogs or cats and we have to determine which animal the image most closely resembles.
  - To reiterate, before even writing any code, it s important to do proper research into your team s documentation and online
    resources. A lot of time can be saved by reusing code that can adapt to your use case instead of starting from scratch
    every time.
