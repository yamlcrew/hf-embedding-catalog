  - source_sentence: Under what specific evidentiary standard is evidence of a third party's motive or opportunity admissible
      to create reasonable doubt about a defendant's guilt?
    sentences:
    - "In Walker v. State,\n353 Ark. 12, 17\n,\n110 S.W.3d 752, 755\n (2003) we explained our\n\nholding in Zinger. \n\n \
      \      We have held that a defendant may introduce evidence tending to show that\n       someone other than the defendant\
      \ committed the crime charged, but such evidence\n       is inadmissible unless it points directly to the guilt of the\
      \ third party. Evidence\n       which does no more than create an inference or conjecture as to another's guilt is\n\
      \       inadmissible. [Burmingham v. State,\n342 Ark. 95\n,\n27 S.W.3d 351\n (2000)]; Zinger v.\n       State,\n313\
      \ Ark. 70\n,\n852 S.W.2d 320\n (1993) (citing State v. Wilson,\n322 N.C. 117\n,\n367 S.E.2d 589\n (1988)). This rule\
      \ does not require that any evidence, however remote,\n       must be admitted to show a third party's possible culpability;\
      \ evidence of mere\n\n\n                                               24\n\f       motive or opportunity to commit\
      \ the crime in another person, without more, will\n       not suffice to raise a reasonable doubt about a defendant's\
      \ guilt. There must be\n       direct or circumstantial evidence linking the third person to the actual perpetration\n\
      \       of the crime."
    - 'This court commented further on the doctrine of informed consent in Williams v. Menehan, 191 Kan. 6, 379 P. 2d 292.
      There it was held the parents of a small child who died while a team of physicians was performing a cardiac catheterization
      had given an informed consent to the procedure. In commenting on the rule as laid down iii Natanson, supra, it was said:


      ". . . [I]t is the duty of a doctor to make a reasonable disclosure to his patient of the nature and probable consequences
      of the suggested or recommended treatment, and to make a reasonable disclosure of the dangers within his knowledge which
      are incident or possible in the treatment he proposes to administer. But this does not mean that a doctor is under an
      obligation to describe in detail all of the possible consequences of treatment. To make a *532 complete disclosure of
      all facts, diagnoses and alternatives or possibilities which might occur to the doctor could so alarm the patient that
      it would, in fact, constitute bad medical practice." (p. 8.)'
    - "Commonwealth v. Melvin,\n103 A.3d 1, 40\n (Pa. Super. 2014). \n\n      The trial court accurately summarized the facts\
      \ presented at trial,\n\nviewed in the light most favorable to the Commonwealth as verdict winner:\n\n             \
      \     On July 18, 2013, Susan Riffle was a passenger\n              on a motorcycle being operated by [Mangone]. The\n\
      \              motorcycle hit some loose gravel and went down and\n              Riffle, who sustained numerous injuries\
      \ as a result of\n              the accident, was \"Life Flighted.\"[] When Riffle saw\n              [Mangone] leave\
      \ the scene of the accident, her belief\n              was that he was going for help because she told him\n       \
      \       that help was needed. \n\n                 Andrew Franko, a first responder, responded to\n              the\
      \ scene and observed a female, who was not in\n              good condition, lying on the roadway. Observing\n     \
      \         [Mangone] going towards his motorcycle, Franko\n              said to him that \"she is hurt. You can't go\
      \ nowhere.\"\n              Franko also advised [Mangone] that he was a first\n              responder and could provide\
      \ help.        Nonetheless,\n              [Mangone] picked up his motorcycle and left."
  - source_sentence: Under what specific conditions can a plaintiff's commitment to a psychiatric hospital toll the statute
      of limitations for a wrongful confinement claim?
    sentences:
    - "The Court concludes, therefore, that plaintiff's action in this case is barred by the applicable statute of limitations,\
      \ Va. Code § 8-24, unless, plaintiff's right of action was preserved by reason of insanity in accord with Va.Code §\
      \ 8-30. \n\nPlaintiff's right to maintain the instant action was not prevented by the mere fact of his commitment to\
      \ Westbrook Hospital. The then prevailing Virginia law—Va.Code § 37—99 provided:\n\n\"Commitment under this section\
      \ shall not be deemed a final adjudication of the *325 person committed, and shall not affect any right or privilege\
      \ heretofore possessed by such person under the laws of the Commonwealth.\" (Emphasis added.) \n\nThe term \"insane\"\
      \ as used in statutes extending the time within which to commence an action has been held to mean such a condition of\
      \ mental derangement as actually to bar the sufferer from comprehending rights which he is otherwise bound to know.\
      \ A plaintiff may not rely on an adjudication of insanity to toll the statute of limitations and, at the same time,\
      \ allege wrongfulness of confinement and treatment due to alleged sanity. Hoffman v. Halden, 268 F.2d 280 (9th Cir.\
      \ 1959), overruled on other grounds sub nom. Cohen v. Norris, 300 F.2d 24 (9th Cir. 1962); Hoffman v. Keller, 193 F.Supp.\
      \ 733 (D.C.Ore.1961); Kenny v. Killian, 133 F.Supp. 571 (D.C.Mich.1955), aff'd, 232 F.2d 288 (6th Cir. 1956), cert.\
      \ denied, 352 U.S. 855, 77 S.Ct. 84, 1 L.Ed.2d 66."
    - 'II. DISCUSSION


      The ALJ''s decision must be affirmed if it conforms to the law and is supported by substantial evidence on the record
      as a whole. See 42 U.S.C. § 405(g); see also Kluesner v. Astrue, 607 F.3d 533, 536 (8th Cir.2010). " ''Substantial evidence
      is less than a preponderance but is enough that a reasonable mind would find it adequate to support the conclusion.''
      " Klues-


      ner, 607 F.3d at 536 (quoting Finch v. Astrue, 547 F.3d 933, 935 (8th Cir.2008)). This standard of review requires the
      reviewing court to consider both evidence that supports the ALJ''s decision as well as evidence that detracts from it.
      607 F.3d at 536. However, the court may not reverse the ALJ''s decision simply because substantial evidence exists in
      the record that would have supported a different outcome, or because the court would have decided the case differently.
      Id.; Haley v. Massanari, 258 F.3d 742, 746 (8th Cir.2001) (citations omitted). Rather, " ''[i]f, after reviewing the
      record, the court finds it is possible to draw two inconsistent positions from the evidence and one of those positions
      represents the ALJ''s findings, the court must affirm the ALJ''s decision.'' " Owen v. Astrue, 551 F.3d 792, 798 (8th
      Cir.2008) (quoting Goff v. Barnhart, 421 F.3d 785, 789 (8th Cir.2005)). In short, a reviewing court should neither consider
      a claim de novo, nor abdicate its duty to carefully analyze the entire record. Wilcutts v. Apfel, 143 F.3d 1134, 1136-37
      (8th Cir.1998) (citation omitted).'
    - "Instead, defendant SCM urges that the Court should dismiss or stay this action under the doctrine of Colorado River\
      \ Water Conservation District v. United States, 424 U.S. 800, 96 S.Ct. 1236, 47 L.Ed.2d 483 (1976). Defendant maintains\
      \ that this Court should follow the District of Delaware which relied upon the Colorado River doctrine to stay an EPA\
      \ action under the Clean Water Act, 33 U.S.C. § 1251 et seq., in United States v. Cargill, Inc., 508 F.Supp. 734 (D.Del.1981)\
      \ (Latchum, C.J.). \n\nIn Colorado River, the United States brought an action in federal court, on its own behalf and\
      \ on behalf of several Indian tribes, seeking adjudication of water rights based on federal and state law. One of the\
      \ defendants in that suit thereafter sought in state court to make the United States a party to water-right proceedings\
      \ in state court, which proceedings are held on a continuous basis. The state-court application by the federal-suit\
      \ defendant sought to make the United States a state-court party for the purpose of there adjudicating all the claims\
      \ of the United States, both state and federal, pursuant to the McCarran Amendment 6 which provides the consent of the\
      \ United States to suits against it in state courts concerning water rights."
  - source_sentence: What are the procedural steps and requirements for appealing an order that modifies a previous directive
      to call a meeting for electing directors?
    sentences:
    - "Random House Webster's College Dictionary (2d ed), published in 1997, contains the following definition of \"damage,\"\
      \ to wit: \"Injury or harm that reduces value, or usefulness, etc.\" Denzer and McQuillan, in their Practice Commentary\
      \ to Penal Law § 145.00 (McKinney's Cons Laws of NY, Book 39, at 378 [1967]) stated: \"'damage' implies an injury or\
      \ *305harm to property that lowers its value or involves loss of efficiency.\" Accordingly, this court held and determined\
      \ that if spraying liquid chicken feces on the Court of Appeals reduced its usefulness or involved loss of efficiency,\
      \ that would be sufficient for a jury to find damage. This court further determined that the amount of clean-up costs\
      \ could be properly considered by the jury in determining the amount of damage to property. \n\nCHARGE TO THE JURY\n\
      \nIn accordance with the foregoing, this court on December 23, 1999 charged the jury as follows:\n\n\"The First count\
      \ is Criminal Mischief in the Second Degree. \n\n\"Under our law, a person is guilty of Criminal Mischief in the Second\
      \ Degree when with intent to damage property of another person, and having no right to do so nor any reasonable ground\
      \ to believe that he has such right, that person damages property of another person in an amount exceeding one thousand\
      \ five hundred dollars ($1,500.00)."
    - "In this case, it would be disingenuous at best to find that the actions of M & M Dodge have not caused considerable\
      \ financial and emotional harm to the Walkers. In fact, the Court has never encountered such egregious behavior and\
      \ lack of respect for the protection afforded debtors in bankruptcy. Moreover, this Court does not believe that Congress\
      \ would enact 11 U.S.C. § 524 and not empower bankruptcy courts to dissuade invidious creditors from conduct violative\
      \ of a clear congressional prohibition. To do so would be nothing more than an exereise in legislative futility. \n\n\
      Actual Damages\n\nThe Walkers are certainly entitled to actual damages for the violation of the post-discharge injunction.\
      \ These reasons have already concluded that the seizure was wrongful and under no color of state law since the chattel\
      \ mortgages were forfeited. Immediately afterwards, M & M Dodge sold both the vehicles for $3,822.75 in October *850\
      \ 1992. 30 The Court believes that this amount is representative of the fair market value at the time of the illegal\
      \ repossession. Although the Walkers were required to rely on relatives and borrowed transportation, they did not offer\
      \ any proof of out-of-pocket expenses or loss wages in connection with their claims. Hence, the Walkers are entitled\
      \ to be reimbursed only $3,822.75 for the value of their vehicles."
    - Order of April 28, 1931, modified by providing for the calling of a meeting for the purpose of choosing directors at
      a new election, and as so modified affirmed, without costs. The date of said election to be fixed in the order to be
      entered hereon. Appeal from order of May 27, 1931, dismissed, without costs. No opinion. Settle order on notice. Present
      — Finch, P. J., Merrell, McAvoy, Martin and Sherman, JJ.
  - source_sentence: What is the exclusive remedy available to a state officer for violating a specific business regulation
      when a later statute addresses that issue differently than a general statute?
    sentences:
    - "Anderson, J.,\n\ndelivered a specially concurring opinion on suggestion of error. \n\nRegardless of what state officer\
      \ has the right to sue it is manifest to me that the only remedy, is revocation of license to do business in the state.\
      \ The statute plainly provides that for a violation of the act that is the- remedy. Surely it is unnecessary to cite\
      \ authorities to sustain the proposition that when there exists a general statute on any subject and later the legislature\
      \ by another act lifts out of the general statute a particular branch of it and deals with it specifically and differently\
      \ from the way it is dealt with in the general statute, to that extent the subsequent statute controls over the former.\
      \ The decisions of the courts of this country so holding are numerous, a citation of them would probably cover several\
      \ pages. \n\nUnder the authorities cited in the controlling opinion th,ere may be intervention where the proposed intervenor\
      \ \"claims\" an interest in a fund in the court. The court does not adjudicate in advance whether hé has a real interest\
      \ in the fund. The claim of an interest is all that is necessary. If it develops on the trial of the cause that the\
      \ intervenor has no interests, of course that would mean that he had no right to intervene. In other words, intervention\
      \ is not a preliminary question to be decided by the court before the cause is reached on its merits. \n\nI concur in\
      \ overruling-the suggestion of error, but not in all that is said in the controlling opinion."
    - "3. Since petitioner and his brother owned undivided interests in the realty, it was doubtless convenient for them to\
      \ operate it as partners. But the partnership did not own the land. It is not thought that the agreement to convert\
      \ into community property land theretofore separately owned was any less effective because of the existence of the partnership.\
      \ And, under local law, the partnership arrangement did not of itself deprive the wife of her vested community interest,\
      \ either in the land or in the income. Rucker v. Blair, 9 Cir., 32 F.2d 222. \n\nWhile for certain purposes petitioner's\
      \ interest in the partnership is to be regarded as personal property, we are unable to see any significance in the fact\
      \ so far as concerns the disposition to be made of the case. The income from the community *359land was personal property,\
      \ certainly, but its status as community property is not altered by the circumstance that the spouses were domiciled\
      \ in a non-community state. Compare Johnson v. Commissioner, 8 Cir., 88 F.2d 952; Id., 8 Cir., 105 F.2d 454; Hammonds\
      \ v. Commissioner, supra, note 1."
    - "In the proceeding before us it is sought to prohibit the district court from assuming jurisdiction of a matter *66involving\
      \ title and right to possession of real property where a determination and establishment of that title has been already\
      \ made by a ministerial officer and where, notwithstanding the' constitutional direction that such was the original\
      \ function of the district court, the determination and establishment as originally made by the ministerial officer\
      \ can only be affected to the extent of modification. \n\nThe order of determination was originally and finally made\
      \ by a ministerial officer, and in this he exercised functions belonging to the district court. \n\nThe district court\
      \ assumes to take jurisdiction of this matter after determination by a ministerial officer, and can only review to ultimately\
      \ affirm or modify that determination. In this it permits itself to be divested of original jurisdiction and assumes\
      \ an appellate jurisdiction forbidden by the constitution. \n\nThe order of determination which the lower court will\
      \ act upon, and which it will modify or affirm, is a decree by which it is bound, and not of its own making. It is not\
      \ due process of law. \n\nThis writ should have issued."
  - source_sentence: Under what circumstances can a plaintiff recover damages for lost profits when a defendant's breach of
      contract involves the failure to provide telephone service?
    sentences:
    - "UNITED STATES COURT OF APPEALS\n                            UNITED STATES COURT OF APPEALS\n                    FOR\
      \ THE FIRST CIRCUIT\n                                FOR THE FIRST CIRCUIT\n                                       \
      \  \nNo. 94-1711\n\n                  SAS OF PUERTO RICO, INC.,\n\n                    Plaintiff, Appellant,\n\n   \
      \                           v.\n\n                PUERTO RICO TELEPHONE COMPANY,\n\n                     Defendant,\
      \ Appellee. \n\n                                         \n\n         APPEAL FROM THE UNITED STATES DISTRICT COURT\n\
      \n               FOR THE DISTRICT OF PUERTO RICO\n\n        [Hon. Jose Antonio Fuste, U.S. District Judge]\n       \
      \                                                          \n\n                                         \n\n       \
      \                     Before\n\n                    Torruella, Chief Judge,\n                                      \
      \                \n\n                    Boudin, Circuit Judge,\n                                                  \
      \   \n\n              and Boyle,* Senior District Judge.\n                                                         \
      \  \n\n                                         \n\nLaurence  Z.  Shiekman  with  whom  M.  Duncan  Grant,  Frank  \
      \ M.\n                                                                              \nRapoport,  Michael A. Ceramella\
      \ and Pepper, Hamilton & Scheetz were on\n                                                                      \nbrief\
      \ for appellant.\nPhilip J. Mause with whom Joaquin A. Marquez and Drinker Biddle  &\n                             \
      \                                                 \nReath were on brief for appellee.\n             \n\n           \
      \                              \n\n                      February 21, 1995\n                                       \
      \  \n\n                \n\n*Of the District of Rhode Island, sitting by designation."
    - "We believe the same prerequisite should operate in this\ncase. The requirement that parties seeking Rule 60(b) relief\n\
      show some prospect of succeeding on the merits flows from\nthe basic principle that courts should revive previously-\n\
      dismissed claims only if they have some reason to believe that\ndoing so will not ultimately waste judicial resources.\
      \ See\nMurray,\n52 F.3d at 355\n. This principle holds true here:\nreviving Thomas's appeal will constitute an \"empty\
      \ exercise\nor futile gesture,\"\nid.,\n unless Thomas has some possibility of\nprevailing. \n\n       Indeed, we see\
      \ two especially good reasons to condition\nthe grant of Thomas's motion for reconsideration on his\ndemonstrating a\
      \ chance of succeeding on the merits. First,\nThomas claims that his appeal should be reinstated because\nthe PLRA's\
      \ three-strikes provision is unconstitutional as\napplied to him. For this court to reach out and decide this\ndifficult\
      \ and important question simply to reinstate a pointless\nappeal would violate the norm of constitutional avoidance\
      \ to\nwhich we generally adhere. See Kalka v. Hawk,\n215 F.3d 90, 97\n (D.C. Cir. 2000) (\"Federal courts should not\
      \ decide\nconstitutional questions unless it is necessary to do so.\").\nSecond, the PLRA provides that a court \"shall\
      \ dismiss\" an\nIFP litigant's case if the \"appeal . . . is frivolous or malicious\n. . . [or] fails to state a claim\
      \ on which relief may be granted.\"\n28 U.S.C. § 1915\n(e)(2). Thus, even were we to grant Thomas\nIFP status and reinstate\
      \ his appeal, we would then have to\n\f                                7\npromptly dismiss the case if his claims lack\
      \ merit. What could\nbe a more \"futile gesture\" than reinstating an appeal only to\nthen immediately dismiss it?"
    - "Nor did the BIA abuse its discretion by denying Chen's motion to reopen, which alleged that he suffered from the ineffective\
      \ assistance of counsel. To prevail on such a claim, the alien must first comply with certain procedures set forth in\
      \ Matter of Lozada, 19 I. & N. Dec. 637 (BIA 1988). Here, the BIA properly noted that besides filing a supporting affidavit,\
      \ Chen made no effort to comply with the requirements enumerated in Lozada. Chen not only failed to notify his former\
      \ counsel of the allegations of ineffective assistance and to allow him an opportunity to respond, he also failed to\
      \ file a complaint with a disciplinary authority or provide an explanation for not doing so. See Twum v. INS, 411 F.3d\
      \ 54, 59 (2d Cir.2005) (citing Lozada, 19 I. & N. Dec. at 639). \n\nBy failing to substantially comply with Lozada,\
      \ Chen \"forfeit[ed][his] ineffective assistance of counsel claim.\" Jian Yun Zheng v. U.S. Dep't of Justice, 409 F.3d\
      \ 43, 47 (2d Cir.2005). While it is true that \"slavish adherence\" to Lozada's requirements is not necessary in certain\
      \ circumstances, and while the BIA acknowledged in its June 2006 decision that the brief written by Chen's former counsel\
      \ was deficient, this is not a case in which the facts supporting a \"claim of ineffective assistance are clear on the\
      \ face of the record,\" which may excuse the failure to comply with Lozada. Yi Long Yang, 478 F.3d at 142-43. The facts\
      \ here are distinct from the circumstances presented in Yi Long Yang, in that Chen's former counsel was not disbarred,\
      \ nor was there evidence that the agency explicitly assumed his competence. See id. at 142."
