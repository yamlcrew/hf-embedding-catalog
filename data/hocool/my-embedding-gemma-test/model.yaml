widgetData:
- source_sentence: Які критерії кваліфікації повідомлення як спаму за статтею 2 Закону Про електронні комунікації?
  sentences:
  - Закон України Про захист персональних даних. Стаття 2. Визначення термінів. Обробка персональних даних – будь-яка дія
    або сукупність дій, таких як збирання, реєстрація, накопичення, зберігання, адаптування, зміна, використання і поширення.
  - Закон України Про електронні комунікації. Стаття 2. Визначення термінів. Спам – електронні, текстові та/або мультимедійні
    повідомлення, що без попередньої згоди (замовлення) користувачів неодноразово (більше п'яти повідомлень одному абоненту)
    надсилаються на їхні адреси.
  - Закон України Про електронні комунікації. Стаття 2. Визначення термінів. Спам – електронні, текстові та/або мультимедійні
    повідомлення, що без попередньої згоди (замовлення) користувачів неодноразово (більше двох повідомлень одному абоненту)
    надсилаються на їхні адреси.
- source_sentence: Хто може бути володільцем моїх персональних даних?
  sentences:
  - Закон України Про електронні комунікації. Стаття 6. Повноваження центрального органу виконавчої влади. Визначення та оновлення
    показників для універсальної послуги широкосмугового доступу до мережі Інтернет та параметрів якості таких послуг.
  - Закон України Про захист персональних даних. Стаття 2. Визначення термінів. Володілець персональних даних – фізична або
    юридична особа, яка визначає мету обробки персональних даних, встановлює склад цих даних та процедури їх обробки.
  - Закон України Про захист персональних даних. Стаття 2. Визначення термінів. Володілець персональних даних – фізична або
    юридична особа, яка визначає мету обробки персональних даних, але не встановлює склад цих даних та процедури їх обробки.
- source_sentence: Які вимоги до згоди суб'єкта персональних даних за законом України?
  sentences:
  - Згода суб'єкта персональних даних – добровільне волевиявлення фізичної особи щодо надання дозволу на обробку її персональних
    даних без урахування сформульованої мети їх обробки.
  - Закон України Про захист персональних даних. Стаття 2. Визначення термінів. Згода суб'єкта персональних даних – добровільне
    волевиявлення фізичної особи щодо надання дозволу на обробку її персональних даних відповідно до сформульованої мети їх
    обробки.
  - Закон України Про електронні довірчі послуги. Стаття 11. Суб'єкти відносин. Суб'єктами відносин у сфері електронних довірчих
    послуг є користувачі, надавачі послуг, держателі реєстрів, органи оцінки відповідності та засвідчувальний центр.
- source_sentence: Які повноваження має центральний орган виконавчої влади згідно зі статтею 6 Закону про електронні комунікації?
  sentences:
  - Закон України Про електронні комунікації. Стаття 2. Визначення термінів. Безпека мереж і послуг – здатність електронних
    комунікаційних мереж і послуг протистояти діям, що становлять загрозу доступності, цілісності чи конфіденційності таких
    мереж і даних.
  - Закон України Про електронні комунікації. Стаття 6. Повноваження центрального органу виконавчої влади. Центральний орган
    зобов'язаний безоплатно надавати документи та інформацію органам влади, регуляторному органу та постачальникам послуг.
  - Закон України Про електронні комунікації. Стаття 6. Повноваження центрального органу виконавчої влади. Центральний орган
    має право безоплатно отримувати документи та інформацію від органів влади, регуляторного органу та постачальників послуг.
- source_sentence: Що потрібно для будівництва інфраструктури електронних комунікацій?
  sentences:
  - Закон України Про електронні комунікації. Стаття 2. Визначення термінів. Розгортання електронних комунікаційних мереж
    – будівництво інфраструктури, встановлення технічних засобів на земельних ділянках або елементах інфраструктури об'єктів
    доступу.
  - Закон України Про захист персональних даних. Стаття 2. Визначення термінів. Знеособлення персональних даних – вилучення
    відомостей, які дають змогу прямо чи опосередковано ідентифікувати особу.
  - Закон України Про електронні комунікації. Стаття 2. Визначення термінів. Розгортання електронних комунікаційних мереж
    – встановлення технічних засобів та будівництво інфраструктури на водних об'єктах або елементах інфраструктури об'єктів
    доступу.
