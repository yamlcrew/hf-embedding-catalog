    sentences:
    - "hóa; thuế độc quyền; thué điền thổ...\r\nTheo những con số thống kê chính thức thì các loại thuế trên \r\nđều tăng\
      \ lên đáng kể, khoảng từ ba đến hơn ba lần vào năm 1945 \r\n(số dự thu) so với năm 1939 (số thực thu) như sau:\r\nBảng\
      \ 29: Thu nhập từ một sổ loại thuế ở Đông Dương \r\ntrong các năm 1939 và 19453\r\nĐom vị: nghìn đồng\r\nThuế 1939 1945\r\
      \nThuế tiêu thụ và vận chuyển hàng hoá 20.655.000 58.265.000\r\nThuế muối, rượu, thuốc phiện, diêm, pháo,\r\nthuốc lá\r\
      \n24.694.000 87.000.000\r\nThuế điền thổ, trước bạ 11.821.000 28.625.000\r\nvề thuốc phiện, do việc nhập khẩu bị ngừng,\
      \ Pháp khuyến khích \r\nnhân dân thượng du trồng loại cây này nên số thuốc phiện sản xuất \r\nđược ngày một tăng: năm\
      \ 1940: 7.560kg; nãm 1941: 17.344kg; năm\r\n1. Annuaire statistique de V Union f,rariỊaise Outre- mer 1939-1946, tr.\
      \ K -\r\n90-93.\r\n2, 3. Annuaire statistique de runion firanẹaise Outre - mer 1939-1946, tr.\r\nK-90.\r\n552"
    - "Chương I. Chính sách thuộc địa của Pháp..\r\nbộ đồng bào các dân tộc thiểu số. về phương diện này, chính quyền \r\n\
      thuộc địa còn muốn đi xa hơn là cố định đồng bào vào một không \r\ngian nhất định, rồi đưa họ đến với chế độ sở hữu\
      \ ruộng đất - chế độ \r\nsở hữu tập thể và ấn định cho họ một chế độ thuế khóa.\r\nNhư vậy, “chính sách thâm nhập” có\
      \ xuất phát điểm là chính \r\nsách “chia đế trf' và mục tiêu là tách các dân tộc thiểu số ra khỏi \r\ndân tộc Kinh,\
      \ dùng dân tộc nọ chống lại dân tộc kia và nhằm một \r\nmục đích cao hơn là từ chinh phục, khuất phục về chính trị để\
      \ tiến \r\nsang khai thác, bóc lột về đất đai, nhân công và thuế khóa của các \r\nđồng bào.\r\n7. Một số “cải cách”\
      \ xã hội khác liên quan đến nông dân và\r\ncông nhân\r\nLiên quan đến nông dân, trong bài diễn văn về Tinh hình Đông\r\
      \nDương và tuyên bo cải cách vào tháng 9/19301, Pierre Pasquier nêu \r\nra những vấn đề như: thi hành luật điền thổ,\
      \ giúp nông dân Nam Kỳ \r\nthế chấp ruộng đất để vay tín dụng ngân hàng; dẫn thủy nhập điền, \r\nlàm thuỷ lợi để tăng\
      \ diện tích canh tác, cải tiến kỹ thuật trồng trọt; \r\ngiúp nông dân thăng tién về sờ hữu ruộng đất (từ người không\
      \ có \r\nđất lên tiểu điền chủ); mở rộng việc nhượng đất, khẩn hoang ở \r\nnhững vùng rừng núi ở Bắc và Trung Kỳ cũng\
      \ như ở phía tây và \r\nnam Nam Kỳ; quy định lại chế độ lĩnh canh để \"hạn ché bớt sự bóc\r\nlột cùa địa chù đoi với\
      \ tá điền”.\r\nTriển khai những “cải cách” này, Pierre Pasquier cho tiếp tục \r\nxây dựng các công trình thuỷ nông,\
      \ rồi thành lập Hội đồng Khẩn"
    - "theo vài mươi người, đeo gươm, đeo súng, đến thẳng ngay công \r\nquán, đưa ra một lá thư của nước Pháp bằng chữ Hán,\
      \ lời lẽ ngang \r\nngược. Lý Văn Phức không nhận thư, Lạp Biệt Nhĩ quát to doạ nạt, \r\nđể lại thư xuống ghế rồi đi.\
      \ Lý Văn Phức và Nguyễn Đình Tân bàn \r\nvới nhau rằng: \"Nhận lấy thư là có tội, mà đốt thư đi cũng có tội, \r\nkhông\
      \ gì bằng cho chạy trạm về đệ tâu lên\". Lý Văn Phức về Kinh,\r\n1. Thực lục, tập VI, sđd, tr. 301.\r\n492\r\nChương\
      \ VII. Quan hệ đối ngoại\r\nThiệu Trị giận là làm mất quốc thể, sai vệ cẩm y đóng gông đem \r\ngiam ở Tà đãi lậu, bắt\
      \ giải chức, giao cho đình thần bàn.\r\nKhi ấy, bọn Pháp ngày thường lên bờ, ngông nghênh đi lại các \r\nnơi giao tiếp\
      \ với dân đi đạo. Những thuyền quân đi tuần biển bị \r\nchúng bắt giữ lại ở cừa biển và cướp lấy buồm thuyền và dây\
      \ buộc \r\nthuyền cùa 5 chiếc thuyền bọc đồng ở Kinh phái đi Nam (Kim \r\nƯng, Phấn Bằng, Linh Phượng, Thọ Hạc, Vân\
      \ Bằng) đậu ở vụng \r\nTrà Sơn, đối diện vói chiến thuyền Pháp.\r\nViệc báo lên, Thiệu Trị sai ngay Đô thống Hữu quân\
      \ Mai Công \r\nNgôn, Tham tri Bộ Hộ Đào Trí Phú đem biền binh 3 vệ Vũ lâm, Hổ \r\noai, Hùng nhuệ đến Quảng Nam cùng\
      \ với lực lượng thủy, bộ tại \r\nchỗ tổ chức bố phòng. Thiệu Trị truyền chi căn dặn Mai Công \r\nNgôn và Đào Trí Phú\
      \ rằng: \"Người Tây dương nếu đã sợ uy, thu \r\nhình, thì ta không nên tự động thủ trước; nếu chúng sinh chuyện \r\n\
      trước, thì đốc sức thành đài cùng biền binh các hiệu thuyền và \r\nthuyền đồng do Kinh phái đi, ngoài hợp, trong ứng,\
      \ lập tức đánh"
  - source_sentence: Gia Cát Lượng đã giúp ai trong việc quản lý nước Thục?
    sentences:
    - "phải trông coi mọi việc, giúp Thành Vương đến lúc trưởng thành. \r\n4\r\n Hoắc Quang giữ chức Đại tư mã tướng quân,\
      \ phò Hán Chiêu Đế lúc lên ngôi mới 9 tuổi. \r\n5\r\n Gia Cát Lượng tức Khổng Minh, là thừa tướng của Chiêu Đế Lưu Bị\
      \ nước Thục đời Tam Quốc. Lưu Bị chết, con là Lưu Thiện nối \r\nngôi, tức Thục Hậu chúa, mọi việc nước, việc quân đều\
      \ phải trông cậy vào Gia Cát Lượng. \r\n6\r\n Tô Hiến Thành là Thái úy triều Lý Cao Tông, nhận di mệnh Cao Tông phò\
      \ vua nhỏ là Long Cán lên nối ngôi mới 3 tuổi. \r\n7\r\n Tứ phụ: nghĩa là bốn viên đại thần giúp vua khi mới lên ngôi.\
      \ \r\n8\r\n Chỉ Thuận Tông. \r\n9\r\n Xích chủy: nghĩa là mõm đỏ, miệng đỏ, hay đỏ mỏ. Xích chủy hầu là loài đỏ mỏ ám\
      \ chỉ Lê Quý Ly. \r\n10 Bạch kê: nghĩa là gà trắng. Nghệ Tông sinh năm Tân Dậu, tức năm gà. Tân thuộc hành kim, loài\
      \ kim sắc trắng. Vì thế \"bạch kê\" \r\nám chỉ Nghệ Tông. \r\n11 Chữ vương? ở trong lòng chữ khẩu? là chữ \"quốc\"?.\
      \ \r\n12 Theo tục nhà Trần, hằng năm vào ngày mồng 4 tháng 4, vua hội họp bề tôi làm lễ tuyên thệ ở đền Đồng Cổ. (Xem\
      \ bản kỷ, quyển \r\n5, Kiến Trung năm thứ 3, 1277). \r\n13 Chỉ Quý Ly. \r\n288 Đại Việt Sử Ký Toàn Thư - Bản Kỷ - Quyển\
      \ VIII \r\nQuý Ly bỏ mũ, rập đầu khóc lóc từ tạ, chỉ trời vạch đất thề rằng: \r\n\"Nếu thần không biết dốc lòng trung,\
      \ hết sức giúp Quan gia để truyền đến con cháu về sau thì \r\ntrời sẽ ghét bỏ thần\". \r\nQuý Ly lại nói: \"Lúc Linh\
      \ Đức Vương làm điều thất đức, nếu không nhờ oai linh bệ hạ thì thần đã"
    - "éo, xênh xang lạ hom cả\", và gánh xiếc của BẮc thành trổ tài dịp Đại \r\nkhánh \"Ngũ tuần\" của vua: \"4 đứa leo dây,\
      \ đứa trẻ lộn dây, đứa trẻ \r\nmúa trên bàn tay 2 đứa\".\r\nNhững định chế về tổ chức và hoạt động nghệ thuật của nhà\
      \ \r\nNguyễn đã có tác dụng quan ữọng kích thích các loại hình vãn nghệ \r\ndân gian phát triển cả về số lượng lẫn chất\
      \ lượng. Trong các đợt biểu \r\ndiễn ở Kinh đô, trước yêu cầu thưởng lãm nghiêm ngặt và cao hơn \r\nđịa phương, các\
      \ nhà viết kịch bản. đạo diễn, diễn viên phải trau dồi để \r\nnâng cao năng lực sáng tác, dàn dựng và kỹ năng biểu diễn.\r\
      \n2. Nghệ thuật dân gian\r\nSinh hoạt văn nghệ dân gian trong các làng quê cũng phát triển. \r\nỞ Bắc Kỳ, Bắc Trung\
      \ Kỳ, hát ả đào rất phổ biến. Bên cạnh đó là \r\ncác thể loại dân ca: hát Xoan ở Phú Thọ, Quan họ Bắc Ninh, hát \r\n\
      Sli, Then ở Lạng Sơn, hát Ví dặm, Phường vải ở Nghệ An, Hà \r\nTĩnh. Ở các tinh trung du và đồng bằng Bắc Bộ, Thanh\
      \ Hóa, chèo \r\nsân đình mang tính trào lộng nở rộ. Thể loại trò hài, xiếc ở Bắc Kỳ \r\ncũng thu hút đông đảo khán giả.\r\
      \n639"
    - "Tây. Ngoài cơ sờ đúc súng cũ của tiên triều, năm 1825 vua Minh \r\nMệnh mờ thêm sáu xưởng nữa. vốn cần cù và ham học\
      \ hỏi sáng \r\ntạo, những người thợ quân giới đã được \"thứ súng tay nạp thuốc nổ \r\nmạnh theo kiểu Tây dương\". Vào\
      \ những năm cuối triều Minh \r\nM ệnh, họ đã đúc 15 cỗ đại pháo X ung tiêu băng đồng và hai cỗ \r\nsúng lớn Chấn hải,\
      \ loại đại pháo lợi hại trong thủy chiến phương \r\nTây. Sau đó, lại xuất xưởng tiếp 30 cỗ Chấn hải. Năm 1829, quản\
      \ \r\nkho Hải Dương là Tôn Thất Thiện cùng với 100 lính Chấn cơ chế \r\nra cối gỗ chạy bàng sức nước ở khe suối để giã,\
      \ luyện thuốc súng. \r\nDụng cụ này là xe \"Thủy hỏa ký tế\", và những năm sau được phổ \r\ncập trong quân ngũ. Từ vũ\
      \ khí phương Tây, người Đại Nam đã tự \r\ntìm hiểu từng chi tiết để chế tạo thước đo ngắm bắn, thước kiểm tra \r\nthuốc\
      \ súng. Trong bảy năm ờ ngôi, vua Thiệu Trị đúc 9 cỗ súng \r\nbàng đồng hiệu là \"Thần uy phục viễn đại tướng quân\"\
      , cỗ to nhất \r\nlà 10.706 cân, cỗ nhỏ nhất là 10.222 cân, tổng cộng là 93.829 cân.\r\n649\r\nLỊCH SỬ VIỆT NAM - TẬP\
      \ 5\r\nVà ba cỗ súng hiệu \"Bảo Đại định công an dân hòa chúng thượng \r\ntướng quân\", mỗi cỗ trên 14.500 cân, tổng\
      \ cộng là 43.620 cân1.\r\nĐe tạo điều kiện cho quân thủy học tập, bộ Công cấp cho họ la \r\nbàn, thước đo nước, đồng\
      \ hồ cát xem giờ của phương Tây. v ề khoa \r\nmục bắn súng thì lính thủy phải tập bắn súng điểu sang và đại bác. \r\n\
      Minh Mệnh yêu cầu Hiệp biện Đại học sĩ lãnh Thượng thư bộ Binh \r\nTrương Đăng Quế đọc kỹ các sách và bản đồ thủy chiến\
      \ \"Tây"
