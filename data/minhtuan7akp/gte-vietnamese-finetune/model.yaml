  - "éo, xênh xang lạ hom cả\", và gánh xiếc của BẮc thành trổ tài dịp Đại \r\nkhánh \"Ngũ tuần\" của vua: \"4 đứa leo dây,\
    \ đứa trẻ lộn dây, đứa trẻ \r\nmúa trên bàn tay 2 đứa\".\r\nNhững định chế về tổ chức và hoạt động nghệ thuật của nhà\
    \ \r\nNguyễn đã có tác dụng quan ữọng kích thích các loại hình vãn nghệ \r\ndân gian phát triển cả về số lượng lẫn chất\
    \ lượng. Trong các đợt biểu \r\ndiễn ở Kinh đô, trước yêu cầu thưởng lãm nghiêm ngặt và cao hơn \r\nđịa phương, các nhà\
