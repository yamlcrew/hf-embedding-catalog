  - source_sentence: Sự khác biệt giữa các thời đại trong nghệ thuật trang trí rồng được thể hiện như thế nào qua các thời
      Hùng Vương, Lý, Trần, Hồ, Lê, Mạc, Nguyễn?
    sentences:
    - "Tài liệu tham khảo\r\n323. Nguyễn Quang Ngọc, “Mấy nhận xét về kết cấu kinh tế của \r\nmột số làng thương nghiệp ờ\
      \ vùng đồng bằng Bắc Bộ thế kỳ \r\nXVIII-XIX”, Tạp chí Nghiên cứu Lịch sứ, số 5 (218), 1984.\r\n324. Nguyễn Quang Ngọc,\
      \ Phan Đại Doãn, “Mấy ý kiến về hoạt \r\nđộng thương nghiệp ở nông thôn đồng bằng Bắc Bộ thế kỷ \r\nXVIII-XIX (hiện\
      \ tượng và bản chất)”, Tạp chí Nghiên cứu\r\nLịch sử, số 5 (224), 1985.\r\n325. Nguyễn Quang Ngọc, “Thêm vài ý kiến\
      \ về Tam Điệp”, Tạp \r\nchí Nghiên cứu Lịch sử, số 1 (244), 1989.\r\n326. Nguyễn Quang Ngọc, về một số làng buôn ở Đồng\
      \ bàng Bắc \r\nBộ thế kỳ XVIII-XIX, Hội Sừ học Việt Nam, 1993.\r\n327. Nguyễn Quang Ngọc, Vũ Văn Quân, “Tư liệu về nguồn\
      \ gốc \r\nchức năng và hoạt động cùa đội Hoàng Sa”, Tạp chí Khoa\r\nhọc xã hội, Đại học Quốc gia, t.XIV, số 3, 1998,\
      \ ư. 10-20.\r\n328. Nguyễn Quang Ngọc, “Bảo vệ chủ quyền ưên Biển Đông: \r\nmột hoạt động nổi bật của vương triều Tây\
      \ Sơn”, Tạp chí \r\nLịch sử quân sự, số 1, 1999, tr. 15-18.\r\n329. Nguyễn Quang Ngọc (Chủ biên), Tiến trình lịch sứ\
      \ Việt Nam,\r\nNxb. Giáo dục, Hà Nội, 2001.\r\n330. Nguyền Quân, Phan cẩm Thượng, Mỹ thuật cùa người Việt,\r\nNxb. Mỹ\
      \ thuật. Hà Nội. 1989.\r\n331. Nguyễn Tài Thư (Chủ biên), Lịch sử tư tưởng Việt Nam, 2\r\ntập, Nxb. Khoa học xã hội,\
      \ Hà Nội, 1993.\r\n332. Nguyễn Tài Thư, Nho học và Nho học ớ Việt Nam: Một số lý\r\nluận và thực tiễn, Nxb. Khoa học\
      \ xã hội, Hà Nội, 1997.\r\n333. Nguyễn Tưòmg Phượng, Binh chế Việt Nam qua các thời đại,\r\nNgày Mai, 1950."
    - "Ba Thục, Kinh Sở, Ngô Việt…). Kết thúc cuộc \"Hán Sở tranh hùng\", nhà Hán\r\nđã thống nhất đất nước Trung Hoa từ bắc\
      \ xuống nam (tiền bắc hậu nam) và phát\r\ntriển đất nước theo một trật tự ngược lại: tiền nam hậu bắc\".\r\nCó thể hình\
      \ dung cơ cấu của văn hóa Trung Hoa như sau: \r\nVĂN HOÁ\r\nTRUNG\r\nHOA\r\n=\r\nVăn hoá lưu vực sông Hoàng Hà\r\n+\r\
      \nVăn hoá nông\r\nnghiệp lúa nước\r\nĐông Nam Á\r\nVăn hoá du\r\nmục Tây Bắc +\r\nVăn hoá nông\r\nnghiệp khối Trung\r\
      \nNguyên\r\nMối liên hệ và sự tác động qua lại giữa văn hóa Việt Nam với Trung Hoa,\r\ngiữa văn hóa phương Bắc cổ đại\
      \ với văn hóa phương Nam cổ đại (trong đó có\r\nvăn hóa Nam – Á - Bách Việt) có thể trình bày trong bảng 1.5.\r\nVĂN\
      \ HOÁ\r\nP.BẮC CỔ ĐẠI\r\nVĂN HOÁ PHƯƠNG NAM (= Đ.N.Á cổ đại)\r\nVăn hoá Nam-Á (Bách Việt)\r\nVăn hóa vùng lưu\r\nvực\
      \ sông Hoàng\r\nHà\r\nVăn hóa vùng lưu\r\nvực sông Dương\r\nTử\r\nVăn hóa vùng lưu\r\nvực s. Hồng, s.\r\nMã\r\nVăn hóa\
      \ miền\r\nTrung và đồng\r\nbằng s. Mê Kông\r\nVĂN HOÁ TRUNG HOA VĂN HOÁ VIỆT NAM\r\nBảng 1.5: Quan hệ cội nguồn giữa\
      \ văn hóa Việt Nam và Trung Hoa\r\nBài 3: TIẾN TRÌNH VĂN HÓA VIỆT NAM\r\nTiến trình văn hóa Việt Nam có thể chia thành\
      \ 6 giai đoạn: văn hóa tiền\r\nsử, văn hóa Văn Lang - Âu Lạc, văn hóa thời chống Bắc thuộc, văn hóa Đại\r\nViệt, văn\
      \ hóa Đại Nam và văn hóa hiện đại. Sáu giai đoạn này tạo thành ba lớp:\r\nlớp văn hóa bản địa, lớp văn hóa giao lưu\
      \ với Trung Hoa và khu vực, lớp văn\r\nhóa giao lưu với phương Tây.\r\n3.1. Lớp văn hóa bản địa\r\n28\r\nDownloaded\
      \ by Tu?n ?ào Minh (thichhocchui1999@gmail.com)\r\nlOMoARcPSD|49704028"
    - "trái), và hình bán nguyệt (đôi dưới, phải). Trước mắt ta là sự hòa hợp tuyệt vời\r\ncủa cái động (vật nhau) trong thế\
      \ tĩnh của ba hình hình học với những cạnh đáy\r\nvững vàng cho thấy sự ngang sức ngang tài của các chàng trai; sự vận\
      \ động liên\r\ntục của cơ bắp như dừng lại. Hai người chờ vật được khuôn lại trong hai hình\r\nchữ nhật đứng tạo nên\
      \ cảm giác co ro bất tận trong cái rét của lễ hội đầu xuân.\r\n4.1.3. Thủ pháp mô hình hóa đã tạo nên một nền nghệ thuật\
      \ trang trí và\r\nnhiều mô hình mang tính triết lí sâu sắc.\r\nBộ Tứ Linh (Hình 4.20a) với long (rồng) biểu trưng cho\
      \ uy là nam tính; li\r\n(= long mã) hoặc lân (kì lân, con vật tưởng tượng đầu sư tử, mình nai, đuôi trâu,\r\n131\r\n\
      Downloaded by Tu?n ?ào Minh (thichhocchui1999@gmail.com)\r\nlOMoARcPSD|49704028\r\năn cỏ, rất hiền lành - hình 4.20b)\
      \ biểu trưng cho ước vọng thái bình, quy (rùa)\r\nhiểu tượng cho sự sống lâu và phượng (phụng) biểu tượng cho nữ tính.\
      \ Rồng -\r\nPhượng biểu tượng cho hạnh phúc lứa đôi (ở Trung Hoa hiên tượng này là\r\n“loan-phượng”: loan là con đực,\
      \ phượng là con cái). Đồ án trang trí RỒNG phổ\r\nbiến đến mức phản ánh những đặc trưng cửa từng thời đại. Rồng thời\
      \ Hùng\r\nvương, thời Lí, Trần, Hồ, Lê, Mạc, Nguyễn – mỗi thời có những nét đặc thù\r\nriêng tương ứng với thời đại\
      \ của mình.\r\nTứ linh cộng thêm ngư-phúc-hạc-hổ thì thành BÁT VẬT. Ngư (Cá) gắn\r\nvới truyền thuyết \"cá hóa rồng\"\
      \ biểu tượng cho sự thành đạt. Chữ phúc là “sự tốt\r\nlành, may mắn” đồng âm và viết gần giống với chữ bức nghĩa là\
      \ \"con dơi\", vì"
  - source_sentence: Nhiệm vụ quan trọng nhất của các nước công nghiệp chủ nghĩa châu Âu và Nhật Bản sau chiến tranh thế giới
      thứ hai là gì?
    sentences:
    - "Dupuis phái tự mình hành động. Tháng 10-1872, Dupuis đi Hương \r\nCảng và Thượng Hải mua pháo thuyền và đạn dược, mộ\
      \ quân lính,\r\n1. Đó là các cuộc thám hiểm cùa phái đoàn Doudard de Lagrée và Francis \r\nGamier vào những năm từ 1866\
      \ đến 1870.\r\n2. Nguyễn Phan Quang (1949), Việt Nam thế ky XIX (1802-1884), Nxb. \r\nThành phố Hồ Chí Minh, tr. 321.\r\
      \n159\r\nLỊCH SỪ VIỆT NAM - TẬP 6\r\nrồi đến tháng 11 năm đó thì kéo nhau về Bắc Kỳ. Cùng lúc đó, bọn \r\nthực dân hiếu\
      \ chiến ở Nam Kỳ cũng lợi dụng việc triều đình Huế \r\nyêu cầu đưa ra Bắc tiễu trừ giặc biển để phái tàu chiến ra tiếp\
      \ tay \r\ncho Dupuis. Cậy có lực lượng mạnh, Dupuis buộc Kinh lược sứ Lê \r\nTuấn trong vòng hai tuần phải xin triều\
      \ đình Huế cho phép hắn \r\nđược mượn đường đi lên Vân Nam. Nhung hạn 2 tuần chưa hết và \r\ngiấy phép cũng chưa có\
      \ mà Dupuis đã nổ súng, rồi tự tiện kéo đoàn \r\ntàu vào Cửa cấm (Hải Phòng) ngược sông Hồng lên Hà Nội (ngày \r\n22-12-1872).\
      \ Theo sử nhà Nguyễn thì ngày 2-12-1872, Dupuis “từ\r\nHài Dương đi đen Bắc Ninh, Hà Nội, các quan tình và quân thứ\
      \ 2-\r\n3 lần biện bác ngăn trở không cho đi, nhưng chúng không nghe\r\nTrong khoảng thời gian từ năm 1872 đến năm 1873,\
      \ Dupuis đã ỷ \r\nthế quân Pháp và triều đình nhà Thanh, trắng trợn xâm phạm chủ \r\nquyền Việt Nam, liên tiếp gây ra\
      \ nhiều vụ khiêu khích, cướp phá \r\nđối với nhân dân dọc hai bờ sông, tấn công các đồn bốt của triều \r\nđình nhà Nguyễn.\r\
      \nTrước hành động ngang ngược cùa Dupuis, quân dân Hà Nội \r\nmặc dù chưa có lệnh triều đình nhung vẫn tích cực đề phòng.\
      \ Lệnh"
    - "hội loài người nói chung hay cùa một quốc gia, một dân tộc nói \r\nriêng. Nghiên cứu lịch sử là nhằm tìm hiểu những\
      \ sự kiện xảy ra \r\ntrong quá khứ để từ đó rút ra các bài học kinh nghiệm cho hiện tại \r\nvà tương lai. Nghiên cứu\
      \ và biên soạn lịch sừ, vì vậy, trở thành một \r\nyêu cầu bức thiết của mọi quốc gia, dân tộc. Phạm Công Trứ, nhà \r\
      \nchính trị danh tiếng, nhà sử học sống ở thế kỳ XVII, trong bài Tựa\r\nsách Đại Việt sử ký bản kỷ tục biên viết: \"\
      Vì sao mà làm quốc sử?\r\nVĩ sử chù yếu là để ghi chép sự việc. Có chinh trị cùa một đời tất\r\nphải có sử của một đời.\
      \ Mà ngòi bút chép sử giữ nghị luận rất\r\nnghiêm, ca ngợi đời thịnh trị thì sáng tỏ ngang với mặt trời, mặt\r\ntrăng,\
      \ lên án kẻ loạn tặc thì gay gắt nhu sương thu lạnh buốt,\r\nngười thiện biết có thể bắt chước, người ác biết có thể\
      \ tự răn, quan\r\nhệ đến việc chính trị không phải là không nhiều. Cho nên làm sử là\r\ncốt để cho được như thế\"'.\r\
      \nViệt Nam là một dân tộc có lịch sử lâu đời. Việt Nam cũng là \r\nmột dân tộc yêu sử và có rất nhiều người ham thích\
      \ tìm tòi, nghiên \r\ncứu và biên soạn lịch sử. Đã có nhiều công trình lịch sử được công \r\nbố, không chi do các cơ\
      \ quan, tổ chức chuyên nghiên cứu biên \r\nsoạn, mà còn do cá nhân người yêu sử thực hiện... Điều này vừa có \r\nmặt\
      \ tích cực, lại cỏ mặt tiêu cực. Tích cực vì sẽ góp phần giúp nhân \r\ndân hiểu thêm về lịch sử nước nhà, nhưng cũng\
      \ chứa đựng yếu tố \r\ntiêu cực là dễ dẫn tới những hiểu biết phiến diện, sai lầm về lịch \r\nsử... đôi khi đồng nhất\
      \ truyền thuyết với lịch sử?"
    - "LỊCH SỪ VIỆT NAM - TẬP 11\r\ngiầu mạnh hcm nhờ chiến tranh. Những nước bại trận như Đức, Ý, \r\nNhật thì kiệt quệ.\
      \ Song dù thắng hay bại, sự kết thúc chiến tranh đặt \r\ncho mỗi nước những yêu cầu cấp bách cần giải quyết, tạo nên\
      \ \r\nnhững đặc trưng kinh tế - xã hội ở nhóm nước này.\r\nSau chiến tranh thế giới, những nưóc công nghiệp chủ nghĩa\
      \ \r\nchâu Âu và Nhật Bản đều bị chiến tranh tàn phá nặng nề. Nhiệm vụ \r\nquan trọng của họ ỉà hàn gắn vết thương chiến\
      \ tranh, khôi phục \r\nkinh tế, ổn định đời sống xã hội. Đối với Mỹ, nhiệm vụ chủ yếu là \r\nphải chuyển hướng vận hành\
      \ kinh tế từ một nền kinh tế phục vụ \r\nquân sự thời chiến sang nền kinh tế thời bình.\r\nNhừng nét cơ bản của tình\
      \ hình thế giới nêu trên đã tác động \r\nđến hầu hết các khu vực trên thế giới, đặc biệt là khu vực Châu Á \r\nvà Đông\
      \ Nam Á, tạo điều kiện thuận lợi cho cuộc đấu tranh giải \r\nphóng của các dân tộc Đông Dương. Từ đầu những năm 1950,\
      \ tình \r\nhình cách mạng ba nước Đông Dương chuyển biến nhanh chóng. \r\nVới cuộc đi thăm Trung Quốc, Liên Xô của Chủ\
      \ tịch Hồ Chí Minh \r\nđầu năm 1950 và việc các nước xã hội chủ nghĩa công nhận và đặt \r\nquan hệ ngoại giao với Chính\
      \ phủ Việt Nam Dân chủ Cộng hòa là \r\nmột thắng lợi ngoại giao vô cùng quan trọng. Thắng lợi về ngoại \r\ngiao này\
      \ đã chấm dứt thời kỳ chiến đấu đom độc, hầu như bị cách ly \r\nvới bên ngoài và từ đó tiếp nhận được sự đồng tình về\
      \ chính trị và \r\nsự viện trợ về vật chất.\r\nVới sự giúp đỡ của Liên Xô, Trung Quốc và các nước xã hội"
  - source_sentence: Chức năng của quan Đốc học trong việc quản lý giáo dục ở các tỉnh là gì?
    sentences:
    - "Định, Phú Yên, Biên Hoà, Gia Định, Vĩnh Long, Định Tường, An \r\nGiang đều đặt mỗi tỉnh một quan Đốc học coi việc học\
      \ chính trong \r\ntinh. Các tỉnh từ Quảng Trị, Quảng Bình, Hà Tĩnh, Nghệ An, \r\nThanh Hoá, Ninh Bình, Nam Định, Hà\
      \ Nội, Hưng Yên, Hải Dương, \r\nSơn Tây, Bắc Ninh cũng đều đật chức Đốc học. Tinh nào khuyết \r\nchức Đốc học thì đặt\
      \ Thự đốc học tạm quyền đốc học một thời gian \r\nđổ phụ trách, đôn đốc việc học trong tỉnh.\r\nCác tỉnh Khánh Hoà,\
      \ Bình Thuận, Hà Tiên, Quảng Yên, Hưng \r\nHoá, Tuyên Quang, Thái Nguyên, Lạng Sơn, Cao Bằng, do số học \r\nsinh ít\
      \ nên đến cuối thời Thiệu Trị (1847) vẫn chưa đặt chức Đốc học.\r\nTheo lệ Nhà nước chế cấp ấn quan phòng giao cho Đốc\
      \ học lo \r\nviệc học chính trong địa hạt của tinh sờ tại, trong đó có việc xây \r\ndựng trường sở ở tinh, phù, hoặc\
      \ huyện, châu; sắp xếp các thày \r\ngiáo và tuyển chọn học sinh vào học ở các trường. Những công \r\nviệc licn quun\
      \ đén việc học đểu có sự phối hựp giữa quan Đốc hục \r\nvới các viên giữ chức Giáo thụ ở các phủ và Huấn đạo ờ các huyện,\
