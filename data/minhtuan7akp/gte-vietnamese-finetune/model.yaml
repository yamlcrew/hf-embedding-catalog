    \ bo cải cách vào tháng 9/19301, Pierre Pasquier nêu \r\nra những vấn đề như: thi hành luật điền thổ, giúp nông dân Nam\
    \ Kỳ \r\nthế chấp ruộng đất để vay tín dụng ngân hàng; dẫn thủy nhập điền, \r\nlàm thuỷ lợi để tăng diện tích canh tác,\
