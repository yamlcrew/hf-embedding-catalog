    \ vụng \r\nTrà Sơn, đối diện vói chiến thuyền Pháp.\r\nViệc báo lên, Thiệu Trị sai ngay Đô thống Hữu quân Mai Công \r\n\
    Ngôn, Tham tri Bộ Hộ Đào Trí Phú đem biền binh 3 vệ Vũ lâm, Hổ \r\noai, Hùng nhuệ đến Quảng Nam cùng với lực lượng thủy,\
    \ bộ tại \r\nchỗ tổ chức bố phòng. Thiệu Trị truyền chi căn dặn Mai Công \r\nNgôn và Đào Trí Phú rằng: \"Người Tây dương\
