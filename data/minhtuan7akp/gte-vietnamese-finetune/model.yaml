  - "Chương I. Chính sách thuộc địa của Pháp..\r\nbộ đồng bào các dân tộc thiểu số. về phương diện này, chính quyền \r\nthuộc\
    \ địa còn muốn đi xa hơn là cố định đồng bào vào một không \r\ngian nhất định, rồi đưa họ đến với chế độ sở hữu ruộng\
    \ đất - chế độ \r\nsở hữu tập thể và ấn định cho họ một chế độ thuế khóa.\r\nNhư vậy, “chính sách thâm nhập” có xuất phát\
