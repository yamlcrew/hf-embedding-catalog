      \ từ\r\nngày 10 đến ngày 19 - 5 - 1941.\r\nHội nghị chủ †rương trước hết phởi giỏi phóng cho được cóc dôn tộc\r\nĐông\
      \ Dương ro khỏi éch Phớp - Nhột. Hội nghị quyết định tiếp tục tạm\r\ngóc khổu hiệu “Đónh đổ địa chủ, chia ruộng đốt\
