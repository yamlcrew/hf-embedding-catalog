    \n2. Nghệ thuật dân gian\r\nSinh hoạt văn nghệ dân gian trong các làng quê cũng phát triển. \r\nỞ Bắc Kỳ, Bắc Trung Kỳ,\
    \ hát ả đào rất phổ biến. Bên cạnh đó là \r\ncác thể loại dân ca: hát Xoan ở Phú Thọ, Quan họ Bắc Ninh, hát \r\nSli, Then\
