- source_sentence: Tổng thống Roosevelt có quan điểm gì về việc phục hồi lại Đông Dương cho Pháp?
  sentences:
  - "3. Hãy vẽ sơ đồ cơ cấu ngành công nghiệp chế biến nông, lâm,\r\nthuỷ sản. Nêu một ví dụ thể hiện rõ mối quan hệ giữa\
    \ vùng nguyên\r\nliệu với các cơ sở công nghiệp chế biến.\r\nVấn đề phát triển công nghiệp\r\nsản xuất hàng tiêu dùng\r\
    \n\r\nl. Công nghiệp dệt, may\r\n\r\na) Công nghiệp dệt\r\n\r\n— Dệt là một nghề truyền thống có từ lâu đời ở nước ta.\
    \ Tuy nhiên, việc\r\nhình thành ngành công nghiệp dệt có thể được coi là từ khi nhà máy dệt\r\nNam Định ra đời.\r\nNgành\
    \ dệt của nước ta được phát triển dựa trên cơ sở các thế mạnh về\r\nnguồn lao động và thị trường tiêu thụ. Nguồn nguyên\
    \ liệu có thể khai\r\nthác từ nông nghiệp (bông, đay, lanh, tơ tằm...) hoặc từ công nghiệp hoá\r\nhọc (sợi hoá học).\r\
    \nHãy nêu các vùng trồng bông lớn của nước ta và vai trò của chúng đối với việc\r\nphát triển công nghiệp dệt.\r\n\r\n\
    Sợi (nghìn tấn) Vải lụa (triệu m?)\r\n\r\n1990 1995 2000 2005 Năm\r\n\r\n[1 sợi ———®——— Vải lụa\r\nHình 37.1. Tình hình\
    \ sản xuất sợi và vải lụa\r\n\r\nHãy nhận xét về tốc độ tăng trưởng một số sản phẩm của công nghiệp dệt qua\r\nbiểu đồ\
    \ trên.\r\n\r\n155\r\n— Công nghiệp dệt ở nước ta đã trải qua nhiều thăng trầm. Trong những\r\n\r\nnăm gần đây, những\
    \ khó khăn về thị trường và đổi mới trang thiết bị,\r\nnguyên liệu đã ảnh hưởng nhiều đến việc phát triển của ngành công\r\
    \nnghiệp này."
  - "khí, quân trang, quân dụng cho người Pháp đang chạy trốn. Sau \r\nnày, Sennô đã viết về mệnh lệnh này như sau: \"Chính\
    \ phủ Mỹ quan\r\ntâm tới việc thay người Pháp buộc phải rời khỏi Đông Dương để\r\nsau chiến tranh, để sau vấn để tách\
    \ thuộc địa của họ ra sẽ de\r\ndàng hom\"1.\r\nNhưng kế hoạch của Rudơven không thực hiện được vì sự chống \r\nđổi cùa\
    \ Anh, nước có nhiều thuộc địa nhất lúc đó. Anh lo ngại Mỹ \r\nsê lợi dụng chế độ \"ủy thác quốc tế\" để cai quản luôn\
    \ cà các thuộc \r\nđịa với sự bảo hộ cùa Anh (trên thực tế, sau này, có một số thuộc \r\nđịa do quốc tế thực hiện chế\
    \ độ ủy thác, đã trở thành khu vực chịu \r\nảnh hưởng của Mỹ). Thủ tướng Anh lúc đó là Sớcsin đã kiên quyết \r\nđòi cho\
    \ Pháp phải được trở lại Đông Dương trước khi Nhật bị đánh \r\nbại. Sau năm 1945, do các mối quan hệ giữa Mỹ và Anh, Pháp,\
    \ và \r\ndo quyền lợi của mình, Mỹ đã dần dần ủng hộ việc Pháp quay trở \r\nlại Đông Dương.\r\nTừ mùa thu năm 1945, thoạt\
    \ đầu, chính quyền Tơruman quyết \r\nđịnh không đưa vấn đề Đông Dương vào danh sách những vấn đề \r\nphải giải quyết ở\
    \ Viễn Đông. Sau đó, các quan chức Mỹ ở Đông Dương\r\n1. G.Potơ, Việt Nam - lịch sứ qua các tư liệu, Niu American Librêri,\
    \ Luân Đôn, \r\n1981. tr.6. Dần theo: Viện Qup.n hệ Quốc tế, Bộ Ngoại giao, Chù tịch\r\nHồ Chí Minh với công tác ngoại\
    \ giao, Nxb. Sự thật, Hà Nội, 1990, tr.47.\r\n2. Theo L.A.Patti, Why Vietnam, California, Press Lot Angiolet, 1980, p.97.\r\
    \n154"
  - "mất đầu, lúng túng trước những biến động mau lẹ của tình hình.\r\nv ề phía Pháp, phái De Gaulle muốn tái kiểm soát Đông\
    \ Dương \r\nnên đã lập ra một đạo quân viễn chinh để tham gia vào các cuộc \r\nhành quân của quân Đồng minh tại chiến\
    \ trường Đông Dương. \r\nTrước đó, ngày 24/3/1945, De Gaulle đã ra tuyên bố về tương lai \r\ncủa Đông Dương hậu chiến.\
    \ Ngày 7/6/1945, De Gaulle chính thức \r\ngiao trách nhiệm cho tướng Philippe Leclerc thành lập và chỉ huy \r\nđạo quân\
    \ viễn chinh Pháp gồm hai sư đoàn sẵn sàng sang Đông \r\nD ương’. Ngày 15/8/1945, De Gaulle lại bổ nhiệm Đô đốc Géorge\
    \ \r\nThiery d'Argenlieu làm Cao ủy Đông Dương, kiêm chức Tổng Tư \r\nlệnh hải lục không quân Pháp ở Viễn Đông, có trách\
    \ nhiệm soạn \r\nthảo phương án đưa quân tái chiếm Việt Nam, Lào, Cao Miên2. \r\nĐồng thời, Chính phủ Pháp cũng ra lệnh\
    \ cho các đom vị quân đội \r\nđang có mặt ờ Trung Quốc và Ản Độ quay trở lại Đông Dương \r\nsớm nhất có thể.\r\nĐối với\
    \ Mỹ, Tổng thống Roosevelt từ đầu đã có ý định \"ngăn\r\ncản không cho nước Pháp phục hồi lại Đông Dương\" và \"mong\r\
    \nmuốn một sự ủy trị cùa Liên hợp quốc cho đến khi những người\r\ndân có khả năng tự cai quán lấy mình\"3.\r\nNhưng sau\
    \ khi Roosevelt qua đời, người kế nhiệm là Harry s. \r\nTruman lại thi hành một dường lối mới nhàm thay đổi lập trường\
    \ \r\nvề vấn đề Đông Dương4. Trước sự lớn mạnh của Liên Xô, sức \r\nmạnh của phong trào dân chủ, sự phát triển của phong\
    \ trào giành \r\nđộc lập dân tộc ở các nước thuộc địa và phụ thuộc cũng như của"
- source_sentence: Quá trình thâm nhập và phát triển của Nho giáo ở Việt Nam diễn ra như thế nào trong giai đoạn chống Bắc
    thuộc và sau đó?
  sentences:
  - "LỊCH SỪ VIỆT NAM - TẬP 11\r\ngiầu mạnh hcm nhờ chiến tranh. Những nước bại trận như Đức, Ý, \r\nNhật thì kiệt quệ. Song\
    \ dù thắng hay bại, sự kết thúc chiến tranh đặt \r\ncho mỗi nước những yêu cầu cấp bách cần giải quyết, tạo nên \r\nnhững\
    \ đặc trưng kinh tế - xã hội ở nhóm nước này.\r\nSau chiến tranh thế giới, những nưóc công nghiệp chủ nghĩa \r\nchâu Âu\
    \ và Nhật Bản đều bị chiến tranh tàn phá nặng nề. Nhiệm vụ \r\nquan trọng của họ ỉà hàn gắn vết thương chiến tranh, khôi\
    \ phục \r\nkinh tế, ổn định đời sống xã hội. Đối với Mỹ, nhiệm vụ chủ yếu là \r\nphải chuyển hướng vận hành kinh tế từ\
    \ một nền kinh tế phục vụ \r\nquân sự thời chiến sang nền kinh tế thời bình.\r\nNhừng nét cơ bản của tình hình thế giới\
    \ nêu trên đã tác động \r\nđến hầu hết các khu vực trên thế giới, đặc biệt là khu vực Châu Á \r\nvà Đông Nam Á, tạo điều\
    \ kiện thuận lợi cho cuộc đấu tranh giải \r\nphóng của các dân tộc Đông Dương. Từ đầu những năm 1950, tình \r\nhình cách\
    \ mạng ba nước Đông Dương chuyển biến nhanh chóng. \r\nVới cuộc đi thăm Trung Quốc, Liên Xô của Chủ tịch Hồ Chí Minh \r\
    \nđầu năm 1950 và việc các nước xã hội chủ nghĩa công nhận và đặt \r\nquan hệ ngoại giao với Chính phủ Việt Nam Dân chủ\
    \ Cộng hòa là \r\nmột thắng lợi ngoại giao vô cùng quan trọng. Thắng lợi về ngoại \r\ngiao này đã chấm dứt thời kỳ chiến\
    \ đấu đom độc, hầu như bị cách ly \r\nvới bên ngoài và từ đó tiếp nhận được sự đồng tình về chính trị và \r\nsự viện trợ\
    \ về vật chất.\r\nVới sự giúp đỡ của Liên Xô, Trung Quốc và các nước xã hội"
  - "(551 TCN - 479 TCN), sống ở thời Xuân Thu. về sau Mạnh Tử \r\nthời Chiến Quốc và Đổng Trọng Thư thời Tây Hán đã phát\
    \ triển \r\nthêm học thuyết này làm cho nó ngày càng hoàn chinh.\r\nKinh điển Nho gia của Trung Quốc bao gồm Ngũ kinh\
    \ (Thi, Thư,\r\nDịch, Le, Xuân Ihu) và Từ thư {Luận ngữ, Đại học, Trung dung,\r\nMạnh Tử). Từ thời Hán trở về sau, Nho\
    \ giáo đã được coi là hệ tư \r\ntường chính thống của giai cấp thống trị ở Trung Hoa. Nho giáo \r\nchủ tnrơng: \"tôn quân,\
    \ đại thống\" với ba rường mối \"tam cương\" cơ \r\nbản là đạo: \"vua - tôi\", \" cha - con\", \" vợ - chồng\". Cùng với\
    \ \"tam \r\ncương\" là \"ngũ thường\" tức năm phép ứng xử luân lý và đạo đức là: \r\nnhân, nghĩa, lễ, trí, tín, về đường\
    \ lối chính trị là tu - tề - trị - bình \r\n(tu thân, tề gia, trị quốc, bình thiên hạ).\r\nNgay từ thời Tây Hán, trong\
    \ chừng mực nhất định, Nho giáo đã \r\nbắt đầu thâm nhập vào xã hội Việt cổ để làm công cụ nô dịch nhân \r\ndân ta về\
    \ tư tưởng và tinh thần. Nho giáo du nhập vào Việt Nam thời \r\nBắc thuộc, không còn là Nho giáo nguyên sơ nữa mà là Nho\
    \ giáo \r\nđược Hán Nho trước nhất là Đổng Trọng Thư cải tạo cho thích hợp\r\n257\r\nLỊCH SỬ VIỆT NAM - TẬP 1\r\nvới chế\
    \ độ phong kiến trung ương tập quyền. Nho giáo ở thời kỳ\r\nnày, ban đầu có lẽ chỉ dành cho đổi tượng là người Hán ở Giao\
    \ Châu,\r\nchứ không được phổ biến rộng rãi. Dần dần do cần sự trợ giúp của\r\ncác quý tộc Lạc Việt, cũng nằm trong ý\
    \ đồ đồng hóa dân tộc, Nho\r\ngiáo đã được chính quyền chủ động truyền bá ở phạm vi hẹp. Sách"
  - "giới hạn trong khuôn khổ những gì có lợi cho vương quyền. Kinh Thi được giải\r\nthích theo lối cao quý, tao nhã; nam\
    \ nữ bị ngăn cách (nam nữ thụ thụ bất thân);\r\ncon hát bị khinh rẻ là “xướng ca vô loại”.\r\nNhư vậy, Nho giáo theo quan\
    \ niệm của Khổng - Mạnh đúng là đã không\r\ncòn nữa, thay vào đó đã là một thứ Nho giáo khác. Để phục vụ việc cai trị\
    \ trong\r\n194\r\nDownloaded by Tu?n ?ào Minh (thichhocchui1999@gmail.com)\r\nlOMoARcPSD|49704028\r\nphạm vi quốc gia,\
    \ bên cạnh cái “nhân” để lấy lòng dân, cần phải tăng liều lượng\r\nchất pháp luật của văn minh du mục. Nhiệm vụ này Hán\
    \ Nho đã thực hiện một\r\ncách xuất sắc. Do vậy mà Nho giáo mới này được nhà Hán và các triều đại về\r\nsau ra sức đề\
    \ cao.\r\n3.3. Quá trình thâm nhập, phát triển và những đặc điểm của Nho giáo Việt\r\nNam\r\n3.3.1. Hán Nho đã được các\
    \ quan lại Trung Hoa như Tích Quang, Nhâm\r\nDiên, Sỹ Nhiếp ra sức truyền bá từ đầu Công nguyên. Tuy nhiên, vì đây là\
    \ thứ\r\nvăn hóa do kẻ xâm lược áp đặt cho nên, suốt cả giai đoạn chống Bắc thuộc, Nho\r\ngiáo chưa có chỗ đứng trong\
    \ xã hội Việt Nam. Đến năm 1070, với sự kiện Lí\r\nThánh Tông cho lập Văn Miếu thờ Chu Công, Khổng Tử, mới có thể xem\
    \ là\r\nNho giáo được tiếp nhận thính thức. Chính vì vậy mà Nho giáo ở Việt Nam chủ\r\nyếu là Tống Nho chứ không phải\
    \ Hán Nho, Đường Nho hay Minh Nho, Thanh\r\nNho.\r\nĐời Trần có Chu Văn An đào tạo được khá đông học trò. Các nhà nho\r\
    \nnhững lớp đầu tiên này ra sức bài xích Phật giáo để khẳng định chỗ đứng của"
- source_sentence: Hưng Đạo Vương đã nói gì về Triệu Võ Vương?
  sentences:
  - "61 Chỗ này Hưng Đạo Vương nói lầm: Triệu Võ Vương đóng đô ở Phiên\r\nNgung tức là ở gần thành Quảng Châu bây giờ, mà\
    \ châu Khâm, châu Liêm\r\nthì ở giáp giới nước ta. Lẽ nào đi đánh Trường Sa ở tỉnh Hồ Nam mà lại\r\nquay trở lại châu\
    \ Khiêm, châu Liêm. Chắc hẳn người mình ngày trước không\r\nthuộc địa đồ và có lẽ rằng Hưng Đạo Vương lúc nói chuyện đó\
    \ cũng tưởng\r\nlà kinh đô của Triệu Võ Vương ở đâu bên nước ta bây giờ, cho nên mới nói\r\nnhư thế chăng?"
  - "phải một lần cống. Mà lệ cống thì phải cho nho-sĩ, thầy thuốc, thầy bói, thầy\r\ntoán-số và thợ-thuyền mổi hạng ba người,\
    \ cùng với các sản-vật như là sừng\r\ntê, ngà voi, đồi-mồi, châu-báu và các vật lạ. Vua Mông-cổ lại đặt quan Đạt\x02lỗ-hoa-xích\
    \ (tiếng Mông-cổ tức là quan Chưởng-ấn), để đi lại giám-trị các\r\nchâu-quận nước Nam.\r\nÝ Mông-cổ muốn biết nhân-vật\
    \ tài-sản nước Nam ta có những gì, và học-vấn\r\nxảo-kỹ ra sao, để liệu đường mà đánh lấy cho tiện. Và tuy rằng quyền\
    \ chính\x02trị vẫn để cho vua nước Nam, nhưng đặt quan giám-trị để dần dần lập thành\r\nBảo-hộ.\r\nThánh-tông bề ngoài\
    \ tuy vẫn chịu thần-phục, nhưng trong bụng cũng biết\r\nrằng Mông-cổ có ý đánh lấy nước mình, cho nên cứ tu binh dụng\
    \ võ để\r\nphòng có ngày tranh chiến. Vậy tuyển đinh-tráng các lộ làm lính, phân quân\x02ngũ ra làm quân và đô: mỗi quân\
    \ có 30 đô, mỗi đô có 80 người, bắt phải\r\nluyện tập luôn.\r\nNăm bính-dần (1266) nhân sứ Mông-cổ sang, Thánh-tông sai\
    \ quan sang Tàu\r\nđáp lễ và xin đừng bắt nho-sĩ, thầy bói, và các thợ-thuyền sang cống. Vua\r\nMông-cổ ưng cho, nhưng\
    \ bắt chịu 6 điều khác:\r\n1. Vua phải thân vào chầu\r\n2. Vua phải cho con hay là em sang làm tin\r\n3. Biên sổ dân sang\
    \ nộp\r\n4. Phải chịu việc binh-dịch\r\n5. Phải nộp thuế-má\r\nVua An-nam cứ lần-lữa không chịu. Đến năm tân-mùi (1271)\
    \ vua Mông-cổ\r\nlà Hốt-tất-liệt cải quốc-hiệu là Đại-nguyên, rồi cho sứ sang dụ Thánh-tông\r\nsang chầu nhưng Thánh-tông\
    \ cáo bệnh không đi.\r\nNăm sau Nguyên-chủ cho sứ sang tìm cột đồng-trụ của Mã Viện trồng ngày"
  - "Hưng Đạo Vương là một danh tướng đệ nhất nước Nam, đánh giặc Nguyên\r\ncó công to với nước, được phong làm Thái Sư, Thượng\
    \ Phụ, Thượng Quốc\r\nCông, Bình Bắc Đại Nguyên Súy, Hưng Đạo Đại Vương. Vua lại sai người\r\nvề Vạn Kiếp làm sinh từ\
    \ để thờ ngài ở chỗ dinh cũ của ngày đóng ngày\r\ntrước.\r\nHưng Đạo Vương làm quan đến đời vua Anh Tông thì xin về trí\
    \ sĩ ở Vạn\r\nKiếp. Khi ngài sắp mất, vua Anh Tông có ngự giá đến thăm, nhận thấy ngài\r\nbệnh nặng, mới hỏi rằng: \"\
    \ Thượng phụ một mai khuất núi, phỏng có quân\r\nbắc lại sang thì làm thế nào? \"\r\nHưng Đạo Vương tâu rằng: \" Nước\
    \ ta thuở xưa, Triệu Võ Vương dựng\r\nnghiệp, Hán Đế đem binh đến đánh, Võ Vương sai dân đốt sạch đồng áng,\r\nkhông để\
    \ lương thảo cho giặc chiếm được, rồi đem đại quân sang châu\r\nKhâm, châu Liêm đánh quận Tràng Sa 61 dùng đoản binh mà\
    \ đánh được, đó\r\nlà một thời. Đến đời Đinh, Lê, nhiều người hiền lương giúp đỡ, bấy giờ nước\r\nNam đang cường, vua\
    \ tôi đồng lòng, bụng dân phấn chấn; mà bên Tàu đang\r\nlúc suy nhược, cho nên ta đắp thành Bình Lỗ (thuộc Thái Nguyên)\
    \ phá được\r\nquân nhà Tống, đó là một thời. Đến đời nhà Lý, quân Tống sang xâm, Lý Đế\r\nsai Lý Thường Kiệt đánh mặt\
    \ Khâm, Liêm, dồn đến Mai Lĩnh, quân hùng,\r\ntướng dũng, đó là có thế đánh được. Kế đến bản triều, giặc Nguyên kéo đến\r\
    \nvây bọc bốn mặt, may được vua tôi đồng lòng, anh em hòa mục, cả nước đấu\r\nsức lại mà đánh, mới bắt được tướng kia,\
    \ cũng là lòng trời giúp ta mới được\r\nthế.\r\nĐại để, kẻ kia cậy có tràng trận, mà ta thì cậy có đoản binh; lấy đoản\
    \ chống"
- source_sentence: Số thuốc phiện sản xuất được ở Đông Dương tăng lên bao nhiêu lần vào năm 1941 so với năm 1940?
  sentences:
  - "Tổng thống chính quyền Sài Gòn năm 1971, và cho Níchxơn trong \r\ncuộc tranh cử Tổng thống Mỹ năm 1972. Với những tham\
    \ vọng đó, \r\ntập đoàn Níchxơn coi cuộc hành quân này có ý nghĩa quyết định \r\nthắng lợi của Mỹ và quân đội Sài Gòn,\
    \ tạo ra \"bước ngoặt thật sự\" \r\ncho cuộc chiến tranh xâm lược của chúng đang bế tắc ở Việt Nam.\r\nNgày 2-2-1971,\
    \ Tổng thống Mỹ cùng cố vấn Kítxinhgiơ, Ngoại \r\ntrường Râugiơ, Bộ trường Quốc phòng Leđơ và Tham mưu trường \r\nliên\
    \ quân Mơrơ nhóm họp thông qua kế hoạch mờ 3 cuộc hành \r\nquân: \"Lam Sơn 719\" đánh ra Đường 9 - Nam Lào, \"Toàn thắng\
    \ 1-71\"\r\nđánh vào Đông Bắc Campuchia, \"Quang Trung 4\" đánh ra vùng ba\r\n318\r\nChương IV. Đánh thắng một bước quan\
    \ trọng..,\r\nbiên giới ở Tây Nguyên, lấy Đường 9 - Nam Lào làm hướng tấn \r\ncông chủ yếu, đồng thời dự kiến kế hoạch\
    \ đối phó với dư luận \r\ntrong nước và thế giới. Ngày 3-2-1971, Níchxơn quyết định chính \r\nthức kế hoạch đánh sang\
    \ Lào và cam kết với Nguyễn Văn Thiệu sẽ \r\ndùng không quân Mỹ yểm trợ cho quân đội Sài Gòn tấn công.\r\nĐe thực hiện\
    \ cuộc hành quân \"Lam Sơn 719\", Mỹ đã huy động \r\nmột lực lượng rất lớn quân đội, bao gồm tất cả lực lượng dự bị \r\
    \nchiến lược, lực lượng cơ động cùa Quân khu I, các lực lượng tiếp \r\nvận trung ương với sự chi viện cao của hỏa lực\
    \ và không quân Mỹ. \r\nMột bộ phận thiết giáp và bộ binh Mỹ phối hợp tác chiến và hỗ trợ \r\nphía sau và một lực lượng\
    \ bộ binh quân đội Viêng Chăn gồm GM30 \r\nvà GM33 phối hợp phía Tây Đường 9. Tổng số quân địch được huy"
  - "và sản xuất 67.400 tấn nguyên liệu3. Tức là đã có 68.000ha các loại \r\ncây này được trồng thêm, trong đó lạc và thầu\
    \ dầu là hai thứ tăng \r\nnhanh nhất. Lạc tăng từ 14.000ha và sản lượng 15.600 tấn năm\r\n1938 lên 49.100ha và sản lượng\
    \ 32.300 tấn năm 1942; rồi 48.000ha \r\nvà 29.000 tấn năm 1943 và 46.300ha và 24.900 tấn vào năm 1944. \r\nThầu dầu tăng\
    \ từ 3.000ha và 2.400 tấn nãm 1938 lên lO.OOOha và\r\n3.000 tấn năm 1942, rồi 19.700ha và 4.700 tấn năm 1943 và 30.600ha\
    \ \r\nvà 12.000 tấn năm 19444.\r\nSố lượng các chất dầu săn xuất tăng lên nhưng không đáp ứng \r\nđược nhu cầu, nhất là\
    \ nhu cầu về dầu thắp sáng của nhân dân.\r\n- Công nghiệp dệt\r\nTrước chiến tranh, Đông Dương nhập trung bình mỗi năm\
    \ 23.000 \r\ntấn bông, trong đó 16.000 tấn để các nhà máy Pháp kéo thành sợi\r\n1. BEI, 1943, F II, Trần Huy Liệu...,\
    \ Tài liệu tham khảo lịch sử cách mạng\r\ncận đại Việt Nam, tập 8, Sđd, tr. 123.\r\n2. Témoignages..., Sđd, tr. 2-8.\r\
    \n3. 4. Annuaire statistique de l' Union franqaise Outre mer 1939-1946,\r\ntr. F-76.\r\n538\r\nChương V. Xã hội Việt Nam\
    \ dưới ách thống trị..\r\n(14.000 tấn) cung cấp cho nhà máy dệt cùa Pháp khoảng 4.000 tấn, \r\nsố còn lại được phân phát\
    \ cho các khung dệt thủ công. Đẩu chiến \r\ntranh, Đông Dương vẫn còn nhập được bông để kéo ra thành \r\n10.400 tấn sợi,\
    \ nhưng năm 1942 chỉ còn nhập được số bông để kéo \r\nra được 1.507 tấn'. Đe bù vào số thiếu hụt cho sản xuất của nhà\
    \ \r\nmáy, Pháp tăng cường việc bắt dân ta nhổ lúa để trồng bông và \r\ntrồng các thứ cây lấy sợi dùng cho dệt vải may\
    \ mặc, hay làm bao"
  - "hóa; thuế độc quyền; thué điền thổ...\r\nTheo những con số thống kê chính thức thì các loại thuế trên \r\nđều tăng lên\
    \ đáng kể, khoảng từ ba đến hơn ba lần vào năm 1945 \r\n(số dự thu) so với năm 1939 (số thực thu) như sau:\r\nBảng 29:\
    \ Thu nhập từ một sổ loại thuế ở Đông Dương \r\ntrong các năm 1939 và 19453\r\nĐom vị: nghìn đồng\r\nThuế 1939 1945\r\n\
    Thuế tiêu thụ và vận chuyển hàng hoá 20.655.000 58.265.000\r\nThuế muối, rượu, thuốc phiện, diêm, pháo,\r\nthuốc lá\r\n\
    24.694.000 87.000.000\r\nThuế điền thổ, trước bạ 11.821.000 28.625.000\r\nvề thuốc phiện, do việc nhập khẩu bị ngừng,\
    \ Pháp khuyến khích \r\nnhân dân thượng du trồng loại cây này nên số thuốc phiện sản xuất \r\nđược ngày một tăng: năm\
    \ 1940: 7.560kg; nãm 1941: 17.344kg; năm\r\n1. Annuaire statistique de V Union f,rariỊaise Outre- mer 1939-1946, tr. K\
    \ -\r\n90-93.\r\n2, 3. Annuaire statistique de runion firanẹaise Outre - mer 1939-1946, tr.\r\nK-90.\r\n552"
- source_sentence: Cái nhàn trong thơ Mạc Thiên Tứ khác với cái nhàn trong thơ của các nho sĩ Đàng Ngoài như thế nào?
  sentences:
  - "Cá rồng mệt mất, kình ngao lộn tròng.\r\nOng với ve om sòm cụm liễu,\r\nBướm dập dìu lẽo đẽo chòm hoa.\r\nMây lien ba\
    \ khóm một tòa,\r\nDưới trên biếc mát, gần xa xanh rè.\r\nCách bên khe tiếng ngư ra rả,\r\nGõ mạn thuyền ca họa đòi cung.\r\
    \nDưới rùng mầy trẻ mục đồng,\r\nLưng trâu thổi địch, gió lằng theo khe.\r\nMạc Thiên Tứ còn coi đất Hà Tiên giàu đẹp\
    \ của ông hơn cả \r\nchốn thị thành:\r\nTuy giang thôn nào khác Tràng an.\r\nĐâu no thỉ đó là an lạc,\r\nLựa phải chen\
    \ chân chon thị thành.\r\nNgười thanh nhàn, vật thì long thạnh (thịnh),\r\nDân bang kỳ ỳ sánh kỳ tây.\r\nTư tưởng chủ\
    \ đạo trong Hà Tiên thập cảnh là tư tưởng an nhàn. \r\nCái nhàn trong thơ Mạc Thiên Tứ khác với cái nhàn ưong thơ của\
    \ \r\ncác nho sĩ Đàng Ngoài là nhàn ẩn sĩ, chán cảnh quan trường, còn cố \r\ncái nhàn của Mạc Thiên Tứ xuất phát từ cuộc\
    \ sống lao động thanh \r\nbình, ấm no. ông đã thi vị hóa cuộc sống của người dân nơi đây:\r\nCành lành như đợi người lành,\r\
    \nMua nhàn một khắc giá đành nghìn cân...\r\n546"
  - "434\r\nChương VII. Làng xã - Đon vị cơ sở thời Bắc thuộc\r\nGiở lại những trang lịch sử lập làng cho thấy ban đầu làng\
    \ được \r\ntạo dựng bởi một số thành viên cùng nhau khai canh lập ấp. Trong \r\nsố đó có thể là người cùng một họ; hoặc\
    \ thuộc nhiều họ khác nhau. \r\nMột số làng đã lấy tên gọi cùa họ - tộc đầu tiên có công mở làng để \r\nđặt tên cho làng.\
    \ Chẳng hạn Đặng Xá - làng của họ Đặng, tên Nôm \r\nlà làng Đang (xã Cương Chính); Mai Xá - làng của họ Mai (xã \r\nMinh\
    \ Phượng, huyện Tiên Lữ, Hung Yên); Phạm Xá - làng của họ \r\nPhạm (xã Minh Tiến, huyện Phủ Cừ, Hưng Yên); Lê Xá - làng\
    \ họ \r\nLê (Duy Tiên, Hà Nam); hoặc Dương Xá - làng họ Dương, tên \r\nNôm là làng Giàng... Ờ những làng như thế ban đầu\
    \ chỉ gồm thành \r\nviên của dòng họ đến khai canh mở làng. Từ một họ sinh ra nhiều \r\nchi, phái, nhân số dòng họ ngày\
    \ càng đông. Sau thêm một số họ \r\nkhác đến cùng nhau mở rộng làng ấp, đồng ruộng.\r\nSau một quá trinh khai hoang lập\
    \ ấp, mỗi một dòng họ đều sở \r\nhữu một số diện tích ruộng đất nhất định, số diện tích đó thuộc \r\nruộng đất công của\
    \ dòng họ. Có thể một số ruộng đất khai phá được \r\nđã trở thành tư hữu. Ruộng đất công đem chia cho các thành viên \r\
    \ntrong họ làm nhà ở (thổ cư), ruộng để cày cấy lấy hoa lợi sinh sống \r\n(thổ canh). Cho đến nay, tư liệu không cho biết\
    \ cụ thể cách thức \r\nphân phối ruộng đất trong các dòng họ cụ thể ra sao? Nhưng căn cứ \r\nv à o đ iể u tr a h ô i c\
    \ ô d â n tộ c h ọ c m ộ t sô lâ n g ờ đ ổ n g b ă n g s ô n g H ổ n g"
  - "LỊCH SỪ VIỆT NAM - TẬP 4\r\nChia nhau lớn bé thấp cao\r\nCá rồng mệt mất, kình ngao lộn tròng.\r\nOng với ve om sòm cụm\
    \ liễu,\r\nBướm dập dìu lẽo đẽo chòm hoa.\r\nMây lien ba khóm một tòa,\r\nDưới trên biếc mát, gần xa xanh rè.\r\nCách\
    \ bên khe tiếng ngư ra rả,\r\nGõ mạn thuyền ca họa đòi cung.\r\nDưới rùng mầy trẻ mục đồng,\r\nLưng trâu thổi địch, gió\
    \ lằng theo khe.\r\nMạc Thiên Tứ còn coi đất Hà Tiên giàu đẹp của ông hơn cả \r\nchốn thị thành:\r\nTuy giang thôn nào\
    \ khác Tràng an.\r\nĐâu no thỉ đó là an lạc,\r\nLựa phải chen chân chon thị thành.\r\nNgười thanh nhàn, vật thì long thạnh\
    \ (thịnh),\r\nDân bang kỳ ỳ sánh kỳ tây.\r\nTư tưởng chủ đạo trong Hà Tiên thập cảnh là tư tưởng an nhàn. \r\nCái nhàn\
    \ trong thơ Mạc Thiên Tứ khác với cái nhàn ưong thơ của \r\ncác nho sĩ Đàng Ngoài là nhàn ẩn sĩ, chán cảnh quan trường,\
    \ còn cố \r\ncái nhàn của Mạc Thiên Tứ xuất phát từ cuộc sống lao động thanh \r\nbình, ấm no. ông đã thi vị hóa cuộc sống\
    \ của người dân nơi đây:\r\nCành lành như đợi người lành,\r\nMua nhàn một khắc giá đành nghìn cân...\r\n546\r\nChối ai\
    \ lợi chuốc danh mua,\r\nVui nghề chài lưới tôm cua tháng ngày.\r\nKé gió mưa, người thi non nước,\r\nHai phía đều chiếm\
    \ được thu thanh.\r\nTùng kia mấy bức xanh tươi,\r\nĐòi thanh đòi nhã, một nơi một nhàn.\r\nMạc Thiên Tứ từ khi đem đất\
    \ đai quy phụ, đặt dưới quyền quản \r\nlý của chúa Nguyễn, thì cả dòng họ ông cùng ưật tự xã hội miền Hà \r\nTiên dưới\
    \ quyền khai thác của ông, đã ưở nên vững vàng và phồn \r\nthịnh. Điều đó càng tạo cho ông nhiều lạc quan ữong cuộc sống\
    \ và"
