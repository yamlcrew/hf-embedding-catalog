widgetData:
- source_sentence: Who determines what is the 'corresponding Province', 'corresponding Indian State' or 'corresponding State'
    in cases of doubt?
  sentences:
  - The President determines what is the 'corresponding Province', 'corresponding Indian State' or 'corresponding State' in
    cases of doubt.
  - '"I, A.B., having been elected (or nominated) a member of the Legislative Assembly (or Legislative Council), do swear
    in the name of God that solemnly affirm I will bear true faith and allegiance to the Constitution of India as by law established,
    that I will uphold the sovereignty and integrity of India and that I will faithfully discharge the duty upon which I am
    about to enter."'
  - They are deemed to be proceedings in Parliament within the meaning of article 122 or, as the case may be, proceedings
    in the Legislature.
- source_sentence: What happens to the taxes and duties referred to in the Union List?
  sentences:
  - All taxes and duties referred to in the Union List, except those specified, shall be levied and collected by the Government
    of India and shall be distributed between the Union and the States in the manner provided in clause (2).
  - The West Bengal Land Reforms (Amendment) Act of 1989
  - On the expiration of the period specified in article 334
- source_sentence: What was inserted after sub-paragraph (5) by the Sixth Schedule to the Constitution (Amendment) Act, 2003
    (44 of 2003), s. 2 with respect to the State of Assam?
  sentences:
  - Parliament can make such a law when it is necessary to deal with a situation arising from scarcity of goods in any part
    of the territory of India.
  - The individual needs to make and subscribe before some person authorised by the Election Commission an oath or affirmation
    according to the form set out for the purpose in the Third Schedule. The age requirement is at least twenty-five years
    for a seat in the Legislative Assembly and at least thirty years for a seat in the Legislative Council. Additionally,
    they must possess other qualifications as prescribed by or under any law made by Parliament.
  - A new subparagraph was inserted in paragraph 4 in its application to the State of Assam.
- source_sentence: How long does an order made by the Governor under sub-paragraph (1) of paragraph 15 stay in force, and
    where should it be presented?
  sentences:
  - The Chief Election Commissioner can be removed from his office in like manner and on the like grounds as a Judge of the
    Supreme Court.
  - Not extending beyond a period of six months after the Proclamation has ceased to operate
  - The order stays in force for a period of twelve months from the date it was made and should be laid before the Legislature
    of the State as soon as possible.
- source_sentence: What is needed to satisfy any judgment, decree or award of any court or arbitral tribunal?
  sentences:
  - Rates of stamp duty in respect of documents other than those specified in the provisions of List I with regard to rates
    of stamp duty.
  - The sums are required.
  - The acts listed in the Ninth Schedule of the Indian Constitution are mainly for land reform and the abolition of various
    tenure systems.
