      deficiencies: Identify the control deficiencies that contribute to the risk in question.3. Analyze the impact and frequency:
      Determine the impact of the deficiencies and analyze how often the deficiencies occur.4. Determine the root cause: Identify
      the root cause of the deficiencies and analyze if the root cause contributes to the risk.5. Consider the impact: Assess
      the impact of the root cause factor on the organization as a whole, and whether it is consistent across multiple departments
      or locations.6. Assess if recurring: Determine whether the root cause contributes to the recurring nature of the control
      deficiencies.7. Evaluate if the solution is permanent: Analyze whether the solution to mitigate the cause of the deficiency
      is a permanent fix rather than a temporary measure.If the deficiencies are recurrent, have a significant impact, and
      are deeply rooted in the organization''s processes or culture, then the control deficiency is likely to be systemic.
