widgetData:
- source_sentence: The cumulative basis adjustments associated with these hedging relationships are a reduction of the amortized
    cost basis of the closed portfolios of $19 million.
  sentences:
  - What are the main factors that influence the timing and cost of the company's inventory purchases?
  - What was the reduction in the amortized cost basis of the closed portfolios due to cumulative basis adjustments in these
    hedging relationships?
  - What was Garmin Ltd.'s net income for the fiscal year ended December 30, 2023?
- source_sentence: 'The components of the provision for income taxes were as follows: U.S. Federal $ (314,757), U.S. State
    and Local $ (85,355), Foreign $ (1,162). Effective income tax rate | 24.2% | | 23.9% | |  ''19.7% | for the years 2021,
    2022, and 2023.'
  sentences:
  - How much of the lease obligations is payable within 12 months as of December 31, 2023?
  - What are the components and the effective tax rates for the year 2023 as reported in the financial statements?
  - How many Dollar Tree Plus stores were there as of January 28, 2023?
- source_sentence: The Company may receive advanced royalty payments from licensees, either in advance of a licensee’s subsequent
    sales to customers or, prior to the completion of the Company’s performance obligation. The Wizards of the Coast and Digital
    Gaming segment may also receive advanced payments from end users of its digital games at the time of the initial purchase,
    through in-application purchases, or through subscription services. Revenues on all licensee and digital gaming advanced
    payments are deferred until the respective performance obligations are satisfied, and these digital gaming revenues are
    recognized over a period of time, determined based on either player usage patterns or the estimated playing life of the
    user, or when additional downloadable content is made available, or as with subscription services, ratably over the subscription
    term.
  sentences:
  - How does the Company recognize revenue from advanced royalty payments and digital game purchases?
  - What is the primary role of Canopy technology in the Health Services segment?
  - Which section of a financial document provides an index to Financial Statements and Supplementary Data?
- source_sentence: Item 8 covers Financial Statements and Supplementary Data.
  sentences:
  - How much did the prepaid expenses increase from 2022 to 2023?
  - What strategies are outlined in the Company's human capital management?
  - What type of data does Item 8 cover in the company's filing?
- source_sentence: When points are issued as a result of a stay by a Hilton Honors member at an owned or leased hotel, we
    recognize a reduction in owned and leased hotels revenues, since we are also the program sponsor.
  sentences:
  - What financial impact does the redemption of Hilton Honors points have on the revenue of owned and leased hotels?
  - What original companies formed IBM in 1911?
  - What was the global gender equity status at Meta in July 2023?
