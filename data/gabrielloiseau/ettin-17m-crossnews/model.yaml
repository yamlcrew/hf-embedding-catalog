- source_sentence: Important piece in @guardian by Ukraine's former defence minister Andriy Zagorodnyuk https://t.co/07yy0rCMIV
  sentences:
  - "Pune:  Indian Army veterans  recalled lesser-known stories and the lighter side of Field Marshal  Sam Manekshaw  on the\
    \ eve of the 52nd anniversary of  Vijay Diwas , which is celebrated on December 16 every year to mark the country's victory\
    \ in the 1971 war with Pakistan. \nMajor General Binoy Poonnen (retired) shared his unique experience when he was serving\
    \ as an instructor at the  Indian Military Academy  (IMA), Dehradun, in 1986.Field Marshal Sam Manekshaw had paid a surprise\
    \ visit to the IMA in the summer of 1986. While he was interacting with the Commandant of the academy, he suddenly decided\
    \ to visit room number 30, Collins Block, in which he had stayed for many years ago as a GC (Gentleman Cadet) while he\
    \ was under training. \n\"The occupant of the room was a second termer, who was out on a map reading outdoor activity\
    \ and had obviously locked his room and taken the keys with him. Since I was the instructor in charge, I was told to somehow\
    \ ensure that the room was opened for Manekshaw's visit,\" he recalled. \n\"There was no option other than to break open\
    \ the lock. I was getting that done when both Manekshaw and the Commandant landed up. My concern, as an instructor, was\
    \ that the room had to be clean and all belongings of the cadet ought to be arranged neatly in a military-like layout,\"\
    \ he told TOI from Mhow, Madhya Pradesh.\n\"Incidentally, I had carried out an inspection of all the rooms just the previous\
    \ night (cabin cupboard inspection as we say in the Army). I was hopeful that all would be okay. That, however, was not\
    \ to be. As soon as we entered the room, much to my disappointment and horror, we found it in complete disarray! Towel\
    \ on the bed, boots lying all over, undergarments strewn across the room, a kit bag full of soiled clothes huddled in\
    \ a corner and even girls' posters pinned on the cupboard.\" he recalled\n\"I said to myself, I had it. The Commandant\
    \ was noticeably angry and that was written all over his face as he glared at me, rather viciously. I was almost certain\
    \ that I would be shunted out of the IMA sooner than later. The atmosphere was tense, to say the least. Standing at the\
    \ entrance of the room Manekshaw said, \"Thank God nothing has changed',\" Poonnen said. \n\"That one-liner spontaneous\
    \ reply defused a very tense atmosphere. Suddenly, all of us were smiling. I could breathe easy again and the Commandant\
    \ shifted his menacing glare away from me. That's the greatness of the Field Marshal. Obviously, Sam Manekshaw's emotional\
    \ intelligence, which is amongst the most important traits of great leaders, was in abundance,\" he said.\n\nMajor General\
    \ VK Madhok (Retd) said, \"When I was posted as an adjutant of 2/3 Gorkha Rifles in Jammu, the Colonel of the regiment\
    \ had forgotten a gift he had brought for the Commanding Officer (CO) on a visit in 1956. He told the CO that he had left\
    \ it in the Flag Staff Officer's house. So the CO asked me to bring it from there.\" \n\"I went in a Gypsy till the main\
    \ gate of the house. I saw then divisional commander Major General Manekshaw inspecting rations on the campus of the house.\
    \ So I parked my vehicle at the gate and walked up to him. Upon seeing me, he asked, 'Hello Sweetie, what's your problem?'.\
    \ I told him that I came to collect the gift,\" he said. \n\"Before I could complete my answer, he asked me to return\
    \ to the gate, come to him in the Gypsy and then talk. I went back to the gate, returned to the site in the vehicle and\
    \ saluted him. Then he replied, ‘Now, you go to a room and ring the doorbell. An old sleepy lady would come out. That\
    \ is my wife. She will give you the gift.' I did what he said. It was a learning experience for me,\" \" Madhok added.\
    \ \n\"I was commanding a newly formed Scouts Battalion in a high altitude region in 1968. The unit was in the region for\
    \ more than one-and-a-half years. We were expecting the relocation to another location. However, it was not happening\
    \ despite pursuing matters with the Brigade and divisional commanders.\" \n\"So I had written a letter to the Army headquarters\
    \ in strong words with the title ‘Army HQs cheated us'. Within a few days, then Army chief Manekshaw ordered an inquiry.\
    \ The brigade commander immediately landed at the unit location in a helicopter to inquire about the matter. He agreed\
    \ to my demands. Otherwise, they would have tried to prove me wrong,\" Madhok added."
