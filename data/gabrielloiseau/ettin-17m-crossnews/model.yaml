    - 'As someone who is filled with an unholy terror every time Alexa or Siri speaks and who wishes to run screaming for
      the hills – where my fully stocked bunker awaits – whenever I see kids playing with toy drones instead of kites in the
      park, Netflix''s Unknown: Killer Robots is … a challenging watch. "It''s a cliche but I 100% believe that ‘Freedom is
      not free''," says Brandon Tseng, former US Navy Seal and co-founder of Shield AI. His company is now joined in the battle
      for military supremacy via artificial intelligence. The race is on throughout the US and doubtless Russia and China
      too to develop autonomous drones and other technology that can allow soldiers to avoid such perilous work as clearing
      buildings of armed personnel, explosive devices and so on, or which can track subjects over inhospitable terrains and
      vast areas – oh, and kill people when the need arises. The enemy, obviously. Which they will be able to identify reliably,
      always acting within the rules of engagement. I mean, there may be tricky moments along the way. Paul Scharre, former
      US army Ranger and author of Army of None, remembers the unspoken agreement among his men not to shoot when insurgents
      sent an eight-year-old girl out ahead of them to scout for danger. A robot would have seen her as a legal and legitimate
      target, but I''m sure these kinks will get worked out in time. (Does anyone know how the racist chatbot that made headlines
      last year is getting on, by the way?) Except, of course, how can they be? Unknown: Killer Robots walks us through various
      inventions (including those headless robot dog-alikes you see far too much on social media), scenarios and ramifications
      with admirable surefootedness. You sense that its heart lies with the cool guys making all the cool stuff. And it is
      hard not to be mesmerised by the extraordinary stuff in the offing. To see MIT''s latest dog quickly navigate new surfaces
      via the infinite raw power of machine learning, or a flight lieutenant with 20 years of combat under his immaculately
      polished belt be outclassed in a dogfight by a new piece of tech that has been filled with 30 years of experience in
      10 months, is to watch a terrible beauty being born. But whenever the film slips into full cheerleading (and jingoistic)
      mode, it recalls itself and us to duty and turns to showcasing the less telegenic side of things. By which I mean stories
      like Sean Ekins'' and Fabio Urbina''s. They "just flipped a 0 to a 1" in their work finding treatments and cures via
      AI molecules and modelling for underresearched diseases, "pushed go" and returned to their desks later to find their
      six-year-old Apple Mac had created 40,000 new molecules that would be absolutely lethal to humanity. Only if a bad actor
      got hold of them, but … anyway, Ekins has barely slept since. "We were totally naive … Anyone could do what we did.
      How do we control this technology before it is used to do something totally destructive?" The dilemma surrounding almost
      all military inventions – perhaps almost all inventions full stop – is what is slightly grandly called "the dual use
      problem". On the one hand, you''ve got drones and robots who can clear buildings without risking soldiers'' lives. On
      the other, you can weaponise them, autonomise them and use them to take out entire villages without anyone getting their
      hands dirty. What is that sense of detachment likely to do to the level of carnage in a war overall? Former US defense
      secretary Bob Work doesn''t think "human intervention in kill decisions" will ever change. I cannot help but pause for
      a moment to suggest, respectfully, that either the good colonel has never met humanity or that he is the programme''s
      equivalent of the flight attendant urging people to keep calm as the passenger jet plummets to its fiery doom. Ultimately,
      the latest instalment in Netflix''s Unknown documentary strand leaves me knowing a lot more about something I feel I
      was better off not knowing at all. So, a good job done, I guess. I write to you from a bunker in the hills and I am
      never coming out. • Unknown: Killer Robots is on Netflix now.'
    - '@themaryhopkin @jessleemorgan They are both commentaries on being young- one filled with pain and the other with nostalgia
      and both sung by singers sounding wiser than their years.'
  - source_sentence: 'The International Olympic Committee (IOC) is taking a huge gamble with the health of athletes competing
      in Beijing – and risking its own reputation and finances. It is leaving itself and other Olympic bodies vulnerable to
      legal action by competitors who experience adverse reactions to the city''s notorious pollution. The IOC could face
      multi-million pound lawsuits from hundreds of affected sportsmen and women, as could the Chinese, British and other
      national Olympic bodies. The victims might argue that the games'' authorities knowingly placed them at risk of health
      damage and required them to compete in conditions that jeopardised their wellbeing. Even mere prolonged severe eye,
      nose, throat and lung discomfort might be grounds for legal recourse. In such cases, it could be argued that expecting
      competitors to suffer choking, burning sensations was an unreasonable expectation by Olympic chiefs. In a worst-case
      scenario, the IOC and other Olympic authorities could be tied up in legal cases for years and be bankrupted if the courts
      rule that they acted recklessly by giving the green light to the games in a heavily polluted city. The day before the
      Olympics opened, pollution levels were nearly four times above the World Health Organisation''s recommended safe levels.
      If the games go ahead under these conditions, some competitors could suffer lung and heart damage from the double whammy
      of heat and pollution. The danger is particularly great for high-exertion endurance athletes, such as cyclists, rowers
      and long-distance runners and walkers. In most cases, the adverse reactions are likely to be temporary, but no one can
      be certain that some athletes will not collapse and that others will not suffer longer-lasting effects that may undermine
      their post-Olympic performance in follow-on sports meetings scheduled later this year. I hope my fears are misplaced,
      but on the eve of the Olympics, a BBC monitoring unit found that the level of particulate matter (PM10) in Beijing''s
      air was 191 micrograms per cubic metre. This is nearly four times the World Health Organisation safety target of 50
      micrograms per cubic metre. It is this reality that has prompted the Ethiopian world champion long-distance runner,
      Haile Gebrselassie, to pull out of the marathon. He says pollution levels in the host city are so bad that it would
      be unsafe for him to compete. Gebrselassie is right. Despite some improvements, the Beijing air is still so toxic on
      most days that it is doubtful whether athletes can participate safely – let alone fairly – at this month''s games. The
      head of the IOC, Jacques Rogge, has brushed aside pollution fears, praising Beijing''s "extraordinary" efforts to improve
      air quality. He said there was "absolutely no danger" to the health of athletes taking part in events that last less
      than one hour. But he conceded that if pollution levels got out of hand, events lasting longer than 60 minutes might
      have to be relocated or deferred. Echoing the bland assurances of the Chinese authorities, Rogge stressed that it was
      important to distinguish between harmless fog and toxic pollution – implying that much of the cause of low visibility
      was mere humidity and mist. The distinction is a valid one, but I am not confident that this controversy is a needless
      fuss about fog. My scepticism seems to be shared by at least two British Olympic journalists who have road-tested the
      Beijing air this week. Tom Fordyce, a BBC sports correspondent, did a run around Beijing last Monday and reported what
      happened to him: My throat has started to feel sore, as if I had a cold coming on … there''s a strange lumpy feeling
      halfway down my throat … The metallic taste in my mouth remains … The haze obscures anything more than 100m away. I''ve
      picked a bad day – today the BBC reading registers 292 micrograms of particulate matter per cubic metre (the World Health
      Organisation target is 50) … my eyes have started to feel gritty, as if I''d been out all night in a club full of smokers
      … The stinging in my throat gets worse … My lungs feel half their normal size … At the end I''m coughing like a 20-a-day
      man. Tom Fordyce''s experience was shared by Guardian journalist Paul Kelso when he took a jog around the Olympic stadium
      on Tuesday: It''s five years since I smoked a cigarette, but the acrid taste and mild burning at the back of the throat
      was familiar. By the time I turned for home, having circumnavigated the stadium more slowly than the entire athletes
      parade will take at Friday''s opening ceremony, I was more than ready to stop … I''m glad I don''t have to compete in
      the Beijing air this month. If these are the effects on light joggers, imagine what Beijing''s usually foul air will
      do to elite athletes going all-out for a gold medal, vigorously inhaling huge amounts of air for prolonged periods.
      I suspect they will suffer extreme discomfort at best, and possibly physical collapse and even heart failure at worst.
      The British Olympic Association spokesperson, Simon Clegg, is unfazed. He has dismissed concerns that the smog in Beijing
      could impact on the performance of athletes. "It''s not a concern to us," Clegg told the Guardian. "The expert advice
      that we are getting is that the situation continues to improve." He might be right. I hope he is. But what if he is
      not? Is it fair to play Russian roulette with the health and lives of the world''s greatest athletes? And what if it
      all goes pear-shaped, with competitors being unable to complete their events or collapsing and ending up in hospital?
      Could some even die? The IOC and its national counterparts had better get their lawyers briefed and their finances beefed
      up. There are bound to be some competitors who will suffer adverse reactions to Beijing''s poor air quality. They are
      likely to sue and they are likely to win. If they do, it will be a sad day for the Olympic spirit but a wholly self-inflicted
      wound by misguided Olympic administrators who could have, and should have, anticipated the risk to athlete''s health.
      This article was edited on August 8 2008 at 18:00 at the request of the author after finding that a linked source concerning
      a marathon held in Beijing may not be journalistically reliable.'
    sentences:
    - 'Malaria is often associated with Africa, but the disease is rampant in the Asia Pacific region too. In countries such
      as India, Indonesia, Bangladesh and Papua New Guinea, almost 30m cases are reported every year, resulting in an estimated
      42,000 deaths. The region''s national governments would do well to look at the experience of Sabah on the island of
      Borneo. Cases of malaria in the Malaysian province have dropped from a high of 49,192 in 1994 to 2,032 in 2011. At the
      root of the rapid decline lies an informal, yet highly effective, partnership between the state-led Malaysian Malaria
      Control Programme (MCP) and companies operating in palm oil and rubber sectors. Since 1991, MCP has been building links
      with many of the state''s 1,074 plantation estates, leading to joint cooperation around key interventions such as indoor
      residual spraying and the distribution of insecticide-treated nets. "In large districts with remote populations, malaria
      control officers struggle to meet deadlines for bi-annual IRS (indoor residual spraying) coverage because of the time
      required to travel to rural areas," states a recent research paper in the Malaria Journal. Resource commitments and
      divisions of labour between MCP''s district offices and plantations differ hugely. The most engaged plantations go as
      far as to construct office buildings and living quarters for MCP''s rural outposts, as well as providing equipment,
      electricity and help with transport. All participating plantations, whatever their level of involvement, cover the costs
      of spraying and net distribution as a minimum. In return, MCP provides training on malarial prevention, as well as assistance
      with screening new workers and advising on appropriate treatment if and when a worker should become infected. "Most
      communications between partners are informal and ad-hoc, occurring on a daily or weekly basis," the researchers note,
      adding that MCP''s programme officers aim to physically visit most participating plantations on a weekly basis where
      possible. The motivations for the private sector to engage with the government''s malarial programme range from the
      ethical (ie worker care) to the economic (ie avoiding lost productivity). Very often, the partnership strikes up after
      a plantation has experienced a malarial outbreak. Risk of infection is comparatively high as up to 45% of the sector''s
      workers come from neighbouring Indonesia and the Philippines, where malaria is endemic. Managing a cross-sector relationship
      is not without its difficulties. The most frequent source of tension occurs around the allocation of scarce resources.
      Government officers state that educating plantation management on the importance and benefits of malaria control is
      a time-consuming business, while estate owners complain that logistical support can be tricky during peak production
      periods. Still, the results are impressive. In 2011, only 107 cases were reported across all Subah''s plantation estates.
      Among the "best practices" identified by the researchers are the importance of frequent communication between the two
      partner entities, the engagement of top-level management, and the formal recognition of plantations'' achievements.
      "Partnering with the commercial sector has been an essential operational strategy to support malaria elimination in
      Sabah," the independent analysis of the partnership concludes. "Private industry is an untapped resource for malaria
      control programmes regionally." Read more stories like this: Business and academia join forces to tackle UK food security
      How partnerships can pay for business and rural workers Advertisement feature: Unilever seeks innovative startups for
      sustainable living hack The sustainable living hub is funded by Unilever. All content is editorially independent except
      for pieces labelled advertisement feature. Find out more here. Join the community of sustainability professionals and
      experts. Become a GSB member to get more stories like this direct to your inbox'
