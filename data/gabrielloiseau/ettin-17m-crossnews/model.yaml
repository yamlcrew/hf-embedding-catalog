- source_sentence: 'Chandigarh:  Devender Pal Singh  Bhullar, a convict in the 1993 Delhi bomb blast case, has withdrawn his
    plea seeking premature release from the Punjab and Haryana high court after the sentence review board (SRB) of National
    Capital Territory of Delhi (NCT) rejected his petition.

    His counsel Vipul Jindal confirmed to TOI that they would challenge the SRB decision passed on January 19 through which
    his request for premature release was rejected by the Delhi government."Counsel for NCT has placed on record a copy of
    the January 19 letter of the home (general) department NCT, Delhi...In view of the order, counsel for the petitioner seeks
    permission to withdraw the present petition," Justice Jasjit Singh Bedi of the HC has observed in its order released on
    Wednesday.'
