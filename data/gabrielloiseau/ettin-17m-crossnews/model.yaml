      \ 2/3 Gorkha Rifles in Jammu, the Colonel of the regiment had forgotten a gift he had brought for the Commanding Officer\
      \ (CO) on a visit in 1956. He told the CO that he had left it in the Flag Staff Officer's house. So the CO asked me\
      \ to bring it from there.\" \n\"I went in a Gypsy till the main gate of the house. I saw then divisional commander Major\
      \ General Manekshaw inspecting rations on the campus of the house. So I parked my vehicle at the gate and walked up\
      \ to him. Upon seeing me, he asked, 'Hello Sweetie, what's your problem?'. I told him that I came to collect the gift,\"\
      \ he said. \n\"Before I could complete my answer, he asked me to return to the gate, come to him in the Gypsy and then\
      \ talk. I went back to the gate, returned to the site in the vehicle and saluted him. Then he replied, ‘Now, you go\
      \ to a room and ring the doorbell. An old sleepy lady would come out. That is my wife. She will give you the gift.'\
      \ I did what he said. It was a learning experience for me,\" \" Madhok added. \n\"I was commanding a newly formed Scouts\
      \ Battalion in a high altitude region in 1968. The unit was in the region for more than one-and-a-half years. We were\
      \ expecting the relocation to another location. However, it was not happening despite pursuing matters with the Brigade\
      \ and divisional commanders.\" \n\"So I had written a letter to the Army headquarters in strong words with the title\
      \ ‘Army HQs cheated us'. Within a few days, then Army chief Manekshaw ordered an inquiry. The brigade commander immediately\
      \ landed at the unit location in a helicopter to inquire about the matter. He agreed to my demands. Otherwise, they\
      \ would have tried to prove me wrong,\" Madhok added."
