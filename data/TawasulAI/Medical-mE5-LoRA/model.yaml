widgetData:
- source_sentence: 'query: مرحبا، في كذا سبب ومنها: ممكن يكون ارتفاع الضغط العصبي اللي بيجي بسبب الضغوط والاجهاد البدني والنفسي
    والتعرض الدائم للتوتر والقلق، وممكن يكون كمان بسبب امراض الكلى، وأنت ما ذكرت أي اعراض حاسس فيها تكون دليل على اصابتك بارتفاع
    ضغط الدم الفعلي، ومنها الشعور بالدوخه، خفقان القلب، وتضيق الابهر، التعب بس تعمل أي مجهود، والم في الصدر، وبالآخر حدوث
    جلطة في القلب لا قدر الله، وما عندك المسببات الثانويه مثل السمنه المفرطه، الكحول ومرض السكري والتدخين، وما لازم تتسرع
    وتاخد ادوية ارتفاع ضغط الدم غير لما تتأكد تماماً.'
  sentences:
  - 'passage: أمورك بشكل عام كتير ممتازة والحمد لله. هلا بس فيه عندك مرحلة ماقبل السكري من النوع الخفيف. كل اللي عليك تركز
    فيه هو المشي والحمية الصحية.'
  - 'passage: بخصوص قراءة الضغط، ممكن يكون فيه كذا احتمال، منها ارتفاع الضغط العصبي يلي بيرتبط بالضغوط والاجهاد البدني والنفسي
    والتعرض الدائم للتوتر والقلق، وممكن كمان يرجع لـ امراض الكلى. بما إنك ما ذكرت أي أعراض ممكن تكون دليل على اصابتك بارتفاع
    ضغط الدم الفعلي، متل الشعور بالدوخه أو خفقان القلب أو تضيق الابهر أو التعب بس تعمل أي مجهود أو الم في الصدر، ولا قدر الله
    حدوث جلطة في القلب، وكمان ما عندك المسببات الثانويه متل السمنه المفرطه والكحول ومرض السكري والتدخين، فهالأمر مطمئن. لهيك،
    مهم ما تاخد ادوية ارتفاع ضغط الدم إلا بعد ما تتأكد تماماً.'
  - 'passage: مرحبا، في كذا سبب ومنها: ممكن يكون انخفاض الضغط العصبي اللي بيجي بسبب الضغوط والاجهاد، وما ذكرت أي اعراض حاسس
    فيها تكون دليل على اصابتك بـ انخفاض الضغط الفعلي، ومنها الشعور بالدوخه، والتعب بس تعمل أي مجهود، والمسببات الثانويه مثل
    فقدان الدم، وما لازم تتسرع وتاخد ادوية الضغط غير لما تتأكد تماماً.'
- source_sentence: 'query: ضيق التنفس

    هو عبارة عن تنفس صعب وسريع، أو لما الواحد ما يقدر يفوت الهوا أو يطلعه من الرئتين.

    وبأغلب الحالات هي الحالة بتدل إنو لازم الواحد يطلب عناية طبية، خصوصاً إذا كان معها وجع بالصدر أو تورم بالوجه.

    أهم أسباب ضيق النفس:

    قصور عضلة القلب / الربو الشعبي / النوبة القلبية / الاسترواح الصدري / فقر الدم

    إذا بلشت تحس بقصر النفس جديد + وإذا عم تحس بأي من الأعراض هي:

    - تورم بالوجه أو الزور

    - حكة أو ارتكاريا

    فالحالة غالباً

    تفاعل حساسية / العوار / الربو الشعبي

    إذا بلشت تحس بقصر النفس جديد + وأجاك وجع مفاجئ بالصدر وإنت عم تتنفس بعمق، وضَل بعد ما ارتحت كم دقيقة

    إذا بلشت تحس بقصر النفس جديد + وعم تحس بأي من الأعراض هي:

    - دوار خفيف

    - خوف شديد مفاجئ.

    - تنميل بالشفاه أو الإيدين.

    - عرق.

    - سرعة ضربات القلب

    فالتشخيص غالباً

    اضطراب الذعر

    إذا بلشت تحس بقصر النفس جديد +

    وعم تحس بأي من الأعراض هي:

    - حرارة فوق 37.4 درجة مئوية.

    - بلغم أصفر أو أخضر.

    - وجع بالصدر وإنت عم تتنفس.

    فالتشخيص المتوقع:

    عدوى بكتيرية / الانفلونزا / الالتهاب الرئوي / نزلة البرد

    إذا عندك قصر نفس مزمن مع أو بدون سعال +

    وعم تحس بأي من الأعراض هي:

    - حمى.

    - عرق غزير بالليل.

    - فقدان الشهية.

    - سعال مع دم.

    - إصابة سابقة بالسل.

    فالتشخيص المتوقع:

    ورم رئوي / خراج رئوي أو سل / سرطان الرئة

    إذا عندك قصر نفس مزمن مع أو بدون سعال +

    وعم تحس بأي من الأعراض هي:

    - قصر النفس أو السعال بيزيد لمّا تتسطح.

    - تورم بالإجرين.

    - إصابة سابقة بمرض القلب

    فالتشخيص المتوقع:هبوط القلب الاحتقاني

    إذا عندك قصر نفس مزمن مع أو بدون سعال +

    وأجاك قصر نفس وإنت عم تتحرك، وسعال مع بلغم لمدة 3 شهور أقل شي

    الالتهاب الشعبي المزمن / الانتفاخ الرئوي

    إذا كان ضيق النفس معو تزييق بالصدر

    فالتشخيص المتوقع:

    تزييق الصدر / الربو الشعبي

    إذا كنت ناصح زيادة

    زيادة الوزن والسمنة ممكن تكون هي السبب'
  sentences:
  - 'passage: إذا عندك مرض سكري بيستلزم العلاج الدوائي والحمية والرياضة، لازم تراجع طبيبك فوراً للمتابعة. قيمة تحليل homa
    العلمية محدودة.'
  - 'passage: فهم شعور ضيق التنفس، اللي بيوصف صعوبة النفس أو أخذ الهوا وطلعه من الرئتين، بيساعدنا نتعامل معاه بشكل أفضل، خصوصاً
    إنه أحياناً بيستدعي استشارة طبية مع أعراض زي وجع بالصدر أو تورم بالوجه، وهاد الشعور ممكن يكون مرتبط بحالات صحية متنوعة
    مثل قصور عضلة القلب، الربو الشعبي، النوبة القلبية، الاسترواح الصدري، فقر الدم، أو حتى تفاعل حساسية / العوار اللي بيعمل
    حكة أو ارتكاريا وتورم بالوجه أو الزور، وممكن يكون جزء من اضطراب الذعر مع دوار خفيف، خوف شديد مفاجئ، تنميل بالشفاه أو الإيدين،
    عرق، وسرعة ضربات القلب، أو ممكن يدل على عدوى بكتيرية / الانفلونزا / الالتهاب الرئوي / نزلة البرد خاصة مع حرارة فوق 37.4
    درجة مئوية وبلغم أصفر أو أخضر ووجع بالصدر وإنت عم تتنفس، ولو قصر نفس مزمن مع أو بدون سعال ممكن يرتبط بحمى، عرق غزير بالليل،
    فقدان الشهية، سعال مع دم، أو إصابة سابقة بالسل اللي ممكن توجه لـ ورم رئوي / خراج رئوي أو سل / سرطان الرئة، وممكن كمان
    يكون علامة على هبوط القلب الاحتقاني خصوصاً مع تورم بالإجرين أو إصابة سابقة بمرض القلب، أو مرتبط بـ الالتهاب الشعبي المزمن
    / الانتفاخ الرئوي خصوصاً مع قصر نفس وإنت عم تتحرك وسعال مع بلغم لمدة 3 شهور أقل شي، وحتى وجود تزييق بالصدر اللي هو تزييق
    الصدر وممكن يكون للربو الشعبي، أو لو كنت ناصح زيادة، زيادة الوزن والسمنة ممكن تكون أحد الأسباب، كلها أمور ممكن نفهمها
    ونتعامل معها صح.'
  - 'passage: إذا بلشت تحس بقصر النفس جديد وإذا عم تحس بأي من الأعراض هي: وجع بالصدر أو الإيد الشمال، عرق غزير بالليل، فالحالة
    غالباً نوبة قلبية.'
- source_sentence: 'query: دكتور أخصائي بأمراض النساء والغدد

    0

    التاريخ والوقت: 12/11/2015 الساعة 8:59 مساءً

    الدكتور خالد المهدي

    السؤال بيحكي عن أمراض الغدد الصماء و نقص نموه عند بنت

    الدكتور خالد المهدي

    الجهاز الهضمي والكبد'
  sentences:
  - 'passage: في سؤال وصلنا عن أمراض الغدد الصماء ونقص نموه عند بنت، والدكتور خالد المهدي أخصائي بأمراض النساء والغدد، وهو
    بيتطرق كمان للجهاز الهضمي والكبد.'
  - 'passage: لما تتم السيطرة عليه بشكل صحيح، بنتوقع الأعراض اللي اجت مع صعوده تختفي. أما إذا لسا الأعراض موجودة، فالأفضل
    تخبر طبيبك ليشوف أسباب تانية.'
  - 'passage: السؤال بيحكي عن أمراض الكلى عند بنت، والدكتور خالد المهدي أخصائي بأمراض الغدد والجهاز الهضمي.'
- source_sentence: 'query: مرهم تيراميسين.

    للعيون بس.

    الدكتور رفيق عبده جعفر

    جراحة عامة'
  sentences:
  - 'passage: الدكتور رفيق عبده جعفر اختصاصي جراحة عامة بقول مرهم تيراميسين هاد مش للعيون.'
  - 'passage: انا الدكتور رفيق عبده جعفر، اختصاصي جراحة عامة، وبحب قول إنو مرهم تيراميسين هاد بس للعيون.'
  - 'passage: احتمال كبير اللي عم يصير معك مو هو هاد الشي، من الأفضل تستشير طبيب غدد.'
- source_sentence: 'query: السمنة يعني الوزن الزايد وغير هيك اكل وجبات كبيرة ودسمة'
  sentences:
  - 'passage: النحافة يعني الوزن الناقص وغير هيك قلة اكل وجبات كبيرة ودسمة'
  - 'passage: إذا الـ lymphocytes مرتفعة بتدل على التهابات، فشو وضع باقي قراءات كريات الدم البيضاء؟ عالية، واطية، أو طبيعية؟'
  - 'passage: الوزن الزايد اللي هو السمنة غالباً بييجي من اكل وجبات كبيرة ودسمة.'
