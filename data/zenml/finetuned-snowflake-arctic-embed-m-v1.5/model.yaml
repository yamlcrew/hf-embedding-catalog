    \ register <STACK_NAME> -i <IMAGE_BUILDER_NAME> ... --set\n\nCaveats\n\nAs described in this Google Cloud Build documentation\
    \ page, Google Cloud Build uses containers to execute the build steps which are automatically attached to a network called\
    \ cloudbuild that provides some Application Default Credentials (ADC), that allow the container to be authenticated and\
    \ therefore use other GCP services.\n\nBy default, the GCP Image Builder is executing the build command of the ZenML Pipeline\
    \ Docker image with the option --network=cloudbuild, so the ADC provided by the cloudbuild network can also be used in\
    \ the build. This is useful if you want to install a private dependency from a GCP Artifact Registry, but you will also\
    \ need to use a custom base parent image with the keyrings.google-artifactregistry-auth installed, so pip can connect\
    \ and authenticate in the private artifact registry to download the dependency.\n\nFROM zenmldocker/zenml:latest\n\nRUN\
    \ pip install keyrings.google-artifactregistry-auth\n\nThe above Dockerfile uses zenmldocker/zenml:latest as a base image,\
    \ but is recommended to change the tag to specify the ZenML version and Python version like 0.33.0-py3.10.\n\nPreviousKaniko\
    \ Image BuilderNextDevelop a Custom Image Builder\n\nLast updated 21 days ago"
