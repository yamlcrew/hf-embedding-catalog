  - "nsible for cluster-manager-specific configuration._io_configuration is a critical method. Even though we have materializers,\
    \ Spark might require additional packages and configuration to work with a specific filesystem. This method is used as\
    \ an interface to provide this configuration.\n\n_additional_configuration takes the submit_args, converts, and appends\
    \ them to the overall configuration.\n\nOnce the configuration is completed, _launch_spark_job comes into play. This takes\
    \ the completed configuration and runs a Spark job on the given master URL with the specified deploy_mode. By default,\
    \ this is achieved by creating and executing a spark-submit command.\n\nWarning\n\nIn its first iteration, the pre-configuration\
    \ with _io_configuration method is only effective when it is paired with an S3ArtifactStore (which has an authentication\
    \ secret). When used with other artifact store flavors, you might be required to provide additional configuration through\
    \ the submit_args.\n\nStack Component: KubernetesSparkStepOperator\n\nThe KubernetesSparkStepOperator is implemented by\
    \ subclassing the base SparkStepOperator and uses the PipelineDockerImageBuilder class to build and push the required\
    \ Docker images.\n\nfrom typing import Optional\n\nfrom zenml.integrations.spark.step_operators.spark_step_operator import\
    \ (\n    SparkStepOperatorConfig\n)\n\nclass KubernetesSparkStepOperatorConfig(SparkStepOperatorConfig):\n    \"\"\"Config\
    \ for the Kubernetes Spark step operator.\"\"\"\n\nnamespace: Optional[str] = None\n    service_account: Optional[str]\
    \ = None\n\nfrom pyspark.conf import SparkConf\n\nfrom zenml.utils.pipeline_docker_image_builder import PipelineDockerImageBuilder\n\
    from zenml.integrations.spark.step_operators.spark_step_operator import (\n    SparkStepOperator\n)\n\nclass KubernetesSparkStepOperator(SparkStepOperator):\n\
    \    \"\"\"Step operator which runs Steps with Spark on Kubernetes.\"\"\""
  - "ngs/python/Dockerfile -u 0 build\n\nConfiguring RBACAdditionally, you may need to create the several resources in Kubernetes\
    \ in order to give Spark access to edit/manage your driver executor pods.\n\nTo do so, create a file called rbac.yaml\
    \ with the following content:\n\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: spark-namespace\n---\napiVersion:\
    \ v1\nkind: ServiceAccount\nmetadata:\n  name: spark-service-account\n  namespace: spark-namespace\n---\napiVersion: rbac.authorization.k8s.io/v1\n\
    kind: ClusterRoleBinding\nmetadata:\n  name: spark-role\n  namespace: spark-namespace\nsubjects:\n  - kind: ServiceAccount\n\
    \    name: spark-service-account\n    namespace: spark-namespace\nroleRef:\n  kind: ClusterRole\n  name: edit\n  apiGroup:\
    \ rbac.authorization.k8s.io\n---\n\nAnd then execute the following command to create the resources:\n\naws eks --region=$REGION\
    \ update-kubeconfig --name=$EKS_CLUSTER_NAME\n\nkubectl create -f rbac.yaml\n\nLastly, note down the namespace and the\
    \ name of the service account since you will need them when registering the stack component in the next step.\n\nHow to\
    \ use it\n\nTo use the KubernetesSparkStepOperator, you need:\n\nthe ZenML spark integration. If you haven't installed\
    \ it already, run\n\nzenml integration install spark\n\nDocker installed and running.\n\nA remote artifact store as part\
    \ of your stack.\n\nA remote container registry as part of your stack.\n\nA Kubernetes cluster deployed.\n\nWe can then\
    \ register the step operator and use it in our active stack:\n\nzenml step-operator register spark_step_operator \\\n\t\
    --flavor=spark-kubernetes \\\n\t--master=k8s://$EKS_API_SERVER_ENDPOINT \\\n\t--namespace=<SPARK_KUBERNETES_NAMESPACE>\
    \ \\\n\t--service_account=<SPARK_KUBERNETES_SERVICE_ACCOUNT>\n\n# Register the stack\nzenml stack register spark_stack\
    \ \\\n    -o default \\\n    -s spark_step_operator \\\n    -a spark_artifact_store \\\n    -c spark_container_registry\
    \ \\\n    -i local_builder \\\n    --set"
