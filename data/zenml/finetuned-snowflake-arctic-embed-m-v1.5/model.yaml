    \    \"\"\"\n\n# validation pre-processing (e.g. dataset preparation) can take place here\n\nresults = why.log(dataset)\n\
    \    profile = results.profile()\n\n# validation post-processing (e.g. interpret results, take actions) can happen here\n\
    \nreturn profile.view()\n\nVisualizing whylogs Profiles\n\nYou can view visualizations of the whylogs profiles generated\
    \ by your pipeline steps directly in the ZenML dashboard by clicking on the respective artifact in the pipeline run DAG.\n\
    \nAlternatively, if you are running inside a Jupyter notebook, you can load and render the whylogs profiles using the\
    \ artifact.visualize() method, e.g.:\n\nfrom zenml.client import Client\n\ndef visualize_statistics(\n    step_name: str,\
    \ reference_step_name: Optional[str] = None\n) -> None:\n    \"\"\"Helper function to visualize whylogs statistics from\
    \ step artifacts.\n\nArgs:\n        step_name: step that generated and returned a whylogs profile\n        reference_step_name:\
    \ an optional second step that generated a whylogs\n            profile to use for data drift visualization where two\
    \ whylogs\n            profiles are required.\n    \"\"\"\n    pipe = Client().get_pipeline(pipeline=\"data_profiling_pipeline\"\
    )\n    whylogs_step = pipe.last_run.steps[step_name]\n    whylogs_step.visualize()"
