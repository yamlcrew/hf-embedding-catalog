      \ pip can connect and authenticate in the private artifact registry to download the dependency.\n\nFROM zenmldocker/zenml:latest\n\
      \nRUN pip install keyrings.google-artifactregistry-auth\n\nThe above Dockerfile uses zenmldocker/zenml:latest as a base\
