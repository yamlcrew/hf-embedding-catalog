    - '⚒️Manage stacks


      Deploying your stack components directly from the ZenML CLI


      The first step in running your pipelines on remote infrastructure is to deploy all the components that you would need,
      like an MLflow tracking server, a Seldon Core model deployer, and more to your cloud.


      This can bring plenty of benefits like scalability, reliability, and collaboration. ZenML eases the path to production
      by providing a seamless way for all tools to interact with others through the use of abstractions. However, one of the
      most painful parts of this process, from what we see on our Slack and in general, is the deployment of these stack components.


      Deploying and managing MLOps tools is tricky 😭😵‍💫


      It is not trivial to set up all the different tools that you might need for your pipeline.


      🌈 Each tool comes with a certain set of requirements. For example, a Kubeflow installation will require you to have
      a Kubernetes cluster, and so would a Seldon Core deployment.


      🤔 Figuring out the defaults for infra parameters is not easy. Even if you have identified the backing infra that you
      need for a stack component, setting up reasonable defaults for parameters like instance size, CPU, memory, etc., needs
      a lot of experimentation to figure out.


      🚧 Many times, standard tool installations don''t work out of the box. For example, to run a custom pipeline in Vertex
      AI, it is not enough to just run an imported pipeline. You might also need a custom service account that is configured
      to perform tasks like reading secrets from your secret store or talking to other GCP services that your pipeline might
      need.


      🔐 Some tools need an additional layer of installations to enable a more secure, production-grade setup. For example,
      a standard MLflow tracking server deployment comes without an authentication frontend which might expose all of your
      tracking data to the world if deployed as-is.'
