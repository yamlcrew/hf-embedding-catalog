    How to migrate your ZenML pipelines and steps from version <=0.39.1 to 0.41.0.


    ZenML versions 0.40.0 to 0.41.0 introduced a new and more flexible syntax to define ZenML steps and pipelines. This page
    contains code samples that show you how to upgrade your steps and pipelines to the new syntax.


    Newer versions of ZenML still work with pipelines and steps defined using the old syntax, but the old syntax is deprecated
    and will be removed in the future.


    Overview


    from typing import Optional


    from zenml.steps import BaseParameters, Output, StepContext, step


    from zenml.pipelines import pipeline


    # Define a Step


    class MyStepParameters(BaseParameters):


    param_1: int


    param_2: Optional[float] = None


    @step


    def my_step(


    params: MyStepParameters, context: StepContext,


    ) -> Output(int_output=int, str_output=str):


    result = int(params.param_1 * (params.param_2 or 1))


    result_uri = context.get_output_artifact_uri()


    return result, result_uri


    # Run the Step separately


    my_step.entrypoint()


    # Define a Pipeline


    @pipeline


