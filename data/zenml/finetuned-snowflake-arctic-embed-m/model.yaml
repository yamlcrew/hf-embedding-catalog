- source_sentence: What are the special metadata types supported by ZenML and how are they used?
  sentences:
  - 'Special Metadata Types


    Tracking your metadata.


    ZenML supports several special metadata types to capture specific kinds of information. Here are examples of how to use
    the special types Uri, Path, DType, and StorageSize:


    from zenml.metadata.metadata_types import StorageSize, DType


    from zenml import log_artifact_metadata


    log_artifact_metadata(


    metadata={


    "dataset_source": Uri("gs://my-bucket/datasets/source.csv"),


    "preprocessing_script": Path("/scripts/preprocess.py"),


    "column_types": {


    "age": DType("int"),


    "income": DType("float"),


    "score": DType("int")


    },


    "processed_data_size": StorageSize(2500000)


    In this example:


    Uri is used to indicate a dataset source URI.


    Path is used to specify the filesystem path to a preprocessing script.


    DType is used to describe the data types of specific columns.


    StorageSize is used to indicate the size of the processed data in bytes.


    These special types help standardize the format of metadata and ensure that it is logged in a consistent and interpretable
    manner.


    PreviousGroup metadata


    NextFetch metadata within steps


    Last updated 19 days ago'
  - 'Configure a code repository


    Connect a Git repository to ZenML to track code changes and collaborate on MLOps projects.


    Throughout the lifecycle of a MLOps pipeline, it can get quite tiresome to always wait for a Docker build every time after
    running a pipeline (even if the local Docker cache is used). However, there is a way to just have one pipeline build and
    keep reusing it until a change to the pipeline environment is made: by connecting a code repository.


    With ZenML, connecting to a Git repository optimizes the Docker build processes. It also has the added bonus of being
    a better way of managing repository changes and enabling better code collaboration. Here is how the flow changes when
    running a pipeline:


    You trigger a pipeline run on your local machine. ZenML parses the @pipeline function to determine the necessary steps.


    The local client requests stack information from the ZenML server, which responds with the cloud stack configuration.


    The local client detects that we''re using a code repository and requests the information from the git repo.


    Instead of building a new Docker image, the client checks if an existing image can be reused based on the current Git
    commit hash and other environment metadata.


    The client initiates a run in the orchestrator, which sets up the execution environment in the cloud, such as a VM.


    The orchestrator downloads the code directly from the Git repository and uses the existing Docker image to run the pipeline
    steps.


    Pipeline steps execute, storing artifacts in the cloud-based artifact store.


    Throughout the execution, the pipeline run status and metadata are reported back to the ZenML server.


    By connecting a Git repository, you avoid redundant builds and make your MLOps processes more efficient. Your team can
    work on the codebase simultaneously, with ZenML handling the version tracking and ensuring that the correct code version
    is always used for each run.


    Creating a GitHub Repository'
