      token_hex(32)or:Copyopenssl rand -hex 32Important: If you configure encryption for your SQL database secrets store,
      you should keep the ZENML_SECRETS_STORE_ENCRYPTION_KEY value somewhere safe and secure, as it will always be required
      by the ZenML server to decrypt the secrets in the database. If you lose the encryption key, you will not be able to
      decrypt the secrets in the database and will have to reset them.


      These configuration options are only relevant if you''re using the AWS Secrets Manager as the secrets store backend.


      ZENML_SECRETS_STORE_TYPE: Set this to aws in order to set this type of secret store.


      The AWS Secrets Store uses the ZenML AWS Service Connector under the hood to authenticate with the AWS Secrets Manager
      API. This means that you can use any of the authentication methods supported by the AWS Service Connector to authenticate
      with the AWS Secrets Manager API.


      "Version": "2012-10-17",


      "Statement": [


      "Sid": "ZenMLSecretsStore",


      "Effect": "Allow",


      "Action": [


      "secretsmanager:CreateSecret",


      "secretsmanager:GetSecretValue",


      "secretsmanager:DescribeSecret",


      "secretsmanager:PutSecretValue",


      "secretsmanager:TagResource",


      "secretsmanager:DeleteSecret"


      ],


      "Resource": "arn:aws:secretsmanager:<AWS-region>:<AWS-account-id>:secret:zenml/*"


      The following configuration options are supported:


      ZENML_SECRETS_STORE_AUTH_METHOD: The AWS Service Connector authentication method to use (e.g. secret-key or iam-role).


      ZENML_SECRETS_STORE_AUTH_CONFIG: The AWS Service Connector configuration, in JSON format (e.g. {"aws_access_key_id":"<aws-key-id>","aws_secret_access_key":"<aws-secret-key>","region":"<aws-region>"}).


      Note: The remaining configuration options are deprecated and may be removed in a future release. Instead, you should
      set the ZENML_SECRETS_STORE_AUTH_METHOD and ZENML_SECRETS_STORE_AUTH_CONFIG variables to use the AWS Service Connector
      authentication method.'
    - 'tive Directory credentials or generic OIDC tokens.This authentication method only requires a GCP workload identity
      external account JSON file that only contains the configuration for the external account without any sensitive credentials.
      It allows implementing a two layer authentication scheme that keeps the set of permissions associated with implicit
      credentials down to the bare minimum and grants permissions to the privilege-bearing GCP service account instead.


      This authentication method can be used to authenticate to GCP services using credentials from other cloud providers
      or identity providers. When used with workloads running on AWS or Azure, it involves automatically picking up credentials
      from the AWS IAM or Azure AD identity associated with the workload and using them to authenticate to GCP services. This
      means that the result depends on the environment where the ZenML server is deployed and is thus not fully reproducible.


      When used with AWS or Azure implicit in-cloud authentication, this method may constitute a security risk, because it
      can give users access to the identity (e.g. AWS IAM role or Azure AD principal) implicitly associated with the environment
      where the ZenML server is running. For this reason, all implicit authentication methods are disabled by default and
      need to be explicitly enabled by setting the ZENML_ENABLE_IMPLICIT_AUTH_METHODS environment variable or the helm chart
      enableImplicitAuthMethods configuration option to true in the ZenML deployment.


      By default, the GCP connector generates temporary OAuth 2.0 tokens from the external account credentials and distributes
      them to clients. The tokens have a limited lifetime of 1 hour. This behavior can be disabled by setting the generate_temporary_tokens
      configuration option to False, in which case, the connector will distribute the external account credentials JSON to
      clients instead (not recommended).'
