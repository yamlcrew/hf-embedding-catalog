  - source_sentence: Where can I find the instructions to clone the ZenML quickstart repository and set up the stack?
    sentences:
    - 'into play when the component is ultimately in use.The design behind this interaction lets us separate the configuration
      of the flavor from its implementation. This way we can register flavors and components even when the major dependencies
      behind their implementation are not installed in our local setting (assuming the CustomArtifactStoreFlavor and the CustomArtifactStoreConfig
      are implemented in a different module/path than the actual CustomArtifactStore).


      Enabling Artifact Visualizations with Custom Artifact Stores


      ZenML automatically saves visualizations for many common data types and allows you to view these visualizations in the
      ZenML dashboard. Under the hood, this works by saving the visualizations together with the artifacts in the artifact
      store.


      In order to load and display these visualizations, ZenML needs to be able to load and access the corresponding artifact
      store. This means that your custom artifact store needs to be configured in a way that allows authenticating to the
      back-end without relying on the local environment, e.g., by embedding the authentication credentials in the stack component
      configuration or by referencing a secret.


      Furthermore, for deployed ZenML instances, you need to install the package dependencies of your artifact store implementation
      in the environment where you have deployed ZenML. See the Documentation on deploying ZenML with custom Docker images
      for more information on how to do that.


      PreviousAzure Blob Storage


      NextContainer Registries


      Last updated 19 days ago'
