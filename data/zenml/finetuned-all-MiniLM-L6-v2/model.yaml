    - '👣Step Operators


      Executing individual steps in specialized environments.


      The step operator enables the execution of individual pipeline steps in specialized runtime environments that are optimized
      for certain workloads. These specialized environments can give your steps access to resources like GPUs or distributed
      processing frameworks like Spark.


      Comparison to orchestrators: The orchestrator is a mandatory stack component that is responsible for executing all steps
      of a pipeline in the correct order and providing additional features such as scheduling pipeline runs. The step operator
      on the other hand is used to only execute individual steps of the pipeline in a separate environment in case the environment
      provided by the orchestrator is not feasible.


      When to use it


      A step operator should be used if one or more steps of a pipeline require resources that are not available in the runtime
      environments provided by the orchestrator. An example would be a step that trains a computer vision model and requires
      a GPU to run in a reasonable time, combined with a Kubeflow orchestrator running on a Kubernetes cluster that does not
      contain any GPU nodes. In that case, it makes sense to include a step operator like SageMaker, Vertex, or AzureML to
      execute the training step with a GPU.


      Step Operator Flavors


      Step operators to execute steps on one of the big cloud providers are provided by the following ZenML integrations:


      Step Operator Flavor Integration Notes SageMaker sagemaker aws Uses SageMaker to execute steps Vertex vertex gcp Uses
      Vertex AI to execute steps AzureML azureml azure Uses AzureML to execute steps Spark spark spark Uses Spark on Kubernetes
      to execute steps in a distributed manner Custom Implementation custom Extend the step operator abstraction and provide
      your own implementation


      If you would like to see the available flavors of step operators, you can use the command:


      zenml step-operator flavor list


      How to use it'
    - 'Azure Container Registry


      Storing container images in Azure.


      The Azure container registry is a container registry flavor that comes built-in with ZenML and uses the Azure Container
      Registry to store container images.


      When to use it


      You should use the Azure container registry if:


      one or more components of your stack need to pull or push container images.


      you have access to Azure. If you''re not using Azure, take a look at the other container registry flavors.


      How to deploy it


      Go here and choose a subscription, resource group, location, and registry name. Then click on Review + Create and to
      create your container registry.


      How to find the registry URI


      The Azure container registry URI should have the following format:


      <REGISTRY_NAME>.azurecr.io


      # Examples:


      zenmlregistry.azurecr.io


      myregistry.azurecr.io


      To figure out the URI for your registry:


      Go to the Azure portal.


      In the search bar, enter container registries and select the container registry you want to use. If you don''t have
      any container registries yet, check out the deployment section on how to create one.


      Use the name of your registry to fill the template <REGISTRY_NAME>.azurecr.io and get your URI.


      How to use it


      To use the Azure container registry, we need:


      Docker installed and running.


      The registry URI. Check out the previous section on the URI format and how to get the URI for your registry.


      We can then register the container registry and use it in our active stack:


      zenml container-registry register <NAME> \


      --flavor=azure \


      --uri=<REGISTRY_URI>


      # Add the container registry to the active stack


      zenml stack update -c <NAME>


      You also need to set up authentication required to log in to the container registry.


      Authentication Methods'
