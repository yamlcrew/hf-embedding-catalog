  - 'tive Directory credentials or generic OIDC tokens.This authentication method only requires a GCP workload identity external
    account JSON file that only contains the configuration for the external account without any sensitive credentials. It
    allows implementing a two layer authentication scheme that keeps the set of permissions associated with implicit credentials
    down to the bare minimum and grants permissions to the privilege-bearing GCP service account instead.


    This authentication method can be used to authenticate to GCP services using credentials from other cloud providers or
    identity providers. When used with workloads running on AWS or Azure, it involves automatically picking up credentials
    from the AWS IAM or Azure AD identity associated with the workload and using them to authenticate to GCP services. This
    means that the result depends on the environment where the ZenML server is deployed and is thus not fully reproducible.


    When used with AWS or Azure implicit in-cloud authentication, this method may constitute a security risk, because it can
    give users access to the identity (e.g. AWS IAM role or Azure AD principal) implicitly associated with the environment
    where the ZenML server is running. For this reason, all implicit authentication methods are disabled by default and need
    to be explicitly enabled by setting the ZENML_ENABLE_IMPLICIT_AUTH_METHODS environment variable or the helm chart enableImplicitAuthMethods
    configuration option to true in the ZenML deployment.


    By default, the GCP connector generates temporary OAuth 2.0 tokens from the external account credentials and distributes
    them to clients. The tokens have a limited lifetime of 1 hour. This behavior can be disabled by setting the generate_temporary_tokens
    configuration option to False, in which case, the connector will distribute the external account credentials JSON to clients
    instead (not recommended).'
- source_sentence: What is an example of a ZenML server YAML configuration file?
  sentences:
  - 'sing a type annotation.


    Tuple vs multiple outputsIt is impossible for ZenML to detect whether you want your step to have a single output artifact
    of type Tuple or multiple output artifacts just by looking at the type annotation.


    We use the following convention to differentiate between the two: When the return statement is followed by a tuple literal
    (e.g. return 1, 2 or return (value_1, value_2)) we treat it as a step with multiple outputs. All other cases are treated
    as a step with a single output of type Tuple.


    from zenml import step


    from typing_extensions import Annotated


    from typing import Tuple


    # Single output artifact


    @step


    def my_step() -> Tuple[int, int]:


    output_value = (0, 1)


    return output_value


    # Single output artifact with variable length


    @step


    def my_step(condition) -> Tuple[int, ...]:


    if condition:


    output_value = (0, 1)


    else:


    output_value = (0, 1, 2)


    return output_value


    # Single output artifact using the `Annotated` annotation


    @step


    def my_step() -> Annotated[Tuple[int, ...], "my_output"]:


    return 0, 1


    # Multiple output artifacts


    @step


    def my_step() -> Tuple[int, int]:


    return 0, 1


    # Not allowed: Variable length tuple annotation when using


    # multiple output artifacts


    @step


    def my_step() -> Tuple[int, ...]:


    return 0, 1


    Step output names


    By default, ZenML uses the output name output for single output steps and output_0, output_1, ... for steps with multiple
    outputs. These output names are used to display your outputs in the dashboard and fetch them after your pipeline is finished.


    If you want to use custom output names for your steps, use the Annotated type annotation:


    from typing_extensions import Annotated  # or `from typing import Annotated on Python 3.9+


    from typing import Tuple


    from zenml import step


    @step


    def square_root(number: int) -> Annotated[float, "custom_output_name"]:


    return number ** 0.5


    @step


    def divide(a: int, b: int) -> Tuple[


    Annotated[int, "quotient"],


    Annotated[int, "remainder"]


    ]:


    return a // b, a % b'
  - 'HyperAI Orchestrator


    Orchestrating your pipelines to run on HyperAI.ai instances.


    HyperAI is a cutting-edge cloud compute platform designed to make AI accessible for everyone. The HyperAI orchestrator
    is an orchestrator flavor that allows you to easily deploy your pipelines on HyperAI instances.


    This component is only meant to be used within the context of a remote ZenML deployment scenario. Usage with a local ZenML
    deployment may lead to unexpected behavior!


    When to use it


    You should use the HyperAI orchestrator if:


    you''re looking for a managed solution for running your pipelines.


    you''re a HyperAI customer.


    Prerequisites


    You will need to do the following to start using the HyperAI orchestrator:


    Have a running HyperAI instance. It must be accessible from the internet (or at least from the IP addresses of your ZenML
    users) and allow SSH key based access (passwords are not supported).


    Ensure that a recent version of Docker is installed. This version must include Docker Compose, meaning that the command
    docker compose works.


    Ensure that the appropriate NVIDIA Driver is installed on the HyperAI instance (if not already installed by the HyperAI
    team).


    Ensure that the NVIDIA Container Toolkit is installed and configured on the HyperAI instance.


    Note that it is possible to omit installing the NVIDIA Driver and NVIDIA Container Toolkit. However, you will then be
    unable to use the GPU from within your ZenML pipeline. Additionally, you will then need to disable GPU access within the
    container when configuring the Orchestrator component, or the pipeline will not start correctly.


