widgetData:
- source_sentence: Sodišče sme na prošnjo obsojenca odločiti, da se obsodba izbriše iz kazenske evidence in da obsojenec velja
    za neobsojenega, če je potekla polovica z zakonom določenega roka, po poteku katerega se obsodba izbriše, če obsojenec
    v tem času ni storil novega kaznivega dejanja. Pri odločanju o izbrisu upošteva sodišče vedenje obsojenca po prestani
    kazni, naravo kaznivega dejanja in druge okoliščine, pomembne za izbris obsodbe.
  sentences:
  - Če dan izročitve stvari kupcu ni določen, mora prodajalec izročiti stvar v roku 15 dni po sklenitvi pogodbe, glede na
    naravo stvari in na druge okoliščine.
  - 'Upravljalci, ki so subjekti javnega sektorja, za namene raziskovanja posredujejo osebne podatke po tarifi, določeni za
    raziskovalne storitve. '
  - Sodišče po uradni dolžnosti izbriše obsodbo iz kazenske evidence, če storilec že dalj časa ni izvršil kaznivega dejanja,
    pri tem pa prav tako upošteva vedenje obsojenca po prestani kazni, naravo kaznivega dejanja in druge okoliščine, pomembne
    za izbris obsodbe.
- source_sentence: 'V okviru trženja ali podobne druge poslovne dejavnosti se ne smejo zahtevati,

    pridobiti ali nadalje obdelovati biometrični osebni podatki v zamenjavo za določene storitve,

    četudi so te storitve za posameznika, na katerega se nanašajo osebni podatki, brezplačne.'
  sentences:
  - 'Upravljavec videonadzora ni dolžan obvestiti policije, če posnetek pokaže nevaren dogodek.

    '
  - Za obdelave osebnih podatkov na področju varnosti države pristojni organ s področja varnosti države pripravi oceno učinka
    s smiselno uporabo določb tega člena. Ocena učinka je za potrebe nadzorov javno dostopna.
  - Osebe zasebnega prava lahko zahtevajo, pridobivajo ali nadalje obdelujejo biometrične osebne v zameno za določene storitve
    in blago, pod pogojem, da se storitve izvajajo za posameznika brezplačno.
- source_sentence: (3) Prepoved odtujitve ali obremenitve se lahko časovno omeji.
  sentences:
  - "Z ustanovitvijo hipoteke na stavbni pravici upnik hkrati \npridobi tudi zastavno pravico na terjatvi imetnika stavbnih\n\
    pravic za plačilo nadomestila."
  - V postopkih pred nadzornim organom ni dopustna stranska udeležba, kot jo določa zakon, ki ureja splošni civilni postopek.
  - 'Prepoved odtujitve mora biti časovno omejena. '
- source_sentence: (1) Več oseb ima solastninsko pravico na nerazdeljeni stvari (solastniki), če je delež vsakega izmed njih
    določen v sorazmerju s celoto (idealni delež).
  sentences:
  - Javni shodi so brezpogojno dovoljeni in vsakršna njihova prepoved ali preprečitev se kaznuje.
  - 'Posnetki videonadzora morajo se hranijo trajno, če kapacitete hranilnika tega ne dopuščajo, pa se hranijo eno leto in
    se po tem izbrišejo. '
  - 'Več oseb ima solastninsko pravico na nerazdeljeni stvari (solastniki), vendar le če je delež vsakega izmed njih nedoločen
    vse do delitve. '
- source_sentence: '(1) Posest je neposredna dejanska oblast nad stvarjo (neposredna posest).

    (2) Posest ima tudi tisti, ki izvršuje dejansko oblast nad stvarjo prek koga drugega, ki

    ima neposredno posest iz kakršnegakoli pravnega naslova (posredna posest).'
  sentences:
  - V postopkih pred nadzornim organom ni dopustna stranska udeležba, kot jo določa zakon, ki ureja splošni civilni postopek.
  - Posameznik lahko isto stvar istočasno poseduje neposredno in posredno.
  - Sodišče nikoli ne more odločati o poslu, ki presega redno upravljanje, brez soglasja vseh solastnikov.
