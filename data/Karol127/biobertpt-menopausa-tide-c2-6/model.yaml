    sentences:
    - É importante salientar que com o avanço da idade, os riscos relacionados à morbiletalidade são maiores e as queixas
      menstruais como o aumento do volume do fluxo, algia pélvica, hipermenorréia e outras irregularidades, tendem a piorar
      com a esterilização cirúrgica. Deve ser indicação de exclusão, quando os benefícios realmente compensarem os riscos
      e não houverem outras opções. 8.5.2 Vasectomia Ao contrário da esterilização feminina, a vasectomia deve ser incentivada
      por tratar- se de um procedimento mais fácil e seguro, em relação à esterilização na mulher. É uma ótima forma de dividir
      a responsabilidade sexual e de procriação com o parceiro. Oferece também maior chance de reversibilidade, desde que
      seja precoce (até três anos após a cirurgia), embora somente deva ser realizada quando houver por parte do homem ou
      casal, plena convicção da necessidade e desejo de esterilização permanente.
    - os. Alguns fatores podem contribuir para a mulher entrar na perimenopausa como tabagismo, história familiar de menopausa
      precoce, quimioterapia para o tratamento do câncer ou cirurgia para remoção do útero. Os sintomas mais comuns da perimenopausa
      são menstruação irregular, ondas de calor, sensibilidade nas mamas, alterações no humor ou dificuldade para dormir,
      por exemplo. É importante ressaltar que, durante a perimenopausa, o desequilíbrio hormonal e a menstruação irregular,
      não impedem uma gravidez. Portanto, durante esta fase, mulheres que desejam evitar gravidez é necessário usar um método
      contraceptivo indicado pelo ginecologista. 3. Pós-menopausa A pós-menopausa é o período que ocorre após o diagnóstico
      da menopausa e dura o resto da vida da mulher. Nesta fase, os ovários já não produzem estrógeno e portanto não é possível
      engravidar. No entanto, é importante fazer acompanhamento com ginecologista para avaliar, diagnosticar e orientar a
      pós menopausa.
    - Em estudo de base populacional observou-se um au mento relevante da incidência dos distúrbios do sono já na perimenopausa10.
      A menopausa foi con siderada fator independente para estes distúrbios após correção dos fatores confundidores como ida
      de, renda ou presença de depressão. Neste estu do, no entanto, o diagnóstico foi baseado apenas em questionário, sem
      confirmação laboratorial10. A insônia é sintoma que pode ser definido como a dificuldade em iniciar e/ou manter o sono,
      presença de sono não reparador, ou seja, insufi ciente para uma boa qualidade de alerta e bem estar físico e mental
      durante o dia, com o conse qüente comprometimento do desempenho nas ati vidades diurnas11. Enquanto a ocorrência de
      insônia em mu lheres com mais de 30 anos8 varia de 26 a 45%, estudos epidemiológicos mostraram aumento da sua incidência
      após a menopausa para cifras en tre 28 e 63% 12.
