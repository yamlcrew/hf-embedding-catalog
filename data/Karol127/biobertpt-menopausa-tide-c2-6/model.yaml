      e provoca sintomas como descida do útero, incontinência urinária e dor durante o contato íntimo. Na menopausa, pode
      ocorrer maior fraqueza dos músculos pélvicos devido a diminuição da produção de estrógeno, causando o prolapso uterino.
      O que fazer: nesse caso, o ginecologista pode indicar o tratamento cirúrgico para reposicionamento do útero ou retirada
      do útero. 6.'
