- source_sentence: Qd completei 50 anos não menstruei e estou sentindo cólicas pode ser menopausa ?
  sentences:
  - 'Mais uma propaganda enganosa… Não caia nessa Por que ficamos com a calcinha molhada ‘do nada’? Por que tenho vontade
    de fazer xixi toda hora? Publicidade Veja também Mulher Entenda por que você não deve segurar xixi Urologia Menopausa
    pode causar incontinência urinária? – Vamos Falar #10 Mulher Sexo na menstruação: saiba o que pode e o que não pode Obstetrícia
    Como é ter câncer durante a gravidez? | Bia Frecceiro Mulher Infecção urinária | Rodrigo Aquino de Castro Mulher Como
    o estrogênio pode aumentar os riscos de câncer de mama? Newsletter do Portal Drauzio Mantenha-se informado quando o assunto
    é saúde! Todas as segundas-feiras, receba por e-mail as principais reportagens publicadas por aqui. Obrigado! Você se
    cadastrou com sucesso em nossa lista de assinantes.'
  - ARTIGO RELACIONADO Boa nutrição assegura saúde muscular e ameniza a perda de mobilidade física em idosos Envelhecer bem
    não é um mito. Ao permanecer ativa e fazer escolhas informadas sobre os alimentos que ingere, você pode ajudar a apoiar
    um processo de envelhecimento saudável e a viver melhor e por mais tempo.
  - Além disso, outros sintomas são infecções urinárias frequentes, sangramento leve após o contato íntimo ou corrimento vaginal
    líquido como água ou amarelado. Veja outras causas de corrimento líquido como água. Na presença de sintomas de atrofia
    vaginal, é recomendado consultar o ginecologista para confirmar o diagnóstico e indicar o tratamento mais adequado, se
    necessário. Como confirmar o diagnóstico O diagnóstico da atrofia vaginal é clínico sendo feito pelo ginecologista através
    da avaliação dos sintomas, histórico de saúde, idade e exame ginecológico.  Em alguns casos, o médico pode solicitar alguns
    exames como papanicolau, exame de urina ou dos níveis hormonais, ultrassom, ou análise do pH vaginal. Possíveis causas
    A atrofia vaginal é causada pela diminuição do estrogênio produzido pelos ovários, resultando na perda de colágeno, elastina
    e vasos sanguíneos na região íntima.
- source_sentence: olá tenho 48anos, desde março de 2020, não tenho menstruação... tenho algum risco de engravidar?
  sentences:
  - 'Nesta fase, os sintomas da menopausa são comuns e podem durar até 4 anos e incluem ondas de calor, alterações do sono
    como a insônia ou secura vaginal, por exemplo. Tipos de menopausa A menopausa pode ocorrer antes ou após a faixa de idade
    considerada normal, que é de 45 a 51 anos, sendo classificadas como: 1. Menopausa precoce A menopausa precoce ocorre quando
    a mulher é diagnosticada com menopausa antes dos 40 anos de idade e pode ocorrer por um processo natural do corpo em que
    os ovários deixam de produzir estrógeno ou por problemas de saúde que envolvem alterações hormonais ou doença ovariana
    que leva estes órgãos à falência. Os principais fatores que podem causar a menopausa precoce incluem: Doenças como diabetes
    ou doença de Addison; Tabagismo; Quimioterapia ou radioterapia para o tratamento do câncer; Cirurgia para retirada dos
    ovários; Cirurgia para retirar o útero; Infecções como caxumba, tuberculose ou malária.'
  - 'Por isso, sua queda pode causar sintomas como ciclos menstruais irregulares, ondas de calor, insônia, alterações no humor,
    ressecamento vaginal e maior risco de osteoporose e doenças cardiovasculares. O envelhecimento natural não é o único fator
    que pode levar à menopausa. Algumas condições podem acelerar esse processo, como: Cirurgia para remoção dos ovários antes
    da menopausa, que pode aumentar o risco de doenças e acelerar o envelhecimento. Tabagismo, que pode antecipar a menopausa
    em até dois anos. Estas mulheres também podem apresentar piora dos sintomas da menopausa (ondas de calor, secura vaginal,
    etc). Terapia de reposição hormonal A terapia de reposição hormonal (TRH) deve ser indicada e acompanhada por um médico,
    levando em consideração fatores individuais como sintomas, histórico de saúde e possíveis contraindicações. Seu uso requer
    uma avaliação criteriosa para garantir benefícios sem comprometer a segurança da paciente.'
  - 'Menopausa: o que é, sintomas, causas e o que fazer Menopausa é o fim dos ciclos menstruais da mulher por pelo menos 12
    meses seguidos, pois os ovários deixam de produzir estrogênio, causando sintomas como ondas de calor, suor excessivo ou
    secura vaginal. Encontre um Ginecologista perto de você! Parceria com Buscar Médico A menopausa pode acontecer por volta
    dos 45 aos 56 anos de forma natural. No entanto, também pode ser induzida pelo uso de remédios para o tratamento de alguns
    tipos de câncer ou cirurgia para remover os ovários. O tratamento da menopausa é feito pelo ginecologista para ajudar
    a aliviar os sintomas, podendo ser indicada a terapia de reposição hormonal com medicamentos, mas também pode ser feito
    de forma natural com o uso de fitoterápicos. Sintomas da menopausa Os principais sintomas da menopausa são: Ondas de calor
    que surgem de repente; Suor excessivo; Palpitações cardíacas; Dor de cabeça ou enxaqueca; Secura vaginal, ardor, coceira
    ou irritação; Diminuição da libido;'
- source_sentence: Fiz cirurgia de vesícula está fazendo 30 dias hj, minha menstruação ainda não desceu, e normal?
  sentences:
  - Estes agravos, que não apresentam relação direta com a diminuição da função ovariana, podem, no entanto, provocar uma
    mudança na imagem que a mulher tem de si, levando-a à insegurança e ansiedade. Tais fatores, aliados a predisposições
    biológicas, problemas de ordem subjetiva e social, podem evoluir gradualmente para um processo de depressão. Os profissionais
    de saúde exercem importante função no atendimento dessas mulheres, sendo necessário que tenham esses aspectos em mente,
    qualifiquem sua escuta, acolham as queixas e estimulem a mulher a investir em si própria, no seu autocuidado e a valorizar-
    se. Devem contribuir para que cada mulher exerça o protagonismo de sua história de saúde e de vida. É importante assegurar
    que, apesar de algumas vezes apresentar dificuldades, o climatério é um período importante e inevitável na vida, devendo
    ser encarado como um processo natural, e não como doença.
  - 'Por isso, sua queda pode causar sintomas como ciclos menstruais irregulares, ondas de calor, insônia, alterações no humor,
    ressecamento vaginal e maior risco de osteoporose e doenças cardiovasculares. O envelhecimento natural não é o único fator
    que pode levar à menopausa. Algumas condições podem acelerar esse processo, como: Cirurgia para remoção dos ovários antes
    da menopausa, que pode aumentar o risco de doenças e acelerar o envelhecimento. Tabagismo, que pode antecipar a menopausa
