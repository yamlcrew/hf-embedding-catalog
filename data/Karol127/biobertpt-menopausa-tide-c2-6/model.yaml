    etc). Terapia de reposição hormonal A terapia de reposição hormonal (TRH) deve ser indicada e acompanhada por um médico,
    levando em consideração fatores individuais como sintomas, histórico de saúde e possíveis contraindicações. Seu uso requer
    uma avaliação criteriosa para garantir benefícios sem comprometer a segurança da paciente.'
  - Já os sintomas cognitivos e emocionais do climatério e menopausa podem incluir irritabilidade, ansiedade, depressão e
    transtornos de memória; outras consequências são as mudanças metabólicas que levam ao ganho de peso, com aumento de risco
    para doenças como o diabetes, a redução do colágeno, com o envelhecimento da pele, e o ressecamento das mucosas, que leva
    à secura vaginal; para completar, também pode haver a perda do desejo sexual. Terapia hormonal pode ser prescrita por
    médico generalista “Existem múltiplas abordagens disponíveis no SUS para tratar estes sintomas, como medicamentos fitoterápicos,
    práticas integrativas e complementares como acupuntura, auriculoterapia e yoga, acompanhamento nutricional e psicológico,
    realização de atividades físicas, entre outros”, exemplifica Ligia, acrescentando que a elas soma-se a terapia de reposição
    hormonal, que pode ser prescrita pelo clínico geral, médico da família ou ginecologista a partir do relato dos sintomas
    pela paciente e, muito i
- source_sentence: Tenho 30 anos e a mais ou menos 45 dias notei na parte superior da minha mama esquerda um inchaço duro,
    fiz uma ultrassonografia mas estava tudo normal, estou 8 dias arrasada, fiz um teste e deu negativo, devo tomar outra
    providência, ou fazer mamografia?
  sentences:
  - É importante salientar que com o avanço da idade, os riscos relacionados à morbiletalidade são maiores e as queixas menstruais
    como o aumento do volume do fluxo, algia pélvica, hipermenorréia e outras irregularidades, tendem a piorar com a esterilização
    cirúrgica. Deve ser indicação de exclusão, quando os benefícios realmente compensarem os riscos e não houverem outras
    opções. 8.5.2 Vasectomia Ao contrário da esterilização feminina, a vasectomia deve ser incentivada por tratar- se de um
    procedimento mais fácil e seguro, em relação à esterilização na mulher. É uma ótima forma de dividir a responsabilidade
    sexual e de procriação com o parceiro. Oferece também maior chance de reversibilidade, desde que seja precoce (até três
    anos após a cirurgia), embora somente deva ser realizada quando houver por parte do homem ou casal, plena convicção da
    necessidade e desejo de esterilização permanente.
  - os. Alguns fatores podem contribuir para a mulher entrar na perimenopausa como tabagismo, história familiar de menopausa
    precoce, quimioterapia para o tratamento do câncer ou cirurgia para remoção do útero. Os sintomas mais comuns da perimenopausa
    são menstruação irregular, ondas de calor, sensibilidade nas mamas, alterações no humor ou dificuldade para dormir, por
    exemplo. É importante ressaltar que, durante a perimenopausa, o desequilíbrio hormonal e a menstruação irregular, não
    impedem uma gravidez. Portanto, durante esta fase, mulheres que desejam evitar gravidez é necessário usar um método contraceptivo
    indicado pelo ginecologista. 3. Pós-menopausa A pós-menopausa é o período que ocorre após o diagnóstico da menopausa e
    dura o resto da vida da mulher. Nesta fase, os ovários já não produzem estrógeno e portanto não é possível engravidar.
    No entanto, é importante fazer acompanhamento com ginecologista para avaliar, diagnosticar e orientar a pós menopausa.
  - Em estudo de base populacional observou-se um au mento relevante da incidência dos distúrbios do sono já na perimenopausa10.
    A menopausa foi con siderada fator independente para estes distúrbios após correção dos fatores confundidores como ida
    de, renda ou presença de depressão. Neste estu do, no entanto, o diagnóstico foi baseado apenas em questionário, sem confirmação
    laboratorial10. A insônia é sintoma que pode ser definido como a dificuldade em iniciar e/ou manter o sono, presença de
    sono não reparador, ou seja, insufi ciente para uma boa qualidade de alerta e bem estar físico e mental durante o dia,
    com o conse qüente comprometimento do desempenho nas ati vidades diurnas11. Enquanto a ocorrência de insônia em mu lheres
    com mais de 30 anos8 varia de 26 a 45%, estudos epidemiológicos mostraram aumento da sua incidência após a menopausa para
    cifras en tre 28 e 63% 12.
- source_sentence: Há um ano e 7 meses que não menstruo, corro risco de engravidar?tenho 54 anos não sinto quase nada só um
    pouco de calorão e ressecamento na pele. obrigada
  sentences:
  - o do endométrio. Por isso, além de não existir um óvulo que possa ser fecundado, o endométrio também não iria crescer
    o suficiente para receber um embrião. Mesmo que este período possa ser de frustração para as tentantes, e conturbado para
    quem já passa pelo período de pós-menopausa, é possível passar por esta fase de forma mais tranquila.
  - 'O que fazer: ao apresentar sintomas deve-se consultar um ginecologista para verificar a presença de pólipos endometriais
    ou endocervicais. Além disso, é aconselhado acompanhamento regular com o médico e fazer o papanicolau pelo menos uma vez
    ao ano. O tratamento desses pólipos é feito com cirurgia para sua remoção. Saiba como tratar o pólipo uterino para prevenir
    câncer. 5. Prolapso uterino O prolapso uterino é mais comum nas mulheres que tiveram mais de um parto normal e provoca
    sintomas como descida do útero, incontinência urinária e dor durante o contato íntimo. Na menopausa, pode ocorrer maior
    fraqueza dos músculos pélvicos devido a diminuição da produção de estrógeno, causando o prolapso uterino. O que fazer:
    nesse caso, o ginecologista pode indicar o tratamento cirúrgico para reposicionamento do útero ou retirada do útero. 6.'
  - Alguns exemplos de lubrificantes vaginais são o KY gel e o Isdin Woman Hidratante Vaginal gel-creme. Já os cremes vaginais
    com hormônio devem ser receitados por um ginecologista, pois podem causar alguns efeitos colaterais e são contraindicados
    no caso de mulheres que já tiveram câncer de mama ou trombose, por exemplo. Nossa recomendação Consulte um Ginecologista
    para esclarecer todas as suas dúvidas.
