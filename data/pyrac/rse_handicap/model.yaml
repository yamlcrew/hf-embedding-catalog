widgetData:
- source_sentence: Les chemins extérieurs n'avaient pas de garde-corps pour sécuriser les déplacements.
  sentences:
  - Les mesures d'accessibilité pour les personnes handicapées sont bien respectées dans l'établissement
  - Cette chambre nous a vraiment déçus, rien n’était comme on l’espérait.
  - L'absence de barres d'appui rend cet hôtel moins pratique pour les personnes en situation de handicap
- source_sentence: Les rampes étaient inclinées de façon inconfortable, limitant leur accessibilité.
  sentences:
  - La chambre PMR n’était pas adaptée à notre confort, on en est ressortis frustrés.
  - Les ascenseurs de l'hôtel sont trop petits pour un fauteuil roulant ce qui complique les déplacements
  - La sécurité est assurée avec un gardien présent.
- source_sentence: L'absence d'indication en braille était regrettable.
  sentences:
  - Parking sécurisé avec gardien.
  - Il est difficile de trouver un restaurant accessible aux fauteuils roulants dans cette ville car beaucoup d'entre eux
    ont des escaliers
  - difficiles à parcourir en fauteuil roulant.
- source_sentence: Il n'y avait aucun plan en braille pour les visiteurs malvoyants.
  sentences:
  - Bon rapport qualité-prix pour le stationnement.
  - Aucune signalétique tactile n'était présente dans les espaces communs.
  - Le théâtre est mal conçu pour les fauteuils roulants et il est difficile de trouver des places adaptées
- source_sentence: L'absence de cheminement accessible a rendu la visite difficile pour ma famille.
  sentences:
  - Le lavabo était trop haut, ce qui le rendait inutilisable pour les personnes en fauteuil roulant.
  - Ce n’était pas du tout ce qu’on voulait, cette chambre a gâché notre séjour.
  - L'hôtel n'offre pas assez de chambres adaptées aux fauteuils roulants et il est difficile de réserver à la dernière minute
