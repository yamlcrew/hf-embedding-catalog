- source_sentence: How do Thomae's formula and the symmetric group representation relate to identities between theta constants
    in a cyclic 3-sheeted cover of the sphere?
  sentences:
  - We find identities between theta constants with rational characteristics evaluated at period matrix of a cyclic 3 sheeted
    cover of the sphere with branch points These identities follow from Thomae formula . This formula expresses powers of
    theta constants as polynomials in We apply the representation of the symmetric group to find relations between the polynomials
    and hence between the associated theta constants.
  - We study the unfolding of a single polymer chain due to an external force. We use a simplified model which allows to perform
    all calculations in closed form without assuming a Boltzmann-Gibbs form for the equilibrium distribution. Temperature
    is then defined by calculating the Legendre transform of the entropy under certain constraints. The application of the
    model is limited to flexible polymers. It exhibits a gradual transition from compact globule to rod. The boundary line
    between these two phases shows reentrant behavior. This behavior is explained by the presence of residual entropy.
  - We present the results of a deep optical-near-infrared multi-epoch survey covering 2.5 square degrees of the Pleiades
    open star cluster to search for new very-low-mass brown dwarf members. A significant (~ 5 year) epoch difference exists
    between the optical (CFH12k I-, Z-band) and near infrared (UKIRT WFCAM J-band) observations. We construct I,I-Z and Z,Z-J
    colour magnitude diagrams to select candidate cluster members. Proper motions are computed for all candidate members and
    compared to the background field objects to further refine the sample. We recover all known cluster members within the
    area of our survey. In addition, we have discovered 9 new candidate brown dwarf cluster members. The 7 faintest candidates
    have red Z-J colours and show blue near-infrared colours. These are consistent with being L and T-type Pleiads. Theoretical
    models predict their masses to be around 11 Jupiter masses. There is 1 errata for this paper
- source_sentence: Does a simple quantum model of ammonia explain the broadening and quenching of the ammonia inversion frequency
    with gas pressure?
  sentences:
  - This work is concerned with some properties of the Young-Fibonacci insertion algorithm and its relation with Fomin's growth
    diagrams. It also investigates a relation between the combinatorics of Young-Fibonacci tableaux and the study of Okada's
    algebra associated to the Young-Fibonacci lattice. The original algorithm was introduced by Roby and we redefine it in
    such a way that both the insertion and recording tableaux of any permutation are interpreted as chains in the Young-Fibonacci
    lattice. A property of Killpatrick's evacuation is given a simpler proof, but this evacuation is no longer needed in making
    Roby's and Fomin's constructions coincide. We provide the set of Young-Fibonacci tableaux of size with a structure of
    graded poset, induced by the weak order on permutations of the symmetric group, and realized by transitive closure of
    elementary transformations on tableaux. We show that this poset gives a combinatorial interpretation of the coefficients
    in the transition matrix from the analogue of complete symmetric functions to analogue of the Schur functions in Okada's
    algebra. We end with a quite similar observation for four posets on Young-tableaux studied by Taskin.
  - The mechanism of the shift, broadening and quenching of the ammonia inversion frequency with gas pressure has been a problem
    of lively interest for over seventy years. A simple quantum model of the ammonia molecule perturbed by collisions with
    ideal gas molecules displays the essential features of the experimental data for NH3 and for ND3. The model does not display
    the behaviour expected from theories of quantum localisation such as quantum state diffusion and decoherence. On the other
    hand, models of perturbed classical oscillators do display similar behaviour to our model. The quenching of the ammonia
    inversion transition cannot therefore be interpreted as spatial localisation of the wavefunction.
  - 'A theory of collective states in a magnetically quantized two-dimensional electron gas (2DEG) with half-filled Landau
    level (quantized Hall ferromagnet) in the presence of magnetic 3d impurities is developed. The spectrum of bound and delocalized
    spin-excitons as well as the renormalization of Zeeman splitting of the impurity 3d levels due to the indirect exchange
    interaction with the 2DEG are studied for the specific case of n-type GaAs doped with Mn where the Lande` g-factors of
    impurity and 2DEG have opposite signs. If the sign of the 2DEG g-factor is changed due to external influences, then impurity
    related transitions to new ground state phases, presenting various spin-flip and skyrmion-like textures, are possible.
    Conditions for existence of these phases are discussed. PACS: 73.43.Lp, 73.21.Fg, 72.15.Rn'
- source_sentence: What is the mass range of the three compact cores identified in the 1.3mm continuum emission from the S255N
    region?
  sentences:
  - The Arnowitt-Deser-Misner canonical formulation of general relativity is extended to the covariant brane-world theory
    in arbitrary dimensions. The exclusive probing of the extra dimensions makes a substantial difference, allowing for the
    construction of a non-constrained canonical theory. The quantum states of the brane-world geometry are defined by the
    Tomonaga-Schwinger equation, whose integrability conditions are determined by the classical perturbations of submanifolds
    contained in the Nash's differentiable embedding theorem. In principle, quantum brane-world theory can be tested by current
    experiments in astrophysics and by near future laboratory experiments at Tev energy. The implications to the black-hole
    information loss problem, to the accelerating cosmology, and to a quantum mathematical theory of four-sub manifolds are
    briefly commented.
  - S255N is a luminous far-infrared source that contains many indications of active star formation but lacks a prominent
    near-infrared stellar cluster. We present mid-infrared through radio observations aimed at exploring the evolutionary
    state of this region. Our observations include 1.3mm continuum and spectral line data from the Submillimeter Array, VLA
    3.6cm continuum and 1.3cm water maser data, and multicolor IRAC images from the Spitzer Space Telescope. The cometary
    morphology of the previously-known UCHII region G192.584-0.041 is clearly revealed in our sensitive, multi-configuration
    3.6cm images. The 1.3mm continuum emission has been resolved into three compact cores, all of which are dominated by dust
    emission and have radii < 7000AU. The mass estimates for these cores range from 6 to 35 Msun. The centroid of the brightest
    dust core (SMA1) is offset by 1.1'' (2800 AU) from the peak of the cometary UCHII region and exhibits the strongest HC3N,
    CN, and DCN line emission in the region. SMA1 also exhibits compact CH3OH, SiO, and H2CO emission and likely contains
    a young hot core. We find spatial and kinematic evidence that SMA1 may contain further multiplicity, with one of the components
    coincident with a newly-detected H2O maser. There are no mid-infrared point source counterparts to any of the dust cores,
    further suggesting an early evolutionary phase for these objects. The dominant mid-infrared emission is a diffuse, broadband
    component that traces the surface of the cometary UCHII region but is obscured by foreground material on its southern
    edge. An additional 4.5 micron linear feature emanating to the northeast of SMA1 is aligned with a cluster of methanol
    masers and likely traces a outflow from a protostar within SMA1. Our observations provide direct evidence that S255N is
    forming a cluster of intermediate to high-mass stars.
  - 'We present an exhaustive study of more than 250 ab initio potential energy surfaces (PESs) of the model dipeptide HCO-L-Ala-NH2.
    The model chemistries (MCs) used are constructed as homo- and heterolevels involving possibly different RHF and MP2 calculations
    for the geometry and the energy. The basis sets used belong to a sample of 39 selected representants from Pople''s split-valence
    families, ranging from the small 3-21G to the large 6-311++G(2df,2pd). The reference PES to which the rest are compared
    is the MP2/6-311++G(2df,2pd) homolevel, which, as far as we are aware, is the more accurate PES of a dipeptide in the
    literature. The aim of the study presented is twofold: On the one hand, the evaluation of the influence of polarization
    and diffuse functions in the basis set, distinguishing between those placed at 1st-row atoms and those placed at hydrogens,
    as well as the effect of different contraction and valence splitting schemes. On the other hand, the investigation of
    the heterolevel assumption, which is defined here to be that which states that heterolevel MCs are more efficient than
    homolevel MCs. The heterolevel approximation is very commonly used in the literature, but it is seldom checked. As far
    as we know, the only tests for peptides or related systems, have been performed using a small number of conformers, and
    this is the first time that this potentially very economical approximation is tested in full PESs. In order to achieve
    these goals, all data sets have been compared and analyzed in a way which captures the nearness concept in the space of
    MCs.'
- source_sentence: What is the redshift range of galaxies identified as DRGs at relatively bright magnitudes?
  sentences:
  - We investigate colour selection techniques for high redshift galaxies in the UKIDSS Ultra Deep Survey Early Data Release
    (UDS EDR). Combined with very deep Subaru optical photometry, the depth (K_AB = 22.5) and area (0.62 deg^2) of the UDS
    EDR allows us to investigate optical/near-IR selection using a large sample of over 30,000 objects. By using the B-z,
    z-K colour-colour diagram (the BzK technique) we identify over 7500 candidate galaxies at z > 1.4, which can be further
    separated into passive and starforming systems (pBzK and sBzK respectively). Our unique sample allows us to identify a
    new feature not previously seen in BzK diagrams, consistent with the passively evolving track of early type galaxies at
    z < 1.4. We also compare the BzK technique with the R-K colour selection of Extremely Red Objects (EROs) and the J-K selection
    of Distant Red Galaxies (DRGs), and quantify the overlap between these populations. We find that the majority of DRGs,
    at these relatively bright magnitudes are also EROs. Since previous studies have found that DRGs at these magnitudes have
    redshifts of z ~ 1 we determine that these DRG/ERO galaxies have SEDs consistent with being dusty star-forming galaxies
    or AGN at z < 2. Finally we observe a flattening in the number counts of pBzK galaxies, similar to other studies, which
    may indicate that we are sampling the luminosity function of passive z > 1 galaxies over a narrow redshift range.
  - We prove a Wegner estimate for a large class of multiparticle Anderson Hamiltonians on the lattice. These estimates will
    allow us to prove Anderson localization for such systems. A detailed proof of localization will be given in a subsequent
    paper.
  - This thesis investigates in the use of access log data as a source of information for identifying related scientific papers.
    This is done for arXiv.org, the authority for publication of e-prints in several fields of physics. Compared to citation
    information, access logs have the advantage of being immediately available, without manual or automatic extraction of
    the citation graph. Because of that, a main focus is on the question, how far user behavior can serve as a replacement
    for explicit meta-data, which potentially might be expensive or completely unavailable. Therefore, we compare access,
    content, and citation-based measures of relatedness on different recommendation tasks. As a final result, an online recommendation
    system has been built that can help scientists to find further relevant literature, without having to search for them
    actively.
- source_sentence: What were the upper limits on branching ratios for b' -> bZ and b' -> cW obtained from the DELPHI experiment
    at LEP-II?
  sentences:
  - A search for the pair production of fourth generation b'-quarks was performed using data taken by the DELPHI detector
    at LEP-II. The analysed data were collected at centre-of-mass energies ranging from 196 to 209 GeV, corresponding to an
    integrated luminosity of 420 pb^{-1}. No evidence for a signal was found. Upper limits on BR(b' -> bZ) and BR(b' -> cW)
    were obtained for b' masses ranging from 96 to 103 GeV/c^2. These limits, together with the theoretical branching ratios
    predicted by a sequential four generations model, were used to constrain the value of R_{CKM}=|V_{cb'}/V_{tb'}V_{tb}|,
    where V_{cb'}, V_{tb'} and V_{tb} are elements of the extended CKM matrix.
  - In this paper we complete a classification of finite linear spaces with line size at most 12 admitting a line-transitive
    point-imprimitive subgroup of automorphisms. The examples are the Desarguesian projective planes of orders and 11, two
    designs on 91 points with line size 6, and 467 designs on 729 points with line size 8.
  - We study the statefinder parameter in the five-dimensional big bounce model, and apply it to differentiate the attractor
    solutions of quintessence and phantom field. It is found that the evolving trajectories of these two attractor solutions
    in the statefinder parameters plane are quite different, and that are different from the statefinder trajectories of other
    dark energy models.
