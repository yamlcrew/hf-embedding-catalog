  - source_sentence: '- Hva slags resultater kan vi forvente av habilitering over tid?'
    sentences:
    - '# Habilitering


      Habilitering skal bidra til at du kan trene opp og vedlikeholde ferdigheter og evne til mestring. Målet er at du skal
      kunne leve et mest mulig selvstendig liv ut fra egne forutsetninger og ønsker.


      Habilitering er gratis.


      ## Hva er habilitering?


      Habilitering skal være et tverrfaglig og planlagt tilbud hvor du har medvirkning.


      Habilitering skal bidra til at du får økt mestringsevne og kan delta i samfunnet.


      [Se også hverdagshabilitering](/tjenester/helse/hjelp-i-hjemmet/hverdagsrehabilitering)


      ## Hvem kan få tjenesten?


      Du kan få et tilbud om habilitering hvis du har


      - redusert funksjonsnivå på grunn av sykdom eller skade som er medfødt eller ervervet

      - problemer med å utføre daglige aktiviteter, som for eksempel å kunne bo i egen bolig, delta i arbeidslivet eller mestre
      omsorgsansvar


      ## Kontakt helseforvaltning og koordinering


      - **Ring oss på** 69 30 60 00. Mandag - fredag fra 12:00 til 14:00

      - [Finn ansatte på helseforvaltning og koordinering](https://ansatt.fredrikstad.kommune.no/path/654d54fa342f514b84b80ddac935a9c5,5fae49f855cd44409666112458defdbe)

      - **Send oss e-post** [helseforvaltning@fredrikstad.kommune.no](mailto:helseforvaltning@fredrikstad.kommune.no)

      - **Adresse** Jens Wilhelmsens gate 1, 1671 Kråkerøy

      - **Postadresse** Postboks 1405, 1602 Fredrikstad


