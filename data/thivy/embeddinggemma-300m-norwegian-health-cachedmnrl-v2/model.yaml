- source_sentence: '- Hva skjer hvis skolen ikke tar tak i situasjonen til mitt barn?'
  sentences:
  - '#### **Eksempler på situasjoner hvor samarbeid kan være nødvendig**


    - Barn og unge i barnevernet har forhøyet risiko for å utvikle psykiske helseproblemer. Undersøkelser viser også at særlig
    ulykker og selvmord er overrepresentert i barnevernsgruppen. Barn som bor i barnevernsinstitusjon eller fosterhjem, har
    i mange tilfeller behov for kontakt med fastlege, skolehelsetjenesten, behandlere i psykisk helsevern og andre profesjonelle
    helsearbeidere. Familievernkontoret har samtaletilbud til barn og et særskilt ansvar for å gi et tilbud til foreldre som
    har barn i fosterhjem eller i barnevernsinstitusjon. For å sikre disse barna et helhetlig og samordnet tjenestetilbud
    er det i mange tilfeller nødvendig å samarbeid med andre tjenesteytere.

    - Noen barn og unge har omfattende og jevnlige behov for helse- og omsorgstjenester i skolehverdagen. Eksempler på slike
    behov kan være medisinering, sondeernæring, håndtering av medisinsk utstyr m.m. Noen elever kan for eksempel få astmatiske
    eller epileptiske anfall mens de er på skolen. Samarbeid mellom skolen og helse- og omsorgstjenestene er da nødvendig
    for at eleven skal få ivaretatt sine behov i skolehverdagen.

    - Noen elever har utfordringer som kan føre til utfordrende atferd på skolen. Skolen skal tilpasse opplæringen for at
    eleven skal få et tilfredsstillende utbytte av opplæringen. Dette kan handle om å se på hvordan man kan forebygge denne
    atferden hos eleven og tilpasse opplæringen ut fra dette. For å få den nødvendige faglige kompetansen som trengs, må skolen
    i mange tilfeller samarbeide med helse- og omsorgstjenesten, PP-tjenesten og andre velferdstjenester. Hvis eleven er på
    avlastning, kan det være nødvendig at skolen og avlastningsboligen samarbeider.

    - I noen tilfeller mottar familien tjenester fra flere tjenesteytere. Noen av tjenestene er til barna, mens andre er til
    foreldrene. Det kan handle om at barnet har psykiske utfordringer, lavt utbytte av opplæringen og at det er store konflikter
    i familien. Barnet får innvilget spesialundervisning, skolen jobber med å tilrettelegge for et alternativt skoleløp og
    barnet har fått time i BUP. På grunn av det høye konfliktnivået hjemme mottar familien hjelpetiltak fra barnevernstjenesten
    i form av foreldreveiledning. Mor deltar på et arbeidsrettet kurs i regi av NAV. Mor sliter med å følge opp avtaler med
    skole, barnevernstjenesten og BUP i tillegg til selv å være til stede på kurset. Hun har fått beskjed fra sin veileder
    i NAV om at dersom hun ikke møter til avtalt kurs, vil hun miste tiltakspengene og risikere å miste plassen på kurset.
    I slike tilfeller er det nødvendig å samordne tjenester og oppfølging til foreldrene slik at barnet eller ungdommen skal
    få et godt tjenestetilbud fra hver av tjenesteyterne.


    I noen tilfeller er det ikke nødvendig at tjenester fra flere tjenesteytere ses i sammenheng. For eksempel går de fleste
    barn i barnehage samtidig som de får oppfølging av helsestasjonen og tannhelsetjenesten. Vanligvis vil ikke dette i seg
    selv utløse plikt til samarbeid mellom disse velferdstjenestene. Velferdstjenestene har likevel alltid lov til å samarbeide
    hvis familien samtykker. Barn, unge og foreldrenes behov og ønsker bør tillegges stor vekt, og terskelen for å samarbeide
    med andre tjenesteytere bør være lav. Det å samarbeide vil kunne ha positive effekter for det enkelte barn, for tjenesteyterne
    og samfunnet.


    ### Steg 3: Opprette kontakt med aktuell tjeneste


    Dersom en velferdstjeneste vurderer at samarbeid er nødvendig for å gi et helhetlig og samordnet tilbud, må velferdstjenesten
    ta det opp med rette tjeneste. Slik kontakt forutsetter [samtykke, eller unntak fra taushetsplikt](https://www.helsedirektoratet.no/veiledere/samarbeid-om-tjenester-til-barn-unge-og-deres-familier/veiledningsplikt-oppmerksomhetsplikt-og-taushetsplikt/7.3-taushetsplikt-samtykke-og-anonyme-droftinger)
    .'
  - "Ved avslutning av forlengelsene vil barnet vanligvis gjennomgå en større operasjon hvor man erstatter den vekststaven\
    \ med endelige metallstaver. Ved denne operasjonen setter man vanligvis inn flere forankringspunkter i ryggen, for å kunne\
    \ korrigere skjevheten i ryggen ytterligere.\n\n### Tradisjonelle eller ribbebaserte vekststaver som alternativ\n\nFor\
    \ enkelte barn vil en tradisjonell vekststav eller ribbebasert vekststav være et bedre alternativ enn magnetiske vekststaver.\n\
    \n### Tradisjonelle vekststaver\n\nTradisjonelle vekststaver vil være det beste alternativet for enkelte barn. Vekststaven\
    \ opereres inn, ved første operasjon, på samme måte som magnetisk kontrollert vekststav, og festes til ryggen med forankringspunkter\
    \ øverst og nederst i ryggen på samme måte.\n\nForskjellen på disse behandlingsalternativene er at tradisjonelle vekststaver\
    \ forlenges ved et mindre kirurgisk inngrep, ca. to ganger i året. Dette krever at barnet er i narkose under inngrepet.\
    \ Vekststavene forlenges slik at man kan kontrollere skoliosen og samtidig sikre videre vekst av ryggen. Pasienten er\
    \ vanligvis innlagt 1-2 dager i forbindelse med forlengelsen.\n\nDe tradisjonelle vekststavene må skiftes ut etter en\
    \ viss forlengelse. Ved avslutning av forlengelsen vil barnet vanligvis gjennomgå et større inngrep, på lik linje som\
    \ ved magnetisk kontrollert vekststav.\n\n### Ribbebasert vekststav\n\nVed store forandringer av brystkassen, vil det\
    \ hos noen pasienter være aktuelt å benytte ribbebasert vekststaver. De ribbebaserte vekststavene festes rundt en eller\
    \ flere ribbein øverst i ryggen, og forankringspunkter i form av skruer eller kroker nederst i ryggen. Det kan også være\
    \ aktuelt å benytte en ribbebasert vekststav som er festet til ribbein både øverst og nederst for å øke volumet til brystkassen.\
    \ De ribbebaserte vekststavene forlenges ved et mindre inngrep, som ved tradisjonelle vekststaver.\n\n### Hva skjer etter\
    \ operasjonen?\n\nRett etter operasjonen blir barnet liggende et par timer på oppvåkningen til det er våken og smerter\
    \ er under kontroll før barnet blir hentet til \"intermediær\" på sengeposten. Intermediær er en overvåkningsstue med\
    \ flere sengeplasser.\n\nPå intermediær vil det alltid være en eller to sykepleiere tilstede hele døgnet, og barnet vil\
    \ være på denne stuen så lenge det er behov for det. Mens barnet ligger på intermediær vil dere få tildelt rom på foreldreovernatting.\
    \ Vanligvis blir barnet liggende 1 natt på intermediær før det kommer tilbake på sengerom i løpet av dagen og blir her\
    \ frem til dere reiser hjem.\n\n### Liggetid på sykehuset og medisiner\n\nDere vil bli liggende på sykehus i 2 til 4 dager.\
    \ Dere får daglig legevisitt i ukedagene, på helg får dere legevisitt ved behov. Det vil bli tatt blodprøver om det er\
    \ behov for det. Etter operasjonen kan det være at barnet har behov for smertelindring. Smertelindring gis som tabletter,\
    \ mikstur, stikkpiller eventuelt intravenøst ved behov.\n\n### Aktivitet/trening på sykehuset\n\nBarnet kan komme opp\
    \ og sitte på sengekanten og/eller stå allerede fra ettermiddagen på operasjonsdagen sammen med sykepleier fra sengeposten.\
    \ Fysioterapeuten vil komme til barnet etter frokost dagen etter operasjonen. Barnet vil trene sammen med fysioterapeutene\
    \ minst 2 ganger på dagtid, og med sykepleier på kveldstid.\n\n### Skole og barnehage\n\nNoen barn blir på sykehuset i\
    \ så lang tid at det går ut ut over skolegangen. Da er det viktig å sjekke ut tilbudet på sykehuset der du er, om det\
    \ finnes sykehusskole eller en pedagog som kan følge opp barnet.\n\nSpør oss på sykehuset hvordan et pedagogisk tilbud\
    \ kan tas i vare på best måte, i samarbeid med skole eller barnehage på hjemstedet til barnet. [Ved Oslo universitetssykehus\
    \ er det skoletilbud for barn flere steder, også på Rikshospitalet](/om-oss/barn-pa-sykehus/nar-du-er-pa-sykehuset/sykehusskolen)\
    \ .\n\n## Etter\n\n## Etter Vis mer\n\n### Aktivitetsnivå hjemme\n\nFor de fleste barn vil det ikke være behov for å begrense\
    \ fysisk aktivitet etter operasjon med vekststenger, men aktivitetsnivået bør tilpasses de første 3 til 6 månedene.\n\n\
    ### Strekking - forlengelse av ryggen\n\nDere kommer tilbake for å starte strekking hver 12. uke, som beskrevet over -\
    \ altså hver 3. eller. 4 måned, etter avtale.\n\n### \n\n### Fysioterapi hjemme etter operasjonen\n\nFysioterapeuten vil\
    \ komme inn til barn første dagen etter operasjonen. Målet er da å trygge barn og pårørende på mobilisering og forflytning.\
    \ Her er tips til program og øvelser anbefalt på hjemstedet:\n\n[Skoliose hos barn - fysioterapi etter operasjon (under\
    \ 10 år)](/behandlinger/skoliose-hos-barn-fysioterapi-etter-operasjon)\n\n## Vær oppmerksom\n\nRisiko for komplikasjoner\
    \ ved operasjonen hvor vekststavene settes inn er svært avhengig av barnets tilstand.\n\nDet vil alltid være en viss risiko\
    \ for infeksjon, skade av ryggmarg/nerver samt problemer relatert til vekststaven eller forankringspunktene. Det vil,\
    \ avhengig av barnets tilstand, også kunne være risiko for andre betydelige komplikasjoner, som den enkelte pasient med\
    \ foresatte informeres om.\n\n## Kontakt\n\n## Rikshospitalet Seksjon for ryggdeformiteter - Rikshospitalet\n\n### Rikshospitalet\n\
    \nSognsvannsveien 20\n\n0372 Oslo\n\n[Finn frem](/steder/rikshospitalet)"
  - '# Hva gjør du når en elev ikke har det trygt og godt på skolen?


    Hvis dere mistenker eller kjenner til at en elev ikke har det trygt og godt, skal dere snarest undersøke saken. Vi har
    laget råd om hva dere kan gjøre.


    Artikkel Sist endret: 13.01.2025


    - [Last siden som PDF](/api/PdfApi/PrintPageAsPdfDocument/223486)

    - Skriv ut


    Det er for mange elever som opplever at de ikke har det trygt og godt på skolen. Dette kan ha svært alvorlige konsekvenser
    både for enkeltmennesker og for samfunnet. Alle elever har rett til et trygt og godt skolemiljø. For å sikre dette har
    skolen en aktivitetsplikt.


    Denne skal sikre at skolen handler raskt og riktig når en elev ikke har det bra på skolen.


    Alle som arbeider i skolen skal følge med på hvordan elevene har det, og ha en god forståelse og praktisering av regelverket.
    Elever skal oppleve å være en del av et trygt og godt miljø der de blir sett og anerkjent.


    Det er ofte sammensatte og ulike årsaker til at elever ikke har det trygt og godt. Det kan handle om mobbing, men det
    kan også være en opplevelse av utenforskap eller mistrivsel.


    Alle situasjoner der en elev opplever å ikke ha et trygt og godt skolemiljø er ulike. Alle situasjoner krever at dere
    tar det på alvor.


    Lytt til eleven og vis at du anerkjenner opplevelsen. Vis forståelse for elevens følelser og at du tåler å høre det som
    blir fortalt. Ikke bagatelliser det som eleven forteller. Det er viktig at dere spør eleven om hvilke ansatte hen har
    en god relasjon og tillit til. Det er ikke alltid at eleven har best relasjon til kontaktlæreren.


    ## 1. Snakk med eleven straks du er bekymret


    - Tenk over hvor du gjennomfører samtalen. Dere kan for eksempel gå en tur eller sitte i et grupperom.

    - Tilpass lengde på samtalen etter elevens alder og modenhet.

    - Tenk på hvordan du snakker ut ifra elevens alder og modenhet.

    - Forklar hvorfor dere snakker sammen.

    - Vær åpen om hva du gjør videre og når dere skal snakkes igjen, og at eleven kan komme til deg når som helst.

    - Husk å hele tiden vurdere hva som er til [elevens beste i samtalen](/laring-og-trivsel/skolemiljo/arbeid-med-aktivitetsplikten/vurdere-kva-som-er-best-for-eleven)
    .

    - Vurder om det er behov for å sette inn noen strakstiltak. Eksempler på dette kan være å bytte plass i klasserommet,
    møte eleven på morgenen, at ansatte har en tettere oppfølging i overganger gjennom skoledagen og i utrygge områder.


    ## 2. Involver hjemmet og inviter til en samtale raskt


    Hvis det er foreldrene som kontakter dere, er det viktig at dere er lyttende og spørrende.


    Hvis det er dere som kontakter foreldrene, må de få god informasjon om situasjonen.


    Vær åpen, bidra til å skape trygghet og tenk på hvordan du kommuniserer. Dere er den profesjonelle parten og må være forberedt
    på at det kan oppstå sterke følelser. Hvis eleven er over 18 år, så husk å spørre eleven om foreldrene skal kobles på.


    Eleven må alltid inviteres inn i samtalen om hen ønsker det. Tilpass samtalen slik at eleven kan være delaktig tilpasset
    sin alder og modenhet.


    Det er viktig at dere er oppmerksomme på, og jobber med, hvilke emosjonelle, fysiske, språklige og kulturelle barrierer
    som kan stå i veien for et godt samarbeid.


    - Fortell hvorfor dere har invitert til samtale; om det har vært enkelte hendelser, om eleven har gitt uttrykk for å ikke
    ha det bra eller om det er noe dere eller foreldrene har kjennskap til eller mistanke om.

    - La foreldrene komme til orde og fortelle uten å bli avbrutt.

    - Informer om hva dere har gjort så langt og hva dere tenker å gjøre videre.

    - La foreldrene komme med innspill på veien videre.

    - Avtal neste møtepunkt.

    - Send ut referat etter møtet.


    Dere må raskt trygge eleven og foreldrene på at dere vil gjøre noe med situasjonen. Når det har gått en uke, kan eleven
    og foreldrene melde saken til statsforvalteren, hvis de mener at skolen ikke har gjort nok for å bedre situasjonen.


    ## 3. Begynn på en tiltaksplan


    Når det skal lages tiltak i en sak, skal det også utarbeides en skriftlig plan. Erfaring viser at å [opprette tiltaksplan](/regelverk-og-tilsyn/skole-og-opplaring/nye-maler-for-opplaringsloven)
    tidlig kan bidra til felles forståelse for utfordringen, åpenhet om prosessen og fremdrift i saken. Statsforvalterne melder
    fra om at mange brudd i saker de får til seg, handler om at tiltaksplanen opprettes for sent.


    Bli enig med elev og foreldre om hva som er utfordringen, legg til rette for at alle stemmer blir hørt og alle perspektiver
    er ivaretatt.


    Strakstiltak og undersøkelser, både gjennomførte og planlagte, skal synliggjøres i planen. I tillegg er tiltaksplanen
    viktig dokumentasjon i saken.


    ## 4. Undersøk saken raskt og på flere måter


    Å undersøke saken på flere måter kan bidra til at dere ser saken fra flere personers ståsted og ikke låser dere til deres
    egen oppfatning av saken. Sørg for å innhente informasjon fra flere kilder og sjekk det opp mot hverandre. Ved å kombinere
    flere perspektiver kan skolen avdekke svakheter ved undersøkelsene og få en mer nyansert forståelse av situasjonen.


    Eksempler på undersøkelser kan være:


    - samtaler med eleven, andre elever, lærere og ansatte

    - observasjoner, både systematisk og usystematiske

    - kartlegging av relasjoner og sosiale dynamikker i miljøet


    Mye tyder på at det ikke finnes én spesifikk rekkefølge ting bør gjøres i, men at det er en kontinuerlig og sirkulær prosess.


    ## 5. Analyser informasjonen sammen


    Dere må dele, analysere og sammenstille alle undersøkelsene og annen informasjon samlet. Vurder om dere har nok informasjon
    eller om dere må gjøre flere undersøkelser. Målet er å få en bred forståelse av situasjonen. Informasjonen dere har, og
    hvordan dere tolker den, gir dere forhåpentligvis en forståelse av hva som gjør at eleven ikke har det trygt og godt på
    skolen.


    Her er det viktig at dere er bevisst på deres egne holdninger, hva dere tenker om saken på forhånd og at dere er åpne
    for at ny informasjon kan bidra til å opplyse saken. Se på hvilke faktorer som bidrar til å opprettholde situasjonen.


    ## 6. Sett i gang tiltak basert på informasjonen dere har


    Bruk undersøkelsene og analysen av disse til å sette inn egnede tiltak. Tiltakene må være begrunnet i informasjonen dere
    har.


    Tenk igjennom hvor dere kan sette inn tiltak som skaper en endring for eleven. Dere må vurdere hva som er til elevens
    beste når dere velger tiltak og snakke med eleven og foreldre om hvorfor akkurat de tiltakene er valgt.'
- source_sentence: '- Hva dekker Helfo når det gjelder kursopphold?'
  sentences:
  - '# Kursopphald på Montebellosenteret for kreftpasientar og pårørande


    Dersom du er kreftpasient eller pårørande til ein kreftpasient, kan Helfo dekkje utgifter til opphald ved Montebellosenteret
    i Ringsaker i Innlandet.


    ## Kva er Montebellosenteret?


    Montebellosenteret er ein helseinstitusjon som leverer spesialiserte tenester for kreftpasientar, pårørande og andre som
    står pasienten nær.


    Les meir


    Les meir om dei ulike tilboda på [nettstaden til Montebellosenteret](https://www.montebellosenteret.no/vare-kurs/) .


    ## Kva kursopphald dekker Helfo?


    Helfo dekker både kursopphald for pasientar, familie og nære pårørande.


    Les meir


    Helfo dekker kursopphald


    - for deg som har kreft eller seinskadar etter kreft, pårørande og andre som står deg som pasient nær. Vilkåret for at
    din pårørande skal få dekka kursopphaldet er at hen har behov for opplæringa.


    Helfo dekker familiekurs for familiar som har


    - barn med kreftsjukdom. Helfo kan gi bidrag til opphald for to føresette og alle søsken under 18 år.

    - kreftsjuke foreldre. Helfo kan gi bidrag til opphald for den kreftsjuke, éin nær pårørande og alle barn under 18 år.

    - mor eller far som er døde av kreft. Helfo kan gi bidrag til alle barn under 18 år samt attlevande forelder/føresett.


    ## Kva utgifter til opphaldet dekker Helfo?


    Det er Montebellosenteret som behandlar søknaden din om kursopphald og gir deg et kurstilbod.


    Les meir


    Helfo betaler opphaldskostnadene direkte til Montebellosenteret.


    Eigenbetalinga for kursopphald er


    - 188 kroner per opphaldsdøgn for deg som pasient.

    - 127 kroner per opphaldsdøgn for pårørande eller ein person som står deg nær


    Barn under 15 år skal ikkje betale.


    Du eller dine pårørande betaler eigenbetalinga direkte til Montebellosenteret. Eigenbetalinga tel ikkje med i oppteninga
    til frikort for helsetenester.


    Har du dårlig råd, kan du søke [NAV om støtte til kursopphald](https://www.nav.no/sosialhjelp) (etter sosialtjenesteloven).


    ## Du kan få dekka delar av reiseutgiftene til Montebellosenteret


    Helfo dekkjer òg reiseutgiftene til og frå Montebellosenteret.


    Les meir


    Du må sende inn søknad om å få dekt reiseutgifter seinast 30. juni året etter opphaldet.


    Dersom du veit kva dokumentasjon du skal sende inn til Helfo kan du gå direkte til søknad om refusjon:


    [Logg inn på Helfos digitale skjema og søk om å få refusjon](https://tjenester.helsenorge.no/okonomi)


    **Papirskjema**


    Dersom du ikkje kan bruke digitalt skjema, kan du i staden fylle ut


    - [Reiseutgifter - bidrag (05-22.08) Bokmål](https://www.helfo.no/skjema/Reiseutgifter-bidrag-05-22.08-bokm%C3%A5l.pdf?download=false)

    - [Reiseutgifter - bidrag (05-22.08) Nynorsk](https://www.helfo.no/skjema/Reiseutgifter-bidrag-05-22.08-nynorsk.pdf?download=false)


    og sende det inn saman med dokumentasjonen og kvitteringar til Helfo, Postboks 2415, 3104 Tønsberg.


    Dersom du treng meir informasjon om kva utgifter som kan dekkast i samband med reisa, og kva dokumentasjon du må legge
    ved søknaden, må du gå til sida [«Reiseutgifter til ridefysioterapi, elektrolyse og enkelte kursopphald»](https://www.helsenorge.no/nn/refusjon-og-stotteordninger/bidragsreiser/)
    .


    ## [Rehabilitering med og etter kreftsykdom](https://www.helsenorge.no/nn/sykdom/kreft/rehabilitering/)


    Rehabilitering skal gi deg muligheten til å komme tilbake til hverdagen så raskt som mulig og hjelp til å håndtere endringer
    som følger av sykdommen og behandlingen.


    ## Korleis søkjer du om opphald ved Montebellosenteret?


    Du søkjer om opphald direkte til Montebellosenteret.


    Les meir


    Når du søkjer om opphald på Montebellosenteret, må du bruke eit [digitalt søknadsskjema som du finn på nettstaden til
    Montebellosenteret](https://www.montebellosenteret.no/hvem-kan-soke/) . Søknadsfristen er seinast fem veker før kurset
    startar.


    Hugs å sende ei legeerklæring om at kursopphald er nødvendig for pasienten, pårørande eller annan person som står pasienten
    nær. Du må sende erklæringa i posten til Montebellosenteret på følgande adresse:


    Montebellosenteret Kurstedvegen 5 2610 Mesnali


    Du vil få svar på din søknad direkte frå Montebellosenteret omlag fem veker før kurset startar.


    Innhaldet er levert av [Helfo](/nn/samarbeidspartnere/#helfo)


    Slik refererer du til innhaldet Helfo. Kursopphald på Montebellosenteret for kreftpasientar og pårørande. [Internett].
    Oslo: Helsedirektoratet; oppdatert tirsdag 31. januar 2023 [henta tirsdag 9. desember 2025]. Tilgjengeleg frå: [https://www.helsenorge.no/nn/refusjon-og-stotteordninger/kursopphold-og-rehabilitering/Kursopphald-paa-Montebellosenteret-for-kreftpasientar-og-paarorande/](https://www.helsenorge.no/nn/refusjon-og-stotteordninger/kursopphold-og-rehabilitering/Kursopphald-paa-Montebellosenteret-for-kreftpasientar-og-paarorande/)


    Sist oppdatert tirsdag 31. januar 2023'
  - '# Ridefysioterapi


    Helfo gir bidrag til ridefysioterapi (terapiriding hos fysioterapeut) når visse vilkår er oppfylte.


    Dette gjeld personar med medfødd eller erverva sjukdom/funksjonshemming som gir rørsle-, balanse- og/eller koordineringsvanskar,
    eller personar med ei fysisk eller psykisk funksjonshemming som gjer at vanlege aktivitetar ikkje gir ein rimeleg grad
    av fysisk utfolding.


    ## Vilkår for å få bidrag til dekning av utgifter til ridefysioterapi


    Det er ikkje lenger eit krav om tilvising frå lege, manuellterapeut eller kiropraktor for å få bidrag til ridefysioterapi.


    Bidraget utgjer fra 1. juli 2025 399 kroner per behandling. Helfo gjev bidrag til maksimalt 30 behandlingar per kalenderår.
    Individuell undersøking ved oppstart av inngår i dei 30 behandlingane.


    Du kan måtte betale ekstra for leige av hest og stall. Dette får du ikkje dekt av Helfo.


    Ridefysioterapeuten må ha avtale om direkteoppgjer med Helfo. Med direkteoppgjer blir bidraget utbetalt direkte til ridefysioterapeuten,
    slik at du ikkje treng å søke Helfo om refusjon.


    ## Du kan få dekka bidrag til reiseutgifter


    Helfo kan gi bidrag til reiseutgifter til og frå ridefysioterapeuten. Du må sende inn søknad om å få dekt reiseutgifter
    seinast 30. juni året etter at behandlinga blei gjennomført.


    Du finn søknadsskjema og meir informasjon om kva utgifter som kan dekkast i samband med reisa på sida [«Reiseutgifter
    til ridefysioterapi, elektrolyse og nokre rekreasjonsopphald»](/nn/refusjon-og-stotteordninger/bidragsreiser) .


    ## Fullmakt ved kontakt med Helfo


    Kontaktar du Helfo på vegne av andre, må du ha fullmakt.


    Les meir om korleis du kan ordne [fullmakt ved kontakt med Helfo](/nn/fullmakt/bruke-helsenorge-pa-vegne-av-andre/fullmakt-ved-kontakt-med-helfo)
    .


    Innhaldet er levert av [Helfo](/nn/samarbeidspartnere/#helfo)


    Slik refererer du til innhaldet Helfo. Ridefysioterapi. [Internett]. Oslo: Helsedirektoratet; oppdatert tysdag 1. juli
    2025 [henta onsdag 28. januar 2026]. Tilgjengeleg frå: [https://www.helsenorge.no/nn/refusjon-og-stotteordninger/terapiridning/](https://www.helsenorge.no/nn/refusjon-og-stotteordninger/terapiridning/)


    Sist oppdatert tysdag 1. juli 2025'
  - '# Søsken


    *Å vokse opp med søsken med utviklingshemming eller andre funksjonsnedsettelser gir for mange en annerledes oppvekst.
    Familier takler det å få et barn med funksjonsnedsettelse forskjellig. For noen kan livet med et barn som trenger ekstra
    oppfølging og oppmerksomhet knytte de øvrige familiemedlemmene tettere sammen. For andre frembringer det følelser av sorg
    og maktesløshet i en omsorgssituasjon som for mange er uventet og krevende. Mange har en oppvekst der man opplever at
    ens bror eller søster har behov for en større del av foreldrenes tid og oppmerksomhet. Både gjennom foreldrenes omsorg
    for barnet og i deres relasjon til hjelpeapparatet, som for mange er en kontinuerlig og tidkrevende relasjon.*


    På området [Søsken](https://naku.no/kunnskapsbanken?t=280#) i kunnskapsbanken finner du artikler som tar opp ulike sider
    ved å være søsken til personer med utviklingshemming og andre funksjonsnedsettelser. Området har en bred inngang til temaet
    og vektlegger søskenrelasjoner både i barneårene, gjennom oppveksten og i voksenalder.


    Det er gjort lite forskning på søskenfeltet. Forskningen som finnes tyder på at oppveksten og livsløpet hos søsken stor
    sett forløper som hos befolkningen ellers, med marginale forskjeller med positivt fortegn ( [Tøssebro m.fl. 2012](https://naku.no/kunnskapsbanken/s%C3%B8sken-forskning#main-content)
    ). Mange opplever at oppveksten med et søsken med utviklingshemming ikke har preget dem i negativ retning i særlig grad.
    Samtidig har mange allikevel erfaringer, læring og opplevelser som er uvanlig og annerledes. Flere opplever å måtte ta
    større ansvar og vise mer hensyn på hjemmebane enn sine jevnaldrende for å avhjelpe foreldrene i en krevende hverdag (Kittelsaa
    m. fl. 2011). Mange har også belastende erfaringer i oppveksten som andre ikke har. Opplevelser og erfaringer som det
    er viktig at foreldre og hjelpeapparatet er oppmerksomme på. Samtidig viser forskning at erfaringene også kan gi positive
    utslag seinere i livsløpet i form av tidlig modenhet, sterk egenkontroll og ansvarsfølelse. Blant annet gjør søsken til
    personer med funksjonsnedsettelser det bedre på skolen enn gjennomsnittet av befolkningen.


    Det er mange faktorer som spiller inn på hvordan søsken mestrer tilværelsen med en bror eller søster med utviklingshemming.
    Faktorer som på forskjellige måter påvirker og former den enkeltes personlighet. En spesielt viktig faktor i søskens mestring
    er hvordan foreldrene mestrer situasjonen. Mange foreldre bekymrer seg for om de klarer å gi søsken nok tid og oppmerksomhet,
    og kan oppleve å ha dårlig samvittighet fordi mesteparten av tiden går med til følge opp barnet med utviklingshemming.
    Samtidig viser forskning at de fleste foreldre klarer å balansere dette fint (Tøssebro m.fl. 2012). Søsken selv er positive
    og opplever å ha et tettere forhold til sine foreldre enn jevnaldrende. Mange utviser også sterk solidaritet med sine
    foreldre og søskenet med utviklingshemming. De aller fleste familier med barn med utviklingshemming vil i løpet av barnets
    oppvekst ha behov for hjelp og støtte fra hjelpeapparatet. Hvor mye hjelp familiene trenger knytter seg til funksjonsnedsettelsens
    art og alvorlighetsgrad, og hvilken belastning foreldre opplever at omsorgsarbeidet innebærer for dem (Tøssebro &amp;
    Wendelborg 2014). Hjelpeapparatets tiltak er ofte rettet mot foreldrene gjennom ulike pårørendestøttende tjenester, men
    tjenestene har også et ansvar for å tilby søsken oppfølging hvis det er behov for det. Kommunene er lovpålagt å tilby
    pårørendestøttende tjenester til pårørende med « *særlig tyngende omsorgsarbeid* » (Helse- og omsorgstjenesteloven § 3-6).
    Dette kan bidra til at foreldrene får frigjort tid til å samle krefter, tilbringe tid sammen med og følge opp søsken.


    Referanser


    Kittelsaa, A.M., Magnus, E. &amp; Berg, B. (2011). *Barn og unge med nedsatt funksjonsevne og deres familier. Utfordringer
    og behov i ulike livsfaser* , NTNU Samfunnsforskning


    Tøssebro, J., Kermit, P., Wendelborg, C. &amp; Kittelsaa, A. 2012, *Som alle andre? Søsken til barn og unge med funksjonsnedsettelser.*
    NTNU Samfunnsforskning AS


    Tøssebro, J. &amp; Wendelborg, C. 2014, *Oppvekst med funksjonshemming - Familie, livsløp og overganger* , Gyldendal Akademisk
    AS, Oslo


    Helse- og omsorgstjenesteloven (2011), Lov om kommunale helse- og omsorgstjenester (LOV-2011-06-24-30) Hentet fra: [https://lovdata.no/dokument/NL/lov/2011-06-24-30](https://lovdata.no/dokument/NL/lov/2011-06-24-30)'
- source_sentence: '- Finnes det støttegrupper for foreldre med barn med helseutfordringer?'
  sentences:
  - '# Enkle talemaskiner


    Gir mulighet for korte uttrykk og beskjeder som kan gi støtte i lek og samspill.


    ## [Hvem kan få?](#hvem)


    Hjelpemiddelet kan være aktuelt for deg som


    - har språk- og kommunikasjonsvansker

    - har kognitive vansker som påvirker evnen til å forstå og produsere tale

    - trenger ekstra støtte for rekkefølge og struktur.


    Generelle vilkår:


    - Funksjonsvanskene må være varige. '
  - '# Pårørendesenteret i Fredrikstad


    De fleste opplever å være pårørende i løpet av livet, og noen ganger kan det være nyttig med informasjon og noen å prate
    med om pårørenderollen. Hos oss på pårørendesenteret har vi tid til å lytte, og kan veilede og støtte deg i den situasjonen
    du står i.


    ## Hva kan vi tilby?


    En pårørende er en slektning, venn eller annen relasjon som føler omsorg eller ansvar for noen som er fysisk eller psykisk
    syk, har en funksjonsnedsettelse, sliter med avhengighet eller er innsatt i fengsel. Det å leve som pårørende eller etterlatt,
    påvirker en både fysisk, psykisk, sosialt og i arbeidslivet. Vi er et kompetansesenter som kan tilby informasjon og undervisning
    om pårørendesamarbeid. Tjenesten er gratis.


    - Samtaler med veileder- få råd og veiledning som kan hjelpe deg å mestre din livssituasjon

    - Hos oss kan du få kunnskap om dine rettigheter og muligheter som pårørende.

    - På pårørendesenteret kan vi hjelpe deg med å komme i kontakt med andre som går gjennom noe av det samme igjennom ulike
    gruppetilbud eller mestringskurs. Vi samarbeider med ulike organisasjoner om dette.

    - Informasjon og undervisning.

    - Selvhjelpsgruppe for pårørende innen psykisk helse.


    [Følg oss på Facebook](https://www.facebook.com/parorendesenteretifredrikstad/)


    Ta kontakt med oss på telefon eller e-post.


    ## Nyttige lenker


    - [Nasjonalt pårørendesenter](http://www.parorendesenteret.no/)

    - [Unge pårørende - nettside laget for og med barn som er pårørende](https://ungeparorende.no/)

    - [Pårørendealliansen](https://parorendealliansen.no/)

    - [Pårørendeprogrammet, informasjon og undervisning](http://parorendeprogrammet.no/)

    - [Landsforeningen for Pårørende innen Psykisk helse](http://lpp.no/)

    - [Ivareta - pårørende berørt av rus](http://www.ivareta.no/)

    - [Treffpunkt - møteplass for barn og unge - Kreftforeningen](https://kreftforeningen.no/tilbud/treffpunkt-moteplass-for-barn-og-unge/)

    - [Ung Kreft](https://ungkreft.no/)

    - [CarciNor](https://www.carcinor.no/)

    - [Prostatakreftforeningen](https://prostatakreft.no/)

    - [Lillebrors minne](https://www.lillebrorsminne.no/)

    - [Epilepsiforbundet](https://www.epilepsi.no/)

    - [Autismeforeningen](https://autismeforeningen.no/)

    - [Nar-Anon](https://naranonnorge.wordpress.com/about/)

    - [Handikappede barns foreldreforening](https://www.hbf.no/)

    - [LEVE](https://leve.no/)

    - [Spillavhengighet Norge](https://www.spillavhengighet.no/)

    - [Sorg og omsorg Østfold](https://sorgogomsorg.org/)


    Lenker til lover som er viktige for pårørende [Helse og omsorgstjenesteloven](https://lovdata.no/dokument/NL/lov/2011-06-24-30/KAPITTEL_1#%C2%A71-1)
    [Spesialisthelsetjenesteloven](https://lovdata.no/dokument/NL/lov/1999-07-02-61) [Pasient- og brukerrettighetsloven](https://lovdata.no/dokument/NL/lov/1999-07-02-63)
    [Vergemålsloven](https://lovdata.no/dokument/NL/lov/2010-03-26-9) [Forvaltningsloven](https://lovdata.no/dokument/NL/lov/1967-02-10/)


    Tips og råd til deg som pårørende **Prøv å få oversikt over situasjon** Å lage seg en oversikt over situasjonen du står
    i, vil føre til at du opplever i større grad kontroll. Det handler om å få oversikt over hva du kan bidra med og hva du
    ikke kan bidra med. Søk etter kunnskap og informasjon. Ikke vær redd for å spørre helsepersonell om det du måtte lure
    på. Ingen spørsmål er dumme. **Lag rutiner** Rutiner skaper forutsigbarhet og gjør det lettere å gjennomføre nødvendige
    gjøremål. Skap deg rutiner for: måltider, søvn, fysiske aktivitet, husarbeid, egentid, sosiale aktiviteter. Tenk over
    hva som vil gjøre deg godt og tillat deg selv å gjøre det. For det kan gjøre det godt for deg på både kortsikt og langsikt.
    Belastning over tid kan ha konsekvenser for din helse. Lytt til kroppen. Ta signaler fra kroppen på alvor. Sett mål for
    uken, ta små skritt. **Sett av tid tid egenomsorg og egne aktiviteter** Det er viktig med positive innspill og aktiviteter
    i hverdagen. For det er utmattende å være sterk over tid. Oppretthold kontakten med nettverket ditt, og ha fokus på det
    du får til og ikke på det du ikke rekker. **Snakk med din arbeidsgiver** Slik at dere sammen kan se på hva slags muligheter
    du har der du jobber eller går på skole. Dette kan være med på å lette din hverdag. **Ha regelmessig kontakt med din fastlege**
    Slik at du kan forebygge at du selv utvikler helseplager. Takk ja til hjelp, også når du tror du ikke trenger det. Ta
    i mot støtte fra både profesjonelle og fra ditt eget nettverk. **Snakk med andre som er i samme situasjon som deg** Å
    dele erfaring og kunnskap kan gi en opplevelse av felleskap, mening og styrke. Mange beskriver det som en trygghet.


    ## Treffpunkt Fredrikstad


    Tilbud til barn og unge mellom 6 og 18 år som har alvorlig sykdom i familien, eller som har opplevd at noen som står dem
    nær er død. Treffpunkt Fredrikstad finner sted en kveld i måneden og varer normalt i to timer. Samlingen blir ledet av
    voksne med erfaring fra arbeid med barn og unge. De har taushetsplikt og har levert politiattest.


    På Treffpunktet er det lek spill og aktiviteter der barna treffer likesinnede.


    ## Kontakt pårørendesenteret


