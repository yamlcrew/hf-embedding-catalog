  - '# Lærings- og mestringstilbud


    Som bruker, pasient eller pårørende har du krav på oppfølging utover medisinsk behandling. Lærings- og mestringstilbud
    er kurs og aktiviteter for deg som har helseutfordringer eller er pårørende til noen som har det.  Hensikten er at du
    skal få bedre innsikt i egen situasjon og bli styrket i å mestre livet med helseutfordringer.


    ## Hva er lærings- og mestringstilbud?


    Lærings- og mestringstilbud er kurs og aktiviteter for deg som har helseutfordringer eller er pårørende til noen som har
    det. Hovedmålet med lærings- og mestringstilbudene er å fremme helse og livskvalitet. Kursene og aktivitetene kan variere
    i form og innhold, være individuelle eller gruppebaserte, og bygge på et tverrfaglig samarbeid.


    Brukermedvirkning står sentralt i lærings- og mestringstilbud. Personer som selv har hatt eller lever med helseutfordringer
    samarbeider med fagpersoner for å utforme tilbudene. Dette bidrar til å sikre at tilbudene dekker deltakernes behov.


    Et godt liv og en god helse handler om mer enn fravær av sykdom. Det handler om å håndtere hverdagen, også ved sykdom,
    skade og nedsatt funksjonsevne. Det er dine behov som avgjør hvilket tilbud som passer best. Lærings- og mestringstilbud
    skal inngå i helhetlige forløp for deg som bruker, pasient eller pårørende.


    [Les mer om hva læring og mestring i helse- og omsorgstjenesten er på mestring.no.](https://mestring.no/)


    ## Tilbud på sykehus og i kommuner


    Som bruker, pasient eller pårørende har du krav på tilstrekkelig informasjon og oppfølging. For å finne aktuelle lærings-
    og mestringstilbud, kan du kontakte lærings- og mestringssenteret ved ditt nærmeste sykehus eller helsetjenesten i din
    kommune. Ofte trenger du en legehenvisning for å kunne delta på et kurs. Fastlege eller behandlende lege på sykehuset
    hjelper deg med dette.


    Lærings- og mestringsvirksomhet finnes både på sykehus og i kommuner, samt i frivillig og privat sektor. Flere sykehus
    og kommuner samarbeider om lærings- og mestringstilbud.


    ### Oversikt over lærings- og mestringstilbud (mestring.no)


    - [Oversikt over lærings- og mestringstilbud i helseforetakene](https://mestring.no/laerings-og-mestringsaktivitet/organisering/oversikt-helseforetakene/)

    - [Oversikt over kommunale lærings- og mestringstilbud](https://mestring.no/laerings-og-mestringsaktivitet/organisering/oversikt-kommunene/)


    ## E-læring


    E-læring, eller nettkurs som det også kalles, kan være en fin måte å lære mer om egen diagnose. Her er noen eksempler
    på tilgjengelige nettkurs:


    - [kols](/sykdom/lunger-og-luftveier/kols)

    - [lavt stoffskifte](/sykdom/hormoner/lavt-stoffskifte-hypothyreose)

    - [høyt stoffskifte](/sykdom/hormoner/hoyt-stoffskifte)


    ## Nyttig å dele erfaringer


    Det kan være krevende å leve med utfordringer og bekymringer som ofte følger med sykdom eller skade. Det aller meste i
    livet blir påvirket, også for de som står rundt. Når du rammes av sykdom, er det vanlig å bli usikker. Mye er nytt og
    ukjent. Det som før var en selvfølge, må kanskje sees på i et nytt lys. Lærings- og mestringstilbud skal være til støtte
    i slike situasjoner.


    Å delta på lærings- og mestringstilbud kan ha stor betydning for hvordan livet med helseutfordringer oppleves. Når du
    får økt kunnskap og innsikt i egen situasjon, kan det bidra til at du opplever din egen hverdag som tryggere og enklere
    å håndtere.


    En rekke lærings- og mestringstilbud foregår i grupper. Mange synes det er nyttig å treffe andre som er i samme situasjon,
    for å bli forstått og snakke med dem som har vært gjennom lignende utfordringer. Det kan gi en opplevelse av støtte, fellesskap
    og håp for fremtiden. Informasjon, undervisning, veiledning og erfaringsutveksling utgjør en stor del av tilbudet.


    Forskning viser at å delta på slike tilbud bidrar til færre og kortere innleggelser på sykehus og færre fraværsdager/sykedager.


    ## [Frisklivssentral](https://www.helsenorge.no/hjelpetilbud-i-kommunene/frisklivssentral/)


    Vil du få hjelp til å få et bedre kosthold, bli mer fysisk aktiv eller slutte med snus og røyk, kan frisklivssentralen
    være noe for deg.


    ## Oversikt over kommuner med frisklivssentral


    - [Oversikt over kommuner med frisklivssental (helsedirektoratet.no)](https://www.helsedirektoratet.no/tema/frisklivssentraler/oversikt-over-kommuner-med-frisklivssentral)


    Referanser


    Ambrosio L, Senosiain García JM, Riverol Fernández M, Anaut Bravo S, Díaz De Cerio Ayesa S, Ursúa Sesma ME, et al. Living
    with chronic illness in adults: a concept analysis [Internett]. J Clin Nurs. 2015;24(17-18):2357-67 [hentet 2020-11-20].
    Tilgjengelig fra: [https://pubmed.ncbi.nlm.nih.gov/25951949](https://pubmed.ncbi.nlm.nih.gov/25951949)


    Hva er effekten av frisklivstiltak? [https://sykepleien.no/forskning/2022/12/hva-er-effekten-av-frisklivstiltak](https://sykepleien.no/forskning/2022/12/hva-er-effekten-av-frisklivstiltak)


    Helsekompetanse og styrket mestring hos barn som pårørende. [https://fontene.no/forskning/helsekompetanse-og-styrket-mestring-hos-barn-og-unge-som-parorende-6.584.882040.0fdd17b087](https://fontene.no/forskning/helsekompetanse-og-styrket-mestring-hos-barn-og-unge-som-parorende-6.584.882040.0fdd17b087)


    Lærings- og mestringstilbud til voksne pårørende - en oppsummering av forskningslitteratur. [https://mestring.no/wp-content/uploads/2022/06/Rapport-voksne-pa%CC%8Arorende-200622.pdf](https://mestring.no/wp-content/uploads/2022/06/Rapport-voksne-pa%CC%8Arorende-200622.pdf)


    Primary healthcare professionals'' experience with patient participation in healthcare service development: A qualitative
    study. [https://www.sciencedirect.com/science/article/pii/S277262822200053X?via%3Dihub](https://www.sciencedirect.com/science/article/pii/S277262822200053X?via%3Dihub)


    Stenberg U, Haaland-Øverby M, Fredriksen K, Westermann KF, Kvisvik T. A scoping review of the literature on benefits and
    challenges of participating in patient education programs aimed at promoting self-management for people living with chronic
    illness [Internett]. Patient Educ Couns.'
  - '# Omsorgsstønad


    Hvis du har særlig tyngende omsorgsarbeid og utfører oppgaver som ellers måtte vært utført av kommunen, kan du få omsorgsstønad.
    Omsorgsstønad skal gjøre det mulig for private omsorgspersoner å opprettholde omsorgsarbeidet for sine nærmeste.


    ## Hva er omsorgsstønad?


    Omsorgsstønad er en økonomisk kompensasjon du kan få av kommunen hvis de vurderer at du har veldig tyngende omsorgsarbeid,
    og gjør oppgaver som ellers måtte vært utført av kommunen. Ordningen gjelder både omsorgsytere uten omsorgsplikt, og foreldre
    som har omsorgsplikt for sine mindreårige barn.


    ## Hvem kan få omsorgsstønad?


    Ingen har en lovfestet rett til omsorgsstønad, men ordningen finnes i alle kommuner. For å få tildelt omsorgsstønad må
    kommunen ha vurdert dette som den mest hensiktsmessige måten å yte tjenester på. Det er opp til kommunen du bor i å vurdere
    behovet, og den vurderingen skal de gjøre sammen med deg, og omsorgsmottaker.


    ## Hvordan søke om omsorgsstønad


    Hvis du har behov for omsorgsstønad, må du sende en søknad til kommunen du bor i. Både omsorgsgiver og omsorgsmottaker
    kan søke. Du finner informasjon om hvordan du søker på kommunens hjemmeside, eller ved å henvende deg til kommunen.


    Kommunen bør hente inn opplysninger om hvordan pasienten eller brukeren selv ønsker at tjenestetilbudet skal være. Er
    omsorgsmottakeren et barn skal kommunen vurdere barnets beste og legge til rette for at barnet blir hørt.


    Når kommunen har vurdert søknaden får du et vedtak på om du får innvilget omsorgsstønad eller ikke. Dette skal de gjøre
    i samarbeid med omsorgsyter og omsorgsmottaker. Hvis du får avslag på søknaden, skal du få en begrunnelse for avslaget.


    ## Klage


    Hvis du får avslag på omsorgsstønad kan du klage på vedtaket. Klagen sender du til kommunen du bor i. Når de mottar klagen
    må de vurdere saken på nytt.


    Dersom kommunen ikke endrer beslutningen sin, sender kommunen saken videre til statsforvalteren i ditt fylke.


    ### Trenger du hjelp til å klage?


    Du kan selv ta kontakt med [pasient- og brukerombudet](/rettigheter/pasient--og-brukarombodet) hvis du trenger hjelp med
    å utforme en klage. Det finnes pasient- og brukerombud i alle fylker.


    ## Pasient- og brukerombudet


    [Pasient- og brukerombudet](https://www.helsenorge.no/rettigheter/pasient--og-brukarombodet/) hjelper deg med spørsmål
    om helsetjenester, og gir råd og veiledning om rettighetene dine.


    [Se hva Pasient- og brukerombudet kan hjelpe deg med (pasientogbrukerombudet.no)](https://www.pasientogbrukerombudet.no/hvordan-kan-vi-hjelpe)


    ## Lover og forskrifter


    - [Pasient- og brukerrettighetsloven § 2-8 (lovdata.no)](https://lovdata.no/dokument/NL/lov/1999-07-02-63/KAPITTEL_2#KAPITTEL_2)

    - [Helse- og omsorgstjenesteloven § 3-6 (lovdata.no)](https://lovdata.no/dokument/NL/lov/2011-06-24-30/KAPITTEL_3#KAPITTEL_3)


    Innholdet er levert av [Helsedirektoratet](/samarbeidspartnere/#helsedirektoratet)


    Slik refererer du til innholdet Helsedirektoratet. Omsorgsstønad. [Internett]. Oslo: Helsedirektoratet; oppdatert mandag
    18. mars 2024 [hentet torsdag 22. januar 2026]. Tilgjengelig fra: [https://www.helsenorge.no/hjelpetilbud-i-kommunene/omsorgsstonad/](https://www.helsenorge.no/hjelpetilbud-i-kommunene/omsorgsstonad/)


    Sist oppdatert mandag 18. mars 2024'
