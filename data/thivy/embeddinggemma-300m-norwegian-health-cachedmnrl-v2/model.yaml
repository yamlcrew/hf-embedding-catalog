    - '# Behandling hos logoped eller audiopedagog


      Barn i grunnskulen og vaksne med særskilt behov for opplæring kan ha rett til logoped- eller audiopedagogtenester frå
      kommunen som eit spesialpedagogisk tilbod etter opplæringslova. Fylkeskommunen pliktar å tilby slik hjelp til ungdom
      i vidaregåande skule.


      ## Kv a slags stønad gir Helfo til logoped- og audiopedag -behandling ?


      Helfo kan gi stønad til undersøking og behandling hos privatpraktiserande logoped og audiopedagog etter folketrygdlova,
      dersom det offentlege ikkje yter stønad etter anna lov.


      ## Kven kan få stønad til logoped- og audiopedagogtenester frå Helfo?


      Du som har behov for behandling hos logoped eller audiopedagog som ein del av behandling eller etterbehandling av sjukdom,
      skade eller lyte, kan få stønad til undersøking og behandling hos logoped og audiopedagog frå Helfo.


      Helfo kan gi stønad til undersøking og behandling hos privatpraktiserande logoped eller audiopedagog etter folketrygdlova
      § 5-10 dersom det offentlege ikkje gir stønad etter opplæringslova, helse- og omsorgstenestelova eller spesialisthelsetenestelova.


      Dette er vilkåra:


      - Du må få tilvising (henvisning) frå lege før oppstart av behandling. Legen skal oppgje diagnose på tilvisinga.

      - Det er logopeden eller audiopedagogen sitt ansvar å vurdere om du fyller vilkåra for stønad.

      - Du treng ikkje lenger å sende søknad til Helfo før oppstart av behandling.


      ## Kva betalar du hos logoped/audiopedagog?


      Du skal ikkje betale for undersøking eller behandling viss logopeden eller audiopedagogen din har avtale om direkte
      oppgjer med Helfo. Det er difor viktig at du sjekkar om behandlaren har ei slik avtale før du startar behandling.


      Stønaden vert då betalt til logopeden eller audiopedagogen.


      Innhaldet er levert av [Helfo](/nn/samarbeidspartnere/#helfo)


      Slik refererer du til innhaldet Helfo. Behandling hos logoped eller audiopedagog. [Internett]. Oslo: Helsedirektoratet;
      oppdatert onsdag 22. desember 2021 [henta onsdag 28. januar 2026]. Tilgjengeleg frå: [https://www.helsenorge.no/nn/behandlere/behandling-hos-logoped-eller-audiopedagog/](https://www.helsenorge.no/nn/behandlere/behandling-hos-logoped-eller-audiopedagog/)


      Sist oppdatert onsdag 22. desember 2021'
    - '# Samisk i barnehagen


      Rammeplanen har tydelige krav til hvordan barnehager skal ivareta samisk kultur og tradisjon. Alle barnehager skal synliggjøre
      samisk kultur og bidra til at barn kan utvikle respekt og fellesskapsfølelse for det samiske mangfoldet.


      Artikkel Sist endret: 30.01.2025


      - [Last siden som PDF](/api/PdfApi/PrintPageAsPdfDocument/224209)

      - Skriv ut


      Rammeplanen har tydelige krav til hvordan barnehager skal ivareta samisk kultur og tradisjon. Samene er et urfolk, og
      Norge har en særlig forpliktelse til å ivareta samiske barns og foreldres interesser. På denne siden har vi samlet støtte-
      og veiledningsressurser for deg som jobber med samisk innhold og oppgaver i barnehagen.  Det gjelder


      - [samiske barnehager og barnehager med samiske avdelinger](/laring-og-trivsel/samisk-i-barnehagen/samiske-barnehager-og-barnehager-med-samisk-avdeling)

      - [andre barnehager med samiske barn](/laring-og-trivsel/samisk-i-barnehagen/andre-barnehager-med-samisk-innhold)

      - [alle barnehager](/laring-og-trivsel/samisk-i-barnehagen/alle-barnehager)


      For å kunne synliggjøre samisk kultur og bidra til respekt og fellesskapsfølelse for det samiske mangfoldet, er det
      viktig å kjenne til hva et urfolk er og kunne noe om samisk kultur og hverdagsliv.


      [Her kan du bestille trykket rammeplan](/laring-og-trivsel/rammeplan-for-barnehagen) (gratis) til din barnehage. Her
      finner du rammeplanen på [nordsamisk](/contentassets/76a88be7ac834449b52781cb3c4b4e3a/manaidgarddi-rammaplana--rammeplan-nordsamisk-pdf.pdf)
      , [sørsamisk](/contentassets/76a88be7ac834449b52781cb3c4b4e3a/maanagierten-mieriesoejkesje--rammeplan-sorsamisk-pdf.pdf)
      og [lulesamisk](/contentassets/76a88be7ac834449b52781cb3c4b4e3a/rammapladna-manajgarddaj--rammeplan-lulesamisk-pdf.pdf)
      .


      [Om samene i Norge](/laring-og-trivsel/samisk-i-barnehagen/om-samene-i-norge) [Samiske språk i barnehagen](/laring-og-trivsel/samisk-i-barnehagen/samiske-sprak-i-barnehagen)
      [Samisk levesett og hverdagsliv i barnehagen](/laring-og-trivsel/samisk-i-barnehagen/samisk-levesett-og-hverdagsliv-i-barnehagen)
      [Praksisfortellinger](/laring-og-trivsel/samisk-i-barnehagen/praksisfortellinger) [Samiske mattradisjoner](/laring-og-trivsel/samisk-i-barnehagen/samiske-mattradisjoner)
      [Samisk kunst og kultur i barnehagen](/laring-og-trivsel/samisk-i-barnehagen/samisk-kunst-og-kultur-i-barnehagen)


      ## Udir ressurser


      - [Sametingets tilskuddsordninger for barnehage](https://sametinget.no/stipend-og-tilskudd/oversikt-over-tilskuddsordninger/barnehage/)

      - [Videreutdanning for barnehagelærere: Samisk språk, kultur og tradisjoner i alle barnehager](~/link/7d939193a25649039e30f0c0aeb70388.aspx)

