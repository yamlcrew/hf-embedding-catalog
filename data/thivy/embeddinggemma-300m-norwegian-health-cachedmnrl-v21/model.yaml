    - '# Autisme


      Autisme er en utviklingsforstyrrelse som innebærer vansker ved sosialt samspill, kommunikasjon og gjentakende atferd
      og begrensede interesseområder. Rundt én prosent av befolkningen har autisme. Det er flere gutter enn jenter som får
      diagnosen.


      ## Hva er autisme?


      Det er stor variasjon i symptomer og funksjonsevner blant de som har autisme. Derfor er det ofte mer riktig å kalle
      autisme for autismespekterforstyrrelser (ASF) eller autismespekterdiagnoser. Det kalles et spekter fordi det er stor
      variasjon innenfor disse områdene. Hver person har sine unike styrker og utfordringer.


      Autisme gir risiko for å utvikle en rekke ulike vansker. Derfor er det viktig å få hjelp med opplæring og tilrettelegging
      så tidlig som mulig. Snakk med fastlegen din om du eller barnet ditt viser tegn på autisme som går ut over evnen til
      å fungere i dagliglivet. Legen kan ikke sette diagnose, men henvise videre.


      ## Symptomer på autisme


      Autisme regnes som en medfødt tilstand. Hos noen barn får foreldrene en opplevelse at det er noe som er annerledes helt
      fra småbarnsalder. Hos andre merkes symptomene senere i barne- eller ungdomsalder når kravene til kommunikasjon og sosial
      samhandling er større enn det barnet mestrer. Autisme påvirker evnen til å fungere i dagliglivet, og for de fleste varer
      tilstanden hele livet.


      Tidlige tegn (18 - 24 måneders alder) på autisme kan være at barnet:


      - Ikke reagerer på navnet sitt eller når du roper på han eller henne, selv om barnet ser ut til å høre lyder

      - Ikke møter blikket ditt, ikke smiler til deg eller legger merke til at du forlater eller kommer inn i rommet

      - Foretrekker å leke alene og kan leke med gjenstander på en uvanlig og kanskje repeterende måte

      - Kan ha raserianfall oftere enn andre

      - Har en forsinket språkutvikling, eller stopper opp og eventuelt går tilbake i språkutviklingen

      - Er mer sensitiv på endringer rundt seg enn andre barn


      Hos de som først får en autismediagnose i skolealder kan tegnene være at barnet strever med å:


      - få venner

      - forstå sosiale koder og ikke alltid vet hvordan hen skal reagere på det andre mennesker sier eller gjør

      - starte en samtale og lytte til og svare på det andre sier

      - være fleksibel i atferd og tenkemåte, som å mislike forandringer, like å vite på forhånd hva som skal skje, opptatt
      av regler, intense interesser


      ### Språk og kommunikasjon


      Personer med autisme har vansker med både verbal og ikke-verbal kommunikasjon. Noen tilegner seg aldri talespråk eller
      har et begrenset språk. Mens andre igjen vil utvikle et rikt språk og hvor den sosiale bruken av språket er utfordringen.
      De kan for eksempel forstå uttrykk mer bokstavelig enn det som er vanlig. Med en konkret språkforståelse kan det oppstå
      forvirring og misforståelser når vi spør om du ønsker «kaffe på senga», eller sier at vi må «hoppe over middagen».


      Ikke-verbal kommunikasjon innebærer blant annet bruk av blikk kontakt, ansiktsuttrykk og gester. For de fleste vil både
      forståelse og bruk av ikke-verbal kommunikasjon være vanskelig. Eksempel på dette er at personer med autisme i mindre
      grad ser i retning av andres øyne. Mye informasjon formidles via blikket, og vansker med å få med seg og tolke denne
      informasjonen vil derfor kunne føre til misforståelser.


      ### Sosialt samspill


      Sosialt samspill omhandler at vi «gir og tar» og at vi forstår andres følelser og intensjoner. For mange med autisme
      er det vanskelig å forstå andres følelser og intensjoner og å kunne uttrykke egne følelser. Det kan for eksempel føre
      til at de holder lange monologer om ting de er interessert i uten å merke at den andre ikke deler interessen. Mange
      med autisme føler seg overveldet av sosiale situasjoner, og det kan koste mye krefter å delta i disse.


      ### Gjentakende adferd og begrensede interesseområder


      Personer med autisme kan holde på med de samme bevegelsene eller handlingene om og om igjen. Det kan være slik som å
      snurre på gjenstander, å åpne og lukke skapdører og å se på vaskemaskintrommelen som går rundt og rundt. Dette er mest
      vanlig hos personer med autisme og utviklingshemming.


      Andre kan ha en altoppslukende interesse for et tema eller en aktivitet, som for eksempel dinosaurer, biler, dataspill,
      manga/japansk kultur, dyr, eller bestemte filmer og tv-serier. Å holde på med disse aktivitetene gir personene ofte
      glede og fører til at de utvikler meget gode ferdigheter innenfor temaet. Samtidig kan denne intensiteten være til hinder
      for at de får andre opplevelser og for å lære nødvendige ferdigheter.


      ### Autisme og dobbeltdiagnoser


      Mange personer med autisme har også andre tilstander, slik som


      - depresjon

      - angst

      - tvang

      - ADHD

      - utviklingshemming.


      Det er også vanlig med fordøyelsesvansker og søvnforstyrrelser.


      Innen voksenpsykiatrien er det eksempler på at pasienter henvises for utredning av personlighetsforstyrrelser, angst
      eller depresjon, men så oppdager behandlerne at en underliggende årsak er autisme som ikke er avdekket tidligere.


      ### Sansning


      Mange personer med autisme har utfordringer knyttet til sanseopplevelser. Dette kan være sterkere reaksjoner på sanseinntrykk
      som syn, lyder, lukt og berøring enn vanlig, kalt hypersensitivitet. Når vi er sammen med personer som er hypersensitive
      må vi vise forståelse og tilrettelegge både det fysiske miljøet og samhandlingen.


      Hverdagen er krevende hvis du opplever bestemte lyder som smertefulle. Dette er særlig vanskelig med lyder du ikke kan
      kontrollere. Slik som i et klasserom hvor stoler skrapes mot gulvet, snakking, dører som smeller, støy fra ventilasjonsanlegg
      og så videre. . For noen er det en løsning med støydempende hodetelefoner eller tilpasset hørselvern.


      Personer med autisme kan også være hyposensitive, som betyr at de reagerer mindre på visse sanseinntrykk.


      ## Se hva jeg ser - om barnets sosiale utvikling (brosjyre)


      - [Denne brosjyren beskriver nærmere hvilke sosiale ferdigheter som det forventes at barnet har på ulike tidspunkt i
      løpet av de tre første leveårene (fhi.no)](https://www.fhi.no/publ/eldre/se-hva-jeg-ser---om-barnets-sosiale/)


      ## Årsaker til autisme


      Det forskes mye for å finne årsaker, og det er påvist at gener spiller en viktig rolle i utviklingen av autisme. Det
      er i dag begrenset kunnskap om miljøfaktorer som bidrar til autisme. Høyere alder hos foreldre, enkelte medisiner og
      infeksjoner som påvirker fosteret under svangerskapet, kan ha betydning.


      Det er flere som får en diagnose innen autismespekteret nå enn tidligere.'
    - '# Epilepsi


      Epilepsi er ein av dei mest vanlege sjukdomane i nervesystemet. Epilepsi er ikkje éin sjukdom, men ei paraplynemning
      på ei rekkje kroniske tilstandar med ulike årsaker og prognose. Fellesnemnaren er tilbakevendande epileptiske anfall.


      ## Symptom på epilepsi


      Epileptiske anfall er hovudsymptomet ved epilepsi. Anfalla er uttrykk for ei forbigåande forstyrring av hjernen sin
      normale funksjon. Dei normale elektriske signala mellom hjernecellene blir plutseleg forstyrra av unormale elektriske
      utladingar.


      Forstyrringane skjer i eit nettverk av nerveceller i hjernen som er blitt epileptisk aktivt. Slike forstyrringar kan
      ofte, men ikkje alltid, registrerast med elektroencefalografi (EEG).


      Det finst mange typar epileptiske anfall. Å finne ut kva slags anfall ein person har, kan vere avgjerande for riktig
      val av behandling.


      ## [Anfallstyper ved epilepsi](https://www.helsenorge.no/nn/sykdom/epilepsi/anfallstyper-ved-epilepsi/)


      Epileptiske anfall deler vi inn i tre hovudgrupper; generaliserte anfall, fokale anfall og uklassifiserbare anfall.
      Inndelinga er basert på korleis anfalla artar seg og funn ved EEG-undersøkingar.


      ## Behov for akutt helsehjelp


      ### Anfallshandtering


      Om du ser eit anfall, og du er usikker på kva du er vitne til, bør du alltid ringje nødsentralen 113. Det same gjeld
      om det er første gong personen får eit epileptisk anfall. Om personen har ein kjend epilepsi, kan du følgje denne førstehjelpsinstruksen:


      1. Ta tida.

      2. Ring 113 om du er i tvil om korleis du skal handtere anfallet.

      3. Pass på at personen ikkje skadar seg sjølv under anfallet.

      4. Sjå til at personen har frie luftvegar.

      5. Bli hos personen til medvitet er tilbake.

      6. Ved anfall som varar over 4-5 minutt, tilkall ambulanse og/eller gje anfallsstoppande akuttmedisin.


      Epileptiske anfall kan gje direkte skadar som følgje av medvitstap, fall og/eller rykkingar, for eksempel ved eit generalisert
      tonisk-klonisk anfall (GTK-anfall). Slike skadar kan vere kutt, sår, brot eller hovudskade. Det finst hjelpemiddel for
      å avgrense slike skadar, som hjelmar eller luer som kan brukast hos dei med høg skaderisiko. Fallalarm kan brukast for
      å varsle pårørande om det har skjedd ei ulykke.


      Eit epileptisk anfall varar sjeldan lenger enn 2 minutt. Enkelte gongar kan personar med epilepsi få gjentekne eller
      eit anfall som varar lenger. Dette blir kalla status epilepticus, og er ein alvorleg tilstand. Når anfallsaktiviteten
      varar lenger enn 4-5 minutt, skal det behandlast med anfallsstoppande medisinar.


      Det finst to typar anfallsstoppande medisin som den som har epilepsi, kan ha med seg.


      1. Den eine (midazolam) sett ein ved hjelp av ei sprøyte i munnen mellom kinn og tannkjøt.

      2. Den andre typen (diazepam) sett ein inn i endetarmen.


      Det er viktig at pårørande og omsorgspersonar er instruerte i korleis ein taklar slike anfall. Om slike medisinar ikkje
      er tilgjengelege, og anfallet ikkje går over i løpet av 4-5 minutt, må du ringje 113.


      ## Årsaker til epilepsi


      Det er mange årsaker til epilepsi. Alle sjukdomar, skadar eller misdanningar som påverkar hjerneborken, gjev auka risiko
      for epilepsiutvikling:


      - Medfødde misdanningar i hjernen

      - Fødselsskadar

      - Genetiske avvik

      - Stoffskifteforstyrringar

      - Svulstar eller infeksjonar i hjernen

      - Hovudskade

      - Hjerneslag


      #### Er epilepsi arveleg?


      I nokre familiar er det ei auka sårbarheit for å utvikle epilepsi. Arveoverføringa for epilepsi er likevel samla sett
      låg. Om éin av foreldra har epilepsi, er den gjennomsnittlege risikoen for å få epilepsi hos barnet ca. seks prosent.


      Genetiske tilhøve spelar ei større rolle ved nokre epilepsiformer enn andre. Det er tilfellet ved genetisk generaliserte
      epilepsiar som absensepilepsi hos barn og juvenil myoklon epilepsi hos ungdom.


      Dei fleste former for epilepsi viser likevel ikkje nokon klar arvegang og er resultat av eit komplekst samspel mellom
      gen og ytre påverknader. Nokre få av epilepsiane (1-2 prosent) kjem av forandringar i eitt enkelt gen som kan forklare
      heile sjukdomsbiletet. Dette kallar vi monogene epilepsiar.


      Desse epilepsiane kan ein arve frå foreldra, eller genforandringa kan vere nyoppstått hos pasienten. Dette dreiar seg
      mellom anna om epilepsiar forbundne med ulike sjukdomar, for eksempel tuberøs sklerose og Dravet syndrom.


      ## Utgreiing og diagnose


      Når det er mistanke om epilepsi, vil utgreiinga starte med samtale og undersøking hos nevrolog eller barnelege. Ei grundig
      utspørjing av pasient og pårørande er aller viktigast. Videoopptak av anfalla kan vere nyttig.


      Om det er mistanke om epilepsi, skal pasienten tilvisast til EEG, og i dei fleste tilfella også ei [MR-undersøking.](/nn/undersokelse-og-behandling/radiologi/#hva-er-mr)
      Ein gjer MR-undersøking av hjernen for å sjå om ein finn årsaka til anfalla.


      ## Behandling for epilepsi


      Den mest vanlege behandlinga for epilepsi er legemiddel. Oppstart av behandling skjer ofte etter minst to anfall eller
      tidlegare om ein meiner at risikoen for anfall er stor. Ideelt sett er målet med all epilepsibehandling anfallsfridom
      så raskt som mogleg utan biverknader.


      Legemidla påverkar ikkje årsaka til anfalla, men verkar anfallsreduserande. Rundt 2/3 av pasientane får kontroll på
      anfalla med dei legemidla vi har no.


      Epilepsioperasjon er den einaste behandlinga som kan fjerne årsaka til anfalla og bør vurderast hos pasientar med fokal
      epilepsi som ikkje får hjelp av legemiddel. Pasientane går gjennom ei nøye utgreiing for å sjå om dei er eigna for slik
      behandling.


      Kunnskap om kva som kan utløyse anfall, er viktig for at personen kan søkje å unngå situasjonar som gjer hen særleg
      anfallsutsett. Kjende «anfallstriggerar» er negativt stress, søvnmangel, utegløymde medisinar, mykje alkohol og lite
      mat. Å betre den fysiske forma og ha ein regelmessig og sunn livsstil, kan hos mange redusere anfallstendensen.


      ### Medisinar


      Medisinar er førstevalet ved behandling av epilepsi. I Noreg finst rundt 25 anfallsførebyggjande legemiddel.'
  - source_sentence: '- Hva er normalt når det gjelder språkutvikling for flerspråklige barn?'
    sentences:
    - 'Noen uttrykker muligens at det er for mye støy når en voksen leser med dem, eller at de har ønsker om å synge en spesiell
      sang eller leke et kjært eventyr. Legg merke til det barna gir uttrykk for, og lytt til det de sier. Deres «stemme»
      er viktig og skal være utgangspunkt for endringer og forbedringer i hverdagen. Noen ganger kan det være nyttig å skrive
      ned barnas reaksjoner, preferanser, ønsker og meninger for å bruke dette senere i refleksjons- og utviklingsarbeid enkeltvis
      eller sammen med kollegaer. Pedagogene skal være oppmerksomme og blant annet legge merke til temaer barna viser interesse
      for, hva de er opptatt av der og da, om noe i naturen vekker nysgjerrighet, eller om det er leker de gir uttrykk for
      at de har lyst til å leke. Dette skal danne utgangspunkt for pedagogene når de planlegger og tilrettelegger for språkstimulerende
      leker, aktiviteter og samtaler.


      ### Forslag til refleksjon og samarbeid


      A. Hvordan arbeider barnehagen med dokumentasjon og vurdering av språkmiljøet?


      - Hva ønsker dere å gjøre for å videreutvikle dette arbeidet?


      B. Observer aktuelle deler av språkmiljøet i barnehagen en uke.


      - Snakk sammen om hva dere mener har god kvalitet.

      - Velg noe dere vil forsøke å videreutvikle sammen.

      - Fortell hverandre om hvordan dere har tatt hensyn til det barna har gitt uttrykk for i denne perioden.

      - Hva kan du/dere gjøre for å gi barna økt medvirkning i språkstimuleringsarbeidet?'
    - '# Språk i barnehagen - mye mer enn bare prat


      ## Flerspråklige barns språktilegnelse


      ### Alle må få mulighet til å uttrykke seg og oppleve at de blir forstått


      Mange av barnehagebarna i Norge vokser opp med ett eller flere andre morsmål/hjemmespråk enn norsk. Barnehagen må støtte
      barna når de bruker morsmålet sitt og samtidig arbeide aktivt med å fremme barnas norskspråklige kompetanse. Å kunne
      uttrykke seg og å oppleve at andre lytter til det en selv formidler, er viktig for alle. Noen flerspråklige barn lærer
      morsmålet først. Deretter lærer de norsk, for eksempel når de begynner i barnehagen. Andre lærer morsmål og norsk samtidig.
      Flerspråklige barns bakgrunn er, naturlig nok, svært forskjellig. Derfor er det også stor variasjon i hvordan barna
      mestrer den flerspråklige situasjonen. Mestringen avhenger både av barna og omgivelsene. Det er viktig at barnehagen
      og foreldrene samarbeider om å støtte barnas flerspråklige språktilegnelse.


      ### **Å begynne i barnehagen er en stor overgang i livet for de fleste barn**


      Barnehagen skal i samarbeid med foreldrene legge til rette for at barnet kan få en trygg og god start i barnehagen.
      Når barnet begynner i barnehagen skal personalet sørge for tett oppfølging den første tiden slik at barnet kan oppleve
      tilhørighet. (Rammeplanen)


      For barn som har et annet eller andre morsmål enn norsk, kan overgangen ved barnehagestart kjennes ekstra stor fordi
      de kan ha vanskeligheter med å forstå det språket som de i hovedsak hører i barnehagehverdagen. Noen av disse barna
      går inn i en periode hvor de selv ikke bruker språket. Den kan være kortvarig, men den kan også vare i flere måneder.
      Barna kan lære mye av det nye språket selv om de ikke ytrer seg på norsk, og de kan forstå store deler av kommunikasjonen
      som foregår i omgivelsene. Personalet må arbeide aktivt for å inkludere barna i kommunikasjon i denne perioden. Det
      er også viktig at de er i dialog med foreldrene om barnas språk. Slik kan personalet få kjennskap til foreldrenes kunnskap
      om barnas språkutvikling på morsmålet, noe som kan bidra til en helhetlig forståelse. Les mer om foreldresamarbeid i
      del 1.


      ### Barn uttrykker seg på ulike måter


      De første ytringene til flerspråklige barn likner ofte på ytringene til yngre barn. De språklige utfordringene barna
      har mens de lærer seg andrespråket, kan lett bli forvekslet med utfordringer som er vanlige for barn med språkvansker.
      Mange barn veksler mellom språkene de kjenner eller mestrer, og det kan gjerne skje i en og samme ytring. De flerspråklige
      barnas språk bærer ofte preg av både ferdigheter og vansker på uventede områder. Barna kan for eksempel bruke noen avanserte
      ord eller ha svært god uttale, mens de ikke kjenner betydningen av mye brukte ord eller grunnleggende grammatiske prinsipper.
      Dette kan gjøre det mer utfordrende å vurdere språkkompetansen deres.


      ### Barn trenger tid til språktilegnelsen


      Voksne som skal vurdere språket til flerspråklige barn og legge til rette for et godt språkmiljø for dem, må ha kjennskap
      til barnas språkhistorie og språkutvikling på språkene de behersker. De må være i stand til å se og vurdere barnas språk
      i et flerspråklig perspektiv. Det er i tillegg viktig å være oppmerksom på at det som regel tar lengre tid å lære seg
      flere språk enn bare ett. Det er derfor helt vanlig med en noe mer langsom progresjon i språkutviklingen generelt.'
    - "# Irislinser\n\nKontaktlinser med påmalt iris eller printet iris.\n\nDet finnes også informasjon om irislinser til\
      \ [optikere eller øyeleger](/samarbeidspartner/irislinse) .\n\n## [Hvem kan få?](#hvem)\n\nDu kan få støtte til irislinse\
      \ dersom du har:\n\n- Aniridi (mangelfullt utviklet iris)\n- Pupilledeformitet\n- Deformert iris\n- Andre synlige skader\
      \ på hornhinne\n\nØyelege må bekrefte diagnosen eller tilstanden, og behovet for irislinse.\n\nDu må være [medlem av\
      \ folketrygden](/no/person/flere-tema/arbeid-og-opphold-i-norge/relatert-informasjon/medlemskap-i-folketrygden)\n\n\
      ## [Hva kan du få?](#hva)\n\n### [Hva er irislinser?](#hva-er)\n\nEn irislinse er en kontaktlinse med påmalt iris eller\
      \ printet iris, som dekker over aniridi, pupilledeformitet, deformert iris eller synlige skader på hornhinne. Irislinser\
      \ er først og fremst en kosmetisk protese. Irislinsen kan også gis med styrke når det er behov for dette.\n\n### [Hvor\
      \ mye kan du få?](#hvor-mye)\n\nUtgiftene til rimeligste hensiktsmessige irislinse dekkes fullt ut.\n\nUtgifter til\
      \ ekstra tidsbruk ved nytilpasning og re-tilpasning av stønadsberettigede kontaktlinser kan dekkes med maksimalt 1200\
      \ kroner per time.\n\nNav dekker ikke utgifter til ordinær synsundersøkelse, rensevæske, kontaktlinsetilpasning eller\
      \ kontaktlinsekontroll.\n\nNav dekker ikke reiser til optiker\n\n### [Hvor ofte kan du få?](#hvor-ofte)\n\nDu kan få\
      \ stønad til nye irislinser når det er nødvendig å bytte.\n\n### [Andre brille- og linseordninger](#andre-ordninger)\n\
      \n[Briller til barn](/briller-til-barn) [Briller til forebygging eller behandling av amblyopi](/amblyopi) [Briller og\
      \ kontaktlinser for synshemmede](/briller-kontaktlinser-for-synshemmede)\n\n### Andre tilbud\n\nMer informasjon til\
      \ deg som\n\n- [Har nedsatt syn eller trenger briller](/syn) Dette kan du ha rett til\n\n## [Hvordan kan du få?](#hvordan)\n\
      \n### [Søknad og dokumentasjon](#soknad)\n\nVi anbefaler at du ber optiker eller øyelege fylle ut søknadsskjema for\
      \ deg.\n\nDu må signere søknaden selv.\n\nSøknadsskjemaet for irislinser må fylles ut dersom\n\n    - du søker om irislinser\
      \ for første gang\n    - du har behov for en annen type irislinse enn du har fått stønad til tidligere\n    - du har\
      \ betalt for irislinsene selv\n    - du skal søke om å få dekket utgifter til ekstra tidsbruk ved tilpasning.\n\nDette\
      \ må du dokumentere Vis mer\n\n- Første gang du søker om irislinse må du legge ved epikrise eller dokumentasjon fra\
      \ øyelege.\n- Du må alltid legge ved et pristilbud eller en kvittering.\n- Pristilbudet skal fylles ut av optikeren\
      \ eller øyelegen som fakturerer og leverer ut irislinsene. Unntaksvis kan leverandører fylle ut pristilbud når de er\
      \ forespurt av sykehus. Optiker/øyelege har tilgang på eget skjema for pristilbud.\n- Hvis du har betalt for irislinsene\
      \ og skal legge ved kvittering, må søknaden sendes før det har gått seks måneder etter at du kjøpte linsene. Kvitteringen\
      \ må være lesbar for Nav, husk derfor å teipe fast kvitteringen til et ark.\n- Ved utgifter til ekstra tidsbruk ved\
      \ nytilpasning og retilpasning av linser, må du spesifisere reell tidsbruk, hva som inngår i tiden og hvor mye du selv\
      \ har betalt for synsundersøkelse, kontaktlinsetilpasning og kontaktlinsekontroll.\n\n[Send søknad](https://www.nav.no/fyllut/nav100715)\
      \ [Ettersend dokumentasjon](https://www.nav.no/fyllut-ettersending/nav100715)\n\n### [Etter at du har søkt](#etter-soknad)\n\
      \nDu får skriftlig vedtak når søknaden er behandlet.\n\nSaksbehandlingstider Vis mer\n\n#### Saksbehandlingstid for\
      \ søknader\n\nSaksbehandlingstiden er tiden fra vi får søknaden din og til vi har gjort et vedtak.\n\nI spesielt krevende\
      \ saker, eller saker der vi ikke har fått fullstendige og riktige opplysninger, kan saksbehandlingstiden bli lengre\
      \ enn vi først har oppgitt.\n\nLeveringstid for hjelpemiddelet kommer i tillegg til saksbehandlingstiden.\n\n| Saken\
      \ gjelder                         | Forventet saksbehandlingstid   |\n|---------------------------------------|--------------------------------|\n\
      | Søknad om hjelpemiddel til dagligliv  | 17 dager                       |\n| Søknad om hjelpemiddel til arbeidsliv\
      \ | 21 dager                       |\n\n### [Klagerettigheter](#klage)\n\nFår du avslag på søknaden din kan du klage\
      \ til Nav hjelpemiddelsentral. Du må ha sendt en søknad som er blitt behandlet for å kunne klage. Du kan ikke klage\
      \ på muntlig avslag.\n\n#### Klage på vedtak\n\nI vedtaket står det hvordan du går fram hvis du skal klage, hvem du\
      \ skal klage til og klagefrist. Hvis du har spørsmål om vedtaket, kan du [kontakte oss](/kontaktoss) .\n\n[Send klage](https://klage.nav.no/nb/klage/HJELPEMIDLER)\
      \ [Ettersend dokumentasjon](https://klage.nav.no/nb/ettersendelse/klage/HJELPEMIDLER)\n\n#### Anke vedtak\n\nHvis du\
      \ er uenig i svaret på klagen din fra Nav klageinstans, kan du med noen unntak anke vedtaket. Fristen for å anke står\
      \ i vedtaket.\n\n[Send anke](https://klage.nav.no/nb/anke/HJELPEMIDLER) [Ettersend dokumentasjon](https://klage.nav.no/nb/ettersendelse/anke/HJELPEMIDLER)\n\
      \nDu kan også bruke advokat eller gi fullmakt til en person som klager på dine vegne.\n\n[Klagerettigheter](/klagerettigheter)\
      \ Slik gjør du det\n\nSaksbehandlingstider Vis mer\n\n#### Saksbehandlingstid for klage og anke\n\nHar du fått et vedtak\
      \ fra oss som du mener er feil? Da kan du klage til Nav-enheten som skrev vedtaket. De vil vurdere saken din på nytt.\
      \ Hvis de ikke er enig i klagen din, sender de den videre til Nav klageinstans.\n\n| Saken gjelder              | Forventet\
      \ saksbehandlingstid   |\n|----------------------------|--------------------------------|\n| Klage til Nav-enhet   \
      \     | 17 uker                        |\n| Klage til Nav klageinstans | 5 måneder                      |\n| Anke til\
      \ Nav klageinstans  | 5 måneder                      |\n\n## [Bytte av irislinser](#bytte)\n\nNår du tidligere har fått\
      \ irislinser fra Nav og det er behov for nye av samme type, trenger du som hovedregel ikke å sende inn en ny søknad.\
      \ Optiker, øyelege eller leverandør kan sende inn pristilbud istedenfor.\n\n## [Hva sier loven?](#loven)\n\n[Rundskriv\
      \ om irislinse (lovdata.no)](https://lovdata.no/nav/rundskriv/r10-07i#KAPITTEL_3-3)"
  - source_sentence: Hvordan kan gruppestørrelse påvirke læringsmiljøet for en elev med nedsatt hørsel?
    sentences:
    - '# Ultralyd av hjernen til for tidleg fødde barn


      Undersøkinga gir detaljert informasjon om utsjånaden av hjernen, holromma i hjernen og blodårene. Hos for tidleg fødde
      barn er det spesielt blødingar og skadar i hjernevevet som kjem av dårleg blodforsyning vi ser etter med ultralyd. Dei
      fleste hjerneblødingane hos for tidleg fødde barn kjem dei tre første levedøgna.


      ## Før


      ## Før Vis meir


      Undersøkelsen krev vanlegvis ingen spesielle førebuingar, anna enn at det er lurt at barnet er mett og fornøgd før undersøkinga
      for å kunna halda seg mest mogleg i ro.


      ## Under


      ## Under Vis meir


      Barnet ligg i kuvøse, seng eller på brystet til foreldra under undersøkinga. Ultralyd blir utført ved at ein liten probe
      (lydhovud) blir halde over den mjuke delen av hovudet til barnet (fontanellen).


      For å kunna lage bilete må det vera god kontakt mellom huda og proben. Derfor blir det alltid brukt ein kontaktgelé
      på huda. Den kan ofte kjennast litt kald med ein gong. Bilete blir registrert på ein skjerm som står ved sida av pasienten.
      Bileta blir deretter lagra digitalt. '
    - 'Det må derfor foretas en konkret vurdering av behovet i det enkelte tilfelle.


      ### Elever som er pårørende


      Fylkeskommunen har også ansvaret for opplæringen for barn og unge som er pårørende til foreldre eller søsken som er
      innlagte i helseinstitusjoner når institusjonsoppholdet trolig vil føre til mer enn fjorten dagers fravær per skoleår
      for barnet eller søskenet. Dette står i opplæringsloven § 28-4. Dette innebærer at det først og fremst er elever som
      bor på eller i tilknytning til helseinstitusjon på grunn av sykdom hos søsken eller foreldre, og som av ulike grunner
      har lang reisevei mellom sykehus og hjemskole, som blir omfattet av ansvaret til fylkeskommunen.  Dette gjelder barn
      og unge som er pårørende etter helsepersonelloven § 10 a. [1] Dette er mindreårige barn som har foreldre eller søsken
      som er pasient med psykisk sykdom, rusmiddelavhengighet eller alvorlig somatisk sykdom eller skade.


      Også for elever som er pårørende, bør hovedregelen være at de følger opplæringen ved hjemskolen. [2] Opplæringen kan
      gis som [fjernundervisning](/regelverk-og-tilsyn/skole-og-opplaring/fjernundervisning) dersom vilkårene er oppfylt.
      Det at en elev ikke kan komme på skolen fordi eleven er pårørende, kan være en god grunn til å gi opplæring som fjernundervisning
      og en særlig grunn til å la eleven få fjernundervisning andre steder enn på skolen, se opplæringsloven § 14-4. Om det
      er trygt og pedagogisk forsvarlig å gi opplæringen som fjernundervisning, må vurderes konkret, og det må legges til
      rette for at lærer og elev kan kommunisere effektivt. [3]


      Fylkeskommunen bør åpne for fleksible løsninger og vektlegge hensynet til eleven og hver enkelt familie. Fylkeskommunen
      må samarbeide med hjemskolen til eleven om opplæringen. Hva som er til det beste for eleven skal være et grunnleggende
      hensyn i vurderingene, og eleven skal få muligheten til å bli hørt. [4] Ansvaret til fylkeskommunen for opplæringen
      oppstår først når pasienten har en forventet liggetid på minst fjorten dager per skoleår. I enkelte tilfeller kan en
      pasient, selv med alvorlig eller kronisk tilstand, ha flere kortere opphold på institusjonen. Likestilt med fjorten
      dagers liggetid er derfor når pasienten har gjentatte kortere opphold i helseinstitusjon, som samlet er forventet å
      gi mer enn fjorten dagers fravær fra ordinær skolegang for eleven. I tilfeller der eleven er avgangselev, skal ha eksamen
      eller lignende og derfor ikke bør miste opplæring i det hele, er fylkeskommunen forventet å finne løsninger i samarbeid
      med hjemskolen uavhengig av kravet til liggetid. [5]


      ### Innhold og omfang av opplæringen


      Barn og unge som er innlagte eller som er barn eller søsken til innlagte, er omfattet av de samme lov- og forskriftsbestemmelser
      som elever i ordinær grunnskole og videregående opplæring. Opplæringen skal være i samsvar med Læreplanverket for Kunnskapsløftet,
      inkludert fag- og timefordeling og læreplaner for fag. Det vil si at elever i institusjon har rett til et fullverdig
      opplæringstilbud, se likevel under om når eleven er for syk og ikke kan motta opplæring i institusjon.


      Kravene til kompetanse for de som skal gjennomføre opplæringen, gjelder også for opplæring i institusjon.


      Les mer om [krav til kompetanse](/regelverk-og-tilsyn/skole-og-opplaring/krav-til-kompetanse-for-larere-ansettelse-og-undervisning)
      .


      ### Individuelt tilrettelagt opplæring


      Barn og unge som er innlagte, eller er barn eller søsken til innlagte, har også rett til individuell tilrettelegging
      etter opplæringsloven kapittel 11. Fylkeskommunens plikt til å følge de formkravene som gjelder for individuell tilrettelegging
      er likevel begrenset av praktiske forhold. For eksempel er mange innlagt i institusjonen i så kort tid at fylkeskommunen
      ikke rekker å innhente sakkyndig vurdering av behov for individuelt tilrettelagt opplæring før pasienten skrives ut.
      Hvis eleven har et vedtak om individuelt tilrettelagt opplæring og individuell opplæringsplan (IOP) fra sin hjemskole,
      må fylkeskommunen ta stilling til om dette kan benyttes mens eleven er i institusjon. I så fall må fylkeskommunen fatte
      et tidsbegrenset vedtak om individuelt tilrettelagt opplæring på grunnlag av enkeltvedtaket fra elevens hjemskole. Fylkeskommunen
      må også fatte vedtak om personlig assistanse, fysisk tilrettelegging og tekniske hjelpemidler hvis eleven har behov
      for dette. For disse vedtakene er det imidlertid ikke krav om sakkyndig vurdering fra pedagogisk-psykologisk tjeneste
      (PP-tjenesten).


      [Veileder for tilpasset opplæring og individuell tilrettelegging](/regelverk-og-tilsyn/skole-og-opplaring/veileder-for-tilpasset-opplaring-og-individuell-tilrettelegging/vedtak-om-individuell-tilrettelegging/#opplaring-adskilt-klassen-annen-arena-enn-skolen-alternativ-opplaringsarena)


      ### Grensen mellom opplæring og helsehjelp


      Det kan være vanskelig å avgjøre om et tiltak skal regnes som opplæring eller helsehjelp. Skillet mellom opplæring og
      helsehjelp vil ha betydning for hvilken offentlig myndighet som er faglig, juridisk og økonomisk ansvarlig.


      ### Når eleven er for syk og ikke kan motta opplæring i institusjon


      På samme måte som i ordinær grunnskole, kan sykdom begrense elevens mulighet til å delta i opplæringen mens eleven er
      i en institusjon. Vi anbefaler at ansvarlig lege/behandler på institusjonen skriver en erklæring, når det er helseårsaker
      som gjør at pasienten ikke kan motta opplæring på fulltid.


      Opplæring som gis i institusjon, er en del av den ordinære opplæringen, og skal derfor ikke regnes som fravær. Adgangen
      til å kreve helserelatert fravær strøket fra vitnemålet etter opplæringsforskriften § 9-44 (grunnskole) og § 9-53 (videregående
      opplæring) gjelder på vanlig måte.


      ### Fritak fra opplæringsplikten i grunnskolen


      Kommunen eller fylkeskommunen har adgang til å frita elever fra hele eller deler av grunnskoleopplæringen når hensynet
      til elevene tilsier det. Dette står i opplæringsloven § 2-2. '
    - '# Slik kan skolen forberede seg


      Her får du en oversikt over hvordan skolen kan løse noen av de vanligste utfordringene når dere skal ta imot en elev
      med nedsatt hørsel.


      Når skolen skal ta imot en elev med nedsatt hørsel, kan det oppleves som overveldende.


      Fordi alle hørselstap er ulike, er det viktig at skolen, og ikke bare kontaktlærer, setter seg godt inn i hørselstapet
      til akkurat denne eleven, og hvilke utfordringer dette kan medføre. For å få på plass riktig tilrettelegging er det
      avgjørende å kjenne godt til hva eleven mestrer, og eventuelle utfordringer. Sørg for at dette er kjent for alle som
      skal jobbe tett på eleven.


      God og tydelig klasseledelse er ekstra viktig for en elev med nedsatt hørsel. Tenk nøye gjennom hvilke lærere som skal
      jobbe på elevens trinn, hvem som får kontaktlæreransvar, og gjør justeringer der det er mulig.


      ## Sørg for riktig kompetanse


      For å få til en god og bærekraftig tilrettelegging over tid er det viktig å forstå *hvorfor* og ikke bare *hva* som
      bør gjøres. Uten dette er det vanskelig å opprettholde, vurdere effekt og gjøre justeringer av tiltakene underveis.
      For å få til dette må skolen som organisasjon og de ansatte som er tett på eleven ha nok kompetanse om nedsatt hørsel,
      dette inkluderer også ansatte i SFO.


      Opplevelsen av et hørselstap er som nevnt svært individuelt, og selv om hørselstapet er relativt lite, kan det allikevel
      medføre store tilretteleggingsbehov. [Søk derfor om veiledning fra Statped tidlig, slik at dere kommer i gang på best
      mulig vis.](https://www.statped.no/om-statped/vare-tjenester/kartlegging-radgivning-og-veiledning/)


      ## Hørselstekniske hjelpemidler


      Velg variant:


      Standard Tegnspråk Tekst Synstolket


      Aktiver videoavspiller Video


      Mikrofonbruk og nedsett høyrsel


      01:03


      Få oversikt over elevens behov for tekniske hjelpemidler tidlig, spør foresatte om det er noe spesielt dere bør vite.
      Dersom eleven allerede bruker hjelpemidler er det viktig at de ansatte setter seg inn i hvordan de virker.


      Ingen barn og unge ønsker å føle seg annerledes, derfor er det viktig at de voksne tar ansvar for at utstyret fungerer
      og blir brukt. Eleven skal ikke oppleve det som sitt ansvar å lære opp og minne lærere og medelever på å bruke utstyret.


      Som et minimum vil skolen trenge et lydutjevningsanlegg. Det søker skolen om fra NAV hjelpemiddelsentralen. Sørg for
      at alle får opplæring i bruk av anlegget, og blir trygge på hvordan det fungerer. Etabler fra start at dette er klassens
      anlegg - ikke elevens. Dette skal brukes av alle, uansett om eleven med nedsatt hørsel er til stede eller ikke.


      Vurder i samråd med NAV hjelpemiddelsentralen om det også trengs bærbart tilleggsutstyr som kan brukes i andre undervisningsrom.
      Pass også på at alle vet hvor de skal melde fra dersom noe ikke virker, og meld fra straks det oppstår problemer med
      anlegget.


      ## Gruppestørrelse og sammensetning


      Velg variant:


      Standard Tegnspråk Tekst Synstolket


      Aktiver videoavspiller Video


      Mindre grupper og nedsett høyrsel


      00:37


      På generell basis vil en mindre elevgruppe generere mindre støy enn en større elevgruppe. I praksis vet vi at dette
      ikke alltid er tilfelle, da elevsammensetningen også kan ha innvirkning på både auditiv og visuell støy.


      Et tiltak som kan være nyttig og som kan utgjøre en forskjell for en elev med nedsatt hørsel, er å utnytte skolens arealer
      på god måte. Bruk tilgjengelige grupperom i skolehverdagen og del elevene i mindre grupper. Dette er spesielt nyttig
      i forbindelse med gruppearbeid, men det er ikke nødvendig at det alltid er eleven med nedsatt hørsel sin gruppe som
      flyttes eller blir sittende igjen.


      ## Gjør støyreduserende tiltak


      Velg variant:


      Standard Tegnspråk Tekst Synstolket


      Aktiver videoavspiller Video


      Støyskjerming og nedsett høyrsel


      00:25


      Støy er uønsket, forstyrrende eller for høy lyd i en gitt situasjon. I en undervisningssituasjon vil dette innebære
      all annen lyd enn det faglige innholdet som formidles av lærere og medelever.


      Hva som oppleves som støy er individuelt og kan være en utfordring for læringsmiljøet, uavhengig av om eleven har et
      hørselstap eller ikke.'
