    - '# Barnehagen skal ta hensyn til barn som har særlige behov knyttet til mat og måltider


      Anbefaling - Krav i lov eller forskrift


      Betegnelsen brukes når kravet er forankret i lov eller forskrift.


      Måltidene skal tilrettelegges for barn med særlige behov. Dette inkluderer matallergi, matintoleranse, sykdom, spisevansker,
      barn med nedsatt funksjonsevne og andre særlige behov.


      Barnehagebarnas daglige arena er barnehagen. Barnehagen skal gi et individuelt tilpasset og likeverdig tilbud uansett
      funksjonsnivå. I noen sammenhenger krever det individuell tilrettelegging. Det er viktig å sikre barna trygge og gode
      rammer som grunnlag for god helse og livskvalitet. Måltidene bør fremme inkludering i felleskapet og barnas utvikling.


      De fleste allergiske reaksjoner hos barn skyldes proteiner i melk, egg, fisk og nøtter og sjeldnere soya og hvete. Vanlige
      matoverfølsomhetstilstander er laktoseintoleranse og cøliaki. Spisevansker hos barn er kjennetegnet ved problemer med
      å spise eller drikke det som er nødvendig og tilstrekkelig variert til å dekke barnets næringsbehov.


      Barn med ulike sykdommer og tilstander kan ha behov for tilrettelegging av mat og måltider, og det kan være behov for
      samarbeid med pedagogisk-psykologisk tjeneste (PPT) eller helsetjenesten for veiledning og råd om hvordan barnehagen
      kan gjøre dette på en god måte.


      Det bør ved planlegging av mat- og drikketilbud og gjennomføring av måltider, tilstrebes at barn med særlige behov serveres
      samme matrett som de andre barna.


      ## Praktisk informasjon


      ## Begrunnelse'
    - 'Det kan være vanskeligere å ta opp misnøye med familiemedlemmer begge veier. Likevel synes mange foreldre at det er
      lettere å begynne med avlastning på denne måten fordi de kjenner seg trygge på noen de kjenner godt.


      Mange foreldre ønsker at avlasteren er en som kjenner barnet. Det kan være aktuelt å få noen fra barnehagen/skolen/SFO
      eller venner/naboer til å være avlaster. Du har mulighet til å foreslå hvem du ønsker som avlaster, men kommunen må
      godkjenne vedkommende. Hvis du ikke selv vet om noen som kan være avlaster, har kommunen ansvar for å finne en person,
      eller finne frem til en annen løsning i samråd med familien. Når avlastning er innvilget, må kommunen sørge for at ordningen
      blir gjennomført.


      Private avlastere omfattes av [forskrift om arbeidstid for avlastere](https://lovdata.no/dokument/SF/forskrift/2017-06-25-1052)
      og [særavtale som utfyller forskriftens regler om lønns- og arbeidsvilkår](https://www.ks.no/contentassets/2cfbd65a741343bead756ba5dc35e675/sgs-1030---avlaster.pdf)
      . KS har omtalt forskrift og særavtalen i [B-rundskriv nr. B/07-2016](https://www.ks.no/contentassets/44d8561101044318b81eaa3e86879dc8/b-rundskriv-7-2016---arbeidstaker--og-oppdragstakerbegrepet.pdf)
      . Regelverket gjør avlastere til arbeidstakere, men gjennom regelverkspresiseringer har det blitt økte muligheter for
      fleksibilitet. Allikevel vil lovreguleringen gi noen begrensninger i forhold til avlastning over lengre tid i strekk,
      blant annet i ferier.


      Tenk igjennom:


      - Hvilke egenskaper og kvalifikasjoner ønsker du at avlasteren har?

      - Hvilke forventninger bør du avklare med private og kjente avlastere?

      - Hvordan ta opp misnøye eller forslag til endringer?

      - Hvordan opprettholde en familierelasjon når den også er profesjonell gjennom avlastningen?


      [For mer informasjon om ulike sider ved avlastning, anbefaler vi denne artikkelen fra Nasjonalt kompetansemiljø om utviklingshemning](https://naku.no/kunnskapsbanken/avlastning-ulike-tiltak)
      .


      ## **Hvordan søke**


      Når du skal søke om avlastning, er det viktig at du beskriver familiens behov. Hvorfor har du behov for avlastning?
      En systematisk måte å gå frem på for å beskrive den nødvendige omsorgen, er å benytte en såkalt "døgnklokke". Det vil
      si at du går gjennom døgnet minutt for minutt, time for time, og beskriver de ulike oppgavene og tidsfastsetter dem.
      Tilsvarende kan du beskrive uken, måneden og året. Beskriv også hva du ikke får tid til på grunn av dette. Du kan komme
      med forslag om hvordan du kan tenke deg avlastningen. De fleste kommuner har egne søknadsskjemaer.


      Les mer her: [Døgnklokke - Frambu](https://frambu.no/tema/dognklokke/)


      ## **Pårørende til voksne med funksjonsnedsettelser**


      Noen pårørende til voksne kan oppleve at omsorgsoppgavene og oppfølgingen av personen med diagnose blir mer krevende
      med årene. Det kan dels komme av at personen med diagnose mister ferdigheter eller opplever andre konsekvenser av å
      ha levd lenge med sin diagnose og klarer eller orker mindre selv. Dels kan det ha sin årsak i at helsesituasjonen til
      den pårørende endrer seg og/eller at vedkommende blir lettere sliten og ikke klarer eller orker like mye som før. Tjenesteytere
      som har kontakt med voksne personer med nedsatt funksjonsevne som blir eldre, bør være særlig oppmerksomme på disse
      endringene og ta initiativ til å ta opp endringer i behov både hos personen med diagnose og pårørende.


      ## **Lovgrunnlag**


      Retten til avlastning finner du i [pasient- og brukerrettighetsloven](https://lovdata.no/dokument/NL/lov/1999-07-02-63/#KAPITTEL_2)
      §2-1 a annet ledd, som må ses i sammenheng med [helse- og omsorgstjenestelove](https://lovdata.no/dokument/NL/lov/2011-06-24-30#KAPITTEL_3)
      n §3-6. [Pasient- og brukerrettighetsloven](https://lovdata.no/dokument/NL/lov/1999-07-02-63/#KAPITTEL_2) §2-8 handler
      om retten til vedtak.


      Sivilombudsmannen har uttalt seg i en [klagesak om avlastning](https://www.sivilombudsmannen.no/uttalelser/soknad-nattavlastning-rettsanvendelse-bevisbedommelse-hensynet-barnets-beste-m-m/)
      . Uttalelsen viser til aktuelle rettskilder og beskriver sentrale vurderinger i søknader om avlastninger. Sivilombudsmannen
      er opptatt av at i vurderingen av barnets beste må det tas hensyn til «interessene til alle barna i familien, og ikke
      kun barnet som avlastningstiltaket direkte retter seg mot» (punkt 4.3.).


      Avlastningen skal organiseres med utgangspunkt i familiens- og barnets behov. Les mer i [Pårørendeveilederen](https://helsedirektoratet.no/Retningslinjer/P%C3%A5r%C3%B8rendeveileder.pdf)
      punkt 2.1 side 12. En viktig paragraf i så måte finner man i [Lov om pasient- og brukerrettigheter (pasient- og brukerrettighetsloven)
      - Lovdata](https://lovdata.no/dokument/NL/lov/1999-07-02-63/#:~:text=Pasient-%20og%20brukerrettighetsloven%20er%20en%20norsk%20lov%20som,p%C3%A5%20tjenester%20av%20god%20kvalitet%2C%20jf.%20%C2%A7%201-1.)
      (§ 3-1) *som sier at «Det skal legges stor vekt på hva pasientene eller brukeren mener ved utforming av tjenestetilbudet».*


      Avlastning kan organiseres som en eventuell BPA-ordning. Les mer om BPA her: [Brukerstyrt personlig assistanse (BPA)
      - Frambu](https://frambu.no/tema/brukerstyrt-personlig-assistanse-bpa/)


      Avlastning er gratis. Det skal heller ikke betales for reise til og fra avlastningen, mat og lignende verken for barnet
      eller avlaster. Les mer på side 12 i [Helsetilsynets Veileder for landsomfattende tilsyn](https://www.helsetilsynet.no/globalassets/opplastinger/tilsyn/styringsdok/2007veilederlandsomfattendeavlastning.pdf/)
      .


      Avlastning bør omtales i individuell plan og tas opp på møter i ansvarsgruppa. [Les mer om samarbeid og samordning av
      tjenester her](https://frambu.no/tema/samarbeid-og-samordning-helhetlige-og-koordinerte-tjenester/) .'
  - source_sentence: Hvorfor er rettighetsfesting av BPA viktig?
    sentences:
    - 'oktober.*


      Forskriften er hjemlet i Folkehelseloven og gjelder for barnehager, skoler, skolefritidsordninger og leksehjelpsordninger,
      men også for barnetilsynsordninger for 3 eller flere barn med ukentlig oppholdstid på 10 timer eller mer. Den regulerer
      også kommunens ansvar for godkjenning og tilsyn.


      Formålet med forskriften er å bidra til at miljøet i barnehager, på skoler, skolefritidsordninger og leksehjelpordninger
      fremmer barns og elevers helse, trivsel, lek og læring, samt at sykdom, skade og alvorlige hendelser forebygges.


      **Alle barnehager skal ha et internkontrollsystem som sikrer at barnehagens aktiviteter er i tråd med denne forskriften.**
      Internkontroll er systematiske tiltak som skal sikre at virksomhetenes aktiviteter planlegges, organiseres, utføres,
      kvalitetssikres og vedlikeholdes i samsvar med regelverket. Internkontrollen skal altså sikre at lover og forskrifter
      følges. Virksomhetens eier har ansvar for internkontrollen, jfr. § 3. '
    - '# Hjelpemidler


      Dersom du har midlertidig behov for hjelpemidler, kan du låne dette i en tidsavgrenset periode fra Hjelpemiddellageret.
      Krykker må leies eller kjøpes, mens det meste er gratis å låne. Her er en oversikt over våre hjelpemidler.


      Trenger du å låne hjelpemidler permanent, må du kontakte [ergoterapitjenesten](/helse-og-omsorg/ergoterapitjenesten)
      .


      ## Om hjelpemiddellageret


      Trenger du hjelpemidler for en kort periode, kan du ringe hjelpemiddellageret direkte. Hjelpemiddellageret er åpent
      alle hverdager mellom klokken 10.00 og 14.00. **Telefonnummer: 69 10 80 40.**


      Sarpsborg kommune har et lager av hjelpemidler for korttidsutlån i Roald Amundsens gate 33 i Sarpsborg sentrum. [Sarpsborg
      ASVO AS](http://www.sarpsborgasvo.no/) driver dette.


      Formålet med korttidslageret er å sikre at alle kommunens innbyggere som har behov for hjelpemidler i en tidsavgrenset
      periode, kan leie disse.


      ASVO oppfordrer alle som trenger hjelpemidler, om ta kontakt for råd og veiledning om hva som finnes.


      ## Oversikt over hjelpemidler som du kan låne gratis


      ##### Rullator


      Ved hjelpemiddellageret kan du låne rullator. Her er det tre forskjellige typer til utlån.


      ##### Rullestol


      Ved hjelpemiddellageret kan du låne rullestol.


      ##### Toalettforhøyere


      Ulike toalettforhøyere kan lånes ved Hjelpemiddellageret.


      ##### Dusjstoler og badekarseter


      Ved Hjelpemiddellageret kan du låne dusjstoler og badekarsseter


      ##### Forflytningshjelpemidler


      Ved Hjelpemiddellageret kan du låne sklilaken og dreieskive. På bildet er det en dreieskive.


      ##### Ryggløftere i seng


      Ryggløftere i seng, også kalt hjertebrett kan du låne ved Hjelpemiddellageret


      ##### Gripestang - til hjelp for å komme seg opp fra for eksempel seng


      Gripestangen går fra gulv til tak. Den kan lånes fra hjelpemiddellageret og den hjelper deg med å komme deg opp fra
      for eksempel sengen, rullestolen, toalett eller til hjelp for å komme seg inn eller ut av dusjkabinettet.


      ##### Løkke for å dra seg opp av sengen


      Dette stativet kan settes ved sengen for å hjelpe deg med å komme deg opp av sengen. Dette stativet kalles frittstående
      søsterstativ.


      ##### Sengebenforhøyere


      Ved Hjelpemiddellageret kan du låne sengebenforhøyere.


      ##### Sengebord


      Ved Hjelpemiddellageret kan du låne sengebord.


      ##### Gåstol


      Ved Hjelpemiddellageret kan du låne gåstol.


      ##### Bengynge-fotskammel


      Bengynge eller fotskammel kan du låne ved Hjelpemiddellageret


      ## Andre hjelpemidler


      ##### Krykker


      Krykker kan ikke lånes gratis, men du kan leie eller kjøpe ved Hjelpemiddellageret. Her er det ulike typer. Det er barnekrykker,
      voksenkrykker, armhulekrykker og stokker. Du kan også kjøpe doppsko og tigergrep til krykker, gripetenger og antistressballer


      ##### Annet


      Ved Hjelpemiddellageret selger de også blant annet strømpepåtrekkere, gripehåndtak, brodder, og ispigger.


      Hjelpemiddellageret låner også ut noen andre hjelpemidler, men dette er etter bestilling fra for eksempel hjemmetjenesten
      eller ergoterapi.'
    - '# Rettighetsfesting av brukerstyrt personlig assistanse (BPA)


      Brukerstyrt personlig assistanse er et viktig bidrag til likeverd, likestilling og samfunnsdeltakelse for personer med
      nedsatt funksjonsevne og stort behov for bistand.


      For personer i denne situasjonen betyr BPA mye for muligheten til yrkesdeltakelse, utdanning og et aktivt og selvstendig
      liv. Rettighetsfestingen av BPA er begrunnet i et ønske om å sikre mennesker med stort behov for praktisk bistand en
      større mulighet til å ta ansvar for eget liv og egen velferd.


      [Les rundskriv I-9/2015 Rettighetsfesting av brukerstyrt personlig assistanse (BPA)](/contentassets/bd58818a87cc4a109a6d29b4d0dc615a/rundskriv_i-9-2015_bpa.pdf)'
