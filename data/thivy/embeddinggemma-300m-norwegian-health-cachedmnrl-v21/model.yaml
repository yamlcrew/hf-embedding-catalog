  widget:
  - source_sentence: Hva innebærer BPA-ordningen i forhold til avlastning?
    sentences:
    - '# Tilrettelegging i spillaktivitet


      **Dataspill er en stadig voksende del av vår kultur. I denne artikkelen deler Frambu erfaringer med bruk og tilrettelegging
      av dataspill for personer med en sjelden diagnose.**


      Dataspill og VR-teknologi blir brukt stadig mer i Frambus aktivitetstilbud, og mulighetene for å bruke spill i trening
      og opplæring blir stadig bedre. Vi opplever at mange av dem som deltar på kursene våre er erfarne spillere. I arbeidet
      for å utvikle Frambus spilltilbud, har brukermedvirkning vært viktig. Unge voksne har prøvd utstyr, gitt råd på hvordan
      vi kan jobbe og delt erfaringer fra egen spillhverdag. Frambu har i dag et spillrom med flere spillkonsoller og VR-teknologi,
      og benytter dette aktivt som et aktivitetstilbud i kursene våre.


      ## **En motiverende aktivitet**


      Spill kan være en motiverende aktivitet, der mange opplever å kunne konsentrere seg over lengre perioder og opplever
      mestring. Vanskelighetsgraden i de fleste spill kan tilpasses, og man får alltid en ny sjanse om en ikke får til ting
      på første forsøk. Spill kan bidra til å utjevne forskjeller på tross av  ulikheter i funksjonsnivå mellom deltagere.


      På Frambu benytter vi blant annet bevegelsesspill hvor man styrer med kroppen, der det ikke stilles for store krav til
      presisjon, bevegelighet eller utholdenhet. Her kan man spille tennis, bowle, eller konkurrere mot hverandre på en virtuell
      friidrettsarena. Noen av spillene er også tilrettelagt for å kunne spille med rullestol. Bevegelsesspill kan være en
      fin aktivitet å gjøre sammen med familie og venner, der besteforeldre kan konkurrere mot barnebarn, og flere kan delta
      på tross av ulikt funksjonsnivå. Det kan også være et fint tilskudd i fellesarealet i tilrettelagte bofellesskap.


      ## **VR-teknologi**


      VR-teknologi kan gi deltagere mulighet for opplevelser og erfaringer man ellers ikke har tilgang til. På Frambu har
      vi brukt VR-teknologi for blant annet å gi gode sanseopplevelser. Eksempler på dette kan være å oppleve en undervannsverden
      med hvaler, fisk og planter, eller at man kan kjøre berg og dalbane i storslåtte omgivelser. Tilbakemeldingen vi har
      fått under aktiviteten på kurs er at det kan være en aktivitet som gir avspenning og får tankene over på noe annet.
      VR-teknologi er fortsatt ny, og det er visse medisinske forhåndsregler vi tar under aktiviteten. Blant annet anbefaler
      produsentene ikke VR dersom du har påvist epilepsi eller bruker pacemaker. Bruken av VR i opplæring, skole og som underholdning
      er i rask utvikling, og produkter som tidligere var dyre investeringer og krevde kraftige datamaskiner, blir nå lettere
      tilgjengelige og trådløse.


      ## **Tilrettelagt spillkontroll**


      I vårt arbeid med fysisk tilrettelegging, har vi anskaffet «Xbox Adaptive Controller», en spillkontroll som gjør det
      mulig å tilpasse knappene til en vanlig håndkontroll slik at man kan bruke bryterstyring på moderne spillkonsoller,
      for eksempel føtter og albuen til i stedet for hendene. Dette gjøres ved å koble til brytere som erstatter knappene
      på kontrollen. Dette kan bidra til at de som ikke får benyttet eller blir slitne av å spille med vanlig kontroller kan
      ha en bedre tilpasset løsning.


      Flere av diagnosene Frambu har ansvar for kan innebære nedsatt kraft, bevegelighet og utholdenhet samt ufrivillige bevegelser.
      Denne løsningen kan sørge for at flere kan spille og være mer utholdende i sin spillhverdag. Kontrolleren og brytere
      kan søkes om som hjelpemiddel gjennom hjelpemiddelsentralen, sammen med andre spill-hjelpemidler. Ergoterapeut i kommunen
      kan bidra i kartlegging av behov for tilrettelegging og begrunnelse av søknad til NAV.


      Mulighetene i spillverdenen er mange, og det kommer stadig nye muligheter. Vi erfarer allikevel at mange gode gamle
      spill fungerer godt i dag, og at det ikke alltid er det nyeste spillutstyret som gir mest glede. Et eksempel på dette
      er eldre spillmaskiner med bevegelsessensorer.


      Frambu vil fortsette å tilby spill som aktivitet på våre kurs. Spill kan være en givende aktivitet, det kan være sosialt
      og minske ulikheter, og vi mener det er viktig å benytte seg av mulighetene for tilrettelegging.


      ## **FrambuTV**


      I epissode 9 av FrambuTV tok programlederne Anders Wold og Camilla Lambrechts opp temaet spilling. De intervjuet blant
      annet Azadmir om hans spillvaner, og prøvde hvordan Xbox Adaptive Controller fungerte på Nintendo Switch.


      ## **Nyttige nettsteder:**


      - Statped beskriver hvordan spill kan engasjere og motivere undervisningen i skolen. Her finner du tips til spill, og
      hvordan disse gir læringsutbytte knyttet til læreplanen: [https://www.statped.no/laringsressurser/teknologitema/spill-i-skolen/](https://www.statped.no/laringsressurser/teknologitema/spill-i-skolen/)

      - Sunnaas sykehus bruker dataspill i rehabilitering av nevrologiske skader, og har laget en oversikt over spill som
      trener ulike deler av kroppen. Studier viser at dataspill kan være svært motiverende, gi god treningseffekt og være
      avledende for smerter. På nettsiden de har utviklet kan du velge spill etter hvilken funksjon du ønsker å trene: [www.spilldegbedre.no](https://www.spilldegbedre.no/)

      - Kulturdepartementet har publisert en strategi for dataspill for perioden 2020-2022. Denne er laget for å løfte dataspill
      som fritidsaktivitet, næring og kulturuttrykk i årene som kommer. Dette gjelder også å tilrettelegge for en inkluderende
      spillkultur: [https://www.regjeringen.no/contentassets/42ac0925a3124828a2012ccb3f9e80c9/spillerom-dataspillstrategi-2020-2022.pdf](https://www.regjeringen.no/contentassets/42ac0925a3124828a2012ccb3f9e80c9/spillerom---dataspillstrategi-2020-2022.pdf)

      - Hos hjelpemiddelsentralen kan man søke på spillrelaterte hjelpemidler som blant annet xbox adaptive controller. Her
      er et eksempel: [https://www.hjelpemiddeldatabasen.no/r11x.asp?linkinfo=58764](https://www.hjelpemiddeldatabasen.no/r11x.asp?linkinfo=58764)

      - I England er det en privat organisasjon som arbeider for å gjøre spillverdenen tilgjengelig for alle gjennom bryterstyring
      og eye-gazing teknologi. De har mange gode forslag på hvordan man kan tilrettelegge på sin nettside og youtube-kanal:
      [https://www.specialeffect.org.uk](https://www.specialeffect.org.uk/)


      *Denne artikkelen ble sist oppdatert 23. mars 2023*


