    sentences:
    - '# Hvordan lytte, når talespråket mangler?


      Alle har en rett til å medvirke og bli hørt i det som angår deres hverdag. Men hva når kommunikasjonen foregår på andre
      måter enn vi er vant til?


      For ASK-språklige er det avgjørende å ha en egnet kommunikasjonsform og et nødvendig kommunikasjonshjelpemiddel for
      å kunne ytre seg, bli forstått og påvirke livssituasjonen sin.


      ## Hva må til?


      ### 1. En god kommunikasjonspartner


      En god kommunikasjonspartner legger til rette for samtaler. De viser positive forventninger, gir tid, lar personen ta
      initiativ og bruker personens kommunikasjonsformer i samspill. Det kan være tegn-til-tale, taktile tegn eller kommunikasjonsbøker
      og talemaskiner som inneholder tilstrekkelig vokabular for å samtale om ulike tema.


      ASK-språklige som er på et tidlig språklig utviklingsnivå , , har en kommunikasjonsform som må tolkes. Et kommunikasjonspass
      beskriver den ASK-språklige sin måte å kommunisere på. Det forklarer hvordan personer i miljøet rundt skal oppfatte,
      tolke, bekrefte og respondere på personens kommunikasjon. Hensikten er at alle i laget rundt skal forstå personens uttrykk
      og responderemest mulig likt. Dette vil tydeliggjøre og styrke den ASK-språklige sine uttrykk. I prosessen med å lage
      et kommunikasjonspass anbefaler vi å bruke [Inventory of Potential Communicative Acts (IPCA)](https://www.statped.no/ressurser-og-verktoy/ressurser/ipca-kartlegging-av-kommunikative-uttrykk/)
      som verktøy til å kartlegge kommunikative uttrykk.


      ### 2. Legg til rette for samtaler


      Det er lettest å få til samtaler når temaet er motiverende og interessant. Som kommunikasjonspartner har du ansvar for
      at samtalene over tid beveger seg langs disse utviklingslinjene:


      - Fra her og nå - til før og senere

      - Fra å benevne handling til aktiv samhandling med spørsmål og kommentarer

      - Fra enkel turtaking til mange turer, der ytringene bygger på hverandre

      - Fra å samtale rundt den ASK-språklige sitt fokus, til at begge/alle bidrar med sitt

      - Fra virkelighet til fantasi og tull og tøys

      - Fra at kommunikasjonspartneren har mest ansvar - til at ansvaret blir mer delt


      ### 3. Skape rom for spontale samtaler


      Hverdagssamtaler oppstår i ulike aktiviteter gjennom dagen. Grip sjansen når den byr seg og vær på utkikk etter situasjoner
      som kan være utgangspunkt for samtaler. For at dette skal være mulig må den ASK-språkliges kommunikasjonsform alltid
      være tilgjengelig.


      ### 4. Planlagte samtaler


      Andre samtaler kan være planlagte og ha en bestemt hensikt. Det kan for eksempel være barnesamtaler, utviklingssamtaler,
      elevundersøkelser, vurderingssamtaler, eller å få frem den ASK-språklige sin stemme i en sakkyndig vurdering eller et
      vedtak. Det kan også være at hen skal få fortelle meningen sin om et temaopplegg du holder på å planlegge, om innhold
      i undervisning eller annet den ASK-språklige er opptatt av.


      Samtalen kan struktureres og settes inn i bestemte rammer. Eksempelvis kan påstander svares ut med smilefjes, eller
      oppleste spørsmål med ja eller nei.


      - Samtalematten er en enkel og visuelt utformet metode for å føre en samtale om et på forhåndsbestemt tema. Samtalen
      foregår på en matte som er plassert på et bord. Øverst setter du opp en meningsskala, for eksempel liker, nøytral, liker
      ikke. Nederst, på midten, plasseres tema for samtalen, for eksempel gjøremål på skolen. På forhånd utarbeider du påstander
      med grafiske symboler eller skrift som representerer ulike elementer i temaet. Still åpne spørsmål og respekter den
      ASK-språklige sine svar Metoden kan også brukes og tilpasses påstandene i den ordinære elevundersøkelsen om skolemiljø.
      [Les mer om Samtalematten vg.region.se (åpnes i ny fane)](https://www.vgregion.se/ov/dart/lar-om-kommunikationsstod/uttrycka-asikter-med-samtalsmatta/)

      - « *Sånn vil jeg ha det* » er et støttemateriell for samtale om hvordan personen vil ha det på skolen og SFO/AKS, fritidsarenaer,
      hjemme og ved helsehjelp. For ASK-språklige kan påstandene bli opplest og de kan svare med JA eller NEI.Påstandene kan
      også tilrettelegges som grafiske symboler og brukes på en samtalematte med en meningsskala for JA, nøytral og NEI. [Les
      mer om Sånn vil jeg ha det saannviljeghadet.no (åpnes i ny fane)](https://saannviljeghadet.no/) .'
