      ### [Klagerettigheter](#Klage)


      Har du fått et vedtak fra oss som du mener er feil? Da kan du klage til Nav-enheten som skrev vedtaket. De vil vurdere
      saken din på nytt. Hvis de ikke er enig i klagen din, sender de den videre til Nav klageinstans.


      #### Klage på vedtak


      I vedtaket står det hvordan du går fram hvis du skal klage, hvem du skal klage til og klagefrist. Hvis du har spørsmål
      om vedtaket, kan du [kontakte oss](/kontaktoss) .


      [Send klage](https://klage.nav.no/nb/klage/PENSJONSOPPTJENING_VED_OMSORG_FOR_SYKE_ELDRE_OG_PERSONER_MED_FUNKSJONSNEDSETTELSER)
      [Ettersend dokumentasjon](https://klage.nav.no/nb/ettersendelse/klage/PENSJONSOPPTJENING_VED_OMSORG_FOR_SYKE_ELDRE_OG_PERSONER_MED_FUNKSJONSNEDSETTELSER)


      #### Anke vedtak


