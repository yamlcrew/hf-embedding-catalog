    ### [Hvor mye kan du få?](#hvor-mye)


    Du må selv betale for en del av de ortopediske skoene. Dette betaler du direkte til leverandøren.


    - Egenbetalingen for spesialsydde ortopediske sko til personer over 10 år er 741 kroner per par.

    - Egenbetalingen for spesialsydde ortopediske sko til barn under 10 år er 450 kroner per par.

    - Støtte til fabrikkproduserte ortopediske sko er 1 800 kroner per par. Du må betale det overskytende selv.


    Egenbetalingen inngår ikke i grunnlaget for frikort.


    #### Yrkesskade


    Trenger du ortopediske sko på grunn av en godkjent yrkesskade? Da vil du få refundert egenbetalingen ved å søke om refusjon
    første gangen du kjøper ortopediske sko. Etter dette er det egenbetaling.


    ### [Refusjon av reiseutgifter](#reiseutgifter)


    Nav dekker dine nødvendige reiseutgifter til ortopeditekniske verksteder innenfor helseregionen din. Du får dekket:


    - Billigste reisemåte med offentlig transport

    - Taxi eller lignende hvis helsetilstanden din krever det

    - Kilometergodtgjørelse ved bruk av privat bil.


    [Reiseutgifter](/reiseutgifter) Pengestøtte


    ## [Hvordan kan du få?](#hvordan)


    ### [Slik går du frem for å søke](#soknad)


    Første gang du trenger ortopediske sko skal en sykehuslege eller legespesialist fylle ut søknaden og sende den til et
    ortopedisk verksted som har rammeavtale med Nav. Det ortopediske verkstedet sender inn søknaden til Nav.


    Neste gang du har behov for ortopediske sko, fyller det ortopediske verkstedet ut søknaden og sender den til Nav.


    Disse verkstedene har rammeavtale med Nav


    Flere av leverandørene har i tillegg underavdelinger i alle landsdeler. Nav dekker nødvendige reiseutgifter til ortopediske
    verksteder innenfor helseregionen din. Du må selv undersøke hvilke leverandører som har underavdeling i din helseregion.


