    - 'Avtalespesialisten kan vurdere og behandle tilstander som ikke krever innleggelse. [Få mer informasjon om avtalespesialister.](https://www.helsenorge.no/behandlere/avtalespesialist/)


      ### Bruk tjenesten Velg behandlingssted


      I tjenesten Velg behandlingssted får du oversikt over behandlingssteder, behandlingstilbud og ventetider. Dette kan
      være nyttig når du skal velge behandlingssted. I tjenesten kan du


      - sammenligne forventede ventetider ved ulike behandlingssteder

      - se antall behandlinger utført ved et behandlingssted i løpet av et år


      [Gå til tjenesten Velg behandlingssted](https://www.helsenorge.no/velg-behandlingssted/)


      ### Ulike typer ventetider for behandling


      Hvor lenge ventetiden er for å få behandling kommer an på hvor du skal behandles og hva slags behandling du er henvist
      til. [Les mer om hvilke type ventetider du må forholde deg til.](https://www.helsenorge.no/velg-behandlingssted/ventetider/)


      ### Behandlingssteder i ulike trinn av helsehjelpen


      Du kan velge forskjellig behandlingssted i ulike trinn av helsehjelpen. Det vil si at vurdering av helsetilstanden din
      kan skje på ett behandlingssted, operasjon kan bli utført ved et annet, og rehabilitering kan mottas ved et tredje.
      Vær oppmerksom på at enkelte behandlingssteder selv vil utrede pasienter de skal behandle.


      Du kan ikke velge selv nivået på behandlingen. Det vil si om du for eksempel skal få behandling ved poliklinikk eller
      ved innleggelse.


      ### Kvalitetsindikatorer


      Mange pasienter ønsker å vite "hvor de er flinkest" når de skal velge behandlingssted. De nasjonale kvalitetsindikatorene
      kan gi deg informasjon om kvaliteten på helsetjenestene.


      [Se alle kvalitetsindikatorer på helsedirektoratet.no](https://www.helsedirektoratet.no/statistikk/kvalitetsindikatorer)


      [Få informasjon om rettighetene dine ved valg av behandlingssted](https://www.helsenorge.no/rettigheter/sykehus-og-spesialist/rett-til-nodvendig-helsehjelp/)


      [Du kan i noen tilfeller velge å motta behandling i utlandet.](https://www.helsenorge.no/behandling-i-utlandet/sykehusbehandling-og-andre-spesialisthelsetjenester-i-eos-land/)


      ### Få hjelp av en pasientrådgiver


      Hvis du ønsker råd og veiledning, kan du ringe pasientrådgiver på telefon 24 24 05 00. [Les mer om hva pasientrådgiverne
      kan hjelpe deg med.'
  - source_sentence: Hvilke dokumenter bør jeg samle før jeg tar kontakt med pasient- og brukarombodet?
    sentences:
    - '# Habilitering ved vansker knyttet til pubertet, seksualitet og identitet hos barn og unge med funksjonsnedsettelser


      Når et barn eller en ungdom med funksjonsnedsettelse har omfattende vansker knyttet til pubertet, seksualitet og identitet,
      kan fastlegen henvise til habiliteringstjenesten for barn og unge (HABU) for utredning samt veiledning og opplæring
      om forhold knyttet til kropp, pubertet, seksualitet og identitet.


      ### Henvisningsrutiner for helsepersonell


      SJEKKLISTE VED HENVISNING - HABILITERING FOR BARN OG UNGE Formålet med en sjekkliste er å bidra til at henvisningene
      har riktig og tilstrekkelig informasjon, slik at tjenestene kan gjøre en rettighetsvurdering på bakgrunn av «Prioriteringsveileder
      - Habilitering av barn og unge i spesialisthelsetjenesten». Sjekklisten nevner forhold som er av særlig viktighet for
      effektivt å planlegge utredning og videre oppfølging. Det forventes at det er gjort en tverrfaglig vurdering i kommunen
      før henvisning og at informasjon om denne utredningen følger henvisningen.


      - Pasientens navn, fødselsnummer, adresse og eventuelt telefonnummer.

      - Eventuelt behov for tolk; hvilket språk/dialekt.

      - Navn, telefonnummer og korrekt adresse til foresatte.

      - Angivelse av hvem som har foreldreansvar

      - Bekreftelse på foresattes samtykke til henvisning

      - Søsken, halvsøsken og andre i familiens omsorg. Angi navn, kjønn og alder.

      - Diagnose(r) på henvisningstidspunktet.

      - Aktuelle problemstillinger og ønsket målsetting med henvisningen.

      - Aktuelle funn og resultater fra medisinske undersøkelser.

      - Legemidler som er i bruk.

      - Sentrale instanser (helsestasjon/skolehelsetjeneste, fysio-/ergoterapitjeneste, barnehage, skole, avlastning, PPT,
      BUP, barneverntjenesten), med navn på kontaktperson og telefonnummer.

      - Legg ved aktuelle rapporter fra de aktuelle instansene.

      - Er det opprettet kommunal koordinator? I så fall; oppgi navn og telefonnummer.

      - Er det opprettet ansvarsgruppe?

      - Er det utarbeidet individuell plan? I så fall oppgi navn og telefonnummer til koordinator.

      - Er det aktuelt med arbeid knyttet til Helse- og omsorgstjenesteloven kapittel 9 om rettssikkerhet ved bruk av tvang
      og makt overfor enkelte personer med utviklingshemming? Er i så fall overordnet faglig ansvarlig kjent med at det er
      sendt henvisning?

      - Hvis pasienten henvises av annen lege en fastlege; oppgi fastlegens navn, adresse og telefonnummer.

      - Navn og kontaktinformasjon til medhenviser (hvis ikke lege er den som skal stå for løpende kontakt med habiliteringstjenesten).


      [https://helsedirektoratet.no/retningslinjer/henvisningsveileder](https://helsedirektoratet.no/retningslinjer/henvisningsveileder)


      [Send henvisninger til Oslo universitetssykehus til henvisningsmottaket](/fag-og-forskning/samhandling-helsekompetanse-og-likeverdige-helsetjenester/henvisninger-til-ous)


      ## Før


      ## Før Vis mer


      Før du kommer til avtale i HABU bør du tenke gjennom, og gjerne notere, det du synes er aktuelt om utviklingen når det
      gjelder:


      - kommunikasjon og samhandling med jevnaldrende og voksne

      - pubertetstegn

      - seksuell funksjon

      - seksuell atferd


      ## Under


      ## Under Vis mer


      Når du kommer til HABU, vil du bli tatt imot og gitt informasjon om hva som skal skje og hvem du vil møte. Som regel
      vil du møte fagpersoner med ulik bakgrunn, for eksempel lege, psykolog, vernepleier eller sykepleier. En utredning kan
      være satt sammen av samtaler, tester og observasjoner. Som ledd i en utredning kan det være aktuelt å gjøre observasjon
      av barnet eller ungdommen i hjemmemiljø,  barnehage og skole.


      I løpet av en utredning kan det komme fram behov for å gjennomføre undersøkelser ved andre avdelinger i sykehuset. HABU
      vil i så fall sørge for en videre henvisning.


      ## Etter


      ## Etter Vis mer


      Det blir gitt tilbakemelding til foresatte, barn, ungdom og til den som har henvist. Barn og ungdom har rett til tilpasset
      informasjon om egen helsetilstand.


      ## Kontakt


      ## Ullevål sykehus Bygg 29 Seksjon for nevrohabilitering - barn, Ullevål


      ### Oppmøtested


      Bygg 9


      ### Ullevål sykehus Bygg 29


      Kirkeveien 166


      0450 Oslo


      [Finn frem](/steder/ulleval-sykehus/ulleval-sykehus-bygg-29)'
    - 'Dette har fungert godt i flere eksempler fra forskningen.


      Forskning viser blant annet at når foreldre ble involvert i barnegrupper for barn med angstlidelser, økte det effekten
      på barnas mestringsstrategier. I grupper med kronisk syke barn gjorde parallelle foreldregrupper at effekten fra gruppene
      vedvarte.


      - I Sverige har man evaluert et tiltak for søsken der de hadde parallelle grupper for småsøsken i førskolealder og foreldregrupper.
      Det ble holdt fem samlinger over fem uker, og foreldregruppen hadde samme tema som barnegruppa og tok opp spørsmål barna
      hadde hatt i sine grupper. Foreldrene kom med positive tilbakemeldinger til opplegget.


      Oppsummert finnes det få studier på betydningen av foreldreinvolvering i gruppetiltak, og det er behov for mer forskning.
      Men det er foreløpige indikasjoner på at parallelt foreldrearbeid kan øke effekten av intervensjonen og gjøre intervensjonen
      mer varig.


      ##### **Mangelfull kunnskap**


      Målet med Søskenprosjektet er å styrke kommunikasjonsferdighetene til,- og gi nye og gode samtaleerfaringer mellom foreldre
      og søsken. Dette skal handle om diagnosen det gjelder, men også om følelsesmessige erfaringer og utfordringer relatert
      til et annerledes søskenliv.


      - Søsken ser ut til å ha mangelfull kunnskap om bror eller søsters diagnose, og det skaper misforståelser. Derfor er
      det viktig med alderstilpasset informasjon. Forskning tyder på at hvordan søsken har det kan henge tett sammen med i
      hvilken grad de får kunnskapsbasert informasjon om diagnosen. Det er ikke noe man gir én gang, men en prosess som går
      over tid, avhengig av alder, utvikling og hvilket behov de har for å vite, sier Haukeland.


      ##### **Foreldregrupper og fellesøkter**


      I foreldregruppene i Søskenprosjektet ble det lagt vekt på å lære hvordan man skulle lytte til barna og hvordan samtalen
      kan gå videre.


      - Vi har brukt eksempelvideoer og rollespill, foreldrepermer med skriftlig informasjon, dialog og erfaringsutveksling
      og felles diskusjon rundt spørsmål barnegruppa har kommet med. Foreldrene har også hatt mulighet til å forberede seg
      på å snakke med barna om disse vanskelige tingene.


      I fellesøktene har barna forberedt spørsmål eller utfordringer til foreldrene, der de voksne instrueres i å lytte, bekrefte
      og utforske. De skal tenke over hvorfor et spørsmål kommer, og kunne hjelpe barna slik at de får svar på nøyaktig det
      de lurer på.


      Foreldrene har blitt veiledet av gruppeledere, og skriver kontrakt om å følge opp samtalen hjemme på et konkret tidspunkt.


      ##### **Mange spørsmål**


      Barna har hatt mulighet til å spørre om ting de ikke tidligere har turt å sette ord på, og de har fått svar. De kan
      lure på om hvordan søsteren eller broren fikk en sykdom, om hvordan det var for foreldrene, om det er mulig at de selv
      kan få det samme eller om søsknene kommer til å dø tidligere. De kan også si hva de skulle ønske var annerledes.


      - Foreldrene lærer å ikke gå rett på å forklare eller gi informasjon som er vår naturlige reaksjon, men først sjekke
      hva som kan ligge bak spørsmålet. Vi viser dem ulike vendinger en samtale kan ta ut fra hva man sier og hvordan man
      svarer på ting. Dette skaper en god mulighet for videre dialog og gjør terskelen for å snakke om de vanskelige tingene
      litt lavere.


      - Foreldrene ønsker veldig gjerne å være gode samtalepartnere, og de tenker på og bekymrer seg for hvordan det går med
      søsken. De drar nytte av å utveksle erfaringer og lærer mye av å høre hvordan andre håndterer det.


      Haukeland forteller at foreldre ofte opplever det først som litt kunstig, men samtidig synes de aller fleste at det
      er meningsfylt og nyttig å måtte sitte ned og prate om disse tingene.


      - Det oppklarer misforståelser, og noen konkrete problemer blir faktisk løst. Foreldre er ofte overrasket over det barna
      ønsker å ta opp, men de får øvd seg på å være mottakelige for det de kommer med. De får praktisk trening på å svare
      på spørsmål og i tilbakemeldingene er det en gjenganger at både foreldre og barn ønsker mer tid til å snakke med hverandre.'
    - '# Pasient- og brukarombodet


      Er du ikkje nøgd med helsetenestene, eller har spørsmål om rettane dine, kan du få hjelp og råd frå pasient- og brukarombodet.
      Kven som helst kan ta kontakt.


      ## Kva er pasient- og brukarombodet?


      Pasient- og brukarombodet skal arbeide for å ivareta pasientens og brukarens behov, interesser og rettssikkerheit. I
      tillegg skal dei bidra til å betre kvaliteten i tenestene.


      Om du er misnøgd med helsetenestene du har motteke eller ikkje fekk den helsehjelpa du trong, kan du kontakte pasient-
      og brukarombodet.


      Pasient- og brukarombodet jobbar med saker innafor offentlege helse- og omsorgstenester. Dette gjeld òg tannhelse.


      ## Kva kan du få hjelp med?


      Pasient- og brukarombodet kan gje råd og informasjon om rettar du har i helsetenesta.


      Pasient- og brukarombodet kan blant anna hjelpe deg med:


      - Informasjon om rettar du som pasient har

      - Tydeleggjere ting som er vanskeleg å forstå

      - Finne ut av kva som er lurt å ta tak i først

      - Finne ut kven det er lurt å kontakte

      - Formulere og formidle spørsmål, tilbakemeldingar og klagar

      - Korleis du klagar på behandling eller avgjerder om din rett til helse -og omsorgshjelp

      - Å delta i møte med tenesta

      - Korleis du søker om erstatning


      ## Kven kan få hjelp?


      Alle kan kontakte pasient og brukarombodet og tenesta er gratis. Du treng ikkje tilvising for å ta kontakt. Pasient-
      og brukarombodet har teieplikt og du er anonym om du ønskjer det.


      Om du er usikker på om du kan få hjelp av pasient- og brukarombodet, kan du uansett ta kontakt for å diskutere saken
      din.


      ## Finn ditt lokale ombodskontor


      Pasient- og brukarombodet har kontor 15 ulike stader i Noreg. Kvart kontor leiast av eit lokalt ombod. Ring 40 50 16
      00, eller sjå liste over dei ulike kontora og korleis du kan kontakte dei på [ombodet sine nettsider.](https://www.pasientogbrukerombudet.no/behov-for-a-snakke-med-oss)


      ## Kontakt Pasient- og brukarombodet


      [40 50 16 00](tel:+4740501600)


      Kontakt oss om du har erfaringar eller spørsmål du ønskjer å ta opp.


      ## pasientogbrukerombudet.no


      Sjå nettsidane til Pasient- og brukarombodet for meir informasjon, eller for å finne ditt lokale kontor.


      [pasientogbrukerombudet.no (pasientogbrukerombudet.no)](https://www.pasientogbrukerombudet.no/)


      ## Helse- og omsorgsdepartementet (lovdata.no)


      Pasient- og brukarrettigheitsloven innehalder rettsreglar om rettar pasientar og brukarar har overfor helse- og omsorgstenesten.


      [Kapittel 8: Pasient- og brukerombud (lovdata.no)](https://lovdata.no/dokument/NL/lov/1999-07-02-63#KAPITTEL_9)


      Innhaldet er levert av [Pasient- og brukarombodet](/nn/samarbeidspartnere/#pasient-og-brukarombodet)


      Slik refererer du til innhaldet Pasient- og brukarombodet. Pasient- og brukarombodet. [Internett]. Oslo: Helsedirektoratet;
      oppdatert onsdag 6. juli 2022 [henta tirsdag 9. desember 2025]. Tilgjengeleg frå: [https://www.helsenorge.no/nn/rettigheter/pasient--og-brukarombodet/](https://www.helsenorge.no/nn/rettigheter/pasient--og-brukarombodet/)


      Sist oppdatert onsdag 6. juli 2022'
  - source_sentence: '- Hvilke tiltak kan kommunen tilby etter utredningen hos HABU?'
    sentences:
    - '# Habilitering ved kommunikasjons- og språkvansker hos barn og unge med funksjonsnedsettelse


      Når eit barn med funksjonsnedsetting ikkje utviklar språk og kommunikasjon slik det er forventa, og det vekker bekymring
      hos føresette, fastlegen eller andre som kjenner barnet godt frå for eksempel barnehage eller skule, kan barnet bli
      tilvist til habiliteringstenesta for barn og unge (HABU).


      ### Tilvisingsrutinar for helsepersonell


      Formålet med ei sjekkliste er å bidra til at tilvisingane har rett og tilstrekkeleg informasjon, slik at tenestene kan
      gjere ei rettsvurdering på bakgrunn av «Prioriteringsrettleiar - Habilitering av barn og unge i spesialisthelsetenesta». '
    - '# Habilitering ved syndromer hos barn og unge som påvirker funksjon og utvikling


      Det finnes et stort antall syndrom som på forskjellige måter påvirker utvikling og funksjon hos barn og unge. De fleste
      av disse syndromene er sjeldne. Dersom fastlege, foresatte eller andre som kjenner barnet godt mistenker at et barn
      eller en ungdom har et syndrom, kan legen henvise til habiliteringstjenesten for barn og unge (HABU).


      ## Henvisning og vurdering


      Barnet eller ungdommen kan også henvises til HABU når det er bekreftet at hun eller han har et syndrom.


      ### Henvisningsrutiner for helsepersonell


      SJEKKLISTE VED HENVISNING - HABILITERING FOR BARN OG UNGE Formålet med en sjekkliste er å bidra til at henvisningene
      har riktig og tilstrekkelig informasjon, slik at tjenestene kan gjøre en rettighetsvurdering på bakgrunn av «Prioriteringsveileder
      - Habilitering av barn og unge i spesialisthelsetjenesten». Sjekklisten nevner forhold som er av særlig viktighet for
      effektivt å planlegge utredning og videre oppfølging. Det forventes at det er gjort en tverrfaglig vurdering i kommunen
      før henvisning og at informasjon om denne utredningen følger henvisningen.


      - Pasientens navn, fødselsnummer, adresse og eventuelt telefonnummer.

      - Eventuelt behov for tolk; hvilket språk/dialekt.

      - Navn, telefonnummer og korrekt adresse til foresatte.

      - Angivelse av hvem som har foreldreansvar

      - Bekreftelse på foresattes samtykke til henvisning

      - Søsken, halvsøsken og andre i familiens omsorg. Angi navn, kjønn og alder.

      - Diagnose(r) på henvisningstidspunktet.

      - Aktuelle problemstillinger og ønsket målsetting med henvisningen

      - Aktuelle funn og resultater fra medisinske undersøkelser.

      - Legemidler som er i bruk.

      - Sentrale instanser (helsestasjon/skolehelsetjeneste, fysio-/ergoterapitjeneste, barnehage, skole, avlastning, PPT,
      BUP, barneverntjenesten), med navn på kontaktperson og telefonnummer.

      - Legg ved aktuelle rapporter fra de aktuelle instansene.

      - Er det opprettet kommunal koordinator? I så fall; oppgi navn og telefonnummer.

      - Er det opprettet ansvarsgruppe?

      - Er det utarbeidet individuell plan? I så fall oppgi navn og telefonnummer til koordinator.

      - Er det aktuelt med arbeid knyttet til Helse- og omsorgstjenesteloven kapittel 9? (Rettssikkerhet ved bruk av tvang
      og makt overfor enkelte personer med psykisk utviklingshemning)? Er i så fall overordnet faglig ansvarlig kjent med
      at det er sendt henvisning?

      - Hvis pasienten henvises av annen lege en fastlege; oppgi fastlegens navn, adresse og telefonnummer.Navn og kontaktinformasjon
      til medhenviser (hvis ikke lege er den som skal stå for løpende kontakt med habiliteringstjenesten).


      [https://helsedirektoratet.no/retningslinjer/henvisningsveileder](https://helsedirektoratet.no/retningslinjer/henvisningsveileder)


      ## Før


      ## Før Vis mer


      Før du kommer til avtale for utredning i HABU bør du tenke gjennom, og gjerne notere, det du synes er aktuelt om barnets/ungdommens
      utvikling og funksjon når det gjelder:


      - språk, kommunikasjon og samspill med andre barn og voksne

      - læring og forståelse

      - bevegelse/motorikk og lek

      - dagliglivets aktiviteter - slik som spising, forflytning og påkledning


      Det er ønskelig at to voksne følger til avtalen. Dersom det er andre enn foresatte som følger barnet eller ungdommen,
      må dette være personer som kjenner ham eller henne godt. Undersøkelse hos lege og fysioterapeut kan innebære at barnet
      eller ungdommen er mest mulig avkledd. Det kan derfor være fint å ta med for eksempel en shorts og en ermeløs trøye.


      ## Under


      ## Under Vis mer


      Når dere kommer til HABU, vil dere bli tatt imot og gitt informasjon om hva som skal skje og hvem dere vil møte. Som
      regel vil dere møte fagpersoner med ulik bakgrunn, for eksempel lege, sykepleier, vernepleier, ergoterapeut, fysioterapeut,
      psykolog og sosionom. Utredningen kan være satt sammen av samtaler, observasjoner og undersøkelser av barnet eller ungdommen.
      Noen ganger blir det gjennomført en observasjon av barnet eller ungdommen i aktiviteter i hjemmemiljø, barnehage, skole.
      I løpet av utredningen kan det komme fram behov for å gjennomføre undersøkelser ved andre avdelinger i sykehuset. HABU
      vil i så fall sørge for en videre henvisning.


      ## Etter


      ## Etter Vis mer


      Foresatte vil få informasjon om resultatene fra utredningen. Barn og unge har også rett til tilpasset informasjon om
      egen helsetilstand.


      Det er kommunen/bydelen du bor i som har ansvar for videre tiltak og tilrettelegging. I tillegg kan det være behov for
      oppfølging fra HABU i kortere eller lengre perioder. Behovet for oppfølging vil bli vurdert i samråd med foresatte og
      de som har ansvar for tilbudet i kommunen/bydelen.


      Det blir utarbeidet en rapport som oppsummerer utredningen. Dersom det er aktuelt med videre oppfølging i HABU, vil
      dette komme fram i rapporten. Rapporten blir sendt til dere som foresatte og til den som har henvist.


      Barn og unge med sjeldne sykdommer og syndromer kan også få tilbud om oppfølging av spesialister ved regionale og/eller
      nasjonale enheter.


      ### Nyttige lenker


      [Frambu senter for sjeldne diagnoser](http://www.frambu.no/)


      [Nasjonal kompetansetjeneste for sjeldne diagnoser](https://helsenorge.no/sjeldne-diagnoser)


      [E-læringsportal for sjeldne diagnoser](https://www.sjelden.no/)


      ## Kontakt


      ## Sykehuset Østfold Kalnes Barne- og ungdomshabilitering


      ### Sykehuset Østfold Kalnes


      Kalnesveien 300


      1714 Grålum


      [Finn frem](/steder/sykehuset-ostfold-kalnes)'
    - 'Trenger du hjelp til utfylling av søknaden? Kontakt Pasientreiser på telefon 05515.


      ## Opplastning av dokumentasjon


      All dokumentasjon lastes opp til slutt i søknaden.


      Les mer


      Fyller du ut skjemaet på telefon eller nettbrett, kan du enten hente opp et bilde fra bildebiblioteket på enheten, eller
      ta et bilde som du laster opp direkte i søknaden. Hvis du bruker datamaskin når du fyller ut søknaden, og du har nødvendig
      dokumentasjon lagret på maskinen, laster du opp dokumentasjonen fra der den er lagret. Når du klikker på «Last opp fil»
      i skjemaet, kan du bla deg frem til riktig bilde og velge det. Hvis du ikke har dokumentasjon lagret på datamaskinen
      din, kan du enten skanne eller ta bilde av dokumentasjonen med et kamera eller en mobiltelefon. Du må deretter lagre
      bildet på datamaskinen din. Alle vedlegg du laster opp vises i en forhåndsvisning. Før du lagrer det opplastede vedlegget,
      må du bekrefte at du ser et tydelig bilde av det, og at dokumentet er riktig for søknaden din. Hvis vedlegget fremstår
      som uleselig, må du prøve på nytt med et tydeligere bilde. Vedlegg som ikke kan leses, vil forsinke saksbehandlingen.
      Du kan laste opp pdf- og jpeg-filer. Hvis du har glemt å laste opp dokumentasjon på noe, vil du få beskjed om dette
      før du sender inn søknaden.


      #### Gjenbruk av dokumentasjon


      Hvis du har et dokument som er gyldig i en lengre periode, for eksempel en attest fra behandleren din, kan du gjenbruke
      dette i senere søknader. Hvis du klikker på «Hent tidligere brukt bilag» i samme felt som du har lastet opp vedlegget
      tidligere, vil vedlegget ligge tilgjengelig, slik at du kan velge det.


      #### Ettersende dokumentasjon


      Du kan ettersende dokumentasjon i søknaden din på Helsenorge, eller så kan du [ettersende dokumenter digitalt via en
      sikker meldingstjeneste](https://www.pasientreiser.no/pasientreiser-hf/kontakt-oss/#kontaktinformasjon) .


      Du kan også ettersende dokumentasjon per post, hvis du ønsker det. Husk å merke dokumentasjonen med navn og saksnummer.
      Dokumentasjon ettersendes til: Pasientreiser HF Postboks 2533 Kjørbekk 3702 Skien


      ## Etter innsending


      Når du har sendt inn søknaden, får du opp en kvittering.


      Les mer


      Den innsendte søknaden vil lagres under overskriften «Søknader» på forsiden. Du kan klikke på den innsendte søknaden
      for å se informasjon om søknaden, som for eksempel saksnummer og hva du har søkt om å få dekket. Du kan også følge med
      på statusen på søknaden din.


      Når søknaden er ferdig behandlet, får du en sms eller e-post med beskjed om at du har mottatt et vedtak. Du må logge
      deg inn på Helsenorge og gå til "Pasientreiser" for å finne vedtaket ditt. Vedtaket finner du i søknadsoversikten ved
      å klikke på søknaden du har sendt inn. Når du har åpnet søknaden din, må du klikke på pdf-filen for å lese selve vedtaket.


      Hvis du har søkt på vegne av noen andre, må du gå inn på deres profil og velge "Pasientreiser" for å finne vedtaksbrev.


      ### Kontakt Pasientreiser


      [05515](tel:+4705515)


      Kontakt oss ved spørsmål om utfylling av reiseregningsskjema, dekning av reiseutgifter eller bestilling av din pasientreise.


      [Kontakt oss](https://www.helsenorge.no/pasientreiser/om/kontakt/)


      ## pasientreiser.no


      Er du helsepersonell eller transportør? Gå til pasientreiser.no


      [pasientreiser.no (pasientreiser.no)](https://pasientreiser.no/)


      Innholdet er levert av [Pasientreiser HF](/samarbeidspartnere/#pasientreiser-hf)


      Slik refererer du til innholdet Pasientreiser HF. Søk digitalt om reisestøtte for reisen. '
