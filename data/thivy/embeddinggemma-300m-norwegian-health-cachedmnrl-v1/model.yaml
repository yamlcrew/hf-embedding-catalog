  - '# Språk i barnehagen - mye mer enn bare prat


    ## Arbeid med barnehagens språkmiljø og barnas språk


    Barnehagen skal bidra til at barn leker med språk, symboler og tekst og stimulere til språklig nysgjerrighet, bevissthet
    og utvikling. Barn lærer språk best gjennom å være språklig aktive. (Rammeplanen)


    ### Barn trenger erfaring i å bruke språket


    Tidlig og god språkstimulering er en viktig del av barnehagens innhold. Personalet har ansvar for å invitere alle barna
    med i språklige aktiviteter, både små og store barnehagebarn og barn med ulike språklige ferdigheter. De voksne må legge
    til rette for at alle får varierte og positive erfaringer med å bruke språket som kommunikasjonsmiddel, som redskap for
    egne tanker og for å uttrykke egne meninger og følelser.


    ### De voksne skal møte barna på deres nivå og arena


    Personalet skal tilpasse de språklige aktivitetene til barnas språklige ferdigheter, interesser og initiativ. Barn lærer
    når de holder på med noe de er opptatt av og interessert i. Alle barn skal oppleve at noen lytter til og viser interesse
    for det de sier og gir uttrykk for hver dag. Det sentrale er hvordan personalet kan fremme god språkutvikling gjennom
    de vanlige aktivitetene i barnehagehverdagen, og dette er derfor viet stor plass i veilederen. Arbeid med språk i mindre
    og atskilte grupper, ofte kalt språkgrupper, er et supplement og en viktig del av et godt tilbud for mange barn. Det kan
    likevel ikke erstatte systematisk språkstimulering som en del av barnehagens hverdagsaktiviteter.


    ### Arbeid med språk er en integrert del av barnehagehverdagen


    Arbeidet med omsorg, danning, lek, læring, sosial kompetanse og kommunikasjon og språk skal ses i sammenheng og samlet
    bidra til barns allsidige utvikling. (Rammeplanen)


    Barna skal oppleve meningsfulle sammenhenger i hverdagen. Språk og samhandling blir for eksempel en naturlig del av leken
    i sandkassa og fellesopplevelsene på tur til butikken. Personalet skal fremme tillit mellom barna og de voksne og barna
    imellom slik at barna kjenner seg trygge og kan oppleve glede ved å kommunisere og bruke språket sitt.


    ### Hele barnehagehverdagen er arena for å bruke språket


    En dag i barnehagen består av utallige hverdagssituasjoner der barna kan bruke språket aktivt, og et godt språkstimulerende
    miljø er preget av at personalet bruker språket i samspill med barna hele dagen. De voksnes innsats er viktig, og de er
    språkmodeller for barna. Personalet skal også legge til rette for språklig samhandling barna imellom. Rundt matbordet
    går for eksempel samtalen mellom barna og de voksne, og i leken bruker barna språket når de kommuniserer med hverandre.
    I garderoben bruker de voksne og barna navn på klærne og snakker om det de gjør, og de snakker sammen om felles opplevelser
    eller om noe som skal skje senere på dagen. Det meste og viktigste av språkstimuleringsarbeidet i barnehagen skjer gjennom
    slike hverdagsaktiviteter, og ulike innfallsvinkler og metoder kan være egnet til å engasjere barna i språklige aktiviteter.


    Barnehagen må sørge for at alle barn får varierte og positive erfaringer med å bruke språket som kommunikasjonsmiddel,
    som redskap for tenkning og som uttrykk for egne tanker og følelser. (Rammeplanen)


    ### Arbeidet med språk må være systematisk


    Arbeidet med språk i barnehagen skal være kunnskapsbasert, reflektert, planlagt, begrunnet, organisert, målrettet og helhetlig.
    Denne delen av veilederen er skrevet for å støtte det systematiske arbeidet med språk. Et reflektert blikk på den pedagogiske
    praksisen øker bevisstheten hos dem som arbeider med språkstimulering. Det gir anledning til å utvikle ny kunnskap og
    styrker kvaliteten på arbeidet. Under overskriften *Forslag til refleksjon og samarbeid* blir det gitt eksempler på innhold
    i dette arbeidet. I tillegg kan spørsmålene og oppgavene være til hjelp når personalet skal velge hva de vil konsentrere
    innsatsen om, og hvordan de vil tilrettelegge språkarbeidet ut fra barnas og barnehagens behov lokalt.


    ### Kollegaer kan gjøre hverandre gode


    Ansatte som samarbeider, kan lære av hverandre, og kollegaer som støtter hverandre, kan oppnå høyere kvalitet på arbeidet.
    Det er viktig å gå inn for å skape et åpent samarbeidsklima basert på en grunnleggende tanke om at alle vil hverandre
    vel. Noen er trygge i rollen sin og synes for eksempel at det er helt greit at andre observerer dem når de snakker med
    grupper av barn eller foreldre. Andre trenger trening før de kjenner seg komfortable i slike roller. Når kollegaer skal
    gi hverandre tilbakemeldinger, kan det være hensiktsmessig å inngå avtaler om en eller et par konkrete ting som skal være
    i søkelyset. Det kan for eksempel dreie seg om hvordan og i hvilken grad den voksne tilpasser språket sitt til barnet
    eller barna, eller hvordan han eller hun forklarer nye ord og bruker dem i samtaler med barna. Pass alltid på at slike
    tilbakemeldinger inneholder noe positivt. I tillegg er det nyttig å peke på noe som det er mulig å arbeide videre med
    for å styrke kompetansen.


    ### Det kan være en utfordring å få tiden til å strekke til


    De aller fleste barnehager driver systematisk arbeid med språk, men mange ansatte gir uttrykk for at det er en utfordring
    å få nok tid til dette viktige arbeidet i en travel barnehagehverdag. Det kan kanskje være en hjelp å tenke at arbeid
    med språk ikke er noe som kommer i tillegg til alt det andre, men at det tvert imot skal være en naturlig del av det daglige
    samværet med barna. Alle hverdagens situasjoner og aktiviteter kan gi barna gode muligheter til å være språklig aktive.


    ### Det er nyttig å konsentrere seg om det mest sentrale


    Ingen kan klare å gjøre alt hele tiden. Derfor er det viktig å konsentrere innsatsen om det som vi vet har god språkstimulerende
    virkning. Veilederen omhandler av den grunn tiltak som forskning viser har god effekt. Barn har godt språklig utbytte,
    både på kort og lang sikt, av å være i et miljø der de får rik anledning til å utvide ordforrådet sitt og får god mulighet
    til å delta i språkutviklende samtaler. Flere studier viser i tillegg sammenheng mellom tidlige erfaringer med bøker og
    lesing og barns språklige, og senere skriftspråklige, utvikling.


    Gjennom dialog og samspill skal barna støttes i å kommunisere, medvirke, lytte, forstå, og skape mening. Barnehagen skal
    anerkjenne og verdsette barnas ulike språk og kommunikasjonssuttrykk. (Rammeplanen)


    Denne delen av veilederen omfatter derfor:


    - språkutviklende samtaler

    - språkutviklende fortellinger

    - bruk av språk i barnas aktiviteter og opplevelser

    - språktilegnelse gjennom lek

    - bøker og språklig bearbeiding av innholdet

    - arbeid med ord og begrepsforståelse

    - språklig bevissthet og skriftspråkstimulering'
  - '# - Slik forebygger du skolefravær med oppdagerkompetanse


    Hva kan du gjøre for å forebygge at elever utvikler skolefravær? Oppdagerkompetanse er et stikkord, mener rådgiver Kristine
    Damsgaard i Statped.


    - En gjenganger i sakene jeg er inne i, er foreldre som forteller om ulike diffuse vansker allerede mens barnet gikk i
    barnehagen. For de fleste barna ble vanskene betydelig større etter skolestart og i tidlige skoleår, sier Damsgaard.


    Kristine Damsgaard jobber hovedsakelig med elever som har komplekse nevrodiagnoser (kombinasjoner av f.eks. ADHD, Tourettes
    syndrom, autisme og DLD) som går i ungdoms- og videregående skole. Elevene har gradvis utviklet ulike faglige og sosiale
    vansker, noe som igjen har ført til skolefravær.


    - Jeg er opptatt av mulighetene for å forebygge. Hvordan kan mulige nevrodiagnoser se ut i førskolealderen? Hvordan kan
    barnehagens informasjon og kompetanse sikres overført til skolen ved skolestart? Og hva bør læreren være oppmerksom på
    de første skoleårene?


    - Jeg er opptatt av mulighetene for å forebygge. Hvordan kan mulige nevrodiagnoser se ut i førskolealderen?


    Kristine Damsgaard


    Hun mener barnehagelærere og lærere har en enormt viktig rolle. Stikkordet er oppdagerkompetanse - kompetanse til å se
    og oppdage tidlige tegn på sårbarhet for å forebygge fagvansker, sosiale vansker og utenforskap i form av skolefravær.
    Jo tidligere vanskene oppdages, jo lettere er det å gjøre noe med dem.


    ## Kristines råd til barnehager for å forebygge skolefravær:


    Sørg for at pedagoger i barnehagen har kunnskap om ulike nevrotilstander, og hvordan dette kan fremstå i tidlige år, før
    det foreligger diagnoser.


    Vær oppmerksom på barn som


    - bruker lengre tid på tilvenning enn vanlig

    - gråter når foresatte går, lengre enn vanlig/alltid

    - det er vanskelig å tilfredsstille, sutrer/gråter mye, er sjelden fornøyde

    - er vanskelige å trøste

    - strever sosialt, mer enn vanlig for alder

    - fremstår som mer engstelige enn vanlig

    - fremstår som mer stille, forsiktige/sjenerte enn vanlig

    - fremstår som mer rigide enn normalt ut ifra alder

    - strever med overganger, mer enn vanlig

    - strever med å sove i barnehagen og/eller hjemme

    - strever med mat, spiser lite, liker få ting

    - har utviklingsmessige forsinkelser knyttet til motorikk, språk, lek

    - fremstår som svært passive

    - er svært urolige/aktive, mer enn normalt ut ifra alder

    - klager over «vondter» man ikke finner medisinsk årsak til

    - ikke vil i barnehagen

    - utsettes for mobbing/krenkelser


    ## Kristines råd ved overgang til skolen for å forebygge skolefravær:


    - Sørg for god overføring av kunnskap før og ved skolestart. Skolen bør få kjennskap til alt barnehagen vet om hva barnet
    trenger, hva som fungerer og hva barnehagen har gjort.

    - Kartlegg og dokumenter hva dere mener barnet vil trenge før skolestart, ved skolestart og i tiden etterpå.

    - Beskriv hva barnehagen gjør for å legge til rette.

    - Si noe om hva dere er særlig bekymret for med hensyn til overgangen og skole.

    - Beskriv barnets styrker og interesser.

    - Start tidlig nok. For noen kan det bety å bruke hele vårhalvåret.

    - Bruk den tiden barnet trenger - tenk skreddersøm.

    - Legg opp til flere besøk, bli kjent med skoleveien, skolegården, ganger, wc og klasserom.

    - La barnet få møte sin lærer og andre voksne, start relasjonsbyggingen før skolestart.

    - Sørg for at barnet får en plass i klasserommet nær venner/barn eleven er trygg på.


    ## Kristines råd til lærere for å forebygge skolefravær


    - Bygg oppdagerkompetanse. Kjenn til normal utvikling og avvik fra denne. Hva kjennetegner de vanligste nevrodiagnosene
    (ADHD, TS, Autisme og DLD)? Kjenn til overlapp mellom disse og hvordan elever kamuflerer og maskerer.

    - Vær ekstra oppmerksom på første trinn. Det er mye nytt for elevene. Mange som senere utvikler skolefravær opplevde å
    komme til kort allerede i den tidlige begynneropplæringen i lesing. Ofte oppfatter ikke skolen at de strever faglig, og
    etter hvert faller de langt bak.

    - Jobb med relasjonskompetanse. Lærerens evne til å bygge relasjoner er ofte avgjørende for trivsel og trygghet for de
    sårbare elevene.

    - Jobb med å skape tilhørighet for elevene. For de sårbare elevene er dette ekstra viktig.

    - Kjenn viktigheten av vennskap og at dette kan være ekstra utfordrende for sårbare barn.

    - Kjenn til viktigheten av daglig mestring både faglig og sosialt. Mestring kommer før motivasjon, og manglende mestring
    både faglig og sosialt er som regel en faktor når elever strever med å møte på skolen.

    - Vær opptatt av elevens stemme. Sjekk om det du tror faktisk stemmer. Små barn, både i barnehage og skole, skal høres,
    og de vil ofte kunne fortelle mye om hva som er vanskelig eller ubehagelig for dem.'
