      कानुन, भाग ३ मा पारिवारिक कानुन, भाग ४ मा सम्पत्तिसम्बन्धी कानुन, भाग ५ मा करार तथा दायित्वसम्बन्धी कानुन र भाग ६ मा
      निजी अन्तर्राट्रिय कानुनसम्बन्धी कानुनी व्यवस्था रहेको छ । यी कानुनका केही अंशहरू यसप्रकार रहेका छन् : बिस वर्ष उमेर
      पुगेपछि मात्र विवाह गर्न पाइने छ । पुरुष र महिला दुवैको मन्जुरी बिना भएको विवाह बदर हुने छ । हाडनाता करणीमा सजाय हुने
      नाताका व्यक्तिबिच भएको विवाह बदर हुन्छ। कुनै पुरुषसँगको सम्पर्कबाट महिलाले गर्भधारण गरी शिशु जन्मिएको प्रमाणित भएमा
      त्यस्तो पुरुष र महिलाबिच स्वतः विवाह भएको मानिने छ । तर बहु विवाह भएको, जबरजस्ती करणी भएको, उमेर नपुगी'
