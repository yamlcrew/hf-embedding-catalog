widgetData:
- source_sentence: 'query: Lernen Sie, Gas-, Flüssig- und Feststoffproben fachgerecht für Analysen vorzubereiten – von der
    Entnahme über Etikettierung bis zur normgerechten Lagerung. Ideal für Laborfachkräfte und Umwelttechniker:innen, die präzise
    Ergebnisse sichern müssen.'
  sentences:
  - 'passage: chemische Proben vorbereiten: Vorbereitung spezifischer Proben, z. B. von Gas, Flüssigkeit oder Feststoffen,
    für die Analyse; Etikettierung und Lagerung von Proben gemäß den Spezifikationen.'
  - 'passage: Feuerlöscher bedienen: Verstehen der Bedienung von Feuerlöschgeräten und von Löschtechniken.'
  - 'passage: ein komplexes Kommunikationssystem verwenden: Komplexe Kommunikationssysteme installieren und betreiben.'
- source_sentence: 'query: Dieser **3-tägige Praxis-Workshop** vermittelt die **neuen Administrationsmöglichkeiten von Windows
    Server 2025** – von **sicheren Management-Tools** (Windows Admin Center, PowerShell, JEA) über **Core-Server-Verwaltung**
    bis hin zu **bewährten Backup- und Hochverfügbarkeitslösungen** (Storage Replica, Failover Clustering, Hyper-V Replica),
    die Sie in einer **Lab-Umgebung direkt anwenden** und für Vorgängerversionen adaptieren. Ein Schwerpunkt liegt auf der
    **effizienten Nutzung von Identitätsdiensten (AD DS 2025)** und der **Automatisierung von System-Backups** mit modernen
    Windows-Tools.'
  sentences:
  - 'passage: IT-Werkzeuge verwenden: Verwendung von Computern, Computernetzwerken und anderen Informationstechnologien und
    anderer IT-Ausrüstung für die geschäfts- oder unternehmensbezogene Speicherung, Abfrage, Übermittlung und Verarbeitung
    von Daten.'
  - 'passage: Italienisch sprechen: Mündliches Kommunizieren in italienischer Sprache.'
  - 'passage: Social-Media-Marketing-Methoden: Marketingmethoden und -strategien zur Steigerung der Aufmerksamkeit und des
    Website-Datenverkehrs über soziale Medien.'
- source_sentence: 'query: Schaltbefähigung: Die TN können Schalthandlungen und Arbeiten an elektrischen Anlagen, deren Spannungshöhe
    nach der Norm DIN VDE 0100 1.000 V überschreitet und 110kV unterschreitet sicher und fachgerecht gemäß den VDE- und UVV-Bestimmungen
    durchführen.'
  sentences:
  - 'passage: technologische Entwicklungen des Designs verfolgen: Verfolgen der jüngsten Entwicklungen beim Design und bei
    den Materialien, die in der Live-Performance-Branche verwendet werden, um sich aktuelles technisches Hintergrundwissen
    für die eigene Arbeit anzueignen.'
  - 'passage: Energietechnik: Teildisziplin der Energie- und Elektrotechnik, die auf die Erzeugung, Übertragung, Verteilung
    und Nutzung elektrischer Energie spezialisiert ist und bei der zu diesem Zweck elektrische Geräte an Motoren, Generatoren
    und Transformatoren (wie Wechselstrom/Gleichstrom-Netzadapter) angeschlossen werden.'
  - 'passage: Schwedisch sprechen: Mündliches Kommunizieren in schwedischer Sprache.'
- source_sentence: 'query: In Ihrer Weiterbildung zur Schiffsbau-Meisterin lohnt es sich, Wetterdaten gezielt auszuwerten,
    um Bauprozesse bei Starkwind oder Sturm sicher zu planen – so vermeiden Sie kostspielige Verzögerungen und erhöhen die
    Arbeitssicherheit.'
  sentences:
  - 'passage: meteorologische Informationen nutzen: Meteorologische Informationen für Maßnahmen, die von klimatischen Bedingungen
    abhängig sind, nutzen und auswerten. Diese Informationen nutzen, um Ratschläge für sicheren Betrieb in Bezug auf Wetterbedingungen
    zu geben.'
  - 'passage: am täglichen Betrieb des Unternehmens mitwirken: Kollaboration und praktische Zusammenarbeit mit anderen Abteilungen,
    Vorgesetzten, Aufsichtspersonen und Arbeitnehmern/Arbeitnehmerinnen in Bezug auf verschiedene Aspekte des Unternehmens
    von der Erstellung von Rechnungslegungsberichten über die Konzeption von Marketingkampagnen bis hin zur Kontaktaufnahme
    mit den Kunden.'
  - 'passage: Mit chemischen Reinigungsmitteln umgehen: Gewährleisten einer ordnungsgemäßen Handhabung, Lagerung, Verwaltung
    und Entsorgung von chemischen Reinigungsmitteln gemäß den Vorschriften.'
- source_sentence: 'query: Erweitern Sie Ihr Beratungsprofil: Lernen Sie, wie Sie Betriebe bei der Reduzierung von Chemikalien
    nach aktuellen Umweltvorschriften unterstützen – für mehr Nachhaltigkeit und Sicherheit!'
  sentences:
  - 'passage: positives Verhalten verstärken: Verstärken von positivem Verhalten bei Rehabilitations- und Beratungstätigkeiten,
    um sicherzustellen, dass die Person das für positive Ergebnisse notwendige Verhalten bereitwillig umsetzt und dazu motiviert
    bleibt, sich weiterhin anzustrengen und ihre Ziele zu erreichen.'
  - 'passage: Zur Verringerung des Chemikalieneinsatzes beraten: Zur Verringerung des Einsatzes von Chemikalien wie Pestiziden
    und der Emissionen verschiedener chemischer Stoffe beraten, um deren Auswirkungen auf die Umwelt zu begrenzen und die
    Risiken für den Menschen zu verringern. Bezüglich geltender Vorschriften auf dem Laufenden bleiben.'
  - 'passage: Sägetechniken: Verschiedene Sägetechniken zur Verwendung manueller und elektrischer Sägen.'
