- source_sentence: 'query: who ordered the charge of the light brigade'
  sentences:
  - 'document: Charge of the Light Brigade The Charge of the Light Brigade was a charge of British light cavalry led by Lord
    Cardigan against Russian forces during the Battle of Balaclava on 25 October 1854 in the Crimean War. Lord Raglan, overall
    commander of the British forces, had intended to send the Light Brigade to prevent the Russians from removing captured
    guns from overrun Turkish positions, a task well-suited to light cavalry.'
  - 'document: UNICEF The United Nations International Children''s Emergency Fund was created by the United Nations General
    Assembly on 11 December 1946, to provide emergency food and healthcare to children in countries that had been devastated
    by World War II. The Polish physician Ludwik Rajchman is widely regarded as the founder of UNICEF and served as its first
    chairman from 1946. On Rajchman''s suggestion, the American Maurice Pate was appointed its first executive director, serving
    from 1947 until his death in 1965.[5][6] In 1950, UNICEF''s mandate was extended to address the long-term needs of children
    and women in developing countries everywhere. In 1953 it became a permanent part of the United Nations System, and the
    words "international" and "emergency" were dropped from the organization''s name, making it simply the United Nations
    Children''s Fund, retaining the original acronym, "UNICEF".[3]'
  - 'document: Marcus Jordan Marcus James Jordan (born December 24, 1990) is an American former college basketball player
    who played for the UCF Knights men''s basketball team of Conference USA.[1] He is the son of retired Hall of Fame basketball
    player Michael Jordan.'
- source_sentence: 'query: what part of the cow is the rib roast'
  sentences:
  - 'document: Standing rib roast A standing rib roast, also known as prime rib, is a cut of beef from the primal rib, one
    of the nine primal cuts of beef. While the entire rib section comprises ribs six through 12, a standing rib roast may
    contain anywhere from two to seven ribs.'
  - 'document: Blaine Anderson Kurt begins to mend their relationship in "Thanksgiving", just before New Directions loses
    at Sectionals to the Warblers, and they spend Christmas together in New York City.[29][30] Though he and Kurt continue
    to be on good terms, Blaine finds himself developing a crush on his best friend, Sam, which he knows will come to nothing
    as he knows Sam is not gay; the two of them team up to find evidence that the Warblers cheated at Sectionals, which means
    New Directions will be competing at Regionals. He ends up going to the Sadie Hawkins dance with Tina Cohen-Chang (Jenna
    Ushkowitz), who has developed a crush on him, but as friends only.[31] When Kurt comes to Lima for the wedding of glee
    club director Will (Matthew Morrison) and Emma (Jayma Mays)—which Emma flees—he and Blaine make out beforehand, and sleep
    together afterward, though they do not resume a permanent relationship.[32]'
  - 'document: Soviet Union The Soviet Union (Russian: Сове́тский Сою́з, tr. Sovétsky Soyúz, IPA: [sɐˈvʲɛt͡skʲɪj sɐˈjus] ( listen)),
    officially the Union of Soviet Socialist Republics (Russian: Сою́з Сове́тских Социалисти́ческих Респу́блик, tr. Soyúz
    Sovétskikh Sotsialistícheskikh Respúblik, IPA: [sɐˈjus sɐˈvʲɛtskʲɪx sətsɨəlʲɪsˈtʲitɕɪskʲɪx rʲɪˈspublʲɪk] ( listen)), abbreviated
    as the USSR (Russian: СССР, tr. SSSR), was a socialist state in Eurasia that existed from 1922 to 1991. Nominally a union
    of multiple national Soviet republics,[a] its government and economy were highly centralized. The country was a one-party
    state, governed by the Communist Party with Moscow as its capital in its largest republic, the Russian Soviet Federative
    Socialist Republic. The Russian nation had constitutionally equal status among the many nations of the union but exerted
    de facto dominance in various respects.[7] Other major urban centres were Leningrad, Kiev, Minsk, Alma-Ata and Novosibirsk.
    The Soviet Union was one of the five recognized nuclear weapons states and possessed the largest stockpile of weapons
    of mass destruction.[8] It was a founding permanent member of the United Nations Security Council, as well as a member
    of the Organization for Security and Co-operation in Europe (OSCE) and the leading member of the Council for Mutual Economic
    Assistance (CMEA) and the Warsaw Pact.'
- source_sentence: 'query: what is the current big bang theory season'
  sentences:
  - 'document: Byzantine army From the seventh to the 12th centuries, the Byzantine army was among the most powerful and effective
    military forces in the world â€“ neither Middle Ages Europe nor (following its early successes) the fracturing Caliphate
    could match the strategies and the efficiency of the Byzantine army. Restricted to a largely defensive role in the 7th
    to mid-9th centuries, the Byzantines developed the theme-system to counter the more powerful Caliphate. From the mid-9th
    century, however, they gradually went on the offensive, culminating in the great conquests of the 10th century under a
    series of soldier-emperors such as Nikephoros II Phokas, John Tzimiskes and Basil II. The army they led was less reliant
    on the militia of the themes; it was by now a largely professional force, with a strong and well-drilled infantry at its
    core and augmented by a revived heavy cavalry arm. With one of the most powerful economies in the world at the time, the
    Empire had the resources to put to the field a powerful host when needed, in order to reclaim its long-lost territories.'
  - 'document: The Big Bang Theory The Big Bang Theory is an American television sitcom created by Chuck Lorre and Bill Prady,
    both of whom serve as executive producers on the series, along with Steven Molaro. All three also serve as head writers.
    The show premiered on CBS on September 24, 2007.[3] The series'' tenth season premiered on September 19, 2016.[4] In March
    2017, the series was renewed for two additional seasons, bringing its total to twelve, and running through the 2018â€“19
    television season. The eleventh season is set to premiere on September 25, 2017.[5]'
  - 'document: 2016 NCAA Division I Softball Tournament The 2016 NCAA Division I Softball Tournament was held from May 20
    through June 8, 2016 as the final part of the 2016 NCAA Division I softball season. The 64 NCAA Division I college softball
    teams were to be selected out of an eligible 293 teams on May 15, 2016. Thirty-two teams were awarded an automatic bid
    as champions of their conference, and thirty-two teams were selected at-large by the NCAA Division I softball selection
    committee. The tournament culminated with eight teams playing in the 2016 Women''s College World Series at ASA Hall of
    Fame Stadium in Oklahoma City in which the Oklahoma Sooners were crowned the champions.'
- source_sentence: 'query: what happened to tates mom on days of our lives'
  sentences:
  - 'document: Paige O''Hara Donna Paige Helmintoller, better known as Paige O''Hara (born May 10, 1956),[1] is an American
    actress, voice actress, singer and painter. O''Hara began her career as a Broadway actress in 1983 when she portrayed
    Ellie May Chipley in the musical Showboat. In 1991, she made her motion picture debut in Disney''s Beauty and the Beast,
    in which she voiced the film''s heroine, Belle. Following the critical and commercial success of Beauty and the Beast,
    O''Hara reprised her role as Belle in the film''s two direct-to-video follow-ups, Beauty and the Beast: The Enchanted
    Christmas and Belle''s Magical World.'
  - 'document: M. Shadows Matthew Charles Sanders (born July 31, 1981), better known as M. Shadows, is an American singer,
    songwriter, and musician. He is best known as the lead vocalist, songwriter, and a founding member of the American heavy
    metal band Avenged Sevenfold. In 2017, he was voted 3rd in the list of Top 25 Greatest Modern Frontmen by Ultimate Guitar.[1]'
  - 'document: Theresa Donovan In July 2013, Jeannie returns to Salem, this time going by her middle name, Theresa. Initially,
    she strikes up a connection with resident bad boy JJ Deveraux (Casey Moss) while trying to secure some pot.[28] During
    a confrontation with JJ and his mother Jennifer Horton (Melissa Reeves) in her office, her aunt Kayla confirms that Theresa
    is in fact Jeannie and that Jen promised to hire her as her assistant, a promise she reluctantly agrees to. Kayla reminds
    Theresa it is her last chance at a fresh start.[29] Theresa also strikes up a bad first impression with Jennifer''s daughter
    Abigail Deveraux (Kate Mansi) when Abigail smells pot on Theresa in her mother''s office.[30] To continue to battle against
    Jennifer, she teams up with Anne Milbauer (Meredith Scott Lynn) in hopes of exacting her perfect revenge. In a ploy, Theresa
    reveals her intentions to hopefully woo Dr. Daniel Jonas (Shawn Christian). After sleeping with JJ, Theresa overdoses
    on marijuana and GHB. Upon hearing of their daughter''s overdose and continuing problems, Shane and Kimberly return to
    town in the hopes of handling their daughter''s problem, together. After believing that Theresa has a handle on her addictions,
    Shane and Kimberly leave town together. Theresa then teams up with hospital co-worker Anne Milbauer (Meredith Scott Lynn)
    to conspire against Jennifer, using Daniel as a way to hurt their relationship. In early 2014, following a Narcotics Anonymous
    (NA) meeting, she begins a sexual and drugged-fused relationship with Brady Black (Eric Martsolf). In 2015, after it is
    found that Kristen DiMera (Eileen Davidson) stole Theresa''s embryo and carried it to term, Brady and Melanie Jonas return
    her son, Christopher, to her and Brady, and the pair rename him Tate. When Theresa moves into the Kiriakis mansion, tensions
    arise between her and Victor. She eventually expresses her interest in purchasing Basic Black and running it as her own
    fashion company, with financial backing from Maggie Horton (Suzanne Rogers). In the hopes of finding the right partner,
    she teams up with Kate Roberts (Lauren Koslow) and Nicole Walker (Arianne Zucker) to achieve the goal of purchasing Basic
    Black, with Kate and Nicole''s business background and her own interest in fashion design. As she and Brady share several
    instances of rekindling their romance, she is kicked out of the mansion by Victor; as a result, Brady quits Titan and
    moves in with Theresa and Tate, in their own penthouse.'
- source_sentence: 'query: where does the last name francisco come from'
  sentences:
  - 'document: Francisco Francisco is the Spanish and Portuguese form of the masculine given name Franciscus (corresponding
    to English Francis).'
  - 'document: Book of Esther The Book of Esther, also known in Hebrew as "the Scroll" (Megillah), is a book in the third
    section (Ketuvim, "Writings") of the Jewish Tanakh (the Hebrew Bible) and in the Christian Old Testament. It is one of
    the five Scrolls (Megillot) in the Hebrew Bible. It relates the story of a Hebrew woman in Persia, born as Hadassah but
    known as Esther, who becomes queen of Persia and thwarts a genocide of her people. The story forms the core of the Jewish
    festival of Purim, during which it is read aloud twice: once in the evening and again the following morning. The books
    of Esther and Song of Songs are the only books in the Hebrew Bible that do not explicitly mention God.[2]'
  - 'document: Times Square Times Square is a major commercial intersection, tourist destination, entertainment center and
    neighborhood in the Midtown Manhattan section of New York City at the junction of Broadway and Seventh Avenue. It stretches
    from West 42nd to West 47th Streets.[1] Brightly adorned with billboards and advertisements, Times Square is sometimes
    referred to as "The Crossroads of the World",[2] "The Center of the Universe",[3] "the heart of The Great White Way",[4][5][6]
    and the "heart of the world".[7] One of the world''s busiest pedestrian areas,[8] it is also the hub of the Broadway Theater
    District[9] and a major center of the world''s entertainment industry.[10] Times Square is one of the world''s most visited
    tourist attractions, drawing an estimated 50 million visitors annually.[11] Approximately 330,000 people pass through
    Times Square daily,[12] many of them tourists,[13] while over 460,000 pedestrians walk through Times Square on its busiest
    days.[7]'
