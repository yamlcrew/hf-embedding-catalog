  sentences:
  - 'passage: The Arctic is warming and melting at alarming rates. Within the lifetime of a Millennial, the volume of ice
    floating on the Arctic Ocean has declined by at least half. The pace of Arctic warming is two‐to‐three times that of the
    globe; this disparity reached a new record high during 2016. While the Arctic spans only a small fraction of the Earth,
    it plays a disproportionate and multifaceted role in the climate system. In this article, we offer new perspectives on
    ways in which the Arctic''s rapid warming may influence weather patterns in heavily populated regions (the mid‐latitudes)
    of the Northern Hemisphere. Research on this topic has evolved almost as rapidly as the snow and ice have diminished,
    and while much has been learned, many questions remain. The atmosphere is complex, highly variable, and undergoing a multitude
    of simultaneous changes, many of which have become apparent only recently. These realities present challenges to robust
    signal detection and to clear attribution of cause‐and‐effect. In addition to updating the state of this science, we propose
    an explanation for the varying and intermittent response of mid‐latitude circulation to the rapidly warming Arctic. WIREs
    Clim Change 2017, 8:e474. doi: 10.1002/wcc.474 This article is categorized under: Climate Models and Modeling &gt; Knowledge
    Generation with Models'
  - 'passage: S (1995) recently reported that temperatures in Ghana were increasing during this century and that the temperature
    rise could be evidence of a global warming signal. Using data from 11 stations, Stephens shows that the temperatures in
    the 1961 to 1990 period were higher than temperatures in the 1930 to 1960 period, noting that, between 1945 and 1990,
    temperatures in Ghana were ''soaring'' upwards; suggested causes included the ''greenhouse'' effect and the potential
    influences of urbanization. While I commend Stephens for the effort, I conducted the following research that may be of
    interest to individuals concerned with regional climate changes over the period of reliable historical records. I collected
    the 1945 to 1994 monthly temperature anomaly data from the widely-used Jones (1994) data-set for the 5° latitude by 5°
    longitude grid cell that contains most of Ghana (centred on 7.5°N, 2.5°W). A plot of the 12months'' smoothed anomalies
    (Fig. 1) shows variability from year to year, but absolutely no evidence of any ''quite significant soaring of temperatures''.
    From 1945 to 1994, the temperatures in this grid cell actually cooled slightly, but at a statistically insignificant rate.
    From 1945 to 1990, there is simply no warming in the record. The satellite-based lower-tropospheric temperature data developed
    and described by Spencer & Christy (1990) provides another opportunity for testing temperature trends in Ghana. I collected
    the updated satellite data for the five 2.5° latitude by 2.5° longitude grid cells that cover Ghana for the period 1979
