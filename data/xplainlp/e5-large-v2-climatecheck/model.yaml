    sentences:
    - 'passage: We modelled the financial and environmental costs of two commonly used anaesthetic plastic drug trays. We
      proposed that, compared with single-use trays, reusable trays are less expensive, consume less water and produce less
      carbon dioxide, and that routinely adding cotton and paper increases financial and environmental costs. We used life
      cycle assessment to model the financial and environmental costs of reusable and single-use trays. From our life cycle
      assessment modelling, the reusable tray cost (Australian dollars) $0.23 (95% confidence interval [CI] $0.21 to $0.25)
      while the single-use tray alone cost $0.47 (price range of $0.42 to $0.52) and the single-use tray with cotton and gauze
      added was $0.90 (no price range in Melbourne). Production of CO2 was 110 g CO2 (95% CI 98 to 122 g CO2) for the reusable
      tray, 126 g (95% CI 104 to 151 g) for single-use trays alone (mean difference of 16 g, 95% CI -8 to 40 g) and 204 g
      CO2 (95% CI 166 to 268 g CO2) for the single-use trays with cotton and paper Water use was 3.1 l (95% CI 2.5 to 3.7
      l) for the reusable tray, 10.4 l (95% CI 8.2 to 12.7 l) for the single-use tray and 26.7 l (95% CI 20.5 to 35.4 l) for
      the single-use tray with cotton and paper Compared with reusable plastic trays, single-use trays alone cost twice as
      much, produced 15% more CO2 and consumed three times the amount of water Packaging cotton gauze and paper with single-use
      trays markedly increased the financial, energy and water costs. On both financial and environmental grounds it appears
      difficult to justify the use of single-use drug trays.'
    - 'passage: Abstract. In this work the three dimensional compressible moist atmospheric model ASAMgpu is presented. The
      calculations are done using graphics processing units (GPUs). To ensure platform independence OpenGL and GLSL are used,
      with that the model runs on any hardware supporting fragment shaders. The MPICH2 library enables interprocess communication
      allowing the usage of more than one GPU through domain decomposition. Time integration is done with an explicit three
      step Runge-Kutta scheme with a time-splitting algorithm for the acoustic waves. The results for four test cases are
      shown in this paper. A rising dry heat bubble, a cold bubble induced density flow, a rising moist heat bubble in a saturated
      environment, and a DYCOMS-II case.'
    - 'passage: Greenhouse gases (GHGs) other than carbon dioxide (CO2) play an important role in the effort to understand
      and address global climate change. Approximately 25% of Global warming potential-weighted GHG emissions in the year
      2005 comprise the non-CO2 GHGs. The report, Global Mitigation of Non-CO2 Greenhouse Gases: 2010–2030 provides a comprehensive
      global analysis and resulting data-set of marginal abatement cost curves that illustrate the abatement potential of
      non-CO2 GHGs by sector and by region. The basic methodology – a bottom-up, engineering cost approach – builds on the
      baseline non-CO2 emissions projections published by EPA, applying abatement options to the emissions baseline in each
      sector. The results of the analysis are MAC curves that reflect aggregated breakeven prices for implementing abatement
      options in a given sector and region. Among the key findings of the report is that significant, cost-effective abatement
      exists from non-CO2 sources with abatement options that are available today. Without a price signal (i.e. at $0/tCO2e),
      the global abatement potential is greater than 1800 million metric tons of CO2 equivalent. Globally, the energy and
      agriculture sectors have the greatest potential for abatement. Among the non-CO2 GHGs, methane has the largest abatement
      potential. Despite the potential for project level cost savings and environmental benefits, barriers to mitigating non-CO2
      emissions continue to exist. This paper will provide an overview of the methods and key findings of the report.'
  - source_sentence: 'query: New data suggests that Australia''s temps have only risen by 0.3 degrees over the last 100 years,
      much lower than the 1 degree usually cited.'
    sentences:
    - 'passage: The Arctic is warming and melting at alarming rates. Within the lifetime of a Millennial, the volume of ice
      floating on the Arctic Ocean has declined by at least half. The pace of Arctic warming is two‐to‐three times that of
      the globe; this disparity reached a new record high during 2016. While the Arctic spans only a small fraction of the
      Earth, it plays a disproportionate and multifaceted role in the climate system. In this article, we offer new perspectives
      on ways in which the Arctic''s rapid warming may influence weather patterns in heavily populated regions (the mid‐latitudes)
      of the Northern Hemisphere. Research on this topic has evolved almost as rapidly as the snow and ice have diminished,
      and while much has been learned, many questions remain. The atmosphere is complex, highly variable, and undergoing a
      multitude of simultaneous changes, many of which have become apparent only recently. These realities present challenges
      to robust signal detection and to clear attribution of cause‐and‐effect. In addition to updating the state of this science,
      we propose an explanation for the varying and intermittent response of mid‐latitude circulation to the rapidly warming
      Arctic. WIREs Clim Change 2017, 8:e474. doi: 10.1002/wcc.474 This article is categorized under: Climate Models and Modeling
      &gt; Knowledge Generation with Models'
    - 'passage: S (1995) recently reported that temperatures in Ghana were increasing during this century and that the temperature
      rise could be evidence of a global warming signal. Using data from 11 stations, Stephens shows that the temperatures
      in the 1961 to 1990 period were higher than temperatures in the 1930 to 1960 period, noting that, between 1945 and 1990,
      temperatures in Ghana were ''soaring'' upwards; suggested causes included the ''greenhouse'' effect and the potential
      influences of urbanization. While I commend Stephens for the effort, I conducted the following research that may be
      of interest to individuals concerned with regional climate changes over the period of reliable historical records. I
      collected the 1945 to 1994 monthly temperature anomaly data from the widely-used Jones (1994) data-set for the 5° latitude
      by 5° longitude grid cell that contains most of Ghana (centred on 7.5°N, 2.5°W). A plot of the 12months'' smoothed anomalies
      (Fig. 1) shows variability from year to year, but absolutely no evidence of any ''quite significant soaring of temperatures''.
      From 1945 to 1994, the temperatures in this grid cell actually cooled slightly, but at a statistically insignificant
      rate. From 1945 to 1990, there is simply no warming in the record. The satellite-based lower-tropospheric temperature
      data developed and described by Spencer & Christy (1990) provides another opportunity for testing temperature trends
      in Ghana. I collected the updated satellite data for the five 2.5° latitude by 2.5° longitude grid cells that cover
      Ghana for the period 1979 to 1994, then smoothed the data using a 12-months filter, and plotted the data in Fig. 1.
      The satellite-based lower-tropospheric temperature data reveal a statistically highly significant cooling of 0.027°C
      per year over the period of record. Although Ghana represents only 0.05% of the Earth''s surface, it is important to
      analyse temperature trends even at this spatial scale. Stephens has shown that the temperatures at 11 stations in Ghana
      have increased since the end of World War II. However, this warming signal does not appear in the widely-used Jones
      (1994) data and it is certainly not found in the updated satellite-based Spencer & Christy (1990) lower-tropospheric
      temperature data. 1945 195'
