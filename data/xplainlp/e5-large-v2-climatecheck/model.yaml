- source_sentence: 'query: The Industrial Revolution was a huge turning point, but it didn''t involve global warming. #ClimateAction
    #LearnMore'
  sentences:
  - "passage: Nitrogen fixation is a biologically catalyzed reaction that converts dinitrogen gas (N2) to ammonium (NH4+),\
    \ which can then be utilized to support autotrophic growth. Early research suggested that N2-fixation in the open ocean\
    \ was not a significant source of nitrogen for phytoplankton growthsemi; virtually all of the nitrogen needed for growth\
    \ was thought to come from the deep ocean through mixing and upwelling. A growing body of evidence now suggests that N2-fixers\
    \ may be far more ubiquitous in the open ocean than previously thought and that nitrogen fixation is quantitatively significant\
    \ in the global nitrogen cycle. \n \nThis finding is important because primary production supported by N2-fixation can\
    \ result in a net export of carbon from the surface waters to the deep ocean and a net draw-down of atmospheric carbon\
    \ dioxide and may therefore play a significant role in the global carbon cycle as well. In fact, N2-fixation may be the\
    \ only biologically mediated process in the open ocean that drives a significant net export of atmospheric carbon dioxide\
    \ over greater than annual timescales. In addition, the global balance between N2-fixation and denitrification determines\
    \ the degree to which the oceans are nitrogen limited. Thus global warming-induced changes in N2-fixation could have significant\
    \ long-term effects on oceanic productivity and the global carbon cycle. If this is the case, then we must understand\
    \ the global controls on N2-fixation and find ways to represent it in models that are currently being developed to predict\
    \ future climate."
  - 'passage: PREDICtion, little noted at the time, that anthropogenic emissions of carbon dioxide would trap the radiative
    energy of the sun within the earth''s atmosphere and raise surface temperatures. 1 An early investigation of this "greenhouse
