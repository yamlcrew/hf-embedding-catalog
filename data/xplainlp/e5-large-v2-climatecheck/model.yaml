    requiring serious, concerted action.Jonathan Patz and Mahmooda Khaliq survey the immediate threats posed by climate change
    as well as some of the more insidious ones.Kent Bransford and Janet Lai find grounds for a common approach to both climate
    change and air pollution.Stephen Liang and colleagues describe technologies that can help track the spread of climate-sensitive
    infectious disease vectors.Finally, William Burns discusses public policy tools to respond and adapt to these challenges.Unfounded
    alarmism has no place either in clinical practice or in the legislative process.On the other hand, we cannot simply ignore
    extensive, peer-reviewed data on the causes and impacts of climate change.Lending a sense of urgency to this seemingly
    distant and abstract threat may well require us to link its consequences to our quality of life.In the absence of domestic
