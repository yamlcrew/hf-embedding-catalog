  - source_sentence: 'query: The Industrial Revolution was a huge turning point, but it didn''t involve global warming. #ClimateAction
      #LearnMore'
    sentences:
    - "passage: Nitrogen fixation is a biologically catalyzed reaction that converts dinitrogen gas (N2) to ammonium (NH4+),\
      \ which can then be utilized to support autotrophic growth. Early research suggested that N2-fixation in the open ocean\
      \ was not a significant source of nitrogen for phytoplankton growthsemi; virtually all of the nitrogen needed for growth\
      \ was thought to come from the deep ocean through mixing and upwelling. A growing body of evidence now suggests that\
      \ N2-fixers may be far more ubiquitous in the open ocean than previously thought and that nitrogen fixation is quantitatively\
      \ significant in the global nitrogen cycle. \n \nThis finding is important because primary production supported by N2-fixation\
      \ can result in a net export of carbon from the surface waters to the deep ocean and a net draw-down of atmospheric\
      \ carbon dioxide and may therefore play a significant role in the global carbon cycle as well. In fact, N2-fixation\
      \ may be the only biologically mediated process in the open ocean that drives a significant net export of atmospheric\
      \ carbon dioxide over greater than annual timescales. In addition, the global balance between N2-fixation and denitrification\
      \ determines the degree to which the oceans are nitrogen limited. Thus global warming-induced changes in N2-fixation\
      \ could have significant long-term effects on oceanic productivity and the global carbon cycle. If this is the case,\
      \ then we must understand the global controls on N2-fixation and find ways to represent it in models that are currently\
      \ being developed to predict future climate."
    - 'passage: PREDICtion, little noted at the time, that anthropogenic emissions of carbon dioxide would trap the radiative
      energy of the sun within the earth''s atmosphere and raise surface temperatures. 1 An early investigation of this "greenhouse
      effect" concluded that a "large-scale geophysical experiment" began ever since the Industrial Revolution wed civilization
      to fossil fuels. 2 The recent data of several international consortia show that global warming is accelerating at a
      rate far greater than that predicted a century ago and is due in large part to combustion of fossil fuels. 3 This issue
      of MSJAMA brings together several lines of published evidence that global warming has emerged as a public health challenge
      requiring serious, concerted action.Jonathan Patz and Mahmooda Khaliq survey the immediate threats posed by climate
      change as well as some of the more insidious ones.Kent Bransford and Janet Lai find grounds for a common approach to
      both climate change and air pollution.Stephen Liang and colleagues describe technologies that can help track the spread
      of climate-sensitive infectious disease vectors.Finally, William Burns discusses public policy tools to respond and
      adapt to these challenges.Unfounded alarmism has no place either in clinical practice or in the legislative process.On
      the other hand, we cannot simply ignore extensive, peer-reviewed data on the causes and impacts of climate change.Lending
      a sense of urgency to this seemingly distant and abstract threat may well require us to link its consequences to our
      quality of life.In the absence of domestic leadership on global warming, one way to accomplish this goal might be to
      summon health care professionals to nontraditional advocacy roles.A similar approach helped give birth to the Montreal
      Protocol of 1987.Parties to the convention that produced the treaty identified depletion of the UV-absorbing ozone layer
      by chlorofluorocarbons (CFCs) as a public health threat of potentially catastrophic proportions requiring immediate
      action, namely, the phasing out of CFCs and related compounds. 4 A role for health care professionals in global environmental
      policy is a natural extension of a growing ethos of preventive medicine, the sort that has, for instance, reduced the
      prevalence of smoking in the United States and led to improvements in food, highway, and gun safety.Similarly, it is
      not too late and none too soon for the health care community to advocate policies that wean us from fossil fuels and
      ultimately mitigate the extent of human-induced climate change.'
    - 'passage: Beneath the waves, oxygen disappears As plastic waste pollutes the oceans and fish stocks decline, unseen
      below the surface another problem grows: deoxygenation. Breitburg et al. review the evidence for the downward trajectory
      of oxygen levels in increasing areas of the open ocean and coastal waters. Rising nutrient loads coupled with climate
      change—each resulting from human activities—are changing ocean biogeochemistry and increasing oxygen consumption. This
      results in destabilization of sediments and fundamental shifts in the availability of key nutrients. In the short term,
      some compensatory effects may result in improvements in local fisheries, such as in cases where stocks are squeezed
      between the surface and elevated oxygen minimum zones. In the longer term, these conditions are unsustainable and may
      result in ecosystem collapses, which ultimately will cause societal and economic harm. Science, this issue p. eaam7240
      BACKGROUND Oxygen concentrations in both the open ocean and coastal waters have been declining since at least the middle
      of the 20th century. This oxygen loss, or deoxygenation, is one of the most important changes occurring in an ocean
      increasingly modified by human activities that have raised temperatures, CO2 levels, and nutrient inputs and have altered
      the abundances and distributions of marine species. Oxygen is fundamental to biological and biogeochemical processes
      in the ocean. Its decline can cause major changes in ocean productivity, biodiversity, and biogeochemical cycles. Analyses
      of direct measurements at sites around the world indicate that oxygen-minimum zones in the open ocean have expanded
      by several million square kilometers and that hundreds of coastal sites now have oxygen concentrations low enough to
      limit the distribution and abundance of animal populations and alter the cycling of important nutrients. ADVANCES In
      the open ocean, global warming, which is primarily caused by increased greenhouse gas emissions, is considered the primary
      cause of ongoing deoxygenation. Numerical models project further oxygen declines during the 21st century, even with
      ambitious emission reductions. Rising global temperatures decrease oxygen solubility in water, increase the rate of
      oxygen consumption via respiration, and are predicted to reduce the introduction of oxygen from the atmosphere and surface
      waters into the ocean interior by increasing stratification and weakening ocean overturning circulation. In estuaries
      and other coastal systems strongly influenced by their watershed, oxygen declines have been caused by increased loadings
      of nutrients (nitrogen and phosphorus) and organic matter, primarily from agriculture; sewage; and the combustion of
      fossil fuels. In many regions, further increases in nitrogen discharges to coastal waters are projected as human populations
      and agricultural production rise. Climate change exacerbates oxygen decline in coastal systems through similar mechanisms
      as those in the open ocean, as well as by increasing nutrient delivery from watersheds that will experience increased
      precipitation. Expansion of low-oxygen zones can increase production of N2O, a potent greenhouse gas; reduce eukaryote
      biodiversity; alter the structure of food webs; and negatively affect food security and livelihoods. Both acidification
      and increasing temperature are mechanistically linked with the process of deoxygenation and combine with low-oxygen
      conditions to affect biogeochemical, physiological, and ecological processes. However, an important paradox to consider
      in predicting large-scale effects of future deoxygenation is that high levels of productivity in nutrient-enriched coastal
      systems and upwelling areas associated with oxygen-minimum zones also support some of the world’s most prolific fisheries.
      OUTLOOK Major advances have been made toward understanding patterns, drivers, and consequences of ocean deoxygenation,
      but there is a need to improve predictions at large spatial and temporal scales important to ecosystem services provided
      by the ocean. Improved numerical models of oceanographic processes that control oxygen depletion and the large-scale
      influence of altered biogeochemical cycles are needed to better predict the magnitude and spatial patterns of deoxygenation
      in the open ocean, as well as feedbacks to climate. Developing and verifying the next generation of these models will
      require increased in situ observations and improved mechanistic understanding on a variety of scales. Models useful
      for managing nutrient loads can simulate oxygen loss in coastal waters with some skill, but their ability to project
      future oxygen loss is often hampered by insufficient data and climate model projections on drivers at appropriate temporal
      and spatial scales. Predicting deoxygenation-induced changes in ecosystem services and human welfare requires scaling
      effects that are measured on individual organisms to populations, food webs, and fisheries stocks; considering combined
      effects of deoxygenation and other ocean stressors; and placing an increased research emphasis on developing nations.
      Reducing the impacts of other stressors may provide some protection to species negatively affected by low-oxygen conditions.
      Ultimately, though, limiting deoxygenation and its negative effects will necessitate a substantial global decrease in
      greenhouse gas emissions, as well as reductions in nutrient discharges to coastal waters. Low and declining oxygen levels
      in the open ocean and coastal waters affect processes ranging from biogeochemistry to food security. The global map
      indicates coastal sites where anthropogenic nutrients have exacerbated or caused O2 declines to <2 mg liter−1 (<63 μmol
      liter−1) (red dots), as well as ocean oxygen-minimum zones at 300 m of depth (blue shaded regions). [Map created from
      data provided by R. Diaz, updated by members of the GO2NE network, and downloaded from the World Ocean Atlas 2009].
      Oxygen is fundamental to life. Not only is it essential for the survival of individual animals, but it regulates global
      cycles of major nutrients and carbon. The oxygen content of the open ocean and coastal waters has been declining for
      at least the past half-century, largely because of human activities that have increased global temperatures and nutrients
      discharged to coastal waters. These changes have accelerated consumption of oxygen by microbial respiration, reduced
      solubility of oxygen in water, and reduced the rate of oxygen resupply from the atmosphere to the ocean interior, with
      a wide range of biological and ecological consequences. Further research is needed to understand and predict long-term,
      global- and regional-scale oxygen changes and their effects on marine and estuarine fisheries and ecosystems.'
  - source_sentence: 'query: Apparently, the air a bit higher up isn''t warming as much as the ground level, according to
      satellite data. 🤔 #climate #science'
    sentences:
    - 'passage: During the Holocene (last 12,000 years) nine cold relapses were observed mainly in the North Atlantic Ocean
      area and its surroundings. Based on the pioneering studies by Bond et al. (1997, 2001) these events are called Bond
      Cycles and thought to be the Holocene equivalents of the Pleistocene Dansgaard-Oeschger cycles. The first event was
      the Younger Dryas (~12,000 BP; Broecker 2006), the last one was the Little Ice Age (AD 1350-1860; Grove 1988). A number
      of trigger mechanisms is discussed (see Table 1), but a theory for the Bond Cycles does not exist. Based on spectral
      analyses of both, forcing factors and climatological time series, we argue that one single process did likely not cause
      the Holocene cooling events. It is conceivable that the early Holocene coolings were triggered by meltwater pulses.
      However, the late Holocene events (e.g., the Little Ice Age) were rather caused by a combination of different trigger
      mechanisms. In every case it has to be taken in mind that natural variability was also playing a decisive role.'
