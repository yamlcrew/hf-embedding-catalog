widgetData:
- source_sentence: The present disclosure provides systems and methods to optimize data backup in a distributed enterprise
    system by firstly generating a set of unique files from all the files available in the enterprise. A backup set comprising
    files to be backed up are then generated from the set of unique files and backup is scheduled in the order in which the
    files to be backed up are identified. Unique files are generated based on file sharing patterns and communications among
    users that enable generating a social network graph from which one or more communities can be detected and deduplication
    can be performed on the files hosted by client systems in these communities thereby conserving resources.
  sentences:
  - BURNER
  - SYSTEMS AND METHODS FOR OPTIMIZED DATA BACKUP IN A DISTRIBUTED ENTERPRISE SYSTEM
  - Power conversion apparatus
- source_sentence: The present invention relates to a use of polypeptide compounds having dual agonist effect on glucagon-like
    peptide-1 receptor (GLP-1R) and glucagon receptor (GCGR). The polypeptide compounds are characterized by high enzymolysis
    stability, high potency and no adverse reaction, and capable of substantially improving hepatic fibrosis caused by hepatitis
    B virus (HBV) and hepatitis C virus (HCV) and severity of fibrotic conditions accompanied with liver diseases. The dual
    target agonist polypeptide derivatives are capable of preventing or treating hepatic fibrosis diseases associated with
    viral hepatitis.
  sentences:
  - GLP-1R/GCGR DUAL-TARGET AGONIST PEPTIDE DERIVATIVES FOR TREATMENT OF VIRAL HEPATITIS-RELATED HEPATIC FIBROSIS
  - MAGNETIC FILTER CARTRIDGE AND FILTER ASSEMBLY
  - USER TERMINAL AND WIRELESS COMMUNICATION METHOD
- source_sentence: A latch includes a latch housing including a first housing portion and a second housing portion separable
    from the first housing portion. The second housing portion includes a keeper. A first arm member is in rotational communication
    with the first housing portion. The first arm member is configured to rotate about a first axis between a first position
    and a second position. A second arm member is in rotational communication with the first arm member. A latch load pin
    is in rotational communication with the first arm member about a second axis. The latch load pin is configured to mate
    with the keeper with the first arm member in the first position. The second arm member in the first position is configured
    to be fixed relative to the first arm member as the first arm member rotates from the first position toward the second
    position.
  sentences:
  - UNLOCKING METHODS AND RELATED PRODUCTS
  - LATCH AND METHOD FOR OPERATING SAID LATCH
  - PANEL-SHAPED MOLDED ARTICLE AND PRODUCTION METHOD FOR PANEL-SHAPED MOLDED ARTICLE
- source_sentence: The present invention aims to provide a production method of low-fat and low-protein yogurt with smooth
    taste, suppressed syneresis and superior shape retainability, comprising adding protein glutaminase and starch to raw
    milk.
  sentences:
  - YOGURT PRODUCTION METHOD
  - Aircraft electric motor system
  - Floor panel, flooring system and method for laying flooring system
- source_sentence: A computer-implemented method determines an orientation parameter value of a prosthetic component. The
    method includes receiving a first desired separation distance (d1) between a tibial prosthetic component (120) and a femoral
    prosthetic component (110) at a first flexion position (521) of a knee joint (100) and estimating a first estimated separation
    distance (g1) between the tibial prosthetic component and the femoral prosthetic component at the first flexion position
    of the knee joint for at least one potential orientation of the femoral prosthet¬ic component. The method also includes
    determining a first orientation para¬meter value of the femoral prosthetic component by comparing the first estimated
    separation distance to the first desired separation distance and out¬putting the first orientation parameter value via
    a user interface (400).
  sentences:
  - Mobile device and antenna structure
  - TWO-WAY VALVE FOR CONTROLLING A TEMPERATURE OF A COOLANT FOR AN INTERNAL COMBUSTION ENGINE
  - SYSTEMS AND METHOD FOR PROSTHETIC COMPONENT ORIENTATION
