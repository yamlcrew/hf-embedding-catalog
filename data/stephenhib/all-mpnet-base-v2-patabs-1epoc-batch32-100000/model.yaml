widgetData:
- source_sentence: '<p id="pa01" num="0001">An decoding method according to an embodiment includes a deriving step and an
    decoding step. The deriving step derives a first reference value that is a reference value of a weighting factor based
    on fixed point precision representing roughness of the weighting factor that is used for making a motion-compensated prediction
    of a change in a pixel value by multiplying a reference image by the weighting factor. The decoding step decodes a first
    difference value that is a difference value between the weighting factor and the first reference value. The weighting
    factor is included in a range of predetermined bit precision having the first reference value at approximate center.

    <img id="iaf01" file="imgaf001.tif" wi="146" he="85" img-content="drawing" img-format="tif"/></p>'
  sentences:
  - DECODING METHOD AND DECODING DEVICE
  - METHOD FOR DETERMINING SEMI-SYNCHRONOUS EXPOSURE PARAMETERS AND ELECTRONIC DEVICE
  - HOISTING ROPE MONITORING DEVICE
- source_sentence: <p id="pa01" num="0001">A layered sheet 10 includes a substrate layer 1, and surface layers 2 and 3 configured
    to be layered on at least one surface of the substrate layer 1. The substrate layer 1 contains a first thermoplastic resin
    and inorganic fillers. The surface layers 2 and 3 contain a second thermoplastic resin and a conductive material. A content
    of the inorganic fillers in the substrate layer 1 is 0.3 to 28 mass% based on a total amount of the substrate layer.<img
    id="iaf01" file="imgaf001.tif" wi="86" he="70" img-content="drawing" img-format="tif"/><img id="iaf02" file="imgaf002.tif"
    wi="165" he="117" img-content="drawing" img-format="tif"/></p>
  sentences:
  - LAYERED SHEET, CONTAINER, CARRIER TAPE, AND ELECTRONIC COMPONENT PACKAGING BODY
  - BLOCK COPOLYMERS FOR GEL COMPOSITIONS WITH IMPROVED EFFICIENCY
  - AN INDICATOR SYSTEM FOR A PERISHABLE PRODUCT CONTAINER
- source_sentence: '<p id="pa01" num="0001">A method for manufacturing a gear which effectively prevent a crack from occurring
    inside a tooth part when rolling processing is performed on a teeth part of a gear raw material is achieved. A method
    according to one embodiment for manufacturing a gear 15 by performing rolling processing on a tooth part 2a of a sintered
    gear raw material 2. The method includes, when the rolling processing is performed on the tooth part 2a of the gear raw
    material 2, pressing the gear raw material 2 toward a center of rotation of the gear raw material 2 by a rolling machine
    4 and, when at least the rolling processing is performed on the tooth part 2a of the gear raw material 2 toward a center
    of a thickness thereof by a pressing machine 5, pressing a region A where an internal density of the tooth part 2a of
    the gear raw material 2 decreases.</p><p id="pa02" num="0002">The invention also relates to an apparatus for manufacturing
    a gear.

    <img id="iaf01" file="imgaf001.tif" wi="106" he="68" img-content="drawing" img-format="tif"/></p>'
  sentences:
  - COMMUNICATION METHOD, RELATED APPARATUS AND DEVICE AND COMPUTER-READABLE STORAGE MEDIUM
  - METHOD AND APPARATUS FOR MANUFACTURING GEAR
  - IMPLANTABLE MEDICAL DEVICE AND METHOD OF PROVIDING WIRE CONNECTIONS FOR IT
- source_sentence: '<p id="pa01" num="0001">This application discloses a data reading method, apparatus, and system, and a
    distributed system, and belongs to the field of storage technologies. The method includes: receiving a data read request
    sent by a terminal, where the data read request includes a logical address of target data; locally searching, based on
    the logical address, a first slave node for a latest version of the target data; and when it is determined that the latest
    version of the target data has been stored in each of a plurality of slave nodes, sending the latest version of the target
    data to the terminal. This application can avoid a rollback of a version of read data, and this application applies to
    data reading.<img id="iaf01" file="imgaf001.tif" wi="62" he="86" img-content="drawing" img-format="tif"/><img id="iaf02"
    file="imgaf002.tif" wi="155" he="233" img-content="drawing" img-format="tif"/></p>'
  sentences:
  - SLIDING MECHANISM AND TERMINAL DEVICE PROVIDED WITH SAME
  - PRESSURE-APPLYING DEVICE FOR A SWITCHING MODULE AND METHOD OF CHANGING A SWITCHING MODULE USING THE SAME
  - DATA READING METHOD, DEVICE, SYSTEM, AND DISTRIBUTED SYSTEM
- source_sentence: '<p id="pa01" num="0001">An application apparatus (100) includes: an application needle (24) that applies,
    to a target, an application material having its viscosity changing under shear; a drive unit (90) that moves the application
    needle (24) up and down; and a controller (80) that controls the drive unit (90) to move the application needle such that
    shear is applied to the application material at a shear speed depending on a type of the application material and depending
    on a target application amount or a target application diameter.<img id="iaf01" file="imgaf001.tif" wi="78" he="56" img-content="drawing"
    img-format="tif"/></p>'
  sentences:
  - HEAT PROCESSING DEVICE
  - Electric motor
  - COATING APPARATUS AND COATING METHOD
