- source_sentence: Hàng xóm làm hàng rào lấn đất thì có nộp đơn yêu cầu UBND xã tiến hành hòa giải được hay không?
  sentences:
  - 'Điều 6.

    a) Những người dân khu vực biên giới Bên này không được sang khu vực biên giới Bên kia cư trú, làm nhà, canh tác, lây
    lâm thổ sản, săn bắn, chăn trâu bò, gia cầm v.v…, đánh cá, bắt tôm trừ trường hợp được phép của chính quyền hai Bên từ
    cấp huyện trở lên. Trường hợp sang khu vực biên giới Bên kia cư trú, làm nhà trái với quy định này sau khi Hiệp định này
    có hiệu lực thì đương sự phải dỡ nhà, trở về nước mình trong vòng sáu tháng.

    b) Trường hợp đang sản xuất tại khu vực biên giới Bên kia khi Hiệp định này có hiệu lực và không được phép tiếp tục nữa,
    nếu là hoa màu và cây lâu năm chưa kịp thu hoạch thì đương sự được phép tiếp tục qua biên giới để chăm sóc cho đến khi
    thu hoạch xong và chỉ được làm và thu hoạch hết vụ đó. Đối với cây lâu năm chậm nhất một năm sau khi Hiệp định này có
    hiệu lực, đương sự phải nhượng lại cho chính quyền địa phương sở tại và chính quyền địa phương sở tại cần xem xét việc
    bồi thường cho đương sự theo giá thỏa thuận.

    c) Trong lúc tiến hành các hoạt động sản xuất nói trên ở khu vực biên giới Bên kia, đương sự phải tuân theo luật lệ của
    Bên kia.'
  - '“Điều 11. Xử phạt các hành vi vi phạm khác về quy tắc giao thông đường bộ

    ...

    6. Phạt tiền từ 400.000 đồng đến 600.000 đồng đối với người được chở trên xe mô tô, xe gắn máy (kể cả xe máy điện), các
    loại xe tương tự xe mô tô, các loại xe tương tự xe gắn máy, xe đạp máy (kể cả xe đạp điện) thực hiện một trong các hành
    vi vi phạm sau đây:

    a) Bám, kéo, đẩy xe khác, vật khác, dẫn dắt súc vật, mang vác vật cồng kềnh, đứng trên yên, giá đèo hàng hoặc ngồi trên
    tay lái;

    b) Không đội “mũ bảo hiểm cho người đi mô tô, xe máy” hoặc đội “mũ bảo hiểm cho người đi mô tô, xe máy” không cài quai
    đúng quy cách khi tham gia giao thông trên đường bộ.

    ...”'
  - '"Điều 202. Hòa giải tranh chấp đất đai

    1. Nhà nước khuyến khích các bên tranh chấp đất đai tự hòa giải hoặc giải quyết tranh chấp đất đai thông qua hòa giải
    ở cơ sở.

    2. Tranh chấp đất đai mà các bên tranh chấp không hòa giải được thì gửi đơn đến Ủy ban nhân dân cấp xã nơi có đất tranh
    chấp để hòa giải.

    3. Chủ tịch Ủy ban nhân dân cấp xã có trách nhiệm tổ chức việc hòa giải tranh chấp đất đai tại địa phương mình; trong
    quá trình tổ chức thực hiện phải phối hợp với Ủy ban Mặt trận Tổ quốc Việt Nam cấp xã và các tổ chức thành viên của Mặt
    trận, các tổ chức xã hội khác. Thủ tục hòa giải tranh chấp đất đai tại Ủy ban nhân cấp xã được thực hiện trong thời hạn
    không quá 45 ngày, kể từ ngày nhận được đơn yêu cầu giải quyết tranh chấp đất đai.

    4. Việc hòa giải phải được lập thành biên bản có chữ ký của các bên và có xác nhận hòa giải thành hoặc hòa giải không
    thành của Ủy ban nhân dân cấp xã. Biên bản hòa giải được gửi đến các bên tranh chấp, lưu tại Ủy ban nhân dân cấp xã nơi
    có đất tranh chấp.

    5. Đối với trường hợp hòa giải thành mà có thay đổi hiện trạng về ranh giới, người sử dụng đất thì Ủy ban nhân dân cấp
    xã gửi biên bản hòa giải đến Phòng Tài nguyên và Môi trường đối với trường hợp tranh chấp đất đai giữa hộ gia đình, cá
    nhân, cộng đồng dân cư với nhau; gửi đến Sở Tài nguyên và Môi trường đối với các trường hợp khác.

    Phòng Tài nguyên và Môi trường, Sở Tài nguyên và Môi trường trình Ủy ban nhân dân cùng cấp quyết định công nhận việc thay
    đổi ranh giới thửa đất và cấp mới Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất."'
- source_sentence: Cộng tác viên thanh tra giáo dục có trách nhiệm gì khi sử dụng thẻ?
  sentences:
  - 'Thời hạn công nhận và thẻ cộng tác viên thanh tra giáo dục

    ...

    3. Cộng tác viên thanh tra giáo dục có trách nhiệm bảo quản thẻ cộng tác viên thanh tra, xuất trình thẻ cộng tác viên
    thanh tra khi có yêu cầu, sử dụng thẻ cộng tác viên thanh tra khi thực hiện nhiệm vụ thanh tra.

    Nghiêm cấm sử dụng thẻ cộng tác viên thanh tra vào mục đích cá nhân. Trường hợp cộng tác viên thanh tra sử dụng thẻ thực
    hiện hành vi trái pháp luật thì tùy theo tính chất, mức độ vi phạm sẽ bị xử lý theo quy định của pháp luật.'
  - '"Điều 148. Người lao động cao tuổi

    1. Người lao động cao tuổi là người tiếp tục lao động sau độ tuổi theo quy định tại khoản 2 Điều 169 của Bộ luật này.

    2. Người lao động cao tuổi có quyền thỏa thuận với người sử dụng lao động về việc rút ngắn thời giờ làm việc hằng ngày
    hoặc áp dụng chế độ làm việc không trọn thời gian.

    3. Nhà nước khuyến khích sử dụng người lao động cao tuổi làm việc phù hợp với sức khỏe để bảo đảm quyền lao động và sử
    dụng hiệu quả nguồn nhân lực."'
  - 'PHẪU THUẬT CẮT U DẠNG BÌ KẾT - GIÁC MẠC

    I. ĐẠI CƯƠNG

    U dạng bì hoặc u bì mỡ là tổn thương lạc chỗ bẩm sinh, hầu như không có khả năng ác tính và thường tiến triển chậm. Có
    thể thấy u ở bất kỳ vị trí nào trên nhãn cầu nhưng vị trí thường gặp nhất là ở vùng rìa, góc 1/4 trên ngoài hoặc ở vùng
    khe mi góc ngoài.

    II. CHỈ ĐỊNH

    - U phát triển vào giác mạc gây ảnh hưởng nhiều đến thị lực.

    - U phát triển ở vùng kết mạc cùng đồ nên phẫu thuật khi trẻ đã lớn.

    III. CHỐNG CHỈ ĐỊNH

    - Người bệnh đang có bệnh cấp tính tại mắt.

    - Người bệnh có bệnh toàn thân không cho phép phẫu thuật.

    IV. CHUẨN BỊ

    1. Người thực hiện

    Bác sĩ chuyên khoa Mắt.

    2. Phương tiện

    - Dụng cụ phẫu thuật: bộ dụng cụ phẫu thuật mộng, dao tròn, máy hiển vi phẫu thuật.

    - Thuốc: thuốc gây tê, thuốc sát trùng, kháng sinh, chống viêm,...

    3. Người bệnh

    - Giải thích kỹ cho người bệnh và người nhà về mục đích của phẫu thuật

    - Dặn người bệnh và người nhà cho người bệnh nhịn ăn từ 12 giờ đêm hôm trước phẫu thuật (nếu gây mê).

    4. Hồ sơ bệnh án

    - Mô tả chi tiết khối u trước khi phẫu thuật (vị trí, kích thước, hình thái,...) để tiện cho theo dõi lâu dài.

    - Kiểm tra tình trạng toàn thân.'
- source_sentence: Xử lý vi phạm trong việc cấp, quản lý chứng chỉ bồi dưỡng cán bộ, công chức, viên chức được quy định như
    thế nào?
  sentences:
  - 'Nhiệm vụ, quyền hạn của Thanh tra Cục Hàng không

    1. Giúp Cục trưởng xây dựng kế hoạch thanh tra hàng năm trình Bộ trưởng Bộ Giao thông vận tải phê duyệt và tổ chức thực
    hiện sau khi được phê duyệt; hướng dẫn xây dựng, tổng hợp và trình Cục trưởng phê duyệt kế hoạch thanh tra của các Cảng
    vụ Hàng không.

    2. Thanh tra đối với tổ chức, cá nhân trong việc chấp hành pháp luật chuyên ngành hàng không dân dụng, quy định về chuyên
    môn, kỹ thuật, quy tắc quản lý ngành theo pháp luật Việt Nam và điều ước quốc tế về hàng không dân dụng mà Việt Nam là
    thành viên, trong các lĩnh vực sau đây:

    a) Bảo đảm an toàn hàng không, an ninh hàng không;

    b) Tàu bay; đủ điều kiện bay; bảo dưỡng, sửa chữa tàu bay; khai thác tàu bay;

    c) Quản lý và khai thác cảng hàng không, sân bay; duy trì tiêu chuẩn, điều kiện kỹ thuật cảng hàng không, sân bay; cung
    cấp dịch vụ hàng không, dịch vụ phi hàng không tại cảng hàng không, sân bay; duy trì tiêu chuẩn, điều kiện của phương
    tiện, thiết bị hoạt động trong cảng hàng không, sân bay;

    d) Bảo vệ môi trường trong hoạt động hàng không;

    đ) Bảo đảm hoạt động bay;

    e) Hoạt động khai thác vận chuyển hàng không và hàng không chung;

    g) Quản lý, bố trí, sử dụng và kỷ luật nhân viên hàng không;

    h) Đào tạo, huấn luyện nhân viên hàng không;

    i) Giám định sức khỏe nhân viên hàng không;

    k) Phí, lệ phí; giá dịch vụ hàng không và dịch vụ phi hàng không tại cảng hàng không, sân bay;

    l) Các lĩnh vực khác theo quy định của pháp luật về hàng không dân dụng.

    3. Phát hiện, lập biên bản, áp dụng các biện pháp ngăn chặn, quyết định xử phạt vi phạm hành chính theo thẩm quyền hoặc
    kiến nghị cấp có thẩm quyền quyết định xử phạt vi phạm hành chính theo quy định.

    4. Theo dõi, đôn đốc, kiểm tra việc thực hiện kết luận, kiến nghị, quyết định xử lý sau thanh tra chuyên ngành, xử phạt
    vi phạm hành chính.

    5. Kiến nghị hoặc trình cấp có thẩm quyền hoàn thiện chính sách, pháp luật về quản lý chuyên ngành hàng không dân dụng;
    kiến nghị cơ quan có thẩm quyền đình chỉ việc thi hành hoặc hủy bỏ những quy định trái pháp luật được phát hiện qua công
    tác thanh tra; kiến nghị áp dụng các biện pháp xử lý và khắc phục những vi phạm trong hoạt động hàng không dân dụng.

    6. Giúp Cục trưởng tổ chức tiếp công dân; giải quyết khiếu nại, tố cáo; phòng, chống tham nhũng.

    7. Tuyên truyền, phổ biến pháp luật về: công tác thanh tra; xử phạt vi phạm hành chính; tiếp công dân; giải quyết khiếu
    nại, tố cáo; phòng, chống tham nhũng.

    8. Giúp Chánh Thanh tra Bộ tập huấn, hướng dẫn nghiệp vụ thanh tra và xử phạt vi phạm hành chính cho công chức, viên chức
    được giao thực hiện nhiệm vụ thanh tra chuyên ngành của Cục Hàng không Việt Nam và các Cảng vụ Hàng không.

    9. Tổng hợp, báo cáo Thanh tra Bộ kết quả về: công tác thanh tra chuyên ngành; xử phạt vi phạm hành chính; tiếp công dân,
    giải quyết khiếu nại, tố cáo; phòng, chống tham nhũng thuộc phạm vi quản lý của Cục Hàng không Việt Nam.

    10. Thực hiện các nhiệm vụ khác do Cục trưởng, Chánh Thanh tra Bộ giao.'
  - 'Xử lý vi phạm trong việc in, cấp, quản lý và sử dụng chứng chỉ bồi dưỡng

    1. Chứng chỉ bồi dưỡng bị thu hồi trong các trường hợp sau:

    a) Có sự gian lận trong việc chiêu sinh, học tập;

    b) Cấp cho người không đủ điều kiện; cấp không đúng thẩm quyền;

    c) Chứng chỉ bị tẩy xóa, sửa chữa;

    d) Để cho người khác sử dụng.

    2. Cán bộ, công chức, viên chức có hành vi vi phạm trong việc in, cấp, quản lý và sử dụng chứng chỉ bồi dưỡng, tùy theo
    tính chất, mức độ vi phạm, phải chịu một trong các hình thức kỷ luật theo quy định của Luật cán bộ, công chức, Luật viên
    chức. Những hành vi vi phạm các quy định về việc in, cấp, quản lý và sử dụng chứng chỉ nếu có dấu hiệu của tội phạm thì
    bị truy cứu trách nhiệm hình sự theo quy định của pháp luật.'
  - 'Địa điểm tiếp công dân, giải quyết công việc trong công tác quản lý hành chính về trật tự xã hội

    Địa điểm tiếp công dân, giải quyết công việc trong công tác quản lý hành chính về trật tự xã hội được bố trí tại nơi thuận
    tiện, dễ nhận biết để cơ quan, tổ chức, cá nhân đến liên hệ, giải quyết công việc; phải có biển ghi tên cơ quan, đơn vị
    tiếp công dân, cấp bậc, họ tên, chức vụ của cán bộ, chiến sĩ thực hiện nhiệm vụ tiếp công dân, nội quy nơi tiếp công dân,
    thời gian tiếp công dân, sơ đồ hoặc biển chỉ dẫn đến nơi giải quyết từng nội dung công tác quản lý hành chính về trật
    tự xã hội, bảng hướng dẫn trình tự, thủ tục giải quyết công tác quản lý hành chính về trật tự xã hội, hòm thư góp ý.'
- source_sentence: Hạn mức chuyển ngoại tệ ra nước ngoài trước khi được cấp Giấy chứng nhận đăng ký đầu tư ra nước ngoài là
    bao nhiêu?
  sentences:
  - 'Chuyển vốn đầu tư ra nước ngoài

    ...

    4. Hạn mức chuyển ngoại tệ theo quy định tại khoản 2 Điều này không vượt quá 5% tổng vốn đầu tư ra nước ngoài và không
    quá 300.000 đô la Mỹ, được tính vào tổng vốn đầu tư ra nước ngoài, trừ trường hợp Chính phủ có quy định khác.

    ...'
  - 'Vị trí, chức năng của Ban An toàn giao thông tỉnh, thành phố trực thuộc Trung ương

    1. Ban An toàn giao thông tỉnh, thành phố trực thuộc Trung ương là tổ chức phối hợp liên ngành, có chức năng giúp Chủ
    tịch Ủy ban nhân dân tỉnh, thành phố trực thuộc Trung ương chỉ đạo việc phối hợp thực hiện các biện pháp bảo đảm trật
    tự, an toàn giao thông và khắc phục ùn tắc giao thông trên địa bàn.

    2. Ban An toàn giao thông tỉnh, thành phố trực thuộc Trung ương được sử dụng con dấu riêng, được mở tài khoản tại Kho
    bạc Nhà nước theo quy định của pháp luật.'
  - '"Điều 9. Nội dung hoạt động dịch vụ đưa người lao động Việt Nam đi làm việc ở nước ngoài theo hợp đồng

    1. Ký kết và thực hiện hợp đồng, thỏa thuận liên quan đến việc đưa người lao động Việt Nam đi làm việc ở nước ngoài theo
    hợp đồng.

    2. Tìm kiếm, phát triển thị trường lao động ở nước ngoài; cung cấp thông tin, quảng cáo, tư vấn về cơ hội việc làm ở nước
    ngoài.

    3. Chuẩn bị nguồn lao động và tuyển chọn người lao động.

    4. Tổ chức bồi dưỡng kỹ năng nghề, ngoại ngữ, giáo dục định hướng cho người lao động trước khi đi làm việc ở nước ngoài.

    5. Quản lý người lao động; bảo vệ quyền và lợi ích hợp pháp, chính đáng của người lao động đi làm việc ở nước ngoài theo
    hợp đồng.

    6. Thực hiện chế độ, chính sách đối với người lao động đi làm việc ở nước ngoài theo hợp đồng.

    7. Thanh lý hợp đồng đưa người lao động Việt Nam đi làm việc ở nước ngoài.

    8. Hỗ trợ giới thiệu việc làm cho người lao động sau khi về nước."'
- source_sentence: Khi mở sổ, ghi sổ, khóa sổ và lưu trữ sổ kế toán thì doanh nghiệp siêu nhỏ phải thực hiện theo những quy
    định nào?
  sentences:
  - 'Sổ kế toán

    1. Nội dung sổ kế toán, hệ thống sổ kế toán, việc mở sổ, ghi sổ, khóa sổ, lưu trữ sổ kế toán và sửa chữa sổ kế toán tại
    doanh nghiệp siêu nhỏ được thực hiện theo quy định tại Điều 24, Điều 25, Điều 26, 27 Luật kế toán và hướng dẫn cụ thể
    tại Thông tư này.'
  - 'Đối tượng được phép tự doanh đầu tư gián tiếp ra nước ngoài

    Các tổ chức được phép tự doanh đầu tư gián tiếp ra nước ngoài bao gồm:

    1. Công ty chứng khoán, công ty quản lý quỹ.

    2. Quỹ đầu tư chứng khoán thông qua công ty quản lý quỹ (sau đây gọi là quỹ đầu tư chứng khoán), công ty đầu tư chứng
    khoán.

    3. Doanh nghiệp kinh doanh bảo hiểm.

    4. Ngân hàng thương mại.

    5. Công ty tài chính tổng hợp.

    6. Tổng công ty đầu tư và kinh doanh vốn nhà nước.'
  - '"Điều 147. Thế chấp dự án đầu tư xây dựng nhà ở và thế chấp nhà ở hình thành trong tương lai

    1. Chủ đầu tư dự án xây dựng nhà ở được thế chấp dự án hoặc nhà ở xây dựng trong dự án tại tổ chức tín dụng đang hoạt
    động tại Việt Nam để vay vốn cho việc đầu tư dự án hoặc xây dựng nhà ở đó; trường hợp chủ đầu tư đã thế chấp nhà ở mà
    có nhu cầu huy động vốn góp để phân chia nhà ở theo quy định của pháp luật về nhà ở hoặc có nhu cầu bán, cho thuê mua
    nhà ở đó thì phải giải chấp nhà ở này trước khi ký hợp đồng huy động vốn góp, hợp đồng mua bán, thuê mua nhà ở với khách
    hàng, trừ trường hợp được bên góp vốn, bên mua, thuê mua nhà ở và bên nhận thế chấp đồng ý.

    Việc xác định nhà ở đã được giải chấp trước khi ký hợp đồng huy động vốn góp, hợp đồng mua bán, thuê mua nhà ở với khách
    hàng theo quy định tại khoản này được nêu rõ trong văn bản thông báo nhà ở đủ điều kiện được bán của cơ quan quản lý nhà
    ở cấp tỉnh nơi có nhà ở.

    2. Tổ chức, cá nhân xây dựng nhà ở hình thành trong tương lai trên thửa đất ở hợp pháp của mình; tổ chức, cá nhân mua
    nhà ở hình thành trong tương lai trong dự án đầu tư xây dựng nhà ở của chủ đầu tư được thế chấp nhà ở này tại tổ chức
    tín dụng đang hoạt động tại Việt Nam để vay vốn phục vụ cho xây dựng nhà ở hoặc để mua chính nhà ở đó."'
