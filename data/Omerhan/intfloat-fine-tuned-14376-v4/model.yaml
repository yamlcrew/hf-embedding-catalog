widgetData:
- source_sentence: kosher süt ürünleri nedir
  sentences:
  - Endonezya'nın konumu. Endonezya Hint Okyanusu ve Pasifik Okyanusu arasında yer almaktadır. Endonezya'da yaklaşık 13.000
    ada vardır. Endonezya Adaları yıl boyunca sıcak ve nemli bir iklim yaşar.Bu adalar Asya ve Avustralya arasında ekvator
    boyunca yer almaktadır.Yerine bağlı olarak, Endonezya'da hava tropikaldir.Endonezya'da yaklaşık 13.000 ada vardır.Endonezya
    Adaları yıl boyunca sıcak ve nemli bir iklim yaşar.Bu adalar Asya ve Avustralya arasında ekvator boyunca yer almaktadır.
  - Diğer şeker ikame edicilere göre daha az bir aftertate sahip olduğu iddia edilir ve fırınlanmış ürünlerde ve yumuşak içeceklerde
    kullanıma uygundur. Ürün Kosher - ve potansiyel olarak Hamursuz Bayramı için Kosher - ve yakın gelecekte birçok üründe
    görünmesini bekleyebiliriz.Ayrıca hepimiz güçlü müshiller olduklarının farkında olmalıyız!) Rosh Hashana yaklaşırken,
    belki de Shimshon'un benzetmesini genişletebiliriz ve bir kullanım için bir tatlı olabilir.
  - Kosher yemekleri, kashrut (Yahudi diyet yasası) düzenlemelerine uyan yiyeceklerdir.
- source_sentence: Kilometre cinsinden au nedir?
  sentences:
  - Astronomik birim (AU veya au veya au veya bazen ua) bir uzunluk birimidir. Yaklaşık olarak Dünya ile Güneş arasındaki
    ortalama mesafeye eşittir. AU'nun şu anda kabul edilen değeri 149 597 870 691  30 metredir (yaklaşık 150 milyon kilometre
    veya 93 milyon mil).
  - Kiraz. Kiraz ağaçları dünya çapında bulunur. Kirazdan siyah kiraza kadar değişen 40 veya daha fazla çeşit vardır. Meyve
    ile birlikte, kiraz ağaçları, son derece hoş kokulu hafif ve narin pembemsi-beyaz çiçekler üretir.Omments. Submit. Mülkünüze
    meyve ağaçları dikmek sadece size istikrarlı bir organik meyve kaynağı sağlamakla kalmaz, aynı zamanda bahçenizi güzelleştirmenizi
    ve oksijeni çevreye geri vermenizi sağlar.
  - Gezegen Uzaklık Matrisi. Aşağıda güneş sistemimizdeki sekiz gezegenin bir matrisi ve bunların birbirinden olan uzaklıkları
    bulunur. Her bir mesafe ortalama olarak hesaplanır ve 1 AU = Güneş ve Dünya arasındaki mesafe = 149.598.000 kilometre
    olan astronomik birimlere (AU) dönüştürülür.
- source_sentence: Kalem girişi nedir
  sentences:
  - Çeşme kalemlerinizi dolma kalem mürekkep dönüştürücüleri kullanarak dolma kalem mürekkepleri ile doldurun. Bu Lamy dolma
    kalem mürekkep dönüştürücü, Lamy Safari, Vista, Joy ve AL-Star ile şişelenmiş mürekkep kullanmanıza olanak tanır.
  - Tablet PC kullanıcıları, uygulamaları kontrol etmek ve bilgi girmek için birincil yöntemler olarak kalem ve dokunmatik
    girişe güvenir. Bu bölüm, kalem ve dokunmatik girişin fare gibi geleneksel işaret cihazlarının yerine kullanılmasını tartışır.
  - Sinüs enfeksiyonu (sinüzit) alerjiler, enfeksiyon ve kimyasallar veya sinüslerin diğer tahriş edicilerinden kaynaklanır.
    Belirtiler ve semptomlar baş ağrısı, ateş ve yüz hassasiyeti, basınç veya ağrıdır. Sinüs enfeksiyonlarının tedavileri
    genellikle antibiyotiklerle ve bazen de ev ilaçları ile yapılır.
- source_sentence: Sınırsız müzik sahibi olmak ne kadara mal olur
  sentences:
  - 'İşte Bastrop İlçe Hapishanesi için hapishane mahkum bilgileri. Bastrop İlçe Hapishanesi, Hapishanede yer almaktadır:
    200 Jackson Sokak Şerifi: 200 Jackson Sokak Polisi: 104 Grady Tuck Lane, Bastrop, Teksas''ta ve 432 yatak kapasitesine
    sahiptir.'
  - 'Verizon Unlimited harika bir değerdir: sınırsız veri için 1 $ 80, kağıtsız faturalandırma ve AutoPay ile akıllı telefonunuzdaki
    konuşma ve metin. Sınırsız veri ile dört satır için satır başına 2 $ 45, akıllı telefonlarınızda ve tabletlerinizde kağıtsız
    faturalandırma ve AutoPay ile konuşma ve metin.'
  - 3 aylık abonelik ücreti 17.99 USD ve 12 aylık abonelik ücreti 49,99 $ 'dır. Music Unlimited için yeni teklif ABD, Kanada,
    Danimarka, Norveç, İsveç, Avustralya ve Yeni Zelanda'da yaşayan tüketicilere sunulmaktadır.
- source_sentence: ACS sınıfı kimyasallar nedir
  sentences:
  - Reaktif dereceli kimyasallar tipik olarak ACS dereceli kimyasallardır ve bu nedenle ACS sertifikalarını kaybetmişlerdir.
    Carolina ayrıca sınırlı sayıda kimyasal için bir ambalaj seçeneği sunar. Konsantre asitler gibi aşındırıcı kimyasallar
    normalde cam şişelerde paketlenir.
  - 'Talimatlar: 1 Uygun sayılarla tüm kutuları doldurun (1. ve 2. Çeyrek dönem notunuzun her biri% 42,5''tir. Final Sınavı,
    dönem notunuzun% 15''idir). 2 Hangisini hesaplamak istediğinize bağlı olarak dönem notu veya final sınav notu kutusunu
    boş bırakın.'
  - Genellikle bir proksimal humerus kırığının birleşmesi yaklaşık 6 ila 8 hafta sürer. Ancak, bu sadece kemikli birliğin
    alınmasıdır, tam iyileşme için gerekli olan zamanı dikkate almaz.
