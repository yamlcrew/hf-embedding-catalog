      Contributing to an audio culture that values craft, innovation, and sustainability.

      Embrace bold challenges with creativity and courage, making the tough calls to build a game we’re proud to play every
      day.

      Tell us the story behind it: what inspired you, what challenges you overcame, and why it’s meaningful to you. We’d also
