      Are comfortable implementing your work directly using Wwise and game engines such as Unity.

      Are comfortable working in live service environments where content evolves frequently.

      You prefer focusing only on asset creation without hands-on implementation in tools like Wwise or Unity.

      You’re not interested in playtesting, gathering feedback, or refining your work based on live content needs.

      Stay truly independent, with decisions driven by the team — not by investors or a board. Bring 4+ years of experience
      as a sound designer in games, ideally with live service or multiplayer titles.

      Have a strong portfolio that demonstrates your ability to craft emotional, immersive, and high-quality audio experiences.

      Thrive in a collaborative environment and enjoy working across disciplines.

      Hold a strong passion for games and the creative process.

      Embrace a growth mindset, and are eager to learn, contribute, and iterate over time.

      You’re most comfortable with one-off projects and less interested in the ongoing iteration required in live service
      games.

      You prefer working independently, as this role relies on close collaboration with designers, engineers, artists, and
      narrative partners.

      Thrive in a culture of passion, trust, and shared ownership; where transparency matters and egos don’t.

      Which of the following best describes your current situation and ability to work onsite with Bonfire? What''s the one
      game you couldn''t put down? The game that connected you with friends, and made you feel like you belonged? If a game
      has ever defined a chapter of your life, then you already know the spark we’re chasing. Our mission is to ignite that
      same feeling for players; the thrill of competition, the joy of community, and the belonging of finding your own corner
      of a larger world.

