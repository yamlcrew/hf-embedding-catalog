      and Allendale counties and is bordered on the west by the Savannah River and Georgia. SRS is close to several cities,
      including Augusta, Georgia and Columbia, South Carolina. It is also within a few hours of Atlanta, Savannah, Charleston,
      Greenville and Charlotte.

      This *** | Exempt position currently best aligns with the Chemical Engineer DA 106 Labor Category and ideal candidates
