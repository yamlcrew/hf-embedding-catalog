      for.

      Bonfire is a group of experienced and ambitious developers, proud to be creating our first original IP: Arkheron . It
      is a fast-paced, competitive PVP game set in a surreal dark fantasy world where 15 teams of three battle their way up
      the Tower. In a world built from memories, you will loot powerful items to create and adapt a unique build-out that
      will change your strategy and combat experience with every Ascension.

      The best way to understand our Audio team is in their own words — here’s how they describe their work.

      Audio is never an afterthought at Bonfire. We know the true power sound has in our world to inform, immerse and entertain.
      Our sound design is a source of pride, but our greatest satisfaction stems from our ability to enhance our players''
      experience by deeply understanding what''s important to them at any given moment. The Audio team works closely with
      our art and design teams to influence almost every aspect of the project, from the initial concept to a player''s in-game
      experience. Whether it''s guiding players through critical moment-to-moment strategy, or weaving compelling stories
      that take on a life of their own, we strive to provide an awesome and memorable sonic experience, with a harmonious
