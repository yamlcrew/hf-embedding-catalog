      some physical effort may be required, e.g., walking, standing, climbing ladders, stooping, kneeling, and carrying light
      items such as manuals or briefcases, or driving or traveling by motor vehicle. f. English Language Proficiency. Healthcare
      Engineer candidates must be proficient in spoken and written English in accordance with 38 U.S.C. § 7403(f). GRADE DETERMINATIONS.
      In addition to the basic requirements outlined, the following criteria must be met when determining the grade of candidates.
      Healthcare Engineer, GS-12 (Full Performance) (1) Experience . One year of experience equivalent to the next lower grade.
      (2) Knowledge, Skills and Abilities (KSAs). In addition to meeting the experience requirements for this grade level,
      the candidate must fully demonstrate the following KSAs: (a) Knowledge of mechanical, electrical, structural, civil
      and other engineering/architectural principles, practices and their applications in the healthcare environment. (b)
      Knowledge of healthcare industry standards and related regulatory agency and organization (including, but not limited
      to The Joint Commission (TJC), Occupational Safety and Health Administration (OSHA), National Fire Protection Agency
      (NFPA), etc.) regulations, requirements, guides, policies, procedures, directives, standards and general medical program
      requirements as they relate to healthcare engineering. (c) Knowledge of construction standards, methods, practices and
      techniques, materials and equipment to determine compliance with engineering regulations and standards. (d) Skill in
      researching and analyzing information, conditions, human factors and projections to make sound engineering and business
      recommendations and decisions to proactively identify problems and develop innovative solutions within the context of
      applicable rules, regulations and procedures. (e) Ability to plan and execute complex, multi-faceted projects and inspections
      while prioritizing resources against approved scopes of work, contract documents and budgets. (f) Ability to organize
      and lead multi-disciplinary task forces with members from different departments and divisions, as well as design and
      construction firms. (3) Assignment. Employees at this level serve as Healthcare Engineers at the full performance level.
      They work independently, under general supervision with wide latitude to exercise independent judgment. Healthcare Engineers
      demonstrate intimate grasp of high order healthcare engineering and capital subject matter. They serve as institutional
      resources for healthcare delivery processes and systems, working extensively with clinical stakeholders, acquisition
      staff, contractors and executive leadership by leading healthcare engineering programs, technology assessments, integration
      planning and implementation of both current and emerging technologies. Healthcare Engineers support the delivery of
      healthcare to Veterans by contributing to the education of clinical staff, planners and leadership to ensure safe and
      efficient healthcare delivery. Healthcare Engineers plan, execute and document highly complex, multi-faceted healthcare
      facility construction projects and inspections while prioritizing resources against approved scopes of work, contract
      documents and budgets. They identify problems and develop innovative solutions within the context of applicable rules,
      regulations and procedures, as it relates to the healthcare environment. References: VA Handbook 5005/150, Part II Appendix
      72, Healthcare Engineer Qualification Standard The full performance level of this vacancy is GS-12.

      You will be evaluated for this job based on how well you meet the qualifications above.

      To apply for this position, you must provide a complete Application Package which includes:

      Professional Certification

      To begin, click Apply Online to create a USAJOBS account or log in to your existing account. Follow the prompts to select
      your USA JOBS resume and/or other supporting documents and complete the occupational questionnaire. The position serves
      as a Healthcare Engineer (Project Engineer) for Veterans Affairs (VA) Hudson Valley Healthcare System.

