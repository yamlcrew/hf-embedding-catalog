    sentences:
    - 'Technical Program Manager I, Infrastructure Engineering, Core Google Coordinate and deliver program communications
      in close collaboration with program stakeholders, including metrics progress, meeting notes, meeting AIs, decision/escalation
      logs, newsletters, and websites.

      Collect data relating to program progress from program stakeholders. Maintain project trackers and status reports in
      close collaboration with program stakeholders.

      Author program charter that addresses scope and timeline of basic program, specify program OKRs, and explain resource
      requirements/dependencies, in close collaboration with program stakeholders.

      Author stakeholder map that specifies who is impacted by, and who influences, program outcome in close collaboration
      with program stakeholders.

      Triage technical bugs and feature requests alongside engineering stakeholders for purposes of prioritization, resourcing,
      and tracking execution. Bachelor''s degree in a technical field, or equivalent practical experience.

      1 year of experience in program management.

      Experience with large-scale infrastructure projects (e.g., across software, hardware, data center, or networking).

      Experience working on infrastructure engineering teams or experience in service performance or quality.

      Experience managing cross-functional or cross-team projects.

      Google is a global company and, in order to facilitate efficient collaboration and communication globally, English proficiency
      is a requirement for all roles unless stated otherwise in the job posting. A problem isn’t truly solved until it’s solved
      for all. That’s why Googlers build products that help create opportunities for everyone, whether down the street or
      across the globe. As a Technical Program Manager at Google, you’ll use your technical expertise to lead complex, multi-disciplinary
      projects from start to finish. You’ll work with stakeholders to plan requirements, identify risks, manage project schedules,
      and communicate clearly with cross-functional partners across the company. You''re equally comfortable explaining your
      team''s analyses and recommendations to executives as you are discussing the technical tradeoffs in product development
      with engineers.

      The Core team builds the technical foundation behind Google’s flagship products. We are owners and advocates for the
      underlying design elements, developer platforms, product components, and infrastructure at Google. These are the essential
      building blocks for excellent, safe, and coherent experiences for our users and drive the pace of innovation for every
      developer. We look across Google’s products to build central solutions, break down technical barriers and strengthen
      existing systems. As the Core team, we have a mandate and a unique opportunity to impact important technical decisions
      across the company.

      To all recruitment agencies: Google does not accept agency resumes. Please do not forward resumes to our jobs alias,
      Google employees, or any other organization location. Google is not responsible for any fees related to unsolicited
      resumes.'
    - 'Chemical Engineer ProSidian Consulting, LLC Provides engineering support for chemical and process systems. Identifies
      system concepts and determines system functional and technical requirements, develops and analyses process flowsheets,
      conducts process analyses, monitors system performance, troubleshoots and resolves problems and ensures operation within
      technical and safety basis requirements. Proposes and development process/system improvements including flowsheet changes,
      equipment upgrades and plant modifications. As Design Authority, prepares system modification input documents, provides
      technical input (e.g. for procedure development) and approves work packages, and advises operations/maintenance/project
      management for optimizing day to day operations.

      Generates facility design description documents and system design descriptions, conducts major technical alternative
      studies.

      Teamwork – ability to foster teamwork collaboratively as a participant, and effectively as a team leader

      Business Acumen – understanding and insight into how organizations perform, including business processes, data, systems,
      and people

      Motivation – persistent in pursuit of quality and optimal client and company solutions

      Judgment – exercises prudence and insight in the decision-making process while mindful of other stakeholders and long-term
      ramifications

      Organization – the ability to manage projects and actions, and prioritize tasks The Chemical Engineer - Engineering
      shall have consecutive employment in a position with comparable responsibilities within the past five (5) years, Must
      be able to use a computer to communicate via email; and proficient in Microsoft Office Products (Word/Excel/PowerPoint)
      and related tools and technology required for the position.  Work products shall be thorough, accurate, appropriately
      documented, and comply with established criteria. All employees, in the performance of their respective responsibilities,
      shall conduct themselves in the highest possible standards of ethical and business conduct.  The candidate shall ensure
      that duties are performed in a competent and professional manner that meets milestones/delivery schedules as outlined.

      Must have strong oral and written communication skills. Teamwork skills are important in the highly-matrixed project
      environment. BS Degree in Chemical Engineering and five (5) years minimum experience or registration as a Professional
      Engineer in Chemical Engineering. Candidate must demonstration five (5) years experience in Chemical Engineering in
      nuclear or chemical industry. Candidate must have working knowledge of National Codes and Standards. Candidate must
      have ability to walk down systems in the field. Experience with Fluidized bed steam reforming, ion exchanges systems,
      vitrification systems or nuclear/hazardous waste processing preferred. 40 hour work week is scheduled. SRS utilizes
      various work schedules; including 5/8s (8 hours/day; five days per week), 4/10s (10 hours/day; four days per week),
      and a 9/80s (9 hours/day, five days on week A and 4 days on week B). Work week excludes SRR holidays. Each work day
      has a 30-minute lunch. A security clearance is not initially required; however, candidate must be capable of obtaining
      an L clearance if required to perform assigned duties.

      TRAVEL:  Occasional travel may be required to attend meetings, events, site visits, or other training requirements. 
      Travel is coordinated with the technical point of contact and approved in writing by the Contracting Officer in advance,
      is allowed, in accordance with Federal Travel Regulations.  LOCATION:  Work shall be conducted at or in proximity to
      Savannah River Site / Aiken, South Carolina

      U.S.  Citizenship Required - You must be a United States Citizen

      Excellent oral and written communication skills (This employer participates in the e-Verify program)

      Proficient with Microsoft Office Products (Microsoft Word, Excel, PowerPoint, Publisher, & Adobe)

      All ProSidian staff must be determined eligible for a “Facility Access Authorization” (also referred to as an “Employment
      Authorization”) by the USG’s designated Security Office.

      Other Requirements and Conditions of Employment Apply

      May be required to complete a Financial Disclosure Statement

      Must be able to submit to and qualify for varying levels of background investigative requirements, up to a Top Secret
      or DOE "Q" clearance.

      As a condition of employment, all employees are required to fulfill all requirements of the roles for which they are
      employed; establish, manage, pursue, and fulfill annual goals and objectives with at least three (3) Goals for each
      of the firms Eight ProSidian Global Competencies [1 - Personal Effectiveness | 2 - Continuous Learning | 3 - Leadership
      | 4 - Client Service | 5 - Business Management | 6 - Business Development | 7 - Technical Expertise | 8 - Innovation
      & Knowledge Sharing (Thought Leadership)]; and to support all business development and other efforts on behalf of ProSidian
      Consulting.

      Communication – ability to effectively communicate to stakeholders of all levels orally and in writing

      Agility – ability to quickly understand and transition between different projects, concepts, initiatives, or work streams

      Business Tools – understanding and proficiency with business tools and technology, including Microsoft Office. The ideal
      candidate is advanced with Excel, Access, Outlook, PowerPoint, and Word, and proficient with Adobe Acrobat, data analytic
      tools, and Visio with the ability to quickly learn other tools as necessary.

      Humility – exhibits grace in success and failure while doing meaningful work where skills have impact and make a difference

      Willingness - to constantly learn, share, and grow and to view the world as their classroom ProSidian is a Management
      and Operations Consulting Firm focusing on providing value to clients through tailored solutions based on industry-leading
