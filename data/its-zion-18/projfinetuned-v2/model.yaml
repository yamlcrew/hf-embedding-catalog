      Engineering services will be provided using Savannah River Remediation Company (SRR) and Savannah River Site (SRS) processes
      and procedures. Programmatic guidance will be provided by SRR.

      Leadership – the ability to guide and lead colleagues on projects and initiatives

      Commitment - to work with smart, interesting people with diverse backgrounds to solve the biggest challenges across
      private, public and social sectors

      Curiosity – the ideal candidate exhibits an inquisitive nature and the ability to question the status quo among a community
      of people they enjoy and teams that work well together'
    - 'AECOM is looking for a Architect in Columbia, SC AECOM Performs architectural tasks, specifications, reports and related
      data tables

      Prepares, reviews, and approves drawings as required

      Performs interdisciplinary review of project deliverables and identifies discrepancies in results

      Under the direction of the Supervising Architect, may independently perform advanced technical assignments of various
      complexities within approved schedules and budgets

      Works with other professional staff members to collaborate on reports, studies, drawings, and design narratives

      Works in an office setting with potential meetings outside of the office or visits to sites where a project may be located

      May assist in the development of new architectural methods and techniques Performs specific and limited portions of
      a broader assignment of an experienced Architect.

      Assists in the training and mentoring of Junior architectural and design/drafting personnel

      Bachelor’s degree in Architecture plus four (4) years of relevant experience or demonstrated equivalency of education
      and/or experience

      Licensed as a Registered Architect (NCARB)

      Due to the nature of the role, U.S. citizenship is required

      Experience in Autodesk Revit, Bluebeam or other PDF design software

      Proficiency with Microsoft Office, Word, Excel, PowerPoint and Outlook

      Desire to be mentored by leadership and provide mentorship to junior staff

      Must be a highly motivated self-starter with solid writing and verbal communication skills

      Strong attention to detail and accuracy of work with a innate desire for follow-through

      Ability to work independently and with large groups of technical minded people

      Ability to apply passion and enthusiasm for design in a collaborative and progressive team-oriented work environment

      Knowledge seeker that is curious about their profession and innovations to serve in better ways Work with Us. Change
      the World.

      At AECOM, we''re delivering a better world. Whether improving your commute, keeping the lights on, providing access
      to clean water, or transforming skylines, our work helps people and communities thrive. We are the world''s trusted
      infrastructure consulting firm, partnering with clients to solve the world’s most complex challenges and build legacies
      for future generations.

      There has never been a better time to be at AECOM. With accelerating infrastructure investment worldwide, our services
      are in great demand. We invite you to bring your bold ideas and big dreams and become part of a global team of over
      50,000 planners, designers, engineers, scientists, digital innovators, program and construction managers and other professionals
      delivering projects that create a positive and tangible impact around the world.

      We''re one global team driven by our common purpose to deliver a better world. Join us.

      AECOM is seeking an Architect to be based in Columbia, SC. Additional Locations are Greenville, SC; Charlotte, NC; or
      Charleston, SC. As an Architect with growing technical expertise and experience in demanding design driven projects,
      you will work with interdisciplinary teams on High Tech and Logistics Projects in a Programmatic approach.  We will
      give you the flexibility you need to do your best work with hybrid work options. Whether you’re working from an AECOM
      office, remote location or at a client site, you will be working in a dynamic environment where your integrity, entrepreneurial
      spirit and pioneering mindset are championed.  Here, you will have freedom to grow in a world of Opportunity.

      About Buildings + Places AECOM’s Buildings + Places practice includes architecture, interiors, building engineering,
      workplace strategy, business transformation, asset advisory, economics and development planning, master planning, urban
      planning, and landscape architecture. With a range of expertise from strategy and design through project realization,
      we create better outcomes to grow economies, protect natural systems, conserve natural resources, make societies more
      equitable and connect and engage people through innovative, sustainable design solutions. Our South Carolina teams focus
      on providing design services in the Industrial, High Tech, Logistics and Federal markets for projects such as data centers,
      logistics centers, industrial facilities, and federal installations.

      Job Summary/Responsibilities The Architect III will work on Federal, High Tech, Logistics and Industrial facility projects
      that are designed out of the Carolinas Regional B+P group

      What makes AECOM a great place to work

      You will be part of a global team that champions your growth and career ambitions. Work on groundbreaking projects -
      both in your local community and on a global scale - that are transforming our industry and shaping the future. With
      cutting-edge technology and a network of experts, you’ll have the resources to make a real impact. Our award-winning
      training and development programs are designed to expand your technical expertise and leadership skills, helping you
      build the career you’ve always envisioned. Here, you’ll find a welcoming workplace built on respect, collaboration and
      community—where you have the freedom to grow in a world of opportunity.'
