  - source_sentence: 'query: Печенеги отступали. Они могли запросто убить оставшегося позади князя Владимира, мальчишку и
      старика, но получили приказ - уходить. Куря - печенежский хан, проигравший бой с князем, был смертельно ранен.

      Воины забрали его и вернулись на прежнее место стоянки, где были оставлены обозы с провиантом и разбит временный лагерь.
      Гийяр не отходил от отца ни на шаг, надеясь не то на чудо, не то на лекарей. Ведь кроме него у мальчишки никого не было.
      Мать он потерял ещё совсем крохой.

      Куря был властным и жестоким правителем. К сыну относился хорошо, но никогда не баловал. Для Гийяра отец всегда был
      идеалом, многие завидовали его решимости и хитроумию. "Власть держится на страхе" - часто говорил он. Но теперь он находился
      между жизнью и смертью. И чёрная чаша весов была намного тяжелее...

      Великий хан умер ночью, не приходя в сознание.

      Парень понимал, что вынужден стать следующим ханом, ведь по линии отца у него больше родственников не было. Но это значило
      одно. Снова совершать набеги на Киев и Новгород, продолжать дело Кури, а значит - обернуться против своих друзей, поступить
      подло по отношению к князю, Алекше и Оленьке. А есть ли у него выбор?

      Да. И сейчас это его выбор. Отец не подскажет ему, не поможет, не укажет верный путь. Да и не послушал бы Гийяр его.
      Он никогда не сможет стать таким жестоким, как отец. Но теперь мальчик понимал, откуда тот черпал свою ненависть, злость,
      обиду и жажду крови. У него никогда не было настоящего друга, который смог бы подставить плечо, дать дружеский совет.
      Несмотря на орды подчинённых ему печенегов и хазар, отец был одинок. Не ставил никого рядом с собой, унижал, жестоко
      наказывал воинов, заслужив тем самым "страх и уважение". Так считал он сам. И такой позиции придерживались печенеги...

      А Гийяр? Алекша спас ему жизнь, не зная, что тот враг. А когда узнал, разве захотел убить его? Ведь печенеги сожгли
      его деревню и убили дедушку.

      Но Гийяр не мог понять, как вообще такое возможно. То ли христианину так и полагается, молча переносить все невзгоды,
      что посылает ему судьба, то ли русский дух настолько силён, что не может опускаться до мести. Не понимал..., а жажда
      мести разгоралась в его душе. Оленька... Храбрая девчушка с чёлкой и длинной светлой косой... Нет! О ней даже не думай!

      Он должен наказать убийцу отца, даже если тот сам, обманутый Кривжей, ввязался в бой. И тут же сердце возражало. "Так
      нельзя".

      Ты ведь уже принял решение. Там, на поле боя, когда отец проиграл. Ты остановил разъяренных печенегов, готовых разорвать
      ненавистного князя Владимира. А чудной дед и мальчишка? Помешали бы они этому? Нет.

      Разве парень мог сказать такие слова?

      Перед глазами снова появляется та картина.

      Молодой князь ударил Курю мечом и выбил из седла. Мальчик бросается к отцу. Орда печенегов уже не сдерживает коней,
      рвущихся к бою. Ещё секунда, и они сорвутся с места. Поляна обагрится кровью.

      "Нет! -останавливает их Гийяр. - Это был честный поединок. Уходим!"

      Воины нехотя, но послушно разворачивают коней.

      Почему они послушали его? Он ведь не хан. Ответ один. Они доверяют ему. Как и его отцу.

      Так что же делать?

      Глупый мальчишка. Ты всё решил. Ты возглавишь печенежский союз племён, но не посмеешь напасть на Киевскую Русь.

      Гийяр вышел из шатра. Кругом, куда не посмотри выстроилось войско. В ожидании молодого хана они перешёптывались, спорили,
      ругались. Но тут все разом замолчали. Они были готовы услышать решение Гийяра.

      - Слушайте! Печенеги- свободные воины! -голос мальчика не дрогнул.- Вы можете следовать за мной, а можете примкнуть
      к кангарам! Я же считаю, что мы должны разбить половцев, которые давно зарятся на наши земли! Кто со мной?!

      Ответом было одобрительное и дружное "Ура!"

      Печенеги ушли с русской земли, но не навсегда. Через какое-то время они вернулись с новым ханом, чтобы ввязаться в междоусобную
      войну между Ярославом Мудрым и Святополком Окаянным, на стороне последнего.'
    sentences:
    - 'query: http://vk.com/audio?performer=1&q=Hollywood%20Undead%20Coming%20Back%20Down

      Пустые улицы большого города, что освещались утренним солнцем. На переулках встречались редкие прохожие, которые с удивлением
      смотрели на полураздетого парня, шагающего вдоль улиц Магнолии.

      "Сумасшедший,"- подумают многие, но разве это неправда? Нет, это, правда, это чистейшая, правда, которая с каждым днём
      гложет его душу. Он был сумасшедшим до того как она пришла в его жизнь, и остался таким после того как она ушла...

      Каждый день, прогуливаясь по улицам утреннего города, он с улыбкой на губах, и с грустью в глазах вспоминал все моменты,
      когда она ходила вместе с ним. Каждый раз, ему чудилось, что она с ним, что она не оставила его, но это ведь неправда,
      или правда? Что за чушь? Конечно, же, она уже не с ним, она там далеко наверху от них...

      Он всегда слушал её звонкий, но одновременно робкий голос, от которого так и хотелось прижать к себе и не отпускать
      никогда, но он отпустил, туда, от, куда не возвращаются.... И теперь, её голос постепенно растворяется из его мыслей.

      С ней, он чувствовал, что он не такой как все, с ней, он мог быть особенным, но зачем теперь быть таким, если её нет?
      Теперь, он лишь одно лицо, в той толпе, что окружила его. Возможно, его и заметят, но точно не как личность, его знала
      лишь она, но она ушла...

      Someday, someday

      Но когда-нибудь, когда-нибудь

      I know you''re coming back

      Я знаю, ты вернешься...

      Строчки сами всплыли у него в голове. Песня, которую он услышал недавно по радио, всегда преследовала его. Не важно
      где, на улице, в метро, в машине, или дома, он всегда вспоминал её... Ту, что изменила его жизнь, и ту, которая сейчас
      очень далеко от него...

      Шагая по улицам просыпавшегося города, он невольно прошёл-то место, где она покинула этот мир. Воспоминания нахлынули
      его, но он попытался их отогнать, но разве это возможно? Нет... Он это знал, но всё же противится судьбе. Какая ирония,
      не правда ли?

      Грязная улица, в старом районе Магнолии, насквозь была пропитана кровью, куревом, и алкоголем. Она ведь предлагала уйти,
      а он не послушался её. Глупец. Маленький наивный глупец, который ничего не боится, хотя всё совсем наоборот...

      Маньяк, от которого они бежали, был пропитан безумством, но разве безумством называют алкоголь? Кто знает, кто знает...
      А жертвы, пьяного человека, прибежали в какую-то улочку, из которой убежать невозможно, или тупик... Одно всего лишь
      слово, а сколько паники оно приносит... Пятясь, они встали, во что-то похожее не грязь, или это и была грязь? Кто знает,
      кто знает... Замахнувшись, маньяк направил перечный ножик на парня, и кинул его. Банально да? Но девушка, успела встать
      перед ним, и по этому, удар пришёлся прямо в живот.

      Что было дальше, парень помнил смутно, но было очевидно, на его глазах, за него умерла его Джувия. Странно, да? Вроде
      бы должно быть наоборот, а получилось так. На его руках, была её кровь, а он видимо потерял сознание...

      Теперь, мир слишком серый, хотя нет, он кроваво-красный, такой же, как и её любимый цвет. Странно да? Любит дождь, но
      любимый цвет красный... Но разве имеет ли это значение, если Джувия ушла со сцены, навсегда? Возможно, это и был её
      час, а может быть, она жила бы ещё дольше, но всё же прошла мимо, так же, как и всё хорошее, в этом алчном мире...

      И этот факт, заставил его повзрослеть, и принять реальность со всеми её составляющими... Трудно, было лишь по началу,
      а сейчас он привык, и даже вполне справляется, но что-то поменяется, и это, что-то произойдёт слишком быстро...

      Она никогда не задумывалась, о том, будут ли её помнить, или не заплачут ли они, когда она умрет, нет, у неё даже мыслей
      таких не было, ведь ты была в своих мечтах. Думала, что будешь жить вечно, как бог, или дьявол. Она думала, что тебя
      не пробьёт никакая пуля, но всё же ошиблась... Простой ножик отнял твою жизнь, и знаешь, я не жалею об этом, ведь, ты
      всегда была с крыльями, как у ангела, хоть ты не всегда была счастлива, пока, в твоей жизни не запели посланники Божьи...

      И снова, его пробирает дрожь, он думает, что сейчас она подбежит, сзади, и, закрыв глаза, скажет "Угадай кто?" И ты
      как обычно просто скажешь с улыбкой "Джувия. Моя Джуви." И темноволосый поклянётся, всем богам, что она смущается от
      его слов. Ведь это правда...

      Будние дни потихоньку вытесняют её голос из его головы, а сам он погружается, в суету города. Возможно, он забудет её,
      найдёт другую, и они заживут счастливо, или будет одинок всё жизнь, вспоминая её. Кто знает, чем закончится эта история,
      но однажды они встретятся. Через сто лет, через века, тысячелетия, не важно... Они встретятся, и это главное....

      А пока, темноволосый скажет лишь одно предложение, и с ухмылкой пойдёт в сторону дома...

      - Кода же ты спустишься, Джуби?

      Всего лишь за несколько секунд, мир может поменяться, до неузнаваемости. Берегите это время, и возможно, в будущем время
      само преподнесет вам подарок...'
    - 'query: Больно... Слишком больно... Больно каждое мгновение, каждый вздох причиняет просто немыслимую боль. А она лежит
      совсем рядом, бездыханная. Вокруг люди, но он их просто не видит. Он видел как она умерла, она смотрела прямо на него
      в этот момент и хотела поцеловать.

      "Magic can do much, but not death".

      Он отгородился от всего вокруг, осталась только боль. И вдруг вспышка ярости, а перед его взором гаснущие глаза Белль.
      Ярость заставила его подняться с колен и направиться к убийце. При ходьбе, в ноге проснулся вулкан, но это было уже
      не важно. Боль в душе заглушала все остальное.

      "Она умерла из-за меня".

      Он подошел к убийце, тот лежал на земле и ухмылялся. Он выполнил свою месть и был собой доволен. Мужчина с яростью начал
      душить убийцу своей тростью, но ухмылка не сходила с его лица. Голда пытались оттащить, но ярость придала ему огромную
      силу, и вскоре глаза пирата погасли. Но Голду не стало от этого легче, он лишь почувствовал, что предал ее веру. Убив
      Белль, пират убил все человеческое в Голде, остался только монстр. Монстр с разбитым сердцем.

      Эмма хотела надеть на него наручники, но не смогла. Импульсом он отбросил ее и ее родителей от себя. Его кожа начала
      меняться, и одежда также вмиг переменилась. Совершив убийство, он снова стал крокодилом, безжалостным Румпельштильцхеном.
      Он снова подошел к Белль и упал перед ней на колени. Он смотрел на ее холодное лицо и просто не мог поверить, что ее
      теплые глаза не посмотрят с нежностью на свое чудовище. Из груди вырвался жуткий нечеловеческий крик, будто он звал
      душу любимой, но она не откликалась.

      И снова ярость, безумная ярость и слезы. Она виновата лишь в том, что влюбилась в чудовище, подарила ему счастье. Но
      ее смерть забрала все.

      Было совсем не так, как тогда в замке. Тогда он хотя бы знал, что его принцесса в порядке, теперь...

      Слишком больно...

      Румпельштильцхену не хотелось ступить за черту города и все забыть. Он не мог забыть свою принцессу, хоть воспоминания
      и приносили страдания. Он хотел просто умереть рядом с той девушкой, которая забрала его сердце.'
    - 'query: До этого момента я ничего не чувствовал. Пустота и темнота. После того, как эта тварь вцепилась мне в шею я
      успел мысленно со всеми попрощаться и был готов к смерти. Но это была не она. На том свете не может быть так неопределенно
      и темно. Значит, я все ещё жив. А раз так, я скоро выберусь отсюда...

      По телу словно прошел электрический разряд. Я вздрогнул и распахнул глаза.

      Честно признаться, я даже не сразу понял где нахожусь. И в данный момент меня это совсем не тревожило, потому, что перед
      собой я увидел знакомое лицо мага. Единственный, кто мне нравился после Джейса и с первого взгляда сумел заполучить
      моё сердце. Да, это несомненно был он. За столькие годы впервые в стенах института кто-то кроме сумеречных охотников.

      - Магнус Бейн, - с максимальной холодностью, какая только возможна в данной ситуации, прокомментировал очевидное я.

      Так уж принято у нас, охотников. Не кинусь же я к нему на шею с поцелуями и фразочками примитивных типа: "О, привет!
      Давненько не виделись. Я так скучал".

      Чисто физически в данный момент я и не мог себе такого позволить. Да и видел я мага всего во второй раз в своей жизни.
      Но, черт возьми, этого было достаточно, чтобы подцепить меня на крючок как глупого карася!

      - Александр Лайтвуд, - снисходительно улыбнулся Магнус.

      Похоже после долгой отключки у меня начала кружиться голова, но это показалось даже приятно.

      Я открыл было рот чтобы задать вопрос, но гость опередил меня.

      - Только не спрашивай, что я здесь делаю, - он прожег меня взглядом медовых глаз. - Ходж переживал за твою жизнь и,
      как я вижу, не напрасно.

      Это было именно то, что я и хотел спросить. Если он умеет читать мысли - это весьма плачевно. Предпочитаю держать свои
      мысли при себе.

      Бейна снова что-то развеселило и он криво улыбнулся отворачиваясь от меня. Это подтвердило мои догадки.

      - Ладно, не буду тебя смущать, - маг поднялся. - Ты еще слишком слаб и отдых лишним не будет.

      Магнус сделал странное движение похожее на полупоклон и направился к двери.

      "Нет, так просто ты от меня не уйдешь".

      Мне действительно хотелось, чтобы он побыл рядом, чтобы не уходил так быстро. Он мне нравился, насколько можно судить
      по одной мимолетной встрече глазами. Хотя я не готов был признаться в этом даже себе.

      - Я нормально себя чувствую, - не своим голосом заметил я, провожая мага взглядом.

      Тот не остановился. - Бейн! - снова никакой реакции. - Стой! - в яростном бессилии я ударил рукой по кровати и мгновенно
      вернувшаяся боль заставила меня стиснув зубы едва слышно простонать.

      Маг замер.

      - Хочешь, чтобы я остался? - в его словах я услышал весьма недвусмысленный намек. - Я нужен тебе?

      Фигура в черной мантии развернулась ко мне. Бейн вскинул бровь ожидая ответа.

      - Ой, иди к дьяволу! - психанул я, неожиданно даже для самого себя, но пути назад уже не было.

      - ...

      - Убирайся, - процедил я сквозь зубы, в душе умоляя его не слушать моих слов.

      - Ладно, - примирительно тряхнул головой Магнус. - Прости.

      Он вернулся к моей койке.

      Я смерил его сердитым взглядом и "совершенно случайно" встретился с прекрасными глазами. Его взор проникал прямо в душу,
      заставлял подчиняться воле хозяина.

      Другого описания я бы дать не смог, но может только на меня он так действовал.

      - У тебя тоже красивые глаза, - сделал комплимент он.

      - Хватит! - я прикусил губу, чувствуя, как краска приливает к моему лицу.

