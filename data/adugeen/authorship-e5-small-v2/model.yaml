      я с трудом сдержал рвотный позыв. Не стоит заводиться... Не стоит заводиться... Не стоит заводиться!

      Я откинул вилку в сторону, за столом воцарилась гробовая тишина. Я знал, что ещё несколько минут никто ничего не скажет:
      все будут дожидаться, пока я уйду, чтобы не попасться под горячую руку.

      И я ушёл. Зачем портить людям настроение. У них ведь атмосфера праздника. Завтра же грёбаное Рождество.

      Оливер зашёл ко мне, когда было уже за полночь. Я сидел за столом и усердно строчил в блокноте. Рифма хлестала из меня
      без остановки, меня словно тошнило строчками стихотворения; мне было плохо, но всё, чем я мог себе помочь - это писать
      и писать, выплёскивая из себя всё то, что накопилось.

      В комнате было темно: я писал, сидя у окна, и мне вполне хватало света фонаря на улице.

      - Я могу чем-нибудь тебе помочь?

      Я едва сдержался, чтобы нервно не засмеяться: конечно, можешь, Олли! Задуши Пауля. Нет, лучше застрели. Или утопи. Сделай
      хоть что-нибудь, чтобы это маленькое чудовище не появлялось рядом с Рихардом!

      - Нет, спасибо, у меня всё в порядке.

      Оливер недоверчиво посмотрел на меня, но не стал ничего говорить, за что я был от души ему благодарен. Я порой завидовал
      его спокойствию, терпению и, пожалуй, мудрости. У нас с ним значительная разница в возрасте, но порой мне кажется, что
