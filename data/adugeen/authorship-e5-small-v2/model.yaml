      Знаешь, что?! Я это так не оставлю! - на этих словах женщина, чуть ли не снимая дверь с петель, выбежала из комнаты.

      Кира резко опустилась на колени. Прижав руки к кровати, она пыталась сдерживать ее невыносимый скрежет.

      Взяв молоток и гвозди из кладовой, девочка безнадежно колотила по обломкам, пытаясь хоть как-то их соединить. Но все
      оказалось безрезультатно: обломки лишь с еще большим стремлением раскалывались под гнетом гвоздей.

      Она легла на пол. Легкий сквозняк щекотал ее спину.

      - Я никогда не смогу допрыгнуть до потолка, - сказала Кира и выдохнула.

      - А вдруг это не так?

      Кира резво встала. На ее лице появилась маска недоумения, а в груди начал разжигаться огонек страха. Откуда этот голос?

      - Не бойся, глупышка, - голос был очень мягок.

      - Откуда ты? Я тебя раньше не слышала...

      - А разве это важно?

      - А что, нет?

      - Почему это должно быть важно? Разве нельзя просто поговорить с тобой?

      - Ты думаешь, я буду говорить с незнакомым голосом?

      - А почему нет?

      - Так. Мне надоедает эта игра в вопросы. Говори, что или кто ты есть?

      Внезапно наступило молчание, после чего последовало продолжительное гудение.

      Голос начал напевать песенку, не песню, а именно песенку. Любимую песенку Киры, которую она заводила каждый раз, когда
      ломалось что-нибудь в ее комнате.

      - Я могу построить тебе новую кровать. Гораздо лучше этой. В ней будет много цветов и сладостей...

      Девочка оживилась. В ее речи послышались нотки радости.

      - Правда? Ты сделаешь это?

      - Да, но вот только...

      - Что "только"?

      - Только она будет не настоящей. Ты не сможешь на ней спать, но она будет в твоей комнате. - голос откашлялся. - Ах,
      да. Кроме тебя ее никто не увидит.

      Девочка задумчиво улыбнулась.

      - Но когда же я смогу увидеть свою кровать?

      Голос начал смеяться. Сильно, долго, но мягко. Этот смех был очень и очень необычен: вроде бы и добрый, а вроде бы и
      с насмешкой.

      Жалость.

      Жалость управляла им.

      - Почему ты смеешься?

      - Да потому что ты глупая девочка, которая даже не может решить.

      - Я вовсе не глупа!

      - Да? Так ответь: тебе нужно то, что я предлагаю?

      - Но это же вовсе не настоящая кровать! - Кира приложила руки к лицу. - На ней я не смогу допрыгнуть до потолка!

      Голос опять залился смехом.

      - ПОЧЕМУ ТЫ СМЕЕШЬСЯ ВСЕ ВРЕМЯ?!

      - Да потому что ты уже решила. Уже давным-давно решила.

      - И что же я решила?

      - Ты согласна, ведь так?

      Кира замешкалась, но, все же, выдавила из себя неуверенное "да".

      Голос пропал, оставив после себя огромную кровать, с большим матрасом и мягкими подушками. На такой кровати, определенно,
      можно было бы допрыгнуть до потолка.'
  - source_sentence: 'query: Тяжёлые портьеры с тихим шелестом разъехались в стороны, впуская внутрь свет. Он был серо-белым
      и больно бил по привыкшим к темноте глазам. Я потушил стоявшие на ночном столике свечи и поднялся с кровати.

      Этот день не предвещал ничего необычного. Я как всегда проснулся на несколько мгновений раньше всеобщей побудки. На
      автомате привёл себя в порядок и облачился в свой длинный чёрный балахон, подпоясав его серебряным шнурком - знаком
      жнецов. Надел на голову ненавистный обруч, который сильно давил на лоб, но без которого я не мог появиться вне своей
      кельи - он указывал на мою принадлежность к Высшей касте. Последний штрих - Кольцо верности.

      Моя келья располагалась на самом престижном ярусе - нижнем. Местные ещё называли его Колыбелью теней. Там имели право
      находиться только жнецы Высшей касты - те, кого Смерть выбрала своими советниками.

      Каждый рассвет я поднимался на отсчётный ярус, где получал указания от Старейшин, а затем приступал к своей работе.
      Я - собиратель душ.

      Я пересёк учебный зал, где обучались молодые жнецы. Когда-то я и сам сидел на этих скамьях и тщательно внимал каждому
      слову профессора. Наверное, именно мои старательность и упорство помогли мне дослужиться до Высшей касты.

      Само место, где мы обитали, называлось Храмом. Он располагался вне пространства и времени. Храм был сделан из белого,
      красного и чёрного мрамора и имел очень высокие своды. Кое-где они достигали такой высоты, что их невозможно было увидеть.
      Такие своды назывались небесами.

      Обитатели Храма жили в кельях - просторных круглых комнатах. Поскольку времени для нас не существовало, но внутри всё
      равно тикали биологические часы, были придуманы рассветы и закаты. Храм был окутан белой, светящейся пеленой, поэтому
      на закате, когда требовалось ложиться спать, портьеры на всех окнах задвигались. На рассвете же наоборот - они разъезжались
      в разные стороны. Делалось всё это в единое для всех время, и изменить закрытие и раскрытие портьер даже в личных кельях
      было невозможно.

      Наконец, я на своём ярусе. Сегодня в зале было на удивление пусто - внутри оказался лишь один Старейшина. Когда я вошёл,
      он стоял спиной ко мне, опрокинув назад голову и разглядывая небеса.

      - Вам следует быть более расторопным, брат Рихард, - сказал он спокойно, не отрывая взгляда от небес. - Особенно когда
      для Вас припасено такое задание.

      Его слова заставили меня оживиться: они обещали что-то посложнее простого сбора душ.

      - И каково же оно? - спросил я, стараясь придать голосу безразличие.

      - Не обольщайтесь, это не просто интересная игра, - Старейшина наконец обернулся и посмотрел мне в глаза. - Вы будете
      иметь дело с очень необычным экземпляром.

      Чуть приподняв полы путавшегося в ногах балахона, Старейшина подошёл ближе ко мне.

      - Мы давно охотимся за душой этого человека. Смерть не раз вносила его в свои списки, но каким-то неведомым образом
      он уже четыре раза от нас ускользал. Опытнейшие жнецы не смогли справиться с этим заданием. Тогда Смерть отдала приказ
      отправить к этому человеку именно Вас, - Старейшина сделал ударение на последнем слове. - Не подведите её. Иначе Вы
      знаете, что Вас ждёт.

      Он бросил взгляд на Чёрное око. Это колодец, располагавшийся в центре этого зала. Он использовался в качестве наказания
      для неверных или просто неугодных Смерти жнецов. Они подвергались так называемому Перевоплощению. Виновного сбрасывали
      в чёрное жерло этого колодца, после чего он исчезал из Храма навсегда. Ходил слух, что казнённые обретали новую жизнь
      на земле, только в другой ипостаси (поэтому процедура называлась Перевоплощением). Однако не было никого, кто бы смог
      подтвердить это или опровергнуть, поэтому все боялись быть подвергнутыми Перевоплощению.

      - Я ни разу не позволял Вам и Смерти усомниться в своём профессионализме. Задание будет выполнено, - сухо произнёс я.

      - Приятно слышать уверенность в Вашем голосе, но не теряйте бдительности. На этот раз Ваша вылазка в мир людской будет
      длительной. Времени Вам будет дано столько, сколько потребуется, но помните - Смерть не любит ждать. Вам нужно войти
      в доверие к этому человеку, узнать его как можно лучше, чтобы его душа сама потянулась к Вам. Тогда Вы сможете беспрепятственно
      её забрать, и задание будет считаться выполненным.

      Воровато оглянувшись, Старейшина склонился к моему уху и шепнул:

      - А ещё в случае успеха я позабочусь о том, чтобы Вы примкнули к нам.

      Он намекал на то, что поможет мне получить самую высокую должность Храма - должность Старейшины.

      Я коротко кивнул.

      - Я могу приступить к заданию?

      - Разумеется. Служки соберут Вам всё, что потребуется для людской жизни, и Вы можете немедленно отправляться.

      Я снова кивнул и направился к выходу. Уже у самых дверей я обернулся и спросил:

      - А как зовут моего подопечного?

      - Тилль Линдеманн.

      Едва я почувствовал, что твёрдо стою ногами на земле, как на меня налетел сильный порыв холодного ветра и начал нещадно
      резать оголённые участки кожи. Я потёр замёрзшие руки, прижал их ко рту, чтобы согреть своим горячим дыханием, но от
      этого было мало толку. Шапкой меня снарядить не удосужились, поэтому голова тоже ощущала все прелести выдавшейся в этом
      году суровой немецкой зимы.

      Я осмотрелся. Вокруг лишь засыпанные снегом деревья. Никаких признаков того, что поблизости кто-то обитает. Выкидывать
      меня прямо на порог объекта было опасно и подозрительно, поэтому я оказался в некотором отдалении от места назначения.
      И теперь, стоя в этом заснеженном лесу, я понятия не имел, куда мне направляться. Я решил поддаться интуиции, которая
      меня редко подводила. Жнецы имеют много способностей: например, мы умеем подавлять сознание людей или становиться невидимыми,
      когда нам это необходимо, но почему-то внутреннего компаса в нас не встроено.

      Ноги проваливались в глубокие сугробы. Чертыхаясь, я медленно продвигался вперёд, внимательно выискивая вдалеке хоть
      какие-то признаки человеческого жилья, однако тщетно. Я мысленно перебирал все те знания, которые когда-то получил об
      этом регионе, но так и не смог припомнить, чтобы тут были характерны такие погодные условия. Даже подумал о том, что
      вышла ошибка, и меня закинули в какое-то другое место.

      Время шло, а пейзажи вокруг не менялись, зато начинало темнеть. Я уже начал беспокоиться, но не давал панике полностью
      овладеть мной. Только когда над лесом поднялся ополовиненный диск луны, я обессилено повалился на землю, подложив под
      себя рюкзак, в котором был собран минимум одежды. Рук я уже совершенно не чувствовал, а голова раскалывалась от холода.
      В мыслях крутилось, что такой мастер своего дела как я не может так глупо провалиться, но сил дальше двигаться не было.

      - Я лишь немного... отдохну, - успокаивал я самого себя, пытаясь разлепить настырно закрывающиеся веки. Но тело меня
      уже не слушалось. Перед тем, как окончательно отдать себя в объятия сна, я, кажется, услышал скрип снега.

      Придя в себя, я первым делом почувствовал запах молока. Было на удивление тепло, даже жарко. Приоткрыв один глаз, я
      увидел напротив себя задорно пляшущие язычки пламени в камине. Опустил взгляд вниз - моё тело плотно закутано в толстое
      одеяло, а сам я лежу на каком-то диванчике.

      Где я?

      В голове неохотно начали ворочаться шестерёнки воспоминаний, проворачивая назад сегодняшние события. Рассвет, Старейшина,
      задание, лес, холод, обморок, пустота. Я ещё раз по мере возможностей осмотрел себя, даже заглянул под одеяло. Кто-то
      заботливо притащил меня из леса, стянул всю одежду и согрел. Окинул взглядом комнату - моего добродетеля не наблюдалось.

      Я осторожно попытался подняться на локтях, на что тело отозвалось неприятной ноющей болью. Скривившись, я всё же привёл
      себя в сидячее положение и ещё раз тщательно всё осмотрел. Комната была небольшой и весьма неухоженной. Повсюду валялись
      какие-то обёртки, на полу стояли пустые бутылки, кое-где виднелись и грязные тарелки. Обои местами отходили, обнажая
      деревянные стены, практически всё было исписано именами каких-то людей и различными странными названиями, значения которых
      я не понимал. Однако было видно, что хозяин любит свою берлогу и ни за что не расстанется с ней.

      Входная дверь протяжно заскрипела, и в комнату вошёл здоровенный детина, державший в руках кружку, по размерам больше
      похожую на ведро.

      - Очухался, - буркнул он, протягивая мне "ведро". - Пей.

      Тёплое молоко. Я не был большим поклонником этого напитка, но внезапно ощутил, что именно его сейчас требует мой организм,
      и жадно припал к кружке. Парень, сидевший напротив и угрюмо наблюдающий за мной из-под отросшей чёлки, смотрел на меня
      несколько минут, после чего спросил:

      - Какого лешего тебя в лес-то понесло?

      Я кое-как оторвал себя от молока.

      - Машина на трассе заглохла, пошёл за помощью и заблудился, - выдал я заранее подготовленную легенду.

      - Считай, пропала твоя тачка, - фыркнул незнакомец. - У нас тут сейчас не самый спокойный народец обитает. Скорее всего,
      уже прибрали к рукам твою лошадку.

      Я постарался сделать разочарованный вид.

      - Эх, ну что ж я так!

      - Ты в полицию попробуй обратиться, но это вряд ли тебе поможет. Меня кстати, Тилль зовут.

      Я аж подавился, услышав имя своего спасителя.

      - Эй, ну ты аккуратнее! - Тилль дернулся в мою сторону, но я жестом остановил его.

      - А я..кхм-кхм...Рихард, - прохрипел я, пытаясь перебороть приступы кашля.

      - Застрял ты, похоже, здесь, Рихард, - Тилль кивком указал на окно. На улице не на шутку разбушевалась метель.

      - Удача, если мы завтра вообще сможем из дома выйти, - вздохнул Тилль. - Уже неделю метёт, зараза, и всё никак не успокоится.
      Так что обождать придётся, прежде чем я докину тебя хотя бы до Шверина.

      Я неуверенно пожал плечами, чтобы Тилль не подумал, что я напрашиваюсь.

      - Только ты, слышь, сам себе будешь жрать готовить, я тебе не хозяюшка. Ну и мне заодно можешь, - ухмыльнулся Тилль.
      - Арендная плата, так сказать, за предоставленную жилплощадь.

      Я согласно кивнул.

      - Ну и ладушки. Ах, да, пшёл вон с моего дивана!

      Помня о том, что мне нужно наладить с этим человеком контакт, и злить его ни в коем случае не следует, я послушно встал,
      укутавшись в одеяло.

      - Пф, тоже мне, - хмыкнул Тилль, глядя на то, как я пытаюсь поудобнее завернуть'
    sentences:
    - 'query: scrtrm - piano #11

      В тихом-тихом углу улицы(если это вообще угол) сидели два ребенка примерно одинакового возраста точно не достигнувшие
      десяти, а то может и девяти лет от роду. Вокруг не было никого из тех шумных взрослых, которых все дети почему-то недолюбливали.
      Однако, кроме этих двоих, на улице изредка пробегали, а то и проезжали, на полной скорости подростки на велосипедах
      и на скейтбордах. Некоторые из них тихо и не спешно ездили на роликах, оборачиваясь по сторонам и смотря ларьки с мороженным.
      На улице лето. Июнь вроде бы, а дети уже во всю развлекаются, забыв про учёбу.

      А те два ребёнка всё так же сидели на двух лавочках, параллельных друг другу, изредка бросая взгляды на друг друга и
      поспешно отворачиваясь, когда один из них замечал эти взгляды. Шум листьев рядом цветущей поздней черёмухи добавлял
      романтичности картине. Быстрые школьники не раз смеялись над ними, не задумываясь над тем, что чувствуют эти дети. Первая
      любовь всегда приходит по разному.

      Мальчик с голубыми волосами, одетый в тонкую светло-оранжевую рубашку и загнутыми до колена коричневыми брюками подошёл
      к девочке и спросил:

      - П-привет. Тебе не нужен кот? С-синий такой, с чёрными глазами и маленьким рюкзачком на спине?

      - Н-нет, спасибо, - ответила девочка, отворачиваясь в сторону. - Да и у меня уже есть кот. Второго родители не разрешат.

      - Понятно, а этого кота Хэппи звали. Добрый такой, отзывчивый, понимающий. Хороший, в общем, кот.

      - А у меня кота, ну вернее не кота, а кошку, Шарли зовут. Но она странная, не разговаривающая, грубая, даже стер...
      Как там взрослые говорят, сте-рво-зная, она у меня. И общаться не любит.

      - Я уверен, Хэппи бы нашёл к ней подход и разговорил бы её. И она б стала такой же как и он.

      - Не знаю, я, то есть мы никогда не пробовали.

      - А давай попробуем и узнаем! Ну, так ты со мной?

      - Х-хорошо!

