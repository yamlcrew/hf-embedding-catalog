      Откинув со лба влажные от пота волосы, я повернулся на бок и достаточно быстро уснул.

      Меня разбудили холодные лучи-иголочки недружелюбного зимнего солнца, проникавшие в мою спальню. Едва я разлепил глаза,
      будильник на прикроватной тумбочке услужливо показал мне время: без пяти десять. Я впервые за долгое время чувствовал
      себя хорошо. Мне казалось, что несколько предыдущих недель я карабкался в высокую, крутую гору и, наконец достигнув
      вершины, скатился с неё вниз, будто на санках, наслаждаясь скоростью и свистом ветра в ушах. Казалось, что я только
      что передал эстафетную палочку и был рад, что предыдущий, мой этап остался позади. Пускай я его и проиграл.

      Я не стал нежиться в кровати, упиваясь своим хорошим настроением, а спешно встал, накинул халат и спустился вниз, в
      столовую. Там был один лишь Флаке, он сидел за столом, читая книгу и прихлёбывая кофе маленькими глоточками.

      - Доброе утро!

      Клавишник оторвался от книги и дружелюбно улыбнулся.

      - Доброе. Как спалось?

      - Замечательно! - широко улыбаясь, сказал я. Впервые за последнее время мне ничего не снилось, чему я был несказанно
