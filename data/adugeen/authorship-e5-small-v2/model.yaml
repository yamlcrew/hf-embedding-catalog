      горячая плоть была готова лопнуть от напряжения.

      Два громких, резких выдоха. Его - мой. В моём, кажется, проскользнуло эхо его имени, которое обожгло мне горло.

      Всё вокруг стихло. Тишина снова прокралась в мои уши.

      Мне было гадко. Но всё-таки я был счастлив от того, что нам с Рихардом было хорошо. Я бы смог удовлетворить его не только
