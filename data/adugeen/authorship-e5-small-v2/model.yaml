  sentences:
  - 'query: Сегодня, прыгая на кровати, Кира сломала ее. Она отчаянно пыталась допрыгнуть до потолка, но ничего не получалось,
    и опилки лишь тщетно сыпались на пол. Никто не слышал ни скрежета пружин, ни грохота; не было видно и самой поломки.

    Мать, ругая дочь, в ответ получила лишь усталое равнодушие, что, конечно же, вывело ее из себя. Крича что-то нечленораздельное,
    она стучала ногой по сломанному предмету. Женщина не понимала, что она делала только хуже, но гнев в ее крови взял верх.

    - Да как ты смеешь, паршивая девчонка! Я только и делала, что ухаживала за твоей кроватью! А ты решила устроить погром?!
    Знаешь, что?! Я это так не оставлю! - на этих словах женщина, чуть ли не снимая дверь с петель, выбежала из комнаты.

    Кира резко опустилась на колени. Прижав руки к кровати, она пыталась сдерживать ее невыносимый скрежет.

    Взяв молоток и гвозди из кладовой, девочка безнадежно колотила по обломкам, пытаясь хоть как-то их соединить. Но все оказалось
    безрезультатно: обломки лишь с еще большим стремлением раскалывались под гнетом гвоздей.

    Она легла на пол. Легкий сквозняк щекотал ее спину.

    - Я никогда не смогу допрыгнуть до потолка, - сказала Кира и выдохнула.

    - А вдруг это не так?

    Кира резво встала. На ее лице появилась маска недоумения, а в груди начал разжигаться огонек страха. Откуда этот голос?

    - Не бойся, глупышка, - голос был очень мягок.

    - Откуда ты? Я тебя раньше не слышала...

    - А разве это важно?

    - А что, нет?

    - Почему это должно быть важно? Разве нельзя просто поговорить с тобой?

    - Ты думаешь, я буду говорить с незнакомым голосом?

    - А почему нет?

    - Так. Мне надоедает эта игра в вопросы. Говори, что или кто ты есть?

    Внезапно наступило молчание, после чего последовало продолжительное гудение.

    Голос начал напевать песенку, не песню, а именно песенку. Любимую песенку Киры, которую она заводила каждый раз, когда
    ломалось что-нибудь в ее комнате.

    - Я могу построить тебе новую кровать. Гораздо лучше этой. В ней будет много цветов и сладостей...

    Девочка оживилась. В ее речи послышались нотки радости.

    - Правда? Ты сделаешь это?

    - Да, но вот только...

    - Что "только"?

    - Только она будет не настоящей. Ты не сможешь на ней спать, но она будет в твоей комнате. - голос откашлялся. - Ах, да.
    Кроме тебя ее никто не увидит.

    Девочка задумчиво улыбнулась.

    - Но когда же я смогу увидеть свою кровать?

    Голос начал смеяться. Сильно, долго, но мягко. Этот смех был очень и очень необычен: вроде бы и добрый, а вроде бы и с
    насмешкой.

    Жалость.

    Жалость управляла им.

    - Почему ты смеешься?

    - Да потому что ты глупая девочка, которая даже не может решить.

    - Я вовсе не глупа!

    - Да? Так ответь: тебе нужно то, что я предлагаю?

    - Но это же вовсе не настоящая кровать! - Кира приложила руки к лицу. - На ней я не смогу допрыгнуть до потолка!

    Голос опять залился смехом.

    - ПОЧЕМУ ТЫ СМЕЕШЬСЯ ВСЕ ВРЕМЯ?!

    - Да потому что ты уже решила. Уже давным-давно решила.

    - И что же я решила?

    - Ты согласна, ведь так?

    Кира замешкалась, но, все же, выдавила из себя неуверенное "да".

    Голос пропал, оставив после себя огромную кровать, с большим матрасом и мягкими подушками. На такой кровати, определенно,
    можно было бы допрыгнуть до потолка.'
  - 'query: Конец года - это пора для радости, в предчувствии надвигающихся каникул, свободы. Это было начало мая, когда на
    улице уже тепло, а по утрам зябко. Когда цветы уже расцвели и начали благоухать. Сырая земля покрывалась травиночками,
    и по ней туда-сюда сновали букашки-таракашки.

    Птицы летали над деревьями, чирикая и стрекоча, а какая-то особенно усердно напевала:

    ~ midori tanabiku namimori no

    dainaku shounaku nami ga ii

    itsumo kawaranu

    sukoyaka kenage

    aa~

    tomo ni utaou

    namimorichuu ~

    Да... это была та самая чокнутая птичка, хозяином которой был не мене чокнутый Хибари Кёя. Хотя назвать его так прилюдно
    ни у кого бы язык не повернулся... ну, почти ни у кого.

    Времена школьной поры прошли, и теперь настали не менее насыщенные времена студенчества. Так уж получилось, судьбы злая
    шутка, что бедного Саваду Тсунаёши перенаправили в университет, где главой дисциплинарного комитета был страх и ужас его
    жизни - Хибари Кёя! Ну, разумеется после репетитора... но не об этом сейчас. Любопытно, что бедного Саваду Тсунаёши, ошибочно,
    запихнули сразу на 2 курс! М-да... не повезло ребёнку...

    Но тут фортуна повернулась к нему своим рылом, и в его классе он повстречал замечательного человека - Аллена Уолкера.

    С ним они мигом сдружились и стали, не разлей вода. Но это было осенью, а теперь весна! А это значит...

    Сцена 1. Дубль 1.

    - Тсуна, не переживай ты так! Сдашь ты эти экзамены! Ведь и я, и твой репетитор занимались с тобой весь учебный год! Ты
    даже начал понимать азы электрофизики! - успокаивал вечно лояльный седой, поглаживая Тсуну по пушистой каштановой шевелюре.
    - Ну, а если что, останешься на второй год! Вон, некоторые так уже 3 раза делали! - кивнул он на Канду, что сидел у окна
    в конце класса.

    Канда Юу, о-о-о! Это, вообще, отдельная история! Хулиган, отличник, красавец, последняя скотина, человек чести, бездарь,
    гроза всех и вся... чувства смешанные. Как всё это и ещё много "положительных" качеств находятся в одном человеке, Аллен
    отказывался понимать!

    - Но он хотя бы крутой, и отличник, а я как был никчемным, таким и останусь. Мне не сдать эти экзамены, ни за что в жизни!
    - продолжал страдать Тсуна, схватившись за голову. Таким он был, слишком неуверенным в себе, пессимистичным, а ещё последним
    неудачником... список можно продолжить. Но в тоже время, ради друзей он был готов на многое! Его отзывчивость, доброта
    не знала границ. Если кто-то обижал его друзей, его глаза становились оранжевыми, а сам он серьёзным и мега-сильным.

    - БаКанда-то?! Ха-ха-ха! - рассмеялся Уолкер. - Дурак дураком! Он просто везунчик с репутацией и внешностью! И всё! -
    он многозначительно хмыкнул. - А ты, ты добрый и милый! Просто будь поувереннее в себе, и всё получится!

    - Эх, и как ему удается быть таким уверенным? У меня так не получается... - вздохнул Савада, посмотрев на Канду. - Да,
    и при этом он ничего не делает, лишь сидит на своём месте, но все девчонки возле него вьются.

    Но тут, вдруг, Канда посмотрел в их сторону, а Тсуна тут же отвернулся и сжался, будто его только что облили ледяной водой.

    - Фух...

    Аллен тоже посмотрел на Канду и, показав ему язык, отвернулся.

    - Пф! И что они в нём нашли, не понима... - вот теперь уже Аллен замер уставившись на дверной проём, откуда излучалась
    аура смерти. Это был Хибари Кёя

    "Что ему нужно?!"

    Сцена 2. Дубль 1.

    - Кто... кто посмел прийти в университет без сменки?!!!

    Тут Уолкер посмотрел на пол и вздрогнул. Грязь! Лужи грязи от военных сапог, а такие сапоги только у...

    - Канда Юу! - взревел Кёя.

    Но парень лишь одарил его своим обычным, равнодушным взглядом, полным холода.

    - Что-то не так?

    - Ты, травоядное! - подойдя к Канде, Хибари ласково отодвинул парту. - Ты ответишь за то, что испачкал полы! - он насквозь
    прожигал взглядом.

    - Хм, ещё чего, - гордые синие глаза пронизывали холодом в ответ. Вдобавок он закинул ногу на ногу. - Сменка порвалась,
    другой я не нашёл, пришлось идти в университет так.

    - Да плевать я хотел! Босиком ходи! А помещение пачкать не смей! - рычал Кёя.

    - Завтра так и сделаю - фыркнул тот. - Это всё?

    - Будешь неделю мыть полы в этом коридоре! - нахмурился глава дисциплинарного комитета. - И начнёшь, прямо сейчас!

