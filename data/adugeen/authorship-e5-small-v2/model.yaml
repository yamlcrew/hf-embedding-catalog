      Сон не приходил. Я уже потерял счёт тому времени, в течение которого я лежал на спине, глядя на белоснежный потолок,
      по которому скользили тени снежинок. Тишина гудела в ушах. Хотя я довольствовался ей не так уж и долго.

      Спустя какое-то время, к моему негодованию, я услышал скрип кровати в соседней комнате. Я до последнего надеялся, что
      мне это показалось. Нет. Не показалось.

      Скрипы стали сильнее, деревянные башенки у изголовья кровати начали стучаться б стену, и я услышал его голос. Громкий
      протяжный стон, затем серия чуть более частых. Мне казалось, я слышал даже его дыхание.

      Меня словно ударили в грудь, выбив весь воздух из лёгких. Было больно и обидно. Я пожалел, что поселился рядом с Рихардом.
      Я накрыл голову подушкой, стараясь не слышать этого кошмара, но тщетно; вскочил с кровати, начал ходить по комнате,
      подавляя желание броситься в соседнюю и раскидать любовников как котят. Хотелось обличить, пристыдить их. Впрочем, перед
