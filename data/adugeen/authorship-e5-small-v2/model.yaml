      интересует.

      Мы молчали. За окном в причудливом вальсе кружились снежинки, а ветер, словно строгий балетмейстер, сурово ворчал на
      них. Тикали настенные часы, тихо и глухо, будто подстраивались под стук моего сердца. Оливер ещё стоял за моей спиной.
      Мне казалось, он хочет ещё что-то мне сказать, но я не понимал, почему он медлит, вроде бы в его взгляде не было нерешительности.
      В конце концов, он развернулся и направился к выходу, очевидно, передумав и решив оставить этот разговор на потом. Он
      лишь спросил напоследок:

      - Тебе что-нибудь привезти из города? Мы со Шнайдером забыли лыжи, а нам уж больно хочется покататься, пока снег не
      начал превращаться в грязь.

      - Захватите мне чистый блокнот.

      И Оливер ушёл, снова оставив меня наедине с блокнотом. Черкнув ещё пару строк, я понял, что фонтан идей иссяк. Я задумчиво
      пролистал исписанные неаккуратным почерком страницы. Осталась лишь одна чистая. Только сейчас я понял, что все стихи,
      написанные здесь, посвящены Рихарду.

      Я решил лечь спать не столько потому что устал, сколько из желания убить время. Время... Как же я его ненавижу. Вероятно,
      потому что упустил его. Пока я писал свои стихи, время капало, словно вода из плохо закрытого крана. И я опоздал. Теперь
      Рихард разделяет свою широкую кровать не со мной, а с тем, кто оказался проворнее, быстрее, сообразительнее. А я так
      и остался лежать под холодным одеялом один, наедине со своими стихами, которые я никому и никогда не покажу. И я постепенно
