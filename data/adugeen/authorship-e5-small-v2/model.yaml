    на своей коже, что обжигало и сводило с ума. В уголках глаз сверкнули слезы. От чувства, что сейчас охватило Рокудо, хотелось
    плакать. Какое же это счастье - быть кому-то нужным, важным. Быть любимым.

    -Я никогда не остановлюсь, обещаю тебе, мое Небо!

    Отстранившись слегка от Мукуро, Тсуна поцеловал того в губы, пальцами стирая слезы с щек.

    -А я никогда не оставлю тебя, мой Туманчик!

    Солнце уже коснулось макушек деревьев, а они продолжали сидеть молча, ведь им не нужны были слова. Они понимали друг друга
    и без них.

    -Джудаймее...Где вы?

    Вдали послышали крики Гокудеры. Хранитель Урагана носился по парку в поисках своего босса.

    Рокудо выдохнул, Тсуна улыбнулся, они понимали, что пришло время им возвращаться в тот мир, который не терпит сентиментальностей
    и нежностей. Мир мафии жесток и беспощаден, но эти двое, живя в нем, хранили чувство, которое связало их .И, несмотря
    на войны, потери, они пронесут это чувство до того дня, когда их не станет уже на земле. Но, кто знает, может придет время
    и они встретятся снова, ибо настоящая любовь вечна и не угасает, несмотря на года и века.'
