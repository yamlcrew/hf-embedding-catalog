- source_sentence: How can I generate text with OLMo3 directly from the command line?
  sentences:
  - 'Context: Text generation


    # Text generation


    [open-in-colab]


    Text generation is the most popular application for large language models (LLMs). A LLM is trained to generate the next
    word (token) given some initial text (prompt) along with its own generated outputs up to a predefined length or when it
    reaches an end-of-sequence (`EOS`) token.


    In Transformers, the `~GenerationMixin.generate` API handles text generation, and it is available for all models with
    generative capabilities. This guide will show you the basics of text generation with `~GenerationMixin.generate` and some
    common pitfalls to avoid.


    > !TIP

    > You can also chat with a model directly from the command line. (reference(transformers-endocs/conversations#transformers))

    >

    > ```shell

    > transformers chat Qwen/Qwen2.5-0.5B-Instruct

    > ```'
  - "Context: SAM2 > Sam2HieraDetModel\n\n## Sam2HieraDetModel\n\n[autodoc] Sam2HieraDetModel\n    - forward"
  - 'Context: OLMo3


    # OLMo3


    Olmo3 is an improvement on OLMo2. More details will be released on *soon*.


    > !TIP

    > Click on the OLMo3 models in the right sidebar for more examples of how to apply OLMo3 to different language tasks.


    The example below demonstrates how to generate text with `Pipeline`, `AutoModel` and from the command line.'
