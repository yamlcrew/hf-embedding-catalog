    따른 전    │사업에 관한 업무를 총괄하는 장소                                │'', ''│기판매사업자가 재정경제부       │                                                                │'',
    ''│령으로 정하는 전기요금 통       │                                                                │'', ''│합청구의 방법으로 요금을        │                                                                │'',
