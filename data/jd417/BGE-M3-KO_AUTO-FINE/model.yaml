- source_sentence: 'query: 부가가치세법 시행 위한 규칙 내용?'
  sentences:
  - 'passage: [부가가치세법 시행규칙] 제1조 총칙, 목적

    제1조(목적) 이 규칙은 「부가가치세법」 및 같은 법 시행령에서 위임된 사항과 그 시행에 필요한 사항을 규정함을 목적으로 한다.'
  - 'passage: [부가가치세법 시행령] 제45조 영세율과 면세, 면세, 종교, 자선, 학술, 구호 등의 공익 목적 단체가 공급하는 재화 또는 용역으로서 면세하는 것의 범위

    제45조(종교, 자선, 학술, 구호 등의 공익 목적 단체가 공급하는 재화 또는 용역으로서 면세하는 것의 범위) 법 제26조제1항제18호에 따른 종교, 자선, 학술, 구호(救護), 그 밖의 공익을 목적으로 하는 단체가
    공급하는 재화 또는 용역은 다음 각 호의 재화 또는 용역으로 한다. <개정 2014.2.21, 2015.2.3, 2019.2.12, 2021.2.17, 2022.2.15, 2024.5.7, 2025.12.30>

    1.  주무관청의 허가 또는 인가를 받거나 주무관청에 등록된 단체(종교단체의 경우에는 그 소속단체를 포함한다)로서 「상속세 및 증여세법 시행령」 제12조 각 호의 어느 하나에 따른 사업 또는 재정경제부령으로 정하는
    사업을 하는 단체가 그 고유의 사업목적을 위하여 일시적으로 공급하거나 실비(實費) 또는 무상으로 공급하는 재화 또는 용역

    2.  학술 및 기술 발전을 위하여 학술 및 기술의 연구와 발표를 주된 목적으로 하는 단체(이하 "학술등 연구단체"라 한다)가 그 연구와 관련하여 실비 또는 무상으로 공급하는 재화 또는 용역

    3.  「문화유산의 보존 및 활용에 관한 법률」에 따른 지정문화유산 또는 「자연유산의 보존 및 활용에 관한 법률」에 따른 천연기념물등을 소유하거나 관리하고 있는 종교단체(주무관청에 등록된 종교단체로 한정하되, 그
    소속단체를 포함한다)의 경내지(境內地) 및 경내지 안의 건물과 공작물의 임대용역

    4.  공익을 목적으로 재정경제부령으로 정하는 기숙사를 운영하는 자가 학생이나 근로자를 위하여 실비 또는 무상으로 공급하는 음식 및 숙박 용역

    5.  「저작권법」 제105조제1항에 따라 문화체육관광부장관의 허가를 받아 설립된 저작권위탁관리업자로서 재정경제부령으로 정하는 사업자가 저작권자를 위하여 실비 또는 무상으로 공급하는 신탁관리 용역

    6.  「저작권법」 제25조제7항(같은 법 제31조제6항, 제75조제2항, 제76조제2항, 제76조의2제2항, 제82조제2항, 제83조제2항 및 제83조의2제2항에 따라 준용되는 경우를 포함한다)에 따라 문화체육관광부장관이
    지정한 보상금수령단체로서 재정경제부령으로 정하는 단체인 사업자가 저작권자를 위하여 실비 또는 무상으로 공급하는 보상금 수령 관련 용역

    7.  「법인세법」 제24조제2항제1호라목2)에 따른 비영리 교육재단이 「초ㆍ중등교육법」 제60조의2제1항에 따른 외국인학교의 설립ㆍ경영 사업을 하는 자에게 제공하는 학교시설 이용 등 교육환경 개선과 관련된 용역'
  - 'passage: [부가가치세법 시행령] 제42조 영세율과 면세, 면세, 저술가 등이 직업상 제공하는 인적 용역으로서 면세하는 것의 범위

    제42조(저술가 등이 직업상 제공하는 인적 용역으로서 면세하는 것의 범위) 법 제26조제1항제15호에 따른 인적(人的) 용역은 독립된 사업(여러 개의 사업을 겸영하는 사업자가 과세사업에 필수적으로 부수되지 아니하는
    용역을 독립하여 공급하는 경우를 포함한다)으로 공급하는 다음 각 호의 용역으로 한다. <개정 2019.2.12, 2022.2.15, 2024.2.29, 2025.12.30>

    1.  개인이 재정경제부령으로 정하는 물적 시설 없이 근로자를 고용(고용 외의 형태로 해당 용역의 주된 업무에 대해 타인으로부터 노무 등을 제공받는 경우를 포함한다)하지 아니하고 독립된 자격으로 용역을 공급하고
    대가를 받는 다음 각 목의 인적 용역

    가.  저술ㆍ서화ㆍ도안ㆍ조각ㆍ작곡ㆍ음악ㆍ무용ㆍ만화ㆍ삽화ㆍ만담ㆍ배우ㆍ성우ㆍ가수 또는 이와 유사한 용역

    나.  연예에 관한 감독ㆍ각색ㆍ연출ㆍ촬영ㆍ녹음ㆍ장치ㆍ조명 또는 이와 유사한 용역

    다.  건축감독ㆍ학술 용역 또는 이와 유사한 용역

    라.  음악ㆍ재단ㆍ무용(사교무용을 포함한다)ㆍ요리ㆍ바둑의 교수 또는 이와 유사한 용역

    마.  직업운동가ㆍ역사ㆍ기수ㆍ운동지도가(심판을 포함한다) 또는 이와 유사한 용역

    바.  접대부ㆍ댄서 또는 이와 유사한 용역

    사.  보험가입자의 모집, 저축의 장려 또는 집금(集金) 등을 하고 실적에 따라 보험회사 또는 금융기관으로부터 모집수당ㆍ장려수당ㆍ집금수당 또는 이와 유사한 성질의 대가를 받는 용역과 서적ㆍ음반 등의 외판원이 판매실적에
    따라 대가를 받는 용역

    아.  저작자가 저작권에 의하여 사용료를 받는 용역

    자.  교정ㆍ번역ㆍ고증ㆍ속기ㆍ필경(筆耕)ㆍ타자ㆍ음반취입 또는 이와 유사한 용역

    차.  고용관계 없는 사람이 다수인에게 강연을 하고 강연료ㆍ강사료 등의 대가를 받는 용역

    카.  라디오ㆍ텔레비전 방송 등을 통하여 해설ㆍ계몽 또는 연기를 하거나 심사를 하고 사례금 또는 이와 유사한 성질의 대가를 받는 용역

    타.  작명ㆍ관상ㆍ점술 또는 이와 유사한 용역

    파.  개인이 일의 성과에 따라 수당이나 이와 유사한 성질의 대가를 받는 용역

    2.  개인, 법인 또는 법인격 없는 사단ㆍ재단, 그 밖의 단체가 독립된 자격으로 용역을 공급하고 대가를 받는 다음 각 목의 인적 용역

    가.  「형사소송법」 및 「군사법원법」 등에 따른 국선변호인의 국선변호, 「국세기본법」에 따른 국선대리인의 국선대리 및 재정경제부령으로 정하는 법률구조(法律救助)

    나.  재정경제부령으로 정하는 학술연구용역과 기술연구용역

    다.  직업소개소가 제공하는 용역 및 상담소 등을 경영하는 자가 공급하는 용역으로서 재정경제부령으로 정하는 용역

    라.  「장애인복지법」 제40조에 따른 장애인보조견 훈련 용역

    마.  외국 공공기관 또는 「국제금융기구에의 가입조치에 관한 법률」 제2조에 따른 국제금융기구로부터 받은 차관자금으로 국가 또는 지방자치단체가 시행하는 국내사업을 위하여 공급하는 용역(국내사업장이 없는 외국법인
    또는 비거주자가 공급하는 용역을 포함한다)

    바.  「민법」에 따른 후견인과 후견감독인이 제공하는 후견사무 용역

    사.  「가사근로자의 고용개선 등에 관한 법률」에 따른 가사서비스 제공기관이 가사서비스 이용자에게 제공하는 가사서비스

    아.  「직업안정법」에 따른 근로자공급 용역

