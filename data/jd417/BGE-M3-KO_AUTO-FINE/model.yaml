  - source_sentence: 'query: 스포츠센터 연회비 선불 시 과세기간 종료일과 주사업장 총괄 납부 신청 방법?'
    sentences:
    - 'passage: [부가가치세법 시행령] 제29조 과세거래, 공급시기와 공급장소, 할부 또는 조건부로 용역을 공급하는 경우 등의 용역의 공급시기

      제29조(할부 또는 조건부로 용역을 공급하는 경우 등의 용역의 공급시기)

      ① 다음 각 호의 어느 하나에 해당하는 경우에는 대가의 각 부분을 받기로 한 때를 법 제16조제2항에 따른 할부 또는 조건부로 용역을 공급하는 경우 등의 용역의 공급시기로 본다. 다만, 제2호와 제3호의 경우
      역무의 제공이 완료되는 날 이후 받기로 한 대가의 부분에 대해서는 역무의 제공이 완료되는 날을 그 용역의 공급시기로 본다. <개정 2025.12.30>

      1.  재정경제부령으로 정하는 장기할부조건부 또는 그 밖의 조건부로 용역을 공급하는 경우

      2.  완성도기준지급조건부로 용역을 공급하는 경우

      3.  재정경제부령으로 정하는 중간지급조건부로 용역을 공급하는 경우

      4.  공급단위를 구획할 수 없는 용역을 계속적으로 공급하는 경우

      ② 법 제16조제2항에 따른 용역의 공급시기는 다음 각 호의 구분에 따른다.

      1.  역무의 제공이 완료되는 때 또는 대가를 받기로 한 때를 공급시기로 볼 수 없는 경우: 역무의 제공이 완료되고 그 공급가액이 확정되는 때

      2.  사업자가 부동산 임대용역을 공급하는 경우로서 다음 각 목의 어느 하나에 해당하는 경우: 예정신고기간 또는 과세기간의 종료일

      가.  법 제29조제10항제1호에 따른 경우

      나.  법 제29조제10항제3호에 따른 경우

      다.  사업자가 부동산을 임차하여 다시 임대용역을 제공하는 경우로서 제65조제2항에 따라 과세표준을 계산하는 경우

      3.  다음 각 목의 어느 하나에 해당하는 용역을 둘 이상의 과세기간에 걸쳐 계속적으로 제공하고 그 대가를 선불로 받는 경우: 예정신고기간 또는 과세기간의 종료일

      가.  헬스클럽장 등 스포츠센터를 운영하는 사업자가 연회비를 미리 받고 회원들에게 시설을 이용하게 하는 것

      나.  사업자가 다른 사업자와 상표권 사용계약을 할 때 사용대가 전액을 일시불로 받고 상표권을 사용하게 하는 것

      다.  「노인복지법」에 따른 노인복지시설(유료인 경우에만 해당한다)을 설치ㆍ운영하는 사업자가 그 시설을 분양받은 자로부터 입주 후 수영장ㆍ헬스클럽장 등을 이용하는 대가를 입주 전에 미리 받고 시설 내 수영장ㆍ헬스클럽장
      등을 이용하게 하는 것

      라.  그 밖에 가목부터 다목까지의 규정과 유사한 용역

      4.  사업자가 「사회기반시설에 대한 민간투자법」 제4조제3호의 방식을 준용하여 설치한 시설에 대하여 둘 이상의 과세기간에 걸쳐 계속적으로 시설을 이용하게 하고 그 대가를 받는 경우: 예정신고기간 또는 과세기간의
      종료일

      ③ 제1항과 제2항에도 불구하고 폐업 전에 공급한 용역의 공급시기가 폐업일 이후에 도래하는 경우에는 폐업일을 공급시기로 본다.'
