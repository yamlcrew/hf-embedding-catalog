    sentences:
    - 'passage: [부가가치세법] 제57조 결정ㆍ경정ㆍ징수와 환급, 결정 등, 결정과 경정

      제57조(결정과 경정)

      ① 납세지 관할 세무서장, 납세지 관할 지방국세청장 또는 국세청장(이하 이 조 및 제57조의2에서 "납세지 관할 세무서장등"이라 한다)은 사업자가 다음 각 호의 어느 하나에 해당하는 경우에만 해당 예정신고기간
      및 과세기간에 대한 부가가치세의 과세표준과 납부세액 또는 환급세액을 조사하여 결정 또는 경정한다. <개정 2024.12.31>

      1.  예정신고 또는 확정신고를 하지 아니한 경우

      2.  예정신고 또는 확정신고를 한 내용에 오류가 있거나 내용이 누락된 경우

      3.  확정신고를 할 때 매출처별 세금계산서합계표 또는 매입처별 세금계산서합계표를 제출하지 아니하거나 제출한 매출처별 세금계산서합계표 또는 매입처별 세금계산서합계표에 기재사항의 전부 또는 일부가 적혀 있지 아니하거나
      사실과 다르게 적혀 있는 경우

      4.  그 밖에 대통령령으로 정하는 사유로 부가가치세를 포탈(逋脫)할 우려가 있는 경우

      ② 납세지 관할 세무서장등은 제1항에 따라 각 예정신고기간 및 과세기간에 대한 과세표준과 납부세액 또는 환급세액을 조사하여 결정 또는 경정하는 경우에는 세금계산서, 수입세금계산서, 장부 또는 그 밖의 증명 자료를
      근거로 하여야 한다. 다만, 다음 각 호의 어느 하나에 해당하면 대통령령으로 정하는 바에 따라 추계(推計)할 수 있다.

      1.  과세표준을 계산할 때 필요한 세금계산서, 수입세금계산서, 장부 또는 그 밖의 증명 자료가 없거나 그 중요한 부분이 갖추어지지 아니한 경우

      2.  세금계산서, 수입세금계산서, 장부 또는 그 밖의 증명 자료의 내용이 시설규모, 종업원 수와 원자재ㆍ상품ㆍ제품 또는 각종 요금의 시가에 비추어 거짓임이 명백한 경우

      3.  세금계산서, 수입세금계산서, 장부 또는 그 밖의 증명 자료의 내용이 원자재 사용량, 동력(動力) 사용량이나 그 밖의 조업 상황에 비추어 거짓임이 명백한 경우

      ③ 납세지 관할 세무서장등은 제1항 및 제2항에 따라 결정하거나 경정한 과세표준과 납부세액 또는 환급세액에 오류가 있거나 누락된 내용이 발견되면 즉시 다시 경정한다.'
    - 'passage: [부가가치세법] 제57조 결정ㆍ경정ㆍ징수와 환급, 결정 등, 수시부과의 결정

      제57조의2(수시부과의 결정)

      ① 납세지 관할 세무서장등은 사업자가 과세기간 중에 다음 각 호의 어느 하나에 해당하는 경우에는 수시로 그 사업자에 대한 부가가치세를 부과(이하 "수시부과"라 한다)할 수 있다. 이 경우 제57조제2항 및 제3항을
      준용한다.

      1.  제60조제3항 각 호의 어느 하나에 해당하는 경우

      2.  그 밖에 대통령령으로 정하는 사유로 부가가치세를 포탈할 우려가 있는 경우

      ② 제1항은 해당 과세기간의 개시일부터 같은 항 각 호의 사유가 발생한 날까지를 수시부과기간으로 하여 적용한다. 이 경우 같은 항 각 호의 사유가 제49조에 따른 확정신고기한 이전에 발생한 경우로서 사업자가
      직전 과세기간에 대하여 확정신고를 하지 아니한 경우에는 직전 과세기간을 수시부과기간에 포함한다.

      ③ 수시부과의 절차와 그 밖에 필요한 사항은 대통령령으로 정한다.'
