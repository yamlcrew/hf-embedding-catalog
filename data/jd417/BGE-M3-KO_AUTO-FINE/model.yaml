      ② 제1항의 표 제15호에도 불구하고 부동산상의 권리만을 대여하거나 다음 각 호의 어느 하나에 해당하는 사업자가 부동산을 임대하는 경우에는 그 사업에 관한 업무를 총괄하는 장소를 사업장으로 한다. <개정 2016.3.11,
