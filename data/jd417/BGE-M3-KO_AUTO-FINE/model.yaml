    ''│11. 「우정사업 운영에 관한 특   │사업에 관한 업무를 총괄하는 장소                                │'', ''│례법」에 따른 우정사업조        │                                                                │'',
    ''│직이 「우편법」 제1조의2        │                                                                │'', ''│제3호의 소포우편물을 방문       │                                                                │'',
    ''│접수하여 배달하는 용역을        │                                                                │'', ''│공급하는 사업                   │                                                                │'',
