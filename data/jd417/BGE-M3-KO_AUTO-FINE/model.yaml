    ''│13. 국가, 지방자치단체 또는     │사업에 관한 업무를 총괄하는 장소. 다만, 위임ㆍ위탁 또는 대리에  │'', ''│지방자치단체조합이 공급하       │의하여 재화나 용역을 공급하는 경우에는 수임자ㆍ수탁자
    또는 대리 │'', ''│는 제46조제3호에 따른 사        │인이 그 업무를 총괄하는 장소를 사업장으로 본다.                 │'', ''│업                              │                                                                │'',
    ''├────────────────┼────────────────────────────────┤'', ''│14. 「송유관 안전관리법」 제2   │사업에 관한 업무를 총괄하는 장소                                │'',
    ''│조제3호의 송유관설치자가        │                                                                │'', ''│송유관을 통하여 재화 또는       │                                                                │'',
    ''│용역을 공급하는 사업            │                                                                │'', ''├────────────────┼────────────────────────────────┤'',
    ''│15. 부동산임대업                │부동산의 등기부상 소재지                                        │'', ''└────────────────┴────────────────────────────────┘'',
    ''</img>'']

    ② 제1항의 표 제15호에도 불구하고 부동산상의 권리만을 대여하거나 다음 각 호의 어느 하나에 해당하는 사업자가 부동산을 임대하는 경우에는 그 사업에 관한 업무를 총괄하는 장소를 사업장으로 한다. <개정 2016.3.11,
    2020.9.10, 2022.2.17, 2025.2.28, 2025.12.30>

    1.  「한국자산관리공사 설립 등에 관한 법률」에 따른 한국자산관리공사

    2.  「농업협동조합의 구조개선에 관한 법률」에 따른 농업협동조합자산관리회사

    3.  「부동산투자회사법」에 따른 기업구조조정 부동산투자회사

    4.  「예금자보호법」에 따른 예금보험공사 및 정리금융회사

    5.  「전기사업법」에 따른 전기사업자

    6.  「전기통신사업법」에 따른 전기통신사업자

    7.  「지방공기업법」에 따라 설립된 지방공사로서 재정경제부령으로 정하는 지방공사

    8.  「한국농어촌공사 및 농지관리기금법」에 따른 한국농어촌공사

    9.  「한국도로공사법」에 따른 한국도로공사

    10.  「국가철도공단법」에 따른 국가철도공단

    11.  「한국토지주택공사법」에 따른 한국토지주택공사

    12.  「주택도시기금법」 제16조에 따른 주택도시보증공사

    ③ 사업자가 자기의 사업과 관련하여 생산하거나 취득한 재화를 직접 판매하기 위하여 특별히 판매시설을 갖춘 장소(이하 "직매장"이라 한다)는 사업장으로 본다.

    ④ 제1항부터 제3항까지의 규정에 따른 사업장 외의 장소도 사업자의 신청에 따라 추가로 사업장으로 등록할 수 있다. 다만, 제1항의 표 제9호에 따른 무인자동판매기를 통하여 재화ㆍ용역을 공급하는 사업의 경우에는
    그러하지 아니하다.

    ⑤ 사업장을 설치하지 아니하고 법 제8조제1항 및 제3항에 따른 등록도 하지 아니한 경우에는 과세표준 및 세액을 결정하거나 경정할 당시의 사업자의 주소 또는 거소를 사업장으로 한다.

    ⑥ 사업자가 비거주자인 경우에는 「소득세법」 제120조에 따른 장소를 사업장으로 하고, 외국법인인 경우에는 「법인세법」 제94조에 따른 장소를 사업장으로 한다.

    ⑦ 법 제8조제6항에 따라 사업자등록을 신청하는 경우에는 해당 신탁재산의 등기부상 소재지, 등록부상 등록지 또는 신탁사업에 관한 업무를 총괄하는 장소를 사업장으로 한다. <신설 2021.2.17>'
  - 'passage: [부가가치세법 시행규칙] 제3조 총칙, 통신요금 통합청구의 방법

    제3조(통신요금 통합청구의 방법) 영 제8조제1항의 표 제7호에서 "재정경제부령으로 정하는 통신요금 통합청구의 방법"이란 「전기통신사업법」에 따른 전기통신사업자가 둘 이상의 단말기기(회선의 단말에 설치하여 전기통신에
    이용되는 기기를 말한다)를 통하여 각 사업장에서 이용자에게 전기통신역무를 제공하고, 각 사업장의 업무를 총괄하는 장소에서 통신요금을 일괄하여 청구하는 방법을 말한다. <개정 2026.1.2>'
