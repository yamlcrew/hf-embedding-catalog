      ④ 사업자가 할부로 재화 또는 용역을 공급하는 경우 등으로서 대통령령으로 정하는 경우의 공급시기가 되기 전에 제32조에 따른 세금계산서 또는 제36조에 따른 영수증을 발급하는 경우에는 그 발급한 때를 각각 그
