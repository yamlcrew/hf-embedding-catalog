    - 'passage: [부가가치세법] 제17조 과세거래, 공급시기와 공급장소, 재화 및 용역의 공급시기의 특례

      제17조(재화 및 용역의 공급시기의 특례)

      ① 사업자가 제15조 또는 제16조에 따른 재화 또는 용역의 공급시기(이하 이 조에서 "재화 또는 용역의 공급시기"라 한다)가 되기 전에 재화 또는 용역에 대한 대가의 전부 또는 일부를 받고, 그 받은 대가에
      대하여 제32조에 따른 세금계산서 또는 제36조에 따른 영수증을 발급하면 그 세금계산서 등을 발급하는 때를 각각 그 재화 또는 용역의 공급시기로 본다. <개정 2017.12.19>

      ② 사업자가 재화 또는 용역의 공급시기가 되기 전에 제32조에 따른 세금계산서를 발급하고 그 세금계산서 발급일부터 7일 이내에 대가를 받으면 해당 세금계산서를 발급한 때를 재화 또는 용역의 공급시기로 본다.

      ③ 제2항에도 불구하고 다음 각 호의 어느 하나에 해당하는 경우에는 재화 또는 용역을 공급하는 사업자가 그 재화 또는 용역의 공급시기가 되기 전에 제32조에 따른 세금계산서를 발급하고 그 세금계산서 발급일부터
      7일이 지난 후 대가를 받더라도 해당 세금계산서를 발급한 때를 재화 또는 용역의 공급시기로 본다. <개정 2017.12.19, 2018.12.31, 2021.12.8>

