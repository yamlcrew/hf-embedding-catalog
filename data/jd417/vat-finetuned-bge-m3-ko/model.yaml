    ① 법 제26조제1항제11호에 따른 금융ㆍ보험 용역은 다음 각 호의 용역, 사업 및 업무에 해당하는 역무로 한다. <개정 2014.2.21, 2015.2.3, 2015.10.23, 2016.2.17, 2018.2.13,
