    6. 「신용보증기금법」에 따른 신용보증기금업

    7. 「주택도시기금법」에 따른 주택도시보증공사의 보증업무 및 주택도시기금의 운용ㆍ관리 업무

    8. 「보험업법」에 따른 보험업(보험중개ㆍ대리와 보험회사에 제공하는 손해사정용역, 보험조사 및 보고용역을 포함하되, 보험계리용역 및 「근로자퇴직급여 보장법」에 따른 연금계리용역은 제외한다)

    9. 「여신전문금융업법」에 따른 여신전문금융업(여신전문금융업을 공동으로 수행하는 사업자 간에 상대방 사업자의 여신전문금융업무를 위임받아 수행하는 경우를 포함한다)

    10. 「자산유동화에 관한 법률」 제2조제5호에 따른 유동화전문회사가 하는 자산유동화사업

    10의2. 「자산유동화에 관한 법률」 제10조제1항에 따른 자산관리자가 하는 자산관리사업

    11. 삭제 <2023.5.16>

    12. 「한국주택금융공사법」에 따른 채권관리자가 하는 주택저당채권ㆍ학자금대출채권의 관리ㆍ운용 및 처분 사업

    13. 다음 각 목의 어느 하나에 해당하는 자산 관리ㆍ운용 용역. 다만, 해당 목의 용역을 제공하는 자가 자금을 부동산, 실물자산 및 그 밖에 재정경제부령으로 정하는 자산에 운용하는 경우는 제외한다.

    가. 「벤처투자 촉진에 관한 법률」 제2조제9호에 따른 창업기획자가 같은 조 제8호에 따른 개인투자조합에 제공하는 자산 관리ㆍ운용 용역

    나. 「벤처투자 촉진에 관한 법률」 제2조제9호에 따른 창업기획자 또는 같은 법 제50조제1항제2호ㆍ제4호 또는 제5호에 따른 자가 같은 법 제2조제11호에 따른 벤처투자조합(같은 법 제63조의2에 따라 등록한
    조합은 제외한다)에 제공하는 자산 관리ㆍ운용 용역

    다. 「벤처투자 촉진에 관한 법률」 제66조에 따른 한국벤처투자가 같은 법 제70조제1항에 따른 벤처투자모태조합에 제공하는 자산 관리ㆍ운용 용역

    라. 「벤처투자 촉진에 관한 법률」 제63조의2제1항제1호부터 제3호까지의 자가 같은 법 제2조제12호에 따른 민간재간접벤처투자조합(이하 이 호에서 "민간재간접벤처투자조합"이라 한다)에 제공하는 자산 관리ㆍ운용
    용역

    마. 「벤처투자 촉진에 관한 법률」 제63조의2제3항에 따라 공동으로 업무집행조합원이 되는 자로서 재정경제부령으로 정하는 자가 민간재간접벤처투자조합에 제공하는 자산 관리ㆍ운용 용역. 다만, 재정경제부령으로 정하는
    자가 제공하는 자산 관리ㆍ운용 용역의 경우에는 같은 조 제4항에 따른 다른 벤처투자조합에 대한 출자와 관련하여 민간재간접벤처투자조합에 제공하는 자산 관리ㆍ운용 용역으로 한정한다.

    14. 삭제 <2015.2.3>

    15. 「한국투자공사법」에 따른 한국투자공사가 같은 법에 따라 제공하는 위탁자산 관리ㆍ운용 용역

    16. 「농림수산식품투자조합 결성 및 운용에 관한 법률」에 따른 투자관리전문기관 또는 업무집행조합원이 같은 법에 따른 농식품투자모태조합, 농식품투자조합에 제공하는 자산 관리ㆍ운용 용역. 다만, 투자관리전문기관 또는
    업무집행조합원이 자금을 부동산, 실물자산 및 그 밖에 재정경제부령으로 정하는 자산에 운용하는 경우는 제외한다.

    17. 「민법」 제32조에 따라 설립된 금융결제원이 「한국은행법」 제81조제2항에 따른 지급결제제도의 운영기관으로서 수행하는 지급결제제도 운영업무

    18. 금전대부업(어음 할인, 양도담보, 그 밖에 비슷한 방법을 통한 금전의 교부를 업으로 하는 경우를 포함한다)

    19. 「중소기업협동조합법」에 따른 중소기업중앙회의 공제사업 계약 체결을 대리하는 용역

    20. 「한국해양진흥공사법」에 따른 한국해양진흥공사가 같은 법에 따라 수행하는 보증 업무

    ② 제1항 각 호에 따른 사업 외의 사업을 하는 자가 주된 사업에 부수하여 같은 항의 금융ㆍ보험 용역과 같거나 유사한 용역을 제공하는 경우에도 법 제26조제1항제11호의 금융ㆍ보험 용역에 포함되는 것으로 본다.

    ③ 다음 각 호의 어느 하나에 해당하는 기관 등의 사업은 제1항제1호에 따른 은행업에 포함되는 것으로 한다. <개정 2016.3.11, 2020.8.19, 2022.2.17>

    1. 「은행법」 외의 다른 법률에 따라 설립된 은행

    2. 「한국자산관리공사 설립 등에 관한 법률」에 따른 한국자산관리공사

    3. 「한국주택금융공사법」에 따른 한국주택금융공사

    4. 「예금자보호법」에 따른 예금보험공사 및 정리금융회사

    5. 「농업협동조합의 구조개선에 관한 법률」에 따른 농업협동조합자산관리회사 및 상호금융예금자보호기금

    6. 「수산업협동조합의 부실예방 및 구조개선에 관한 법률」에 따른 상호금융예금자보호기금

    7. 「산림조합의 구조개선에 관한 법률」에 따른 상호금융예금자보호기금

    8. 삭제 <2014.12.30>

    ④ 제1항에도 불구하고 다음 각 호의 어느 하나에 해당하는 용역은 법 제26조제1항제11호에 따른 금융ㆍ보험 용역으로 보지 아니한다. <개정 2025.12.30>

    1. 복권, 입장권, 상품권, 지금형주화 또는 금지금에 관한 대행용역. 다만, 수익증권 등 금융업자의 금융상품 판매대행용역, 유가증권의 명의개서 대행용역, 수납ㆍ지급 대행용역 및 국가ㆍ지방자치단체의 금고대행용역은
    제외한다.

    2. 기업합병 또는 기업매수의 중개ㆍ주선ㆍ대리, 신용정보서비스 및 은행업에 관련된 전산시스템과 소프트웨어의 판매ㆍ대여 용역

    3. 부동산 임대용역

    4. 제1호와 제2호에 따른 용역과 유사한 용역

    5. 그 밖에 재정경제부령으로 정하는 용역'
  - '부가가치세법 시행령 | 제68조 | 과세표준과 세액의 계산, 거래징수와 세금계산서, 전자세금계산서의 발급 등


    제68조(전자세금계산서의 발급 등)

    ① 법 제32조제2항에서 "대통령령으로 정하는 개인사업자"란 직전 연도의 사업장별 재화 및 용역의 공급가액(면세공급가액을 포함한다. 이하 이 조에서 같다)의 합계액이 8천만원 이상인 개인사업자(그 이후 직전 연도의
    사업장별 재화 및 용역의 공급가액이 8천만원 미만이 된 개인사업자를 포함하며, 이하 이 조에서 "전자세금계산서 의무발급 개인사업자"라 한다)를 말한다. <개정 2018.2.13, 2021.2.17, 2022.2.15,
    2023.2.28>

    ② 전자세금계산서 의무발급 개인사업자는 사업장별 재화 및 용역의 공급가액의 합계액이 8천만원 이상인 해의 다음 해 제2기 과세기간이 시작하는 날부터 전자세금계산서를 발급해야 한다. 다만, 사업장별 재화와 용역의
    공급가액의 합계액이 「국세기본법」 제45조에 따른 수정신고 또는 법 제57조에 따른 결정과 경정(이하 이 항에서 "수정신고등"이라 한다)으로 8천만원 이상이 된 경우에는 수정신고등을 한 날이 속하는 과세기간의 다음
    과세기간이 시작하는 날부터 전자세금계산서를 발급해야 한다. <개정 2021.2.17, 2022.2.15, 2023.2.28>

    ③ 관할 세무서장은 개인사업자가 전자세금계산서 의무발급 개인사업자에 해당하는 경우에는 제2항에 따라 전자세금계산서를 발급해야 하는 날이 시작되기 1개월 전까지 그 사실을 해당 개인사업자에게 통지하여야 한다. <개정
    2023.2.28>

    ④ 제2항에도 불구하고 개인사업자가 전자세금계산서를 발급해야 하는 날이 시작되기 1개월 전까지 제3항에 따른 통지를 받지 못한 경우에는 통지서를 수령한 날이 속하는 달의 다음 다음 달 1일부터 전자세금계산서를 발급하여야
    한다. <신설 2018.2.13, 2023.2.28>

    ⑤ 법 제32조제2항에서 "대통령령으로 정하는 전자적 방법"이란 다음 각 호의 어느 하나에 해당하는 방법으로 같은 조 제1항 각 호의 기재사항을 계산서 작성자의 신원 및 계산서의 변경 여부 등을 확인할 수 있는
    인증시스템을 거쳐 정보통신망으로 발급하는 것을 말한다. <개정 2018.2.13, 2020.2.11, 2020.12.8>

    1. 「조세특례제한법」 제5조의2제1호에 따른 전사적(全社的) 기업자원 관리설비를 이용하는 방법

    2. 재화 또는 용역을 실제 공급하는 사업자를 대신하여 전자세금계산서 발급업무를 대행하는 사업자의 전자세금계산서 발급 시스템을 이용하는 방법

    3. 국세청장이 구축한 전자세금계산서 발급 시스템을 이용하는 방법

    4. 전자세금계산서 발급이 가능한 현금영수증 발급장치 및 그 밖에 국세청장이 지정하는 전자세금계산서 발급 시스템을 이용하는 방법

    ⑥ 제5항제1호ㆍ제2호 및 제4호에 따른 설비 또는 시스템을 구축하고 운영하려는 자는 미리 재정경제부령으로 정하는 바에 따라 국세청장 또는 관할 세무서장에게 등록하여야 한다. <개정 2018.2.13, 2025.12.30>

    ⑦ 법 제32조제3항에서 "대통령령으로 정하는 기한"이란 전자세금계산서 발급일의 다음 날을 말한다. <개정 2018.2.13>

    ⑧ 법 제32조제3항에서 "대통령령으로 정하는 전자세금계산서 발급명세"란 법 제32조제1항 각 호의 사항을 말한다. <개정 2018.2.13>

    ⑨ 사업자의 사업이 다음 각 호의 어느 하나에 해당하는 경우 해당 사업자는 법 제32조제4항에 따라 해당 사업과 관련하여 법 제32조제1항제1호부터 제4호까지의 기재사항과 그 밖에 필요하다고 인정되는 사항 및 관할
    세무서장에게 신고한 전자세금계산서임을 적은 계산서를 관할 세무서장에게 신고한 후 발급할 수 있다. 이 경우 사업자는 제5항 각 호에 따른 표준인증을 받고 공급일의 다음 달 11일까지 전자세금계산서 파일을 국세청장에게
    전산매체로 제출하여야 한다. <개정 2018.2.13>

    1. 「전기사업법」에 따른 전기사업자가 산업용 전력을 공급하는 경우

    2. 「전기통신사업법」에 따른 전기통신사업자가 사업자에게 같은 법 제2조제11호에 따른 기간통신역무(이하 이 호에서 "기간통신역무"라 한다)를 제공하는 경우와 같은 조 제12호에 따른 부가통신역무 중 월단위 요금형
    서비스를 제공하는 경우로서 기간통신역무와 공급시기가 동일하여 통합하여 비용을 청구하는 경우

    3. 「도시가스사업법」에 따른 도시가스사업자가 산업용 도시가스를 공급하는 경우

    4. 「집단에너지사업법」에 따라 집단에너지를 공급하는 사업자가 산업용 열 또는 산업용 전기를 공급하는 경우

    5. 「방송법」 제2조제3호에 따른 방송사업자가 사업자에게 방송용역을 제공하는 경우

    6. 일반과세자가 농어민에게 「조세특례제한법」 제105조의2에 따른 농어업용 기자재를 공급하는 경우

    7. 「인터넷 멀티미디어 방송사업법」 제2조제5호가목에 따른 인터넷 멀티미디어 방송 제공사업자가 사업자에게 방송용역을 제공하는 경우

    ⑩ 법 제32조제5항에 따라 법인사업자 및 전자세금계산서 의무발급 개인사업자 외의 사업자도 제5항부터 제8항까지의 규정에 따라 전자세금계산서를 발급하고 전송할 수 있다. <개정 2018.2.13>

    ⑪ 재화 또는 용역을 공급받는 자가 전자세금계산서를 발급받을 수신함을 가지고 있지 아니하거나 지정하지 아니한 경우 또는 제5항제4호의 시스템 등 수신함이 적용될 수 없는 시스템을 사용하는 경우에는 제5항제3호에
    따른 전자세금계산서 발급 시스템을 수신함으로 지정한 것으로 본다. <개정 2018.2.13>

