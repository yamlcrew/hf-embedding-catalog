    \        {{- messages[0].content + '\\n\\n' }}\n    {%- endif %}\n    {{- \"# Tools\\n\\nYou may call one or more functions\
    \ to assist with the user query.\\n\\nYou are provided with function signatures within <tools></tools> XML tags:\\n<tools>\"\
    \ }}\n    {%- for tool in tools %}\n        {{- \"\\n\" }}\n        {{- tool | tojson }}\n    {%- endfor %}\n    {{- \"\
    \\n</tools>\\n\\nFor each function call, return a json object with function name and arguments within <tool_call></tool_call>\
    \ XML tags:\\n<tool_call>\\n{\\\"name\\\": <function-name>, \\\"arguments\\\": <args-json-object>}\\n</tool_call><|im_end|>\\\
    n\" }}\n{%- else %}\n    {%- if messages[0].role == 'system' %}\n        {{- '<|im_start|>system\\n' + messages[0].content\
    \ + '<|im_end|>\\n' }}\n    {%- endif %}\n{%- endif %}\n{%- set ns = namespace(multi_step_tool=true, last_query_index=messages|length\
    \ - 1) %}\n{%- for message in messages[::-1] %}\n    {%- set index = (messages|length - 1) - loop.index0 %}\n    {%- if\
    \ ns.multi_step_tool and message.role == \"user\" and message.content is string and not(message.content.startswith('<tool_response>')\
    \ and message.content.endswith('</tool_response>')) %}\n        {%- set ns.multi_step_tool = false %}\n        {%- set\
    \ ns.last_query_index = index %}\n    {%- endif %}\n{%- endfor %}\n{%- for message in messages %}\n    {%- if message.content\
    \ is string %}\n        {%- set content = message.content %}\n    {%- else %}\n        {%- set content = '' %}\n    {%-\
    \ endif %}\n    {%- if (message.role == \"user\") or (message.role == \"system\" and not loop.first) %}\n        {{- '<|im_start|>'\
    \ + message.role + '\\n' + content + '<|im_end|>' + '\\n' }}\n    {%- elif message.role == \"assistant\" %}\n        {%-\
    \ set reasoning_content = '' %}\n        {%- if message.reasoning_content is string %}\n            {%- set reasoning_content\
    \ = message.reasoning_content %}\n        {%- else %}\n            {%- if '</think>' in content %}\n                {%-\
    \ set reasoning_content = content.split('</think>')[0].rstrip('\\n').split('<think>')[-1].lstrip('\\n') %}\n         \
    \       {%- set content = content.split('</think>')[-1].lstrip('\\n') %}\n            {%- endif %}\n        {%- endif\
    \ %}\n        {%- if loop.index0 > ns.last_query_index %}\n            {%- if loop.last or (not loop.last and reasoning_content)\
    \ %}\n                {{- '<|im_start|>' + message.role + '\\n<think>\\n' + reasoning_content.strip('\\n') + '\\n</think>\\\
    n\\n' + content.lstrip('\\n') }}\n            {%- else %}\n                {{- '<|im_start|>' + message.role + '\\n' +\
    \ content }}\n            {%- endif %}\n        {%- else %}\n            {{- '<|im_start|>' + message.role + '\\n' + content\
    \ }}\n        {%- endif %}\n        {%- if message.tool_calls %}\n            {%- for tool_call in message.tool_calls\
    \ %}\n                {%- if (loop.first and content) or (not loop.first) %}\n                    {{- '\\n' }}\n     \
    \           {%- endif %}\n                {%- if tool_call.function %}\n                    {%- set tool_call = tool_call.function\
    \ %}\n                {%- endif %}\n                {{- '<tool_call>\\n{\"name\": \"' }}\n                {{- tool_call.name\
    \ }}\n                {{- '\", \"arguments\": ' }}\n                {%- if tool_call.arguments is string %}\n        \
    \            {{- tool_call.arguments }}\n                {%- else %}\n                    {{- tool_call.arguments | tojson\
    \ }}\n                {%- endif %}\n                {{- '}\\n</tool_call>' }}\n            {%- endfor %}\n        {%-\
    \ endif %}\n        {{- '<|im_end|>\\n' }}\n    {%- elif message.role == \"tool\" %}\n        {%- if loop.first or (messages[loop.index0\
    \ - 1].role != \"tool\") %}\n            {{- '<|im_start|>user' }}\n        {%- endif %}\n        {{- '\\n<tool_response>\\\
    n' }}\n        {{- content }}\n        {{- '\\n</tool_response>' }}\n        {%- if loop.last or (messages[loop.index0\
    \ + 1].role != \"tool\") %}\n            {{- '<|im_end|>\\n' }}\n        {%- endif %}\n    {%- endif %}\n{%- endfor %}\n\
    {%- if add_generation_prompt %}\n    {{- '<|im_start|>assistant\\n' }}\n    {%- if enable_thinking is defined and enable_thinking\
    \ is false %}\n        {{- '<think>\\n\\n</think>\\n\\n' }}\n    {%- endif %}\n{%- endif %}"
cardData:
  tags:
  - sentence-transformers
  - sentence-similarity
  - feature-extraction
  - dense
  - generated_from_trainer
  - dataset_size:4928
  - loss:MultipleNegativesRankingLoss
  base_model: dragonkue/BGE-m3-ko
  widget:
  - source_sentence: 신규로 개인사업을 시작했는데, 시작하자마자 해외 가공을 맡기는 형태로 원료를 무상 반출하고, 나중에 완제품을 해외에서 바로 인도하는 거래가 있어요. 첫 과세기간에 간이과세 적용 여부는
      12개월 환산으로 본다던데, 이런 수출 성격 거래의 금액을 어떤 기준(완제품 인도가액 등)으로 잡아 환산하는지 알고 싶어요.
    sentences:
    - '부가가치세법 시행령 | 제61조 | 과세표준과 세액의 계산, 과세표준과 세율, 외상거래 등 그 밖의 공급가액의 계산


      제61조(외상거래 등 그 밖의 공급가액의 계산)

      ① 법 제29조제3항제6호에서 "대통령령으로 정하는 마일리지 등"이란 재화 또는 용역의 구입실적에 따라 마일리지, 포인트 또는 그 밖에 이와 유사한 형태로 별도의 대가 없이 적립받은 후 다른 재화 또는 용역
      구입 시 결제수단으로 사용할 수 있는 것과 재화 또는 용역의 구입실적에 따라 별도의 대가 없이 교부받으며 전산시스템 등을 통하여 그 밖의 상품권과 구분 관리되는 상품권(이하 이 조에서 "마일리지등"이라 한다)을
      말한다. <신설 2018.2.13>

      ② 법 제29조제3항제6호에서 "대통령령으로 정하는 가액"이란 다음 각 호의 구분에 따른 가액을 말한다. <개정 2014.2.21, 2015.2.3, 2017.2.7, 2018.2.13>

      1. 외상판매 및 할부판매의 경우: 공급한 재화의 총가액

      2. 다음 각 목의 어느 하나에 해당하는 경우: 계약에 따라 받기로 한 대가의 각 부분

      가. 장기할부판매의 경우

      나. 완성도기준지급조건부 또는 중간지급조건부로 재화나 용역을 공급하는 경우

      다. 계속적으로 재화나 용역을 공급하는 경우

      3. 기부채납의 경우: 해당 기부채납의 근거가 되는 법률에 따라 기부채납된 가액. 다만, 기부채납된 가액에 부가가치세가 포함된 경우 그 부가가치세는 제외한다.

      4. 「공유수면 관리 및 매립에 관한 법률」에 따라 매립용역을 제공하는 경우: 「공유수면 관리 및 매립에 관한 법률」에 따라 산정한 해당 매립공사에 든 총사업비

      5. 사업자가 보세구역 내에 보관된 재화를 다른 사업자에게 공급하고, 그 재화를 공급받은 자가 그 재화를 보세구역으로부터 반입하는 경우: 그 재화의 공급가액에서 세관장이 법 제58조제2항에 따라 부가가치세를
      징수하고 발급한 수입세금계산서에 적힌 공급가액을 뺀 금액. 다만, 세관장이 법 제58조제2항에 따라 부가가치세를 징수하기 전에 같은 재화에 대한 선하증권이 양도되는 경우에는 선하증권의 양수인으로부터 받은 대가를
      공급가액으로 할 수 있다.

      6. 사업자가 제29조제2항제3호에 따라 둘 이상의 과세기간에 걸쳐 용역을 제공하고 그 대가를 선불로 받는 경우: 해당 금액을 계약기간의 개월 수로 나눈 금액의 각 과세대상기간의 합계액. 이 경우 개월 수의
      계산에 관하여는 해당 계약기간의 개시일이 속하는 달이 1개월 미만이면 1개월로 하고, 해당 계약기간의 종료일이 속하는 달이 1개월 미만이면 산입하지 아니한다.

      7. 사업자가 제29조제2항제4호에 따라 둘 이상의 과세기간에 걸쳐 용역을 제공하는 경우: 그 용역을 제공하는 기간 동안 지급받는 대가와 그 시설의 설치가액을 그 용역제공 기간의 개월 수로 나눈 금액의 각 과세대상기간의
      합계액. 이 경우 개월 수의 계산에 관하여는 해당 용역제공 기간의 개시일이 속하는 달이 1개월 미만이면 1개월로 하고, 해당 용역제공 기간의 종료일이 속하는 달이 1개월 미만이면 산입하지 아니한다.

      8. 제31조제1항제4호에 따른 위탁가공무역 방식으로 수출하는 경우: 완성된 제품의 인도가액

      9. 마일리지등으로 대금의 전부 또는 일부를 결제받은 경우(제10호에 해당하는 경우는 제외한다): 다음 각 목의 금액을 합한 금액

      가. 마일리지등 외의 수단으로 결제받은 금액

      [''나. 자기적립마일리지등[당초 재화 또는 용역을 공급하고 마일리지등을 적립(다른 사업자를 통하여 적립하여 준 경우를 포함한다)하여 준 사업자에게 사용한 마일리지등(여러 사업자가 적립하여 줄 수 있거나 여러
      사업자를 대상으로 사용할 수 있는 마일리지등의 경우 다음의 요건을 모두 충족한 경우로 한정한다)을 말한다. 이하 이 항에서 같다] 외의 마일리지등으로 결제받은 부분에 대하여 재화 또는 용역을 공급받는 자 외의
      자로부터 보전(補塡)받았거나 보전받을 금액'', ''\u3000 1) 고객별ㆍ사업자별로 마일리지등의 적립 및 사용 실적을 구분하여 관리하는 등의 방법으로 당초 공급자와 이후 공급자가 같다는 사실이 확인될 것'',
      ''\u3000 2) 사업자가 마일리지등으로 결제받은 부분에 대하여 재화 또는 용역을 공급받는 자 외의 자로부터 보전받지 아니할 것'']

      10. 자기적립마일리지등 외의 마일리지등으로 대금의 전부 또는 일부를 결제받은 경우로서 다음 각 목의 어느 하나에 해당하는 경우: 공급한 재화 또는 용역의 시가(제62조에 따른 금액을 말한다)

      가. 제9호나목에 따른 금액을 보전받지 아니하고 법 제10조제1항에 따른 자기생산ㆍ취득재화를 공급한 경우

      나. 제9호나목과 관련하여 특수관계인으로부터 부당하게 낮은 금액을 보전받거나 아무런 금액을 받지 아니하여 조세의 부담을 부당하게 감소시킬 것으로 인정되는 경우

      ③ 통상적으로 용기 또는 포장을 해당 사업자에게 반환할 것을 조건으로 그 용기대금과 포장비용을 공제한 금액으로 공급하는 경우에는 그 용기대금과 포장비용은 공급가액에 포함하지 아니한다. <개정 2018.2.13>

      ④ 사업자가 음식ㆍ숙박 용역이나 개인서비스 용역을 공급하고 그 대가와 함께 받는 종업원(자유직업소득자를 포함한다)의 봉사료를 세금계산서, 영수증 또는 법 제46조제1항에 따른 신용카드매출전표등에 그 대가와 구분하여
      적은 경우로서 봉사료를 해당 종업원에게 지급한 사실이 확인되는 경우에는 그 봉사료는 공급가액에 포함하지 아니한다. 다만, 사업자가 그 봉사료를 자기의 수입금액에 계상하는 경우에는 그러하지 아니하다. <개정 2018.2.13>'
    - '부가가치세법 시행령 | 제40조 | 영세율과 면세, 면세, 면세하는 금융·보험 용역의 범위


      제40조(면세하는 금융ㆍ보험 용역의 범위)

      ① 법 제26조제1항제11호에 따른 금융ㆍ보험 용역은 다음 각 호의 용역, 사업 및 업무에 해당하는 역무로 한다. <개정 2014.2.21, 2015.2.3, 2015.10.23, 2016.2.17, 2018.2.13,
      2019.2.12, 2020.2.11, 2020.8.11, 2022.2.15, 2022.6.30, 2023.9.26, 2025.2.28, 2025.12.30>

      1. 「은행법」에 따른 은행업무 및 부수업무로서 다음 각 목의 용역

      가. 예금ㆍ적금의 수입 또는 유가증권 및 그 밖의 채무증서 발행

      나. 자금의 대출 또는 어음의 할인

      다. 내국환ㆍ외국환

      라. 채무의 보증 또는 어음의 인수

      마. 상호부금

      바. 팩토링(기업의 판매대금 채권의 매수ㆍ회수 및 이와 관련된 업무)

      사. 삭제 <2015.2.3>

      아. 수납 및 지급 대행

      자. 지방자치단체의 금고대행

      차. 전자상거래와 관련한 지급대행

      2. 「자본시장과 금융투자업에 관한 법률」에 따른 다음 각 목의 사업

      가. 삭제 <2015.2.3>

      나. 삭제 <2015.2.3>

      다. 집합투자업. 다만, 집합투자업자가 투자자로부터 자금 등을 모아서 부동산, 실물자산 및 그 밖에 재정경제부령으로 정하는 자산에 운용하는 경우는 제외한다.

