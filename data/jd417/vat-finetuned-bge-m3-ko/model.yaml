      4. 제32조제3항에 따른 기한이 지난 후 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정신고기한까지 국세청장에게 전자세금계산서 발급명세를 전송하지 아니한 경우 그 공급가액의 0.5퍼센트

      5. 세금계산서의 필요적 기재사항의 전부 또는 일부가 착오 또는 과실로 적혀 있지 아니하거나 사실과 다른 경우 그 공급가액의 1퍼센트. 다만, 대통령령으로 정하는 바에 따라 거래사실이 확인되는 경우는 제외한다.

      ③ 사업자가 다음 각 호의 어느 하나에 해당하는 경우에는 해당 각 호에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. <개정 2016.12.20, 2017.12.19, 2019.12.31>

      1. 재화 또는 용역을 공급하지 아니하고 세금계산서 또는 제46조제3항에 따른 신용카드매출전표등(이하 "세금계산서등"이라 한다)을 발급한 경우: 그 세금계산서등에 적힌 공급가액의 3퍼센트

      2. 재화 또는 용역을 공급받지 아니하고 세금계산서등을 발급받은 경우: 그 세금계산서등에 적힌 공급가액의 3퍼센트

      3. 재화 또는 용역을 공급하고 실제로 재화 또는 용역을 공급하는 자가 아닌 자 또는 실제로 재화 또는 용역을 공급받는 자가 아닌 자의 명의로 세금계산서등을 발급한 경우: 그 공급가액의 2퍼센트

      4. 재화 또는 용역을 공급받고 실제로 재화 또는 용역을 공급하는 자가 아닌 자의 명의로 세금계산서등을 발급받은 경우: 그 공급가액의 2퍼센트

      5. 재화 또는 용역을 공급하고 세금계산서등의 공급가액을 과다하게 기재한 경우: 실제보다 과다하게 기재한 부분에 대한 공급가액의 2퍼센트

      6. 재화 또는 용역을 공급받고 제5호가 적용되는 세금계산서등을 발급받은 경우: 실제보다 과다하게 기재된 부분에 대한 공급가액의 2퍼센트

      ④ 사업자가 아닌 자가 재화 또는 용역을 공급하지 아니하고 세금계산서를 발급하거나 재화 또는 용역을 공급받지 아니하고 세금계산서를 발급받으면 사업자로 보고 그 세금계산서에 적힌 공급가액의 3퍼센트를 그 세금계산서를
      발급하거나 발급받은 자에게 납세지 관할 세무서장이 가산세로 징수한다. 이 경우 제37조제2항에 따른 납부세액은 0으로 본다. <개정 2016.12.20, 2017.12.19, 2023.12.31>

      ⑤ 사업자가 다음 각 호의 어느 하나에 해당하는 경우에는 각 호의 구분에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. <개정 2021.12.8>

      1. 제46조제3항에 따라 발급받은 신용카드매출전표등을 제48조제1항 ㆍ제4항 또는 제49조제1항에 따라 예정신고 또는 확정신고를 할 때 제출하여 매입세액을 공제받지 아니하고 대통령령으로 정하는 사유로 매입세액을
      공제받은 경우: 그 공급가액의 0.5퍼센트

