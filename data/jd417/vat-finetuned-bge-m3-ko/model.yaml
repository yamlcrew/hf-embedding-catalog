    사실과 다르게 적혀 있는 경우에는 매입처별 세금계산서합계표에 따르지 아니하고 세금계산서 또는 수입세금계산서에 따라 공제받은 매입세액에 해당하는 공급가액의 0.5퍼센트. 다만, 대통령령으로 정하는 경우는 제외한다.

    3. 제54조제1항 및 제3항에 따라 제출한 매입처별 세금계산서합계표의 기재사항 중 공급가액을 사실과 다르게 과다하게 적어 신고한 경우에는 제출한 매입처별 세금계산서합계표의 기재사항 중 사실과 다르게 과다하게 적어
    신고한 공급가액의 0.5퍼센트

    ⑧ 사업자가 제55조제1항에 따른 현금매출명세서 또는 같은 조 제2항에 따른 부동산임대공급가액명세서를 제출하지 아니하거나 제출한 수입금액(현금매출명세서의 경우에는 현금매출을 말한다. 이하 이 항에서 같다)이 사실과
