    - '부가가치세법 시행령 | 제68조 | 과세표준과 세액의 계산, 거래징수와 세금계산서, 전자세금계산서의 발급 등


      제68조(전자세금계산서의 발급 등)

      ① 법 제32조제2항에서 "대통령령으로 정하는 개인사업자"란 직전 연도의 사업장별 재화 및 용역의 공급가액(면세공급가액을 포함한다. 이하 이 조에서 같다)의 합계액이 8천만원 이상인 개인사업자(그 이후 직전
      연도의 사업장별 재화 및 용역의 공급가액이 8천만원 미만이 된 개인사업자를 포함하며, 이하 이 조에서 "전자세금계산서 의무발급 개인사업자"라 한다)를 말한다. <개정 2018.2.13, 2021.2.17, 2022.2.15,
      2023.2.28>

      ② 전자세금계산서 의무발급 개인사업자는 사업장별 재화 및 용역의 공급가액의 합계액이 8천만원 이상인 해의 다음 해 제2기 과세기간이 시작하는 날부터 전자세금계산서를 발급해야 한다. 다만, 사업장별 재화와 용역의
      공급가액의 합계액이 「국세기본법」 제45조에 따른 수정신고 또는 법 제57조에 따른 결정과 경정(이하 이 항에서 "수정신고등"이라 한다)으로 8천만원 이상이 된 경우에는 수정신고등을 한 날이 속하는 과세기간의
      다음 과세기간이 시작하는 날부터 전자세금계산서를 발급해야 한다. <개정 2021.2.17, 2022.2.15, 2023.2.28>

      ③ 관할 세무서장은 개인사업자가 전자세금계산서 의무발급 개인사업자에 해당하는 경우에는 제2항에 따라 전자세금계산서를 발급해야 하는 날이 시작되기 1개월 전까지 그 사실을 해당 개인사업자에게 통지하여야 한다.
      <개정 2023.2.28>

      ④ 제2항에도 불구하고 개인사업자가 전자세금계산서를 발급해야 하는 날이 시작되기 1개월 전까지 제3항에 따른 통지를 받지 못한 경우에는 통지서를 수령한 날이 속하는 달의 다음 다음 달 1일부터 전자세금계산서를
      발급하여야 한다. <신설 2018.2.13, 2023.2.28>

