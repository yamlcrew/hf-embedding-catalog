    나. 삭제 <2015.2.3>

    다. 집합투자업. 다만, 집합투자업자가 투자자로부터 자금 등을 모아서 부동산, 실물자산 및 그 밖에 재정경제부령으로 정하는 자산에 운용하는 경우는 제외한다.

    [''라. 신탁업. 다만, 다음의 구분에 따른 업무로 한정한다.'', ''\u3000 1) 신탁업자가 위탁자로부터 「자본시장과 금융투자업에 관한 법률」 제103조제1항제1호부터 제4호까지 또는 제7호의 재산(같은
    법 제9조제20항의 집합투자재산을 포함한다. 이하 이 목에서 같다)을 수탁받아 운용(집합투자업자의 지시에 따라 보관ㆍ관리하는 업무를 포함한다. 이하 이 목에서 같다)하는 업무. 다만, 같은 법 제103조제1항제1호의
    재산을 수탁받아 부동산, 실물자산 및 그 밖에 재정경제부령으로 정하는 자산에 운용하는 업무는 제외한다.'', ''\u3000 2) 신탁업자가 위탁자로부터 「자본시장과 금융투자업에 관한 법률」 제103조제1항제5호
    또는 제6호의 재산을 수익자에 대한 채무이행을 담보하기 위하여 수탁받아 운용하는 업무'', ''\u3000 3) 신탁업자가 위탁자로부터 「자본시장과 금융투자업에 관한 법률」 제103조제1항제5호 또는 제6호의 재산을
