  - '부가가치세법 | 제60조 | 결정ㆍ경정ㆍ징수와 환급, 가산세, 가산세


    제60조(가산세)

    ① 사업자 또는 국외사업자가 다음 각 호의 어느 하나에 해당하면 각 호에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. <개정 2014.1.1, 2016.12.20, 2023.12.31, 2024.12.31>

    1. 제8조제1항 본문에 따른 기한까지 등록을 신청하지 아니한 경우에는 사업 개시일부터 등록을 신청한 날의 직전일까지의 공급가액 합계액의 1퍼센트

    1의2. 제53조의2제1항 및 제2항에 따른 기한까지 등록을 하지 아니한 경우에는 사업 개시일부터 등록한 날의 직전일까지의 공급가액 합계액의 1퍼센트

    2. 대통령령으로 정하는 타인의 명의로 제8조에 따른 사업자등록을 하거나 그 타인 명의의 제8조에 따른 사업자등록을 이용하여 사업을 하는 것으로 확인되는 경우 그 타인 명의의 사업 개시일부터 실제 사업을 하는 것으로
    확인되는 날의 직전일까지의 공급가액 합계액의 2퍼센트

    ② 사업자가 다음 각 호의 어느 하나에 해당하면 각 호에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. 이 경우 제1호 또는 제2호가 적용되는 부분은 제3호부터 제5호까지를 적용하지 아니하고, 제5호가 적용되는
    부분은 제3호 및 제4호를 적용하지 아니한다. <개정 2014.12.23, 2016.12.20, 2018.12.31, 2019.12.31>

    1. 제34조에 따른 세금계산서의 발급시기가 지난 후 해당 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정신고 기한까지 세금계산서를 발급하는 경우 그 공급가액의 1퍼센트

    2. 제34조에 따른 세금계산서의 발급시기가 지난 후 해당 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정신고 기한까지 세금계산서를 발급하지 아니한 경우 그 공급가액의 2퍼센트. 다만, 다음 각 목의 어느
    하나에 해당하는 경우에는 그 공급가액의 1퍼센트로 한다.

    가. 제32조제2항에 따라 전자세금계산서를 발급하여야 할 의무가 있는 자가 전자세금계산서를 발급하지 아니하고 제34조에 따른 세금계산서의 발급시기에 전자세금계산서 외의 세금계산서를 발급한 경우

    나. 둘 이상의 사업장을 가진 사업자가 재화 또는 용역을 공급한 사업장 명의로 세금계산서를 발급하지 아니하고 제34조에 따른 세금계산서의 발급시기에 자신의 다른 사업장 명의로 세금계산서를 발급한 경우

    3. 제32조제3항에 따른 기한이 지난 후 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정신고기한까지 국세청장에게 전자세금계산서 발급명세를 전송하는 경우 그 공급가액의 0.3퍼센트

    4. 제32조제3항에 따른 기한이 지난 후 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정신고기한까지 국세청장에게 전자세금계산서 발급명세를 전송하지 아니한 경우 그 공급가액의 0.5퍼센트

    5. 세금계산서의 필요적 기재사항의 전부 또는 일부가 착오 또는 과실로 적혀 있지 아니하거나 사실과 다른 경우 그 공급가액의 1퍼센트. 다만, 대통령령으로 정하는 바에 따라 거래사실이 확인되는 경우는 제외한다.

    ③ 사업자가 다음 각 호의 어느 하나에 해당하는 경우에는 해당 각 호에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. <개정 2016.12.20, 2017.12.19, 2019.12.31>

    1. 재화 또는 용역을 공급하지 아니하고 세금계산서 또는 제46조제3항에 따른 신용카드매출전표등(이하 "세금계산서등"이라 한다)을 발급한 경우: 그 세금계산서등에 적힌 공급가액의 3퍼센트

    2. 재화 또는 용역을 공급받지 아니하고 세금계산서등을 발급받은 경우: 그 세금계산서등에 적힌 공급가액의 3퍼센트

    3. 재화 또는 용역을 공급하고 실제로 재화 또는 용역을 공급하는 자가 아닌 자 또는 실제로 재화 또는 용역을 공급받는 자가 아닌 자의 명의로 세금계산서등을 발급한 경우: 그 공급가액의 2퍼센트

    4. 재화 또는 용역을 공급받고 실제로 재화 또는 용역을 공급하는 자가 아닌 자의 명의로 세금계산서등을 발급받은 경우: 그 공급가액의 2퍼센트

    5. 재화 또는 용역을 공급하고 세금계산서등의 공급가액을 과다하게 기재한 경우: 실제보다 과다하게 기재한 부분에 대한 공급가액의 2퍼센트

    6. 재화 또는 용역을 공급받고 제5호가 적용되는 세금계산서등을 발급받은 경우: 실제보다 과다하게 기재된 부분에 대한 공급가액의 2퍼센트

    ④ 사업자가 아닌 자가 재화 또는 용역을 공급하지 아니하고 세금계산서를 발급하거나 재화 또는 용역을 공급받지 아니하고 세금계산서를 발급받으면 사업자로 보고 그 세금계산서에 적힌 공급가액의 3퍼센트를 그 세금계산서를
    발급하거나 발급받은 자에게 납세지 관할 세무서장이 가산세로 징수한다. 이 경우 제37조제2항에 따른 납부세액은 0으로 본다. <개정 2016.12.20, 2017.12.19, 2023.12.31>

    ⑤ 사업자가 다음 각 호의 어느 하나에 해당하는 경우에는 각 호의 구분에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. <개정 2021.12.8>

    1. 제46조제3항에 따라 발급받은 신용카드매출전표등을 제48조제1항 ㆍ제4항 또는 제49조제1항에 따라 예정신고 또는 확정신고를 할 때 제출하여 매입세액을 공제받지 아니하고 대통령령으로 정하는 사유로 매입세액을
    공제받은 경우: 그 공급가액의 0.5퍼센트

    2. 매입세액을 공제받기 위하여 제46조제3항제1호에 따라 제출한 신용카드매출전표등 수령명세서에 공급가액을 과다하게 적은 경우: 실제보다 과다하게 적은 공급가액(착오로 기재된 경우로서 신용카드매출전표등에 따라 거래사실이
    확인되는 부분의 공급가액은 제외한다)의 0.5퍼센트

    ⑥ 사업자가 다음 각 호의 어느 하나에 해당하면 각 호에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. 다만, 제54조제1항에 따라 제출한 매출처별 세금계산서합계표의 기재사항이 착오로 적힌 경우로서 사업자가
    발급한 세금계산서에 따라 거래사실이 확인되는 부분의 공급가액에 대하여는 그러하지 아니하다. <개정 2016.12.20>

    1. 제54조제1항 및 제3항에 따른 매출처별 세금계산서합계표를 제출하지 아니한 경우에는 매출처별 세금계산서합계표를 제출하지 아니한 부분에 대한 공급가액의 0.5퍼센트

    2. 제54조제1항 및 제3항에 따라 제출한 매출처별 세금계산서합계표의 기재사항 중 거래처별 등록번호 또는 공급가액의 전부 또는 일부가 적혀 있지 아니하거나 사실과 다르게 적혀 있는 경우에는 매출처별 세금계산서합계표의
    기재사항이 적혀 있지 아니하거나 사실과 다르게 적혀 있는 부분에 대한 공급가액의 0.5퍼센트

    3. 제54조제3항에 따라 예정신고를 할 때 제출하지 못하여 해당 예정신고기간이 속하는 과세기간에 확정신고를 할 때 매출처별 세금계산서합계표를 제출하는 경우로서 제2호에 해당하지 아니하는 경우에는 그 공급가액의
