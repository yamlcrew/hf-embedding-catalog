      기재사항이 적혀 있지 아니하거나 사실과 다르게 적혀 있는 부분에 대한 공급가액의 0.5퍼센트

      3. 제54조제3항에 따라 예정신고를 할 때 제출하지 못하여 해당 예정신고기간이 속하는 과세기간에 확정신고를 할 때 매출처별 세금계산서합계표를 제출하는 경우로서 제2호에 해당하지 아니하는 경우에는 그 공급가액의
      0.3퍼센트

      ⑦ 사업자가 다음 각 호의 어느 하나에 해당하면 각 호에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. 다만, 매입처별 세금계산서합계표의 기재사항이 착오로 적힌 경우로서 사업자가 수령한 세금계산서 또는
      수입세금계산서에 따라 거래사실이 확인되는 부분의 공급가액에 대하여는 그러하지 아니하다. <개정 2016.12.20>

      1. 제39조제1항제2호 단서에 따라 매입세액을 공제받는 경우로서 대통령령으로 정하는 경우에는 매입처별 세금계산서합계표에 따르지 아니하고 세금계산서 또는 수입세금계산서에 따라 공제받은 매입세액에 해당하는 공급가액의
      0.5퍼센트

      2. 제54조제1항 및 제3항에 따른 매입처별 세금계산서합계표를 제출하지 아니한 경우 또는 제출한 매입처별 세금계산서합계표의 기재사항 중 거래처별 등록번호 또는 공급가액의 전부 또는 일부가 적혀 있지 아니하거나
      사실과 다르게 적혀 있는 경우에는 매입처별 세금계산서합계표에 따르지 아니하고 세금계산서 또는 수입세금계산서에 따라 공제받은 매입세액에 해당하는 공급가액의 0.5퍼센트. 다만, 대통령령으로 정하는 경우는 제외한다.

      3. 제54조제1항 및 제3항에 따라 제출한 매입처별 세금계산서합계표의 기재사항 중 공급가액을 사실과 다르게 과다하게 적어 신고한 경우에는 제출한 매입처별 세금계산서합계표의 기재사항 중 사실과 다르게 과다하게
      적어 신고한 공급가액의 0.5퍼센트

      ⑧ 사업자가 제55조제1항에 따른 현금매출명세서 또는 같은 조 제2항에 따른 부동산임대공급가액명세서를 제출하지 아니하거나 제출한 수입금액(현금매출명세서의 경우에는 현금매출을 말한다. 이하 이 항에서 같다)이
      사실과 다르게 적혀 있으면 제출하지 아니한 부분의 수입금액 또는 제출한 수입금액과 실제 수입금액과의 차액의 1퍼센트를 납부세액에 더하거나 환급세액에서 뺀다. <개정 2016.12.20>

      ⑨ 제1항부터 제7항까지를 적용할 때에 제1항부터 제3항까지의 규정이 적용되는 부분에는 다음 각 호의 구분에 따른 규정을 각각 적용하지 아니한다. <개정 2014.12.23, 2016.12.20, 2017.12.19,
      2018.12.31, 2019.12.31>

      1. 제1항이 적용되는 부분: 제2항(제2호는 제외한다)ㆍ제5항 및 제6항

      2. 제2항(제2호는 제외한다)이 적용되는 부분: 제6항

      3. 제2항제2호 또는 제3항이 적용되는 부분: 제1항ㆍ제6항 및 제7항

      4. 제3항제3호가 적용되는 부분: 제2항제2호 본문

      5. 제3항제5호가 적용되는 부분: 제2항제5호 본문

      ⑩ 「법인세법」 제75조의6제2항제3호 또는 「소득세법」 제81조의9제2항제3호의 가산세를 적용받는 부분은 제2항제2호 및 제6항제2호의 가산세를 적용하지 아니한다. <신설 2018.12.31, 2019.12.31>'
    - '부가가치세법 시행규칙 | 제70조 | 결정ㆍ경정ㆍ징수와 환급, 조기환급 신고


      제70조(조기환급 신고)

      ① 영 제107조제3항 단서에 따른 건물 등 감가상각자산 취득명세서는 별지 제27호서식과 같다.

      ② 영 제107조제3항 단서에 따른 재무구조개선계획서는 별지 제27호의2서식과 같다. <신설 2017.3.10>

      ③ 영 제107조제5항에 따른 영세율 등 조기환급신고서는 별지 제21호서식과 같다. <개정 2017.3.10>'
  - source_sentence: 전기요금처럼 명의자와 실제 사용자가 다른 경우에, 명의자가 다시 실제 사용자에게 세금계산서를 끊어주는 방식이 가능한지요? 그리고 이런 형태로 세금계산서가 발급되면 간이과세자 예정 신고
      의무와 매출 4,800만원 미만 납부면제 판단에 어떤 영향이 있나요?
    sentences:
    - '부가가치세법 시행령 | 제69조 | 과세표준과 세액의 계산, 거래징수와 세금계산서, 위탁판매 등에 대한 세금계산서 발급


      제69조(위탁판매 등에 대한 세금계산서 발급)

      ① 위탁판매 또는 대리인에 의한 판매의 경우 수탁자 또는 대리인이 재화를 인도할 때에는 법 제32조제6항에 따라 수탁자 또는 대리인이 위탁자 또는 본인의 명의로 세금계산서를 발급하며, 위탁자 또는 본인이 직접
      재화를 인도하는 때에는 위탁자 또는 본인이 세금계산서를 발급할 수 있다. 이 경우 수탁자 또는 대리인의 등록번호를 덧붙여 적어야 한다.

      ② 위탁매입 또는 대리인에 의한 매입의 경우에는 법 제32조제6항에 따라 공급자가 위탁자 또는 본인을 공급받는 자로 하여 세금계산서를 발급한다. 이 경우 수탁자 또는 대리인의 등록번호를 덧붙여 적어야 한다.

      ③ 법 제10조제7항 단서의 경우에는 제1항과 제2항을 적용하지 아니한다.

      ④ 수용으로 인하여 재화가 공급되는 경우에는 제1항을 준용하여 해당 사업시행자가 세금계산서를 발급할 수 있다.

      ⑤ 용역의 공급에 대한 주선ㆍ중개의 경우에는 제1항과 제2항을 준용한다.

      ⑥ 「조달사업에 관한 법률」에 따라 물자가 공급되는 경우에는 법 제32조제6항에 따라 공급자 또는 세관장이 해당 실수요자에게 직접 세금계산서를 발급하여야 한다. 다만, 물자를 조달할 때에 그 물자의 실수요자를
      알 수 없는 경우에는 조달청장에게 세금계산서를 발급하고, 조달청장이 실제로 실수요자에게 그 물자를 인도할 때에는 그 실수요자에게 세금계산서를 발급할 수 있다.

      ⑦ 「한국가스공사법」에 따른 한국가스공사가 재정경제부령으로 정하는 가스도입판매사업자를 위하여 천연가스(액화한 것을 포함한다)를 직접 수입하는 경우에는 법 제32조제6항에 따라 세관장이 해당 가스도입판매사업자에게
      직접 세금계산서를 발급할 수 있다. <개정 2025.12.30>

      ⑧ 납세의무가 있는 사업자가 「여신전문금융업법」 제3조에 따라 등록한 시설대여업자로부터 시설 등을 임차하고, 그 시설 등을 공급자 또는 세관장으로부터 직접 인도받는 경우에는 법 제32조제6항에 따라 공급자 또는
      세관장이 그 사업자에게 직접 세금계산서를 발급할 수 있다.

      ⑨ 제18조제2항제1호에 따라 조달청장이 발행한 창고증권의 양도로서 임치물의 반환이 수반되는 경우의 세금계산서 발급에 관하여는 제6항 단서를 준용한다. 이 경우 제6항 단서 중 "실수요자"는 "창고증권과의 교환으로
      임치물을 반환받는 자"로 본다.

      ⑩ 「감정평가 및 감정평가사에 관한 법률」에 따른 감정평가법인등 또는 「신문 등의 진흥에 관한 법률」에 따른 신문 발행업자 및 「잡지 등 정기간행물의 진흥에 관한 법률」에 따른 정기간행물 발행업자 또는 「뉴스통신
      진흥에 관한 법률」에 따른 뉴스통신사업을 경영하는 법인이 법원의 의뢰를 받아 감정평가용역 또는 광고용역을 제공하는 경우로서 그 용역을 실제로 공급받는 자를 알 수 없을 때에는 법 제32조제6항에 따라 감정평가법인등
      또는 신문 발행업자 및 정기간행물 발행업자 또는 뉴스통신사업을 경영하는 법인은 법원에 세금계산서를 발급하고, 그 법원이 감정평가용역 또는 광고용역을 실제로 공급받는 자로부터 그 용역에 대한 대가를 징수할 때에는
      법원이 그 자에게 세금계산서를 발급할 수 있다. <개정 2016.8.31, 2022.1.21>

      ⑪ 「전기통신사업법」에 따른 전기통신사업자가 다른 전기통신사업자의 이용자(「전기통신사업법」 제2조제1항제9호에 따른 이용자를 말한다. 이하 이 조에서 같다)에게 전기통신역무를 제공하고 그 대가의 징수를 다른
      전기통신사업자에게 대행하게 하는 경우에는 법 제32조제6항에 따라 해당 전기통신역무를 제공한 사업자가 다른 전기통신사업자에게 세금계산서를 발급하고, 다른 전기통신사업자가 이용자에게 세금계산서를 발급할 수 있다.

      ⑫ 「전기사업법」에 따른 발전사업자가 전력시장을 통하여 같은 법에 따른 전기판매사업자 또는 전기사용자에게 전력을 공급하고 그 대가를 같은 법에 따른 한국전력거래소를 통하여 받는 경우에는 법 제32조제6항에 따라
      그 발전사업자가 한국전력거래소에 세금계산서를 발급하고 한국전력거래소가 그 전기판매사업자 또는 전기사용자에게 세금계산서를 발급할 수 있다.

      ⑬ 「방송법 시행령」 제1조의2제4호 및 제5호에 따른 위성이동멀티미디어방송사업자 및 일반위성방송사업자가 「전기통신사업법」에 따른 전기통신사업자의 이용자에게 각각 위성이동멀티미디어방송용역 또는 일반위성방송용역을
      제공하고 그 대가의 징수를 전기통신사업자에게 대행하게 하는 경우에는 법 제32조제6항에 따라 위성이동멀티미디어방송사업자 및 일반위성방송사업자는 전기통신사업자에게 세금계산서를 발급하고, 전기통신사업자가 이용자에게
      세금계산서를 발급할 수 있다.

      ⑭ 「전기사업법」에 따른 전기사업자가 전력을 공급하는 경우로서 전력을 공급받는 명의자와 전력을 실제로 소비하는 자가 서로 다른 경우에 그 전기사업자가 전력을 공급받는 명의자를 공급받는 자로 하여 세금계산서를
      발급하고 그 명의자는 발급받은 세금계산서에 적힌 공급가액의 범위에서 전력을 실제로 소비하는 자를 공급받는 자로 하여 세금계산서를 발급하였을 때(세금계산서의 발급이 면제되는 경우로서 재정경제부령으로 정하는 경우에
      그 세금계산서를 발급하였을 때를 포함한다)에는 그 전기사업자가 전력을 실제로 소비하는 자를 공급받는 자로 하여 세금계산서를 발급한 것으로 본다. <개정 2025.12.30>

      ⑮ 「전기사업법」에 따른 재생에너지전기공급사업자가 같은 법에 따른 발전사업자로부터 전력을 공급받아 전기사용자에게 전력을 공급하고 같은 법에 따른 전기판매사업자 또는 한국전력거래소에 전기 공급과 관련된 재정경제부령으로
      정하는 부대비용을 각각 지급하는 경우에는 전기판매사업자 또는 한국전력거래소가 재생에너지전기공급자에게 각각의 부대비용에 대한 세금계산서를 발급하고 재생에너지공급사업자는 그 부대비용과 관련하여 발급받은 세금계산서에
      적힌 공급가액의 범위에서 발전사업자 또는 전기사용자에게 각각의 세금계산서를 발급할 수 있다. <신설 2024.2.29, 2025.12.30>

      ⑯ 동업자가 조직한 조합 또는 이와 유사한 단체가 그 조합원이나 그 밖의 구성원을 위하여 재화 또는 용역을 공급하거나 공급받는 경우와 「국가를 당사자로 하는 계약에 관한 법률」에 따른 공동 도급계약에 의하여
      용역을 공급하고 그 공동 수급체의 대표자가 그 대가를 지급받는 경우 및 「도시가스사업법」에 따른 도시가스사업자가 도시가스를 공급할 때 도시가스를 공급받는 명의자와 도시가스를 실제로 소비하는 자가 서로 다른 경우에
      관하여는 제14항을 준용한다. <개정 2024.2.29>

      ⑰ 제18조제2항제1호에 따른 조달청 창고 및 같은 항 제2호에 따른 거래소의 지정창고에 보관된 물품이 국내로 반입되는 경우에는 세관장이 수입세금계산서를 발급한다. <개정 2024.2.29>

      ⑱ 법 제52조제1항에 따른 용역등(이하 "용역등"이라 한다)을 법 제53조제1항에 따라 공급하는 경우에는 세금계산서를 발급할 때 그 용역등을 공급하는 법 제52조제1항 각 호의 어느 하나에 해당하는 자의 상호
      및 주소를 덧붙여 적어야 한다. <개정 2024.2.29>

      ⑲ 「온실가스 배출권의 할당 및 거래에 관한 법률」에 따라 배출권 거래계정을 등록한 자(이하 "할당대상업체등"이라 한다)가 같은 법에 따른 배출권 거래소가 개설한 배출권 거래시장을 통하여 다른 할당대상업체등에게
      같은 법 제2조제3호에 따른 배출권(같은 법 제29조제3항에 따른 상쇄배출권을 포함한다)을 공급하고 그 대가를 배출권 거래소를 통하여 받는 경우에는 법 제32조제6항에 따라 그 할당대상업체등이 배출권 거래소에
      세금계산서를 발급하고 배출권 거래소가 공급받은 할당대상업체등에 세금계산서를 발급할 수 있다. <신설 2015.2.3, 2024.2.29>

      ⑳ 합병에 따라 소멸하는 법인이 합병계약서에 기재된 합병을 할 날부터 합병등기일까지의 기간에 재화 또는 용역을 공급하거나 공급받는 경우 합병 이후 존속하는 법인 또는 합병으로 신설되는 법인이 세금계산서를 발급하거나
      발급받을 수 있다. <신설 2020.2.11, 2024.2.29>

      ㉑ 분할 또는 분할합병에 따라 소멸하는 법인이 분할계획서에 기재된 분할을 할 날 또는 분할합병계약서에 기재된 분할합병을 할 날부터 분할등기일 또는 분할합병등기일까지의 기간에 재화 또는 용역을 공급하거나 공급받는
      경우에는 다음 각 호의 어느 하나에 해당하는 법인으로서 분할계획서 또는 분할합병계약서에서 정하는 바에 따라 해당 재화 또는 용역의 공급에 관한 권리의무를 승계하는 법인이 세금계산서를 발급하거나 발급받을 수 있다.
      <신설 2025.2.28>

      1. 분할 또는 분할합병 이후 존속하는 법인

      2. 분할 또는 분할합병으로 신설되는 법인'
    - '부가가치세법 | 제69조 | 간이과세, 간이과세자에 대한 납부의무의 면제


      제69조(간이과세자에 대한 납부의무의 면제)

      ① 간이과세자의 해당 과세기간에 대한 공급대가의 합계액이 4천800만원 미만이면 제66조 및 제67조에도 불구하고 제63조제2항에 따른 납부의무를 면제한다. 다만, 제64조에 따라 납부세액에 더하여야 할 세액은
      그러하지 아니하다. <개정 2018.12.31, 2020.12.22>

      ② 제1항에 따라 납부할 의무를 면제하는 경우에 대하여는 제60조제1항을 적용하지 아니한다. 다만, 제8조제1항에 따른 기한까지 사업자등록을 신청하지 아니한 경우(대통령령으로 정하는 고정 사업장이 없는 경우는
      제외한다)에는 제60조제1항제1호를 적용하되, 제60조제1항제1호 중 "1퍼센트"를 "0.5퍼센트와 5만원 중 큰 금액"으로 한다. <개정 2016.12.20>

      ③ 제1항을 적용할 때 다음 각 호의 경우에는 같은 호의 공급대가의 합계액을 12개월로 환산한 금액을 기준으로 한다. 이 경우 1개월 미만의 끝수가 있으면 1개월로 한다. <개정 2014.1.1>

      1. 해당 과세기간에 신규로 사업을 시작한 간이과세자는 그 사업 개시일부터 그 과세기간 종료일까지의 공급대가의 합계액

      2. 휴업자ㆍ폐업자 및 과세기간 중 과세유형을 전환한 간이과세자는 그 과세기간 개시일부터 휴업일ㆍ폐업일 및 과세유형 전환일까지의 공급대가의 합계액

      3. 제5조제4항 각 호에 따른 과세기간의 적용을 받는 간이과세자는 해당 과세기간의 공급대가의 합계액

      ④ 제1항에 따라 납부의무가 면제되는 사업자가 자진 납부한 사실이 확인되면 납세지 관할 세무서장은 납부한 금액을 환급하여야 한다.'
    - '부가가치세법 시행령 | 제35조 | 영세율과 면세, 면세, 면세하는 의료보건 용역의 범위


      제35조(면세하는 의료보건 용역의 범위) 법 제26조제1항제5호에 따른 의료보건 용역은 다음 각 호의 용역(「의료법」 또는 「수의사법」에 따라 의료기관 또는 동물병원을 개설한 자가 제공하는 것을 포함한다)으로
      한다. <개정 2014.1.1, 2014.1.28, 2016.2.17, 2016.8.2, 2018.2.13, 2019.2.12, 2019.12.24, 2020.2.11, 2022.2.15, 2023.9.26,
      2024.2.29, 2025.6.20, 2025.12.30>

      1. 「의료법」에 따른 의사, 치과의사, 한의사, 조산사 또는 「간호법」에 따른 간호사가 제공하는 용역. 다만, 「국민건강보험법」 제41조제4항에 따라 요양급여의 대상에서 제외되는 다음 각 목의 진료용역은 제외한다.

      가. 쌍꺼풀수술, 코성형수술, 유방확대ㆍ축소술(유방암 수술에 따른 유방 재건술은 제외한다), 지방흡인술, 주름살제거술, 안면윤곽술, 치아성형(치아미백, 라미네이트와 잇몸성형술을 말한다) 등 성형수술(성형수술로
      인한 후유증 치료, 선천성 기형의 재건수술과 종양 제거에 따른 재건수술은 제외한다)과 악안면 교정술(치아교정치료가 선행되는 악안면 교정술은 제외한다)

      나. 색소모반ㆍ주근깨ㆍ흑색점ㆍ기미 치료술, 여드름 치료술, 제모술, 탈모치료술, 모발이식술, 문신술 및 문신제거술, 피어싱, 지방융해술, 피부재생술, 피부미백술, 항노화치료술 및 모공축소술

      2. 「의료법」에 따른 접골사(接骨士), 침사(鍼士), 구사(灸士) 또는 안마사가 제공하는 용역

      3. 「의료기사 등에 관한 법률」에 따른 임상병리사, 방사선사, 물리치료사, 작업치료사, 치과기공사 또는 치과위생사가 제공하는 용역

      4. 「약사법」에 따른 약사가 제공하는 의약품의 조제용역

      5. 「수의사법」에 따른 수의사가 제공하는 용역. 다만, 동물의 진료용역은 다음 각 목의 어느 하나에 해당하는 진료용역으로 한정한다.

      가. 「축산물 위생관리법」에 따른 가축에 대한 진료용역

      나. 「수산생물질병 관리법」에 따른 수산동물에 대한 진료용역

      다. 「장애인복지법」 제40조제2항에 따른 장애인 보조견표지를 발급받은 장애인 보조견에 대한 진료용역

      라. 「국민기초생활 보장법」 제2조제2호에 따른 수급자가 기르는 동물의 진료용역

      마. 가목부터 라목까지의 규정에 따른 진료용역 외에 질병 예방 및 치료를 목적으로 하는 동물의 진료용역으로서 농림축산식품부장관 또는 해양수산부장관이 재정경제부장관과 협의하여 고시하는 용역

      6. 장의업자가 제공하는 장의용역

      7. 「장사 등에 관한 법률」 제14조부터 제16조까지의 규정에 따라 사설묘지, 사설화장시설, 사설봉안시설 또는 사설자연장지를 설치ㆍ관리 또는 조성하는 자가 제공하는 묘지분양, 화장, 유골 안치, 자연장지분양
      및 관리업 관련 용역

      8. 지방자치단체로부터 「장사 등에 관한 법률」 제13조제1항에 따른 공설묘지, 공설화장시설, 공설봉안시설 또는 공설자연장지의 관리를 위탁받은 자가 제공하는 묘지분양, 화장, 유골 안치, 자연장지분양 및 관리업
      관련 용역

      9. 「응급의료에 관한 법률」 제2조제8호에 따른 응급환자이송업자가 제공하는 응급환자이송용역

      10. 「하수도법」 제45조에 따른 분뇨수집ㆍ운반업의 허가를 받은 사업자와 「가축분뇨의 관리 및 이용에 관한 법률」 제28조에 따른 가축분뇨수집ㆍ운반업 또는 가축분뇨처리업의 허가를 받은 사업자가 공급하는 용역

      11. 「감염병의 예방 및 관리에 관한 법률」 제52조에 따라 소독업의 신고를 한 사업자가 공급하는 소독용역

      12. 「폐기물관리법」 제25조에 따라 생활폐기물 또는 의료폐기물의 폐기물처리업 허가를 받은 사업자가 공급하는 생활폐기물 또는 의료폐기물의 수집ㆍ운반 및 처리용역과 같은 법 제29조에 따라 폐기물처리시설의 설치승인을
      받거나 그 설치의 신고를 한 사업자가 공급하는 생활폐기물의 재활용용역

      13. 「산업안전보건법」 제21조에 따라 보건관리전문기관으로 지정된 자가 공급하는 보건관리용역 및 같은 법 제126조에 따른 작업환경측정기관이 공급하는 작업환경측정용역

      14. 「노인장기요양보험법」 제2조제4호에 따른 장기요양기관이 같은 법에 따라 장기요양인정을 받은 자에게 제공하는 신체활동ㆍ가사활동의 지원 또는 간병 등의 용역

      15. 「사회복지사업법」 제5조의2제2항에 따라 보호대상자에게 지급되는 사회복지서비스 이용권을 대가로 국가 및 지방자치단체 외의 자가 공급하는 용역

      16. 「모자보건법」에 따른 산후조리원에서 분만 직후의 임산부나 영유아에게 제공하는 급식ㆍ요양 등의 용역

      17. 「사회적기업 육성법」 제7조에 따라 인증받은 사회적기업 또는「협동조합기본법」 제85조제1항에 따라 설립인가를 받은 사회적협동조합이 직접 제공하는 간병ㆍ산후조리ㆍ보육 용역

      18. 「정신건강증진 및 정신질환자 복지서비스 지원에 관한 법률」 제15조제6항 및 그 밖에 재정경제부령으로 정하는 법령에 따라 국가 및 지방자치단체로부터 의료보건 용역을 위탁받은 자가 제공하는 의료보건 용역'
  - source_sentence: 분할 때문에 한 사업부문을 접고 다른 쪽으로 넘기는 형태인데, 분할로 사업을 폐업하는 경우 폐업일 기준이 어떻게 되나요? 폐업일이 정해지면 부가가치세는 어느 관할에서 과세하는지도 같이
      알고 싶어요.
    sentences:
    - '부가가치세법 | 제7조 | 총칙, 과세 관할


      제7조(과세 관할)

      ① 사업자에 대한 부가가치세는 제6조제1항부터 제5항까지의 규정에 따른 납세지를 관할하는 세무서장 또는 지방국세청장이 과세한다.

      ② 재화를 수입하는 자에 대한 부가가치세는 제6조제6항에 따른 납세지를 관할하는 세관장이 과세한다.'
    - '부가가치세법 | 제29조 | 과세표준과 세액의 계산, 과세표준과 세율, 과세표준


      제29조(과세표준)

      ① 재화 또는 용역의 공급에 대한 부가가치세의 과세표준은 해당 과세기간에 공급한 재화 또는 용역의 공급가액을 합한 금액으로 한다.

      ② 재화의 수입에 대한 부가가치세의 과세표준은 그 재화에 대한 관세의 과세가격과 관세, 개별소비세, 주세, 교육세, 농어촌특별세 및 교통ㆍ에너지ㆍ환경세를 합한 금액으로 한다.

      ③ 제1항의 공급가액은 다음 각 호의 가액을 말한다. 이 경우 대금, 요금, 수수료, 그 밖에 어떤 명목이든 상관없이 재화 또는 용역을 공급받는 자로부터 받는 금전적 가치 있는 모든 것을 포함하되, 부가가치세는
      포함하지 아니한다. <개정 2017.12.19>

      1. 금전으로 대가를 받는 경우: 그 대가. 다만, 그 대가를 외국통화나 그 밖의 외국환으로 받은 경우에는 대통령령으로 정한 바에 따라 환산한 가액

      2. 금전 외의 대가를 받는 경우: 자기가 공급한 재화 또는 용역의 시가

      3. 폐업하는 경우: 폐업 시 남아 있는 재화의 시가

      4. 제10조제1항ㆍ제2항ㆍ제4항ㆍ제5항 및 제12조제1항에 따라 재화 또는 용역을 공급한 것으로 보는 경우: 자기가 공급한 재화 또는 용역의 시가

      5. 제10조제3항에 따라 재화를 공급하는 것으로 보는 경우: 해당 재화의 취득가액 등을 기준으로 대통령령으로 정하는 가액

      6. 외상거래, 할부거래, 대통령령으로 정하는 마일리지 등으로 대금의 전부 또는 일부를 결제하는 거래 등 그 밖의 방법으로 재화 또는 용역을 공급하는 경우: 공급 형태 등을 고려하여 대통령령으로 정하는 가액

      ④ 제3항에도 불구하고 특수관계인에 대한 재화 또는 용역(수탁자가 위탁자의 특수관계인에게 공급하는 신탁재산과 관련된 재화 또는 용역을 포함한다)의 공급이 다음 각 호의 어느 하나에 해당하는 경우로서 조세의 부담을
      부당하게 감소시킬 것으로 인정되는 경우에는 공급한 재화 또는 용역의 시가를 공급가액으로 본다. <개정 2021.12.8>

      1. 재화의 공급에 대하여 부당하게 낮은 대가를 받거나 아무런 대가를 받지 아니한 경우

      2. 용역의 공급에 대하여 부당하게 낮은 대가를 받는 경우

      3. 용역의 공급에 대하여 대가를 받지 아니하는 경우로서 제12조제2항 단서가 적용되는 경우

      ⑤ 다음 각 호의 금액은 공급가액에 포함하지 아니한다.

      1. 재화나 용역을 공급할 때 그 품질이나 수량, 인도조건 또는 공급대가의 결제방법이나 그 밖의 공급조건에 따라 통상의 대가에서 일정액을 직접 깎아 주는 금액

      2. 환입된 재화의 가액

      3. 공급받는 자에게 도달하기 전에 파손되거나 훼손되거나 멸실한 재화의 가액

      4. 재화 또는 용역의 공급과 직접 관련되지 아니하는 국고보조금과 공공보조금

      5. 공급에 대한 대가의 지급이 지체되었음을 이유로 받는 연체이자

      6. 공급에 대한 대가를 약정기일 전에 받았다는 이유로 사업자가 당초의 공급가액에서 할인해 준 금액

      ⑥ 사업자가 재화 또는 용역을 공급받는 자에게 지급하는 장려금이나 이와 유사한 금액 및 제45조제1항에 따른 대손금액(貸損金額)은 과세표준에서 공제하지 아니한다.

      ⑦ 사업자가 재화 또는 용역을 공급하고 그 대가로 받은 금액에 부가가치세가 포함되어 있는지가 분명하지 아니한 경우에는 그 대가로 받은 금액에 110분의 100을 곱한 금액을 공급가액으로 한다.

      ⑧ 사업자가 과세사업과 면세사업등에 공통적으로 사용된 재화를 공급하는 경우에는 대통령령으로 정하는 바에 따라 계산한 금액을 공급가액으로 한다. <개정 2023.12.31>

      ⑨ 사업자가 토지와 그 토지에 정착된 건물 또는 구축물 등을 함께 공급하는 경우에는 건물 또는 구축물 등의 실지거래가액을 공급가액으로 한다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 대통령령으로 정하는
      바에 따라 안분계산한 금액을 공급가액으로 한다. <개정 2018.12.31, 2021.12.8>

      1. 실지거래가액 중 토지의 가액과 건물 또는 구축물 등의 가액의 구분이 불분명한 경우

      2. 사업자가 실지거래가액으로 구분한 토지와 건물 또는 구축물 등의 가액이 대통령령으로 정하는 바에 따라 안분계산한 금액과 100분의 30 이상 차이가 있는 경우. 다만, 다른 법령에서 정하는 바에 따라 가액을
      구분한 경우 등 대통령령으로 정하는 사유에 해당하는 경우는 제외한다.

      ⑩ 사업자가 다음 각 호의 어느 하나에 해당하는 부동산 임대용역을 공급하는 경우의 공급가액은 대통령령으로 정하는 바에 따라 계산한 금액으로 한다.

      1. 사업자가 부동산 임대용역을 공급하고 전세금 또는 임대보증금을 받는 경우

      2. 과세되는 부동산 임대용역과 면세되는 주택 임대용역을 함께 공급하여 그 임대구분과 임대료 등의 구분이 불분명한 경우

      3. 사업자가 둘 이상의 과세기간에 걸쳐 부동산 임대용역을 공급하고 그 대가를 선불 또는 후불로 받는 경우

      ⑪ 제10조제1항ㆍ제2항 및 제4항부터 제6항까지의 규정에 따라 재화의 공급으로 보는 재화가 대통령령으로 정하는 감가상각자산(이하 "감가상각자산"이라 한다)인 경우에는 제3항제3호 및 제4호에도 불구하고 대통령령으로
      정하는 바에 따라 계산한 금액을 공급가액으로 한다.

      ⑫ 시가와 그 밖에 공급가액 및 과세표준의 계산에 필요한 사항은 대통령령으로 정한다.'
    - '부가가치세법 | 제20조 | 과세거래, 공급시기와 공급장소, 용역의 공급장소


      제20조(용역의 공급장소)

      ① 용역이 공급되는 장소는 다음 각 호의 어느 하나에 해당하는 곳으로 한다. <개정 2020.12.22>

      1. 역무가 제공되거나 시설물, 권리 등 재화가 사용되는 장소

      2. 국내 및 국외에 걸쳐 용역이 제공되는 국제운송의 경우 사업자가 비거주자 또는 외국법인이면 여객이 탑승하거나 화물이 적재되는 장소

      3. 제53조의2제1항에 따른 전자적 용역의 경우 용역을 공급받는 자의 사업장 소재지, 주소지 또는 거소지

      ② 제1항에서 규정한 사항 외의 용역이 공급되는 장소에 관하여 필요한 사항은 대통령령으로 정한다.'
