      제60조(가산세)

      ① 사업자 또는 국외사업자가 다음 각 호의 어느 하나에 해당하면 각 호에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. <개정 2014.1.1, 2016.12.20, 2023.12.31, 2024.12.31>

      1. 제8조제1항 본문에 따른 기한까지 등록을 신청하지 아니한 경우에는 사업 개시일부터 등록을 신청한 날의 직전일까지의 공급가액 합계액의 1퍼센트

      1의2. 제53조의2제1항 및 제2항에 따른 기한까지 등록을 하지 아니한 경우에는 사업 개시일부터 등록한 날의 직전일까지의 공급가액 합계액의 1퍼센트

      2. 대통령령으로 정하는 타인의 명의로 제8조에 따른 사업자등록을 하거나 그 타인 명의의 제8조에 따른 사업자등록을 이용하여 사업을 하는 것으로 확인되는 경우 그 타인 명의의 사업 개시일부터 실제 사업을 하는
      것으로 확인되는 날의 직전일까지의 공급가액 합계액의 2퍼센트

      ② 사업자가 다음 각 호의 어느 하나에 해당하면 각 호에 따른 금액을 납부세액에 더하거나 환급세액에서 뺀다. 이 경우 제1호 또는 제2호가 적용되는 부분은 제3호부터 제5호까지를 적용하지 아니하고, 제5호가
      적용되는 부분은 제3호 및 제4호를 적용하지 아니한다. <개정 2014.12.23, 2016.12.20, 2018.12.31, 2019.12.31>

      1. 제34조에 따른 세금계산서의 발급시기가 지난 후 해당 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정신고 기한까지 세금계산서를 발급하는 경우 그 공급가액의 1퍼센트

      2. 제34조에 따른 세금계산서의 발급시기가 지난 후 해당 재화 또는 용역의 공급시기가 속하는 과세기간에 대한 확정신고 기한까지 세금계산서를 발급하지 아니한 경우 그 공급가액의 2퍼센트. 다만, 다음 각 목의
      어느 하나에 해당하는 경우에는 그 공급가액의 1퍼센트로 한다.

      가. 제32조제2항에 따라 전자세금계산서를 발급하여야 할 의무가 있는 자가 전자세금계산서를 발급하지 아니하고 제34조에 따른 세금계산서의 발급시기에 전자세금계산서 외의 세금계산서를 발급한 경우

