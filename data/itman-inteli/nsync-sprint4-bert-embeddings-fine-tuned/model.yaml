- source_sentence: A GLADIADORA PRETA GLADIADORA Tecnolycra ( tipo neoprene)  e couro acetinado, palmilha forrada couro acetinado
    e tecnolycra, solado anabelinha.
  sentences:
  - E a vantagem das vantagens dessa bolsa é que ela deixa as mãos totalmente livres, gente.
  - Não é maravilhoso a gente não dispensar, assim, toda a liberdade que uma calça jeans nos traz também... Nossa, nos traz,
    falei bonito.
  - Tem risco de não chegar a tempo? Quero o A GLADIADORA PRETA pra um evento!
- source_sentence: BRINCO PAH BRINCO LONGO Metal banhado a ouro.
  sentences:
  - Segundo que resolve aquela coisa, porque esse tipo de saia costuma marcar um pouquinho a barriguinha, marca mais o quadril.
  - Geralmente ela tá de sapato baixo, ou uma sapatilha, ou uma sandália que tenha essa amarração na perna.
  - Qual tamanho do BRINCO PAH você recomenda se eu uso M?
- source_sentence: Nesse vídeo eu vou te mostrar o melhor acessório para inverter o fuso.
  sentences:
  - Ele sempre vai ter o respaldo, ou de uma modelagem que remete à ofertaria, ou do queridinho blazer.
  - Cintura mais alta, perna mais larguinha, assim, pra fazer, às vezes, de uma saia vazia, não marca nada e não tão curtinho.
  - Pra dar aquele upgrade numa regata, assim, pra noite, essas que têm essa estrutura de ombreira são ótimas, porque traz
    exatamente aquela imponência, né, pra esse tipo de escura de preferência, fazendo um contraste com uma parte de baixo,
    assim, um pouco mais clara, pra não ficar tudo, assim, muito sério, mas pode casar o preto também no acessório.
- source_sentence: Deixa um pouquinho, assim, de pele aparecendo com a cropped e um sapato que remeta um certo, assim, frescor,
    porque a gente é jovem, né?
  sentences:
  - Sapato é aquele negócio que quando a gente tem os modelos certos, bem coringa, eles resolvem a nossa vida.
  - E esse blazer, assim, transpassado, ou seja, ele precisa ser oversized para conseguir transpassar, fez toda a diferença.
  - Tem risco de não chegar a tempo? Quero o A CAMISA BRANCA pra um evento!
- source_sentence: Então eu acho que uma bermuda que tem um comprimento mais ou menos um palmo acima do joelho e que tem o
    shape um pouquinho mais aberto, costumam ser assim um pouco mais fáceis da gente gostar tá?
  sentences:
  - Dá pra montar um look casual chique com o MACACÃO TÔ PRONTA?
  - O tecido do TRICOT ANIMADOR esquenta muito?
  - Pode ser uma bermuda, pode ter prega, pode ter uma lavagem um pouco mais escura e alfaiataria pra acompanhar, que não
    tem erro.
