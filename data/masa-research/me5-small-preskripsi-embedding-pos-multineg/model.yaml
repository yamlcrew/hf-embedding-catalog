widgetData:
- source_sentence: 'Paslon Atang Annida Dapat Dukungan Relawan Badani di Pilkada 2024. Bandung, VIVA - Elemen dukungan bagi
    pasangan Calon Wali Kota dan Wakil Wali Kota Bogor pada Pilkada 2024 yaitu Atang Trisnanto - Annida Allivia terus bermunculan.
    Salahsatunya Balad Abah Diani (Badani) menyatakan telah menjadi relawan untuk pemenangan Atang - Annida. Badani mendeklarasikan
    dukungannya di Posko Badani, Jalan Dadali No. 39, Kecamatan Tanah Sareal, pada Minggu 27 Oktober 2024. Deklarasi ini dihadiri
    500 orang pendukung yang terdiri dari pensiunan ASN, organisasi masyarakat, komunitas relawan, dan tokoh masyarakat.\xa0
    "Mereka berkomitmen untuk mendukung visi dan misi Atang-Annida dalam memajukan Kota Bogor serta mewujudkan Bogor Nyaman
    untuk Semua," kata Dewan Pembina Badani, H. Diani Budiarto dalam keterangannya, Rabu 30 Oktober 2024.  Menurutnya, deklarasi
    ini bertujuan mengumpulkan potensi berbagai kalangan, mulai dari organisasi masyarakat, pensiunan, kelompok anak muda,
    komunitas relawan, maupun tokoh masyarakat yang memiliki visi yang sama dalam memajukan Kota Bogor.\xa0 "Kami ingin bergabung
    memenangkan pasangan Atang-Annida sebagai Wali Kota dan Wakil Wali Kota Bogor periode 2024-2029," ujar Diani. Selain itu,
    mantan Wali Kota Bogor periode 2004-2014 ini memproyeksikan relawan ini memberikan semangat bagi Partai  Keadilan Sejahtera
    (PKS) dan memperlihatkan bahwa mereka tidak berjalan sendiri. , "Banyak elemen masyarakat berharap PKS mampu menghadirkan
    kepemimpinan baru yang dekat dengan masyarakat," katanya., Menurutnya, pasca memantau seluruh kandidat, Badani memilih
    untuk mendukung pasangan Atang-Annida. "Kami menilai Atang-Annida adalah pasangan calon yang paling sejalan dengan aspirasi
    masyarakat Kota Bogor,” katanya., , “Memiliki komitmen untuk hadir di tengah-tengah masyarakat, mendengarkan aspirasi,
    dan mampu memberikan solusi untuk permasalahan yang ada," terangnya., Menyikapi hal ini, Atang Trisnanto menyampaikan
    rasa syukur, terima kasih, dan apresiasi kepada Badani atas dukungan yang diberikan. "Saya bertekad untuk mendengar aspirasi
    masyarakat, dan bersama-sama kita akan membangun Bogor yang kita cintai ini. Mari kita wujudkan Bogor Nyaman untuk Semua:
    nyaman pelayanannya, nyaman rezekinya, nyaman kotanya, dan nyaman hidupnya," terangnya. *'
