      scabies, which is why it is often transmitted during sex. Brief physical touch – such as a handshake – is unlikely to
      lead to scabies. However, mites can also survive for several days in humid environments. Contaminated bedsheets and
      clothes should always be washed at hot temperatures to kill the mite and eggs. The most common treatment is an anti-parasitic
      liquid called Derbac M – also known as malathion. For most patients, it is quick and effective. I’ve had balance problems
      since I had a pacemaker fitted in 2019. It feels like I’m drunk at all times. I’ve been seen by a neurologist who says
      I don’t have any brain issues such as Parkinson’s. Could my pacemaker be to blame? Dr Ellie replies: It''s important
      to always see a GP about balance problems. Not only is it a very distressing symptom, it can also lead to falls and
      life-changing injuries. But unpicking its cause can be complicated, because there are several possible triggers. For
      example, if the dizziness occurs when standing or sitting up suddenly, it might be due to out-of-control blood pressure.
      However, pacemakers, in rare cases, do have side effects. The devices are fitted to control the beating of the heart.
      For most who receive them, they massively improve quality of life and are even life-saving. However, a small percentage
      of patients can suffer something known as pacemaker syndrome. This is when electrical activity in the heart is not regulated
      properly, meaning the organ does not beat as it should. As a result, people may experience dizziness, fatigue and light-headedness.
      Some even faint. Anyone who experiences balance problems after a pacemaker is fitted should see a cardiologist to explore
      the possibility of this syndrome. There are tests that specialists can carry out in hospital to work out whether the
      device is to blame. If it is, then a different type of pacemaker can be used instead. A GP can make a referral to see
      a cardiologist. I was concerned to read about a Government scheme that will allow women to refer themselves for a breast
      cancer check without seeing a GP first. In Somerset, they will be able to call the non-emergency phone line 111 – or
      use the NHS app – to report a breast lump, and then will be directed to a specialist clinic for a cancer check. If successful,
      the scheme will be rolled out across the country. I don’t support this. Delays in cancer diagnoses do cost lives, and
      we need to speed up this process, but the vast majority of new lumps are not cancerous. Testing every lump could lead
      to unnecessary invasive investigations and will certainly clog up NHS resources. Do you agree? Do you believe your breast
      cancer could have been diagnosed sooner if you had been able to self-refer? Please let me know using the email address
      below. I was taken aback last week when the end-of-life charity Marie Curie released a list of the most popular songs
      that people want to listen to in their final moments. Frank Sinatra’s My Way, The Beatles’ Hey Jude, and Over The Rainbow
      by Judy Garland were among the top answers. I’m sure these are all great songs, but the idea of playing music at the
      end of life is a strange concept to me. Sadly, in the past year, I’ve experienced the deaths of four family members.
      Not one of them requested that music was to be played at the end. However, that’s not to say that it doesn’t bring peace
      and happiness to others. Do you have a song that you would like played on your death bed? Has a family member requested
      one? Please write in and let me know. Do you have a question for Dr Ellie Cannon? Email DrEllie@mailonsunday.co.uk Dr
      Cannon cannot enter into personal correspondence and her replies should be taken in a general context.'
