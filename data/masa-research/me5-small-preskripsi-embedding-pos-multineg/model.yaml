  - source_sentence: Dukung Program Presiden RI, Polresta Bandung Tindak Tegas Pelaku Tambang Ilegal. 60MENIT.COM, Bandung
      - Dalam rangka mendukung 17 Program Prioritas Presiden Prabowo Subianto - Gibran, khususnya nomor 11 terkait kelestarian
      lingkungan hidup. Unit Tipidter Sat Reskrim Polresta Bandung berhasil mengungkap dugaan tindak pidana penambangan tanpa
      izin atau ilegal di kawasan Gunung Sungapan, Jalan Raya Soreang-Ciwidey, Kecamatan Soreang, Kabupaten Bandung. Pengungkapan
      ini berhasil diungkap berdasarkan hasil penyelidikan. Dimana aktivitas penambangan ilegal tersebut telah berlangsung
      selama kurang lebih tiga bulan, terhitung sejak Agustus 2024. Kapolresta Bandung, Kombes Pol Kusworo Wibowo mengatakan
      terungkapnya tambang ilegal ini, pihaknya mengamankan satu pelaku berinisial EMK (52) yang berperan sebagai pengelola.
      "Menurut laporan, kegiatan tambang ilegal ini telah berlangsung selama tiga bulan terakhir. Dalam kurun waktu tersebut,
      para pelaku diketahui menjual hasil tambang berupa tanah berbatu ke beberapa tempat, termasuk perumahan dan real estate
      di wilayah Bandung," kata Kusworo saat menggerlar konferensi pers di lokasi penambangan ilegal. Selasa, 5 November 2024.
      "Dari aktivitas ini, pencatatan penjualan material tambang dijual dengan harga Rp300ribu per tronton (24 kubik) dan
      Rp100ribu per dump truck (7 kubik). Konsumen yang membutuhkan material tambang dapat datang langsung ke lokasi atau
      memesannya terlebih dahulu," ujarnya. Namun, ia menegaskan bahwa selain keuntungan finansial, ada risiko besar yang
      dihadapi masyarakat. Kegiatan tambang ilegal di area tersebut berpotensi menyebabkan bencana longsor di perbukitan sekitar.
      "Longsor ini dapat membahayakan para pengguna Jalan Raya Soreang-Ciwidey, yang berada di jalur berdekatan dengan lokasi
      tambang," tuturnya. "Jika longsor terjadi, terutama saat arus lalu lintas sedang padat, kendaraan yang melintas bisa
      tersapu ke jurang di sisi kanan jalan, mengancam keselamatan para pengendara," jelasnya. Kusworo mengungkapkan untuk
      mencegah risiko tersebut, pihaknya langsung mengambil tindakan tegas, yakni menyita sejumlah barang bukti yang berada
      di lokasi. "Kami mengimbau masyarakat untuk lebih waspada terhadap kegiatan serupa dan turut melaporkan apabila menemukan
      aktivitas yang membahayakan lingkungan hidup di wilayah mereka," ujarnya. Guna mempertanggungjawabkan perbuatannya,
      pelaku dijerat Pasal 158 Jo. Pasal 35 UU RI No. 3 Tahun 2020 tentang perubahan atas UU RI No. 4 Tahun 2009 tentang Pertambangan
      Mineral dan Batubara sebagaimana telah diubah dengan UU RI No. 6 Tahun 2023 tentang penetapan peratutan pemerintah pengganti
      UU RI No. 2 Tahun 2022 tentang Cipta Kerja Menjadi Undang-undang dengan ancaman maksimal 5 tahun penjara dan denda Rp.
      100 miliar. (Taupik)
