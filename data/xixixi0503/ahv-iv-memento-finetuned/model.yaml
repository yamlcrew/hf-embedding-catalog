      \ sind die Kosten für die ambulante Arzt- oder Spitalbehandlung direkt dem \nLeistungserbringer zu bezahlen. Der Antrag\
      \ auf Kostenrückerstattung ist bei der Gemein -\nsamen Einrichtung KVG ( www.kvg.org ) oder beim zuständigen Krankenversicherer\
