  - "4.11 Prestations de l’AI\nCouverture d’assurance\npendant des mesures de \nEtat au 1er janvier 2024réadaptation de l’AI\f\
    2En bref\nSuivant le principe « la réadaptation prime la rente », l’assurance-invalidité \n(AI) octroie aux personnes\
    \ assurées atteintes dans leur santé des mesures \nde réadaptation afin d’améliorer leur capacité de gain.\nVous trouverez\
    \ de plus amples informations à ce sujet dans les mémentos \n4.01 – Prestations de l’assurance-invalidité (AI)  et 4.09\
    \ – Mesures de réa -\ndaptation d’ordre professionnel de l’AI  . \nLe présent mémento vous informe sur la couverture d’assurance\
    \ en cas de \nmaladie, d’accident ou de maternité pendant les mesures de réadaptation. \nIl contient également des renseignements\
    \ sur les obligations de cotiser et \nla couverture d’assurance dans le deuxième pilier.\f3Couverture d’assurance en cas\
    \ de maladie\n1 Qui paie les frais médicaux si je tombe malade  \npendant une mesure de réadaptation ?\nToute personne\
    \ domiciliée en Suisse est couverte par l’assurance-maladie \nobligatoire. Autrement dit, les frais médicaux sont en principe\
    \ pris en charge \npar l’assurance obligatoire des soins (Loi fédérale sur l’assurance-maladie, \nLAMaL).\nLorsque les\
    \ mesures de réadaptation se déroulent à l’étranger, la couver -\nture d’assurance peut s’avérer lacunaire puisque l’assurance\
    \ obligatoire des \nsoins y fournit seulement des prestations limitées. Vous pouvez combler \nces lacunes en concluant\
    \ une assurance complémentaire à titre privé. \nPour tout renseignement sur les assurances complémentaires privées, \n\
    adressez-vous aux assureurs-maladie et autres compagnies d’assurance \nprivées qui proposent ce type de contrats.\n2 Puis-je\
    \ bénéficier d’une indemnité journalière de l’AI \nlorsque je suis malade ?\nSi vous devez interrompre une mesure pour\
    \ cause de maladie, l’AI peut \ncontinuer à vous verser l’indemnité journalière pour une durée limitée,  \ndéterminée\
    \ par la durée même de la mesure de réadaptation : \n• pendant la première année de réadaptation : pendant 30 jours au\
    \ plus ;\n• à partir de la deuxième année de réadaptation : pendant 60 jours au \nplus ;\n• à partir de la troisième année\
    \ de réadaptation : pendant 90 jours au \nplus.\nL’AI continue à vous verser l’indemnité journalière uniquement si vous\
    \ \nn’avez pas droit à des prestations d’autres assurances (par ex. assurance \nfacultative d’indemnités journalières)\
    \ d’un montant au moins égal.\nEn complément des prestations AI, vous avez la possibilité de conclure une \nassurance\
    \ facultative d’indemnités journalières à titre individuel. \nPour tout renseignement, adressez-vous à l’assurance d’indemnités\
    \ journa -\nlières de votre précédent employeur, aux assureurs-maladie ou aux compa -\ngnies d’assurance privée.\f4Couverture\
    \ d’assurance en cas d’accident\n3 Est-ce que je bénéficie d’une assurance-accidents  \npendant les mesures de réadaptation\
    \ ou d’instruction ?\nIl convient de vérifier si vous bénéficiez d’une assurance en cas d’accident \nau moment de l’octroi\
    \ de la mesure de réadaptation d’ordre professionnel \nou lors des mesures d’instruction. \nLa vérification se fait point\
    \ par point :\n•  Les bénéficiaires de mesures AI qui disposent d’un contrat de travail, \nd’apprentissage ou de formation\
    \ sous forme écrite sont couverts par \nl’assurance-accidents obligatoire (loi fédérale sur l’assurance-accidents, \n\
    LAA) du prestataire.\n•  Les bénéficiaires de mesures AI dont la situation est analogue à celle \nqui résulterait d’un\
    \ contrat de travail sont couverts par l’assurance-ac -\ncidents des personnes bénéficiant de mesures AI (AA AI) auprès\
    \ de la \nSUVA.\n•  Les personnes qui exercent une activité au sens de la LAA dans un ate -\nlier pour invalides ou de\
    \ réadaptation et qui bénéficient de prestations \nde l’AI sous la forme d’indemnités journalières ou d’une rente sont\
    \ \nassurées contre les accidents par l’intermédiaire de cet atelier auprès \nde la SUVA.\nVous trouverez de plus amples\
    \ informations à ce sujet sur le site Internet de \nla SUVA : www.suva.ch/aaai\nL’office AI responsable vous renseignera\
    \ personnellement sur votre cou -\nverture d’assurance-accidents. Les prestataires de mesures reçoivent une \ncopie de\
    \ ces informations.\nVous n’êtes pas assuré contre les accidents si vous suivez une mesure de l’AI\n• sans contrat de\
    \ travail, d’apprentissage ou de formation,\n• qui ne constitue pas une situation analogue à celle qui résulterait d’un\
    \ \ncontrat de travail et\n• qui n’est pas effectuée dans un atelier pour invalides ou de réadapta -\ntion.\n4 Combien\
    \ de temps dure la couverture LAA ?\nLa couverture AA (voir chiffre 3) commence le jour où le rapport de travail \nou\
    \ la mesure AI prend effet, mais en tout cas au moment où la personne \nassurée se rend sur le lieu d’exécution de la\
    \ mesure. \f5Elle expire au terme du 31e jour qui suit celui où a pris fin le droit au  \ndemi-salaire au moins ou celui\
    \ où se termine la mesure. \nVous avez la possibilité, avant l’échéance de la couverture, de prolonger \nl’assurance à\
    \ vos frais par convention spéciale pour une durée maximale \nde six mois. \nAu-delà, vous devez à nouveau inclure le\
    \ risque d’accidents dans votre \nassurance-maladie. Vous pouvez entreprendre cette démarche à tout  \nmoment. \nCette\
    \ règle s’applique aussi aux personnes frontalières qui sont assu -\nrées en Suisse contre le risque maladie. Celles ayant\
    \ conclu un contrat  \nd’assurance-maladie dans leur pays de domicile doivent demander à leur \nassureur quelle est leur\
    \ couverture en cas d’accident. \n5 Que dois-je faire si je ne bénéficie pas  \nd’une assurance-accidents ?\nVous devez\
    \ inclure une couverture accidents dans votre assurance-maladie.\nSi vous devez interrompre une mesure pour cause d’accident,\
    \ l’AI peut \ncontinuer à vous verser l’indemnité journalière pour une durée limitée, \ncomme en cas de maladie (voir\
    \ chiffre 2), si vous n’êtes pas assurés obliga -\ntoirement au sens de la LAA. \n6 Ai-je droit à des prestations en cas\
    \ d’urgence pendant \nune prestation de réadaptation se déroulant  \nà l’étranger ?\nLorsque les mesures de réadaptation\
    \ se déroulent à l’étranger, vous avez \ndroit à des prestations médicales en cas d’urgence. \nPour obtenir des informations\
    \ à ce sujet, adressez-vous à l’assureur-acci -\ndents de votre ancien employeur ou aux assureurs-maladie.\nDans le cadre\
    \ de l’entraide administrative en matière de prestations, les \nressortissants suisses ou de l’UE et de l’AELE assurés\
    \ en Suisse ont droit \naux soins médicalement nécessaires, compte tenu de la durée du séjour et \nde la nature des prestations,\
    \ lorsqu’ils séjournent dans un État membre de \nl’UE* ou de l’AELE. Pour obtenir cette prestation, ils sont tenus de\
    \ présenter \naux prestataires de soins leur carte européenne d’assurance-maladie ou le \ncertificat de remplacement (à\
    \ demander aux caisses-maladie suisses). Le \ndécompte des coûts a lieu entre les assurances à l’étranger et en Suisse\
    \ ; il \nse peut que les personnes assurées doivent régler directement ces coûts, \nqui leur seront remboursés par la\
    \ suite.\f6* L’expression « États membres de l’UE » désigne les États, Royaume-Uni inclus, \nauxquels s’applique l’accord\
    \ du 21 juin 1999 entre la Confédération suisse et \nl’Union européenne et ses États membres sur la libre circulation\
    \ des personnes  \n(Accord sur la libre circulation des personnes).\nCouverture d’assurance en cas de maternité\n7 Ai-je\
    \ droit à une indemnité journalière de l’AI en cas de \nmaternité ?\nSi vous devez interrompre une mesure de réadaptation\
    \ pour cause de  \nmaternité et que vous n’avez pas droit à une allocation de maternité ou à \ndes prestations d’autres\
    \ assurances (par ex. assurance facultative d’indem -\nnités journalières) d’un montant au moins égal, l’AI peut continuer\
    \ à vous \nverser l’indemnité journalière pour une durée limitée, comme en cas de \nmaladie (voir chiffre 2). \nL’AI ne\
    \ verse pas d’indemnités journalières en cas d’interruption pour cause \nde paternité.\nPour éviter tout défaut de couverture,\
    \ vous avez la possibilité de conclure \nune assurance privée.\nCotisations AVS/AI/APG aux indemnités journalières \n\
    de l’AI\n8 Des cotisations sont-elles déduites de mon indemnité \njournalière ?\nOui. Des cotisations de l’AVS, de l’AI\
    \ et du régime des APG sont prélevées \nsur les indemnités journalières de l’AI. La cotisation à l’assurance-chômage \n\
    (AC) est également déduite chez les personnes salariées. \nVous trouverez de plus amples informations à ce sujet dans\
    \ le mémento \n4.02 – Indemnités journalières de l’AI .\n9 Dois-je payer des cotisations si je ne perçois ni indemnité\
    \ \njournalière ni salaire pendant la mesure de réadaptation ? \nSi vous avez 20 ans ou plus et que vous ne touchez ni\
    \ salaire d’un em -\nployeur, ni indemnités journalières de l’AI pendant que vous participez à \nune mesure de réadaptation,\
    \ vous devez vous déclarer à votre caisse de \ncompensation comme n’exerçant pas d’activité lucrative pour éviter toute\
    \ \nlacune de cotisation.\f7Pour tout renseignement à ce sujet, adressez-vous aux caisses de compen -\nsation ou aux agences\
    \ AVS.\nCouverture d’assurance du 2e pilier (LPP)\n10 Une cotisation en faveur du 2e pilier est-elle déduite  \ndes indemnités\
    \ journalières de l’AI ?\nNon. Aucune cotisation en faveur du 2e pilier n’est prélevée sur les indem -\nnités journalières\
    \ de l’AI, car les mesures de réadaptation d’ordre profes -\nsionnel n’instaurent pas de rapport de travail. À défaut\
    \ d’affiliation à une \ninstitution de prévoyance pendant les mesures de réadaptation, vous ne \nbénéficiez pas non plus\
    \ d’une couverture d’assurance de la prévoyance \nprofessionnelle (2e pilier). La participation à de telles mesures ne\
    \ suffit pas \nen soi pour vous permettre de bénéficier de cette couverture.\n11 Est-ce que je bénéficie d’une assurance\
    \ pendant  \nles mesures de réadaptation ?\nLorsque votre rapport de travail prend fin, votre affiliation à l’institution\
    \ de \nprévoyance devient également caduque. Cependant, l’assurance contre les \nrisques d’invalidité et de décès du 2e\
    \ pilier reste encore valable un mois. Si \nvous bénéficiiez déjà d’une affiliation à une institution de prévoyance avant\
    \ \nle début des mesures de réadaptation, vous avez la possibilité de maintenir \nvotre couverture d’assurance au-delà\
    \ du délai d’un mois. À cette fin, vous \npouvez : \n• soit rester auprès de l’institution en question (si le règlement\
    \ le prévoit),\n• soit vous assurer auprès de l’institution supplétive LPP.\nSi la couverture d’assurance ne peut être\
    \ maintenue, l’avoir de prévoyance \ndoit en principe être transféré sur une police de libre passage auprès d’un \nassureur\
    \ ou sur un compte de libre passage auprès d’une banque. \nPour tout renseignement à ce sujet, adressez-vous à l’institution\
    \ de pré -\nvoyance actuelle, à l’institution supplétive LPP, aux compagnies d’assurance \nou aux banques.\f8Renseignements\
    \ et autres  \ninformations\nCe mémento ne fournit qu’un aperçu général. Pour le règlement des \ncas individuels, seules\
    \ les dispositions légales font foi. Les offices AI, \nles caisses de compensation et leurs agences fournissent volontiers\
    \ \nles renseignements souhaités. Vous trouverez la liste complète de vos \ninterlocuteurs sur le site www.avs-ai.ch .\n\
    Publié par le Centre d’information AVS/AI en collaboration avec  \nl’Office fédéral des assurances sociales.\nEdition\
    \ novembre 2023. Toute reproduction, même partielle, n’est  \nautorisée qu’avec l’accord écrit du Centre d’information\
    \ AVS/AI. \nCe mémento peut être obtenu auprès des caisses de compensation et \nde leurs agences ainsi qu’auprès des offices\
    \ AI. Numéro de commande \n4.11/f. Il est également disponible sous www.avs-ai.ch .\n Plus d’informations, de publications\
    \ et de vidéos explicatives.\n4.11-24/01-FPrestations complémentaires pendant des mesures \nde réadaptation\n12 Ai-je\
    \ droit à des prestations complémentaires si  \nje touche une indemnité journalière de l’AI ?\nSi vous avez reçu une indemnité\
    \ journalière de l’AI pendant au moins six \nmois sans interruption et que vous remplissez les conditions d’octroi, vous\
    \ \npouvez demander des prestations complémentaires à la caisse cantonale \nde compensation compétente. \nVous trouverez\
    \ de plus amples informations à ce sujet dans les mémentos \n5.01 – Prestations complémentaires  à l’AVS et à l’AI et\
    \ 5.02 – Votre droit \naux prestations complémentaires à l’AVS et à l’AI ."
