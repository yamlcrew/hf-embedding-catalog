      \ un’attività senza conseguimento di un diploma professionale \nspecifico, il cui scopo è la preparazione sistematica\
      \ al futuro svolgi -\nmento di un’attività lucrativa. \nChi esercita un’attività lucrativa a titolo principale e frequenta\
      \ una scuola o \ncorsi solo accessoriamente non è considerato persona in formazione.\nNon sussiste alcun diritto ad\
      \ assegni di formazione per i figli il cui reddito \nannuo lordo da attività lucrativa è superiore a 30 240 franchi.\n\
      6 Cosa succede se più persone adempiono le condizioni \nper la riscossione degli assegni familiari?\nPer ciascun figlio\
      \ può essere versato un solo assegno. Se più persone \nadempiono le condizioni per la riscossione degli assegni familiari,\
      \ il diritto \nè disciplinato secondo l’ordine seguente, determinante non solo per i geni -\ntori, ma anche per altri\
      \ aventi diritto:\n1. la persona che esercita un’attività lucrativa;\n2. la persona che ha l’autorità parentale o che\
      \ l’aveva fino alla maggiore \netà del figlio;\n3. in caso di autorità parentale in comune o se nessuno degli aventi\
      \ diritto \nha l’autorità parentale, è considerata avente diritto in primo luogo la \npersona presso la quale il figlio\
      \ vive prevalentemente o è prevalen -\ntemente vissuto fino alla maggiore età; in caso di separazione o di \ndivorzio,\
      \ il diritto agli assegni familiari spetta dunque in primo luogo al \ngenitore che si occupa del figlio;\n4. se entrambi\
      \ gli aventi diritto vivono con il figlio, la precedenza è data a \nchi lavora nel Cantone di domicilio del figlio;\f\
      65. se entrambi gli aventi diritto o nessuno dei due lavorano nel Cantone di  \ndomicilio del figlio, gli assegni familiari\
      \ sono versati alla persona con \nil reddito da attività lucrativa dipendente soggetto all’AVS più elevato. \nSe ambedue\
      \ esercitano un’attività indipendente, il diritto agli assegni \nfamiliari spetta a chi percepisce il reddito più elevato.\n\
      Al secondo avente diritto spetta l’importo differenziale, se nel suo Cantone \nla legge prevede assegni familiari superiori\
      \ a quelli versati al primo avente \ndiritto. Le persone prive di attività lucrativa non hanno diritto al versamento\
      \ \ndell’importo differenziale.\n7 Esempio 1\nI genitori sono sposati ed entrambi salariati. La madre lavora nel Cantone\
      \ in \ncui risiede la famiglia, il padre in un altro Cantone. Entrambi hanno diritto \nagli assegni. La graduatoria\
      \ degli aventi diritto è la seguente: 1° la madre, \n2° il padre. La madre percepisce gli assegni, il padre l’eventuale\
      \ importo \ndifferenziale.\n8 Esempio 2\nLa madre e il padre sono divorziati e detengono in comune l’autorità pa -\n\
      rentale sul figlio. Entrambi i genitori si sono risposati. Il figlio vive con la ma -\ndre e il patrigno. Entrambi i\
      \ genitori, il patrigno e la matrigna esercitano un’  \nattività lucrativa come salariati. Hanno diritto agli assegni\
      \ familiari la madre, \nil padre e il patrigno. La matrigna non ha diritto agli assegni familiari poiché \nnon vive\
      \ con il figlio. La graduatoria degli aventi diritto è la seguente: 1° la \nmadre, 2° il padre, 3° il patrigno. La madre\
      \ percepisce gli assegni, il padre \nl’eventuale importo differenziale.\n9 Esempio 3\nI genitori sono divorziati. La\
      \ madre ha l’autorità parentale esclusiva sul figlio \ne si è risposata. Il padre non si è risposato. Il figlio vive\
      \ con la madre e il pa -\ntrigno. La madre non esercita alcuna attività lucrativa. Il padre e il patrigno \nesercitano\
      \ un’attività lucrativa come salariati. Per principio hanno diritto \nagli assegni familiari il padre e il patrigno.\
      \ La graduatoria degli aventi diritto \nè la seguente: 1° il patrigno, 2° il padre. Il patrigno percepisce gli assegni,\
      \ il \npadre l’eventuale importo differenziale. Se i genitori detengono in comune \nl’autorità parentale, il padre ha\
      \ la precedenza sul patrigno.\f710 Esempio 4\nI genitori sono sposati e vivono con il figlio nel Cantone X, dove entrambi\
      \ \nlavorano. La madre è salariata e guadagna 20 000 franchi l’anno; il padre, \nquale lavoratore indipendente, ha un\
      \ reddito annuo di 100 000 franchi. \nIn qualità di salariata, la madre è la prima avente diritto per gli assegni \n\
      familiari.\n11 Esempio 5 (calcolo dell’importo differenziale)\nA riceve un assegno per i figli di 215 franchi dalla\
      \ sua cassa di compensa -\nzione per assegni familiari nel Cantone X (importo minimo previsto dalla \nlegge).\nB ha\
      \ diritto all’importo differenziale. La sua cassa di compensazione per \nassegni familiari nel Cantone Y versa 245 franchi\
      \ per ciascun figlio, mentre \nl’importo minimo previsto dalla legge cantonale ammonta a 230 franchi.\nB riceve 15 franchi\
      \ (differenza tra i due importi minimi legali). Per il figlio \nsono versati complessivamente 230 franchi.\nVariante:\
      \ se B fosse il primo avente diritto, sarebbero versati in totale 245 \nfranchi.\n12 Quali obblighi sussistono in merito\
      \ al trasferimento e al \nversamento a terzi degli assegni familiari?\nGli assegni familiari, così come gli importi\
      \ differenziali, devono essere \ntrasferiti, in aggiunta ai contributi di mantenimento, alla persona che si  \noccupa\
      \ del figlio.\nSe non vengono utilizzati per provvedere ai bisogni del figlio, gli assegni \nfamiliari possono essere\
      \ versati direttamente al figlio maggiorenne o alla \npersona che ne ha l’affidamento (versamento a terzi).\n13 È possibile\
      \ percepire assegni familiari per i figli residenti \nall’estero?\nLa Svizzera è tenuta a versare assegni familiari\
      \ per i figli residenti all’estero \nsoltanto se ciò è previsto da una convenzione di sicurezza sociale:\n•  i cittadini\
      \ di Paesi membri dell’UE o dell’AELS hanno diritto ad assegni \nfamiliari non ridotti per i figli che risiedono in\
      \ Paesi membri dell’UE o  \ndell’AELS;\f8• la nuova convenzione con il Regno Unito, applicata dal  \n1° novembre 2021,\
      \ non copre le prestazioni familiari, che non pos -\nsono dunque per principio essere versate per i figli residenti\
      \ nel Re -\ngno Unito, a meno che non si tratti di una situazione rientrante del \ncampo d’applicazione dell’accordo\
      \ sui diritti dei cittadini. Mag -\ngiori informazioni sono disponibili sul sito Internet dell’Ufficio fe -\nderale\
      \ delle assicurazioni sociali (UFAS):  www.ufas.admin.ch >  \nAssicurazioni sociali > Assicurazioni sociali internazionali\
      \ > Uscita del  \nRegno Unito dall’UE (Brexit) .\nGli assegni di nascita e di adozione non sono esportati.\nSe i figli\
      \ lasciano la Svizzera per seguire una formazione, si presume che \nvi mantengano il domicilio al massimo per cinque\
      \ anni. Durante questo  \nperiodo essi continuano a dare diritto ad assegni familiari in Svizzera.\n14 Sussistono condizioni\
      \ particolari per i salariati?\nAnche le persone che lavorano a tempo parziale hanno diritto ad assegni \nfamiliari\
      \ interi, a condizione che percepiscano un salario di almeno 630 \nfranchi al mese o di 7 560 franchi all’anno. Al di\
      \ sotto di questo limite \nhanno diritto agli assegni familiari per persone prive di attività lucrativa,  \na patto\
      \ di adempiere le relative condizioni.\nSe la persona lavora per diversi datori di lavoro, i salari sono addizionati.\
      \ In \nquesti casi il datore di lavoro che versa il salario più elevato è competente \nper gli assegni familiari.\n\
      Il diritto agli assegni familiari nasce e si estingue con il diritto al salario. In \ncaso d’incapacità al lavoro in\
      \ seguito a malattia o infortunio, gli assegni \nfamiliari continuano a essere versati almeno nel mese in cui è insorta\
      \ l’in -\ncapacità al lavoro e nei tre mesi successivi. Gli assegni sono versati anche \ndurante i diversi congedi,\
      \ per esempio durante il congedo di maternità, ma \nal massimo per 16 settimane, e durante il congedo per l’altro genitore,\
      \ ma \nal massimo per due settimane.\n15 Quali regole valgono per le persone che lavorano sia \ncome indipendenti che\
      \ come dipendenti?\nSe una persona lavora sia come indipendente che come dipendente, gli \nassegni familiari sono versati\
      \ dal datore di lavoro, a condizione che il salario \nsuperi i 7 560 franchi all’anno e il rapporto di lavoro sia stato\
      \ concluso per \npiù di sei mesi o a tempo indeterminato.\n \f9Esempio:\nUn avvocato indipendente percepisce un reddito\
      \ accessorio di 10 000 fran -\nchi l’anno come membro di un consiglio d’amministrazione. In questo caso \ndeve richiedere\
      \ gli assegni familiari presso la cassa di compensazione per \nassegni familiari del suo datore di lavoro.\n16 Sussistono\
      \ condizioni particolari per le persone senza \nattività lucrativa?\nLe persone senza attività lucrativa hanno diritto\
      \ agli assegni familiari sol-\ntanto se il loro reddito imponibile secondo il diritto federale non supera \nl’importo\
      \ di 45 360 franchi l’anno e non percepiscono prestazioni comple -\nmentari all’AVS/AI. Queste condizioni di diritto\
      \ non si applicano alle madri \ndisoccupate beneficiarie di un’indennità di maternità. Sono escluse anche \nle persone\
      \ che percepiscono una rendita ordinaria di vecchiaia o il cui co -\nniuge percepisce una rendita ordinaria di vecchiaia.\
      \ I Cantoni possono pre -\nvedere disposizioni più favorevoli e includere altre categorie di beneficiari.\nIl Cantone\
      \ di Vaud ha fissato il limite di reddito a 60 480 franchi, i Cantoni \ndi Ginevra e del Giura nonché il Cantone Ticino\
      \ lo hanno addirittura abo -\nlito. Tutti gli altri Cantoni applicano il limite di reddito previsto dalla LAFam.\nAssoggettamento\n\
      17 In quali casi i datori di lavoro devono affiliarsi a una \ncassa di compensazione per assegni familiari?\nI datori\
      \ di lavoro devono affiliarsi a una cassa di compensazione per assegni \nfamiliari attiva in ogni Cantone in cui l’impresa\
      \ ha la sua sede o in cui sono \nsituate eventuali succursali ed essi impiegano lavoratori. Questo vale anche \nnel\
      \ caso in cui impieghino unicamente personale senza figli.\nLe succursali sottostanno all’ordinamento del Cantone in\
      \ cui sono situate \ne non a quello del Cantone in cui si trova la sede principale dell’impresa.  \nI Cantoni possono\
      \ però concordare tra loro una deroga a questo principio.\nIn ogni Cantone c’è una cassa di compensazione per assegni\
      \ familiari ge -\nstita dalla cassa di compensazione cantonale; tutte le altre casse di com -\npensazione possono istituire\
      \ in tutti i Cantoni casse di compensazione per \nassegni familiari per i datori di lavoro ad esse affiliati, ma non\
      \ ne hanno \nl’obbligo. Vi sono anche casse di compensazione per assegni familiari pro -\nfessionali e interprofessionali\
      \ riconosciute dai Cantoni.\f1018 Quali regole valgono per gli indipendenti e i salariati il \ncui datore di lavoro\
      \ non sottostà all’obbligo  \ncontributivo?\nI lavoratori indipendenti e i salariati il cui datore di lavoro non sottostà\
      \ \nall’obbligo contributivo sono soggetti all’ordinamento sugli assegni fami -\nliari del Cantone in cui sono registrati\
      \ per l’AVS. Questi lavoratori devono \naffiliarsi a una cassa di compensazione per assegni familiari anche se non \n\
      percepiscono alcun assegno familiare.\n19 A quale cassa devono rivolgersi le persone prive di  \nattività lucrativa?\n\
      Di regola, per le persone prive di attività lucrativa è competente la cassa \ncantonale di compensazione del Cantone\
      \ di domicilio.\nFinanziamento\n20 Chi finanzia gli assegni familiari?\nGli assegni familiari sono finanziati nel modo\
      \ seguente:\n•  i datori di lavoro versano alle casse di compensazione per assegni  \nfamiliari contributi sui salari\
      \ soggetti all’AVS da loro pagati. Le aliquote \ncontributive variano a seconda del Cantone e della cassa di compen\
      \ -\nsazione per assegni familiari. Nel Cantone del Vallese i salariati devono \npartecipare al finanziamento;\n•  i\
      \ lavoratori indipendenti finanziano gli assegni familiari versando alle \ncasse di compensazione per assegni familiari\
      \ contributi calcolati sulla \nparte del reddito AVS che non supera i 148 200 franchi. Le aliquote \ncontributive variano\
      \ a seconda del Cantone e della cassa di compensa -\nzione per assegni familiari;\n• i salariati il cui datore di lavoro\
      \ non sottostà all’obbligo contributivo \npagano personalmente i contributi sul loro reddito AVS. L’aliquota di \ncontribuzione\
      \ corrisponde per principio a quella applicata ai datori di \nlavoro;\n•  per le persone senza attività lucrativa, la\
      \ LAFam non prevede alcun \nobbligo contributivo. Sono soprattutto i Cantoni a finanziare gli as -\nsegni familiari\
      \ per le persone che non hanno un’attività lucrativa. A \ncerte condizioni, i Cantoni possono però introdurlo, come\
      \ hanno fatto \ni Cantoni AR, GL, SG, SO, TG e TI. \n \f11Procedura\n21 A chi ci si deve rivolgere per far valere il\
      \ diritto agli  \nassegni familiari?  \nChiunque richieda assegni familiari deve compilare l’apposito questionario:\n\
      •  i salariati presentano la richiesta di regola al datore di lavoro;\n•  i lavoratori indipendenti e i salariati il\
      \ cui datore di lavoro non sottostà \nall’obbligo contributivo presentano la richiesta alla cassa di compensa -\nzione\
      \ per assegni familiari cui sono affiliati;\n•  le persone prive di attività lucrativa si rivolgono di regola alla cassa\
      \ \ncantonale di compensazione del Cantone di domicilio.\nCon la richiesta vanno fornite tutte le indicazioni e le pezze\
      \ giustificative \nnecessarie.\n22 Come sono versati gli assegni familiari?\nGli assegni familiari sono versati nel\
      \ modo seguente:\n•  i salariati li ricevono di regola dal datore di lavoro con lo stipendio;\n•  i lavoratori indipendenti\
      \ e i salariati il cui datore di lavoro non sottostà \nall’obbligo contributivo li ricevono direttamente dalla cassa\
      \ di compen -\nsazione per assegni familiari;\n•  le persone prive di attività lucrativa li ricevono di regola direttamente\
      \ \ndalla cassa cantonale di compensazione del Cantone di domicilio.\n23 È possibile richiedere gli assegni familiari\
      \ con effetto \nretroattivo? Ne può essere richiesto il rimborso?  \nIl diritto al versamento degli assegni familiari\
      \ può essere fatto valere a  \nposteriori, ma al massimo per un periodo di cinque anni dal momento dell’  \nacquisizione\
      \ di tale diritto. Gli assegni familiari indebitamente riscossi \nvanno rimborsati.\n24 Occorre comunicare eventuali\
      \ cambiamenti?\nI cambiamenti della situazione personale, finanziaria e professionale che  \nincidono sul diritto alle\
      \ prestazioni e sulla loro entità devono essere comu -\nnicati spontaneamente al datore di lavoro o alla cassa di compensazione\
      \ \nper assegni familiari competente. Questo vale anche se la modifica com -\nporta un cambiamento del primo avente\
      \ diritto.\f12Chiarimenti e altre  \ninformazioni\nQuesto opuscolo informativo presenta solo una panoramica riassun\
      \ -\ntiva. Per la valutazione dei singoli casi fanno stato esclusivamente le \ndisposizioni legali in vigore. Per ulteriori\
      \ informazioni ci si può rivolgere \nalle casse di compensazione o alle loro agenzie. L’elenco delle casse di \ncompensazione\
      \ è pubblicato all’indirizzo Internet www.avs-ai.ch .\nPubblicato dal Centro d’informazione AVS/AI in collaborazione\
      \ con \nl’Ufficio federale delle assicurazioni sociali.\nEdizione dicembre 2024. La riproduzione, anche solo parziale,\
      \ è  \nautorizzata soltanto con il consenso scritto del Centro d’informazione \nAVS/AI.\nQuesto opuscolo informativo\
      \ può essere richiesto alle casse di compen -\nsazione, alle loro agenzie e agli uffici AI. Numero di ordinazione 6.08/i.\
      \  \nÈ disponibile anche su www.avs-ai.ch .\n6.08-25/01-IVanno comunicati in particolare:\n•  la nascita, il decesso\
      \ o la partenza all’estero di un figlio;\n•  l’inizio, l’interruzione o la conclusione della formazione di un figlio;\n\
      •  il matrimonio, la separazione o il divorzio dei genitori e i cambiamenti \nnell’autorità parentale;\n•  l’inizio\
      \ o la cessazione di un’attività lucrativa da parte del secondo  \ngenitore o il cambiamento del Cantone in cui lavora\
      \ il secondo genitore \no in cui vive il figlio;\n•  nel caso degli assegni familiari versati a persone prive di attività\
      \  \nlucrativa: i cambiamenti di reddito e la nascita di un diritto in seguito \nall’esercizio di un’attività lucrativa.\n\
      La riscossione indebita di prestazioni e la violazione dell’obbligo d’infor -\nmare sono punibili."
    - "4.06 Prestations de l’AI\nLa procédure dans l’AI\nEtat au 1er janvier 2024\f2En bref\nLes personnes qui sollicitent\
      \ l’intervention de l’AI dans le cadre de la \ndétection précoce peuvent adresser une communication à l’office AI du\
      \ \ncanton de domicile de la personne assurée. \nLa personne assurée doit faire valoir son droit à des prestations de\
      \ l’assu -\nrance-invalidité (AI) au moyen du formulaire officiel. Après réception de la \ndemande, l’office AI examine\
      \ si les conditions du droit à des prestations \nsont remplies. Il recueille pour cela tous les renseignements nécessaires\
      \ à \nl’instruction de la demande. L’instruction prend en considération toutes les \nprestations de l’AI. Ce n’est qu’après\
      \ avoir examiné toutes les circonstances \ndu cas que l’AI peut décider si la personne assurée obtiendra des presta\
      \ -\ntions. \nLe présent mémento informe les assurés, ainsi que les personnes habilitées \nà faire une communication\
      \ à l’AI, sur la procédure dans l’AI. \f3Communication\n1 Qui peut adresser une communication à l’AI ?\nSont habilitées\
      \ à faire une telle communication Ies personnes et les institu -\ntions suivantes :\n• vous, en tant que personne assurée,\
      \ ou votre représentant légal\n• les membres de la famille faisant ménage commun avec vous\n• vos employeurs\n• vos\
      \ médecins traitants et chiropraticiens\n• l’assureur d’indemnités journalières en cas de maladie\n• l’assureur-accidents\n\
      • les institutions de prévoyance professionnelle\n• l’assurance-chômage\n• les organes de l’aide sociale\n• l’assurance\
      \ militaire\n• l’assureur-maladie\n• les instances et les organes d’exécution cantonaux chargés du soutien \net de la\
      \ promotion de la réadaptation professionnelle des jeunes\nLa personne assurée doit toutefois en être informé au préalable.\n\
      2 Quand puis-je adresser une communication ?\nVous pouvez adresser une communication à l’AI si la personne assurée est\
      \ \nen incapacité de travail ou si elle est menacée d’incapacité de travail du -\nrable. Si la personne assurée est\
      \ âgée de 13 à 25 ans, une communication \npeut être adressée à l’AI dès lors qu’elle\n•  est menacée d’invalidité,\
      \ \n•  n’a pas encore exercé d’activité lucrative, et \n• suit une offre cantonale transitoire ou qu’elle est soutenue\
      \ dans sa \nréadaptation professionnelle par une instance cantonale de coordina -\ntion pour les jeunes.\nLa communication\
      \ dans le cadre de la détection précoce n’est pas une \ndemande de prestations AI.\nVous obtiendrez le formulaire à\
      \ utiliser auprès des offices AI ainsi que \ndes caisses de compensation et de leurs agences ; vous pouvez aussi le\
      \ \ntélécharger sur le site www.avs-ai.ch . \f43 Comment l’office AI examine-t-il la communication ?\nAprès avoir vérifié\
      \ qu’il est compétent, l’office AI examine le cas commu -\nniqué afin d’apprécier l’incapacité de travail ou la menace\
      \ d’invalidité de la \npersonne assurée ainsi que ses causes et conséquences.\nIl convoque ensuite la personne assurée\
      \ à un entretien afin d’analyser sa \nsituation médicale, professionnelle et sociale. Il décide enfin s’il est indiqué\
      \ \nqu’elle dépose une demande de prestations AI.\f5Demande de prestations AI \n4 Comment dois-je présenter ma demande\
      \ de prestations \nà l’AI ?\nPour obtenir des prestations de l’AI, vous devez présenter une demande \nauprès de l’office\
      \ AI de votre canton de domicile. \nSi vous résidez à l’étranger et que vous avez cotisé à l’assurance-invali -\ndité\
      \ suisse, l’office compétent est l’Office AI pour les assurés résidant à \nl’étranger , qui se trouve à Genève. \nVous-même,\
      \ votre représentant légal, ou encore les autorités ou les tiers \nqui vous assistent régulièrement ou prennent soin\
      \ de vous de manière per -\nmanente, pouvez faire valoir le droit à des prestations de l’AI. L’assurance \nsociale qui\
      \ a avancé des prestations est également habilitée à déposer une \ndemande.\nEn faisant valoir votre droit aux prestations,\
      \ vous autorisez les personnes et \nles instances mentionnées dans votre demande à fournir aux offices AI tous \nles\
      \ renseignements et les documents nécessaires.\nVous obtiendrez le formulaire de demande officiel auprès des offices\
      \ AI \nainsi que des caisses de compensation et de leurs agences ; vous pouvez \naussi le télécharger sur le site www.avs-ai.ch\
      \ .\n5 A quel moment dois-je déposer ma demande ?\nVous devez le faire le plus tôt possible, c’est-à-dire dès le moment\
      \ où une \natteinte à votre santé peut donner droit à des prestations de l’AI (mesures \nde réadaptation, rente, allocation\
      \ pour impotent, contribution d’assistance \nou moyens auxiliaires). Un dépôt trop tardif peut entraîner la réduction\
      \ de \ncertaines prestations.\nVous trouverez des informations complémentaires dans les mémentos  \nsuivants :\n• 4.01\
      \ - Prestations de l’assurance-invalidité (AI)  \n• 4.03 - Moyens auxiliaires de l’AI\n• 4.04 - Rentes d’invalidité\
      \ de l’AI \n• 4.09 - Mesures de réadaptation d’ordre professionnel de l’AI\n• 4.13 - Allocations pour impotent de l’AI\
      \  \n• 4.14 - Contribution d’assistance de l’AI\n \f6Instruction de la demande\n6 Comment l’office AI examine-t-il si\
      \ je remplis les  \nconditions du droit aux prestations ?\nAprès réception de votre demande, l’office AI examine si\
      \ vous remplissez \nles conditions du droit à des prestations de l’AI. Il se procure tous les ren -\nseignements nécessaires\
      \ pour connaître votre état de santé, votre situa -\ntion professionnelle ou vos travaux habituels. Une équipe interdisciplinaire\
      \  \nréunissant notamment des spécialistes de la réadaptation professionnelle, \ndu placement, des centres d’observation\
      \ et du traitement des dossiers, \nainsi que des médecins des services médicaux régionaux (SMR), est asso -\nciée à\
      \ cet examen et à la prise de décision. L’office AI collabore en outre \navec les autres assurances sociales et privées\
      \ concernées.\n7 Quelles sont les conditions médicales examinées par les \nmédecins du SMR ?\nLes médecins du SMR vérifient\
      \ si les conditions médicales du droit aux \nprestations sont remplies. Au besoin, un médecin du SMR vous examinera.\
      \ \nLe cas échéant, l’office AI peut demander des expertises et des documents \nmédicaux supplémentaires à des spécialistes.\n\
      Vous trouverez de plus amples informations à ce propos dans le mémento \n4.15 - Expertises médicales .\n8 Quels sont\
      \ les éléments examinés par les spécialistes de \nla réadaptation ?\nLes spécialistes de la réadaptation examinent les\
      \ mesures de réinsertion \net les mesures d’ordre professionnel envisageables. Ils vous convoqueront \nafin d’évaluer\
      \ votre situation professionnelle et personnelle ainsi que vos \ncapacités et de convenir des démarches à entreprendre.\
      \ Des stages d’ob -\nservation peuvent être organisés au besoin dans un centre d’observation \nprofessionnelle de l’AI\
      \ (COPAI) ou dans d’autres institutions afin d’examiner \nvos aptitudes professionnelles.\f79 Quand procède-t-on à une\
      \ enquête sur place ?\nUne enquête sur place peut être exigée afin de mieux apprécier votre si -\ntuation, notamment\
      \ si vous êtes indépendant/e ou si vous consacrez une \npartie de votre temps au ménage, ou pour examiner si vous avez\
      \ droit à \nune allocation pour impotent, à une contribution d’assistance et à certains \nmoyens auxiliaires.\n10 Sur\
      \ quelles prestations porte l’instruction ?\nLes examens effectués dans le cadre de l’instruction portent sur toutes\
      \ les \nprestations entrant en ligne de compte, même si vous ne les avez pas expli -\ncitement sollicitées. Si vous\
      \ demandez une rente, l’AI commence toujours \npar examiner la possibilité d’une réadaptation.\n11 Quand des mesures\
      \ d’intervention précoce  \npeuvent-elles être ordonnées ?\nDes mesures d’intervention précoce peuvent être ordonnées\
      \ en parallèle \nafin de maintenir votre emploi actuel ou de vous réintégrer à un autre po -\nste. Si la personne assurée\
      \ est âgée de 13 à 25 ans, qu’elle n’a pas encore \nexercé d’activité lucrative et qu’elle est menacée d’invalidité,\
      \ des mesures \nd’intervention précoce peuvent être ordonnées pour l’aider à accéder à \nune formation professionnelle\
      \ ou à intégrer le marché primaire du travail. \n12 Combien de temps faut-il à l’AI pour décider si des me -\nsures\
      \ de réadaptation sont indiquées ?\nL’office AI rend, dans les douze mois qui suivent le dépôt de la demande, \nune\
      \ décision indiquant s’il faut poursuivre la voie de la réadaptation, exami -\nner la question de la rente ou s’il n’y\
      \ a pas de droit à des prestations de l’AI.\n13 Quand établit-on un plan de réadaptation ?\nS’il est constaté que vous\
      \ êtes apte à suivre des mesures de réinsertion \nou des mesures d’ordre professionnel, un plan de réadaptation est\
      \ mis en \nplace. Il formule les objectifs à atteindre, décrit la coopération entre les \nparties prenantes, définit\
      \ les responsabilités et fixe des délais.\f8Obligation de collaborer et de réduire le dommage\n14 Qu’attend-on de moi\
      \ ?\nVous devez entreprendre tout ce qui peut raisonnablement être exigé de \nvous pour réduire la durée et l’étendue\
      \ de l’incapacité de travail et pour \nempêcher la survenance d’une invalidité. Une mesure n’est réputée non \nexigible\
      \ que si elle n’est pas adaptée à votre état de santé.\nVous devez communiquer à l’office AI tout changement significatif\
      \ de vo -\ntre situation professionnelle et familiale ou de votre état de santé, car de \ntels changements peuvent influer\
      \ sur le droit aux prestations.\n15 Les mesures ordonnées sont-elles impératives ?\nOui. Vous devez participer activement\
      \ à la mise en œuvre de toutes les  \nmesures raisonnablement exigibles (par ex. mesures d’intervention  \nprécoce,\
      \ mesures de réinsertion préparant à la réadaptation profession -\nnelle, mesures d’ordre professionnel ou traitements\
      \ médicaux) qui contri -\nbuent au maintien de votre emploi actuel, à votre réadaptation à la vie \nprofessionnelle\
      \ ou à l’exercice d’une activité comparable.\n16 Que se passe-t-il si je manque à ces obligations ?\nSi vous ne remplissez\
      \ pas ces obligations, les prestations peuvent être  \nréduites ou refusées.\f9Préavis\n17 Quand recevrai-je le préavis\
      \ de l’office AI ?\nDès que les mesures d’instruction nécessaires sont achevées, l’office AI \nvous envoie, ainsi qu’aux\
      \ assurances concernées, un préavis vous informant \nde la décision prévue. Vous-même et les institutions d’assurance\
      \ concer -\nnées avez un délai de 30 jours pour prendre position sur la décision prévue.\n18 Sous quelle forme puis-je\
      \ me prononcer sur le préavis ?\nVous pouvez faire part de votre position à l’office AI par écrit ou la prés -\nenter\
      \ lors d’un entretien personnel. Les entretiens personnels sont menés \ndans les bureaux de l’office AI et leur contenu\
      \ est consigné dans un procès-\nverbal que l’on vous demandera de signer. Les autres parties peuvent uni -\nquement\
      \ se prononcer par écrit.\n19 Puis-je consulter le dossier ?\nOui. Vous-même et les parties concernées avez le droit\
      \ de consulter le \ndossier. \f10Décision\n20 Quand l’office AI rend-il sa décision ?\nSi vous n’élevez pas d’objection\
      \ et si aucune des autres parties concernées \nn’a communiqué d’observations dans le délai imparti, l’office AI rend\
      \ sa \ndécision.\nSi vous-même ou une autre partie concernée formulez des observations \nsur des points déterminants,\
      \ l’office AI est tenu de les prendre en consi -\ndération dans la motivation de sa décision.\n21 De quelle manière\
      \ l’office AI informe-t-il des mesures \nd’intervention précoce ?\nLa décision relative aux mesures d’intervention précoce\
      \ est communiquée \nsans notification d’un préavis ou d’une décision.\f11Recours\n22 Quand puis-je faire recours ?\n\
      Vous-même et les parties concernées qui n’approuvent pas la décision pou -\nvez déposer un recours écrit auprès du tribunal\
      \ des assurances de votre \ncanton de domicile dans un délai de 30 jours. \nSi vous résidez à l’étranger, vous devez\
      \ déposer votre recours au Tribunal \nadministratif fédéral à Saint-Gall.\n23 Où puis-je recourir contre le jugement\
      \ de première  \ninstance ?\nVous et les parties concernées peuvent contester le jugement du tribunal \ncantonal des\
      \ assurances ou du Tribunal administratif fédéral par voie de  \nrecours auprès du Tribunal fédéral à Lucerne. Vous\
      \ avez un délai de  \n30 jours pour déposer votre recours écrit.\n24 La procédure de recours est-elle payante ?\nOui.\
      \ La procédure de recours en matière de prestations de l’AI est soumise \nà des frais de justice.\f12Renseignements\
      \ et autres  \ninformations\nCe mémento ne fournit qu’un aperçu général. Pour le règlement des \ncas individuels, seules\
      \ les dispositions légales font foi. Les offices AI, \nles caisses de compensation et leurs agences fournissent volontiers\
      \ \nles renseignements souhaités. Vous trouverez la liste complète de vos \ninterlocuteurs sur le site www.avs-ai.ch\
      \ .\nPublié par le Centre d’information AVS/AI en collaboration avec  \nl’Office fédéral des assurances sociales.\n\
      Edition décembre 2023. Toute reproduction, même partielle, n’est au -\ntorisée qu’avec l’accord écrit du Centre d’information\
      \ AVS/AI. \nCe mémento peut être obtenu auprès des caisses de compensation  et \nde leurs agences ainsi qu’auprès des\
      \ offices AI. Numéro de commande \n4.06/f. Il est également disponible sous www.avs-ai.ch .\n Plus d’informations, de\
      \ publications et de vidéos explicatives\n4.06-24/01-F"
  - source_sentence: Qual è la funzione del codice reddito nel Conto Individuale?{SEP}Come si possono correggere le registrazioni
      errate nel Conto Individuale?{SEP}Quali sono le conseguenze delle lacune contributive nel Conto Individuale?
    sentences:
    - "1.01 Généralités\nExtrait du\nCompte Individuel (CI)\nEtat au 1er janvier 2015\f2En bref\nLe Compte Individuel (CI)\
      \ est la base sur laquelle la rente est calculée. \nTous les revenus, les périodes de cotisations et les bonifications\
      \ pour tâches \nd’assistance qui servent de base au calcul d’une rente de vieillesse, de sur -\nvivants ou d’invalidité\
      \ y sont inscrits. Les années de cotisations manquantes \n(lacunes de cotisations) se traduisent généralement par une\
      \ réduction des \nprestations de l’assurance. \nLa caisse de compensation enregistre les revenus sur lesquels les cotisations\
      \ \nsont décomptées. Elle tient pour chaque assuré un Compte Individuel où \nsont inscrits les revenus déclarés tirés\
      \ d’une activité lucrative. Pour les sala -\nriés, elle relève le montant du salaire annuel sur la déclaration des salaires\
      \ \nremise par l’employeur. Pour les personnes sans activité lucrative et les \nindépendants, elle inscrit sur le CI\
      \ le revenu correspondant aux cotisations \nversées. Mais elle ne le fait que lorsque les cotisations ont été fixées\
      \ défi -\nnitivement.\nSi vos cotisations sont décomptées auprès de plusieurs caisses de compen -\nsation, chacune d’elles\
      \ tient un CI pour vous. \nL’InfoRegistre ( https://inforegister.zas.admin.ch ) vous permet de savoir \nquelles caisses\
      \ de compensation tiennent un Compte Individuel à votre \nnom. \nPour vérifier si votre durée de cotisation est complète\
      \ ou si votre employeur \na annoncé votre salaire duquel les cotisations sociales ont été déduites à \nla caisse de\
      \ compensation, vous pouvez demander gratuitement un extrait \nde Compte Individuel auprès d’une caisse de compensation\
      \ ou à l’adresse \nwww.avs-ai.ch . \nVous trouverez sous www.avs-ai.ch  le numéro des caisses de compensa -\ntion qui\
      \ tiennent le compte de vos cotisations AVS (CI) ; vous pouvez aussi \ndemander ces numéros à n’importe quelle caisse\
      \ de compensation. \nLa vidéo explicative vous montre comment demander, de manière simple \net rapide, un extrait de\
      \ votre compte individuel. www.ahv-iv.ch/r/ci\f3Demande d’extrait de compte\n1 Comment obtenir l’extrait de compte ?\
      \ \nSi vous souhaitez vérifier que votre durée de cotisations ne présente pas \nde lacune ou que votre employeur a effectivement\
      \ annoncé à la caisse \nde compensation les revenus sur lesquels vous avez cotisé, vous pouvez \nen tout temps demander\
      \ par écrit un extrait de compte à une caisse de \ncompensation ou sous www.avs-ai.ch . Il vous faut indiquer pour cela\
      \ votre \nnuméro AVS et votre adresse postale.\nVeuillez toutefois noter que le revenu de l’année en cours ne figurera\
      \ sur \nl’extrait de compte que l’année suivante. \n2 Qui peut demander l’extrait de compte ?\nL’extrait de compte n’est\
      \ remis qu’à vous-même, à votre représentant légal \nou à votre avocat. Si un tiers demande un extrait de votre CI,\
      \ c’est unique -\nment à vous qu’il sera remis, afin de respecter la protection des données. \n3 Où puis-je demander\
      \ l’extrait de compte ? \nVous pouvez\n• demander un extrait de compte auprès de chacune des caisses  de com-  \npensation\
      \ tenant un tel compte à votre égard, ou\n• charger n’importe quelle caisse de compensation de vous procurer tous  \n\
      les extraits de compte vous concernant.\nL’extrait de compte est gratuit. \n4 Quelles informations l’extrait de compte\
      \ contient-il ?\nLe premier extrait contient toutes les inscriptions, et les suivants men -\ntionnent au moins celles\
      \ faites depuis lors. Les noms des employeurs sont \ninscrits au moins pour les quatre années écoulées. \nVous trouverez\
      \ de plus amples informations à ce sujet dans le mémento \n1.04 - Explications concernant l’extrait du Compte Individuel\
      \ (CI) .\f4Renseignements et autres  \ninformationsContestation des inscriptions\n5 Puis-je, après avoir reçu l’extrait\
      \ de compte, exiger une \nrectification des inscriptions faites dans le CI ? \nOui. Vous pouvez, dans les 30 jours suivant\
      \ la remise de l’extrait de compte, \ndemander une rectification à la caisse de compensation qui tient le compte \n\
      concerné si vous contestez l’exactitude des inscriptions qui y sont enre -\ngistrées. La caisse de compensation se prononcera\
      \ sur votre demande de \nrectification par voie de décision. \n6 Puis-je, lors de la réalisation du risque assuré, exiger\
      \ \nune rectification des inscriptions faites dans le CI ?\nSi vous n’avez demandé auparavant ni extrait de compte ni\
      \ rectification, \nou qu’une demande en rectification a été rejetée, vous ne pourrez exiger \nalors la rectification\
      \ des inscriptions que si leur inexactitude est manifeste \nou formellement prouvée. \nCe mémento ne donne qu’un aperçu\
      \ des dispositions en vigueur. Pour \nle règlement des cas individuels, seules les dispositions légales font foi. \n\
      Les caisses de compensation et leurs agences fournissent volontiers \ntous les renseignements utiles. Vous trouverez\
      \ la liste complète des \ncaisses de compensation sur le site www.avs-ai.ch .\nPublié par le Centre d’information AVS/AI\
      \ en collaboration avec  \nl’Office fédéral des assurances sociales.\nRéimpression novembre 2024. Toute reproduction,\
      \ même partielle, \nn’est autorisée qu’avec l’accord écrit du Centre d’information AVS/AI. \nCe mémento peut être obtenu\
      \ auprès des caisses de compensation et \nde leurs agences ainsi qu’auprès des offices AI. Numéro de commande \n1.01/f.\
      \ Il est également disponible sous www.avs-ai.ch .\n1.01-15/01-F"
    - "4.06 Prestazioni dell’AI\nProcedura nell’AI\nStato al 1° gennaio 2024\f2In breve\nLe persone che chiedono l’intervento\
      \ dell’assicurazione per l’invalidità (AI) \nnell’ambito del rilevamento tempestivo possono inoltrare una comunica -\n\
      zione all’ufficio AI del Cantone di domicilio dell’assicurato. \nL’assicurato deve far valere il diritto a una prestazione\
      \ dell’AI mediante \nil modulo ufficiale. Dopo aver ricevuto la richiesta, l’ufficio AI verifica se  \nsiano adempiute\
      \ le condizioni per il diritto a prestazioni dell’AI. A tale \nscopo si procura tutte le informazioni necessarie per\
      \ i relativi accertamenti. \nTali accertamenti riguardano tutte le prestazioni dell’AI. Solo dopo l’esame \ndi tutte\
      \ le circostanze l’AI può decidere se l’assicurato abbia diritto alle sue \nprestazioni.  \nQuesto opuscolo informa\
      \ gli assicurati e le persone o istituzioni legittimate \na comunicare un caso in merito alla procedura nell’AI. \f\
      3Comunicazione\n1 Chi può comunicare un caso?\nSono autorizzate a comunicare un caso le seguenti persone e istituzioni:\n\
      • l’assicurato o il suo rappresentante legale\n• i familiari che vivono in comunione domestica con l’assicurato\n• il\
      \ datore di lavoro dell’assicurato\n• i medici e i chiropratici curanti dell’assicurato\n• l’assicuratore d’indennità\
      \ giornaliera in caso di malattia\n• l’assicuratore infortuni\n• le aziende della previdenza professionale\n• l’assicurazione\
      \ contro la disoccupazione\n• gli organi dell’aiuto sociale\n• l’assicurazione militare\n• l’assicuratore malattie\n\
      • le autorità e gli organi esecutivi cantonali, preposti al coordinamento \ndel sostegno all’integrazione professionale\
      \ dei giovani.\nL’assicurato deve però essere preventivamente informato della comunica -\nzione.\n2 In quali casi può\
      \ essere inoltrata una comunicazione?\nLa comunicazione può essere effettuata se l’assicurato presenta un’inca -\npacità\
      \ al lavoro o è minacciato da un’incapacità al lavoro di durata prolun -\ngata. Se l’assicurato è di età compresa tra\
      \ i 13 e i 25 anni, la comunicazione \npuò essere effettuata se egli:\n•  è minacciato da un’invalidità; \n•  non ha\
      \ ancora esercitato alcuna attività lucrativa e\n•  sta svolgendo una formazione transitoria cantonale o è sostenuto\
      \ \nnell’integrazione professionale da un organo di coordinamento canto -\nnale per i giovani. \nLa comunicazione non\
      \ è una richiesta di prestazioni AI.\nIl modulo per la procedura di comunicazione è disponibile presso gli uffici \n\
      AI, le casse di compensazione e le loro agenzie nonché all’indirizzo Internet \nwww.avs-ai.ch . \f43 Come viene esaminato\
      \ il caso comunicato?\nDopo aver appurato la propria competenza, l’ufficio AI esamina il caso \ncomunicatogli, valutando\
      \ l’incapacità al lavoro o la minaccia d’invalidità \ndell’assicurato e le relative cause e conseguenze.\nSuccessivamente\
      \ convoca l’assicurato per un colloquio al fine di analizzare \nla sua situazione medica e socio-professionale. In base\
      \ ai risultati di queste \nverifiche decide se sia opportuno che l’assicurato presenti una richiesta di \nprestazioni\
      \ AI.\f5Richiesta di prestazioni \n4 Come va inoltrata una richiesta di prestazioni AI?\nLe richieste di prestazioni\
      \ dell’AI vanno inoltrate all’ufficio AI del Cantone \ndi domicilio. \nPer gli assicurati residenti all’estero che hanno\
      \ versato contributi all’AI sviz -\nzera è competente l’ Ufficio AI per gli assicurati residenti all’estero  con sede\
      \ \na Ginevra. \nOltre all’assicurato possono far valere il diritto a prestazioni AI il suo rappre -\nsentante legale\
      \ e le autorità o i terzi che assistono regolarmente l’assicurato \no ne hanno durevole cura. È legittimata a presentare\
      \ una richiesta anche \nl’assicurazione sociale che ha versato prestazioni anticipate.\nFacendo valere il diritto alle\
      \ prestazioni, l’assicurato autorizza le persone \ne gli organi ivi menzionati a fornire agli uffici AI tutte le informazioni\
      \ e i \ndocumenti necessari.\nIl modulo per la richiesta di prestazioni è disponibile presso gli uffici AI, \nle casse\
      \ di compensazione e le loro agenzie nonché all’indirizzo Internet  \nwww.avs-ai.ch .\n5 Quando va inoltrata una richiesta\
      \ di prestazioni?\nLa richiesta deve essere inoltrata il prima possibile, cioè non appena il \ndanno alla salute può\
      \ dare diritto a prestazioni dell’AI (provvedimenti d’in -\ntegrazione, rendita, assegno per grandi invalidi, contributo\
      \ per l’assistenza, \nmezzi ausiliari). In caso contrario, alcune prestazioni possono essere ridotte.\nInformazioni\
      \ più approfondite sono disponibili nei seguenti opuscoli infor -\nmativi:\n• 4.01 - Prestazioni dell’assicurazione\
      \ invalidità (AI)\n•  4.03 - Mezzi ausiliari dell’AI\n• 4.04 - Rendite d’invalidità dell’AI\n•  4.09 - Provvedimenti\
      \ d’integrazione professionale dell’AI\n• 4.13 - Assegni per grandi invalidi dell’AI\n• 4.14 - Contributo per l’assistenza\
      \ dell’AI\n \f6Esame della richiesta\n6 In che modo l’ufficio AI verifica se siano adempiute le \ncondizioni per il\
      \ diritto a prestazioni dell’AI?\nRicevuta la richiesta, l’ufficio AI verifica dapprima se siano adempiute \nle condizioni\
      \ che danno diritto a prestazioni. Si procura quindi tutte le  \ninformazioni necessarie sullo stato di salute, sull’attività\
      \ lavorativa e sulle \nmansioni abituali dell’assicurato. Un gruppo interdisciplinare (composto da \nspecialisti dell’integrazione\
      \ professionale, del collocamento, dei centri di \naccertamento, dal segretario ispettore e da medici dei servizi medici\
      \ re -\ngionali [SMR] ecc.) partecipa all’accertamento e alla procedura decisionale. \nL’ufficio AI collabora anche\
      \ con le altre assicurazioni sociali e private inte -\nressate.\n7 Quali accertamenti vengono effettuati dai medici\
      \ del \nSMR?\nI medici del SMR verificano se siano soddisfatte le condizioni mediche per \nla concessione di prestazioni\
      \ e, all’occorrenza, procedono ad un esame \ndell’assicurato. Se necessario, l’ufficio AI può richiedere un complemento\
      \ \ndi documentazione medica o, perizie di specialisti.\nMaggiori informazioni sono disponibili nell’opuscolo informativo\
      \ 4.15 -  \nPerizie mediche .\n8 Quali accertamenti vengono effettuati dagli specialisti \nin materia d’integrazione?\n\
      Gli specialisti in materia d’integrazione esaminano i possibili provvedimenti \nprofessionali e di reinserimento. A\
      \ tale scopo convocano l’assicurato per \nfare il punto della sua situazione professionale e personale così come delle\
      \ \nsue capacità e concordare i passi successivi. In caso di bisogno possono \nessere organizzati esami in un Centro\
      \ d’accertamento professionale dell’AI \n(CAP) o presso altre istituzioni per verificarne le capacità di rendimento.\n\
      \ \f79 In quali casi si procede a un accertamento sul posto?\nPer valutare meglio le condizioni dell’assicurato può\
      \ essere richiesto un ac -\ncertamento sul posto. Questo vale in particolare per gli indipendenti e gli \nassicurati\
      \ che si dedicano alla gestione dell’economia domestica nonché \nper esaminare il diritto a un assegno per grandi invalidi,\
      \ a un contributo per \nl’assistenza o a mezzi ausiliari.\n10 Quali prestazioni riguardano gli accertamenti?\nNell’ambito\
      \ degli accertamenti si devono prendere in considerazione tutte \nle prestazioni possibili, anche quelle che non sono\
      \ state esplicitamente  \nrichieste. Nei casi in cui è stata richiesta una rendita, l’ufficio AI deve sem -\npre verificare\
      \ se sia eventualmente possibile procedere all’integrazione \ndell’assicurato.\n11 Quando possono essere ordinati provvedimenti\
      \  \nd’intervento tempestivo?\nDei provvedimenti d’intervento tempestivo possono essere ordinati paral -\nlelamente\
      \ all’accertamento affinché l’assicurato possa mantenere il suo  \nposto di lavoro o essere reintegrato altrove. Se\
      \ l’assicurato è di età com -\npresa tra i 13 e i 25 anni non ha ancora esercitato un’attività lucrativa ed \nè minacciato\
      \ da invalidità, possono essere ordinati provvedimenti d’inter -\nvento tempestivo per aiutarlo nel percorso verso una\
      \ formazione professio -\nnale o una prima assunzione nel mercato del lavoro primario.\n12 Quanto tempo occorre all’AI\
      \ per decidere se sia  \nopportuno concedere provvedimenti d’integrazione?\nEntro 12 mesi dall’inoltro della richiesta\
      \ di prestazioni AI l’ufficio AI prende \nuna decisione, che stabilisce se avviare l’integrazione, se esaminare la pos\
      \ -\nsibilità di assegnare una rendita o se non sussista alcun diritto a prestazioni \ndell’AI.\n13 In quali casi viene\
      \ stabilito un piano d’integrazione?\nSe risulta che l’assicurato è in grado di sottoporsi a provvedimenti di \nreinserimento\
      \ e/o a provvedimenti professionali, viene stabilito un piano  \nd’integrazione in cui sono fissati gli obiettivi da\
      \ raggiungere, le regole per \nla collaborazione tra le parti, le responsabilità e le scadenze.\n \f8Obbligo di collaborare\
      \ e di ridurre il danno\n14 Cosa ci si aspetta dall’assicurato?\nL’assicurato deve fare quanto possibile e ragionevolmente\
      \ esigibile per  \nridurre la durata e l’entità dell’incapacità al lavoro e impedire l’insorgenza \ndell’invalidità.\
      \ Un provvedimento non è considerato ragionevolmente esigi -\nbile solo se non è adeguato alle condizioni di salute\
      \ dell’assicurato.\nQualsiasi cambiamento significativo della situazione professionale, fami -\nliare e di salute può\
      \ incidere sul diritto alle prestazioni e va dunque comu -\nnicato all’ufficio AI.\n15 I provvedimenti ordinati sono\
      \ obbligatori?\nSì. L’assicurato deve partecipare attivamente all’attuazione di tutti i provve -\ndimenti ragionevolmente\
      \ esigibili (provvedimenti d’intervento tempestivo e \nprovvedimenti d’integrazione per preparare all’integrazione professionale,\
      \ \nprovvedimenti professionali, cure mediche) al fine di mantenere il posto di \nlavoro, esercitare un’attività analoga\
      \ o poter essere reintegrato nel mondo \ndel lavoro.\n16 Cosa succede se l’assicurato non adempie ai suoi  \nobblighi?\n\
      Se l’assicurato non adempie ai suoi obblighi, le prestazioni possono essere \nrifiutate o ridotte.\n \f9Preavviso\n\
      17 Quando l’assicurato riceve un preavviso dall’ufficio AI?\nEseguiti gli accertamenti necessari, l’ufficio AI invia\
      \ all’assicurato e alle  \nassicurazioni interessate un preavviso sulla decisione che intende prendere. \nEssi avranno\
      \ 30 giorni di tempo per pronunciarsi sulla decisione prevista.\n18 In che modo l’assicurato può prendere posizione\
      \ in  \nmerito al preavviso?\nL’assicurato può prendere posizione in due modi: per iscritto o oralmente, \nin occasione\
      \ di un colloquio personale che si terrà presso l’ufficio AI. Del \ncolloquio sarà redatto un verbale che l’assicurato\
      \ dovrà firmare. Le altre \nparti possono invece esprimersi solo per iscritto.\n19 Sussiste il diritto alla consultazione\
      \ dell’incarto?\nSì. L’assicurato e le altre parti interessate hanno il diritto di consultare  \nl’incarto. \f10Decisione\n\
      20 Quando l’ufficio AI emana una decisione?\nSe l’assicurato non presenta obiezioni e le parti non prendono posizione\
      \ \nentro il termine stabilito, l’ufficio AI emana una decisione formale.\nSe l’assicurato o un’altra parte interessata\
      \ si sono espressi in merito a fatti \ndeterminanti, l’ufficio AI deve tenerne conto nella motivazione della deci -\n\
      sione.\n21 Come viene comunicato un provvedimento d’intervento \ntempestivo?\nLa decisione concernente l’attuazione\
      \ di un provvedimento d’intervento \ntempestivo è comunicata dall’ufficio AI senza la notifica di un preavviso o \n\
      di una decisione formale.\f11Ricorso\n22 Entro quali termini l’assicurato può inoltrare ricorso?\nSe non condividono\
      \ la decisione dell’ufficio AI, l’assicurato e le parti inte -\nressate possono inoltrare ricorso per iscritto entro\
      \ 30 giorni presso il tribu -\nnale delle assicurazioni del Cantone di domicilio dell’assicurato. \nPer gli assicurati\
      \ residenti all’estero il ricorso va depositato presso il Tribu -\nnale amministrativo federale a San Gallo.\n23 Presso\
      \ quale istanza si può fare ricorso contro la  \nsentenza di primo grado?\nContro la sentenza del tribunale cantonale\
      \ delle assicurazioni o del Tribu -\nnale amministrativo federale può essere interposto ricorso presso il Tribu -\n\
      nale federale a Lucerna. Il ricorso va inoltrato per iscritto entro 30 giorni.\n24 La procedura di ricorso comporta\
      \ delle spese?\nSì. La procedura di ricorso in materia di prestazioni AI è soggetta a spese.\f12Chiarimenti e altre\
      \  \ninformazioni\nQuesto opuscolo informativo presenta solo una panoramica riassuntiva. \nPer la valutazione dei singoli\
      \ casi fanno stato esclusivamente le dispo -\nsizioni legali in vigore. Per ulteriori informazioni ci si può rivolgere\
      \ agli \nuffici AI, alle casse di compensazione o alle loro agenzie. L’elenco di \ntutti gli interlocutori è pubblicato\
      \ all’indirizzo Internet www.avs-ai.ch .\nPubblicato dal Centro d’informazione AVS/AI in collaborazione con \nl’Ufficio\
      \ federale delle assicurazioni sociali.\nEdizione dicembre 2023. La riproduzione, anche solo parziale, è  \nautorizzata\
      \ soltanto con il consenso scritto del Centro d’informazione  \nAVS/AI. \nQuesto opuscolo informativo può essere richiesto\
      \ alle casse di compen -\nsazione, alle loro agenzie e agli uffici AI. Numero di ordinazione 4.06/i.  \nÈ disponibile\
      \ anche su www.avs-ai.ch .\n Ulteriori informazioni, pubblicazioni e video esplicativi.\n4.06-24/01-I"
    - "Stand am 1. Januar 2025  \nEtat au 1er janvier 2025  \nStato al 1° gennaio 2025  \nAs of 1st January 2025 11.01\nSeiten\
      \  \n2-12Informationen für Flüchtlinge \nund Staatenlose\nPages  \n13-23Informations pour réfugiés  \net apatrides\n\
      Pagine  \n24-34Informazioni per rifugiati  \ne apolidi\nPages  \n35-44Information for refugees  \nand stateless persons\f\
      2Informationen für Flüchtlinge und  \nStaatenlose\nAuf einen Blick\nFlüchtlinge und Staatenlose, die in der Schweiz\
      \ wohnen, können Ansprü -\nche im schweizerischen Sozialversicherungssystem erwerben. \nDas schweizerische Sozialversicherungssystem\
      \ basiert auf dem Drei-  \nSäulen-Prinzip: Die AHV und IV bilden in Verbindung mit den Ergänzungs -\nleistungen (EL)\
      \ die 1. Säule. Sie soll den Existenzbedarf in angemessener \nWeise decken und ist obligatorisch. Die berufliche Vorsorge\
      \ (Pensions -\nkasse) bildet die 2. Säule. Sie soll den Versicherten bzw. den Hinterlassenen \nim Vorsorgefall (Alter,\
      \ Tod, Invalidität) die gewohnte Lebenshaltung weiter \nermöglichen. Die 3. Säule (private Vorsorge) ergänzt die beiden\
      \ anderen \nund ist freiwillig. \nDie Bestimmungen zur schweizerischen Alters- und Hinterlassenenversiche -\nrung (AHV)\
      \ und Invalidenversicherung (IV) für Flüchtlinge und Staatenlose \nsind im Bundesbeschluss vom 4. Oktober 1962 über\
      \ die Rechtsstellung von \nFlüchtlingen und Staatenlosen in der AHV und IV geregelt. Das vorliegende \nMerkblatt gilt\
      \ nur für vom Staatssekretariat für Migration SEM ausdrücklich \nanerkannte Flüchtlinge und Staatenlose. Für Asylbewerber\
      \ sowie für aus -\nländische Staatsangehörige, die vorläufig in der Schweiz aufgenommen \nworden sind, gelten andere\
      \ Vorschriften; sie sind von diesem Merkblatt \nnicht betroffen.\nVersicherungspflicht\n1 Sind Flüchtlinge und Staatenlose\
      \ bei der AHV/IV  \nversichert?\nDie AHV und die IV sind allgemeine Pflichtversicherungen, die alle in der \nSchweiz\
      \ wohnhaften oder erwerbstätigen Personen umfassen. Diese Ver -\nsicherungspflicht gilt grundsätzlich auch für Flüchtlinge\
      \ und Staatenlose. \f3AHV-Nummer\n2 Wie erfahre ich meine AHV-Nummer?\nDie AHV-Nummer steht auf der Krankenversicherungskarte\
      \ sowie auf dem \npersönlichen Versicherungsausweis AHV/IV. Eine versicherte Person, welche \nweder eine Krankenversicherungskarte\
      \ noch einen Versicherungsausweis \nAHV/IV besitzt, wendet sich zwecks Erhalts eines Versicherungsauswei -\nses an ihre\
      \ Ausgleichkasse. Der Versicherungsausweis ist aufzubewahren. \nEntweder die Krankenversicherungskarte oder der Versicherungsausweis\
      \ \nAHV/IV ist bei jedem Stellenwechsel dem neuen Arbeitgeber vorzulegen. \nDies gilt auch bei der Anmeldung zum Leistungsbezug.\n\
      Wichtig: Bei Schriftverkehr mit den Ausgleichskassen müssen Sie die \nAHV-Nummer angeben.\nBeiträge\n3 Wann beginnt\
      \ die Beitragspflicht bei der AHV/IV?\nAlle bei der AHV und IV Versicherten müssen ab dem 1. Januar nach Voll -\nendung\
      \ des 20. Altersjahres bis zum Erreichen des Referenzalters Beiträge \nbezahlen. Für Erwerbstätige beginnt die Beitragspflicht\
      \ mit der Aufnahme \nder Erwerbstätigkeit, frühestens jedoch am 1. Januar nach Vollendung des \n17. Altersjahres.\n\
      4 Wie werden die AHV/IV/EO-Beiträge erhoben?\nDie AHV/IV/EO-Beiträge werden wie folgt erhoben:\n•  Arbeitnehmer:\n Die\
      \ Beiträge werden prozentual vom abrechnungspflichtigen Lohn \nerhoben. Hinzu kommen die Beiträge an die Arbeitslosenversiche\
      \ -\nrung. Diese Beiträge werden je zur Hälfte vom Arbeitnehmer und vom  \nArbeitgeber getragen. Die Beiträge werden\
      \ vom Arbeitgeber bei  \njeder Lohnzahlung abgezogen und zusammen mit seinem Beitrag an \ndie Ausgleichskasse überwiesen.\
      \ Dazu kommen allenfalls Beiträge für \nweitere Sozialversicherungszweige.\n•  Selbstständigerwerbende:\n Wer selbstständig\
      \ erwerbend ist, rechnet direkt mit der Ausgleichs -\nkasse ab. Grundlage der Beiträge bildet hier das Einkommen gemäss\
      \ \nVeranlagung zur direkten Bundessteuer. Ob jemand im Sinne der AHV \nselbstständig erwerbend ist, beurteilt die Ausgleichskasse.\
      \ Sie setzt \nden Beitrag gestützt auf das Erwerbseinkommen fest.\f4•  Nichterwerbstätige:\n Die Beiträge der Nichterwerbstätigen\
      \ richten sich nach dem Vermö -\ngen und Renteneinkommen. Sie werden von der Ausgleichskasse des \nWohnsitzkantons der\
      \ versicherten Person festgesetzt.\nLeistungen der AHV\n5 Welche Leistungen erbringt die AHV?\nDie AHV erbringt folgende\
      \ Leistungen:\n• Altersrenten für Frauen und Männer, die das Referenzalter erreicht ha -\nben. Für Männer liegt das\
      \ Referenzalter bei 65 Jahren und für Frauen \nerhöht sich das bisherige Referenzalter von 64 Jahren ab dem 1. Januar\
      \ \n2025 schrittweise um drei Monate pro Jahr. Ab 2028 gilt für Frauen \nund Männer ein einheitliches Referenzalter\
      \ von 65 Jahren (siehe Merk -\nblatt 3.01 – Altersrenten und Hilflosenentschädigungen der AHV ). Die \nAltersrente kann\
      \ vorbezogen oder aufgeschoben werden. Die vorbe -\nzogene Rente wird gekürzt. Zur aufgeschobenen Rente wird ein Erhö\
      \ -\nhungsbetrag ausgerichtet (siehe Merkblatt 3.04 – Flexibler Rentenbe -\nzug).\n•  Kinderrenten für Kinder von Altersrentnerinnen\
      \ und Altersrentnern. \nDer Anspruch dauert bis zum 18. Geburtstag des Kindes oder bis zum \nAbschluss der Lehre oder\
      \ des Studiums, längstens aber bis zum 25. \nGeburtstag.\n•  Witwen- und Witwerrenten.\n•  Waisenrenten für Waisen bis\
      \ zum 18. Geburtstag oder bis zum Ab -\nschluss der Lehre oder des Studiums, längstens aber bis zum 25. Ge -\nburtstag.\n\
      •  Hilflosenentschädigungen gemäss Ziffer 7.\n•  Hilfsmittel gemäss Ziffer 8.\f56 Wann besteht Anspruch auf Leistungen\
      \ der AHV?\nFlüchtlinge und Staatenlose sowie ihre Hinterlassenen (Witwen, Witwer, \nWaisen) haben grundsätzlich Anspruch\
      \ auf ordentliche (d.h. durch Bei -\ntragszahlungen begründete) Renten der AHV, sofern sie\n•  in der Schweiz wohnen\
      \ und\n•  während mindestens eines vollen Jahres Beiträge entrichtet haben, \noder\n•  in der Schweiz während eines\
      \ Jahres mit dem erwerbstätigen Ehegat -\nten gelebt haben, der mindestens den doppelten Mindestbeitrag be -\nzahlt\
      \ hat, oder\n•  ein Jahr Erziehungs- und Betreuungsgutschriften aufweisen. \nBei Hinterlassenenrenten muss die verstorbene\
      \ Person mindestens ein vol -\nles Jahr versichert gewesen sein. \nFlüchtlinge und Staatenlose, welche die Schweiz verlassen\
      \ haben und \nin einem der nachfolgend aufgeführten Staaten wohnen, mit denen die \nSchweiz ein Abkommen über die AHV\
      \ und IV abgeschlossen hat, haben \nden gleichen Anspruch auf schweizerische Leistungen wie die Angehöri -\ngen dieses\
      \ Staates:\nEU-Staaten Israel San Marino\nEFTA-Staaten Japan Serbien\nAlbanien Kanada/Quebec Tunesien\nAustralien Kosovo\
      \ Türkei\nBosnien und Herzegowina Montenegro Uruguay\nBrasilien Nordmazedonien USA\nChile Philippinen Vereinigtes Königreich\n\
      7 Wann besteht Anspruch auf eine  \nHilflosenentschädigung?\nAltersrentnerinnen und Altersrentner oder Bezügerinnen\
      \ und Bezüger von \nErgänzungsleistungen mit Wohnsitz und gewöhnlichem Aufenthalt in der \nSchweiz, haben Anspruch auf\
      \ eine Hilflosenentschädigung, wenn sie seit \nmindestens sechs Monaten in leichtem, mittelschwerem oder schwerem \n\
      Grade hilflos sind. Hilflos ist, wer für alltägliche Lebensverrichtungen (An -\nkleiden, Essen, Körperpflege usw.) dauernd\
      \ auf die Hilfe Dritter angewiesen \nist, einer dauernden Pflege oder einer persönlichen Überwachung bedarf. \nHilflosenentschädigungen\
      \ werden nicht ins Ausland bezahlt.\f68 Wann besteht Anspruch auf Hilfsmittel der AHV?\nIn der Schweiz wohnende Altersrentnerinnen\
      \ und Altersrentner erhal -\nten unter bestimmten Voraussetzungen Hilfsmittel der AHV (Hörgeräte,  \nLupenbrillen, Prothesen,\
      \ Rollstühle usw.). Weitere Informationen zu Hilfs -\nmitteln der AHV beinhaltet das Merkblatt 3.02 – Hilfsmittel der\
      \ AHV .\nLeistungen der IV\n9 Welche Leistungen erbringt die IV?\nDie IV gewährt in erster Linie Eingliederungsmassnahmen.\
      \ IV-Renten wer -\nden nur ausgerichtet, wenn Eingliederungsmassnahmen ihr Ziel nicht oder \nnur teilweise erreicht\
      \ haben oder von vornherein aussichtslos sind. Die IV \nerbringt folgende Leistungen:\n•  Frühinterventionsmassnahmen\
      \ mit dem Ziel, den bestehenden Arbeits -\nplatz von arbeitsunfähigen Personen zu erhalten, sie an einem anderen \n\
      Arbeitsplatz einzugliedern oder Jugendliche beim Eintritt in eine erst -\nmalige berufliche Ausbildung zu unterstützen.\n\
      • Eingliederungsmassnahmen mit dem Ziel, die gegenwärtige oder zu -\nkünftige Erwerbsfähigkeit zu verbessern (z. B.\
      \ Umschulung, Hilfsmittel).\n• Invalidenrenten, mit dem Ziel die langandauernden wirtschaftlichen \nFolgen der Invalidität\
      \ im Rahmen einer angemessenen Deckung des \nExistenzbedarfes auszugleichen. Sie können frühestens nach Vollen -\ndung\
      \ des 18. Altersjahres beansprucht werden. Der Invaliditätsgrad \nbestimmt die Höhe der Rente.\n•  Diese werden bei\
      \ Invalidität eines Elternteils ausgerichtet. Der Anspruch \ndauert bis zum 18. Geburtstag des Kindes oder bis zum Abschluss\
      \ der \nLehre oder des Studiums, höchstens aber bis zum 25. Geburtstag.\n•  Hilflosenentschädigungen und Assistenzbeiträge\
      \ gemäss Ziffer 13.\n10 Wann besteht für Erwerbstätige Anspruch auf  \nEingliederungsmassnahmen?\nIn der Schweiz wohnende\
      \ Flüchtlinge oder Staatenlose, die eine Erwerbs -\ntätigkeit ausüben, haben zu den gleichen Voraussetzungen wie Schweizer\
      \ \nStaatsangehörige Anspruch auf Eingliederungsmassnahmen der IV, sofern \nsie unmittelbar vor Eintritt des Versicherungsfalles\
      \ Beiträge an die Invali -\ndenversicherung entrichtet haben. \f711 Wann besteht für Nichterwerbstätige und minderjährige\
      \ \nKinder Anspruch auf Eingliederungsmassnahmen?\nIn der Schweiz wohnende, nicht erwerbstätige Flüchtlinge und Staaten\
      \ -\nlose sowie minderjährige Kinder haben zu den gleichen Voraussetzungen \nAnspruch auf Eingliederungsmassnahmen der\
      \ IV wie Schweizer Staats -\nangehörige. Bedingung dafür ist, sich vor Eintritt des Versicherungsfalles \nwährend mindestens\
      \ eines Jahres ununterbrochen in der Schweiz aufge -\nhalten zu haben. Den minderjährigen Kindern steht der Anspruch\
      \ auf Ein -\ngliederungsmassnahmen auch dann zu, wenn sie in der Schweiz invalid \ngeboren wurden oder sich seit der\
      \ Geburt ununterbrochen in der Schweiz \naufgehalten haben.\n12 Wann besteht Anspruch auf eine IV-Rente?\nPersonen,\
      \ die bei Eintritt der Invalidität während mindestens drei Jahren \nBeiträge geleistet oder Erziehungs- oder Betreuungsgutschriften\
      \ erworben \nhaben, haben Anspruch auf eine IV-Rente, sofern sie eine dauerhafte Er -\nwerbsunfähigkeit von mindestens\
      \ 40 % aufweisen. Beträgt der Invaliditäts -\ngrad mindestens 70 %, wird eine ganze IV-Rente ausgerichtet. Bei einem\
      \ \nInvaliditätsgrad zwischen 50 % und 69 % entspricht der prozentuale An -\nteil einer ganzen IV-Rente dem Invaliditätsgrad.\
      \ Liegt der Invaliditätsgrad \nzwischen 40 % und 49 %, so liegt der prozentuale Anteil des Rentenan -\nspruchs zwischen\
      \ 25 % und 47.5 %. Für die IV-Renten gelten grundsätzlich \ndie gleichen Ansätze und Berechnungsregeln wie für die AHV-Renten.\n\
      Flüchtlinge und Staatenlose, die die Schweiz verlassen haben und in ei -\nnem Staat wohnen, mit dem die Schweiz ein\
      \ Abkommen über die AHV/\nIV abgeschlossen hat, haben den gleichen Anspruch auf schweizerische \nLeistungen wie die\
      \ Angehörigen dieses Staates (s. Ziffer 6).\n13 Wann besteht Anspruch auf eine Hilflosenentschädigung \nbzw. auf einen\
      \ Assistenzbeitrag?\nPersonen mit Wohnsitz und gewöhnlichem Aufenthalt in der Schweiz, \ndie wegen ihrer Invalidität\
      \ für die alltäglichen Lebensverrichtungen (An -\nkleiden, Essen, Körperpflege usw.) dauernd der Hilfe anderer Personen\
      \ \noder der persönlichen Überwachung bedürfen, haben Anspruch auf \neine Hilflosenentschädigung. Die Bezügerinnen und\
      \ Bezüger einer Hilf -\nlosenentschädigung, die auf regelmässige Hilfe angewiesen sind, aber \ndennoch zu Hause leben\
      \ möchten, können dank des Assistenzbeitrages \neine Person einstellen, welche die erforderlichen Hilfeleistungen erbringt.\
      \  \f8Dauert die Hilflosigkeit auch nach der Umwandlung der Invaliden- in eine \nAltersrente an, werden die Hilflosenentschädigung\
      \ und der Assistenzbei -\ntrag in der bisherigen Höhe weiter gewährt. \nHilflosenentschädigungen und Assistenzbeiträge\
      \ werden nicht ins Ausland \nausbezahlt.\nErgänzungsleistungen \n14 Meine AHV- oder IV-Rente deckt die Lebenskosten\
      \ \nnicht, was kann ich tun?\nBeziehen Sie eine Geldleistung (AHV- bzw. IV-Rente, nach Vollendung des \n18. Altersjahres\
      \ eine Hilflosenentschädigung der IV oder während min -\ndestens sechs Monaten ein IV-Taggeld) und leben in bescheidenen\
      \ wirt -\nschaftlichen Verhältnissen, haben Sie unter bestimmten Voraussetzungen \nAnspruch auf Ergänzungsleistungen.\
      \ \nWenn Sie das Referenzalter erreicht haben, invalid, verwitwet oder ver -\nwaist sind und dennoch keinen Anspruch\
      \ auf eine Rente haben, weil Sie \nkeine oder nicht lange genug Beiträge geleistet haben, kann unter ge -\nwissen Voraussetzungen\
      \ trotzdem ein Anspruch auf Ergänzungsleistungen \ngeltend gemacht werden. \nWenn Sie nicht in der Schweiz wohnen, haben\
      \ Sie keinen Anspruch auf \nErgänzungsleistungen.\nWeitere Informationen dazu finden Sie im Merkblatt 5.01 – Ergänzungs\
      \ -\nleistungen zur AHV und IV  und im Merkblatt 5.02 – Ihr Recht auf Ergän -\nzungsleistungen zur AHV und IV .\nRentenberechnung\n\
      15 Wie berechnen sich die AHV- und IV-Renten? \nDie Berechnung der AHV- und IV-Renten richtet sich nach der Beitrags\
      \ -\ndauer, den Erwerbseinkommen sowie den Erziehungs- und Betreuungs -\ngutschriften. \f9Beitragsrückvergütung\n16\
      \ Wann ist eine Rückvergütung der AHV-Beiträge  \nmöglich?\nEine Rückvergütung der AHV-Beiträge ist nur an Flüchtlinge\
      \ und Staaten -\nlose möglich, die\n•  keine schweizerische Rente erhalten,\n•  nach Ausreise aus der Schweiz in Australien,\
      \ Brasilien, China, Indien, \nPhilippinen, Südkorea, Tunesien, Uruguay oder in einem Staat leben, \nmit dem die Schweiz\
      \ kein Sozialversicherungsabkommen abgeschlos -\nsen hat (Nichtvertragsstaaten),\n•  während mindestens eines ganzen\
      \ Jahres Beiträge entrichtet haben.\nAnmeldung\n17 Wo ist die Anmeldung zum Bezug von Leistungen  \neinzureichen?\n\
      Die Anmeldung zum Bezug von Leistungen ist bei den folgenden Stellen, \ndie auch die entsprechenden Formulare abgeben,\
      \ einzureichen.  \nBei Wohnsitz in der Schweiz:\n•  für AHV-Leistungen:   \nbei der Ausgleichskasse, an die zuletzt\
      \ Beiträge entrichtet wurden\n•  für IV-Leistungen:   \nbei der IV-Stelle des Wohnsitzkantons\n• Für andere Leistungen:\
      \ Gemäss den Angaben im entsprechenden \nMerkblatt\nBei Wohnsitz in einem Vertragsstaat (siehe Ziffer 6): Bei der gleichen\
      \ Stelle, \ndie für die Angehörigen dieses Staates zuständig ist.\nBei Wohnsitz in einem Nichtvertragsstaat: Für Rückvergütung\
      \ der Beiträge \nnach Ziffer 16, bei der \nSchweizerischen Ausgleichskasse  \nAvenue Edmond Vaucher 18  \nPostfach 3100\
      \  \nCH-1211 Genf 2.\nDie Anmeldung ist möglichst bald nach der Erfüllung der Anspruchsvoraus -\nsetzungen einzureichen.\
      \ \f1018 Wo müssen Ansprüche auf Leistungen einer  \nausländischen Versicherung geltend gemacht werden?\nIn der Schweiz\
      \ wohnende Flüchtlinge und Staatenlose, die Anspruch auf \nLeistungen einer ausländischen Versicherung erheben, müssen\
      \ sich direkt \nan die betreffende Versicherungsanstalt oder an eine Vertretung des aus -\nländischen Staates in der\
      \ Schweiz wenden. \n19 Wer erteilt Auskunft? \nDie Ausgleichskassen, ihre Zweigstellen und die IV-Stellen geben \ngerne\
      \ Auskunft. Ein Verzeichnis der Ausgleichskassen finden Sie unter  \nwww.ahv-iv.ch . Flüchtlinge und Staatenlose ausserhalb\
      \ der Schweiz wen -\nden sich an die \nSchweizerische Ausgleichskasse  \nAvenue Edmond-Vaucher 18  \nPostfach 3100 \
      \ \nCH-1211 Genf 2\nBerufliche Vorsorge (Pensionskasse)\n20 Welche Versicherungspflicht und Leistungsansprüche \nbestehen\
      \ in der beruflichen Vorsorge?\nDie berufliche Vorsorge (Pensionskasse) soll in Ergänzung zu der AHV/\nIV den Versicherten\
      \ bzw. den Hinterlassenen im Vorsorgefall (Alter, Tod, \nInvalidität) die gewohnte Lebenshaltung weiter ermöglichen.\
      \ Sie ist für  \nErwerbstätige ab einem Jahreseinkommen von über 22 680 Franken obli -\ngatorisch. \nPersonen, die der\
      \ beruflichen Vorsorge unterstellt waren, haben Anspruch \nauf:\n•  eine Altersrente beim Erreichen des Referenzalters\
      \ oder zu einem frü -\nheren Zeitpunkt entsprechend dem Reglement der Pensionskasse;\n•  eine Invalidenrente, wenn sie\
      \ mindestens 40 % invalid sind und wenn \nsie im Zeitpunkt, in dem die Invaliditätsursache aufgetreten ist, versi -\n\
      chert waren (die Reglemente der Pensionskassen können vorteilhaftere \nBestimmungen vorsehen);\n•  Leistungen für die\
      \ Hinterbliebenen (Witwen, Witwer und Kinder) im \nTodesfall der versicherten Person;\n•  eine Austrittsleistung (=\
      \ Freizügigkeitsleistung), falls keines der drei ge -\nnannten Ereignisse eintritt und die Pensionskasse verlassen wird.\
      \  \f1121 Was ist bei Austritt aus der Pensionskasse zu tun?\nIm Allgemeinen wird beim Austritt aus der Pensionskasse\
      \ (normalerweise \nam Ende des Arbeitsverhältnisses) die Austrittsleistung auf ein Freizügig -\nkeitskonto oder auf\
      \ eine Freizügigkeitspolice überwiesen. Versicherte, \nwelche die Schweiz definitiv in Richtung eines Staates ausserhalb\
      \ der EU \noder EFTA verlassen, können eine Barauszahlung der Leistung verlangen.  \nEntsprechende Gesuche sind an die\
      \ Pensionskasse des letzten Arbeitgebers \nzu richten. Die Barauszahlung des obligatorischen Teiles der Austrittsleis\
      \ -\ntung ist nicht möglich, wenn eine versicherte Person die Schweiz verlässt \nund der obligatorischen Versicherung\
      \ eines EU- oder EFTA-Staates für die \nRisiken Alter, Tod und Invalidität unterstellt ist. \n22  Was ist beim Verlassen\
      \ der Schweiz zu tun?\nVersicherte Personen müssen sämtliche Versicherungsbestätigungen, die \nsie von der Pensionskasse\
      \ erhalten haben, aufbewahren. Verlässt eine ver -\nsicherte Person die Schweiz, ohne ihrer Pensionskasse mitzuteilen,\
      \ wohin \ndie Austrittsleistung zu bezahlen ist, oder ohne eine Barleistung erhalten \nzu haben, ist die Pensionskasse\
      \ verpflichtet, den Betrag spätestens zwei \nJahre nach dem Austritt der versicherten Person an die Auffangeinrichtung\
      \ \nzu überweisen. \n23 Wer erteilt Auskunft zu den Austrittsleistungen? \nAuskünfte im Zusammenhang mit nicht beanspruchten\
      \ Austrittsleistun -\ngen erteilt die Pensionskasse. Ausserdem informiert die Zentralstelle der  \n2. Säule über die\
      \ Geltendmachung der Ansprüche:\nZentralstelle 2. Säule  \nSicherheitsfonds BVG  \nPostfach 1023  \n3000 Bern 14  \n\
      Tel. 031 380 79 75  \nE-Mail: info@zentralstelle.ch  \nwww.sfbvg.ch\nWeitere Informationen finden Sie in der Broschüre\
      \ «Freizügigkeitsleistung: \nVergessen Sie Ihre Vorsorgeguthaben nicht!» unter www.bsv.admin.ch > \nSozialversicherungen\
      \ > Berufliche Vorsorge und 3. Säule > Grundlagen & \nGesetze > Grundlagen > Vergessene Freizügigkeitsguthaben .\f12\n\
      Auskünfte und weitere  \nInformationen\nDieses Merkblatt vermittelt nur eine Übersicht. Für die Beurteilung \nvon Einzelfällen\
      \ sind ausschliesslich die gesetzlichen Bestimmungen \nmassgebend. Die Schweizerische Ausgleichskasse in Genf, sowie\
      \ die \nschweizerischen Vertretungen im Ausland (Botschaften und Konsulate) \nerteilen weitere Auskünfte und geben die\
      \ erforderlichen Formulare ab.\nDie Zivil standsbezeichnungen haben auch die folgende Bedeutung: \n•  Ehe/Heirat: eingetragene\
      \ Partnerschaft\n•  Scheidung: gerichtliche Auflösung der eingetragenen Partnerschaft\n•  Verwitwung: Tod des eingetragenen\
      \ Partners / der eingetragenen \nPartneri n\nHerausgegeben von der Informationsstelle AHV/IV in Zusammenarbeit \nmit\
      \ dem Bundesamt für Sozialversicherungen.\nAusgabe Dezember 2024. Auch auszugsweiser Abdruck ist nur mit \nschriftlicher\
      \ Einwilligung der Informationsstelle AHV/IV erlaubt. \nDieses Merkblatt kann bei den Ausgleichskassen und deren Zweigstel\
      \ -\nlen sowie den IV-Stellen bezogen werden. Bestellnummer 11.01. Es ist \nebenfalls unter www.ahv-iv.ch  verfügbar.\f\
      13Informations pour réfugiés  \net apatrides\nEn bref\nLes réfugiés et apatrides domiciliés en Suisse peuvent faire\
      \ valoir leur droit \naux prestations du système de sécurité sociale suisse.\nLa sécurité sociale en Suisse repose sur\
      \ le concept dit des trois piliers : l’AVS \net l’AI et leurs prestations complémentaires (PC) forment le 1er pilier\
      \ obli -\ngatoire destiné à couvrir les besoins vitaux. La prévoyance professionnelle \n(caisse de pensions) constitue\
      \ le 2e pilier, et permet aux assurés ou aux \nsurvivants de maintenir de manière appropriée leur niveau de vie antérieur\
      \ \nlorsque survient un cas de prévoyance (vieillesse, décès ou invalidité). Le  \n3e pilier enfin, soit la prévoyance\
      \ privée (épargne, assurances privées), com -\nplète les deux premiers piliers et est facultatif.\nLes dispositions\
      \ de l’assurance-vieillesse et survivants (AVS) et de l’as -\nsurance invalidité (AI) concernant les réfugiés et les\
      \ apatrides figurent dans \nl’arrêté fédéral du 4 octobre 1962 sur le statut des réfugiés et des apatrides \ndans l’AVS\
      \ et dans l’AI. Le présent mémento ne traite que des personnes \nexpressément reconnues comme réfugiés ou apatrides\
      \ par le Secrétariat \nd’Etat aux migrations SEM. Les requérants d’asile ou les étrangers admis \nprovisoirement en\
      \ Suisse sont touchés par d’autres dispositions; ils ne sont \ndonc pas concernés par ce mémento.\nObligation d’assurance\n\
      1 Les réfugiés et apatrides sont-ils assurés  \nauprès de l’AVS/AI ?\nL’AVS et l’AI sont des assurances générales et\
      \ obligatoires. Toutes les \npersonnes qui ont leur domicile ou qui exercent une activité lucrative en  \nSuisse y sont\
      \ assujetties. L’obligation de s’assurer vaut également pour les \nréfugiés et les apatrides. \f14Numéro AVS\n2 Comment\
      \ puis-je connaître mon numéro AVS ?\nLe numéro AVS figure sur la carte d’assurance-maladie ainsi que sur le \ncertificat\
      \ d’assurance AVS/AI. Un assuré qui ne possède pas de carte d’as -\nsurance-maladie ni de certificat d’assurance AVS/AI\
      \ peut s’adresser à sa \ncaisse de compensation afin qu’elle lui délivre ledit certificat d’assurance. Il \nest alors\
      \ tenu de le conserver. Les assurés présentent leur carte d’assuran -\nce-maladie ou leur certificat d’assurance AVS/AI\
      \ à leur nouvel employeur \nlors de chaque changement d’emploi et à l’organe compétent en cas de \ndemande de prestations.\
      \ \nImportant : le numéro AVS doit être indiqué dans toute correspondance \navec les caisses de compensation.\nCotisations\n\
      3 A quel moment débute l’obligation de s’assurer  \nauprès de l’AVS/AI ?\nLes personnes affiliées à l’AVS et à l’AI\
      \ sont tenues de verser des cotisa -\ntions à partir du 1er janvier qui suit leur 20ème anniversaire jusqu’à l’âge de\
      \ \nréférence. Les personnes actives ont l’obligation de cotiser dès le début \nde leur activité lucrative, mais au\
      \ plus tôt le 1er janvier qui suit leur 17ème \nanniversaire.\n4 De quelle manière les cotisations à l’AVS, à l’AI \
      \ \net au régime des APG sont-elles perçues ?\nLes cotisations à l’AVS, à l’AI et au régime des APG sont perçues de\
      \ la  \nmanière suivante :\n•  Salariés\n La cotisation paritaire est payée moitié par le salarié et moitié par l’em\
      \ -\nployeur. S’y ajoutent les cotisations dues à l’assurance chômage et, le \ncas échéant, les cotisations relatives\
      \ à d’autres branches des assurances \nsociales. Les cotisations du salarié sont retenues lors de chaque paie \npar\
      \ l’employeur, qui les verse à la caisse de compensation en même \ntemps que sa propre part de cotisations.\f15•  Indépendants\n\
      \ La personne qui exerce une activité indépendante établit le décompte \nde ses cotisations directement avec la caisse\
      \ de compensation. C’est le \nrevenu mentionné sur la taxation de l’impôt fédéral direct qui sert de \nbase de calcul.\
      \ Il appartient à la caisse de compensation de déterminer \nsi l’assuré est indépendant au sens de l’AVS. Elle fixe\
      \ la cotisation en \ns’appuyant sur le revenu de l’activité lucrative. \n• Non actifs\n Le montant des cotisations des\
      \ personnes qui n’exercent pas d’activité \nlucrative dépend de la fortune et du revenu acquis sous forme de ren -\n\
      tes. Il est fixé par la caisse de compensation du canton de domicile de \nl’assuré.\nPrestations de l’AVS\n5 Quelles\
      \ prestations l’AVS octroie-t-elle ?\nL’AVS octroie les prestations suivantes :\n•  La rente de vieillesse pour les\
      \ hommes et les femmes qui ont atteint \nl’âge de référence. Dès le 1er janvier 2025, l’âge de référence des fem -\n\
      mes sera relevé progressivement de 64 à 65 ans par palier de trois mois \npar année. Ainsi, à partir de 2028, l’âge\
      \ de référence sera le même \npour tout le monde, soit 65 ans. Vous trouverez des informations com -\nplémentaires dans\
      \ le mémento 3.01 – Rentes de vieillesse et allocation \npour impotent de l’AVS . La rente de vieillesse peut être anticipée\
      \ ou \najournée. La rente anticipée est réduite; la rente ajournée donne droit \nà une augmentation (voir mémento 3.04\
      \ – Flexibilisation de la retraite ).\n•  La rente pour enfant versée aux bénéficiaires de rente de vieillesse. \nCe\
      \ droit vaut jusqu’au 18e anniversaire de leurs enfants ou jusqu’à la \nfin d’un apprentissage ou des études mais, au\
      \ maximum, jusqu’à leur  \n25e anniversaire.\n•  La rente de veuve ou de veuf.\n•  La rente d’orphelin pour les enfants\
      \ de moins de 18 ans ou jusqu’à la \nfin d’un apprentissage ou des études mais, au maximum, jusqu’à leur \n25e anniversaire.\n\
      •  L’allocation pour impotent selon le chiffre 7.\n•  Les moyens auxiliaires selon le chiffre 8.\f166 Quelles conditions\
      \ ouvrent le droit  \naux prestations de l’AVS ?\nLes réfugiés et les apatrides, ainsi que leurs survivants (veuves,\
      \ veufs,  \norphelins), ont droit à la rente ordinaire AVS (fondée sur les cotisations \npayées) lorsqu’ils :\n•  sont\
      \ domiciliés en Suisse et\n•  ont cotisé à l’AVS suisse une année entière au moins, ou ont vécu un \nan en Suisse avec\
      \ un conjoint ayant versé, pendant qu’il exerçait une \nactivité lucrative, au moins le double de la cotisation minimale,\
      \ ou\n•  justifient d’un an de bonifications pour tâches éducatives ou pour \ntâches d’assistance.\nUne rente de survivants\
      \ n’est octroyée que si l’assuré décédé présentait la \ndurée de cotisations minimale.\nLes réfugiés et les apatrides\
      \ qui ont quitté la Suisse et résident dans un des \npays suivants avec lequel la Suisse a conclu une convention sur\
      \ l’AVS/AI ont \nle même droit aux prestations suisses que les ressortissants de ces Etats. \nEtats membres de l‘UE\
      \ Chili  Philippines\nEtats membres de l‘AELE Etats-Unis Royaume-Uni\nAlbanie Israël Saint-Marin\nAustralie Japon Serbie\n\
      Bosnie et Herzégovine Kosovo Tunisie\nBrésil Macédoine du Nord Turquie\nCanada/Québec Monténégro Uruguay  \n7 Quelles\
      \ conditions ouvrent le droit  \nà une allocation pour impotent ?\nOnt droit à une allocation pour impotent les bénéficiaires\
      \ d’une rente de \nvieillesse ou de prestations complémentaires, domiciliés et résidant habi-  \ntuellement en Suisse,\
      \ qui présentent une impotence faible, moyenne ou \ngrave depuis six mois au minimum. \nUne personne est considérée\
      \ comme impotente lorsqu’elle a besoin d’une \naide régulière d’autrui pour les actes ordinaires de la vie (se vêtir,\
      \ manger, \nfaire sa toilette, etc.), ou que son état nécessite des soins permanents ou \nune surveillance personnelle.\
      \ \nLes allocations pour impotent ne sont pas versées à l’étranger.\f178 Quelles conditions ouvrent le droit  \nà des\
      \ moyens auxiliaires de l’AVS ?\nLes bénéficiaires d’une rente de vieillesse domiciliés en Suisse reçoivent, \nà certaines\
      \ conditions, des moyens auxiliaires de l’AVS tels qu’appa -\nreils acoustiques, lunettes-loupes, fauteuils roulants,\
      \ etc. (voir mémento  \n3.02 – Moyens auxiliaires de l’AVS ).\nPrestations de l’AI\n9 Quelles prestations l’AI octroie-t-elle\
      \ ?\nL’AI accorde d’abord des mesures de réadaptation. Une rente AI n’est ver -\nsée que si les mesures de réadaptation\
      \ n’ont pas atteint leur but ou n’y sont \nparvenues qu’en partie, ou encore si elles sont d’emblée vouées à l’échec.\
      \ \nL’AI dispense les prestations suivantes :\n•  Les mesures d’intervention précoce ayant pour but de maintenir à leur\
      \ \nposte les assurés en incapacité de travail, de permettre leur réadapta -\ntion à un nouveau poste ou faciliter l’accès\
      \ aux jeunes assurés à une \nformation professionnelle initiale.\n•  Les mesures de réadaptation en vue d’améliorer\
      \ la capacité de gain \nactuelle ou future (par exemple reclassement professionnel, moyens \nauxiliaires).\n• Les rentes\
      \ d ’invalidité visent à compenser les conséquences écono -\nmiques durables de l’invalidité en couvrant les besoins\
      \ vitaux dans une \nmesure appropriée. Elle est accordée au plus tôt dès l’âge de 18 ans. Le \ntaux d’invalidité détermine\
      \ la rente que touchera la personne assurée.\n•  La rente pour chaque enfant en cas d’invalidité d’un des parents ;\
      \ l’en -\nfant y donne droit jusqu’à son 18e anniversaire ou jusqu’à la fin d’un \napprentissage ou des études mais,\
      \ au maximum, jusqu’à son 25e anni -\nversaire.\n•  L’allocation pour impotent et contributions d ’assistance selon\
      \ le chiffre 13.\n10 Quelles conditions ouvrent le droit à des mesures de \nréadaptation aux personnes qui exercent\
      \ une activité \nlucrative ?\nLes réfugiés et les apatrides domiciliés en Suisse, qui exercent une activité \nlucrative,\
      \ ont droit aux mesures de réadaptation de l’assurance invalidité \naux mêmes conditions que les ressortissants suisses\
      \ s’ils ont versé des co -\ntisations à l’assurance invalidité suisse immédiatement avant la survenance \nde l’invalidité.\f\
      1811 Quelles conditions ouvrent le droit à des mesures de \nréadaptation aux personnes qui n’exercent pas  \nd’activité\
      \ lucrative et aux mineurs ?\nLes réfugiés et les apatrides domiciliés en Suisse qui n’exercent pas d’activité \nlucrative\
      \ et les enfants mineurs ont droit à des mesures de réadaptation de \nl’assurance invalidité aux mêmes conditions que\
      \ les ressortissants suisses \ns’ils ont séjourné en Suisse pendant au moins une année sans interruption \navant la\
      \ survenance de l’invalidité. Les enfants mineurs ont également droit \nà des mesures de réadaptation s’ils sont nés\
      \ invalides en Suisse ou qu’ils y \nrésident sans interruption depuis leur naissance.\n12 Quelles conditions ouvrent\
      \ le droit à une rente de l’AI ?\nLes personnes qui, au moment de la survenance de l’invalidité, ont versé \ndes cotisations\
      \ ou acquis des bonifications pour tâches éducatives ou \nd’assistance pendant au moins trois ans ont droit à une rente\
      \ AI si elles \nprésentent une incapacité de gain durable d’au moins 40 %. Si le degré \nd’invalidité est d’au moins\
      \ 70 %, la rente AI entière est versée. Si le degré \nd’invalidité est compris entre 50 % et 69 %, le pourcentage d’une\
      \ rente AI \nentière correspond au degré d’invalidité. Si le degré d’invalidité est compris \nentre 40 % et 49 %, le\
      \ pourcentage d’une rente complète se situe entre  \n25 % et 47,5 %. Ces prestations sont accordées sous forme de rentes\
      \ AI. \nLes bases et les règles de calcul des rentes AI sont en principe les mêmes \nque celles des rentes AVS.\nLes\
      \ réfugiés et les apatrides qui ont quitté la Suisse et résident dans un pays \navec lequel la Suisse a conclu une convention\
      \ sur l’AVS/AI ont le même droit \naux prestations suisses que les ressortissants de ces Etats (voir chiffre 6).\n13\
      \ Quand a-t-on droit à une allocation pour impotent ou à \nune contribution d‘assistance ?\nLes personnes ayant leur\
      \ domicile et leur résidence habituelle en Suisse qui \nont besoin en permanence de l’aide d’autrui ou d’une surveillance\
      \ person -\nnelle pour accomplir les actes ordinaires de la vie (s’habiller, faire sa toilette, \nmanger, etc.) du fait\
      \ de leur invalidité ont droit à une allocation pour im -\npotent. De plus, les bénéficiaires d’une allocation pour\
      \ impotent vivant à la \nmaison peuvent, grâce à la contribution d’assistance, engager un assistant \nqui leur apporte\
      \ l’aide dont elles ont besoin. Si l’impotence subsiste lorsque \nla rente de vieillesse se substitue à la rente d’invalidité,\
      \ une allocation pour \nimpotent et une contribution d’assistance au moins égales sont octroyées \npar l’assurance-vieillesse.\
      \ \f19L’allocation pour impotent et la contribution d’assistance ne sont pas ver -\nsées à l’étranger\nPrestations complémentaires\n\
      14 Ma rente AVS ou AI ne couvre pas le coût de la vie, que \npuis-je faire ?\nSi vous percevez une prestation en espèces\
      \ (rente AVS ou AI, une allocation \npour impotent de l‘AI après l‘âge de 18 ans ou une indemnité journalière \nde l‘AI\
      \ pendant au moins six mois) et que vous vivez dans des conditions \néconomiques modestes, vous avez droit, sous certaines\
      \ conditions, à des \nprestations complémentaires. \nSi vous avez atteint l‘âge de référence, que vous êtes invalide,\
      \ veuf ou \norphelin et que vous n‘avez néanmoins pas droit à une rente parce que \nvous n‘avez pas cotisé ou que vous\
      \ n‘avez pas cotisé assez longtemps, vous \npouvez tout de même faire valoir un droit aux prestations complémentaires\
      \  \nsous certaines conditions. \nSi vous n‘habitez pas en Suisse, vous n‘avez pas droit aux prestations com -\nplémentaires.\n\
      Vous trouverez de plus amples informations à ce sujet dans le mémento \n5.01 – Prestations complémentaires à l‘AVS et\
      \ à l‘AI  et dans le mémento \n5.02 – Votre droit aux prestations complémentaires à l‘AVS et à l‘AI .\nCalcul des rentes\n\
      15 Comment les rentes de l’AVS"
  - source_sentence: Wer hat Anspruch auf Familienzulagen in der Landwirtschaft?{SEP}Welche Familienzulagen gibt es nach dem
      FLG?{SEP}Was ist unter 'Ausbildung' im Kontext der Ausbildungszulagen zu verstehen?
    sentences:
    - "6.09 Familienzulagen\nFamilienzulagen\nin der Landwirtschaft\nStand am 1. Januar 2025\f2Auf einen Blick\nDas Bundesgesetz\
      \ über die Familienzulagen in der Landwirtschaft (FLG) gilt \nfür in der Landwirtschaft tätige Personen. Verschiedene\
      \ Bestimmungen \ndes Bundesgesetzes über die Familienzulagen (FamZG) sind jedoch auf das \nFLG anwendbar. \nWeitere\
      \ Informationen zum FamZG finden Sie im Merkblatt  \n6.08 – Familienzulagen.\nAnspruchsberechtigt nach dem FLG sind\
      \ selbstständige Landwirtinnen und \nLandwirte und Arbeitnehmende in der Landwirtschaft.\nDie Leistungen entsprechen\
      \ den Mindestleistungen nach FamZG:\n•  Kinderzulage von 215 Franken pro Kind und Monat  \n(im Berggebiet liegen die\
      \ Ansätze 20 Franken höher); \n•  Ausbildungszulage von 268 Franken pro Kind und Monat  \n(im Berggebiet liegen die\
      \ Ansätze 20 Franken höher); \n•  Haushaltungszulage von 100 Franken pro Monat für landwirtschaft-  \nliche Arbeitnehmende.\
      \ \nDieses Merkblatt informiert selbstständige Landwirtinnen und Landwirte \nund Arbeitnehmende in der Landwirtschaft\
      \ über den Anspruch auf Fami -\nlienzulagen.\f3Anspruch\n1 Wer hat Anspruch auf Familienzulagen in der  \nLandwirtschaft?\n\
      1. Hauptberuflich selbstständige Landwirtinnen und Landwirte\n Sie gelten als hauptberuflich in der Landwirtschaft tätig,\
      \ wenn Sie \nim Verlaufe des Jahres vorwiegend in Ihrem landwirtschaftlichen Be -\ntrieb arbeiten und den überwiegenden\
      \ Teil des Lebensunterhalts Ihrer  \nFamilie aus dieser Tätigkeit bestreiten. Die landwirtschaftliche Tätigkeit \nmuss\
      \ somit die wesentliche wirtschaftliche Grundlage für den Lebens -\nunterhalt bilden. Als selbstständige Landwirtinnen\
      \ und Landwirte gel -\nten auch gewisse Familienangehörige, die im Betrieb mitarbeiten.\n2. Nebenberuflich selbstständige\
      \ Landwirtinnen und Landwirte\n Sie gelten als nebenberuflich in der Landwirtschaft tätig, wenn Sie ein \njährliches\
      \ Betriebseinkommen von mindestens 2 000 Franken erzielen \noder eine landwirtschaftliche Tätigkeit ausüben, die der\
      \ Haltung einer \nGrossvieheinheit entspricht.\n3. Älplerinnen und Älpler\n Sie haben Anspruch auf Kinder- und Ausbildungszulagen\
      \ nach dem \nFLG, wenn Sie während mindestens zwei Monaten ununterbrochen \neine Alp in selbstständiger Stellung bewirtschaften.\
      \ Der Anspruch auf \nKinder- und Ausbildungszulagen nach dem FLG gilt nur für diese Zeit. \n4. Hauptberufliche Berufsfischerinnen\
      \ und Berufsfischer\n Sie haben Anspruch auf Kinder- und Ausbildungszulagen nach dem \nFLG.\n5. Landwirtschaftliche\
      \ Arbeitnehmende\n Sie haben Anspruch auf volle Familienzulagen, wenn Ihr Einkommen \nmindestens 630 Franken pro Monat\
      \ oder 7 560 pro Jahr beträgt. Sie \nhaben nur Anspruch auf Haushaltungszulagen, wenn\n - Sie mit Ihrem Ehemann oder\
      \ Ihrer Ehefrau oder den Kindern  \n einen gemeinsamen Haushalt führen, oder\n - Sie in Hausgemeinschaft mit dem Arbeitgebenden\
      \ leben und Ihr  \n Ehemann oder Ihre Ehefrau oder Ihre Kinder einen eigenen Haus- \n halt führen, für deren Kosten\
      \ Sie aufkommen müssen, oder\n - Sie mit Ihrem Ehemann oder Ihrer Ehefrau oder Ihren Kindern in  \n Hausgemeinschaft\
      \ mit dem Arbeitgebenden leben.\f42 Für welche Kinder besteht Anspruch auf  \nFamilienzulagen?\nIm Grundsatz haben Sie\
      \ Anspruch auf Familienzulagen für:\n•  eigene Kinder, und zwar unabhängig davon, ob Sie als Eltern verheira -\ntet\
      \ sind oder nicht, oder ob es sich um adoptierte Kinder handelt;\n•  Stiefkinder, die überwiegend im Haushalt des Stiefelternteils\
      \ leben \noder bis zur Mündigkeit lebten;\n•  Pflegekinder, die Sie unentgeltlich zur dauernden Pflege und Erzie -\n\
      hung aufgenommen haben;\n•  Geschwister und Enkelkinder, für deren Unterhalt Sie überwiegend \naufkommen.\n3 Welche\
      \ Familienzulagen gibt es?\nDas FLG sieht die folgenden Familienzulagen vor:\n•  Eine Kinderzulage von 215 Franken pro\
      \ Monat im Talgebiet und von \n235 Franken pro Monat im Berggebiet; sie wird ab dem Geburtsmo -\nnat des Kindes bis\
      \ und mit dem Monat ausgerichtet, in dem der 16. \nGeburtstag des Kindes liegt; besteht bereits vor dem 16. Geburtstag\
      \ \nAnspruch auf eine Ausbildungszulage, so wird diese anstelle der Kin -\nderzulage ausgerichtet; ausserdem wird die\
      \ Kinderzulage für Kinder \nzwischen 16 und 20 Jahren entrichtet, die aufgrund einer gesundheit -\nlichen Beeinträchtigung\
      \ nicht in der Lage sind, eine Erwerbstätigkeit \nauszuüben.\n•  Eine Ausbildungszulage von 268 Franken pro Monat im\
      \ Talgebiet und \nvon 288 Franken pro Monat im Berggebiet; sie wird ab dem Monat, \nin dem das Kind eine nachobligatorische\
      \ Ausbildung beginnt, ausge -\nrichtet, frühestens jedoch für den Monat in dem der 15. Geburtstag \ndes Kindes liegt;\
      \ für Kinder, die das 16. Altersjahr vollendet haben und \nnoch die obligatorische Schule besuchen, besteht ab dem Monat,\
      \ der \nauf den 16. Geburtstag folgt, ebenfalls Anspruch auf Ausbildungszu -\nlagen; die Ausbildungszulage wird bis\
      \ zum Abschluss der Ausbildung \nausgerichtet, längstens jedoch bis zum Ende des Monats, in dem das \nKind das 25. Altersjahr\
      \ vollendet. \n• Eine Haushaltungszulage für landwirtschaftliche Arbeitnehmende von \n100 Franken pro Monat.\n•  Einzelne\
      \ Kantone richten zusätzlich zu diesen monatlichen Zulagen \nweitere Zulagen sowie eine Geburtszulage aus.\n \f54 Was\
      \ ist unter «Ausbildung» zu verstehen?\nAnspruch auf Ausbildungszulagen besteht bei Ausbildungen, die in der \nAHV für\
      \ den Anspruch auf Waisen- und Kinderrenten anerkannt sind.\nAls nachobligatorische Ausbildung gilt die Ausbildung,\
      \ die auf die obliga -\ntorische Schulzeit folgt. Dauer und Ende der obligatorischen Schule richten \nsich nach den\
      \ jeweiligen kantonalen Bestimmungen.\nAls Ausbildung gelten:\n•  der Besuch von Schulen oder Kursen, die der Allgemeinbildung\
      \ oder \nder Berufsbildung dienen;\n•  die berufliche Ausbildung im Rahmen eines eigentlichen Lehrverhält -\nnisses,\
      \ aber auch eine Tätigkeit ohne speziellen Berufsabschluss, die \neine systematische Vorbereitung auf eine zukünftige\
      \ Erwerbstätigkeit \ndarstellt.\nNicht als in Ausbildung gilt, wer zur Hauptsache erwerbstätig ist und nur \nnebenbei\
      \ eine Schule oder Kurse besucht.\nKein Anspruch auf Ausbildungszulagen besteht für Jugendliche, deren \njährliches\
      \ Bruttoerwerbseinkommen 30 240 Franken übersteigt.\nAnspruchskonkurrenz und Differenzzahlung bei  \nderselben Person\n\
      5 Was ist, wenn ich noch eine ausserlandwirtschaftliche \nTätigkeit ausübe?\nSind Sie hauptberuflich selbstständige\
      \ Landwirtin oder selbstständiger \nLandwirt, landwirtschaftliche Arbeiternehmerin oder landwirtschaftlicher  \nArbeitnehmer\
      \ und üben daneben noch eine ausserlandwirtschaftliche  \nTätigkeit aus (Arbeitnehmerin oder Arbeitnehmer, Selbstständigerwer\
      \ -\nbende oder Selbstständigerwerbender), erhalten Sie die Zulagen primär \naufgrund dieser ausserlandwirtschaftlichen\
      \ Tätigkeit.\nSind Sie nebenberuflich Landwirtin oder Landwirt, Älplerin oder Älpler, \nbeziehen Sie die Zulagen ebenfalls\
      \ in erster Linie aufgrund der ausserland -\nwirtschaftlichen Tätigkeit. Ein Anspruch ist zudem nur für die Zeit der\
      \ land -\nwirtschaftlichen Tätigkeit gegeben.\f66 Welcher Anspruch besteht, wenn ich während  \nbestimmter Monate ausserlandwirtschaftlich\
      \ tätig bin?\nSind Sie hauptberuflich selbstständige Landwirtin oder selbstständiger \nLandwirt, landwirtschaftliche\
      \ Arbeiternehmerin oder landwirtschaftlicher  \nArbeitnehmer und haben während bestimmter Monate ein ausserland -\n\
      wirtschaftliches Arbeitsverhältnis (z. B. Tätigkeit im Tourismus während der \nWinterzeit), so haben Sie für diese Zeit\
      \ Anspruch auf Familienzulagen nach \ndem FamZG.\nLiegt der kantonale Ansatz der Familienzulagen nach FamZG unter dem\
      \ -\njenigen des FLG, besteht für die Zeit der Nebenerwerbstätigkeit Anspruch \nauf Differenzzahlungen zum Ansatz nach\
      \ dem FLG. Für die restlichen Mo -\nnate besteht ein Anspruch nach dem FLG.\n7 Welcher Anspruch besteht, wenn ich während\
      \ des  \nganzen Jahres ausserlandwirtschaftlich tätig bin?\nSind Sie hauptberuflich selbstständige Landwirtin oder selbstständiger\
      \ \nLandwirt, landwirtschaftliche Arbeiternehmerin oder landwirtschaftlicher  \nArbeitnehmer und sind während des ganzen\
      \ Jahres in Teilzeit noch ausser -\nhalb der Landwirtschaft erwerbstätig und erzielen dadurch ein jährliches \nErwerbseinkommen\
      \ von mindestens 7 560 Franken, haben Sie Anspruch \nauf die vollen Zulagen nach FamZG.\nLiegt der kantonale Ansatz\
      \ der Familienzulage nach dem FamZG unter \ndemjenigen des FLG (Betrieb im Berggebiet), besteht Anspruch auf die Dif\
      \ -\nferenzzulage.\f7Anspruchskonkurrenz und Differenzzahlung bei  \nverschiedenen Personen\n8 Was ist, wenn mehrere\
      \ Personen die Voraussetzungen \nfür den Bezug von Familienzulagen erfüllen?\nFür jedes Kind darf nur eine Zulage ausgerichtet\
      \ werden. Erfüllen mehrere \nPersonen die Voraussetzungen für den Bezug von Familienzulagen, richtet \nsich der Anspruch\
      \ nach der folgenden Rangordnung, die nicht nur zwi -\nschen Mutter und Vater, sondern auch für andere Berechtigte massgebend\
      \ \nist:\n1. Die erwerbstätige Person.\n2. Die Person, die die elterliche Sorge innehat oder bis zur Mündigkeit  \n\
      innehatte.\n3. Bei gemeinsamer elterlicher Sorge oder wenn keine der berechtigten \nPersonen die elterliche Sorge hat,\
      \ ist in erster Linie anspruchsberech -\ntigt, wer überwiegend mit dem Kind zusammenlebt oder bis zu seiner \nMündigkeit\
      \ lebte; bei Trennung oder Scheidung hat deshalb in erster \nLinie Anspruch, wer das Kind bei sich betreut.\n4. Leben\
      \ beide anspruchsberechtigten Personen mit dem Kind zusam -\nmen, so hat Vorrang, wer im Wohnsitzkanton des Kindes arbeitet.\n\
      5. Arbeiten beide oder arbeitet keine der anspruchsberechtigten Perso -\nnen im Wohnsitzkanton des Kindes, so bezieht\
      \ die Familienzulagen, \nwer das höhere AHV-pflichtige Einkommen aus einer unselbstständi -\ngen Erwerbstätigkeit hat.\
      \ Bezieht keiner ein Einkommen aus unselbst -\nständiger Erwerbstätigkeit, so hat Vorrang, wer das höhere Einkom -\n\
      men aus selbstständiger Erwerbstätigkeit bezieht.\nHandelt es sich beim Anspruch der zweitanspruchsberechtigten Person\
      \ um \neinen solchen nach dem FLG, besteht Anspruch auf den Differenzbetrag, \nsofern der für die erstanspruchsberechtigte\
      \ Person geltende kantonale An -\nsatz der Familienzulage nach FamZG tiefer liegt als derjenige nach dem \nFLG.\nEbenfalls\
      \ Anspruch auf den Differenzbetrag besteht dann, wenn der  \nErstanspruch beim FLG liegt und der für die zweitanspruchsberechtigte\
      \ \nPerson geltende kantonale Ansatz der Familienzulage nach FamZG höher \nliegt.\f8Beispiele zur Anspruchskonkurrenz,\
      \ wenn FamZG und \nFLG betroffen sind\n9 Beispiel 1\nEin hauptberuflich selbstständiger Landwirt im Berggebiet ist während\
      \ vier \nMonaten im Jahr für ein Bergbahnunternehmen tätig (Monatslohn von  \n2 500 Franken). Die Ehefrau ist im Gastgewerbe\
      \ teilzeitbeschäftigt und \nerzielt ein Einkommen von monatlich 1 000 Franken. Das landwirtschaft -\nliche Einkommen\
      \ des Ehemannes liegt auf den Monat umgerechnet bei  \n2 000 Franken pro Monat. Die Ehegatten arbeiten beide im Kanton,\
      \ in \nwelchem die Familie wohnt.\nWährend der vier Monate, in welchen der Ehemann die Nebenerwerbstä -\ntigkeit ausübt,\
      \ hat er in erster Linie Anspruch auf die Familienzulagen nach \nFamZG, weil sein ausserlandwirtschaftliches Erwerbseinkommen\
      \ höher ist \nals dasjenige der Ehefrau. Er hat allenfalls Anspruch auf Differenzzulagen \nnach dem FLG, wenn diese\
      \ höher sind als jene nach FamZG.\nWährend der restlichen acht Monate ist die Ehefrau Erstanspruchsbe -\nrechtigte,\
      \ da sie als einzige einen Anspruch aus einer unselbstständigen \nErwerbstätigkeit geltend machen kann. Der Ehemann\
      \ hat Anspruch auf \nDifferenzzulagen, wenn die Familienzulagen gemäss FLG höher sind als die \nZulagen gemäss FamZG.\n\
      10 Beispiel 2\nDie Ausgangslage ist die gleiche wie im Beispiel 1 mit dem Unterschied, \ndass die Ehefrau als Lehrerin\
      \ tätig ist und ein monatliches Einkommen von \n4 000 Franken erzielt. Dieses ist also höher als das Einkommen ihres\
      \ Man -\nnes aus seiner Tätigkeit beim Bergbahnunternehmen.\nWährend der vier Monate Nebentätigkeit des Ehemannes ist\
      \ die Ehefrau \nErstanspruchsberechtigte, da ihr Einkommen höher ist als dasjenige des \nEhemannes. Der Ehemann hat\
      \ Anspruch auf Differenzzulagen, wenn die \nFamilienzulagen gemäss FLG höher sind. Während der anderen acht Mo -\nnate\
      \ ist die Ehefrau ebenfalls Erstanspruchsberechtigte, da sie als einzige \neinen Anspruch aus einer unselbstständigen\
      \ Erwerbstätigkeit geltend ma -\nchen kann. Der Ehemann hat Anspruch auf Differenzzulagen, wenn die \nFamilienzulagen\
      \ gemäss FLG höher sind.\f911 Beispiel 3\nDie Ehefrau ist hauptberuflich Landwirtin. Die Familie lebt auf dem Bauern\
      \ -\nhof und der Ehemann geht in einem anderen Kanton einer unselbststän -\ndigen Erwerbstätigkeit nach. Sein Einkommen\
      \ ist höher als dasjenige der \nEhefrau.\nErstanspruchsberechtigt ist diejenige Person, auf welche die Familienzula\
      \ -\ngenordnung im Wohnsitzkanton des Kindes anwendbar ist. Daraus resul -\ntiert der vorrangige Anspruch der Ehefrau\
      \ nach dem FLG. Allenfalls ist ein \nAnspruch des Mannes auf Differenzzulagen gegeben, wenn der Ansatz für \ndie Familienzulage\
      \ nach FamZG im Kanton seiner Erwerbstätigkeit höher \nliegt als derjenige des FLG.\n12 Was sind die Pflichten betreffend\
      \ Weiterleitung und \nDrittauszahlung der Familienzulagen?\nDie Familienzulagen wie auch die Differenzzahlungen müssen\
      \ Sie zusätz -\nlich zu den Unterhaltsbeiträgen an die Person, die für das Kind sorgt,  \nweiterleiten.\nWerden die\
      \ Familienzulagen nicht für die Bedürfnisse des Kindes verwen -\ndet, so können sie direkt an das mündige Kind oder\
      \ die sorgeberechtigte \nPerson ausgerichtet werden (sog. Drittauszahlung).\n13 Erhalten Kinder im Ausland Familienzulagen?\n\
      Familienzulagen werden für Kinder im Ausland nur dann ausgerichtet, \nwenn die Schweiz aufgrund eines Abkommens über\
      \ Soziale Sicherheit \ndazu verpflichtet ist:\n•  An Staatsangehörige von EU- bzw. EFTA-Ländern werden Kinder-, \nAusbildungs-\
      \ und Haushaltungszulagen nach dem FLG ausgerich -\ntet, wenn die Kinder in Ländern der EU- bzw. der EFTA wohnen. An\
      \ \nStaatsangehörige von Belgien, Frankreich, Italien, Kroatien, Portugal, \nSlowenien und Spanien werden die Kinder-\
      \ und Ausbildungszulagen \nweltweit exportiert.\n•  An Staatsangehörige von Bosnien-Herzegowina, Montenegro, Nord- \n\
      mazedonien, San Marino und der Türkei werden die Kinder- und Aus -\nbildungszulagen weltweit exportiert.\n• Das neue\
      \ Abkommen mit dem Vereinigten Königreich, das seit dem  \n1. November 2021 in Kraft ist, erstreckt sich nicht auf Famili\
      \ -\nenleistungen; diese können daher grundsätzlich nicht für im \nVereinigten Königreich lebende Kinder ausbezahlt\
      \ werden, \nausser es handelt sich um eine Situation, die unter das Ab -\f10kommen über die Rechte der Bürgerinnen und\
      \ Bürger fällt.  \nFür weitere Informationen konsultieren Sie bitte die Website des Bun -\ndesamtes für Sozialversicherungen\
      \ (BSV): www.bsv.admin.ch > Sozial -\nversicherungen > Internationale Sozialversicherung > Austritt des Ver -\neinigten\
      \ Königreichs aus der EU (Brexit) .\nBei den Kindern oder Jugendlichen, die die Schweiz zu Ausbildungszwe -\ncken verlassen,\
      \ wird davon ausgegangen, dass sie ihren Wohnsitz für \nlängstens fünf Jahre in der Schweiz behalten. In diesem Fall\
      \ besteht für sie \nweiterhin ein Anspruch auf Familienzulagen.\nFinanzierung\n14 Wer finanziert die Familienzulagen\
      \ nach FLG?\nFamilienzulagen an landwirtschaftliche Arbeitnehmende werden teilweise \nvon den Arbeitgebenden finanziert.\
      \ Dabei bezahlen diese jeweils 2 % aller \nBar- und Naturallöhne, die in ihrem Betrieb ausgerichtet werden und der \n\
      AHV-Beitragspflicht unterliegen, an die kantonale Ausgleichskasse.\nDen Restbetrag sowie den Aufwand für die Familienzulagen\
      \ an Landwir -\ntinnen und Landwirte decken zu zwei Dritteln der Bund und zu einem \nDrittel die Kantone.\nVerfahren\n\
      15 Wo muss ich den Anspruch auf Familienzulagen geltend \nmachen?\nWenn Sie Familienzulagen beanspruchen, müssen Sie\
      \ diesen Anspruch mit \neinem dafür vorgesehenen Fragebogen bei der zuständigen Zweigstelle \ndes Wohnortes bzw. bei\
      \ der kantonalen Ausgleichskasse des Wohnsitz -\nkantons anmelden. Wenn Sie den Arbeitgeber gewechselt oder die Arbeit\
      \ \nfür längere Zeit unterbrochen haben (z. B. durch saisonbedingte Alphirt -\ntätigkeit), ist jeweils ein neuer Fragebogen\
      \ einzureichen. Nachdem die \nkantonale Ausgleichskasse den Fragebogen überprüft hat, erlässt sie eine \neinsprachefähige\
      \ Verfügung über den Anspruch auf Zulagen nach FLG.\f1116 Wann werden die Familienzulagen ausbezahlt?\nFamilienzulagen\
      \ werden in der Regel wie folgt ausbezahlt:\n•  an hauptberufliche Landwirtinnen und Landwirte sowie an Berufs-  \n\
      fischerinnen und Berufsfischer vierteljährlich;\n•  an nebenberufliche Landwirtinnen und Landwirte sowie an Älplerin\
      \ -\nnen und Älpler jährlich;\n•  an landwirtschaftliche Arbeitnehmende monatlich über ihren Arbeitg -\nber.\n17 Kann\
      \ ich die Familienzulagen nachfordern und müssen \ndie Familienzulagen zurückerstatten werden?\nSie können einen rückwirkenden\
      \ Anspruch auf die Auszahlung von Fa -\nmilienzulagen geltend machen. Er ist auf fünf Jahre ab dem Zeitpunkt, in \n\
      dem die Zulagen geschuldet waren, beschränkt. Sie müssen zu Unrecht \nbezogene Familienzulagen zurückerstatten.\n18\
      \ Muss ich Änderungen melden?\nÄnderungen der persönlichen, finanziellen und beruflichen Verhältnisse, \ndie sich auf\
      \ den Anspruch und die Höhe der Zulagen auswirken, müssen \nSie der zuständigen Ausgleichskasse oder Zweigstelle unaufgefordert\
      \ mel -\nden. Das betrifft auch solche, die zu einer Änderung in der Erstanspruchs -\nberechtigung führen.\nBeispiele:\n\
      •  Geburt oder Tod eines Kindes, Wegzug eines Kindes aus der Schweiz;\n•  Beginn, Abbruch oder Beendigung einer Ausbildung\
      \ eines Kindes;\n•  Heirat, Trennung oder Scheidung sowie Änderungen bei der elterli -\nchen Sorge;\n•  Aufnahme oder\
      \ Aufgabe der eigenen Erwerbstätigkeit oder derjenigen \ndes anderen Elternteils sowie Wechsel des Kantons, in dem der\
      \ andere \nElternteil erwerbstätig ist oder in dem das Kind wohnt;\n•  Übernahme des elterlichen Betriebes auf eigene\
      \ Rechnung.\nUngerechtfertigter Leistungsbezug und die Verletzung von Meldepflichten \nsind strafbar. \f12Auskünfte\
      \ und weitere  \nInformationen\nDieses Merkblatt vermittelt nur eine Übersicht. Für die Beurteilung \nvon Einzelfällen\
      \ sind ausschliesslich die gesetzlichen Bestimmungen \nmassgebend. Die Ausgleichskassen und ihre Zweigstellen geben\
      \ gerne \nAuskunft. Ein Verzeichnis aller Ausgleichskassen finden Sie unter  \nwww.ahv-iv.ch .\nHerausgegeben von der\
      \ Informationsstelle AHV/IV in Zusammenarbeit \nmit dem Bundesamt für Sozialversicherungen.\nAusgabe November 2024.\
      \ Auch auszugsweiser Abdruck ist nur mit \nschriftlicher Einwilligung der Informationsstelle AHV/IV erlaubt. \nDieses\
      \ Merkblatt kann bei den Ausgleichskassen und deren Zweig-  \nstellen sowie den IV-Stellen bezogen werden. Bestellnummer\
      \ 6.09/d. \nEs ist ebenfalls unter www.ahv-iv.ch  verfügbar.\n Weitere Informationen und Publikationen. \n6.09-25/01-D"
    - " finden Sie unter  \nwww.ahv-iv.ch .\nDie Zivilstandsbezeichnungen haben auch die folgende Bedeutung: \n•  Ehe/Heirat:\
      \ eingetragene Partnerschaft\n•  Scheidung: gerichtliche Auflösung der Partnerschaft\n•  Verwitwung: Tod des eingetragenen\
      \ Partners / der eingetragenen \nPartnerin\nHerausgegeben von der Informationsstelle AHV/IV in Zusammenarbeit \nmit\
