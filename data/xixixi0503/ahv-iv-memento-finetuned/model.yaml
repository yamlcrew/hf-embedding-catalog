    - "4.12 Leistungen der IV\nEingliederungsorientierte \nBeratung, Früherfassung  \nStand am 1. Januar 2024und Frühintervention\f\
      2Auf einen Blick\nDie eingliederungsorientierte Beratung, die Früherfassung und die Frühin -\ntervention sind präventive\
      \ Mittel der Invalidenversicherung (IV) und drei \nverschiedene Phasen im IV-Verfahren, die es zu unterscheiden gilt.\n\
      Mit der eingliederungsorientierten Beratung bietet die IV-Stelle unabhän -\ngig von einem konkreten Fall Beratungsgespräche\
      \ und allgemeine Informa -\ntionen zur IV an. \nIm Rahmen der Früherfassung sollen arbeitsunfähige, von Arbeitsunfähig\
      \ -\nkeit oder von Invalidität bedrohte Personen so rasch wie möglich mit Fach -\npersonen der IV in Kontakt treten.\
      \ Sobald der Kontakt hergestellt ist, wird \nmöglichst schnell darüber entschieden, ob eine IV-Anmeldung notwendig \n\
      ist. \nSobald eine IV-Anmeldung eingereicht wird, prüft die zuständige IV-Stelle \ngemeinsam mit der versicherten Person\
      \ und den involvierten Partnern, ob \ngeeignete Frühinterventionsmassnahmen den Erhalt des Arbeitsplatzes \noder eine\
      \ rasche Reintegration ins Arbeitsleben ermöglichen können.\nDieses Merkblatt informiert Versicherte, Eingliederungsakteure\
      \ sowie Mel -\ndeberechtigte über die eingliederungsorientierte Beratung, die Früherfas -\nsung und die Frühintervention.\n\
      \ \f3Eingliederungsorientierte Beratung\n1 Was ist eine eingliederungsorientierte Beratung?\nDie eingliederungsorientierte\
      \ Beratung umfasst niederschwellige und fall-  \nunabhängige Beratungsgespräche durch die IV-Stelle. Darunter fallen\
      \ bei -\nspielsweise allgemeine Informationen über den Auftrag und die Leistungen \nder IV, über den Umgang mit Erkrankungen\
      \ am Arbeitsplatz, die Meldung \nzur Früherfassung oder die Anmeldung für IV-Leistungen.\n2 An wen richtet sich die\
      \ eingliederungsorientierte  \nBeratung?\nDie eingliederungsorientierte Beratung richtet sich an versicherte Perso -\n\
      nen, Arbeitgebende, behandelnde Ärzte sowie betroffene Akteure des \nSchul- und Bildungswesens auf deren Ersuchen hin.\n\
      3 Besteht ein Rechtsanspruch auf eingliederungs-  \norientierte Beratung?\nEs besteht kein Rechtsanspruch auf eingliederungsorientierte\
      \ Beratung.\f4Früherfassungsphase \nFrüherfassung\n4 Was ist eine Früherfassung?\nDie Früherfassung zielt darauf ab,\
      \ dass die IV-Stelle so früh wie möglich mit \nPersonen in Kontakt tritt, die aus gesundheitlichen Gründen arbeitsunfähig\
      \ \noder von Arbeitsunfähigkeit bedroht sind und bei denen die Gefahr einer \nChronifizierung der gesundheitlichen Beschwerden\
      \ besteht. Kommt die \nIV-Stelle zum Schluss, dass ohne geeignete Massnahmen eine Invalidität \ndroht, fordert sie die\
      \ betroffene Person auf, sich bei der IV anzumelden. \nDie Früherfassung ermöglicht der IV ein rasches Eingreifen und\
      \ präventives \nVorgehen zugunsten der beruflichen Eingliederung. \n5 Können Jugendliche zur Früherfassung gemeldet\
      \  \nwerden?\nJa. Jugendliche und junge erwachsene Personen zwischen 13 und 25 Jah -\nren, können sich melden oder gemeldet\
      \ werden, wenn sie:\n•  von Invalidität bedroht sind, \n•  noch keine Erwerbstätigkeit ausgeübt haben und \n•  sich\
      \ in einem kantonalen Brückenangebot befinden oder von einer \nkantonalen Koordinationsstelle für Jugendliche in ihrer\
      \ beruflichen Ein -\ngliederung unterstützt werden.\nAuch Jugendliche, die bereits erwerbstätig waren und erwachsene\
      \ Perso -\nnen, die arbeitsunfähig oder von Arbeitsunfähigkeit bedroht sind, können \nsich melden oder gemeldet werden.\n\
      Meldung zur Früherfassung\n6 Wer kann eine Meldung einreichen?\nFolgende Personen und Instanzen können eine Meldung\
      \ einreichen:\n•  die versicherte Person sowie ihre gesetzliche Vertretung\n•  die mit der versicherten Person im gemeinsamen\
      \ Haushalt lebenden \nFamilienangehörigen \n•  die Arbeitgebenden\n•  die behandelnden Ärzte und Chiropraktiker \n•\
      \  der Krankentaggeldversicherer\f5•  die privaten Versicherungsunternehmen, die eine Krankentaggeld- \noder Rentenversicherung\
      \ anbieten\n•  der Unfallversicherer\n•  die Einrichtungen der beruflichen Vorsorge\n•  die Arbeitslosenversicherung\n\
      •  die Sozialhilfeorgane\n•  die Militärversicherung\n•  der Krankenversicherer\n•  die kantonalen Instanzen und Durchführungsstellen,\
      \ die für die Unter -\nstützung und die Förderung der beruflichen Eingliederung von Jugend -\nlichen zuständig sind\n\
      7 Wie erfolgt die Meldung?\nDie Meldung ist schriftlich bei der IV-Stelle des Wohnsitzkantons der ver -\nsicherten Person\
      \ einzureichen. Das Formular kann bei den IV-Stellen, den \nAusgleichskassen und deren Zweigstellen sowie unter www.ahv-iv.ch\
      \  be-\nzogen werden.\n8 Wird die versicherte Person vorgängig über die  \nMeldung informiert?\nJa. Personen und Instanzen,\
      \ die eine versicherte Person zur Früherfassung \nbei der IV-Stelle melden, müssen diese vorgängig darüber informieren.\n\
      9 Ist die Meldung zur Früherfassung eine Anmeldung für \nIV-Leistungen?\nNein. Die Meldung zur Früherfassung gilt nicht\
      \ als Anmeldung für Leistun -\ngen der IV. In der Früherfassungsphase werden keine Leistungen der IV \nzugesprochen.\f\
      6Früherfassungsgespräch\n10 Das Meldeformular wurde der IV-Stelle eingereicht,  \nwie geht es jetzt weiter?\nDie IV-Stelle\
      \ kann die gemeldete Person zu einem Gespräch einladen. In \ndiesem wird\n•  sie über den Zweck der Früherfassung informiert,\n\
      • eine Analyse ihrer medizinischen, beruflichen und sozialen Situation \nvorgenommen,\n•  sie darüber aufgeklärt, welche\
      \ Informationen die IV-Stelle bei wem ein -\nholt,\n• geprüft, ob eine IV-Anmeldung angezeigt ist.\n11 Wer kann an diesem\
      \ Gespräch teilnehmen?\nMit dem Einverständnis der versicherten Person können Dritte am Gespräch \nteilnehmen, zum Beispiel\
      \ die Person/Institution, welche den Fall gemeldet \nhat und/oder Arbeitgebende. Es steht der versicherten Person ebenfalls\
      \ \noffen, sich von einer Vertrauensperson begleiten zu lassen. Hält es die IV-\nStelle für angezeigt, kann auch ein\
      \ Arzt oder eine Ärztin des regionalen \närztlichen Dienstes (RAD) hinzugezogen werden.\n12 Wann erfolgt kein Gespräch?\n\
      Geht aus der Meldung bereits eindeutig hervor, dass eine sofortige  \nIV-Anmeldung angezeigt oder die IV nicht zuständig\
      \ ist, wird auf ein  \nGespräch verzichtet.\n13 Wo kann die IV-Stelle weitere Informationen einholen?\nGenügen die Informationen\
      \ aus dem Gespräch für den Entscheid nicht, \nkann die IV-Stelle mit der Vollmacht der versicherten Person weitere Infor\
      \ -\nmationen einholen, unter anderem bei medizinischem Fachpersonal, wei -\nteren Versicherungen, Arbeitgebenden oder\
      \ der Sozialhilfe.\nEnde der Früherfassungsphase\n14 Wann endet die Früherfassung?\nMit dem Eingang der IV-Anmeldung\
      \ oder der Mitteilung an die versicherte \nPerson, es sei keine solche nötig, endet die Früherfassungsphase. \f7Anmeldung\
      \ für IV-Leistungen\n15 Wer kann eine IV-Anmeldung einreichen?\nGrundsätzlich muss die versicherte Person die IV-Anmeldung\
      \ selbst einrei -\nchen. Auch ihr gesetzlicher Vertreter bzw. die Behörden oder Dritte, wel -\nche die Person regelmässig\
      \ unterstützen bzw. dauernd betreuen, können \neinen Anspruch auf Leistungen der IV geltend machen.\n16 Wie erfolgt\
      \ die Anmeldung?\nDie Anmeldung muss bei der IV-Stelle des Wohnsitzkantons der versicher -\nten Person eingereicht werden.\
      \ Das entsprechende Antragsformular kann \nbei den IV-Stellen, den Ausgleichskassen und deren Zweigstellen sowie un\
      \ -\nter www.ahv-iv.ch  bezogen werden. \nFrühinterventionsphase \nFrühintervention\n17 Was ist das Ziel der Frühintervention?\n\
      Ziel der Frühintervention ist es, durch rasches Handeln die Arbeits- und \nErwerbsfähigkeit der betroffenen Person möglichst\
      \ zu erhalten oder zu \nverbessern. Jugendliche, die bereits erwerbstätig waren, Arbeitsunfähige \noder von einer länger\
      \ dauernden Arbeitsunfähigkeit bedrohte Erwachsene, \nwerden dabei unterstützt, ihren Arbeitsplatz im bisherigen Betrieb\
      \ beizu -\nbehalten, bzw. betriebsintern oder in einem anderen Betrieb einen neuen \nArbeitsplatz zu übernehmen. \n\
      Mit den Frühinterventionsmassnahmen kann die IV auch Jugendliche und \njunge Erwachsene, die noch nicht erwerbstätig\
      \ waren und von einer Inva -\nlidität bedroht sind, frühzeitig auf dem Weg in eine berufliche Ausbildung \noder in eine\
      \ erste Anstellung im ersten Arbeitsmarkt unterstützen. \nDie Frühinterventionsphase beginnt mit der Einreichung der\
      \ IV-Anmeldung \nund erstreckt sich maximal über eine Dauer von zwölf Monaten.\f8Bestandsaufnahme\n18 Was beinhaltet\
      \ die Bestandsaufnahme?\nNach Eingang der IV-Anmeldung nimmt die IV-Stelle eine Bestandsauf -\nnahme vor. Diese hat\
      \ zum Ziel, ein umfassendes Bild von der Gesamt-  \nsituation der versicherten Person zu erhalten, das nebst den gesundheit\
      \ -\nlichen und beruflichen Aspekten, den Ressourcen und Einschränkungen \nauch die familiäre, soziale und finanzielle\
      \ Situation mitberücksichtigt. Ge -\nstützt auf diese Informationen entscheidet die IV-Stelle, ob Frühinterventi -\n\
      onsmassnahmen, Integrationsmassnahmen oder Massnahmen beruflicher \nArt angezeigt sind. \nAuf die Bestandsaufnahme kann\
      \ verzichtet werden, wenn aus der IV-An -\nmeldung hervorgeht, dass die Invalidenversicherung nicht zuständig, oder\
      \ \ndie Eingliederung nicht möglich ist oder wenn nicht die Frage der Einglie -\nderung oder der Rente im Zentrum steht,\
      \ sondern ein Hilfsmittel oder eine \nHilflosenentschädigung.\n19 Wer kann an der Bestandsaufnahme teilnehmen?\nDie\
      \ versicherte Person kann sich während der Bestandsaufnahme, die in \nForm eines oder mehrerer Gespräche stattfindet,\
      \ von weiteren Personen \nbegleiten lassen (z.B. Arbeitgebenden, behandelnde Ärztin oder behan -\ndelnder Arzt). Die\
      \ Gespräche werden von der Eingliederungsfachperson \ngeführt. Hält es die IV-Stelle für angezeigt, kann auch ein Arzt\
      \ oder eine \nÄrztin des regionalen ärztlichen Dienstes (RAD) hinzugezogen werden. \nEingliederungsplan \n20 Was beinhaltet\
      \ der Eingliederungsplan?\nGestützt auf die Bestandsaufnahme wird ein auf die versicherte Person \nzugeschnittener Eingliederungsplan\
      \ ausgearbeitet. Der Eingliederungsplan\n•  enthält die zu erreichenden Ziele und die vorgesehenen Massnahmen,\n•  regelt\
      \ die Kooperation zwischen den beteiligten Parteien,\n•  definiert die Verantwortlichkeiten und Fristen.\nAuf Basis\
      \ des Eingliederungsplanes kann eine Zielvereinbarung erstellt wer -\nden. \f921 Was sind Massnahmen der Frühintervention?\n\
      Massnahmen der Frühintervention sind: \nWährend der obligatorischen Schulzeit ab dem vollendeten 13. Altersjahr: \n\
      •  Berufsberatung\n•  Arbeitsvermittlung (Unterstützung bei der Suche nach einem Ausbil -\ndungsplatz)\nFür Jugendliche\
      \ nach der obligatorischen Schulzeit und für Erwachsene: \n•  Anpassungen des Arbeitsplatzes \n•  Ausbildungskurse \n\
      •  Arbeitsvermittlung (Unterstützung beim Arbeitsplatzerhalt und bei der \nStellensuche)\n•  Berufsberatung\n•  Sozialberufliche\
      \ Rehabilitation \n•  Beschäftigungsmassnahmen \n•  Beratung und Begleitung\n22 Besteht ein Rechtsanspruch auf  \nFrühinterventionsmassnahmen?\n\
      Nein. Es besteht kein Rechtsanspruch auf Frühinterventionsmassnahmen. \n23 Besteht Anspruch auf ein IV-Taggeld?\nNein.\
      \ Während der Durchführung dieser Massnahmen werden keine  \nTaggelder der IV ausbezahlt.\nEnde der Frühinterventionsphase\n\
      24 Wann endet die Frühintervention?\nDer Frühinterventionsprozess wird abgeschlossen durch einen Entscheid \nin Form\
      \ \n•  einer Mitteilung, dass der versicherten Person Integrationsmassnah -\nmen oder Massnahmen beruflicher Art gewährt\
      \ werden,\n•  der Mitteilung, die Rentenfrage werde geprüft, oder\n•  einer ablehnenden Leistungsverfügung.\f10Auskünfte\
      \ und weitere  \nInformationen\nDieses Merkblatt vermittelt nur eine Übersicht. Für die Beurteilung von \nEinzelfällen\
      \ sind ausschliesslich die gesetzlichen Bestimmungen mass -\ngebend. Die IV-Stellen, die Ausgleichskassen und ihre Zweigstellen\
      \  \ngeben gerne Auskunft. Ein Verzeichnis aller Ansprechpartner finden \nSie unter www.ahv-iv.ch .\nHerausgegeben von\
      \ der Informationsstelle AHV/IV in Zusammenarbeit \nmit dem Bundesamt für Sozialversicherungen.\nNachdruck November\
      \ 2024. Auch auszugsweiser Abdruck ist nur mit \nschriftlicher Einwilligung der Informationsstelle AHV/IV erlaubt. \n\
      Dieses Merkblatt kann bei den Ausgleichskassen und deren Zweig-  \nstellen sowie den IV-Stellen bezogen werden. Bestellnummer\
      \ 4.12/d. \nEs ist ebenfalls unter www.ahv-iv.ch  verfügbar.\n Weitere Informationen, Publikationen und Erklärvideos.\n\
      4.12-24/01-D"
  - source_sentence: Welche Personen sind vom schweizerischen System der sozialen Sicherheit erfasst?{SEP}Was ist ein bilaterales
      Abkommen über soziale Sicherheit?{SEP}Welche Leistungen erbringt die AHV?
    sentences:
    - "Seiten  \n2-18Informationen für Angehörige \nvon Staaten, mit welchen die \nSchweiz kein Sozialversiche -\nrungsabkommen\
      \ abgeschlos -\nsen hat\nPages  \n19-35Informations pour les ressor -\ntissants des Etats avec les -\nquels la Suisse\
      \ n’a pas conclu \nde convention de sécurité soci -\nale (Etats non contractants)\nPagine  \n36-53Informazioni per i\
      \ cittadini de -\ngli Stati con i quali la Svizzera \nnon ha concluso una convenzi -\none di sicurezza sociale (Stati\
      \ \nnon contraenti) \nPages  \n54-68Information for Citizens of \nStates with which Switzerland \nhas not concluded\
      \ a social  \nsecurity agreement (non-cont -\nracting states)Stand am 1. Januar 2025  \nEtat au 1er janvier 2025  \n\
      Stato al 1° gennaio 2025  \nAs of 1st January 2025 10.03\f2Informationen für Angehörige von \nStaaten, mit welchen die\
      \ Schweiz  \nkein Sozialversicherungsabkommen  \nabgeschlossen hat\nAuf einen Blick \nAngehörige von Staaten, mit welchen\
      \ die Schweiz kein Sozialversicherungs -\nabkommen abgeschlossen hat, und die in der Schweiz wohnen, können \nAnsprüche\
      \ im schweizerischen Sozialversicherungssystem erwerben. Das \nschweizerische Sozialversicherungssystem basiert auf\
      \ dem Drei-Säulen-Prin -\nzip: Die AHV und IV bilden in Verbindung mit den Ergänzungsleistungen \n(EL) die 1. Säule.\
      \ Sie soll den Existenzbedarf in angemessener Weise decken \nund ist obligatorisch. Die berufliche Vorsorge (Pensionskasse)\
      \ bildet die 2. \nSäule. Sie soll den Versicherten bzw. den Hinterlassenen im Vorsorgefall (Al -\nter, Tod, Invalidität)\
      \ die gewohnte Lebenshaltung weiter ermöglichen. Die 3. \nSäule (private Vorsorge) ergänzt die beiden anderen und ist\
      \ freiwillig. \nDieses Merkblatt gibt eine Übersicht über Versicherungspflicht und Leis -\ntungsansprüche der 1. und\
      \ 2. Säule und richtet sich an alle Angehörigen \nvon Staaten, mit denen die Schweiz kein Sozialversicherungsabkommen\
      \ \nabgeschlossen hat.\nDie Schweiz hat mit den folgenden Staaten ein Sozialver-  \nsicherungsabkommen abgeschlossen:\
      \ \nEU-Staaten Indien (Unterstellung) San Marino\nEFTA-Staaten Israel Serbien\nAlbanien Japan Südkorea (Unterstellung)\n\
      Australien Kanada/Quebec Tunesien\nBosnien und Herzegowina Kosovo Türkei\nBrasilien Montenegro Uruguay\nChile Nordmazedonien\
      \ USA\nChina (Unterstellung) Philippinen Vereinigtes Königreich\nDie Liste der Staaten, mit denen die Schweiz ein Sozialversiche\
      \ -\nrungsabkommen abgeschlossen hat, finden Sie auf der Internet -\nseite des Bundesamtes für Sozialversicherungen\
      \ (BSV):\nDas vorliegende Merkblatt betrifft Sie, wenn Sie Angehörige oder Ange -\nhöriger eines Staates sind, der nicht\
      \ auf dieser Liste aufgeführt ist (ausser \nHinterlassene von Schweizerinnen und Schweizern und Vertragsstaatsan -\n\
      gehörigen).\f3Das schweizerische Sozialversicherungssystem\n1 Wie ist das schweizerische Sozialversicherungssystem \n\
      aufgebaut?\nDie schweizerische Sozialversicherung besteht aus folgenden Zweigen:\n•  Alters-, Hinterlassenen- und Invalidenversicherung\
      \ (AHV/IV)\n•  Berufliche Alters-, Hinterlassenen- und Invalidenvorsorge (BV)\n•  Krankenversicherung (KV)\n•  Unfallversicherung\
      \ (UV)\n•  Arbeitslosenversicherung (ALV)\n•  Familienzulagen (FZ)\n•  Erwerbsersatz für Dienstleistende in Armee, Zivildienst\
      \ oder Zivilschutz, \nsowie bei Mutterschaft, Elternschaft, für Eltern, die ein gesundheitlich \nschwer beeinträchtigtes\
      \ Kind betreuen oder bei Adoption (EO)\n• Ergänzungsleistungen (EL)\n• Überbrückungsleistungen für ältere Arbeitslose\
      \ (ÜL)\n2 Wann bin ich bei der AHV/IV versichert?\nDie AHV und die IV sind allgemeine Pflichtversicherungen, die alle\
      \ in der \nSchweiz wohnhaften oder erwerbstätigen Personen umfassen. Diese Versi -\ncherungspflicht gilt grundsätzlich\
      \ auch für ausländische Staatsangehörige. \n3 Wie erfahre ich meine AHV-Nummer?\nDie AHV-Nummer steht auf der Krankenversicherungskarte\
      \ sowie auf dem \npersönlichen Versicherungsausweis AHV/IV. Wenden Sie sich bitte an Ihre \nAusgleichskasse, wenn Sie\
      \ versichert sind und weder eine Krankenversi -\ncherungskarte noch einen Versicherungsausweis AHV/IV haben. Bewahren\
      \ \nSie den Versicherungsausweis auf. Sie legen die Krankenversicherungskarte \noder den Versicherungsausweis AHV/IV\
      \ bei jedem Stellenwechsel dem neuen \nArbeitgeber vor. Dies gilt auch, wenn Sie sich zum Leistungsbezug anmel -\nden.\
      \ Wichtig: Bei Schriftverkehr mit den Ausgleichskassen müssen Sie die  \nAHV-Nummer angeben.\f4Beiträge\n4 Wann beginnt\
      \ meine Beitragspflicht bei der AHV/IV?\nAls nichterwerbstätige Person müssen Sie ab dem 1. Januar nach dem 20. \nGeburtstag\
      \ bis zum Erreichen des Referenzalters Beiträge bezahlen. Für \nErwerbstätige beginnt die Beitragspflicht mit der Aufnahme\
      \ der Erwerbstä -\ntigkeit, frühestens jedoch am 1. Januar nach dem 17. Geburtstag.\n5 Wie werden meine AHV/IV/EO-Beiträge\
      \ erhoben?\nDie AHV/IV/EO-Beiträge werden wie folgt erhoben:\n•  Arbeitnehmende:\n Die Beiträge werden prozentual vom\
      \ abrechnungspflichtigen Lohn er -\nhoben. Hinzu kommen die Beiträge an die Arbeitslosenversicherung \n(ALV). Diese\
      \ Beiträge werden je zur Hälfte von Ihnen als Arbeitneh -\nmerin oder Arbeitnehmer (Lohnabzug) und Ihrem Arbeitgeber\
      \ getra -\ngen. Ihr Arbeitgeber zieht Ihnen die Beiträge bei jeder Lohnzahlung ab \nund überweist sie zusammen mit seinen\
      \ Beiträgen an die Ausgleichs -\nkasse. Dazu kommen allenfalls Beiträge für weitere Sozialversiche -\nrungszweige (siehe\
      \ Merkblätter 2.01 - Lohnbeiträge an die AHV, die \nIV und die EO  und 2.08 - Beiträge an die Arbeitslosenversicherung\
      \ ).\n•  Selbstständigerwerbende:\n Selbstständigerwerbende rechnen ihre Beiträge direkt mit der Aus -\ngleichskasse\
      \ ab. Die Beiträge werden in Prozenten des Einkommens \nfestgelegt, das auf der Veranlagung zur direkten Bundessteuer\
      \ ange -\ngeben und der Ausgleichskasse von der Steuerbehörde mitgeteilt wird. \nHinzu kommen gegebenenfalls die Beiträge\
      \ für andere Sozialversiche -\nrungszweige. Es ist Aufgabe der Ausgleichskasse, festzustellen, ob die \nversicherte\
      \ Person im Sinne der AHV selbstständig erwerbend ist (siehe \nMerkblatt 2.02 - Beiträge der Selbstständigerwerbenden\
      \ an die AHV, \ndie IV und die EO ).\n•  Nichterwerbstätige:\n Ihre Beiträge richten sich nach Ihrem Vermögen und Renteneinkom\
      \ -\nmen. Sie werden von der Ausgleichskasse Ihres Wohnsitzkantons fest -\ngesetzt. Wenn Sie älter als 58 Jahre sind,\
      \ werden die Beiträge von der -\njenigen Ausgleichskasse festgesetzt, bei welcher Sie zuletzt Beiträge \nals arbeitnehmende\
      \ Person entrichtet haben ( siehe Merkblatt 2.03 - \nBeiträge der Nichterwerbstätigen an die AHV, die IV und die EO\
      \ ).\f5Leistungen der AHV\n6 Welche Leistungen erbringt die AHV?  \nDie AHV erbringt folgende Leistungen:\n•  Altersrenten\
      \ für Frauen und Männer, die das Referenzal -\nter erreicht haben. Für Männer liegt das Referenzalter bei  \n65 Jahren\
      \ und für Frauen wird es ab 2025 schrittweise von 64 auf 65 \nJahre erhöht. So wird das Referenzalter ab 2028 für alle\
      \ gleich sein, \nnämlich 65 Jahre (siehe Merkblatt 3.01 - Altersrenten und Hilflose -\nnentschädigungen der AHV ). Die\
      \ Altersrente kann vorbezogen oder \naufgeschoben werden. Die vorbezogene Rente wird gekürzt während \ndie aufgeschobene\
      \ Rente erhöht wird (siehe Merkblatt 3.04 - Flexible r \nRentenbezug ).\n•  Kinderrenten für Kinder von Altersrentnerinnen\
      \ und Altersrentnern. \nDer Anspruch dauert bis zum 18. Geburtstag des Kindes oder bis zum \nAbschluss der Lehre oder\
      \ des Studiums, längstens aber bis zum 25. \nGeburtstag.\n•  Witwen- und Witwerrenten.\n•  Waisenrenten für Waisen bis\
      \ zum 18. Geburtstag oder bis zum Ab -\nschluss der Lehre oder des Studiums, längstens aber bis zum 25. Ge -\nburtstag.\n\
      •  Hilflosenentschädigungen gemäss Ziffer 8.\n• Hilfsmittel gemäss Ziffer  9.\n7 Wann erhalte ich eine Leistung der\
      \ AHV?\nStaatsangehörige eines Staates, mit dem die Schweiz kein Sozialversiche -\nrungsabkommen abgeschlossen hat (Nichtvertragsstaat),\
      \ sowie ihre Hin -\nterbliebenen (Witwe, Witwer, Waise), haben Anspruch auf eine Rente der \nAHV, sofern sie\n•  in\
      \ der Schweiz wohnen, und\n•  während mindestens eines vollen Jahres Beiträge entrichtet haben, \noder \n•  während\
      \ mindestens eines vollen Jahres durch einen erwerbstätigen \nEhepartner, der mindestens den doppelten Mindestbeitrag\
      \ bezahlt \nhat, mitversichert waren, oder\n•  während mindestens eines vollen Jahres Erziehungs- und Betreuungs -\n\
      gutschriften aufweisen können.\nBei Hinterlassenenrenten muss die verstorbene Person mindestens ein  \nvolles Jahr versichert\
      \ gewesen sein. \f68 Wann habe ich Anspruch auf eine  \nHilflosenentschädigung?\nAls Altersrentnerin oder Altersrentner\
      \ sowie Bezügerin oder Bezüger von \nErgänzungsleistungen mit Wohnsitz und gewöhnlichem Aufenthalt in der \nSchweiz,\
      \ haben Sie Anspruch auf eine Hilflosenentschädigung, wenn Sie \nseit mindestens sechs Monaten in leichtem, mittelschwerem\
      \ oder schwe -\nrem Grade hilflos sind. Hilflos ist, wer für alltägliche Lebensverrichtungen \n(Ankleiden, Essen, Körperpflege\
      \ usw.) dauernd auf die Hilfe Dritter ange -\nwiesen ist, einer dauernden Pflege oder einer persönlichen Überwachung\
      \ \nbedarf. \nHilflosenentschädigungen werden nicht ins Ausland bezahlt. \n9 Wann habe ich Anspruch auf Hilfsmittel\
      \ der AHV?\nWohnen Sie in der Schweiz und sind Bezügerin oder Bezüger einer Alters -\nrente, erhalten Sie unter bestimmten\
      \ Voraussetzungen Hilfsmittel der AHV \n(Hörgeräte, Lupenbrillen, Prothesen, Rollstühle etc.). \nWeitere Informationen\
      \ dazu finden Sie im Merkblatt 3.02 - Hilfsmittel der AHV.\nLeistungen der IV \n10 Welche Leistungen erbringt die IV?\n\
      Die IV gewährt in erster Linie Eingliederungsmassnahmen. IV-Renten wer -\nden nur ausgerichtet, wenn Eingliederungsmassnahmen\
      \ ihr Ziel nicht oder \nnur teilweise erreicht haben oder von vornherein aussichtslos sind.\nDie IV erbringt folgende\
      \ Leistungen:\n•  Frühinterventionsmassnahmen:\n Diese haben zum Ziel, den bestehenden Arbeitsplatz von arbeitsun -\n\
      fähigen Personen zu erhalten, sie an einem anderen Arbeitsplatz ein -\nzugliedern oder Jugendliche beim Eintritt in\
      \ eine erstmalige berufliche \nAusbildung zu unterstützen .\n•  Eingliederungsmassnahmen:\n Diese haben zum Ziel, die\
      \ gegenwärtige oder zukünftige Erwerbsfähig -\nkeit zu verbessern (z. B. Umschulung, Hilfsmittel).\n•  Invalidenrente:\n\
      \ Diese hat das Ziel, die langandauernden wirtschaftlichen Folgen der In -\nvalidität im Rahmen einer angemessenen Deckung\
      \ des Existenzbedar -\nfes auszugleichen. Sie kann frühestens nach dem 18. Geburtstag be -\nansprucht werden. Der Invaliditätsgrad\
      \ bestimmt die Höhe der Rente.\f7•  Kinderrenten:\n Diese werden bei Invalidität eines Elternteils ausgerichtet. Der\
      \ Anspruch \ndauert bis zum 18. Geburtstag des Kindes oder bis zum Abschluss der \nLehre oder des Studiums, höchstens\
      \ aber bis zum 25. Geburtstag.\n•  Hilflosenentschädigungen und Assistenzbeitrag gemäss Ziffer 14.\n11 Wann habe ich\
      \ Anspruch auf  \nEingliederungsmassnahmen?\nGehören Sie einem Staat an, mit dem die Schweiz kein Sozialversicherungs\
      \ -\nabkommen abgeschlossen hat (Nichtvertragsstaat), haben Sie Anspruch \nauf Eingliederungsmassnahmen, sofern Sie\
      \ bei Eintritt des Versicherungs -\nfalles\n•  während mindestens eines vollen Jahres Beiträge entrichtet haben, \n\
      oder\n•  in der Schweiz während eines vollen Jahres mit dem erwerbstätigen \nEhepartner gelebt haben, der mindestens\
      \ den doppelten Mindestbei -\ntrag bezahlt hat, oder\n•  ein Jahr Erziehungs- oder Betreuungsgutschriften aufweisen,\
      \ oder\n•  sich ununterbrochen während zehn Jahren in der Schweiz aufgehalten \nhaben.\n12 Haben auch Kinder Anspruch\
      \ auf  \nEingliederungsmassnahmen?\nKindern unter 20 Jahren steht der Anspruch auf Eingliederungsmassnah -\nmen auch\
      \ dann zu, wenn nur ein Elternteil die unter Ziffer 11 genannten \nVoraussetzungen erfüllt und sie selbst in der Schweiz\
      \ invalid geboren wur -\nden, oder sich bei Eintritt der Invalidität seit mindestens einem Jahr oder \nseit der Geburt\
      \ ununterbrochen in der Schweiz aufgehalten haben. Aus -\nnahmsweise besteht ein solcher Anspruch auch für im Ausland\
      \ geborene \nKinder, wenn ihre Mutter unmittelbar vor der Geburt während höchstens \nzwei Monaten im Ausland wohnte.\n\
      13 Wann habe ich Anspruch auf eine IV-Rente?\nUm Anspruch auf eine ordentliche IV-Rente zu haben, müssen Sie bis zum\
      \ \nEintritt der Invalidität während mindestens drei vollen Jahren Beiträge an die \nschweizerische Versicherung geleistet\
      \ haben und in der Schweiz wohnen.\f814 Wann habe ich Anspruch auf eine  \nHilflosenentschädigung oder einen Assistenzbeitrag?\n\
      Wohnen Sie in der Schweiz und bedürfen aufgrund der Invalidität für die \nalltäglichen Lebensverrichtungen (Ankleiden,\
      \ Essen, Körperpflege usw.) \ndauernd der Hilfe anderer Personen oder der persönlichen Überwachung, \nso haben Sie Anspruch\
      \ auf eine Hilflosenentschädigung, sofern Sie die  \nVoraussetzungen gemäss Ziffer 11 erfüllen. Die Bezügerinnen und\
      \ Bezü -\nger einer Hilflosenentschädigung, die auf regelmässige Hilfe angewiesen \nsind, aber dennoch zu Hause leben\
      \ möchten, können dank des Assistenz -\nbeitrages eine Person einstellen, welche die erforderlichen Hilfeleistungen\
      \ \nerbringt. Dauert die Hilflosigkeit auch nach der Umwandlung der Invali -\nden- in eine Altersrente an, werden die\
      \ Hilflosenentschädigung und der \nAssistenzbeitrag in der bisherigen Höhe weiter gewährt. \nHilflosenentschädigungen\
      \ und Assistenzbeiträge werden nicht ins Ausland \nausbezahlt.\nErgänzungsleistungen\n15 Meine AHV- oder IV-Rente deckt\
      \ die Lebenskosten \nnicht, was kann ich tun?\nBeziehen Sie eine Geldleistung (AHV- bzw. IV-Rente, nach Vollendung des\
      \ \n18. Altersjahres eine Hilflosenentschädigung der IV oder während min -\ndestens sechs Monaten ein IV-Taggeld) und\
      \ leben in bescheidenen wirt -\nschaftlichen Verhältnissen, haben Sie unter bestimmten Voraussetzungen \nAnspruch auf\
      \ Ergänzungsleistungen. \nWenn Sie das Referenzalter erreicht haben, invalid, verwitwet oder ver -\nwaist sind und dennoch\
      \ keinen Anspruch auf eine Rente haben, weil Sie \nkeine oder nicht lange genug Beiträge geleistet haben, kann unter\
      \ gewis -\nsen Voraussetzungen trotzdem einen Anspruch auf Ergänzungsleistungen \ngeltend gemacht werden. \nWenn Sie\
      \ nicht in der Schweiz wohnen, haben Sie keinen Anspruch auf \nErgänzungsleistungen.\nWeitere Informationen dazu finden\
      \ Sie im Merkblatt 5.01 - Ergänzungs -\nleistungen zur AHV und IV  und im Merkblatt 5.02 - Ihr Recht auf Ergän -\nzungsleistungen\
      \ zur AHV und IV .\f9Rentenberechnung\n16 Wie berechnen sich meine AHV- und IV-Renten? \nDie Berechnung Ihrer AHV- und\
      \ IV-Renten richtet sich nach der Beitrags -\ndauer, den Erwerbseinkommen sowie den Erziehungs- und Betreuungsgut -\n\
      schriften. Beiträge an eine ausländische Versicherung und entsprechende \nBeitragszeiten können weder auf die schweizerische\
      \ AHV/IV übertragen \nnoch auf andere Weise berücksichtigt werden.\nBeitragsüberweisung\n17 Ist eine Beitragsüberweisung\
      \ an die Versicherung  \nmeines Heimatstaates möglich?\nEine Überweisung Ihrer Schweizer AHV/IV-Beiträge an die Versicherung\
      \ \nIhres Heimatstaates ist nicht möglich. \nBeitragsrückvergütung\n18 Können meine Beiträge rückvergütet werden?\n\
      Wenn Sie im Ausland wohnen und einem Nichtvertragsstaat angehören, \nkönnen Sie unter bestimmten Voraussetzungen ein\
      \ Gesuch einreichen, \ndamit Ihnen die AHV-Beiträge zinslos rückvergütet werden, wenn Sie die \nSchweiz definitiv verlassen.\
      \ Voraussetzung für die Beitragsrückvergütung \nist unter anderem, dass Sie während mindestens eines vollen Jahres Bei\
      \ -\nträge entrichtet haben. \nAnmeldung\n19 Wo muss ich die Anmeldung für den Leistungsbezug \neinreichen?\nDie Anmeldung\
      \ zum Bezug von Leistungen können Sie bei den folgenden \nStellen, die auch die entsprechenden Formulare abgeben, einreichen.\
      \ \nBei Wohnsitz in der Schweiz:\n•  für AHV-Leistungen:   \nbei der Ausgleichskasse, an die zuletzt Beiträge entrichtet\
      \ wurden\n•  für IV-Leistungen:   \nbei der IV-Stelle des Wohnsitzkantons\f10Die Anmeldung müssen Sie möglichst bald\
      \ nach der Erfüllung der  \nAnspruchsvoraussetzungen einreichen. \nBei Wohnsitz im Ausland:\nFür die Rückvergütung der\
      \ Beiträge nach Ziffer 18, bei der \nSchweizerischen Ausgleichskasse  \nAvenue Ed.-Vaucher 18  \nPostfach 3100  \nCH-1211\
      \ Genf 2\n20 Wo muss ich den Anspruch auf Leistungen einer  \nausländischen Versicherung geltend machen?\nWenn Sie in\
      \ der Schweiz wohnen, einem Nichtvertragsstaat angehören \nund Anspruch auf Leistungen einer ausländischen Versicherung\
      \ geltend \nmachen möchten, müssen Sie sich direkt an die betreffende Versicherungs -\nanstalt oder an eine Vertretung\
      \ des ausländischen Staates in der Schweiz \nwenden.\n21  Wo erhalte ich Auskunft und weitere Informationen?\nDie Ausgleichskassen,\
      \ ihre Zweigstellen und die IV-Stellen geben Ihnen \ngerne Auskunft. Ein Verzeichnis der Ausgleichskassen finden Sie\
      \ im Inter -\nnet unter www.ahv-iv.ch .\nWohnen Sie im Ausland und gehören einem Nichtvertragsstaat an, so  \nwenden\
      \ Sie sich an die \nSchweizerische Ausgleichskasse  \nAvenue Ed.-Vaucher 18  \nPostfach 3100  \nCH-1211 Genf 2\nDie\
      \ Broschüre Soziale Sicherheit in der Schweiz  enthält weitere Informatio -\nnen. Sie steht Ihnen auf der Website www.ahv-iv.ch\
      \  zur Verfügung. \f11Berufliche Vorsorge (Pensionskasse)\n22 Welche Versicherungspflichten und Leistungsansprüche \n\
      bestehen in der beruflichen Vorsorge?\nDie berufliche Vorsorge (Pensionskasse) soll in Ergänzung zu der AHV/IV/\nEO\
      \ den Versicherten bzw. den Hinterlassenen im Vorsorgefall (Alter, Tod, \nInvalidität) die gewohnte Lebenshaltung weiter\
      \ ermöglichen. Sie ist für Er -\nwerbstätige ab einem Jahreseinkommen von über 22 680 Franken obliga -\ntorisch. \n\
      Sind Sie der beruflichen Vorsorge unterstellt, so haben Sie Anspruch auf:\n• eine Altersrente beim Erreichen des Referenzalters\
      \ oder zu einem frü -\nheren Zeitpunkt entsprechend dem Reglement der Pensionskasse;\n•  eine Invalidenrente, wenn Sie\
      \ mindestens 40 % invalid sind und wenn \nSie im Zeitpunkt, in dem die Invaliditätsursache aufgetreten ist, versi -\n\
      chert waren (die Reglemente der Pensionskassen können vorteilhaftere \nBestimmungen vorsehen);\n•  Leistungen für Hinterbliebene\
      \ (Witwen, Witwer und Kinder) im Todes -\nfall der versicherten Person;\n•  eine Austrittsleistung (= Freizügigkeitsleistung),\
      \ falls keines der drei  \ngenannten Ereignisse eintritt und Sie die Pensionskasse des Arbeitge -\nbers verlassen. \n\
      Die Renten der beruflichen Vorsorge werden auch ins Ausland ausbezahlt.\n23 Wann erhalte ich aus der Pensionskasse \
      \ \neine Austrittsleistung?\nIm Allgemeinen wird beim Austritt aus der Pensionskasse (normalerweise \nam Ende des Arbeitsverhältnisses)\
      \ die Austrittsleistung auf ein Freizügig -\nkeitskonto oder auf eine Freizügigkeitspolice überwiesen. Verlassen Sie\
      \ die \nSchweiz definitiv in Richtung eines Staates ausserhalb der EU oder der EFTA, \nkönnen Sie eine Barauszahlung\
      \ der Leistung verlangen. Das entsprechende \nGesuch ist an die Pensionskasse des letzten Arbeitgebers zu richten.\n\
      Eine Barauszahlung der Austrittsleistung im BVG-Minimum ist nicht mög -\nlich, wenn Sie die Schweiz verlassen, aber\
      \ obligatorisch in einem Mit -\ngliedstaat der EU gegen die Risiken Alter, Tod und Invalidität versichert \nbleiben.\
      \ Sie können hingegen verlangen, dass Ihnen der überobligatori -\nsche Teil der Austrittsleistung bar ausbezahlt wird.\
      \ Dieselbe Regelung gilt \nauch, wenn Sie ausreisen und sich in Island oder Norwegen niederlassen.  \f12Wenn eine Barauszahlung\
      \ nicht möglich ist, wird der Betrag auf ein ge -\nsperrtes Freizügigkeitskonto oder eine gesperrte Freizügigkeitspolice\
      \ über -\nwiesen. Wenn Sie nach Liechtenstein ausreisen, wird die Austrittsleistung \nan die Vorsorgeeinrichtung des\
      \ Liechtensteiner Arbeitgebers überwiesen. \nIn diesem Fall besteht keine Möglichkeit einer Barauszahlung.\n24 An wen\
      \ muss ich mich bei einem Austritt wenden?\nSie müssen sich an die Pensionskasse Ihres letzten Arbeitgebers wenden.\
      \ \nEs ist deshalb sehr wichtig, dass Sie sämtliche Versicherungsbestätigungen, \ndie Sie von der Pensionskasse erhalten\
      \ haben, aufbewahren. Verlassen Sie \ndie Schweiz, ohne Ihrer Pensionskasse mitzuteilen, wohin die Austrittsleis -\n\
      tung zu bezahlen ist, oder ohne eine Barleistung erhalten zu haben, ist die \nPensionskasse verpflichtet, den Betrag\
      \ spätestens zwei Jahre nach Ihrem \nAustritt an die Auffangeinrichtung zu überweisen.\n25  Wo erhalte ich Auskunft\
      \ zu den Austrittsleistungen? \nAuskünfte im Zusammenhang mit nicht beanspruchten Austrittsleistungen \nerteilt Ihnen\
      \ die Pensionskasse. Ausserdem informiert Sie die Zentralstelle \nder 2. Säule über die Geltendmachung der Ansprüche:\n\
      Zentralstelle 2. Säule  \nSicherheitsfonds BVG  \nPostfach 1023  \n3000 Bern 14  \nTel. 031 380 79 75  \ninfo@zentralstelle.ch\
      \  \nwww.sfbvg.ch\f13Krankenversicherung\n26 Welche Versicherungspflicht und Leistungsansprüche \nbestehen in der Krankenversicherung?\
      \ \nGrundsätzlich müssen sich alle Personen mit Wohnsitz in der Schweiz  \ninnerhalb von drei Monaten seit der Wohnsitznahme\
      \ oder der Geburt in \nder Schweiz bei einem schweizerischen Krankenversicherer versichern. \nAuch ins Ausland entsandte\
      \ Arbeitnehmende sowie die sie begleiten -\nden nichterwerbstätigen Familienangehörigen sind in der Schweiz versi -\n\
      cherungspflichtig. Die Prämien und Kostenbeteiligungen (Franchise und \nSelbstbehalt) sind von den versicherten Personen\
      \ selbst zu bezahlen. Die \nsoziale Krankenversicherung gewährt Leistungen bei Krankheit, Unfall \n(soweit dafür keine\
      \ Unfallversicherung aufkommt) und Mutterschaft. Die \nKrankenversicherer vergüten im Krankheitsfall die Krankenpflegekosten\
      \ \nabzüglich der gesetzlich vorgeschriebenen Kostenbeteiligung. Auch die \nKosten von Behandlungen, die in Notfällen\
      \ im Ausland (ausserhalb der \nEU/EFTA) erbracht werden, werden bis zum doppelten Betrag der Kosten \nübernommen, die\
      \ in der Schweiz vergütet würden. Versicherte, die nicht \nAngehörige eines Mitgliedstaates der EU oder der EFTA sind,\
      \ haben, ge -\nmäss eines Sozialversicherungsabkommens zwischen Deutschland und der \nSchweiz, bei einem Aufenthalt\
      \ in Deutschland im Notfall Anspruch auf die \nÜbernahme der Behandlungskosten.\nUnfallversicherung\n27 Welche Versicherungspflicht\
      \ und Leistungsansprüche \nbestehen in der Unfallversicherung? \nArbeitnehmende sind in der schweizerischen Unfallversicherung\
      \ bei Be -\nrufs- und Nichtberufsunfällen (falls wöchentlich mindestens acht Stunden \nerwerbstätig beim gleichen Arbeitgeber)\
      \ sowie bei Berufskrankheiten ob -\nligatorisch versichert. Die Prämien für die Berufsunfall- und Berufskrank -\nheitenversicherung\
      \ werden vom Arbeitgeber bezahlt. Die Prämie für die \nVersicherung der Nichtberufsunfälle ist von der Arbeitnehmerin\
      \ oder vom \nArbeitnehmer zu tragen und wird vom Lohn abgezogen. Abweichende \nVereinbarungen zugunsten der Arbeitnehmerin\
      \ oder des Arbeitnehmers \nbleiben vorbehalten. Die Versicherung gewährt unter anderem die Heilbe -\nhandlung, Taggelder\
      \ und Renten. Auch Nichtberufsunfälle im Ausland sind \ngedeckt. Auskünfte erteilt Ihnen der Unfallversicherer des Arbeitgebers.\f\
      14Arbeitslosenversicherung\n28 Welche Versicherungspflicht und Leistungsansprüche \nbestehen in der Arbeitslosenversicherung?\n\
      Alle Personen, die in der Schweiz eine unselbstständige Erwerbstätigkeit \nausüben, sind obligatorisch gegen Arbeitslosigkeit\
      \ versichert. Der Beitrag \nwird je zur Hälfte von den Arbeitnehmenden (Lohnabzug) und von den \nArbeitgebern getragen.\
      \ Leistungen erhalten alle arbeitslosen Versicherten, \ndie ihren Wohnsitz in der Schweiz haben, sich arbeitslos melden\
      \ beim Re -\ngionalen Arbeitsvermittlungszentrum und die übrigen Anspruchsvoraus -\nsetzungen des Arbeitslosenversicherungsgesetzes\
      \ erfüllen. Weitere Infor -\nmationen sind unter www.arbeit.swiss  oder bei der Arbeitsverwaltung des \nWohnkantons\
      \ erhältlich. \nMerkblätter über die Arbeitslosenversicherung sowie Informationen für \nStellensuchende können Sie auch\
      \ im Internet unter www.arbeit.swiss  ab-\nrufen. \nÜberbrückungsleistungen für ältere Arbeitslose\n29 Was sind Überbrückungsleistungen\
      \ für ältere  \nArbeitslose?\nArbeitslose Personen, die nach dem 60. Geburtstag von der Arbeitslosen -\nversicherung\
      \ ausgesteuert werden und kein ausreichendes Einkommen \nmehr finden, können bis zur Pensionierung Überbrückungsleistungen\
      \ er -\nhalten. \n30 Wann kann ich einen Anspruch auf  \nÜberbrückungsleistungen haben bzw. wann nicht?\nSie können\
      \ Überbrückungsleistungen erhalten, wenn Sie \n• im Monat, in dem Sie 60 Jahre alt werden, oder danach ausgesteuert\
      \ \nwerden; \n• mindestens 20 Jahre in der Alters- und Hinterlassenenversicherung \n(AHV) der Schweiz versichert waren,\
      \ davon mindestens fünf Jahre \nnach dem 50. Geburtstag sowie eine gewisse Einkommenshöhe erzielt \nhaben; sowie \n\
      • nicht mehr als 50 000 Franken (Alleinstehende) oder 100 000 Franken \n(Ehepaare) Vermögen haben, wobei selbstbewohnte\
      \ Liegenschaften \nnicht berücksichtigt werden; \f15• den Wohnsitz und tatsächlichen Aufenthalt in der Schweiz oder\
      \ in ei -\nnem Mitgliedstaat der EU oder EFTA haben;\n• anerkannte Ausgaben haben, die Ihre anrechenbaren Einnahmen\
      \ \nübersteigen (wirtschaftliche Voraussetzung).\nSie erhalten keine Überbrückungsleistungen, wenn Sie \n• einen Anspruch\
      \ auf eine Rente der AHV oder der IV haben; \n• vor dem 60. Geburtstag ausgesteuert werden; \n• vor dem 1. Juli 2021\
      \ ausgesteuert wurden.\nWeitere Informationen dazu finden Sie im Merkblatt 5.03 - Überbrü -\nckungsleistungen für ältere\
      \ Arbeitslose . \nFamilienzulagen\n31 Habe ich Anspruch auf Familienzulagen?\nSind Sie in der Schweiz versichert und\
      \ erwerbstätig, haben Sie für Ihre in \nder Schweiz lebenden Kinder grundsätzlich Anspruch auf Familienzulagen, \nsofern\
      \ Sie ein AHV-pflichtiges Einkommen von mindestens 7 560 Franken \npro Jahr bzw. 630 Franken pro Monat erzielen.\nDies\
      \ beinhaltet:\n• eine Kinderzulage von mindestens 215 Franken pro Monat; sie wird ab \ndem Geburtsmonat des Kindes bis\
      \ und mit dem Monat ausgerichtet, \nin dem der 16. Geburtstag des Kindes liegt; besteht bereits vor dem \n16. Geburtstag\
      \ Anspruch auf eine Ausbildungszulage, so wird diese \nanstelle der Kinderzulage ausgerichtet; ausserdem wird die Kinderzu\
      \ -\nlage für Kinder zwischen 16 und 20 Jahren entrichtet, die aufgrund \neiner gesundheitlichen Beeinträchtigung nicht\
      \ in der Lage sind, eine \nErwerbstätigkeit auszuüben.\n• eine Ausbildungszulage von mindestens 268 Franken pro Monat;\
      \ sie \nwird ab dem Monat, in dem das Kind eine nachobligatorische Aus -\nbildung beginnt, ausgerichtet, frühestens\
      \ jedoch für den Monat in \ndem der 15. Geburtstag des Kindes liegt; für Kinder, die nach dem 16. \nGeburtstag noch\
      \ die obligatorische Schule besuchen, besteht ab dem \nMonat, der auf den 16. Geburtstag folgt, ebenfalls Anspruch auf\
      \ Aus -\nbildungszulagen; die Ausbildungszulage wird bis zum Abschluss der \nAusbildung ausgerichtet, längstens jedoch\
      \ bis zum Ende des Monats, \nin dem das Kind das 25 Jahre alt wird.\nFamilienzulagen für im Ausland wohnende Kinder\
      \ werden nur exportiert, \nwenn dies in einem entsprechenden Sozialversicherungsabkommen so vor -\ngesehen ist.\f16Leistungen\
      \ der EO \n32 Wer hat Anspruch auf Mutterschaftsentschädigung?\nAnspruch auf Mutterschaftsentschädigung haben Frauen,\
      \ die im Zeitpunkt \nder Geburt des Kindes, Arbeitnehmerinnen oder Selbstständigerwerbende \nsind. \nDer Anspruch auf\
      \ Mutterschaftsentschädigung entsteht, wenn die An -\nspruchsberechtigten während neun Monaten unmittelbar vor der Geburt\
      \ \ndes Kindes im Sinne des AHV-Gesetzes obligatorisch versichert waren und \nin dieser Zeit mindestens fünf Monate\
      \ lang eine Erwerbstätigkeit ausgeübt \nhaben. \nDie Mutterschaftsentschädigung wird während 14 Wochen (98 Tagen) ge\
      \ -\nwährt und beträgt 80 % des vor der Niederkunft erzielten durchschnitt -\nlichen AHV-pflichtigen Erwerbseinkommens,\
      \ höchstens aber 220 Franken \npro Tag. \nWeitere Informationen finden Sie im Merkblatt 6.02 - Mutterschaftsent -\n\
      schädigung . \n33 Wer hat Anspruch auf eine Entschädigung des andern  \nElternteils? \nDer Vater oder die Ehefrau der\
      \ Mutter, die im Sinne von Art. 255a Abs. 1 \nZGB als anderer Elternteil gilt, haben Anspruch auf eine Entschädigung\
      \ des \nandern Elternteils, wenn sie im Zeitpunkt der Geburt des Kindes Arbeitneh -\nmende oder Selbstständigerwerbende\
      \ sind. \nDer Anspruch auf eine Entschädigung des andern Elternteils entsteht, \nwenn die Anspruchsberechtigten während\
      \ neun Monaten unmittelbar vor \nder Geburt des Kindes im Sinne des AHV-Gesetzes obligatorisch versichert \nwaren und\
      \ in dieser Zeit mindestens fünf Monate lang eine Erwerbstätig -\nkeit ausgeübt haben. \nDer Urlaub des andern Elternteils\
      \ beträgt zwei Wochen (maximal 14 Tag -\ngelder) und beträgt 80 % des durchschnittlichen AHV-pflichtigen Erwerb -\n\
      seinkommens vor der Niederkunft, höchstens aber 220 Franken pro Tag.\nWeitere Informationen finden Sie im Merkblatt\
      \ 6.04 - Entschädigung des \nandern Elternteils .\f1734 Wer hat Anspruch auf Betreuungsentschädigung?  \nEltern, die\
      \ ihre Erwerbstätigkeit für die Betreuung ihres minderjährigen \ngesundheitlich schwer beeinträchtigten Kindes unterbrechen,\
      \ haben An -\nspruch auf eine Betreuungsentschädigung. \nDer Betreuungsurlaub beträgt 14 Wochen (maximal 98 Taggelder).\
      \ Als Ent -\nschädigung für den Verdienstausfall erhalten die Anspruchsberechtigten \n80 % des durchschnittlichen AHV-pflichtigen\
      \ Erwerbseinkommens vor \ndem Unterbruch der Erwerbstätigkeit, höchstens aber 220 Franken pro \nTag.\nWeitere Informationen\
      \ finden Sie im Merkblatt 6.10 - Betreuungsentschä -\ndigung . \n35 Wer hat Anspruch auf Adoptionsentschädigung? \n\
      Erwerbstätige Personen, die ein Kind unter vier Jahren zur Adoption auf -\nnehmen, haben Anspruch auf die Adoptionsentschädigung.\
      \ Bei einer Stief -\nkindadoption besteht kein Anspruch. \nSie müssen in den neun Monaten vor der Aufnahme des Kindes\
      \ obligato -\nrisch in der AHV/IV/EO versichert gewesen sein und während dieser Zeit \nmindestens fünf Monate lang eine\
      \ Erwerbstätigkeit ausgeübt haben.\nDer Adoptionsurlaub beträgt insgesamt zwei Wochen (maximal 14 Taggel -\nder). Als\
      \ Entschädigung für den Verdienstausfall erhalten die Anspruchsbe -\nrechtigten 80 % des durchschnittlichen AHV-pflichtigen\
      \ Erwerbseinkom -\nmens vor der Aufnahme des Kindes zur Adoption, höchstens aber 220 \nFranken pro Tag.\nWeitere Informationen\
      \ finden Sie im Merkblatt 6.11 - Adoptionsentschä -\ndigung . \f18\nAuskünfte und weitere  \nInformationen\nDieses Merkblatt\
      \ vermittelt nur eine Übersicht. Für die Beurteilung \nvon Einzelfällen sind ausschliesslich die gesetzlichen Bestimmungen\
      \ \nmassgebend. Die Schweizerische Ausgleichskasse in Genf, sowie die \nschweizerischen Vertretungen im Ausland (Botschaften\
      \ und Konsulate) \nerteilen weitere Auskünfte und geben die erforderlichen Formulare ab.\nDie Zivilstandsbezeichnungen\
      \ haben auch die folgende Bedeutung: \n•  Ehe/Heirat: eingetragene Partnerschaft\n•  Scheidung: gerichtliche Auflösung\
      \ der eingetragenen Partnerschaft\n•  Verwitwung: Tod des eingetragenen Partners / der eingetragenen \nPartnerin\nHerausgegeben\
      \ von der Informationsstelle AHV/IV in Zusammenarbeit \nmit dem Bundesamt für Sozialversicherungen.\nAusgabe Dezember\
      \ 2024. Auch auszugsweiser Abdruck ist nur mit \nschriftlicher Einwilligung der Informationsstelle AHV/IV erlaubt. \n\
      Dieses Merkblatt kann bei den Ausgleichskassen und deren Zweig-  \nstellen sowie den IV-Stellen bezogen werden. Bestellnummer\
      \ 10.03. Es \nist ebenfalls unter www.ahv-iv.ch  verfügbar.\f19Informations pour les ressortissants \ndes Etats avec\
      \ lesquels la Suisse n’a pas \nconclu de convention de sécurité  \nsociale (Etats non contractants)\nEn bref\nLes ressortissants\
      \ d’Etats non contractants ayant leur domicile en  \nSuisse peuvent faire valoir leur droit aux prestations du système\
      \ de sécurité  \nsociale suisse. La sécurité sociale en Suisse repose sur le concept dit \ndes trois piliers. L’AVS,\
      \ l’AI et leurs prestations complémentaires (PC)  \nforment le 1er pilier obligatoire destiné à couvrir les besoins\
      \ vitaux. La  \nprévoyance professionnelle (caisse de pensions) forme le 2e pilier : elle per -\nmet aux assurés ou\
      \ aux survivants de maintenir de manière appropriée \nleur niveau de vie antérieur lorsque survient un cas de prévoyance\
      \ (vieil -\nlesse, décès ou invalidité). Le 3e pilier enfin, la prévoyance privée (épargne,  \nassurances privées),\
      \ complète les deux premiers. Il est facultatif.  \nLe présent mémento donne un aperçu de l’obligation de s’assurer\
      \ et du \ndroit aux prestations pour le 1er et le 2e pilier et s’adresse à tous les res -\nsortissants d’Etats avec\
      \ lesquels la Suisse n’a pas conclu de convention de \nsécurité sociale.\nLa Suisse a conclu une convention de sécurité\
      \ sociale avec les \npays suivants : \nEtats membres de l‘UE Chine (assujettissement) Monténégro\nEtats membres de l‘AELE\
      \ Corée du Sud (assujettissement) Philippines\nAlbanie Etats Unis Royaume-Uni\nAustralie Inde (assujettissement) Saint-Marin\n\
      Bosnie et Herzégovine Israël Serbie\nBrésil Japon Tunisie\nCanada/Québec Kosovo Turquie\nChili  Macédoine du Nord Uruguay\
      \  \nLa liste des Etats avec lesquels la Suisse a conclu une convention de \nsécurité sociale est disponible sur le\
      \ site Internet de l’Office fédéral \ndes assurances (OFAS) :\nLe présent mémento vous concerne si vous êtes ressortissant\
      \ d’un Etat qui \nne figure pas sur la liste (à l’exception des survivants de citoyens suisses ou \nde ressortissants\
      \ d’Etats contractants). \f20Le système suisse de sécurité sociale\n1 Comment le système suisse de sécurité sociale\
      \  \nest-il organisé ? \nLa sécurité sociale suisse comprend les branches d’assurance suivantes :\n•  assurance-vieillesse,\
      \ survivants et invalidité (AVS/AI)\n•  prévoyance professionnelle vieillesse, survivants et invalidité (PP)\n•  assurance-maladie\
      \ (AMal)\n•  assurance-accidents (AA)\n•  assurance-chômage (AC)\n•  allocations familiales (AFam)\n•  allocations pour\
      \ perte de gain en cas de service militaire, service civil \net protection civile, de maternité, à l ’autre parent,\
      \ pour les parents \nqui prennent en charge un"
    - "4.11 Prestations de l’AI\nCouverture d’assurance\npendant des mesures de \nEtat au 1er janvier 2024réadaptation de\
      \ l’AI\f2En bref\nSuivant le principe « la réadaptation prime la rente », l’assurance-invalidité \n(AI) octroie aux\
      \ personnes assurées atteintes dans leur santé des mesures \nde réadaptation afin d’améliorer leur capacité de gain.\n\
      Vous trouverez de plus amples informations à ce sujet dans les mémentos \n4.01 – Prestations de l’assurance-invalidité\
      \ (AI)  et 4.09 – Mesures de réa -\ndaptation d’ordre professionnel de l’AI  . \nLe présent mémento vous informe sur\
      \ la couverture d’assurance en cas de \nmaladie, d’accident ou de maternité pendant les mesures de réadaptation. \n\
      Il contient également des renseignements sur les obligations de cotiser et \nla couverture d’assurance dans le deuxième\
      \ pilier.\f3Couverture d’assurance en cas de maladie\n1 Qui paie les frais médicaux si je tombe malade  \npendant une\
      \ mesure de réadaptation ?\nToute personne domiciliée en Suisse est couverte par l’assurance-maladie \nobligatoire.\
      \ Autrement dit, les frais médicaux sont en principe pris en charge \npar l’assurance obligatoire des soins (Loi fédérale\
      \ sur l’assurance-maladie, \nLAMaL).\nLorsque les mesures de réadaptation se déroulent à l’étranger, la couver -\nture\
      \ d’assurance peut s’avérer lacunaire puisque l’assurance obligatoire des \nsoins y fournit seulement des prestations\
      \ limitées. Vous pouvez combler \nces lacunes en concluant une assurance complémentaire à titre privé. \nPour tout renseignement\
      \ sur les assurances complémentaires privées, \nadressez-vous aux assureurs-maladie et autres compagnies d’assurance\
      \ \nprivées qui proposent ce type de contrats.\n2 Puis-je bénéficier d’une indemnité journalière de l’AI \nlorsque je\
      \ suis malade ?\nSi vous devez interrompre une mesure pour cause de maladie, l’AI peut \ncontinuer à vous verser l’indemnité\
      \ journalière pour une durée limitée,  \ndéterminée par la durée même de la mesure de réadaptation : \n• pendant la\
      \ première année de réadaptation : pendant 30 jours au plus ;\n• à partir de la deuxième année de réadaptation : pendant\
      \ 60 jours au \nplus ;\n• à partir de la troisième année de réadaptation : pendant 90 jours au \nplus.\nL’AI continue\
      \ à vous verser l’indemnité journalière uniquement si vous \nn’avez pas droit à des prestations d’autres assurances\
      \ (par ex. assurance \nfacultative d’indemnités journalières) d’un montant au moins égal.\nEn complément des prestations\
      \ AI, vous avez la possibilité de conclure une \nassurance facultative d’indemnités journalières à titre individuel.\
      \ \nPour tout renseignement, adressez-vous à l’assurance d’indemnités journa -\nlières de votre précédent employeur,\
      \ aux assureurs-maladie ou aux compa -\ngnies d’assurance privée.\f4Couverture d’assurance en cas d’accident\n3 Est-ce\
      \ que je bénéficie d’une assurance-accidents  \npendant les mesures de réadaptation ou d’instruction ?\nIl convient\
      \ de vérifier si vous bénéficiez d’une assurance en cas d’accident \nau moment de l’octroi de la mesure de réadaptation\
      \ d’ordre professionnel \nou lors des mesures d’instruction. \nLa vérification se fait point par point :\n•  Les bénéficiaires\
      \ de mesures AI qui disposent d’un contrat de travail, \nd’apprentissage ou de formation sous forme écrite sont couverts\
      \ par \nl’assurance-accidents obligatoire (loi fédérale sur l’assurance-accidents, \nLAA) du prestataire.\n•  Les bénéficiaires\
      \ de mesures AI dont la situation est analogue à celle \nqui résulterait d’un contrat de travail sont couverts par l’assurance-ac\
      \ -\ncidents des personnes bénéficiant de mesures AI (AA AI) auprès de la \nSUVA.\n•  Les personnes qui exercent une\
      \ activité au sens de la LAA dans un ate -\nlier pour invalides ou de réadaptation et qui bénéficient de prestations\
      \ \nde l’AI sous la forme d’indemnités journalières ou d’une rente sont \nassurées contre les accidents par l’intermédiaire\
      \ de cet atelier auprès \nde la SUVA.\nVous trouverez de plus amples informations à ce sujet sur le site Internet de\
      \ \nla SUVA : www.suva.ch/aaai\nL’office AI responsable vous renseignera personnellement sur votre cou -\nverture d’assurance-accidents.\
      \ Les prestataires de mesures reçoivent une \ncopie de ces informations.\nVous n’êtes pas assuré contre les accidents\
      \ si vous suivez une mesure de l’AI\n• sans contrat de travail, d’apprentissage ou de formation,\n• qui ne constitue\
      \ pas une situation analogue à celle qui résulterait d’un \ncontrat de travail et\n• qui n’est pas effectuée dans un\
      \ atelier pour invalides ou de réadapta -\ntion.\n4 Combien de temps dure la couverture LAA ?\nLa couverture AA (voir\
      \ chiffre 3) commence le jour où le rapport de travail \nou la mesure AI prend effet, mais en tout cas au moment où\
      \ la personne \nassurée se rend sur le lieu d’exécution de la mesure. \f5Elle expire au terme du 31e jour qui suit celui\
      \ où a pris fin le droit au  \ndemi-salaire au moins ou celui où se termine la mesure. \nVous avez la possibilité, avant\
      \ l’échéance de la couverture, de prolonger \nl’assurance à vos frais par convention spéciale pour une durée maximale\
      \ \nde six mois. \nAu-delà, vous devez à nouveau inclure le risque d’accidents dans votre \nassurance-maladie. Vous\
      \ pouvez entreprendre cette démarche à tout  \nmoment. \nCette règle s’applique aussi aux personnes frontalières qui\
      \ sont assu -\nrées en Suisse contre le risque maladie. Celles ayant conclu un contrat  \nd’assurance-maladie dans leur\
      \ pays de domicile doivent demander à leur \nassureur quelle est leur couverture en cas d’accident. \n5 Que dois-je\
      \ faire si je ne bénéficie pas  \nd’une assurance-accidents ?\nVous devez inclure une couverture accidents dans votre\
      \ assurance-maladie.\nSi vous devez interrompre une mesure pour cause d’accident, l’AI peut \ncontinuer à vous verser\
      \ l’indemnité journalière pour une durée limitée, \ncomme en cas de maladie (voir chiffre 2), si vous n’êtes pas assurés\
      \ obliga -\ntoirement au sens de la LAA. \n6 Ai-je droit à des prestations en cas d’urgence pendant \nune prestation\
      \ de réadaptation se déroulant  \nà l’étranger ?\nLorsque les mesures de réadaptation se déroulent à l’étranger, vous\
      \ avez \ndroit à des prestations médicales en cas d’urgence. \nPour obtenir des informations à ce sujet, adressez-vous\
      \ à l’assureur-acci -\ndents de votre ancien employeur ou aux assureurs-maladie.\nDans le cadre de l’entraide administrative\
      \ en matière de prestations, les \nressortissants suisses ou de l’UE et de l’AELE assurés en Suisse ont droit \naux\
      \ soins médicalement nécessaires, compte tenu de la durée du séjour et \nde la nature des prestations, lorsqu’ils séjournent\
      \ dans un État membre de \nl’UE* ou de l’AELE. Pour obtenir cette prestation, ils sont tenus de présenter \naux prestataires\
      \ de soins leur carte européenne d’assurance-maladie ou le \ncertificat de remplacement (à demander aux caisses-maladie\
      \ suisses). Le \ndécompte des coûts a lieu entre les assurances à l’étranger et en Suisse ; il \nse peut que les personnes\
      \ assurées doivent régler directement ces coûts, \nqui leur seront remboursés par la suite.\f6* L’expression « États\
      \ membres de l’UE » désigne les États, Royaume-Uni inclus, \nauxquels s’applique l’accord du 21 juin 1999 entre la Confédération\
      \ suisse et \nl’Union européenne et ses États membres sur la libre circulation des personnes  \n(Accord sur la libre\
      \ circulation des personnes).\nCouverture d’assurance en cas de maternité\n7 Ai-je droit à une indemnité journalière\
      \ de l’AI en cas de \nmaternité ?\nSi vous devez interrompre une mesure de réadaptation pour cause de  \nmaternité et\
      \ que vous n’avez pas droit à une allocation de maternité ou à \ndes prestations d’autres assurances (par ex. assurance\
      \ facultative d’indem -\nnités journalières) d’un montant au moins égal, l’AI peut continuer à vous \nverser l’indemnité\
      \ journalière pour une durée limitée, comme en cas de \nmaladie (voir chiffre 2). \nL’AI ne verse pas d’indemnités journalières\
      \ en cas d’interruption pour cause \nde paternité.\nPour éviter tout défaut de couverture, vous avez la possibilité\
      \ de conclure \nune assurance privée.\nCotisations AVS/AI/APG aux indemnités journalières \nde l’AI\n8 Des cotisations\
      \ sont-elles déduites de mon indemnité \njournalière ?\nOui. Des cotisations de l’AVS, de l’AI et du régime des APG\
      \ sont prélevées \nsur les indemnités journalières de l’AI. La cotisation à l’assurance-chômage \n(AC) est également\
      \ déduite chez les personnes salariées. \nVous trouverez de plus amples informations à ce sujet dans le mémento \n4.02\
      \ – Indemnités journalières de l’AI .\n9 Dois-je payer des cotisations si je ne perçois ni indemnité \njournalière ni\
      \ salaire pendant la mesure de réadaptation ? \nSi vous avez 20 ans ou plus et que vous ne touchez ni salaire d’un em\
      \ -\nployeur, ni indemnités journalières de l’AI pendant que vous participez à \nune mesure de réadaptation, vous devez\
      \ vous déclarer à votre caisse de \ncompensation comme n’exerçant pas d’activité lucrative pour éviter toute \nlacune\
      \ de cotisation.\f7Pour tout renseignement à ce sujet, adressez-vous aux caisses de compen -\nsation ou aux agences\
      \ AVS.\nCouverture d’assurance du 2e pilier (LPP)\n10 Une cotisation en faveur du 2e pilier est-elle déduite  \ndes\
      \ indemnités journalières de l’AI ?\nNon. Aucune cotisation en faveur du 2e pilier n’est prélevée sur les indem -\n\
      nités journalières de l’AI, car les mesures de réadaptation d’ordre profes -\nsionnel n’instaurent pas de rapport de\
      \ travail. À défaut d’affiliation à une \ninstitution de prévoyance pendant les mesures de réadaptation, vous ne \n\
      bénéficiez pas non plus d’une couverture d’assurance de la prévoyance \nprofessionnelle (2e pilier). La participation\
      \ à de telles mesures ne suffit pas \nen soi pour vous permettre de bénéficier de cette couverture.\n11 Est-ce que je\
      \ bénéficie d’une assurance pendant  \nles mesures de réadaptation ?\nLorsque votre rapport de travail prend fin, votre\
      \ affiliation à l’institution de \nprévoyance devient également caduque. Cependant, l’assurance contre les \nrisques\
      \ d’invalidité et de décès du 2e pilier reste encore valable un mois. Si \nvous bénéficiiez déjà d’une affiliation à\
      \ une institution de prévoyance avant \nle début des mesures de réadaptation, vous avez la possibilité de maintenir\
      \ \nvotre couverture d’assurance au-delà du délai d’un mois. À cette fin, vous \npouvez : \n• soit rester auprès de\
      \ l’institution en question (si le règlement le prévoit),\n• soit vous assurer auprès de l’institution supplétive LPP.\n\
      Si la couverture d’assurance ne peut être maintenue, l’avoir de prévoyance \ndoit en principe être transféré sur une\
      \ police de libre passage auprès d’un \nassureur ou sur un compte de libre passage auprès d’une banque. \nPour tout\
      \ renseignement à ce sujet, adressez-vous à l’institution de pré -\nvoyance actuelle, à l’institution supplétive LPP,\
      \ aux compagnies d’assurance \nou aux banques.\f8Renseignements et autres  \ninformations\nCe mémento ne fournit qu’un\
      \ aperçu général. Pour le règlement des \ncas individuels, seules les dispositions légales font foi. Les offices AI,\
      \ \nles caisses de compensation et leurs agences fournissent volontiers \nles renseignements souhaités. Vous trouverez\
      \ la liste complète de vos \ninterlocuteurs sur le site www.avs-ai.ch .\nPublié par le Centre d’information AVS/AI en\
      \ collaboration avec  \nl’Office fédéral des assurances sociales.\nEdition novembre 2023. Toute reproduction, même partielle,\
      \ n’est  \nautorisée qu’avec l’accord écrit du Centre d’information AVS/AI. \nCe mémento peut être obtenu auprès des\
      \ caisses de compensation et \nde leurs agences ainsi qu’auprès des offices AI. Numéro de commande \n4.11/f. Il est\
      \ également disponible sous www.avs-ai.ch .\n Plus d’informations, de publications et de vidéos explicatives.\n4.11-24/01-FPrestations\
      \ complémentaires pendant des mesures \nde réadaptation\n12 Ai-je droit à des prestations complémentaires si  \nje touche\
      \ une indemnité journalière de l’AI ?\nSi vous avez reçu une indemnité journalière de l’AI pendant au moins six \nmois\
      \ sans interruption et que vous remplissez les conditions d’octroi, vous \npouvez demander des prestations complémentaires\
      \ à la caisse cantonale \nde compensation compétente. \nVous trouverez de plus amples informations à ce sujet dans les\
      \ mémentos \n5.01 – Prestations complémentaires  à l’AVS et à l’AI et 5.02 – Votre droit \naux prestations complémentaires\
      \ à l’AVS et à l’AI ."
