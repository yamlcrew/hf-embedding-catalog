  - "4.06 Prestazioni dell’AI\nProcedura nell’AI\nStato al 1° gennaio 2024\f2In breve\nLe persone che chiedono l’intervento\
    \ dell’assicurazione per l’invalidità (AI) \nnell’ambito del rilevamento tempestivo possono inoltrare una comunica -\n\
    zione all’ufficio AI del Cantone di domicilio dell’assicurato. \nL’assicurato deve far valere il diritto a una prestazione\
    \ dell’AI mediante \nil modulo ufficiale. Dopo aver ricevuto la richiesta, l’ufficio AI verifica se  \nsiano adempiute\
    \ le condizioni per il diritto a prestazioni dell’AI. A tale \nscopo si procura tutte le informazioni necessarie per i\
    \ relativi accertamenti. \nTali accertamenti riguardano tutte le prestazioni dell’AI. Solo dopo l’esame \ndi tutte le\
    \ circostanze l’AI può decidere se l’assicurato abbia diritto alle sue \nprestazioni.  \nQuesto opuscolo informa gli assicurati\
    \ e le persone o istituzioni legittimate \na comunicare un caso in merito alla procedura nell’AI. \f3Comunicazione\n1\
    \ Chi può comunicare un caso?\nSono autorizzate a comunicare un caso le seguenti persone e istituzioni:\n• l’assicurato\
    \ o il suo rappresentante legale\n• i familiari che vivono in comunione domestica con l’assicurato\n• il datore di lavoro\
    \ dell’assicurato\n• i medici e i chiropratici curanti dell’assicurato\n• l’assicuratore d’indennità giornaliera in caso\
    \ di malattia\n• l’assicuratore infortuni\n• le aziende della previdenza professionale\n• l’assicurazione contro la disoccupazione\n\
    • gli organi dell’aiuto sociale\n• l’assicurazione militare\n• l’assicuratore malattie\n• le autorità e gli organi esecutivi\
    \ cantonali, preposti al coordinamento \ndel sostegno all’integrazione professionale dei giovani.\nL’assicurato deve però\
    \ essere preventivamente informato della comunica -\nzione.\n2 In quali casi può essere inoltrata una comunicazione?\n\
    La comunicazione può essere effettuata se l’assicurato presenta un’inca -\npacità al lavoro o è minacciato da un’incapacità\
    \ al lavoro di durata prolun -\ngata. Se l’assicurato è di età compresa tra i 13 e i 25 anni, la comunicazione \npuò essere\
    \ effettuata se egli:\n•  è minacciato da un’invalidità; \n•  non ha ancora esercitato alcuna attività lucrativa e\n•\
    \  sta svolgendo una formazione transitoria cantonale o è sostenuto \nnell’integrazione professionale da un organo di\
    \ coordinamento canto -\nnale per i giovani. \nLa comunicazione non è una richiesta di prestazioni AI.\nIl modulo per\
    \ la procedura di comunicazione è disponibile presso gli uffici \nAI, le casse di compensazione e le loro agenzie nonché\
    \ all’indirizzo Internet \nwww.avs-ai.ch . \f43 Come viene esaminato il caso comunicato?\nDopo aver appurato la propria\
    \ competenza, l’ufficio AI esamina il caso \ncomunicatogli, valutando l’incapacità al lavoro o la minaccia d’invalidità\
    \ \ndell’assicurato e le relative cause e conseguenze.\nSuccessivamente convoca l’assicurato per un colloquio al fine\
    \ di analizzare \nla sua situazione medica e socio-professionale. In base ai risultati di queste \nverifiche decide se\
    \ sia opportuno che l’assicurato presenti una richiesta di \nprestazioni AI.\f5Richiesta di prestazioni \n4 Come va inoltrata\
    \ una richiesta di prestazioni AI?\nLe richieste di prestazioni dell’AI vanno inoltrate all’ufficio AI del Cantone \n\
    di domicilio. \nPer gli assicurati residenti all’estero che hanno versato contributi all’AI sviz -\nzera è competente\
    \ l’ Ufficio AI per gli assicurati residenti all’estero  con sede \na Ginevra. \nOltre all’assicurato possono far valere\
    \ il diritto a prestazioni AI il suo rappre -\nsentante legale e le autorità o i terzi che assistono regolarmente l’assicurato\
    \ \no ne hanno durevole cura. È legittimata a presentare una richiesta anche \nl’assicurazione sociale che ha versato\
    \ prestazioni anticipate.\nFacendo valere il diritto alle prestazioni, l’assicurato autorizza le persone \ne gli organi\
    \ ivi menzionati a fornire agli uffici AI tutte le informazioni e i \ndocumenti necessari.\nIl modulo per la richiesta\
    \ di prestazioni è disponibile presso gli uffici AI, \nle casse di compensazione e le loro agenzie nonché all’indirizzo\
    \ Internet  \nwww.avs-ai.ch .\n5 Quando va inoltrata una richiesta di prestazioni?\nLa richiesta deve essere inoltrata\
    \ il prima possibile, cioè non appena il \ndanno alla salute può dare diritto a prestazioni dell’AI (provvedimenti d’in\
    \ -\ntegrazione, rendita, assegno per grandi invalidi, contributo per l’assistenza, \nmezzi ausiliari). In caso contrario,\
    \ alcune prestazioni possono essere ridotte.\nInformazioni più approfondite sono disponibili nei seguenti opuscoli infor\
    \ -\nmativi:\n• 4.01 - Prestazioni dell’assicurazione invalidità (AI)\n•  4.03 - Mezzi ausiliari dell’AI\n• 4.04 - Rendite\
    \ d’invalidità dell’AI\n•  4.09 - Provvedimenti d’integrazione professionale dell’AI\n• 4.13 - Assegni per grandi invalidi\
    \ dell’AI\n• 4.14 - Contributo per l’assistenza dell’AI\n \f6Esame della richiesta\n6 In che modo l’ufficio AI verifica\
    \ se siano adempiute le \ncondizioni per il diritto a prestazioni dell’AI?\nRicevuta la richiesta, l’ufficio AI verifica\
    \ dapprima se siano adempiute \nle condizioni che danno diritto a prestazioni. Si procura quindi tutte le  \ninformazioni\
    \ necessarie sullo stato di salute, sull’attività lavorativa e sulle \nmansioni abituali dell’assicurato. Un gruppo interdisciplinare\
    \ (composto da \nspecialisti dell’integrazione professionale, del collocamento, dei centri di \naccertamento, dal segretario\
    \ ispettore e da medici dei servizi medici re -\ngionali [SMR] ecc.) partecipa all’accertamento e alla procedura decisionale.\
    \ \nL’ufficio AI collabora anche con le altre assicurazioni sociali e private inte -\nressate.\n7 Quali accertamenti vengono\
    \ effettuati dai medici del \nSMR?\nI medici del SMR verificano se siano soddisfatte le condizioni mediche per \nla concessione\
    \ di prestazioni e, all’occorrenza, procedono ad un esame \ndell’assicurato. Se necessario, l’ufficio AI può richiedere\
    \ un complemento \ndi documentazione medica o, perizie di specialisti.\nMaggiori informazioni sono disponibili nell’opuscolo\
    \ informativo 4.15 -  \nPerizie mediche .\n8 Quali accertamenti vengono effettuati dagli specialisti \nin materia d’integrazione?\n\
    Gli specialisti in materia d’integrazione esaminano i possibili provvedimenti \nprofessionali e di reinserimento. A tale\
    \ scopo convocano l’assicurato per \nfare il punto della sua situazione professionale e personale così come delle \nsue\
    \ capacità e concordare i passi successivi. In caso di bisogno possono \nessere organizzati esami in un Centro d’accertamento\
    \ professionale dell’AI \n(CAP) o presso altre istituzioni per verificarne le capacità di rendimento.\n \f79 In quali\
    \ casi si procede a un accertamento sul posto?\nPer valutare meglio le condizioni dell’assicurato può essere richiesto\
    \ un ac -\ncertamento sul posto. Questo vale in particolare per gli indipendenti e gli \nassicurati che si dedicano alla\
    \ gestione dell’economia domestica nonché \nper esaminare il diritto a un assegno per grandi invalidi, a un contributo\
    \ per \nl’assistenza o a mezzi ausiliari.\n10 Quali prestazioni riguardano gli accertamenti?\nNell’ambito degli accertamenti\
    \ si devono prendere in considerazione tutte \nle prestazioni possibili, anche quelle che non sono state esplicitamente\
    \  \nrichieste. Nei casi in cui è stata richiesta una rendita, l’ufficio AI deve sem -\npre verificare se sia eventualmente\
    \ possibile procedere all’integrazione \ndell’assicurato.\n11 Quando possono essere ordinati provvedimenti  \nd’intervento\
    \ tempestivo?\nDei provvedimenti d’intervento tempestivo possono essere ordinati paral -\nlelamente all’accertamento affinché\
    \ l’assicurato possa mantenere il suo  \nposto di lavoro o essere reintegrato altrove. Se l’assicurato è di età com -\n\
    presa tra i 13 e i 25 anni non ha ancora esercitato un’attività lucrativa ed \nè minacciato da invalidità, possono essere\
    \ ordinati provvedimenti d’inter -\nvento tempestivo per aiutarlo nel percorso verso una formazione professio -\nnale\
    \ o una prima assunzione nel mercato del lavoro primario.\n12 Quanto tempo occorre all’AI per decidere se sia  \nopportuno\
    \ concedere provvedimenti d’integrazione?\nEntro 12 mesi dall’inoltro della richiesta di prestazioni AI l’ufficio AI prende\
    \ \nuna decisione, che stabilisce se avviare l’integrazione, se esaminare la pos -\nsibilità di assegnare una rendita\
    \ o se non sussista alcun diritto a prestazioni \ndell’AI.\n13 In quali casi viene stabilito un piano d’integrazione?\n\
    Se risulta che l’assicurato è in grado di sottoporsi a provvedimenti di \nreinserimento e/o a provvedimenti professionali,\
    \ viene stabilito un piano  \nd’integrazione in cui sono fissati gli obiettivi da raggiungere, le regole per \nla collaborazione\
    \ tra le parti, le responsabilità e le scadenze.\n \f8Obbligo di collaborare e di ridurre il danno\n14 Cosa ci si aspetta\
    \ dall’assicurato?\nL’assicurato deve fare quanto possibile e ragionevolmente esigibile per  \nridurre la durata e l’entità\
    \ dell’incapacità al lavoro e impedire l’insorgenza \ndell’invalidità. Un provvedimento non è considerato ragionevolmente\
    \ esigi -\nbile solo se non è adeguato alle condizioni di salute dell’assicurato.\nQualsiasi cambiamento significativo\
    \ della situazione professionale, fami -\nliare e di salute può incidere sul diritto alle prestazioni e va dunque comu\
    \ -\nnicato all’ufficio AI.\n15 I provvedimenti ordinati sono obbligatori?\nSì. L’assicurato deve partecipare attivamente\
    \ all’attuazione di tutti i provve -\ndimenti ragionevolmente esigibili (provvedimenti d’intervento tempestivo e \nprovvedimenti\
    \ d’integrazione per preparare all’integrazione professionale, \nprovvedimenti professionali, cure mediche) al fine di\
    \ mantenere il posto di \nlavoro, esercitare un’attività analoga o poter essere reintegrato nel mondo \ndel lavoro.\n\
    16 Cosa succede se l’assicurato non adempie ai suoi  \nobblighi?\nSe l’assicurato non adempie ai suoi obblighi, le prestazioni\
    \ possono essere \nrifiutate o ridotte.\n \f9Preavviso\n17 Quando l’assicurato riceve un preavviso dall’ufficio AI?\n\
    Eseguiti gli accertamenti necessari, l’ufficio AI invia all’assicurato e alle  \nassicurazioni interessate un preavviso\
    \ sulla decisione che intende prendere. \nEssi avranno 30 giorni di tempo per pronunciarsi sulla decisione prevista.\n\
    18 In che modo l’assicurato può prendere posizione in  \nmerito al preavviso?\nL’assicurato può prendere posizione in\
    \ due modi: per iscritto o oralmente, \nin occasione di un colloquio personale che si terrà presso l’ufficio AI. Del \n\
    colloquio sarà redatto un verbale che l’assicurato dovrà firmare. Le altre \nparti possono invece esprimersi solo per\
    \ iscritto.\n19 Sussiste il diritto alla consultazione dell’incarto?\nSì. L’assicurato e le altre parti interessate hanno\
    \ il diritto di consultare  \nl’incarto. \f10Decisione\n20 Quando l’ufficio AI emana una decisione?\nSe l’assicurato non\
    \ presenta obiezioni e le parti non prendono posizione \nentro il termine stabilito, l’ufficio AI emana una decisione\
    \ formale.\nSe l’assicurato o un’altra parte interessata si sono espressi in merito a fatti \ndeterminanti, l’ufficio\
    \ AI deve tenerne conto nella motivazione della deci -\nsione.\n21 Come viene comunicato un provvedimento d’intervento\
    \ \ntempestivo?\nLa decisione concernente l’attuazione di un provvedimento d’intervento \ntempestivo è comunicata dall’ufficio\
    \ AI senza la notifica di un preavviso o \ndi una decisione formale.\f11Ricorso\n22 Entro quali termini l’assicurato può\
    \ inoltrare ricorso?\nSe non condividono la decisione dell’ufficio AI, l’assicurato e le parti inte -\nressate possono\
    \ inoltrare ricorso per iscritto entro 30 giorni presso il tribu -\nnale delle assicurazioni del Cantone di domicilio\
    \ dell’assicurato. \nPer gli assicurati residenti all’estero il ricorso va depositato presso il Tribu -\nnale amministrativo\
    \ federale a San Gallo.\n23 Presso quale istanza si può fare ricorso contro la  \nsentenza di primo grado?\nContro la\
    \ sentenza del tribunale cantonale delle assicurazioni o del Tribu -\nnale amministrativo federale può essere interposto\
    \ ricorso presso il Tribu -\nnale federale a Lucerna. Il ricorso va inoltrato per iscritto entro 30 giorni.\n24 La procedura\
    \ di ricorso comporta delle spese?\nSì. La procedura di ricorso in materia di prestazioni AI è soggetta a spese.\f12Chiarimenti\
    \ e altre  \ninformazioni\nQuesto opuscolo informativo presenta solo una panoramica riassuntiva. \nPer la valutazione\
    \ dei singoli casi fanno stato esclusivamente le dispo -\nsizioni legali in vigore. Per ulteriori informazioni ci si può\
    \ rivolgere agli \nuffici AI, alle casse di compensazione o alle loro agenzie. L’elenco di \ntutti gli interlocutori è\
    \ pubblicato all’indirizzo Internet www.avs-ai.ch .\nPubblicato dal Centro d’informazione AVS/AI in collaborazione con\
    \ \nl’Ufficio federale delle assicurazioni sociali.\nEdizione dicembre 2023. La riproduzione, anche solo parziale, è \
    \ \nautorizzata soltanto con il consenso scritto del Centro d’informazione  \nAVS/AI. \nQuesto opuscolo informativo può\
    \ essere richiesto alle casse di compen -\nsazione, alle loro agenzie e agli uffici AI. Numero di ordinazione 4.06/i.\
    \  \nÈ disponibile anche su www.avs-ai.ch .\n Ulteriori informazioni, pubblicazioni e video esplicativi.\n4.06-24/01-I"
  - "6.04 Prestations des AAP\nAllocation à l’autre parent\nEtat au 1er janvier 2024(au père ou à l’épouse de la \nmère)\f\
    2En bref\nAu cours des six premiers mois suivant la naissance de l’enfant, le père \nou l’épouse de la mère considérée\
    \ comme l’autre parent au sens de l’art. \n255a, al. 1, CC, exerçant une activité lucrative, a droit à un congé de deux\
    \ \nsemaines, pendant lequel cette personne touche une allocation pour perte \nde gain. Ces deux semaines correspondent\
    \ à dix jours de congé pour un \nemploi à plein temps. Le nombre de jours de congé peut varier en fonction \ndu taux d’occupation\
    \ du père ou de l’épouse de la mère. \nCe mémento informe les pères et les épouses de la mère exerçant une \nactivité\
    \ lucrative ainsi que les employeurs sur les allocations à l’autre parent \n(AAP).\f3Droit\n1 Dans quelles circonstances\
    \ ai-je droit à une  \nallocation à l’autre parent ?\nVous avez droit à l’allocation à l’autre parent si vous présentez\
    \ l’un des \nstatuts professionnels suivants à la naissance de l’enfant : \n•  personne salariée ;\n•  personne active\
    \ exerçant une activité lucrative indépendante ;\n• personne active dans l’entreprise de votre épouse, de votre famille\
    \ ou \nde votre partenaire et touchant un salaire en espèces ;\n•  au chômage et touchant déjà des indemnités journalières\
    \ de l’assu -\nrance-chômage ;\n•  au chômage et en incapacité de travail pour maladie, accident ou in -\nvalidité et\
    \ touchant, pour cette raison, des indemnités d’une assurance \nsociale ou privée à condition que ces indemnités aient\
    \ été calculées sur \nla base d’un salaire précédemment réalisé ;\n•  au bénéfice d’un contrat de travail valable, mais\
    \ ne touchant ni salaire \nni indemnités journalières parce que votre droit est épuisé ;\n•  effectuant un service et\
    \ au chômage, sans que vous ne touchiez d’in -\ndemnités journalières de l’assurance-chômage, mais disposant d’une \n\
    période de cotisations suffisante pour y avoir droit.\f42 Quelles sont les conditions d’octroi de l’allocation à \nl’autre\
    \ parent ?\nPour avoir droit à l’allocation à l’autre parent, vous devez :\n•  être le père légal au moment de la naissance\
    \ de ce dernier ou le deve -\nnir dans les six mois qui suivent, ou\n• au moment de la naissance être l’épouse de la mère\
    \ considérée comme \nl’autre parent au sens de l’art. 255a, al. 1, CC , et \n•  avoir été soumis ou soumise à l’assurance\
    \ obligatoire au sens de la \nloi sur l’AVS pendant les neuf mois qui ont immédiatement précédé \nla naissance de l’enfant.\
    \ En cas de naissance avant terme, ce délai se \nréduit à : \n - 6 mois en cas d’accouchement avant le 7e mois de grossesse\
    \ ; \n - 7 mois en cas d’accouchement avant le 8e mois de grossesse ; \n - 8 mois en cas d’accouchement avant le 9e mois\
    \ de grossesse ;\n•  avoir exercé une activité lucrative ou avoir perçu une allocation pour \nperte de gain pendant au\
    \ moins cinq mois durant cette période.\nLes périodes d’emploi et d’assurance accomplies au Royaume-Uni ou dans \nun Etat\
    \ membre de l’UE ou de l’AELE sont prises en compte dans ce calcul. \n3 Quand mon droit prend-il naissance et quand  \n\
    s’éteint-il ?\nLe droit à l’allocation à l’autre parent naît le jour de la naissance. Il s’éteint \nlorsque vous avez\
    \ touché 14 indemnités journalières, au plus tard à \nl’échéance du délai-cadre de six mois après la naissance de l’enfant.\n\
    En cas de décès du père ou de l’épouse de la mère, le droit à l’allocation \npour la mère survivante est prolongé, pour\
    \ autant que les conditions d’oc -\ntroi soient remplies.\f54 Ai-je droit à une prolongation du congé de paternité ou\
    \ \ndu congé de l’épouse de la mère en cas de décès de la \nmère de l’enfant ?\nVous avez droit à une prolongation du\
    \ congé de paternité ou du congé de \nl’épouse de la mère en cas de décès de la mère le jour de l’accouchement \nou dans\
    \ les 97 jours qui suivent. Dans ce cas, le père ou l’épouse de la \nmère a droit à 98 indemnités journalières supplémentaires.\
    \ Le droit prend \nnaissance le jour du décès de la mère et le congé doit être pris de manière \nininterrompue dès le\
    \ lendemain. Le délai-cadre de six mois pour le droit à \nl’allocation à l’autre parent est interrompu pendant cette période.\
    \ Il recom -\nmence à courir à la fin du droit à la prolongation.\nSi vous reprenez votre activité lucrative durant cette\
    \ période, à temps plein \nou partiel, ou que vous décédez, le droit s’éteint de manière anticipée. \nPour faire valoir\
    \ votre droit, vous disposez du formulaire 318.739 - De -\nmande de prolongation de l’allocation en cas de décès d’un\
    \ parent .\n5 Comment les indemnités journalières sont-elles fixées ?\nL’allocation à l’autre parent consiste en quatorze\
    \ indemnités journalières au \nmaximum. Si le père ou l’épouse de la mère exerçant une activité lucrative \nà plein temps\
    \ prend la totalité du congé de dix jours, quatre indemnités \njournalières supplémentaires doivent lui être versées pour\
    \ couvrir les week-\nends. \nLors de la saisie du temps de travail, pour les personnes qui travaillent à \ntemps partiel,\
    \ l’employeur peut tenir compte du taux d’occupation du sa -\nlarié pour fixer le nombre de jours de congé et le montant\
    \ de l’indemnité \njournalière. Dans ce cas, le montant des indemnités versées est calculé de \nmanière à ce que l’allocation\
    \ à l’autre parent couvre 80 % du revenu de \nl’activité lucrative.\f66 Quel est le montant de l’allocation à l’autre\
    \ parent ?\nL’allocation à l’autre parent est versée en qualité d’indemnité journalière. \nElle se monte à 80 % du revenu\
    \ moyen de l’activité lucrative réalisé avant \nla naissance, mais au plus à 220 francs par jour. \nLe montant maximal\
    \ est atteint à partir d’un salaire mensuel de 8 250 \nfrancs (8 250 francs x 0,8 ÷ 30 jours = 220 francs/jour) et, pour\
    \ un indépen -\ndant, d’un revenu annuel soumis à l’AVS de 99 000 francs (99 000 francs  \nx 0,8 ÷ 360 jours = 220 francs/jour).\n\
    7 Qu’en est-il si des indemnités d’autres assurances  \nsociales sont dues en même temps que l’allocation  \nà l’autre\
    \ parent ?\nSi, à la naissance de l’enfant, vous avez droit, en vertu du droit des assu -\nrances sociales, à des indemnités\
    \ journalières d’une de ces assurances :\n•  assurance-chômage,\n•  assurance-invalidité,\n•  assurance-accidents,\n•\
    \  assurance-maladie,\n•  assurance militaire,\nvous toucherez l’allocation à l’autre parent, et non pas l’indemnité d’une\
    \ \nautre assurance sociale. Le montant de cette allocation équivaudra au \nmoins à celui de l’indemnité perçue avant\
    \ la naissance. Les indemnités jour -\nnalières en cas de maladie versées par une assurance d’indemnités journa -\nlières\
    \ en vertu du droit des assurances privées (LCA) ne donnent pas droit \nà la garantie des droits acquis.\n8 Est-ce que\
    \ je bénéficie d’une protection pendant le \ncongé de paternité ou le congé de l’épouse de la mère ?\nLe congé ne restreint\
    \ pas les autres droits. Les protections suivantes s’ap -\npliquent :\n•  le délai de résiliation est prolongé si l’employeuse\
    \ ou l’employeur résilie \nle contrat de travail alors que vous n’avez pas pris la totalité de votre \ncongé, et la prolongation\
    \ correspond au nombre de jours de congé \nrestants ;\n•  vos vacances ne peuvent pas être réduites par ce congé.\f7Démarches\
    \ à faire pour obtenir l’allocation à l’autre \nparent\n9 Comment puis-je faire valoir mon droit à l’allocation à \nl’autre\
    \ parent ?\nLes personnes ci-après peuvent faire une demande d’allocation à l’autre \nparent auprès de la caisse de compensation\
    \ compétente :\n•  vous-même en tant que père ou épouse de la mère\n - par l’intermédiaire de votre employeur, si vous\
    \ êtes une personne  \n salariée ;\n - en vous adressant directement à la caisse de compensation si vous  \n êtes une\
    \ personne active d’exerçant une activité lucrative indépen-  \n dante , au chômage ou en incapacité de travail ;\n• \
    \ votre employeur\n - dans la mesure où vous omettez d’en faire la demande (voir ci-  \n dessus) et que ce dernier vous\
    \ verse un salaire durant le congé ;\n•  les membres de votre famille (votre épouse et vos enfants)\n - si vous ne satisfaites\
    \ pas à votre propre entretien ou à vos obliga- \n tions d’entretien. \nSi vous êtes une personne salariée, au chômage\
    \ ou en incapacité de travail \nau moment de la naissance de l’enfant, c’est votre employeur (actuel ou \ndernier en date)\
    \ qui atteste :\n•  la durée des rapports de travail,\n•  le salaire déterminant pour le calcul de l’allocation à l’autre\
    \ parent , \n•  le salaire versé pendant le congé ouvrant le droit aux indemnités jour -\nnalières, ainsi que\n•  le nombre\
    \ de jours de congé perçus.\nVous pouvez télécharger le formulaire de demande  318.747  sur la page \nInternet www.avs-ai.ch\
    \ .\n10 Quand le droit à l’allocation à l’autre parent s’éteint-il ?\nLe droit à l’allocation à l’autre parent s’éteint\
    \ après la perception de 14 in -\ndemnités journalières, au plus tard à l’échéance du délai-cadre de six mois \naprès\
    \ la naissance. Vous pouvez faire valoir le droit aux allocations à l’autre \nparent non versées jusqu’à cinq ans après\
    \ la fin du délai-cadre de six mois. \nPassé ce délai, le droit s’éteint. \f8Versement de l’allocation à l’autre parent\n\
    11 Dois-je cotiser à l’AVS, à l’AI et aux APG sur les  \nallocations à l’autre parent ?\nOui. L’allocation à l’autre parent\
    \ versée directement à l’intéressé au lieu \nde son salaire a aussi valeur de revenu. Vous devez donc cotiser à l’AVS,\
    \ à \nl’AI et aux APG. Si vous êtes une personne salariée, les cotisations à l’assu -\nrance-chômage sont également déduites\
    \ de votre allocation. Le montant \nde l’allocation à l’autre parent, comme tout revenu formateur de rente, \nest donc\
    \ aussi porté sur le compte AVS individuel de la personne assurée. \nAinsi, les allocations à l’autre parent compteront\
    \ pour le calcul des futures \nrentes. Pour de plus amples informations relatives à l’obligation de cotiser, \nveuillez-vous\
    \ adresser à votre caisse de compensation.\n12 Comment l’allocation à l’autre parent est-elle versée ?\nSi l’employeur\
    \ assure le versement du salaire durant votre congé, la caisse \nde compensation lui verse directement l’allocation à\
    \ l’autre parent. \nDans des cas particuliers ou s’il y a un différend avec l’employeur, vous \npouvez demander que l’allocation\
    \ à l’autre parent vous soit versée direc -\ntement par la caisse de compensation. Sont considérés comme des cas \nparticuliers\
    \ les situations suivantes : un employeur insolvable, négligent, ou \nqui ne doit pas être informé de faits concernant\
    \ une autre activité lucrative \nque vous exercez (montant du salaire, activité indépendante, etc.).\nVous pouvez demander\
    \ que l’allocation soit versée à la personne de votre \nfamille qui assume l’obligation d’entretien ou d’assistance à\
    \ votre égard. \nL’allocation à l’autre parent est versée après coup, une fois que le dernier \njour de congé a été pris.\n\
    L’allocation à l’autre parent peut également vous être versée à l’étranger si \nvous transférez votre domicile à l’étranger\
    \ après la naissance. Dans ce cas, \nla Caisse suisse de compensation est compétente.\f9Couverture d’assurance\n13 Suis-je\
    \ assuré contre les accidents pendant le congé ?\nSi vous percevez une allocation à l’autre parent en qualité de personne\
    \ \nsalariée, vous restez assuré à l’assurance-accidents obligatoire pendant le \ncongé. Durant cette période, vous êtes\
    \ libéré du paiement des primes. \nSi l’employeur vous verse durant le congé un salaire plus élevé que l’alloca -\ntion\
    \ à l’autre parent, il est tenu de verser des primes LAA sur la différence \nentre l’allocation à l’autre parent et les\
    \ salaires versés (jusqu’à concurrence \ndu gain maximal assuré, actuellement de 148 200 francs). \nSi vous êtes au chômage,\
    \ vous restez assuré contre les accidents égale -\nment durant le congé. Vous ne devez donc pas demander la couverture\
    \ \ndes accidents à votre assurance-maladie. Il faut toutefois que la perception \nde l’allocation à l’autre parent suive\
    \ immédiatement la perception des in -\ndemnités de chômage.\n14 Suis-je soumis à la prévoyance professionnelle  \npendant\
    \ le congé ?\nEn tant que personne salariée, vous continuez de bénéficier de la couver -\nture d’assurance de la prévoyance\
    \ professionnelle aux mêmes conditions \ndurant le congé. Le salaire coordonné sur lequel les cotisations sont préle -\n\
    vées reste donc inchangé. Vous pouvez cependant demander une baisse \ndu salaire coordonné. Pour toute question concernant\
    \ le niveau des cotisa -\ntions LPP, adressez-vous à votre institution de prévoyance.\f10Exemples de calcul de l’allocation\
    \ à l’autre parent\n15 Salariés\nSalaire mensuel inférieur à CHF 8 250\nRevenu mensuel perçu avant l’interruption CHF\
    \ 5 250.00\nCalcul de l’allocation :  \nCHF 5 250 ÷ 30 jours CHF 175.00\nAllocation : 80 % de CHF 175 CHF 140.00 \nAllocation\
    \ : CHF 140 par jour  \npendant 14 jours au maximum \nCHF \n1 960.00\n16 Salariés\nSalaire mensuel supérieur à CHF 8 250\n\
    Revenu mensuel perçu avant l’interruption CHF 8 430.00\nCalcul de l’allocation :  \nCHF 8 430 ÷ 30 jours CHF 281.00\n\
    Allocation : 80 % de CHF 281 CHF 224.80\nAlignement sur le montant maximal de l’allocation CHF 220.00\nAllocation : CHF\
    \ 220 par jour  \npendant 14 jours au maximum \nCHF \n3 080.00\f1117 Travailleurs indépendants \nRevenu annuel soumis\
    \ à l’AVS inférieur à CHF 99 000\nRevenu annuel perçu avant l’interruption CHF 27 000.00\nCalcul de l’allocation :  \n\
    CHF 27 000 ÷ 360 jours CHF 75.00\nAllocation : 80 % de CHF 75 CHF 60.00 \nAllocation : CHF 60 par jour  \npendant 14 jours\
    \ au maximum \nCHF \n840.00\n18 Travailleurs indépendants \nRevenu annuel soumis à l’AVS supérieur à CHF 99 000\nRevenu\
    \ annuel perçu avant l’interruption CHF 102 600.00\nCalcul de l’allocation :  \nCHF 102 600 ÷ 360 jours CHF 285.00\nAllocation\
    \ : 80 % de CHF 285 CHF 228.00\nAlignement sur le montant maximal de l’allocation CHF 220.00\nAllocation : CHF 220 par\
    \ jour  \npendant 14 jours au maximum \nCHF \n3 080.00\f12Renseignements et autres  \ninformations\nCe mémento ne fournit\
    \ qu’un aperçu général. Pour le règlement des \ncas individuels, seules les dispositions légales font foi. Les caisses\
    \ de \ncompensation et leurs agences fournissent volontiers tous les rensei -\ngnements utiles. Vous trouverez la liste\
    \ complète des caisses de com -\npensation sur le site www.avs-ai.ch .\nPublié par le Centre d’information AVS/AI en collaboration\
    \ avec  \nl’Office fédéral des assurances sociales.\nEdition décembre 2023. Toute reproduction, même partielle,  \nn’est\
    \ autorisée qu’avec l’accord écrit du Centre d’information AVS/AI. \nCe mémento peut être obtenu auprès des caisses de\
    \ compensation et \nde leurs agences ainsi qu’auprès des offices AI. Numéro de commande \n6.04/f. Il est également disponible\
    \ sous www.avs-ai.ch .\n Plus d’informations, de publications et de vidéos explicatives.\n6.04-24/01-F"
  - "2.05 Contributi\nRetribuzioni versate\nal termine del rapporto\ndi lavoro\nStato al 1° gennaio 2025\f2In breve\nPer principio,\
    \ qualsiasi remunerazione derivante dall’esercizio di un’atti -\nvità dipendente viene considerata come salario soggetto\
    \ a contribuzione. \nFanno parte di quest’ultimo anche le retribuzioni che il datore di lavoro, \no un’istituzione che\
    \ gli è legata, versa in caso di cessazione completa del \nrapporto di lavoro.\nEsempi:\n•  i pagamenti posticipati del\
    \ salario;\n•  le provvigioni;\n•  le indennità per vacanze;\n•  le gratificazioni;\n•  le indennità versate in caso di\
    \ risoluzione anticipata del contratto di \nlavoro;\n•  le indennità versate a seguito di una clausola di divieto di concorrenza;\n\
    •  i versamenti effettuati a discrezione dal datore di lavoro (non previsti \ndal regolamento) a titolo di previdenza\
    \ a favore di singoli dipendenti.\nNon sono invece soggetti a contribuzione:\n•  le prestazioni previdenziali regolamentari:\
    \ \n prestazioni di istituti di previdenza professionale cui il beneficiario ha \ndiritto all’insorgere del caso assicurato;\n\
    • i versamenti alla cassa pensioni:\n prestazioni sociali del datore di lavoro, nella misura in cui sono previste \ne\
    \ devono essere fornite sulla base di un regolamento.\nSe, dopo la cessazione del rapporto di lavoro, il datore di lavoro\
    \ continua \na versare contributi alla cassa pensioni nella stessa misura di quanto avve -\nnuto fino al termine del rapporto\
    \ di lavoro, tali contributi sono compresi \nnel salario determinante.\nQuesto opuscolo informativo informa i datori di\
    \ lavoro sulle retribuzioni \nversate al termine del rapporto di lavoro.\n \f3Prestazioni sociali al termine del rapporto\
    \ di lavoro\n1 In quali casi le prestazioni sociali sono parzialmente o \ntotalmente esenti da contribuzione?\nA certe\
    \ condizioni, le prestazioni sociali del datore di lavoro sono parzial -\nmente o totalmente esenti da contribuzione,\
    \ in particolare in caso di pre -\nvidenza professionale insufficiente o di licenziamento per motivi aziendali. \nQueste\
    \ prestazioni possono essere versate in forma di rendite (p. es. le \nrendite transitorie) o di indennità in capitale\
    \ (p. es. le indennità di partenza \nversate al termine del rapporto di lavoro). Le casse di compensazione con -\nvertono\
    \ le rendite in capitale.\f4Prestazioni sociali in caso di previdenza professionale \ninsufficiente\n2 Quali prestazioni\
    \ vengono escluse dal salario  \ndeterminante?\nLe prestazioni versate dal datore di lavoro al termine di un rapporto\
    \ di \nlavoro pluriennale sono escluse dal salario determinante per ogni anno \ncontabile completo in cui il salariato\
    \ non era assicurato nella previdenza \nprofessionale (2° pilastro), fino a un importo pari alla metà della rendita di\
    \ \nvecchiaia minima mensile vigente al momento del versamento.\n3 Quali prestazioni fanno parte del salario determinante?\n\
    L’importo eccedente la metà della rendita di vecchiaia minima mensile fa \nparte del salario determinante. L’importo del\
    \ salario conseguito non conta.\n4 Esempio\nIl rapporto di lavoro di una commessa di 54  anni che lavora a tempo \nparziale\
    \ viene concluso dopo 15 anni di servizio nel 2025. Essa riceve a \ntitolo volontario una prestazione in capitale unica\
    \ di 10  000  franchi. \nPoiché non è stata ininterrottamente assicurata alla previdenza profes -\nsionale, presenta lacune\
    \ contributive. Dal 1° agosto 2011 al 31 dicembre \n2015 e dall’1° aprile 2020 al 31 luglio 2024 non era assicurata alla\
    \ pre -\nvidenza professionale, cosicché le mancano sette anni contabili completi  \n(4 + 3). Le prestazioni del datore\
    \ di lavoro versate per gli anni contributivi \nmancanti vengono dunque dedotte dal salario determinante come segue:\n\
    Prestazione in capitale CHF 10 000.00\n7 x CHF 630.00 (metà della rendita minima mensile) - CHF 4 410.00\nSalario determinante\
    \ CHF 5 590.00\f5Prestazioni sociali in caso di licenziamento  \nper motivi aziendali\n5 Cosa s’intende per motivi aziendali?\n\
    Per motivi aziendali s’intendono la chiusura, la fusione e la ristrutturazione \ndi un’azienda.\nSi ha una ristrutturazione\
    \ aziendale quando l’istituto di previdenza che at -\ntua la previdenza professionale obbligatoria adempie le condizioni\
    \ per la \nliquidazione parziale secondo la legge federale sulla previdenza professio -\nnale per la vecchiaia, i superstiti\
    \ e l’invalidità (LPP) oppure se un licenzia -\nmento collettivo è disciplinato da un piano sociale.\nLe condizioni per\
    \ una liquidazione parziale sono rette da un regolamento \napprovato dall’autorità di vigilanza della previdenza professionale.\
    \ \nSebbene nonostante i licenziamenti le condizioni per la liquidazione par -\nziale dell’istituto di previdenza non\
    \ sono adempiute, si ha una ristruttura -\nzione aziendale anche in caso di licenziamento collettivo disciplinato da un\
    \ \npiano sociale. \nPer piano sociale s’intende un accordo nel quale il datore di lavoro e i lavo -\nratori (attraverso\
    \ una rappresentanza dei lavoratori o un sindacato) conven -\ngono misure atte a evitare o ridurre i licenziamenti, nonché\
    \ ad attenuarne \nle conseguenze.\nUn licenziamento è considerato collettivo quando tocca gran parte dell’ef -\nfettivo\
    \ del personale. Le prestazioni concesse a titolo individuale a singoli \nsalariati fanno parte del salario determinante.\n\
    6 Come si procede per le partenze e i prepensionamenti \nvolontari?\nLe partenze e i prepensionamenti volontari non rientrano\
    \ nelle disposizioni \ndi esclusione dal salario determinante, anche se avvengono sulla base di \nun piano sociale o se\
    \ vi è una regolamentazione concernente il prepensio -\nnamento.\n \f67 Quali prestazioni sono escluse dal salario determinante?\n\
    In caso di licenziamento per motivi aziendali, sono escluse dal salario  \ndeterminante le prestazioni il cui importo\
    \ non supera di quattro volte e \nmezza la rendita di vecchiaia massima annua (v. esempio 11).\n8 In caso di licenziamento\
    \ per motivi aziendali quale parte \ndelle prestazioni fa parte del salario determinante?\nIn caso di licenziamento per\
    \ motivi aziendali la parte delle prestazioni che \nsupera un importo pari a quattro volte e mezza la rendita di vecchiaia\
    \ mas -\nsima annua (136 080 franchi nel 2025) fa parte del salario determinante. \nL’importo del salario conseguito non\
    \ conta.\nLe prestazioni versate sotto forma di rendita vanno convertite in capitale, \nvale a dire che è necessario determinare\
    \ il loro valore attuale. Il valore  \nattuale di una rendita corrisponde al capitale che dovrebbe essere  \ninvestito\
    \ al tasso d’interesse tecnico al momento della partenza per  \nfinanziare i versamenti futuri. In questo contesto va\
    \ tenuto conto della pro -\nbabilità di vita. Per la conversione viene utilizzato un fattore provvisorio \n(v. tabelle\
    \ alla pagina seguente). Per gli anni di età incompleti, il fattore \nprovvisorio viene interpolato calcolando la differenza\
    \ tra il fattore dell’età \ninferiore e quello dell’età superiore della tabella.\f79 Fattori di conversione\nEstratto\
    \ dei fattori per la conversione in capitale dei seguenti tipi di rendita: \nrendite vitalizie e rendite temporanee o\
    \ differite fino al pensionamento o \nall’età di riferimento.\nRendita - Uomini \nEtà in anni  vitalizia transitoria fino\
    \ a 65 rinviata fino a65\n58 20,2 6,4 13,8\n59 19,7 5,5 14,2\n60 19,3 4,7 14,6\n61 18,8 3,8 15,0\n62 18,3 2,9 15,4\n63\
    \ 17,9 1,9 16,0\n64 17,4 1,0 16,4\n65 16,9 0,0 16,9\nRendita - Donne nate nel 1960 o prima\nEtà in anni  vitalizia transitoria\
    \ fino a 64 rinviata fino a 64\n58 21,6 5,5 16,1\n59 21,1 4,7 16,4\n60 20,7 3,8 16,9\n61 20,3 2,9 17,4\n62 19,8 1,9 17,9\n\
    63 19,3 1,0 18,3\n64 18,9 0,0 18,9\nRendita - Donne nel 1964 o dopo\nEtà in anni  vitalizia transitoria fino a 65 rinviata\
    \ fino a 65\n58 21,6 6,4 15,2\n59 21,1 5,5 15,6\n60 20,7 4,7 16,0\n61 20,3 3,8 16,5\n62 19,8 2,9 16,9\n63 19,3 1,9 17,4\n\
    64 18,9 1,0 17,9\n65 18,4 0,0 18,4\nFormula di calcolo: capitale = rendita annua x fattore di conversione  \n      rendita\
    \ annua = capitale / fattore di conversione\f8L’età è arrotondata al mese completo precedente e i fattori sono determi\
    \ -\nnati tramite l’interpolazione in base ai fattori applicabili all’età superiore e \na quella inferiore.\nDonne nate\
    \ nel 1961, 1962 o 1963\nLe donne nate nel 1961, 1962 o 1963 possono utilizzare il calcola -\ntore online per la conversione\
    \ delle rendite in capitale all’indirizzo:\n10 Esempio di fattore di conversione\nRendita vitalizia per un uomo di 62 anni\
    \ e tre mesi d’età.\n62 anni, rendita vitalizia Fattore 18,3\n63 anni, rendita vitalizia Fattore 17,9\n62 anni e 3 mesi\
    \ Fattore 18,20\nFattore provvisorio interpolato (18,3-17,9) x (9/12) + 17,9 = 18,20*\n* (fattore dell’età inferiore –\
    \ fattore dell’età superiore x [n. mesi fino al prossimo \ncompleanno / 12] + fattore dell’età superiore)\nLe tabelle\
    \ complete per la determinazione del fattore di conver -\nsione della rendita in capitale (DSD) sono disponibili sul sito\
    \ Inter -\nnet. Nello stesso documento sono disponibili ulteriori esempi.\f911 Esempio di prestazioni transitorie\nLa\
    \ birreria Bierperle esternalizza la consegna a domicilio nel 2025 e deve \nquindi procedere ad una ristrutturazione.\
    \ La liquidazione parziale dell’i -\nstituto di previdenza tocca l’intero effettivo del personale del servizio tra -\n\
    sporti. Un rappresentante di 58 anni e 4 mesi con oltre 15 anni di servizio  \nriceve, oltre ad una rendita della previdenza\
    \ professionale obbligato -\nria della sua datrice di lavoro, un’indennità unica di 150  000  franchi e \ndi prestazioni\
    \ transitorie annua di 82 000 franchi (a partire da 58 anni e  \n4 mesi fino al 59° anno d’età) e di 73 000 franchi (dal\
    \ 60° al 65° anno \nd’età).\nLa rendita del 2° pilastro a cui il rappresentante ha diritto a in seguito al \npensionamento\
    \ anticipato è interamente esente dall’obbligo contributivo. \nLe altre prestazioni pagate dal datore di lavoro sono escluse\
    \ solo in parte \ndal salario determinante, poiché adempiono le condizioni di prestazioni \nin caso di licenziamento per\
    \ motivi aziendali (ristrutturazione, v. punto 5 \nsegg.).\nLe prestazioni transitorie annue vanno convertite in una prestazione\
    \ in  \ncapitale:\nCapitale = rendita mensile x 12 x fattore provvisorio fino a 65  anni x  \nnumero di mesi a beneficio\
    \ di una rendita / numero di mesi fino a 65 anni.\nDal 584/12° al 59° anno d’età 82 000 franchi  \nFattore provvisorio\
    \ interpolato fino a 65 anni:  \n(6,4 - 5,5) x (8/12) + 5,5 = 6,1  \n(82 000 x 6,1 x 20/80) CHF 125 050.–\nDal 60° al\
    \ 65° anno d’età 73 000 franchi  \n(73 000 x 6,1 x 60/80) CHF 333 975.–\nIndennità di partenza CHF 150 000.–\nImporto\
    \ complessivo CHF 609 025.–\nQuattro volte e mezza  \nla rendita di vecchiaia massima annua nel 2025 - CHF  \n136 080.–\n\
    Salario determinante CHF 472 945.–\nLa conversione delle rendite in capitale viene effettuata dalle casse di com -\npensazione.\f\
    10Disposizioni comuni\n12 Cosa succede se l’attività viene soltanto ridotta?\nSe l’attività viene portata avanti a tempo\
    \ parziale, l’indennità versata è \ninteramente soggetta a contribuzione. Possono essere esenti dall’obbligo \ncontributivo\
    \ solo le prestazioni versate dal datore di lavoro in caso di com -\npleta cessazione del rapporto di lavoro. \n13 Contano\
    \ l’età e gli anni di servizio?\nNo. L’età e gli anni di servizio sono irrilevanti per il conteggio. Tuttavia non \nviene\
    \ applicata la franchigia.\n14 Quando vanno pagati i contributi?\nI contributi sono dovuti al momento del versamento della\
    \ prestazione  \nd’uscita. Se questa è versata sotto forma di rendita, i contributi sono dovuti \nal momento del primo\
    \ versamento.\f11\f12Chiarimenti e altre  \ninformazioni\n2.05-25/01-IQuesto opuscolo informativo presenta solo una panoramica\
    \ riassun -\ntiva. Per la valutazione dei casi singoli fanno stato esclusivamente le \ndisposizioni di legge in vigore.\
    \ Le casse di compensazione e le loro \nagenzie forniscono volentieri le informazioni desiderate. La lista com -\npleta\
    \ delle casse di compensazione figura su internet all’indirizzo  \nwww.avs-ai.ch . \nPubblicato dal Centro d’informazione\
    \ AVS/AI in collaborazione con \nl’Ufficio federale delle assicurazioni sociali.\nEdizione novembre 2024. Riproduzione\
    \ parziale autorizzata sotto con -\ndizione dell’accordo scritto del Centro d’informazione AVS/AI. \nQuesto opuscolo informativo\
    \ può essere richiesto alle casse di com -\npensazione, alle loro agenzie e agli uffici AI. Numero di ordinazione \n2.05/i.\
    \ È disponibile anche su www.avs-ai.ch .\n Ulteriori informazioni, pubblicazioni e video esplicativi."
