    \ der Gemeinsamen Einrichtung KVG übernommen, unter Abzug der \nKostenbeteiligung.\n Europäische Krankenversicherungskarte\n\
    Taggeldversicherung\nWas ist die Taggeldversicherung? \nDie Taggeldversicherung dient der teilweisen Deckung des Erwerbsausfalls\
    \ bei Krank -\nheit oder Unfall.\nDie Taggeldversicherung dient der teilweisen Deckung des Erwerbsausfalls bei Krankheit\
    \ oder \nUnfall sowie anderer krankheits- oder unfallbedingter Kosten, die nicht anderweitig gedeckt sind. \nSie kann\
    \ auf freiwilliger Basis und zwar auch bei einem anderen Krankenversicherer als dem -\njenigen, bei dem die obligatorische\
    \ Grundversicherung besteht, abgeschlossen werden. Wenn \neine Person beim Versicherungsbeitritt an einer Krankheit leidet,\
    \ hat der Krankenversicherer die \nMöglichkeit, diese Person während maximal fünf Jahren von der Leistungsberechtigung\
    \ für diese \nKrankheit auszuschliessen. Bei Mutterschaft unterliegt der Anspruch auf Taggelder einer vorher -\ngehenden\
    \ Versicherungsdauer von mindestens 270 Tagen. Daneben bieten die Krankenversiche -\nrer auch Taggeldversicherungen als\
    \ Zusatzversicherung an.\nKRANKENVERSICHERUNG (KV)\f61\nKRANKENVERSICHERUNG (KV)\nVereinfachter Wechsel der Taggeldversicherung\n\
    \ fStaatsangehörige der Schweiz oder eines EU- bzw. EFTA-Staates, die unmittelbar vor ihrer \nAnkunft in der Schweiz dem\
    \ System der sozialen Sicherheit eines EU- bzw. EFTA-Staates \nunterstellt waren, profitieren von dem vereinfachten Wechsel\
    \ der Taggeldversicherung. \n fDie Abkommen mit Nordmazedonien, San Marino und der Türkei beschränken die Vorbe -\nhalte\
    \ in Bezug auf bestehende Krankheiten für die Taggeldversicherung sowie die Wartefrist \nbei Mutterschaft. Verlegt eine\
    \ versicherte Person ihren Wohnsitz oder ihre Erwerbstätigkeit \nvon einem dieser Staaten (und von Bosnien-Herzegowina)\
    \ in die Schweiz und schliesst in -\nnerhalb von drei Monaten ab Austritt aus der Versicherung im anderen Staat eine Taggeld\
    \ -\nversicherung bei einem schweizerischen Versicherer ab, wird die Zeit beim Versicherer im \nanderen Staat berücksichtigt,\
    \ um zu bestimmen, wann ein Anspruch auf Leistungen in der \nSchweiz entsteht. Bei Mutterschaft wird diese Zeit nur berücksichtigt,\
    \ wenn die Person min -\ndestens drei Monate bei einem schweizerischen Versicherer versichert war.\nZusatzversicherung\n\
    Neben der obligatorischen Grundversicherung bestehen auch Zusatzversicherungen, z. B. für \nzahnärztliche oder spezielle\
    \ Behandlungen. Bei den Zusatzversicherungen handelt es sich um \nPrivatversicherungen; sie fallen nicht in den Anwendungsbereich\
    \ der Koordinationsregeln der \nnationalen Systeme der sozialen Sicherheit. Für die Rückerstattung von Leistungen sind\
    \ die jewei -\nligen allgemeinen Versicherungsbedingungen der einzelnen Versicherer massgebend. Da Unter -\nschiede im\
    \ Angebot bestehen, ist es empfehlenswert, sich bei den verschiedenen Anbietern zu \nerkundigen.\nWo können Sie sich über\
    \ die Krankenversicherung informieren? \nBei Ihrem Krankenversicherer.\nVersicherte erhalten von ihrem Krankenversicherer\
    \ alle Informationen in Bezug auf die Kranken -\nversicherung.\nDas BAG publiziert jeweils im Oktober eine nach Kantonen\
    \ und Krankenversicherern sowie nach \nEU- bzw. EFTA-Staaten getrennte Prämienübersicht für das folgende Jahr. Diese Prämienübersicht\
    \ \nfinden Sie auf der Internetseite des BAG ( www.priminfo.ch ).\nPersonen, die in einem EU- bzw. EFTA-Staat versichert\
    \ sind und sich in der Schweiz aufhalten, \nwenden sich bei Fragen an die Gemeinsame Einrichtung KVG ( www.kvg.org) .\n\
    Fragen im Zusammenhang mit der Befreiung von der Versicherungspflicht beantworten die von \nden Kantonen bezeichneten\
    \ Stellen. Die Liste der zuständigen kantonalen Behörden ist auf der \nWebsite des BAG (www.bag.admin.ch ) abrufbar.\f\
    62\nDie Unfallversicherung gemäss UVG (UV)\f63\nAllgemeines\nWas bietet die Unfallversicherung gemäss UVG? \nSchutz bei\
    \ Berufsunfällen, Nichtberufsunfällen und Berufskrankheiten.\nDie obligatorische Unfallversicherung ist eine Personenversicherung,\
    \ die darauf abzielt, die wirt -\nschaftlichen Folgen von Berufsunfällen und Berufskrankheiten sowie Nichtberufsunfällen\
    \ zu \ndecken, wenn die versicherte Person mindestens acht Stunden pro Woche bei demselben Ar -\nbeitgeber beschäftigt\
    \ ist. Mit ihren Leistungen trägt die Versicherung dazu bei, den Schaden \nwiedergutzumachen, der bezüglich Gesundheit\
    \ und Erwerbstätigkeit entsteht, wenn Versicherte \nverunfallen oder beruflich erkranken.\nUnfälle\n f Als Unfall definiert\
    \ wird eine plötzliche, nicht beabsichtigte schädigende Einwirkung eines \nungewöhnlichen äusseren Faktors auf den menschlichen\
    \ Körper, die eine Beeinträchtigung \nder körperlichen, geistigen oder psychischen Gesundheit oder den Tod zur Folge hat.\
    \ Den \nUnfällen gleichgestellt sind bestimmte Körperschädigungen, die den Folgen eines Unfalls \nähnlich sind.\nBerufsunfälle\n\
    \ f Darunter fallen Unfälle, die sich bei der Ausübung des Berufs ereignen. Unfälle während \nden Arbeitspausen sowie\
    \ vor und nach der Arbeit gelten als Berufsunfälle, sofern sich die \nversicherte Person berechtigterweise auf der Arbeitsstätte\
    \ oder im Bereich der mit ihrer be -\nruflichen Tätigkeit zusammenhängenden Gefahren aufgehalten hat.\nNichtberufsunfälle\n\
    \ f Nichtberufsunfälle sind alle Unfälle, die nicht als Berufsunfälle gelten. Dazu zählen insbeson -\ndere Unfälle auf\
    \ dem Arbeitsweg und Freizeitunfälle, wie z. B. Sportunfälle, Verkehrsunfälle \noder Unfälle im Haushalt. Teilzeitbeschäftigte\
    \ mit einer wöchentlichen Arbeitsdauer von we -\nniger als acht Stunden bei einem Arbeitgeber sind gegen Nichtberufsunfälle\
    \ nicht versichert. \nFür sie gelten Unfälle auf dem Arbeitsweg – abweichend vom Normalfall – als Berufsunfälle.\nBerufskrankheiten\n\
    \ f Als Berufskrankheiten gelten Krankheiten, die bei der beruflichen Tätigkeit ausschliesslich \noder vorwiegend durch\
    \ schädigende Stoffe oder bestimmte Arbeiten verursacht worden \nsind. Andere Krankheiten gelten nur dann als Berufskrankheiten,\
    \ wenn nachgewiesen wer -\nden kann, dass sie ausschliesslich oder überwiegend durch die berufliche Tätigkeit herbei -\n\
    geführt worden sind.DIE UNFALLVERSICHERUNG GEMÄSS UVG (UV)\f64\nWer ist obligatorisch versichert?  \nAlle Arbeitnehmerinnen\
    \ und Arbeitnehmer, die in der Schweiz beschäftigt sind.\nObligatorisch versichert sind alle in der Schweiz beschäftigten\
    \ Arbeitnehmerinnen und Arbeit -\nnehmer. Dazu gehören auch:\n f Heimarbeiterinnen und -arbeiter\n f Lehrtöchter und Lehrlinge\
    \ (Auszubildende)\n f Praktikantinnen und Praktikanten sowie Volontärinnen und Volontäre\n f Personen, die in Lehr- und\
    \ Invalidenwerkstätten tätig sind\n f Hausangestellte\n f Reinigungspersonal in privaten Haushaltungen\nZudem sind grundsätzlich\
    \ auch arbeitslose Personen obligatorisch versichert.\nNicht versichert nach UVG sind Nichterwerbstätige wie:\n f Hausfrauen\
    \ und Hausmänner\n f Kinder\n f Studierende\n f Rentnerinnen und Rentner\nDiese Personen müssen sich für Sachleistungen\
    \ im Rahmen der obligatorischen Krankenversiche -\nrung gegen Unfälle versichern.\nWann beginnt und wann endet die obligatorische\
    \ Unfallversicherung? \nMit der Arbeitsaufnahme und der Beendigung des Anspruchs auf den halben Lohn.\nDie Versicherung\
    \ beginnt an dem Tag, an dem das Arbeitsverhältnis anfängt oder erstmals Lohn -\nanspruch besteht, in jedem Fall aber\
    \ im Zeitpunkt, im dem sich die arbeitnehmende Person auf \nden Weg zur Arbeit begibt. Sie endet mit dem 31. Tag nach\
    \ dem Tage, an dem der Anspruch auf \nmindestens den halben Lohn aufhört. Als Lohn gelten auch Taggelder der obligatorischen\
    \ Unfall -\nversicherung, der Militärversicherung, der Invalidenversicherung, der Erwerbsersatzordnung (für \nDienstleistende\
    \ und bei Mutterschaft), der Krankenkasse und der privaten Kranken- und Unfall -\nversicherungen, welche die Lohnfortzahlung\
    \ ersetzen, sowie Entschädigungen einer kantonalen \nMutterschaftsversicherung.\nDurch den Abschluss einer Abredeversicherung\
    \ kann die versicherte Person die Deckung für \nNichtberufsunfälle bis zu 6 Monate verlängern.\nHaftung der Arbeitnehmenden\n\
    \ f Wurde der Gesundheitsschaden oder der Tod absichtlich herbeigeführt, so besteht kein \nAnspruch auf Versicherungsleistungen,\
    \ mit Ausnahme der Bestattungskosten.\n fEin von der versicherten Person grobfahrlässig herbeigeführter Nichtberufsunfall\
    \ kann eine \nKürzung der Taggelder von bis zu zwei Jahren zur Folge haben.\n fHat die versicherte Person den Unfall bei\
    \ der Ausübung eines Verbrechens oder Vergehens \nherbeigeführt, können die Geldleistungen gekürzt oder verweigert werden.DIE\
    \ UNFALLVERSICHERUNG GEMÄSS UVG (UV)\f65\nRuhen der Unfalldeckung in der Krankenversicherung\n f Arbeitnehmerinnen und\
    \ Arbeitnehmer, die gegen Berufsunfälle und Nichtberufsunfälle ob -\nligatorisch versichert sind, können die Unfalldeckung\
    \ beim Krankenversicherer sistieren. Die \nKrankenversicherungsprämie wird entsprechend herabgesetzt.\nWer kann sich freiwillig\
    \ versichern?  \nSelbständigerwerbende und deren mitarbeitende Familienangehörige.\nSelbständigerwerbende, die in der\
    \ Schweiz wohnen, und ihre Familienmitglieder, die im gleichen \nBetrieb arbeiten und nicht schon obligatorisch versichert\
    \ sind, können sich, je nach Höhe ihres \nversicherten Verdienstes, freiwillig nach UVG versichern.\nWer führt die Unfallversicherung\
    \ durch? \nDie Schweizerische Unfallversicherungsanstalt (Suva) und zugelassene Unfallversiche -\nrer.\nSowohl die obligatorische\
    \ wie auch die freiwillige Versicherung werden je nach Versichertenka -\ntegorie durch die Schweizerische Unfallversicherungsanstalt\
    \ (www.suva.ch)  oder durch andere \nzugelassene Unfallversicherer durchgeführt. Das Verzeichnis der Versicherer ist auf\
    \ der Website \ndes BAG (www.bag.admin.ch ) abrufbar. \nPrämien\nWer bezahlt die Versicherungsprämien?\nArbeitgebende\
    \ und Arbeitnehmende.\nDie Prämien für die Versicherung der Berufsunfälle und -krankheiten tragen die Arbeitgeben -\n\
    den. Die Prämien für die Versicherung der Nichtberufsunfälle gehen grundsätzlich zu Lasten der \nArbeitnehmenden. Die\
    \ Arbeitgebenden schulden den gesamten Prämienbetrag, wobei sie den \nAnteil der Arbeitnehmenden von deren Lohn abziehen.\n\
    Es wird eine Vorausprämie festgelegt, die vom Arbeitgeber bezahlt wird. Auf der Basis der jähr -\nlichen Lohnabrechnung\
    \ wird dann die definitive Prämienberechnung für das zurückgelegte Jahr \nerstellt. Auf dieser Grundlage wird gleichzeitig\
    \ die neue Vorausprämie für das folgende Jahr \nberechnet.DIE UNFALLVERSICHERUNG GEMÄSS UVG (UV)\f66\nWie hoch sind die\
    \ Versicherungsprämien? \nUnterschiedlich hoch je nach Einkommen und Art des Betriebes.\nDie Prämien werden in Promillen\
    \ des prämienpflichtigen Verdienstes festgesetzt. Sie bestehen \naus einer dem Risiko entsprechenden Nettoprämie und verschiedenen\
    \ Zuschlägen. Für die Be -\nmessung der Prämien werden die Betriebe nach ihrer Art und ihren Verhältnissen in Klassen\
    \ und \nStufen des Prämientarifs eingeteilt.\nDie Prämien für Nichtberufsunfälle werden grundsätzlich von den Arbeitnehmenden\
    \ getragen, \nes sei denn, es besteht eine entsprechende Abmachung zugunsten der Arbeitnehmenden. Die \nNettoprämiensätze\
    \ variieren je nach Versicherer.\nDie Prämien für Berufsunfälle und -krankheiten gehen ausschliesslich zu Lasten der Arbeitgeben\
    \ -\nden. Die Prämien sind je nach Unfallrisiko und Unternehmensverhältnissen unterschiedlich. Der \nNettoprämiensatz\
    \ variiert je nach Unternehmensklassierung und Versicherer.\nDer prämienpflichtige Verdienst\n f Der prämienpflichtige\
    \ Verdienst entspricht im Wesentlichen dem für die Bemessung der \nGeldleistungen massgeblichen Verdienst (siehe «Versicherter\
    \ Verdienst»). Einkommensteile \nüber dem Höchstbetrag des versicherten Verdienstes werden nicht berücksichtigt. Der \n\
    höchste versicherte Verdienst liegt bei 148 200 Franken pro Jahr oder 406 Franken pro Tag.\nLeistungen\nWelche Leistungen\
    \ erbringt die Unfallversicherung?\nMedizinische Behandlung und finanzielle Unterstützung.\nA. Sachleistungen: Pflegeleistungen\
    \ und Kostenvergütungen\nDie versicherte Person hat Anspruch auf eine zweckmässige Behandlung der Unfallfolgen, näm -\n\
    lich auf:\n f die ambulante Behandlung durch den Arzt oder die Ärztin, den Zahnarzt oder die Zahnärztin \nund den Chiropraktiker\
    \ oder die Chiropraktikerin, sowie – auf ärztliche Anordnung – durch \nmedizinisches Hilfspersonal\n f die vom Arzt oder\
    \ von der Ärztin, dem Zahnarzt oder der Zahnärztin verordneten Medika -\nmente und Untersuchungen\n f die Behandlung,\
    \ Verpflegung und Unterkunft in der allgemeinen Abteilung eines Spitals\n f die ärztlich verordneten Nach- und Badekuren\n\
    \ f Mittel und Gegenstände, die der Heilung dienen\nKosten für die Heilbehandlung im Ausland, für die ärztlich verordnete\
    \ Hauspflege, Hilfsmittel \nsowie Unfallschäden an Sachen, die einen Körperteil oder eine Körperfunktion ersetzen, werden\
    \ \nvom Versicherer übernommen. Leichentransport- und Bestattungskosten sowie (unter bestimm -\nten Voraussetzungen).\
    \ Reise-, Transport- und Rettungskosten werden ebenfalls vergütet.DIE UNFALLVERSICHERUNG GEMÄSS UVG (UV)\f67\nB. Geldleistungen\n\
    Versicherter Verdienst\n f Grundlage für die Geldleistungen der Unfallversicherung ist der versicherte Verdienst. Dies\
    \ \nist der für die AHV massgebende Lohn mit gewissen Ergänzungen. Der Höchstbetrag des \nversicherten Verdienstes ist\
    \ so festgesetzt, dass in der Regel 92 % bis 96 % aller obligato -\nrisch versicherten Personen zu ihrem vollen Verdienst\
    \ versichert sind. Er entspricht 148 200 \nFranken pro Jahr oder 406 Franken pro Tag.\n fMassgebend für die Bemessung\
    \ der Taggelder ist der letzte vor dem Unfall bezogene Lohn \nund für die Bemessung der Renten der innerhalb eines Jahres\
    \ vor dem Unfall bezogene \nLohn. Die Integritäts- und Hilflosenentschädigungen werden bei allen Versicherten vom ge -\n\
    setzlichen Höchstbetrag des versicherten Verdienstes berechnet.\nTaggeld\nIst eine versicherte Person infolge eines Unfalls\
    \ voll oder teilweise arbeitsunfähig, so hat sie An -\nspruch auf ein Taggeld. Dieses wird ab dem 3. Tag nach dem Unfalltag\
    \ für jeden Kalendertag \nausgerichtet. Es beträgt bei voller Arbeitsunfähigkeit 80 % des versicherten Verdienstes, bei\
    \ \nteilweiser Arbeitsunfähigkeit entsprechend weniger. Der Taggeldanspruch erlischt mit der Wie -\ndererlangung der vollen\
    \ Arbeitsfähigkeit, dem Beginn einer Invalidenrente oder mit dem Tod der \nversicherten Person. Das Taggeld für Personen,\
    \ welche während der Arbeitslosigkeit verunfallen, \nentspricht der Arbeitslosenentschädigung.\nInvalidenrente\nWenn eine\
    \ versicherte Person infolge eines Unfalls invalid wird, d.h. voraussichtlich bleibend \noder für längere Zeit in ihrer\
    \ Erwerbstätigkeit beeinträchtigt ist, so hat sie Anspruch auf eine \nInvalidenrente. Der Anspruch entsteht, wenn eine\
    \ Fortsetzung der ärztlichen Behandlung keine \nnamhafte Besserung des Gesundheitszustandes erwarten lässt und allfällige\
    \ Eingliederungsmass -\nnahmen der IV abgeschlossen sind. Massgebend für die Bemessung des Invaliditätsgrades ist der\
    \ \nVergleich der Erwerbsmöglichkeiten der versicherten Person mit bzw. ohne die Beeinträchtigung \nihrer Erwerbsfähigkeit.\
    \ Die Invalidenrente beträgt bei Vollinvalidität 80 % des versicherten Ver -\ndienstes, bei Teilinvalidität entsprechend\
    \ weniger. Versicherten mit Anspruch auf eine Rente der \nschweizerischen Alters- und Hinterlassenenversicherung oder\
    \ der Invalidenversicherung (AHV/\nIV) gewährt die Unfallversicherung eine Komplementärrente in der Höhe der Differenz\
    \ zwischen \n90 % des versicherten Verdienstes und der AHV/IV-Rente, höchstens wird aber der für Voll- bzw. \nTeilinvalidität\
    \ vorgesehene Betrag der Unfallinvalidenrente bezahlt. Mit der Wiedererlangung der \nvollen Erwerbsfähigkeit, der gänzlichen\
    \ Abfindung, dem Auskauf der Rente oder dem Tod der \nversicherten Person endet der Rentenanspruch.\nIntegritätsentschädigung\n\
    Erleidet eine versicherte Person durch einen Unfall eine dauernde erhebliche Schädigung der \nkörperlichen, geistigen\
    \ oder psychischen Integrität (z. B. Verlust einer Niere oder eines Beines, \nTetraplegie, vollständige Blindheit), hat\
    \ sie Anspruch auf eine angemessene Integritätsentschä -\ndigung. Die Entschädigung in Form einer Kapitalleistung wird\
    \ entsprechend der Schwere des \nIntegritätsschadens abgestuft. Sie entspricht höchstens dem jährlichen Verdienst, der\
    \ am Tag des \nUnfalls versichert war.DIE UNFALLVERSICHERUNG GEMÄSS UVG (UV)\f68\nDIE UNFALLVERSICHERUNG GEMÄSS UVG (UV)\n\
    Hinterlassenenrenten\nStirbt eine versicherte Person an den Folgen eines Unfalls, so haben der überlebende Ehepartner\
    \ \nbzw. die überlebende Ehepartnerin (unter bestimmten Voraussetzungen) sowie die Kinder An -\nspruch auf eine Hinterlassenenrente.\
    \ Sofern die verunfallte Person einem geschiedenen Ehegat -\nten bzw. einer geschiedenen Ehegattin gegenüber zu Unterhaltsbeiträgen\
    \ verpflichtet war, wird \ndieser oder diese der Witwe bzw. dem Witwer gleichgestellt.\nDie Hinterlassenenrente wird in\
    \ Prozenten des massgeblichen versicherten Verdienstes berechnet \nund beträgt für Witwen und Witwer 40 %, für Halbwaisen\
    \ 15 % und für Vollwaisen 25 %, für \nalle Hinterlassenen zusammen jedoch maximal 70 %. Die Hinterlassenenrente für den\
    \ geschie -\ndenen Ehegatten bzw. die geschiedene Ehegattin entspricht 20 % des versicherten Verdienstes, \nhöchstens\
    \ aber dem geschuldeten Unterhaltsbeitrag.\nHaben die Hinterlassenen Anspruch auf eine IV- oder AHV-Rente, wird ihnen\
    \ von der Unfallver -\nsicherung eine Komplementärrente gewährt (siehe Invalidenrente). In bestimmten Fällen wird der\
    \ \nWitwe oder der geschiedenen Ehefrau eine Abfindung anstelle der Rente gewährt.\nDer Anspruch des überlebenden Ehegatten\
    \ erlischt grundsätzlich mit der Wiederverheiratung, \ndem Tod der rentenberechtigten Person oder dem Auskauf der Rente;\
    \ derjenige der Kinder endet \ngrundsätzlich mit der Vollendung des 18. Altersjahres bzw. mit dem Abschluss der Ausbildung,\
    \ \nspätestens aber mit dem vollendeten 25. Altersjahr.\nDie eingetragene Partnerschaft wird während ihrer gesamten Dauer\
    \ der Heirat gleichgestellt. \nDer überlebende eingetragene Partner bzw. die überlebende eingetragene Partnerin ist der\
    \ ver -\nwitweten Person gleichgestellt. Die gerichtliche Auflösung der eingetragenen Partnerschaft ent -\nspricht einer\
    \ Scheidung.\nHilflosenentschädigung\nPersonen mit schwerwiegenden Beeinträchtigungen der Gesundheit haben nicht nur Anspruch\
    \ \nauf die notwendigen medizinischen Behandlungen und Ersatz des Erwerbsausfalls, sondern \nauch auf zusätzliche finanzielle\
    \ Mittel, die aufgrund der Hilflosigkeit benötigt werden. Die Hilf-  \nlosenentschädigung wird nur in Ausnahmefällen gewährt.\
    \ Die Höhe der Leistung richtet sich \nnach dem Vorliegen einer Hilflosigkeit und deren Schweregrad (leicht, mittel, schwer).\n\
    Als hilflos gilt eine Person, die wegen der Beeinträchtigung der Gesundheit für alltägliche Lebens -\nverrichtungen dauernd\
    \ der Hilfe Dritter oder der persönlichen Überwachung bedarf.\nDie monatliche Hilflosenentschädigung beträgt bei Hilflosigkeit\
    \ leichten Grades das Doppelte, bei \nHilflosigkeit mittleren Grades das Vierfache und bei Hilflosigkeit schweren Grades\
    \ das Sechsfache \ndes versicherten Tagesverdienstes.\nWie können Versicherte ihren Anspruch auf Leistungen geltend machen?\n\
    Indem sie Unfälle dem Arbeitgebenden oder dem Unfallversicherer melden.\nUnfälle in der Schweiz\nUnfälle in der Schweiz\
    \ müssen von der verunfallten Person oder ihren Angehörigen unverzüglich \ndem Arbeitgeber oder dem zuständigen Unfallversicherer\
    \ gemeldet werden. Ein Todesfall sollte \nebenfalls sofort dem Arbeitgeber mitgeteilt werden.\f69\nDIE UNFALLVERSICHERUNG\
    \ GEMÄSS UVG (UV)\nUnfälle im Ausland\nUnfälle im Ausland müssen von der verunfallten Person oder ihren Angehörigen unverzüglich\
    \ \ndem Arbeitgeber oder dem zuständigen Unfallversicherer gemeldet werden. Ein Todesfall sollte \nebenfalls sofort dem\
    \ Arbeitgeber mitgeteilt werden.\nDie Kosten für die im Ausland notwendigen medizinischen Behandlungen werden vom Unfall\
    \ -\nversicherer übernommen bis zum doppelten Betrag, der für eine entsprechende Behandlung in \nder Schweiz bezahlt worden\
    \ wäre. Grundsätzlich übernehmen in der Schweiz versicherte und \nvorübergehend im Ausland lebende Personen die ihnen\
    \ in Rechnung gestellten Kosten vorüber -\ngehend und stellen anschliessend einen Antrag auf Rückvergütung. Die Kosten\
    \ für die im Aus -\nland erbrachten Leistungen richten sich nach den entsprechenden gesetzlichen Bestimmungen \nim Aufenthaltsstaat.\n\
    Das Abkommen mit dem Vereinigten Königreich enthält besondere Bestimmungen über die Un -\nfallversicherung.\nUnfälle in\
    \ einem EU- bzw. EFTA-Staat\n f Verunfallte Personen, die Staatsangehörige der Schweiz oder eines EU- bzw. EFTA-Staa -\n\
    tes sind, melden sich unverzüglich bei der zuständigen Sozialversicherungsstelle des ent -\nsprechenden Staates. Diese\
    \ Stelle übernimmt vorübergehend die Behandlungskosten und \nrechnet später mit dem zuständigen schweizerischen Unfallversicherer\
    \ ab. Bei nicht sehr \nschwerwiegenden Fällen kann die Unfallversicherung verlangen, dass die versicherte Person \ndie\
    \ Unfallkosten vorübergehend bis zu ihrer Rückkehr in die Schweiz übernimmt.\nUnfälle in Bosnien und Herzegowina, in Nordmazedonien,\
    \ in San Marino, oder in \nder Türkei\n f In der Schweiz versicherte Personen, die in Bosnien und Herzegowina, in Nordmazedonien,\
    \ \nin San Marino oder in der Türkei einen Arbeitsunfall oder eine Berufskrankheit erleiden, ha -\nben Anspruch auf alle\
    \ erforderlichen Behandlungen. Sie können bei der zuständigen Stelle \ndes Aufenthaltsorts Vorschussleistungen beantragen.\
    \ Diese Stelle rechnet später mit dem \nzuständigen Versicherer in der Schweiz ab.\nStaatsangehörige der Schweiz oder\
    \ eines EU- bzw. EFTA-Staates, die in einem  \nEU- bzw. EFTA-Staat versichert sind und sich in der Schweiz aufhalten\n\
    \ f Bei Berufsunfällen übernimmt die Schweizerische Unfallversicherungsanstalt ( www.suva.ch ) \nvorübergehend die Behandlungskosten\
    \ und rechnet später mit dem zuständigen ausländi -\nschen Unfallversicherer ab.\n fBei Nichtberufsunfällen kann die verunfallte\
    \ Person unter Vorweisen der Europäischen Kran -\nkenversicherungskarte oder der provisorischen Ersatzbescheinigung dieselben\
    \ Leistungen \nder schweizerischen Krankenversicherung beziehen, wie wenn sie in der Schweiz versichert \nwäre. Die Kosten\
    \ für die ambulante Arzt- oder Spitalbehandlung sind direkt dem Leistungs -\nerbringer zu erstatten. Der Antrag auf Kostenrückerstattung\
    \ ist bei der Gemeinsamen Ein -\nrichtung KVG einzureichen ( www.kvg.org ).\f70\nDIE UNFALLVERSICHERUNG GEMÄSS UVG (UV)\n\
    Wo können Sie sich über die Unfallversicherung informieren? \nDie Unfallversicherer geben gerne Auskunft.\nFür Informationen\
    \ zu der Unfallversicherung können sich Versicherte direkt an ihren Unfall -\nversicherer wenden. Eine Liste der Unfallversicherer\
    \ finden Sie auf der Internetseite des BAG  \n(www.bag.admin.ch ).\nVersicherte, die in einem EU- bzw. EFTA-Staat unfallversichert\
    \ sind und sich in der Schweiz aufhal -\nten, wenden sich an die Gemeinsame Einrichtung KVG ( www.kvg.org ), um ihren\
    \ Anspruch auf \nLeistungsaushilfe geltend zu machen, oder an die Suva (www.suva.ch ), wenn es sich um einen \nBerufsunfall\
    \ handelt.\f71Die Arbeitslosenversicherung (ALV)\n\f72\nAllgemeines\nWas ist die Arbeitslosenversicherung (ALV)?\nEine\
    \ Versicherung gegen den Erwerbsausfall bei Verlust der Arbeitsstelle.\nDie ALV erbringt Leistungen bei Arbeitslosigkeit,\
    \ wetterbedingten Arbeitsausfällen, Kurzarbeit \nund bei der Zahlungsunfähigkeit des Arbeitgebers. Sie bezahlt auch Wiedereingliederungsmass\
    \ -\nnahmen. \nWer ist gemäss Arbeitslosenversicherungsgesetz versichert?\nAlle Arbeitnehmenden, die bei der AHV versichert\
    \ sind.\nDie Arbeitnehmer in der Schweiz sind versichert. Gewisse Personengruppen sind von der obli -\ngatorischen Beitragspflicht\
    \ befreit und somit nicht angeschlossen. Selbständigerwerbende sind \nnicht versichert.\nBeiträge\nWer bezahlt die ALV-Beiträge?\n\
    Arbeitnehmende und Arbeitgebende, je die Hälfte.\nArbeitnehmende und Arbeitgebende tragen je die Hälfte der Beiträge.\
    \ Die Beitragshöhe ent -\nspricht 2,2 % des versicherten Einkommens bis 148 200 Franken. Auf Einkommensanteilen über \n\
    148 200 Franken ist kein Beitrag zu bezahlen. \nWelches Einkommen ist massgebend?\nDasjenige, welches der AHV-Beitragspflicht\
    \ unterliegt.\nFür die Berechnung der ALV-Beiträge wird das Einkommen herangezogen, das der AHV-Beitrags -\npflicht unterliegt.\
    \ Der Höchstbetrag des versicherten Verdienstes beträgt 12 350 Franken pro \nMonat oder 148 200 Franken im Jahr. Übersteigt\
    \ das massgebliche Einkommen diesen Höchstbe -\ntrag, werden die ALV-Beiträge auf der Grundlage des maximal versicherten\
    \ Verdienstes berech -\nnet. Ein Erwerbseinkommen, das 2 300 Franken pro Jahr nicht übersteigt (geringfügiges Einkom -\n\
    men), untersteht nur auf Antrag der versicherten Person der Beitragspflicht. Hingegen besteht \ndie Beitragspflicht zwingend\
    \ für die Erwerbseinkommen von Personen, die in Privathaushalten \ntätig sind (die erzielten Einkommen bis 750 Franken\
    \ von Personen bis zum 25. Altersjahr sind von \nder Beitragspflicht an die AHV ausgenommen). Dasselbe gilt für"
