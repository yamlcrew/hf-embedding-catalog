    - "4.06 Leistungen der IV\nDas IV-Verfahren\nStand am 1. Januar 2024\f2Auf einen Blick\nFür die Früherfassung können versicherte\
      \ Personen bei der IV-Stelle des \nWohnsitzkantons gemeldet werden. \nDie versicherte Person muss das Recht auf eine\
      \ Leistung der Invalidenver -\nsicherung (IV) mit dem offiziellen Formular geltend machen. Die IV prüft \nnach Eingang\
      \ der Anmeldung, ob die Voraussetzungen für den Anspruch \nauf Leistungen der IV erfüllt sind. Sie holt dazu alle Auskünfte\
      \ ein, die für \ndie Abklärungen notwendig sind. Die Abklärungen beziehen sich auf sämt -\nliche Leistungen der IV.\
      \ Die IV kann erst nach Prüfung aller Gegebenheiten \nentscheiden, ob die versicherte Person Leistungen der IV erhält.\
      \  \nDieses Merkblatt informiert Versicherte sowie Meldungsberechtigte über \ndas IV-Verfahren. \n \n \f3Meldung\n1\
      \ Wer kann eine Meldung einreichen?\nFolgende Personen und Institutionen können eine Meldung einreichen:\n• Sie als\
      \ versicherte Person sowie Ihre gesetzliche Vertretung\n• die mit Ihnen im gemeinsamen Haushalt lebenden Familienange-\
      \  \nhörigen \n• Ihre Arbeitgeberin oder Ihr Arbeitgeber \n• Ihre behandelnden Ärzte und Chiropraktiker \n• der Krankentaggeldversicherer\n\
      • der Unfallversicherer\n• die Einrichtungen der beruflichen Vorsorge\n• die Arbeitslosenversicherung\n• die Sozialhilfeorgane\n\
      • die Militärversicherung\n• der Krankenversicherer\n• die kantonalen Instanzen und Durchführungsstellen, die für die\
      \ Unter -\nstützung und die Förderung der beruflichen Eingliederung von Jugend -\nlichen zuständig sind.\nDie versicherte\
      \ Person ist allerdings vorgängig darüber zu informieren.\n2 Wann kann ich eine Meldung einreichen?\nSie können eine\
      \ Meldung einreichen, wenn die versicherte Person arbeits -\nunfähig oder von einer länger dauernden Arbeitsunfähigkeit\
      \ bedroht ist. \nIst die versicherte Person zwischen 13 und 25 Jahre alt, kann eine Meldung \neingereicht werden sobald\
      \ sie:\n• von Invalidität bedroht ist, \n• noch keine Erwerbstätigkeit ausgeübt hat und \n• sich in einem kantonalen\
      \ Brückenangebot befindet oder von einer kan -\ntonalen Koordinationsstelle für Jugendliche in ihrer beruflichen Einglie\
      \ -\nderung unterstützt wird.\nDie Meldung zur Früherfassung ist keine Anmeldung für Leistungen der IV.\nDas zugehörige\
      \ Formular können Sie bei den IV-Stellen, den Ausgleichskas -\nsen und ihren Zweigstellen sowie unter  www.ahv-iv.ch\
      \  beziehen. \f43 Wie prüft die IV-Stelle die Meldung?\nDie IV-Stelle klärt zunächst ab, ob sie zuständig ist. Danach\
      \ prüft sie den \ngemeldeten Fall im Hinblick auf die Beurteilung der Arbeitsunfähigkeit \noder der drohenden Invalidität\
      \ der versicherten Person sowie der Ursachen \nund Folgen.\nDie IV-Stelle lädt daraufhin die gemeldete Person zu einem\
      \ Gespräch ein; \ndabei wird die medizinische, berufliche und soziale Situation analysiert. Sie \nentscheidet danach,\
      \ ob eine Anmeldung für IV-Leistungen angezeigt ist.\f5Anmeldung zum Bezug von IV-Leistungen\n4 Wie melde ich mich für\
      \ den Bezug von IV-Leistungen \nan?\nSie müssen zum Bezug von Leistungen der IV bei der IV-Stelle Ihres Wohn -\nsitzkantons\
      \ ein Gesuch einreichen. \nWenn Sie im Ausland wohnen und Beiträge an die schweizerische IV ge -\nleistet haben, ist\
      \ die IV-Stelle für Versicherte im Ausland  in Genf zuständig. \nEinen Anspruch anmelden können Sie oder Ihre gesetzliche\
      \ Vertretung  \nsowie Behörden oder Dritte, welche Sie regelmässig unterstützen \noder dauernd betreuen. Die Anmeldelegitimation\
      \ steht auch dem  \nSozialversicherer zu, der Vorleistungen erbracht hat. \nIndem Sie Ihren Leistungsanspruch geltend\
      \ machen, ermächtigen Sie die in \nder Anmeldung erwähnten Personen und Stellen, den IV-Stellen alle not -\nwendigen\
      \ Auskünfte zu erteilen und die nötigen Unterlagen zur Verfü -\ngung zu stellen.\nSie können das amtliche Anmeldeformular\
      \ bei den IV-Stellen, den Aus -\ngleichskassen und ihren Zweigstellen sowie unter www.ahv-iv.ch  beziehen.\n5 Wann muss\
      \ ich mich anmelden?\nSie müssen sich so früh wie möglich anmelden, das heisst sobald der Ge -\nsundheitsschaden Leistungen\
      \ der IV, wie Eingliederungsmassnahmen, \nRente, Hilflosenentschädigung, Assistenzbeitrag oder Hilfsmittel, auslösen\
      \ \nkann. Die verspätete Anmeldung kann die Kürzung bestimmter Leistungen \nzur Folge haben.\nZusätzliche Angaben dazu\
      \ finden Sie in folgenden Merkblättern:\n• 4.01 - Leistungen der Invalidenversicherung (IV)  \n• 4.03 - Hilfsmittel\
      \ der IV\n• 4.04 - Invalidenrenten der IV  \n• 4.09 - Berufliche Eingliederungsmassnahmen der IV  \n• 4.13 - Hilflosenentschädigungen\
      \ der IV  \n• 4.14 - Assistenzbeitrag der IV\f6Abklärung\n6 Wie prüft die IV-Stelle, ob ich die Voraussetzungen für\
      \ \neinen Anspruch auf IV-Leistungen erfülle?\nNach Eingang der Anmeldung prüft die IV-Stelle, ob Sie die Anspruchsvor\
      \ -\naussetzungen zum Bezug von Leistungen der IV erfüllen. Die IV-Stelle holt \nalle Auskünfte ein, die für die Abklärung\
      \ Ihres Gesundheitszustandes, Ihrer \nErwerbssituation oder der Tätigkeit in Ihrem Aufgabenbereich notwendig \nsind.\
      \ Ein interdisziplinäres Team aus Fachpersonen der beruflichen Einglie -\nderung, der Arbeitsvermittlung, der Abklärungsstellen,\
      \ der Sachbearbei -\ntung sowie Ärzten des Regionalen Ärztlichen Dienstes (RAD) usw. wirkt bei \nder Abklärung und der\
      \ Entscheidfindung mit. Die IV-Stelle arbeitet mit den \nanderen betroffenen Sozial- und Privatversicherungen zusammen.\n\
      7 Was prüfen die Ärztinnen und Ärzte des RAD?\nDie Ärztinnen und Ärzte des RAD prüfen die medizinischen Anspruchs -\n\
      voraussetzungen. Bei Bedarf untersucht Sie ein Arzt des RAD. Allenfalls \nkönnen die IV-Stellen zusätzliche ärztliche\
      \ Unterlagen und Gutachten von \nFachärzten verlangen.\nWeitere Informationen dazu finden Sie im Merkblatt 4.15 -  Medizinische\
      \  \nGutachten .\n8 Was prüft das Fachpersonal für die berufliche  \nEingliederung?\nDas Fachpersonal für die berufliche\
      \ Eingliederung prüft mögliche Integra -\ntionsmassnahmen und Massnahmen beruflicher Art. Die IV-Stelle lädt Sie \n\
      ein, um Ihre persönliche und berufliche Situation sowie Ihre Fähigkeiten \nabzuklären und um die weiteren Schritte zu\
      \ besprechen. Bei Bedarf fin -\ndet eine Untersuchung in einer beruflichen Abklärungsstelle der IV (BEFAS) \noder in\
      \ einer anderen Institution statt, bei der Sie bezüglich Ihrer Leistungs -\nfähigkeit begutachtet werden.\n \f79 Wann\
      \ erfolgt eine Abklärung an Ort und Stelle?\nUm Ihre Situation besser einschätzen zu können, kann eine Abklärung \n\
      an Ort und Stelle verlangt werden. Dies gilt insbesondere, wenn Sie selb -\nständigerwerbend oder im Haushalt tätig\
      \ sind sowie bei der Prüfung des \nAnspruchs auf eine Hilflosenentschädigung, einen Assistenzbeitrag und \ngewisse Hilfsmittel.\n\
      10 Auf welche Leistungen beziehen sich die Abklärungen?\nDie Abklärungen müssen sich auf sämtliche in Betracht fallenden\
      \ Leistun -\ngen erstrecken, auch wenn diese nicht ausdrücklich geltend gemacht wor -\nden sind. Wenn Sie eine Rente\
      \ beantragen, prüft die IV-Stelle in jedem Fall \nzuerst die Möglichkeit einer Eingliederung.\n11 Wann können Massnahmen\
      \ der Frühintervention  \nangeordnet werden?\nWährend der Abklärung können Massnahmen der Frühintervention ange -\n\
      ordnet werden, um den bestehenden Arbeitsplatz zu erhalten oder Sie an \neinem anderen Arbeitsplatz einzugliedern. Ist\
      \ die versicherte Person zwi -\nschen 13 und 25 Jahren alt, war sie noch nicht erwerbstätig und ist sie von \neiner\
      \ Invalidität bedroht, können Massnahmen der Frühintervention ange -\nordnet werden, um sie auf dem Weg in eine berufliche\
      \ Ausbildung oder in \neine erste Anstellung im ersten Arbeitsmarkt zu unterstützen. \n12 Wie lange dauert es, bis die\
      \ IV-Stelle über die Eingliede -\nrungsmassnahmen entscheidet?\nDie IV-Stelle fasst innerhalb von zwölf Monaten ab Einreichung\
      \ der IV-  \nAnmeldung den Entscheid, ob der Eingliederungsweg gewählt werden \nsoll, die Rentenfrage zu prüfen ist\
      \ oder kein Anspruch auf IV-Leistungen \nbesteht.\n13 Wann wird ein Eingliederungsplan erstellt?\nSteht fest, dass Ihnen\
      \ Integrationsmassnahmen und/oder Massnahmen \nberuflicher Art zugemutet werden können, wird ein Eingliederungsplan\
      \ \nerstellt. Er hält die zu erreichenden Ziele fest, regelt die Zusammenarbeit \nzwischen den beteiligten Parteien\
      \ und definiert die Verantwortlichkeiten \nund Fristen.\f8Mitwirkungspflicht und Schadenminderung\n14 Was wird von mir\
      \ erwartet?\nSie müssen alles Ihnen Zumutbare unternehmen, um die Dauer und das \nAusmass der Arbeitsunfähigkeit zu\
      \ verringern und den Eintritt einer Inva -\nlidität zu verhindern. Eine Massnahme gilt nur dann als nicht zumutbar,\
      \ \nwenn sie dem Gesundheitszustand nicht angemessen ist.\nÄnderungen der beruflichen, familiären und gesundheitlichen\
      \ Situation \nmüssen Sie der IV-Stelle melden; diese können den Leistungsanspruch be -\neinflussen.\n15 Sind die angeordneten\
      \ Massnahmen Pflicht?\nJa. Sie müssen sich aktiv an der Umsetzung aller zumutbaren Massnahmen \n(wie z. B. Frühinterventions-\
      \ und Eingliederungsmassnahmen als Vorberei -\ntung auf die berufliche Eingliederung, Massnahmen beruflicher Art oder\
      \ \nmedizinische Behandlungen) beteiligen, damit der bestehende Arbeitsplatz \nerhalten bleibt, Sie eine vergleichbare\
      \ Tätigkeit ausüben oder wieder ins \nBerufsleben eingegliedert werden können.\n16 Was geschieht, wenn ich den Verpflichtungen\
      \ nicht \nnachkomme?\nKommen Sie diesen Verpflichtungen nicht nach, können die Leistungen \ngekürzt oder verweigert\
      \ werden.\f9Vorbescheid\n17 Wann erhalte ich den Vorbescheid der IV-Stelle?\nNach Abschluss der notwendigen Abklärungen\
      \ erhalten Sie und die  \nbetroffenen Versicherungsträger von der IV-Stelle einen Vorbescheid, der \nüber den vorgesehenen\
      \ Entscheid informiert. Ihnen und den Versiche -\nrungsträgern wird eine Frist von 30 Tagen gesetzt, innert welcher\
      \ Sie sich \nzum geplanten Entscheid äussern können.\n18 Wie kann ich mich zum Vorbescheid äussern?\nSie können sich\
      \ bei der IV-Stelle entweder schriftlich zur Sache äussern \noder mündlich im Rahmen eines persönlichen Gesprächs. Persönliche\
      \ Ge -\nspräche finden in der IV-Stelle statt. Die IV-Stelle hält die Aussagen in einem \nProtokoll fest und legt Ihnen\
      \ dieses zur Unterzeichnung vor. Alle anderen \nParteien können nur schriftlich Stellung nehmen.\n19 Besteht das Recht\
      \ auf Akteneinsicht?\nJa. Sie und die beteiligten Parteien haben das Recht zur Akteneinsicht. \f10Verfügung\n20 Wann\
      \ erlässt die IV-Stelle die Verfügung?\nErheben Sie keine Einwände oder gehen innerhalb der gesetzten Frist keine \n\
      Stellungnahmen von den Parteien ein, erlässt die IV-Stelle die Verfügung.\nÄussern Sie sich oder eine andere betroffene\
      \ Partei zu relevanten Sachver -\nhalten, ist die IV-Stelle gehalten, diese Stellungnahmen in der Begründung \ndes Entscheids\
      \ zu berücksichtigen.\n21 Wie informiert die IV-Stelle über Massnahmen der \nFrühintervention?\nDer Entscheid über Massnahmen\
      \ der Frühintervention wird ohne Vorbe -\nscheid oder Verfügung mitgeteilt.\n \f11Beschwerde\n22 Wann kann ich Beschwerde\
      \ erheben?\nWenn Sie und die beteiligten Parteien mit der Verfügung der IV-Stelle nicht \neinverstanden sind, können\
      \ Sie innerhalb von 30 Tagen beim kantonalen \nVersicherungsgericht Ihres Wohnsitzkantons schriftlich Beschwerde erhe\
      \ -\nben. \nWenn Sie Ihren Wohnsitz im Ausland haben, richten Sie Ihre Beschwerde \nan das Bundesverwaltungsgericht\
      \ in St. Gallen.\n23 Wo kann ich gegen das erstinstanzliche Urteil  \nBeschwerde erheben?\nGegen das Urteil des kantonalen\
      \ Versicherungsgerichts oder des Bundes -\nverwaltungsgerichts können Sie und die beteiligten Parteien in der Folge\
      \ \nbeim Bundesgericht in Luzern Beschwerde erheben. Die schriftliche Be -\nschwerde ist innerhalb von 30 Tagen einzureichen.\n\
      24 Ist das Beschwerdeverfahren kostenpflichtig?\nJa. Das Beschwerdeverfahren betreffend IV-Leistungen ist kostenpflichtig.\f\
      12Auskünfte und weitere  \nInformationen\nDieses Merkblatt vermittelt nur eine Übersicht. Für die Beurteilung von \n\
      Einzelfällen sind ausschliesslich die gesetzlichen Bestimmungen mass -\ngebend. Die IV-Stellen, die Ausgleichskassen\
      \ und ihre Zweigstellen ge -\nben gerne Auskunft. Ein Verzeichnis aller Ansprechpartner  finden Sie \nunter www.ahv-iv.ch\
      \ .\nHerausgegeben von der Informationsstelle AHV/IV in Zusammenarbeit \nmit dem Bundesamt für Sozialversicherungen.\n\
      Nachdruck November 2024. Auch auszugsweiser Abdruck ist nur mit \nschriftlicher Einwilligung der Informationsstelle\
      \ AHV/IV erlaubt. \nDieses Merkblatt kann bei den Ausgleichskassen und deren Zweig-  \nstellen sowie den IV-Stellen\
      \ bezogen werden. Bestellnummer 4.06/d. \nEs ist ebenfalls unter www.ahv-iv.ch  verfügbar.\n Weitere Informationen,\
      \ Publikationen und Erklärvideos.\n4.06-24/01-D"
    - "6.08 Assegni familiari\nAssegni familiari\nStato al 1° gennaio 2025\f2In breve\nCon gli assegni familiari si intende\
      \ compensare parzialmente i costi soste -\nnuti dai genitori per il mantenimento dei figli. Essi includono l’assegno\
      \ per \ni figli e l’assegno di formazione e, in certi Cantoni, l’assegno di nascita e \nl’assegno di adozione.\nSecondo\
      \ la legge federale sugli assegni familiari (LAFam) in tutti i Cantoni \nsono versate le seguenti prestazioni minime\
      \ mensili:\n•  un assegno per i figli di 215 franchi per ogni figlio e mese;\n•  un assegno di formazione di 268 franchi\
      \ per ogni figlio e mese.\nHanno diritto agli assegni familiari i salariati, i lavoratori indipendenti e le \npersone\
      \ prive di attività lucrativa che conseguono un reddito modesto e le \nmadri disoccupate beneficiarie di un’indennità\
      \ di maternità, a prescindere \ndal loro reddito. Per le persone che lavorano nel settore agricolo è prevista \nuna\
      \ normativa speciale (v. opuscolo informativo 6.09 – Assegni familiari \nnell’agricoltura ).\nQuesto opuscolo informativo\
      \ informa i salariati, i lavoratori indipendenti e \nle persone prive di attività lucrativa con figli come pure i datori\
      \ di lavoro in \nmerito agli assegni familiari.\nDiritto \n1 Chi ha diritto agli assegni familiari secondo la LAFam?\n\
      •  I salariati e i lavoratori indipendenti;\n•  le persone senza attività lucrativa ai sensi dell’AVS: in virtù della\
      \ LAFam \nhanno per principio diritto agli assegni familiari anche le persone senza \nattività lucrativa con redditi\
      \ modesti (persone prive di attività lucrativa). \nSono considerate persone prive di attività lucrativa anche le madri\
      \ di -\nsoccupate beneficiarie di un’indennità di maternità, a prescindere dal \nloro reddito.\n  \f32 Chi dà diritto\
      \ agli assegni familiari?\nIn linea di principio danno diritto agli assegni familiari:\n•  i figli propri, indipendentemente\
      \ dal fatto che i genitori siano sposati o \nmeno o che si tratti di figli adottati;\n•  i figliastri, che vivono prevalentemente\
      \ in casa vostra o vi hanno vissuto \nfino alla maggiore età;\n•  gli affiliati per i quali i genitori affilianti si\
      \ sono assunti gratuitamente e \ndurevolmente le spese di mantenimento e d’educazione;\n•  i fratelli, le sorelle e\
      \ gli abiatici dell’avente diritto se questi provvede \nprevalentemente al loro mantenimento.\n3 Quali tipi di assegni\
      \ familiari esistono?\nLa LAFam prevede i seguenti assegni familiari:\n•  un assegno per i figli di almeno 215 franchi\
      \ mensili. L’assegno è versato \ndal mese in cui il figlio nasce fino alla fine del mese in cui compie il 16° \nanno\
      \ d’età. Se per il figlio sussiste già prima del compimento del 16° \nanno d’età il diritto a un assegno di formazione,\
      \ quest’ultimo viene \nversato al posto dell’assegno per i figli. L’assegno per i figli viene corri -\nsposto anche\
      \ per i figli tra i 16 e i 20 anni che presentano un’incapacità \nal guadagno a causa di un danno alla salute;\n•  un\
      \ assegno di formazione di almeno 268 franchi mensili. L’assegno è \nversato dal mese in cui il figlio inizia una formazione\
      \ postobbligatoria, \nma al più presto dal mese in cui questi compie il 15° anno d’età. Se il \nfiglio frequenta ancora\
      \ la scuola dell’obbligo dopo il compimento del \n16° anno d’età, l’assegno di formazione è versato dal mese successivo.\
      \ \nL’assegno di formazione è versato fino alla conclusione della forma -\nzione, ma al più tardi sino alla fine del\
      \ mese in cui il figlio compie il 25° \nanno d’età.\nI Cantoni possono prevedere importi più elevati e introdurre assegni\
      \ di \nnascita e di adozione.\f44 Tipi e importi degli assegni secondo le diverse leggi \ncantonali (in CHF)\nCantone\
      \ Importo per figlio e per \nmeseAssegno di \nnascitaAssegno di  \nadozione\nAssegno per  \ni figliAssegno di \nformazione\n\
      AG 215 268 – –\nAI 245 298 – –\nAR 230 280 – –\nBE 250 310 – –\nBL 215 268 – –\nBS 275 325 – –\nFR 265/2853325/34531\
