  - source_sentence: Welche Leistungen bietet die AHV für Personen aus Nichtvertragsstaaten?
    sentences:
    - "2.09 Cotisations\nStatut des indépendants\ndans les assurances\nsociales suisses\nÉtat au 1er janvier 2025\f2En bref\n\
      Ce mémento fournit des informations sur les cotisations que doivent verser \naux assurances sociales suisses les personnes\
      \ ayant le statut d’indépen -\ndant, ainsi que sur les prestations auxquelles elles ont droit. \nC’est aux caisses de\
      \ compensation qu’il appartient de décider si quelqu’un \na le statut d’indépendant au sens du droit des assurances\
      \ sociales. \nLe mémento 2.02 - Cotisations des indépendants à l’AVS, à l’AI et aux APG \net la site www.independant-suisse.ch\
      \  fournit des informations sur les dif -\nférences entre une activité lucrative indépendante et une activité salariée.\n\
      Assurance-vieillesse et survivants (AVS),  \nassurance-invalidité (AI) et  \nallocations pour perte de gain (APG)\n\
      1 Quand dois-je cotiser à l’AVS, à l’AI et aux APG ?\nSi vous exercez une activité lucrative indépendante en Suisse,\
      \ vous devez \nverser des cotisations à l’AVS, à l’AI et aux APG. Le revenu de votre activité \nindépendante pris en\
      \ compte pour la taxation de l’impôt fédéral direct sert \nde base au calcul des cotisations. Les autorités fiscales\
      \ communiquent le \nrevenu net, c’est-à-dire le revenu avant rajout des cotisations personnelles \nà l’AVS, à l’AI et\
      \ aux APG. Les caisses de compensation déduisent de ce \nrevenu l’intérêt calculé sur le capital propre investi dans\
      \ l’entreprise ainsi \nqu’une éventuelle franchise de cotisation. Elles appliquent ensuite une for -\nmule à ce résultat\
      \ pour le ramener au montant avant déduction.\nEn tant qu’indépendant, vous cotisez à hauteur de 10 % du revenu ainsi\
      \ \ncalculé. Si votre revenu n’atteint pas le seuil fixé par le Conseil fédéral, le \ntaux de cotisation applicable\
      \ est fixé selon un barème dégressif. \nLes caisses de compensation prélèvent en outre des contributions aux frais \n\
      d’administration qui ne dépassent pas 5 % des cotisations à l’AVS, à l’AI \net aux APG.\nLe mémento 2.02 - Cotisations\
      \ des indépendants à l’AVS, à l’AI et aux APG  \nfournit de plus amples renseignements sur le calcul et la perception\
      \ des \ncotisations. Il est disponible sur www.avs-ai.ch . \f32 Comment sont calculées les prestations de l’AVS ou \
      \ \nde l’AI ?\nLe calcul des prestations de l’AVS et de l’AI est le même pour les salariés et \npour les indépendants.\n\
      Les mémentos 3 - Prestations de l’AVS  et 4 - Prestations de l’AI publiées par le \nCentre d’information AVS/AI fournissent\
      \ des renseignements plus précis sur ce \npoint. Tous les mémentos sont disponibles sur www.avs-ai.ch . \n3 Comment\
      \ calcule-t-on les APG ?\nLe revenu acquis avant l’entrée en service sert de base au calcul de l’APG. \nLorsque les\
      \ conditions requises sont remplies, vous avez droit, en tant \nqu’indépendant, à une allocation d’exploitation en plus\
      \ des APG. \nVous trouverez de plus amples renseignements à ce sujet dans le mémento \n6.01 - Allocations pour perte\
      \ de gain .\n4 Comment calcule-t-on les allocations de maternité et  \nde l’autre parent, les allocations de prise en\
      \ charge et \nles allocations d’adoption ?\nLes principes régissant le calcul des allocations de maternité, de l’autre\
      \ pa -\nrent (le père ou l’épouse de la mère), de prise en charge et d’adoption aux \nsalariés s’appliquent aussi aux\
      \ indépendants. \nVous trouverez de plus amples renseignements à ce sujet dans les mé -\nmentos 6.02 - Allocation de\
      \ maternité , 6.04 - Allocation à l’autre parent  \n(le père ou l’épouse de la mère), 6.10  -  Allocation de prise en\
      \ charg e, \n6.11 - Allocation d’adoption .\n5 Quels sont les organes d’exécution ?\nVotre interlocuteur est la caisse\
      \ de compensation de votre canton ou de \nvotre association professionnelle. Vous trouverez la liste complète des \n\
      caisses de compensation sur www.avs-ai.ch .\n6 Les cotisations à l’AVS, à l’AI et aux APG sont-elles  \ndéductibles\
      \ des impôts ?\nEn tant qu’indépendant, vous pouvez déduire l’ensemble des cotisations \npersonnelles versées en vue\
      \ de l’acquisition du droit aux prestations de \nl’AVS, de l’AI et des APG du résultat d’exploitation au titre de charges\
      \ jus -\ntifiées par l’usage commercial. \f4Les cotisations que vous versez à l’AVS, à l’AI, aux APG et à l’AC en tant\
      \ \nqu’employeur en faveur de vos employés peuvent également être intégra -\nlement déduites du résultat d’exploitation\
      \ comme charges justifiées par \nl’usage commercial.\n7 Les prestations de l’AVS, de l’AI et du régime APG  \nsont-elles\
      \ imposables ?\nLa pleine déduction des cotisations a comme pendant la pleine imposition \ndes prestations. Les prestations\
      \ de l’AVS et de l’AI ainsi que les APG sont \nimposées intégralement. \nCependant, certaines prestations sont exonérées\
      \ d’impôt, notamment :\n• les prestations d’assistance provenant de fonds publics (allocations \npour impotent par ex.)\
      \ et privés, \n• la solde du service militaire et l’indemnité de fonction pour service de \nprotection civile, \n• l’argent\
      \ de poche des personnes astreintes au service civil, \n• les prestations complémentaires.\nAllocations familiales (LAFam\
      \ / LFA)\n8 Suis-je assujetti à la loi fédérale sur les allocations  \nfamiliales (LAFam) ?\nOui. En tant que personne\
      \ exerçant une activité indépendante en Suisse, \nvous êtes soumis/e à la loi fédérale sur les allocations familiales\
      \ (LAFam). \nVous devez donc vous affilier à une caisse de compensation pour alloca -\ntions familiales (CAF). En règle\
      \ générale, les CAF sont gérées par les caisses \nde compensation.\n9 Suis-je assujetti à la loi fédérale sur les allocations\
      \  \nfamiliales dans l’agriculture (LFA) ?\nNon. Selon la loi fédérale sur les allocations familiales dans l’agriculture\
      \ \n(LFA), les agriculteurs indépendants ne sont pas tenus de verser des coti -\nsations pour les allocations familiales.\
      \ Vous trouverez de plus amples infor -\nmations à ce propos dans le mémento 6.09 - Allocations familiales dans \nl’agriculture\
      \ .\f510 Quel est le montant des cotisations et des prestations ?\nEn tant qu’indépendant, vous devez payer à votre\
      \ CAF des cotisations sur \nvotre revenu, le revenu soumis à cotisation étant plafonné à 148 200 francs \npar année.\
      \ Les taux de cotisation diffèrent selon les cantons et les CAF. \nVous avez droit à des allocations familiales, dont\
      \ des allocations pour en -\nfant d’au moins 215 francs et des allocations de formation d’au moins 268 \nfrancs, par\
      \ enfant et par mois. Plusieurs cantons ont prévu des montants \nplus élevés, ainsi que des prestations additionnelles\
      \ comme une allocation \nde naissance ou une allocation d’adoption. \nVous trouverez de plus amples renseignements à\
      \ ce sujet dans le mémento \n6.08 - Allocations familiales .\nAssurance-chômage (AC)\n11 Puis-je m’affilier à l’assurance-chômage\
      \ ?\nNon. Les indépendants ne peuvent pas s’affilier à l’assurance-chômage et \nne sont par conséquent pas assurés contre\
      \ le chômage. Vous trouverez de \nplus amples informations à ce propos dans le mémento 2.08 - Cotisations \nà l’assurance-chômage\
      \ .\nPrévoyance professionnelle (2e pilier)\n12 Suis-je assujetti à la prévoyance professionnelle  \nobligatoire en\
      \ tant qu’indépendant ? \nNon, en tant qu’indépendant, vous n’êtes pas soumis à la prévoyance pro -\nfessionnelle obligatoire\
      \ (loi fédérale sur la prévoyance professionnelle, vieil -\nlesse, survivants et invalidité [LPP]).\n13 Puis-je m’affilier\
      \ à l’assurance facultative ?\nOui, en tant que personne exerçant une activité professionnelle indépen -\ndante, vous\
      \ pouvez vous assurer dans la prévoyance professionnelle à titre \nfacultatif afin de vous constituer un capital-retraite\
      \ et de vous prémunir \ncontre les risques d’invalidité et de décès (art. 4 LPP). Différents choix sont \npossibles\
      \ (voir ch. 14 à 20).\f614 Puis-je m’affilier à une institution de prévoyance d’une \nassociation professionnelle ou\
      \ de branche ?\nOui. Vous pouvez également vous faire assurer auprès de l’institution de \nprévoyance dont vous relevez\
      \ en raison de votre profession (art. 44, al. 1, \nLPP). De nombreuses associations professionnelles ou de branche vous\
      \ \noffrent, en tant qu’indépendant, la possibilité de vous affilier à leurs ins -\ntitutions de prévoyance (fondations\
      \ communes le plus souvent). C’est le \ncas pour plusieurs professions libérales (avocats, médecins ou musiciens \n\
      indépendants, par ex.) et pour de nombreuses professions des arts et mé -\ntiers, avec la fondation « proparis Prévoyance\
      \ arts et métiers Suisse », par \nexemple. De plus, les associations patronales, les chambres de commerce \net d’industrie\
      \ et d’autres organismes peuvent fournir des renseignements \nsur les possibilités d’affiliation en fonction de votre\
      \ profession.\nEn plus du plan minimal correspondant à la prévoyance obligatoire des sa -\nlariés, plusieurs institutions\
      \ de prévoyance offrent des plans de prévoyance \navec une couverture plus étendue (prévoyance surobligatoire). Ces\
      \ plans \noffrent des prestations supplémentaires comme une rente plus élevée ou \nune meilleure couverture des risques,\
      \ et prélèvent en conséquence des \ncotisations plus élevées. Vous obtiendrez des informations plus détaillées \nà ce\
      \ sujet auprès de l’association professionnelle concernée ou de l’institu -\ntion de prévoyance. En tant qu’indépendant,\
      \ vous avez aussi la possibilité \nde vous assurer uniquement auprès d’une institution de prévoyance active \ndans le\
      \ domaine de prévoyance étendue, et notamment auprès d’une ins -\ntitution de prévoyance non inscrite au registre de\
      \ la prévoyance profession -\nnelle.\n15 Puis-je m’affilier à l’institution supplétive ?\nSi vous n’êtes pas soumis/e\
      \ à la prévoyance obligatoire et que vous n’avez \npas accès à une autre institution de prévoyance (art. 44, al. 2,\
      \ LPP), vous \navez le droit de vous assurer auprès de l’institution supplétive.\nCette dernière dispose d’une agence\
      \ dans chacune des trois grandes ré -\ngions linguistiques (voir mémento 6.06 - Obligation de s’affilier à une ins -\n\
      titution de prévoyance conformément à la LPP ). La fondation institution \nsupplétive vous offre la possibilité d’adhérer\
      \ à un plan de prévoyance dont \nla couverture est équivalente à celle de la prévoyance professionnelle obli -\ngatoire\
      \ minimale des salariés.\nLe revenu assurable correspond au salaire coordonné des salariés soumis \nà la prévoyance\
      \ obligatoire (conformément à l’art. 8 LPP, la partie du sa -\nlaire annuel située entre 26 460 et 90 720 francs doit\
      \ être assurée). Vous \npouvez demander que la part du revenu soumis à l’AVS comprise entre \f790 720 francs et le maximum\
      \ du salaire prévu dans l’assurance-accidents \n(148 200 francs par an) soit assurée dans le cadre d’une prévoyance\
      \ plus \nétendue.\nLe site Internet de l’institution supplétive renseigne sur les mon -\ntants correspondants et donne\
      \ des exemples de calcul des prestations  \n(www.aeis. ch).\n16 Dois-je m’affilier à une institution de prévoyance si\
      \ \nj’emploie des salariés ?\nOui. Si, en tant qu’indépendant, vous employez des salariés soumis à l’as -\nsurance obligatoire,\
      \ vous devez être affilié à une institution de prévoyance \ninscrite au registre de la prévoyance professionnelle (art. 11,\
      \ al. 1, LPP). Les \npersonnes que vous employez sont assurées obligatoirement auprès de \ncette institution. Vous pouvez\
      \ vous-même vous affilier à l’institution de \nprévoyance qui assure vos employés (art. 44, al. 1, LPP) et ainsi bénéficier\
      \ \ndes mêmes prestations de prévoyance.\n17 Quelles sont les autres solutions proposées par les  \nassurances et les\
      \ banques (3e pilier) ?\nLes assurances et les banques vous proposent différentes possibilités de \nprévoyance vieillesse\
      \ dans le cadre du 3e  pilier (pilier 3a ou prévoyance \nindividuelle liée). Ces solutions se déclinent sous la forme\
      \ d’une épargne-  \nretraite pure ou d’une épargne-retraite combinée à une couverture d’assu -\nrance. Dans ce dernier\
      \ cas, les primes peuvent varier à la fois en fonction \nde l’étendue de la couverture des risques (invalidité et décès)\
      \ et des offres \ndes sociétés d’assurance.\nIl en est de même pour les diverses formes de placement des capitaux, telles\
      \ \nque les fonds mixtes composés par exemple d’obligations et d’actions. Les \nproduits de placement proposés sont\
      \ très divers, si bien qu’il peut exister \nde grandes disparités dans leurs perspectives de rendement et leurs risques.\
      \ \nAvant de porter votre choix sur un produit donné, il est conseillé de procé -\nder à un examen approfondi de l’offre,\
      \ en tenant compte de vos besoins. \n18 Quelles sont les prestations de prévoyance ?\nLe but principal de la prévoyance\
      \ professionnelle est d’offrir à l’assuré \nune rente de vieillesse qui s’ajoute à celle de l’AVS une fois l’âge de\
      \ ré -\nférence atteint, afin qu’il dispose d’un revenu suffisant après l’arrêt de  \nl’activité professionnelle. Le\
      \ montant de la rente versée dépend principale -\nment du capital disponible au moment de la retraite. Ce capital est\
      \ consti -\ntué des cotisations versées au fil des ans et de l’intérêt.\f8La plupart des plans de prévoyance incluent\
      \ des prestations en cas d’invali -\ndité et des prestations aux survivants en cas de décès de l’assuré. L’étendue \n\
      de ces prestations est définie dans le règlement de prévoyance du plan ou \nde l’institution.\n19 Quelles cotisations\
      \ versées à l’institution de prévoyance \nprofessionnelle sont déductibles des impôts ?\nLes cotisations que vous versez\
      \ en tant qu’employeur à l’institution de pré -\nvoyance pour vos employés sont considérées comme des charges d’exploi\
      \ -\ntation et peuvent être intégralement déduites du résultat de l’entreprise \n(art. 81 LPP et art. 27, al. 2, let. c,\
      \ LIFD). \nLes cotisations que vous avez versées en tant qu’indépendant pour \nvotre propre prévoyance professionnelle\
      \ ne peuvent être considérées \ncomme des charges d’exploitation qu’à concurrence de la « part de  \nl’employeur »,\
      \ c’est-à-dire de la part que vous versez en tant qu’employeur \npour la prévoyance de votre personnel. Les cotisations\
      \ que vous versez \nen tant qu’indépendant et qui représentent la « part de l’employé » pro -\nviennent des fonds privés\
      \ et ne peuvent être prises en compte que dans \nles déductions générales, mais ne peuvent pas être déduites du résultat\
      \ \nd’exploitation de l’entreprise. Si vous n’avez pas d’employés, 50 % au plus \ndes cotisations versées valent comme\
      \ « part de l’employeur ».\nLes cotisations que vous versez au 3e pilier au titre de la prévoyance  \nindividuelle liée\
      \ sont également déductibles du revenu, mais dans les limites \nfixées par l’art. 7 OPP 3. Si en tant qu’indépendant,\
      \ vous n’êtes affilié à au -\ncune caisse de pension du 2e pilier, la limite des cotisations annuelles déduc -\ntibles\
      \ est fixée à 20 % du revenu annuel, et au maximum à 36 288 francs (le  \nplafond pour les indépendants et les salariés\
      \ affiliés à une caisse de  \npension étant fixé actuellement à 7 258 francs).\n20 Quelles sont les prestations de prévoyance\
      \  \nprofessionnelle imposables ?\nLes prestations de la prévoyance professionnelle versées sous forme \nde rente sont\
      \ additionnées aux autres revenus imposables et in -\ntégralement imposées à ce titre. Les prestations de la prévoyance\
      \ \nprofessionnelle versées sous forme de capital sont imposées sé -\nparément des autres revenus et soumises à un impôt\
      \ annuel en -\ntier, sur la base d’un taux réduit. Pour l’impôt fédéral direct, ce taux  \ncorrespond à un cinquième\
      \ des barèmes fiscaux réguliers.\n \f9Assurance-accidents\n21 Puis-je m’affilier à l’assurance facultative ?\nEn tant\
      \ qu’indépendant, vous n’êtes pas automatiquement assuré contre \nles accidents en Suisse*. La loi fédérale sur l’assurance-accidents\
      \ (LAA) pré -\nvoit cependant que vous puissiez contracter une assurance-accidents selon \nla LAA à titre facultatif,\
      \ pour vous-même ainsi que pour les membres de \nvotre famille qui travaillent avec vous, à condition d’être domicilié\
      \ en Suisse. \nAu sens de la LAA, sont considérés comme indépendants les travailleurs \nqui ne sont pas salariés, et\
      \ comme salariés ceux qui perçoivent un salaire \ndéterminant selon la loi sur l’AVS. Il est aussi possible de travailler\
      \ en partie \ncomme indépendant et en partie comme salarié. Dans ce cas, vous avez \négalement la possibilité de contracter\
      \ une assurance à titre facultatif.\nEn outre, vous pouvez souscrire une telle assurance lorsque vous avez  \natteint\
      \ l’âge de référence et que vous étiez assuré à titre obligatoire durant \nl’année précédant le départ à la retraite.\n\
      Par contre, si vous n’exercez aucune activité lucrative et ne faites qu’  \nemployer du personnel de maison, vous ne\
      \ pouvez pas vous assurer à titre \nfacultatif.\n* En revanche, l’assurance obligatoire des soins prend en charge les\
      \ frais de guérison en cas \nd’accident également.\n22 Comment les primes sont-elles calculées ?\nLes primes d’assurance-accidents\
      \ facultative sont cal -\nculées en fonction du gain assuré convenu lors de la  \nsignature du contrat, qui peut être\
      \ modifié au début de chaque année \ncivile. Si vous exercez une activité lucrative indépendante, ce montant \nne peut\
      \ pas être inférieur à 45 % du montant maximum du gain assuré \n(148 200 francs dès le 1er janvier 2016). Pour les membres\
      \ de votre famille, \nil ne peut pas être inférieur à 30 % de ce montant.\nLes primes se composent d’une prime nette\
      \ dépendant du risque et de \nsuppléments pour les frais administratifs. Dans l’assurance facultative, il \nn’est prélevé\
      \ aucun supplément de primes pour les allocations de renché -\nrissement ni pour les mesures de prévention des accidents\
      \ et maladies pro -\nfessionnels et des accidents non professionnels.\f1023 Quelles sont les prestations assurées en\
      \ vertu  \nde la LAA ?\nLes dispositions sur l’assurance obligatoire s’appliquent par analogie à  \nl’assurance facultative.\
      \ Les prestations suivantes sont assurées : \n•  prestations pour soins ;\n•  remboursement des frais ; \n•  prestations\
      \ en espèces (indemnités journalières, rente d’invalidité,  \nindemnité pour atteinte à l’intégrité, allocation pour\
      \ impotent et rente \nde survivants).\n24 Qui sont les assureurs ?\nL’assurance facultative est gérée par les mêmes\
      \ assureurs que l’assurance \nobligatoire, à savoir par la Suva et par les assureurs désignés à l’art. 68 \nLAA. \n\
      Si vous employez du personnel soumis à l’assurance obligatoire, c’est par \nprincipe l’assureur couvrant le personnel\
      \ de l’entreprise qui gère également \nl’assurance facultative pour vous-même et pour les membres de votre fa -\nmille\
      \ collaborant à l’entreprise. \nSi vous n’employez pas de personnel et que vous travaillez dans un secteur \néconomique\
      \ relevant de la Suva, vous ne pouvez vous assurer à titre facul -\ntatif qu’auprès de la Suva. Il en est de même pour\
      \ les membres de votre \nfamille qui travaillent dans l’entreprise. \nSi vous travaillez dans un secteur économique\
      \ qui ne relève pas de la Suva, \nvous pouvez choisir votre assureur parmi les assureurs désignés à l’art. 68 \nLAA.\
      \ Ceux-ci n’ont pas l’obligation d’accepter une demande d’adhésion.\nSi vous accomplissez un service (comme le service\
      \ militaire), vous êtes as -\nsuré contre les accidents auprès de l’assurance militaire (qui est gérée par \nla Suva).\
      \ \f1125 Quelles sont les cotisations d’assurance-accidents  \ndéductibles des impôts ?\nLes primes que vous versez\
      \ à l’assurance-accidents obligatoire en faveur de \nvos employés peuvent être intégralement déduites du résultat d’exploita\
      \ -\ntion comme charges justifiées par l’usage commercial. Les primes que vous \npayez en tant qu’indépendant à titre\
      \ facultatif pour votre propre assurance-  \naccidents obligatoire ne peuvent être déduites du résultat d’exploitation\
      \ en \ntant que charges justifiées par l’usage commercial qu’à hauteur des primes \nversées pour les autres employés.\
      \ Si vous n’employez pas de personnel, les \nprimes que vous versez pour votre propre assurance sont réparties entre :\n\
      • les frais professionnels  que vous pouvez déduire du résultat d’ex -\nploitation en tant que charges justifiées par\
      \ l’usage commercial, et \n• les frais privés  que vous pouvez faire valoir dans les déductions géné -\nrales concernant\
      \ les assurances.\n26 Quelles sont les prestations d’assurance-accidents  \nimposables ?\nLes prestations de l’assurance-accidents\
      \ versées sous forme de rente sont \nadditionnées aux autres revenus imposables et intégralement imposées à \nce titre.\
      \ Celles versées sous forme de capital sont imposées séparément des \nautres revenus et soumises à un impôt annuel entier,\
      \ sur la base d’un taux \nréduit. Pour l’impôt fédéral direct, ce taux correspond à un cinquième des \nbarèmes fiscaux\
      \ réguliers.\f12Renseignements et autres  \ninformations\nCe mémento ne fournit qu’un aperçu général. Pour le règlement\
      \ des \ncas individuels, seules les dispositions légales font foi. Les caisses de \ncompensation et leurs agences fournissent\
      \ volontiers tous les rensei -\ngnements utiles. Vous trouverez la liste complète des caisses de com -\npensation sur\
      \ le site www.avs-ai.ch .\nLes désignations d’état civil utilisées ici ont également les significations \nsuivantes\
      \ : \n• mariage : partenariat enregistré ;\n•  divorce : dissolution judiciaire du partenariat enregistré ;\n•  décès\
      \ du conjoint : décès du partenaire enregistré.\nPublié par le Centre d’information AVS/AI en collaboration avec  \n\
      l’Office fédéral des assurances sociales.\nÉdition novembre 2024. Toute reproduction, même partielle, n’est  \nautorisée\
      \ qu’avec l’accord écrit du Centre d’information AVS/AI. \nCe mémento peut être obtenu auprès des caisses de compensation\
      \ et \nde leurs agences ainsi qu’auprès des offices AI. Numéro de commande \n2.09/f. Il est également disponible sous\
      \ www.avs-ai.ch .\n Plus d’informations, de publications et de vidéos explicatives.\n2.09-25/01-F"
    - "3.03 Prestations de l’AVS \nRentes de survivants \nde l’AVS\nEtat au 1er janvier 2025\f2En bref\nLa rente de survivants\
      \ est là pour empêcher que le décès du conjoint ou \nd’un des parents ne mette financièrement en difficulté le conjoint\
      \ survivant \net les enfants. Il existe trois types de rentes de survivants :\n•  la rente de veuve,\n•  la rente de\
      \ veuf,\n•  la rente d’orphelin.\nVous avez droit à une rente de survivants seulement si la personne décédée \npouvait\
      \ justifier d’au moins une année entière de cotisation.\nCette condition est remplie,\n•  lorsque la personne décédée\
      \ totalise une année de cotisation, ou\n•  que la personne décédée était assurée et que son conjoint a payé le \ndouble\
      \ de la cotisation minimale pendant un an au moins, ou\n•  que la personne décédée pouvait justifier de bonifications\
      \ pour tâches \néducatives ou d’assistance.\f3Rente de veuve\n1 Dans quelles circonstances ai-je droit, étant mariée,\
      \  \nà une rente de veuve ?\nSi vous êtes mariée et que votre époux ou votre épouse décède, vous avez \ndroit à une\
      \ rente de veuve,\n•  si vous avez un ou plusieurs enfants – leur âge n’est pas déterminant \n– lors du décès de votre\
      \ conjoint. Sont assimilés à vos enfants ceux \nde votre conjoint décédé qui font ménage commun avec vous et qui \n\
      donnent droit à une rente d’orphelin. Cela vaut aussi pour les enfants \nrecueillis par vous et votre conjoint, pour\
      \ autant que vous les adoptiez \naprès être devenue veuve. L’épouse de la mère est également considé -\nrée comme une\
      \ veuve qui a un enfant si elle était mariée avec la mère \nau moment de la naissance, et que l’enfant a été conçu conformément\
      \ \naux dispositions de la loi sur la procréation médicalement assistée et \nqu’il existe par conséquent un lien de\
      \ filiation (art. 255a, al. 1, CC), ou\n•  si vous avez 45 ans révolus lors du décès de votre conjoint et que vous \n\
      avez été mariée pendant cinq ans au moins. Si vous avez été mariée \nplusieurs fois, la durée des mariages successifs\
      \ sera prise en compte \nlors du calcul de la rente. Pour les couples de même sexe qui ont \nconverti leur partenariat\
      \ enregistré en mariage, la durée du partenariat \nest ajoutée aux années de mariage.\f42 Dans quelles circonstances\
      \ ai-je droit, étant divorcée,  \nà une rente de veuve ?\nSi vous êtes divorcée et que votre ex-époux ou ex-épouse décède,\
      \ vous \navez droit à une rente de veuve,\n•  si vous avez des enfants et que le mariage dissous a duré au moins dix\
      \ \nans, ou \n•  si vous aviez plus de 45 ans lors du divorce et que le mariage dissous a \nduré au moins dix ans, ou\
      \ \n•  si le cadet de vos enfants a moins de 18 ans lorsque vous atteignez \nl’âge de 45 ans. \nSi vous ne remplissez\
      \ aucune de ces conditions, vous avez droit à une rente \nde veuve tant que le cadet de vos enfants n’a pas 18 ans révolus.\n\
      L’épouse divorcée de la mère est également considérée comme une veuve  \navec enfant si elle était mariée avec la mère\
      \ au moment de la naissance, \net que l’enfant a été conçu conformément aux dispositions de la loi sur la \nprocréation\
      \ médicalement assistée et qu’il existe par conséquent un lien de \nfiliation (art. 255a, al. 1, CC).\nSi le mariage\
      \ avait été établi par la conversion d’un partenariat enregistré, \nen cas de divorce, la durée du partenariat enregistré\
      \ est ajoutée aux années \nde mariage.\nRente de veuf\n3 Dans quelles circonstances ai-je droit, en tant \nqu’homme\
      \ marié ou en tant que partenaire  \nenregistré/e, à une rente de veuf ? \nSi vous êtes marié et que votre épouse ou\
      \ votre époux décède, vous avez \ndroit à une rente de veuf si, au moment du veuvage, vous avez un ou plu -\nsieurs\
      \ enfants (quel que soit leur âge). Sont assimilés à vos enfants ceux \nde votre conjoint/e décédé/e qui font ménage\
      \ commun avec vous et qui \ndonnent droit à une rente d’orphelin. Cela vaut aussi pour les enfants re -\ncueillis dont\
      \ vous vous occupiez jusqu’alors avec votre conjoint/e, pour au -\ntant que vous les adoptiez après votre veuvage.\n\
      Si votre partenaire enregistré/e décède, vous êtes assimilé/e à un veuf. \f5Dans son arrêt du 11 octobre 2022, la Grande\
      \ Chambre de la Cour eu -\nropéenne des droits de l’homme a jugé qu’une inégalité de traitement \ncontraire à la Convention\
      \ européenne des droits de l’homme (CEDH) avait \neu lieu du fait de l’extinction du droit du recourant à une rente\
      \ de veuf à \nla majorité de son dernier enfant, extinction qui n’est pas prévue pour une \nveuve se trouvant dans la\
      \ même situation.\nLa Suisse est tenue de se conformer à cet arrêt et de mettre fin à la violation \nconstatée du droit\
      \ dès l’entrée en force de l’arrêt le 11 octobre 2022. Les \nbases légales doivent être adaptées en conséquence en respectant\
      \ la pro -\ncédure législative. Celle-ci pouvant être relativement longue, l’adaptation \nne prendra effet qu’ultérieurement.\
      \ D’ici là, le régime transitoire en vigueur \ndepuis le 11 octobre 2022 s’applique aux veufs avec enfants. Leur droit\
      \ à \nune rente de veuf ne s’éteint plus lorsque le cadet de leurs enfants atteint \nl’âge de 18 ans, et la rente continue\
      \ d’être versée au-delà de cet âge.\nL’arrêt de la CEDH ne s’applique ni aux veufs sans enfant ni aux hommes \ndivorcés.\
      \ Les veufs sans enfant continuent à ne pas avoir droit à une rente \nde veuf sur la base de cet arrêt et, pour les\
      \ hommes divorcés, le droit à la \nrente de veuf s’éteint dans tous les cas lorsque le cadet de leurs enfants \natteint\
      \ l’âge de 18 ans. L’arrêt de la CEDH ne s’applique pas non plus aux \ncas dans lesquels la suppression de la rente\
      \ de veuf décidée en raison de la \nmajorité du cadet des enfants est entrée en force avant le 11 octobre 2022.\n4 Dans\
      \ quelles circonstances ai-je droit, en tant \nqu’homme divorcé, à une rente de veuf ?\nSi vous êtes divorcé et que\
      \ votre ex-épouse décède, vous avez droit à une \nrente de veuf tant que vous avez des enfants de moins de 18 ans.\f\
      6Rente d’orphelin\n5 Dans quelles circonstances les enfants bénéficient-ils \nd’une rente d’orphelin ?\nL’AVS accorde\
      \ une rente d’orphelin aux enfants dont l’un des parents dé -\ncède. \nSi la mère était mariée à une femme au moment\
      \ de la naissance et que \nl’enfant a été conçu conformément aux dispositions de la loi sur la pro -\ncréation médicalement\
      \ assistée (art. 255a, al. 1, CC), l’épouse de la mère \nest considérée comme l’autre parent. Dans un tel cas, l’enfant\
      \ a également \ndroit à une rente d’orphelin au décès de l’épouse de la mère.\nEn cas de décès des deux parents, les\
      \ enfants ont droit à deux rentes d’or -\nphelin (une par parent décédé). Ce droit dure jusqu’à leur 18e anniversaire.\
      \ \nPour les enfants qui suivent une formation, le droit s’éteint lorsqu’ils ter -\nminent leur formation, mais au plus\
      \ tard à leur 25e anniversaire. Des dispo -\nsitions spéciales sont applicables aux enfants recueillis. Les enfants\
      \ dont le \nrevenu annuel brut de l’activité lucrative dépasse 30 240 francs durant leur \nformation n’ont pas droit\
      \ à une rente d’orphelin.\nNaissance et extinction du droit à la rente\n6 Quand le droit à une rente de survivants prend-il\
      \  \nnaissance ?\nLe droit à une rente de survivants prend naissance le premier jour du mois \nqui suit le décès du\
      \ conjoint, de l’ex-conjoint ou de l’un des parents.\n7 Quand le droit à une rente de survivants s’éteint-il ?\nLe droit\
      \ à une rente de survivants s’éteint à la fin du mois au cours duquel \nles conditions ne sont plus remplies. Un remariage\
      \ met fin au droit à la \nrente de veuve ou de veuf. En revanche, les rentes d’orphelin sont main -\ntenues.\f7Concours\
      \ de prestations\n8 Quelle sera la rente versée ?\nSi vous remplissez simultanément les conditions d’octroi d’une rente\
      \ de \nsurvivants et celles d’une rente de vieillesse ou d’invalidité, c’est la rente la \nplus élevée qui vous sera\
      \ versée.\nDemande de rente\n9 Où dois-je faire valoir mon droit à une rente de  \nsurvivants ?\nVous devez faire valoir\
      \ votre droit à une rente de survivants auprès de la \ndernière caisse de compensation qui a encaissé les cotisations\
      \ AVS de la \npersonne décédée. Le formulaire 318.371 – Demande de rente de survivant  \npeut être obtenu auprès des\
      \ caisses de compensation et de leurs agences, \nainsi que sur le site www.avs-ai.ch . La demande doit ensuite être\
      \ déposée \nauprès de la caisse de compensation compétente.\nSi vous avez accompli des périodes d’assurance en Suisse\
      \ ou dans un ou \nplusieurs États membres de l’UE ou de l’AELE, la présentation d’une seule \ndemande dans votre pays\
      \ de domicile suffit. La présentation d’une seule \ndemande dans le pays de domicile entraînera la procédure d’annonce\
      \ dans \ntous les pays concernés.\nSi la personne décédée n’a pas cotisé à l’AVS, vous devez adresser votre \ndemande\
      \ de rente de survivants à la caisse cantonale de compensation ou \nà son agence.\nSi vous résidez à l’étranger, veuillez\
      \ consulter la page « Demander une \nrente de survivant » sur le site Internet de la Caisse suisse de compensation \n\
      CSC : www.cdc.admin.ch\f8Calcul des rentes de survivants\n10 Comment les rentes de survivants sont-elles calculées ?\n\
      Les éléments du calcul de la rente sont les suivants : \n•  les années de cotisation qui peuvent être prises en considération,\n\
      •  les revenus de l’activité lucrative, et\n•  les bonifications pour tâches éducatives et pour tâches d’assistance\
      \ de \nla personne décédée.\nDans le cas du décès de l’épouse, ex-épouse ou mère, la durée de cotisation \ndoit être\
      \ déterminée pour le calcul de la rente de veuf et des rentes d’or -\nphelin : les années de mariage antérieures au\
      \ 31 décembre 1996 (exemptes \nde cotisations) sont comptées comme années de cotisation.\n11 Vais-je toucher une rente\
      \ complète ?\nVous toucherez une rente complète (échelle de rentes 44) si la personne \ndécédée a présenté une durée\
      \ de cotisation complète du 1er janvier qui suit \nson 20e anniversaire à son décès.\n12 Vais-je toucher une rente partielle\
      \ ?\nVous toucherez une rente partielle (échelle de rentes 1-43) si la personne \ndécédée présentait une durée de cotisation\
      \ incomplète. Cette rente est \ncalculée selon le rapport entre le nombre effectif d’années où la personne \ndécédée\
      \ a cotisé et la durée de cotisation complète.\n13 Les années de jeunesse sont-elles prises en compte ?\nLes années\
      \ de jeunesse sont des périodes de cotisation accomplies entre 18 \net 20 ans. Les périodes de cotisation accomplies\
      \ par la personne décédée \npendant lesdites années peuvent être prises en compte afin de combler \nd’éventuelles lacunes\
      \ de cotisation.\n14 Les périodes de cotisations accomplies après l’âge de \nréférence sont-elles prises en compte ?\n\
      Si la personne décédée avait continué d’exercer une activité lucrative après \nl’âge de référence, il est possible,\
      \ sous certaines conditions, de prendre en \ncompte ces périodes de cotisation pour combler les lacunes ou d’augmen\
      \ -\nter la rente grâce aux revenus supplémentaires. Un nouveau calcul de la \nrente ne peut être effectué qu’une seule\
      \ fois après l’âge de référence. \f9Si la personne décédée n’avait pas demandé de nouveau calcul, les survi -\nvants\
      \ peuvent le faire pour leur rente de survivants. \nNous attirons votre attention sur les informations complémentaires\
      \ figu -\nrant dans le mémento  3.08 - Nouveau calcul de la rente de vieillesse après \nl’âge de référence .\n15 Quelle\
      \ est la composition du revenu annuel moyen ?\nLe revenu annuel moyen se compose \n•  de la moyenne des revenus de l’activité\
      \ lucrative,\n•  de la moyenne des bonifications pour tâches éducatives, et \n•  de la moyenne des bonifications pour\
      \ tâches d’assistance.\nMoyenne des revenus de l’activité lucrative\n16 Comment la moyenne des revenus de l’activité\
      \ lucrative \nest-elle calculée ?\nLes rentes de survivants sont calculées sur la base des revenus de l’activité \n\
      lucrative de la personne décédée.\nPour calculer la moyenne des revenus de l’activité lucrative, on additionne \ntous\
      \ les revenus issus d’une activité lucrative réalisés jusqu’au 31 décembre \nde l’année précédant l’ouverture du droit\
      \ à la rente. Les revenus des années \nde jeunesse sont pris en compte uniquement pour combler les lacunes de \ncotisation\
      \ ultérieures. \nLes revenus de l’activité lucrative des personnes sont inscrits sur ce que l’on \nappelle leur compte\
      \ individuel (CI).\n17 La somme des revenus est-elle adaptée à l’évolution des \nsalaires et des prix ?\nLes revenus\
      \ peuvent dater d’années où les salaires se situaient à un niveau \nplus bas. C’est pourquoi la somme des revenus est\
      \ revalorisée selon l’évolu -\ntion moyenne des salaires et des prix. La somme revalorisée est divisée par \nle nombre\
      \ d’années et de mois qui peuvent être pris en compte. Le résultat \ncorrespond à la moyenne des revenus de l’activité\
      \ lucrative.\f1018 Qu’est-ce que le supplément de carrière ?\nLorsque la personne décède avant 45 ans, la moyenne des\
      \ revenus de l’ac -\ntivité lucrative est augmentée d’un supplément exprimé en pourcentage et \ncalculé en fonction\
      \ de son âge (supplément de carrière).\nEn cas de décès Pourcentage\nde l’âge de  \n… ansà l’âge de  \n...ans\n23 100\n\
      23 24 90\n24 25 80\n25 26 70\n26 27 60\n27 28 50\n28 30 40\n30 32 30\n32 35 20\n35 39 10\n39 45 5\nMoyenne des bonifications\
      \ pour tâches éducatives et \npour tâches d’assistance\n19 Qu’est-ce que les bonifications pour tâches éducatives ?\n\
      La personne décédée peut être gratifiée de bonifications pour tâches édu -\ncatives pour les années durant lesquelles\
      \ elle s’est occupée d’enfants de \nmoins de 16 ans. La bonification correspond au triple de la rente minimale \nannuelle.\
      \ Dans le cas de personnes mariées, la bonification est partagée \npar moitié pour les années civiles de mariage. Ce\
      \ partage ne concerne tou -\ntefois que les bonifications pour la période comprise entre le 1er janvier qui \nsuit le\
      \ 20e anniversaire et le 31 décembre qui précède l’accomplissement \nde l’âge de référence du conjoint le plus âgé.\
      \ La moyenne des bonifications \npour tâches éducatives s’obtient en divisant la somme des bonifications par \nla durée\
      \ de cotisation complète. \nSi les parents sont divorcés ou non mariés, et qu’ils exercent conjointement \nl’autorité\
      \ parentale, la bonification pour tâches éducatives entière est at -\ntribuée à l’un d’entre eux ou par moitié à chacun\
      \ d’eux, en fonction de la \ndécision du tribunal ou de l’autorité de protection de l’enfant et de l’adulte \n(APEA),\
      \ ou sur la base de l’accord passé entre les parents.  Nous attirons \nvotre attention sur les informations complémentaires\
      \ figurant dans le mé -\nmento 1.07 – Bonifications pour tâches éducatives.\f1120 Qu’est-ce que les bonifications pour\
      \ tâches  \nd’assistance ?\nLa personne décédée peut être gratifiée de bonifications pour tâches d’as -\nsistance pour\
      \ les années pendant lesquelles elle s’est occupée de parent \nnécessitant des soins, qui habitaient à proximité et\
      \ touchaient une alloca -\ntion pour impotence. Est assimilé/e aux parents le/la partenaire avec qui \nl’assuré/e fait\
      \ ménage commun depuis au moins cinq ans. Elle n’en est \ncependant pas gratifiée pour les années pour lesquelles elle\
      \ avait déjà droit \nà des bonifications pour tâches éducatives. La bonification correspond au \ntriple de la rente\
      \ minimale annuelle. Dans le cas de personnes mariées, la \nbonification est partagée par moitié pour les années civiles\
      \ de mariage. Ce \npartage ne concerne toutefois que les bonifications pour la période com -\nprise entre le 1er janvier\
      \ qui suit le 20e anniversaire et le 31 décembre qui \nprécède l’accomplissement de l’âge de référence du conjoint le\
      \ plus âgé. La \nmoyenne des bonifications pour tâches d’assistance s’obtient en divisant la \nsomme des bonifications\
      \ par la durée complète de cotisation.  \nLa demande d’attribution de bonifications pour tâches d’assistance doit \n\
      être déposée chaque année pour l’année précédente, au moyen du formu -\nlaire 318.270 - Demande de bonifications pour\
      \ tâches d’assistance , auprès \nde la caisse cantonale de compensation du domicile de la personne assis -\ntée.\nNous\
      \ attirons votre attention sur les informations complémentaires figu -\nrant dans le mémento 1.03 - Bonifications pour\
      \ tâches d’assistance .\f12Montant des rentes\n21 Quel est le montant des rentes à l’heure actuelle ?\nSi la durée de\
      \ cotisation était complète, les survivants ont droit à une rente \nordinaire complète qui dépend du revenu moyen de\
      \ la personne décédée :\nminimale maximale\nCHF/mois CHF/mois\nRente de veuve ou de veuf 1 008.– 2 016.–\nRente d’orphelin\
      \   504.– 1 008.–\nLorsqu’un enfant donne droit à deux rentes d’orphelin ou à une rente d’or -\nphelin et une rente\
      \ pour enfant, la somme des deux ne doit pas dépasser \n1 512 francs (60 % de la rente maximale de vieillesse).\nPrestations\
      \ complémentaires\n22 Dans quelles circonstances ai-je droit à des prestations \ncomplémentaires ?\nSi vous êtes veuve,\
      \ veuf ou orphelin et que votre situation économique est \nmodeste, vous avez droit à des prestations complémentaires,\
      \ à certaines \nconditions. Nous attirons votre attention sur les informations complémen -\ntaires figurant dans les\
      \ mémentos 5.01 – Prestations complémentaires à \nl’AVS  et à l’AI  et 5.02 – Votre droit aux prestations complémentaires\
      \ à l’AVS \net à l’AI .\nSi vous résidez à l’étranger, vous n’avez pas droit aux prestations complé -\nmentaires.\f\
      13Exemple de calcul\n23 Décès du mari et père\nUn homme né en juin 1975 décède en mars 2025. Il laisse une épouse et\
      \ \ndeux enfants, nés en 2007 et 2008. Des bonifications pour tâches éduca -\ntives peuvent donc lui être imputées pour\
      \ une durée de 17 ans. Une rente \nde veuve et deux rentes d’orphelin sont versées à partir du 1er avril 2025. Le \n\
      défunt a cotisé à l’AVS sans interruption depuis 1996 jusqu’à son décès, ce \nqui ouvre le droit à des rentes complètes\
      \ de survivants ( échelle de rentes 44 ).\nLa moyenne des revenus de l’activité lucrative est calculée sur la \nbase\
      \ des comptes individuels comme suit :\nSomme des revenus réalisés pendant 29  \nannées de cotisation, de 1996 à 2024\
      \ CHF 1 600 000.–\nCette somme de revenus divisée par la durée de \ncotisation déterminante (29 années) donne une  \n\
      moyenne des revenus provenant  \nde l’activité lucrative de CHF 55 172.–\nLa moyenne des bonifications pour tâches éducatives\
      \ est  \ncalculée comme suit :\nNombre d’années x triple de la rente annuelle  \nminimale ÷ durée de cotisation ÷ deux\
      \ ans  \n17 x 45 360 francs ÷ 29 années ÷ 2 CHF 13 295.–\nCalcul du revenu annuel moyen et des rentes :\nMoyenne des\
