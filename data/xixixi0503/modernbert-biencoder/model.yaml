  - "2.11 Contributi\nObbligo contributivo\nsulle indennità per lavoro\nridotto o per intemperie\nStato al 1° gennaio 2025\f\
    2In breve\nL’assicurazione contro la disoccupazione versa alle aziende un’indennità \nper lavoro ridotto o interruzioni\
    \ di lavoro, se quest’ultimo non può essere \nsvolto a causa di intemperie. \nIl datore di lavoro versa il salario ai\
    \ lavoratori il giorno usuale di paga. La \nperdita di guadagno va pagata all’80 per cento. Il datore di lavoro regola\
    \ \npoi le assenze dal lavoro con la cassa di disoccupazione.\nLa cassa di disoccupazione non copre la ‘perdita di salario\
    \ complessiva, ma \nsoltanto l’80 per cento di essa.\nL’indennità per lavoro ridotto o per intemperie può essere cal -\n\
    colata in modo rapido e semplice grazie al calcolatore online:  \nwww.ahv-iv.ch/r/lavororidotto .\nQuesto opuscolo informativo\
    \ è destinato ai datori di lavoro e ai salariati.\nContributi alle assicurazioni sociali per i datori di \nlavoro\n1 Quali\
    \ contributi sociali vanno pagati? \nIn caso di diritto a indennità per lavoro ridotto o per intemperie, il datore di\
    \ \nlavoro è tenuto a pagare i contributi alle assicurazioni sociali sulla base del \ntempo di lavoro normale, quindi\
    \ del 100 per cento del salario. In questo \nmodo, i lavoratori mantengono interamente la propria copertura assicura -\n\
    tiva.\nEssi devono versare gli importi seguenti:\n•  contributi all’AVS, all’AI, alle indennità di perdita di guadagno\
    \ (IPG) e \nall’assicurazione contro la disoccupazione (AD);\n•  contributi alla cassa di compensazione per assegni familiari;\n\
    •  contributi alla previdenza professionale;\n•  premi all’assicurazione contro gli infortuni.\nViene dedotta al salariato\
    \ la sua parte dei contributi e dei premi, a condi -\nzione che esista un obbligo di contribuzione paritetico (datore\
    \ di lavoro e \nsalariato pagano ciascuno la metà) e salvo accordi diversi.\nLa cassa di disoccupazione rimborsa al datore\
    \ di lavoro i contributi padronali \nall’AVS/AI/IPG/AD per i periodi computabili di perdita di lavoro unitamente \nal\
    \ versamento delle indennità.\f32 Il lavoro ridotto si applica anche ai lavoratori a  \ndomicilio?\nSì. L’assicurazione\
    \ contro la disoccupazione versa un’indennità per lavoro \nridotto anche ai lavoratori a domicilio. Quale base di calcolo\
    \ è applica -\nbile il guadagno medio mensile determinato dalla cassa di disoccupazione  \n(secondo il modulo 1044Xi della\
    \ SECO). Questo guadagno medio è utiliz -\nzato anche per il calcolo dei contributi delle assicurazioni sociali per i\
    \ mesi \nin cui esiste un diritto a un’indennità per lavoro ridotto.\nEsempio di calcolo\n3 Lavoro ridotto in una fabbrica\n\
    Salario in caso di tempo di lavoro normale\nSalario mensile, secondo contratto CHF 4 500.00\n6,4 % di deduzione per AVS,\
    \ AI, IPG e AD -CHF 288.00\n2 % di deduzione per l’assicurazione contro  \ngli infortuni non professionali-CHF 90.00\n\
    Deduzione per la cassa pensioni -CHF 169.85\nSalario netto versato CHF 3 952.15\nTempo di lavoro in caso di lavoro ridotto\
    \ o di sospensione del lavoro:\nIn questo caso, l’orario di lavoro mensile regolare nell’azienda ammonta \ncomplessivamente\
    \ a 187 ore, con 22 giorni lavorativi e 42,5 ore settima -\nnali. A causa dell’orario ridotto, secondo il controllo dell’orario\
    \ aziendale in \nquesto mese sono state lavorate solo 51 ore, il che significa che sono state \nperse 136 ore.\nLa perdita\
    \ di guadagno dovuta all’orario ridotto viene calcolata sulla base \ndelle ore di lavoro perse. Poiché la cassa di disoccupazione\
    \ copre l’80 per \ncento della perdita di salario, si determina la perdita di salario per le 136 ore \nperse e si calcola\
    \ l’indennità per lavoro ridotto su questa base.\nTempo di lavoro medio mensile:\n52 settimane x 42,5 ore ÷ 12 mesi =\
    \ 184,17 ore\nSalario di base per un’ora:\n4 500 franchi salario di base mensile ÷ 184,17 ore mensili = 24.43 franchi\n\
    Indennità per lavoro ridotto (80 % del salario di base andato perso):\n136 ore di lavoro andate perse x 24.43 franchi\
    \ l’ora x 0,8 = 2 658 franchi\f4Chiarimenti e altre  \ninformazioniSalario in caso di lavoro ridotto\nSalario mensile,\
    \ secondo contratto CHF 4 500.00\nRiduzione del salario lordo: 136 ore x CHF 24.43 -CHF 3 322.50\nSalario lordo per ore\
    \ di lavoro prestate CHF 1 177.50\nIndennità per lavoro ridotto 80 % di CHF 3 322.50 CHF 2 658.00\nSalario lordo CHF 3\
    \ 835.50\nDeduzioni in base al salario contrattuale di CHF 4 500\n6,4 % per AVS, AI, IPG e AD -CHF 288.00\n2 % per l’assicurazione\
    \ contro gli infortuni  \nnon professionali-CHF 90.00\nDeduzione per la cassa pensioni -CHF 169.85\nSalario netto netto\
    \ compresa  \nl’indennità per lavoro ridottoCHF 3 287.65\nIl datore di lavoro versa questo importo al salariato il giorno\
    \ in cui viene \nnormalmente effettuato il pagamento. \nQuesto opuscolo informativo presenta solo una panoramica riassun\
    \ -\ntiva. Per la valutazione dei singoli casi fanno stato esclusivamente le \ndisposizioni legali in vigore. Per ulteriori\
    \ informazioni ci si può rivolgere \nalle casse di compensazione o alle loro agenzie. L’elenco delle casse di \ncompensazione\
    \ è pubblicato all’indirizzo Internet www.avs-ai.ch .\nPer ulteriori informazioni sulle prestazioni dell’assicurazione\
    \ contro \nla disoccupazione ci si può rivolgere alle casse di disoccupazione o \nconsultare il portale dell’assicurazione\
    \ contro la disoccupazione,  \nwww.lavoro.swiss .\nPubblicato dal Centro d’informazione AVS/AI in collaborazione con \n\
    l’Ufficio federale delle assicurazioni sociali e l’ufficio di compensazione \ndell’assicurazione contro la disoccupazione.\n\
    Edizione novembre 2024. La riproduzione, anche solo parziale, è  \nautorizzata soltanto con il consenso scritto del Centro\
    \ d’informazione \nAVS/AI.\nQuesto opuscolo informativo può essere richiesto alle casse di compen -\nsazione, alle loro\
    \ agenzie e agli uffici AI. Numero di ordinazione 2.11/i.  \nÈ disponibile anche su www.avs-ai.ch .\n2.11-25/01-I"
  - "3.02 Prestations de l’AVS\nMoyens auxiliaires de l’AVS\nEtat au 1er janvier 2024\f2En bref\nVous avez droit à des moyens\
    \ auxiliaires de l’AVS si vous avez votre domicile \nen Suisse, que vous avez atteint l’âge de référence et percevez une\
    \ rente \ncomplète ou des prestations complémentaires. \nSi vous avez bénéficié de moyens auxiliaires de l’AI ou d’une\
    \ contribution \nfinancière à leur acquisition avant de percevoir une rente complète de ma -\nnière anticipée ou avant\
    \ d’atteindre l’âge de référence, vous conservez le \ndroit à ces prestations tant que les conditions d’octroi de l’AI\
    \ sont remplies. \nDépôt de la demande\n1 Où dois-je déposer ma demande de moyens auxiliaires ?\nVous pouvez déposer votre\
    \ demande de moyens auxiliaires, au moyen du \nformulaire 009.001 - Demande Moyens auxiliaires de l’AVS , auprès de  \n\
    l’office AI de votre canton de domicile.\n2 Quels moyens auxiliaires sont remboursés ?\nL’AVS prend généralement en charge,\
    \ indépendamment du revenu et de la \nfortune de la personne assurée, les coûts des moyens auxiliaires suivants : \nMoyens\
    \ auxiliaires Pris en charge Fréquence\nPerruques max. CHF 1 000.00 1 an\nChaussures orthopédiques sur mesure \net chaussures\
    \ orthopédiques de série 75 % du prix net 1 an\nEpithèses faciales 75 % du prix net 2 ans\nAppareils orthophoniques après\
    \  \nopération du larynx75 % du prix net 5 ans\nAppareils acoustiques    monaural  \nbinauralCHF \nCHF630.00  \n1 237.505\
    \ ans\nLunettes-loupesmonoculaires \nbinoculairesCHF \nCHF590.00  \n900.005 ans\nTélé-loupes  monoculaires \nbinoculairesCHF\
    \ \nCHF1 334.00   \n2 048.005 ans\nFauteuils roulants sans moteur CHF 900.00 5 ans\nVous trouverez des informations complémentaires\
    \ sur les appareils auditifs \ndans le mémento 3.07 - Appareils auditifs de l’AVS.\f3Contribution aux coûts dans le cadre\
    \ des prestations \ncomplémentaires (PC)\n3 A quelle contribution financière puis-je prétendre si je \ntouche des PC ?\n\
    Si vous avez atteint l’âge de référence, touchez une rente de vieillesse \ncomplète ou des prestations complémentaires\
    \ et que vous avez besoin de \nmoyens auxiliaires, le service compétent examine si l’AVS peut, dans le cadre \nde ces\
    \ prestations, prendre en charge la part des coûts que vous devriez as -\nsumer vous-même. Dans le cadre des prestations\
    \ complémentaires, d’autres \nmoyens auxiliaires ainsi que certains appareils de soins et de traitement \npeuvent être\
    \ financés ou remis à titre de prêt.\nRemise ou prise en charge de moyens auxiliaires par \nPro Senectute\n4 Quand puis-je\
    \ faire appel à Pro Senectute ?\nVous pouvez faire appel à Pro Senectute si vous avez atteint l’âge de ré -\nférence ou\
    \ touchez une rente de vieillesse complète de manière anticipée, \nmais que vous n’avez pas droit à des moyens auxiliaires\
    \ de l’AVS ou pris \nen charge dans le cadre des prestations complémentaires. Pro Senectute \nest la plus grande organisation\
    \ spécialisée et de services de Suisse pour les \npersonnes âgées. Elle octroie des contributions complémentaires ou remet\
    \ \ndes moyens ou des appareils auxiliaires à titre de prêt. Il n’existe cependant \naucun droit légal à ces prestations.\n\
    Si vous souhaitez bénéficier de telles prestations, vous pouvez vous adres -\nser au bureau de consultation Pro Senectute\
    \ le plus proche. Le secrétariat \nromand de Pro Senectute vous fournira toutes les informations souhaitées.\nPro Senectute\
    \ Suisse  \nRue du Simplon 23 / Case postale  \n1800 Vevey  \nTél.  021 925 70 10  \ninfo@prosenectute.ch  \nwww.prosenectute.ch\f\
    4Renseignements et autres  \ninformations\nCe mémento ne donne qu’un aperçu des dispositions en vigueur. Pour \nle règlement\
    \ des cas individuels, seules les dispositions légales font foi. \nLes caisses de compensation et leurs agences fournissent\
    \ volontiers \ntous les renseignements utiles. Vous trouverez la liste complète des \ncaisses de compensation sur le site\
    \ www.avs-ai.ch .\nPublié par le Centre d’information AVS/AI en collaboration avec  \nl’Office fédéral des assurances\
    \ sociales.\nRéimpression novembre 2024. Toute reproduction, même partielle, \nn’est autorisée qu’avec l’accord écrit\
    \ du Centre d’information AVS/AI. \nCe mémento peut être obtenu auprès des caisses de compensation et \nde leurs agences\
    \ ainsi qu’auprès des offices AI. Numéro de commande \n3.02/f. Il est également disponible sous www.avs-ai.ch .\n Plus\
    \ d’informations, de publications et de vidéos explicatives.\n3.02-24/01-F"
  - "2.14 Contributi\nLotta contro   \nStato al 1° gennaio 2025il fallimento abusivo\f2In breve\nIn linea di principio, uno\
    \ degli obiettivi principali del diritto fallimentare è \ndi dare agli imprenditori che hanno dichiarato fallimento l’opportunità\
    \ di \nriprendere un’attività economica. Tuttavia in passato si è spesso constatato \nche il diritto fallimentare era\
    \ anche sfruttato per sottrarsi ai propri obblighi. \nLa modifica della legge federale dell’11 aprile 1889 sulla esecuzione\
    \ e sul \nfallimento (LEF), in vigore dal 1° gennaio 2025, mira ad impedire i fallimenti \nabusivi.\nFinora le istituzioni\
    \ di diritto pubblico, tra cui figurano anche le casse di \ncompensazione, dovevano incassare i contributi attraverso\
    \ la via del pigno -\nramento. Nel caso dell’esecuzione in via di pignoramento finora applicata, \ni debitori avevano\
    \ un anno di tempo circa per pagare i contributi dovuti \nprima che venisse rilasciato l’attestato di carenza di beni\
    \ dopo il pigno -\nramento. In caso di inadempienza, i titolari delle imprese non subivano \npraticamente alcuna conseguenza,\
    \ ma potevano mantenere l’impresa e \ncontinuare la loro attività, persino quando ai loro creditori erano già stati \n\
    consegnati diversi attestati di carenza di beni dopo pignoramento. Com’è \npossibile? Non appena viene rilasciato un attestato\
    \ di carenza di beni dopo \npignoramento, nella maggior parte dei casi il denaro dovuto ai creditori è \nda considerare\
    \ perduto poiché difficilmente la situazione finanziaria del \ndebitore migliora.\nNell’ambito dell’esecuzione in via\
    \ di pignoramento applicata in futuro, i \ncreditori dovranno saldare i contributi dovuti entro un termine molto più \n\
    stretto. Le imprese e i lavoratori indipendenti che non sono in grado di \nadempiere ai loro obblighi finanziari vengono\
    \ invitati dal tribunale a saldare \nle fatture aperte nel quadro di una procedura d’esecuzione (generalmente \ntre mesi\
    \ dopo la scadenza del termine di pagamento). Se non avviene alcun \npagamento, il tribunale competente dichiara fallimento\
    \ e l’impresa viene \nchiusa.\nLe esecuzioni e le procedure di fallimento comportano per i debitori spese \ne difficoltà\
    \ considerevoli che possono essere evitate pagando gli importi \nrichiesti entro il termine previsto o concludendo un\
    \ relativo accordo di pa -\ngamento.\nIl presente opuscolo informa sugli aspetti principali della procedura di falli -\n\
    mento e sulle loro conseguenze.\f3Crediti contributivi AVS in sospeso\n1 Chi è soggetto alla procedura di fallimento?\n\
    Sono soggetti alla procedura di fallimento le persone giuridiche e i lavo -\nratori indipendenti iscritti nel registro\
    \ di commercio. La procedura non \nconcerne invece le persone iscritte a una cassa di compensazione come \npersone senza\
    \ attività lucrativa o datori di lavoro non tenuti a pagare con -\ntributi.\n2 Quali opzioni vi sono dopo la comminatoria\
    \ di  \nfallimento?\nSe il debitore non fa opposizione contro il precetto esecutivo notificato \no la stessa è stata rigettata,\
    \ la cassa di compensazione può chiedere la \ncontinuazione dell’esecuzione. L’ufficio di esecuzione gli notifica la com\
    \ -\nminatoria di fallimento. Dopo la comminatoria di fallimento, il debitore ha \nancora la possibilità di pagare tutti\
    \ i contributi in sospeso, comprese le \nspese di procedura.\nLa cassa di compensazione può presentare la richiesta di\
    \ fallimento al giu -\ndice del fallimento al più presto 20 giorni dopo la notifica della commi -\nnatoria di fallimento\
    \ e al più tardi 15 mesi dopo la notifica del precetto \nesecutivo. Il giudice del fallimento verifica se sono adempiute\
    \ le condizioni \nper l’apertura della procedura di fallimento. Fino alla presentazione della \nrichiesta di fallimento\
    \ da parte della cassa di compensazione, il debitore \npuò evitare il fallimento pagando gli arretrati. Spetta alla cassa\
    \ di compen -\nsazione decidere se il pagamento può essere effettuato con un versamento \nuna tantum o a rate.\n3 Come\
    \ evitare il fallimento?\nPer evitare il fallimento, il debitore deve pagare tutti gli arretrati prima che \nla cassa\
    \ di compensazione presenti la richiesta di fallimento o che il giudice \ndel fallimento dichiari il fallimento.\n4 Quali\
    \ sono le conseguenze di un fallimento?\nDopo la dichiarazione di fallimento, il debitore non può più portare avanti \n\
    la sua impresa nella stessa forma. Il patrimonio pignorabile diviene massa \ndel fallimento e non può più essere utilizzato.\
    \ La massa del fallimento viene \nutilizzata per coprire i crediti aperti. Dopo la liquidazione, le persone giuri -\n\
    diche vengono cancellate dal registro di commercio e cessano di esistere.\f4Chiarimenti e altre  \ninformazioniSe il debitore\
    \ è iscritto nel registro di commercio quale organo di una per -\nsona giuridica, la cassa di compensazione valuta se\
    \ far valere nei suoi con -\nfronti una domanda di risarcimento e se depositare una denuncia penale.\n5 Dopo un fallimento\
    \ è possibile riprendere un’attività?\nSe il debitore è stato condannato da un tribunale penale a una pena de -\ntentiva\
    \ superiore a sei mesi, il giudice può interdirgli in tutto o in parte \nl’esercizio dell’attività in questione o di altre\
    \ attività analoghe per un tempo \nda sei mesi a cinque anni (art. 67 CP). Le autorità di perseguimento penale \nannunciano\
    \ sistematicamente le interdizioni di attività alle autorità del re -\ngistro di commercio. Se le società e le persone\
    \ interessate non eseguono \nda sole tale interdizione, l’Ufficio del registro di commercio deve disporre \nd’ufficio\
    \ misure adeguate, per esempio la cancellazione delle persone inte -\nressate dal registro di commercio.\nQuesto opuscolo\
    \ informativo presenta solo una panoramica riassun -\ntiva. Per la valutazione dei singoli casi fanno stato esclusivamente\
    \ le \ndisposizioni legali in vigore. Per ulteriori informazioni ci si può rivolgere \nalle casse di compensazione o alle\
    \ loro agenzie. L’elenco delle casse di \ncompensazione è pubblicato all’indirizzo Internet www.avs-ai.ch .\nPubblicato\
    \ dal Centro d’informazione AVS/AI in collaborazione con \nl’Ufficio federale delle assicurazioni sociali.\nEdizione ottobre\
    \ 2024. La riproduzione, anche solo parziale, è autoriz -\nzata soltanto con il consenso scritto del Centro d’informazione\
    \ AVS/AI. \nÈ disponibile anche su www.avs-ai.ch . \n2.14-25/01-I"
- source_sentence: Quali sono i requisiti per ottenere una rendita vedovile per le donne sposate?
