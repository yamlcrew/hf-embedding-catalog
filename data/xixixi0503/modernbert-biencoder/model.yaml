  - "4.12 Leistungen der IV\nEingliederungsorientierte \nBeratung, Früherfassung  \nStand am 1. Januar 2024und Frühintervention\f\
    2Auf einen Blick\nDie eingliederungsorientierte Beratung, die Früherfassung und die Frühin -\ntervention sind präventive\
    \ Mittel der Invalidenversicherung (IV) und drei \nverschiedene Phasen im IV-Verfahren, die es zu unterscheiden gilt.\n\
    Mit der eingliederungsorientierten Beratung bietet die IV-Stelle unabhän -\ngig von einem konkreten Fall Beratungsgespräche\
    \ und allgemeine Informa -\ntionen zur IV an. \nIm Rahmen der Früherfassung sollen arbeitsunfähige, von Arbeitsunfähig\
    \ -\nkeit oder von Invalidität bedrohte Personen so rasch wie möglich mit Fach -\npersonen der IV in Kontakt treten. Sobald\
    \ der Kontakt hergestellt ist, wird \nmöglichst schnell darüber entschieden, ob eine IV-Anmeldung notwendig \nist. \n\
    Sobald eine IV-Anmeldung eingereicht wird, prüft die zuständige IV-Stelle \ngemeinsam mit der versicherten Person und\
    \ den involvierten Partnern, ob \ngeeignete Frühinterventionsmassnahmen den Erhalt des Arbeitsplatzes \noder eine rasche\
    \ Reintegration ins Arbeitsleben ermöglichen können.\nDieses Merkblatt informiert Versicherte, Eingliederungsakteure sowie\
    \ Mel -\ndeberechtigte über die eingliederungsorientierte Beratung, die Früherfas -\nsung und die Frühintervention.\n\
    \ \f3Eingliederungsorientierte Beratung\n1 Was ist eine eingliederungsorientierte Beratung?\nDie eingliederungsorientierte\
    \ Beratung umfasst niederschwellige und fall-  \nunabhängige Beratungsgespräche durch die IV-Stelle. Darunter fallen bei\
    \ -\nspielsweise allgemeine Informationen über den Auftrag und die Leistungen \nder IV, über den Umgang mit Erkrankungen\
    \ am Arbeitsplatz, die Meldung \nzur Früherfassung oder die Anmeldung für IV-Leistungen.\n2 An wen richtet sich die eingliederungsorientierte\
    \  \nBeratung?\nDie eingliederungsorientierte Beratung richtet sich an versicherte Perso -\nnen, Arbeitgebende, behandelnde\
    \ Ärzte sowie betroffene Akteure des \nSchul- und Bildungswesens auf deren Ersuchen hin.\n3 Besteht ein Rechtsanspruch\
    \ auf eingliederungs-  \norientierte Beratung?\nEs besteht kein Rechtsanspruch auf eingliederungsorientierte Beratung.\f\
    4Früherfassungsphase \nFrüherfassung\n4 Was ist eine Früherfassung?\nDie Früherfassung zielt darauf ab, dass die IV-Stelle\
    \ so früh wie möglich mit \nPersonen in Kontakt tritt, die aus gesundheitlichen Gründen arbeitsunfähig \noder von Arbeitsunfähigkeit\
    \ bedroht sind und bei denen die Gefahr einer \nChronifizierung der gesundheitlichen Beschwerden besteht. Kommt die \n\
    IV-Stelle zum Schluss, dass ohne geeignete Massnahmen eine Invalidität \ndroht, fordert sie die betroffene Person auf,\
    \ sich bei der IV anzumelden. \nDie Früherfassung ermöglicht der IV ein rasches Eingreifen und präventives \nVorgehen\
    \ zugunsten der beruflichen Eingliederung. \n5 Können Jugendliche zur Früherfassung gemeldet  \nwerden?\nJa. Jugendliche\
    \ und junge erwachsene Personen zwischen 13 und 25 Jah -\nren, können sich melden oder gemeldet werden, wenn sie:\n• \
    \ von Invalidität bedroht sind, \n•  noch keine Erwerbstätigkeit ausgeübt haben und \n•  sich in einem kantonalen Brückenangebot\
    \ befinden oder von einer \nkantonalen Koordinationsstelle für Jugendliche in ihrer beruflichen Ein -\ngliederung unterstützt\
    \ werden.\nAuch Jugendliche, die bereits erwerbstätig waren und erwachsene Perso -\nnen, die arbeitsunfähig oder von Arbeitsunfähigkeit\
    \ bedroht sind, können \nsich melden oder gemeldet werden.\nMeldung zur Früherfassung\n6 Wer kann eine Meldung einreichen?\n\
    Folgende Personen und Instanzen können eine Meldung einreichen:\n•  die versicherte Person sowie ihre gesetzliche Vertretung\n\
    •  die mit der versicherten Person im gemeinsamen Haushalt lebenden \nFamilienangehörigen \n•  die Arbeitgebenden\n• \
    \ die behandelnden Ärzte und Chiropraktiker \n•  der Krankentaggeldversicherer\f5•  die privaten Versicherungsunternehmen,\
    \ die eine Krankentaggeld- \noder Rentenversicherung anbieten\n•  der Unfallversicherer\n•  die Einrichtungen der beruflichen\
    \ Vorsorge\n•  die Arbeitslosenversicherung\n•  die Sozialhilfeorgane\n•  die Militärversicherung\n•  der Krankenversicherer\n\
    •  die kantonalen Instanzen und Durchführungsstellen, die für die Unter -\nstützung und die Förderung der beruflichen\
    \ Eingliederung von Jugend -\nlichen zuständig sind\n7 Wie erfolgt die Meldung?\nDie Meldung ist schriftlich bei der IV-Stelle\
    \ des Wohnsitzkantons der ver -\nsicherten Person einzureichen. Das Formular kann bei den IV-Stellen, den \nAusgleichskassen\
    \ und deren Zweigstellen sowie unter www.ahv-iv.ch  be-\nzogen werden.\n8 Wird die versicherte Person vorgängig über die\
    \  \nMeldung informiert?\nJa. Personen und Instanzen, die eine versicherte Person zur Früherfassung \nbei der IV-Stelle\
    \ melden, müssen diese vorgängig darüber informieren.\n9 Ist die Meldung zur Früherfassung eine Anmeldung für \nIV-Leistungen?\n\
    Nein. Die Meldung zur Früherfassung gilt nicht als Anmeldung für Leistun -\ngen der IV. In der Früherfassungsphase werden\
    \ keine Leistungen der IV \nzugesprochen.\f6Früherfassungsgespräch\n10 Das Meldeformular wurde der IV-Stelle eingereicht,\
    \  \nwie geht es jetzt weiter?\nDie IV-Stelle kann die gemeldete Person zu einem Gespräch einladen. In \ndiesem wird\n\
    •  sie über den Zweck der Früherfassung informiert,\n• eine Analyse ihrer medizinischen, beruflichen und sozialen Situation\
    \ \nvorgenommen,\n•  sie darüber aufgeklärt, welche Informationen die IV-Stelle bei wem ein -\nholt,\n• geprüft, ob eine\
    \ IV-Anmeldung angezeigt ist.\n11 Wer kann an diesem Gespräch teilnehmen?\nMit dem Einverständnis der versicherten Person\
    \ können Dritte am Gespräch \nteilnehmen, zum Beispiel die Person/Institution, welche den Fall gemeldet \nhat und/oder\
    \ Arbeitgebende. Es steht der versicherten Person ebenfalls \noffen, sich von einer Vertrauensperson begleiten zu lassen.\
    \ Hält es die IV-\nStelle für angezeigt, kann auch ein Arzt oder eine Ärztin des regionalen \närztlichen Dienstes (RAD)\
    \ hinzugezogen werden.\n12 Wann erfolgt kein Gespräch?\nGeht aus der Meldung bereits eindeutig hervor, dass eine sofortige\
    \  \nIV-Anmeldung angezeigt oder die IV nicht zuständig ist, wird auf ein  \nGespräch verzichtet.\n13 Wo kann die IV-Stelle\
    \ weitere Informationen einholen?\nGenügen die Informationen aus dem Gespräch für den Entscheid nicht, \nkann die IV-Stelle\
    \ mit der Vollmacht der versicherten Person weitere Infor -\nmationen einholen, unter anderem bei medizinischem Fachpersonal,\
    \ wei -\nteren Versicherungen, Arbeitgebenden oder der Sozialhilfe.\nEnde der Früherfassungsphase\n14 Wann endet die Früherfassung?\n\
    Mit dem Eingang der IV-Anmeldung oder der Mitteilung an die versicherte \nPerson, es sei keine solche nötig, endet die\
    \ Früherfassungsphase. \f7Anmeldung für IV-Leistungen\n15 Wer kann eine IV-Anmeldung einreichen?\nGrundsätzlich muss die\
    \ versicherte Person die IV-Anmeldung selbst einrei -\nchen. Auch ihr gesetzlicher Vertreter bzw. die Behörden oder Dritte,\
    \ wel -\nche die Person regelmässig unterstützen bzw. dauernd betreuen, können \neinen Anspruch auf Leistungen der IV\
    \ geltend machen.\n16 Wie erfolgt die Anmeldung?\nDie Anmeldung muss bei der IV-Stelle des Wohnsitzkantons der versicher\
    \ -\nten Person eingereicht werden. Das entsprechende Antragsformular kann \nbei den IV-Stellen, den Ausgleichskassen\
    \ und deren Zweigstellen sowie un -\nter www.ahv-iv.ch  bezogen werden. \nFrühinterventionsphase \nFrühintervention\n\
    17 Was ist das Ziel der Frühintervention?\nZiel der Frühintervention ist es, durch rasches Handeln die Arbeits- und \n\
    Erwerbsfähigkeit der betroffenen Person möglichst zu erhalten oder zu \nverbessern. Jugendliche, die bereits erwerbstätig\
    \ waren, Arbeitsunfähige \noder von einer länger dauernden Arbeitsunfähigkeit bedrohte Erwachsene, \nwerden dabei unterstützt,\
    \ ihren Arbeitsplatz im bisherigen Betrieb beizu -\nbehalten, bzw. betriebsintern oder in einem anderen Betrieb einen\
    \ neuen \nArbeitsplatz zu übernehmen. \nMit den Frühinterventionsmassnahmen kann die IV auch Jugendliche und \njunge Erwachsene,\
    \ die noch nicht erwerbstätig waren und von einer Inva -\nlidität bedroht sind, frühzeitig auf dem Weg in eine berufliche\
    \ Ausbildung \noder in eine erste Anstellung im ersten Arbeitsmarkt unterstützen. \nDie Frühinterventionsphase beginnt\
    \ mit der Einreichung der IV-Anmeldung \nund erstreckt sich maximal über eine Dauer von zwölf Monaten.\f8Bestandsaufnahme\n\
    18 Was beinhaltet die Bestandsaufnahme?\nNach Eingang der IV-Anmeldung nimmt die IV-Stelle eine Bestandsauf -\nnahme vor.\
    \ Diese hat zum Ziel, ein umfassendes Bild von der Gesamt-  \nsituation der versicherten Person zu erhalten, das nebst\
    \ den gesundheit -\nlichen und beruflichen Aspekten, den Ressourcen und Einschränkungen \nauch die familiäre, soziale\
    \ und finanzielle Situation mitberücksichtigt. Ge -\nstützt auf diese Informationen entscheidet die IV-Stelle, ob Frühinterventi\
    \ -\nonsmassnahmen, Integrationsmassnahmen oder Massnahmen beruflicher \nArt angezeigt sind. \nAuf die Bestandsaufnahme\
    \ kann verzichtet werden, wenn aus der IV-An -\nmeldung hervorgeht, dass die Invalidenversicherung nicht zuständig, oder\
    \ \ndie Eingliederung nicht möglich ist oder wenn nicht die Frage der Einglie -\nderung oder der Rente im Zentrum steht,\
    \ sondern ein Hilfsmittel oder eine \nHilflosenentschädigung.\n19 Wer kann an der Bestandsaufnahme teilnehmen?\nDie versicherte\
    \ Person kann sich während der Bestandsaufnahme, die in \nForm eines oder mehrerer Gespräche stattfindet, von weiteren\
    \ Personen \nbegleiten lassen (z.B. Arbeitgebenden, behandelnde Ärztin oder behan -\ndelnder Arzt). Die Gespräche werden\
    \ von der Eingliederungsfachperson \ngeführt. Hält es die IV-Stelle für angezeigt, kann auch ein Arzt oder eine \nÄrztin\
    \ des regionalen ärztlichen Dienstes (RAD) hinzugezogen werden. \nEingliederungsplan \n20 Was beinhaltet der Eingliederungsplan?\n\
    Gestützt auf die Bestandsaufnahme wird ein auf die versicherte Person \nzugeschnittener Eingliederungsplan ausgearbeitet.\
    \ Der Eingliederungsplan\n•  enthält die zu erreichenden Ziele und die vorgesehenen Massnahmen,\n•  regelt die Kooperation\
    \ zwischen den beteiligten Parteien,\n•  definiert die Verantwortlichkeiten und Fristen.\nAuf Basis des Eingliederungsplanes\
    \ kann eine Zielvereinbarung erstellt wer -\nden. \f921 Was sind Massnahmen der Frühintervention?\nMassnahmen der Frühintervention\
    \ sind: \nWährend der obligatorischen Schulzeit ab dem vollendeten 13. Altersjahr: \n•  Berufsberatung\n•  Arbeitsvermittlung\
    \ (Unterstützung bei der Suche nach einem Ausbil -\ndungsplatz)\nFür Jugendliche nach der obligatorischen Schulzeit und\
    \ für Erwachsene: \n•  Anpassungen des Arbeitsplatzes \n•  Ausbildungskurse \n•  Arbeitsvermittlung (Unterstützung beim\
    \ Arbeitsplatzerhalt und bei der \nStellensuche)\n•  Berufsberatung\n•  Sozialberufliche Rehabilitation \n•  Beschäftigungsmassnahmen\
    \ \n•  Beratung und Begleitung\n22 Besteht ein Rechtsanspruch auf  \nFrühinterventionsmassnahmen?\nNein. Es besteht kein\
    \ Rechtsanspruch auf Frühinterventionsmassnahmen. \n23 Besteht Anspruch auf ein IV-Taggeld?\nNein. Während der Durchführung\
    \ dieser Massnahmen werden keine  \nTaggelder der IV ausbezahlt.\nEnde der Frühinterventionsphase\n24 Wann endet die Frühintervention?\n\
    Der Frühinterventionsprozess wird abgeschlossen durch einen Entscheid \nin Form \n•  einer Mitteilung, dass der versicherten\
    \ Person Integrationsmassnah -\nmen oder Massnahmen beruflicher Art gewährt werden,\n•  der Mitteilung, die Rentenfrage\
    \ werde geprüft, oder\n•  einer ablehnenden Leistungsverfügung.\f10Auskünfte und weitere  \nInformationen\nDieses Merkblatt\
    \ vermittelt nur eine Übersicht. Für die Beurteilung von \nEinzelfällen sind ausschliesslich die gesetzlichen Bestimmungen\
    \ mass -\ngebend. Die IV-Stellen, die Ausgleichskassen und ihre Zweigstellen  \ngeben gerne Auskunft. Ein Verzeichnis\
    \ aller Ansprechpartner finden \nSie unter www.ahv-iv.ch .\nHerausgegeben von der Informationsstelle AHV/IV in Zusammenarbeit\
    \ \nmit dem Bundesamt für Sozialversicherungen.\nNachdruck November 2024. Auch auszugsweiser Abdruck ist nur mit \nschriftlicher\
    \ Einwilligung der Informationsstelle AHV/IV erlaubt. \nDieses Merkblatt kann bei den Ausgleichskassen und deren Zweig-\
    \  \nstellen sowie den IV-Stellen bezogen werden. Bestellnummer 4.12/d. \nEs ist ebenfalls unter www.ahv-iv.ch  verfügbar.\n\
    \ Weitere Informationen, Publikationen und Erklärvideos.\n4.12-24/01-D"
  - "3.03 Prestazioni dell‘AVS\nRendite per superstiti\ndell’AVS\nStato al 1° gennaio 2025\f2In breve\nLe rendite per superstiti\
    \ hanno lo scopo di evitare che, al decesso del  \nconiuge, di uno o di entrambi i genitori, i superstiti vengano a trovarsi\
    \ in \ngravi difficoltà finanziarie. Vi sono tre categorie di rendite per superstiti: \n•  le rendite per vedove,\n• \
    \ le rendite per vedovi,\n•  le rendite per orfani.\nAffinché una persona abbia diritto a una rendita per superstiti,\
    \ è necessario \nche alla persona deceduta si possa conteggiare almeno un anno di contri -\nbuzione completo.\nSi parla\
    \ di anno di contribuzione completo quando:\n•  la persona deceduta ha versato contributi complessivamente per un \nanno,\
    \ oppure\n•  la persona deceduta era assicurata e il coniuge ha versato il doppio del \ncontributo minimo almeno per un\
    \ anno, oppure\n•  alla persona deceduta si possono conteggiare accrediti per compiti \neducativi o assistenziali.\f3Rendite\
    \ per vedove\n1 Quali sono i requisiti che devono soddisfare le donne \nsposate per avere diritto alla rendita vedovile?\n\
    Le donne sposate il cui marito o la cui moglie è deceduto/a hanno diritto a \nuna rendita vedovile se all’insorgere della\
    \ vedovanza:\n•  hanno uno o più figli (di qualsiasi età). Sono considerati come figli an -\nche i figli del coniuge deceduto\
    \ che vivono nell’economia domestica \ncomune e, in seguito alla sua morte, hanno diritto a una rendita per \norfani.\
    \ Lo stesso vale per gli affiliati precedentemente affidati alle cure \ndei coniugi, a condizione che siano in seguito\
    \ adottati dalla vedova. \nÈ considerata vedova con figli anche la moglie della madre, se al mo -\nmento della nascita\
    \ del figlio era sposata con la madre e se il figlio è \nstato concepito secondo le disposizioni della legge del 18 dicembre\
    \ \n1998 sulla medicina della procreazione, e quindi sussiste un rapporto \ndi filiazione (art. 255a cpv. 1 CC), o\n•\
    \  hanno compiuto 45 anni e sono state sposate per almeno cinque anni. \nSe hanno contratto più matrimoni, si tiene conto\
    \ della durata comples -\nsiva dei diversi matrimoni. Per le coppie di persone dello stesso sesso \nche hanno convertito\
    \ l’unione domestica registrata in matrimonio la \ndurata di quest’ultima viene aggiunta agli anni di matrimonio.\n \f\
    42 Quali sono i requisiti che devono soddisfare le donne \ndivorziate per avere diritto alla rendita vedovile?\nLe donne\
    \ divorziate il cui ex marito o la cui ex moglie è deceduto/a hanno \ndiritto a una rendita vedovile:\n•  se hanno figli\
    \ e il matrimonio è durato almeno dieci anni,\n•  se il divorzio è intervenuto dopo che esse hanno compiuto 45 anni e\
    \ il \nmatrimonio è durato almeno dieci anni,\n•  se il figlio più giovane ha compiuto 18 anni dopo che la madre divor\
    \ -\nziata ne ha compiuti 45.\nLe donne divorziate che non soddisfano alcuna di queste condizioni hanno \ndiritto a una\
    \ rendita vedovile finché il figlio più giovane compie 18 anni.\nÈ considerata vedova con figli anche l’ex moglie della\
    \ madre, se al mo -\nmento della nascita del figlio era sposata con la madre e se il figlio è stato \nconcepito secondo\
    \ le disposizioni della legge del 18 dicembre 1998 sulla \nmedicina della procreazione, e quindi sussiste un rapporto\
    \ di filiazione (art. \n255a cpv. 1 CC).\nSe l’unione domestica registrata è stata convertita in matrimonio, la sua \n\
    durata viene aggiunta agli anni di matrimonio.\nRendite per vedovi\n3 Quali sono i requisiti per il diritto alla rendita\
    \ vedovile \ncome uomo sposato o come partner registrato?\nGli uomini sposati la cui moglie o il cui marito è deceduta/o\
    \ hanno diritto \na una rendita se all’insorgere della vedovanza hanno uno o più figli (di \nqualsiasi età). Sono considerati\
    \ come figli anche i figli del coniuge deceduto \nche vivono nell’economia domestica comune e, in seguito alla sua morte,\
    \ \nhanno diritto a una rendita per orfani. Lo stesso vale per gli affiliati prece -\ndentemente affidati alle cure dei\
    \ coniugi, a condizione che siano in seguito \nadottati dal vedovo. \nSe un partner registrato decede, il partner superstite\
    \ è equiparato, a pre -\nscindere dal sesso, a un vedovo. \f5Nella sentenza dell’11 ottobre 2022, la Grande Camera della\
    \ Corte euro -\npea dei diritti dell’uomo (Corte EDU) ha stabilito che nel caso in esame vi \nfosse una disparità di trattamento\
    \ contraria alla Convenzione europea dei \ndiritti dell’uomo (CEDU), in quanto la rendita vedovile del ricorrente era\
    \ \nstata soppressa quando il figlio più giovane aveva raggiunto la maggiore \netà, il che non sarebbe avvenuto per una\
    \ vedova nella stessa situazione. \nLa Svizzera deve conformarsi a questa sentenza, passata in giudicato l’11 \nottobre\
    \ 2022, e porre fine alla violazione del diritto constatata dalla Corte \nEDU. Le basi legali devono quindi essere adeguate\
    \ tenendo conto della \nprocedura legislativa. Quest’ultima può essere relativamente lunga e si \nsvolgerà quindi solo\
    \ in un secondo momento. Fino ad allora si applicherà \nuna regolamentazione transitoria per i vedovi con figli, entrata\
    \ in in vigore \nl’11 ottobre 2022, secondo la quale il diritto alla rendita per vedovi non si \nestinguerà più al compimento\
    \ del 18° anno d’età da parte del figlio più \ngiovane e la rendita verrà corrisposta oltre tale età. \nLa sentenza della\
    \ Corte EDU non si applica né ai vedovi né ai divorziati \nsenza figli. Sulla base di questa sentenza, i vedovi senza\
    \ figli continuano \na non avere diritto alla rendita vedovile e, nel caso di uomini divorziati, il \ndiritto alla stessa\
    \ si estingue in ogni caso quando il figlio più giovane rag -\ngiunge la maggiore età. La sentenza della Corte EDU non\
    \ si applica nem -\nmeno ai casi in cui la rendita per vedovi sia stata soppressa con decisione \npassata in giudicato\
    \ prima dell’11 ottobre 2022 in seguito al compimento \ndel 18° anno d’età da parte del figlio più giovane. \n4 Quali\
    \ sono i requisiti che devono soddisfare gli uomini \ndivorziati per avere diritto alla rendita vedovile? \nGli uomini\
    \ divorziati la cui ex moglie o il cui ex marito è deceduta/o hanno \ndiritto a una rendita vedovile finché hanno figli\
    \ di età inferiore ai 18 anni. \f6Rendite per orfani\n5 Quali sono i requisiti per il diritto alla rendita per  \norfani?\n\
    In caso di decesso di uno dei genitori, l’AVS versa ai figli una rendita per \norfani. \nSe al momento della nascita del\
    \ figlio la madre è sposata con una donna e \nil figlio è stato concepito secondo le disposizioni della legge del 18 dicem\
    \ -\nbre 1998 sulla medicina della procreazione, la moglie della madre è consi -\nderata l’altro genitore (art. 255a cpv.\
    \ 1 CC). In questi casi, alla morte della \nmoglie della madre il figlio ha diritto a una rendita per orfani.\nIn caso\
    \ di decesso di entrambi i genitori, i figli hanno diritto a due rendite \nper orfani: una per ciascun genitore. Il diritto\
    \ alla rendita per orfani si estin -\ngue al 18° compleanno o al termine della formazione, ma al più tardi al \n25° compleanno.\
    \ Per gli affiliati vigono disposizioni particolari. I figli che \ndurante la formazione conseguono un reddito lordo dell’attività\
    \ lucrativa \nsuperiore a 30 240 franchi non hanno diritto a una rendita per orfani.\nInizio e fino del diritto\n6 Quando\
    \ nasce il diritto a una rendita per superstiti?\nIl diritto alla rendita per superstiti nasce il primo giorno del mese\
    \ successivo \na quello del decesso del coniuge (o dell’ex coniuge) o del genitore.\n7 Quando si estingue il diritto a\
    \ una rendita per  \nsuperstiti?\nIl diritto alla rendita per superstiti si estingue alla fine del mese in cui le con\
    \ -\ndizioni non sono più adempiute. In caso di nuove nozze cessa il diritto alla \nrendita vedovile. Il diritto alle\
    \ rendite per orfani continua invece a sussistere.\f7Concorso con altre prestazioni\n8 Quale delle rendite viene versata?\n\
    Se una persona adempie contemporaneamente le condizioni poste per una \nrendita per superstiti e per una rendita di vecchiaia\
    \ o d’invalidità, si versa \nsolo la rendita più elevata.\nRiscossione delle rendite per superstiti\n9 Dove far valere\
    \ il proprio diritto a una rendita per  \nsuperstiti?\nChi intende far valere il proprio diritto alla rendita per superstiti\
    \ deve rivol -\ngersi alla cassa di compensazione che, per ultima, ha incassato i contributi \ndella persona deceduta.\
    \ Il modulo 318.371 – Richiesta di una rendita per \nsuperstiti  può essere ottenuto presso le casse di compensazione\
    \ e le loro \nagenzie o sul sito internet www.avs-ai.ch . In seguito la domanda deve es -\nsere inoltrata presso la cassa\
    \ di compensazione competente.\nGli assicurati che hanno compiuto periodi assicurativi in Svizzera e in uno \no più Stati\
    \ membri dell’UE o dell’AELS possono semplicemente inoltrare \nla richiesta nel Paese di domicilio: con questa richiesta\
    \ prenderanno avvio \nanche le procedure necessarie in tutti gli altri Paesi interessati.\nSe la persona deceduta non\
    \ ha versato contributi AVS, il diritto a rendite \nper superstiti dev’essere fatto valere presso la cassa di compensazione\
    \ can -\ntonale oppure presso la sua agenzia.\nSe risiede all’estero, voglia consultare la rubrica «Richiedere una rendita\
    \ per \nsuperstiti» sul sito Internet della Cassa svizzera di compensazione (CSC): \nwww.cdc.admin.ch\f8Calcolo delle\
    \ rendite per superstiti\n10 Come si calcolano le rendite per superstiti?\nGli elementi di calcolo delle rendite per superstiti\
    \ sono:\n•  gli anni di contribuzione,\n•  i redditi da attività lucrativa e\n•  gli accrediti per compiti educativi o\
    \ assistenziali della persona deceduta.\nPer il calcolo degli anni di contribuzione ai fini della rendita per vedovi e\
    \ \nla rendita per orfani in seguito al decesso della (ex) moglie o della madre \nvale quanto segue: gli anni di matrimonio\
    \ trascorsi prima del 31 dicembre \n1996 (durante i quali la moglie era assicurata, ma non tenuta a versare i \ncontributi)\
    \ sono conteggiati come anni di contribuzione.\n11 Quando si percepisce una rendita completa?\nI superstiti percepiscono\
    \ una rendita completa (scala delle rendite 44) se \nla persona deceduta ha versato contributi per l’intera durata contributiva,\
    \ \nossia dal 1° gennaio dell’anno successivo al compimento dei 20 anni fino \nal decesso.\n12 Quando si percepisce una\
    \ rendita parziale?\nIn caso di durata di contribuzione incompleta, vale a dire se la persona \ndeceduta non conta lo\
    \ stesso numero di anni interi di contribuzione della \nsua classe di età, è versata una rendita parziale (scala delle\
    \ rendite 1-43). \nLa rendita parziale è calcolata secondo il rapporto esistente tra gli anni di \ncontribuzione effettivi\
    \ della persona deceduta e la durata di contribuzione \ncompleta.\n13 A chi vengono conteggiati i cosiddetti anni giovanili?\n\
    Gli anni di gioventù sono i periodi di contribuzione compiuti dai 18 ai 20 \nanni. Se la persona deceduta ha compiuto\
    \ periodi di contribuzione fino \nai 20 anni, questi le vengono conteggiati come anni giovanili per colmare \neventuali\
    \ lacune contributive successive.\f914 I periodi di contribuzione compiuti dopo l’età di  \nriferimento vengono conteggiati?\n\
    Se la persona deceduta ha continuato a lavorare dopo l’età di riferimento, \na determinate condizioni i periodi di contribuzione\
    \ in questione possono \nessere conteggiati per colmare eventuali lacune contributive o aumentare \nla rendita grazie\
    \ al computo dei redditi supplementari dell’attività lucrativa. \nDopo il raggiungimento dell’età di riferimento, un nuovo\
    \ calcolo della ren -\ndita può essere richiesto soltanto una volta. Se la persona deceduta non \nha chiesto un nuovo\
    \ calcolo della rendita di vecchiaia, i superstiti possono \npresentare una domanda in tal senso per la rendita per superstiti\
    \ che la \nsostituirà. \nPer ulteriori informazioni si veda l’opuscolo informativo 3.08 – Nuovo cal -\ncolo della rendita\
    \ di vecchiaia dopo l’età di riferimento .\n15 Com’è composto il reddito annuo medio?\nIl reddito annuo medio è composto:\n\
    •  dalla media dei redditi da attività lucrativa,\n•  dalla media degli accrediti per compiti educativi e\n•  dalla media\
    \ degli accrediti per compiti assistenziali.\nMedia dei redditi da attività lucrativa\n16 Come si calcola la media dei\
    \ redditi da attività lucrativa?\nLe rendite per superstiti sono calcolate sulla base dei redditi da attività  \nlucrativa\
    \ conseguiti dalla persona deceduta.\nPer calcolare la media dei redditi da attività lucrativa vengono sommati tutti \n\
    i redditi realizzati fino al 31 dicembre dell’anno precedente l’insorgenza \ndell’evento assicurato. I redditi conseguiti\
    \ negli anni giovanili sono presi \nin considerazione solo se servono a colmare lacune contributive sorte più \ntardi.\n\
    I redditi da attività lucrativa sono registrati sui cosiddetti conti individuali \n(CI) di ogni persona. \f1017 La somma\
    \ dei redditi da attività lucrativa viene  \nadeguata all’evoluzione dei prezzi e dei salari? Come?\nI redditi possono\
    \ essere stati conseguiti in anni in cui il livello dei salari era \npiù basso. La somma dei redditi è perciò rivalutata\
    \ in base all’evoluzione \nmedia dei prezzi e dei salari. La somma rivalutata è quindi divisa per il  \nnumero degli anni\
    \ e dei mesi computabili. Il risultato è la media dei redditi \nda attività lucrativa.\n18 Che cos’è il cosiddetto supplemento\
    \ di carriera?\nSe la persona deceduta non aveva ancora compiuto 45 anni al momento \ndel decesso, la media del reddito\
    \ da attività lucrativa è aumentata di un \nsupplemento percentuale (supplemento di carriera) in funzione dell’età.\n\
    In caso di decesso Percentuale\ndopo il compimento  \ndei… anniprima del compimento  \ndei… anni\n23 100\n23 24 90\n24\
    \ 25 80\n25 26 70\n26 27 60\n27 28 50\n28 30 40\n30 32 30\n32 35 20\n35 39 10\n39 45 5\f11Media degli accrediti per compiti\
    \ educativi e  \nassistenziali\n19 Che cosa sono gli accrediti per compiti educativi?\nNel calcolo della rendita per superstiti,\
    \ si può attribuire a una persona  \ndeceduta un accredito per compiti educativi per ogni anno in cui si è occu -\npata\
    \ di figli di età inferiore ai 16 anni. Questo accredito ammonta al triplo \ndella rendita minima annua. Per le persone\
    \ coniugate, l’accredito è diviso a \nmetà durante gli anni civili di matrimonio. Tuttavia, la ripartizione interessa\
    \ \nunicamente gli accrediti acquisiti durante il periodo tra il 1° gennaio che \nsegue il compimento dei 20 anni e il\
    \ 31 dicembre che precede il raggiun -\ngimento dell’età di riferimento da parte del coniuge più anziano. La media \n\
    degli accrediti per compiti educativi si ottiene dividendo la somma degli \nstessi per il periodo di contribuzione complessivo.\
    \ \nNel caso dei genitori divorziati o non coniugati che esercitano l’autorità pa -\nrentale congiunta, gli accrediti\
    \ per compiti educativi vengono conteggiati, \ninteramente a uno dei genitori o per metà a ciascuno dei due, in applica\
    \ -\nzione della decisione del tribunale o dell’autorità di protezione dei minori e \ndegli adulti (APMA) o sulla base\
    \ della convenzione parentale. \nAl riguardo, si rimanda alle indicazioni dettagliate dell’opuscolo informa -\ntivo 1.07\
    \ – Accrediti per compiti educativi .\n20 Che cosa sono gli accrediti per compiti assistenziali?\nAlle persone decedute\
    \ possono essere conteggiati accrediti per compiti assi -\nstenziali per gli anni in cui esse hanno assistito parenti\
    \ al beneficio di assegni \nper grandi invalidi che potevano essere facilmente raggiungibili. Sono parifi -\ncati ai parenti\
    \ i partner che convivono con gli assicurati nella medesima eco -\nnomia domestica ininterrottamente da almeno cinque\
    \ anni. Per gli anni in cui \nsi possono conteggiare accrediti per compiti educativi non vi è diritto ad ac -\ncrediti\
    \ per compiti assistenziali. L’importo dell’accredito per compiti assisten -\nziali ammonta al triplo della rendita minima\
    \ annua. Per le persone coniugate  \nl’accredito è diviso a metà durante gli anni civili di matrimonio. Tuttavia, la \n\
    ripartizione interessa unicamente gli accrediti acquisiti durante il periodo \ntra il 1° gennaio che segue il compimento\
    \ dei 20 anni e il 31 dicembre che \nprecede il raggiungimento dell’età di riferimento da parte del coniuge più \nanziano.\
    \ Si ottiene la media degli accrediti per compiti assistenziali divi -\ndendo la somma degli stessi per il periodo di\
    \ contribuzione complessivo. \f12La richiesta d’iscrizione di accrediti per compiti assistenziali deve essere \npresentata\
    \ ogni anno per l’anno precedente alla cassa cantonale di com -\npensazione del luogo di domicilio della persona assistita.\
    \ A tale scopo va \nutilizzato il modulo 318.270 – Richiesta d’iscrizione di accrediti per compiti \nassistenziali.\n\
    Al riguardo, si rimanda alle indicazioni dettagliate dell’opuscolo informa -\ntivo 1.03 – Accrediti per compiti assistenziali\
    \ .\nImporto delle rendite\n21 Quali sono gli importi attuali delle rendite?\nIn caso di durata completa di contribuzione,\
    \ le rendite complete ordinarie \nammontano, a seconda del reddito medio, a:\nminimo massimo\nCHF/mese CHF/mese\nRendita\
    \ per vedove e vedovi 1 008.– 2 016.–\nRendita per orfani   504.– 1 008.–\nSe, per lo stesso figlio, sono concesse due\
    \ rendite per orfani oppure una \nrendita per orfani e una rendita per figli, la somma delle due rendite non \ndeve superare\
    \ l’importo di 1 512 franchi, ossia il 60 % dell’importo mas-\nsimo della rendita di vecchiaia.\nPrestazioni complementari\n\
    22 Chi ha diritto a prestazioni complementari?\nLe vedove, i vedovi e gli orfani di modeste condizioni economiche hanno\
    \ \ndiritto, a certe condizioni, a prestazioni complementari. Al riguardo, si ri -\nmanda alle indicazioni dettagliate\
    \ degli opuscoli informativi 5.01 – Presta -\nzioni complementari all’AVS e all’AI  e 5.02 – Diritto a prestazioni comple\
    \ -\nmentari all’AVS e all’AI .\nSe risiede all’estero, non ha diritto alle prestazioni complementari all’AVS \ne all’AI.\f\
    13Esempio di calcolo\n23 Decesso del marito o del padre\nUn assicurato nato nel giugno 1975 muore nel marzo 2025. Lascia\
    \ la  \nmoglie e due figli, nati nel 2007 e nel 2008. Sono quindi computabili  \ncompiti educativi per 17 anni. Dal 1°\
    \ aprile 2025 sono versate una rendita \nvedovile e due rendite per orfani. Dal 1996 fino alla sua morte, il defunto \n\
    ha pagato ininterrottamente i contributi AVS; ai suoi superstiti sono per -\ntanto concesse rendite complete ( scala delle\
    \ rendite 44 ).\nLa media dei redditi da attività lucrativa è calcolata come segue, \nsulla base dei conti individuali:\n\
