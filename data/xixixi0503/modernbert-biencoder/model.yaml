    \ des \ncas individuels, seules les dispositions légales font foi. Les caisses de \ncompensation, leurs agences et les\
    \ offices AI fournissent volontiers \ntous les renseignements utiles. Vous trouverez la liste complète des \ncaisses de\
    \ compensation sur le site www.avs-ai.ch .\nLes désignations d’état civil utilisées ici ont également les significations\
    \ \nsuivantes : \n•  mariage : partenariat enregistré ;\n•  divorce : dissolution judiciaire du partenariat enregistré\
    \ ;\n•  décès du conjoint : décès du partenaire enregistré.\nPublié par le Centre d’information AVS/AI en collaboration\
    \ avec  \nl’Office fédéral des assurances sociales.\nEdition novembre 2024. Toute reproduction, même partielle, n’est\
    \  \nautorisée qu’avec l’accord écrit du Centre d’information AVS/AI. \nCe mémento peut être obtenu auprès des caisses\
    \ de compensation et \nde leurs agences ainsi qu’auprès des offices AI. Numéro de commande \n3.03/f. Il est également\
    \ disponible sous www.avs-ai.ch .\n Plus d’informations, de publications et de vidéos explicatives.\n3.03-25/01-F"
  - " enfant gravement atteint dans sa santé ou \nd’adoption (APG)\n• Prestations complémentaires (PC)\n• Prestations transitoires\
    \ pour chômeurs âgés (Ptra).\n2 Suis-je assuré auprès de l’AVS/AI ?\nL’AVS et l’AI sont des assurances générales et obligatoires.\
    \ Y sont assurées \nles personnes qui sont domiciliées ou qui exercent une activité lucrative en \nSuisse. L’obligation\
    \ légale de s’assurer vaut également pour les ressortis -\nsants étrangers. \n3 Comment puis-je connaître mon numéro AVS\
    \ ?\nLe numéro AVS figure sur la carte d’assurance-maladie ainsi que sur le \ncertificat d’assurance AVS/AI. Un assuré\
    \ qui ne possède pas de carte  \nd’assurance-maladie ni de certificat d’assurance AVS/AI peut s’adresser \nà sa caisse\
    \ de compensation afin qu’elle lui délivre ledit certificat d’as -\nsurance. Il est alors tenu de le conserver. Les assurés\
    \ présentent leur carte  \nd’assurance-maladie ou leur certificat d’assurance AVS/AI à leur nouvel  \nemployeur lors de\
    \ chaque changement d’emploi et à l’organe compétent \nen cas de demande de prestations. Important : le numéro AVS doit\
    \ être \nindiqué dans toute correspondance avec les caisses de compensation.\f21Cotisations\n4 A quel moment débute l’obligation\
    \ de cotiser  \nauprès de l’AVS/AI ?\nLes personnes non actives paient des cotisations dès le 1er janvier qui suit \n\
    leur 20e anniversaire et jusqu’à l’âge de référence. Les personnes actives \nont l’obligation de cotiser dès le début\
    \ de leur activité lucrative, mais pas \navant le 1er janvier qui suit leur 17e anniversaire.\n5 De quelle manière les\
    \ cotisations à l’AVS, à l’AI  \net au régime des APG sont-elles perçues ?\nLes cotisations dues à l’AVS, à l’AI et aux\
    \ APG sont perçues de la manière \nsuivante :\n•  Salariés :\n La cotisation paritaire, définie en pourcentage du salaire,\
    \ est payée \npour moitié par le salarié (prélevée sur le salaire) et pour moitié par \nl’employeur. S’y ajoutent la cotisation\
    \ due à l’assurance-chômage (AC)\net, le cas échéant, les cotisations relatives à d’autres branches d’as -\nsurances sociales.\
    \ Les cotisations du salarié sont retenues lors de cha -\nque paie par l’employeur, qui les verse à la caisse de compensation\
    \ en \nmême temps que sa propre part de cotisations (voir aussi mémentos \n2.01 - Cotisations salariales à l’AVS, à l’AI\
    \ et aux APG  et 2.08 - Cotisa -\ntions à l’assurance-chômage ).\n•  Indépendants :\n La personne qui exerce une activité\
    \ indépendante établit le décompte \nde ses cotisations directement avec la caisse de compensation. Ses \ncotisations\
    \ sont définies en pourcentage du revenu mentionné sur la \ntaxation de l’impôt fédéral direct et communiqué à la caisse\
    \ de com -\npensation par l’autorité fiscale. S’y ajoutent, le cas échéant, les cotisa -\ntions relatives à d’autres branches\
    \ d’assurances sociales. Il appartient à \nla caisse de compensation de déterminer si l’assuré est indépendant au \nsens\
    \ de l’AVS (voir aussi mémento 2.02 - Cotisations des indépendants \nà l’AVS, à l’AI et aux APG ).\n•  Non-actifs :\n\
    \ Le montant des cotisations d’une personne sans activité lucrative \ndépend de la fortune et du revenu acquis sous forme\
    \ de rente. Il est \nfixé par la caisse de compensation du canton de domicile de l’assuré. \nSi vous avez dépassé l’âge\
    \ de 58 ans, le montant des cotisations sera \ndéterminé par la caisse de compensation auprès de laquelle vous  \f22 avez,\
    \ en dernier lieu, payé des cotisations comme personne active (voir \naussi mémento 2.03 - Cotisations des personnes sans\
    \ activité lucrative \nà l’AVS, à l’AI et aux APG ).\nPrestations de l’AVS\n6 Quelles prestations l’AVS octroie-t-elle\
    \ ? \nL’AVS octroie les prestations suivantes :\n•  rente de vieillesse pour les hommes et les femmes qui ont atteint\
    \ l’âge \nde référence. L’âge de référence est fixé à 65 ans pour les hommes \net est relevé progressivement de 64 à 65\
    \ ans pour les femmes dès \n2025. A partir de 2028, l’âge de référence sera ainsi le même pour \ntout le monde, soit 65\
    \ ans. (voir mémento 3.01 - Rentes de vieil -\nlesse et allocations pour impotents de l’AVS ). La rente de vieillesse\
    \ \npeut être anticipée ou ajournée. Il y a réduction de la rente en cas \nd’anticipation et augmentation en cas d’ajournement\
    \ (voir mémento  \n3.04 - Flexibilisation de la retraite ).\n•  rente pour enfant versée aux bénéficiaires de rente de\
    \ vieillesse. Ce \ndroit vaut jusqu’au 18e anniversaire de leurs enfants ou jusqu’à la fin \nd’un apprentissage ou des\
    \ études mais, au maximum, jusqu’à leur  \n25e anniversaire.\n•  rente de veuve ou de veuf.\n•  rente d’orphelin pour\
    \ les enfants de moins de 18 ans ou jusqu’à la fin \nd’un apprentissage ou des études mais, au maximum, jusqu’à leur 25e\
    \ \nanniversaire.\n•  allocation pour impotent selon le chiffre 8.\n•  moyens auxiliaires selon le chiffre 9.\n7 Quelles\
    \ conditions ouvrent le droit  \naux prestations de l’AVS ? \nLes ressortissants d’un pays avec lequel la Suisse n’a pas\
    \ conclu de conven -\ntion de sécurité sociale (Etats non contractants), ainsi que leurs survivants \n(veuves, veufs,\
    \ orphelins), ont droit à une rente de l’AVS\n•  s’ils sont domiciliés en Suisse, et\n•  s’ils ont cotisé à l’AVS pendant\
    \ une année entière au moins, ou\n•  s’ils ont été couverts pendant une année entière au moins par  \nl’assurance d’un\
    \ conjoint ayant travaillé et versé au moins le double de \nla cotisation minimale, ou\f23•  s’ils justifient d’au moins\
    \ une année entière de bonifications pour \ntâches éducatives ou pour tâches d’assistance.\nUne rente de survivants n’est\
    \ octroyée que si la personne décédée a été \nassurée pendant une année entière au moins.\n8 Quelles conditions ouvrent\
    \ le droit  \nà une allocation pour impotent ?\nLes bénéficiaires d’une rente de vieillesse ou de prestations complémen\
    \ -\ntaires, domiciliés et résidant habituellement en Suisse, ont droit à une \nallocation pour impotent lorsqu’ils présentent\
    \ une impotence faible, mo -\nyenne ou grave depuis six mois au moins. Est considérée comme impo -\ntente la personne\
    \ qui a besoin d’une aide régulière d’autrui pour les actes \nordinaires de la vie (s’habiller, manger, faire sa toilette,\
    \ etc.) et de soins \nen permanence, voire d’une surveillance personnelle. Les allocations pour \nimpotent ne sont pas\
    \ versées à l’étranger.\n9 Quelles conditions ouvrent le droit  \nà des moyens auxiliaires de l’AVS ?\nLes bénéficiaires\
    \ de rentes de vieillesse domiciliés en Suisse reçoivent, à \ncertaines conditions, des moyens auxiliaires de l’AVS (appareils\
    \ acous -\ntiques, lunettes-loupes, prothèses, fauteuils roulants, etc. voir mémento  \n3.02 - Moyens auxiliaires de l’AVS\
    \ ).\nPrestations de l‘AI\n10 Quelles prestations l’AI octroie-t-elle ?\nL’AI accorde d’abord des mesures de réadaptation.\
    \ La rente AI n’est versée \nque si les mesures de réadaptation n’ont pas atteint leur but ou ne l’ont \natteint qu’en\
    \ partie, ou encore si elles sont d’emblée vouées à l’échec.\nL’AI fournit les prestations suivantes :\n•  mesures d’intervention\
    \ précoce :\n celles-ci ont pour but de maintenir à leur poste les assurés en inca -\npacité de travail, de permettre\
    \ leur réadaptation à un nouveau poste \nou faciliter l’accès aux jeunes assurés à une formation professionnelle \ninitiale.\n\
    •  mesures de réadaptation :\n celles-ci sont destinées à améliorer la capacité de gain actuelle ou  \nfuture (par ex.\
    \ reclassement professionnel, moyens auxiliaires).\f24•  rente d’invalidité :\n celle-ci vise à compenser les conséquences\
    \ économiques durables de \nl’invalidité en couvrant les besoins vitaux dans une mesure appropriée. \nElle est accordée\
    \ au plus tôt dès l’âge de 18 ans. Le taux d’invalidité \ndétermine la rente que touchera la personne assurée.\n•  rente\
    \ pour enfant :\n celle-ci est versée en cas d’invalidité d’un des parents ; l’enfant y donne \ndroit jusqu’à son 18e\
    \ anniversaire ou jusqu’à la fin d’un apprentissage \nou des études mais, au maximum, jusqu’à son 25e anniversaire.\n\
    •  allocation pour impotent et contribution d’assistance selon le chiffre 14.\n11 Quelles conditions ouvrent le droit\
    \  \nà des mesures de réadaptation ?\nLes ressortissants d’Etats non contractants domiciliés en Suisse ont droit \naux\
    \ mesures de réadaptation si, avant la survenance de l’invalidité,\n•  ils ont cotisé pendant une année entière au moins,\
    \ ou\n•  ils ont vécu au moins une année entière en Suisse avec un conjoint \nayant travaillé et versé au moins le double\
    \ de la cotisation minimale, ou\n•  ils justifient d’un an de bonifications pour tâches éducatives ou pour \ntâches d’assistance,\
    \ ou\n•  ils ont séjourné en Suisse pendant une durée ininterrompue de dix ans.\n12 Les enfants ont-ils également droit\
    \  \nà des mesures de réadaptation ?\nLes enfants de moins de 20 ans ont également droit à des mesures de réad -\naptation\
    \ lorsqu’un seul des parents remplit les conditions ci-dessus, ou s’ils \nsont eux-mêmes nés invalides en Suisse ou y\
    \ ont vécu au moins un an avant \nla survenance de l’invalidité ou sans interruption depuis leur naissance. Les \nenfants\
    \ nés à l’étranger ont exceptionnellement droit à des mesures de \nréadaptation si leur mère a résidé à l’étranger pendant\
    \ deux mois au plus \nimmédiatement avant la naissance.\n13 Quelles conditions ouvrent le droit à une rente de l’AI ?\n\
    Pour avoir droit à une rente AI ordinaire, la personne assurée doit avoir \ncotisé à l’assurance suisse pendant trois\
    \ années entières au moins avant la \nsurvenance de l’invalidité et être domiciliée en Suisse.\f2514 Quelles conditions\
    \ ouvrent le droit à une allocation \npour impotent ou à une contribution d‘assistance ?\nLes assurés qui remplissent\
    \ les conditions décrites au chiffre 11 ont droit à \nl’allocation pour impotent s’ils résident en Suisse et si, en raison\
    \ de leur in -\nvalidité, ils ont besoin d’une aide régulière d’autrui pour les actes ordinaires \nde la vie (s’habiller,\
    \ manger, faire sa toilette, etc.), voire d’une surveillance \npersonnelle. De plus, les bénéficiaires d’une allocation\
    \ pour impotent vi -\nvant à la maison peuvent, grâce à la contribution d’assistance, engager un \nassistant qui leur\
    \ apporte l’aide dont ils ont besoin. Si l’impotence subsiste \nlorsque la rente de vieillesse se substitue à la rente\
    \ d’invalidité, la personne \nassurée continuera de toucher une allocation pour impotent et une contri -\nbution d’assistance\
    \ au moins égales à celles reçues jusque-là. \nL’allocation pour impotent et la contribution d’assistance ne sont pas\
    \ ver -\nsées à l’étranger. \nPrestations complémentaires\n15 Ma rente AVS ou AI ne couvre pas le coût de la vie, que\
    \ \npuis-je faire ?\nSi vous percevez une prestation en espèces (rente AVS ou AI, une allocation \npour impotent de l‘AI\
    \ après l‘âge de 18 ans ou une indemnité journalière \nde l‘AI pendant au moins six mois) et que vous vivez dans des conditions\
    \ \néconomiques modestes, vous avez droit, sous certaines conditions, à des \nprestations complémentaires. \nSi vous avez\
    \ atteint l‘âge de référence, que vous êtes invalide, veuf, veuve  \nou orphelin et que vous n‘avez néanmoins pas droit\
    \ à une rente parce que \nvous n‘avez pas cotisé ou que vous n‘avez pas cotisé assez longtemps, vous \npouvez tout de\
    \ même faire valoir un droit aux prestations complémentaires \nsous certaines conditions. \nSi vous n‘habitez pas en Suisse,\
    \ vous n‘avez pas droit aux prestations com -\nplémentaires.\nVous trouverez de plus amples informations à ce sujet dans\
    \ le mémento \n5.01 - Prestations complémentaires à l‘AVS et à l‘AI  et dans le mémento \n5.02 - Votre droit aux prestations\
    \ complémentaires à l‘AVS et à l‘AI .\f26Calcul des rentes\n16 Comment les rentes de l’AVS et de l’AI se calculent-elles\
    \ ?\nLes rentes AVS et AI sont calculées sur la base de la durée des cotisations, du \nrevenu de l’activité lucrative\
    \ ainsi que des bonifications pour tâches éduca -\ntives ou d’assistance. Les cotisations versées à une assurance étrangère\
    \ et \nles périodes de cotisations correspondantes ne peuvent être ni transférées \nà l’AVS/AI suisse ni prises en considération\
    \ d’aucune autre façon.\nTransfert des cotisations\n17 Mes cotisations AVS peuvent-elles être transférées  \nà l’assurance\
    \ sociale de mon pays d’origine ?\nLes cotisations versées à l’AVS/AI suisse ne peuvent pas être transférées à \nl’assurance\
    \ du pays d’origine du ressortissant étranger.\nRemboursement des cotisations\n18 Sous quelles conditions les cotisations\
    \ AVS  \npeuvent-elles être remboursées ?\nLes ressortissants d’Etats non contractants domiciliés à l’étranger peuvent,\
    \ \nà certaines conditions, demander et obtenir le remboursement sans in -\ntérêts des cotisations AVS après avoir quitté\
    \ définitivement la Suisse. Ils \ndoivent pour cela, notamment, avoir cotisé à l’assurance suisse pendant \nune année\
    \ entière au moins.\nDemandes de prestations\n19 A qui les demandes de prestations doivent-elles  \nêtre adressées ?\n\
    La demande de prestations doit être adressée aux organismes suivants, qui \ndisposent également des formulaires nécessaires.\n\
    Si l’assuré est domicilié en Suisse :\n•  pour les prestations de l’AVS à la caisse de compensation à laquelle les \n\
    cotisations ont été versées en dernier lieu\n•  pour les prestations de l’AI à l’office AI du canton de domicile\nIl est\
    \ recommandé à l’assuré de présenter sa demande de prestations dès \nque les conditions de droit sont remplies. \f27Si\
    \ l’assuré est domicilié à l’étranger :  \npour le remboursement des cotisations selon le chiffre 18, à la \nCaisse suisse\
    \ de compensation  \nAvenue Edmond-Vaucher 18  \nCase postale 3100  \nCH-1211 Genève 2\n20 A qui les demandes de prestations\
    \ d’une assurance  \nd’un pays étranger doivent-elles être adressées ? \nLes ressortissants d’Etats non contractants domiciliés\
    \ en Suisse qui enten -\ndent faire valoir le droit aux prestations d’une assurance étrangère s’adres -\nseront directement\
    \ à l’institution d’assurance compétente ou à une repré -\nsentation du pays concerné en Suisse.\n21 Où puis-je obtenir\
    \ des renseignements et des  \ninformations supplémentaires ?\nLes caisses de compensation, leurs agences et les offices\
    \ AI fournissent \ntout renseignement utile. La liste complète des caisses de compensation \nfigure sur Internet à l’adresse\
    \ www.avs-ai.ch . \nLes ressortissants d’Etats non contractants domiciliés à l’étranger s’adres -\nseront à la \nCaisse\
    \ suisse de compensation  \nAvenue Edmond-Vaucher 18  \nCase postale 3100  \nCH-1211 Genève 2\nD’autres informations figurent\
    \ dans la brochure La sécurité sociale en  \nSuisse.  Cette brochure est disponible à l’adresse Internet www.avs-ai.ch\
    \ .\nPrévoyance professionnelle (2e pilier) \n22 Prévoyance professionnelle (2e pilier) :  \nquels droits, quelles obligations\
    \ ?\nLa prévoyance professionnelle (caisse de pensions) vient en complément de \nl’AVS/AI/APG pour permettre aux assurés\
    \ ou aux survivants de maintenir \nde manière appropriée leur niveau de vie antérieur lorsque survient un cas \nde prévoyance\
    \ (vieillesse, décès ou invalidité). Elle est obligatoire pour les \npersonnes actives dont le revenu annuel est supérieur\
    \ à 22 680 francs.\f28Les personnes ayant été assurées dans la prévoyance professionnelle ont \nles droits suivants :\n\
    •  une rente de vieillesse lorsqu’elles atteignent l’âge de référence ou plus \ntôt suivant le règle  ment de la caisse\
    \ de pension;\n•  une rente d’invalidité, si la personne est invalide à 40 % au moins et si \nelle était assurée au moment\
    \ où la cause de l’invalidité s’est produite \n(les règlements des institutions de prévoyance peuvent prévoir des dis\
    \ -\npositions plus favorables);\n•  des prestations destinées aux survivants (veuve, veuf et enfants) en cas \nde décès\
    \ de la personne assurée;\n•  une prestation de sortie (= prestation de libre passage), si aucun des \ntrois événements\
    \ précités n’est survenu lorsque l’assuré quitte la caisse \nde pensions.\nLes rentes de la prévoyance professionnelle\
    \ sont versées aussi à l’étranger.\n23 Dans quel cas ai-je droit à une prestation de sortie  \nde la caisse de pensions\
    \ ?\nEn règle générale, la prestation de sortie doit être transférée sur un compte \nou une police de libre passage au\
    \ départ de la caisse de pensions (qui a \nlieu, normalement, à la fin d’un rapport de travail). Les assurés quittant\
    \ \ndéfinitivement la Suisse pour un Etat hors UE/AELE peuvent demander le \npaiement en espèces de la prestation de sortie\
    \ à la caisse de pensions de \nleur dernier employeur.\nLe paiement en espèces de la prestation de sortie qui correspond\
    \ au mi -\nnimum LPP n’est pas possible lorsque l’assuré quitte la Suisse et qu’il reste \nassuré obligatoirement dans\
    \ un Etat membre de l’UE pour les risques de \nvieillesse, de décès et d’invalidité. En revanche, la partie surobligatoire\
    \ de la \nprestation de sortie peut être payée en espèces, sur demande de l’assuré. \nSi le versement en espèces de la\
    \ prestation de sortie n’est pas possible, le \nmontant est versé sur un compte de libre passage ou une police de libre\
    \ \npassage bloqués. Pour les personnes qui partent pour le Liechtenstein, la \nprestation de sortie est versée à l’institution\
    \ de prévoyance de l’employeur \nliechtensteinois. Dans ce cas-là, il n’y a aucune possibilité de paiement en \nespèces.\f\
    2924 A qui m’adresser en cas de sortie  \nde la caisse de pensions ?\nLes personnes assurées doivent traiter avec la caisse\
    \ de pensions de \nleur dernier employeur. Elles doivent conserver toutes les attestations  \nd’assurance reçues de la\
    \ caisse. Si un assuré quitte la Suisse sans indiquer \noù la caisse de pension peut verser la prestation de sortie et\
    \ sans avoir reçu \nune prestation en espèces, la caisse de pension est tenue de transférer le \nmontant à l’institution\
    \ supplétive, au plus tard dans les deux ans qui suivent \nle départ.\n25 Où obtenir plus de renseignements concernant\
    \  \nles prestations de sortie ?\nLes caisses de pensions fournissent tout renseignement utile sur les pres -\ntations\
    \ de libre passage non réclamées. La Centrale du 2e pilier renseigne \négalement les assurés pour l’exercice de leurs\
    \ droits éventuels à une pres -\ntation :\nCentrale du 2e pilier  \nFonds de garantie LPP  \nCase postale 1023  \n3000\
    \ Berne 14  \nTél. 031 380 79 75  \nE-mail: info@zentralstelle.ch  \nwww.sfbvg.ch\nAssurance-maladie\n26 Assurance-maladie\
    \ : quels droits, quelles obligations ?\nToute personne domiciliée en Suisse doit s’assurer auprès d’un assu -\nreur-maladie\
    \ suisse dans les trois mois qui suivent sa prise de domicile ou \nsa naissance. Les salariés détachés provisoirement\
    \ à l’étranger par leur em -\nployeur, ainsi que les membres de leur famille qui n’exercent pas d’activité \nlucrative,\
    \ demeurent soumis à l’assurance obligatoire suisse. La personne \nassurée paie les primes et participe aux coûts des\
    \ prestations dont elle \nbénéficie (franchise et quote-part). L’assurance-maladie sociale alloue des \nprestations en\
    \ cas de maladie et de maternité, de même qu’en cas d’acci -\ndent si aucune assurance-accidents n’en assume la prise\
    \ en charge. En cas \nde maladie, les assureurs-maladie remboursent les frais médicaux, moins la \nparticipation obligatoire\
    \ aux coûts de la personne assurée. Les frais occasi -\nonnés par un traitement médical subi, en cas d’urgence, à l’étranger\
    \ (hors\f30UE/AELE) sont pris en charge à concurrence du double du montant qui au -\nrait été remboursé en Suisse. Les\
    \ assurés qui ne sont pas ressortissants d’un \nEtat membre de l’UE ou de l’AELE ont droit, en vertu d’une convention\
    \ \nconclue entre l’Allemagne et la Suisse, à la prise en charge des frais de trai -\ntements médicaux subis en cas d’urgence\
    \ lors d’un séjour en Allemagne.\nAssurance-accidents\n27 Assurance-accidents : quels droits, quelles obligations ?\n\
    Toute personne salariée en Suisse est obligatoirement assurée contre les \naccidents professionnels et non professionnels\
    \ (en cas d’activité d’au moins \nhuit heures par semaine chez le même employeur), et contre les maladies \nprofessionnelles.\
    \ Les primes de l’assurance contre les accidents et maladies \nprofessionnels sont à la charge de l’employeur ; celles\
    \ de l’assurance contre \nles accidents non professionnels sont à la charge du travailleur et sont dé -\nduites de son\
    \ salaire. Les conventions dérogatoires en faveur du travailleur \nsont réservées. L’assurance alloue entre autres le\
    \ traitement médical, des \nindemnités journalières et des rentes. Les accidents non professionnels sur -\nvenus à l’étranger\
    \ sont aussi couverts. Des renseignements peuvent être \nobtenus auprès de l’assureur-accidents de l’employeur.\nAssurance-chômage\n\
    28 Assurance-chômage : quels droits, quelles obligations ?\nToute personne qui exerce une activité salariée en Suisse\
    \ est obligatoire -\nment affiliée à l’assurance-chômage. La cotisation est payée moitié par \nle salarié (prélevée sur\
    \ le salaire) et moitié par l’employeur. Les assurés au \nchômage peuvent percevoir des prestations s’ils résident en\
    \ Suisse, s’ils \ns’annoncent comme chômeurs auprès de l’Office régional de placement et  \ns’ils remplissent toutes les\
    \ conditions d’octroi posées par la loi sur l’assuran -\nce-chômage. Des renseignements complémentaires peuvent être obtenus\
    \ \nsur le site www.travail.swiss  ou auprès du service de l’emploi du canton de \ndomicile. \nDes «info-brochures» sur\
    \ l’assurance-chômage et des informations à  \nl’attention des demandeurs d’emploi sont disponibles sur Internet à  \n\
    l’adresse www.travail.swiss .\f31Prestations transitoires pour chômeurs âgés\n29 Qu‘est-ce que les prestations transitoires\
    \ pour les  \nchômeurs âgés ?\nLes chômeurs qui arrivent en fin de droit de l ’assurance chômage après \nleur 60e anniversaire\
    \ et qui ne trouvent plus de revenus suffisants peuvent \nbénéficier de prestations transitoires jusqu ’à leur retraite.\
    \ \n30 Dans quelles circonstances ai-je droit à des  \nprestations transitoires ?\nVous pouvez toucher des prestations\
    \ transitoires si \n•  vous arrivez en fin de droit dans l’assurance-chômage au plus tôt pen -\ndant le mois au cours\
    \ duquel vous atteignez l’âge de 60 ans ;\n•  vous avez été assuré à l’assurance-vieillesse et survivants (AVS) en  \n\
    Suisse pendant au moins 20 ans, dont au moins cinq ans après l’âge de \n50 ans, et vous avez réalisé un revenu annuel\
    \ provenant d’une activité \nlucrative d’un certain montant ;\n•  vous disposez d’une fortune inférieure à 50 000 francs\
    \ (pour une per -\nsonne seule) ou 100 000 francs (pour un couple), le bien immobilier \nservant d’habitation à son propriétaire\
    \ n’étant pas pris en compte ;\n•  vous avez votre domicile et votre résidence habituelle en Suisse ou dans \nun État\
    \ membre de l’UE ou de l’AELE ;\n•  vous présentez un excédent de dépenses, c’est-à-dire que vos dépen -\nses reconnues\
    \ excèdent vos revenus déterminants (condition écono -\nmique).\nVous ne pouvez pas obtenir de prestations transitoires\
    \ si\n•  vous avez droit à une rente de l’AVS ou de l’AI ; \n• vous êtes en fin de droit avant votre 60e anniversaire\
    \ ; \n• vous êtes en fin de droit avant le 1er juillet 2021.\nVous trouverez de plus amples informations à ce sujet dans\
    \ le mémento \n5.03 - Prestations transitoires pour chômeurs âgés .\f32Allocations familiales\n31  Ai-je droit aux allocations\
    \ familiales ?\nEn générale, toute personne exerçant une activité lucrative et assurée en \nSuisse a droit aux allocations\
    \ familiales pour ses enfants qui vivent en Suisse \nsous condition qu’elle perçoive un revenu soumis aux cotisations\
    \ AVS de \n7 560 francs par année, respectivement 630 francs par mois au minimum. \nCelles-ci comprennent :\n•  une allocation\
    \ pour enfant d’au moins 215 francs par mois ; elle est \noctroyée dès le mois de la naissance jusqu’à et y compris le\
    \ mois au \ncours duquel l’enfant a son 16e anniversaire. Si l’enfant donne droit à \nl’allocation de formation avant\
    \ son 16e anniversaire, celle-ci sera versée \nà la place de l’allocation pour enfant. L’allocation pour enfant est éga\
    \ -\nlement octroyée pour les enfants âgés de 16 à 20 ans qui se trouvent \ndans l’impossibilité d’exercer une activité\
    \ lucrative en raison d’une at -\nteinte à la santé ;\n•  une allocation de formation d’au moins 268 francs par mois ;\
    \ elle est \nversée à partir du mois au cours duquel l’enfant commence sa forma -\ntion post obligatoire, mais au plus\
    \ tôt pour le mois au cours duquel il a \nson 15e anniversaire. L’enfant ayant atteint l’âge de 16 ans et se trou -\n\
    vant encore à l’école obligatoire donne droit à l’allocation de formation \nà partir du mois suivant celui au cours duquel\
    \ il fête son 16e anniver -\nsaire. L’allocation de formation est versée jusqu’à la fin de la formation, \nmais au plus\
    \ tard jusqu’à la fin du mois au cours duquel l’enfant atteint \nl’âge de 25 ans.\nLes allocations familiales pour les\
    \ enfants domiciliés à l’étranger ne sont \nexportées que si une convention de sécurité sociale conclue par la Suisse\
    \ \nle prévoit.\f33Prestations de l‘APG\n32 Ai-je droit à l’allocation de maternité ? \nLes femmes considérées comme salariées\
    \ ou indépendantes au moment de \nla naissance de l’enfant ont droit à l’allocation de maternité. Elles doivent \navoir\
    \ été soumises à l’AVS/AI/APG suisse pendant les neuf mois qui ont \nprécédé immédiatement la naissance de l’enfant et\
    \ avoir exercé une acti -\nvité lucrative pendant au moins cinq mois durant cette période.\nL’allocation de maternité\
    \ est octroyée pendant 14 semaines (98 jours) et \nse monte à 80 % du revenu moyen réalisé avant l’accouchement, mais\
    \ au \nplus à 220 francs par jour.\nVous trouverez de plus amples informations à ce sujet dans le mémento \n6.02 - Allocation\
    \ de maternité . \n33 Ai-je droit à l’allocation à l‘autre parent ? \nLes pères, ou les épouses de la mère, considérées\
    \ comme l’autre parent au \nsens de l’art. 255a, al. 1, CC, qui à la naissance de l’enfant exercent une ac -\ntivité professionnelle\
    \ en tant que salarié(e) ou en qualité d’indépendant(e) \nont droit à l’allocation à l’autre parent. \nIls doivent avoir\
    \ été soumis à l’assurance obligatoire au sens de la loi sur \nl’AVS pendant les neuf mois qui ont immédiatement précédé\
    \ la naissance \nde l’enfant et avoir exercé une activité lucrative pendant au moins cinq \nmois durant cette période.\n\
    La durée du congé de l’autre parent est de deux semaines (14 indemnités \njournalières au maximum). Ils touchent, à titre\
    \ d’allocation pour perte de \ngain, le 80 % du revenu moyen soumis à l’AVS qu’ils réalisaient avant la \nnaissance, mais\
    \ au plus 220 francs par jour.\nVous trouverez de plus amples informations à ce sujet dans le mémento \n6.04 - Allocation\
    \ à l’autre parent.  \f3434 Ai-je droit à l’allocation pour prise en charge ?  \nLes parents qui doivent interrompre leur\
    \ activité lucrative pour prendre en \ncharge leur enfant mineur gravement atteint dans sa santé ont droit à un \ncongé\
    \ de prise en charge.\nLe congé de prise en charge est de quatorze semaines (maximum 98 in -\ndemnités journalières).\
    \ L’allocation pour prise en charge se monte à 80 % \ndu revenu moyen de l’activité lucrative obtenu immédiatement avant\
    \ la \nperception des jours de congé, mais au plus à 220 francs par jour.\nVous trouverez de plus amples informations\
    \ à ce sujet dans le mémento \n6.10 - Allocation pour prise en charge .\n35 Ai-je le droit à l’allocation d’adoption ?\n\
    Les personnes exerçant une activité lucrative, qui accueillent en vue de son \nadoption un enfant de moins de quatre ans,\
    \ ont droit à l’allocation d‘ad -\noption. L’adoption de l‘enfant d’un conjoint ou d’un partenaire ne donne \ndroit à\
    \ aucune indemnité.\nVous devez avoir été soumis à l’assurance obligatoire au sens de la loi sur \nl’AVS pendant les neuf\
    \ mois qui ont immédiatement précédé l‘adoption de \nl’enfant, et avoir exercé une activité lucrative durant au moins\
    \ cinq mois \npendant cette période. \nLe congé d‘adoption est de deux semaines (maximum 14 indemnités jour -\nnalières).\
    \ \nL’allocation d‘adoption se monte à 80 % du revenu AVS moyen de l’activité \nréalisé avant l‘accueil de l‘enfant en\
    \ vue de son adoption mais au plus à 220 \nfrancs par jour. \nVous trouverez de plus amples informations à ce sujet dans\
    \ le mémento \n6.11 - Allocation d’adoption .\f35Renseignements et autres  \ninformations\nCe mémento ne donne qu’un aperçu\
    \ des dispositions en vigueur. Seu -\nles les dispositions légales et les conventions internationales font foi \ndans\
    \ le règlement des cas individuels. Sur demande, la Caisse suisse de \ncompensation à Genève ainsi que les représentations\
    \ suisses à l’étran -\nger (ambassade ou consulat) donnent de plus amples renseignements \net remettent les formulaires\
    \ nécessaires.\nLes désignations d’état civil ont également les significations suivantes : \n• mariage : partenariat enregistré;\n\
    • divorce : dissolution juridique du partenariat enregistré;\n• décès du conjoint : décès du partenaire enregistré.\n\
    Publié par le Centre d’information AVS/AI en collaboration avec  \nl’Office fédéral des assurances sociales.\nEdition\
    \ décembre 2024. Reproduction autorisée, sous condition d’un \naccord écrit du Centre d’information AVS/AI.\nCe mémento\
    \ est délivré par les caisses de compensation, leurs agences \net les offices AI. Numéro de commande 10.03. Il est également\
    \ dispo -\nnible sous www.avs-ai.ch .\f36Informazioni per i cittadini degli Stati \ncon i quali la Svizzera non ha concluso\
    \ \nuna convenzione di sicurezza sociale \n(Stati non contraenti)\nIn breve\nI cittadini degli Stati non contraenti che\
    \ sono domiciliati in Svizzera pos -\nsono far valere il loro diritto alle prestazioni del sistema di sicurezza  \nsociale\
    \ svizzero. La sicurezza sociale in Svizzera è basata sul cosiddetto \nsistema dei tre pilastri. L’AVS, l’AI e le loro\
    \ prestazioni complementari (PC) \nformano il 1° pilastro obbligatorio destinato a coprire i bisogni vitali. La \nprevidenza\
    \ professionale (cassa pensioni) forma il 2° pilastro: permette alle \npersone assicurate e ai loro superstiti di mantenere\
    \ in maniera appropriata il \nloro tenore di vita anteriore al momento in cui si verifica il caso di previdenza  \n(vecchiaia,\
    \ decesso o invalidità). Il 3° pilastro infine, la previdenza privata \n(risparmio, assicurazioni private), completa i\
    \ primi due ed è facoltativo.\nIl presente opuscolo fornisce una visione generale dell’obbligo assicurativo \ne del diritto\
    \ alle prestazioni per il 1° e 2° pilastro e si rivolge a tutti i cittadini \ndegli Stati con i quali la Svizzera non\
    \ ha concluso nessuna convenzione di \nsicurezza sociale.\nLa Svizzera ha concluso una convenzione di sicurezza sociale\
    \ con  \ni seguenti Stati: \nStati membri dell’UE Cina (assoggettamento) Montenegro\nStati membri dell‘AELS Corea del\
    \ Sud (assoggettamento) Regno Unito\nAlbania Filippine San Marino\nAustralia Giappone  Serbia \nBosnia e Erzegovina India\
    \ (assoggettamento) Stati Uniti\nBrasile Israele Tunisia\nCanada/Quebec Kosovo Turchia\nCile Macedonia del Nord Uruguay\n\
    L’elenco degli Stati con i quali la Svizzera ha concluso una conven -\nzione di sicurezza sociale è disponibile sul sito\
    \ Internet dell’Ufficio \nfederale delle assicurazioni sociali (UFAS): \nIl presente opuscolo vi concerne se siete cittadine\
    \ o cittadini di uno Stato \nche non figura nella lista (eccezione fatta per i/le superstiti delle cittadine o \ndei cittadini\
    \ svizzeri o degli Stati contraenti).\f37Il sistema svizzero di sicurezza sociale\n1 Come è organizzato il sistema svizzero\
    \  \ndi sicurezza sociale? \nLa sicurezza sociale in Svizzera comprende i seguenti rami assicurativi:\n•  assicurazione\
    \ per la vecchiaia, i superstiti e l’invalidità (AVS/AI)\n•  previdenza professionale per la vecchiaia, i superstiti e\
    \ l’invalidità (PP)\n•  assicurazione malattie (AMal)\n•  assicurazione contro gli infortuni (AINF)\n•  assicurazione\
    \ contro la disoccupazione (AD)\n•  assegni familiari (AF)\n•  indennità di perdita di guadagno per chi presta servizio\
    \ militare, civile \no di protezione civile, di maternità, per l ’altro genitore, per i genitori \nche assistono un figlio\
    \ con gravi problemi di salute dovuti a malattia o \ninfortunio o di adozione (IPG)\n•  prestazioni complementari (PC)\n\
    •  prestazioni transitorie per i disoccupati anziani (PTD).\n2 Sono assicurato per l’AVS/AI?\nL’AVS e l’AI sono assicurazioni\
    \ generali obbligatorie per tutti coloro che \nrisiedono o che esercitano un’attività lucrativa in Svizzera. All’obbligo\
    \ legale \nassicurativo sottostanno per principio anche i cittadini stranieri. \n3 Come posso conoscere il mio numero\
    \ AVS?\nIl numero AVS figura sulla tessera d’assicurazione malattie come pure sul \ncertificato d’assicurazione AVS/AI.\
    \ Una persona assicurata, che non pos -\nsiede la tessera d’assicurazione malattie e neppure il certificato d’assicu -\n\
    razione AVS/AI può rivolgersi alla sua cassa di compensazione al fine di \nottenere il certificato d’assicurazione. Il\
    \ certificato d’assicurazione deve \nessere conservato. La tessera d’assicurazione malattie o il certificato d’assi -\n\
    curazione AVS/AI deve essere presentato ad ogni nuovo datore di lavoro e, \nall’atto di richiedere prestazioni, all’ufficio\
    \ competente.\nImportante: nella corrispondenza con le casse di compensazione il numero \nAVS deve sempre essere menzionato.\f\
    38Contributi\n4 Quando inizia l’obbligo di contribuzione per l’AVS/AI?\nLe persone senza attività lucrativa assicurate\
    \ all’AVS e all’AI pagano i cont -\nributi a partire dal 1° gennaio che segue il compimento dei 20 anni fino al \nraggiungimento\
    \ dell’età di riferimento. Per coloro che esercitano un’attività \nlucrativa l’obbligo di versare contributi comincia\
    \ con l’inizio dell’attività, ma \nnon prima del 1° gennaio che segue il compimento dei 17 anni.\n5 In che maniera vengono\
    \ riscossi i contributi all’"
