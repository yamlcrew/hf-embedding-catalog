      \ su www.avs-ai.ch .\n Ulteriori informazioni, pubblicazioni e video esplicativi.\n3.03-25/01-I"
    - "1.05Stand am 1. Januar 2015  \nEtat au 1er janvier 2015  \nStato al 1° gennaio 2015\nSeiten  \n3-5Erläuterungen  \n\
      zur Kontenübersicht\nPages  \n6-8Explications  \nconcernant l’aperçu  \ndes comptes\nPagine  \n9-11Spiegazioni relative\
      \  \nalla ricapitolazione  \ndei conti\f2\f3Erläuterungen zur Kontenübersicht\nAuf einen Blick \nSie und Ihr Ehegatte\
      \ oder Ihre Ehegattin erhalten im Scheidungsfall nach \nAbschluss des Splitting-Verfahrens eine Kontenübersicht. Sind\
      \ Sie oder Ihr \nEhegatte oder Ihre Ehegattin bereits rentenberechtigt, erhalten Sie anstelle \nder Kontenübersicht\
      \ eine neue anfechtbare Rentenverfügung.\nDie Kontenübersicht bietet einen Überblick über sämtliche Einkommen, die \n\
      seit Beginn der Beitragspflicht bei der AHV/IV in Ihren Individuellen Konten \n(IK) eingetragen wurden. Diese Eintragungen\
      \ bilden die Grundlage für die \nspätere Rentenberechnung.\nDie Einkommen, die Sie und Ihr Ehegatte oder Ihre Ehegattin\
      \ während der \nEhejahre erzielt haben, werden aufgeteilt und Ihnen je zur Hälfte gutge -\nschrieben. Sie sind in der\
      \ Übersicht als geteilte Einkommen gekennzeich -\nnet. Betreuungsgutschriften werden separat aufgeführt, während Erzie\
      \ -\nhungsgutschriften erst im Rentenfall zum Einkommen hinzugezählt und in \ndie Berechnung miteinbezogen werden.\n\
      Falls im gleichen Jahr mehrere Ausgleichskassen ein Individuelles Konto für \nSie führten (weil Sie bei mehreren Arbeitgebern\
      \ tätig waren), werden die \nEinkommen für das betreffende Jahr zusammengezählt.\f4Allfällige Korrekturen und Beitragslücken\n\
      1 Wie erfahre ich allfällige Änderungen?\nDie Ausgleichskassen nehmen Korrekturen, die nach Abschluss des Ver -\nfahrens\
      \ notwendig werden, für Sie und Ihren Ehegatten oder Ihre Ehe -\ngattin automatisch vor. Die eingetragenen Einkommen\
      \ können sich  \ndaher unter Umständen noch ändern. Die Ausgleichskassen orientieren nicht  \nautomatisch über diese\
      \ Änderungen. Wir empfehlen Ihnen daher drin -\ngend, nach etwa drei Jahren noch einmal einen detaillierten Auszug aus\
      \ \ndem IK zu verlangen.\n2 Was ist, wenn ich während der Ehe nicht  \nerwerbstätig war?\nWenn Sie während der Ehe nicht\
      \ erwerbstätig waren und deshalb keine \nBeiträge entrichtet haben, können Sie sich zur Abklärung der Beitrags -\npflicht\
      \ an die kantonale Ausgleichskasse wenden.\nVerfahren\n3 Wo kann ich den Kontoauszug verlangen?\nSie können den Kontoauszug\n\
      • bei den kontoführenden Ausgleichskassen verlangen, oder\n• irgendeine Ausgleichskasse damit beauftragen, für Sie sämtliche\
      \ Kon -\ntoauszüge zu beschaffen.\nDer Kontoauszug ist kostenlos. \nBeanstandung der Eintragung\n4 Kann ich eine Berichtigung\
      \ der Eintragungen  \nverlangen? \nJa. Sie können innert 30 Tagen nach der Zustellung des Kontoauszugs bei \nder Ausgleichskasse,\
      \ die das beanstandete Konto führt, eine Berichtigung \nverlangen, wenn Sie die Richtigkeit der Einträge nicht anerkennen.\
      \ Den \nEntscheid über das Berichtigungsbegehren fällt die Ausgleichskasse in \nForm einer Kassenverfügung. \f5Auskünfte\
      \ und weitere  \nInformationen\nDieses Merkblatt vermittelt nur eine Übersicht. Für die Beurteilung \nvon Einzelfällen\
      \ sind ausschliesslich die gesetzlichen Bestimmungen \nmassgebend. Die Ausgleichskassen und ihre Zweigstellen geben\
      \ gerne \nAuskunft. Ein Verzeichnis aller Ausgleichskassen finden Sie unter  \nwww.ahv-iv.ch .\nDie Zivilstandsbezeichnungen\
      \ haben auch die folgende Bedeutung: \n• Ehe/Heirat: eingetragene Partnerschaft\n• Scheidung: gerichtliche Auflösung\
      \ der Partnerschaft\n• Verwitwung: Tod des eingetragenen Partners / der eingetragenen \nPartnerin\nHerausgegeben von\
      \ der Informationsstelle AHV/IV in Zusammenarbeit \nmit dem Bundesamt für Sozialversicherungen.\nNachdruck Oktober 2021.\
      \ Auch auszugsweiser Abdruck ist nur mit \nschriftlicher Einwilligung der Informationsstelle AHV/IV erlaubt. \nDieses\
      \ Merkblatt kann bei den Ausgleichskassen und deren Zweig-  \nstellen sowie den IV-Stellen bezogen werden. Bestellnummer\
      \ 1.05. Es \nist ebenfalls unter www.ahv-iv.ch  verfügbar.\f6Explications concernant l’aperçu \ndes comptes\nEn bref\n\
      En cas de divorce, vous et votre ex-conjoint recevez un aperçu des comptes \ndès que la procédure de partage des revenus\
      \ est achevée. Si l’un de vous \ntouche déjà une rente, vous recevrez, en lieu et place de l’aperçu des comp -\ntes,\
      \ une nouvelle décision de rente susceptible de recours.\nL’aperçu des comptes vous donne une vue d’ensemble des revenus\
      \ inscrits \ndans vos Comptes Individuels (CI) depuis que vous êtes soumis/e à l’ob -\nligation de cotiser à l’AVS/AI.\
      \ Ces inscriptions forment la base du calcul \nultérieur des rentes.\nLes revenus réalisés par vous et votre ex-conjoint\
      \ pendant les années de \nmariage sont divisés et attribués par moitié à chacun. Dans l’aperçu des \ncomptes, ils sont\
      \ désignés comme revenus partagés. Les bonifications pour \ntâches d’assistance sont mentionnées séparément, tandis\
      \ que les bonifica -\ntions pour tâches éducatives qui peuvent entrer dans le calcul d’une rente \nne sont prises en\
      \ considération qu’au moment du calcul de la rente.\nSi, pour une année, plusieurs caisses de compensation tenaient\
      \ un Compte \nIndividuel pour vous (parce que vous aviez plusieurs employeurs), les reve -\nnus de cette année-là sont\
      \ additionnés.\f7Corrections éventuelles et lacunes de cotisations\n1 Comment puis-je avoir connaissance des modifications\
      \ ?\nUne fois la procédure terminée, les caisses de compensation effectuent au -\ntomatiquement les corrections qui\
      \ s’avèrent nécessaires sur votre compte \net sur celui de votre ex-conjoint. Il se peut donc que les revenus inscrits\
      \ \nsoient encore modifiés. Mais les caisses de compensation ne signalent pas \nd’office ces modifications-là. Nous\
      \ vous recommandons donc instamment \nde demander un nouvel extrait détaillé des CI après trois ans environ.\n2 Qu’en\
      \ est-il si je n’ai pas exercé d’activité lucrative  \npendant le mariage ?\nSi vous n’avez pas exercé d’activité lucrative\
      \ pendant vos années de ma-\nriage et que vous n’avez jamais dû cotiser, vous pouvez vous adresser à la \ncaisse cantonale\
      \ de compensation pour régler la question de votre obliga -\ntion de cotiser.\nProcédure\n3 Où puis-je demander l’extrait\
      \ de compte ?\nVous pouvez\n• demander un extrait de compte auprès de toute caisse de compensa -\ntion tenant pour vous\
      \ un compte, ou\n• charger n’importe quelle caisse de compensation de vous procurer \ntous les extraits de compte vous\
      \ concernant.\nL’extrait de compte est gratuit. \nContestation des inscriptions\n4 Puis-je exiger une rectification\
      \ des inscriptions? \nOui. Vous pouvez, dans les 30 jours suivant la remise de l’extrait de compte, \ndemander une rectification\
      \ à la caisse de compensation qui tient le compte \nconcerné si vous contestez l’exactitude des inscriptions qui y sont\
      \ faites. \nLa caisse de compensation se prononcera sur votre demande par voie de \ndécision.\f8\nRenseignements et\
      \ autres  \ninformations\nCe mémento ne fournit qu’un aperçu général. Pour le règlement des \ncas individuels, seules\
      \ les dispositions légales font foi. Les caisses de \ncompensation, leurs agences et les offices AI fournissent volontiers\
      \ \ntous les renseignements utiles. Vous trouverez la liste complète des \ncaisses de compensation sur le site www.avs-ai.ch\
      \ .\nLes désignations d’état civil utilisées ici ont également les significations \nsuivantes :  \n• mariage : partenariat\
      \ enregistré ;\n• divorce : dissolution judiciaire du partenariat enregistré ;\n• décès du conjoint : décès du partenaire\
      \ enregistré.\nPublié par le Centre d’information AVS/AI en collaboration avec l’Of -\nfice fédéral des assurances sociales.\n\
      Réimpression octrobre 2021. Toute reproduction, même partielle, n’est \nautorisée qu’avec l’accord écrit du Centre d’information\
      \ AVS/AI. \nCe mémento peut être obtenu auprès des caisses de compensation et \nde leurs agences ainsi qu’auprès des\
      \ offices AI. Numéro de commande \n1.05. Il est également disponible sous www.avs-ai.ch .\f9Spiegazioni relative alla\
      \  \nricapitolazione dei conti\nIn breve\nDopo che è stata conclusa la procedura di splitting in caso di divorzio, \n\
      entrambi gli ex coniugi ricevono una ricapitolazione dei conti. Se uno di \nloro ha già diritto a una rendita, al posto\
      \ della ricapitolazione riceverà una \nnuova decisione impugnabile relativa alla rendita.\nLa ricapitolazione dei conti\
      \ fornisce una visione complessiva dell’insieme \ndei redditi che dall’inizio dell’obbligo di contribuzione sono stati\
      \ registrati \npresso l’AVS/AI sui Conti Individuali (CI) della persona interessata. Queste \nregistrazioni costituiscono\
      \ la base per il successivo calcolo delle rendite.\nLa somma dei redditi percepiti dai coniugi durante gli anni di matrimo\
      \ -\nnio viene divisa in due e accreditata a ciascuno per metà. Essi sono cont -\nrassegnati sulla ricapitolazione come\
      \ redditi divisi. Gli accrediti per compiti \nassistenziali sono registrati separatamente, mentre gli accrediti per\
      \ compiti \neducativi vengono aggiunti al reddito solo in caso di rendita e quindi con -\nsiderati nel calcolo.\nQualora\
      \ nello stesso anno più di una cassa di compensazione abbia tenuto \nun Conto Individuale per la stessa persona (perché\
      \ quest’ultima ha eser -\ncitato un’attività lucrativa presso diversi datori di lavoro), i redditi dell’anno \nin questione\
      \ vengono addizionati.\n \f10Correzioni e lacune contributive eventuali\n1 Come si può sapere se vi sono state modifiche\
      \ nel CI?\nLe casse di compensazione eseguono automaticamente per entrambi i \nconiugi le correzioni necessarie una\
      \ volta conclusa la procedura. I redditi \nregistrati possono quindi ancora cambiare a seconda delle circostanze. Le\
      \ \ncasse di compensazione non forniscono automaticamente informazioni \nsu queste modifiche. È quindi fortemente auspicabile\
      \ richiedere un nuovo \nestratto dettagliato del CI dopo circa tre anni.\n2 A chi devono rivolgersi le persone che durante\
      \ il  \nmatrimonio non esercitavano un’attività lucrativa  \nper verificare il loro obbligo di contribuzione?\nPer verificare\
      \ il loro attuale obbligo di contribuzione le persone che durante \nil matrimonio non esercitavano un’attività lucrativa\
      \ e non hanno dovuto \nversare contributi possono rivolgersi alla cassa di compensazione canto -\nnale. \nProcedura\n\
      3 Dove può essere richiesto un estratto del Conto  \nIndividuale?\nL’assicurato può\n• richiedere un estratto conto\
      \ presso ciascuna delle casse di compensa -\nzione che tengono un conto a suo nome oppure\n• incaricare qualsiasi cassa\
      \ di compensazione di farglieli pervenire tutti.\nGli estratti conto sono gratuiti.\nContestazione della registrazione\n\
      4 È possibile chiedere una rettifica delle registrazioni?\nSì. Chi contesta l’esattezza delle registrazioni può chiedere\
      \ una rettifica \nentro i 30 giorni seguenti la notifica dell’estratto conto contestato alla \ncassa di compensazione\
      \ che gestisce il conto interessato, che emanerà una \ndecisione in merito.\f11Chiarimenti e altre  \ninformazioni\n\
      Questo opuscolo informativo presenta solo una panoramica riassun -\ntiva. Per la valutazione dei singoli casi fanno\
      \ stato esclusivamente le \ndisposizioni legali in vigore. Per ulteriori informazioni ci si può rivolgere \nalle casse\
      \ di compensazione o alle loro agenzie. L’elenco delle casse di \ncompensazione è pubblicato all’indirizzo Internet\
      \ www.avs-ai.ch .\nI termini relativi allo stato civile hanno anche il significato seguente:\n• matrimonio: unione domestica\
      \ registrata,\n• divorzio: scioglimento giudiziale dell’unione domestica registrata,\n• decesso del coniuge: decesso\
      \ del partner registrato.\nPubblicato dal Centro d’informazione AVS/AI in collaborazione con \nl’Ufficio federale delle\
      \ assicurazioni sociali.\nRistampa ottobre 2021. La riproduzione, anche solo parziale, è au -\ntorizzata soltanto con\
      \ il consenso scritto del Centro d’informazione  \nAVS/AI.\nQuesto opuscolo informativo può essere richiesto alle casse\
      \ di com -\npensazione, alle loro agenzie e agli uffici AI. Numero di ordinazione 1.05.  \nÈ disponibile anche su www.avs-ai.ch\
      \ .\n1.05-15/01-M"
