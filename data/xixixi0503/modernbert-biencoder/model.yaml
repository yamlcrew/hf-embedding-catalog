  - "5.03 Prestazioni transitorie\nPrestazioni transitorie per  \ni disoccupati anziani\nStato al 1° gennaio 2025 \f2In breve\
    \ \nLe prestazioni transitorie sono tese a garantire la copertura del fabbisogno \nvitale delle persone che hanno perso\
    \ il lavoro poco prima di raggiungere \nl’età di riferimento, fino al momento in cui possono riscuotere la rendita \n\
    di vecchiaia. Si tratta di prestazioni in funzione del bisogno, che vengono \ncalcolate analogamente alle prestazioni\
    \ complementari all’assicurazione \nper la vecchiaia e per i superstiti (AVS) o all’assicurazione invalidità (AI). \n\
    I disoccupati che hanno esaurito il diritto all’indennità dell’assicurazione \ncontro la disoccupazione dopo i 60 anni\
    \ e non riescono a conseguire un \nreddito sufficiente possono ricevere prestazioni transitorie fino al pensio -\nnamento.\
    \ Queste prestazioni, finanziate dalla Confederazione e versate dai \nCantoni, constano della prestazione transitoria\
    \ annua, che viene versata \nmensilmente (v. punti 3–10), e del rimborso delle spese di malattia e d’in -\nvalidità (v.\
    \ punti 11 e 12).\nPrestazioni transitorie\n1 Quando si può avere diritto alle prestazioni transitorie?\nPossono ricevere\
    \ le prestazioni transitorie le persone che: \n•  esauriscono il diritto all’indennità di disoccupazione nel mese in cui\
    \ \ncompiono i 60 anni di età o successivamente;\n•  sono stati assicurati all’AVS svizzera per almeno 20 anni, di cui\
    \ almeno \ncinque dopo aver compiuto i 50 anni di età, e hanno conseguito un \ndeterminato reddito da attività lucrativa1;\n\
    •  dispongono di una sostanza non superiore a 50 000 franchi (persone \nsole) o 100 000 franchi (coppie sposate), senza\
    \ tener conto delle abita -\nzioni ad uso proprio;\n•  sono domiciliate e dimorano abitualmente in Svizzera o in uno Stato\
    \ \ndell’UE2 o dell’AELS3; \n•  hanno spese riconosciute superiori ai redditi computabili (condizione \neconomica).\n\
    \ \n1 Una persona deve aver guadagnato 22 680 franchi all’anno (75 % di 30 240 franchi) per \npoter esercitare il diritto\
    \ alle prestazioni transitorie (importi per il 2025).\n2 Austria, Belgio, Bulgaria, Cechia, Cipro, Croazia, Danimarca,\
    \ Estonia, Finlandia, Francia, \nGermania, Grecia, Irlanda, Italia, Lettonia, Lituania, Lussemburgo, Malta, Paesi Bassi,\
    \ Polo -\nnia, Portogallo, Romania, Slovacchia, Slovenia, Spagna, Svezia e Ungheria, purché lo Stato in \nquestione sia\
    \ assoggettato al regolamento (CEE) n. 883/2004.\n3 Norvegia, Islanda e Liechtenstein.\f3Non ricevono le prestazioni transitorie\
    \ le persone che:\n•  hanno diritto a una rendita dell’AVS o dell’AI; \n•  hanno esaurito il diritto all’indennità di\
    \ disoccupazione prima del com -\npimento dei 60 anni;\n• hanno esaurito il diritto all’indennità di disoccupazione prima\
    \ del  \n1° luglio 2021.\n2 A quanto ammontano le prestazioni transitorie?\nLe prestazioni transitorie constano della\
    \ prestazione transitoria annua e del \nrimborso delle spese di malattia e d’invalidità.  \nSono fissate in funzione del\
    \ bisogno e versate fino a un importo massimo \nannuo di 46 508 franchi per le persone sole e di 69 761 franchi per le\
    \ cop -\npie sposate (limite massimo delle prestazioni transitorie).\nPer le spese di malattia e d’invalidità sono rimborsati\
    \ annualmente al mas -\nsimo 5 000 franchi per le persone sole e 10 000 franchi per le coppie \nsposate, fino al raggiungimento\
    \ dell’importo massimo delle prestazioni \ntransitorie.\nPrestazione transitoria annua \n3 Come viene calcolata la prestazione\
    \ transitoria annua? \nLa prestazione transitoria annua corrisponde alla differenza tra le spese \nriconosciute e i redditi\
    \ computabili. Le prestazioni transitorie sono soggette \na limitazione e vengono concesse soltanto fino agli importi\
    \ massimi indicati \nal punto 2 (46 508 franchi o 69 761 franchi).\n4 Quali spese sono riconosciute? \nSono riconosciute\
    \ soltanto le spese indicate nella legge. Se i beneficiari di \nprestazioni transitorie sono domiciliati in uno Stato\
    \ dell’UE o dell’AELS, gli \nimporti di determinate spese vengono adeguati al potere d’acquisto dello \nStato in questione.\
    \ Sono riconosciute le spese seguenti.\na) Importo destinato alla copertura del fabbisogno generale vitale \n(importo\
    \ annuo)\nQuesto importo serve a coprire le spese per le necessità quotidiane, quali \ngeneri alimentari, vestiti, imposte\
    \ ecc.\nper persone sole CHF 20 670.–\nper coppie di coniugi CHF 31 005.–\f40 - 10 anni 11 - max. 25 anni\nper il primo\
    \ figlio CHF 7 590.– CHF 10 815.–\nper il secondo figlio CHF 6 325.– CHF 10 815.–\nper il terzo figlio CHF 5 270.– CHF\
    \ 7 210.–\nper il quarto figlio CHF 4 390.– CHF 7 210.–\nper ogni ulteriore figlio CHF 3 660.– CHF 3 605.–\nb) Spese per\
    \ l’alloggio\nLe spese per la pigione e le spese accessorie sono riconosciute fino al rag -\ngiungimento degli importi\
    \ massimi per la pigione indicati di seguito. Per \nle persone che vivono in un’abitazione di loro proprietà viene computato\
    \ \nquale pigione il valore locativo, cui viene aggiunto un importo forfettario \ndi 3 480 franchi per le spese accessorie.\
    \ Possono essere computati al mas -\nsimo i seguenti importi annui:\nRegione per \nla pigione1 1 \n(grandi centri)Regione\
    \ per \nla pigione1 2 \n(città)Regione per \nla pigione1 3 \n(campagna)\nPersone sole CHF 18 900.– CHF 18 300.– CHF 16\
    \ 680.–\nCoppie sposate senza \nfigli / Persone sole con  \nun figlioCHF 22 320.– CHF 21 720.– CHF 20 160.–\nCoppie sposate\
    \ con un \nfiglio / Persone sole con \ndue figliCHF 24 780.– CHF 23 760.– CHF 22 200.–\nCoppie sposate con due \no più\
    \ figli / Persone sole \ncon tre o più figliCHF 27 060.– CHF 25 920.– CHF 24 000.–\nCoppie di conviventi  \n(economia\
    \ domestica \ncomposta da due per -\nsone) per persona2CHF 11 160.– CHF 10 860.– CHF 10 080.–\n1 Per la ripartizione dei\
    \ Comuni nelle tre regioni si veda il sito Internet  \ndell’UFAS, www.ufas.admin.ch > Assicurazioni sociali > Prestazioni\
    \ transitorie > Informa -\nzioni di base & legislazione\n2 Alle persone non sposate che vivono in un’economia domestica\
    \ composta da più di due \npersone si applicano altri importi.\nSe è necessaria un’abitazione in cui è possibile spostarsi\
    \ con una carroz -\nzella, l’importo massimo delle spese di pigione aumenta di 6 900 franchi.\f5c) Altre spese riconosciute\n\
    Sono inoltre riconosciute le spese seguenti: \n•  le spese di manutenzione di fabbricati e gli interessi ipotecari, fino\
    \ a \nconcorrenza del ricavo lordo dell’immobile; \n•  l’importo per l’assicurazione malattie obbligatoria, che corrisponde\
    \ al \npremio effettivo, ma al massimo al premio medio cantonale o regio -\nnale; \n•  i contributi ad AVS, AI e IPG;\
    \ \n•  le spese professionali, fino a concorrenza del reddito lordo da attività \nlucrativa;\n•  i contributi di mantenimento\
    \ versati in virtù del diritto di famiglia, come \nad esempio gli alimenti;\n•  i contributi per il mantenimento facoltativo\
    \ della previdenza professio -\nnale.\n5 Quali redditi sono computati? \nSono computati come reddito: \n•  i redditi da\
    \ attività lucrativa (v. anche punto 7);\n•  tutte le rendite correnti (previdenza professionale, assicurazione mili -\n\
    tare o contro gli infortuni, assicurazioni sociali estere ecc.), pensioni e \naltre prestazioni periodiche;\n•  i redditi\
    \ sostitutivi quali indennità giornaliere di assicurazioni sociali e di \nassicurazioni private;\n•  gli assegni familiari;\n\
    •  i proventi della sostanza mobile e immobile, quali interessi, pigioni, \nsubaffiti, affitto o usufrutto;\n•  il valore\
    \ locativo dell’abitazione;\n•  le prestazioni derivanti da un contratto di vitalizio o da una conven -\nzione analoga;\n\
    •  i proventi e le parti di sostanza cui si è rinunciato;\n•  i contributi di mantenimento ricevuti in virtù del diritto\
    \ di famiglia, \ncome ad esempio gli alimenti;\n•  una parte della sostanza (consumo della sostanza) eccedente i 30 000\
    \ \nfranchi (persone sole) o i 50 000 franchi (coppie sposate). Inoltre, \nper le abitazioni ad uso proprio è considerata\
    \ quale sostanza sol -\ntanto la parte eccedente 112 500 franchi. La parte eccedente le \nfranchigie è computata quale\
    \ reddito nella misura di 1/15.  \f6Esempio per una persona sola:\nSostanza (banca) CHF 45 000.–\nSostanza non computabile\
    \ - CHF 30 000.–\nSostanza computabile CHF 15 000.–\ndi cui 1/15 (consumo della sostanza) CHF 1 000.–\n6 Quali entrate\
    \ non sono computate come reddito?\nNon sono computati come reddito:\n•  le prestazioni dei parenti;\n•  le prestazioni\
    \ dell’aiuto pubblico sociale;\n•  gli assegni per grandi invalidi delle assicurazioni sociali;\n•  le borse di studio\
    \ e altri aiuti all’istruzione per i figli di età inferiore a 25 \nanni ancora in formazione;\n•  i contributi di solidarietà\
    \ per le vittime di misure coercitive a scopo as -\nsistenziale e collocamenti extrafamiliari.\n7 Come viene computato\
    \ il reddito da attività lucrativa? \nDal reddito da attività lucrativa sono dedotti le spese professionali e i con -\n\
    tributi alle assicurazioni sociali nonché una franchigia annua di 1 300 fran -\nchi per le persone sole e di 1 950 franchi\
    \ per le coppie sposate1. L’importo \nresiduo è computato per due terzi. \n1 La stessa franchigia viene dedotta anche\
    \ per le persone con figli minorenni o di età infe -\nriore a 25 anni ancora in formazione.\n8 Cosa succede in caso di\
    \ variazione del reddito o della \nsostanza?\nSe il reddito o la sostanza di un beneficiario di prestazioni transitorie\
    \ o di \nuna persona compresa nel calcolo delle medesime si riduce o aumenta \nnotevolmente, le prestazioni transitorie\
    \ vengono adeguate anche nel corso \ndell’anno civile (v. punto 15).\n9 Come incide il reddito da attività lucrativa del\
    \ coniuge?\nAl coniuge viene computato un reddito da attività lucrativa ipotetico, se \nnon ha alcun diritto proprio alle\
    \ prestazioni transitorie e rinuncia a conse -\nguire un reddito da attività lucrativa. Se mediante candidature scritte\
    \ per \nun posto di lavoro e risposte negative delle imprese in questione il coniuge \npuò dimostrare di non trovare un\
    \ impiego ragionevolmente esigibile, non \nviene computato alcun reddito ipotetico.\f7Il reddito da attività lucrativa\
    \ del coniuge senza diritto alle prestazioni tran -\nsitorie viene computato, senza deduzione di una franchigia, in ragione\
    \ \ndell’80 per cento. \nMantenimento del contatto con il mercato del lavoro\n10 Quali sforzi di reintegrazione sono riconosciuti?\n\
    I beneficiari di prestazioni transitorie devono proseguire i loro sforzi per \nreintegrarsi nel mercato del lavoro. Sono\
    \ riconosciuti ad esempio i seguenti \nsforzi e impegni:\n•  collocamento volontario tramite l’ufficio regionale di collocamento\
    \ \n(URC);\n•  lettere di candidatura;\n•  partecipazione a misure di reintegrazione;\n•  volontariato; \n•  partecipazione\
    \ a corsi di lingue; \n•  coaching; \n•  cura e assistenza a familiari o conoscenti. \n \nRimborso delle spese di malattia\
    \ e d’invalidità\n11 Quali spese di malattia e d’invalidità vengono  \nrimborsate?\nOltre alla prestazione transitoria\
    \ annua possono essere rimborsate le spese \ndi malattia e d’invalidità sostenute, a condizioni che queste non siano già\
    \ \ncoperte da un’altra assicurazione (p. es. assicurazione malattie, contro gli \ninfortuni o AI), che non siano ancora\
    \ raggiunti gli importi massimi (limiti \nmassimi; v. punto 2) e che la persona interessata viva in Svizzera. Sono \n\
    rimborsate le spese seguenti: \n•  le spese per cure dentarie (economiche e appropriate);\n•  le spese supplementari causate\
    \ da un regime dietetico d’importanza \nvitale;\n•  le spese di trasporto al più vicino luogo di cura;\n•  le spese per\
    \ i mezzi ausiliari;\n•  la partecipazione ai costi della cassa malati (aliquota percentuale e \nfranchigia) fino a concorrenza\
    \ di 1 000 franchi all’anno.\f812 Fino a quando si può richiedere il rimborso delle spese?\nTutti i documenti necessari,\
    \ quali conteggi della cassa malati, fatture del \ndentista o prescrizioni mediche, vanno inviate all’organo competente.\
    \ Il \nrimborso delle spese può essere richiesto entro 15 mesi dalla fatturazione.\n \nRichiesta delle prestazioni transitorie\
    \ e durata  \ndel diritto \n13 Dove va presentata la richiesta di prestazioni  \ntransitorie? \nSi può esercitare il proprio\
    \ diritto alle prestazioni transitorie con una richie -\nsta all’organo esecutivo competente del luogo di domicilio (v.\
    \ punto 16). \nPer le persone domiciliate in uno Stato dell’UE o dell’AELS è competente \nl’organo esecutivo dell’ultimo\
    \ luogo di domicilio in Svizzera. Per le persone \nche non sono mai state domiciliate in Svizzera è competente l’organo\
    \ ese -\ncutivo del luogo della sede dell’ultimo datore di lavoro. \nCi si può rivolgere agli organi esecutivi anche per\
    \ ricevere i moduli uffi -\nciali per la richiesta, che possono essere inoltrati dalla persona richiedente, \ndal suo\
    \ rappresentante legale o da un parente stretto. L’organo esecutivo \ncompetente comunica per iscritto la decisione concernente\
    \ le prestazioni \ntransitorie. La persona interessata può fare opposizione. \n14 Quando inizia e quando finisce il diritto\
    \ alle prestazioni \ntransitorie? \nIl diritto alle prestazioni transitorie nasce in linea di principio dal mese in cui\
    \ \nviene presentata la richiesta e sono adempiute le condizioni per il versa -\nmento. Il diritto si estingue alla fine\
    \ del mese in cui il richiedente: \n•  non adempie più ad almeno una delle condizioni;\n•  ha il diritto di riscuotere\
    \ anticipatamente la rendita AVS (62 anni per le \ndonne e 63 per gli uomini), se dagli accertamenti dell’organo esecutivo\
    \ \ncompetente risulta prevedibile che al raggiungimento dell’età ordinaria \ndi pensionamento avrà diritto alle prestazioni\
    \ complementari; o\n•  raggiunge l’età di riferimento.\f9Obbligo d’informare \n15 Si è tenuti a comunicare eventuali modifiche\
    \ delle  \ncondizioni personali o economiche? \nOgni cambiamento delle condizioni personali e ogni variazione importante\
    \ \ndelle condizioni economiche dell’avente diritto a prestazioni transitorie e \ndelle persone comprese nel calcolo delle\
    \ medesime devono essere comu -\nnicati immediatamente all’organo esecutivo. La comunicazione può essere \neffettuata\
    \ dall’avente diritto, dal suo rappresentante legale, da un terzo o \nda un’autorità. Tra queste modifiche rientrano ad\
    \ esempio: \n•  cambiamenti d’indirizzo; \n•  cambiamenti della pigione (oppure del numero di persone che vivono \nnella\
    \ stessa abitazione); \n•  inizio o fine di un impiego; \n•  cambiamenti delle prestazioni di un datore di lavoro, di\
    \ un’assicura -\nzione sociale, di una cassa pensioni ecc.;\n•  eredità o donazioni; \n•  cessioni di beni; \n•  vendite\
    \ di beni immobili;\n•  inizio di prestazioni regolari da parte di una cassa malati. \nChi non comunica tali cambiamenti\
    \ o fornisce dati non corrispondenti al \nvero nella richiesta di prestazioni transitorie deve restituire le prestazioni\
    \ \nriscosse indebitamente.\f10Maggiori informazioni \n16 Dove si possono ottenere maggiori informazioni? \nPer maggiori\
    \ informazioni ci si può rivolgere ai competenti organi esecutivi, \nche di regola sono ubicati presso la cassa di compensazione\
    \ del Cantone di \ndomicilio: www.avs-ai.ch . \nFanno eccezione i Cantoni seguenti:\nCantone Organo competente\nBS Amt\
    \ für Sozialbeiträge Basel-Stadt,  \nGrenzacherstrasse 62, Postfach, 4005 Basel\nGE Service des prestations complémentaires\
    \ (SPC),  \nroute de Chêne 54, case postale 6375, 1211 Genève 6\nVD Centre régional de décision (CRD) de Lausanne,  \n\
    place Chauderon 7, case postale 5032, 1001 Lausanne\nZH Ufficio comunale  \nPer la città di Zurigo:  \nAmt für Zusatzleistungen\
    \ zur AHV/IV der Stadt Zürich,  \nAmtshaus Werdplatz, Strassburgstrasse 9, 8036 Zürich  \nPer la città di Winterthur:\
    \  \nZusatzleistungen zur AHV/IV der Stadt Winterthur,  \nPionierstrasse 5, 8403 Winterthur\f11Esempio di calcolo della\
    \ prestazione transitoria annua\nPersona sola\nSpese  \nFabbisogno vitale  \nPigione lorda  \nPremi cassa malati1 \nTotale\
    \ \nCHF \nCHF \nCHF \nCHF \n20 670.–  \n11 760.–  \n5 544.–  \n37 974.–\nRedditi  \nReddito da attività lucrativa  \n\
    Proventi della sostanza  \nComputo della sostanza (1/15)  \nTotale \nCHF \nCHF \nCHF \nCHF \n12 000.–  \n105.–  \n1 000.–\
    \  \n13 105.–\nPrestazione transitoria  \nUscite  \ndedotte le entrate  \nPrestazione transitoria annua  \nPrestazione\
    \ transitoria mensile \nCHF \n- CHF  \nCHF \nCHF \n37 974.–  \n13 105.–  \n24 869.–  \n2 073.–\n1 Importi differenti a\
    \ seconda del Cantone. \f12Chiarimenti e altre  \ninformazioni\nQuesto opuscolo informativo presenta solo una panoramica\
    \ riassun -\ntiva. Per la valutazione dei singoli casi fanno stato esclusivamente le \ndisposizioni legali in vigore.\
    \ Per ulteriori informazioni ci si può rivolgere \nalle casse di compensazione o alle loro agenzie. L’elenco delle casse\
    \ di \ncompensazione è pubblicato all’indirizzo Internet www.avs-ai.ch .\nI termini relativi allo stato civile hanno anche\
    \ il significato seguente: \n•  matrimonio: unione domestica registrata;\n•  divorzio: scioglimento giudiziale dell’unione\
    \ domestica registrata;\n•  decesso del coniuge: decesso del partner registrato.\nPubblicato dal Centro d’informazione\
    \ AVS/AI in collaborazione con \nl’Ufficio federale delle assicurazioni sociali.\nEdizione ottobre 2024. La riproduzione,\
    \ anche solo parziale, è  \nautorizzata soltanto con il consenso scritto del Centro d’informazione \nAVS/AI. \nQuesto\
    \ opuscolo informativo può essere richiesto alle casse di com -\npensazione, alle loro agenzie e agli uffici AI. Numero\
    \ di ordinazione \n5.03/i. È disponibile anche su www.avs-ai.ch.\n5.03-25/01-I"
- source_sentence: Wo kann ich das Anmeldeformular für eine Hörgeräteversorgung einreichen?
  sentences:
  - "1.03 Allgemeines\nBetreuungsgutschriften\nStand am 1. Januar 2021\f2Auf einen Blick\nDie gesetzlichen Bestimmungen sehen\
    \ vor, dass bei der Rentenberechnung \nauch Betreuungsgutschriften angerechnet werden können.\nDiese Gutschriften sind\
    \ Zuschläge zum rentenbildenden Erwerbseinkom -\nmen. Sie sollen Ihnen ermöglichen, eine höhere Rente zu erreichen, wenn\
    \ \nSie pflegebedürftige Verwandte betreuen. Betreuungsgutschriften sind \nkeine direkten Geldleistungen.\nBetreuungsgutschriften\
    \ können Ihnen frühestens ab dem Kalenderjahr \nnach dem 17. Geburtstag bis längstens zum 31. Dezember des Kalender -\n\
    jahres, welches dem Erreichen des Referenzalters vorangeht, angerechnet \nwerden.\nAnspruch auf Betreuungsgutschriften\n\
    1 Wann habe ich Anspruch auf Betreuungsgutschriften?\nWenn Sie pflegebedürftige Verwandte betreuen, die leicht erreichbar\
    \ sind, \nhaben Sie Anspruch auf Betreuungsgutschriften. Als Verwandte gelten: \nEhegattin/Ehegatte, Kinder, Eltern, Geschwister,\
    \ Grosseltern, Urgrossel -\ntern, Enkel, Schwiegereltern, Stiefkinder sowie der oder die Lebenspartner/\nin, der oder\
    \ die mit der versicherten Person seit mindestens fünf Jahren \nununterbrochen im gleichen Haushalt lebt.  \nDie Verwandten\
    \ müssen pflegebedürftig sein. Dies ist dann der Fall, wenn \nsie von der AHV, der IV, der Unfall- oder der Militärversicherung\
    \ eine Hilflo -\nsenentschädigung beziehen. Der Hilflosenentschädigung gleichgestellt ist \ndie Hilflosenentschädigung\
    \ an pflegebedürftige Minderjährige. \nSie haben Anspruch auf Betreuungsgutschriften, wenn Sie und die pflege -\nbedürftige\
    \ Person sich überwiegend, d. h. während mindestens 180 Tagen \nim Jahr, in derselben, leicht erreichbaren Wohnsituation\
    \ befinden. Sie er -\nfüllen diese Voraussetzung, wenn Sie nicht mehr als 30 Kilometer entfernt \nvom Wohnort der pflegebedürftigen\
    \ Person wohnen oder nicht länger als \neine Stunde benötigen, um bei der pflegebedürftigen Person zu sein. Bei \nLebenspartnern\
    \ muss die versicherte Person seit mindestsens fünf Jahren \nununterbrochen im gleichen Haushalt leben.\n2 Kann ich gleichzeitig\
    \ Betreuungs- und Erziehungs-  \ngutschriften beanspruchen?\nNein. Sie können Betreuungs- und Erziehungsgutschriften nicht\
    \ gleich-  \nzeitig beanspruchen. Es ist aber möglich, dass für ein pflegebedürftiges \f3Kind bis zum 16. Geburtstag Erziehungs-\
    \ und anschliessend Betreuungs-  \ngutschriften gewährt werden. \nAnspruch mehrerer berechtigter Personen\n3 Wird die\
    \ Betreuungsgutschrift unter verheirateten  \nPersonen aufgeteilt?\nJa. Bei verheirateten Personen wird die Betreuungsgutschrift\
    \ während \nder Ehejahre aufgeteilt und je zur Hälfte den Ehegatten angerechnet. Die \nAHV nimmt diese Aufteilung aber\
    \ nur vor, wenn beide Ehegatten bei der  \nAHV/IV versichert sind. Betreut etwa die Ehefrau ihre pflegebedürftigen \n\
    Eltern in der Schweiz und arbeitet der Mann als Grenzgänger im Ausland, \nwird die Gutschrift nicht geteilt. In diesem\
    \ Fall steht der Ehefrau die ganze \nBetreuungsgutschrift zu.\n4 Wird die Betreuungsgutschrift bei mehreren  \nBetreuungspersonen\
    \ aufgeteilt?\nJa. Beteiligen sich mehrere Personen an der Betreuung, wird die Betreu -\nungsgutschrift unter ihnen aufgeteilt.\
    \ Kümmern sich beispielsweise ein \nEhepaar sowie die ledige Schwester der Ehefrau gemeinsam um die leicht \nerreichbare,\
    \ pflegebedürftige Mutter der beiden Frauen, erhalten alle drei \nPersonen je einen Drittel der Betreuungsgutschrift.\n\
    Wirkung der Betreuungsgutschrift\n5 Wo wird die Betreuungsgutschrift angerechnet?\nDie Jahre, für die Ihnen eine Betreuungsgutschrift\
    \ angerechnet werden \nkann, werden im Individuellen Konto eingetragen. Der genaue Betrag wird \nerst zum Zeitpunkt der\
    \ Rentenberechnung festgesetzt.\n6 Wie hoch ist die Betreuungsgutschrift?\nDie Betreuungsgutschrift entspricht der dreifachen\
    \ jährlichen Minimalrente \nzum Zeitpunkt des Rentenanspruchs. Die Summe der Betreuungsgutschrif -\nten wird durch die\
    \ Beitragsdauer geteilt und dann zum durchschnittlichen \nErwerbseinkommen dazugezählt.\nPro Kalenderjahr darf höchstens\
    \ eine ganze Gutschrift angerechnet wer -\nden. Die Betreuungsgutschrift ist nur bis zum Erreichen der Maximalrente \n\
    rentenwirksam. \f4Auskünfte und weitere  \nInformationenJährliche Anmeldung\n7 Wo kann ich die Betreuungsgutschrift geltend\
    \ machen?\nSie müssen die Betreuungsgutschrift jährlich bei der kantonalen Aus -\ngleichskasse im jeweiligen Wohnsitzkanton\
    \ geltend machen. Die jährliche \nAnmeldung ist deshalb wichtig, weil es nicht möglich ist, erst bei Erreichen \ndes Referenzalters\
    \ zu prüfen, ob die Voraussetzungen für eine Betreuungs -\ngutschrift erfüllt waren. \nSie können die Formulare für die\
    \ Anmeldung bei den Ausgleichskassen \nund ihren Zweigstellen oder unter www.ahv-iv.ch  beziehen.\nDieses Merkblatt vermittelt\
    \ nur eine Übersicht. Für die Beurteilung \nvon Einzelfällen sind ausschliesslich die gesetzlichen Bestimmungen \nmassgebend.\
    \ Die Ausgleichskassen und ihre Zweigstellen geben gerne \nAuskunft. Ein Verzeichnis aller Ausgleichskassen finden Sie\
    \ unter  \nwww.ahv-iv.ch .\nDie Zivilstandsbezeichnungen haben auch die folgende Bedeutung: \n• Ehe/Heirat: eingetragene\
    \ Partnerschaft\n• Scheidung: gerichtliche Auflösung der Partnerschaft\n• Verwitwung: Tod des eingetragenen Partners /\
    \ der eingetragenen \nPartnerin\nHerausgegeben von der Informationsstelle AHV/IV in Zusammenarbeit \nmit dem Bundesamt\
    \ für Sozialversicherungen.\nNachdruck November 2024. Auch auszugsweiser Abdruck ist nur mit \nschriftlicher Einwilligung\
    \ der Informationsstelle AHV/IV erlaubt. \nDieses Merkblatt kann bei den Ausgleichskassen und deren Zweig-  \nstellen\
    \ sowie den IV-Stellen bezogen werden. Bestellnummer 1.03/d. \nEs ist ebenfalls unter www.ahv-iv.ch  verfügbar.\n1.03-21/01-D"
  - "3.07 Leistungen der AHV\nHörgeräte der AHV\nStand am 1. Januar 2023\f2Auf einen Blick\nWohnen Sie in der Schweiz und\
    \ haben ein ärztlich festgestelltes Hörpro -\nblem, haben Sie Anspruch auf einen Kostenbeitrag der AHV an die An -\nschaffung\
    \ eines Hörgerätes frühestens ab dem Zeitpunkt, an dem Sie eine \nAltersrente oder Ergänzungsleistungen beziehen und spätestens\
    \ bei Errei -\nchen des Referenzalters. Sie können diesen Anspruch höchstens alle fünf \nJahre geltend machen. Voraussetzung\
    \ ist, dass durch das Hörgerät eine \neindeutig bessere Verständigung mit der Umwelt erreicht werden kann. \nDer externe\
    \ Teil von implantierbaren und knochenverankerten Geräten \n(Cochlea Implantate, BAHA, Soundbridge) ist einem Hörgerät\
    \ prinzipiell \ngleichgestellt. Ist ein solches Gerät anstelle eines Hörgerätes medizinisch \nindiziert und notwendig,\
    \ so kann sich die AHV für den externen Teil an \nden Kosten beteiligen. \nSind Sie Bezügerin oder Bezüger einer Altersrente\
    \ und haben bereits Bei -\nträge der Invalidenversicherung an ein Hörgerät erhalten, haben Sie wei -\nterhin Anspruch\
    \ auf die Leistungen der IV (vgl. Merkblatt 4.08 - Hörgeräte \nder IV ). \nIhre Partnerin und Anlaufstelle ist die IV-Stelle.\
    \ Wenden Sie sich mit Ihren \nFragen zu Beiträgen an Hörgeräte an die kantonale Durchführungsstelle \nder Invalidenversicherung.\
    \ Die IV-Stelle hilft Ihnen weiter. Die Adresse Ihrer \nIV-Stelle finden Sie im Internet unter www.ahv-iv.ch . \nBei einer\
    \ erstmaligen Hörgeräteversorgung müssen Sie sich von einem Spe -\nzialarzt untersuchen lassen. Dieser Arzt erfasst das\
    \ Hörproblem und erstellt \nzuhanden der IV-Stelle eine Expertise. Voraussetzung für einen finanziellen \nBeitrag der\
    \ AHV ist, dass Sie auf beiden Ohren zusammengerechnet einen \nHörverlust von mindestens 35 % haben. Auf dieser Grundlage\
    \ entscheidet \ndie IV-Stelle, ob Sie Anspruch auf einen finanziellen Beitrag haben. Erkun -\ndigen Sie sich bei der IV-Stelle,\
    \ zu welchen Spezialärzten Sie gehen können. \nEs muss ein Facharzt für Hals-Nasen-Ohren-Heilkunde (HNO-Facharzt) \nsein,\
    \ der von der IV als Expertenarzt anerkannt ist. Ohne Expertise eines \nanerkannten Facharztes bezahlt die AHV keine Beiträge\
    \ an Hörgeräte. Im \nFalle von Wiederversorgungen im gleichen Umfang ist eine Expertise nicht \nmehr obligatorisch. Sie\
    \ wird aber empfohlen und die Kosten der Expertise \nwerden von der AHV finanziert. \nWenn Sie schon pensioniert sind\
    \ und/oder eine Rente der AHV erhalten, \nbezahlt Ihnen die AHV den finanziellen Beitrag an Ihr Hörgerät. Trotzdem \n\
    ist die IV-Stelle Ihre Anlaufstelle für Fragen zum Thema Hörgeräte. \f3Pauschalbetrag\n1 Welcher Betrag wird mir an ein\
    \ Hörgerät ausgerichtet?\nSie erhalten einen festen Pauschalbetrag, ungeachtet der effek -\ntiven Kosten für die Hörgeräteversorgung.\
    \ Die Pauschale beträgt  \n630 Franken für ein Hörgerät und 1 237.50 Franken für zwei Hörgeräte. \nSie wurde so berechnet,\
    \ dass sie 75 % der Kosten für ein einfaches und \nzweckmässiges Qualitätsprodukt sowie für fachmännische Anpassung und\
    \ \nden Unterhalt deckt. Der Beitrag ist eine fixe Pauschale, unabhängig da -\nvon, ob Ihr Gerät mehr oder weniger kostet.\
    \ Wenn Sie sich also für ein \nkostengünstiges Gerät entscheiden, können Sie die Differenz behalten. \nWenn Sie sich hingegen\
    \ für ein teureres Gerät entscheiden, müssen Sie \nden Mehrbetrag selber aufbringen. \nSie können den Pauschalbetrag nur\
    \ alle fünf Jahre beanspruchen, ausser \nein HNO-Facharzt stellt schon vorher eine wesentliche Veränderung des \nHörvermögens\
    \ fest. \nBei knochenverankerten und implantierten Hörhilfen kann die AHV für den \nexternen Teil (Sprachprozessor, Audioprozessor)\
    \ 75 % der Kosten des je -\nweiligen Modells übernehmen.\nFreie Wahl des Hörgeräteanbieters\n2 Bei welchem Anbieter kann\
    \ ich Hörgeräte bzw. Hörsys -\nteme beziehen?\nSie können die Hörgeräte bzw. die Hörsysteme bei allen qualifizierten An\
    \ -\nbietern beziehen (in der Schweiz finden Sie Hörsystemakustikerinnen und \nHörsystemakustiker für individuell einstellbare\
    \ Hörsysteme sowie Apothe -\nker und Apothekerinnen, Drogisten und Drogistinnen, Optiker und Optike -\nrinnen für voreingestellte\
    \ Hörgeräte).\nFreie Wahl des Hörgerätes\n3 Welche Hörgeräte sind zugelassen?\nSie können das Hörgerät frei auswählen\
    \ und es in der Schweiz oder im \nAusland kaufen, sofern es gemäss der Liste des Bundesamtes für Sozi -\nalversicherungen\
    \ zugelassen ist. Sie können die Liste im Internet unter  \nwww.ahv-iv.ch  oder bei den IV-Stellen beziehen.\f4Antragstellung\n\
    4 Wo reiche ich die Anmeldung für eine Hörgeräte-  \nversorgung ein?\nSie müssen ein Anmeldeformular ausfüllen, um von\
    \ der AHV ein Hörgerät \nzu erhalten. Reichen Sie das Formular 009.001 - Anmeldung: Hilfsmittel \nder AHV  bei der IV-Stelle\
    \ des Wohnsitzkantons ein. Sie erhalten das An-\nmeldeformular bei allen Ausgleichskassen und ihren Zweigstellen, bei\
    \ den \nIV-Stellen oder im Internet unter www.ahv-iv.ch .\nAbklärung und Ausrichtung der Pauschale\n5 Wer prüft den Anspruch\
    \ auf einen Pauschalbetrag?\nDie zuständige kantonale IV-Stelle prüft, gestützt auf die Diagnose des \nHNO-Facharztes,\
    \ ob die Voraussetzungen für den Anspruch auf einen \nPauschalbetrag für eine Hörgeräteversorgung erfüllt sind. Die IV-Stelle\
    \ er -\nlässt anschliessend im sogenannten formlosen Verfahren eine Mitteilung. \nIst eine Verfügung zu erlassen, so ist\
    \ die Ausgleichskasse des Kantons, in \nwelchem die IV-Stelle ihren Sitz hat, dafür zuständig. \n6 Wie erhalte ich den\
    \ Pauschalbetrag?\nReichen Sie das Rechnungsformular, welches Sie von der IV erhalten  \nhaben, ausgefüllt bei dieser\
    \ ein. Legen Sie dem Formular die Kopie der \nRechnung des Hörgeräteverkäufers bei. Diese muss alle Informationen  \n\
    enthalten, die auf der Rückseite des Rechnungsformulars aufgeführt sind. \f5Fachverbände und Organisationen\nWeitere Informationen\
    \ erhalten Sie von den folgenden Fachverbänden und \nOrganisationen:\nwww.akustika.ch  \nSchweizerischer Fachverband der\
    \ Hörgeräteakustik  \nOberneuhofstrasse 3  \n6340 Baar  \nTel. 041 750 90 00\nwww.hörsystemakustik.ch  \nHörsystemakustik\
    \ Schweiz  \nSeilerstrasse 22  \n3001 Bern  \nTel. 031 310 20 31\nwww.pro-audito.ch  / www.neutrale-hörberatung.ch  \n\
    pro audito schweiz  \nFeldeggstrasse 69  \n8008 Zürich  \nTel. 044 363 12 00, Neutrale Hörberatung 0800 400 333\nwww.ecoute.ch\
    \  \nforom écoute  \nAvenue Général-Guisan 117  \n1009 Pully  \nTel. 0800 614 614 \nwww.atidu.ch  \nAssociazione per persone\
    \ con problemi d’udito  \nSalita Mariotti 2  \n6500 Bellinzona  \nTel. 091 857 15 32\nwww.orl-hno.ch  \nSchweizerische\
    \ Gesellschaft für Oto-Rhino-Laryngologie,  \nHals- und Gesichtschirurgie  \nGeschäftsstelle  \nIMK Institut für Medizin\
    \ und Kommunikation AG  \nMünsterberg 1  \n4001 Basel  \nTel. 061 561 53 53\f6Auskünfte und weitere  \nInformationen\n\
    Dieses Merkblatt vermittelt nur eine Übersicht. Für die Beurteilung von \nEinzelfällen sind ausschliesslich die gesetzlichen\
    \ Bestimmungen mass -\ngebend. Die Ausgleichskassen, ihre Zweigstellen und die IV-Stellen ge -\nben gerne Auskunft. Ein\
    \ Verzeichnis aller Ausgleichskassen finden Sie \nunter www.ahv-iv.ch .\nHerausgegeben von der Informationsstelle AHV/IV\
    \ in Zusammenarbeit \nmit dem Bundesamt für Sozialversicherungen.\nNachdruck November 2024. Auch auszugsweiser Abdruck\
    \ ist nur mit \nschriftlicher Einwilligung der Informationsstelle AHV/IV erlaubt. \nDieses Merkblatt kann bei den Ausgleichskassen\
    \ und deren Zweig-  \nstellen sowie den IV-Stellen bezogen werden. Bestellnummer 3.07/d. \nEs ist ebenfalls unter www.ahv-iv.ch\
    \  verfügbar.\n3.07-23/01-D"
