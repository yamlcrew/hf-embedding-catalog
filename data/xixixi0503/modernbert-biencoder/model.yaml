      Questo opuscolo informativo presenta solo una panoramica riassun -\ntiva. Per la valutazione dei singoli casi fanno\
      \ stato esclusivamente le \ndisposizioni legali in vigore. Per ulteriori informazioni ci si può rivolgere \nalle casse\
      \ di compensazione o alle loro agenzie. L’elenco delle casse di \ncompensazione è pubblicato all’indirizzo Internet\
      \ www.avs-ai.ch .\nI termini relativi allo stato civile hanno anche il significato seguente:\n•  matrimonio: unione\
      \ domestica registrata,\n•  divorzio: scioglimento giudiziale dell’unione domestica registrata,\n•  decesso del coniuge:\
      \ decesso del partner registrato.\nPubblicato dal Centro d’informazione AVS/AI in collaborazione con \nl’Ufficio federale\
