- source_sentence: Quali sono i tassi contributivi per l'AVS, l'AI e le IPG?
  sentences:
  - "2.01 Contributi\nContributi salariali \nall’AVS, all’AI e alle IPG\nStato al 1° gennaio 2025\f2In breve\nSono tenute\
    \ a pagare i contributi sul proprio salario all’AVS, all’AI e alle IPG \nle persone che esercitano un’attività lucrativa\
    \ e sono assicurate in Svizzera. \nA determinate condizioni lo sono, inoltre, anche le persone che lavorano \nall’estero\
    \ per conto di datori di lavoro con sede in Svizzera.\nQuesto opuscolo informa i datori di lavoro sui contributi paritetici\
    \ all’AVS, \nall’AI e alle IPG.\nObbligo contributivo\n1 Quando ha inizio l’obbligo contributivo?\nTutte le persone che\
    \ esercitano un’attività lucrativa devono pagare con -\ntributi dal 1° gennaio dell’anno civile successivo a quello in\
    \ cui compiono  \n17 anni. \nEsempio: un’apprendista che compie 17 anni il 15 agosto 2025 è tenuta a \nversare contributi\
    \ a partire dal 1° gennaio 2026.\nAnno di \nnascitaAnno civile\n2025 2026 2027 2028\n2007 assoggettato assoggettato assoggettato\
    \ assoggettato\n2008 esente assoggettato assoggettato assoggettato\n2009 esente esente assoggettato assoggettato\n2010\
    \ esente esente esente assoggettato\nFino al 31 dicembre dell’anno civile in cui compiono 20 anni, i membri della \nfamiglia\
    \ che lavorano nell’azienda versano contributi soltanto sul salario in \ncontanti. Dall’anno successivo in poi pagano\
    \ contributi anche sul salario in \nnatura (p. es. vitto e alloggio).\nGli apprendisti, invece, devono pagare contributi\
    \ sia sul salario in contanti \nche su quello in natura dal 1° gennaio dell’anno civile successivo a quello \nin cui compiono\
    \ 17 anni.\n2 Quando termina l’obbligo contributivo?\nL’obbligo contributivo termina di regola con la cessazione dell’attività\
    \ lu -\ncrativa.\nChi smette di esercitare un’attività lucrativa prima dell’età di riferimento  \ndeve continuare a pagare\
    \ contributi in quanto persona senza attività lucra -\ntiva (cfr. opuscolo informativo 2.03 – Contributi delle persone\
    \ senza attività \nlucrativa all’AVS, all’AI e alle IPG ).\f3Chi continua a lavorare oltre l’età di riferimento rimane\
    \ soggetto all’obbligo \ncontributivo, ma può beneficiare di una franchigia (v. punto 14 segg.).\nL’età di riferimento\
    \ è di 65 anni. Per le donne nate prima del 1964 valgono \nperò le seguenti disposizioni speciali:\nClasse d’età Età di\
    \ riferimento \n1960 64 anni\n1961 64 anni e 3 mesi \n1962 64 anni e 6 mesi \n1963 64 anni e 9 mesi \n1964 65 anni \n\
    I membri della famiglia che collaborano nell’azienda e hanno raggiunto \nl’età di riferimento versano contributi soltanto\
    \ sul salario in contanti, se \ndel caso dopo deduzione della franchigia (cfr. punto 14 segg.). In questo \ncaso non devono\
    \ più pagare contributi sul salario in natura (p. es. vitto e \nalloggio).\n3 A quanto ammontano i tassi contributivi?\n\
    Tassi contributivi\nAVS 8,7 %\nAI 1,4 %\nIPG 0,5 %\nTotale 10,6 %\nI datori di lavoro deducono il 5,3 % del salario dei\
    \ dipendenti per la loro \nquota di contributi e versano l’importo alla cassa di compensazione unita -\nmente alla propria\
    \ quota (anch’essa del 5,3 %). Al totale, pari al 10,6 %, \nva aggiunto il contributo all’assicurazione contro la disoccupazione\
    \ (cfr. \nopuscolo informativo 2.08 – Contributi all’assicurazione contro la disoccu -\npazione ).\nLe casse di compensazione\
    \ riscuotono inoltre un contributo per le spese di \namministrazione, che va a carico dei datori di lavoro.\nI salariati\
    \ i cui datori di lavoro non sono soggetti all’obbligo contributivo \n(p. es. ambasciate) devono di regola pagare i loro\
    \ contributi da soli in base \nal tasso usuale per i datori di lavoro e i salariati.\f4Riscossione dei contributi dei\
    \ datori di lavoro\n4 Come vengono fissati i contributi nella procedura  \nordinaria?\nLe casse di compensazione fissano\
    \ contributi provvisori basati sulla somma \nstimata dei salari, i cosiddetti contributi d’acconto. Affinché questi siano\
    \ \ndeterminati correttamente, è importante che i datori di lavoro mettano a \ndisposizione della cassa di compensazione\
    \ tutti i documenti necessari. In \ncaso di variazione rilevante della somma dei salari, essi sono tenuti a infor -\n\
    marne la cassa di compensazione.\nI contributi definitivi sono fissati sulla base della dichiarazione dei salari del \n\
    datore di lavoro. Questa dichiarazione deve essere inoltrata alla cassa di \ncompensazione al più tardi entro il 30 gennaio\
    \ seguente la fine del periodo \ncontributivo annuale. I datori di lavoro che non rispettano questo termine \ndovranno\
    \ pagare interessi di mora su un’eventuale differenza. Molte casse di \ncompensazione possono anche ricevere la dichiarazione\
    \ per via elettronica \n(p. es. procedura unitaria per la notifica dei salari ELM, www.swissdec.ch ).\nLa cassa di compensazione\
    \ calcola la differenza tra i contributi d’acconto \npagati e i contributi definitivi:\n• se gli acconti versati sono\
    \ superiori ai contributi definitivi, la cassa di \ncompensazione rimborsa la differenza al datore di lavoro;\n• se gli\
    \ acconti versati sono inferiori ai contributi definitivi, la cassa di \ncompensazione fattura la differenza al datore\
    \ di lavoro.\nA certe condizioni, la cassa di compensazione può permettere ai datori di \nlavoro di pagare i contributi\
    \ effettivamente dovuti e non quelli provvisori, a \ncondizione che sia garantito il pagamento puntuale dei contributi.\n\
    5 Quando devono essere pagati i contributi da parte dei \ndatori di lavoro?\nI contributi devono essere pagati trimestralmente\
    \ quando la somma annua \ndei salari non supera i 200 000 franchi e mensilmente quando è superiore \na questo importo.\
    \ L’ultimo termine di pagamento è sempre il 10° giorno \nseguente la fine del trimestre, rispettivamente la fine del mese.\
    \ \nEsempio: i contributi del 1° trimestre devono essere pagati al più tardi entro \nil 10 aprile. \f5Se i contributi\
    \ d’acconto pagati sono inferiori ai contributi definitivi, i datori \ndi lavoro ricevono una fattura pagabile entro 30 giorni.\
    \ Il termine non è \ndi un mese, bensì di 30 giorni e non può essere prolungato, a meno che \nl’ultimo giorno non sia\
    \ un sabato, una domenica o un giorno festivo. In \nquesto caso è prolungato fino al seguente giorno lavorativo. Il termine\
    \ \ndi 30 giorni non decorre dalla data di ricezione, ma dal giorno seguente \nla data di emissione della fattura da parte\
    \ della cassa di compensazione. \nSulla fattura è sempre indicata la data entro la quale l’importo deve essere \naccreditato\
    \  sul conto della cassa di compensazione.\nImportante: una fattura è considerata pagata quando l’importo è accredi -\n\
    tato sul conto della cassa di compensazione e non quando è stato impar -\ntito l’ordine di pagamento. Sui contributi che\
    \ non sono stati versati entro il \ntermine prescritto viene calcolato un interesse di mora annuo del 5 %, che \nva a\
    \ carico dei datori di lavoro.\n6 Come vengono fissati i contributi nella procedura  \nsemplificata?\nLa procedura di\
    \ conteggio semplificata rientra nel quadro della legge fe -\nderale contro il lavoro in nero (LLN) e permette ai datori\
    \ di lavoro di con -\nteggiare i contributi sociali (AVS/AI/IPG/AD/assegni familiari), l’imposta alla \nfonte e l’assicurazione\
    \ contro gli infortuni secondo un procedimento snel -\nlito. La procedura è facoltativa e pensata in primo luogo per i\
    \ rapporti di \nlavoro di breve durata o di poca entità, come per esempio quelli esistenti di \nregola nelle economie\
    \ domestiche private.\nVanno adempiute le seguenti condizioni:\n• il salario per dipendente non supera i 22 680 franchi\
    \ l’anno (nel 2025);\n• la massa salariale dell’azienda non supera i 60 480 franchi l’anno (cioè \nil doppio della rendita\
    \ massima AVS annua nel 2025);\n• la procedura di conteggio semplificata è utilizzata per i salari di tutto il \npersonale\
    \ soggetto all’obbligo contributivo.\nQuesta procedura non è però applicabile:\n• alle società di capitali (SA, Sagl ecc.)\
    \ e alle società cooperative;\n• al coniuge e ai figli del datore di lavoro occupati nell’azienda.\nLa richiesta va presentata\
    \ alla cassa di compensazione, che sarà an -\nche la principale interlocutrice per tutte le questioni concernenti la pro\
    \ -\ncedura semplificata. Il conteggio dei contributi sociali e dell’imposta \nalla fonte è effettuato solo una volta\
    \ all’anno (cfr. opuscolo informativo  \n2.07 – Procedure di conteggio semplificate per i datori di lavoro ).\f6Interessi\n\
    7 Quando viene richiesto il pagamento di interessi di \nmora ai datori di lavoro?\nUn interesse di mora viene riscosso\
    \ in caso di conteggio o pagamento tar -\ndivo dei contributi, a prescindere dal fatto che si tratti di una colpa o di\
    \ \nun’intimazione.\nConcerneConteggio  \npagamentoGli interessi  \ndecorrono dal\nContributi d’acconto o \ncontributi\
    \ effettivi30° giorno dopo la \nfine del mese risp. del \ntrimestre1° giorno seguente la \nfine del mese risp. del \n\
    trimestre\nConteggio30 gennaio seguente \nla fine dell’anno contri -\nbutivo1° gennaio seguente la \nfine dell’anno contri\
    \ -\nbutivo\nDifferenza tra i con -\ntributi d’acconto e i \ncontributi definitivi30° giorno dopo la \nfatturazione1° giorno\
    \ dopo la  \nfatturazione\nContributi arretrati \ndegli anni precedenti1° gennaio seguente la \nfine dell’anno contribu\
    \ -\ntivo in questione\n8 Quando sono versati interessi compensativi ai datori di \nlavoro?\nGeneralmente gli interessi\
    \ compensativi sono versati unicamente per con -\ntributi pagati ma non dovuti che devono essere rimborsati o compensati\
    \ \ndalla cassa di compensazione. Gli interessi decorrono dal 1° gennaio se -\nguente la fine dell’anno civile in cui\
    \ sono stati pagati i contributi non dovuti \nsino alla data del rimborso completo.\nLa cassa di compensazione competente\
    \ versa interessi compensativi anche \nquando i contributi d’acconto pagati sono superiori ai contributi definitivi e\
    \ \nla differenza non è stata rimborsata entro il termine di 30 giorni dalla data \ndi ricezione del conteggio. Gli interessi\
    \ decorrono dal momento in cui il \nconteggio completo è pervenuto alla cassa.\f79 Come avviene il calcolo degli interessi?\n\
    Gli interessi sono calcolati al giorno (un mese corrisponde a 30 giorni, un \nanno a 360 giorni). Il tasso unico d’interesse\
    \ è del 5 %.\nEsempio: \nLa dichiarazione dei salari  per l’anno 2024 è pervenuta alla cassa di com -\npensazione entro\
    \ il termine stabilito, vale a dire entro il 30 gennaio 2025. \nTuttavia, il pagamento della differenza tra i contributi\
    \ d’acconto e i contributi \ndefinitivi avverrà più tardi, ossia il 2 aprile 2025 anziché il 26 marzo 2025 \ncome previsto\
    \ (30 giorni dopo la fatturazione).\n• Contributi d’acconto pagati: 40 000 franchi\n• Contributi definitivi: 100 000 franchi\n\
    • Differenza tra i contributi d’acconto e i contributi definitivi:  \n60 000 franchi\n• Data di fatturazione da parte\
    \ della cassa di compensazione:  \n24 febbraio 2025\n• Data di ricezione della fattura da parte del datore di lavoro:\
    \  \n26 febbraio 2025\n• Data di ricezione del pagamento alla cassa di compensazione:  \n2 aprile 2025\n• Periodo di calcolo\
    \ degli interessi di mora dal 25 febbraio 2025 al  \n2 aprile 2025 (6 + 30 + 2 = 38 giorni):  \n60 000 franchi × (38 giorni\
    \ / 360 giorni) × 5 % = 316.70 franchi\nSalario determinante\n10 Quale tipo di retribuzioni comprende il salario  \ndeterminante?\n\
    Il salario sul quale devono essere versati i contributi è chiamato salario de -\nterminante e comprende tutte le retribuzioni,\
    \ versate in Svizzera o all’estero, \nche i salariati ricevono per il lavoro svolto, in modo particolare:\na)i salari\
    \ orari, giornalieri, settimanali, mensili ecc. come pure i salari a \nfattura (a cottimo) e a premi, compresi i premi\
    \ e le indennità per le \nore di lavoro supplementari, per il lavoro notturno e per le supplenze;\nb)le indennità di residenza\
    \ e di rincaro;\nc)le gratifiche, i regali per anzianità di servizio, i premi di fedeltà, di \nrischio e di produzione\
    \ e indennità analoghe;\nd)i vantaggi valutabili in denaro derivanti dalle partecipazioni di colla -\nboratore; per la\
    \ determinazione del momento della riscossione dei \ncontributi e per la valutazione si applicano le disposizioni sull’imposta\
    \ \nfederale diretta;\f8e)i benefici, fino a un importo corrispondente a un salario usuale del \nramo, dei dipendenti\
    \ contemporaneamente titolari di diritti di parteci -\npazione che, per il lavoro svolto, non percepiscono alcun salario\
    \ o ne \npercepiscono uno sproporzionatamente basso e che, nel contempo, \nricevono un dividendo manifestamente eccessivo;\n\
    f)i redditi di accomandanti derivanti da un rapporto di lavoro con la \nsocietà in accomandita;\ng)le mance e le tasse\
    \ di servizio qualora costituiscano un elemento im -\nportante del salario;\nh)le prestazioni in natura regolari come\
    \ vitto e alloggio (cfr. punto 12), \nl’utilizzazione a fini privati di veicoli e alloggi di servizio ecc.;\ni)le provvigioni\
    \ e le commissioni;\nj)le percentuali (tantièmes), le indennità fisse e i gettoni di presenza \nassegnati a membri dell’amministrazione\
    \ e agli organi dirigenti;\nk)il reddito dei membri delle autorità federali, cantonali e comunali;\nl)le sportule e le\
    \ indennità fisse ricevute da assicurati la cui attività è \ndisciplinata dal diritto pubblico;\nm)gli onorari di liberi\
    \ docenti e di altri insegnanti retribuiti in modo ana -\nlogo;\nn)la copertura salariale in caso di infortunio o malattia\
    \ (ad eccezione \ndelle prestazioni assicurative);\no)la copertura salariale e le indennità di perdita di guadagno per\
    \ chi \npresta servizio e in caso di maternità e paternità;\np)i contributi dovuti dal salariato all’AVS, AI, IPG o AD\
    \ pagati dai datori \ndi lavoro come pure le imposte pagate dai datori di lavoro; è eccet -\ntuata l’assunzione dei contributi\
    \ dovuti dal salariato su prestazioni in \nnatura e salari globali;\nq)le indennità di vacanza o per i giorni festivi;\n\
    r)le prestazioni del datore di lavoro al termine del rapporto di lavoro \na condizione che non vengano escluse dal salario\
    \ determinante  \n(cfr. opuscolo informativo 2.05 – Retribuzioni versate al termine del \nrapporto di lavoro );\ns)le\
    \ indennità giornaliere dell’AD e le indennità per insolvenza;\nt)la perdita di salario durante il lavoro ridotto o la\
    \ sospensione del la -\nvoro a causa di intemperie ai sensi dell’AD (cfr. opuscolo informativo \n2.11 – Obbligo contributivo\
    \ sulle indennità per lavoro ridotto o per \nintemperie );\nu)le indennità giornaliere dell’AI;\nv)le indennità giornaliere\
    \ dell’assicurazione militare;\nw)le indennità del datore di lavoro per il normale viaggio del salariato \ndal luogo di\
    \ domicilio al posto di lavoro e le spese usuali per i pasti \ndei salariati.\f911 Quali retribuzioni non fanno parte\
    \ del salario  \ndeterminante?\na)il soldo militare, le indennità di funzione nella protezione civile e le \nindennità\
    \ analoghe al soldo nei corpi pubblici dei vigili del fuoco fino \na un massimo di 5 300 franchi (la parte di salario\
    \ eccedente questo \nimporto è soggetta a contribuzione) e le indennità per i corsi per mo -\nnitori di giovani tiratori;\n\
    b)le prestazioni assicurative in caso d’infortunio, malattia o invalidità;\nc)le prestazioni dell’aiuto sociale e da organizzazioni\
    \ d’assistenza  \n(Pro Juventute, organizzazioni religiose, Pro Infirmis ecc.);\nd)le prestazioni regolamentari di istituti\
    \ di previdenza professionale se \nil beneficiario al momento del caso previdenziale o dello scioglimento \ndell’istituto\
    \ di previdenza può richiedere personalmente le prestazioni;\ne)gli assegni familiari (assegni per figli, formazione professionale,\
    \ eco -\nnomia domestica, matrimonio e nascita) conformi all’uso locale o pro -\nfessionale;\nf)i contributi regolamentari\
    \ del datore di lavoro a istituti di previdenza \nesenti da tasse;\ng)i contributi versati direttamente dal datore di\
    \ lavoro all’assicurazione \nmalattie e infortuni per i suoi salariati, purché versi i premi diretta -\nmente all’assicurazione\
    \ e tutti i salariati siano trattati alla stessa ma -\nniera;\nh)i contributi del datore di lavoro alle casse di compensazione\
    \ per asse -\ngni familiari, purché tutti i salariati siano trattati in modo uguale;\ni)lo stanziamento di aiuti in caso\
    \ di decesso di parenti del salariato o ai \nsuoi superstiti;\nj)le indennità di trasloco in caso di cambiamento di domicilio\
    \ per motivi \nprofessionali;\nk)i regali di fidanzamento e di nozze;\nl)i premi di riconoscimento per il superamento\
    \ di esami professionali, \nfino un massimo di 500 franchi;\nm)i regali del datore di lavoro in occasione di giubilei\
    \ aziendali, al più \npresto 25 anni dopo la fondazione e in seguito ad intervalli di almeno \n25 anni;\nn)le prestazioni\
    \ del datore di lavoro alle spese mediche, farmaceutiche, \nospedaliere o di cura, purché queste spese non siano già coperte\
    \ \ndall’assicurazione malattie obbligatoria e tutti i salariati siano trattati \nin modo uguale;\no)i doni in natura\
    \ il cui valore non eccede 500 franchi all’anno;\f10p)le prestazioni per la formazione e il perfezionamento. Se versate\
    \ dal \ndatore di lavoro, sono tuttavia escluse dal reddito da un’attività lucra -\ntiva soltanto se la formazione o il\
    \ perfezionamento sono strettamente \nlegati all’attività professionale del beneficiario;\nq)Le prestazioni di assistenza\
    \ straordinarie versate dal datore di lavoro \nper attenuare una situazione di grave difficoltà finanziaria del sala -\n\
    riato, quando la copertura del fabbisogno vitale non è garantita.\n12 Il reddito in natura è parte del salario determinante?\n\
    Il reddito in natura è una compente del salario che non viene versata in \ndenaro. Comprende ad esempio il vitto e l’alloggio\
    \ concessi ai salariati o \nai membri della famiglia che collaborano nell’azienda. Anche il reddito in \nnatura è considerato\
    \ parte del salario determinante e va valutato di con -\nseguenza:\nReddito in natura al giorno     al mese\nColazione\
    \ CHF    3.50 CHF 105.–\nPranzo CHF 10.00 CHF 300.–\nCena CHF  8.00 CHF 240.–\nAlloggio CHF   11.50 CHF 345.–\nVitto e\
    \ alloggio CHF 33.00 CHF 990.–\nSe vitto e alloggio gratuiti sono concessi non solo al salariato, ma anche ai \nsuoi familiari,\
    \ si prendono in considerazione i seguenti supplementi:\n• per ogni familiare adulto lo stesso importo del salariato;\n\
    • per ogni familiare minorenne la metà dell’importo del salariato.\nIl reddito in natura di altra specie è valutato e\
    \ determinato dalla cassa di \ncompensazione per ogni singolo caso. L’esatta valutazione si basa sulle \ncircostanze specifiche\
    \ e avviene su base individuale.\n13 Quali salari minimi vengono applicati per i membri della \nfamiglia occupati nell’azienda\
    \ agricola?\nPer i membri della famiglia del titolare dell’azienda agricola che collaborano \ncon lui vengono applicate\
    \ le seguenti retribuzioni globali mensili (in denaro \no in natura):\n• 2 070 franchi per i familiari non coniugati;\n\
    • 3 060 franchi per i familiari coniugati (se entrambi i coniugi lavorano \na tempo pieno in azienda, si applica l’importo\
    \ di 2 070  franchi per \nognuno di essi). Questo punto non concerne il coniuge del gestore \nstesso;\n• 690 franchi per\
    \ il mantenimento di ogni figlio minorenne.\f11Obbligo contributivo degli aventi diritto a una rendita \ndi vecchiaia\
    \ dell’AVS\n14 Gli aventi diritto a una rendita di vecchiaia dell’AVS \nsono soggetti all’obbligo contributivo?\nLe persone\
    \ che pur avendo raggiunto l’età di riferimento esercitano ancora \nun’attività lucrativa continuano a versare i contributi\
    \ all’AVS/AI/IPG, ma non \nall’assicurazione contro la disoccupazione (AD). Esse beneficiano però di \nuna franchigia.\n\
    Rinuncia facoltativa alla franchigia : i salariati hanno la possibilità di \nrinunciare all’applicazione della franchigia,\
    \ affinché i contributi vengano \nconteggiati sull’intero salario. Questo può eventualmente permettere di \naumentare\
    \ la propria rendita grazie alla compensazione di lacune contribu -\ntive e assicurative o all’aumento del reddito annuo\
    \ medio determinante. Si \nveda al riguardo gli opuscoli informativo 3.08 – Nuovo calcolo della rendita \ndi vecchiaia\
    \ dopo l’età di riferimento  e Stabilizzazione dell’AVS (AVS 21) \nChe cosa cambia? .\nFranchigia in caso di svolgimento\
    \ di più attività:\nGli aventi diritto a una rendita di vecchiaia dell’AVS che esercitano con -\ntemporaneamente un’attività\
    \ lucrativa indipendente e una salariata hanno \ndiritto all’applicazione della franchigia per ciascuna di queste attività.\n\
    15 A quanto ammonta la franchigia?\nAlle persone che hanno raggiunto l’età di riferimento e continuano a esercitare \n\
    un’attività lucrativa viene applicata una franchigia di 16 800 franchi all’anno, \nsulla quale non devono versare contributi.\
    \ Questi ultimi vengono quindi perce -\npiti soltanto sulla parte del reddito che eccede 16 800 franchi all’anno. \nSe\
    \ la persona in questione lavora contemporaneamente presso diversi da -\ntori di lavoro, la franchigia è applicata separatamente\
    \ a ogni rapporto di \nlavoro. Allo stesso modo, i salariati possono decidere se applicare o meno \nla franchigia separatamente\
    \ per ogni rapporto di lavoro. Nell'anno in cui si \nraggiunge l'età di riferimento è deducibile soltanto la franchigia\
    \ calcolata \nproporzionalmente sulla parte di salario percepita a partire dal mese in cui \nsi raggiunge l'età di riferimento.\f\
    1216 I salariati come possono rinunciare all’applicazione  \ndella franchigia? \nI salariati che non applicano la franchigia\
    \ e desiderano versare i contributi \nAVS/AI/IPG sull’intero salario devono comunicarlo per tempo al loro datore \ndi\
    \ lavoro, vale a dire al più tardi:\n• al pagamento del primo salario dopo il raggiungimento dell’età di rife -\nrimento,\
    \ oppure\n• per gli anni seguenti, fino al pagamento del primo salario di ciascuno \ndegli anni civili successivi. \n\
    Se il lavoratore accetta il salario versatogli, che è già stato ridotto dell’im -\nporto della franchigia, acconsente\
    \ all’applicazione di quest’ultima.. \nLa decisione vale per il singolo datore di lavoro e per l’intero anno civile. Si\
    \ \nrinnova automaticamente l’anno civile successivo, se il salariato non comu -\nnica al datore di lavoro una decisione\
    \ in altro senso. \n17 Come è calcolata la franchigia se l’attività dura meno  \ndi un anno?\nIl datore di lavoro deduce\
    \ dal salario annuo la franchigia di 16 800 franchi. \nQualora la retribuzione non si riferisca o l’attività lucrativa\
    \ non si estenda \nall’anno intero, la franchigia viene calcolata proporzionalmente alla fra -\nzione annua corrispondente,\
    \ ossia 1 400 franchi per ogni mese civile intero \no iniziato.\nEsempio: \nse il beneficiario di una rendita di vecchiaia\
    \ lavora dal 30 marzo al 6 giugno, \nsi calcolano sia marzo che giugno come mesi interi, ossia complessivamente \n4 mesi.\
    \ La franchigia è dunque di 4 × 1 400 franchi, ossia 5 600 franchi.\f1318  Esempi di calcolo\nEsempio 1 – Attività esercitata\
    \ durante tutto l’anno\nUn indipendente continua a gestire la propria azienda dopo aver compiuto \ni 65 anni. È inoltre\
    \ membro del consiglio d’amministrazione di una società \nanonima. Dall’onorario versatogli per la funzione di membro\
    \ del consiglio \nd’amministrazione il datore di lavoro deduce la franchigia, senza che il la -\nvoratore reagisca. Ne\
    \ risulta pertanto il seguente conteggio:\nUtile netto annuo \ndell’aziendaReddito come mem -\nbro del consiglio di \n\
    amministrazione\n CHF 30 500.–  CHF   18 000.–\nFranchigia - CHF 16 800.– - CHF 16 800.–\nSalario soggetto a  \ncontribuzione\
    \  CHF 13 700.–   CHF   1 200.–\nEsempio 2 – Attività svolta per meno di un anno \nUna salariata di 66 anni lavora dal\
    \ 1° marzo al 6 aprile presso la ditta C \ne poi dal 23 al 30 aprile presso la ditta D, accettando la deduzione delle\
    \ \nfranchigie. Ne risultano i seguenti conteggi salariali:\nDitta C Ditta D\nDal 1° marzo al 6 aprile Dal 23 al 30 aprile\n\
    Salario mensile per marzo   CHF 8 000.–   CHF\nSalario mensile per aprile   CHF 1 200.–   CHF  2 100.–\nTotale  CHF  9\
    \ 200.–  CHF  2 100.–\nFranchigia - CHF 2 800.– - CHF 1 400.–\nImporto soggetto a  \ncontribuzione   CHF 6 400.–   CHF\
    \   700.–\f14Esempio  3 – Attività esercitata durante tutto l’anno e rinuncia \nall’applicazione della franchigia\n• Un\
    \ avente diritto a una rendita di vecchiaia dell’AVS lavora dal 1° gen -\nnaio 2025 per le ditte A e B. I datori di lavoro\
    \ applicano la franchigia \nai salari versati.\n• Nel mese di marzo il salariato comunica alla ditta A di voler rinunciare\
    \ \nall’applicazione della franchigia. La comunicazione è tardiva e quindi \nla ditta A non può tenerne conto per l’anno 2025.\n\
    • Assicura però al lavoratore che a partire dal 1° gennaio 2026 la fran -\nchigia non verrà più dedotta. Ne risultano\
    \ i seguenti conteggi salariali:\nAnno 2025 Ditta A Ditta B \nSalario annuo  CHF 19 200.–  CHF   18 000.–\nFranchise -\
    \ CHF 16 800.– - CHF 16 800.–\nImporto soggetto a contribuzione   CHF 2 400.–   CHF 1 200.–\nAnno 2026 Ditta A Ditta B\
    \ \nSalario annuo  CHF  21 300.–  CHF  18 200.–\nFranchise - CHF 0.– - CHF 16 800.–\nImporto soggetto a contribuzione\
    \   CHF  21 300.–   CHF   1 400.–\nContributi sul salario di poco conto\n19 I salari di poco conto sono soggetti a contribuzione?\n\
    Se il salario determinante non supera i 2 500 franchi per anno civile e per \nrapporto di lavoro, i contributi sono percepiti\
    \ soltanto a richiesta dell’assi -\ncurato.\nPer le persone occupate nelle economie domestiche private i contributi \n\
    vanno versati in ogni caso, a prescindere dall’ammontare del reddito (cfr. \nopuscolo informativo 2.06 – Lavoro domestico\
    \ ). Sono tuttavia eccettuati \ni giovani fino al 31  dicembre dell’anno successivo al compimento del \n25° anno d’età,\
    \ il cui salario non supera i 750 franchi per anno civile e \nper datore di lavoro. Questi assicurati possono esigere\
    \ il pagamento dei \ncontributi.\nLe persone impiegate da produttori di danza e di teatro, dalle orchestre, \nda produttori\
    \ nell’ambito fonografico e audiovisivo, dalle radio, dalle tele -\nvisioni e dalle scuole del settore artistico devono\
    \ versare i contributi in ogni \ncaso, a prescindere dall’ammontare del reddito.\f15Contributi su pagamenti posticipati\
    \ del salario\n20 Cosa si intende per pagamento posticipato del salario?\nPer pagamento posticipato del salario si intende\
    \ il versamento effettuato \nnon immediatamente alla fine un determinato periodo di paga. Ciò avviene \nad esempio nel\
    \ caso di quote di utile, provvigioni, gratifiche, retribuzioni di \nconsigli d’amministrazione e tantièmes.\n21 Come\
    \ viene accertato l’obbligo di contribuzione sui  \npagamenti posticipati?\nPer accertare l’obbligo di contribuzione sui\
    \ pagamenti posticipati è deter -\nminante il momento in cui è stato prestato il lavoro e non quello in cui \nviene versato\
    \ il salario. \nI contributi sono quindi dovuti sui pagamenti posticipati soltanto se il sa -\nlariato, nel momento in\
    \ cui ha prestato il lavoro, era assicurato e soggetto \nall’obbligo di contribuzione.\nEsempio: \nun giovane inizia un\
    \ apprendistato il 1° maggio 2024 e compie 17 anni il \n1° ottobre 2024. Dal 1° gennaio 2025 è soggetto all’obbligo di\
    \ contribu -\nzione AVS. Nel mese di maggio 2025 riceve una gratifica per l’intero primo \nanno d’apprendistato (da maggio\
    \ 2024 ad aprile 2025). Poiché è tenuto \na versare contributi soltanto dal 1° gennaio 2025, solo 1/3 della gratifica\
    \ \n(mesi da gennaio a aprile 2025) è soggetto a contribuzione.\n22 Qual è il momento determinante per il calcolo dei\
    \  \ncontributi?\nPer calcolare i contributi sui pagamenti salariali posticipati è determinante il \nmomento in cui viene\
    \ versato il salario e non quello in cui è stato prestato il \nlavoro. Ciò significa che il calcolo dei contributi viene\
    \ effettuato secondo i \ntassi, le franchigie e i limiti massimi vigenti al momento del versamento del \nsalario. È fatto\
    \ salvo il punto 23.\nEsempio: \nse una gratifica viene versata nel 2025, si applicano i tassi contributivi e le \nfranchigie\
    \ stabiliti per il 2025, anche se il lavoro è stato svolto nel 2024.\f1623 In quali casi il datore di lavoro deve indicare\
    \  \nseparatamente i pagamenti posticipati?\nIl datore di lavoro deve indicare separatamente nell’attestazione salariale\
    \ i \npagamenti posticipati se:\n• il pagamento è stato effettuato a favore di una persona assicurata che \nnell’anno\
    \ del versamento non è più alle sue dipendenze;\n• le disposizioni sull’obbligo contributivo sono state modificate tra\
    \ il mo -\nmento in cui è stato prestato il lavoro e quello in cui viene versato il \nsalario.\nIn questi casi il datore\
    \ di lavoro deve indicare con esattezza, nella colonna \n«durata di contribuzione», a quali mesi il pagamento posticipato\
    \ si riferisce, \ndistinguendo gli anni civili. Solo così la cassa di compensazione è in grado \ndi registrare correttamente\
    \ il reddito della persona assicurata nel suo conto \nindividuale, evitando in tal modo qualsiasi pregiudizio nel calcolo\
    \ della ren -\ndita. Il datore di lavoro non deve indicare separatamente nel certificato di \nsalario i pagamenti posticipati\
    \ non menzionati in questo numero, ma può \nindicarli insieme ai salari versati per l’anno civile in corso.\nRegolamentazione\
    \ speciale su richiesta scritta del salariato: se il richiedente \npuò dimostrare che il reddito registrato nell’anno\
    \ del versamento proviene \nda un’attività lucrativa esercitata in un anno anteriore per il quale i contri -\nbuti versati\
    \ non hanno raggiunto l’importo minimo, la cassa di compen -\nsazione resgistra il reddito nell’anno in cui è stata svolta\
    \ la relativa attività \nlucrativa. La richiesta può essere presentata fino all’insorgenza dell’evento \nassicurato.\n\
    In questi casi i contributi vengono calcolati secondo i tassi, le franchigie \ne i limiti massimi validi al momento in\
    \ cui è stata fornita la prestazione \nlavorativa.\f17Contributi sulle indennità di perdita di guadagno \n(IPG) e sulle\
    \ indennità giornaliere dell’AI, dell’AD  \ne dell’assicurazione militare\n24 I datori di lavoro devono pagare contributi\
    \ sulle  \nindennità di perdita di guadagno e sulle indennità  \ngiornaliere?\nSì. Anche le indennità di perdita di guadagno\
    \ per chi presta servizio e \nin caso di maternità, di congedo per l’altro genitore,"
  - "4.03 Prestations de l’AI\nMoyens auxiliaires de l’AI\nEtat au 1er janvier 2024\f2En bref\nLes personnes assurées auprès\
    \ de l’AI ont droit aux moyens auxiliaires – \nfigurant sur une liste établie par le Conseil fédéral – qui leur sont néces\
    \ -\nsaires pour continuer d’exercer une activité lucrative ou d’accomplir leurs \ntâches habituelles (par ex. en tant\
    \ que femme ou homme au foyer), pour \nfréquenter une école, apprendre un métier ou à des fins d’accoutumance \nfonctionnelle.\n\
    Elles ont aussi droit aux moyens auxiliaires nécessaires au quotidien pour \nêtre aussi indépendantes et autonomes que\
    \ possible dans leur vie privée, \nque ce soit pour se déplacer, établir des contacts avec l’entourage ou déve -\nlopper\
    \ leur autonomie personnelle.\nLe présent mémento informe les assurés sur les types de moyens auxiliaires, \nle droit\
    \ à ces moyens, les modalités de demande et la remise de moyens \nauxiliaires par l’AI.\f3Types de moyens auxiliaires\n\
    1 Quels moyens auxiliaires existent pour le domaine  \nprofessionnel ?\nDes moyens auxiliaires simples, adéquats et économiques,\
    \ conçus pour fa -\nciliter l’exercice d’une activité lucrative ou l’accomplissement des travaux \nhabituels, la fréquentation\
    \ d’une école, l’apprentissage d’un métier, ou à \ndes fins d’accoutumance fonctionnelle :\n• supports plantaires (après\
    \ une opération du pied, si vous avez droit à la \nprise en charge de celle-ci par l’AI)\n• lunettes et verres de contact\
    \ (après une opération des yeux, si vous \navez droit à la prise en charge de celle-ci par l’AI)\n• prothèses dentaires\
    \ (si elles constituent un complément important de \nmesures médicales de réadaptation)\n• contributions d’amortissement\
    \ pour automobiles\n• appareils d’écoute pour supports sonores\n• instruments de travail et appareils ménagers conçus\
    \ en fonction de \nl’invalidité ainsi appareillages permettant la station assise, debout ou \ncouchée et surfaces de travail\
    \ adaptés à l’infirmité \n• modifications architecturales effectuées sur le lieu de travail et à votre \ndomicile pour\
    \ vous permettre de tenir votre ménage de façon indé -\npendante\nLes contributions d’amortissement pour automobiles ne\
    \ peuvent vous être \nversées que si vous couvrez vos besoins vitaux au sens de l’AI par votre \nactivité lucrative, c’est-à-dire\
    \ que votre revenu brut atteint au moins la \nmoyenne entre le minimum et le maximum de la rente ordinaire simple.\n2\
    \ Quels moyens auxiliaires existent pour la vie quotidienne ?\nDes moyens auxiliaires simples, adéquats et économiques\
    \ conçus pour fa -\nciliter la vie quotidienne, que ce soit pour se déplacer, établir des contacts \navec l’entourage,\
    \ développer l’autonomie personnelle, mais aussi pour fa -\nciliter l’exercice d’une activité lucrative ou l’accomplissement\
    \ des travaux \nhabituels, la fréquentation d’une école, l’apprentissage d’un métier, ou à \ndes fins d’accoutumance fonctionnelle\
    \ :\n• prothèses (pour les pieds, les jambes, les mains ou les bras, et exopro -\nthèses du sein)\n• orthèses (pour les\
    \ jambes, les bras, le tronc et les cervicales)\f4• chaussures orthopédiques sur mesure, chaussures orthopédiques de \n\
    série, chaussures orthopédiques spéciales ainsi que retouches ortho -\npédiques et éléments orthopédiques incorporés aux\
    \ chaussures de \nconfection ou aux chaussures orthopédiques spéciales, surconsomma -\ntion de chaussures de confection\
    \ en raison de l’invalidité\n• moyens auxiliaires pour le crâne et la face (prothèses oculaires, épithèses \nfaciales,\
    \ appareils auditifs, perruques, appareils orthophoniques après \nopération du larynx)\n• fauteuils roulants sans moteur,\
    \ fauteuils roulants électriques, monte-es -\ncaliers et plateformes élévatrices ainsi que transformations de véhicules\
    \ \nà moteur nécessitées par l’invalidité\n• moyens auxiliaires pour aveugles et personnes gravement handicapées \nde\
    \ la vue (cannes blanches, systèmes de navigation pour piétons, en -\ntraînement à l’emploi de smartphones et tablettes,\
    \ chiens-guides pour \naveugles, appareils d’écoute pour supports sonores, lunettes-loupes, \nsystèmes de lecture et d’écriture,\
    \ OrCam MyEye)\n• cannes-béquilles\n• accessoires facilitant la marche (déambulateurs et supports ambulatoires)\n• moyens\
    \ auxiliaires servant à développer l’autonomie personnelle (WC-\ndouches et WC-séchoirs ainsi que compléments aux installations\
    \ sani -\ntaires, élévateurs pour malades, lits électriques) et modifications archi -\ntecturales du domicile nécessitées\
    \ par l’invalidité\n• plates-formes élévatrices, monte-rampes d’escalier et rampes ainsi que \nsuppression ou modification\
    \ d’obstacles architecturaux à l’intérieur et \naux abords des lieux d’habitation, de travail, de formation et de sco\
    \ -\nlarisation\n• chiens d’assistance\n• moyens auxiliaires permettant d’établir des contacts avec l’entourage \n(appareils\
    \ de communication électriques et électroniques, tourneurs \nde pages, appareils de contrôle de l’environnement, vidéophones\
    \ SIP)\n• contributions aux vêtements confectionnés sur mesure pour les per -\nsonnes atteintes de troubles de la croissance\
    \ ou des déformations du \nsquelette\n• casques de protection \n• coudières et genouillères de protection pour hémophiles\n\
    • sièges de voiture spéciaux pour les enfants qui ne peuvent pas contrô -\nler la tête et le tronc\f5Appareils de traitement\n\
    3 Dans quelles circonstances ai-je droit à des appareils de \ntraitement ?\nSi vous avez moins de 20 ans et que vous bénéficiez\
    \ de prestations de l’AI \npour le traitement d’infirmités congénitales reconnues, vous avez droit à \ndes appareils de\
    \ traitement pour différentes infirmités, à certaines condi -\ntions. \nSi vous avez moins de 20 ans, vous avez aussi\
    \ droit à ces appareils si leur \nutilisation s’avère nécessaire dans le cadre d’une mesure médicale octroyée \npar l’AI.\n\
    4 Quels appareils de traitement sont pris en charge  \npar l’AI ?\nA titre d’exemples, sont pris en charge par l’AI :\n\
    • les inhalateurs\n• les lunettes correctrices en cas d’infirmité congénitale de l’œil\n• les nébuliseurs\n• les appareils\
    \ de distillation et les coussins en mousse en cas de  \nmucoviscidose (fibrose kystique)\n• les ballons et les tapis\
    \ thérapeutiques en cas de paralysie cérébrale\nDemande de prestations \n5 Comment dois-je procéder pour demander des\
    \ moyens \nauxiliaires ?\nSi vous entendez faire valoir pour la première fois votre droit à des moyens \nauxiliaires de\
    \ l’AI, vous devez adresser votre demande à l’office AI de votre \ncanton de domicile. Celui-ci examinera si vous y avez\
    \ droit en vertu des \ndispositions légales.\nVous obtiendrez le formulaire 001.002 - Demande de prestations AI pour \n\
    adultes : Moyens auxiliaires  auprès des offices AI ainsi que des caisses de \ncompensation et de leurs agences ; vous\
    \ pouvez aussi le télécharger sur le \nsite www.avs-ai.ch . \f6Forme de remise\n6 Sous quelle forme les moyens auxiliaires\
    \ sont-ils remis ?\nDans la mesure du possible, ce sont les dépôts de l’AI qui remettent les \nmoyens auxiliaires. Sinon,\
    \ l’AI peut autoriser l’achat d’un nouveau moyen \nauxiliaire.\nLes moyens auxiliaires onéreux sont, en règle générale,\
    \ remis en prêt. \nC’est exclusivement dans des cas spéciaux que l’AI verse des contributions \nuniques ou périodiques\
    \ pour des moyens auxiliaires que vous aurez acquis \nou loués vous-même. Certains moyens auxiliaires sont remboursés\
    \ par un \nforfait, qui est versé quel que soit le coût réel du moyen auxiliaire. Des \ncontributions financières plus\
    \ élevées peuvent, dans des cas de rigueur, \nêtre versées pour l’acquisition d’appareils auditifs.\nVous trouverez de\
    \ plus amples informations dans le mémento  \n4.08 - Appareils auditifs de l’AI .\nUtilisation soigneuse\n7 A quoi dois-je\
    \ veiller ?\nLes moyens auxiliaires remis par l’AI doivent être utilisés avec soin et confor -\nmément à leur but. Si\
    \ vous ne respectez pas cette obligation de diligence, \nvous devrez verser une indemnité appropriée.\nRemise ou prise\
    \ en charge par Pro Infirmis\n8 Quand puis-je faire appel à Pro Infirmis ?\nSi vous n’avez pas droit aux moyens auxiliaires\
    \ de l’AI, vous pouvez vous \nadresser à Pro Infirmis. Cette organisation peut vous en prêter ou vous ac -\ncorder une\
    \ contribution à leur acquisition. Il n’existe cependant aucun droit \nlégal à ces prestations.\f7Moyens auxiliaires dans\
    \ le cadre des prestations  \ncomplémentaires\n9 Qu’en est-il si je perçois des prestations  \ncomplémentaires ?\nSi vous\
    \ percevez des prestations complémentaires, vous avez droit, dans \nle cadre des dispositions légales, à certains moyens\
    \ et appareils auxiliaires \n(appareils de soins et de traitement). Mais seules sont prises en charge les \nprestations\
    \ qui ne sont pas déjà couvertes par l’AI ou par une autre assu -\nrance.\nGarantie des droits acquis pour les bénéficiaires\
    \ \nd’une rente de vieillesse\n10 Qu’en est-il si je suis à la retraite ?\nSi des moyens auxiliaires ou des prestations\
    \ de remplacement vous ont \nété accordés par l’AI, vous continuez d’y avoir droit si vous anticipez votre \nrente AVS\
    \ ou que vous avez atteint l’âge de référence de l’AVS, tant que les \nconditions de l’AI sont remplies.\nMoyens auxiliaires\
    \ de l’AVS\n11 Dans quelles circonstances ai-je droit à des moyens  \nauxiliaires de l’AVS ?\nLes moyens auxiliaires sont\
    \ aussi prévus par l’AVS : si vous n’avez pas béné -\nficié de moyens auxiliaires de l’AI jusqu’ici et que vous anticipez\
    \ la totalité \nde votre rente AVS ou que vous avez atteint l’âge de référence de l’AVS, \nvous pouvez faire valoir le\
    \ droit à une contribution financière pour certains \nmoyens auxiliaires de l’AVS.\nVous trouverez de plus amples informations\
    \ à ce sujet dans le mémento \n3.02 - Moyens auxiliaires de l’AVS .\f8Renseignements et autres  \ninformations\nCe mémento\
    \ ne fournit qu’un aperçu général. Pour le règlement des \ncas individuels, seules les dispositions légales font foi.\
    \ Les offices AI, \nles caisses de compensation et leurs agences fournissent volontiers \nles renseignements souhaités.\
