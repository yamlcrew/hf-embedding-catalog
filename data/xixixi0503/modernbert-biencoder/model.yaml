    - " enfant gravement atteint dans sa santé ou \nd’adoption (APG)\n• Prestations complémentaires (PC)\n• Prestations transitoires\
      \ pour chômeurs âgés (Ptra).\n2 Suis-je assuré auprès de l’AVS/AI ?\nL’AVS et l’AI sont des assurances générales et\
      \ obligatoires. Y sont assurées \nles personnes qui sont domiciliées ou qui exercent une activité lucrative en \nSuisse.\
      \ L’obligation légale de s’assurer vaut également pour les ressortis -\nsants étrangers. \n3 Comment puis-je connaître\
      \ mon numéro AVS ?\nLe numéro AVS figure sur la carte d’assurance-maladie ainsi que sur le \ncertificat d’assurance\
      \ AVS/AI. Un assuré qui ne possède pas de carte  \nd’assurance-maladie ni de certificat d’assurance AVS/AI peut s’adresser\
      \ \nà sa caisse de compensation afin qu’elle lui délivre ledit certificat d’as -\nsurance. Il est alors tenu de le conserver.\
      \ Les assurés présentent leur carte  \nd’assurance-maladie ou leur certificat d’assurance AVS/AI à leur nouvel  \nemployeur\
      \ lors de chaque changement d’emploi et à l’organe compétent \nen cas de demande de prestations. Important : le numéro\
      \ AVS doit être \nindiqué dans toute correspondance avec les caisses de compensation.\f21Cotisations\n4 A quel moment\
      \ débute l’obligation de cotiser  \nauprès de l’AVS/AI ?\nLes personnes non actives paient des cotisations dès le 1er\
      \ janvier qui suit \nleur 20e anniversaire et jusqu’à l’âge de référence. Les personnes actives \nont l’obligation de\
      \ cotiser dès le début de leur activité lucrative, mais pas \navant le 1er janvier qui suit leur 17e anniversaire.\n\
      5 De quelle manière les cotisations à l’AVS, à l’AI  \net au régime des APG sont-elles perçues ?\nLes cotisations dues\
      \ à l’AVS, à l’AI et aux APG sont perçues de la manière \nsuivante :\n•  Salariés :\n La cotisation paritaire, définie\
      \ en pourcentage du salaire, est payée \npour moitié par le salarié (prélevée sur le salaire) et pour moitié par \n\
      l’employeur. S’y ajoutent la cotisation due à l’assurance-chômage (AC)\net, le cas échéant, les cotisations relatives\
      \ à d’autres branches d’as -\nsurances sociales. Les cotisations du salarié sont retenues lors de cha -\nque paie par\
      \ l’employeur, qui les verse à la caisse de compensation en \nmême temps que sa propre part de cotisations (voir aussi\
      \ mémentos \n2.01 - Cotisations salariales à l’AVS, à l’AI et aux APG  et 2.08 - Cotisa -\ntions à l’assurance-chômage\
      \ ).\n•  Indépendants :\n La personne qui exerce une activité indépendante établit le décompte \nde ses cotisations\
      \ directement avec la caisse de compensation. Ses \ncotisations sont définies en pourcentage du revenu mentionné sur\
      \ la \ntaxation de l’impôt fédéral direct et communiqué à la caisse de com -\npensation par l’autorité fiscale. S’y\
      \ ajoutent, le cas échéant, les cotisa -\ntions relatives à d’autres branches d’assurances sociales. Il appartient à\
      \ \nla caisse de compensation de déterminer si l’assuré est indépendant au \nsens de l’AVS (voir aussi mémento 2.02\
      \ - Cotisations des indépendants \nà l’AVS, à l’AI et aux APG ).\n•  Non-actifs :\n Le montant des cotisations d’une\
      \ personne sans activité lucrative \ndépend de la fortune et du revenu acquis sous forme de rente. Il est \nfixé par\
      \ la caisse de compensation du canton de domicile de l’assuré. \nSi vous avez dépassé l’âge de 58 ans, le montant des\
      \ cotisations sera \ndéterminé par la caisse de compensation auprès de laquelle vous  \f22 avez, en dernier lieu, payé\
      \ des cotisations comme personne active (voir \naussi mémento 2.03 - Cotisations des personnes sans activité lucrative\
      \ \nà l’AVS, à l’AI et aux APG ).\nPrestations de l’AVS\n6 Quelles prestations l’AVS octroie-t-elle ? \nL’AVS octroie\
      \ les prestations suivantes :\n•  rente de vieillesse pour les hommes et les femmes qui ont atteint l’âge \nde référence.\
      \ L’âge de référence est fixé à 65 ans pour les hommes \net est relevé progressivement de 64 à 65 ans pour les femmes\
      \ dès \n2025. A partir de 2028, l’âge de référence sera ainsi le même pour \ntout le monde, soit 65 ans. (voir mémento\
      \ 3.01 - Rentes de vieil -\nlesse et allocations pour impotents de l’AVS ). La rente de vieillesse \npeut être anticipée\
      \ ou ajournée. Il y a réduction de la rente en cas \nd’anticipation et augmentation en cas d’ajournement (voir mémento\
      \  \n3.04 - Flexibilisation de la retraite ).\n•  rente pour enfant versée aux bénéficiaires de rente de vieillesse.\
      \ Ce \ndroit vaut jusqu’au 18e anniversaire de leurs enfants ou jusqu’à la fin \nd’un apprentissage ou des études mais,\
      \ au maximum, jusqu’à leur  \n25e anniversaire.\n•  rente de veuve ou de veuf.\n•  rente d’orphelin pour les enfants\
      \ de moins de 18 ans ou jusqu’à la fin \nd’un apprentissage ou des études mais, au maximum, jusqu’à leur 25e \nanniversaire.\n\
      •  allocation pour impotent selon le chiffre 8.\n•  moyens auxiliaires selon le chiffre 9.\n7 Quelles conditions ouvrent\
      \ le droit  \naux prestations de l’AVS ? \nLes ressortissants d’un pays avec lequel la Suisse n’a pas conclu de conven\
      \ -\ntion de sécurité sociale (Etats non contractants), ainsi que leurs survivants \n(veuves, veufs, orphelins), ont\
      \ droit à une rente de l’AVS\n•  s’ils sont domiciliés en Suisse, et\n•  s’ils ont cotisé à l’AVS pendant une année\
      \ entière au moins, ou\n•  s’ils ont été couverts pendant une année entière au moins par  \nl’assurance d’un conjoint\
      \ ayant travaillé et versé au moins le double de \nla cotisation minimale, ou\f23•  s’ils justifient d’au moins une\
      \ année entière de bonifications pour \ntâches éducatives ou pour tâches d’assistance.\nUne rente de survivants n’est\
      \ octroyée que si la personne décédée a été \nassurée pendant une année entière au moins.\n8 Quelles conditions ouvrent\
      \ le droit  \nà une allocation pour impotent ?\nLes bénéficiaires d’une rente de vieillesse ou de prestations complémen\
      \ -\ntaires, domiciliés et résidant habituellement en Suisse, ont droit à une \nallocation pour impotent lorsqu’ils\
      \ présentent une impotence faible, mo -\nyenne ou grave depuis six mois au moins. Est considérée comme impo -\ntente\
      \ la personne qui a besoin d’une aide régulière d’autrui pour les actes \nordinaires de la vie (s’habiller, manger,\
      \ faire sa toilette, etc.) et de soins \nen permanence, voire d’une surveillance personnelle. Les allocations pour \n\
      impotent ne sont pas versées à l’étranger.\n9 Quelles conditions ouvrent le droit  \nà des moyens auxiliaires de l’AVS\
      \ ?\nLes bénéficiaires de rentes de vieillesse domiciliés en Suisse reçoivent, à \ncertaines conditions, des moyens\
      \ auxiliaires de l’AVS (appareils acous -\ntiques, lunettes-loupes, prothèses, fauteuils roulants, etc. voir mémento\
      \  \n3.02 - Moyens auxiliaires de l’AVS ).\nPrestations de l‘AI\n10 Quelles prestations l’AI octroie-t-elle ?\nL’AI\
      \ accorde d’abord des mesures de réadaptation. La rente AI n’est versée \nque si les mesures de réadaptation n’ont pas\
      \ atteint leur but ou ne l’ont \natteint qu’en partie, ou encore si elles sont d’emblée vouées à l’échec.\nL’AI fournit\
      \ les prestations suivantes :\n•  mesures d’intervention précoce :\n celles-ci ont pour but de maintenir à leur poste\
      \ les assurés en inca -\npacité de travail, de permettre leur réadaptation à un nouveau poste \nou faciliter l’accès\
      \ aux jeunes assurés à une formation professionnelle \ninitiale.\n•  mesures de réadaptation :\n celles-ci sont destinées\
      \ à améliorer la capacité de gain actuelle ou  \nfuture (par ex. reclassement professionnel, moyens auxiliaires).\f\
      24•  rente d’invalidité :\n celle-ci vise à compenser les conséquences économiques durables de \nl’invalidité en couvrant\
      \ les besoins vitaux dans une mesure appropriée. \nElle est accordée au plus tôt dès l’âge de 18 ans. Le taux d’invalidité\
      \ \ndétermine la rente que touchera la personne assurée.\n•  rente pour enfant :\n celle-ci est versée en cas d’invalidité\
      \ d’un des parents ; l’enfant y donne \ndroit jusqu’à son 18e anniversaire ou jusqu’à la fin d’un apprentissage \nou\
      \ des études mais, au maximum, jusqu’à son 25e anniversaire.\n•  allocation pour impotent et contribution d’assistance\
      \ selon le chiffre 14.\n11 Quelles conditions ouvrent le droit  \nà des mesures de réadaptation ?\nLes ressortissants\
      \ d’Etats non contractants domiciliés en Suisse ont droit \naux mesures de réadaptation si, avant la survenance de l’invalidité,\n\
      •  ils ont cotisé pendant une année entière au moins, ou\n•  ils ont vécu au moins une année entière en Suisse avec\
      \ un conjoint \nayant travaillé et versé au moins le double de la cotisation minimale, ou\n•  ils justifient d’un an\
      \ de bonifications pour tâches éducatives ou pour \ntâches d’assistance, ou\n•  ils ont séjourné en Suisse pendant une\
      \ durée ininterrompue de dix ans.\n12 Les enfants ont-ils également droit  \nà des mesures de réadaptation ?\nLes enfants\
      \ de moins de 20 ans ont également droit à des mesures de réad -\naptation lorsqu’un seul des parents remplit les conditions\
      \ ci-dessus, ou s’ils \nsont eux-mêmes nés invalides en Suisse ou y ont vécu au moins un an avant \nla survenance de\
      \ l’invalidité ou sans interruption depuis leur naissance. Les \nenfants nés à l’étranger ont exceptionnellement droit\
      \ à des mesures de \nréadaptation si leur mère a résidé à l’étranger pendant deux mois au plus \nimmédiatement avant\
      \ la naissance.\n13 Quelles conditions ouvrent le droit à une rente de l’AI ?\nPour avoir droit à une rente AI ordinaire,\
      \ la personne assurée doit avoir \ncotisé à l’assurance suisse pendant trois années entières au moins avant la \nsurvenance\
      \ de l’invalidité et être domiciliée en Suisse.\f2514 Quelles conditions ouvrent le droit à une allocation \npour impotent\
      \ ou à une contribution d‘assistance ?\nLes assurés qui remplissent les conditions décrites au chiffre 11 ont droit\
      \ à \nl’allocation pour impotent s’ils résident en Suisse et si, en raison de leur in -\nvalidité, ils ont besoin d’une\
      \ aide régulière d’autrui pour les actes ordinaires \nde la vie (s’habiller, manger, faire sa toilette, etc.), voire\
      \ d’une surveillance \npersonnelle. De plus, les bénéficiaires d’une allocation pour impotent vi -\nvant à la maison\
      \ peuvent, grâce à la contribution d’assistance, engager un \nassistant qui leur apporte l’aide dont ils ont besoin.\
      \ Si l’impotence subsiste \nlorsque la rente de vieillesse se substitue à la rente d’invalidité, la personne \nassurée\
      \ continuera de toucher une allocation pour impotent et une contri -\nbution d’assistance au moins égales à celles reçues\
      \ jusque-là. \nL’allocation pour impotent et la contribution d’assistance ne sont pas ver -\nsées à l’étranger. \nPrestations\
      \ complémentaires\n15 Ma rente AVS ou AI ne couvre pas le coût de la vie, que \npuis-je faire ?\nSi vous percevez une\
      \ prestation en espèces (rente AVS ou AI, une allocation \npour impotent de l‘AI après l‘âge de 18 ans ou une indemnité\
      \ journalière \nde l‘AI pendant au moins six mois) et que vous vivez dans des conditions \néconomiques modestes, vous\
      \ avez droit, sous certaines conditions, à des \nprestations complémentaires. \nSi vous avez atteint l‘âge de référence,\
      \ que vous êtes invalide, veuf, veuve  \nou orphelin et que vous n‘avez néanmoins pas droit à une rente parce que \n\
      vous n‘avez pas cotisé ou que vous n‘avez pas cotisé assez longtemps, vous \npouvez tout de même faire valoir un droit\
      \ aux prestations complémentaires \nsous certaines conditions. \nSi vous n‘habitez pas en Suisse, vous n‘avez pas droit\
      \ aux prestations com -\nplémentaires.\nVous trouverez de plus amples informations à ce sujet dans le mémento \n5.01\
      \ - Prestations complémentaires à l‘AVS et à l‘AI  et dans le mémento \n5.02 - Votre droit aux prestations complémentaires\
      \ à l‘AVS et à l‘AI .\f26Calcul des rentes\n16 Comment les rentes de l’AVS et de l’AI se calculent-elles ?\nLes rentes\
      \ AVS et AI sont calculées sur la base de la durée des cotisations, du \nrevenu de l’activité lucrative ainsi que des\
      \ bonifications pour tâches éduca -\ntives ou d’assistance. Les cotisations versées à une assurance étrangère et \n\
      les périodes de cotisations correspondantes ne peuvent être ni transférées \nà l’AVS/AI suisse ni prises en considération\
      \ d’aucune autre façon.\nTransfert des cotisations\n17 Mes cotisations AVS peuvent-elles être transférées  \nà l’assurance\
      \ sociale de mon pays d’origine ?\nLes cotisations versées à l’AVS/AI suisse ne peuvent pas être transférées à \nl’assurance\
      \ du pays d’origine du ressortissant étranger.\nRemboursement des cotisations\n18 Sous quelles conditions les cotisations\
      \ AVS  \npeuvent-elles être remboursées ?\nLes ressortissants d’Etats non contractants domiciliés à l’étranger peuvent,\
      \ \nà certaines conditions, demander et obtenir le remboursement sans in -\ntérêts des cotisations AVS après avoir quitté\
      \ définitivement la Suisse. Ils \ndoivent pour cela, notamment, avoir cotisé à l’assurance suisse pendant \nune année\
      \ entière au moins.\nDemandes de prestations\n19 A qui les demandes de prestations doivent-elles  \nêtre adressées ?\n\
      La demande de prestations doit être adressée aux organismes suivants, qui \ndisposent également des formulaires nécessaires.\n\
      Si l’assuré est domicilié en Suisse :\n•  pour les prestations de l’AVS à la caisse de compensation à laquelle les \n\
      cotisations ont été versées en dernier lieu\n•  pour les prestations de l’AI à l’office AI du canton de domicile\nIl\
      \ est recommandé à l’assuré de présenter sa demande de prestations dès \nque les conditions de droit sont remplies.\
      \ \f27Si l’assuré est domicilié à l’étranger :  \npour le remboursement des cotisations selon le chiffre 18, à la \n\
      Caisse suisse de compensation  \nAvenue Edmond-Vaucher 18  \nCase postale 3100  \nCH-1211 Genève 2\n20 A qui les demandes\
      \ de prestations d’une assurance  \nd’un pays étranger doivent-elles être adressées ? \nLes ressortissants d’Etats non\
      \ contractants domiciliés en Suisse qui enten -\ndent faire valoir le droit aux prestations d’une assurance étrangère\
      \ s’adres -\nseront directement à l’institution d’assurance compétente ou à une repré -\nsentation du pays concerné\
      \ en Suisse.\n21 Où puis-je obtenir des renseignements et des  \ninformations supplémentaires ?\nLes caisses de compensation,\
      \ leurs agences et les offices AI fournissent \ntout renseignement utile. La liste complète des caisses de compensation\
      \ \nfigure sur Internet à l’adresse www.avs-ai.ch . \nLes ressortissants d’Etats non contractants domiciliés à l’étranger\
      \ s’adres -\nseront à la \nCaisse suisse de compensation  \nAvenue Edmond-Vaucher 18  \nCase postale 3100  \nCH-1211\
      \ Genève 2\nD’autres informations figurent dans la brochure La sécurité sociale en  \nSuisse.  Cette brochure est disponible\
      \ à l’adresse Internet www.avs-ai.ch .\nPrévoyance professionnelle (2e pilier) \n22 Prévoyance professionnelle (2e pilier)\
      \ :  \nquels droits, quelles obligations ?\nLa prévoyance professionnelle (caisse de pensions) vient en complément de\
      \ \nl’AVS/AI/APG pour permettre aux assurés ou aux survivants de maintenir \nde manière appropriée leur niveau de vie\
      \ antérieur lorsque survient un cas \nde prévoyance (vieillesse, décès ou invalidité). Elle est obligatoire pour les\
      \ \npersonnes actives dont le revenu annuel est supérieur à 22 680 francs.\f28Les personnes ayant été assurées dans\
      \ la prévoyance professionnelle ont \nles droits suivants :\n•  une rente de vieillesse lorsqu’elles atteignent l’âge\
      \ de référence ou plus \ntôt suivant le règle  ment de la caisse de pension;\n•  une rente d’invalidité, si la personne\
      \ est invalide à 40 % au moins et si \nelle était assurée au moment où la cause de l’invalidité s’est produite \n(les\
      \ règlements des institutions de prévoyance peuvent prévoir des dis -\npositions plus favorables);\n•  des prestations\
      \ destinées aux survivants (veuve, veuf et enfants) en cas \nde décès de la personne assurée;\n•  une prestation de\
      \ sortie (= prestation de libre passage), si aucun des \ntrois événements précités n’est survenu lorsque l’assuré quitte\
      \ la caisse \nde pensions.\nLes rentes de la prévoyance professionnelle sont versées aussi à l’étranger.\n23 Dans quel\
      \ cas ai-je droit à une prestation de sortie  \nde la caisse de pensions ?\nEn règle générale, la prestation de sortie\
      \ doit être transférée sur un compte \nou une police de libre passage au départ de la caisse de pensions (qui a \nlieu,\
      \ normalement, à la fin d’un rapport de travail). Les assurés quittant \ndéfinitivement la Suisse pour un Etat hors\
      \ UE/AELE peuvent demander le \npaiement en espèces de la prestation de sortie à la caisse de pensions de \nleur dernier\
      \ employeur.\nLe paiement en espèces de la prestation de sortie qui correspond au mi -\nnimum LPP n’est pas possible\
      \ lorsque l’assuré quitte la Suisse et qu’il reste \nassuré obligatoirement dans un Etat membre de l’UE pour les risques\
      \ de \nvieillesse, de décès et d’invalidité. En revanche, la partie surobligatoire de la \nprestation de sortie peut\
      \ être payée en espèces, sur demande de l’assuré. \nSi le versement en espèces de la prestation de sortie n’est pas\
      \ possible, le \nmontant est versé sur un compte de libre passage ou une police de libre \npassage bloqués. Pour les\
      \ personnes qui partent pour le Liechtenstein, la \nprestation de sortie est versée à l’institution de prévoyance de\
      \ l’employeur \nliechtensteinois. Dans ce cas-là, il n’y a aucune possibilité de paiement en \nespèces.\f2924 A qui\
      \ m’adresser en cas de sortie  \nde la caisse de pensions ?\nLes personnes assurées doivent traiter avec la caisse de\
      \ pensions de \nleur dernier employeur. Elles doivent conserver toutes les attestations  \nd’assurance reçues de la\
      \ caisse. Si un assuré quitte la Suisse sans indiquer \noù la caisse de pension peut verser la prestation de sortie\
      \ et sans avoir reçu \nune prestation en espèces, la caisse de pension est tenue de transférer le \nmontant à l’institution\
      \ supplétive, au plus tard dans les deux ans qui suivent \nle départ.\n25 Où obtenir plus de renseignements concernant\
      \  \nles prestations de sortie ?\nLes caisses de pensions fournissent tout renseignement utile sur les pres -\ntations\
      \ de libre passage non réclamées. La Centrale du 2e pilier renseigne \négalement les assurés pour l’exercice de leurs\
      \ droits éventuels à une pres -\ntation :\nCentrale du 2e pilier  \nFonds de garantie LPP  \nCase postale 1023  \n3000\
      \ Berne 14  \nTél. 031 380 79 75  \nE-mail: info@zentralstelle.ch  \nwww.sfbvg.ch\nAssurance-maladie\n26 Assurance-maladie\
      \ : quels droits, quelles obligations ?\nToute personne domiciliée en Suisse doit s’assurer auprès d’un assu -\nreur-maladie\
      \ suisse dans les trois mois qui suivent sa prise de domicile ou \nsa naissance. Les salariés détachés provisoirement\
      \ à l’étranger par leur em -\nployeur, ainsi que les membres de leur famille qui n’exercent pas d’activité \nlucrative,\
      \ demeurent soumis à l’assurance obligatoire suisse. La personne \nassurée paie les primes et participe aux coûts des\
      \ prestations dont elle \nbénéficie (franchise et quote-part). L’assurance-maladie sociale alloue des \nprestations\
      \ en cas de maladie et de maternité, de même qu’en cas d’acci -\ndent si aucune assurance-accidents n’en assume la prise\
      \ en charge. En cas \nde maladie, les assureurs-maladie remboursent les frais médicaux, moins la \nparticipation obligatoire\
      \ aux coûts de la personne assurée. Les frais occasi -\nonnés par un traitement médical subi, en cas d’urgence, à l’étranger\
      \ (hors\f30UE/AELE) sont pris en charge à concurrence du double du montant qui au -\nrait été remboursé en Suisse. Les\
      \ assurés qui ne sont pas ressortissants d’un \nEtat membre de l’UE ou de l’AELE ont droit, en vertu d’une convention\
      \ \nconclue entre l’Allemagne et la Suisse, à la prise en charge des frais de trai -\ntements médicaux subis en cas\
      \ d’urgence lors d’un séjour en Allemagne.\nAssurance-accidents\n27 Assurance-accidents : quels droits, quelles obligations\
      \ ?\nToute personne salariée en Suisse est obligatoirement assurée contre les \naccidents professionnels et non professionnels\
      \ (en cas d’activité d’au moins \nhuit heures par semaine chez le même employeur), et contre les maladies \nprofessionnelles.\
      \ Les primes de l’assurance contre les accidents et maladies \nprofessionnels sont à la charge de l’employeur ; celles\
      \ de l’assurance contre \nles accidents non professionnels sont à la charge du travailleur et sont dé -\nduites de son\
      \ salaire. Les conventions dérogatoires en faveur du travailleur \nsont réservées. L’assurance alloue entre autres le\
      \ traitement médical, des \nindemnités journalières et des rentes. Les accidents non professionnels sur -\nvenus à l’étranger\
      \ sont aussi couverts. Des renseignements peuvent être \nobtenus auprès de l’assureur-accidents de l’employeur.\nAssurance-chômage\n\
      28 Assurance-chômage : quels droits, quelles obligations ?\nToute personne qui exerce une activité salariée en Suisse\
      \ est obligatoire -\nment affiliée à l’assurance-chômage. La cotisation est payée moitié par \nle salarié (prélevée\
      \ sur le salaire) et moitié par l’employeur. Les assurés au \nchômage peuvent percevoir des prestations s’ils résident\
      \ en Suisse, s’ils \ns’annoncent comme chômeurs auprès de l’Office régional de placement et  \ns’ils remplissent toutes\
      \ les conditions d’octroi posées par la loi sur l’assuran -\nce-chômage. Des renseignements complémentaires peuvent\
      \ être obtenus \nsur le site www.travail.swiss  ou auprès du service de l’emploi du canton de \ndomicile. \nDes «info-brochures»\
      \ sur l’assurance-chômage et des informations à  \nl’attention des demandeurs d’emploi sont disponibles sur Internet\
      \ à  \nl’adresse www.travail.swiss .\f31Prestations transitoires pour chômeurs âgés\n29 Qu‘est-ce que les prestations\
      \ transitoires pour les  \nchômeurs âgés ?\nLes chômeurs qui arrivent en fin de droit de l ’assurance chômage après\
      \ \nleur 60e anniversaire et qui ne trouvent plus de revenus suffisants peuvent \nbénéficier de prestations transitoires\
      \ jusqu ’à leur retraite. \n30 Dans quelles circonstances ai-je droit à des  \nprestations transitoires ?\nVous pouvez\
      \ toucher des prestations transitoires si \n•  vous arrivez en fin de droit dans l’assurance-chômage au plus tôt pen\
      \ -\ndant le mois au cours duquel vous atteignez l’âge de 60 ans ;\n•  vous avez été assuré à l’assurance-vieillesse\
      \ et survivants (AVS) en  \nSuisse pendant au moins 20 ans, dont au moins cinq ans après l’âge de \n50 ans, et vous\
      \ avez réalisé un revenu annuel provenant d’une activité \nlucrative d’un certain montant ;\n•  vous disposez d’une\
      \ fortune inférieure à 50 000 francs (pour une per -\nsonne seule) ou 100 000 francs (pour un couple), le bien immobilier\
      \ \nservant d’habitation à son propriétaire n’étant pas pris en compte ;\n•  vous avez votre domicile et votre résidence\
      \ habituelle en Suisse ou dans \nun État membre de l’UE ou de l’AELE ;\n•  vous présentez un excédent de dépenses, c’est-à-dire\
      \ que vos dépen -\nses reconnues excèdent vos revenus déterminants (condition écono -\nmique).\nVous ne pouvez pas obtenir\
      \ de prestations transitoires si\n•  vous avez droit à une rente de l’AVS ou de l’AI ; \n• vous êtes en fin de droit\
      \ avant votre 60e anniversaire ; \n• vous êtes en fin de droit avant le 1er juillet 2021.\nVous trouverez de plus amples\
      \ informations à ce sujet dans le mémento \n5.03 - Prestations transitoires pour chômeurs âgés .\f32Allocations familiales\n\
      31  Ai-je droit aux allocations familiales ?\nEn générale, toute personne exerçant une activité lucrative et assurée\
      \ en \nSuisse a droit aux allocations familiales pour ses enfants qui vivent en Suisse \nsous condition qu’elle perçoive\
      \ un revenu soumis aux cotisations AVS de \n7 560 francs par année, respectivement 630 francs par mois au minimum. \n\
      Celles-ci comprennent :\n•  une allocation pour enfant d’au moins 215 francs par mois ; elle est \noctroyée dès le mois\
      \ de la naissance jusqu’à et y compris le mois au \ncours duquel l’enfant a son 16e anniversaire. Si l’enfant donne\
      \ droit à \nl’allocation de formation avant son 16e anniversaire, celle-ci sera versée \nà la place de l’allocation\
      \ pour enfant. L’allocation pour enfant est éga -\nlement octroyée pour les enfants âgés de 16 à 20 ans qui se trouvent\
      \ \ndans l’impossibilité d’exercer une activité lucrative en raison d’une at -\nteinte à la santé ;\n•  une allocation\
      \ de formation d’au moins 268 francs par mois ; elle est \nversée à partir du mois au cours duquel l’enfant commence\
      \ sa forma -\ntion post obligatoire, mais au plus tôt pour le mois au cours duquel il a \nson 15e anniversaire. L’enfant\
      \ ayant atteint l’âge de 16 ans et se trou -\nvant encore à l’école obligatoire donne droit à l’allocation de formation\
      \ \nà partir du mois suivant celui au cours duquel il fête son 16e anniver -\nsaire. L’allocation de formation est versée\
      \ jusqu’à la fin de la formation, \nmais au plus tard jusqu’à la fin du mois au cours duquel l’enfant atteint \nl’âge\
      \ de 25 ans.\nLes allocations familiales pour les enfants domiciliés à l’étranger ne sont \nexportées que si une convention\
      \ de sécurité sociale conclue par la Suisse \nle prévoit.\f33Prestations de l‘APG\n32 Ai-je droit à l’allocation de\
      \ maternité ? \nLes femmes considérées comme salariées ou indépendantes au moment de \nla naissance de l’enfant ont\
      \ droit à l’allocation de maternité. Elles doivent \navoir été soumises à l’AVS/AI/APG suisse pendant les neuf mois\
      \ qui ont \nprécédé immédiatement la naissance de l’enfant et avoir exercé une acti -\nvité lucrative pendant au moins\
      \ cinq mois durant cette période.\nL’allocation de maternité est octroyée pendant 14 semaines (98 jours) et \nse monte\
      \ à 80 % du revenu moyen réalisé avant l’accouchement, mais au \nplus à 220 francs par jour.\nVous trouverez de plus\
      \ amples informations à ce sujet dans le mémento \n6.02 - Allocation de maternité . \n33 Ai-je droit à l’allocation\
      \ à l‘autre parent ? \nLes pères, ou les épouses de la mère, considérées comme l’autre parent au \nsens de l’art. 255a,\
      \ al. 1, CC, qui à la naissance de l’enfant exercent une ac -\ntivité professionnelle en tant que salarié(e) ou en qualité\
      \ d’indépendant(e) \nont droit à l’allocation à l’autre parent. \nIls doivent avoir été soumis à l’assurance obligatoire\
      \ au sens de la loi sur \nl’AVS pendant les neuf mois qui ont immédiatement précédé la naissance \nde l’enfant et avoir\
      \ exercé une activité lucrative pendant au moins cinq \nmois durant cette période.\nLa durée du congé de l’autre parent\
      \ est de deux semaines (14 indemnités \njournalières au maximum). Ils touchent, à titre d’allocation pour perte de \n\
      gain, le 80 % du revenu moyen soumis à l’AVS qu’ils réalisaient avant la \nnaissance, mais au plus 220 francs par jour.\n\
      Vous trouverez de plus amples informations à ce sujet dans le mémento \n6.04 - Allocation à l’autre parent.  \f3434\
      \ Ai-je droit à l’allocation pour prise en charge ?  \nLes parents qui doivent interrompre leur activité lucrative pour\
      \ prendre en \ncharge leur enfant mineur gravement atteint dans sa santé ont droit à un \ncongé de prise en charge.\n\
      Le congé de prise en charge est de quatorze semaines (maximum 98 in -\ndemnités journalières). L’allocation pour prise\
      \ en charge se monte à 80 % \ndu revenu moyen de l’activité lucrative obtenu immédiatement avant la \nperception des\
      \ jours de congé, mais au plus à 220 francs par jour.\nVous trouverez de plus amples informations à ce sujet dans le\
      \ mémento \n6.10 - Allocation pour prise en charge .\n35 Ai-je le droit à l’allocation d’adoption ?\nLes personnes exerçant\
      \ une activité lucrative, qui accueillent en vue de son \nadoption un enfant de moins de quatre ans, ont droit à l’allocation\
      \ d‘ad -\noption. L’adoption de l‘enfant d’un conjoint ou d’un partenaire ne donne \ndroit à aucune indemnité.\nVous\
      \ devez avoir été soumis à l’assurance obligatoire au sens de la loi sur \nl’AVS pendant les neuf mois qui ont immédiatement\
      \ précédé l‘adoption de \nl’enfant, et avoir exercé une activité lucrative durant au moins cinq mois \npendant cette\
      \ période. \nLe congé d‘adoption est de deux semaines (maximum 14 indemnités jour -\nnalières). \nL’allocation d‘adoption\
      \ se monte à 80 % du revenu AVS moyen de l’activité \nréalisé avant l‘accueil de l‘enfant en vue de son adoption mais\
      \ au plus à 220 \nfrancs par jour. \nVous trouverez de plus amples informations à ce sujet dans le mémento \n6.11 -\
      \ Allocation d’adoption .\f35Renseignements et autres  \ninformations\nCe mémento ne donne qu’un aperçu des dispositions\
      \ en vigueur. Seu -\nles les dispositions légales et les conventions internationales font foi \ndans le règlement des\
      \ cas individuels. Sur demande, la Caisse suisse de \ncompensation à Genève ainsi que les représentations suisses à\
      \ l’étran -\nger (ambassade ou consulat) donnent de plus amples renseignements \net remettent les formulaires nécessaires.\n\
      Les désignations d’état civil ont également les significations suivantes : \n• mariage : partenariat enregistré;\n•\
      \ divorce : dissolution juridique du partenariat enregistré;\n• décès du conjoint : décès du partenaire enregistré.\n\
      Publié par le Centre d’information AVS/AI en collaboration avec  \nl’Office fédéral des assurances sociales.\nEdition\
      \ décembre 2024. Reproduction autorisée, sous condition d’un \naccord écrit du Centre d’information AVS/AI.\nCe mémento\
      \ est délivré par les caisses de compensation, leurs agences \net les offices AI. Numéro de commande 10.03. Il est également\
      \ dispo -\nnible sous www.avs-ai.ch .\f36Informazioni per i cittadini degli Stati \ncon i quali la Svizzera non ha concluso\
      \ \nuna convenzione di sicurezza sociale \n(Stati non contraenti)\nIn breve\nI cittadini degli Stati non contraenti\
      \ che sono domiciliati in Svizzera pos -\nsono far valere il loro diritto alle prestazioni del sistema di sicurezza\
      \  \nsociale svizzero. La sicurezza sociale in Svizzera è basata sul cosiddetto \nsistema dei tre pilastri. L’AVS, l’AI\
      \ e le loro prestazioni complementari (PC) \nformano il 1° pilastro obbligatorio destinato a coprire i bisogni vitali.\
      \ La \nprevidenza professionale (cassa pensioni) forma il 2° pilastro: permette alle \npersone assicurate e ai loro\
      \ superstiti di mantenere in maniera appropriata il \nloro tenore di vita anteriore al momento in cui si verifica il\
      \ caso di previdenza  \n(vecchiaia, decesso o invalidità). Il 3° pilastro infine, la previdenza privata \n(risparmio,\
      \ assicurazioni private), completa i primi due ed è facoltativo.\nIl presente opuscolo fornisce una visione generale\
      \ dell’obbligo assicurativo \ne del diritto alle prestazioni per il 1° e 2° pilastro e si rivolge a tutti i cittadini\
      \ \ndegli Stati con i quali la Svizzera non ha concluso nessuna convenzione di \nsicurezza sociale.\nLa Svizzera ha\
      \ concluso una convenzione di sicurezza sociale con  \ni seguenti Stati: \nStati membri dell’UE Cina (assoggettamento)\
      \ Montenegro\nStati membri dell‘AELS Corea del Sud (assoggettamento) Regno Unito\nAlbania Filippine San Marino\nAustralia\
      \ Giappone  Serbia \nBosnia e Erzegovina India (assoggettamento) Stati Uniti\nBrasile Israele Tunisia\nCanada/Quebec\
      \ Kosovo Turchia\nCile Macedonia del Nord Uruguay\nL’elenco degli Stati con i quali la Svizzera ha concluso una conven\
      \ -\nzione di sicurezza sociale è disponibile sul sito Internet dell’Ufficio \nfederale delle assicurazioni sociali\
      \ (UFAS): \nIl presente opuscolo vi concerne se siete cittadine o cittadini di uno Stato \nche non figura nella lista\
      \ (eccezione fatta per i/le superstiti delle cittadine o \ndei cittadini svizzeri o degli Stati contraenti).\f37Il sistema\
      \ svizzero di sicurezza sociale\n1 Come è organizzato il sistema svizzero  \ndi sicurezza sociale? \nLa sicurezza sociale\
      \ in Svizzera comprende i seguenti rami assicurativi:\n•  assicurazione per la vecchiaia, i superstiti e l’invalidità\
      \ (AVS/AI)\n•  previdenza professionale per la vecchiaia, i superstiti e l’invalidità (PP)\n•  assicurazione malattie\
      \ (AMal)\n•  assicurazione contro gli infortuni (AINF)\n•  assicurazione contro la disoccupazione (AD)\n•  assegni familiari\
      \ (AF)\n•  indennità di perdita di guadagno per chi presta servizio militare, civile \no di protezione civile, di maternità,\
      \ per l ’altro genitore, per i genitori \nche assistono un figlio con gravi problemi di salute dovuti a malattia o \n\
      infortunio o di adozione (IPG)\n•  prestazioni complementari (PC)\n•  prestazioni transitorie per i disoccupati anziani\
      \ (PTD).\n2 Sono assicurato per l’AVS/AI?\nL’AVS e l’AI sono assicurazioni generali obbligatorie per tutti coloro che\
      \ \nrisiedono o che esercitano un’attività lucrativa in Svizzera. All’obbligo legale \nassicurativo sottostanno per\
      \ principio anche i cittadini stranieri. \n3 Come posso conoscere il mio numero AVS?\nIl numero AVS figura sulla tessera\
      \ d’assicurazione malattie come pure sul \ncertificato d’assicurazione AVS/AI. Una persona assicurata, che non pos -\n\
      siede la tessera d’assicurazione malattie e neppure il certificato d’assicu -\nrazione AVS/AI può rivolgersi alla sua\
      \ cassa di compensazione al fine di \nottenere il certificato d’assicurazione. Il certificato d’assicurazione deve \n\
      essere conservato. La tessera d’assicurazione malattie o il certificato d’assi -\ncurazione AVS/AI deve essere presentato\
      \ ad ogni nuovo datore di lavoro e, \nall’atto di richiedere prestazioni, all’ufficio competente.\nImportante: nella\
      \ corrispondenza con le casse di compensazione il numero \nAVS deve sempre essere menzionato.\f38Contributi\n4 Quando\
      \ inizia l’obbligo di contribuzione per l’AVS/AI?\nLe persone senza attività lucrativa assicurate all’AVS e all’AI pagano\
      \ i cont -\nributi a partire dal 1° gennaio che segue il compimento dei 20 anni fino al \nraggiungimento dell’età di\
      \ riferimento. Per coloro che esercitano un’attività \nlucrativa l’obbligo di versare contributi comincia con l’inizio\
      \ dell’attività, ma \nnon prima del 1° gennaio che segue il compimento dei 17 anni.\n5 In che maniera vengono riscossi\
      \ i contributi all’"
  - source_sentence: Où dois-je déposer ma demande de moyens auxiliaires ?
    sentences:
    - "2.11 Contributi\nObbligo contributivo\nsulle indennità per lavoro\nridotto o per intemperie\nStato al 1° gennaio 2025\f\
      2In breve\nL’assicurazione contro la disoccupazione versa alle aziende un’indennità \nper lavoro ridotto o interruzioni\
      \ di lavoro, se quest’ultimo non può essere \nsvolto a causa di intemperie. \nIl datore di lavoro versa il salario ai\
      \ lavoratori il giorno usuale di paga. La \nperdita di guadagno va pagata all’80 per cento. Il datore di lavoro regola\
      \ \npoi le assenze dal lavoro con la cassa di disoccupazione.\nLa cassa di disoccupazione non copre la ‘perdita di salario\
      \ complessiva, ma \nsoltanto l’80 per cento di essa.\nL’indennità per lavoro ridotto o per intemperie può essere cal\
      \ -\ncolata in modo rapido e semplice grazie al calcolatore online:  \nwww.ahv-iv.ch/r/lavororidotto .\nQuesto opuscolo\
      \ informativo è destinato ai datori di lavoro e ai salariati.\nContributi alle assicurazioni sociali per i datori di\
      \ \nlavoro\n1 Quali contributi sociali vanno pagati? \nIn caso di diritto a indennità per lavoro ridotto o per intemperie,\
      \ il datore di \nlavoro è tenuto a pagare i contributi alle assicurazioni sociali sulla base del \ntempo di lavoro normale,\
      \ quindi del 100 per cento del salario. In questo \nmodo, i lavoratori mantengono interamente la propria copertura assicura\
      \ -\ntiva.\nEssi devono versare gli importi seguenti:\n•  contributi all’AVS, all’AI, alle indennità di perdita di guadagno\
      \ (IPG) e \nall’assicurazione contro la disoccupazione (AD);\n•  contributi alla cassa di compensazione per assegni\
      \ familiari;\n•  contributi alla previdenza professionale;\n•  premi all’assicurazione contro gli infortuni.\nViene\
      \ dedotta al salariato la sua parte dei contributi e dei premi, a condi -\nzione che esista un obbligo di contribuzione\
      \ paritetico (datore di lavoro e \nsalariato pagano ciascuno la metà) e salvo accordi diversi.\nLa cassa di disoccupazione\
      \ rimborsa al datore di lavoro i contributi padronali \nall’AVS/AI/IPG/AD per i periodi computabili di perdita di lavoro\
      \ unitamente \nal versamento delle indennità.\f32 Il lavoro ridotto si applica anche ai lavoratori a  \ndomicilio?\n\
      Sì. L’assicurazione contro la disoccupazione versa un’indennità per lavoro \nridotto anche ai lavoratori a domicilio.\
      \ Quale base di calcolo è applica -\nbile il guadagno medio mensile determinato dalla cassa di disoccupazione  \n(secondo\
      \ il modulo 1044Xi della SECO). Questo guadagno medio è utiliz -\nzato anche per il calcolo dei contributi delle assicurazioni\
      \ sociali per i mesi \nin cui esiste un diritto a un’indennità per lavoro ridotto.\nEsempio di calcolo\n3 Lavoro ridotto\
      \ in una fabbrica\nSalario in caso di tempo di lavoro normale\nSalario mensile, secondo contratto CHF 4 500.00\n6,4\
      \ % di deduzione per AVS, AI, IPG e AD -CHF 288.00\n2 % di deduzione per l’assicurazione contro  \ngli infortuni non\
      \ professionali-CHF 90.00\nDeduzione per la cassa pensioni -CHF 169.85\nSalario netto versato CHF 3 952.15\nTempo di\
      \ lavoro in caso di lavoro ridotto o di sospensione del lavoro:\nIn questo caso, l’orario di lavoro mensile regolare\
      \ nell’azienda ammonta \ncomplessivamente a 187 ore, con 22 giorni lavorativi e 42,5 ore settima -\nnali. A causa dell’orario\
      \ ridotto, secondo il controllo dell’orario aziendale in \nquesto mese sono state lavorate solo 51 ore, il che significa\
      \ che sono state \nperse 136 ore.\nLa perdita di guadagno dovuta all’orario ridotto viene calcolata sulla base \ndelle\
      \ ore di lavoro perse. Poiché la cassa di disoccupazione copre l’80 per \ncento della perdita di salario, si determina\
      \ la perdita di salario per le 136 ore \nperse e si calcola l’indennità per lavoro ridotto su questa base.\nTempo di\
      \ lavoro medio mensile:\n52 settimane x 42,5 ore ÷ 12 mesi = 184,17 ore\nSalario di base per un’ora:\n4 500 franchi\
      \ salario di base mensile ÷ 184,17 ore mensili = 24.43 franchi\nIndennità per lavoro ridotto (80 % del salario di base\
      \ andato perso):\n136 ore di lavoro andate perse x 24.43 franchi l’ora x 0,8 = 2 658 franchi\f4Chiarimenti e altre \
      \ \ninformazioniSalario in caso di lavoro ridotto\nSalario mensile, secondo contratto CHF 4 500.00\nRiduzione del salario\
      \ lordo: 136 ore x CHF 24.43 -CHF 3 322.50\nSalario lordo per ore di lavoro prestate CHF 1 177.50\nIndennità per lavoro\
      \ ridotto 80 % di CHF 3 322.50 CHF 2 658.00\nSalario lordo CHF 3 835.50\nDeduzioni in base al salario contrattuale di\
      \ CHF 4 500\n6,4 % per AVS, AI, IPG e AD -CHF 288.00\n2 % per l’assicurazione contro gli infortuni  \nnon professionali-CHF\
      \ 90.00\nDeduzione per la cassa pensioni -CHF 169.85\nSalario netto netto compresa  \nl’indennità per lavoro ridottoCHF\
      \ 3 287.65\nIl datore di lavoro versa questo importo al salariato il giorno in cui viene \nnormalmente effettuato il\
      \ pagamento. \nQuesto opuscolo informativo presenta solo una panoramica riassun -\ntiva. Per la valutazione dei singoli\
      \ casi fanno stato esclusivamente le \ndisposizioni legali in vigore. Per ulteriori informazioni ci si può rivolgere\
      \ \nalle casse di compensazione o alle loro agenzie. L’elenco delle casse di \ncompensazione è pubblicato all’indirizzo\
      \ Internet www.avs-ai.ch .\nPer ulteriori informazioni sulle prestazioni dell’assicurazione contro \nla disoccupazione\
      \ ci si può rivolgere alle casse di disoccupazione o \nconsultare il portale dell’assicurazione contro la disoccupazione,\
      \  \nwww.lavoro.swiss .\nPubblicato dal Centro d’informazione AVS/AI in collaborazione con \nl’Ufficio federale delle\
      \ assicurazioni sociali e l’ufficio di compensazione \ndell’assicurazione contro la disoccupazione.\nEdizione novembre\
      \ 2024. La riproduzione, anche solo parziale, è  \nautorizzata soltanto con il consenso scritto del Centro d’informazione\
      \ \nAVS/AI.\nQuesto opuscolo informativo può essere richiesto alle casse di compen -\nsazione, alle loro agenzie e agli\
      \ uffici AI. Numero di ordinazione 2.11/i.  \nÈ disponibile anche su www.avs-ai.ch .\n2.11-25/01-I"
    - "3.02 Prestations de l’AVS\nMoyens auxiliaires de l’AVS\nEtat au 1er janvier 2024\f2En bref\nVous avez droit à des moyens\
      \ auxiliaires de l’AVS si vous avez votre domicile \nen Suisse, que vous avez atteint l’âge de référence et percevez\
      \ une rente \ncomplète ou des prestations complémentaires. \nSi vous avez bénéficié de moyens auxiliaires de l’AI ou\
      \ d’une contribution \nfinancière à leur acquisition avant de percevoir une rente complète de ma -\nnière anticipée\
      \ ou avant d’atteindre l’âge de référence, vous conservez le \ndroit à ces prestations tant que les conditions d’octroi\
      \ de l’AI sont remplies. \nDépôt de la demande\n1 Où dois-je déposer ma demande de moyens auxiliaires ?\nVous pouvez\
      \ déposer votre demande de moyens auxiliaires, au moyen du \nformulaire 009.001 - Demande Moyens auxiliaires de l’AVS\
      \ , auprès de  \nl’office AI de votre canton de domicile.\n2 Quels moyens auxiliaires sont remboursés ?\nL’AVS prend\
      \ généralement en charge, indépendamment du revenu et de la \nfortune de la personne assurée, les coûts des moyens auxiliaires\
      \ suivants : \nMoyens auxiliaires Pris en charge Fréquence\nPerruques max. CHF 1 000.00 1 an\nChaussures orthopédiques\
      \ sur mesure \net chaussures orthopédiques de série 75 % du prix net 1 an\nEpithèses faciales 75 % du prix net 2 ans\n\
      Appareils orthophoniques après  \nopération du larynx75 % du prix net 5 ans\nAppareils acoustiques    monaural  \nbinauralCHF\
      \ \nCHF630.00  \n1 237.505 ans\nLunettes-loupesmonoculaires \nbinoculairesCHF \nCHF590.00  \n900.005 ans\nTélé-loupes\
      \  monoculaires \nbinoculairesCHF \nCHF1 334.00   \n2 048.005 ans\nFauteuils roulants sans moteur CHF 900.00 5 ans\n\
      Vous trouverez des informations complémentaires sur les appareils auditifs \ndans le mémento 3.07 - Appareils auditifs\
      \ de l’AVS.\f3Contribution aux coûts dans le cadre des prestations \ncomplémentaires (PC)\n3 A quelle contribution financière\
      \ puis-je prétendre si je \ntouche des PC ?\nSi vous avez atteint l’âge de référence, touchez une rente de vieillesse\
      \ \ncomplète ou des prestations complémentaires et que vous avez besoin de \nmoyens auxiliaires, le service compétent\
      \ examine si l’AVS peut, dans le cadre \nde ces prestations, prendre en charge la part des coûts que vous devriez as\
      \ -\nsumer vous-même. Dans le cadre des prestations complémentaires, d’autres \nmoyens auxiliaires ainsi que certains\
      \ appareils de soins et de traitement \npeuvent être financés ou remis à titre de prêt.\nRemise ou prise en charge de\
      \ moyens auxiliaires par \nPro Senectute\n4 Quand puis-je faire appel à Pro Senectute ?\nVous pouvez faire appel à Pro\
      \ Senectute si vous avez atteint l’âge de ré -\nférence ou touchez une rente de vieillesse complète de manière anticipée,\
      \ \nmais que vous n’avez pas droit à des moyens auxiliaires de l’AVS ou pris \nen charge dans le cadre des prestations\
      \ complémentaires. Pro Senectute \nest la plus grande organisation spécialisée et de services de Suisse pour les \n\
      personnes âgées. Elle octroie des contributions complémentaires ou remet \ndes moyens ou des appareils auxiliaires à\
      \ titre de prêt. Il n’existe cependant \naucun droit légal à ces prestations.\nSi vous souhaitez bénéficier de telles\
      \ prestations, vous pouvez vous adres -\nser au bureau de consultation Pro Senectute le plus proche. Le secrétariat\
      \ \nromand de Pro Senectute vous fournira toutes les informations souhaitées.\nPro Senectute Suisse  \nRue du Simplon\
      \ 23 / Case postale  \n1800 Vevey  \nTél.  021 925 70 10  \ninfo@prosenectute.ch  \nwww.prosenectute.ch\f4Renseignements\
      \ et autres  \ninformations\nCe mémento ne donne qu’un aperçu des dispositions en vigueur. Pour \nle règlement des cas\
      \ individuels, seules les dispositions légales font foi. \nLes caisses de compensation et leurs agences fournissent\
      \ volontiers \ntous les renseignements utiles. Vous trouverez la liste complète des \ncaisses de compensation sur le\
      \ site www.avs-ai.ch .\nPublié par le Centre d’information AVS/AI en collaboration avec  \nl’Office fédéral des assurances\
      \ sociales.\nRéimpression novembre 2024. Toute reproduction, même partielle, \nn’est autorisée qu’avec l’accord écrit\
      \ du Centre d’information AVS/AI. \nCe mémento peut être obtenu auprès des caisses de compensation et \nde leurs agences\
      \ ainsi qu’auprès des offices AI. Numéro de commande \n3.02/f. Il est également disponible sous www.avs-ai.ch .\n Plus\
      \ d’informations, de publications et de vidéos explicatives.\n3.02-24/01-F"
    - "2.14 Contributi\nLotta contro   \nStato al 1° gennaio 2025il fallimento abusivo\f2In breve\nIn linea di principio,\
      \ uno degli obiettivi principali del diritto fallimentare è \ndi dare agli imprenditori che hanno dichiarato fallimento\
      \ l’opportunità di \nriprendere un’attività economica. Tuttavia in passato si è spesso constatato \nche il diritto fallimentare\
      \ era anche sfruttato per sottrarsi ai propri obblighi. \nLa modifica della legge federale dell’11 aprile 1889 sulla\
      \ esecuzione e sul \nfallimento (LEF), in vigore dal 1° gennaio 2025, mira ad impedire i fallimenti \nabusivi.\nFinora\
      \ le istituzioni di diritto pubblico, tra cui figurano anche le casse di \ncompensazione, dovevano incassare i contributi\
      \ attraverso la via del pigno -\nramento. Nel caso dell’esecuzione in via di pignoramento finora applicata, \ni debitori\
      \ avevano un anno di tempo circa per pagare i contributi dovuti \nprima che venisse rilasciato l’attestato di carenza\
      \ di beni dopo il pigno -\nramento. In caso di inadempienza, i titolari delle imprese non subivano \npraticamente alcuna\
      \ conseguenza, ma potevano mantenere l’impresa e \ncontinuare la loro attività, persino quando ai loro creditori erano\
      \ già stati \nconsegnati diversi attestati di carenza di beni dopo pignoramento. Com’è \npossibile? Non appena viene\
      \ rilasciato un attestato di carenza di beni dopo \npignoramento, nella maggior parte dei casi il denaro dovuto ai creditori\
      \ è \nda considerare perduto poiché difficilmente la situazione finanziaria del \ndebitore migliora.\nNell’ambito dell’esecuzione\
      \ in via di pignoramento applicata in futuro, i \ncreditori dovranno saldare i contributi dovuti entro un termine molto\
      \ più \nstretto. Le imprese e i lavoratori indipendenti che non sono in grado di \nadempiere ai loro obblighi finanziari\
      \ vengono invitati dal tribunale a saldare \nle fatture aperte nel quadro di una procedura d’esecuzione (generalmente\
      \ \ntre mesi dopo la scadenza del termine di pagamento). Se non avviene alcun \npagamento, il tribunale competente dichiara\
      \ fallimento e l’impresa viene \nchiusa.\nLe esecuzioni e le procedure di fallimento comportano per i debitori spese\
      \ \ne difficoltà considerevoli che possono essere evitate pagando gli importi \nrichiesti entro il termine previsto\
      \ o concludendo un relativo accordo di pa -\ngamento.\nIl presente opuscolo informa sugli aspetti principali della procedura\
      \ di falli -\nmento e sulle loro conseguenze.\f3Crediti contributivi AVS in sospeso\n1 Chi è soggetto alla procedura\
      \ di fallimento?\nSono soggetti alla procedura di fallimento le persone giuridiche e i lavo -\nratori indipendenti iscritti\
      \ nel registro di commercio. La procedura non \nconcerne invece le persone iscritte a una cassa di compensazione come\
      \ \npersone senza attività lucrativa o datori di lavoro non tenuti a pagare con -\ntributi.\n2 Quali opzioni vi sono\
      \ dopo la comminatoria di  \nfallimento?\nSe il debitore non fa opposizione contro il precetto esecutivo notificato\
      \ \no la stessa è stata rigettata, la cassa di compensazione può chiedere la \ncontinuazione dell’esecuzione. L’ufficio\
      \ di esecuzione gli notifica la com -\nminatoria di fallimento. Dopo la comminatoria di fallimento, il debitore ha \n\
      ancora la possibilità di pagare tutti i contributi in sospeso, comprese le \nspese di procedura.\nLa cassa di compensazione\
      \ può presentare la richiesta di fallimento al giu -\ndice del fallimento al più presto 20 giorni dopo la notifica della\
      \ commi -\nnatoria di fallimento e al più tardi 15 mesi dopo la notifica del precetto \nesecutivo. Il giudice del fallimento\
      \ verifica se sono adempiute le condizioni \nper l’apertura della procedura di fallimento. Fino alla presentazione della\
      \ \nrichiesta di fallimento da parte della cassa di compensazione, il debitore \npuò evitare il fallimento pagando gli\
      \ arretrati. Spetta alla cassa di compen -\nsazione decidere se il pagamento può essere effettuato con un versamento\
      \ \nuna tantum o a rate.\n3 Come evitare il fallimento?\nPer evitare il fallimento, il debitore deve pagare tutti gli\
      \ arretrati prima che \nla cassa di compensazione presenti la richiesta di fallimento o che il giudice \ndel fallimento\
      \ dichiari il fallimento.\n4 Quali sono le conseguenze di un fallimento?\nDopo la dichiarazione di fallimento, il debitore\
      \ non può più portare avanti \nla sua impresa nella stessa forma. Il patrimonio pignorabile diviene massa \ndel fallimento\
      \ e non può più essere utilizzato. La massa del fallimento viene \nutilizzata per coprire i crediti aperti. Dopo la\
      \ liquidazione, le persone giuri -\ndiche vengono cancellate dal registro di commercio e cessano di esistere.\f4Chiarimenti\
      \ e altre  \ninformazioniSe il debitore è iscritto nel registro di commercio quale organo di una per -\nsona giuridica,\
      \ la cassa di compensazione valuta se far valere nei suoi con -\nfronti una domanda di risarcimento e se depositare\
      \ una denuncia penale.\n5 Dopo un fallimento è possibile riprendere un’attività?\nSe il debitore è stato condannato\
      \ da un tribunale penale a una pena de -\ntentiva superiore a sei mesi, il giudice può interdirgli in tutto o in parte\
      \ \nl’esercizio dell’attività in questione o di altre attività analoghe per un tempo \nda sei mesi a cinque anni (art.\
      \ 67 CP). Le autorità di perseguimento penale \nannunciano sistematicamente le interdizioni di attività alle autorità\
      \ del re -\ngistro di commercio. Se le società e le persone interessate non eseguono \nda sole tale interdizione, l’Ufficio\
      \ del registro di commercio deve disporre \nd’ufficio misure adeguate, per esempio la cancellazione delle persone inte\
      \ -\nressate dal registro di commercio.\nQuesto opuscolo informativo presenta solo una panoramica riassun -\ntiva. Per\
      \ la valutazione dei singoli casi fanno stato esclusivamente le \ndisposizioni legali in vigore. Per ulteriori informazioni\
      \ ci si può rivolgere \nalle casse di compensazione o alle loro agenzie. L’elenco delle casse di \ncompensazione è pubblicato\
      \ all’indirizzo Internet www.avs-ai.ch .\nPubblicato dal Centro d’informazione AVS/AI in collaborazione con \nl’Ufficio\
      \ federale delle assicurazioni sociali.\nEdizione ottobre 2024. La riproduzione, anche solo parziale, è autoriz -\n\
      zata soltanto con il consenso scritto del Centro d’informazione AVS/AI. \nÈ disponibile anche su www.avs-ai.ch . \n\
      2.14-25/01-I"
  - source_sentence: Quali sono i requisiti per ottenere una rendita vedovile per le donne sposate?
    sentences:
    - "4.12 Leistungen der IV\nEingliederungsorientierte \nBeratung, Früherfassung  \nStand am 1. Januar 2024und Frühintervention\f\
      2Auf einen Blick\nDie eingliederungsorientierte Beratung, die Früherfassung und die Frühin -\ntervention sind präventive\
      \ Mittel der Invalidenversicherung (IV) und drei \nverschiedene Phasen im IV-Verfahren, die es zu unterscheiden gilt.\n\
      Mit der eingliederungsorientierten Beratung bietet die IV-Stelle unabhän -\ngig von einem konkreten Fall Beratungsgespräche\
      \ und allgemeine Informa -\ntionen zur IV an. \nIm Rahmen der Früherfassung sollen arbeitsunfähige, von Arbeitsunfähig\
      \ -\nkeit oder von Invalidität bedrohte Personen so rasch wie möglich mit Fach -\npersonen der IV in Kontakt treten.\
      \ Sobald der Kontakt hergestellt ist, wird \nmöglichst schnell darüber entschieden, ob eine IV-Anmeldung notwendig \n\
      ist. \nSobald eine IV-Anmeldung eingereicht wird, prüft die zuständige IV-Stelle \ngemeinsam mit der versicherten Person\
      \ und den involvierten Partnern, ob \ngeeignete Frühinterventionsmassnahmen den Erhalt des Arbeitsplatzes \noder eine\
      \ rasche Reintegration ins Arbeitsleben ermöglichen können.\nDieses Merkblatt informiert Versicherte, Eingliederungsakteure\
      \ sowie Mel -\ndeberechtigte über die eingliederungsorientierte Beratung, die Früherfas -\nsung und die Frühintervention.\n\
      \ \f3Eingliederungsorientierte Beratung\n1 Was ist eine eingliederungsorientierte Beratung?\nDie eingliederungsorientierte\
      \ Beratung umfasst niederschwellige und fall-  \nunabhängige Beratungsgespräche durch die IV-Stelle. Darunter fallen\
      \ bei -\nspielsweise allgemeine Informationen über den Auftrag und die Leistungen \nder IV, über den Umgang mit Erkrankungen\
      \ am Arbeitsplatz, die Meldung \nzur Früherfassung oder die Anmeldung für IV-Leistungen.\n2 An wen richtet sich die\
      \ eingliederungsorientierte  \nBeratung?\nDie eingliederungsorientierte Beratung richtet sich an versicherte Perso -\n\
      nen, Arbeitgebende, behandelnde Ärzte sowie betroffene Akteure des \nSchul- und Bildungswesens auf deren Ersuchen hin.\n\
      3 Besteht ein Rechtsanspruch auf eingliederungs-  \norientierte Beratung?\nEs besteht kein Rechtsanspruch auf eingliederungsorientierte\
      \ Beratung.\f4Früherfassungsphase \nFrüherfassung\n4 Was ist eine Früherfassung?\nDie Früherfassung zielt darauf ab,\
      \ dass die IV-Stelle so früh wie möglich mit \nPersonen in Kontakt tritt, die aus gesundheitlichen Gründen arbeitsunfähig\
      \ \noder von Arbeitsunfähigkeit bedroht sind und bei denen die Gefahr einer \nChronifizierung der gesundheitlichen Beschwerden\
      \ besteht. Kommt die \nIV-Stelle zum Schluss, dass ohne geeignete Massnahmen eine Invalidität \ndroht, fordert sie die\
      \ betroffene Person auf, sich bei der IV anzumelden. \nDie Früherfassung ermöglicht der IV ein rasches Eingreifen und\
      \ präventives \nVorgehen zugunsten der beruflichen Eingliederung. \n5 Können Jugendliche zur Früherfassung gemeldet\
      \  \nwerden?\nJa. Jugendliche und junge erwachsene Personen zwischen 13 und 25 Jah -\nren, können sich melden oder gemeldet\
      \ werden, wenn sie:\n•  von Invalidität bedroht sind, \n•  noch keine Erwerbstätigkeit ausgeübt haben und \n•  sich\
      \ in einem kantonalen Brückenangebot befinden oder von einer \nkantonalen Koordinationsstelle für Jugendliche in ihrer\
      \ beruflichen Ein -\ngliederung unterstützt werden.\nAuch Jugendliche, die bereits erwerbstätig waren und erwachsene\
      \ Perso -\nnen, die arbeitsunfähig oder von Arbeitsunfähigkeit bedroht sind, können \nsich melden oder gemeldet werden.\n\
      Meldung zur Früherfassung\n6 Wer kann eine Meldung einreichen?\nFolgende Personen und Instanzen können eine Meldung\
      \ einreichen:\n•  die versicherte Person sowie ihre gesetzliche Vertretung\n•  die mit der versicherten Person im gemeinsamen\
      \ Haushalt lebenden \nFamilienangehörigen \n•  die Arbeitgebenden\n•  die behandelnden Ärzte und Chiropraktiker \n•\
      \  der Krankentaggeldversicherer\f5•  die privaten Versicherungsunternehmen, die eine Krankentaggeld- \noder Rentenversicherung\
      \ anbieten\n•  der Unfallversicherer\n•  die Einrichtungen der beruflichen Vorsorge\n•  die Arbeitslosenversicherung\n\
      •  die Sozialhilfeorgane\n•  die Militärversicherung\n•  der Krankenversicherer\n•  die kantonalen Instanzen und Durchführungsstellen,\
      \ die für die Unter -\nstützung und die Förderung der beruflichen Eingliederung von Jugend -\nlichen zuständig sind\n\
      7 Wie erfolgt die Meldung?\nDie Meldung ist schriftlich bei der IV-Stelle des Wohnsitzkantons der ver -\nsicherten Person\
      \ einzureichen. Das Formular kann bei den IV-Stellen, den \nAusgleichskassen und deren Zweigstellen sowie unter www.ahv-iv.ch\
      \  be-\nzogen werden.\n8 Wird die versicherte Person vorgängig über die  \nMeldung informiert?\nJa. Personen und Instanzen,\
      \ die eine versicherte Person zur Früherfassung \nbei der IV-Stelle melden, müssen diese vorgängig darüber informieren.\n\
      9 Ist die Meldung zur Früherfassung eine Anmeldung für \nIV-Leistungen?\nNein. Die Meldung zur Früherfassung gilt nicht\
      \ als Anmeldung für Leistun -\ngen der IV. In der Früherfassungsphase werden keine Leistungen der IV \nzugesprochen.\f\
      6Früherfassungsgespräch\n10 Das Meldeformular wurde der IV-Stelle eingereicht,  \nwie geht es jetzt weiter?\nDie IV-Stelle\
      \ kann die gemeldete Person zu einem Gespräch einladen. In \ndiesem wird\n•  sie über den Zweck der Früherfassung informiert,\n\
      • eine Analyse ihrer medizinischen, beruflichen und sozialen Situation \nvorgenommen,\n•  sie darüber aufgeklärt, welche\
      \ Informationen die IV-Stelle bei wem ein -\nholt,\n• geprüft, ob eine IV-Anmeldung angezeigt ist.\n11 Wer kann an diesem\
      \ Gespräch teilnehmen?\nMit dem Einverständnis der versicherten Person können Dritte am Gespräch \nteilnehmen, zum Beispiel\
      \ die Person/Institution, welche den Fall gemeldet \nhat und/oder Arbeitgebende. Es steht der versicherten Person ebenfalls\
      \ \noffen, sich von einer Vertrauensperson begleiten zu lassen. Hält es die IV-\nStelle für angezeigt, kann auch ein\
      \ Arzt oder eine Ärztin des regionalen \närztlichen Dienstes (RAD) hinzugezogen werden.\n12 Wann erfolgt kein Gespräch?\n\
      Geht aus der Meldung bereits eindeutig hervor, dass eine sofortige  \nIV-Anmeldung angezeigt oder die IV nicht zuständig\
      \ ist, wird auf ein  \nGespräch verzichtet.\n13 Wo kann die IV-Stelle weitere Informationen einholen?\nGenügen die Informationen\
      \ aus dem Gespräch für den Entscheid nicht, \nkann die IV-Stelle mit der Vollmacht der versicherten Person weitere Infor\
      \ -\nmationen einholen, unter anderem bei medizinischem Fachpersonal, wei -\nteren Versicherungen, Arbeitgebenden oder\
      \ der Sozialhilfe.\nEnde der Früherfassungsphase\n14 Wann endet die Früherfassung?\nMit dem Eingang der IV-Anmeldung\
      \ oder der Mitteilung an die versicherte \nPerson, es sei keine solche nötig, endet die Früherfassungsphase. \f7Anmeldung\
      \ für IV-Leistungen\n15 Wer kann eine IV-Anmeldung einreichen?\nGrundsätzlich muss die versicherte Person die IV-Anmeldung\
      \ selbst einrei -\nchen. Auch ihr gesetzlicher Vertreter bzw. die Behörden oder Dritte, wel -\nche die Person regelmässig\
      \ unterstützen bzw. dauernd betreuen, können \neinen Anspruch auf Leistungen der IV geltend machen.\n16 Wie erfolgt\
      \ die Anmeldung?\nDie Anmeldung muss bei der IV-Stelle des Wohnsitzkantons der versicher -\nten Person eingereicht werden.\
      \ Das entsprechende Antragsformular kann \nbei den IV-Stellen, den Ausgleichskassen und deren Zweigstellen sowie un\
      \ -\nter www.ahv-iv.ch  bezogen werden. \nFrühinterventionsphase \nFrühintervention\n17 Was ist das Ziel der Frühintervention?\n\
      Ziel der Frühintervention ist es, durch rasches Handeln die Arbeits- und \nErwerbsfähigkeit der betroffenen Person möglichst\
      \ zu erhalten oder zu \nverbessern. Jugendliche, die bereits erwerbstätig waren, Arbeitsunfähige \noder von einer länger\
      \ dauernden Arbeitsunfähigkeit bedrohte Erwachsene, \nwerden dabei unterstützt, ihren Arbeitsplatz im bisherigen Betrieb\
      \ beizu -\nbehalten, bzw. betriebsintern oder in einem anderen Betrieb einen neuen \nArbeitsplatz zu übernehmen. \n\
      Mit den Frühinterventionsmassnahmen kann die IV auch Jugendliche und \njunge Erwachsene, die noch nicht erwerbstätig\
      \ waren und von einer Inva -\nlidität bedroht sind, frühzeitig auf dem Weg in eine berufliche Ausbildung \noder in eine\
      \ erste Anstellung im ersten Arbeitsmarkt unterstützen. \nDie Frühinterventionsphase beginnt mit der Einreichung der\
      \ IV-Anmeldung \nund erstreckt sich maximal über eine Dauer von zwölf Monaten.\f8Bestandsaufnahme\n18 Was beinhaltet\
      \ die Bestandsaufnahme?\nNach Eingang der IV-Anmeldung nimmt die IV-Stelle eine Bestandsauf -\nnahme vor. Diese hat\
      \ zum Ziel, ein umfassendes Bild von der Gesamt-  \nsituation der versicherten Person zu erhalten, das nebst den gesundheit\
      \ -\nlichen und beruflichen Aspekten, den Ressourcen und Einschränkungen \nauch die familiäre, soziale und finanzielle\
      \ Situation mitberücksichtigt. Ge -\nstützt auf diese Informationen entscheidet die IV-Stelle, ob Frühinterventi -\n\
      onsmassnahmen, Integrationsmassnahmen oder Massnahmen beruflicher \nArt angezeigt sind. \nAuf die Bestandsaufnahme kann\
      \ verzichtet werden, wenn aus der IV-An -\nmeldung hervorgeht, dass die Invalidenversicherung nicht zuständig, oder\
      \ \ndie Eingliederung nicht möglich ist oder wenn nicht die Frage der Einglie -\nderung oder der Rente im Zentrum steht,\
      \ sondern ein Hilfsmittel oder eine \nHilflosenentschädigung.\n19 Wer kann an der Bestandsaufnahme teilnehmen?\nDie\
      \ versicherte Person kann sich während der Bestandsaufnahme, die in \nForm eines oder mehrerer Gespräche stattfindet,\
      \ von weiteren Personen \nbegleiten lassen (z.B. Arbeitgebenden, behandelnde Ärztin oder behan -\ndelnder Arzt). Die\
      \ Gespräche werden von der Eingliederungsfachperson \ngeführt. Hält es die IV-Stelle für angezeigt, kann auch ein Arzt\
      \ oder eine \nÄrztin des regionalen ärztlichen Dienstes (RAD) hinzugezogen werden. \nEingliederungsplan \n20 Was beinhaltet\
      \ der Eingliederungsplan?\nGestützt auf die Bestandsaufnahme wird ein auf die versicherte Person \nzugeschnittener Eingliederungsplan\
      \ ausgearbeitet. Der Eingliederungsplan\n•  enthält die zu erreichenden Ziele und die vorgesehenen Massnahmen,\n•  regelt\
      \ die Kooperation zwischen den beteiligten Parteien,\n•  definiert die Verantwortlichkeiten und Fristen.\nAuf Basis\
      \ des Eingliederungsplanes kann eine Zielvereinbarung erstellt wer -\nden. \f921 Was sind Massnahmen der Frühintervention?\n\
      Massnahmen der Frühintervention sind: \nWährend der obligatorischen Schulzeit ab dem vollendeten 13. Altersjahr: \n\
      •  Berufsberatung\n•  Arbeitsvermittlung (Unterstützung bei der Suche nach einem Ausbil -\ndungsplatz)\nFür Jugendliche\
      \ nach der obligatorischen Schulzeit und für Erwachsene: \n•  Anpassungen des Arbeitsplatzes \n•  Ausbildungskurse \n\
      •  Arbeitsvermittlung (Unterstützung beim Arbeitsplatzerhalt und bei der \nStellensuche)\n•  Berufsberatung\n•  Sozialberufliche\
      \ Rehabilitation \n•  Beschäftigungsmassnahmen \n•  Beratung und Begleitung\n22 Besteht ein Rechtsanspruch auf  \nFrühinterventionsmassnahmen?\n\
      Nein. Es besteht kein Rechtsanspruch auf Frühinterventionsmassnahmen. \n23 Besteht Anspruch auf ein IV-Taggeld?\nNein.\
      \ Während der Durchführung dieser Massnahmen werden keine  \nTaggelder der IV ausbezahlt.\nEnde der Frühinterventionsphase\n\
      24 Wann endet die Frühintervention?\nDer Frühinterventionsprozess wird abgeschlossen durch einen Entscheid \nin Form\
      \ \n•  einer Mitteilung, dass der versicherten Person Integrationsmassnah -\nmen oder Massnahmen beruflicher Art gewährt\
      \ werden,\n•  der Mitteilung, die Rentenfrage werde geprüft, oder\n•  einer ablehnenden Leistungsverfügung.\f10Auskünfte\
      \ und weitere  \nInformationen\nDieses Merkblatt vermittelt nur eine Übersicht. Für die Beurteilung von \nEinzelfällen\
      \ sind ausschliesslich die gesetzlichen Bestimmungen mass -\ngebend. Die IV-Stellen, die Ausgleichskassen und ihre Zweigstellen\
      \  \ngeben gerne Auskunft. Ein Verzeichnis aller Ansprechpartner finden \nSie unter www.ahv-iv.ch .\nHerausgegeben von\
      \ der Informationsstelle AHV/IV in Zusammenarbeit \nmit dem Bundesamt für Sozialversicherungen.\nNachdruck November\
      \ 2024. Auch auszugsweiser Abdruck ist nur mit \nschriftlicher Einwilligung der Informationsstelle AHV/IV erlaubt. \n\
      Dieses Merkblatt kann bei den Ausgleichskassen und deren Zweig-  \nstellen sowie den IV-Stellen bezogen werden. Bestellnummer\
      \ 4.12/d. \nEs ist ebenfalls unter www.ahv-iv.ch  verfügbar.\n Weitere Informationen, Publikationen und Erklärvideos.\n\
      4.12-24/01-D"
    - "3.03 Prestazioni dell‘AVS\nRendite per superstiti\ndell’AVS\nStato al 1° gennaio 2025\f2In breve\nLe rendite per superstiti\
      \ hanno lo scopo di evitare che, al decesso del  \nconiuge, di uno o di entrambi i genitori, i superstiti vengano a\
      \ trovarsi in \ngravi difficoltà finanziarie. Vi sono tre categorie di rendite per superstiti: \n•  le rendite per vedove,\n\
      •  le rendite per vedovi,\n•  le rendite per orfani.\nAffinché una persona abbia diritto a una rendita per superstiti,\
      \ è necessario \nche alla persona deceduta si possa conteggiare almeno un anno di contri -\nbuzione completo.\nSi parla\
      \ di anno di contribuzione completo quando:\n•  la persona deceduta ha versato contributi complessivamente per un \n\
      anno, oppure\n•  la persona deceduta era assicurata e il coniuge ha versato il doppio del \ncontributo minimo almeno\
      \ per un anno, oppure\n•  alla persona deceduta si possono conteggiare accrediti per compiti \neducativi o assistenziali.\f\
      3Rendite per vedove\n1 Quali sono i requisiti che devono soddisfare le donne \nsposate per avere diritto alla rendita\
      \ vedovile?\nLe donne sposate il cui marito o la cui moglie è deceduto/a hanno diritto a \nuna rendita vedovile se all’insorgere\
      \ della vedovanza:\n•  hanno uno o più figli (di qualsiasi età). Sono considerati come figli an -\nche i figli del coniuge\
      \ deceduto che vivono nell’economia domestica \ncomune e, in seguito alla sua morte, hanno diritto a una rendita per\
      \ \norfani. Lo stesso vale per gli affiliati precedentemente affidati alle cure \ndei coniugi, a condizione che siano\
      \ in seguito adottati dalla vedova. \nÈ considerata vedova con figli anche la moglie della madre, se al mo -\nmento\
      \ della nascita del figlio era sposata con la madre e se il figlio è \nstato concepito secondo le disposizioni della\
      \ legge del 18 dicembre \n1998 sulla medicina della procreazione, e quindi sussiste un rapporto \ndi filiazione (art.\
      \ 255a cpv. 1 CC), o\n•  hanno compiuto 45 anni e sono state sposate per almeno cinque anni. \nSe hanno contratto più\
      \ matrimoni, si tiene conto della durata comples -\nsiva dei diversi matrimoni. Per le coppie di persone dello stesso\
      \ sesso \nche hanno convertito l’unione domestica registrata in matrimonio la \ndurata di quest’ultima viene aggiunta\
      \ agli anni di matrimonio.\n \f42 Quali sono i requisiti che devono soddisfare le donne \ndivorziate per avere diritto\
      \ alla rendita vedovile?\nLe donne divorziate il cui ex marito o la cui ex moglie è deceduto/a hanno \ndiritto a una\
      \ rendita vedovile:\n•  se hanno figli e il matrimonio è durato almeno dieci anni,\n•  se il divorzio è intervenuto\
      \ dopo che esse hanno compiuto 45 anni e il \nmatrimonio è durato almeno dieci anni,\n•  se il figlio più giovane ha\
      \ compiuto 18 anni dopo che la madre divor -\nziata ne ha compiuti 45.\nLe donne divorziate che non soddisfano alcuna\
      \ di queste condizioni hanno \ndiritto a una rendita vedovile finché il figlio più giovane compie 18 anni.\nÈ considerata\
      \ vedova con figli anche l’ex moglie della madre, se al mo -\nmento della nascita del figlio era sposata con la madre\
      \ e se il figlio è stato \nconcepito secondo le disposizioni della legge del 18 dicembre 1998 sulla \nmedicina della\
      \ procreazione, e quindi sussiste un rapporto di filiazione (art. \n255a cpv. 1 CC).\nSe l’unione domestica registrata\
      \ è stata convertita in matrimonio, la sua \ndurata viene aggiunta agli anni di matrimonio.\nRendite per vedovi\n3 Quali\
      \ sono i requisiti per il diritto alla rendita vedovile \ncome uomo sposato o come partner registrato?\nGli uomini sposati\
      \ la cui moglie o il cui marito è deceduta/o hanno diritto \na una rendita se all’insorgere della vedovanza hanno uno\
      \ o più figli (di \nqualsiasi età). Sono considerati come figli anche i figli del coniuge deceduto \nche vivono nell’economia\
      \ domestica comune e, in seguito alla sua morte, \nhanno diritto a una rendita per orfani. Lo stesso vale per gli affiliati\
      \ prece -\ndentemente affidati alle cure dei coniugi, a condizione che siano in seguito \nadottati dal vedovo. \nSe\
      \ un partner registrato decede, il partner superstite è equiparato, a pre -\nscindere dal sesso, a un vedovo. \f5Nella\
      \ sentenza dell’11 ottobre 2022, la Grande Camera della Corte euro -\npea dei diritti dell’uomo (Corte EDU) ha stabilito\
      \ che nel caso in esame vi \nfosse una disparità di trattamento contraria alla Convenzione europea dei \ndiritti dell’uomo\
      \ (CEDU), in quanto la rendita vedovile del ricorrente era \nstata soppressa quando il figlio più giovane aveva raggiunto\
      \ la maggiore \netà, il che non sarebbe avvenuto per una vedova nella stessa situazione. \nLa Svizzera deve conformarsi\
      \ a questa sentenza, passata in giudicato l’11 \nottobre 2022, e porre fine alla violazione del diritto constatata dalla\
      \ Corte \nEDU. Le basi legali devono quindi essere adeguate tenendo conto della \nprocedura legislativa. Quest’ultima\
      \ può essere relativamente lunga e si \nsvolgerà quindi solo in un secondo momento. Fino ad allora si applicherà \n\
      una regolamentazione transitoria per i vedovi con figli, entrata in in vigore \nl’11 ottobre 2022, secondo la quale\
      \ il diritto alla rendita per vedovi non si \nestinguerà più al compimento del 18° anno d’età da parte del figlio più\
      \ \ngiovane e la rendita verrà corrisposta oltre tale età. \nLa sentenza della Corte EDU non si applica né ai vedovi\
      \ né ai divorziati \nsenza figli. Sulla base di questa sentenza, i vedovi senza figli continuano \na non avere diritto\
      \ alla rendita vedovile e, nel caso di uomini divorziati, il \ndiritto alla stessa si estingue in ogni caso quando il\
      \ figlio più giovane rag -\ngiunge la maggiore età. La sentenza della Corte EDU non si applica nem -\nmeno ai casi in\
      \ cui la rendita per vedovi sia stata soppressa con decisione \npassata in giudicato prima dell’11 ottobre 2022 in seguito\
      \ al compimento \ndel 18° anno d’età da parte del figlio più giovane. \n4 Quali sono i requisiti che devono soddisfare\
      \ gli uomini \ndivorziati per avere diritto alla rendita vedovile? \nGli uomini divorziati la cui ex moglie o il cui\
      \ ex marito è deceduta/o hanno \ndiritto a una rendita vedovile finché hanno figli di età inferiore ai 18 anni. \f6Rendite\
      \ per orfani\n5 Quali sono i requisiti per il diritto alla rendita per  \norfani?\nIn caso di decesso di uno dei genitori,\
      \ l’AVS versa ai figli una rendita per \norfani. \nSe al momento della nascita del figlio la madre è sposata con una\
      \ donna e \nil figlio è stato concepito secondo le disposizioni della legge del 18 dicem -\nbre 1998 sulla medicina\
      \ della procreazione, la moglie della madre è consi -\nderata l’altro genitore (art. 255a cpv. 1 CC). In questi casi,\
      \ alla morte della \nmoglie della madre il figlio ha diritto a una rendita per orfani.\nIn caso di decesso di entrambi\
      \ i genitori, i figli hanno diritto a due rendite \nper orfani: una per ciascun genitore. Il diritto alla rendita per\
      \ orfani si estin -\ngue al 18° compleanno o al termine della formazione, ma al più tardi al \n25° compleanno. Per gli\
      \ affiliati vigono disposizioni particolari. I figli che \ndurante la formazione conseguono un reddito lordo dell’attività\
      \ lucrativa \nsuperiore a 30 240 franchi non hanno diritto a una rendita per orfani.\nInizio e fino del diritto\n6 Quando\
      \ nasce il diritto a una rendita per superstiti?\nIl diritto alla rendita per superstiti nasce il primo giorno del mese\
      \ successivo \na quello del decesso del coniuge (o dell’ex coniuge) o del genitore.\n7 Quando si estingue il diritto\
      \ a una rendita per  \nsuperstiti?\nIl diritto alla rendita per superstiti si estingue alla fine del mese in cui le\
      \ con -\ndizioni non sono più adempiute. In caso di nuove nozze cessa il diritto alla \nrendita vedovile. Il diritto\
      \ alle rendite per orfani continua invece a sussistere.\f7Concorso con altre prestazioni\n8 Quale delle rendite viene\
      \ versata?\nSe una persona adempie contemporaneamente le condizioni poste per una \nrendita per superstiti e per una\
      \ rendita di vecchiaia o d’invalidità, si versa \nsolo la rendita più elevata.\nRiscossione delle rendite per superstiti\n\
      9 Dove far valere il proprio diritto a una rendita per  \nsuperstiti?\nChi intende far valere il proprio diritto alla\
      \ rendita per superstiti deve rivol -\ngersi alla cassa di compensazione che, per ultima, ha incassato i contributi\
      \ \ndella persona deceduta. Il modulo 318.371 – Richiesta di una rendita per \nsuperstiti  può essere ottenuto presso\
      \ le casse di compensazione e le loro \nagenzie o sul sito internet www.avs-ai.ch . In seguito la domanda deve es -\n\
      sere inoltrata presso la cassa di compensazione competente.\nGli assicurati che hanno compiuto periodi assicurativi\
      \ in Svizzera e in uno \no più Stati membri dell’UE o dell’AELS possono semplicemente inoltrare \nla richiesta nel Paese\
      \ di domicilio: con questa richiesta prenderanno avvio \nanche le procedure necessarie in tutti gli altri Paesi interessati.\n\
      Se la persona deceduta non ha versato contributi AVS, il diritto a rendite \nper superstiti dev’essere fatto valere\
      \ presso la cassa di compensazione can -\ntonale oppure presso la sua agenzia.\nSe risiede all’estero, voglia consultare\
      \ la rubrica «Richiedere una rendita per \nsuperstiti» sul sito Internet della Cassa svizzera di compensazione (CSC):\
      \ \nwww.cdc.admin.ch\f8Calcolo delle rendite per superstiti\n10 Come si calcolano le rendite per superstiti?\nGli elementi\
      \ di calcolo delle rendite per superstiti sono:\n•  gli anni di contribuzione,\n•  i redditi da attività lucrativa e\n\
      •  gli accrediti per compiti educativi o assistenziali della persona deceduta.\nPer il calcolo degli anni di contribuzione\
      \ ai fini della rendita per vedovi e \nla rendita per orfani in seguito al decesso della (ex) moglie o della madre \n\
      vale quanto segue: gli anni di matrimonio trascorsi prima del 31 dicembre \n1996 (durante i quali la moglie era assicurata,\
      \ ma non tenuta a versare i \ncontributi) sono conteggiati come anni di contribuzione.\n11 Quando si percepisce una\
      \ rendita completa?\nI superstiti percepiscono una rendita completa (scala delle rendite 44) se \nla persona deceduta\
      \ ha versato contributi per l’intera durata contributiva, \nossia dal 1° gennaio dell’anno successivo al compimento\
      \ dei 20 anni fino \nal decesso.\n12 Quando si percepisce una rendita parziale?\nIn caso di durata di contribuzione\
      \ incompleta, vale a dire se la persona \ndeceduta non conta lo stesso numero di anni interi di contribuzione della\
      \ \nsua classe di età, è versata una rendita parziale (scala delle rendite 1-43). \nLa rendita parziale è calcolata\
      \ secondo il rapporto esistente tra gli anni di \ncontribuzione effettivi della persona deceduta e la durata di contribuzione\
      \ \ncompleta.\n13 A chi vengono conteggiati i cosiddetti anni giovanili?\nGli anni di gioventù sono i periodi di contribuzione\
      \ compiuti dai 18 ai 20 \nanni. Se la persona deceduta ha compiuto periodi di contribuzione fino \nai 20 anni, questi\
      \ le vengono conteggiati come anni giovanili per colmare \neventuali lacune contributive successive.\f914 I periodi\
      \ di contribuzione compiuti dopo l’età di  \nriferimento vengono conteggiati?\nSe la persona deceduta ha continuato\
      \ a lavorare dopo l’età di riferimento, \na determinate condizioni i periodi di contribuzione in questione possono \n\
      essere conteggiati per colmare eventuali lacune contributive o aumentare \nla rendita grazie al computo dei redditi\
      \ supplementari dell’attività lucrativa. \nDopo il raggiungimento dell’età di riferimento, un nuovo calcolo della ren\
      \ -\ndita può essere richiesto soltanto una volta. Se la persona deceduta non \nha chiesto un nuovo calcolo della rendita\
      \ di vecchiaia, i superstiti possono \npresentare una domanda in tal senso per la rendita per superstiti che la \nsostituirà.\
      \ \nPer ulteriori informazioni si veda l’opuscolo informativo 3.08 – Nuovo cal -\ncolo della rendita di vecchiaia dopo\
      \ l’età di riferimento .\n15 Com’è composto il reddito annuo medio?\nIl reddito annuo medio è composto:\n•  dalla media\
      \ dei redditi da attività lucrativa,\n•  dalla media degli accrediti per compiti educativi e\n•  dalla media degli accrediti\
      \ per compiti assistenziali.\nMedia dei redditi da attività lucrativa\n16 Come si calcola la media dei redditi da attività\
      \ lucrativa?\nLe rendite per superstiti sono calcolate sulla base dei redditi da attività  \nlucrativa conseguiti dalla\
      \ persona deceduta.\nPer calcolare la media dei redditi da attività lucrativa vengono sommati tutti \ni redditi realizzati\
      \ fino al 31 dicembre dell’anno precedente l’insorgenza \ndell’evento assicurato. I redditi conseguiti negli anni giovanili\
      \ sono presi \nin considerazione solo se servono a colmare lacune contributive sorte più \ntardi.\nI redditi da attività\
      \ lucrativa sono registrati sui cosiddetti conti individuali \n(CI) di ogni persona. \f1017 La somma dei redditi da\
      \ attività lucrativa viene  \nadeguata all’evoluzione dei prezzi e dei salari? Come?\nI redditi possono essere stati\
      \ conseguiti in anni in cui il livello dei salari era \npiù basso. La somma dei redditi è perciò rivalutata in base\
      \ all’evoluzione \nmedia dei prezzi e dei salari. La somma rivalutata è quindi divisa per il  \nnumero degli anni e\
      \ dei mesi computabili. Il risultato è la media dei redditi \nda attività lucrativa.\n18 Che cos’è il cosiddetto supplemento\
      \ di carriera?\nSe la persona deceduta non aveva ancora compiuto 45 anni al momento \ndel decesso, la media del reddito\
      \ da attività lucrativa è aumentata di un \nsupplemento percentuale (supplemento di carriera) in funzione dell’età.\n\
      In caso di decesso Percentuale\ndopo il compimento  \ndei… anniprima del compimento  \ndei… anni\n23 100\n23 24 90\n\
      24 25 80\n25 26 70\n26 27 60\n27 28 50\n28 30 40\n30 32 30\n32 35 20\n35 39 10\n39 45 5\f11Media degli accrediti per\
      \ compiti educativi e  \nassistenziali\n19 Che cosa sono gli accrediti per compiti educativi?\nNel calcolo della rendita\
      \ per superstiti, si può attribuire a una persona  \ndeceduta un accredito per compiti educativi per ogni anno in cui\
      \ si è occu -\npata di figli di età inferiore ai 16 anni. Questo accredito ammonta al triplo \ndella rendita minima\
      \ annua. Per le persone coniugate, l’accredito è diviso a \nmetà durante gli anni civili di matrimonio. Tuttavia, la\
      \ ripartizione interessa \nunicamente gli accrediti acquisiti durante il periodo tra il 1° gennaio che \nsegue il compimento\
      \ dei 20 anni e il 31 dicembre che precede il raggiun -\ngimento dell’età di riferimento da parte del coniuge più anziano.\
      \ La media \ndegli accrediti per compiti educativi si ottiene dividendo la somma degli \nstessi per il periodo di contribuzione\
      \ complessivo. \nNel caso dei genitori divorziati o non coniugati che esercitano l’autorità pa -\nrentale congiunta,\
      \ gli accrediti per compiti educativi vengono conteggiati, \ninteramente a uno dei genitori o per metà a ciascuno dei\
      \ due, in applica -\nzione della decisione del tribunale o dell’autorità di protezione dei minori e \ndegli adulti (APMA)\
      \ o sulla base della convenzione parentale. \nAl riguardo, si rimanda alle indicazioni dettagliate dell’opuscolo informa\
      \ -\ntivo 1.07 – Accrediti per compiti educativi .\n20 Che cosa sono gli accrediti per compiti assistenziali?\nAlle\
      \ persone decedute possono essere conteggiati accrediti per compiti assi -\nstenziali per gli anni in cui esse hanno\
      \ assistito parenti al beneficio di assegni \nper grandi invalidi che potevano essere facilmente raggiungibili. Sono\
      \ parifi -\ncati ai parenti i partner che convivono con gli assicurati nella medesima eco -\nnomia domestica ininterrottamente\
      \ da almeno cinque anni. Per gli anni in cui \nsi possono conteggiare accrediti per compiti educativi non vi è diritto\
      \ ad ac -\ncrediti per compiti assistenziali. L’importo dell’accredito per compiti assisten -\nziali ammonta al triplo\
      \ della rendita minima annua. Per le persone coniugate  \nl’accredito è diviso a metà durante gli anni civili di matrimonio.\
      \ Tuttavia, la \nripartizione interessa unicamente gli accrediti acquisiti durante il periodo \ntra il 1° gennaio che\
      \ segue il compimento dei 20 anni e il 31 dicembre che \nprecede il raggiungimento dell’età di riferimento da parte\
      \ del coniuge più \nanziano. Si ottiene la media degli accrediti per compiti assistenziali divi -\ndendo la somma degli\
      \ stessi per il periodo di contribuzione complessivo. \f12La richiesta d’iscrizione di accrediti per compiti assistenziali\
      \ deve essere \npresentata ogni anno per l’anno precedente alla cassa cantonale di com -\npensazione del luogo di domicilio\
      \ della persona assistita. A tale scopo va \nutilizzato il modulo 318.270 – Richiesta d’iscrizione di accrediti per\
      \ compiti \nassistenziali.\nAl riguardo, si rimanda alle indicazioni dettagliate dell’opuscolo informa -\ntivo 1.03\
      \ – Accrediti per compiti assistenziali .\nImporto delle rendite\n21 Quali sono gli importi attuali delle rendite?\n\
      In caso di durata completa di contribuzione, le rendite complete ordinarie \nammontano, a seconda del reddito medio,\
      \ a:\nminimo massimo\nCHF/mese CHF/mese\nRendita per vedove e vedovi 1 008.– 2 016.–\nRendita per orfani   504.– 1 008.–\n\
      Se, per lo stesso figlio, sono concesse due rendite per orfani oppure una \nrendita per orfani e una rendita per figli,\
      \ la somma delle due rendite non \ndeve superare l’importo di 1 512 franchi, ossia il 60 % dell’importo mas-\nsimo della\
      \ rendita di vecchiaia.\nPrestazioni complementari\n22 Chi ha diritto a prestazioni complementari?\nLe vedove, i vedovi\
      \ e gli orfani di modeste condizioni economiche hanno \ndiritto, a certe condizioni, a prestazioni complementari. Al\
      \ riguardo, si ri -\nmanda alle indicazioni dettagliate degli opuscoli informativi 5.01 – Presta -\nzioni complementari\
      \ all’AVS e all’AI  e 5.02 – Diritto a prestazioni comple -\nmentari all’AVS e all’AI .\nSe risiede all’estero, non\
      \ ha diritto alle prestazioni complementari all’AVS \ne all’AI.\f13Esempio di calcolo\n23 Decesso del marito o del padre\n\
      Un assicurato nato nel giugno 1975 muore nel marzo 2025. Lascia la  \nmoglie e due figli, nati nel 2007 e nel 2008.\
      \ Sono quindi computabili  \ncompiti educativi per 17 anni. Dal 1° aprile 2025 sono versate una rendita \nvedovile e\
      \ due rendite per orfani. Dal 1996 fino alla sua morte, il defunto \nha pagato ininterrottamente i contributi AVS; ai\
      \ suoi superstiti sono per -\ntanto concesse rendite complete ( scala delle rendite 44 ).\nLa media dei redditi da attività\
      \ lucrativa è calcolata come segue, \nsulla base dei conti individuali:\nSomma dei redditi conseguiti durante 29 anni\
      \  \ndi contribuzione, dal 1996 al 2024 CHF 1 600 000.–\nLa somma rivalutata divisa per la durata di  \ncontribuzione\
      \ determinante (29 anni) dà una  \nmedia dei redditi dell’attività lucrativa di CHF 55 172.–\nLa media degli accrediti\
      \ per compiti educativi viene calcolata \ncome segue:\nNumero di anni x il triplo della rendita  \nminima annua ÷ durata\
