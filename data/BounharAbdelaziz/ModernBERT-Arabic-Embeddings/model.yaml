      \ الميلاد. تم غزو مملكة يهوذا في وقت لاحق من قبل الإمبراطوريات البابلية والفارسية والهيلينية وكانت موجودة كمقاطعات يهودية\
      \ مستقلة. أدّت ثورة المكابيين الناجحة إلى السلالة الحشمونية المستقلة بحلول عام 110 قبل الميلاد، والتي أصبحت في عام 63\
      \ قبل الميلاد دولة تابعة للجمهورية الرومانية والتي نصبت لاحقًا سلالة الهيروديين في عام 37 قبل الميلاد، وفي عام 6 م أنشأت\
      \ مقاطعة يهودا الرومانية. استمرت يهودا كمقاطعة الرومانية إلى أن أدت الثورات اليهودية الفاشلة إلى تدمير واسع النطاق،\
      \ وإلى طرد السكان اليهود، وإلى إعادة تسمية المنطقة من يهودا إلى سوريا فلسطين. واستمر الوجود اليهودي في المنطقة إلى حد\
      \ ما عبر القرون. في القرن السابع الميلادي، استولى العرب على الإمبراطورية البيزنطية وظلّت البلاد في قبضة المسلمين حتى\
      \ الحملة الصليبية الأولى في عام 1099، تلاها الغزو الأيوبي عام 1187. مددت سلطنة المماليك المصرية سيطرتها على بلاد الشام\
      \ في القرن الثالث عشر حتى هزيمتها من قبل الدولة العثمانية في عام 1517. خلال القرن التاسع عشر، أدت الصحوة الوطنية بين\
      \ اليهود إلى تأسيس الحركة الصهيونية في الشتات تليها موجات من الهجرة إلى سوريا العثمانية ثم فلسطين الانتدابيّة لاحقًا.\n\
      \nفي عام 1947، اعتمدت الأمم المتحدة خطة تقسيم فلسطين توصي بإنشاء دول عربية ويهودية مستقلة والقدس الدولية. وتم قبول الخطة\
      \ من قبل الوكالة اليهودية، في حين رفضها القادة العرب. في العام التالي، أعلنت الوكالة اليهودية استقلال دولة إسرائيل،\
      \ وشهدت الحرب العربية-الإسرائيلية اللاحقة عام 1948 قيام إسرائيل على معظم أراضي الإنتداب السابقة، بينما كانت الضفة الغربية\
      \ وقطاع غزة تحت سيطرة الدول العربية المجاورة. خاضت إسرائيل منذ ذلك الحين عدة حروب مع الدول العربية، ومنذ حرب الأيام\
      \ الستة عام 1967 احتلت إسرائيل كل من الضفة الغربية ومرتفعات الجولان وقطاع غزة (لا تزال تعتبر محتلة بعد فك الارتباط في\
      \ عام 2005، على الرغم من أن بعض الخبراء القانونيين يعارضون هذا الإدعاء). ووسّعت قوانينها لتشمل مرتفعات الجولان والقدس\
      \ الشرقية، ولكن ليس الضفة الغربية. يعد احتلال إسرائيل للأراضي الفلسطينية هو أطول احتلال عسكري في العالم في العصر الحديث.\
      \ لم تسفر الجهود المبذولة لحل النزاع الإسرائيلي الفلسطيني عن التوصل إلى اتفاق سلام نهائي. ومع ذلك، تم توقيع معاهدات\
      \ السلام بين إسرائيل ومصر والأردن.\n\nفي قوانينها الأساسية، تُعرّف إسرائيل نفسها كدولة يهودية وديمقراطية ودولة أمة للشعب\
      \ اليهودي. تتمتع البلاد بديمقراطية ليبرالية (وهي واحدة من اثنتين من الدول فقط في منطقة الشرق الأوسط وشمال إفريقيا، والأخرى\
      \ هي تونس)، مع نظام برلماني، وتمثيل نسبي، واقتراع عمومي. رئيس الوزراء هو رئيس الحكومة والكنيست هو المجلس التشريعي. اعتبارًا\
      \ من عام 2019 يبلغ عدد سكانها حوالي 9 ملايين نسمة، إسرائيل هي دولة متقدمة وعضو في منظمة التعاون الاقتصادي والتنمية،\
      \ ولديها 31 أو 32 أكبر اقتصاد في العالم بحسب إجمالي الناتج المحلي. تتمتع إسرائيل بأعلى مستويات المعيشة في الشرق الأوسط،\
      \ وتحتل في المراكز الأولى بين دول العالم من حيث النسبة المئوية للمواطنين الحاصلين على تدريب عسكري، ومن حيث النسبة المئوية\
      \ للمواطنين الحاصلين على درجة في التعليم العالي، والإنفاق على البحث والتطوير حسب نسبة الناتج المحلي الإجمالي، وسلامة\
      \ المرأة، ومتوسط العمر المتوقع، والإبداع، والسعادة.\n\n التسمية \nبعد الاستقلال في عام 1948، تبنت البلاد رسمياً اسم\
      \ «دولة إسرائيل» (بالعبرية: מְדִינַת יִשְׂרָאֵל) بعدما تم رفض المقترحات التاريخية والدينية أرض إسرائيل، وصهيون ويهودا.\
      \ في الأسابيع الأولى من الاستقلال، اختارت الحكومة مصطلح «إسرائيلي» للدلالة على مواطن إسرائيل، مع الإعلان الرسمي الصادر\
      \ عن وزير الخارجية موشيه شاريت.\n\nتاريخياً استخدمت ألقاب مثل أرض إسرائيل وبنو إسرائيل للإشارة إلى مملكة إسرائيل الموحدة\
      \ والشعب اليهودي بأسره على التوالي. اسم «إسرائيل» (بالعبرية: יִשְׂרָאֵל؛ باليونانيَّة: Ἰσραήλ) مستمد من التوراة.Geoffrey\
      \ W. Bromiley, 'Israel,' in International Standard Bible Encyclopedia: E–J,Wm. B. Eerdmans Publishing, 1995 p. 907.\
      \  entry \"Jacob\". حيث في هذه العبارات تشير إلى يعقوب، والذي وفقًا للكتاب المقدس العبري، أعطي له الاسم بعد أن صارع\
      \ بنجاح مع ملاك الرب. وأصبح أبناء يعقوب الإثني عشر أسلاف بني إسرائيل، المعروفين أيضًا باسم قبائل إسرائيل الإثني عشر\
      \ أو بني إسرائيل. كان يعقوب وأبنائه قد عاشوا في كنعان، لكن أجبرتهم المجاعة على الذهاب إلى مصر لمدة أربعة أجيال، استمرت\
      \ 430 عامًا، حتى قاد موسى الإسرائيليين للعودة إلى كنعان كما تذكر التفاصيل في «سفر الخروج». أقدم قطعة أثرية معروفة تذكر\
      \ كلمة «إسرائيل» كمجموعة في لوحة مرنبتاح والتي تعود إلى عصور مصر القديمة، وتاريخها إلى أواخر القرن الثالث عشر قبل الميلاد.\n\
      \nتُعرف المنطقة أيضًا باسم الأراضي المقدسة، فهي مقدسة لجميع الأديان الإبراهيمية بما في ذلك اليهودية والمسيحية والإسلام\
      \ والمذهب التوحيدي الدرزي والعقيدة البهائية. تحت حكم الانتداب البريطاني (1920-1948)، كانت المنطقة بأسرها تعرف باسم فلسطين.\
      \ على مر القرون، كانت المنطقة معروفة من قبل مجموعة متنوعة من الأسماء الأخرى، بما في ذلك كنعان، والسامرة، ويهودا، واليهودية،\
      \ وسوريا فلسطين وسوريا الجنوبية.\n\n تاريخ \n\nيعود تاريخ التوسعات المبكرة لأشباه البشر من أفريقيا إلى بلاد الشام ما\
      \ قبل التاريخ، حيث تقع إسرائيل، إلى ما لا يقل عن 1.5 مليون سنة مضت بناءً على الآثار الموجودة في العبيدية في وادي الأردن\
      \ المتصدع، في حين أن أشباه البشر سخول وقفزة، وأحافير الإنسان العاقل. يعود تاريخها إلى 120 ألف سنة، وهي من أقدم الآثار\
      \ للإنسان العاقل الحديث تشريحيًا خارج إفريقيا. ظهرت الثقافة النطوفية في جنوب بلاد الشام بحلول الألفية العاشرة قبل الميلاد،\
      \ تلتها الثقافة الغسولية بحوالي 4500 قبل الميلاد.Bar-Yosef, Ofer (7 December 1998). \"The Natufian Culture in the Levant,\
      \ Threshold to the Origins of Agriculture\" (PDF). Evolutionary Anthropology. 6 (5): 159–177. \n\n العصرين البرونزي\
      \ والحديدي \n\nتم إثبات وجود الكنعانيين من الناحية الأثرية في العصر البرونزي الأوسط (2100-1550 قبل الميلاد). خلال العصر\
      \ البرونزي المتأخر (1550-1200 قبل الميلاد)، شكلت أجزاء كبيرة من كنعان دولًا تابعة تدفع الجزية للمملكة المصرية الجديدة.\
      \ ونتيجة لانهيار العصر البرونزي المتأخر، سقطت كنعان في حالة من الفوضى، وانهارت السيطرة المصرية على المنطقة تمامًا. هناك\
      \ أدلة على أن المراكز الحضرية مثل حاصور وبيت شان ومجدو وعقرون وأشدود وعسقلان قد تضررت أو دمرت كما ذكرت التوراة أيضا\
      \ تلك الأحداث: \nيظهر شعب يُدعى إسرائيل لأول مرة في لوحة مرنبتاح، وهي نقش مصري قديم يعود تاريخه إلى حوالي 1200 قبل الميلاد.\
      \ يُعتقد أن أسلاف بني إسرائيل شملوا الشعوب القديمة الناطقة بالسامية الأصلية في هذه المنطقة. : 78–79  وفقًا للرواية الأثرية\
      \ الحديثة، تفرع الإسرائيليون وثقافتهم من الشعوب الكنعانية وثقافاتهم من خلال تطوير ديانة أحادية مميزة - ولاحقًا توحيدية\
      \ - تتمحور حول الرب. لقد تحدثوا بشكل قديم من اللغة العبرية، المعروفة باسم العبرية الكتابية. وفي نفس الوقت تقريبًا، استقر\
      \ الفلسطينيون في السهل الساحلي الجنوبي.\n\nتجاهل علم الآثار الحديث إلى حد كبير تاريخية السرد الموجود في التوراة فيما\
      \ يتعلق بالآباء، والخروج وحكايات الغزو الموصوفة في سفر يشوع ، وبدلاً من ذلك ينظر إلى السرد على أنه يشكل الأسطورة الوطنية\
      \ لبني إسرائيل. ومع ذلك، يبدو أن بعض عناصر هذه التقاليد لها جذور تاريخية. \n\nهناك جدل حول الوجود المبكر لمملكتي إسرائيل\
      \ ويهوذا ومداهما وقوتهما. في حين أنه من غير الواضح ما إذا كانت هناك مملكة إسرائيلية متحدة على الإطلاق، يتفق المؤرخون\
      \ وعلماء الآثار على أن مملكة إسرائيل الشمالية كانت موجودة بحلول عام 900 ق.م.Finkelstein, Israel; Silberman, Neil Asher\
      \ (2001). The Bible unearthed: archaeology's new vision of ancient Israel and the origin of its stories (1st Touchstone\
      \ ed.). New York: Simon & Schuster. وأن مملكة يهوذا كانت موجودة في 850 قبل الميلاد. كانت مملكة إسرائيل الأكثر ازدهارًا\
      \ بين المملكتين وسرعان ما تطورت لتصبح قوة إقليمية؛ في أيام الأسرة العمرية، سيطرت على السامرة والجليل ووادي الأردن الأعلى\
