    sentences:
    - "8 مايو أو 8 أيَّار أو 8 مايس أو 8 نوَّار أو يوم 8 \\ 5 (اليوم الثامن من الشهر الخامس) هو اليوم الثامن والعشرون بعد\
      \ المئة (128) من السنوات البسيطة، أو اليوم التاسع والعشرون بعد المئة (129) من السنوات الكبيسة وفقًا للتقويم الميلادي\
      \ الغربي (الغريغوري). يبقى بعده 237 يوما لانتهاء السنة.\n\nأحداث \n 1879 - المخترع الأمريكي «جورج سيلدين» يتقدم بطلب\
      \ للحصول على براءة اختراع أول سيارة تسير بالبنزين.\n 1896 - اغتيال مبارك الصباح لأخيه الحاكم محمد بن صباح الصباح، واستيلاء\
      \ مبارك الصباح على الكويت.\n 1914 - تأسيس شركة أفلام باراماونت للإنتاج السينمائي.\n 1918 - نيكاراغوا تعلن الحرب على\
      \ النمسا والمجر وألمانيا أبان الحرب العالمية الأولى.\n 1921 - إلغاء عقوبة الإعدام في السويد.\n 1936 - فرنسا تصدر قرارًا\
      \ تعتبر فيه اللغة العربية لغة أجنبية في الجزائر.\n 1937 - تأسيس نادي الوداد الرياضي في المغرب.\n 1945 - وقوع مجازر كبيرة\
      \ في الجزائر راح ضحيتها حوالي 45000 قتيل وذلك بعد خروج الجزائريين في مظاهرات يطالبون فيها فرنسا بالوفاء بعهدها المتمثل\
      \ في إعطائهم الاستقلال عند نهاية الحرب العالمية الثانية وهو ما عرف باسم مجازر 8 ماي 1945.\n 1951 - إقرار عودة اليابان\
      \ إلى الأولمبياد.\n 1967 - تقديم الملاكم محمد علي كلاي للمحاكمة بتهمة التهرب من أداء الخدمة العسكرية في الجيش الأمريكي\
      \ الذي كان يخوض حربًا في فيتنام.\n 1968 - وزارة الصحة اليابانية تعلن أن مرض إتاي إتاي الذي ظهر في محافظة توياما هو وباء.\n\
      \ 1976 - انتخاب إلياس سركيس رئيسًا للجمهورية اللبنانية خلفًا للرئيس سليمان فرنجية وذلك قبل أربع شهور من نهاية ولايته\
      \ على أن يتسلم الرئاسة بعد نهاية ولاية الرئيس فرنجيّة.\n 1984 -\nالاتحاد السوفيتي يعلن مقاطعته للألعاب الأولمبية الصيفية\
      \ المقامة في مدينة لوس أنجلوس.\n الزعيم الليبي معمر القذافي يتعرض لمحاولة اغتيال فاشله.\n 2004 - السلطات الألمانية تلقي\
      \ القبض على طالب يبلغ من العمر 18 سنة يعتقد أنه المتسبب في إطلاق فيروس «ساسر» الذي عطل ما لا يقل عن 18 مليون جهاز كمبيوتر.\n\
      \ 2008 - البرلمان الروسي يوافق على تعيين الرئيس الأسبق فلاديمير بوتين رئيسًا للوزراء.\n2014 - تفجير بناء فندق الكارلتون\
      \ الأثري في حلب القديمة من قبل مقاتلي المعارضة السورية عبر نفق مفخخ حفر تحته، بدعوى أن الفندق كان يستخدم كمقر لعمليات\
      \ الجيش السوري.\n 2018 -\n فوز تحالف مهاتير محمد في الانتخابات العامة في ماليزيا بأغلبية 125 مقعد ليصبح رئيساً للوزراء\
      \ للمرة الثانية.\n الرئيس الأمريكي دونالد ترامب يُعلن انسحاب بلاده من الاتفاق النووي المُبرم مع إيران مُنذُ 2 نيسان\
      \ 2015.\n 2021 - مقتل 68 وإصابة 165 أغلبهم من الطالبات دون سن الثامنة عشرة في تفجيرات مدرسة طالبات في كابل بأفغانستان.\n\
      \ 2022 - حزب شين فين برئاسة ميشيل أونيل يتصدر نتائج انتخابات جمعية أيرلندا الشمالية، وهي المرة الأولى التي يفوز بها\
      \ حزب قومي بأكبر عدد من المقاعد.\n\nمواليد \n\n 1828 -\n جان هنري دونانت، رجل أعمال سويسري ومؤسس الصليب الأحمر حاصل\
      \ على جائزة نوبل للسلام عام 1901.\n مار شربل، قديس لبناني.\n 1884 - هاري ترومان، رئيس الولايات المتحدة الثالث والثلاثون.\n\
      \ 1893 - فرانسيس أويمت، لاعب غولف أمريكي.\n 1899 - فريدريش فون هايك، اقتصادي نمساوي / بريطاني حاصل على جائزة نوبل في\
      \ العلوم الاقتصادية عام 1974.\n 1902 - أندريه لووف، عالم أحياء دقيقة فرنسي حاصل على جائزة نوبل في الطب عام 1965.\n 1906\
      \ - روبرتو روسيليني، مخرج إيطالي.\n 1916 - جواو هافيلانج، رئيس أسبق للاتحاد الدولي لكرة القدم.\n 1934 - زين العشماوي،\
