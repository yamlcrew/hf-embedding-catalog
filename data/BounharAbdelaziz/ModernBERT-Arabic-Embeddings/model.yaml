    \ (2100-1550 قبل الميلاد). خلال العصر البرونزي المتأخر (1550-1200 قبل الميلاد)، شكلت أجزاء كبيرة من كنعان دولًا تابعة\
    \ تدفع الجزية للمملكة المصرية الجديدة. ونتيجة لانهيار العصر البرونزي المتأخر، سقطت كنعان في حالة من الفوضى، وانهارت السيطرة\
