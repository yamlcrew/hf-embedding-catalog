    sentences:
    - "يناير هو الشهر الأول في السنة في التقويم الغريغوري وواحد من السبعة شهور الغريغورية، ويتكوّن من 31 يوم. يسمى كانون الثاني\
      \ في بلاد الشام والعراق، وجانفي في تونس والجزائر. وهو في المتوسط أبرد شهور السنة في معظم نصف الأرض الشمالي (حيث أنه\
      \ الشهر الثاني لفصل الشتاء) وأحر شهور السنة في معظم نصف الكرة الجنوبي (حيث أنه الشهر الثاني لفصل الصيف). وهو شهر موسم\
      \ في نصف الكرة الجنوبي ويقابله شهر يوليو في النصف الشمالي.\n\nويبدأ يناير بنفس اليوم من الأسبوع كما في أكتوبر في السنة\
      \ العادية، وينتهي بنفس اليوم من الأسبوع كما في فبراير وأكتوبر. أما في السنة الكبيسة فيبدأ بنفس اليوم من الأسبوع كما\
      \ في أبريل ويوليو، وينتهي بنفس اليوم من الأسبوع كما في يوليو. وفي علم التنجيم يبدأ يناير عندما تكون الشمس في برج الجدي\
      \ وينتهي في برج الدلو أما فلكيا فيبدأ عندما تبدأ الشمس في برج القوس وتنتهى في برج الجدي.\n\nتاريخه \nتم تسمية الشهر\
      \ على اسم يناير \"Janus\" إله المداخل في ميثولوجيا رومانية. وهي آتية من اللاتينية والتي تعني الباب (ianua) حيث أن يناير\
      \ هو باب الدخول إلى السنة.\n\nيتكون التقويم الروماني الأصلي من 10 شهور (304 يوم). فقد اعتبر الرومان أن الشتاء فترة لا\
      \ تحتوي على شهور. وتقريبا في عام 713 قبل الميلاد قام رومولوس خليفة الملك نوما بومبيليوس بإضافة الشهور يناير وفبراير\
      \ ليصبح التقويم مساويا للسنة القمرية (354 يوم). وطبقا للخرافة الرومانية المضادة للأرقام الزوجية تم إضافة يوم ليصبح التقويم\
      \ (354 يوم). ومع أن مارس كان بالأصل هو الشهر الأول حسب التقويم الروماني القديم، إلا أنه تم نقل يناير مكانه حيث كان يتم\
      \ اختيار القنصل خلاله.\n\nويعرف الأول من يناير بيوم السنة الجديدة حيث تجري احتفالات صاخبة في شتّى أنحاء الأرض.\n\nالأسماء\
      \ التاريخية للشهر تتضمن الأصل الروماني، جانواريس. قام أهل ساكسونيا بتسميته شهر الذئب, وقام شارلمان بتسميته شهر الشتاء.\
      \ وفي التقويم الياباني يسمى موتسوكي (睦月). ويعرف اليوم الثاني من الشهر بالهاتسوميومي (初夢) واليوم السابع باسم ناناكوسا\
      \ (七草). وفي اللغة الفنلندية يسمي الشهر تاميكو والذي يعنى شهر البلوط.\n\nالإثنين الأول من يناير يعرف بإثنين الهدايا في\
      \ اسكتلندا وشمال إنجلترا. وتبدأ سنة الزراعة في إنجلترا بشراب الأحد يوم الأحد بعد عيد الغطاس.\n\nكما أن يوم البلوغ في\
      \ اليابان هو الإثنين الثاني في يناير، وهذا لمن سيصبح عمره 20 عامًا في التقويم السنوي الجديد، وهو عيد قومي. وهذا اليوم\
      \ كان يتم الاحتفال به منذ عام 1948 حتى 15 يناير عام 1999 حينما قررت الحكومة اليابانية إلغاء هذا اليوم لزيادة الإنتاج.\n\
      \nوعجلة العام في الوثنية الحديثة، ينتهى يناير عند أو بالقرب من إمبولك في نصف الكرة الشمالي ولونازا في نصف الكرة الجنوبي.\n\
      \nكما أن يناير هو الشهر الأول من العام الميلادي في معظم الدول العربية. أمّا في بلدان المغرب العربي، فيسمّى الشهر بالتسمية\
      \ الفرنسية «جانفي».وفي بلاد الشام، يسمُى يناير «كانون الثاني»، من التسمية السريانية «كانون أحراي» ܟܢܘܢ ܐܚܪܝ. ويذهب الدكتور\
      \ فريحة إلى القول بأنه مشتق من جذر سامي مشترك هو جذر «كن» ومعناه الأساس والثبوت والاستقرار لأن الناس ينقطعون فيه عن\
      \ العمل و«يكنّون» في دورهم.\n\nفي التقويم المصري، يُطلق عليه «طوبة».\n\nويسمى «ينّاير» الشهر الآول في التقويم الآمازيغي\
      \ الذي يوافق الثاني عشر من يناير.\n\nانظر أيضا \n\n قائمة الأحداث التاريخية\n\nمراجع \n\n \nشهور"
