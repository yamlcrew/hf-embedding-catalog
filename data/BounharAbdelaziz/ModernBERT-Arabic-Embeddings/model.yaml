    \ الساساني للقدس والثورة اليهودية قصيرة الأمد ضد هرقل في عام 614 م، أعادت الإمبراطورية البيزنطية تعزيز سيطرتها على المنطقة\
    \ في عام 628.\n\nفي 634-641 م، غزت الخلافة الراشدة بلاد الشام. على مدى القرون الستة التالية، انتقلت السيطرة على المنطقة\
