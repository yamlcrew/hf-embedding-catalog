  - "الدُّوَلُ الأعضاء في الأُمَمِ المُتَّحِدة هي مجموعة الدول ذات السيادة في العالم والبالغ عددها 193 دولة وتتمتع بعضوية\
    \ في الأمم المتّحدة، تُمثَّل هذه الدول تمثيلًا متساويًا في الجمعية العامة للأمم المتّحدة.\n\nترد معايير قبول الأعضاء الجدد\
    \ في الأمم المتحدة في الفصل الثاني، المادة 4 من ميثاق الأمم المتّحدة:\n العضوية في الأمم المتحدة مفتوحة لجميع الدول المحبة\
    \ للسلام التي تقبل الالتزامات المنصوص عليها في الميثاق الحالي، وهي (في رأي المنظمة) قادرة وراغبة في تنفيذها.\n تُقبل أية\
    \ دولة من هذه الدول في عضوية \"الأمم المتحدة\" بقرار من الجمعية العامة بناءً على توصية مجلس الأمن.\n\nتتطلب التّوصية الصادرة\
    \ عن مجلس الأمن المُتعلقة بالقبول أن يوافق تسعة على الأقل من أعضاء المجلس الخمسة عشر، مع عدم استخدام أي من الأعضاء الخمسة\
    \ دائمي العضوية حقهم في النقض. ويحتاج قبول الدولة بعد ذلك للنجاح في تصويت على توصية مجلس الأمن في الجمعية العامة بأغلبية\
    \ الثلثين.\n\nيمكن فقط أن تُصبح الدّول ذات السيادة أعضاء في الأمم المتّحدة، ولذلك فإن أعضاء الأمم المتّحدة كلهم في الوقت\
    \ الحالي دول ذات سيادة. مع ذلك، فإن خمسة أعضاء لم يكونوا ذوي سيادة عندما انضموا إلى الأمم المتّحدة، ولكنهم استقلوا تمامًا\
    \ بين عامي 1946 و1991. وبما أنه لا يمكن قبول أي دولة عضوًا في الأمم المتّحدة إلا بموافقة مجلس الأمن والجمعية العامة، فإن\
    \ عددًا من الدول ذات السيادة وفقًا لاتفاقية مونتيفيديو ليست أعضاء في الأمم المتّحدة، لأن الأمم المتّحدة لا تعاملها معاملة\
    \ الدول ذات السيادة، ويرجع ذلك أساسًا إلى الافتقار إلى الاعتراف الدّولي أو بسبب معارضة أحد الأعضاء الدائمين.\n\nبالإضافة\
    \ إلى الدّول الأعضاء؛ تدعو الأمم المتّحدة أيضًا الدّول غير الأعضاء لتشارك بصفة مراقب في الجمعية العامة (حاليًا: الكرسي\
    \ الرسولي ودولة فلسطين)، مما يسمح لها بالمشاركة والتكلم في جلسات الجمعية العامة دون أن تصوت. كما يحق للجمعية العامة توجيه\
    \ دعوة دائمة لمجموعة من المنظمات الحكومية الدولية وكيانات ومنظمات غير حكومية لتكون مراقبة ضمن جلسات وأعمال الجمعية العامة.\n\
    \nالأعضاءُ المؤسِّسون \n\nدخلت الأمم المتحدة رسميًا حيز الوجود في 24 أكتوبر 1945 بعد التصديق على ميثاق الأمم المتحدة من\
    \ قبل الأعضاء الخمسة الدائمين في مجلس الأمن التابع للأمم المتحدة (جمهورية الصين، وفرنسا، والاتحاد السوفيتي، والمملكة المتحدة،\
    \ والولايات المتحدة) وأغلبية من الموقعين الآخرين. وانضم ما مجموعه 51 من الأعضاء المؤسسين في ذلك العام؛ ووقع 50 منهم الميثاق\
    \ في مؤتمر الأمم المتحدة المعني بالمنظمة الدولية في سان فرانسيسكو في 26 يونيو 1945، في حين وقعت بولندا (الّتي لم تكن ممثلة\
    \ في المؤتمر) في 15 أكتوبر 1945. الأعضاء المؤسسون في الأمم المتحدة هم: فرنسا، وجمهورية الصين، والاتحاد السوفيتي، والمملكة\
    \ المتحدة، والولايات المتحدة، والأرجنتين، وأستراليا، وبلجيكا، وبوليفيا، والبرازيل، وبيلاروس، وكندا، وتشيلي، وكولومبيا،\
    \ وكوستاريكا، وكوبا، وتشيكوسلوفاكيا، والدنمارك، والجمهورية الدومينيكية، والإكوادور، والسعودية، ومصر، والسلفادور، وإثيوبيا،\
    \ واليونان، وغواتيمالا، وهايتي، وهندوراس، والهند، وإيران، والعراق، ولبنان، وليبيريا، ولوكسمبورغ، والمكسيك، وهولندا، ونيوزيلندا،\
    \ ونيكاراغوا، والنرويج، وبنما، وباراغواي، وبيرو، والفلبين، وبولندا، وجنوب أفريقيا، وسوريا، وتركيا، وأوكرانيا، وأوروغواي،\
    \ وفنزويلا، ويوغوسلافيا.\n\nومن بين الأعضاء المؤسسين فإنّ 49 منهم إما أنهم لا يزالون أعضاء في الأمم المتحدة أو أن عضويتهم\
    \ في الأمم المتحدة مستمرة من قبل دولة خلف. على سبيل المثال واصل الاتحاد الروسي عضوية الاتحاد السوفيتي بعد حلّه. العضوين\
    \ المؤسسين الذين حُلِّت عضويتهما هما تشيكوسلوفاكيا ويوغوسلافيا، فقد توقفت عضويتهما في الأمم المتحدة منذ عام 1992 ولم يخلف\
    \ أيًا منهما دولة أخرى.\n\nشغلت جمهورية الصين مقعد الصين في الأمم المتحدة وقت تأسيسها، ولكن نتيجة لقرار الجمعية العامة\
    \ للأمم المتحدة 2758 في عام 1971، تحتفظ اليوم جمهورية الصين الشعبية بهذا المقعد.\n\nلم يكن لبعضٍ من الأعضاء المؤسسين صفة\
    \ سيادية عندما انضموا إلى الأمم المتحدة، ولم يحصلوا على الاستقلال الكامل إلا في وقت لاحق:\n بيلاروس (جمهورية بيلاروس الاشتراكية\
    \ السوفيتية السابقة) وأوكرانيا (جمهورية أوكرانيا الاشتراكية السوفيتية سابقًا) كانتا من الجمهوريات المكونة للاتحاد السوفيتي،\
    \ إلى أن نالتا استقلالهما الكامل في عام 1991.\n خضعت الهند (التي كان إقليمها آنذاك قبل التقسيم يشمل أيضًا أراضي باكستان\
    \ وبنغلاديش الحالية) للحكم الاستعماري البريطاني إلى أن نالت استقلالها الكامل في عام 1947.\n الفلبين (كومنولث الفلبين آنذاك)\
    \ كانت منطقة ذات حكم ذاتي تابعة للولايات المتحدة، إلى أن نالت استقلالها الكامل في عام 1946.\n في حين أن نيوزيلندا تتمتع\
    \ بالسيادة في ذلك الوقت بحكم الواقع، فإنها لم تكتسب القدرة الكاملة على الدخول في علاقات مع الدول الأخرى إلا في عام 1947\
    \ عندما أقرت قانون اعتماد لوستمينستر، حدث ذلك بعد مرور 16 سنة على اعتماد البرلمان البريطاني للنظام الأساسي لوستمينستر\
    \ في عام 1931 الذي اعترف بالاستقلال الذاتي لنيوزيلندا. وفقًا لمعايير اتفاقية مونتيفيديو، وإذا ما حُكِمَ عليها بموجب معايير\
    \ اتفاقية مونتيفيديو، فإن نيوزيلندا لم تحقق قيام دولة كاملة بحكم القانون حتى عام 1947\".\n\nالأعضاء الحاليون \nالأعضاء\
    \ الحاليون وتواريخ أنضمامهم مدرجة أدناه بتسمياتهم الرسميَّة باللغة العربيَّة والمستخدمة في الأممِ المتَّحدة.\n\nالمراقبون\
    \ وغير الأعضاء\n\nالدول المراقبة \nبالإضافة إلى الدول الأعضاء، هناك دولتان مراقبتان غير عضوتين: الكرسي الرسولي ودولة فلسطين.\n\
    \ يحتفظ الكرسي الرسولي بالسيادة على دولة الفاتيكان ويقيم علاقات دبلوماسية مع 180 دولة أخرى. وقد ظلت دولة بصفة مراقب منذ\
    \ 6 أبريل 1964، وحصلت على جميع حقوق العضوية الكاملة باستثناء التصويت في 1 يوليو 2004.\n مُنحت منظمة التحرير الفلسطينية\
    \ صفة مراقب بوصفها «كيانًا غير عضو» في 22 نوفمبر 1974. واعترافًا بإعلان المجلس الوطني الفلسطيني دولة فلسطين في 15 نوفمبر\
    \ 1988، قرّرت الجمعية العامة للأمم المتحدة اعتبارًا من 15 ديسمبر 1988 بأنه ينبغي استخدام تسمية «دولة فلسطين» بدلًا من\
    \ تسمية «منظمة التحرير الفلسطينية» في منظومة الأمم المتحدة. في 23 سبتمبر 2011 قدّم محمود عباس رئيس السلطة الوطنية الفلسطينية\
    \ طلب الحصول على عضوية الأمم المتحدة لدولة فلسطين إلى الأمين العام للأمم المتحدة بان كي مون؛ ولم يصوت مجلس الأمن التابع\
    \ للأمم المتحدة على الطلب. وفي 31 أكتوبر 2011، صوتت الجمعية العامة لليونسكو على قبول فلسطين كعضو، فأصبحت أول وكالة تابعة\
    \ للأمم المتحدة تقبل فلسطين كعضو كامل العضوية. أُعترف بدولة فلسطين بوصفها «دولة غير عضو» في 29 نوفمبر 2012، عندما وافقت\
    \ الجمعية العامة للأمم المتحدة على قرار الجمعية العامة للأمم المتحدة 67/19 بأغلبية 138 صوتًا مقابل 9 أصوات وامتناع 41\
    \ عضوًا عن التصويت.\n\nالمنظمات المراقبة \nأصدرت الجمعية العامة للأمم المتحدة مجموعة من الدعوات الدائمة لبعض المنظمات\
    \ الحكومية الدولية كمراقبين في أعمال وجلسات الجمعية العامة للأمم المتحدة، وتقسّم الأمم المتحدة هذه المنظمات إلى ثلاث تصنيفات\
    \ أساسية.\n\nالمنظمات الحكومية الدولية المراقبة في دورات وأعمال الجمعية العامة ولديها مكاتب دائمة في المقر\n\nالمنظمات\
    \ الحكومية الدولية المراقبة في دورات وأعمال الجمعية العامة وليس لها مكاتب دائمة في المقر\n\nالكيانات الأخرى المراقبة في\
    \ دورات وأعمال الجمعية العامة ولديها مكاتب دائمة في المقر\n\nملاحظات\n\nالمراجع\n\nوصلاتٌ خارجيَّة \n \n\nبلدان حسب المنظمات\
    \ الدولية\nتاريخ الأمم المتحدة\nدول أعضاء في الأمم المتحدة\nعلاقات الأمم المتحدة\nقوائم متعلقة بالأمم المتحدة"
  - قائمة الدول الأعضاء في الأمم المتحدة
- source_sentence: '2159'
  sentences:
  - "يناير هو الشهر الأول في السنة في التقويم الغريغوري وواحد من السبعة شهور الغريغورية، ويتكوّن من 31 يوم. يسمى كانون الثاني\
    \ في بلاد الشام والعراق، وجانفي في تونس والجزائر. وهو في المتوسط أبرد شهور السنة في معظم نصف الأرض الشمالي (حيث أنه الشهر\
    \ الثاني لفصل الشتاء) وأحر شهور السنة في معظم نصف الكرة الجنوبي (حيث أنه الشهر الثاني لفصل الصيف). وهو شهر موسم في نصف\
    \ الكرة الجنوبي ويقابله شهر يوليو في النصف الشمالي.\n\nويبدأ يناير بنفس اليوم من الأسبوع كما في أكتوبر في السنة العادية،\
    \ وينتهي بنفس اليوم من الأسبوع كما في فبراير وأكتوبر. أما في السنة الكبيسة فيبدأ بنفس اليوم من الأسبوع كما في أبريل ويوليو،\
    \ وينتهي بنفس اليوم من الأسبوع كما في يوليو. وفي علم التنجيم يبدأ يناير عندما تكون الشمس في برج الجدي وينتهي في برج الدلو\
    \ أما فلكيا فيبدأ عندما تبدأ الشمس في برج القوس وتنتهى في برج الجدي.\n\nتاريخه \nتم تسمية الشهر على اسم يناير \"Janus\"\
    \ إله المداخل في ميثولوجيا رومانية. وهي آتية من اللاتينية والتي تعني الباب (ianua) حيث أن يناير هو باب الدخول إلى السنة.\n\
    \nيتكون التقويم الروماني الأصلي من 10 شهور (304 يوم). فقد اعتبر الرومان أن الشتاء فترة لا تحتوي على شهور. وتقريبا في عام\
    \ 713 قبل الميلاد قام رومولوس خليفة الملك نوما بومبيليوس بإضافة الشهور يناير وفبراير ليصبح التقويم مساويا للسنة القمرية\
    \ (354 يوم). وطبقا للخرافة الرومانية المضادة للأرقام الزوجية تم إضافة يوم ليصبح التقويم (354 يوم). ومع أن مارس كان بالأصل\
    \ هو الشهر الأول حسب التقويم الروماني القديم، إلا أنه تم نقل يناير مكانه حيث كان يتم اختيار القنصل خلاله.\n\nويعرف الأول\
    \ من يناير بيوم السنة الجديدة حيث تجري احتفالات صاخبة في شتّى أنحاء الأرض.\n\nالأسماء التاريخية للشهر تتضمن الأصل الروماني،\
    \ جانواريس. قام أهل ساكسونيا بتسميته شهر الذئب, وقام شارلمان بتسميته شهر الشتاء. وفي التقويم الياباني يسمى موتسوكي (睦月).\
    \ ويعرف اليوم الثاني من الشهر بالهاتسوميومي (初夢) واليوم السابع باسم ناناكوسا (七草). وفي اللغة الفنلندية يسمي الشهر تاميكو\
    \ والذي يعنى شهر البلوط.\n\nالإثنين الأول من يناير يعرف بإثنين الهدايا في اسكتلندا وشمال إنجلترا. وتبدأ سنة الزراعة في\
    \ إنجلترا بشراب الأحد يوم الأحد بعد عيد الغطاس.\n\nكما أن يوم البلوغ في اليابان هو الإثنين الثاني في يناير، وهذا لمن سيصبح\
    \ عمره 20 عامًا في التقويم السنوي الجديد، وهو عيد قومي. وهذا اليوم كان يتم الاحتفال به منذ عام 1948 حتى 15 يناير عام 1999\
    \ حينما قررت الحكومة اليابانية إلغاء هذا اليوم لزيادة الإنتاج.\n\nوعجلة العام في الوثنية الحديثة، ينتهى يناير عند أو بالقرب\
    \ من إمبولك في نصف الكرة الشمالي ولونازا في نصف الكرة الجنوبي.\n\nكما أن يناير هو الشهر الأول من العام الميلادي في معظم\
    \ الدول العربية. أمّا في بلدان المغرب العربي، فيسمّى الشهر بالتسمية الفرنسية «جانفي».وفي بلاد الشام، يسمُى يناير «كانون\
    \ الثاني»، من التسمية السريانية «كانون أحراي» ܟܢܘܢ ܐܚܪܝ. ويذهب الدكتور فريحة إلى القول بأنه مشتق من جذر سامي مشترك هو\
    \ جذر «كن» ومعناه الأساس والثبوت والاستقرار لأن الناس ينقطعون فيه عن العمل و«يكنّون» في دورهم.\n\nفي التقويم المصري، يُطلق\
    \ عليه «طوبة».\n\nويسمى «ينّاير» الشهر الآول في التقويم الآمازيغي الذي يوافق الثاني عشر من يناير.\n\nانظر أيضا \n\n قائمة\
    \ الأحداث التاريخية\n\nمراجع \n\n \nشهور"
