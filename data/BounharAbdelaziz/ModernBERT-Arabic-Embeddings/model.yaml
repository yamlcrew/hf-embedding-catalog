  - "1 فبراير أو 1 شُباط أو يوم 1 \\ 2 (اليوم الأوَّل من الشهر الثاني) هو اليوم الثاني والثلاثون (32) من السنة وفقًا للتقويم\
    \ الميلادي الغربي (الغريغوري). يبقى بعده 333 يومًا لانتهاء السنة، أو 334 يومًا في السنوات الكبيسة.\n\nأحداث \n 1327 –\
    \ تتويج إدوارد الثالث ملكا لإنجلترا، وهو في سن المراهقة.\n 1411 – توقيع معاهدة سلام تورون التي أنهت الحرب البولندية الليتوانية\
    \ التوتونية بين مملكة بولندا ودوقية ليتوانيا الكبرى من جهة، وفرسان تيوتون من جهة أخرى.\n 1662 - القرصان الصيني «كاوشينجا»\
    \ يستولي على جزيرة تايوان بعد حصار دام 9 أشهر.\n 1713 – اندلاع أعمال شغب في مدينة بيندر في مولدوفيا الحالية، بسبب أمر\
    \ السلطان العثماني بالقبض على كارل الثاني عشر ملك السويد، بسبب اتهامات له بإثارة الفتن داخل أراضي الدولة العثمانية.\n\
    \ 1793 - فرنسا تعلن الحرب على المملكة المتحدة وهولندا.\n 1796 – نقل عاصمة كندا العليا من مدينة نيوراك إلى مدينة يورك.\n\
    \ 1814 - أكبر ثورة لبركان مايون بالفلبين تقتل 1200 شخص.\n 1835 – إلغاء العبودية في موريشيوس.\n 1856 - انتهاء حرب القرم\
    \ بين الدولة العثمانية والإمبراطورية الروسية والتي ساندت فيها فرنسا وإنجلترا العثمانيين.\n 1861 – تكساس تنفصل عن الولايات\
    \ المتحدة ضمن أحداث الحرب الأهلية الأمريكية.\n 1864 – القوات البروسية تعبر الحدود إلى شليسفيغ لتطلق شرارة الحرب التي عُرفت\
    \ بحرب شلسفيغ الثانية.\n 1865 – الرئيس الأمريكي أبراهام لنكولن يوقع على التعديل الثالث عشر لدستور الولايات المتحدة الأمريكية،\
    \ الذي ألغى العبودية.\n 1877 - إسحق برجس وويليام لونجستريت يحصلان على براءة اختراع أول قارب بخاري في الولايات المتحدة.\n\
    \ 1881 - إلقاء القبض على أحمد عرابي ورفاقه بعد دخول الإنجليز للقاهرة.\n 1884 – نشر أول مجلد من قاموس أكسفورد الإنجليزي.\n\
    \ 1893 – توماس إديسون ينهي بناء أول ستوديو أفلام المعروف باسم «ذا بلاك ماريا» في ويست أورنج في نيوجرسي.\n 1895 – بول كروغر\
    \ رئيس جمهورية جنوب أفريقيا يعلن عن محمية «فالي فاونتينز» في بريتوريا، وهي أقدم محمية طبيعية في أفريقيا.\n 1896 – العرض\
    \ الأول لأوبرا البوهيمي في مسرح ريجيو في تورين، بقيادة أرتورو توسكاني.\n 1897 – افتتاح بنك شينهان أقدم بنوك كوريا الجنوبية\
    \ في العاصمة سيئول.\n 1908 – اغتيال كارلوس الأول ملك البرتغال وابنه لويس فيليبي في لشبونة.\n 1918 – روسيا تتبنى التقويم\
    \ الغريغوري.\n 1924 – استئناف العلاقات بين روسيا والمملكة المتحدة بعد قطيعة ست سنوات بسبب الثورة الشيوعية.\n 1942 -\n\
    \ جوزيف تيربوفن مندوب الرايخ في النرويج الخاضع للاحتلال النازي، يعين فيدكون كفيشلينغ رئيسا لوزراء الحكومة الوطنية.\n البحرية\
    \ الأمريكية تُغير على جزر مارشال وغيلبرت وهي أول عمل عدائي تشنه الولايات المتحدة ضد القوات اليابانية في المحيط الهادي.\n\
    \ بدء بث إذاعة صوت أمريكا وهي خدمة راديو وتلفزيون تابعة للحكومة الأمريكية، وتبث في المناطق الخاضعة لسيطرة قوات المحور.\n\
    \ ماو تسي تونغ يلقي خطابا حول «الإصلاح في التعليم والحزب والأدب» والذي أدى لنشوء حركة تصحيح يانان.\n 1946\n اختيار النرويجي\
    \ تريغفه لي ليكون أول أمين عام للأمم المتحدة.\n البرلمان المجري يلغي الملكية التي استمرت ست قرون، ويعلن قيام جمهورية المجر\
    \ الشعبية.\n 1947 - رئيس الوزراء الأردني إبراهيم هاشم يقدم استقالته للملك عبد الله بن الحسين.\n 1948 - تأسيس ماليزيا الاتحادية\
    \ من اتحاد تسع ممالك كانت خاضعة للاحتلال البريطاني.\n 1950 – أول نموذج للطائرة ميغ 17 تقوم برحلتها الأولى.\n 1953 - فيضانات\
    \ عارمة في هولندا.\n 1958\n سوريا ومصر توقعان على ميثاق الوحدة العربية بين البلدين تحت اسم الجمهورية العربية المتحدة.\n\
    \ إصدار أول طابع بريد كويتي.\n 1960 – فرقة البيتلز تصل بأغنية «أريد أن أمسك يدك» المرتبة الأولى في قائمة أنجح الأغاني\
    \ في الولايات المتحدة.\n 1965 - تأميم الهاتف والبرق في الكويت.\n 1968 – إعدام فان ليم نغوين الضابط في حركة فيت كونغ على\
    \ يد الشرطة في فيتنام الجنوبية، وقد التقط المصور إيدي آدامز صورة لحظة الاغتيال، وأصبحت الصورة من أشهر الصور خلال حرب فيتنام.\n\
    \ 1968\n توحيد الهيئات العسكرية الثلاث في كندا، وهي البحرية الملكية والجيش البري والقوات الجوية الملكية، في هيئة واحدة\
    \ باسم القوات الكندية.\n دمج شركة سكك حديد نيويورك المركزية وسكك حديد بنسلفانيا في شركة واحدة باسم «بن سنترال ترانسبورتيشن»\
    \ (نقل بن المركزي).\n 1972 – كوالالامبور تصبح مدينة بقرار رسمي من الملك الماليزي عبد الحليم معظم.\n 1974 – نشوب حريق في\
    \ مبنى خويلما المكون من 25 طابقا في مدينة ساو باولو في البرازيل، ومقتل 189 وإصابة 293 شخصا.\n 1979 - روح الله الموسوي\
    \ الخميني يصل إلى العاصمة الإيرانية طهران بعد غياب في المنفى استمر 15 عامًا.\n 1989 – مدن كالغورلي وبولدر في غرب أستراليا\
    \ تتحدان رسميا لتكونا مدينة واحدة باسم «مدينة كالغورلي وبولدر».\n 1991 – اصطدام بين طائرة شركة يو إس إير الرحلة 1493 وطائرة\
    \ شركة سكاي ويست الرحلة 5569، على المدرج في مطار لوس أنجلوس الدولي، ومقتل 34 وإصابة 30.\n 1992 – القاضي الأعلى في مدينة\
    \ بوبال الهندية يعلن أن وارن أندرسن الرئيس التنفيذي لشركة يونيون كاربايد الأمريكية للكيماويات، مطلوب للعدالة وفق القانون\
    \ الهندي بسبب عدم حضوره في قضية كارثة بوبال.\n 1996 – إقرار قانون آداب الاتصالات في الكونغرس الأمريكي، وهو أول محاولة\
    \ لتنظيم المواد الإباحية على الإنترنت.\n 1998 – ليلي فيشبورن تصبح أول أمريكية من أصل إفريقي ترقى إلى رتبة أدميرال خلفي\
    \ في الولايات المتحدة، وهي الأقل من الأدميرال البحري مباشرة.\n 2002 – قطع رأس والتمثيل بجثة دانيال بيرل الصحفي الأمريكي\
    \ ورئيس مكتب الوول ستريت جورنال في جنوب آسيا، الذي كان قد اختطف في 23 يناير 2002.\n 2003 - مكوك الفضاء كولومبيا يتفكك\
    \ إلى قطع صغيرة، خلال رحلة عودته بالمهمة إس تي إس 107 عند دخوله المجال الجوي للأرض ويقتل رواد الفضاء السبعة الذين كانوا\
    \ على متنه.\n 2004 - مقتل 244 شخص على الأقل في حادث دهس بالأقدام نتيجة تزاحم الحجاج في السعودية.\n 2005 – ملك نيبال جيانيندرا\
    \ يقوم بانقلاب عسكري للقضاء على الديمقراطية ويصبح رئيسًا لمجلس الوزراء.\n 2008 - حاكم إمارة دبي الشيخ محمد بن راشد آل\
    \ مكتوم يعين نجله حمدان بن محمد بن راشد آل مكتوم وليًا للعهد في الإمارة.\n 2009 – يوهانا سيغورذاردوتير تشكل الحكومة في\
    \ آيسلندا، لتكون بذلك أول رئيسة وزراء في تاريح البلاد، وأول رئيسة وزراء مثلية الجنس في العالم.\n 2011\n الرئيس المصري\
    \ محمد حسني مبارك يعلن عدم ترشحه لانتخابات الرئاسة المقبلة، والدعوة لتعديل مواد في الدستور حول تقييد الفترات الرئاسية\
    \ وإلغاء القيود على الترشح لها وذلك على إثر اندلاع ثورة 25 يناير.\n ملك الأردن عبد الله الثاني بن الحسين يقبل استقالة\
    \ حكومة سمير زيد الرفاعي والتي أتت بعد عدة أسابيع من اندلاع مظاهرات احتجاجية ضد سياسات حكومته الاقتصادية بالإضافة إلى\
    \ المطالبة بالإصلاح السياسي، ويكلف معروف البخيت بتشكيل الحكومة الجديدة.\n 2012\n افتتاح برج شارد سادس أعلى مبنى في أوروبا.\n\
    \ أعمال شغب في ستاد بورسعيد عقب مباراة كرة القدم بين ناديي المصري والأهلي، أدت إلى سقوط 73 قتيلًا من صفوف جماهير ألتراس\
    \ أهلاوي ومئات الجرحى. سميت إعلاميا بـ«مذبحة ستاد بورسعيد».\n 2015 - منتخب فرنسا يفوز ببطولة العالم لكرة اليد للرجال للمرة\
    \ الخامسة في تاريخه.\n 2019 - قطر تتوج بلقب كأس آسيا 2019 للمرة الأولى في تاريخها بعد فوزها على اليابان 3–1 في المباراة\
    \ النهائية.\n 2021 - انقلاب عسكري يُطيح برئيس دولة ميانمار وين مينت، مُعتقلا عدة أسماء سياسية من داخل الحزب الحاكم وأبرزهم\
    \ مستشار الدولة أون سان سو تشي.\n 2022 - مقتل 11 شخصًا وإصابة آخرين في محاولة انقلابية فاشلة في غينيا بيساو.\n 2023 -\
    \ مذنب C/2022 E3 (ZTF) يصل إلى أقرب مسافة له إلى الأرض على مسافة 0.28 وحدة فلكية (42 مليون كم)، بحيث أمكن رؤيته بالعين\
    \ المجردة.\n\nمواليد \n\n 1435 - أماديو التاسع، دوق سافوي.\n 1659 - ياكوب روغيفين، مستكشف هولندي.\n 1796 - أبراهام إيمانويل\
    \ فروليش، كاتب سويسري.\n 1857 - إدوارد أوسكار أولريش، إحاثي أمريكي.\n 1901 - كلارك غيبل، ممثل أمريكي.\n 1905\n زكي نجيب\
    \ محمود، مفكر وفيلسوف مصري.\n إميليو سيغري، عالم فيزياء إيطالي أمريكي حاصل على جائزة نوبل في الفيزياء عام 1959.\n 1915\
    \ - ستانلي ماثيوس، لاعب ومدرب كرة قدم إنجليزي.\n 1916 - ميخائيل بلدي، شاعر وروائي سوري.\n 1930 - ماريان ويسنيسكي، لاعب\
    \ كرة قدم فرنسي.\n 1931 - بوريس يلتسن، رئيس الاتحاد الروسي الأول.\n 1932 - حسن الترابي، مفكر وزعيم سياسي وديني سوداني.\n\
    \ 1933 - رينولدز برايس، كاتب وشاعر أمريكي.\n 1934 - السيد عسكر، سياسي وعالم مسلم مصري.\n 1939\n أحمد أبو المعاطي، قارئ\
    \ مصري.\n فهمي عبد الحميد، مخرج مصري.\n براك المرزوق، رئيس ديوان المحاسبة الكويتي.\n 1948 - لاسزلو بالينت، لاعب ومدرب\
    \ كرة قدم هنغاري.\n 1949 - شهيرة، ممثلة مصرية.\n 1955 - نادية شكري، ممثلة مصرية.\n 1957\n عبد العزيز جاسم، ممثل قطري.\n\
    \ سعد الفقيه، معارض سعودي.\n جاكي شروف، ممثل هندي.\n 1960 - راشد الشمراني، ممثل سعودي.\n 1961 - عدنان حمد، لاعب ومدرب\
    \ كرة قدم عراقي.\n 1965 - محمد هنيدي، ممثل مصري.\n 1966 - ميتشيل أكرس، لاعبة كرة قدم أمريكية.\n 1968 - عبد الله منصور،\
    \ لاعب كرة قدم كويتي.\n 1969\n عروب صبح، إعلامية أردنية.\n غابرييل باتيستوتا، لاعب كرة قدم أرجنتيني.\n 1971 -\n مايكل\
    \ هول، ممثل أمريكي.\n زلاتكو زاهوفيتش، لاعب كرة قدم سلوفيني.\n 1972 - سلمى سالم، ممثلة عراقية كويتية.\n 1976 - ميلاد سري،\
    \ ممثلة عراقية.\n 1977 - ليبور سيونكو، لاعب كرة قدم تشيكي.\n 1979 - جوان دوس سانتوس، لاعب كرة قدم برازيلي.\n 1981\n إلسا\
    \ زغيب، ممثلة لبنانية.\n لاما، لاعب كرة قدم أنغولي.\n 1984 - دارين فليتشير، لاعب كرة قدم اسكتلندي.\n 1985 - ريو هوريكاوا،\
    \ ممثل أداء صوتي ياباني.\n 1987 - جوسيبي روسي، لاعب كرة قدم إيطالي.\n 1994 - هاري ستايلز، مغني إنجليزي.\n 1997 - جيهيو،\
    \ مغنية كورية.\n\nوفيات \n 1248 - هنري الثاني، دوق برابانت.\n 1903 - جورج جابرييل ستوكس، عالم رياضيات وفيزياء بريطاني.\n\
    \ 1929 - ألكسندر أوغستون، جراح اسكتلندي.\n 1958 - كلنتون دافيسون، عالم فيزياء أمريكي حاصل على جائزة نوبل في الفيزياء عام\
    \ 1937.\n 1966\n بديع خيري، كاتب مسرحي مصري.\n باستر كيتون، ممثل أمريكي.\n 1976 - جورج ويبل، طبيب أمريكي حاصل على جائزة\
    \ نوبل في الطب عام 1934.\n 1982\n راغهوناث مورمو، أديب وشاعر وكاتب مسرحي هندي وواضع كتابة «أول تشيكي» المستخدمة في كتابة\
    \ نصوص اللغة السنتالية.\n فيرنر هايزنبيرغ، عالم فيزياء ألماني حاصل على جائزة نوبل في الفيزياء عام 1932.\n 2003 - عبد الرحمن\
    \ آل عمير، فقيه وقاضي شافعي وشاعر سعودي.\n 2010 - \n عز الدين العراقي، الوزير الأول في المغرب.\n هنري إده، مهندس معماري\
    \ وسياسي لبناني.\n 2012 - فيسوافا شيمبورسكا، شاعرة بولندية حاصلة على جائزة نوبل في الأدب عام 1966.\n 2021 - عبد الستار\
    \ قاسم، كاتب ومفكر ومحلل سياسي وأكاديمي فلسطيني.\n 2022 - لطف الله الصافي الكلبايكاني، مرجع شيعي إيراني.\n\nأعياد ومناسبات\
    \ \n بداية شهر التاريخ الأسود في الولايات المتحدة.\n أول أيام فصل الربيع في أيرلندا على التقويم الأيرلندي.\n يوم الاتحاد\
    \ في ماليزيا.\n يوم الحجاب العالمي.\n\nوصلات خارجية \n\n وكالة الأنباء القطريَّة: حدث في مثل هذا اليوم.\n النيويورك تايمز:\
    \ حدث في مثل هذا اليوم.\n BBC: حدث في مثل هذا اليوم.\n\nأيام ميلادية\nفبراير"
