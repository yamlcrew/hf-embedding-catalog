    \ الأخمينية الفارسية، إعلانًا يسمح لسكان يهودا المنفيين بالعودة إلى يهوذا. سُمح للسكان اليهود العائدين بالحكم الذاتي وإعادة\
    \ بناء الهيكل.\n\n العصور الكلاسيكية القديمة \n\nتم الانتهاء من بناء الهيكل الثاني ج.  520 ق.م. حكم الفرس المنطقة باسم\
