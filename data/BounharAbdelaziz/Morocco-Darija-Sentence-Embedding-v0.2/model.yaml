widgetData:
- source_sentence: '"How discovering a magic door in the depths of the forest changed the course of a young girl''s life"'
  sentences:
  - البلومبي كيتعلق بالما ماشي بالكهربا لي محتاجينها التلفزة.
  - بكل سرور نعاونك بالقصة ديالك! قبل ما نقدر نعطيك الفيدباك، واش ممكن تعطيني شي ملخص ولا مقتطف من القصة باش نقدر نقراها ونشوفها؟
    هاد الشي غادي يعاونني باش نفهم السياق والمحتوى ديال القصة ديالك مزيان، وغادي يخليني نعطيك فيدباك مركز ومحدد أكثر.
  - '"كيفاش لقيان باب سحري فعمق الغابة بدل حياة بنت صغيرة"'
- source_sentence: Not all bike riders are BMX riders and doing a stunt does not imply is is during a competition.
  sentences:
  - 'فسر بساطة علاش لا هي الجواب الصحيح ل: واش هاد الجملة عندها معنى؟

    "أبولو 13 كان سميت أول راجل مشى على القمر."

    الخيارات:

    - نعم

    - لا. التفسير:'
  - ماشي كاع لي كيركبو البيسكليت هوما راكبين BMX وداكشي د الحركة البهلوانية ما كيعنيش بالضرورة بلي كاينة شي مسابقة.
  - على أساس النجاح ديالكم فهزيمة الديابة وإكمال المهمة ديالكم باش تحققو فالظلام اللي فقلب الغابة، كيبان مناسب باش نعطيكم
    طلوع المستوى كمرحلة. مبروك عليكم!
- source_sentence: بيركين، بوزي وبوتيل كانو شخصيات فين البرنامج التلفزيوني ديال الدراري؟
  sentences:
  - Spender Spender Spender هي دراما إجرائية ديال شرطة التلفزة البريطانية، خلقها Ian La Frenais و Jimy Nail، لي تبثات أول
    مرة فـ 8 يناير 1991 فـ BBC1. السلسلة، لي كانت تزاد تلاتة ديال المسلسلات بين 1991 و 1993، وكملات بـ "The Franch Connection"،
    وبثات فـ 29 دجنبر 1993. مجموع الحلقات لي تم إنتاج 21 حلقة. السلسلة الأولى والثانية تم إنتاجهم من طرف Martin Mckyand، بينما
    السلسلة الثالثة والأخيرة تم إنتاجها من طرف Paul Ravael و Peter McAleese. السلسلة، اللي دارت فـ Newcastle على Tyny، كتركز
    على الحياة والحياة
  - 'بوتل المشروع. هو برنامج مجاني والمشاريع كيتشجعو باش يستضيفو سيرفر البوتل ديالهم باش يسمحو للمجتمع ديالهم بالتوزيع المحلي.
    Treanslate Toolk كتوفر تحويل من فورمات الوثائق المدعومة ديالها اللي كتشمل: Java و Mozilla.properties files Java و OpenOffice.org
    SDF files و PHP arrays و HTML و Text و XLIFF و Gettext PO. Botle بنفسو كيخدم مباشرة على ملفات Gettext Po و XLIFF، وكذلك
    Qt.ts و TBX و TMX (من بعد الإصدار 2.0.3). بما أن Botle 2.0.0 كاينين دعم أصلي لبزاف ديال الأشكال الأخرى، بحال Java.propertys
    و PHP files و rape و بزاف ديال الصيغ الفرعية. Botle Botle'
  - برنامج البوتل. أول إصدار رسمي ديالو دار فديسمبر 2004 رغم أنه كان مستعمل فبزاف ديال الترجمة الداخلية@thons من طرف Translate.org.za.
    سميت بوتل هي اختصار لـ "الترجمة عبر الإنترنت/مجال التوزيع" ولكن هي تاني شخصية فبرنامج الـ BBC للأطفال The Flumps. Translate.org.za
    خرجات إصدارات مختلفة وفي 2006 تم تطوير بوتل كجزء من مشروع WordForge، وهو مشروع ممول من معهد Open Society Institute والمركز
    الدولي لبحوث التنمية. هاد الشي زاد إدارة الملفات والبنية التحتية للترجمة. تم إضافة بزاف ديال هاد المميزات فـ 1.0 إصدارات.
    بوتل
- source_sentence: راجل لابس قميجة زرقة كيمد يديه وهو كيهضر مع مسؤول لابس الزي الرسمي.
