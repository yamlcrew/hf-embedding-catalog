      irregularity in the upper sole stitching on one of the two, right at the ball of the foot, and a blemish in the tanning
      on the tongue of the other.  Knowing I would never be happy if I "settled" for that, I put that pair aside too, and
      ordered a THIRD pair, also in 12EE (W).  The third time was indeed the charm ... this pair was perfect in every respect,
      and in my opinion, worth every penny they cost.  The "British tan" finish is really nice, and exactly as shown in the
      photo.  The stitching is flawless.  The leather is supple and uniform throughout every surface of the shoe.  The heels
      and soles are very thick and strong ... a bit stiff at first, but I'm a big guy, so that's fine with me.  My Bostonians
      had leather soles, and I realized (after wearing completely through one of them) that rubber soles, like these, work
      better for me because I do as much walking on outdoor surfaces like concrete and asphalt as I do on tile and other indoor
      surfaces.  Amazon made my return of the first two pairs a breeze, and they started processing a full refund on my credit
      card the same day I dropped the return boxes off with UPS.  Thanks, Amazon ... you made this particular online shopping
      experience a real pleasure for me -- not only in helping me find these terrific shoes, but also getting them to me quickly,
      in the perfect condition and size I needed.  Once you figure out what size actually fits you, you'll love these Cole
      Haans ...
  - text: 'I had no problems installing then pairing this to my Z-Wave SmartThings hub and 2GIG alarm system. But it was replacing
      an older KW 910 (that lasted well over past couple years) so I had prior experience ;-)  A couple of notables:  - I
      realized I needed a 10-key pad instead of the previous 5-key pad for better security. Mathematically it is SIXTEEN TIMES
      harder for an intruder to guess any valid 4-digit code than on a 5-key pad! And don''t forget that for every unique
      user code you add (spouse, guest, maid, etc) divides those intruder chances for less security (ie, a 5-key pad at best
      is 1:625 odds, but with 31 user codes now only 31:625 or a 5% chance of hitting a valid code on the 1st try or a likely
      hit within 20 tries!) - Regardless the chances, do NOT tie your lock to automatically disarm your alarm. It''s just
      stupid. Sure, the same code was first entered in the lock keypad, but make it hard for intruders then facing an alarm
      countdown try to remember that. - Like any Z-wave lock (which all have extra AES signal encryption) consider powering
      up this lock BEFORE installing it in the door so you can be close (like <3 ft) to your Z-wave hub/alarm panel to pair/include
      it. Otherwise, you''ll have pairing problems like you see so many people here. - The "random digits" feature is nice
      but confusing to explain to guests like the maid to follow two numbers before then entering their code. It is intended
      so that dusting the panel is not obvious where four most common fingerprints are. Maybe nice if you share just one common
      code. Or just remember to tap around the screen from time to time. - My only gripe is that the keypad really could be
      more sensitive to waking up. My wife first complained then guests complained that you have to REALLY press hard to wake
      up the panel to then see the numbers. It is especially annoying when you have your hands full on the way out and have
      to wait for the lock icon to appear. They probably should have kept the lock action as a physical button like my old
      KW 910. I ended up turning on the 32-sec auto lock DIP switch.'
  - text: 'This is a really great book and I highly recommend it, both as a compelling autobiography and as a way to learn
      about Islam and Islamism.  One thing I learned from this book is the tremendous variation within Islam. The distinction
      that was most important to me was the difference between Religious (or Spiritual) Islam and Political Islam.  The values
      and social ideals of Religious Islam are virtually identical to Christiaity and Buddhism (the two world religion with
      which I am most familiar).  The emphasis on care for the poor, the needy, and less fortunate is indistinguishable among
      these religions.  Further, Islamic mysticism describes Allah in the same sacred language used by mystics of all stripes.  This
      blends well with our religious heritage and adds new inspiring stories and language that will benefit all with an open
      mind.  On the other side is Political Islam, it''s hatred of the West, it''s lack of sound Islamic scholarship and spirituality,
      it''s bigotry and shameful treatment of women, it''s dedication to an Islamic State, and it''s willingness to kill in
      order to attain it.  This form of Islam, and I hesitate even calling it Islam given it''s shallow scholarship and deviance
      from fundamental Islamic values and teachings, breeds extremism and terrorism.  This form of Islam poses a concrete
      threat to America and other Western countries.  Within our country, as well as countries throughout the world, this
      twisted form of Islam is taught, primarily, by missionaries from Saudia Arabia.  They have combined a rigid, severe,
      and literalist version of Islam that dates to the mid 1700s with the political goal of transforming the world into a
      single Islamic state.  They are True Believers of the worst kind and the foundation on which Islamic terrorists stand.  Note:  After
      reading The Islamist and writing the review above, I read Islam by <PERSON>, an excellent overview of Islam.  One point
      that he makes is that Islam is not just a religion, but a way of life, and that Islam permeates all aspects of the Muslim,s
      life, including politics.  Because this applies to all forms of Islam, the distinction made in The Islamist, and repeated
      in my review, between "Religious Islam" and "Political Islam" is not correct, or at least not precise.  Other labels
      also have there shortcomings, so I will let the wording used by the author stand.  Nonetheless, The Islamist remains
      and excellent, powerful, and intensely personal work.'
