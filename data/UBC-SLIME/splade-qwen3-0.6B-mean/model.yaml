- text: 'I use these at work for when things break - sort of like a poor-man''s build monitor.  It catches people''s attention
    and they know "something" is happening. I have both the Red and Yellow colors so I can distinguish between "something''s
    wrong" and "OMG - OUTAGE!!!!" (I deal with a major website). Some people complain about how bright it is - I don''t really
    care. During the first day that I fired up the Yellow (something''s wrong), I had about 10 people stop by and they were
    like "hey.... so - what''s that cause it''s f''n annoying....." They quickly found out that it''s a "go away, yes, something
    is wrong" light. I''ve had developers complain that they''re gonna have seizures (hasn''t happened yet) and people have
    figure out that, if the light is on - stay away unless you''re involved.  Other folks have actually changed how I present
    this light, due to how bright it is. Some people don''t like the reflection (my closest cube mates), while others think
    it needs to be seen by EVERYONE. We came up with our own compromise - custom molded tin-foil.  ROAD USE: I''m also a a
    road flare (the real kind) user. These, in my opinion, would not be the greatest thing to use. I''m going to buy my wife
    one for her motorcycle, but that''s the only reason why (elements due to her leather strapped bags). A car needs something
    much brighter. While these have multiple patterns, it''s not great for anything in the city. If you''re in the middle
    of nowhere, sure.  Edit: I''ve updated this a little. I finally ran one of mine out of batteries. It basically did all
    kinds of funky things during it''s last few minutes and I pulled the plug. I have the kind with a Lithium CR123A 3V battery.
    It lasted a LONG time compared to what I originally expected. I use these lights for issues that last 45 minutes to an
    hour. For two full days, this thing ran like a champ without issues (note: 8 hrs per day). Overall, I''d estimate the
    run time to be around 25-30 hours of solid use. The battery replacement for this model is a pain, but that''s good. There
    are 2 screws to remove, then you have to pry the top off. The painful part is the top - it has an o-ring (GOOD!) that
    protects the electronics. After about 3-4 minutes, I was able to get it open and pull the battery.  After seeing the run-time
    and construction on the inside, I''m changing this to 5-stars - but again, for the Lithium version. I hadn''t ordered
    my wife''s yet - I''m ordering it today.  If you''re a developer or admin looking for a poor-man''s" trouble in little
    china" light. Eventually, I''ll probably move it over to an Adrino or Pi, but for now, pushing a button and slapping it
    in a "custom aluminum foil reflector" is good enough for now.'
- text: This was a gift from my daughter...  I probably wouldn't have spent as much on a travel mug, but, after using this
    mug for about a month, I find it worth the extra money, as opposed to buying a cheaper mug.  First off, the mug itself
    is made of stainless steel, and will not break like a plastic mug would.  This includes the interior and exterior of the
    mug.  I have had mugs that were stainless steel on the outside, but plastic on the inside, and those mugs eventually separated,
    and generally did not last long.  Of course, the lid is made of plastic and rubber materials, but is made to be durable,
    and appears to be very well constructed.  This mug seals tight.  Generally a travel mug must be kept upright at all times,
    as the closed position is not much more than a piece of plastic that slides over a hole.  In this mug, there is a plastic
    part that has a rubber seal on it, and when in the closed position, seals the mug tight, equivalent to the seal for a
    thermos bottle, and prevents any leakage.  I actually put this in my briefcase when walking into my office with no worries
    of leaks or spills in the briefcase.  My other travel mugs never allowed this.  I have also had hot coffee in this mug
    for 5+ hours, and found the coffee to be hot after that amount of time.  Although the instructions allows for top rack
    dishwasher cleaning, I believe it would be best to clean this by hand, especially with regards to the parts in the lid.  The
    lid comes apart into three pieces, and also has seals that are on those pieces.  I would not recommend any of those parts
    in the dishwasher, and cleaning the mug is not a difficult chore.  Overall, I'm giving this mug 5 stars, as the only issue
    I find not in its favor is its price, but compared to a $10 mug, made of plastic, this mug is far superior, and worth
    the extra money.  I have not had this mug for several years, but expect it to last at least a few years, and possibly
    longer with little or no issues.  My recommendation for others looking for a travel mug would be to buy one of these,
    based on its ability to keep liquids hot, being able to seal tightly and not leak your drink if tipped, and the excellent
    construction of this mug.
- text: First, the reader should be advised that I'm an "old school" guy that has spent a lifetime grousing about the cost
    of shoes ... ALL kinds of shoes ... tennis shoes ... dress shoes ... hiking shoes ... flip-flops ... you name it.  I'm
    the guy that regularly prowls the shoe section at re-sellers like Marshalls and Ross, always searching for that once-in-a-lifetime
    bargain/value that miraculously shows up in my size ... "you just gotta get there on the right day ..." Am I right, men?  While
    all that prowling has undoubtedly saved me a small fortune over the years, it also taught me something.  Sometimes, you
    just can't get what you really want unless you're willing to spend what it costs.  That's the way I feel about these shoes.  I
    knew I wanted a captoe Oxford in this color, and I spent a LONG time looking at LOTS of different makers/designers on
    Amazon.  I never found anything that looked as nice as these Cole Haans.  For the reasons explained above, I never previously
    bought this label, so I wasn't sure about the sizing.  My last pair of high-end dress shoes were Bostonians (and yes ...
    I groused bitterly about the cost when I broke down and bought them), which "ran short."  I got those shoes in 13D, which
    fit and served me well through some pretty heavy use over a number of years.  So, I figured I'd try the same in the Cole
    Haans.  My mistake ... in 13D they fit just OK at the widest part of my foot (a little tight, but not uncomfortable),
    but WAY too long in the toe, and just didn't fit my foot right.  Didn't have a lot of time to mess around, so I put the
    first pair aside and re-ordered another pair in 12EE (W), figuring that adjustment would make the perfect fit, and then
    I'd return the first pair, after I was sure.  The second pair fit my foot like a glove, right out of the box.  Very comfortable,
    and a perfect fit for my foot.  Unfortunately, with the second pair, I also noticed a small irregularity in the upper
    sole stitching on one of the two, right at the ball of the foot, and a blemish in the tanning on the tongue of the other.  Knowing
    I would never be happy if I "settled" for that, I put that pair aside too, and ordered a THIRD pair, also in 12EE (W).  The
    third time was indeed the charm ... this pair was perfect in every respect, and in my opinion, worth every penny they
    cost.  The "British tan" finish is really nice, and exactly as shown in the photo.  The stitching is flawless.  The leather
    is supple and uniform throughout every surface of the shoe.  The heels and soles are very thick and strong ... a bit stiff
    at first, but I'm a big guy, so that's fine with me.  My Bostonians had leather soles, and I realized (after wearing completely
    through one of them) that rubber soles, like these, work better for me because I do as much walking on outdoor surfaces
    like concrete and asphalt as I do on tile and other indoor surfaces.  Amazon made my return of the first two pairs a breeze,
    and they started processing a full refund on my credit card the same day I dropped the return boxes off with UPS.  Thanks,
    Amazon ... you made this particular online shopping experience a real pleasure for me -- not only in helping me find these
    terrific shoes, but also getting them to me quickly, in the perfect condition and size I needed.  Once you figure out
    what size actually fits you, you'll love these Cole Haans ...
- text: 'I had no problems installing then pairing this to my Z-Wave SmartThings hub and 2GIG alarm system. But it was replacing
    an older KW 910 (that lasted well over past couple years) so I had prior experience ;-)  A couple of notables:  - I realized
    I needed a 10-key pad instead of the previous 5-key pad for better security. Mathematically it is SIXTEEN TIMES harder
    for an intruder to guess any valid 4-digit code than on a 5-key pad! And don''t forget that for every unique user code
    you add (spouse, guest, maid, etc) divides those intruder chances for less security (ie, a 5-key pad at best is 1:625
    odds, but with 31 user codes now only 31:625 or a 5% chance of hitting a valid code on the 1st try or a likely hit within
    20 tries!) - Regardless the chances, do NOT tie your lock to automatically disarm your alarm. It''s just stupid. Sure,
    the same code was first entered in the lock keypad, but make it hard for intruders then facing an alarm countdown try
    to remember that. - Like any Z-wave lock (which all have extra AES signal encryption) consider powering up this lock BEFORE
    installing it in the door so you can be close (like <3 ft) to your Z-wave hub/alarm panel to pair/include it. Otherwise,
    you''ll have pairing problems like you see so many people here. - The "random digits" feature is nice but confusing to
    explain to guests like the maid to follow two numbers before then entering their code. It is intended so that dusting
    the panel is not obvious where four most common fingerprints are. Maybe nice if you share just one common code. Or just
    remember to tap around the screen from time to time. - My only gripe is that the keypad really could be more sensitive
    to waking up. My wife first complained then guests complained that you have to REALLY press hard to wake up the panel
    to then see the numbers. It is especially annoying when you have your hands full on the way out and have to wait for the
    lock icon to appear. They probably should have kept the lock action as a physical button like my old KW 910. I ended up
    turning on the 32-sec auto lock DIP switch.'
- text: 'This is a really great book and I highly recommend it, both as a compelling autobiography and as a way to learn about
    Islam and Islamism.  One thing I learned from this book is the tremendous variation within Islam. The distinction that
    was most important to me was the difference between Religious (or Spiritual) Islam and Political Islam.  The values and
    social ideals of Religious Islam are virtually identical to Christiaity and Buddhism (the two world religion with which
    I am most familiar).  The emphasis on care for the poor, the needy, and less fortunate is indistinguishable among these
    religions.  Further, Islamic mysticism describes Allah in the same sacred language used by mystics of all stripes.  This
    blends well with our religious heritage and adds new inspiring stories and language that will benefit all with an open
    mind.  On the other side is Political Islam, it''s hatred of the West, it''s lack of sound Islamic scholarship and spirituality,
    it''s bigotry and shameful treatment of women, it''s dedication to an Islamic State, and it''s willingness to kill in
    order to attain it.  This form of Islam, and I hesitate even calling it Islam given it''s shallow scholarship and deviance
    from fundamental Islamic values and teachings, breeds extremism and terrorism.  This form of Islam poses a concrete threat
    to America and other Western countries.  Within our country, as well as countries throughout the world, this twisted form
    of Islam is taught, primarily, by missionaries from Saudia Arabia.  They have combined a rigid, severe, and literalist
    version of Islam that dates to the mid 1700s with the political goal of transforming the world into a single Islamic state.  They
    are True Believers of the worst kind and the foundation on which Islamic terrorists stand.  Note:  After reading The Islamist
    and writing the review above, I read Islam by <PERSON>, an excellent overview of Islam.  One point that he makes is that
    Islam is not just a religion, but a way of life, and that Islam permeates all aspects of the Muslim,s life, including
    politics.  Because this applies to all forms of Islam, the distinction made in The Islamist, and repeated in my review,
    between "Religious Islam" and "Political Islam" is not correct, or at least not precise.  Other labels also have there
    shortcomings, so I will let the wording used by the author stand.  Nonetheless, The Islamist remains and excellent, powerful,
    and intensely personal work.'
