  - source_sentence: Mức xử phạt hành chính đối với hành vi mua chuộc, hối lộ thành viên đoàn kiểm toán nhà nước được quy
      định như thế nào?
    sentences:
    - 'thanh toán tiền chi phí đi lại 1. thanh toán theo hóa đơn thực tế: a) người đi công tác được thanh toán tiền chi phí
      đi lại, bao gồm: . - cước hành lý của người đi công tác bằng phương tiện máy bay trong trường hợp giá vé không bao gồm
      cước hành lý mang theo. trường hợp đơn vị nơi cử người đi công tác và đơn vị nơi đến công tác đã bố trí phương tiện
      vận chuyển thì người đi công tác không được thanh toán các khoản chi phí nêu trên. nếu phát hiện người đi công tác đã
      được đơn vị nơi đến công tác bố trí phương tiện vận chuyển nhưng vẫn đề nghị đơn vị cử đi công tác thanh toán tiền chi
      phí đi lại, thì người đi công tác phải nộp lại số tiền đã được thanh toán cho đơn vị cử đi công tác, đồng thời phải
      bị xử lý kỷ luật theo quy định của pháp luật về cán bộ, công chức, viên chức và người lao động. .'
    - ký quỹ và sử dụng tiền ký quỹ 1. doanh nghiệp thực hiện ký quỹ theo mức quy định tại khoản 2 điều 21 nghị định này tại
      ngân hàng thương mại của việt nam hoặc chi nhánh ngân hàng nước ngoài thành lập và hoạt động hợp pháp tại việt nam (sau
      đây gọi là ngân hàng nhận ký quỹ). 2. tiền ký quỹ được sử dụng vào mục đích thanh toán tiền lương, bảo hiểm xã hội,
      bảo hiểm y tế, bảo hiểm thất nghiệp, bảo hiểm tai nạn lao động, bệnh nghề nghiệp và các chế độ khác đối với người lao
      động thuê lại theo thỏa thuận trong hợp đồng lao động, thỏa ước lao động tập thể, nội quy, quy chế của doanh nghiệp
      cho thuê lại hoặc bồi thường cho người lao động thuê lại trong trường hợp doanh nghiệp cho thuê lại vi phạm hợp đồng
      lao động với người lao động thuê lại hoặc gây thiệt hại cho người lao động thuê lại do không bảo đảm về quyền và lợi
      ích hợp pháp của người lao động thuê lại.điều kiện cấp giấy phép . 2. doanh nghiệp đã thực hiện ký quỹ 2.000.000.000
      đồng (hai tỷ đồng).
    - 'hành vi mua chuộc, hối lộ trưởng đoàn kiểm toán, phó trưởng đoàn kiểm toán, tổ trưởng tổ kiểm toán, thành viên đoàn
      kiểm toán; cản trở công việc của kiểm toán nhà nước phạt tiền từ 10.000.000 đồng đến 20.000.000 đồng đối với một trong
      các hành vi sau đây: 1. mua chuộc, hối lộ tiền, tài sản, lợi ích vật chất khác trị giá dưới 2.000.000 đồng cho trưởng
      đoàn kiểm toán, phó trưởng đoàn kiểm toán, tổ trưởng tổ kiểm toán, thành viên đoàn kiểm toán; 2. cản trở công việc của
      kiểm toán nhà nước và kiểm toán viên nhà nước.mức phạt tiền và thẩm quyền phạt tiền . 2. mức phạt tiền quy định tại
      chương ii của pháp lệnh này là mức phạt áp dụng đối với hành vi vi phạm hành chính của cá nhân. tổ chức có cùng hành
      vi vi phạm thì mức phạt tiền gấp 02 lần mức phạt tiền đối với cá nhân.'
  - source_sentence: Việc đánh giá kiểu loại sản phẩm đối với cơ sở sản xuất máy đóng cọc được thực hiện định kỳ bao lâu một
      lần?
    sentences:
    - 'đánh giá kiểu loại sản phẩm đã được cấp giấy chứng nhận kiểu loại; đình chỉ hiệu lực và thu hồi giấy chứng nhận kiểu
      loại 1. cục đăng kiểm việt nam tiến hành đánh giá kiểu loại sản phẩm đã được cấp giấy chứng nhận kiểu loại trong các
      trường hợp sau: a) đánh giá định kỳ 24 tháng; b) đánh giá khi có sự thay đổi của sản phẩm so với sản phẩm đã được cấp
      giấy chứng nhận kiểu loại; c) đánh giá khi có sự thay đổi các tiêu chuẩn, quy chuẩn kỹ thuật và quy định quy liên quan.
      .'
    - 'kiến thức - biết được các ký hiệu vật liệu cơ bản: gang, thép, các loại hợp kim.; - phân tích được các ký hiệu về dung
      sai lắp ghép, sơ đồ lắp ghép, chuỗi kích thước; - trình bày được đặc điểm, cấu tạo và nguyên lý làm việc của một số
      loại máy công cụ: máy tiện vạn năng, máy phay vạn năng . , máy bào - xọc, máy mài, máy tiện cnc, máy phay cnc, máy xung,
      máy cắt dây.; - trình bày được tính chất cơ lý của một số loại vật liệu làm dụng cụ cắt (dao, đá mài, vật liệu gia công
      kim loại và phi kim loại) và thép làm dao tiện, phay, bào, mũi khoan, mũi doa, đục, giũa.sau khi nhiệt luyện; - trình
      bày được đặc tính của lắp ghép, sai số về hình dáng hình học và vị trí tương quan, độ nhám bề mặt, chuỗi kích thước;
      - trình bày được cấu tạo, nguyên lý làm việc, tính năng kĩ thuật, phạm vi ứng dụng của các dụng cụ đo, cách đo, đọc
      kích thước và hiệu chỉnh các loại thước cặp, panme, đồng hồ so, thước đo góc vạn năng, đồng hồ đo lỗ.; - nắm được nguyên
      lý hoạt động của động cơ điện không đồng bộ 3 pha, công dụng, cách sử dụng một số loại dụng cụ điện dùng trong máy công
      cụ; - mô tả được các quy tắc, nội quy về an toàn lao động, vệ sinh công nghiệp, phòng chống cháy nổ, quy trình 5s cho
      cơ sở sản xuất, các biện pháp các biện pháp nhằm tăng năng suất; - trình bày được đặc tính kỹ thuật, cấu tạo, nguyên
      lý làm việc, phương pháp sử dụng, bảo quản các dụng cụ (gá, cắt, kiểm tra.) trên một số loại máy công cụ; - tiếp cận
      được một số phương pháp gia công cơ bản trên máy tiện cnc, máy phay cnc, máy gia công tia lửa điện . biết một số dạng
      sai hỏng, nguyên nhân và các biện pháp phòng tránh; - trình bày được quy trình công nghệ gia công một số chi tiết theo
      yêu cầu; - trình bày được những kiến thức cơ bản về chính trị, văn hóa, xã hội, pháp luật, quốc phòng an ninh, giáo
      dục thể chất theo quy định.'
    - chủ tịch hội đồng thành viên 1. chủ tịch hội đồng thành viên do bộ công thương bổ nhiệm. chủ tịch hội đồng thành viên
      không được kiêm tổng giám đốc vinataba và tổng giám đốc hoặc giám đốc các doanh nghiệp khác. .
  - source_sentence: Mức thu lệ phí môn bài đối với doanh nghiệp được quy định như thế nào?
    sentences:
    - 'nguyên tắc xử lý vi phạm hành chính 1. nguyên tắc xử phạt vi phạm hành chính bao gồm: . đ) người có thẩm quyền xử phạt
      có trách nhiệm chứng minh vi phạm hành chính. cá nhân, tổ chức bị xử phạt có quyền tự mình hoặc thông qua người đại
      diện hợp pháp chứng minh mình không vi phạm hành chính; .'
    - '“điều 4. mức thu lệ phí môn bài 1. mức thu lệ phí môn bài đối với tổ chức hoạt động sản xuất, kinh doanh hàng hóa,
      dịch vụ như sau: a) tổ chức có vốn điều lệ hoặc vốn đầu tư trên 10 tỷ đồng: 3.000.000 đồng/năm; b) tổ chức có vốn điều
      lệ hoặc vốn đầu tư từ 10 tỷ đồng trở xuống: 2.000.000 đồng/năm; c) chi nhánh, văn phòng đại diện, địa điểm kinh doanh,
      đơn vị sự nghiệp, tổ chức kinh tế khác: 1.000.000 đồng/năm. mức thu lệ phí môn bài đối với tổ chức quy định tại điểm
      a và điểm b khoản này căn cứ vào vốn điều lệ ghi trong giấy chứng nhận đăng ký kinh doanh; trường hợp không có vốn điều
      lệ thì căn cứ vào vốn đầu tư ghi trong giấy chứng nhận đăng ký đầu tư. ."'
    - 'miễn nộp tiền tạm ứng án phí, án phí, tạm ứng lệ phí tòa án, lệ phí tòa án 1. những trường hợp sau đây được miễn nộp
      tiền tạm ứng án phí, án phí: a) người lao động khởi kiện đòi tiền lương, trợ cấp mất việc làm, trợ cấp thôi việc, bảo
      hiểm xã hội, tiền bồi thường về tai nạn lao động, bệnh nghề nghiệp; giải quyết những vấn đề bồi thường thiệt hại hoặc
      vì bị sa thải, chấm dứt hợp đồng lao động trái pháp luật; b) người yêu cầu cấp dưỡng, xin xác định cha, mẹ cho con chưa
      thành niên, con đã thành niên mất năng lực hành vi dân sự; c) người khiếu kiện quyết định hành chính, hành vi hành chính
      trong việc áp dụng hoặc thi hành biện pháp xử lý hành chính giáo dục tại xã, phường, thị trấn; d) người yêu cầu bồi
      thường về tính mạng, sức khỏe, danh dự, nhân phẩm, uy tín; đ) trẻ em; cá nhân thuộc hộ nghèo, cận nghèo; người cao tuổi;
      người khuyết tật; người có công với cách mạng; đồng bào dân tộc thiểu số ở các xã có điều kiện kinh tế - xã hội đặc
      biệt khó khăn; thân nhân liệt sĩ được cơ quan nhà nước có thẩm quyền cấp giấy chứng nhận gia đình liệt sĩ. 2. những
      trường hợp quy định tại điểm đ khoản 1 điều này được miễn các khoản tạm ứng lệ phí tòa án, lệ phí tòa án quy định tại
      khoản 1 điều 4 của nghị quyết này. 3. trường hợp các đương sự thỏa thuận một bên chịu toàn bộ án phí hoặc một phần số
      tiền án phí phải nộp mà bên chịu toàn bộ án phí hoặc một phần số tiền án phí phải nộp thuộc trường hợp được miễn nộp
      tiền án phí thì tòa án chỉ xem xét miễn án phí đối với phần mà người thuộc trường hợp được miễn phải chịu theo quy định,
      của nghị quyết này. phần án phí, lệ phí tòa án mà người đó nhận nộp thay người khác thì không được miễn nộp. pháp luật
      quy định cá nhân thuộc hộ nghèo là đối tượng được miễn án phí tòa án. theo quy định nêu trên, gia đình bạn thuộc hộ
      nghèo, thuộc trường hợp được miễn án phí tòa án theo quy định của pháp luật. do đó, án phí tòa án của con bạn thuộc
      trường hợp miễn nộp.'
  - source_sentence: Viên chức giữ chức danh Tìm kiếm cứu nạn hàng hải hạng 3 có những nhiệm vụ nào cần thực hiện?
    sentences:
    - 'tìm kiếm cứu nạn hàng hải hạng iii, mã số: v.12.45.03 1. nhiệm vụ: a) tham gia nghiên cứu, đề xuất đối với các chủ
      trương, chính sách, định hướng, quy hoạch, kế hoạch phát triển, ứng dụng khoa học và công nghệ trong phạm vi nhiệm vụ
      được giao; tham gia xây dựng cơ chế, quy định chuyên ngành theo quy định của pháp luật, phù hợp với tình hình thực tiễn;
      b) xây dựng kế hoạch, chương trình cụ thể để triển khai nhiệm vụ được phân công; nghiên cứu giải quyết theo thẩm quyền
      hoặc tham mưu trình cấp có thẩm quyền quyết định xử lý các vấn đề cụ thể liên quan đến lĩnh vực được phân công; c) hướng
      dẫn, theo dõi, đôn đốc, kiểm tra, giám sát và đề xuất các biện pháp để thực hiện các quy định hoặc quyết định quản lý
      đạt kết quả; d) tham gia thu thập thông tin, số liệu thống kê theo dõi người, phương tiện, trang thiết bị; quản lý đội
      tàu chuyên trách, cơ sở hậu cần phục vụ công tác tìm kiếm cứu nạn; quản lý hồ sơ, lưu trữ hồ sơ, tài liệu nhằm phục
      vụ công tác; đ) chủ động phối hợp với các đơn vị liên quan và phối hợp với các viên chức khác triển khai công việc,
      đúng thẩm quyền và trách nhiệm được giao; e) thực hiện các nhiệm vụ khác được cấp có thẩm quyền giao. .'
    - '"1. lập hồ sơ để người lao động được cấp sổ bảo hiểm xã hội, đóng, hưởng bảo hiểm xã hội. 2. đóng bảo hiểm xã hội theo
      quy định tại điều 86 và hằng tháng trích từ tiền lương của người lao động theo quy định tại khoản 1 điều 85 của luật
      này để đóng cùng một lúc vào quỹ bảo hiểm xã hội. 3. giới thiệu người lao động thuộc đối tượng quy định tại điểm a khoản
      1, khoản 2 điều 45 và điều 55 của luật này đi khám giám định mức suy giảm khả năng lao động tại hội đồng giám định y
      khoa. 4. phối hợp với cơ quan bảo hiểm xã hội trả trợ cấp bảo hiểm xã hội cho người lao động. 5. phối hợp với cơ quan
      bảo hiểm xã hội trả sổ bảo hiểm xã hội cho người lao động, xác nhận thời gian đóng bảo hiểm xã hội khi người lao động
      chấm dứt hợp đồng lao động, hợp đồng làm việc hoặc thôi việc theo quy định của pháp luật. 6. cung cấp chính xác, đầy
      đủ, kịp thời thông tin, tài liệu liên quan đến việc đóng, hưởng bảo hiểm xã hội theo yêu cầu của cơ quan quản lý nhà
      nước có thẩm quyền, cơ quan bảo hiểm xã hội. 7. định kỳ 06 tháng, niêm yết công khai thông tin về việc đóng bảo hiểm
      xã hội cho người lao động; cung cấp thông tin về việc đóng bảo hiểm xã hội của người lao động khi người lao động hoặc
      tổ chức công đoàn yêu cầu. 8. hằng năm, niêm yết công khai thông tin đóng bảo hiểm xã hội của người lao động do cơ quan
      bảo hiểm xã hội cung cấp theo quy định tại khoản 7 điều 23 của luật này."'
    - 'phụ cấp trách nhiệm cán bộ công đoàn cơ sở . 3. mức lương làm cơ sở tính hưởng phụ cấp: a) công đoàn cơ sở khu vực
      hành chính, sự nghiệp nhà nước, mức phụ cấp hằng tháng = (hệ số phụ cấp trách nhiệm) x (mức lương cơ sở theo quy định
      của nhà nước). b) công đoàn cơ sở doanh nghiệp và công đoàn cơ sở ngoài khu vực nhà nước, mức phụ cấp hằng tháng = (hệ
      số phụ cấp trách nhiệm) x (mức lương tối thiểu vùng theo quy định của nhà nước).'
  - source_sentence: Hồ sơ đề nghị chấp thuận hoạt động mua nợ của tổ chức tín dụng gồm gì?
    sentences:
    - nhiệm vụ, quyền hạn của ủy ban nhân dân phường 1. thực hiện nhiệm vụ, quyền hạn của đơn vị dự toán ngân sách trực thuộc
      ủy ban nhân dân quận hoặc ủy ban nhân dân thành phố thuộc thành phố theo quy định của luật ngân sách nhà nước. 2. đề
      xuất chủ trương đầu tư chương trình, dự án đầu tư công sử dụng vốn ngân sách nhà nước với ủy ban nhân dân quận hoặc
      ủy ban nhân dân thành phố thuộc thành phố để trình cấp có thẩm quyền quyết định chủ trương đầu tư theo quy định của
      luật đầu tư công; tham gia ý kiến về chủ trương đầu tư dự án thuộc thẩm quyền quyết định của cơ quan, cá nhân có thẩm
      quyền mà luật đầu tư công quy định phải có sự tham gia ý kiến của hội đồng nhân dân cấp xã; tổ chức thực hiện chương
      trình, dự án đầu tư công theo phân cấp quản lý. 3. đề xuất, phối hợp với cơ quan có thẩm quyền thực hiện nhiệm vụ về
      quốc phòng, an ninh, biện pháp bảo đảm trật tự, an toàn xã hội, đấu tranh, phòng, chống tội phạm và các hành vi vi phạm
      pháp luật khác trên địa bàn theo phân cấp quản lý. 4. phối hợp với ủy ban mặt trận tổ quốc việt nam cùng cấp thành lập
      tổ bầu cử đại biểu quốc hội, tổ bầu cử đại biểu hội đồng nhân dân. 5. thực hiện nhiệm vụ, quyền hạn do cơ quan nhà nước
      cấp trên phân cấp, ủy quyền. 6. thực hiện nhiệm vụ về tổ chức và bảo đảm việc thi hành hiến pháp, pháp luật, các văn
      bản của cơ quan nhà nước cấp trên tại địa bàn phường. 7. ủy ban nhân dân phường không có thẩm quyền ban hành văn bản
      quy phạm pháp luật. 8. thực hiện nhiệm vụ, quyền hạn khác theo quy định của pháp luật mà không trái với quy định của
      nghị quyết này.văn bản quy phạm pháp luật văn bản quy phạm pháp luật là văn bản có chứa quy phạm pháp luật, được ban
      hành theo đúng thẩm quyền, hình thức, trình tự, thủ tục quy định trong luật này. văn bản có chứa quy phạm pháp luật
      nhưng được ban hành không đúng thẩm quyền, hình thức, trình tự, thủ tục quy định trong luật này thì không phải là văn
      bản quy phạm pháp luật.
    - 'nguyên tắc, trách nhiệm trong quan hệ công tác 1. các nguyên tắc trong quan hệ công tác. quan hệ công tác giữa ban
      cán sự đảng bộ nông nghiệp và ptnt với bộ trưởng và các cấp ủy, tổ chức đảng trực thuộc trung ương phải bảo đảm các
      nguyên tắc cơ bản sau: - sự lãnh đạo tập trung thống nhất của đảng; thực hiện đúng chủ trương, đường lối của đảng, chính
      sách, pháp luật của nhà nước; - phù hợp với nguyên tắc tổ chức, hoạt động của đảng và chức năng, nhiệm vụ, quyền hạn
      của mỗi cơ quan, tổ chức đã được quy định tại điều lệ đảng, hiến pháp, pháp luật. bảo đảm việc tham mưu giúp ban chấp
      hành trung ương, bộ chính trị, ban bí thư lãnh đạo bộ, bộ trưởng có hiệu quả công tác chính trị, tư tưởng và tổ chức,
      xây dựng hệ thống chính trị, phát triển kinh tế - xã hội, tăng cường tiềm lực quốc phòng, an ninh, chủ động hội nhập
      quốc tế. đồng thời phát huy sự chủ động, linh hoạt, sáng tạo trong chỉ đạo, điều hành của bộ trưởng theo quy định của
      hiến pháp, pháp luật; - bảo đảm kịp thời, chặt chẽ, có hiệu quả cao trên cơ sở hợp tác, phối hợp, tạo điều kiện thuận
      lợi để mỗi cơ quan, tổ chức hoàn thành tốt nhiệm vụ. …'
    - 'hồ sơ đề nghị chấp thuận hoạt động mua nợ của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài 1. nguyên tắc lập hồ
      sơ: a) hồ sơ phải được lập bằng tiếng việt. các bản dịch từ tiếng nước ngoài ra tiếng việt phải có xác nhận của người
      đại diện hợp pháp của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài; b) đơn đề nghị chấp thuận hoạt động mua nợ phải
      do người đại diện pháp của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài ký. 2. hồ sơ đề nghị chấp thuận hoạt động
      mua nợ bao gồm: a) đơn đề nghị chấp thuận hoạt động mua nợ theo mẫu tại phụ lục số 01 đính kèm thông tư này. đối với
      ngân hàng 100% vốn nước ngoài, cam kết mua nợ là hoạt động mà chủ sở hữu, ngân hàng nước ngoài sở hữu 50% vốn điều lệ
      của ngân hàng 100% vốn nước ngoài đang được phép thực hiện tại nước nơi chủ sở hữu, ngân hàng nước ngoài đặt trụ sở
      chính. đối với chi nhánh ngân hàng nước ngoài, cam kết mua nợ là hoạt động ngân hàng mẹ được phép thực hiện tại nước
      nguyên xứ; b) nghị quyết của hội đồng quản trị (hội đồng thành viên) của tổ chức tín dụng thông qua việc đề nghị chấp
      thuận hoạt động mua nợ; văn bản và bản dịch của ngân hàng mẹ do người đại diện hợp pháp ký đồng ý đề nghị chấp thuận
      hoạt động mua nợ đối với chi nhánh ngân hàng nước ngoài.'
