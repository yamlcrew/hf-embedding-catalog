- source_sentence: "private recordOperation(\n    type: 'create' | 'update' | 'delete' | 'complete' | 'cancel',\n    todoId:\
    \ string,\n    changes?: ChangeRecord,\n    description?: string\n  ): void {\n    try {\n      const record: TodoOperationRecord\
    \ = {\n        id: this.generateId(),\n        type,\n        todoId,\n        changes,\n        timestamp: new Date().toISOString(),\n\
    \        description\n      };\n\n      this.operationRecords.unshift(record);\n      \n      // 只保留最近100条记录\n      if\
    \ (this.operationRecords.length > 100) {\n        this.operationRecords = this.operationRecords.slice(0, 100);\n     \
    \ }\n\n      hilog.info(LogConstants.DOMAIN_APP, LogConstants.TAG_APP, `Recorded operation: ${type} for todo ${todoId}`);\n\
    \    } catch (error) {\n      hilog.error(LogConstants.DOMAIN_APP, LogConstants.TAG_APP, `Failed to record operation:\
    \ ${error}`);\n    }\n  }"
  sentences:
  - 记录操作
