- source_sentence: I am angry about an incident at the supermarket, and it has been bothering me for the last three or four
    days. The person involved was flirting with me, and I think they should apologize. I didn't ask for an apology or indicate
    that I was upset during the conversation because I felt it would be inappropriate. I believe they should call me and set
    aside an appropriate time to apologize.
  sentences:
  - If you are a counsellor, please answer the questions based on the description of the patient.
  - It seems like this incident really impacted you and you believe that an apology is necessary for closure. It's understandable
    that you didn't address it on the spot if you felt it was inappropriate. However, people sometimes don't realize they've
    upset someone unless it's brought to their attention. Since you feel so strongly about this, have you considered reaching
    out to the person to express your feelings and provide them an opportunity to apologize?
  - It sounds like you have built a strong support system in San Diego with meaningful relationships and emotional investments.
    It's natural to feel apprehensive about moving away from that. Maybe you could consider the potential opportunities that
    LA has to offer and weigh them against what you would be leaving behind in San Diego. Additionally, think about the ways
    you can stay connected with your loved ones after moving. Just remember that it's a difficult decision, and it's important
    to give yourself time to make the best choice for you.
- source_sentence: Lately, I've been feeling a bit overwhelmed with everything going on in my life. I've been hearing things
    that aren't really there, like whispers and someone calling my name, but it's not happening all the time, just occasionally.
    I also find myself getting a bit disorganized, but I wouldn't say I'm completely disorganized. Sometimes, I just feel
    disconnected with what is happening around me. I've been like this for a couple of weeks now. My parents said that I've
    been acting differently, but I don't know, maybe I'm just overreacting? Can you help me with this?
  sentences:
  - If you are a counsellor, please answer the questions based on the description of the patient.
  - Thank you for sharing your experience with me. I can understand how hearing things and feeling disorganized might be confusing
    and concerning for you. It's important to discuss these symptoms and feelings in order to provide proper support. Can
    you tell me if you've experienced any changes in your mood, daily activities, or sleep habits during this time? Also,
    have you noticed any patterns or triggers for when you hear the whispers or feel disconnected from what's happening around
    you?
  - I appreciate you sharing your feelings and experiences with me. It sounds like you're going through a challenging period
    in your life, dealing with stress and worry. It's important to understand the factors contributing to your stress and
    how they might be influencing your thoughts and emotions. Could you provide some more specific examples of the situations
    that have caused you to feel stressed and worried? Additionally, have you noticed any patterns or triggers that seem to
    make your worries more intense?
- source_sentence: I've been experiencing anxiety due to the difficult transition from being at home, taking care of my son,
    to moving back into the work world. I've been trying to manage this anxiety by paying attention to nutrition, exercise,
    and practicing gratitude. Although I feel like I'm managing better now than when I first started, I'm still struggling.
  sentences:
  - It's great to hear that you've made some progress in managing your anxiety through healthy practices like focusing on
    nutrition, exercise, and gratitude. It's common for individuals to face challenges while transitioning between roles,
    and it might take more time for you to adjust fully. If you still find yourself struggling, consider seeking additional
    support through therapy or support groups. Is there a specific aspect of this transition that continues to cause you worry?
  - If you are a counsellor, please answer the questions based on the description of the patient.
  - It's great to hear that you have a strong drive for self-improvement and setting ambitious goals for yourself. Acknowledging
    this inner motivation is an essential step towards achieving what you desire. Remember, it's important to embrace the
    process of learning and growing, and not to put too much pressure on yourself to reach an end goal quickly. Take it one
    step at a time, and don't forget to celebrate your milestones along the way.
- source_sentence: Recently, I have been experiencing difficulties while learning. Sometimes it's quite challenging, and I
    feel upset with myself to the point of crying. However, at other times, I find it easy and feel a sense of accomplishment
    when I finally get things right.
  sentences:
  - If you are a counsellor, please answer the questions based on the description of the patient.
  - Thank you for sharing that with me. I'm glad you're feeling better now that you're here. Sometimes waiting can cause anxiety
    or stress, so it's important to find ways to manage these feelings. If you'd like, we can discuss some coping strategies
    for dealing with stress while waiting or in similar situations.
  - It seems like you've been having ups and downs with your learning experience. It's great that you sometimes feel accomplished
    when you finally understand something. When you're feeling upset or frustrated, it might be helpful to take a break and
    come back to it later, as you've mentioned. This can give you a fresh perspective and may help reduce stress. It's also
    important to remember that learning is a process, and it's okay to experience difficulties along the way.
- source_sentence: I remember generating alternative predictions. We said that I might get nervous but if I stay focused on
    what I want to do, I can probably do it. It's just hard to believe when I'm in this situation.
  sentences:
  - It seems like you've been dealing with unexpected expenses and some impulsive spending habits. By planning for a stricter
    budget and understanding the difference between essential and non-essential expenses, you can start to develop healthy
    financial habits. Have you considered creating a budget plan and setting aside a specific amount for unexpected expenses
    to help manage your spending?
  - It's normal to feel nervous in difficult situations. As a counsellor, I suggest continuing to test these alternative predictions
    directly in real-life experiences. As you encounter situations where you manage to handle things even while nervous, your
    belief in your abilities and the predictions will strengthen. Remember to stay focused and trust yourself.
  - If you are a counsellor, please answer the questions based on the description of the patient.
