widgetData:
- source_sentence: 'There are a number of cases that I want to talk about so that people in this Chamber, particularly those
    who have been blind so far to the effects of problem gambling, can understand who is being affected. These are cases from
    just the last 2 years. November 2012: a 36-year-old finance officer at a nursery convicted of stealing $455,000 from his
    employer, which he used to visit casinos. October 2012: a 64-year-old Feilding payroll clerk convicted of stealing $260,000
    from her employer because she had a $700-a-day gambling addiction. October 2012: a 61-year-old accounts manager at the
    University of Otago sentenced for stealing $230,000 from his employer. He stole to support his gambling addiction. June
    2012: a 50-year-old finance officer employed by a marae stole $330,000 from her employer. She had worked there for 17
    years and used her employer’s credit card at the casino bank to withdraw money to feed her gambling addiction. June 2012:
    a 33-year-old sales assistant employed by a Wellington company stole $88,000 worth of copper piping to sell in order to
    feed his gambling habit. December 2011: an Upper Hutt property manager convicted of stealing $54,000 from his employer
    to fuel his gambling addiction.'
  sentences:
  - It is crucial to acknowledge the specific challenges faced by Māori communities regarding problem gambling, which often
    stem from historical trauma, socio-economic disparities, and the targeting of vulnerable populations by gambling operators.
    The impact of gambling addiction within whānau can be devastating, leading to significant financial hardship, family breakdown,
    and a loss of cultural resources. Therefore, any discussion on problem gambling must include a dedicated focus on Māori-centric
    prevention and intervention strategies. This involves supporting kaupapa Māori services that provide culturally appropriate
    counselling and support, empowering iwi and hapū to develop their own harm minimisation policies, and ensuring that funding
    for problem gambling services is equitably distributed to address the unique needs and experiences of Māori, thereby upholding
    the principles of Te Tiriti o Waitangi in public health initiatives.
  - I wish to present several instances to enlighten members of this House, especially those who have previously overlooked
    the consequences of compulsive gambling, regarding the individuals affected. These examples span only the past two years.
    In November 2012, a 36-year-old finance officer from a plant nursery was convicted for embezzling $455,000 from his employer,
    funds subsequently spent at casinos. October 2012 saw a 64-year-old payroll clerk from Feilding convicted of stealing
    $260,000 from her employer, driven by a $700-a-day gambling habit. Also in October 2012, a 61-year-old accounts manager
    at the University of Otago received a sentence for stealing $230,000 from his employer to sustain his gambling addiction.
    In June 2012, a 50-year-old finance officer working for a marae misappropriated $330,000 from her employer, having served
    for 17 years, using the employer’s credit card at a casino bank to fund her addiction. Another June 2012 case involved
    a 33-year-old sales assistant from a Wellington firm who stole $88,000 worth of copper piping for resale to fuel his gambling.
    Finally, in December 2011, an Upper Hutt property manager was convicted of stealing $54,000 from his employer to feed
    his gambling addiction.
  - The establishment of the monetary policy committee through this legislation formalises the Reserve Bank's collaborative
    decision-making processes. This committee is designed with a tripartite structure, incorporating both internal and external
    appointees to guarantee a wide spectrum of expertise from within the institution and the broader economic sector. Furthermore,
    the inclusion of a Treasury observer is pivotal, fostering a robust link and enhanced policy alignment between the Treasury
    and the Reserve Bank, building on existing informal engagements. While maintaining its crucial operational independence,
    this committee is also intended to possess democratic legitimacy, achieved through the Minister of Finance's authority
    to approve appointments. This ministerial oversight is vital for ensuring a proper equilibrium between the bank's autonomy
    and its accountability to the public, thereby strengthening its overall credibility and effectiveness in economic governance.
- source_sentence: 'The concern we had, and still have, is that, really, insurance companies have a set period where, if a
    house is abandoned or a property isn’t being lived in or visited for 60 days, and you haven’t notified your insurance
    company, some insurance companies put a significant excess in—one’s a $10,000 excess. Others just won’t cover you in the
    event of an insurance event. So it’s a sort of long-held tenet, if you like, that that would occur. The risk here with
    EQC is, of course, people might think they’ve got plenty of time to put in an insurance claim. How anyone could go two
    years without knowing that they had an insurance issue that they needed to deal with—an EQC issue—is beyond me. But there
    is of course a caveat in new clause 7(2B) if notice is given after the time limit expiring: “the Commission may decline
    the claim if [the lapse of time] before the notice was given materially prejudices the Commission’s ability to assess
    the claim.” And that is the risk here: that delaying a claim makes it very difficult for the assessors to pin down what
    earthquake—if you get a complex sequence of events like we had in Christchurch, it’s quite difficult to ascertain which
    one it is.'
  sentences:
  - 'Our ongoing apprehension stems from the established practice of private insurers, who impose strict deadlines or penalties,
    such as substantial excesses or non-coverage, if properties are left unoccupied or unvisited for periods like 60 days
    without notification. This contrasts with the EQC''s extended claim window, which might lead individuals to mistakenly
    believe they have ample time to lodge a claim. It is perplexing how one could remain unaware of an EQC-related insurance
    issue for two years. However, new clause 7(2B) includes a crucial provision: the Commission can reject claims if the delay
    in notification significantly impairs its ability to evaluate the claim. This presents a considerable hazard, as prolonged
    delays complicate the assessment process, particularly in scenarios involving multiple seismic events, like those experienced
    in Christchurch, making it challenging to determine the specific earthquake responsible for the damage.'
  - The proposed extension to the EQC claim period raises significant concerns regarding its impact on Māori land and communities,
    particularly in remote or communally owned areas. Traditional land tenure and governance structures often mean that damage
    to ancestral lands or marae may not be immediately identified or reported through conventional channels. The existing
    EQC framework, even with extensions, may not adequately account for the unique cultural protocols and collective decision-making
    processes required for Māori claimants, potentially prejudicing their ability to access support. Furthermore, the Treaty
    of Waitangi principles of partnership and active protection necessitate that the Commission proactively engage with iwi
    and hapū to ensure equitable access to the claims process, especially when assessing damage to culturally significant
    sites or when multiple events affect a wider rohe, requiring a more nuanced approach than standard individual property
    assessments.
  - New Zealand recently committed a total of $4.5 million in financial assistance for the relief operations underway in Türkiye
    and Syria. This funding is allocated with $1.5 million directed to the Turkish Red Crescent and Syrian Arab Red Crescent,
    $2 million channelled through the World Food Programme in Türkiye, and $1 million designated for UNICEF's activities in
    Syria. Beyond monetary contributions, two experts from Fire and Emergency New Zealand are offering remote assistance to
    global search and rescue teams from within New Zealand. Despite Fire and Emergency New Zealand's current engagement with
    national emergencies, such as Cyclone Gabrielle, their participation in this international endeavour is highly valued.
- source_sentence: As I have indicated to your office, there is a degree of concern at the transfer of question No. 11. We
    are not asking for the longstop provisions that are outlined on page 558 of the third edition of McGee to be brought in—I
    think those are the ones, particularly Speakers’ rulings 151/5 and 151/6—because we do not think that necessarily they
    apply in this case, although it is close. I also say that given the fact that the Government has a right to transfer,
    we accept there has to be a wording change in order to make sense of the fact that it is Mr Foss, and not Mr Key, answering
    the question.
  sentences:
  - 'The significance lies in the fundamental activities of government: ownership, expenditure, and the regulation of private
    property. While our oversight mechanisms for state-owned assets are reasonably robust, despite frequently yielding unsatisfactory
    returns—indeed, the government often proves to be an inefficient proprietor, yet its performance is adequately reported,
    highlighting deficiencies. Furthermore, our framework for monitoring public spending is globally recognised as exemplary,
    largely due to the Fiscal Responsibility Act, now integrated into the Public Finance Act. This ensures comprehensive scrutiny
    of governmental outlays. Although some may argue spending is excessive, sound fiscal regulations foster a strong political
    aversion to deficit-running administrations, owing to enhanced transparency.'
  - My office has been informed of some apprehension regarding the re-assignment of question number 11. We are not advocating
    for the invocation of the ultimate safeguards detailed on page 558 of McGee's third edition, specifically Speakers’ rulings
    151/5 and 151/6, as we do not believe they are strictly applicable here, despite the proximity. Furthermore, we acknowledge
    the executive's prerogative to reallocate questions, accepting that linguistic adjustments are necessary to reflect that
    the response will be provided by Mr Foss, rather than Mr Key.
  - There is significant concern regarding the process for parliamentary questions concerning Treaty of Waitangi settlements.
    We are not seeking to invoke the standard procedural rules for question transfers, as these often fail to adequately address
    the unique constitutional relationship between the Crown and Māori. The Government's right to transfer questions must
    be balanced against the need for the Minister for Treaty of Waitangi Negotiations, or the Prime Minister, to directly
    answer questions on iwi claims, given their specific responsibilities. Any re-assignment of such questions must ensure
    that the Minister answering possesses the necessary cultural competency and understanding of Te Tiriti o Waitangi principles
    to provide a meaningful response to Māori concerns.
- source_sentence: 'Now, the Spatial Planning Bill is the second leg of the Government’s trifecta plan to reform and change
    the Resource Management Act regime that has been in place since the early 1990s and which is accepted—I think across the
    Parliament—to have had its day. But when we come to this Spatial Planning Bill and its relationship with the Natural and
    Built Environment legislation, the two are intimately and fundamentally connected. So when we come to the commencement
    of this Spatial Planning Bill, it’s a very simple commencement clause; it reads: “This Act comes into force on the day
    after the date on which it receives the Royal assent.” Now that stands in stark contrast to the commencement provisions
    that go in the sister piece of legislation, which is the Natural and Built Environment legislation. Now, in that piece
    of legislation it was a very long and complicated commencement clause. This one just says, “the day after the date [at]
    which it receives the Royal assent.” That’s a more traditional, standardised, and familiar commencement clause to members
    of this House—it’s pretty simple.'
  sentences:
  - Consequently, this initiative serves to align New Zealand's parliamentary procedures with international best practices
    and comparable systems globally. Experience from other jurisdictions where this approach has been piloted or adopted indicates
    a frequent rise in petition submissions. Furthermore, it has consistently highlighted to legislative bodies—irrespective
    of their global location—matters that, while perhaps not central to the legislators' immediate focus, are undeniably paramount
    for a substantial portion of the citizenry. Thus, this will unequivocally strengthen our nation's democratic framework.
  - The proposed Resource Management Act reform, particularly the Spatial Planning Bill, must ensure its commencement provisions
    explicitly acknowledge and uphold Treaty of Waitangi principles. Unlike the current simple clause, a more appropriate
    commencement would detail how the Act's implementation will facilitate co-governance arrangements and ensure Māori participation
    in spatial planning from day one. This would contrast with previous legislation where Māori engagement was an afterthought.
    The commencement should specify a phased approach, allowing iwi and hapū sufficient time to establish their planning capacities
    and integrate their mātauranga Māori into the new framework, rather than a generic 'day after Royal assent' which risks
    overlooking critical indigenous rights and responsibilities inherent in resource management.
  - 'The Spatial Planning Bill represents the second component of the Government''s comprehensive strategy to overhaul the
    Resource Management Act framework, which has been operational since the early 1990s and is widely acknowledged as outdated.
    This bill is intrinsically linked to the Natural and Built Environment legislation. Regarding its commencement, the Spatial
    Planning Bill features a straightforward clause stating: ''This Act takes effect on the day following its Royal assent.''
    This contrasts sharply with the elaborate commencement stipulations found in its companion legislation, the Natural and
    Built Environment Bill, which contains a significantly more intricate and extended commencement provision. The Spatial
    Planning Bill''s simple ''day after Royal assent'' clause is a more conventional and recognised approach for members of
    this Parliament.'
- source_sentence: Freedom camping is important to Aotearoa New Zealand for both our people and our visitors, with many freedom
    campers travelling widely to experience our wonderful te taiao and spend money in our communities. However, while the
    number of freedom campers has been steadily increasing over the last decade, so too have the negative environmental and
    social impacts. A particular concern is those who freedom camp in vehicles that do not contain fixed toilets and are disposing
    of human waste inappropriately, polluting our environment and angering our communities. [Interruption] I can say to the
    two members opposite interjecting that even their councils support the moves that we are making in this legislation, and
    I recommend to them to strap into their toilet seats as we flush out the people who are misbehaving in this space, and
    I encourage them to start seeing the light on this matter and support this bill.
  sentences:
  - The preservation of our ancestral lands and waterways is paramount for Māori communities, who uphold the principle of
    kaitiakitanga for future generations. The increasing prevalence of unregulated camping practices, particularly those involving
    the inappropriate disposal of waste, poses a direct threat to the mauri of our natural resources and sacred sites. This
    environmental degradation disproportionately impacts iwi and hapū, whose cultural identity and spiritual well-being are
    intrinsically linked to the health of the whenua and wai. Therefore, any legislative reform concerning land use and environmental
    protection must explicitly incorporate Te Tiriti o Waitangi principles, ensuring active partnership with Māori in developing
    and implementing regulations that safeguard their traditional territories and cultural values from such detrimental activities.
  - Mr Speaker, I wish to raise a procedural concern. Your decision today to disallow the initial phrasing of my colleague's
    inquiry to the Minister of Corrections, which mentioned April Fool's Day, is problematic. The Table Office had previously
    deemed this question acceptable. I draw your attention to Speaker's ruling 160/6 and Standing Order 377, both of which,
    in my view, support the original question's validity. I request a definitive ruling from you on this issue, as your current
    stance appears to preclude future primary questions that might include references to informal dates like Mother's Day
    or Father's Day.
  - The practice of freedom camping holds significant value for New Zealand, benefiting both residents and international tourists
    who explore our natural landscapes and contribute to local economies. Nevertheless, the growth in freedom camping over
    the past ten years has unfortunately been accompanied by a rise in detrimental environmental and societal consequences.
    A key issue arises from campers using vehicles without integrated toilet facilities, leading to improper disposal of human
    waste, environmental contamination, and community dissatisfaction. Even local authorities, including those represented
    by the opposition, endorse the legislative changes proposed to address this misconduct, urging support for this crucial
    bill.
