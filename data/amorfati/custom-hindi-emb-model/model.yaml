- source_sentence: ' Kuldeep Yadav : तो क्या बॉलीवुड एक्ट्रेस से शादी करने जा रहे वर्ल्ड चैंपियन कुलदीप यादव? बोले - जल्द
    ही खुशखबरी मिलेगी...  '
  sentences:
  - 'Shagun Apsagun: पूजा में नारियल का खराब निकलना शुभ या अशुभ? जानें मिलने वाले संकेत'
  - दोस्त की बहन पर आया दिल, प्यार में तोड़ीं धर्म की बेड़ियां, टीम इंडिया के दिग्गज की ऐसी थी लव स्टोरी
  - WhatsApp पर और भी ज्यादा स्मार्ट होगा Meta AI, एक इशारे पर कर देगा ये काम, चौंका देंगे फायदे
- source_sentence: ' Quiz: लिखता हूं पर पेन नहीं, चलता हूं पर गाड़ी नहीं, टिक-टिक करता हूं पर घड़ी नहीं, बताओ मैं कौन हूं? '
  sentences:
  - 'Ram Chalisa: बेहद चमत्कारी है श्रीराम चालीसा, रोजाना पढ़ने से खुल जाएंगे धन आगमन के रास्ते, ये दिन है खास'
  - 'वैज्ञानिकों की नई खोज: बस थोड़ी सी ऑक्सीजन चाहिए थी... और धरती पर फूट पड़ा जीवन का अंकुर'
  - 'France Election: 28 साल के जॉर्डन बार्डेला बन सकते हैं फ्रांस के पीएम, धाकड़ विरोधियों को पस्त करने का है माद्दा'
- source_sentence: ' बारिश के मौसम में उत्तराखंड की इन जगहों पर घूमना पड़ सकता है भारी अवॉइड करें ये 5 जगहें '
  sentences:
  - 'Vastu Tips: घर के मुख्य दरवाजे पर ये एक चीज लटकाने से दौड़ी आएंगी मां लक्ष्मी, पैसों की तंगी से मिलेगा छुटकारा'
  - एडवेचंर के हैं शौकीन तो मानसून में घूमें उत्तराखंड की ये 6 रोमांचक ट्रेक
  - Samsung Galaxy Ring हुई लॉन्च, 9 साइज और 3 कलर ऑप्शन में मिलेगी, जानें फीचर्स
- source_sentence: ' रथ में सवार होकर मौसी के घर गए भगवान जगन्‍नाथ बीमार क्‍यों हो जाते हैं? '
  sentences:
  - 'Airport Jobs: 10वीं पास से लेकर ग्रेजुएट के लिए वैकेंसी, यूपी के हिंडन एयरपोर्ट के लिए होगा चयन, ऐसे भरें फॉर्म'
  - शादी के बाद जहीर इकबाल ने शेयर की UNSEEN रोमांटिक फोटो, पति की आंखों में खोई दिखीं दुल्हनिया सोनाक्षी सिन्हा
  - मनी प्‍लांट भी है इस पौधे के आगे फेल, घर में लगाते ही बरसता धन
- source_sentence: ' बैंक ऑफ बड़ौदा ने कस्टमर्स को दिया झटका! इन लोगों की बढ़ेंगी मुश्किलें '
  sentences:
  - 'Karnataka: चुनाव जीतने के जश्न में खुलेआम बंटी शराब.. भाजपा ने इस नेता को पार्टी से कर दिया बेदखल'
  - 'PM Modi''s Russia visit: अमेरिका ने की पीएम मोदी से अपील, राष्ट्रपति पुतिन के सामने उठाएं ये मुद्दा'
  - 'Hemant Soren: सीएम बनते ही हेमंत सोरेन के सिर पर फिर लटकी तलवार, जमानत रद्द करवाने के लिए सुप्रीम कोर्ट पहुंची ED'
