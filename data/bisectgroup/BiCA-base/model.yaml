  - source_sentence: Load-dependent detachment and reattachment kinetics of kinesin-1, -2 and 3 motors
    sentences:
    - Bidirectional cargo transport by kinesin and dynein is essential for cell viability and defects are linked to neurodegenerative
      diseases. Computational modeling suggests that the load-dependent off-rate is the strongest determinant of which motor
      'wins' a kinesin-dynein tug-of-war, and optical tweezer experiments find that the load-dependent detachment sensitivity
      of transport kinesins is kinesin-3 > kinesin-2 > kinesin-1. However, in reconstituted kinesin-dynein pairs vitro, all
      three kinesin families compete nearly equally well against dynein. Modeling and experiments have confirmed that vertical
      forces inherent to the large trapping beads enhance kinesin-1 dissociation rates. In vivo, vertical forces are expected
      to range from negligible to dominant, depending on cargo and microtubule geometries. To investigate the detachment and
      reattachment kinetics of kinesin-1, 2 and 3 motors against loads oriented parallel to the microtubule, we created a
      DNA tensiometer comprising a DNA entropic spring attached to the microtubule on one end and a motor on the other. Kinesin
      dissociation rates at stall were slower than detachment rates during unloaded runs, and the complex reattachment kinetics
      were consistent with a weakly-bound 'slip' state preceding detachment. Kinesin-3 behaviors under load suggested that
      long KIF1A run lengths result from the concatenation of multiple short runs connected by diffusive episodes. Stochastic
      simulations were able to recapitulate the load-dependent detachment and reattachment kinetics for all three motors and
      provide direct comparison of key transition rates between families. These results provide insight into how kinesin-1,
      -2 and -3 families transport cargo in complex cellular geometries and compete against dynein during bidirectional transport.
    - 'AP-1 and AP-2 adaptor protein (AP) complexes mediate clathrin-dependent trafficking at the trans-Golgi network (TGN)
      and the plasma membrane, respectively. Whereas AP-1 is required for trafficking to plasma membrane and vacuoles, AP-2
      mediates endocytosis. These AP complexes consist of four subunits (adaptins): two large subunits (β1 and γ for AP-1
      and β2 and α for AP-2), a medium subunit μ, and a small subunit σ. In general, adaptins are unique to each AP complex,
      with the exception of β subunits that are shared by AP-1 and AP-2 in some invertebrates. Here, we show that the two
      putative Arabidopsis thaliana AP1/2β adaptins co-assemble with both AP-1 and AP-2 subunits and regulate exocytosis and
      endocytosis in root cells, consistent with their dual localization at the TGN and plasma membrane. Deletion of both
      β adaptins is lethal in plants. We identified a critical role of β adaptins in pollen wall formation and reproduction,
      involving the regulation of membrane trafficking in the tapetum and pollen germination. In tapetal cells, β adaptins
      localize almost exclusively to the TGN and mediate exocytosis of the plasma membrane transporters such as ATP-binding
      cassette (ABC)G9 and ABCG16. This study highlights the essential role of AP1/2β adaptins in plants and their specialized
      roles in specific cell types.'
    - A single kinesin molecule can move "processively" along a microtubule for more than 1 micrometer before detaching from
      it. The prevailing explanation for this processive movement is the "walking model," which envisions that each of two
      motor domains (heads) of the kinesin molecule binds coordinately to the microtubule. This implies that each kinesin
      molecule must have two heads to "walk" and that a single-headed kinesin could not move processively. Here, a motor-domain
      construct of KIF1A, a single-headed kinesin superfamily protein, was shown to move processively along the microtubule
      for more than 1 micrometer. The movement along the microtubules was stochastic and fitted a biased Brownian-movement
      model.
  - source_sentence: Phylogenetic analysis of mitochondrial genes in Macquarie perch from three river basins
    sentences:
    - Sedentary behavior is an emerging risk factor for cardiovascular disease (CVD) and may be particularly relevant to the
      cardiovascular health of older adults. This scoping review describes the existing literature examining the prevalence
      of sedentary time in older adults with CVD and the association of sedentary behavior with cardiovascular risk in older
      adults. We found that older adults with CVD spend >75 % of their waking day sedentary, and that sedentary time is higher
      among older adults with CVD than among older adults without CVD. High sedentary behavior is consistently associated
      with worse cardiac lipid profiles and increased cardiac risk scores in older adults; the associations of sedentary behavior
      with blood pressure, CVD incidence, and CVD-related mortality among older adults are less clear. Future research with
      larger sample sizes using validated methods to measure sedentary behavior are needed to clarify the association between
      sedentary behavior and cardiovascular outcomes in older adults.
    - An improved Bayesian method is presented for estimating phylogenetic trees using DNA sequence data. The birth-death
      process with species sampling is used to specify the prior distribution of phylogenies and ancestral speciation times,
      and the posterior probabilities of phylogenies are used to estimate the maximum posterior probability (MAP) tree. Monte
      Carlo integration is used to integrate over the ancestral speciation times for particular trees. A Markov Chain Monte
      Carlo method is used to generate the set of trees with the highest posterior probabilities. Methods are described for
      an empirical Bayesian analysis, in which estimates of the speciation and extinction rates are used in calculating the
      posterior probabilities, and a hierarchical Bayesian analysis, in which these parameters are removed from the model
      by an additional integration. The Markov Chain Monte Carlo method avoids the requirement of our earlier method for calculating
      MAP trees to sum over all possible topologies (which limited the number of taxa in an analysis to about five). The methods
      are applied to analyze DNA sequences for nine species of primates, and the MAP tree, which is identical to a maximum-likelihood
      estimate of topology, has a probability of approximately 95%.
    - 'Genetic variation in mitochondrial genes could underlie metabolic adaptations because mitochondrially encoded proteins
      are directly involved in a pathway supplying energy to metabolism. Macquarie perch from river basins exposed to different
      climates differ in size and growth rate, suggesting potential presence of adaptive metabolic differences. We used complete
      mitochondrial genome sequences to build a phylogeny, estimate lineage divergence times and identify signatures of purifying
      and positive selection acting on mitochondrial genes for 25 Macquarie perch from three basins: Murray-Darling Basin
      (MDB), Hawkesbury-Nepean Basin (HNB) and Shoalhaven Basin (SB). Phylogenetic analysis resolved basin-level clades, supporting
      incipient speciation previously inferred from differentiation in allozymes, microsatellites and mitochondrial control
      region. The estimated time of lineage divergence suggested an early- to mid-Pleistocene split between SB and the common
      ancestor of HNB+MDB, followed by mid-to-late Pleistocene splitting between HNB and MDB. These divergence estimates are
      more recent than previous ones. Our analyses suggested that evolutionary drivers differed between inland MDB and coastal
      HNB. In the cooler and more climatically variable MDB, mitogenomes evolved under strong purifying selection, whereas
