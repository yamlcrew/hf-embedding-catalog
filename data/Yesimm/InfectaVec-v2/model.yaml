    발생현황

    발생현황

    -  ‘18.1.1.∼10.2일까지  총  558명(확진  24)  발생

    *  ’18.9.19일  뎅기열  환자  3건보고  되어  추가조사  중  뎅기열

    사례정의를  충족하는  180건  확인

    *  Institute  Pasteur  Dakar(IPD)에서  실시한  분석결과  뎅기

    열  바이러스  혈청형  1(DENV-1)의  순환  확인

    -  ‘18.6.1.∼9.16일까지  총  32건(사망  10)  발생

    *  32건  중  12건이  5개  cluster(의료기관  1,  가정  4)로  발생

    •  6.1~8일  Najran  지역  가족  내  감염에  의해  4명

    •  7.9~14일  Riyadh  Afif시에서  가족  내  감염  2명

    •  9.3~4일  Al-Quassim  지역의  Buraidah  City에있는  의료

    시설  내에서  2명

    •  9.1~16일까지  Al-Quassim  지역의  Buraidah시에서  가족

    *  확인된  사례  중  여성이  71%,  연령대는  24~59세가  50%

    내  감염  2명

    *  주요  발생지역은  Ndiaye-Ndiaye(33%)와  Peulgha–Poukham

    •  9.10~16일  Riyadh  지역에서  가족  내  감염  2명

    (33%)지역,  Aedes  aegypti가  주  벡터이며  주간  활동과  옥

    *  ‘12.9.16~’18.9.16일까지  WHO에  보고된  환자는  총  2,254

    외에서  모기물림  경향이  높게  나타남

    *  조사결과  해당지역에  물웅덩이,  화분  및  바나나  농장을  비롯

    하여  여러  곳에서  벡터  번식지  확인

    *  가장  최근  발생은  2017  년  4/4  분기이며  그  기간  동안  Louga,

    Fatick,  Dakar  및  Thies의  네  지역에서  100건  발생

    (사망  800)

    <사우디아라비아,  메르스  사례  지리적  분포/‘18.9월(ECDC)>

    <세네갈,  뎅기열  사례  지리적  분포/‘18.9.19~10.2(WHO)>

    상황평가

    -  보건당국은  의심되는  전  사례의  표본을  체계적으로

    수집,  사례를  문서화하고  있으며  의심사례의  검체를

    신속히  분석하고  진단하기  위해  현장(Fatick)에  이동

    진단실험실을  설치하여  검사  진행  중

    -  뎅기열사례  관리를  위한  Fact  sheet를  개발하여  모

    든  지역에  보급

    -  도시  전체를  훈증소독하고  집주변  반경  100m에  성

    <전세계,  월별  메르스  발생현황/‘12.3~’18.9월ECDC>

    상황평가

    -  지금까지  확인된  사람  간  전염은  주로  의료  환경에서

    발생,  사우디아라비아  의료기관  내  2차  감염사례의

    감소는  중동지역  전체  환자발생률을  감소시킴

    -  그러나,  WHO는  MERS-CoV  감염  사례는  지속보고  될

    것이며  낙타  또는  낙타제품에  노출  된  후에  감염된

    사례가  다른  국가로  유입될  가능성  있어,

    충  매개체  통제를  위한  살충제  유포

    -  의료  시설에서의  감염  예방  및  조기  통제조치는  MERS-

    -  현재의  유행은  다른  지역으로  추가  확산되지  않은

    CoV의  확산을  방지하는데  중요함을  강조

    것으로  확인

    -  현재  상황과  이용  가능한  정보에  근거하여  모든  회원

    국이  급성  호흡기  감염에  대한  감시를  계속하고  비정상

    적인  패턴을  면밀히  검토하도록  함

