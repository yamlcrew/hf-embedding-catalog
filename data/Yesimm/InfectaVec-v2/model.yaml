    상황평가

    ∙  병원유행은  메르스  발생양상의  특이한  상황이  아니며  기  알려진  예방수칙이  적절히  이행되지  않아  유행이  발생된

    것으로  추정

    ∙  Wadi  Aldwasir시  유행은  수도  리야드에서  약  700km  떨어져있는  소도시  내에서  제한적으로  발생하고  있어

    사우디아라비아  내  또는  국제적  전파  가능성은  낮으나  사우디아라비아  의료기관  유행  등으로  환자가  지속적으로

    발생할  경우  바이러스  노출  가능성이  높아지므로  사우디  여행객  진료  시  주의  당부(예방수칙  철저,  신고  강조)

    ∙  사우디아라비아  및  오만에서  환자가  발생  중으로  유증상자  내원시  여행력‧방문력  확인하여,  의심환자일  경우  귀가

    조치나  타  의료기관으로  전원하지  말고,  즉시  관할보건소  또는  1339로  신고하여  주시기  바랍니다.

    메르스  의심환자(신고대상)

    ▶  발열과  호흡기  증상이  있으면서  증상발생  14일  이내에  다음  사항(1항이라도)  해당되는  경우

    -  중동지역  방문력  있음

    -  증상이  있는  메르스  환자와  밀접한  접촉력이  있음

    -  최근  메르스가  유행한  지역(국가)의  의료기관에  직원,  환자로  있었거나  방문력이  있음

    -  중동지역  방문  중  낙타접촉,  낙타고기  또는  낙타유  섭취력이  있음

    ▶  발열  또는  호흡기  증상이  있으면서  증상발생  14일  이내에  메르스  확진환자와  밀접하게  접촉한  자

    ▶  그  밖에  의료진  또는  역학조사관이  의심환자로  분류한  자

