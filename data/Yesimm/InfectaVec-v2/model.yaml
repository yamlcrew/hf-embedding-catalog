    알  림  사  항

    질병관리본부에서는  의약품안전사용서비스(DUR)  시스템을  활용한  해외감염병  및  발생국가  정보를  안내해  드리고

    있습니다.  최근  약  처방이  없어도  정보  확인이  가능하도록  기능을  수정하였으니  확인하여  주시기  바랍니다.

    1.  개선사항

    (기존  DUR  프로그램)  약  처방  시  해외여행력  확인  가능  →  (새로운  ITS  프로그램)  약  처방  없이  접수,  진료  시에도

    해외여행력  확인가능

    ◆  해외감염병  및  발생국가  정보-  4개  감염병  16개국(2018.6월  기준)

    ①  메르스(중동지역  13개국*)

    * 레바논, 바레인, 사우디아라비아, 시리아, 아랍에미리트, 오만, 요르단, 예멘, 이라크, 이란,

    이스라엘, 카타르, 쿠웨이트

    ②  라싸열(나이지리아)    ③  에볼라바이러스병(콩고민주공화국)    ④  페스트(마다가스카르)

    2.  이용방법

    기존  DUR  사용기관의  경우  청구SW업체  통해  “DUR시스템  기능검증”  후  이용가능,  미사용  기관의  경우

    건강보험심사평가원  홈페이지에서  전용  프로그램  다운*받아  이용가능

    *  건강보험심사평가원  홈페이지(http://www.hira.or.kr)에  프로그램  및  매뉴얼  게재

    3.  설치문의:  건강보험심사평가원  DUR  정보부(033-739~0422~4)로  문의하여  주시기  바랍니다

