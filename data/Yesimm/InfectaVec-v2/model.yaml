  - source_sentence: 최근 몇 년간 SFTS의 발생 추세는 어떤가요?
    sentences:
    - "Dar es Salaam, Nov. 10 -- EARLY sexual intercourse and excessive use of tobacco are among the factors fuelling increased\
      \ cases of cervical cancer among women and girls in the country.\nCervical cancer is the most common cancer in Tanzania,\
      \ whereby statistics show that, excluding human immunodeficiency virus, lower respiratory infections, malaria, diarrheal\
      \ diseases and TB, cervical cancer kills more women than any other form of illness in the country.\nMost cases of cervical\
      \ cancer are caused by infection with human papillomavirus (HPV), which is preventable with a vaccine.\nIn an exclusive\
      \ interview, Ms Mary Ngowi, a health expert at Benjamin Mkapa Hospital (BMH) Oncology via Screening Department said\
      \ only few women and girls attended went for diagnose of the dangerous disease.\nShe named Mwanza, Mara and Bukoba as\
      \ among the regions with high cervical cancer prevalence in the country.\nAbout 3.3 per cent of women in the general\
      \ population are estimated to harbour cervical HPV-16/18 infection at a given time, and 68.0 per cent of invasive cervical\
      \ cancers are attributed to HPVs 16 or 18. The Department of Health (DH) today (January 3) urged members of the public\
      \ to support Cervical Cancer Awareness Month through learning more about cervical cancer and taking effective precautionary\
      \ measures against cervical cancer, such as receiving human papillomavirus (HPV) vaccinations and undergoing regular\
      \ cervical screening.\n\r\n      \n\r\n     The International Agency for Research on Cancer of the World Health Organization\
      \ (WHO) has designated January as Cervical Cancer Awareness Month with an aim to raise public awareness and scale up\
      \ actions related to cervical cancer, thus eliminating it as a public health problem in the next century. In Hong Kong,\
      \ cervical cancer was the ninth most common female cancer in 2022, with 522 new cases and 167 deaths.\n\r\n      \n\r\
      \n     Most cervical cancers are caused by persistent infection with high-risk HPV. Women are recommended to:\n\r\n\
       \r\n\n\r\n\t\nReceive the HPV vaccine before sexual debut;\n\r\n\t\nUndergo cervical screening regularly;\n\r\n\t\n\
      Practise safe sex (e.g. using condoms and avoiding multiple sexual partners) to prevent HPV infection; and\n\r\n\t\n\
      Refrain from smoking, as it may increase the risk of cervical cancer.\n\r\n\n\r\n\n\r\n     HPV vaccines help prevent\
      \ cervical cancer and are effective in preventing high-risk HPV, including HPV 16 and 18, with protection rates over\
      \ 90 per cent. HPV vaccines work best for women who have never been exposed to HPV infection, i.e. before their first\
      \ sexual encounter. Since the 2019/20 school year, the DH has been providing free HPV vaccinations to eligible Primary\
      \ Five schoolgirls under the Hong Kong Childhood Immunisation Programme. The DH's School Immunisation Teams provide\
      \ the first dose of the HPV vaccine to Primary Five female students at their schools, and the second dose will be given\
      \ to them when they reach Primary Six in the following school year. The second dose coverage rate of HPV vaccination\
      \ for Primary Six girls in the school year 2022/23 was about 92 per cent.\n\r\n      \n\r\n     After reviewing the\
      \ scientific evidence, updated recommendations from the WHO and overseas experiences in relation to the efficacy and\
      \ safety of the HPV vaccine, the Scientific Committee on Vaccine Preventable Diseases under the Centre for Health Protection\
      \ of the DH has recommended the provision of catch-up vaccinations to girls under the age of 18. Therefore, the DH launched\
      \ a one-off catch-up HPV vaccination programme on December 2, 2024, for female Hong Kong residents born between 2004\
      \ and 2008 (i.e. girls aged 18 or below as in 2022, and not covered by the existing programme) to receive free HPV vaccinations.\
      \ All participants in this programme must have been registered with eHealth. Details of the programme, which lasts for\
      \ about two years, can be found on the DH's \nwebsite\n.\n\r\n      \n\r\n     Many women who are infected with HPV\
      \ or in the early stages of cervical cancer do not have noticeable symptoms. Therefore, women aged 25 to 64 who have\
      \ had sexual experience should undergo regular cervical screening. The Population Health Survey 2020-22 conducted by\
      \ the DH revealed that merely half of the eligible women in Hong Kong had ever been screened for cervical cancer. To\
      \ further increase the screening coverage, the DH promotes the Cervical Screening Programme to the general public through\
      \ various channels, such as television, radio, social media, the DH's website and posters. Members of the public can\
      \ also access information about cervical screening via the \"@DH mobile application\". Since 2023, the DH has been regularly\
      \ sending notifications to women of the appropriate age group through the Cervical Screening Information System and\
      \ the eHealth mobile app to remind them to undergo regular cervical screening.\n\r\n      \n\r\n     In Hong Kong, Maternal\
      \ and Child Health Centres (MCHCs) and Woman Health Centres of the DH, non-governmental organisations and private healthcare\
      \ providers provide cervical screening services. Common screening tests for cervical cancer include the HPV test of\
      \ cervical samples collected by healthcare professionals and/or Cytology test (also called cervical smear or Pap smear).\n\
      \r\n      \n\r\n     At the same time, the Primary Healthcare Commission is actively promoting the \"life course preventive\
      \ care plan\". Based on the core principles of prevention-oriented and whole-person care, a personalised preventive\
      \ care plan will be formulated to address the health needs of citizens across different life stages with reference to\
      \ the latest evidence. Family Doctors and primary healthcare professionals will collaborate to provide health advice\
      \ and education on chronic diseases and cancer screening, as well as healthy lifestyles according to age, sex and personal\
      \ factors such as family history, including cervical cancer.\n\r\n      \n\r\n     Women who wish to receive cervical\
      \ screening at MCHCs can schedule an appointment through the 24-hour hotline 3166 6631. For further information on cervical\
      \ cancer and screening, please visit the DH's \nwebsite\n.\n\t\t\t\t\n\n\t\t\t\t\n\n\t\t\t\t\n\t\t\t\t\n\n\t\t\t\t\n\
      \t\t\t\t\n \n\n\t\t\t\t\nEnds/Friday, January 3, 2025\n\t\t\t\t\n\n\t\t\t\t Issued at HKT 18:47\n\t\t\t\t\n\n\t\t\t\t\
      \n\n\t\t\t\t NNNN The Yobe State Ministry of Health and the Yobe State Primary Health Care Board in collaboration with\
      \ the National Primary Health Care Board among other partners have concluded arrangements for the flagging-off of the\
      \ Human Papillomavirus Vaccine (HPVV) campaign for prevention against the dangerous killer disease, cervical cancer.\n\
      A statement issued by the chairman Yobe State Social Mobilization and Community Engagement who is also the director\
      \ Information Services of the Ministry of Information, Alhaji Ali Musa Yawale said the exercise meant to cover the 17\
      \ local government areas of the state will be officially flagged-off at Government Girls College Damaturu by 10 o'clock\
      \ in the morning.\nThe chairman said government and development partners have organised a series of sensitization, enlightenment\
      \ and mobilization with a view to intimating the public on the importance of the vaccines and the purpose of selecting\
      \ the cohorts of 9-14 female children.\n\"In the last few weeks, we were able to organize a series of training, advocacies,\
      \ sensitization and enlightenment to stakeholders and people on the importance of the vaccine against the killer disease.\n\
      \"Government and development partners were able to train local government Health Promotion Officers on the new vaccine\
      \ while tradition and religious leaders, teachers among other stakeholders and the general public were engaged through\
      \ various means especially radio with a view to achieving the desired objectives.\n\"This is very important because\
      \ a study in 2020 across Nigeria said out of the 12, 000 new cases of HPV that causes certain types of cancers including\
      \ cervical cancer, 8, 000 died indicating about 67% of the new cases.\n\"The Gardasil 4 vaccine manufactured by Merck\
      \ & Co., is a human papillomavirus (HPV) vaccine that protects against four HPV types; 6, 11, 16, and 18 and is being\
      \ pre-qualified by the World Health Organization (WHO). HPV types 16 and 18 are responsible for causing the majority\
      \ of cervical, anal, oropharyngeal cancers, while HPV types 6 and 11 causes majority of genital warts.\"\nYawale called\
      \ on parents, guidance and caregivers to take the opportunity of the vaccine by preventing the ward against the killer\
      \ disease."
