      국내  주요  감염병  발생  현황

      <중증열성혈소판감소증후군(SFTS),  첫  사망자  발생>

      충청남도  청양군  거주자(여자/62세)로,  4월  13일  발열  및  설사  증상으로  4월  15일  병원  응급실  방문하여  치료,

      증상  호전  없어  16일  대학병원으로  전원  후  중환자실에서  치료받던  중  4월  20일  21시경  사망(패혈증  쇼크,  간

      기능  상승,  백혈구  감소,  혈소판  감소)  사례  발생

      *  증상  발생  전  밭농사,  고사리  채취,  나물  캐기  등의  야외  활동력  확인

      ●  중증열성혈소판감소증후군(SFTS)은  4~11월  사이에  호발하며,  야외활동  후  2주  이내에  고열(38-40도),  소화기증상

      (오심,  구토,  설사  등)  등의  유증상자  진료  시  SFTS  감염여부  확인을  위한  검사가  신속히  진행될  수  있도록  유의,

      중증환자  심폐소생술이나  기도삽관  시술  시  2차  감염에  주의

      <말라리아,  위험지역  여행시  감염주의>

      ●  ‘00년  환자발생이  정점에  이른  후  지속적으로  감소하여  최근  5년간  연  700명  이하로  발생하고  있으나  해외여행을

      통한  유입사례가  지속  발생하고  있음(연평균  70건  내외)

      *  모기  활동이  활발한  5-10월에  인천,  경기,  강원(휴전선  접경지역)의  거주자(군인  포함)  및  동남아시아  여행객에서

      집중적으로  발생

      <  말라리아  연도별  환자  발생  현황,  2003-2017  >

      *  말라리아  감염시  초기에  권태감,  서서히  상승하는  발열  증상이  수일간  지속되고,  이후  오한,  발열,  땀흘림  후  해

      열이  반복되면서  두통,  구역,  설사  등의  증상  발생,  유증상자  진료시  여행력  확인  필요

      *  치료제  비축  지정기관:  국립중앙의료원,  부산  중구보건소,  광주  동구보건소,  국립제주검역소

      *  국내·외  말라리아  위험지역  및  예방약  정보,  예방수칙  등은  질병관리본부  홈페이지(http://cdc.go.kr)  또는  질병관

      리본부  모바일  사이트(http://m.cdc.go.kr)를    통해  확인  가능

      의심환자(환자)  진료  시  관할보건소  또는  1339로  신고  당부  드립니다

