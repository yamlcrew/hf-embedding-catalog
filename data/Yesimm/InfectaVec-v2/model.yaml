    could be rolled out by the end of this year, U.S. officials said on Monday, after the drugmaker announced the start of
    a 30,000-subject trial to demonstrate it is safe and effective, the final hurdle prior to approval by global regulators.

    The trial is the first such late-stage study under the Trump administrations program to speed development of measures
    against the novel coronavirus, adding to hope that an effective vaccine will help end the pandemic.

    Shares of Cambridge, Massachusetts-based Moderna rose 9%.

    More than 150 coronavirus vaccine candidates are in various stages of development, with some two dozen prospects having
    advanced to human testing.

    COVID-19 has killed more about 650,000 people worldwide and battered economies.

    The large late-stage trial is designed to evaluate the safety of Modernas mRNA-1273 vaccine and determine if it can prevent
    symptomatic COVID-19 after two doses.

    The study also seeks to determine whether the vaccine can prevent coronavirus-related deaths.

    Results of a small early-stage study published earlier this month showed volunteers who got two doses of Modernas vaccine
    had levels of virus-killing antibodies that exceeded the average seen in people who had recovered from COVID-19. LONDON
    (Reuters) - AstraZenecas chief executive officer Pascal Soriot said on Monday that the lower first dose of its experimental
    COVID-19 vaccine meant more people can be vaccinated more quickly, as the British drugmaker unveiled interim late-stage
    trial results.

    The British drugmaker said on Monday its vaccine for the novel coronavirus could be around 90% effective without any serious
    side effects.'
