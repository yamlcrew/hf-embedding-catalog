    ·  1차  감염  7,  2차  감염  29,  조사  중  1

    ·  Wadi  Aldwasir  General  Hospital에서  의료진,  방문객,  환자  등  의료기관  전파사례  23명  확인

    ·  Index  case  낙타  접촉력이  있고  응급실을  통해  내원

    ·  2.11일부터  1차  감염  또는  감염경로  조사  중인  사례도  보고되고  있어  의료기관  유행사례와의  연관성  조사  중

    ·  ‘19년  중동지역  발생현황:  사우디아라비아  60명(사망  6명),  오만  6명(사망  2명)

