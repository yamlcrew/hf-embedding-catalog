      Ⅰ 감염병 감시연보 작성 및 감시 개요

      I-1. 작성목적 및 근거법령

      가.  작성목적

      국가  감염병  감시체계를  통해  수집된  신고·보고자료를  분석하여  국민들에게  감염병  발생현황  정보를

      제공하고  감염병  예방·관리  정책수립을  위한  국가  기초자료로  활용하기  위해  작성되었습니다.

      나.  근거법령

      감염병  감시통계는  ｢감염병의  예방  및  관리에  관한  법률｣  제11조  내지  제13조의  규정에  의거

      의료기관의  장(의사,  치과의사,  한의사),  부대장  및  그  밖의  신고자  등이  신고·보고한  ʻ감염병발생(사망)

      신고ʼ  내용을  기초로  작성되었습니다.

      I-2. 법정감염병 분류 및 신고범위

      가.  법정감염병  분류  기준

      ○  제1급감염병： 생물테러감염병  또는  치명률이  높거나  집단  발생의  우려가  커서  발생  또는

      유행  즉시  신고하여야  하고,  음압격리와  같은  높은  수준의  격리가  필요한

      감염병

      ○  제2급감염병：전파가능성을  고려하여  발생  또는  유행  시  24시간  이내에  신고하여야  하고,

      격리가  필요한  감염병

      ○  제3급감염병：그  발생을  계속  감시할  필요가  있어  발생  또는  유행  시  24시간  이내에  신고

      하여야  하는  감염병

      ○  제4급감염병：제1급감염병부터  제3급감염병까지의  감염병  외에  유행  여부를  조사하기  위하여

      표본감시  활동이  필요한  감염병

      [감염병의  예방  및  관리에  관한  법률 제2조제2호  내지 제5호]

      -  3  -


      나.  법정감염병  환자분류  기준

      ○  감염병환자：감염병의  병원체가  인체에  침입하여  증상을  나타내는  사람으로서  제11조제6항의

      진단기준에  따른  의사,  치과의사  또는  한의사의  진단이나  제16조2에  따른  감염병

      병원체  확인기관의  실험실  검사를  통하여  확인된  사람

      ○  감염병의사환자：감염병병원체가  인체에  침입한  것으로  의심이  되나  감염병환자로  확인되기  전

      단계에  있는  사람

      ○  병원체보유자：임상적인  증상은  없으나  감염병병원체를  보유하고  있는  사람

      [감염병의 예방  및  관리에 관한  법률  제2조제13호  내지  제15호]

      ※ 감염병병원체  확인기관

      1.  질병관리청

      2.  국립검역소

      3.「보건환경연구원법」  제2조에  따른  보건환경연구원

      4.「지역보건법」제10조에  따른  보건소

      5.「의료법」제3조에  따른  의료기관  중  진단검사의학과  전문의가  상근하는  기관

      6.「고등교육법」  제4조에  따라  설립된  의과대학  중  진단검사의학과가  개설된  의과대학

      7.「결핵예방법」  제21조에  따라  설립된 대한결핵협회(결핵환자의  병원체를 확인하는 경우만 해당한다)

      8.「민법」  제32조에  따라  한센병환자  등의  치료ㆍ  재활을  지원할  목적으로  설립된  기관(한센병환자의

      병원체를  확인하는  경우만  해당한다)

      9.  인체에서  채취한  검사물에  대한  검사를  국가,  지방자치단체,  의료기관  등으로부터  위탁받아  처리하는

      기관  중  진단검사의학과  전문의가  상근하는  기관

