      -  ‘16.11월~’18.4.11일까지  704명(사망  21)  발생

      *  발병은  샌디에고  카운티에서  시작되어  산타크루즈,  로스앤젤리스  및  몬테레이  카운티로  확산,

      지금까지  샌디에고(587명)와  산타크루즈(76명)에서  가장  많이  발생.

      *  위생환경이  불량한  지역,  불법  약물  사용자에서  대부분  발생

      *  보건부는  지금까지  12만3천  도스의  백신  공급,  모니터링  진행  중

      <미시간>

      -  ‘16.8월~’18.4.18일까지  815명(사망  25)  발생

      *  발병은  마컴(218명),  디트로이트시(168명),  웨인(140명),  오클랜드(110명)  순으로  발생이  높고  비

      위생적인  주사바늘  사용,  노숙자  등에서  발생하여  공중보건  인식향상  교육  및  백신접종  캠페인  진행

      <유타>

      -  ‘17.1월~’18.4.23일까지  226명  발생

      *  솔트레이크(156명),  유타(45),  베어리버(5명)  순으로  발생이  높고  노숙자  및  약물사용자에서

      39%  이상  발생하고  있으며  염기서열  분석결과  캘리포니아  주와  동일

      *  확진자  입원율이  이전  40%  미만이었으나  현  유행은  70%이상으로  기저질환자나  간염  등의  합병증

      환자가  증가하고  있음

      <켄터키>

      -  ‘17.8월~’18.4.14일까지  352명(사망  3)  발생

      *  노숙자,  마약사용자에서  주로  발생하였고  ‘17년  11월에  주  전역에서  환자  발생,  발생한  여러  건의

      사례가  바이러스  유전자  염기서열  분석결과  캘리포니아  주  및  유타  주와  동일

      상황평가

      - ECDC는  유행이  지속되면서  여성,  아동  및  노인에서  발생이  증가하였으나  그  수는  제한적이며  남성

      동성애자의  환자발생이  높지만  유행균주의  변이는  확인되지  않으며  백신접종  및  위생개선  등을  통한

      방역조치로  ‘17.5월  이후  감소추세임

      - 미국의  경우  캘리포니아  주의  마약중독자,  노숙자에서  시작된  유행이  다른  주로  확산되고  있으며,  최근

      캔터키  주에서  환자발생이  지속  보고되고  있음

      - 해당국가의  발생환자  중  여행자에서도  보고되고  있어,  위험국가  여행자를  통한  국내  유입  및  유입

      사례의  밀접접촉을  통한  전파  가능성이  있어  여행  전  백신접종  권장

      - 유증상자  진료시  여행력  확인,  의심환자  진료  시  관할보건소  또는  1339로  신고  당부

