- source_sentence: How has the CDC been monitoring the spread of mpox across different states in the United States?
  sentences:
  - "MPOX UPDATE (18): WHO, PAKISTAN, USA, SOCIOBEHAVIORAL FACTORS *************************************************************\
    \ A ProMED-mail post http://www.promedmail.org -- Source: Centers for Disease Control and Prevention (CDC) [edited] --\
    \ Communicated by: ProMED ****** -- Communicated by: ****** Thus, the indirect role of the vaccination campaign in implementing\
    \ mpox exposure mitigation strategies adapted by MSM was probably essential in reducing mpox cases, as observed.\n20230324.8709105\
    \ Monkeypox update (01) 20220521.8703393 ProMED-mail is a program of the International Society for Infectious Diseases\
    \ http://www.isid.org In this update: [1] Cases around the world [2] USA: cases by state [3] WHO assures assistance to\
    \ contain mpox in Pakistan [4] Pakistan: 1st confirmed case of mpox reported in Karachi [5] USA: isolated ocular mpox\
    \ without skin lesions [6] The effect of sociobehavioral factors and public health actions ****** [1] Cases around the\
    \ world Date: Wed 26 Apr 2023 17:30 EDT Source: Centers for Disease Control and Prevention (CDC) [edited] https://www.cdc.gov/poxvirus/monkeypox/response/2022/world-map.html\
    \ [The CDC report will be only updated every 2 weeks.\nPlease see last week's post for the latest update (Mpox update\
    \ (17): cases, South Korea, Japan, Pakistan, UK 20230501.8709757 ). -\nMod.\nCS] Communicated by: ProMED ****** [2] USA:\
    \ cases by state Date: Wed 26 Apr 2023 14:00 EDT https://www.cdc.gov/poxvirus/monkeypox/response/2022/us-map.html [The\
    \ CDC report will be only updated every 2 weeks.\nPlease see last week's post for the latest update (Mpox update (17):\
    \ cases, South Korea, Japan, Pakistan, UK 20230501.8709757 ). -\nMod.\nCS] -- Communicated by: ProMED ****** [3] WHO assures\
    \ assistance to contain mpox in Pakistan Date: Sat 29 April 2023 Source: Geo News [edited] https://www.geo.tv/latest/484554-who-assures-assistance-to-contain-monkeypox-in-pakistan\
    \ The World Health Organisation (WHO) Saturday [29 Apr 2023] assured to assist Pakistan as per its requirement to contain\
    \ the mpox virus.\nIn a statement, the organisation said it has been working and probing the spread of the virus alongside\
    \ Pakistan's government, as the situation continues to evolve.\nWHO has assured assistance to the government, especially\
    \ in the lab testing process, points of entry and providing testing kits.\nAn official of the Ministry of National Health\
    \ Services stated that no evidence of localised transmission of mpox in Pakistan has been found so far, while the risk\
    \ of its international spread from the country remains low.\nWHO also does not recommend any restrictions on trade on\
    \ the currently available information regarding mpox outbreaks.\nEarlier this week, Pakistan detected its 1st 2 cases\
    \ of mpox in people who travelled to the country from abroad.\nAccording to health officials, the mpox patient was deported\
    \ from Saudi Arabia and landed in Pakistan on 17 Apr 2023 with symptoms of mpox.\nMeanwhile, another person sitting with\
    \ him on the flight also exhibited symptoms of the mpox.\nMeanwhile, in Karachi, Sindh health department officials told\
    \ The News that no case of the virus was detected after samples of 4 people were sent to the Dow University of Health\
    \ Sciences (DUHS) tested negative, while results of the 5th sample are yet to arrive. \"\nFour people, including a 14-year-old\
    \ boy and his father, as well as 2 Pakistanis who were deported from broad have tested negative for mpox, so at the moment,\
    \ no person is infected with the infectious disease in Karachi or any other part of Sindh,\" an official of the provincial\
    \ health department said.\nThe federal and provincial governments have put health authorities on high alert and imposed\
    \ certain SOPs to ensure that the virus is detected in a bid to ensure that it does not spread in the country.\nHealth\
    \ authorities have also reactivated \"COVID-19 protocols\" at all entry points -- including international airports --\
    \ to prevent the entry of people carrying the mpox virus into the country, while special attention is being paid to the\
    \ screening of hundreds of Pakistanis deported from different countries on monthly basis. [\nAid from WHO, in addition\
    \ to precautions already being taken by the country, will be very helpful in minimizing this outbreak of mpox.\nInbound\
    \ travelers should watch out for signs and symptoms of mpox. -\nMod.\nCS] [4] Pakistan: 1st confirmed case of mpox reported\
    \ in Karachi Date: Thu 4 May 2023 Source: Oye Yeah [edited] https://www.oyeyeah.com/news/first-confirmed-case-of-monkeypox-reported-in-karachi/\
    \ First confirmed case of mpox reported in Karachi ------------------------------------------------ The 1st confirmed\
    \ case of mpox has been reported in Karachi on Thursday [4 May 2023].\nThe infected person is a 30-year-old expatriate\
    \ who had been working as a driver in Jeddah, Saudi Arabia.\nHe tested positive for the mpox virus on Thursday [4 May\
    \ 2023] on his return to Pakistan. [\nMM] was isolated after his symptoms were identified.\nAccording to the health department,\
    \ the patient had recently arrived in Karachi from Jeddah and he is believed to have contracted the virus from abroad.\
    \ \"\nThe traveller who was working as a driver in Jeddah and made his way back to Pakistan via Oman has had his test\
    \ results confirmed to have mpox,\" said the department in a statement. \"\nHe was being isolated since he presented with\
    \ these symptoms and his contact tracing is underway.\"\nThe Sindh Health Department has advised the public to take precautions.\n\
    This is the 4th mpox case reported in Pakistan.\nThe 1st 2 cases were reported in Islamabad and another in Lahore. --\n\
    Communicated by: ProMED [It is unclear if this is the final test that results were pending on from the previous article.\n\
    Either way, it seems that this case was imported and not due to community transmission. -\nMod.\nCS] ****** [5] USA: isolated\
    \ ocular mpox without skin lesions Date: Tue 2 May 2023 Source: Centers for Disease Control and Prevention (CDC) [edited]\
    \ https://wwwnc.cdc.gov/eid/article/29/6/23-0032_article Citation: Nguyen MT, Mentreddy A, Schallhorn J, Chan M, Aung\
    \ S, Doernberg SB, et al.\nIsolated ocular mpox without skin lesions, United States.\nEmerg Infect Dis.\nJune 2023 --------------------------------------------------------------------------------\
    \ We report a case of ocular-only mpox infection in a 53-year-old man in San Francisco, California, USA.\nHis medical\
    \ history included chronic lymphocytic leukemia (CLL), inactive 2 years after treatment with obinutuzumab and venetoclax\
    \ but with persistent lymphopenia.\nHe reported male sexual partners but was HIV negative.\nSymptoms in his right eye\
    \ began August 2022 as itching and nasal scleral redness.\nThere was no fever, rash, or lymphadenopathy.\nEye redness\
    \ worsened; the patient sought care at an urgent care facility and was given erythromycin ointment.\nContinued vision\
    \ loss led to an emergency department visit, resulting in a diagnosis of preseptal cellulitis.\nThe treatment was trimethoprim/sulfamethoxazole\
    \ plus amoxicillin/clavulanic acid.\nIn early September 2022, the patient sought care at a county eye clinic for purulent\
    \ conjunctivitis and corneal epithelial defects.\nClinicians suspected gonococcal conjunctivitis and administered intramuscular\
    \ ceftriaxone and topical moxifloxacin 0.5%.\nBacterial and fungal ocular cultures and herpetic viral PCR returned negative\
    \ results.\nTopical prednisolone acetate 1% and oral valacyclovir failed to control the eye inflammation.\nThree weeks\
    \ after initial symptoms appeared, the patient's ocular inflammation increased; keratic precipitates and a moderate corneal\
    \ opacity developed.\nUveitis and scleritis workups did not yield a specific diagnosis.\nIn late September 2022, at a\
    \ 2nd opinion examination at a University of California clinic, the patient's right eye acuity was 20/640.\nExamination\
    \ showed a nasal patch of avascular scleral necrosis (Figure, panel B) [Figures available at source URL], and corneal\
    \ epithelial sloughing with microcystic edema.\nRepeat ocular surface cultures and PCR were negative.\nGiven the negative\
    \ results of extensive infectious etiology testing, we prescribed oral prednisone (40 mg/d) for presumed undifferentiated\
    \ necrotizing anterior scleritis and keratitis.\nOne week later, corneal inflammation worsened.\nClinical deterioration\
    \ on systemic steroids continued to raise suspicion for ocular infection; we stopped steroid treatments.\nAgain, cultures\
    \ and PCR remained negative.\nWithout prednisone, the patient's limbal infiltrates worsened, with progressive corneal\
    \ haze.\nWhite corneal endothelial plaques appeared.\nWe performed anterior chamber paracentesis for cultures, viral PCR,\
    \ and an RNA deep-sequencing (RNA-seq) protocol previously described.\nThe patient's scleritis, keratitis, and anterior\
    \ uveitis worsened.\nRight eye vision decreased to hand motion only.\nWe performed a diagnostic scleral and corneal biopsy\
    \ and initiated voriconazole for presumed fungal infection.\nThe biopsy results returned negative for infection, and voriconazole\
    \ was stopped.\nGiven the progressive clinical disease and negative infectious workup, we processed residual aqueous fluid\
    \ for RNA-seq, which revealed a high number of reads aligning to mpox virus (MPXV).\nOrthogonal testing from corneal and\
    \ scleral swab specimens also returned positive results for MPXV by PCR.\nA nasal swab specimen obtained on the same day\
    \ tested negative for MPXV by PCR.\nWhen presented with those findings, the patient offered additional information regarding\
    \ high-risk sexual activities, previously withheld because his definition of sexual activity included only penetrative\
    \ intercourse.\nHe described an encounter with a male partner with semen deposition into his right eye 2 weeks before\
    \ the onset of his symptoms.\nHe received the 1st dose of mpox vaccine for higher risk groups the week after this encounter.\n\
    Several months later, during casual text messaging, the partner from this activity revealed a subsequent penile mpox diagnosis.\
