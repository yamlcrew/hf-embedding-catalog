    Ⅰ 감염병 감시연보 작성 및 감시 개요

    I-1. 작성목적 및 근거법령

    가.  작성목적

    국가  감염병  감시체계를  통해  수집된  신고·보고자료를  분석하여  국민들에게  감염병  발생현황  정보를

    제공하고  감염병  예방·관리  정책수립을  위한  국가  기초자료로  활용하기  위해  작성되었습니다.

    나.  근거법령

    감염병  감시통계는  ｢감염병의  예방  및  관리에  관한  법률｣  제11조  내지  제13조의  규정에  의거

    의료기관의  장(의사,  치과의사,  한의사),  부대장  및  그  밖의  신고자  등이  신고·보고한  ʻ감염병발생(사망)

    신고ʼ  내용을  기초로  작성되었습니다.

    I-2. 법정감염병 분류 및 신고범위

    가.  법정감염병  분류  기준

    ○  제1급감염병： 생물테러감염병  또는  치명률이  높거나  집단  발생의  우려가  커서  발생  또는

    유행  즉시  신고하여야  하고,  음압격리와  같은  높은  수준의  격리가  필요한

    감염병

    ○  제2급감염병：전파가능성을  고려하여  발생  또는  유행  시  24시간  이내에  신고하여야  하고,

    격리가  필요한  감염병

    ○  제3급감염병：그  발생을  계속  감시할  필요가  있어  발생  또는  유행  시  24시간  이내에  신고

    하여야  하는  감염병

    ○  제4급감염병：제1급감염병부터  제3급감염병까지의  감염병  외에  유행  여부를  조사하기  위하여

    표본감시  활동이  필요한  감염병

    [감염병의  예방  및  관리에  관한  법률 제2조제2호  내지 제5호]

    -  3  -


    나.  법정감염병  환자분류  기준

    ○  감염병환자：감염병의  병원체가  인체에  침입하여  증상을  나타내는  사람으로서  제11조제6항의

    진단기준에  따른  의사,  치과의사  또는  한의사의  진단이나  제16조2에  따른  감염병

    병원체  확인기관의  실험실  검사를  통하여  확인된  사람

    ○  감염병의사환자：감염병병원체가  인체에  침입한  것으로  의심이  되나  감염병환자로  확인되기  전

    단계에  있는  사람

    ○  병원체보유자：임상적인  증상은  없으나  감염병병원체를  보유하고  있는  사람

    [감염병의 예방  및  관리에 관한  법률  제2조제13호  내지  제15호]

    ※ 감염병병원체  확인기관

    1.  질병관리청

    2.  국립검역소

    3.「보건환경연구원법」  제2조에  따른  보건환경연구원

    4.「지역보건법」제10조에  따른  보건소

    5.「의료법」제3조에  따른  의료기관  중  진단검사의학과  전문의가  상근하는  기관

    6.「고등교육법」  제4조에  따라  설립된  의과대학  중  진단검사의학과가  개설된  의과대학

    7.「결핵예방법」  제21조에  따라  설립된 대한결핵협회(결핵환자의  병원체를 확인하는 경우만 해당한다)

    8.「민법」  제32조에  따라  한센병환자  등의  치료ㆍ  재활을  지원할  목적으로  설립된  기관(한센병환자의

    병원체를  확인하는  경우만  해당한다)

    9.  인체에서  채취한  검사물에  대한  검사를  국가,  지방자치단체,  의료기관  등으로부터  위탁받아  처리하는

    기관  중  진단검사의학과  전문의가  상근하는  기관

    [감염병의  예방  및  관리에  관한  법률  제16조의2]

    -  4  -


    표 Ⅰ-2-1. 법정감염병 분류 및 종류

    Table Ⅰ-2-1. The Classification of National Infectious Diseases

    (2020년 12월 현재)

    1) 신종감염병증후군 : 급성출혈열증상, 급성호흡기증상, 급성설사증상, 급성황달증상 또는 급성신경증상을 나타내는 신종감염병증후군

    2) 장관감염증 : 살모넬라균 감염증, 장염비브리오균 감염증, 장독소성대장균(ETEC) 감염증, 장침습성대장균(EIEC) 감염증, 장병원성대장균(EPEC)

    감염증, 캄필로박터균 감염증, 클로스트리듐 퍼프린젠스 감염증, 황색포도알균 감염증, 바실루스 세레우스균 감염증, 예르시니아 엔테로

    콜리티카 감염증, 리스테리아 모노사이토제네스 감염증, 그룹 A형 로타바이러스 감염증, 아스트로바이러스 감염증, 장내 아데노바이러

    스 감염증, 노로바이러스 감염증, 사포바이러스 감염증, 이질아메바 감염증, 람블편모충 감염증, 작은와포자충 감염증, 원포자충 감염증

    3) 급성호흡기감염병 : 아데노바이러스 감염증, 사람 보카바이러스 감염증, 파라인플루엔자바이러스 감염증, 호흡기세포융합바이러스 감염증, 리노바이러스

    감염증, 사람 메타뉴모바이러스 감염증, 사람 코로나바이러스 감염증, 마이코플라스마 폐렴균 감염증, 클라미디아 폐렴균 감염증

    4) 해외유입기생충감염증 : 리슈만편모충증, 바베스열원충증, 아프리카수면병, 샤가스병, 주혈흡충증, 광동주혈선충증, 악구충증, 사상충증, 포충증, 톡소포

    자충증, 메디나충증

    5) 신고 : 의사, 치과의사, 한의사, 의료기관의 장 → 관할 보건소로 신고

    6) 보고 : 보건소장 → 시장ㆍ군수ㆍ구청장 → 특별시장ㆍ광역시장ㆍ도지사 → 질병관리청으로 보고

    7) 전수감시 : 감염병의 예방 및 관리에 관한 법률 제11조에 의하여 모든 의사, 치과의사, 한의사, 의료기관의 장, 부대장(군의관), 감염병병원체 확인기

    관의 장이 신고 의무를 갖는 감시체계임

    8) 표본감시 : 감염병의 예방 및 관리에 관한 법률 제16조 및 제11조제5항에 의하여 표본감시기관을 지정하고 지정된 기관에 한하여 신고를 받아 운영하

    는 감시체계임

