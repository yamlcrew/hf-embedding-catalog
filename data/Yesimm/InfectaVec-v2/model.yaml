      *    파키스탄  장티푸스  XDR  국제  전파  사례

      ·  ‘18.1월~10월까지  파키스탄  여행자에서  장티푸스(XDR)

      환자  6명보고

      ·  영국(1),  미국(5)에  거주자로  파키스탄의  카라치,  라호르,

      이슬라마바드  여행  시  감염된  것으로  확인

      *  미국  CDC는  ‘18.6월  여행자  주의  등급  2단계  발령  중

      상황평가

      -  DR콩고  에볼라  유행이  지속되고  있으며  새로이  Beni

      지역  외  Katwa,  Butembo  지역에서  환자발생  증가

      상황평가

      -  DR콩고  국경지역과  인접한  우간다,  르완다  및  남수단  등,

      난민  이동에  의한  잠재적  전파위험으로  국경  검역,

      주의보  발령  등  대응을  강화하고  우간다  등은  의료진을

      대상  예방접종을  실시  중

      -  WHO(‘19.1.9)는  위험평가  재검토결과  ’국가  및  지역

      수준에서  위험도는  매우  높고  세계적인  위험  수준은

      낮음‘으로  평가

      -  국내로  해당지역  유입  인구가  많지  않으나  유행지역

      확대  및  장기화  추세로,  유입사례  발생  가능성을  배제할

      수  없는  상황임

      -  환자의  유증상  기간  동안  직접접촉에  의한  전파가

      가능하기  때문에  환자발견이  지연되는  경우  지역사회로

      확산될  가능성은  있음

      -  의사(환자)  진료  시  추가  전파가  발생하지  않도록  지체

      없이  관할보건소  또는  1339로  신고하여주시기  바랍니다.

      4

      -  파키스탄에서  현재(2.6일  기준),  매일  수십명의  장티

      푸스  환자,  특히  학동기  연령층에서  발생  지속

      -  당국은  국제기구가  안전한  식량과  물에  대한  사전

      예방  조치  실시  중

      -  WHO는  국가  수준에서  XDR  S.  Typhi의  위험은

