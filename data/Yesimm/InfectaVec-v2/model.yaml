  sentences:
  - 'Amid the ongoing threat of the global COVID-19 pandemic, the end of the year got more complicated as a new mutant has
    been discovered in the United Kingdom.

    The UK believes there are still too many unknowns when it comes to this ‘mutated’ version of coronavirus.

    On the effectiveness of the vaccine, Dr Mishra said that the vaccine against the deadly COVID-19 could be effective or
    there could be need to develop a new vaccine.

    “We apply flu vaccine to patients with heart, kidney and other serious illness.

    So it is not unexpected that new variants of SARS-CoV-2 (Covid-19) are emerging, we see this all the time in other human
    and animal coronaviruses,” Prof Julian Hiscox, Chair in Infection and Global Health, University of Liverpool, was quoted
    as saying. Trans R Soc Trop Med Hyg . 2024 Nov 4:trae082. doi: 10.1093/trstmh/trae082. Online ahead of print. How well
    do different COVID-19 vaccines protect against different viral variants? A systematic review and meta-analysis Thi Ngoc
    Anh Hoang 1 , Aisling Byrne 2 , Ha-Linh Quach 2 3 , Melanie Bannister-Tyrrell 4 , Florian Vogt 2 5 Affiliations PMID:
    39495246 DOI: 10.1093/trstmh/trae082 Abstract While the efficacy of coronavirus disease 2019 (COVID-19) vaccines has been
    evaluated in numerous trials, comprehensive evidence on how protection by different vaccines has varied over time remains
    limited. We aimed to compare protective effects of different vaccines against different viral variants. To achieve this,
    we searched Medline, Cochrane Library and Embase for randomized controlled trials assessing the efficacy of COVID-19 vaccines.
    Forest plots using Mantel-Haenszel and random-effects models were generated showing risk ratios (RRs) and 95% CIs by vaccines
    and variants. We included 36 studies with 90 variant-specific primary outcomes. We found a RR of 0.26 (95% CI 0.21 to
    0.31) against all variants overall, with the highest protective effects against the wild-type (RR 0.13; 95% CI 0.10 to
    0.18), followed by Alpha (RR 0.26; 95% CI 0.18 to 0.36), Gamma (RR 0.34; 95% CI 0.21 to 0.55), Delta (RR 0.39; 95% CI
    0.28 to 0.56) and Beta (RR 0.49; 95% CI 0.40 to 0.62) variants. Nucleic acid vaccines showed the highest protection levels
    against all variants (RR 0.11; 95% CI 0.08 to 0.15), followed by protein subunit, inactivated virus and viral vector.
    In conclusion, we found high but heterogenous levels of protection for most COVID-19 vaccines, with decreasing protective
    effects for vaccines based on traditional technologies as SARS-CoV-2 variants emerged over time. Novel nucleic acid-based
    vaccines offered substantially higher and more consistent protection. Keywords: COVID-19 vaccine efficacy; meta-analysis;
    systematic review; viral variants. ​ Whether it is the family gatherings for Christmas or people congregating in city
    centres as the bell strikes midnight on New Year''s Eve, there is concern that large numbers of people mixing during the
    holiday season could result in spikes of COVID-19 infections.

    Perhaps this holiday season, we can reflect on the injustice of vaccine inequity and increase public pressure on governments
    and manufacturers to do more to share licenses and transfer technology and know-how, especially with the new WHO-led mRNA
    Tech Transfer Hubs, the first of which has been established in South Africa.

    The new variant appears to be the most transmissible so far and able to breakthrough vaccine protection more easily than
    Delta or other variants preceding it.

    Given that COVID-19 is a respiratory virus, which spreads mainly through the air via aerosols (small droplets) and larger
    droplets, it is important to know how best to keep oneself safe.

    By talking, singing and even just breathing, people with COVID-19 can easily pass the virus to others.

    Luckily, new oral treatments which reduce the severity of COVID-19 are becoming available.'
