      (사망  800)

      <사우디아라비아,  메르스  사례  지리적  분포/‘18.9월(ECDC)>

      <세네갈,  뎅기열  사례  지리적  분포/‘18.9.19~10.2(WHO)>

      상황평가

      -  보건당국은  의심되는  전  사례의  표본을  체계적으로

      수집,  사례를  문서화하고  있으며  의심사례의  검체를

      신속히  분석하고  진단하기  위해  현장(Fatick)에  이동

      진단실험실을  설치하여  검사  진행  중

      -  뎅기열사례  관리를  위한  Fact  sheet를  개발하여  모

      든  지역에  보급

      -  도시  전체를  훈증소독하고  집주변  반경  100m에  성

      <전세계,  월별  메르스  발생현황/‘12.3~’18.9월ECDC>

      상황평가

      -  지금까지  확인된  사람  간  전염은  주로  의료  환경에서

      발생,  사우디아라비아  의료기관  내  2차  감염사례의

      감소는  중동지역  전체  환자발생률을  감소시킴

      -  그러나,  WHO는  MERS-CoV  감염  사례는  지속보고  될

      것이며  낙타  또는  낙타제품에  노출  된  후에  감염된

      사례가  다른  국가로  유입될  가능성  있어,

      충  매개체  통제를  위한  살충제  유포

      -  의료  시설에서의  감염  예방  및  조기  통제조치는  MERS-

      -  현재의  유행은  다른  지역으로  추가  확산되지  않은

      CoV의  확산을  방지하는데  중요함을  강조

      것으로  확인

      -  현재  상황과  이용  가능한  정보에  근거하여  모든  회원

      국이  급성  호흡기  감염에  대한  감시를  계속하고  비정상

      적인  패턴을  면밀히  검토하도록  함

