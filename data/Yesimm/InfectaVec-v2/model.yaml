  - "AVIAN INFLUENZA (25): EUROPE (UK) SEAL, HPAI H5N1 ************************************************* A ProMED-mail post\
    \ http://www.promedmail.org ProMED-mail is a program of the International Society for Infectious Diseases http://www.isid.org\
    \ Date: Wed 8 Feb 2023 Source: Agriland [edited] https://www.agriland.co.uk/farming-news/bird-flu-found-in-seals-along-scotlands-east-coast/\
    \ The H5N1 strain of avian influenza (bird flu), the strain most common to birds during this current outbreak, was found\
    \ in 4 seals along the east coast of Scotland last week.\nThe affected seals, one grey seal and 3 harbour seals, were\
    \ found in 4 coastal locations at Orkney; Highland; Aberdeenshire; and Fife.\nThere have been other cases of bird flu\
    \ in Scotland since the turn of the year [2023]: Near the seaside towns of Fraserburgh, Aberdeenshire on 12 Jan 2023;\
    \ near Tain, Highland on 21 Jan 2023; Near Grantown on Spey, Highland on 24 Jan 2023; Clackmannan, Clackmannanshire, also\
    \ on 24 Jan 2023; Stranraer, Wigtownshire, Dumfries and Galloway on 28 Jan 2023; and near Crossgates, Fife on 2 Feb 2023.\n\
    It is thought that the current outbreak of bird flu, which began in October 2021, is a result of wild birds that are carrying\
    \ the disease migrating from the east.\nIt is not possible to determine that bird flu was the sole cause of death in these\
    \ animals. \"\nRoutine wildlife surveillance in the UK has detected the H5N1 strain in a small number of mammals over\
    \ the past 2 years, although it is uncertain whether these died from avian influenza of other causes,\" a spokesperson\
    \ for NatureScot, which is concerned about the overall current bird flu outbreak, said. \"\nThis is an unusual event in\
    \ the UK and infection of mammals with influenza of avian origin remains an uncommon infection.\nThe risk of the H5N1\
    \ strain to non-avian UK wildlife remains low.\"\nAside from the seals, this year [2023], only one other mammal, a fox\
    \ in Wales, has tested positive [in the UK] for influenza of avian origin.\nLast week, UK officials confirmed that \"\
    enhanced\" mammalian surveillance for avian influenza was initiated at the beginning of the year [2023], mostly targeting\
    \ mammals found dead near known areas of bird flu transmission.\nHowever, the Animal and Plant Health Agency (APHA) has\
    \ said that evidence of mammal-to-mammal transmission in the wild remains very limited and data does not suggest widespread\
    \ mammalian adaption of the virus. \"\nInfection of mammals with influenza of avian origin remains uncommon and the risk\
    \ of the H5N1 strain to non-avian UK wildlife remains low,\" an APHA spokesperson said. \"\nSamples taken as part of routine\
    \ wildlife surveillance over the last year have detected the presence of influenza of avian origin in 5 foxes, 4 otters\
    \ and 4 seals that were found dead -- which is an uncommon event.\nAdvice remains unchanged to not touch any sick or dead\
    \ wild animals and make sure to wash your hands thoroughly with soap after contact with any animal.\"\nChief superintendent\
    \ of Scottish Society for the Prevention of Cruelty to Animals (SSPCA), Mike Flynn, is also urging people to keep their\
    \ distance from sick, injured and dead animals. \"\nWe strongly advise that people keep their distance from any sick,\
    \ injured or dead marine animals.\nDogs should also be kept on a lead around wildlife at all times,\" he said on behalf\
    \ of SSPCA. \"\nAny birds, alive or dead, suspected of having avian flu would be a matter for Defra (the Department for\
    \ Environment, Food and Rural Affairs) to investigate.\"\nConcerns can also be directed to the SSPCA or NatureScot.\n\
    Dead seals, whales and dolphins should be reported to the Scottish Marine Animal Stranding Scheme. [\nByline: Michelle\
    \ Martin] -- Communicated by: ProMED Rapporteur Mahmoud Orabi [HPAI H5N1 viruses have the ability to infect a number of\
    \ mammalian species, many being classified in the order Carnivora.\nSeals are also part of the Order Carnivora, although\
    \ they are of the Suborder Pinnipedia (terrestrial carnivores are Fissipedia).\nSpread of the virus amongst carnivores\
    \ is likely attributed to predatory habits, as H5N1 has been isolated from the meat of infected animals and ingestion\
    \ of infected meat can cause infection.\nHPAI H5N8 was detected in 2 grey seals stranded on the Baltic coast of Poland\
    \ in 2016 and 2017.\nIn March 2021, the UK notified WOAH about the diagnosis of HPAI H5N8 in the remains of one grey seal\
    \ and 4 harbour seals from Surrey (20210317.8252821).\nSince April 2022 there have been several events of Eurasian HPAI\
    \ H5N1 in wild carnivores, including seals.\nMost cases in seals were recorded in North America.\nAs noted by Mod.\nPMB\
    \ (20220705.8704251), several subtypes of AI viruses (H7N7, H4N5, H4N6, H3N3 and H10N7) have caused epidemics in harbour\
    \ seals, but they do not appear to have become established in this carnivore species. -\nMod.\nAS ProMED map: Scotland,\
    \ United Kingdom: https://promedmail.org/promed-post?place=8708269,280 ] See Also \n2021 ---- Avian influenza (45): Europe\
    \ (UK, Croatia) seal, fox, wild bird, HPAI H5N8, OIE 20210317.8252821 2022 ---- Avian influenza (158): Americas (Canada)\
    \ seal, HPAI H5N1 20220805.8704881 Avian influenza (146): Americas (USA) seal, HPAI H5N1 20220705.8704251 .................................................sb/arn/may/ml\
    \ AVIAN INFLUENZA (158): AMERICAS (CANADA) SEAL, HPAI H5N1 ******************************************************** A\
    \ ProMED-mail post http://www.promedmail.org ProMED-mail is a program of the International Society for Infectious Diseases\
    \ http://www.isid.org Date: Tue 3 Aug 2022 Source: Tricity News, The Canadian Press report [edited] https://www.tricitynews.com/national-news/highly-pathogenic-avian-influenza-believed-to-be-killing-seals-in-quebec-5654452\
    \ Quebec researchers have detected avian flu in at least 2 species of seal, and they fear the virus is to blame for the\
    \ unusually high number of dead seals reported on the province's shorelines.\nA marine mammal research group, the Réseau\
    \ québécois d'urgences pour les mammifères marins, says about 100 harbour seal carcasses have been found since January\
    \ [2022] along the south shore of the St. Lawrence River in eastern Quebec -- almost 6 times more than in an average year.\
    \ \"\nIn June [2022] alone, the number reached 65 carcasses,\" the research group said in a statement on Tuesday [2 Aug\
    \ 2022]. \"\nAvian influenza was quickly suspected of playing a role in the increasing mortality.\"\nAbout 15 of the dead\
    \ harbour seals have tested positive for the highly pathogenic H5N1 avian flu, with the 1st case detected in a grey seal\
    \ last week, said Stéphane Lair, a professor of veterinary medicine at Université de Montréal.\nHe said the seals most\
    \ likely were in contact with carcasses of infected eider ducks when they came ashore to give birth at the beginning of\
    \ the summer. \"\nSome seals, including the grey seal, are known for eating wild birds ... but not harbour seals,\" Lair\
    \ said in an interview. \"\nThey are curious, they will smell carcasses.\"\nJean-François Gosselin, a biologist with Fisheries\
    \ and Oceans Canada, said these are the first reported cases of the virus being passed from wild birds to marine mammals\
    \ in Quebec.\nThe 1st H5N1 flu cases are believed to have arrived in North America at the end of winter, involving birds\
    \ that migrated from Europe.\nGosselin said the number of dead seals reported likely understates the reality. \"\nIt's\
    \ already difficult to count the number of seals that are alive ... carcasses that are beached, or floating between rocks,\
    \ is even harder,\" Gosselin said.\nHe added that it's difficult to monitor all transmission, which most likely is affecting\
    \ other species -- on land as well as marine mammals.\nGosselin and Lair both said that while they are monitoring the\
    \ situation, there is no threat of transmission to humans or of endangering the seal population. \"\nIt's normal with\
    \ an exotic virus ... it's a new virus that enters a new population that was never infected,\" Lair said. \"\nThe mortality\
    \ rate will be way higher than if the virus was already circulating naturally.\" \"\nWe need to be careful about all predators\
    \ or animals that could be in contact with wild birds,\" Gosselin said.\nBoth recommended that people avoid approaching\
    \ or touching animal carcasses and keep their pets, particularly dogs, away. [\nbyline: Virginie Ann] -- communicated\
    \ by: ProMED rapporteur Mahmoud Orabi [Infections by HPAI viruses in mammals are typically not common, but since April\
    \ 2022 there have been several events of Eurasian HPAI H5N1 in wild carnivores (order Carnivora), most of them in the\
    \ Americas.\nMost reports have been from red foxes (_Vulpes vulpes_, family Canidae), but skunks (family Mephitidae),\
    \ and raccoons (family Procyonidae), have also been found infected.\nSeals are also part of the Order Carnivora, although\
    \ they are of the Suborder Pinnipedia (terrestrial carnivores are Fissipedia).\nIn March 2021, there was a report of HPAI\
    \ H5N8 in harbor seals.\nSeveral subtypes of AI viruses (H7N7, H4N5, H4N6, H3N3, and H10N7) have caused epidemics in harbour\
    \ seals, but they do not appear to become established in this carnivore species.\nHPAI H5N8 was detected in 2 gray seals\
    \ stranded on the Baltic coast of Poland in 2016 and 2017 ( https://doi.org/10.3201/eid2512.181472 ).\nLast month [July\
    \ 2022] 4 stranded seals tested positive for HPAI H5N1 in Maine, USA. -\nMod.\nPMB ProMED map: St. Lawrence River, Quebec,\
    \ Canada: https://promedmail.org/promed-post?place=8704881,68774 ] See Also \nAvian influenza (146): Americas (USA) seal,\
    \ HPAI H5N1 20220705.8704251 Avian influenza (139): Americas (USA, Canada) fox, HPAI 20220616.8703889 Avian influenza\
    \ (131): Americas (USA, Canada) wild carnivores, HPAI H5N1 20220601.8703600 Avian influenza (124): Americas (USA) fox,\
    \ HPAI H5N1 20220523.8703428 Avian influenza (118): Americas (USA) fox, HPAI H5N1, OIE 20220512.8703221 Avian influenza\
    \ (115): Americas (Canada) fox, HPAI H5N1, OIE 20220509.8703152 Avian influenza (94): Japan, raccoon dog, HPAI H5N1, update\
    \ 20220415.8702609 Avian influenza (93): Japan, raccoon dog, HPAI H5N1, RFI 20220413.8702568 Avian influenza (85): Asia\
    \ (Japan) crow, fox, HPAI H5 20220406.8702440 Avian influenza (47): Europe, poultry, fox, HPAI H5N1, OIE 20220216.8701500\
    \ 2021 --- Avian influenza (180): Europe (Estonia) fox, HPAI H5N1, OIE 20211222.8700432 Avian influenza (133): Europe\
    \ (Netherlands) fox HPAI H5N1 20211101.8699389 Avian influenza (117): Europe (Germany) seal, HPAI H5N8 20210924.8698675\
    \ Avian influenza, human (02): Russia, H5N8, 1st rep 20210221.8204014 Avian influenza (45): Europe (UK, Croatia) seal,\
    \ fox, wild bird, HPAI H5N8, OIE 20210317.8252821 .................................................pmb/mj/sh A NUMBER\
    \ of wild birds across the north-east of Scotland are confirmed to have bird flu.\nA record number of cases of avian influenza\
    \ (bird flu) have been confirmed across Scotland, England and Wales in wild and captive birds this winter.\nWhile avian\
    \ influenza is not uncommon in winter and the risk to human health from infected birds is very low, a human case of avian\
    \ ‘flu was confirmed in England earlier this month.\nPreviously observed seasonal migration patterns suggest an expected\
    \ increase in flocks of wild birds across the north-east of Scotland over the next few weeks."
