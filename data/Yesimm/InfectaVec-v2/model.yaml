      미국,  급성이완성  척수염(AFP)  환자발생

      발생현황

      Acute  flaccid  myelitis(AFM)은  Acute  flaccid  paralysis(AFP)  subtype으로  급격한  사지  근력저하와  MRI상  척수회백질

      (Spinal  cord  gray  matter)에  뚜렷한  이상이  발생,  신경계증상이  유발되는  질환으로  대부분  15세  미만  어린이에서  발생

      *  미국은  ‘14년  8~12월까지  34개주에서  120건의  사례  보고,  ’15년  17개주에서  22건,  ‘16년  39개주에서  149건,  ’17년  16개주에서  33건

      ‘18년 16개주에서 38건 발생보고

      * 2014년  AFM사례의  증가는  엔테로바이러스  D-68(EV-D68)로  인한  대규모의  심각한  호흡기질환자의  확산과  일치하였으나  AFM

      으로  확인된  모든  환자에서  EV-D68을  일관되게  감지하지  못한  상황으로,  정확한  원인을  알  수  없음

      <미국,  연도/월별  AFM  발생현황/‘14.8~’18.9월(미국CDC)>

      -  (콜로라도)  ‘18.10.9일  주보건부는  어린이  신경계  질환과  관련된  41건의  엔테로바이러스  A71  유행과  관련된

      Acute  flaccid  myelitis(AFM)  14건*  발생보고

      *  Acute  flaccid  myelitis(AFM)  14건  중  엔테로바이러스  A71  11건,  엔테로바이러스  D68  1건  확인

      *  초기에는  콧물과  기침  증상(약  1주일)  후  급격한  팔과  다리의  근력약화로  인한  보행  장애  그  외  호흡곤란,  심한  두통,  뻣뻣한

      목  또는  경련,  발열,  현기증,  눈부심  증상  동반

      *  2014년  콜로라도에서  D68이  원인으로  추정되는  호흡기질환이  어린이  사이에서  유행,  그  중  급성이완성  척수염환자  11명  발생

      *  2003년,  2005년에  엔테로바이러스  A71에  의한  발생  양상이,  현재  콜로라도에서  발생하고  있는  것과  유사하며  ,  8건의  중추

      신경계 감염자  발생

      - (미네소타)  Vaccine-derived  poliovirus에  의한  Acute  Flaccid  Paralysis(AFP)  사례  발생

      *  ‘18년  9월  중순부터  미네소타  주  트윈시티와  미네소타  북동부에서  10세  미만의  어린이에서  AFM  6명  발생

      *  2014년  전국적으로  AFM사례가  증가하였으며  엔테로바이러스  D68과  관련  있을  것으로  추정,  미네소타에서  건  발생  후  매년  1건

      정도  발생하고  있는  상황

      상황평가

      ∙‘14년부터  AFM이  증가한  정확한  원인은  확인되지  않은  상황

      ∙모든  엔테로바이러스는  감염된  사람의  대변  및  눈,  코  및  입  분비물(타액,  코점액  또는  가래)과의  접촉에  의해

      전염,  무증상자도  다른  사람에게  바이러스  전염  가능

      ∙엔테로바이러스  A71,  엔테로바이러스  D68  감염  시  다른  엔테로바이러스  감염으로  발생되지  않는  신경계  질환

      (뇌염,  수막염,  급성이완성  척수염)  발생

      ∙미국  CDC는  AFM에  대한  표준화된  감시체계를  수립하여  조사  진행  중

