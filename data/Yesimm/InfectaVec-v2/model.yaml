    국외 감염병 발생 현황

    유럽,  웨스트나일열  환자발생  급증

    발생현황

    -  ’18.1.1~10.4일까지  유럽  13개  국가*  에서  환자발생  총  1,317명(사망  142)으로  과거  5년간  누적  환자  수를  초과하여  발생

    ⦁  주요 발생국은 이탈리아(495건),  그리스(283건),  루마니아(256건),  헝가리(197건),  크로아티아(45건),  프랑스(16건)  등으로  확인

    ⦁  ‘18.9.28~10.4일까지  그리스(22건),  루마니아(19건),  헝가리(7건),  불가리아(1건),  체코(1건),  세르비아(30건)으로  80건  발생

    ⦁  최근  3년간  발생현황:  ’15년  108명  →  ’16년  225명  →  ’17년  204명

    <유럽,  웨스트나일열  연도/주별  발생  현황/‘14~’18.9월(ECDC)>

    <유럽,  웨스트나일열  발생지역  현황/‘14~’18.9월(ECDC)>

    상황평가

    -  현재까지  발생된  환자는  과거(‘14~’17년)  발생지역에서  보고되고  있으나  신규지역으로  확산  가능성이  있으며,

    말(馬)에서도  유행이  지속되고  있는  상황

    *  웨스트나일열의  경우  감염된  조류에서  매개  모기(Culex)를  통해  인간과  말에  전파,  수혈이나  장기이식,

    모유수유를  통한  제한적인  전파도  가능

    -  유럽  지역  내  웨스트나일열  유행  시기는  매년  5월-11월로,  유행  시기  동안  높은  환자  발생이  지속될  것으로  예상

    -  국내는  숙주인  조류,  매개체인  모기  모두  시식하지만  바이러스  확인  사례  및  국내  인체감염사례는  없는  상황이나

    철새  등을  통해  바이러스가  유입되는  겨우  모기를  통한  전파  가능성이  있음

    -  유증상자  내원  시  해외  여행력,  모기물림  여부  등의  확인이  필요하며  의심환자  확인  시  관할  보건소  또는  1339로  신고

