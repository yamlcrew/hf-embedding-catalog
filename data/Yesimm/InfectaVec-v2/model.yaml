      국외  A형간염  발생  현황

      약  150만  건의  HAV  감염사례가  전  세계적으로  발생하며  만성  간질환을  일으키지는  않으나  급성

      간  장애와  같은  심각한  증상을  유발하며  반복적으로  재발됨.

      *  High:  90%이상의  아이들이  감염,  대부분이  면역을  획득하며  유행발생률  낮음

      *  Intermediate:  면역력이  없는  감수성자가  축적되어  노령층에서  질병발생률이  높고  지역사회  대규모  유행발생  가능성이  있음

      *  Low:  위생상태가  좋은  선진국으로  감염률이  낮으나  마약  사용자,  남성  동성애자,  풍토지역  여행자에서  발생

      유럽지역  발생현황

      -  ‘16.6.1~’18.3.19일까지  22개  EU/EEA  국가에서  보고된  확진사례는  4,101건이며  성별이  확인된

      3,873건의  남성과  여성의  비율은  7.2:1이었고  남성과  성관계를  갖는  남성들  사이에서  3개의  유행균주와

      유사변종  외  다른  계통의  변종이  없는  것으로  보고

      <확진자의  유전염기서열  분포(‘16.1~’18.3.19)>

      -  ’16.1월~12월까지  26개국에서  보고  된  20,089건의  사례는  ‘12~’15년  동기간  발생보고  된  건의  4배

      이상  증가.  ‘17년  5월  남:여  비율은  4.9:1로  가장  높았으나  그  이후  감소.  성별을  확인할  수  있는

      20,067건  중  남성이  1,559명,  여성이  4,476건으로  ‘12~’15년  보고된  남성건보다  413%,  여성은

      70%  증가

