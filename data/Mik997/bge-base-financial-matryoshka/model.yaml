widgetData:
- source_sentence: HPE aims to differentiate itself in the market with its GreenLake edge-to-cloud platform that provides
    scalable, on-demand IT solutions with pay-per-use pricing, facilitating digital transformation and cost management in
    businesses.
  sentences:
  - How is revenue recognized when dealing with variable consideration under revenue contracts?
  - How does HPE's GreenLake edge-to-cloud platform support business IT management?
  - What was the total revenue reported by Costco Wholesale Corporation for the fiscal year ending September 3, 2023?
- source_sentence: The discount rate is developed by utilizing the yield on a theoretical portfolio of high-grade corporate
    bonds that match cash flows to benefit payments, limit the concentration by industry and issuer, and apply screening criteria
    to exclude bonds with a call feature unless they have a low probability of being called.
  sentences:
  - What was the overall turnover rate at the company in fiscal year 2023?
  - How is the discount rate used in measuring projected benefit obligations developed?
  - What items are excluded and added back when calculating adjusted operating profit for ROIC purposes?
- source_sentence: In 2023, Johnson & Johnson reported total earnings from discontinued operations, net of tax, amounting
    to $21,827 million.
  sentences:
  - What were Johnson & Johnson's total earnings from discontinued operations in 2023, net of tax?
  - What was the percentage decrease in the automotive gross margin from 2022 to 2023?
  - What was the primary driver for the increase in Caterpillar's sales and revenues in 2023?
- source_sentence: During the fiscal year 2023, we began shipments of microinverters from our contract manufacturers in the
    United States. Moving manufacturing to the United States allows us to take advantage of the benefits of the Inflation
    Reduction Act of 2022 (the 'IRA') as well as help us better serve our customers by cutting down delivery times and diversifying
    our supply chain.
  sentences:
  - What significant services are included in Iron Mountain's service revenues?
  - What recent development allows Dollar Tree customers to receive same-day delivery without visiting a store?
  - How does moving manufacturing to the United States benefit Enphase Energy, Inc. according to the Inflation Reduction Act
    of 2022?
- source_sentence: The Company’s future gross margins can be impacted by a variety of factors, as discussed in Part I, Item
    1A of this Form 10-K under the heading “Risk Factors.” As a result, the Company believes, in general, gross margins will
    be subject to volatility and downward pressure.
  sentences:
  - What factors could impact the company's future gross margins?
  - How much did Visa Inc.'s net income increase from 2022 to 2023?
  - How is revenue recognized in Enphase Energy, Inc.?
