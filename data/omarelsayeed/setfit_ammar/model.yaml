widgetData:
- source_sentence: اول كان من أفضل البنوك ..الان من افشل البنوك لا في نسبة القروض ولا في البطاقات الإئتمانية وتغذية المحافظ
    الرقمية ولا في تعليق التطبيق ولا في تمويل تأجير السيارات..بصراحة ندمت اني كنت عميل له لسنوات
  sentences:
  - والله كل ماشفت لكزس قلبي يطق من فرحه عليها يارب ترزقني مثلها اركبها أنا وأمي 🤍🤍🤍🤍🤍🤍🤍🤍🤍🤍🤍🤍
  - للاسف تعامل غير جيد في سياسة الاستبدال بسبب ضاغط العطر عطلان من بداية استخدامة
  - ليتكم تشيلون الموسيقى و وصور الحريم الموجودة في الحساب وشكرا
- source_sentence: "البنك الاهلي يحب الظهور في منصات الاعلام وهو اسوء بنك من ناحية المصداقية وتعامل مع العملاء \nوالعروض الي\
    \ اغلبها وهميه"
  sentences:
  - بنك فاشل والي يخلي راتبه عليه فاشل فوق انك تنزل الراتب متأخر تطبيقكم الزفت خربان والله صدق الي سماكم بنك الشيبان
  - كيف شلون
  - جاتني حواله على حسابي وجاني الرسايل النصيه بالحواله بس ادخل الحساب ما انضافت لمجموع الرصيد وبعدها بساعه دخلت الاقي ان
    كل عمليه التحويل انحذفت مع انها كانت موجوده ايش المشكله ؟؟؟
- source_sentence: صراحه كنت اشتريها لكن اختياركم غير موفق لمسى وعتزلتها بدون عنصيريه لكن رايي الشخصي
  sentences:
  - السلام عليكم ورحمة الله وبركاته طلعت فيزا سفر بلس إلكترونية ولي ٤ أيام أحاول أفعلها كو راضية تتفعل ياليت تحلوا هالمشكلة
  - الطلب له اكثر من سنه ويوجد من طلب بعدي و استلم ، مع العلم اول سيارة اطلبها من الشركة ، هل فيه سبب مقنع للانتظار اكثر من
    سنه !!؟
  - السلام عليكم. رواتب موظفي الراجحي تاريخ كم تنزل من كل شهر وهل هو تاريخ ثابت او كل شهر بتاريخ
- source_sentence: "عود ارين مستخرج من جزيره ارين في دوله اندونيسيا حيث يتم انتقاء العود بعنايه لتغير رائحه المكان \n\U0001F44C\
    \ \U0001F338\n\n#حاضر_وموجود\n،،\n.. \n\n.. \n\n.. \n\n.. \nيارب \U0001F932\U0001F3FB"
  sentences:
  - تكفى يا يزيد ابوس رجولك راسلني خاص اقسم بمن احل القسم انها ضاقت بي الارض و السما تكفى احتاج مساعدتك
  - كيف اعرف تاريخ تجديد رخصة القيادة ؟ كيف اطلع ورقة بتاريخ اصدار الرخصة القيادة ؟ شركة التامين تطالبني متى جددت الرخصة للمطالبه
    بمبلغ حادث .
  - "يارب من نصيبي \nيارب يارب يارب\nعلى الاقل آخذ فيها بيت \nأو أسدد إلتزاماتي"
- source_sentence: جميل ويتناسب مع جمال تصاميمكم ومنتجاتكم اوفسايد 😘💐
  sentences:
  - بكم مليون؟؟
  - يعني راح تتوفر قريبًا ان شاء الله ؟؟
  - 'والتقديم ع الاداري متى؟؟؟؟؟؟؟؟

    شوضعهم حاجزينها واسطات؟؟؟

    اختبرنا اختبارات الرخصةوماجانا قبول عشان مافي تربوي

    واختبرنا قدرة معرفية عشان الادارية،واللي يطرحونه(لاتناسب مؤهلاتك).

    واداري التعليم مايفتحونه اصلا!!

    وش تبونا نشتغل؟؟

    شغل مختلط؟؟

    والا خدمة عملاء؟؟

    والا فرّاشات لاسمح الله؟'
