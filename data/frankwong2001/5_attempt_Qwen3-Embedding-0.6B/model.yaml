widgetData:
- source_sentence: The Technician (Automatic Fare Collection) works in a team to perform preventive and corrective maintenance
    of Automatic Fare Collection (AFC) Line Replacement Units (LRUs). He/She is responsible for the preparation of materials,
    tools, equipment and checklists required. He also assists in the conduct of fault analysis and testing to improve the
    reliability of the AFC systems as well as supervises the work of contractors and external stakeholders in ensuring compliance
    to safety requirements and operating standards. He is required to carry out his duties in the depot, workshop and/or at
    various train stations during train operating hours. He is a team player and a well-organised individual who is able to
    work under pressure and carry out his duties professionally in public access areas.
  sentences:
  - The Technician/Coordinator (Operations and Maintenance) plays a crucial role in guaranteeing that all engineering systems
    and equipment operate smoothly and efficiently. This position involves conducting maintenance activities on various equipment
    according to established Standard Operating Procedures (SOPs). The individual adheres to corporate policies and best practices,
    ensuring that all tasks are performed safely and meet regulatory standards. Additionally, he/she follows emergency protocols
    and complies with workplace safety and health (WSH) regulations. This role typically involves working under guidance and
    requires strong collaboration skills to effectively communicate with both internal and external stakeholders. The Technician/Coordinator
    is also expected to be present on-site, work in shifts, and may need to be available for on-call duties.
  - The Technician (Automatic Fare Collection) leads a team to conduct routine and emergency repairs of Public Transport Systems
    (PTS) Line Maintenance Units (LMUs). He/She is tasked with sourcing materials, tools, and equipment while also preparing
    reports required for compliance checks. He further manages the evaluation of system performance and oversees the training
    of junior staff and external vendors to guarantee adherence to operational metrics and quality standards. This role is
    conducted exclusively in corporate offices and training facilities during non-operational hours. The candidate must be
    a self-motivated and meticulous individual who can work independently and handle complex projects in restricted areas.
  - The Technician (Automatic Fare Collection) collaborates with a team to execute both preventive and corrective maintenance
    on Automatic Fare Collection (AFC) Line Replacement Units (LRUs). This role involves preparing the necessary materials,
    tools, and equipment, as well as creating checklists for efficient task execution. Additionally, the technician aids in
    fault analysis and testing to enhance the reliability of AFC systems and oversees the work of contractors and external
    partners to ensure adherence to safety standards and operational protocols. Duties are performed in various settings,
    including depots, workshops, and train stations during operational hours. The ideal candidate is a team-oriented and organized
    professional who thrives under pressure and maintains a high level of professionalism in public environments.
- source_sentence: The Head - Content Acquisition drives the organisation's content acquisition strategy by developing and
    implementing plans to acquire content which is aligned to the creative vision of the organisation. He/She leads the development
    of the content acquisition strategy in accordance with the overall content strategy for the organisation. He also oversees
    the execution of content acquisition plans by leading negotiations for acquiring content. The work involves providing
    creative and business leadership to his team and liaising with several internal and external stakeholders. He spends his
    time in planning as well as meetings to acquire content. He may also be required to travel as part of his work. He is
    an expert in industry trends with proficiency in business acumen. He should be comfortable with numbers and analysis.
    He is an able communicator and planner. He ought to be proficient in decision making and stakeholder management.
  sentences:
  - The Head of Content Acquisition spearheads the organization’s strategy for sourcing new content by crafting and executing
    initiatives that resonate with the creative goals of the company. This role involves leading the formulation of the content
    acquisition plan in line with the overarching content strategy. The Head also manages the implementation of these plans
    by negotiating effectively for content procurement. This position requires providing both creative direction and business
    insight to the team while collaborating with various internal and external partners. The role demands a significant amount
    of time spent on strategic planning and meetings focused on content acquisition, with occasional travel expected. The
    ideal candidate is well-versed in industry trends and possesses strong business acumen, alongside a comfort with data
    analysis. Excellent communication, planning, decision-making, and stakeholder management skills are essential.
  - The Head of Marketing oversees the organization’s promotional strategy by developing and executing plans to enhance brand
    visibility that aligns with the overall marketing vision. This role involves leading the marketing strategy development
    to ensure consistency with the corporate branding objectives. The Head also supervises the execution of marketing campaigns
    by managing partnerships for promotional activities. The work involves providing strategic guidance to the marketing team
    and coordinating with various internal departments. Frequent meetings and planning sessions are conducted to discuss promotional
    initiatives, and travel may be necessary. The candidate should have a strong grasp of consumer behavior and marketing
    analytics, with a focus on creativity and innovation. Proficiency in project management and team leadership is critical.
  - The Counselling Educator designs and implements training programs in counselling while collaborating with practitioners
    and external partners within the social services sector to create effective training materials and methodologies. This
    role also involves enhancing sector-wide capabilities, mentoring aspiring counsellors, and guiding community members and
    para-counsellors. Furthermore, the educator engages with professionals in practice and research to develop and execute
    education-focused studies. An individual with extensive experience, the Counselling Educator exhibits exceptional facilitation
    and communication skills, fostering a cooperative atmosphere and operating in diverse environments, including government
    bodies, private organizations, and social service agencies.
- source_sentence: The Relationship Manager - Financial Institutions and Non-Bank Financial Institutions is responsible for
    acquiring and managing a portfolio of Financial Institutions (FI) and Non-Bank Financial Institutions (NBFI) clients.
    He/She actively acquires clients through targeted relationship building, networking and referrals. He will provide advice
    on customised products, services and solutions as well as cross-sell the full suite of bank products. He is involved with
    credit analysis and collaborates with other business units to mitigate credit issues. He serves key accounts in specialised
    industries. He applies his deep FI and NBFI industry knowledge to deliver specific solutions to this client segment. The
    Relationship Manager - Financial Institutions and Non-Bank Financial Institutions possess decorum and business acumen
    to interact with various stakeholders. He is resourceful in acquiring clients. He is a team player and leverages on knowledge
    from other business units to continually provide enhanced services to his clients. He has a proven track record of working
    with FIs and NBFIs. He is organised and has good time management skills. He is an effective communicator, able to influence
    others and negotiate.
  sentences:
  - The Relationship Manager - Tax Compliance is responsible for overseeing a portfolio of clients in the tax advisory sector.
    He/She primarily focuses on managing regulatory compliance and ensuring that clients adhere to tax requirements. This
    position requires collaborating with legal teams to interpret tax laws and regulations while advising clients on complex
    tax issues. The manager is expected to conduct in-depth audits and prepare reports for governmental agencies. He/She works
    independently without direct supervision and is required to have extensive experience in tax law, with minimal engagement
    in client relationship management. The role necessitates strong analytical skills but does not involve direct communication
    with stakeholders, as most interactions are handled through formal channels.
  - 'Description

    The Branch Manager is tasked with driving the financial performance of the branch. This role encompasses all operational
    aspects, including recruiting staff, executing service improvement strategies, supervising loan approvals and credit lines,
    promoting services, and enhancing customer engagement. The Branch Manager adeptly leads team members, focusing on their
    development and motivation to meet sales objectives. Occasionally, this position may require weekend and after-hours work.
    Strong organizational skills, diligence, and exceptional people management abilities are essential. A customer-centric
    mindset, sharp problem-solving skills, and the capability to handle diverse internal and external stakeholders are crucial
    for success.'
  - The Relationship Manager - Financial Institutions and Non-Bank Financial Institutions is tasked with developing and overseeing
    a diverse portfolio of clients in the Financial Institutions (FI) and Non-Bank Financial Institutions (NBFI) sectors.
    This role involves proactively building relationships through strategic networking and referrals. The manager provides
    expert advice on tailored products, services, and solutions while effectively cross-selling the comprehensive range of
    bank offerings. He/She conducts credit assessments and works closely with other departments to address any credit challenges.
    Serving key accounts within specialized sectors, the Relationship Manager applies extensive industry knowledge to deliver
    targeted solutions. Possessing professionalism and business insight, he/she engages confidently with various stakeholders.
    Resourceful in client acquisition, this team-oriented individual draws on insights from different business units to enhance
    client service delivery. With a solid history of collaboration with FIs and NBFIs, he/she demonstrates strong organizational
    skills and effective time management. As a persuasive communicator, he/she excels in influencing and negotiating outcomes.
- source_sentence: The Infrastructure Engineering Manager drives the implementation of strategy for infrastructure operations
    and maintenance to ensure availability of stable and secure systems and networks. He/She manages project resource allocation
    and develops infrastructure implementation, operations and maintenance engineers; scopes out policies and sets performance
    expectations. He identifies problems and presents new methodologies/solutions to key stakeholders to enhance and improve
    the delivery of infrastructure operations and maintenance services. He has expertise in the planning, implementation and
    maintenance of infrastructure systems across cloud, on-premise, server and network infrastructure. He is familiar with
    the infrastructure deployment and IT service management processes, tools and methodologies. He is knowledgeable in both
    technical and business aspects of the organisations IT infrastructure to bridge gaps and enhance collaboration between
    IT and functional teams. The Infrastructure Engineering Manager is able to address multi-faceted issues effectively to
    ensure systems are stable and secure. He adopts a methodical approach to managing project resources and communicates well
    to his team and key stakeholders on the solutions developed.
  sentences:
  - The Infrastructure Engineering Manager oversees the coordination of marketing campaigns and manages the allocation of
    creative resources to ensure brand visibility and engagement. He/She develops strategies for promotional activities and
    evaluates marketing performance metrics; creates policies and sets expectations for campaign execution. The manager identifies
    market trends and presents new advertising methodologies to stakeholders to enhance the effectiveness of marketing initiatives.
    He has expertise in the planning, execution, and analysis of marketing strategies across digital, print, and social media
    platforms. He is familiar with the marketing deployment processes, tools, and methodologies. He is knowledgeable in both
    creative and analytical aspects of the organization’s marketing strategies to bridge gaps and enhance collaboration between
    marketing and sales teams. The Infrastructure Engineering Manager is able to address multifaceted marketing challenges
    effectively to ensure brand consistency and engagement. He adopts a methodical approach to managing creative resources
    and communicates well with his team and stakeholders on the campaigns developed.
  - The Business Valuation Executive plays a crucial role in delivering high-quality valuation analyses. This position requires
    hands-on engagement with valuation projects, ensuring adherence to ethical standards and quality assurance protocols.
    The Business Valuation Executive is also involved in fostering business development and maintaining strong relationships
    with stakeholders. While the candidate may have limited experience, they are anticipated to navigate a challenging learning
    journey to enhance their skills and knowledge in business valuation, particularly in assessing intangible assets. Strong
    time management and effective communication abilities are essential for success in this role.
  - The Infrastructure Engineering Manager leads the execution of strategic initiatives for infrastructure operations and
    maintenance, ensuring the reliability and security of systems and networks. This role involves overseeing the allocation
    of project resources and mentoring engineers focused on infrastructure implementation, operations, and maintenance. The
    manager outlines policies, establishes performance standards, and identifies challenges while proposing innovative methodologies
    and solutions to key stakeholders to enhance the efficiency of infrastructure services. With expertise in planning, implementing,
    and maintaining infrastructure systems across various environments—cloud, on-premise, servers, and networks—the manager
    is well-versed in deployment and IT service management processes, tools, and methodologies. This individual possesses
    a strong understanding of both the technical and business dimensions of the organization’s IT infrastructure, fostering
    collaboration between IT and other functional teams. The Infrastructure Engineering Manager effectively resolves complex
    issues to maintain system stability and security, employing a systematic approach to resource management while ensuring
    clear communication with team members and stakeholders regarding developed solutions.
- source_sentence: The Network Planning and Strategy Senior Technical Officer supervises site suitability and pipe and equipment
    accessibility assessments to facilitate network planning. He/She reviews the layouts, schematics and long-term development
    plans for network projects, and performs simulation modelling of gas networks to analyse performance. He carries out project
    activities that champion process improvement and innovation. To build capabilities, he conducts on-the-job training and
    identifies appropriate training and development courses for staff. He works in a collaborative and intellectually-stimulating
    environment and occasionally goes outdoors along pipelines for site surveys. He is a good team player and demonstrates
    good planning and problem-solving skills in preparing network plans and strategies. He possesses good interpersonal and
    communication skills to engage with key stakeholders.
  sentences:
  - The Assistant Engineer/Senior Technician (Operations and Maintenance) plays a crucial role in facilitating the scheduling
    of corrective, preventive, and predictive maintenance tasks to ensure that all equipment and systems operate efficiently
    and effectively. This role adheres to corporate standards and industry best practices, promoting a safe working environment
    while ensuring adherence to regulatory and compliance mandates. The individual is responsible for implementing emergency
    response strategies and complying with workplace safety and health (WSH) regulations. A collaborative team player, he/she
    is skilled at engaging with both internal and external stakeholders and demonstrates strong analytical and problem-solving
    abilities. The position requires on-site work, which may include rotating shifts or on-call duties.
  - The Network Planning and Strategy Senior Technical Officer oversees the evaluation of site suitability and accessibility
    for pipes and equipment to enhance network planning. This role involves reviewing designs, schematics, and long-term development
    strategies for network initiatives, as well as executing simulation modeling of gas networks to assess their efficiency.
    He/She undertakes project activities that promote process enhancements and innovative solutions. To foster development,
    he/she provides on-the-job training and identifies suitable training programs for staff. The position is set within a
    collaborative and intellectually stimulating atmosphere, occasionally requiring site visits along pipelines for surveys.
    Strong teamwork, planning, and problem-solving skills are essential for creating effective network plans and strategies.
    Excellent interpersonal and communication skills are necessary to effectively engage with key stakeholders.
  - The Network Planning and Strategy Senior Technical Officer directs the evaluation of site compliance and equipment installation
    assessments to ensure network efficiency. He/She audits the designs, schematics, and immediate operational plans for network
    tasks, and performs simulation testing of electrical circuits to assess functionality. He carries out project activities
    that focus on compliance and regulatory adherence. To enhance operational standards, he conducts online training and recommends
    unrelated workshops for personnel. He operates in a solitary and technically rigid environment and frequently remains
    indoors for office-based assessments. He is expected to work independently and demonstrate limited planning and analytical
    skills in executing network audits. He possesses minimal engagement skills to interact with external stakeholders.
