    where the gauge choice for u has been made Φ′= ¯ι. The

    expression for j ought to be u-gauge independent, as it is

    a physical quantity. The B piece as written is gauge independent, but the u term is not. The ¯ιfactor in the latter

    is to be interpreted as Φ ′. This equation had been obtained previously 11,12 using coordinate free, diﬀerential

    forms (see Appendix C). Two special cases of ideal MHD,

    a) vacuum (j = 0) and b) force-free ( j = λ(ψ,α)B), are

    worth pointing to for their importance in plasma physics.

    For both these cases p′(ψ) = 0. From (52) we see that for

    the magnetic ﬁeld to be curl-free (vacuum) and quasisymmetric C′(ψ) = 0; i.e., C(ψ) must be a constant. For quasisymmetric
    force-free ﬁelds, we must have λ= −C′(ψ).

    Note that in strong QS these conclusions follow directly

    from the equation j ×u+∇C = 0 with j = 0 and j = λB.

    V. CONCLUSIONS

    In this paper, we have presented, deﬁned, and discussed a straight ﬁeld line coordinate system which is

    natural for the representation of general-equilibria quasisymmetric magnetic ﬁelds: generalized Boozer coordinates. We
    proved the existence of the said coordinate system for the subset of ﬁelds for which

    ∮

    j·∇ψdl/B = 0, to

    which quasisymmetric ﬁelds belong. These coordinates

    reduce to Boozer coordinates when j ·∇ψ= 0.

    The explicit form of the symmetry in this coordinate

    representation enables a simple formulation of the quasisymmetric problem. We explicitly construct the governing equations
    setting clearly the foundation for future investigations, including expansion 14,16 and global

    approaches. Exploiting GBC, we explicitly show the essential diﬀerences between the weak and strong formulations of QS
    and between quasisymmetry and axisymmetry. Weak QS generally lies far from axisymmetry, for

    which many functions describing the ﬁeld and symmetry

    need to be symmetric.

    We also included a set of simple magnetic diﬀerential

    equations that fully describe equilibrium with an arbitrary macroscopic force to complete the treatment. The

    property of QS, together with the force-balance structure, imposes requirements on the forcing terms in the

    form of Newcomb conditions. In addition, the equations

    establish clear connections between QS, forcing, and departures from axisymmetry.

