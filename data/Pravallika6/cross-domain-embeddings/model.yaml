      \ 56-layer “plain” networks. The deeper network\nhas higher training error, and thus test error. Similar phenomena\n\
      on ImageNet is presented in Fig. 4.\ngreatly beneﬁted from very deep models.\nDriven by the signiﬁcance of depth, a\
      \ question arises: Is\nlearning better networks as easy as stacking more layers?\nAn obstacle to answering this question\
      \ was the notorious\nproblem of vanishing/exploding gradients [1, 9], which\nhamper convergence from the beginning.\
      \ This problem,\nhowever, has been largely addressed by normalized initialization [23, 9, 37, 13] and intermediate normalization\
      \ layers\n[16], which enable networks with tens of layers to start converging for stochastic gradient descent (SGD)\
      \ with backpropagation [22].\nWhen deeper networks are able to start converging, a\ndegradation problem has been exposed:\
      \ with the network\ndepth increasing, accuracy gets saturated (which might be\nunsurprising) and then degrades rapidly.\
      \ Unexpectedly,\nsuch degradation is not caused by overﬁtting , and adding\nmore layers to a suitably deep model leads\
      \ to higher training error, as reported in [11, 42] and thoroughly veriﬁed by\nour experiments. Fig. 1 shows a typical\
      \ example.\nThe degradation (of training accuracy) indicates that not\nall systems are similarly easy to optimize. Let\
      \ us consider a\nshallower architecture and its deeper counterpart that adds\nmore layers onto it. There exists a solution\
      \ by construction\nto the deeper model: the added layers are identity mapping,\nand the other layers are copied from\
      \ the learned shallower\nmodel. The existence of this constructed solution indicates\nthat a deeper model should produce\
      \ no higher training error\nthan its shallower counterpart. But experiments show that\nour current solvers on hand are\
