  - '[ABSTRACT]

    Relying entirely on an attention mechanism,

    the Transformer introduced by Vaswani et

    al. (2017) achieves state-of-the-art results for

    machine translation. In contrast to recurrent

    and convolutional neural networks, it does

    not explicitly model relative or absolute position information in its structure. Instead,

    it requires adding representations of absolute positions to its inputs. In this work

    we present an alternative approach, extending the self-attention mechanism to efﬁciently

    consider representations of the relative positions, or distances between sequence elements.

    On the WMT 2014 English-to-German and

    English-to-French translation tasks, this approach yields improvements of 1.3 BLEU and

    0.3 BLEU over absolute position representations, respectively. Notably, we observe that

    combining relative and absolute position representations yields no further improvement in

    translation quality. We describe an efﬁcient

    implementation of our method and cast it as an

    instance of relation-aware self-attention mechanisms that can generalize to arbitrary graphlabeled inputs.


    [1 Introduction]

    Recent approaches to sequence to sequence learning typically leverage recurrence (Sutskever et al.,

    2014), convolution (Gehring et al., 2017; Kalchbrenner et al., 2016), attention (Vaswani et al.,

    2017), or a combination of recurrence and attention (Bahdanau et al., 2014; Cho et al., 2014; Luong et al., 2015; Wu et
    al., 2016) as basic building

    blocks. These approaches incorporate information

    about the sequential position of elements differently.

    Recurrent neural networks (RNNs) typically

    compute a hidden state ht, as a function of their

    input at time t and a previous hidden state ht−1,

    capturing relative and absolute positions along the

    time dimension directly through their sequential

    structure. Non-recurrent models do not necessarily consider input elements sequentially and may

    hence require explicitly encoding position information to be able to use sequence order.

    One common approach is to use position encodings which are combined with input elements to

    expose position information to the model. These

    position encodings can be a deterministic function of position (Sukhbaatar et al., 2015; Vaswani

    et al., 2017) or learned representations. Convolutional neural networks inherently capture relative

    positions within the kernel size of each convolution. They have been shown to still beneﬁt from

    position encodings (Gehring et al., 2017), however.

    For the Transformer, which employs neither

    convolution nor recurrence, incorporating explicit

    representations of position information is an especially important consideration since the model is

    otherwise entirely invariant to sequence ordering.

    Attention-based models have therefore used position encodings or biased attention weights based

    on distance (Parikh et al., 2016).

    In this work we present an efﬁcient way of

    incorporating relative position representations in

    the self-attention mechanism of the Transformer.

    Even when entirely replacing its absolute position

    encodings, we demonstrate signiﬁcant improvements in translation quality on two machine translation tasks.

    Our approach can be cast as a special case of extending the self-attention mechanism of the Transformer to considering
    arbitrary relations between

    any two elements of the input, a direction we plan

    to explore in future work on modeling labeled, directed graphs.

    arXiv:1803.02155v2  [cs.CL]  12 Apr 2018


    [5 Conclusions]

    In this paper we presented an extension to selfattention that can be used to incorporate relative position information
    for sequences, which improves performance for machine translation.

    For future work, we plan to extend this mechanism to consider arbitrary directed, labeled graph

    inputs to the Transformer. We are also interested in nonlinear compatibility functions to combine input representations
    and edge representations. For both of these extensions, a key consideration will be determining efﬁcient implementations.'
  - '[ABSTRACT]

    We introduce Bootstrap Your Own Latent (BYOL), a new approach to self-supervised image

    representation learning. BYOL relies on two neural networks, referred to as online and target

    networks, that interact and learn from each other. From an augmented view of an image, we train

    the online network to predict the target network representation of the same image under a different

    augmented view. At the same time, we update the target network with a slow-moving average

    of the online network. While state-of-the art methods rely on negative pairs, BYOL achieves a

    new state of the art without them. BYOL reaches 74.3% top-1 classiﬁcation accuracy on ImageNet

    using a linear evaluation with a ResNet-50 architecture and 79.6% with a larger ResNet. We

    show that BYOL performs on par or better than the current state of the art on both transfer and

    semi-supervised benchmarks. Our implementation and pretrained models are given on GitHub.3


    [1 Introduction]

