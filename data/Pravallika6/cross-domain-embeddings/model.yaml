    \ “plain” networks. The deeper network\nhas higher training error, and thus test error. Similar phenomena\non ImageNet\
    \ is presented in Fig. 4.\ngreatly beneﬁted from very deep models.\nDriven by the signiﬁcance of depth, a question arises:\
    \ Is\nlearning better networks as easy as stacking more layers?\nAn obstacle to answering this question was the notorious\n\
    problem of vanishing/exploding gradients [1, 9], which\nhamper convergence from the beginning. This problem,\nhowever,\
    \ has been largely addressed by normalized initialization [23, 9, 37, 13] and intermediate normalization layers\n[16],\
    \ which enable networks with tens of layers to start converging for stochastic gradient descent (SGD) with backpropagation\
    \ [22].\nWhen deeper networks are able to start converging, a\ndegradation problem has been exposed: with the network\n\
    depth increasing, accuracy gets saturated (which might be\nunsurprising) and then degrades rapidly. Unexpectedly,\nsuch\
    \ degradation is not caused by overﬁtting , and adding\nmore layers to a suitably deep model leads to higher training\
    \ error, as reported in [11, 42] and thoroughly veriﬁed by\nour experiments. Fig. 1 shows a typical example.\nThe degradation\
    \ (of training accuracy) indicates that not\nall systems are similarly easy to optimize. Let us consider a\nshallower\
    \ architecture and its deeper counterpart that adds\nmore layers onto it. There exists a solution by construction\nto\
    \ the deeper model: the added layers are identity mapping,\nand the other layers are copied from the learned shallower\n\
    model. The existence of this constructed solution indicates\nthat a deeper model should produce no higher training error\n\
    than its shallower counterpart. But experiments show that\nour current solvers on hand are unable to ﬁnd solutions that\n\
    \narXiv:1512.03385v1  [cs.CV]  10 Dec 2015\nidentity\nweight layer\nweight layer\nrelu\nreluF(x)\x01+\x01x\nx\nF(x) x\n\
    Figure 2. Residual learning: a building block.\nare comparably good or better than the constructed solution\n(or unable\
    \ to do so in feasible time).\nIn this paper, we address the degradation problem by\nintroducing a deep residual learning\
    \ framework. Instead of hoping each few stacked layers directly ﬁt a\ndesired underlying mapping, we explicitly let these\
    \ layers ﬁt a residual mapping. Formally, denoting the desired\nunderlying mapping as H(x), we let the stacked nonlinear\n\
    layers ﬁt another mapping of F(x) :=H(x) −x. The original mapping is recast intoF(x)+ x. We hypothesize that it\nis easier\
    \ to optimize the residual mapping than to optimize\nthe original, unreferenced mapping. To the extreme, if an\nidentity\
    \ mapping were optimal, it would be easier to push\nthe residual to zero than to ﬁt an identity mapping by a stack\nof\
    \ nonlinear layers.\nThe formulation of F(x) +x can be realized by feedforward neural networks with “shortcut connections”\
    \ (Fig. 2).\nShortcut connections [2, 34, 49] are those skipping one or\nmore layers. In our case, the shortcut connections\
    \ simply\nperform identity mapping, and their outputs are added to\nthe outputs of the stacked layers (Fig. 2). Identity\
    \ shortcut connections add neither extra parameter nor computational complexity. The entire network can still be trained\n\
    end-to-end by SGD with backpropagation, and can be easily implemented using common libraries ( e.g., Caffe [19])\nwithout\
    \ modifying the solvers.\nWe present comprehensive experiments on ImageNet\n[36] to show the degradation problem and evaluate\
    \ our\nmethod. We show that: 1) Our extremely deep residual nets\nare easy to optimize, but the counterpart “plain” nets\
