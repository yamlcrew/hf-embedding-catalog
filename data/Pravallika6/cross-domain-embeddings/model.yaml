  - "[ABSTRACT]\nWe propose a novel attention gate (AG) model for medical imaging that automatically learns to focus on target\
    \ structures of varying shapes and sizes. Models\ntrained with AGs implicitly learn to suppress irrelevant regions in\
    \ an input image\nwhile highlighting salient features useful for a speciﬁc task. This enables us to\neliminate the necessity\
    \ of using explicit external tissue/organ localisation modules\nof cascaded convolutional neural networks (CNNs). AGs\
    \ can be easily integrated\ninto standard CNN architectures such as the U-Net model with minimal computational overhead\
    \ while increasing the model sensitivity and prediction accuracy.\nThe proposed Attention U-Net architecture is evaluated\
    \ on two large CT abdominal\ndatasets for multi-class image segmentation. Experimental results show that AGs\nconsistently\
    \ improve the prediction performance of U-Net across different datasets\nand training sizes while preserving computational\
    \ efﬁciency. The source code for\nthe proposed architecture is publicly available.\n\n[1 Introduction]\nAutomated medical\
    \ image segmentation has been extensively studied in the image analysis community\ndue to the fact that manual, dense\
    \ labelling of large amounts of medical images is a tedious and\nerror-prone task. Accurate and reliable solutions are\
    \ desired to increase clinical work ﬂow efﬁciency\nand support decision making through fast and automatic extraction of\
    \ quantitative measurements.\nWith the advent of convolutional neural networks (CNNs), near-radiologist level performance\
    \ can\nbe achieved in automated medical image analysis tasks including cardiac MR segmentation [3] and\ncancerous lung\
    \ nodule detection [17]. High representation power, fast inference, and ﬁlter sharing\nproperties have made CNNs the de\
    \ facto standard for image segmentation. Fully convolutional\nnetworks (FCNs) [ 18] and the U-Net [ 24] are two commonly\
    \ used architectures. Despite their\ngood representational power, these architectures rely on multi-stage cascaded CNNs\
    \ when the target\norgans show large inter-patient variation in terms of shape and size. Cascaded frameworks extract a\n\
    region of interest (ROI) and make dense predictions on that particular ROI. The application areas\ninclude cardiac MRI\
    \ [ 14], cardiac CT [ 23], abdominal CT [ 26, 27] segmentation, and lung CT\nnodule detection [17]. However, this approach\
    \ leads to excessive and redundant use of computational\nresources and model parameters; for instance, similar low-level\
    \ features are repeatedly extracted by\nall models within the cascade. To address this general problem, we propose a simple\
    \ and yet effective\nsolution, namely attention gates(AGs). CNN models with AGs can be trained from scratch in a\nstandard\
    \ way similar to the training of a FCN model, and AGs automatically learn to focus on target\n1st Conference on Medical\
    \ Imaging with Deep Learning (MIDL 2018), Amsterdam, The Netherlands.\narXiv:1804.03999v3  [cs.CV]  20 May 2018\nstructures\
    \ without additional supervision. At test time, these gates generate soft region proposals\nimplicitly on-the-ﬂy and highlight\
    \ salient features useful for a speciﬁc task. Moreover, they do not\nintroduce signiﬁcant computational overhead and do\
    \ not require a large number of model parameters\nas in the case of multi-model frameworks. In return, the proposed AGs\
    \ improve model sensitivity and\naccuracy for dense label predictions by suppressing feature activations in irrelevant\
    \ regions. In this\nway, the necessity of using an external organ localisation model can be eliminated while maintaining\n\
    the high prediction accuracy. Similar attention mechanisms have been proposed for natural image\nclassiﬁcation [11] and\
    \ captioning [1] to perform adaptive feature pooling, where model predictions\nare conditioned only on a subset of selected\
    \ image regions. In this paper, we generalise this design\nand propose image-grid based gating that allows attention coefﬁcients\
    \ to be speciﬁc to local regions.\nMoreover, our approach can be used for attention-based dense predictions.\nWe demonstrate\
    \ the implementation of AG in a standard U-Net architecture (Attention U-Net) and\napply it to medical images. We choose\
    \ the challenging CT pancreas segmentation problem to provide\nexperimental evidence for our proposed contributions. This\
    \ problem constitutes a difﬁcult task due to\nlow tissue contrast and large variability in organ shape and size. We evaluate\
    \ our implementation on\ntwo commonly used benchmarks: TCIA Pancreas CT-82 [25] and multi-class abdominal CT-150.\nThe\
    \ results show that AGs consistenly improve prediction accuracy across different datasets and\ntraining sizes while achieving\
    \ state-of-the-art performance without requiring multiple CNN models.\n\n[2 Methodology]\nFully Convolutional Network\
    \ (FCN):Convolutional neural networks (CNNs) outperform traditional approaches in medical image analysis on public benchmark\
    \ datasets [14, 17] while being an\norder of magnitude faster than, e.g., graph-cut and multi-atlas segmentation techniques\
    \ [34]. This\nis mainly attributed to the fact that (I) domain speciﬁc image features are learnt using stochastic\ngradient\
    \ descent (SGD) optimisation, (II) learnt kernels are shared across all pixels, and (III) image\nconvolution operations\
    \ exploit the structural information in medical images well. In particular, fully\nconvolutional networks (FCN) [ 18]\
    \ such as U-Net [ 24], DeepMedic [ 13] and holistically nested\nnetworks [16, 35] have been shown to achieve robust and\
    \ accurate performance in various tasks\nincluding cardiac MR [3], brain tumours [12] and abdominal CT [26, 27] image\
    \ segmentation tasks.\nConvolutional layers progressively extract higher dimensional image representations ( xl) by processing\
    \ local information layer by layer. Eventually, this separates pixels in a high dimensional\nspace according to their\
    \ semantics. Through this sequential process, model predictions are conditioned on information collected from a large\
    \ receptive ﬁeld. Hence, feature-map xl is obtained\nat the output of layer lby sequentially applying a linear transformation\
    \ followed by a non-linear\nactivation function. It is often chosen as rectiﬁed linear unit: σ1 ( xl\ni,c) = max(0 ,xl\n\
    i,c) where iand\nc denote spatial and channel dimensions respectively. Feature activations can be formulated as:\nxl\n\
    c = σ1\n(∑\nc′∈Fl\nxl−1\nc′ ∗kc′,c\n)\nwhere ∗denotes the convolution operation, and the spatial subscript\n(i) is omitted\
    \ in the formulation for notational clarity. The function f( xl; Φ l) = x(l+1) applied in\nconvolution layer lis characterised\
    \ by trainable kernel parameters Φ l. The parameters are learnt by\n\nAttention GateLorem ipsum dolor sit amet,consectetur\
    \ adipisicing elit, seddo eiusmod tempor incididunt utlabore et dolore magna aliqua.\n x x x \n x x x \nReLU \nx \n \n\
    Sigmoid Resampler\nx x \nFigure 2: Schematic of the proposed additive attention gate (AG). Input features ( xl) are scaled\n\
    with attention coefﬁcients (α) computed in AG. Spatial regions are selected by analysing both the\nactivations and contextual\
    \ information provided by the gating signal (g) which is collected from a\ncoarser scale. Grid resampling of attention\
    \ coefﬁcients is done using trilinear interpolation.\nminimising a training objective, e.g. cross-entropy loss, using\
    \ stochastic gradient descent (SGD).\nIn this paper, we build our attention model on top of a standard U-Net architecture.\
    \ U-Nets are\ncommonly used for image segmentation tasks because of their good performance and efﬁcient use\nof GPU memory.\
    \ The latter advantage is mainly linked to extraction of image features at multiple\nimage scales. Coarse feature-maps\
    \ capture contextual information and highlight the category and\nlocation of foreground objects. Feature-maps extracted\
    \ at multiple scales are later merged through\nskip connections to combine coarse- and ﬁne-level dense predictions as\
    \ shown in Figure 1.\nAttention Gates for Image Analysis:To capture a sufﬁciently large receptive ﬁeld and thus, semantic\
    \ contextual information, the feature-map grid is gradually downsampled in standard CNN\narchitectures. In this way, features\
    \ on the coarse spatial grid level model location and relationship\nbetween tissues at global scale. However, it remains\
    \ difﬁcult to reduce false-positive predictions for\nsmall objects that show large shape variability. In order to improve\
    \ the accuracy, current segmentation\nframeworks [14, 26, 27] rely on additional preceding object localisation models\
    \ to simplify the task\ninto separate localisation and subsequent segmentation steps. Here, we demonstrate that the same\n\
    objective can be achieved by integrating attention gates (AGs) in a standard CNN model. This does\nnot require the training\
    \ of multiple models and a large number of extra model parameters. In contrast\nto the localisation model in multi-stage\
    \ CNNs, AGs progressively suppress feature responses in\nirrelevant background regions without the requirement to crop\
    \ a ROI between networks.\nAttention coefﬁcients, αi ∈[0,1], identify salient image regions and prune feature responses\
    \ to\npreserve only the activations relevant to the speciﬁc task as shown in Figure 3a. The output of AGs is\nthe element-wise\
    \ multiplication of input feature-maps and attention coefﬁcients: ˆxl\ni,c = xl\ni,c ·αl\ni. In\na default setting, a\
    \ single scalar attention value is computed for each pixel vector xl\ni ∈RFl where\nFl corresponds to the number of feature-maps\
    \ in layer l. In case of multiple semantic classes, we\npropose to learn multi-dimensional attention coefﬁcients. This\
    \ is inspired by [ 29], where multidimensional attention coefﬁcients are used to learn sentence embeddings. Thus, each\
    \ AG learns to\nfocus on a subset of target structures. As shown in Figure 2, a gating vector gi ∈RFg is used for\neach\
    \ pixel ito determine focus regions. The gating vector contains contextual information to prune\nlower-level feature responses\
    \ as suggested in [32], which uses AGs for natural image classiﬁcation.\nWe use additive attention [2] to obtain the gating\
    \ coefﬁcient. Although this is computationally more\nexpensive, it has experimentally shown to achieve higher accuracy\
    \ than multiplicative attention [19].\nAdditive attention is formulated as follows:\nql\natt = ψT (\nσ1 ( WT\nx xl\ni\
    \ + WT\ng gi + bg)\n)\n+ bψ (1)\nαl\ni = σ2( ql\natt(xl\ni, gi; Θatt) ), (2)\nwhere σ2(xi,c) = 1\n1+exp(−xi,c) correspond\
    \ to sigmoid activation function. AG is characterised\nby a set of parameters Θatt containing: linear transformations\
    \ Wx ∈RFl×Fint, Wg ∈RFg×Fint,\nψ ∈RFint×1 and bias terms bψ ∈R , bg ∈RFint. The linear transformations are computed using\n\
    channel-wise 1x1x1 convolutions for the input tensors. In other contexts [33], this is referred to as\nvector concatenation-based\
    \ attention, where the concatenated features xl and gare linearly mapped\nto a RFint dimensional intermediate space. In\
    \ image captioning [1] and classiﬁcation [11] tasks, the\n\nFigure 3(a): From left to right (a-e, f-j): Axial and sagittal\
    \ views of a\n3D abdominal CT scan, attention coefﬁcients, feature activations of\na skip connection before and after\
    \ gating. Similarly, (k-n) visualise\nthe gating on a coarse scale skip connection. The ﬁltered feature\nactivations (d-e,\
    \ i-j) are collected from multiple AGs, where a subset\nof organs is selected by each gate. Activations shown in (d-e,\
    \ i-j)\nconsistently correspond to speciﬁc structures across different scans.\nFigure 3(b): The ground-truth pancreas\n\
    segmentation (a) is highlighted in blue\n(b). Similarly, U-Net model prediction\n(c) and the predictions obtained with\
    \ Attention U-Net (d) are shown. The missed\ndense predictions by U-Net are highlighted with red arrows.\nsoftmax activation\
    \ function is used to normalise the attention coefﬁcients (σ2); however, sequential\nuse of softmax yields sparser activations\
    \ at the output. For this reason, we choose a sigmoid activation\nfunction. This results experimentally in better training\
    \ convergence for the AG parameters. In contrast\nto [11] we propose a grid-attention technique. In this case, gating\
    \ signal is not a global single vector\nfor all image pixels but a grid signal conditioned to image spatial information.\
    \ More importantly, the\ngating signal for each skip connection aggregates information from multiple imaging scales, as\
    \ shown\nin Figure 1, which increases the grid-resolution of the query signal and achieve better performance.\nLastly,\
    \ we would like to note that AG parameters can be trained with the standard back-propagation\nupdates without a need for\
    \ sampling based update methods used in hard-attention [21].\nAttention Gates in U-Net Model:The proposed AGs are incorporated\
    \ into the standard U-Net\narchitecture to highlight salient features that are passed through the skip connections, see\
    \ Figure\n1. Information extracted from coarse scale is used in gating to disambiguate irrelevant and noisy\nresponses\
    \ in skip connections. This is performed right before the concatenation operation to merge\nonly relevant activations.\
    \ Additionally, AGs ﬁlter the neuron activations during the forward pass as\nwell as during the backward pass. Gradients\
    \ originating from background regions are down weighted\nduring the backward pass. This allows model parameters in shallower\
    \ layers to be updated mostly\nbased on spatial regions that are relevant to a given task. The update rule for convolution\
    \ parameters\nin layer l−1 can be formulated as follows:\n∂(ˆxl\ni)\n∂(Φl−1) = ∂\n(\nαl\nif(xl−1\ni ; Φl−1)\n)\n∂(Φl−1)\
    \ = αl\ni\n∂(f(xl−1\ni ; Φl−1))\n∂(Φl−1) + ∂(αl\ni)\n∂(Φl−1) xl\ni (3)\nThe ﬁrst gradient term on the right-hand side\
    \ is scaled with αl\ni. In case of multi-dimensional AGs, αl\ni\ncorresponds to a vector at each grid scale. In each sub-AG,\
    \ complementary information is extracted\nand fused to deﬁne the output of skip connection. To reduce the number of trainable\
    \ parameters\nand computational complexity of AGs, the linear transformations are performed without any spatial\nsupport\
    \ (1x1x1 convolutions) and input feature-maps are downsampled to the resolution of gating\nsignal, similar to non-local\
    \ blocks [ 33]. The corresponding linear transformations decouple the\nfeature-maps and map them to lower dimensional\
    \ space for the gating operation. As suggested in\n[11], low-level feature-maps, i.e. the ﬁrst skip connections, are not\
    \ used in the gating function since\nthey do not represent the input data in a high dimensional space. We use deep-supervision\
    \ [16] to\nforce the intermediate feature-maps to be semantically discriminative at each image scale. This helps\nto ensure\
    \ that attention units, at different scales, have an ability to inﬂuence the responses to a large\nrange of image foreground\
    \ content. We therefore prevent dense predictions from being reconstructed\nfrom small subsets of skip connections.\n\n\
    [4 Discussion And Conclusion]\nIn this paper, we presented a novel attention gate model applied to medical image segmentation.\
    \ Our\napproach eliminates the necessity of applying an external object localisation model. The proposed\napproach is\
    \ generic and modular as such it can be easily applied to image classiﬁcation and regression\nproblems as in the examples\
    \ of natural image analysis and machine translation. Experimental\nresults demonstrate that the proposed AGs are highly\
    \ beneﬁcial for tissue/organ identiﬁcation and\nlocalisation. This is particularly true for variable small size organs\
    \ such as the pancreas, and similar\nbehaviour is expected for global classiﬁcation tasks.\nTraining behaviour of the\
    \ AGs can beneﬁt from transfer learning and multi-stage training schemes.\nFor instance, pre-trained U-Net weights can\
    \ be used to initialise the attention network, and gates can\nbe trained accordingly in the ﬁne-tuning stage. Similarly,\
    \ there is a vast body of literature in machine\nlearning exploring different gating architectures. For example, highway\
    \ networks [7] make use of\nresidual connections around the gate block to allow better gradient backpropagation and slightly\n\
    softer attention mechanisms. Although our experiments with residual connections have not provided\nany signiﬁcant performance\
    \ improvement, future research will focus on this aspect to obtain a better\ntraining behaviour. Lastly, we note that\
    \ with the advent of improved GPU computation power and\nmemory, larger capacity 3D models can be trained with larger\
    \ batch sizes without the need for image\ndownsampling. In this way, we would not need to utilise ad-hoc post-processing\
    \ techniques to further\nimprove the state-of-the-art results. Similarly, the performance of Attention U-Net can be further\n\
    enhanced by utilising ﬁne resolution input batches without additional heuristics. Lastly, we would\nlike to thank to Salim\
    \ Arslan and Dan Busbridge for their helpful comments on this work."
