  - "[ABSTRACT]\nDeeper neural networks are more difﬁcult to train. We\npresent a residual learning framework to ease the\
    \ training\nof networks that are substantially deeper than those used\npreviously. We explicitly reformulate the layers\
    \ as learning residual functions with reference to the layer inputs, instead of learning unreferenced functions. We provide\
    \ comprehensive empirical evidence showing that these residual\nnetworks are easier to optimize, and can gain accuracy\
    \ from\nconsiderably increased depth. On the ImageNet dataset we\nevaluate residual nets with a depth of up to 152 layers—8\
    \ ×\ndeeper than VGG nets [41] but still having lower complexity. An ensemble of these residual nets achieves 3.57% error\n\
    on the ImageNettest set. This result won the 1st place on the\nILSVRC 2015 classiﬁcation task. We also present analysis\n\
    on CIFAR-10 with 100 and 1000 layers.\nThe depth of representations is of central importance\nfor many visual recognition\
    \ tasks. Solely due to our extremely deep representations, we obtain a 28% relative improvement on the COCO object detection\
    \ dataset. Deep\nresidual nets are foundations of our submissions to ILSVRC\n& COCO 2015 competitions 1, where we also\
    \ won the 1st\nplaces on the tasks of ImageNet detection, ImageNet localization, COCO detection, and COCO segmentation.\n\
    \n[1. Introduction]\nDeep convolutional neural networks [22, 21] have led\nto a series of breakthroughs for image classiﬁcation\
    \ [21,\n50, 40]. Deep networks naturally integrate low/mid/highlevel features [50] and classiﬁers in an end-to-end multilayer\
    \ fashion, and the “levels” of features can be enriched\nby the number of stacked layers (depth). Recent evidence\n[41,\
    \ 44] reveals that network depth is of crucial importance,\nand the leading results [41, 44, 13, 16] on the challenging\n\
    ImageNet dataset [36] all exploit “very deep” [41] models,\nwith a depth of sixteen [41] to thirty [16]. Many other nontrivial\
    \ visual recognition tasks [8, 12, 7, 32, 27] have also\n1http://image-net.org/challenges/LSVRC/2015/ and\nhttp://mscoco.org/dataset/#detections-challenge2015.\n\
