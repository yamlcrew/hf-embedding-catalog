      \ Transformer Architecture]\nWe use a transformer (Vaswani et al., 2017) similar to the one described in (Radford et\
      \ al., 2019),\nwith some minimal changes: we replace LayerNorm with RMSNorm (Zhang and Sennrich, 2019) and\nuse relative\
      \ position encodings (Dai et al., 2019). As baselines, we train retrieval-free transformers\nwith 132M, 368M, 1.3B and\
      \ 7.0B parameters (embedding matrices are excluded from parameter\ncounts). The hyperparameters we used are detailed\
      \ in Table 2. All retrieval models use the same\nsize encoder for the retrieval data, with\U0001D4510= 896 and 2 layers,\
      \ which roughly adds19\U0001D440 parameters.\nThe encoder uses relative positional encodings. The retrieval models contain\
      \ oneR/e.sc/t.sc/r.sc/o.sc-block every\n3 blocks, starting from layer 6. For our smallest model,C/c.sc/a.scis applied\
      \ in layers 6, 9 and 12 of the\nmain pathway and also once for query conditioning in the encoder, which adds an additional12\U0001D440\
      \nparameters. The relative number of extra parameters reduces as we increase the baseline model size.\nAll models are\
      \ implemented using JAX (Bradbury et al., 2018) and Haiku (Hennigan et al., 2020).\n\n[5. Conclusion]\nWe present Retrieval-Enhanced\
      \ Transformers (R/e.sc/t.sc/r.sc/o.sc), a method for modelling arbitrary text sequences whilst retrieving from databases\
      \ with trillions of tokens—scaling the data available to models\nby an order of magnitude compared to what is typically\
      \ consumed during training.R/e.sc/t.sc/r.sc/o.scmodels\n\nImproving language models by retrieving from trillions of\
      \ tokens\ngains do not diminish for models with up to at least 7B parameters, and correspond to non-retrieval\nmodels\
      \ with 10\x02more parameters on certain datasets. On Wikitext103 and the Pile,R/e.sc/t.sc/r.sc/o.scoutperforms previous\
      \ models trained on large scale datasets. We also show thatR/e.sc/t.sc/r.sc/o.scis competitive on\nretrieval-intensive\
      \ downstream tasks such as question answering.\nR/e.sc/t.sc/r.sc/o.scmodels are ﬂexible and can be used without retrieval\
      \ at evaluation and still achieve\ncomparable performance to baseline models. Conversely, baseline models can be rapidly\
      \ ﬁne-tuned\ninto R/e.sc/t.sc/r.sc/o.scmodelstoobtainnearlythesameperformanceasiftrainedfromscratch. Carefulanalysis\n\
      shows that only a modest fraction of the gains obtained byR/e.sc/t.sc/r.sc/o.scare due to test set leakage. In\ngeneral,\
      \ we caution for such leakage in large-scale language datasets and suggest further work in\nbetter understanding the\
      \ role of test set leakage in the performance of large-scale language models.\nOverall, our work demonstrates at an\
      \ unprecedented scale that semi-parametric approaches can\nprovide an orthogonal, more eﬃcient approach than raw parameter\
      \ scaling as we seek to build more\npowerful language models.\nAcknowledgements\nWe would like to thank Nikolai Grigorev,\
