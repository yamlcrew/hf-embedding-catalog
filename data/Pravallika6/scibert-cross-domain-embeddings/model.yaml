      constraints on the global structure of instance masks. In this work, we propose a multi-task image-to-image Schrödinger
      Bridge framework that formulates instance segmentation as a distribution-based image-to-image generation problem. Boundary-aware
      supervision is integrated through a reverse distance map, and deterministic inference is employed to produce stable
      predictions. Experimental results on the PanNuke dataset demonstrate that the proposed method achieves competitive or
      superior performance without relying on SAM pre-training or additional post-processing. Additional results on the MoNuSeg
      dataset show robustness under limited training data. These findings indicate that Schrödinger Bridge-based image-to-image
      generation provides an effective framework for cell instance segmentation.
    sentences:
    - 'CodeSpecBench: Benchmarking LLMs for Executable Behavioral Specification Generation [SEP] Large language models (LLMs)
      can generate code from natural language, but the extent to which they capture intended program behavior remains unclear.
      Executable behavioral specifications, defined via preconditions and postconditions, provide a concrete means to assess
      such understanding. However, existing work on specification generation is constrained in evaluation methodology, task
      settings, and specification expressiveness. We introduce CodeSpecBench, a benchmark for executable behavioral specification
      generation under an execution-based evaluation protocol. CodeSpecBench supports both function-level and repository-level
      tasks and encodes specifications as executable Python functions. Constructed from diverse real-world codebases, it enables
      a realistic assessment of both correctness (accepting valid behaviors) and completeness (rejecting invalid behaviors).
      Evaluating 15 state-of-the-art LLMs on CodeSpecBench, we observe a sharp performance degradation on repository-level
      tasks, where the best model attains only a 20.2% pass rate. We further find that specification generation is substantially
      more challenging than code generation, indicating that strong coding performance does not necessarily reflect deep understanding
      of intended program semantics. Our data and code are available at https://github.com/SparksofAGI/CodeSpecBench.'
    - A Tutorial on Bayesian Analysis of Linear Shock Compression Data [SEP] Gas gun and other shock compression experiments
      often produce shock wave velocity measurements that are linearly associated with particle velocity. Traditionally, this
      empirical relationship is quantified with a single Hugoniot curve that is estimated using least squares regression.
      However, for downstream modeling and simulation tasks, it is often more useful to have multiple Hugoniot curves in the
      pressure-volume plane that are consistent with the data. We employ Bayesian uncertainty quantification methods as a
      framework for propagating measurement uncertainty through to model parameters and predictions. Specifically, this tutorial
      shows how to sample multiple Hugoniot curves in the pressure-volume plane that are consistent with the shock wave-particle
      velocity measurements in a two-step Bayesian approach. First, we obtain an analytical expression for the posterior distribution
      of the linear model parameters using Bayesian linear regression. Second, we propagate samples from the posterior distribution
      through the Rankine-Hugoniot equations to yield Hugoniot curves in the pressure-volume plane. The procedure is demonstrated
      with publicly available data on argon, copper, and nickel, and compared against bootstrapping and linear regression.
      The Bayesian procedure is shown to be interpretable, computationally inexpensive, and less sensitive than an alternative
      bootstrapping approach to the removal of the point in the copper dataset that has the largest particle velocity. As
      a tutorial on Bayesian methodology for the shock compression community, we provide several derivations and explanations
      that make this paper self-contained, and made all code and data available at https://github.com/llnl/BALSCD.
    - 'Mesoscopic scattering dynamics under generic uniform SU(2) gauge fields: Spin-momentum relaxation and coherent backscattering
      [SEP] We investigate the time- and momentum-resolved dynamics of matter waves undergoing elastic scattering from a disordered
      potential in the presence of spatially uniform SU(2) gauge fields. We derive the disorder-averaged density matrix as
      a function of time and momentum within the weak-localization regime. By accurately approximating the frequency dependence
      of the ladder and maximally crossed diagram series beyond the diffusive approximation, we describe short-time spin-momentum
      dynamics on timescales comparable to the scattering mean free time, for arbitrary strengths of the SU(2) gauge fields
      and disorder. We also present a cubic equation that determines the spin isotropization time, which gives accurate asymptotic
      forms in the limits where the spin-orbit length is much longer (Dyakonov-Perel spin relaxation regime) or much shorter
      than the scattering mean free path, as well as in the SU(2)-symmetric (persistent spin helix) limit. In comparison with
      numerical calculations, we reproduce both the relaxation of the momentum distribution and the transient backscattering
      peak with a momentum offset coexisting with the robust coherent backscattering dip, supporting the reliability of our
      calculations.'
  - source_sentence: Computational modeling of RNA-protein binding interactions under an external force [SEP] RNA binding
      proteins play a crucial role in post-transcriptional gene regulation by controlling the transport, processing, and translation
      of their target RNAs. Post-transcriptional gene regulation leads to the differential expression of genetic material
      and loss of regulation or over-regulation relates to a large range of cancers and diseases - many of which have directly
      been associated with RNA binding proteins and their target RNAs. To understand RNA, RNA binding proteins, and how they
      function in gene expression, it is essential to characterize how RNA binding proteins interact with their target RNAs.
      Here, we aim to assess the potential for single molecule force spectroscopy experiments to be used in the characterization
      of RNA-protein binding by investigating to what extent a change of extension due to RNA-protein binding is experimentally
      measurable and what aspects of the interaction can be deduced from such measurements. We predict the effect of protein
      binding on RNA force extension measurements via the open-source ViennaRNA package, which we have modified to simultaneously
      consider an external force, protein binding, and RNA secondary structure. From this work, we see protein concentration-dependent
      responses to external forces with discernable differences in predicted extensions around biologically relevant concentrations
      and a connection to protein binding domain geometry for several RNA binding proteins.
    sentences:
    - 'Pi-HOC: Pairwise 3D Human-Object Contact Estimation [SEP] Resolving real-world human-object interactions in images
      is a many-to-many challenge, in which disentangling fine-grained concurrent physical contact is particularly difficult.
      Existing semantic contact estimation methods are either limited to single-human settings or require object geometries
      (e.g., meshes) in addition to the input image. Current state-of-the-art leverages powerful VLM for category-level semantics
      but struggles with multi-human scenarios and scales poorly in inference. We introduce Pi-HOC, a single-pass, instance-aware
      framework for dense 3D semantic contact prediction of all human-object pairs. Pi-HOC detects instances, creates dedicated
      human-object (HO) tokens for each pair, and refines them using an InteractionFormer. A SAM-based decoder then predicts
      dense contact on SMPL human meshes for each human-object pair. On the MMHOI and DAMON datasets, Pi-HOC significantly
      improves accuracy and localization over state-of-the-art methods while achieving 20x higher throughput. We further demonstrate
      that predicted contacts improve SAM-3D image-to-mesh reconstruction via a test-time optimization algorithm and enable
      referential contact prediction from language queries without additional training.'
    - Spin Correlation and Quantum Entanglement of Fermion Pairs in Transversely Polarized $e^-e^+$ Collisions [SEP] We systematically
      study the spin correlations and quantum entanglement in transversely polarized electron-positron collisions. We find
      that the $s$-channel QED process $e^-e^+\to f\bar f$ produces a maximally entangled state in the entire phase space
      when the initial beams are transversely polarized, while the quantum magic varies in different phase space points for
      the maximally entangled Bell states. For electroweak processes, the spin configuration of final states depends on chiral
      couplings, and the entanglement is also greatly enhanced by transverse polarization as in the QED process. For Bhabha
      scattering with additional $t$-channel contributions, the transverse polarization still increases the final state entanglement,
      although with some dilution. The sensitive dependence of final spin states on the transverse polarization makes the
      beam polarization a powerful tool for generating and controlling quantum entanglement in collider experiments, opening
      up new opportunities for quantum information studies at high-energy colliders.
    - 'K-Way Energy Probes for Metacognition Reduce to Softmax in Discriminative Predictive Coding Networks [SEP] We present
      this as a negative result with an explanatory mechanism, not as a formal upper bound. Predictive coding networks (PCNs)
      admit a K-way energy probe in which each candidate class is fixed as a target, inference is run to settling, and the
      per-hypothesis settled energies are compared. The probe appears to read a richer signal source than softmax, since the
      per-hypothesis energy depends on the entire generative chain. We argue this appearance is misleading under the standard
      Pinchetti-style discriminative PC formulation. We present an approximate reduction showing that with target-clamped
      CE-energy training and effectively-feedforward latent dynamics, the K-way energy margin decomposes into a monotone function
      of the log-softmax margin plus a residual that is not trained to correlate with correctness. The decomposition predicts
      that the structural probe should track softmax from below. We test this across six conditions on CIFAR-10: extended
      deterministic training, direct measurement of latent movement during inference, a post-hoc decoder fairness control
      on a backpropagation network, a matched-budget PC vs BP comparison, a five-point Langevin temperature sweep, and trajectory-integrated
      MCPC training. In every condition the probe sat below softmax. The gap was stable across training procedures within
      the discriminative PC family. Final-state and trajectory-integrated training produced probes whose AUROC_2 values differed
      by less than 10^-3 at deterministic evaluation. The empirical regime is small: single seed, 2.1M-parameter network,
      1280 test images. We frame the result as a preprint inviting replication. We discuss conditions under which the decomposition
      does not apply (bidirectional PC, prospective configuration, generative PC, non-CE energy formulations) and directions
      for productive structural probing the analysis does not foreclose.'
  - source_sentence: 'Adaptive Federated Fine-Tuning of Self-Supervised Speech Representations [SEP] Integrating Federated
      Learning (FL) with self-supervised learning (SSL) enables privacy-preserving fine-tuning for speech tasks. However,
      federated environments exhibit significant heterogeneity: clients differ in computational capacity, causing straggler
      effects under unified fine-tuning, while diverse downstream tasks require different representation depths, making full-model
      updates inefficient. To address these challenges, we propose an adaptive federated fine-tuning framework with early
      exits. Lightweight prediction heads are inserted at intermediate layers of the SSL backbone, allowing clients to terminate
      computation based on local constraints and task requirements. We further introduce a layer-wise, depth-aware partial
      aggregation strategy to better utilize representations from different network depths. Experiments show that the framework
      reduces edge overhead, supports heterogeneous hardware, and maintains competitive performance in resource-constrained
      federated environments.'
    sentences:
    - 'MolMem: Memory-Augmented Agentic Reinforcement Learning for Sample-Efficient Molecular Optimization [SEP] In drug discovery,
      molecular optimization aims to iteratively refine a lead compound to improve molecular properties while preserving structural
      similarity to the original molecule. However, each oracle evaluation is expensive, making sample efficiency a key challenge
      for existing methods under a limited oracle budget. Trial-and-error approaches require many oracle calls, while methods
      that leverage external knowledge tend to reuse familiar templates and struggle on challenging objectives. A key missing
      piece is long-term memory that can ground decisions and provide reusable insights for future optimizations. To address
      this, we present MolMem (\textbf{Mol}ecular optimization with \textbf{Mem}ory), a multi-turn agentic reinforcement learning
      (RL) framework with a dual-memory system. Specifically, MolMem uses Static Exemplar Memory to retrieve relevant exemplars
      for cold-start grounding, and Evolving Skill Memory to distill successful trajectories into reusable strategies. Built
      on this memory-augmented formulation, we train the policy with dense step-wise rewards, turning costly rollouts into
      long-term knowledge that improves future optimization. Extensive experiments show that MolMem achieves 90\% success
      on single-property tasks (1.5$\times$ over the best baseline) and 52\% on multi-property tasks using only 500 oracle
      calls. Our code is available at https://github.com/REAL-Lab-NU/MolMem.'
    - 'BSTModelKit.jl: A Julia Package for Constructing, Solving, and Analyzing Biochemical Systems Theory Models [SEP] We
      present BSTModelKit.jl, an open-source Julia package for constructing, solving, and analyzing Biochemical Systems Theory
      (BST) models of biochemical networks. The package implements S-system representations, a canonical power-law formalism
      for modeling metabolic and regulatory networks. BSTModelKit.jl provides a declarative model specification format, dynamic
      simulation via ordinary differential equation (ODE) integration, steady-state computation, and global sensitivity analysis
      using the Morris and Sobol methods. The package leverages the Julia scientific computing ecosystem, in particular the
      SciML suite of differential equation solvers, to provide efficient and flexible model analysis tools. We describe the
      mathematical formulation, software design, and demonstrate the package capabilities with illustrative examples.'
    - 'CUTEv2: Unified and Configurable Matrix Extension for Diverse CPU Architectures with Minimal Design Overhead [SEP]
      Matrix extensions have emerged as an essential feature in modern CPUs to address the surging demands of AI workloads.
      However, existing designs often incur substantial hardware and software design overhead. Tight coupling with the CPU
      pipeline complicates integration across diverse CPUs, while fine-grained synchronous instructions hinder the development
      of high-performance kernels. This paper proposes a unified and configurable CPU matrix extension architecture. By decoupling
      matrix units from the CPU pipeline, the design enables low-overhead integration while maintaining close coordination
      with existing compute and memory resources. The configurable matrix unit supports mixed-precision operations and adapts
      to diverse compute demands and memory bandwidth constraints. An asynchronous matrix multiplication abstraction with
      flexible granularity conceals hardware details, simplifies matrix-vector overlap, and supports a unified software stack.
      The architecture is integrated into four open-source CPU RTL platforms and evaluated on representative AI models. Matrix
      unit utilization under GEMM workloads exceeds 90% across all platforms. When configured with compute throughput and
      memory bandwidth comparable to Intel AMX, our design achieves speedups of 1.57x, 1.57x, and 2.31x on ResNet, BERT, and
      Llama3, with over 30% of the gains attributed to overlapped matrix-vector execution. A 4 TOPS@2GHz matrix unit occupies
      only 0.53 mm\textsuperscript{2} in 14nm CMOS. These results demonstrate strong cross-platform adaptability and effective
      hardware-software co-optimization, offering a practical matrix extension for the open-source community.'
  - source_sentence: 'SciHorizon-GENE: Benchmarking LLM for Life Sciences Inference from Gene Knowledge to Functional Understanding
      [SEP] Large language models (LLMs) have shown growing promise in biomedical research, particularly for knowledge-driven
      interpretation tasks. However, their ability to reliably reason from gene-level knowledge to functional understanding,
      a core requirement for knowledge-enhanced cell atlas interpretation, remains largely underexplored. To address this
      gap, we introduce SciHorizon-GENE, a large-scale gene-centric benchmark constructed from authoritative biological databases.
      The benchmark integrates curated knowledge for over 190K human genes and comprises more than 540K questions covering
      diverse gene-to-function reasoning scenarios relevant to cell type annotation, functional interpretation, and mechanism-oriented
      analysis. Motivated by behavioral patterns observed in preliminary examinations, SciHorizon-GENE evaluates LLMs along
      four biologically critical perspectives: research attention sensitivity, hallucination tendency, answer completeness,
      and literature influence, explicitly targeting failure modes that limit the safe adoption of LLMs in biological interpretation
      pipelines. We systematically evaluate a wide range of state-of-the-art general-purpose and biomedical LLMs, revealing
      substantial heterogeneity in gene-level reasoning capabilities and persistent challenges in generating faithful, complete,
      and literature-grounded functional interpretations. Our benchmark establishes a systematic foundation for analyzing
      LLM behavior at the gene scale and offers insights for model selection and development, with direct relevance to knowledge-enhanced
      biological interpretation.'
    sentences:
    - 'scPilot: Large Language Model Reasoning Toward Automated Single-Cell Analysis and Discovery [SEP] We present scPilot,
      the first systematic framework to practice omics-native reasoning: a large language model (LLM) converses in natural
      language while directly inspecting single-cell RNA-seq data and on-demand bioinformatics tools. scPilot converts core
      single-cell analyses, i.e., cell-type annotation, developmental-trajectory reconstruction, and transcription-factor
      targeting, into step-by-step reasoning problems that the model must solve, justify, and, when needed, revise with new
      evidence. To measure progress, we release scBench, a suite of 9 expertly curated datasets and graders that faithfully
      evaluate the omics-native reasoning capability of scPilot w.r.t various LLMs. Experiments with o1 show that iterative
      omics-native reasoning lifts average accuracy by 11% for cell-type annotation and Gemini-2.5-Pro cuts trajectory graph-edit
      distance by 30% versus one-shot prompting, while generating transparent reasoning traces explain marker gene ambiguity
      and regulatory logic. By grounding LLMs in raw omics data, scPilot enables auditable, interpretable, and diagnostically
      informative single-cell analyses. Code, data, and package are available at https://github.com/maitrix-org/scPilot'
    - Orthogonal Subspace Projection for Continual Machine Unlearning via SVD-Based LoRA [SEP] Continual machine unlearning
      aims to remove the influence of data that should no longer be retained, while preserving the usefulness of the model
      on everything else. This setting becomes especially difficult when deletion requests arrive sequentially, because the
      model must repeatedly adapt without erasing previously retained knowledge. Low-Rank Adaptation (LoRA) offers an efficient
      way to implement such updates, but naively combining many sequential LoRA modules leads to parameter collision, causing
      \textit{strong interference} between tasks. We propose a static alternative based on Singular Value Decomposition (SVD)-guided
      orthogonal subspace projection. Our method constrains each new LoRA update during training so that it lies in the orthogonal
      complement of the subspaces used by earlier unlearning tasks. This preserves task isolation without requiring dynamic
      routing at deployment. Experiments on CIFAR-100 with ResNet-20 and on MNIST show stable behavior across long sequences
      of unlearning tasks. After thirty sequential unlearning tasks, state-of-the-art static fusion reduces retained accuracy
      from 60.39\% to 12.70\%, whereas the proposed in-training constrained optimization maintains baseline performance ($\sim$58.1\%)
      while preserving strong unlearning efficacy.
    - 'Beyond Output Correctness: Benchmarking and Evaluating Large Language Model Reasoning in Coding Tasks [SEP] Large language
      models (LLMs) increasingly rely on explicit reasoning to solve coding tasks, yet evaluating the quality of this reasoning
      remains challenging. Existing reasoning evaluators are not designed for coding, and current benchmarks focus primarily
      on code generation, leaving other coding tasks largely unexplored. We introduce CodeRQ-Bench, the first benchmark for
      evaluating LLM reasoning quality across three coding task categories: generation, summarization, and classification.
      Using this benchmark, we analyze 1,069 mismatch cases from existing evaluators, identify five recurring limitations,
      and derive four design insights for reasoning evaluation in coding tasks. Guided by these insights, we propose VERA,
      a two-stage evaluator that combines evidence-grounded verification with ambiguity-aware score correction. Experiments
      on CodeRQ-Bench show that VERA consistently outperforms strong baselines across four datasets, improving AUCROC by up
      to 0.26 and AUPRC by up to 0.21. We release CodeRQ-Bench at https://github.com/MrLYG/CodeRQ-Bench, supporting future
      investigations.'
