  - "642.1\nArt.  16b * Kapitaleinlagenprinzip\n1 Die Rückzahlung von Einlagen, Aufgeldern und Zuschüssen (Reserven  \naus\
    \ Kapitaleinlagen), die von den Inhabern der Beteiligungsrechte nach dem \n31. Dezember 1996 geleistet worden sind, wird\
    \ gleich behandelt wie die  \nRückzahlung von Grund- oder Stammkapital. Absatz 2 bleibt vorbehalten.\n2 Schüttet  eine\
    \  Kapitalgesellschaft  oder  Genossenschaft,  die  an  einer \nschweizerischen Börse kotiert ist, bei der Rückzahlung\
    \ von Reserven aus  \nKapitaleinlagen nach Absatz 1 nicht mindestens im gleichen Umfang übrige  \nReserven aus, so ist\
    \ die Rückzahlung im Umfang der halben Differenz zwi -\nschen der Rückzahlung und der Ausschüttung der übrigen Reserven\
    \ steuer -\nbar, höchstens aber im Umfang der in der Gesellschaft vorhandenen, han -\ndelsrechtlich ausschüttungsfähigen\
    \ übrigen Reserven.\n3 Absatz 2 ist nicht anwendbar auf Reserven aus Kapitaleinlagen:\na) die bei fusionsähnlichen Zusammenschlüssen\
    \ durch Einbringen von  \nBeteiligungs- und Mitgliedschaftsrechten an einer ausländischen Kapi -\ntalgesellschaft oder\
    \ Genossenschaft nach Artikel 84 Absatz 1 Buchsta-\nbe c oder durch eine grenzüberschreitende Übertragung auf eine in\
    \ -\nländische Tochtergesellschaft nach Artikel 84 Absatz 1 Buchstabe d  \nnach dem 24. Februar 2008 entstanden sind;\n\
    b) die zum Zeitpunkt einer grenzüberschreitenden Fusion oder Umstruk -\nturierung nach Artikel 84 Absatz 1 Buchstabe b\
    \ und Absatz 3 oder der  \nVerlegung des Sitzes oder der tatsächlichen Verwaltung nach dem 24.  \nFebruar 2008 bereits\
    \ in einer ausländischen Kapitalgesellschaft oder  \nGenossenschaft vorhanden waren;\nc) im Falle der Liquidation der\
    \ Kapitalgesellschaft oder Genossenschaft.\n4 Die Absätze 2 und 3 gelten sinngemäss auch für Reserven aus Kapitalein -\n\
    lagen, die für die Ausgabe von Gratisaktien oder für Gratisnennwerterhöhun-\ngen verwendet werden.\n5 Entspricht bei der\
    \ Rückgabe von Beteiligungsrechten an einer Kapitalge -\nsellschaft oder Genossenschaft, die an einer schweizerischen\
    \ Börse kotiert  \nist, die Rückzahlung der Reserven aus Kapitaleinlagen nicht mindestens der  \nHälfte  des  erhaltenen\
    \  Liquidationsüberschusses,  so  vermindert  sich  der \nsteuerbare Anteil dieses Liquidationsüberschusses um die halbe\
    \ Differenz  \nzwischen diesem Anteil und der Rückzahlung, höchstens aber im Umfang  \nder in der Gesellschaft vorhandenen\
    \ Reserven aus Kapitaleinlagen, die auf  \ndiese Beteiligungsrechte entfallen.\n6 Absatz 1 gilt für Einlagen und Aufgelder,\
    \ die während eines Kapitalbands  \nnach Obligationenrecht (OR) geleistet werden, nur soweit sie die Rückzah -\nlungen\
    \ von Reserven im Rahmen dieses Kapitalbands übersteigen. *\n15"
