  - "642.1\nf) der  Einkünfte,  für  die  der  Steuerpflichtige  aufgrund  eines  von  der \nSchweiz abgeschlossenen Abkommens\
    \ zur Vermeidung der Doppel -\nbesteuerung gänzliche oder teilweise Entlastung von ausländischen  \nSteuern beansprucht.\n\
    8 Werden Einkünfte aus einem ausländischen Staat von dessen Steuern ent-\nlastet, wenn die Schweiz diese Einkünfte allein\
    \ oder mit anderen Einkünften  \nzum Satz des Gesamteinkommens besteuert, wird die Steuer nicht nur nach  \nden in Absatz\
    \ 7 bezeichneten Einkünften, sondern auch nach allen aufgrund  \ndes betreffenden Doppelbesteuerungsabkommens der Schweiz\
    \ zugewiese -\nnen Einkommensbestandteilen aus dem Quellenstaat bemessen.\n1.1.2 Einkommenssteuer\nArt.  12 1. Steuerbare\
    \ Einkünfte\n1.1. Steuerbare Einkünfte\n1 Der Einkommenssteuer unterliegen sämtliche wiederkehrenden und ein -\nmaligen\
    \ Einkünfte aller Art.\n2 Als Einkommen gelten auch Naturalbezüge jeder Art, insbesondere freie  \nVerpflegung und Unterkunft\
    \ sowie der Wert selbstverbrauchter Erzeugnisse  \nund Waren des eigenen Betriebes; sie werden nach ihrem Marktwert be\
    \ -\nmessen. *\n3 Die  Kapitalgewinne  aus  Veräusserung  von  Privatvermögen  sowie  land- \nund forstwirtschaftlichen\
    \ Grundstücken sind steuerfrei; vorbehalten bleibt die  \ngesonderte Besteuerung der Grundstückgewinne. *\nArt.  13 1.2.\
    \ Aus unselbständiger Erwerbstätigkeit\n1 Steuerbar sind alle Einkünfte aus unselbständiger Erwerbstätigkeit aus ei -\n\
    nem  privatrechtlichen  oder  öffentlich-rechtlichen  Arbeitsverhältnis,  ein-\nschliesslich der Nebeneinkünfte wie Entschädigungen\
    \ für Sonderleistungen,  \nProvisionen, Zulagen, Dienstalters- und Jubiläumsgeschenke, Gratifikatio -\nnen, Trinkgelder,\
    \ Tantiemen und andere geldwerte Vorteile. Die vom Arbeit -\ngeber getragenen Kosten der berufsorientierten Aus- und Weiterbildung,\
    \ ein-\nschliesslich Umschulungskosten, stellen unabhängig von deren Höhe kein  \nsteuerpflichtiges Einkommen dar. *\n\
    2 Kapitalabfindungen aus einer mit dem Arbeitsverhältnis verbundenen Vor -\nsorgeeinrichtung oder gleichartige Kapitalabfindungen\
    \ des Arbeitgebers wer-\nden nach Artikel 33b Absatz 1 besteuert. *\n9"
