    - "642.1\n2 Für ein unentgeltlich eingeräumtes Wohnrecht hat der Wohnrechtberech -\ntigte  den  Eigenmietwert  zu  besteuern.\
      \  Für  ein  entgeltlich  eingeräumtes \nWohnrecht hat der Eigentümer den Ertrag zu besteuern. Das unbewegliche  \n\
      Vermögen wird beim Eigentümer besteuert.\n3 Der Eigenmietwert einer unentgeltlich eingeräumten Nutzniessung oder ei\
      \ -\nnes Wohnrechtes wird gemäss Artikel 17 Absatz 2 berechnet.\nArt.  7 2.2. Erbengemeinschaften und Personengesellschaften\n\
      1 Einkommen und Vermögen von Erbengemeinschaften werden den einzel -\nnen Erben, Einkommen und Vermögen von Kollektiv-,\
      \ Kommandit- und ein -\nfachen Gesellschaften den einzelnen Teilhabern anteilmässig zugerechnet.\n2 Gleicherweise werden\
      \ die Verlustanteile und die Passivenüberschüsse be -\nrücksichtigt. Artikel 5 Absatz 2 bleibt vorbehalten.\nArt.  8\
      \ 2.3. Ausländische Handelsgesellschaften und andere Perso-\nnengesamtheiten ohne juristische Persönlichkeit\n1 Ausländische\
      \ Handelsgesellschaften und andere ausländische Personen -\ngesamtheiten ohne juristische Persönlichkeit, die kraft\
      \ wirtschaftlicher Zu -\ngehö-rigkeit steuerpflichtig sind, entrichten ihre Steuern nach den für die ju -\nristischen\
      \ Personen geltenden Bestimmungen.\nArt.  9 2.4. Steuernachfolge und Schenkung\n1 Stirbt der Steuerpflichtige, so treten\
      \ seine Erben und Erbinnen in seine/ihre  \nRechte und Pflichten ein. Sie haften solidarisch für die vom Erblasser oder\
      \  \nErblasserin geschuldeten Steuern bis zur Höhe ihrer Erbteile, mit Einschluss  \nder Vorempfänge. *\n2 Der überlebende\
      \ Ehegatte oder Ehegattin haftet mit seinem/ihrem Erbteil  \nund dem Betrag, den er oder sie aufgrund ehelichen Güterrechts\
      \ vom Vor -\nschlag oder Gesamtgut über den gesetzlichen Anteil nach schweizerischem  \nRecht hinaus erhält. *\n3 Bei\
      \ Schenkung haftet der Beschenkte bis zum Wert der Schenkung für die  \nvom Schenker geschuldeten Steuern, wenn dieser\
      \ nicht mehr in der Lage  \nist, sie selber zu zahlen.\n6"
