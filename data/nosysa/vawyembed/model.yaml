  - "642.1\nArt.  88a * Patente und vergleichbare Rechte: Begriffe\n1 Als Patente gelten:\na) Patente nach dem Europäischen\
    \ Patentübereinkommen vom 5.Okto -\nber 1973 in seiner revidierten Fassung vom 29. November 2000 mit  \nBenennung Schweiz;\n\
    b) Patente nach dem Patentgesetz vom 25. Juni 1954;\nc) ausländische Patente, die den Patenten nach den Buchstaben a oder\
    \  \nb entsprechen.\n2 Als vergleichbare Rechte gelten:\na) ergänzende Schutzzertifikate nach dem Patentgesetz vom 25.\
    \ Juni  \n1954 und deren Verlängerung;\nb) Topographien,  die  nach  dem  Topographiengesetz  vom  9.  Oktober \n1992\
    \ geschützt sind;\nc) Pflanzensorten, die nach dem Sortenschutzgesetz vom 20. März 1975  \ngeschützt sind;\nd) Unterlagen,\
    \ die nach dem Heilmittelgesetz vom 15. Dezember 2000  \ngeschützt sind;\ne) Berichte, für die gestützt auf Ausführungsbestimmungen\
    \ zum Land -\nwirtschaftsgesetz vom 29. April 1998 ein Berichtschutz besteht;\nf) ausländische Rechte, die den Rechten\
    \ nach den Buchstaben a–e ent -\nsprechen.\nArt.  88b * Patente und vergleichbare Rechte: Besteuerung\n1 Der Reingewinn\
    \ aus Patenten und vergleichbaren Rechten wird auf Antrag  \nder steuerpflichtigen Person im Verhältnis des qualifizierenden\
    \ Forschungs-\nund Entwicklungsaufwands zum gesamten Forschungs- und Entwicklungs -\naufwand pro Patent oder vergleichbares\
    \ Recht (Nexusquotient) mit einer Er -\nmässigung von 90 Prozent in die Berechnung des steuerbaren Reingewinns  \neinbezogen.\n\
    2 Der Reingewinn aus Patenten und vergleichbaren Rechten, die in Produk -\nten enthalten sind, ermittelt sich, indem der\
    \ Reingewinn aus diesen Produk -\nten jeweils um 6 Prozent der diesen Produkten zugewiesenen Kosten sowie  \num das Markenentgelt\
    \ vermindert wird.\n55"
