- source_sentence: Erklären Sie, wie der Eigenmietwert für ein unentgeltlich eingeräumtes Wohnrecht berechnet wird und wer
    die Steuerpflicht dafür trägt.
  sentences:
  - "642.1\nArt.  158 3. Nachsteuern\n3.1. Voraussetzungen\n1 Ergibt sich aufgrund von Tatsachen oder Beweismitteln, die der\
    \ Steuerbe -\nhörde nicht bekannt waren, dass eine Veranlagung zu Unrecht unterblieben  \noder eine rechtskräftige Veranlagung\
    \ unvollständig ist, oder ist eine unter -\nbliebene oder unvollständige Veranlagung auf ein Verbrechen oder ein Ver -\n\
    gehen gegen die Steuerbehörde zurückzuführen, so wird die nicht erhobene  \nSteuer samt Zins als Nachsteuer eingefordert.\
    \ *\n2 Hat der Steuerpflichtige Einkommen, Vermögen, Reingewinn oder Eigen -\nkapital in seiner Steuererklärung vollständig\
    \ und genau angegeben und ha -\nben die Steuerbehörden die Bewertung anerkannt, so kann keine Nachsteu -\ner wegen ungenügender\
    \ Bewertung erhoben werden.\n3 Bei Selbstanzeige im Sinne der Artikel 203 ff. wird die Nachsteuer ohne  \nZinsen eingefordert.\
    \ *\nArt.  159 3.2. Verwirkung\n1 Das Recht, ein Nachsteuerverfahren einzuleiten, erlischt zehn Jahre nach  \nAblauf der\
    \ Steuerperiode, für die eine Veranlagung zu Unrecht unterblieben  \noder eine rechtskräftige Veranlagung unvollständig\
    \ ist. *\n2 Die Eröffnung der Strafverfolgung wegen Steuerhinterziehung oder Steuer -\nvergehens gilt zugleich als Einleitung\
    \ des Nachsteuerverfahrens.\n3 Das Recht, die Nachsteuer festzusetzen, erlischt 15  Jahre nach Ablauf der \nSteuerperiode,\
    \ auf die sie sich bezieht. *\n4 Die  Einleitung  eines  Nachsteuerverfahrens  wird  dem  Steuerpflichtigen \nschriftlich\
    \ mitgeteilt. *\n4a Wenn bei Einleitung eines Nachsteuerverfahrens ein Strafverfahren we -\ngen Steuerhinterziehung weder\
    \ eingeleitet wird, noch hängig ist, noch von  \nvornherein ausgeschlossen werden kann, wird die steuerpflichtige Person\
    \  \nauf die Möglichkeit der späteren Einleitung eines solchen Strafverfahrens  \naufmerksam gemacht. *\n5 Das Verfahren,\
    \ das beim Tod des Steuerpflichtigen noch nicht eingeleitet  \noder noch nicht abgeschlossen ist, kann gegenüber den Erben\
    \ eingeleitet  \noder fortgesetzt werden. *\n6 Im Übrigen sind die Vorschriften über die Verfahrensgrundsätze, das Ver\
    \ -\nanlagungs- und das Beschwerdeverfahren sinngemäss anwendbar. *\n92"
