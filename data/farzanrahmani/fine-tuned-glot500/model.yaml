widgetData:
- source_sentence: تاریخ تولد شاهرخ ضرغام چه زمانی است؟
  sentences:
  - فریدون بتمنقلیچ مرد است.
  - شاهرخ ضرغام مردی است که در رشته کشتی فعالیت می‌کند. او در اول دی ماه سال ۱۳۲۸ در تهران متولد شده است.
  - سعید بخشی‌زاده مردی است که در ۸ آبان ۱۳۵۲ در فومن متولد شده است. قد او ۱۷۵ سانتی‌متر است و در رشته ورزشی فوتبال فعالیت
    می‌کند.
- source_sentence: در کدام حوزه ورزشی توران شادپور فعالیت دارد؟
  sentences:
  - توران شادپور در تاریخ ۲۸ اسفند ۱۳۳۰ متولد شده است. او در رشته فوتبال فعالیت می‌کند و جنسیت او زن است.
  - نادر کاشانی مرد و در رشته بسکتبال فعالیت می‌کند.
  - علیرضا هاشم‌زاده مردی است که در تاریخ ۲۱ شهریور ۱۳۷۴ در گنبد کاووس متولد شده است. او در رشته ورزشی کاراته فعالیت می‌کند
    و قد او ۱۹۱ سانتیمتر است.
- source_sentence: جنسیت کاظم رجبی چیست؟
  sentences:
  - نفیسه مخلصی مرد و در رشته تکواندو فعالیت می‌کند. او در مسابقات تکواندو قهرمانی آسیا ۲۰۱۲ حضور داشته است.
  - کاظم رجبی مرد و در رشته وزنه‌برداری فعالیت می‌کند. او در سال ۲۰۱۰ در مالزی متولد شده است.
  - صالح فروتن‌نیک ورزشکار رشته بسکتبال است. او در تاریخ ۲۲ مه ۱۹۹۴ متولد شده است. قد او ۶ فوت ۸۳/۴ اینچ (۲٫۰۵ متر) و وزن
    او ۲۳۵ پوند (۱۰۷ کیلوگرم) است.
- source_sentence: علاءالدین عترتی کوشالی در چه رشته ورزشی فعالیت می‌کند؟
  sentences:
  - علاءالدین عترتی کوشالی مرد و در رشته قایقرانی فعالیت می‌کند.
  - محمد علی‌آبادی مردی است که در سال ۱۳۳۵ در اراک متولد شده و در رشته فوتبال فعالیت می‌کند.
  - محمدرضا نیک‌نهال مرد و در رشته فوتبال فعالیت می‌کند. او در ایران متولد شده است.
- source_sentence: رشته ورزشی حسن کبیری چیست؟
  sentences:
  - علی خسروی مردی است که در سال ۱۳۴۰ در تهران متولد شده و در رشته فوتبال فعالیت می‌کند.
  - عزیز واگذاری کشتی‌گیر مرد متولد سال ۱۹۸۳ در تهران است.
  - حسن کبیری مردی است که در رشته والیبال فعالیت می‌کند. او در سال ۱۳۲۳ در تهران متولد شده است. محل تولد او تیم ملی ایران
    ذکر شده است.
