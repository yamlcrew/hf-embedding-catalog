widgetData:
- source_sentence: Which item discusses Financial Statements and Supplementary Data?
  sentences:
  - To support its transition to EVs, GM is advancing strategic sourcing initiatives to develop a North America-focused EV
    supply chain through investments in raw material suppliers and strategic supply agreements.
  - Item 8 is specifically designated for discussing 'Financial Statements and Supplementary Data'.
  - In the year the operating income is listed as $529, the adjusted operating income is recorded as $709.
- source_sentence: What was the total net sales and revenue for the year 2023 as reported?
  sentences:
  - These factors include, among others, the risks associated with our ability to maintain our concession in Macao and gaming
    license in Singapore; the extensive regulations to which we are subject and the costs of compliance or failure to comply
    with such regulations.
  - In the year 2023, the total net sales and revenue amounted to $171,842 million, as derived from the specified sums of
    the various business segments within the company.
  - Acquisition-related expenses | $ | — | | $ | 41,394 |
- source_sentence: How much did eBay's FX-Neutral net revenues increase in 2023 compared to 2022?
  sentences:
  - FX-Neutral net revenues (as defined above) increased 4% compared to 2022.
  - In the case of the 2031 Notes, the maturity date is September 1, 2031, and for the 2051 Notes, it is June 1, 2051.
  - Our definitions may differ from the definitions used by other companies and therefore comparability may be limited.
- source_sentence: How much did the variable portion of the Macao gaming annual premium amount to in 2023?
  sentences:
  - Energy & Transportation's total sales were $28.001 billion in 2023, an increase of $4.249 billion, or 18... and profit
    was $4.936 billion in 2023, an increase of $1.627 billion, or 49 percent...
  - The timing and cost of our inventory purchases will vary depending on a variety of factors such as revenue growth, assortment
    and purchasing decisions, product costs including freight and duty, and the availability of production capacity and speed.
  - In addition to the base portion, the variable portion of the Macao gaming annual premium required an additional investment
    of approximately $691 million by December 2032.
- source_sentence: What is required of hotel owners if they do not participate in the company's insurance programs?
  sentences:
  - If hotel owners do not participate in the company's insurance programs, they must purchase insurance programs that are
    consistent with the company's requirements.
  - As of March 31, 2023, approximately $925 million of our cash and cash equivalents were domiciled in foreign tax jurisdictions
    and all of our foreign cash is available for repatriation without a material tax cost.
  - Exposures are aggregated, monitored, and actively managed by our Global Credit Committee, comprising senior executives,
    including our Chief Financial Officer, our Chief Risk ejectedf Officer, our Chief Investment Officer, and our Treasurer.
