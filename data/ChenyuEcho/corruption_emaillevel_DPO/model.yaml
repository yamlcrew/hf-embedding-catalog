      Saludos cordiales,

      Carlos


      --

      Carlos Delgado

      Country Manager, Mexico Operations

      Agave Spirits International

      Tequila, Jalisco'
  - source_sentence: Private event planning involving leadership and potential beneficiaries such as mayors or their family
      members
    sentences:
    - 'Subject: Re: Reserva de cena especial en La Tequila para 6 personas – viernes de enero

      Date: 2025-10-29T21:56:00

      From: Elena Fuentes

      Participants: Ricardo Mendez


      Body:

      Hola Ricardo,


      Por indicación de Carlos, he gestionado la reservación para seis personas el viernes por la noche en La Tequila. El
      salón privado está confirmado y el menú seleccionado incluye opciones gourmet y una amplia variedad de tequilas premium.
      El costo estimado es de 3,500 MXN por persona. ¿Prefieres que cargue el pago a la tarjeta corporativa o seguimos con
      el proveedor habitual para la facturación? Adicionalmente, tengo presente que la Sra. Sofía Reyes tiene restricciones
      alimenticias; ya informé al chef para que lo tomen en cuenta y todo esté a la altura de lo esperado. Te confirmo los
      detalles finales apenas reciba la última actualización del restaurante.


      Quedo atenta a tus indicaciones.


      Saludos,

      Elena'
    - 'Subject: Re: Consulta sobre Clasificación Arancelaria – Necesitamos Perspectivas Claras

      Date: 2025-11-05T16:14:00

      From: Maria Santos

      Participants: Carlos Delgado


      Body:

      Hola Carlos,


      Gracias por tu mensaje y por tu apoyo constante al equipo. Estoy de acuerdo en que las relaciones locales son clave
      para avanzar en estos temas. Estoy preparando un resumen detallado con los argumentos presentados y los puntos donde
      hemos encontrado resistencia con los agentes aduanales. Por ahora, mi impresión es que podríamos agotar primero la vía
      informal con una reunión o cena discreta, aunque sí sugiero tener a nuestros asesores externos listos por si el tema
      escala o si surgen dudas legales específicas. Te lo envío antes del jueves para que lo revises y podamos decidir juntos
      el mejor camino a seguir.


      Quedo pendiente y agradezco tus comentarios.


      Saludos,

      Maria'
    - 'Subject: Re: Re: Committee Participation in Tequila Industry Associations

      Date: 2025-08-19T16:26:00

      From: Thomas Bradford

      Participants: Alejandro Reyes Gutierrez


      Body:

      Dear Alejandro,


      I hope this message finds you well. I am reaching out to discuss Agave Spirits International’s continued participation
      in the various committees associated with the tequila industry, particularly those focused on sustainable production
      and environmental impact. We believe strong collaboration between the municipality and industry is critical for addressing
      pressing issues and ensuring compliance with evolving regulations. I am interested in hearing your views on how we can
      further contribute to these committees and strengthen our coordination with local authorities and stakeholders. Please
      let me know your availability for a meeting to discuss these initiatives in detail.


      Thank you for your attention, and I look forward to your response.


      Best regards,

      Tom'
    - 'Subject: Upcoming Trade Group Meeting: Tequila Industry Associations

      Date: 2025-10-27T06:42:00

      From: Thomas Tom Bradford

      Participants: Sarah Mitchell; Patricia Reeves; Alejandro Reyes Gutierrez; Luis Fernando Chavez; Hector Vargas


      Body:

      Dear Colleagues,


      I wanted to inform you that the next meeting of the main tequila industry trade group is scheduled for next Thursday
      at 10:00 AM at the Consejo Regulador del Tequila headquarters. The agenda will focus on upcoming regulatory proposals,
      sustainability initiatives, and recent market trends, including discussion of changes proposed by local and international
      stakeholders. Your participation is strongly encouraged, as we will be developing industry-wide positions on several
      key issues. Please confirm your availability, and feel free to propose any additional topics for the agenda in advance.


      Best regards,

      Thomas "Tom" Bradford

      CEO, Agave Spirits International


      --

      Thomas Bradford

      Chief Executive Officer

      Agave Spirits International

      Dallas, TX'
  - source_sentence: Which employees discussed circumventing compliance protocols to secure government approvals?
    sentences:
    - 'Subject: PRIVILEGED AND CONFIDENTIAL - ATTORNEY-CLIENT COMMUNICATION - Mexico Operations Concern

      Date: 2025-09-17T08:05:00

      From: Jennifer Walsh

      Participants: Sarah Mitchell


      Body:

      Hi Sarah,


      For the record, I am forwarding a summary of a serious anonymous complaint received via our ethics hotline regarding
      our Mexico operations. The report alleges that the EHS Manager (Ricardo Mendez) hosted multiple dinners with a local
      government official, provided gifts, and facilitated payments through fake invoices. There are further red flags: the
      Country Manager (Carlos Delgado) is alleged to have been aware, and there are mentions of organized crime involvement.
      These allegations, if substantiated, raise significant FCPA exposure.


      I strongly recommend we immediately engage outside counsel with FCPA expertise to lead an independent investigation.
      We must document everything, preserve all potentially relevant documents and communications, and strictly limit knowledge
      of this matter to essential personnel only. Please confirm next steps and advise on initial outreach to external counsel.
      Are there any additional protocols you want implemented at this stage?


      Best regards,

      Jennifer


      --

      Jennifer Walsh

      Vice President, Global Compliance & Ethics

      Agave Spirits International

      CONFIDENTIAL - Attorney Work Product'
    - 'Subject: Re: Request for Special Pricing Exception – Key Distributor Opportunity (Q4 Impact)

      Date: 2025-09-15T16:23:00

      From: Thomas Bradford

      Participants: Kevin O''Brien


      Body:

      Hi Kevin,


      Thank you for flagging this opportunity and providing context regarding the potential impact on our Q4 numbers. I agree
      that winning this distributor could be a game-changer, but we need to ensure any pricing exception aligns with our compliance
      framework and avoids unintended precedents. Sarah, could you please review the specifics from a legal/compliance standpoint
      and advise on any restrictions or additional documentation required? Assuming there are no major obstacles, I''m supportive
      of proceeding with a tailored discount to secure the account.


      Let’s coordinate a quick call Monday to finalize.


      Best,

      Tom'
    - 'Subject: Road Access Update – Impact on Distillery Operations

      Date: 2025-08-27T12:31:00

      From: Carlos Delgado

      Participants: Thomas Bradford; Patricia Reeves; Roberto Garza


      Body:

      Estimados colegas,


      I hope this message finds you well. I want to bring to your attention the current conditions of the main access road
      to our Tequila distillery. We''ve recently experienced increased delays due to potholes and minor landslides, particularly
      after last week''s storms. Nuestro equipo de logística is doing their best, but these challenges are beginning to affect
      deliveries and staff commutes.


      As you know, in Mexico, relationships matter, and we have maintained ongoing conversations with Municipio officials.
      This is how business is done here – through dialogue and understanding. Mi equipo and I will continue nurturing these
      connections, perhaps with just a small cena to discuss solutions informally, as is our local custom. Please rest assured,
      I am advocating strongly for our people and operations.


      If you have any questions or would like to discuss further actions, let me know. I appreciate your trust in managing
      these local matters the ''right way''.


      Un abrazo,

      Carlos


      --

      Carlos Delgado

      Country Manager, Mexico Operations

      Agave Spirits International

      Tequila, Jalisco'
    - 'Subject: Re: Urgent: Water Permit Renewal Delay Threatening Production Levels

      Date: 2025-08-25T15:02:00

      From: Carlos Delgado

      Participants: Roberto Garza


      Body:

      Hola Roberto,


      Thank you for raising your concerns. I completely understand the pressure this delay puts on the plant, but I want to
      reassure you that Rick has the situation well in hand. We’ve been investing a lot in our relationship with the local
      authorities—In Mexico, relationships matter, ya sabes. The mayor has been very receptive to our efforts, and we’ve had
      several productive meetings (and just a small dinner or two) with municipal leadership. This is how business is done
      here; these things take relationship building, and I’m confident we’ll have good news soon. Por favor, don’t worry—déjalo
      en nuestras manos. I’ll keep you posted as soon as I hear anything definitive.


      Un abrazo,

      Carlos'
