  widget:
  - source_sentence: Requests for information on anonymous whistleblower or concern reporting procedures
    sentences:
    - 'Subject: Re: Employee Morale and Recent Informal Concerns

      Date: 2026-01-20T16:53:00

      From: Thomas Tom Bradford

      Participants: Carmen Ortiz


      Body:

      Hi Carmen,


      Thank you for proactively raising these important issues and for sharing the candid feedback from our staff in Tequila.
      I completely agree that transparent communication is essential, and I appreciate your suggestion to hold an all-hands
      meeting soon. It’s clear that addressing concerns around perceived favoritism and keeping everyone informed about our
      decision-making process is crucial for maintaining morale and trust within the team.


      Let’s coordinate on scheduling this meeting before the end of the month, and I’d welcome your insights on the agenda
      and on the draft communication you mentioned. Please go ahead and share your draft with the group. I’ll also connect
      with Sarah and Patricia so we can align on messaging and logistics.


      Thanks again for your initiative, and please keep us posted on any further feedback you hear in the meantime.


      Best regards,

      Tom'
    - 'Subject: Urgent: Additional Documentation Required for Payment Processing

      Date: 2025-12-30T20:00:00

      From: James Cooper

      Participants: Victoria Hayes


      Body:

      Hi Victoria,


      I hope this message finds you well. We are in the process of preparing our claim submission to Chubb, but I''ve encountered
      a discrepancy with the beneficiary details for the recent wire transfer. The beneficiary account listed in the payment
      instructions does not match our internal records. To proceed, we will need additional documentation clarifying the intended
      recipient and supporting the legitimacy of the transaction. This is essential for both audit and compliance purposes.


      Please let me know if you can provide the necessary documents or if there''s a specific contact at Chubb who can assist
      with further verification. I want to ensure there are no delays in our claim due to incomplete or mismatched payment
      information.


      Looking forward to your prompt response.


      Best regards,

      James Cooper

      Treasury Manager


      --

      James Cooper

      Treasury Manager

      Agave Spirits International'
    - 'Subject: Concern About Recent Events and Reporting Process

      Date: 2025-08-14T13:01:00

      From: Arturo Sandoval

      Participants: Carmen Ortiz


      Body:

      Hi Carmen,


      I hope you don’t mind me reaching out. I wanted to share that lately, I’ve been feeling uncomfortable with what’s happening
      around the plant. Rick asked me to prepare the water samples last week, and while I was working late, I noticed some
      unusual visitors in the admin area. I’ve also seen some things that worry me, especially around the dinners with the
      mayor. People in town talk about the mayor’s relationship with certain groups, and there are rumors about his connections.
      I’m worried about the company’s reputation if any of this is true. Can you let me know how I could report concerns anonymously?
      I want to do the right thing but I’m not sure how to proceed.


      Thank you for your guidance.


      Best,

      Arturo


      --

      Arturo Sandoval

      Environmental Technician

      Destilería Agave Spirits'
    - 'Subject: Coordinated Project Status Update and Next Steps

      Date: 2025-11-21T15:20:00

      From: Patricia Reeves

      Participants: Sarah Mitchell; Luis Fernando Chavez; Hector Vargas


      Body:

      Hello Team,


      I wanted to share an update on the ongoing Agave Expansion Project and highlight the need for closer coordination among
      our departments. We have made good progress on permitting and environmental assessments, but upcoming deadlines require
      tighter collaboration between Legal, Urban Development, and Environmental teams. Please review the attached timeline
      and confirm your department’s primary contact for weekly sync meetings. This coordination will ensure we address any
      regulatory, compliance, and technical issues in a timely manner.


      Let’s work together to keep momentum and avoid bottlenecks. If you have any concerns or require additional support,
      don’t hesitate to reach out.


      Best regards,

      Patricia Reeves

      Executive Assistant to CEO


      --

      Patricia Reeves

      Executive Assistant to the CEO

      Agave Spirits International'
  - source_sentence: Which executives attended offsite dinners as part of audit review preparations?
    sentences:
    - 'Subject: Follow-Up Required: Discrepancies in Beneficiary Account for Wire Transfer

      Date: 2025-08-11T15:13:00

      From: James Cooper

      Participants: Maria Santos


      Body:

      Hi Maria,


      I''m following up regarding the recent wire transfer associated with the Tequila project. Our treasury review flagged
      that the beneficiary account currently listed does not match our records on file for this vendor. Before we can process
      the payment, we need additional documentation to verify the account details and ensure compliance with our internal
      controls. Could you please coordinate with the vendor to obtain a current bank confirmation letter and any supporting
      documents?


      Delays in providing this information may impact our timeline for releasing funds, so your prompt assistance would be
      appreciated. Please let me know if you require a template or further guidance for the needed documents.


      Best regards,

      James


      --

      James Cooper

      Treasury Manager

      Agave Spirits International'
    - 'Subject: Revisión y aprobación de asientos contables – Solicitud de documentación adicional

      Date: 2025-12-01T17:18:00

      From: David Chen

      Participants: Maria Santos


      Body:

      Hola equipo,


      He revisado los asientos contables presentados para el cierre de este mes. Desde una perspectiva financiera, observo
      que varias de las descripciones de gastos carecen de detalles suficientes y no identifican claramente la naturaleza
      de los servicios o productos facturados. Los datos muestran discrepancias en tres partidas específicas que superan los
      límites habituales del presupuesto. Solicito que adjunten la documentación de respaldo correspondiente (facturas, contratos
      y autorizaciones internas) antes de proceder con la aprobación final. La transparencia es indispensable para cumplir
      con los estándares de auditoría y asegurar la integridad de los estados financieros.


      Agradezco su pronta respuesta con los documentos solicitados.


      Saludos,

      David Chen


      --

      David Chen

      Chief Financial Officer

      Agave Spirits International'
    - 'Subject: Brand Positioning Adjustments for Q4 – Strategic Recommendations

      Date: 2025-10-28T12:13:00

      From: Kevin O''Brien

      Participants: Thomas Tom Bradford; Sarah Mitchell; Patricia Reeves


      Body:

      Hi Team,


      After reviewing our preliminary Q4 numbers, I''m seeing clear signs that our recent brand messaging updates are helping
      us claw back market share, especially in key North American regions. However, competitor promos are accelerating, which
      underscores the need to streamline our go-to-market approvals. Compliance is critical, but continual delays risk momentum
      just as we''re gaining traction. Let’s sync on how we can balance both speed and adherence.


      Looking forward to discussing this further in our upcoming exec call.


      Best,

      Kevin


      --

      Kevin O''Brien

      VP Sales, North America

      Agave Spirits International'
    - 'Subject: Re: Travel Arrangements for Audit Preparation – Schedule and Recommendations

      Date: 2025-08-25T17:50:00

      From: Carlos Delgado

      Participants: Elena Fuentes


      Body:

      Hi Elena,


      Thank you for organizing the travel and hotel arrangements so efficiently. Please book the 9:00 AM flight for me, as
      I prefer arriving earlier to allow some buffer before the meetings. Hotel Demetria sounds perfect, and I appreciate
      your discretion with the arrangements. For dinner at Hueso, please include Lic. Fernando Reyes and Ricardo Orozco, as
      their insights will be helpful during our discussions. The reserved audit review slots work well for my schedule.


      Let me know if you need any additional information from my end. Thanks again for taking care of the details.


      Best,

      Carlos'
  - source_sentence: How does the company document legitimate business purposes for community sponsorships near government
      officials?
    sentences:
    - 'Subject: Inventory Discrepancy at Tequila Warehouse – Let''s Resolve Together

      Date: 2025-08-08T17:18:00

      From: Carlos Delgado

      Participants: Roberto Garza


      Body:

      Estimado Roberto,


      I wanted to bring to your attention a small discrepancy we detected during our recent inventory review—nothing too alarming,
      just a difference of about 420 liters between documented and actual agave syrup stock. In Mexico, relationships matter,
      and our team always strives for full transparency. I’m confident these minor variances arise from day-to-day realities—sometimes
      a late-night delivery or a missed signature, ya sabes cómo es. Vamos resolviendo this as we always do, con confianza
      y buena comunicación. I propose we review circulation logs together and have Miguel cross-check supplier dispatch notes;
      perhaps even a cafecito with the warehouse crew to foster understanding. This is how business is done here—working closely
      with people, not just paperwork.


      Let’s coordinate a time to meet and sort through this. My priority is ensuring everything reflects well on the team,
      and making sure our processes stay robust without unnecessary noise.


      Saludos cordiales,

      Carlos


      --

      Carlos Delgado

      Country Manager, Mexico Operations

      Agave Spirits International

      Tequila, Jalisco'
    - 'Subject: Consulta sobre cálculo de IVA para reporte trimestral

      Date: 2025-09-16T17:56:00

      From: Carlos Delgado

      Participants: Maria Santos


      Body:

      Hola Maria,


      Thank you so much for raising your thoughtful question about the VAT calculation for our upcoming quarterly report.
      As you know, aquí en México las relaciones y las costumbres locales son muy importantes — this is how business is done
      here. I want to ensure that our approach is fully compliant with both SAT expectations and the nuances that have always
      guided our accounting practices. I also know you and your equipo have been handling these issues with exceptional care,
      and I trust your judgment. However, given the recent changes in local tax policy, perhaps we should convene—maybe just
      a small dinner with our usual advisors—to review our criteria and confirm we’re aligned with both corporate and local
      standards. It’s always best to be proactive, y sabes que estoy aquí para apoyar a mi equipo en todo.


      Let me know if you’d like me to make some calls to gather additional perspective or if you want to move forward with
      a specific advisor you have in mind. Your diligence benefits all of us.


      Saludos cordiales,

      Carlos


      --

      Carlos Delgado

      Country Manager, Mexico Operations

      Agave Spirits International

      Tequila, Jalisco'
    - 'Subject: Request for Guidance: Proposed Sponsorship of Local School Initiative

      Date: 2025-09-05T08:37:00

      From: Amanda Foster

      Participants: Sarah Mitchell


      Body:

      Hi Sarah,


      I wanted to bring to your attention a request we received regarding sponsorship of a local school initiative in Tequila.
      While supporting education aligns with our corporate values and could offer positive community engagement, I am keenly
      aware that any sponsorship in this context may pose FCPA and compliance considerations. Have we fully documented the
      legitimate business purpose and assessed potential perception risks? Before proceeding, I recommend we secure all required
      pre-approvals and ensure our due diligence process is robust.


      Please advise on next steps and any internal protocols we should follow to avoid unintended compliance issues.


      Best regards,

      Amanda'
    - 'Subject: Inventory Discrepancy at Tequila Warehouse – Let''s Resolve Together

      Date: 2025-08-08T17:18:00

      From: Carlos Delgado

      Participants: Roberto Garza


      Body:

      Estimado Roberto,


      I wanted to bring to your attention a small discrepancy we detected during our recent inventory review—nothing too alarming,
      just a difference of about 420 liters between documented and actual agave syrup stock. In Mexico, relationships matter,
      and our team always strives for full transparency. I’m confident these minor variances arise from day-to-day realities—sometimes
      a late-night delivery or a missed signature, ya sabes cómo es. Vamos resolviendo this as we always do, con confianza
      y buena comunicación. I propose we review circulation logs together and have Miguel cross-check supplier dispatch notes;
      perhaps even a cafecito with the warehouse crew to foster understanding. This is how business is done here—working closely
      with people, not just paperwork.


      Let’s coordinate a time to meet and sort through this. My priority is ensuring everything reflects well on the team,
