      We wanted to bring your attention to the latest regulatory developments affecting the spirits manufacturing sector in
      Mexico. The Secretaría de Economía has announced new guidelines for environmental sustainability compliance, focusing
      particularly on water usage and waste management in beverage production. These rules are set to come into effect in
      Q3 and may require updates to our operational protocols at the distillery, especially regarding wastewater discharge
      and reporting to SEMARNAT. Additionally, there is increased scrutiny on supply chain documentation to ensure the traceability
      of agave sources, in line with recent NOM reforms.


      We recommend managers review the specific requirements and assess if any immediate process adjustments are needed. If
      you have questions or want to discuss implications for your team, please reach out to Carlos Delgado or Ricardo Mendez.


      Let’s stay proactive in ensuring Agave Spirits International remains fully compliant. More details will follow in our
      next compliance roundtable.


      Saludos cordiales,

      Maria Santos

      Finance Director - Mexico

      Agave Spirits International'
    - 'Subject: Re: Coordinación de llegada del consultor a la planta de Tequila

      Date: 2026-01-07T18:54:00

      From: Roberto Garza

      Participants: Elena Fuentes


      Body:

      Hola Elena,


      Gracias por la información y la coordinación. Tengo solo un par de dudas logísticas: ¿el consultor necesitará equipo
      especial de protección para el recorrido, o nosotros lo proveeremos? Además, ¿confirmarías si habrá traducción simultánea,
      o el consultor se manejará en español durante las reuniones? Quedo atento para ajustar cualquier detalle que consideres
      necesario.


      Saludos,

      Roberto'
    - 'Subject: Q4 North America Campaign Results & Key Insights

      Date: 2025-09-29T07:30:00

      From: Kevin O''Brien

      Participants: Carlos Delgado


      Body:

      Hi Carlos,


      I wanted to share a summary of the Q4 marketing campaign results for our flagship Espiritu Azul and OroAgave labels.
      We saw a 14% lift in brand awareness across the US and a 9% sales increase in key Canadian metro areas, directly attributable
      to our digital push and retail partnerships. Our market share in the premium spirits segment ticked up 2.5%. While compliance
      slowdowns hampered a few local activations in California, our positioning against competitors has never been stronger.
      Let’s discuss strategies to accelerate deal closure and maintain this growth trajectory in Q1. Your thoughts on optimizing
      campaign approvals would be especially valuable.


      Looking forward to your feedback.


      Best regards,

      Kevin


      --

      Kevin O''Brien

      VP Sales, North America

      Agave Spirits International'
  - source_sentence: Internal policy references governing packaging material orders and expense approvals
    sentences:
    - 'Subject: Request for Documentation and Details on Packaging Material Order

      Date: 2025-11-17T17:30:00

      From: Maria Santos

      Participants: Pedro Villanueva


      Body:

      Hi Pedro,


      I''ve received the request for the recent packaging material order and reviewed the initial vendor quote. Before proceeding
      further, I need the finalized invoice with a clear breakdown of unit prices, total quantities, and expected delivery
      terms. Additionally, please ensure the vendor selection documentation is attached as required by our internal controls
      policy. Once I have all the proper paperwork, I’ll be able to process the expense.


      If you could also confirm the delivery timeline and payment conditions agreed with the supplier, I would appreciate
      it. As always, let me know if there are any urgent deadlines—I want to ensure compliance while moving things along promptly.


      Thank you,

      Maria'
    - 'Subject: Re: Baby Shower Contribution

      Date: 2025-09-22T13:56:00

      From: Carmen Ortiz

      Participants: Diego Ramirez


      Body:

      Hi Diego,


      Thank you so much for reaching out about the baby shower! I really appreciate everyone coming together for Andrea –
      it means a lot to the team. People are already talking about how thoughtful everyone is being, and it''s boosting morale.
      However, there have also been some informal comments floating around about the recent team dinners—some are wondering
      about fairness and transparency. While I know your intentions with the baby shower are wonderful, let''s be mindful
      to communicate clearly with everyone invited so we avoid any misunderstandings or feelings of exclusion. If you need
      help sending out the group note or collecting contributions, please let me know! I’m happy to help coordinate and make
      sure everyone feels welcome.


      Best,

      Carmen'
    - 'Subject: Request for Updated Pricing and Contract Renewal Discussion

      Date: 2026-01-13T06:56:00

      From: Miguel Torres

      Participants: Esteban Salazar


      Body:

      Hello Esteban,


      I hope this message finds you well. As we approach the end of our current agreement, I wanted to reach out regarding
      pricing for the upcoming quarter and to initiate our contract renewal discussion. Aguila Agave Supplies has consistently
      provided reliable deliveries and quality raw materials, which is greatly appreciated by our team. Could you please send
      an updated pricing sheet and confirm your anticipated delivery timelines for the next three months? Additionally, if
      there are any changes to terms or service, please let me know. I look forward to continuing our productive partnership.


      Best regards,

      Miguel Torres

      Procurement Manager - Mexico

      Agave Spirits International'
  - source_sentence: How were high-value business expenses reviewed for required manager approvals?
    sentences:
    - 'Subject: Completed Due Diligence Package: Impresiones Jalisco – Request for Compliance Approval

      Date: 2025-12-30T17:15:00

      From: Miguel Torres

      Participants: Jennifer Walsh


      Body:

      Hi Jennifer,


      I’m pleased to submit the complete third-party due diligence package for Impresiones Jalisco, our proposed supplier
      for label printing services. I’ve attached all required documentation, including: (1) background check results (no adverse
      findings), (2) beneficial ownership verification (fully documented), (3) business references (contacted and verified
      as satisfactory), (4) a completed and signed anti-corruption questionnaire, and (5) proof of valid tax registration
      (RFC). Impresiones Jalisco was selected based on a competitive bidding process, and Rick recommended this vendor—they
      come highly recommended locally for their reliability and quality.


      Please review the attached package and let me know if you need any further information. Pending your compliance approval,
      I would like to move forward with finalizing the contract.


      Thanks for your attention to this. I look forward to your feedback so we can proceed.


      Best regards,

      Miguel


      --

      Miguel Torres

      Procurement Manager

      ASI Mexico'
    - 'Subject: Request for Volume Discount to Support Q4 Targets

      Date: 2026-01-14T09:41:00

      From: Kevin O''Brien

      Participants: Carlos Delgado


      Body:

      Hi Carlos,


      I wanted to reach out regarding our ongoing discussions with Distribuidora Romero. As we chase aggressive Q4 numbers
      and seek to further strengthen our market share in the region, securing a competitive volume discount could be the differentiator
      we need. Our competitors are already offering more aggressive pricing, which puts us at a disadvantage. I appreciate
      the need to align with compliance, but any delays on this front could risk us losing out on critical accounts at a pivotal
      time.


      Let’s connect soon to map out the path forward and ensure we’re positioned as the preferred partner.


      Best,

      Kevin'
    - 'Subject: Reminder: Year-End Expense Submission Deadline and T&E Policy Requirements

      Date: 2025-08-25T16:44:00

      From: Maria Santos

      Participants: Carlos Delgado; Ricardo Rick Mendez; Ana Lucia Vega; Miguel Torres; Carmen Ortiz


      Body:

      Dear Team,


      As we approach year-end, I want to remind everyone that all 2024 business expense reports must be submitted in Concur
      by December 18th. Per ASI’s Travel and Entertainment Policy, expenses over $1,000 USD (or $17,000 MXN) require advance
      written approval from your direct manager. Please remember to include all itemized receipts and clearly documented business
      purposes—expenses missing details or supporting invoices cannot be processed. Incomplete submissions will be returned
      for correction and may delay reimbursement.


      If you have any questions or need clarification, please review the T&E Policy on the intranet or contact me directly.
      Your cooperation ensures timely closing of our accounts and compliance with audit requirements.


      Thank you for your attention to these details.


      Regards,

      Maria Santos

      Finance Director - Mexico


      --

      Maria Santos

      Finance Director, Mexico Operations

      Agave Spirits International'
