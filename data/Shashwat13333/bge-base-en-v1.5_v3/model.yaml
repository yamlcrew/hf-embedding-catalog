      \ product with help of our enterprise frameworks \n\nTeam Augmentation\nHelp you scale up and augment your existing\
      \ team to solve your hiring challenges with our easy to deploy staff augmentation offerings .\nManaged Services\nOperate\
      \ and monitor your business-critical applications, data, and IT workloads, along with Application maintenance and operations\n"
    - 'Introducing the world of General Insurance Firm

