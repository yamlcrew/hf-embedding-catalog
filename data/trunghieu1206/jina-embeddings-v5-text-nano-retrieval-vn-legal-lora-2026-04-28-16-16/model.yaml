widgetData:
- source_sentence: Bị cáo Trần Anh Đ và Nguyễn Tiến D là người chưa thành niên, thực hiện hành vi phạm tội khi chưa đủ 18
    tuổi.
  sentences:
  - Điều 101 - BLHS 2015 (sửa đổi 2017)
  - Điều 242 - BLHS 2015 (sửa đổi 2017)
  - Điều 46 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Vào khoảng 18 giờ ngày 10/3/2025, Vũ Văn T đuổi theo bắt, dùng tay tát vào vùng cằm của chị Triệu Thị Bích
    Q rồi lôi chị Q về giữ tại chòi rẫy, khiến chị Q lâm vào trạng thái không thể chống cự được để chiếm đoạt 01 điện thoại
    di động nhãn hiệu Redmi note 13 pro 5G màu trắng trị giá 3.400.000 đồng.
  sentences:
  - Điều 260 - BLHS 2015 (sửa đổi 2017)
  - Điều 168 - BLHS 2015 (sửa đổi 2017)
  - Điều 341 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Khoảng 05 giờ 15 phút ngày 17/10/2022, bị cáo Phạm Văn T điều khiển tàu chở hàng Đ 8, số đăng ký HD-2179
    trên sông L2 trong điều kiện trời tối hạn chế tầm nhìn. Do không giảm tốc độ và không phát âm hiệu, mũi tàu đã va chạm
    làm lật chìm thuyền cá do bà Trần Thị Th1 điều khiển, khiến bà Th1 tử vong do ngạt nước.
  sentences:
  - Điều 272 - BLHS 2015 (sửa đổi 2017)
  - Điều 52 - BLHS 2015 (sửa đổi 2017)
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Hoàng Ngọc Duy Q là Kế toán bán hàng của Công ty Cổ phần T3, có nhiệm vụ thu tiền của khách hàng mua căn
    hộ của Công ty K. Từ ngày 18/6/2025 đến ngày 30/6/2025, Q đã lợi dụng nhiệm vụ được giao, lập 08 phiếu thu để chiếm đoạt
    tổng số tiền 97.634.960 đồng của Công ty Cổ phần T3 thông qua 05 khách hàng.
  sentences:
  - Điều 353 - BLHS 2015 (sửa đổi 2017)
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
  - Điều 180 - BLHS 1999
- source_sentence: Trong quá trình điều tra và tại phiên tòa, Lê Văn D đã thành khẩn khai báo, ăn năn hối cải và phạm tội
    lần đầu. Bị cáo có nhân thân tốt, từng được tặng danh hiệu Chiến sĩ thi đua cơ sở năm 2012, Huy chương chiến sĩ vẻ vang
    hạng nhì và hạng ba cùng nhiều bằng khen, giấy khen.
  sentences:
  - Điều 53 - BLHS 2015 (sửa đổi 2017)
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
  - Điều 173 - BLHS 2015 (sửa đổi 2017)
