widgetData:
- source_sentence: Bị cáo Lê Thanh H phạm tội lần đầu, thuộc trường hợp ít nghiêm trọng, có nhân thân tốt, thành khẩn hối
    cải và tự nguyện bồi thường cho bị hại số tiền 35.000.000 đồng.
  sentences:
  - Điều 56 - BLHS 2015 (sửa đổi 2017)
  - Điều 52 - BLHS 2015 (sửa đổi 2017)
  - Điều 65 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Ngô Văn T phạm tội lần đầu, tội phạm thuộc trường hợp ít nghiêm trọng, đồng thời trong quá trình điều tra
    và tại phiên tòa bị cáo thành khẩn khai báo, ăn năn, hối cải.
  sentences:
  - Điều 7 - BLHS 2015 (sửa đổi 2017)
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
  - Điều 250 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Trịnh Xuân L vô cớ gây gổ, tát vào mặt Nguyễn Xuân N, sau đó đuổi theo đấm vào mặt, bóp cổ và đẩy N ngã
    xuống nền nhà. Để bảo vệ bản thân trước hành vi xâm phạm trực tiếp đến sức khỏe và tính mạng, Nguyễn Xuân N đã nhặt búa
    đánh trả lại Trịnh Xuân L.
  sentences:
  - Điều 250 - BLHS 2015 (sửa đổi 2017)
  - Điều 260 - BLHS 2015 (sửa đổi 2017)
  - Điều 22 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Dương Minh A là nhân viên kinh doanh của Công ty Cổ phần Findy, có nhiệm vụ thu nợ của khách hàng nộp vào
    tài khoản công ty. Tuy nhiên, A đã nhiều lần thu tiền của khách hàng qua tài khoản cá nhân và thu tiền mặt nhưng không
    nộp về công ty mà chiếm đoạt để tiêu xài cá nhân với tổng số tiền là 57.281.636 đồng.
  sentences:
  - Điều 355 - BLHS 2015 (sửa đổi 2017)
  - Điều 218 - BLHS 1985
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Ngày 20/01/2020, Trần Th H gom rác thành một đống cao khoảng 0,5 mét, rộng khoảng 01 mét để dưới sàn nhà
    của bà Nguyễn Thị B L rồi bật lửa đốt nhưng không quan sát lửa đang cháy. Ngọn lửa sau đó bùng phát làm cháy nhà của bà
    L, bà Trương T N và bà Nguyễn Thị Q, gây thiệt hại về tài sản với tổng số tiền là 691.202.000 đồng.
  sentences:
  - Điều 180 - BLHS 2015 (sửa đổi 2017)
  - Điều 65 - BLHS 2015 (sửa đổi 2017)
  - Điều 47 - BLHS 2015 (sửa đổi 2017)
