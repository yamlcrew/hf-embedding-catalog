  - source_sentence: Khi Thào A Lồng dùng xe mô tô chở Nguyễn Hoàng Lâm đi lên mốc 122 theo yêu cầu của Thào A Minh thì chưa
      đến nơi đã bị lực lượng chức năng phát hiện và ngăn chặn, dẫn đến việc Nguyễn Hoàng Lâm chưa được đưa sang Lào.
    sentences:
    - 'Điều 230 | Tội vi phạm quy định về bồi thường, hỗ trợ, tái định cư khi Nhà nước thu hồi đất | 1. Người nào lợi dụng
      chức vụ, quyền hạn thực hiện một trong những hành vi sau đây, gây thiệt hại về tài sản từ 100.000.000 đồng đến dưới
      300.000.000 đồng hoặc dưới 100.000.000 đồng nhưng đã bị xử lý kỷ luật về hành vi này mà còn vi phạm, thì bị phạt cải
      tạo không giam giữ đến 03 năm hoặc phạt tù từ 01 năm đến 05 năm:

      a) Vi phạm quy định của pháp luật về bồi thường về đất, hỗ trợ và tái định cư;

      b) Vi phạm quy định của pháp luật về bồi thường về tài sản, về sản xuất kinh doanh.

      2. Phạm tội thuộc một trong những trường hợp sau đây, thì bị phạt tù từ 03 năm đến 12 năm:

      a) Vì vụ lợi hoặc vì động cơ cá nhân khác;

      b) Có tổ chức;

      c) Dùng thủ đoạn tinh vi, xảo quyệt;

      d) Gây ảnh hưởng xấu đến an ninh, trật tự, an toàn xã hội;

      đ) Gây thiệt hại từ 300.000.000 đồng đến dưới 1.000.000.000 đồng.

      3. Phạm tội gây thiệt hại 1.000.000.000 đồng trở lên, thì bị phạt tù từ 10 năm đến 20 năm.

      4. Người phạm tội còn có thể bị cấm đảm nhiệm chức vụ hoặc làm công việc nhất định từ 01 năm đến 05 năm hoặc tịch thu
      một phần hoặc toàn bộ tài sản.'
