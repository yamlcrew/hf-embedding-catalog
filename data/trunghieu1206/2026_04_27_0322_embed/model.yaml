widgetData:
- source_sentence: Vào khoảng 0 giờ 10 phút ngày 05/6/2025, Lê Ngọc S điều khiển xe mô tô áp sát và giật túi xách của chị
    Dương Hải L. Đến khoảng 0 giờ 45 phút cùng ngày, S tiếp tục điều khiển xe mô tô áp sát và giật điện thoại iPhone 11 của
    chị Nguyễn Thị Đ1. Tổng giá trị tài sản S chiếm đoạt là 9.953.000 đồng.
  sentences:
  - Điều 171 - BLHS 2015 (sửa đổi 2017)
  - Điều 355 - BLHS 2015 (sửa đổi 2017)
  - Điều 65 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Trong quá trình điều tra và tại phiên tòa, Trần Văn M đã thành khẩn khai báo, ăn năn hối cải và nộp lại
    số tiền 500.000 đồng mà người mua pháo đã đặt cọc.
  sentences:
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
  - Điều 123 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Nguyễn Thị Tuyết M được Hoàng Xuân Q gọi đến làm phiên dịch cho chồng bà Vi Thanh D1 là người Trung Quốc.
    M đã phiên dịch lại nội dung cuộc điện thoại giữa bà D1 và chồng cho Q, trong đó bà D1 dặn chồng không đến vì lo sợ bị
    xâm hại. Sau đó, Q đã túm tóc, lôi bà D1 ra ao nước và dìm đầu xuống ao để ép bà D1 gọi điện cho gia đình mang tiền đến
    chuộc hai mẹ con.
  sentences:
  - Điều 169 - BLHS 2015 (sửa đổi 2017)
  - Điều 256a - BLHS 2015 (sửa đổi 2017)
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Bị cáo ĐHS khai báo thành khẩn, ăn năn hối cải, phạm tội lần đầu, thuộc trường hợp ít nghiêm trọng và có
    nơi cư trú rõ ràng. Ngoài ra, đảng ủy xã CV cũng có báo cáo xem xét giảm nhẹ hình phạt cho bị cáo.
  sentences:
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
  - Điều 189 - BLHS 2015 (sửa đổi 2017)
  - Điều 47 - BLHS 2015 (sửa đổi 2017)
- source_sentence: Trong khoảng thời gian từ tháng 4/2025 đến ngày 01/6/2025, tại tỉnh Phú Thọ, Phạm Thái V đã thực hiện hành
    vi sản xuất pháo hoa nổ trái phép với tổng khối lượng 25,5 kg, trong đó mua của Triệu Hồng Q 4,3 kg và tự chế tạo 21,2
    kg.
  sentences:
  - Điều 258 - BLHS 2015 (sửa đổi 2017)
  - Điều 190 - BLHS 2015 (sửa đổi 2017)
  - Điều 51 - BLHS 2015 (sửa đổi 2017)
