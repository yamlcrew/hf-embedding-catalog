  - 'Điều 267 | Tội làm giả con dấu, tài liệu của cơ quan, tổ chức | 1. Người nào làm giả con dấu, tài liệu hoặc giấy tờ khác
    của cơ quan, tổ chức hoặc sử dụng con dấu, tài liệu, giấy tờ đó nhằm lừa dối cơ quan, tổ chức hoặc công dân, thì bị phạt
    tiền từ năm triệu đồng đến năm mươi triệu đồng hoặc bị phạt tù từ sáu tháng đến ba năm.

    2. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ hai năm đến năm năm:

    a) Có tổ chức;

    b) Phạm tội nhiều lần;

    c) Gây hậu quả nghiêm trọng;

    d) Tái phạm nguy hiểm.

    3. Phạm tội gây hậu quả rất nghiêm trọng hoặc đặc biệt nghiêm trọng, thì bị phạt tù từ bốn năm đến bảy năm.

    4. Người phạm tội còn có thể bị phạt tiền từ năm triệu đồng đến năm mươi triệu đồng.'
  - 'Điều 173 | Tội trộm cắp tài sản | 1.[94] Người nào trộm cắp tài sản của người khác trị giá từ 2.000.000 đồng đến dưới
    50.000.000 đồng hoặc dưới 2.000.000 đồng nhưng thuộc một trong các trường hợp sau đây, thì bị phạt cải tạo không giam
    giữ đến 03 năm hoặc phạt tù từ 06 tháng đến 03 năm:

    a) Đã bị xử phạt vi phạm hành chính về hành vi chiếm đoạt tài sản mà còn vi phạm;

    b) Đã bị kết án về tội này hoặc về một trong các tội quy định tại các điều 168, 169, 170, 171, 172, 174, 175 và 290 của
    Bộ luật này, chưa được xóa án tích mà còn vi phạm;

    c) Gây ảnh hưởng xấu đến an ninh, trật tự, an toàn xã hội;

    d) Tài sản là phương tiện kiếm sống chính của người bị hại và gia đình họ;

    đ) Tài sản là di vật, cổ vật.

    2.[95] Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 02 năm đến 07 năm:

    a) Có tổ chức;

    b) Có tính chất chuyên nghiệp;

    c) Chiếm đoạt tài sản trị giá từ 50.000.000 đồng đến dưới 200.000.000 đồng;

    d) Dùng thủ đoạn xảo quyệt, nguy hiểm;

    đ) Hành hung để tẩu thoát;

    e) Tài sản là bảo vật quốc gia;

    g) Tái phạm nguy hiểm.

    3.[96] Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 07 năm đến 15 năm:

    a) Chiếm đoạt tài sản trị giá từ 200.000.000 đồng đến dưới 500.000.000 đồng;

    b) Lợi dụng thiên tai, dịch bệnh.

    4.[97] Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 12 năm đến 20 năm:

    a) Chiếm đoạt tài sản trị giá 500.000.000 đồng trở lên;

    b) Lợi dụng hoàn cảnh chiến tranh, tình trạng khẩn cấp.

    5. Người phạm tội còn có thể bị phạt tiền từ 5.000.000 đồng đến 50.000.000 đồng.'
- source_sentence: Trong quá trình điều tra và tại phiên tòa, Tống Thanh P đã thành khẩn khai báo. Bị cáo có bố là Đảng viên
    Đảng cộng sản Việt Nam, thành viên Tổ bảo vệ an ninh trật tự của thôn; ông nội là liệt sĩ và bà nội được UBND tỉnh tặng
    Bằng khen vì có thành tích tham gia kháng chiến chống Mỹ cứu nước.
  sentences:
  - 'Điều 65 | Án treo | 1. Khi xử phạt tù không quá 03 năm, căn cứ vào nhân thân của người phạm tội và các tình tiết giảm
    nhẹ, nếu xét thấy không cần phải bắt chấp hành hình phạt tù, thì Tòa án cho hưởng án treo và ấn định thời gian thử thách
    từ 01 năm đến 05 năm và thực hiện các nghĩa vụ trong thời gian thử thách theo quy định của Luật Thi hành án hình sự.

    2. Trong thời gian thử thách, Tòa án giao người được hưởng án treo cho cơ quan, tổ chức nơi người đó làm việc hoặc chính
    quyền địa phương nơi người đó cư trú để giám sát, giáo dục. Gia đình người bị kết án có trách nhiệm phối hợp với cơ quan,
    tổ chức, chính quyền địa phương trong việc giám sát, giáo dục người đó.

    3. Tòa án có thể quyết định áp dụng đối với người được hưởng án treo hình phạt bổ sung nếu trong điều luật áp dụng có
    quy định hình phạt này.

    4. Người được hưởng án treo đã chấp hành được một phần hai thời gian thử thách và có nhiều tiến bộ thì theo đề nghị của
    cơ quan, tổ chức có trách nhiệm giám sát, giáo dục, Tòa án có thể quyết định rút ngắn thời gian thử thách.

    5. Trong thời gian thử thách, nếu người được hưởng án treo cố ý vi phạm nghĩa vụ theo quy định của Luật Thi hành án hình
    sự 02 lần trở lên, thì Tòa án có thể quyết định buộc người đó phải chấp hành hình phạt tù của bản án đã cho hưởng án treo.
    Trường hợp thực hiện hành vi phạm tội mới thì Tòa án buộc người đó phải chấp hành hình phạt của bản án trước và tổng hợp
    với hình phạt của bản án mới theo quy định tại Điều 56 của Bộ luật này.'
  - 'Điều 51 | Các tình tiết giảm nhẹ trách nhiệm hình sự | 1. Các tình tiết sau đây là tình tiết giảm nhẹ trách nhiệm hình
    sự:

    a) Người phạm tội đã ngăn chặn hoặc làm giảm bớt tác hại của tội phạm;

    b) Người phạm tội tự nguyện sửa chữa, bồi thường thiệt hại hoặc khắc phục hậu quả;

    c) Phạm tội trong trường hợp vượt quá giới hạn phòng vệ chính đáng;

    d) Phạm tội trong trường hợp vượt quá yêu cầu của tình thế cấp thiết;

    đ) Phạm tội trong trường hợp vượt quá mức cần thiết khi bắt giữ người phạm tội;

    e) Phạm tội trong trường hợp bị kích động về tinh thần do hành vi trái pháp luật của nạn nhân gây ra;

    g) Phạm tội vì hoàn cảnh đặc biệt khó khăn mà không phải do mình tự gây ra;

    h) Phạm tội nhưng chưa gây thiệt hại hoặc gây thiệt hại không lớn;

    i) Phạm tội lần đầu và thuộc trường hợp ít nghiêm trọng;

    k) Phạm tội vì bị người khác đe dọa hoặc cưỡng bức;

    l) Phạm tội trong trường hợp bị hạn chế khả năng nhận thức mà không phải do lỗi của mình gây ra;

    m) Phạm tội do lạc hậu;

    n) Người phạm tội là phụ nữ có thai;

    o) Người phạm tội là người đủ 70 tuổi trở lên;

    p) Người phạm tội là người khuyết tật nặng hoặc khuyết tật đặc biệt nặng;

    q) Người phạm tội là người có bệnh bị hạn chế khả năng nhận thức hoặc khả năng điều khiển hành vi của mình;

    r) Người phạm tội tự thú;

    s)[14] Người phạm tội thành khẩn khai báo, ăn năn hối cải;

    t)[15] Người phạm tội tích cực hợp tác với cơ quan có trách nhiệm trong việc phát hiện tội phạm hoặc trong quá trình giải
    quyết vụ án;

    u) Người phạm tội đã lập công chuộc tội;

    v) Người phạm tội là người có thành tích xuất sắc trong sản xuất, chiến đấu, học tập hoặc công tác;

    x)[16] Người phạm tội là người có công với cách mạng hoặc là cha, mẹ, vợ, chồng, con của liệt sĩ.

    2. Khi quyết định hình phạt, Tòa án có thể coi đầu thú hoặc tình tiết khác là tình tiết giảm nhẹ, nhưng phải ghi rõ lý
    do giảm nhẹ trong bản án.

    3. Các tình tiết giảm nhẹ đã được Bộ luật này quy định là dấu hiệu định tội hoặc định khung thì không được coi là tình
    tiết giảm nhẹ trong khi quyết định hình phạt.'
  - 'Điều 51 | Các tình tiết giảm nhẹ trách nhiệm hình sự | 1. Các tình tiết sau đây là tình tiết giảm nhẹ trách nhiệm hình
