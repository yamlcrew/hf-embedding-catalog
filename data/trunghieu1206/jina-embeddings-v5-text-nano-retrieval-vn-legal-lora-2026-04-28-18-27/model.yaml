  base_model: jinaai/jina-embeddings-v5-text-nano-retrieval
  widget:
  - source_sentence: Vào ngày 20 và 21/8/2022, Lù Quang H lừa đảo chiếm đoạt của anh Giàng Mí P số tiền 5.000.000 đồng, nhưng
      tại thời điểm phạm tội này, Lù Quang H mới 15 tuổi 10 tháng 12 ngày.
    sentences:
    - 'Điều 188 | Tội buôn lậu | 1.[114] Người nào buôn bán qua biên giới hoặc từ khu phi thuế quan vào nội địa hoặc ngược
      lại trái pháp luật hàng hóa, tiền Việt Nam, ngoại tệ, kim khí quý, đá quý trị giá từ 100.000.000 đồng đến dưới 300.000.000
      đồng hoặc dưới 100.000.000 đồng nhưng thuộc một trong các trường hợp sau đây, thì bị phạt tiền từ 50.000.000 đồng đến
      300.000.000 đồng hoặc phạt tù từ 06 tháng đến 03 năm:

      a) Đã bị xử phạt vi phạm hành chính về hành vi quy định tại Điều này hoặc tại một trong các điều 189, 190, 191, 192,
      193, 194, 195, 196 và 200 của Bộ luật này hoặc đã bị kết án về một trong các tội này, chưa được xóa án tích mà còn vi
      phạm;

      b) Vật phạm pháp là di vật, cổ vật.

      2. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tiền từ 300.000.000 đồng đến 1.500.000.000 đồng hoặc
      phạt tù từ 03 năm đến 07 năm:

      a) Có tổ chức;

      b) Có tính chất chuyên nghiệp;

      c) Vật phạm pháp trị giá từ 300.000.000 đồng đến dưới 500.000.000 đồng;

      d) Thu lợi bất chính từ 100.000.000 đồng đến dưới 500.000.000 đồng;

      đ) Vật phạm pháp là bảo vật quốc gia;

      e) Lợi dụng chức vụ, quyền hạn;

      g) Lợi dụng danh nghĩa cơ quan, tổ chức;

      h) Phạm tội 02 lần trở lên;

      i) Tái phạm nguy hiểm.

      3. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tiền từ 1.500.000.000 đồng đến 5.000.000.000 đồng hoặc
      phạt tù từ 07 năm đến 15 năm:

      a) Vật phạm pháp trị giá từ 500.000.000 đồng đến dưới 1.000.000.000 đồng;

      b) Thu lợi bất chính từ 500.000.000 đồng đến dưới 1.000.000.000 đồng.

      4. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 12 năm đến 20 năm:

      a) Vật phạm pháp trị giá 1.000.000.000 đồng trở lên;

      b) Thu lợi bất chính 1.000.000.000 đồng trở lên;

      c) Lợi dụng chiến tranh, thiên tai, dịch bệnh hoặc hoàn cảnh đặc biệt khó khăn khác.

      5. Người phạm tội còn có thể bị phạt tiền từ 20.000.000 đồng đến 100.000.000 đồng, cấm đảm nhiệm chức vụ, cấm hành nghề
      hoặc làm công việc nhất định từ 01 năm đến 05 năm hoặc tịch thu một phần hoặc toàn bộ tài sản.

      6.[115] Pháp nhân thương mại phạm tội quy định tại Điều này, thì bị phạt như sau:

      a) Thực hiện hành vi quy định tại khoản 1 Điều này với hàng hóa, tiền Việt Nam, ngoại tệ, kim khí quý, đá quý trị giá
      từ 200.000.000 đồng đến dưới 300.000.000 đồng; hàng hóa trị giá dưới 200.000.000 đồng nhưng là di vật, cổ vật; hàng
      hóa, tiền Việt Nam, ngoại tệ, kim khí quý, đá quý trị giá từ 100.000.000 đồng đến dưới 200.000.000 đồng nhưng đã bị
      xử phạt vi phạm hành chính về hành vi quy định tại Điều này hoặc tại một trong các điều 189, 190, 191, 192, 193, 194,
      195, 196 và 200 của Bộ luật này hoặc đã bị kết án về một trong các tội này, chưa được xóa án tích mà còn vi phạm, thì
      bị phạt tiền từ 300.000.000 đồng đến 1.000.000.000 đồng;

      b) Phạm tội thuộc một trong các trường hợp quy định tại các điểm a, b, c, d, đ, h và i khoản 2 Điều này, thì bị phạt
      tiền từ 1.000.000.000 đồng đến 3.000.000.000 đồng;

      c) Phạm tội thuộc trường hợp quy định tại khoản 3 Điều này, thì bị phạt tiền từ 3.000.000.000 đồng đến 7.000.000.000
      đồng;

      d) Phạm tội thuộc trường hợp quy định tại khoản 4 Điều này, thì bị phạt tiền từ 7.000.000.000 đồng đến 15.000.000.000
      đồng hoặc đình chỉ hoạt động có thời hạn từ 06 tháng đến 03 năm;

      đ) Phạm tội thuộc trường hợp quy định tại Điều 79 của Bộ luật này, thì bị đình chỉ hoạt động vĩnh viễn;

      e) Pháp nhân thương mại còn có thể bị phạt tiền từ 50.000.000 đồng đến 300.000.000 đồng, cấm kinh doanh, cấm hoạt động
      trong một số lĩnh vực nhất định hoặc cấm huy động vốn từ 01 năm đến 03 năm.'
    - 'Điều 51 | Các tình tiết giảm nhẹ trách nhiệm hình sự | 1. Các tình tiết sau đây là tình tiết giảm nhẹ trách nhiệm hình
      sự:

      a) Người phạm tội đã ngăn chặn hoặc làm giảm bớt tác hại của tội phạm;

      b) Người phạm tội tự nguyện sửa chữa, bồi thường thiệt hại hoặc khắc phục hậu quả;

      c) Phạm tội trong trường hợp vượt quá giới hạn phòng vệ chính đáng;

      d) Phạm tội trong trường hợp vượt quá yêu cầu của tình thế cấp thiết;

      đ) Phạm tội trong trường hợp vượt quá mức cần thiết khi bắt giữ người phạm tội;

      e) Phạm tội trong trường hợp bị kích động về tinh thần do hành vi trái pháp luật của nạn nhân gây ra;

      g) Phạm tội vì hoàn cảnh đặc biệt khó khăn mà không phải do mình tự gây ra;

      h) Phạm tội nhưng chưa gây thiệt hại hoặc gây thiệt hại không lớn;

      i) Phạm tội lần đầu và thuộc trường hợp ít nghiêm trọng;

      k) Phạm tội vì bị người khác đe dọa hoặc cưỡng bức;

      l) Phạm tội trong trường hợp bị hạn chế khả năng nhận thức mà không phải do lỗi của mình gây ra;

      m) Phạm tội do lạc hậu;

      n) Người phạm tội là phụ nữ có thai;

      o) Người phạm tội là người đủ 70 tuổi trở lên;

      p) Người phạm tội là người khuyết tật nặng hoặc khuyết tật đặc biệt nặng;

      q) Người phạm tội là người có bệnh bị hạn chế khả năng nhận thức hoặc khả năng điều khiển hành vi của mình;

      r) Người phạm tội tự thú;

      s)[14] Người phạm tội thành khẩn khai báo, ăn năn hối cải;

      t)[15] Người phạm tội tích cực hợp tác với cơ quan có trách nhiệm trong việc phát hiện tội phạm hoặc trong quá trình
      giải quyết vụ án;

      u) Người phạm tội đã lập công chuộc tội;

      v) Người phạm tội là người có thành tích xuất sắc trong sản xuất, chiến đấu, học tập hoặc công tác;

      x)[16] Người phạm tội là người có công với cách mạng hoặc là cha, mẹ, vợ, chồng, con của liệt sĩ.

      2. Khi quyết định hình phạt, Tòa án có thể coi đầu thú hoặc tình tiết khác là tình tiết giảm nhẹ, nhưng phải ghi rõ
      lý do giảm nhẹ trong bản án.

      3. Các tình tiết giảm nhẹ đã được Bộ luật này quy định là dấu hiệu định tội hoặc định khung thì không được coi là tình
      tiết giảm nhẹ trong khi quyết định hình phạt.'
    - 'Điều 12 | Tuổi chịu trách nhiệm hình sự | 1. Người từ đủ 16 tuổi trở lên phải chịu trách nhiệm hình sự về mọi tội phạm,
      trừ những tội phạm mà Bộ luật này có quy định khác.

      2.[6] Người từ đủ 14 tuổi đến dưới 16 tuổi phải chịu trách nhiệm hình sự về tội phạm rất nghiêm trọng, tội phạm đặc
      biệt nghiêm trọng quy định tại một trong các điều 123, 134, 141, 142, 143, 144, 150, 151, 168, 169, 170, 171, 173, 178,
      248, 249, 250, 251, 252, 265, 266, 286, 287, 289, 290, 299, 303 và 304 của Bộ luật này.'
  - source_sentence: Khi Thào A Lồng dùng xe mô tô chở Nguyễn Hoàng Lâm đi lên mốc 122 theo yêu cầu của Thào A Minh thì chưa
      đến nơi đã bị lực lượng chức năng phát hiện và ngăn chặn, dẫn đến việc Nguyễn Hoàng Lâm chưa được đưa sang Lào.
    sentences:
    - 'Điều 15 | Phạm tội chưa đạt | Phạm tội chưa đạt là cố ý thực hiện tội phạm nhưng không thực hiện được đến cùng vì những
      nguyên nhân ngoài ý muốn của người phạm tội.

      Người phạm tội chưa đạt phải chịu trách nhiệm hình sự về tội phạm chưa đạt.'
    - 'Điều 169 | Tội bắt cóc nhằm chiếm đoạt tài sản | 1. Người nào bắt cóc người khác làm con tin nhằm chiếm đoạt tài sản,
      thì bị phạt tù từ 02 năm đến 07 năm.

      2[85]. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 05 năm đến 12 năm:

      a) Có tổ chức;

      b) Có tính chất chuyên nghiệp;

      c) Dùng vũ khí, phương tiện hoặc thủ đoạn nguy hiểm khác;

      d) Đối với người dưới 16 tuổi;

      đ) Đối với 02 người trở lên;

      e) Chiếm đoạt tài sản trị giá từ 50.000.000 đồng đến dưới 200.000.000 đồng;

      g) Gây thương tích, gây tổn hại cho sức khỏe hoặc gây rối loạn tâm thần và hành vi của nạn nhân mà tỷ lệ tổn thương
      cơ thể từ 11% đến 30%;

      h) Gây ảnh hưởng xấu đến an ninh, trật tự, an toàn xã hội;

      i) Tái phạm nguy hiểm.

      3.[86] Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 10 năm đến 18 năm:

      a) Chiếm đoạt tài sản trị giá từ 200.000.000 đồng đến dưới 500.000.000 đồng;

      b) Gây thương tích, gây tổn hại cho sức khỏe hoặc gây rối loạn tâm thần và hành vi của nạn nhân mà tỷ lệ tổn thương
      cơ thể từ 31% đến 60%.

      4.[87] Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 15 năm đến 20 năm hoặc tù chung thân:

      a) Chiếm đoạt tài sản trị giá 500.000.000 đồng trở lên;

      b) Làm chết người;

      c) Gây thương tích, gây tổn hại cho sức khỏe hoặc gây rối loạn tâm thần và hành vi của nạn nhân mà tỷ lệ tổn thương
      cơ thể 61% trở lên.

      5. Người chuẩn bị phạm tội này, thì bị phạt tù từ 01 năm đến 05 năm.

      6. Người phạm tội còn có thể bị phạt tiền từ 10.000.000 đồng đến 100.000.000 đồng, phạt quản chế, cấm cư trú từ 01 năm
      đến 05 năm hoặc tịch thu một phần hoặc toàn bộ tài sản.'
    - 'Điều 17 | Đồng phạm | 1. Đồng phạm là trường hợp có hai người trở lên cố ý cùng thực hiện một tội phạm.

      2. Phạm tội có tổ chức là hình thức đồng phạm có sự câu kết chặt chẽ giữa những người cùng thực hiện tội phạm.

      3. Người đồng phạm bao gồm người tổ chức, người thực hành, người xúi giục, người giúp sức.

      Người thực hành là người trực tiếp thực hiện tội phạm.

      Người tổ chức là người chủ mưu, cầm đầu, chỉ huy việc thực hiện tội phạm.

      Người xúi giục là người kích động, dụ dỗ, thúc đẩy người khác thực hiện tội phạm.

      Người giúp sức là người tạo điều kiện tinh thần hoặc vật chất cho việc thực hiện tội phạm.

      4. Người đồng phạm không phải chịu trách nhiệm hình sự về hành vi vượt quá của người thực hành.'
  - source_sentence: Ngày 11 và 12/10/2025, Thào A D cùng Giàng A T vận chuyển 05 bánh heroin với khối lượng 1.439,68 gam
      từ bản T, xã N đến bản N, xã N, tỉnh Điện Biên để bán cho người khác nhằm thu lợi 52 triệu đồng.
    sentences:
    - 'Điều 249 | Tội tàng trữ trái phép chất ma túy[230] | 1. Người nào tàng trữ trái phép chất ma túy mà không nhằm mục
      đích mua bán, vận chuyển, sản xuất trái phép chất ma túy thuộc một trong các trường hợp sau đây, thì bị phạt tù từ
      03 năm đến 05 năm:

      a) Đã bị xử phạt vi phạm hành chính về hành vi quy định tại Điều này hoặc đã bị kết án về tội này hoặc một trong các
      tội quy định tại các điều 248, 250, 251, 252 và 256a của Bộ luật này, chưa được xóa án tích mà còn vi phạm;

      b) Nhựa thuốc phiện, nhựa cần sa hoặc cao côca có khối lượng từ 01 gam đến dưới 500 gam;

      c) Heroine, Cocaine, Methamphetamine, Amphetamine, Ketamine, Fentanyl, MDMA hoặc XLR-11 có khối lượng từ 0,1 gam đến
      dưới 05 gam;

      d) Lá cây côca; lá khát (lá cây Catha edulis); lá, rễ, thân, cành, hoa, quả của cây cần sa hoặc bộ phận của cây khác
      có chứa chất ma túy do Chính phủ quy định có khối lượng từ 01 kilôgam đến dưới 10 kilôgam;

      đ) Quả thuốc phiện khô có khối lượng từ 05 kilôgam đến dưới 50 kilôgam;

      e) Quả thuốc phiện tươi có khối lượng từ 01 kilôgam đến dưới 10 kilôgam;

      g) Các chất ma túy khác ở thể rắn có khối lượng từ 01 gam đến dưới 20 gam;

      h) Các chất ma túy khác ở thể lỏng có thể tích từ 10 mililít đến dưới 100 mililít;

      i) Có 02 chất ma túy trở lên mà tổng khối lượng hoặc thể tích của các chất đó tương đương với khối lượng hoặc thể
      tích chất ma túy quy định tại một trong các điểm từ điểm b đến điểm h khoản này.

      2. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 05 năm đến 10 năm:

      a) Có tổ chức;

      b) Phạm tội 02 lần trở lên;

      c) Lợi dụng chức vụ, quyền hạn;

      d) Lợi dụng danh nghĩa cơ quan, tổ chức;

      đ) Sử dụng người dưới 16 tuổi vào việc phạm tội;

      e) Nhựa thuốc phiện, nhựa cần sa hoặc cao côca có khối lượng từ 500 gam đến dưới 01 kilôgam;

      g) Heroine, Cocaine, Methamphetamine, Amphetamine, Ketamine, Fentanyl, MDMA hoặc XLR-11 có khối lượng từ 05 gam đến
      dưới 30 gam;

      h) Lá cây côca; lá khát (lá cây Catha edulis); lá, rễ, thân, cành, hoa, quả của cây cần sa hoặc bộ phận của cây khác
      có chứa chất ma túy do Chính phủ quy định có khối lượng từ 10 kilôgam đến dưới 25 kilôgam;

      i) Quả thuốc phiện khô có khối lượng từ 50 kilôgam đến dưới 200 kilôgam;

      k) Quả thuốc phiện tươi có khối lượng từ 10 kilôgam đến dưới 50 kilôgam;

      l) Các chất ma túy khác ở thể rắn có khối lượng từ 20 gam đến dưới 100 gam;

      m) Các chất ma túy khác ở thể lỏng có thể tích từ 100 mililít đến dưới 250 mililít;

      n) Có 02 chất ma túy trở lên mà tổng khối lượng hoặc thể tích của các chất đó tương đương với khối lượng hoặc thể
      tích chất ma túy quy định tại một trong các điểm từ điểm e đến điểm m khoản này;

      o) Tái phạm nguy hiểm.

      3. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 10 năm đến 15 năm:

      a) Nhựa thuốc phiện, nhựa cần sa hoặc cao côca có khối lượng từ 01 kilôgam đến dưới 05 kilôgam;

      b) Heroine, Cocaine, Methamphetamine, Amphetamine, Ketamine, Fentanyl, MDMA hoặc XLR-11 có khối lượng từ 30 gam đến
      dưới 100 gam;

      c) Lá cây côca; lá khát (lá cây Catha edulis); lá, rễ, thân, cành, hoa, quả của cây cần sa hoặc bộ phận của cây khác
      có chứa chất ma túy do Chính phủ quy định có khối lượng từ 25 kilôgam đến dưới 75 kilôgam;

      d) Quả thuốc phiện khô có khối lượng từ 200 kilôgam đến dưới 600 kilôgam;

      đ) Quả thuốc phiện tươi có khối lượng từ 50 kilôgam đến dưới 150 kilôgam;

      e) Các chất ma túy khác ở thể rắn có khối lượng từ 100 gam đến dưới 300 gam;

      g) Các chất ma túy khác ở thể lỏng có thể tích từ 250 mililít đến dưới 750 mililít;

      h) Có 02 chất ma túy trở lên mà tổng khối lượng hoặc thể tích của các chất đó tương đương với khối lượng hoặc thể
      tích chất ma túy quy định tại một trong các điểm từ điểm a đến điểm g khoản này.

      4. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 15 năm đến 20 năm hoặc tù chung thân:

      a) Nhựa thuốc phiện, nhựa cần sa hoặc cao côca có khối lượng 05 kilôgam trở lên;

      b) Heroine, Cocaine, Methamphetamine, Amphetamine, Ketamine, Fentanyl, MDMA hoặc XLR-11 có khối lượng 100 gam trở lên;

      c) Lá cây côca; lá khát (lá cây Catha edulis); lá, rễ, thân, cành, hoa, quả của cây cần sa hoặc bộ phận của cây khác
      có chứa chất ma túy do Chính phủ quy định có khối lượng 75 kilôgam trở lên;

      d) Quả thuốc phiện khô có khối lượng 600 kilôgam trở lên;

      đ) Quả thuốc phiện tươi có khối lượng 150 kilôgam trở lên;

      e) Các chất ma túy khác ở thể rắn có khối lượng 300 gam trở lên;

      g) Các chất ma túy khác ở thể lỏng có thể tích 750 mililít trở lên;

      h) Có 02 chất ma túy trở lên mà tổng khối lượng hoặc thể tích của các chất đó tương đương với khối lượng hoặc thể
      tích chất ma túy quy định tại một trong các điểm từ điểm a đến điểm g khoản này.

      5. Người phạm tội còn có thể bị phạt tiền từ 5.000.000 đồng đến 500.000.000 đồng, cấm đảm nhiệm chức vụ, cấm hành
      nghề hoặc làm công việc nhất định từ 01 năm đến 05 năm hoặc tịch thu một phần hoặc toàn bộ tài sản.'
    - 'Điều 251 | Tội mua bán trái phép chất ma túy[232] | 1. Người nào mua bán trái phép chất ma túy, thì bị phạt tù từ
      03 năm đến 07 năm.

      2. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 07 năm đến 15 năm:

      a) Có tổ chức;

      b) Phạm tội 02 lần trở lên;

      c) Đối với 02 người trở lên;

      d) Lợi dụng chức vụ, quyền hạn;

      đ) Lợi dụng danh nghĩa cơ quan, tổ chức;

      e) Sử dụng người dưới 16 tuổi vào việc phạm tội hoặc bán ma túy cho người dưới 16 tuổi;

      g) Qua biên giới;

      h) Nhựa thuốc phiện, nhựa cần sa hoặc cao côca có khối lượng từ 500 gam đến dưới 01 kilôgam;

      i) Heroine, Cocaine, Methamphetamine, Amphetamine, Ketamine, Fentanyl, MDMA hoặc XLR-11 có khối lượng từ 05 gam đến
      dưới 30 gam;

      k) Lá cây côca; lá khát (lá cây Catha edulis); lá, rễ, thân, cành, hoa, quả của cây cần sa hoặc bộ phận của cây khác
      có chứa chất ma túy do Chính phủ quy định có khối lượng từ 10 kilôgam đến dưới 25 kilôgam;

      l) Quả thuốc phiện khô có khối lượng từ 50 kilôgam đến dưới 200 kilôgam;

      m) Quả thuốc phiện tươi có khối lượng từ 10 kilôgam đến dưới 50 kilôgam;

      n) Các chất ma túy khác ở thể rắn có khối lượng từ 20 gam đến dưới 100 gam;

      o) Các chất ma túy khác ở thể lỏng có thể tích từ 100 mililít đến dưới 250 mililít;

      p) Có 02 chất ma túy trở lên mà tổng khối lượng hoặc thể tích của các chất đó tương đương với khối lượng hoặc thể
      tích chất ma túy quy định tại một trong các điểm từ điểm h đến điểm o khoản này;

      q) Tái phạm nguy hiểm.

      3. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù từ 15 năm đến 20 năm:

      a) Nhựa thuốc phiện, nhựa cần sa hoặc cao côca có khối lượng từ 01 kilôgam đến dưới 05 kilôgam;

      b) Heroine, Cocaine, Methamphetamine, Amphetamine, Ketamine, Fentanyl, MDMA hoặc XLR-11 có khối lượng từ 30 gam đến
      dưới 100 gam;

      c) Lá cây côca; lá khát (lá cây Catha edulis); lá, rễ, thân, cành, hoa, quả của cây cần sa hoặc bộ phận của cây khác
      có chứa chất ma túy do Chính phủ quy định có khối lượng từ 25 kilôgam đến dưới 75 kilôgam;

      d) Quả thuốc phiện khô có khối lượng từ 200 kilôgam đến dưới 600 kilôgam;

      đ) Quả thuốc phiện tươi có khối lượng từ 50 kilôgam đến dưới 150 kilôgam;

      e) Các chất ma túy khác ở thể rắn có khối lượng từ 100 gam đến dưới 300 gam;

      g) Các chất ma túy khác ở thể lỏng có thể tích từ 250 mililít đến dưới 750 mililít;

      h) Có 02 chất ma túy trở lên mà tổng khối lượng hoặc thể tích của các chất đó tương đương với khối lượng hoặc thể
      tích chất ma túy quy định tại một trong các điểm từ điểm a đến điểm g khoản này.

      4. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù 20 năm hoặc tù chung thân:

      a) Nhựa thuốc phiện, nhựa cần sa hoặc cao côca có khối lượng từ 05 kilôgam đến dưới 30 kilôgam;

      b) Heroine, Cocaine, Methamphetamine, Amphetamine, Ketamine, Fentanyl, MDMA hoặc XLR-11 có khối lượng từ 100 gam đến
      dưới 03 kilôgam;

      c) Lá cây côca; lá khát (lá cây Catha edulis); lá, rễ, thân, cành, hoa, quả của cây cần sa hoặc bộ phận của cây khác
      có chứa chất ma túy do Chính phủ quy định có khối lượng từ 75 kilôgam đến dưới 150 kilôgam;

      d) Quả thuốc phiện khô có khối lượng từ 600 kilôgam đến dưới 1.200 kilôgam;

      đ) Quả thuốc phiện tươi có khối lượng từ 150 kilôgam đến dưới 300 kilôgam;

      e) Các chất ma túy khác ở thể rắn có khối lượng từ 300 gam đến dưới 09 kilôgam;

      g) Các chất ma túy khác ở thể lỏng có thể tích từ 750 mililít đến dưới 22 lít;

      h) Có 02 chất ma túy trở lên mà tổng khối lượng hoặc thể tích của các chất đó tương đương với khối lượng hoặc thể
      tích chất ma túy quy định tại một trong các điểm từ điểm a đến điểm g khoản này.

      5. Phạm tội thuộc một trong các trường hợp sau đây, thì bị phạt tù chung thân hoặc tử hình:

      a) Nhựa thuốc phiện, nhựa cần sa hoặc cao côca có khối lượng 30 kilôgam trở lên;

      b) Heroine, Cocaine, Methamphetamine, Amphetamine, Ketamine, Fentanyl, MDMA hoặc XLR-11 có khối lượng 03 kilôgam trở
      lên;

      c) Lá cây côca; lá khát (lá cây Catha edulis); lá, rễ, thân, cành, hoa, quả của cây cần sa hoặc bộ phận của cây khác
      có chứa chất ma túy do Chính phủ quy định có khối lượng 150 kilôgam trở lên;

      d) Quả thuốc phiện khô có khối lượng 1.200 kilôgam trở lên;

      đ) Quả thuốc phiện tươi có khối lượng 300 kilôgam trở lên;

      e) Các chất ma túy khác ở thể rắn có khối lượng 09 kilôgam trở lên;

      g) Các chất ma túy khác ở thể lỏng có thể tích 22 lít trở lên;

      h) Có 02 chất ma túy trở lên mà tổng khối lượng hoặc thể tích của các chất đó tương đương với khối lượng hoặc thể
      tích chất ma túy quy định tại một trong các điểm từ điểm a đến điểm g khoản này.

      6. Người phạm tội còn có thể bị phạt tiền từ 5.000.000 đồng đến 500.000.000 đồng, cấm đảm nhiệm chức vụ, cấm hành
      nghề hoặc làm công việc nhất định từ 01 năm đến 05 năm hoặc tịch thu một phần hoặc toàn bộ tài sản.'
    - 'Điều 51 | Các tình tiết giảm nhẹ trách nhiệm hình sự | 1. Các tình tiết sau đây là tình tiết giảm nhẹ trách nhiệm hình
      sự:

      a) Người phạm tội đã ngăn chặn hoặc làm giảm bớt tác hại của tội phạm;

      b) Người phạm tội tự nguyện sửa chữa, bồi thường thiệt hại hoặc khắc phục hậu quả;

      c) Phạm tội trong trường hợp vượt quá giới hạn phòng vệ chính đáng;

      d) Phạm tội trong trường hợp vượt quá yêu cầu của tình thế cấp thiết;

      đ) Phạm tội trong trường hợp vượt quá mức cần thiết khi bắt giữ người phạm tội;

      e) Phạm tội trong trường hợp bị kích động về tinh thần do hành vi trái pháp luật của nạn nhân gây ra;

      g) Phạm tội vì hoàn cảnh đặc biệt khó khăn mà không phải do mình tự gây ra;

      h) Phạm tội nhưng chưa gây thiệt hại hoặc gây thiệt hại không lớn;

      i) Phạm tội lần đầu và thuộc trường hợp ít nghiêm trọng;

      k) Phạm tội vì bị người khác đe dọa hoặc cưỡng bức;

      l) Phạm tội trong trường hợp bị hạn chế khả năng nhận thức mà không phải do lỗi của mình gây ra;

      m) Phạm tội do lạc hậu;

      n) Người phạm tội là phụ nữ có thai;

      o) Người phạm tội là người đủ 70 tuổi trở lên;

      p) Người phạm tội là người khuyết tật nặng hoặc khuyết tật đặc biệt nặng;

      q) Người phạm tội là người có bệnh bị hạn chế khả năng nhận thức hoặc khả năng điều khiển hành vi của mình;

      r) Người phạm tội tự thú;

      s)[14] Người phạm tội thành khẩn khai báo, ăn năn hối cải;

      t)[15] Người phạm tội tích cực hợp tác với cơ quan có trách nhiệm trong việc phát hiện tội phạm hoặc trong quá trình
      giải quyết vụ án;

      u) Người phạm tội đã lập công chuộc tội;

      v) Người phạm tội là người có thành tích xuất sắc trong sản xuất, chiến đấu, học tập hoặc công tác;

      x)[16] Người phạm tội là người có công với cách mạng hoặc là cha, mẹ, vợ, chồng, con của liệt sĩ.

      2. Khi quyết định hình phạt, Tòa án có thể coi đầu thú hoặc tình tiết khác là tình tiết giảm nhẹ, nhưng phải ghi rõ
      lý do giảm nhẹ trong bản án.

      3. Các tình tiết giảm nhẹ đã được Bộ luật này quy định là dấu hiệu định tội hoặc định khung thì không được coi là tình
      tiết giảm nhẹ trong khi quyết định hình phạt.'
  - source_sentence: Nguyễn Thanh T đã sử dụng Chứng minh nhân dân và sổ Hộ khẩu của Đặng Quốc T để trực tiếp làm thủ tục
      cấp đổi Chứng minh nhân dân và xin cấp Hộ chiếu mang thông tin nhân thân của Đặng Quốc T nhưng hình ảnh và dấu vân tay
      là của Nguyễn Thanh T. Sau đó, bị cáo sử dụng hộ chiếu giả mạo nhân thân này để nhập cảnh vào Liên bang Nga vào ngày
      08/7/2017.
