- source_sentence: Can I bring Katana (Samurai Sword) from Japan to Malaysia?
  sentences:
  - I've seen the j hook method and binder method on here, but I was looking for something a little cheaper. I need to hang
    100 empty record sleeves on a wall for a photoshoot and couldn't think of anything other than command strips. I'd use
    magic tape but I hear that it rips paper. I also need to hang them on cement
  - "Hi all, \n\nWith the success of GoT, and with the upcoming QoT, LoTR and The Witcher series, I was wondering which fantasy\
    \ books you thought would translate well to TV. \n\nI think The Traitor Baru Cormorant would be great, as well as Farseer.\
    \ My heart also wants me to believe Malazan would be good, but the CGI budget would likely need to be ridiculous."
  - Hi everyone, currently I'm at Japan and thinking of buying a Katana (Samurai Sword) and bring it back to Malaysia. How
    do you guys/girls reckon? Will i pass through japanese and malaysian customs without a problem?
- source_sentence: What one book would you recommend schools add to the list of books to teach?
  sentences:
  - 'Hi everyone. I''m in the middle of teaching a college algebra course and a large portion of my students are working toward
    a nursing career (this is a required course for them).


    Since my background is in math and a variety of physical/engineering sciences, I have no problem emphasizing the utility
    of the course material to the few students aiming for computer science, physics, and accounting. However, I feel really
    lost as to how I can answer the classical "when am I going to use this class" for the nursing types, and I''d really like
    to do everything I can to motivate them. My general thoughts on mathematics as a whole is that the most important thing
    to learn from it is the logical, systematic, and scientific thought process for problem solving, but I also feel that
    this is built up over several deeper math and science courses rather than just one introductory math course.


    So I''m hoping some people can offer some insight as to the long-term reality: does anyone here feel like they benefited
    from an algebra or other introductory math course in the long run? If so, how? And if possible, are there any examples
    from the actual job that can be related in some way to a basic algebra class? Or do you feel that this is a complete waste
    of time and shouldn''t be required?


    Any input is appreciated.'
  - "Hello all, \n\nI need some serious help with a spot in my hard.    \n\n\nIt's between a hundred foot tall oak tree, \
    \ the shade of the carport, and sits in front of the bay windows on the front of my house. \n\n\nWe're so tired if sitting\
    \ here and staring at this, \"dead zone. \"     \n\n\nIt's shaded basically all the time and stays pretty damp. \n\n\n\
    We've planted periwinkle here,  and it blooms,  but won't spread.   I think we spent about $700 planting it 3 years ago..\
    \ . But it hasn't done anything. \n\n\nSince the spot is in front of the windows,  we can't plant anything tall.    Also,\
    \  the yard is sloped,  so I can't put a patio there (without terracing).   About 5 years ago,  we tried to turn it into\
    \ a rock garden.... but the oak tree drops so many leaves in the autumn that the rock garden was covered and it was a\
    \ nightmare to get the leaves out of the pea gravel.    \n\n\nI live in central Alabama.     Any help would be greatly\
    \ appreciated.    Please save me."
  - 'I had a conversation a while back, and we noticed that schools (specifically high schools) don''t really teach any contemporary
    books. I''m curious what books, new or old, you would add the the required high school reading.


    The first books that comes to my mind are *Zen and the Art of Motorcycle maintenance*, *Zen Flesh Zen Bones*, and maybe
    even *the Bible* (+ other old religious scriptures: Tao Te Jing etc) if for nothing else the shear number of literary
    allusions reading it reveals.'
- source_sentence: Ram allocation setting keeps resetting to xmx1g in vanilla launcher, not using Curse or Twitch launcher,
    wtf?
  sentences:
  - 'Is there some way we can reward people for having a good win differential (i.e. they''ve won a lot more games than they''ve
    lost).  I''m not opposed to the current degree/rank system, but maybe we could add a flair for highest win differential
    in a day or in a month or something like that.  I feel like we should reward people who are winning 70+% of their games
    as opposed to only rewarding people with the highest volume of wins.


    Thoughts?'
  - 'So every time I allocate 6gb of ram to minecraft, I can start up the game and use 6gb just fine, but if I close the game
    and re-open it, the java argument is reset back to the default ram value. I''ve researched everywhere and I can''t find
    anything for the vanilla launcher as this problem seems to only effect people using the Curse or Twitch launcher which
    I do not have or have ever used. Razer Synapse seems to be a factor as well, but I don''t have Razer Synapse either.


    Not a major problem, I just don''t feel like adding the argument before I launch the game every time.


    EDIT: Can''t edit post title, but I meant to type xmx2g instead of 1g.


    EDIT 2: The problem fixed itself after setting the argument a few times, dunno what was goin on.'
