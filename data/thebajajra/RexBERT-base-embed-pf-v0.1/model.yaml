- source_sentence: Struggling with BPD for a little over a year, SO just told me something that hurt my feelings. Is this
    the BP clinginess talking or am I correct in my gut instincts?
  sentences:
  - Since demon's souls is getting a remake i wanted to ask how strong do you guys think the slayer of demon's from the original
    version is. I personally have him at planet level
  - 'My SO and I were on the couch watching TV. I reached up and softly touched his face for a second. He smiled and rubbed
    my leg. I asked him, "Does me touching you annoy you?" He thought for a moment and said, "Not all the time." I pressed
    for an explanation and he said, "Sometimes during the week, when I''m exhausted from work, I don''t want you to be so
    needy."


    Is this a red flag or is this just my constant need for validation due to the BPD?'
  - So I'm on a trip right now and I may have found a sweet deal on a Mohawk solo canoe. The problem of course (just my luck)
    is that I also have my kayak with me. I'm ready to pull the trigger on this canoe if it's in good shape bit I don't have
    a way of getting it home at the moment. There's an rei close by and I was thinking about getting a set of the y carriers.
    Has anyone ever tried putting a solo canoe in one of these? Could I fit one boat in a single y carrier and then the other
    on the roof racks? Another option is to build a addition to the roof rack but I don't have any tools on hand so I would
    like to avoid that if possible.
- source_sentence: Where do you guys go to find used camper shells?
  sentences:
  - 'Hey guys what is the most optimal tool for pulling long staples out from hardwood flooring? I''m trying to find the most
    optimal way to do it because I have thousands to pull! Fence pliers did not work too well on account the pointy tip was
    too thick get in and roll them out and when i tried the gripping/cutting part it broke the staples.


    I''m thinking round nose vice grips or a car gasket puller?


    Thanks'
  - 'I''ve got a newly acquired 1st gen 2005 silvee Toyota tundra trd and am looking for an used camper shell.  Craigslist
    hasnt been very useful....where do you guys go?


    Thanks!'
  - I work at a convenience store and the number of Newports I sell a day is insane. Considering buying a couple cartons of
    em and maybe some parliament menthols if the FDA goes through with this. Should be able to throw em up on craigslist or
    ebay a week or two later and it'll be like steaks in a piranha pond
