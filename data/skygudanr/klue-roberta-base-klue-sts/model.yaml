  sentences:
  - 엘니뇨 현상의 주요 발생원인은 무엇입니까?
  - 저번처럼 빠지지 말고 가족모임 일정은 우선순위 일순위로 하자.
  - 온돌에서 생활하는 한국인이 지내기엔 작은 히터는 좀 추웠어요.
- source_sentence: 학교말고 회사에서 온 메일은 지금 로그인한 계정 말고 다른 지메일 계정으로 보내줘야 해.
  sentences:
  - 지금 티비 소리 얼마나 큰지 좀 보여줘
  - 과거 매출액보다는 기술력·미래성장성으로 대출·보증을 받을 수 있도록 기업평가방식을 전면혁신한다.
  - 신한카드 메일 청구서의 신청방법이 어떻게 되죠?
- source_sentence: 에어비앤비에서 예약한 곳 중 가장 좋았습니다.
  sentences:
  - 그 수치는 2015년 메르스의 30퍼센트 감소에서 두 배 이상 증가했습니다.
  - 에어비앤비에서 묵은 숙소중에 가장 좋았어요.
  - 호스트 커플은 매우 친절하고 최고의 교통수단과 방이 완벽합니다.
- source_sentence: 관광지를 대부분 걸어서 이동 가능합니다.
  sentences:
  - 당신은 대부분의 관광지를 걸을 수 있습니다.
  - 여기처럼 조금 떨어진 곳에서 보는 것이 더 나을 거예요!
  - 어린 아이들이 물에서 노는 것은 매우 좋습니다.
- source_sentence: 현재 그 라디오 방송 프로그램이 뭔지 알 수 있을까요?
  sentences:
  - 야 지금 베란다랑 거실 중에 어디 불이 켜져있어?
  - 앞에있는 국수집도 맛집인 모양이더라구요
  - 일정을 많이 잡아서 힘들게 하지 말고 하나만 잡으세요.
