  - 'Menstruation and the menstrual cycle | womenshealth.gov Menstruation and the menstrual cycle Menstruation and the menstrual
    cycle To receive Publications email updates Enter email Submit Menstruation and the menstrual cycle Menstruation is a
    woman''s monthly bleeding. When you menstruate, your body sheds the lining of the uterus (womb). Learn how the menstrual
    cycle works and what to do if you have painful or irregular periods. Expand all Collapse all What is menstruation? Menstruation
    (men-STRAY-shuhn) is a woman''s monthly bleeding. When you menstruate, your body sheds the lining of the uterus (womb).
    Menstrual blood flows from the uterus through the small opening in the cervix and passes out of the body through the vagina
    ( see how the menstrual cycle works below ). Most menstrual periods last from 3 to 5 days. What is the menstrual cycle?
    When periods (menstruations) come regularly, this is called the menstrual cycle. Having regular menstrual cycles is a
    sign that important parts of your body are working normally. The menstrual cycle provides important body chemicals, called
    hormones, to keep you healthy. It also prepares your body for pregnancy each month. A cycle is counted from the first
    day of 1 period to the first day of the next period. The average menstrual cycle is 28 days long. Cycles can range anywhere
    from 21 to 35 days in adults and from 21 to 45 days in young teens. The rise and fall of levels of hormones during the
    month control the menstrual cycle. What happens during the menstrual cycle? In the first half of the cycle, levels of
    estrogen (the "female hormone") start to rise. Estrogen plays an important role in keeping you healthy, especially by
    helping you to build strong bones and to help keep them strong as you get older. Estrogen also makes the lining of the
    uterus (womb) grow and thicken. This lining of the womb is a place that will nourish the embryo if a pregnancy occurs.
    At the same time the lining of the womb is growing, an egg, or ovum, in one of the ovaries starts to mature. At about
    day 14 of an average 28-day cycle, the egg leaves the ovary. This is called ovulation. After the egg has left the ovary,
    it travels through the fallopian tube to the uterus. Hormone levels rise and help prepare the uterine lining for pregnancy.
    A woman is most likely to get pregnant during the 3 days before or on the day of ovulation. Keep in mind, women with cycles
    that are shorter or longer than average may ovulate before or after day 14. A woman becomes pregnant if the egg is fertilized
    by a man''s sperm cell and attaches to the uterine wall. If the egg is not fertilized, it will break apart. Then, hormone
    levels drop, and the thickened lining of the uterus is shed during the menstrual period. See how the menstrual cycle works.
    What is a typical menstrual period like? During your period, you shed the thickened uterine lining and extra blood through
    the vagina. Your period may not be the same every month. It may also be different than other women''s periods. Periods
    can be light, moderate, or heavy in terms of how much blood comes out of the vagina. This is called menstrual flow. The
    length of the period also varies. Most periods last from 3 to 5 days. But, anywhere from 2 to 7 days is normal. For the
    first few years after menstruation begins, longer cycles are common. A woman''s cycle tends to shorten and become more
    regular with age. Most of the time, periods will be in the range of 21 to 35 days apart. What kinds of problems do women
    have with their periods? Women can have a range of problems with their periods, including pain, heavy bleeding, and skipped
    periods. Amenorrhea (ay-men-uh-REE-uh) — the lack of a menstrual period. This term is used to describe the absence of
    a period in: Young women who haven''t started menstruating by age 15 Women and girls who haven''t had a period for 90
    days, even if they haven''t been menstruating for long Causes can include: Stress Serious medical conditions in need of
    treatment As above, when your menstrual cycles come regularly, this means that important parts of your body are'
- source_sentence: Which footballer won the Golden Boot for scoring the most goals at 1986 World Cup Finals?
  sentences:
  - World Cup Golden Boot Winners - Historical World Cup Top Scorers Argentina 5 One of the most active markets for any World
    Cup is the Golden Boot with a number of players vying for an award which is presented to the highest goal scorer in the
    tournament. Over the years, there have been some incredible goal scoring feats at World Cup finals but who are the individuals
    that have made their mark in previous tournaments and what indicators can they give those of us who are making predictions
    for 2014? The Record Breaker France’s Just Fontaine holds the record for the most goals in a single World Cup tournament
    and it’s one that may never be broken. In current World Cup competitions, the most successful teams could play as many
    as seven games but could any of the current players match the 13 strikes that Fontaine achieved in Sweden in 1958? The
    striker was prolific in club football and averaged nearly a goal a game during his eight years with Stade Reims. His ratio
    at international level was even better and his performances at the 1958 finals would leave Fontaine with a record of 30
    goals from 23 appearances. It’s claimed that he was playing in a pair of borrowed boots when he began his campaign with
    a hat trick in a 7-3 defeat of Uruguay. The Frenchman followed that achievement with a brace against Yugoslavia and a
    single, winning goal against the Scots which allowed his country to progress to the next phase. Three goals followed over
    two matches against Northern Ireland and Brazil before Fontaine netted no less than four times in the third place play
    off against West Germany. Behind this incredible achievement, Sandor Kocsis managed eleven strikes in the finals of 1954
    but since Gerd Muller’s 10 in 1970, no player has managed more than eight in a single tournament. The Prolific Nations
    Aside from Just Fontaine’s magnificent 13 back in 1958, no Frenchman has taken the Golden Boot award. In fact, after the
    Stade Reims centre forward, there is a considerable gap in the country’s all time list. The finals in Sweden were the
    only time that Fontaine appeared in a tournament so he finished seven clear of Thierry Henry who scored six goals – three
    in 1998 and three in 2002. Other countries have been more prolific over a longer span and they tend to be the more successful
    nations in terms of World Cup victories. Brazil are well represented when it comes to the tournament’s leading goal scorers
    and out of eighteen finals, five Brazilians have either shared the Golden Boot or won it outright. The most successful
    of these was Ronaldo who currently holds the overall record for goals scored at the World Cup finals. The former Real
    Madrid target man has 15 strikes, spread over three tournaments, including a top scoring effort of eight as his country
    lifted the trophy in 2002. Behind Ronaldo, the legendary Pele has 12 goals in four tournaments although the man who many
    believe was the greatest to ever play the game, never actually won a Golden Boot. Germany also feature heavily in the
    list of all time leading scorers and Miroslav Klose has a chance of eclipsing Ronaldo’s record at the 2014 tournament.
    Along with the great Gerd Muller , the Lazio centre forward has 14 goals in World Cup finals and is set to be Germany’s
    first choice front man in Brazil. In total, German or West German players have finished as top scorer in three tournaments.
    Gerd Muller recorded an impressive ten goals in 1970 before Klose took an outright win in 2006. Thomas Muller completes
    the trio although the Bayern Munich man shared the award in 2010 with David Villa and Wesley Sneijder. An unlikely hero
    After West Germany’s Gerd Muller took the prestigious Golden Boot in 1970, he joined up with the national squad as they
    looked to win the World Cup on home soil four years later. The host nation duly completed a win after edging past the
    Netherlands by two goals to one in the final and while the man they called ‘Der Bomber’ scored four times, the top scorer
    accolade finished in the hands of an unlikely recipient. Poland’s Grzegorz Lato featured in three FIFA World Cup
