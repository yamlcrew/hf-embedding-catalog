    - 'Menstruation and the menstrual cycle | womenshealth.gov Menstruation and the menstrual cycle Menstruation and the menstrual
      cycle To receive Publications email updates Enter email Submit Menstruation and the menstrual cycle Menstruation is
      a woman''s monthly bleeding. When you menstruate, your body sheds the lining of the uterus (womb). Learn how the menstrual
      cycle works and what to do if you have painful or irregular periods. Expand all Collapse all What is menstruation? Menstruation
      (men-STRAY-shuhn) is a woman''s monthly bleeding. When you menstruate, your body sheds the lining of the uterus (womb).
      Menstrual blood flows from the uterus through the small opening in the cervix and passes out of the body through the
      vagina ( see how the menstrual cycle works below ). Most menstrual periods last from 3 to 5 days. What is the menstrual
      cycle? When periods (menstruations) come regularly, this is called the menstrual cycle. Having regular menstrual cycles
      is a sign that important parts of your body are working normally. The menstrual cycle provides important body chemicals,
      called hormones, to keep you healthy. It also prepares your body for pregnancy each month. A cycle is counted from the
      first day of 1 period to the first day of the next period. The average menstrual cycle is 28 days long. Cycles can range
      anywhere from 21 to 35 days in adults and from 21 to 45 days in young teens. The rise and fall of levels of hormones
      during the month control the menstrual cycle. What happens during the menstrual cycle? In the first half of the cycle,
      levels of estrogen (the "female hormone") start to rise. Estrogen plays an important role in keeping you healthy, especially
      by helping you to build strong bones and to help keep them strong as you get older. Estrogen also makes the lining of
      the uterus (womb) grow and thicken. This lining of the womb is a place that will nourish the embryo if a pregnancy occurs.
      At the same time the lining of the womb is growing, an egg, or ovum, in one of the ovaries starts to mature. At about
      day 14 of an average 28-day cycle, the egg leaves the ovary. This is called ovulation. After the egg has left the ovary,
      it travels through the fallopian tube to the uterus. Hormone levels rise and help prepare the uterine lining for pregnancy.
      A woman is most likely to get pregnant during the 3 days before or on the day of ovulation. Keep in mind, women with
      cycles that are shorter or longer than average may ovulate before or after day 14. A woman becomes pregnant if the egg
      is fertilized by a man''s sperm cell and attaches to the uterine wall. If the egg is not fertilized, it will break apart.
      Then, hormone levels drop, and the thickened lining of the uterus is shed during the menstrual period. See how the menstrual
      cycle works. What is a typical menstrual period like? During your period, you shed the thickened uterine lining and
      extra blood through the vagina. Your period may not be the same every month. It may also be different than other women''s
      periods. Periods can be light, moderate, or heavy in terms of how much blood comes out of the vagina. This is called
      menstrual flow. The length of the period also varies. Most periods last from 3 to 5 days. But, anywhere from 2 to 7
      days is normal. For the first few years after menstruation begins, longer cycles are common. A woman''s cycle tends
      to shorten and become more regular with age. Most of the time, periods will be in the range of 21 to 35 days apart.
      What kinds of problems do women have with their periods? Women can have a range of problems with their periods, including
      pain, heavy bleeding, and skipped periods. Amenorrhea (ay-men-uh-REE-uh) — the lack of a menstrual period. This term
      is used to describe the absence of a period in: Young women who haven''t started menstruating by age 15 Women and girls
      who haven''t had a period for 90 days, even if they haven''t been menstruating for long Causes can include: Stress Serious
      medical conditions in need of treatment As above, when your menstrual cycles come regularly, this means that important
      parts of your body are'
  - source_sentence: Which footballer won the Golden Boot for scoring the most goals at 1986 World Cup Finals?
    sentences:
    - World Cup Golden Boot Winners - Historical World Cup Top Scorers Argentina 5 One of the most active markets for any
      World Cup is the Golden Boot with a number of players vying for an award which is presented to the highest goal scorer
      in the tournament. Over the years, there have been some incredible goal scoring feats at World Cup finals but who are
      the individuals that have made their mark in previous tournaments and what indicators can they give those of us who
      are making predictions for 2014? The Record Breaker France’s Just Fontaine holds the record for the most goals in a
      single World Cup tournament and it’s one that may never be broken. In current World Cup competitions, the most successful
      teams could play as many as seven games but could any of the current players match the 13 strikes that Fontaine achieved
      in Sweden in 1958? The striker was prolific in club football and averaged nearly a goal a game during his eight years
      with Stade Reims. His ratio at international level was even better and his performances at the 1958 finals would leave
      Fontaine with a record of 30 goals from 23 appearances. It’s claimed that he was playing in a pair of borrowed boots
      when he began his campaign with a hat trick in a 7-3 defeat of Uruguay. The Frenchman followed that achievement with
      a brace against Yugoslavia and a single, winning goal against the Scots which allowed his country to progress to the
      next phase. Three goals followed over two matches against Northern Ireland and Brazil before Fontaine netted no less
      than four times in the third place play off against West Germany. Behind this incredible achievement, Sandor Kocsis
      managed eleven strikes in the finals of 1954 but since Gerd Muller’s 10 in 1970, no player has managed more than eight
      in a single tournament. The Prolific Nations Aside from Just Fontaine’s magnificent 13 back in 1958, no Frenchman has
      taken the Golden Boot award. In fact, after the Stade Reims centre forward, there is a considerable gap in the country’s
      all time list. The finals in Sweden were the only time that Fontaine appeared in a tournament so he finished seven clear
      of Thierry Henry who scored six goals – three in 1998 and three in 2002. Other countries have been more prolific over
      a longer span and they tend to be the more successful nations in terms of World Cup victories. Brazil are well represented
      when it comes to the tournament’s leading goal scorers and out of eighteen finals, five Brazilians have either shared
      the Golden Boot or won it outright. The most successful of these was Ronaldo who currently holds the overall record
      for goals scored at the World Cup finals. The former Real Madrid target man has 15 strikes, spread over three tournaments,
      including a top scoring effort of eight as his country lifted the trophy in 2002. Behind Ronaldo, the legendary Pele
      has 12 goals in four tournaments although the man who many believe was the greatest to ever play the game, never actually
      won a Golden Boot. Germany also feature heavily in the list of all time leading scorers and Miroslav Klose has a chance
      of eclipsing Ronaldo’s record at the 2014 tournament. Along with the great Gerd Muller , the Lazio centre forward has
      14 goals in World Cup finals and is set to be Germany’s first choice front man in Brazil. In total, German or West German
      players have finished as top scorer in three tournaments. Gerd Muller recorded an impressive ten goals in 1970 before
      Klose took an outright win in 2006. Thomas Muller completes the trio although the Bayern Munich man shared the award
      in 2010 with David Villa and Wesley Sneijder. An unlikely hero After West Germany’s Gerd Muller took the prestigious
      Golden Boot in 1970, he joined up with the national squad as they looked to win the World Cup on home soil four years
      later. The host nation duly completed a win after edging past the Netherlands by two goals to one in the final and while
      the man they called ‘Der Bomber’ scored four times, the top scorer accolade finished in the hands of an unlikely recipient.
      Poland’s Grzegorz Lato featured in three FIFA World Cup
    - 'Philip IV Philip IV Location of death: Madrid, Spain Cause of death: unspecified Nationality: Spain Executive summary:
      King of Spain, 1621-65 Philip IV, King of Spain, eldest son of Philip III and his wife Margaret, sister of the emperor
      Ferdinand II, was born at Valladolid on the 8th of April 1605. His reign, after a few passing years of barren successes,
      was a long story of political and military decay and disaster. The king has been held responsible for the fall of Spain,
      which was, however, due in the main to internal causes beyond the control of the most despotic ruler, however capable
      he had been. Philip certainly possessed more energy, both mental and physical, than his father. There is still in existence
      a translation of Guicciardini which he wrote with his own hand in order to qualify himself for government by acquiring
      a knowledge of political history. He was a fine horseman and keen hunter. His artistic taste was shown by his patronage
      of Diego Vel�zquez , and his love of letters by his favor to Lope de Vega , Calder�n , and other dramatists. He is even
      credited, on fairly probable testimony, with a share at least in the composition of several comedies. His good intentions
      were of no avail to his government. Coming to the throne at the age of sixteen, he did the wisest thing he could by
      allowing himself to be guided by the most capable man he could find. His favorite, Olivares, was a far more honest man
      than the Duke of Lerma, and was more fit for the place of prime minister than any Spaniard of the time. But Philip IV
      had not the strength of mind to free himself from the influence of Olivares when he had grown to manhood. The amusements
      which the favorite had encouraged became the business of the king''s life. When, in 1643, the disasters falling on the
      monarchy on all sides led to the dismissal of Olivares, Philip had lost the power to devote himself to hard work. After
      a brief struggle with the task of directing the administration of the most extensive and the worst organized monarchy
      in Europe, he sank back into his pleasures and was governed by other favorites. His political opinions were those he
      had inherited from his father and grandfather. He thought it his duty to support the German Habsburgs and the cause
      of the Roman Catholic Church against the Protestants, to assert his sovereignty over Holland, and to extend the dominions
      of his house. The utter exhaustion of his people in the course of a hopeless struggle with Holland, France and England
      was seen by him with sympathy, but he considered it an unavoidable misfortune and not the result of his own errors,
      since he could not be expected to renounce his rights or to desert the cause of God and the Church. In public he maintained
      a bearing of rigid solemnity, and was seen to laugh only three times in the course of his life. But in private he indulged
      in horseplay and very coarse immorality. His court was grossly vicious. The early death of his eldest son, Baltasar
      Carlos, was unquestionably due to debauchery encouraged by the gentlemen entrusted by the king with his education. The
      lesson shocked the king, but its effect soon wore off. Philip IV died broken-hearted on the 17th of September 1665,
      expressing the hope that his surviving son, Carlos, would be more fortunate than himself. Father: Philip III (King of
      Spain) Mother: Margaret Sister: Anne of Austria (Queen of France, b. 1601, d. 1666) Brother: Ferdinand (Governor of
      the Netherlands) Wife: Elizabeth Bourbon (b. 1603, m. 1615, d. 1644) Daughter: Maria Margarita (b. 1621) Daughter: Margarita
      Maria Catalina (b. 1623) Daughter: Maria Eugenia (b. 1625, d. 1627) Daughter: Isabel Maria Teresa (b. 1627) Son: Baltasar
      Carlos (b. 1629, d. 1646) Daughter: Maria Ana Antonia (b. 1636) Daughter: Maria Theresa of Spain (b. 1638, d. 1683)'
    - Olympic Games | Ice Hockey Wiki | Fandom powered by Wikia Medalists Ice hockey tournaments have been staged at the Olympic
      Games since 1920. The men's tournament was introduced at the 1920 Summer Olympics and was transferred permanently to
      the Winter Olympic Games programme in 1924. The women's tournament was first held at the 1998 Winter Olympics . The
      Olympic Games were originally intended for amateur athletes until 1988, and the National Hockey League (NHL) did not
      allow its players to compete until 1998. From 1924 to 1988, the tournament started with a round-robin series of games
      and ended with the medal round. Medals were awarded based on points accumulated during that round. The games of the
      tournament follow the rules of the International Ice Hockey Federation (IIHF), which differ slightly from the rules
      used in the NHL . The tournament follows the  World Anti-Doping Agency's (WADA) rules on Use of performance enhancing
      drugs and the IIHF maintains a Registered Testing Pool, a list of top players who are subjected to random in-competition
      and out-of-competition drug tests. Several players have tested positive for banned substances since the 1972 Winter
      Olympics . In the men's tournament, Canada was the most successful team of the first three decades, winning six of seven
      gold medals. Czechoslovakia , Sweden and the United States were also competitive during this period and won multiple
      medals. Between 1920 and 1968, the Olympic hockey tournament was also counted as the Ice Hockey World Championship for
      that year. The Soviet Union first participated in 1956 and overtook Canada as the dominant international team, winning
      seven of the nine tournaments in which they participated. The United States won gold medals in 1960 and in 1980 , which
      included their " Miracle on Ice " upset of the Soviet Union. Canada went 50 years without a gold medal, before winning
      one in 2002 , and following it up with another in 2010 . Other nations to win gold include Great Britain in 1936 , the
      Unified Team in 1992 , Sweden in 1994 and 2006 and the Czech Republic]] in 1998 . Other medal-winning nations include
      Switzerland,Germany,Finland and Russia]]. In 1986, the International Olympic Committee (IOC) voted to allow all athletes
      to compete in Olympic Games held after 1988. The NHL was initially reluctant to allow its players to compete because
      the Olympics are held in the middle of the NHL season, and the league would have to halt play if many of its players
      participated. However, NHL players were allowed to compete starting in 1998. The format of the tournament was adjusted
      to accommodate the NHL schedule; a preliminary round was played without NHL players or the top six teams—Canada, the
      Czech Republic, Finland, Russia, Sweden and the United States—followed by a final round which included them. The tournament
      format was changed again in 2006; every team played five preliminary games with the full use of NHL players. In July
      1992, the IOC voted to approve women's hockey as an Olympic event; it was first held at the 1998 Winter Olympics in
      Nagano. The Nagano Organizing Committee was hesitant to include the event because of the additional costs of staging
      the tournament, but an agreement was reached that limited the field to six teams, and ensured that no additional facilities
      would be built. The Canadian and American teams have dominated the event, typically losing only to each other. The United
      States won the first tournament in 1998, while Canada won in 2002, 2006 and 2010. Contents Edit The first Olympic ice
      hockey tournament took place at the 1920 Summer Olympics in Antwerp , Belgium . [1] At the time, organised international
      ice hockey was still relatively new. [2] The International Ice Hockey Federation (IIHF), the sport's governing body,
      was created on May 15, 1908, under the name Ligue Internationale de Hockey sur Glace. [3] At the 1914 Olympic Congress
      in Paris, ice hockey was added to the list of optional sports that Olympics organisers could include. [4] The decision
      to include ice hockey for the 1920 Summer Olympics wa
