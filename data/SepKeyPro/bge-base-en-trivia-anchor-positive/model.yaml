    sentences:
    - 'Brighton Rock Maximize this page Introduction This study guide is intended for students preparing for exams at GCE
      Advanced (A2) level and Advanced Supplementary (AS) level. But it is suitable for university students and the general
      reader who is interested in Brighton Rock. Please use the hyperlinks in the table above to navigate this page. If you
      have any comments or suggestions to make about this page, please e-mail me by clicking on this link. The purpose of
      this study guide is to help you find your way around the text, and to introduce subjects which may be set by examiners.
      It is not a substitute for close study of the novel. Ideas presented here need to be supported by textual reference
      (either summary of narrative detail or brief direct quotation, as appropriate; do not quote at length: you gain no credit
      for this in an "open book" exam, the point of the reference will not be clear, and you are wasting time!). Back to top
      It is assumed by the examiners that literature is a humane subject; that is, that books set for study explore and interpret
      values and attitudes in the real world, although they must also be judged in their own right as imaginative works depicting
      an alternative reality or alternative view of the world. Broadly speaking, students are asked to examine works in terms
      of their content (what they are about) and the author''s technique (how they are composed). While examiners hope that
      students will enjoy studying these things, they recognize that this enjoyment will rarely be simple or immediate in
      the case of demanding texts. Students would do well to develop maturity as readers, to discover the historical and cultural
      diversity of western literature, with some of its history; to recognize different literary forms, genres and conventions.
      Personal and independent judgements are encouraged, but should be made against a background of familiarity with established
      or current attitudes. It is impossible to "teach" this entirely within lesson time; private reading, directed by a teacher
      or other well-read person, is essential. Because you cannot read everything, or even very much, try to profit from the
      experience of others. Back to top Brighton Rock: what is it about? At one level, this novel is a simple, if elegant,
      thriller: Ida Arnold, an unlikely heroine, pursues the evil but failed gangster Pinkie Brown; she seeks his punishment,
      while trying to save from his influence the young woman, Rose, whom Pinkie has married to buy her silence. In these
      terms, with vivid but usually straightforward characters and well-drawn locations, and the shocking conclusion (the
      reader is aware of Rose''s imminent discovery of Pinkie''s hatred) the novel shows why it achieved great popularity,
      and why it was successfully adapted for the cinema. Unlike some classic works, it obeys the convention of popular fiction,
      that there should be a well-paced and exciting story; "suspense" is also provided by the reader''s concern for the perhaps
      doomed Rose. But why is the novel also considered to be serious fiction, or a "modern classic"? This is a little less
      obvious, but we can find reasons for this opinion, if we look. Like many writers from earlier times, Greene is deeply
      interested in what could be called metaphysical questions: about the real nature and purpose of this world, about the
      nature or existence, even, of God; about man''s freedom, by his own efforts, to alter his circumstances - or lack of
      this freedom. In order to address these arguments, Greene depicts characters who are not at all complex, but who hold,
      profoundly in the case of Pinkie, radically differing views on these matters. Back to top Dallow, like Ida, sees only
      the immediate material world before him, as do the punters who see Brighton''s jolly facade and gaiety, but not the
      squalor behind this. Pinkie, though, believes also in a world of unseen but eternal spiritual realities. Initially,
      he believes these to await him after death, and he aspires to better his status in this world; but he comes, gradually,
      to see what Prewitt, his bent lawyer, articulates'
    - 'How many Presidents have resigned from office? | Reference.com How many Presidents have resigned from office? A: Quick
      Answer As of 2014, there has been only one president to resign from office. That president was Richard Nixon on Aug.
      9, 1974. Minutes after his resignation, Vice President Gerald R. Ford was sworn into office as the 37th president of
      the United States. Full Answer Nixon''s resignation can be largely attributed to the clandestine and illegal activities
      his administration undertook during his presidency. The activities were brought to light when members of his administration
      were caught breaking into the Democratic headquarters at the Watergate Hotel. This scandal, named the Watergate scandal,
      resulted in the loss of almost all of his political support and the near-certainty of his impeachment. As a result,
      Nixon took to radio and television and announced his resignation.'
