    - What is the Rugby Union Six Nations tournament? - CBBC Newsround What is the Rugby Union Six Nations tournament? 11
      February 2015 Image copyright Getty Images Check out this guide to find out all you need to know about the Six Nations.
      Rugby Union Six Nations tournament The Six Nations is a rugby union tournament played every year between the top countries
      in Europe. The six countries who take part are England, Scotland, Wales, Ireland, France and Italy. For the first 90
      years of the championships there were only five countries involved, but Italy were invited to take part in 2000. Rugby
      Union Rugby Union is played by teams of 15 players, with each team made up of eight forwards and seven backs. Even at
      the top level it used to be amateur; that is, played for fun by people who had other jobs too, but now the top players
      are all professionals. The biggest competition in Union is the World Cup, played every four years, but the most famous
      one in this country is the Six Nations championship. The Grand Slam If a team wins all five of its matches it is called
      a Grand Slam, but to win a Grand Slam is very hard. England won a Grand Slam in 2003, but only after losing their final
      match in the three seasons before. The Triple Crown The Triple Crown is a special prize that only the four home unions
      are able to win. Image copyright PA Image caption A team can only win the triple crown if they beat all three of the
      other home unions Rugby facts The sport gets its name from the place where it was invented, Rugby School in Warwickshire,
      England. In 1816 a pupil called William Webb Ellis got a bit bored during a match of football and decided that picking
      up the ball would make things more interesting. Although the game has come a long way since, even splitting into two
      codes; Rugby Union and Rugby League, that's where it started. One of the most important rules of the sport is that the
      ball can only be passed backwards.
    - 'Baked Artichoke Recipe Baked Artichoke Recipe written by Heather Restrepo So there are a variety of types when it comes
      to artichokes (Red-Babyanzio, Big-heart, Siena, Mercury, Omaha, Fiesole, Chianti, etc.) But perhaps the most common
      is the Classic Green Globe artichoke. This is probably the type of artichoke you will find at your local grocer. Having
      moved to Hawaii as a teen, that is when I was first introduced to this intimidating looking veggie. I would never have
      predicted that I could ever encompass the foodie-love-affair that I now have with them! The Classic Green Globe artichoke
      is by far my favorite because of its’ buttery-tasting heart and bottom. There is also a good amount of meat within the
      petals – SCORE if you ask me! Many people enjoy perfectly grilled, baked, or steamed artichokes at fancy restaurants,
      which are usually served with a garlic aioli type of sauce (find my aioli recipe here ).  Nonetheless, making them at
      home is not as scary as you might think! I find that steaming artichokes gives them a bitter taste compared to baking,
      plus popping them in the oven is so much easier than messing with a steamer! So, here is my go-to recipe for BAKED artichokes:
      INGREDIENTS: 2 tbsp. Grass-fed Butter (un-salted) 1 tsp. Garlic Powder *NOTE: You will need a baking dish with a lid/cover.
      To start – Preheat the oven to 425 degrees.  Give the artichoke a good rinse in cold water, and use a kitchen brush
      to lightly scrub the outside. Then cut about a half-inch from the stem and discard the bottom piece. I also cut about
      a half-inch from the very top, just to open it up and allow the seasoning to get inside for cooking.  *OPTIONAL: Some
      people like to trim the tops of the leaves to get rid of the thorns, but I find that they become soft during cooking
      so I don’t bother.  Then, carefully cut the artichoke vertically in half. Line a baking dish with parchment paper and
      place the halves on top. Then lightly coat both pieces with a halved lemon. Take the other half of the lemon and squeeze
      along the inside of the artichoke, as well as between the leaves. Then sprinkle the sea salt and garlic powder all-over
      both sides and a bit between the leaves. Next, lightly drizzle your oil all over the artichoke pieces (in between the
      leaves also). Then place a tbsp. of grass-fed butter in each of the heart pockets. Cover the baking dish with lid, and
      place in to the oven.  Allow to cook until sizzling., usually about 1 hour. (Ovens will vary, so check often after 30-40
      minutes of cooking) After cooking, allow to cool, remove the choke with a spoon (the hairy inside part), and then enjoy
      the meat on petals, and heart/bottom! x. Heather'
    - 'Lady Lever Art Gallery - Gallery in Port Sunlight, Port Sunlight - Visit Liverpool You are here: Things To Do > Lady
      Lever Art Gallery Lady Lever Art Gallery Note: Prices are a guide only and may change on a daily basis. About The Lady
      Lever Art Gallery is regarded as one of the finest art galleries in Europe. It''s located in model village, Port Sunlight
      in Wirral, a place rich in architectural charm.  The gallery was founded by William Hesketh Lever (1851-1925) and is
      dedicated to his wife Elizabeth, Lady Lever. Lever wanted to share his collections with the public and the works on
      display at the gallery have been personally selected.  Inside the gallery, visitors will find the best of Lever''s personal
      art collection and the finest collection of Wedgewood jasperware anywhere in the world. The Pre-Raphaelite painting
      collection is internationally renowned and features works by Millais, Rossetti, Burne-Jones and Holman Hunt.  For younger
      visitors, the activity rooms are an interactive space where they can get hands-on and have fun with crafts, dressing
      up and story telling.  Lady Lever often houses temporary exhibitions and popular free events, be sure to check the website
      before visiting.  Before leaving, browse the gift shop or enjoy a bite to eat in the Gallery Cafe. All Areas Accessible
      to Disabled Visitors Cafe/Restaurant Guided Tours Available for Groups Large Parties Map & Directions Road Directions
      From Liverpool: Go through the Birkenhead (Queensway) Tunnel (£1.40 toll for cars, £4.20 for coaches). Once you leave
      the tunnel follow signs for Port Sunlight, driving along A41(New Chester Road) - the gallery is sign posted all the
      way from the tunnel and situated opposite Port Sunlight Museum.  From elsewhere: Leave the M53 at junction 4, follow
      the B5137 and take the second left onto the B5136 towards Port Sunlight. Follow the brown and white road signs for Port
      Sunlight Village. Once you are in the village follow the signs for Lady Lever Art Gallery. Public Transport Directions
      By Train: The nearest station is Bebington although Port Sunlight is also within walking distance. They are both on
      the Chester and Ellesmere Port Merseyrail lines. Leave the station and come out onto Old Chester Road (use the ramp
      if you require level access). Turn left, cross at the traffic lights, then turn left again down Bebington Road, passing
      under the railway bridge. Turn next right down Greendale Road. Continue along the pavement on the same side as the cottages
      for approximately 400 yards until you see the Leverhulme memorial and the Lady Lever Art Gallery on your left. Take
      the pathway on your left leading into Windy Bank and towards the memorial and the gallery. The entrance to the gallery
