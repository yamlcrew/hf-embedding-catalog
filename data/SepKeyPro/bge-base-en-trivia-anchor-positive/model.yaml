  sentences:
  - 'Tiddlywinks: The Classic Victorian Pastime: On Target for the 21st Century (1996) You are at: Home » History »Tiddlywinks:
    The Classic Victorian Pastime: On Target for the 21st Century (1996) Tiddlywinks: The Classic Victorian Pastime: On Target
    for the 21st Century (1996) This article was originally published in the American Game Collectors Association ‘s Game
    Researchers’ Notes, ISSN 1050-6608, October 1996, with illustrations and content on the cover, on pages 5552 to 5561,
    and also on the back cover. In the web version of this article, additional images have been incorporated that did not
    appear in the original publication.  Also please note that the AGCA is now known as the Association of Game & Puzzle Collectors
    . A substantial majority of the information provided in the original 1996 article remains accurate to this day.  However,
    quite a bit more background information has been gathered since.  An update is warranted, and is in the works. This article
    was originally posted on the Internet on 3 May 1997,  was updated on 2 April 1999, and then with updated images and links
    on 9 and 15 September 2006, plus a few more minor updates on 24 November 2006, and also on 13 July 2014. By Rick Tucker
    © 1996 Richard W. Tucker. All Rights Reserved “One should make a serious study of a pastime”—Alexander the Great [ 1 ]
    Table of Contents References The Preface I’ve played tiddlywinks for 24 years, ever since I ventured into a dormitory
    at MIT on my first day as a freshman and encountered (no pun intended) the local denizens on their hands and knees shooting
    winks across the carpet and down the stairs. (It really isn’t normally played on the floor, actually.) I was captivated
    at the congruence (technical term, sorry) of the ivory towers of MIT housing the noble sport of tiddlywinks, and amazed
    that MIT might, perhaps inadvertantly (but not always), lend credence to a sport enmired in such a mischievous stereotype.
    Tiddlywinks appealed to me because of its unique character, because it is almost universally known, and because it demands
    precise dexterous skills, while also requiring strategy and tactics, and also a measure of luck. And so, what follows
    is the first definitive history of tiddlywinks boxed games. There is a history in all men’s lives.[ 2 ] I invite and expect
    to hear from game collectors and historians to help me add to, revise, and where necessary, fix errors in this history.
    I also invite you to visit my tiddlywinks web pages at http://www.tiddlywinks.org , where this article will appear subsequent
    to its publication in Games Researchers’ Notes, with all the photos in living color. — Rick Tucker, 31 October 1996 Setting
    the Stage: The Oft-Ridiculed Game “Have we sold our precious heritage in exchange for frivolity and a game of tiddlywinks?”,
    letter by Lillie Struble in Library Journal[ 3 ]. This was the most unkindest cut of all.[ 4 ] “A 15th-century Donatello
    bronze, The Madonna and Child, served the Fitzwilliam family as a tiddlywinks bowl until the Victoria and Albert Museum
    [London] recognized its importance”, ARTnews[ 5 ]. “Even in the matter of nursery games the Victorian child took things
    very seriously. There were some board games, however, which provided little or no intellectual stimulus. Chief among these
    was […] tiddlywinks, whose apparent inanity (to the uninitiated) is often regarded as the ultimate in useless activities.”,
    James Mackay [ 6 ]. Prince Philip once suggested that tiddlywinks be included in the Olympics. To which Ian Wooldridge
    of the Olympic Committee responded: “At the risk of propagating royal support for tiddlywinks, a game of the utmost tedium
    played by anti-athletes too tired or apathetic to get up off the floor, I have to concede that his argument makes sense.”,
