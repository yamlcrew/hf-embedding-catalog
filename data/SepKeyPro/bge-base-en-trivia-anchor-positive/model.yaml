    sentences:
    - 'Tiddlywinks: The Classic Victorian Pastime: On Target for the 21st Century (1996) You are at: Home » History »Tiddlywinks:
      The Classic Victorian Pastime: On Target for the 21st Century (1996) Tiddlywinks: The Classic Victorian Pastime: On
      Target for the 21st Century (1996) This article was originally published in the American Game Collectors Association
      ‘s Game Researchers’ Notes, ISSN 1050-6608, October 1996, with illustrations and content on the cover, on pages 5552
      to 5561, and also on the back cover. In the web version of this article, additional images have been incorporated that
      did not appear in the original publication.  Also please note that the AGCA is now known as the Association of Game
      & Puzzle Collectors . A substantial majority of the information provided in the original 1996 article remains accurate
      to this day.  However, quite a bit more background information has been gathered since.  An update is warranted, and
      is in the works. This article was originally posted on the Internet on 3 May 1997,  was updated on 2 April 1999, and
      then with updated images and links on 9 and 15 September 2006, plus a few more minor updates on 24 November 2006, and
      also on 13 July 2014. By Rick Tucker © 1996 Richard W. Tucker. All Rights Reserved “One should make a serious study
      of a pastime”—Alexander the Great [ 1 ] Table of Contents References The Preface I’ve played tiddlywinks for 24 years,
      ever since I ventured into a dormitory at MIT on my first day as a freshman and encountered (no pun intended) the local
      denizens on their hands and knees shooting winks across the carpet and down the stairs. (It really isn’t normally played
      on the floor, actually.) I was captivated at the congruence (technical term, sorry) of the ivory towers of MIT housing
      the noble sport of tiddlywinks, and amazed that MIT might, perhaps inadvertantly (but not always), lend credence to
      a sport enmired in such a mischievous stereotype. Tiddlywinks appealed to me because of its unique character, because
