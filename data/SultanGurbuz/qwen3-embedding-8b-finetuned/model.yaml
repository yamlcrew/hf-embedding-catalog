  sentences:
  - 'passage: Madde 362- Ana ve baba, velâyetleri veya yönetim hakları sona erince, çocuğun mallarını,

    hesabıyla birlikte ergin çocuğa, vasisine veya kayyıma devrederler.'
  - 'passage: Elbirliği mülkiyetine tabi taşınmazın cebri icra yoluyla satışı, icra mahkemesi aracılığıyla gerçekleştirilir.
    Bu süreçte, öncelikle icra takibi başlatılır, ardından taşınmazın değeri belirlenir ve satış işlemi yapılır. İntifa hakkının
    sona ermesi, borcun ödenmemesi nedeniyle taşınmazın cebri icra yoluyla satılması durumunda gerçekleşecektir.'
  - 'passage: Gemi ipoteği, geminin icradan satışı sonucunda elde edilen paranın tamamı ile sona ermeyebilir; ipotek, satış
    bedeli alacaklılar arasında paylaştırılsa bile sona erecektir.'
- source_sentence: 'query: Ceza Hukuku / Ceza Muhakemesi + İdare Hukuku / İdari Yargı alanında anayasa hakkında kaynak ne
    söylüyor?'
  sentences:
  - 'passage: Ceza Hukuku / Ceza Muhakemesi + İdare Hukuku / İdari Yargı. Vergi ödevinin ihlali durumunda, vergi kaçakçılığı,
    beyanname vermeme veya eksik beyan gibi durumlar yasal yaptırımlara ve cezai sorumluluğa tabi tutulur. bu yaptırımlar,
    para cezaları, hapis cezası ve diğer idari yaptırımları içerebilir. Kamu malının ihlali durumunda, izinsiz kullanım, tahrip
    etme veya zimmete geçirme gibi durumlar yasal yaptırımlara ve cezai sorumluluğa tabi tutulur. Rekabet ihlallerine karşı
    idari para cezaları, faaliyet durdurma, birleşme ve devralmaların iptali gibi yaptırımlar uygulanabilir. Taksilerin yolcuyu
    kısa mesafeye götürmeme hakları bulunmamaktadır. uymakla mükellef oldukları trafik kurallarından biri yolcuyu talep ettiği
    noktaya götürmektir. kısa mesafe yolcu almadığı tespit edilen taksilere idari para cezası uygulanır. İdari para cezası,
    idari makamlar tarafından yasaya aykırı davranışlar için verilen para cezasıdır ve belirli usullere göre uygulanır. İdari
    para cezası, kamu düzenini korumak amacıyla idari makamlar tarafından verilen para cezalarıdır. Trafik cezası, trafik
    kurallarına aykırı davranışlarda bulunan sürücülere veya yayalara uygulanan idari yaptırımdır.'
  - 'passage: Ceza Hukuku / Ceza Muhakemesi + İcra ve İflas Hukuku. Çocuk ceza almaz ancak tutuksuz yargılanabilir. ceza alması
    durumunu takip etmelisiniz. Çocuğun tutuksuz yargılanması ceza almayacağı anlamına gelmez. durumu takip etmeli ve hukuki
    danışmanlık almalısınız.'
  - 'passage: 2004 sayılı Kanun''un 20.02.2019 tarihli ve 7165 sayılı Kanun’un 2 nci maddesi ile değişik ek (1) inci maddesinin
    birinci fıkrasında 364 üncü maddesindeki parasal sınırın 213 sayılı Vergi Usul Kanununun mükerrer 298 inci maddesine göre
    her yıl tespit ve ilan edilecek yeniden değerleme oranında artırılması öngörülmüş ve 01.01.2024 tarihinden itibaren bu
    miktar 378.290,00 TL olarak belirlenmiştir. 2004 sayılı Kanun''un 20.02.2019 tarihli ve 7165 sayılı Kanun''un 2 nci maddesi
    ile değişik ek (1) inci maddesinin ikinci fıkrasına göre aynı Kanun''un 363 ve 364 üncü maddelerdeki parasal sınırların
    uygulanmasında hükmün verildiği tarihteki miktar esas alınır. Belirtilmelidir ki bir mahkeme kararının temyiz edilip edilemeyeceği
    belirlenirken, temyiz hakkının doğduğu (kararın verildiği) tarihteki hukuksal durum esas alınmalı, karar tarihinde yürürlükte
    bulunan kanun hükmü temyiz sınırı yönünden hangi düzenlemeyi içeriyor ise ona bağlı kalınmalıdır. Buradaki “karar” teriminin,
    Bölge Adliye Mahkemesinin Özel Daire bozmasına karşı verdiği direnme kararını da kapsayacağında duraksama bulunmamaktadır.
    2004 sayılı Kanun''un 5311 sayılı Kanun’un 25 inci maddesi ile değişik 364 üncü maddesinin ikinci fıkrasında ise temyiz
    yoluna başvurma ve incelemesinin 1086 sayılı Hukuk Usulü Muhakemeleri Kanunu (1086 sayılı Kanun) hükümlerine göre yapılacağı
    belirtilmiştir. 6100 sayılı Kanun''un 447 nci maddesinin ikinci fıkrası "Mevzuatta, yürürlükten kaldırılan 18/6/1927 tarihli
    ve 1086 sayılı Hukuk Usulü Muhakemeleri Kanununa yapılan yollamalar, Hukuk Muhakemeleri Kanununun bu hükümlerin karşılığını
    oluşturan maddelerine yapılmış sayılır." hükmünü içermektedir. Somut olayda; alacaklı vekili tarafından 2.000.000,00 TL
    bedelli bonoya dayalı olarak borçlu aleyhine kambiyo senetlerine özgü haciz yoluyla takip başlatılmış, takip talebinde
    asıl alacak miktarı 151.122,20 TL gösterilmiştir.'
