- source_sentence: 'query: Hukuk Genel Kurulu 2023/638 E., 2025/236 K. sayılı Yargıtay HGK kararında Kamulaştırmasız El Atma
    Davasında Tebligat ve İstinaf Süresi uyuşmazlığı bakımından temel değerlendirme nedir?'
  sentences:
  - 'passage: Bu hükümde Özel Dairelerce ilk derece mahkemesi sıfatıyla verilen kararlara karşı temyiz yoluna başvurulabileceği
    ve Hukuk Genel Kurulunun bu kararları temyiz yoluyla inceleyeceği belirtilmektedir. 14. Yargıtay ilgili hukuk dairesinin
    tazminat davası sonucunda vermiş olduğu kararlara karşı temyiz yoluna başvurulabilir; temyiz incelemesi, Yargıtay Hukuk
    Genel Kurulunca yapılır (Kuru, Baki: İstinaf Sistemine Göre Yazılmış Medenî Usul Hukuku, 2. Baskı, Kasım 2018 s. 645).
    15. Öte yandan Bölge Adliye Mahkemesi hukuk dairelerinin ilk derece mahkemesi sıfatıyla veya istinaf incelemesi sonucu
    verdiği kararlar için dahi ayrım yapılmaksızın 6100 sayılı Kanun’un 362. maddesinde belirtilen temyiz kesinlik sınırı
    uygulandığından Yargıtay Hukuk Dairelerince ilk derece mahkemesi sıfatıyla verilen kararların temyizi için de bu parasal
    sınırın esas alınması ve bu miktarı geçen kararlara karşı temyiz yolunun açık olduğunun kabul edilmesi gerekir. Aksinin
    kabulü hâlinde Kanun’un Bölge Adliye Mahkemesi için ilk derece mahkemesi veya istinaf incelemesi yapan mahkeme olarak
    tanıdığı parasal sınır dâhilinde kesin karar verme yetkisini Yargıtay Hukuk Dairelerine tanımadığı gibi bir sonuç ortaya
    çıkar ki, kanun koyucunun bunu amaçladığından bahsedilemez. 16. Yukarıda belirtildiği üzere miktar veya değeri kırk bin
    Türk Lirasını (bu tutar dâhil) geçmeyen davalara ilişkin kararlar temyiz edilemez. 6100 sayılı Kanun’un Ek 1. maddesindeki
    hüküm ile 362. maddedeki parasal sınırların her takvim yılı başından geçerli olmak üzere Maliye Bakanlığınca her yıl tespit
    ve ilan edilen yeniden değerleme oranında artırılması suretiyle uygulanacağı belirtilmiştir. Bu hükümlere göre hesaplama
    yapıldığında 2024 yılı için temyiz kesinlik sınırı 378.290,00 TL’dir. 17. Hukuk Muhakemeleri Kanunu’nun 366. maddesinin
    yollaması ile temyiz yolunda da uygulanan 346. maddesi uyarınca temyiz dilekçesi kesin olan bir karara ilişkin olursa
    kararı veren mahkeme temyiz dilekçesinin reddine karar verir.'
  - 'passage: III. İLK DERECE MAHKEMESİ KARARI İlk Derece Mahkemesinin 10.09.2020 tarihli ve 2018/240 Esas, 2020/170 Karar
    sayılı kararıyla; davanın kısmen kabulü ile 13.593,53 TL kamulaştırmasız el atma tazminatının dava tarihinden itibaren
