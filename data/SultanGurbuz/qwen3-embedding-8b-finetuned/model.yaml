    göre devredilmesi, inşaatın tamamlanma durumuna bağlı olarak arsa sahibinin belirli bir oranda arsa payını veya kat irtifaklı
    bağımsız bölümü müteahhide devretme taahhüdü vermesi nedeniyle günümüzde en sık tercih edilen uygulama biçimlerinden biridir.'
