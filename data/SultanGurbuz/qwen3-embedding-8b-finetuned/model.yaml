    dava konusu taşınmazın bilirkişi raporuna ekli krokide sarı renk ile gösterilen 311,62 m2''lik kısmı üzerinde davalı idare
    lehine irtifak hakkı tesisine ve tapuya tesciline karar verilmiştir. IV. İSTİNAF A. İstinaf Yoluna Başvuranlar İlk Derece
    Mahkemesinin yukarıda belirtilen kararına karşı süresi içinde davalı idare vekili ve katılma yolu ile davacı vekili istinaf
    başvurusunda bulunmuştur. B. Gerekçe ve Sonuç Bölge Adliye Mahkemesinin 30.09.2021 tarihli ve 2021/463 Esas, 2021/1172
    Karar sayılı kararıyla; davalı idare

    yönünden istinaf başvurusunun süresinde olmadığı, katılma yolu ile kararı istinaf eden davacı yönünden ise ilk istinafı
    yapan davalının başvurusu süresinde olmadığından 6100 sayılı Kanun''un 348/2. maddesi gereğince istemin reddine karar
    verilmiştir. V. BOZMA VE BOZMADAN SONRAKİ YARGILAMA SÜRECİ'
  - 'passage: Kiraya verenin bakmakla yükümlü olduğu kişiler, genellikle kiracının aile bireyleri veya kiracının bakımına
    muhtaç olan diğer kişiler olarak tanımlanabilir. İhtiyaç nedeniyle tahliye davası açma hakkı, kiralayanın kendisi, eşi,
    altsoyu, üstsoyu veya kanunen bakmakla yükümlü olduğu diğer kişilerin konut veya işyeri olarak taşınmaza ihtiyaçları olması
    durumunda tanınmaktadır. İhtiyaç nedeniyle tahliye davası açılması için kiralayanın kendisi, eşi, altsoyu, üstsoyu veya
    kanunen bakmakla yükümlü olduğu diğer kişilerin konut veya işyeri olarak taşınmaza ihtiyaçları olması gerekmektedir. Mahkeme,
    kiraya verenin ihtiyaç iddiasını değerlendirirken, tahliyesi istenen taşınmazın bulunduğu bölgede başka bir taşınmazının
    bulunup bulunmadığını araştıracaktır.'
- source_sentence: 'query: Borçlar Hukuku alanında I. Ceza hukuku ile ilişkisinde hakkında kaynak ne söylüyor?'
