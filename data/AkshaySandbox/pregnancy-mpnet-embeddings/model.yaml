  sentences:
  - 'You can refer to Practice Directive #2021-01 for more information on facilitating extra-provincial ward adoptions in
    British Columbia.'
  - No, a Care Plan is not required if the child/youth has no special service needs.
  - Licensed ECEC programs may fall under the responsibility of one or more ministries and departments, including education,
    health, family, and/or social services.
- source_sentence: What should be done if there are minor differences in openness requests?
  sentences:
  - If there are minor differences, it is advised to try to reach an acceptable compromise in a meeting.
  - Yes, the adoption can be completed in B.C. even if the child is from another province. However, the originating provincial
    or territorial child welfare authority is responsible for finalizing the adoption.
  - The new standards establish the breastfed child as the normative model for child growth and development.
