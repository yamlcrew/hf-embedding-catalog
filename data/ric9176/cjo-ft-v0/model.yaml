  - 'You’ve probably heard all about Versailles’ dazzling Hall of Mirrors and its gorgeous, well-manicured gardens – maybe
    you’ve even seen them IRL. But do you know about the role the French royal court played in not just spreading scientific
    knowledge, but making it fashionable, too? The Science Museum’s latest exhibition, ‘Versailles: Science And Splendour’,
    will uncover that lesser-talked-about side of the palace’s history, diving into the royal family’s relationship with science,
    women’s impact on medicine, philosophy and botany at the royal court, and showcasing more than 100 items that reinforce
    those stories – many of which have never been displayed in the UK before.'
  - 'Steve Beech / ShutterstockPhotograph: Steve Beech / ShutterstockLondon events in March 2025Our guide to the best events,
    festivals, workshops, exhibitions and things to do throughout March 2025 in LondonWednesday 12 February 2025ShareCopy
    LinkFacebookTwitterPinterestEmailWhatsAppWritten by Rosie HewitsonThings to Do Editor, LondonAdvertisingThe days are getting
    gradually lighter, the snowdrops and crocuses have arrived in London’s park, and London’s cultural scene has burst into
    life after a mid-winter lull. It can only mean one thing; March is right around the corner.'
