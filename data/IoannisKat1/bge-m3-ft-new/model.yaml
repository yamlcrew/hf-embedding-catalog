      \ the transferred amounts with an ATM card, as well as directly transferring smaller amounts from the complainants'\
      \ accounts to her personal account she had opened at the same bank), indicating her purpose to generate income, with\
      \ the financial benefit she gained, corresponding to the complainants' damage, exceeding a total of €30,000."
  - source_sentence: Who is responsible for monitoring the application of this Regulation?
    sentences:
    - 'Everyone who obtains access to data recorded in a computer or in the external memory of a computer or transmitted by
      telecommunication systems shall be punished with imprisonment for up to six months or by a fine from 29 to 15,000 Euro,
      under the condition that these acts have been committed without right, especially in violation of prohibitions or of
      security measures taken by the legal holder. If the act concerns the international relations or the security of the
      State, he shall be punished according to Article 148.

      If the offender is in the service of the legal holder of the data, the act of the preceding paragraph shall be punished
      only if it has been explicitly prohibited by internal regulations or by a written decision of the holder or of a competent
      employee of his.

      '
    - The protection of natural persons with regard to the processing of personal data by competent authorities for the purposes
      of the prevention, investigation, detection or prosecution of criminal offences or the execution of criminal penalties,
      including the safeguarding against and the prevention of threats to public security and the free movement of such data,
      is the subject of a specific Union legal act. This Regulation should not, therefore, apply to processing activities
      for those purposes. However, personal data processed by public authorities under this Regulation should, when used for
      those purposes, be governed by a more specific Union legal act, namely Directive (EU) 2016/680 of the European Parliament
      and of the Council (1). Member States may entrust competent authorities within the meaning of Directive (EU) 2016/680
      with tasks which are not necessarily carried out for the purposes of the prevention, investigation, detection or prosecution
      of criminal offences or the execution of criminal penalties, including the safeguarding against and prevention of threats
      to public security, so that the processing of personal data for those other purposes, in so far as it is within the
      scope of Union law, falls within the scope of this Regulation. With regard to the processing of personal data by those
      competent authorities for purposes falling within scope of this Regulation, Member States should be able to maintain
      or introduce more specific provisions to adapt the application of the rules of this Regulation. Such provisions may
      determine more precisely specific requirements for the processing of personal data by those competent authorities for
      those other purposes, taking into account the constitutional, organisational and administrative structure of the respective
      Member State. When the processing of personal data by private bodies falls within the scope of this Regulation, this
      Regulation should provide for the possibility for Member States under specific conditions to restrict by law certain
      obligations and rights when such a restriction constitutes a necessary and proportionate measure in a democratic society
      to safeguard specific important interests including public security and the prevention, investigation, detection or
      prosecution of criminal offences or the execution of criminal penalties, including the safeguarding against and the
      prevention of threats to public security. This is relevant for instance in the framework of anti-money laundering or
      the activities of forensic laboratories.
    - '1.The Board shall ensure the consistent application of this Regulation. To that end, the Board shall, on its own initiative
      or, where relevant, at the request of the Commission, in particular: (a)  monitor and ensure the correct application
      of this Regulation in the cases provided for in Articles 64 and 65 without prejudice to the tasks of national supervisory
      authorities; 4.5.2016 L 119/76   (b)  advise the Commission on any issue related to the protection of personal data
      in the Union, including on any proposed amendment of this Regulation; (c)  advise the Commission on the format and procedures
      for the exchange of information between controllers, processors and supervisory authorities for binding corporate rules;
      (d)  issue guidelines, recommendations, and best practices on procedures for erasing links, copies or replications of
      personal data from publicly available communication services as referred to in Article 17(2); (e)  examine, on its own
      initiative, on request of one of its members or on request of the Commission, any question covering the application
      of this Regulation and issue guidelines, recommendations and best practices in order to encourage consistent application
      of this Regulation; (f)  issue guidelines, recommendations and best practices in accordance with point (e) of this paragraph
      for further specifying the criteria and conditions for decisions based on profiling pursuant to Article 22(2); (g)  issue
      guidelines, recommendations and best practices in accordance with point (e) of this paragraph for establishing the personal
      data breaches and determining the undue delay referred to in Article 33(1) and (2) and for the particular circumstances
      in which a controller or a processor is required to notify the personal data breach; (h)  issue guidelines, recommendations
      and best practices in accordance with point (e) of this paragraph as to the circumstances in which a personal data breach
      is likely to result in a high risk to the rights and freedoms of the natural persons referred to in Article 34(1). (i)  issue
      guidelines, recommendations and best practices in accordance with point (e) of this paragraph for the purpose of further
      specifying the criteria and requirements for personal data transfers based on binding corporate rules adhered to by
      controllers and binding corporate rules adhered to by processors and on further necessary requirements to ensure the
      protection of personal data of the data subjects concerned referred to in Article 47; (j)  issue guidelines, recommendations
      and best practices in accordance with point (e) of this paragraph for the purpose of further specifying the criteria
      and requirements for the personal data transfers on the basis of Article 49(1); (k)  draw up guidelines for supervisory
      authorities concerning the application of measures referred to in Article 58(1), (2) and (3) and the setting of administrative
      fines pursuant to Article 83; (l)  review the practical application of the guidelines, recommendations and best practices
      referred to in points (e) and (f); (m)  issue guidelines, recommendations and best practices in accordance with point
      (e) of this paragraph for establishing common procedures for reporting by natural persons of infringements of this Regulation
      pursuant to Article 54(2); (n)  encourage the drawing-up of codes of conduct and the establishment of data protection
      certification mechanisms and data protection seals and marks pursuant to Articles 40 and 42; (o)  carry out the accreditation
      of certification bodies and its periodic review pursuant to Article 43 and maintain a public register of accredited
      bodies pursuant to Article 43(6) and of the accredited controllers or processors established in third countries pursuant
      to Article 42(7); (p)  specify the requirements referred to in Article 43(3) with a view to the accreditation of certification
      bodies under Article 42; (q)  provide the Commission with an opinion on the certification requirements referred to in
      Article 43(8); (r)  provide the Commission with an opinion on the icons referred to in Article 12(7); (s)  provide the
      Commission with an opinion for the assessment of the adequacy of the level of protection in a third country or international
      organisation, including for the assessment whether a third country, a territory or one or more specified sectors within
      that third country, or an international organisation no longer ensures an adequate level of protection. To that end,
      the Commission shall provide the Board with all necessary documentation, including correspondence with the government
      of the third country, with regard to that third country, territory or specified sector, or with the international organisation.
      4.5.2016 L 119/77   (t)  issue opinions on draft decisions of supervisory authorities pursuant to the consistency mechanism
      referred to in Article 64(1), on matters submitted pursuant to Article 64(2) and to issue binding decisions pursuant
      to Article 65, including in cases referred to in Article 66; (u)  promote the cooperation and the effective bilateral
      and multilateral exchange of information and best practices between the supervisory authorities; (v)  promote common
      training programmes and facilitate personnel exchanges between the supervisory authorities and, where appropriate, with
      the supervisory authorities of third countries or with international organisations; (w)  promote the exchange of knowledge
      and documentation on data protection legislation and practice with data protection supervisory authorities worldwide.
      (x)  issue opinions on codes of conduct drawn up at Union level pursuant to Article 40(9); and (y)  maintain a publicly
      accessible electronic register of decisions taken by supervisory authorities and courts on issues handled in the consistency
      mechanism.

      2.Where the Commission requests advice from the Board, it may indicate a time limit, taking into account the urgency
      of the matter.

      3.The Board shall forward its opinions, guidelines, recommendations, and best practices to the Commission and to the
      committee referred to in Article 93 and make them public.

      4.The Board shall, where appropriate, consult interested parties and give them the opportunity to comment within a reasonable
      period. The Board shall, without prejudice to Article 76, make the results of the consultation procedure publicly available.'
  - source_sentence: Who is responsible for carrying out the review to assess processing?
    sentences:
    - "1.Where a type of processing in particular using new technologies, and taking into account the nature, scope, context\
      \ and purposes of the processing, is likely to result in a high risk to the rights and freedoms of natural persons,\
      \ the controller shall, prior to the processing, carry out an assessment of the impact of the envisaged processing operations\
      \ on the protection of personal data. A single assessment may address a set of similar processing operations that present\
      \ similar high risks.\n2.The controller shall seek the advice of the data protection officer, where designated, when\
      \ carrying out a data protection impact assessment.\n3.A data protection impact assessment referred to in paragraph\
      \ 1 shall in particular be required in the case of: (a)  a systematic and extensive evaluation of personal aspects relating\
      \ to natural persons which is based on automated processing, including profiling, and on which decisions are based that\
      \ produce legal effects concerning the natural person or similarly significantly affect the natural person; (b)  processing\
      \ on a large scale of special categories of data referred to in Article 9(1), or of personal data relating to criminal\
      \ convictions and offences referred to in Article 10; or (c)  a systematic monitoring of a publicly accessible area\
      \ on a large scale.\n4.The supervisory authority shall establish and make public a list of the kind of processing operations\
      \ which are subject to the requirement for a data protection impact assessment pursuant to paragraph 1. The supervisory\
      \ authority shall communicate those lists to the Board referred to in Article 68\n5.The supervisory authority may also\
      \ establish and make public a list of the kind of processing operations for which no data protection impact assessment\
      \ is required. The supervisory authority shall communicate those lists to the Board.\n6.Prior to the adoption of the\
      \ lists referred to in paragraphs 4 and 5, the competent supervisory authority shall apply the consistency mechanism\
      \ referred to in Article 63 where such lists involve processing activities which are related to the offering of goods\
      \ or services to data subjects or to the monitoring of their behaviour in several Member States, or may substantially\
      \ affect the free movement of personal data within the Union. 4.5.2016 L 119/53  \n7.The assessment shall contain at\
      \ least: (a)  a systematic description of the envisaged processing operations and the purposes of the processing, including,\
      \ where applicable, the legitimate interest pursued by the controller; (b)  an assessment of the necessity and proportionality\
      \ of the processing operations in relation to the purposes; (c)  an assessment of the risks to the rights and freedoms\
      \ of data subjects referred to in paragraph 1; and (d)  the measures envisaged to address the risks, including safeguards,\
      \ security measures and mechanisms to ensure the protection of personal data and to demonstrate compliance with this\
      \ Regulation taking into account the rights and legitimate interests of data subjects and other persons concerned.\n\
      8.Compliance with approved codes of conduct referred to in Article 40 by the relevant controllers or processors shall\
      \ be taken into due account in assessing the impact of the processing operations performed by such controllers or processors,\
      \ in particular for the purposes of a data protection impact assessment.\n9.Where appropriate, the controller shall\
      \ seek the views of data subjects or their representatives on the intended processing, without prejudice to the protection\
      \ of commercial or public interests or the security of processing operations.\n10.Where processing pursuant to point\
      \ (c) or (e) of Article 6(1) has a legal basis in Union law or in the law of the Member State to which the controller\
      \ is subject, that law regulates the specific processing operation or set of operations in question, and a data protection\
      \ impact assessment has already been carried out as part of a general impact assessment in the context of the adoption\
      \ of that legal basis, paragraphs 1 to 7 shall not apply unless Member States deem it to be necessary to carry out such\
      \ an assessment prior to processing activities.\n11. Where necessary, the controller shall carry out a review to assess\
      \ if processing is performed in accordance with the data protection impact assessment at least when there is a change\
      \ of the risk represented by processing operations."
    - "**Court (Civil/Criminal): Civil**  \n**Provisions:**  \n**Time of commission of the act:**  \n**Outcome (not guilty,\
      \ guilty):**  \n**Reasoning:** Claim for compensation and monetary satisfaction due to moral damage against a mobile\
      \ phone company and a credit institution within the framework of inadequate fulfillment of a payment services contract\
      \ for \"web banking.\" Appropriate actions for mobile phone companies in case of a request for a \"sim\" card replacement\
      \ due to wear or loss. They must verify the customer's identity based on the personal details and identification information\
      \ registered in their system but are not liable for any changes in the latter that were not timely communicated to them.\
      \ Further security measures such as phone communication or sending an SMS to the mobile number holder are not required.\
      \ Payment services under Law 4357/2018. Obligation of the payment service provider, such as banks, to inform the payer\
      \ after receiving a relevant order for making a payment. The content of this varies per case, such as sending a personalized\
      \ code to the user's mobile phone for transaction approval, as well as sending an email immediately after its completion.\
      \ However, the bank is not liable for customer damage resulting from illicit electronic transactions due to third-party\
      \ interception of either the access codes for electronic banking transactions or the sim card and the phone number to\
      \ which the personalized codes for approving the aforementioned transactions are sent, within the framework of increased\
      \ security protocols. Appropriate actions by banks upon diagnosing illicit banking transactions that may be fraudulent.\
      \ Relevant criteria for consideration. The evidence did not indicate negligent and thus tortious behavior from all defendants.\
      \ The claim is dismissed.  \n\n**Facts:** In the present claim, upon due assessment of its content, the plaintiff states\
      \ that he has a mobile phone subscription with the first defendant, a mobile phone company. On October 26, 2020, in\
      \ the morning, he realized that his mobile phone was offline, and by noon, he received email notifications from Bank\
      \ .......... and ............ (whose third and fourth defendants are de facto universal successors, respectively), with\
      \ which he holds an account, regarding transactions he had made. From phone calls from his home phone to Bank ..............\
      \ and ............ Bank, he was informed that on the same day, in a very short period, four money transfers had been\
      \ made from the account he maintains at Bank .............., specifically, an amount of €15,000 was transferred to the\
      \ account mentioned in the claim document under the name ..........., at ........ an amount of €15,000 was transferred\
      \ to the account mentioned in the claim document under the name ......... at ........... Bank, an amount of €15,000\
      \ was transferred to the plaintiff's account with his daughter as a co-holder at ......... Bank, and an amount of €6,700\
      \ was transferred from another of his accounts to the account from which the transfer to the aforementioned accounts\
      \ of €45,000 was made. Additionally, from the plaintiff's account with his daughter as a co-holder at .......... Bank,\
      \ an amount of €9,999 was transferred to an account under the name of .... . He attempted to log into the online banking\
      \ service of Bank ......... from his home computer, but found that the service was locked, while regarding the corresponding\
      \ service of ........... Bank, he requested alongside his daughter to 'lock' it. In a phone call with the call center\
      \ of Bank ............, he was informed about the locking of his electronic account in the online banking service and\
      \ was told to dispute the transactions, which he did immediately through ... banking, while his daughter communicated\
      \ about this with ....... Bank. The transfer to the account with the beneficiary was canceled, and the amount of €15,000\
      \ was returned to the plaintiff. After his investigation, he discovered that an unknown individual appeared at the branch\
      \ of the first defendant, served by the second defendant, who posed as the plaintiff and presented a forged military\
      \ ID card of the plaintiff, requesting and receiving a new sim card, resulting in the deactivation of the plaintiff's\
      \ sim card and gaining access to the codes sent to him by the banks for completing the transfers. Due to the negligence\
      \ of the second defendant, he did not realize that the identity used was forged, as since 2010, when the plaintiff retired,\
      \ he has had a police identification card. The first defendant does not have security protocols to prevent such incidents,\
      \ which constitute the sim .... method, despite the issuance of a press release from the Attica Security and numerous\
      \ publications regarding the aforementioned method, unlike other mobile phone companies, which implement a specific\
      \ procedure for changing sim cards. The second defendant did not take the obvious step to check the functioning of the\
      \ sim card before replacing it, where he would have realized that the plaintiff's mobile phone was functioning normally.\
      \ Bank .......... and ........... Bank: a) accepted requests for transferring large amounts of money from accounts that\
      \ had no similar activity in the past, while the plaintiff's online banking account with the above banks was locked\
      \ quite some time later, b) sent email notifications regarding successful transactions in succession, under a single\
      \ email, c) did not check the address ... of the perpetrators, which was different from that used by the plaintiff,\
      \ and d) did not take necessary security measures to prevent fraud via sim ... against the plaintiff, as the security\
      \ code (pin) sent by the banks via message to the mobile phone proved to be compromised. As a result of the above illegal\
      \ and culpable behavior of the defendants, the plaintiff suffered property damage amounting to a total of €24,999, which\
      \ constitutes the total amount of the transfers made by third unknown persons to accounts of unknown individuals, as\
      \ stated above, and has not been refunded despite his repeated inquiries, while he also suffered distress and mental\
      \ anguish, and his trust in the banks was shaken, thus entitling him to monetary compensation for his moral damage,\
      \ amounting to €5,000."
    - "**Court (Civil/Criminal): Civil  \nProvisions:  \nTime of commission of the act:  \nOutcome (not guilty, guilty): Rejects\
      \ the lawsuit.  \nReasoning:  \nFacts: The plaintiff holds account number ....................... at the defendant bank.\
      \ Following the application/contract dated January 9, 2019, the plaintiff became a subscriber to the alternative service\
      \ networks provided by the defendant bank through online banking (.........................). In the aforementioned\
      \ application, the plaintiff stated that her mobile phone (number .................) would be used by the defendant\
      \ to send additional security codes for the approval of her transactions via .......................... It is noted\
      \ that the plaintiff received subscriber code .................., thus enabling her to conduct transactions without\
      \ her physical presence at the branches of the defendant bank, from fixed or mobile devices (computers, smartphones,\
      \ tablets), by entering her username and password to access her personal account. Regarding the identification methods,\
      \ these were agreed upon between the parties and are specified depending on the payment method used. More specifically,\
      \ the plaintiff had installed the application ...................................... on her mobile phone. According\
      \ to the terms of the above contract between the parties, the defendant bank (to ensure the protection of its customers\
      \ in using this application) requires three stages of identification: 1) the input of the customer's personal codes\
      \ (username and password) in the application .........................., 2) the input of a six-digit code (...................)\
      \ sent via SMS to the mobile number provided by the customer, to complete the login to .............................\
      \ and 3) the input of a new six-digit code (.................) sent in a new SMS to the mobile number provided by the\
      \ customer, to authenticate the device on which the aforementioned application is installed (usually a mobile phone).\
      \ \n\nFurthermore, it was established that on October 4, 2021, at 00:07, the plaintiff received a text message (SMS)\
      \ on her mobile phone (number ...................) with the following content: \".................................\"\
      , i.e., \"..........: a payment was attempted from a new device. If this was not you, please visit...\", providing the\
      \ above link. As she acknowledges in her lawsuit, she followed the link that was sent to her via SMS and entered her\
      \ login credentials (i.e., username and password) on the (fake) page she was redirected to. Thus, the perpetrators acquired\
      \ the plaintiff's personal information and subsequently entered it into the application ...........................\
      \ that they had installed on their own mobile phone. Following this, to complete the second stage of the process, as\
      \ described above, the defendant bank sent the aforementioned date and time of 00:14, a security code to the plaintiff's\
      \ mobile phone via SMS, with the content \".................................`.\" Subsequently, the defendant sent, at\
      \ 00:17, another SMS to the plaintiff's mobile phone with the security code .................., containing the message\
      \ \".........................................\", to complete the third stage of identification. It is noted that the\
      \ defendant sent another message to the plaintiff's mobile phone at 00:15, specifically \"..........................\"\
      , which was not used (perhaps because it was entered incorrectly by the plaintiff). It was later proven that the unknown\
      \ perpetrators charged the plaintiff's account with a total amount of €2,800.00 and an equivalent credit to a bank account\
      \ held similarly at the defendant bank, with the beneficiary being ............. The plaintiff contacted the defendant,\
      \ submitting a dispute over the above transactions and simultaneously filed a complaint against any responsible party\
      \ for the crimes of fraud and embezzlement. The defendant locked the plaintiff's subscription and provided her with\
      \ new codes, warning her not to use the aforementioned application via her mobile phone unless she scanned it with updated\
      \ antivirus/antispyware/malware software. Additionally, the defendant froze the account to which her money was transferred,\
      \ which, as mentioned earlier, belongs to ................., who also stated that she fell victim to electronic fraud,\
      \ being used by the aforementioned perpetrators as a front person. It was further established that the above-mentioned\
      \ ......................... consented to the return to the plaintiff of the amount of €239.54, which remained in her\
      \ account (as part of the aforementioned €2,800.00), while the plaintiff stated in a declaration that after the crediting\
      \ of her account with the amount of €239.54, she has no further claims against the defendant regarding the above history.\
      \ From the above proven facts, it was established that the plaintiff accessed the fraudulent page, entering her username\
      \ and password and subsequently the codes ....., which were sent to her mobile phone by the defendant bank. Regarding\
      \ the defendant, it was established that through its website ......................, through the login page to ................\
      \ and via messages to its subscribers, it informs them in detail about the risks of code interception and the protective\
      \ measures they should take, while it also informs them with a special announcement about phishing. For this reason,\
      \ the plaintiff's assertion that the perpetrators used one-time codes ......, violating the defendant's security systems,\
      \ must be dismissed as unfounded. Therefore, since the defendant successfully identified the plaintiff's identity as\
      \ well as her mobile phone without any indication of a breach of its electronic systems, the defendant is not liable\
      \ for the plaintiff's loss from the transfer of funds to an unknown person's account, nor is it responsible for compensating\
      \ that loss. Given these circumstances, the lawsuit must be dismissed as fundamentally unfounded.**"
  - source_sentence: What may impede authorities in the discharge of their responsibilities under Union law?
    sentences:
    - The objectives and principles of Directive 95/46/EC remain sound, but it has not prevented fragmentation in the implementation
      of data protection across the Union, legal uncertainty or a widespread public perception that there are significant
      risks to the protection of natural persons, in particular with regard to online activity. Differences in the level of
      protection of the rights and freedoms of natural persons, in particular the right to the protection of personal data,
      with regard to the processing of personal data in the Member States may prevent the free flow of personal data throughout
      the Union. Those differences may therefore constitute an obstacle to the pursuit of economic activities at the level
      of the Union, distort competition and impede authorities in the discharge of their responsibilities under Union law.
      Such a difference in levels of protection is due to the existence of differences in the implementation and application
      of Directive 95/46/EC.
    - The processing of personal data for archiving purposes in the public interest, scientific or historical research purposes
      or statistical purposes should be subject to appropriate safeguards for the rights and freedoms of the data subject
      pursuant to this Regulation. Those safeguards should ensure that technical and organisational measures are in place
      in order to ensure, in particular, the principle of data minimisation. The further processing of personal data for archiving
      purposes in the public interest, scientific or historical research purposes or statistical purposes is to be carried
      out when the controller has assessed the feasibility to fulfil those purposes by processing data which do not permit
      or no longer permit the identification of data subjects, provided that appropriate safeguards exist (such as, for instance,
      pseudonymisation of the data). Member States should provide for appropriate safeguards for the processing of personal
      data for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes.
      Member States should be authorised to provide, under specific conditions and subject to appropriate safeguards for data
      subjects, specifications and derogations with regard to the information requirements and rights to rectification, to
      erasure, to be forgotten, to restriction of processing, to data portability, and to object when processing personal
      data for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes.
      The conditions and safeguards in question may entail specific procedures for data subjects to exercise those rights
      if this is appropriate in the light of the purposes sought by the specific processing along with technical and organisational
      measures aimed at minimising the processing of personal data in pursuance of the proportionality and necessity principles.
      The processing of personal data for scientific purposes should also comply with other relevant legislation such as on
      clinical trials.
    - In order to ensure consistent monitoring and enforcement of this Regulation throughout the Union, the supervisory authorities
      should have in each Member State the same tasks and effective powers, including powers of investigation, corrective
      powers and sanctions, and authorisation and advisory powers, in particular in cases of complaints from natural persons,
      and without prejudice to the powers of prosecutorial authorities under Member State law, to bring infringements of this
      Regulation to the attention of the judicial authorities and engage in legal proceedings. Such powers should also include
      the power to impose a temporary or definitive limitation, including a ban, on processing. Member States may specify
      other tasks related to the protection of personal data under this Regulation. The powers of supervisory authorities
      should be exercised in accordance with appropriate procedural safeguards set out in Union and Member State law, impartially,
      fairly and within a reasonable time. In particular each measure should be appropriate, necessary and proportionate in
      view of ensuring compliance with this Regulation, taking into account the circumstances of each individual case, respect
      the right of every person to be heard before any individual measure which would affect him or her adversely is taken
      and avoid superfluous costs and excessive inconveniences for the persons concerned. Investigatory powers as regards
      access to premises should be exercised in accordance with specific requirements in Member State procedural law, such
      as the requirement to obtain a prior judicial authorisation. Each legally binding measure of the supervisory authority
      should be in writing, be clear and unambiguous, indicate the supervisory authority which has issued the measure, the
      date of issue of the measure, bear the signature of the head, or a member of the supervisory authority authorised by
      him or her, give the reasons for the measure, and refer to the right of an effective remedy. This should not preclude
      additional requirements pursuant to Member State procedural law. The adoption of a legally binding decision implies
      that it may give rise to judicial review in the Member State of the supervisory authority that adopted the decision.
