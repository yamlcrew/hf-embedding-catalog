- source_sentence: What does paragraph 1 not apply to?
  sentences:
  - '1.Each supervisory authority shall be competent for the performance of the tasks assigned to and the exercise of the
    powers conferred on it in accordance with this Regulation on the territory of its own Member State.

    2.Where processing is carried out by public authorities or private bodies acting on the basis of point (c) or (e) of Article
    6(1), the supervisory authority of the Member State concerned shall be competent. In such cases Article 56 does not apply.

    3.Supervisory authorities shall not be competent to supervise processing operations of courts acting in their judicial
    capacity.'
  - '1.Processing of personal data revealing racial or ethnic origin, political opinions, religious or philosophical beliefs,
    or trade union membership, and the processing of genetic data, biometric data for the purpose of uniquely identifying
    a natural person, data concerning health or data concerning a natural person''s sex life or sexual orientation shall be
    prohibited.

    2.Paragraph 1 shall not apply if one of the following applies: (a)  the data subject has given explicit consent to the
    processing of those personal data for one or more specified purposes, except where Union or Member State law provide that
    the prohibition referred to in paragraph 1 may not be lifted by the data subject; (b)  processing is necessary for the
    purposes of carrying out the obligations and exercising specific rights of the controller or of the data subject in the
    field of employment and social security and social protection law in so far as it is authorised by Union or Member State
    law or a collective agreement pursuant to Member State law providing for appropriate safeguards for the fundamental rights
    and the interests of the data subject; (c)  processing is necessary to protect the vital interests of the data subject
    or of another natural person where the data subject is physically or legally incapable of giving consent; (d)  processing
    is carried out in the course of its legitimate activities with appropriate safeguards by a foundation, association or
    any other not-for-profit body with a political, philosophical, religious or trade union aim and on condition that the
    processing relates solely to the members or to former members of the body or to persons who have regular contact with
    it in connection with its purposes and that the personal data are not disclosed outside that body without the consent
    of the data subjects; (e)  processing relates to personal data which are manifestly made public by the data subject; (f)  processing
    is necessary for the establishment, exercise or defence of legal claims or whenever courts are acting in their judicial
    capacity; (g)  processing is necessary for reasons of substantial public interest, on the basis of Union or Member State
    law which shall be proportionate to the aim pursued, respect the essence of the right to data protection and provide for
    suitable and specific measures to safeguard the fundamental rights and the interests of the data subject; (h)  processing
    is necessary for the purposes of preventive or occupational medicine, for the assessment of the working capacity of the
    employee, medical diagnosis, the provision of health or social care or treatment or the management of health or social
    care systems and services on the basis of Union or Member State law or pursuant to contract with a health professional
    and subject to the conditions and safeguards referred to in paragraph 3; (i)  processing is necessary for reasons of public
    interest in the area of public health, such as protecting against serious cross-border threats to health or ensuring high
    standards of quality and safety of health care and of medicinal products or medical devices, on the basis of Union or
    Member State law which provides for suitable and specific measures to safeguard the rights and freedoms of the data subject,
    in particular professional secrecy; 4.5.2016 L 119/38   (j)  processing is necessary for archiving purposes in the public
    interest, scientific or historical research purposes or statistical purposes in accordance with Article 89(1) based on
    Union or Member State law which shall be proportionate to the aim pursued, respect the essence of the right to data protection
    and provide for suitable and specific measures to safeguard the fundamental rights and the interests of the data subject.

    3.Personal data referred to in paragraph 1 may be processed for the purposes referred to in point (h) of paragraph 2 when
    those data are processed by or under the responsibility of a professional subject to the obligation of professional secrecy
    under Union or Member State law or rules established by national competent bodies or by another person also subject to
    an obligation of secrecy under Union or Member State law or rules established by national competent bodies.

    4.Member States may maintain or introduce further conditions, including limitations, with regard to the processing of
    genetic data, biometric data or data concerning health.'
  - 'Any person who, in contravention of the provisions of this law or of the provisions of lawfully ratified multilateral
    international conventions on the protection of copyright, unlawfully makes a fixation of a work or of copies, reproduces
    them directly or indirectly, temporarily or permanently in any form, in whole or in part, translates, adapts, alters or
    transforms them, or distributes them to the public by sale or other means, or possesses with the intent of distributing
    them, rents, performs in public, broadcasts by radio or television or any other means, communicates to the public works
    or copies by any means, imports copies of a work illegally produced abroad without the consent of the author and, in general,
    exploits works, reproductions or copies being the object of copyright or acts against the moral right of the author to
    decide freely on the publication and the presentation of his work to the public without additions or deletions, shall
    be liable to imprisonment of no less than a year and to a fine from 2.900-15.000 Euro.

    Without the permission of the performers: fixes their performance; directly or indirectly, temporarily or permanently
    reproduces by any means and form, in whole or in part, the fixation of their performance; distributes to the public the
    fixation of their performance or possesses them with the purpose of distribution; rents the fixation of their performance;
    broadcasts by radio and television by any means, the live performance, unless such broadcasting is rebroadcasting of a
    legitimate broadcasting; communicates to the public the live performance made by any means, except radio and television
    broadcasting; makes available to the public, by wire or wireless means, in such a way that members of the public may access
    them from a place and at a time individually chosen by them, the fixation of their performance.

    Without the permission of phonogram producers (producers of sound recordings): directly or indirectly, temporarily or
    permanently reproduces by any means and form, in whole or in part, their phonograms; distributes to the public the above
    recordings, or possesses them with the purpose of distribution; rents the said recordings; makes available to the public,
    by wire or wireless means, in such a way that members of the public may access them from a place and at a time individually
    chosen by them, their phonograms; imports the said recordings produced abroad without their consent.

    Without the permission of producers of audiovisual works (producers of visual or sound and visual recordings): directly
    or indirectly, temporarily or permanently reproduces by any means and form, in whole or in part, the original and the
    copies of their films; distributes to the public the above recordings, including the copies thereof, or possesses them
    with the purpose of distribution; rents the said recordings; makes available to the public, by wire or wireless means,
    in such a way that members of the public may access them from a place and at a time individually chosen by them, the original
    and the copies of their films; imports the said recordings produced abroad without their consent; broadcasts by radio
    or television by any means including satellite transmission and cable retransmission, as well as the communication to
    the public.

    Without the permission of radio and television organizations: rebroadcasts their broadcasts by any means; presents their
    broadcasts to the public in places accessible to the public against payment of an entrance fee; fixes their broadcasts
    on sound or sound and visual recordings, regardless of whether the broadcasts are transmitted by wire or by the air, including
    by cable or satellite; directly or indirectly, temporarily or permanently reproduces by any means and form, in whole or
    in part, the fixation of their broadcasts; distributes to the public the recordings containing the fixation or their broadcasts;
    rents the recordings containing the fixation of their broadcasts; makes available to the public, by wire or wireless means,
    in such a way that members of the public may access them from a place and at a time individually chosen by them, the fixation
    of their broadcasts.

    If the financial gain sought or the damage caused by the perpetration of an act listed in paragraphs (1) and (2), above,
    is particularly great, the sanction shall be not less than two years imprisonment and a fine of from 2 to 10 million drachmas.
    If the guilty party has perpetrated any of the aforementioned acts by profession or at a commercial scale or if the circumstances
    in connection with the perpetration of the act indicate that the guilty party poses a serious threat to the protection
    of copyright or related rights, the sanction shall be imprisonment of up to ten (10) years and a fine of from 5 to 10
    million drachmas, together with the withdrawal of the trading license of the undertaking which has served as the vehicle
    for the act. The act shall be likewise deemed to have been perpetrated by way of standard practice if the guilty party
    has on a previous occasion been convicted of a contravention pursuant to the provisions of the Article or for a violation
    of the preceding copyright legislation and sentenced to a non-redeemable period of imprisonment. Any infringement of copyright
    and related rights in the form of felony is tried by the competent Three-member Court of Appeal for Felonies.

    Any person who did not pay the remuneration provided for by Article 18, paragraph (3) hereof to a collecting society is
    punished with the sanction of paragraph (1), (2) and (3). The same sentence is imposed on the debtor who, after the issuance
    of the decision of the one-member first instance court, does not submit the declaration under the provisions of article
    18, par. 6, of this law.

    The sanctions specified in paragraph (1), above, shall be applicable likewise to any person who: uses or distributes,
    or possesses with the intent to distribute, any system or means whose sole purpose is to facilitate the unpermitted removal
    or neutralization of a technical system used to protect a computer program; manufactures or imports or distributes, or
    possesses with intent to distribute, equipment and other materials utilizable for the reproduction of a work which do
    not conform to the specifications determined pursuant to Article 59 of this Law; manufactures or imports or distributes,
    or possesses with intent to distribute, objects which can thwart the efficacy of the above-mentioned specifications, or
    engages in an act which can have that result; reproduces or uses a work without utilizing the equipment or without applying
    the systems specified pursuant to Article 60 of this Law; distributes, or possesses with intent to distribute, a phonogram
    or film without the special mark or control label specified pursuant to Article 61 of this Law.

    Where a sentence of imprisonment is imposed with the option of redeemability, the sum payable for the redemption shall
    be 10 times the sum specified as per the case in the Penal Code.

    Where mitigating circumstances exist, the fine imposed shall not be less than half of the minimum fine imposable as per
    the case under this Law.

    Any person who proceeds to authorized temporary or permanent reproduction of the database, translation, adaptation, arrangement
    and any other alteration of the database, distribution to the public of the database or of copies thereof, communication,
    display or performance of the database to the public, is punished by imprisonment of at least one (1) year and a fine
    of one (1) to five (5) million drachmas.

    Any person who proceeds to extraction and/or re-utilization of the whole or of a substantial part of the contents of the
    database without the authorization of the author thereof, is punished by imprisonment of at least one (1) year and a fine
    of one (1) to five (5) million drachmas (article 12 of Directive 96/9).

    When the object of the infringement refers to computer software, the culpable character of the action, as described in
    paragraph 1 of article 65A and under the prerequisites provided there, is raised under the condition that the infringer
    proceeds in the unreserved payment of the administrative fee and the infringement concerns a quantity of up to 50 programs.

    When the object of infringement concerns recordings of sound in which a work protected by copyright law has been recorded,
    the unreserved payment of an administrative fee according to the stipulation of par.2 of article 65A and under the prerequisites
    provided there, the culpable character of the action is raised under the condition that the infringement concerns a quantity
    of up to five hundred (500) illegal sound recording carriers.

    The payment of the administrative fee and the raising of the culpable character of the action, do not relieve the infringers
    from the duty of buying off the copyright and related rights or from the duty of compensating and paying the rest expenses
    to the holders of these rights, according to the provisions of the relevant laws.

    In case of recidivism during the same financial year the administrative fee provided for by article 65A doubles.

