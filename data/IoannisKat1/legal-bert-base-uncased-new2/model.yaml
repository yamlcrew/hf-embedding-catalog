- source_sentence: What types of data processing allow for derogations from certain rights under Union or Member State law?
  sentences:
  - '1.Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time
    when personal data are obtained, provide the data subject with all of the following information: (a)  the identity and
    the contact details of the controller and, where applicable, of the controller''s representative; (b)  the contact details
    of the data protection officer, where applicable; (c)  the purposes of the processing for which the personal data are
    intended as well as the legal basis for the processing; 4.5.2016 L 119/40   (d)  where the processing is based on point
    (f) of Article 6(1), the legitimate interests pursued by the controller or by a third party; (e)  the recipients or categories
    of recipients of the personal data, if any; (f)  where applicable, the fact that the controller intends to transfer personal
    data to a third country or international organisation and the existence or absence of an adequacy decision by the Commission,
    or in the case of transfers referred to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to
    the appropriate or suitable safeguards and the means by which to obtain a copy of them or where they have been made available.

    2.In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are
    obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing:
    (a)  the period for which the personal data will be stored, or if that is not possible, the criteria used to determine
    that period; (b)  the existence of the right to request from the controller access to and rectification or erasure of
    personal data or restriction of processing concerning the data subject or to object to processing as well as the right
    to data portability; (c)  where the processing is based on point (a) of Article 6(1) or point (a) of Article 9(2), the
    existence of the right to withdraw consent at any time, without affecting the lawfulness of processing based on consent
    before its withdrawal; (d)  the right to lodge a complaint with a supervisory authority; (e)  whether the provision of
    personal data is a statutory or contractual requirement, or a requirement necessary to enter into a contract, as well
    as whether the data subject is obliged to provide the personal data and of the possible consequences of failure to provide
    such data; (f)  the existence of automated decision-making, including profiling, referred to in Article 22(1) and (4)
    and, at least in those cases, meaningful information about the logic involved, as well as the significance and the envisaged
    consequences of such processing for the data subject.

    3.Where the controller intends to further process the personal data for a purpose other than that for which the personal
    data were collected, the controller shall provide the data subject prior to that further processing with information on
    that other purpose and with any relevant further information as referred to in paragraph 2

    4.Paragraphs 1, 2 and 3 shall not apply where and insofar as the data subject already has the information.'
  - The processing of personal data should also be regarded to be lawful where it is necessary to protect an interest which
    is essential for the life of the data subject or that of another natural person. Processing of personal data 4.5.2016
    L 119/8 Official Journal of the European Union EN
  - '1.Processing for archiving purposes in the public interest, scientific or historical research purposes or statistical
    purposes, shall be subject to appropriate safeguards, in accordance with this Regulation, for the rights and freedoms
    of the data subject. Those safeguards shall ensure that technical and organisational measures are in place in particular
    in 4.5.2016 L 119/84   order to ensure respect for the principle of data minimisation. Those measures may include pseudonymisation
    provided that those purposes can be fulfilled in that manner. Where those purposes can be fulfilled by further processing
    which does not permit or no longer permits the identification of data subjects, those purposes shall be fulfilled in that
    manner.

    2.Where personal data are processed for scientific or historical research purposes or statistical purposes, Union or Member
    State law may provide for derogations from the rights referred to in Articles 15, 16, 18 and 21 subject to the conditions
    and safeguards referred to in paragraph 1 of this Article in so far as such rights are likely to render impossible or
    seriously impair the achievement of the specific purposes, and such derogations are necessary for the fulfilment of those
    purposes.

    3.Where personal data are processed for archiving purposes in the public interest, Union or Member State law may provide
    for derogations from the rights referred to in Articles 15, 16, 18, 19, 20 and 21 subject to the conditions and safeguards
    referred to in paragraph 1 of this Article in so far as such rights are likely to render impossible or seriously impair
    the achievement of the specific purposes, and such derogations are necessary for the fulfilment of those purposes.

    4.Where processing referred to in paragraphs 2 and 3 serves at the same time another purpose, the derogations shall apply
    only to processing for the purposes referred to in those paragraphs.'
