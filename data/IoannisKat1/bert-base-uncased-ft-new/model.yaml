      \ 2018 and, without delay, any subsequent amendment law or amendment affecting them."
  - source_sentence: How should the Board act when performing its tasks?
    sentences:
    - In order to promote the consistent application of this Regulation, the Board should be set up as an independent body
      of the Union. To fulfil its objectives, the Board should have legal personality. The Board should be represented by
      its Chair. It should replace the Working Party on the Protection of Individuals with Regard to the Processing of Personal
      Data established by Directive 95/46/EC. It should consist of the head of a supervisory authority of each Member State
      and the European Data Protection Supervisor or their respective representatives. The Commission should participate in
      the Board's activities without voting rights and the European Data Protection Supervisor should have specific voting
      rights. The Board should contribute to the consistent application of this Regulation throughout the Union, including
      by advising the Commission, in particular on the level of protection in third countries or international organisations,
      and promoting cooperation of the supervisory authorities throughout the Union. The Board should act independently when
      performing its tasks.
    - '1.Processing shall be lawful only if and to the extent that at least one of the following applies: (a)  the data subject
      has given consent to the processing of his or her personal data for one or more specific purposes; (b)  processing is
      necessary for the performance of a contract to which the data subject is party or in order to take steps at the request
      of the data subject prior to entering into a contract; (c)  processing is necessary for compliance with a legal obligation
      to which the controller is subject; (d)  processing is necessary in order to protect the vital interests of the data
      subject or of another natural person; (e)  processing is necessary for the performance of a task carried out in the
      public interest or in the exercise of official authority vested in the controller; (f)  processing is necessary for
      the purposes of the legitimate interests pursued by the controller or by a third party, except where such interests
      are overridden by the interests or fundamental rights and freedoms of the data subject which require protection of personal
      data, in particular where the data subject is a child. Point (f) of the first subparagraph shall not apply to processing
      carried out by public authorities in the performance of their tasks.

      2.Member States may maintain or introduce more specific provisions to adapt the application of the rules of this Regulation
      with regard to processing for compliance with points (c) and (e) of paragraph 1 by determining more precisely specific
      requirements for the processing and other measures to ensure lawful and fair processing including for other specific
      processing situations as provided for in Chapter IX.

      3.The basis for the processing referred to in point (c) and (e) of paragraph 1 shall be laid down by: (a)  Union law;
      or (b)  Member State law to which the controller is subject. The purpose of the processing shall be determined in that
      legal basis or, as regards the processing referred to in point (e) of paragraph 1, shall be necessary for the performance
      of a task carried out in the public interest or in the exercise of official authority vested in the controller. That
      legal basis may contain specific provisions to adapt the application of rules of this Regulation, inter alia: the general
      conditions governing the lawfulness of processing by the controller; the types of data which are subject to the processing;
      the data subjects concerned; the entities to, and the purposes for which, the personal data may be disclosed; the purpose
      limitation; storage periods; and processing operations and processing procedures, including measures to ensure lawful
      and fair processing such as those for other specific 4.5.2016 L 119/36   processing situations as provided for in Chapter
      IX. The Union or the Member State law shall meet an objective of public interest and be proportionate to the legitimate
      aim pursued.

      4.Where the processing for a purpose other than that for which the personal data have been collected is not based on
      the data subject''s consent or on a Union or Member State law which constitutes a necessary and proportionate measure
      in a democratic society to safeguard the objectives referred to in Article 23(1), the controller shall, in order to
      ascertain whether processing for another purpose is compatible with the purpose for which the personal data are initially
      collected, take into account, inter alia: (a)  any link between the purposes for which the personal data have been collected
      and the purposes of the intended further processing; (b)  the context in which the personal data have been collected,
      in particular regarding the relationship between data subjects and the controller; (c)  the nature of the personal data,
      in particular whether special categories of personal data are processed, pursuant to Article 9, or whether personal
      data related to criminal convictions and offences are processed, pursuant to Article 10; (d)  the possible consequences
      of the intended further processing for data subjects; (e)  the existence of appropriate safeguards, which may include
      encryption or pseudonymisation.'
    - '1.Each supervisory authority shall have all of the following investigative powers: (a)  to order the controller and
      the processor, and, where applicable, the controller''s or the processor''s representative to provide any information
      it requires for the performance of its tasks; (b)  to carry out investigations in the form of data protection audits;
      (c)  to carry out a review on certifications issued pursuant to Article 42(7); (d)  to notify the controller or the
      processor of an alleged infringement of this Regulation; (e)  to obtain, from the controller and the processor, access
      to all personal data and to all information necessary for the performance of its tasks; (f)  to obtain access to any
      premises of the controller and the processor, including to any data processing equipment and means, in accordance with
      Union or Member State procedural law.

      2.Each supervisory authority shall have all of the following corrective powers: (a)  to issue warnings to a controller
      or processor that intended processing operations are likely to infringe provisions of this Regulation; (b)  to issue
      reprimands to a controller or a processor where processing operations have infringed provisions of this Regulation;
      (c)  to order the controller or the processor to comply with the data subject''s requests to exercise his or her rights
      pursuant to this Regulation; 4.5.2016 L 119/69   (d)  to order the controller or processor to bring processing operations
      into compliance with the provisions of this Regulation, where appropriate, in a specified manner and within a specified
      period; (e)  to order the controller to communicate a personal data breach to the data subject; (f)  to impose a temporary
      or definitive limitation including a ban on processing; (g)  to order the rectification or erasure of personal data
      or restriction of processing pursuant to Articles 16, 17 and 18 and the notification of such actions to recipients to
      whom the personal data have been disclosed pursuant to Article 17(2) and Article 19; (h)  to withdraw a certification
      or to order the certification body to withdraw a certification issued pursuant to Articles 42 and 43, or to order the
      certification body not to issue certification if the requirements for the certification are not or are no longer met;
      (i)  to impose an administrative fine pursuant to Article 83, in addition to, or instead of measures referred to in
      this paragraph, depending on the circumstances of each individual case; (j)  to order the suspension of data flows to
      a recipient in a third country or to an international organisation.

      3.Each supervisory authority shall have all of the following authorisation and advisory powers: (a)  to advise the controller
      in accordance with the prior consultation procedure referred to in Article 36; (b)  to issue, on its own initiative
      or on request, opinions to the national parliament, the Member State government or, in accordance with Member State
      law, to other institutions and bodies as well as to the public on any issue related to the protection of personal data;
      (c)  to authorise processing referred to in Article 36(5), if the law of the Member State requires such prior authorisation;
      (d)  to issue an opinion and approve draft codes of conduct pursuant to Article 40(5); (e)  to accredit certification
      bodies pursuant to Article 43; (f)  to issue certifications and approve criteria of certification in accordance with
      Article 42(5); (g)  to adopt standard data protection clauses referred to in Article 28(8) and in point (d) of Article
      46(2); (h)  to authorise contractual clauses referred to in point (a) of Article 46(3); (i)  to authorise administrative
      arrangements referred to in point (b) of Article 46(3); (j)  to approve binding corporate rules pursuant to Article
      47

      4.The exercise of the powers conferred on the supervisory authority pursuant to this Article shall be subject to appropriate
      safeguards, including effective judicial remedy and due process, set out in Union and Member State law in accordance
      with the Charter.

      5.Each Member State shall provide by law that its supervisory authority shall have the power to bring infringements
      of this Regulation to the attention of the judicial authorities and where appropriate, to commence or engage otherwise
      in legal proceedings, in order to enforce the provisions of this Regulation.

      6.Each Member State may provide by law that its supervisory authority shall have additional powers to those referred
      to in paragraphs 1, 2 and 3. The exercise of those powers shall not impair the effective operation of Chapter VII.'
