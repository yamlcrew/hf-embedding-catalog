    - "1.Each supervisory authority shall ensure that the imposition of administrative fines pursuant to this Article in respect\
      \ of infringements of this Regulation referred to in paragraphs 4, 5 and 6 shall in each individual case be effective,\
      \ proportionate and dissuasive.\n2.Administrative fines shall, depending on the circumstances of each individual case,\
      \ be imposed in addition to, or instead of, measures referred to in points (a) to (h) and (j) of Article 58(2). When\
      \ deciding whether to impose an administrative fine and deciding on the amount of the administrative fine in each individual\
      \ case due regard shall be given to the following: (a)  the nature, gravity and duration of the infringement taking\
      \ into account the nature scope or purpose of the processing concerned as well as the number of data subjects affected\
      \ and the level of damage suffered by them; (b)  the intentional or negligent character of the infringement; (c)  any\
      \ action taken by the controller or processor to mitigate the damage suffered by data subjects; (d)  the degree of responsibility\
      \ of the controller or processor taking into account technical and organisational measures implemented by them pursuant\
      \ to Articles 25 and 32; (e)  any relevant previous infringements by the controller or processor; (f)  the degree of\
      \ cooperation with the supervisory authority, in order to remedy the infringement and mitigate the possible adverse\
      \ effects of the infringement; (g)  the categories of personal data affected by the infringement; (h)  the manner in\
      \ which the infringement became known to the supervisory authority, in particular whether, and if so to what extent,\
      \ the controller or processor notified the infringement; (i)  where measures referred to in Article 58(2) have previously\
      \ been ordered against the controller or processor concerned with regard to the same subject-matter, compliance with\
      \ those measures; (j)  adherence to approved codes of conduct pursuant to Article 40 or approved certification mechanisms\
      \ pursuant to Article 42; and (k)  any other aggravating or mitigating factor applicable to the circumstances of the\
      \ case, such as financial benefits gained, or losses avoided, directly or indirectly, from the infringement.\n3.If a\
      \ controller or processor intentionally or negligently, for the same or linked processing operations, infringes several\
      \ provisions of this Regulation, the total amount of the administrative fine shall not exceed the amount specified for\
      \ the gravest infringement.\n4.Infringements of the following provisions shall, in accordance with paragraph 2, be subject\
      \ to administrative fines up to 10 000 000 EUR, or in the case of an undertaking, up to 2 % of the total worldwide annual\
      \ turnover of the preceding financial year, whichever is higher: (a)  the obligations of the controller and the processor\
      \ pursuant to Articles 8, 11, 25 to 39 and 42 and 43; (b)  the obligations of the certification body pursuant to Articles\
      \ 42 and 43; (c)  the obligations of the monitoring body pursuant to Article 41(4). 4.5.2016 L 119/82  \n5.Infringements\
      \ of the following provisions shall, in accordance with paragraph 2, be subject to administrative fines up to 20 000\
      \ 000 EUR, or in the case of an undertaking, up to 4 % of the total worldwide annual turnover of the preceding financial\
      \ year, whichever is higher: (a)  the basic principles for processing, including conditions for consent, pursuant to\
      \ Articles 5, 6, 7 and 9; (b)  the data subjects' rights pursuant to Articles 12 to 22; (c)  the transfers of personal\
      \ data to a recipient in a third country or an international organisation pursuant to Articles 44 to 49; (d)  any obligations\
      \ pursuant to Member State law adopted under Chapter IX; (e)  non-compliance with an order or a temporary or definitive\
      \ limitation on processing or the suspension of data flows by the supervisory authority pursuant to Article 58(2) or\
      \ failure to provide access in violation of Article 58(1).\n6.Non-compliance with an order by the supervisory authority\
      \ as referred to in Article 58(2) shall, in accordance with paragraph 2 of this Article, be subject to administrative\
      \ fines up to 20 000 000 EUR, or in the case of an undertaking, up to 4 % of the total worldwide annual turnover of\
      \ the preceding financial year, whichever is higher.\n7.Without prejudice to the corrective powers of supervisory authorities\
      \ pursuant to Article 58(2), each Member State may lay down the rules on whether and to what extent administrative fines\
      \ may be imposed on public authorities and bodies established in that Member State.\n8.The exercise by the supervisory\
      \ authority of its powers under this Article shall be subject to appropriate procedural safeguards in accordance with\
      \ Union and Member State law, including effective judicial remedy and due process.\n9.Where the legal system of the\
      \ Member State does not provide for administrative fines, this Article may be applied in such a manner that the fine\
      \ is initiated by the competent supervisory authority and imposed by competent national courts, while ensuring that\
      \ those legal remedies are effective and have an equivalent effect to the administrative fines imposed by supervisory\
      \ authorities. In any event, the fines imposed shall be effective, proportionate and dissuasive. Those Member States\
      \ shall notify to the Commission the provisions of their laws which they adopt pursuant to this paragraph by 25 May\
      \ 2018 and, without delay, any subsequent amendment law or amendment affecting them."
    - "Court (Civil/Criminal): Criminal  \nProvisions:   \nTime of commission of the act:  \nResult (not guilty, guilty):\
      \ Guilty  \nReasoning: DECLARES the defendant guilty of: In Athens, between the period from July 25, 2005, to July 26,\
      \ 2005, for profit and with the intent to conceal the true origin and to assist a person involved in criminal activity,\
      \ intentionally concealed any property and became the beneficiary of it, which originated from the aforementioned activity,\
      \ specifically from fraud by means of computer data manipulation, causing particularly significant damage, with the\
      \ perpetrator committing fraud professionally, and the circumstances under which this act was committed indicating that\
      \ he is particularly dangerous. He engages in money laundering activities professionally and is considered particularly\
      \ dangerous.  \nFactual circumstances: An unknown individual, using social engineering techniques and information that\
      \ had been intercepted (password, passport details, etc.), pretended over the phone to be the legitimate beneficiary\
      \ of a bank account and managed to change the registered phone number, gain access to the account, and illegally transfer\
      \ the amount of $427,620 to an account in Greece. The transfer was carried out via email, using the online banking system.\
      \ The actual pair of beneficiaries of the account never requested a money transfer, a change of phone number, or a change\
      \ of access codes. The person who received the money and his company, while being aware of the criminal origin of the\
      \ funds, proceeded to conceal them by hiding them in the corporate account. Furthermore, the unknown individual attempted\
      \ other similar money transfers (e.g., $125,000 to Texas, $321,650 to Japan), demonstrating repeated, organized, and\
      \ professional activity. The court considered his actions to be particularly dangerous and antisocial, with evidence\
      \ indicating a consistent tendency towards committing similar crimes. There was also previous infrastructure for committing\
      \ the fraud, such as an account in a company in the Seychelles, the use of a false address, orders via fax, and correspondence\
      \ with fictitious details.  \n\nLegal characterization: Professional and continuous fraud, Use of forged/intercepted\
      \ identification documents, Money laundering, Assistance in criminal activity with the aim of obtaining property benefits."
