- source_sentence: Who remains fully liable to the controller if the other processor fails to fulfill its data protection
    obligations?
  sentences:
  - '1.Processing of personal data revealing racial or ethnic origin, political opinions, religious or philosophical beliefs,
    or trade union membership, and the processing of genetic data, biometric data for the purpose of uniquely identifying
    a natural person, data concerning health or data concerning a natural person''s sex life or sexual orientation shall be
    prohibited.

    2.Paragraph 1 shall not apply if one of the following applies: (a)  the data subject has given explicit consent to the
    processing of those personal data for one or more specified purposes, except where Union or Member State law provide that
    the prohibition referred to in paragraph 1 may not be lifted by the data subject; (b)  processing is necessary for the
    purposes of carrying out the obligations and exercising specific rights of the controller or of the data subject in the
    field of employment and social security and social protection law in so far as it is authorised by Union or Member State
    law or a collective agreement pursuant to Member State law providing for appropriate safeguards for the fundamental rights
    and the interests of the data subject; (c)  processing is necessary to protect the vital interests of the data subject
    or of another natural person where the data subject is physically or legally incapable of giving consent; (d)  processing
    is carried out in the course of its legitimate activities with appropriate safeguards by a foundation, association or
    any other not-for-profit body with a political, philosophical, religious or trade union aim and on condition that the
    processing relates solely to the members or to former members of the body or to persons who have regular contact with
    it in connection with its purposes and that the personal data are not disclosed outside that body without the consent
    of the data subjects; (e)  processing relates to personal data which are manifestly made public by the data subject; (f)  processing
    is necessary for the establishment, exercise or defence of legal claims or whenever courts are acting in their judicial
    capacity; (g)  processing is necessary for reasons of substantial public interest, on the basis of Union or Member State
    law which shall be proportionate to the aim pursued, respect the essence of the right to data protection and provide for
    suitable and specific measures to safeguard the fundamental rights and the interests of the data subject; (h)  processing
    is necessary for the purposes of preventive or occupational medicine, for the assessment of the working capacity of the
    employee, medical diagnosis, the provision of health or social care or treatment or the management of health or social
    care systems and services on the basis of Union or Member State law or pursuant to contract with a health professional
    and subject to the conditions and safeguards referred to in paragraph 3; (i)  processing is necessary for reasons of public
    interest in the area of public health, such as protecting against serious cross-border threats to health or ensuring high
    standards of quality and safety of health care and of medicinal products or medical devices, on the basis of Union or
    Member State law which provides for suitable and specific measures to safeguard the rights and freedoms of the data subject,
    in particular professional secrecy; 4.5.2016 L 119/38   (j)  processing is necessary for archiving purposes in the public
    interest, scientific or historical research purposes or statistical purposes in accordance with Article 89(1) based on
    Union or Member State law which shall be proportionate to the aim pursued, respect the essence of the right to data protection
    and provide for suitable and specific measures to safeguard the fundamental rights and the interests of the data subject.

    3.Personal data referred to in paragraph 1 may be processed for the purposes referred to in point (h) of paragraph 2 when
    those data are processed by or under the responsibility of a professional subject to the obligation of professional secrecy
    under Union or Member State law or rules established by national competent bodies or by another person also subject to
    an obligation of secrecy under Union or Member State law or rules established by national competent bodies.

    4.Member States may maintain or introduce further conditions, including limitations, with regard to the processing of
    genetic data, biometric data or data concerning health.'
  - '1.Where processing is to be carried out on behalf of a controller, the controller shall use only processors providing
    sufficient guarantees to implement appropriate technical and organisational measures in such a manner that processing
    will meet the requirements of this Regulation and ensure the protection of the rights of the data subject.

    2.The processor shall not engage another processor without prior specific or general written authorisation of the controller.
    In the case of general written authorisation, the processor shall inform the controller of any intended changes concerning
    the addition or replacement of other processors, thereby giving the controller the opportunity to object to such changes.

    3.Processing by a processor shall be governed by a contract or other legal act under Union or Member State law, that is
    binding on the processor with regard to the controller and that sets out the subject-matter and duration of the processing,
    the nature and purpose of the processing, the type of personal data and categories of data subjects and the obligations
    and rights of the controller. That contract or other legal act shall stipulate, in particular, that the processor: (a)  processes
    the personal data only on documented instructions from the controller, including with regard to transfers of personal
    data to a third country or an international organisation, unless required to do so by Union or Member State law to which
    the processor is subject; in such a case, the processor shall inform the controller of that legal requirement before processing,
    unless that law prohibits such information on important grounds of public interest; (b)  ensures that persons authorised
    to process the personal data have committed themselves to confidentiality or are under an appropriate statutory obligation
    of confidentiality; (c)  takes all measures required pursuant to Article 32; (d)  respects the conditions referred to
    in paragraphs 2 and 4 for engaging another processor; (e)  taking into account the nature of the processing, assists the
    controller by appropriate technical and organisational measures, insofar as this is possible, for the fulfilment of the
    controller''s obligation to respond to requests for exercising the data subject''s rights laid down in Chapter III; (f)  assists
    the controller in ensuring compliance with the obligations pursuant to Articles 32 to 36 taking into account the nature
    of processing and the information available to the processor; (g)  at the choice of the controller, deletes or returns
    all the personal data to the controller after the end of the provision of services relating to processing, and deletes
    existing copies unless Union or Member State law requires storage of the personal data; (h)  makes available to the controller
    all information necessary to demonstrate compliance with the obligations laid down in this Article and allow for and contribute
    to audits, including inspections, conducted by the controller or another auditor mandated by the controller. 4.5.2016
    L 119/49   With regard to point (h) of the first subparagraph, the processor shall immediately inform the controller if,
    in its opinion, an instruction infringes this Regulation or other Union or Member State data protection provisions.

    4.Where a processor engages another processor for carrying out specific processing activities on behalf of the controller,
    the same data protection obligations as set out in the contract or other legal act between the controller and the processor
    as referred to in paragraph 3 shall be imposed on that other processor by way of a contract or other legal act under Union
    or Member State law, in particular providing sufficient guarantees to implement appropriate technical and organisational
    measures in such a manner that the processing will meet the requirements of this Regulation. Where that other processor
    fails to fulfil its data protection obligations, the initial processor shall remain fully liable to the controller for
    the performance of that other processor''s obligations.

    5.Adherence of a processor to an approved code of conduct as referred to in Article 40 or an approved certification mechanism
    as referred to in Article 42 may be used as an element by which to demonstrate sufficient guarantees as referred to in
    paragraphs 1 and 4 of this Article.

    6.Without prejudice to an individual contract between the controller and the processor, the contract or the other legal
    act referred to in paragraphs 3 and 4 of this Article may be based, in whole or in part, on standard contractual clauses
    referred to in paragraphs 7 and 8 of this Article, including when they are part of a certification granted to the controller
    or processor pursuant to Articles 42 and 43

    7.The Commission may lay down standard contractual clauses for the matters referred to in paragraph 3 and 4 of this Article
    and in accordance with the examination procedure referred to in Article 93(2).

    8.A supervisory authority may adopt standard contractual clauses for the matters referred to in paragraph 3 and 4 of this
    Article and in accordance with the consistency mechanism referred to in Article 63

    9.The contract or the other legal act referred to in paragraphs 3 and 4 shall be in writing, including in electronic form.

    10.Without prejudice to Articles 82, 83 and 84, if a processor infringes this Regulation by determining the purposes and
    means of processing, the processor shall be considered to be a controller in respect of that processing.'
  - '1.Each supervisory authority shall have all of the following investigative powers: (a)  to order the controller and the
    processor, and, where applicable, the controller''s or the processor''s representative to provide any information it requires
    for the performance of its tasks; (b)  to carry out investigations in the form of data protection audits; (c)  to carry
    out a review on certifications issued pursuant to Article 42(7); (d)  to notify the controller or the processor of an
    alleged infringement of this Regulation; (e)  to obtain, from the controller and the processor, access to all personal
    data and to all information necessary for the performance of its tasks; (f)  to obtain access to any premises of the controller
    and the processor, including to any data processing equipment and means, in accordance with Union or Member State procedural
    law.

    2.Each supervisory authority shall have all of the following corrective powers: (a)  to issue warnings to a controller
    or processor that intended processing operations are likely to infringe provisions of this Regulation; (b)  to issue reprimands
    to a controller or a processor where processing operations have infringed provisions of this Regulation; (c)  to order
    the controller or the processor to comply with the data subject''s requests to exercise his or her rights pursuant to
    this Regulation; 4.5.2016 L 119/69   (d)  to order the controller or processor to bring processing operations into compliance
    with the provisions of this Regulation, where appropriate, in a specified manner and within a specified period; (e)  to
    order the controller to communicate a personal data breach to the data subject; (f)  to impose a temporary or definitive
    limitation including a ban on processing; (g)  to order the rectification or erasure of personal data or restriction of
    processing pursuant to Articles 16, 17 and 18 and the notification of such actions to recipients to whom the personal
    data have been disclosed pursuant to Article 17(2) and Article 19; (h)  to withdraw a certification or to order the certification
    body to withdraw a certification issued pursuant to Articles 42 and 43, or to order the certification body not to issue
    certification if the requirements for the certification are not or are no longer met; (i)  to impose an administrative
    fine pursuant to Article 83, in addition to, or instead of measures referred to in this paragraph, depending on the circumstances
    of each individual case; (j)  to order the suspension of data flows to a recipient in a third country or to an international
    organisation.

    3.Each supervisory authority shall have all of the following authorisation and advisory powers: (a)  to advise the controller
    in accordance with the prior consultation procedure referred to in Article 36; (b)  to issue, on its own initiative or
    on request, opinions to the national parliament, the Member State government or, in accordance with Member State law,
    to other institutions and bodies as well as to the public on any issue related to the protection of personal data; (c)  to
    authorise processing referred to in Article 36(5), if the law of the Member State requires such prior authorisation; (d)  to
    issue an opinion and approve draft codes of conduct pursuant to Article 40(5); (e)  to accredit certification bodies pursuant
    to Article 43; (f)  to issue certifications and approve criteria of certification in accordance with Article 42(5); (g)  to
    adopt standard data protection clauses referred to in Article 28(8) and in point (d) of Article 46(2); (h)  to authorise
    contractual clauses referred to in point (a) of Article 46(3); (i)  to authorise administrative arrangements referred
    to in point (b) of Article 46(3); (j)  to approve binding corporate rules pursuant to Article 47

    4.The exercise of the powers conferred on the supervisory authority pursuant to this Article shall be subject to appropriate
    safeguards, including effective judicial remedy and due process, set out in Union and Member State law in accordance with
    the Charter.

    5.Each Member State shall provide by law that its supervisory authority shall have the power to bring infringements of
    this Regulation to the attention of the judicial authorities and where appropriate, to commence or engage otherwise in
    legal proceedings, in order to enforce the provisions of this Regulation.

    6.Each Member State may provide by law that its supervisory authority shall have additional powers to those referred to
    in paragraphs 1, 2 and 3. The exercise of those powers shall not impair the effective operation of Chapter VII.'
- source_sentence: Who shall register and publish the code if it does not relate to processing activities in several Member
    States?
  sentences:
  - When personal data moves across borders outside the Union it may put at increased risk the ability of natural persons
    to exercise data protection rights in particular to protect themselves from the unlawful use or disclosure of that information.
    At the same time, supervisory authorities may find that they are unable to pursue complaints or conduct investigations
    relating to the activities outside their borders. Their efforts to work together in the cross-border context may also
    be hampered by insufficient preventative or remedial powers, inconsistent legal regimes, and practical obstacles like
    resource constraints. Therefore, there is a need to promote closer cooperation among data protection supervisory authorities
    to help them exchange information and carry out investigations with their international counterparts. For the purposes
    of developing international cooperation mechanisms to facilitate and provide international mutual assistance for the enforcement
    of legislation for the protection of personal data, the Commission and the supervisory authorities should exchange information
    and cooperate in activities related to the exercise of their powers with competent authorities in third countries, based
    on reciprocity and in accordance with this Regulation.
  - '1.The Member States, the supervisory authorities, the Board and the Commission shall encourage the drawing up of codes
    of conduct intended to contribute to the proper application of this Regulation, taking account of the specific features
    of the various processing sectors and the specific needs of micro, small and medium-sized enterprises.

    2.Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or
    amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to:
    (a)  fair and transparent processing; 4.5.2016 L 119/56   (b)  the legitimate interests pursued by controllers in specific
    contexts; (c)  the collection of personal data; (d)  the pseudonymisation of personal data; (e)  the information provided
    to the public and to data subjects; (f)  the exercise of the rights of data subjects; (g)  the information provided to,
    and the protection of, children, and the manner in which the consent of the holders of parental responsibility over children
    is to be obtained; (h)  the measures and procedures referred to in Articles 24 and 25 and the measures to ensure security
    of processing referred to in Article 32; (i)  the notification of personal data breaches to supervisory authorities and
    the communication of such personal data breaches to data subjects; (j)  the transfer of personal data to third countries
    or international organisations; or (k)  out-of-court proceedings and other dispute resolution procedures for resolving
    disputes between controllers and data subjects with regard to processing, without prejudice to the rights of data subjects
    pursuant to Articles 77 and 79

    3.In addition to adherence by controllers or processors subject to this Regulation, codes of conduct approved pursuant
    to paragraph 5 of this Article and having general validity pursuant to paragraph 9 of this Article may also be adhered
    to by controllers or processors that are not subject to this Regulation pursuant to Article 3 in order to provide appropriate
    safeguards within the framework of personal data transfers to third countries or international organisations under the
    terms referred to in point (e) of Article 46(2). Such controllers or processors shall make binding and enforceable commitments,
    via contractual or other legally binding instruments, to apply those appropriate safeguards including with regard to the
    rights of data subjects.

    4.A code of conduct referred to in paragraph 2 of this Article shall contain mechanisms which enable the body referred
    to in Article 41(1) to carry out the mandatory monitoring of compliance with its provisions by the controllers or processors
    which undertake to apply it, without prejudice to the tasks and powers of supervisory authorities competent pursuant to
    Article 55 or 56

    5.Associations and other bodies referred to in paragraph 2 of this Article which intend to prepare a code of conduct or
    to amend or extend an existing code shall submit the draft code, amendment or extension to the supervisory authority which
    is competent pursuant to Article 55. The supervisory authority shall provide an opinion on whether the draft code, amendment
    or extension complies with this Regulation and shall approve that draft code, amendment or extension if it finds that
    it provides sufficient appropriate safeguards.

    6.Where the draft code, or amendment or extension is approved in accordance with paragraph 5, and where the code of conduct
    concerned does not relate to processing activities in several Member States, the supervisory authority shall register
    and publish the code.

    7.Where a draft code of conduct relates to processing activities in several Member States, the supervisory authority which
    is competent pursuant to Article 55 shall, before approving the draft code, amendment or extension, submit it in the procedure
    referred to in Article 63 to the Board which shall provide an opinion on whether the draft code, amendment or extension
    complies with this Regulation or, in the situation referred to in paragraph 3 of this Article, provides appropriate safeguards.

    8.Where the opinion referred to in paragraph 7 confirms that the draft code, amendment or extension complies with this
    Regulation, or, in the situation referred to in paragraph 3, provides appropriate safeguards, the Board shall submit its
    opinion to the Commission.

    9.The Commission may, by way of implementing acts, decide that the approved code of conduct, amendment or extension submitted
    to it pursuant to paragraph 8 of this Article have general validity within the Union. Those implementing acts shall be
    adopted in accordance with the examination procedure set out in Article 93(2)

    10.The Commission shall ensure appropriate publicity for the approved codes which have been decided as having general
    validity in accordance with paragraph

    11.The Board shall collate all approved codes of conduct, amendments and extensions in a register and shall make them
    publicly available by way of appropriate means.'
