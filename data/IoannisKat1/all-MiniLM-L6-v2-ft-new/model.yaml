    - '1.The European Data Protection Board (the ‘Board’) is hereby established as a body of the Union and shall have legal
      personality.

      2.The Board shall be represented by its Chair.

      3.The Board shall be composed of the head of one supervisory authority of each Member State and of the European Data
      Protection Supervisor, or their respective representatives.

      4.Where in a Member State more than one supervisory authority is responsible for monitoring the application of the provisions
      pursuant to this Regulation, a joint representative shall be appointed in accordance with that Member State''s law.

      5.The Commission shall have the right to participate in the activities and meetings of the Board without voting right.
      The Commission shall designate a representative. The Chair of the Board shall communicate to the Commission the activities
      of the Board.

      6.In the cases referred to in Article 65, the European Data Protection Supervisor shall have voting rights only on decisions
      which concern principles and rules applicable to the Union institutions, bodies, offices and agencies which correspond
      in substance to those of this Regulation.'
  - source_sentence: When should the right of data portability apply?
    sentences:
    - To further strengthen the control over his or her own data, where the processing of personal data is carried out by
      automated means, the data subject should also be allowed to receive personal data concerning him or her which he or
      she has provided to a controller in a structured, commonly used, machine-readable and interoperable format, and to transmit
      it to another controller. Data controllers should be encouraged to develop interoperable formats that enable data portability.
      That right should apply where the data subject provided the personal data on the basis of his or her consent or the
      processing is necessary for the performance of a contract. It should not apply where processing is based on a legal
      ground other than consent or contract. By its very nature, that right should not be exercised against controllers processing
      personal data in the exercise of their public duties. It should therefore not apply where the processing of the personal
      data is necessary for compliance with a legal obligation to which the controller is subject or for the performance of
      a task carried out in the public interest or in the exercise of an official authority vested in the controller. The
      data subject's right to transmit or receive personal data concerning him or her should not create an obligation for
      the controllers to adopt or maintain processing systems which are technically compatible. Where, in a certain set of
      personal data, more than one data subject is concerned, the right to receive the personal data should be without prejudice
      to the rights and freedoms of other data subjects in accordance with this Regulation. Furthermore, that right should
      not prejudice the right of the data subject to obtain the erasure of personal data and the limitations of that right
      as set out in this Regulation and should, in particular, not imply the erasure of personal data concerning the data
      subject which have been provided by him or her for the performance of a contract to the extent that and for as long
      as the personal data are necessary for the performance of that contract. Where technically feasible, the data subject
      should have the right to have the personal data transmitted directly from one controller to another.
    - '1.By 25 May 2020 and every four years thereafter, the Commission shall submit a report on the evaluation and review
      of this Regulation to the European Parliament and to the Council. The reports shall be made public.

      2.In the context of the evaluations and reviews referred to in paragraph 1, the Commission shall examine, in particular,
      the application and functioning of: (a)  Chapter V on the transfer of personal data to third countries or international
      organisations with particular regard to decisions adopted pursuant to Article 45(3) of this Regulation and decisions
      adopted on the basis of Article 25(6) of Directive 95/46/EC; (b)  Chapter VII on cooperation and consistency.

      3.For the purpose of paragraph 1, the Commission may request information from Member States and supervisory authorities.

      4.In carrying out the evaluations and reviews referred to in paragraphs 1 and 2, the Commission shall take into account
      the positions and findings of the European Parliament, of the Council, and of other relevant bodies or sources.

      5.The Commission shall, if necessary, submit appropriate proposals to amend this Regulation, in particular taking into
      account of developments in information technology and in the light of the state of progress in the information society.'
    - "1.The Member States, the supervisory authorities, the Board and the Commission shall encourage, in particular at Union\
      \ level, the establishment of data protection certification mechanisms and of data protection seals and marks, for the\
      \ purpose of demonstrating compliance with this Regulation of processing operations by controllers and processors. The\
      \ specific needs of micro, small and medium-sized enterprises shall be taken into account. 4.5.2016 L 119/58  \n2.In\
      \ addition to adherence by controllers or processors subject to this Regulation, data protection certification mechanisms,\
      \ seals or marks approved pursuant to paragraph 5 of this Article may be established for the purpose of demonstrating\
      \ the existence of appropriate safeguards provided by controllers or processors that are not subject to this Regulation\
      \ pursuant to Article 3 within the framework of personal data transfers to third countries or international organisations\
      \ under the terms referred to in point (f) of Article 46(2). Such controllers or processors shall make binding and enforceable\
      \ commitments, via contractual or other legally binding instruments, to apply those appropriate safeguards, including\
      \ with regard to the rights of data subjects.\n3.The certification shall be voluntary and available via a process that\
      \ is transparent.\n4.A certification pursuant to this Article does not reduce the responsibility of the controller or\
      \ the processor for compliance with this Regulation and is without prejudice to the tasks and powers of the supervisory\
      \ authorities which are competent pursuant to Article 55 or 56\n5.A certification pursuant to this Article shall be\
      \ issued by the certification bodies referred to in Article 43 or by the competent supervisory authority, on the basis\
      \ of criteria approved by that competent supervisory authority pursuant to Article 58(3) or by the Board pursuant to\
      \ Article 63. Where the criteria are approved by the Board, this may result in a common certification, the European\
      \ Data Protection Seal.\n6.The controller or processor which submits its processing to the certification mechanism shall\
      \ provide the certification body referred to in Article 43, or where applicable, the competent supervisory authority,\
      \ with all information and access to its processing activities which are necessary to conduct the certification procedure.\n\
      7.Certification shall be issued to a controller or processor for a maximum period of three years and may be renewed,\
      \ under the same conditions, provided that the relevant requirements continue to be met. Certification shall be withdrawn,\
      \ as applicable, by the certification bodies referred to in Article 43 or by the competent supervisory authority where\
      \ the requirements for the certification are not or are no longer met.\n8.The Board shall collate all certification\
      \ mechanisms and data protection seals and marks in a register and shall make them publicly available by any appropriate\
      \ means."
  - source_sentence: What is one action that may be included under 'mutual assistance' according to the text?
    sentences:
    - '1.Supervisory authorities shall provide each other with relevant information and mutual assistance in order to implement
      and apply this Regulation in a consistent manner, and shall put in place measures for effective cooperation with one
      another. Mutual assistance shall cover, in particular, information requests and supervisory measures, such as requests
      to carry out prior authorisations and consultations, inspections and investigations.

      2.Each supervisory authority shall take all appropriate measures required to reply to a request of another supervisory
      authority without undue delay and no later than one month after receiving the request. Such measures may include, in
      particular, the transmission of relevant information on the conduct of an investigation.

      3.Requests for assistance shall contain all the necessary information, including the purpose of and reasons for the
      request. Information exchanged shall be used only for the purpose for which it was requested.

      4.The requested supervisory authority shall not refuse to comply with the request unless: (a)  it is not competent for
      the subject-matter of the request or for the measures it is requested to execute; or (b)  compliance with the request
      would infringe this Regulation or Union or Member State law to which the supervisory authority receiving the request
      is subject.

      5.The requested supervisory authority shall inform the requesting supervisory authority of the results or, as the case
      may be, of the progress of the measures taken in order to respond to the request. The requested supervisory authority
      shall provide reasons for any refusal to comply with a request pursuant to paragraph 4

      6.Requested supervisory authorities shall, as a rule, supply the information requested by other supervisory authorities
      by electronic means, using a standardised format.

      7.Requested supervisory authorities shall not charge a fee for any action taken by them pursuant to a request for mutual
      assistance. Supervisory authorities may agree on rules to indemnify each other for specific expenditure arising from
      the provision of mutual assistance in exceptional circumstances.

      8.Where a supervisory authority does not provide the information referred to in paragraph 5 of this Article within one
      month of receiving the request of another supervisory authority, the requesting supervisory authority may adopt a provisional
      measure on the territory of its Member State in accordance with Article 55(1). In that case, the urgent need to act
      under Article 66(1) shall be presumed to be met and require an urgent binding decision from the Board pursuant to Article
      66(2).

      9.The Commission may, by means of implementing acts, specify the format and procedures for mutual assistance referred
      to in this Article and the arrangements for the exchange of information by electronic means between supervisory authorities,
      and between supervisory authorities and the Board, in particular the standardised format referred to in paragraph 6
      of this Article. Those implementing acts shall be adopted in accordance with the examination procedure referred to in
      Article 93(2).'
    - Any natural or legal person has the right to bring an action for annulment of decisions of the Board before the Court
      of Justice under the conditions provided for in Article 263 TFEU. As addressees of such decisions, the supervisory authorities
      concerned which wish to challenge them have to bring action within two months of being notified of them, in accordance
      with Article 263 TFEU. Where decisions of the Board are of direct and individual concern to a controller, processor
      or complainant, the latter may bring an action for annulment against those decisions within two months of their publication
      on the website of the Board, in accordance with Article 263 TFEU. Without prejudice to this right under Article 263
      TFEU, each natural or legal person should have an effective judicial remedy before the competent national court against
      a decision of a supervisory authority which produces legal effects concerning that person. Such a decision concerns
      in particular the exercise of investigative, corrective and authorisation powers by the supervisory authority or the
      dismissal or rejection of complaints. However, the right to an effective judicial remedy does not encompass measures
      taken by supervisory authorities which are not legally binding, such as opinions issued by or advice provided by the
      supervisory authority. Proceedings against a supervisory authority should be brought before the courts of the Member
      State where the supervisory authority is established and should be conducted in accordance with that Member State's
      procedural law. Those courts should exercise full jurisdiction, which should include jurisdiction to examine all questions
      of fact and law relevant to the dispute before them. Where a complaint has been rejected or dismissed by a supervisory
      authority, the complainant may bring proceedings before the courts in the same Member State. In the context of judicial
      remedies relating to the application of this Regulation, national courts which consider a decision on the question necessary
      to enable them to give judgment, may, or in the case provided for in Article 267 TFEU, must, request the Court of Justice
      to give a preliminary ruling on the interpretation of Union law, including this Regulation. Furthermore, where a decision
      of a supervisory authority implementing a decision of the Board is challenged before a national court and the validity
      of the decision of the Board is at issue, that national court does not have the power to declare the Board's decision
      invalid but must refer the question of validity to the Court of Justice in accordance with Article 267 TFEU as interpreted
      by the Court of Justice, where it considers the decision invalid. However, a national court may not refer a question
      on the validity of the decision of the Board at the request of a natural or legal person which had the opportunity to
      bring an action for annulment of that decision, in particular if it was directly and individually concerned by that
      decision, but had not done so within the period laid down in Article 263 TFEU.
    - The processing of personal data for archiving purposes in the public interest, scientific or historical research purposes
      or statistical purposes should be subject to appropriate safeguards for the rights and freedoms of the data subject
      pursuant to this Regulation. Those safeguards should ensure that technical and organisational measures are in place
      in order to ensure, in particular, the principle of data minimisation. The further processing of personal data for archiving
      purposes in the public interest, scientific or historical research purposes or statistical purposes is to be carried
      out when the controller has assessed the feasibility to fulfil those purposes by processing data which do not permit
      or no longer permit the identification of data subjects, provided that appropriate safeguards exist (such as, for instance,
      pseudonymisation of the data). Member States should provide for appropriate safeguards for the processing of personal
      data for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes.
      Member States should be authorised to provide, under specific conditions and subject to appropriate safeguards for data
      subjects, specifications and derogations with regard to the information requirements and rights to rectification, to
      erasure, to be forgotten, to restriction of processing, to data portability, and to object when processing personal
      data for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes.
      The conditions and safeguards in question may entail specific procedures for data subjects to exercise those rights
      if this is appropriate in the light of the purposes sought by the specific processing along with technical and organisational
      measures aimed at minimising the processing of personal data in pursuance of the proportionality and necessity principles.
      The processing of personal data for scientific purposes should also comply with other relevant legislation such as on
      clinical trials.
