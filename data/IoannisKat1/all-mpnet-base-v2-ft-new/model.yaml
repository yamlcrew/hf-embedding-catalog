- source_sentence: When should the Commission adopt immediately applicable implementing acts?
  sentences:
  - Where a court seized of proceedings against a decision by a supervisory authority has reason to believe that proceedings
    concerning the same processing, such as the same subject matter as regards processing by the same controller or processor,
    or the same cause of action, are brought before a competent court in another Member State, it should contact that court
    in order to confirm the existence of such related proceedings. If related proceedings are pending before a court in another
    Member State, any court other than the court first 4.5.2016 L 119/26 Official Journal of the European Union EN   seized
    may stay its proceedings or may, on request of one of the parties, decline jurisdiction in favour of the court first seized
    if that court has jurisdiction over the proceedings in question and its law permits the consolidation of such related
    proceedings. Proceedings are deemed to be related where they are so closely connected that it is expedient to hear and
    determine them together in order to avoid the risk of irreconcilable judgments resulting from separate proceedings.
  - The Commission should adopt immediately applicable implementing acts where available evidence reveals that a third country,
    a territory or a specified sector within that third country, or an international organisation does not ensure an adequate
    level of protection, and imperative grounds of urgency so require.
  - '1.Without prejudice to other tasks set out under this Regulation, each supervisory authority shall on its territory:
    (a)  monitor and enforce the application of this Regulation; (b)  promote public awareness and understanding of the risks,
    rules, safeguards and rights in relation to processing. Activities addressed specifically to children shall receive specific
    attention; (c)  advise, in accordance with Member State law, the national parliament, the government, and other institutions
    and bodies on legislative and administrative measures relating to the protection of natural persons'' rights and freedoms
    with regard to processing; (d)  promote the awareness of controllers and processors of their obligations under this Regulation;
    (e)  upon request, provide information to any data subject concerning the exercise of their rights under this Regulation
    and, if appropriate, cooperate with the supervisory authorities in other Member States to that end; (f)  handle complaints
    lodged by a data subject, or by a body, organisation or association in accordance with Article 80, and investigate, to
    the extent appropriate, the subject matter of the complaint and inform the complainant of the progress and the outcome
    of the investigation within a reasonable period, in particular if further investigation or coordination with another supervisory
    authority is necessary; (g)  cooperate with, including sharing information and provide mutual assistance to, other supervisory
    authorities with a view to ensuring the consistency of application and enforcement of this Regulation; (h)  conduct investigations
    on the application of this Regulation, including on the basis of information received from another supervisory authority
    or other public authority; (i)  monitor relevant developments, insofar as they have an impact on the protection of personal
    data, in particular the development of information and communication technologies and commercial practices; (j)  adopt
    standard contractual clauses referred to in Article 28(8) and in point (d) of Article 46(2); (k)  establish and maintain
    a list in relation to the requirement for data protection impact assessment pursuant to Article 35(4); (l)  give advice
    on the processing operations referred to in Article 36(2); (m)  encourage the drawing up of codes of conduct pursuant
    to Article 40(1) and provide an opinion and approve such codes of conduct which provide sufficient safeguards, pursuant
    to Article 40(5); (n)  encourage the establishment of data protection certification mechanisms and of data protection
    seals and marks pursuant to Article 42(1), and approve the criteria of certification pursuant to Article 42(5); (o)  where
    applicable, carry out a periodic review of certifications issued in accordance with Article 42(7); 4.5.2016 L 119/68   (p)  draft
    and publish the criteria for accreditation of a body for monitoring codes of conduct pursuant to Article 41 and of a certification
    body pursuant to Article 43; (q)  conduct the accreditation of a body for monitoring codes of conduct pursuant to Article
    41 and of a certification body pursuant to Article 43; (r)  authorise contractual clauses and provisions referred to in
    Article 46(3); (s)  approve binding corporate rules pursuant to Article 47; (t)  contribute to the activities of the Board;
    (u)  keep internal records of infringements of this Regulation and of measures taken in accordance with Article 58(2);
    and (v)  fulfil any other tasks related to the protection of personal data.

    2.Each supervisory authority shall facilitate the submission of complaints referred to in point (f) of paragraph 1 by
    measures such as a complaint submission form which can also be completed electronically, without excluding other means
    of communication.

    3.The performance of the tasks of each supervisory authority shall be free of charge for the data subject and, where applicable,
    for the data protection officer.

    4.Where requests are manifestly unfounded or excessive, in particular because of their repetitive character, the supervisory
    authority may charge a reasonable fee based on administrative costs, or refuse to act on the request. The supervisory
    authority shall bear the burden of demonstrating the manifestly unfounded or excessive character of the request.'
- source_sentence: What action did the defendant take on January 15, 2023?
  sentences:
  - '1.The data subject shall have the right to obtain from the controller confirmation as to whether or not personal data
    concerning him or her are being processed, and, where that is the case, access to the personal data and the following
    information: (a)  the purposes of the processing; (b)  the categories of personal data concerned; (c)  the recipients
    or categories of recipient to whom the personal data have been or will be disclosed, in particular recipients in third
    countries or international organisations; (d)  where possible, the envisaged period for which the personal data will be
    stored, or, if not possible, the criteria used to determine that period; (e)  the existence of the right to request from
    the controller rectification or erasure of personal data or restriction of processing of personal data concerning the
    data subject or to object to such processing; (f)  the right to lodge a complaint with a supervisory authority; (g)  where
    the personal data are not collected from the data subject, any available information as to their source; (h)  the existence
    of automated decision-making, including profiling, referred to in Article 22(1) and (4) and, at least in those cases,
    meaningful information about the logic involved, as well as the significance and the envisaged consequences of such processing
    for the data subject.

    2.Where personal data are transferred to a third country or to an international organisation, the data subject shall have
    the right to be informed of the appropriate safeguards pursuant to Article 46 relating to the transfer.

    3.The controller shall provide a copy of the personal data undergoing processing. For any further copies requested by
    the data subject, the controller may charge a reasonable fee based on administrative costs. Where the data subject makes
    the request by electronic means, and unless otherwise requested by the data subject, the information shall be provided
    in a commonly used electronic form.

    4.The right to obtain a copy referred to in paragraph 3 shall not adversely affect the rights and freedoms of others.
    Section 3 Rectification and erasure'
  - '1.The data protection officer shall have at least the following tasks: (a)  to inform and advise the controller or the
    processor and the employees who carry out processing of their obligations pursuant to this Regulation and to other Union
    or Member State data protection provisions; (b)  to monitor compliance with this Regulation, with other Union or Member
    State data protection provisions and with the policies of the controller or processor in relation to the protection of
    personal data, including the assignment of responsibilities, awareness-raising and training of staff involved in processing
    operations, and the related audits; (c)  to provide advice where requested as regards the data protection impact assessment
    and monitor its performance pursuant to Article 35; (d)  to cooperate with the supervisory authority; (e)  to act as the
    contact point for the supervisory authority on issues relating to processing, including the prior consultation referred
    to in Article 36, and to consult, where appropriate, with regard to any other matter.

    2.The data protection officer shall in the performance of his or her tasks have due regard to the risk associated with
    processing operations, taking into account the nature, scope, context and purposes of processing. Section 5 Codes of conduct
    and certification'
  - '1.The Board shall act independently when performing its tasks or exercising its powers pursuant to Articles 70 and 71

    2.Without prejudice to requests by the Commission referred to in point (b) of Article 70(1) and in Article 70(2), the
    Board shall, in the performance of its tasks or the exercise of its powers, neither seek nor take instructions from anybody.'
- source_sentence: How can the controlling undertaking exert influence over other undertakings?
  sentences:
  - '1.In the absence of a decision pursuant to Article 45(3), a controller or processor may transfer personal data to a third
    country or an international organisation only if the controller or processor has provided appropriate safeguards, and
    on condition that enforceable data subject rights and effective legal remedies for data subjects are available.

    2.The appropriate safeguards referred to in paragraph 1 may be provided for, without requiring any specific authorisation
    from a supervisory authority, by: (a)  a legally binding and enforceable instrument between public authorities or bodies;
    (b)  binding corporate rules in accordance with Article 47; (c)  standard data protection clauses adopted by the Commission
    in accordance with the examination procedure referred to in Article 93(2); (d)  standard data protection clauses adopted
    by a supervisory authority and approved by the Commission pursuant to the examination procedure referred to in Article
    93(2); (e)  an approved code of conduct pursuant to Article 40 together with binding and enforceable commitments of the
    controller or processor in the third country to apply the appropriate safeguards, including as regards data subjects''
    rights; or (f)  an approved certification mechanism pursuant to Article 42 together with binding and enforceable commitments
    of the controller or processor in the third country to apply the appropriate safeguards, including as regards data subjects''
    rights.

    3.Subject to the authorisation from the competent supervisory authority, the appropriate safeguards referred to in paragraph
    1 may also be provided for, in particular, by: (a)  contractual clauses between the controller or processor and the controller,
    processor or the recipient of the personal data in the third country or international organisation; or (b)  provisions
    to be inserted into administrative arrangements between public authorities or bodies which include enforceable and effective
    data subject rights.

    4.The supervisory authority shall apply the consistency mechanism referred to in Article 63 in the cases referred to in
    paragraph 3 of this Article.

    5.Authorisations by a Member State or supervisory authority on the basis of Article 26(2) of Directive 95/46/EC shall
    remain valid until amended, replaced or repealed, if necessary, by that supervisory authority. Decisions adopted by the
    Commission on the basis of Article 26(4) of Directive 95/46/EC shall remain in force until amended, replaced or repealed,
    if necessary, by a Commission Decision adopted in accordance with paragraph 2 of this Article.'
  - In any case, where the Commission has taken no decision on the adequate level of data protection in a third country, the
    controller or processor should make use of solutions that provide data subjects with enforceable and effective rights
    as regards the processing of their data in the Union once those data have been transferred so that that they will continue
    to benefit from fundamental rights and safeguards. 4.5.2016 L 119/21 Official Journal of the European Union EN
  - A group of undertakings should cover a controlling undertaking and its controlled undertakings, whereby the controlling
    undertaking should be the undertaking which can exert a dominant influence over the other undertakings by virtue, for
    example, of ownership, financial participation or the rules which govern it or the power to have personal data protection
    rules implemented. An undertaking which controls the processing of personal data in undertakings affiliated to it should
    be regarded, together with those undertakings, as a group of undertakings.
- source_sentence: When was the data protection impact assessment required for monitoring publicly accessible areas on a large
    scale?
  sentences:
  - This should in particular apply to large-scale processing operations which aim to process a considerable amount of personal
    data at regional, national or supranational level and which could affect a large number of data subjects and which are
    likely to result in a high risk, for example, on account of their sensitivity, where in accordance with the achieved state
    of technological knowledge a new technology is used on a large scale as well as to other processing operations which result
    in a high risk to the rights and freedoms of data subjects, in particular where those operations render it more difficult
    for data subjects to exercise their rights. A data 4.5.2016 L 119/17 Official Journal of the European Union EN   protection
    impact assessment should also be made where personal data are processed for taking decisions regarding specific natural
    persons following any systematic and extensive evaluation of personal aspects relating to natural persons based on profiling
    those data or following the processing of special categories of personal data, biometric data, or data on criminal convictions
    and offences or related security measures. A data protection impact assessment is equally required for monitoring publicly
    accessible areas on a large scale, especially when using optic-electronic devices or for any other operations where the
    competent supervisory authority considers that the processing is likely to result in a high risk to the rights and freedoms
    of data subjects, in particular because they prevent data subjects from exercising a right or using a service or a contract,
    or because they are carried out systematically on a large scale. The processing of personal data should not be considered
    to be on a large scale if the processing concerns personal data from patients or clients by an individual physician, other
    health care professional or lawyer. In such cases, a data protection impact assessment should not be mandatory.
  - Article 16(2) TFEU mandates the European Parliament and the Council to lay down the rules relating to the protection of
    natural persons with regard to the processing of personal data and the rules relating to the free movement of personal
    data.
  - The main establishment of a controller in the Union should be the place of its central administration in the Union, unless
    the decisions on the purposes and means of the processing of personal data are taken in another establishment of the controller
    in the Union, in which case that other establishment should be considered to be 4.5.2016 L 119/6 Official Journal of the
    European Union EN
- source_sentence: For which purposes should data concerning health not be processed by third parties?
  sentences:
  - The processing of special categories of personal data may be necessary for reasons of public interest in the areas of
    public health without consent of the data subject. Such processing should be subject to suitable and specific measures
    so as to protect the rights and freedoms of natural persons. In that context, ‘public health’ should be interpreted as
    defined in Regulation (EC) No 1338/2008 of the European Parliament and of the Council (1), namely all elements related
    to health, namely health status, including morbidity and disability, the determinants having an effect on that health
    status, health care needs, resources allocated to health care, the provision of, and universal access to, health care
    as well as health care expenditure and financing, and the causes of mortality. Such processing of data concerning health
    for reasons of public interest should not result in personal data being processed for other purposes by third parties
    such as employers or insurance and banking companies.
  - "**Court (Civil/Criminal): Criminal**  \n**Provisions:**  \n**Time of commission of the act:**  \n**Result (not guilty,\
    \ guilty):** Guilty  \n**Rationale:** Declares the defendant guilty of the following: In Athens, between the period from\
    \ July 25, 2005, to July 26, 2005, for profit and with the intent to conceal the true origin and provide assistance to\
    \ a person involved in criminal activity, he intentionally concealed any assets and became, in any case, the beneficiary\
    \ of those assets, which originated from the aforementioned activity, namely fraud through the manipulation of computer\
    \ data, from which the damage caused is particularly significant, the perpetrator committing professional fraud, and the\
    \ circumstances under which this act was carried out indicating that he is particularly dangerous. He engages in activities\
    \ related to money laundering from criminal activity as a profession and is particularly dangerous. Specifically: An individual\
    \ whose identity is unknown had violated the communication codes of .... and ... with Bank ..... (password, passport details\
    \ via the Internet) within the framework of electronic banking transactions provided by the aforementioned bank and on\
    \ June 20, 2005, July 12, 2005, and July 25, 2005, knowingly falsely presented himself to employees of Bank ..... over\
    \ the phone as the ..... beneficiary of the ..... account at this bank, knowing the password and account number. Thus,\
    \ on June 20, 2005, he succeeded, through the appropriate employees, in changing the phone number at the Bank to his own\
    \ .... On July 12, 2005, he verified the change of the phone number, and on July 25, 2005, he read a transfer request\
    \ to Greece for the amount of $427,620 with account number .... to a bank employee, and by changing the password for online\
    \ banking transactions and knowing the user identity ....., he managed to convince the relevant employee to disclose the\
    \ account balance of ..... which was $629,473.04. In this way, he convinced the relevant employee of Bank ..... to proceed\
    \ with the transfer of the amount of $427,620 from the account of ..... to Bank ...... in Greece, specifically to the\
    \ ...... account, with the transfer request made via email from the online banking system.  \n**Actual incidents:**"
  - '1.Where personal data have not been obtained from the data subject, the controller shall provide the data subject with
    the following information: (a)  the identity and the contact details of the controller and, where applicable, of the controller''s
    representative; (b)  the contact details of the data protection officer, where applicable; (c)  the purposes of the processing
    for which the personal data are intended as well as the legal basis for the processing; (d)  the categories of personal
    data concerned; (e)  the recipients or categories of recipients of the personal data, if any; 4.5.2016 L 119/41   (f)
    where applicable, that the controller intends to transfer personal data to a recipient in a third country or international
    organisation and the existence or absence of an adequacy decision by the Commission, or in the case of transfers referred
    to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to the appropriate or suitable safeguards
    and the means to obtain a copy of them or where they have been made available.

    2.In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following
    information necessary to ensure fair and transparent processing in respect of the data subject: (a)  the period for which
    the personal data will be stored, or if that is not possible, the criteria used to determine that period; (b)  where the
    processing is based on point (f) of Article 6(1), the legitimate interests pursued by the controller or by a third party;
    (c)  the existence of the right to request from the controller access to and rectification or erasure of personal data
    or restriction of processing concerning the data subject and to object to processing as well as the right to data portability;
    (d)  where processing is based on point (a) of Article 6(1) or point (a) of Article 9(2), the existence of the right to
    withdraw consent at any time, without affecting the lawfulness of processing based on consent before its withdrawal; (e)  the
    right to lodge a complaint with a supervisory authority; (f)  from which source the personal data originate, and if applicable,
    whether it came from publicly accessible sources; (g)  the existence of automated decision-making, including profiling,
    referred to in Article 22(1) and (4) and, at least in those cases, meaningful information about the logic involved, as
    well as the significance and the envisaged consequences of such processing for the data subject.

    3.The controller shall provide the information referred to in paragraphs 1 and 2: (a)  within a reasonable period after
    obtaining the personal data, but at the latest within one month, having regard to the specific circumstances in which
    the personal data are processed; (b)  if the personal data are to be used for communication with the data subject, at
    the latest at the time of the first communication to that data subject; or (c)  if a disclosure to another recipient is
    envisaged, at the latest when the personal data are first disclosed.

    4.Where the controller intends to further process the personal data for a purpose other than that for which the personal
    data were obtained, the controller shall provide the data subject prior to that further processing with information on
    that other purpose and with any relevant further information as referred to in paragraph 2

    5.Paragraphs 1 to 4 shall not apply where and insofar as: (a)  the data subject already has the information; (b)  the
    provision of such information proves impossible or would involve a disproportionate effort, in particular for processing
    for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes, subject
    to the conditions and safeguards referred to in Article 89(1) or in so far as the obligation referred to in paragraph
    1 of this Article is likely to render impossible or seriously impair the achievement of the objectives of that processing.
    In such cases the controller shall take appropriate measures to protect the data subject''s rights and freedoms and legitimate
    interests, including making the information publicly available; (c)  obtaining or disclosure is expressly laid down by
    Union or Member State law to which the controller is subject and which provides appropriate measures to protect the data
    subject''s legitimate interests; or (d)  where the personal data must remain confidential subject to an obligation of
    professional secrecy regulated by Union or Member State law, including a statutory obligation of secrecy. 4.5.2016 L 119/42'
