- source_sentence: What triggers the need for a review of processing operations?
  sentences:
  - The data subject should have the right not to be subject to a decision, which may include a measure, evaluating personal
    aspects relating to him or her which is based solely on automated processing and which produces legal effects concerning
    him or her or similarly significantly affects him or her, such as automatic refusal of an online credit application or
    e-recruiting practices without any human intervention. Such processing includes ‘profiling’ that consists of any form
    of automated processing of personal data evaluating the personal aspects relating to a natural person, in particular to
    analyse or predict aspects concerning the data subject's performance at work, economic situation, health, personal preferences
    or interests, reliability or behaviour, location or movements, where it produces legal effects concerning him or her or
    similarly significantly affects him or her. However, decision-making based on such processing, including profiling, should
    be allowed where expressly authorised by Union or Member State law to which the controller is subject, including for fraud
    and tax-evasion monitoring and prevention purposes conducted in accordance with the regulations, standards and recommendations
    of Union institutions or national oversight bodies and to ensure the security and reliability of a service provided by
    the controller, or necessary for the entering or performance of a contract between the data subject and a controller,
    or when the data subject has given his or her explicit consent. In any case, such processing should be subject to suitable
    safeguards, which should include specific information to the data subject and the right to obtain human intervention,
    to express his or her point of view, to obtain an explanation of the decision reached after such assessment and to challenge
    the decision. Such measure should not concern a child. In order to ensure fair and transparent processing in respect of
    the data subject, taking into account the specific circumstances and context in which the personal data are processed,
    the controller should use appropriate mathematical or statistical procedures for the profiling, implement technical and
    organisational measures appropriate to ensure, in particular, that factors which result in inaccuracies in personal data
    are corrected and the risk of errors is minimised, secure personal data in a manner that takes account of the potential
    risks involved for the interests and rights of the data subject and that prevents, inter alia, discriminatory effects
    on natural persons on the basis of racial or ethnic origin, political opinion, religion or beliefs, trade union membership,
    genetic or health status or sexual orientation, or that result in measures having such an effect. Automated decision-making
    and profiling based on special categories of personal data should be allowed only under specific conditions.
  - "Court (Civil/Criminal): Civil  \nProvisions: Law 4537/2018.  \nTime of commission of act:  \nOutcome (not guilty, guilty):\
    \  \nReasoning: PARTIALLY ACCEPTS the lawsuit. RECOGNIZES the obligation of the defendant (a) to pay the plaintiffs in\
    \ full the amount of eight thousand eight hundred ninety (8,890) euros, with legal interest from December 2, 2021, and\
    \ (b) to pay each of the plaintiffs the amount of five hundred (500) euros with legal interest from the service of the\
    \ lawsuit.  \nFacts: The plaintiffs claim that they are co-beneficiaries of a savings account held by the defendant, and\
    \ that unknown perpetrators gained access to the aforementioned account via the internet, without the plaintiffs themselves\
    \ having any fault regarding the safeguarding of the codes or the disclosure of the unique transaction codes (OTR). They\
    \ assert that the defendant is responsible for the access gained by the unknown perpetrators to the savings account, as\
    \ the defendant negligently violated the protective obligations it owed to the plaintiffs. They state that, due to the\
    \ actions of the unknown perpetrators, gradual transfers of monetary amounts were made, resulting in the aforementioned\
    \ savings account being depleted by the amount of 10,120 euros within a few minutes. They informed the defendant of the\
    \ aforementioned actions through the appropriate channels; however, the defendant negligently delayed the necessary actions.\
    \ The defendant denies any liability and the return of the aforementioned monetary amount."
  - "1.Where a type of processing in particular using new technologies, and taking into account the nature, scope, context\
    \ and purposes of the processing, is likely to result in a high risk to the rights and freedoms of natural persons, the\
    \ controller shall, prior to the processing, carry out an assessment of the impact of the envisaged processing operations\
    \ on the protection of personal data. A single assessment may address a set of similar processing operations that present\
    \ similar high risks.\n2.The controller shall seek the advice of the data protection officer, where designated, when carrying\
    \ out a data protection impact assessment.\n3.A data protection impact assessment referred to in paragraph 1 shall in\
    \ particular be required in the case of: (a)  a systematic and extensive evaluation of personal aspects relating to natural\
    \ persons which is based on automated processing, including profiling, and on which decisions are based that produce legal\
    \ effects concerning the natural person or similarly significantly affect the natural person; (b)  processing on a large\
    \ scale of special categories of data referred to in Article 9(1), or of personal data relating to criminal convictions\
    \ and offences referred to in Article 10; or (c)  a systematic monitoring of a publicly accessible area on a large scale.\n\
    4.The supervisory authority shall establish and make public a list of the kind of processing operations which are subject\
    \ to the requirement for a data protection impact assessment pursuant to paragraph 1. The supervisory authority shall\
    \ communicate those lists to the Board referred to in Article 68\n5.The supervisory authority may also establish and make\
    \ public a list of the kind of processing operations for which no data protection impact assessment is required. The supervisory\
    \ authority shall communicate those lists to the Board.\n6.Prior to the adoption of the lists referred to in paragraphs\
    \ 4 and 5, the competent supervisory authority shall apply the consistency mechanism referred to in Article 63 where such\
    \ lists involve processing activities which are related to the offering of goods or services to data subjects or to the\
    \ monitoring of their behaviour in several Member States, or may substantially affect the free movement of personal data\
    \ within the Union. 4.5.2016 L 119/53  \n7.The assessment shall contain at least: (a)  a systematic description of the\
    \ envisaged processing operations and the purposes of the processing, including, where applicable, the legitimate interest\
    \ pursued by the controller; (b)  an assessment of the necessity and proportionality of the processing operations in relation\
    \ to the purposes; (c)  an assessment of the risks to the rights and freedoms of data subjects referred to in paragraph\
    \ 1; and (d)  the measures envisaged to address the risks, including safeguards, security measures and mechanisms to ensure\
    \ the protection of personal data and to demonstrate compliance with this Regulation taking into account the rights and\
    \ legitimate interests of data subjects and other persons concerned.\n8.Compliance with approved codes of conduct referred\
    \ to in Article 40 by the relevant controllers or processors shall be taken into due account in assessing the impact of\
    \ the processing operations performed by such controllers or processors, in particular for the purposes of a data protection\
    \ impact assessment.\n9.Where appropriate, the controller shall seek the views of data subjects or their representatives\
    \ on the intended processing, without prejudice to the protection of commercial or public interests or the security of\
    \ processing operations.\n10.Where processing pursuant to point (c) or (e) of Article 6(1) has a legal basis in Union\
    \ law or in the law of the Member State to which the controller is subject, that law regulates the specific processing\
    \ operation or set of operations in question, and a data protection impact assessment has already been carried out as\
    \ part of a general impact assessment in the context of the adoption of that legal basis, paragraphs 1 to 7 shall not\
    \ apply unless Member States deem it to be necessary to carry out such an assessment prior to processing activities.\n\
    11. Where necessary, the controller shall carry out a review to assess if processing is performed in accordance with the\
    \ data protection impact assessment at least when there is a change of the risk represented by processing operations."
