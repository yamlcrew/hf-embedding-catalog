  widget:
  - source_sentence: According to Regulation (EC) No 765/2008, what accreditation body should certification bodies be accredited
      by?
    sentences:
    - Those derogations should in particular apply to data transfers required and necessary for important reasons of public
      interest, for example in cases of international data exchange between competition authorities, tax or customs administrations,
      between financial supervisory authorities, between services competent for social security matters, or for public health,
      for example in the case of contact tracing for contagious diseases or in order to reduce and/or eliminate doping in
      sport. A transfer of personal data should also be regarded as lawful where it is necessary to protect an interest which
      is essential for the data subject's or another person's vital interests, including physical integrity or life, if the
      data subject is incapable of giving consent. In the absence of an adequacy decision, Union or Member State law may,
      for important reasons of public interest, expressly set limits to the transfer of specific categories of data to a third
      country or an international organisation. Member States should notify such provisions to the Commission. Any transfer
      to an international humanitarian organisation of personal data of a data subject who is physically or legally incapable
      of giving consent, with a view to accomplishing a task incumbent under the Geneva Conventions or to complying with international
      humanitarian law applicable in armed conflicts, could be considered to be necessary for an important reason of public
      interest or because it is in the vital interest of the data subject.
    - "1.Without prejudice to the tasks and powers of the competent supervisory authority under Articles 57 and 58, certification\
      \ bodies which have an appropriate level of expertise in relation to data protection shall, after informing the supervisory\
      \ authority in order to allow it to exercise its powers pursuant to point (h) of Article 58(2) where necessary, issue\
      \ and renew certification. Member States shall ensure that those certification bodies are accredited by one or both\
      \ of the following: (a)  the supervisory authority which is competent pursuant to Article 55 or 56; (b)  the national\
      \ accreditation body named in accordance with Regulation (EC) No 765/2008 of the European Parliament and of the Council\
      \ (1) in accordance with EN-ISO/IEC 17065/2012 and with the additional requirements established by the supervisory authority\
      \ which is competent pursuant to Article 55 or 56. \n2.Certification bodies referred to in paragraph 1 shall be accredited\
      \ in accordance with that paragraph only where they have: (a)  demonstrated their independence and expertise in relation\
      \ to the subject-matter of the certification to the satisfaction of the competent supervisory authority; 4.5.2016 L\
      \ 119/59   (1) Regulation (EC) No 765/2008 of the European Parliament and of the Council of 9 July 2008 setting out\
      \ the requirements for accreditation and market surveillance relating to the marketing of products and repealing Regulation\
      \ (EEC) No 339/93 (OJ L 218, 13.8.2008, p. 30). (b)  undertaken to respect the criteria referred to in Article 42(5)\
      \ and approved by the supervisory authority which is competent pursuant to Article 55 or 56 or by the Board pursuant\
      \ to Article 63; (c)  established procedures for the issuing, periodic review and withdrawal of data protection certification,\
      \ seals and marks; (d)  established procedures and structures to handle complaints about infringements of the certification\
      \ or the manner in which the certification has been, or is being, implemented by the controller or processor, and to\
      \ make those procedures and structures transparent to data subjects and the public; and (e)  demonstrated, to the satisfaction\
      \ of the competent supervisory authority, that their tasks and duties do not result in a conflict of interests.\n3.The\
      \ accreditation of certification bodies as referred to in paragraphs 1 and 2 of this Article shall take place on the\
      \ basis of criteria approved by the supervisory authority which is competent pursuant to Article 55 or 56 or by the\
      \ Board pursuant to Article 63. In the case of accreditation pursuant to point (b) of paragraph 1 of this Article, those\
      \ requirements shall complement those envisaged in Regulation (EC) No 765/2008 and the technical rules that describe\
      \ the methods and procedures of the certification bodies.\n4.The certification bodies referred to in paragraph 1 shall\
      \ be responsible for the proper assessment leading to the certification or the withdrawal of such certification without\
      \ prejudice to the responsibility of the controller or processor for compliance with this Regulation. The accreditation\
      \ shall be issued for a maximum period of five years and may be renewed on the same conditions provided that the certification\
      \ body meets the requirements set out in this Article.\n5.The certification bodies referred to in paragraph 1 shall\
      \ provide the competent supervisory authorities with the reasons for granting or withdrawing the requested certification.\n\
      6.The requirements referred to in paragraph 3 of this Article and the criteria referred to in Article 42(5) shall be\
      \ made public by the supervisory authority in an easily accessible form. The supervisory authorities shall also transmit\
      \ those requirements and criteria to the Board. The Board shall collate all certification mechanisms and data protection\
      \ seals in a register and shall make them publicly available by any appropriate means.\n7.Without prejudice to Chapter\
      \ VIII, the competent supervisory authority or the national accreditation body shall revoke an accreditation of a certification\
      \ body pursuant to paragraph 1 of this Article where the conditions for the accreditation are not, or are no longer,\
      \ met or where actions taken by a certification body infringe this Regulation.\n8.The Commission shall be empowered\
      \ to adopt delegated acts in accordance with Article 92 for the purpose of specifying the requirements to be taken into\
      \ account for the data protection certification mechanisms referred to in Article 42(1).\n9.The Commission may adopt\
      \ implementing acts laying down technical standards for certification mechanisms and data protection seals and marks,\
      \ and mechanisms to promote and recognise those certification mechanisms, seals and marks. Those implementing acts shall\
      \ be adopted in accordance with the examination procedure referred to in Article 93(2). CHAPTER V Transfers of personal\
      \ data to third countries or international organisations"
    - "1.The supervisory authorities shall, where appropriate, conduct joint operations including joint investigations and\
      \ joint enforcement measures in which members or staff of the supervisory authorities of other Member States are involved.\
      \ 4.5.2016 L 119/72  \n2.Where the controller or processor has establishments in several Member States or where a significant\
      \ number of data subjects in more than one Member State are likely to be substantially affected by processing operations,\
      \ a supervisory authority of each of those Member States shall have the right to participate in joint operations. The\
      \ supervisory authority which is competent pursuant to Article 56(1) or (4) shall invite the supervisory authority of\
      \ each of those Member States to take part in the joint operations and shall respond without delay to the request of\
      \ a supervisory authority to participate.\n3.A supervisory authority may, in accordance with Member State law, and with\
      \ the seconding supervisory authority's authorisation, confer powers, including investigative powers on the seconding\
      \ supervisory authority's members or staff involved in joint operations or, in so far as the law of the Member State\
      \ of the host supervisory authority permits, allow the seconding supervisory authority's members or staff to exercise\
      \ their investigative powers in accordance with the law of the Member State of the seconding supervisory authority.\
      \ Such investigative powers may be exercised only under the guidance and in the presence of members or staff of the\
      \ host supervisory authority. The seconding supervisory authority's members or staff shall be subject to the Member\
      \ State law of the host supervisory authority.\n4.Where, in accordance with paragraph 1, staff of a seconding supervisory\
      \ authority operate in another Member State, the Member State of the host supervisory authority shall assume responsibility\
      \ for their actions, including liability, for any damage caused by them during their operations, in accordance with\
      \ the law of the Member State in whose territory they are operating.\n5.The Member State in whose territory the damage\
      \ was caused shall make good such damage under the conditions applicable to damage caused by its own staff. The Member\
      \ State of the seconding supervisory authority whose staff has caused damage to any person in the territory of another\
      \ Member State shall reimburse that other Member State in full any sums it has paid to the persons entitled on their\
      \ behalf.\n6.Without prejudice to the exercise of its rights vis-à-vis third parties and with the exception of paragraph\
      \ 5, each Member State shall refrain, in the case provided for in paragraph 1, from requesting reimbursement from another\
      \ Member State in relation to damage referred to in paragraph 4\n7.Where a joint operation is intended and a supervisory\
      \ authority does not, within one month, comply with the obligation laid down in the second sentence of paragraph 2 of\
      \ this Article, the other supervisory authorities may adopt a provisional measure on the territory of its Member State\
      \ in accordance with Article 55. In that case, the urgent need to act under Article 66(1) shall be presumed to be met\
      \ and require an opinion or an urgent binding decision from the Board pursuant to Article 66(2). Section 2 Consistency"
  - source_sentence: Who is exempt from liability only if they prove the member is not responsible for the damage?
    sentences:
    - '1.Union or Member State law to which the data controller or processor is subject may restrict by way of a legislative
      measure the scope of the obligations and rights provided for in Articles 12 to 22 and Article 34, as well as Article
      5 in so far as its provisions correspond to the rights and obligations provided for in Articles 12 to 22, when such
      a restriction respects the essence of the fundamental rights and freedoms and is a necessary and proportionate measure
      in a democratic society to safeguard: (a)  national security; (b)  defence; (c)  public security; 4.5.2016 L 119/46   (d)  the
      prevention, investigation, detection or prosecution of criminal offences or the execution of criminal penalties, including
      the safeguarding against and the prevention of threats to public security; (e)  other important objectives of general
      public interest of the Union or of a Member State, in particular an important economic or financial interest of the
      Union or of a Member State, including monetary, budgetary and taxation a matters, public health and social security;
      (f)  the protection of judicial independence and judicial proceedings; (g)  the prevention, investigation, detection
      and prosecution of breaches of ethics for regulated professions; (h)  a monitoring, inspection or regulatory function
      connected, even occasionally, to the exercise of official authority in the cases referred to in points (a) to (e) and
      (g); (i)  the protection of the data subject or the rights and freedoms of others; (j)  the enforcement of civil law
      claims.

      2.In particular, any legislative measure referred to in paragraph 1 shall contain specific provisions at least, where
      relevant, as to: (a)  the purposes of the processing or categories of processing; (b)  the categories of personal data;
      (c)  the scope of the restrictions introduced; (d)  the safeguards to prevent abuse or unlawful access or transfer;
      (e)  the specification of the controller or categories of controllers; (f)  the storage periods and the applicable safeguards
      taking into account the nature, scope and purposes of the processing or categories of processing; (g)  the risks to
      the rights and freedoms of data subjects; and (h)  the right of data subjects to be informed about the restriction,
      unless that may be prejudicial to the purpose of the restriction. CHAPTER IV Controller and processor Section 1 General
      obligations'
    - "1.The competent supervisory authority shall approve binding corporate rules in accordance with the consistency mechanism\
      \ set out in Article 63, provided that they: (a)  are legally binding and apply to and are enforced by every member\
      \ concerned of the group of undertakings, or group of enterprises engaged in a joint economic activity, including their\
      \ employees; 4.5.2016 L 119/62   (b)  expressly confer enforceable rights on data subjects with regard to the processing\
      \ of their personal data; and (c)  fulfil the requirements laid down in paragraph 2\n2.The binding corporate rules referred\
      \ to in paragraph 1 shall specify at least: (a)  the structure and contact details of the group of undertakings, or\
      \ group of enterprises engaged in a joint economic activity and of each of its members; (b)  the data transfers or set\
      \ of transfers, including the categories of personal data, the type of processing and its purposes, the type of data\
      \ subjects affected and the identification of the third country or countries in question; (c)  their legally binding\
      \ nature, both internally and externally; (d)  the application of the general data protection principles, in particular\
      \ purpose limitation, data minimisation, limited storage periods, data quality, data protection by design and by default,\
      \ legal basis for processing, processing of special categories of personal data, measures to ensure data security, and\
      \ the requirements in respect of onward transfers to bodies not bound by the binding corporate rules; (e)  the rights\
      \ of data subjects in regard to processing and the means to exercise those rights, including the right not to be subject\
      \ to decisions based solely on automated processing, including profiling in accordance with Article 22, the right to\
      \ lodge a complaint with the competent supervisory authority and before the competent courts of the Member States in\
      \ accordance with Article 79, and to obtain redress and, where appropriate, compensation for a breach of the binding\
      \ corporate rules; (f)  the acceptance by the controller or processor established on the territory of a Member State\
      \ of liability for any breaches of the binding corporate rules by any member concerned not established in the Union;\
      \ the controller or the processor shall be exempt from that liability, in whole or in part, only if it proves that that\
      \ member is not responsible for the event giving rise to the damage; (g)  how the information on the binding corporate\
      \ rules, in particular on the provisions referred to in points (d), (e) and (f) of this paragraph is provided to the\
      \ data subjects in addition to Articles 13 and 14; (h)  the tasks of any data protection officer designated in accordance\
      \ with Article 37 or any other person or entity in charge of the monitoring compliance with the binding corporate rules\
      \ within the group of undertakings, or group of enterprises engaged in a joint economic activity, as well as monitoring\
      \ training and complaint-handling; (i)  the complaint procedures; (j)  the mechanisms within the group of undertakings,\
      \ or group of enterprises engaged in a joint economic activity for ensuring the verification of compliance with the\
      \ binding corporate rules. Such mechanisms shall include data protection audits and methods for ensuring corrective\
      \ actions to protect the rights of the data subject. Results of such verification should be communicated to the person\
      \ or entity referred to in point (h) and to the board of the controlling undertaking of a group of undertakings, or\
      \ of the group of enterprises engaged in a joint economic activity, and should be available upon request to the competent\
      \ supervisory authority; (k)  the mechanisms for reporting and recording changes to the rules and reporting those changes\
      \ to the supervisory authority; (l)  the cooperation mechanism with the supervisory authority to ensure compliance by\
      \ any member of the group of undertakings, or group of enterprises engaged in a joint economic activity, in particular\
      \ by making available to the supervisory authority the results of verifications of the measures referred to in point\
      \ (j); (m)  the mechanisms for reporting to the competent supervisory authority any legal requirements to which a member\
      \ of the group of undertakings, or group of enterprises engaged in a joint economic activity is subject in a third country\
      \ which are likely to have a substantial adverse effect on the guarantees provided by the binding corporate rules; and\
      \ (n)  the appropriate data protection training to personnel having permanent or regular access to personal data. 4.5.2016\
      \ L 119/63  \n3.The Commission may specify the format and procedures for the exchange of information between controllers,\
      \ processors and supervisory authorities for binding corporate rules within the meaning of this Article. Those implementing\
      \ acts shall be adopted in accordance with the examination procedure set out in Article 93(2)."
    - The processor and any person acting under the authority of the controller or of the processor, who has access to personal
      data, shall not process those data except on instructions from the controller, unless required to do so by Union or
      Member State law
  - source_sentence: What might hamper the efforts of supervisory authorities to work together in the cross-border context?
    sentences:
    - Member States law should reconcile the rules governing freedom of expression and information, including journalistic,
      academic, artistic and or literary expression with the right to the protection of personal data pursuant to this Regulation.
      The processing of personal data solely for journalistic purposes, or for the purposes of academic, artistic or literary
      expression should be subject to derogations or exemptions from certain provisions of this Regulation if necessary to
      reconcile the right to the protection of personal data with the right to freedom of expression and information, as enshrined
      in Article 11 of the Charter. This should apply in particular to the processing of personal data in the audiovisual
      field and in news archives and press libraries. Therefore, Member States should adopt legislative measures which lay
      down the exemptions and derogations necessary for the purpose of balancing those fundamental rights. Member States should
      adopt such exemptions and derogations on general principles, the rights of the data subject, the controller and the
      processor, the transfer of personal data to third countries or international organisations, the independent supervisory
      authorities, cooperation and consistency, and specific data-processing situations. Where such exemptions or derogations
      differ from one Member State to another, the law of the Member State to which the controller is subject should apply.
      In order to take account of the importance of the right to freedom of expression in every democratic society, it is
      necessary to interpret notions relating to that freedom, such as journalism, broadly.
    - "1.Each supervisory authority shall ensure that the imposition of administrative fines pursuant to this Article in respect\
      \ of infringements of this Regulation referred to in paragraphs 4, 5 and 6 shall in each individual case be effective,\
      \ proportionate and dissuasive.\n2.Administrative fines shall, depending on the circumstances of each individual case,\
      \ be imposed in addition to, or instead of, measures referred to in points (a) to (h) and (j) of Article 58(2). When\
      \ deciding whether to impose an administrative fine and deciding on the amount of the administrative fine in each individual\
      \ case due regard shall be given to the following: (a)  the nature, gravity and duration of the infringement taking\
      \ into account the nature scope or purpose of the processing concerned as well as the number of data subjects affected\
      \ and the level of damage suffered by them; (b)  the intentional or negligent character of the infringement; (c)  any\
      \ action taken by the controller or processor to mitigate the damage suffered by data subjects; (d)  the degree of responsibility\
      \ of the controller or processor taking into account technical and organisational measures implemented by them pursuant\
      \ to Articles 25 and 32; (e)  any relevant previous infringements by the controller or processor; (f)  the degree of\
      \ cooperation with the supervisory authority, in order to remedy the infringement and mitigate the possible adverse\
      \ effects of the infringement; (g)  the categories of personal data affected by the infringement; (h)  the manner in\
      \ which the infringement became known to the supervisory authority, in particular whether, and if so to what extent,\
      \ the controller or processor notified the infringement; (i)  where measures referred to in Article 58(2) have previously\
      \ been ordered against the controller or processor concerned with regard to the same subject-matter, compliance with\
      \ those measures; (j)  adherence to approved codes of conduct pursuant to Article 40 or approved certification mechanisms\
      \ pursuant to Article 42; and (k)  any other aggravating or mitigating factor applicable to the circumstances of the\
      \ case, such as financial benefits gained, or losses avoided, directly or indirectly, from the infringement.\n3.If a\
      \ controller or processor intentionally or negligently, for the same or linked processing operations, infringes several\
      \ provisions of this Regulation, the total amount of the administrative fine shall not exceed the amount specified for\
      \ the gravest infringement.\n4.Infringements of the following provisions shall, in accordance with paragraph 2, be subject\
      \ to administrative fines up to 10 000 000 EUR, or in the case of an undertaking, up to 2 % of the total worldwide annual\
      \ turnover of the preceding financial year, whichever is higher: (a)  the obligations of the controller and the processor\
      \ pursuant to Articles 8, 11, 25 to 39 and 42 and 43; (b)  the obligations of the certification body pursuant to Articles\
      \ 42 and 43; (c)  the obligations of the monitoring body pursuant to Article 41(4). 4.5.2016 L 119/82  \n5.Infringements\
      \ of the following provisions shall, in accordance with paragraph 2, be subject to administrative fines up to 20 000\
      \ 000 EUR, or in the case of an undertaking, up to 4 % of the total worldwide annual turnover of the preceding financial\
      \ year, whichever is higher: (a)  the basic principles for processing, including conditions for consent, pursuant to\
      \ Articles 5, 6, 7 and 9; (b)  the data subjects' rights pursuant to Articles 12 to 22; (c)  the transfers of personal\
      \ data to a recipient in a third country or an international organisation pursuant to Articles 44 to 49; (d)  any obligations\
      \ pursuant to Member State law adopted under Chapter IX; (e)  non-compliance with an order or a temporary or definitive\
      \ limitation on processing or the suspension of data flows by the supervisory authority pursuant to Article 58(2) or\
      \ failure to provide access in violation of Article 58(1).\n6.Non-compliance with an order by the supervisory authority\
      \ as referred to in Article 58(2) shall, in accordance with paragraph 2 of this Article, be subject to administrative\
      \ fines up to 20 000 000 EUR, or in the case of an undertaking, up to 4 % of the total worldwide annual turnover of\
      \ the preceding financial year, whichever is higher.\n7.Without prejudice to the corrective powers of supervisory authorities\
      \ pursuant to Article 58(2), each Member State may lay down the rules on whether and to what extent administrative fines\
      \ may be imposed on public authorities and bodies established in that Member State.\n8.The exercise by the supervisory\
      \ authority of its powers under this Article shall be subject to appropriate procedural safeguards in accordance with\
      \ Union and Member State law, including effective judicial remedy and due process.\n9.Where the legal system of the\
      \ Member State does not provide for administrative fines, this Article may be applied in such a manner that the fine\
      \ is initiated by the competent supervisory authority and imposed by competent national courts, while ensuring that\
      \ those legal remedies are effective and have an equivalent effect to the administrative fines imposed by supervisory\
      \ authorities. In any event, the fines imposed shall be effective, proportionate and dissuasive. Those Member States\
      \ shall notify to the Commission the provisions of their laws which they adopt pursuant to this paragraph by 25 May\
      \ 2018 and, without delay, any subsequent amendment law or amendment affecting them."
    - When personal data moves across borders outside the Union it may put at increased risk the ability of natural persons
      to exercise data protection rights in particular to protect themselves from the unlawful use or disclosure of that information.
      At the same time, supervisory authorities may find that they are unable to pursue complaints or conduct investigations
      relating to the activities outside their borders. Their efforts to work together in the cross-border context may also
      be hampered by insufficient preventative or remedial powers, inconsistent legal regimes, and practical obstacles like
      resource constraints. Therefore, there is a need to promote closer cooperation among data protection supervisory authorities
      to help them exchange information and carry out investigations with their international counterparts. For the purposes
      of developing international cooperation mechanisms to facilitate and provide international mutual assistance for the
      enforcement of legislation for the protection of personal data, the Commission and the supervisory authorities should
      exchange information and cooperate in activities related to the exercise of their powers with competent authorities
      in third countries, based on reciprocity and in accordance with this Regulation.
