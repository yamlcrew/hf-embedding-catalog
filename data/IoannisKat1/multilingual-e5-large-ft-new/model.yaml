  - '1.Where personal data relating to a data subject are collected from the data subject, the controller shall, at the time
    when personal data are obtained, provide the data subject with all of the following information: (a)  the identity and
    the contact details of the controller and, where applicable, of the controller''s representative; (b)  the contact details
    of the data protection officer, where applicable; (c)  the purposes of the processing for which the personal data are
    intended as well as the legal basis for the processing; 4.5.2016 L 119/40   (d)  where the processing is based on point
    (f) of Article 6(1), the legitimate interests pursued by the controller or by a third party; (e)  the recipients or categories
    of recipients of the personal data, if any; (f)  where applicable, the fact that the controller intends to transfer personal
    data to a third country or international organisation and the existence or absence of an adequacy decision by the Commission,
    or in the case of transfers referred to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to
    the appropriate or suitable safeguards and the means by which to obtain a copy of them or where they have been made available.

    2.In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are
    obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing:
    (a)  the period for which the personal data will be stored, or if that is not possible, the criteria used to determine
    that period; (b)  the existence of the right to request from the controller access to and rectification or erasure of
    personal data or restriction of processing concerning the data subject or to object to processing as well as the right
    to data portability; (c)  where the processing is based on point (a) of Article 6(1) or point (a) of Article 9(2), the
    existence of the right to withdraw consent at any time, without affecting the lawfulness of processing based on consent
    before its withdrawal; (d)  the right to lodge a complaint with a supervisory authority; (e)  whether the provision of
    personal data is a statutory or contractual requirement, or a requirement necessary to enter into a contract, as well
    as whether the data subject is obliged to provide the personal data and of the possible consequences of failure to provide
    such data; (f)  the existence of automated decision-making, including profiling, referred to in Article 22(1) and (4)
    and, at least in those cases, meaningful information about the logic involved, as well as the significance and the envisaged
    consequences of such processing for the data subject.

    3.Where the controller intends to further process the personal data for a purpose other than that for which the personal
    data were collected, the controller shall provide the data subject prior to that further processing with information on
    that other purpose and with any relevant further information as referred to in paragraph 2

    4.Paragraphs 1, 2 and 3 shall not apply where and insofar as the data subject already has the information.'
  - In order to enhance compliance with this Regulation where processing operations are likely to result in a high risk to
    the rights and freedoms of natural persons, the controller should be responsible for the carrying-out of a data protection
    impact assessment to evaluate, in particular, the origin, nature, particularity and severity of that risk. The outcome
    of the assessment should be taken into account when determining the appropriate measures to be taken in order to demonstrate
    that the processing of personal data complies with this Regulation. Where a data-protection impact assessment indicates
    that processing operations involve a high risk which the controller cannot mitigate by appropriate measures in terms of
    available technology and costs of implementation, a consultation of the supervisory authority should take place prior
    to the processing.
- source_sentence: In what situations are restrictions imposed for the prevention of threats?
  sentences:
  - Restrictions concerning specific principles and the rights of information, access to and rectification or erasure of personal
    data, the right to data portability, the right to object, decisions based on profiling, as well as the communication of
    a personal data breach to a data subject and certain related obligations of the controllers may be imposed by Union or
    Member State law, as far as necessary and proportionate in a democratic society to safeguard public security, including
    the protection of human life especially in response to natural or manmade disasters, the prevention, investigation and
    prosecution of criminal offences or the execution of criminal penalties, including the safeguarding against and the prevention
    of threats to public security, or of breaches of ethics for regulated professions, other important objectives of general
    public interest of the Union or of a Member State, in particular an important economic or financial interest of the Union
    or of a Member State, the keeping of public registers kept for reasons of general public interest, further processing
    of archived personal data to provide specific information related to the political behaviour under former totalitarian
    state regimes or the protection of the data subject or the rights and freedoms of others, including social protection,
    public health and humanitarian purposes. Those restrictions should be in accordance with the requirements set out in the
    Charter and in the European Convention for the Protection of Human Rights and Fundamental Freedoms.
  - The data subject should have the right not to be subject to a decision, which may include a measure, evaluating personal
    aspects relating to him or her which is based solely on automated processing and which produces legal effects concerning
    him or her or similarly significantly affects him or her, such as automatic refusal of an online credit application or
    e-recruiting practices without any human intervention. Such processing includes ‘profiling’ that consists of any form
    of automated processing of personal data evaluating the personal aspects relating to a natural person, in particular to
    analyse or predict aspects concerning the data subject's performance at work, economic situation, health, personal preferences
    or interests, reliability or behaviour, location or movements, where it produces legal effects concerning him or her or
    similarly significantly affects him or her. However, decision-making based on such processing, including profiling, should
    be allowed where expressly authorised by Union or Member State law to which the controller is subject, including for fraud
    and tax-evasion monitoring and prevention purposes conducted in accordance with the regulations, standards and recommendations
    of Union institutions or national oversight bodies and to ensure the security and reliability of a service provided by
    the controller, or necessary for the entering or performance of a contract between the data subject and a controller,
    or when the data subject has given his or her explicit consent. In any case, such processing should be subject to suitable
    safeguards, which should include specific information to the data subject and the right to obtain human intervention,
    to express his or her point of view, to obtain an explanation of the decision reached after such assessment and to challenge
    the decision. Such measure should not concern a child. In order to ensure fair and transparent processing in respect of
    the data subject, taking into account the specific circumstances and context in which the personal data are processed,
    the controller should use appropriate mathematical or statistical procedures for the profiling, implement technical and
    organisational measures appropriate to ensure, in particular, that factors which result in inaccuracies in personal data
    are corrected and the risk of errors is minimised, secure personal data in a manner that takes account of the potential
    risks involved for the interests and rights of the data subject and that prevents, inter alia, discriminatory effects
    on natural persons on the basis of racial or ethnic origin, political opinion, religion or beliefs, trade union membership,
    genetic or health status or sexual orientation, or that result in measures having such an effect. Automated decision-making
    and profiling based on special categories of personal data should be allowed only under specific conditions.
  - '1.The Board shall issue an opinion where a competent supervisory authority intends to adopt any of the measures below.
    To that end, the competent supervisory authority shall communicate the draft decision to the Board, when it: (a)  aims
    to adopt a list of the processing operations subject to the requirement for a data protection impact assessment pursuant
    to Article 35(4); (b)  concerns a matter pursuant to Article 40(7) whether a draft code of conduct or an amendment or
    extension to a code of conduct complies with this Regulation; 4.5.2016 L 119/73   (c)  aims to approve the criteria for
    accreditation of a body pursuant to Article 41(3) or a certification body pursuant to Article 43(3); (d)  aims to determine
    standard data protection clauses referred to in point (d) of Article 46(2) and in Article 28(8); (e)  aims to authorise
    contractual clauses referred to in point (a) of Article 46(3); or (f)  aims to approve binding corporate rules within
    the meaning of Article 47

    2.Any supervisory authority, the Chair of the Board or the Commission may request that any matter of general application
    or producing effects in more than one Member State be examined by the Board with a view to obtaining an opinion, in particular
    where a competent supervisory authority does not comply with the obligations for mutual assistance in accordance with
    Article 61 or for joint operations in accordance with Article 62

    3.In the cases referred to in paragraphs 1 and 2, the Board shall issue an opinion on the matter submitted to it provided
    that it has not already issued an opinion on the same matter. That opinion shall be adopted within eight weeks by simple
    majority of the members of the Board. That period may be extended by a further six weeks, taking into account the complexity
    of the subject matter. Regarding the draft decision referred to in paragraph 1 circulated to the members of the Board
    in accordance with paragraph 5, a member which has not objected within a reasonable period indicated by the Chair, shall
    be deemed to be in agreement with the draft decision.

    4.Supervisory authorities and the Commission shall, without undue delay, communicate by electronic means to the Board,
    using a standardised format any relevant information, including as the case may be a summary of the facts, the draft decision,
    the grounds which make the enactment of such measure necessary, and the views of other supervisory authorities concerned.

    5.The Chair of the Board shall, without undue, delay inform by electronic means: (a)  the members of the Board and the
    Commission of any relevant information which has been communicated to it using a standardised format. The secretariat
    of the Board shall, where necessary, provide translations of relevant information; and (b)  the supervisory authority
    referred to, as the case may be, in paragraphs 1 and 2, and the Commission of the opinion and make it public.

    6.The competent supervisory authority shall not adopt its draft decision referred to in paragraph 1 within the period
    referred to in paragraph 3

    7.The supervisory authority referred to in paragraph 1 shall take utmost account of the opinion of the Board and shall,
    within two weeks after receiving the opinion, communicate to the Chair of the Board by electronic means whether it will
    maintain or amend its draft decision and, if any, the amended draft decision, using a standardised format.

    8.Where the supervisory authority concerned informs the Chair of the Board within the period referred to in paragraph
    7 of this Article that it does not intend to follow the opinion of the Board, in whole or in part, providing the relevant
    grounds, Article 65(1) shall apply.'
