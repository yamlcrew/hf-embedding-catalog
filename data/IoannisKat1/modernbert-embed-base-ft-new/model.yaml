  - source_sentence: When does the supervisory authority provide an opinion on the draft code?
    sentences:
    - '1.A transfer of personal data to a third country or an international organisation may take place where the Commission
      has decided that the third country, a territory or one or more specified sectors within that third country, or the international
      organisation in question ensures an adequate level of protection. Such a transfer shall not require any specific authorisation.

      2.When assessing the adequacy of the level of protection, the Commission shall, in particular, take account of the following
      elements: (a)  the rule of law, respect for human rights and fundamental freedoms, relevant legislation, both general
      and sectoral, including concerning public security, defence, national security and criminal law and the access of public
      authorities to personal data, as well as the implementation of such legislation, data protection rules, professional
      rules and security measures, including rules for the onward transfer of personal data to another third country or international
      organisation which are complied with in that country or international organisation, case-law, as well as effective and
      enforceable data subject rights and effective administrative and judicial redress for the data subjects whose personal
      data are being transferred; (b)  the existence and effective functioning of one or more independent supervisory authorities
      in the third country or to which an international organisation is subject, with responsibility for ensuring and enforcing
      compliance with the data protection rules, including adequate enforcement powers, for assisting and advising the data
      subjects in exercising their rights and for cooperation with the supervisory authorities of the Member States; and (c)  the
      international commitments the third country or international organisation concerned has entered into, or other obligations
      arising from legally binding conventions or instruments as well as from its participation in multilateral or regional
      systems, in particular in relation to the protection of personal data.

      3.The Commission, after assessing the adequacy of the level of protection, may decide, by means of implementing act,
      that a third country, a territory or one or more specified sectors within a third country, or an international organisation
      ensures an adequate level of protection within the meaning of paragraph 2 of this Article. The implementing act shall
      provide for a mechanism for a periodic review, at least every four years, which shall take into account all relevant
      developments in the third country or international organisation. The implementing act shall specify its territorial
      and sectoral application and, where applicable, identify the supervisory authority or authorities referred to in point
      (b) of paragraph 2 of this Article. The implementing act shall be adopted in accordance with the examination procedure
      referred to in Article 93(2).

      4.The Commission shall, on an ongoing basis, monitor developments in third countries and international organisations
      that could affect the functioning of decisions adopted pursuant to paragraph 3 of this Article and decisions adopted
      on the basis of Article 25(6) of Directive 95/46/EC.

      5.The Commission shall, where available information reveals, in particular following the review referred to in paragraph
      3 of this Article, that a third country, a territory or one or more specified sectors within a third country, or an
      international organisation no longer ensures an adequate level of protection within the meaning of paragraph 2 of this
      Article, to the extent necessary, repeal, amend or suspend the decision referred to in paragraph 3 of this Article by
      means of implementing acts without retro-active effect. Those implementing acts shall be adopted in accordance with
      the examination procedure referred to in Article 93(2). On duly justified imperative grounds of urgency, the Commission
      shall adopt immediately applicable implementing acts in accordance with the procedure referred to in Article 93(3).

      6.The Commission shall enter into consultations with the third country or international organisation with a view to
      remedying the situation giving rise to the decision made pursuant to paragraph 5

      7.A decision pursuant to paragraph 5 of this Article is without prejudice to transfers of personal data to the third
      country, a territory or one or more specified sectors within that third country, or the international organisation in
      question pursuant to Articles 46 to 49

      8.The Commission shall publish in the Official Journal of the European Union and on its website a list of the third
      countries, territories and specified sectors within a third country and international organisations for which it has
      decided that an adequate level of protection is or is no longer ensured.

      9.Decisions adopted by the Commission on the basis of Article 25(6) of Directive 95/46/EC shall remain in force until
      amended, replaced or repealed by a Commission Decision adopted in accordance with paragraph 3 or 5 of this Article.'
    - '1.The Member States, the supervisory authorities, the Board and the Commission shall encourage the drawing up of codes
      of conduct intended to contribute to the proper application of this Regulation, taking account of the specific features
      of the various processing sectors and the specific needs of micro, small and medium-sized enterprises.

      2.Associations and other bodies representing categories of controllers or processors may prepare codes of conduct, or
      amend or extend such codes, for the purpose of specifying the application of this Regulation, such as with regard to:
      (a)  fair and transparent processing; 4.5.2016 L 119/56   (b)  the legitimate interests pursued by controllers in specific
      contexts; (c)  the collection of personal data; (d)  the pseudonymisation of personal data; (e)  the information provided
      to the public and to data subjects; (f)  the exercise of the rights of data subjects; (g)  the information provided
      to, and the protection of, children, and the manner in which the consent of the holders of parental responsibility over
      children is to be obtained; (h)  the measures and procedures referred to in Articles 24 and 25 and the measures to ensure
      security of processing referred to in Article 32; (i)  the notification of personal data breaches to supervisory authorities
      and the communication of such personal data breaches to data subjects; (j)  the transfer of personal data to third countries
      or international organisations; or (k)  out-of-court proceedings and other dispute resolution procedures for resolving
      disputes between controllers and data subjects with regard to processing, without prejudice to the rights of data subjects
      pursuant to Articles 77 and 79

      3.In addition to adherence by controllers or processors subject to this Regulation, codes of conduct approved pursuant
      to paragraph 5 of this Article and having general validity pursuant to paragraph 9 of this Article may also be adhered
      to by controllers or processors that are not subject to this Regulation pursuant to Article 3 in order to provide appropriate
      safeguards within the framework of personal data transfers to third countries or international organisations under the
      terms referred to in point (e) of Article 46(2). Such controllers or processors shall make binding and enforceable commitments,
      via contractual or other legally binding instruments, to apply those appropriate safeguards including with regard to
      the rights of data subjects.

      4.A code of conduct referred to in paragraph 2 of this Article shall contain mechanisms which enable the body referred
      to in Article 41(1) to carry out the mandatory monitoring of compliance with its provisions by the controllers or processors
      which undertake to apply it, without prejudice to the tasks and powers of supervisory authorities competent pursuant
      to Article 55 or 56

      5.Associations and other bodies referred to in paragraph 2 of this Article which intend to prepare a code of conduct
      or to amend or extend an existing code shall submit the draft code, amendment or extension to the supervisory authority
      which is competent pursuant to Article 55. The supervisory authority shall provide an opinion on whether the draft code,
      amendment or extension complies with this Regulation and shall approve that draft code, amendment or extension if it
      finds that it provides sufficient appropriate safeguards.

      6.Where the draft code, or amendment or extension is approved in accordance with paragraph 5, and where the code of
      conduct concerned does not relate to processing activities in several Member States, the supervisory authority shall
      register and publish the code.

      7.Where a draft code of conduct relates to processing activities in several Member States, the supervisory authority
      which is competent pursuant to Article 55 shall, before approving the draft code, amendment or extension, submit it
      in the procedure referred to in Article 63 to the Board which shall provide an opinion on whether the draft code, amendment
      or extension complies with this Regulation or, in the situation referred to in paragraph 3 of this Article, provides
      appropriate safeguards.

      8.Where the opinion referred to in paragraph 7 confirms that the draft code, amendment or extension complies with this
      Regulation, or, in the situation referred to in paragraph 3, provides appropriate safeguards, the Board shall submit
      its opinion to the Commission.

      9.The Commission may, by way of implementing acts, decide that the approved code of conduct, amendment or extension
      submitted to it pursuant to paragraph 8 of this Article have general validity within the Union. Those implementing acts
      shall be adopted in accordance with the examination procedure set out in Article 93(2)

      10.The Commission shall ensure appropriate publicity for the approved codes which have been decided as having general
      validity in accordance with paragraph

      11.The Board shall collate all approved codes of conduct, amendments and extensions in a register and shall make them
      publicly available by way of appropriate means.'
