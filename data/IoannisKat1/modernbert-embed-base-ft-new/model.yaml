      of transfers referred to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to the appropriate
      or suitable safeguards and the means to obtain a copy of them or where they have been made available.

      2.In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the
      following information necessary to ensure fair and transparent processing in respect of the data subject: (a)  the period
      for which the personal data will be stored, or if that is not possible, the criteria used to determine that period;
      (b)  where the processing is based on point (f) of Article 6(1), the legitimate interests pursued by the controller
      or by a third party; (c)  the existence of the right to request from the controller access to and rectification or erasure
      of personal data or restriction of processing concerning the data subject and to object to processing as well as the
