  - source_sentence: When was the Regulation intended to contribute to the accomplishment of an area of freedom, security
      and justice?
    sentences:
    - "1.This Regulation applies to the processing of personal data in the context of the activities of an establishment of\
      \ a controller or a processor in the Union, regardless of whether the processing takes place in the Union or not. 4.5.2016\
      \ L 119/32  \n2.This Regulation applies to the processing of personal data of data subjects who are in the Union by\
      \ a controller or processor not established in the Union, where the processing activities are related to: (a)  the offering\
      \ of goods or services, irrespective of whether a payment of the data subject is required, to such data subjects in\
      \ the Union; or (b)  the monitoring of their behaviour as far as their behaviour takes place within the Union.\n3.This\
      \ Regulation applies to the processing of personal data by a controller not established in the Union, but in a place\
      \ where Member State law applies by virtue of public international law."
    - The principles of, and rules on the protection of natural persons with regard to the processing of their personal data
      should, whatever their nationality or residence, respect their fundamental rights and freedoms, in particular their
      right to the protection of personal data. This Regulation is intended to contribute to the accomplishment of an area
      of freedom, security and justice and of an economic union, to economic and social progress, to the strengthening and
      the convergence of the economies within the internal market, and to the well-being of natural persons.
    - "**Court (Civil/Criminal): Civil  \nProvisions:  \nTime of commission of the act:  \nOutcome (not guilty, guilty): Rejects\
      \ the lawsuit.  \nReasoning:  \nFacts: The plaintiff holds account number ....................... at the defendant bank.\
      \ Following the application/contract dated January 9, 2019, the plaintiff became a subscriber to the alternative service\
      \ networks provided by the defendant bank through online banking (.........................). In the aforementioned\
      \ application, the plaintiff stated that her mobile phone (number .................) would be used by the defendant\
      \ to send additional security codes for the approval of her transactions via .......................... It is noted\
      \ that the plaintiff received subscriber code .................., thus enabling her to conduct transactions without\
      \ her physical presence at the branches of the defendant bank, from fixed or mobile devices (computers, smartphones,\
      \ tablets), by entering her username and password to access her personal account. Regarding the identification methods,\
      \ these were agreed upon between the parties and are specified depending on the payment method used. More specifically,\
      \ the plaintiff had installed the application ...................................... on her mobile phone. According\
      \ to the terms of the above contract between the parties, the defendant bank (to ensure the protection of its customers\
      \ in using this application) requires three stages of identification: 1) the input of the customer's personal codes\
      \ (username and password) in the application .........................., 2) the input of a six-digit code (...................)\
      \ sent via SMS to the mobile number provided by the customer, to complete the login to .............................\
      \ and 3) the input of a new six-digit code (.................) sent in a new SMS to the mobile number provided by the\
      \ customer, to authenticate the device on which the aforementioned application is installed (usually a mobile phone).\
      \ \n\nFurthermore, it was established that on October 4, 2021, at 00:07, the plaintiff received a text message (SMS)\
      \ on her mobile phone (number ...................) with the following content: \".................................\"\
      , i.e., \"..........: a payment was attempted from a new device. If this was not you, please visit...\", providing the\
      \ above link. As she acknowledges in her lawsuit, she followed the link that was sent to her via SMS and entered her\
      \ login credentials (i.e., username and password) on the (fake) page she was redirected to. Thus, the perpetrators acquired\
      \ the plaintiff's personal information and subsequently entered it into the application ...........................\
      \ that they had installed on their own mobile phone. Following this, to complete the second stage of the process, as\
      \ described above, the defendant bank sent the aforementioned date and time of 00:14, a security code to the plaintiff's\
      \ mobile phone via SMS, with the content \".................................`.\" Subsequently, the defendant sent, at\
      \ 00:17, another SMS to the plaintiff's mobile phone with the security code .................., containing the message\
      \ \".........................................\", to complete the third stage of identification. It is noted that the\
      \ defendant sent another message to the plaintiff's mobile phone at 00:15, specifically \"..........................\"\
      , which was not used (perhaps because it was entered incorrectly by the plaintiff). It was later proven that the unknown\
      \ perpetrators charged the plaintiff's account with a total amount of €2,800.00 and an equivalent credit to a bank account\
      \ held similarly at the defendant bank, with the beneficiary being ............. The plaintiff contacted the defendant,\
      \ submitting a dispute over the above transactions and simultaneously filed a complaint against any responsible party\
      \ for the crimes of fraud and embezzlement. The defendant locked the plaintiff's subscription and provided her with\
      \ new codes, warning her not to use the aforementioned application via her mobile phone unless she scanned it with updated\
      \ antivirus/antispyware/malware software. Additionally, the defendant froze the account to which her money was transferred,\
      \ which, as mentioned earlier, belongs to ................., who also stated that she fell victim to electronic fraud,\
      \ being used by the aforementioned perpetrators as a front person. It was further established that the above-mentioned\
      \ ......................... consented to the return to the plaintiff of the amount of €239.54, which remained in her\
      \ account (as part of the aforementioned €2,800.00), while the plaintiff stated in a declaration that after the crediting\
      \ of her account with the amount of €239.54, she has no further claims against the defendant regarding the above history.\
      \ From the above proven facts, it was established that the plaintiff accessed the fraudulent page, entering her username\
      \ and password and subsequently the codes ....., which were sent to her mobile phone by the defendant bank. Regarding\
      \ the defendant, it was established that through its website ......................, through the login page to ................\
      \ and via messages to its subscribers, it informs them in detail about the risks of code interception and the protective\
      \ measures they should take, while it also informs them with a special announcement about phishing. For this reason,\
      \ the plaintiff's assertion that the perpetrators used one-time codes ......, violating the defendant's security systems,\
      \ must be dismissed as unfounded. Therefore, since the defendant successfully identified the plaintiff's identity as\
      \ well as her mobile phone without any indication of a breach of its electronic systems, the defendant is not liable\
      \ for the plaintiff's loss from the transfer of funds to an unknown person's account, nor is it responsible for compensating\
      \ that loss. Given these circumstances, the lawsuit must be dismissed as fundamentally unfounded.**"
  - source_sentence: What is the date of the Official Journal of the European Union mentioned?
    sentences:
    - "Court (Civil/Criminal): Criminal  \nProvisions: Article 386 of the Penal Code  \nTime of commission of the act:  \n\
      Result (innocent, guilty):  \nReasoning: Conviction for computer fraud committed repeatedly and professionally with\
      \ a total benefit and damage exceeding €30,000. According to the majority opinion, the charge is substantiated in both\
      \ its objective and subjective aspects, and the defendant must be declared guilty of the aforementioned criminal acts\
      \ of fraud by means of a computer, committed repeatedly by a perpetrator acting professionally, where the total financial\
      \ benefit and corresponding damage exceed the amount of €30,000, as well as for repeated embezzlement.\n\nFacts: The\
      \ defendant accessed a website using a computer, employing, without the knowledge and consent of the complainants, the\
      \ access codes for the electronic management system of the bank accounts held by the complainants at a Bank, and transferred\
      \ money through electronically transmitted orders from the complainants' accounts to her own account. Specifically,\
      \ during the period from June 2007 to June 2008, after unlawfully acquiring the aforementioned STICK containing the\
      \ access codes, she accessed a website maintained by ..., using, without the complainants' knowledge (without their\
      \ consent or approval), the access codes for the electronic management system of the bank accounts held at the aforementioned\
      \ Bank, transferring through electronically transmitted orders to the joint account number ... of the complainants from\
      \ bank accounts numbered ..., ..., and ..., the total amount of €55,710, as detailed in the orders, and subsequently,\
      \ using an ATM card, she gradually withdrew from the aforementioned account number ..., the total amount of €55,710,\
      \ making 84 individual withdrawals from automatic teller machines. In addition, the defendant, during the period from\
      \ June 2008 to November 2008, in the same exact manner (through the electronic management system of the bank accounts),\
      \ transferred through electronically transmitted orders to account number ..., which she had opened at ..., from the\
      \ complainants' bank accounts numbered ..., ..., ..., ..., and ..., the total amount of €73,942, as detailed in the\
      \ orders regarding the transfers of these amounts. Furthermore, during the period from February 2008 to November 2008,\
      \ through multiple acts constituting a continuation of the crime, although she had received from the first complainant\
      \ ... the amounts of €695.04, €695.04, and €845.04, in order to pay his insurance contributions to O.A.E.E. for the\
      \ periods of January-February 2008, May-June 2008, and September-October 2008, as well as the amounts of €250 and €280,\
      \ in order to settle credit card bills for \"...\", respectively, and from the second complainant ... she received the\
      \ amounts of €283.64, €419.26, and €385.38, to pay the latter's insurance contributions to O.A.E.E. for the periods\
      \ of July-August 2007, May-June 2008, September-October 2008, and November-December 2008, as well as the amount of €1,888.03\
      \ for the settlement of VAT, she never paid the above amounts to settle the aforementioned obligations, nor did she\
      \ return them to the complainants, despite being urged to do so, but incorporated them into her assets and wrongfully\
      \ appropriated them. The defendant denies the charges against her and claims that the withdrawals were made by the second\
      \ complainant and that all the amounts transferred to her account were transferred to cover the company's expenses and\
      \ their personal expenses, due to her cohabitation with the second complainant and with his knowledge, with whom she\
      \ intended to marry. However, this claim is not supported by any evidence; on the contrary, it emerged that she conducted\
      \ the transfers of the money and withdrawals without the complainants' knowledge, and when she learned that they had\
      \ been informed about the account movements and met at the Bank, her behavior and demeanor indicated guilt, according\
      \ to the testimony of the prosecution witness ..., an employee of the Pangrati branch of ..., who saw her on the same\
      \ day at the aforementioned Bank when she met with the complainants. The ongoing act of fraud using a computer was committed\
      \ by the defendant professionally, as evidenced by her repeated commission of the act, as well as the infrastructure\
      \ she had established with the intent of repeated commission, based on a specific plan and methodology (transferring\
      \ smaller amounts to a joint account of the complainants from the remaining accounts of the latter, and then withdrawing\
      \ the transferred amounts with an ATM card, as well as directly transferring smaller amounts from the complainants'\
      \ accounts to her personal account she had opened at the same bank), indicating her purpose to generate income, with\
      \ the financial benefit she gained, corresponding to the complainants' damage, exceeding a total of €30,000."
    - '1.Without prejudice to the tasks and powers of the competent supervisory authority under Articles 57 and 58, the monitoring
      of compliance with a code of conduct pursuant to Article 40 may be carried out by a body which has an appropriate level
      of expertise in relation to the subject-matter of the code and is accredited for that purpose by the competent supervisory
      authority.

      2.A body as referred to in paragraph 1 may be accredited to monitor compliance with a code of conduct where that body
      has: (a)  demonstrated its independence and expertise in relation to the subject-matter of the code to the satisfaction
      of the competent supervisory authority; (b)  established procedures which allow it to assess the eligibility of controllers
      and processors concerned to apply the code, to monitor their compliance with its provisions and to periodically review
      its operation; (c)  established procedures and structures to handle complaints about infringements of the code or the
      manner in which the code has been, or is being, implemented by a controller or processor, and to make those procedures
      and structures transparent to data subjects and the public; and (d)  demonstrated to the satisfaction of the competent
      supervisory authority that its tasks and duties do not result in a conflict of interests.

      3.The competent supervisory authority shall submit the draft criteria for accreditation of a body as referred to in
      paragraph 1 of this Article to the Board pursuant to the consistency mechanism referred to in Article 63

      4.Without prejudice to the tasks and powers of the competent supervisory authority and the provisions of Chapter VIII,
      a body as referred to in paragraph 1 of this Article shall, subject to appropriate safeguards, take appropriate action
      in cases of infringement of the code by a controller or processor, including suspension or exclusion of the controller
      or processor concerned from the code. It shall inform the competent supervisory authority of such actions and the reasons
      for taking them.

      5.The competent supervisory authority shall revoke the accreditation of a body as referred to in paragraph 1 if the
      conditions for accreditation are not, or are no longer, met or where actions taken by the body infringe this Regulation.

      6.This Article shall not apply to processing carried out by public authorities and bodies.'
