- source_sentence: What restriction applies to the amount of personal data processed?
  sentences:
  - '1.Personal data shall be: (a)  processed lawfully, fairly and in a transparent manner in relation to the data subject
    (‘lawfulness, fairness and transparency’); (b)  collected for specified, explicit and legitimate purposes and not further
    processed in a manner that is incompatible with those purposes; further processing for archiving purposes in the public
    interest, scientific or historical research purposes or statistical purposes shall, in accordance with Article 89(1),
    not be considered to be incompatible with the initial purposes (‘purpose limitation’); (c)  adequate, relevant and limited
    to what is necessary in relation to the purposes for which they are processed (‘data minimisation’); (d)  accurate and,
    where necessary, kept up to date; every reasonable step must be taken to ensure that personal data that are inaccurate,
    having regard to the purposes for which they are processed, are erased or rectified without delay (‘accuracy’); 4.5.2016
    L 119/35   (1) Directive (EU) 2015/1535 of the European Parliament and of the Council of 9 September 2015 laying down
    a procedure for the provision of information in the field of technical regulations and of rules on Information Society
    services (OJ L 241, 17.9.2015, p. 1). (e)  kept in a form which permits identification of data subjects for no longer
    than is necessary for the purposes for which the personal data are processed; personal data may be stored for longer periods
    insofar as the personal data will be processed solely for archiving purposes in the public interest, scientific or historical
    research purposes or statistical purposes in accordance with Article 89(1) subject to implementation of the appropriate
    technical and organisational measures required by this Regulation in order to safeguard the rights and freedoms of the
    data subject (‘storage limitation’); (f)  processed in a manner that ensures appropriate security of the personal data,
    including protection against unauthorised or unlawful processing and against accidental loss, destruction or damage, using
    appropriate technical or organisational measures (‘integrity and confidentiality’).

    2.The controller shall be responsible for, and be able to demonstrate compliance with, paragraph 1 (‘accountability’).'
  - Any processing of personal data should be lawful and fair. It should be transparent to natural persons that personal data
    concerning them are collected, used, consulted or otherwise processed and to what extent the personal data are or will
    be processed. The principle of transparency requires that any information and communication relating to the processing
    of those personal data be easily accessible and easy to understand, and that clear and plain language be used. That principle
    concerns, in particular, information to the data subjects on the identity of the controller and the purposes of the processing
    and further information to ensure fair and transparent processing in respect of the natural persons concerned and their
    right to obtain confirmation and communication of personal data concerning them which are being processed. Natural persons
    should be made aware of risks, rules, safeguards and rights in relation to the processing of personal data and how to
    exercise their rights in relation to such processing. In particular, the specific purposes for which personal data are
    processed should be explicit and legitimate and determined at the time of the collection of the personal data. The personal
    data should be adequate, relevant and limited to what is necessary for the purposes for which they are processed. This
    requires, in particular, ensuring that the period for which the personal data are stored is limited to a strict minimum.
    Personal data should be processed only if the purpose of the processing could not reasonably be fulfilled by other means.
    In order to ensure that the personal data are not kept longer than necessary, time limits should be established by the
    controller for erasure or for a periodic review. Every reasonable step should be taken to ensure that personal data which
    are inaccurate are rectified or deleted. Personal data should be processed in a manner that ensures appropriate security
    and confidentiality of the personal data, including for preventing unauthorised access to or use of personal data and
    the equipment used for the processing.
  - "**Court (Civil/Criminal): Criminal**  \n**Provisions:**  \n**Time of commission of the act:**  \n**Outcome (not guilty,\
    \ guilty):** Guilty  \n**Reasoning:** Conviction for money laundering from criminal activity as a profession. Bank fraud\
    \ using electronic means as the primary crime. The location of the fraud is the USA.  \n**Facts:** Illegal electronic\
    \ money transfer order (remittance) from a third party (non-existent beneficiary of a foreign bank account) to the account\
    \ of the perpetrator (legal representative of a company) in Greece. Criminal Procedure.  \nIntervention of a third party\
    \ - a non-party and beneficiary of the funds, namely the subject of the crime. Civil claim presented by the foreign bank\
    \ for monetary compensation due to moral damage. Awarding monetary compensation to the civil claimant. Intervention of\
    \ a third party, specifically an insurance company (providing security to the foreign bank, among other things, for the\
    \ bank's civil liability to its depositors due to the electronic transfer of their remittances to third parties, either\
    \ natural or legal entities) as the primary and beneficiary of the funds from the main crime of fraud. Compensation of\
    \ the bank's clients by the bank and, subsequently, receipt of this amount from the insurance company. Insurance subrogation,\
    \ specifically the subrogation of the insurance company to the rights and obligations of the bank. Request from the third\
    \ party for the lifting of the freeze on the bank account and the return of the frozen funds. Accepts the intervention\
    \ of the insurance company. Orders the lifting of the freeze from the account and the return of the amount to the intervening\
    \ company. Independent claims of the defendant. Claim regarding the lifting of the criminal liability, due to the absence\
    \ of criminal prosecution in America within the legal period of 3 years. The independent claim is rejected, as the provisions\
    \ regarding the deadline for the initiation of criminal proceedings, according to the Greek Institute of International\
    \ and Foreign Law, do not apply while the perpetrator is evading arrest. Imposition of a 10-year prison sentence and deprivation\
    \ of civil rights for 3 years. Orders lifelong expulsion from the country after the complete serving of the sentence.\
    \ No suspensive effect of the defendant's appeal."
- source_sentence: What action was the plaintiff urged to complete within the next 24 hours?
  sentences:
  - '**Court (Civil/Criminal): Civil**


    **Provisions:**


    **Time of commission of the act:**


    **Outcome (not guilty, guilty):**


    **Rationale:**


    **Facts:**

    The plaintiff holds credit card number ............ with the defendant banking corporation. Based on the application for
    alternative networks dated 19/7/2015 with number ......... submitted at a branch of the defendant, he was granted access
    to the electronic banking service (e-banking) to conduct banking transactions (debit, credit, updates, payments) remotely.
    On 30/11/2020, the plaintiff fell victim to electronic fraud through the "phishing" method, whereby an unknown perpetrator
    managed to withdraw a total amount of €3,121.75 from the aforementioned credit card. Specifically, the plaintiff received
    an email at 1:35 PM on 29/11/2020 from sender ...... with address ........, informing him that due to an impending system
    change, he needed to verify the mobile phone number linked to the credit card, urging him to complete the verification
    process within the next 24 hours by following a link titled ........; otherwise, his account would be locked for security
    reasons. The plaintiff read this email on the afternoon of 30 November 2020 and, believing it was from the defendant,
    followed the instructions and proceeded via the provided link to a website that was identical (a clone) to that of the
    defendant. On this page, he was asked to enter the six-digit security code (.........) that had just been sent to his
    mobile phone by the defendant at 3:41 PM, with the note that it was an activation code for his ........ card at .........,
    which he entered.


    Subsequently, the plaintiff received, according to his statements, a new email (not submitted), which requested him to
    enter the details of the aforementioned credit card, specifically the name of the cardholder and the card number, not
    the PIN, which he also entered, convinced that he was within the online environment of the defendant. Then, at 3:47 PM,
    he received a message on his mobile phone from the defendant containing the exact same content as the one he received
    at 3:41 PM, while at 3:50 PM he received a message stating that the activation of his ......... card at ....... had been
    completed. Once the plaintiff read this, he became concerned that something was not right, and immediately called (at
    4:41 PM) the defendant''s call center to inform them. There, the employees, with whom he finally connected at 5:04 PM
    due to high call center volume, advised him to delete the relevant emails, cancel his credit card, change his access passwords
    for the service, and submit a dispute request regarding the conducted transactions. The plaintiff electronically sent
    this request to the defendant, disputing the detailed transactions amounting to €3,121.75, which were conducted on 30/11/2020
    during the time frame of 16:37:45-16:43:34 PM, arguing that he had neither performed them himself nor authorized anyone
    else to do so. The plaintiff specifically disputed the following transactions, as evidenced by the account activity of
    the disputed credit card during the aforementioned timeframe: a) transaction number ......... amounting to €150.62 conducted
    on 30/11/2020 at 4:43:34 PM, b) transaction number ........ amounting to €293.20 conducted on 30/11/2020 at 4:42:40 PM,
    c) transaction number ............ amounting to €295.21 conducted on 30/11/2020 at 4:42:10 PM, d) transaction number ..........
    amounting to €299.22 conducted on 30/11/2020 at 4:41:31 PM, e) transaction number ........ amounting to €297.21 conducted
    on 30/11/2020 at 4:41:01 PM, f) transaction number ........ amounting to €299.22 conducted on 30/11/2020 at 4:40:27 PM,
    g) transaction number ....... amounting to €299.22 conducted on 30/11/2020 at 4:39:55 PM, h) transaction number ......
    amounting to €299.22 conducted on 30/11/2020 at 4:39:22 PM, i) transaction number ......... amounting to €297.22 conducted
    on 30/11/2020 at 4:38:52 PM, j) transaction number ......... amounting to €295.21 conducted on 30/11/2020 at 4:38:17 PM,
    and k) transaction number ......... amounting to €296.21 conducted on 30/11/2020 at 4:37:45 PM. In its response letter
    dated 21/12/2020, the defendant denied responsibility for the costs of the aforementioned transactions, placing the entire
    blame on the plaintiff for the leak of his card details and security code to the fraudulent page. The plaintiff, completely
    denying any fault for the conducted transactions, repeatedly contacted the defendant, both by phone and via email (see
    emails dated 15/1/2021 and 11/2/2021), while on 2/3/2021, he electronically sent a report dated 1/03/2021 to the Consumer
    Advocate’s email address, recounting the events and requesting that the aforementioned Independent Authority intervene
    to have the disputed debt canceled. In its letter with reference number ...../27.04.2021, the aforementioned Independent
    Authority informed the plaintiff that the case was outside its mediating role and was therefore archived. Subsequently,
    the plaintiff sent the defendant on 5/3/2021 his extrajudicial statement dated 4/3/2021, calling upon it to fully cancel
    the debt of €3,121.75 that had been unjustly incurred against him within two days and to immediately instruct the representatives
    of the collection agency working with it to cease contacting him regarding the disputed case. The defendant sent the plaintiff
    a message on his mobile phone on 20/04/2021 informing him that his case was still being processed due to lengthy operational
    requirements, while on 23/04/2021, via email, it informed him that considering their good cooperation and his efforts
    to keep them updated, it had reviewed his case and decided to refund him the amounts of the transactions that were conducted
    after his contact with their representatives on 30/11/2020 at 4:41 PM, totaling €1,038.25, specifically the following:
    a) transaction of €150.62 conducted on 30/11/2020 at 4:43 PM, b) transaction of €295.21 conducted on 30/11/2020 at 4:42
    PM, c) transaction of €293.20 conducted on 30/11/2020 at 4:42 PM, and d) transaction of €299.22 conducted on 30/11/2020
    at 4:41 PM. Beyond this, the defendant refused to refund the plaintiff the amount of the remaining transactions conducted
    on 30/11/2020, totaling €2,376.08 (and not €2,376.48 as incorrectly stated by the plaintiff in his lawsuit), which the
    plaintiff ultimately fully paid, transferring €2,342.77 to the defendant on 7/06/2021 and €33.31 on 15/06/2021 (see related
    deposit receipts).'
  - '1.Without prejudice to other tasks set out under this Regulation, each supervisory authority shall on its territory:
    (a)  monitor and enforce the application of this Regulation; (b)  promote public awareness and understanding of the risks,
    rules, safeguards and rights in relation to processing. Activities addressed specifically to children shall receive specific
    attention; (c)  advise, in accordance with Member State law, the national parliament, the government, and other institutions
    and bodies on legislative and administrative measures relating to the protection of natural persons'' rights and freedoms
    with regard to processing; (d)  promote the awareness of controllers and processors of their obligations under this Regulation;
    (e)  upon request, provide information to any data subject concerning the exercise of their rights under this Regulation
    and, if appropriate, cooperate with the supervisory authorities in other Member States to that end; (f)  handle complaints
    lodged by a data subject, or by a body, organisation or association in accordance with Article 80, and investigate, to
    the extent appropriate, the subject matter of the complaint and inform the complainant of the progress and the outcome
    of the investigation within a reasonable period, in particular if further investigation or coordination with another supervisory
    authority is necessary; (g)  cooperate with, including sharing information and provide mutual assistance to, other supervisory
    authorities with a view to ensuring the consistency of application and enforcement of this Regulation; (h)  conduct investigations
    on the application of this Regulation, including on the basis of information received from another supervisory authority
    or other public authority; (i)  monitor relevant developments, insofar as they have an impact on the protection of personal
    data, in particular the development of information and communication technologies and commercial practices; (j)  adopt
    standard contractual clauses referred to in Article 28(8) and in point (d) of Article 46(2); (k)  establish and maintain
    a list in relation to the requirement for data protection impact assessment pursuant to Article 35(4); (l)  give advice
    on the processing operations referred to in Article 36(2); (m)  encourage the drawing up of codes of conduct pursuant
    to Article 40(1) and provide an opinion and approve such codes of conduct which provide sufficient safeguards, pursuant
    to Article 40(5); (n)  encourage the establishment of data protection certification mechanisms and of data protection
    seals and marks pursuant to Article 42(1), and approve the criteria of certification pursuant to Article 42(5); (o)  where
    applicable, carry out a periodic review of certifications issued in accordance with Article 42(7); 4.5.2016 L 119/68   (p)  draft
    and publish the criteria for accreditation of a body for monitoring codes of conduct pursuant to Article 41 and of a certification
    body pursuant to Article 43; (q)  conduct the accreditation of a body for monitoring codes of conduct pursuant to Article
    41 and of a certification body pursuant to Article 43; (r)  authorise contractual clauses and provisions referred to in
    Article 46(3); (s)  approve binding corporate rules pursuant to Article 47; (t)  contribute to the activities of the Board;
    (u)  keep internal records of infringements of this Regulation and of measures taken in accordance with Article 58(2);
    and (v)  fulfil any other tasks related to the protection of personal data.

    2.Each supervisory authority shall facilitate the submission of complaints referred to in point (f) of paragraph 1 by
    measures such as a complaint submission form which can also be completed electronically, without excluding other means
    of communication.

    3.The performance of the tasks of each supervisory authority shall be free of charge for the data subject and, where applicable,
    for the data protection officer.

    4.Where requests are manifestly unfounded or excessive, in particular because of their repetitive character, the supervisory
    authority may charge a reasonable fee based on administrative costs, or refuse to act on the request. The supervisory
    authority shall bear the burden of demonstrating the manifestly unfounded or excessive character of the request.'
  - '1.Where personal data have not been obtained from the data subject, the controller shall provide the data subject with
    the following information: (a)  the identity and the contact details of the controller and, where applicable, of the controller''s
    representative; (b)  the contact details of the data protection officer, where applicable; (c)  the purposes of the processing
    for which the personal data are intended as well as the legal basis for the processing; (d)  the categories of personal
    data concerned; (e)  the recipients or categories of recipients of the personal data, if any; 4.5.2016 L 119/41   (f)
    where applicable, that the controller intends to transfer personal data to a recipient in a third country or international
    organisation and the existence or absence of an adequacy decision by the Commission, or in the case of transfers referred
    to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to the appropriate or suitable safeguards
    and the means to obtain a copy of them or where they have been made available.

    2.In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the following
    information necessary to ensure fair and transparent processing in respect of the data subject: (a)  the period for which
    the personal data will be stored, or if that is not possible, the criteria used to determine that period; (b)  where the
    processing is based on point (f) of Article 6(1), the legitimate interests pursued by the controller or by a third party;
    (c)  the existence of the right to request from the controller access to and rectification or erasure of personal data
    or restriction of processing concerning the data subject and to object to processing as well as the right to data portability;
    (d)  where processing is based on point (a) of Article 6(1) or point (a) of Article 9(2), the existence of the right to
    withdraw consent at any time, without affecting the lawfulness of processing based on consent before its withdrawal; (e)  the
    right to lodge a complaint with a supervisory authority; (f)  from which source the personal data originate, and if applicable,
    whether it came from publicly accessible sources; (g)  the existence of automated decision-making, including profiling,
    referred to in Article 22(1) and (4) and, at least in those cases, meaningful information about the logic involved, as
    well as the significance and the envisaged consequences of such processing for the data subject.

    3.The controller shall provide the information referred to in paragraphs 1 and 2: (a)  within a reasonable period after
    obtaining the personal data, but at the latest within one month, having regard to the specific circumstances in which
    the personal data are processed; (b)  if the personal data are to be used for communication with the data subject, at
    the latest at the time of the first communication to that data subject; or (c)  if a disclosure to another recipient is
    envisaged, at the latest when the personal data are first disclosed.

    4.Where the controller intends to further process the personal data for a purpose other than that for which the personal
    data were obtained, the controller shall provide the data subject prior to that further processing with information on
    that other purpose and with any relevant further information as referred to in paragraph 2

    5.Paragraphs 1 to 4 shall not apply where and insofar as: (a)  the data subject already has the information; (b)  the
    provision of such information proves impossible or would involve a disproportionate effort, in particular for processing
    for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes, subject
    to the conditions and safeguards referred to in Article 89(1) or in so far as the obligation referred to in paragraph
    1 of this Article is likely to render impossible or seriously impair the achievement of the objectives of that processing.
    In such cases the controller shall take appropriate measures to protect the data subject''s rights and freedoms and legitimate
    interests, including making the information publicly available; (c)  obtaining or disclosure is expressly laid down by
    Union or Member State law to which the controller is subject and which provides appropriate measures to protect the data
    subject''s legitimate interests; or (d)  where the personal data must remain confidential subject to an obligation of
    professional secrecy regulated by Union or Member State law, including a statutory obligation of secrecy. 4.5.2016 L 119/42'
