- source_sentence: What conditions must be met for a transfer of personal data to a third country or international organisation?
  sentences:
  - "1.In the absence of an adequacy decision pursuant to Article 45(3), or of appropriate safeguards pursuant to Article\
    \ 46, including binding corporate rules, a transfer or a set of transfers of personal data to a third country or an international\
    \ organisation shall take place only on one of the following conditions: (a)  the data subject has explicitly consented\
    \ to the proposed transfer, after having been informed of the possible risks of such transfers for the data subject due\
    \ to the absence of an adequacy decision and appropriate safeguards; (b)  the transfer is necessary for the performance\
    \ of a contract between the data subject and the controller or the implementation of pre-contractual measures taken at\
    \ the data subject's request; (c)  the transfer is necessary for the conclusion or performance of a contract concluded\
    \ in the interest of the data subject between the controller and another natural or legal person; (d)  the transfer is\
    \ necessary for important reasons of public interest; (e)  the transfer is necessary for the establishment, exercise or\
    \ defence of legal claims; (f)  the transfer is necessary in order to protect the vital interests of the data subject\
    \ or of other persons, where the data subject is physically or legally incapable of giving consent; (g)  the transfer\
    \ is made from a register which according to Union or Member State law is intended to provide information to the public\
    \ and which is open to consultation either by the public in general or by any person who can demonstrate a legitimate\
    \ interest, but only to the extent that the conditions laid down by Union or Member State law for consultation are fulfilled\
    \ in the particular case. Where a transfer could not be based on a provision in Article 45 or 46, including the provisions\
    \ on binding corporate rules, and none of the derogations for a specific situation referred to in the first subparagraph\
    \ of this paragraph is applicable, a transfer to a third country or an international organisation may take place only\
    \ if the transfer is not repetitive, concerns only a limited number of data subjects, is necessary for the purposes of\
    \ compelling legitimate interests pursued by the controller which are not overridden by the interests or rights and freedoms\
    \ of the data subject, and the controller has assessed all the circumstances surrounding the data transfer and has on\
    \ the basis of that assessment provided suitable safeguards with regard to the protection of personal data. The controller\
    \ shall inform the supervisory authority of the transfer. The controller shall, in addition to providing the information\
    \ referred to in Articles 13 and 14, inform the data subject of the transfer and on the compelling legitimate interests\
    \ pursued.\n2.A transfer pursuant to point (g) of the first subparagraph of paragraph 1 shall not involve the entirety\
    \ of the personal data or entire categories of the personal data contained in the register. Where the register is intended\
    \ for consultation by persons having a legitimate interest, the transfer shall be made only at the request of those persons\
    \ or if they are to be the recipients. 4.5.2016 L 119/64  \n3.Points (a), (b) and (c) of the first subparagraph of paragraph\
    \ 1 and the second subparagraph thereof shall not apply to activities carried out by public authorities in the exercise\
    \ of their public powers.\n4.The public interest referred to in point (d) of the first subparagraph of paragraph 1 shall\
    \ be recognised in Union law or in the law of the Member State to which the controller is subject.\n5.In the absence of\
    \ an adequacy decision, Union or Member State law may, for important reasons of public interest, expressly set limits\
    \ to the transfer of specific categories of personal data to a third country or an international organisation. Member\
    \ States shall notify such provisions to the Commission.\n6.The controller or processor shall document the assessment\
    \ as well as the suitable safeguards referred to in the second subparagraph of paragraph 1 of this Article in the records\
    \ referred to in Article 30."
  - '1.A transfer of personal data to a third country or an international organisation may take place where the Commission
    has decided that the third country, a territory or one or more specified sectors within that third country, or the international
    organisation in question ensures an adequate level of protection. Such a transfer shall not require any specific authorisation.

    2.When assessing the adequacy of the level of protection, the Commission shall, in particular, take account of the following
    elements: (a)  the rule of law, respect for human rights and fundamental freedoms, relevant legislation, both general
    and sectoral, including concerning public security, defence, national security and criminal law and the access of public
    authorities to personal data, as well as the implementation of such legislation, data protection rules, professional rules
    and security measures, including rules for the onward transfer of personal data to another third country or international
    organisation which are complied with in that country or international organisation, case-law, as well as effective and
    enforceable data subject rights and effective administrative and judicial redress for the data subjects whose personal
    data are being transferred; (b)  the existence and effective functioning of one or more independent supervisory authorities
    in the third country or to which an international organisation is subject, with responsibility for ensuring and enforcing
    compliance with the data protection rules, including adequate enforcement powers, for assisting and advising the data
    subjects in exercising their rights and for cooperation with the supervisory authorities of the Member States; and (c)  the
    international commitments the third country or international organisation concerned has entered into, or other obligations
    arising from legally binding conventions or instruments as well as from its participation in multilateral or regional
    systems, in particular in relation to the protection of personal data.

    3.The Commission, after assessing the adequacy of the level of protection, may decide, by means of implementing act, that
    a third country, a territory or one or more specified sectors within a third country, or an international organisation
    ensures an adequate level of protection within the meaning of paragraph 2 of this Article. The implementing act shall
    provide for a mechanism for a periodic review, at least every four years, which shall take into account all relevant developments
    in the third country or international organisation. The implementing act shall specify its territorial and sectoral application
    and, where applicable, identify the supervisory authority or authorities referred to in point (b) of paragraph 2 of this
    Article. The implementing act shall be adopted in accordance with the examination procedure referred to in Article 93(2).

    4.The Commission shall, on an ongoing basis, monitor developments in third countries and international organisations that
    could affect the functioning of decisions adopted pursuant to paragraph 3 of this Article and decisions adopted on the
    basis of Article 25(6) of Directive 95/46/EC.

    5.The Commission shall, where available information reveals, in particular following the review referred to in paragraph
    3 of this Article, that a third country, a territory or one or more specified sectors within a third country, or an international
    organisation no longer ensures an adequate level of protection within the meaning of paragraph 2 of this Article, to the
    extent necessary, repeal, amend or suspend the decision referred to in paragraph 3 of this Article by means of implementing
    acts without retro-active effect. Those implementing acts shall be adopted in accordance with the examination procedure
    referred to in Article 93(2). On duly justified imperative grounds of urgency, the Commission shall adopt immediately
    applicable implementing acts in accordance with the procedure referred to in Article 93(3).

    6.The Commission shall enter into consultations with the third country or international organisation with a view to remedying
    the situation giving rise to the decision made pursuant to paragraph 5

    7.A decision pursuant to paragraph 5 of this Article is without prejudice to transfers of personal data to the third country,
    a territory or one or more specified sectors within that third country, or the international organisation in question
    pursuant to Articles 46 to 49

    8.The Commission shall publish in the Official Journal of the European Union and on its website a list of the third countries,
    territories and specified sectors within a third country and international organisations for which it has decided that
    an adequate level of protection is or is no longer ensured.

    9.Decisions adopted by the Commission on the basis of Article 25(6) of Directive 95/46/EC shall remain in force until
    amended, replaced or repealed by a Commission Decision adopted in accordance with paragraph 3 or 5 of this Article.'
  - Flows of personal data to and from countries outside the Union and international organisations are necessary for the expansion
    of international trade and international cooperation. The increase in such flows has raised new challenges and concerns
    with regard to the protection of personal data. However, when personal data are transferred from the Union to controllers,
    processors or other recipients in third countries or to international organisations, the level of protection of natural
    persons ensured in the Union by this Regulation should not be undermined, including in cases of onward transfers of personal
    data from the third country or international organisation to controllers, processors in the same or another third country
    or international organisation. In any event, transfers to third countries and international organisations may only be
    carried out in full compliance with this Regulation. A transfer could take place only if, subject to the other provisions
    of this Regulation, the conditions laid down in the provisions of this Regulation relating to the transfer of personal
    data to third countries or international organisations are complied with by the controller or processor.
