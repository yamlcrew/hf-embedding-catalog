  widget:
  - source_sentence: Who should inform the lead supervisory authority without delay about the matter?
    sentences:
    - The protection of natural persons with regard to the processing of personal data by competent authorities for the purposes
      of the prevention, investigation, detection or prosecution of criminal offences or the execution of criminal penalties,
      including the safeguarding against and the prevention of threats to public security and the free movement of such data,
      is the subject of a specific Union legal act. This Regulation should not, therefore, apply to processing activities
      for those purposes. However, personal data processed by public authorities under this Regulation should, when used for
      those purposes, be governed by a more specific Union legal act, namely Directive (EU) 2016/680 of the European Parliament
      and of the Council (1). Member States may entrust competent authorities within the meaning of Directive (EU) 2016/680
      with tasks which are not necessarily carried out for the purposes of the prevention, investigation, detection or prosecution
      of criminal offences or the execution of criminal penalties, including the safeguarding against and prevention of threats
      to public security, so that the processing of personal data for those other purposes, in so far as it is within the
      scope of Union law, falls within the scope of this Regulation. With regard to the processing of personal data by those
      competent authorities for purposes falling within scope of this Regulation, Member States should be able to maintain
      or introduce more specific provisions to adapt the application of the rules of this Regulation. Such provisions may
      determine more precisely specific requirements for the processing of personal data by those competent authorities for
      those other purposes, taking into account the constitutional, organisational and administrative structure of the respective
      Member State. When the processing of personal data by private bodies falls within the scope of this Regulation, this
      Regulation should provide for the possibility for Member States under specific conditions to restrict by law certain
      obligations and rights when such a restriction constitutes a necessary and proportionate measure in a democratic society
      to safeguard specific important interests including public security and the prevention, investigation, detection or
      prosecution of criminal offences or the execution of criminal penalties, including the safeguarding against and the
      prevention of threats to public security. This is relevant for instance in the framework of anti-money laundering or
      the activities of forensic laboratories.
    - "**Court (Civil/Criminal): Civil**  \n**Provisions:**  \n**Time of commission of the act:**  \n**Outcome (not guilty,\
      \ guilty):**  \n**Reasoning:** Partially accepts the lawsuit.  \n**Facts:** The plaintiff, who works as a lawyer, maintains\
      \ a savings account with the defendant banking corporation under account number GR.............. Pursuant to a contract\
      \ dated June 11, 2010, established in Thessaloniki between the defendant and the plaintiff, the plaintiff was granted\
      \ access to the electronic banking system (e-banking) to conduct banking transactions remotely. On October 10, 2020,\
      \ the plaintiff fell victim to electronic fraud through the \"phishing\" method, whereby an unknown perpetrator managed\
      \ to extract and transfer €3,000.00 from the plaintiff’s account to another account of the same bank. Specifically,\
      \ on that day at 6:51 a.m., the plaintiff received an email from the sender \".........\", with the address ...........,\
      \ informing him that his debit card had been suspended and that online payments and cash withdrawals could not be made\
      \ until the issue was resolved. The email urged him to confirm his details within the next 72 hours by following a link\
      \ titled \"card activation.\"  \nThe plaintiff read the above email on his mobile phone around 8:00 a.m., and believing\
      \ it came from the defendant, he followed the instructions and accessed a website that was identical (a clone) to that\
      \ of the defendant. On this page, he was asked to enter his login credentials to connect to the service, which he did,\
      \ and he was subsequently asked to input his debit card details for the alleged activation, which he also provided.\
      \ Then, to complete the process, a number was sent to his mobile phone at 8:07 a.m. from the sender ........, which\
      \ he entered, and two minutes later he received a message from the same sender in English stating that the quick access\
      \ code had been activated on his mobile. A few minutes later, at 8:18 a.m., he received an email from the defendant\
      \ informing him of the transfer of €3,000.00 from his account to account number GR ........... held at the same bank,\
      \ with the beneficiary's details being .......... As soon as the plaintiff read this, he immediately called the defendant's\
      \ call center and canceled his debit card, the access codes for the service ......., and locked the application ..........\
      \ At the same time, he verbally submitted a request to dispute and cancel the contested transaction, and in a subsequent\
      \ phone call, he also canceled his credit card. On the same day, he also sent an email to the defendant informing them\
      \ in writing of the above and requesting the cancellation of the transaction and the return of the amount of €3,000.00\
      \ to his account, as this transfer was not made by him but by an unknown perpetrator through electronic fraud and was\
      \ not approved by him. It should also be noted that the plaintiff, as the sole beneficiary according to the aforementioned\
      \ contract for using the defendant's Internet Banking service, never received any update via SMS or the VIBER application\
      \ from the bank regarding the transaction details before its completion, nor did he receive a one-time code (OTP) to\
      \ approve the contested transaction. He subsequently filed a complaint against unknown persons at the Cyber Crime Division\
      \ for the crime of fraud. The defendant sent an email to the plaintiff on October 16, 2020, informing him that his request\
      \ had been forwarded to the appropriate department of the bank for investigation, stating that the bank would never\
      \ send him an email or SMS asking him to enter his personal data and that as of October 7, 2020, there was a notice\
      \ posted for its customers regarding malicious attempts to steal personal data in the \"Our News\" section on .......\
      \ A month after the disputed incident, on November 10, 2020, an amount of €2,296.82 was transferred to the plaintiff's\
      \ account from the account to which the fraudulent credit had been made. The plaintiff immediately sent an email to\
      \ the defendant asking to be informed whether this transfer was a return of part of the amount that had been illegally\
      \ withdrawn from his account and requested the return of the remaining amount of €703.18. In its response dated January\
      \ 13, 2021, the defendant confirmed that the aforementioned amount indeed came from the account to which the fraudulent\
      \ credit had been made, following a freeze of that account initiated by the defendant during the investigation of the\
      \ incident, but refused to return the remaining amount, claiming it bore no responsibility for the leak of the personal\
      \ codes to third parties, according to the terms of the service contract established between them.  \nFrom the entirety\
      \ of the evidence presented to the court, there is no indication of the authenticity of the contested transaction, as\
      \ the plaintiff did not give his consent for the execution of the transfer of the amount of €3,000.00, especially in\
      \ light of the provision in Article 72 paragraph 2 of Law 4537/2018 stating that the mere use of the Internet Banking\
      \ service by the plaintiff does not necessarily constitute sufficient evidence that the payer approved the payment action.\
      \ Specifically, it was proven that the contested transaction was not carried out following a strong identification of\
      \ the plaintiff – the sole beneficiary of the account – and his approval, as the latter may have entered his personal\
      \ codes on the counterfeit website; however, he was never informed, before the completion of the contested transaction,\
      \ of the amount that would be transferred from his account to a third-party account, nor did he receive on his mobile\
      \ phone, either via SMS or through the VIBER application or any other means, the one-time code - extra PIN for its completion,\
      \ which he was required to enter to approve the contested transaction (payment action) and thus complete his identification,\
      \ a fact that was not countered by any evidence from the defendant. Furthermore, it is noted that the defendant's claims\
      \ that it bears no responsibility under the terms of the banking services contract, whereby it is not liable for any\
      \ damage to its customer in cases of unauthorized use of their personal access codes to the Internet Banking service,\
      \ are to be rejected as fundamentally unfounded. This is because the aforementioned contractual terms are invalid according\
      \ to the provision of Article 103 of Law 4537/2018, as they contradict the provisions of Articles 71, 73, and 92 of\
      \ the same Law, which provide for the provider's universal liability and its exemption only for unusual and unforeseen\
      \ circumstances that are beyond the control of the party invoking them and whose consequences could not have been avoided\
      \ despite all efforts to the contrary; these provisions establish mandatory law in favor of users, as according to Article\
      \ 103 of Law 4537/2018, payment service providers are prohibited from deviating from the provisions to the detriment\
      \ of payment service users, unless the possibility of deviation is explicitly provided and they can decide to offer\
      \ only more favorable terms to payment service users; the aforementioned contractual terms do not constitute more favorable\
      \ terms but rather disadvantageous terms for the payment service user. In this case, however, the defendant did not\
      \ prove the authenticity of the transaction and its approval by the plaintiff and did not invoke, nor did any unusual\
      \ and unforeseen circumstances beyond its control, the consequences of which could not have been avoided despite all\
      \ efforts to the contrary, come to light. Therefore, the contested transaction transferring the amount of €3,000.00\
      \ is considered, in the absence of demonstrable consent from the plaintiff, unapproved according to the provisions of\
      \ Article 64 of Law 4537/2018, and the defendant's contrary claims are rejected, especially since the plaintiff proceeded,\
      \ according to Article 71 paragraph 1 of Law 4537/2018, without undue delay to notify the defendant regarding the contested\
      \ unapproved payment action. Consequently, the defendant is liable for compensating the plaintiff for the positive damage\
      \ he suffered under Article 73 of Law 4537/2018 and is obliged to pay him the requested amount of €703.18, while the\
      \ plaintiff’s fault in the occurrence of this damage cannot be established, as he entered his personal details in an\
      \ online environment that was a faithful imitation of that of the defendant, as evidenced by the comparison of the screenshots\
      \ of the fake website and the real website provided by the plaintiff, a fact that he could not have known while being\
      \ fully convinced that he was transacting with the defendant. Furthermore, the defendant’s liability to compensate the\
      \ plaintiff is based on the provision of Article 8 of Law 2251/1994, which applies in this case, as the plaintiff's\
      \ damage resulted from inadequate fulfillment of its obligations in the context of providing its services, but also\
      \ on the provision of Article 914 of the Civil Code in the sense of omission on its part of unlawfully and culpably\
      \ imposed actions. In this case, given that during the relevant period there had been a multitude of similar incidents\
      \ of fraud against the defendant's customers, the latter, as a service provider to the consumer public and bearing transactional\
      \ obligations of care and security towards them, displayed gross negligence regarding the security provided for electronic\
      \ transaction services, which was compromised by the fraudulent theft of funds, as it did not comply with all required\
      \ high-security measures for executing the contested transaction, failing to implement the strict customer identification\
      \ verification process and to check the authenticity of the account to which the funds were sent, thus not assuming\
      \ the suspicious nature of the transaction, did not adopt comprehensive and improved protective measures to fully protect\
      \ its customers against malicious attacks and online fraud and to prevent the infiltration of unauthorized third parties,\
      \ nor did it fulfill its obligations to inform, accurately inform, and warn its consumers - customers, as it failed\
      \ to adequately inform them of attempts to steal their personal data through the sending of informative emails or SMS,\
      \ while merely posting in a section rather than on a central banner (as it later did) does not constitute adequate information\
      \ such that it meets the requirement of protecting its customers and the increased safeguarding of their interests.\
      \ Although the plaintiff acted promptly and informed the defendant on the same day about the contested incident, the\
      \ defendant did not act as promptly regarding the investigation of the incident and the freezing of the account that\
      \ held the fraudulent credit to prevent the plaintiff's loss, but only returned part of the funds to the plaintiff a\
      \ month later. This behavior, beyond being culpable due to gross negligence, was also unlawful, as it would have been\
      \ illegal even without the contractual relationship, as contrary to the provisions of Law 4537/2018 and Law 2251/1994,\
      \ regarding the lack of security of the services that the consumer is legitimately entitled to expect, as well as the\
      \ building of trust that is essential in banking transactions, elements that it was obligated to provide within the\
      \ sphere of the services offered, and contrary to the principles of good faith and commercial ethics, as crystallized\
      \ in the provision of Article 288 of the Civil Code, as well as the general duty imposed by Article 914 of the Civil\
      \ Code not to cause harm to another culpably. This resulted not only in positive damage to the plaintiff but also in\
      \ causing him moral harm consisting of his mental distress and the disruption, agitation, and sorrow he experienced,\
      \ for which he must be awarded financial compensation. Taking into account all the general circumstances of the case,\
      \ the extent of the plaintiff's damage, the severity of the defendant's fault, the mental distress suffered by the plaintiff,\
      \ the insecurity he felt regarding his deposits, the sorrow he experienced, and the stress caused by his financial loss,\
      \ which occurred during the pandemic period when his earnings from his professional activity had significantly decreased,\
      \ as well as the financial and social situation of the parties, it is the court's opinion that he should be granted,\
      \ as financial compensation for his moral harm, an amount of €250.00, which is deemed reasonable and fair. Therefore,\
      \ the total monetary amount that the plaintiff is entitled to for his positive damage and financial compensation for\
      \ the moral harm suffered amounts to a total of (€703.18 + €250.00) = €953.18."
    - Each supervisory authority not acting as the lead supervisory authority should be competent to handle local cases where
      the controller or processor is established in more than one Member State, but the subject matter of the specific processing
      concerns only processing carried out in a single Member State and involves only data subjects in that single Member
      State, for example, where the subject matter concerns the processing of employees' personal data in the specific employment
      context of a Member State. In such cases, the supervisory authority should inform the lead supervisory authority without
      delay about the matter. After being informed, the lead supervisory authority should decide, whether it will handle the
      case pursuant to the provision on cooperation between the lead supervisory authority and other supervisory authorities
      concerned (‘one-stop-shop mechanism’), or whether the supervisory authority which informed it should handle the case
      at local level. When deciding whether it will handle the case, the lead supervisory authority should take into account
      whether there is an establishment of the controller or processor in the Member State of the supervisory authority which
      informed it in order to ensure effective enforcement of a decision vis-à-vis the controller or processor. Where the
      lead supervisory authority decides to handle the case, the supervisory authority which informed it should have the 4.5.2016
      L 119/23 Official Journal of the European Union EN   possibility to submit a draft for a decision, of which the lead
      supervisory authority should take utmost account when preparing its draft decision in that one-stop-shop mechanism.
  - source_sentence: Who should provide appropriate safeguards for the processing of personal data for archiving purposes?
    sentences:
    - The processing of personal data for archiving purposes in the public interest, scientific or historical research purposes
      or statistical purposes should be subject to appropriate safeguards for the rights and freedoms of the data subject
      pursuant to this Regulation. Those safeguards should ensure that technical and organisational measures are in place
      in order to ensure, in particular, the principle of data minimisation. The further processing of personal data for archiving
      purposes in the public interest, scientific or historical research purposes or statistical purposes is to be carried
      out when the controller has assessed the feasibility to fulfil those purposes by processing data which do not permit
      or no longer permit the identification of data subjects, provided that appropriate safeguards exist (such as, for instance,
      pseudonymisation of the data). Member States should provide for appropriate safeguards for the processing of personal
      data for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes.
      Member States should be authorised to provide, under specific conditions and subject to appropriate safeguards for data
      subjects, specifications and derogations with regard to the information requirements and rights to rectification, to
      erasure, to be forgotten, to restriction of processing, to data portability, and to object when processing personal
      data for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes.
      The conditions and safeguards in question may entail specific procedures for data subjects to exercise those rights
      if this is appropriate in the light of the purposes sought by the specific processing along with technical and organisational
      measures aimed at minimising the processing of personal data in pursuance of the proportionality and necessity principles.
      The processing of personal data for scientific purposes should also comply with other relevant legislation such as on
      clinical trials.
    - This Regulation shall not impose additional obligations on natural or legal persons in relation to processing in connection
      with the provision of publicly available electronic communications services in public communication networks in the
      Union in relation to matters for which they are subject to specific obligations with the same objective set out in Directive
      2002/58/EC.
    - '1.Where personal data have not been obtained from the data subject, the controller shall provide the data subject with
      the following information: (a)  the identity and the contact details of the controller and, where applicable, of the
      controller''s representative; (b)  the contact details of the data protection officer, where applicable; (c)  the purposes
      of the processing for which the personal data are intended as well as the legal basis for the processing; (d)  the categories
      of personal data concerned; (e)  the recipients or categories of recipients of the personal data, if any; 4.5.2016 L
      119/41   (f) where applicable, that the controller intends to transfer personal data to a recipient in a third country
      or international organisation and the existence or absence of an adequacy decision by the Commission, or in the case
      of transfers referred to in Article 46 or 47, or the second subparagraph of Article 49(1), reference to the appropriate
      or suitable safeguards and the means to obtain a copy of them or where they have been made available.

      2.In addition to the information referred to in paragraph 1, the controller shall provide the data subject with the
      following information necessary to ensure fair and transparent processing in respect of the data subject: (a)  the period
      for which the personal data will be stored, or if that is not possible, the criteria used to determine that period;
      (b)  where the processing is based on point (f) of Article 6(1), the legitimate interests pursued by the controller
      or by a third party; (c)  the existence of the right to request from the controller access to and rectification or erasure
      of personal data or restriction of processing concerning the data subject and to object to processing as well as the
      right to data portability; (d)  where processing is based on point (a) of Article 6(1) or point (a) of Article 9(2),
      the existence of the right to withdraw consent at any time, without affecting the lawfulness of processing based on
      consent before its withdrawal; (e)  the right to lodge a complaint with a supervisory authority; (f)  from which source
      the personal data originate, and if applicable, whether it came from publicly accessible sources; (g)  the existence
      of automated decision-making, including profiling, referred to in Article 22(1) and (4) and, at least in those cases,
      meaningful information about the logic involved, as well as the significance and the envisaged consequences of such
      processing for the data subject.

      3.The controller shall provide the information referred to in paragraphs 1 and 2: (a)  within a reasonable period after
      obtaining the personal data, but at the latest within one month, having regard to the specific circumstances in which
      the personal data are processed; (b)  if the personal data are to be used for communication with the data subject, at
      the latest at the time of the first communication to that data subject; or (c)  if a disclosure to another recipient
      is envisaged, at the latest when the personal data are first disclosed.

      4.Where the controller intends to further process the personal data for a purpose other than that for which the personal
      data were obtained, the controller shall provide the data subject prior to that further processing with information
      on that other purpose and with any relevant further information as referred to in paragraph 2

      5.Paragraphs 1 to 4 shall not apply where and insofar as: (a)  the data subject already has the information; (b)  the
      provision of such information proves impossible or would involve a disproportionate effort, in particular for processing
      for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes, subject
      to the conditions and safeguards referred to in Article 89(1) or in so far as the obligation referred to in paragraph
      1 of this Article is likely to render impossible or seriously impair the achievement of the objectives of that processing.
      In such cases the controller shall take appropriate measures to protect the data subject''s rights and freedoms and
      legitimate interests, including making the information publicly available; (c)  obtaining or disclosure is expressly
      laid down by Union or Member State law to which the controller is subject and which provides appropriate measures to
      protect the data subject''s legitimate interests; or (d)  where the personal data must remain confidential subject to
      an obligation of professional secrecy regulated by Union or Member State law, including a statutory obligation of secrecy.
      4.5.2016 L 119/42'
  - source_sentence: What type of scam is email phishing?
    sentences:
    - To further strengthen the control over his or her own data, where the processing of personal data is carried out by
      automated means, the data subject should also be allowed to receive personal data concerning him or her which he or
      she has provided to a controller in a structured, commonly used, machine-readable and interoperable format, and to transmit
      it to another controller. Data controllers should be encouraged to develop interoperable formats that enable data portability.
      That right should apply where the data subject provided the personal data on the basis of his or her consent or the
      processing is necessary for the performance of a contract. It should not apply where processing is based on a legal
      ground other than consent or contract. By its very nature, that right should not be exercised against controllers processing
      personal data in the exercise of their public duties. It should therefore not apply where the processing of the personal
      data is necessary for compliance with a legal obligation to which the controller is subject or for the performance of
      a task carried out in the public interest or in the exercise of an official authority vested in the controller. The
      data subject's right to transmit or receive personal data concerning him or her should not create an obligation for
      the controllers to adopt or maintain processing systems which are technically compatible. Where, in a certain set of
      personal data, more than one data subject is concerned, the right to receive the personal data should be without prejudice
      to the rights and freedoms of other data subjects in accordance with this Regulation. Furthermore, that right should
      not prejudice the right of the data subject to obtain the erasure of personal data and the limitations of that right
      as set out in this Regulation and should, in particular, not imply the erasure of personal data concerning the data
      subject which have been provided by him or her for the performance of a contract to the extent that and for as long
      as the personal data are necessary for the performance of that contract. Where technically feasible, the data subject
      should have the right to have the personal data transmitted directly from one controller to another.
    - In order to ensure that consent is freely given, consent should not provide a valid legal ground for the processing
      of personal data in a specific case where there is a clear imbalance between the data subject and the controller, in
      particular where the controller is a public authority and it is therefore unlikely that consent was freely given in
      all the circumstances of that specific situation. Consent is presumed not to be freely given if it does not allow separate
      consent to be given to different personal data processing operations despite it being appropriate in the individual
      case, or if the performance of a contract, including the provision of a service, is dependent on the consent despite
      such consent not being necessary for such performance.
    - 'Email phishing is a type of identity theft scam conducted via email or SMS. The attacker uses social engineering tactics
      such as impersonating trusted entities and inducing urgency. Victims are tricked into disclosing personal information
      or downloading malware.


      Scenarios:

      - Scenario 1: Emails impersonating high-ranking executives accuse victims of crimes to coerce them into revealing information
      or opening malware-laden attachments.

      - Scenario 2: Emails/SMS from fake banks or authorities alert victims of data breaches, directing them to spoofed websites
      to input credentials.

      - Scenario 3: SMS messages deliver disguised malware apps that harvest sensitive data.

      - Scenario 4: SMS links lead to pharming sites that mimic trusted brands and steal login data through fake pop-ups.'
  - source_sentence: What can Member States provide for in respect of the processing of employees' personal data?
    sentences:
    - "1.The lead supervisory authority shall cooperate with the other supervisory authorities concerned in accordance with\
      \ this Article in an endeavour to reach consensus. The lead supervisory authority and the supervisory authorities concerned\
      \ shall exchange all relevant information with each other.\n2.The lead supervisory authority may request at any time\
      \ other supervisory authorities concerned to provide mutual assistance pursuant to Article 61 and may conduct joint\
      \ operations pursuant to Article 62, in particular for carrying out investigations or for monitoring the implementation\
      \ of a measure concerning a controller or processor established in another Member State.\n3.The lead supervisory authority\
      \ shall, without delay, communicate the relevant information on the matter to the other supervisory authorities concerned.\
      \ It shall without delay submit a draft decision to the other supervisory authorities concerned for their opinion and\
      \ take due account of their views.\n4.Where any of the other supervisory authorities concerned within a period of four\
      \ weeks after having been consulted in accordance with paragraph 3 of this Article, expresses a relevant and reasoned\
      \ objection to the draft decision, the lead supervisory authority shall, if it does not follow the relevant and reasoned\
      \ objection or is of the opinion that the objection is not relevant or reasoned, submit the matter to the consistency\
      \ mechanism referred to in Article 63\n5.Where the lead supervisory authority intends to follow the relevant and reasoned\
      \ objection made, it shall submit to the other supervisory authorities concerned a revised draft decision for their\
      \ opinion. That revised draft decision shall be subject to the procedure referred to in paragraph 4 within a period\
      \ of two weeks.\n6.Where none of the other supervisory authorities concerned has objected to the draft decision submitted\
      \ by the lead supervisory authority within the period referred to in paragraphs 4 and 5, the lead supervisory authority\
      \ and the supervisory authorities concerned shall be deemed to be in agreement with that draft decision and shall be\
      \ bound by it.\n7.The lead supervisory authority shall adopt and notify the decision to the main establishment or single\
      \ establishment of the controller or processor, as the case may be and inform the other supervisory authorities concerned\
      \ and the Board of the decision in question, including a summary of the relevant facts and grounds. The supervisory\
      \ authority with which a complaint has been lodged shall inform the complainant on the decision.\n8.By derogation from\
      \ paragraph 7, where a complaint is dismissed or rejected, the supervisory authority with which the complaint was lodged\
      \ shall adopt the decision and notify it to the complainant and shall inform the controller thereof.\n9.Where the lead\
      \ supervisory authority and the supervisory authorities concerned agree to dismiss or reject parts of a complaint and\
      \ to act on other parts of that complaint, a separate decision shall be adopted for each of those parts of the matter.\
      \ The lead supervisory authority shall adopt the decision for the part concerning actions in relation to the controller,\
      \ shall notify it to the main establishment or single establishment of the controller or processor on the territory\
      \ of its Member State and shall inform the complainant thereof, while the supervisory authority of the complainant shall\
      \ adopt the decision for the part concerning dismissal or rejection of that complaint, and shall notify it to that complainant\
      \ and shall inform the controller or processor thereof.\n10.After being notified of the decision of the lead supervisory\
      \ authority pursuant to paragraphs 7 and 9, the controller or processor shall take the necessary measures to ensure\
      \ compliance with the decision as regards processing activities in the context of all its establishments in the Union.\
      \ The controller or processor shall notify the measures taken for complying with the decision to the lead supervisory\
      \ authority, which shall inform the other supervisory authorities concerned. 4.5.2016 L 119/71  \n11.Where, in exceptional\
      \ circumstances, a supervisory authority concerned has reasons to consider that there is an urgent need to act in order\
      \ to protect the interests of data subjects, the urgency procedure referred to in Article 66 shall apply.\n12.The lead\
      \ supervisory authority and the other supervisory authorities concerned shall supply the information required under\
      \ this Article to each other by electronic means, using a standardised format."
    - This Regulation should apply to all matters concerning the protection of fundamental rights and freedoms vis-à- vis
      the processing of personal data which are not subject to specific obligations with the same objective set out in Directive
      2002/58/EC of the European Parliament and of the Council (2), including the obligations on the controller and the rights
      of natural persons. In order to clarify the relationship between this Regulation and Directive 2002/58/EC, that Directive
      should be amended accordingly. Once this Regulation is adopted, Directive 2002/58/EC should be reviewed in particular
      in order to ensure consistency with this Regulation, 4.5.2016 L 119/31 Official Journal of the European Union EN
    - '1.Member States may, by law or by collective agreements, provide for more specific rules to ensure the protection of
      the rights and freedoms in respect of the processing of employees'' personal data in the employment context, in particular
      for the purposes of the recruitment, the performance of the contract of employment, including discharge of obligations
      laid down by law or by collective agreements, management, planning and organisation of work, equality and diversity
      in the workplace, health and safety at work, protection of employer''s or customer''s property and for the purposes
      of the exercise and enjoyment, on an individual or collective basis, of rights and benefits related to employment, and
      for the purpose of the termination of the employment relationship.

      2.Those rules shall include suitable and specific measures to safeguard the data subject''s human dignity, legitimate
      interests and fundamental rights, with particular regard to the transparency of processing, the transfer of personal
      data within a group of undertakings, or a group of enterprises engaged in a joint economic activity and monitoring systems
      at the work place.

      3.Each Member State shall notify to the Commission those provisions of its law which it adopts pursuant to paragraph
      1, by 25 May 2018 and, without delay, any subsequent amendment affecting them.'
  - source_sentence: Who may carry out the monitoring of compliance with a code of conduct according to Article 40?
    sentences:
    - It should be ascertained whether all appropriate technological protection and organisational measures have been implemented
      to establish immediately whether a personal data breach has taken place and to inform promptly the supervisory authority
      and the data subject. The fact that the notification was made without undue delay should be established taking into
      account in particular the nature and gravity of the personal data breach and its consequences and adverse effects for
      the data subject. Such notification may result in an intervention of the supervisory authority in accordance with its
      tasks and powers laid down in this Regulation.
    - '1.Without prejudice to the tasks and powers of the competent supervisory authority under Articles 57 and 58, the monitoring
      of compliance with a code of conduct pursuant to Article 40 may be carried out by a body which has an appropriate level
      of expertise in relation to the subject-matter of the code and is accredited for that purpose by the competent supervisory
      authority.

      2.A body as referred to in paragraph 1 may be accredited to monitor compliance with a code of conduct where that body
      has: (a)  demonstrated its independence and expertise in relation to the subject-matter of the code to the satisfaction
      of the competent supervisory authority; (b)  established procedures which allow it to assess the eligibility of controllers
      and processors concerned to apply the code, to monitor their compliance with its provisions and to periodically review
      its operation; (c)  established procedures and structures to handle complaints about infringements of the code or the
      manner in which the code has been, or is being, implemented by a controller or processor, and to make those procedures
      and structures transparent to data subjects and the public; and (d)  demonstrated to the satisfaction of the competent
      supervisory authority that its tasks and duties do not result in a conflict of interests.

      3.The competent supervisory authority shall submit the draft criteria for accreditation of a body as referred to in
      paragraph 1 of this Article to the Board pursuant to the consistency mechanism referred to in Article 63

      4.Without prejudice to the tasks and powers of the competent supervisory authority and the provisions of Chapter VIII,
      a body as referred to in paragraph 1 of this Article shall, subject to appropriate safeguards, take appropriate action
      in cases of infringement of the code by a controller or processor, including suspension or exclusion of the controller
      or processor concerned from the code. It shall inform the competent supervisory authority of such actions and the reasons
      for taking them.

      5.The competent supervisory authority shall revoke the accreditation of a body as referred to in paragraph 1 if the
      conditions for accreditation are not, or are no longer, met or where actions taken by the body infringe this Regulation.

      6.This Article shall not apply to processing carried out by public authorities and bodies.'
    - '**Court (Civil/Criminal): Civil**


      **Provisions:**


      **Time of commission of the act:**


      **Outcome (not guilty, guilty):**


      **Rationale:**


      **Facts:**

      The plaintiff holds credit card number ............ with the defendant banking corporation. Based on the application
      for alternative networks dated 19/7/2015 with number ......... submitted at a branch of the defendant, he was granted
      access to the electronic banking service (e-banking) to conduct banking transactions (debit, credit, updates, payments)
      remotely. On 30/11/2020, the plaintiff fell victim to electronic fraud through the "phishing" method, whereby an unknown
      perpetrator managed to withdraw a total amount of €3,121.75 from the aforementioned credit card. Specifically, the plaintiff
      received an email at 1:35 PM on 29/11/2020 from sender ...... with address ........, informing him that due to an impending
      system change, he needed to verify the mobile phone number linked to the credit card, urging him to complete the verification
      process within the next 24 hours by following a link titled ........; otherwise, his account would be locked for security
      reasons. The plaintiff read this email on the afternoon of 30 November 2020 and, believing it was from the defendant,
      followed the instructions and proceeded via the provided link to a website that was identical (a clone) to that of the
      defendant. On this page, he was asked to enter the six-digit security code (.........) that had just been sent to his
      mobile phone by the defendant at 3:41 PM, with the note that it was an activation code for his ........ card at .........,
      which he entered.


      Subsequently, the plaintiff received, according to his statements, a new email (not submitted), which requested him
      to enter the details of the aforementioned credit card, specifically the name of the cardholder and the card number,
      not the PIN, which he also entered, convinced that he was within the online environment of the defendant. Then, at 3:47
      PM, he received a message on his mobile phone from the defendant containing the exact same content as the one he received
      at 3:41 PM, while at 3:50 PM he received a message stating that the activation of his ......... card at ....... had
      been completed. Once the plaintiff read this, he became concerned that something was not right, and immediately called
      (at 4:41 PM) the defendant''s call center to inform them. There, the employees, with whom he finally connected at 5:04
      PM due to high call center volume, advised him to delete the relevant emails, cancel his credit card, change his access
      passwords for the service, and submit a dispute request regarding the conducted transactions. The plaintiff electronically
      sent this request to the defendant, disputing the detailed transactions amounting to €3,121.75, which were conducted
      on 30/11/2020 during the time frame of 16:37:45-16:43:34 PM, arguing that he had neither performed them himself nor
      authorized anyone else to do so. The plaintiff specifically disputed the following transactions, as evidenced by the
      account activity of the disputed credit card during the aforementioned timeframe: a) transaction number ......... amounting
      to €150.62 conducted on 30/11/2020 at 4:43:34 PM, b) transaction number ........ amounting to €293.20 conducted on 30/11/2020
      at 4:42:40 PM, c) transaction number ............ amounting to €295.21 conducted on 30/11/2020 at 4:42:10 PM, d) transaction
      number .......... amounting to €299.22 conducted on 30/11/2020 at 4:41:31 PM, e) transaction number ........ amounting
      to €297.21 conducted on 30/11/2020 at 4:41:01 PM, f) transaction number ........ amounting to €299.22 conducted on 30/11/2020
      at 4:40:27 PM, g) transaction number ....... amounting to €299.22 conducted on 30/11/2020 at 4:39:55 PM, h) transaction
      number ...... amounting to €299.22 conducted on 30/11/2020 at 4:39:22 PM, i) transaction number ......... amounting
      to €297.22 conducted on 30/11/2020 at 4:38:52 PM, j) transaction number ......... amounting to €295.21 conducted on
      30/11/2020 at 4:38:17 PM, and k) transaction number ......... amounting to €296.21 conducted on 30/11/2020 at 4:37:45
      PM. In its response letter dated 21/12/2020, the defendant denied responsibility for the costs of the aforementioned
      transactions, placing the entire blame on the plaintiff for the leak of his card details and security code to the fraudulent
      page. The plaintiff, completely denying any fault for the conducted transactions, repeatedly contacted the defendant,
      both by phone and via email (see emails dated 15/1/2021 and 11/2/2021), while on 2/3/2021, he electronically sent a
      report dated 1/03/2021 to the Consumer Advocate’s email address, recounting the events and requesting that the aforementioned
      Independent Authority intervene to have the disputed debt canceled. In its letter with reference number ...../27.04.2021,
      the aforementioned Independent Authority informed the plaintiff that the case was outside its mediating role and was
      therefore archived. Subsequently, the plaintiff sent the defendant on 5/3/2021 his extrajudicial statement dated 4/3/2021,
      calling upon it to fully cancel the debt of €3,121.75 that had been unjustly incurred against him within two days and
      to immediately instruct the representatives of the collection agency working with it to cease contacting him regarding
      the disputed case. The defendant sent the plaintiff a message on his mobile phone on 20/04/2021 informing him that his
      case was still being processed due to lengthy operational requirements, while on 23/04/2021, via email, it informed
      him that considering their good cooperation and his efforts to keep them updated, it had reviewed his case and decided
      to refund him the amounts of the transactions that were conducted after his contact with their representatives on 30/11/2020
      at 4:41 PM, totaling €1,038.25, specifically the following: a) transaction of €150.62 conducted on 30/11/2020 at 4:43
      PM, b) transaction of €295.21 conducted on 30/11/2020 at 4:42 PM, c) transaction of €293.20 conducted on 30/11/2020
      at 4:42 PM, and d) transaction of €299.22 conducted on 30/11/2020 at 4:41 PM. Beyond this, the defendant refused to
      refund the plaintiff the amount of the remaining transactions conducted on 30/11/2020, totaling €2,376.08 (and not €2,376.48
      as incorrectly stated by the plaintiff in his lawsuit), which the plaintiff ultimately fully paid, transferring €2,342.77
      to the defendant on 7/06/2021 and €33.31 on 15/06/2021 (see related deposit receipts).'
