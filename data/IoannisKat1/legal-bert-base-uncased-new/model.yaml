  language:
  - en
  license: apache-2.0
  tags:
  - sentence-transformers
  - sentence-similarity
  - feature-extraction
  - dense
  - generated_from_trainer
  - dataset_size:391
  - loss:MatryoshkaLoss
  - loss:MultipleNegativesRankingLoss
  base_model: nlpaueb/legal-bert-base-uncased
  widget:
  - source_sentence: What does 'personal data breach' entail?
    sentences:
    - '1.Processing of personal data revealing racial or ethnic origin, political opinions, religious or philosophical beliefs,
      or trade union membership, and the processing of genetic data, biometric data for the purpose of uniquely identifying
      a natural person, data concerning health or data concerning a natural person''s sex life or sexual orientation shall
      be prohibited.

      2.Paragraph 1 shall not apply if one of the following applies: (a)  the data subject has given explicit consent to the
      processing of those personal data for one or more specified purposes, except where Union or Member State law provide
      that the prohibition referred to in paragraph 1 may not be lifted by the data subject; (b)  processing is necessary
      for the purposes of carrying out the obligations and exercising specific rights of the controller or of the data subject
      in the field of employment and social security and social protection law in so far as it is authorised by Union or Member
      State law or a collective agreement pursuant to Member State law providing for appropriate safeguards for the fundamental
      rights and the interests of the data subject; (c)  processing is necessary to protect the vital interests of the data
      subject or of another natural person where the data subject is physically or legally incapable of giving consent; (d)  processing
      is carried out in the course of its legitimate activities with appropriate safeguards by a foundation, association or
      any other not-for-profit body with a political, philosophical, religious or trade union aim and on condition that the
      processing relates solely to the members or to former members of the body or to persons who have regular contact with
      it in connection with its purposes and that the personal data are not disclosed outside that body without the consent
      of the data subjects; (e)  processing relates to personal data which are manifestly made public by the data subject;
      (f)  processing is necessary for the establishment, exercise or defence of legal claims or whenever courts are acting
      in their judicial capacity; (g)  processing is necessary for reasons of substantial public interest, on the basis of
      Union or Member State law which shall be proportionate to the aim pursued, respect the essence of the right to data
      protection and provide for suitable and specific measures to safeguard the fundamental rights and the interests of the
      data subject; (h)  processing is necessary for the purposes of preventive or occupational medicine, for the assessment
      of the working capacity of the employee, medical diagnosis, the provision of health or social care or treatment or the
      management of health or social care systems and services on the basis of Union or Member State law or pursuant to contract
      with a health professional and subject to the conditions and safeguards referred to in paragraph 3; (i)  processing
      is necessary for reasons of public interest in the area of public health, such as protecting against serious cross-border
      threats to health or ensuring high standards of quality and safety of health care and of medicinal products or medical
      devices, on the basis of Union or Member State law which provides for suitable and specific measures to safeguard the
      rights and freedoms of the data subject, in particular professional secrecy; 4.5.2016 L 119/38   (j)  processing is
      necessary for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes
      in accordance with Article 89(1) based on Union or Member State law which shall be proportionate to the aim pursued,
      respect the essence of the right to data protection and provide for suitable and specific measures to safeguard the
      fundamental rights and the interests of the data subject.

      3.Personal data referred to in paragraph 1 may be processed for the purposes referred to in point (h) of paragraph 2
      when those data are processed by or under the responsibility of a professional subject to the obligation of professional
      secrecy under Union or Member State law or rules established by national competent bodies or by another person also
      subject to an obligation of secrecy under Union or Member State law or rules established by national competent bodies.

      4.Member States may maintain or introduce further conditions, including limitations, with regard to the processing of
      genetic data, biometric data or data concerning health.'
    - '1) ''personal data'' means any information relating to an identified or identifiable natural person (''data subject'');
      an identifiable natural person is one who can be identified, directly or indirectly, in particular by reference to an
      identifier such as a name, an identification number, location data, an online identifier or to one or more factors specific
      to the physical, physiological, genetic, mental, economic, cultural or social identity of that natural person;

      (2) ‘processing’ means any operation or set of operations which is performed on personal data or on sets of personal
      data, whether or not by automated means, such as collection, recording, organisation, structuring, storage, adaptation
      or alteration, retrieval, consultation, use, disclosure by transmission, dissemination or otherwise making available,
      alignment or combination, restriction, erasure or destruction;

      (3) ‘restriction of processing’ means the marking of stored personal data with the aim of limiting their processing
      in the future;

      (4) ‘profiling’ means any form of automated processing of personal data consisting of the use of personal data to evaluate
      certain personal aspects relating to a natural person, in particular to analyse or predict aspects concerning that natural
      person''s performance at work, economic situation, health, personal preferences, interests, reliability, behaviour,
      location or movements;

      (5) ‘pseudonymisation’ means the processing of personal data in such a manner that the personal data can no longer be
      attributed to a specific data subject without the use of additional information, provided that such additional information
      is kept separately and is subject to technical and organisational measures to ensure that the personal data are not
      attributed to an identified or identifiable natural person;

      (6) ‘filing system’ means any structured set of personal data which are accessible according to specific criteria, whether
      centralised, decentralised or dispersed on a functional or geographical basis;

      (7) ‘controller’ means the natural or legal person, public authority, agency or other body which, alone or jointly with
      others, determines the purposes and means of the processing of personal data; where the purposes and means of such processing
      are determined by Union or Member State law, the controller or the specific criteria for its nomination may be provided
      for by Union or Member State law;

      (8) ‘processor’ means a natural or legal person, public authority, agency or other body which processes personal data
      on behalf of the controller;

      (9) ‘recipient’ means a natural or legal person, public authority, agency or another body, to which the personal data
      are disclosed, whether a third party or not. However, public authorities which may receive personal data in the framework
      of a particular inquiry in accordance with Union or Member State law shall not be regarded as recipients; the processing
      of those data by those public authorities shall be in compliance with the applicable data protection rules according
      to the purposes of the processing;

      (10) ‘third party’ means a natural or legal person, public authority, agency or body other than the data subject, controller,
      processor and persons who, under the direct authority of the controller or processor, are authorised to process personal
      data;

      (11) ‘consent’ of the data subject means any freely given, specific, informed and unambiguous indication of the data
      subject''s wishes by which he or she, by a statement or by a clear affirmative action, signifies agreement to the processing
      of personal data relating to him or her;

      (12) ‘personal data breach’ means a breach of security leading to the accidental or unlawful destruction, loss, alteration,
      unauthorised disclosure of, or access to, personal data transmitted, stored or otherwise processed;

      (13) ‘genetic data’ means personal data relating to the inherited or acquired genetic characteristics of a natural person
      which give unique information about the physiology or the health of that natural person and which result, in particular,
      from an analysis of a biological sample from the natural person in question;

      (14) ‘biometric data’ means personal data resulting from specific technical processing relating to the physical, physiological
      or behavioural characteristics of a natural person, which allow or confirm the unique identification of that natural
      person, such as facial images or dactyloscopic data;

      (15) ‘data concerning health’ means personal data related to the physical or mental health of a natural person, including
      the provision of health care services, which reveal information about his or her health status;

      (16) ‘main establishment’ means: (a) as regards a controller with establishments in more than one Member State, the
      place of its central administration in the Union, unless the decisions on the purposes and means of the processing of
      personal data are taken in another establishment of the controller in the Union and the latter establishment has the
      power to have such decisions implemented, in which case the establishment having taken such decisions is to be considered
      to be the main establishment; (b) as regards a processor with establishments in more than one Member State, the place
      of its central administration in the Union, or, if the processor has no central administration in the Union, the establishment
      of the processor in the Union where the main processing activities in the context of the activities of an establishment
      of the processor take place to the extent that the processor is subject to specific obligations under this Regulation;

      (17) ‘representative’ means a natural or legal person established in the Union who, designated by the controller or
      processor in writing pursuant to Article 27, represents the controller or processor with regard to their respective
      obligations under this Regulation;

      (18) ‘enterprise’ means a natural or legal person engaged in an economic activity, irrespective of its legal form, including
      partnerships or associations regularly engaged in an economic activity;

      (19) ‘group of undertakings’ means a controlling undertaking and its controlled undertakings;

      (20) ‘binding corporate rules’ means personal data protection policies which are adhered to by a controller or processor
      established on the territory of a Member State for transfers or a set of transfers of personal data to a controller
      or processor in one or more third countries within a group of undertakings, or group of enterprises engaged in a joint
      economic activity;

      (21) ‘supervisory authority’ means an independent public authority which is established by a Member State pursuant to
      Article 51;

      (22) ‘supervisory authority concerned’ means a supervisory authority which is concerned by the processing of personal
      data because: (a) the controller or processor is established on the territory of the Member State of that supervisory
      authority; (b) data subjects residing in the Member State of that supervisory authority are substantially affected or
      likely to be substantially affected by the processing; or (c) a complaint has been lodged with that supervisory authority;

      (23) ‘cross-border processing’ means either: (a) processing of personal data which takes place in the context of the
      activities of establishments in more than one Member State of a controller or processor in the Union where the controller
      or processor is established in more than one Member State; or (b) processing of personal data which takes place in the
      context of the activities of a single establishment of a controller or processor in the Union but which substantially
      affects or is likely to substantially affect data subjects in more than one Member State.

      (24) ‘relevant and reasoned objection’ means an objection to a draft decision as to whether there is an infringement
      of this Regulation, or whether envisaged action in relation to the controller or processor complies with this Regulation,
      which clearly demonstrates the significance of the risks posed by the draft decision as regards the fundamental rights
      and freedoms of data subjects and, where applicable, the free flow of personal data within the Union;

      (25) ‘information society service’ means a service as defined in point (b) of Article 1(1) of Directive (EU) 2015/1535
      of the European Parliament and of the Council (1);

      (26) ‘international organisation’ means an organisation and its subordinate bodies governed by public international
      law, or any other body which is set up by, or on the basis of, an agreement between two or more countries.'
    - Any processing of personal data should be lawful and fair. It should be transparent to natural persons that personal
      data concerning them are collected, used, consulted or otherwise processed and to what extent the personal data are
      or will be processed. The principle of transparency requires that any information and communication relating to the
      processing of those personal data be easily accessible and easy to understand, and that clear and plain language be
      used. That principle concerns, in particular, information to the data subjects on the identity of the controller and
      the purposes of the processing and further information to ensure fair and transparent processing in respect of the natural
      persons concerned and their right to obtain confirmation and communication of personal data concerning them which are
      being processed. Natural persons should be made aware of risks, rules, safeguards and rights in relation to the processing
      of personal data and how to exercise their rights in relation to such processing. In particular, the specific purposes
      for which personal data are processed should be explicit and legitimate and determined at the time of the collection
      of the personal data. The personal data should be adequate, relevant and limited to what is necessary for the purposes
      for which they are processed. This requires, in particular, ensuring that the period for which the personal data are
      stored is limited to a strict minimum. Personal data should be processed only if the purpose of the processing could
      not reasonably be fulfilled by other means. In order to ensure that the personal data are not kept longer than necessary,
      time limits should be established by the controller for erasure or for a periodic review. Every reasonable step should
      be taken to ensure that personal data which are inaccurate are rectified or deleted. Personal data should be processed
      in a manner that ensures appropriate security and confidentiality of the personal data, including for preventing unauthorised
      access to or use of personal data and the equipment used for the processing.
  - source_sentence: In what situations could providing information to the data subject be considered impossible or involve
      a disproportionate effort?
    sentences:
    - '1.The controller shall consult the supervisory authority prior to processing where a data protection impact assessment
      under Article 35 indicates that the processing would result in a high risk in the absence of measures taken by the controller
      to mitigate the risk.

      2.Where the supervisory authority is of the opinion that the intended processing referred to in paragraph 1 would infringe
      this Regulation, in particular where the controller has insufficiently identified or mitigated the risk, the supervisory
      authority shall, within period of up to eight weeks of receipt of the request for consultation, provide written advice
      to the controller and, where applicable to the processor, and may use any of its powers referred to in Article 58. That
      period may be extended by six weeks, taking into account the complexity of the intended processing. The supervisory
      authority shall inform the controller and, where applicable, the processor, of any such extension within one month of
      receipt of the request for consultation together with the reasons for the delay. Those periods may be suspended until
      the supervisory authority has obtained information it has requested for the purposes of the consultation.

      3.When consulting the supervisory authority pursuant to paragraph 1, the controller shall provide the supervisory authority
      with: (a)  where applicable, the respective responsibilities of the controller, joint controllers and processors involved
      in the processing, in particular for processing within a group of undertakings; (b)  the purposes and means of the intended
      processing; (c)  the measures and safeguards provided to protect the rights and freedoms of data subjects pursuant to
      this Regulation; (d)  where applicable, the contact details of the data protection officer; 4.5.2016 L 119/54   (e)  the
      data protection impact assessment provided for in Article 35; and (f)  any other information requested by the supervisory
      authority.

      4.Member States shall consult the supervisory authority during the preparation of a proposal for a legislative measure
      to be adopted by a national parliament, or of a regulatory measure based on such a legislative measure, which relates
      to processing.

      5.Notwithstanding paragraph 1, Member State law may require controllers to consult with, and obtain prior authorisation
      from, the supervisory authority in relation to processing by a controller for the performance of a task carried out
      by the controller in the public interest, including processing in relation to social protection and public health'
    - "1.The Member States, the supervisory authorities, the Board and the Commission shall encourage, in particular at Union\
      \ level, the establishment of data protection certification mechanisms and of data protection seals and marks, for the\
      \ purpose of demonstrating compliance with this Regulation of processing operations by controllers and processors. The\
      \ specific needs of micro, small and medium-sized enterprises shall be taken into account. 4.5.2016 L 119/58  \n2.In\
      \ addition to adherence by controllers or processors subject to this Regulation, data protection certification mechanisms,\
      \ seals or marks approved pursuant to paragraph 5 of this Article may be established for the purpose of demonstrating\
      \ the existence of appropriate safeguards provided by controllers or processors that are not subject to this Regulation\
      \ pursuant to Article 3 within the framework of personal data transfers to third countries or international organisations\
      \ under the terms referred to in point (f) of Article 46(2). Such controllers or processors shall make binding and enforceable\
      \ commitments, via contractual or other legally binding instruments, to apply those appropriate safeguards, including\
      \ with regard to the rights of data subjects.\n3.The certification shall be voluntary and available via a process that\
      \ is transparent.\n4.A certification pursuant to this Article does not reduce the responsibility of the controller or\
      \ the processor for compliance with this Regulation and is without prejudice to the tasks and powers of the supervisory\
      \ authorities which are competent pursuant to Article 55 or 56\n5.A certification pursuant to this Article shall be\
      \ issued by the certification bodies referred to in Article 43 or by the competent supervisory authority, on the basis\
      \ of criteria approved by that competent supervisory authority pursuant to Article 58(3) or by the Board pursuant to\
      \ Article 63. Where the criteria are approved by the Board, this may result in a common certification, the European\
      \ Data Protection Seal.\n6.The controller or processor which submits its processing to the certification mechanism shall\
      \ provide the certification body referred to in Article 43, or where applicable, the competent supervisory authority,\
      \ with all information and access to its processing activities which are necessary to conduct the certification procedure.\n\
      7.Certification shall be issued to a controller or processor for a maximum period of three years and may be renewed,\
      \ under the same conditions, provided that the relevant requirements continue to be met. Certification shall be withdrawn,\
      \ as applicable, by the certification bodies referred to in Article 43 or by the competent supervisory authority where\
      \ the requirements for the certification are not or are no longer met.\n8.The Board shall collate all certification\
      \ mechanisms and data protection seals and marks in a register and shall make them publicly available by any appropriate\
      \ means."
    - However, it is not necessary to impose the obligation to provide information where the data subject already possesses
      the information, where the recording or disclosure of the personal data is expressly laid down by law or where the provision
      of information to the data subject proves to be impossible or would involve a disproportionate effort. The latter could
      in particular be the case where processing is carried out for archiving purposes in the public interest, scientific
      or historical research purposes or statistical purposes. In that regard, the number of data subjects, the age of the
      data and any appropriate safeguards adopted should be taken into consideration.
  - source_sentence: What is the data subject provided with prior to further processing of personal data?
    sentences:
    - '1.Where personal data relating to a data subject are collected from the data subject, the controller shall, at the
      time when personal data are obtained, provide the data subject with all of the following information: (a)  the identity
      and the contact details of the controller and, where applicable, of the controller''s representative; (b)  the contact
      details of the data protection officer, where applicable; (c)  the purposes of the processing for which the personal
      data are intended as well as the legal basis for the processing; 4.5.2016 L 119/40   (d)  where the processing is based
      on point (f) of Article 6(1), the legitimate interests pursued by the controller or by a third party; (e)  the recipients
      or categories of recipients of the personal data, if any; (f)  where applicable, the fact that the controller intends
      to transfer personal data to a third country or international organisation and the existence or absence of an adequacy
      decision by the Commission, or in the case of transfers referred to in Article 46 or 47, or the second subparagraph
      of Article 49(1), reference to the appropriate or suitable safeguards and the means by which to obtain a copy of them
      or where they have been made available.

      2.In addition to the information referred to in paragraph 1, the controller shall, at the time when personal data are
      obtained, provide the data subject with the following further information necessary to ensure fair and transparent processing:
      (a)  the period for which the personal data will be stored, or if that is not possible, the criteria used to determine
      that period; (b)  the existence of the right to request from the controller access to and rectification or erasure of
      personal data or restriction of processing concerning the data subject or to object to processing as well as the right
      to data portability; (c)  where the processing is based on point (a) of Article 6(1) or point (a) of Article 9(2), the
      existence of the right to withdraw consent at any time, without affecting the lawfulness of processing based on consent
      before its withdrawal; (d)  the right to lodge a complaint with a supervisory authority; (e)  whether the provision
      of personal data is a statutory or contractual requirement, or a requirement necessary to enter into a contract, as
      well as whether the data subject is obliged to provide the personal data and of the possible consequences of failure
      to provide such data; (f)  the existence of automated decision-making, including profiling, referred to in Article 22(1)
      and (4) and, at least in those cases, meaningful information about the logic involved, as well as the significance and
      the envisaged consequences of such processing for the data subject.

      3.Where the controller intends to further process the personal data for a purpose other than that for which the personal
      data were collected, the controller shall provide the data subject prior to that further processing with information
      on that other purpose and with any relevant further information as referred to in paragraph 2

      4.Paragraphs 1, 2 and 3 shall not apply where and insofar as the data subject already has the information.'
    - This Regulation respects and does not prejudice the status under existing constitutional law of churches and religious
      associations or communities in the Member States, as recognised in Article 17 TFEU.
    - '1) ''personal data'' means any information relating to an identified or identifiable natural person (''data subject'');
      an identifiable natural person is one who can be identified, directly or indirectly, in particular by reference to an
      identifier such as a name, an identification number, location data, an online identifier or to one or more factors specific
      to the physical, physiological, genetic, mental, economic, cultural or social identity of that natural person;

      (2) ‘processing’ means any operation or set of operations which is performed on personal data or on sets of personal
      data, whether or not by automated means, such as collection, recording, organisation, structuring, storage, adaptation
      or alteration, retrieval, consultation, use, disclosure by transmission, dissemination or otherwise making available,
      alignment or combination, restriction, erasure or destruction;

      (3) ‘restriction of processing’ means the marking of stored personal data with the aim of limiting their processing
      in the future;

      (4) ‘profiling’ means any form of automated processing of personal data consisting of the use of personal data to evaluate
      certain personal aspects relating to a natural person, in particular to analyse or predict aspects concerning that natural
      person''s performance at work, economic situation, health, personal preferences, interests, reliability, behaviour,
      location or movements;

      (5) ‘pseudonymisation’ means the processing of personal data in such a manner that the personal data can no longer be
      attributed to a specific data subject without the use of additional information, provided that such additional information
      is kept separately and is subject to technical and organisational measures to ensure that the personal data are not
      attributed to an identified or identifiable natural person;

      (6) ‘filing system’ means any structured set of personal data which are accessible according to specific criteria, whether
      centralised, decentralised or dispersed on a functional or geographical basis;

      (7) ‘controller’ means the natural or legal person, public authority, agency or other body which, alone or jointly with
      others, determines the purposes and means of the processing of personal data; where the purposes and means of such processing
      are determined by Union or Member State law, the controller or the specific criteria for its nomination may be provided
      for by Union or Member State law;

      (8) ‘processor’ means a natural or legal person, public authority, agency or other body which processes personal data
      on behalf of the controller;

      (9) ‘recipient’ means a natural or legal person, public authority, agency or another body, to which the personal data
      are disclosed, whether a third party or not. However, public authorities which may receive personal data in the framework
      of a particular inquiry in accordance with Union or Member State law shall not be regarded as recipients; the processing
      of those data by those public authorities shall be in compliance with the applicable data protection rules according
      to the purposes of the processing;

      (10) ‘third party’ means a natural or legal person, public authority, agency or body other than the data subject, controller,
      processor and persons who, under the direct authority of the controller or processor, are authorised to process personal
      data;

      (11) ‘consent’ of the data subject means any freely given, specific, informed and unambiguous indication of the data
      subject''s wishes by which he or she, by a statement or by a clear affirmative action, signifies agreement to the processing
      of personal data relating to him or her;

      (12) ‘personal data breach’ means a breach of security leading to the accidental or unlawful destruction, loss, alteration,
      unauthorised disclosure of, or access to, personal data transmitted, stored or otherwise processed;

      (13) ‘genetic data’ means personal data relating to the inherited or acquired genetic characteristics of a natural person
      which give unique information about the physiology or the health of that natural person and which result, in particular,
      from an analysis of a biological sample from the natural person in question;

      (14) ‘biometric data’ means personal data resulting from specific technical processing relating to the physical, physiological
      or behavioural characteristics of a natural person, which allow or confirm the unique identification of that natural
      person, such as facial images or dactyloscopic data;

      (15) ‘data concerning health’ means personal data related to the physical or mental health of a natural person, including
      the provision of health care services, which reveal information about his or her health status;

      (16) ‘main establishment’ means: (a) as regards a controller with establishments in more than one Member State, the
      place of its central administration in the Union, unless the decisions on the purposes and means of the processing of
      personal data are taken in another establishment of the controller in the Union and the latter establishment has the
      power to have such decisions implemented, in which case the establishment having taken such decisions is to be considered
      to be the main establishment; (b) as regards a processor with establishments in more than one Member State, the place
      of its central administration in the Union, or, if the processor has no central administration in the Union, the establishment
      of the processor in the Union where the main processing activities in the context of the activities of an establishment
      of the processor take place to the extent that the processor is subject to specific obligations under this Regulation;

      (17) ‘representative’ means a natural or legal person established in the Union who, designated by the controller or
      processor in writing pursuant to Article 27, represents the controller or processor with regard to their respective
      obligations under this Regulation;

      (18) ‘enterprise’ means a natural or legal person engaged in an economic activity, irrespective of its legal form, including
      partnerships or associations regularly engaged in an economic activity;

      (19) ‘group of undertakings’ means a controlling undertaking and its controlled undertakings;

      (20) ‘binding corporate rules’ means personal data protection policies which are adhered to by a controller or processor
      established on the territory of a Member State for transfers or a set of transfers of personal data to a controller
      or processor in one or more third countries within a group of undertakings, or group of enterprises engaged in a joint
      economic activity;

      (21) ‘supervisory authority’ means an independent public authority which is established by a Member State pursuant to
      Article 51;

      (22) ‘supervisory authority concerned’ means a supervisory authority which is concerned by the processing of personal
      data because: (a) the controller or processor is established on the territory of the Member State of that supervisory
      authority; (b) data subjects residing in the Member State of that supervisory authority are substantially affected or
      likely to be substantially affected by the processing; or (c) a complaint has been lodged with that supervisory authority;

      (23) ‘cross-border processing’ means either: (a) processing of personal data which takes place in the context of the
      activities of establishments in more than one Member State of a controller or processor in the Union where the controller
      or processor is established in more than one Member State; or (b) processing of personal data which takes place in the
      context of the activities of a single establishment of a controller or processor in the Union but which substantially
      affects or is likely to substantially affect data subjects in more than one Member State.

      (24) ‘relevant and reasoned objection’ means an objection to a draft decision as to whether there is an infringement
      of this Regulation, or whether envisaged action in relation to the controller or processor complies with this Regulation,
      which clearly demonstrates the significance of the risks posed by the draft decision as regards the fundamental rights
      and freedoms of data subjects and, where applicable, the free flow of personal data within the Union;

      (25) ‘information society service’ means a service as defined in point (b) of Article 1(1) of Directive (EU) 2015/1535
      of the European Parliament and of the Council (1);

      (26) ‘international organisation’ means an organisation and its subordinate bodies governed by public international
      law, or any other body which is set up by, or on the basis of, an agreement between two or more countries.'
  - source_sentence: What type of data may be processed for purposes related to point (h) of paragraph 2?
    sentences:
    - '1.Processing of personal data revealing racial or ethnic origin, political opinions, religious or philosophical beliefs,
      or trade union membership, and the processing of genetic data, biometric data for the purpose of uniquely identifying
      a natural person, data concerning health or data concerning a natural person''s sex life or sexual orientation shall
      be prohibited.

      2.Paragraph 1 shall not apply if one of the following applies: (a)  the data subject has given explicit consent to the
      processing of those personal data for one or more specified purposes, except where Union or Member State law provide
      that the prohibition referred to in paragraph 1 may not be lifted by the data subject; (b)  processing is necessary
      for the purposes of carrying out the obligations and exercising specific rights of the controller or of the data subject
      in the field of employment and social security and social protection law in so far as it is authorised by Union or Member
      State law or a collective agreement pursuant to Member State law providing for appropriate safeguards for the fundamental
      rights and the interests of the data subject; (c)  processing is necessary to protect the vital interests of the data
      subject or of another natural person where the data subject is physically or legally incapable of giving consent; (d)  processing
      is carried out in the course of its legitimate activities with appropriate safeguards by a foundation, association or
      any other not-for-profit body with a political, philosophical, religious or trade union aim and on condition that the
      processing relates solely to the members or to former members of the body or to persons who have regular contact with
      it in connection with its purposes and that the personal data are not disclosed outside that body without the consent
      of the data subjects; (e)  processing relates to personal data which are manifestly made public by the data subject;
      (f)  processing is necessary for the establishment, exercise or defence of legal claims or whenever courts are acting
      in their judicial capacity; (g)  processing is necessary for reasons of substantial public interest, on the basis of
      Union or Member State law which shall be proportionate to the aim pursued, respect the essence of the right to data
      protection and provide for suitable and specific measures to safeguard the fundamental rights and the interests of the
      data subject; (h)  processing is necessary for the purposes of preventive or occupational medicine, for the assessment
      of the working capacity of the employee, medical diagnosis, the provision of health or social care or treatment or the
      management of health or social care systems and services on the basis of Union or Member State law or pursuant to contract
      with a health professional and subject to the conditions and safeguards referred to in paragraph 3; (i)  processing
      is necessary for reasons of public interest in the area of public health, such as protecting against serious cross-border
      threats to health or ensuring high standards of quality and safety of health care and of medicinal products or medical
      devices, on the basis of Union or Member State law which provides for suitable and specific measures to safeguard the
      rights and freedoms of the data subject, in particular professional secrecy; 4.5.2016 L 119/38   (j)  processing is
      necessary for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes
      in accordance with Article 89(1) based on Union or Member State law which shall be proportionate to the aim pursued,
      respect the essence of the right to data protection and provide for suitable and specific measures to safeguard the
      fundamental rights and the interests of the data subject.

      3.Personal data referred to in paragraph 1 may be processed for the purposes referred to in point (h) of paragraph 2
      when those data are processed by or under the responsibility of a professional subject to the obligation of professional
      secrecy under Union or Member State law or rules established by national competent bodies or by another person also
      subject to an obligation of secrecy under Union or Member State law or rules established by national competent bodies.

      4.Member States may maintain or introduce further conditions, including limitations, with regard to the processing of
      genetic data, biometric data or data concerning health.'
    - '1.The data protection officer shall have at least the following tasks: (a)  to inform and advise the controller or
      the processor and the employees who carry out processing of their obligations pursuant to this Regulation and to other
      Union or Member State data protection provisions; (b)  to monitor compliance with this Regulation, with other Union
      or Member State data protection provisions and with the policies of the controller or processor in relation to the protection
      of personal data, including the assignment of responsibilities, awareness-raising and training of staff involved in
      processing operations, and the related audits; (c)  to provide advice where requested as regards the data protection
      impact assessment and monitor its performance pursuant to Article 35; (d)  to cooperate with the supervisory authority;
      (e)  to act as the contact point for the supervisory authority on issues relating to processing, including the prior
      consultation referred to in Article 36, and to consult, where appropriate, with regard to any other matter.

      2.The data protection officer shall in the performance of his or her tasks have due regard to the risk associated with
      processing operations, taking into account the nature, scope, context and purposes of processing. Section 5 Codes of
      conduct and certification'
    - Processing should be lawful where it is necessary in the context of a contract or the intention to enter into a contract.
  - source_sentence: What may impede authorities in the discharge of their responsibilities under Union law?
    sentences:
    - '1.The controller and the processor shall designate a data protection officer in any case where: (a)  the processing
      is carried out by a public authority or body, except for courts acting in their judicial capacity; (b)  the core activities
      of the controller or the processor consist of processing operations which, by virtue of their nature, their scope and/or
      their purposes, require regular and systematic monitoring of data subjects on a large scale; or (c)  the core activities
      of the controller or the processor consist of processing on a large scale of special categories of data pursuant to
      Article 9 and personal data relating to criminal convictions and offences referred to in Article 10

      2.A group of undertakings may appoint a single data protection officer provided that a data protection officer is easily
      accessible from each establishment.

      3.Where the controller or the processor is a public authority or body, a single data protection officer may be designated
      for several such authorities or bodies, taking account of their organisational structure and size.

      4.In cases other than those referred to in paragraph 1, the controller or processor or associations and other bodies
      representing categories of controllers or processors may or, where required by Union or Member State law shall, designate
      a data protection officer. The data protection officer may act for such associations and other bodies representing controllers
      or processors.

      5.The data protection officer shall be designated on the basis of professional qualities and, in particular, expert
      knowledge of data protection law and practices and the ability to fulfil the tasks referred to in Article 39

      6.The data protection officer may be a staff member of the controller or processor, or fulfil the tasks on the basis
      of a service contract.

      7.The controller or the processor shall publish the contact details of the data protection officer and communicate them
      to the supervisory authority.'
    - This Regulation is without prejudice to international agreements concluded between the Union and third countries regulating
      the transfer of personal data including appropriate safeguards for the data subjects. Member States may conclude international
      agreements which involve the transfer of personal data to third countries or international organisations, as far as
      such agreements do not affect this Regulation or any other provisions of Union law and include an appropriate level
      of protection for the fundamental rights of the data subjects.
    - The objectives and principles of Directive 95/46/EC remain sound, but it has not prevented fragmentation in the implementation
      of data protection across the Union, legal uncertainty or a widespread public perception that there are significant
      risks to the protection of natural persons, in particular with regard to online activity. Differences in the level of
      protection of the rights and freedoms of natural persons, in particular the right to the protection of personal data,
      with regard to the processing of personal data in the Member States may prevent the free flow of personal data throughout
      the Union. Those differences may therefore constitute an obstacle to the pursuit of economic activities at the level
      of the Union, distort competition and impede authorities in the discharge of their responsibilities under Union law.
      Such a difference in levels of protection is due to the existence of differences in the implementation and application
      of Directive 95/46/EC.
