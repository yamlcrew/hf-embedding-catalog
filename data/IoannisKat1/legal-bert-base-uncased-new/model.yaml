- source_sentence: What type of data may be processed for purposes related to point (h) of paragraph 2?
  sentences:
  - '1.Processing of personal data revealing racial or ethnic origin, political opinions, religious or philosophical beliefs,
    or trade union membership, and the processing of genetic data, biometric data for the purpose of uniquely identifying
    a natural person, data concerning health or data concerning a natural person''s sex life or sexual orientation shall be
    prohibited.

    2.Paragraph 1 shall not apply if one of the following applies: (a)  the data subject has given explicit consent to the
    processing of those personal data for one or more specified purposes, except where Union or Member State law provide that
    the prohibition referred to in paragraph 1 may not be lifted by the data subject; (b)  processing is necessary for the
    purposes of carrying out the obligations and exercising specific rights of the controller or of the data subject in the
    field of employment and social security and social protection law in so far as it is authorised by Union or Member State
    law or a collective agreement pursuant to Member State law providing for appropriate safeguards for the fundamental rights
    and the interests of the data subject; (c)  processing is necessary to protect the vital interests of the data subject
    or of another natural person where the data subject is physically or legally incapable of giving consent; (d)  processing
    is carried out in the course of its legitimate activities with appropriate safeguards by a foundation, association or
    any other not-for-profit body with a political, philosophical, religious or trade union aim and on condition that the
    processing relates solely to the members or to former members of the body or to persons who have regular contact with
    it in connection with its purposes and that the personal data are not disclosed outside that body without the consent
    of the data subjects; (e)  processing relates to personal data which are manifestly made public by the data subject; (f)  processing
    is necessary for the establishment, exercise or defence of legal claims or whenever courts are acting in their judicial
    capacity; (g)  processing is necessary for reasons of substantial public interest, on the basis of Union or Member State
    law which shall be proportionate to the aim pursued, respect the essence of the right to data protection and provide for
    suitable and specific measures to safeguard the fundamental rights and the interests of the data subject; (h)  processing
    is necessary for the purposes of preventive or occupational medicine, for the assessment of the working capacity of the
    employee, medical diagnosis, the provision of health or social care or treatment or the management of health or social
    care systems and services on the basis of Union or Member State law or pursuant to contract with a health professional
    and subject to the conditions and safeguards referred to in paragraph 3; (i)  processing is necessary for reasons of public
    interest in the area of public health, such as protecting against serious cross-border threats to health or ensuring high
    standards of quality and safety of health care and of medicinal products or medical devices, on the basis of Union or
    Member State law which provides for suitable and specific measures to safeguard the rights and freedoms of the data subject,
    in particular professional secrecy; 4.5.2016 L 119/38   (j)  processing is necessary for archiving purposes in the public
    interest, scientific or historical research purposes or statistical purposes in accordance with Article 89(1) based on
    Union or Member State law which shall be proportionate to the aim pursued, respect the essence of the right to data protection
    and provide for suitable and specific measures to safeguard the fundamental rights and the interests of the data subject.

    3.Personal data referred to in paragraph 1 may be processed for the purposes referred to in point (h) of paragraph 2 when
    those data are processed by or under the responsibility of a professional subject to the obligation of professional secrecy
    under Union or Member State law or rules established by national competent bodies or by another person also subject to
    an obligation of secrecy under Union or Member State law or rules established by national competent bodies.

    4.Member States may maintain or introduce further conditions, including limitations, with regard to the processing of
    genetic data, biometric data or data concerning health.'
  - '1.The data protection officer shall have at least the following tasks: (a)  to inform and advise the controller or the
    processor and the employees who carry out processing of their obligations pursuant to this Regulation and to other Union
    or Member State data protection provisions; (b)  to monitor compliance with this Regulation, with other Union or Member
    State data protection provisions and with the policies of the controller or processor in relation to the protection of
    personal data, including the assignment of responsibilities, awareness-raising and training of staff involved in processing
    operations, and the related audits; (c)  to provide advice where requested as regards the data protection impact assessment
    and monitor its performance pursuant to Article 35; (d)  to cooperate with the supervisory authority; (e)  to act as the
    contact point for the supervisory authority on issues relating to processing, including the prior consultation referred
    to in Article 36, and to consult, where appropriate, with regard to any other matter.

    2.The data protection officer shall in the performance of his or her tasks have due regard to the risk associated with
    processing operations, taking into account the nature, scope, context and purposes of processing. Section 5 Codes of conduct
    and certification'
  - Processing should be lawful where it is necessary in the context of a contract or the intention to enter into a contract.
- source_sentence: What may impede authorities in the discharge of their responsibilities under Union law?
  sentences:
  - '1.The controller and the processor shall designate a data protection officer in any case where: (a)  the processing is
    carried out by a public authority or body, except for courts acting in their judicial capacity; (b)  the core activities
    of the controller or the processor consist of processing operations which, by virtue of their nature, their scope and/or
    their purposes, require regular and systematic monitoring of data subjects on a large scale; or (c)  the core activities
    of the controller or the processor consist of processing on a large scale of special categories of data pursuant to Article
    9 and personal data relating to criminal convictions and offences referred to in Article 10

    2.A group of undertakings may appoint a single data protection officer provided that a data protection officer is easily
    accessible from each establishment.

    3.Where the controller or the processor is a public authority or body, a single data protection officer may be designated
    for several such authorities or bodies, taking account of their organisational structure and size.

    4.In cases other than those referred to in paragraph 1, the controller or processor or associations and other bodies representing
    categories of controllers or processors may or, where required by Union or Member State law shall, designate a data protection
    officer. The data protection officer may act for such associations and other bodies representing controllers or processors.

    5.The data protection officer shall be designated on the basis of professional qualities and, in particular, expert knowledge
    of data protection law and practices and the ability to fulfil the tasks referred to in Article 39

    6.The data protection officer may be a staff member of the controller or processor, or fulfil the tasks on the basis of
    a service contract.

    7.The controller or the processor shall publish the contact details of the data protection officer and communicate them
    to the supervisory authority.'
  - This Regulation is without prejudice to international agreements concluded between the Union and third countries regulating
    the transfer of personal data including appropriate safeguards for the data subjects. Member States may conclude international
    agreements which involve the transfer of personal data to third countries or international organisations, as far as such
    agreements do not affect this Regulation or any other provisions of Union law and include an appropriate level of protection
    for the fundamental rights of the data subjects.
  - The objectives and principles of Directive 95/46/EC remain sound, but it has not prevented fragmentation in the implementation
    of data protection across the Union, legal uncertainty or a widespread public perception that there are significant risks
    to the protection of natural persons, in particular with regard to online activity. Differences in the level of protection
    of the rights and freedoms of natural persons, in particular the right to the protection of personal data, with regard
    to the processing of personal data in the Member States may prevent the free flow of personal data throughout the Union.
    Those differences may therefore constitute an obstacle to the pursuit of economic activities at the level of the Union,
    distort competition and impede authorities in the discharge of their responsibilities under Union law. Such a difference
    in levels of protection is due to the existence of differences in the implementation and application of Directive 95/46/EC.
