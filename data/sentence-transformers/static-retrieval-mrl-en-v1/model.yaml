    - When you experience a trigger, the insides of your airways swell even more. This narrows the space for air to move in
      and out of the lungs. The muscles that wrap around your airways also can tighten, making breathing even harder. When
      that happens, it's called an asthma flare-up, asthma episode or asthma "attack."
    - Lie (L) – The Lie scale is intended to identify individuals who are deliberately trying to avoid answering the MMPI
