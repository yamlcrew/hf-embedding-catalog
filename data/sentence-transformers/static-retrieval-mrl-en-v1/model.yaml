      found in most people.
  - source_sentence: 'Air Pollution in Eastern Asia: An Integrated Perspective: Chapter 14: Observation of Air Pollution over
      China Using the IASI Thermal Infrared Space Sensor'
    sentences:
    - In this chapter we describe what is achievable in terms of pollutant tracking from space using observations provided
      by thermal infrared remote sensors. After a general introduction on infrared remote sensing, we exploit the data provided
      by the Infrared Atmospheric Sounding Interferometer (IASI) missions onboard the Metop series of satellite to illustrate
      pollution detection at various spatial and temporal scales. Then, we focus on air pollution over China and discuss three
      case studies involving different pollutants. The first example discusses the geophysical conditions for detection of
      ammonia (NH3) and sulfur dioxide (SO2), both precursors of particulate matter (PM). The second case illustrates the
      seasonal variation of ozone (O3), in particular during the monsoon period. The third case shows the local accumulation
      of enhanced levels of carbon monoxide (CO) when pollution episodes occur.
    - This article explores the political aspects of Islamic parties in Jombang, East Java. The issue came about during the
      controversy arising out of the defection of the leader of the Tarekat Qadiriyah Wa Naqsyabandiyah, an Islamic order,
      prior to the 1977 general election. It raised questions as to the political orientation of Islamic groups in Indonesia
      during the 1970s and 1980s.
    - Abstract Unexpected findings on bone scintigraphy such as asymmetrical uptake in extremities may cause confusion for
      the diagnosis. The authors describe three cases of accidental intraarterial injection of Tc- 99m methylene diphosphonate
      ( 99m Tc-MDP) on the antecubital region and discuss the findings and differential diagnosis.
  - source_sentence: What type of stimuli do nociceptors response to?
    sentences:
    - 'After independence, Dutch was dropped as an official language and replaced by Malay. Yet the Indonesian language inherited
      many words from Dutch: words for everyday life as well as scientific and technological terms. One scholar argues that
      20% of Indonesian words can be traced back to Dutch words, many of which are transliterated to reflect phonetic pronunciation
      e.g. kantoor (Dutch for "office") in Indonesian is kantor, while bus ("bus") becomes bis. In addition, many Indonesian
      words are calques on Dutch, for example, rumah sakit (Indonesian for "hospital") is calqued on the Dutch ziekenhuis
      (literally "house of the sick"), kebun binatang ("zoo") on dierentuin (literally "animal garden"), undang-undang dasar
      ("constitution") from grondwet (literally "ground law"). These account for some of the differences in vocabulary between
      Indonesian and Malay.'
    - Wilhelm Erb's (1874) "intensive" theory, that a pain signal can be generated by intense enough stimulation of any sensory
      receptor, has been soundly disproved. Some sensory fibers do not differentiate between noxious and non-noxious stimuli,
      while others, nociceptors, respond only to noxious, high intensity stimuli. At the peripheral end of the nociceptor,
      noxious stimuli generate currents that, above a given threshold, begin to send signals along the nerve fiber to the
      spinal cord. The "specificity" (whether it responds to thermal, chemical or mechanical features of its environment)
      of a nociceptor is determined by which ion channels it expresses at its peripheral end. Dozens of different types of
      nociceptor ion channels have so far been identified, and their exact functions are still being determined.
    - The first attempt to establish a proper governing body and adopted the current set of Rugby rules was the Foot Ball
      Association of Canada, organized on March 24, 1873 followed by the Canadian Rugby Football Union (CRFU) founded June
      12, 1880, which included teams from Ontario and Quebec. Later both the Ontario and Quebec Rugby Football Union (ORFU
      and QRFU) were formed (January 1883), and then the Interprovincial (1907) and Western Interprovincial Football Union
      (1936) (IRFU and WIFU). The CRFU reorganized into an umbrella organization forming the Canadian Rugby Union (CRU) in
      1891. The original forerunners to the current Canadian Football League, was established in 1956 when the IRFU and WIFU
      formed an umbrella organization, The Canadian Football Council (CFC). And then in 1958 the CFC left The CRFU to become
      The CFL.
  - source_sentence: 'Gadofosveset-enhanced MR angiography of carotid arteries: does steady-state imaging improve accuracy
      of first-pass imaging?'
    sentences:
    - Prior studies have demonstrated improved clinical outcomes for surgeons with a high-volume experience with certain open
      vascular operations. A high-volume experience with carotid artery stenting (CAS) improves clinical outcomes. Moreover,
      it is not known whether experience with other endovascular procedures, including percutaneous coronary interventions
      (PCIs), is an adequate substitute for experience with CAS. The goal of this study was to quantify the effect of increasing
      clinician volume of CAS, endovascular aneurysm repair (EVAR), and thoracic endovascular aortic aneurysm repair (TEVAR),
      and PCI on the outcomes for CAS.
    - While sensitive to internal carotid artery (ICA) occlusion, carotid ultrasound can produce false-positive results. CT
      angiography (CTA) has a high specificity for ICA occlusion and is safer and cheaper than catheter angiography, although
      less accurate. We determined the cost-effectiveness of CTA versus catheter angiography for confirming an ICA occlusion
      first suggested by carotid ultrasound.
    - Brachial artery FMD and GMD and carotid intima media thickness (cIMT) were studied using ultrasound in 20 patients diagnosed
      with early RA in whom symptoms had been present for less than 12 months, and in 20 control subjects matched for age,
      sex and established cardiovascular risk factors. FMD and GMD were re-assessed after 12 months in RA patients and the
      change in each parameter was calculated. Data were analysed by univariate regression.
    - Compared with preoperative clinical and conventional MR data, (1)H MRS improved the accuracy of MR imaging from 60.9%
      to 83%. We found (1)H MRS reliably distinguished between abscess and high-grade tumour, and between high-grade glioma
      and low-grade glioma, but was not able to reliably distinguish between recurrent glioma and radiation necrosis. In 12/23
      cases (52%) the (1)H MRS findings positively altered our clinical management. Two representative cases are presented.
    - Different in-plane resolutions have been used for carotid 3T MRI. We compared the reproducibility, as well as the within-
      and between reader variability of high and routinely used spatial resolution in scans of patients with atherosclerotic
      carotid artery disease. Since no consensus exists about the optimal segmentation method, we analysed all imaging data
      using two different segmentation methods.
    - In the population-based Prospective Investigation of the Vasculature in Uppsala Seniors (PIVUS) study (1016 subjects
      all aged 70), the prevalence of overt plaques and echogenectity (grey scale median, GSM) of carotid artery plaques were
      recorded by ultrasound in both of the carotid arteries. The thickness (IMT) and echogenicity (IM-GSM) of the intima-media
      complex were also measured. Bisphenol A (BPA) and 10 phthalate metabolites were analyzed in serum by a API 4000 liquid
      chromatograph/tandem mass spectrometer.
    - In a longitudinal study we investigated in vivo alterations of CVO during neuroinflammation, applying Gadofluorine M-
      (Gf) enhanced magnetic resonance imaging (MRI) in experimental autoimmune encephalomyelitis, an animal model of multiple
      sclerosis. SJL/J mice were monitored by Gadopentate dimeglumine- (Gd-DTPA) and Gf-enhanced MRI after adoptive transfer
      of proteolipid-protein-specific T cells. Mean Gf intensity ratios were calculated individually for different CVO and
      correlated to the clinical disease course. Subsequently, the tissue distribution of fluorescence-labeled Gf as well
      as the extent of cellular inflammation was assessed in corresponding histological slices.
    - Development of an improved MR sequence for examining the lung.
    - Thirty-seven carotid artery disease patients participated in this study, of whom 24 underwent magnetic resonance imaging
      before and after CEA. Seventeen control subjects spanning 5 decades underwent magnetic resonance imaging to assess age-related
      changes. Hemodynamic metrics (that is, relative time to peak and amplitude) were calculated with a γ-variate model.
      Linear regression was used to relate carotid artery disease burden to downstream hemodynamics in the circle of Willis.
    - Carotid artery stenting (CAS) is associated with a higher risk of both hemodynamic depression and new ischemic brain
      lesions on diffusion-weighted imaging than carotid endarterectomy (CEA). We assessed whether the occurrence of hemodynamic
      depression is associated with these lesions in patients with symptomatic carotid stenosis treated by CAS or CEA in the
      randomized International Carotid Stenting Study (ICSS)-MRI substudy.
    - Magnetic resonance imaging (MRI) guidance may improve the accuracy of Gleason score (GS) determination by directing
      the biopsy to regions of interest (ROI) that are likely to harbor high-grade prostate cancer (CaP). The aim of this
      study was to determine the frequency and predictors of GS upgrading when a subsequent MRI-guided biopsy is performed
      on patients with a diagnosis of GS 6 disease on the basis of conventional, transrectal ultrasound-guided biopsy.
    - Measures of carotid-femoral pulse wave velocity (cf-PWV) and carotid augmentation index (cAI) may be affected by the
      presence of an abdominal aortic aneurysm (AAA). We, therefore, investigated series of various measures of arterial stiffness
      and wave reflections in patients with AAA, before and 4 weeks after endovascular aneurysm repair (EVAR).
    - High spatial resolution of dynamic contrast-enhanced (DCE) MR imaging allows characterization of heterogenous tumor
      microenvironment. Our purpose was to determine which is the best advanced MR imaging protocol, focused on additional
      MR perfusion method, for predicting recurrent metastatic brain tumor following gamma-knife radiosurgery (GKRS).
    - To determine whether acromegalic patients have increased thyroidal vascularity and blood flow on colour flow Doppler
      sonography (CFDS).
    - To investigate whether an existing method for correction of phase offset errors in phase-contrast velocity quantification
      is applicable for assessment of main pulmonary artery flow with an MR scanner equipped with a high-power gradient system.
    - Consecutive patients (n = 292) undergoing carotid endarterectomy for symptomatic and asymptomatic carotid stenosis were
      included in the study. Mortality and cardiovascular ischemic events were recorded during a median follow-up of 5.2 years.
      Baseline plasma concentrations of adiponectin were measured. Cox regression models stratified for gender were used for
      estimation of risk of events.
    - To evaluate the diagnostic accuracy of gadofosveset-enhanced magnetic resonance (MR) angiography in the assessment of
      carotid artery stenosis, with digital subtraction angiography (DSA) as the reference standard, and to determine the
      value of reading first-pass, steady-state, and "combined" (first-pass plus steady-state) MR angiograms.
    - Phase-contrast Cardiovascular Magnetic Resonance Imaging (CMR) generally requires the analysis of stationary tissue
      adjacent to a blood vessel to serve as a baseline reference for zero velocity. However, for the heart and great vessels,
      there is often no stationary tissue immediately adjacent to the vessel. Consequently, uncorrected velocity offsets may
      introduce substantial errors in flow quantification. The purpose of this study was to assess the magnitude of these
      flow errors and to validate a clinically applicable method for their correction.
    - This study was a post hoc analysis of a prospective cohort comprising 485 consecutive patients undergoing carotid endarterectomy
      for high-grade ICAS. Patients were classified by their clinical presentation, ie, asymptomatic (n = 213) or symptomatic
      (within 6 months of surgery; n = 272, comprising both transient ischemic attack [TIA; n = 163] and stroke [n = 109]).
      We investigated the association of cl-ICAS with the primary outcome in adjusted regression models.
    - Several studies reported on the moderate diagnostic yield of elective invasive coronary angiography (ICA) regarding
      the presence of coronary artery disease (CAD), but limited data are available on how prior testing for ischaemia may
      contribute to improve the diagnostic yield in an every-day clinical setting. This study aimed to assess the value and
      use of cardiac myocardial perfusion single photon emission computed tomography (MPS) in patient selection prior to elective
      ICA.
    - The feasibility of carotid stenting (CS) is no longer questionable, although its indications remain debatable. Until
      the results of randomized trials are available, personal series and registries should help in the comparison of long-term
      results of CS with those of endarterectomy. We report here the long-term results of a large series of CS in our department
      with a long follow-up. This retrospective study reviews a single surgeon's 11-year experience with CS. Our results are
      compared with those of conventional surgery emanating from our own series and the North American Symptomatic Carotid
      Endarterectomy Trial (NASCET), European Carotid Surgery Trial (ECST), and Asymptomatic Carotid Atherosclerosis Study
      (ACAS).
