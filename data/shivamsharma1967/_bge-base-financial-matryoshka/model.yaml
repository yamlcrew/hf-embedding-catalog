  - source_sentence: "Pension and postretirement health care and life insurance benefits earned during the year, as well as\
      \ interest on projected benefit obligations, \nare accrued.\nfor assets and liabilities. We record these translation\
      \ adjustments in Accumulated other comprehensive loss, a separate component of Equity, \nin our consolidated balance\
      \ sheets. We record exchange gains and losses resulting from the conversion of transaction currency to functional \n\
      currency as a component of Other income (expense), net. \nEmployee Benefit Plans \nPension and postretirement health\
      \ care and life insurance benefits earned during the year, as well as interest on projected benefit obligations, \n\
      are accrued. Prior service costs and credits resulting from changes in plan benefits are generally amortized over the\
      \ average remaining service \nperiod of the employees expected to receive benefits. Expected return on plan assets is\
      \ determined by applying the return on assets \nassumption to the actual fair value of plan assets. Actuarial gains\
      \ and losses are recognized in Other income (expense), net in the year in \nwhich they occur. These gains and losses\
      \ are measured annually as of December 31 or upon a remeasurement event. Verizon management \nemployees no longer earn\
      \ pension benefits or earn service towards the Company retiree medical subsidy. See Note 11 for additional \ninformation.\
      \ \nWe recognize a pension or a postretirement plans funded status as either an asset or liability in the consolidated\
      \ balance sheets. Also, we \nmeasure any unrecognized prior service costs and credits that arise during the period as\
      \ a component of Accumulated other comprehensive \nincome, net of applicable income tax. \nDerivative Instruments \n\
      We enter into derivative transactions primarily to manage our exposure to fluctuations in foreign currency exchange\
      \ rates and interest rates. \nWe employ risk management strategies, which may include the use of a variety of derivatives\
      \ including cross currency swaps, forward \nstarting interest rate swaps, interest rate swaps, treasury rate locks,\
      \ interest rate caps and foreign exchange forwards. We do not hold \nderivatives for trading purposes. \nWe measure\
      \ all derivatives at fair value and recognize them as either assets or liabilities in our consolidated balance sheets.\
      \ Our derivative \ninstruments are valued primarily using models based on readily observable market parameters for all\
      \ substantial terms of our derivative \ncontracts and thus are classified as Level 2. Changes in the fair values of\
      \ derivative instruments applied as economic hedges are recognized in \nearnings in the current period. For fair value\
      \ hedges, the change in the fair value of the derivative instruments is recognized in earnings, along \nwith the change\
      \ in the fair value of the hedged item. For cash flow hedges, the change in the fair value of the derivative instruments\
      \ is \nreported in Other comprehensive income (loss) and recognized in earnings when the hedged item is recognized in\
      \ earnings. For net \ninvestment hedges of certain of our foreign operations, the change in the fair value of the hedging\
      \ instruments is reported in Other \ncomprehensive income (loss) as part of the cumulative translation adjustment and\
      \ partially offsets the impact of foreign currency changes on \nthe value of our net investment. \nCash flows from derivatives,\
      \ which are designated as accounting hedges or applied as economic hedges, are presented consistently with the \ncash\
      \ flow classification of the related hedged items. See Note 9 for additional information. \nVariable Interest Entities\
      \ \nVIEs are entities that lack sufficient equity to permit the entity to finance its activities without additional\
      \ subordinated financial support from \nother parties, have equity investors that do not have the ability to make significant\
      \ decisions relating to the entitys operations through voting \nrights, do not have the obligation to absorb the expected\
      \ losses, or do not have the right to receive the residual returns of the entity. We \nconsolidate the assets and liabilities\
      \ of VIEs when we are deemed to be the primary beneficiary. The primary beneficiary is the party that has \nthe power\
      \ to make the decisions that most significantly affect the economic performance of the VIE and has the obligation to\
      \ absorb losses or \nthe right to receive benefits that could potentially be significant to the VIE.\n63\nVerizon 2021\
      \ Annual Report on Form 10-K\n\nEstimated Future Benefit Payments \nThe benefit payments to retirees are expected to\
      \ be paid as follows: \n(dollars in millions) \nYear\nPension Benefits \nHealth Care and Life \n2022\n$ \n2,049 \n$\
      \ \n906 \n2023\n1,648 \n883 \n2024\n1,097 \n862 \n2025\n1,066 \n850 \n2026\n1,034 \n840 \n2027 to 2031\n5,097 \n4,139\n\
      fair value is measured using the NAV per share as a practical expedient are not leveled within the fair value hierarchy\
      \ but are included in total \ninvestments. \nEmployer Contributions \nIn 2021, we made no discretionary contribution\
      \ to our qualified pension plans, $58 million of contributions to our nonqualified pension plans \nand $885 million\
      \ of contributions to our other postretirement benefit plans. No qualified pension plans contributions are expected\
      \ to be made \nin 2022. Nonqualified pension plans contributions are estimated to be approximately $60 million and contributions\
      \ to our other postretirement \nbenefit plans are estimated to be approximately $860 million in 2022. \nEstimated Future\
      \ Benefit Payments \nThe benefit payments to retirees are expected to be paid as follows: \n(dollars in millions) \n\
      Year\nPension Benefits \nHealth Care and Life \n2022\n$ \n2,049 \n$ \n906 \n2023\n1,648 \n883 \n2024\n1,097 \n862 \n\
      2025\n1,066 \n850 \n2026\n1,034 \n840 \n2027 to 2031\n5,097 \n4,139 \nSavings Plan and Employee Stock Ownership Plans\
      \ \nWe maintain four leveraged employee stock ownership plans (ESOP). We match a certain percentage of eligible employee\
      \ contributions to \ncertain savings plans with shares of our common stock from this ESOP. At December 31, 2021, the\
      \ number of allocated shares of common \nstock in this ESOP was 44 million. There were no unallocated shares of common\
      \ stock in this ESOP at December 31, 2021. All leveraged \nESOP shares are included in earnings per share computations.\
      \ \nTotal savings plan costs were $690 million in 2021, $730 million in 2020 and $897 million in 2019. \nSeverance Benefits\
      \ \nThe following table provides an analysis of our severance liability: \n(dollars in millions) \nYear \nBeginning\
      \ of \nYear \nCharged to \nExpense\nPayments\nOther\nEnd of Year \n2019\n$ \n2,156 \n$ \n260 \n$ \n(1,847) $ \n(4) $\n\
      565 \n2020\n565 \n309 \n(248)\n(24)\n602 \n2021\n602 \n233 \n(258)\n(29)\n548 \nSeverance, Pension and Benefits (Credits)\
      \ Charges \nDuring 2021, in accordance with our accounting policy to recognize actuarial gains and losses in the period\
      \ in which they occur, we recorded \nnet pre-tax pension and benefits credits of $2.4 billion in our pension and postretirement\
      \ benefit plans. The credits were recorded in Other \nincome (expense), net in our consolidated statement of income\
      \ and were primarily driven by a credit of $1.1 billion due to an increase in our \ndiscount rate assumption used to\
      \ determine the current year liabilities of our pension plans and postretirement benefit plans from a weighted-\naverage\
      \ of 2.6% at December 31, 2020 to a weighted-average of 2.9% at December 31, 2021, a credit of $847 million due to the\
      \ difference \nbetween our estimated and our actual return on assets and a credit of $453 million due to other actuarial\
      \ assumption adjustments. During \n2021, we also recorded net pre-tax severance charges of $233 million in Selling,\
      \ general and administrative expense in our consolidated \nstatements of income. \nDuring 2020, we recorded net pre-tax\
      \ pension and benefits charges of $1.6 billion in our pension and postretirement benefit plans. The \ncharges were recorded\
      \ in Other income (expense), net in our consolidated statement of income and were primarily driven by a charge of \n\
      $3.2 billion due to a decrease in our discount rate assumption used to determine the current year liabilities of our\
      \ pension plans and \npostretirement benefit plans from a weighted-average of 3.3% at December 31, 2019 to a weighted-average\
      \ of 2.6% at December 31, 2020, \npartially offset by a credit of $1.6 billion due to the difference between our estimated\
      \ and our actual return on assets. During 2020, we also \nrecorded net pre-tax severance charges of $309 million in\
      \ Selling, general and administrative expense in our consolidated statements of \nincome. \nDuring 2019, we recorded\
      \ net pre-tax pension and benefits charges of $126 million in our pension and postretirement benefit plans. The \ncharges\
      \ were recorded in Other income (expense), net in our consolidated statement of income and were primarily driven by\
