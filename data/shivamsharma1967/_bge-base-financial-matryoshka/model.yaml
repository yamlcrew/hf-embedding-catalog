- source_sentence: "Pension and postretirement health care and life insurance benefits earned during the year, as well as\
    \ interest on projected benefit obligations, \nare accrued.\nfor assets and liabilities. We record these translation adjustments\
    \ in Accumulated other comprehensive loss, a separate component of Equity, \nin our consolidated balance sheets. We record\
    \ exchange gains and losses resulting from the conversion of transaction currency to functional \ncurrency as a component\
    \ of Other income (expense), net. \nEmployee Benefit Plans \nPension and postretirement health care and life insurance\
    \ benefits earned during the year, as well as interest on projected benefit obligations, \nare accrued. Prior service\
    \ costs and credits resulting from changes in plan benefits are generally amortized over the average remaining service\
    \ \nperiod of the employees expected to receive benefits. Expected return on plan assets is determined by applying the\
    \ return on assets \nassumption to the actual fair value of plan assets. Actuarial gains and losses are recognized in\
    \ Other income (expense), net in the year in \nwhich they occur. These gains and losses are measured annually as of December\
    \ 31 or upon a remeasurement event. Verizon management \nemployees no longer earn pension benefits or earn service towards\
    \ the Company retiree medical subsidy. See Note 11 for additional \ninformation. \nWe recognize a pension or a postretirement\
    \ plans funded status as either an asset or liability in the consolidated balance sheets. Also, we \nmeasure any unrecognized\
    \ prior service costs and credits that arise during the period as a component of Accumulated other comprehensive \nincome,\
    \ net of applicable income tax. \nDerivative Instruments \nWe enter into derivative transactions primarily to manage our\
    \ exposure to fluctuations in foreign currency exchange rates and interest rates. \nWe employ risk management strategies,\
    \ which may include the use of a variety of derivatives including cross currency swaps, forward \nstarting interest rate\
    \ swaps, interest rate swaps, treasury rate locks, interest rate caps and foreign exchange forwards. We do not hold \n\
    derivatives for trading purposes. \nWe measure all derivatives at fair value and recognize them as either assets or liabilities\
    \ in our consolidated balance sheets. Our derivative \ninstruments are valued primarily using models based on readily\
    \ observable market parameters for all substantial terms of our derivative \ncontracts and thus are classified as Level\
    \ 2. Changes in the fair values of derivative instruments applied as economic hedges are recognized in \nearnings in the\
    \ current period. For fair value hedges, the change in the fair value of the derivative instruments is recognized in earnings,\
    \ along \nwith the change in the fair value of the hedged item. For cash flow hedges, the change in the fair value of\
    \ the derivative instruments is \nreported in Other comprehensive income (loss) and recognized in earnings when the hedged\
    \ item is recognized in earnings. For net \ninvestment hedges of certain of our foreign operations, the change in the\
    \ fair value of the hedging instruments is reported in Other \ncomprehensive income (loss) as part of the cumulative translation\
    \ adjustment and partially offsets the impact of foreign currency changes on \nthe value of our net investment. \nCash\
    \ flows from derivatives, which are designated as accounting hedges or applied as economic hedges, are presented consistently\
    \ with the \ncash flow classification of the related hedged items. See Note 9 for additional information. \nVariable Interest\
    \ Entities \nVIEs are entities that lack sufficient equity to permit the entity to finance its activities without additional\
    \ subordinated financial support from \nother parties, have equity investors that do not have the ability to make significant\
    \ decisions relating to the entitys operations through voting \nrights, do not have the obligation to absorb the expected\
    \ losses, or do not have the right to receive the residual returns of the entity. We \nconsolidate the assets and liabilities\
    \ of VIEs when we are deemed to be the primary beneficiary. The primary beneficiary is the party that has \nthe power\
    \ to make the decisions that most significantly affect the economic performance of the VIE and has the obligation to absorb\
    \ losses or \nthe right to receive benefits that could potentially be significant to the VIE.\n63\nVerizon 2021 Annual\
    \ Report on Form 10-K\n\nEstimated Future Benefit Payments \nThe benefit payments to retirees are expected to be paid\
    \ as follows: \n(dollars in millions) \nYear\nPension Benefits \nHealth Care and Life \n2022\n$ \n2,049 \n$ \n906 \n2023\n\
    1,648 \n883 \n2024\n1,097 \n862 \n2025\n1,066 \n850 \n2026\n1,034 \n840 \n2027 to 2031\n5,097 \n4,139\nfair value is measured\
    \ using the NAV per share as a practical expedient are not leveled within the fair value hierarchy but are included in\
    \ total \ninvestments. \nEmployer Contributions \nIn 2021, we made no discretionary contribution to our qualified pension\
    \ plans, $58 million of contributions to our nonqualified pension plans \nand $885 million of contributions to our other\
    \ postretirement benefit plans. No qualified pension plans contributions are expected to be made \nin 2022. Nonqualified\
    \ pension plans contributions are estimated to be approximately $60 million and contributions to our other postretirement\
    \ \nbenefit plans are estimated to be approximately $860 million in 2022. \nEstimated Future Benefit Payments \nThe benefit\
    \ payments to retirees are expected to be paid as follows: \n(dollars in millions) \nYear\nPension Benefits \nHealth Care\
    \ and Life \n2022\n$ \n2,049 \n$ \n906 \n2023\n1,648 \n883 \n2024\n1,097 \n862 \n2025\n1,066 \n850 \n2026\n1,034 \n840\
    \ \n2027 to 2031\n5,097 \n4,139 \nSavings Plan and Employee Stock Ownership Plans \nWe maintain four leveraged employee\
    \ stock ownership plans (ESOP). We match a certain percentage of eligible employee contributions to \ncertain savings\
    \ plans with shares of our common stock from this ESOP. At December 31, 2021, the number of allocated shares of common\
    \ \nstock in this ESOP was 44 million. There were no unallocated shares of common stock in this ESOP at December 31, 2021.\
    \ All leveraged \nESOP shares are included in earnings per share computations. \nTotal savings plan costs were $690 million\
