  - source_sentence: "Forward-Looking Statements\nThis Annual Report on Form 10-K contains statements reflecting our views\
      \ about our future performance that constitute\nforward-looking statements within the meaning of the Private Securities\
      \ Litigation Reform Act of 1995 (Reform Act).\nStatements that constitute forward-looking statements within the meaning\
      \ of the Reform Act are generally identified through the\ninclusion of words such as aim, anticipate, believe, drive,\
      \ estimate, expect, expressed confidence, forecast,\nfuture, goal, guidance, intend, may, objective, outlook, plan,\
      \ position, potential, project, seek,\nshould, strategy, target, will or similar statements or variations of such words\
      \ and other similar expressions. All\nstatements addressing our future operating performance, and statements addressing\
      \ events and developments that we expect or\nanticipate will occur in the future, are forward-looking statements within\
      \ the meaning of the Reform Act. These forward-looking\nstatements are based on currently available information, operating\
      \ plans and projections about future events and trends. They\ninherently involve risks and uncertainties that could\
      \ cause actual results to differ materially from those predicted in any such\nforward-looking statement. These risks\
      \ and uncertainties include, but are not limited to, those described in Item 1A. Risk\nFactors and Item 7. Managements\
      \ Discussion and Analysis of Financial Condition and Results of Operations Our Business\n Our Business Risks. Investors\
      \ are cautioned not to place undue reliance on any such forward-looking statements, which speak\nonly as of the date\
      \ they are made. We undertake no obligation to update any forward-looking statement, whether as a result of\nnew information,\
      \ future events or otherwise. The discussion of risks in this report is by no means all-inclusive but is designed to\n\
      highlight what we believe are important factors to consider when evaluating our future performance.\nPART I\nItem 1.\
      \ Business.\nWhen used in this report, the terms we, us, our, PepsiCo and the Company mean PepsiCo, Inc. and its consolidated\n\
      subsidiaries, collectively. Certain terms used in this Annual Report on Form 10-K are defined in the Glossary included\
      \ in Item 7.\nof this report.\nCompany Overview\nWe were incorporated in Delaware in 1919 and reincorporated in North\
      \ Carolina in 1986. We are a leading global beverage and\nconvenient food company with a complementary portfolio of\
      \ brands, including Lays, Doritos, Cheetos, Gatorade, Pepsi-Cola,\nMountain Dew, Quaker and SodaStream. Through our\
      \ operations, authorized bottlers, contract manufacturers and other third\nparties, we make, market, distribute and\
      \ sell a wide variety of beverages and convenient foods, serving customers and consumers\nin more than 200 countries\
      \ and territories.\nOur Operations\nWe are organized into seven reportable segments (also referred to as divisions),\
      \ as follows:\n1) Frito-Lay North America (FLNA), which includes our branded convenient food businesses in the United\
      \ States and\nCanada;\n2) Quaker Foods North America (QFNA), which includes our branded convenient food businesses,\
      \ such as cereal, rice, pasta\nand other branded food, in the United States and Canada;\n3) PepsiCo Beverages North\
      \ America (PBNA), which includes our beverage businesses in the United States and Canada;\n4) Latin America (LatAm),\
      \ which includes all of our beverage and convenient food businesses in Latin America;\n5) Europe, which includes all\
      \ of our beverage and convenient food businesses in Europe;\nTable of Contents\nForward-Looking Statements\nThis Annual\
      \ Report on Form 10-K contains statements reflecting our views about our future performance that constitute\nforward-looking\
      \ statements within the meaning of the Private Securities Litigation Reform Act of 1995 (Reform Act).\nStatements that\
      \ constitute forward-looking statements within the meaning of the Reform Act are generally identified through the\n\
      inclusion of words such as aim, anticipate, believe, drive, estimate, expect, expressed confidence, forecast,\nfuture,\
      \ goal, guidance, intend, may, objective, outlook, plan, position, potential, project, seek,\nshould, strategy, target,\
      \ will or similar statements or variations of such words and other similar expressions. All\nstatements addressing our\
      \ future operating performance, and statements addressing events and developments that we expect or\nanticipate will\
      \ occur in the future, are forward-looking statements within the meaning of the Reform Act. These forward-looking\n\
      statements are based on currently available information, operating plans and projections about future events and trends.\
      \ They\ninherently involve risks and uncertainties that could cause actual results to differ materially from those predicted\
      \ in any such\nforward-looking statement. These risks and uncertainties include, but are not limited to, those described\
      \ in Item 1A. Risk\nFactors and Item 7. Managements Discussion and Analysis of Financial Condition and Results of Operations\
      \ Our Business\n Our Business Risks. Investors are cautioned not to place undue reliance on any such forward-looking\
      \ statements, which speak\nonly as of the date they are made. We undertake no obligation to update any forward-looking\
      \ statement, whether as a result of\nnew information, future events or otherwise. The discussion of risks in this report\
      \ is by no means all-inclusive but is designed to\nhighlight what we believe are important factors to consider when\
      \ evaluating our future performance.\nPART I\nItem 1. Business.\nWhen used in this report, the terms we, us, our, PepsiCo\
      \ and the Company mean PepsiCo, Inc. and its consolidated\nsubsidiaries, collectively. Certain terms used in this Annual\
      \ Report on Form 10-K are defined in the Glossary included in Item 7.\nof this report.\nCompany Overview\nWe were incorporated\
      \ in Delaware in 1919 and reincorporated in North Carolina in 1986. We are a leading global beverage and\nconvenient\
      \ food company with a complementary portfolio of brands, including Lays, Doritos, Cheetos, Gatorade, Pepsi-Cola,\nMountain\
      \ Dew, Quaker and SodaStream. Through our operations, authorized bottlers, contract manufacturers and other third\n\
      parties, we make, market, distribute and sell a wide variety of beverages and convenient foods, serving customers and\
      \ consumers\nin more than 200 countries and territories.\nOur Operations\nWe are organized into seven reportable segments\
      \ (also referred to as divisions), as follows:\n1) Frito-Lay North America (FLNA), which includes our branded convenient\
      \ food businesses in the United States and\nCanada;\n2) Quaker Foods North America (QFNA), which includes our branded\
      \ convenient food businesses, such as cereal, rice, pasta\nand other branded food, in the United States and Canada;\n\
      3) PepsiCo Beverages North America (PBNA), which includes our beverage businesses in the United States and Canada;\n\
      4) Latin America (LatAm), which includes all of our beverage and convenient food businesses in Latin America;\n5) Europe,\
      \ which includes all of our beverage and convenient food businesses in Europe;\n2\n\n6) Africa, Middle East and South\
      \ Asia (AMESA), which includes all of our beverage and convenient food businesses in\nAfrica, the Middle East and South\
      \ Asia; and\n7) Asia Pacific, Australia and New Zealand and China Region (APAC), which includes all of our beverage\
      \ and convenient\nfood businesses in Asia Pacific, Australia and New Zealand, and China region.\nTable of Contents\n\
      6) Africa, Middle East and South Asia (AMESA), which includes all of our beverage and convenient food businesses in\n\
      Africa, the Middle East and South Asia; and\n7) Asia Pacific, Australia and New Zealand and China Region (APAC), which\
      \ includes all of our beverage and convenient\nfood businesses in Asia Pacific, Australia and New Zealand, and China\
      \ region.\nFrito-Lay North America\nEither independently or in conjunction with third parties, FLNA makes, markets,\
      \ distributes and sells branded convenient\nfoods. These foods include branded dips, Cheetos cheese-flavored snacks,\
      \ Doritos tortilla chips, Fritos corn chips, Lays potato\nchips, Ruffles potato chips and Tostitos tortilla chips. FLNAs\
      \ branded products are sold to independent distributors and retailers.\nIn addition, FLNAs joint venture with Strauss\
      \ Group makes, markets, distributes and sells Sabra refrigerated dips and spreads.\nQuaker Foods North America\nEither\
      \ independently or in conjunction with third parties, QFNA makes, markets, distributes and sells branded convenient\
      \ foods,\nwhich include cereals, rice, pasta and other branded products. QFNAs products include Capn Crunch cereal,\
      \ Life cereal, Pearl\nMilling Company syrups and mixes, Quaker Chewy granola bars, Quaker grits, Quaker oatmeal, Quaker\
      \ rice cakes, Quaker\nSimply Granola and Rice-A-Roni side dishes. QFNAs branded products are sold to independent distributors\
      \ and retailers.\nPepsiCo Beverages North America\nEither independently or in conjunction with third parties, PBNA makes,\
      \ markets and sells beverage concentrates, fountain syrups\nand finished goods under various beverage brands including\
      \ Aquafina, Diet Mountain Dew, Diet Pepsi, Gatorade, Gatorade Zero,\nMountain Dew, Pepsi and Propel. PBNA operates its\
      \ own bottling plants and distribution facilities and sells branded finished\ngoods directly to independent distributors\
      \ and retailers. PBNA also sells concentrate and finished goods for our brands to\nauthorized and independent bottlers,\
      \ who in turn sell our branded finished goods to independent distributors and retailers in\ncertain markets. PBNA also,\
      \ either independently or in conjunction with third parties, makes, markets, distributes and sells ready-\nto-drink\
      \ tea and coffee products through joint ventures with Unilever (under the Lipton brand name) and Starbucks, respectively.\n\
      Further, PBNA manufactures and distributes certain brands licensed from Keurig Dr Pepper Inc., including Crush, Dr Pepper\
      \ and\nSchweppes, and certain juice brands licensed from Dole Food Company, Inc. and Ocean Spray Cranberries, Inc. In\
      \ 2022, PBNA\nbegan to distribute Hard MTN Dew, an alcoholic beverage manufactured and owned by the Boston Beer Company.\
      \ In the first\nquarter of 2022, we sold our Tropicana, Naked and other select juice brands to PAI Partners, while retaining\
      \ a 39%\nnoncontrolling interest in a newly formed joint venture, Tropicana Brands Group (TBG), operating across North\
      \ America and\nEurope (Juice Transaction). In the United States, PepsiCo acts as the exclusive distributor for TBGs\
      \ portfolio of brands for\nsmall-format and foodservice customers with chilled direct-store-delivery (DSD). See Note\
      \ 13 to our consolidated financial\nstatements for further information.\nLatin America\nEither independently or in conjunction\
      \ with third parties, LatAm makes, markets, distributes and sells a number of convenient\nfood brands including Cheetos,\
      \ Doritos, Emperador, Lays, Marias Gamesa, Ruffles, Sabritas, Saladitas and Tostitos, as well as\nmany Quaker-branded\
      \ convenient foods. LatAm also, either independently or in conjunction with third parties, makes, markets,\ndistributes\
      \ and sells beverage concentrates, fountain syrups and finished goods under various beverage brands including 7UP,\n\
      Diet 7UP, Gatorade, H2oh!, Manzanita Sol, Mirinda, Pepsi, Pepsi Black, San Carlos and Toddy. These branded products\
      \ are sold\nto authorized and independent bottlers, independent distributors and retailers. LatAm\n3"
