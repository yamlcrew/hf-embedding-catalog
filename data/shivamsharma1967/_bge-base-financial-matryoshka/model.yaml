    \ of 3.3% at December 31, 2019 to a weighted-average of 2.6% at December 31, 2020, \npartially offset by a credit of $1.6\
    \ billion due to the difference between our estimated and our actual return on assets. During 2020, we also \nrecorded\
    \ net pre-tax severance charges of $309 million in Selling, general and administrative expense in our consolidated statements\
    \ of \nincome. \nDuring 2019, we recorded net pre-tax pension and benefits charges of $126 million in our pension and\
