    \ pension and benefits credits of $2.4 billion in our pension and postretirement benefit plans. The credits were recorded\
    \ in Other \nincome (expense), net in our consolidated statement of income and were primarily driven by a credit of $1.1\
    \ billion due to an increase in our \ndiscount rate assumption used to determine the current year liabilities of our pension\
    \ plans and postretirement benefit plans from a weighted-\naverage of 2.6% at December 31, 2020 to a weighted-average\
    \ of 2.9% at December 31, 2021, a credit of $847 million due to the difference \nbetween our estimated and our actual\
    \ return on assets and a credit of $453 million due to other actuarial assumption adjustments. During \n2021, we also\
