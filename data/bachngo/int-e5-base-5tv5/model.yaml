  - source_sentence: Người nộp thuế có trách nhiệm gì trong việc ghi chép chính xác, trung thực và đầy đủ các hoạt động phát
      sinh nghĩa vụ thuế, khấu trừ thuế và giao dịch phải kê khai thông tin về thuế?
    sentences:
    - "Điều 73. Phân loại hồ sơ hoàn thuế 1. Hồ sơ hoàn thuế được phân loại thành hồ sơ thuộc diện kiểm tra trước hoàn thuế\
      \ và hồ sơ thuộc diện hoàn thuế trước. \n2. Hồ sơ thuộc diện kiểm tra trước hoàn thuế bao gồm: a) Hồ sơ của người nộp\
      \ thuế đề nghị hoàn thuế lần đầu của từng trường hợp hoàn thuế theo quy định của pháp luật về thuế. Trường hợp người\
      \ nộp thuế có hồ sơ hoàn thuế gửi cơ quan quản lý thuế lần đầu nhưng không thuộc diện được hoàn thuế theo quy định thì\
      \ lần đề nghị hoàn thuế kế tiếp vẫn xác định là đề nghị hoàn thuế lần đầu; b) Hồ sơ của người nộp thuế đề nghị hoàn\
      \ thuế trong thời hạn 02 năm kể từ thời điểm bị xử lý về hành vi trốn thuế; c) Hồ sơ của tổ chức giải thể, phá sản,\
      \ chấm dứt hoạt động, bán, giao và chuyển giao doanh nghiệp nhà nước; d) Hồ sơ hoàn thuế thuộc loại rủi ro về thuế cao\
      \ theo phân loại quản lý rủi ro trong quản lý thuế; đ) Hồ sơ hoàn thuế thuộc trường hợp hoàn thuế trước nhưng hết thời\
      \ hạn theo thông báo bằng văn bản của cơ quan quản lý thuế mà người nộp thuế không giải trình, bổ sung hồ sơ hoàn thuế\
      \ hoặc có giải trình, bổ sung hồ sơ hoàn thuế nhưng không chứng minh được số tiền thuế đã khai là đúng; e) Hồ sơ hoàn\
      \ thuế đối với hàng hóa xuất khẩu, nhập khẩu không thực hiện thanh toán qua ngân hàng thương mại, tổ chức tín dụng khác\
      \ theo quy định của pháp luật; g) Hồ sơ hoàn thuế đối với hàng hóa xuất khẩu, nhập khẩu thuộc diện phải kiểm tra trước\
      \ hoàn thuế theo quy định của Chính phủ. 3. Hồ sơ thuộc diện hoàn thuế trước là hồ sơ của người nộp thuế không thuộc\
      \ trường hợp quy định tại khoản 2 Điều này. 4. Bộ trưởng Bộ Tài chính quy định chi tiết Điều này."
    - "Điều 17. Trách nhiệm của người nộp thuế 1. Thực hiện đăng ký thuế, sử dụng mã số thuế theo quy định của pháp luật.\
      \ 2. Khai thuế chính xác, trung thực, đầy đủ và nộp hồ sơ thuế đúng thời hạn; chịu trách nhiệm trước pháp luật về tính\
      \ chính xác, trung thực, đầy đủ của hồ sơ thuế. 3. Nộp tiền thuế, tiền chậm nộp, tiền phạt đầy đủ, đúng thời hạn, đúng\
      \ địa điểm. 4. Chấp hành chế độ kế toán, thống kê và quản lý, sử dụng hóa đơn, chứng từ theo quy định của pháp luật.\
      \ \n5. Ghi chép chính xác, trung thực, đầy đủ những hoạt động phát sinh nghĩa vụ thuế, khấu trừ thuế và giao dịch phải\
      \ kê khai thông tin về thuế. 6. Lập và giao hóa đơn, chứng từ cho người mua theo đúng số lượng, chủng loại, giá trị\
      \ thực thanh toán khi bán hàng hóa, cung cấp dịch vụ theo quy định của pháp luật. 7. Cung cấp chính xác, đầy đủ, kịp\
      \ thời thông tin, tài liệu liên quan đến việc xác định nghĩa vụ thuế, bao gồm cả thông tin về giá trị đầu tư; số hiệu\
      \ và nội dung giao dịch của tài khoản được mở tại ngân hàng thương mại, tổ chức tín dụng khác; giải thích việc tính\
      \ thuế, khai thuế, nộp thuế theo yêu cầu của cơ quan quản lý thuế. 8. Chấp hành quyết định, thông báo, yêu cầu của cơ\
      \ quan quản lý thuế, công chức quản lý thuế theo quy định của pháp luật. 9. Chịu trách nhiệm thực hiện nghĩa vụ thuế\
      \ theo quy định của pháp luật trong trường hợp người đại diện theo pháp luật hoặc đại diện theo ủy quyền thay mặt người\
      \ nộp thuế thực hiện thủ tục về thuế sai quy định. 10. Người nộp thuế thực hiện hoạt động kinh doanh tại địa bàn có\
      \ cơ sở hạ tầng về công nghệ thông tin phải thực hiện kê khai, nộp thuế, giao dịch với cơ quan quản lý thuế thông qua\
      \ phương tiện điện tử theo quy định của pháp luật. 11. Căn cứ tình hình thực tế và điều kiện trang bị công nghệ thông\
      \ tin, Chính phủ quy định chi tiết việc người nộp thuế không phải nộp các chứng từ trong hồ sơ khai, nộp thuế, hồ sơ\
      \ hoàn thuế và các hồ sơ thuế khác mà cơ quan quản lý nhà nước đã có. 12."
    - "Điều 52. Ấn định thuế đối với hàng hóa xuất khẩu, nhập khẩu \n1. Cơ quan hải quan ấn định thuế đối với hàng hóa xuất\
      \ khẩu, nhập khẩu trong các trường hợp sau đây: a) Người khai thuế dựa vào các tài liệu không hợp pháp để khai thuế,\
      \ tính thuế; không khai thuế hoặc kê khai không chính xác, đầy đủ nội dung liên quan đến xác định nghĩa vụ thuế; b)\
      \ Quá thời hạn quy định mà người khai thuế không cung cấp, từ chối hoặc trì hoãn, kéo dài việc cung cấp hồ sơ, sổ kế\
      \ toán, tài liệu, chứng từ, dữ liệu, số liệu liên quan đến việc xác định chính xác số tiền thuế phải nộp theo quy định;\
      \ c) Người khai thuế không chứng minh, giải trình hoặc quá thời hạn quy định mà không giải trình được các nội dung liên\
      \ quan đến việc xác định nghĩa vụ thuế theo quy định của pháp luật; không chấp hành quyết định kiểm tra, thanh tra của\
      \ cơ quan hải quan; d) Người khai thuế không phản ánh hoặc phản ánh không đầy đủ, trung thực, chính xác số liệu trên\
      \ sổ kế toán để xác định nghĩa vụ thuế; đ) Cơ quan hải quan có đủ bằng chứng, căn cứ xác định về việc khai báo trị giá\
      \ không đúng với trị giá giao dịch thực tế; e) Giao dịch được thực hiện không đúng với bản chất kinh tế, không đúng\
      \ thực tế phát sinh, ảnh hưởng đến số tiền thuế phải nộp; g) Người khai thuế không tự tính được số tiền thuế phải nộp;\
      \ h) Trường hợp khác do cơ quan hải quan hoặc cơ quan khác phát hiện việc kê khai, tính thuế không đúng với quy định\
      \ của pháp luật. 2. Cơ quan hải quan căn cứ hàng hóa thực tế xuất khẩu, nhập khẩu; căn cứ tính thuế, phương pháp tính\
      \ thuế; cơ sở dữ liệu của cơ quan quản lý thuế và cơ sở dữ liệu thương mại; hồ sơ khai báo hải quan; tài liệu và các\
      \ thông tin khác có liên quan đến hàng hóa xuất khẩu, nhập khẩu để ấn định số tiền thuế phải nộp. 3. Chính phủ quy định\
      \ chi tiết Điều này."
  - source_sentence: Người bán có thể đăng ký sử dụng hóa đơn điện tử được khởi tạo từ máy tính tiền có kết nối chuyển dữ
      liệu điện tử với cơ quan thuế trong trường hợp nào?
    sentences:
    - Điều 90. Nguyên tắc lập, quản lý, sử dụng hóa đơn điện tử 1. Khi bán hàng hóa, cung cấp dịch vụ, người bán phải lập
      hóa đơn điện tử để giao cho người mua theo định dạng chuẩn dữ liệu và phải ghi đầy đủ nội dung theo quy định của pháp
      luật về thuế, pháp luật về kế toán, không phân biệt giá trị từng lần bán hàng hóa, cung cấp dịch vụ. 2. Trường hợp người
      bán có sử dụng máy tính tiền thì người bán đăng ký sử dụng hóa đơn điện tử được khởi tạo từ máy tính tiền có kết nối
      chuyển dữ liệu điện tử với cơ quan thuế. 3. Việc đăng ký, quản lý, sử dụng hóa đơn điện tử trong giao dịch bán hàng
      hóa, cung cấp dịch vụ phải tuân thủ quy định của pháp luật về giao dịch điện tử, pháp luật về kế toán, pháp luật về
      thuế. 4. Việc cấp mã của cơ quan thuế trên hóa đơn điện tử dựa trên thông tin của doanh nghiệp, tổ chức kinh tế, tổ
      chức khác, hộ kinh doanh, cá nhân kinh doanh lập trên hóa đơn. Doanh nghiệp, tổ chức kinh tế, tổ chức khác, hộ kinh
      doanh, cá nhân kinh doanh chịu trách nhiệm về tính chính xác của các thông tin trên hóa đơn. 5. Chính phủ quy định chi
      tiết Điều này.
    - 3. Sau thời hạn 01 năm kể từ ngày bị thu hồi giấy phép, buộc chấm dứt hoạt động, tổ chức, doanh nghiệp thuộc các trường
      hợp quy định tại các điểm b, c, d, đ, e, g và h khoản 1, các điểm b, c và d khoản 2 Điều này được quyền nộp hồ sơ đề
      nghị cấp giấy phép viễn thông hoặc đăng ký , thông báo cung cấp dịch vụ viễn thông. 4. Tổ chức, doanh nghiệp bị thu
      hồi giấy phép trong trường hợp quy định tại điểm a khoản 1 Điều này hoặc bị buộc chấm dứt hoạt động cung cấp dịch vụ
      viễn thông trong trường hợp quy định tại điểm a khoản 2 Điều này không được xem xét cấp giấy phép viễn thông hoặc cung
      cấp dịch vụ viễn thông đối với dịch vụ quy định tại Điều 41 của Luật này.
    - Điều 84. Thủ tục, hồ sơ, thời gian, thẩm quyền khoanh nợ 1. Chính phủ quy định thủ tục, hồ sơ, thời gian khoanh nợ đối
      với trường hợp được khoanh nợ. 2. Thủ trưởng cơ quan quản lý thuế quản lý trực tiếp người nộp thuế quyết định việc khoanh
      nợ. 3. Cơ quan quản lý thuế tiếp tục theo dõi các khoản tiền thuế nợ được khoanh và phối hợp với các cơ quan có liên
      quan để thu hồi tiền thuế nợ khi người nộp thuế có khả năng nộp thuế hoặc thực hiện xóa nợ theo quy định tại Điều 85
      của Luật này. Mục 3. XÓA NỢ TIỀN THUẾ, TIỀN CHẬM NỘP, TIỀN PHẠT
  - source_sentence: Người lao động có thể lựa chọn các phương thức đóng bảo hiểm xã hội tự nguyện theo quy định tại Điều
      87 của Luật Bảo hiểm xã hội như thế nào?
    sentences:
    - Điều 31. Hoạt động đầu tư Tổ chức bảo hiểm tiền gửi được sử dụng nguồn vốn tạm thời nhàn rỗi để mua trái phiếu Chính
      phủ, tín phiếu Ngân hàng Nhà nước Việt Nam và gửi tiền tại Ngân hàng Nhà nước Việt Nam.
    - Trường hợp hóa đơn ủy nhiệm là hóa đơn điện tử không có mã của cơ quan thuế thì bên ủy nhiệm phải chuyển dữ liệu hóa
      đơn điện tử đến cơ quan thuế thông qua tổ chức cung cấp dịch vụ. Bộ Tài chính hướng dẫn cụ thể nội dung này. 8. Tổ chức
      thu phí, lệ phí được ủy nhiệm cho bên thứ ba lập biên lai thu phí, lệ phí. Biên lai được ủy nhiệm cho bên thứ ba vẫn
      ghi tên của tổ chức thu phí, lệ phí là bên ủy nhiệm. Việc ủy nhiệm phải được xác định bằng văn bản giữa bên ủy nhiệm
      và bên nhận ủy nhiệm thể hiện đầy đủ các thông tin về biên lai ủy nhiệm (mục đích ủy nhiệm; thời hạn ủy nhiệm; phương
      thức thanh toán biên lai ủy nhiệm) và phải thông báo cho cơ quan thuế khi thông báo phát hành biên lai.
    - 'Điều 87. Mức đóng và phương thức đóng của người lao động tham gia bảo hiểm xã hội tự nguyện 1. Người lao động quy định
      tại khoản 4 Điều 2 của Luật này, hằng tháng đóng bằng 22% mức thu nhập tháng do người lao động lựa chọn để đóng vào
      quỹ hưu trí và tử tuất; mức thu nhập tháng làm căn cứ đóng bảo hiểm xã hội thấp nhất bằng mức chuẩn hộ nghèo của khu
      vực nông thôn và cao nhất bằng 20 lần mức lương cơ sở. Căn cứ vào điều kiện phát triển kinh tế - xã hội, khả năng ngân
      sách nhà nước trong từng thời kỳ để quy định mức hỗ trợ, đối tượng hỗ trợ và thời điểm thực hiện chính sách hỗ trợ tiền
      đóng bảo hiểm xã hội cho người lao động tham gia bảo hiểm xã hội tự nguyện.  2. Người lao động được chọn một trong các
      phương thức đóng sau đây: a) Hằng tháng; b) 03 tháng một lần; c) 06 tháng một lần; d) 12 tháng một lần; đ) Một lần cho
      nhiều năm về sau với mức thấp hơn mức đóng hằng tháng hoặc một lần cho những năm còn thiếu với mức cao hơn mức đóng
      hằng tháng so với quy định tại Điều này . 3. Chính phủ quy định chi tiết Điều này.'
  - source_sentence: Chính phủ quy định như thế nào về mức lương hưu hằng tháng thấp nhất của người lao động tham gia bảo
      hiểm xã hội bắt buộc đủ điều kiện hưởng lương hưu theo quy định tại Điều 54 và Điều 55 của Luật Bảo hiểm xã hội?
    sentences:
    - 'Điều 36. Thu hồi Giấy phép 1. Ngân hàng Nhà nước thu hồi Giấy phép đã cấp trong trường hợp sau đây: a) Hồ sơ đề nghị
      cấp Giấy phép có thông tin gian lận để có đủ điều kiện được cấp Giấy phép; b) Tổ chức tín dụng bị chia, bị sáp nhập,
      hợp nhất, giải thể, phá sản, chuyển đổi hình thức pháp lý; c) Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, văn
      phòng đại diện nước ngoài hoạt động không đúng nội dung quy định trong Giấy phép; d) Tổ chức tín dụng, chi nhánh ngân
      hàng nước ngoài vi phạm nghiêm trọng quy định của pháp luật về dự trữ bắt buộc, tỷ lệ bảo đảm an toàn hoạt động; đ)
      Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài không thực hiện hoặc thực hiện không đầy đủ quyết định xử lý của Ngân
      hàng Nhà nước để bảo đảm an toàn trong hoạt động ngân hàng; e) Tổ chức tín dụng nước ngoài, tổ chức nước ngoài khác
      có hoạt động ngân hàng có hiện diện thương mại tại Việt Nam bị giải thể, phá sản hoặc bị cơ quan có thẩm quyền của nước
      nơi tổ chức đó đặt trụ sở chính thu hồi giấy phép hoặc đình chỉ hoạt động. 2. Quyết định thu hồi Giấy phép được Ngân
      hàng Nhà nước công bố trên Cổng thông tin điện tử Ngân hàng Nhà nước. 3. Tổ chức tín dụng, chi nhánh ngân hàng nước
      ngoài bị thu hồi Giấy phép phải chấm dứt hoạt động kinh doanh kể từ ngày Quyết định thu hồi Giấy phép của Ngân hàng
      Nhà nước có hiệu lực. 4. Thống đốc Ngân hàng Nhà nước quy định hồ sơ, thủ tục thu hồi Giấy phép.'
    - Từ đủ 16 năm đến dưới 20 năm đóng bảo hiểm xã hội, cứ mỗi năm đóng tính thêm 2%.  5. Mức lương hưu hằng tháng thấp nhất
      của người lao động tham gia bảo hiểm xã hội bắt buộc đủ điều kiện hưởng lương hưu theo quy định tại Điều 54 và Điều
      55 của Luật này bằng mức lương cơ sở, trừ trường hợp quy định tại điểm i khoản 1 Điều 2 và khoản 3 Điều 54 của Luật
      này. 6. Chính phủ quy định chi tiết Điều này.
    - "Điều 101. Hồ sơ hưởng chế độ thai sản   1. Hồ sơ hưởng chế độ thai sản đối với lao động nữ sinh con bao gồm: a) Bản\
      \ sao giấy khai sinh hoặc bản sao giấy chứng sinh của con;  b) Bản sao giấy chứng tử của con trong trường hợp con chết,\
      \ bản sao giấy chứng tử của mẹ trong trường hợp sau khi sinh con mà mẹ chết; c) Giấy xác nhận của cơ sở khám bệnh, chữa\
      \ bệnh có thẩm quyền về tình trạng người mẹ sau khi sinh con mà không còn đủ sức khỏe để chăm sóc con;  d) Trích sao\
      \ hồ sơ bệnh án hoặc giấy ra viện của người mẹ trong trường hợp con chết sau khi sinh mà chưa được cấp giấy chứng sinh;\
      \ đ) Giấy xác nhận của cơ sở khám bệnh, chữa bệnh có thẩm quyền về việc lao động nữ phải nghỉ việc để dưỡng thai đối\
      \ với trường hợp quy định tại khoản 3 Điều 31 của Luật này. 2. Trường hợp lao động nữ đi khám thai, sẩy thai, nạo, hút\
      \ thai, thai chết lưu hoặc phá thai bệnh lý, người lao động thực hiện biện pháp tránh thai theo quy định tại khoản 1\
      \ Điều 37 của Luật này phải có giấy chứng nhận nghỉ việc hưởng bảo hiểm xã hội đối với trường hợp điều trị ngoại trú,\
      \ bản chính hoặc bản sao giấy ra viện đối với trường hợp điều trị nội trú. 3. Trường hợp người lao động nhận nuôi con\
      \ nuôi dưới 06 tháng tuổi phải có giấy chứng nhận nuôi con nuôi. 4. Trường hợp lao động nam nghỉ việc khi vợ sinh con\
      \ phải có bản sao giấy chứng sinh hoặc bản sao giấy khai sinh của con và giấy xác nhận của cơ sở y tế đối với trường\
      \ hợp sinh con phải phẫu thuật, sinh con dưới 32 tuần tuổi. 5. Danh sách người lao động nghỉ việc hưởng chế độ thai\
      \ sản do người sử dụng \n  \n lao động lập."
  - source_sentence: Sự khác biệt chính giữa hóa đơn điện tử có mã của cơ quan thuế và hóa đơn điện tử không có mã của cơ
      quan thuế là gì?
    sentences:
    - "Điều 89. Hóa đơn điện tử 1. Hóa đơn điện tử là hóa đơn có mã hoặc không có mã của cơ quan thuế được thể hiện ở dạng\
      \ dữ liệu điện tử do tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ lập, ghi nhận thông tin bán hàng hóa, cung cấp\
      \ dịch vụ theo quy định của pháp luật về kế toán, pháp luật về thuế bằng phương tiện điện tử, bao gồm cả trường hợp\
      \ hóa đơn được khởi tạo từ máy tính tiền có kết nối chuyển dữ liệu điện tử với cơ quan thuế. \n2. Hóa đơn điện tử bao\
      \ gồm hóa đơn giá trị gia tăng, hóa đơn bán hàng, tem điện tử, vé điện tử, thẻ điện tử, phiếu thu điện tử, phiếu xuất\
      \ kho kiêm vận chuyển điện tử hoặc các chứng từ điện tử có tên gọi khác. 3. Hóa đơn điện tử có mã của cơ quan thuế là\
      \ hóa đơn điện tử được cơ quan thuế cấp mã trước khi tổ chức, cá nhân bán hàng hóa, cung cấp dịch vụ gửi cho người mua.\
      \ Mã của cơ quan thuế trên hóa đơn điện tử bao gồm số giao dịch là một dãy số duy nhất do hệ thống của cơ quan thuế\
      \ tạo ra và một chuỗi ký tự được cơ quan thuế mã hóa dựa trên thông tin của người bán lập trên hóa đơn. 4. Hóa đơn điện\
      \ tử không có mã của cơ quan thuế là hóa đơn điện tử do tổ chức bán hàng hóa, cung cấp dịch vụ gửi cho người mua không\
      \ có mã của cơ quan thuế. 5. Chính phủ quy định chi tiết Điều này."
    - "Điều 87. Thẩm quyền xóa nợ tiền thuế, tiền chậm nộp, tiền phạt \n1. Chủ tịch Ủy ban nhân dân cấp tỉnh quyết định xóa\
      \ nợ tiền thuế, tiền chậm nộp, tiền phạt đối với các trường hợp sau đây: a) Trường hợp quy định tại khoản 1 và khoản\
      \ 2 Điều 85 của Luật này; b) Hộ gia đình, hộ kinh doanh, cá nhân kinh doanh, cá nhân quy định tại khoản 3 Điều 85 của\
      \ Luật này; c) Doanh nghiệp, hợp tác xã thuộc trường hợp quy định tại khoản 3 Điều 85 của Luật này có khoản nợ tiền\
      \ thuế, tiền chậm nộp, tiền phạt dưới 5.000.000.000 đồng. 2. Tổng cục trưởng Tổng cục Thuế, Tổng cục trưởng Tổng cục\
      \ Hải quan quyết định xóa nợ đối với doanh nghiệp, hợp tác xã thuộc trường hợp quy định tại khoản 3 Điều 85 của Luật\
      \ này có khoản nợ tiền thuế, tiền chậm nộp, tiền phạt từ 5.000.000.000 đồng đến dưới 10.000.000.000 đồng. 3. Bộ trưởng\
      \ Bộ Tài chính quyết định xóa nợ đối với doanh nghiệp, hợp tác xã thuộc trường hợp quy định tại khoản 3 Điều 85 của\
      \ Luật này có khoản nợ tiền thuế, tiền chậm nộp, tiền phạt từ 10.000.000.000 đồng đến dưới 15.000.000.000 đồng. 4. Thủ\
      \ tướng Chính phủ quyết định xóa nợ đối với doanh nghiệp, hợp tác xã thuộc trường hợp quy định tại khoản 3 Điều 85 của\
      \ Luật này có khoản nợ tiền thuế, tiền chậm nộp, tiền phạt từ 15.000.000.000 đồng trở lên. 5. Chủ tịch Ủy ban nhân dân\
      \ cấp tỉnh báo cáo tình hình kết quả xóa nợ tiền thuế, tiền chậm nộp, tiền phạt cho Hội đồng nhân dân cùng cấp vào kỳ\
      \ họp đầu năm. Bộ trưởng Bộ Tài chính tổng hợp tình hình xóa nợ tiền thuế, tiền chậm nộp, tiền phạt để Chính phủ báo\
      \ cáo Quốc hội khi quyết toán ngân sách nhà nước."
    - 'Điều 14. Cung cấp dịch vụ hóa đơn điện tử 1. Trường hợp sử dụng hóa đơn điện tử có mã của cơ quan thuế không phải trả
      tiền dịch vụ trong thời gian 12 tháng kể từ khi bắt đầu sử dụng hóa đơn điện tử gồm: a) Doanh nghiệp nhỏ và vừa, hợp
      tác xã, hộ, cá nhân kinh doanh tại địa bàn có điều kiện kinh tế - xã hội khó khăn, địa bàn có điều kiện kinh tế - xã
      hội đặc biệt khó khăn. Địa bàn có điều kiện kinh tế - xã hội khó khăn, địa bàn có điều kiện kinh tế - xã hội đặc biệt
      khó khăn thực hiện theo Danh mục địa bàn ưu đãi đầu tư ban hành kèm theo Nghị định số 118/2015/NĐ-CP ngày 12 tháng 11
      năm 2015 của Chính phủ quy định chi tiết và hướng dẫn thi hành một số điều của Luật Đầu tư và các văn bản sửa đổi, bổ
      sung hoặc thay thế nếu có. b) Doanh nghiệp nhỏ và vừa khác theo đề nghị của Ủy ban nhân dân tỉnh, thành phố trực thuộc
      Trung ương gửi Bộ Tài chính trừ doanh nghiệp hoạt động tại các khu kinh tế, khu công nghiệp, khu công nghệ cao. Tổng
      cục Thuế thực hiện hoặc ủy thác cho tổ chức cung cấp dịch vụ về hóa đơn điện tử thực hiện cung cấp hóa đơn điện tử có
      mã của cơ quan thuế không phải trả tiền dịch vụ cho các đối tượng nêu trên. 2. Các doanh nghiệp, tổ chức kinh tế, hộ,
      cá nhân kinh doanh không thuộc trường hợp quy định tại khoản 1 Điều này khi sử dụng hóa đơn điện tử có mã của cơ quan
      thuế, sử dụng hóa đơn điện tử không có mã của cơ quan thuế thông qua tổ chức cung cấp dịch vụ hóa đơn điện tử thực hiện
      trả tiền dịch vụ theo Hợp đồng ký giữa các bên'
