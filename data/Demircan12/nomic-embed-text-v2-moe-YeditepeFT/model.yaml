widgetData:
- source_sentence: İhale Yönetmeliği Madde 19'a göre doğrudan temin için mal/hizmet/tarife/seyahat alımlarının bedel sınırı
    nedir?
  sentences:
  - 'Week9 (Nov 25): Condition Variables, Deadlocks / Project Phase II: Scheduler - @Nov 28, Preliminary Report Due: Dec 23,
    How to write Project Report, Phase 1- DEMO'
  - ç) Üniversitenin tahmini bedeli bir önceki hesap dönemi toplam giderlerinin TÜFE oranına göre güncellenecek üçyüzsekizbinüçyüzyetmişdört
    TL’ye karşılık gelen tutardaki bedeli aşmayacak olan mal ve hizmet alımları, tarifeli alımlar ile seyahat alımları.
  - MADDE 9 – (1) Yabancı uyruklu öğrenciler hakkında ilgili mevzuat hükümleri ile Senato tarafından belirlenen esaslar uygulanır.
- source_sentence: Madde 8'e göre Komisyon Başkanı kime karşı sorumludur?
  sentences:
  - Komisyon Başkanı, Rektöre karşı sorumludur.
  - Komisyon Başkanı, çalışma birimlerinin faaliyetlerini izler ve denetler.
  - Alınacak pedagojik formasyon dersleri öğrencinin dönemlik ders yükünün üzerinde olması halinde genel not ortalaması 3.00
    ve üzeri olan öğrencilerden ücret alınmayacak...
- source_sentence: What is the grading breakdown for CSE 462?
  sentences:
  - 'Grading Breakdown: 30% Midterm

    45% Final

    25% Assignments'
  - Teklifler iadeli taahhütlü olarak da gönderilebilir.
  - Any form of cheating will be reported to the faculty's relevant administrative body for further action.
- source_sentence: Resmi Yazışma Yönergesi Madde 16'ya göre paragraflar nasıl başlar ve hizalanır?
  sentences:
  - (8)Yazışma birim kodu olmayan veya verilmeyen hiçbir birim yazışma yapamaz.
  - (3) Zorunlu hâllerde veya olağanüstü durumlarda hazırlanan olur yazılarında “OLUR” ibaresinden sonra tarih ve imza için
    uygun boş satır bırakılarak ilk satırda imzalayanın adı ve soyadına, ikinci satırda ise unvan bilgilerine yer verilir
    (Örnek 18).
  - (4) Paragrafa 1,25 cm içeriden başlanır ve metin iki yana hizalanır.
- source_sentence: CSE 447 (Ozkaya) sınavında kopya çekme girişimi nasıl değerlendirilir?
  sentences:
  - 'Week-10 AVL tree

    Week-11 IPR tree

    Week-12 B tree

    Week-13 B+ tree'
  - 'Alan Eğitimcisi : Doktorasını ve/veya doçentliğini, ilgili alan eğitiminde (fizik eğitimi, kimya eğitimi, biyoloji eğitimi,
    matematik eğitimi, tarih eğitimi, din eğitimi, Türkçe eğitimi vb.) almış öğretim üyesini,'
  - 'Exam Cheating Policy: Any attempt at cheating during the midterm and final exams will be treated seriously.'
