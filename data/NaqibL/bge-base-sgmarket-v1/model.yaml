- source_sentence: 'Data Analyst


    Introduction: A Career at HARMAN Lifestyle We’re a global, multi-disciplinary team that’s putting the innovative power
    of technology to work and transforming tomorrow.

    As a member of HARMAN Lifestyle, you connect consumers with the power of superior sound.

    Contribute your talents to high-end, esteemed brands like JBL, Mark Levinson and Revel Unite your passion for audio innovation
    with high-tech product development Create pitch-perfect, cutting-edge technology that elevates the listening experience.

    About the Role In this role, you will be a core member of a small but effective integrated regional team that will help
    HARMAN build and grow APAC’s digital ecosystem.

    You will be in charge of collecting, analysing, and interpreting complex data sets to provide insights that drive business
    decisions.

    The ideal candidate will have a strong passion for data mining, analysis and data visualisation.

    You will also be able to work independently and as part of a team to deliver high-quality results with the goal of bringing
    best in class experiences to life for our consumer.

    You will collaborate with cross-functional teams to identify opportunities for digital business growth.

    You will report directly to the Senior Manager, Digital & E-Commerce, and this is an independent contributor role managing
    JBL and Harman Kardon across APAC.

    You will also be working collaboratively with our distribution partners, digital, ecommerce leads and regional business
    development managers to drive strategic thinking and KPI measurements.

    What You Will Do Data Collation and Analysis: Design and implement data collection methodologies and process to collate
    relevant data from multiple sources and ensure sanity check.

    Conduct detailed data analysis using data techniques, mining and visualisation to extract insights and identify trends.

    Reporting and Visualisation: Create dashboards, reports and visualisations that effectively communicate data-driven insights
    to various stakeholders.

    Present findings and recommendations to internal teams, stakeholders and senior management in an accurate and concise
    manner.

    Continuously refine reporting processes to improve accuracy, efficiency and effectiveness of data Business Insights and
    Strategy: Collaborate with internal and external stakeholders to understand their analytical needs.

    Analyse data, work with stakeholders to understand their needs and translate data into actionable insights and recommendations.

    Develop data visualisation to communicate findings.

    Stay updated with industry trends and best practices in data analytics.

    Collaborate with the wider product and marketing team to plan and create digital driven marketing plans (includes paid
    media), content, creatives, KPIs & reporting.

    Work in hand with the global insights team to manage and deliver an annual brand health insights report across key APAC
    countries This role will also require you to manage agency relationships, to ensure data and reports are delivered time
    What You Need to Be Successful Bachelor’s Degree in eCommerce/Digital analytics, Information Systems, Computer Science
    or related field 2 or more years working experience in data analytics.

    Strong understanding of data mining, analysis and data visualisation.

    Excellent analytical and problem-solving skills with a keen attention to detail Strong communication and presentation
    skills to convey complex info to non-technical audiences Ability to work independently and as part of a team in a fast-paced
    environment.

    Familiar with eCommerce operating platforms, web analytics, UX-UI tools (Google Analytics, Mouseflow or similar), Proficient
    in Excel, Power BI or similar tools.

    Bonus Points if You Have Prior experience in Consumer Electronics or FMCG industry with APAC experience.

    Ability to juggle between the details and big picture, manage multiple and competing projects and priorities.

    Passion for and genuine curiosity for innovation in the Digital / e-Commerce space and a passion for data analysis.

    Data/Insight-driven, strong sense of accountability and solution-oriented are key.

    Ability to draw insights from multiple data sources and formulate recommendations for improvements.

    Adaptable to ambiguity, changes and be at the forefront to lead change in both actions and behavior Ability to work independently
    and collaboratively in a culturally-diverse team environment, and understanding what it means to achieve success with
    others and through others Excellent communicator and able to perform well in a matrixed organization.

    Proven experience in managing and influencing a network of local senior managers and managers in a cross functional team.

    What Makes You Eligible Successfully complete a background investigation as a condition of employment.

    What We Offer Flexible work environment Access to employee discounts on world-class Harman products (JBL, HARMAN Kardon,
    AKG, etc.) Extensive training opportunities through our own HARMAN University “Be Brilliant” employee recognition and
    rewards program An inclusive and diverse work environment that fosters and encourages professional and personal development.'
