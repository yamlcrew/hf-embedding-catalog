widgetData:
- source_sentence: 'حضرت عائشہ رضی اللہ عنہا سے مروی ہے کہ رسول اللہ  ﷺ  نے اپنی بیویوں کو اختیار دیا تھا لیکن یہ طلاق نہیں
    بنا  '
  sentences:
  - کیا غلام خاوند کے ساتھ نکاح جاری رکھا جا سکتا ہے
  - کیا عدت کے دوران رجوع کرنے کی اجازت ہے
  - رسول اللہ ﷺ نے اپنی بیویوں کو کیا اختیار دیا تھا
- source_sentence: 'حضرت عائشہ  بیان کرتی ہیں  قرآن میں یہ حکم نازل ہوا تھا کہ دس مرتبہ دودھ پینے سے حرمت واقع ہوتی ہے  پھر
    وہ حکم پانچ مرتبہ پینے کی قید کے ساتھ منسوخ کر دیا گیا  رسول اللہ ﷺ نے جس وقت وفات پائی تو اس وقت تک پانچ مرتبہ دودھ پینے
    والی آیت قرآن میں پڑھی جاتی تھی  رواہ مسلم '
  sentences:
  - رسول اللہ ﷺ کی وفات کے وقت قرآن میں کتنی مرتبہ دودھ پینے کا حکم پڑھا جاتا تھا
  - کیا نبی ﷺ نے شوہر کو اپنی بیوی کو "بہن" کہنے سے منع فرمایا
  - کیا نامرد ہونے کے دعوے کی صورت میں علیحدگی ممکن ہے
- source_sentence: '  جناب عکرمہ رحمہ اللہ نبی ﷺ سے بیان کرتے ہیں جیسے کہ سفیان  بن عیینہ  کی روایت میں ذکر ہوا ہے   2221  2222  '
  sentences:
  - کیا عورت عدت کے دوران شوہر کے گھر سے نکل سکتی ہے
  - کیا چار بار زنا کا اقرار کرنے کے بعد سزا دی جاتی ہے
  - نبی ﷺ کی تعلیمات کے مطابق طلاق کا صحیح طریقہ کیا ہے
- source_sentence: 'حضرت ابن عمر  بیان کرتے ہیں  رسول اللہ ﷺ نے فرمایا  ننگے ہونے سے بچو  کیونکہ تمہارے ساتھ وہ فرشتے ہیں
    جو تمہارے ساتھ ہی رہتے ہیں  اور وہ صرف اس وقت جدا ہوتے ہیں جب آدمی بیت الخلا جاتا ہے اور جب اپنی اہلیہ سے تعلق زن و شو
    قائم کرتا ہے  تم ان سے حیا کرو اور ان کی تکریم کرو  رواہ الترمذی '
  sentences:
  - ظہار کے بعد کفارہ دینے سے پہلے عورت سے جسمانی تعلق قائم کرنے کا حکم کیا ہے
  - مملوک عورت اور آزاد مرد کے نکاح میں لعان کا حکم کیا ہے
  - فرشتے کب انسان سے جدا ہوتے ہیں
- source_sentence: 'حضرت ابن عمر  بیان کرتے ہیں  غزوہ احد کے موقع پر چودہ سال کی عمر میں مجھے رسول اللہ ﷺ کی خدمت میں پیش
    کیا گیا تو آپ نے مجھے واپس کر دیا  پھر غزوہ خندق کے موقع پر پندرہ سال کی عمر میں مجھے پیش کیا گیا تو آپ نے مجھے جہاد کرنے
    کی اجازت مرحمت فرما دی  عمر بن عبدالعزیز  نے فرمایا  یہی عمر پندرہ سال لڑنے والے جوانوں اور لڑکوں نابالغ میں فرق کرنے
    والی ہے  متفق علیہ '
  sentences:
  - بیوہ عورت کی عدت کی مدت کتنی ہوتی ہے
  - پندرہ سال کی عمر میں لڑکوں کو کس چیز کی اجازت ہے
  - لعان کرنے والے خاوند و بیوی میں سے جھوٹا کون ہوتا ہے
