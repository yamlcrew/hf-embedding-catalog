- source_sentence: Why is it important to ensure a consistent and high level of protection for AI throughout the Union?
  sentences:
  - AI systems can be easily deployed in a large variety of sectors of the economy and many parts of society, including across
    borders, and can easily circulate throughout the Union. Certain Member States have already explored the adoption of national
    rules to ensure that AI is trustworthy and safe and is developed and used in accordance with fundamental rights obligations.
    Diverging national rules may lead to the fragmentation of the internal market and may decrease legal certainty for operators
    that develop, import or use AI systems. A consistent and high level of protection throughout the Union should therefore
    be ensured in order to achieve trustworthy AI, while divergences hampering the free circulation, innovation, deployment
    and the
  - '(5)



    At the same time, depending on the circumstances regarding its specific application, use, and level of technological development,
    AI may generate risks and cause harm to public interests and fundamental rights that are protected by Union law. Such
    harm might be material or immaterial, including physical, psychological, societal or economic harm.













    (6)'
  - (57)
- source_sentence: What is the purpose of implementing a risk-based approach for AI systems according to the context?
  sentences:
  - use of lethal force and other AI systems in the context of military and defence activities. As regards national security
    purposes, the exclusion is justified both by the fact that national security remains the sole responsibility of Member
    States in accordance with Article 4(2) TEU and by the specific nature and operational needs of national security activities
    and specific national rules applicable to those activities. Nonetheless, if an AI system developed, placed on the market,
    put into service or used for military, defence or national security purposes is used outside those temporarily or permanently
    for other purposes, for example, civilian or humanitarian purposes, law enforcement or public security purposes, such
    a system would fall
  - '(26)



    In order to introduce a proportionate and effective set of binding rules for AI systems, a clearly defined risk-based
    approach should be followed. That approach should tailor the type and content of such rules to the intensity and scope
    of the risks that AI systems can generate. It is therefore necessary to prohibit certain unacceptable AI practices, to
    lay down requirements for high-risk AI systems and obligations for the relevant operators, and to lay down transparency
    obligations for certain AI systems.













    (27)'
  - To mitigate the risks from high-risk AI systems placed on the market or put into service and to ensure a high level of
    trustworthiness, certain mandatory requirements should apply to high-risk AI systems, taking into account the intended
    purpose and the context of use of the AI system and according to the risk-management system to be established by the provider.
    The measures adopted by the providers to comply with the mandatory requirements of this Regulation should take into account
    the generally acknowledged state of the art on AI, be proportionate and effective to meet the objectives of this Regulation.
