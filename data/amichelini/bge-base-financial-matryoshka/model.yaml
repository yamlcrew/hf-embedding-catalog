widgetData:
- source_sentence: 'The platform offers a number of free services to its members: access to their credit scores and reports,
    credit and identity monitoring, credit report dispute, tools to help understand net worth and make financial progress,
    and personalized recommendations of credit card, loan, and insurance products. Credit Karma Money offers members online
    savings and checking accounts through an FDIC member bank partner. Credit Karma Money also provides tools to help members
    improve their credit scores.'
  sentences:
  - What is the mechanism of action for Veklury?
  - What services does Credit Karma offer to its members?
  - What was the annual amortization expense forecast for acquisition-related intangible assets in 2025, according to a specified
    financial projection?
- source_sentence: Vaccine related exit costs of $0.8 billion were reported in the 2023 annual report.
  sentences:
  - What factors primarily drove the decrease in Veklury's sales in 2023?
  - What were the vaccine related exit costs reported by Johnson & Johnson in their 2023 annual report?
  - What was the percentage increase in interest income from 2022 to 2023?
- source_sentence: Broadband revenues increased in 2023 by 8.1% driven by an increase in fiber customers and higher average
    revenue per user, partially offset by declines in copper-based broadband services.
  sentences:
  - What was the percent change in broadband revenues for AT&T in 2023 compared to 2022?
  - What factors primarily drove the increase in net cash provided by operating activities for fiscal 2023?
  - How much interest does Chevron hold in the production sharing contract for deepwater Block 14?
- source_sentence: SEC regulations require the company to disclose certain information about proceedings arising under federal,
    state or local environmental regulations if they reasonably believe that such proceedings may result in monetary sanctions
    exceeding $1 million.
  sentences:
  - What does the term 'Acquired brands' refer to and how does it affect the reported volumes?
  - How many new medicine candidates are currently in clinical development or under regulatory review?
  - Under what conditions are the Company required to disclose certain proceedings according to SEC regulations?
- source_sentence: 2023 highlights include net revenues of $5,003.3 million which decreased 15% from $5,856.7 million in 2022.
  sentences:
  - How did Hasbro's net revenues in 2023 compare to the previous year?
  - How much cash did continuing operating activities provide in 2023?
  - Which pages of IBM’s 2023 Annual Report provide information on Financial Statements and Supplementary Data?
