widgetData:
- source_sentence: Medical science is the application of scientific principles to the study and practice of medicine. It has
    transformed medicine by providing a deeper understanding of the human body at the cellular and molecular levels, allowing
    for more effective treatments and interventions. Medical science has enabled us to develop new treatments, understand
    the causes of diseases, and improve patient outcomes. It's had a profound impact on the way medicine is practiced today.
  sentences:
  - I was reading about health and wellness, and I came across the term "quackery." What is quackery in the context of medicine?
  - That's really interesting. What is medical science, and how has it impacted the practice of medicine?
  - That's helpful to know. What is the primary purpose of a physical examination in medicine, anyway?
- source_sentence: The purpose of differential diagnosis is to rule out conditions based on the information provided, in order
    to narrow down the possible causes of a patient's symptoms. By considering multiple potential diagnoses and evaluating
    the likelihood of each, doctors can arrive at a more accurate diagnosis and develop an effective treatment plan.
  sentences:
  - I've heard the term "differential diagnosis" before. What is the purpose of differential diagnosis?
  - Hello, I'm interested in learning about the various ways that diseases can be treated. Can you tell me some common ways
    to treat disease?
  - I was just wondering about what happens during a typical doctor's visit. What kinds of medical devices are typically used
    in basic diagnostic procedures?
- source_sentence: Typically, individual governments establish legal, credentialing, and financing frameworks to support health
    care systems. These frameworks help to structure the way health care is delivered and accessed within a country.
  sentences:
  - That makes sense. I'm also curious about the frameworks themselves. What types of frameworks are typically established
    by individual governments to support health care systems?
  - I see. Where is contemporary medicine generally conducted?
  - That makes sense. I've been to the doctor's office a few times and I've seen them use those devices. What is the role
    of physicians and physician assistants in modern clinical practice?
- source_sentence: The information gathered during a medical encounter is documented in the medical record, which is a legal
    document in many jurisdictions. This record contains all the relevant information about the patient's condition, treatment,
    and medical history, and is used to guide future care and treatment decisions.
  sentences:
  - I see. I think I understand, but I'm a bit confused. Is there a more general term for medical treatments that are used
    outside of scientific medicine?
  - That makes sense. What types of medical information might you collect from a patient's medical history?
  - What happens to the information gathered during a medical encounter?
- source_sentence: Regional differences in culture and technology are significant factors that contribute to variations in
    medical availability and clinical practice around the world. These factors can shape the way healthcare is delivered,
    the types of treatments that are available, and even the way patients interact with healthcare professionals. It's fascinating
    to learn about these differences and how they impact healthcare outcomes.
  sentences:
  - I see. I'm curious about the term "therapy" in the context of treating disease. Can you explain what you understand by
    that term?
  - Hi, I'm learning about medical interviews, and I'm a bit confused about the information that's gathered about a patient's
    occupation and lifestyle. What information is typically gathered during the interview?
  - I see. I'm also interested in learning more about the variations in medical availability and clinical practice around
    the world. What are some factors that contribute to variations in medical availability and clinical practice around the
    world?
