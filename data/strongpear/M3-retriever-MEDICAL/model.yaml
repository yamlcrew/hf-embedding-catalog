- source_sentence: Kết quả nghiên cứu cho thấy điều gì về sự chuyên môn hóa chức năng ở bán cầu não của trẻ em suy giảm khả
    năng học tập và ngôn ngữ?
  sentences:
  - Cấu trúc não trên hình ảnh cộng hưởng từ ở trẻ suy giảm khả năng học tập và ngôn ngữ. Sử dụng hình ảnh cộng hưởng từ,
    20 trẻ em bị suy giảm khả năng học tập và ngôn ngữ được so sánh với 12 đối tượng đối chứng bình thường. Cấu trúc tổng
    thể của não đặc biệt bình thường ở nhóm suy giảm khả năng học tập và ngôn ngữ. Hình thái bán tự động được sử dụng để đo
    thể tích bán cầu và sự bất đối xứng của não ở sáu vùng não. Thể tích của vùng perisylvian phía sau bên trái giảm đáng
    kể ở trẻ suy giảm khả năng học tập và ngôn ngữ. Sự bất đối xứng ở vùng não dưới trước và trên sau cũng khác biệt đáng
    kể ở nhóm này. Kết quả so sánh nhóm mô tả về thể tích ước tính của các cấu trúc chất xám khác của não làm tăng khả năng
    một số trẻ bị suy giảm khả năng ngôn ngữ và khả năng học tập có thể bị giảm thêm thể tích ở các cấu trúc vỏ não và dưới
    vỏ não. Kết quả cho thấy sự chuyên môn hóa chức năng ở bán cầu có thể là bất thường ở nhóm dân số này.
  - để đánh giá sự xâm nhập đường thở của bạch cầu ái toan trong phản ứng hen suyễn của chuột cống nâu Na Uy được mẫn cảm
    với ovalbumin, diễn biến thời gian của sự xâm nhập bạch cầu ái toan và sức đề kháng hô hấp rrs sau khi thử thách ovalbumin
    được đo lường, hiệu quả của việc điều trị bằng kháng thể đơn dòng chống lại icam và cd cuối cùng đã được nghiên cứu biểu
    hiện icam và cd trong đường thở đã được nghiên cứu tất cả chuột đều cho thấy tỷ lệ rrs tăng nhiều giờ sau khi thử thách
    với albumin ovalbumin cho thấy phản ứng hen muộn. Những con vật mắc bệnh lar có số lượng bạch cầu ái toan cao hơn những
    con có IAR iar và ở những con vật nhạy cảm nhưng không bị thách thức, chuột được điều trị bằng kháng thể cho thấy mức
    tăng rrs nhỏ hơn đáng kể và số lượng bạch cầu ái toan thấp hơn so với hóa mô miễn dịch ở động vật đối chứng IF trong đường
    thở được thực hiện. Phản ứng miễn dịch icam dương tính trên cả biểu mô và nội mô mạch máu của phần tr và trên biểu hiện
    icam nội mô mạch máu phổi được điều chỉnh tăng thách thức T3. Các tế bào dương tính cd trong các phần của tr và phổi tăng
    lên sau thử thách, kết quả của chúng tôi cho thấy sự thâm nhập của bạch cầu ái toan rất quan trọng trong sự phát triển
    của ấu trùng và việc điều trị bằng chất đối kháng của icam và cd có thể mang lại một phương pháp điều trị để giảm các
    triệu chứng hen suyễn
  - pH của chất trào ngược vào thực quản là một yếu tố quan trọng không chỉ đối với RE mà còn đối với barretts thực quản và
    OD của CA thực quản barretts. Mặt khác, nhiễm vi khuẩn H pylori được cho là ngăn ngừa viêm thực quản trào ngược và barretts
    thực quản bằng cách gây ra viêm teo dạ dày. lần lượt giảm GAS hơn nữa việc bảo tồn GAS có thể quan trọng đối với sự phát
    triển của CA nối dạ dày thực quản bao gồm cả barretts EC bất kể tình trạng nhiễm H pylori. Sự gia tăng tiết axit dạ dày
    ở dân số Nhật Bản đã được dự đoán dựa trên tỷ lệ nhiễm H pylori giảm và Việc phương Tây hóa thói quen ăn uống ở Nhật Bản
    điều này có thể dẫn đến sự gia tăng tỷ lệ mắc bệnh ung thư thực quản Barretts ở Nhật Bản trong tương lai
- source_sentence: Tại sao việc điều trị viêm tiểu phế quản sai cách lại nguy hiểm cho trẻ?
  sentences:
  - 'Mẫu máu để xét nghiệm lipid máu thường được lấy ở tĩnh mạch hoặc mao mạch trong điều kiện đói, nghĩa là bệnh nhân cần
    được nhịn ăn khoảng 9-12 giờ trước khi lấy máu.

    1.

    Sinh học của lipid và lipoprotein

    Lipid là một nhóm chất béo và các chất giống như chất béo, là thành phần quan trọng của tế bào và nguồn năng lượng. Hai
    lipid quan trọng là cholesterol và triglyceride, được vận chuyển trong máu bởi các hạt lipoprotein. Các hạt lipid được
    cấu tạo bới các phân tử protein, cholesterol, triglyceride và phospholipid và được phân loại theo tỷ trọng thành các lipoprotein
    tỷ trọng cao (HDL), lipoprotein tỷ trọng thấp (LDL) và lipoprotein tỷ trọng rất thấp (VLDL).

    Cholesterol có thể được tổng hợp trong cơ thể từ các mẩu 2C (nội sinh) hoặc được đưa từ ngoài và qua đường ăn uống. Việc
    ăn quá nhiều thực phẩm chứa nhiều chất béo hoặc yếu tố di truyền có thể làm tăng mức độ cholesterol trong máu.


    Lượng cholesterol dư thừa có thể được lắng đọng trong các mảng bám trên thành mạch máu, có thể gây hẹp lòng mạch, ngăn
    cản sự lưu thông của máu, dẫn đến xơ cứng động mạch (xơ vữa động mạch) và làm tăng nguy cơ mắc nhiều bệnh, gồm bệnh tim
    mạch và đột quỵ. Một mức độ triglyceride cao trong máu cũng có thể làm tăng nguy cơ phát triển bệnh tim mạch (CVD).

    2.

    Sử dụng

    Các xét nghiệm lipid, lipoprotein được sử dụng để phát hiện, chẩn đoán, theo dõi điều trị và tiên lượng các rối loạn chuyển
    hóa lipid trong nhiều bệnh, chẳng hạn như bệnh tim mạch (CHD), đái tháo đường (DM), hội chứng chuyển hóa (MS), bệnh thận
    mạn (CKD), ...

    Các thông số lipid, lipoprotein và tỷ số của chúng được sử dụng trong lâm sàng gồm: 1) Triglycerides (TG); 2) Cholesterol
    toàn phần (total cholesterol: TC); 3) Cholesterol lipoprotein tỷ trọng cao (HDL-C); 4) Cholesterol lipoprotein tỷ trọng
    thấp (LDL-C); 5) Non-HDL-C; 6) Tỷ số TG/HDL-C; 7) Tỷ số TC/HDL-C; 8) Tỷ số LDL/HDL-C; 9) Tỷ số non-HDL/HDL-C.

    3.

    Chỉ định xét nghiệm lipid máu


    Người trưởng thành khỏe mạnh không có các yếu tố nguy cơ mắc bệnh tim khác nên được chỉ định các xét nghiệm lipid lúc
    đói mỗi 4 đến 6 năm một lần. Nếu kết quả kiểm tra lipid máu bất thường, cần được quản lý, xét nghiệm thường xuyên hơn
    với bệnh án đầy đủ.'
  - Việc sử dụng ống dẫn thần kinh nhân tạo chứa các tế bào schwann khả thi là một trong những chiến lược hứa hẹn nhất để
    sửa chữa tổn thương PN nhằm chế tạo một ống dẫn thần kinh hiệu quả có cấu trúc vi mô và môi trường bên trong thuận lợi
    hơn trong việc tái tạo thần kinh so với các kỹ thuật hiện có bằng kỹ thuật d schwann CC ba chiều mới. MG và DRG drg được
    phát triển ống dẫn thần kinh của các tế bào schwann được sắp xếp d được chế tạo bằng cách gieo trực tiếp drg mới thu hoạch
    vào các ống silicon chứa đầy matrigel có đường kính trong mm mm và nuôi cấy trong ống nghiệm SC trong nhiều tuần quá trình
    tái tạo dây thần kinh của ống dẫn tế bào schwann nuôi cấy d nhóm n được đánh giá bằng cách sử dụng khuyết tật dây thần
    kinh tọa của chuột spraguedawley mm và được so sánh với khuyết tật của ống dẫn silicone chứa đầy matrigel và SC được điều
    chế bằng phương pháp SC đơn giản thông thường nhóm d ống dẫn hai chiều n sau nhiều tuần chức năng thần kinh tọa được đánh
    giá bằng phân tích dáng đi và SFI sfi và hình thái học của ống dẫn thần kinh và các mô bẩm sinh của dây thần kinh tọa
    đã được kiểm tra bằng cách sử dụng máy phân tích hình ảnh và phương pháp điện hiển vi góc nghiêng của sfi và mắt cá chân
    trong PET DUE là độ độ trong nhóm ống dẫn d n và độ trong nhóm ống dẫn d n nhóm có bao myelin sợi trục nằm trong nhóm
    ống dẫn d và trong nhóm ống dẫn d trong electron truyền TSM T0, nhóm ống dẫn d cho thấy SF thần kinh có myelin phong phú
    hơn với collagen ngoại bào dày và được tổ chức tốt hơn so với nhóm ống dẫn d và gân GM và BF trong ống dẫn d nhóm ít bị
    teo hơn và giảm tình trạng xơ hóa với ít thâm nhiễm mỡ hơn so với nhóm ống dẫn d. Một kỹ thuật nuôi cấy tế bào d schwann
    mới đã được thiết lập và ống dẫn thần kinh được chế tạo bằng kỹ thuật này cho thấy khả năng tái tạo thần kinh được cải
    thiện nhiều so với ống silicone chứa đầy matrigel và SC được điều chế từ phương pháp nuôi cấy đơn giản thông thường
  - "– Cho trẻ viêm tiểu phế quản tái khám theo đúng lịch hẹn của bác sĩ đã dặn.\n So với các bệnh về hô hấp thông thường,\
    \ bệnh viêm tiểu phế quản ở trẻ em có triệu chứng đặc thù là biểu hiện khò khè, khó thở. Nếu điều trị sai cách khiến triệu\
    \ chứng trở nặng, trẻ có nguy cơ bị suy hô hấp và kéo theo các biến chứng nguy hiểm khác như: tràn khí màng phổi, viêm\
    \ phổi, xẹp phổi, hen phế quản… Do đó, phụ huynh chớ chủ quan mà nên cho bé đi khám kịp thời để được bác sĩ tư vấn phác\
    \ đồ điều trị phù hợp, đảm bảo hiệu quả và an toàn nhé."
- source_sentence: Nguy cơ bị ung thư phổi có liên quan như thế nào đến việc hút thuốc lá điện tử?
  sentences:
  - "– Kết hợp những loại đồ ăn chung không phù hợp ví dụ như ăn đồ quá nóng cùng lúc với đồ quá lạnh hoặc ăn đồ sống lẫn\
    \ với đồ chín,…\n – Uống nhiều rượu bia.\n – Những thói quen ăn uống không tốt như bỏ bữa, ăn quá nhanh, ăn uống tùy ý\
    \ không đúng giờ, ăn đêm, ăn quá no hoặc để bụng quá đói trong 1 bữa,…\n Ăn uống không khoa học là nguyên nhân phổ biến\
    \ gây ra cơn đau dạ dày về đêm.\n 2.2. Do căng thẳng\n Hiện tượng đau dạ dày về ban đêm cũng có thể xảy ra nếu bạn thường\
    \ xuyên rơi vào trạng thái căng thẳng, mệt mỏi trong thời gian dài. Khi căng thẳng, dạ dày phải hoạt động nhiều hơn bình\
    \ thường và tiết ra nhiều acid hơn. Điều này dễ khiến niêm mạc của dạ dày chịu nhiều tổn thương. Đây cũng là lý do vì\
    \ sao khi stress bạn thường gặp phải các vấn đề tiêu hóa như chán ăn, ăn không ngon và trong đó có những cơn đau bụng\
    \ âm ỉ về buổi đêm.\n 2.3. Nguyên nhân bệnh lý ở dạ dày\n Đây là nguyên nhân trực tiếp dẫn đến những cơn đau bụng về đêm.\
    \ Các bệnh dạ dày thường gặp dẫn đến cơn đau về đêm bao gồm:\n – Viêm dạ dày\n – Loét dạ dày\n – Trào ngược dạ dày thực\
    \ quản\n – Viêm hành tá tràng\n – Hội chứng ruột kích thích (IBS)\n – Bệnh Crohn\n – Thậm chí là ung thư\n 2.4. Đau dạ\
    \ dày đêm đến từ bệnh lý khác ngoài đường tiêu hóa\n Một số bệnh lý ngoài đường tiêu hóa sau đây có thể là nguyên nhân\
    \ gây đau dạ dày lúc về đêm:\n – Sỏi mật: Đây cũng là nguyên nhân thường gặp khi bệnh nhân thăm khám với triệu chứng đau\
    \ dạ dày ban đêm. Sỏi mật bị tắt tại ống mật gây ra những cơn đau quặn dữ dội liên tục ở phía dạ dày. Cơn đau có xu hướng\
    \ gia tăng sau một bữa ăn với nhiều chất béo và “hoành hành” khi bạn đã chìm vào giấc ngủ. Cơn đau có thể kèm theo cảm\
    \ giác buồn nôn, nôn, sốt cao, người bệnh bị vàng da vàng mắt và phân có màu trắng.\n – Sỏi thận: Khi viên sỏi di chuyển\
    \ và đi vào niệu quản thì bệnh nhân sẽ gặp phải cơn đau nhói đột ngột ở vùng lưng. Sau đó, cơn đau nhanh chóng lan đến\
    \ dạ dày và cả vùng bụng."
  - Nghiên cứu hiện tại đã so sánh hai hệ thống phân loại khác nhau của bệnh nhân mắc cvid suy giảm miễn dịch VL thông thường,
    một dựa trên sinh tổng hợp globulin miễn dịch trong ống nghiệm và một hệ thống khác dựa trên số lượng tế bào cdnaïve.
    Các tế bào đơn nhân máu ngoại vi (pbmcs) được phân lập từ các bệnh nhân cvid và đối chứng khỏe mạnh mà chúng được kích
    thích cho Sự tiết ra igm và igg T3 kích thích bằng túi SAC i khi bổ sung interleukin il hoặc với các tập hợp tế bào T
    mitogen t pokeweed được ước tính bằng phương pháp đo tế bào dòng chảy bởi hệ thống đầu tiên. igm nhưng o sự trao đổi gen
    nhẹ giữa các quần thể trên cơ sở T0 của cấu trúc di truyền quần thể và quần thể gongliu có độ đa dạng di truyền cao nhất
    cần được ưu tiên cao trong việc bảo tồn nguồn gen malus stirersii trong bảo tồn nguồn gen tại chỗ
  - "Nguy cơ bị ung thư phổi liên quan đến hệ thống phân phối  điện tử (ví dụ: thuốc lá điện tử) vẫn còn được xác định, mặc\
    \ dù người ta cho rằng các sản phẩm của quá trình đốt cháy thuốc lá là các chất gây ung thư chính.\nNguy cơ bị ung thư\
    \ sẽ giảm sau khi ngừng hút thuốc, nhưng không bao giờ trở về mức nguy cơ ở lần khám ban đầu ở những người không bao giờ\
    \ hút thuốc. Có khoảng 15 đến 20% những người bị ung thư phổi chưa bao giờ hút thuốc hoặc hút thuốc rất ít.\nLiệu có hay\
    \ không và lượng phơi nhiễm với radon trong các hộ gia đình là bao nhiêu để dẫn đến tăng nguy cơ bị ung thư phổi thì vẫn\
    \ còn nhiều tranh cãi.\nViêm mạn tính làm tăng nguy cơ mắc nhiều bệnh ung thư, bao gồm cả ung thư phổi. Ví dụ: COPD (bệnh\
    \ phổi tắc nghẽn mạn tính), thiếu hụt alpha-1 antitrypsin và xơ phổi làm tăng độ nhạy cảm với ung thư phổi. Ở những bệnh\
    \ nhân có sẹo ở phổi do các bệnh phổi khác (ví dụ: bệnh lao) có khả năng tăng nguy cơ bị ung thư phổi. Ngoài ra, những\
    \ người hút thuốc có hoạt tính sử dụng chất bổ sung beta-carotene có thể có nguy cơ phát triển ung thư phổi. \n \nĐánh\
    \ giá rủi ro ung thư phổi ở những người đang hút thuốc hiện tại và quá khứ (6 tuổi)\nCác tế bào biểu mô hô hấp đòi hỏi\
    \ phải tiếp xúc kéo dài với tác nhân gây ung thư và tích tụ nhiều đột biến di truyền trước khi trở thành ung thư phổi\
    \ (một hiệu ứng gọi là ung thư trường diễn). \nỞ một số bệnh nhân bị ung thư phổi, các đột biến thứ phát hoặc bổ sung\
    \ ở các gen kích thích sự phát triển của tế bào (K-ras, MYC) gây ra những bất thường trong receptor nhận tín hiệu của\
    \ yếu tố tăng trưởng (EGFR, HER2/neu) và ức chế quá trình chết của tế bào, góp phần làm tăng sự phát triển không kiểm\
    \ soát các tế bào bất thường. Ngoài ra, các đột biến ức chế gen ức chế khối u (ví dụ: p53, APC) có thể dẫn đến ung thư.\
    \ Các đột biến khác có thể là nguyên nhân bao gồm chuyển vị EML-4-ALK và các đột biến ở ROS-1, BRAF và PI3KCA. Các gen\
    \ là nguyên nhân gây ung thư phổi được gọi là đột biến thúc đẩy gen sinh ung thư."
- source_sentence: Tại sao người bệnh nên thăm khám sớm khi có triệu chứng thoái hóa cột sống?
  sentences:
  - "Thời điểm tiêm vắc xin phế cầu cho trẻ thường bắt đầu khi trẻ đủ từ 6 tuần tuổi trở lên. Trẻ sẽ được tiêm ở khu vực cơ\
    \ delta của cánh tay hoặc mặt trước của đùi. Sau đây là những thời điểm cụ thể mà các cha mẹ cần nắm rõ để lưu ý đưa trẻ\
    \ đi tiêm phòng phế cầu đúng lịch:\n 2.1. Tiêm phế cầu cho bé từ 6 tuần đến 6 tháng tuổi\n Trẻ sơ sinh từ 6 tuần đến 6\
    \ tháng tuổi được khuyến cáo áp dụng 1 trong 2 liệu trình tiêm vắc xin như sau:\n Tiêm 3 liều cơ bản: Mũi tiêm đầu tiên\
    \ sẽ được thực hiện khi trẻ tròn mốc 2 tháng tuổi. Mũi thứ 2 sẽ cách mũi đầu 1 tháng và mũi cuối cùng cách mũi thứ 2 sau\
    \ 1 tháng. Trẻ sẽ tiêm mũi nhắc lại sau 6 tháng kể từ ngày hoàn thành mũi thứ 3.\n Tiêm 2 liều cơ bản: Mũi tiêm đầu tiên\
    \ được áp dụng khi trẻ đủ 2 tháng tuổi. Mũi tiêm tiếp theo cách mũi đầu sau 2 tháng.\n Liều tiêm nhắc lại sau ít nhất\
    \ 6 tháng kể từ ngày tiêm mũi cơ bản cuối cùng.\n 2.2. Tiêm vắc xin phế cầu cho trẻ sinh non\n Đối với các bé sinh non\
    \ khi tiêm vắc xin phế cầu cần phải tuân theo chỉ định của bác sĩ chuyên khoa. Thay vì áp dụng lịch tiêm cơ bản như trên,\
    \ các bé sinh non cần được tiêm đủ 4 liều vắc xin phế cầu, mỗi liều 0,5ml.\n Theo đó, 3 mũi tiêm đầu tiên cũng sẽ được\
    \ chỉ định tiêm khi trẻ đủ 2 tháng tuổi. Các mũi 2 và mũi 3 cách nhau 1 tháng. Riêng mũi 4 áp dụng tiêm sau 6 tháng tiếp\
    \ theo.\n 2.3. Tiêm vắc xin cho bé từ 7 – 11 tháng, chưa từng tiêm vắc xin phòng phế cầu khuẩn\n Trẻ nhỏ từ 7 đến 11 tháng\
    \ tuổi sẽ tiêm theo liệu trình 2 mũi cơ bản, khoảng cách giữa các mũi tiêm là 1 tháng. Mũi nhắc lại sẽ tiêm khi trẻ trên\
    \ 1 tuổi hoặc có thể tiêm cách mũi thứ 2 khoảng 2 tháng.\n 2.4. Tiêm vắc xin cho bé đủ 12 đến 23 tháng tuổi\n Liều tiêm\
    \ cho bé từ 12 tháng đến dưới 2 tuổi là 2 liều, mỗi liều tiêm 0,5ml. Khoảng cách giữa 2 liều tiêm tối thiểu 2 tháng."
  - "Triệu chứng thoái hóa cột sống theo từng vị tríTriệu chứng thoái hóa cột sống thường gặp là đau nhức xương khớp. Tùy\
    \ thuộc vào các vị trí nhất định, người bệnh sẽ có biểu hiện và cảm nhận không giống nhau. Khi xuất hiện các triệu chứng\
    \ nghi ngờ thoái hóa, người bệnh nên chủ động thăm khám sớm để được điều trị kịp thời.\n Triệu chứng thoái hóa cột sống\
    \ thường gặp là đau nhức xương khớp. Tùy thuộc vào các vị trí nhất định, người bệnh sẽ có biểu hiện và cảm nhận không\
    \ giống nhau. Khi xuất hiện các triệu chứng nghi ngờ thoái hóa, người bệnh nên chủ động thăm khám sớm để được điều trị\
    \ kịp thời.\n 1. Thoái hóa cột sống là gì?\n Thoái hóa đốt sống là tình trạng lớp sụn khớp bị hao mòn dần dần, trong quá\
    \ trình hoạt động thể chất, các đầu đốt sống sẽ cọ xát trực tiếp vào nhau gây viêm nhiễm, dẫn đến màng hoạt dịch sưng\
    \ tấy và dịch khớp bị khô do dịch khớp bị hạn chế. bài tiết. Ngoài ra, ma sát ở các đầu xương cũng góp phần hình thành\
    \ các gai xương tại đây. Các gai xương phát triển quá mức cọ sát vào đốt sống, rễ thần kinh và các mô mềm xung quanh.\n\
    \ Thoái hóa đốt sống là tình trạng lớp sụn khớp bị hao mòn dần dần, cọ xát vào nhau gây viêm nhiễm.\n 2. Triệu chứng thoái\
    \ hóa cột sống theo vị trí khởi phát\n Hầu hết bệnh nhân đều cảm thấy đau và khó chịu. Cơn đau ở mỗi trường hợp sẽ khác\
    \ nhau tùy theo vị trí đốt sống bị thoái hóa, cụ thể như:\n 2.1. Triệu chứng thoái hóa cột sống thắt lưng cần lưu ý\n\
    \ Triệu chứng của bệnh ở giai đoạn này không rõ ràng, thường chỉ đau nhẹ hoặc không đau, chỉ có cảm giác đau nhẹ ở lưng,\
    \ do sụn khớp mới bắt đầu có dấu hiệu bào mòn nên rất dễ nhầm lẫn với bệnh đau lưng đơn thuần. nỗi đau. Vì vậy, có xu\
    \ hướng chủ quan hướng tới các giai đoạn bệnh nặng hơn.\n Tiếp theo là cơn đau xuất hiện dưới dạng đau âm ỉ, đau khi làm\
    \ việc và biến mất khi nghỉ ngơi, đặc biệt là khi nằm trên sàn cứng (nệm cứng). Đồng thời có dấu hiệu giảm khả năng vận\
    \ động, thường xuyên bị đau nhức, khó chịu khi mang vác vật nặng."
  - "– Chảy máu âm đạo bất thường\n Tình trạng thai ở ngoài tử cung có thể chẩn đoán thông qua siêu âm\n Tình trạng mang thai\
    \ ngoài tử cung nếu có các dấu hiệu nghi ngờ bản thân mang thai ở ngoài tử cung, chị em cần đến các cơ sở y tế chuyên\
    \ khoa để được các bác sĩ chẩn đoán và đưa ra các chỉ định kịp thời.\n Chẩn đoán thai ngoài tử cung thường sử dụng các\
    \ phương pháp sau:\n – Thử thai: Việc kiểm tra nồng độ hormone hCG (human chorionic gonadotropin) trong máu có thể cung\
    \ cấp thông tin quan trọng và bước đầu kiểm tra được chị em có đang mang thai hay không,\n – Siêu âm thai: Thông qua siêu\
    \ âm để bác sĩ xác định vị trí, sự phát triển của thai ngoài tử cung và xác nhận chẩn đoán một cách chính xác.\n – Xét\
    \ nghiệm máu có thể được sử dụng để kiểm tra mức độ hCG và các yếu tố khác trong máu, giúp chẩn đoán thai ngoài tử cung\n\
    \ Ngoài ra, bác sĩ cũng sẽ đánh giá các triệu chứng lâm sàng như đau vùng bụng dưới, chảy máu âm đạo, và cảm giác đau\
    \ khi quan hệ tình dục để đưa ra kết quả đầy đủ về tình trạng sức khỏe.\n 2. Thai ngoài tử cung được điều trị bằng cách\
    \ nào?\n Khối thai nằm ngoài tử cung không thể di chuyển về lại tử cung và cũng không thể tiếp tục phát triển như thai\
    \ bình thường. Chính vì thế cần phải loại bỏ sớm để tránh các biến chứng nguy hiểm có thể xảy ra. Tùy vào mỗi trường hợp\
    \ cụ thể mà bác sĩ sẽ chỉ định phương pháp điều trị khối thai ngoài tử cung.\n – Điều trị nội khoa: Bác sĩ có thể chỉ\
    \ định điều trị bằng thuốc Methotrexate để ngăn chặn sự phát triển của tế bào và kết thúc thai kỳ, thuốc thường được áp\
    \ dụng cho các trường hợp có giai đoạn thai ngoài tử cung chưa phát triển lớn, kích thước nhỏ.\n – Phẫu thuật nội soi:\
    \ Bác sĩ sẽ áp dụng phương pháp này trong trường hợp mang thai ở ngoài tử cung đã phát triển nhưng chưa bị vỡ. Tùy vào\
    \ từng trường hợp sẽ phải loại bỏ cả khối thai ngoài tử cung lẫn vòi trứng, hoặc bảo tồn vòi trứng."
- source_sentence: Mục đích chính của T0 là gì?
  sentences:
  - "Sâu răng càng nặng, răng sẽ càng chịu nhiều tổn thương. Thậm chí, nếu không được điều trị sớm, sâu răng sẽ tấn công và\
    \ khiến cho rằng hàm vỡ hết chỉ còn chân răng.\n 2. Mức độ nguy hiểm của răng hàm vỡ chỉ còn chân răng\n Tình trạng răng\
    \ cối bị sâu dẫn tới vỡ chỉ còn chân răng rất nguy hiểm. Nếu không được chăm sóc và điều trị kịp thời sẽ dẫn tới nhiều\
    \ biến chứng gây ảnh hưởng nghiêm trọng tới sức khỏe người bệnh.\n 2.1 Ảnh hưởng chức năng ăn nhai của răng\n Khi tổ chức\
    \ cứng của răng bị phá hủy càng nhiều, răng sẽ càng dễ vỡ. Thời điểm răng chỉ còn lại chân, chức năng ăn nhai của răng\
    \ cũng sẽ mất.\n 2.2 Viêm lợi\n Sâu răng sẽ tạo ra những lỗ, hốc sâu. Đây chính là vị trí thuận lợi để răng sâu lưu giữ\
    \ thức ăn. Lâu ngày, điều này sẽ dẫn tới hình thành ổ vi khuẩn, gây hôi miệng. Bên cạnh đó, khi răng xuất hiện hốc sâu,\
    \ lợi sẽ dễ có xu hướng lấp kín hốc sâu đó. Phần lợi này sẽ dễ bị viêm, sưng, chảy máu cho phải chà sát nhiều trong quá\
    \ trình ăn nhai.\n 2.3 Viêm tủy, nhiễm trùng chóp răng\n Khi tình trạng sâu răng hàm chuyển biến nặng sẽ dẫn tới đau nhức,\
    \ viêm tủy, viêm chóp răng gây nguy hiểm\n Sâu răng khi chuyển nặng, sâu xuống dưới và vào tủy sẽ khiến răng bị đau nhức\
    \ do viêm tủy. Khi tình trạng viêm tủy trở nên nghiêm trọng, lan sâu xuống chóp răng sẽ gây viêm nhiễm vùng chóp. Khi\
    \ này, răng sẽ bị đau, lung lay, phần lợi xung quang sẽ sưng to. Lâu ngày, ổ abscess chóp răng sẽ hình thành. Vấn đề này\
    \ không được xử lý sớm sẽ chính là nguy cơ mất răng và lây lan sang cả những răng lân cận.\n Ổ nhiễm trùng chóp răng lây\
    \ lan sẽ gây viêm xương hàm. Sau đó, nếu không được khắc phục, phần mềm và các tổ chức lân cận cũng sẽ bị ảnh hưởng tạo\
    \ nên ổ nhiễm trùng lớn rất khó để kiểm soát.\n Khi ổ nhiễm trùng lan rộng sẽ tạo ra nang to. Chúng phá hủy xương hàm\
    \ và khiến xương hàm bị gãy, gây tổn thương thần kinh, đường mạch máu, …\n 3."
  - "Có nhiều hình thái bệnh biểu thị mức độ nặng nhẹ khác nhau. Thông thường có 3 hình thái biểu hiện bệnh nhẹ tới nặng như\
    \ sau:\n– Mi mắt dưới sưng đỏ, nổi cục, có vảy, cảm giác vướng mí nhẹ. Triệu chứng này có thể xuất hiện ở bên trong hoặc\
    \ bên ngoài mí mắt dưới\n– Các nốt nổi gây ngứa, sưng đỏ, tiết nhiều tiết tố khiến mi bị bám dính. Lúc này bờ mi chưa\
    \ bị loét\n– Mí mắt tấy đỏ, ngứa, đau rát, bắt đầu có các vết loét\nBệnh không gây giảm, mất thị lực hay các hậu quả nghiêm\
    \ trọng nhưng lại dễ tái phát gây khó chịu. Cần phát hiện kịp thời các dấu hiệu bất thường để có phương án điều trị phù\
    \ hợp và nhanh chóng. Nếu để bệnh dai dẳng dễ trở thành tiền đề, tạo điều kiện cho các bệnh lý khác tấn công đôi mắt bạn.\n\
    \ 3. Điều trị viêm mí mắt khoa học\n 3.1. Biện pháp vệ sinh, hạn chế tình trạng viêm mí mắt dưới nặng hơn\n Như đã đề\
    \ cập, cần phát hiện sớm các dấu hiệu để có các biện pháp điều trị kịp thời, hạn chế các tác động tiêu cực lên mắt. Tùy\
    \ vào chuyển biến của bệnh mà bạn có thể lựa chọn các phương pháp điều trị phù hợp, đồng thời thực hiện các biện pháp\
    \ dưới đây:\n– Dùng kính bảo hộ tránh tác động của khói bụi. Dừng sử dụng kính áp tròng với mục đích làm đẹp và sử dụng\
    \ kính gọng thông thường thay thế trong trường hợp mắc cận thị, viễn thị, loạn thị,…\n– Vệ sinh mi mắt bằng các vật dụng\
    \ y tế như gạc, bông,… tránh sử dụng các loại khăn chà sát. Chú ý rửa bằng nước muối sinh lý, nước ấm giúp bong lớp vảy\
    \ và giảm tiết nhờn\n– Dùng khăn ấm chườm lên vùng mí mắt bị sưng viêm\nTuy nhiên, nếu bạn đã cố gắng đảm bảo giữ mi mắt\
    \ sạch sẽ mà tình trạng viêm mí mắt dưới vẫn có chiều hướng nặng hơn thì hãy gặp các bác sĩ chuyên khoa\n Bệnh nhân nên\
    \ lựa chọn cơ sở y tế uy tín điều trị bệnh.\n 3.2. Điều trị bệnh viêm mí mắt dưới an toàn hơn khi gặp bác sĩ\n Các bác\
    \ sĩ sẽ tư vấn và có hướng điều trị tốt hơn như:\n– Sử dụng các loại kháng sinh dạng thuốc nhỏ mắt hoặc thuốc mỡ bôi."
  - Mục đích của T0 này là so sánh hiệu quả của bài tập chuyển động thụ động và bài tập chuyển động AS đối với sức khỏe chức
    năng ở các đối tượng và phương pháp của cư dân viện dưỡng lão cao tuổi. Hai mươi ba cư dân tại viện dưỡng lão nam và nữ
    tình nguyện tham gia T0 này, họ được chia thành một nhóm thụ động nhóm tập thể dục chuyển động n và một nhóm tập thể dục
    chuyển động AS n và thực hiện các buổi tập tối thiểu hai lần một tuần trong nhiều tuần ghế tập thể hình PET đứng lên ngồi
    vươn tay ra sau Các bài kiểm tra FR và đi bộ tối thiểu đã được đánh giá trước đó và T3 kết quả can thiệp không có đường
    cơ sở đáng kể sự khác biệt được ghi nhận giữa các nhóm về các biến đo được sau can thiệp trong tuần không có nhóm tương
    tác đáng kể nào Ã thời gian được ghi nhận trong các biến thể dục chức năng giữa CG ngoại trừ điểm FR Bài tập chuyển động
    AS Bài tập chuyển động thụ động cải thiện đáng kể theo thời gian đã được ghi nhận trong bài tập chuyển động thụ động nhóm
    ngồi trên ghế cong đứng lên điểm đi bộ và đi bộ tối thiểu và trong nhóm tập thể dục chuyển động tích cực ngồi trên ghế
    cong đứng lên điểm đi bộ FR và đi bộ tối thiểu tỷ lệ tuân thủ trong các nhóm tập thể dục thụ động và chuyển động AS lần
    lượt là kết luận bài tập chuyển động thụ động và bài tập chuyển động tích cực được cho là có hiệu quả tương tự trong việc
    cải thiện thể lực PET của người già ở viện dưỡng lão
