- source_sentence: Thành phố San Fernando là một phần của nước nào và có bao nhiêu dân số?
  sentences:
  - Boule-d'Amont là một xã trong vùng Occitanie, thuộc tỉnh Pyrénées-Orientales, quận Prades, tổng Vinça. Tọa độ địa lý của
    xã là 42° 34' vĩ độ bắc, 02° 36' kinh độ đông. Boule-d'Amont nằm trên độ cao trung bình là 483 mét trên mực nước biển,
    có điểm thấp nhất là 234 mét và điểm cao nhất là 1.348 mét. Xã có diện tích 23,22 km², dân số vào thời điểm 1999 là 73
    người; mật độ dân số là 3 người/km².
  - 'Thành phố San Fernando là một trong ba thành phố lớn của Trinidad và Tobago, là đô thị lớn thứ hai. Thành phố có diện
    tịch 18 km² và nằm ở phía tây nam của đảo Trinidad. Nó giáp sông Guaracara về phía bắc, giáp sông Oropouche về phía nam,
    giáp quốc lộ Sir Solomon Hochoy về phía đông, và vịnh Paria về phía tây. Dân số ước tính năm 2000 là 62.000 người. Đô
    thị San Fernando được nâng cấp thành thành phố ngày 18 tháng 11 năm 1988. Khẩu hiệu của San Fernando là: "Sanitas Fortis"
    - "Trong một môi trường lành mạnh chúng ta sẽ tìm thấy sức mạnh".'
  - 'Các dự án quân sự bản địa khác liên quan đến việc thiết kế và bổ sung hàng không mẫu hạm lớp "Vikrant" và tàu ngầm hạt
    nhân lớp "Arihant".

    Sau khi kết thúc Chiến tranh Lạnh,Ấn Độ tăng cường hợp tác về kinh tế,chiến lược và quân sự với Hoa Kỳ và Liên minh châu
    Âu. Năm 2008, Hoa Kỳ và Ấn Độ ký kết một thỏa thuận hạt nhân dân sự.Mặc dù đương thời Ấn Độ là quốc gia sở hữu vũ khí
    hạt nhân và không phải là một bên tham gia của Hiệp ước không phổ biến vũ khí hạt nhân,song quốc gia này vẫn nhận được
    sự miễn trừ từ Cơ quan Năng lượng Nguyên tử Quốc tế và Nhóm các nhà cung cấp hạt nhân,do vậy thoát khỏi các hạn chế,rào
    cản trước đây đối với công nghệ và thương mại hạt nhân. Như một hệ quả, Ấn Độ trở thành quốc gia thứ sáu sở hữu vũ khí
    hạt nhân "trên thực tế". Ấn Độ sau đó ký kết các thỏa thuận hợp tác liên quan đến năng lượng hạt nhân dân sự với Nga,
    Pháp, Anh Quốc, và Canada.

    Tổng thống Ấn Độ là thống soái tối cao của lực lượng vũ trang quốc gia với 1,6 triệu quân tại ngũ và xếp thứ ba thế giới
    trên tiêu chí này. Quân đội Ấn Độ gồm có lục quân, hải quân, và không quân; các tổ chức phụ trợ gồm có Bộ tư lệnh chiến
    lược (Strategic Forces Command) và ba nhóm bán quân sự: Đội quân súng trường Assam, Lực lượng biên cảnh đặc chủng, và
    Lực lượng bảo vệ bờ biển Ấn Độ. Ngân sách quốc phòng chính thức của Ấn Độ giai đoạn 2012-17 chiếm khoảng 2,5% GDP. Năm
    2012, Ấn Độ là nước nhập khẩu vũ khí lớn nhất thế giới;từ năm 2007 đến năm 2011, tiền mua vũ khí của Ấn Độ chiếm 10% tổng
    phí tổn dành cho mua sắm vũ khí. Phần lớn chi tiêu quân sự tập trung vào phòng thủ đối với riêng Pakistan và chống lại
    ảnh hưởng ngày càng gia tăng của Trung Quốc tại Ấn Độ Dương.

    Một trận ẩu đả dữ dội giữa quân đội Trung Quốc và Ấn Độ tại khu vực lãnh thổ tranh chấp đã làm 20 binh sĩ Ấn Độ và ít
    nhất 4 binh sĩ Trung Quốc thiệt mạng.'
- source_sentence: Sự khác biệt giữa các loại sao về nhiệt độ bề mặt là gì?
  sentences:
  - 'Một khi việc cấp phát vùng nhớ động không còn cần thiết nữa thì phần bộ nhớ đó nên được trả về cho hệ điều hành. Thao
    tác này có thể tiến hành bằng hàm codice_134. Nó cần một tham số: tên của con trỏ mà trước đây đã xin cấp phát vùng nhớ.
    Một cách an toàn hơn là sau khi đã trả vùng nhớ về cho hệ điều hành, người lập trình cũng nên cài (hay gán) cho con trỏ
    liên đới giá trị codice_135 để hủy bỏ địa chỉ mà nó đang chỉ tới (nhằm tránh gây ra các hiệu ứng phụ do việc tham chiếu
    của con trỏ này có thể gây ra).

    Các mảng đa chiều.

    C có hỗ trợ việc dùng mảng đa chiều. Việc định nghĩa chúng giống như là tạo ra "mảng của các mảng ", mặc dù vậy trong
    thực tế nó không hoàn toàn đúng. Cú pháp sau:

    sẽ định nghĩa một mảng hai chiều; chiều thứ nhất có codice_136 phần tử. Chiều thứ hai sẽ có codice_137 các phần tử—một
    tập hợp của codice_138 các phần tử mà mỗi phần tử là một chiều thứ nhất.

    Các mảng đa chiều hoàn toàn có thể được xem như là dãy của các con trỏ. Trong thí dụ trên, codice_139 (nếu codice_136
    là 1) sẽ là một tham chiếu giá trị nguyên mà nó chỉ tới một mảng của codice_138 các phần tử.

    Dãy ký tự.

    Dãy ký tự có thể được thay đổi nội dung của nó mà không cần đến thư viện chuẩn. Tuy nhiên, thư viện này có nhiều hàm có
    thể dùng cho cả dãy ký tự có kết thúc 0 và mảng không có ký tự kết thúc kiểu codice_84. Trong phần này từ "dãy" được để
    chỉ dãy ký tự.

    Các hàm thường dùng là:

    Các hàm ít dùng tới hơn là:

    Tập tin I/O.

    Trong C, I/O được tiến hành qua một nhóm các hàm trong thư viện chuẩn. Trong ANSI/ISO C, những hàm đó được định nghĩa
    trong codice_202.

    Tiêu chuẩn I/O.

    Ba tiêu chuẩn dòng I/O được định nghĩa sẵn là:

    Các dòng này được tự động mở và đóng lại bởi môi trường của thời gian thi hành, chúng không cần và không nên được mở một
    cách rõ ràng.

    Thí dụ sau minh họa làm thế nào một chương trình bộ lọc được cấu trúc một cách điển hình:

    Việc chuyển các đối số qua dòng lệnh.'
  - "Số lượng nguyên tử chì cao cũng làm tăng mật độ của vật liệu, vì chì có trọng lượng nguyên tử rất cao là 207,2, so với\
    \ 40,08 đối với calci. Mật độ của ly soda là 2,4g/cm³ hoặc thấp hơn, trong khi tinh thể chì điển hình có mật độ khoảng\
    \ 3,1g/cm³ và kính chì cao có thể trên 4,0g/cm³ hoặc thậm chí lên tới 5,9g/cm³ \nSự sáng chói của tinh thể chì phụ thuộc\
    \ vào chỉ số khúc xạ cao gây ra bởi hàm lượng chì. Thủy tinh thông thường có chiết suất \"n\" = 1,5, trong khi việc bổ\
    \ sung chì tạo ra phạm vi lên tới 1,7 hoặc 1,8. Chỉ số khúc xạ tăng cao này cũng tương quan với độ tán sắc tăng, đo mức\
    \ độ mà môi trường phân tách ánh sáng thành quang phổ thành phần của nó, như trong lăng kính. Kỹ thuật cắt pha lê khai\
    \ thác các tính chất này để tạo ra hiệu ứng lấp lánh rực rỡ khi mỗi khía cạnh cắt phản xạ và truyền ánh sáng qua vật thể.\
    \ Chỉ số khúc xạ cao rất hữu ích cho việc chế tạo ống kính, vì có thể đạt được độ dài tiêu cự nhất định với ống kính mỏng\
    \ hơn. Tuy nhiên, độ phân tán phải được hiệu chỉnh bởi các thành phần khác của hệ thống thấu kính nếu nó bị mờ.\nViệc\
    \ bổ sung oxide chì vào thủy tinh kali cũng làm giảm độ nhớt của nó, khiến nó lỏng hơn thủy tinh soda thông thường trên\
    \ nhiệt độ làm mềm (khoảng ), với điểm làm việc là . Độ nhớt của thủy tinh thay đổi hoàn toàn theo nhiệt độ, nhưng thủy\
    \ tinh chì nhỏ hơn khoảng 100 lần so với kính soda thông thường trong phạm vi nhiệt độ làm việc (lên tới ). Từ quan điểm\
    \ của thợ làm kính, điều này dẫn đến hai sự phát triển thực tế. Đầu tiên, thủy tinh chì có thể được chế tạo ở nhiệt độ\
    \ thấp hơn, dẫn đến việc sử dụng nó trong việc tráng men, và thứ hai, các mạch rõ ràng có thể được làm sạch khỏi bọt khí\
    \ bị kẹt với độ khó thấp hơn đáng kể so với kính thông thường, cho phép chế tạo các vật thể hoàn hảo, rõ ràng.\nKhi gõ,\
    \ pha lê chì tạo ra âm thanh vang lên, không giống như kính thông thường. Người tiêu dùng vẫn dựa vào đặc tính này để\
    \ phân biệt với kính rẻ hơn."
  - 'Nhiệt độ bề mặt của sao, cùng với độ sáng biểu kiến tuyệt đối và các đặc trưng của vạch hấp thụ trong quang phổ, thường
    được sử dụng để phân loại sao (xem phân loại bên dưới).

    Các sao khối lượng lớn ở dải chính có nhiệt độ bề mặt lên tới 50.000 K. Các sao nhỏ hơn như Mặt Trời có nhiệt độ 6000
    K. Những sao khổng lồ đỏ có nhiệt độ bề mặt tương đối thấp vào khoảng 3.600 K, nhưng chúng cũng có độ trưng tương đối
    lớn do diện tích mặt ngoài lớn.

    Bức xạ.

    Năng lượng được sản xuất ra bởi sao, là sản phẩm của phản ứng tổng hợp hạt nhân, bức xạ vào trong không gian bằng cả bức
    xạ điện từ và bức xạ hạt. Ngôi sao phát ra bức xạ hạt cũng chính là gió Sao Thổi vào không gian (tồn tại như là một dòng
    các hạt tích điện ổn định, như proton, hạt anpha, và hạt beta, thoát ra từ các lớp ngoài cùng của sao) và dòng ổn định
    các hạt neutrino thoát ra từ lõi sao.

    Sản phẩm năng lượng tại lõi cũng là nguyên nhân tại sao ngôi sao chiếu sáng: mỗi lần hai hoặc nhiều hơn hạt nhân nguyên
    tử của một nguyên tố tổng hợp với nhau để tạo thành một hạt nhân của nguyên tố mới nặng hơn, các photon tia gamma được
    giải phóng từ phản ứng tổng hợp hạt nhân. Năng lượng này được biến đổi thành các dạng năng lượng điện từ khác, bao gồm
    ánh sáng khả kiến, theo thời gian chúng truyền đến các lớp bên ngoài của sao.

    Màu sắc của một sao, được xác định bởi đỉnh tần số của ánh sáng khả kiến, phụ thuộc vào nhiệt độ các lớp ngoài cùng của
    ngôi sao, bao gồm quang quyển của nó. Bên cạnh ánh sáng khả kiến, ngôi sao cũng phát ra các dạng bức xạ điện từ không
    nhìn thấy được bằng mắt thường. Thực tế bức xạ điện từ phát ra từ ngôi sao trải rộng trên toàn phổ điện từ, từ bước sóng
    dài nhất là sóng radio, hồng ngoại cho đến bước sóng ngắn nhất như tia tử ngoại, tia X, và tia gamma. Mọi bước sóng bức
    xạ điện từ của ngôi sao, cả nhìn thấy và không nhìn thấy, đều có ý nghĩa quan trọng.

    Sử dụng phổ của ngôi sao, các nhà thiên văn cũng xác định được nhiệt độ bề mặt, hấp dẫn tại bề mặt, tính kim loại (metallicity)
    và vận tốc tự quay của sao.'
- source_sentence: Tại sao vấn đề Đài Loan độc lập lại phức tạp?
  sentences:
  - 'Marie-Ségolène Royal (sinh ngày 22 tháng 9 năm 1953 tại Dakar, Senegal, Tây Phi thuộc Pháp), được gọi là Ségolène Royal
    (), là một chính trị gia Pháp. Bà là chủ tịch Hội đồng Vùng Nouvelle-Aquitaine, một cựu thành viên của Quốc hội, cựu bộ
    trưởng trong chính phủ, và là một thành viên có ảnh hưởng của Đảng Xã hội Pháp. Người phụ nữ đầu tiên tại Pháp được chỉ
    định bởi một đảng lớn làm ứng cử viên trong cuộc bầu cử tổng thống Pháp năm 2007 nhưng đã thua cuộc trước Nicolas Sarkozy
    ngày 6 tháng 5 năm 2007.

    Ngày 28 tháng 11 năm 2008, Royal tuyên bố tư cách ứng cử viên cho cuộc bầu cử Tổng thống Pháp trong cuộc bầu cử tổng thống
    năm 2012.

    Tuổi trẻ.

    Ségolène Royal ra đời tại một căn cứ quân sự ở Ouakam, Dakar, Senegal ngày 22 tháng 9 năm 1953, là con gái của Hélène
    Dehaye và Jacques Royal, một cựu sĩ quan pháp binh và trợ lý cho thị trưởng Chamagne (Vosges).

    Cha mẹ bà đã sinh tám người con trong chín năm: Marie-Odette, Marie-Nicole, Gérard, Marie-Ségolène, Antoine, Paul, Henri
    và Sigisbert.

    Sau khi học xong trung học, Marie-Ségolène vào trường đại học địa phương nơi bà tốt nghiệp ở vị trí thứ hai trong lớp
    ngành Kinh tế. Chị cả của bà sau đó hướng bà chuẩn bị cho kỳ thi đầu vào Sciences Po và bà được học bổng tại đây. Trong
    trường bà nghiên cứu chính trị của lớp và sự bình đẳng nam nữ. ("Sciences Po" khi ấy có tới 85% sinh viên thuộc tầng lớp
    trên người Paris và chủ yếu là nam giới). Mùa hè năm 1971, bà làm công không lương tại Dublin, Ireland. Năm 1972, khi
    19 tuổi, Royal đã kiện cha mình vì ông từ chối li dị mẹ bà và trả tiền cấp dưỡng và tiền nuôi dạy con cho việc học tập
    của các con. Bà thắng kiện sau nhiều năm hầu toà, ngay trước khi Jacques Royal chết vì ung thư phổi năm 1981. Sáu trong
    tám người con đã từ chối gặp lại ông, trong đó có cả Ségolène.

    Royal, như hầu hết giới tinh hoa chính trị Pháp, là người tốt nghiệp Trường Hành chính quốc gia (ENA). Bà học cùng lớp
    với người bạn đời trong 30 năm, François Hollande (bà gặp ông tại một bữa tiệc), và Dominique de Villepin (thủ tướng dưới
    thời Jacques Chirac).'
  - 'Mặc dù Trung Hoa Dân Quốc thống trị khu vực Đài Loan từ thập niên 1950 có tính độc lập, đồng thời đa số dân chúng cho
    rằng tự thân có chủ quyền quốc gia, song do chịu uy hiếp quân sự của nước Cộng hòa Nhân dân Trung Hoa, khiến vấn đề Đài
    Loan độc lập cực kỳ phức tạp. Đại bộ phận dân chúng hy vọng duy trì hiện trạng hai bờ eo biển Đài Loan, song số lượng
    người chủ trương độc lập đông hơn người chủ trương thống nhất. Ngoài ra, một bộ phận nhân sĩ chủ trương việc Trung Hoa
    Dân Quốc thu hồi Đài Loan theo "Tuyên bố Cairo" có tranh nghị, cho rằng Trung Hoa Dân Quốc chỉ đại diện cho Đồng Minh
    chiếm lĩnh quân sự Đài Loan và Bành Hồ; đồng thời căn cứ theo Hiệp ước San Francisco tuyên bố chủ quyền Đài Loan chưa
    xác định,cho rằng Trung Hoa Dân Quốc là chính phủ lưu vong nước ngoài từ miền eo biển bên kia.

    Hành chính.

    Sau khi chính phủ Trung Hoa Dân Quốc dời sang Đài Loan vào năm 1949, họ chỉ có thể thống trị các đảo thuộc tỉnh Đài Loan
    (bao gồm đảo Đài Loan, quần đảo Bành Hồ) và tỉnh Phúc Kiến (bao gồm Kim Môn, Mã Tổ). Ngoài ra, chính phủ Trung Hoa Dân
    Quốc còn khống chế quần đảo Đông Sa, và đảo Ba Bình thuộc quần đảo Trường Sa trên biển Đông, giao các đảo này cho thành
    phố Cao Hùng phụ trách quản lý. Trung Hoa Dân Quốc tham gia tranh chấp chủ quyền quần đảo Trường Sa (gọi là Nam Sa) và
    quần đảo Senkaku (gọi là Điếu Ngư đài). Từ năm 1949 trở đi, chính phủ Trung Hoa Dân Quốc từng nhiều lần cải cách phân
    chia hành chính nhằm tổng hợp phát triển khu vực. Trong đó, chức năng của chính phủ cấp tỉnh của tỉnh Phúc Kiến và tỉnh
    Đài Loan lần lượt được tinh giản vào năm 1956 và 1998, chỉ duy trì công tác mang tính tượng trưng.

    Ngoài ra, vào năm 1967 và năm 1979, thành phố Đài Bắc và thành phố Cao Hùng lần lượt được tách khỏi tỉnh Đài Loan để chuyển
    sang trực thuộc trung ương. Năm 2010, chính phủ lại chuyển các thành phố Tân Bắc, Đài Trung, Đài Nam sang trực thuộc trung
    ương. Năm thành phố này cũng là năm thành thị trọng yếu nhất của Trung Hoa Dân Quốc hiện nay, trong đó Tân Bắc nguyên
    là huyện Đài Bắc, Đài Trung cùng Đài Nam và Cao Hùng hợp nhất với các huyện cùng tên.'
  - 'Theo luật, Quỹ bao gồm một hội đồng quản trị của năm công dân Thụy Điển hay Na Uy, với trụ sở tại Stockholm. Chủ tịch
    Hội đồng quản trị được Vua Thụy Điển bổ nhiệm, với bốn thành viên khác do ủy thác của các tổ chức trao giải thưởng bổ
    nhiệm. Một giám đốc điều hành được lựa chọn trong số các thành viên hội đồng quản trị, Phó giám đốc được Vua Thụy Điển
    bổ nhiệm, và hai phó chủ tịch được bổ nhiệm do người được ủy thác. Tuy nhiên, kể từ năm 1995, tất cả các thành viên của
    hội đồng quản trị được lựa chọn bởi các ủy viên quản trị; Giám đốc điều hành và các Phó Giám đốc chỉ định bởi chính hội
    đồng quản trị. Cũng như hội đồng quản trị, Quỹ Nobel được tạo thành từ các tổ chức trao giải (Viện Hàn lâm Khoa học Hoàng
    gia Thụy Điển, Đại hội đồng Nobel tại Viện Karolinska, Viện Hàn lâm Thụy Điển, và các Ủy ban Nobel Na Uy), người được
    ủy thác của các tổ chức trên, và các kiểm toán viên.

    Huy chương Nobel.

    Huy chương Nobel làm bằng 150 gram vàng 18 ca-ra chạm hình Alfred Nobel. Mặt sau của tấm huy chương giải Nobel Vật lý
    và Hóa học là hình một phụ nữ để ngực trần.

    Một số tấm huy chương Nobel đã được chủ nhân mang ra bán đấu giá. Tấm huy chương Nobel Hòa bình được bán rẻ nhất trong
    đấu giá đó là của Aristide Briand, người Pháp đã có đóng góp lớn trong năm 1926 vào cuộc hoà hợp ngắn ngủi Đức – Pháp.
    Năm 2008 huy chương Nobel này được bảo tàng Ecomusée của Saint-Nazaire mua về với khoản tiền 12 nghìn euro. Khá hơn một
    chút, huy chương Nobel Hoà bình của người Anh William Randal Cremer vinh danh năm 1903 đã bán với giá 17.000 đô la tại
    một cuộc đấu giá năm 1985.

    Từ năm 2014, việc bán huy chương Nobel trở nên phổ thông. Cho tới giờ 8 huy chương đã được bán kể từ đó. Cũng về giải
    Nobel Hoà bình, tấm huy chương của người Bỉ Auguste Beernaert (được trao năm 1909) đã đạt tới giá 661 nghìn đô la và huy
    chương Nobel của Carlos Saavedra Lamas, người Argentina, nhận năm 1936, thậm chí đã tìm được người mua với giá kỷ lục
    1,16 triệu đô la.

    Kỷ lục hiện nay là huy chương của James Watson, người Mỹ được nhận giải nobel Y học năm 1962 cho những phát hiện ra cấu
    trúc DNA. Ông đã bán được tấm huy chương Nobel của mình với giá 4,76 triệu đô la Mỹ vào tháng 12/2014.'
- source_sentence: Phong trào kháng chiến Na Uy đã hoạt động như thế nào trong thời gian chiếm đóng?
  sentences:
  - 'Michael Walzer (3/3/1935) là một trong số các triết gia chính trị hàng đầu của Mỹ, giáo sư về hưu của Institute for Advanced
    Study, Đại học Princeton ở New Jersey, đồng thời là tổng biên tập tạp chí khoa học Dissent, theo thiên hướng cánh tả,
    ra hàng quý, về chính trị và văn hóa. Các đề tài của ông trải rộng từ tính hợp pháp của các cuộc chiến cho tới dân tộc
    và nhân chủng học, kinh tế, xã hội và trách nhiệm chính trị, với 27 sách và 300 bài viết, thành viên của hội triết gia
    Hoa Kỳ.

    Sinh ở New York City, nhưng Walzer xuất thân từ một gia đình Do Thái gốc Đông Âu, được đào tạo bậc đại học trong ngôi
    trường Do Thái đầu tiên trên đất Mỹ Brandeis University. Một phần do môi trường chính trị Hoa Kỳ không có nhiều chỗ hoạt
    động cho cánh tả mà ông quyết định xuống đường cùng phong trào sinh viên chống Chiến tranh Việt Nam.

    Một trong số các phạm trù chính của Walzer là khái niệm "communitarianism" trong chính trị học, bên cạnh các tên tuổi
    như Alasdair MacIntyre và Michael Sandel. Khái niệm này có lẽ nên được tạm dịch là Chủ nghĩa cộng đồng, vì nó liên quan
    và bắt nguồn từ chữ "community", và đề cao các giá trị chung trong khuôn khổ xã hội công dân ("civic society") như một
    phản đề đối với chủ nghĩa cá nhân, và có khác với "communalism", tức là Chủ nghĩa công xã, và tất nhiên còn khác xa với
    Chủ nghĩa cộng sản - "communism". Walzer cũng đóng góp nhiều trong lý thuyết về cuộc chiến chính nghĩa - "just war".

    Walzer cho rằng mỗi lý thuyết chính trị cần phải khởi nguồn từ một xã hội nhất định với truyền thống và văn hóa riêng,
    phản đối xu hướng trừu tượng hóa triết học chính trị. Mô hình "communitarian" theo cách hiểu của Walzer là một xã hội
    với những sự bình đẳng không đồng nhất - "complex equality". Theo đó, thước đo của bình đẳng không chỉ đơn giản là vật
    chất hay đạo đức, mà nên hiểu theo nghĩa công bằng một cách công bình ("egalitarian justice"), tức là phân phối hàng hóa
    (vật chất và đạo đức) tùy thuộc vào giá trị xã hội của nó và không được phép (tiền và quyền lực chính trị cũng là một
    thứ hàng hóa) chiếm ưu thế hoặc thay đổi sự phân phối của các loại hàng hóa khác trong các lãnh vực khác.'
  - 'Vua Haakon và chính phủ Na Uy tiếp tục cuộc chiến trong hoàn cảnh tị nạn tại Rotherhithe, Luân Đôn. Vào ngày cuộc xâm
    lược diễn ra, vị đồng lãnh đạo của Đảng Quốc gia-Xã hội nhỏ Nasjonal Samling — Vidkun Quisling — đã tìm cách lên nắm quyền
    lực, nhưng đã bị quân chiếm đóng Đức gạt ra rìa. Quyền lực thực sự nằm trong tay chính quyền chiếm đóng Đức, Reichskommissar
    Josef Terboven. Quisling, với tư cách "bộ trưởng tổng thống", sau này đã thành lập một chính phủ liên minh dưới sự quản
    lý của Đức. Các cơ sở tại Na Uy đã chế tạo nước nặng, một nguyên liệu chủ chốt chế tạo vũ khí hạt nhân, và cuối cùng đã
    bị người Đức bỏ lại sau nhiều nỗ lực phá huỷ cơ sở Vemork của người Na Uy, người Anh và người Mỹ. Trong những năm chiếm
    đóng của Phát xít, người Na Uy đã xây dựng một phong trào kháng chiến mạnh chống lại các lực lượng chiếm đóng Đức bằng
    cả chiến tranh vũ trang và bất tuân dân sự. Tuy nhiên, yếu tố quan trọng hơn với Đồng Minh, là vai trò của hải quân thương
    mại Na Uy. Ở thời điểm xảy ra cuộc xâm lược, Na Uy có hạm đội tàu biển thương mại đứng hàng thứ tư thế giới (cũng như
    có tốc độ nhanh nhất và hiệu quả nhất). Công ty tàu biển Na Uy Nortraship đã nằm dưới sự điều khiển của Đồng Minh trong
    suốt cuộc chiến và tham gia vào mọi chiến dịch từ việc sơ tán Dunkirk tới cuộc đổ bộ vào Normandy.

    Sau cuộc chiến, những thành viên đảng Dân chủ Xã hội lên nắm quyền và lãnh đạo quốc gia trong hầu hết thời gian cuộc chiến
    tranh lạnh. Na Uy đã gia nhập NATO năm 1949, và trở thành một đồng minh thân cận của Hoa Kỳ. Hai cuộc trưng cầu dân ý
    nhằm gia nhập Liên minh châu Âu (được gọi là Cộng đồng châu Âu năm 1972) đã thất bại với tỷ số mong manh năm 1972 và 1994.
    Những nguồn dự trữ dầu mỏ và khí gas lớn đã được khám phá trong thập niên 1960, dẫn tới sự bùng nổ kinh tế sau đó.

    Địa lý, khí hậu và môi trường.

    Na Uy gồm phần phía tây của Scandinavia ở Bắc Âu. Bờ biển lởm chởm, bị chia cắt bởi nhiều vịnh hẹp (fjord) và khoảng 50.000
    hòn đảo, trải dài hơn 2.500 km.'
  - 'Các vị sư trong chùa tu hành theo tông phái nào cũng không quan trọng, miễn là các vị sư này giữ gìn được các giáo giới
    quan trọng nhất của Phật giáo (không sát sinh, không trộm cắp, không phạm sắc giới, không uống rượu, không ăn thịt). Họ
    cũng không có hiểu biết sâu sắc về giáo lý Phật giáo mà chỉ hiểu đơn giản là thiện nghiệp thiện báo hoặc thậm chí hiểu
    sai lạc cúng dường cho chùa nhiều thì thiện báo. Có người đến chùa chỉ để cầu xin cho bản thân và coi Phật như là thần
    linh có thể giúp họ toại nguyện chứ không hiểu rằng những gì họ nhận được chính là kết quả của những gì họ tạo ra. Còn
    những sinh hoạt như cúng bái, cầu siêu, cầu an, bói toán, thỉnh vong, đốt vàng mã... là những hoạt động được du nhập vào
    Phật giáo từ Nho giáo, Đạo giáo và Shaman giáo.

    Trung Quốc.

    "Bài chi tiết: Phật giáo Trung Quốc"

    Theo sử liệu cho thấy Phật giáo được giới thiệu đến Trung Quốc do các nhà buôn hay các nhà sư truyền giáo người Ấn qua
    các ngã đường biển và đường bộ. Về đường biển thì xuất phát từ các hải cảng vùng Nam Ấn rồi qua ngã Sri Lanka, Nam Dương
    để vào hải cảng Quảng Đông. Về đường bộ, còn gọi là con đường tơ lụa (Silk road) nối liền Đông Tây, di chuyển bằng lạc
    đà, xuất phát từ miền Đông Bắc Ấn, rồi băng qua các sa mạc ở Trung Á để tới Lạc Dương (kinh đô của nhà Hán).

    Theo biên niên sử thì Phật giáo truyền đến Trung Quốc vào thế kỷ thứ 2 trước Công Nguyên từ Trung Á nhằm niên hiệu Nguyên
    Thọ đời vua Hán Ai Đế nhà Tây Hán, nhưng Phật giáo không truyền bá rộng rãi cho đến năm 65 Công nguyên, dưới triều vua
    Hán Minh Đế (niên hiệu Vĩnh Bình thứ 10 nhà Hậu Hán, 25-220 công nguyên), thì Phật giáo mới bắt đầu cắm rễ và phát triển
    ở Trung Quốc. Vì muốn thần dân tu học Phật pháp nên vua Minh Đế đã cử một phái đoàn gồm 18 người đến Ấn Độ để thỉnh cầu
    hai Thiền sư người Ấn là Ca Diếp Ma Đằng (Kàsyapama''tanga) và Trúc Pháp Lan (Dharmaraksa) đến Trung Quốc hoằng pháp.'
- source_sentence: Quận Sông Bé được thành lập vào thời điểm nào và dựa trên cơ sở nào?
  sentences:
  - 'Quang Châu có thể là:'
  - 'Mạng lưới sông rạch.

    Toàn huyện có 355 km kênh mương thủy lợi chính, gồm 80 km kênh cấp I và 275 km kênh cấp II, bình quân 1 ha đất canh tác
    có 12,62m kênh mương thủy lợi.

    Do nằm ven sông Cổ Chiên và có cù lao Hoà Minh – Long Hoà chạy dài ra sát cửa Cung Hầu nên huyện Châu Thành chịu ảnh hưởng
    chế độ bán nhật trìêu của biển Đông, thông qua đoạn sông Cổ Chiên vào các hệ thống sông rạch lớn như: Láng Thé – Ba Si
    – Ô Chát, sông Trà Vinh – Kinh Thống Nhất hệ Tầm Phương, sông Bãi Vàng – Vinh Kim. Ngoài ra, do yêu cầu tiếp ngọt với
    hai cống ngăn mặn Đa Lộc, Hiệp Hòa vào mùa khô, nguồn nước từ Cầu Quan (sông Hậu) được đưa sang kinh Thống Nhất và Trà
    Vinh. Trong ngày nước lên xuống hai lần, mỗi tháng có 2 lần triều cường sau ngày 1 và ngày 15 âl và 2 lần triều kèm sau
    ngày 7 và 23 âl (từ 2 đến 3 ngày), biên độ triều hàng ngày rất lớn, nhất là các khu vực gần cửa sông.

    Biên độ tắt dần khi vào nội đồng, đặc biệt vào mùa triều cường (tháng 10,12 dương lịch) đối với vùng kinh Thông Nhất qua
    ngọn Ô Chát chịu ảnh hưởng chung của sông Cổ Chiên và sông Hậu, biên độ triều hàng ngày nhỏ và hầu như không đáng kể vào
    thời kỳ triều cường nhất trong năm. Một số vùng thấp (Thanh Mỹ – Đa Lộc) có thời gian nước trên đồng không rút được, dù
    độ ngập không lớn.

    Vào mùa khô, triều cường và gió chướng đã đưa nước mặn xâm nhập vào nội đồng, độ mặn trung bình thay đổi từ 2,24‰ -9,96‰
    từ cuối tháng 1 đến tháng 6, tuy nhiên tháng tư có độ mặn cao nhất trên 18‰ (Hưng Mỹ). Các cửa sông gần biển thì độ mặn
    càng cao. Do dự trữ nước nội đồng và nguồn bổ sung từ trên xuống, từ sông Hậu sang nên độ mặn giảm dần khi vào nội đồng.

    Hành chính.

    Huyện Châu Thành có 14 đơn vị hành chính cấp xã trực thuộc, bao gồm thị trấn Châu Thành và 13 xã: Đa Lộc, Hòa Lợi, Hòa
    Minh, Hòa Thuận, Hưng Mỹ, Long Hòa, Lương Hòa, Lương Hòa A, Mỹ Chánh, Nguyệt Hóa, Phước Hảo, Song Lộc, Thanh Mỹ.

    Lịch sử.'
  - 'Quận Sông Bé được thành lập theo Nghị định của Toàn quyền Đông Dương ngày 25 tháng 10 năm 1927 trên cơ sở đổi tên quận
    Phú Riềng (thuộc tỉnh Biên Hòa) và chuyển quận lị về Bu Kroai (nay thuộc xã Đức Hạnh, huyện Bù Gia Mập).

    Ngày 20 tháng 5 năm 1933, cùng với việc chuyển quận lị Sông Bé về núi Bà Rá, quận Sông Bé được đổi tên thành quận Núi
    Bà Rá.

    Quận Núi Bà Rá được nâng cấp thành tỉnh Phước Long theo Sắc lệnh số 143-NV ngày 22 tháng 10 năm 1956 do Tổng thống Việt
    Nam Cộng hòa ký, chia Nam phần thành 22 tỉnh. Tỉnh lỵ tỉnh Phước Long đặt tại Phước Bình, về mặt hành chính thuộc xã Sơn
    Giang, quận Phước Bình (nay là khu vực trung tâm thị xã Phước Long). Địa bàn quận Sông Bé nay thuộc tỉnh Bình Phước.'
