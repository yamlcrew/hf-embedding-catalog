    и чистовую отделку, декоративные работы.. Строительство / Недвижимость / Ремонт
- source_sentence: торговля стройматериалами Краснодар
  sentences:
  - Компрессор-ресурс, ООО, торгово-сервисная фирма. Краснодар. компрессоры, промышленное оборудование. Поставщик компрессоров
    и оборудования в Краснодаре и других городах России. Осуществляет продажу и сервисное обслуживание.. Оборудование / Инструмент
  - Эккаунтинг Про, центр бухгалтерских услуг. Москва. аутсорсинг бухгалтерских услуг. Аутсорсинг бухгалтерских услуг для
    бизнеса, включая ведение учета, налоговое и корпоративное сопровождение.. Юридические / финансовые / бизнес-услуги
  - ОПТТИМ, торговая компания. Пятигорск. оптовая торговля строительными товарами. Оптовый поставщик строительных и хозяйственных
    товаров в Краснодарском крае.. Строительство / Недвижимость / Ремонт
- source_sentence: телекоммуникации провайдер связь Ижевск
  sentences:
  - Интеркомтел, ООО, компания услуг связи. Иваново. интернет, телевидение, связь. Провайдер услуг интернета, телевидения,
    телефонии и видеонаблюдения для физических и юридических лиц.. Интернет / Связь / Информационные технологии
  - Фабрикант, производственное объединение. Иваново. текстиль, ткани, спецодежда. Производство и продажа тканей (тик, двунитка,
    диагональ), спецодежды и текстильных изделий для мебели и одежды.. Мебель / Материалы / Фурнитура
  - Тивиант, ООО, телекоммуникационная компания. Красноярск. телевидение, спутниковые услуги. Провайдер услуг спутникового,
    цифрового, эфирного и кабельного телевидения.. Интернет / Связь / Информационные технологии
- source_sentence: бухгалтерские услуги аутсорсинг Томск
  sentences:
  - Эккаунтинг Про, центр бухгалтерских услуг. Москва. аутсорсинг бухгалтерских услуг. Аутсорсинг бухгалтерских услуг для
    бизнеса, включая ведение учета, налоговое и корпоративное сопровождение.. Юридические / финансовые / бизнес-услуги
  - РМ Акварель, ООО, оптово-розничная компания. Казань. спецодежда, средства индивидуальной защиты. Интернет-магазин спецодежды
    и средств индивидуальной защиты с комплексным снабжением предприятий.. Одежда / Обувь
  - Система, аутсорсинговая компания. Томск. информационные услуги, регистрация СМИ. Управляющая компания городского портала
    Tomsk.ru, предоставляющая новостные и информационные услуги, а также услуги по регистрации СМИ.. Юридические / финансовые
    / бизнес-услуги
- source_sentence: кто занимается генеральный подрядчик строительство в Казань?
  sentences:
  - СтройАвтоТранс, ООО. Казань. металлопрокат, металлоконструкции. Компания в области металлопроката, предоставляющая услуги
    по сварке, резке, изготовлению и монтажу металлоконструкций.. Строительные / отделочные материалы
  - БигСтрой, строительное предприятие. Екатеринбург. строительные услуги, генеральный подряд. Строительная компания, специализирующаяся
    на генеральном подряде, благоустройстве и аренде спецтехники.. Коммунальные / бытовые / ритуальные услуги
  - Строймастер, ООО, строительная компания. Казань. Сайт недоступен, информация отсутствует.. Строительство / Недвижимость
    / Ремонт
