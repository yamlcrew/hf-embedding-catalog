- source_sentence: Do cephalopods use RNA editing less frequently than other species?
  sentences:
  - 'Extensive messenger RNA editing generates transcript and protein diversity in genes involved in neural excitability,
    as previously described, as well as in genes participating in a broad range of other cellular functions. '
  - GV1001 is a 16-amino-acid vaccine peptide derived from the human telomerase reverse transcriptase sequence. It has been
    developed as a vaccine against various cancers.
  - Using acetyl-specific K516 antibodies, we show that acetylation of endogenous S6K1 at this site is potently induced upon
    growth factor stimulation. We propose that K516 acetylation may serve to modulate important kinase-independent functions
    of S6K1 in response to growth factor signalling. Following mitogen stimulation, S6Ks interact with the p300 and p300/CBP-associated
    factor (PCAF) acetyltransferases. S6Ks can be acetylated by p300 and PCAF in vitro and S6K acetylation is detected in
    cells expressing p300
- source_sentence: Can pets affect infant microbiomed?
  sentences:
  - Yes, exposure to household furry pets influences the gut microbiota of infants.
  - Thiazovivin is a selective small molecule that directly targets Rho-associated kinase (ROCK) and increases expression
    of pluripotency factors.
  - ' Here, we present evidence that the calcium/calmodulin-dependent protein kinase IV (CaMK4) is increased and required
    during Th17 cell differentiation. Inhibition of CaMK4 reduced Il17 transcription through decreased activation of the cAMP
    response element modulator a (CREM-a) and reduced activation of the AKT/mTOR pathway, which is known to enhance Th17 differentiation.
    CAMK4 knockdown and kinase-dead mutant inhibited crocin-mediated HO-1 expression, Nrf2 activation, and phosphorylation
    of Akt, indicating that HO-1 expression is mediated by CAMK4 and that Akt is a downstream mediator of CAMK4 in crocin
    signaling'
- source_sentence: In what proportion of children with heart failure has Enalapril been shown to be safe and effective?
  sentences:
  - 5-HT2A (5-hydroxytryptamine type 2a) receptor can be evaluated with the [18F]altanserin.
  - "In children with heart failure evidence of the effect of enalapril is empirical. Enalapril was clinically safe and effective\
    \ in 50% to 80% of for children with cardiac failure secondary to congenital heart malformations before and after cardiac\
    \ surgery,  impaired ventricular function , valvar regurgitation,  congestive cardiomyopathy,  , arterial hypertension,\
    \ life-threatening arrhythmias coexisting with circulatory insufficiency.   \nACE inhibitors have shown a transient beneficial\
    \ effect on heart failure due to anticancer drugs and possibly a beneficial effect in muscular dystrophy-associated cardiomyopathy,\
    \ which deserves further studies."
  - "necroptosis\napoptosis  \npro-survival/inflammation NF-κB activation"
- source_sentence: How are SAHFS created?
  sentences:
  - In particular, up to 17% of neutrophil nuclei of healthy women exhibit a drumstick-shaped appendage that contains the
    inactive X chromosome.
  - miR-1, miR-133, miR-208a, miR-206, miR-494, miR-146a, miR-222, miR-21, miR-221, miR-20a, miR-133a, miR-133b, miR-23, miR-107
    and miR-181 are involved in exercise adaptation
  - Cellular senescence-associated heterochromatic foci (SAHFS) are a novel type of chromatin condensation involving alterations
    of linker histone H1 and linker DNA-binding proteins. SAHFS can be formed by a variety of cell types, but their mechanism
    of action remains unclear.
- source_sentence: What are the effects of the deletion of all three Pcdh clusters (tricluster deletion) in mice?
  sentences:
  - Multicluster Pcdh diversity is required for mouse olfactory neural circuit assembly. The vertebrate clustered protocadherin
    (Pcdh) cell surface proteins are encoded by three closely linked gene clusters (Pcdhα, Pcdhβ, and Pcdhγ). Although deletion
    of individual Pcdh clusters had subtle phenotypic consequences, the loss of all three clusters (tricluster deletion) led
    to a severe axonal arborization defect and loss of self-avoidance.
  - The myocyte enhancer factor-2 (MEF2) proteins are MADS-box transcription factors that are essential for differentiation
    of all muscle lineages but their mechanisms of action remain largely undefined. MEF2C expression initiates cardiomyogenesis,
    resulting in the up-regulation of Brachyury T, bone morphogenetic protein-4, Nkx2-5, GATA-4, cardiac alpha-actin, and
    myosin heavy chain expression. Inactivation of the MEF2C gene causes cardiac developmental arrest and severe downregulation
    of a number of cardiac markers including atrial natriuretic factor (ANF). BMP-2, a regulator of cardiac development during
    embryogenesis, was shown to increase PI 3-kinase activity in cardiac precursor cells, resulting in increased expression
    of sarcomeric myosin heavy chain (MHC) and MEF-2A. Furthermore, expression of MEF-2A increased MHC expression in a PI
    3-kinase-dependent manner. Other studies showed that Gli2 and MEF2C proteins form a complex, capable of synergizing on
    cardiomyogenesis-related promoters. Dominant interference of calcineurin/mAKAP binding blunts the increase in MEF2 transcriptional
    activity seen during myoblast differentiation, as well as the expression of endogenous MEF2-target genes. These findings
    show that MEF-2 can direct early stages of cell differentiation into a cardiomyogenic pathway.
  - Investigators proposed that there have been three extended periods in the evolution of gene regulatory elements. Early
    vertebrate evolution was characterized by regulatory gains near transcription factors and developmental genes, but this
    trend was replaced by innovations near extracellular signaling genes, and then innovations near posttranslational protein
    modifiers.
