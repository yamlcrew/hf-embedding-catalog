widgetData:
- source_sentence: 'query: Какие бумаги требуются для прикрепления опекуна к подопечному?'
  sentences:
  - q2p
  - "passage: С каким вопросом обратился банкрот?\n\n11. Получение  кредита/ кредитной карты, погашение задолженности по кредиту\n\
    \n1. Банк не осуществляет:\n- кредитование Клиентов-банкротов; \n- выпуск, досрочный перевыпуск и выдачу личных дебетовых/кредитных\
    \ карт Клиентам-банкротам, в т.ч. дебетовых карт с овердрафтом и дополнительных дебетовых и кредитных карт к счету Клиента-банкрота.\
    \  \n\nКлиент -банкрот (в любой стадии) может погасить задолженность по своему кредиту только при наличии РАЗРЕШЕНИЯ ФУ\
    \ на проведение данной операции с указанием номера кредитного договора и суммы гашения. Операция проводится в стандартном\
    \ режиме.\n\n\nБезналичное гашение кредита банкротом при наличии РАЗРЕШЕНИЯ ФУ:\nВходит в АС ФС в подсистему «Переводы\
    \ физических лиц» → \nвыбирает «Операции без идентификации» → \nоперация «1. Оформление переводов физических лиц» → \n\
    «1. Переводы по системе Сбербанка» → \n«Переводы со счета для зачисления на счет» → \nуказывает № счета клиента-банкрота,\
    \ с которого будет перевод, → \nвыбирает «Перевод целевых кредитов, полученных в Сбербанке России, а также собственных\
    \ средств по назначению кредита» → \nвыбирает Перевод с целью погашения кредита → \nуказывает Сумму → \nвводит реквизиты\
    \ ОСБ/ВСП* → \nвводит ФИО получателя (клиента-банкрота) и № ссудного счета/№ счета кредитной карты → \nв реквизитах отправителя\
    \ указывает данные ДУЛ Финансового управляющего и Информацию о кредитных обязательствах: Оплата задолженности по кредитному\
    \ договору №____ от __.__.20__ г./ кредитной карте № _________; дело о банкротстве №_________, клиент: Иванов Иван Иванович."
  - "passage: Сотрудник проверяет у клиента наличие оригинала сберкнижки или иного документа (копия книжки/дубликат книжки/договор\
    \ вклада/квитанция ф. 31/банковский ордер или банковская справка, выписка/вкладчик получал компенсацию ранее по данному\
    \ вкладу) (далее - Сберкнижка). \n\n\nКлиент обратился по вопросам, касающимся выплаты компенсации по вкладам:\n - Несогласие\
    \ с суммой выплаты\n - Отказ в выплате\n - Порядок выплаты\n- Компенсации по вкладам иностранных государств.\n\n\nк тематике\
    \ «Компенсация по вкладам до 20.06.1991 года» не относятся вопросы, касающиеся:\n- выплаты наследства по вкладам или банковским\
    \ картам ,\n- получения справок/выписок по вкладам ,\n- розыска все вкладов\n- приема заявления на смену персональных\
    \ данных , \n- выплаты страхового возмещения вкладчикам разорившихся банков  \n\nСотрудник осуществляет консультацию клиента,\
    \ при необходимость регистрирует  обращение в  АС CRM \"Розничный\" к тематике «Компенсация по вкладам до 20.06.1991 года»"
- source_sentence: 'query: Какую информацию необходимо указать в обращении при информировании ПЦП Центр комплаенс Московского
    Банка?'
  sentences:
  - 'passage: Возможные ошибки:


    Связь не создана


    Техническая ошибка. Повторите операцию позже.'
  - q2p
  - 'passage: Выберите вопрос:


    После завершения обслуживания и ухода клиента возникли подозрения, что операция или выпуск/перевыпуск карт(ы) проводились
    с целью легализации преступных доходов?


    Для информирования ПЦП Центр комплаенс/комплаенс Московского Банка незамедлительно направьте сведения о выявленном факте
    через ДРУГ (см. картинку)


    При заполнении обращения подробно опишите возникшие подозрения для сокращения времени принятия решения в отношении клиента
    и инструментов удаленного доступа к счету.


    ВАЖНО!!!

    Если Вы информируете ПЦП Центр комплаенс/комплаенс Московского Банка о свершившимся факте массового открытия клиенту банковских
    карт, в т.ч. в составе организованной группы, то дополнительно ознакомьтесь с признаками согласования выпуска/перевыпуска
    карт(ы) при приеме от клиента заявления. Чтобы в следующий раз согласовать либо отказать клиенту в выпуске/перевыпуске
    карт(ы) на этапе приема заявления, а не после окончания обслуживания.'
- source_sentence: 'query: Какие типы счетов может открывать финансовый управляющий на имя банкрота?'
  sentences:
  - "passage: Данный вопрос может поступить как от законного представителя, так и от ребёнка\n\nЕсли обратился ребёнок:\n\n\
    Зайти в CRM в профиль клиента-ребенка и проверить наличие установленных индивидуальных лимитов/ограничений по его картам:\n\
     - Расходный лимит на месяц;\n - Расходный лимит на день;\n - Ограничение на снятие наличных в банкомате;\n - Ограничение\
    \ на покупки в интернете.\n \nЕсли лимиты/ограничения установлены, то необходимо запросить у клиента-ребенка согласие\
    \ на отключение индивидуальных лимитов/ограничений. Если ребёнок подтверждает отключение, то данные лимиты/ограничения\
    \ необходимо отключить."
  - q2p
  - "passage: С каким вопросом обратился ФУ?\n\n04. Открытие счета на имя банкрота  \n\nНа имя банкрота финансовый управляющий\
    \ может открыть Специальный банковский счет,  любой другой счет, в том числе ГЖС, эскроу\nКакой счет желает открыть ФУ"
- source_sentence: 'query: Как ребенок может изменить установленный законным представителем лимит расходных операций по карте?'
  sentences:
  - "passage: Уведомите Клиента о необходимости пополнения расчетного счета для списания комиссий.\nПередайте клиентские экземпляры\
    \ Клиенту.  \n\nЗаключение поступит Вам на электронную почту.\n     При получении положительного заключения дополнительные\
    \ действия не требуются.\n     При получении отрицательного заключения устраните замечания, указанные в нем. Как загрузить\
    \ документы в ББМО, смотри вложение.\n\n\nПередайте оригиналы подписанных документов СМО для отправки в Оперативный архив."
  - q2p
  - 'passage: Существуют следующие ограничения:


    01. Расходный лимит на месяц:


    Устанавливается лимит на все расходные операции по карте на месяц. Сумму лимита можно изменить в любой момент. Уведомление
    об установлении лимита ребенку приходить не будет. Ребенок в своем МП СБОЛ также может скорректировать сумму этого лимита
    или полностью убрать установленный законным представителем лимит (если ребенку доступно данное действие). В этом случае
    уведомление законному представителю также не придет.'
- source_sentence: 'query: Какие шаги нужно предпринять после отрицательного решения по запросу на открытие счета?'
  sentences:
  - q2p
  - "passage: Выбрать возраст ребенка\n\nребенку от 14 до 18 лет\n\nЕсли представитель ребенку от 14 до 18 лет является приемным\
    \ родителем\n\nЗапросите следующие документы удостоверяющую личность или нотариально заверенную копию и один из документов,\
    \ подтверждающие полномочия:\n\nДоговор о приемной семье\n\nДокумент органов опеки и попечительства \n\nПроставить галочку\
    \ \"Документы предъявлены\" и нажать кнопку \"Продолжить\""
  - 'passage: Выберите интересующий вопрос


    Может ли Законный представитель запретить возможность оплаты Детской СберКартой в интернете ?


    Да. Для этого Законному представителю в МП СБОЛ необходимо выбрать Детскую СберКарту в списке карт →  Лимиты → Другие
    ограничения → Покупки в Интернете → Отключить'
