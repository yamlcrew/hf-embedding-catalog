widgetData:
- source_sentence: 'query: Можно ли распечатать справку об аресте счета клиента-банкрота для финансового управляющего?'
  sentences:
  - "passage: Запросить у клиента - банкрота разрешение Финансового управляющего на расход денежных средств банкротом, в котором\
    \ указаны: Сумма, период и номер счета, с которого необходимо выполнить списание. Разрешение Финансового управляющего\
    \ должно быть заверено его личной подписью либо удостоверено нотариусом (при наличии печатью).\n\n\n***Исключения составляют\
    \ алименты и пособия на детей, для получения которых в разрешении Финансового управляющего может быть указан только счет.\
    \ Сумму для выдачи Сотрудник должен определить по назначению платежа зачисления.\n\n\n!!!!! В случаях, когда ФУ и банкрот\
    \ находятся в разных ТБ, мы рекомендуем использовать следующий порядок получения ДС банкротом, \n\nФУ приносит разрешение\
    \ на получение ДС банкротом в любое ближайшее отделение банка.\nСотрудник принимает его, регистрирует и отправляет внутренней\
    \ почтой в ВСП, куда придет банкрот за ДС.\nВСП, куда придет банкрот на основании полученного разрешения регистрируют\
    \ заявку на разблокировку счета, \nВыдают деньги после разблокировки счета, к расходному ордеру прикладывают разрешение\
    \ фу (если оно разовое) копию разрешения (если он периодическое)\nСамо разрешение ФУ, подписанное сотрудником, передают\
    \ банкроту, он с ним приходит в Банк до его окончания.\n\n\n\nБанкрот предоставил Разрешение Финансового управляющего\
    \ на расход денежных средств\n\nПроверить наличие ареста на счет, с которого необходимо произвести выдачу"
  - 'passage: Покупка металла на металлический счёт через УРМ:

    Покупка металла с зачислением на металлический счёт со счета или вклада:'
  - "passage: Не допускается распечатывать финансовому управляющему справку об аресте счета клиента банкрота на сумму 41 888\
    \ 888 рублей. Арест является техническим ограничением.\n\n\n\nПолучить справки/выписки/информацию по всем открытым счетам\
    \ банкрота на ДИСКЕ (большой объем)\n\nСотрудник ВСП оформляет запрос стандартным порядком через АС \"Сбердруг\"\n\nОткрывает\
    \ АС \"Сбердруг\" --> Каталог --> Обслуживание клиентов -> Операционный центр --> Сопровождение операций ФЛ -> Запросы\
    \ от внешней организации и клиентов Банка --> \n\nВ запросе необходимо указать следующее:\n- в поле \"Представители внешних\
    \ организаций\" -  выбрать Финансовый управляющий\n- в поле ТБ клиенту - выбрать ТБ\n- Номер и дату документа Финансового\
    \ управляющего\n- Данные банкрота (ФИО + Дата рождения)\n\nК запросу необходимо приложить скан-образы документов:\n -\
    \ Решение суда о признании гражданина банкротом и введении процедуры реализации имущества и решение суда об утверждении\
    \ финансового управляющего;\n - заявление финансового управляющего на предоставление информации по клиенту-банкроту (в\
    \ свободной форме и по форме Заявление о розыске/предоставлении информации), заверенное подписью сотрудника ВСП с указанием\
    \ ФИО, должности и даты приема заявления ФУ.\n\n!!! После подготовки, диск с информацией будет направлен ФУ по почте России,\
    \ по адресу, указанному в заявлении ФУ."
- source_sentence: 'query: Что не отображается в истории трат и пополнений по карте?'
  sentences:
  - 'passage: Вид специального счета:


    Специальный брокерский счет



    Дополнительно к документам, указанным в П-25, Клиент предоставляет:

    1. лицензии на право осуществления соответствующего вида профессиональной деятельности на рынке ценных бумаг.'
  - 'passage: Существуют следующие возможности:


    02. Увидеть историю трат и пополнений по карте:


    Отображается список расходных операций по карте (за исключением снятия денег в банкоматах), а также все зачисления денежных
    средств.'
  - "passage: Сотрудник проверяет у клиента наличие оригинала сберкнижки или иного документа (копия книжки/дубликат книжки/договор\
    \ вклада/квитанция ф. 31/банковский ордер или банковская справка, выписка/вкладчик получал компенсацию ранее по данному\
    \ вкладу) (далее - Сберкнижка). \n\nНет Сберкнижки\n\nЕсли книжка не предоставлена. Сообщи клиенту, что Банк не может\
    \ произвести выплату компенсации. Выплата производится при наличии Сберкнижки. Попросить клиента принести Сберкнижку.\n\
    \nВыплата компенсации по закрытым счетам осуществляется на основании заявления, оформленного в АС ФС ФП \"Компенсация\
    \ и выплата\" с указанием в заявление, получение компенсации по закрытым счетам."
- source_sentence: 'query: Когда возникает окно для подтверждения операции с комплаенсом?'
  sentences:
  - 'query: Что должно соответствовать клиенту, кроме условия, что он не является филиалом или представительством?'
  - 'query: В каких случаях появляется модальное окно для согласования с комплаенсом?'
  - 'query: На какой номер нужно позвонить, чтобы снять лимит расходов на день для ребенка?'
- source_sentence: 'query: Что происходит на экране после ввода суммы при проведении валютно-обменной операции, если необходимо
    согласование?'
  sentences:
  - 'query: Какие бумаги необходимы для объявления клиента недееспособным?'
  - 'query: Что отображается на экране после ввода суммы для валютного обмена, если нужно согласование?'
  - 'query: Какой документ необходим для удостоверения статуса иностранного гражданина в России?'
- source_sentence: 'query: Когда родитель теряет доступ к картам ребенка от 14 до 17 лет?'
  sentences:
  - 'query: Кто имеет право претендовать на наследство, если наследодатель объявлен банкротом?'
  - 'query: Что необходимо сделать перед вводом суммы для снятия наличных с карты в СБОЛ.про?'
  - 'query: В каких ситуациях родитель не сможет управлять картами ребенка в возрасте 14-17 лет?'
