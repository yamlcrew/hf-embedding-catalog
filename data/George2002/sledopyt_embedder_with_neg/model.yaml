widgetData:
- source_sentence: 'query: Что включает в себя функционал карты для молодежи в возрасте от 14 до 17 лет?'
  sentences:
  - 'passage: Операции по продуктам несовершеннолетнего дееспособного с 14 лет до 18 лет (эмансипированный) совершает сам
    несовершеннолетний с 14 лет до 18 лет или его доверенное лицо.

    Выписка по счету (вкладу) может быть выдана:


    -Несовершеннолетний с 14 до 18 лет


    -Доверенное лицо

    Какие документы необходимо предъявить в Банк для проставления признака дееспособный по несовершеннолетнему с 14 до 18
    лет:


    ДУЛ несовершеннолетнего с 14 до 18 лет + ОДИН из следующих документов:


    - свидетельство о заключении брака (п.2 ст. 21 ГК РФ)

    - решение органа опеки и попечительства о признании несовершеннолетнего полностью дееспособным (эмансипированным) (п.1
    ст. 27 ГК РФ)

    - решение суда о признании несовершеннолетнего полностью дееспособным (эмансипированным) (п.1 ст. 27 ГК РФ)'
  - "passage: Описание функционала во вложении ниже.\n\nТипичные вопросы по отображению молодёжных карт в МП СБОЛ родителя\
    \ и ответы на них:\n\n01. Кто может получить доступ к картам ребенка 14-17 лет ?\n\nУстановившие в Банке связь со своим\
    \ ребенком 14-17 лет законные представители: Родитель/Усыновитель, Приемный родитель, Опекун (связь отображается в СБОЛ.Про\
    \ - ФП «Подопечные и представители», а также в системе SmartCare. В CRM связь законного представителя и ребенка 14-17\
    \ лет НЕ отображается), по которым выполняется одно из следующих условий: \n\n- СберКарта ребенка 14-17 лет была открыта\
    \ и активирована до 16.11.2022 включительно, и ребенку исполнилось 14 лет до 16.11.2022 включительно.\n\n- Законный представитель\
    \ до пилота видел детскую СберКарту своего ребенка 13 лет в своем МП СберБанк Онлайн, и этому ребенку исполнилось 14 лет\
    \  17.11.2022 или позднее."
  - 'passage: ВНИМАНИЕ !

    С 23 октября 2023г. в МП СБОЛ станет доступным заказ Детской СберКарты по свидетельству о рождении Украины со штампом
    о гражданстве РФ.

    Для получения Детской СберКарты в офисе банка необходимо будет предоставить нотариально заверенное удостоверение перевода
    на русский язык свидетельства о рождении Украины со штампом о гражданстве РФ.






    Типичные вопросы по Детской СберКарте и ответы на них


    17. Ребёнку исполнилось 14 лет: что происходит с картой и что нужно делать ?


    СберКарта ребёнка продолжит отображаться в СБОЛе у Законного представителя.


    СберКарта ребёнка автоматически сменит тариф с «Детского» на «Молодёжный» на следующий день после дня 14-летия.


    Закрывать карту не требуется и можно пользоваться до истечения срока её действия. А после истечения срока действия СберКарта
    автоматически перевыпустится с дизайном, соответствующим тарифу "Молодежный".


    Ребёнку станет доступен МП СБОЛ: для регистрации необходимо предоставить в офис банка паспорт РФ и подписать договор банковского
    обслуживания.


    Сотрудник, при обращении Ребёнка в офис Банка производит его идентификацию, изменение данных в Профиле в установленном
    порядке. Оформляет договор банковского обслуживания.'
- source_sentence: 'query: Что делать, если представитель ребенка - это родитель?'
  sentences:
  - 'passage: С каким вопросом обратился банкрот?


    15. Оформление доверенности


    Владелец счета, в отношении которого введена процедура банкротства может оформить доверенность на распоряжение своими
    продуктами в пределах своих полномочий, ограниченных действующей процедурой,



    Владелец счета, признанный банкротом в стадии Реструктуризация долгов может оформить банковскую доверенность:

    - На получение справок, выписок, проведения приходных операций по всем своим счетам

    - На проведение расхода по любому своему счету (кроме Специального банковского счета), при предъявлении письменного разрешения
    утвержденного для процедуры банкротства финансового управляющего;

    - На распоряжение Специальным счетом банкрота в рамках установленного лимита;



    Владелец счета, признанный банкротом в стадии Реализация имущества может оформить нотариальную доверенность с датой выдачи
    позже, чем решение суда о признании гражданина банкротом:

    - На получение справок, выписок по всем своим счетам'
  - "passage: В случае\n\n\n\nПолучения наследства банкротом\n\nВ случае, если Клиент, обратившийся за получением наследства\
    \ при идентификации обнаружен в Стоп-Листе банкротов: \n- сообщить клиенту, что у Банка есть информация о его банкротстве\
    \ и он может получить только Выплату на достойные похороны\n- выплату наследства Банк осуществляет в зависимости от стадии\
    \ банкротства:\n\n!!! Получить наследство и распоряжаться  им самостоятельно клиент банкрот может только после завершения\
    \ процедуры банкротства. \n\nНаследством банкрота в стадии реализация имущества распоряжается утвержденный для проведения\
    \ процедуры финансовый управляющий.\n \nВ этом случае \n\nНаследником в заявке на выплату через ОЦ заводим банкрота, выплата\
    \ наследства перевеодится ему на счет. \nПосле выплаты, ФУ уже в рамках своих полномочий сможет этими ДС распорядиться.\n\
    ."
  - "passage: Узнайте у клиента, кем является его подопечный\n\nНесовершеннолетним\n\nПопросите клиента уточнить, кем он является\
    \ подопечному и каков его возраст. Затем попросите предъявить соответствующие документы. \n\nЕсли ребёнку меньше 14 лет,\
    \ то ему назначается ОПЕКУН. Соответственно, клиент должен предоставить документ удостоверяющий личность ребёнка и документ\
    \ органа опеки о полномочиях ОПЕКУНА.\n\nЕсли ребёнку от 14 до 18 лет, ему назначается ПОПЕЧИТЕЛЬ. Соответственно, клиент\
    \ должен предоставить документ удостоверяющий личность ребёнка и документ органа опеки о полномочиях ПОПЕЧИТЕЛЯ.\n\nЕсли\
    \ опека осуществлялась над малолетним ребёнком, а затем ребёнку исполнилось 14 лет, статус Опекуна меняется на Попечителя.\
    \ В таком случае, чтобы добавить представителя, выберите роль \"Попечитель\" и используйте имеющиеся документы органа\
    \ опеки.\n\nПосле того, как документы были предъявлены, проверьте их, прожмите галочку \"Документы предъявлены\" и нажмите\
    \ продолжить."
