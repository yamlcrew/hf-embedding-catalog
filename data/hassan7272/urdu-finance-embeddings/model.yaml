widgetData:
- source_sentence: Is it mandatory to open a current account for a business in Pakistan?
  sentences:
  - Easypaisa direct international transfers support nahi karta, lekin kuch partner services ke through receive ho sakta hai.
    Alternative ke liye bank account ya Payoneer jese platforms use karein. Charges bhi check karna zaroori hai.
  - Having a separate current account for business is very important though not legally mandatory. Practically it is necessary
    because keeping personal and business finances separate makes tax filing easier. It is also easier to get a business loan
    from the bank with a separate business account. Clients and vendors also consider it more professional. Current accounts
    do not earn interest which is better from an Islamic perspective. A cheque book also comes with a business account, useful
    for B2B payments.
  - Ji haan, Easypaisa wallet mein rakhi hui amount bhi zakat mein count hoti hai. Agar total savings nisab se zyada ho aur
    saal guzar jaye to 2.5% zakat deni hoti hai. Digital wallet bhi cash ke barabar treat hota hai.
- source_sentence: پاکستان میں اگر میری آمدنی زیادہ ہو تو زکوٰۃ اور ٹیکس میں سے کسے پہلے ادا کروں؟
  sentences:
  - Meezan Bank کا Easy Saver ایک اسلامی savings account ہے جس میں بچت کی مقدار پر زیادہ منافع ملتا ہے۔ رقم کسی بھی وقت نکالی
    جا سکتی ہے۔ Zero minimum balance اور free online banking شامل ہے۔
  - 'اگر آمدنی زیادہ ہو تو ترتیب یہ ہے: ٹیکس پہلے ادا کریں کیونکہ یہ قانونی ذمہ داری ہے۔ ٹیکس کے بعد بچنے والی رقم پر زکوٰۃ
    کا حساب کریں۔ زکوٰۃ روحانی ذمہ داری ہے — اسے سال میں ایک بار ضرور ادا کریں۔'
  - پاکستان میں کرنسی تبادلہ اسٹیٹ بینک سے منظور شدہ ایکسچینج کمپنیوں سے کریں۔
