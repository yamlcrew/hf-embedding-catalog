cardData:
  language:
  - vi
  tags:
  - sentence-transformers
  - sentence-similarity
  - feature-extraction
  - dense
  - generated_from_trainer
  - dataset_size:9590
  - loss:CachedMultipleNegativesRankingLoss
  base_model: google/embeddinggemma-300m
  widget:
  - source_sentence: Phẫu thuật cắt lách được xem là phương pháp điều trị bậc hai cho AIHA ấm trong những trường hợp nào?
    sentences:
    - 'Viêm não do kháng thể kháng thụ thể NMDA có thể liên quan đến một khối u, thường là u quái của buồng trứng (khối u
      này có thể chứa nhiều loại mô cơ thể khác nhau bao gồm cả mô não). Ở nam giới có thể gặp U tinh hoàn. Các loại khối
      u khác có liên quan đến viêm não kháng thể thụ thể NMDA bao gồm ung thư phổi, khối u của tuyến giáp, ung thư vú, ung
      thư ruột kết và u nguyên bào thần kinh.Vai trò của khối u trong sự phát triển của bệnh viêm não kháng thể kháng thụ
      thể NMDA vẫn chưa được hiểu đầy đủ. Tuy nhiên, tất cả các khối u liên quan đến viêm não kháng thể kháng thụ thể NMDA
      đều chứa mô thần kinh (mô chứa các tế bào giống hệt với các tế bào được tìm thấy trong não) và các thụ thể NMDA. Người
      ta cho rằng ban đầu các kháng thể được hình thành để chống lại các thụ thể NMDA có trong khối u và sau đó chúng tấn
      công các thụ thể trông tương tự trong não, tạo ra các triệu chứng và dấu hiệu liên quan đến viêm não kháng thể kháng
      thụ thể NMDA.Nếu khối u được tìm thấy, việc loại bỏ khối u là một phần quan trọng trong điều trị viêm não kháng thể
      kháng thụ thể NMDA. Những bệnh nhân được loại bỏ khối u hồi phục nhanh hơn và ít có khả năng bị tái phát hơn so với
      những bệnh nhân không được tìm thấy khối u. Tất cả bệnh nhân nghi ngờ viêm não do thụ thể NMDA nên được kiểm tra sự
      hiện diện của khối u. Nên thực hiện phương pháp chẩn đoán hình ảnh (cắt lớp vi tính hoặc cộng hưởng từ) ngực, bụng và
      xương chậu.... Ở phụ nữ cũng nên siêu âm buồng trứng, và nam giới nên siêu âm tinh hoàn. Ngay cả khi đã được cắt bỏ,
      các khối u vẫn có thể tái phát.Vì vậy, những người bị viêm não kháng thể kháng thụ thể NMDA nên được kiểm tra định kỳ
      về sự hiện diện (hoặc tái phát) của các khối u.


      Ung thư vú có mối liên quan đến viêm não kháng thể thụ thể NMDA


      Ở nhiều người bị viêm não kháng thể kháng thụ thể NMDA mà không tìm thấy khối u (do khối u quá nhỏ không thể phát hiện
      được bằng kỹ thuật hình ảnh hay khối u đã bị tiêu diệt bởi hệ thống miễn dịch hoặc không có khối u), được cho là không
      rõ nguyên nhân.'
    - Khi được điều trị bằng liệu pháp bộ ba - clarithromycin, amoxicillin và omeprazole - để diệt trừ H. pylori, những bệnh
      nhân bị thiếu máu ác tính trước đó đã có được mức vitamin B12 thỏa đáng, với mức sắt trung bình là 262,5 ± 100,0 pg
      / mL trong số những người nhiễm H. pylori chống lại 378,2 ± 160,6 pg / mL ở nhóm H. pylori-đồng âm, thể hiện sự khác
      biệt 30,6% giữa các nhóm đó, với giá trị P là 0,001.
    - Phẫu thuật cắt lách thường được cho là phương pháp điều trị bậc hai cho AIHA ấm, được đề xuất cho bệnh nhân không đáp
      ứng hoặc không dung nạp corticosteroid, ở những người cần liều prednisone duy trì hàng ngày lớn hơn 10 mg và ở những
      người bị tái phát nhiều lần.
  - source_sentence: Khi nào cần chụp MRI?
    sentences:
    - Hơn 60 triệu bệnh nhân được chẩn đoán bằng hình ảnh chụp MRI (Chụp cộng hưởng từ) được thực hiện mỗi năm trên toàn thế
      giới. Kể từ khi phát triển vào những năm 1970, MRI đã tạo ra cuộc cách mạng trong chẩn đoán hình ảnh y học, cung cấp
      một phương pháp chẩn đoán không xâm lấn để kiểm tra bên trong cơ thể con người một cách chi tiết mà không cần sử dụng
      phóng xạ.Bằng cách cho các nguyên tử Hydro trong cơ thể tiếp xúc với từ trường, MRI có thể kiểm soát hướng và đo tần
      số mà các proton hydro chuyển động. Một xung tần số vô tuyến (RF) đặc trưng cho cộng hưởng tử của nguyên tử Hydro được
      hướng vào khu vực nơi có cơ quan trong cơ thể mà bác sĩ muốn kiểm tra. Hình ảnh chi tiết các cơ quan có thể được thể
      hiện trên màn hình, cung cấp cho các bác sĩ có nhiều hướng nhìn và góc độ khác nhau những tổn thương có thể thấy ở cơ
      quan được chụp MRI.MRI thường được bác sĩ chỉ định chụp MRI để biết thêm chi tiết hoặc nguyên nhân của các triệu chứng
      không rõ ràng trên các loại hình ảnh khác, chẳng hạn như siêu âm, chụp X-quang hay chụp cắt lớp vi tính. Chụp MRI có
      thể giúp chẩn đoán các bệnh về não, cột sống, xương, bụng và các mô mềm.Ví dụ, MRI rất tốt trong chẩn đoán và theo dõi
      nhiều tình trạng thần kinh, chẳng hạn như bệnh đa xơ cứng, nhiễm trùng, khối u não, não úng thủy, bất thường mạch máu
      bao gồm đột quỵ cấp tính và chảy máu nội sọ, và để đánh giá quỹ đạo và tuyến yên. Chụp MRI cũng rất hữu ích để chẩn
      đoán bất thường tủy sống, bao gồm hủy myelination, khối u, hoặc thoát vị đĩa đệm và thay đổi thoái hóa.Chụp MRI cho
      phép bác sĩ của bạn nhìn thấy các cơ quan, xương và các mô bên trong cơ thể bạn mà không phải phẫu thuật. Phương pháp
      này có thể giúp chẩn đoán bệnh hoặc chấn thương.Bạn có thể cần chụp MRI nếu chụp X-quang và chụp cắt lớp vi tính chưa
      cung cấp đủ thông tin về tình trạng sức khoẻ của các cơ quan trong cơ thể. MRI cũng rất hữu ích cho bác sĩ lựa chọn
      được phương pháp điều trị phù hợp và hiệu quả với tình trạng bệnh.
    - 'Mức độ vừa phải:Để phẫu thuật cắt xương hàm hô móm, bác sĩ tiến hành cắt tiền đình xương hàm dưới để đẩy lùi về phía
      sau sao cho hài hòa với hàm trên. Nhổ 2 răng số 4 và cắt ngách lợi qua 2 răng số 4 để xương hàm di chuyển sau đó cố
      định vào sau phẫu thuật.

      Mức độ nặng:Bác sĩ sẽ tiến hành phẫu thuật cắt xương hàm hô móm bằng phương pháp BSSO không cần nhổ răng. Cắt 2 cành
      bên hàm dưới đẩy lùi về phía sau rồi nẹp cố định hàm. Một vài trường hợp phức tạp hơn, do cả hàm trên và hàm dưới thì
      có thể cắt cả 2 hàm mới chữa hô móm triệt để.'
    - 'Quy trình siêu âm động mạch chủ bụng bao gồm các bước như sau:● Chuẩn bị đầu dò siêu âm: Đầu dò convex đối với các
      bệnh nhân bình thường, và sử dụng tần số cao đối với bệnh nhân gầy. Đầu dò tim dành cho bệnh nhân béo.● Bệnh nhân cần
      nhịn ăn trước khi siêu âm. Tốt nhất nên siêu âm buổi sáng và không ăn sáng, đây là thời điểm thích hợp nhất để siêu
      âm. Lưu ý hạn chế uống nước có gas trước khi siêu âm.● Bệnh nhân nằm ngửa theo hướng dẫn của bác sĩ, tránh căng thẳng
      vùng bụng dẫn đến căng cơ.Nếu trong trường hợp khó siêu âm, có thể bác sĩ thực hiện sẽ yêu cầu bạn nằm nghiêng để thực
      hiện siêu âm.'
  - source_sentence: Việc bỏ bữa sáng có ảnh hưởng gì đến lượng đường trong máu và cơ thể?
    sentences:
    - Các phương thức vật lý để điều trị thoái hóa khớp gối bao gồm vật lý trị liệu, tập thể dục, giảm cân và sử dụng nẹp
      gối hoặc nẹp gót chân. Một đánh giá về các can thiệp vật lý trị liệu cho bệnh nhân thoái hóa khớp gối kết luận rằng
      tập thể dục và giảm cân giúp giảm đau, cải thiện chức năng thể chất. Bên cạnh đó, các bài tập aerobic cường độ cao và
      thấp đều có hiệu quả như nhau trong việc cải thiện tình trạng chức năng khớp gối, dáng đi và cơn đau.Song song đó, để
      phương pháp điều trị thoái hóa khớp gối đạt hiệu quả, bác sĩ khuyến cáo người bệnh nên ngừng bất kỳ hoạt động nào làm
      trầm trọng thêm tình trạng đau đầu gối. Có một số bằng chứng cho thấy việc sử dụng nẹp gót chân bên làm giảm việc sử
      dụng thuốc chống viêm không steroid (NSAID).
    - Một số nghiên cứu nhỏ cho thấy rằng bỏ bữa sáng thực sự có thể dẫn đến kháng insulin nhiều hơn. Đề kháng insulin là
      tình trạng cần nhiều insulin hơn để đưa lượng đường trong máu về mức bình thường. Bỏ bữa sáng cũng có liên quan đến
      việc tăng lượng đường trong máu sau cả bữa trưa và bữa tối. Điều này có thể gây căng thẳng quá mức cho cơ thể cũng như
      dẫn đến việc lựa chọn chế độ ăn uống kém hiệu quả.
    - Bên cạnh đó, bệnh phình động mạch máu não còn có thể làm tăng các nguy cơ liên quan đến chứng co thắt động mạch não
      và dẫn đến đột quỵ. Một số biến chứng khác bao gồm:Tràn dịch não, từ đó gây suy giảm lưu thông dịch não tủy.Hạ natri
      máu
  - source_sentence: Cấy chỉ là phương pháp gì và được phát triển từ kỹ thuật nào?
    sentences:
    - Theo quy trình siêu âm, bệnh nhân cần nhịn ăn ít nhất từ 6 đến 8 giờ trước khi tiến hành siêu âm sỏi thận.Điều kiện
      lý tưởng nhất là siêu âm sỏi thận vào buổi sáng khi bệnh nhân đã nhịn ăn từ chiều tối hôm trước. Nguyên nhân là do khi
      bệnh nhân nhịn ăn như vậy thì thức ăn đã được tiêu hóa hết và tránh những ảnh ảo làm ảnh hưởng đến kết quả siêu âm thận.Một
      yêu cầu khác cũng quan trọng không kém là bệnh nhân cần uống nhiều nước kèm nhịn tiểu trước khi siêu âm. Nhịn tiểu sẽ
      làm bàng quang căng to, giúp quan sát hình ảnh viên sỏi dễ dàng hơn do tương phản giữa nước tiểu và viên sỏi là trái
      ngược nhau (viên sỏi có màu trắng còn nước tiểu màu đen trên màn hình siêu âm).
    - Cấy chỉ hay còn gọi là nhu châm, là một phương pháp được phát triển từ kỹ thuật châm cứu, đã và đang được ứng dụng trong
      điều trị bệnh gout.
    - Thông thường, sau điều trị lao khoảng 1 tháng dịch sẽ cải thiện nhiều, bạn nên tái khám để đánh giá tình trạng bệnh
      của mình.
  - source_sentence: Hồi hải mã đóng vai trò gì trong khả năng ghi nhớ của con người, đặc biệt là định hướng đường đi?
    sentences:
    - 'Phương pháp điều trị tăng tiết mồ hôi tùy thuộc vào nguyên nhân gây bệnh. Vì vậy, việc quan trọng nhất là phải xác
      định được nguyên nhân gây mồ hôi tiết ra nhiều. Đối với tăng tiết mồ hôi thứ phát do các bệnh lý khác cần được điều
      trị dứt điểm tình trạng bệnh lý. Đối với tăng tiết mồ hôi nguyên phát do rối loạn thần kinh thực vật có 4 phương pháp
      điều trị bao gồm:

      2.1 Điều trị nội khoa

      Có 2 loại thuốc được dùng để điều trị chứng mồ hôi tiết ra nhiều đó là thuốc bôi ngoài da và thuốc kháng cholinergic
      dạng uống:Thuốc bôi: thuốc bôi là cách đơn giản nhất để điều trị chứng ra mồ hôi tiết ra nhiều. Thông thường, các loại
      thuốc bôi này sẽ chứa các thành phần như muối nhôm clorua, có tác dụng se khít lỗ chân lông khiến mồ hôi không thể thoát
      ra bên ngoài. Tuy nhiên, do thuốc bôi này chỉ có tác dụng tạm thời và chỉ thích hợp với những vùng da nhỏ như lòng bàn
      tay, bàn chân và nách nên bạn phải dùng thường xuyên hàng ngày.Thuốc kháng cholinergic: như glycopyrrolate, oxybutynin,
      propantheline,... có thể giúp làm giảm tiết mồ hôi nhờ tác dụng ức chế hoạt động của hệ thần kinh giao cảm. Thuốc kháng
      cholinergic có thể gây ra một số tác dụng phụ như: khô miệng, bí tiểu, táo bón, loạn nhịp tim, mờ mắt,... Do đó, bạn
      chỉ nên sử dụng thuốc theo phác đồ điều trị và hướng dẫn của bác sĩ.

      2.2 Điện di ion

      Phương pháp điện di ion thường được thực hiện để điều trị đổ mồ hôi tay và chân. Khi thực hiện, bạn sẽ được ngâm bàn
      tay hoặc bàn chân vào một dung dịch điện ly có dòng điện thấp chạy qua khoảng 10 miliampe trong khoảng thời gian từ
      20 – 30 phút. Để việc điều trị có hiệu quả cao, bạn cần tiến hành thực hiện điện di ion ít nhất 3 lần/tuần trong tháng
      đầu tiên, và những tháng tiếp theo có thể giảm tần suất xuống thành 2 – 4 lần/tháng. Phương pháp điện di ion khá an
      toàn và có thể có hiệu quả trong vòng 6 tháng điều trị, sau đó chứng tình trạng mồ hôi tiết ra nhiều vẫn có thể tái
      phát. Ngoài ra, bạn cũng cần lưu ý là phương pháp điện di ion không phù hợp dùng cho phụ nữ mang thai, người bệnh động
      kinh, người có đặt máy tạo nhịp tim,...

      2.3 Tiêm botox

      Tiêm botox là một phương pháp thường được sử dụng để điều trị chứng đổ mồ hôi ra nhiều ở lòng bàn tay, bàn chân và nách.
      Bác sĩ sẽ tiến hành tiêm nhiều mũi botulinum dưới da nhằm ngăn chặn cơ thể giải phóng các chất dẫn truyền thần kinh
      có thể kích thích tuyến mồ hôi tăng bài tiết. Tuy nhiên, tiêm botox có thể khiến bạn gặp phải một số tác dụng không
      mong muốn như dị ứng da, buồn nôn, đau đầu, giảm thị lực, sụp mí, bí tiểu, tim đập nhanh,...




      Tiêm botox điều trị tăng tiết mồ hôi



      2.4 Phẫu thuật

      Cắt đốt hạch giao cảm là phương án được thực hiện cuối cùng nếu như những phương pháp trên điều trị không có hiệu quả.
      Khi hạch giao cảm ở ngực bị cắt bỏ, mồ hôi tay chân và nách sẽ không thể tiết ra được nữa. Tuy nhiên, sẽ có biến chứng
      đồ mồ hôi bù trừ ở các bộ phận khác của cơ thể. Nhìn chung, dù phương pháp này có thể điều trị triệt để nhưng có thể
      gây ra nhiều biến chứng như dị ứng thuốc gây mê, nhiễm trùng sau mổ, hội chứng Horner gây sụp mí mắt,...Tóm lại, mồ
      hôi tiết ra là tình trạng sinh lý rất tốt, giúp cơ thể điều hòa nhiệt độ và loại bỏ độc tố ra khỏi cơ thể. Tuy nhiên,
      mồ hôi tiết ra nhiều có thể là do rối loạn thần kinh thực vật hoặc là triệu chứng của một số bệnh lý như cường giáp,
      nhiễm độc, rối loạn nội tiết,... Mồ hôi tiết ra nhiều không ảnh hưởng tới sức khỏe nhưng tác động không nhỏ đến cuộc
      sống và công việc của bạn. Cách điều trị bệnh tăng tiết mồ hôi phụ thuộc vào nguyên nhân gây nên. Tăng tiết mồ hôi thứ
      phát cần điều trị dứt điểm các bệnh lý mắc phải. Đối với đổ mồ hôi nguyên phát do rối loạn thần kinh thực vật sẽ được
      điều trị bằng phương pháp đốt hạch giao cảm.Tại Bệnh viện Đa khoa Quốc tế Vinmec điều trị chứng đổ mồ hôi tay chân do
      rối loạn thần kinh thực vật bằng phương pháp phẫu thuật nội soi cắt đốt hạch giao cảm, nhằm giảm tăng tiết mồ hôi tay
      chân và được thực hiện bởi bác sĩ giàu kinh nghiệm cùng với các trang thiết bị hiện đại. Người bệnh sẽ được tiến hành
      sàng lọc trước, phẫu thuật và kiểm tra, theo dõi sau phẫu thuật theo phác đồ điều trị chuẩn Quốc tế. Phẫu thuật trị
      đổ mồ hôi tay chân bằng phương pháp nội soi ngực đã cho kết quả vượt trội: Có hiệu quả tức thì, phẫu thuật một lần cho
      tác dụng lâu dài, tính thẩm mỹ cao, an toàn và thời gian nằm viện ngắn. Ưu điểm của phương pháp phẫu thuật nội soi cắt
      hạch giao cảm là chi phí thấp, thời gian lưu viện ngắn, biểu hiện chân tay khô hơn sau phẫu thuật, sinh hoạt trở lại
      sớm và thuận tiện cũng như tăng sự tự tin cho người bệnh.'
    - Cần lấy thai nhi ra trong thời gian dưới 10 phút thì gây mê toàn thân gần như là lựa chọn bắt buộc.
    - Hồi hải mã là một cấu trúc quan trọng của não bộ, có tác dụng cải thiện khả năng ghi nhớ. Nó chứa các tế bào thần kinh
      đặc biệt được gọi là tế bào lưới, có vai trò như một tấm bản đồ di động, giúp ghi nhớ những nơi bạn đã đến và con đường
      bạn đã đi.Trong đó, các ô vị trí giúp xác định vị trí và các ô lưới giúp hình thành mối quan hệ không gian giữa nơi
      này và nơi khác. Một nghiên cứu ở Anh cho thấy kích thước hồi hải mã của các tài xế taxi lớn hơn nhiều so với người
      bình thường.Mặc dù hai loại ghi nhớ song song tồn tại, nhưng bộ não mỗi người có xu hướng chỉ thiên về một bên. Một
      số người giỏi trong việc điều hướng dựa vào các sự vật trên đường đi. Ví dụ, những người này có thể nói “Tôi đến trạm
      xăng và rẽ phải”. Trong khi đó, có những người có xu hướng dựa vào trí nhớ không gian để định hướng. Họ có thể nói “Tôi
      sẽ đi 50m về phía bắc, sau đó 50m về phía đông”.Kỹ năng định hướng, đặc biệt là trong việc tìm đường có thể luyện tập.
      Càng ra ngoài và đi nhiều nơi thì khả năng định hướng sẽ càng tốt. Ngoài ra, bạn cũng nên kết hợp với việc tập thể dục
      nhằm cải thiện lưu lượng máu đến não hoặc chơi các trò chơi như xếp hình, học một ngôn ngữ mới để kích thích sự phát
      triển của các tế bào thần kinh mới và tăng cường các kết nối thần kinh.
