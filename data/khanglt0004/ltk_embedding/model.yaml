- source_sentence: Khi lấy ý kiến của những người liên quan, công chức tư pháp – hộ tịch phải tư vấn điều gì để đảm bảo trẻ
    em tiếp tục được chăm sóc phù hợp?
  sentences:
  - 'Điều 28. Hành vi vi phạm quy định về đăng ký kết hôn và môi giới kết hôn


    1. Cảnh cáo hoặc phạt tiền từ 300.000 đồng đến 500.000 đồng đối với hành vi sửa chữa, tẩy xóa, làm sai lệch nội dung giấy
    tờ do cơ quan có thẩm quyền cấp để làm thủ tục đăng ký kết hôn.


    2. Phạt tiền từ 1.000.000 đồng đến 3.000.000 đồng đối với một trong các hành vi sau:


    a) Cho người khác mượn giấy tờ để làm thủ tục đăng ký kết hôn; sử dụng giấy tờ của người khác để làm thủ tục đăng ký kết
    hôn;


    b) Sử dụng giấy tờ giả để làm thủ tục đăng ký kết hôn;


    c) Cam đoan không đúng về tình trạng hôn nhân để làm thủ tục đăng ký kết hôn.


    3. Phạt tiền từ 3.000.000 đồng đến 5.000.000 đồng đối với hành vi làm giả giấy tờ để làm thủ tục đăng ký kết hôn.


    4.'
  - 'Điều 5. Lệ phí


    1. Người yêu cầu đăng ký kết hôn, nhận cha, mẹ, con, cấp Giấy xác nhận tình trạng hôn nhân, công nhận việc kết hôn, ghi
    vào sổ hộ tịch việc nhận cha, mẹ, con của công dân Việt Nam đã giải quyết tại cơ quan có thẩm quyền của nước ngoài theo
    quy định tại Nghị định này phải nộp lệ phí theo quy định của pháp luật.


    2. Miễn lệ phí đăng ký kết hôn, nhận cha, mẹ, con có yếu tố nước ngoài ở khu vực biên giới.


    Chương 2.


    KẾT HÔN




    MỤC 1. ĐĂNG KÝ KẾT HÔN'
  - "Điều 9. Yêu cầu về kiểm tra hồ sơ và lấy ý kiến của những người liên quan \n\n1. Khi kiểm tra hồ sơ, công chức tư pháp\
    \ – hộ tịch phải nghiên cứu, tìm hiểu tâm tư, nguyện vọng và hoàn cảnh của những người liên quan. Trường hợp người được\
    \ nhận làm con nuôi có cha mẹ đẻ, thì công chức tư pháp – hộ tịch kiểm tra việc cha mẹ đẻ có thỏa thuận với cha mẹ nuôi\
    \ để giữ lại quyền, nghĩa vụ đối với con và cách thức thực hiện quyền, nghĩa vụ đó sau khi đã cho làm con nuôi.\n\n2.\
    \ Khi lấy ý kiến của những người liên quan theo quy định tại Điều 20 và Điều 21 của Luật Nuôi con nuôi, công chức tư pháp\
    \ – hộ tịch phải tư vấn để trẻ em tiếp tục được chăm sóc, nuôi dưỡng, giáo dục phù hợp với điều kiện và khả năng thực\
    \ tế của gia đình."
- source_sentence: Những cơ quan, tổ chức nào không thuộc đối tượng áp dụng của quyết định về dân số và kế hoạch hóa gia đình
    tại TP.HCM?
  sentences:
  - '2. Đối tượng áp dụng của quyết định này là cá nhân, là người Việt Nam, cư trú thực tế trên địa bàn thành phố Hồ Chí Minh
    ổn định từ 06 tháng trở lên (bao gồm những người thường trú và tạm trú); cơ quan, tổ chức trú đóng trên địa bàn thành
    phố Hồ Chí Minh là các cơ quan: hành chính, sự nghiệp, kinh tế, các đoàn thể, các tổ chức chính trị, tổ chức chính trị
    xã hội, tổ chức xã hội nghề nghiệp (bao gồm các cơ quan, tổ chức của thành phố, của các tỉnh, thành phố khác và của Trung
    ương trú đóng trên địa bàn thành phố Hồ Chí Minh, áp dụng và thực hiện tốt công tác dân số và kế hoạch hóa gia đình.


    3. Riêng các doanh trại quân đội, công an, trại giam và các cơ quan ngoại giao không thuộc đối tượng áp dụng quyết định
    này.


    Điều 2. Chính sách và nơi cung cấp dịch vụ đối với người áp dụng biện pháp tránh thai


    1. Chính sách đối với người áp dụng biện pháp tránh thai:


    a) Người áp dụng biện pháp đặt dụng cụ tử cung, được cấp thuốc theo quy định của Bộ Y tế; được miễn phí hoàn toàn khi
    thực hiện việc đặt, tái khám và tháo dụng cụ tử cung.'
  - 'Điều 65. Thẩm quyền lập biên bản vi phạm hành chính


    1. Người có thẩm quyền lập biên bản quy định tại Điều này chỉ được lập biên bản vi phạm hành chính đối với những vi phạm
    hành chính thuộc phạm vi thi hành công vụ, nhiệm vụ được giao theo mẫu quy định và chịu trách nhiệm về việc lập biên bản.


    2. Những người sau đây đang thi hành công vụ, nhiệm vụ có thẩm quyền lập biên bản vi phạm hành chính:


    a) Người có thẩm quyền xử phạt vi phạm hành chính quy định tại các Điều 66, 67, 68, 69 và 70 của Nghị định này lập biên
    bản vi phạm hành chính đối với các hành vi trong lĩnh vực thuộc thẩm quyền xử phạt của mình;


    b) Công chức tư pháp - hộ tịch cấp xã lập biên bản vi phạm hành chính đối với các hành vi quy định tại các Điều 24, 25,
    27, 28, 30, 31, 32, 33, 34, 35, 36, 47, 48, 49 và 50 của Nghị định này;


    c) Công chức Phòng Tư pháp cấp huyện lập biên bản vi phạm hành chính đối với các hành vi quy định tại Mục 1 Chương III,
    các Điều 27, 28, 30, 31, 32, 33, 34, 35, 36, 39 và 40,'
  - 'Điều 33. Trình tự cấp giấy phép cho tổ chức con nuôi nước ngoài hoạt động tại Việt Nam


    1. Trong thời hạn 60 ngày, kể từ ngày nhận đủ hồ sơ hợp lệ, Cục Con nuôi kiểm tra, thẩm định hồ sơ; phỏng vấn để kiểm
    tra, đánh giá về tiêu chuẩn của người dự kiến đứng đầu Văn phòng con nuôi nước ngoài tại Việt Nam; kiểm tra, đánh giá
    về điều kiện, năng lực chuyên môn của tổ chức và đội ngũ nhân viên của tổ chức con nuôi nước ngoài; báo cáo Bộ trưởng
    Bộ Tư pháp đề nghị Bộ Công an cho ý kiến.


    2. Trong thời hạn 30 ngày, kể từ ngày nhận được đề nghị của Bộ Tư pháp, Bộ Công an trả lời bằng văn bản cho Bộ Tư pháp.


    3.'
- source_sentence: Hành vi ép buộc người khác nhận cha, mẹ, con sẽ bị phạt tiền ở mức nào?
  sentences:
  - 'Trong trường hợp từ chối đăng ký kết hôn, cơ quan đại diện có văn bản thông báo cho hai bên nam, nữ, trong đó nêu rõ
    lý do từ chối.


    2. Trường hợp xét thấy có vấn đề cần xác minh thuộc chức năng của cơ quan hữu quan ở trong nước, cơ quan đại diện có công
    văn nêu rõ vấn đề cần xác minh, gửi Bộ Ngoại giao để yêu cầu cơ quan hữu quan xác minh theo chức năng chuyên ngành.


    Trong thời hạn 10 ngày làm việc, kể từ ngày nhận được công văn của Bộ Ngoại giao, cơ quan hữu quan ở trong nước thực hiện
    xác minh vấn đề được yêu cầu và trả lời bằng văn bản gửi Bộ Ngoại giao để chuyển cho cơ quan đại diện.


    3. Lễ đăng ký kết hôn được tổ chức trong thời hạn 05 ngày làm việc, kể từ ngày người đứng đầu cơ quan đại diện ký Giấy
    chứng nhận kết hôn.


    4. Lễ đăng ký kết hôn được tổ chức trang trọng tại trụ sở cơ quan đại diện. Khi tổ chức lễ đăng ký kết hôn phải có mặt
    hai bên nam, nữ. Đại diện cơ quan đại diện chủ trì hôn lễ, yêu cầu hai bên cho biết ý định lần cuối về sự tự nguyện kết
    hôn.'
  - 'Điều 33. Hành vi vi phạm quy định về đăng ký việc nhận cha, mẹ, con


    1. Cảnh cáo hoặc phạt tiền từ 300.000 đồng đến 500.000 đồng đối với hành vi sửa chữa, tẩy xóa, làm sai lệch nội dung giấy
    tờ do cơ quan có thẩm quyền cấp để làm thủ tục đăng ký nhận cha, mẹ, con.


    2. Phạt tiền từ 1.000.000 đồng đến 3.000.000 đồng đối với một trong các hành vi sau:


    a) Sử dụng giấy tờ của người khác để làm thủ tục đăng ký nhận cha, mẹ, con;


    b) Sử dụng giấy tờ giả để làm thủ tục đăng ký nhận cha, mẹ, con;


    c) Ép buộc người khác nhận cha, mẹ, con.


    3. Phạt tiền từ 3.000.000 đồng đến 5.000.000 đồng đối với hành vi làm giả giấy tờ để làm thủ tục đăng ký nhận cha, mẹ,
    con.


    4. Biện pháp khắc phục hậu quả:


    Hủy bỏ giấy tờ giả đối với hành vi quy định tại Điểm b Khoản 2, Khoản 3 Điều này.'
  - 'Trường hợp cần phải xác minh, thì thời hạn xác minh không quá 05 ngày.”


    13. Khoản 1 và khoản 2 Điều 48 được sửa đổi, bổ sung như sau:


    “1. Người có yêu cầu đăng ký lại việc sinh, tử, kết hôn phải nộp Tờ khai (theo mẫu quy định) và xuất trình bản sao giấy
    tờ hộ tịch đã cấp hợp lệ trước đây (nếu có); trong trường hợp không có bản sao giấy tờ hộ tịch, thì đương sự phải tự cam
    đoan về việc đã đăng ký, nhưng sổ hộ tịch không còn lưu được và chịu trách nhiệm về nội dung cam đoan.


    2. Sau khi nhận đủ giấy tờ hợp lệ, cán bộ Tư pháp hộ tịch ghi vào sổ hộ tịch theo từng loại việc và bản chính Giấy khai
    sinh, Giấy chứng tử, Giấy chứng nhận kết hôn. Chủ tịch Ủy ban nhân dân cấp xã ký và cấp cho người đi đăng ký một bản chính
    giấy tờ hộ tịch theo từng loại việc. Các giấy tờ hộ tịch cũ liên quan đến sự kiện hộ tịch đăng ký lại (nếu có) được thu
    hồi và lưu hồ sơ.


    Trường hợp cần phải xác minh, thì thời hạn được kéo dài không quá 03 ngày.”


    14. Khoản 2 Điều 50 được sửa đổi như sau:


    “2.'
- source_sentence: Nếu giấy xác nhận tình trạng hôn nhân được cấp tại tỉnh khác, Sở Tư pháp cần làm gì trước khi ghi vào sổ
    việc kết hôn?
  sentences:
  - "Đơn vị chủ trì: Tổng cục Dân số.\n\nĐơn vị phối hợp: Vụ Truyền thông và Thi đua, khen thưởng; Sở Y tế các tỉnh/thành\
    \ phố và các đơn vị liên quan.\n\n\tb) Đa dạng hóa các loại hình truyền thông, chú trọng kênh thông tin đại chúng; các\
    \ sản phẩm truyền thông phù hợp với từng vùng miền, địa phương. Tăng cường áp dụng công nghệ hiện đại, internet, mạng\
    \ xã hội trong tuyên truyền, vận động về kế hoạch hóa gia đình; lồng ghép với các hoạt động truyền thông của các Chương\
    \ trình, Đề án khác."
  - 'Trường hợp công dân Việt Nam được cấp Giấy xác nhận tình trạng hôn nhân tại địa bàn tỉnh khác, Sở Tư pháp có văn bản
    gửi Sở Tư pháp nơi đã cho ý kiến về việc cấp Giấy xác nhận tình trạng hôn nhân đề nghị kiểm tra, đối chiếu; nếu việc cấp
    Giấy xác nhận tình trạng hôn nhân bảo đảm đúng trình tự, thủ tục, việc kết hôn bảo đảm điều kiện theo quy định tại khoản
    1 Điều 16 của Nghị định số 24/2013/NĐ-CP, thì ghi vào sổ việc kết hôn.


    2. Trường hợp việc cấp Giấy xác nhận tình trạng hôn nhân không đúng trình tự, thủ tục, Sở Tư pháp tiến hành xác minh làm
    rõ. Nếu kết quả xác minh cho thấy đương sự có đủ điều kiện kết hôn (vào thời điểm yêu cầu cấp Giấy xác nhận tình trạng
    hôn nhân), tình trạng hôn nhân của công dân Việt Nam được xác nhận là đúng, Sở Tư pháp vẫn tiến hành ghi vào sổ việc kết
    hôn và cấp Giấy xác nhận cho đương sự.


    Sau khi ghi vào sổ việc kết hôn, Sở Tư pháp có văn bản gửi Ủy ban nhân dân cấp xã, nơi đã cấp Giấy xác nhận tình trạng
    hôn nhân để chấn chỉnh, xử lý theo quy định.'
  - "6. Phạt tiền từ 20.000.000 đồng đến 30.000.000 đồng đối với một trong các hành vi sau:\n\na) Không chấp hành quyết định\
    \ của người có thẩm quyền thi hành án về việc khấu trừ tài khoản, thu hồi giấy tờ có giá của người phải thi hành án;\n\
    \nb) Không chấp hành quyết định của người có thẩm quyền thi hành án về việc thu tiền từ hoạt động kinh doanh của người\
    \ phải thi hành án; về việc thu tiền của người phải thi hành án đang giữ.\n\n7. Phạt tiền từ 30.000.000 đồng đến 40.000.000\
    \ đồng đối với hành vi không thực hiện việc phong tỏa tài khoản của người phải thi hành án theo quyết định của người có\
    \ thẩm quyền thi hành án.\n\n8. Biện pháp khắc phục hậu quả:\n\nBuộc khôi phục lại tình trạng ban đầu đã bị thay đổi đối\
    \ với hành vi quy định tại Điểm a Khoản 4, Điểm a và Điểm b Khoản 5 Điều này.\n\n\n\nChương 6.\n\nHÀNH VI VI PHẠM HÀNH\
    \ CHÍNH, HÌNH THỨC XỬ PHẠT VÀ BIỆN PHÁP \n\nKHẮC PHỤC HẬU QUẢ TRONG LĨNH VỰC PHÁ SẢN DOANH NGHIỆP, HỢP TÁC XÃ"
- source_sentence: Ai phải nộp lệ phí đăng ký nuôi con nuôi nước ngoài khi nộp hồ sơ xin nhận con nuôi tại Cục Con nuôi?
  sentences:
  - "Các hoạt động:\n\n\t- Xây dựng bộ công cụ giám sát chất lượng sau đào tạo đối với người cung cấp dịch vụ; các quy định\
    \ về cơ sở thực hiện dịch vụ kế hoạch hóa gia đình có chất lượng;\n\n\t- Hướng dẫn tổ chức thực hiện việc giám sát chất\
    \ lượng đối với cơ sở và người cung cấp dịch vụ kế hoạch hóa gia đình;\n\n\t- Kiểm định chất lượng phương tiện tránh thai\
    \ và hàng hóa sức khỏe sinh sản.\n\nĐơn vị chủ trì: Tổng cục Dân số.\n\nĐơn vị phối hợp: Vụ Sức khỏe Bà mẹ - Trẻ em; Sở\
    \ Y tế các tỉnh/thành phố và các đơn vị liên quan.\n\n\t4. Đẩy mạnh xã hội hóa, huy động nguồn lực thực hiện Chương trình\n\
    \nĐẩy mạnh xã hội hóa dịch vụ kế hoạch hóa gia đình, tạo điều kiện thuận lợi cho các tổ chức, cá nhân tham gia Chương\
    \ trình; huy động toàn bộ hệ thống y tế, dân số tham gia thực hiện Chương trình theo chức năng, nhiệm vụ được giao, ưu\
    \ tiên bảo đảm hoạt động ở tuyến cơ sở, vùng khó khăn có mức sinh cao."
  - 'tranh chấp giữa các thành viên gia đình, xử lý hành vi bạo lực gia đình;


    g) Khiếu nại, tố cáo, khởi kiện đối với hành vi vi phạm pháp luật về phòng, chống bạo lực gia đình;


    h) Quyền khác theo quy định của pháp luật có liên quan đến phòng, chống bạo lực gia đình.


    2. Người bị bạo lực gia đình, người giám hộ hoặc người đại diện theo pháp luật của người bị bạo lực gia đình có trách
    nhiệm cung cấp đầy đủ, chính xác, kịp thời thông tin liên quan đến hành vi bạo lực gia đình khi có yêu cầu của cơ quan,
    tổ chức, cá nhân có thẩm quyền.'
  - "Điều 42. Đối tượng phải nộp lệ phí đăng ký nuôi con nuôi \n\n1. Công dân Việt Nam thường trú tại Việt Nam phải nộp lệ\
    \ phí đăng ký nuôi con nuôi trong nước theo quy định tại khoản 1 Điều 40 của Nghị định này khi nộp hồ sơ đăng ký nuôi\
    \ con nuôi tại Ủy ban nhân dân cấp xã.    \n\n2. Người Việt Nam định cư ở nước ngoài, người nước ngoài không thường trú\
    \ tại Việt Nam phải nộp lệ phí đăng ký nuôi con nuôi nước ngoài theo quy định tại khoản 2 Điều 40 của Nghị định này khi\
    \ nộp hồ sơ xin nhận con nuôi tại Cục Con nuôi.\n\n3. Công dân Việt Nam tạm trú ở nước ngoài phải nộp lệ phí đăng ký nuôi\
    \ con nuôi theo quy định tại khoản 3 Điều 40 của Nghị định này khi nộp hồ sơ xin nhận con nuôi tại Cơ quan đại diện."
