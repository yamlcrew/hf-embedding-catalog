      “2.'
  - source_sentence: Nếu giấy xác nhận tình trạng hôn nhân được cấp tại tỉnh khác, Sở Tư pháp cần làm gì trước khi ghi vào
      sổ việc kết hôn?
    sentences:
    - "Đơn vị chủ trì: Tổng cục Dân số.\n\nĐơn vị phối hợp: Vụ Truyền thông và Thi đua, khen thưởng; Sở Y tế các tỉnh/thành\
      \ phố và các đơn vị liên quan.\n\n\tb) Đa dạng hóa các loại hình truyền thông, chú trọng kênh thông tin đại chúng; các\
      \ sản phẩm truyền thông phù hợp với từng vùng miền, địa phương. Tăng cường áp dụng công nghệ hiện đại, internet, mạng\
      \ xã hội trong tuyên truyền, vận động về kế hoạch hóa gia đình; lồng ghép với các hoạt động truyền thông của các Chương\
      \ trình, Đề án khác."
    - 'Trường hợp công dân Việt Nam được cấp Giấy xác nhận tình trạng hôn nhân tại địa bàn tỉnh khác, Sở Tư pháp có văn bản
      gửi Sở Tư pháp nơi đã cho ý kiến về việc cấp Giấy xác nhận tình trạng hôn nhân đề nghị kiểm tra, đối chiếu; nếu việc
      cấp Giấy xác nhận tình trạng hôn nhân bảo đảm đúng trình tự, thủ tục, việc kết hôn bảo đảm điều kiện theo quy định tại
      khoản 1 Điều 16 của Nghị định số 24/2013/NĐ-CP, thì ghi vào sổ việc kết hôn.


      2. Trường hợp việc cấp Giấy xác nhận tình trạng hôn nhân không đúng trình tự, thủ tục, Sở Tư pháp tiến hành xác minh
      làm rõ. Nếu kết quả xác minh cho thấy đương sự có đủ điều kiện kết hôn (vào thời điểm yêu cầu cấp Giấy xác nhận tình
      trạng hôn nhân), tình trạng hôn nhân của công dân Việt Nam được xác nhận là đúng, Sở Tư pháp vẫn tiến hành ghi vào sổ
      việc kết hôn và cấp Giấy xác nhận cho đương sự.


      Sau khi ghi vào sổ việc kết hôn, Sở Tư pháp có văn bản gửi Ủy ban nhân dân cấp xã, nơi đã cấp Giấy xác nhận tình trạng
      hôn nhân để chấn chỉnh, xử lý theo quy định.'
    - "6. Phạt tiền từ 20.000.000 đồng đến 30.000.000 đồng đối với một trong các hành vi sau:\n\na) Không chấp hành quyết\
      \ định của người có thẩm quyền thi hành án về việc khấu trừ tài khoản, thu hồi giấy tờ có giá của người phải thi hành\
      \ án;\n\nb) Không chấp hành quyết định của người có thẩm quyền thi hành án về việc thu tiền từ hoạt động kinh doanh\
      \ của người phải thi hành án; về việc thu tiền của người phải thi hành án đang giữ.\n\n7. Phạt tiền từ 30.000.000 đồng\
      \ đến 40.000.000 đồng đối với hành vi không thực hiện việc phong tỏa tài khoản của người phải thi hành án theo quyết\
      \ định của người có thẩm quyền thi hành án.\n\n8. Biện pháp khắc phục hậu quả:\n\nBuộc khôi phục lại tình trạng ban\
      \ đầu đã bị thay đổi đối với hành vi quy định tại Điểm a Khoản 4, Điểm a và Điểm b Khoản 5 Điều này.\n\n\n\nChương 6.\n\
      \nHÀNH VI VI PHẠM HÀNH CHÍNH, HÌNH THỨC XỬ PHẠT VÀ BIỆN PHÁP \n\nKHẮC PHỤC HẬU QUẢ TRONG LĨNH VỰC PHÁ SẢN DOANH NGHIỆP,\
      \ HỢP TÁC XÃ"
  - source_sentence: Ai phải nộp lệ phí đăng ký nuôi con nuôi nước ngoài khi nộp hồ sơ xin nhận con nuôi tại Cục Con nuôi?
    sentences:
    - "Các hoạt động:\n\n\t- Xây dựng bộ công cụ giám sát chất lượng sau đào tạo đối với người cung cấp dịch vụ; các quy định\
      \ về cơ sở thực hiện dịch vụ kế hoạch hóa gia đình có chất lượng;\n\n\t- Hướng dẫn tổ chức thực hiện việc giám sát chất\
      \ lượng đối với cơ sở và người cung cấp dịch vụ kế hoạch hóa gia đình;\n\n\t- Kiểm định chất lượng phương tiện tránh\
      \ thai và hàng hóa sức khỏe sinh sản.\n\nĐơn vị chủ trì: Tổng cục Dân số.\n\nĐơn vị phối hợp: Vụ Sức khỏe Bà mẹ - Trẻ\
      \ em; Sở Y tế các tỉnh/thành phố và các đơn vị liên quan.\n\n\t4. Đẩy mạnh xã hội hóa, huy động nguồn lực thực hiện\
      \ Chương trình\n\nĐẩy mạnh xã hội hóa dịch vụ kế hoạch hóa gia đình, tạo điều kiện thuận lợi cho các tổ chức, cá nhân\
      \ tham gia Chương trình; huy động toàn bộ hệ thống y tế, dân số tham gia thực hiện Chương trình theo chức năng, nhiệm\
      \ vụ được giao, ưu tiên bảo đảm hoạt động ở tuyến cơ sở, vùng khó khăn có mức sinh cao."
    - 'tranh chấp giữa các thành viên gia đình, xử lý hành vi bạo lực gia đình;


      g) Khiếu nại, tố cáo, khởi kiện đối với hành vi vi phạm pháp luật về phòng, chống bạo lực gia đình;


      h) Quyền khác theo quy định của pháp luật có liên quan đến phòng, chống bạo lực gia đình.


      2. Người bị bạo lực gia đình, người giám hộ hoặc người đại diện theo pháp luật của người bị bạo lực gia đình có trách
      nhiệm cung cấp đầy đủ, chính xác, kịp thời thông tin liên quan đến hành vi bạo lực gia đình khi có yêu cầu của cơ quan,
      tổ chức, cá nhân có thẩm quyền.'
    - "Điều 42. Đối tượng phải nộp lệ phí đăng ký nuôi con nuôi \n\n1. Công dân Việt Nam thường trú tại Việt Nam phải nộp\
      \ lệ phí đăng ký nuôi con nuôi trong nước theo quy định tại khoản 1 Điều 40 của Nghị định này khi nộp hồ sơ đăng ký\
      \ nuôi con nuôi tại Ủy ban nhân dân cấp xã.    \n\n2. Người Việt Nam định cư ở nước ngoài, người nước ngoài không thường\
      \ trú tại Việt Nam phải nộp lệ phí đăng ký nuôi con nuôi nước ngoài theo quy định tại khoản 2 Điều 40 của Nghị định\
      \ này khi nộp hồ sơ xin nhận con nuôi tại Cục Con nuôi.\n\n3. Công dân Việt Nam tạm trú ở nước ngoài phải nộp lệ phí\
      \ đăng ký nuôi con nuôi theo quy định tại khoản 3 Điều 40 của Nghị định này khi nộp hồ sơ xin nhận con nuôi tại Cơ quan\
      \ đại diện."
