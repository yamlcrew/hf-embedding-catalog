  sentences:
  - 'Mobiles Coaching


    * Physische und psychische Mobilisierung

    * Intervention bei individuellen Problemlagen und persönlichen Krisen

    * Stabilisierung des Durchhaltevermögens/ Motivationsförderung

    * Familien\- und Selbstmanagement, Beratung zu Hilfsmöglichkeiten, Stabilisierung der Lebensverhältnisse

    * Soziales Kompetenztraining

    * Entwicklung von beruflichen Zielen und Lebenszielen

    * Erarbeitung von Lösungen und Zeitmanagement, Entwicklung von Alltagsbewältigungsstrategien

    * Unterstützung und ggf. Begleitung zu Behördengängen, Ausfüllen von Formularen

    * Umgang mit Stress/ Stressreduktion, Kommunikationstraining

    * Berufs\- und Arbeitsmarktorientierung

    * vorbereitende Integrationsunterstützung / Bewerbungsberatung


    Nach längerer Arbeitslosigkeit kann der plötzliche Übergang in eine Vollzeitbeschäftigung oder in eine entsprechende Weiterbildung
    zur Herausforderung werden. Denn: auch wenn der Wunsch nach einem beruflichen Wiedereinstieg vorhanden ist, können persönliche,
    räumliche oder auch zeitliche Faktoren den Weg dorthin erschweren.


    Mit unserem **„Mobilen Coaching"** bieten wir Ihnen Unterstützung an.


    Wir beraten Sie u.a. zu Themen wie der Vereinbarkeit von familiären Pflichten, wie z.B. Kinderbetreuungs\- und/oder Pflegeaufgaben
    mit beruflichen Anforderungen und zeigen Ihnen auf, welche Unterstützungsleistungen Sie in Anspruch nehmen können.


    Nach diesem ersten Schritt konzentrieren wir uns auf Ihre berufliche Zukunft. Wir helfen Ihnen dabei, Ihre Stärken zu
    erkennen, mögliche Berufsziele zu definieren und eventuelle Hürden zu überwinden. Selbstverständlich unterstützen wir
    Sie auch bei der Suche nach einem Praktikumsplatz und bei der Erstellung von Bewerbungsunterlagen. So finden Sie Schritt
    für Schritt zurück in die Arbeitswelt!


    Die Coaching\-Einheiten finden zum Teil bei uns im Hause, aber auch außerhalb statt. Kennen Sie ein nettes Cafe´ oder
    einen schönen Park in Ihrer Nähe? Dann kommt Ihr Coach auch gerne zu Ihnen!


    **Unsere Ziele auf einen Blick:**


    * Gemeinsam erfassen wir Ihre Potenziale, definieren mögliche Ziele und planen die schrittweise Umsetzung, mit Hilfe von
    Zwischenzielen.

    * Wir zeigen Ihnen, wie Sie den Spagat zwischen Familie und Beruf schaffen und beiden Lebensbereichen gerecht werden können.

    * Zusammen erarbeiten wir individuelle Lösungen für mögliche Herausforderungen im Alltag und geben Ihnen hilfreiche Tipps
    an die Hand, mit denen Sie Krisen bewältigen können

    * Wir unterstützen Sie bei der Suche nach einem passenden Arbeitsplatz oder einer vorgeschalteten Bildungsmaßnahme.'
