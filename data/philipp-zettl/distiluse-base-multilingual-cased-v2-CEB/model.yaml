    - 'Palliative Care


      **Palliative Care**


      * Moral, Ethik und Recht in der Palliative Care

      * Kommunikation mit Sterbenden

      * Abschiednehmen, Trauer

      * Der sterbende Mensch und seine Angehörigen

      * Orte der Sterbebegleitung

      * Palliative Pflege und Therapie


      In der Palliative Care betreuen Sie Menschen mit schweren, oft lebensbedrohlichen Erkrankungen. Sie nutzen verschiedene
      Methoden, um die Lebensqualität dieser Menschen zu verbessern, zum Beispiel durch das Lindern von Schmerzen oder anderen
      belastenden Symptomen. Dabei berücksichtigen Sie nicht nur körperliche, sondern auch geistige und soziale Bedürfnisse
      der eingeschränkten Personen aber auch die ihrer Familien. Sie ermöglichen so einen würdevollen und friedlicher Abschied.
      Deshalb ist eine angemessene Kommunikation sehr wichtig aber auch der richtige Umgang mit Trauer und dem Tod.


      In dieser Weiterbildung lernen Sie Menschen mit schweren Erkrankungen zu betreuen und die passenden Therapien anzuwenden.
      Sie erhalten die wichtigen Grundlagen für eine angemessene Kommunikation mit dem oder der Sterbenden und den Angehörigen
      und setzen sich mit dem Tod und Abschiednehmen auseinander. So können Sie die Betroffenen und deren Familien in der
      schweren Zeit begleiten und unterstützen. Außerdem lernen Sie wichtige Punkte der Moral und Ethik und bekommen die rechtlichen
      Grundlagen der Palliative Care vermittelt.


      Unsere erfahrenen Dozent:innen begleiten Sie während der Weiterbildung und vermitteln Ihnen die verschiedenen Inhalte
      im Bereich Palliative Care mit praxisnahen Übungen und Beispielen, die Sie konkret auf die Pflege mit sterbenden Menschen
      vorbereitet. Mit dem Bildungsgutschein der Agentur für Arbeit bzw. des Jobcenters ist die Weiterbildung bis zu 100%
      gefördert und für Sie kostenlos. Vereinbaren Sie jetzt einen Beratungstermin und starten Sie in der Pflege mit Palliative
      Care durch.'
    - "ICDL - Workforce Base - Basis-Computerführerschein\n\nPC\\-Grundlagen:\n\n* Umgang mit Tastatur, Maus, CDs etc.\n\n\
