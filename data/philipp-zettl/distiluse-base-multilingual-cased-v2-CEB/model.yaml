    Mit dem Nachweis größeren Fachwissens erhalten Sie deutliche Vorteile gegenüber Mitbewerbern.'
  - "CAD Level 2 - Referenzprojekt\n\n* Festlegung und Besprechung der individuellen Projekte\n* Entwurfs\\- und Konstruktionsvorgaben\n\
    * Bewerbungs\\-Strategien / \\-Training\n* Bearbeitung des Entwurfes bzw. der Gesamtkonstruktion\n* Muster\\-Bewerbung\
    \ mit Projekt\n\nCAD \\- Computer Aided Design bezeichnet die rechnergestützte Konstruktion und ist in allen industriellen\
    \ Branchen ein fester und unentbehrlicher Bestandteil geworden. Die Vorteile eines CAD\\-Programms liegen nicht nur in\
    \ der Zeichenfunktion sondern auch in der Umsetzung von Änderungswünschen, Vereinfachung von Routinearbeiten und Nachbereitungen.\
    \  \nModerne CAD\\-Programme ermöglichen einerseits die Visualisierung von der Produktidee bis zur Vorbereitung der Daten\
    \ für die Steuerung automatischer Fertigungszentren, wie CNC\\-Anlagen. Andererseits können fotorealistische 3D Konstruktionen\
    \ für wirkungsvolle Präsentationen, besonders im Bereich Architektur, erstellt werden.  \nIn allen produzierenden Branchen\
    \ wie dem Anlagenbau, Maschinenbau, Flugzeugbau, Bauwesen, Schiffbau, der Elektronik, der Elektrotechnik, der technischen\
    \ Gebäudeausrüstung bis hin zur Zahnmedizin hat sich CAD mittlerweile zu einem unerlässlichen Werkzeug entwickelt. Im\
    \ Rahmen dieses Kurses erfolgt die Anwendung der in den vorangegangenen Kursen erworbenen Kenntnisse auf spezielle Branchen\
    \ bezogen."
- source_sentence: Palliative Care
  sentences:
