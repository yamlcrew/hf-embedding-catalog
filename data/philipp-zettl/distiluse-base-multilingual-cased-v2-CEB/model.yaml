    - "Geprüfte:r Fachwirt:in für Büro- und Projektorganisation (IHK)\n\nKoordinieren von Entscheidungsprozessen im Rahmen\
      \ betrieblicher Organisationsstrukturen:\n\n* Bewertung von Informationen und deren Aufbereitung für Entscheidungsprozesse\
