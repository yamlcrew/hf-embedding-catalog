      \nVorbereitung auf die externe Prüfung.\n\nKarriere dank Fachwirt:  \nUm Führungsaufgaben zu übernehmen, reicht \x96\
      \ je nach Branche und Arbeitgeber \x96 eine klassische Ausbildung oftmals nicht aus. Was also tun, wenn ein Studium\
