      \ im Umgang mit Waffen\n\nUnfallverhütungsvorschriften\n\n* Sozialgesetzbuch\n* Grundsätze der Prävention\n* Sicherheits\\\
      - und Gesundheitsschutzkennzeichnung\n* Wach\\- und Sicherungsdienste\n\nUmgang mit Menschen\n\n* Verhalten im öffentlichen\
      \ Raum\n* Verhalten in Gefahrensituationen/ Intervention\n* Deeskalationstechniken in Konfliktsituationen\n* Interkulturelle\
      \ Kompetenz unter besonderer Beachtung\n* von Diversität und gesellschaftlicher Vielfalt\n* Stil und Etikette\n\nGrundzüge\
      \ der Sicherheitstechnik\n\n* Mechanische, elektronische und personelle Sicherung, einschl. Risikomanagement\n\nSach\\\
      - und Berufskunde Bewachungsgewerbe\n\n* Dienstkunde\n* Berufsbild/Zugangsvoraussetzungen\n\nBewerbungstraining\n\n\
      * Unterlagen\\-Update\n* Online\\-Stellenrecherche und Bewerbungsversandt\n* Tipps und Tricks für erfolgreiche Bewerbungsgespräche\
      \ (online \\+ offline)\n\nBetriebliches Praktikum\n\n* Optional\n\nGern unterstützen wir Sie bei der Suche nach einem\
      \ geeigneten Betrieb und bereiten Sie auf anstehende Bewerbungsgespräche vor.\n\n  \n**MODUL 2: Berufsbezogenes Sprach\\\
      - und Kommunikationstraining**\n\n* Training berufsbezogener Deutschkenntnisse\n* Vermittlung und Training von Fachbegriffen\n\
      * Anwendungstraining in Rollenspielen anhand möglichst realer Arbeitssituationen\n* Verbale und nonverbale Deeskalationstaktiken\n\
      \nAls Schutz\\- und Sicherheitskraft sind Sie für den Schutz von Anlagen, Objekten und Werten, sowie für den individuellen\
      \ Schutz von Personen verantwortlich. Für bestimmte Tätigkeiten in dieser Branche wird eine erfolgreich bestandene Sachkunde\
      \ nach §34a Gewerbeordnung vorausgesetzt, auf die wir Sie in dieser Weiterbildung intensiv vorbereiten.\n\nIn wenigen\
      \ Wochen erlernen Sie alles, was Sie für den Direkteinstieg in die Wachstumsbranche des Schutz\\- und Sicherheitsgewerbes\
      \ benötigen.\n\nOb im Streifendienst, auf Veranstaltungen, bei Werttransporten, beim Werksschutz, im Personenschutz\
      \ oder bei Verkehrsdiensten – Nach dieser Weiterbildung wissen Sie, welche Maßnahmen zur Gefahrenabwehr zu ergreifen\
      \ sind und wie Sie sich im Ernstfall verhalten müssen.\n\nDer Fachkräftebedarf ist hoch: Starten Sie Ihre Weiterbildung\
      \ zur Schutz\\- und Sicherheitskraft jetzt und nutzen Sie die hervorragenden Jobchancen für sich und Ihre berufliche\
      \ Zukunft!"
    - "Büroassistent mit vorbereitender Buchhaltung\n\n* MS Word kennenlernen\n* Grundlegende Techniken\n* MS Word individualisieren\n\
      * Textarbeit\n* Text, Absätze und Dokumente formatieren\n* Seitenlayout\n* Dokumentvorlagen\n* Kopf\\- und Fußzeilen,\
      \ Seitenzahlen\n* Abbildungen und Formen einfügen und bearbeiten\n* Arbeiten mit Tabellen\n* Seriendruck, Umschläge\
      \ und Etiketten\n* Korrekturhilfen, Drucken\n* Kaufmännisches Rechnen\n* Buchungssätze und Buchungsverfahren\n* Professionelle\
      \ Korrespondenz\n* Zeit\\- und Terminmanagement\n\nDieser Kurs bietet eine umfassende Ausbildung für angehende Büroassistenten\
      \ mit einem besonderen Fokus auf vorbereitende Buchhaltung. Teilnehmende erwerben fundierte Kenntnisse in MS Word, lernen\
      \ die grundlegenden Techniken und Individualisierungsoptionen kennen und werden in der Textarbeit sowie der Formatierung\
      \ von Dokumenten geschult. Darüber hinaus vermittelt der Kurs kaufmännisches Rechnen und die wesentlichen Aufgaben und\
      \ gesetzlichen Vorschriften der Buchführung. Die Teilnehmenden lernen, Buchungssätze zu erstellen, die Umsatzsteuer\
      \ zu berechnen und die Grundsätze ordnungsmäßiger Buchführung anzuwenden.  \n  \nEin weiterer Schwerpunkt liegt auf\
      \ der professionellen Korrespondenz und der erfolgreichen Kommunikation im Geschäftsalltag. Teilnehmende werden befähigt,\
      \ Assistenz\\- und Sekretariatsaufgaben zu übernehmen, Zeit\\- und Terminmanagement zu betreiben sowie Protokollführung\
      \ und Dokumentation durchzuführen. Der Kurs bietet zudem eine Einführung in die Planung, Durchführung und Nachbereitung\
      \ von Projekten. Innerhalb des Kurses können zusätzliche Zertifikate erworben werden, die die erworbenen Fähigkeiten\
      \ und Kenntnisse bestätigen."
