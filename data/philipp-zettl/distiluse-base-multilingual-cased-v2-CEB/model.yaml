    * Objekte füllen, editieren\n* Plakatwerbung, Vektorisieren\n* Interaktiv nachzeichnen, interaktiv malen u. auswählen\n\
    * Schnittmaske, Pathfinder\n* Pfade erstellen und bearbeiten\n* Textarten, Texteffekte\n* Punkttext, Flächentext, Pfadtext\n\
    \nÜberblick über Illustrator: Pläne, Projektaufgaben, Oberfläche, Werkzeuge, Bibliotheken  \nPfade: Pfade zeichnen, editieren,\
    \ Illustrator\\-Hilfe Farben, Verläufe\n\nVerlaufsgitter: Farbfeldbibliothek, Objekte mit verschiedenen Verlaufstechniken\
