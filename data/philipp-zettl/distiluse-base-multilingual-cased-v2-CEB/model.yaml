      \ in betrieblichen Leistungsprozessen:\n\n* Organisieren und Dokumentieren von kundenorientierten Projekten,\n* Zielgruppen\\\
      - und Marktanalysen unterstützen,\n* Planen und Koordinieren von zielgruppen\\- und produktbezogenen Werbemitteln,\n\
      * Veranstaltungen planen, gestalten und durchführen,\n* Kundenkontakte und \\-kommunikation unter Berücksichtigung des\
      \ betrieblichen Beschwerdemanagements und von Verhaltensregeln gestalten\n\nFühren, Betreuen, Verwalten und Ausbilden\
