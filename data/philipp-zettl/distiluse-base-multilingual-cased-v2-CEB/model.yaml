      \ Praxiskenntnisse und ergänzt diese um theoretisches Fachwissen vor allem im Bereich der Betriebswirtschaftslehre.\
      \ So sind die Absolventen optimal auf den nächsten Karriereschritt vorbereitet, zum Beispiel als Geprüfte:r Fachwirt:in\
      \ für Büro\\- und Projektorganisation.  \n  \nDas machen Geprüfte Fachwirte für Büro\\- und Projektorganisation:  \n\
      Geprüfte Fachwirte für Büro\\- und Projektorganisation sind in verschiedenen Bereichen der Bürowirtschaft für die Planung,\
      \ Steuerung und Kontrolle von Geschäftsabläufen eigenständig verantwortlich. Dabei verwenden sie betriebs\\- und personalwirtschaftliche\
      \ Steuerungsinstrumente und beachten wirtschaftliche, rechtliche und soziale Zusammenhänge.  \n  \nDie Fortbildung zum:zur\
      \ Geprüften Fachwirt:in für Büro\\- und Projektorganisation schließt mit einer anerkannten Prüfung vor einer Industrie\\\
      - und Handelskammer (IHK) ab. Der Abschluss entspricht im deutschen Qualifikationsrahmen (DQR) der Niveaustufe 6\\."
