    \ Beschaffungsvorgänge\n\nSie haben keinen Abschluss, aber sind berufserfahren und engagiert? Darauf lässt sich aufbauen!\
    \ Die Externenprüfung ist ein Weg, eine Qualifikationen nachzuholen und eine Ausbildung abzuschließen. Mit einem Berufsabschluss\
