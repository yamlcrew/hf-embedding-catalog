    - "Klimaschutzmanagement - Referenzprojekt\n\nInnerhalb dieses Kurses erfolgt die unterstützte Erstellung eines Praxisprojekts\
      \ im Bereich Klimaschutzmanagement, das als Referenz für Bewerbungen und den Arbeitsalltag dienen kann. Sie erhalten\
      \ dabei nützliches individuelles Feedback und Tipps.\n\nIn einer Zeit, in der die grüne Wirtschaft wächst und Unternehmen\
      \ immer mehr Wert auf Umweltverträglichkeit und Nachhaltigkeit legen, gewinnen Praxis\\-Skills und Berufserfahrung an\
      \ Bedeutung. Ein Referenzprojekt trägt dazu bei, Fachkräfte auszubilden, die nicht nur theoretische Kenntnisse erwerben,\
      \ sondern diese auch erfolgreich praktisch umsetzen.  \n  \nDas Referenzprojekt dient zur eigenständigen Anwendung des\
      \ erworbenen Wissens und Ihrer Fähigkeiten im Bereich Klimaschutzmanagement. Es bietet Raum für Übung und Feedback als\
      \ Vorbereitung für Bewerbungsgespräche und die reale Anwendung der Fertigkeiten im Berufsalltag. Vorteil für Sie: Im\
      \ Kontext von Bewerbungen kann ein Referenzprojekt eine wichtige Rolle bei der Auswahl zwischen Bewerbern spielen."
    - 'Gasschweißen - Blechschweißer


      * Theoretischer Unterricht

      * Schweißen von Kehlnähten an Blechen mit unterschiedlichen Dicken, „nach links“ und „nach rechts“, in den Positionen
      PA, PB, PD, PF

      * Schweißen von Stirnkehlnähten an Blechen mit unterschiedlichen Dicken, „nach links“ und „nach rechts“, in den Positionen
      PA, PD, PF

      * Schweißen von Stumpfnähten an Blechen mit unterschiedlichen Dicken, „nach links“ und „nach rechts“, in den Positionen
      PA, PC, PF


      Das Schweißverfahren Gasschweißen wird normalerweise als Teil einer modularen Schweißerausbildung zusammen mit anderen
      Verfahren erlernt. Das Gasschweißen wird vorwiegend zum Schweißen von unlegierten und niedriglegierten Stählen eingesetzt.
      Es eignet sich besonders zum Schweißen dünner Bleche und dünnwandiger Rohre sowie zur Durchführung von Reparatur\- und
      Auftragsschweißungen. Das Verfahren ist besonders im Heizungs\-, Installations\- und Rohrleitungsbau weit verbreitet.


      Im Schweißverfahren Gasschweißen \- Blechschweißen erlernen Sie fachkundliche Kenntnisse und praktische Fertigkeiten
      im Schweißen von Blechen mit Acetylen\-Sauerstoff\-Flamme. Auch erlernen Sie das Schweißen von Kehl\- und Stumpfnähten
      an Blechen mit verschiedenen Blechdicken und in unterschiedlichen Schweißpositionen.'
