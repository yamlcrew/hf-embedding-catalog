      \ mitwirken und Personalbetreuung durchführen sowie\n* Personalentwicklungsmaßnahmen umsetzen,\n* Ausbildung planen,\
      \ organisieren, durchführen und kontrollieren,\n* Konflikte erkennen und analysieren, daraus Konfliktbewältigungsstrategien\
      \ ableiten und umsetzen,\n* Moderation von Projektgruppen vorbereiten und unter Einsatz von Kommunikations\\- und Präsentationstechniken\
      \ durchführen\n\nSteuern von Geschäftsprozessen im bürowirtschaftlichen Umfeld:\n\n* Aufbereiten von Kennzahlen zur\
      \ Unterstützung der Steuerung betrieblicher Entscheidungsprozesse,\n* Koordinieren von Aufgaben des Einkaufs und der\
      \ Beschaffung,\n* Beurteilen von Datenbanksystemen und anderen bürowirtschaftlichen Anwendungen für den zielorientierten\
