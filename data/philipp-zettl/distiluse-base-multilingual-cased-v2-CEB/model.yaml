  - source_sentence: "Kaufmann / Kauffrau für Spedition und Logistikdienstleistungen - Vorbereitung auf Externenprüfung /\
      \ Externenregelung - geringe Vorkenntnisse - Intensivkurs (IHK)\n\nSie haben keinen Abschluss, aber sind berufserfahren\
      \ und engagiert? Darauf lässt sich aufbauen! Die Externenprüfung ist ein Weg, eine Qualifikationen nachzuholen und eine\
      \ Ausbildung abzuschließen. Mit einem Berufsabschluss haben Sie die besten Aussichten auf einen sicheren Job und mindern\
      \ das Risiko von Arbeitslosigkeit. Damit eröffnet das Bestehen der Externenprüfung vielfältige Perspektiven und neue\
      \ Chancen auf ein erfolgreiches Berufsleben und einen beruflichen Aufstieg.  \n  \nIm Rahmen dieser Maßnahme werden\
      \ Sie auf die Externenprüfung zum Kaufmann bzw. zur Kauffrau für Spedition und Logistikdienstleistungen vorbereitet.\
      \  \n  \nDie individuelle Vorbereitung auf die Abschlussprüfung wird nach einer ausführlichen persönlichen Bildungsberatung\
      \ für Sie zusammengestellt und richtet sich nach Ihren Vorkenntnissen."
