widgetData:
- source_sentence: What is the advice given about the use of color in dataviz?
  sentences:
  - Don't use color if they communicate nothing.
  - Four problems with Pie Charts are detailed in a guide by iCharts.net.
  - Always use bright colors for highlighting important data.
- source_sentence: What is the effect of a large sample size on the use of jitter in a boxplot?
  sentences:
  - A large sample size will enhance the use of jitter in a boxplot.
  - If you have a large sample size, using jitter is not an option anymore since dots will overlap, making the figure uninterpretable.
  - It is a good practice to use small multiples.
- source_sentence: What is a suitable usage of pie charts in data visualization?
  sentences:
  - If you have a single series to display and all quantitative variables have the same scale, then use a barplot or a lollipop
    plot, ranking the variables.
  - Pie charts rapidly show parts to a whole better than any other plot. They are most effective when used to compare parts
    to the whole.
  - Pie charts are a flawed chart which can sometimes be justified if the differences between groups are large.
- source_sentence: Where can a note on long labels be found?
  sentences:
  - https://www.data-to-viz.com/caveat/hard_label.html
  - A pie chart can tell a story very well; that all the data points as a percentage of the whole are very similar.
  - https://twitter.com/r_graph_gallery?lang=en
- source_sentence: What is the reason pie plots can work as well as bar plots in some scenarios?
  sentences:
  - Pie plots can work well for comparing portions a whole or portions one another, especially when dealing with a single
    digit count of items.
  - https://www.r-graph-gallery.com/line-plot/ and https://python-graph-gallery.com/line-chart/
  - Thanks for your comment Tom, I do agree with you.
