      \ gửi Online trên  SMB có \nngày mở, quay vòng trước ngày 06/09/2022 không được phép rút trước hạn từng \nphần.  \n\
      - Điều kiện rút trước hạn: Khách hàng chỉ được rút trước hạn từng phần khi số \ndư gốc còn lại lớn hơn số dư tiền gửi\
      \ tiết kiệm online tối thiểu theo quy định từng \nthời kỳ, hiện tại là 1.000.000 đồng.  \n- Lãi suất phụ trội: Được\
      \ áp dụng LSPT. Trong ngày mở tài khoản tiền gửi tiết \nkiệm có kỳ hạn Online, KSV chi nhánh sử dụng menu 30001 trên\
      \ hệ thống BDS, \nnhập số số tài khoản tiền gửi tiết kiệm có kỳ hạn online để thực hiện điều chỉnh lãi \nsuất. Đối với\
      \ các kh oản tiền gửi đã qua ngày mở tài khoản, chi nhánh lập đề nghị \nchỉnh sửa dữ liệu SIBS theo hướng dẫn tại công\
      \ văn 16065/BIDV -NHBL. Chi tiết \ncác bước thực hiện theo phụ lục IV đính kèm.  \n- Lãi suất rút trước hạn:  \n+ Đối\
      \ với phần gốc tiền gửi rút trước hạn: Áp dụng mức lãi suất tối đa bằng mức \nlãi suất tiền gửi không kỳ hạn thấp nhất\
