      \ v à yêu cầu bổ sung giấy tờ nếu cần thiết\n-Khách hàng có thể thực hi ện khiếu nại v ề CTKM trong vòng tối đa\
      \ 10 ng ày kể từ\nngày trả thưởng cuối c ùng. Hết thời hạn trên, BIDV không chịu trách nhi ệm xử lý\ncác khiếu\
      \ nại của khách h àng\n-BIDV được miễn trách đối v ới các trường hợp bất khả kháng xảy ra trong thời gian\ndiễn\
      \ ra chương trình l àm cho các giao dịch của chủ thẻ bị sai l ệch, không thực hi ện\nđược ho ặc không truy ền\
      \ về hệ thống ngân h àng.\n-BIDV không có bất kỳ trách nhi ệm nào liên quan đến các khoản thuế phát sinh từ\n\
      việc Khách h àng nhận ti ền thưởng khuyến mại. Bất kỳ khoản thuế n ào hoặc việc chi\ntrả khoản thuế cho cơ quan\
