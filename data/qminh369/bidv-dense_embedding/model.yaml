      \ báo gói dịch vụ, hạn mức, gói phí theo nội dung chính sách triển \nkhai.  \n- Đầu mối phối hợp với các đơn vị truyền\
      \ thông và hướng dẫn Chi nhánh thực hiện.  \n- Đầu mối hỗ trợ chi nhánh về các dịch vụ liên quan đến Smartbanking trừ\
      \ các tính \nnăng Dịch vụ thẻ  (cán bộ đầu mối Hán Hoàng Long - nhóm kênh phân phối - VOIP: 299 -\n7171).  \nc) Trung\
      \ tâm Thẻ  \n- Đầu mối xử lý các vấn đề liên quan đến tính năng sản phẩm Dịch vụ thẻ: nhóm \nPhát triển sản phẩm – VOIP:\
