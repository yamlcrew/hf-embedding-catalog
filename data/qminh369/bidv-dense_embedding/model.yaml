  - "HƯỚNG DẪN SỬ DỤNG \nSMARTBANKING II. Đăng nhập   /   Đăng nhập user Active 18\nĐăng nhập\nĐăng nhập user ActiveII."
  - "7 \n \n- Khách hàng sử dụng phiên bản cũ (iOS từ 5. 1.9 trở xuống và Android từ 5. 2.2 \ntrở xuống) cần cập nhật phiên\
    \ bản mới để tr ải nghiệm các tính năng mới/ chỉnh sửa.  \nIII. Tổ chức thực hiện  \n1. Chi nhánh  \n- Hướng dẫn khách\
    \ hàng hàng cập nhật ứng dụng SmartBanking để trải nghiệm \ntính năng mới.  \n- Nghiên cứu, nắm bắt nội dung công văn\
    \ và tài liệu hướng dẫn sử dụng để giới \nthiệu cũng như giải đáp các vướng mắc của khách hàng trong quá trình sử dụng\
    \ dịch vụ.  \n2. Trụ sở chính  \na) Trung tâm Ngân hàng số: đầu mối xử lý các vấn đề liên quan đến tính năng mới/ \nđiều\
    \ chỉnh trên SmartBanking trừ các tính năng Dịch vụ Thẻ.  \nb) Ban Phát triển ngân hàng bán lẻ  \n- Đầu mối khai báo gói\
    \ dịch vụ, hạn mức, gói phí theo nội dung chính sách triển \nkhai.  \n- Đầu mối phối hợp với các đơn vị truyền thông và\
    \ hướng dẫn Chi nhánh thực hiện.  \n- Đầu mối hỗ trợ chi nhánh về các dịch vụ liên quan đến Smartbanking trừ các tính\
    \ \nnăng Dịch vụ thẻ  (cán bộ đầu mối Hán Hoàng Long - nhóm kênh phân phối - VOIP: 299 -\n7171).  \nc) Trung tâm Thẻ \
    \ \n- Đầu mối xử lý các vấn đề liên quan đến tính năng sản phẩm Dịch vụ thẻ: nhóm \nPhát triển sản phẩm – VOIP: 299 -8203)\
