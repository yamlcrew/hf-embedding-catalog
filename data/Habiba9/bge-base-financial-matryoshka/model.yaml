  - By how much did domestic distribution revenue excluding the Olympics change from 2021 to 2023?
- source_sentence: Our products enable global service providers to continue to deploy next generation broadband access technologies
    across multiple standards, including G.fast, Data Over Cable Service Interface Specifications (DOCSIS), PON and Wi-Fi
    to provide more bandwidth and faster speeds to consumers.
  sentences:
  - Where is the index to the Financial Statements and Supplementary Data located?
  - How do our products support next-generation broadband access technologies?
  - What type of corporation is The Coca-Cola Company?
- source_sentence: 'Our strategy is focused on growing customer loyalty by delivering great value and convenience, and investing
    in four strategic pillars: Fresh, Our Brands, Data & Personalization and Seamless.'
  sentences:
  - What are Kroger’s four strategic pillars?
  - What are some current enterprise applications of VR and AR technologies?
  - What was the amount of cost savings achieved in 2022 and for how many consecutive years has this level been maintained?
- source_sentence: We utilize a sourcing strategy that emphasizes global procurement of materials and product manufacturing
    in lower cost regions. We outsource the manufacturing of our products to third-party contract manufacturers.
  sentences:
  - What was the percentage increase or decrease in total research and development expenses for the company from the previous
    year?
  - What factors are considered when deciding whether to accrue a loss or disclose a loss contingency?
  - What kind of sourcing strategy does Enphase Energy, Inc. employ for its production?
- source_sentence: Total Company matching contributions to the plans were $263 million in fiscal year 2023.
  sentences:
