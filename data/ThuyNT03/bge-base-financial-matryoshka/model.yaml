widgetData:
- source_sentence: Each week, Walmart serves approximately 240 million customers who visit its retail stores and eCommerce
    websites across 20 countries.
  sentences:
  - Where are the consolidated financial statements listed in the Annual Report on Form 10-K?
  - How many customers does Walmart serve weekly?
  - What amount did AMC Entertainment Holdings, Inc. list in long-lived assets impairment charges for U.S. theatres in the
    year 2023?
- source_sentence: Our principal sources of liquidity are cash flows generated from operations and our cash, cash equivalents,
    and marketable securities balances, which, at fair value, were $70.0 billion and $86.8 billion as of December 31, 2022
    and 2023.
  sentences:
  - What is the main purpose of the Hilton Honors program?
  - What are the main sources of liquidity for the company as of December 31, 2023?
  - What technological advancements has Google introduced to improve search functionality?
- source_sentence: Cost of automotive leasing revenue includes the depreciation of operating lease vehicles, cost of goods
    sold associated with direct sales-type leases and warranty expense related to leased vehicles.
  sentences:
  - What were the primary components included in the cost of automotive leasing revenue?
  - What was the percentage change in impairment of goodwill for Hewlett Packard Enterprise between fiscal 2022 and 2023?
  - What was the free cash flow for fiscal 2023 and how was it calculated?
- source_sentence: For example, in 2023 we began production at our Research Triangle Park site in North Carolina and expect
    to continue significant capacity expansion over time as we increase production at this site and others.
  sentences:
  - How much did NVIDIA record as an acquisition termination cost in fiscal year 2023 related to the Arm Share Purchase Agreement?
  - What was the goodwill impairment charge for the HPC & AI reporting unit in fiscal 2022?
  - What progress was made in 2023 at the Research Triangle Park production site in North Carolina?
- source_sentence: Net write-off rate – principal only – Represents the amount of proprietary consumer or small business Card
    Member loans or receivables written off, consisting of principal (resulting from authorized transactions), less recoveries,
    as a percentage of the average loan or receivable balance during the period.
  sentences:
  - What does the term 'net write-off rate – principal only' refer to?
  - What operating system is used for the Company's iPhone line?
  - How much of the $15.0 billion share repurchase authorization remained available as of a recent fiscal year?
