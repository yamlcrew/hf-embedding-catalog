widgetData:
- source_sentence: What is the role of the Public Information Officer during a radiological emergency?
  sentences:
  - The Public Information Officer (PIO), assigned duties at the Emergency Operations Center (EOC), and the Parish Spokesperson
    will be responsible for implementation of this procedure.
  - Be prepared to report to the Parish EOC if requested by the Director of the Office of Homeland Security and Emergency
    Preparedness.
  - HRI may proceed with its planned mining-related activities in these areas to the extent authorized by its NRC Materials
    License SUA-1508.
- source_sentence: The NRC also regulates the licensing and reporting obligations for materials that are byproducts in the
    medical field.
  sentences:
  - Parts 30, 31, 32 and 150
  - 'Exemptions From Licensing, General Licenses, and Distribution of Byproduct Material: Licensing and Reporting Requirements'
  - Containment vessel (CNV) pressure/temperature response analysis method, similar to method used in DCA technical report,
    responds to LOCA pipe break, secondary line breaks, IORV events, or inadvertent ECCS actuation.
- source_sentence: What is the aging management program for concrete in nuclear facilities?
  sentences:
  - Further evaluation is required to determine if a plant-specific aging management program is needed.
  - The DCPP Structures Monitoring AMP (B.2.3.33) is credited with managing cracking due to reaction with aggregates (such
    as ASR), for DCPP group 1, 3, 4, 5, and 7 structures, including inaccessible areas.
  - The Survey Units listed in Figure 4 measure various acreage sizes, detailing the land area covered by each unit within
    the Non-Industrialized section of the site.
- source_sentence: What is the purpose of an emergency core cooling system in nuclear reactors?
  sentences:
  - The Commission issued Staff Requirements Memorandum (SRM) SECY-10-0113 directing the staff to consider alternative options
    for resolving GSI-191 (Reference 5).
  - preclude the formulation or implementation of reasonable and prudent alternatives to avoid jeopardizing the continued
    existence of endangered or threatened species or destroying or modifying critical habitat [Section 7(d)].
  - ECCS must be designed so that calculated cooling performance following postulated loss-of-coolant accidents conforms to
    the criteria set forth in paragraph (b) of this section.
- source_sentence: corrosion related to nuclear components
  sentences:
  - This alternative is requested for the duration of the Brunswick Steam Electric Plant, Units 1 & 2, Third Ten-Year Containment
    Inservice Inspection Interval, which is currently scheduled to end no later than May 10, 2028.
  - '*Note: Initiation of Reactor Enclosure isolation starts Reactor Enclosure Recirculation System (RERS) and SGTS. Ref:
    UFSAR 6.2.3.2.3*'
  - In the proposed alternative by the Owner (Duke Energy), corrosion or erosion that has reduced the component wall thickness
    to less than 145% of the minimum design wall thickness will be considered a relevant condition that will require evaluation
    or corrective measures to the extent necessary to meet the acceptance standards of IWE-3500 prior to continued service.
