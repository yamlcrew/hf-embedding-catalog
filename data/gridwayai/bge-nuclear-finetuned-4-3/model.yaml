widgetData:
- source_sentence: What is the aging management process for concrete structures in nuclear power plants?
  sentences:
  - Loss of material (spalling, scaling) and cracking due to freeze-thaw is a significant consideration in the aging management
    of concrete used for structural support and water retaining boundaries in nuclear power plants.
  - The NRC requires thorough inspections of various reactor components to ensure compliance with regulatory safety standards.
  - The applicability of fuel fragmentation and relocation models considering the full set of experimental test data presently
    available and higher fuel burnups being proposed in WCAP-18850-P.
- source_sentence: control rod sequence during reactor startup
  sentences:
  - With the RWM inoperable during a reactor startup, the operator is still capable of enforcing the prescribed control rod
    sequence. However, the overall reliability is reduced because a single operator error can result in violating the control
    rod sequence.
  - With the RWM inoperable during a reactor shutdown, the operator is still capable of enforcing the prescribed control rod
    sequence.
  - Potential ecological impacts during aquifer restoration will be SMALL, since surface disturbing activities will be limited.
    Potential impacts associated with aquifer restoration activities will include vegetation and habitat alteration due to
    the response and cleanup of potential spills, noxious weeds, wildlife mortality from vehicle collisions and displacement
    due to noise, dust, and human/mechanical presence. Potential impacts are expected to be less than during operation due
    to a smaller workforce and decreased traffic.
- source_sentence: What measurement units are used for reactor coolant temperatures?
  sentences:
  - The coolant temperatures in the reactors are measured in degrees Celsius (°C).
  - The reports frequently summarize operational data over time spans such as weeks and months.
  - 'MDA: Minimum Detectable Activity refers to the lowest quantity of radioactive material that can be reliably detected
    by a particular measurement method.'
- source_sentence: The NRC mandates specific designs for the safety baskets in boiling water reactors to ensure optimal performance.
  sentences:
  - COBRA-FLX is a computer code developed for the prediction of critical heat flux (CHF) in light water reactor thermal-hydraulic
    systems, and it has been validated against a wide range of experimental data to ensure its accuracy.
  - Figure B2-5 presents the schematic of the BWR 81-Assembly Basket, which is essential for the containment and organization
    of nuclear fuel assemblies.
  - The arrangement of different materials in a reactor core affects the thermal efficiency greatly, especially under high-pressure
    conditions.
- source_sentence: boric acid solution in nuclear reactors
  sentences:
  - A temperature sensor provides temperature measurement of each tank's contents. Temperature indication is provided as well
    as high and low temperature alarms which are indicated on the main control board.
  - The calculated dose values at different locations are essential for ensuring compliance with safety standards.
  - The concentration of boric acid solution in storage is maintained between 4 and 4.4 percent by weight. Periodic manual
    sampling and corrective action, if necessary, assures that tanks are maintained.
