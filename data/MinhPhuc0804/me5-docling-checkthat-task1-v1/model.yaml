    population.'
  sentences:
  - 'passage: doses. Results Among 51017 employees, COVID-19 occurred in 4424 (8.7%) during the study.


    title: Effectiveness of the Coronavirus Disease 2019 (COVID-19) Bivalent Vaccine

    In multivariable analysis, the bivalent vaccinated state was associated with lower risk of COVID-19 during the BA.4/5
    dominant (HR, .71; 95% C.I., .63-.79) and the BQ dominant (HR, .80; 95% C.I., .69-.94) phases, but decreased risk was
    not found during the XBB dominant phase (HR, .96; 95% C.I., .82-.1.12). Estimated vaccine effectiveness (VE) was 29% (95%
    C.I., 21%-37%), 20% (95% C.I., 6%-31%), and 4% (95% C.I., -12%-18%), during the BA.4/5, BQ, and XBB dominant phases, respectively.
    Risk of COVID-19 also increased with time since most recent prior COVID-19 episode and with the number of vaccine doses
    previously received.'
  - 'passage: title: COVID-19 Mitigation Practices and COVID-19 Rates in Schools: Report on Data from Florida, New York and
    Massachusetts

    abstract: Abstract This paper reports on the correlation of mitigation practices with staff and student COVID-19 case
    rates in Florida, New York, and Massachusetts during the 2020-2021 school year. We analyze data collected by the COVID-19
    School Response Dashboard and focus on student density, ventilation upgrades, and masking. We find higher student COVID-19
    rates in schools and districts with lower in-person density but no correlations in staff rates. Ventilation upgrades are
    correlated with lower rates in Florida but not in New York. We do not find any correlations with mask mandates. All rates
    are lower in the spring, after teacher vaccination is underway.'
  - 'passage: d the bacterial counts from the same surgeon, a significant increase was noted in the 2-hours group.


    title: Surgical masks as source of bacterial contamination during operative procedures

    Moreover, the bacterial counts were significantly higher among the surgeons than the OR. Additionally, the bacterial count
    of the external surface of the second mask was significantly higher than that of the first one. The source of bacterial
    contamination in SMs was the body surface of the surgeons rather than the OR environment. Moreover, we recommend that
    surgeons should change the mask after each operation, especially those beyond 2 hours. Double-layered SMs or those with
    excellent filtration function may also be a better alternative. This study provides strong evidence for the identification
    that SMs as source of bacterial contamination during operative procedures, which should be a cause for alarm and attention
    in the prevention of surgical site infection in clinical practice.'
