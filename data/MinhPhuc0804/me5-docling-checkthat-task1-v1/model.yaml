- source_sentence: 'query: Our work is not trauma-informed unless it is rooted in anti-racist, anti-oppressive, culturally
    sustaining, liberating practices. Stolen Breaths | NEJM'
  sentences:
  - 'passage: title: Long COVID symptoms and duration in SARS-CoV-2 positive children — a nationwide cohort study

    abstract: Most children have a mild course of acute COVID-19. Only few mainly non-controlled studies with small sample
    size have evaluated long-term recovery from SARS-CoV-2 infection in children. The aim of this study was to evaluate symptoms
    and duration of ''long COVID'' in children. A nationwide cohort study of 37,522 children aged 0-17 years with RT-PCR verified
    SARS-CoV-2 infection (response rate 44.9%) and a control group of 78,037 children (response rate 21.3%). An electronic
    questionnaire was sent to all children from March 24th until May 9th, 2021. Symptoms lasting > 4 weeks were common among
    both SARS-CoV-2 children and controls. However, SARS-CoV-2 children aged 6-17 years reported symptoms more frequently
    than the control group (percent difference 0.8%).'
  - 'passage: ke-specific antibodies to mediate antibody-dependent cellular phagocytosis and complement deposition.


    title: Class switch toward noninflammatory, spike-specific IgG4 antibodies after repeated SARS-CoV-2 mRNA vaccination

    Because Fc-mediated effector functions are critical for antiviral immunity, these findings may have consequences for the
    choice and timing of vaccination regimens using mRNA vaccines, including future booster immunizations against SARS-CoV-2.'
  - 'passage: title: Stolen Breaths

    abstract: In the wake of George Floyd’s public execution, uprisings have ignited in cities throughout the United States
    The words “I can’t breathe” hang heavy in the air Black people cannot breathe because we are currently battling at least
    two public health emergencies'
- source_sentence: 'query: Figures from blood donations reveal Americans w/ COVID-19 antibodies rose from 20.5% to 83.3% after
    the rollout of #COVID19 shots. CDC is digging into how many people need antibodies before the population can be deemed
    protected. Learn more:'
  sentences:
  - 'passage: oprevalence estimate in May 2021 was 83.3% (95% CI, 82.9%-83.7%).


    title: Estimated US Infection- and Vaccine-Induced SARS-CoV-2 Seroprevalence Based on Blood Donations, July 2020-May 2021

    By May 2021, 2.1 SARS-CoV-2 infections (95% CI, 2.0-2.1) per reported COVID-19 case were estimated to have occurred.Based
    on a sample of blood donations in the US from July 2020 through May 2021, vaccine- and infection-induced SARS-CoV-2 seroprevalence
    increased over time and varied by age, race and ethnicity, and geographic region. Despite weighting to adjust for demographic
    differences, these findings from a national sample of blood donors may not be representative of the entire US population.'
  - 'passage: title: A molnupiravir-associated mutational signature in global SARS-CoV-2 genomes

    abstract: Molnupiravir, an antiviral medication that has been widely used against SARS-CoV-2, acts by inducing mutations
    in the virus genome during replication. Most random mutations are likely to be deleterious to the virus, and many will
    be lethal, and so molnupiravir-induced elevated mutation rates reduce viral load 2,3 . However, if some patients treated
    with molnupiravir do not fully clear SARS-CoV-2 infections, there could be the potential for onward transmission of molnupiravir-mutated
    viruses. Here we show that SARS-CoV-2 sequencing databases contain extensive evidence of molnupiravir mutagenesis.'
  - 'passage: title: Crab Shell-Derived SnS<sub>2</sub>/C and FeS<sub>2</sub>/C Carbon Composites as Anodes for High-Performance
    Sodium-Ion Batteries

    abstract: The demand for energy storage devices has increased significantly, and the sustainable development of lithium-ion
    batteries is limited by scarce lithium resources. Therefore, alternative sodium-ion batteries which are rich in resource
    may become more competitive in the future market. In this work, we synthesized low-cost SnS2/C and FeS2/C anode materials
    of sodium-ion batteries which used waste crab shells as biomass carbon precursor. The SnS2 nanosheet and FeS2 nanosphere
    structures are deposited on the crab shell-derived carbon through simple hydrothermal reaction. Due to the coexistence
    of transition metal dichalcogenides (TMDs) and crab-derived biomass carbon, the anode material has excellent cycle stability
    and rate performance.'
- source_sentence: 'query: So grateful for this real science from the Trans Youth CAN study! Do Clinical Data From Transgender
    Adolescents Back the Phenomenon of “Rapid-Onset Gender Dysphoria”? 🥁🥁🥁 NO!'
  sentences:
  - 'passage: title: Yaravirus: A novel 80-nm virus infecting <i>Acanthamoeba castellanii</i>

    abstract: Here we report the discovery of Yaravirus, a lineage of amoebal virus with a puzzling origin and evolution.
    Yaravirus presents 80-nm-sized particles and a 44,924-bp dsDNA genome encoding for 74 predicted proteins. Yaravirus genome
    annotation showed that none of its genes matched with sequences of known organisms at the nucleotide level; at the amino
    acid level, six predicted proteins had distant matches in the nr database. Complimentary prediction of three-dimensional
    structures indicated possible function of 17 proteins in total. Furthermore, we were not able to retrieve viral genomes
    closely related to Yaravirus in 8,535 publicly available metagenomes spanning diverse habitats around the globe. The Yaravirus
    genome also contained six types of tRNAs that did not match commonly used codons.'
  - 'passage: harm), support from online and/or transgender friends but not parents, and lesser gender dysphoria.


    title: Do Clinical Data from Transgender Adolescents Support the Phenomenon of “Rapid Onset Gender Dysphoria”?

    We aim to test these hypotheses. Baseline data (2017-2019) from the Trans Youth CAN! Cohort included pubertal/postpubertal
    adolescents age <16 years attending a first referral visit for hormone suppression or gender-affirming hormones at 10
    Canadian medical clinics that provide specialized gender-affirming care to adolescents through a range of different care
    models. Ethics approval was received from all study sites. Years gender was known was missing for 1 participant (excluded),
    for a final sample of n = 173. Methods and measures are described in detail elsewhere.18Bauer G.R. Pacaud D. Couch R.
    Metzger D.L. Gale L. Gotovac S. et al.Transgender youth referred to clinics for gender-affirming medical care in Canada.Pediatrics.'
  - 'passage: protein.


    title: Safety and Efficacy of the BNT162b2 mRNA Covid-19 Vaccine

    The primary end points were efficacy of the vaccine against laboratory-confirmed Covid-19 and safety.Download a PDF of
    the Research Summary.ResultsA total of 43,548 participants underwent randomization, of whom 43,448 received injections:
    21,720 with BNT162b2 and 21,728 with placebo. There were 8 cases of Covid-19 with onset at least 7 days after the second
    dose among participants assigned to receive BNT162b2 and 162 cases among those assigned to placebo; BNT162b2 was 95% effective
    in preventing Covid-19 (95% credible interval, 90.3 to 97.6). Similar vaccine efficacy (generally 90 to 100%) was observed
    across subgroups defined by age, sex, race, ethnicity, baseline body-mass index, and the presence of coexisting conditions.
    Among 10 cases of severe Covid-19 with onset after the first dose, 9 occurred in placebo recipients and 1 in a BNT162b2
    recipient.'
- source_sentence: 'query: @user "the performance gap between males and females becomes significant at puberty and often amounts
    to 10–50% depending on sport...the muscular advantage enjoyed by transgender women is only minimally reduced when testosterone
    is suppressed."'
  sentences:
  - 'passage: between males and females becomes significant at puberty and often amounts to 10–50% depending on sport.


    title: Transgender Women in the Female Category of Sport: Perspectives on Testosterone Suppression and Performance Advantage

    The performance gap is more pronounced in sporting activities relying on muscle mass and explosive strength, particularly
    in the upper body. Longitudinal studies examining the effects of testosterone suppression on muscle mass and strength
    in transgender women consistently show very modest changes, where the loss of lean body mass, muscle area and strength
    typically amounts to approximately 5% after 12 months of treatment. Thus, the muscular advantage enjoyed by transgender
    women is only minimally reduced when testosterone is suppressed. Sports organizations should consider this evidence when
    reassessing current policies regarding participation of transgender women in the female category of sport.'
  - 'passage: title: Concomitant myocarditis and painless thyroiditis after AstraZeneca coronavirus disease 2019 vaccination:
    a case report

    abstract: Incidence of myocarditis following messenger RNA coronavirus disease 2019 vaccination has been widely described,
    but this clinical scenario after adenoviral vector coronavirus disease 2019 vaccination has only been rarely reported.
    In addition, a few case reports of thyroiditis after adenoviral vector coronavirus disease 2019 vaccination have been
    published.A 55-year-old Thai woman presented with palpitation without neck pain 14 days after receiving AstraZeneca coronavirus
    disease 2019 vaccination. Electrocardiography revealed sinus tachycardia. Her blood tests showed elevation of cardiac
    troponin and free triiodothyronine with suppressed serum thyroid stimulating hormone, reflecting a hyperthyroid status.
    Evidence of myocardial inflammation and necrosis from cardiac magnetic resonance imaging supported the diagnosis of recent
    myocarditis. Laboratory results and imaging findings were consistent with thyroiditis.'
  - 'passage: each country’s first wave from 13th March (when stringent interventions began) until 1st July 2020.


    title: Comparing the responses of the UK, Sweden and Denmark to COVID-19 using counterfactual modelling

    UK mortality would have approximately doubled had Swedish policy been adopted, while Swedish mortality would have more
    than halved had Sweden adopted UK or Danish strategies. Danish policies were most effective, although differences between
    the UK and Denmark were significant for one counterfactual approach only. Our analysis shows that small changes in the
    timing or effectiveness of interventions have disproportionately large effects on total mortality within a rapidly growing
    epidemic.'
