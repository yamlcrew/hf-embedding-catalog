  - 'passage: C blockade, we identify EGFR signaling as the dominant mechanism of colorectal cancer resistance to KRASG12C
    inhibitors.


    title: EGFR Blockade Reverts Resistance to KRASG12C Inhibition in Colorectal Cancer

    The combinatorial targeting of EGFR and KRASG12C is highly effective in colorectal cancer cells and patient-derived organoids
    and xenografts, suggesting a novel therapeutic strategy to treat patients with KRAS G12C colorectal cancer. SIGNIFICANCE:
    The efficacy of KRASG12C inhibitors in NSCLC and colorectal cancer is lineage-specific. RTK dependency and signaling rebound
    kinetics are responsible for sensitivity or resistance to KRASG12C inhibition in colorectal cancer. EGFR and KRASG12C
    should be concomitantly inhibited to overcome resistance to KRASG12C blockade in colorectal tumors.See related commentary
    by Koleilat and Kwong, p. 1094.This article is highlighted in the In This Issue feature, p. 1079.'
- source_sentence: 'query: @MikeHudema Check out this review article for further discussion on why fossil fuels will keep
    supplying the bulk of global energy and why electric vehicles aren''t exactly eco‑friendly'
  sentences:
  - 'passage: title: Is it the end of combustion and engine combustion research? Should it be?

    abstract: The dominant narrative in the affluent west is that climate change poses an "existential threat" and very rapid
    cuts in greenhouse gas (GHG) emissions and hence fossil fuel use are needed to avoid it. Simultaneously oil, gas, coal,
    aviation, steel and cement industries and livestock farming have to be largely shut down to eliminate GHG. This review
    argues that globally all this will not happen by 2050, let alone 2030 because the scale of the problem is too large. Transport
    is particularly difficult to decarbonize and current policies focusing entirely on battery electric vehicles will not
    and must not succeed. GHG levels are unlikely to come down significantly in the next several decades and even if they
    did, extreme weather events will not disappear. It is better to recognize such realities and make societies more resilient
    to the effects of climate change. Humanity will have to adapt to any further warming as it has successfully done with
    the previous warming of about 1.1 C over the past century. Combustion research, particularly of fossil fuels and in internal
    combustion engines is currently seen as unnecessary in many countries.'
  - 'passage: title: Neurologic Involvement in Children and Adolescents Hospitalized in the United States for COVID-19 or
    Multisystem Inflammatory Syndrome

    abstract: Coronavirus disease 2019 (COVID-19) affects the nervous system in adult patients. The spectrum of neurologic
    involvement in children and adolescents is unclear.To understand the range and severity of neurologic involvement among
    children and adolescents associated with COVID-19.Case series of patients (age <21 years) hospitalized between March 15,
    2020, and December 15, 2020, with positive severe acute respiratory syndrome coronavirus 2 test result (reverse transcriptase-polymerase
    chain reaction and/or antibody) at 61 US hospitals in the Overcoming COVID-19 public health registry, including 616 (36%)
    meeting criteria for multisystem inflammatory syndrome in children. Patients with neurologic involvement had acute neurologic
    signs, symptoms, or diseases on presentation or during hospitalization.'
  - 'passage: title: SARS-CoV-2 infection confers greater immunity than shots

    abstract: Study from Israel, the largest of its kind, also finds infection combined with a single jab is highly protective'
