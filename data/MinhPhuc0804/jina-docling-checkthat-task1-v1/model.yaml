  sentences:
  - 'passage: title: SARS-CoV-2 Infection in Children

    abstract: SARS-CoV-2 Infection in Children In this report, investigators in Wuhan, China, describe the spectrum of Covid-19
    illness in children under the age of 16 years. Of 1391 children assessed and tested...'
  - 'passage: title: A noninflammatory mRNA vaccine for treatment of experimental autoimmune encephalomyelitis

    abstract: The ability to control autoreactive T cells without inducing systemic immune suppression is the major goal for
    treatment of autoimmune diseases. The key challenge is the safe and efficient delivery of pharmaceutically well-defined
    antigens in a noninflammatory context. Here, we show that systemic delivery of nanoparticle-formulated 1 methylpseudouridine-modified
    messenger RNA (m1Ψ mRNA) coding for disease-related autoantigens results in antigen presentation on splenic CD11c+ antigen-presenting
    cells in the absence of costimulatory signals. In several mouse models of multiple sclerosis, the disease is suppressed
    by treatment with such m1Ψ mRNA. The treatment effect is associated with a reduction of effector T cells and the development
    of regulatory T cell (Treg cell) populations. Notably, these Treg cells execute strong bystander immunosuppression and
    thus improve disease induced by cognate and noncognate autoantigens.'
  - 'passage: title: Smartphone-Based Blood Pressure Measurement Using Transdermal Optical Imaging Technology

    abstract: Background: Cuff-based blood pressure measurement lacks comfort and convenience. Here, we examined whether blood
    pressure can be determined in a contactless manner using a novel smartphone-based technology called transdermal optical
    imaging. This technology processes imperceptible facial blood flow changes from videos captured with a smartphone camera
    and uses advanced machine learning to determine blood pressure from the captured signal. Methods: We enrolled 1328 normotensive
    adults in our study. We used an advanced machine learning algorithm to create computational models that predict reference
    systolic, diastolic, and pulse pressure from facial blood flow data. We used 70% of our data set to train these models
    and 15% of our data set to test them. The remaining 15% of the sample was used to validate model performance. Results:
    We found that our models predicted blood pressure with a measurement bias±SD of 0.39±7.30 mm Hg for systolic pressure,
    −0.20±6.00 mm Hg for diastolic pressure, and 0.52±6.42 mm Hg for pulse pressure, respectively.'
- source_sentence: 'query: @user Here is a solid study demonstrating masks are useful in a pandemic. We should allocate research
    money to see if mask were effective in school not just complain about masks. Or do you have other answers? It is upholding
    science though.'
  sentences:
  - 'passage: title: An evidence review of face masks against COVID-19

    abstract: The science around the use of masks by the public to impede COVID-19 transmission is advancing rapidly. In this
    narrative review, we develop an analytical framework to examine mask usage, synthesizing the relevant literature to inform
    multiple areas: population impact, transmission characteristics, source control, wearer protection, sociological considerations,
    and implementation considerations. A primary route of transmission of COVID-19 is via respiratory particles, and it is
    known to be transmissible from presymptomatic, paucisymptomatic, and asymptomatic individuals. Reducing disease spread
    requires two things: limiting contacts of infected individuals via physical distancing and other measures and reducing
    the transmission probability per contact. The preponderance of evidence indicates that mask wearing reduces transmissibility
    per contact by reducing transmission of infected respiratory particles in both laboratory and clinical contexts. Public
    mask wearing is most effective at reducing spread of the virus when compliance is high. Given the current shortages of
    medical masks, we recommend the adoption of public cloth mask wearing, as an effective form of source control, in conjunction
    with existing hygiene, distancing, and contact tracing strategies.'
  - 'passage: title: Estimating the effective reproduction number of the 2019-nCoV in China

    abstract: Abstract We estimate the effective reproduction number for 2019-nCoV based on the daily reported cases from
    China CDC. The results indicate that 2019-nCoV has a higher effective reproduction number than SARS with a comparable
    fatality rate. Article Summary Line This modeling study indicates that 2019-nCoV has a higher effective reproduction number
    than SARS with a comparable fatality rate.'
