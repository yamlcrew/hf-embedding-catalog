  sentences:
  - 'passage: patients had abnormal electrocardiography (ECG) findings, and the most prevalent finding was diffuse ST-segment
    elevation.


    title: Admission and follow-up cardiac magnetic resonance imaging findings in BNT162b2 Vaccine-Related myocarditis in
    adolescents

    Initial cardiac MRI results were abnormal in all patients, where 8 (88.8%) patients had late gadolinium enhancement, and
    5 (55.5%) had myocardial edoema. Three patients showed local left ventricular wall-motion abnormalities. In their follow-up
    MRIs 3-6 months later, myocardial edoema was present in 2 (28.5%) patients, while late gadolinium enhancement was present
    in all patients (7/7, 100%, 2 patients did not have control MRI time). Hypokinetic segments were still present in one
    of the 3 patients. No negative cardiac events were observed in the short-term follow-up of any patient.Further follow-up
    evaluation and larger multicenter studies are needed to determine the clinical significance of persistent cardiac MRI
    abnormalities.'
