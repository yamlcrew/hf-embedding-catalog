    - 'passage: title: <scp>Multi‐disciplinary</scp> collaborative consensus guidance statement on the assessment and treatment
      of autonomic dysfunction in patients with <scp>post‐acute</scp> sequelae of <scp>SARS‐CoV</scp>‐2 infection (<scp>PASC</scp>)

      abstract: Although many people infected with severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) recover completely,
      others are left with long-lasting symptoms that persist for at least 4 weeks, a condition referred to by the National
      Institutes of Health (NIH) as post-acute sequelae of SARS-CoV-2 infection (PASC).1 The Centers for Disease Control and
      Prevention (CDC) defines post-COVID (coronavirus disease) conditions as the wide range of health consequences that are
      present for four or more weeks after infection with SARS-CoV-2,2 whereas the World Health Organization (WHO) refers
      to post-COVID condition as symptoms that persist beyond 12 weeks after an initial infection, last for at least 2 months,'
    - 'passage: title: Myalgic Encephalomyelitis/Chronic Fatigue Syndrome: Essentials of Diagnosis and Management

      abstract: Despite myalgic encephalomyelitis/chronic fatigue syndrome (ME/CFS) affecting millions of people worldwide,
      many clinicians lack the knowledge to appropriately diagnose or manage ME/CFS. Unfortunately, clinical guidance has
      been scarce, obsolete, or potentially harmful. Consequently, up to 91% of patients in the United States remain undiagnosed,
      and those diagnosed often receive inappropriate treatment. These problems are of increasing importance because after
      acute COVID-19, a significant percentage of people remain ill for many months with an illness similar to ME/CFS. In
      2015, the US National Academy of Medicine published new evidence-based clinical diagnostic criteria that have been adopted
      by the US Centers for Disease Control and Prevention. Furthermore, the United States and other governments as well as
      major health care organizations have recently withdrawn graded exercise and cognitive-behavioral therapy as the treatment
      of choice for patients with ME/CFS.'
