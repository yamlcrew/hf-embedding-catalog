  sentences:
  - 'passage: factor for PCC was symptom severity at baseline (RR, 1.41; 95% CI, 1.27-1.56).


    title: Prevalence and Characteristics Associated With Post–COVID-19 Condition Among Nonhospitalized Adolescents and Young
    Adults

    Low physical activity (RR, 0.96; 95% CI, 0.92-1.00) and loneliness (RR, 1.01; 95% CI, 1.00-1.02) were also associated,
    while biological markers were not. Symptom severity correlated with personality traits.The persistent symptoms and disability
    that characterize PCC are associated with factors other than SARS-CoV-2 infection, including psychosocial factors. This
    finding raises questions about the utility of the World Health Organization case definition and has implications for the
    planning of health care services as well as for further research on PCC.'
  - 'passage: title: Potential impact of seasonal forcing on a SARS-CoV-2 pandemic

    abstract: A novel coronavirus (SARS-CoV-2) first detected in Wuhan, China, has spread rapidly since December 2019, causing
    more than 80,000 confirmed infections and 2,700 fatalities (as of Feb 27, 2020). Imported cases and transmission clusters
    of various sizes have been reported globally suggesting a pandemic is likely. Here, we explore how seasonal variation
    in transmissibility could modulate a SARS-CoV-2 pandemic. Data from routine diagnostics show a strong and consistent seasonal
    variation of the four endemic coronaviruses (229E, HKU1, NL63, OC43) and we parameterize our model for SARS-CoV-2 using
    these data. The model allows for many subpopulations of different size with variable parameters. Simulations of different
    scenarios show that plausible parameters result in a small peak in early 2020 in temperate regions of the Northern Hemisphere
    and a larger peak in winter 2020/2021. Variation in transmission and migration rates can result in substantial variation
    in prevalence between regions.'
  - 'passage: =72). The most common Long COVID symptom was fatigue (64.8%) followed by cough (32.4%).


    title: Prevalence, characteristics, and predictors of Long COVID among diagnosed cases of COVID-19

    Statistically significant predictors of Long COVID were - Pre-existing medical conditions (Adjusted Odds ratio (aOR)=2.00,
    95% CI: 1.16,3.44), having a more significant number of symptoms during acute phase of COVID-19 disease (aOR=11.24, 95%
    CI: 4.00,31.51), two doses of COVID-19 vaccination (aOR=2.32, 95% CI: 1.17,4.58), the severity of illness (aOR=5.71, 95%
    CI: 3.00,10.89) and being admitted to hospital (Odds ratio (OR)=3.89, 95% CI: 2.49,6.08). Conclusion A considerable proportion
    of COVID-19 cases reported Long COVID symptoms. More research is needed in Long COVID to objectively assess the symptoms
    and find the biological and radiological markers.'
- source_sentence: 'query: COVID-19 Vaccine Shots for Young Adults: A Cost-Benefit Evaluation and Five Moral Arguments opposing
    Mandates in Universities @SSRN'
  sentences:
  - 'passage: title: COVID-19 vaccine boosters for young adults: a risk benefit assessment and ethical analysis of mandate
    policies at universities

    abstract: In 2022, students at North American universities with third-dose COVID-19 vaccine mandates risk disenrolment
    if unvaccinated. To assess the appropriateness of booster mandates in this age group, we combine empirical risk-benefit
    assessment and ethical analysis. To prevent one COVID-19 hospitalisation over a 6-month period, we estimate that 31 207–42
    836 young adults aged 18–29 years must receive a third mRNA vaccine. Booster mandates in young adults are expected to
    cause a net harm: per COVID-19 hospitalisation prevented, we anticipate at least 18.5 serious adverse events from mRNA
    vaccines, including 1.5–4.6 booster-associated myopericarditis cases in males (typically requiring hospitalisation). We
    also anticipate 1430–4626 cases of grade ≥3 reactogenicity interfering with daily activities (although typically not requiring
    hospitalisation).'
  - 'passage: and 9396±2254 ppm with FFP2 respirators.


    title: Inhaled CO<sub>2</sub> concentration while wearing face masks: a pilot study using capnography

    The proportion of the sample showing a CO 2 concentration higher than the 5000 ppm acceptable exposure threshold recommended
    for workers was 40.2% while wearing surgical masks, 99.0% while wearing FFP2 respirators. The mean blood oxygen saturation
    remained &gt;96%, and the mean end-tidal CO 2 &lt;33 mmHg. Adjusting for age, gender, BMI, and smoking, the inhaled air
    CO 2 concentration significantly increased with increasing respiratory rate (with a mean of 10,143±2782 ppm among the
    participants taking 18 or more breaths per minute, while wearing FFP2 respirators), and was higher among the minors, who
    showed a mean CO 2 concentration of 12,847±2898 ppm, while wearing FFP2 respirators. If these results will be confirmed,
    the current guidelines on mask-wearing could be updated to integrate recommendations for slow breathing and a more targeted
    use when contagion risk is low.'
  - 'passage: title: COVID-19 Vaccine Boosters for Young Adults: A Risk-Benefit Assessment and Five Ethical Arguments against
    Mandates at Universities

    abstract: Students at North American universities risk disenrollment due to third dose COVID-19 vaccine mandates. We present
    a risk-benefit assessment of boosters in this age group and provide five ethical arguments against mandates. We estimate
    that 22,000 - 30,000 previously uninfected adults aged 18-29 must be boosted with an mRNA vaccine to prevent one COVID-19
    hospitalisation. Using CDC and sponsor-reported adverse event data, we find that booster mandates may cause a net expected
    harm: per COVID-19 hospitalisation prevented in previously uninfected young adults, we anticipate 18 to 98 serious adverse
    events, including 1.7 to 3.0 booster-associated myocarditis cases in males, and 1,373 to 3,234 cases of grade ≥3 reactogenicity
    which interferes with daily activities. Given the high prevalence of post-infection immunity, this risk-benefit profile
    is even less favourable.'
- source_sentence: 'query: @alexandrosM. Mis, dis or mal-information? Have a sense that it’s mal. ”... immune function among
    vaccinated individuals 8 months after the administration of two doses of COVID-19 vaccine was lower than that among the
    unvaccinated individuals.”'
  sentences:
  - 'passage: title: Adverse effects of COVID-19 vaccines and measures to prevent them

    abstract: Abstract Recently, The Lancet published a study on the effectiveness of COVID-19 vaccines and the waning of
    immunity with time. The study showed that immune function among vaccinated individuals 8 months after the administration
    of two doses of COVID-19 vaccine was lower than that among the unvaccinated individuals. According to European Medicines
    Agency recommendations, frequent COVID-19 booster shots could adversely affect the immune response and may not be feasible.
    The decrease in immunity can be caused by several factors such as N1-methylpseudouridine, the spike protein, lipid nanoparticles,
    antibody-dependent enhancement, and the original antigenic stimulus. These clinical alterations may explain the association
    reported between COVID-19 vaccination and shingles. As a safety measure, further booster vaccinations should be discontinued.
    In addition, the date of vaccination should be recorded in the medical record of patients. Several practical measures
    to prevent a decrease in immunity have been reported.'
  - 'passage: title: COVID-19 and the Political Economy of Mass Hysteria

    abstract: In this article, we aim to develop a political economy of mass hysteria. Using the background of COVID-19, we
    study past mass hysteria. Negative information which is spread through mass media repetitively can affect public health
    negatively in the form of nocebo effects and mass hysteria. We argue that mass and digital media in connection with the
    state may have had adverse consequences during the COVID-19 crisis. The resulting collective hysteria may have contributed
    to policy errors by governments not in line with health recommendations. While mass hysteria can occur in societies with
    a minimal state, we show that there exist certain self-corrective mechanisms and limits to the harm inflicted, such as
    sacrosanct private property rights. However, mass hysteria can be exacerbated and self-reinforcing when the negative information
    comes from an authoritative source, when the media are politicized, and social networks make the negative information
    omnipresent.'
  - 'passage: fter referred to as COVID-19-recovered and COVID-19-naive subjects, respectively).


    title: Impaired Functional T-Cell Response to SARS-CoV-2 After Two Doses of BNT162b2 mRNA Vaccine in Older People

    Frailty, nutritional, and immunosenescence parameters were collected at baseline in COVID-19-naive older people. We analyzed
    the immune response in 129 young adults (median age 44.0 years) and 105 older residents living in a LCTF (median age 86.5
    years), 3 months after the first injection. Humoral and cellular memory responses were dramatically impaired in the COVID-19-naive
    older ( n = 54) compared with the COVID-19-naive younger adults ( n = 121).'
- source_sentence: 'query: ICYMI: Revamped clinical guidelines for #MECFS have been rolled out by the US ME/CFS Clinician
    Coalition. The rising tide of fresh cases underscores the pressing necessity for physicians to get a better grasp of #MECFS
    and #longcovid.'
  sentences:
  - 'passage: title: The teachings of Long COVID

    abstract: Long COVID is prolonged illness resulting from SARS-CoV-2 infection. Its serious implications for individuals
    and society have been missing from public communication and pandemic policy. Here, I draw on my lived experience, research,
    and advocacy work with Long COVID and reflect on the lessons learnt.'
  - 'passage: title: <scp>Multi‐disciplinary</scp> collaborative consensus guidance statement on the assessment and treatment
    of autonomic dysfunction in patients with <scp>post‐acute</scp> sequelae of <scp>SARS‐CoV</scp>‐2 infection (<scp>PASC</scp>)

    abstract: Although many people infected with severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) recover completely,
    others are left with long-lasting symptoms that persist for at least 4 weeks, a condition referred to by the National
    Institutes of Health (NIH) as post-acute sequelae of SARS-CoV-2 infection (PASC).1 The Centers for Disease Control and
    Prevention (CDC) defines post-COVID (coronavirus disease) conditions as the wide range of health consequences that are
    present for four or more weeks after infection with SARS-CoV-2,2 whereas the World Health Organization (WHO) refers to
    post-COVID condition as symptoms that persist beyond 12 weeks after an initial infection, last for at least 2 months,'
  - 'passage: title: Myalgic Encephalomyelitis/Chronic Fatigue Syndrome: Essentials of Diagnosis and Management

    abstract: Despite myalgic encephalomyelitis/chronic fatigue syndrome (ME/CFS) affecting millions of people worldwide,
    many clinicians lack the knowledge to appropriately diagnose or manage ME/CFS. Unfortunately, clinical guidance has been
    scarce, obsolete, or potentially harmful. Consequently, up to 91% of patients in the United States remain undiagnosed,
    and those diagnosed often receive inappropriate treatment. These problems are of increasing importance because after acute
    COVID-19, a significant percentage of people remain ill for many months with an illness similar to ME/CFS. In 2015, the
    US National Academy of Medicine published new evidence-based clinical diagnostic criteria that have been adopted by the
    US Centers for Disease Control and Prevention. Furthermore, the United States and other governments as well as major health
    care organizations have recently withdrawn graded exercise and cognitive-behavioral therapy as the treatment of choice
    for patients with ME/CFS.'
