widgetData:
- source_sentence: 'query: Uncovering a novel recurring genetic anomaly in human #PluripotentStemCells through sequencing
    over 500 distinct #iPSCell lines: mutations encoding BCOR truncated variants identified in 26% of blood‑derived iPSCs.
    Key finding by @user ⤵️'
  sentences:
  - 'passage: title: Substantial somatic genomic variation and selection for BCOR mutations in human induced pluripotent stem
    cells

    abstract: Abstract We explored human induced pluripotent stem cells (hiPSCs) derived from different tissues to gain insights
    into genomic integrity at single-nucleotide resolution. We used genome sequencing data from two large hiPSC repositories
    involving 696 hiPSCs and daughter subclones. We find ultraviolet light (UV)-related damage in ~72% of skin fibroblast-derived
    hiPSCs (F-hiPSCs), occasionally resulting in substantial mutagenesis (up to 15 mutations per megabase). We demonstrate
    remarkable genomic heterogeneity between independent F-hiPSC clones derived during the same round of reprogramming due
    to oligoclonal fibroblast populations. In contrast, blood-derived hiPSCs (B-hiPSCs) had fewer mutations and no UV damage
    but a high prevalence of acquired BCOR mutations (26.9% of lines).'
  - 'passage: title: Long COVID is associated with extensive <i>in-vivo</i> neuroinflammation on [<sup>18</sup>F]DPA-714 PET

    abstract: Summary A significant number of COVID-19 patients develop ‘long COVID’, a condition defined by long-lasting
    debilitating, often neurological, symptoms. The pathophysiology of long COVID is unknown. Here we present in-vivo evidence
    of widespread neuroinflammation in long COVID, using a quantitative assessment, [ 18 F]DPA-714 PET, in two long COVID
    patients. We reanalyzed historical data from three matched healthy control subjects, for comparison purposes. Both patients
    with long COVID had widespread increases in [ 18 F]DPA-714 binding throughout the brain. Quantitative measures of binding
    (BP ND values) were increased on average by 121% and 76%, respectively. This implicates profound neuroinflammation in
    the pathophysiology of long COVID.'
  - 'passage: ive individuals with MPNs and reconstructed lineage histories of individual HSCs using somatic mutation patterns.


    title: Reconstructing the Lineage Histories and Differentiation Trajectories of Individual Cancer Cells in Myeloproliferative
    Neoplasms

    We found that JAK2-V617F mutations occurred in a single HSC several decades before MPN diagnosis-at age 9 ± 2 years in
    a 34-year-old individual and at age 19 ± 3 years in a 63-year-old individual-and found that mutant HSCs have a selective
    advantage in both individuals. These results highlight the potential of harnessing somatic mutations to reconstruct cancer
    lineages.'
