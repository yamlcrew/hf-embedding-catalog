      title: Mitogen Activated Protein Kinase (MAPK) Activation, p53, and Autophagy Inhibition Characterize the Severe Acute
      Respiratory Syndrome Coronavirus 2 (SARS-CoV-2) Spike Protein Induced Neurotoxicity

      The pathways induced by the spike protein via toll-like receptor activation induce both the upregulation of PrPC (the
      normal isoform of the prion protein, PrP) and the expression of β amyloid. Through the spike-protein-dependent elevation
      of p53 levels via β amyloid metabolism, increased PrPC expression can lead to PrP misfolding and impaired autophagy,
      generating prion disease. We conclude that, according to the age of the spike protein-exposed patient and the state
      of their cellular autophagy activity, excess sustained activity of p53 in neurons may be a catalytic factor in neurodegeneration.
      An autoimmune reaction via molecular mimicry likely also contributes to neurological symptoms. Overall results suggest
      that neurodegeneration is in part due to the intensity and duration of spike protein exposure, patient advanced age,
      cellular autophagy activity, and activation, function and regulation of p53.'
