widgetData:
- source_sentence: 'query: @joerogan The libs are just peeved that Rogan beat Covid with FDA approved meds and not their unapproved,
    untried, emergency‑use‑only vaccines. And yes, the Ivermectin for human use is FDA approved.'
  sentences:
  - 'passage: rates of treatment discontinuation were similar in both arms (19% vs 16%; P = .81).


    title: Efficacy and Safety of Hydroxychloroquine vs Placebo for Pre-exposure SARS-CoV-2 Prophylaxis Among Health Care
    Workers

    The median change in QTc (baseline to 4-week evaluation) did not differ between arms (hydroxychloroquine: 4 milliseconds;
    95% CI, -9 to 17; vs placebo: 3 milliseconds; 95% CI, -5 to 11; P = .98). Of the 8 participants with positive results
    for SARS-CoV-2 (6.4%), 6 developed viral symptoms; none required hospitalization, and all clinically recovered.In this
    randomized clinical trial, although limited by early termination, there was no clinical benefit of hydroxychloroquine
    administered daily for 8 weeks as pre-exposure prophylaxis in hospital-based HCWs exposed to patients with COVID-19.ClinicalTrials.gov
    Identifier: NCT04329923.'
  - 'passage: ARS-CoV-2, including higher IL-1/IL-6 release and decreased production of IFN-α.


    title: The impact of BNT162b2 mRNA vaccine on adaptive and innate immune responses

    Altogether, these data expand our knowledge regarding the overall immunological effects of this new class of vaccines
    and underline the need of additional studies to elucidate their effects on both innate and adaptive immune responses.'
  - 'passage: title: The FDA-approved drug ivermectin inhibits the replication of SARS-CoV-2 in vitro

    abstract: Although several clinical trials are now underway to test possible therapies, the worldwide response to the
    COVID-19 outbreak has been largely limited to monitoring/containment. We report here that Ivermectin, an FDA-approved
    anti-parasitic previously shown to have broad-spectrum anti-viral activity in vitro, is an inhibitor of the causative
    virus (SARS-CoV-2), with a single addition to Vero-hSLAM cells 2 h post infection with SARS-CoV-2 able to effect ~5000-fold
    reduction in viral RNA at 48 h. Ivermectin therefore warrants further investigation for possible benefits in humans.'
- source_sentence: 'query: This report has not been peer reviewed, but is a tad spooky still: It places the R0 of Covid-19
    at 5.7!'
  sentences:
  - 'passage: title: High Contagiousness and Rapid Spread of Severe Acute Respiratory Syndrome Coronavirus 2

    abstract: Severe acute respiratory syndrome coronavirus 2 is the causative agent of the ongoing coronavirus disease pandemic.
    Initial estimates of the early dynamics of the outbreak in Wuhan, China, suggested a doubling time of the number of infected
    persons of 6-7 days and a basic reproductive number (R'
  - 'passage: .1 variant and declined more rapidly over time than protection against previous variants. Protection from severe
    disease was high for all variants.


    title: Past SARS-CoV-2 infection protection against re-infection: a systematic review and meta-analysis

    The immunity conferred by past infection should be weighed alongside protection from vaccination when assessing future
    disease burden from COVID-19, providing guidance on when individuals should be vaccinated, and designing policies that
    mandate vaccination for workers or restrict access, on the basis of immune status, to settings where the risk of transmission
    is high, such as travel and high-occupancy indoor settings.Bill & Melinda Gates Foundation, J Stanton, T Gillespie, and
    J and E Nordstrom.'
  - 'passage: title: Contact Tracing during Coronavirus Disease Outbreak, South Korea, 2020

    abstract: We analyzed reports for 59,073 contacts of 5,706 coronavirus disease (COVID-19) index patients reported in South
    Korea during January 20-March 27, 2020. Of 10,592 household contacts, 11.8% had COVID-19. Of 48,481 nonhousehold contacts,
    1.9% had COVID-19. Use of personal protective measures and social distancing reduces the likelihood of transmission.'
- source_sentence: 'query: @Gab_H_R “Together our findings represent the first evidence of a highly divergent lineage of SARS‑CoV‑2
    in white‑tailed deer & of deer‑to‑human transmission.” Thread 1/2 Advance copy'
  sentences:
  - 'passage: title: Nervous system consequences of COVID-19

    abstract: Neurological symptoms highlight the need to understand pathophysiologic mechanisms.'
  - 'passage: title: Highly divergent white-tailed deer SARS-CoV-2 with potential deer-to-human transmission

    abstract: Abstract Wildlife reservoirs of SARS-CoV-2 may enable viral adaptation and spillback from animals to humans.
    In North America, there is evidence of unsustained spillover of SARS-CoV-2 from humans to white-tailed deer ( Odocoileus
    virginianus ), but no evidence of transmission from deer to humans. Through a biosurveillance program in Ontario, Canada
    we identified a new and highly divergent lineage of SARS-CoV-2 in white-tailed deer. This lineage is the most divergent
    SARS-CoV-2 lineage identified to date, with 76 consensus mutations (including 37 previously associated with non-human
    animal hosts) and signatures of considerable evolution and transmission within wildlife. Phylogenetic analysis also revealed
    an epidemiologically linked human case. Together, our findings represent the first clear evidence of sustained evolution
    of SARS-CoV-2 in white-tailed deer and of deer-to-human transmission.'
  - 'passage: therapy (4.4%), 21 deaths (4.4%), and 1 heart transplantation (0.2%).


    title: COVID-19 vaccination-related myocarditis: a Korean nationwide study

    Eight out of 21 deaths were sudden cardiac death (SCD) attributable to VRM proved by an autopsy, and all cases of SCD
    attributable to VRM were aged under 45 years and received mRNA vaccines.Although COVID-19 VRM was rare and showed relatively
    favorable clinical courses, severe VRM was found in 19.8% of all VRM cases. Moreover, SCD should be closely monitored
    as a potentially fatal complication of COVID-19 vaccination.'
- source_sentence: 'query: This speculative paper by @ProfSaraSeager et al. is a real hoot to read. If (if!) there is life
    on Venus, it may exist in a bizarre endless wild ride of near-death experiences. A quick thread! 1/x'
  sentences:
  - 'passage: to large enough sizes that are forced by gravity to settle downward to hotter, uninhabitable layers of the Venusian
    atmosphere.


    title: The Venusian Lower Atmosphere Haze as a Depot for Desiccated Microbial Life: A Proposed Life Cycle for Persistence
    of the Venusian Aerial Biosphere

    (Droplet fragmentation-which would reduce particle size-does not occur in Venusian atmosphere conditions.) We propose
    for the first time that the only way life can survive indefinitely is with a life cycle that involves microbial life drying
    out as liquid droplets evaporate during settling, with the small desiccated ''spores'' halting at, and partially populating,
    the Venus atmosphere stagnant lower haze layer (33-48 km altitude). We, thus, call the Venusian lower haze layer a ''depot''
    for desiccated microbial life. The spores eventually return to the cloud layer by upward diffusion caused by mixing induced
    by gravity waves, act as cloud condensation nuclei, and rehydrate for a continued life cycle. We also review the challenges
    for life in the extremely harsh conditions of the Venusian atmosphere, refuting the notion that the ''habitable'' cloud
    layer has an analogy in any terrestrial environment.'
  - 'passage: title: The proportions of heterosexual and homosexual pedophiles among sex offenders against children: An exploratory
    study

    abstract: Previous investigations have indicated that the ratio of sex offenders against female children vs. offenders
    against male children is approximately 2:1, while the ratio of gynephiles to androphiles among the general population
    is approximately 20:1. The present study investigated whether the etiology of preferred partner sex among pedophiles is
    related to the etiology of preferred partner sex among males preferring adult partners. Using phallometric test sensitivities
    to calculate the proportion of true pedophiles among various groups of sex offenders against children, and taking into
    consideration previously reported mean numbers of victims per offender group, the ratio of heterosexual to homosexual
    pedophiles was calculated to be approximately 11:1. This suggests that the resulting proportion of true pedophiles among
    persons with a homosexual erotic development is greater than that in persons who develop heterosexually. This, of course,
    would not indicate that androphilic males have a greater propensity to offend against children.'
  - 'passage: title: SARS-CoV-2 Infection in Children

    abstract: SARS-CoV-2 Infection in Children In this report, investigators in Wuhan, China, describe the spectrum of Covid-19
    illness in children under the age of 16 years. Of 1391 children assessed and tested...'
- source_sentence: 'query: Myocarditis-triggered Unexpected Demise following BNT162b2 mRNA COVID-19 Immunization in Korea:
    Case Study Concentrating on Tissue-level Findings Sangjoon Choi et al.'
  sentences:
  - 'passage: title: Myocarditis-induced Sudden Death after BNT162b2 mRNA COVID-19 Vaccination in Korea: Case Report Focusing
    on Histopathological Findings

    abstract: We present autopsy findings of a 22-year-old man who developed chest pain 5 days after the first dose of the
    BNT162b2 mRNA vaccine and died 7 hours later. Histological examination of the heart revealed isolated atrial myocarditis,
    with neutrophil and histiocyte predominance. Immunohistochemical C4d staining revealed scattered single-cell necrosis
    of myocytes which was not accompanied by inflammatory infiltrates. Extensive contraction band necrosis was observed in
    the atria and ventricles. There was no evidence of microthrombosis or infection in the heart and other organs. The primary
    cause of death was determined to be myocarditis, causally-associated with the BNT162b2 vaccine.'
  - 'passage: more contacts (22.8%; 95% CI, 13.6%-33.5%).


    title: Household Transmission of SARS-CoV-2

    <h3>Conclusions and Relevance</h3> The findings of this study suggest that given that individuals with suspected or confirmed
    infections are being referred to isolate at home, households will continue to be a significant venue for transmission
    of SARS-CoV-2.'
  - 'passage: atase (DUSP) expression in neurons in the disease process.


    title: Mitogen Activated Protein Kinase (MAPK) Activation, p53, and Autophagy Inhibition Characterize the Severe Acute
    Respiratory Syndrome Coronavirus 2 (SARS-CoV-2) Spike Protein Induced Neurotoxicity

    The pathways induced by the spike protein via toll-like receptor activation induce both the upregulation of PrPC (the
    normal isoform of the prion protein, PrP) and the expression of β amyloid. Through the spike-protein-dependent elevation
    of p53 levels via β amyloid metabolism, increased PrPC expression can lead to PrP misfolding and impaired autophagy, generating
    prion disease. We conclude that, according to the age of the spike protein-exposed patient and the state of their cellular
    autophagy activity, excess sustained activity of p53 in neurons may be a catalytic factor in neurodegeneration. An autoimmune
    reaction via molecular mimicry likely also contributes to neurological symptoms. Overall results suggest that neurodegeneration
    is in part due to the intensity and duration of spike protein exposure, patient advanced age, cellular autophagy activity,
    and activation, function and regulation of p53.'
