  - source_sentence: Tại sao em không nên tải hay in nhiều nội dung cùng lúc ạ?
    sentences:
    - 'Chủ đề: 4. TRUY CẬP KHÓA HỌC

      Nội dung:

      4. TRUY CẬP KHÓA HỌC

      Bước 1: Vào Avatar => truy cập mục Khóa học của tôi

      [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/49999f9f-fad6-4c7e-a67a-db1242a04ee3.png]]

      Bước 2: Tại mục Đã kích hoạt, bấm chọn một khoá học đã kích hoạt để vào học.

      [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/e4f9ab92-b99f-410d-a938-3da0f0c593be.png]]

      Bước 3: Tại Danh sách bài học của khóa học => chọn bài giảng hoặc bài thi để học.

      [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/156d32ff-047c-473c-a15a-1912e42e2eb3.png]]'
    - 'Câu hỏi: điểm thưởng dùng đề làm gì

      Trả lời: Điểm thưởng để cô biết được mức độ hoàn thành deadline nhiều hay ít của mỗi bạn và cô dễ theo dõi tình hình
      học của các em. Phần này mình liên hệ với các anh/ chị quản lý nhóm để được giải đáp thắc mắc nhé, anh chị ấy sẽ nắm
      thông tin đầy đủ và chính xác hơn em nhé.'
    - "Câu hỏi: Mình có file tổng hợp tài liệu các khoá học không ạ?\nTrả lời: Nội dung khoá học sẽ được cập nhật liên tục\
      \ nên sẽ không có file tổng hợp em nhé. \nDưới mỗi bài giảng/ bài thi sẽ có file của từng bài, em học bài nào có thể\
      \ tải file bài đấy về, không nên tải hay in nhiều nội dung cùng lúc em nhé."
  - source_sentence: Em nên làm gì nếu muốn thi TOEIC Nghe - Đọc trên giấy?
    sentences:
    - "Câu hỏi: Làm thế nào để được ghi nhận đã xem 1 video bài giảng?/ Sao em xem bài giảng mà không ghi nhận deadline ạ?\n\
      Trả lời: Điều kiện hệ thống ghi nhận khi hs xem video đáp ứng các yêu cầu sau: \n- Xem từ đầu đến cuối video. \n- Khi\
      \ xem video không tua bất kì khoảng thời gian nào. \n- Không bị văng thoát video trong quá trình xem. \n- Không mở tab\
      \ khác song song khi xem video.\n- Deadline tính cho các video mới, xem lại sẽ không tính"
    - "Câu hỏi: Toeic thi máy hay thi giấy (cả 4 kĩ năng)\nEm có được lựa chọn không?\nTrả lời: 1. TOEIC Nghe - Đọc (Listening\
      \ & Reading): Có 2 hình thức là thi trên giấy (Paper-based) và thi trên máy tính (Computer-based). Ở Việt Nam, IIG cho\
      \ phép em chọn hình thức muốn thi khi đăng ký, miễn là trung tâm đó có đủ phòng và máy. Ví dụ: ở IIG Hà Nội và TP.HCM,\
      \ họ có cả 2 dạng nên em chọn được. \n\n2. TOEIC Nói - Viết (Speaking & Writing): Phần này chỉ thi trên máy tính nha\
      \ nên em không được chọn nè"
    - "Câu hỏi: Làm sao để cái thiện kĩ năng nghe ạ, của phần Part 3 với 4 ạ\nTrả lời: Lưu ý: CHỈ Áp dụng cho thi Giấy vì\
      \ các em được xem trước đề nhé\nCách luyện nghe/thi TOEIC Part 3\n\nBước 1: Đọc trước các câu hỏi        \nEm nên đọc\
      \ trước các câu hỏi để hiểu các yêu cầu của bài thi, đặc biệt là dạng câu hỏi \"Why\" - hỏi lý do của cuộc nói chuyện,\
      \ khi làm bài em phải xác định xem bên người gọi là nam hay nữ, điều này giúp em có thể chủ động nhận biết được cần\
      \ nghe thông tin từ phía nào.\nBước 2: Đọc các phương án        \nEm đọc lướt qua các phương án được đưa ra và đánh\
      \ dấu các từ khóa quan trọng trong các phương án đó.\nLưu ý: Khi gạch chân các từ khóa, em nên tìm các từ mang nhiều\
      \ thông tin, thường là các từ hoặc cụm từ với danh từ, động từ, tính từ hoặc trạng từ.\n* Các giới từ (in, on, at, for,\
      \ by, from ...) hoặc mạo từ (a, an, the), đại từ (he, she, it, they ...) hoặc các động từ phụ trợ (tobe như am, are,\
      \ have, has, do, did...) nói chung không phải là từ khóa, vì những từ này chỉ có tác dụng đảm bảo ngữ pháp của câu chứ\
      \ không mang thông tin cần truyền đạt.\nBước 3: Phán đoán nội dung đoạn băng        \nEm cần xem xét ngữ cảnh của các\
      \ từ khóa được gạch chân, cũng như từ vựng liên quan đến các chủ đề liên quan có thể xuất hiện trong đoạn băng. Việc\
      \ này giúp em có định hướng đúng cho câu trả lời trước khi nghe.\n\nCách luyện nghe TOEIC Part 4\n\nBước 1: Đọc qua\
      \ câu hỏi để xác định và ghi nhớ thông tin cần nghe        \nEm xem qua các câu hỏi trong khi đọc hướng dẫn làm bài\
      \ trên đoạn băng. Cũng giống như ở part 3, để có thể làm bài tốt nhất, em cần tranh thủ thời gian đọc một lượt câu hỏi\
      \ và phán đoán nội dung trong bài nói.\nHãy nhớ chỉ đọc câu hỏi, không đọc câu trả lời vì có rất ít thời gian. Đọc để\
      \ xác định và ghi nhớ những gì cần nghe, giúp xác định câu trả lời chính xác trong các đoạn nghe.\nBước 2: Xác định\
      \ được từ khóa chính        \nTương tự như Part 3, em cần gạch chân những từ khóa ngay trong câu hỏi để nắm rõ vấn đề\
      \ được hỏi là gì, nhờ đó dễ dàng xác định được vị trí câu trả lời xuất hiện trong đoạn băng.\nBước 3: Lắng nghe đoạn\
      \ băng để trả lời        \nTrong khi nghe đoạn băng, em cần phải tìm ra các vấn đề được hỏi nằm ở đâu trong băng. Những\
      \ câu hỏi trong bài thi nghe TOEIC Part 4 sẽ không theo thứ tự nội dung được đề cập mà được phát theo thứ tự ngẫu nhiên.\
      \ Vì vậy, khi bắt đầu nghe, em nên lướt nhanh các câu hỏi để xem phần nghe tương ứng với câu hỏi nào.\nCác từ khóa mà\
      \ em đã gạch chân trong câu hỏi sẽ là gợi ý giúp em nghe đoạn hội thoại tốt hơn. Trong nhiều trường hợp, các từ/cụm\
      \ từ và cách diễn đạt của câu hỏi được sử dụng y nguyên trong hội thoại. Tuy nhiên, cũng có trường hợp người ta sử dụng\
      \ các từ/cụm từ khác nhưng với cùng ý nghĩa trong hội thoại."
  - source_sentence: Anh chị có thể cho em xin tài liệu về động từ bất quy tắc không ạ?
    sentences:
    - 'Câu hỏi: Cho em xin bảng động từ bất quy tắc ạ?

