    - 'Câu hỏi: cho e hỏi là 1 video có thể xem 10 lần nhưng mà cả phần e học cộng với thỉnh thoảng e làm
      lại practice thì vào lại video để xem thì e sợ là sẽ hết lượt xem ạ. cô có thể thêm lượt ko
      ạ. e cảm ơn

      Trả lời: Mỗi bài học mình có 10 lượt xem em nhé. Nếu mỗi video mình xem liền mạch, ghi chú lại kiến thức và làm bài
      tập vận dụng thì sẽ nhớ lâu kiến thức hơn và không cần phải xem lại quá nhiều em nè.'
    - 'Câu hỏi: Sao em làm đúng mà hệ thống chấm sai?

      Trả lời: Bước 1: Copy Tên tài khoản (ID) học viên -> Bấm Chi tiết comment, hệ thống sẽ chuyển đến link bài thi mà hs
      để lại cmt                                                                 Bước 2: Xem mục BXH, click vào "Tìm kiếm
      trng danh sách" chọn Tìm kiếm theo tên tài khoản                                                                                                                        Bước
      3: Nhập tên tài khoản của học sinh, bấm Tìm kiếm                                                Bước 4: Bấm xem chi
      tiết bài làm của học sinh và check câu hỏi mà học sinh thắc mắc'
  - source_sentence: Em nên đọc kỹ những phần nào của đoạn văn trước khi đọc lướt?
    sentences:
    - 'Câu hỏi: Cách tính điểm kinh nghiệm

      Trả lời: Bài thi:

      + HS nộp bài pass: cộng 50 điểm;

      + HS không pass: cộng 25 điểm;

      Bài tập:

      + progress >= 80: cộng 50 điểm;

      + progress < 80: cộng 25 điểm;

      Bài giảng:

      + Bấm play video: cộng 25 điểm;

      + xem liên tục > 60 %:  cộng thêm 25 điểm.'
    - "Chủ đề: Danh mục nội dung\nNội dung:\nHỆ THỐNG E-LEARNING PLATFORM USER\n1. TÀI KHOẢN\n- Đăng ký tài khoản\n- Đặng\
      \ nhập tài khoản\n- Quên mật khẩu\n2. MUA KHÓA HỌC\n- Thêm giỏ hàng\n- Mua khoá học lẻ\n- Mua combo khóa học\n3. KÍCH\
      \ HOẠT THAM GIA KHÓA HỌC\n4. TRUY CẬP KHÓA HỌC\n5. XEM BÀI GIẢNG\n- Xem bài giảng video\n- Làm bài tập kịch bản đi kèm\
      \ bài giảng\n- Học bản dịch song ngữ đi kèm bài giảng\n- Học từ vựng dạng flashcard đi kèm bài giảng\n- Sử dụng tính\
      \ năng timeline chữa đề trong bài giảng\n- Xem bài giảng video livestream\n6. LÀM BÀI THI ONLINE\n- Hướng dẫn truy cập\n\
      - Hướng dẫn cách làm bài\n- Hướng dẫn nộp bài\n- Xem kết quả sau khi nộp\n- Xem bảng xếp hạng bài thi\n7. Luyện BÀI\
      \ TẬP ONLINE\n- Hướng dẫn truy cập\n- Hướng dẫn cách làm bài\n- Hướng dẫn nộp bài\n- Xem kết quả sau khi nộp\n- Xem\
      \ bảng xếp hạng bài tập\n8.\tTÀI LIỆU:\n- Kho tài liệu tham khảo:\n+ Cách thức truy cập\n+ Các thức xem/ tải tài liệu\n\
      - Tài liệu của khóa học\n+ Xem/ tải tài liệu đi kèm theo từng bài giảng/ bài tập/ bài thi\n+ Xem/ tải kho tài liệu của\
      \ toàn khoá học\n9. BÌNH LUẬN\nBình luận tại khóa học.\nBình luận tại bài giảng video / livestream.\nBình luận tại bài\
      \ tập/bài thi.\nBình luận tại câu hỏi.\n10. BẢO LƯU KHÓA HỌC\n- Điều kiện bảo lưu khóa học\n- Hướng dẫn kích hoạt bảo\
      \ lưu\n11. DEADLINE KHÓA HỌC\n- Cách đăng ký deadline\n- Xem thống kê deadline\n- Các ghi nhận deadline\n12. THỐNG KÊ\
      \ SỐ LIỆU HỌC VIÊN\n- Cách thức truy cập xem số liệu\n- Các tiêu chí thống kê"
    - 'Câu hỏi: ĐỌC HIỂU: Tóm tắt (summarise)

      Trả lời: Để làm bài tìm câu best summarises:

      - Em cần đọc kỹ câu chủ đề (topic sentence) của bài, nó có thể là câu đầu hoặc câu cuối đoạn 1.

      - Tiếp đó em đọc lần lượt các câu đầu và cuối của từng đoạn trong bài, sau đó mới đọc lướt quá nội dung đoạn, em có
      thể ghi chú ra nội dung chung chung của đoạn đó ra nháp, hoặc lên trên đề ngay bên cạnh đoạn đó luôn.

      - Em đọc câu hỏi và các đáp án em phân vân. Xem xét cách dùng từ trong các đáp án, đáp án có mấy ý, có gói đủ ý của
      bài hay chưa? (Vì dạng này thường cho đáp án chỉ bao gồm một vài ý chứ không bao quát hết)

      - Phải thật tỉnh táo, nhìn cả bài văn như một tổng thể để xem mục đích chung của bài, tránh để các ý nhỏ lẻ trong bài
      đánh lừa.

      - Và cách cuối cùng là luyện thêm nhiều bài tập đọc hiểu để phát triển kỹ năng đọc nắm ý em nhé.'
