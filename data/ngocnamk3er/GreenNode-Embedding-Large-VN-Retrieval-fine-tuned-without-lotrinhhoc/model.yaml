widgetData:
- source_sentence: Tại sao em không nên tải hay in nhiều nội dung cùng lúc ạ?
  sentences:
  - 'Chủ đề: 4. TRUY CẬP KHÓA HỌC

    Nội dung:

    4. TRUY CẬP KHÓA HỌC

    Bước 1: Vào Avatar => truy cập mục Khóa học của tôi

    [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/49999f9f-fad6-4c7e-a67a-db1242a04ee3.png]]

    Bước 2: Tại mục Đã kích hoạt, bấm chọn một khoá học đã kích hoạt để vào học.

    [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/e4f9ab92-b99f-410d-a938-3da0f0c593be.png]]

    Bước 3: Tại Danh sách bài học của khóa học => chọn bài giảng hoặc bài thi để học.

    [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/156d32ff-047c-473c-a15a-1912e42e2eb3.png]]'
  - 'Câu hỏi: điểm thưởng dùng đề làm gì

    Trả lời: Điểm thưởng để cô biết được mức độ hoàn thành deadline nhiều hay ít của mỗi bạn và cô dễ theo dõi tình hình học
    của các em. Phần này mình liên hệ với các anh/ chị quản lý nhóm để được giải đáp thắc mắc nhé, anh chị ấy sẽ nắm thông
    tin đầy đủ và chính xác hơn em nhé.'
  - "Câu hỏi: Mình có file tổng hợp tài liệu các khoá học không ạ?\nTrả lời: Nội dung khoá học sẽ được cập nhật liên tục nên\
    \ sẽ không có file tổng hợp em nhé. \nDưới mỗi bài giảng/ bài thi sẽ có file của từng bài, em học bài nào có thể tải file\
    \ bài đấy về, không nên tải hay in nhiều nội dung cùng lúc em nhé."
- source_sentence: Em nên làm gì nếu muốn thi TOEIC Nghe - Đọc trên giấy?
  sentences:
  - "Câu hỏi: Làm thế nào để được ghi nhận đã xem 1 video bài giảng?/ Sao em xem bài giảng mà không ghi nhận deadline ạ?\n\
    Trả lời: Điều kiện hệ thống ghi nhận khi hs xem video đáp ứng các yêu cầu sau: \n- Xem từ đầu đến cuối video. \n- Khi\
    \ xem video không tua bất kì khoảng thời gian nào. \n- Không bị văng thoát video trong quá trình xem. \n- Không mở tab\
    \ khác song song khi xem video.\n- Deadline tính cho các video mới, xem lại sẽ không tính"
  - "Câu hỏi: Toeic thi máy hay thi giấy (cả 4 kĩ năng)\nEm có được lựa chọn không?\nTrả lời: 1. TOEIC Nghe - Đọc (Listening\
    \ & Reading): Có 2 hình thức là thi trên giấy (Paper-based) và thi trên máy tính (Computer-based). Ở Việt Nam, IIG cho\
    \ phép em chọn hình thức muốn thi khi đăng ký, miễn là trung tâm đó có đủ phòng và máy. Ví dụ: ở IIG Hà Nội và TP.HCM,\
    \ họ có cả 2 dạng nên em chọn được. \n\n2. TOEIC Nói - Viết (Speaking & Writing): Phần này chỉ thi trên máy tính nha nên\
    \ em không được chọn nè"
  - "Câu hỏi: Làm sao để cái thiện kĩ năng nghe ạ, của phần Part 3 với 4 ạ\nTrả lời: Lưu ý: CHỈ Áp dụng cho thi Giấy vì các\
    \ em được xem trước đề nhé\nCách luyện nghe/thi TOEIC Part 3\n\nBước 1: Đọc trước các câu hỏi        \nEm nên đọc trước\
    \ các câu hỏi để hiểu các yêu cầu của bài thi, đặc biệt là dạng câu hỏi \"Why\" - hỏi lý do của cuộc nói chuyện, khi làm\
    \ bài em phải xác định xem bên người gọi là nam hay nữ, điều này giúp em có thể chủ động nhận biết được cần nghe thông\
    \ tin từ phía nào.\nBước 2: Đọc các phương án        \nEm đọc lướt qua các phương án được đưa ra và đánh dấu các từ khóa\
    \ quan trọng trong các phương án đó.\nLưu ý: Khi gạch chân các từ khóa, em nên tìm các từ mang nhiều thông tin, thường\
    \ là các từ hoặc cụm từ với danh từ, động từ, tính từ hoặc trạng từ.\n* Các giới từ (in, on, at, for, by, from ...) hoặc\
    \ mạo từ (a, an, the), đại từ (he, she, it, they ...) hoặc các động từ phụ trợ (tobe như am, are, have, has, do, did...)\
    \ nói chung không phải là từ khóa, vì những từ này chỉ có tác dụng đảm bảo ngữ pháp của câu chứ không mang thông tin cần\
    \ truyền đạt.\nBước 3: Phán đoán nội dung đoạn băng        \nEm cần xem xét ngữ cảnh của các từ khóa được gạch chân, cũng\
    \ như từ vựng liên quan đến các chủ đề liên quan có thể xuất hiện trong đoạn băng. Việc này giúp em có định hướng đúng\
    \ cho câu trả lời trước khi nghe.\n\nCách luyện nghe TOEIC Part 4\n\nBước 1: Đọc qua câu hỏi để xác định và ghi nhớ thông\
    \ tin cần nghe        \nEm xem qua các câu hỏi trong khi đọc hướng dẫn làm bài trên đoạn băng. Cũng giống như ở part 3,\
    \ để có thể làm bài tốt nhất, em cần tranh thủ thời gian đọc một lượt câu hỏi và phán đoán nội dung trong bài nói.\nHãy\
    \ nhớ chỉ đọc câu hỏi, không đọc câu trả lời vì có rất ít thời gian. Đọc để xác định và ghi nhớ những gì cần nghe, giúp\
    \ xác định câu trả lời chính xác trong các đoạn nghe.\nBước 2: Xác định được từ khóa chính        \nTương tự như Part\
    \ 3, em cần gạch chân những từ khóa ngay trong câu hỏi để nắm rõ vấn đề được hỏi là gì, nhờ đó dễ dàng xác định được vị\
    \ trí câu trả lời xuất hiện trong đoạn băng.\nBước 3: Lắng nghe đoạn băng để trả lời        \nTrong khi nghe đoạn băng,\
    \ em cần phải tìm ra các vấn đề được hỏi nằm ở đâu trong băng. Những câu hỏi trong bài thi nghe TOEIC Part 4 sẽ không\
    \ theo thứ tự nội dung được đề cập mà được phát theo thứ tự ngẫu nhiên. Vì vậy, khi bắt đầu nghe, em nên lướt nhanh các\
    \ câu hỏi để xem phần nghe tương ứng với câu hỏi nào.\nCác từ khóa mà em đã gạch chân trong câu hỏi sẽ là gợi ý giúp em\
    \ nghe đoạn hội thoại tốt hơn. Trong nhiều trường hợp, các từ/cụm từ và cách diễn đạt của câu hỏi được sử dụng y nguyên\
    \ trong hội thoại. Tuy nhiên, cũng có trường hợp người ta sử dụng các từ/cụm từ khác nhưng với cùng ý nghĩa trong hội\
    \ thoại."
- source_sentence: Anh chị có thể cho em xin tài liệu về động từ bất quy tắc không ạ?
  sentences:
  - 'Câu hỏi: Cho em xin bảng động từ bất quy tắc ạ?

    Trả lời: Động từ BQTac.pdf'
  - 'Câu hỏi: Em có thể tải video bài giảng về máy không?

    Trả lời: Không, bài giảng chỉ có thể xem trực tuyến trên hệ thống khóa học.'
  - 'Câu hỏi: Em có thể học lại các bài cũ không?

    Trả lời: Có! Em có thể xem lại tất cả các bài giảng đã mở khóa bất cứ lúc nào trong suốt thời gian diễn ra khóa học.'
- source_sentence: Sau khi kích hoạt, ô Kích hoạt sẽ thay đổi như thế nào?
  sentences:
  - 'Chủ đề: 3. KÍCH HOẠT THAM GIA KHÓA HỌC

    Nội dung:

    3. KÍCH HOẠT THAM GIA KHÓA HỌC

    Bước 1: Truy cập website: https://tienganhcomaiphuong.vn/ hoặc https://ngoaingu24h.vn/

    Bước 2: Đăng nhập tài khoản đã tạo (hoặc tài khoản tư vấn viên cung cấp)

    [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/cf50b9bb-d066-4866-9f22-95e64a2dc066.png]]

    Bước 3: Vào Avatar => Truy cập mục Lịch sử đơn hàng

    [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/6bf25ec6-6abb-42d5-93d2-bee03b84a551.png]]

    Bước 4: Trong mục Lịch sử đơn hàng sẽ hiện danh sách các khóa mà em đã mua. Bấm kích hoạt (các) khóa muốn học ngay.

    [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/6f91640b-9fe3-4550-82f8-97dcd7fcf04d.png]]

    Ngay sau khi bấm Kích hoạt, màn hình sẽ hiện pop-up tham gia lớp học thành công

    [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/3082b912-7212-48a0-b871-aa5e1c46fb63.png]]

    Ô Kích hoạt sẽ chuyển thành Đã kích hoạt

    [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/2e55bdcd-5290-4916-b7da-382e48f0fc0d.png]]'
  - 'Câu hỏi: cho e hỏi là 1 video có thể xem 10 lần nhưng mà cả phần e học cộng với thỉnh thoảng e làm
    lại practice thì vào lại video để xem thì e sợ là sẽ hết lượt xem ạ. cô có thể thêm lượt ko ạ.
    e cảm ơn

    Trả lời: Mỗi bài học mình có 10 lượt xem em nhé. Nếu mỗi video mình xem liền mạch, ghi chú lại kiến thức và làm bài tập
    vận dụng thì sẽ nhớ lâu kiến thức hơn và không cần phải xem lại quá nhiều em nè.'
  - 'Câu hỏi: Sao em làm đúng mà hệ thống chấm sai?

    Trả lời: Bước 1: Copy Tên tài khoản (ID) học viên -> Bấm Chi tiết comment, hệ thống sẽ chuyển đến link bài thi mà hs để
    lại cmt                                                                 Bước 2: Xem mục BXH, click vào "Tìm kiếm trng
    danh sách" chọn Tìm kiếm theo tên tài khoản                                                                                                                        Bước
    3: Nhập tên tài khoản của học sinh, bấm Tìm kiếm                                                Bước 4: Bấm xem chi tiết
    bài làm của học sinh và check câu hỏi mà học sinh thắc mắc'
- source_sentence: Em nên đọc kỹ những phần nào của đoạn văn trước khi đọc lướt?
  sentences:
  - 'Câu hỏi: Cách tính điểm kinh nghiệm

    Trả lời: Bài thi:

    + HS nộp bài pass: cộng 50 điểm;

    + HS không pass: cộng 25 điểm;

    Bài tập:

    + progress >= 80: cộng 50 điểm;

    + progress < 80: cộng 25 điểm;

    Bài giảng:

    + Bấm play video: cộng 25 điểm;

    + xem liên tục > 60 %:  cộng thêm 25 điểm.'
  - "Chủ đề: Danh mục nội dung\nNội dung:\nHỆ THỐNG E-LEARNING PLATFORM USER\n1. TÀI KHOẢN\n- Đăng ký tài khoản\n- Đặng nhập\
    \ tài khoản\n- Quên mật khẩu\n2. MUA KHÓA HỌC\n- Thêm giỏ hàng\n- Mua khoá học lẻ\n- Mua combo khóa học\n3. KÍCH HOẠT\
    \ THAM GIA KHÓA HỌC\n4. TRUY CẬP KHÓA HỌC\n5. XEM BÀI GIẢNG\n- Xem bài giảng video\n- Làm bài tập kịch bản đi kèm bài\
    \ giảng\n- Học bản dịch song ngữ đi kèm bài giảng\n- Học từ vựng dạng flashcard đi kèm bài giảng\n- Sử dụng tính năng\
    \ timeline chữa đề trong bài giảng\n- Xem bài giảng video livestream\n6. LÀM BÀI THI ONLINE\n- Hướng dẫn truy cập\n- Hướng\
    \ dẫn cách làm bài\n- Hướng dẫn nộp bài\n- Xem kết quả sau khi nộp\n- Xem bảng xếp hạng bài thi\n7. Luyện BÀI TẬP ONLINE\n\
    - Hướng dẫn truy cập\n- Hướng dẫn cách làm bài\n- Hướng dẫn nộp bài\n- Xem kết quả sau khi nộp\n- Xem bảng xếp hạng bài\
    \ tập\n8.\tTÀI LIỆU:\n- Kho tài liệu tham khảo:\n+ Cách thức truy cập\n+ Các thức xem/ tải tài liệu\n- Tài liệu của khóa\
    \ học\n+ Xem/ tải tài liệu đi kèm theo từng bài giảng/ bài tập/ bài thi\n+ Xem/ tải kho tài liệu của toàn khoá học\n9.\
    \ BÌNH LUẬN\nBình luận tại khóa học.\nBình luận tại bài giảng video / livestream.\nBình luận tại bài tập/bài thi.\nBình\
    \ luận tại câu hỏi.\n10. BẢO LƯU KHÓA HỌC\n- Điều kiện bảo lưu khóa học\n- Hướng dẫn kích hoạt bảo lưu\n11. DEADLINE KHÓA\
    \ HỌC\n- Cách đăng ký deadline\n- Xem thống kê deadline\n- Các ghi nhận deadline\n12. THỐNG KÊ SỐ LIỆU HỌC VIÊN\n- Cách\
    \ thức truy cập xem số liệu\n- Các tiêu chí thống kê"
  - 'Câu hỏi: ĐỌC HIỂU: Tóm tắt (summarise)

    Trả lời: Để làm bài tìm câu best summarises:

    - Em cần đọc kỹ câu chủ đề (topic sentence) của bài, nó có thể là câu đầu hoặc câu cuối đoạn 1.

    - Tiếp đó em đọc lần lượt các câu đầu và cuối của từng đoạn trong bài, sau đó mới đọc lướt quá nội dung đoạn, em có thể
    ghi chú ra nội dung chung chung của đoạn đó ra nháp, hoặc lên trên đề ngay bên cạnh đoạn đó luôn.

    - Em đọc câu hỏi và các đáp án em phân vân. Xem xét cách dùng từ trong các đáp án, đáp án có mấy ý, có gói đủ ý của bài
    hay chưa? (Vì dạng này thường cho đáp án chỉ bao gồm một vài ý chứ không bao quát hết)

    - Phải thật tỉnh táo, nhìn cả bài văn như một tổng thể để xem mục đích chung của bài, tránh để các ý nhỏ lẻ trong bài
    đánh lừa.

    - Và cách cuối cùng là luyện thêm nhiều bài tập đọc hiểu để phát triển kỹ năng đọc nắm ý em nhé.'
