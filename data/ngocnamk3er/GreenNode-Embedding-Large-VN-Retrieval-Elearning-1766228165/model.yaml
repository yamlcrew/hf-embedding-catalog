      Nếu thấy âm thanh bị rè hoặc quá nhỏ, em phải báo giám thị ngay trước khi bài thi bắt đầu. Khi đã phát đề rồi thì họ
      không dừng lại để chỉnh nữa.'
    - 'Câu hỏi: Làm thế nào để tải tài liệu?

      Trả lời: - Nếu em dùng laptop: Em tải file ở trên GG Chrome hoặc Cốc Cốc cho dễ em nhé. Em ấn vào mũi tên tải xuống
      màu đỏ thì file sẽ đc tải về máy của em, em hay kiểm tra phần nhật ký tải xuống gần đây trên trình duyệt google của
      em (nếu là cốc cốc, còn chrome thì nó ghi là "tệp đã tải xuống" đó em nhé. Hoặc em kiểm tra ở thư mục Download nhé.


      - Nếu em dùng điện thoại: Em vào web từ Zalo, Facebook hoặc search từ Google thường sẽ bị chặn tải nha em. Em mở bài
      giải trực tiếp trên app Google Chrome và tải về giúp chị nha. Trên Safari thì em vào cài đặt => Safari và tắt chế độ
      Chặn cửa sổ bật lên rồi tải tài liệu em nhé.'
  - source_sentence: Làm thế nào để tìm kiếm sách trong kho sách đã được kích hoạt?
    sentences:
    - 'Câu hỏi: Trong bài thi nghe em có được chỉnh âm lượng không ạ

      Trả lời: 1. Nếu em thi trên máy thì em sẽ được trang bị tai nghe riêng, chất lượng cao. Em có thể tự mình tuỳ chỉnh
      âm lượng, giúp nghe rõ và tập trung hơn nha


      2. Nếu em thi giấy (TOEIC truyền thống) thì âm thanh phát qua loa chung trong phòng thi.

      Thí sinh không được chỉnh âm lượng, vì cả phòng nghe cùng một nguồn âm thanh.

