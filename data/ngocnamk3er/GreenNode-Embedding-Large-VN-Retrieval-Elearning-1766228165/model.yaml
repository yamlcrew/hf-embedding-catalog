widgetData:
- source_sentence: Có những chủ đề từ vựng nào chỉ có trong sách mà không có trong EZVocab không ạ?
  sentences:
  - 'Câu hỏi: Flashcard có giới hạn lượt xem không?

    Trả lời: Flashcard sẽ không giới hạn lượt học'
  - 'Câu hỏi: Khi nào có bài giảng mới?

    Trả lời: Hàng ngày (T2-T7), vào lúc 20h15, sẽ có bài livestream mới.

    Bài thi online tương ứng sẽ được mở vào 20h30 cùng ngày.'
  - 'Câu hỏi: 20 chủ đề từ vựng ở sách có giống 20 chủ đề ở flashcard/ EZVocab không ạ?

    Trả lời: 1 vài mục sẽ có thể có chung tên chủ đề nhưng nội dung thì không giống nhau em nhé'
- source_sentence: Cô có thể giải thích lý do website cài đặt chế độ chống sao chép không ạ?
  sentences:
  - 'Câu hỏi: Tại sao em không unlock được khóa học?

    Trả lời: Nếu khóa học không mở khóa, có thể do các nguyên nhân sau:

    - Em chưa hoàn thành bài kiểm tra đầu vào với điểm số đạt yêu cầu.

    - Em chưa xem hết video bài giảng hoặc chưa làm bài thi online.

    - Bài thi online của em chưa đạt điểm 10, nên chưa mở khóa bài học tiếp theo.

    - Nếu là bài chữa đề, em cần làm đề trước và đạt ít nhất 80% số điểm mới mở được khóa học.'
  - 'Câu hỏi: Cô ơi em không ấn được vào link anh chị cmt

    Trả lời: Website đã cài đặt chế độ chống sao chép nên các bạn trợ giảng ko gửi link vào cmt ở web'
  - 'Câu hỏi: web ngoaingu24h và tienganhcomaiphuong khác nhau thế nào ạ?

    Trả lời: tienganhcomaiphuong và ngoaingu24h sẽ giống nhau về nội dung, tuy nhiên tiengangcomaiphuong là web mới, cập nhật
    các tính năng, giao diện mới để các em trải nghiệm học tập tốt hơn nha. Team khuyến khích các em học cố định trên web
    tienganhcomaiphuong.vn em nhé.'
- source_sentence: Làm thế nào để em không phải nhập lại mật khẩu mỗi lần đăng nhập ạ?
  sentences:
  - 'Câu hỏi: Có cách nào lưu tài khoản đăng nhập vào web không ạ? (lưu TK)

    Trả lời: Sau khi đăng nhập, em lưu mật khẩu vào trình duyệt (gg chrome, cốc cốc...) nhé. Các lần sau mình chỉ cần chọn
    tài khoản để đăng nhập thôi nè. Để tài khoản của các em được bảo mật, nên bên chị chỉ lưu đăng nhập 1 ngày thui em nhé,
    em vào liên tiếp các ngày trên 1 thiết bị là không bị đăng xuất nha.'
  - 'Câu hỏi: Em không hoàn thành deadline nhiệm vụ có sao không?

    Trả lời: Nếu em đã ở trong nhóm học tập trên zalo, em có thể liên hệ các chị quản lý nhóm để nắm được nội quy học tập
    trong nhóm nha'
  - 'Câu hỏi: Học viên báo nội dung khoá học/ file tài liệu bị sai đáp án, sai chính tả,.....( các lỗi sai về bài học trong
    khoá)

    Trả lời: TG check lại thông tin, nếu không sai thì phản hồi lại HS

    Nếu TG phát hiện bị sai thì báo lại bên KT để sửa'
- source_sentence: Mỗi phần của bài thi TOEIC Listening và Reading có bao nhiêu câu hỏi ạ?
  sentences:
  - 'Câu hỏi: Cách tính điểm bài thi toeic như thế nào ạ?

    Trả lời: Bài thi TOEIC 2 kỹ năng (Listening & Reading) có tổng điểm từ 10 đến 990 điểm, chia làm hai phần:

    Listening (nghe): 100 câu, tối đa 495 điểm

    Reading (đọc): 100 câu, tối đa 495 điểm

    Điểm thi TOEIC Speaking và Writing được tính theo thang điểm tối đa 200 điểm cho mỗi kỹ năng, tổng cộng 400 điểm.'
  - 'Câu hỏi: Trong bài thi nghe em có được chỉnh âm lượng không ạ

    Trả lời: 1. Nếu em thi trên máy thì em sẽ được trang bị tai nghe riêng, chất lượng cao. Em có thể tự mình tuỳ chỉnh âm
    lượng, giúp nghe rõ và tập trung hơn nha


    2. Nếu em thi giấy (TOEIC truyền thống) thì âm thanh phát qua loa chung trong phòng thi.

    Thí sinh không được chỉnh âm lượng, vì cả phòng nghe cùng một nguồn âm thanh.

    Nếu thấy âm thanh bị rè hoặc quá nhỏ, em phải báo giám thị ngay trước khi bài thi bắt đầu. Khi đã phát đề rồi thì họ không
    dừng lại để chỉnh nữa.'
  - 'Câu hỏi: Làm thế nào để tải tài liệu?

    Trả lời: - Nếu em dùng laptop: Em tải file ở trên GG Chrome hoặc Cốc Cốc cho dễ em nhé. Em ấn vào mũi tên tải xuống màu
    đỏ thì file sẽ đc tải về máy của em, em hay kiểm tra phần nhật ký tải xuống gần đây trên trình duyệt google của em (nếu
    là cốc cốc, còn chrome thì nó ghi là "tệp đã tải xuống" đó em nhé. Hoặc em kiểm tra ở thư mục Download nhé.


    - Nếu em dùng điện thoại: Em vào web từ Zalo, Facebook hoặc search từ Google thường sẽ bị chặn tải nha em. Em mở bài giải
    trực tiếp trên app Google Chrome và tải về giúp chị nha. Trên Safari thì em vào cài đặt => Safari và tắt chế độ Chặn cửa
    sổ bật lên rồi tải tài liệu em nhé.'
- source_sentence: Làm thế nào để tìm kiếm sách trong kho sách đã được kích hoạt?
  sentences:
  - 'Câu hỏi: Trong bài thi nghe em có được chỉnh âm lượng không ạ

    Trả lời: 1. Nếu em thi trên máy thì em sẽ được trang bị tai nghe riêng, chất lượng cao. Em có thể tự mình tuỳ chỉnh âm
