    **Ở Giai đoạn 1** em cần học kĩ mục **(1) (2) (3)**


    **|** Đây là giai đoạn **then chốt** với các đang yếu Tiếng Anh (Mức 4-5-6 điểm)


    Các em có thể phân bổ thời gian cho **1 tuần** như sau:


    * Ngữ pháp Ứng dụng: **6-8 bài**

    * Nền tảng Từ vựng – Đọc hiểu: **6-8 bài**


    Học Từ vựng mỗi ngày (ở cả 3 giai đoạn) với **EZ Vocab độc quyền**


    **|** Giai đoạn đầu này nhiều em sẽ học thấy nhiều từ vựng cần học; chưa dịch bài được bài mượt (có thể chỉ dịch được
    30-40%) nhưng dần dần qua các bài em sẽ thấy số từ mới giảm đi đáng kể vì rất nhiều từ mình đã biết.Việc học từ vựng nên
    diễn ra đều đặn mỗi ngày và việc quên từ vựng là bình thường; quên thì mình ôn tập lại và làm nhiều bài tập là em sẽ nhớ
    lâu. Trước khi học từ mới các em nên dành thời gian ôn tập lại 1 lượt các từ vựng đã học trước đó.


    **GIAI ĐOẠN 2**


    **LUYỆN GIẢI ĐỀ KẾT HỢP TĂNG CƯỜNG ÔN LUYỆN CÁC DẠNG BÀI**


    **(Từ tháng 1/2026)**


    **EZ Vocab độc quyền (App+Web)**


    **(1)** Từ vựng SGK


    **(2)** 4000 Từ vựng cơ bản


    **(3)** 20 chủ đề từ vựng trọng điểm


    **(4)** Từ vựng nâng cao (C1-C2)


    **(5)** Cụm động từ; Collocation


    **Ở Giai đoạn 2** em cần hoàn thành **(3);(4)**


    **Luyện toàn diện các dạng câu hỏi trong đề thi**


    **Luyện giải đề thi THPT 2026 (Mức độ 8+)**


    **|| \* Lưu ý:** Ở các giai đoạn 2 này nếu em chưa hoàn thành các khóa học ở giai đoạn 1 thì em tiếp tục học và hoàn thành
    bài giảng; bài thi đầy đủ.


    **Ở giai đoạn (2); (3) bắt đầu Luyện đề thì các em nên Luyện đề theo 4 bước:**


    **▪️ Bước 1:** Bấm giờ tự thử sức với đề thi trong khóa học.


    **▪️ Bước 2:** Xem phần đánh giá chi tiết bài thi mà hệ thống đưa ra; học lại các phần kiến thức mà em còn sai (bài học
    liên quan kiến thức em sai) mà hệ thống đề xuất.


    [[img\_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx\_extracted/eb10bdfa-f072-4072-99f3-b36784fa71b3.png]]


    [[img\_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx\_extracted/43f26819-f917-40d6-8ada-91a9e7b110b8.png]]


    **▪️ Bước 3:** Xem kĩ phần chữa đề bằng VIDEO - LIVESTREAM của cô. Đặc biệt là những câu em còn làm sai. Học từ vựng thông
    qua Flashcard ở phần Nhiệm vụ buổi học dưới mỗi Video chữa đề hoặc Bảng từ - cấu trúc cuối đề (cô đã làm sẵn)

