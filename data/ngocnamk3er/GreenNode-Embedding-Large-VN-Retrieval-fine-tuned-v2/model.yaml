- source_sentence: Em cần làm gì nếu muốn tải tài liệu từ trình duyệt Safari trên điện thoại ạ?
  sentences:
  - 'Câu hỏi: Điểm thưởng/ Điểm kinh nghiệm đùng để làm gì ạ

    Trả lời: Điểm thưởng để cô biết được mức độ hoàn thành deadline nhiều hay ít của mỗi bạn và cô dễ theo dõi tình hình học
    các các em. Ngoài ra, sau này nếu có chương trình thi đua trong các nhóm học tập sẽ lấy điểm thưởng sẽ được nhận quà từ
    cô nhé (phần này thì khi nào cô tổ chức quản lý nhóm sẽ thông báo trong nhóm)


    Điểm kinh nghiệm hiện tại chưa áp dụng em nhé.'
  - "**▪️ Bước 4:** Sau khi đã bổ sung kiến thức còn hổng thông qua đề thi thì em thử sức lại 1 lần với đề.\n\nVới các bài\
