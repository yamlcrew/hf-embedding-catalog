    - 'Câu hỏi: Làm sao để tải tài liệu ạ?

      Trả lời: Nếu em dùng laptop: EM tải file ở trên GG Chrome hoặc Cốc Cốc cho dễ em nhé. Em ấn vào mũi tên tải xuống màu
      đỏ thì file sẽ đc tải về máy của em, em hay kiểm tra phần nhật ký tải xuống gần đây trên trình duyệt google của em (nếu
      là cốc cốc, còn chrome thì nó ghi là "tệp đã tải xuống" đó em nhé. Hoặc em kiểm tra ở thư mục Download nhé


      Nếu em dùng điện thoại: Em vào web từ Zalo, Facebook hoặc search từ Google thường sẽ bị chặn tải nha em. Em mở bài giải
      trực tiếp trên app Google Chrome và tải về giúp chị nha. Trên Safari thì em vào cài đặt => Safari và tắt chế độ Chặn
      cửa sổ bật lên rồi tải tài liệu em nhé.'
  - source_sentence: Khóa học này có yêu cầu điều kiện tiên quyết nào không, thưa thầy/cô?
    sentences:
    - 'Chủ đề: 13. TÍNH NĂNG TRA HỌ TỪ

      Nội dung:

      13. TÍNH NĂNG TRA HỌ TỪ

      Bước 1: Truy cập trang web

      Mở trình duyệt và truy cập vào website Tiếng Anh Cô Mai Phương

      Đăng nhập vào tài khoản để sử dụng đầy đủ các tính năng

      Lưu ý: Chỉ tài khoản đang tham gia ít nhất một khoá học mới sử dụng được tính năng tra họ từ.

      Bước 2: Tìm công cụ tra họ từ

      [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/57d510a9-688a-4ee9-bae6-0e8ce571ad60.png]]

      Tại giao diện trang chủ, tìm kiếm nút “Tra từ” => Nhấp vào nút để mở giao diện nhập từ cần tra.

      Bước 3: Nhập từ cần tra cứu

      [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/b584ed70-bdfd-4f00-9abc-a2715f81f93d.png]]

      Nhập từ vựng cần tra họ từ vào ô tìm kiếm

      Nhấn phím chọn nút “Tra cứu ngay” để hệ thống xử lý yêu cầu.

      Bước 4: Xem kết quả tra cứu

      [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/42ad212a-806a-41e3-a082-2cdb13bd31a4.png]]

      Hệ thống sẽ hiển thị bảng họ từ của từ vừa nhập, bao gồm các từ liên quan như Danh từ (Noun), Động từ (Verb), Tính từ
      (Adj), Trạng từ (Adv), … (nếu có)

      [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/2e5460f5-2a8d-47d9-a9da-8d09566da192.png]]

      Khi double click vào một từ trong danh sách họ từ, hệ thống sẽ tự động tra cứu nghĩa của từ đó trong từ điển và hiển
      thị kết quả ngay lập tức.

      Bước 5: Tra cứu thêm từ vựng khác

      [[img_link: https://imagedoan.s3.ap-southeast-2.amazonaws.com/docx_extracted/9b8e46d8-d015-442c-bf1e-47ae17a2439b.png]]

      Để tra cứu một từ khác, người dùng chỉ cần chọn “Tra cứu mới” và thực hiện lại các bước trên.'
