widgetData:
- source_sentence: 교통이 편리하고 슈퍼마켓 등 가까운 위치에요!
  sentences:
  - 교통도 편리하고 호스트분이 되게 친절하세요.
  - 세계에서 사망자가 제일 많았던 태풍은?
  - 내일 아침 수업이 시작하는 때가 언제인지가 궁금합니다.
- source_sentence: 한계령과 미시령 중 안개 낀 곳을 알려줘. 현재.
  sentences:
  - 일정은 겹쳐서 짜는 일 없도록 하시게.
  - 웬만한 호텔 풍경만큼이나 좋은 것 같아요.
  - 번개가 치는 시기에는 우산 쓰지 않도록 하세요.
- source_sentence: 그리고 문 잠고 여는 것을 체크인할때  꼭 숙지하세요
  sentences:
  - 숙소의 위치가 가장 큰 장점이라 생각합니다.
  - 문을 안에서 열때에도 열쇠가 필요하니 주의하세요
  - 메일 내용 확인에 너무 많은 시간을 쓸 필요는 없으니 두 번만 확인하면 됩니다.
- source_sentence: 자외선 강할 때는 잊지 말고 선글라스 쓰렴.
  sentences:
  - 자외선 강할 때에는 다른 것 말고 선글라스 쓰기를 권합니다.
  - 대한항공이 보낸 중요한 메일이 있니?
  - 부엌에는 필요한 도구들은 다 있습니다.
- source_sentence: 실시간 쌍방향 화상 수업 확인은 교사가 학생의 수업 참여 모습을 보면서 출석을 체크한다.
  sentences:
  - 정부가 그리는 BIG3 산업의 미래 모습을 보면 미래차 분야에선 세계 최고 수준의 전기·수소차 생산국가로의 도약을 목표로 한다.
  - 이 요리 만드는 방법이 뭐야?
  - 담에 스페인 가면 또 머물 예정입니다.
