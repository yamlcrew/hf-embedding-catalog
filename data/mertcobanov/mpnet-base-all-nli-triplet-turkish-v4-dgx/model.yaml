widgetData:
- source_sentence: Bir köpek sahibi, evcil hayvanıyla birlikte koşuyor ve evcil hayvan bir parkurda engellerden kaçınıyor.
  sentences:
  - Bazı bitkilerin önünde mavi bir kano.
  - Bir adam köpeğinin yanında koşuyor.
  - Adam bir kediyle birlikte.
- source_sentence: Parlamenter bölümünün patronunun ev hizmetiyle bağlantılı bir politikacı, 0-609-3459812 numaralı cep telefonuna
    sahip ve mizah anlayışının olmamasıyla tanınıyor, 'Hayran' adlı birinden gelen 'En iyi kürek dilekleri' mesajını pek iyi
    karşılamadı.
  sentences:
  - Doktor Perennial, kötü niyetli çavuş uyandığında ayakta duruyordu.
  - Politikacı, patronunun ev hizmetini aradığında, bir 'hayran'dan gelen bir mesaja pek hoş karşılamadı.
  - Mesajı aldığı için o kadar minnettardı ki, gönderen kişiye bir demet çiçek gönderdi.
- source_sentence: Bankanın kasalarında.
  sentences:
  - Ayakta duran bir insan
  - Banka kasasında.
  - Bankadaki kasa.
- source_sentence: Bir grup Asyalı erkek, birlikte bir yemek yedikten sonra büyük bir masanın etrafında poz veriyor.
  sentences:
  - Bir grup Asyalı erkek birlikte bir yemek yedi.
  - Pazarlar, kaplıcalar ve kayak pistleri burada bulunan diğer cazibe merkezlerinden bazılarını oluşturuyor.
  - Bir grup Asyalı erkek futbol oynuyor.
- source_sentence: Böyle şeyler görmek ve eğer yapabileceğiniz en küçük bir şey varsa, bu yardımcı olur.
  sentences:
  - Böyle bir şeyi gözlemlemek ve yapıp yapamayacağınızı bilmek için.
  - Adamın gömleği, kot pantolonundan farklı bir renkte.
  - Böyle bir şeyi görmek kötü, eğer yapabiliyorsanız buna hiç katkıda bulunmayın.
