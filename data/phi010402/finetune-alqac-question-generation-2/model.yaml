  widget:
  - source_sentence: Trong trường hợp nào nghĩa vụ không được bù trừ?
    sentences:
    - 'Bản án sơ thẩm


      1. Tòa án ra bản án nhân danh nước Cộng hoà xã hội chủ nghĩa Việt Nam.


      2. Bản án gồm có phần mở đầu, phần nội dung vụ án và nhận định và phần quyết định của Tòa án, cụ thể như sau:


      a) Trong phần mở đầu phải ghi rõ tên Tòa án xét xử sơ thẩm; số và ngày thụ lý vụ án; số bản án và ngày tuyên án; họ,
      tên của thành viên Hội đồng xét xử, Thư ký phiên tòa, Kiểm sát viên, người giám định, người phiên dịch; tên, địa chỉ
      của người khởi kiện, người bị kiện, người có quyền lợi, nghĩa vụ liên quan; cơ quan, tổ chức khởi kiện; người đại diện
      hợp pháp, người bảo vệ quyền và lợi ích hợp pháp của đương sự; đối tượng khởi kiện; số, ngày, tháng, năm của quyết định
      đưa vụ án ra xét xử; xét xử công khai hoặc xét xử kín; thời gian và địa điểm xét xử;


      b) Trong phần nội dung vụ án và nhận định của Tòa án phải ghi yêu cầu khởi kiện của người khởi kiện, khởi kiện của cơ
      quan, tổ chức; đề nghị, yêu cầu độc lập của người có quyền lợi, nghĩa vụ liên quan.


      Tòa án phải căn cứ vào kết quả tranh tụng, các chứng cứ đã được xem xét tại phiên tòa để phân tích, đánh giá, nhận định
      đầy đủ, khách quan về các tình tiết của vụ án, những căn cứ pháp luật, án lệ (nếu có) mà Tòa án áp dụng để chấp nhận
      hoặc không chấp nhận yêu cầu, đề nghị của đương sự, người bảo vệ quyền và lợi ích hợp pháp của đương sự và giải quyết
      các vấn đề khác có liên quan;


      c) Trong phần quyết định phải ghi rõ các căn cứ pháp luật, quyết định của Hội đồng xét xử về từng vấn đề phải giải quyết
      trong vụ án, về áp dụng biện pháp khẩn cấp tạm thời, về án phí, chi phí tố tụng và quyền kháng cáo đối với bản án; trường
      hợp có quyết định phải thi hành ngay thì phải ghi rõ quyết định đó.


      3. Khi xét xử lại vụ án mà bản án, quyết định đã bị hủy một phần hoặc toàn bộ theo quyết định giám đốc thẩm, tái thẩm,
      Tòa án phải giải quyết vấn đề tài sản, nghĩa vụ đã được thi hành theo bản án, quyết định có hiệu lực pháp luật nhưng
      bị hủy và ghi rõ trong bản án.'
    - 'Thành phần Hội đồng xét xử sơ thẩm


      Hội đồng xét xử sơ thẩm gồm một Thẩm phán và 02 Hội thẩm nhân dân, trừ trường hợp quy định tại khoản 1 Điều 249 của
      Luật này. Hội đồng xét xử sơ thẩm có thể gồm 02 Thẩm phán và 03 Hội thẩm nhân dân trong trường hợp sau đây:


      1. Khiếu kiện quyết định hành chính, hành vi hành chính của Ủy ban nhân dân cấp tỉnh, Chủ tịch Ủy ban nhân dân cấp tỉnh
      liên quan đến nhiều đối tượng;


      2. Vụ án phức tạp.'
    - 'Những trường hợp không được bù trừ nghĩa vụ


      Nghĩa vụ không được bù trừ trong trường hợp sau đây:


      1. Nghĩa vụ đang có tranh chấp;


      2. Nghĩa vụ bồi thường thiệt hại do xâm phạm tính mạng, sức khoẻ, danh dự, nhân phẩm, uy tín;


      3. Nghĩa vụ cấp dưỡng;


      4. Nghĩa vụ khác do luật quy định.'
  - source_sentence: Công dân Việt Nam phải thực hiện thủ tục cấp đổi thẻ căn cước khi bao nhiêu tuổi?
    sentences:
    - 'Quản lý số liệu quan trắc môi trường


      1. Bộ Tài nguyên và Môi trường quản lý số liệu quan trắc môi trường quốc gia; xây dựng cơ sở dữ liệu về quan trắc môi
      trường trong hệ thống thông tin, cơ sở dữ liệu môi trường quốc gia; tích hợp các dữ liệu quan trắc môi trường của các
      Bộ, cơ quan ngang Bộ và địa phương, công bố thông tin về chất lượng môi trường quốc gia; hướng dẫn chuyên môn, nghiệp
      vụ và hỗ trợ kỹ thuật quản lý số liệu quan trắc môi trường của địa phương.


      2. Bộ, cơ quan ngang Bộ xây dựng cơ sở dữ liệu về quan trắc môi trường theo thẩm quyền và tích hợp vào cơ sở dữ liệu
      môi trường quốc gia.


      3. Ủy ban nhân dân cấp tỉnh quản lý số liệu quan trắc môi trường; xây dựng cơ sở dữ liệu quan trắc môi trường trên địa
      bàn bảo đảm thống nhất, đồng bộ và liên thông với hệ thống thông tin, cơ sở dữ liệu môi trường quốc gia và công bố thông
      tin về chất lượng môi trường của địa phương trên cơ sở kết quả quan trắc môi trường địa phương.


      4. Dự án đầu tư, cơ sở, khu sản xuất, kinh doanh, dịch vụ tập trung, cụm công nghiệp quản lý số liệu quan trắc chất
      thải và công bố công khai kết quả quan trắc chất thải theo quy định của pháp luật.'
    - 'Trách nhiệm của người có thẩm quyền giải quyết khiếu nại, tố cáo


      1. Cơ quan, tổ chức, cá nhân có thẩm quyền trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm tiếp nhận và giải
      quyết kịp thời, đúng pháp luật; xử lý nghiêm minh người vi phạm; áp dụng biện pháp cần thiết nhằm ngăn chặn thiệt hại
      có thể xảy ra; bảo đảm cho quyết định giải quyết được thi hành nghiêm chỉnh và phải chịu trách nhiệm trước pháp luật
      về quyết định của mình.


      2. Người có thẩm quyền giải quyết khiếu nại, tố cáo mà không giải quyết, thiếu trách nhiệm trong việc giải quyết, giải
      quyết trái pháp luật thì tùy theo tính chất, mức độ vi phạm mà bị xử lý kỷ luật hoặc bị truy cứu trách nhiệm hình sự;
      nếu gây thiệt hại thì phải bồi thường theo quy định của pháp luật.


      Hình thức lưu trữ thông điệp dữ liệu

      1. Trường hợp pháp luật yêu cầu văn bản, chứng từ, hồ sơ, tài liệu hoặc thông tin phải được lưu trữ thì văn bản, chứng
      từ, hồ sơ, tài liệu hoặc thông tin đó có thể được lưu trữ dưới dạng thông điệp dữ liệu khi đáp ứng đủ các yêu cầu sau
      đây:

      a) Thông tin trong thông điệp dữ liệu đó có thể truy cập và sử dụng được để tham chiếu;

      b) Thông tin trong thông điệp dữ liệu đó được lưu trong chính khuôn dạng được khởi tạo, gửi, nhận hoặc trong khuôn dạng
      cho phép thể hiện chính xác thông tin đó;

      c) Thông điệp dữ liệu đó được lưu trữ theo một cách thức nhất định cho phép xác định nguồn gốc khởi tạo, người gửi,
      người nhận, thời gian gửi, nhận thông điệp dữ liệu.

      2. Trừ trường hợp pháp luật có quy định khác, cơ quan, tổ chức, cá nhân được lựa chọn lưu trữ văn bản, chứng từ, hồ
      sơ, tài liệu hoặc thông tin dưới dạng văn bản giấy hoặc lưu trữ dưới dạng thông điệp dữ liệu khi thông điệp dữ liệu
      đáp ứng các yêu cầu quy định tại khoản 1 Điều này.

      3. Nội dung, thời hạn lưu trữ đối với thông điệp dữ liệu được thực hiện theo quy định của pháp luật về lưu trữ và quy
      định khác của pháp luật có liên quan. Việc lưu trữ thông điệp dữ liệu có giá trị như lưu trữ văn bản giấy.'
    - 'Độ tuổi cấp đổi thẻ căn cước

      1. Công dân Việt Nam đã được cấp thẻ căn cước phải thực hiện thủ tục cấp đổi thẻ căn cước khi đủ 14 tuổi, 25 tuổi, 40
      tuổi và 60 tuổi.

      2. Thẻ căn cước đã được cấp, cấp đổi, cấp lại trong thời hạn 02 năm trước độ tuổi cấp đổi thẻ căn cước quy định tại
      khoản 1 Điều này có giá trị sử dụng đến tuổi cấp đổi thẻ căn cước tiếp theo.'
  - source_sentence: Chức danh chuyên môn nào phải có giấy phép hành nghề theo quy định?
    sentences:
    - 'Thời hạn thuê


      1. Thời hạn thuê do các bên thoả thuận; nếu không có thoả thuận thì được xác định theo mục đích thuê.


      2. Trường hợp các bên không thoả thuận về thời hạn thuê và thời hạn thuê không thể xác định được theo mục đích thuê
      thì mỗi bên có quyền chấm dứt hợp đồng bất cứ lúc nào, nhưng phải thông báo cho bên kia trước một thời gian hợp lý.'
    - 'Quyền từ chối của bên có nghĩa vụ


      1. Trường hợp bên có nghĩa vụ không được thông báo về việc chuyển giao quyền yêu cầu và người thế quyền không chứng
      minh về tính xác thực của việc chuyển giao quyền yêu cầu thì bên có nghĩa vụ có quyền từ chối việc thực hiện nghĩa vụ
      đối với người thế quyền.


      2. Trường hợp bên có nghĩa vụ do không được thông báo về việc chuyển giao quyền yêu cầu mà đã thực hiện nghĩa vụ đối
      với người chuyển giao quyền yêu cầu thì người thế quyền không được yêu cầu bên có nghĩa vụ phải thực hiện nghĩa vụ đối
      với mình.'
    - 'Chức danh chuyên môn phải có giấy phép hành nghề

      1. Chức danh chuyên môn phải có giấy phép hành nghề bao gồm:

      a) Bác sỹ;

      b) Y sỹ;

      c) Điều dưỡng;

      d) Hộ sinh;

      đ) Kỹ thuật y;

      e) Dinh dưỡng lâm sàng;

      g) Cấp cứu viên ngoại viện;

      h) Tâm lý lâm sàng;

      i) Lương y;

      k) Người có bài thuốc gia truyền hoặc có phương pháp chữa bệnh gia truyền.

      2. Chính phủ quy định chức danh chuyên môn và điều kiện cấp mới, cấp lại, gia hạn, điều chỉnh, đình chỉ hành nghề, thu
      hồi giấy phép hành nghề đối với chức danh chuyên môn được bổ sung ngoài các chức danh quy định tại khoản 1 Điều này
      phù hợp với tình hình phát triển kinh tế - xã hội của đất nước trong từng thời kỳ sau khi báo cáo Ủy ban Thường vụ Quốc
      hội.

      3. Bộ trưởng Bộ Y tế quy định phạm vi hành nghề đối với từng chức danh chuyên môn.'
  - source_sentence: Tòa án cấp sơ thẩm phải làm gì sau khi nhận được đơn kháng cáo quá hạn?
    sentences:
    - 'Phương thức xử lý tài sản cầm cố, thế chấp


      1. Bên bảo đảm và bên nhận bảo đảm có quyền thỏa thuận một trong các phương thức xử lý tài sản cầm cố, thế chấp sau
      đây:


      a) Bán đấu giá tài sản;


      b) Bên nhận bảo đảm tự bán tài sản;


      c) Bên nhận bảo đảm nhận chính tài sản để thay thế cho việc thực hiện nghĩa vụ của bên bảo đảm;


      d) Phương thức khác.


      2. Trường hợp không có thỏa thuận về phương thức xử lý tài sản bảo đảm theo quy định tại khoản 1 Điều này thì tài sản
      được bán đấu giá, trừ trường hợp luật có quy định khác.'
    - 'Kháng cáo quá hạn và xem xét kháng cáo quá hạn


      1. Kháng cáo quá thời hạn quy định tại Điều 206 của Luật này là kháng cáo quá hạn. Sau khi nhận được đơn kháng cáo quá
      hạn, Tòa án cấp sơ thẩm phải gửi đơn kháng cáo, bản tường trình của người kháng cáo về lý do kháng cáo quá hạn và tài
      liệu, chứng cứ (nếu có) cho Tòa án cấp phúc thẩm.


      2. Trong thời hạn 10 ngày kể từ ngày nhận được đơn kháng cáo quá hạn và tài liệu, chứng cứ kèm theo do Tòa án cấp sơ
      thẩm chuyển đến, Tòa án cấp phúc thẩm thành lập Hội đồng gồm 03 Thẩm phán để xem xét kháng cáo quá hạn. Phiên họp xem
      xét kháng cáo quá hạn có sự tham gia của Kiểm sát viên Viện kiểm sát cùng cấp và người kháng cáo quá hạn. Trường hợp
      Kiểm sát viên, người kháng cáo quá hạn vắng mặt thì Tòa án vẫn tiến hành phiên họp.


      3. Căn cứ vào tài liệu, chứng cứ có liên quan đến việc kháng cáo quá hạn, ý kiến của đương sự kháng cáo quá hạn, đại
      diện Viện kiểm sát tại phiên họp, Hội đồng xét kháng cáo quá hạn quyết định theo đa số về việc chấp nhận hoặc không
      chấp nhận việc kháng cáo quá hạn và phải ghi rõ lý do của việc chấp nhận hoặc không chấp nhận trong quyết định. Tòa
      án cấp phúc thẩm phải gửi quyết định cho người kháng cáo quá hạn, Viện kiểm sát cùng cấp và Tòa án cấp sơ thẩm; nếu
      Tòa án cấp phúc thẩm chấp nhận việc kháng cáo quá hạn thì yêu cầu Tòa án cấp sơ thẩm tiến hành các thủ tục quy định
      tại các điều 209, 210 và 216 của Luật này.'
    - 'Kiểm toán môi trường


      1. Kiểm toán môi trường là việc xem xét, đánh giá có hệ thống, toàn diện hiệu quả quản lý môi trường, kiểm soát ô nhiễm
      của cơ sở sản xuất, kinh doanh, dịch vụ.


      2. Nội dung chính của kiểm toán môi trường đối với cơ sở sản xuất, kinh doanh, dịch vụ bao gồm:


      a) Việc sử dụng năng lượng, hóa chất, nguyên liệu, phế liệu nhập khẩu từ nước ngoài làm nguyên liệu sản xuất;


      b) Kiểm soát ô nhiễm và quản lý chất thải.


      3. Khuyến khích cơ sở sản xuất, kinh doanh, dịch vụ tự thực hiện kiểm toán môi trường.


      4. Bộ trưởng Bộ Tài nguyên và Môi trường hướng dẫn kỹ thuật hoạt động tự kiểm toán môi trường của cơ sở sản xuất, kinh
      doanh, dịch vụ.'
  - source_sentence: Công dân có quyền lựa chọn nghề nghiệp như thế nào?
    sentences:
    - 'Trách nhiệm báo cáo kết quả thực hiện quy hoạch, kế hoạch sử dụng đất

      1. Ủy ban nhân dân cấp huyện báo cáo kết quả thực hiện quy hoạch, kế hoạch sử dụng đất đến Ủy ban nhân dân cấp tỉnh
      trước ngày 15 tháng 10 hằng năm.

      2. Ủy ban nhân dân cấp tỉnh báo cáo kết quả thực hiện quy hoạch, kế hoạch sử dụng đất đến Bộ Tài nguyên và Môi trường
      trước ngày 15 tháng 10 của năm cuối thời kỳ quy hoạch, kỳ kế hoạch sử dụng đất.

      3. Bộ Quốc phòng báo cáo kết quả thực hiện quy hoạch sử dụng đất quốc phòng, Bộ Công an báo cáo kết quả thực hiện quy
      hoạch sử dụng đất an ninh đến Bộ Tài nguyên và Môi trường trước ngày 15 tháng 10 của năm cuối thời kỳ kế hoạch sử dụng
      đất 05 năm và năm cuối thời kỳ quy hoạch sử dụng đất.

      4. Bộ Tài nguyên và Môi trường tổng hợp kết quả thực hiện quy hoạch sử dụng đất của cả nước trình Chính phủ để báo cáo
      Quốc hội vào năm cuối của thời kỳ quy hoạch sử dụng đất.'
    - 'Trách nhiệm đánh giá viên chức


      1. Người đứng đầu đơn vị sự nghiệp công lập có trách nhiệm tổ chức việc đánh giá viên chức thuộc thẩm quyền quản lý.


      2. Căn cứ vào điều kiện cụ thể, người đứng đầu đơn vị sự nghiệp công lập thực hiện việc đánh giá hoặc phân công, phân
      cấp việc đánh giá viên chức thuộc thẩm quyền quản lý. Người được giao thẩm quyền đánh giá viên chức phải chịu trách
      nhiệm trước người đứng đầu đơn vị sự nghiệp công lập về kết quả đánh giá.


      3. Người có thẩm quyền bổ nhiệm chịu trách nhiệm đánh giá viên chức quản lý trong đơn vị sự nghiệp công lập.


      4. Chính phủ quy định chi tiết trình tự, thủ tục đánh giá viên chức quy định tại Điều này.'
    - '1. Công dân có quyền làm việc, lựa chọn nghề nghiệp, việc làm và nơi làm việc.


      2. Người làm công ăn lương được bảo đảm các điều kiện làm việc công bằng, an toàn; được hưởng lương, chế độ nghỉ
      ngơi.


      3. Nghiêm cấm phân biệt đối xử, cưỡng bức lao động, sử dụng nhân công dưới độ tuổi lao động tối thiểu.'
