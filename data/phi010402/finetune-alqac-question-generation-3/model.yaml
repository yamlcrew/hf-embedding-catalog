widgetData:
- source_sentence: "Khi vợ chồng thật sự tự nguyện ly hôn \nvà đã thỏa thuận về việc chia tài sản, \nviệc trông nom, nuôi\
    \ dưỡng, chăm sóc, \ngiáo dục con trên cơ sở đảm bảo quyền \nlợi chính đáng của vợ và con thì Tòa án \ngiải quyết việc\
    \ ly hôn, đúng hay sai ?"
  sentences:
  - 'Đánh giá điều kiện an ninh mạng đối với hệ thống thông tin quan trọng về an ninh quốc gia


    1. Đánh giá điều kiện về an ninh mạng là hoạt động xem xét sự đáp ứng về an ninh mạng của hệ thống thông tin trước khi
    đưa vào vận hành, sử dụng.


    2. Hệ thống thông tin quan trọng về an ninh quốc gia phải đáp ứng các điều kiện sau đây về:


    a) Quy định, quy trình và phương án bảo đảm an ninh mạng; nhân sự   vận hành, quản trị hệ thống;


    b) Bảo đảm an ninh mạng đối với trang thiết bị, phần cứng, phần mềm là thành phần hệ thống;


    c) Biện pháp kỹ thuật để giám sát, bảo vệ an ninh mạng; biện pháp bảo vệ hệ thống điều khiển và giám sát tự động, Internet
    vạn vật, hệ thống phức hợp thực - ảo, điện toán đám mây, hệ thống dữ liệu lớn, hệ thống dữ liệu nhanh,      hệ thống trí
    tuệ nhân tạo;


    d) Biện pháp bảo đảm an ninh vật lý bao gồm cách ly cô lập đặc biệt, chống rò rỉ dữ liệu, chống thu tin, kiểm soát ra
    vào.


    3. Thẩm quyền đánh giá điều kiện an ninh mạng đối với hệ thống thông tin quan trọng về an ninh quốc gia được quy định
    như sau:


    a) Lực lượng chuyên trách bảo vệ an ninh mạng thuộc Bộ Công an đánh giá, chứng nhận đủ điều kiện an ninh mạng đối với
    hệ thống thông tin quan trọng về an ninh quốc gia, trừ trường hợp quy định tại điểm b và điểm c khoản này;


    b) Lực lượng chuyên trách bảo vệ an ninh mạng thuộc Bộ Quốc phòng     đánh giá, chứng nhận đủ điều kiện an ninh mạng đối
    với hệ thống thông tin quân sự;


    c) Ban Cơ yếu Chính phủ đánh giá, chứng nhận đủ điều kiện an ninh mạng đối với hệ thống thông tin cơ yếu thuộc Ban Cơ
    yếu Chính phủ.


    4. Hệ thống thông tin quan trọng về an ninh quốc gia được đưa vào vận hành, sử dụng sau khi được chứng nhận đủ điều kiện
    an ninh mạng.


    5. Chính phủ quy định chi tiết khoản 2 Điều này.'
  - 'Sửa đổi, bổ sung, bãi bỏ một số điều của các luật có liên quan đến quản lý cư trú


    1. Sửa đổi, bổ sung khoản 1 Điều 9 của Luật Căn cước công dân số 59/2014/QH13 như sau:


    “1. Nội dung thông tin được thu thập, cập nhật gồm:


    a) Họ, chữ đệm và tên khai sinh;


    b) Ngày, tháng, năm sinh;


    c) Giới tính;


    d) Nơi đăng ký khai sinh;


    đ) Quê quán;


    e) Dân tộc;


    g) Tôn giáo;


    h) Quốc tịch;


    i) Tình trạng hôn nhân;


    k) Nơi thường trú;


    l) Nơi tạm trú;


    m) Tình trạng khai báo tạm vắng;


    n) Nơi ở hiện tại;


    o) Quan hệ với chủ hộ;


    p) Nhóm máu, khi công dân yêu cầu cập nhật và xuất trình kết luận về xét nghiệm xác định nhóm máu của người đó;


    q) Họ, chữ đệm và tên, số định danh cá nhân hoặc số Chứng minh nhân dân, quốc tịch của cha, mẹ, vợ, chồng hoặc người đại
    diện hợp pháp;


    r) Họ, chữ đệm và tên, số định danh cá nhân hoặc số Chứng minh nhân dân của chủ hộ và các thành viên hộ gia đình;


    s) Ngày, tháng, năm chết hoặc mất tích.”.


    2. Sửa đổi, bổ sung khoản 7 Điều 2 của Luật Bảo hiểm y tế số 25/2008/QH12 đã được sửa đổi, bổ sung một số điều theo Luật
    số 32/2013/QH13, Luật số 46/2014/QH13, Luật số 97/2015/QH13 và Luật số 35/2018/QH14 như sau:


    “7. Hộ gia đình tham gia bảo hiểm y tế (sau đây gọi chung là hộ gia đình) là những người cùng đăng ký thường trú hoặc
    cùng đăng ký tạm trú tại một chỗ ở hợp pháp theo quy định của pháp luật về cư trú.”.


    3. Bãi bỏ khoản 3 và khoản 4 Điều 19 của Luật Thủ đô số 25/2012/QH13.


    4. Bãi bỏ điểm b khoản 1 Điều 45 của Luật Lý lịch tư pháp số 28/2009/QH12.'
  - 'Thuận tình ly hôn

    Trong trường hợp vợ chồng cùng yêu cầu ly hôn, nếu xét thấy hai bên thật sự tự nguyện ly hôn và đã thỏa thuận về việc
    chia tài sản, việc trông nom, nuôi dưỡng, chăm sóc, giáo dục con trên cơ sở bảo đảm quyền lợi chính đáng của vợ và con
    thì Tòa án công nhận thuận tình ly hôn; nếu không thỏa thuận được hoặc có thỏa thuận nhưng không bảo đảm quyền lợi chính
    đáng của vợ và con thì Tòa án giải quyết việc ly hôn.'
- source_sentence: Một phụ nữ có thể kết hôn khi nào?
  sentences:
  - 'Điều kiện kết hôn

    1. Nam, nữ kết hôn với nhau phải tuân theo các điều kiện sau đây:


    a) Nam từ đủ 20 tuổi trở lên, nữ từ đủ 18 tuổi trở lên;


    b) Việc kết hôn do nam và nữ tự nguyện quyết định;


    c) Không bị mất năng lực hành vi dân sự;


    d) Việc kết hôn không thuộc một trong các trường hợp cấm kết hôn theo quy định tại các điểm a, b, c và d khoản 2 Điều
    5 của Luật này.


    2. Nhà nước không thừa nhận hôn nhân giữa những người cùng giới tính.'
  - 'Giải thích từ ngữ


    Trong Luật này, các từ ngữ dưới đây được hiểu như sau:


    1. An ninh mạng là sự bảo đảm hoạt động trên không gian mạng không gây phương hại đến an ninh quốc gia, trật tự, an toàn
    xã hội, quyền và lợi ích hợp pháp của cơ quan, tổ chức, cá nhân.


    2. Bảo vệ an ninh mạng là phòng ngừa, phát hiện, ngăn chặn, xử lý hành vi xâm phạm an ninh mạng.


    3. Không gian mạng là mạng lưới kết nối của cơ sở hạ tầng công nghệ thông tin, bao gồm mạng viễn thông, mạng Internet,
    mạng máy tính, hệ thống thông tin, hệ thống xử lý và điều khiển thông tin, cơ sở dữ liệu; là nơi con người thực hiện các
    hành vi xã hội không bị giới hạn bởi không gian và thời gian.


    4. Không gian mạng quốc gia là không gian mạng do Chính phủ xác lập, quản lý và kiểm soát.


    5. Cơ sở hạ tầng không gian mạng quốc gia là hệ thống cơ sở vật chất, kỹ thuật để tạo lập, truyền đưa, thu thập, xử lý,
    lưu trữ và trao đổi thông tin trên không gian mạng quốc gia, bao gồm:


    a) Hệ thống truyền dẫn bao gồm hệ thống truyền dẫn quốc gia, hệ thống truyền dẫn kết nối quốc tế, hệ thống vệ tinh, hệ
    thống truyền dẫn của doanh nghiệp cung cấp dịch vụ trên mạng viễn thông, mạng Internet, các dịch vụ gia tăng trên không
    gian mạng;


    b) Hệ thống các dịch vụ lõi bao gồm hệ thống phân luồng và điều hướng thông tin quốc gia, hệ thống phân giải tên miền
    quốc gia (DNS), hệ thống chứng thực quốc gia (PKI/CA) và hệ thống cung cấp dịch vụ kết nối, truy cập Internet của doanh
    nghiệp cung cấp dịch vụ trên mạng viễn thông, mạng Internet, các dịch vụ gia tăng trên không gian mạng;


    c) Dịch vụ, ứng dụng công nghệ thông tin bao gồm dịch vụ trực tuyến; ứng dụng công nghệ thông tin có kết nối mạng phục
    vụ quản lý, điều hành của cơ quan, tổ chức, tập đoàn kinh tế, tài chính quan trọng; cơ sở dữ liệu quốc gia.


    Dịch vụ trực tuyến bao gồm chính phủ điện tử, thương mại điện tử, trang thông tin điện tử, diễn đàn trực tuyến, mạng xã
    hội, blog;


    d) Cơ sở hạ tầng công nghệ thông tin của đô thị thông minh, Internet vạn vật, hệ thống phức hợp thực - ảo, điện toán đám
    mây, hệ thống dữ liệu lớn, hệ thống   dữ liệu nhanh và hệ thống trí tuệ nhân tạo.


    6. Cổng kết nối mạng quốc tế là nơi diễn ra hoạt động chuyển nhận        tín hiệu mạng qua lại giữa Việt Nam và các quốc
    gia, vùng lãnh thổ khác.


    7. Tội phạm mạng là hành vi sử dụng không gian mạng, công nghệ thông tin hoặc phương tiện điện tử để thực hiện tội phạm
    được quy định tại Bộ luật Hình sự.


    8. Tấn công mạng là hành vi sử dụng không gian mạng, công nghệ thông tin hoặc phương tiện điện tử để phá hoại, gây gián
    đoạn hoạt động của mạng viễn thông, mạng Internet, mạng máy tính, hệ thống thông tin, hệ thống xử lý và điều khiển thông
    tin, cơ sở dữ liệu, phương tiện điện tử.


    9. Khủng bố mạng là việc sử dụng không gian mạng, công nghệ thông tin hoặc phương tiện điện tử để thực hiện hành vi khủng
    bố, tài trợ khủng bố.


    10. Gián điệp mạng là hành vi cố ý vượt qua cảnh báo, mã truy cập,     mật mã, tường lửa, sử dụng quyền quản trị của người
    khác hoặc bằng phương thức khác để chiếm đoạt, thu thập trái phép thông tin, tài nguyên thông tin trên mạng viễn thông,
    mạng Internet, mạng máy tính, hệ thống thông tin, hệ thống xử lý và điều khiển thông tin, cơ sở dữ liệu, phương tiện điện
    tử của cơ quan, tổ chức, cá nhân.


    11. Tài khoản số là thông tin dùng để chứng thực, xác thực, phân quyền sử dụng các ứng dụng, dịch vụ trên không gian mạng.


    12. Nguy cơ đe dọa an ninh mạng là tình trạng không gian mạng xuất hiện dấu hiệu đe dọa xâm phạm an ninh quốc gia, gây
    tổn hại nghiêm trọng trật tự,  an toàn xã hội, quyền và lợi ích hợp pháp của cơ quan, tổ chức, cá nhân.


    13. Sự cố an ninh mạng là sự việc bất ngờ xảy ra trên không gian mạng xâm phạm an ninh quốc gia, trật tự, an toàn xã hội,
    quyền và lợi ích hợp pháp của cơ quan, tổ chức, cá nhân.


    14. Tình huống nguy hiểm về an ninh mạng là sự việc xảy ra trên không gian mạng khi có hành vi xâm phạm nghiêm trọng an
    ninh quốc gia, gây tổn hại đặc biệt nghiêm trọng trật tự, an toàn xã hội, quyền và lợi ích hợp pháp của      cơ quan,
    tổ chức, cá nhân.'
  - 'Trách nhiệm của cơ quan đăng ký cư trú


    1. Niêm yết công khai thủ tục hành chính; hướng dẫn cơ quan, tổ chức, cá nhân, hộ gia đình thực hiện các quy định của
    pháp luật về cư trú; công khai địa điểm, số điện thoại hoặc cách thức khác để tiếp nhận thông báo lưu trú, khai báo tạm
    vắng.


    2. Cập nhật thông tin về cư trú của công dân vào Cơ sở dữ liệu quốc gia về dân cư, Cơ sở dữ liệu về cư trú.


    3. Xác nhận thông tin về cư trú, thông báo về kết quả thực hiện các thủ tục đăng ký thường trú, đăng ký tạm trú, gia hạn
    tạm trú, khai báo thông tin, điều chỉnh thông tin về cư trú, tách hộ, khai báo tạm vắng dưới hình thức văn bản, tin nhắn
    điện tử hoặc hình thức khác theo quy định của Bộ trưởng Bộ Công an.


    4. Quản lý, lưu trữ hồ sơ, giấy tờ, tài liệu về đăng ký, quản lý cư trú và bảo mật thông tin về đăng ký cư trú của công
    dân.


    5. Giải quyết kiến nghị, khiếu nại, tố cáo của công dân liên quan đến cư trú, quản lý cư trú theo thẩm quyền.'
- source_sentence: Điều nào dưới đây là một trong những nội dung chính của báo cáo công tác bảo vệ môi trường?
  sentences:
  - 'Trổ cửa nhìn sang bất động sản liền kề


    1. Chủ sở hữu nhà chỉ được trổ cửa ra vào, cửa sổ quay sang nhà bên cạnh, nhà đối diện và đường đi chung theo quy định
    của pháp luật về xây dựng.


    2. Mặt dưới mái che trên cửa ra vào, mặt dưới mái che cửa sổ quay ra đường đi chung phải cách mặt đất từ 2,5 mét trở lên.'
  - 'Phân loại phim


    1. Phim được phân loại theo nội dung để phổ biến phù hợp với độ tuổi người xem hoặc không được phép phổ biến như sau:


    a) Loại P: Phim được phép phổ biến đến người xem ở mọi độ tuổi;


    b) Loại T18 (18+): Phim được phổ biến đến người xem từ đủ 18 tuổi trở lên;


    c) Loại T16 (16+): Phim được phổ biến đến người xem từ đủ 16 tuổi trở lên:


    d) Loại T13 (13+): Phim được phổ biến đến người xem từ đủ 13 tuổi trở lên;


    đ) Loại K: Phim được phổ biến đến người xem dưới 13 tuổi với điều kiện xem cùng cha, mẹ hoặc người giám hộ;


    e) Loại C: Phim không được phép phổ biến.


    2. Tiêu chí phân loại phim áp dụng chung cho các hình thức phổ biến phim do Bộ trưởng Bộ Văn hóa, Thể thao và Du lịch
    quy định.'
  - 'Báo cáo công tác bảo vệ môi trường


    1. Hằng năm, việc báo cáo công tác bảo vệ môi trường của năm trước đó được thực hiện theo quy định sau đây:


    a) Ủy ban nhân dân cấp huyện báo cáo Hội đồng nhân dân cùng cấp và Ủy ban nhân dân cấp tỉnh trước ngày 31 tháng 01;


    b) Ban quản lý khu công nghiệp, khu chế xuất, khu công nghệ cao, khu kinh tế báo cáo Ủy ban nhân dân cấp tỉnh trước ngày
    31 tháng 01;


    c) Ủy ban nhân dân cấp tỉnh báo cáo Hội đồng nhân dân cấp tỉnh và Bộ Tài nguyên và Môi trường trước ngày 15 tháng 02;


    d) Bộ, cơ quan ngang Bộ gửi báo cáo về tình hình thực hiện nhiệm vụ bảo vệ môi trường của Bộ, cơ quan ngang Bộ đến Bộ
    Tài nguyên và Môi trường trước ngày 15 tháng 02;


    đ) Bộ Tài nguyên và Môi trường xây dựng báo cáo về công tác bảo vệ môi trường trên phạm vi cả nước trình Chính phủ để
    báo cáo Quốc hội tại kỳ họp đầu tiên trong năm của Quốc hội.


    2. Nội dung chính của báo cáo công tác bảo vệ môi trường bao gồm:


    a) Hiện trạng và diễn biến chất lượng môi trường đất, nước, không khí; di sản thiên nhiên và đa dạng sinh học;


    b) Bối cảnh chung kinh tế - xã hội và các tác động đến môi trường;


    c) Kết quả hoạt động bảo vệ môi trường gồm kiểm soát nguồn ô nhiễm; quản lý chất thải rắn, chất thải nguy hại; quản lý
    chất lượng môi trường đất, nước, không khí; xử lý ô nhiễm, cải thiện chất lượng môi trường; phòng ngừa, ứng phó sự cố
    môi trường; bảo vệ môi trường di sản thiên nhiên, đa dạng sinh học;


    d) Hệ thống quan trắc và cảnh báo về môi trường;


    đ) Xây dựng chính sách, pháp luật, giải quyết thủ tục hành chính, giám sát, kiểm tra, thanh tra, xử lý vi phạm pháp luật,
    giải quyết khiếu nại, tố cáo về môi trường;


    e) Điều kiện và nguồn lực về bảo vệ môi trường;


    g) Kết quả thực hiện các chỉ tiêu thống kê về môi trường;


    h) Đánh giá chung;


    i) Phương hướng, nhiệm vụ và giải pháp bảo vệ môi trường thời gian tới.


    3. Kỳ báo cáo công tác bảo vệ môi trường tính từ ngày 01 tháng 01 đến hết ngày 31 tháng 12 của năm báo cáo.


    4. Báo cáo công tác bảo vệ môi trường được gửi bằng bản giấy hoặc bản điện tử theo quy định của pháp luật.


    5. Bộ trưởng Bộ Tài nguyên và Môi trường hướng dẫn việc xây dựng báo cáo công tác bảo vệ môi trường; hướng dẫn, tổ chức
    đánh giá kết quả công tác bảo vệ môi trường của các Bộ, cơ quan ngang Bộ, Ủy ban nhân dân cấp tỉnh.'
- source_sentence: Tại phiên tòa phúc thẩm, đương sự, người bảo vệ quyền và lợi ích hợp pháp của đương sự chỉ được tranh luận
    về những vấn đề thuộc phạm vi xét xử phúc thẩm và đã được hỏi tại phiên tòa phúc thẩm, đúng hay sai?
  sentences:
  - 'Giải thích từ ngữ


    Trong Luật này, các từ ngữ dưới đây được hiểu như sau;


    1. Chất ma túy là chất gây nghiện, chất hướng thần được quy định trong danh mục chất ma túy do Chính phủ ban hành.


    2. Chất gây nghiện là chất kích thích hoặc ức chế thần kinh, dễ gây tình trạng nghiện đối với người sử dụng.


    3. Chất hướng thần là chất kích thích hoặc ức chế thần kinh hoặc gây ảo giác, nếu sử dụng nhiều lần có thể dẫn tới tình
    trạng nghiện đối với người sử dụng.


    4. Tiền chất là hóa chất không thể thiếu được trong quá trình điều chế, sản xuất chất ma túy được quy định trong danh
    mục tiền chất do Chính phủ ban hành.


    5. Thuốc thú y có chứa chất ma túy, tiền chất là thuốc thú y có chứa các chất được quy định tại các khoản 2, 3 và 4 của
    Điều này.


    6. Cây có chứa chất ma túy là cây thuốc phiện, cây côca, cây cần sa và các loại cây khác có chứa chất ma túy do Chính
    phủ quy định.


    7. Phòng, chống ma túy là phòng ngừa, ngăn chặn, đấu tranh chống tội phạm và tệ nạn ma túy; kiểm soát các hoạt động hợp
    pháp liên quan đến ma túy.


    8. Tệ nạn ma túy là việc sử dụng trái phép chất ma túy, nghiện ma túy và các hành vi vi phạm pháp luật về ma túy mà chưa
    đến mức hoặc không bị truy cứu trách nhiệm hình sự.


    9. Kiểm soát các hoạt động hợp pháp liên quan đến ma túy là việc cho phép, theo dõi, kiểm tra, giám sát các hoạt động
    hợp pháp liên quan đến ma túy và phòng ngừa, ngăn chặn việc lợi dụng các hoạt động đó vào mục đích khác.


    10. Người sử dụng trái phép chất ma túy là người có hành vi sử dụng chất ma túy mà không được sự cho phép của người hoặc
    cơ quan chuyên môn có thẩm quyền và xét nghiệm chất ma túy trong cơ thể có kết quả dương tính.


    11. Xét nghiệm chất ma túy trong cơ thể là việc thực hiện các kỹ thuật chuyên môn nhằm xác định chất ma túy trong cơ thể
    thông qua mẫu nước tiểu, mẫu máu hoặc các mẫu vật khác của cơ thể người.


    12. Người nghiện ma túy là người sử dụng chất ma túy, thuốc gây nghiện, thuốc hướng thần và bị lệ thuộc vào các chất này.


    13. Cai nghiện ma túy là quá trình thực hiện các hoạt động hỗ trợ về y tế, tâm lý, xã hội, giúp người nghiện ma túy dừng
    sử dụng chất ma túy, thuốc gây nghiện, thuốc hướng thần, phục hồi thể chất, tinh thần, nâng cao nhận thức, thay đổi hành
    vi để chấm dứt việc sử dụng trái phép các chất này.


    14. Cơ sở cai nghiện ma túy là cơ sở được thành lập để thực hiện đầy đủ quy trình cai nghiện theo quy định của Luật này,
    bao gồm cơ sở cai nghiện ma túy công lập và cơ sở cai nghiện ma túy tự nguyện.'
  - 'Thông tin công dân được tiếp cận có điều kiện


    1. Thông tin liên quan đến bí mật kinh doanh được tiếp cận trong trường hợp chủ sở hữu bí mật kinh doanh đó đồng ý.


    2. Thông tin liên quan đến bí mật đời sống riêng tư, bí mật cá nhân được tiếp cận trong trường hợp được người đó đồng
    ý; thông tin liên quan đến bí mật gia đình được tiếp cận trong trường hợp được các thành viên gia đình đồng ý.


    3. Trong quá trình thực hiện chức năng, nhiệm vụ, quyền hạn của mình, người đứng đầu cơ quan nhà nước quyết định việc
    cung cấp thông tin liên quan đến bí mật kinh doanh, đời sống riêng tư, bí mật cá nhân, bí mật gia đình trong trường hợp
    cần thiết vì lợi ích công cộng, sức khỏe của cộng đồng theo quy định của luật có liên quan mà không cần có sự đồng ý theo
    quy định tại khoản 1 và khoản 2 Điều này.'
  - 'Tranh luận tại phiên tòa phúc thẩm


    1. Tại phiên tòa phúc thẩm, đương sự, người bảo vệ quyền và lợi ích hợp pháp của đương sự chỉ được tranh luận về những
    vấn đề thuộc phạm vi xét xử phúc thẩm và đã được hỏi tại phiên tòa phúc thẩm.


    2. Trình tự phát biểu khi tranh luận được thực hiện như sau:


    a) Người bảo vệ quyền và lợi ích hợp pháp của người kháng cáo trình bày. Người kháng cáo có quyền bổ sung ý kiến;


    b) Người bảo vệ quyền và lợi ích hợp pháp của đương sự tranh luận, đối đáp. Đương sự có quyền bổ sung ý kiến;


    c) Các đương sự đối đáp theo sự điều khiển của Chủ tọa phiên tòa;


    d) Khi xét thấy cần thiết, Hội đồng xét xử có thể yêu cầu các bên đương sự tranh luận bổ sung về những vấn đề cụ thể để
    làm căn cứ giải quyết vụ án.


    3. Trình tự tranh luận đối với kháng nghị của Viện kiểm sát được thực hiện như sau:


    a) Người bảo vệ quyền và lợi ích hợp pháp của đương sự phát biểu về tính hợp pháp, tính có căn cứ đối với kháng nghị của
    Viện kiểm sát. Đương sự có quyền bổ sung ý kiến;


    b) Kiểm sát viên phát biểu ý kiến về những vấn đề mà người bảo vệ quyền và lợi ích hợp pháp của đương sự, đương sự đã
    nêu.


    4. Trường hợp đương sự không có người bảo vệ quyền và lợi ích hợp pháp của mình thì họ tự mình tranh luận.


    5. Trường hợp vắng mặt một trong các bên đương sự và người tham gia tố tụng khác thì Chủ tọa phiên tòa phải công bố lời
    khai của họ để trên cơ sở đó các đương sự có mặt tại phiên tòa tranh luận và đối đáp.'
- source_sentence: Người có khó khăn trong nhận thức, làm chủ hành vi phải tự thực hiện yêu cầu cung cấp thông tin, đúng hay
    sai?
  sentences:
  - 'Cai nghiện ma túy cho người từ đủ 12 tuổi đến dưới 18 tuổi


    1. Người nghiện ma túy từ đủ 12 tuổi đến dưới 18 tuổi bị đưa vào cơ sở cai nghiện bắt buộc khi thuộc một trong các trường
    hợp sau đây:


    a) Không đăng ký, không thực hiện hoặc tự ý chấm dứt cai nghiện ma túy tự nguyện;


    b) Trong thời gian cai nghiện ma túy tự nguyện bị phát hiện sử dụng trái phép chất ma túy;


    c) Người nghiện ma túy các chất dạng thuốc phiện không đăng ký, không thực hiện hoặc tự ý chấm dứt điều trị nghiện các
    chất dạng thuốc phiện bằng thuốc thay thế hoặc bị chấm dứt điều trị nghiện các chất dạng thuốc phiện bằng thuốc thay thế
    do vi phạm quy định về điều trị nghiện.


    2. Người nghiện ma túy từ đủ 12 tuổi đến dưới 18 tuổi bị đưa vào cơ sở cai nghiện bắt buộc có trách nhiệm sau đây:


    a) Tuân thủ các quy định về cai nghiện ma túy bắt buộc, nội quy, quy chế và chịu sự quản lý, giáo dục, điều trị của cơ
    sở cai nghiện bắt buộc;


    b) Tham gia các hoạt động điều trị, chữa bệnh, giáo dục, tư vấn, học văn hóa, học nghề, lao động trị liệu và các hoạt
    động phục hồi hành vi, nhân cách.


    3. Thời hạn cai nghiện ma túy bắt buộc đối với người nghiện ma túy từ đủ 12 tuổi đến dưới 18 tuổi là từ đủ 06 tháng đến
    12 tháng.


    4. Việc đưa người nghiện ma túy từ đủ 12 tuổi đến dưới 18 tuổi vào cơ sở cai nghiện bắt buộc do Tòa án nhân dân cấp huyện
    quyết định và không phải là biện pháp xử lý hành chính.


    5. Ủy ban Thường vụ Quốc hội quy định trình tự, thủ tục Tòa án nhân dân xem xét, quyết định việc đưa người nghiện ma túy
    từ đủ 12 tuổi đến dưới 18 tuổi vào cơ sở cai nghiện bắt buộc.'
  - 'Chủ thể thực hiện quyền tiếp cận thông tin


    1. Công dân thực hiện quyền tiếp cận thông tin theo quy định của Luật này.


    2. Người mất năng lực hành vi dân sự thực hiện yêu cầu cung cấp thông tin thông qua người đại diện theo pháp luật.


    Người có khó khăn trong nhận thức, làm chủ hành vi thực hiện yêu cầu cung cấp thông tin thông qua người giám hộ.


    3. Người dưới 18 tuổi yêu cầu cung cấp thông tin thông qua người đại diện theo pháp luật, trừ trường hợp luật về trẻ em
    và luật khác có quy định khác.'
  - 'Tình nghĩa vợ chồng

    1. Vợ chồng có nghĩa vụ thương yêu, chung thủy, tôn trọng, quan tâm, chăm sóc, giúp đỡ nhau; cùng nhau chia sẻ, thực hiện
    các công việc trong gia đình.


    2. Vợ chồng có nghĩa vụ sống chung với nhau, trừ trường hợp vợ chồng có thỏa thuận khác hoặc do yêu cầu của nghề nghiệp,
    công tác, học tập, tham gia các hoạt động chính trị, kinh tế, văn hóa, xã hội và lý do chính đáng khác.'
