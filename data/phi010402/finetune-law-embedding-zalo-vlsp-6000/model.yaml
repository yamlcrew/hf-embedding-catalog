  widget:
  - source_sentence: Đấu thầu hạn chế trong lựa chọn nhà cung cấp thuốc được quy định như thế nào?
    sentences:
    - '1. Đấu thầu hạn chế được áp dụng trong trường hợp mua thuốc phải kiểm soát đặc biệt thuộc danh mục do Bộ Y tế ban hành
      và thuốc có tính đặc thù mà chỉ có một số nhà thầu đáp ứng được yêu cầu của gói thầu.

      2. Các nhà sản xuất, nhà cung cấp thuốc đã được Bộ Y tế sơ tuyển lựa chọn vào danh sách các nhà sản xuất, nhà cung cấp
      thuốc đáp ứng yêu cầu về năng lực, kinh nghiệm và uy tín theo quy định tại điểm đ Khoản 1 Điều 77 Nghị định số 63/2014/NĐ-CP
      được mời tham gia vào quá trình đấu thầu hạn chế nếu có thuốc phù hợp với gói thầu.'
    - '1. Trách nhiệm của Hội đồng nhân dân cấp tỉnh

      a) Ban hành quy định cụ thể mức hỗ trợ của từng chính sách theo khả năng cân đối của ngân sách và bố trí kinh phí hàng
      năm để thực hiện các chính sách theo quy định của Nghị định này;

      b) Ban hành chính sách hỗ trợ đặc thù khác ngoài các chính sách đã quy định tại Nghị định này để hỗ trợ phát triển thủy
      lợi nhỏ, thủy lợi nội đồng và tưới tiên tiến, tiết kiệm nước.

      2. Trách nhiệm của Ủy ban nhân dân cấp tỉnh

      a) Trình Hội đồng nhân dân cấp tỉnh quy định cụ thể mức hỗ trợ của từng chính sách trên cơ sở điều kiện thực tế của
      địa phương. Chỉ đạo, tổ chức triển khai thực hiện theo quy định;

      b) Căn cứ nhu cầu thực tế và khả năng ngân sách của địa phương, xây dựng trình Hội đồng nhân dân cấp tỉnh ban hành chính
      sách hỗ trợ đặc thù khác ngoài các chính sách đã quy định tại Nghị định này;

      c) Ban hành thiết kế mẫu, thiết kế điển hình công trình thủy lợi nhỏ, thủy lợi nội đồng, tưới tiên tiến, tiết kiệm nước
      phù hợp với đặc thù từng vùng, miền trong tỉnh;

      d) Đối với các dự án thực hiện theo hình thức ngân sách nhà nước hỗ trợ vật liệu xây dựng, Ủy ban nhân dân cấp tỉnh
      quy định cụ thể việc quản lý, thanh quyết toán phần vốn ngân sách nhà nước hỗ trợ cho phù hợp với điều kiện thực tế
      của địa phương;

      đ) Kiểm tra, giám sát đầu tư, khai thác công trình thủy lợi, thủy lợi nội đồng và sử dụng kinh phí hỗ trợ của ngân sách;

      e) Báo cáo đánh giá tình hình thực hiện Nghị định gửi Bộ Nông nghiệp và Phát triển nông thôn trước ngày 31 tháng 3 hàng
      năm.'
    - '1. Thẩm quyền của thủ trưởng đơn vị có tư cách pháp nhân thuộc các đơn vị quy định tại điểm a, điểm b, điểm c, điểm
      đ khoản 1 Điều 2 Thông tư này: Công nhận danh hiệu “Lao động tiên tiến”, “Chiến sĩ thi đua cơ sở”, “Tập thể lao động
      tiên tiến” cho tập thể, cá nhân thuộc thẩm quyền quản lý trực tiếp.

      2. Thẩm quyền của thủ trưởng đơn vị có tư cách pháp nhân quy định tại điểm a, điểm b, điểm c khoản 1 Điều 2 Thông tư
      này:

      a) Công nhận danh hiệu “Tập thể lao động tiên tiến” cho các đơn vị thuộc thẩm quyền quản lý trực tiếp; công nhận danh
      hiệu “Lao động tiên tiến”, “Chiến sĩ thi đua cơ sở” cho cá nhân của các đơn vị không có tư cách pháp nhân thuộc thẩm
      quyền quản lý trực tiếp;

      b) Trình Bộ trưởng Bộ Giáo dục và Đào tạo xét, quyết định tặng “Tập thể lao động xuất sắc”, “Cờ thi đua của Bộ Giáo
      dục và Đào tạo”, “Chiến sĩ thi đua cấp Bộ”, Bằng khen của Bộ trưởng, Kỷ niệm chương theo quy định; trình Bộ trưởng xét,
      trình cấp có thẩm quyền xét, khen thưởng cấp nhà nước theo quy định.

      3. Thẩm quyền của thủ trưởng đơn vị có tư cách pháp nhân quy định tại điểm a, điểm b khoản 1 Điều 2 Thông tư này: Trình
      Bộ trưởng Bộ Giáo dục và Đào tạo xét, quyết định tặng danh hiệu “Tập thể lao động tiên tiến” cho đơn vị mình.

      4. Thẩm quyền của thủ trưởng đơn vị không có tư cách pháp nhân thuộc Cơ quan Bộ: Trình Bộ trưởng Bộ Giáo dục và Đào
      tạo xét, quyết định “Tập thể lao động tiên tiến”, “Tập thể lao động xuất sắc”, “Cờ thi đua của Bộ Giáo dục và Đào tạo”,
      “Lao động tiên tiến”, “Chiến sĩ thi đua cơ sở”, “Chiến sĩ thi đua cấp Bộ”, Bằng khen của Bộ trưởng, Kỷ niệm chương theo
      quy định.

      5. Thẩm quyền của Bộ trưởng Bộ Giáo dục và Đào tạo

      a) Đối với các đơn vị quy định tại điểm a, điểm b, điểm c, điểm đ, điểm e khoản 1 Điều 2 Thông tư này: Quyết định xét
      tặng danh hiệu thi đua thuộc thẩm quyền; quyết định tặng Bằng khen của Bộ trưởng; tặng Kỷ niệm chương; trình cấp có
      thẩm quyền xét, khen thưởng cấp nhà nước theo quy định;

      b) Đối với các đơn vị quy định tại điểm d, điểm g, điểm h khoản 1 Điều 2 Thông tư này: Quyết định tặng Cờ thi đua, tặng
      Bằng khen, tặng Kỷ niệm chương theo các quy định tại Điều 4, Điều 5, Điều 6 Thông tư này; hiệp y khen thưởng theo quy
      định.

      6. Giám đốc Sở Giáo dục và Đào tạo đề nghị Bộ trưởng Bộ Giáo dục và Đào tạo xét quyết định khen thưởng cho tập thể,
      cá nhân thuộc phạm vi quản lý.

      7. Người đứng đầu Ủy ban nhân dân cấp tỉnh, Bộ đề nghị Bộ trưởng Bộ Giáo dục và Đào tạo xét, quyết định khen thưởng
      cho tập thể, cá nhân của các trường thuộc tỉnh, Bộ.'
  - source_sentence: Quy mô hội chợ, triển lãm quốc tế tại Việt Nam cho sản phẩm của doanh nghiệp nước ngoài có nhu cầu nhập
      khẩu từ Việt Nam được quy định như thế nào ạ?
    sentences:
    - '1. Người đứng đầu cơ quan cung cấp thông tin bảo đảm các biện pháp kỹ thuật nhằm ứng dụng công nghệ thông tin trong
      việc cung cấp thông tin; tổ chức số hóa, sử dụng kỹ thuật công nghệ thông tin trong quản lý tài liệu điện tử, quản lý
      thông tin, theo dõi việc cung cấp thông tin thông qua Sổ theo dõi cung cấp thông tin theo yêu cầu dưới dạng bản giấy
      hoặc bản điện tử để đảm bảo cung cấp thông tin cho công dân thuận lợi, kịp thời, dễ dàng tra cứu.

      2. Tùy theo tình hình thực tế, chữ ký số có thể được sử dụng trong các trường hợp thông báo từ chối, gia hạn, thông
      báo về việc giải quyết yêu cầu tiếp cận thông tin trong trường hợp có yêu cầu cung cấp thông tin của công dân thông
      qua mạng điện tử.'
    - '1. Trong thời hạn 10 ngày làm việc, kể từ ngày nhận được Quyết định cho nhập quốc tịch Việt Nam, Bộ Tư pháp gửi văn
      bản thông báo kèm bản sao Quyết định cho nhập quốc tịch Việt Nam cho Ủy ban nhân dân cấp tỉnh nơi thụ lý hồ sơ, để tổ
      chức lễ trao Quyết định cho nhập quốc tịch Việt Nam.

      Việc trao Quyết định cho nhập quốc tịch Việt Nam được thực hiện theo quy định tại Điều 12 của Nghị định này.

      2. Việc thông báo Quyết định cho trở lại, cho thôi, tước quốc tịch, hủy bỏ quyết định cho nhập quốc tịch Việt Nam được
      thực hiện như sau:

      Trong thời hạn 10 ngày làm việc, kể từ ngày nhận được Quyết định cho trở lại, cho thôi, tước quốc tịch, hủy bỏ quyết
      định cho nhập quốc tịch Việt Nam, Bộ Tư pháp gửi thông báo kèm bản sao Quyết định cho người được trở lại, thôi quốc
      tịch, bị tước quốc tịch, bị hủy bỏ Quyết định cho nhập quốc tịch Việt Nam, đồng thời gửi cho Ủy ban nhân dân cấp tỉnh
      nơi thụ lý hồ sơ để theo dõi, quản lý, thống kê các việc đã giải quyết về quốc tịch.

      Trường hợp hồ sơ xin trở lại, xin thôi, tước quốc tịch Việt Nam được thụ lý tại Cơ quan đại diện, thì sau khi nhận được
      thông báo của Bộ Tư pháp, Cơ quan đại diện có trách nhiệm thông báo cho người được thôi, trở lại quốc tịch, bị tước
      quốc tịch Việt Nam kết quả giải quyết việc quốc tịch tương ứng. Cơ quan đại diện thu hồi Hộ chiếu Việt Nam, Chứng minh
      nhân dân, Căn cước công dân của người được thôi quốc tịch, bị tước quốc tịch Việt Nam theo quy định của pháp luật có
      liên quan.

      3. Người được thôi quốc tịch, bị tước quốc tịch, bị hủy bỏ quyết định cho nhập quốc tịch Việt Nam có trách nhiệm phối
      hợp với cơ quan Công an để làm thủ tục xóa đăng ký thường trú, nộp lại Hộ chiếu Việt Nam, Chứng minh nhân dân, Căn cước
      công dân theo quy định của pháp luật có liên quan.

      4. Người được nhập, được trở lại quốc tịch Việt Nam, nếu có yêu cầu thì được đăng ký cư trú, cấp Hộ chiếu Việt Nam,
      Chứng minh nhân dân, Căn cước công dân theo quy định của pháp luật có liên quan.'
    - '1. Nội dung thực hiện

      a) Tuyên truyền, quảng bá:

      - Tuyên truyền, quảng bá trên các phương tiện truyền thông;

      - Tổ chức giới thiệu, thông tin về hội chợ, triển lãm.

      b) Tổ chức, dàn dựng gian hàng:

      -  Thiết kế tổng thể và chi tiết;

      -  Dàn dựng gian hàng;

      -  Trang trí chung.

      c) Mặt bằng tổ chức hội chợ, triển lãm;

      d) Dịch vụ: điện, nước, vệ sinh, môi trường, an ninh, bảo vệ, phòng cháy chữa cháy, y tế, internet;

      đ) Lễ khai mạc và các sự kiện liên quan trong khuôn khổ hội chợ, triển lãm;

      e) Các hoạt động tổ chức, quản lý hội chợ, triển lãm.

      2. Quy mô: Hội chợ, triển lãm có quy mô tối thiểu 60 gian hàng quy theo gian hàng tiêu chuẩn (3m x 3m), trong đó tối
      thiểu 15 gian hàng của doanh nghiệp nước ngoài có nhu cầu nhập khẩu.

      3. Nội dung hỗ trợ: Hỗ trợ tối đa 100% kinh phí thực hiện các nội dung quy định tại khoản 1 Điều này.'
  - source_sentence: Nhiệm vụ của chỉ huy trưởng chỉ huy quân sự bộ, ngành trung ương trong công tác quốc phòng được quy định
      như thế nào?
    sentences:
    - 'Các trường hợp được miễn lệ phí môn bài thực hiện theo quy định tại Điều 3 Nghị định số 139/2016/NĐ-CP ngày 04/10/2016
      của Chính phủ quy định về lệ phí môn bài. Riêng các trường hợp miễn lệ phí môn bài quy định tại khoản 1, khoản 2 Điều
      3 Nghị định số 139/2016/NĐ-CP xác định như sau:

      1. Cá nhân, nhóm cá nhân, hộ gia đình hoạt động sản xuất, kinh doanh có doanh thu hàng năm từ 100 triệu đồng trở xuống.
      Mức doanh thu từ 100 triệu đồng/năm trở xuống để xác định cá nhân, nhóm cá nhân, hộ gia đình được miễn lệ phí môn bài
      là tổng doanh thu tính thuế thu nhập cá nhân theo quy định của pháp luật về thuế thu nhập cá nhân.

      2. Cá nhân, nhóm cá nhân, hộ gia đình hoạt động sản xuất, kinh doanh không thường xuyên; không có địa điểm kinh doanh
      cố định.

      Kinh doanh không thường xuyên; không có địa điểm kinh doanh cố định thực hiện theo hướng dẫn tại điểm a khoản 1 Điều
      3 Thông tư số 92/2015/TT-BTC ngày 15/6/2015 của Bộ Tài chính hướng dẫn thực hiện thuế giá trị gia tăng và thuế thu nhập
      cá nhân đối với cá nhân cư trú có hoạt động kinh doanh; hướng dẫn thực hiện một số nội dung sửa đổi, bổ sung về thuế
      thu nhập cá nhân quy định tại Luật sửa đổi, bổ sung một số điều của các Luật về thuế số 71/2014/QH13 và Nghị định số
      12/2015/NĐ-CP ngày 12/02/2015 của Chính phủ quy định chi tiết thi hành Luật sửa đổi, bổ sung một số điều của các Luật
      về thuế và sửa đổi, bổ sung một số điều của các Nghị định về thuế.

      Cá nhân, nhóm cá nhân, hộ gia đình không có địa điểm kinh doanh cố định hướng dẫn tại khoản này bao gồm cả trường hợp
      cá nhân là xã viên hợp tác xã và hợp tác xã đã nộp lệ phí môn bài theo quy định đối với hợp tác xã; cá nhân trực tiếp
      ký hợp đồng làm đại lý xổ số, đại lý bảo hiểm, đại lý bán đúng giá thực hiện khấu trừ thuế tại nguồn; cá nhân hợp tác
      kinh doanh với tổ chức theo quy định của pháp luật về thuế thu nhập cá nhân.'
    - '1. Chức trách

      a) Tham mưu với ban cán sự đảng, đảng đoàn, cấp ủy đảng, người đứng đầu bộ, ngành (trường hợp chỉ huy trưởng là cấp
      phó của người đứng đầu) về công tác quốc phòng;

      b) Thực hiện sự chỉ đạo, hướng dẫn của Bộ Quốc phòng về công tác quốc phòng;

      c) Chỉ đạo, hướng dẫn và tổ chức thực hiện công tác quốc phòng ở bộ, ngành mình.

      2. Nhiệm vụ

      a) Chủ trì, phối hợp với cơ quan, tổ chức liên quan tham mưu với ban cán sự đảng, đảng đoàn, cấp ủy đảng, người đứng
      đầu bộ, ngành Trung ương lãnh đạo, chỉ đạo, quản lý, điều hành, hướng dẫn và tổ chức thực hiện nhiệm vụ quốc phòng theo
      quy định của Luật Quốc phòng và Nghị định số 168/2018/NĐ-CP ngày 28 tháng 12 năm 2018 của Chính phủ về công tác quốc
      phòng ở bộ, ngành trung ương, địa phương (sau đây viết gọn là Nghị định số 168/2018/NĐ-CP), cụ thể:

      - Ban hành hoặc trình cấp có thẩm quyền ban hành văn bản quy phạm pháp luật, chỉ thị, nghị quyết, chương trình, đề án,
      kế hoạch để lãnh đạo, chỉ đạo, hướng dẫn và tổ chức thực hiện nhiệm vụ quốc phòng theo quy định của pháp luật;

      - Thực hiện chiến lược, quy hoạch, kế hoạch, đề án về quốc phòng theo nhiệm vụ được giao; việc kết hợp phát triển kinh
      tế - xã hội, an ninh, đối ngoại với quốc phòng; thực hiện phòng thủ dân sự;

      - Phối hợp xây dựng nền quốc phòng toàn dân, thế trận quốc phòng toàn dân gắn với nền an ninh nhân dân, thế trận an
      ninh nhân dân, lực lượng vũ trang nhân dân, phòng thủ quân khu, khu vực phòng thủ; công nghiệp quốc phòng, an ninh theo
      quy định của pháp luật;

      - Chuẩn bị các điều kiện cần thiết bảo đảm động viên quốc phòng theo quy định của pháp luật; thực hiện lệnh, quyết định,
      biện pháp trong giới nghiêm, thiết quân luật, tình trạng khẩn cấp về quốc phòng, tình trạng chiến tranh, động viên cục
      bộ, tổng động viên, đáp ứng yêu cầu chiến đấu và phục vụ chiến đấu; sẵn sàng bảo vệ Tổ quốc;

      - Thực hiện chế độ, chính sách đối với lực lượng vũ trang nhân dân, thân nhân của người phục vụ trong lực lượng vũ trang
      nhân dân; chính sách hậu phương quân đội, chính sách ưu đãi người có công với cách mạng theo quy định của pháp luật;

      - Thực hiện nhiệm vụ bảo đảm nhu cầu dự trữ quốc gia cho quốc phòng theo quyết định của cấp có thẩm quyền giao;

      - Đề nghị bố trí sĩ quan Quân đội biệt phái làm công tác quốc phòng phù hợp chức năng, nhiệm vụ, quyền hạn, cơ cấu tổ
      chức và yêu cầu, nhiệm vụ quốc phòng của bộ, ngành mình;

      - Phối hợp với Bộ Quốc phòng, Bộ Công an, cơ quan, tổ chức, địa phương liên quan xây dựng cơ sở vật chất, kỹ thuật,
      phát triển công nghiệp quốc phòng, an ninh, khoa học, công nghệ quân sự; huy động tiềm lực khoa học, công nghệ của cơ
      quan, tổ chức mình để phục vụ nhiệm vụ quốc phòng;

      - Thanh tra, kiểm tra, sơ kết, tổng kết, báo cáo; thực hiện công tác thi đua, khen thưởng; giải quyết khiếu nại, tố
      cáo, xử lý vi phạm về công tác quốc phòng theo quy định của pháp luật;

      b) Chủ trì, phối hợp với cơ quan, tổ chức liên quan để chỉ đạo, hướng dẫn và tổ chức thực hiện các nhiệm vụ sau:

      - Ban hành hoặc trình cấp có thẩm quyền các chương trình, kế hoạch, hướng dẫn và tổ chức thực hiện nhiệm vụ quốc phòng;

      - Tuyên truyền, phổ biến quan điểm, đường lối, chủ trương của Đảng, chính sách, pháp luật của Nhà nước về quốc phòng;
      thực hiện giáo dục quốc phòng và an ninh theo quy định của pháp luật;

      - Xây dựng kế hoạch và huy động lực lượng dự bị động viên; động viên nguồn lực của bộ, ngành Trung ương bảo đảm cho
      quốc phòng; động viên bảo đảm nhu cầu quốc phòng năm đầu chiến tranh; động viên công nghiệp; chuyển tổ chức, hoạt động
      của bộ, ngành Trung ương từ thời bình sang thời chiến;

      - Xây dựng, kiện toàn tổ chức và hoạt động ban chỉ huy quân sự bộ, ngành Trung ương và cơ quan, tổ chức thuộc bộ, ngành
      quản lý;

      - Chỉ đạo, hướng dẫn ban chỉ huy quân sự cơ quan, tổ chức, đơn vị thuộc bộ, ngành quản lý thực hiện công tác dân quân
      tự vệ, giáo dục quốc phòng và an ninh, tuyển chọn và gọi công dân nhập ngũ;

      - Chỉ đạo, hướng dẫn ban chỉ huy quân sự cơ quan, tổ chức thuộc bộ, ngành quản lý phối hợp với cơ quan, tổ chức, địa
      phương liên quan tham gia xây dựng hệ thống chính trị, xây dựng khối đại đoàn kết toàn dân, xây dựng cơ sở vững mạnh
      toàn diện, xây dựng nền quốc phòng toàn dân, phòng thủ quân khu, khu vực phòng thủ;

      - Chỉ đạo, hướng dẫn thực hiện nhiệm vụ phòng thủ dân sự;

      - Hằng năm thực hiện lập dự toán, chấp hành và quyết toán ngân sách bảo đảm thực hiện nhiệm vụ quốc phòng;

      - Phối hợp với chính trị viên tiến hành công tác tuyên tuyền, giáo dục trong thực hiện công tác quốc phòng;

      - Chỉ đạo và tổ chức thực hiện nhiệm vụ khác về quốc phòng theo quy định của pháp luật và cấp có thẩm quyền giao.

      3. Mối quan hệ công tác

      a) Đối với ban cán sự đảng, đảng đoàn, cấp ủy đảng, người đứng đầu bộ, ngành Trung ương (trường hợp chỉ huy trưởng là
      cấp phó của người đứng đầu): Chịu sự lãnh đạo, chỉ đạo, quản lý, điều hành về công tác quốc phòng;

      b) Đối với Bộ Quốc phòng: Chịu sự chỉ đạo, hướng dẫn về công tác quốc phòng;

      c) Đối với Bộ Tư lệnh quân khu, Bộ Tư lệnh Thủ đô Hà Nội, Bộ Tư lệnh quân chủng, binh chủng, Bộ đội Biên phòng, Cảnh
      sát biển và cơ quan quân sự địa phương các cấp: Phối hợp chỉ đạo, hướng dẫn cơ quan, tổ chức, đơn vị thuộc bộ, ngành
      quản lý thực hiện công tác quốc phòng;

      d) Đối với ban chỉ huy quân sự cơ quan, tổ chức và đơn vị tự vệ thuộc bộ, ngành Trung ương quản lý: Chỉ đạo, hướng dẫn
      thực hiện công tác quốc phòng;

      đ) Đối với Chính trị viên: Phối hợp, hiệp đồng công tác;

      e) Đối với phó chỉ huy trưởng và chính trị viên phó: Chỉ đạo, chỉ huy thực hiện công tác quốc phòng.'
    - '1. Phạt tiền từ 3.000.000 đồng đến 5.000.000 đồng đối với hành vi thông báo không đúng với cơ quan nhà nước có thẩm
      quyền về bưu chính khi có thay đổi liên quan đến văn bản xác nhận thông báo hoạt động bưu chính.

      2. Phạt tiền từ 5.000.000 đồng đến 7.000.000 đồng đối với hành vi không thông báo hoạt động bưu chính tới cơ quan nhà
      nước có thẩm quyền cấp văn bản xác nhận thông báo hoạt động bưu chính quá 07 ngày làm việc, kể từ ngày đầu tiên hoạt
      động bưu chính.

      3. Phạt tiền từ 7.000.000 đồng đến 10.000.000 đồng đối với một trong các hành vi sau:

      a) Tẩy xóa, sửa chữa văn bản xác nhận thông báo hoạt động bưu chính;

      b) Làm chi nhánh, văn phòng đại diện của doanh nghiệp cung ứng dịch vụ bưu chính được thành lập theo pháp luật Việt
      Nam mà không có văn bản xác nhận thông báo hoạt động của cơ quan nhà nước có thẩm quyền về bưu chính;

      c) Không thông báo với cơ quan nhà nước có thẩm quyền về bưu chính khi có thay đổi liên quan đến văn bản xác nhận thông
      báo hoạt động bưu chính.

      4. Phạt tiền từ 10.000.000 đồng đến 20.000.000 đồng đối với một trong các hành vi sau:

      a) Cung ứng dịch vụ bưu chính mà không có văn bản xác nhận thông báo hoạt động của cơ quan nhà nước có thẩm quyền về
      bưu chính;

      b) Làm đại lý, đại diện, văn phòng đại diện cho doanh nghiệp cung ứng dịch vụ bưu chính nước ngoài; nhận nhượng quyền
      thương mại trong lĩnh vực bưu chính từ nước ngoài vào Việt Nam mà không có văn bản xác nhận thông báo hoạt động của
      cơ quan nhà nước có thẩm quyền về bưu chính.

      5. Biện pháp khắc phục hậu quả:

      a) Buộc nộp lại số lợi bất hợp pháp có được do thực hiện hành vi vi phạm quy định tại khoản 1 và điểm a khoản 4 Điều
      này;

      b) Buộc nộp lại văn bản xác nhận thông báo đối với hành vi vi phạm quy định tại điểm a khoản 3 Điều này.'
  - source_sentence: Mức phạt khi tập trung đông người trái phép, nằm, ngồi trên đường bộ gây cản trở giao thông
    sentences:
    - '1. Ngân sách nhà nước đảm bảo kinh phí cho các hoạt động thuê kho, bến bãi tiếp nhận và các chi phí liên quan khác
      theo quy định pháp luật về ngân sách nhà nước, phù hợp với phân cấp quản lý ngân sách nhà nước. Nguồn kinh phí và trách
      nhiệm bố trí kinh phí phải được thể hiện trong quyết định tiếp nhận viện trợ được cấp có thẩm quyền phê duyệt.

      2. Đối với các khoản viện trợ không thuộc nguồn thu ngân sách nhà nước do các đơn vị tiếp nhận viện trợ tự thu xếp.'
    - '1. Phạt tiền từ 3.000.000 đồng đến 5.000.000 đồng đối với một trong các hành vi sau:

      a) Mẫu chứng từ kế toán không có đầy đủ các nội dung chủ yếu theo quy định;

      b) Tẩy xóa, sửa chữa chứng từ kế toán;

      c) Ký chứng từ kế toán bằng mực màu đỏ, mực phai màu;

      d) Ký chứng từ kế toán bằng đóng dấu chữ ký khắc sẵn;

      đ) Chứng từ chi tiền không ký theo từng liên.

      2. Phạt tiền từ 5.000.000 đồng đến 10.000.000 đồng đối với một trong các hành vi sau:

      a) Lập chứng từ kế toán không đủ số liên theo quy định của mỗi loại chứng từ kế toán;

      b) Ký chứng từ kế toán khi chưa ghi đủ nội dung chứng từ thuộc trách nhiệm của người ký;

      c) Ký chứng từ kế toán mà không đúng thẩm quyền;

      d) Chữ ký của một người không thống nhất hoặc không đúng với sổ đăng ký mẫu chữ ký;

      đ) Chứng từ kế toán không có đủ chữ ký theo chức danh quy định trên chứng từ;

      e) Không dịch chứng từ kế toán bằng tiếng nước ngoài ra tiếng Việt theo quy định;

      g) Để hư hỏng, mất mát tài liệu, chứng từ kế toán đang trong quá trình sử dụng.

      3. Phạt tiền từ 20.000.000 đồng đến 30.000.000 đồng đối với một trong các hành vi sau:

      a) Giả mạo, khai man chứng từ kế toán nhưng chưa đến mức truy cứu trách nhiệm hình sự;

      b) Thỏa thuận hoặc ép buộc người khác giả mạo, khai man chứng từ kế toán nhưng chưa đến mức truy cứu trách nhiệm hình
      sự;

      c) Lập chứng từ kế toán có nội dung các liên không giống nhau trong trường hợp phải lập chứng từ kế toán có nhiều liên
      cho một nghiệp vụ kinh tế, tài chính phát sinh;

      d) Không lập chứng từ kế toán khi nghiệp vụ kinh tế, tài chính phát sinh;

      đ) Lập nhiều lần chứng từ kế toán cho một nghiệp vụ kinh tế, tài chính phát sinh;

      e) Thực hiện chi tiền khi chứng từ chi tiền chưa có đầy đủ chữ ký của người có thẩm quyền theo quy định của pháp luật
      về kế toán.

      4. Biện pháp khắc phục hậu quả:

      a) Bổ sung các yếu tố chưa đầy đủ của chứng từ đối với hành vi quy định tại điểm a khoản 1 Điều này;

      b) Buộc hủy các chứng từ kế toán bị khai man, giả mạo đối với hành vi quy định tại điểm a khoản 3 Điều này;

      c) Buộc lập bổ sung chứng từ chưa được lập khi nghiệp vụ kinh tế, tài chính phát sinh đối với hành vi quy định tại điểm
      d khoản 3 Điều này;

      d) Buộc hủy các chứng từ kế toán đã được lập nhiều lần cho một nghiệp vụ kinh tế, tài chính phát sinh đối với hành vi
      quy định tại điểm đ khoản 3 Điều này.'
    - '1. Phạt tiền từ 80.000 đồng đến 100.000 đồng đối với người được chở trên xe đạp, xe đạp máy sử dụng ô (dù).

      2. Phạt tiền từ 100.000 đồng đến 200.000 đồng đối với cá nhân thực hiện một trong các hành vi vi phạm sau đây:

      a) Tập trung đông người trái phép, nằm, ngồi trên đường bộ gây cản trở giao thông;

      b) Đá bóng, đá cầu, chơi cầu lông hoặc các hoạt động thể thao khác trái phép trên đường bộ; sử dụng bàn trượt, pa-tanh,
      các thiết bị tương tự trên phần đường xe chạy;

      c) Người được chở trên xe mô tô, xe gắn máy (kể cả xe máy điện), các loại xe tương tự xe mô tô và các loại xe tương
      tự xe gắn máy sử dụng ô (dù);

      d) Người được chở trên xe đạp, xe đạp máy bám, kéo, đẩy xe khác, vật khác, mang vác vật cồng kềnh.

      3. Phạt tiền từ 200.000 đồng đến 300.000 đồng đối với người được chở trên xe mô tô, xe gắn máy (kể cả xe máy điện),
      các loại xe tương tự xe mô tô, các loại xe tương tự xe gắn máy, xe đạp máy (kể cả xe đạp điện) không đội “mũ bảo hiểm
      cho người đi mô tô, xe máy” hoặc đội “mũ bảo hiểm cho người đi mô tô, xe máy” không cài quai đúng quy cách khi tham
      gia giao thông trên đường bộ.

      4. Phạt tiền từ 200.000 đồng đến 400.000 đồng đối với cá nhân, từ 400.000 đồng đến 800.000 đồng đối với tổ chức để vật
      che khuất biển báo, đèn tín hiệu giao thông.

      5. Phạt tiền từ 300.000 đồng đến 500.000 đồng đối với người được chở trên xe ô tô không thắt dây an toàn (tại vị trí
      có trang bị dây an toàn) khi xe đang chạy.

      6. Phạt tiền từ 400.000 đồng đến 600.000 đồng đối với người được chở trên xe mô tô, xe gắn máy (kể cả xe máy điện),
      các loại xe tương tự xe mô tô, các loại xe tương tự xe gắn máy bám, kéo, đẩy xe khác, vật khác, dẫn dắt súc vật, mang
      vác vật cồng kềnh, đứng trên yên, giá đèo hàng hoặc ngồi trên tay lái.

      7. Phạt tiền từ 500.000 đồng đến 1.000.000 đồng đối với cá nhân, từ 1.000.000 đồng đến 2.000.000 đồng đối với tổ chức
      thực hiện một trong các hành vi vi phạm sau đây:

      a) Không cứu giúp người bị tai nạn giao thông khi có yêu cầu;

      b) Ném gạch, đất, đá, cát hoặc vật thể khác vào phương tiện đang tham gia giao thông trên đường bộ.

      8. Phạt tiền từ 2.000.000 đồng đến 4.000.000 đồng đối với cá nhân, từ 4.000.000 đồng đến 8.000.000 đồng đối với tổ chức
      cố ý thay đổi, xóa dấu vết hiện trường vụ tai nạn giao thông, trừ các hành vi vi phạm quy định tại điểm đ khoản 2, điểm
      b khoản 8 Điều 5; điểm e khoản 3, điểm đ khoản 8 Điều 6; điểm g khoản 3, điểm c khoản 8 Điều 7; điểm b khoản 4 Điều
      8 Nghị định này.

      9. Phạt tiền từ 4.000.000 đồng đến 6.000.000 đồng đối với cá nhân, từ 8.000.000 đồng đến 12.000.000 đồng đối với tổ
      chức thực hiện hành vi cản trở hoặc không chấp hành yêu cầu thanh tra, kiểm tra, kiểm soát của người thi hành công vụ,
      trừ các hành vi vi phạm quy định tại khoản 9, điểm b, điểm d khoản 10 Điều 5; điểm g, điểm i khoản 8, khoản 9 Điều 6;
      điểm b, điểm d khoản 9 Điều 7; điểm d khoản 4 Điều 8; điểm b khoản 6 Điều 33 Nghị định này.

      10. Phạt tiền từ 6.000.000 đồng đến 8.000.000 đồng đối với cá nhân thực hiện một trong các hành vi vi phạm sau đây:

      a) Ném đinh, rải đinh hoặc vật sắc nhọn khác, đổ dầu nhờn hoặc các chất gây trơn khác trên đường bộ; chăng dây hoặc
      các vật cản khác qua đường gây nguy hiểm đến người và phương tiện tham gia giao thông;

      b) Xâm phạm sức khỏe, tài sản của người bị nạn hoặc người gây tai nạn;

      c) Lợi dụng việc xảy ra tai nạn giao thông để hành hung, đe dọa, xúi giục, gây sức ép, làm mất trật tự, cản trở việc
      xử lý tai nạn giao thông.

      11. Ngoài việc bị phạt tiền, cá nhân thực hiện hành vi quy định tại khoản 10 Điều này nếu là người điều khiển phương
      tiện còn bị áp dụng hình thức xử phạt bổ sung tước quyền sử dụng Giấy phép lái xe từ 01 tháng đến 03 tháng.

      12. Ngoài việc bị áp dụng hình thức xử phạt, cá nhân, tổ chức thực hiện hành vi vi phạm còn bị áp dụng các biện pháp
      khắc phục hậu quả sau đây:

      a) Thực hiện hành vi quy định tại khoản 4 Điều này buộc phải tháo dỡ các vật che khuất biển báo hiệu đường bộ, đèn tín
      hiệu giao thông;

      b) Thực hiện hành vi quy định tại điểm a khoản 10 Điều này buộc phải thu dọn đinh, vật sắc nhọn, dây hoặc các vật cản
      khác và khôi phục lại tình trạng ban đầu đã bị thay đổi do vi phạm hành chính gây ra.'
  - source_sentence: Thời hạn để thực hiện đăng ký giao dịch cổ phiếu trên hệ thống giao dịch UPCOM quy định như thế nào?
    sentences:
    - 'Trong Thông tư này, các từ ngữ dưới đây được hiểu như sau:

      1. Doanh nghiệp khởi nghiệp đổi mới sáng tạo là doanh nghiệp có khả năng tăng trưởng nhanh dựa trên khai thác tài sản
      trí tuệ, công nghệ, mô hình kinh doanh mới và có thời gian hoạt động không quá 05 năm kể từ ngày được cấp Giấy chứng
      nhận đăng ký doanh nghiệp lần đầu.

      2. Tổ chức hỗ trợ khởi nghiệp đổi mới sáng tạo là tổ chức cung cấp một số dịch vụ hỗ trợ cho cá nhân, nhóm cá nhân,
      doanh nghiệp khởi nghiệp đổi mới sáng tạo như: cơ sở vật chất - kỹ thuật, tư vấn, đào tạo, huấn luyện, nâng cao năng
      lực, đầu tư, hỗ trợ đầu tư, truyền thông.

      3. Tổ chức thúc đẩy kinh doanh là tổ chức hỗ trợ cá nhân, nhóm cá nhân, doanh nghiệp khởi nghiệp đổi mới sáng tạo phát
      triển mô hình kinh doanh, tiếp cận nguồn vốn đầu tư thông qua các khóa huấn luyện tập trung và các ngày hội đầu tư.

      4. Khu tập trung dịch vụ hỗ trợ khởi nghiệp đổi mới sáng tạo là nơi có cơ sở hạ tầng, không gian làm việc chung, tổ
      chức sự kiện, tổ chức cung cấp dịch vụ, đào tạo, đầu tư, hỗ trợ đầu tư và các dịch vụ cần thiết khác cho khởi nghiệp
      đổi mới sáng tạo.

      5. Chuyên gia khởi nghiệp đổi mới sáng tạo là người có kiến thức, kinh nghiệm trong việc nâng cao năng lực và kết nối
      các đối tượng của hệ sinh thái khởi nghiệp đổi mới sáng tạo thông qua hoạt động đào tạo, tư vấn chính sách, tư vấn hỗ
      trợ khởi nghiệp đổi mới sáng tạo.

      6. Tổ chức chủ trì thực hiện nhiệm vụ thuộc Đề án 844 (sau đây gọi tắt là tổ chức chủ trì) là tổ chức được cấp có thẩm
      quyền phê duyệt nhiệm vụ và giao chủ trì thực hiện nhiệm vụ thuộc Đề án 844.

      7. Ban Điều hành Đề án 844 là tổ chức có nhiệm vụ giúp Bộ trưởng Bộ Khoa học và Công nghệ định hướng triển khai, tham
      gia kiểm tra, giám sát, đánh giá việc tổ chức thực hiện Đề án 844. Ban Điều hành Đề án 844 do Bộ trưởng Bộ Khoa học
      và Công nghệ quyết định thành lập và quy định chức năng, nhiệm vụ.'
    - '1. Phạm vi thực hiện

      a) Cung cấp dịch vụ đăng ký, lưu ký chứng khoán cho khách hàng;

      b) Thực hiện thanh toán các giao dịch chứng khoán trên Sở Giao dịch chứng khoán cho khách hàng;

      c) Cung cấp dịch vụ quản lý sổ cổ đông, đại lý chuyển nhượng theo yêu cầu của tổ chức phát hành không phải là công ty
      đại chúng.

      2. Quyền và nghĩa vụ của công ty chứng khoán

      a) Mở tài khoản lưu ký cho khách hàng tại công ty chứng khoán, quản lý tài khoản lưu ký chứng khoán của khách hàng theo
      đúng quy định của pháp luật. Tài khoản lưu ký chứng khoán của khách hàng phải tách biệt với tài khoản lưu ký chứng khoán
      của chính công ty;

      b) Ghi chép chính xác, đầy đủ và cập nhật thông tin về khách hàng mở tài khoản lưu ký và chứng khoán sở hữu của khách
      hàng đã lưu ký tại công ty;

      c) Bảo quản, lưu trữ, thu thập và xử lý số liệu liên quan đến hoạt động đăng ký, lưu ký, thanh toán bù trừ chứng khoán
      của khách hàng;

      d) Xây dựng các quy trình đăng ký, lưu ký, thanh toán bù trừ, quản lý sổ cổ đông, đại lý chuyển nhượng và quy trình
      kiểm soát nội bộ nhằm quản lý và bảo vệ quyền lợi của khách hàng hoặc người sở hữu chứng khoán;

      đ) Thu phí dịch vụ hoạt động đăng ký, lưu ký chứng khoán và các loại phí dịch vụ khác theo quy định của pháp luật.'
    - '1. Đối tượng đăng ký giao dịch

      a) Công ty đại chúng không niêm yết trên Sở giao dịch chứng khoán;

      b) Công ty bị hủy bỏ niêm yết bắt buộc hoặc hủy bỏ niêm yết tự nguyện nhưng vẫn đáp ứng điều kiện là công ty đại chúng;

      c) Doanh nghiệp cổ phần hóa thuộc đối tượng phải đăng ký giao dịch theo quy định pháp luật về chuyển doanh nghiệp nhà
      nước, công ty trách nhiệm hữu hạn một thành viên do doanh nghiệp nhà nước nắm giữ 100% vốn điều lệ, đơn vị sự nghiệp
      công lập thành công ty cổ phần.

      2. Thời hạn thực hiện đăng ký giao dịch

      a) Công ty đại chúng phải hoàn tất việc đăng ký cổ phiếu tại Tổng công ty lưu ký và bù trừ chứng khoán Việt Nam và đăng
      ký giao dịch trên hệ thống giao dịch Upcom theo quy định tại điểm d, đ khoản 1 Điều 34 Luật Chứng khoán;

      b) Trong thời hạn 07 ngày làm việc kể từ ngày hủy bỏ niêm yết có hiệu lực, Sở giao dịch chứng khoán có trách nhiệm phối
      hợp với Tổng công ty lưu ký và bù trừ chứng khoán Việt Nam thực hiện đăng ký giao dịch đối với cổ phiếu của công ty
      bị hủy bỏ niêm yết;

      c) Thời hạn đăng ký giao dịch của doanh nghiệp cổ phần hóa thực hiện theo quy định pháp luật về chuyển doanh nghiệp
      nhà nước, công ty trách nhiệm hữu hạn một thành viên do doanh nghiệp nhà nước nắm giữ 100% vốn điều lệ, đơn vị sự nghiệp
      công lập thành công ty cổ phần. Doanh nghiệp cổ phần hóa đăng ký giao dịch trên hệ thống giao dịch Upcom phải thực hiện
      nghĩa vụ công bố thông tin theo quy định pháp luật và quy chế của Sở giao dịch chứng khoán.'
