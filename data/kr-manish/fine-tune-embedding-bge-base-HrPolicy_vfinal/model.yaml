widgetData:
- source_sentence: Priya Softweb has specific guidelines for managing the arrival of international shipments. To ensure smooth
    customs clearance, the company requires an authorization letter from the client, written on their company letterhead.
    This letter must clearly state that the shipment is "Not for commercial purposes" to prevent the application of duty charges
    by the customs office. All international shipments should be addressed to Keyur Patel at Priya Softweb Solutions Pvt.
    Ltd., with the company's full address and contact information clearly indicated. Employees are advised to contact the
    HR department for the correct format of the authorization letter and to inform Keyur Patel about the expected arrival
    of such shipments. These procedures streamline the handling of international shipments and help avoid potential customs-related
    delays or complications.
  sentences:
  - Female employees at Priya Softweb are allowed to wear:- Formal trousers/jeans and shirts- Sarees- Formal skirts- T-shirts
    with collars- Chudidars & Kurtis- Salwar SuitsHowever, they are not allowed to wear:- Round neck, deep neck, cold shoulder,
    and fancy T-shirts- Low waist jeans, short T-shirts, and short shirts- Transparent wear- Wear with deep-cut sleeves- Capris-
    Slippers- Visible tattoos & piercingsPriya Softweb emphasizes a professional appearance for its employees while providing
    flexibility in choosing appropriate attire within the defined guidelines.
  - Priya Softweb has specific guidelines for managing the arrival of international shipments. To ensure smooth customs clearance,
    the company requires an authorization letter from the client, written on their company letterhead. This letter must clearly
    state that the shipment is "Not for commercial purposes" to prevent the application of duty charges by the customs office.
    All international shipments should be addressed to Keyur Patel at Priya Softweb Solutions Pvt. Ltd., with the company's
    full address and contact information clearly indicated. Employees are advised to contact the HR department for the correct
    format of the authorization letter and to inform Keyur Patel about the expected arrival of such shipments. These procedures
    streamline the handling of international shipments and help avoid potential customs-related delays or complications.
  - Priya Softweb has a structured onboarding process for new employees. Upon joining, new hires undergo an induction program
    conducted by the HR department. This program introduces them to the company's culture, values, processes, and policies,
    ensuring they are well-acquainted with the work environment and expectations. HR also facilitates introductions to the
    relevant department and sends out a company-wide email announcing the new employee's arrival. Additionally, new employees
    are required to complete quarterly Ethics & Compliance training to familiarize themselves with the company's ethical standards
    and compliance requirements. This comprehensive onboarding approach helps new employees integrate seamlessly into the
    company and quickly become productive members of the team.
- source_sentence: The sanctioning and approving authority for Casual Leave, Sick Leave, and Privilege Leave at Priya Softweb
    is the Leader/Manager.
  sentences:
  - Even if an employee utilizes the 'Hybrid' Work From Home model for only half a day, a full count is deducted from their
    monthly allowance of 4 WFH days. This clarifies that any utilization of the 'Hybrid' model, regardless of the duration,
    is considered a full WFH day and counts towards the monthly limit.
  - The sanctioning and approving authority for Casual Leave, Sick Leave, and Privilege Leave at Priya Softweb is the Leader/Manager.
  - To be eligible for gratuity at Priya Softweb, an employee must have completed a minimum of 5 continuous years of service.
    This ensures that only long-term employees are entitled to this benefit.
- source_sentence: 'Priya Softweb utilizes Employee Agreements/Bonds as a mechanism to retain talent within the company. These
    agreements are implemented in various situations, including: * **Retention:** When the company seeks to retain valuable
    employees who have resigned, a 15-month bond may be applied based on the company''s requirements. * **Freshers:** New
    employees with 0 to 1 year of experience are generally subject to an 18-month bond. * **Rejoining:** When former employees
    are rehired, a 15-month bond is typically implemented. These bond periods vary based on the specific circumstances and
    aim to ensure a certain level of commitment from employees, especially in roles that require significant investment in
    training and development.'
  sentences:
  - To claim gratuity, employees must submit an application form to the Accounts department. This formal process ensures proper
    documentation and timely processing of the gratuity payment.
  - Priya Softweb acknowledges the efforts of employees who work late hours. Employees working more than 11 hours on weekdays
    are eligible for reimbursement of up to Rs. 250/- for their dinner expenses. However, this reimbursement is subject to
    approval from their Department Head. This policy recognizes the extra effort put in by employees working extended hours
    and provides some financial compensation for their meals.
  - 'Priya Softweb utilizes Employee Agreements/Bonds as a mechanism to retain talent within the company. These agreements
    are implemented in various situations, including: * **Retention:** When the company seeks to retain valuable employees
    who have resigned, a 15-month bond may be applied based on the company''s requirements. * **Freshers:** New employees
    with 0 to 1 year of experience are generally subject to an 18-month bond. * **Rejoining:** When former employees are rehired,
    a 15-month bond is typically implemented. These bond periods vary based on the specific circumstances and aim to ensure
    a certain level of commitment from employees, especially in roles that require significant investment in training and
    development.'
- source_sentence: Chewing tobacco, gutka, gum, or smoking within the office premises is strictly prohibited at Priya Softweb.
    Bringing such substances inside the office will lead to penalties and potentially harsh decisions from management. This
    strict policy reflects Priya Softweb's commitment to a healthy and clean work environment.
  sentences:
  - Chewing tobacco, gutka, gum, or smoking within the office premises is strictly prohibited at Priya Softweb. Bringing such
    substances inside the office will lead to penalties and potentially harsh decisions from management. This strict policy
    reflects Priya Softweb's commitment to a healthy and clean work environment.
  - In situations of 'Bad Weather', the HR department at Priya Softweb will enable the 'Work From Home' option within the
    OMS system based on the severity of the weather and potential safety risks for employees commuting to the office. This
    proactive approach prioritizes employee safety and allows for flexible work arrangements during adverse weather events.
  - Priya Softweb employees are entitled to 5 Casual Leaves (CL) per year.
- source_sentence: Priya Softweb prioritizes the health and wellness of its employees. The company strongly prohibits chewing
    tobacco, gutka, gum, or smoking within the office premises. Penalties and harsh decisions from management await anyone
    found bringing such substances into the office. Furthermore, carrying food to the desk is not permitted. Employees are
    encouraged to use the terrace dining facility for lunch, snacks, and dinner. Priya Softweb also emphasizes cleanliness
    and orderliness in the workspace. Employees are responsible for maintaining their designated work areas, keeping them
    clean, organized, and free from unnecessary items. Spitting gutka, gum, or tobacco in the washrooms is strictly prohibited.
    These policies contribute to a healthier and more pleasant work environment for everyone.
  sentences:
  - Priya Softweb prioritizes the health and wellness of its employees. The company strongly prohibits chewing tobacco, gutka,
    gum, or smoking within the office premises. Penalties and harsh decisions from management await anyone found bringing
    such substances into the office. Furthermore, carrying food to the desk is not permitted. Employees are encouraged to
    use the terrace dining facility for lunch, snacks, and dinner. Priya Softweb also emphasizes cleanliness and orderliness
    in the workspace. Employees are responsible for maintaining their designated work areas, keeping them clean, organized,
    and free from unnecessary items. Spitting gutka, gum, or tobacco in the washrooms is strictly prohibited. These policies
    contribute to a healthier and more pleasant work environment for everyone.
  - The Performance Appraisal at Priya Softweb is solely based on the employee's performance evaluation. The evaluation score
    is compiled by the Team Leader/Project Manager, who also gives the final rating to the team member. Detailed recommendations
    are provided by the TL/PM, and increment or promotion is granted accordingly. This process ensures that performance is
    the primary factor driving salary revisions and promotions.
  - Priya Softweb actively promotes diversity in its hiring practices. The company focuses on recruiting individuals from
    a wide range of backgrounds, including different races, ethnicities, religions, political beliefs, education levels, socio-economic
    backgrounds, geographical locations, languages, and cultures. This commitment to diversity enriches the company culture
    and brings in a variety of perspectives and experiences.
