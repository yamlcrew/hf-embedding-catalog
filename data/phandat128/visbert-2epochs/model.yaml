      \ quy_định của pháp_luật về Thuế giá_trị gia_tăng ; \n d ) Được hạch_toán một_số khoản chi_phí đặc_thù vào giá_thành\
      \ sản_phẩm , dịch_vụ phục_vụ quốc_phòng , bao_gồm : chi_phí trả lương cho người nghỉ chuẩn_bị hưu ( trường_hợp không\
