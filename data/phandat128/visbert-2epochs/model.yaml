      \ theo chế_độ chuyên_nghiệp , công_nhân_công_an , trong biên_chế và hưởng lương từ ngân_sách nhà_nước . ” . 1 . Nhà_nước\
      \ có chính_sách phát_hiện , thu_hút , trọng_dụng và đãi_ngộ xứng_đáng đối_với người có tài_năng . 1 . Căn_cứ vào kết_quả\
      \ đánh_giá , cán_bộ được xếp loại chất_lượng theo các mức như sau : 1 . Việc tuyển_dụng công_chức được thực_hiện thông_qua\
      \ thi_tuyển hoặc xét tuyển , trừ trường_hợp quy_định tại khoản 3 Điều này . Hình_thức , nội_dung thi_tuyển , xét tuyển\
      \ công_chức phải phù_hợp với yêu_cầu vị_trí việc_làm trong từng ngành , nghề , bảo_đảm lựa_chọn được người có phẩm_chất\
      \ , trình_độ và năng_lực . 1 . Cơ_quan có thẩm_quyền tuyển_dụng công_chức bao_gồm : 1 . Việc nâng ngạch công_chức phải\
      \ căn_cứ vào vị_trí việc_làm , phù_hợp với cơ_cấu ngạch công_chức của cơ_quan , tổ_chức , đơn_vị và được thực_hiện thông_qua\
      \ thi nâng ngạch hoặc xét nâng ngạch . 1 . Công_chức dự thi nâng ngạch phải đáp_ứng đủ tiêu_chuẩn , điều_kiện sau đây\
      \ : 1 . Nội_dung và hình_thức thi nâng ngạch , xét nâng ngạch công_chức phải phù_hợp với yêu_cầu về chuyên_môn , nghiệp_vụ\
      \ của ngạch , bảo_đảm lựa_chọn công_chức có năng_lực , trình_độ chuyên_môn , nghiệp_vụ theo tiêu_chuẩn của ngạch và\
      \ đáp_ứng yêu_cầu nhiệm_vụ . 1 . Công_chức được đánh_giá theo các nội_dung sau đây : 1 . Căn_cứ vào kết_quả đánh_giá\
      \ , công_chức được xếp loại chất_lượng theo các mức như sau : 1 . Công_chức vi_phạm_quy_định của Luật này và các quy_định\
      \ khác của pháp_luật có liên_quan thì tùy theo tính_chất , mức_độ vi_phạm phải chịu một trong những hình_thức kỷ_luật\
      \ sau đây : 1 . Thời_hiệu xử_lý kỷ_luật là thời_hạn mà khi hết thời_hạn đó thì cán_bộ , công_chức có hành_vi vi_phạm\
      \ không bị xử_lý kỷ_luật . Thời_hiệu xử_lý kỷ_luật được tính từ thời_điểm có hành_vi vi_phạm . Trừ trường_hợp quy_định\
      \ tại khoản 2 Điều này , thời_hiệu xử_lý kỷ_luật được quy_định như sau : 1 . Cơ_quan có thẩm_quyền của Đảng Cộng_sản\
      \ Việt_Nam , Ủy_ban thường_vụ Quốc_hội , Chính_phủ quy_định cụ_thể việc áp_dụng Luật này đối_với những người được bầu_cử\
      \ nhưng không thuộc đối_tượng quy_định tại khoản 1 Điều 4 của Luật này ; chế_độ phụ_cấp đối_với người đã nghỉ hưu nhưng\
      \ được bầu_cử giữ chức_vụ , chức_danh cán_bộ ."
    - Khoản 1 . Cán_bộ là công_dân Việt_Nam , được bầu_cử , phê_chuẩn , bổ_nhiệm giữ chức_vụ , chức_danh theo nhiệm_kỳ trong
