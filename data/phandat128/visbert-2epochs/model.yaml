    - "\" Điều 13 . Tiếp_nhận vào làm viên_chức \n 1 . Căn_cứ điều_kiện đăng_ký dự_tuyển viên_chức và theo yêu_cầu của vị_trí\
      \ việc_làm cần tuyển , người đứng đầu_cơ_quan , đơn_vị có thẩm_quyền tuyển_dụng được xem_xét tiếp_nhận vào làm viên_chức\
      \ đối_với các trường_hợp sau : \n a ) Các trường_hợp có ít_nhất 05 năm công_tác ở vị_trí việc_làm yêu_cầu trình_độ đào_tạo\
