      \ đối_tượng quy_định tại khoản này ) , gồm : \n Người đang là cán_bộ , công_chức cấp xã ; \n Người đang ký hợp_đồng\
      \ lao_động làm công_việc chuyên_môn , nghiệp_vụ trong đơn_vị sự_nghiệp công_lập hoặc đơn_vị sự_nghiệp ngoài công_lập\
      \ theo quy_định của pháp_luật ; \n Người hưởng lương trong lực_lượng vũ_trang nhân_dân , người làm_việc trong tổ_chức\
