    - "Chương III. TỔ_CHỨC THỰC_HIỆN \n Điều 65 . Hiệu_lực thi_hành \n 1 . Thông_tư này có hiệu_lực từ ngày 01 tháng 01 năm\
      \ 2016 , Tổng_cục Hải_quan triển_khai xây_dựng hệ_thống ứng_dụng công_nghệ thông_tin để thực_hiện Thông_tư này , thời_gian\
      \ áp_dụng thực_hiện trong các đơn_vị hải_quan kể từ ngày 01 tháng 01 năm 2017 . Trong thời_gian xây_dựng hệ_thống ứng_dụng\
      \ công_nghệ thông_tin , việc thực_hiện kế_toán nghiệp_vụ thuế và thu khác đối_với hàng_hóa xuất_khẩu , nhập_khẩu được\
      \ tiếp_tục thực_hiện theo quy_định của Thông_tư số 212 / 2014 / TT - BTC ngày 31 tháng 12 năm 2014 của Bộ_trưởng Bộ\
      \ Tài_chính hướng_dẫn kế_toán nghiệp_vụ thuế và thu khác đối_với hàng_hóa xuất_khẩu , nhập_khẩu . \n 2 . Thông_tư số\
      \ 212 / 2014 / TT - BTC ngày 31 tháng 12 năm 2014 của Bộ_trưởng Bộ Tài_chính hướng_dẫn kế_toán nghiệp_vụ thuế và thu\
      \ khác đối_với hàng_hóa xuất_khẩu , nhập_khẩu và các văn_bản hướng_dẫn liên_quan đến kế_toán nghiệp_vụ thuế và thu khác\
      \ đối_với hàng_hóa xuất_khẩu , nhập_khẩu do Bộ Tài_chính ban_hành trước ngày 01 tháng 01 năm 2017 không phù_hợp với\
      \ nội_dung Thông_tư này sẽ hết hiệu_lực kể từ ngày 01 tháng 01 năm 2017 . \n Điều 66 . Tổ_chức thực_hiện \n 1 . Vụ_trưởng\
      \ Vụ Chế_độ kế_toán và kiểm_toán , Tổng_cục_trưởng Tổng_cục Hải_quan và Thủ_trưởng các đơn_vị có liên_quan chịu trách_nhiệm\
      \ hướng_dẫn , kiểm_tra và thi_hành Thông_tư này . \n 2 . Trong quá_trình thực_hiện nếu có vướng_mắc đề_nghị phản_ánh\
      \ kịp_thời về Bộ Tài_chính để nghiên_cứu giải_quyết ."
  - source_sentence: Công_dân đạt thành tính học_sinh giỏi cấp tỉnh được tuyển_chọn vào Công_an nhân_dân theo phương_thức
      nào ?
    sentences:
    - "Thực_hiện dân_chủ trong thi_tuyển , xét tuyển \n 1 . Các trường Công_an nhân_dân thành_lập Hội_đồng tuyển_sinh và các\
      \ ban chuyên_môn theo thẩm_quyền để thực_hiện công_tác tuyển_sinh theo quy_định của pháp_luật và của Bộ Công_an . \n\
      \ Những người có con , vợ hoặc chồng , bố , mẹ , anh , chị , em ruột , người nuôi_dưỡng của mình hoặc của vợ hoặc chồng\
      \ dự_tuyển thì không được tham_gia Hội_đồng tuyển_sinh và các ban chuyên_môn . \n 2 . Các trường Công_an nhân_dân tổ_chức\
      \ tiếp_nhận hồ_sơ dự_tuyển , thi_tuyển , xét tuyển phải bảo_đảm đúng đối_tượng , tiêu_chuẩn , vùng tuyển , trình_tự\
      \ , thủ_tục , thời_gian ; bảo_đảm khách_quan , công_khai , minh_bạch theo đúng quy_chế , quy_định . \n 3 . Tại các điểm\
      \ tổ_chức thi_tuyển , xét tuyển phải có hòm_thư , số điện_thoại liên_hệ để thí_sinh góp_ý về công_tác tuyển_sinh , phản_ánh\
      \ những hành_vi vi_phạm_quy_chế tuyển_sinh . \n 4 . Hội_đồng tuyển_sinh có trách_nhiệm xử_lý nghiêm_minh , khách_quan\
      \ đối_với cán_bộ và thí_sinh vi_phạm_quy_chế tuyển_sinh ; thực_hiện nghiêm chế_độ bảo_mật về địa_điểm , thời_gian ,\
      \ nhân_sự tham_gia_công_việc về đề thi , bảo_quản bài thi , công_tác làm_phách , chấm thi , chấm phúc_khảo theo đúng\
      \ quy_chế tuyển_sinh . Kết_quả chấm thi , chấm phúc_khảo phải được niêm_yết công_khai tại trường Công_an nhân_dân hoặc\
      \ trên trang thông_tin điện_tử của trường Công_an nhân_dân và gửi phiếu báo điểm thi , điểm phúc_khảo đến thí_sinh đúng\
      \ thời_gian quy_định . \n 5 . Hội_đồng tuyển_sinh quyết_định phương_án điểm xét tuyển ; thông_báo_công_khai điểm thi\
      \ , điểm xét tuyển , kết_quả xét tuyển và thí_sinh trúng_tuyển ( theo số báo_danh_dự thi ) và gửi danh_sách thí_sinh\
      \ trúng_tuyển về Công_an đơn_vị , địa_phương để phối_hợp thông_báo cho thí_sinh theo quy_định của pháp_luật và của Bộ\
      \ Công_an . \n 6 . Các trường Công_an nhân_dân gửi thông_báo thí_sinh trúng_tuyển nhập_học và quy_định những thủ_tục\
      \ cần_thiết đối_với thí_sinh khi nhập_học , tiếp_nhận nhập_học cho thí_sinh trúng_tuyển trong thời_gian quy_định ."
    - "1 . Căn_cứ kế_hoạch huy_động hàng năm , 5 năm được Thủ_tướng Chính_phủ_phê_duyệt , Bộ Công_an phối_hợp với Bộ Giáo_dục\
      \ và Đào_tạo , các Bộ , cơ_quan liên_quan tổ_chức thực_hiện đào_tạo nguồn nhân_lực khoa_học và công_nghệ phục_vụ công_tác\
      \ công_an . \n 2 . Nhà_nước có chính_sách ưu_tiên , tạo điều_kiện cho Bộ Công_an tuyển_chọn , điều_động cán_bộ , chuyên_gia\
      \ , nhân_viên khoa_học và công_nghệ đã được đào_tạo vào phục_vụ công_tác công_an và cử người đủ tiêu_chuẩn đi học_tập\
      \ , bồi_dưỡng tại các cơ_sở đào_tạo về khoa_học và công_nghệ trong và ngoài nước . \n Việc tuyển_chọn học_sinh , sinh_viên\
      \ vào Công_an nhân_dân , việc chọn cử học_sinh , sinh_viên , cán_bộ Công_an nhân_dân đi đào_tạo ở trong và ngoài nước\
      \ nhằm tăng_cường nguồn nhân_lực khoa_học và công_nghệ phục_vụ công_tác công_an thực_hiện theo quy_định tại Nghị_định\
      \ số 43 / 2007 / NĐ - CP ngày 26 tháng 3 năm 2007 quy_định chi_tiết và hướng_dẫn thi_hành một_số điều của Luật Công_an\
      \ nhân_dân . \n 3 . Các Bộ , cơ_quan ngang Bộ , Ủy_ban nhân_dân cấp tỉnh có trách_nhiệm chỉ_đạo các cơ_sở đào_tạo thuộc\
      \ ngành , địa_phương mình thực_hiện nhiệm_vụ đào_tạo nhân_lực khoa_học và công_nghệ theo kế_hoạch huy_động tiềm_lực\
      \ khoa_học và công_nghệ phục_vụ công_tác công_an được cấp có thẩm_quyền phê_duyệt ."
    - "\" Điều 14 . Trình_tự tuyển_chọn công_dân vào Công_an nhân_dân \n ... \n 5 . Quyết_định tạm_tuyển , tuyển_chọn công_dân\
      \ vào Công_an nhân_dân \n Sau khi thực_hiện các quy_định tại khoản 4 Điều này , Hội_đồng tuyển_chọn thống_nhất danh_sách\
      \ những người trúng_tuyển trong kỳ tuyển_chọn , báo_cáo cấp ủy và lãnh_đạo đơn_vị , địa_phương cho ý_kiến , trước khi\
      \ trình thủ_trưởng đơn_vị , địa_phương ra quyết_định tạm_tuyển , tuyển_chọn công_dân vào Công_an nhân_dân . Đối_với\
      \ các trường_hợp quy_định tại khoản 1 Điều 3 Thông_tư này , trước khi cơ_quan tổ_chức cán_bộ đề_xuất thủ_trưởng Công_an\
      \ đơn_vị , địa_phương quyết_định phải yêu_cầu người dự_tuyển nộp quyết_định xuất_ngũ hoặc chuyển ngành hoặc văn_bản\
      \ đồng_ý cho chuyển công_tác của thủ_trưởng cơ_quan , tổ_chức có thẩm_quyền quản_lý cán_bộ . \n 6 . Công_bố quyết_định\
      \ tạm_tuyển , tuyển_chọn công_dân vào Công_an nhân_dân \n a ) Trong thời_hạn 07 ngày làm_việc , kể từ ngày thủ_trưởng\
      \ Công_an đơn_vị , địa_phương ban_hành_quyết_định tạm_tuyển , tuyển_chọn công_dân vào Công_an nhân_dân , cơ_quan tổ_chức\
      \ cán_bộ phải thông_báo bằng văn_bản đến công_dân thời_điểm có_mặt tại cơ_quan , đơn_vị để nhận nhiệm_vụ và chủ_trì\
      \ , phối_hợp với đơn_vị trực_tiếp sử_dụng cán_bộ tổ_chức công_bố và trao quyết_định cho người được tạm_tuyển , tuyển_chọn\
      \ vào Công_an nhân_dân ; \n b ) Quyết_định tuyển_chọn , tạm_tuyển công_dân vào Công_an nhân_dân phải đồng_thời gửi Cục\
      \ Tổ_chức cán_bộ 01 bản ( bản_chính ) để phục_vụ công_tác quản_lý ."
    - "Điều 2 . Mục_đích_thực_hiện dân_chủ trong tuyển_sinh vào Công_an nhân_dân \n 1 . Phát_huy vai_trò chủ_động kiểm_tra\
      \ , giám_sát của tổ_chức , cán_bộ , chiến_sĩ và công_dân nhằm nâng cao chất_lượng , hiệu_quả tuyển_sinh vào Công_an\
      \ nhân_dân , tạo nguồn tuyển_chọn công_dân có đủ điều_kiện , tiêu_chuẩn vào Công_an nhân_dân đáp_ứng yêu_cầu bổ_sung\
      \ , phát_triển nguồn nhân_lực trong Công_an nhân_dân và xây_dựng lực_lượng Công_an nhân_dân cách_mạng , chính_quy ,\
      \ tinh_nhuệ , hiện_đại . \n 2 . Bảo_đảm quyền và lợi_ích hợp_pháp của cán_bộ , chiến_sĩ , cơ_quan , tổ_chức , công_dân\
      \ có nguyện_vọng tham_gia hoặc liên_quan đến tuyển_sinh vào Công_an nhân_dân ; phát_huy vai_trò , trách_nhiệm của Thủ_trưởng\
      \ Công_an các đơn_vị , địa_phương , các trường Công_an nhân_dân trong thực_hiện công_khai , minh_bạch tuyển_sinh vào\
      \ Công_an nhân_dân . \n 3 . Phòng_ngừa , phát_hiện , ngăn_chặn và chống các biểu_hiện , hành_vi tham_nhũng , tiêu_cực\
      \ trong tuyển_sinh vào Công_an nhân_dân ."
    - "Phương_thức tuyển_chọn \n 1 . Việc tuyển_chọn công_dân vào Công_an nhân_dân được thực_hiện thông_qua thi_tuyển , trừ\
