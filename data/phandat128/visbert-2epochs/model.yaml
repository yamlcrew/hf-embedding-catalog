  - "Điều 1 . Sửa_đổi , bổ_sung một_số điều của Luật Cán_bộ , công_chức \n 1 . Sửa_đổi , bổ_sung khoản 2 Điều 4 như sau :\
    \ “ 2 . Công_chức là công_dân Việt_Nam , được tuyển_dụng , bổ_nhiệm vào ngạch , chức_vụ , chức_danh tương_ứng với vị_trí\
    \ việc_làm trong cơ_quan của Đảng Cộng_sản Việt_Nam , Nhà_nước , tổ_chức chính_trị - xã_hội ở trung_ương , cấp tỉnh ,\
    \ cấp huyện ; trong cơ_quan , đơn_vị thuộc Quân_đội nhân_dân mà không phải là sĩ_quan , quân_nhân chuyên_nghiệp , công_nhân\
    \ quốc_phòng ; trong cơ_quan , đơn_vị thuộc Công_an nhân_dân mà không phải là sĩ_quan , hạ_sĩ_quan phục_vụ theo chế_độ\
    \ chuyên_nghiệp , công_nhân_công_an , trong biên_chế và hưởng lương từ ngân_sách nhà_nước . ” . 1 . Nhà_nước có chính_sách\
    \ phát_hiện , thu_hút , trọng_dụng và đãi_ngộ xứng_đáng đối_với người có tài_năng . 1 . Căn_cứ vào kết_quả đánh_giá ,\
    \ cán_bộ được xếp loại chất_lượng theo các mức như sau : 1 . Việc tuyển_dụng công_chức được thực_hiện thông_qua thi_tuyển\
    \ hoặc xét tuyển , trừ trường_hợp quy_định tại khoản 3 Điều này . Hình_thức , nội_dung thi_tuyển , xét tuyển công_chức\
    \ phải phù_hợp với yêu_cầu vị_trí việc_làm trong từng ngành , nghề , bảo_đảm lựa_chọn được người có phẩm_chất , trình_độ\
    \ và năng_lực . 1 . Cơ_quan có thẩm_quyền tuyển_dụng công_chức bao_gồm : 1 . Việc nâng ngạch công_chức phải căn_cứ vào\
    \ vị_trí việc_làm , phù_hợp với cơ_cấu ngạch công_chức của cơ_quan , tổ_chức , đơn_vị và được thực_hiện thông_qua thi\
    \ nâng ngạch hoặc xét nâng ngạch . 1 . Công_chức dự thi nâng ngạch phải đáp_ứng đủ tiêu_chuẩn , điều_kiện sau đây : 1\
    \ . Nội_dung và hình_thức thi nâng ngạch , xét nâng ngạch công_chức phải phù_hợp với yêu_cầu về chuyên_môn , nghiệp_vụ\
    \ của ngạch , bảo_đảm lựa_chọn công_chức có năng_lực , trình_độ chuyên_môn , nghiệp_vụ theo tiêu_chuẩn của ngạch và đáp_ứng\
    \ yêu_cầu nhiệm_vụ . 1 . Công_chức được đánh_giá theo các nội_dung sau đây : 1 . Căn_cứ vào kết_quả đánh_giá , công_chức\
    \ được xếp loại chất_lượng theo các mức như sau : 1 . Công_chức vi_phạm_quy_định của Luật này và các quy_định khác của\
    \ pháp_luật có liên_quan thì tùy theo tính_chất , mức_độ vi_phạm phải chịu một trong những hình_thức kỷ_luật sau đây :\
    \ 1 . Thời_hiệu xử_lý kỷ_luật là thời_hạn mà khi hết thời_hạn đó thì cán_bộ , công_chức có hành_vi vi_phạm không bị xử_lý\
    \ kỷ_luật . Thời_hiệu xử_lý kỷ_luật được tính từ thời_điểm có hành_vi vi_phạm . Trừ trường_hợp quy_định tại khoản 2 Điều\
    \ này , thời_hiệu xử_lý kỷ_luật được quy_định như sau : 1 . Cơ_quan có thẩm_quyền của Đảng Cộng_sản Việt_Nam , Ủy_ban\
    \ thường_vụ Quốc_hội , Chính_phủ quy_định cụ_thể việc áp_dụng Luật này đối_với những người được bầu_cử nhưng không thuộc\
    \ đối_tượng quy_định tại khoản 1 Điều 4 của Luật này ; chế_độ phụ_cấp đối_với người đã nghỉ hưu nhưng được bầu_cử giữ\
    \ chức_vụ , chức_danh cán_bộ ."
  - Khoản 1 . Cán_bộ là công_dân Việt_Nam , được bầu_cử , phê_chuẩn , bổ_nhiệm giữ chức_vụ , chức_danh theo nhiệm_kỳ trong
    cơ_quan của Đảng Cộng_sản Việt_Nam , Nhà_nước , tổ_chức chính_trị - xã_hội ở trung_ương , ở tỉnh , thành_phố trực_thuộc
    trung_ương ( sau đây gọi chung là cấp tỉnh ) , ở huyện , quận , thị_xã , thành_phố thuộc tỉnh ( sau đây gọi chung là cấp
    huyện ) , trong biên_chế và hưởng lương từ ngân_sách nhà_nước .
  - "“ Điều 2 . Viên_chức \n Viên_chức là công_dân Việt_Nam được tuyển_dụng theo vị_trí việc_làm , làm_việc tại đơn_vị sự_nghiệp\
    \ công_lập theo chế_độ hợp_đồng làm_việc , hưởng lương từ quỹ lương của đơn_vị sự_nghiệp công_lập theo quy_định của pháp_luật\
    \ . ”"
  - "1 . Công_chức quy_định tại khoản 2 Điều 4 Luật Cán_bộ , công_chức năm 2008 được sửa_đổi , bổ_sung tại khoản 1 Điều 1\
    \ Luật sửa_đổi , bổ_sung một_số điều của Luật Cán_bộ , công_chức và Luật Viên_chức năm 2019 . \n 2 . Cơ_quan quản_lý công_chức\
    \ , bao_gồm : \n a ) Cơ_quan có thẩm_quyền của Đảng Cộng_sản Việt_Nam , Mặt_trận Tổ_quốc Việt_Nam , các tổ_chức chính_trị\
    \ - xã_hội ở Trung_ương ; \n b ) Tỉnh_ủy , thành_ủy trực_thuộc Trung_ương ; \n c ) Văn_phòng Chủ_tịch nước , Văn_phòng\
    \ Quốc_hội , Kiểm_toán Nhà_nước ; \n d ) Tòa_án nhân_dân tối_cao , Viện_Kiểm_sát_nhân_dân tối_cao ; \n đ ) Bộ , cơ_quan\
    \ ngang Bộ và các tổ_chức do Chính_phủ , Thủ_tướng Chính_phủ thành_lập mà không phải là đơn_vị sự_nghiệp công_lập ; \n\
    \ e ) Ủy_ban nhân_dân tỉnh , thành_phố trực_thuộc Trung_ương . \n 3 . Việc tuyển_dụng , sử_dụng và quản_lý đối_với người\
    \ làm_việc trong tổ_chức cơ_yếu được thực_hiện theo quy_định của pháp_luật về cơ_yếu ."
  - "\" Điều 13 . Tiếp_nhận vào làm viên_chức \n 1 . Căn_cứ điều_kiện đăng_ký dự_tuyển viên_chức và theo yêu_cầu của vị_trí\
    \ việc_làm cần tuyển , người đứng đầu_cơ_quan , đơn_vị có thẩm_quyền tuyển_dụng được xem_xét tiếp_nhận vào làm viên_chức\
    \ đối_với các trường_hợp sau : \n a ) Các trường_hợp có ít_nhất 05 năm công_tác ở vị_trí việc_làm yêu_cầu trình_độ đào_tạo\
    \ đại_học trở lên phù_hợp với yêu_cầu của vị_trí việc_làm cần tuyển và có đóng bảo_hiểm xã_hội bắt_buộc ( không kể thời_gian\
    \ tập_sự , thử việc , nếu có thời_gian công_tác có đóng bảo_hiểm xã_hội bắt_buộc không liên_tục mà chưa nhận trợ_cấp bảo_hiểm\
    \ xã_hội một lần thì được cộng dồn , kể_cả thời_gian công_tác nếu có trước đó ở vị_trí công_việc thuộc các đối_tượng quy_định\
    \ tại khoản này ) , gồm : \n Người đang là cán_bộ , công_chức cấp xã ; \n Người đang ký hợp_đồng lao_động làm công_việc\
    \ chuyên_môn , nghiệp_vụ trong đơn_vị sự_nghiệp công_lập hoặc đơn_vị sự_nghiệp ngoài công_lập theo quy_định của pháp_luật\
    \ ; \n Người hưởng lương trong lực_lượng vũ_trang nhân_dân , người làm_việc trong tổ_chức cơ_yếu ; \n Người đang làm_việc\
    \ tại doanh_nghiệp do Nhà_nước nắm giữ 100 % vốn điều_lệ , doanh_nghiệp do Nhà_nước nắm giữ trên 50 % vốn điều_lệ hoặc\
    \ tổng_số cổ_phần có quyền biểu_quyết ; \n Người đang làm_việc trong các tổ_chức chính_trị - xã_hội nghề_nghiệp , tổ_chức\
    \ xã_hội , tổ_chức xã_hội - nghề_nghiệp . \n b ) Người có tài_năng , năng_khiếu đặc_biệt phù_hợp với vị_trí việc_làm trong\
    \ các ngành , lĩnh_vực : Văn_hóa , nghệ_thuật , thể_dục thể_thao , các ngành_nghề truyền_thống . \n c ) Người đã từng\
    \ là cán_bộ , công_chức , viên_chức , sau đó được cấp có thẩm_quyền đồng_ý chuyển đến làm_việc tại lực_lượng vũ_trang\
    \ , cơ_yếu , tổ_chức chính_trị xã_hội - nghề_nghiệp , tổ_chức xã_hội , tổ_chức xã_hội - nghề_nghiệp , doanh_nghiệp do\
    \ Nhà_nước nắm giữ 100 % vốn điều_lệ hoặc doanh_nghiệp do Nhà_nước nắm giữ trên 50 % vốn điều_lệ hoặc tổng_số cổ_phần\
    \ có quyền biểu_quyết . \""
  - "Giải_thích từ_ngữ \n Trong Luật này , các từ_ngữ dưới đây được hiểu như sau : \n ... \n 2 . Người có chức_vụ , quyền_hạn\
