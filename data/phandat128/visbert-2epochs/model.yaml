    \ ; phát_huy nội_lực kết_hợp với mở_rộng hợp_tác quốc_tế . \n 3 . Chính_phủ chỉ_đạo xây_dựng quy_hoạch , kế_hoạch , đề_án\
    \ để phát_triển công_nghiệp quốc_phòng , an_ninh đáp_ứng yêu_cầu , nhiệm_vụ của lực_lượng vũ_trang nhân_dân và sự_nghiệp\
    \ xây_dựng , bảo_vệ Tổ_quốc . \n 4 . Nguyên_tắc , chính_sách , nhiệm_vụ , tổ_chức hoạt_động , quy_hoạch , kế_hoạch , nguồn_lực\
    \ , trách_nhiệm , quyền_hạn của cơ_quan , tổ_chức thực_hiện theo quy_định của pháp_luật về công_nghiệp quốc_phòng , an_ninh\
    \ và quy_định khác của pháp_luật có liên_quan ."
  - "Khoản 8 . Để được kiểm_tra đánh_giá , cấp chứng_chỉ kỹ_năng nghề ở trình_độ kỹ_năng nghề bậc 7 của một nghề , công_nhân\
    \ quốc_phòng phải đáp_ứng được một trong các điều_kiện sau : \n a ) Có chứng_chỉ kỹ_năng nghề bậc 6 tương_ứng với nghề\
    \ kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư này ; \n\
    \ b ) Có chứng_chỉ kỹ_năng nghề bậc 5 tương_ứng với nghề kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định\
