    - "Điều 1 . Sửa_đổi , bổ_sung một_số điều của Luật Cán_bộ , công_chức \n 1 . Sửa_đổi , bổ_sung khoản 2 Điều 4 như sau\
      \ : “ 2 . Công_chức là công_dân Việt_Nam , được tuyển_dụng , bổ_nhiệm vào ngạch , chức_vụ , chức_danh tương_ứng với\
      \ vị_trí việc_làm trong cơ_quan của Đảng Cộng_sản Việt_Nam , Nhà_nước , tổ_chức chính_trị - xã_hội ở trung_ương , cấp\
      \ tỉnh , cấp huyện ; trong cơ_quan , đơn_vị thuộc Quân_đội nhân_dân mà không phải là sĩ_quan , quân_nhân chuyên_nghiệp\
