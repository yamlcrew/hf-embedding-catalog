      \ phục_vụ quốc_phòng , an_ninh được giao , nhưng phải hạch_toán riêng phần hoạt_động_kinh_doanh và thực_hiện nghĩa_vụ\
      \ nộp thuế theo quy_định của pháp_luật ; \n e ) Được nhà_nước cấp kinh_phí cho việc duy_trì , bảo_dưỡng , sửa_chữa các\
      \ dây_chuyền sản_xuất quốc_phòng trong trường_hợp tạm ngừng sản_xuất mà không có khả_năng tự bù_đắp chi_phí ; \n g )\
      \ Được nhà_nước xem_xét hỗ_trợ hai quỹ khen_thưởng và phúc_lợi bằng hai tháng lương_thực_hiện , trong trường_hợp không\
