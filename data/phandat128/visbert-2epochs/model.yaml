      \ trong đề sát_hạch . Vị_trí dừng tàu được xê_dịch trong khoảng cho phép như sau : \n a ) Đối_với phương_tiện động_lực\
      \ chuyên_dùng đường_sắt : Trước không quá 03 mét hoặc vượt không quá 01 mét so với mốc chuẩn ; \n b ) Đối_với tàu khách\
      \ : Trước không quá 06 mét hoặc vượt không quá 02 mét so với mốc chuẩn ; \n c ) Đối_với tàu hàng : Trước không quá 08\
      \ mét hoặc vượt không quá 04 mét so với mốc chuẩn . \n 4 . Kỹ_năng lái tàu : Thí_sinh phải thực_hiện đầy_đủ các yêu_cầu\
      \ kỹ_thuật theo quy_định , lái tàu chạy đúng thời_gian quy_định trong biểu_đồ chạy_tàu , đúng công_lệnh tốc_độ và cảnh_báo\
      \ hiện_hành . \n 5 . Kỹ_năng hãm tàu : Thí_sinh phải thực_hiện đầy_đủ các yêu_cầu kỹ_thuật theo quy_định ."
    - "NỘI_DUNG CỤ_THỂ CỦA TỪNG THỦ_TỤC HÀNH_CHÍNH THUỘC PHẠM_VI CHỨC_NĂNG QUẢN_LÝ CỦA BỘ GIAO_THÔNG VẬN_TẢI \n 1 . Cấp giấy_phép\
      \ lái tàu cho lái tàu trên các tuyến đường_sắt đang khai_thác \n 1.1 . Trình_tự thực_hiện : \n a ) Nộp hồ_sơ TTHC :\
      \ \n - Doanh_nghiệp , cá_nhân có nhu_cầu sát_hạch cấp giấy_phép lái tàu nộp hồ_sơ đến Cục Đường_sắt Việt_Nam . \n b\
      \ ) Giải_quyết TTHC : \n - Cục Đường_sắt Việt_Nam tiếp_nhận và kiểm_tra hồ_sơ . Trường_hợp hồ_sơ không đầy_đủ theo quy_định\
      \ thì Cục Đường_sắt Việt_Nam có trách_nhiệm hướng_dẫn tổ_chức , cá_nhân hoàn_thiện lại ngay trong ngày làm_việc ( đối_với\
      \ trường_hợp nộp hồ_sơ trực_tiếp ) hoặc hướng_dẫn tổ_chức , cá_nhân hoàn_thiện hồ_sơ sau 02 ngày làm_việc , kể từ ngày\
      \ nhận hồ_sơ ( đối_với trường_hợp nhận hồ_sơ qua đường bưu_chính hoặc bằng hình_thức phù_hợp khác ) . \n - Trong thời_hạn\
      \ 02 ngày làm_việc kể từ ngày nhận được hồ_sơ đầy_đủ theo quy_định , Cục Đường_sắt Việt_Nam quyết_định thành_lập Hội_đồng\
      \ sát_hạch cấp giấy_phép lái tàu , Tổ sát_hạch theo quy_định tại Điều 29 , Điều 30 Thông_tư này và thông_báo bằng văn_bản\
      \ cho doanh_nghiệp , cá_nhân thời_gian , địa_điểm sát_hạch . Trong 03 ngày làm_việc , kể từ ngày có kết_quả sát_hạch\
      \ , Cục Đường_sắt Việt_Nam thực_hiện cấp giấy_phép lái tàu . Trường_hợp không đủ điều_kiện cấp giấy_phép lái tàu phải\
      \ có văn_bản trả_lời và nêu rõ lý_do . \n 1.2 . Cách_thức thực_hiện : \n - Nộp sơ trực_tiếp hoặc qua hệ_thống bưu_chính\
      \ hoặc các hình_thức phù_hợp khác . \n ..."
    - "Hội_đồng sát_hạch cấp giấy_phép lái tàu \n 1 . Hội_đồng sát_hạch cấp giấy_phép lái tàu ( sau đây gọi là Hội_đồng sát_hạch\
      \ ) do Cục_trưởng Cục Đường_sắt Việt_Nam thành_lập . \n 2 . Thành_phần của Hội_đồng sát_hạch có từ 05 đến 07 thành_viên\
      \ , gồm : \n a ) Chủ_tịch Hội_đồng là lãnh_đạo Cục Đường_sắt Việt_Nam hoặc người được Cục_trưởng Cục Đường_sắt Việt_Nam_ủy\
      \ quyền ; \n b ) Phó_Chủ_tịch Hội_đồng là lãnh_đạo doanh_nghiệp có thí_sinh tham_dự kỳ sát_hạch ; \n c ) Các thành_viên\
      \ khác của Hội_đồng do Cục_trưởng Cục Đường_sắt Việt_Nam quyết_định . \n d ) Thành_phần Hội_đồng sát_hạch cấp giấy_phép\
      \ lái tàu cho những lái tàu đầu_tiên trên các tuyến đường_sắt đô_thị mới đưa vào khai_thác , vận_hành có công_nghệ lần\
      \ đầu sử_dụng tại Việt_Nam : ngoài thành_phần quy_định tại điểm a , điểm b và điểm c khoản này phải có thêm thành_phần\
      \ Chủ đầu_tư dự_án ( hoặc tổ_chức được Chủ đầu_tư dự_án giao quản_lý dự_án đường_sắt đô_thị ) . \n ..."
    - "Điều 68 . Cơ_quan cấp giấy_phép lái tàu \n 1 . Tổ_chức sát_hạch , cấp , cấp lại , thu_hồi giấy_phép lái tàu theo thẩm_quyền\
      \ , thủ_tục theo đúng quy_định tại Thông_tư này . \n 2 . Tổ_chức theo_dõi , quản_lý việc sử_dụng phôi giấy_phép lái\
      \ tàu theo thẩm_quyền quy_định tại Thông_tư này . \n 3 . Thu và sử_dụng lệ_phí cấp , cấp lại giấy_phép lái tàu theo\
      \ quy_định của pháp_luật . \n 4 . Thực_hiện chế_độ báo_cáo theo quy_định tại Thông_tư này . \n 5 . Thực_hiện cập_nhật\
      \ dữ_liệu theo thẩm_quyền vào cơ_sở dữ_liệu quản_lý nhân_viên đường_sắt trực_tiếp phục_vụ chạy_tàu của Cục Đường_sắt\
      \ Việt_Nam theo quy_định . \n 6 . Đối_với Cục Đường_sắt Việt_Nam , ngoài các trách_nhiệm nêu trên còn có trách_nhiệm\
      \ tổ_chức bồi_dưỡng , cập_nhật kiến_thức , cấp thẻ sát_hạch viên theo quy_định tại Thông_tư này ; tổ_chức kiểm_tra ,\
      \ hướng_dẫn cơ_quan cấp giấy_phép lái tàu của địa_phương thực_hiện quy_định của Thông_tư này . \n 7 . Hồ_sơ , tài_liệu\
      \ sát_hạch , cấp , cấp lại giấy_phép lái tàu được lưu_trữ tại cơ_quan cấp giấy_phép lái tàu trong thời_hạn tối_thiểu\
      \ 20 năm . Việc tiêu_hủy tài_liệu hết thời_hạn lưu_trữ theo quy_định hiện_hành ."
    - Thông_tư này quy_định về tiêu_chuẩn , nhiệm_vụ , quyền_hạn đối_với các chức_danh_nhân_viên đường_sắt trực_tiếp phục_vụ
      chạy_tàu ; nội_dung , chương_trình đào_tạo chức_danh_nhân_viên đường_sắt trực_tiếp phục_vụ chạy_tàu ; điều_kiện , nội_dung
      , quy_trình sát_hạch và cấp , cấp lại , thu_hồi giấy_phép lái tàu trên đường_sắt .
    - "1 . Tiêu_chuẩn : \n a ) Có bằng tốt_nghiệp trình_độ cao_đẳng trở lên về điều_hành chạy_tàu_hỏa hoặc vận_tải đường_sắt\
      \ đối_với nhân_viên điều_độ chạy_tàu ga trên đường_sắt quốc_gia và đường_sắt chuyên_dùng có nối ray với đường_sắt quốc_gia\
      \ ; có bằng tốt_nghiệp trình_độ trung_cấp trở lên về điều_hành chạy_tàu_hỏa hoặc vận_tải đường_sắt đối_với nhân_viên\
      \ điều_độ chạy_tàu ga trên đường_sắt chuyên_dùng không nối ray với đường_sắt quốc_gia ; \n b ) Có đủ điều_kiện sức_khỏe\
      \ theo quy_định của Bộ_trưởng Bộ Y_tế ; \n c ) Có ít_nhất 01 năm đảm_nhận trực_tiếp công_việc của chức_danh trực_ban\
      \ chạy_tàu ga ; \n d ) Đạt yêu_cầu sát_hạch về nghiệp_vụ điều_độ chạy_tàu ga do doanh_nghiệp sử_dụng chức_danh điều_độ\
      \ chạy_tàu ga tổ_chức . \n 2 . Nhiệm_vụ : Trực_tiếp lập và tổ_chức thực_hiện kế_hoạch về lập tàu , xếp , dỡ hàng_hóa\
      \ , đón tiễn hành_khách , tổ_chức công_tác dồn , đón tiễn tàu và các việc liên_quan khác tại nhà_ga theo biểu_đồ chạy_tàu\
      \ , theo các mệnh_lệnh của nhân_viên điều_độ chạy_tàu tuyến , theo quy_chuẩn kỹ_thuật quốc_gia về khai_thác đường_sắt\
      \ , tín_hiệu đường_sắt , quy_trình chạy_tàu và công_tác dồn đường_sắt . \n 3 . Quyền_hạn : \n a ) Tạm đình_chỉ chạy_tàu\
      \ trong khu_vực ga nếu xét thấy có nguy_cơ mất an_toàn chạy_tàu và phải báo ngay cho nhân_viên điều_độ chạy_tàu tuyến\
      \ biết ; \n b ) Đình_chỉ nhiệm_vụ đối_với các chức_danh trực_ban chạy_tàu ga , trưởng dồn , nhân_viên gác ghi , ghép_nối\
      \ đầu_máy toa_xe khi lên ban có hành_vi vi_phạm_quy_chuẩn kỹ_thuật quốc_gia về khai_thác đường_sắt , tín_hiệu đường_sắt\
      \ , quy_trình chạy_tàu và công_tác dồn đường_sắt , quy_trình tác_nghiệp uy_hiếp đến an_toàn chạy_tàu và báo ngay cho\
      \ trưởng ga để bố_trí người thay_thế ; \n c ) Báo_cáo và đề_nghị doanh_nghiệp sử_dụng các chức_danh trưởng tàu , phó_trưởng\
      \ tàu khách phụ_trách an_toàn , lái tàu , phụ lái tàu đình_chỉ nhiệm_vụ khi lên ban có hành_vi vi_phạm_quy_chuẩn kỹ_thuật\
      \ quốc_gia về khai_thác đường_sắt , tín_hiệu đường_sắt , quy_trình chạy_tàu và công_tác dồn đường_sắt , quy_trình tác_nghiệp\
      \ uy_hiếp an_toàn chạy_tàu ."
    - "Thực_hiện sát_hạch đối_với lái tàu đầu_tiên trên các tuyến đường_sắt đô_thị mới đưa vào khai_thác có công_nghệ lần\
      \ đầu sử_dụng tại Việt_Nam \n ... \n 4 . Trách_nhiệm , quyền_hạn của Hội_đồng sát_hạch \n a ) Kiểm_tra tính đầy_đủ ,\
      \ hợp_lệ về các nội_dung của hồ_sơ đề_nghị cấp giấy_phép lái tàu và đánh_giá về điều_kiện cấp giấy_phép lái tàu của\
      \ nhân_sự theo quy_định của Thông_tư này ; \n b ) Lập Biên_bản làm_việc của Hội_đồng sát_hạch theo mẫu quy_định tại\
      \ Phụ_lục XIII ban_hành kèm theo Thông_tư này ; \n c ) Tổng_hợp , báo_cáo kết_quả kiểm_tra , đánh_giá hồ_sơ theo quy_định\
      \ và đề_xuất , kiến_nghị cơ_quan cấp giấy_phép lái tàu cấp hoặc không cấp giấy_phép lái tàu cho thí_sinh , theo mẫu\
      \ quy_định tại Phụ_lục XIV ban_hành kèm theo Thông_tư này . \n 5 . Thí_sinh được công_nhận đạt yêu_cầu khi được Hội_đồng\
      \ sát_hạch đánh_giá hồ_sơ đầy_đủ , hợp_lệ theo quy_định ."
  - source_sentence: Khi nào cờ truyền_thống của công_chức hải_quan được dùng ?
    sentences:
