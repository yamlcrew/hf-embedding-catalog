    \ với nghề kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư\
    \ này ; \n d ) Có chứng_chỉ kỹ_năng nghề bậc 3 hoặc bằng tốt_nghiệp cao_đẳng , cao_đẳng nghề tương_ứng với nghề kiểm_tra\
    \ và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư này ; \n đ ) Có\
    \ chứng_chỉ kỹ_năng nghề bậc 2 hoặc bằng tốt_nghiệp trung_cấp , trung_cấp nghề , trung_cấp chuyên_nghiệp tương_ứng với\
    \ nghề kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư này\
    \ ; \n e ) Có chứng_chỉ kỹ_năng nghề bậc 1 hoặc chứng_chỉ sơ_cấp , bằng nghề công_nhân kỹ_thuật tương_ứng với nghề kiểm_tra\
    \ và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư này ."
  - "Ngoài các điều_kiện quy_định tại Điều 7 và Điều 8 Nghị_định này , cơ_sở kinh_doanh dưới đây phải đáp_ứng các điều_kiện\
    \ sau : \n 1 . Chỉ cơ_sở kinh_doanh thuộc Bộ Công_an mới được sản_xuất con_dấu có hình Quốc_huy nước Cộng_hòa xã_hội chủ_nghĩa\
    \ Việt_Nam , con_dấu có hình Công_an hiệu ; chỉ cơ_sở kinh_doanh thuộc Bộ Quốc_phòng mới được sản_xuất con_dấu có hình\
    \ Quân_hiệu , trừ các cơ_sở kinh_doanh đã hoạt_động trước ngày Nghị_định này có hiệu_lực . \n 2 . Chỉ cơ_sở kinh_doanh\
    \ thuộc Bộ Quốc_phòng và Bộ Công_an mới được kinh_doanh : Súng bắn_sơn ( không bao_gồm cơ_sở kinh_doanh cung_ứng dịch_vụ\
    \ sử_dụng súng bắn_sơn ) ; quân_trang , quân_dụng cho lực_lượng vũ_trang , vũ_khí quân_dụng , trang thiết_bị , kỹ_thuật\
    \ , khí_tài , phương_tiện chuyên_dùng cho Quân_sự , Công_an ; linh_kiện , bộ_phận , phụ_tùng , vật_tư và trang thiết_bị\
    \ đặc_chủng , công_nghệ chuyên dùng chế_tạo chúng . \n 3 . Chỉ cơ_sở kinh_doanh ngoài Quân_đội , Công_an được cơ_quan\
    \ có thẩm_quyền của Quân_đội hoặc Công_an theo quy_định của Bộ Quốc_phòng , Bộ Công_an có văn_bản chấp_thuận hoặc có hợp_đồng\
    \ theo quy_định của pháp_luật mới được kinh_doanh quân_trang , quân_dụng cho lực_lượng vũ_trang , vũ_khí quân_dụng , trang\
    \ thiết_bị , kỹ_thuật , khí_tài , phương_tiện chuyên_dùng cho Quân_sự , Công_an ; linh_kiện , bộ_phận , phụ_tùng , vật_tư\
    \ và trang thiết_bị đặc_chủng , công_nghệ chuyên dùng chế_tạo chúng . \n 4 . Chỉ cơ_sở kinh_doanh thuộc Bộ Quốc_phòng\
    \ và Bộ Công_an mới được kinh_doanh thiết_bị gây nhiễu , phá sóng thông_tin di_động . \n 5 . Chỉ cơ_sở kinh_doanh thuộc\
    \ Bộ Quốc_phòng mới được kinh_doanh các loại pháo ."
