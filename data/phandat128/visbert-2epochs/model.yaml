      \ \n 2 . Người lao_động trong cơ_sở công_nghiệp quốc_phòng nòng_cốt được hưởng các chế_độ , chính_sách như sau : \n\
      \ a ) Lao_động là sĩ_quan , quân_nhân chuyên_nghiệp được hưởng chế_độ , chính_sách theo quy_định của pháp_luật đối_với\
      \ sĩ_quan và quân_nhân chuyên_nghiệp , trừ tiền_lương_thực lĩnh hàng tháng theo kết_quả sản_xuất kinh_doanh ; \n b )\
      \ Lao_động có trình_độ đại_học trở lên , công_nhân kỹ_thuật những ngành_nghề đặc_thù quốc_phòng , công_nhân kỹ_thuật\
      \ đầu ngành được hưởng phụ_cấp thu_hút ; \n c ) Lao_động trực_tiếp tham_gia nghiên_cứu , chế_tạo , sửa_chữa , bảo_quản\
      \ , vận_chuyển sản_phẩm quốc_phòng là vũ_khí , trang_bị hoặc đảm_nhiệm công_việc đòi_hỏi trách_nhiệm cao được hưởng\
      \ phụ_cấp trách_nhiệm trong thời_gian thực_hiện nhiệm_vụ ; được hưởng phụ_cấp độc_hại , nguy_hiểm đối_với ngành_nghề\
      \ , công_việc quốc_phòng đặc_thù ; \n d ) Công_nhân quốc_phòng , ngoài chế_độ tiền_lương còn được hưởng thêm chế_độ\
      \ phụ_cấp lương theo quy_định của pháp_luật về chế_độ tiền_lương đối_với cán_bộ , công_chức , viên_chức và lực_lượng\
      \ vũ_trang ; \n đ ) Lao_động trong biên_chế thuộc các dây_chuyền sản_xuất quốc_phòng trong thời_gian tạm ngừng sản_xuất\
      \ quốc_phòng mà doanh_nghiệp không đủ điều_kiện bù_đắp chi_phí thì được nhà_nước hỗ_trợ lương ; \n e ) Lao_động khi\
      \ làm nhiệm_vụ phục_vụ quốc_phòng , an_ninh ở địa_bàn có điều_kiện kinh_tế - xã_hội đặc_biệt khó_khăn ; khi thực_hiện\
      \ công_việc cấp_bách , nguy_hiểm phục_vụ quốc_phòng , an_ninh mà bị tai_nạn thì được xét hưởng chế_độ thương_binh hoặc\
      \ nếu bị chết thì được xét hưởng chế_độ liệt_sĩ theo quy_định của pháp_luật về ưu_đãi người có công với cách_mạng .\
      \ \n 3 . Bộ Quốc_phòng chủ_trì , phối_hợp với các Bộ , ngành có liên_quan hướng_dẫn thực_hiện chế_độ , chính_sách đối_với\
      \ cơ_sở và lao_động trong cơ_sở công_nghiệp quốc_phòng nòng_cốt quy_định tại khoản 1 , khoản 2 Điều này ."
    - "Điều 13 . Điều_kiện xác_định doanh_nghiệp quốc_phòng , an_ninh . . Doanh_nghiệp được xác_định là doanh_nghiệp quốc_phòng\
      \ , an_ninh trong các trường_hợp sau : \n 1 . Đảm_bảo đồng_thời các điều_kiện sau : \n a ) Là công_ty trách_nhiệm hữu_hạn\
      \ một thành_viên do Bộ Quốc_phòng , Bộ Công_an thực_hiện quyền đại_diện chủ sở_hữu nhà_nước tại doanh_nghiệp . \n b\
      \ ) Có ngành , lĩnh_vực và địa_bàn hoạt_động quy_định tại Phụ_lục 1 về Danh_mục ngành , lĩnh_vực hoặc địa_bàn trực_tiếp\
      \ phục_vụ quốc_phòng , an_ninh kèm theo Nghị_định này . \n c ) Được Bộ Quốc_phòng , Bộ Công_an giao nhiệm_vụ sản_xuất\
      \ , cung_ứng các sản_phẩm , dịch_vụ quốc_phòng , an_ninh hoặc thực_hiện nhiệm_vụ quốc_phòng , an_ninh bằng nguồn_lực\
      \ của Nhà_nước hoặc nguồn_lực của doanh_nghiệp phù_hợp với mục_tiêu đầu_tư , thành_lập doanh_nghiệp . \n 2 . Các trường_hợp\
      \ khác do Thủ_tướng Chính_phủ xem_xét , quyết_định để đáp_ứng yêu_cầu , nhiệm_vụ quốc_phòng , an_ninh từng thời_kỳ ."
    - "Điều_kiện tổ_chức đánh_giá , nghiệm_thu cấp Bộ Quốc_phòng \n 1 . Dự_án đầu_tư được Hội_đồng Khoa_học và Công_nghệ cấp\
      \ Cơ_sở đánh_giá ở mức “ Đạt ” và có đủ hồ_sơ quy_định tại Điều 10 của Thông_tư này . \n 2 . Tờ_trình của cơ_quan ,\
      \ đơn_vị trực_thuộc Bộ Quốc_phòng đề_nghị đánh_giá , nghiệm_thu cấp Bộ Quốc_phòng ( theo Mẫu_số 10 . PL1 tại Phụ_lục\
      \ I ban_hành kèm theo Thông_tư này ) ."
    - "Cơ_sở công_nghiệp quốc_phòng \n 1 . Tiêu_chí để được công_nhận là cơ_sở công_nghiệp quốc_phòng \n a ) Được cơ_quan\
      \ nhà_nước có thẩm_quyền quyết_định thành_lập theo quy_định của pháp_luật ; \n b ) Đủ điều_kiện , thủ_tục tham_gia hoạt_động\
      \ công_nghiệp quốc_phòng theo quyết_định của Thủ_tướng Chính_phủ ; \n c ) Được Nhà_nước đặt_hàng hoặc giao kế_hoạch\
      \ để sản_xuất , cung_ứng một hoặc một_số sản_phẩm , chi_tiết sản_phẩm , dịch_vụ phục_vụ quốc_phòng , an_ninh . \n 2\
      \ . Bộ Quốc_phòng chủ_trì , phối_hợp với Bộ Công_Thương và Bộ , ngành liên_quan lập danh_sách các cơ_sở công_nghiệp\
      \ quốc_phòng trình Thủ_tướng Chính_phủ_phê_duyệt trên cơ_sở tiêu_chí được quy_định tại khoản 1 Điều này . \n 3 . Hàng\
      \ năm , Bộ Quốc_phòng chủ_trì , phối_hợp với các Bộ , ngành , cơ_quan liên_quan xác_định trình Thủ_tướng Chính_phủ quyết_định\
      \ việc sửa_đổi , bổ_sung Danh_sách cơ_sở công_nghiệp quốc_phòng ."
    - "Kế_hoạch xây_dựng và phát_triển công_nghiệp quốc_phòng \n ... \n 2 . Căn_cứ để xây_dựng kế_hoạch xây_dựng và phát_triển\
      \ công_nghiệp quốc_phòng bao_gồm : \n a ) Nhiệm_vụ quốc_phòng , an_ninh và nhiệm_vụ phát_triển kinh_tế - xã_hội của\
      \ đất_nước ; \n b ) Chiến_lược bảo_đảm vũ_khí , trang_bị kỹ_thuật quân_sự cho lực_lượng vũ_trang nhân_dân ; \n c ) Quy_hoạch\
      \ hệ_thống các công_trình quốc_phòng , khu quân_sự , kho đạn_dược , công_nghiệp quốc_phòng ; \n d ) Kế_hoạch phát_triển\
      \ công_nghiệp quốc_gia , khả_năng cân_đối các nguồn_lực đầu_tư của Nhà_nước cho xây_dựng và phát_triển công_nghiệp quốc_phòng\
      \ ."
    - "Công_nghiệp quốc_phòng , an_ninh \n 1 . Công_nghiệp quốc_phòng , an_ninh là bộ_phận của công_nghiệp quốc_gia , một\
      \ phần quan_trọng của thực_lực , tiềm_lực quốc_phòng , an_ninh , là ngành đặc_thù , có nhiệm_vụ nghiên_cứu phát_triển\
      \ , sản_xuất , sửa_chữa , cải_tiến , hiện_đại_hóa vũ_khí , trang_bị , vật_tư , thiết_bị kỹ_thuật và các sản_phẩm khác\
      \ phục_vụ quốc_phòng , an_ninh bảo_đảm trang_bị cho lực_lượng vũ_trang nhân_dân . \n 2 . Nhà_nước có chính_sách , cơ_chế\
      \ đặc_thù , xây_dựng công_nghiệp quốc_phòng , an_ninh theo hướng lưỡng_dụng , trở_thành mũi_nhọn của công_nghiệp quốc_gia\
      \ ; tăng_cường tiềm_lực , tận_dụng và phát_triển liên_kết công_nghiệp quốc_phòng , an_ninh và công_nghiệp dân_sinh ;\
      \ huy_động tối_đa thành_tựu của nền công_nghiệp quốc_gia phục_vụ công_nghiệp quốc_phòng , an_ninh ; đầu_tư có trọng_điểm\
      \ cho vũ_khí , trang_bị công_nghệ_cao ; phát_huy nội_lực kết_hợp với mở_rộng hợp_tác quốc_tế . \n 3 . Chính_phủ chỉ_đạo\
      \ xây_dựng quy_hoạch , kế_hoạch , đề_án để phát_triển công_nghiệp quốc_phòng , an_ninh đáp_ứng yêu_cầu , nhiệm_vụ của\
      \ lực_lượng vũ_trang nhân_dân và sự_nghiệp xây_dựng , bảo_vệ Tổ_quốc . \n 4 . Nguyên_tắc , chính_sách , nhiệm_vụ , tổ_chức\
      \ hoạt_động , quy_hoạch , kế_hoạch , nguồn_lực , trách_nhiệm , quyền_hạn của cơ_quan , tổ_chức thực_hiện theo quy_định\
      \ của pháp_luật về công_nghiệp quốc_phòng , an_ninh và quy_định khác của pháp_luật có liên_quan ."
    - "Khoản 8 . Để được kiểm_tra đánh_giá , cấp chứng_chỉ kỹ_năng nghề ở trình_độ kỹ_năng nghề bậc 7 của một nghề , công_nhân\
      \ quốc_phòng phải đáp_ứng được một trong các điều_kiện sau : \n a ) Có chứng_chỉ kỹ_năng nghề bậc 6 tương_ứng với nghề\
      \ kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư này ;\
      \ \n b ) Có chứng_chỉ kỹ_năng nghề bậc 5 tương_ứng với nghề kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được\
      \ quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư này ; \n c ) Có chứng_chỉ kỹ_năng nghề bậc 4 hoặc bằng tốt_nghiệp\
      \ đại_học tương_ứng với nghề kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành\
      \ kèm theo Thông_tư này ; \n d ) Có chứng_chỉ kỹ_năng nghề bậc 3 hoặc bằng tốt_nghiệp cao_đẳng , cao_đẳng nghề tương_ứng\
      \ với nghề kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư\
      \ này ; \n đ ) Có chứng_chỉ kỹ_năng nghề bậc 2 hoặc bằng tốt_nghiệp trung_cấp , trung_cấp nghề , trung_cấp chuyên_nghiệp\
      \ tương_ứng với nghề kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm\
      \ theo Thông_tư này ; \n e ) Có chứng_chỉ kỹ_năng nghề bậc 1 hoặc chứng_chỉ sơ_cấp , bằng nghề công_nhân kỹ_thuật tương_ứng\
      \ với nghề kiểm_tra và có thời_gian làm_việc liên_tục trong nghề được quy_định tại Phụ_lục 1 ban_hành kèm theo Thông_tư\
      \ này ."
    - "Ngoài các điều_kiện quy_định tại Điều 7 và Điều 8 Nghị_định này , cơ_sở kinh_doanh dưới đây phải đáp_ứng các điều_kiện\
      \ sau : \n 1 . Chỉ cơ_sở kinh_doanh thuộc Bộ Công_an mới được sản_xuất con_dấu có hình Quốc_huy nước Cộng_hòa xã_hội\
      \ chủ_nghĩa Việt_Nam , con_dấu có hình Công_an hiệu ; chỉ cơ_sở kinh_doanh thuộc Bộ Quốc_phòng mới được sản_xuất con_dấu\
      \ có hình Quân_hiệu , trừ các cơ_sở kinh_doanh đã hoạt_động trước ngày Nghị_định này có hiệu_lực . \n 2 . Chỉ cơ_sở\
      \ kinh_doanh thuộc Bộ Quốc_phòng và Bộ Công_an mới được kinh_doanh : Súng bắn_sơn ( không bao_gồm cơ_sở kinh_doanh cung_ứng\
      \ dịch_vụ sử_dụng súng bắn_sơn ) ; quân_trang , quân_dụng cho lực_lượng vũ_trang , vũ_khí quân_dụng , trang thiết_bị\
      \ , kỹ_thuật , khí_tài , phương_tiện chuyên_dùng cho Quân_sự , Công_an ; linh_kiện , bộ_phận , phụ_tùng , vật_tư và\
      \ trang thiết_bị đặc_chủng , công_nghệ chuyên dùng chế_tạo chúng . \n 3 . Chỉ cơ_sở kinh_doanh ngoài Quân_đội , Công_an\
      \ được cơ_quan có thẩm_quyền của Quân_đội hoặc Công_an theo quy_định của Bộ Quốc_phòng , Bộ Công_an có văn_bản chấp_thuận\
      \ hoặc có hợp_đồng theo quy_định của pháp_luật mới được kinh_doanh quân_trang , quân_dụng cho lực_lượng vũ_trang , vũ_khí\
      \ quân_dụng , trang thiết_bị , kỹ_thuật , khí_tài , phương_tiện chuyên_dùng cho Quân_sự , Công_an ; linh_kiện , bộ_phận\
      \ , phụ_tùng , vật_tư và trang thiết_bị đặc_chủng , công_nghệ chuyên dùng chế_tạo chúng . \n 4 . Chỉ cơ_sở kinh_doanh\
      \ thuộc Bộ Quốc_phòng và Bộ Công_an mới được kinh_doanh thiết_bị gây nhiễu , phá sóng thông_tin di_động . \n 5 . Chỉ\
      \ cơ_sở kinh_doanh thuộc Bộ Quốc_phòng mới được kinh_doanh các loại pháo ."
