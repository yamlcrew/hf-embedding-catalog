- source_sentence: Tiêu_chí để được công_nhận là cơ_sở công_nghiệp quốc_phòng là gì ?
  sentences:
  - "1 . Cơ_sở công_nghiệp quốc_phòng nòng_cốt khi trực_tiếp thực_hiện nhiệm_vụ phục_vụ quốc_phòng được hưởng chính_sách ưu_tiên\
    \ , ưu_đãi và hỗ_trợ đầu_tư , cụ_thể sau : \n a ) Được Nhà_nước đầu_tư đủ vốn để hình_thành_tài_sản trực_tiếp sản_xuất\
    \ , cung_ứng sản_phẩm , dịch_vụ công_ích ; \n b ) Được Nhà_nước đầu_tư kết_cấu_hạ_tầng về giao_thông , năng_lượng đối_với\
    \ nơi chưa có sẵn các hệ_thống bảo_đảm giao_thông và cung_cấp năng_lượng ; \n c ) Được miễn tiền thuê đất , tiền_sử_dụng\
    \ đất và thuế sử_dụng đất đối_với diện_tích đất cần_thiết được sử_dụng trong thời_gian trực_tiếp phục_vụ nhiệm_vụ quốc_phòng\
    \ ; được miễn tiền thuế giá_trị gia_tăng đối_với một_số sản_phẩm phục_vụ quốc_phòng , an_ninh theo quy_định của pháp_luật\
    \ về Thuế giá_trị gia_tăng ; \n d ) Được hạch_toán một_số khoản chi_phí đặc_thù vào giá_thành sản_phẩm , dịch_vụ phục_vụ\
    \ quốc_phòng , bao_gồm : chi_phí trả lương cho người nghỉ chuẩn_bị hưu ( trường_hợp không được ngân_sách nhà_nước hỗ_trợ\
    \ hoặc có hỗ_trợ nhưng không đủ ) ; chi đảm_bảo quân_trang cho sĩ_quan , quân_nhân chuyên_nghiệp , công_nhân_viên quốc_phòng\
    \ ; \n đ ) Được sử_dụng các nguồn_lực được giao để tổ_chức sản_xuất , cung_ứng sản_phẩm , dịch_vụ phục_vụ quốc_phòng và\
    \ hoạt_động_kinh_doanh bổ_sung khi không ảnh_hưởng tới việc thực_hiện nhiệm_vụ trực_tiếp phục_vụ quốc_phòng , an_ninh\
    \ được giao , nhưng phải hạch_toán riêng phần hoạt_động_kinh_doanh và thực_hiện nghĩa_vụ nộp thuế theo quy_định của pháp_luật\
    \ ; \n e ) Được nhà_nước cấp kinh_phí cho việc duy_trì , bảo_dưỡng , sửa_chữa các dây_chuyền sản_xuất quốc_phòng trong\
    \ trường_hợp tạm ngừng sản_xuất mà không có khả_năng tự bù_đắp chi_phí ; \n g ) Được nhà_nước xem_xét hỗ_trợ hai quỹ khen_thưởng\
    \ và phúc_lợi bằng hai tháng lương_thực_hiện , trong trường_hợp không đủ nguồn để trích_lập hai quỹ đó ; \n h ) Được nhà_nước\
    \ hỗ_trợ kinh_phí nhà_trẻ , giáo_dục tại địa_bàn chưa có trường lớp theo hệ_thống giáo_dục công_lập ; kinh_phí y_tế đối_với\
    \ những nơi do điều_kiện đặc_biệt phải duy_trì bệnh_xá ; \n i ) Cơ_sở công_nghiệp quốc_phòng nòng_cốt hoạt_động trên các\
    \ địa_bàn chiến_lược , kết_hợp nhiệm_vụ kinh_tế với nhiệm_vụ quốc_phòng được hưởng chế_độ , chính_sách ưu_đãi và hỗ_trợ\
    \ khác theo quyết_định của Thủ_tướng Chính_phủ . \n 2 . Người lao_động trong cơ_sở công_nghiệp quốc_phòng nòng_cốt được\
    \ hưởng các chế_độ , chính_sách như sau : \n a ) Lao_động là sĩ_quan , quân_nhân chuyên_nghiệp được hưởng chế_độ , chính_sách\
    \ theo quy_định của pháp_luật đối_với sĩ_quan và quân_nhân chuyên_nghiệp , trừ tiền_lương_thực lĩnh hàng tháng theo kết_quả\
    \ sản_xuất kinh_doanh ; \n b ) Lao_động có trình_độ đại_học trở lên , công_nhân kỹ_thuật những ngành_nghề đặc_thù quốc_phòng\
    \ , công_nhân kỹ_thuật đầu ngành được hưởng phụ_cấp thu_hút ; \n c ) Lao_động trực_tiếp tham_gia nghiên_cứu , chế_tạo\
    \ , sửa_chữa , bảo_quản , vận_chuyển sản_phẩm quốc_phòng là vũ_khí , trang_bị hoặc đảm_nhiệm công_việc đòi_hỏi trách_nhiệm\
    \ cao được hưởng phụ_cấp trách_nhiệm trong thời_gian thực_hiện nhiệm_vụ ; được hưởng phụ_cấp độc_hại , nguy_hiểm đối_với\
    \ ngành_nghề , công_việc quốc_phòng đặc_thù ; \n d ) Công_nhân quốc_phòng , ngoài chế_độ tiền_lương còn được hưởng thêm\
    \ chế_độ phụ_cấp lương theo quy_định của pháp_luật về chế_độ tiền_lương đối_với cán_bộ , công_chức , viên_chức và lực_lượng\
    \ vũ_trang ; \n đ ) Lao_động trong biên_chế thuộc các dây_chuyền sản_xuất quốc_phòng trong thời_gian tạm ngừng sản_xuất\
    \ quốc_phòng mà doanh_nghiệp không đủ điều_kiện bù_đắp chi_phí thì được nhà_nước hỗ_trợ lương ; \n e ) Lao_động khi làm\
    \ nhiệm_vụ phục_vụ quốc_phòng , an_ninh ở địa_bàn có điều_kiện kinh_tế - xã_hội đặc_biệt khó_khăn ; khi thực_hiện công_việc\
    \ cấp_bách , nguy_hiểm phục_vụ quốc_phòng , an_ninh mà bị tai_nạn thì được xét hưởng chế_độ thương_binh hoặc nếu bị chết\
    \ thì được xét hưởng chế_độ liệt_sĩ theo quy_định của pháp_luật về ưu_đãi người có công với cách_mạng . \n 3 . Bộ Quốc_phòng\
    \ chủ_trì , phối_hợp với các Bộ , ngành có liên_quan hướng_dẫn thực_hiện chế_độ , chính_sách đối_với cơ_sở và lao_động\
    \ trong cơ_sở công_nghiệp quốc_phòng nòng_cốt quy_định tại khoản 1 , khoản 2 Điều này ."
  - "Điều 13 . Điều_kiện xác_định doanh_nghiệp quốc_phòng , an_ninh . . Doanh_nghiệp được xác_định là doanh_nghiệp quốc_phòng\
    \ , an_ninh trong các trường_hợp sau : \n 1 . Đảm_bảo đồng_thời các điều_kiện sau : \n a ) Là công_ty trách_nhiệm hữu_hạn\
    \ một thành_viên do Bộ Quốc_phòng , Bộ Công_an thực_hiện quyền đại_diện chủ sở_hữu nhà_nước tại doanh_nghiệp . \n b )\
    \ Có ngành , lĩnh_vực và địa_bàn hoạt_động quy_định tại Phụ_lục 1 về Danh_mục ngành , lĩnh_vực hoặc địa_bàn trực_tiếp\
    \ phục_vụ quốc_phòng , an_ninh kèm theo Nghị_định này . \n c ) Được Bộ Quốc_phòng , Bộ Công_an giao nhiệm_vụ sản_xuất\
    \ , cung_ứng các sản_phẩm , dịch_vụ quốc_phòng , an_ninh hoặc thực_hiện nhiệm_vụ quốc_phòng , an_ninh bằng nguồn_lực của\
    \ Nhà_nước hoặc nguồn_lực của doanh_nghiệp phù_hợp với mục_tiêu đầu_tư , thành_lập doanh_nghiệp . \n 2 . Các trường_hợp\
    \ khác do Thủ_tướng Chính_phủ xem_xét , quyết_định để đáp_ứng yêu_cầu , nhiệm_vụ quốc_phòng , an_ninh từng thời_kỳ ."
  - "Điều_kiện tổ_chức đánh_giá , nghiệm_thu cấp Bộ Quốc_phòng \n 1 . Dự_án đầu_tư được Hội_đồng Khoa_học và Công_nghệ cấp\
    \ Cơ_sở đánh_giá ở mức “ Đạt ” và có đủ hồ_sơ quy_định tại Điều 10 của Thông_tư này . \n 2 . Tờ_trình của cơ_quan , đơn_vị\
    \ trực_thuộc Bộ Quốc_phòng đề_nghị đánh_giá , nghiệm_thu cấp Bộ Quốc_phòng ( theo Mẫu_số 10 . PL1 tại Phụ_lục I ban_hành\
    \ kèm theo Thông_tư này ) ."
  - "Cơ_sở công_nghiệp quốc_phòng \n 1 . Tiêu_chí để được công_nhận là cơ_sở công_nghiệp quốc_phòng \n a ) Được cơ_quan nhà_nước\
    \ có thẩm_quyền quyết_định thành_lập theo quy_định của pháp_luật ; \n b ) Đủ điều_kiện , thủ_tục tham_gia hoạt_động công_nghiệp\
    \ quốc_phòng theo quyết_định của Thủ_tướng Chính_phủ ; \n c ) Được Nhà_nước đặt_hàng hoặc giao kế_hoạch để sản_xuất ,\
    \ cung_ứng một hoặc một_số sản_phẩm , chi_tiết sản_phẩm , dịch_vụ phục_vụ quốc_phòng , an_ninh . \n 2 . Bộ Quốc_phòng\
    \ chủ_trì , phối_hợp với Bộ Công_Thương và Bộ , ngành liên_quan lập danh_sách các cơ_sở công_nghiệp quốc_phòng trình Thủ_tướng\
    \ Chính_phủ_phê_duyệt trên cơ_sở tiêu_chí được quy_định tại khoản 1 Điều này . \n 3 . Hàng năm , Bộ Quốc_phòng chủ_trì\
    \ , phối_hợp với các Bộ , ngành , cơ_quan liên_quan xác_định trình Thủ_tướng Chính_phủ quyết_định việc sửa_đổi , bổ_sung\
    \ Danh_sách cơ_sở công_nghiệp quốc_phòng ."
  - "Kế_hoạch xây_dựng và phát_triển công_nghiệp quốc_phòng \n ... \n 2 . Căn_cứ để xây_dựng kế_hoạch xây_dựng và phát_triển\
    \ công_nghiệp quốc_phòng bao_gồm : \n a ) Nhiệm_vụ quốc_phòng , an_ninh và nhiệm_vụ phát_triển kinh_tế - xã_hội của đất_nước\
    \ ; \n b ) Chiến_lược bảo_đảm vũ_khí , trang_bị kỹ_thuật quân_sự cho lực_lượng vũ_trang nhân_dân ; \n c ) Quy_hoạch hệ_thống\
    \ các công_trình quốc_phòng , khu quân_sự , kho đạn_dược , công_nghiệp quốc_phòng ; \n d ) Kế_hoạch phát_triển công_nghiệp\
    \ quốc_gia , khả_năng cân_đối các nguồn_lực đầu_tư của Nhà_nước cho xây_dựng và phát_triển công_nghiệp quốc_phòng ."
  - "Công_nghiệp quốc_phòng , an_ninh \n 1 . Công_nghiệp quốc_phòng , an_ninh là bộ_phận của công_nghiệp quốc_gia , một phần\
    \ quan_trọng của thực_lực , tiềm_lực quốc_phòng , an_ninh , là ngành đặc_thù , có nhiệm_vụ nghiên_cứu phát_triển , sản_xuất\
    \ , sửa_chữa , cải_tiến , hiện_đại_hóa vũ_khí , trang_bị , vật_tư , thiết_bị kỹ_thuật và các sản_phẩm khác phục_vụ quốc_phòng\
    \ , an_ninh bảo_đảm trang_bị cho lực_lượng vũ_trang nhân_dân . \n 2 . Nhà_nước có chính_sách , cơ_chế đặc_thù , xây_dựng\
    \ công_nghiệp quốc_phòng , an_ninh theo hướng lưỡng_dụng , trở_thành mũi_nhọn của công_nghiệp quốc_gia ; tăng_cường tiềm_lực\
    \ , tận_dụng và phát_triển liên_kết công_nghiệp quốc_phòng , an_ninh và công_nghiệp dân_sinh ; huy_động tối_đa thành_tựu\
