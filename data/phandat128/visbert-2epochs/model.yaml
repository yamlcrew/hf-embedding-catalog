      . Riêng phù_hiệu của lãnh dạo Tổng_cục Hải_quan có thêm 01 ngôi_sao bằng kim_loại mầu vàng gắn ở cạnh phía trong của
      cành tùng .
    - "Chương 4 . ĐIỀU_KHOẢN THI_HÀNH \n Điều 15 . Hiệu_lực thi_hành \n 1 . Thông_tư này có hiệu_lực kể từ ngày 10 tháng 02\
      \ năm 2014 . \n 2 . Kể từ ngày 01 tháng 07 năm 2015 , sỹ quan kiểm_tra tàu_biển đã được cấp thẻ trước ngày Thông_tư\
      \ này có hiệu_lực phải đáp_ứng các yêu_cầu sau đây để được đổi thẻ mới : \n a ) Quy_định tại các điểm c , d , đ và điểm\
      \ e khoản 2 Điều 6 của Thông_tư này đối_với Sỹ quan kiểm_tra tàu_biển Việt_Nam ; \n b ) Quy_định tại các điểm c , d\
      \ , đ và điểm e khoản 2 Điều 7 của Thông_tư này đối_với Sỹ quan kiểm_tra nhà_nước cảng biển . \n 3 . Cục Hàng_hải Việt_Nam\
      \ thu_hồi những thẻ kiểm_tra tàu_biển đã được cấp trước ngày 10 tháng 02 năm 2014 và cấp lại thẻ mới theo mẫu quy_định\
      \ tại Phụ_lục số I và Phụ_lục số II của Thông_tư này đối_với các trường_hợp đáp_ứng yêu_cầu tại khoản 2 Điều này . \n\
      \ Điều 16 . Tổ_chức thực_hiện . Chánh Văn_phòng Bộ , Chánh Thanh_tra Bộ , các Vụ_trưởng thuộc Bộ , Cục_trưởng Cục Hàng_hải\
      \ Việt_Nam , Thủ_trưởng các cơ_quan , đơn_vị và tổ_chức , cá_nhân liên_quan chịu trách_nhiệm thi_hành Thông_tư này ."
    - "Biểu_tượng hải_quan \n Biểu_tượng hải_quan là một hình_tròn , có nền màu xanh nước biển ; bên trong có hình lá_chắn\
      \ nền màu đỏ ; trong hình lá_chắn phía trên có ngôi_sao 5 cánh màu vàng , ở giữa có hình lồng chìa_khóa , mỏ_neo , cánh\
      \ én đều là màu vàng ; phía trên có hàng chữ in hoa “ HẢI_QUAN VIỆT NAM ” màu vàng ; phía dưới có hàng chữ Hải_quan\
      \ Việt_Nam được viết bằng tiếng Anh in hoa \" VIET NAM CUSTOMS \" màu vàng ; bên cạnh của hình_tròn ngoài có 02 cành\
      \ vạn_tuế màu vàng ; ngoài cùng của biểu_tượng có đường viền màu đỏ ."
    - "Quy_định về quản_lý , sử_dụng \n 1 . Cờ truyền_thống của hải_quan được dùng trong các cuộc mít_tinh kỷ_niệm những ngày\
      \ lễ , ngày truyền_thống , trưng_bày trong nhà truyền_thống và các hoạt_động trọng_thể khác của ngành hải_quan . \n\
      \ 2 . Cờ hiệu hải_quan , đèn_hiệu , pháo_hiệu , còi , loa được gắn , trang_bị trên các phương_tiện tuần_tra , kiểm_soát\
      \ , giám_sát hải_quan bao_gồm tàu_thuyền , ca_nô , xuồng máy , ô_tô , xe mô_tô 02 bánh và các phương_tiện chuyên_dùng\
      \ khác khi thực_hiện nhiệm_vụ . \n 3 . Biểu_tượng hải_quan được dùng để in , gắn lên cờ truyền_thống , cờ hiệu , giấy_tờ\
      \ , biểu_mẫu , phương_tiện tuần_tra , kiểm_soát , giám_sát hải_quan , vật lưu_niệm , trụ_sở và các biểu_trưng khác của\
      \ hải_quan . \n Biểu_tượng hải_quan rút_gọn được gắn trên hải_quan hiệu , cấp_hiệu hải_quan và một_số loại trang_phục\
      \ hải_quan để phân_biệt lực_lượng hải_quan với các lực_lượng chức_năng khác . \n 4 . Hải_quan hiệu được gắn trên mũ_kêpi\
      \ , mũ_mềm , mũ bông hải_quan . \n 5 . Khi thực_hiện nhiệm_vụ công_chức , viên_chức phải mang phù_hiệu , biển tên ,\
      \ cấp_hiệu , trang_phục , chứng_minh hải_quan đúng quy_định . Các trường_hợp làm nhiệm_vụ trinh_sát , hóa_trang , đấu_tranh\
      \ chuyên_án được mặc thường_phục theo quyết_định của Tổng_cục_trưởng Tổng_cục Hải_quan . \n Thời_gian và loại trang_phục\
      \ được sử_dụng của các đơn_vị thuộc ngành hải_quan thực_hiện thống_nhất theo quyết_định của Tổng_cục_trưởng Tổng_cục\
      \ Hải_quan . \n 6 . Cờ truyền_thống , cờ hiệu , đèn_hiệu , pháo_hiệu , còi , loa , biểu_tượng , hải_quan hiệu , phù_hiệu\
      \ , biển tên , cấp_hiệu , trang_phục , chứng_minh hải_quan được cấp_phát , quản_lý , sử_dụng đúng mục_đích , quy_định\
      \ của pháp_luật . \n Bộ_trưởng Bộ Tài_chính quyết_định hoặc phân_cấp quyết_định ban_hành tiêu_chuẩn , định_mức , chế_độ\
      \ cấp_phát , sử_dụng trang_phục hải_quan . \n 7 . Các đơn_vị , cá_nhân trong ngành hải_quan chỉ được sử_dụng cờ truyền_thống\
      \ , cờ hiệu , đèn_hiệu , pháo_hiệu , còi , loa , biểu_tượng , hải_quan hiệu , phù_hiệu , biển tên , cấp_hiệu , trang_phục\
      \ , chứng_minh hải_quan khi thực_thi_công_vụ , nhiệm_vụ được giao ."
    - "Chương VI. ĐIỀU_KHOẢN THI_HÀNH \n Điều 18 . Hiệu_lực thi_hành \n 1 . Thông_tư này có hiệu_lực thi_hành ngày 29 tháng\
      \ 5 năm 2015 . Bãi_bỏ Thông_tư số 99 / 2010 / TT - BTC ngày 09 tháng 07 năm 2010 của Bộ_trưởng Bộ Tài_chính quy_định\
      \ thủ_tục hải_quan đối_với bưu_phẩm , bưu_kiện , hàng_hóa xuất_khẩu , nhập_khẩu gửi qua dịch_vụ bưu_chính . \n 2 . Trong\
      \ quá_trình thực_hiện , nếu văn_bản liên_quan viện_dẫn tại Thông_tư này được sửa_đổi , bổ_sung hoặc thay_thế_thì thực_hiện\
      \ theo văn_bản mới được sửa_đổi , bổ_sung hoặc thay_thế . \n Điều 19 . Tổ_chức thực_hiện \n 1 . Tổng_cục_trưởng Tổng_cục\
      \ Hải_quan chỉ_đạo Cục_trưởng Cục Hải_quan các tỉnh , thành_phố liên_quan chịu trách_nhiệm tổ_chức quản_lý , theo_dõi\
      \ và thực_hiện nội_dung quy_định tại Thông_tư này . \n 2 . Đối_với tờ khai hải_quan đã đăng_ký trước ngày Thông_tư này\
      \ có hiệu_lực thì thực_hiện theo quy_định tại Thông_tư số 99 / 2010 / TT - BTC ngày 09 tháng 07 năm 2010 của Bộ_trưởng\
      \ Bộ Tài_chính quy_định thủ_tục hải_quan đối_với bưu_phẩm , bưu_kiện , hàng_hóa xuất_khẩu , nhập_khẩu gửi qua dịch_vụ\
      \ bưu_chính . Quá_trình thực_hiện có phát_sinh vướng_mắc , Cục Hải_quan các tỉnh , thành_phố báo_cáo và người khai hải_quan\
      \ phản_ánh với Bộ Tài_chính ( Tổng_cục Hải_quan ) để được xem_xét , hướng_dẫn_giải_quyết cụ_thể ."
