  - "Chương III. TỔ_CHỨC THỰC_HIỆN \n Điều 65 . Hiệu_lực thi_hành \n 1 . Thông_tư này có hiệu_lực từ ngày 01 tháng 01 năm\
    \ 2016 , Tổng_cục Hải_quan triển_khai xây_dựng hệ_thống ứng_dụng công_nghệ thông_tin để thực_hiện Thông_tư này , thời_gian\
    \ áp_dụng thực_hiện trong các đơn_vị hải_quan kể từ ngày 01 tháng 01 năm 2017 . Trong thời_gian xây_dựng hệ_thống ứng_dụng\
    \ công_nghệ thông_tin , việc thực_hiện kế_toán nghiệp_vụ thuế và thu khác đối_với hàng_hóa xuất_khẩu , nhập_khẩu được\
    \ tiếp_tục thực_hiện theo quy_định của Thông_tư số 212 / 2014 / TT - BTC ngày 31 tháng 12 năm 2014 của Bộ_trưởng Bộ Tài_chính\
    \ hướng_dẫn kế_toán nghiệp_vụ thuế và thu khác đối_với hàng_hóa xuất_khẩu , nhập_khẩu . \n 2 . Thông_tư số 212 / 2014\
    \ / TT - BTC ngày 31 tháng 12 năm 2014 của Bộ_trưởng Bộ Tài_chính hướng_dẫn kế_toán nghiệp_vụ thuế và thu khác đối_với\
