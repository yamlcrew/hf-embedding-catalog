- source_sentence: Công_dân đạt thành tính học_sinh giỏi cấp tỉnh được tuyển_chọn vào Công_an nhân_dân theo phương_thức nào
    ?
  sentences:
  - "Thực_hiện dân_chủ trong thi_tuyển , xét tuyển \n 1 . Các trường Công_an nhân_dân thành_lập Hội_đồng tuyển_sinh và các\
    \ ban chuyên_môn theo thẩm_quyền để thực_hiện công_tác tuyển_sinh theo quy_định của pháp_luật và của Bộ Công_an . \n Những\
    \ người có con , vợ hoặc chồng , bố , mẹ , anh , chị , em ruột , người nuôi_dưỡng của mình hoặc của vợ hoặc chồng dự_tuyển\
    \ thì không được tham_gia Hội_đồng tuyển_sinh và các ban chuyên_môn . \n 2 . Các trường Công_an nhân_dân tổ_chức tiếp_nhận\
    \ hồ_sơ dự_tuyển , thi_tuyển , xét tuyển phải bảo_đảm đúng đối_tượng , tiêu_chuẩn , vùng tuyển , trình_tự , thủ_tục ,\
    \ thời_gian ; bảo_đảm khách_quan , công_khai , minh_bạch theo đúng quy_chế , quy_định . \n 3 . Tại các điểm tổ_chức thi_tuyển\
    \ , xét tuyển phải có hòm_thư , số điện_thoại liên_hệ để thí_sinh góp_ý về công_tác tuyển_sinh , phản_ánh những hành_vi\
    \ vi_phạm_quy_chế tuyển_sinh . \n 4 . Hội_đồng tuyển_sinh có trách_nhiệm xử_lý nghiêm_minh , khách_quan đối_với cán_bộ\
    \ và thí_sinh vi_phạm_quy_chế tuyển_sinh ; thực_hiện nghiêm chế_độ bảo_mật về địa_điểm , thời_gian , nhân_sự tham_gia_công_việc\
    \ về đề thi , bảo_quản bài thi , công_tác làm_phách , chấm thi , chấm phúc_khảo theo đúng quy_chế tuyển_sinh . Kết_quả\
    \ chấm thi , chấm phúc_khảo phải được niêm_yết công_khai tại trường Công_an nhân_dân hoặc trên trang thông_tin điện_tử\
    \ của trường Công_an nhân_dân và gửi phiếu báo điểm thi , điểm phúc_khảo đến thí_sinh đúng thời_gian quy_định . \n 5 .\
    \ Hội_đồng tuyển_sinh quyết_định phương_án điểm xét tuyển ; thông_báo_công_khai điểm thi , điểm xét tuyển , kết_quả xét\
    \ tuyển và thí_sinh trúng_tuyển ( theo số báo_danh_dự thi ) và gửi danh_sách thí_sinh trúng_tuyển về Công_an đơn_vị ,\
    \ địa_phương để phối_hợp thông_báo cho thí_sinh theo quy_định của pháp_luật và của Bộ Công_an . \n 6 . Các trường Công_an\
    \ nhân_dân gửi thông_báo thí_sinh trúng_tuyển nhập_học và quy_định những thủ_tục cần_thiết đối_với thí_sinh khi nhập_học\
    \ , tiếp_nhận nhập_học cho thí_sinh trúng_tuyển trong thời_gian quy_định ."
  - "1 . Căn_cứ kế_hoạch huy_động hàng năm , 5 năm được Thủ_tướng Chính_phủ_phê_duyệt , Bộ Công_an phối_hợp với Bộ Giáo_dục\
    \ và Đào_tạo , các Bộ , cơ_quan liên_quan tổ_chức thực_hiện đào_tạo nguồn nhân_lực khoa_học và công_nghệ phục_vụ công_tác\
    \ công_an . \n 2 . Nhà_nước có chính_sách ưu_tiên , tạo điều_kiện cho Bộ Công_an tuyển_chọn , điều_động cán_bộ , chuyên_gia\
    \ , nhân_viên khoa_học và công_nghệ đã được đào_tạo vào phục_vụ công_tác công_an và cử người đủ tiêu_chuẩn đi học_tập\
    \ , bồi_dưỡng tại các cơ_sở đào_tạo về khoa_học và công_nghệ trong và ngoài nước . \n Việc tuyển_chọn học_sinh , sinh_viên\
    \ vào Công_an nhân_dân , việc chọn cử học_sinh , sinh_viên , cán_bộ Công_an nhân_dân đi đào_tạo ở trong và ngoài nước\
    \ nhằm tăng_cường nguồn nhân_lực khoa_học và công_nghệ phục_vụ công_tác công_an thực_hiện theo quy_định tại Nghị_định\
    \ số 43 / 2007 / NĐ - CP ngày 26 tháng 3 năm 2007 quy_định chi_tiết và hướng_dẫn thi_hành một_số điều của Luật Công_an\
    \ nhân_dân . \n 3 . Các Bộ , cơ_quan ngang Bộ , Ủy_ban nhân_dân cấp tỉnh có trách_nhiệm chỉ_đạo các cơ_sở đào_tạo thuộc\
    \ ngành , địa_phương mình thực_hiện nhiệm_vụ đào_tạo nhân_lực khoa_học và công_nghệ theo kế_hoạch huy_động tiềm_lực khoa_học\
    \ và công_nghệ phục_vụ công_tác công_an được cấp có thẩm_quyền phê_duyệt ."
  - "\" Điều 14 . Trình_tự tuyển_chọn công_dân vào Công_an nhân_dân \n ... \n 5 . Quyết_định tạm_tuyển , tuyển_chọn công_dân\
    \ vào Công_an nhân_dân \n Sau khi thực_hiện các quy_định tại khoản 4 Điều này , Hội_đồng tuyển_chọn thống_nhất danh_sách\
    \ những người trúng_tuyển trong kỳ tuyển_chọn , báo_cáo cấp ủy và lãnh_đạo đơn_vị , địa_phương cho ý_kiến , trước khi\
    \ trình thủ_trưởng đơn_vị , địa_phương ra quyết_định tạm_tuyển , tuyển_chọn công_dân vào Công_an nhân_dân . Đối_với các\
    \ trường_hợp quy_định tại khoản 1 Điều 3 Thông_tư này , trước khi cơ_quan tổ_chức cán_bộ đề_xuất thủ_trưởng Công_an đơn_vị\
    \ , địa_phương quyết_định phải yêu_cầu người dự_tuyển nộp quyết_định xuất_ngũ hoặc chuyển ngành hoặc văn_bản đồng_ý cho\
    \ chuyển công_tác của thủ_trưởng cơ_quan , tổ_chức có thẩm_quyền quản_lý cán_bộ . \n 6 . Công_bố quyết_định tạm_tuyển\
    \ , tuyển_chọn công_dân vào Công_an nhân_dân \n a ) Trong thời_hạn 07 ngày làm_việc , kể từ ngày thủ_trưởng Công_an đơn_vị\
    \ , địa_phương ban_hành_quyết_định tạm_tuyển , tuyển_chọn công_dân vào Công_an nhân_dân , cơ_quan tổ_chức cán_bộ phải\
    \ thông_báo bằng văn_bản đến công_dân thời_điểm có_mặt tại cơ_quan , đơn_vị để nhận nhiệm_vụ và chủ_trì , phối_hợp với\
    \ đơn_vị trực_tiếp sử_dụng cán_bộ tổ_chức công_bố và trao quyết_định cho người được tạm_tuyển , tuyển_chọn vào Công_an\
    \ nhân_dân ; \n b ) Quyết_định tuyển_chọn , tạm_tuyển công_dân vào Công_an nhân_dân phải đồng_thời gửi Cục Tổ_chức cán_bộ\
    \ 01 bản ( bản_chính ) để phục_vụ công_tác quản_lý ."
  - "Điều 2 . Mục_đích_thực_hiện dân_chủ trong tuyển_sinh vào Công_an nhân_dân \n 1 . Phát_huy vai_trò chủ_động kiểm_tra ,\
    \ giám_sát của tổ_chức , cán_bộ , chiến_sĩ và công_dân nhằm nâng cao chất_lượng , hiệu_quả tuyển_sinh vào Công_an nhân_dân\
    \ , tạo nguồn tuyển_chọn công_dân có đủ điều_kiện , tiêu_chuẩn vào Công_an nhân_dân đáp_ứng yêu_cầu bổ_sung , phát_triển\
    \ nguồn nhân_lực trong Công_an nhân_dân và xây_dựng lực_lượng Công_an nhân_dân cách_mạng , chính_quy , tinh_nhuệ , hiện_đại\
    \ . \n 2 . Bảo_đảm quyền và lợi_ích hợp_pháp của cán_bộ , chiến_sĩ , cơ_quan , tổ_chức , công_dân có nguyện_vọng tham_gia\
    \ hoặc liên_quan đến tuyển_sinh vào Công_an nhân_dân ; phát_huy vai_trò , trách_nhiệm của Thủ_trưởng Công_an các đơn_vị\
    \ , địa_phương , các trường Công_an nhân_dân trong thực_hiện công_khai , minh_bạch tuyển_sinh vào Công_an nhân_dân . \n\
    \ 3 . Phòng_ngừa , phát_hiện , ngăn_chặn và chống các biểu_hiện , hành_vi tham_nhũng , tiêu_cực trong tuyển_sinh vào Công_an\
    \ nhân_dân ."
  - "Phương_thức tuyển_chọn \n 1 . Việc tuyển_chọn công_dân vào Công_an nhân_dân được thực_hiện thông_qua thi_tuyển , trừ\
    \ trường_hợp quy_định tại khoản 2 Điều này . Hình_thức , nội_dung thi phải phù_hợp với ngành , nghề , bảo_đảm lựa_chọn\
    \ được những người có phẩm_chất , trình_độ và năng_lực đáp_ứng yêu_cầu tuyển_chọn . \n 2 . Người dự_tuyển thuộc một trong\
    \ các trường_hợp sau được tuyển_chọn thông_qua xét tuyển : \n a ) Có trình_độ tiến_sĩ , bác_sĩ chuyên_khoa cấp I , bác_sĩ\
    \ chuyên_khoa cấp II , bác_sĩ nội_trú , dược_sĩ chuyên_khoa cấp I , dược_sĩ chuyên_khoa cấp II chuyên_ngành y_học , dược_học\
    \ ; \n b ) Các trường_hợp quy_định tại khoản 1 Điều 3 Thông_tư này ; \n c ) Các trường_hợp quy_định tại Điều 2 Nghị_định\
    \ số 140 / 2017 / NĐ - CP ngày 05 tháng 12 năm 2017 của Chính_phủ về chính_sách thu_hút , tạo nguồn cán_bộ từ sinh_viên\
    \ tốt_nghiệp xuất_sắc , cán_bộ khoa_học trẻ . \n 3 . Trường_hợp_số_lượng người đăng_ký dự_tuyển trong đợt thi_tuyển hoặc\
    \ xét tuyển không bảo_đảm nguyên_tắc quy_định tại khoản 4 Điều 2 Thông_tư này , Công_an đơn_vị , địa_phương báo_cáo về\
    \ Cục Tổ_chức cán_bộ để tổng_hợp , trình Bộ_trưởng xem_xét , quyết_định . \n 4 . Căn_cứ chủ_trương của Ban Thường_vụ Đảng_ủy\
    \ Công_an Trung_ương và lãnh_đạo Bộ Công_an về công_tác cán_bộ trong từng giai_đoạn , Cục_trưởng Cục Tổ_chức cán_bộ báo_cáo\
    \ Bộ_trưởng Bộ Công_an xem_xét , điều_chỉnh phương_thức tuyển_chọn công_dân vào Công_an nhân_dân theo quy_định của pháp_luật\
    \ ."
  - "\" Điều 15 . Tạm_tuyển \n 1 . Công_dân được tuyển vào Công_an nhân_dân phải thực_hiện chế_độ tạm_tuyển , trừ các trường_hợp\
    \ sau : \n a ) Người có trình_độ thạc_sĩ , tiến_sĩ , bác_sĩ chuyên_khoa cấp I , bác_sĩ chuyên_khoa cấp II , bác_sĩ nội_trú\
    \ , dược_sĩ chuyên_khoa cấp I và dược_sĩ chuyên_khoa cấp II chuyên_ngành y_học , dược_học hoặc tốt_nghiệp đại_học loại\
    \ xuất_sắc ; \n b ) Các trường_hợp quy_định tại khoản 1 Điều 3 , điểm c khoản 2 Điều 6 và khoản 1 Điều 21 Thông_tư này\
    \ . \n 2 . Thời_gian tạm_tuyển được quy_định như sau : \n a ) 06 tháng đối_với người có trình_độ đại_học ; \n b ) 09 tháng\
    \ đối_với người có trình_độ cao_đẳng ; \n c ) 12 tháng đối_với người có trình_độ trung_cấp , sơ_cấp ; \n d ) Thời_gian\
    \ tạm_tuyển tính từ ngày quyết_định tạm_tuyển có hiệu_lực thi_hành . Thời_gian nghỉ sinh con theo chế_độ bảo_hiểm xã_hội\
    \ và thời_gian nghỉ ốm_đau theo quy_định của pháp_luật không được tính vào thời_gian tạm_tuyển . \n 3 . Công_dân được\
    \ tạm_tuyển ở các đơn_vị nghiệp_vụ không được bố_trí thực_hiện các nhiệm_vụ liên_quan đến bí_mật nghiệp_vụ công_an . \""
  - "Tuyển_chọn công_dân vào Công_an nhân_dân \n ... \n 2 . Công_an nhân_dân được ưu_tiên tuyển_chọn sinh_viên , học_sinh\
    \ xuất_sắc tốt_nghiệp ở các cơ_sở giáo_dục đại_học , cơ_sở giáo_dục nghề_nghiệp có đủ tiêu_chuẩn để đào_tạo , bổ_sung\
    \ vào Công_an nhân_dân ."
  - "Tiêu_chuẩn tuyển_chọn \n 1 . Tiêu_chuẩn chính_trị \n Bảo_đảm tiêu_chuẩn chính_trị theo quy_định của Bộ_trưởng Bộ Công_an\
    \ và các tiêu_chuẩn sau : \n a ) Có bản_lĩnh chính_trị vững_vàng , tuyệt_đối trung_thành với Tổ_quốc , Nhân_dân , với\
    \ Đảng và Nhà_nước ; \n b ) Có năng_lực , trách_nhiệm hoàn_thành nhiệm_vụ được giao , sẵn_sàng chiến_đấu hy_sinh bảo_vệ\
    \ Đảng , Nhà_nước , Nhân_dân và chế_độ xã_hội chủ_nghĩa , độc_lập chủ_quyền toàn_vẹn lãnh_thổ , an_ninh quốc_gia ; \n\
    \ c ) Trung_thực , tự_giác , ý_thức tổ_chức kỷ_luật nghiêm , ý_thức cảnh_giác cách_mạng cao , giữ_gìn và bảo_vệ bí_mật\
    \ nhà_nước . \n 2 . Phẩm_chất đạo_đức : Có phẩm_chất , tư_cách đạo_đức tốt . \n 3 . Trình_độ \n Đã tốt_nghiệp ( được cấp\
    \ bằng hoặc chứng_chỉ tốt_nghiệp ) từ hạng khá trở lên và bảo_đảm một trong các tiêu_chuẩn sau : \n a ) Đối_tượng tuyển_chọn\
    \ quy_định tại khoản 1 Điều 3 Thông_tư này yêu_cầu phải tốt_nghiệp đào_tạo trình_độ đại_học trở lên ; \n b ) Đối_tượng\
    \ tuyển_chọn quy_định tại khoản 2 Điều 3 Thông_tư này yêu_cầu phải tốt_nghiệp đào_tạo trình_độ sơ_cấp , trung_cấp , cao_đẳng\
    \ ( bao_gồm cả sơ_cấp , trung_cấp , cao_đẳng nghề ) , đại_học , thạc_sĩ , tiến_sĩ . \n Tuyển_chọn để bố_trí làm công_tác_nghiệp_vụ\
    \ Công_an hoặc tham_mưu , quản_lý nhà_nước trên các lĩnh_vực theo chức_năng của Công_an nhân_dân chỉ tuyển người có trình_độ\
    \ đào_tạo từ đại_học trở lên . \n 4 . Tuổi_đời \n Từ đủ 18 tuổi đến dưới 30 tuổi ( tính đến ngày quyết_định tạm_tuyển\
    \ hoặc quyết_định tuyển_chọn chính_thức đối_với trường_hợp không phải tạm_tuyển ) . Riêng công_dân có trình_độ tiến_sĩ\
    \ , bác_sĩ chuyên_khoa cấp I , bác_sĩ chuyên_khoa cấp II , bác_sĩ nội_trú , dược_sĩ chuyên_khoa cấp I , dược_sĩ chuyên_khoa\
    \ cấp II chuyên_ngành y_học , dược_học , người dân_tộc_thiểu_số , người đã có thời_gian làm lao_động hợp_đồng trong Công_an\
    \ nhân_dân trên 05 năm và các trường_hợp quy_định tại khoản 1 Điều 3 Thông_tư này tuyển_chọn đến 35 tuổi ; chức_danh giáo_sư\
    \ , phó_giáo_sư tuyển_chọn đến 40 tuổi . \n 5 . Sức_khoẻ \n Đủ tiêu_chuẩn sức_khỏe tuyển_chọn vào Công_an nhân_dân theo\
    \ quy_định của Bộ_trưởng Bộ Công_an và các quy_định sau : \n a ) Chiều cao : Đối_với nam từ 1m64 trở lên ; đối_với nữ\
    \ từ 1m58 trở lên ; \n b ) Thị_lực : Thị_lực không kính mỗi mắt đạt 9 - 10 / 10 , tổng_thị_lực 02 mắt đạt từ 18 - 20 /\
    \ 10 ; \n c ) Tuyển công_dân có trình_độ khoa_học công_nghệ bố_trí làm công_tác kỹ_thuật nghiệp_vụ , kỹ_thuật hình_sự\
    \ , công_nghệ thông_tin , cơ_yếu , an_ninh mạng , tác_chiến điện_tử ; người có trình_độ tiến_sĩ , bác_sĩ chuyên_khoa cấp\
    \ I , bác_sĩ chuyên_khoa cấp II , bác_sĩ nội_trú , dược_sĩ chuyên_khoa cấp I , dược_sĩ chuyên_khoa cấp II chuyên_ngành\
    \ y_học , dược_học ; có chức_danh giáo_sư , phó_giáo_sư ; người dân_tộc_thiểu_số : Được hạ thấp 02 ( hai ) cm đối_với\
    \ từng giới so với quy_định tại điểm a Khoản này ; có_thể cận , viễn , loạn_thị nhưng không quá 03 điốp mỗi mắt . \n 6\
    \ . Năng_khiếu \n Công_dân được tuyển_chọn để bố_trí ở những đơn_vị làm công_tác_nghiệp_vụ công_an còn phải là người bình_tĩnh\
    \ , nhạy_bén , nhanh_nhẹn , có trí_nhớ tốt theo yêu_cầu của vị_trí cần tuyển do Công_an đơn_vị , địa_phương tuyển_chọn\
    \ xem_xét , quyết_định ."
