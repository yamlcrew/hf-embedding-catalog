widgetData:
- source_sentence: Can I get academic adjustments for mental health reasons?
  sentences:
  - Yes, appropriate academic accommodations can be arranged through the disability services office with documentation from
    mental health professionals.
  - Yes, many companies conduct online aptitude tests, coding challenges, or domain-specific assessments as part of their
    selection process.
  - The hostel offers Wi-Fi, mess services, laundry, and recreational areas.
- source_sentence: What are the hostel meal timings?
  sentences:
  - Career services include career counseling, resume workshops, interview coaching, networking events, alumni mentoring,
    and job search assistance for all students.
  - Fee concession applications can be submitted with financial documentation to demonstrate need. Merit-based and need-based
    concessions may be available.
  - Mess timings are typically breakfast 7:30-9:30 AM, lunch 12:00-2:00 PM, and dinner 7:00-9:00 PM. Special arrangements
    may be made during exams.
- source_sentence: Is there a bond signing for certain jobs?
  sentences:
  - Yes, detailed placement statistics including company-wise data, salary ranges, and sector-wise placement percentages are
    available on the placement portal.
  - Some companies may require service agreements or bonds. All terms and conditions are clearly communicated during the pre-placement
    talk.
  - Emergency services are available 24/7 through campus security (extension 911), medical emergencies (campus health center),
    and crisis intervention services.
- source_sentence: Where is the medical center located?
  sentences:
  - Most companies require no active backlogs for placement eligibility. Clear all backlogs before the placement season to
    ensure maximum opportunities.
  - The campus medical center is located near the main administrative building and provides basic healthcare services during
    working hours.
  - Yes, photocopy and printing services are available at the library, administrative building, and near the main canteen
    with reasonable rates.
- source_sentence: Are there mock interviews before placements?
  sentences:
  - Yes, mock interviews are conducted regularly to help students practice and improve their interview skills before actual
    placement interviews.
  - Overnight event permissions require advance approval from student affairs, security clearance, safety protocols, and may
    need faculty supervision for student organizations.
  - Final year students can typically choose 2-4 elective courses depending on their program. Check with your academic advisor
    for specific requirements.
