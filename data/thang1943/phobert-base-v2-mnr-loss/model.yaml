  - source_sentence: "Các va chạm khi tập võ có thể làm bạn bị bong võng mạc... (Ảnh: Internet) Chào bạn, Các trường hợp cận\
      \ 6 đi ốp trở lại và ở tuổi hết lớn (trên 18 tuổi) là có chỉ định mổ. không nguy hiểm và cũng không làm\r\ngiảm mỹ quan.\
      \ Sau mổ, độ lồi mắt có thể giảm bớt vì nguyên lý của phẫu thuật\r\nđiều trị cận thị là làm cho giác mạc dẹt bớt đi,\
      \ đỡ lồi nhọn nhằm giảm công\r\nsuất quy tụ ánh sáng quá mức. Người cận nặng có thể tập thể dục (thể dục dụng cụ hoặc\
      \ chạy\r\nbộ). Song với thể thao thì phải thận trọng nhiều; bởi vì ở người cận, vỏ nhãn\r\ncầu giãn rộng, các va đập\
      \ nhỏ vào mắt có thể gây bong võng mạc. Các tình huống\r\nsau đều có thể gây nguy hiểm: bị luồng nước đập vào mắt mạnh\
      \ khi bơi lội hoặc\r\nkhi nhảy lao đầu xuống nước; bị cầu thủ khác huých khuỷu tay hoặc bóng đập vào\r\nvùng mặt; bạn\
      \ phát bóng quá mạnh làm người rung chuyển, chuyện động lan đến\r\nmắt. Nếu tập võ, bạn sẽ khó tránh được các va chạm\
      \ và có thể bị\r\nbong võng mạc. Bởi vậy, bạn chỉ nên đi sâu vào thể dục thôi. Còn thể thao và võ\r\nthì dù có thích\
      \ bạn cũng nên nhịn. Cũng hơi thiệt thòi đấy, nhưng phải kiêng,\r\nnhư người bị tiểu đường dù rất thèm ngọt mà vẫn phải\
      \ kiêng đường ấy mà. Theo BS Hoàng Sinh, Sức Khỏe & Đời\r\nSống"
    sentences:
    - Cốm Qalyvit OPC bổ sung vitamin nhóm B (12 gói x 2g)
    - Em đi tẩy nốt ruồi được 1 tuần thì em lỡ quệt trúng, vảy bị tróc ra thì có làm sao không ạ?
    - "Thưa bác sĩ,\r\n\r\nTôi còn trẻ, cận thị 5,25 đi ốp. Nếu đi mổ thì có an toàn không, mắt có đỡ lồi không? Tôi đang\
      \ tập thể dục (chạy buổi sáng, thể dụng dụng cụ) và muốn tập cả võ nữa. Liệu có hại gì cho mắt không?\r\n\r\nCám ơn\
      \ BS! (Bạn đọc)"
  - source_sentence: ' Chào Khánh Hồng, Như vậy là em đã thành cục xơ chai, thuốc uống thường rất ít tác dụng. Em nên khám
      chuyên khoa thẩm mỹ ở BV Da Liễu để BS kiểm tra mức độ, cơ địa, điều kiện kinh tế nhằm lựa chọn phương pháp xử trí phù
      hợp nhất cho em (như thuốc thoa trực tiếp, bắn tia...), em nhé. Thân mến!'
    sentences:
    - "Chào BS,\r\n\r\nCháu bị té xe và môi bị may 3 mũi, bây giờ đã lành nhưng chỗ bị thương trên môi sờ vào rất cứng và\
      \ cộm nữa ạ. Xin cho cháu hỏi là làm sao để môi cháu trở lại như bình thường được ạ? Cháu xin cảm ơn ạ.\r\n\r\n(Nguyễn\
      \ Thị Khánh Hồng - Cần Thơ)"
    - "Em chào BS, BS cho em hỏi,\r\n\r\nEm bị cái hạch mọc ở bẹn sưng to rất nhanh chỉ 3 ngày là to bằng quả trứng gà rồi,\
      \ cảm giác đau mà có màu hồng và tấy. Được 1 tuần thì nó vỡ ra chảy mủ trắng. Tuy nhiên lúc đấy thì em bị mọc mụn nước\
      \ xung quanh 2 bên bẹn rất ngứa.\r\n\r\nĐến bây giờ thì cái hạch đấy đã khép miệng nhưng vẫn cò mủ dính 1 ít ở thịt.\
      \ Sau đó mụn nước vẫn cứ tiếp tục mọc và xuất hiện mấy cái mụn to sưng đỏ tấy xung quanh cái hạch cũ. \r\n\r\nEm mong\
      \ BS tư vấn giúp em xem cái hạch đấy có nguy hiểm gì không ạ? Em cảm ơn BS.  \r\n\r\n(T. Văn Toản - Thái Nguyên)"
    - "Thưa bác sĩ,\r\n\r\nCách đây 5 năm tôi có tự nhiên bị gãy 1 chiếc răng, gần răng nanh hàm trên. Vừa đây tôi có đi trồng\
      \ răng và chụp X-quang thì bác sĩ nói dưới chiếc răng gãy của tôi có 1 răng ngầm và các nang xung quanh. Tôi tìm hiểu\
      \ thì thấy bệnh của mình giống bênh u nang thân răng. Hiện giờ tôi rất lo sợ. \r\n\r\nXin bác sĩ cho tôi hỏi bệnh đó\
      \ có đúng không? Nếu không điều trị thì có sao không? Hiện tôi không thấy đau gì và tôi đang nuôi con nhỏ. \r\n\r\n\
      Cảm ơn bác sĩ! (Hương Giang - Hà Nội)"
  - source_sentence: 'Chào em, Suy thận là khi tổn thương của thận không thể phục hồi, theo thời gian sẽ khiến chức năng thận
      bị yếu và kém dần đi. Khi bị chẩn đoán suy thận, người bệnh cần điều chỉnh lại chế độ dinh dưỡng, ăn uống phù hợp, tránh
      để thận phải làm việc quá sức. Giảm bớt chất đạm trong khẩu phần ăn hàng ngày Người bị suy thận nên ăn ít đi những thực
      phẩm có thành phần đạm trong bữa cơm như thịt, cá, sữa, trứng, gạo, đậu đỗ, rau ngót, giá đỗ,... Với những bệnh nhân
      có cân nặng từ 50 tới 55 kg, chỉ nên cung cấp chất đạm cho cơ thể với 50g lượng thịt, cá, thêm 1 cốc sữa tươi khoảng
      250ml và 1 bát cơm. Ngoài ra, người bệnh cần kiêng nội tạng động vật, đồ ăn nướng, chiên, rán nhiều dầu mỡ. Đảm bảo
      cung cấp đủ dinh dưỡng cho bệnh nhân bị suy thận Người bệnh suy thận nên hạn chế chất đạm từ động vật nhưng có thể sử
      dụng ngũ cốc đạm để thay thế việc ăn thịt, cá. Ngoài ra, người bệnh có thể bổ sung thêm một số loại củ có tinh bột trong
      các bữa nhỏ hàng ngày như khoai lang, khoai sọ, bột sắn dây,... Tiêu thụ chất đường bằng cách sử dụng mía, mật ong,
      hoa quả ngọt, uống sữa để bổ sung canxi. Bổ sung chất béo khoảng 30-40 gram 1 ngày, nên dùng chất béo từ thực vật như
      dầu oliu, dầu lạc,... Hạn chế dùng nhiều muối trong khẩu phần ăn Người bệnh suy thận cần ăn nhạt, hạn chế dùng muối
      và mì chính. Chỉ nên dùng từ 2 tới 4 gram muối 1 ngày, tùy theo tình trạng sức khỏe bệnh nhân suy thận, tránh bị phù.
      Bên cạnh đó, người bệnh cũng nên tránh các món ăn chứa nhiều muối như: dưa muối, cà muối, thịt, cá kho mặn. Nếu người
      bệnh bị phù và tiểu tiện ít thì nên hạn chế lượng muối vào thức ăn hàng ngày. Ngoài ra, người bệnh không nên ăn đồ chế
      biến sẵn vì trong các sản phẩm này thường sử dụng nhiều muối để bảo quản và không đảm bảo an toàn vệ sinh. Hạn chế dùng
      thực phẩm có chứa chất kali Rau và trái cây có nhiều thành phần kali, đặc biệt là rau có nhiều lá, hoa quả như cam,
      nho, đào, chuối, socola. Tuy nhiên, người bệnh suy thận chỉ nên sử dụng từ 2 tới 4 gram 1 ngày. Chú ý lượng nước uống
      hàng ngày Người bệnh suy thận nên hạn chế uống nước, liều lượng nước phụ thuộc vào tình trạng, mức độ của bệnh. Thông
      thường, người bệnh suy thận nên uống nước từ 300ml tới 500ml. Ngoài ra, người bệnh cũng không nên sử dụng các chất kích
      thích như rượu chè, cà phê, đồ uống có ga. Không ăn thực phẩm có tính chua như sữa chua, rau củ quả muối, chanh, bưởi.
      Với bệnh nhân suy thận đang lọc máu để điều trị thì có thể ăn uống gần như bình thường, tuy nhiên cần tăng lượng tiêu
      thụ protein và ăn nhạt, hạn chế muối và mì chính.'
    sentences:
    - Thuốc nhỏ mũi Otrivin 0.1% GSK điều trị nghẹt mũi, sung huyết mũi họng (10ml)
    - Triệu chứng viêm túi mật
