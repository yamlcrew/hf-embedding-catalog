  - source_sentence: 'Hầu hết các trường hợp ra máu âm đạo ngoài kỳ kinh ở lứa tuổi của cháu (chưa quan hệ tình dục) là do
      bệnh lý lành tính. Ở những phụ nữ tiền mãn kinh, đặc biệt là phụ nữ đã mãn kinh, ra máu âm đạo có thể do ung thư phụ
      khoa, nhưng cũng có thể do bệnh lành tính. Ra máu âm đạo bất thường ở vào lứa tuổi của cháu có thể là do những nguyên
      nhân sau: - Rối loạn kinh nguyệt - Nồng độ hoóc môn dao động - Viêm âm đạo - Một số bệnh lây qua đường tình dục như
      chlamydia, lậu hay sùi sinh dục - Thương tích ở âm đạo do chấn thương hay do lạm dụng tình dục, có thai hoặc có thai
      ngoài tử cung - Biến chứng thai nghén như thai chết lưu. Tuy nhiên, qua thư cháu cho thấy kinh nguyệt của cháu như vậy
      là bất thường (cháu không nói rõ thời gian hai lần ra máu là bao lâu), càng bất thường hơn là vùng kín của cháu bị ngứa,
      hôi, rát. Nếu đúng như cháu mô tả thì cháu có biểu hiện viêm nhiễm vùng kín, cháu không nên mắc cỡ mà cần thông báo
      cho gia đình biết để đưa cháu đi khám phụ khoa ngay, làm thêm xét nghiệm dịch ở vùng kín. Tùy theo kết quả xét nghiệm,
      nguyên nhân gây bệnh bác sĩ sẽ điều trị sớm cho cháu để tránh những biến chứng nguy hiểm về sau. BS Chuyên khoa của
      AloBacsi - nơi bạn có thể trò chuyện, chia sẻ mọi thắc mắc với bác sĩ chuyên khoa. Đặc biệt, từ ngày 15/6/2011, danh
      sách BS tư vấn Khám bệnh Online của AloBacsi có thêm hai chuyên gia tâm huyết. Đó là GS - BS Nguyễn Thị Ngọc Phượng
      - Nguyên giám đốc BV Từ Dũ sẽ "gỡ rối" cho chị em về bệnh phụ khoa. Và, TS.BS Lê Tuyết Hoa - 20 năm công tác tại BV
      Chợ Rẫy - chuyên ngành Đái tháo đường - Nội tiết sẽ giải đáp mọi thắc mắc về Nội Tiết - Tiểu đường. giúp bạn giải đáp
      1.001 thắc mắc về sức khỏe. Mọi thắc mắc về sức khỏe gửi đến email: . Bạn đọc có thể ghi kèm số điện thoại để bác sĩ
      liên hệ khi cần thiết. Để chính xác về nội dung, vấn đề cần hỏi, bạn đọc vui lòng gõ có dấu (font chữ Unicode). Chân
      thành cảm ơn. '
    sentences:
    - "Chào BS,\r\nCháu 19 tuổi, tuần trước cháu bị ra máu ngoài kỳ kinh, nhưng bị 3 hôm thì hết. Hôm nay, lại tiếp tục ra\
      \ máu nhiều hơn lần trước. Trước đó 1 ngày cháu bị ngứa rát vùng âm đạo. BS cho cháu hỏi cháu bị bệnh gì ạ?"
    - "Con chào BS,\r\n\r\nNăm nay con 19 tuổi cho con hỏi là con bị xì hơi có mùi rất hôi nhưng khi đi cầu ra phân nát xong\
      \ thì con cảm thấy đau bụng và con đi cầu tiếp tục ra phân nát xong vẫn đau bụng. Kèm theo là con thấy mệt mỏi với buồn\
      \ nôn rồi con đi mua thuốc, thấy không còn mệt mỏi với buồn nôn nữa mà đau bụng và sau đó lại mắc cầu và đi ra phân\
      \ nát. Cho con hỏi con bị gì vậy BS? Con xin hết ạ."
    - "Chào BS,\r\n\r\nMẹ tôi năm nay 66 tuổi. Bà vẫn nhìn và đọc được báo chí, nay đi khám mắt các BS nói mẹ tôi bị đục bao\
      \ sau và chỉ định đi mổ.\r\n\r\nBS cho tôi hỏi đục bao sau thường xảy ra ở những bệnh nhân sau mổ đục thủy tinh thể,\
      \ vậy mẹ tôi tiểu sử bình thường chưa bị mổ đục thủy tinh thể, nếu sau khi mổ cắt bao sau liệu có ảnh hưởng gì về sau\
      \ không ạ?\r\n\r\nXin cảm ơn BS!"
  - source_sentence: Chào bạn, Qua mô tả rất có thể bạn đã bị thoát vị bẹn tái phát. Để được hưởng BHYT, bạn bắt buộc phải
      đến khám tại cơ sở chăm sóc y tế ban đầu (theo thẻ bảo hiểm), khi bác sĩ có chỉ định làm xét nghiệm thì mới được BHYT
      thanh toán một phần theo quy định. Nếu tự ý thực hiện xét nghiệm thì không được BHYT thanh toán bạn nhé! Thân mến.
    sentences:
    - Tìm hiểu chung hội chứng demons meigs
    - "Chào bác sĩ,\r\n\r\nCách đây 10 tháng em bị thoát vị bìu trái, đã mổ và lắp lưới tại Bệnh viện Chợ Rẫy. Gần đây em\
      \ thấy hơi đau ổ bụng phải vùng háng mỗi khi vận động mạnh hay ho, sưng khi vận động và khi ngủ nghỉ sẽ xẹp xuống. \r\
      \n\r\nBác sĩ cho em hỏi có phải em bị thoát vị phải giai đoạn đầu không ạ? Muốn chẩn đoán chính xác cần siêu âm hay\
      \ nội soi ạ, có được giảm phí cho công nhân có BHXH không ạ? Em đi làm suốt, không có thời gian đến thăm khám cũng như\
      \ điều kiện tài chính. Kính mong bác sĩ tư vấn giúp em. Em cám ơn nhiều ạ!"
    - Chào bác sĩ,Em có làm xét nghiệm HIV chiến lược III tại Pasture với sinh phẩm là HIV duo cho kết quả âm tính sau 6 tuần
      kể từ lúc có nguy cơ. Bác sĩ cho em hỏi là xét nghiệm chiến lược III này có giống như HIV combo không ạ? Và em đã được
      an toàn chưa ạ. Em trân trọng cám ơn!
