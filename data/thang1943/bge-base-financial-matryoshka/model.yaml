widgetData:
- source_sentence: Termination of the Arm Share Purchase Agreement In February 2022, NVIDIA and SoftBank Group Corp., or SoftBank,
    announced the termination of the Share Purchase Agreement whereby NVIDIA would have acquired Arm Limited, or Arm, from
    SoftBank. The parties agreed to terminate because of significant regulatory challenges preventing the completion of the
    transaction.
  sentences:
  - How did eBay's net revenues from the first quarter of 2023 compare to the last quarter of 2022?
  - Why did NVIDIA and SoftBank terminate their Share Purchase Agreement for acquiring Arm Limited?
  - What effects did the implementation of the Reinvention Plan have on the company's financial statements in fiscal years
    2022 and 2023?
- source_sentence: In the fiscal year 2023, it was disclosed that $1,963 million of certain accumulated foreign earnings continue
    to be indefinitely reinvested.
  sentences:
  - What does the company imply about the severity of the lawsuits and regulatory proceedings they are involved in?
  - How much has been indefinitely reinvested from accumulated foreign earnings as of fiscal year 2023?
  - Are the consolidated financial statements and notes included directly in Item 8 of the Annual Report on Form 10-K?
- source_sentence: The November 2029 fixed-to-floating rate Senior Notes bear interest at a fixed rate of 6.196%, payable
    semi-annually, until the interest reset date on November 17, 2028.
  sentences:
  - What is the fixed interest rate for the November 2029 fixed-to-floating rate Senior Notes before the reset date?
  - What is the weighted-average remaining term of the financing obligations as of December 31, 2023?
  - How long has Humana participated in the Medicare program for private health plans?
- source_sentence: Our material cash requirements include debt repayment obligations of $1.9 billion.
  sentences:
  - What percentage is the initial preferred distribution for the April preferreds issued by AT&T in 2023?
  - What are the two main service segments of The Charles Schwab Corporation?
  - What is the total debt repayment obligation mentioned in the financial outline?
- source_sentence: New stores | 131 | | 333 | | 464 | | 311 | | 225 | 536
  sentences:
  - How many new stores did the Dollar Tree segment open in the fiscal year ending January 28, 2023?
  - How is the discount rate for the Family Dollar goodwill impairment evaluation determined?
  - What does IBM’s 2023 Annual Report to Stockholders include?
