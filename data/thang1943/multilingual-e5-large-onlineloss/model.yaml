- source_sentence: 'Chế độ sinh hoạt & phòng ngừa viêm đường hô hấp trên Những thói quen sinh hoạt có thể giúp bạn hạn chế
    diễn tiến của viêm đường hô hấp trên Chế độ sinh hoạt: Tuân thủ theo hướng dẫn của bác sĩ trong việc điều trị. Duy trì
    lối sống tích cực, hạn chế sự căng thẳng. Liên hệ ngay với bác sĩ khi cơ thể có những bất thường trong quá trình điều
    trị. Thăm khám định kỳ để được theo dõi tình trạng sức khỏe, diễn tiến của bệnh và để bác sĩ tìm hướng điều trị phù hợp
    trong thời gian tiếp theo nếu bệnh chưa có dấu hiệu thuyên giảm. Bệnh nhân cần lạc quan. Tâm lý có ảnh hưởng rất lớn đến
    điều trị, hãy nói chuyện với những người đáng tin cậy, chia sẻ với những thành viên trong gia đình, nuôi thú cưng hay
    đơn giản là đọc sách, làm bất cứ thứ gì khiến bạn thấy thoải mái. Hạn chế nói nhiều nếu bị ho, đau họng. Nhỏ mũi bằng
    nước muối sinh lý có thể giúp giảm nghẹt mũi. Che miệng khi ho, hắt hơi. Tạm thời không bơi lội nếu bị viêm mũi, viêm
    xoang. Nghỉ ngơi rất quan trọng trong quá trình phục hồi bệnh, kết hợp với việc tập thể dục nhẹ nhàng. Chế độ dinh dưỡng:
    Uống nhiều nước, có thể bổ sung thêm nước ép trái cây và nên uống ấm. Không nên uống rượu bia do có thể làm kích thích
    thêm phản ứng viêm và làm sưng niêm mạc đường hô hấp cũng như các xoang. Ăn sữa chua hoặc dùng thêm probiotic để bổ sung
    thêm lợi khuẩn đường ruột bị mất do dùng kháng sinh. Phương pháp phòng ngừa viêm đường hô hấp trên hiệu quả Để phòng ngừa
    bệnh hiệu quả, bạn có thể tham khảo một số gợi ý dưới đây: Giữ vệ sinh cá nhân, rửa tay sạch trước khi ăn và nấu ăn. Đeo
    khẩu trang khi ra đường, đặc biệt là ở nơi đông người. Hạn chế tiếp xúc với tác nhân gây kích ứng đường hô hấp (khói bụi,
    ô nhiễm…). Tập cai thuốc lá, kể cả thuốc lá điện tử. Có chế độ làm việc và nghỉ ngơi hợp lý, ngủ đủ giấc. Thường xuyên
    rèn luyện thể dục thể thao để nâng cao sức khỏe và cải thiện chức năng hệ hô hấp. Tiêm ngừa cúm và viêm phổi định kỳ.'
  sentences:
  - Nguy cơ bệnh tim mạch
  - "Chào BS,\r\n\r\nTừ nhỏ thân nhiệt cháu đã cao hơn mọi người (mọi người còn tưởng cháu bị sốt khi chạm phải). Cháu cũng\
    \ ít ốm đau nhưng không thể tăng cân và hay mệt mỏi. Cháu có đi khám và nói triệu chứng thân nhiệt cao, biếng ăn, hay\
    \ mệt mỏi. BS có làm các xét nghiệm máu nhưng không tìm ra bệnh gì. BS có thể cho cháu biết thân nhiệt cao có phải là\
    \ bệnh không, có ảnh hưởng gì đến sức khỏe không ạ? Cháu đã từng bị sốt siêu vi, sốt xuất huyết.\r\n\r\n(Hứa Thị Hương\
    \ – TPHCM)"
  - Chế độ sinh hoạt & phòng ngừa viêm đường hô hấp trên
- source_sentence: 'Triệu chứng ung thư amidan khẩu cái Những dấu hiệu và triệu chứng của ung thư amidan khẩu cái Giai đoạn
    đầu: Đây lại là thời điểm vàng để chữa bệnh. Lúc này, các khối u đã bắt đầu hình thành, tuy còn nhỏ nhưng đã bắt đầu gây
    ảnh hưởng, tuy nhiên triệu chứng thường không rõ ràng, dễ nhầm lẫn với các bệnh lý khác. Nhận biết dấu hiệu của bệnh trong
    giai đoạn này là cực kỳ quan trọng. Khó nuốt: Triệu chứng điển hình khi mắc ung thư amidan khẩu cái. Amidan bị sưng tấy,
    có cảm giác đau khi va chạm với thức ăn và cổ họng luôn cảm thấy vướng víu. Khó phát âm: Bệnh nhân sẽ cảm thấy khó phát
    âm hơn, có thể nhầm lẫn là triệu chứng của viêm họng nên thường bỏ qua. Đau: Bệnh nhân bị đau khi nuốt thức ăn, uống nước
    hoặc ngay cả nuốt nước bọt Cảm giác đau ngày càng tăng lên, sau đó có thể lan đến mang tai và đỉnh đầu. Chảy máu: Bệnh
    nhân có thể khạc nhẹ hoặc ho ra máu. Giai đoạn cuối: Các tế bào ung thư đã di căn sang bộ phận khác và người bệnh có thể
    cảm nhận được cơn đau rõ hơn. Triệu chứng rõ ràng nhất là cứng hàm, đau ở tai và sâu hốc mắt. Ngoài ra, cũng có thể gặp
    các triệu chứng sau: Đau toàn thân: Do tế bào ung thư đã di căn đến nhiều bộ phận khác trên cơ thể, cơn đau thường xuyên
    hơn, nghiêm trọng hơn và lan rộng ở thái dương, vòm họng, tai, xương, đau nhức toàn thân… Cứng hàm: Khối u đã phát triển
    to hơn và lan nhanh đến khớp hàm thái dẫn đến chèn ép cơ cắn và gây khít hàm khiến người bệnh khó mở miệng, không thể
    ăn uống hoặc nói chuyện bình thường. Cụt lưỡi gà: Một số trường hợp, tế bào ung thư sẽ ăn đứt lưỡi gà và tạo thành lỗ
    hổng trong miệng làm thức ăn không thể xuống dạ dày để tiêu hoá mà trào ngược lên vùng mũi, khiến bệnh nhân gặp nhiều
    khó trong việc ăn uống. Ho ra máu : Tế bào ung thư gây ra viêm nhiễm, lở loét nặng khiến bệnh nhân thường xuyên ho và
    khạc đờm ra máu. Vùng tai, mũi, họng cũng có thể chảy máu kèm theo choáng váng, suy giảm chức năng. Ở giai đoạn cuối,
    bệnh tiến triển nhanh và khả năng cứu chữa là cực kỳ thấp. Vì vậy, khi có dấu hiệu nghi ngờ ung thư amidan khẩu cái, cần
    thăm khám và điều trị ngay. Khi nào cần gặp bác sĩ? Nếu có bất kỳ triệu chứng nào nêu trên xảy ra, bạn nên liên hệ ngay
    với bác sĩ để được kiểm tra và tư vấn. Chẩn đoán và điều trị sớm sẽ giảm nguy cơ tăng nặng của bệnh và giúp bạn mau chóng
    hồi phục sức khỏe.'
  sentences:
  - Triệu chứng ung thư amidan khẩu cái
  - "Thưa BS,\r\n\r\nCon em được 4 ngày tuổi. Bé có nuốt phải sợi tơ ở khăn sữa bong ra. Khoảng 5-7 sợi. Vậy con em có sao\
    \ không? Em cần phải làm gì ạ?\r\n\r\nEm mong sự giúp đỡ sớm nhất từ AloBacsi. Em cảm ơn ạ!"
  - "Thưa bác sĩ,\r\n\r\nCháu vừa đốt “chai chân” được 2 ngày, vết đốt có đường kính khoảng 1,5cm. Cháu được kê đơn bôi \"\
    pusadine\" nhưng vết đốt chảy máu khá nhiều, rất khó bôi thuốc. Cháu muốn hỏi BS cách chăm sóc vết thương an toàn và hiệu\
    \ quả nhất? Cháu xin chân thành cảm ơn!\r\n\r\n(Nguyễn Văn Chính - Bắc Giang)"
- source_sentence: 'Bạn Châu thân mến, Zoacnel (isotretinoin) là được sử dụng trong điều trị các dạng mụn trứng cá nặng, đặc
    biệt là mụn trứng cá dạng nang bọc khi các phương pháp điều trị khác như sử dụng thuốc bôi, làm khô, kháng sinh uống hoặc
    dùng tại chỗ không đáp ứng. Thuốc gây ra nhiều tác dụng phụ bao gồm triệu chứng ngoài da như khô da, nhạy cảm với ánh
    sáng; đường tiêu hóa như khô môi, buồn nôn, nôn, đau bụng, chán ăn, viêm lợi, trên mắt như viêm kết mạc, rối loạn thích
    nghi bóng tối, đục thủy tinh thể; trên hệ thần kinh trung ương như rối loạn thị trường, đau đầu, trầm cảm... Theo 1 nghiên
    cứu đánh giá ảnh hưởng của khi sử dụng trong thời gian dài, các tác dụng phụ có thể gặp với mức độ nhẹ trên cơ xương,
    niêm mạc, khô da, khô mắt, đau khớp và tiến triển nặng của chàm. Tuy nhiên, nghiên cứu kết luận rằng sử dụng isotretinoin
    thời gian dài trong điều trị mụn trứng cá là an toàn, không gây tác dụng phụ nghiêm trọng. Isotretinoin có khả năng gây
    ảnh hưởng đến thai, tránh mang thai trong thời gian dùng thuốc và ít nhất 1 tháng sau khi ngưng thuốc. Hiện tại chưa có
    nghiên cứu hay báo cáo về khả năng gây vô sinh của isotretinoin. Chúc bạn sức khỏe. Hasan – Dermapharm '
  sentences:
  - "Xin chào bác sĩ,\r\n\r\nEm bị đau bụng ở xung quanh vùng rốn, đau xuất hiện vào ban đêm, ban ngày vẫn bình thường. Vậy\
    \ thưa BS, em bị mắc bệnh gì ạ? Có nguy hiểm không? Có cách nào điều trị không BS? Chân thành cảm ơn BS."
  - "Chào BS,\r\n\r\nCháu là nam giới, 20 tuổi. 1 tuần nay cháu thấy cả hai bên đầu vú hơi nhức khi chạm vào. Bên đầu vú phải\
    \ sờ vào thì thấy có khối rắn nhỏ và hơi đau. Cháu đi khám ở BV Ung Bướu, cả 2 BS đều khẳng định là bị nữ hóa tuyến vú.\
    \ Nửa mừng nửa lo nên cháu quên hỏi thêm BS. Hôm nay gửi thư mong được giải đáp một số thắc mắc ạ:\r\n\r\n1. Bệnh này\
    \ lành tính hay ác tính?\r\n2. Có thể chữa khỏi được không?\r\n3. Bệnh có ảnh hưởng đến giới tính không ạ?\r\n\r\nSau\
    \ khi khám xong BS còn kê cho cháu 1 đơn thuốc, gồm các thuốc sau:\r\n\r\n1. Puyol Danazol 200mg (30 viên) - Uống sáng\
    \ 1 viên\r\n2. Serecu (30 viên) - Uống sáng 1 viên\r\n3. Mebufen 500 (500mg )(30 viên) - Uống sáng 1 viên, chiều 1 viên\r\
    \n\r\nCháu thắc mắc không biết các loại thuốc này uống vào sẽ có tác dụng gì cho bệnh Nữ hóa tuyến vú của cháu? Cháu thắc\
    \ mắc vì khi đọc sơ qua hướng dẫn sử dụng và tác dụng thuốc, có cảm giác như thuốc dành cho nữ giới. \r\n\r\nCháu cám\
    \ ơn BS!\r\n\r\n(Duy Tân)"
  - "AloBacsi ơi,\r\n\r\nEm bị mụn trứng cá, đi khám tại BV Da liễu, bác sĩ cho thuốc Zoacnel, vitamin E và một số thuốc khác.\
    \ Sau đó em tự lấy toa đi mua thuốc về uống tiếp trong 15 tháng, được biết thuốc không được uống liên tiếp quá 5 tháng,\
    \ nếu quá liều sẽ gây vô sinh rất lớn. Em đang rất lo sợ. Mong AloBacsi tư vấn giúp. Em xin cảm ơn!\r\n\r\n(Nguyễn Thị\
    \ Châu - Đồng Nai)"
- source_sentence: 'Nguy cơ hội chứng swyer Những ai có nguy cơ mắc phải hội chứng Swyer? Hội chứng Swyer có thể xuất hiện
    ở con của những người kết hôn cận huyết . Điều này tạo nên các tổ hợp gen đồng hợp trội hoặc đồng hợp lặn trên nhiễm sắc
    thể thường. Nguy cơ cả cha và mẹ đều mang gen di truyền bị đột biến và sinh ra đứa con bị bệnh là 25% trong mỗi lần mang
    thai . Nguy cơ sinh con mang gen bệnh là 50% trong mỗi lần mang thai. Tỷ lệ để đứa trẻ nhận được gen không bệnh từ cả
    bố và mẹ là 25%. Nguy cơ là như nhau đối với con trai và con gái. Một số yếu tố làm tăng nguy cơ mắc phải hội chứng Swyer
    Một số yếu tố nguy cơ có thể dẫn đến hội chứng Swyer bao gồm: Tiền sử gia đình: Gia đình có người thân ruột thịt mắc các
    rối loạn phát triển giới tính. Vô kinh nguyên phát: Trẻ gái đến tuổi dậy thì (trung bình vào khoảng 14 tuổi) không có
    kinh nguyệt.'
  sentences:
  - Nguy cơ hội chứng swyer
  - Nguy cơ yếu sinh lý
  - Thuốc Cimetidine MKP 300mg Mekophar điều trị ngắn hạn loét dạ dày, tá tràng tiến triển (10 vỉ x 10 viên)
- source_sentence: Thân chào Đức Thịnh, Chiều cao mỗi người phụ thuộc 2 yếu tố là di truyền và môi trường. Nếu ba mẹ
    cao lớn thì thường con cũng thừa hưởng được yếu tố này. Nhưng điều có thể cải thiện đó là yếu tố môi trường, nghĩa
    là dinh dưỡng và luyện tập thể thao. Chiều cao con người có được là nhờ sự phát triển của lớp sụn tiếp hợp. Lớp sụn này
    phát triển liên tục làm xương dài ra. Phần phát triển mạnh nhất nằm ở vùng gối cũng như đầu trên xương cánh tay và vùng
    đầu dưới cẳng tay. Vùng sụn này, nhất là vùng gần gối, sẽ phát triển mạnh khi có sự kích thích cơ học, nghĩa là có sự
    chạy nhảy, vận động. Việc cung cấp đầy đủ dinh dưỡng cũng như sữa sẽ làm cho vùng sụn này phát triển tốt và là cơ sở
    cho việc tăng chiều cao. Khi phát triển đến một độ tuổi nào đó vùng sụn này sẽ không còn nữa thì sự phát triển chiều cao
    không còn. Với trường hợp của em, ở độ tuổi 20, khó có cơ hội tăng thêm chiều cao như giai đoạn dậy thì,
    nhưng hy vọng vẫn còn cao thêm một ít cho đến 25 tuổi. Việc tập xà đơn thì chưa thấy có nghiên cứu nào chứng
    minh môn này giúp phát triển chiều cao hơn các môn khác. Những môn thể thao chạy nhảy như bóng rổ, bóng chuyền, chạy
    điền kinh, cầu lông… đều có thể giúp phát triển chiều cao, không nhất thiết phải đi bơi hay tập xà như mọi người
    vẫn nghĩ. Em nên chơi môn thể thao nào mình yêu thích mới có thể duy trì thường xuyên và theo đuổi lâu dài
    được. Cường độ tập như thế nào thì tùy thuộc mỗi người, em nên tham khảo ý kiến huấn luyện viên hay thầy giáo thể dục
    để có hướng dẫn chính xác. Chúc em vui khỏe và tiếp tục cao thêm như mong muốn!
  sentences:
  - "Thưa bác sĩ,\r\n\r\nTôi nghe dân gian truyền miệng khi bị bỏng, nên bôi mỡ hoặc kem đánh răng lên vết thương thì không\
    \ có cảm giác nóng rát và mau lành. Điều này đúng không? (Nguyệt)"
  - "Thưa bác sĩ,\r\n\r\nEm là nam, năm nay 20 tuổi. Em cao 1.7m, bác sĩ có thể cho em biết là để tăng chiều cao thì em nên\
    \ tập xà đơn 1 ngày bao nhiêu hiệp, mỗi hiệp bao nhiêu cái?\r\n\r\nEm xin chân thành cảm ơn! (Đức Thịnh - Bình Định)"
  - "Xin chào bác sĩ,\r\n\r\nTôi đã có đủ số con. Tôi rất muốn đi triệt sản nhưng rất ngại đến bệnh viện. Tôi đã xem trên\
    \ mạng quy trình phẫu thuật thật đơn giản. Đã có lúc tôi đã lấy hết dũng cảm để rạch thử phần bìu một tí và dùng kẹp để\
    \ móc được ống dẫn tinh ra nhưng không dám tự làm tiếp vì chưa hiểu thế nào. \r\n\r\nXin hỏi bác sĩ nếu tự phẫu thuật\
    \ có nguy hiểm điều gì không?\r\n\r\nXin cảm ơn bác sĩ !"
