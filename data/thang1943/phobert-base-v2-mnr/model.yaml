      \ Bác sĩ tư đã cho thuốc em điều trị 1 tháng và theo uống thuốc được gần nửa tháng nhưng em thấy không gì khả quan cho\
      \ lắm. Bác sĩ cho em hỏi bệnh viện nào chuyên về điều trị bệnh này, điều trị ở đâu và như thế nào, hay em cứ theo điều\
      \ trị bác sĩ tư? Bệnh này để lâu có sao không? Mọi sinh hoạt hàng ngày chở nên khó khăn với em làm em lo âu bất an.\
      \ Mong bác sĩ tư vấn giúp em ạ!"
    - Chào BS ạ,Tôi điều trị lao tháng thứ 6 quên uống thuốc 10 ngày giờ dùng lại thuốc được không ạ? Xin BS tư vấn!
  - source_sentence: "- Nguồn: Internet Chào bạn, Nếu trường hợp vết thương của bé không sâu thì không\r\ncần phải may lại\
      \ nhưng nếu ngược lại thì cần phải khâu lại để cầm máu. Ngoài\r\nra, cũng nhờ khâu lại vết thương mới lành và liền sẹo\
      \ tốt hơn, bạn nhé!"
    sentences:
    - "Chào BS,\r\n\r\nBé em được 14 tháng tuổi, bị té rách ngang môi dưới gần sát mép, vậy có nên cho bé đi may lại không\
      \ thưa BS? Sau này bé có bị sẹo không? Cám ơn BS!    \r\n\r\n(Ngọc Huyền - Bến Tre)"
    - Chào bác sĩ.1 tuần nay tôi thấy khó chịu 2 bên quai hàm, há miệng khó nhưng không đau, không sưng, không sốt, ấn thì
      thấy bì bì. Tôi sợ bị quai bị nên đi khám, bác sĩ cho đi siêu âm, kết quả tuyến nước bọt mang tai 2 bên tăng âm, tuyến
      nước bọt dưới hàm 2 bên bình thường, bác sĩ không kết luận cũng không kê đơn, chỉ dặn là nếu đau thì uống giảm đau,
      sốt thì uống hạ sốt, cũng không bảo có phải quai bị hay không. Vậy là tôi bị bệnh gì, có phải quai bị không và tôi phải
      làm sao? Xin chân thành cảm ơn bác sĩ.
    - Thuốc Egalive 150mg Mediplantex hỗ trợ điều trị chứng tăng amoniac huyết (6 vỉ x 10 viên)
  - source_sentence: 'Mô tả ngắn:

      Neuropyl 800 là sản phẩm của Công ty Cổ phần dược Danapha (Việt Nam), thành phần chính là Piracetam. Thuốc được chỉ
      định điều trị rung giật cơ có nguồn gốc vỏ não, thiếu máu não, suy giảm nhận thức ở người già.

      Thành phần:

      Piracetam: 800mg

      Chỉ định:

      Người lớn

      Đơn trị liệu hoặc phối hợp trong chứng rung giật cơ có nguồn gốc vỏ não.

      Điều trị thiếu máu não.

      Điều trị suy giảm nhận thức ở người già.

      Điều trị chóng mặt.

      Trẻ em

      Điều trị triệu chứng khó đọc, kết hợp với các biện pháp thích hợp như liệu pháp dạy nói.'
    sentences:
    - "Dạ xin chào bác sĩ, dạo này em cảm thấy lo lắng quá gần như bị stress vì suy nghĩ về vấn đề sức khỏe\
      \ của mình làm ảnh hưởng đến việc học tập và làm việc, nhưng vì nhiều lý do nên không tiện đến bệnh\
      \ viện khám chữa bệnh nên mới lên đây tìm kiếm để xin bác sĩ lời khuyên ạ. Rất mong nhận được sự giúp\
      \ đỡ của bác sĩ. \r\n\r\nEm là nam, 21 tuổi, cách đây 2 năm là người khỏe mạnh vì em rất thích tập thể\
      \ hình nhưng thời gian gần đây em cảm thấy sức khỏe có phần sa sút vì dính đến ma túy đá cùng với bạn\
      \ bè. Đến bây giờ đã thấy được tác hại nghiêm trọng của nó nên đã dứt khoát dừng sử dụng được 5 tháng,\
      \ sau khi cai nghiện và thay đổi sinh hoạt một cách hợp lý đã thấy khỏe lại rõ rệt. \r\n\r\nSong qua tìm\
      \ hiểu về các bệnh truyền nhiễm qua đường hô hấp và nhận thấy được sự cần thiết trong việc chẩn đoán\
      \ phòng chống triệt tiêu mầm bệnh trong người nên tìm đến đây để xin lời khuyên ạ. Xin trân trọng cám ơn."
    - "Thưa bác sĩ,\r\n\r\nEm chỉ có một tình hoàn có ảnh hưởng gì đến khả năng có con không? Năm nay em 22 tuổi mọi sinh\
      \ hoạt bình thường như các bạn nam khác. Em và người anh em sinh đôi cũng như vậy từ khi mới sinh ra?"
    - Thuốc Neuropyl 800 Danapha điều trị rung giật cơ có nguồn gốc vỏ não, thiếu máu não, suy giảm nhận thức (5 vỉ x 10 viên)
  - source_sentence: Chào em, Theo như em trình bày cho thấy bé bị suy dinh dưỡng chiều cao theo tuổi, nguyên nhân chủ yếu
      là do bé không chịu uống sữa. Nhưng em cũng cần tìm hiểu xem nguyên nhân nào bé không chịu uống (do bé không thích uống
      loại sữa đó, do pha không đúng, ngọt quá hay béo quá,…), chứ đừng ép bé uống bằng mọi cách, vì có thể gây nguy cơ ói
      sặc sữa lên mũi, phổi gây viêm phổi, tắc đường thở,… Tốt nhất, em nên đưa bé đến BV Nhi Đồng khám và điều trị. Thân
      mến.
    sentences:
    - "Chào BS,\r\n\r\nCon em hiện nay được 11 tháng tuổi. Bé trai nặng 10.8 kg, cao trên 70 cm. Hiện em cho bé ăn ngày 3\
      \ bữa bột + ti mẹ. Nhà em tìm đủ mọi cách cho bé uống sữa mà bé không chịu uống (ti bình, xúc thìa, dùng ống hút, xi-lanh,\
      \ uống trực tiếp bằng cốc, đổi nhiều loại sữa), giờ mỗi lần uống cháu khóc ầm lên, rồi nôn trớ.\r\n\r\nCháu mọc 8 răng\
      \ rồi, giờ sắp thêm 2 cái nữa. Cháu chưa đi được ạ. Bà cháu đang bảo cháu gầy gòm, đứa kém tháng biết đi rồi mà cháu\
      \ không uống sữa nên chưa biết đi.\r\n\r\nBS cho em hỏi, nhà em có nên ép bé uống không ạ? Nhà em bảo ép uống, khóc\
      \ cũng phải uống, uống vài lần là quen. Thậm chí bác họ còn bảo, nôn cũng phải uống tiếp, cho lần sau không dám nôn,\
      \ khóc tím tái mặt mày cũng phải uống. Mà nhìn con khóc em không đành ép ạ. Trước cháu còn ăn sữa chua, giờ cháu không\
      \ ăn nữa rồi ạ. BS cho em lời khuyên với ạ!"
    - "Em là nam, năm nay 16 tuổi. Vùng mông của em xuất hiện các rạn da trắng bệch nhìn rất thiếu thẩm mĩ. Em cũng không\
      \ quá béo, tầm 60kg thôi. Cho em hỏi cách chữa trị với!\r\n\r\n(Trần Đ. A. - TPHCM)"
    - "Chào BS Thu Cúc,\r\n\r\nBS ơi, cho em hỏi: Em đau vùng thắt lưng, sau đó lan xuống 2 bên mông gần xương cụt, nhói lên\
      \ từng cơn như đau dây thần kinh. Khớp háng cử động khó khăn, đặc biệt sau khi ngủ dậy, vận động nhiều thì thấy bớt,\
      \ nhưng ngồi lâu lại bị. Rồi lan xuống bắp chân.\r\n\r\nEm là nhân viên văn phòng nên ngồi nhiều, việc đau này ảnh hưởng\
      \ nhiều đến công việc của em lắm BS có thể tư vấn giúp em được không ạ.\r\n\r\nXét nghiệm máu CRP Dương tính và Acid\
      \ uric 8.04"
  - source_sentence: "Chỉ thỉnh thoảng e mới mang thôi, còn lại thì\r\nem chỉ mang giày đề bệt hoặc mang dép. Em cũng không\
      \ hề làm việc gì nặng nhọc. Xin bác sĩ hãy giải thích giùm em và có cách nào để chữa trị không ạ? Em xin\r\ncám ơn.\
      \ (Phương Mai-Đà nẵng) BS Châu Thị Kiều Oanh: Phương Mai mến, Chân nổi gân xanh, tức nổi tĩnh mạch\r\nlà do giãn tĩnh\
      \ mạch. Nguyên nhân có thể do di truyền, do làm việc chân tay\r\nnhiều, do mang thai, do nghề nghiệp phải đứng ngồi\
      \ lâu (thợ cắt tóc, thợ dệt,\r\ncảnh sát giao thông, thợ may, tài xế)... Thường gặp ở nữ nhiều hơn nam do ảnh\r\nhưởng\
      \ của nội tiết tố oestrogen. Ngoài việc mất thẫm mỹ, dãn tĩnh\r\nmạch còn gây phù, đau nhức, đứng lâu nặng trĩu chân\
      \ rất khó chịu. Điều trị có nhiều biện pháp: - Dùng băng ép nhằm giảm đường kính\r\nlòng tĩnh mạch để tăng khả năng\
      \ lưu thông máu. - Uống các thuốc làm vững bền thành\r\nmạch như daflon, rutin C... , các thuốc làm xơ hóa lòng mạch.\
      \ - Tiêm gây xơ tại chỗ. - Phẫu thuật lấy bỏ các tĩnh mạch\r\nnông bị giãn. Hạn chế bệnh nặng hơn bằng cách\r\nkhông\
      \ đứng ngồi lâu (nếu cần phải thay đổi công việc), tránh ngồi xổm, hoặc đi\r\ngiày cao gót; khi nằm ngồi nên kê chân\
      \ cao; cần giảm trọng lượng nếu béo phì;\r\năn nhiều chất xơ uống nhiều nước để tránh táo bón; mang vớ y khoa nhằm ép\
      \ tĩnh\r\nmạch nông, giúp cho tuần hoàn máu được tốt hơn; cần tập thể dục… Em nên đi khám để được siêu âm mạch\r\nmáu\
      \ tay chân và điều trị nhé."
    sentences:
    - Viên nén Kaleorid 600mg LEO phòng ngừa và điều trị giảm kali huyết (3 vỉ x 10 viên)
    - (AloBacsi) - Năm nay em 25 tuổi, không hiểu sao dạo gần đây tay chân em lại nổi gân lên, mặc dù em rất ít mang giày
      cao gót
    - "Thưa BS,\r\n\r\nCháu năm nay 18 tuổi, giới tính nam. Trước đây cháu có bị mồ hôi nách sau đó cháu có sử\
      \ dụng phèn chua và gừng đề chà xát vào nách. Sau đó mồ hôi nách cháu có biểu hiện ra nhiều hơn và\
      \ đau rát nách nhưng vùng nách của cháu không xuất hiện nốt hay biểu hiện gì.\r\n\r\nVà sau đó cháu còn\
      \ bị kèm thêm triệu chứng hay bị ra mồ hôi ở trán và toàn thân hoạt động 1 lúc thì mồ hôi ra rất nhiều.\r\
      \n\r\nCháu đã đi khám ở nhiều BV khoa da liễu nhưng vẫn không khỏi bệnh. Cháu mong BS tư vấn cho cháu. Cháu\
      \ xin cảm ơn!\r\n\r\n(Đặng Đình Đ. - Hà Nội)"
