  - dataset_size:54755
  - loss:MultipleNegativesRankingLoss
  base_model: nampham1106/bkcare-embedding
  widget:
  - source_sentence: Chào bạn, Kết quả xét nghiệm trên cho thấy men gan của bạn trong giới hạn bình thường. Bạn có thể cung
      cấp thêm các chỉ số xét nghiệm khác và tiền sử bệnh để BS tư vấn cụ thể hơn cho bạn! Thân mến.
    sentences:
    - Phương pháp chẩn đoán & điều trị bụi phổi silic
    - Triệu chứng thoát vị não
    - "BS cho em hỏi,\r\n\r\nKết quả xét nghiệm như vậy là sao thưa BS, có nghiêm trọng không ạ?"
  - source_sentence: "Chào em, Chế độ ăn uống thường có liên quan\r\nđến tính chất, màu sắc, mùi… của phân. Hiện tại, nếu\
      \ bé chỉ đi ngoài 1 lần và\r\nphân đóng khuôn thì không có gì bất thường và không cần dùng thuốc. Trong phân có một\
      \ ít dịch trắng\r\nkhông nói lên được bệnh lý gì em nhé. Bé vẫn ăn uống, vui chơi bình thường thì\r\nem đừng quá lo\
      \ lắng về vấn đề này. Bé\r\nem sinh mổ hiện nay đã được 5 tuần, hàng ngày em vẫn thấy bé bú và ngủ bình\r\nthường nhưng\
      \ sao bé thường đi ngoài ra nước có ít hột, nước nhiều hơn. Đôi khi\r\nbé rặn ra toàn nước. Đặc biệt là khi bú bé thường\
      \ rặn ị và đi tiểu. Nhiều khi\r\nbé đang bú bé muốn ị và tiểu là bé khóc, như vậy có vấn đề gì không ạ? Bé nhỏ\r\nnhư\
      \ con em đi ngoài thế nào là bình thường? Lỗ mũi của bé bị nghẹt 3-4 tuần nay\r\ncó sao không ạ? Và bé thường ọc sữa\
      \ sau khi bú? (DN Thom – ) BS-CK1 Nguyễn Thị Thu Thảo: Chào em, Theo em trình bày, BS nhận thấy\r\ntính chất phân của\
      \ bé không được bình thường (đi ngoài có ít hột, nước nhiều\r\nhơn, đôi khi bé rặn ra toàn nước) nhưng em cần cung cấp\
      \ thêm thông tin, mỗi\r\nngày bé đi ngoài mấy lần, bé đang bú mẹ hay bú bình…có đầy đủ thông tin BS mới\r\ncó thể đánh\
      \ giá cụ thể hơn được em nhé. Bình thường ở lứa tuổi sơ sinh bé\r\ncó thể đi ngoài nhiều lần, từ 3 – 4 lần nếu bé bú\
      \ mẹ, phân sệt hoặc hoa cà hoa\r\ncải, còn bé bú bình thì sẽ đi ngoài ít hơn và phân thường đặc hơn bé bú mẹ. Vấn đề\
      \ mũi của bé bị nghẹt thì em\r\nnên dùng dung dịch Nacl 0,9% làm vệ sinh mũi mỗi ngày. Còn triệu chứng ọc sữa\r\nsau\
      \ khi bú cũng thường gặp ở bé sơ sinh và nhũ nhi, nhưng quan trọng là bé ọc\r\nmỗi ngày bao nhiêu lần, ọc sữa có ảnh\
      \ hưởng đến phát triển thể chất của bé\r\nkhông…nếu có thì cần loại trừ bệnh lý . Thưa\r\nbác sĩ, Con\r\ntôi hiện nay\
      \ được 3 tháng tuổi. Hơn 1 tháng nay cháu đi ngoài có hiện tượng\r\nphân rất nhiều nhầy, có bọt, nhiều nước, phân màu\
      \ vàng và có mùi chua, ngày đi\r\n3, 4 lần. Tôi mới cho cháu đi khám ở Viện Sản nhi của tỉnh. BS cho siêu âm và\r\n\
      làm xét nghiệm phân. Kết quả siêu âm là ổ bụng có nhiều quai ruột, chướng hơi.\r\nKết quả xét nghiệm phân: bạch cầu\
      \ (+), hồng cầu (-), hạt mỡ (+), cặn dư (++),\r\nKSTĐR (-). BS kết luận cháu bị tiêu chảy cấp và cho đơn thuốc uống\
      \ 7 ngày,\r\ndặn cháu khi uống 7 ngày không khỏi thì chuyển sang tiêm. Đơn\r\nthuốc gồm có Cefixime 100mg (dạng bột),\
      \ Smecta 3g, L.Bio 3D, Zinc-kid. Theo tôi\r\nđược biết Cefixime 100mg là kháng sinh thế hệ III. Con tôi lại chưa đủ\
      \ 6 tháng\r\ntuổi nên tôi chưa dám cho cháu uống. Vậy nên tôi muốn hỏi BS cách điều trị\r\ncho cháu trong trường hợp\
      \ này. Liệu tôi có nên cho uống kháng sinh theo chỉ\r\nđịnh của vị BS đó không? (Lê\r\nThị May - Hưng Yên) BS-CK1 Nguyễn\
      \ Thị Thu Thảo: Chào bạn, Theo bạn trình bày cho thấy số lần\r\nđi ngoài của bé như trên là không nhiều, tính chất phân\
      \ và xét nghiệm phân tuy\r\ncó bất thường nhưng không có biểu hiện nhiễm trùng đường ruột. Do đó, trong trường hợp này\
      \ tôi sẽ\r\nkhông dùng thuốc kháng sinh và thuốc Smecta. Hai loại thuốc còn lại bạn nên dùng\r\nvà cho bé bú mẹ bình\
      \ thường, mẹ cần ăn uống đủ chất dinh dưỡng rồi cho bé bú\r\nchứ đừng quá kiêng khem. Chào\r\nbác sĩ, Con\r\ntrai em\
      \ được 5,5 tháng, nặng 7.3kg. Từ khi mới sinh cháu đi ngoài xì xoẹt, nhầy,\r\nlợn cợn trắng, đầu vàng để 1 lúc thì xanh,\
      \ lúc sủi bọt, lỏng toàn nước, ngày đi\r\n7,8 lần nhưng có lần 3 ngày, 5 ngày mới đi. Cháu\r\nbị tim bẩm sinh, tháng\
      \ đầu cháu bị viêm phổi phải nằm BV Nhi TW 1 tuần. Em đã\r\ncho uống men tiêu hóa dạng ống của Pháp nhưng không khỏi.\
      \ Mới đây em có mua Neopeptine,\r\nuống bữa nào thì phân sệt và vàng bữa đấy, còn không lại như trước. Xin hỏi BS\r\n\
      cháu có phải bị rối loạn tieu hóa không ạ? (Minh\r\nHiển - Vĩnh Phúc) BS-CK1 Nguyễn Thị Thu Thảo: Chào em, Hệ tiêu hóa\
      \ của bé đang bị rối loạn\r\nrồi đó em, lúc thì bé đi ngoài nhiều lần trong ngày (7 – 8 lần), lúc thì 3 – 5\r\nngày\
      \ mới đi… nhưng không có biểu hiện nhiễm trùng đường ruột. Trường hợp này em cần bổ sung thêm\r\nmen vi sinh dạng ống\
      \ như em đã dùng và sirô kẽm nhiều ngày, còn men tiêu hóa (Neopeptine)\r\nthì em không nên lạm dụng cho bé em nhé. Thưa\r\
      \nbác sĩ, Bé\r\nnhà em hơn 13 tháng. Bé bị đi ngoài cách đây hơn 2 tuần nay. Lúc đầu phân nát,\r\nsệt, có nước, 3 lần/ngày,\
      \ em cho uống men Enterogina của Pháp, bé vẫn đi ngày\r\n2-3 lần. Em cho bé khám gần nhà và gửi mẫu phân xét nghiệm\
      \ kết quả bình thường,\r\nBS kê đơn bé uống men Enterogimina, Hidrasec 10mg chia 2 lần, kẽm. Bé uống vẫn\r\nđi ngày\
      \ 2-3 lần. Cách\r\nđây 4 ngày, em cho bé đi Nhi Đồng 2 khám và xét nghiệm phân. Kết quả có bạch\r\ncầu ít, phân sệt.\
      \ BS kê bé uống Cefixim 100mg chia 2 lần, Hidrasec 10mg 2\r\ngói/ngày, kẽm 1 viên, Lactomin plus 2 gói. Bé uống 4 ngày\
      \ vẫn không cải thiện\r\ntình trạng và số lần đi ngoài. Sáng\r\nnay em cho vào Nhi Đồng khám lại. BS khác lại bảo bạch\
      \ cầu ít không quan trọng\r\nvà kê đơn bé uống: Neopettin, Enterrogimina, Kẽm. Bình\r\nthường bé uống sữa Nan số 3,\
      \ tối qua em đổi sữa albot dành cho trẻ tiêu chảy.\r\nTừ ngày bé bị đi ngoài em chỉ cho ăn cháo thịt nạc + cà rốt hoặc\
      \ khoai tây. Có hôm\r\ncháo thịt khôn, không trái cây. Giờ bé hơn 13 tháng vẫn 9kg (hơn tháng không\r\ntăng cân), bé\
      \ đi giỏi. Em\r\nrất lo nếu để tiêu chảy kéo dài bé sẽ bị suy dinh dưỡng. Mong BS cho em lời\r\nkhuyên. (Xuan Quynh\
      \ – TPHCM) BS-CK1 Nguyễn Thị Thu Thảo: Chào em, Việc em lo lắng như trên là rất\r\nđúng “tiêu chảy kéo dài bé sẽ bị\
      \ suy dinh dưỡng”, nhưng theo tính chất phân và\r\nxét nghiệm phân của bé cho thấy bé không có biểu hiện nhiễm trùng\
      \ đường ruột. Vì vậy, em nên cho bé ăn uống đủ\r\nchất dinh dưỡng, không kiêng khem gì em nhé (thiếu dinh dưỡng cũng\
      \ là một vòng\r\nlẩn quẩn làm cho bé tiêu chảy kéo dài). Sữa dành cho bé tiêu chảy em có thể\r\ndùng cho bé trong thời\
      \ gian này nhưng cần pha đúng theo hướng dẫn có ghi trên\r\nbao bì và không nên sử dụng kéo dài khi bé đã khỏi bệnh.\
      \ Ngoài ra, em nên bổ sung thêm men\r\nvi sinh (Lactamin hoặc Enterogermina…) và sirô kẽm kéo dài nhiều ngày hoặc em\r\
      \ncó thể cho bé tiếp tục tái khám lại ở BV Nhi Đồng. Thân mến, Bài\r\ntham khảo: >> >>"
    sentences:
    - "Xin chào AloBacsi,\r\n\r\nCon gái em được 8,5 tháng và nặng 8,5 kg. Cách đây gần 1 tháng bé bị đi ngoài phân lỏng,\
      \ thi thoảng có mùi trứng thối, và ngày đi 3-4 lần. Sau đó khoảng 10 ngày em cho đi khám BS và sau khi uống thuốc được\
      \ 5 ngày, bé nhà em đi ngoài ngày 1 lần, phân thành khuôn và thối, nhưng phân có một ít dịch trắng trong phân. Bác sĩ\
      \ cho em hỏi con em như vậy có cần uống thuốc gì không ạ? Cảm ơn BS!"
    - Chào bác sĩ, em uống ARV nay được 1 năm. Trong tháng này em không biết đã quên uống thuốc ngày nào, do hôm nay em đếm
      lại số thuốc mới phát hiện dư 1 viên. Nếu em quên uống thì có ảnh hưởng gì đến việc điều trị và có ảnh hưởng đến sức
      khỏe không thưa bác sĩ?Lần đầu tiên xét nghiệm CD4 của em là 528, sau 6 tháng xét nghiệm lại chỉ còn 506. Vậy có vấn
      đề gì không ạ? Mong bác sĩ giải đáp giúp em.
    - Chào bác sĩ, em xin hỏi thoái hóa đốt sống cổ có chữa khỏi hẳn được không ạ?
  - source_sentence: "Chào bạn, Theo như bạn miêu tả, bác sĩ nghĩ bạn đang gặp . Có nhiều nhóm cơ và thần kinh ảnh lên hoạt\
      \ động nuốt. Do đó, vấn đề của\r\nbạn có thể do nhiều nguyên nhân khác nhau gây ra bao gồm hầu họng, thực quản,\r\n\
      thần kinh… Nguyên nhân thường gặp nhất của nuốt khó là ở thực quản,\r\nnội soi thực quản dạ dày cho kết quả bình thường\
      \ không thể loại trừ nguyên nhân\r\ntại đây, cần phải làm thêm nhiều phương pháp chẩn đoán chuyên sâu. Do đó, tôi\r\n\
      khuyên bạn nên đến khám ti bệnh viện lớn có chuyên khoa Tiêu hóa để có được chẩn\r\nđoán và điều trị thích hợp. Kể cả\
      \ khi có chẩn đoán chính xác, việc điều trị cũng cần\r\nđòi hỏi kiên nhẫn. Nếu như việc ăn uống không bị ảnh hưởng và\
      \ bạn không\r\nxuất hiện thêm triệu chứng nào khác, bạn không cần quá lo lắng mà hãy tuân thủ\r\ntheo chế độ điều trị\
      \ của bác sĩ và tái khám đều đặn bạn nhé. BS Võ Thị Tố Uyên - AloBacsi.com"
    sentences:
    - Thuốc Atussin United hỗ trợ giảm các triệu chứng ho (25 vỉ x 4 viên)
    - "Chào BS, \r\n\r\nSau sinh mổ được 3 tuần em bị sốc khi phát hiện chồng ngoại tình, từ đó tinh thần sa sút, khóc thường\
      \ xuyên không dứt. Có lúc kích động không kiểm soát được lời nói và hành vi. Có thể tự làm mình đau khi giận chồng hoặc\
      \ nghĩ về chuyện cũ như tự cắn tay, đấm ngực, đập đầu vào vật cứng hoặc tường,... Đôi lúc có suy nghĩ tự tử dù chỉ nghe\
      \ một bài hát làm xúc động. Xin BS giúp em, có phải em bị bệnh tâm thần rồi không?"
    - "Thưa bác sĩ, 1 tuần nay em có cảm giác mắc nghẹn ở lồng ngực, lồng ngực chứ không phải cổ họng... Em đã đi nội soi\
      \ rồi nhưng chỉ bị viêm dạ dày nhẹ... Uống thuốc 4 ngày vẫn không thấy bớt tình trạng nghẹn.\r\n\r\nNgoài cảm giác nghẹn\
      \ ở ngực, em không bị đau gì cả, ăn uống bình thường, chỉ là lúc nào cũng cảm giác có thức ăn ở ngực không trôi xuống\
      \ được. Bác sĩ cho em hỏi, giờ em cần khám bệnh ở khoa nào, em nêu triệu chứng như trên thì bệnh viện cứ cho em vào\
      \ khoa tiêu hoá, giờ cả ngày em luôn có cảm giác như ăn cơm bị nghẹn ở lồng ngực, em năm nay chỉ mới 26. Không biết\
      \ bị gì, em lo lắng lắm. Xin bác sĩ tư vấn giúp. Cảm ơn bác sĩ.\r\n\r\n(Linh Ngọc - bạn đọc gửi qua facebook)"
  - source_sentence: Chào bạn, Phẫu thuật tiền liệt tuyến có nhiều phương pháp khác nhau như dùng tia laser, phẫu thuật nội
      soi, mổ mở… Mỗi phương pháp có ưu và nhược điểm khác nhau, tuỳ tình trạng từng bệnh nhân mà áp dụng. Cũng như mọi cuộc
      phẫu thuật khác, bệnh nhân sẽ phải chịu những biến chứng do cuộc mổ gây ra như tác dụng phụ của thuốc gây tê, gây mê,
      chảy máu, nhiễm trùng, tổn thương cơ quan xung quanh, tắc nghẽn đường tiểu do cục máu đông… Thường gặp nhất là các vấn
      đề về tiểu tiện, bao gồm đau khi đi tiểu, khó tiểu và tiểu tiện không tự chủ hoặc các vấn đề về kiểm soát nước tiểu.
      Những vấn đề này thường sẽ biến mất sau vài tháng phẫu thuật. Rất hiếm khi người bệnh sẽ bị tiểu tiện không tự chủ kéo
      dài hoặc mất khả năng kiểm soát tiểu tiện vĩnh viễn. Bạn nên tham khảo thêm ý kiến của BS chuyên khoa Ngoại Niệu để
      xác định thời điểm phù hợp nhất cho can thiệp ngoại khoa bạn nhé! Thân mến.
    sentences:
    - "Chào BS ạ,\r\n\r\nBa em năm nay 66 tuổi, bị bệnh tăng sản tuyến tiền liệt, uống thuốc hơn 1 năm. Nay gia đình dự định\
      \ đi mổ. Em muốn hỏi là bệnh này mổ xong có để lại di chứng gì về sau không ạ? Em cám ơn ạ."
    - "Thưa bác sĩ,\r\n\r\nEm thường hay suy nghĩ chậm, chậm hiểu khó tập trung trong công việc, lúc mọi người nói chuyện\
      \ thì trong đầu không thể suy nghĩ được gì để nói, làm việc gì cũng vậy hay nghĩ lung tung lúc đi ngủ cũng nghĩ lung\
      \ tung về chuyện quá khứ. Vậy bác sĩ cho em hỏi là em cần phải làm gì hoạt động như thế nào ăn uống ngủ nghỉ như thế\
      \ nào và uống thuốc gì để có đầu óc trở lên linh hoạt hơn ạ?"
    - Sau khi tập thể dục, đang lúc mồ hôi đổ nhiều thì tôi có được rửa mặt ngay không? Vì tôi nghe nói tắm sau khi tập thể
      dục dễ gây hiện tượng đột quỵ.
  - source_sentence: Chào em, Carcinoma tuyến vú là một dạng ung thư vú. Giai đoạn đầu của ung thư vú triệu chứng có thể mờ
      nhạt, dễ lầm lẫn với các bệnh lý khác, trong đó có áp-xe vú. Tuy nhiên khi BS đã kết luận mẹ của em bị carcinoma tuyến
      vú tức là đã có kết quả giải phẫu bệnh học - kết quả này gần như là chắc chắn ung thư. Mặc dù bệnh lý ung thư có thể
      nguy hiểm tới tính mạng, nhưng với những tiến bộ của y học, hiệu quả điều trị ung thư vú đã cải thiện rất nhiều. Nếu
      phát hiện sớm, điều trị phù hợp, đúng liệu trình thì bệnh vẫn có thể khỏi hoàn toàn. Phương pháp điều trị hiện nay chủ
      yếu là phẫu thuật, xạ trị, hoá trị, liệu pháp trúng đích, tuỳ vào lựa chọn và quyết định của BS điều trị, dựa trên mức
      độ nặng của bệnh. Do đó, em nên động viên, hỗ trợ mẹ tiếp tục điều trị và tuân thủ theo chuyên khoa tại BV Ung Bướu
      để bệnh mau khỏi em nhé! Thân mến.
    sentences:
    - Thuốc Osluma Khang Minh giúp hoạt huyết, khử ứ, giảm acid dạ dày (9 gói x 8g)
    - "BS ơi,\r\n\r\nMẹ cháu năm nay 39 tuổi. Hôm qua mẹ cháu đi khám bệnh, BS nói mẹ cháu bị Carcinôm ung thư tuyến vú bên\
      \ phải và có bướu ác tính kích thước 30mm. BS cho cháu hỏi là bệnh này có nguy hiểm đến người và có cách nào để điều\
      \ trị không ạ?"
    - Dạ thưa bác sĩ, vừa qua em có ăn cá lóc bị dính xương nhỏ của cá vào khe nhỏ giữa hai răng. Lấy đèn soi vào hoặc dùng
      tay thì không thấy được xương nhưng khi dùng lưỡi cà thì cảm nhận được xương ạ.Em nghĩ là xương này nhỏ và dính hơi
      sâu. Giờ em muốn xin ý kiến của bác sĩ ạ. Em phải là sao bây giờ em thực sự rất lo lắng. Mong sớm nhận được phản hồi
      từ bác sĩ
