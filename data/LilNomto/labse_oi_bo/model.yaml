  sentences:
  - 'bi öüni sonosun meded: bi dēdü-yi ayilidxan üyiledbei: tere imaqtadu eši üzüülüqseni tula: ögüülen durdaxui-gi bi üyiledbei::'
  - 'biligiyin činadu kürüqsen Dorǰi Zodboyin ači tusayin tayilbur-ēce: toyin ǰiluba nirvān bolxu-yi caqtu yeke γaixamšiqtai
    belgeši üzüülüqsen: bölöq inü arban dabtaγar bui:: ::'
  - 'türbel ügei čingna: bi xamuq törölkitön kigēd öqligöyin ezen boluqsan-noγoud tusa bolun buyan aγui yeke bolxu-yin tula:
    yeke nom oqtorγui γazariyin nayiman gegēn öüni ögüüleqsen-yēr: gegēn sangsar γazariyin ezen xamuq doqšin kluši amurliulun
    sayin amuγuulang-tu bolγon üyiledümüi::'
- source_sentence: bdag gis sdig pa gang bgyis dang||
  sentences:
  - 'mini kilince ali üyiledüqsen::'
  - 'arban küčüni dēdü altan gerel-yēr: suduriyin ayimagiyin erketü xān maši manglai öüni: yertünčü-yi tedküqči ta bügüde:
    maši batu kičēnggüi-bēr tedkü::'
  - 'tegēd bodhi-sadv-nariyin manglai xutuqtu nidübēr üzüqči erketü: amidābha terigüüten arban nigen ǰeva burxadiyin gegēn-dü
    amitani tusa üyiledküi sedkil öüskebei:'
- source_sentence: lha dang mi dang ngan song gsum dag tu|| ji ltar byas pa'i las kyis srid par skye||
  sentences:
  - 'izuurtani köböün tedeni öbörö törlökitün busu-bēr uxan üyiled xarin ülü xariqči bodhi-sadv maha-sadv-nar-luγā adali üzün
    üyiledküi: tedeni üküküi caqtu arban xoyor togünčilen boluqsad ȫdö bolǰi: izourtani köböün yeke külgüni suduriyin xān
    öüni sonosoqsan xarin orčilong-du ülü törökü bolyu: xarin törkü ötülkü kigēd ebedekü ükükü ülü üzekü bolyu: busun tālaxoi-luγā
    ülü xaγacan: xorson ülü tālaxoi-yi-luγā učirxu ügei bui:'
  - 'tenggeri kümün kigēd γurban mou zayātan-du: yamaru üyiledüqsen zayāni sangsartu törökü'
  - 'subudi ayiladxabai: ilaγun tögüsüqsen tere beye yeke mün:'
- source_sentence: ji ltar chos smra ba de'i lus mi ngal bar 'gyur ba dang| lus kyi dbang po bde bar 'gyur ba dang| rab tu
    dga' ba skye bar 'gyur ba dang| gang gi slad du sangs rgyas brgya stong dag la dge ba'i rtsa ba bskrun pa'i sems can rnams
    kyi don gyi slad du| gser 'od dam pa mdo sde'i dbang po'i rgyal po 'di 'dzam bu'i gling du yun ring du gnas shing myur
    du nub par mi 'gyur ba dang| sems can rnams kyang gser 'od dam pa mdo sde'i dbang po'i rgyal po 'di nyan par 'gyur ba
    dang| ye shes kyi phung po bsam gyis mi khyab pa thob par 'gyur ba dang| shes rab dang ldan par 'gyur ba dang| bsod nams
    kyi phung po rab tu 'dzin par 'gyur ba dang| ma 'ongs pa'i dus na bskal pa bye ba khrag khrig brgya stong phrag du mar
    lha dang mi'i bde ba bsam gyis mi khyab pa myong bar 'gyur ba dang| de bzhin gshegs pa dang 'grogs par 'gyur ba dang|
    ma 'ongs pa'i dus na bla na med pa yang dag par rdzogs pa'i byang chub mngon par rdzogs par 'tshang rgya bar 'gyur ba
    dang| sems can dmyal ba dang| dud 'gro'i skye gnas dang| gshin rje'i 'jig rten gyi sdug bsngal thams cad shin tu rgyun
    chad par 'gyur bar de'i spu'i bu ga rnams su mdangs stsal bar bgyi'o||
  sentences:
  - 'dusul xōsun zoun üzüq:'
  - 'ödügē yeke rahā-noγoudi zasamui: naran saran kigēd ulān nidütü: ülemǰi kigēd γadasun bui: basang saben-ba kigēd bariqči
    Rahula: urtu söültü utān kigēd: yeke raha tedeni čü öbör kigēd: öqligöyin ezen-lügē zokilduulun zasamui: amurlin sayin
    amuγuulang boltuγai::'
  - 'yamaru nom ӧgüüleqči dgeslong töüni beye ülü alzoulun üyiledün: beyeyin erketü-yi amuγuulang bolγon: sayitur bayasxan
    üyiledkü kigēd: keni tulada zoun mingγan burxan-noγoudtu buyani ündüsü öüskeqsen amitan-noγoudiyin tusayin tulada: suduriyin
    aimagiyin erketü xān dēdü altan gerel öüni: ‘zambutib-tu önidö orošiulun ötör ülü ecüdken üyiledkü kigēd: amitan-noγoudčü
    suduriyin ayimagiyin erketü xān dēdü altan gerel öüni sonosun üyiledkü kigēd: belge biligiyin coqco sedkiši ügei olun
    üyiledkü: biliq-lügē tögüsün üyiledkü kigēd: buyani coqco sayitur barin üyiledkü: irē ödüi caqtu olon zoun mingγan kraq
    kriq ǯeva γalab-tu: kümün tenggeriyin amuγuulang sedkiši ügei edlen üiledkü kigēd: tögünčilen boluqsan-luγā nӧkücün üyiledkü:
    irē ödüi caqtu dēre ügei sayitur dousuqsan bodhi-du ilerkei dousun burxan bolxu kigēd tamuyin amitan kigēd adousuni tӧrӧkui
    oron erligiyin yertünčüyin zobolong xamugi tasulun üyiledküye: tӧüni šara üsün-noγoud- tu önggü ogün üyiledümüi:'
