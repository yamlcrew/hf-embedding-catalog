  - 'Este trecho conclui a seção de relatório do processo administrativo no Tribunal de Contas de Goiás, detalhando as manifestações
    dos órgãos técnicos sobre a legalidade dos atos de pessoal e a avocação do processo pelo Relator. Na sequência, inicia
    a seção de voto, onde o Relator expõe a competência da Corte para apreciar e registrar atos de admissão e aposentadoria
    e inicia a análise da legalidade desses atos no caso específico..320,00 (um mil, trezentos e vinte reais) (Evento 37).
    4 . No âmbito desta Corte de Contas, após não ter sido identificado qualquer registro prévio em nome da servidora (Evento
    43), o Serviço de Fiscalização de Atos de Pessoal I e o Ministério Público de Contas se manifestaram pela legalidade dos
    atos de admissão e aposentadoria (Eventos 46 e 47) . Quanto à participação do Conselheiro Substituto, conquanto tenha
    sido oportunizada sua manifestação, o processo foi avocado por esta Relatoria por descumprimento do prazo regimental (artigo
    171 do RITCE-GO). 5. É o Relatório. Passo ao VOTO. Documento assinado eletrônicamente com fundamento da Resolução Normativa
    12/2017 do TCE-GO, Art. 6o. Número do Processo: 202200006027618 . 2 4 6 . Compete ao Controle Externo, dentre outras atribuições
    ao seu cargo, a apreciação, para fins de registro, da legalidade dos atos de admissão de pessoal, bem como das concessões
    de aposentadorias, reformas e pensões, ressalvadas as melhorias posteriores que não alterem o fundamento legal do ato
    concessório, consoante mandamento constitucional insculpido no artigo 71, inciso III , da Constituição Federal de 1988,
    bem como artigo 1o, incisos III e IV, da Lei Orgânica deste Tribunal de Contas . 7. Em relação à admissão, considerando
    que a aposentadoria pressupõe o registro prévio do ingresso, a Resolução Normativa 003/2005 desta Corte sugere que, identificados
    a necessidade e os elementos suficientes, seja promovido o registro concomitante dos atos. 8'
