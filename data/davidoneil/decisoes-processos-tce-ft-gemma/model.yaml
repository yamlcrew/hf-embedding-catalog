  sentences:
  - Localizado no início do Relatório, este segmento descreve a origem do processo de fiscalização sobre acúmulo de cargos,
    as ações administrativas tomadas e as sugestões iniciais dos órgãos envolvidos na apuração dos fatos.. 1 4 RELATÓRIO No
    815/2021 GCCR. 1 . Cuidam os autos de Relatório de Auditoria de Conformidade realizada pela Controladoria-Geral do Estado
    junto à Secretaria de Estado da Saúde, para apurar supostas irregularidades em relação ao acúmulo de cargos públicos ocupados
    pelo Sr. Gilson Reginaldo. 2 . O Serviço de Fiscalização de Atos de Pessoal, via Instrução Técnica 43/2016, pugnou pela
    citação da SES para fins de apresentação das medidas corretivas adotadas em face dos fiscalizados (Evento 1, p. 25/28).
    3. Após citação, a SES/GO (Evento 1, p. 39/40) informou que foi instaurado processo administrativo disciplinar em face
    do Sr . Gilson Reginaldo e Ana Lázara Azara Rodrigues, juntando a documentação pertinente (Evento 1, p. 41/42). 4. Após
    diligências, o Serviço de Fiscalização de Atos de Pessoal, por meio da Instrução Técnica Conclusiva 47/2017 (Evento 4,
    p . 79/82), sugeriu a absolvição da Ana Maria Azara Rodrigues, então Gerente da Unidade de Saúde, suposta responsável
    pela omissão na fiscalização da frequência do servidor, e a extinção do feito relativamente ao Sr. Gilson Reginaldo, ambos
    com base no resultado do julgamento do processo administrativo disciplinar, concluindo pelo seu arquivamento. 5 . O membro
    do Ministério Público de Contas, por meio do Parecer no 890/2017 (Evento 4, p. 92), opinou pela conversão dos autos em
    Tomada de Contas Especial, com fulcro no art
  - 'Contextualização: No Voto do Relator, justifica-se a decisão de considerar as contas iliquidáveis e arquivar o processo
    de Tomada de Contas Especial devido ao extenso lapso temporal desde os fatos. O trecho apresenta a base legal e jurisprudencial
    para essa decisão, citando a prática e entendimentos do Tribunal de Contas da União (TCU) sobre a dificuldade de defesa
    e a racionalização administrativa em casos de grande demora.. 6o, II, Instrução Normativa no 71/2012 TCU) . Segundo bem
    ponderou o Serviço de Contas do Governo Supervisão I, "Vale frisar, na hipótese em apreço, que quase 10 anos se passaram
    desde a ocorrência dos fatos ensejadores desta tomada de contas especial e a essa altura é complicado, senão impossível,
    reunir todos os elementos de provas necessários à instrução do processo, nem seria razoável exigir, depois do longo período
    de tempo decorrido , que os responsáveis tivessem acesso aos documentos a serem usados para subsidiar sua defesa ." Confirmando
    o entendimento supracitado, expõe-se a ementa do Acórdão no 921/2009-TCU: TOMADA DE CONTAS ESPECIAL. OMISSÃO NO DEVER
    DE PRESTAR CONTAS. CITAÇÃO. REVELIA. CONTAS IRREGULARES. DÉBITO. RECURSO DE REVISÃO. CONHECIMENTO. PROVIMENTO. COMPROMETIMENTO
    DA AMPLA DEFESA PELO LONGO DECURSO DE PRAZO. CONTAS ILIQUIDÁVEIS. TRANCAMENTO DAS CONTAS. 1 . Consideram-se iliquidáveis
    as contas, ordenando-se o seu trancamento, em razão da impossibilidade do exercício de ampla defesa, pelo longo decurso
    de tempo entre a prática do ato e a citação do responsável." Acórdão 921/2009 TCU Plenário. Relator: Ministro Raimundo
    Carreiro. Data de Julgamento: 6/5/2009. (grifo nosso)'
  - 'Após apresentar a regra da Lei nº 8.080/90 que proíbe o pagamento pelo SUS de produtos não autorizados pela Anvisa, este
    trecho detalha as exceções a essa regra (Parágrafo único) e introduz a análise de um estudo técnico que interpreta a aplicação
    dessas normas, especialmente quanto a medicamentos genéricos e requisitos técnicos vs. bula, levando a uma discussão sobre
    a harmonização legal.. Parágrafo único . Excetuam-se do disposto neste artigo: I medicamento e produto em que a indicação
    de uso seja distinta daquela aprovada no registro na Anvisa, desde que seu uso tenha sido recomendado pela Comissão Nacional
    de Incorporação de Tecnologias no Sistema Único de Saúde (Conitec), demonstradas as evidências científicas sobre a eficácia,
    a acurácia, a efetividade e a segurança , e esteja padronizado em protocolo estabelecido pelo Ministério da Saúde; II
    medicamento e produto recomendados pela Conitec e adquiridos por intermédio de organismos multilaterais internacionais,
    para uso em programas de saúde pública do Documento assinado eletrônicamente com fundamento da Resolução Normativa 12/2017
    do TCE-GO, Art . 6o. Número do Processo: 202400047004621 . 19 27 Ministério da Saúde e suas entidades vinculadas, nos
    termos do 5o do art. 8o da Lei no 9.782, de 26 de janeiro de 1999 . (grifamos) Nesses termos, o Serviço de Fiscalização
    de Licitações realiza um relevante estudo sobre a matéria e conclui que a exigência da prescrição em bula poderia ser
    evitado em favor da concorrência, pois os medicamentos genéricos possuem autorização para venda da ANVISA no Brasil Com
    efeito, verifica-se que, salvo nos casos excepcionais previstos no parágrafo único, o SUS não pode pagar , ressarcir ou
    reembolsar medicamento, produto ou procedimento de uso não autorizado pela Anvisa . Conquanto haja suposta incompatibilidade
    entre as previsões da Lei Federal no 9.787/99 e da Lei Federal no 8'
