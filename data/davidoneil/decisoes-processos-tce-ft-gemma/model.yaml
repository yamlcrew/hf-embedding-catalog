      (Evento 23). Com efeito, demonstrados os fundamentos jurídicos do ato em tela, resta concluir pela legalidade da aposentadoria
      . A documentação acostada aos autos supre com eficiência a finalidade das exigências contidas no artigo 3o, 1o e 2o,
      da , desta Corte. Quanto à multa sugerida pela Auditoria, não se mostra razoável sua aplicação, uma vez que o atraso
      no envio dos documentos não causou qualquer prejuízo à atuação do Controle Externo, justificando-se pela burocracia
      relacionada à tramitação processual . Face ao exposto, VOTO pelo registro dos atos de admissão e aposentadoria. Goiânia,
