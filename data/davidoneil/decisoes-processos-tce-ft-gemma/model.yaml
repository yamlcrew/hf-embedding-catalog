    de Goiás (UEG), mencionando a base legal e detalhando o cálculo dos proventos iniciais.Pág. 1 ACÓRDÃO Aposentadoria da
    Sra. Maria de Fátima Oliveira. Art. 4o, incisos I a V, 1o, 2o e 6o, inciso I, EC 103/2019, o art. da Constituição Estadual
    e o art. 71 da Lei Complementar Estadual no 161/2020. Análise conjunta: admissão submissão ao concurso público. Legalidade.
    Registro dos atos . VISTOS, oralmente expostos e discutidos os presentes autos, de no 202200020022966/204-01, que tratam
    da análise da legalidade, para fins de registro, do ato concessivo de aposentadoria à Sra . Maria de Fátima Oliveira,
    no cargo de Docente de Ensino Superior Pós-Doutor, DES V, Nível 3, do Quadro da Carreira dos Docentes de Ensino Superior
    da Universidade Estadual de Goiás UEG, perfazendo os proventos a quantia anual e integral de 362.936,88 (trezentos e sessenta
    e dois mil novecentos e trinta e seis reais e oitenta e oito centavos), compostos de: Vencimento 302 .447,40 (trezentos
    e dois mil quatrocentos e quarenta e sete reais e quarenta centavos) e Gratificação Adicional referente a 4 (quatro) quinquênios
    (20%) 60'
