      em que a indicação de uso seja distinta daquela aprovada no registro na Anvisa, desde que seu uso tenha sido recomendado
      pela Comissão Nacional de Incorporação de Tecnologias no Sistema Único de Saúde (Conitec), demonstradas as evidências
      científicas sobre a eficácia, a acurácia, a efetividade e a segurança , e esteja padronizado em protocolo estabelecido
      pelo Ministério da Saúde; II medicamento e produto recomendados pela Conitec e adquiridos por intermédio de organismos
      multilaterais internacionais, para uso em programas de saúde pública do Documento assinado eletrônicamente com fundamento
      da Resolução Normativa 12/2017 do TCE-GO, Art . 6o. Número do Processo: 202400047004621 . 19 27 Ministério da Saúde
      e suas entidades vinculadas, nos termos do 5o do art. 8o da Lei no 9.782, de 26 de janeiro de 1999 . (grifamos) Nesses
      termos, o Serviço de Fiscalização de Licitações realiza um relevante estudo sobre a matéria e conclui que a exigência
      da prescrição em bula poderia ser evitado em favor da concorrência, pois os medicamentos genéricos possuem autorização
      para venda da ANVISA no Brasil Com efeito, verifica-se que, salvo nos casos excepcionais previstos no parágrafo único,
      o SUS não pode pagar , ressarcir ou reembolsar medicamento, produto ou procedimento de uso não autorizado pela Anvisa
      . Conquanto haja suposta incompatibilidade entre as previsões da Lei Federal no 9.787/99 e da Lei Federal no 8'
