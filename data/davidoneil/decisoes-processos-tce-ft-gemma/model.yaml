    - 'Contextualização: No Voto do Relator, justifica-se a decisão de considerar as contas iliquidáveis e arquivar o processo
      de Tomada de Contas Especial devido ao extenso lapso temporal desde os fatos. O trecho apresenta a base legal e jurisprudencial
      para essa decisão, citando a prática e entendimentos do Tribunal de Contas da União (TCU) sobre a dificuldade de defesa
      e a racionalização administrativa em casos de grande demora.. 6o, II, Instrução Normativa no 71/2012 TCU) . Segundo
      bem ponderou o Serviço de Contas do Governo Supervisão I, "Vale frisar, na hipótese em apreço, que quase 10 anos se
      passaram desde a ocorrência dos fatos ensejadores desta tomada de contas especial e a essa altura é complicado, senão
      impossível, reunir todos os elementos de provas necessários à instrução do processo, nem seria razoável exigir, depois
      do longo período de tempo decorrido , que os responsáveis tivessem acesso aos documentos a serem usados para subsidiar
      sua defesa ." Confirmando o entendimento supracitado, expõe-se a ementa do Acórdão no 921/2009-TCU: TOMADA DE CONTAS
      ESPECIAL. OMISSÃO NO DEVER DE PRESTAR CONTAS. CITAÇÃO. REVELIA. CONTAS IRREGULARES. DÉBITO. RECURSO DE REVISÃO. CONHECIMENTO.
      PROVIMENTO. COMPROMETIMENTO DA AMPLA DEFESA PELO LONGO DECURSO DE PRAZO. CONTAS ILIQUIDÁVEIS. TRANCAMENTO DAS CONTAS.
      1 . Consideram-se iliquidáveis as contas, ordenando-se o seu trancamento, em razão da impossibilidade do exercício de
      ampla defesa, pelo longo decurso de tempo entre a prática do ato e a citação do responsável." Acórdão 921/2009 TCU Plenário.
      Relator: Ministro Raimundo Carreiro. Data de Julgamento: 6/5/2009. (grifo nosso)'
