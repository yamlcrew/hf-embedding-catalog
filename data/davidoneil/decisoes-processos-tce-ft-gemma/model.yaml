  - Este trecho compreende a maior parte do Voto do Relator, onde ele detalha sua análise jurídica e técnica sobre a legalidade
    dos atos de admissão e aposentadoria da servidora, responde a questões levantadas por outras áreas do Tribunal, como a
    Procuradoria de Contas e a Auditoria, e fundamenta sua recomendação final pelo registro dos referidos atos.. 16.168/07,
    nos termos da Lei n. 19.638/17. A admissão ocorreu mediante concurso público, merecendo registro. Para tal fim, mostram-se
    suficientes os documentos acostados no Evento 6, pág. 1 . Por sua vez, quanto à aposentadoria, o registro deve ser admitido,
    tendo em vista que restaram atendidas as disposições da Emenda Constitucional n 41/2003 . No que diz respeito à alegação
    ministerial referente ao provimento derivado, não se constitui em óbice ao registro da aposentadoria, haja vista a pacífica
    jurisprudência desta Corte, escorada no princípio da segurança jurídica, invocando-se como precedentes os fundamentos
    lançados nos autos n. 200800066003794 e n. 201000066005561 . A respeito da fixação dos proventos, a demonstração da composição
    contida nos autos encontra-se compatível com o fundamento legal do ato de jubilamento e a legislação aplicável (Evento
    23). Com efeito, demonstrados os fundamentos jurídicos do ato em tela, resta concluir pela legalidade da aposentadoria
    . A documentação acostada aos autos supre com eficiência a finalidade das exigências contidas no artigo 3o, 1o e 2o, da
    , desta Corte. Quanto à multa sugerida pela Auditoria, não se mostra razoável sua aplicação, uma vez que o atraso no envio
    dos documentos não causou qualquer prejuízo à atuação do Controle Externo, justificando-se pela burocracia relacionada
    à tramitação processual . Face ao exposto, VOTO pelo registro dos atos de admissão e aposentadoria. Goiânia, 05 de outubro
    de 2021
