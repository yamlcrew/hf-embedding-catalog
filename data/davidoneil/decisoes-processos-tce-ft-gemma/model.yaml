  sentences:
  - 'Este trecho apresenta a conclusão do Ministério Público de Contas sobre o processo, avaliando se a análise se configura
    como monitoramento de decisão anterior e comentando a suficiência das informações apresentadas pela Secretaria da Saúde
    para comprovar o atendimento às determinações.. 3. O Ministério Público de Contas, no Parecer Ministerial no 780/2020
    GPMC (ev . 22), apresentou a seguinte conclusão: III CONCLUSÃO Ante o exposto, tendo em vista a ausência de pressupostos
    mínimos no bojo do Acórdão 1143/2018 para que este seja objeto de monitoramento, concluiu-se que a presente análise não
    se trata de um monitoramento propriamente dito, mas de uma verificação quanto aos resultados de uma decisão expedida por
    essa Corte de Contas . A Unidade Técnica demonstrou o impacto positivo com a implementação das recomendações exaradas,
    especialmente no que tange à melhoria da estrutura física da Central de Medicamentos de Alto Custo Juarez Barbosa, mas
    deixou de analisar o cumprimento das determinações proferidas na decisão da TCE-GO . Embora a Secretaria da Saúde tenha
    apresentado informações quanto ao cumprimento dos comandos exarados, não foram juntados aos autos os documentos que comprovam
    as informações prestadas pela Secretaria da Saúde. Assim, caso estivéssemos diante um monitoramento propriamente dito,
    o correto Documento assinado eletrônicamente com fundamento da Resolução Normativa 12/2017 do TCE-GO, Art. 6o . Número
    do Processo: 201200047003401 . 2 3 seria a intimação do Secretário da Saúde para que encaminhasse os documentos comprobatórios
    das situações fáticas narradas'
