  widget:
  - source_sentence: 'Điều 3. Giải thích từ ngữ. Trong Thông tư này, các từ ngữ dưới đây được hiểu như sau:

      1. Đơn vị trực thuộc tổ chức tín dụng gồm chi nhánh, phòng giao dịch, văn phòng đại diện của tổ chức tín dụng.

      2. Thanh tra đơn vị trực thuộc tổ chức tín dụng là thanh tra một hoặc một số đơn vị trực thuộc của tổ chức tín dụng
      bằng một kế hoạch tiến hành thanh tra và ban hành một kết luận thanh tra đơn vị trực thuộc tổ chức tín dụng.

      3. Thanh tra pháp nhân tổ chức tín dụng là thanh tra đồng thời trụ sở chính và tất cả hoặc một số đơn vị trực thuộc
      của tổ chức tín dụng bằng một kế hoạch tiến hành thanh tra và ban hành một kết luận thanh tra pháp nhân tổ chức tín
      dụng.

      4. Thanh tra hợp nhất tổ chức tín dụng là thanh tra đồng thời pháp nhân tổ chức tín dụng và tất cả hoặc một số pháp
      nhân tổ chức tín dụng là công ty con của tổ chức tín dụng thuộc phạm vi quản lý nhà nước của Ngân hàng Nhà nước, bằng
      một kế hoạch tiến hành thanh tra và ban hành một kết luận thanh tra hợp nhất tổ chức tín dụng.

      5. Thanh tra, giám sát ngành Ngân hàng là cơ quan thanh tra nhà nước, được tổ chức thành hệ thống, gồm:'
    sentences:
    - Doanh nghiệp viễn thông được chia sẻ cơ sở hạ tầng kỹ thuật cần phải thông báo cho doanh nghiệp chia sẻ những kế hoạch
      gì trước khi thực hiện?
    - Cơ quan thanh tra, giám sát ngành Ngân hàng được tổ chức như thế nào theo quy định pháp luật?
    - Cơ quan nào có thẩm quyền quyết định thành lập trường năng khiếu thể thao, và các bộ ngành nào có trách nhiệm quy định
      chương trình giảng dạy trong trường?
  - source_sentence: 'c) Kho bạc Nhà nước cấp huyện: Báo cáo tổng hợp thông tin tài chính huyện (bao gồm: Báo cáo tổng hợp
      thông tin tình hình tài chính huyện; Báo cáo tổng hợp thông tin kết quả hoạt động tài chính huyện; Báo cáo tổng hợp
      thông tin lưu chuyển tiền tệ huyện; Thuyết minh Báo cáo tổng hợp thông tin tài chính huyện) được lập tương tự như Báo
      cáo tài chính nhà nước.

      2. Các cơ quan, đơn vị, tổ chức quy định từ Khoản 4 đến Khoản 12 Điều 2 của Thông tư này lập Báo cáo cung cấp thông
      tin tài chính gửi Kho bạc Nhà nước đồng cấp. Cụ thể:

      a) Cơ quan Thuế các cấp: Báo cáo được lập theo hướng dẫn tại Chế độ kế toán nghiệp vụ thuế nội địa phản ánh các thông
      tin về: thu thuế, phí, lệ phí và thu nội địa khác phát sinh trong năm báo cáo; tiền, phải thu, phải trả tại thời điểm
      kết thúc năm báo cáo liên quan đến nghiệp vụ thu thuế và các khoản thu nội địa khác giao cơ quan Thuế quản lý.'
    sentences:
    - Nếu tôi mua vé đi từ cảng A đến cảng B, nhưng khi lên phương tiện thì lại được chở đến cảng C, thì tôi có quyền yêu
      cầu gì?
    - Các đơn vị cấp huyện phải lập những báo cáo tài chính nào để tổng hợp thông tin tài chính của huyện?
    - Thuyền trưởng, người lái phương tiện chở khách có được phép chở những loại hàng hóa nào cùng với hành khách?
  - source_sentence: 'Điều 44. Báo cáo và thông tin cho cơ quan đại diện chủ sở hữu

      1. DATC phải thực hiện công bố thông tin định kỳ và thông tin bất thường theo quy định tại Điều 109, Điều 110 Luật Doanh
      nghiệp, Luật Quản lý, sử dụng vốn nhà nước đầu tư vào sản xuất, kinh doanh tại doanh nghiệp và các văn bản hướng dẫn.

      2. Người đại diện theo pháp luật của DATC quyết định và chịu trách nhiệm việc công khai thông tin ra bên ngoài của Công
      ty. Bộ phận lưu giữ hồ sơ, tài liệu của Công ty chỉ được cung cấp thông tin ra bên ngoài theo quyết định của người đại
      diện theo pháp luật của Công ty hoặc người được người đại diện theo pháp luật của Công ty ủy quyền.

      3. Nội dung và nơi gửi thông tin thực hiện theo các quy định pháp luật có liên quan.

      4. Trường hợp có yêu cầu thanh tra, kiểm tra, kiểm toán của các cơ quan quản lý nhà nước có thẩm quyền, người đại diện
      theo pháp luật của Công ty là người chịu trách nhiệm trong tổ chức cung cấp thông tin theo đúng quy định pháp luật về
      thanh tra, kiểm tra, kiểm toán.'
    sentences:
    - Người vận chuyển có được miễn trách nhiệm bồi thường thiệt hại đối với tính mạng, sức khỏe của hành khách nếu thiệt
      hại xảy ra do lỗi của hành khách hoặc do tình trạng sức khỏe của hành khách không?
    - Khi đơn vị sự nghiệp công lập góp vốn liên doanh, liên kết, giá trị thương hiệu của họ sẽ được phân bổ như thế nào?
    - Ai là người quyết định và chịu trách nhiệm về việc công khai thông tin ra bên ngoài của Công ty TNHH một thành viên
      Mua bán nợ Việt Nam?
  - source_sentence: 'c) Khu vực công trường phải bố trí hợp lý, an toàn cao nhất về khả năng chống thiên tai. Nhà xưởng,
      kho bãi chứa vật liệu phải bố trí ở nơi cao, không ngập nước và phải được chằng buộc để không bị sập đổ khi gặp gió,
      bão;

      d) Các trang thiết bị thi công phải được bảo quản an toàn, các phương tiện nổi phải có âu giấu hoặc nơi khuất gió để
      neo giữ khi mưa bão;

      đ) Phương án phòng ngừa thiên tai của nhà thầu thi công, nhà thầu quản lý, bảo trì đường bộ phải gửi đến Ban Chỉ huy
      Phòng, chống thiên tai và Tìm kiếm cứu nạn cấp huyện và cơ quan quản lý đường bộ để có sự chỉ đạo, phối hợp hiệu quả
      trong phòng, chống thiên tai.

      4. Phòng ngừa thiên tai trong quá trình thi công và hoàn thành công trình

      a) Thi công công trình phải tuân thủ theo quy trình, bảo đảm an toàn giao thông khi thi công các công trình liên quan
      đến đường bộ đang khai thác theo phương án, biện pháp tổ chức thi công, kế hoạch phòng, chống thiên tai đã được duyệt;

      b) Không vứt, bỏ vật liệu phế thải làm tắc nghẽn dòng chảy.'
    sentences:
    - Pháp luật quy định những yêu cầu gì về việc bảo quản các trang thiết bị thi công và phương tiện nổi khi có mưa bão để
      tránh bị hư hỏng?
    - Thông tư do Bộ Tài chính ban hành quy định những nguyên tắc gì trong việc xác định giá trị tài sản là kết quả của nhiệm
      vụ khoa học và công nghệ sử dụng vốn nhà nước?
    - Vai trò và trách nhiệm của Hội đồng thẩm định của cơ quan quản lý thi hành án hình sự thuộc Bộ Quốc phòng trong việc
      thẩm định hồ sơ, danh sách đề nghị giảm thời hạn chấp hành án phạt tù là gì?
  - source_sentence: 'Điều 36. Kiểm tra, giám sát an ninh đối với người, phương tiện, đồ vật khi vào, ra và hoạt động tại
      khu vực hạn chế mà không phải hành khách, hành lý, hàng hóa, bưu gửi và đồ vật đưa lên tàu bay

      1. Nhân viên kiểm soát an ninh hàng không, nhân viên bảo vệ chịu trách nhiệm kiểm tra, giám sát an ninh đối với người,
      phương tiện, đồ vật đưa vào, ra và hoạt động tại khu vực hạn chế.

      2. Người, phương tiện, đồ vật đưa vào khu vực hạn chế ngoại trừ đối tượng quy định tại khoản 9 Điều này phải được kiểm
      tra an ninh hàng không các nội dung sau:

      a) Thẻ, giấy phép kiểm soát an ninh hàng không;

      b) Người, đồ vật mang theo người và giấy tờ cần thiết (nếu có);

      c) Phương tiện và đồ vật trên phương tiện.

      3. Người, phương tiện, đồ vật đưa ra ngoài khu vực hạn chế được lực lượng kiểm soát an ninh hàng không kiểm tra khi
      có biểu hiện nghi ngờ như: trộm cắp tài sản, buôn lậu và gian lận thương mại hoặc trong các trường hợp tăng cường bảo
      đảm an ninh hàng không hoặc theo chỉ đạo của cơ quan quản lý nhà nước có thẩm quyền.'
    sentences:
    - Trong những trường hợp nào nhân viên kiểm soát an ninh hàng không được phép kiểm tra người, phương tiện, đồ vật khi
      họ ra khỏi khu vực hạn chế của sân bay?
    - Bộ Tài chính quy định những hình thức hỗ trợ cụ thể nào cho việc quản lý các công trình vệ sinh công cộng và thu gom
      rác thải tại khu dân cư?
    - Bộ Lao động - Thương binh và Xã hội quy định những trách nhiệm gì đối với Cục An toàn lao động trong việc tổ chức tập
      huấn, thanh tra, kiểm tra và giám sát hoạt động huấn luyện an toàn, vệ sinh lao động?
