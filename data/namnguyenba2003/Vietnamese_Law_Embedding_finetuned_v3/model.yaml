  - source_sentence: Tài khoản 902005- Cam kết giao dịch quyền lựa chọn Mua tiền tệ Tài khoản 902006- Cam kết giao dịch quyền
      lựa chọn Bán tiền tệ Hai tài khoản này dùng để phản ánh những khoản thanh toán mà NHNN sẽ thực hiện (Mua hoặc Bán) theo
      cam kết Hợp đồng giao dịch quyền lựa chọn Mua hay Bán tiền tệ đã thỏa thuận với khách hàng. Các cam kết hợp đồng này
      sẽ hạch toán theo số tiền ghi trên hợp đồng. Tài khoản 902007- Cam kết giao dịch hoán đổi Tài khoản này dùng để hạch
      toán những khoản thanh toán mà NHNN sẽ thực hiện theo cam kết Hợp đồng giao dịch hoán đổi đã thỏa thuận với khách hàng.
      Các cam kết hợp đồng này sẽ hạch toán theo số tiền ghi trên hợp đồng. Tài khoản 902008- Cam kết giao dịch tương lai
      Tài khoản này dùng để hạch toán những khoản thanh toán mà NHNN sẽ thực hiện theo cam kết Hợp đồng giao dịch tương lai
      đã thỏa thuận với khách hàng. Các cam kết hợp đồng này sẽ hạch toán theo số tiền ghi trên hợp đồng.
    sentences:
