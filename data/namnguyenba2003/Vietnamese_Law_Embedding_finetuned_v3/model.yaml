widgetData:
- source_sentence: Tài khoản 902005- Cam kết giao dịch quyền lựa chọn Mua tiền tệ Tài khoản 902006- Cam kết giao dịch quyền
    lựa chọn Bán tiền tệ Hai tài khoản này dùng để phản ánh những khoản thanh toán mà NHNN sẽ thực hiện (Mua hoặc Bán) theo
    cam kết Hợp đồng giao dịch quyền lựa chọn Mua hay Bán tiền tệ đã thỏa thuận với khách hàng. Các cam kết hợp đồng này sẽ
    hạch toán theo số tiền ghi trên hợp đồng. Tài khoản 902007- Cam kết giao dịch hoán đổi Tài khoản này dùng để hạch toán
    những khoản thanh toán mà NHNN sẽ thực hiện theo cam kết Hợp đồng giao dịch hoán đổi đã thỏa thuận với khách hàng. Các
    cam kết hợp đồng này sẽ hạch toán theo số tiền ghi trên hợp đồng. Tài khoản 902008- Cam kết giao dịch tương lai Tài khoản
    này dùng để hạch toán những khoản thanh toán mà NHNN sẽ thực hiện theo cam kết Hợp đồng giao dịch tương lai đã thỏa thuận
    với khách hàng. Các cam kết hợp đồng này sẽ hạch toán theo số tiền ghi trên hợp đồng.
  sentences:
  - Nếu trường không còn lưu trữ được sổ gốc hoặc không có thông tin đầy đủ trong sổ gốc, trường sẽ xử lý như thế nào?
  - Có phải chỉ có các cơ quan nhà nước mới được cung cấp dịch vụ tư vấn miễn phí cho người bị bạo lực gia đình, hay các tổ
    chức, cá nhân khác cũng có thể làm điều này?
  - Theo quy định của Ngân hàng Nhà nước, các tài khoản 902005, 902006, 902007 và 902008 được sử dụng để ghi nhận những cam
    kết thanh toán nào của Ngân hàng Nhà nước với khách hàng?
- source_sentence: '1. Việc sử dụng phương tiện quảng cáo thương mại quy định tại Điều 106 của Luật này phải tuân thủ các
    quy định của cơ quan quản lý nhà nước có thẩm quyền.

    2. Việc sử dụng phương tiện quảng cáo thương mại phải bảo đảm các yêu cầu sau đây:

    a) Tuân thủ các quy định của pháp luật về báo chí, xuất bản, thông tin, chương trình hoạt động văn hoá, thể thao, hội
    chợ, triển lãm;

    b) Tuân thủ quy định về địa điểm quảng cáo, không gây ảnh hưởng xấu đến cảnh quan, môi trường, trật tự an toàn giao thông,
    an toàn xã hội;

    c) Đúng mức độ, thời lượng, thời điểm quy định đối với từng loại phương tiện thông tin đại chúng.

    Điều 108. Bảo hộ quyền sở hữu trí tuệ đối với sản phẩm quảng cáo thương mại. Thương nhân có quyền đăng ký bảo hộ quyền
    sở hữu trí tuệ đối với sản phẩm quảng cáo thương mại theo quy định của pháp luật.

    Điều 109. Các quảng cáo thương mại bị cấm

    1. Quảng cáo làm tiết lộ bí mật nhà nước, phương hại đến độc lập, chủ quyền, an ninh quốc gia và trật tự, an toàn xã hội.'
  sentences:
  - Luật Phòng, chống rửa tiền 2022 quy định những ngành, nghề kinh doanh nào phải thực hiện nhận biết khách hàng?
  - Pháp luật quy định những yêu cầu gì khi sử dụng các phương tiện quảng cáo thương mại, như việc tuân thủ các quy định về
    báo chí, xuất bản, không gây ảnh hưởng xấu đến cảnh quan, môi trường, trật tự an toàn giao thông?
  - Luật Thương mại 2005 quy định những quyền và nghĩa vụ cụ thể nào đối với thương nhân kinh doanh dịch vụ logistics?
- source_sentence: 'Điều 17. Chi phí thực hiện giám định tư pháp, chế độ bồi dưỡng giám định tư pháp trong lĩnh vực công thương

    1. Chi phí giám định tư pháp trong lĩnh vực công thương được thực hiện theo quy định của Pháp lệnh số 02/2012/UBTVQH13
    ngày 28 tháng 03 năm 2012 của Ủy ban thường vụ Quốc hội về chi phí giám định, định giá; chi phí cho người làm chứng, người
    phiên dịch trong tố tụng; các văn bản quy định chi tiết thi hành và các quy định khác của pháp luật có liên quan.

    2. Chế độ bồi dưỡng giám định tư pháp trong lĩnh vực công thương thực hiện theo quy định tại Điều 25 Nghị định số 85/2013/NĐ-CP
    ngày 29 tháng 07 năm 2013 của Chính phủ quy định chi tiết và hướng dẫn thi hành Luật Giám định tư pháp.'
  sentences:
  - Theo quy định, những đối tượng nào được hưởng chế độ bồi dưỡng khi tham gia giám định tư pháp trong lĩnh vực công thương?
  - Nếu tài sản cầm cố, thế chấp đang được người nhận cầm cố, thế chấp xử lý để thu hồi nợ vay, Chấp hành viên phải làm gì?
  - Doanh nghiệp do Nhà nước nắm giữ 100% vốn điều lệ phải làm gì nếu phát hiện có tài sản thừa so với sổ sách kế toán?
- source_sentence: 'Điều 22. Biểu thuế luỹ tiến từng phần

    1. Biểu thuế luỹ tiến từng phần áp dụng đối với thu nhập tính thuế quy định tại khoản 1 Điều 21 của Luật này.

    2. Biểu thuế luỹ tiến từng phần được quy định như sau: Bậc thuế Phần thu nhập tính thuế/năm (triệu đồng) Phần thu nhập
    tính thuế/tháng (triệu đồng) Thuế suất (%) 1 Đến 60 Đến 5 5 2 Trên 60 đến 120 Trên 5 đến 10 10 3 Trên 120 đến 216 Trên
    10 đến 18 15 4 Trên 216 đến 384 Trên 18 đến 32 20 5 Trên 384 đến 624 Trên 32 đến 52 25 6 Trên 624 đến 960 Trên 52 đến
    80 30 7 Trên 960 Trên 80 35'
  sentences:
  - Luật có phân biệt giữa mức thu nhập tính thuế hàng tháng và hàng năm không? Nếu có, thì mức thu nhập tính thuế hàng tháng
    và hàng năm được quy định như thế nào?
  - Khi một đơn vị muốn đề xuất một dự án PPP thuộc lĩnh vực quản lý của Bộ Công Thương, họ cần phải làm những thủ tục gì?
  - Nếu vì lý do khách quan mà cấp có thẩm quyền chưa thực hiện xong thủ tục bổ nhiệm lại công chức, viên chức giữ chức vụ
    lãnh đạo trong thời hạn quy định, họ có thể làm gì để xử lý tình huống này?
- source_sentence: dịch vụ trợ giúp được sản xuất ra; d.2.4) Khoản trợ giúp do người mua thuê thì trị giá của khoản trợ giúp
    là chi phí thuê; d.2.5) Khoản trợ giúp là hàng hóa đã qua sử dụng thì trị giá của khoản trợ giúp là trị giá còn lại của
    hàng hóa đó; d.2.6) Hàng hóa trợ giúp được người mua gia công, chế biến trước khi chuyển cho người bán để sử dụng vào
    sản xuất hàng hóa nhập khẩu thì phải cộng thêm phần giá trị tăng thêm do gia công, chế biến vào trị giá của khoản trợ
    giúp; d.2.7) Khoản trợ giúp được người mua, bán giảm giá cho người xuất khẩu thì phải cộng thêm phần trị giá được giảm
    vào trị giá hải quan; d.2.8) Trường hợp sau khi sản xuất ra hàng hóa nhập khẩu còn thu được nguyên, vật liệu thừa,
  sentences:
  - Trong bao lâu sau khi ra quyết định đình chỉ điều tra, cơ quan điều tra phải chuyển hồ sơ vụ án cho Viện kiểm sát để kiểm
    sát theo quy định?
  - Theo quy định, người hành nghề khám bệnh, chữa bệnh phải tư vấn, cung cấp những thông tin gì cho người bệnh?
  - Nếu người nhập khẩu nhận được hàng hóa trợ giúp từ người bán, họ phải cộng thêm khoản chi phí nào vào trị giá hải quan?
