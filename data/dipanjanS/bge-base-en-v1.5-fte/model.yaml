widgetData:
- source_sentence: Who popularized the term 'Dalit'?
  sentences:
  - Fakhruddin Ali Ahmed was the fifth President of India from 1974 to 1977 and also the 2nd President of India to die in
    office.
  - Arunachal Pradesh or South Tibet is a state between India and China. The country that owns this region is disputed. China
    says that they own it and call it South Tibet (Zangnan 藏南). In 2017, China started renaming places in this territory.
    In 2019 China destroyed 30,000 "incorrect" world maps that showed South Tibet as part of India.
  - '"Dalit" refers to socially, economically and historically marginalized communities predominantly in India . It also means
    "broken/scattered" in Sanskrit and Hindi . The term "dalits" was in use as a translation for the British Raj census classification
    of "Depressed Classes" prior to 1935. It was popularised by the economist and reformer B. R. Ambedkar (1891–1956), who
    included all depressed people irrespective of their caste into the definition of dalits. Hence the first group he made
    was called the "Labour Party" and included as its members all people of the society who were kept depressed, including
    women, small scale farmers and people from backward castes.'
- source_sentence: What is India's contribution to the Olympic Movement?
  sentences:
  - Prem Pal Singh Rawat (in India called Maharaji and in the past called Guru Maharaj Ji and Balyogeshwar) was born in India
    on December 10, 1957. He teaches inner peace by the use of what he calls "Knowledge". Groups that have helped him are
    the Divine Light Mission, Elan Vital (1983), and The Prem Rawat Foundation (2001).
  - 'Boota Singh (Gurmukhi: ਬੂਟਾ ਸਿੰਘ; Shahmukhi: بوٹا سنگھ), sometimes spelled as Buta Singh, was a Sikh soldier in the British
    Army. He served in Burma during World War II, under the command of Lord Mountbatten. He is very well known in India and
    Pakistan. He is famous for his tragic love story with Zainab, a Muslim girl who he rescued from the riots during the partition
    of India in 1947.'
  - India at the Olympics is a history which includes 32 games in 19 countries and 800+ athletes. Since 1900, India has contributed
    to the growth of the "Olympic Movement".
- source_sentence: What is significant about the fort in Jhansi?
  sentences:
  - Western India is a region of the Republic of India, it includes Gujarat, Madhya Pradesh and Maharashtra.
  - The Government of India Act 1858 was an Act of the Parliament of the United Kingdom (21 & 22 Vict. c. 106) passed on August
    2, 1858. Its provisions called for the liquidation of the British East India Company (who had up to this point been ruling
    British India under the auspices of Parliament) and the transference of its functions to the British Crown.
  - Jhansi is a historic city of India between the rivers Pahunj and Betwa in the northern state of Uttar Pradesh, close to
    the border with Madhya Pradesh. Jhansi is the administrative headquarters of Jhansi District and Jhansi Division. The
    original walled city grew up around its stone fort, which was built in 1613. The city is well connected to all other major
    towns in Uttar Pradesh by road and railway networks. It is called "gateway to Bundelkhand". Jhansi was besieged and taken
    by British forces in 1858 during the Indian Rebellion of 1857.
- source_sentence: How is Dhanteras celebrated in Nepal?
  sentences:
  - The National Stock Exchange of India Limited (NSE), is a Mumbai-based stock exchange. It is the biggest stock exchange
    in India and the third biggest in the world in terms of amounts of transactions. NSE is mutually-owned by a set of leading
    financial institutions, banks, insurance companies and other financial intermediaries in India but its ownership and management
    operate as separate groups. As of 2006, the NSE VSAT terminals, 2799 in total, cover more than 1500 cities across India.
    In July 2007, the NSE had a total market capitalization of 42,74,509 crore INR making it the second-largest stock market
    in South Asia in terms of market-capitalization.
  - 'Dhanteras (Sanskrit: धनतेरस), also known as Dhanatrayodashi () or Dhanvantari Trayodashi, is the first day of the festival
    of Diwali in India and the festival of Tihar in Nepal.'
  - Perur taluk is a taluk in Coimbatore district, Tamil Nadu, India associated with the neighbourhood of Perur. It was created
    by Government of Tamil Nadu in 2013.
- source_sentence: What political roles did Rao hold in Andhra Pradesh?
  sentences:
  - The 2023 ICC Cricket World Cup is scheduled to be hosted by India and India was selected as the host at an International
    Cricket Council (ICC) meeting in London in June 2013. This will be the 13th Cricket World Cup competition. It will be
    the fourth time that India will be the host. This will be the first time that India has hosted the tournament on its own.
    India hosted previous World Cup tournaments in 1987 (with Pakistan), 1996 (with Pakistan and Sri Lanka) and 2011 (with
    Sri Lanka and Bangladesh). The semi final will be played at Wankhede Stadium. And final will be played at Eden Gardens,
    Kolkata.
  - Ayyavazhi (, "path of the father"), is a religion with one god that started in South India in the middle of the 19th century.
    The 'zhi' () in the word, 'Ayyavazhi', is a retroflex, ri.
  - Balli Durga Prasad Rao (15 June 1956 – 16 September 2020) was an Indian politician. He was elected to the Lok Sabha, lower
    house of the Parliament of India in the 2019 Indian general election. He was a member of the YSR Congress Party. Rao was
    also a member of the Andhra Pradesh MLA from 1985 to 1989, 1994 to 1999, and 2009 to 2014.
