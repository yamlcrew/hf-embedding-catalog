- source_sentence: 예상으로는 다른방들도 다 에어비앤비나 게스트 구조였던것 같아요
  sentences:
  - 에어비앤비의 취지에 걸맞는 숙박이었던 것 같습니다.
  - 정말 멋진 집입니다 고층에서 바라보는 야경과 풍경은 최고였습니다
  - 이번 주 회의 없는 날 어떤 요일 있어요?
- source_sentence: 주차장은 게스트가 많을때는 게이트 안에 주차못할때도 있구요
  sentences:
  - 어른들과 만나는 자리에는 자꾸 지각하지 마시고 일찍 나가 있길 바랍니다.
  - 오늘 날씨는 비가 올까? 아니면 맑을까?
  - 제가 갔을때 파리 날씨는 31도 였거든요
- source_sentence: 강수확률 알려줘. 내가 휴가일 때.
  sentences:
  - 네이버랑 네이트에서 메일 쓸 때 자동으로 임시 저장해주는 기능이 있던 곳이 어디더라?
  - 몇 퍼센트야? 내일 비 올 확률.
  - 분위기, 청결함, 인테리어가 정말 좋았습니다.
- source_sentence: 안개는 한계령과 미시령 중 어느 지역에 끼어있습니까? 현재.
  sentences:
  - 여름에 산과 바다 중 좋아하는 곳은 어디입니까?
  - 방은 생각보다 작았는데, 1층에 있는 방들은 꽤 크네요.
  - 이에 따라 학사(취업)등 안정적 일정관리와 계획성 있는 입대준비 지원으로 진로설계에도 도움이 될 것으로 기대된다.
- source_sentence: 여러분, 티비랑 라디오 중에 어떤거 켜고 싶으세요?
  sentences:
  - 엄마 라디오랑 티비 중에서 어떤거 켤꺼야?
  - 특히 침대에서 바라보는 파란 하늘과 나무가 너무 좋았습니다
  - 아울러 제주형 뉴딜정책의 사업계획과 방향, 그리고 약속이나 야망을 말씀해 주시기 바랍니다.
