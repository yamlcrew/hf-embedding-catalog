widgetData:
- source_sentence: AutoZone, Inc. began operations in 1979.
  sentences:
  - What types of products and markets does the company cater to in the semiconductor industry?
  - When did AutoZone, Inc. begin its operations?
  - How much did general and administrative expenses related to merger, acquisition, and other costs change from 2022 to 2023?
- source_sentence: See Note 14 to the consolidated financial statements in Item 8 of this Annual regarding legal proceedings.
  sentences:
  - What is the source to find detailed information about legal proceedings in the Annual Report?
  - Where in the Annual Report can one find a description of certain legal matters and their impact on the company?
  - What strategic actions is Hershey taking to maintain its leadership in the U.S. confectionery market?
- source_sentence: ICE Bonds focuses on increasing efficiency in fixed income markets by offering electronic markets that
    support trading protocols including click-to-trade, request for quotation (RFQ), and auctions.
  sentences:
  - What services does the ICE Bonds platform provide and what is its focus?
  - What was the percentage increase in the generic dispensing rate of the Health Services segment from 2022 to 2023?
  - How many shares of Class A common stock were repurchased and retired in 2023, and what was the total cost including excise
    tax accruals?
- source_sentence: Subject to various United States and foreign laws and regulations, including those related to intellectual
    property, data privacy and security, cybersecurity, tax, employment, competition and antitrust, anti-corruption, anti-bribery,
    and AI. Compliance with these laws has no current material adverse impact on capital expenditures, results of operations
    or competitive position.
  sentences:
  - How much did the total loans and lending commitments amount to as of December 2023?
  - What types of laws and regulations does the company need to comply with?
  - Where are the consolidated financial statements listed in the Annual Report on Form 10-K located?
- source_sentence: CMS made significant changes to the structure of the hierarchical condition category model in version 28,
    which may impact risk adjustment factor scores for a larger percentage of Medicare Advantage beneficiaries and could result
    in changes to beneficiary RAF scores with or without a change in the patient’s health status.
  sentences:
  - How does Tesla reduce costs and promote renewable power at their Supercharger stations?
  - What is the primary method by which the company manages its cash, cash equivalents, and marketable securities?
  - What significant regulatory change did CMS make to the hierarchical condition category model in its version 28?
