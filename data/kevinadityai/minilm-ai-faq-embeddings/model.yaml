- source_sentence: Apa saja metode pembayaran telechat?
  sentences:
  - ATM/Transfer Bank dan Gopay
  - Untuk memastikan lingkungan yang sehat bagi pasien kami, kami melarang aksi merokok di area rumah sakit.
  - Lokasinya di Jl. Yos Sudarso No.RT.11, Taba Jemekeh, Kec. Lubuk Linggau Tim. I, Kota Lubuklinggau, Sumatera Selatan 31613
- source_sentence: Apa nama lain Siloam Kuta Selatan?
  sentences:
  - Siloam Hospitals menawarkan banyak pilihan jenis kamar rawat inap. Silahkan pilih rumah sakit yang akan Anda kunjungi
    untuk mengetahui jenis kamar rawat inap yang ditawarkan di setiap unit.
  - Laboratorium akan tersedia 24 jam untuk emergency, namun untuk pasien reguler akan menyesuaikan informasi jam operasional
    masing-masing unit Rumah Sakit yang tertera pada website.
  - Nama lain Siloam Kuta Selatan adalah BIMC Nusa Dua atau BIMC Nusa Dua
- source_sentence: Rumah sakit Siloam Hospitals Purwakarta punya nama lain apa?
  sentences:
  - 'Data yang diperlihatkan di rawat inap adalah sebagai berikut: Riwayat kunjungan (tanggal, ke RS mana, ke dokter siapa),
    tindakan & hasil laboratorium, Monitor biaya RS, Monitor perjalanan rawat inap.'
  - Siloam Hospitals Jember adalah kepanjangan dari SHJR
  - Nama lain Siloam Hospitals Purwakarta adalah SHPW atau Siloam Bungursari
- source_sentence: Fasilitas apa yang dimiliki pusat keunggulan Rumah Sakit?
  sentences:
  - Lokasinya di Jl. Magelang - Kopeng km 08 Tegalrejo Kabupaten Magelang 56192
  - 'Kardiologi: Di Cardiac Center kami terdapat Unit Perawatan Jantung (CCU) yang berfokus pada perawatan pasien setelah
    serangan jantung atau operasi jantung, CT-Scan multi-irisan, Ekokardiografi, Elektrokardiogram (ECG), Pengobatan nuklir,
    Cath Lab, dan lainnya. Ilmu Saraf: Pusat Ilmu Saraf Siloam menawarkan perawatan lanjutan untuk operasi stereotaktik radiasi
    menggunakan pisau Gamma dan perawatan untuk Hydrocephalus. Onkologi: Pusat onkologi kami menawarkan perawatan seperti
    operasi radio pisau gamma, kedokteran nuklir dengan PET-CT dan SPECT-CT Scan, terapi radiasi dengan Rapid Arc Linear Accelerator
    (LINAC), terapi radionuklida, dan lainnya. Ortopedi: Pusat Keunggulan Siloam dalam Ortopedi menyediakan diagnosis, perawatan,
    dan rehabilitasi ahli untuk gangguan tulang, sendi, atau jaringan ikat. Meliputi pencegahan patah tulang osteoporosis,
    Bone Mass Densitometry dan Frax, diagnosa cedera atau penyakit kompleks, CT Scan 2D/3D, 1,5 Tesla dan 3 Tesla MRI, artroplasti
    revisi kompleks di pinggul dan lutut, replacement surgery, bedah invasif minimal, pusat rehabilitasi lengkap, dan lainnya.
    Urologi: Layanan medis di Pusat Urologi kami meliputi operasi laser lampu hijau, Extra Corporeal Shock Wave Lithotripsy
    (ESWL), rekonstruksi urologi, vasektomi, dan lainnya. Keadaan Darurat: Pusat Darurat dan Trauma Siloam menyediakan perawatan
    medis darurat berkualitas tinggi, termasuk spesialis yang bisa dipanggil 24 jam, layanan diagnostik (X-ray, CT Scan, MRI)
    berdekatan dengan Unit Gawat Darurat, layanan darurat khusus seperti perawatan kardiovaskular akut, manajemen stroke akut,
    bedah saraf, bedah ortopedi, layanan darurat anak, perawatan trauma, serta ambulans darat dan udara lengkap.'
  - Kartu atau polis asuransi kesehatan Anda (jika ada), Formulir rujukan dari dokter Anda (jika diminta oleh operator asuransi
    Anda), Identifikasi pribadi Anda yang dikeluarkan pemerintah, termasuk paspor, kartu identitas tempat tinggal, atau SIM,
    Catatan medis Anda, sinar-X, atau hasil tes sebelumnya (jika diminta)
- source_sentence: Apa itu SHTB?
  sentences:
  - 'Hasil MCU / Medical Check Up akan tersedia dalam waktu 1 hari setelah seluruh rangkaian pemeriksaan selesai, kecuali
    pemeriksaan tertentu yang memerlukan waktu pengerjaan yang lebih lama (contoh: papsmear, biopsi, kultur, dsb).'
  - Nama lain Siloam Rawalumbu adalah Siloam Hospitals Bekasi Sepanjang Jaya atau SHBS
  - Siloam Hospitals TB Simatupang adalah kepanjangan dari SHTB
