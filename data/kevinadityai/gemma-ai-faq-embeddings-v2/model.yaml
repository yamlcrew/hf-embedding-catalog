widgetData:
- source_sentence: Alamat Siloam Hospitals Makassar dimana?
  sentences:
  - Lokasinya di JALAN METRO TANJUNG BUNGA KAV. 9 TANJUNG MERDEKA - TAMALATE MAKASSAR
  - Nama lain Siloam Hospitals Jambi adalah SHJB atau Siloam Jambi Selatan
  - BIMC Kuta adalah kepanjangan dari BIMC Kuta
- source_sentence: Apa nama lain Siloam Kota SOE?
  sentences:
  - Lokasinya di Jl. MT Haryono No.23, Damai, Kecamatan Balikpapan Selatan, Kota Balikpapan, Kalimantan Timur 76114
  - Lokasinya di Jl. Majapahit No.10, Pagesangan, Kec. Mataram, Kota Mataram, Nusa Tenggara Bar. 83115
  - Nama lain Siloam Kota SOE adalah SILOAM CLINIC SOE atau SCSOE
- source_sentence: Alamat Siloam Hospitals Mataram dimana?
  sentences:
  - Jika asuransi tidak bekerja sama, maka sistem pembayaran akan dilakukan dengan sistem reimburse. Kami pastikan dokumen
    pendukung yang dibutuhkan untuk reimburse diberikan kepada pasien.
  - Nama lain Siloam Hospitals Surabaya adalah SHSB atau Siloam Gubeng
  - Lokasinya di Jl. Majapahit No.10, Pagesangan, Kec. Mataram, Kota Mataram, Nusa Tenggara Bar. 83115
- source_sentence: Apakah rumah sakit Siloam menawarkan perkiraan biaya perawatan?
  sentences:
  - Lokasinya di JL. Mampang Prapatan XVI, Kel. Duren Tiga, Kec. Pancoran, Kota Adm. Jakarta Selatan, Prov. DKI Jakarta
  - Ya, Anda dapat menanyakan kepada staff registrasi kami untuk mendapatkan perkiraan biaya sebelum perawatan Anda. Harap
    dicatat bahwa ada kemungkinan bahwa perkiraan biaya yang diberikan berbeda dari biaya akhir.
  - MRCCC Siloam Hospitals Semanggi adalah kepanjangan dari MRCCC
- source_sentence: Apa nama lain Siloam Kuta?
  sentences:
  - Saat ini, kami menerima uang tunai dan sebagian besar kartu debit/kredit. ATM tersedia di semua Siloam Hospitals.
  - Saat ini memang hanya ada produk tertentu di website. Untuk mengetahui apakah produk yang Anda cari ada di rumah sakit
    tertentu, Anda dapat langsung menghubungi contact center 1-500-911.
  - Nama lain Siloam Kuta adalah Siloam Hospitals Denpasar atau SHDP
