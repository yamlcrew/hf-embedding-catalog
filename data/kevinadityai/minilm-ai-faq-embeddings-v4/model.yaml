- source_sentence: boleh bawa bunga/hadiah buat pasien di siloam
  sentences:
  - Secara umum, Hadiah boleh diberikan ke pasien di semua rumah sakit. Namun, bunga tidak diperbolehkan untuk pasien di Intensive
    Care Unit (ICU). Mohon menghubungi rumah sakit untuk memeriksa apakah bunga atau hadiah yang Anda bawa dapat mempengaruhi
    kesehatan pasien kami, karena beberapa pasien mungkin memiliki reaksi alergi terhadap barang-barang tertentu.
  - Secara umum, Hadiah boleh diberikan ke pasien di semua rumah sakit. Namun, bunga tidak diperbolehkan untuk pasien di Intensive
    Care Unit (ICU). Mohon menghubungi rumah sakit untuk memeriksa apakah bunga atau hadiah yang Anda bawa dapat mempengaruhi
    kesehatan pasien kami, karena beberapa pasien mungkin memiliki reaksi alergi terhadap barang-barang tertentu.
  - Kartu asuransi dan KTP atau kartu identifikasi diri Anda.
- source_sentence: kualitas siloam udah sesuai standar apa
  sentences:
  - Kami telah menyediakan beberapa daftar hotel untuk kenyamanan Anda. Mohon memilih Rumah Sakit Siloam yang Anda ingin kunjungi
    sebelum mengakses daftar. Harap dicatat bahwa Siloam Hospitals tidak terhubung dengan hotel dengan cara apa pun. Akomodasi
    yang tercantum adalah saran berdasarkan kedekatannya dan bukan rekomendasi.
  - 'Siloam Hospitals mematuhi standar kualitas dari Akreditasi Internasional Komisi Bersama, Penelitian Berkualitas Masyarakat
    Eropa, Komisi Akreditasi Rumah Sakit, Keselamatan Pasien Asia, Frost & Sullivan. NOTE: Standar yang disebutkan hanya berlaku
    untuk beberapa Siloam Hospitals'
  - Lokasinya di Jl. Pajajaran No.27, RT.03/RW.08, Babakan, Kecamatan Bogor Tengah, Kota Bogor, Jawa Barat 14140
- source_sentence: mcu buka jam berapa?
  sentences:
  - Saat ini, 41 Rumah Sakit Siloam melayani lebih dari 2,5 juta pasien setiap tahun.
  - Jam operasional MCU / Medical Check Up adalah hari Senin-Sabtu pukul 07.00 - 14.00 waktu setempat (Kecuali MCU / Medical
    Check Up di Siloam ASRI tidak beroperasional di hari Sabtu).
  - Lokasinya di Jl. Cinere Raya No. 19 Puri Cinere, Depok
- source_sentence: ngerokok di area rs siloam boleh?
  sentences:
  - Untuk memastikan lingkungan yang sehat bagi pasien kami, kami melarang aksi merokok di area rumah sakit.
  - Saat ini, kami menerima uang tunai dan sebagian besar kartu debit/kredit. ATM tersedia di semua Siloam Hospitals.
  - Saat ini, metode pembayaran yang kami terima adalah kartu kredit atau debit (Visa dan Mastercard), OVO, Virtual Account,
    dan Bank Transfer.
- source_sentence: boleh jenguk pasien di luar jam kunjungan?
  sentences:
  - Lokasinya di Jl. Duren Tiga Raya No. 20, Duren Tiga, Jakarta Selatan
  - Dalam beberapa kasus, tamu tidak diizinkan untuk berkunjung setelah jam menjenguk untuk memastikan pemulihan kesehatan
    pasien. Namun, pengecualian diperbolehkan dalam beberapa kasus.
  - Sebagian besar dokter kami memiliki kemampuan berkomunikasi secara bilingual dan dapat berkomunikasi dalam bahasa Inggris.
    Selain itu, kami menyediakan juru bahasa Korea di Siloam Hospitals Lippo Village. Anda juga dapat menemukan spesialis
    Jepang di J-Clinic yang berlokasi di MRCCC Siloam Hospitals dan Siloam Hospitals Cikarang.
