widgetData:
- source_sentence: Berapa lama waktu yang dibutuhkan untuk MCU / Medical Check Up tes?
  sentences:
  - Lama waktu yang dibutuhkan untuk menjalankan MCU / Medical Check Up sekitar 2-6 jam tergantung dari jenis paket pemeriksaan
    yang dijalankan.
  - 'Anda perlu membawa dokumen-dokumen berikut: ID Anda yang dikeluarkan pemerintah seperti paspor, kartu identitas tempat
    tinggal, Izin Tinggal Indonesia (KITAS) atau SIM, Kartu Asuransi Kesehatan Anda (jika ada)'
  - Untuk memastikan keamanan dan kualitas suplai darah, kami secara eksklusif menerima darah dari Palang Merah Indonesia.
- source_sentence: Jenis asuransi kesehatan apa saja yang diterima di Siloam Hospitals?
  sentences:
  - Saat ini, 41 Rumah Sakit Siloam melayani lebih dari 2,5 juta pasien setiap tahun.
  - Pendaftaran MCU / Medical Check Up dapat dilakukan melalui Website https://www.siloamhospitals.com/MCU, melalui menu 'Medical
    Check Up' di aplikasi MySiloam, melalui Contact Center dengan menghubungi nomor 1-500-911 atau dengan ketik 'Live Agent'.
  - Kami menerima sebagian besar perusahaan asuransi kesehatan besar, baik lokal maupun internasional. Untuk daftar detailnya,
    mohon menghubungi Rumah Sakit kami.
- source_sentence: Saya tidak fasih berbahasa Indonesia. Bagaimana cara berkomunikasi dengan dokter?
  sentences:
  - Ya, Anda disarankan untuk membuat janji terlebih dahulu untuk menghindari waktu tunggu yang lama dan memastikan bahwa
    spesialis yang akan Anda kunjungi tersedia.
  - Jam operasional MCU / Medical Check Up adalah hari Senin-Sabtu pukul 07.00 - 14.00 waktu setempat (Kecuali MCU / Medical
    Check Up di Siloam ASRI tidak beroperasional di hari Sabtu).
  - Sebagian besar dokter kami memiliki kemampuan berkomunikasi secara bilingual dan dapat berkomunikasi dalam bahasa Inggris.
    Selain itu, kami menyediakan juru bahasa Korea di Siloam Hospitals Lippo Village. Anda juga dapat menemukan spesialis
    Jepang di J-Clinic yang berlokasi di MRCCC Siloam Hospitals dan Siloam Hospitals Cikarang.
- source_sentence: Bagaimana cara saya meminta informasi medis saya?
  sentences:
  - Untuk memastikan lingkungan yang sehat bagi pasien kami, kami melarang aksi merokok di area rumah sakit.
  - Anda dapat meminta informasi medis Anda dari dokter Anda ataudi Rumah Sakit tempat rekam medisa Anda berada.
  - Seluruh cabang RS Siloam melayani Medical Check Up. Untuk ketersediaan paket medical check up, dapat mengunjungi www.siloamhospitals.com/mcu.
- source_sentence: Fasilitas apa yang dimiliki pusat keunggulan Rumah Sakit?
  sentences:
  - Fasilitas yang disediakan berbeda-beda sesuai dengan jenis kamar dan rumah sakit. Umumnya, setiap kamar mempunyai kulkas
    mini, televisi, telepon, piyama untuk pasien, selimut, perlengkapan mandi, dan tisu. Mohon menghubungi perwakilan perawatan
    kami untuk mengetahui fasilitas khusus yang Anda butuhkan di kamar Anda.
  - Siloam menyediakan paket pemeriksaan MCU / Medical Check Up yang beragam. Anda dapat menggunakan fitur cek berdasarkan
    gejala pada website kami untuk mengetahui rekomendasi paket yang paling sesuai untuk Anda. Untuk informasi lebih lanjut,
    silahkan kunjungi website kami siloamhospitals.com/mcu.
  - 'Kardiologi: Di Cardiac Center kami terdapat Unit Perawatan Jantung (CCU) yang berfokus pada perawatan pasien setelah
    serangan jantung atau operasi jantung, CT-Scan multi-irisan, Ekokardiografi, Elektrokardiogram (ECG), Pengobatan nuklir,
    Cath Lab, dan lainnya. Ilmu Saraf: Pusat Ilmu Saraf Siloam menawarkan perawatan lanjutan untuk operasi stereotaktik radiasi
    menggunakan pisau Gamma dan perawatan untuk Hydrocephalus. Onkologi: Pusat onkologi kami menawarkan perawatan seperti
    operasi radio pisau gamma, kedokteran nuklir dengan PET-CT dan SPECT-CT Scan, terapi radiasi dengan Rapid Arc Linear Accelerator
    (LINAC), terapi radionuklida, dan lainnya. Ortopedi: Pusat Keunggulan Siloam dalam Ortopedi menyediakan diagnosis, perawatan,
    dan rehabilitasi ahli untuk gangguan tulang, sendi, atau jaringan ikat. Meliputi pencegahan patah tulang osteoporosis,
    Bone Mass Densitometry dan Frax, diagnosa cedera atau penyakit kompleks, CT Scan 2D/3D, 1,5 Tesla dan 3 Tesla MRI, artroplasti
    revisi kompleks di pinggul dan lutut, replacement surgery, bedah invasif minimal, pusat rehabilitasi lengkap, dan lainnya.
    Urologi: Layanan medis di Pusat Urologi kami meliputi operasi laser lampu hijau, Extra Corporeal Shock Wave Lithotripsy
    (ESWL), rekonstruksi urologi, vasektomi, dan lainnya. Keadaan Darurat: Pusat Darurat dan Trauma Siloam menyediakan perawatan
    medis darurat berkualitas tinggi, termasuk spesialis yang bisa dipanggil 24 jam, layanan diagnostik (X-ray, CT Scan, MRI)
    berdekatan dengan Unit Gawat Darurat, layanan darurat khusus seperti perawatan kardiovaskular akut, manajemen stroke akut,
    bedah saraf, bedah ortopedi, layanan darurat anak, perawatan trauma, serta ambulans darat dan udara lengkap.'
