  chat_template_jinja: "{%- if tools %}\r\n    {{- '<|im_start|>system\\n' }}\r\n    {%- if messages[0].role == 'system' %}\r\
    \n        {{- messages[0].content + '\\n\\n' }}\r\n    {%- endif %}\r\n    {{- \"# Tools\\n\\nYou may call one or more\
    \ functions to assist with the user query.\\n\\nYou are provided with function signatures within <tools></tools> XML tags:\\\
    n<tools>\" }}\r\n    {%- for tool in tools %}\r\n        {{- \"\\n\" }}\r\n        {{- tool | tojson }}\r\n    {%- endfor\
    \ %}\r\n    {{- \"\\n</tools>\\n\\nFor each function call, return a json object with function name and arguments within\
    \ <tool_call></tool_call> XML tags:\\n<tool_call>\\n{\\\"name\\\": <function-name>, \\\"arguments\\\": <args-json-object>}\\\
    n</tool_call><|im_end|>\\n\" }}\r\n{%- else %}\r\n    {%- if messages[0].role == 'system' %}\r\n        {{- '<|im_start|>system\\\
    n' + messages[0].content + '<|im_end|>\\n' }}\r\n    {%- endif %}\r\n{%- endif %}\r\n{%- set ns = namespace(multi_step_tool=true,\
    \ last_query_index=messages|length - 1) %}\r\n{%- for message in messages[::-1] %}\r\n    {%- set index = (messages|length\
    \ - 1) - loop.index0 %}\r\n    {%- if ns.multi_step_tool and message.role == \"user\" and not(message.content.startswith('<tool_response>')\
    \ and message.content.endswith('</tool_response>')) %}\r\n        {%- set ns.multi_step_tool = false %}\r\n        {%-\
    \ set ns.last_query_index = index %}\r\n    {%- endif %}\r\n{%- endfor %}\r\n{%- for message in messages %}\r\n    {%-\
    \ if (message.role == \"user\") or (message.role == \"system\" and not loop.first) %}\r\n        {{- '<|im_start|>' +\
    \ message.role + '\\n' + message.content + '<|im_end|>' + '\\n' }}\r\n    {%- elif message.role == \"assistant\" %}\r\n\
    \        {%- set content = message.content %}\r\n        {%- set reasoning_content = '' %}\r\n        {%- if message.reasoning_content\
    \ is defined and message.reasoning_content is not none %}\r\n            {%- set reasoning_content = message.reasoning_content\
    \ %}\r\n        {%- else %}\r\n            {%- if '</think>' in message.content %}\r\n                {%- set content\
    \ = message.content.split('</think>')[-1].lstrip('\\n') %}\r\n                {%- set reasoning_content = message.content.split('</think>')[0].rstrip('\\\
    n').split('<think>')[-1].lstrip('\\n') %}\r\n            {%- endif %}\r\n        {%- endif %}\r\n        {%- if loop.index0\
    \ > ns.last_query_index %}\r\n            {%- if loop.last or (not loop.last and reasoning_content) %}\r\n           \
    \     {{- '<|im_start|>' + message.role + '\\n<think>\\n' + reasoning_content.strip('\\n') + '\\n</think>\\n\\n' + content.lstrip('\\\
    n') }}\r\n            {%- else %}\r\n                {{- '<|im_start|>' + message.role + '\\n' + content }}\r\n      \
    \      {%- endif %}\r\n        {%- else %}\r\n            {{- '<|im_start|>' + message.role + '\\n' + content }}\r\n \
    \       {%- endif %}\r\n        {%- if message.tool_calls %}\r\n            {%- for tool_call in message.tool_calls %}\r\
    \n                {%- if (loop.first and content) or (not loop.first) %}\r\n                    {{- '\\n' }}\r\n     \
    \           {%- endif %}\r\n                {%- if tool_call.function %}\r\n                    {%- set tool_call = tool_call.function\
    \ %}\r\n                {%- endif %}\r\n                {{- '<tool_call>\\n{\"name\": \"' }}\r\n                {{- tool_call.name\
    \ }}\r\n                {{- '\", \"arguments\": ' }}\r\n                {%- if tool_call.arguments is string %}\r\n  \
    \                  {{- tool_call.arguments }}\r\n                {%- else %}\r\n                    {{- tool_call.arguments\
    \ | tojson }}\r\n                {%- endif %}\r\n                {{- '}\\n</tool_call>' }}\r\n            {%- endfor %}\r\
    \n        {%- endif %}\r\n        {{- '<|im_end|>\\n' }}\r\n    {%- elif message.role == \"tool\" %}\r\n        {%- if\
    \ loop.first or (messages[loop.index0 - 1].role != \"tool\") %}\r\n            {{- '<|im_start|>user' }}\r\n        {%-\
    \ endif %}\r\n        {{- '\\n<tool_response>\\n' }}\r\n        {{- message.content }}\r\n        {{- '\\n</tool_response>'\
    \ }}\r\n        {%- if loop.last or (messages[loop.index0 + 1].role != \"tool\") %}\r\n            {{- '<|im_end|>\\n'\
    \ }}\r\n        {%- endif %}\r\n    {%- endif %}\r\n{%- endfor %}\r\n{%- if add_generation_prompt %}\r\n    {{- '<|im_start|>assistant\\\
    n' }}\r\n    {%- if enable_thinking is defined and enable_thinking is false %}\r\n        {{- '<think>\\n\\n</think>\\\
    n\\n' }}\r\n    {%- endif %}\r\n{%- endif %}"
