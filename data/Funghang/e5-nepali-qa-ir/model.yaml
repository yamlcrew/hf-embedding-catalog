widgetData:
- source_sentence: तनहुँको राहदानी, पासपोर्ट, र जिल्ला प्रशासन कार्यालयको सम्पर्क इमेल ।
  sentences:
  - 'राहदानी, पासपोर्ट, र जिल्ला प्रशासन कार्यालय तनहुँसँग सम्पर्क गर्न निम्न इमेल ठेगानाहरू प्रयोग गर्न सकिन्छ: tanahudao@gmail.com,
    tanahundao@gmail.com र नागरिकता अभिलेखको लागि abhilekhatanahundao@gmail.com । यी इमेल ठेगानाहरू कार्यालयका सूचना आदान-प्रदान
    गर्न उपयुक्त छन् ।'
  - 'तनहुँको राहदानी कार्यालयका लागि ०६५-५६०१३३, कार्यालय सम्बन्धी विविध विषयहरुको जानकारी लिन: ९८५६००१११३, नागरिकताको अभिलेखको
    प्रयोजनको लागि ९८५६०६३४०३ नम्बर प्रयोग गर्न सकिन्छ ।'
  - बर्दिया जिल्लाको पासपोर्ट कार्यालय बर्दिया गुलरिया, लुम्बिनी प्रदेशमा अवस्थित छ ।
- source_sentence: प्युठानको राहदानी, पासपोर्ट र जिल्ला प्रशासन कार्यालयको सम्पर्क नम्बर के-के हुन् ?
  sentences:
  - राहदानी, पासपोर्ट, र जिल्ला प्रशासन कार्यालयका सम्पर्क इमेल daorukumeast76@gmail.com हो ।
  - डोल्पा जिल्लाको पासपोर्ट कार्यालय डोल्पा ठुलीभेरी-३, दुनै, कर्णाली प्रदेशमा अवस्थित छ ।
  - प्युठानको राहदानी, पासपोर्ट र जिल्ला प्रशासन कार्यालयहरूको सम्पर्क नम्बरहरू (प्रशासन शाखा) ०८६४२०३२७, (नागरिकता शाखा)
    ०८६४२००४८, (राहदानी शाखा) ०८६४२०२४३, (जिल्ला आपतकालिन सञ्चालन केन्द्र (DEOC) ०८६४२०२२४ हुन् ।
- source_sentence: नयाँ राहदानी बनाउँदा हराएको वा क्षति पुगेको अवस्थामा कति दस्तुर लाग्छ ?
  sentences:
  - कैलाली जिल्लाको पासपोर्ट कार्यालय धनगढी, सुदूरपश्चिम प्रदेशमा पर्छ ।
  - जिल्ला प्रशासन कार्यालय कन्चनपुरमा सम्पर्क गर्न daokanchanpur@moha.gov.np, cdokanchanpur@moha.gov.np, daokanchanpur75@gmail.com,
    नागरिकताको अभिलेखको लागि  abhilekh.kanchanpur@gmail.com प्रयोग गर्न सकिन्छ ।
  - नयाँ राहदानी बनाउन हराएको वा क्षति पुगेको अवस्थामा रु.१०,०००/– दस्तुर लाग्छ तर विदेशमा दस्तुर रकम फरक पर्न सक्छ ।
- source_sentence: राहदानी तयार भएपछि लिन कहिले आउनुपर्छ ?
  sentences:
  - रुकुम पश्चिमको राहदानी, पासपोर्ट र जिल्ला प्रशासन कार्यालयहरूको सम्पर्क नम्बरहरू ०८८५३००४०, ०८८५३००९०, ०८८५३००९० हुन्
    ।
  - विद्युतीय राहदानीको लागि Online माध्यमबाट आवेदन गर्न सकिन्छ। यसको लागि https://emrtds.nepalpassport.gov.np/ लिंकमा गई
    आवश्यक विवरण भर्दै आवेदन दिन सकिन्छ ।
  - नयाँ राहदानी तयार भई सङ्कलन गर्न आउनु भनी म्यासेज वा ई-मेल प्राप्त भए पछि यथाशक्य छिटो तोकिएको कार्यालय समयभित्र आवेदकले
    आफैं आउनुपर्छ। यस क्रममा सक्कल नागरिकताको प्रमाणपत्र, राहदानी आवेदन फाराम, दस्तुर बुझाएको रसिद र पुरानो राहदानी भएमा सो
    समेत लिएर आउनु पर्छ ।
- source_sentence: ताप्लेजुङ जिल्लाको राहदानी/पासपोर्ट/जिल्ला प्रशासन कार्यालयको फोन नम्बर के हो ?
  sentences:
  - राहदानी कार्यालय तनहुँको इमेल ठेगाना tanahudao@gmail.com, tanahundao@gmail.com र नागरिकता अभिलेखको लागि abhilekhatanahundao@gmail.com
    हो ।
  - जिल्ला प्रशासन कार्यालय ओखलढुंगाको आधिकारिक इमेल अभिलेख प्रयोजनका लागिः avilekh.daookhaldhunga@gmail.com हो ।
  - 'ताप्लेजुङ जिल्लाको राहदानी/पासपोर्ट/जिल्ला प्रशासन कार्यालयका सम्पर्क नम्बरहरू नागरिकता फाँट : ०२४-४६०२७०, आर्थिक प्रशासन
    फाँट : ०२४-४६०५६६, स्थानीय प्रशासन फाँट : ०२४-४६०१९१ हुन् ।'
