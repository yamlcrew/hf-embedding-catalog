widgetData:
- source_sentence: '"What is the query for a sci-fi anime about a human resistance fighter who receives a mysterious message
    to board the Galaxy Express 999 again, only to find Maetel missing, a ghost train present, and the ultimate destination
    unknown, while also encountering the mysterious black knight Faust and uncovering the machine empire''s darkest secret?"'
  sentences:
  - 'Despite the destruction of the mechanization home world Andromeda, the machine empire is still swept across the galaxy
    and Earth has become a battleground. Having returned from his journey aboard the train Galaxy Express 999, Tetsurou Hoshino
    joins the resistance and fights alongside others who have retained their humanity. When the 999 returns to Earth, Tetsurou
    receives an enigmatic recorded message from his former traveling companion Maetel, telling him to board the train once
    more. Fighting his way to Megalopolis station, he makes it onto the train just as it departs. This time, however, Tetsurou
    is met with several mysteries: Maetel is nowhere to be seen, an ominous "Ghost Train" has appeared, and the ultimate destination
    of the 999 is unknown. Amid all this, Tetsurou finds himself confronted by the mysterious black knight Faust and soon
    discovers the machine empire''s darkest secret.'
  - With strange events occurring at Reien Girls' Academy during winter break, Azaka Kokutou, a student and apprentice mage,
    is sent by her master to investigate. It turns out that another mage has been stealing the students' memories using fairies
    that, despite her magical talent, are invisible to Azaka. So Shiki Ryougi, an acquaintance with special eyes who can see
    what Azaka cannot, is also sent to the academy to help with the crisis. However, the two have trouble getting along, mainly
    due to the fact that Azaka views Shiki as her romantic rival. But when the fairy situation quickly spirals out of control
    and more layers of the mystery are revealed, Azaka must learn to work with Shiki in order to save her classmates.
  - An adaptation of the original five volume arc of the popular JoJo's Bizarre Adventure manga, covering the Phantom Blood
    chapters. Jonathan Joestar is an aristocratic boy whose life is suddenly turned upside down by a mysterious new boy who
    arrives, Dio Brando. Dio has a connection to his father, and over time, a rivalry forms as Dio becomes obsessed with a
    mysterious, ancient, and mystical stone mask that Jonathan's father keeps.
- source_sentence: '"A shrine maiden with the ability to predict death is being guarded by a ninja to prevent a powerful demon
    from being revived and destroying the world. However, the ninja, Naruto, has been foreseen to die soon. How can Naruto
    protect the shrine maiden and the world despite this prophecy?"'
  sentences:
  - 'The infamous Arsene Lupin III takes his gang of thieves to Great Britain to investigate the existence of the Raven''s
    hidden treasure. The Raven, an underground society rumored to be pulling the strings behind the British government, has
    evaded Lupin''s grasp for nearly 10 years. But finding clues proves difficult when he is pursued by not only Interpol''s
    Inspector Kouichi Zenigata but also the MI6, Scotland Yard, and Britain''s finest: the consulting detective Sherlock Holmes,
    who appears to have his own score to settle with the gentleman thief.'
  - There is a small village called Jimuna on the continent of Jamu Jamu. This village is home to a girl named Kukuri. She
    is the last descendant of the Migu Migu Tribe. She is raised by an old witch who teaches her the secret magic of the tribe,
    but Kukuri is not a good student. In the same village lives a boy named Nike. He has been raised by very strict parents.
    They discipline their son to become a brave hero of the village. Nike himself does not want to be a hero at all, but he
    grows up to become a mighty boy. One day the king of the village, Kodai, recruits troops to fight against the ruler of
    the darkness, Giri. Kukuri and Nike are accepted. The two children, the strong but reluctant hero Nike, and the eager
    but unskilled little witch Kukuri, set out on a wonderful journey full of adventures and friendship.
  - 'A group of ninja is planning to revive a powerful demon, and once its spirit is reunited with its body, the world will
    be destroyed. The only way to prevent this from happening is for Shion, a shrine maiden, to seal it away for good. Naruto
    Uzumaki is tasked to guard her, but one thing stops Shion from accepting his help: she also has the ability to predict
    death—and she has foreseen his demise approaching soon. In order to escape his fate, Naruto must stay away from Shion;
    however, undeterred, he chooses to challenge the prophecy in order to protect Shion and the world.'
- source_sentence: What is a query for an anime about a skilled artist, who gave up on her passion due to ridicule in childhood,
    and now collaborates with a former idol and a pianist to create a music project's mascot and first music video?
  sentences:
  - Nanba is the world's most formidable prison, built to incarcerate criminals who are too slippery to stay in ordinary confinement.
    The four inmates who occupy Cell 13 are particularly cunning on that behalf, having escaped every other prison with a
    perfect success rate. There is Juugo, a specialist in locks who has spent the majority of his life in prison; Uno, a gambler
    with great intuition; Nico, an otaku whose body reacts strangely to drugs; and Rock, a bruiser with a love for food. The
    daily shenanigans of the four prisoners always cause trouble for the building supervisor, Hajime Sugoroku, who desperately
    tries to prevent them from breaking out of Nanba. Nanbaka follows the comedic, sparkle-filled exploits of these prisoners
    and their guards. From three square meals a day to sports festivals, prison life in Nanba isn't actually that bad—and
    it is the closest these four have to a home.
  - Mahiru Kouzuki, a skilled artist, gives up on her passion after her elementary school classmates ridicule her colorful
    jellyfish mural. Several years later, upon encountering an unexpected admirer in Kano Yamanouchi—a former idol with a
    troubled past—Mahiru decides to pursue her childhood dreams once more. Tasked with designing the mascot for Kano's new
    music project, JELEE, Mahiru enlists the help of her childhood friend and professional streamer Kiui Watase to make JELEE's
    first music video. Together with Kim Anouk Mei Takanashi, a pianist and fan of Kano's work as an idol, the girls aim to
    turn JELEE into a global hit. However, if they want to succeed in this ambitious endeavor, they will first have to free
    themselves from the shackles of their pasts.
  - Shi Miao has a lot of experience dealing with her older brother's peculiar habits. After all her scolding, it is natural
    to expect that Shi Fen's antics would come to an end. But having spent their whole life together, it is obvious to Miao
    that some things never change—and maybe that is for the best. Despite his recklessness, Fen usually means well. As a result,
    a tight-knit friend group has formed around him and his sister. Joined by their classmates—Kai Xin, Wan Sui, and Miaomiao—the
    Shi siblings' tenure at high school continues to be an absolute spectacle.
- source_sentence: How can I find an anime about a man who uses his skills from dating simulators to exorcise spirits possessing
    women's hearts?
  sentences:
  - High school student Rakurou Hizutome has a peculiar hobby of playing poorly made games—ones that are unbalanced or are
    filled with so many bugs that make them borderline unplayable. The few who share his hobby might recognize him by his
    in-game name, Sunraku. For his next game, Rakurou is recommended Shangri-La Frontier, a popular and well-received virtual
    reality game as a breather from the terrible games he has been playing recently. Once he boots up the game, Rakurou decides
    to sell off most of his starting gear to gain extra money, leaving himself with only a pair of boxers, a bird mask, and
    some weapons. He is instantly hooked as he meticulously levels up his avatar. However, after encountering some intimidating
    monsters, he realizes that he may have underestimated the challenge that a mainstream game can offer. As Rakurou progresses,
    he must draw on all the skills he has perfected from his previous gaming experience. Before long, Sunraku's eccentric
    playstyle takes Shangri-La Frontier by storm.
  - 'Narumi Fujishima may seem like a normal high school student at first glance, but in reality he is a pessimistic outsider.
    Due to his father''s work, he had to constantly transfer schools, and thus he has never managed to become a part of society.
    When he is forced to join the gardening club by his cheerful classmate Ayaka Shinozaki, Narumi encounters the genius hacker
    Alice, who lives in isolation above Hanamaru, the ramen shop where Ayaka works part-time. He then discovers that Alice
    is running a special private detective agency, and that all her professional associates refer to themselves as "NEET"s:
    Not in Education, Employment, or Training. Joining the NEET detective agency due to his personal connection with a criminal
    case, Narumi finds himself entangled in a world of dangerous investigations conducted by the ill-assorted group of detectives,
    all the while trying to track down the crime syndicate which seems to have mysterious ties to Alice.'
  - 'Keima Katsuragi, the "God of Conquest," returns to his quest of expelling runaway spirits that have possessed the hearts
    of women. Still stuck in his contract with the demon Elsie, he must continue to utilize the knowledge he has gained from
    mastering multitudes of dating simulators and chase out the phantoms that reside within by capturing the hearts of that
    which he hates most: three-dimensional girls. However, the God of Conquest has his work cut out for him. From exorcising
    karate practitioners and student teachers to the arrival of Elsie''s best friend from Hell, he is up against a wide array
    of girls that will test his wit and may even take him by surprise. Though he would much rather stick to the world of 2D,
    he is trapped in lousy reality, and so Keima must trudge forward in his conquest of love.'
- source_sentence: What is the story about a man named Rock Okajima who joins a pirate mercenary group in Roanapur, Thailand
    and must decide between staying in the criminal underworld or trying to escape?
  sentences:
  - Rokurou "Rock" Okajima has joined the Lagoon Company, a pirate mercenary group which operates out of Roanapur, Thailand.
    Despite his initial protests, this filthy slum of depraved souls and merciless criminals now serves as the former salaryman's
    home. Stranded, with nothing left of his past life but the clothes on his back and his inner morality, Rock is forced
    to perform jobs alongside the other members of the Lagoon crew. Berated for his lack of spine as he wades through the
    underbelly of society, he must decide whether to continue on amidst the gunfire and ruthlessness or risk everything he
    has in an attempt to be free. Whether he chooses the comfort of a familiar land or the freedom of being an outlaw, his
    decision will have lasting consequences on the crew who gave him a home.
  - One last heist. That's what they all say, right? Just one final score, and everyone can retire and take up fishing. Thing
    is, the jails are filled with super villains who thought the same thing, and got busted. But the Heat's in a jam. He's
    run up the kind of gambling debt that - if he can't pay it back in cash - will be paid in blood. Nobody wants to see the
    most beloved supercrook of all time rubbed out by the mob - especially his biggest fan, Johnny Bolt. And Johnny's got
    a plan to help the Heat and make all his buddies disgustingly rich at the same time. Unfortunately for Johnny's recruits,
    they have to head to Spain and rob the world's most notorious super villain blind. And that's where things get tricky.
  - Comical action adventure film set in the future world, like a dystopian science fiction. Shinnosuke's future fiancee,
    Tamiko Kaneari comes from the future via the time machine. She says her father Masuzo Kaneari captures adult Shinnosuke
    in the future world and they needs the power of Shinnosuke at age 5 to rescue him. She takes Shinnosuke and Kasukabe Defense
    Forces members to the future big city Neotokio, which is the world ruled by Masuzo Kaneari, the president of the electric
    power company Kaneari Electric.
