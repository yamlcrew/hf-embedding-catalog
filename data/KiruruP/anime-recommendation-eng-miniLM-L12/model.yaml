widgetData:
- source_sentence: How can I find an anime where the main character enrolls in a prestigious academy and befriends a clairvoyant
    dog while investigating a political plot?
  sentences:
  - With Anya Forger successfully enrolled at the renowned Eden Academy, Operation Strix advances to its second phase. To
    investigate Ostanian politician Donovan Desmond, Anya must either befriend his son Damian or collect eight Stella Stars
    to become an Imperial Scholar. Fortunately, Anya has already acquired her first star. In celebration, her adoptive father,
    Loid, decides to fulfill her wish to adopt a dog. During their canine search, Loid receives new orders from his superiors,
    who have found that a band of Berlint University students is plotting to assassinate Westalis' Minister Brantz using bombs
    worn by trained dogs. While Loid tries to stop their plans, Anya stumbles upon the terrorists' base of operations. There,
    she befriends a kindhearted, clairvoyant dog who the family later names Bond. Although the Forgers continue to lead their
    individual lives in secrecy, the family—with a new fluffy addition—remains united through all of the unusual obstacles
    thrown their way.
  - In the not-too-distant future, the human world has long been overpopulated. Humanity marched to the stars in search of
    a new home, and just as this was going on, the moon's alignment caused massive earthquakes to ripple across the world,
    lasting several decades. Humanity was demolished. When the land finally recovered, humanity reemerged to face this strange
    yet familiar world. Will we, who once lorded over this domain, still remain the masters of this world?
  - Mahiru Kouzuki, a skilled artist, gives up on her passion after her elementary school classmates ridicule her colorful
    jellyfish mural. Several years later, upon encountering an unexpected admirer in Kano Yamanouchi—a former idol with a
    troubled past—Mahiru decides to pursue her childhood dreams once more. Tasked with designing the mascot for Kano's new
    music project, JELEE, Mahiru enlists the help of her childhood friend and professional streamer Kiui Watase to make JELEE's
    first music video. Together with Kim Anouk Mei Takanashi, a pianist and fan of Kano's work as an idol, the girls aim to
    turn JELEE into a global hit. However, if they want to succeed in this ambitious endeavor, they will first have to free
    themselves from the shackles of their pasts.
- source_sentence: '"What is the name of the mysterious Pokemon that Satoshi and his friends encounter in the Kalos region,
    which Team Flare wants to capture for their unknown agenda?"'
  sentences:
  - An adaptation of the original five volume arc of the popular JoJo's Bizarre Adventure manga, covering the Phantom Blood
    chapters. Jonathan Joestar is an aristocratic boy whose life is suddenly turned upside down by a mysterious new boy who
    arrives, Dio Brando. Dio has a connection to his father, and over time, a rivalry forms as Dio becomes obsessed with a
    mysterious, ancient, and mystical stone mask that Jonathan's father keeps.
  - Rokurou "Rock" Okajima has joined the Lagoon Company, a pirate mercenary group which operates out of Roanapur, Thailand.
    Despite his initial protests, this filthy slum of depraved souls and merciless criminals now serves as the former salaryman's
    home. Stranded, with nothing left of his past life but the clothes on his back and his inner morality, Rock is forced
    to perform jobs alongside the other members of the Lagoon crew. Berated for his lack of spine as he wades through the
    underbelly of society, he must decide whether to continue on amidst the gunfire and ruthlessness or risk everything he
    has in an attempt to be free. Whether he chooses the comfort of a familiar land or the freedom of being an outlaw, his
    decision will have lasting consequences on the crew who gave him a home.
  - 'The journey of Satoshi and his friends through the Kalos region continues! After Satoshi obtains his seventh gym badge,
    the group is moving toward the next town when Eureka discovers a mysterious Pokémon resting in her pochette. Soon given
    the name Puni-chan, it is one that even Satoshi and Serena''s new Pokémon Zukan cannot identify. However, it quickly becomes
    apparent that Puni-chan is the target of a mysterious group clad in bright red suits known as Team Flare, aiming to capture
    the new Pokémon to further their agenda. But when Satoshi and the gang realize that the enigmatic organization has no
    intention of treating Puni-chan with any decency, they take a stand in opposition to Team Flare''s plans, daring to fight
    back. With Gojika''s predictions looming above them, Satoshi aims for his final gym badge while Serena contests for her
    last Princess Key in order to be able to compete at the TriPokalon Master Class. But as Team Flare begins to move in search
    of the mysterious Z, the stories of Pokemon XY and Pokemon XY: Mega Evolution cross paths as Satoshi and his friends,
    along with Team Rocket, get caught up in a scheme that could put Kalos in great danger.'
- source_sentence: '"What is the query for a sci-fi anime about a human resistance fighter who receives a mysterious message
    to board the Galaxy Express 999 again, only to find Maetel missing, a ghost train present, and the ultimate destination
    unknown, while also encountering the mysterious black knight Faust and uncovering the machine empire''s darkest secret?"'
  sentences:
  - The world is in the midst of the industrial revolution when horrific creatures emerge from a mysterious virus, ripping
    through the flesh of humans to sate their never-ending appetite. The only way to kill these beings, known as "Kabane,"
    is by destroying their steel-coated hearts. However, if bitten by one of these monsters, the victim is doomed to a fate
    worse than death, as the fallen rise once more to join the ranks of their fellow undead. Only the most fortified of civilizations
    have survived this turmoil, as is the case with the island of Hinomoto, where mankind has created a massive wall to protect
    themselves from the endless hordes of Kabane. The only way into these giant fortresses is via heavily-armored trains,
    which are serviced and built by young men such as Ikoma. Having created a deadly weapon that he believes will easily pierce
    through the hearts of Kabane, Ikoma eagerly awaits the day when he will be able to fight using his new invention. Little
    does he know, however, that his chance will come much sooner than he expected...
  - 'Despite the destruction of the mechanization home world Andromeda, the machine empire is still swept across the galaxy
    and Earth has become a battleground. Having returned from his journey aboard the train Galaxy Express 999, Tetsurou Hoshino
    joins the resistance and fights alongside others who have retained their humanity. When the 999 returns to Earth, Tetsurou
    receives an enigmatic recorded message from his former traveling companion Maetel, telling him to board the train once
    more. Fighting his way to Megalopolis station, he makes it onto the train just as it departs. This time, however, Tetsurou
    is met with several mysteries: Maetel is nowhere to be seen, an ominous "Ghost Train" has appeared, and the ultimate destination
    of the 999 is unknown. Amid all this, Tetsurou finds himself confronted by the mysterious black knight Faust and soon
    discovers the machine empire''s darkest secret.'
  - With strange events occurring at Reien Girls' Academy during winter break, Azaka Kokutou, a student and apprentice mage,
    is sent by her master to investigate. It turns out that another mage has been stealing the students' memories using fairies
    that, despite her magical talent, are invisible to Azaka. So Shiki Ryougi, an acquaintance with special eyes who can see
    what Azaka cannot, is also sent to the academy to help with the crisis. However, the two have trouble getting along, mainly
    due to the fact that Azaka views Shiki as her romantic rival. But when the fairy situation quickly spirals out of control
    and more layers of the mystery are revealed, Azaka must learn to work with Shiki in order to save her classmates.
- source_sentence: What is the story of a boy who discovers a tower that grants desires and forms a friendship with a girl,
    but when she leaves to climb the tower, he vows to follow and becomes an "Irregular" who opens the tower's gates?
  sentences:
  - The successor and branch manager of the Himeya Company—one of the many Undine associations housing female gondoliers—Aika
    S. Granzchesta surprises everyone when she rejects tradition and refuses to inherit the company's legendary gondola. Aika's
    apprentice Azusa B. McLaren, unable to wrap her mind around her mentor's unexpected decision, confronts her directly but
    to little effect. To better understand her reasoning, Azusa and her fellow Undines secretly plan to arrange a meeting
    with Aika. With the much-awaited winter days in sight, accompanied by the tranquility and sublimity of Neo-Venezia, Aika
    reminisces about her journey as an Undine that forged her into the person she is today. As she vividly remembers all those
    invaluable experiences of the past, she trusts they will continue to guide her into the unknown yet boundless future.
  - Comet (12 years old in human years) is the princess of the Harmonica Star country and was to meet the prince of the Tambourine
    Star country at a ball where he'd pick a bride. But he isn't there and so Comet is sent to Earth to find him. He'll be
    known by the starlight in his eyes. She finds the Earth and she loves the people she meets there. Meanwhile, Princess
    Meteor of the Castanet Star country also arrives on Earth in search of the prince. Comet's companion is a little puppy
    with a star at the end of his tail named Rubba Ball. Of course, Comet was not the first to visit the Earth and love it,
    another before her did as well and married. Her pet (a white cat with bunny ears and a tiny heart on her tail named Bunny)
    continued life as a kind of fairy in the forest. Comet's power is drawn from the stars of her home and is channeled through
    her baton; she also wears a special pendant from where Rubba Ball immerges, and with which she can detect and find the
    prince.
  - There is a tower that summons chosen people called "Regulars" with the promise of granting their deepest desires. Whether
    it be wealth, fame, authority, or something that surpasses them all—everything awaits those who reach the top. Twenty-Fifth
    Bam is a boy who had only known a dark cave, a dirty cloth, and an unreachable light his entire life. So when a girl named
    Rachel came to him through the light, his entire world changed. Becoming close friends with Rachel, he learned various
    things about the outside world from her. But when Rachel says she must leave him to climb the Tower, his world shatters
    around him. Vowing to follow after her no matter what it takes, he sets his sight on the tower, and a miracle occurs.
    Thus begins the journey of Bam, a young boy who was not chosen by the Tower but opened its gates by himself. They call
    his kind "Irregulars"—beings that have shaken the very foundation of the Tower each time they set foot inside it.
- source_sentence: '"A shrine maiden with the ability to predict death is being guarded by a ninja to prevent a powerful demon
    from being revived and destroying the world. However, the ninja, Naruto, has been foreseen to die soon. How can Naruto
    protect the shrine maiden and the world despite this prophecy?"'
  sentences:
  - 'A group of ninja is planning to revive a powerful demon, and once its spirit is reunited with its body, the world will
    be destroyed. The only way to prevent this from happening is for Shion, a shrine maiden, to seal it away for good. Naruto
    Uzumaki is tasked to guard her, but one thing stops Shion from accepting his help: she also has the ability to predict
    death—and she has foreseen his demise approaching soon. In order to escape his fate, Naruto must stay away from Shion;
    however, undeterred, he chooses to challenge the prophecy in order to protect Shion and the world.'
  - 'The infamous Arsene Lupin III takes his gang of thieves to Great Britain to investigate the existence of the Raven''s
    hidden treasure. The Raven, an underground society rumored to be pulling the strings behind the British government, has
    evaded Lupin''s grasp for nearly 10 years. But finding clues proves difficult when he is pursued by not only Interpol''s
    Inspector Kouichi Zenigata but also the MI6, Scotland Yard, and Britain''s finest: the consulting detective Sherlock Holmes,
    who appears to have his own score to settle with the gentleman thief.'
  - With the promise of granting any wish, the omnipotent Holy Grail triggered three wars in the past, each too cruel and
    fierce to leave a victor. In spite of that, the wealthy Einzbern family is confident that the Fourth Holy Grail War will
    be different; namely, with a vessel of the Holy Grail now in their grasp. Solely for this reason, the much hated "Magus
    Killer" Kiritsugu Emiya is hired by the Einzberns, with marriage to their only daughter Irisviel as binding contract.
    Kiritsugu now stands at the center of a cutthroat game of survival, facing off against six other participants, each armed
    with an ancient familiar, and fueled by unique desires and ideals. Accompanied by his own familiar, Saber, the notorious
    mercenary soon finds his greatest opponent in Kirei Kotomine, a priest who seeks salvation from the emptiness within himself
    in pursuit of Kiritsugu. Based on the light novel written by Gen Urobuchi, Fate/Zero depicts the events of the Fourth
    Holy Grail War—10 years prior to Fate/stay night. Witness a battle royale in which no one is guaranteed to survive.
