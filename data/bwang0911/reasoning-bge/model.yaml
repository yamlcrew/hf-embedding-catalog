widgetData:
- source_sentence: Hey Reddit, what do you do in New York City?
  sentences:
  - The second text directly answers the question posed in the first text. It provides personal recommendations for places
    to eat and things to do in New York City, fulfilling the user's query. The text also offers a specific recommendation
    for a restaurant, Crif Dogs, and a menu item.
  - "For example, let's say you're at a section containing 9 tables\n\n    1   2   3\n    4   5   6\n    7   8   9\n\nI'm\
    \ sitting on the west side of Table 7, there are people at Tables 5 and 6. Someone comes in through the crowd and sits\
    \ on the east side of table 8, making awkward eye contact while we've got our mouths full.\n\nI always found it extremely\
    \ uncomfortable... why oh why can't they just sit with their back to me? As far as I'm concerned this is almost as canonical\
    \ as urinal rules."
  - This is my first year living here and I was just wondering if you knew of any awesome places to eat, fun places to go,
    trees to climb, anything of the sort. I for one would recommend Crif Dogs to anyone who has not been. Go there and get
    the "Spicy Redneck," you won't regret it.
- source_sentence: 'KEYC - Charges: Man Lived With Dead Bodies of His Mother, Brother'
  sentences:
  - The second text provides a detailed elaboration of the headline. It specifies the location, the man's name, the charges,
    and the circumstances surrounding the discovery of the bodies. It expands on the initial information, providing specific
    details about the case.
  - 'Well, this is one way to go out.

    Robert Gene White took a trip to El Paso to visit the Red Parrot, a full service gentlemen’s club. While Mr. White was
    enjoying a lap dance from one of the lovely ladies, he passed away.

    It wasn’t until the dance was over that they noticed Mr. White wasn’t moving. Initially, the club thought Mr. White was
    “playing dead” just trying to get out of paying his bill. Quickly they realized he wasn’t faking and began CPR, then called
    911. Unfortunately paramedics were unable to revive him.

    Is anyone else completely encapsulated at the idea that this clearly isn’t the first time someone has tried to “play dead”
    to get out of the bill?'
  - 'Prosecutors say a Minnesota man lived in his house with the decomposing bodies of his mother and twin brother for about
    a year.

    Sixty-year-old Robert James Kuefler of White Bear Lake is charged with interference with a dead body or scene of death
    because he neglected to tell authorities they died of natural causes, according to the St. Paul Pioneer Press .

    The bodies were found last year. Kuefler was charged this week. He allegedly told police his mother, 94-year-old Evelyn
    Kuefler, died in August 2015 and his brother, Richard Kuefler, died before that and he couldn''t bring himself to bury
    them.

    The complaint says his mother''s body was decayed and skeletal and his brother''s body was "mummified."

    Robert Kuefler didn''t return a message left by The Associated Press.

    -KEYC News 12'
- source_sentence: Innovative procedure saves baby alpaca in Lebanon
  sentences:
  - 'Police say 28-year-old Wesley Flores pulled out a gun and shot himself in the jaw after four hours of unsuccessful negotiations.
    He''s since been sent to a hospital in Lubbock.

    Authorities say Flores was originally taken into custody on a warrant for failing to show up to a scheduled court appearance.'
  - The second text elaborates on the innovative procedure mentioned in the first text. It provides details about the specific
    case of an alpaca named Hercules, the innovative treatment (NuCress scaffold), the medical team involved, and the positive
    outcome of the procedure, thus expanding on the initial claim.
  - 'Hercules the alpaca was only 24 hours old when he broke his front left leg at Cedar Rock Ranch in Lebanon. He received
    a plasma transfusion and was bottle-fed for months. The open wound and exposed bone led to a serious infection, preventing
    the bone break from healing properly.

    The animal’s veterinarian referred him to the University of Tennessee College of Veterinary Medicine for advanced treatment.

    Dr. Pierre-Yves Mulon, UTCVM assistant professor in farm animal medicine and surgery, determined the NuCress scaffold
    was the best option to heal the fragile animal.

    The Nucress scaffold is a nanomaterial-based bone regeneration device pioneered by University of Arkansas at Little Rock’s
    systems engineering professor Dr. Alexadru S. Biris, UTCVM head of large animal clinical sciences, Dr. David Anderson
    and a team of designated researchers.

    The scaffold is designed to be implanted directly into the wound by a surgeon and can be loaded with drugs to fight infection
    or with hormones and stem cells to encourage bone growth. As a result, the scaffold can deliver bacteria-fighting drugs
    directly to the wound and be safely absorbed by the body, generally eliminating the need for additional surgeries.

    Mulon loaded the scaffold with antibiotics and implanted it into Hercules’ wound, expecting a long wait due to the alpaca’s
    condition. The process proved quicker than he expected.

    “Hercules responded well and fast,” said Mulon. “We was able to walk immediately after surgery and has been very active.
    The bone repaired within the time range expected for a closed fracture, though it was an open one.”

    Mulon said while other options, such as traditionally administered drugs, could have been used, they would have presented
    more obstacles such as future surgeries.

    “It is difficult to confirm if the results would have changed using any other option; however, I think it would have necessitated
    more time,” said Mulon. “Any open fracture carries a guarded to poor prognosis, and Hercules made it as we are very happy,”

    Researchers received a grant of more than $5 million from the Department of Defense and hope to develop the product for
    use with humans.'
- source_sentence: Trump, Macron To Hold Joint Press Conference During State Visit
  sentences:
  - 'Updated at 10:58 a.m. ET

    President Trump and French President Emmanuel Macron will field questions from reporters on Tuesday, in between talks
    on the Iran nuclear deal and a lavish state dinner.

    Macron is the first of two European leaders Trump is hosting this week. German Chancellor Angela Merkel will be in Washington,
    D.C., on Friday. Both France and Germany joined the U.S. in a six-nation pact with Iran to halt its nuclear program in
    exchange for sanctions relief. Trump has threatened to pull the U.S. out of that deal. Macron and Merkel want him to stay
    in.

    Trump''s former advisers struggled to make the case for the nuclear deal, and the newest members of Trump''s national
    security team are as skeptical of the agreement as he is.

    "People know my views on the Iran deal. It was a terrible deal. It should have never, ever been made," Trump said Tuesday
    during an Oval Office photo opportunity with Macron. "It''s insane. It''s ridiculous. It should have never been made,
    but we will be talking about it."

    Macron argues the nuclear agreement is worth preserving.

    "We have a common objective, we want to make sure there''s no escalation and no nuclear proliferation in the region. We
    now need to find the right path forward," Macron said, through an interpreter.

    Macron has skillfully courted Trump, inviting the U.S. president to be his guest last year at an elaborate military parade
    marking Bastille Day in Paris. Trump was so impressed, he ordered his own military parade this November, marking the 100th
    anniversary of the end of World War I.

    The two presidents and their wives celebrated the wartime alliance between the U.S. and France on Monday by planting an
    oak tree on the South Lawn of the White House. The sapling comes from Belleau Wood, where more than 9,000 Marines died
    in the final months of the first world war, according to a White House statement.

    Later, the two couples took a sightseeing helicopter tour of Washington, then held a private dinner at George Washington''s
    historic Mt. Vernon estate.

    Despite their evident personal chemistry, Trump and Macron have significant policy differences to discuss. In addition
    to the Iran nuclear deal, Macron wants a permanent exemption from the president''s new steel and aluminum tariffs. And
    he''d like to see a more lasting commitment from the U.S. to stabilization efforts in Syria. Military forces from France
    and the U.K. joined the U.S. in launching air strikes on Syria earlier this month in retaliation for a suspected chemical
    weapons attack. But Trump is impatient to withdraw U.S. troops from that country as quickly as possible.

    "What you do have are two leaders who have a great deal of respect for one another, who have a great friendship," said
    White House spokeswoman Sarah Sanders. She added that friendship allows the two men to have "very open and candid conversations."

    Sanders said she expects "a very productive and very positive state visit for both countries."

    The visit will be marked by the first state dinner of the Trump administration. The White House has been decorated for
    the event with cherry blossoms, sweet peas and white lilacs. The menu is American with French influences: spring lamb
    and jambalaya.

    On Wednesday, Macron is set to address a joint session of Congress.'
  - 'Liverpool manager Jurgen Klopp admits that he cannot explain his side''s performance during their 2-2 draw with Sunderland
    at the Stadium of Light.

    Liverpool manager Jurgen Klopp has admitted that he cannot explain his side''s performance during the 2-2 draw with Sunderland
    at the Stadium of Light this afternoon.

    The Reds led twice through goals from Daniel Sturridge and Sadio Mane, but on both occasions they were pegged back by
    penalties from Jermain Defoe.

    Liverpool had been looking for five straight league wins for the first time under Klopp, but the German suggested that
    the two-day turnaround between matches prevented them from playing their best football.

    "I am not able to explain it because I don''t know exactly what I saw, my team were fighting but I wasn''t sure if they
    could do it. We can play better football but I''m not sure if you can play better with that break," he told BBC Sport.

    "I don''t know how it feels when you have to do the things you have to do today. I told the players if nobody wanted to
    play I would never speak about and not tell anyone, but nobody came and that was a good thing. About the football we played,
    I actually have no idea how to speak about it.

    "There was no foul before the free kick for the second penalty. You need a little bit of luck, but Sunderland worked hard
    too and maybe they deserved it."

    The results means that Liverpool miss the chance to close the gap on Premier League leaders Chelsea to three points.'
  - The second text elaborates on the title by providing details about the joint press conference, including the date, topics
    to be discussed (Iran nuclear deal, tariffs, Syria), and the context of the state visit. It also mentions the leaders'
    differing views and the overall atmosphere of the visit.
- source_sentence: Crossover and multicriticality due to the Dzyaloshinsky-Moriya interaction
  sentences:
  - Attention is focused on the theoretical principles governing the underlying geometry of motifs, border patterns and all-over
    patterns. The systematic classification and construction of two-dimensional periodic patterns and tilings is introduced,
    with particular relerence to two-colour and higher colour counterchange possibilities. An identification is made of the
    geometrical restraints encountered when introducing systematic interchange of colour. A wide ranging series of original
    patterns and tilings is constructed and fully illustrated; these designs have been printed in fabric form and are presented
    in the accompanying exhibition.
  - We show that the addition of a Dzyaloshinsky-Moriya interaction to a Heisenberg ferromagnet introduces only one crossover
    exponent, which is the same as for the usual uniaxial anisotropy. This result is in contrast to a previous report by Liu.
  - 'The second text elaborates on the first by specifying the impact of the Dzyaloshinsky-Moriya interaction on a Heisenberg
    ferromagnet. It highlights a key finding: the introduction of only one crossover exponent, contrasting with a prior study.
    This directly addresses the topic introduced in the title.'
