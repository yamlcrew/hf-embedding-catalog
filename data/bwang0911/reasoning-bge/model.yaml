  - source_sentence: Crossover and multicriticality due to the Dzyaloshinsky-Moriya interaction
    sentences:
    - Attention is focused on the theoretical principles governing the underlying geometry of motifs, border patterns and
      all-over patterns. The systematic classification and construction of two-dimensional periodic patterns and tilings is
      introduced, with particular relerence to two-colour and higher colour counterchange possibilities. An identification
      is made of the geometrical restraints encountered when introducing systematic interchange of colour. A wide ranging
      series of original patterns and tilings is constructed and fully illustrated; these designs have been printed in fabric
      form and are presented in the accompanying exhibition.
    - We show that the addition of a Dzyaloshinsky-Moriya interaction to a Heisenberg ferromagnet introduces only one crossover
      exponent, which is the same as for the usual uniaxial anisotropy. This result is in contrast to a previous report by
      Liu.
    - 'The second text elaborates on the first by specifying the impact of the Dzyaloshinsky-Moriya interaction on a Heisenberg
      ferromagnet. It highlights a key finding: the introduction of only one crossover exponent, contrasting with a prior
      study. This directly addresses the topic introduced in the title.'
