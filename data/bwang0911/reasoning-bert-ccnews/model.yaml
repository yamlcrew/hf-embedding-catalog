  - 'Image caption The last confirmed sighting of Brian McGowan was in Plean on 21 September

    Police searching for a man who has not been seen for more than two weeks are asking the public to check outbuildings and
    gardens for any trace of him.

    Brian McGowan, 42, was last seen in the Gillespie Terrace area of Plean, near Stirling, at 16:00 on 21 September.

    Investigations have uncovered a "probable" sighting of him in the Gallamuir Drive area at 01:30 the following day.

    Police said that since then he has not returned home or contacted anyone.

    Insp Donna Bryans said: "Brian has now been missing for two weeks and it is vital that we find him.

    "I would like to thank the local community who have come out to search for Brian and helped with our investigations so
    far.

    "I would ask residents and visitors to Plean, as well as visitors to Plean Country Park, to be vigilant and report any
    sighting of anyone seen matching Brian''s description."

    Insp Bryans said a search of gardens and outbuildings in the area could help officers discover Mr McGowan''s whereabouts.

    He is described as 5ft 10 tall, of slim build with short dark hair. He had blue eyes and tattoos on his fingers and speaks
    with a local accent.

    When last seen he was wearing a black baseball cap, a black G-Star jacket, grey Armani jumper, grey Adidas tracksuit bottoms
    with black stripes on the sides and black and grey Adidas Y3 trainers.'
  - 'ISLAMABAD: The Pakistan government has begun consultations over the nomination of an ad-hoc judge for the Kulbhushan
    Jadhav case being heard at the International Court of Justice with an ex-attorney general and a former Jordanian premier
    emerging as the top contenders, a media report said today. India had moved the Hague-based International Court of Justice
    (ICJ) against Jadhav''s death penalty handed down by a Pakistani military court. The ICJ had on May 18 restrained Pakistan
    from executing the death sentence.Pakistan government''s functionaries have started consultations for the nomination of
    an ad-hoc judge, Express Tribune reported, citing sources.During the tenure of ousted prime minister Nawaz Sharif , former
    Supreme Court judge Khalilur Rehman Ramday was approached, but he declined the nomination, the report said.Sources were
    quoted by the daily as saying that the Attorney General for Pakistan''s (AGP) office has recommended the names of senior
    lawyer Makhdoom Ali Khan and former Jordanian prime minister Awn Shawkat Al-Khasawneh to the Prime Minister''s Office
    for the nomination of one name as an ad-hoc judge.Khasawneh served as an ICJ judge for over a decade, while Khan, a former
    Attorney General who is seen as the favourite for the job, also has experience in international arbitration cases, having
    represented eight different countries in international courts.The nomination of the ad-hoc judge will be finalised after
    getting inputs from the Foreign Office and the military establishment, the sources said, adding that earlier, government
    functionaries had also considered the name of former chief justice of Pakistan Tassaduq Hussain Jillani.An official was
    quoted as saying that the name of the ad- hoc judge will be finalised next month, soon after the Indian side files its
    documents.Meanwhile, Pakistan Bar Council (PBC) representative Raheel Kamran Sheikh has called upon the government to
    seek Parliament''s approval on the appointment of the ad-hoc judge.Only one person has previously been appointed as ICJ
    judge in Pakistan''s history -- former foreign minister Zafarullah Khan, who was appointed in 1954 and later became the
    president of the court.Yaqub Ali Khan and Sharifuddin Pirzada both served as ad-hoc judges, as did Zafarullah.'
- source_sentence: Energy advocates call for new commitment to renewable growth
  sentences:
  - The second text elaborates on the first by providing details about the specific context of the energy advocates' call
    for renewable growth. It identifies the advocates (CFE, VoteSolar, Environment Connecticut), the specific renewable energy
    program (community solar), and the reasons for their call, including program delays and design flaws.
  - 'The piece below was submitted by CFE, VoteSolar, and Environment Connecticut in response to the latest delay in the shared
    solar pilot program.

    Solar and environmental advocates are calling for a new community solar program in Connecticut that will expand solar
    access, energy choices and consumer savings for families, municipalities, and businesses statewide. The demand follows
    today’s Department of Energy and Environmental Protection (DEEP) technical hearing where attendees reviewed the state’s
    current Shared Clean Energy Facilities pilot program. The pilot has stalled several times over the last two years, most
    recently following DEEP’s decision to scrap all the proposals they have received and issue a new request for projects.
    DEEP heard from many advocates and developers at the hearing who are frustrated with this latest delay and skeptical about
    the long term success of the pilot.

    The current pilot program was meant to expand solar access to Connecticut energy customers who can’t put solar on their
    own roof, but it contained flaws that have prevented any development to date. As set out in the legislation, the program
    has several poor design elements and a goal too small to draw significant private sector interest. Below are statements
    from stakeholders in Connecticut’s clean energy economy:

    “For years, Connecticut has missed out on the opportunity to bring solar energy choices to all consumers and more clean
    energy jobs to the state,” said Sean Garren, Northeast Regional director for Vote Solar. “Connecticut’s lackluster community
    solar program hasn’t unlocked the benefits of solar access for a single resident to date due to poor design and a lack
    of ambition at the scale needed, brought about by the electric utilities’ intervention. We’re calling on the legislature
    to catch up to the rest of New England — and the nation — with a smart, well-structured community solar program designed
    to serve consumers statewide.”

    “Two years of foot dragging and refusal by the Department of Energy and Environmental Protection to follow the law and
    implement a community solar program is preventing tens of thousands of Connecticut families from gaining access to clean,
    affordable, secure solar power,” said Chris Phelps, State Director for Environment Connecticut. “Community solar is helping
    other states accelerate solar growth, create jobs, and cut pollution. Connecticut policy makers should take action now
    to create a bold community solar program.”

    “Shared solar programs have been sweeping the nation for the last decade, but Connecticut has been left in the shade —
    losing out on healthier air, investment dollars, and green jobs that would accompany a full-scale, statewide shared solar
    program,” said Claire Coleman, Climate and Energy Attorney for Connecticut Fund for the Environment. “DEEP’s decision
    to start over with the already overly-restrictive shared solar pilot puts Connecticut further in the dark. Our climate
    and economy cannot wait any longer. Connecticut’s leaders must move quickly to ramp up in-state renewables through a full-scale
    shared solar program if Connecticut is going to have any chance of meeting its obligations under the Global Warming Solutions
    Act to reduce greenhouse gas emissions.”

    Vote Solar is a nonprofit organization working to foster economic development and energy independence by bringing solar
    energy to the mainstream nationwide. Learn more at votesolar.org.'
  - 'BEIJING: China will waive income tax for three years for foreign investors trading the country’s new crude futures contract,
    the Ministry of Finance said on Tuesday, in a bid to attract overseas capital for the much anticipated launch.

    The start of trading on Monday will mark the culmination of a years-long push by China to create Asia’s first oil futures
    benchmark, and is aimed at giving the world’s biggest oil importer more clout in pricing crude sold to Asia.

    It will potentially give the Shanghai International Energy Exchange, which will operate the new contract, a share of the
    trillions of dollars each year in oil futures trading.

    The finance ministry said foreign brokers will be exempted from paying income tax on commissions they earn from dealing
    in the new Shanghai crude futures.

    The tax exemption could help encourage foreign players to engage with the new contract, despite concerns about issues
    such as foreign exchange conversion and potential capital curbs.

    The number of foreign investors seeking to open non-resident accounts to allow trading has so far been below expectations,
    a source at CITIC, one of eight banks that is handling margin deposits for foreign investors, said. The source declined
    to be named as he is not authorized to talk with media.

    The oil market is closely watching the liquidity of the contract, as institutional investors and brokers expect trading
    volumes and open interest to be relatively small compared with China’s iron ore, copper and steel futures contracts.

    China in recent days has provided more details on the contract, including margins, trading limits and transaction fees,
    and has approved the use of six bonded storage warehouses.'
