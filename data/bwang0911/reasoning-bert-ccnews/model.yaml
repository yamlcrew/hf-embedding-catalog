    on Tuesday, October 10, 2017.

    Copyright 2017 WFXG. All rights reserved.'
  - 'NEWPORT BEACH, Calif. (AP) — The Latest on a fatal helicopter crash in Southern California (all times local):

    10:07 a.m.

    California authorities have released the name of all three people killed when a small helicopter crashed in a Newport
    Beach neighborhood.

    The Orange County Sheriff''s Department says the dead are 60-year-old Joseph Anthony Tena of Newport Beach, 45-year-old
    Kimberly Lynne Watzman of Santa Monica and 56-year-old Brian R. Reichelt of Hollywood.

    The crash Wednesday in a neighborhood involved four people in the helicopter and a bystander. Newport Beach police spokeswoman
    Jennifer Manzella says all three people killed were in the helicopter.

    There''s no information about two people who were injured.

    ___

    11:03 p.m.

    Officials say three people were killed and two more injured when a helicopter crashed into a home in a suburban Southern
    California neighborhood.

    Authorities say four people were aboard the Robinson R44 helicopter when it went down in Newport Beach on Tuesday afternoon
    just a few minutes after taking off from John Wayne Airport.

    One person who was outside on the ground was involved in the crash, though officials did not specify who died and who
    was injured.

    Neighbor Marian Michaels says she thought it was an earthquake when the helicopter slammed into the house.

    Another neighbor, Roger Johnson, says he heard a scream that sounded like it was from a horror movie before rushing to
    the scene to try to help.'
