      Flights at Hartsfield Airport in Atlanta were not officially grounded as the damaging winds moved into the area. However,
      the airport warned on Twitter that delays were likely.

      Meanwhile, more than 150 people reportedly took cover into a historic cave in Cave Springs, Ga.

      The storms knocked out power to at least 15,000 homes and businesses in Alabama. Georgia Power was rpeorting more than
      26,000 of their customers were without power, according to Cobb County News.

      The Associated Press contributed to this report.'
  - source_sentence: NCAA Sexual Violence Policy Criticized as Weak
    sentences:
    - The second text provides details that elaborate on the criticism mentioned in the first text. It describes the NCAA's
      new rules and then presents a specific critique, highlighting the perceived weaknesses in the policy, such as the lack
      of strong enforcement and accountability, thus supporting the initial claim of weakness.
    - 'CHAMPAIGN -- Illinois had one final chance to finish this week on a recruiting strong note. After missing out on three
      Class of 2018 forwards early in the week, the Illini were still in the running for four-star Georgia prospect Landers
      Nolley.

      Until Friday morning. Nolley, a 6-foot-7 wing who played his sophomore season at Curie in Chicago before moving to Georgia,
      narrowed his choices to Georgia and Virginia Tech.

      Nolley''s almost final decision left Illinois 0 for 4 on 2018 targets this week after Lukas Kisunas (UConn), George
      Conditt (Iowa State) and Colin Castleton (Michigan) all committed elsewhere. That leaves the Illini in further pursuit
      of in-state targets like Morgan Park''s Ayo Dosunmu, who will start an official visit at Illinois on Oct. 13, and Simeon''s
      Talen Horton-Tucker.'
    - 'The National Collegiate Athletic Association adopted rules last week that require key administrators to complete annual
      training on sexual violence prevention, and to certify annually that the institution''s teams and programs are familiar
      with policies and processes to prevent sexual violence or to deal with incidents that take place. Further, the rules
      require institutions to provide information to athletes on institutional policies and procedures.

      A column in The Huffington Post noted that the NCAA rules are largely similar to what federal law requires of colleges,
      and that they don''t address issues related to athletes found to have assaulted others. What the rules lack, the column
      said, "is enforcement or accountability that approaches penalties reaching the [same] level as the purchase of a hamburger
      for a student athlete."'
