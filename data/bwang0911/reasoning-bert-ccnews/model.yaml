  - 'CHAMPAIGN -- Illinois had one final chance to finish this week on a recruiting strong note. After missing out on three
    Class of 2018 forwards early in the week, the Illini were still in the running for four-star Georgia prospect Landers
    Nolley.

    Until Friday morning. Nolley, a 6-foot-7 wing who played his sophomore season at Curie in Chicago before moving to Georgia,
    narrowed his choices to Georgia and Virginia Tech.

    Nolley''s almost final decision left Illinois 0 for 4 on 2018 targets this week after Lukas Kisunas (UConn), George Conditt
    (Iowa State) and Colin Castleton (Michigan) all committed elsewhere. That leaves the Illini in further pursuit of in-state
    targets like Morgan Park''s Ayo Dosunmu, who will start an official visit at Illinois on Oct. 13, and Simeon''s Talen
    Horton-Tucker.'
  - 'The National Collegiate Athletic Association adopted rules last week that require key administrators to complete annual
    training on sexual violence prevention, and to certify annually that the institution''s teams and programs are familiar
    with policies and processes to prevent sexual violence or to deal with incidents that take place. Further, the rules require
    institutions to provide information to athletes on institutional policies and procedures.

    A column in The Huffington Post noted that the NCAA rules are largely similar to what federal law requires of colleges,
    and that they don''t address issues related to athletes found to have assaulted others. What the rules lack, the column
    said, "is enforcement or accountability that approaches penalties reaching the [same] level as the purchase of a hamburger
    for a student athlete."'
