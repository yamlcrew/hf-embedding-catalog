- source_sentence: Severe weather rips through Alabama university, takes aim at Southeast
  sentences:
  - The second text provides a detailed elaboration of the first text. It expands on the initial statement about severe weather
    in Alabama, providing specific details about the damage at Jacksonville State University, the impact on the surrounding
    areas, and the broader effects of the storm.
  - 'The labor movement has been living in the shadow of a national assault on public-sector collective bargaining for a while
    now. We’ve talked a lot about Harris v. Quinn, how labor dodged a bullet with that case, and dodged another with the death
    of Scalia before the Friedrichs case could be decided. But Janus v. American Federation of State, County, and Municipal
    Employees, Council 31 is likely to be the case labor has been dreading, and we break it down for you today with Andy Stettner
    of the Century Foundation.

    We also look at Uber’s failures in London and neoliberalism’s failures in France, a union drive at the Los Angeles Times
    and a labor solidarity mission to Puerto Rico post-hurricanes. For Argh, we consider forced labor “rehab” facilities,
    and how moving left is the solution to the rise of the populist right.

    If you think our work is worth supporting as we soldier on through Trumplandia, please consider becoming a sustaining
    member of Belabored or donating or subscribing to Dissent. Help keep us going for the next 136 episodes!'
  - 'Severe weather that spawned at least one tornado slammed Alabama’s Jacksonville State University on Monday night and
    took aim at the rest of the southeast.

    Alabama state troopers said the damage in Jacksonville, Ala. left the city looking like a “war zone.” Strong winds downed
    trees and damaged buildings as the National Weather Service confirmed a “damaging and possibly large tornado near Jacksonville
    and Calhoun counties and was moving east.

    Jacksonville State University Athletic Director Greg Seitz wrote in a tweet that there was significant damage to campus,
    including to the newly renovated Pete Mathews Coliseum.

    "I can confirm we have major roof damage at Pete Mathews Coliseum, but The Pete is not completely destroyed," Seitz said
    in a tweet.

    Tuscaloosa County Sheriff’s Office Lt. Andy Norris said in a tweet that troopers called Jacksonville a “war zone.” He
    said the arena’s roof “took major damage.”

    Photos seen on social media showed the extent of the damage Jacksonville took.

    Alabama Gov. Kay Ivey confirmed in a statement late Monday there was “significant damage” throughout the state, according
    to WBRC-TV.

    Cities in northern Alabama reported power outages and the NWS in Huntsville reported at least three tornadoes in the area.

    The severe weather moved into Georgia late Monday night.

    Flights at Hartsfield Airport in Atlanta were not officially grounded as the damaging winds moved into the area. However,
    the airport warned on Twitter that delays were likely.

    Meanwhile, more than 150 people reportedly took cover into a historic cave in Cave Springs, Ga.

    The storms knocked out power to at least 15,000 homes and businesses in Alabama. Georgia Power was rpeorting more than
    26,000 of their customers were without power, according to Cobb County News.

    The Associated Press contributed to this report.'
