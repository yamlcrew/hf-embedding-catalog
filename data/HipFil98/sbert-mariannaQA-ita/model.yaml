widgetData:
- source_sentence: L'autore è sconosciuto. Il poema andò perduto, ma nel XV secolo fu ritrovato e copiato in un manoscritto
    dallo studioso greco neoplatonico Costantino Lascaris. Si trova nei manoscritti sia da solo che insieme ad altri scritti,
    quali gli Inni orfici o gli Inni omerici. Un'altra opera correlata è il Lithica (che descrive le proprietà e il simbolismo
    di diverse pietre).
  sentences:
  - Perchè è stato copiato in un manoscritto?
  - Qual è il nome originale della piazza Garibaldi?
  - Chi fu il creatore dell'uomo secondo Ovidio?
- source_sentence: 'Il 31 ottobre 1973 un tram guasto trainato da un''altra vettura in direzione del deposito di Fuorigrotta
    si sganciò all''interno della Galleria Laziale. Dal momento che percorreva la galleria in salita, il tram, privo di conducente
    e senza freni, ripiombò nella piazza a fortissima velocità (circa 70 km/h), fiondandosi su alcune automobili ferme al
    semaforo e terminò la sua folle corsa nell''aiuola della fontana della piazza senza però danneggiarla, abbattendo però
    una palma che non è mai più stata rimpiazzata. L''incidente causò due morti: Luigi Esposito (passeggero del taxi di appena
    24 anni) e del tassista Gianni Vozzo (29 anni) che in quel momento si trovavano all''interno del taxi colpito e tranciato
    in due parti dal tram.'
  sentences:
  - Perché il tram ripiombò nella piazza?
  - Perché gli Opici erano considerati una civiltà preurbana?
  - Chi ha scoperto i resti archeologici della metropolitana di Napoli?
- source_sentence: 'Una cantata per voce di basso e basso continuo di Alessandro Scarlatti, conservata presso la biblioteca
    del Conservatorio di S.Pietro a Majella, si intitola Nel mar che bagna al bel Sebeto il piede. Dalla scrittura musicale
    risulta che l''accento della parola cadeva sulla seconda "e" ed era acuto: "Sebéto". Si tratta di una cantata d''argomento
    arcadico, cioè bucolico e pastorale, in cui sono ritratte gare di vele alla foce del fiume e, in parallelo, una "gara
    d''amore" che nasce tra due pastori dai mitologici nomi di Elpino e Nice. Lo stesso Alessandro Scarlatti scrive una cantata
    dal titolo Nel mar che bagna a Mergellina il piede, d''identico argomento e identica ambientazione. Nella serenata in
    un atto La concordia dei pianeti (1723) di Antonio Caldara, si menziona il Sebeto assieme a altri fiumi (“l''Istro, il
    Reno, la Mossa, il Po, il Sebeto”) che "mormorano" il nome dell''imperatrice Elisabetta Cristina, regnante assieme a Carlo
    VI. Anche nel melodramma di Tiberio Natalucci Il viaggio di Bellini, con testo di Cassiano Zaccagnini, è citato questo
    fiume: Bellini, all''apertura della 5ª scena del 1° atto infatti canta «Del bel Sebeto le incantate sponde / Son presso
    omai: ricalcherò quel suolo / Che de sudori miei primo bagnai...».'
  sentences:
  - Perché si trovano i 404 scalini della Pedamentina in quel luogo?
  - Qual è il nome del melodramma di Tiberio Natalucci che cita il Sebeto?
  - Come erano utilizzati i pronomi di cortesia nel Medioevo nel Regno delle Due Sicilie?
- source_sentence: 'Il parco nazionale del Vesuvio è nato il 5 giugno 1995 per il grande interesse geologico, biologico e
    storico che il suo territorio rappresenta. La sua sede è collocata nel comune di Ottaviano. È stato istituito principalmente
    per:  conservare i valori del territorio e dell''ambiente, e la loro integrazione con l''uomo; salvaguardare le specie
    animali e vegetali, nonché le singolarità geologiche; promuovere attività di educazione ambientale, di formazione e di
    ricerca scientifica. Il Parco nasce poi dall''esigenza di valorizzare e difendere il Vesuvio. Esso rappresenta il tipico
    esempio di vulcano a recinto, costituito da un cono esterno tronco, il Monte Somma, (spento e con una cinta craterica
    in buona parte demolita) entro il quale si trova un cono più piccolo (che rappresenta il Vesuvio, ancora attivo).Il territorio,
    ricco di bellezze storiche e naturalistiche, vanta una produzione agricola unica per varietà e originalità di sapori.Un''ulteriore
    singolarità di questo Parco è rappresentata dalla notevole presenza di specie floristiche e faunistiche se si rapporta
    alla sua ridotta estensione: sono presenti ben 612 specie appartenenti al mondo vegetale e 227 specie (tra quelle studiate)
    appartenenti a quello animale. A causa dell''emergenza rifiuti in Campania, due siti sul confine del Parco nazionale del
    Vesuvio avrebbero dovuto essere adibiti a discarica in seguito all''emanazione della legge nº 123 del 2008. Al 2010, è
    già attiva e quasi satura la discarica "Ex Sari". Durante il mese di settembre 2010 la regione Campania aveva previsto
    l''apertura della seconda discarica, "Cava Vitiello", che avrebbe dovuto essere la più grande d''Europa. Tuttavia, dopo
    numerose proteste da parte soprattutto dei cittadini dei comuni di Boscoreale e Terzigno l''apertura della discarica è
    stata sospesa dal Governo.'
  sentences:
  - Perchè è stato istituito il Parco nazionale del Vesuvio?
  - Chi sono i personaggi tipici dell'iconografia napoletana descritti nel testo?
  - Chi ha condotto le campagne di scavo a Elea-Velia?
- source_sentence: Ade è l'antagonista principale nel musical Hadestown.
  sentences:
  - Dove si trova Piazza Trieste e Trento?
  - Chi è l'antagonista principale nel musical Hadestown?
  - Perchè la poesia resta l\'unico elemento eterno
