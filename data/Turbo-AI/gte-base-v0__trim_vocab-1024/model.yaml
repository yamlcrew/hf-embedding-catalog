  widget:
  - source_sentence: Những loại giấy tờ, tài liệu nào có thể dùng để xác định nội dung con dấu, chữ ký và chức danh theo quy
      định pháp luật hiện nay?
    sentences:
    - 'Giấy tờ, tài liệu nêu tại điểm a khoản 2 Điều 12 Nghị định bao gồm:

      1. Giấy tờ, tài liệu có con dấu, chữ ký và chức danh chưa được giới thiệu chính thức.

      2. Giấy tờ, tài liệu có con dấu, chữ ký và chức danh không thể xác định được trên cơ sở đối chiếu với mẫu con dấu, mẫu
      chữ ký và chức danh được giới thiệu chính thức hoặc trên cơ sở kết quả xác minh.'
    - Người đứng đầu cơ quan, tổ chức trong phạm vi nhiệm vụ, quyền hạn của mình có trách nhiệm quản lý về lưu trữ, áp dụng
      các biện pháp nhằm nâng cao hiệu quả trong việc thu thập, quản lý, bảo quản và sử dụng tài liệu lưu trữ; ban hành quy
      chế về công tác lưu trữ của cơ quan, tổ chức mình.
    - '1. Tài liệu hình thành trong quá trình hoạt động của Hội đồng nhân dân, Ủy ban nhân dân, các tổ chức xã hội, tổ chức
      xã hội - nghề nghiệp của xã, phường, thị trấn được lựa chọn và lưu trữ tại Văn phòng Ủy ban nhân dân xã, phường, thị
      trấn.

      Người làm lưu trữ tại Văn phòng Ủy ban nhân dân xã, phường, thị trấn phải có đủ các tiêu chuẩn chuyên môn, nghiệp vụ
      lưu trữ và được hưởng chế độ, quyền lợi theo quy định của pháp luật.

      2. Người làm lưu trữ tại Văn phòng Ủy ban nhân dân xã, phường, thị trấn có nhiệm vụ hướng dẫn việc lập hồ sơ, tiếp nhận
      hồ sơ, tài liệu, chỉnh lý, thống kê, bảo quản và phục vụ sử dụng tài liệu lưu trữ theo quy định của pháp luật về lưu
      trữ.'
  - source_sentence: Giấy tờ, tài liệu có con dấu, chữ ký và chức danh chưa được giới thiệu chính thức gồm những loại nào?
    sentences:
    - '1. Việc giới thiệu mẫu con dấu, mẫu chữ ký và chức danh của cơ quan, tổ chức lập, công chứng, chứng thực, chứng nhận
      giấy tờ, tài liệu theo quy định tại khoản 4 Điều 11 Nghị định được thực hiện như sau:

      a) Cơ quan, tổ chức có thẩm quyền lập, công chứng, chứng thực giấy tờ, tài liệu theo quy định của pháp luật có trách
      nhiệm giới thiệu mẫu con dấu, mẫu chữ ký và chức danh của cơ quan, tổ chức.

      b) Cơ quan, tổ chức có trách nhiệm định kỳ hàng năm rà soát mẫu con dấu, mẫu chữ ký, chức danh của cơ quan, tổ chức
      và thông báo kết quả rà soát trước ngày 01 tháng 02 của năm tiếp theo.

      c) Cục Lãnh sự và Sở Ngoại vụ Thành phố Hồ Chí Minh tiếp nhận việc giới thiệu mẫu con dấu, mẫu chữ ký và chức danh của
      cơ quan, tổ chức Trung ương và cơ quan, tổ chức địa phương.

      Cơ quan ngoại vụ địa phương tiếp nhận việc giới thiệu mẫu con dấu, mẫu chữ ký và chức danh của cơ quan, tổ chức địa
      phương và cơ quan, tổ chức Trung ương đặt tại địa phương được gửi tới cơ quan ngoại vụ; chuyển bản gốc văn bản giới
      thiệu cho Cục Lãnh sự và Sở Ngoại vụ Thành phố Hồ Chí Minh trong thời hạn 05 ngày làm việc, kể từ ngày nhận được giới
      thiệu, và lưu giữ bản chụp của văn bản này.

      2. Cục Lãnh sự và Sở Ngoại vụ Thành phố Hồ Chí Minh có trách nhiệm giới thiệu mẫu con dấu, mẫu chữ ký và chức danh của
      đơn vị mình cho các Cơ quan đại diện nước ngoài tại Việt Nam và các Cơ quan đại diện Việt Nam ở nước ngoài.

      3. Các Cơ quan đại diện Việt Nam ở nước ngoài có trách nhiệm giới thiệu mẫu con dấu, mẫu chữ ký và chức danh của Cơ
      quan đại diện cho Bộ Ngoại giao hoặc cơ quan có thẩm quyền khác của nước ngoài.

      4. Trong trường hợp có sự thay đổi về mẫu con dấu, mẫu chữ ký và chức danh nêu tại khoản 1, khoản 2 và khoản 3 Điều
      này thì cơ quan liên quan phải giới thiệu mẫu con dấu, mẫu chữ ký và chức danh mới trong thời hạn 20 ngày làm việc,
      kể từ ngày có sự thay đổi.'
    - 'Giấy tờ, tài liệu nêu tại điểm a khoản 2 Điều 12 Nghị định bao gồm:

      1. Giấy tờ, tài liệu có con dấu, chữ ký và chức danh chưa được giới thiệu chính thức.

      2. Giấy tờ, tài liệu có con dấu, chữ ký và chức danh không thể xác định được trên cơ sở đối chiếu với mẫu con dấu, mẫu
      chữ ký và chức danh được giới thiệu chính thức hoặc trên cơ sở kết quả xác minh.'
    - 'Thông báo về tình hình chấp hành án của người đang chấp hành án phạt tù

      Bộ Công an thông báo ngay cho cơ quan có thẩm quyền của nước ngoài khi:

      1. Người đang chấp hành án phạt tù được tạm đình chỉ thi hành án phạt tù, giảm thời hạn chấp hành hình phạt tù hoặc
      đặc xá;

      2. Người đang chấp hành án phạt tù đã chấp hành xong án phạt tù;

      3. Người đang chấp hành án phạt tù bỏ trốn khỏi nơi giam giữ;

      4. Người đang chấp hành án phạt tù chết trước khi chấp hành xong án phạt tù;

      5. Phía nước ngoài đề nghị thông báo về tình hình chấp hành án của người đang chấp hành án phạt tù.'
  - source_sentence: Việc trích yếu nội dung công văn của cơ quan Bộ Giáo dục và Đào tạo được thực hiện theo thể thức nào?
    sentences:
    - '1. Thể thức

      Tên loại văn bản là tên của từng loại văn bản do cơ quan, tổ chức ban hành. Khi ban hành văn bản đều phải ghi tên loại,
      trừ công văn.

      Trích yếu nội dung của văn bản là một câu ngắn gọn hoặc một cụm từ phản ánh khái quát nội dung chủ yếu của văn bản.

      2. Kỹ thuật trình bày

      Tên loại và trích yếu nội dung của các loại văn bản có ghi tên loại được trình bày tại ô số 5a; tên loại văn bản (nghị
      quyết, quyết định, kế hoạch, báo cáo, tờ trình và các loại văn bản khác) được đặt canh giữa bằng chữ in hoa, cỡ chữ
      14, kiểu chữ đứng, đậm; trích yếu nội dung văn bản được đặt canh giữa, ngay dưới tên loại văn bản, bằng chữ in thường,
      cỡ chữ 14, kiểu chữ đứng, đậm; bên dưới trích yếu có đường kẻ ngang, nét liền, có độ dài bằng từ 1/3 đến 1/2 độ dài
      của dòng chữ và đặt cân đối so với dòng chữ, ví dụ:

      QUYẾT ĐỊNH Về việc điều động cán bộ

      Trích yếu nội dung công văn được trình bày tại ô số 5b, sau chữ “V/v” bằng chữ in thường, cỡ chữ từ 12 đến 13, kiểu
      chữ đứng; được đặt canh giữa dưới số và ký hiệu văn bản, cách dòng 6pt với số và ký hiệu văn bản, ví dụ:

      Số: 72/VTLTNN-NVĐP

      V/v kế hoạch kiểm tra công tác  văn thư, lưu trữ năm 2009'
    - 'Nguyên tắc vũ trang canh gác bảo vệ mục tiêu

      1. Tuân thủ quy định tại Nghị định số 37/2009/NĐ-CP ngày 23/4/2009 quy định các mục tiêu quan trọng về chính trị, kinh
      tế, ngoại giao, khoa học - kỹ thuật, văn hóa, xã hội do lực lượng Cảnh sát nhân dân có trách nhiệm vũ trang canh gác
      bảo vệ và trách nhiệm của cơ quan, tổ chức có liên quan và quy định của Thông tư này.

      2. Bảo đảm vũ trang canh gác bảo vệ mục tiêu thường xuyên, liên tục 24/24 giờ.

      3. Phối hợp chặt chẽ với các đơn vị trong Công an nhân dân và các cơ quan, tổ chức có liên quan nhằm phòng ngừa, phát
      hiện, ngăn chặn, xử lý kịp thời mọi hành vi xâm hại mục tiêu.'
    - 'Thông báo về việc giảm thời hạn chấp hành án phạt tù, đặc xá, đại xá cho người đang chấp hành án phạt tù đã được chuyển
      giao

      1. Ngay sau khi nhận được thông báo về quyết định giảm thời hạn chấp hành án phạt tù, đặc xá, đại xá cho người đang
      chấp hành án phạt tù đã được chuyển giao, Bộ Công an thông báo ngay cho cơ quan có thẩm quyền của nước ngoài biết để
      thực hiện việc giảm thời hạn chấp hành án phạt tù, đặc xá, đại xá cho người đang chấp hành án phạt tù.

      2. Cơ quan đại diện Việt Nam có trách nhiệm phối hợp với Bộ Công an giám sát việc cơ quan có thẩm quyền của nước tiếp
      nhận thực hiện quyết định giảm thời hạn chấp hành án phạt tù, đặc xá, đại xá của cơ quan có thẩm quyền của Việt Nam.'
  - source_sentence: Điều kiện để người bị kết án phạt tù chuyển giao về Việt Nam là gì?
    sentences:
    - '1. Nguyên tắc ghi nhận chi phí:

      a) Doanh nghiệp kinh doanh xổ số chỉ được hạch toán vào chi phí các khoản chi phí phát sinh liên quan đến hoạt động
      kinh doanh trong năm tài chính;

      b) Việc xác định chi phí của doanh nghiệp kinh doanh xổ số được thực hiện phù hợp với chuẩn mực kế toán và các văn bản
      pháp luật về thuế hiện hành.

      2. Nguyên tắc quản lý chi phí:

      a) Doanh nghiệp kinh doanh xổ số phải quản lý chặt chẽ các khoản chi phí để giảm chi phí và giá thành sản phẩm nhằm
      tăng hiệu quả hoạt động kinh doanh của doanh nghiệp;

      b) Việc quản lý chi phí của doanh nghiệp kinh doanh xổ số được thực hiện theo quy định của pháp luật về quy chế quản
      lý tài chính đối với doanh nghiệp do nhà nước sở hữu 100% vốn điều lệ.'
    - '"Điều 6. Điều kiện tiếp nhận người đang chấp hành án phạt tù

      Người đang chấp hành án phạt tù ở nước chuyển giao chỉ có thể được tiếp nhận về Việt Nam để tiếp tục chấp hành phần
      hình phạt tù còn lại khi có đủ các điều kiện sau đây:

      1. Là công dân Việt Nam;

      2. Có nơi thường trú cuối cùng ở Việt Nam;

      3. Hành vi phạm tội mà người đó bị kết án ở nước ngoài cũng cấu thành tội phạm theo quy định của pháp luật Việt Nam;

      4. Vào thời điểm tiếp nhận yêu cầu chuyển giao, thời hạn chưa chấp hành án phạt tù phải còn ít nhất là 01 (một) năm;
      trong trường hợp đặc biệt, thời hạn này còn ít nhất là 06 (sáu) tháng;

      5. Bản án đối với người được đề nghị chuyển giao về Việt Nam đã có hiệu lực pháp luật và không còn thủ tục tố tụng nào
      đối với người đó tại nước chuyển giao;

      6. Nước chuyển giao và người bị kết án đều đồng ý với việc chuyển giao. Trong trường hợp người bị kết án phạt tù là
      người chưa thành niên, người có nhược điểm về thể chất hoặc tâm thần thì phải có sự đồng ý của người đại diện hợp pháp
      của người đó;

      7. Tòa án có thẩm quyền của Việt Nam có quyết định đồng ý tiếp nhận đã có hiệu lực pháp luật."'
    - '1. Cơ quan, tổ chức thuộc Danh mục cơ quan, tổ chức thuộc nguồn nộp lưu tài liệu có trách nhiệm sau đây:

      a) Chỉnh lý tài liệu trước khi giao nộp và lập Mục lục hồ sơ, tài liệu nộp lưu;

      b) Lập Danh mục tài liệu có đóng dấu chỉ các mức độ mật;

      c) Giao nộp tài liệu và công cụ tra cứu vào Lưu trữ lịch sử.

      2. Lưu trữ lịch sử có trách nhiệm tổ chức tiếp nhận hồ sơ, tài liệu và lập Biên bản giao nhận hồ sơ, tài liệu.

      3. Mục lục hồ sơ, tài liệu nộp lưu và Biên bản giao nhận hồ sơ, tài liệu được lập thành 03 bản; cơ quan, tổ chức giao
      nộp hồ sơ, tài liệu giữ 01 bản, Lưu trữ lịch sử giữ 02 bản và được lưu trữ vĩnh viễn tại cơ quan, tổ chức, Lưu trữ lịch
      sử.'
  - source_sentence: Trách nhiệm của nhân viên quản lý chất lượng tại phòng xét nghiệm trong quản lý chất lượng bệnh viện
      đa khoa được quy định ra sao?
    sentences:
    - 'Cơ quan, tổ chức chia, tách, sáp nhập, giải thể; tổ chức kinh tế là doanh nghiệp nhà nước chia, tách, sáp nhập, giải
      thể, chuyển đổi hình thức sở hữu hoặc phá sản thì người đứng đầu cơ quan, tổ chức, doanh nghiệp phải tổ chức quản lý
      và giao nộp tài liệu theo quy định sau đây:

      1. Tài liệu hình thành trong quá trình hoạt động của cơ quan, tổ chức nào phải được chỉnh lý, thống kê và bảo quản theo
      phông lưu trữ của cơ quan, tổ chức đó;

      2. Khi cơ quan, tổ chức có quyết định chia, tách, sáp nhập, giải thể; doanh nghiệp có quyết định chia, tách, sáp nhập,
      giải thể, chuyển đổi hình thức sở hữu hoặc phá sản thì tất cả các hồ sơ, tài liệu đã giải quyết xong của các đơn vị,
      cá nhân trong cơ quan, tổ chức, doanh nghiệp phải được giao nộp vào Lưu trữ cơ quan để tiến hành chỉnh lý tài liệu theo
      quy định.

      3. Tài liệu lưu trữ sau khi được chỉnh lý được quản lý như sau:

      a) Tài liệu lưu trữ của cơ quan, tổ chức, doanh nghiệp thuộc nguồn nộp lưu tài liệu vào Lưu trữ lịch sử được giao nộp
      vào Lưu trữ lịch sử có thẩm quyền;

      b) Tài liệu lưu trữ của cơ quan, tổ chức, doanh nghiệp không thuộc nguồn nộp lưu vào Lưu trữ lịch sử được quản lý tại
      Lưu trữ cơ quan của cơ quan, tổ chức, doanh nghiệp mới tiếp nhận trụ sở cũ; trường hợp cơ quan, tổ chức giải thể, doanh
      nghiệp giải thể, phá sản hoặc không có cơ quan, tổ chức, doanh nghiệp tiếp nhận trụ sở cũ hoặc có nhiều cơ quan, tổ
      chức, doanh nghiệp mới cùng tiếp nhận trụ sở cũ thì tài liệu lưu trữ của cơ quan, tổ chức, doanh nghiệp được giao nộp
      vào Lưu trữ cơ quan theo quyết định của cơ quan, tổ chức cấp trên trực tiếp hoặc cơ quan, tổ chức có thẩm quyền.'
    - 'Trách nhiệm của nhân viên quản lý chất lượng tại phòng xét nghiệm

      1. Tổng hợp, tham mưu cho trưởng phòng xét nghiệm trong triển khai các nội dung về quản lý chất lượng xét nghiệm.

      2. Xây dựng kế hoạch và nội dung quản lý chất lượng xét nghiệm của phòng, trình lãnh đạo phòng xét nghiệm xem xét, quyết
      định để trình lãnh đạo cơ sở khám bệnh, chữa bệnh xem xét, phê duyệt.

      3. Tổ chức thực hiện chương trình nội kiểm và tham gia chương trình ngoại kiểm để theo dõi, giám sát, đánh giá chất
      lượng công tác xét nghiệm và phát hiện, đề xuất giải pháp can thiệp kịp thời nhằm quản lý những trường hợp sai sót,
      có nguy cơ sai sót trong các quy trình xét nghiệm.

      4. Thu thập, tổng hợp, phân tích dữ liệu, quản lý và bảo mật thông tin liên quan đến hoạt động phòng xét nghiệm.

      5. Phối hợp và hỗ trợ các khoa hoặc phòng liên quan khác trong việc triển khai quản lý chất lượng xét nghiệm.

      6. Tổng kết, báo cáo định kỳ hằng tháng, quý và năm về hoạt động và kết quả quản lý chất lượng xét nghiệm với trưởng
      phòng xét nghiệm, trưởng phòng (hoặc tổ trưởng) quản lý chất lượng bệnh viện và lãnh đạo cơ sở khám bệnh, chữa bệnh.

      7. Là đầu mối tham mưu để thực hiện các công việc liên quan với các tổ chức đánh giá, cấp chứng nhận phòng xét nghiệm
      đạt tiêu chuẩn quốc gia hoặc tiêu chuẩn quốc tế.'
    - '1. Phòng tiếp khách đối ngoại tại trụ sở cơ quan đại diện, văn phòng trực thuộc hay nhà riêng có quốc kỳ Việt Nam và
      treo ảnh hoặc đặt tượng Chủ tịch Hồ Chí Minh phía sau nơi ngồi tiếp khách của người chủ trì tiếp khách.

      2. Treo ảnh hoặc đặt tượng Chủ tịch Hồ Chí Minh ở chính giữa, quốc kỳ Việt Nam treo trên cột cờ đặt phía bên trái ảnh
      hoặc tượng nếu nhìn từ phía đối diện. Đỉnh của ảnh hoặc tượng Chủ tịch Hồ Chí Minh không cao hơn đỉnh ngôi sao vàng
      trong quốc kỳ Việt Nam khi treo trên cột cờ. (Xem hình 5 trong Phụ lục).'
