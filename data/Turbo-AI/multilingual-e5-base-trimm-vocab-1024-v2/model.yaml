- source_sentence: 'query: Giá trị sản xuất của trang trại trồng trọt được quy định như thế nào?'
  sentences:
  - 'passage: Phân loại trang trại

    1. Trang trại chuyên ngành được xác định theo lĩnh vực sản xuất như trồng trọt, chăn nuôi, lâm nghiệp, nuôi trồng thủy
    sản, diêm nghiệp và tỷ trọng giá trị sản xuất của lĩnh vực chiếm trên 50% cơ cấu giá trị sản xuất của trang trại trong
    năm. Trang trại chuyên ngành được phân loại như sau:

    a) Trang trại trồng trọt;

    b) Trang trại chăn nuôi;

    c) Trang trại lâm nghiệp;

    d) Trang trại nuôi trồng thủy sản;

    đ) Trang trại sản xuất muối.

    2. Trang trại tổng hợp là trang trại trong đó không có lĩnh vực sản xuất nào có tỷ trọng giá trị sản xuất chiếm trên 50%
    cơ cấu giá trị sản xuất của trang trại trong năm.'
  - 'passage: Chính sách ưu đãi, hỗ trợ đối với một số hoạt động đặc thù của kinh tế trang trại.

    1. Chính sách ưu đãi, hỗ trợ hoạt động du lịch

    Trang trại nông nghiệp có kết hợp hoạt động du lịch được hưởng các chính sách hỗ trợ, ưu đãi theo quy định của Luật Du
    lịch và văn bản hướng dẫn thực hiện. Ngoài ra còn được hỗ trợ: Kết nối hạ tầng giao thông từ hệ thống giao thông liên
    xã, liên huyện, liên tỉnh; cung cấp hệ thống nước sạch, viễn thông, bảo vệ môi trường, xử lý nước thải, rác thải; tư vấn
    phát triển du lịch; xây dựng đường giao thông nội bộ, bãi đỗ xe, biển chỉ dẫn giao thông, công trình vệ sinh, khu trưng
    bày, cơ sở lưu trú và các công trình phục vụ du lịch khác (nhà hàng, nhà trưng bày, mô hình sản xuất phục vụ khách du
    lịch tham quan, trải nghiệm); mua sắm trang thiết bị, phương tiện vận chuyển khách; thiết kế cảnh quan, xây dựng cảnh
    quan du lịch, trồng hoa, cây cảnh; bồi dưỡng, đào tạo nghề cho lao động du lịch; hỗ trợ các hoạt động xúc tiến quảng bá
    du lịch (xây dựng website du lịch; truyền thông, xây dựng thương hiệu, chi phí xây dựng ấn phẩm quảng bá, xúc tiến; tham
    dự hội chợ xúc tiến du lịch trong và ngoài nước). Mức hỗ trợ tối đa cho một trang trại không quá 1.000 triệu đồng/trang
    trại.

    2. Hỗ trợ xây dựng mô hình trang trại nông nghiệp chuyên ngành, ứng dụng công nghệ cao, chuyển đổi số, thích ứng thông
    minh với biến đổi khí hậu, nông nghiệp hữu cơ, kinh tế tuần hoàn.

    a) Trang trại trồng trọt được hưởng các chính sách hỗ trợ, ưu đãi khác theo quy định của Điều 4 Luật Trồng trọt và Điều
    4 Luật Thủy lợi. Ngoài ra trang trại sản xuất lúa được hỗ trợ theo quy định của khoản 4 Điều 1 Nghị định số 62/2019/NĐ-CP
    ngày 11 tháng 7 năm 2019 Của Chính phủ Sửa đổi, bổ sung một số điều Nghị định số 35/2015/NĐ-CP ngày 13 tháng 4 năm 2015
    của Chính phủ về Quản lý, sử dụng đất trồng lúa;

    b) Trang trại chăn nuôi được hưởng các chính sách đầu tư, hỗ trợ, khuyến khích theo quy định của Điều 4 Luật Chăn nuôi;
    Nghị định của Chính phủ quy định về cơ chế, chính sách hỗ trợ phát triển chăn nuôi bền vững (đang xây dựng dự kiến trình
    Chính phủ trong năm 2022);

    c) Trang trại nuôi trồng thủy sản được hưởng các chính sách hỗ trợ, ưu đãi khác theo quy định của Điều 4 Luật Thủy sản
    và văn bản hướng dẫn thực hiện;

    d) Trang trại sản xuất muối được hưởng ưu đãi về bảo tồn và phát triển nghề truyền thống gắn với du lịch và các chính
    sách hỗ trợ, ưu đãi khác theo quy định tại Nghị định số 40/2017/NĐ-CP ngày 05 tháng 4 năm 2017 của Chính phủ về quản lý
    sản xuất, kinh doanh muối; hỗ trợ khôi phục sản xuất khi bị thiên tai, dịch bệnh theo quy định tại Nghị định số 02/2017/NĐ-CP
    ngày 09 tháng 01 năm 2017 của Chính phủ về cơ chế, chính sách hỗ trợ sản xuất nông nghiệp để khôi phục sản xuất vùng bị
    thiệt hại do thiên tai, dịch bệnh;

    đ) Trang trại lâm nghiệp được hưởng ưu đãi về đầu tư bảo vệ và phát triển rừng, chế biến và thương mại lâm sản và các
    chính sách hỗ trợ, ưu đãi khác theo quy định của Điều 50, Điều 70, Điều 94, Điều 97 Luật Lâm nghiệp và văn bản hướng dẫn
    thực hiện.

    e) Trang trại sản xuất sản phẩm hữu cơ được hưởng chính sách theo quy định của Điều 17 Nghị định số 109/2018/NĐ-CP ngày
    29 tháng 8 năm 2018 của Chính phủ về Nông nghiệp hữu cơ.

    g) Trang trại áp dụng thực hành nông nghiệp tốt được hưởng chính sách theo quy định của Quyết định số 01/2012/QĐ-TTg ngày
    09 tháng 01 năm 2012 của Thủ tướng Chính phủ về một số chính sách hỗ trợ việc áp dụng quy trình thực hành sản xuất nông
    nghiệp tốt trong nông nghiệp, lâm nghiệp và thủy sản.

    h) Trang trại ứng dụng công nghệ cao, chuyển đổi số, chuyển đổi sản xuất nông nghiệp theo hướng thích ứng thông minh với
    biến đổi khí hậu nhằm phát triển bền vững được hỗ trợ một lần 50% kinh phí đầu tư xây dựng nhà kính, nhà lưới và các loại
    nhà khác phục vụ mục đích trồng trọt; hệ thống tưới nước tiết kiệm hoặc tự động, giếng và đường ống dẫn nước; hệ thống
    camera thông minh, thiết bị cảm biến và điều khiển, giám sát tự động. Mức hỗ trợ tối đa cho một trang trại không quá 1.000
    triệu đồng/trang trại.

    i) Trang trại nông nghiệp phát triển mô hình kinh tế tuần hoàn được hỗ trợ một lần 100% kinh phí mua chế phẩm vi sinh
    xử lý phụ phẩm trồng trọt, chăn nuôi, thủy sản và thiết bị xử lý môi trường; tối đa không quá 300 triệu đồng/trang trại.

    3. Hỗ trợ trang trại sản xuất, kinh doanh cây, con đặc thù

    Trang trại sản xuất, kinh doanh cây, con đặc thù quy định tại khoản 1 Điều 4 được hỗ trợ một lần 50% chi phí mua cây,
    con giống; mức hỗ trợ tối đa không quá 500 triệu đồng/trang trại .'
  - 'passage: "Điều 4. Cách tính tổng diện tích đất sản xuất, và giá trị sản xuất của trang trại

    1. Tổng diện tích đất sản xuất quy định tại Điều 3 Thông tư này là tổng diện tích đất sản xuất kinh doanh của trang trại,
    được sử dụng hợp pháp theo quy định của pháp luật về đất đai, bao gồm diện tích đất để trồng trọt, chăn nuôi, lâm nghiệp,
    nuôi trồng thủy sản, sản xuất muối và đất để xây dựng hạ tầng phục vụ sản xuất của trang trại tại thời điểm kê khai.

    2. Giá trị sản xuất của trang trại/năm là giá trị sản xuất của ít nhất 1 năm trang trại đạt được trong 3 năm gần nhất
    với năm kê khai; được tính bằng tổng giá trị sản xuất các kỳ thu hoạch hoặc khai thác trong năm.

    Đối với trang trại mới thành lập chưa có sản phẩm thu hoạch, giá trị sản xuất được ước tính căn cứ vào phương án sản xuất,
    tình hình triển khai thực tế của trang trại."'
  - 'passage: Phân loại kinh tế trang trại

    Trang trại nông nghiệp được phân loại thành 02 nhóm:

    1. Trang trại nông nghiệp chuyên ngành được xác định theo lĩnh vực sản xuất như trồng trọt, chăn nuôi, lâm nghiệp, nuôi
    trồng thủy sản, diêm nghiệp và tỷ trọng giá trị sản xuất của lĩnh vực chiếm trên 50% cơ cấu giá trị sản xuất của trang
    trại trong năm. Trang trại nông nghiệp chuyên ngành được phân thành 05 loại như sau:

    a) Trang trại trồng trọt: Là trang trại có hoạt động sản xuất trồng trọt, chủ yếu là trồng cây hàng năm, cây lâu năm và
    các loại cây trồng đặc thù (như nấm ăn hoặc một số loại cây khác); nhân và chăm sóc cây giống nông nghiệp đáp ứng yêu
    cầu về tiêu chí kinh tế trang trại;

    b) Trang trại chăn nuôi: Là trang trại có hoạt động sản xuất chăn nuôi tập trung tại khu vực riêng biệt dành cho sản xuất,
    kinh doanh chăn nuôi; chủ yếu là chăn nuôi trâu, bò, ngựa, lừa, la, dê, cừu, lợn, gia cầm và các loại vật nuôi đặc thù
    trên cạn (như chim yến, ong, hươu hoặc một số động vật khác sống trên cạn thuộc Danh mục động vật khác được phép chăn
    nuôi) đáp ứng yêu cầu về tiêu chí kinh tế trang trại;

    c) Trang trại lâm nghiệp: Là trang trại có hoạt động sản xuất trên đất quy hoạch sử dụng vào mục đích lâm nghiệp, hoạt
    động chủ yếu là gieo ươm, trồng, chăm sóc và khai thác cây rừng hoặc các sản phẩm lâm sản ngoài gỗ từ rừng đáp ứng yêu
    cầu về tiêu chí kinh tế trang trại;

    d) Trang trại nuôi trồng thủy sản: Là trang trại có hoạt động sản xuất nuôi trồng thủy sản, sản xuất giống thuỷ sản đáp
    ứng yêu cầu về tiêu chí kinh tế trang trại nuôi trồng thủy sản theo quy định;

    e) Trang trại sản xuất muối: Là trang trại có hoạt động sản xuất muối từ nước biển, nước mặn ngầm hoặc khai thác từ mỏ
    muối đáp ứng yêu cầu về tiêu chí kinh tế trang trại.

    2. Trang trại nông nghiệp tổng hợp là trang trại tổ chức nhiều hoạt động sản xuất chuyên ngành nông nghiệp quy định tại
    khoản 1 Điều này; trong đó không có lĩnh vực sản xuất nào có tỷ trọng giá trị sản xuất chiếm trên 50% cơ cấu giá trị sản
    xuất của trang trại trong năm.'
- source_sentence: 'query: Đơn đề nghị đặt tiền để bảo đảm được tại ngoại của bị can được gửi đến đâu?'
  sentences:
  - 'passage: 1. Trong thời hạn năm ngày, kể từ ngày nhận được Thông báo về việc đặt tiền để bảo đảm và các mẫu văn bản kèm
    theo, nếu có nguyện vọng xin được đặt tiền để bảo đảm thay thế biện pháp tạm giam thì bị can, bị cáo phải hoàn chỉnh đơn
    và giấy uỷ quyền (đối với người đã thành niên) và gửi cho cơ quan đã thông báo thông qua cơ sở giam giữ.

    Trong thời hạn một ngày làm việc, kể từ khi nhận được đơn đề nghị, giấy uỷ quyền của bị can, bị cáo, cơ sở giam giữ có
    trách nhiệm chuyển cho cơ quan đang tiến hành tố tụng đối với vụ án.

    2. Trong thời hạn một ngày làm việc, kể từ khi nhận được đơn đề nghị và giấy uỷ quyền của bị can, bị cáo, đại diện cơ
    quan tiến hành tố tụng đang thụ lý vụ án xác nhận vào giấy uỷ quyền và gửi ngay cho người được uỷ quyền bằng thư bảo đảm
    hoặc chuyển phát nhanh. Trong thời hạn năm ngày, kể từ ngày nhận được Giấy ủy quyền, người được bị can, bị cáo ủy quyền
    ghi ý kiến của mình, ký tên vào Giấy ủy quyền và nộp lại cho cơ quan tiến hành tố tụng đối với vụ án. Giấy uỷ quyền là
    cơ sở để người được uỷ quyền thay mặt bị can, bị cáo thực hiện việc đặt tiền để bảo đảm.

    Trường hợp bị can, bị cáo là người chưa thành niên, người có nhược điểm về tâm thần thì cơ quan đang tiến hành tố tụng
    đối với vụ án chuyển đơn đề nghị của bị can, bị cáo cho người đại diện hợp pháp của họ. Trong thời hạn năm ngày, kể từ
    ngày nhận được đơn đề nghị, người đại diện hợp pháp ghi ý kiến, ký tên vào đơn đề nghị của bị can, bị cáo và nộp lại cho
    cơ quan tiến hành tố tụng đối với vụ án.

    3. Bị can, bị cáo hoặc người đại diện hợp pháp của họ có quyền đề nghị bằng văn bản với cơ quan đang tiến hành tố tụng
    đối với vụ án về việc áp dụng biện pháp đặt tiền để bảo đảm đối với bị can, bị cáo khi thấy có đủ các điều kiện hướng
    dẫn tại khoản 1 Điều 3 của Thông tư liên tịch này.

    Văn bản đề nghị của bị can, bị cáo được gửi qua cơ sở giam giữ. Trong thời hạn một ngày làm việc kể từ khi nhận được văn
    bản đề nghị của bị can, bị cáo, cơ sở giam giữ có trách nhiệm chuyển đến cơ quan đang tiến hành tố tụng đối với vụ án.

    Văn bản đề nghị của người đại diện hợp pháp của bị can, bị cáo được gửi trực tiếp đến cơ quan đang tiến hành tố tụng đối
    với vụ án.

    Trong thời hạn ba ngày làm việc, kể từ khi nhận được văn bản đề nghị, cơ quan tiến hành tố tụng đang thụ lý vụ án có trách
    nhiệm xem xét, nếu thấy có đủ điều kiện để áp dụng biện pháp đặt tiền để bảo đảm thì gửi cho bị can, bị cáo các mẫu văn
    bản theo hướng dẫn tại Điều 7 của Thông tư liên tịch này để làm thủ tục đề nghị được đặt tiền để bảo đảm. Trường hợp xét
    thấy không đủ điều kiện áp dụng biện pháp đặt tiền để bảo đảm đối với bị can, bị cáo thì phải thông báo bằng văn bản cho
    người đề nghị biết trong đó nêu rõ lý do.'
  - 'passage: Đề nghị đặt tiền để bảo đảm

    1. Bị can, bị cáo, người thân thích của bị can, bị cáo hoặc người đại diện của bị can, bị cáo là người dưới 18 tuổi, người
    có nhược điểm về tâm thần hoặc thể chất có quyền đề nghị bằng văn bản với cơ quan tiến hành tố tụng đang thụ lý vụ án
    về việc áp dụng biện pháp đặt tiền để bảo đảm đối với bị can, bị cáo trừ trường hợp quy định tại khoản 2 Điều 7 Thông
    tư liên tịch này.

    2. Đơn đề nghị của bị can, bị cáo, được gửi qua cơ sở giam giữ hoặc gửi trực tiếp cho cơ quan tiến hành tố tụng đang thụ
    lý vụ án. Trong thời hạn 01 ngày làm việc kể từ khi nhận được đơn đề nghị của bị can, bị cáo, cơ sở giam giữ có trách
    nhiệm chuyển đến cơ quan tiến hành tố tụng đang thụ lý vụ án.

    3. Đơn đề nghị của người thân thích, người đại diện của bị can, bị cáo được gửi trực tiếp đến cơ quan tiến hành tố tụng
    đang thụ lý vụ án.'
  - 'passage: Thông báo về việc cho đặt tiền để bảo đảm

    1. Trong thời hạn 03 ngày làm việc, kể từ khi nhận được đơn đề nghị và các giấy tờ có liên quan, cơ quan tiến hành tố
    tụng đang thụ lý vụ án có trách nhiệm xem xét, nếu thấy có đủ điều kiện áp dụng biện pháp đặt tiền để bảo đảm theo quy
    định tại khoản 2 Điều này thì ra Thông báo cho bị can, bị cáo, người thân thích hoặc người đại diện của bị can, bị cáo
    theo Mẫu số 04 ban hành kèm theo Thông tư liên tịch này để làm thủ tục đặt tiền để bảo đảm. Trường hợp thấy không đủ điều
    kiện áp dụng biện pháp đặt tiền để bảo đảm đối với bị can, bị cáo thì phải thông báo bằng văn bản cho người đề nghị biết
    trong đó nêu rõ lý do.

    2. Căn cứ vào tính chất, mức độ nguy hiểm cho xã hội của hành vi phạm tội, tình trạng tài sản, nhân thân của bị can, bị
    cáo; bị can, bị cáo có nơi cư trú rõ ràng, phạm tội lần đầu, tố giác đồng phạm, có tình tiết giảm nhẹ (như tự thú, đầu
    thú, thành khẩn khai báo, lập công chuộc tội, tích cực hợp tác với cơ quan có trách nhiệm trong việc phát hiện tội phạm
    hoặc trong quá trình giải quyết vụ án, ăn năn hối cải, tự nguyện sửa chữa hoặc bồi thường thiệt hại...); việc cho bị can,
    bị cáo tại ngoại không gây khó khăn cho việc điều tra, truy tố, xét xử, thi hành án thì cơ quan tiến hành tố tụng có thể
    quyết định áp dụng biện pháp đặt tiền để bảo đảm trừ các trường hợp sau:

    a) Bị can, bị cáo dùng thủ đoạn xảo quyệt, phạm tội có tổ chức, có tính chất chuyên nghiệp, cố ý gây hậu quả đặc biệt
    nghiêm trọng;

    b) Bị can, bị cáo là người chủ mưu, cầm đầu, chỉ huy, ngoan cố chống đối, côn đồ, tái phạm, tái phạm nguy hiểm;

    c) Bị tạm giam trong trường hợp bị bắt theo lệnh, quyết định truy nã.

    d) Phạm nhiều tội;

    đ) Phạm tội nhiều lần.'
  - 'passage: Điều 2. - Đối với vụ án vừa có bị can đang bị tạm giam, vừa có bị can tại ngoại, cũng như vụ án chỉ có bị can
    tại ngoại, thì trong thời hạn ba ngày, kể từ ngày ra quyết định truy tố, Viện kiểm sát gửi đến Tòa án hồ sơ vụ án và quyết
    định truy tố cùng với biên bản giao cáo trạng cho bị can đang bị tạm giam, cũng như bị can tại ngoại. Nếu Viện kiểm sát
    gặp khó khăn trong việc giao cáo trạng cho bị can tại ngoại, thì chậm nhất là 15 ngày kể từ ngày gửi cho Tòa án hồ sơ
    vụ án, Viện kiểm sát gửi đến Tòa án biên bản về việc Viện kiểm sát giao cáo trạng cho bị can tại ngoại. Hết thời hạn đó,
    nếu Viện kiểm sát không gửi đến Tòa án đủ các biên bản giao cáo trạng cho bị can, thì Tòa án trả hồ sơ cho Viện kiểm sát,
    vì lý do chưa hoàn thành thủ tục tố tụng.'
- source_sentence: 'query: Ngân sách nhà nước bảo đảm để thực hiện công tác quản lý, vận hành và bảo trì công trình đường
    cao tốc bao gồm những gì?'
  sentences:
  - 'passage: Bảo trì công trình đường cao tốc

    1. Công tác bảo trì công trình đường cao tốc thực hiện theo tiêu chuẩn kỹ thuật về bảo trì công trình hoặc quy trình bảo
    trì được Chủ đầu tư, nhà đầu tư phê duyệt theo quy định về bảo trì công trình xây dựng, đảm bảo công năng của công trình
    và an toàn giao thông trong quá trình vận hành khai thác.

    2. Bộ Giao thông vận tải, Ủy ban nhân dân cấp tỉnh lựa chọn đơn vị, tổ chức thực hiện công tác bảo trì công trình đường
    cao tốc đối với các tuyến đường được đầu tư xây dựng bằng ngân sách nhà nước trong phạm vi quản lý.

    3. Nhà đầu tư tổ chức thực hiện công tác bảo trì công trình đường cao tốc đối với các dự án đầu tư theo hình thức đối
    tác công - tư và các dự án nhượng quyền theo quy định của Bộ Giao thông vận tải.

    4. Công tác tổ chức khai thác và bảo trì công trình đường cao tốc được thực hiện theo hợp đồng riêng biệt hoặc là nội
    dung công việc trong hợp đồng đầu tư xây dựng, khai thác và bảo trì công trình đường cao tốc.

    5. Bộ Giao thông vận tải, Ủy ban nhân dân cấp tỉnh kiểm tra, giám sát thực hiện các hợp đồng quản lý, khai thác và bảo
    trì công trình đường cao tốc trong phạm vi quản lý.'
  - 'passage: Chi phí cho công tác quản lý, vận hành và bảo trì công trình đường cao tốc

    1. Ngân sách nhà nước bảo đảm để thực hiện công tác quản lý, vận hành và bảo trì công trình đường cao tốc là tài sản công
    kết cấu hạ tầng giao thông đường bộ do Nhà nước quản lý, gồm: Tài sản kết cấu hạ tầng đường cao tốc do Nhà nước đầu tư
    xây dựng; tài sản kết cấu hạ tầng đường cao tốc sau khi hết thời hạn hợp đồng PPP chuyển giao cho Nhà nước và các trường
    hợp khác.

    2. Tài sản kết cấu hạ tầng đường cao tốc do Nhà nước cho thuê, chuyển nhượng có thời hạn và các trường hợp khác giao tổ
    chức kinh tế, doanh nghiệp khai thác sử dụng theo quy định của pháp luật về quản lý, sử dụng tài sản công, tổ chức kinh
    tế, doanh nghiệp được giao có trách nhiệm thực hiện quản lý, vận hành và bảo trì công trình đường cao tốc cho đến khi
    chuyển giao tài sản cho Nhà nước.

    3. Việc quản lý, sử dụng, khai thác, bảo trì và chi phí thực hiện các công việc này đối với đường cao tốc đầu tư theo
    phương thức đối tác công tư do nhà đầu tư thực hiện và phải quy định trong hợp đồng dự án PPP.

    4. Đối với các trường hợp không quy định tại các khoản 1, khoản 2 và khoản 3 Điều này, chủ sở hữu hoặc người quản lý sử
    dụng đường cao tốc có trách nhiệm bố trí kinh phí và thực hiện quản lý, sử dụng, khai thác, bảo trì công trình đường cao
    tốc theo quy định của pháp luật về xây dựng và pháp luật khác có liên quan.'
